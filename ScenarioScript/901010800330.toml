901010800330-49 = "5;오토기;00;맞아. 정확히 말하자면 ‘게 드럼통’과 관련된 소문이겠지.\n#5;em;[반응]\n#5;m3"
901010800330-50 = "5;오토기;02;인적이 드문 새벽이라도 시끄럽게 드럼통을 굴리면, 결국 누군가의 눈에는 띄게 될 거야."
901010800330-51 = "5;오토기;01;최근 카네사키 항구를 중심으로 게 드럼통 소문이 퍼지고 있는 상황에서, 카르파초 패밀리 조직원이 밤늦게 드럼통을 운반하는 모습이 눈에 띈다면 사람들이 무슨 생각을 할지는 뻔하잖아?"
901010800330-52 = "5;오토기;99;\"카르파초 패밀리가 괴물 게를 운반하고 있다.\""
901010800330-53 = "#5;hide\n3;쿠루미;02;그런데 괴물 게를 취급한다는 이미지가 사업에 도움이 될까?\n#3;em;[?]"
901010800330-54 = "3;쿠루미;01;나라면 그런 녀석들과는 말도 섞고 싶지 않을 텐데……"
901010800330-55 = "3;니코;99;평범한 사람이라면 그렇겠지."
901010800330-56 = "3;니코;02;하지만 사람을 협박하고 불량한 일을 수시로 저지르는 주먹패들에게는, 오히려 그런 괴담이 더 긍정적인 이미지로 작용하지 않았을까?"
901010800330-57 = "3;오토기;02;아, 전차에 그려 넣는 킬 마크 같은 건가?\n#3;em;[전구]"
