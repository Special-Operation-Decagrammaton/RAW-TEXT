[translation]
901010800330-7 = "まず、倉庫の入り口で発見した資料は……。"
901010800330-8 = "普通の警備マニュアルだったけど、一ヶ所変な記述があったよね。"
901010800330-9 = "「毎週1回、宿直の者は午前0時にドラム缶を転がしながら港を一周すること」"
901010800330-10 = "実際倉庫に入る前、ドラム缶を転がしていた構成員を見かけたの。"
901010800330-11 = "カルパッチョ・ファミリーの幹部は、何を考えてあんなことを指示していたのかな？"
901010800330-12 = "私が知っている中で一番似ている事例だと……。"
901010800330-13 = "オデュッセイアでは、生徒会への抗議として深夜に甲板で砲弾を転がしてたらしいよ。"
901010800330-14 = "これも似たような目的じゃないのかな？"
901010800330-15 = "抗議や威嚇だと？誰に向けてのだ？"
901010800330-16 = "そもそも、ひとけのない深夜の港でドラム缶を転がしたところで、目にする人は少ないような……。"
901010800330-18 = "だが、一人でもその姿を目にすれば、噂はあっという間に広がるだろう。"
901010800330-19 = "目的は噂になることってことかな……。"
901010800330-20 = "じゃあ、カルパッチョ・ファミリーが深夜にドラム缶を転がした理由は――"
901010800330-28 = "じゃあ、カルパッチョ・ファミリーが深夜にドラム缶を転がした理由は――\n[as1] 他の場所へ物を運ぶためだ。\n[as2] 構成員をトレーニングさせるためだ。\n[as3] ドラム缶に関する噂を広めるためだ。"
901010800330-29 = "いや、指示はドラム缶をどこかに運ぶんじゃなくて、転がすだけって話だったでしょう？"
901010800330-30 = "それに物を運ぶのが目的なら、深夜にする必要ある？"
901010800330-31 = "もうちょっと考えてみて。"
901010800330-40 = "たしかに重たいドラム缶を転がしたら運動にはなるけど……。"
901010800330-41 = "トレーニングが目的なら、ちゃんとしたマシンを使うんじゃない？"
901010800330-42 = "それに、錆ついたドラム缶で怪我したら危ないよ。"
901010800330-49 = "そうだね。正確に言えば「ドラム缶ガニ」に関する噂。"
901010800330-50 = "ひとけのない夜中でも、うるさくドラム缶を転がしたら誰かの目に留まるだろうし。"
901010800330-51 = "最近、鐘崎港を中心にドラム缶ガニの噂が広がっている状況で、カルパッチョ・ファミリーの構成員が深夜にドラム缶を運ぶ姿が目に入れば……人々が何を思うかは容易に想像できるじゃん？"
901010800330-52 = "「カルパッチョ・ファミリーが化け蟹を運んでいる」"
901010800330-53 = "そういうイメージがついたら、ビジネスの邪魔になるんじゃない？"
901010800330-54 = "私なら、あんな連中と関わりたくないけど……。"
901010800330-55 = "普通の人ならそうだね。"
901010800330-56 = "でも、闇金すれすれの組織からしたら、その方が都合がいいんじゃないかな？"
901010800330-57 = "あー……戦車にキルマークを刻むみたいな？"
901010800330-58 = "今回の事件で犠牲になった者はいないが。"
