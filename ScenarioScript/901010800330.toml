901010800330-6 = "3;니코;00\n#3;a\n#wait;1000"
901010800330-7 = "3;니코;02;먼저, 창고 입구에서 발견한 가이드 매뉴얼에는……"
901010800330-8 = "3;니코;00;대부분은 평범한 경비 지침만 적혀있었지만, 이상한 내용이 하나 있었어."
901010800330-9 = "3;니코;99;바로 “주기적으로 새벽에 드럼통을 굴리며 항만을 배회하라”는 지침이었지."
901010800330-10 = "3;니코;00;실제로 창고에 잠입하기 직전에 드럼통을 굴리는 조직원을 확인했어."
901010800330-11 = "3;니코;02;카르파초 패밀리의 간부들은 도대체 무슨 생각으로 그런 기행을 지시한 걸까?\n#3;em;[?]"
901010800330-12 = "3;오토기;99;내가 아는 한 가장 비슷한 사례라면……\n#3;em;…"
901010800330-13 = "3;오토기;00;예전 오디세이아에서는 학생들이 불만이 생기면 학생회에 항의하는 의미로 한밤중에 갑판 위에서 포탄을 굴렸다고 하더라."
901010800330-14 = "3;오토기;02;이것도 비슷한 목적에서 한 행동이 아닐까?"
901010800330-15 = "5;쿠루미;02;항의나 위협 용도로? 누구를 위협한다는 건데?\n#5;al\n#3;m1"
901010800330-16 = "5;쿠루미;01;애초에 사람도 거의 없는 새벽 항만에서 시끄럽게 드럼통을 굴려 봤자, 몇이나 그 광경을 보겠어?"
901010800330-17 = "#all;hide"
901010800330-18 = "3;유키노;99;하지만 단 한 사람이라도 그 기괴한 모습을 본다면, 금방 입소문을 타겠지.\n#3;em;…"
901010800330-19 = "3;니코;02;목적은 입소문이라는 건가……"
901010800330-20 = "3;오토기;99;그럼 아마도 카르파초 패밀리가 새벽에 드럼통을 굴린 이유는—"
