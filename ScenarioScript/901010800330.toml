901010800330-29 = "#5;hide\n3;쿠루미;12;아니. 지시는 드럼통을 어딘가로 운반하라는 게 아니라, 굴리며 배회하라는 명령이었다니까?\n#3;em;[한숨]"
901010800330-30 = "3;쿠루미;05;그리고 물건을 운반할 목적이었다면, 굳이 새벽을 택할 이유가 있었겠어?"
