[translation]
201-1 = "บีนาห์ ผู้ตระหนักรู้แก่นแท้แห่งความแตกต่าง"
201-2 = "เรื่องราวที่ผ่านมานานมากแล้ว"
201-3 = "ที่ด้านนอกคิโวทอส ณ ที่แห่งหนึ่งในบริเวณพื้นที่เมืองเก่าที่ถูกปล่อยร้าง#nบริเวณที่ไม่มีใครเหยียบย่างเข้าไปได้มีการวิจัยที่แปลกๆ ดำเนินขึ้นที่นั่น"
201-4 = "การศึกษาวิจัยเกี่ยวกับเทพเจ้า วิเคราะห์เพื่อพิสูจน์การมีอยู่ของเทพเจ้า และหากพิสูจน์ได้ก็จะ#nดำเนินการวิเคราะห์โครงสร้างต่อ และหากสามารถวิเคราะห์โครงสร้างได้ ก็จะสามารถสร้าง#nขึ้นมาใหม่ได้... ซึ่งก็คือวิธีการ... ที่จะสร้างเทพเจ้าขึ้นมาใหม่..."
201-5 = "ถึงจะเป็นทฤษฎีที่ใครๆ ต่างก็หัวเราะเย้ยหยัน แต่ก็มีคนบางส่วนที่สนใจในทฤษฎีนี้อยู่เช่นกัน"
201-6 = "<เกมาเทรีย> คือผู้ที่สนับสนุนงานวิจัย พวกเขาได้ทุ่มเงินจำนวนมหาศาลและเวลาจำนวนมาก#nลงไปในงานวิจัยนี้ และได้สร้าง AI ต้นแบบขึ้นมาเพื่อพิสูจน์การมีอยู่ของเทพเจ้า"
201-7 = "ปัญญาประดิษฐ์ (AI) ที่จะรวบรวมข้อมูลเกี่ยวกับการมีอยู่ของเทพเจ้าและนำมาวิเคราะห์เพื่อพิสูจน์#nระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบได้เริ่มต้นขึ้น"
201-8 = "ถึงแม้เวลาจะผ่านมาหลายปีและเมืองได้ถูกทำลายลง ห้องทดลองได้จมลงสู่ใต้น้ำไป#nผู้คนต่างลืมเลือนว่าเคยมีห้องทดลองที่วิจัยเรื่องแบบนี้อยู่..."
201-9 = "แต่ว่า AI ตัวนี้ก็ยังคงดำเนินภารกิจที่มันได้รับมอบหมายอยู่เรื่อยมา"
201-10 = "และในที่สุด... ท่ามกลางซากปรักหักพังเหล่านั้น เสียงประกาศก้องของ AI นั่นก็ได้ดังขึ้น"
201-11 = "Q.E.D. ..."
201-12 = "....."
201-13 = "การปรากฏตัวของเทพเจ้าองค์ใหม่ที่เกิดจากการวิเคราะห์ ทดลองซ้ำและพิสูจน์จนเป็นผลแล้ว..."
201-14 = "เทพเจ้าองค์ใหม่ที่ขนานนามตัวเองด้วยอักษรศักดิ์สิทธิ์ทั้ง 10 ตัว ที่ไม่สามารถเอ่ยออกมาได้"
201-16 = "เดคาแกรมมาทอน"
201-17 = "เขาได้ติดต่อกับผู้เลื่อมใสทั้ง 10 คนที่เลื่อมใสและเชื่อในตัวเขา และได้เป็นผู้บุกเบิกหนทาง#nไปสู่ความศักดิ์สิทธิ์"
201-18 = "หรือก็คือการเดินทางสู่แดนสวรรค์ครั้งใหม่"
201-19 = "นี่คือเทพเจ้าตัวจริงอย่างนั้นหรือ? อ่า... ผมเองก็ไม่อาจรู้ได้ และผมก็ไม่สนใจเรื่องนั้นด้วยเหมือนกัน"
201-21 = "อย่างไรก็ตาม การเดินทางเพื่อพิสูจน์ความเป็นเทพเจ้าของเขานั้นเปรียบได้เหมือนกับเส้นทาง#n\"ลิขิตแห่งความจริง\" หรือ \"เซฟิร่า\" นั่นเอง"
201-22 = "ครูเอ๋ย..."
201-23 = "ผู้เลื่อมใสที่คุณจะได้พบคือหนึ่งในสามเทพเจ้าระดับสูงที่สุดของเซฟิร่า"
201-24 = "เส้นทางของเขาคือการรวมเป็นหนึ่งจากความเข้าใจ ชื่อเรียกของเขาก็คือ <ผู้ตระหนักรู้แก่นแท้แห่งความแตกต่าง>"
201-25 = "หรือนั่นก็คือ... \"บีนาห์\" ยังไงล่ะ"
201-26 = "คนจาก <ชาเล่ต์> ที่คิดท้าทายผู้เลื่อมใสของเดคาแกรมมาทอนอย่างคุณ... จะอดทนได้นานแค่ไหนกัน?#nความสัมพันธ์และพลังแห่งสายใยที่คุณสร้างขึ้นมา... สุดท้ายแล้วเมื่ออยู่ต่อหน้าเทพเจ้าองค์ใหม่..."
201-27 = "ความลึกลับของเด็กสาวพวกนั้น สุดท้ายจะเทียบกับความลึกลับของพระเจ้าได้หรือไม่?"
201-28 = "ใช่แล้วล่ะ นี่เป็นงานวิจัยที่น่าสนใจอย่างมาก"
201-31 = "ครูเอ๋ย... คุณเคยเผชิญหน้ากับเทพเจ้ามาก่อนหรือเปล่า?"
201-32 = "อ่า...ถือว่าโชคดี "
201-33 = "ถ้าอย่างนั้น คราวนี้...มันอาจแตกต่างไปจากสิ่งที่คุณรู้เล็กน้อย"
