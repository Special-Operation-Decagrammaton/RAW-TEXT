[translation]
901010600110-7 = "FOX2、ただいまポイントアルファに進入しました。"
901010600110-11 = "了解。他の小隊員も報告するように。"
901010600110-17 = "FOX3、FOX4もポイントシエラに到着。"
901010600110-18 = "この前みたいに周囲を警戒しながらFOX2を遠隔支援するね。"
901010600110-20 = "……了解。"
901010600110-21 = "本日の作戦目標は、失踪した漁師「ミヤグチ」の行方を調べ、噂の出所を調べることだ。"
901010600110-22 = "ほとんどの港関係者は噂とは無関係に見えるが、見落としがあるかもしれないため。念入りに調査せよ。"
901010600110-24 = "了解！"
901010600110-27 = "そういえばFOX1、昨日の調査で新しく見つかった証拠はあった？"
901010600110-28 = "昨日の調査……？"
901010600110-29 = "うん。昨日、調査したいことがあるから、午後席を外していたでしょう？"
901010600110-30 = "ドラム缶ガニの調査に行ったんだと思っていたんだけど……違ったかな？"
901010600110-31 = "ああ……昨日のことか。"
901010600110-32 = "特になんでもない。ごく個人的な用事だったからな。"
901010600110-34 = "へぇ～個人的な用事、ね。"
901010600110-35 = "……どうした、FOX3？"
901010600110-36 = "別に？FOX1が「本当に個人的な用事」で席を外すの、初めて見ただけ。"
901010600110-37 = "何か心境の変化でもあったんじゃない？"
901010600110-38 = "ユキノが変わったのは、[USERNAME]先生が来たから――"
901010600110-39 = "――作戦と関係ない私語はここまでだ。"
901010600110-40 = "では、FOX2。よろしく頼む。"
901010600110-41 = "ふふっ、それじゃあ始めようか。"
