[translation]
10051020-1 = "Episode 2;Mission Eligibility"
10051020-2 = "Classroom in Hyakkiyako Old Schoolhouse 38"
10051020-3 = "...and so, the Ninjutsu Research Club will be providing undercover security for the esteemed designer, Shinecat!"
10051020-4 = "Ooh!"
10051020-5 = "You're incredible, President!"
10051020-6 = "G-Good work."
10051020-7 = "*sniff* I can't believe you managed to find such a valuable commission for us..."
10051020-8 = "Um... As long as you're all also okay with it?"
10051020-9 = "I thought you'd be mad because I was making you two work!"
10051020-10 = "Not at all, President!"
10051020-11 = "This is an opportunity to raise our club's reputation by escorting a famous, esteemed individual...!"
10051020-12 = "There's no reason to say no!"
10051020-13 = "I...also agree."
10051020-14 = "By the way, I'm curious, ladies."
10051020-15 = "Have you ever heard of this \"Shinecat\"?"
10051020-16 = "Izuna has not!"
10051020-17 = "Such a quick response!"
10051020-18 = "Eh, wait, then how did you know he was so...\"famous and esteemed\"?"
10051020-19 = "Because that's what you said, President!"
10051020-20 = "Ah?"
10051020-21 = "Well, I only learned about him from Niya..."
10051020-23 = "Um, President..."
10051020-24 = "I've heard of him...actually."
10051020-25 = "Oh. Really?"
10051020-26 = "Yes. Shinecat reinterprets classical aesthetics through a modern lens..."
10051020-27 = "...and has completely flipped the established paradigm of the fashion industry!"
10051020-28 = "Shinecat is actually a role model for a lot of up-and-coming designers..."
10051020-29 = "You know so much!"
10051020-30 = "I-Is that so...?"
10051020-31 = "Anyway, thank you all for the enthusiastic responses!"
10051020-32 = "But!"
10051020-33 = "A ninja is always professional! And professionals don't work without adequate compensation!"
10051020-34 = "So... Tada!"
10051020-35 = "Behold, our new camera!"
10051020-36 = "We can resume filming \"Michiruchi, A Girl's Ninja Scroll\"! The saga cannot be stopped!"
10051020-37 = "Oh!"
10051020-38 = "You're amazing, President!"
10051020-39 = "Th-This camera is so much better than our old one..."
10051020-40 = "We shall capture your ninjutsu in high-definition, President!"
10051020-41 = "Honorable Tsukuyo, look closely! It's waterproof!"
10051020-42 = "Y-You're right...!"
10051020-43 = "We could film from a boiling ramen's POV! Nin nin!"
10051020-44 = "Heehee, I'm glad everyone's happy!"
10051020-45 = "However, a ninja is someone who endures...!"
10051020-46 = "So, let's stop the celebration for a minute and focus on the mission's logistics!"
10051020-47 = "Oh!"
10051020-48 = "President...!"
10051020-49 = "So, let's familiarize ourselves with the gear, shall we?"
10051020-54 = "A trunk...?"
10051020-55 = "Ooh! Izuna eagerly awaits the reveal!"
10051020-56 = "What could it be?"
10051020-57 = "A new ninjutsu scroll?"
10051020-58 = "Fufu, well, no. But it's very vital for our ninja activities."
10051020-59 = "It's..."
10051020-61 = "...dresses!"
10051020-62 = "Dresses...?"
10051020-63 = "Dresses...?"
10051020-69 = "Whoa! Izuna's never seen such pretty clothes before!"
10051020-70 = "They're...quite beautiful."
10051020-71 = "Although I doubt my large frame could fit in something like this..."
10051020-72 = "Um... I'm glad you like the way they look."
10051020-73 = "Because...we have to wear them."
10051020-77 = "What?!"
10051020-78 = "D-Don't you think it'd be difficult to move in these?"
10051020-79 = "President, is our mission to walk...on the runway?"
10051020-80 = "...Are we required to endure the endless boos and jeers from the audience?"
10051020-81 = "O-Of course, if that's the path a ninja must take..."
10051020-82 = "..then, I, Tsukuyo, will gladly..."
10051020-83 = "No, no. Our mission is just to provide security!"
10051020-84 = "We'll blend in with the crowd and keep an eye out for suspicious activity. No one will look at us."
10051020-85 = "These dresses will allow us to exercise stealth and professionalism, right?"
10051020-86 = "R-Right..."
10051020-87 = "And Niya said there's a dress code, so if we want all-access, we have to look the part!"
10051020-88 = "For example, you know, the place with all the big-wigs eating, the... Uh... "
10051020-89 = "B-Banquet hall?"
10051020-90 = "Precisely! The banquet hall!"
10051020-91 = "We won't be able to get in unless we're dressed to the nines."
10051020-92 = "Yeah. And that's why the Yin-Yang Club lent us these dresses. It's...actually quite generous of them."
10051020-93 = "But won't these limit our movements?"
10051020-94 = "Flexibility and swiftness are vital for any self-respecting ninja..."
10051020-95 = "And honestly, I don't think it's going to fit me at all...!"
10051020-96 = "If I so much as move my shoulders, I'm certain I'll rip through the fabric."
10051020-97 = "Hm! In that case, let us don the dresses now! Nin nin!"
10051020-98 = "Hm?"
10051020-99 = "...!"
10051020-100 = "It is as the president says..."
10051020-101 = "\"A ninja never gives up, no matter the adversity!\""
10051020-102 = "Which means we must not be anxious about wearing dresses."
10051020-103 = "If we practice now and get used to the fit..."
10051020-104 = "...then we will be perfectly comfortable at the venue!"
10051020-105 = "...You're right. We should prepare and train for the mission."
10051020-106 = "And a ninja must be able to blend into any situation!"
10051020-107 = "Like Izuna said! We can't let ourselves be defeated by formalwear!"
10051020-108 = "That's right! Nin nin!"
10051020-109 = "Then Izuna will try it first!"
10051020-112 = "President! Is this my dress?"
10051020-113 = "Yeah, this is yours. This one's Tsukuyo's..."
10051020-114 = "W-Waaah...!"
10051020-116 = "Tada! Dress Izuna is here!"
10051020-122 = "Oh...!"
10051020-123 = "Wow...!"
10051020-124 = "You look amazing!"
10051020-125 = "So pretty...!"
10051020-126 = "Heehee, Izuna appears acceptable?"
10051020-127 = "Such praise is flustering!"
10051020-128 = "Do you think you can move in it?"
10051020-129 = "There are a few uncomfortable, tight spots..."
10051020-130 = "But Izuna should move freely once she's used to it!"
10051020-131 = "Above all, since this is Izuna's first time wearing such a beautiful outfit..."
10051020-133 = "...it's quite thrilling!"
10051020-134 = "Oh, good, good."
10051020-135 = "Okay, then..."
10051020-136 = "Next up..."
10051020-137 = "Wh-Why don't you try yours on next, President?"
10051020-138 = "I'm certain it'll be quite flattering on you!"
10051020-139 = "Uh, y-you think?"
10051020-140 = "Then let's see, here's mine..."
10051020-142 = "Do I... drape this like...?"
10051020-143 = "You're wearing it backwards, President!"
10051020-144 = "Eek!"
10051020-145 = "What?! Why is this so complicated?!"
10051020-146 = "President, l-let's take it slow and start with this..."
10051020-147 = "And tighten here..."
10051020-148 = "Oh!"
10051020-149 = "What if we put your hair down, President?"
10051020-150 = "Izuna thinks long, straight hair would be lovely."
10051020-151 = "Eh, you want to change my hairstyle too?!"
10051020-152 = "W-We don't really have to..."
10051020-153 = "You should, President!"
10051020-154 = "I-I happen to have a curling iron with me, so let's give it a try!"
10051020-155 = "Why would you pack that?!"
10051020-157 = "S-So...?"
10051020-158 = "Oh! Your aura is impeccable, President!"
10051020-159 = "So pure and ladylike...!"
10051020-160 = "A ninja's potential is truly limitless...!"
10051020-161 = "D-Don't flatter me...!"
10051020-162 = "I-It's a bit embarrassing...!"
10051020-163 = "A-And honestly, I feel like Tsukuyo will look even better... Right?"
10051020-164 = "E-Ehh?!"
10051020-165 = "Do not shy away, Honorable Tsukuyo!"
10051020-166 = "You must try yours on!"
10051020-167 = "W-Waaah...!"
10051020-168 = "I guess..."
10051020-172 = "This might not even be my size."
10051020-173 = "It won't fit. I know it...!"
10051020-174 = "It'll feel snug, but only at first."
10051020-175 = "Eeeh...!"
10051020-176 = "Also, isn't the hem a bit short?"
10051020-177 = "Uh... Is this long enough?"
10051020-178 = "You really think so...? I-It must be because I'm too tall!"
10051020-179 = "I'm so large...and not even pretty..."
10051020-180 = "...and I can't wear decent clothes...! They're not made for me!"
10051020-181 = "Waaah...!"
10051020-182 = "That's not true, Honorable Tsukuyo! You must not surrender!"
10051020-183 = "B-But...!"
10051020-184 = "W-Wait, if you s-squeeze it like that...!"
10051020-188 = "*rip*"
10051020-191 = "Uh..."
10051020-192 = "The dress ripped...!"
10051020-193 = "Th-The buttons burst off too...!"
10051020-194 = "Waah..."
10051020-195 = "I knew it! I don't deserve to wear pretty clothes like this!"
10051020-196 = "I'm just so tall and awkward...!"
10051020-197 = "Stop! We're sorry...! We shouldn't have made you...!"
10051020-198 = "Are you okay, Tsukuyo?"
10051020-199 = "I-I'm okay..."
10051020-200 = "But didn't we borrow this dress from the Yin-Yang Club...?"
10051020-201 = "What if they find out I ripped it? And they extort more from us and make us do their bidding?"
10051020-202 = "What if they take the camera back?!"
10051020-203 = "Because of me, we'll never finish \"Michiruchi, A Girl's Ninja Scroll!\""
10051020-204 = "[s] \"Don't worry. We can have it mended.\""
10051020-205 = "Right, right. We'll get a tailor to fix it, and we'll return it, good as new."
10051020-206 = "You know, they make amazing sewing machines nowadays."
10051020-207 = "So don't take it too seriou..."
10051020-211 = "...Hold on, why is Honorable Sensei here?"
10051020-212 = "[s] \"Oh, I'm in town for work.\""
10051020-213 = "No... I'm not really asking WHY you're here..."
10051020-214 = "...I'm asking how LONG you've been here!"
10051020-215 = "S-Sensei...?!"
10051020-216 = "My lord?!"
10051020-217 = "C-Could it be that you were here while...we were changing earlier...?"
10051020-222 = "N-Ninjutsu! Pervert Extermination Technique! Death to the pervert!"
10051020-223 = "[s] \"W-Wait...!\""
