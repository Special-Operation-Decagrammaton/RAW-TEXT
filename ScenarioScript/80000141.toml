[translation]
80000141-1 = "或許曾經完美的計畫"
80000141-2 = "[ns] 「歡迎你，Kei醬！」"
80000141-3 = "唉……"
80000141-4 = "[s1] 「第一聲招呼就是嘆氣啊……」\n[s2] 「不過這樣的Kei醬，老師也完全OK哦！」"
80000141-9 = "啊，拜託饒了我吧。"
80000141-10 = "……"
80000141-11 = "說要來的確實是我沒錯，可是……"
80000141-12 = "……"
80000141-13 = "算了，無所謂。#n反正我只想趕快把事情辦完早點離開。"
80000141-14 = "來，收下吧。"
80000141-20 = "[ns]「這是……！？」"
80000141-21 = "是在來的路上撿到的。"
80000141-22 = "然後就突然想到了這件事而已。"
80000141-23 = "你在期待什麼？#n充滿心意的手工巧克力？飽含情感的高級巧克力？"
80000141-24 = "怎麼可能！老師配這種程度的市售巧克力剛剛好！"
80000141-26 = "（正想興奮地說這樣也很好時……）"
80000141-27 = "（……再次仔細地觀察了巧克力）"
80000141-29 = "[ns]「嗯……？」"
80000141-30 = "怎，怎麼了？#n只是市售的巧克力而已，心懷感激地吃掉就好了啊！"
80000141-31 = "[ns]「哼嗯……」"
80000141-33 = "[ns3]（包裝微妙地……不像工廠製的……）\n[ns4]（巧克力的大小……看起來稍微有些參差不齊……）\n[ns5]（可可的香氣……格外濃郁……）"
80000141-39 = "（吃下巧克力……！）"
80000141-43 = "咳，咳哼……怎，怎麼樣呢？"
80000141-44 = "[s] 「謝謝你，Kei醬。」"
80000141-45 = "咦？你在說什麼……？"
80000141-46 = "[ns6]「Kei醬的手工巧克力，我吃得很開心。」\n[ns7]「不過還真鹹呢。」"
80000141-49 = "咦……？"
80000141-50 = "……！？！？"
80000141-51 = "蛤──！？！？"
80000141-57 = "（Kei醬就這樣撲倒在沙發上，將頭埋進了靠枕之間）"
80000141-58 = "（真是的，就算像鴕鳥一樣裝作沒看見也沒用啊）"
80000141-68 = "啊──！！！啊──！！！#n啊啊啊啊啊──！！！！！"
80000141-69 = "笨蛋！明明只要嚐一下就知道了！#n啊啊啊啊啊啊──！！！！！"
80000141-70 = "去死！去死啦，這個笨蛋！#n計畫，計畫明明是完美的──！！！！！"
80000141-72 = "[ns]「我可以不陪你一起死嗎？」"
80000141-73 = "你閉嘴啦，這個該死的老師！！！！！"
80000141-80 = "（Kei用力丟出了靠枕！）"
80000141-86 = "（老師輕鬆地接住了！）"
80000141-93 = "還給我。"
80000141-94 = "[s]「才不要咧～這是Kei醬給的～Kei醬的手工巧克力～」"
80000141-95 = "我說了還給我！之後會再補一份像樣一點的給你啦！！！"
80000141-96 = "咦？那樣也不錯，但這個也捨不得丟掉？"
80000141-97 = "因為這才是世上獨一無二的，老師的鹹味巧克力……？"
80000141-101 = "！！！"
80000141-102 = "唔呃啊啊啊啊啊啊啊！！！！！"
80000141-109 = "（一邊想辦法躲開Kei醬的攻勢，一邊吃著巧克力……！）"
80000141-111 = "[ns]「嗯，果然一吃就知道是Kei醬的手工巧克力。」"
80000141-112 = "什，什麼意思……？"
80000141-113 = "[s]「因為真的很鹹。」"
80000141-114 = "這次我一定要殺了老師！！！"
80000141-115 = "[s]「那句台詞要來啦──！！！！！」"
80000141-116 = "然後！！！我也去死──！！！！！"
80000141-129 = "不要跟我說話。"
80000141-130 = "咦？你說這個巧克力，肯定會有派上用場的時候？"
80000141-131 = "……"
80000141-132 = "像是什麼時候……？"
80000141-133 = "跟甜的東西配著吃就能交替感受甜味和鹹味，所以可以無限地吃下去……？"
80000141-134 = "或者在大熱天急需補充電解質和能量的時候，#n同時攝取鹽分和可可成分會更有力氣……！？"
80000141-135 = "……"
80000141-136 = "這算哪門子安慰啊！？你這傢伙！！！"
80000141-137 = "……"
80000141-141 = "不……都怪我太笨了。#n這種事情……"
80000141-142 = "啊啊啊啊……真是的！#n明明只要嚐一口就能知道是鹽還是糖了……！！！"
80000141-143 = "[s]「沒關係的，Kei。」"
80000141-144 = "……？"
80000141-145 = "[s]「真的沒關係。我真的很開心。」"
80000141-150 = "……好吧，你知道就好。"
80000141-151 = "……呵呵。"
80000141-153 = "（之後把珍藏的甜點拿了出來，和Kei一起享用）"
80000141-154 = "（果然甜味和鹹味很搭，真的很好吃）"
80000141-160 = "（雖然總覺得Kei醬看起來似乎在生氣）"
80000141-166 = "（……不過不難看出實際上並非如此）"
