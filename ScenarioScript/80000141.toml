[translation]
80000141-1 = "或許曾經完美的計畫"
80000141-2 = "[ns] 「歡迎你，Kei！」"
80000141-3 = "唉……"
80000141-4 = "[s1] 「第一聲招呼就是嘆氣……」\n[s2] 「不過那樣的Kei老師也完全OK喔！」"
80000141-9 = "啊，拜託饒了我吧。"
80000141-10 = "……"
80000141-11 = "當然，說要來的確實是我沒錯。可是話說回來。"
80000141-12 = "……"
80000141-13 = "算了，無所謂。趕快把事情處理完我就要走了。"
80000141-14 = "拿去。收下。"
80000141-20 = "[ns]「這是……！？」"
80000141-21 = "來的路上撿到的。"
80000141-22 = "來這裡的路上，不知為什麼想到了。"
80000141-23 = "你在期待什麼？充滿心意的手工巧克力？飽含情感的高級巧克力？"
80000141-24 = "怎麼可能！老師配這種程度的市售巧克力剛剛好！"
80000141-26 = "（正想大驚小怪地說那也完全很好）"
80000141-27 = "（……再一次仔細觀察了巧克力）"
80000141-29 = "[ns]「嗯嗯……？」"
80000141-30 = "怎，怎麼了？不就是市售巧克力嘛。感恩地吃就好了！"
80000141-31 = "[ns]「嗯嗯……」"
80000141-33 = "[ns3]（包裝微妙地……不像工廠製的……）\n[ns4]（巧克力的大小……看起來稍微有些參差不齊……）\n[ns5]（可可的香氣……格外濃郁……）"
80000141-39 = "（巧克力……吃下去了！）"
80000141-43 = "咳，咳嗯……怎，怎麼樣？"
80000141-44 = "[s] 「謝謝你，Kei。」"
80000141-45 = "咦？什麼……？"
80000141-46 = "[ns6]「Kei的手工巧克力，我吃了喔。」\n[ns7]「真鹹呢。」"
80000141-49 = "什……？"
80000141-50 = "……！？！？"
80000141-51 = "什！？！？"
80000141-57 = "（Kei就那樣撲倒在沙發上，把頭埋進了靠墊之間）"
80000141-58 = "（真是的，就算像鴕鳥一樣也沒用啊）"
80000141-68 = "啊──！！！啊──！！！啊啊啊啊啊──！！！！！"
80000141-69 = "笨蛋！只要嚐一下就知道了！啊啊啊啊啊啊──！！！！！"
80000141-70 = "去死！去死啊，這個笨蛋！計畫，計畫明明是完美的──！！！！！"
80000141-72 = "[ns]「我可以不陪你一起死嗎？」"
80000141-73 = "你閉嘴啦，這個該死的老師！！！！！"
80000141-80 = "（Kei用力地丟出了靠墊！）"
80000141-86 = "（老師輕鬆地接住了！）"
80000141-93 = "還給我。"
80000141-94 = "[s]「不要～Kei給的Kei的手工巧克力～」"
80000141-95 = "我說還給我！之後會給你像樣的！！！"
80000141-96 = "咦？那也很好，但這個也捨不得丟掉？"
80000141-97 = "……因為這才是世上獨一無二的我的鹹味巧克力……？"
80000141-101 = "！！！"
80000141-102 = "嗚呃啊啊啊啊啊啊啊！！！！！"
80000141-109 = "（想盡辦法躲開Kei逃跑……又多吃了一顆巧克力！）"
80000141-111 = "[ns]「嗯。果然是Kei的手工巧克力。」"
80000141-112 = "什，什麼……？"
80000141-113 = "[s]「好鹹。」"
80000141-114 = "這次我一定要殺了老師！！！"
80000141-115 = "[s]「那句台詞要來啦──！！！！！」"
80000141-116 = "然後！！！我也去死──！！！！！"
80000141-129 = "不要跟我說話。"
80000141-130 = "咦？不過這個巧克力，肯定會有派上用場的時候？"
80000141-131 = "……"
80000141-132 = "什麼時候？"
80000141-133 = "和甜的東西一起吃的話，能交替感受甜味和鹹味所以可以無限吃下去……？"
80000141-134 = "或者是在大熱天急需補充電解質和能量的時候，同時攝取鹽分和可可成分會更有力氣……？"
80000141-135 = "……"
80000141-136 = "你現在是在安慰我嗎，你這個人！！！"
80000141-137 = "……"
80000141-141 = "不……是我太笨了。這件事……"
80000141-142 = "啊啊啊啊……真的！只要嚐一下是鹽還是糖……！！！"
80000141-143 = "[s]「沒關係的，Kei。」"
80000141-144 = "什……？"
80000141-145 = "[s]「真的沒關係。我是真心高興的。」"
80000141-150 = "……知道就好了。"
80000141-151 = "……嘿嘿。"
80000141-153 = "（之後把存起來的甜點拿出來，一起吃了）"
80000141-154 = "（果然甜味和鹹味很搭，真的很好吃）"
80000141-160 = "（Kei看起來不知為何似乎在生氣）"
80000141-166 = "（……其實不是那樣的，這點不難看出來）"
