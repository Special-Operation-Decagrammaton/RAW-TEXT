[translation]
80000141-1 = "แผนการที่อาจจะสมบูรณ์แบบ"
80000141-2 = "[ns] \"ยินดีต้อนรับจ้า เคย์จัง!\""
80000141-3 = "เฮ้อ..."
80000141-4 = "[s1] \"ถอนหายใจเป็นการทักทายกันเลยเหรอ...\"\n[s2] \"ถึงเคย์จะถอนหายใจใส่แต่ครูก็โอเค!\""
80000141-9 = "เฮ้อ ขอร้องละ"
80000141-10 = "......"
80000141-11 = "แน่นอนว่าฉันเป็นคนพูดเองว่าจะมา แต่ถึงอย่างนั้นก็เถอะ"
80000141-12 = "......"
80000141-13 = "ช่างเถอะค่ะ แค่รีบๆ ทำธุระให้เสร็จแล้วกลับก็พอ"
80000141-14 = "นี่ค่ะ รับไปสิคะ"
80000141-20 = "[ns] \"นี่มัน...?!\""
80000141-21 = "ฉันเจอระหว่างทางมาที่นี่ค่ะ"
80000141-22 = "พอดีนึกขึ้นได้ระหว่างทางที่มาค่ะ"
80000141-23 = "คุณครูกำลังตั้งตารองั้นเหรอคะ? ช็อกโกแลตโฮมเมดที่อัดแน่นด้วยความใส่ใจ? ช็อกโกแลตพรีเมียมที่อัดแน่นด้วยความจริงใจ?"
80000141-24 = "จะเป็นอย่างนั้นไปได้ยังไงคะ! สำหรับคุณครูน่ะ แค่ช็อกโกแลตที่ซื้อจากร้านทั่วไปแบบนี้ก็พอแล้วละค่ะ!"
80000141-26 = "(คุณครูกำลังจะเล่นใหญ่ให้เห็นว่าดีใจมาก แต่ก็ต้องหยุดชะงักไป)"
80000141-27 = "(หันกลับไปสังเกตดูช็อกโกแลตดีๆ อีกครั้ง...)"
80000141-29 = "[ns] \"ฮืม...?\""
80000141-30 = "ทะ...ทำไมเหรอคะ? ก็แค่ช็อกโกแลตที่วางขายทั่วไปเองค่ะ แค่กินเข้าไปด้วยความซาบซึ้งก็พอแล้วค่ะ!"
80000141-31 = "[ns] \"ฮืม...\""
80000141-33 = "[ns3] (บรรจุภัณฑ์ดูไม่เหมือน... สินค้าที่ผลิตมาจากโรงงาน...)\n[ns4] (ขนาดของช็อกโกแลต... ก็ดูไม่เท่ากันด้วย...)\n[ns5] (แถมช็อกโกแลต... ก็กลิ่นเข้มข้นผิดปกติ...)"
80000141-39 = "(ลองชิมช็อกโกแลตดู...!)"
80000141-43 = "อะ... อะแฮ่ม... ปะ... เป็นยังไงบ้างคะ?"
80000141-44 = "[s] \"ขอบใจนะ เคย์จัง\""
80000141-45 = "คะ? เรื่องอะไร... เหรอคะ?"
80000141-46 = "[ns6] \"ครูกินช็อกโกแลตโฮมเมดของเคย์จังแล้วนะ\"\n[ns7] \"ครูชิมแล้วนะ มันเค็มมากเลย\""
80000141-49 = "คะ...?"
80000141-50 = "...!?!?!?!?"
80000141-51 = "คะ?????!!!!!"
80000141-57 = "(เคย์ทิ้งตัวลงนอนบนโซฟาแล้วฟุบหน้าลงไปบนหมอน)"
80000141-58 = "(ภาพที่คุณครูเห็นตอนนี้... มันเหมือนท่าทางของนกกระจอกเทศจริงๆ)"
80000141-68 = "โอ๊ย...!!! กรี๊ด...!!! อ๊ายยยยย...!!!!!!"
80000141-69 = "บ้าบอชะมัด! ถ้าลองชิมดูก่อนก็น่าจะรู้แล้วแท้ๆ! อ๊ายยยยยย...!!!!!"
80000141-70 = "ตายซะ! ตายไปซะเจ้าบ้า! ผะ... แผนการของฉันสมบูรณ์แบบแล้วแท้ๆ...!!"
80000141-72 = "[ns] \"ครูขอยังไม่ตายตอนนี้ได้มั้ย?\""
80000141-73 = "เงียบนะ ครูบ้า!!!!!!"
80000141-80 = "(เคย์ขว้างหมอนด้วยแรงทั้งหมดที่มีใส่คุณครู)"
80000141-86 = "(คุณครูรับหมอนไว้ได้อย่างง่ายดาย!)"
80000141-93 = "ส่งมาค่ะ"
80000141-94 = "[s] \"ไม่อาว~ ช็อกโกแลตโฮมเมดของเคย์จังเลยนะ~\""
80000141-95 = "บอกให้ส่งมายังไงล่ะคะ! เดี๋ยวฉันจะเอาอันใหม่มาให้ทีหลัง!!!!"
80000141-96 = "คะ? เอามาให้ใหม่ก็ดี แต่ยังไงก็ทิ้งช็อกโกแลตกล่องนี้ไม่ได้งั้นเหรอคะ?"
80000141-97 = "เพราะว่านี่คือช็อกโกแลตรสเกลือสูตรพิเศษของฉันที่มีแค่ชิ้นเดียวในโลกเหรอคะ...?"
80000141-101 = "!!!"
80000141-102 = "อ๊ายยยยยยย!!!!!"
80000141-109 = "(และในตอนที่พยายามวิ่งหนีเคย์สุดชีวิต... คุณครูก็หยิบช็อกโกแลตมากินอีกหนึ่งชิ้น!)"
80000141-111 = "[ns] \"อืม สมแล้วที่เป็นช็อกโกแลตที่เคย์จังทำ\""
80000141-112 = "คะ... คะ...?"
80000141-113 = "[s] \"เค็มดีจริงๆ\""
80000141-114 = "คราวนี้คุณครูได้ตายสมใจจริงๆ แน่!!!"
80000141-115 = "[s] \"ในที่สุดก็พูดคำนี้ออกมาแล้วววว!!!!\""
80000141-116 = "ฉันเอง...!!! ก็จะตายด้วยเหมือนกันนนน!!!"
80000141-129 = "ไม่ต้องมาชวนคุยเลยนะคะ"
80000141-130 = "คะ? คุณครูคิดว่ายังไงช็อกโกแลตนี้ก็มีประโยชน์อยู่แน่ๆ งั้นเหรอคะ?"
80000141-131 = "......"
80000141-132 = "ยังไงล่ะคะ?"
80000141-133 = "ถ้ากินคู่กับของหวานๆ ก็จะได้ลิ้มรสหวานและเค็มพร้อมๆ กัน ทำให้กินได้เรื่อยๆ ไม่เบื่อ...?"
80000141-134 = "หรือถ้าเป็นวันที่อากาศร้อนอบอ้าว แล้วต้องการเติมเกลือแร่หรือเติมพลังงานอย่างเร่งด่วน การกินเกลือแร่กับสารสกัดจากโกโก้จะช่วยทำให้มีแรงขึ้นเหรอคะ...?"
80000141-135 = "......"
80000141-136 = "คิดจะพูดปลอบใจกันเหรอคะ คนบ้า!!!"
80000141-137 = "......"
80000141-141 = "ไม่หรอกค่ะ... ฉันเองต่างหากที่บ้าบอไปเอง ก็วันนี้น่ะ..."
80000141-142 = "อ๊าาาา... จริงๆ เลย! ถ้าแค่ชิมก่อนว่าเป็นเกลือหรือน้ำตาลละก็...!!!"
80000141-143 = "[s] \"ไม่เป็นไรหรอกนะ เคย์\""
80000141-144 = "คะ...?"
80000141-145 = "[s] \"ไม่เป็นไรจริงๆ แล้วครูก็ดีใจมากเลยด้วย\""
80000141-150 = "แค่นั้นก็พอแล้วค่ะ..."
80000141-151 = "แหะๆ..."
80000141-153 = "(หลังจากนั้นคุณครูก็เอาขนมหวานที่เก็บไว้มานั่งกินด้วยกันกับเคย์)"
80000141-154 = "(รสชาติหวานและเค็มเข้ากันได้ดีและเพิ่มความอร่อยให้ได้อย่างที่คิด)"
80000141-160 = "(แต่เป็นเพราะอะไรบางอย่างเลยทำให้เคย์มีท่าทีดูเหมือนโกรธๆ อยู่)"
80000141-166 = "(แต่คุณครูก็รับรู้ได้ว่าจริงๆ แล้วเคย์ไม่ได้รู้สึกแบบนั้นเลย...)"
