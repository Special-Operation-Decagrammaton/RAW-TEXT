[translation]
80000141-1 = "An Almost Perfect Plan"
80000141-2 = "[ns] \"Welcome, Kei-Kei!\""
80000141-3 = "*sigh*..."
80000141-4 = "[s1] \"I can't believe you're greeting me with a sigh...\"\n[s2] \"But if that's how you want to be, Kei-Kei, that's fine too!\""
80000141-9 = "Ugh, seriously."
80000141-10 = "..."
80000141-11 = "I know I said I'd come, but still..."
80000141-12 = "..."
80000141-13 = "Well, whatever. I'll just finish my business and head out."
80000141-14 = "Here. Take it."
80000141-20 = "[ns] \"This is...?!\""
80000141-21 = "I found them on the way here."
80000141-22 = "For some reason, I thought I should pick up something while I was out."
80000141-23 = "What were you expecting? Homemade candy crafted with effusive sincerity? Premium confectionaries filled with one's fond feelings?"
80000141-24 = "No way! These store-bought chocolates suit you perfectly, Sensei!"
80000141-26 = "I was about to make a fuss and exclaim that store-bought is great too..."
80000141-27 = "...But then I took another look at the chocolate."
80000141-29 = "[ns] \"Hmm...?\""
80000141-30 = "Wh-What's wrong? It's just some waxy store-bought chocolates. Just be grateful and hork them down!"
80000141-31 = "[ns] \"Hmm...\""
80000141-33 = "[ns3] \"(The wrapping...is slightly off from the store brands'...)\"\n[ns4] (The chocolates...are a bit inconsistent in size...)\n[ns5] (The cacao aroma...is unusually rich...)"
80000141-39 = "I ate...the chocolate!"
80000141-43 = "A-Ahem... H-How is it?"
80000141-44 = "[s] \"Thank you, Kei-Kei.\""
80000141-45 = "Hm? For...what?"
80000141-46 = "[ns6]\"For your homemade chocolate.\"\n[ns7] \"They were quite salty.\""
80000141-49 = "What...?"
80000141-50 = "...?!"
80000141-51 = "What?!"
80000141-57 = "Kei flopped on the sofa and buried her head between the cushions."
80000141-58 = "Seriously, Kei was acting like an ostrich."
80000141-68 = "Ah! Ah! Aaaaaah!"
80000141-69 = "I'm so foolish! I would've known if only I tasted them! Aaaaaah!"
80000141-70 = "Die! DIE, YOU FOOL! The plan, the plan was so perfect!"
80000141-72 = "[ns] \"Would it be okay if I didn't die with you?\""
80000141-73 = "Shut up! Damnit, Sensei!"
80000141-80 = "KEI threw a cushion with all her strength!"
80000141-86 = "SENSEI caught it without a hitch!"
80000141-93 = "Hand them over."
80000141-94 = "[s] \"No way! This is MY homemade chocolate, made especially by Kei!\""
80000141-95 = "Give it! I'll make you proper ones later!"
80000141-96 = "What? That's nice, but you can't \"throw this batch away, either\"?"
80000141-97 = "...Because it's the \"one-and-only Kei's special salty chocolate\"?"
80000141-101 = "!!"
80000141-102 = "Auuuuuugh!!"
80000141-109 = "I ran around to dodge Kei...and ate another piece of chocolate!"
80000141-111 = "[ns] \"Mm. As expected, this homemade chocolate from Kei...\""
80000141-112 = "Y-Yes...?"
80000141-113 = "[s] \"...is quite salty.\""
80000141-114 = "I'm going to kill you for sure this time, Sensei!"
80000141-115 = "[s] \"Here comes the classic line!\""
80000141-116 = "THEN I'LL DIE TOO!!"
80000141-129 = "Don't talk to me."
80000141-130 = "What? You're sure this chocolate \"will be useful later\"?"
80000141-131 = "..."
80000141-132 = "For what?"
80000141-133 = "All it needs is \"something sweet to complement it,\" and it would be great to alternate bites?"
80000141-134 = "And consuming salt and cocoa together might help you replenish electrolytes on a hot day?"
80000141-135 = "..."
80000141-136 = "You call that a consolation?!"
80000141-137 = "..."
80000141-141 = "No... I was such a fool."
80000141-142 = "Ughh... Seriously! If only I had taste-tested them! I would have realized I used salt instead of sugar!"
80000141-143 = "[s] \"It's okay, Kei.\""
80000141-144 = "What...?"
80000141-145 = "[s] \"It's okay, honestly. I'm genuinely happy.\""
80000141-150 = "...If you say so."
80000141-151 = "...Heehee."
80000141-153 = "I brought out some sweet treats I'd been saving and shared them with Kei."
80000141-154 = "Just as I expected, they complemented the chocolate. The sweetness and saltiness were deliciously perfect together."
80000141-160 = "Though Kei tried to appear angry and annoyed..."
80000141-166 = "...I could clearly tell that wasn't really the case."
