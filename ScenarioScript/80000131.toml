[translation]
80000131-1 = "เด็กสาวไม่ได้เปิดกล่อง"
80000131-3 = "[log=니야]ถึงคุณครูที่นับถือ[/log]"
80000131-5 = "[log=니야]ช่วงที่ผ่านมาสบายดีรึเปล่าคะ?[/log]"
80000131-7 = "[log=니야]ฉันติดต่อมาเพราะมีเรื่องที่อยากแจ้งให้ทราบค่ะ[/log]"
80000131-9 = "[log=니야]ฉันจะรออยู่ที่ห้องชมรมหยินหยางเช่นเคยนะคะ[/log]"
80000131-13 = "[log=니야]จาก อามาจิ นิยะ หัวหน้าชมรมหยินหยาง[/log]"
80000131-20 = "ฉันส่งข้อความไปยังไม่ทันถึงวันดีเลย"
80000131-21 = "รีบร้อนมาหากันแบบนี้เลยเหรอคะเนี่ย"
80000131-22 = "สมกับเป็นคุณครู~ พึ่งพาได้จริงๆ เลยนะคะ~"
80000131-23 = "จังหวะแบบนี้ควรพูดอย่างนั้นรึเปล่านะ? หรือเพราะคาดหวังว่าฉันจะพูดแบบนั้นเลยรีบร้อนมาขนาดนี้?"
80000131-24 = "......"
80000131-25 = "อะฮ่า! พอดีกว่ามั้ยคะ~?"
80000131-26 = "การลองเชิงแบบนี้มันไม่ใช่เรื่องใหม่สำหรับพวกเราเลยนะคะ"
80000131-27 = "คุณครูคงรู้ดีอยู่แล้วว่าวันนี้วันอะไร และการที่เรียกคุณครูให้ออกมาในวันแบบนี้... มันก็คงจะมีแค่เหตุผลเดียวค่ะ"
80000131-28 = "ถึงจะเป็นแค่ของเล็กๆ น้อยๆ แต่ก็กรุณารับไว้ด้วยนะคะ"
80000131-29 = "[s1] \"เดี๋ยวก่อนสิ นี่มันหรูหรามากเลยนะ?\"\n[s2] \"ไม่น่าเรียกว่าเล็กน้อยได้เลยนะ...\""
80000131-32 = "ก็นะ ทั้งหมดนี่ก็เป็นแค่ข้ออ้างเท่านั้นละค่ะ"
80000131-33 = "ที่ผ่านมาฉันได้รับความช่วยเหลือจากคุณครูมากมาย แต่ไม่มีโอกาสได้ตอบแทนเลย"
80000131-34 = "นี่ไม่ใช่แค่ของขวัญวาเลนไทน์หรอกนะคะ แต่มันยังเป็นสัญลักษณ์ของการแสดงความขอบคุณ สำหรับความกรุณาของคุณครูด้วย หวังว่าจะไม่ปฎิเสธนะคะ"
80000131-35 = "อ่า ถึงจะพูดอย่างนั้น แต่ของข้างในก็เป็นช็อกโกแลตนะคะ"
80000131-36 = "อยากเปิดดูที่นี่เลยมั้ยคะ?"
80000131-37 = "ค่ะ แบบนั้นก็ดีนะคะ เอาละๆ รีบๆ เปิดดูสิคะ"
80000131-42 = "เป็นยังไงบ้างคะ...?"
80000131-43 = "แค่ช็อกโกแลตธรรมดาๆ ใช่มั้ยล่ะคะ"
80000131-44 = "หรือว่าคุณครูแอบผิดหวังเพราะปริมาณมันน้อยไปเหรอคะ?"
80000131-48 = "[ns3] \"ครูจะคิดแบบนั้นกับของขวัญที่นักเรียนให้ได้ยังไงล่ะ\"\n[ns4] \"แค่คิดว่าสมกับเป็นของขวัญจากนิยะดีน่ะ\""
80000131-51 = "ฮะฮ่า! คุณครูนี่ใจดีจริงๆ เลยนะคะ!"
80000131-52 = "ไหนๆ ก็เปิดดูแล้ว ถ้าคุณครูไม่ว่าอะไรจะช่วยลองชิมแล้วประเมินรสชาติดูสักหน่อยได้มั้ยคะ?"
80000131-53 = "ค่ะ ที่นี่เลย"
80000131-54 = "คุณครูคงจะไม่ปฏิเสธคำขอจากลูกศิษย์ที่แสนน่ารักหรอกใช่มั้ยคะ?"
80000131-55 = "[s5] \"เข้าใจแล้ว\"\n[s6] หยิบช็อกโกแลตมากิน"
80000131-61 = "อย่างที่คิดเลย คุณครูกินโดยไม่ลังเลเลยสินะคะ"
80000131-62 = "ถึงจะกะทันหันไปหน่อย แต่ขอบอกไว้ก่อนนะคะว่านั่นเป็นช็อกโกแลตโฮมเมดค่ะ"
80000131-63 = "ช็อกโกแลตโฮมเมดจากลูกศิษย์ที่น่ารักคนหนึ่ง"
80000131-64 = "เป็นยังไงคะ ถูกใจรึเปล่าคะ?"
80000131-68 = "ฮิฮิฮิ~ ดูเหมือนจะไม่เป็นอย่างนั้นสินะคะ"
80000131-69 = "ก็น่าจะเป็นอย่างนั้นนะคะ เพราะฉันใส่สมุนไพรที่มีรสขมแต่ดีต่อสุขภาพลงไปผสมกับ#nดาร์กช็อกโกแลตด้วย คงจะขมน่าดูเลยค่ะ"
80000131-70 = "[s7] \"ทำไมถึงล้อเล่นแบบนี้ล่ะ?\"\n[s8] \"น่าจะบอกกันสักหน่อยนะ\""
80000131-73 = "ค่ะ ก็เป็นแบบนี้เสมอนี่คะ"
80000131-74 = "เพราะคุณครูเป็นคนที่ดีมากๆ ยังไงล่ะคะ"
80000131-78 = "ดูเหมือนจะไม่ค่อยเชื่อที่พูดเลยสินะคะ"
80000131-79 = "งั้นฉันขออธิบายด้วยวิธีอื่นได้รึเปล่าคะ?"
80000131-80 = "คุณครูเลยคิดบ้างมั้ยคะว่าในสายตานักเรียนคุณครูดูเป็นคนแบบไหน?"
80000131-81 = "นอกจากฉันแล้ว คุณครูไม่ได้รับช็อกโกแลตจากนักเรียนคนอื่นๆ เลยเหรอคะ?"
80000131-82 = "ยังไงก็คงจะได้รับอยู่แล้วสินะคะ เพราะว่าคุณครูน่ะเป็นคนที่ดีมากๆ เลยยังไงล่ะ"
80000131-87 = "คนที่ใจดีกว่าใคร เข้าถึงง่าย และช่วยคลี่คลายปัญหาได้ทุกเรื่อง"
80000131-88 = "เหมือนกับกล่องช็อกโกแลตกล่องนี้เลยค่ะ"
80000131-89 = "แต่คุณครูเป็นคนแบบนั้นจริงๆ เหรอคะ? คุณครูตอบรับความคาดหวังของนักเรียนทุกคนได้อย่างเต็มที่#nจริงๆ เหรอคะ?"
80000131-90 = "ฮิฮิ...! เรื่องนั้นคงจะยากสักหน่อย ถึงจะเป็นคุณครู แต่คุณก็เป็นเพียงมนุษย์คนหนึ่งนะคะ"
80000131-91 = "แต่ถึงยังไง พวกนักเรียนก็คงจะลืมเรื่องนี้ไป และคาดหวังสิ่งต่างๆ กันไปเองตามรูปลักษณ์ภายนอก#nที่เห็นค่ะ"
80000131-92 = "แต่สุดท้ายแล้วพอเปิดกล่องและลองชิมช็อกโกแลตชิ้นเล็กๆ ดู"
80000131-93 = "จะมีนักเรียนสักกี่คนกันที่จะยอมลิ้มรสความขมขื่นและยอมเข้าใจในเรื่องนี้คะ?"
80000131-94 = "ฉัน... ไม่ได้บอกว่าเป็นความผิดของคุณครูทั้งหมดหรอกนะคะ"
80000131-95 = "ก็เพราะคุณครูเป็นแค่คนดีมากๆ คนหนึ่งเท่านั้นนี่คะ คุณครูไม่ใช่คนที่มีความคิดร้ายๆ แอบแฝงเอาไว้#nเหมือนฉันยังไงล่ะคะ..."
80000131-96 = "แต่ฉันก็เป็นนักเรียนแบบนี้แหละค่ะ"
80000131-97 = "ฉันไม่ชอบรสขมหรอกนะคะ อะฮะฮ่า~"
80000131-103 = "ยังไงก็ตาม ฉันอยากจะขอคุณครูไว้สักเรื่องหนึ่งค่ะ"
80000131-104 = "ได้โปรดอย่าลืมรสชาติช็อกโกแลตที่ได้ลิ้มรสในวันนี้นะคะ"
80000131-108 = "[ns] \"อื้อ ครูเข้าใจแล้วละ...\""
80000131-110 = "[ns9] \"ชมรมหยินหยางมีห้องครัวด้วยใช่มั้ย?\"\n[ns10] \"ครูขอใช้ห้องครัวหน่อยนะ\""
80000131-113 = "คะ... คะ?! ทำไมจู่ๆ ถึง...?!"
80000131-114 = "[s11] \"ถึงจะทำไปเพราะเจตนาดีแต่ก็อย่าล้อเล่นกับของกินสิ\"\n[s12] \"ครูปล่อยให้เธอล้อเล่นกับของกินแบบนี้ไม่ได้หรอก\""
80000131-120 = "[ns] \"ครูจะให้นิยะลองกินช็อกโกแลตขมๆ ด้วยเหมือนกัน!\""
80000131-121 = "อะ... อะไรกัน...?!"
80000131-123 = "(สุดท้ายคุณครูก็เจอสมุนไพรรสขมที่เหลืออยู่ในห้องครัว หลังจากนั้นก็นำมาทำช็อกโกแลตสมุนไพร#nขึ้นมาใหม่)"
80000131-124 = "(คุณครูดันกะปริมาณผิดพลาด เลยทำช็อกโกแลตออกมาเยอะเกินไป จนต้องเอาแบ่งกินด้วยกันกับนิยะ...)"
80000131-125 = "(และช็อกโกแลตที่ทำออกมาก็มีรสขมสุดๆ เลยด้วย...)"
