[translation]
80000131-1 = "少女不打開盒子"
80000131-3 = "[log=니야]親愛的老師[/log]"
80000131-5 = "[log=니야]不知您近來是否安好？[/log]"
80000131-7 = "[log=니야]此次來信，是因為有要事想向您傳達[/log]"
80000131-9 = "[log=니야]我將一如既往，在陰陽部部室等候您的到來[/log]"
80000131-13 = "[log=니야]陰陽部部長 天地仁耶敬上[/log]"
80000131-20 = "……自從發出那則訊息，連一天都還沒過呢。"
80000131-21 = "沒想到您會像這樣連忙趕來。"
80000131-22 = "老師果然很可靠呢～"
80000131-23 = "……還是說，您期待到需要如此著急的程度呢？"
80000131-24 = "………………"
80000131-25 = "喵哈！還是到此為止吧～？"
80000131-26 = "在我們之間，應該不需要再進行這種試探了才是。"
80000131-27 = "您應該明白今天是什麼日子，而在這種日子將老師找來……原因自然也只有一個。"
80000131-28 = "雖然只是很樸素的東西，還請您笑納。"
80000131-29 = "[s1] 「等等，這不是超高級的嗎？」\n[s2] 「這好像不能算是樸素的程度吧……」"
80000131-32 = "其實呢，這只不過是個藉口而已。"
80000131-33 = "畢竟平時承蒙老師的多方照顧，卻鮮少有機會能夠回報……"
80000131-34 = "因此除了情人節的禮物之外，也包含平日的感謝之意……還請您不必太過客氣。"
80000131-35 = "啊，不過話雖如此，裡面確實是巧克力沒錯哦？"
80000131-36 = "不如……您就乾脆在這裡打開看看吧？"
80000131-37 = "嗯，就這麼決定吧。#n來來來，請快打開看看吧。"
80000131-42 = "……如何？"
80000131-43 = "真的就只是巧克力吧？"
80000131-44 = "……該不會因為內容物太寒酸而失望了吧？"
80000131-48 = "[ns3] 「我怎麼會對學生的禮物產生那種想法呢。」\n[ns4] 「我覺得很像仁耶會開的玩笑呢。」"
80000131-51 = "喵哈！果然很有氣度呢！"
80000131-52 = "那麼難得有這個機會，可以請您在這裡評價一下味道嗎？"
80000131-53 = "是的，就在這裡。"
80000131-54 = "老師您應該不至於……拒絕可愛學生的請求吧？"
80000131-55 = "[s5] 「那當然。」\n[s6] 把巧克力放入口中"
80000131-61 = "……果然毫不猶豫地吃下去了呢。"
80000131-62 = "順帶一提，那個巧克力其實是手工製作的哦。"
80000131-63 = "是您可愛的學生親手做的手工巧克力。"
80000131-64 = "不知道您是否喜歡呢？"
80000131-68 = "……喵哈哈～完全不像是喜歡的樣子呢。"
80000131-69 = "不過這也難怪。#n畢竟是在黑巧克力之中，添加了對身體有益的艾草，想必非常苦吧。"
80000131-70 = "[s7] 「為什麼要開這種玩笑……？」\n[s8] 「希望你能解釋一下。」"
80000131-73 = "好的，當然沒問題。"
80000131-74 = "那是因為老師您，是個非常好的人。"
80000131-78 = "……看來您似乎不太能接受呢。"
80000131-79 = "那我換個說法吧？"
80000131-80 = "老師您是否有想過，自己在學生們眼中是什麼樣子呢？"
80000131-81 = "除了我之外，您應該也收到不少學生們送的巧克力吧？"
80000131-82 = "那也是理所當然的事。畢竟老師是個相當好的人。"
80000131-87 = "對任何人都很親切、容易親近，無論什麼問題都能解決。"
80000131-88 = "就像這個巧克力盒一樣。"
80000131-89 = "不過老師真的是那樣的存在嗎？#n真的能夠完美回應所有學生的心意嗎？"
80000131-90 = "……喵哈！那應該很難吧。#n再怎麼說，老師終究也只是一個人而已。"
80000131-91 = "然而，年幼的學生們往往會忘記這一點。#n擅自憑藉外表產生誤解，進而抱有期待。"
80000131-92 = "最終還是會打開盒子，品嚐那小小的巧克力吧。"
80000131-93 = "不知道有多少學生，會在嚐到苦味後才恍然大悟呢？"
80000131-94 = " ……不過，我也沒有想這把一切都怪罪於老師的意思。"
80000131-95 = "畢竟老師您只是個好人而已嘛。#n和我不同，不是會懷著什麼壞心思的人。"
80000131-96 = "不過，我就是個這樣的學生。"
80000131-97 = "雖然我討厭苦味就是了，喵哈哈～"
80000131-103 = "還有，請您務必答應我一件事。"
80000131-104 = "希望您，能夠將今天品嚐到的巧克力的味道銘記於心。"
80000131-108 = "[ns] 「……嗯，我明白了。」"
80000131-110 = "[ns9] 「陰陽部有廚房對吧？」\n[ns10] 「我想借用一下。」"
80000131-113 = "……咦！？#n請等一下！？您的意思是……！？"
80000131-114 = "[s11] 「無論有什麼意圖……」\n[s12] 「拿食物開玩笑這件事，我可沒辦法放過。」"
80000131-120 = "[ns] 「我也要讓仁耶嚐嚐苦味巧克力！」"
80000131-121 = "……怎，怎麼會！？"
80000131-123 = "（在廚房找來剩下的艾草，並製作了艾草巧克力）"
80000131-124 = "（……結果過程中不小心搞錯份量做了太多，最後只好一起分著吃）"
80000131-125 = "（巧克力真的超級苦的……）"
