[translation]
80000131-1 = "少女不打開盒子"
80000131-3 = "[log=니야]親愛的老師[/log]"
80000131-5 = "[log=니야]近來是否安好？[/log]"
80000131-7 = "[log=니야]來信是因為有要事想向您傳達。[/log]"
80000131-9 = "[log=니야]我一如既往地在陰陽部室等候您的到來。[/log]"
80000131-13 = "[log=니야]陰陽部長 天知仁耶敬上。[/log]"
80000131-20 = "……發了那樣的訊息，連一天都還沒過呢。"
80000131-21 = "就這樣匆匆趕來了。"
80000131-22 = "果然老師～真是值得依靠呢～"
80000131-23 = "……這值得這麼說嗎？還是說，期待到需要這麼急的程度呢？"
80000131-24 = "………………"
80000131-25 = "喵哈！算了吧～？"
80000131-26 = "在我們之間，這種試探的事情也不算什麼新鮮事了。"
80000131-27 = "今天是什麼日子你應該知道的，在這種日子把老師叫出來的話……理由也只有一個了吧。"
80000131-28 = "雖然是很樸素的東西，還請務必收下。"
80000131-29 = "[s1] 「等等，這不是超高級的嗎？」\n[s2] 「這好像不能說是樸素的程度吧……」"
80000131-32 = "嘛，這也算是個藉口嘛。"
80000131-33 = "平時受老師各方面的照顧，卻很少有機會回報。"
80000131-34 = "就當作不只是情人節禮物，還加上了平日的報恩，請不要太客氣。"
80000131-35 = "啊，話雖這麼說，裡面確實是巧克力喔？"
80000131-36 = "要不然乾脆在這裡當場打開看看？"
80000131-37 = "嗯，那樣看起來不錯。來，來，快打開看看吧。"
80000131-42 = "……覺得如何呢？"
80000131-43 = "真的只有巧克力吧？"
80000131-44 = "……該不會因為內容物太寒酸而失望了吧？"
80000131-48 = "[ns3] 「學生的禮物我怎麼會那樣想呢。」\n[ns4] 「我覺得很像仁耶會開的玩笑呢。」"
80000131-51 = "喵哈！果然很豪爽呢！"
80000131-52 = "那麼，難得的機會，可以請您在這裡品評一下味道嗎？"
80000131-53 = "是的，就在這裡。"
80000131-54 = "老師總不會拒絕可愛的學生的請求吧？"
80000131-55 = "[s5] 「我知道了。」\n[s6] 把巧克力放入口中。"
80000131-61 = "……果然，到了這裡又是毫不猶豫地吃了呢。"
80000131-62 = "到現在才告訴你，那個巧克力其實是手工製作的喔。"
80000131-63 = "可愛的學生親手做的手工巧克力。"
80000131-64 = "不知道，您喜歡嗎？"
80000131-68 = "……喵哈哈～看起來完全不像呢。"
80000131-69 = "也是呢。畢竟是在黑巧克力裡加了對身體有益的艾草，一定非常苦吧。"
80000131-70 = "[s7] 「為什麼要開這種玩笑啊？」\n[s8] 「希望你能解釋一下。」"
80000131-73 = "是，當然沒問題。"
80000131-74 = "那是因為老師是非常好的人。"
80000131-78 = "……看起來不怎麼信服呢。"
80000131-79 = "那我換個方式解釋看看吧？"
80000131-80 = "老師有沒有想過自己在學生們眼中是什麼樣的呢？"
80000131-81 = "除了我以外，應該也從很多學生那裡收到巧克力了吧？"
80000131-82 = "那也是沒辦法的事呢。因為老師是非常好的人嘛。"
80000131-87 = "對誰都很親切，很容易親近，什麼問題都能解決的存在。"
80000131-88 = "就像這個巧克力盒一樣呢。"
80000131-89 = "但是老師真的是那樣的存在嗎？能夠完整回應所有學生的心意嗎？"
80000131-90 = "……喵哈！那確實很難呢。不管怎麼說老師也只是一個人而已嘛。"
80000131-91 = "然而，年幼的學生們會忘記這一點。擅自對外表產生錯覺，開始期待。"
80000131-92 = "最終會打開盒子，品嚐那小小的巧克力吧。"
80000131-93 = "不知道會有多少學生嚐到苦味後才恍然大悟呢？"
80000131-94 = " ……倒也不是想說那全部都是老師的錯。"
80000131-95 = "老師只不過是個好人而已嘛。跟我不同，不是那種會懷著什麼壞心眼的人。"
80000131-96 = "但我就是這樣的學生。"
80000131-97 = "我討厭苦味喔，喵哈哈～"
80000131-103 = "不過，請務必答應我一件事。"
80000131-104 = "請不要忘記今天品嚐到的那個巧克力的味道。"
80000131-108 = "[ns] 「……好的，我明白了。」"
80000131-110 = "[ns9] 「陰陽部有廚房對吧？」\n[ns10] 「借用一下。」"
80000131-113 = "……什，什麼！？突然說什麼……！？"
80000131-114 = "[s11] 「不管意圖再怎麼好。」\n[s12] 「拿食物開玩笑這件事我可沒辦法放過。」"
80000131-120 = "[ns] 「也要讓仁耶嚐嚐苦巧克力！」"
80000131-121 = "……怎，怎麼會……！？"
80000131-123 = "（結果，在廚房找到了剩下的艾草，做了艾草巧克力給他）"
80000131-124 = "（……中途不小心搞錯了份量，做太多了，最後只好一起分著吃了）"
80000131-125 = "（巧克力超級苦的……）"
