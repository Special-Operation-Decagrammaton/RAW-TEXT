80000131-19 = "3;니야;01\n#3;a\n#wait;1000"
80000131-20 = "3;니야;01;……그런 연락을 보내고, 아직 하루가 채 지나지 않았는데.\n#3;em;[반응]"
80000131-21 = "3;니야;02;이렇게 바삐 걸음을 옮겨주시다니."
80000131-22 = "3;니야;03;역시나 선생님~ 의지가 되네요~\n#3;em;[재잘]\n#3;hophop"
80000131-23 = "3;니야;01;……그렇게 말할 대목일까요? 그도 아니면, 그렇게 서두를 만큼 기대하고 계신 바라도?"
80000131-24 = "3;니야;07;………….\n#3;em;[…]"
80000131-25 = "3;니야;00;냐하! 관둘까요~?\n#3;hophop"
80000131-26 = "3;니야;07;저희 사이에, 이런 식으로 떠보는 일은 새삼스럽지요."
80000131-27 = "3;니야;02;오늘이 무슨 날인지야 아실 테고, 그런 날에 선생님을 불러내었다는 것은…… 이유야 하나뿐이겠지요."
80000131-28 = "3;니야;99;소박한 것입니다만, 모쪼록 부디.\n#3;em;[음표]\n#3;greeting"
80000131-29 = "[s1] \"잠깐, 엄청 고급스럽지 않아?\"\n[s2] \"소박하다 할 정도가 아닌 거 같은데…….\""
80000131-30 = "#wait;100"
80000131-31 = "#wait;100"
80000131-32 = "3;니야;01;뭐, 이것도 다 구실이라는 거죠."
80000131-33 = "3;니야;07;평소부터 선생님께는 여러 가지로 신세 지고 있습니다만, 좀처럼 답례할 기회가 없어서요."
80000131-34 = "3;니야;01;단순히 발렌타인 선물 이상으로, 평소의 보은까지 더했다는 걸로 하여, 너무 사양하지 말아 주시길."
80000131-35 = "3;니야;02;아, 그렇다고는 해도, 내용물은 제대로 초콜릿이니까요?\n#3;em;[음표]"
80000131-36 = "3;니야;99;뭣하면 차라리 이 자리에서 열어보시렵니까?"
80000131-37 = "3;니야;03;네, 그게 좋아 보이네요. 자, 자. 어서 열어 보시죠."
80000131-38 = "#st;[0,0];instant;1;"
80000131-39 = "#clearST"
80000131-40 = "3;니야;03\n#3;m5\n#wait;1500"
80000131-41 = "#wait;2000"
80000131-42 = "3;니야;02;……어떠실까요?"
80000131-43 = "3;니야;00;정말로 초콜릿뿐이지요?\n#3;em;[재잘]"
80000131-44 = "3;니야;02;……혹여 내용물이 너무 빈약하여 실망하셨는지요?"
80000131-45 = "#st;[0,0];instant;1;"
80000131-46 = "#clearST"
80000131-47 = "3;니야;02\n#3;m3\n#wait;1000"
80000131-48 = "[ns3] \"학생의 선물에 그런 생각을 할 리가 없잖아.\"\n[ns4] \"니야다운 장난이라 생각해.\""
80000131-49 = "#wait;100"
80000131-50 = "#wait;100"
80000131-51 = "3;니야;03;냐핫! 역시나 호방하십니다!\n#3;hophop"
80000131-52 = "3;니야;99;그렇다면, 모처럼이니, 이 자리에서 맛 평가를 부탁드려도 괜찮을지요?"
80000131-53 = "3;니야;01;네, 바로 이 자리에서요.\n#3;greeting"
80000131-54 = "3;니야;02;설마하니 선생님께서, 귀여운 제자의 부탁을 마다하시지는 않을 테지요?\n#3;em;[?]"
80000131-55 = "[s5] \"알았어.\"\n[s6] 초콜릿을 입에 넣는다."
80000131-56 = "#wait;100"
80000131-57 = "#wait;100"
80000131-58 = "#st;[0,0];instant;1;"
80000131-59 = "#clearST"
80000131-60 = "3;니야;02\n#3;em;[…]\n#wait;2500"
80000131-61 = "3;니야;00;……과연, 여기서는 또 망설임 없이 드시는군요."
80000131-62 = "3;니야;01;이제서야 드리는 말이지만, 그 초콜릿은 사실 수제품이랍니다.\n#3;em;[음표]"
80000131-63 = "3;니야;07;귀여운 제자가 손수 만든 수제 초콜릿."
80000131-64 = "3;니야;08;어찌, 마음에 드셨을는지요?"
80000131-65 = "#st;[0,0];instant;1;"
80000131-66 = "#clearST"
80000131-67 = "3;니야;99\n#3;em;[…]\n#wait;2500"
80000131-68 = "3;니야;03;……냐하하~ 전혀 그래 보이지 않네요.\n#3;hophop\n#3;em;[재잘]"
80000131-69 = "3;니야;01;그렇겠지요. 다크 초콜릿에, 몸에 좋은 쑥을 섞어 넣었으니, 대단히 쓴맛이 날 테죠."
80000131-70 = "[s7] \"왜 이런 장난을 치는 거야?\"\n[s8] \"설명해 줬으면 하는데.\""
80000131-71 = "#wait;100"
80000131-72 = "#wait;100"
80000131-73 = "3;니야;07;네, 얼마든지요.\n#3;greeting"
80000131-74 = "3;니야;99;그것은 선생님께서 무척 좋으신 분이기 때문입니다."
80000131-75 = "#st;[0,0];instant;1;"
80000131-76 = "#clearST"
80000131-77 = "#wait;2500"
80000131-78 = "3;니야;07;……별로 납득이 되신 것처럼 보이지 않네요."
80000131-79 = "3;니야;02;그러면 조금 다르게 설명해 볼까요?"
80000131-80 = "3;니야;07;혹시 선생님께서는 스스로 학생들에게 어찌 보일지 생각해 보신 적 있으신지요?"
80000131-81 = "3;니야;01;저 이외에도 여러 학생들로부터 초콜릿을 선물 받지 않으셨나요?"
80000131-82 = "3;니야;00;아무래도 그럴 수밖에요. 선생님께서는 무척 좋으신 분이니까요.\n#3;em;[한숨]"
80000131-83 = "#st;[0,0];instant;1;"
80000131-84 = "#clearST"
80000131-85 = "3;니야;00\n#3;d\n#wait;1000"
80000131-86 = "3;니야;00\n#3;a\n#3;closeup\n#wait;1000"
80000131-87 = "3;니야;02;누구에게나 친절하고, 편하게 다가갈 수 있고, 무엇이든 해결해 주는 존재.\n#3;closeup"
80000131-88 = "3;니야;99;꼭 이 초콜릿 상자 같지요.\n#3;closeup"
80000131-89 = "3;니야;06;하지만 선생님은 정말로 그런 존재이신가요? 모든 학생의 호의를 온전히 답해주실 수 있으신가요?\n#3;closeup"
80000131-90 = "3;니야;03;……냐핫! 그건 어렵겠지요. 아무리 선생님이라 하셔도, 결국은 한 명의 사람이니까요.\n#3;closeup"
80000131-91 = "3;니야;06;그렇지만, 어린 학생들은 잊고 마는 겁니다. 겉모습에 멋대로 착각하고, 기대하게 되죠.\n#3;em;[속상함]\n#3;closeup"
80000131-92 = "3;니야;06;끝내는 상자를 열어, 그 작은 초콜릿을 맛보고 말겠죠.\n#3;closeup"
80000131-93 = "3;니야;99;얼마나 많은 학생들이 쓴맛을 맛보고 깨닫게 될까요?\n#3;closeup"
80000131-94 = "3;니야;02; ……딱히, 그것이 전부 선생님의 잘못이라 말하고자 하는 것은 아닙니다.\n#3;closeup"
80000131-95 = "3;니야;01;선생님께서는 그저 좋으신 분이실 뿐이니까요. 저와는 달리, 나쁜 꿍꿍이 따위를 품으실 분은 아니지요.\n#3;closeup"
80000131-96 = "3;니야;08;하지만 저는 이런 학생이라서요.\n#3;closeup"
80000131-97 = "3;니야;03;저는 쓴맛을 싫어한답니다, 냐하하~\n#3;em;[재잘]\n#3;hophop\n#3;closeup"
80000131-98 = "#st;[0,0];instant;1;"
80000131-99 = "#clearST"
80000131-100 = "3;니야;00\n#3;d\n#3;closeup\n#wait;1000"
