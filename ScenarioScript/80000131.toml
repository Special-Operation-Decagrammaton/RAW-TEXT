[translation]
80000131-1 = "She Didn't Open the Box"
80000131-3 = "[log=니야]Dear Sensei[/log]"
80000131-5 = "[log=니야]I hope this message finds you well.[/log]"
80000131-7 = "[log=니야]I have very important matters to discuss with you.[/log]"
80000131-9 = "[log=니야]As always, I'll be waiting in the club room.[/log]"
80000131-13 = "[log=니야]Yin-Yang Club President, Amachi Niya.[/log]"
80000131-20 = "...It hasn't even been a day since I sent that message."
80000131-21 = "You rushed over so quickly!"
80000131-22 = "Reliable as always, Sensei!"
80000131-23 = "...Is that the right word for you? Or did you eagerly rush here because you're anticipating something special?"
80000131-24 = "..."
80000131-25 = "Nyaha! Maybe that's enough teasing for now."
80000131-26 = "There's no reason for us to be sounding each other out, is there?"
80000131-27 = "I assume you know what day today is, and calling you here on a day like this...can only mean one thing."
80000131-28 = "Please accept my humble gift."
80000131-29 = "[s1] \"Hold on, isn't this super fancy?\"\n[s2] \"I wouldn't call it a 'humble gift'...\""
80000131-32 = "Well, even the gift is an excuse."
80000131-33 = "I have been indebted to you in many ways, but I haven't had much of an opportunity to repay you."
80000131-34 = "Please don't be so modest. Think of this as a token of gratitude as well as a humble Valentine's present."
80000131-35 = "Ah, but rest assured, the box does indeed contain chocolate."
80000131-36 = "...Or would you rather open it right now?"
80000131-37 = "Yeah, that actually sounds like a good idea. Now, now. Please open it. Right in front of me."
80000131-42 = "...What do you think?"
80000131-43 = "It's actually chocolate, right?"
80000131-44 = "...Could it be that you're disappointed?"
80000131-48 = "[ns3] \"I could never be disappointed by a student's gift.\"\n[ns4] \"That said, I thought this would be a prank.\""
80000131-51 = "Nyaha! What a magnanimous soul!"
80000131-52 = "Well then, since it's a special occasion, how about you tell me how you like the taste?"
80000131-53 = "Yes, right here and right now."
80000131-54 = "Now, now. You wouldn't turn down your adorable student's humble request, would you?"
80000131-55 = "[s5] \"Okay.\"\n[s6] Put the chocolate in your mouth."
80000131-61 = "...As I thought. Not even a moment's hesitation."
80000131-62 = "This chocolate is actually homemade, I'll have you know."
80000131-63 = "Homemade chocolate from your adorable student."
80000131-64 = "What do you say, is it to your taste?"
80000131-68 = "...Nyahaha. You don't seem to like it at all."
80000131-69 = "Of course you don't. It must be very bitter...on account of it being dark chocolate mixed with mugwort. Smile. It's good for you!"
80000131-70 = "[s7] \"Why would you do this?\"\n[s8] \"Explain yourself.\""
80000131-73 = "Yes, of course."
80000131-74 = "It is because you are such a nice person, Sensei."
80000131-78 = "That's not enough...You don't seem convinced."
80000131-79 = "Shall I elaborate?"
80000131-80 = "Sensei, have you ever thought of how you might appear to others?"
80000131-81 = "Have you received chocolate gifts from other students? Ones who aren't me?"
80000131-82 = "That's only to be expected. You're such a nice person, after all."
80000131-87 = "Someone who's nice to everyone, easy to approach, and solves every problem..."
80000131-88 = "Just like this box of chocolate."
80000131-89 = "But is that who you really are? Are you capable of reciprocating every student's act of kindness?"
80000131-90 = "...Nyaha! I suppose that must be difficult. Even if you're Schale's Sensei, you're still only one person."
80000131-91 = "The younger students forget that. They judge based on outside appearances and start...expecting things."
80000131-92 = "Eventually, they'll open the box and taste the small, lone chocolate."
80000131-93 = "How many students will taste that bitterness and come to a realization?"
80000131-94 = " ...I'm not trying to say that it's all your fault, Sensei."
80000131-95 = "You're just a good person, after all. Unlike me, you don't make a habit of plotting...and looking for an advantage."
80000131-96 = "But that is just the type of student I am."
80000131-97 = "And I hate bitter flavors, nyahaha!"
80000131-103 = "But even so, I'd like to tell you one thing."
80000131-104 = "Please do not forget how that chocolate tasted."
80000131-108 = "[ns] \"...Okay, I understand.\""
80000131-110 = "[ns9] \"Do you have a kitchen in the Yin-Yang Club?\"\n[ns10] \"I'm going to borrow it for a bit.\""
80000131-113 = "...Wh-What?! Why? Why do you need it?"
80000131-114 = "[s11] \"Regardless of your intentions...\"\n[s12] \"I can't tolerate you playing with food.\""
80000131-120 = "[ns] \"I'm going to make YOU eat some bitter chocolate!\""
80000131-121 = "...Wh-What the...?!"
80000131-123 = "I found leftover mugwort in the kitchen and made some \"special\" chocolate for Niya."
80000131-124 = "...I messed up with measurements and ended up making too much. In the end, we shared them."
80000131-125 = "The chocolates were extremely bitter..."
