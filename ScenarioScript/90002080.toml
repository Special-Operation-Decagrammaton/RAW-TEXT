90002080-21 = "3;리오 동복;01\n#3;a\n#wait;1000"
90002080-22 = "3;리오 동복;02;어떤 의미로는 알기 쉬운 이명이네."
90002080-23 = "3;케이 프로토;07;네……. 조금 그런 부분이 있죠. 그리고 정말 어디로 가 버렸는지 특히 찾기 어려운 <예소드YESOD>. 이명은 <기초 위에 올라선 힘의 정화자>.\n#3;em;..."
90002080-24 = "3;케이 프로토;00;패스Path는 <완성을 향해 나아가는 진리> 라고 하는군요."
