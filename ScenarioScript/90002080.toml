[translation]
90002080-1 = "第8話;Level Up"
90002080-3 = "這片鋼鐵大陸是將第7名預言者涅察赫極端地「進化」後，擴張其存在而形成的。"
90002080-4 = "在過程之中，涅察赫原本的模樣已經破碎得幾乎不留痕跡……"
90002080-5 = "並且，如今的鋼鐵大陸集結了所有十字神名的預言者，#n而各個預言者則分別鎮守著被分配的區域。"
90002080-6 = "雖然嚴格說起來是它們的複製體……不過跟原型並沒有什麼差異。"
90002080-7 = "原來如此，是複製體啊。"
90002080-8 = "沒錯。反正只要按照他們的計畫發展下去，#n等奇普托斯完全被鋼鐵大陸覆蓋之後，隨時都能在系統層面進行整合。"
90002080-9 = "不過……在這裡有個問題。"
90002080-10 = "是什麼問題呢，Kei？"
90002080-11 = "那些預言者在什麼地方……現在很難進行追蹤。"
90002080-12 = "果然是安全等級與隱蔽性的問題嗎？"
90002080-13 = "沒錯，陽葵。#n如果用稍微直接一點的表達方式的話……"
90002080-14 = "大家都很會躲呢。"
90002080-15 = "不過相對地，我也掌握了那三名新預言者的一些附帶資訊。"
90002080-16 = "其餘七名已經記錄在我們取得的「生命之樹」系統樹上，可以直接拿來參考。"
90002080-17 = "首先是鋼鐵大陸的本體「[ruby=NETZACH]涅察赫[/ruby]」。#n其別名為「證明勝利的無限大地」，Path則是「終於抵達的勝利」。"
90002080-22 = "某方面來說，是個容易理解的別名呢。"
90002080-23 = "沒錯……確實如此。#n接著是特別難以追蹤行蹤的「[ruby=YESOD]耶索德[/ruby]」。#n別名是「立於基礎之上的力量淨化者」。"
90002080-24 = "Path則是「邁向完成的真理」。"
90002080-29 = "其實我一直想問，那些別名或Path有什麼意義啊？#n有了那些之後，效率就會有所提升嗎？"
90002080-30 = "老實說我也不太清楚，不過鋼鐵大陸似乎是以它為基礎調整能量的流動……"
90002080-31 = "並藉此……試圖抵達某種新的可能性。"
90002080-32 = "哦哦，那新的可能性是什麼？"
90002080-33 = "……我也不知道。"
90002080-34 = "哎，什麼嘛！#n看你說得好像很懂的樣子，結果根本什麼都不知道嘛！"
90002080-35 = "你說什麼！？"
90002080-36 = "姐姐！怎麼能說那種話呢！#nK，Kei醬你別生氣。我代替他向你道歉……"
90002080-37 = "咕……不用了，綠。#n我好像也有點太激動了。"
90002080-38 = "嘿～你也知道哦？"
90002080-39 = "桃～井～！！！！！"
90002080-43 = "啊哈哈哈！Kei生氣了！"
90002080-44 = "唉……"
90002080-45 = "算了……最後是「[ruby=MALKUTH]馬爾庫特[/ruby]」。#n別名「到達世界盡頭的王國巡禮者」。"
90002080-46 = "然後Path好像是……「在旗幟之下被創造出來的一股意志」。"
90002080-54 = "聽起來有點靈感了耶？#n下次做遊戲的時候就拿來參考一下吧？"
90002080-55 = "……也是，搞不好還挺適合的。"
90002080-56 = "咦？你不生氣了嗎？"
90002080-57 = "與其看他們玩弄無聊的文字遊戲，拿那些設定來自娛自樂……"
90002080-58 = "不如拿去當成桃井的劇本素材，說不定還更能增進世界的公共利益。"
90002080-59 = "K，Kei醬……也不用說到那種程度……"
90002080-60 = "……對不起，柚子。#n我說得有點過分了。"
90002080-61 = "嗯？怎麼了？"
90002080-62 = "不過能聽到Kei道歉，好像反而有種賺到了的感覺？"
90002080-63 = "算了……桃井本來就是這樣的吧……"
90002080-64 = "那，那真是……太好了……？"
90002080-65 = "總之，最大的問題還是馬爾庫特。"
90002080-66 = "馬爾庫特的力量……正如不久前親眼所見，是現在的我們難以應付的等級。"
90002080-67 = "假如他有那個意思，就算要當場將我們全滅也不是不可能……#n然而馬爾庫特卻沒有那麼做。"
90002080-68 = "反而像是在被什麼追趕似地迅速撤退了。"
90002080-69 = "[s]「這代表什麼呢？」"
90002080-70 = "這個嘛……首先能想到的可能性，就是馬爾庫特的可運作時間極其短暫。"
90002080-75 = "是只為速戰速決而設計的一次性機體……？還是一種技術驗證機呢？"
90002080-76 = "那作為實戰用途也太糟糕了吧。#n規格化和標準化可是很重要的啊。"
90002080-77 = "戰鬥就是取決於物量。"
90002080-83 = "……又或者，他並非單純為了戰鬥而製造出來的預言者。"
90002080-84 = "哦……意思是馬爾庫特被賦予了其他用途嗎？"
90002080-86 = "如果時間充裕，要在這裡繼續推導下去也沒問題，可惜現在似乎並沒有那種餘裕。"
90002080-87 = "總之，如今的鋼鐵大陸被分割為各預言者掌管的區域……這點是可以確定的。"
90002080-88 = "而我們可以再次「佔領」那些區域，使其成為我們的[ruby=Territory]領域[/ruby]。"
90002080-89 = "這麼說來，十字神名的兵力和勞工機器人，似乎已經不再進攻了呢？"
90002080-90 = "我剛才錯過了說明的時機，其實區域佔領已經在不久前完成了。"
90002080-91 = "如果要說得更具體一點，就是在馬爾庫特襲擊我們的那個時間點。"
90002080-92 = "而十字神名的兵力和勞工機器人的支援，也同時在那一刻停止了。"
90002080-93 = "原來如此。#n只要能在電子層面成功佔領，就可以阻斷敵方的支援。"
90002080-98 = "並且在成功佔領區域之後，才能正式與該區域的預言者交戰。"
90002080-99 = "最後只要能擊敗預言者……就能將其「情報核心」的資料，吸收進我的這副身體裡。"
90002080-100 = "……畢竟這副身體，本來就是源自於鋼鐵大陸啊。"
90002080-101 = "吸收預言者的情報核心能做什麼呢？"
90002080-102 = "吸收的情報核心越多，這片鋼鐵大陸就會將我……"
90002080-103 = "視為一種預言者的集合體，或者比這更高階的存在……#n也可以理解成得到更高階的安全等級吧。"
90002080-104 = "當我取得所有情報核心之後，就能直接向鋼鐵大陸下達指令。"
90002080-105 = "例如「停止擴張與運作」之類的。"
90002080-106 = "[s]「哦？所以這場鋼鐵大陸事件……！」"
90002080-107 = "沒錯。就有可能從根本上將其解決。"
90002080-111 = "……"
90002080-112 = "愛麗絲知道了！#n只要在鋼鐵大陸佔領區域並擊敗預言者，Kei就會不斷升級！"
90002080-113 = "而滿級後的Kei就能獲得資格，直接停止鋼鐵大陸對吧！"
90002080-114 = "這個比喻相當不錯，愛麗絲。#n但是……"
90002080-115 = "但是……？"
90002080-116 = "我們目前能馬上交戰的預言者只有8名，而不是10名。 "
90002080-117 = "也就是說……我最多只能升到80級，而不是100級。"
90002080-119 = "咦？這麼說來……好像也是耶？"
90002080-120 = "畢竟現在還沒有能對付涅察赫和馬爾庫特的手段……"
90002080-122 = "不過即便如此，這依舊能稱得上是我們唯一的辦法。"
90002080-123 = "至少能對鋼鐵大陸的運作與擴張方式……造成一定程度的混亂才對。"
90002080-124 = "[s]「這麼一來，目標似乎已經很明確了呢。」"
90002080-129 = "是的，老師。#n我們接下來要開始佔領各區域、擊敗預言者──"
90002080-130 = "並回收核心的情報，將其儲存到Kei身上。"
90002080-131 = "如果一切順利的話，Kei就能直接擾亂鋼鐵大陸的運作結構。"
90002080-132 = "這樣就決定了呢，老師。"
90002080-133 = "既然如此，我想也需要進行物理層面的準備。"
90002080-134 = "[s]「物理層面的準備？」"
90002080-135 = "是的。首先我的Abi-Eshuh……似乎很難再次裝備了。"
90002080-136 = "在與馬爾庫特的防衛戰中，外部零件已經幾乎全毀。 "
90002080-137 = "部份基礎框架的損傷也相當嚴重。#n如果只將可用的零件加以剝離，或許還能進行二次利用。"
90002080-138 = "不過綜合所有條件來看──將Abi-Eshuh轉交給可愛的愛麗絲，應該是最好的方法。"
90002080-140 = "咦咦！？要把Abi-Eshuh交給愛麗絲！？#n可是……！"
90002080-141 = "不，愛麗絲。#n現在必須做能力所及之事，並善用一切可用的資源。"
90002080-142 = "不過問題在於必須抽出框架、重新整備，並改造為適合愛麗絲的型態……"
90002080-143 = "而我們並沒有充足的時間。"
90002080-144 = "同時除了愛麗絲之外，其他人也需要進行重新武裝。"
90002080-145 = "可是現在光是維持區域就已經很吃力了……"
90002080-149 = "……"
90002080-150 = "所以具體需要什麼？"
90002080-152 = "咦？就是……"
90002080-153 = "首先……要完成運輸船的修復吧？#n然後再按照季所說的進行重新整備和改造，並加裝額外的必要零件。"
90002080-154 = "人手嚴重不足、AMAS幾乎全毀，還需要各種自動化的輔助設備──"
90002080-160 = "[ns]「嗚哇……」"
90002080-162 = "幾，幾乎等同於要重建一座工廠了……"
90002080-167 = "沒錯，如果不考慮現實面的話就是如此。#n然而我們不可能那麼做，因此必須再尋找其他對策……"
90002080-169 = "只要準備齊全就能做到對吧？"
90002080-171 = "！？"
90002080-172 = "！？"
90002080-174 = "K，Kei？#n愛麗絲雖然不太懂，不過按照莉央前輩的說法，好像不太可能的樣子……？"
90002080-175 = "不，那是有可能的。#n當然只靠我一個人無法辦到。"
90002080-176 = "但是只要愛麗絲和我一起，就完全不成問題。"
90002080-177 = "愛麗絲嗎……？"
90002080-178 = "是的。雖然之前已經提過很多次，#n不過「物質的再構築」是無名之神的力量最具代表性的特質。"
90002080-179 = "而整個鋼鐵大陸，本來就是基於那股力量再構築而成的。"
90002080-180 = "這確實是我們在出發前往鋼鐵大陸之前，就已經理解並接受的事實……該不會！？"
90002080-181 = "沒錯。就是那個「該不會」。"
90002080-182 = "Kei有辦法辦到嗎！？"
90002080-183 = "只要是跟愛麗絲一起的話。"
90002080-184 = "可是愛麗絲……完全不知道該怎麼做……"
90002080-185 = "沒事的，愛麗絲。#n就跟那個時候一樣。"
90002080-190 = "在這裡，無名之神的力量比任何地方都更加充沛。#n這是我在與馬爾庫特的防禦戰中深刻體會到的。"
90002080-191 = "雖然在許多部份都受到扭曲……不過也不是無法運用。"
90002080-192 = "再加上現在有了這副身體，可以比那時更加精密地進行整流。"
90002080-193 = "所以就在這裡讓你看看吧，愛麗絲。 "
90002080-194 = "我們能做到什麼──我們曾是什麼樣的存在。"
90002080-200 = "我們本來──應該是什麼模樣。"
90002080-201 = "愛麗絲……該做什麼呢？"
90002080-216 = "很簡單。請看著我的眼睛。就跟那個時候一樣。#n沒錯，就是這樣。"
90002080-217 = "接著請伸出手。這將成為從我通往你的道路。"
90002080-218 = "然後請開始想像吧。"
90002080-233 = "想像……？"
90002080-234 = "沒錯，想像大家需要的東西。#n剛才莉央說的，以Abi-Eshuh的框架為基礎的模樣。"
90002080-235 = "……也就是你在此時此刻渴望成為的樣子。"
90002080-236 = "只要描繪大致的形態就可以了。#n細節部分就由我來補齊，專注於你想怎麼做吧。"
90002080-240 = "不需要害怕，愛麗絲。"
90002080-241 = "就和極光降臨的那個夜晚一樣。"
90002080-255 = "讓你的一切，充滿那尚未抵達的可能性。"
90002080-260 = "愛麗絲醬……Kei醬……"
90002080-262 = "哇……總覺得現在，就跟遊戲裡的演出一樣……"
90002080-263 = "嗯……這次姐姐的比喻還挺貼切的……"
90002080-264 = "愛麗絲……？"
90002080-269 = "……"
90002080-270 = "咦，咦？愛麗絲好像……獲得了超強的裝甲！？#n這到底是……！？"
90002080-272 = "沒錯。這是「我們」所能抵達的一種可能性。"
90002080-273 = "這就是屬於愛麗絲的Abi-Eshuh啊。"
90002080-274 = "親眼見到「特異現象」的感想如何呢，部長？"
90002080-275 = "在抵達鋼鐵大陸之後的種種事物，其實都可以稱得上是特異現象。#n即便如此，這也是其中最令我印象深刻──"
90002080-277 = "也是最令人感動的特異現象呢。"
90002080-279 = "下一話;Dress Up"
