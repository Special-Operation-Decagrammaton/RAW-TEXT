90002080-43 = "3;케이 프로토;16\n5;미도리 동복;15\n#na;모모이 동복;아하하하! 케이가 화났어!"
90002080-44 = "5;미도리 동복;17;하아…….\n#5;em;[한숨]"
90002080-45 = "3;케이 프로토;08;뭐……. 좋습니다. 마지막으로 <말쿠트MALKUTH>가 있겠네요. 이명은 <세상의 끝에 도달한 왕국의 순례자>."
90002080-46 = "5;미도리 동복;17\n3;케이 프로토;07;그리고 패스Path는…… <깃발 아래 창조된 하나의 의지> 라는 모양입니다.\n#5;dr"
