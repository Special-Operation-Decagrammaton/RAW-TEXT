90002080-54 = "3;모모이 동복;03;듣다 보니까 뭔가 느낌이 오는데? 다음 게임 만들 때 참고해 볼까?\n#3;jump"
90002080-55 = "3;모모이 동복;03\n4;케이 프로토;08;……네. 차라리 그편이 어울릴지도 모르겠네요.\n#3;m2\n#4;a"
90002080-56 = "3;모모이 동복;14;어라? 화내지 않는 거야?\n#3;em;[?]"
90002080-57 = "4;케이 프로토;05;아무래도 좋은 말장난을 늘어놓고, 자기들끼리 설정 놀이나 하는 걸 보고 있으려니."
90002080-58 = "4;케이 프로토;07;차라리 모모이의 시나리오 재료로 써 버리는 게, 세계의 공익을 증진시킬 것 같아서 하는 말입니다.\n#4;em;[한숨]"
90002080-59 = "5;유즈 동복;10;케, 케이 쨩……. 그렇게까지 이야기할 필요는…….\n#3;m1\n#4;m3\n#5;al\n#5;em;[땀]"
90002080-60 = "4;케이 프로토;06;……미안해요, 유즈. 저도 말이 조금 심했네요."
90002080-61 = "3;모모이 동복;14;응? 왜 그래?\n#3;em;[?]"
90002080-62 = "3;모모이 동복;12;아닌가? 케이한테 사과를 받은 셈이니, 오히려 좋은 건가?\n#3;jump"
90002080-63 = "4;케이 프로토;04;……그래요……. 우리들의 모모이는, 원래 이랬었죠……."
90002080-64 = "5;유즈 동복;07;다, 다행인…… 걸까……?\n#5;em;[땀]"
90002080-65 = "4;케이 프로토;08;어쨌든, 가장 문제가 되는 것은 말쿠트일 겁니다."
90002080-66 = "3;모모이 동복;12\n5;유즈 동복;07\n4;케이 프로토;00;말쿠트의 힘은…… 우리가 모두 직접 목격한 대로, 지금으로서는 감당하기 어려운 수준이었죠.\n#3;dl\n#5;dr"
90002080-67 = "4;케이 프로토;02;여차하면 그 자리에서 우리를 모두 쓰러트릴 수도 있었을 거예요. 그렇지만 말쿠트는 그렇게 하지 않았죠."
90002080-68 = "4;케이 프로토;00;마치 무언가에 쫓기는 것처럼, 빠르게 물러났습니다."
90002080-69 = "[s] \"그건 어떤 의미일까?\""
90002080-70 = "4;케이 프로토;05;글쎄요. 우선 생각할 수 있는 가능성은, 말쿠트의 가동 시간이 극단적으로 짧을지도 모른다는 것이겠죠."
