90002080-98 = "3;케이 프로토;00;그리고 구역을 점령하는 데에 성공하게 되면, 그 구역의 예언자들과 비로소 싸울 수 있게 될 겁니다."
90002080-99 = "3;케이 프로토;05;마지막으로 예언자들을 쓰러트리게 되면…… 그 '정보 코어'의 정보를, 지금 저의 이 몸에 받아들일 수 있을 거예요."
90002080-100 = "3;케이 프로토;00;……기본적으로 이 몸은, 강철대륙으로부터 만들어졌던 것이니까요."
90002080-101 = "3;리오 동복;02;예언자의 정보 코어의 정보를 흡수해서, 뭘 할 수 있다는 거야?\n#3;em;[?]"
90002080-102 = "3;케이 프로토;14;더 많은 정보 코어를 흡수하면 할수록, 강철대륙은 저를…… 일종의…… \n#3;em;…"
90002080-103 = "3;케이 프로토;00;예언자들의 집합체나, 그 상위 존재 같은 것으로 받아들이게 될 거예요. 일종의 상위 보안 레벨 문제죠."
90002080-104 = "3;케이 프로토;05;그렇게 제가 모든 정보 코어를 제 것으로 만들게 되면, 그때는 제가 직접 강철대륙에게 어떤 명령을 내릴 수 있게 될 거고요."
