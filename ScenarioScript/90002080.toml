[translation]
90002080-1 = "#title;8화;Level Up"
90002080-2 = "3;케이 프로토;02\n#3;a\n#wait;1000"
90002080-3 = "3;케이 프로토;01;이 강철대륙은 일곱 번째 예언자 네차흐를 극단적으로 '진화'시켜 존재를 확장시킨 것입니다."
90002080-4 = "3;케이 프로토;05;그 과정에서 네차흐의 본래 모습은 흔적도 찾아볼 수 없을 만큼 산산이 흩어져 버렸지만…….\n#3;em;…"
90002080-5 = "3;케이 프로토;00;어쨌든, 지금의 강철대륙에는 모든 데카그라마톤의 예언자가 모여 있고, 각각의 예언자는 자신에게 할당된 구역을 지키고 있죠."
90002080-6 = "3;케이 프로토;08;엄밀하게 말하자면 그 복제체들이긴 한데…… 원본과는 차이가 없어요.\n#3;em;[한숨]"
90002080-7 = "5;히마리 방한복;02\n3;케이 프로토;08\n#na;히마리 방한복;복제체였군요. 과연.\n#3;m2\n#5;h\n#5;al"
90002080-8 = "3;케이 프로토;05;네. 어차피 그 셋의 계획대로 키보토스가 강철대륙으로 뒤덮이게 되면, 언제든지 시스템적으로 통합시킬 수도 있을 거고요."
90002080-9 = "3;케이 프로토;14;그런데…… 여기에서 조금 문제가 있어요."
90002080-10 = "5;히마리 방한복;02\n3;케이 프로토;14\n1;아리스 동복;01;그게 무엇인가요, 케이?\n#1;ar\n#3;m3"
90002080-11 = "3;케이 프로토;00;각각의 예언자가 어디에 있는지…… 지금은 좀처럼 추적하기가 어려운 상황입니다."
90002080-12 = "5;히마리 방한복;02;그건 역시 보안 레벨과 은폐의 문제인가요?\n#5;em;[?]"
90002080-13 = "3;케이 프로토;02;그렇습니다, 히마리. 조금 직설적인 표현을 사용하자면……."
90002080-14 = "3;케이 프로토;07;다들 정말이지, 잘도 꼭꼭 숨어 있다는 느낌이네요."
90002080-15 = "1;아리스 동복;01\n5;히마리 방한복;02\n3;케이 프로토;00;그 대신이라고 할까요. 새롭게 등장한 예언자 셋의, 부수적인 정보에 대해서는 알아낸 부분이 있습니다.\n#1;dl\n#5;dr\n#3;em;[반응]"
90002080-16 = "3;케이 프로토;05;나머지 일곱은 이미 우리가 확보한 <생명의 나무>의 계통수에 기록되어 있으니, 그걸 참고하면 될 것 같아요."
90002080-17 = "3;케이 프로토;00;우선 강철대륙 그 자체인 <네차흐NETZACH>. 그 이명은 <승리를 증거하는 무한의 대지> 이고, 패스Path는 <마침내 도달한 승리> 입니다."
