90002080-85 = "#all;hide"
90002080-86 = "3;케이 프로토;14;시간만 충분하다면, 여기에서 무한히 토론하며 더 많은 예측을 해 볼 수 있었겠지만, 지금은 그럴 여유가 없을 것 같아요."
90002080-87 = "3;케이 프로토;00;어쨌든 지금의 강철대륙은, 각 예언자가 담당하는 여러 구역으로 분할되어 있다는 것은 확실합니다.\n#3;em;[반응]"
90002080-88 = "3;케이 프로토;05;그리고 우리는 그 구역을…… 다시 한번 '확보'해서, 우리의 [ruby=territory]영역[/ruby]으로 만들 수 있을 거예요."
90002080-89 = "3;히마리 방한복;02;그러고 보니, 데카그라마톤의 병력과 레이버들이 더 이상 침공해 오지 않네요?"
90002080-90 = "3;히마리 방한복;02\n2;리오 동복;00;말할 시기를 조금 놓치기는 했는데, 지역 점령은 조금 전에 완료되었어.\n#2;a\n#3;m4"
90002080-91 = "3;히마리 방한복;02\n2;리오 동복;01;구체적으로는, 말쿠트가 우리를 습격해 왔을 바로 그때에."
90002080-92 = "3;히마리 방한복;02\n2;리오 동복;02;그리고 데카그라마톤의 병력과 레이버의 지원은, 정확히 그와 동시에 멈추었지."
90002080-93 = "3;히마리 방한복;09;그렇군요. 지역을 전자적으로 점령하는 데에 성공하면, 적의 지원도 멈추게 할 수 있다는 거네요.\n#3;em;[음표]"
