90002080-29 = "3;에이미 수영복ND;02;예전부터 느꼈던 것이지만, 그 이명이니 패스이니 하는 건 무슨 의미야? 그런 게 있으면 뭔가 효율성이 올라가기라도 해?\n#3;em;[?]"
90002080-30 = "3;케이 프로토;02;사실 저도 잘 모르겠지만, 이 강철대륙에서는 그걸 바탕으로 에너지의 흐름을 조정해서……."
90002080-31 = "3;케이 프로토;00;무언가, 새로운 가능성에 도달하려고 하는 것 같더군요."
90002080-32 = "3;케이 프로토;00\n1;모모이 동복;18;호오, 그 새로운 것이란 게 뭔데?\n#1;ar\n#3;m4"
90002080-33 = "3;케이 프로토;14;……저도 몰라요."
90002080-34 = "1;모모이 동복;10;에이, 뭐야! 뭔가 잘 아는 것처럼 이야기하더니만, 아무것도 아니었잖아!\n#1;em;[한숨]"
90002080-35 = "3;케이 프로토;14;뭐라고요?!?!\n#3;m3"
90002080-36 = "5;미도리 동복;15;언니! 그런 말을 하면 어떡해! 케, 케이 쨩도 너무 화내지 말아 줘. 내가 대신 사과할게…….\n#5;al\n#5;hophop"
90002080-37 = "3;케이 프로토;09;큭……. 아닙니다, 미도리. 제가 너무 흥분한 것 같아요.\n#3;stiff"
90002080-38 = "1;모모이 동복;11;헤헹. 역시 그렇지?\n#1;jump\n#1;em;[한숨]"
90002080-39 = "3;케이 프로토;16;모–모–이!!!!!\n#3;stiff\n#3;em;[빠직]"
