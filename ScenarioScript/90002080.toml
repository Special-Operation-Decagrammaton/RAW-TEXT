[translation]
90002080-1 = "Episode 8;Level Up"
90002080-3 = "This Steel Continent resulted from \"evolving\" Netzach, the seventh prophet, to an extreme level."
90002080-4 = "...Though Netzach's original form has spread out to a point where it's practically unrecognizable."
90002080-5 = "All of Decagrammaton's prophets are in the Steel Continent right now, and each and every one of them is protecting their designated area."
90002080-6 = "They're replicas, to be precise...but they're no different from the originals."
90002080-7 = "Replicas. I see."
90002080-8 = "Ultimately, if Kivotos is fully covered by the Steel Continent as those three plan, they can be systematically created at any time."
90002080-9 = "But...we have a bit of a problem here."
90002080-10 = "And what is the problem, Kei?"
90002080-11 = "It's difficult to track...where each of the prophets is currently."
90002080-12 = "Why? Is the enhanced security concealing them?"
90002080-13 = "That's correct, Himari. If I were to be straightforward..."
90002080-14 = "They're all hiding right now. And they're doing a good job at it."
90002080-15 = "However, I learned some more information about these three new prophets."
90002080-16 = "We've already recorded intel on the first seven in the Tree of Life's phylogenetic tree, so we can use that as a reference."
90002080-17 = "First, there's Netzach, the Steel Continent itself. Its title is the \"Infinite Land That Testifies Victory,\" and its path is \"victory finally achieved.\""
90002080-22 = "At least that title is easy to grasp."
90002080-23 = "Yes...it is. And next up, is Yesod, who is quite difficult to find. Its title is the \"Foundation of Purity and Power.\""
90002080-24 = "And its path is \"truth towards completion.\""
90002080-29 = "I'm curious. What do these titles and paths even mean? Do they help them work more efficiently?"
90002080-30 = "I don't know the details, but I can confirm that they use these designations to adjust the flow of the energy in the Steel Continent in order to..."
90002080-31 = "...approach some new possibility."
90002080-32 = "Yeah? And what would that be?"
90002080-33 = "...I don't know."
90002080-34 = "Huh? You were talking like you had some grand reveal, but you didn't say anything!"
90002080-35 = "Excuse me?!"
90002080-36 = "Momoi! Please! K-Kei, please calm down. I apologize on her behalf..."
90002080-37 = "Tch... It's all right, Midori. It seems that I got carried away."
90002080-38 = "Heehee. Right?"
90002080-39 = "Momoi!!"
90002080-43 = "Ahahaha! Kei's getting mad!"
90002080-44 = "*sigh*..."
90002080-45 = "Well...whatever. And finally, there's Malkuth. Her title is \"Pilgrim of the Kingdom at World's End.\""
90002080-46 = "And her path...seems to be something akin to a \"will brought forth from the flagship.\""
90002080-54 = "I'm feeling a little inspired! Maybe I'll use this in my next game!"
90002080-55 = "...Yeah. Perhaps that'll work."
90002080-56 = "Huh? You're not mad at me?"
90002080-57 = "You're just spewing nonsense and living in the land of make-believe..."
90002080-58 = "What do I care if you use them for your story?"
90002080-59 = "K-Kei... That's a little harsh..."
90002080-60 = "...Sorry, Yuzu. I went too far."
90002080-61 = "Hm? Is something wrong?"
90002080-62 = "Or maybe not? I mean, at least I got Kei to apologize for something!"
90002080-63 = "...Right... That's Momoi for you..."
90002080-64 = "I-I guess that's good... Maybe...?"
90002080-65 = "Anyway, our biggest problem is Malkuth, clearly."
90002080-66 = "We saw what she can do. We can't handle her power right now."
90002080-67 = "Frankly, she could have taken us all out right there. But she didn't."
90002080-68 = "She quickly retreated, as if she was being chased by something."
90002080-69 = "[s] \"What could that mean?\""
90002080-70 = "I also wonder. My first guess is that Malkuth has an extremely short uptime."
90002080-75 = "Maybe she's a unique unit designed only for short, decisive battles? Or she could even be a technology demo?"
90002080-76 = "How impractical. In war, standardization and uniformity are paramount."
90002080-77 = "Battle is all about attrition after all."
90002080-83 = "Or...perhaps she wasn't created for combat."
90002080-84 = "Uh... What do you mean? Then what is she for?"
90002080-86 = "While we can speculate ad nauseam, we don't have the time."
90002080-87 = "What we DO know is that the Steel Continent is divided into multiple areas, each managed by a prophet."
90002080-88 = "And we can...\"secure\" those areas and convert them into our territory."
90002080-89 = "Now that I consider it, the Decagrammaton's forces and Laborers are no longer attacking us."
90002080-90 = "Right. The area has been secure for some time."
90002080-91 = "...When Malkuth ambushed us, to be precise."
90002080-92 = "And Decagrammaton's forces and Laborers stopped swarming then."
90002080-93 = "I see. So...electronically occupying the area can stop enemy supports from entering."
90002080-98 = "And once we fully occupy each area, we should be able to face the area's prophet."
90002080-99 = "Finally, once we defeat the prophets... I should be able to absorb the primary \"information core\" into this body."
90002080-100 = "...Since this body was made from the Steel Continent, after all."
90002080-101 = "What will you learn from a prophet's information core?"
90002080-102 = "As I absorb more information cores, the Steel Continent will see me as...something like... "
90002080-103 = "...a collection of prophets, or some sort of higher being. It effectively elevates my administrative privileges."
90002080-104 = "When I take control over all the information cores, I should be able to give orders to the Steel Continent itself."
90002080-105 = "Notably, I could issue an order to \"cease expansion and shutdown operations.\""
90002080-106 = "[s] \"Huh? That would make the Steel Continent...!\""
90002080-107 = "Yes. This would fundamentally resolve our problem."
90002080-111 = "..."
90002080-112 = "Understood! So, if we occupy each area from the Steel Continent and take down its prophet, Kei will level up accordingly!"
90002080-113 = "And when Kei is at her max level, she will have the authority to stop the Steel Continent!"
90002080-114 = "Yes. I like the analogy, Aris. However..."
90002080-115 = "However...?"
90002080-116 = "The number of prophets we can face right now is 8, and not 10. "
90002080-117 = "Meaning... I can only get up to level 80 instead of the full 100."
90002080-119 = "Huh? Now that I think about it...you're right."
90002080-120 = "We can't really do anything about Netzach and Malkuth right now..."
90002080-122 = "Nevertheless, this plan seems to be our only option."
90002080-123 = "At the very least, we'll be able to confuse and disrupt the Steel Continent's operations and expansion process."
90002080-124 = "[s] \"Sounds like a clear goal.\""
90002080-129 = "Yes, Sensei. From now on, we must occupy each area, eliminate its prophet..."
90002080-130 = "...then retrieve its core's information, and save it to Kei."
90002080-131 = "If everything works out, Kei should be able to...greatly disrupt the Steel Continent's operations."
90002080-132 = "Then it's decided, Sensei."
90002080-133 = "We will need to physically prepare."
90002080-134 = "[s] \"Physically prepare?\""
90002080-135 = "Indeed. Firstly, I don't think I can...equip Abi-Eshuh again."
90002080-136 = "Malkuth severely damaged the exterior hull. "
90002080-137 = "The basic frame is also significantly damaged. I think we can somehow salvage and reuse the more functional parts."
90002080-138 = "But, all things considered, I believe the best course of action is to hand over the Abi-Eshuh frame to Aris."
90002080-140 = "Wh-What?! Abi-Eshuh, to me?! But...!"
90002080-141 = "Aris, we must use our resources and utilize all that we can."
90002080-142 = "Now, the problem is in extracting, overhauling, and modifying the frame to fit Aris."
90002080-143 = "And we're pressed for time."
90002080-144 = "And if possible, we need to arm everyone else too."
90002080-145 = "Merely securing this area is already stretching our resources..."
90002080-149 = "..."
90002080-150 = "What do you need?"
90002080-152 = "H-Huh? Well..."
90002080-153 = "To start... We need to repair the transport ship. And then we'll have to reorganize, modify, and attach additional necessary parts, as Toki suggested."
90002080-154 = "Since we're short on people and most of the AMAS is destroyed, we require various facilities for the automated processes, and..."
90002080-160 = "[ns] \"Whoa...\""
90002080-162 = "I-It's like asking us to build an entirely new factory..."
90002080-167 = "Yes, to put it simply. But that's impossible, so we have to find a way to manage..."
90002080-169 = "But everything will work out if we get things ready, right?"
90002080-171 = "?!"
90002080-172 = "?!"
90002080-174 = "K-Kei? I do not entirely understand the logistics, but Rio implied it was impossible..."
90002080-175 = "No. It is possible. Of course, it's impossible with just me alone."
90002080-176 = "But with Aris by my side, it's possible."
90002080-177 = "Me...?"
90002080-178 = "Yes. Material reconstruction is one of the signature powers of the Nameless Gods. I mentioned that a few times, if anyone was listening."
90002080-179 = "The entire Steel Continent was constructed with that power."
90002080-180 = "Yes. We knew that already. Wait, could it be?!"
90002080-181 = "Yes. It's what you're thinking."
90002080-182 = "Is that possible, Kei?!"
90002080-183 = "With Aris, yes."
90002080-184 = "But I do not...know anything..."
90002080-185 = "It's okay, Aris. It'll be like last time."
90002080-190 = "This place...is imbued with the Nameless Gods' power. I felt it when we faced Malkuth."
90002080-191 = "...And while it was a little distorted, the power isn't unusable."
90002080-192 = "And... I think...with this body, I can wield the power even better than before."
90002080-193 = "So let's show them, Aris. "
90002080-194 = "Let's show them what we're capable of. What YOU are capable of."
90002080-200 = "Let's show them our true potential."
90002080-201 = "What...should I do?"
90002080-216 = "It's simple. Look at me, Aris. Look into my eyes. You have it in you. You have always been perfect."
90002080-217 = "And...give me your hands. Please, know that I am here for you. We are connected."
90002080-218 = "And now...imagine. Envision."
90002080-233 = "Imagine...?"
90002080-234 = "Yes. Imagine what we need. What Rio said earlier. Abi-Eshuh's frame and what you can achieve. I know you can do it."
90002080-235 = "...Imagine who you wish to be."
90002080-236 = "A rough outline would be sufficient. I can fill in the details. Just...believe. Please."
90002080-240 = "Be not afraid, Aris."
90002080-241 = "Do you remember when that aurora lit up? What it meant?"
90002080-255 = "You...are greater than that. I see it in you."
90002080-260 = "Aris... Kei..."
90002080-262 = "Whoa... I feel like I'm in a video game cutscene?"
90002080-263 = "Yeah... I think you have a point..."
90002080-264 = "Aris...?"
90002080-269 = "..."
90002080-270 = "I have new armor... This is me? What is this?"
90002080-272 = "Yes. This is your potential."
90002080-273 = "This is your Abi-Eshuh."
90002080-274 = "Quite the super phenomenon, huh, President?"
90002080-275 = "I've witnessed many phenomena in our adventures. This is the greatest."
90002080-277 = "And I...am glad."
90002080-279 = "Next Episode;Dress Up"
