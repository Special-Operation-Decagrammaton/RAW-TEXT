[translation]
90002080-1 = "ตอนที่ 8;Level Up"
90002080-3 = "ดินแดนเหล็กกล้าแห่งนี้คือการ 'วิวัฒนาการ' เน็ตซาช ผู้เลื่อมใสตนที่ 7 อย่างสุดขีด เพื่อขยายการดำรงอยู่ค่ะ"
90002080-4 = "และในกระบวนการนั้น ร่างเดิมของเน็ตซาชก็แตกสลายเป็นเสี่ยงๆ จนไม่เหลือร่องรอยอะไรเลย..."
90002080-5 = "แต่ถึงยังไง บรรดาผู้เลื่อมใสของเดคาแกรมมาทอนทั้งหมดก็มารวมตัวกันในดินแดนเหล็กกล้าในตอนนี้ และแต่ละตนก็กำลังปกป้องพื้นที่ที่ได้รับมอบหมายอยู่ค่ะ"
90002080-6 = "ถ้าพูดให้ถูก ผู้เลื่อมใสพวกนั้นเป็นของจำลอง... แต่ก็ไม่ได้ต่างจากตัวจริงเลยค่ะ"
90002080-7 = "เป็นเวอร์ชันจำลองสินะคะ อย่างนี้นี่เอง"
90002080-8 = "ค่ะ ถ้าคิโวทอสถูกกลืนกินด้วยดินแดนเหล็กกล้าตามแผนการของเด็กทั้งสามตนนั้น ผู้เลื่อมใสจำลองก็จะผสานกับตัวจริงอย่างเป็นระบบได้ทุกเมื่ออยู่แล้วค่ะ"
90002080-9 = "แต่ว่า... ตรงนี้มีปัญหาอยู่นิดหน่อยค่ะ"
90002080-10 = "ปัญหาอะไรเหรอคะ เคย์?"
90002080-11 = "การติดตามว่าผู้เลื่อมใสแต่ละตนอยู่ที่ไหน... คือเรื่องที่ยากในตอนนี้ค่ะ"
90002080-12 = "เป็นเพราะการปกปิดและระดับการรักษาความปลอดภัยใช่มั้ยคะ?"
90002080-13 = "ใช่แล้วค่ะ ฮิมาริ ถ้าจะพูดให้ตรงหน่อยก็คือ..."
90002080-14 = "เหมือนว่าทุกตนจะซ่อนตัวกันได้ดีมากๆ เลยละค่ะ"
90002080-15 = "แต่ต่อให้ซ่อนกันเก่งแค่ไหน ฉันก็ได้ข้อมูลของผู้เลื่อมใสทั้ง 3 ตนที่ปรากฏตัวใหม่มาเพิ่มแล้วค่ะ"
90002080-16 = "ส่วนอีก 7 ตนที่เหลือนั้นถูกบันทึกไว้ในแผนผังลำดับสายของ <ต้นไม้แห่งชีวิต> ที่เราได้มาแล้ว ไว้ไปอ้างอิงจากตรงนั้นก็ได้ค่ะ"
90002080-17 = "อันดับแรกเลยก็คือ <เน็ตซาช NETZACH> ที่เป็นดินแดนเหล็กกล้านี้เอง อีกชื่อของมันก็คือ <ดินแดนไร้ขอบเขตที่พิสูจน์ชัยชนะ> ส่วนเส้นทางของมันก็คือ <ชัยชนะที่ได้มาในที่สุด> ค่ะ"
90002080-22 = "ในอีกแง่หนึ่ง มันก็เป็นชื่อที่เข้าใจง่ายดีนะ"
90002080-23 = "ค่ะ... ก็มีส่วนนั้นอยู่บ้าง ต่อไปก็คือ <เยซ็อด YESOD> ที่หาตัวยากเป็นพิเศษ อีกชื่อของมันคือ <รากฐานแห่งความบริสุทธิ์และอำนาจ>"
90002080-24 = "และเส้นทางของมันก็คือ <ความจริงที่มุ่งสู่ความสมบูรณ์> ค่ะ"
90002080-29 = "ฉันสงสัยมานานแล้ว ชื่ออีกชื่อหรือเส้นทางอะไรนั่นมันคืออะไรเหรอ? แล้วการมีสิ่งนั้นมันจะเพิ่มประสิทธิภาพในทางใดทางหนึ่งหรือเปล่า?"
90002080-30 = "อันที่จริงฉันก็ไม่แน่ใจเหมือนกัน แต่ในดินแดนเหล็กกล้าแห่งนี้มีการปรับกระแสพลังงานโดยยึดสิ่งนั้น#nเป็นพื้นฐาน..."
90002080-31 = "และดูเหมือนพยายามจะบรรลุความเป็นไปได้ใหม่ๆ บางอย่างน่ะค่ะ"
90002080-32 = "หืม แล้วอะไรใหม่ๆ ที่ว่าคืออะไรเหรอ?"
90002080-33 = "ฉันเองก็ไม่รู้ค่ะ..."
90002080-34 = "อ้าว อะไรเนี่ย! พูดราวกับว่ารู้ทุกอย่าง แต่ก็ไม่รู้ซะงั้น!"
90002080-35 = "ว่าไงนะคะ?!?!"
90002080-36 = "พี่โมโมอิ! ทำไมถึงพูดอย่างนั้นล่ะ! คะ... เคย์จังก็อย่าโมโหให้มากไปเลย ฉันขอโทษแทนพี่โมโมอินะ..."
90002080-37 = "อึก... ไม่เป็นไรค่ะ มิโดริ ฉันน่าจะเดือดมากไปหน่อยน่ะค่ะ"
90002080-38 = "แหะๆ ใช่มั้ยล่ะ?"
90002080-39 = "โม โม อิ!!!!!"
90002080-43 = "อะฮะฮะฮ่า! เคย์โกรธแล้ว!"
90002080-44 = "เฮ้อ... "
90002080-45 = "เอาเถอะค่ะ... สุดท้ายก็คือ <มัลคูธ MALKUTH> ค่ะ อีกชื่อของเธอก็คือ <ผู้แสวงบุญแห่งอาณาจักรที่เดินทางมาถึงที่สุดของโลก>"
90002080-46 = "และเส้นทางของเธอน่าจะเป็น... <เจตนารมณ์ที่ถูกสร้างขึ้นภายใต้จุดยืน> ค่ะ"
90002080-54 = "ฟังดูน่าสนใจดีนะ เอาไว้เป็นข้อมูลอ้างอิงตอนสร้างเกมใหม่ดีมั้ย?"
90002080-55 = "ค่ะ... แบบนั้นน่าจะดีเลยค่ะ..."
90002080-56 = "เอ๋? รอบนี้ไม่โกรธเหรอ?"
90002080-57 = "ถ้าจะให้ฉันฟังทุกคนพูดอะไรไปเรื่อยแล้วเล่นสนุกกันตามใจเวลาฉันโกรธ"
90002080-58 = "ฉันว่าการยอมให้โมโมอิเอาเรื่องพวกนี้ไปเป็นเนื้อเรื่องในเกมจะมีประโยชน์ต่อคนบนโลกมากกว่าค่ะ"
90002080-59 = "คะ... เคย์จัง... ไม่เห็นต้องพูดถึงขนาดนั้นเลย..."
90002080-60 = "ขอโทษด้วยค่ะ... ฉันน่าจะพูดแรงไปหน่อยค่ะ"
90002080-61 = "เอ๋? ไหงเป็นงี้ล่ะ?"
90002080-62 = "แต่ในเมื่อได้รับคำขอโทษจากเคย์ งั้นนี่ก็เป็นเรื่องที่ดีใช่มั้ยนะ?"
90002080-63 = "ใช่ค่ะ... โมโมอิของพวกเราก็เป็นอย่างนี้ละค่ะ..."
90002080-64 = "ถะ... ถือว่าดี... มั้ยนะ...?"
90002080-65 = "เอาเถอะค่ะ สรุปเลยว่ามัลคูธน่าจะเป็นปัญหาใหญ่ที่สุดค่ะ"
90002080-66 = "พลังของมัลคูธน่ะ... อย่างที่เราได้เห็นด้วยตาตัวเองแล้วว่ามันอยู่ในระดับที่ยากเกินกว่าจะรับมือได้#nในตอนนี้ค่ะ"
90002080-67 = "เผลอๆ มัลคูธอาจกำจัดพวกเราทั้งหมดที่นี่ได้เลยนะคะ แต่มัลคูธก็ไม่ได้ทำแบบนั้น"
90002080-68 = "เธอรีบล่าถอยออกไป เหมือนกับถูกอะไรบางอย่างไล่ล่าอย่างนั้นละค่ะ"
90002080-69 = "[s] \"หมายความว่ายังไงเหรอ?\""
90002080-70 = "ฉันก็ไม่แน่ใจค่ะ แต่เท่าที่ฉันคิดได้ก็คือ ระยะเวลาการใช้งานของมัลคูธอาจจะสั้นเอาเสียมากๆ ค่ะ"
90002080-75 = "หรือว่ามัลคูธจะเป็นเครื่องจักรกลแบบพิเศษที่ถูกออกแบบมาให้ต่อสู้ระยะสั้นเท่านั้นคะ? เหมือนกับเครื่องต้นแบบที่ยังอยู่ในขั้นพิสูจน์เทคโนโลยีน่ะค่ะ"
90002080-76 = "งั้นก็ยังไม่เหมาะกับการใช้งานจริงสินะ สิ่งสำคัญที่สุดคือการทำให้เป็นมาตรฐานแท้ๆ"
90002080-77 = "ในการสู้รบ ปริมาณก็เป็นสิ่งสำคัญไม่แพ้คุณภาพนี่เนอะ"
90002080-83 = "หรือว่ามัลคูธไม่ใช่ผู้เลื่อมใสที่ถูกสร้างมาเพื่อการต่อสู้เพียงอย่างเดียว..."
90002080-84 = "อ่า... หมายความว่าเดิมทีแล้วมัลคูธถูกกำหนดให้มีจุดประสงค์อื่นสินะ?"
90002080-86 = "ถ้าเรามีเวลากันมากกว่านี้ ก็น่าจะหารือเรื่องนี้ต่อและคาดการณ์อะไรได้อีกหลายอย่างเลย แต่ตอนนี้เราน่าจะไม่มีเวลามากขนาดนั้นค่ะ"
90002080-87 = "สิ่งที่เรามั่นใจได้ก็คือ ดินแดนเหล็กกล้าในตอนนี้แบ่งเป็นหลายๆ พื้นที่ และแต่ละพื้นที่ก็มีผู้เลื่อมใสที่ดูแลอยู่ค่ะ"
90002080-88 = "และถ้าเรา 'ยึด' ดินแดนนั้นมาได้... ก็จะทำให้เป็น [ruby=territory]ดินแดน[/ruby]ของเราได้ค่ะ"
90002080-89 = "จะว่าไป ตอนนี้กองกำลังกับพวกหุ่นรับใช้ของเดคาแกรมมาทอนไม่บุกเข้ามาแล้วนะคะ?"
90002080-90 = "ฉันหาโอกาสบอกไม่ได้น่ะ แต่การยึดพื้นที่เพิ่งเสร็จสิ้นไปเมื่อไม่นานมานี้เอง"
90002080-91 = "ถ้าจะบอกให้ชัดเจนก็คือ ตอนที่มัลคูธมาจู่โจมพวกเรา"
90002080-92 = "การสนับสนุนของกองกำลังและหุ่นรับใช้ของเดคาแกรมมาทอนก็หยุดไปพร้อมกันเลย"
90002080-93 = "อย่างนั้นสินะคะ ถ้าเรายึดพื้นที่ด้วยระบบอิเล็กทรอนิกส์ได้สำเร็จ ก็จะหยุดยั้งการสนับสนุนของศัตรูได้นี่เอง"
90002080-98 = "และเมื่อยึดครองพื้นที่ใดพื้นที่หนึ่งได้สำเร็จ เราก็จะต่อสู้กับผู้เลื่อมใสของพื้นที่นั้นได้ค่ะ"
90002080-99 = "สุดท้ายแล้วถ้าเราเอาชนะผู้เลื่อมใสพวกนั้นได้... เราก็จะสามารถรับข้อมูลของ 'คอร์ข้อมูล' เข้าสู่ร่างของฉันในปัจจุบันได้ค่ะ"
90002080-100 = "นั่นก็เพราะร่างนี้ถูกสร้างขึ้นจากดินแดนเหล็กกล้ายังไงล่ะคะ..."
90002080-101 = "เราดูดกลืนคอร์ข้อมูลของผู้เลื่อมใสไปทำอะไรได้งั้นเหรอ?"
90002080-102 = "ยิ่งดูดกลืนคอร์ข้อมูลมากเท่าไร ดินแดนเหล็กกล้าก็จะ... "
90002080-103 = "จะยอมรับว่าฉันเป็นองค์รวมของผู้เลื่อมใส หรือไม่ก็เป็นตัวตนที่อยู่เหนือกว่านั้นค่ะ และนี่จะเป็นปัญหาความปลอดภัยระดับสูงอย่างหนึ่งเลยค่ะ"
90002080-104 = "ถ้าฉันรวบรวมคอร์ข้อมูลทั้งหมดได้ ตอนนั้นฉันก็จะออกคำสั่งกับดินแดนเหล็กกล้าได้ด้วยตัวเองค่ะ"
90002080-105 = "อย่างเช่นคำสั่ง 'หยุดการขยายดินแดนและหยุดทำงาน' ยังไงล่ะคะ"
90002080-106 = "[s] \"หืม? ถ้างั้นสภาพการณ์ของดินแดนเหล็กกล้าก็...!\""
90002080-107 = "ค่ะ โดยพื้นฐานแล้วก็ยังมีโอกาสที่จะแก้ไขได้ค่ะ"
90002080-111 = "..."
90002080-112 = "เข้าใจแล้วค่ะ! ถ้ายึดครองพื้นที่ในดินแดนเหล็กกล้าและเอาชนะผู้เลื่อมใสได้ เคย์ก็จะได้อัปเลเวลสินะคะ!"
90002080-113 = "แล้วถ้าเคย์ถึงเลเวลสูงสุดแล้ว ก็จะได้สกิลในการหยุดยั้งดินแดนเหล็กกล้าได้ค่ะ!"
90002080-114 = "ค่ะ เปรียบเทียบแบบนั้นก็เข้าใจง่ายเลยค่ะ อาริสึ แต่ว่า..."
90002080-115 = "แต่ว่า...?"
90002080-116 = "ผู้เลื่อมใสที่เราต่อกรได้ตอนนี้ ไม่ใช่ 10 ตน แต่มีแค่ 8 ตนเท่านั้นค่ะ"
90002080-117 = "และนั่นก็หมายความว่า... ฉันพัฒนาได้ถึงแค่เลเวล 80 จาก 100 เลเวลค่ะ"
90002080-119 = "หืม? จะว่าไป... มันก็จริงเนอะ?"
90002080-120 = "ก็ตอนนี้เรายังทำอะไรกับเน็ตซาชและมัลคูธไม่ได้นี่เนอะ..."
90002080-122 = "แต่ยังไงก็ต้องยอมรับว่านี่คือวิธีเดียวที่มีค่ะ"
90002080-123 = "อย่างน้อยก็น่าจะ... ไปรบกวนโครงสร้างการทำงานและรูปแบบการขยายดินแดนได้บ้างค่ะ"
90002080-124 = "[s] \"งั้นก็เท่ากับว่าเราตั้งเป้าหมายกันได้แล้วสินะ\""
90002080-129 = "ค่ะ คุณครู จากนี้เป็นต้นไป พวกเราต้องยึดครองแต่ละพื้นที่และเอาชนะผู้เลื่อมใสแต่ละตน"
90002080-130 = "จากนั้นก็ต้องดึงคอร์ข้อมูลมาบันทึกไว้ที่เคย์"
90002080-131 = "และถ้าทุกอย่างเป็นไปได้ด้วยดี เคย์ก็จะ... ทำลายโครงสร้างการทำงานของดินแดนเหล็กกล้าได้"
90002080-132 = "งั้นก็ได้ข้อสรุปแล้วละ คุณครู"
90002080-133 = "ถ้างั้นเราก็ควรต้องเตรียมตัวทางด้านกายภาพให้พร้อมด้วยสินะคะ"
90002080-134 = "[s] \"เตรียมตัวทางด้านกายภาพงั้นเหรอ?\""
90002080-135 = "ใช่ค่ะ ก่อนอื่นเลย การประกอบอาบี เอชูห์ของฉันขึ้นใหม่... น่าจะเป็นเรื่องยากค่ะ"
90002080-136 = "ตอนที่สู้กับมัลคูธ ชิ้นส่วนภายนอกของชุดถูกทำลายจนแทบจะใช้การต่อไม่ได้เลยค่ะ "
90002080-137 = "ถึงจะพังแค่บางจุด แต่โครงหลักโดนไปหนักพอสมควรเลยค่ะ สำหรับส่วนที่ยังใช้งานได้ ฉันว่าเราก็น่าจะแยกออกมาแล้วเอาไปรีไซเคิลได้"
90002080-138 = "แต่เมื่อพิจารณาเงื่อนไขทั้งหมดแล้ว ดูเหมือนว่าทางเลือกที่ดีที่สุดในตอนนี้คือการส่งต่อโครงหลัก#nของอาบี เอชูห์ให้อาริสึที่น่ารักค่ะ"
