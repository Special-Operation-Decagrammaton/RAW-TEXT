[translation]
1013306-1 = "ตัวแปรที่ไม่คาดคิด"
1013306-2 = "(หลังจากนั้นไม่นาน คุณครูก็ได้รับการติดต่อจากริโอะ)"
1013306-5 = "อ๊ะ ครู พอมีเวลาหรือเปล่า?"
1013306-6 = "ฉันเพิ่งปรับแต่งชุดบอดี้สูทเสร็จเมื่อกี้เลย"
1013306-7 = "แต่ว่า... ฉันทดสอบด้วยตัวเองคนเดียวไม่ได้น่ะสิ"
1013306-8 = "หุ่นรบล้ำยุคแม่บ้านก็ช่วยเทสไม่ได้อีก..."
1013306-9 = "ครูพอจะช่วยฉันได้หรือเปล่า?"
1013306-10 = "[s] \"อื้อ! ครูจะไปหาเดี๋ยวนี้ละ!\""
1013306-11 = "ขอบคุณนะ"
1013306-12 = "ถ้างั้น... ช่วยมาที่ห้องของฉันหน่อยนะ"
1013306-20 = "เข้ามาสิ"
1013306-21 = "อย่างที่ฉันบอกไปว่าฉันปรับแต่งชุดเสร็จแล้ว"
1013306-22 = "หืม...? ดูแล้วไม่มีอะไรเปลี่ยนไปงั้นเหรอ?"
1013306-23 = "ดูจากภายนอกก็น่าจะเป็นอย่างนั้นละ"
1013306-24 = "ฉันไม่ได้เพิ่มชิ้นส่วนใหม่อะไร แต่แค่ประยุกต์ใช้ฟังก์ชันเดิมที่มีอยู่น่ะ"
1013306-25 = "สิ่งที่ฉันปรับแต่งในครั้งนี้ก็คือฟังก์ชันสร้างความร้อน"
1013306-26 = "ชุดนี้ติดตั้งอุปกรณ์ที่ช่วยขยายสัญญาณไฟฟ้าภายในร่างกายไว้ ถ้าเอาสิ่งนั้นมาประยุกต์ใช้ละก็ เราจะถ่ายเทความร้อนไปทั่วร่างกายได้"
1013306-27 = "การปรับแต่งนี้ทำได้โดยแก้ไขโค้ดเพียงไม่กี่บรรทัด ก็เลยเสร็จเร็วกว่าที่คิดไว้"
1013306-28 = "แต่ว่า... ยังไงฉันก็ต้องทดสอบให้แน่ใจ"
1013306-29 = "เพราะงั้นก็ช่วยฉันหน่อยนะ ครู"
1013306-30 = "[s] \"ให้ครูช่วยยังไงเหรอ?\""
1013306-31 = "จากนี้ฉันจะเพิ่มอุณหภูมิของชุดให้สูงขึ้น ครูช่วยเช็กด้วยกล้องถ่ายภาพความร้อนให้หน่อยนะ#nว่าความร้อนกระจายทั่วถึงหรือเปล่า"
1013306-32 = "[s] \"งานง่ายๆ นี่นา~\""
1013306-33 = "ต่อไปก็... ช่วยตรวจสอบให้หน่อยว่ามีจุดไหนที่ความร้อนรั่วไหลออกไปบ้างมั้ย"
1013306-34 = "ฉันหมายถึง... ให้ลูบมือไปตามพื้นผิวของชุดน่ะ"
1013306-35 = "[s] \"งานง่ายๆ อีกแล้ว!!\""
1013306-36 = "ส่วนที่มือฉันเอื้อมถึง ฉันจะตรวจสอบเอง ส่วนครูช่วยตรวจสอบตรงหลังของฉันให้หน่อยนะ"
1013306-37 = "ฉันก็อยากขอให้หุ่นรบล้ำยุคแม่บ้านช่วยหรอกนะ แต่หุ่นรบล้ำยุคแม่บ้านไม่มีฟังก์ชันตรวจจับอุณหภูมิ#nด้วยการสัมผัส"
1013306-38 = "แล้วฉันก็อยากตรวจสอบสภาพของชุดให้ละเอียดมากขึ้นด้วย งั้นฉันขอความร่วมมือด้วยนะ"
1013306-39 = "[s] \"ถะ... ถ้าให้เช็กที่หลังอย่างเดียวก็ไม่มีปัญหา...!\""
1013306-40 = "อื้อ งั้นก็รบกวนด้วยนะ"
1013306-42 = "(หลังจากนั้นคุณครูก็ใช้กล้องถ่ายภาพความร้อนวัดอุณหภูมิ และใช้มือลูบหลังริโอะเพื่อตรวจสอบความ#nร้อน)"
1013306-47 = "อะ... อืมม..."
1013306-48 = "[ns] \"ขะ... ขอโทษที! ครูทำให้อึดอัดหรือเปล่า?!\""
1013306-49 = "เปล่าหรอก แค่มันจั๊กจี้กว่าที่คิดน่ะ"
1013306-50 = "แล้วก็รู้สึกเหมือนมันจะร้อนกว่าที่คาดไว้ด้วย..."
1013306-51 = "เอาเถอะ ฝากเช็กต่อด้วยนะ"
1013306-52 = "[s] \"ดะ... ได้เลย...!\""
1013306-53 = "(หลังจากนั้นคุณครูก็ช่วยตรวจสอบชุดและอุณหภูมิร่างกายของริโอะอย่างละเอียดถี่ถ้วน)"
1013306-59 = "ฮู่ว... ขอบคุณมากนะ สิ้นสุดการเทสแล้วละ"
1013306-60 = "เท่านี้ก็ยืนยันได้แล้วว่าฟังก์ชันสร้างความร้อนทำงานได้อย่างสมบูรณ์แบบ"
1013306-61 = "แต่ว่า... มันมีตัวแปรที่ไม่คาดคิดอยู่อย่างหนึ่ง"
1013306-62 = "[s] \"หืม? ตัวแปรอะไรเหรอ?\""
1013306-63 = "คือฉัน... ร้อนมากเลย..."
1013306-64 = "พอรู้ว่าครูจะมา ฉันก็เลยตั้งอุณหภูมิห้องให้อบอุ่นไว้..."
1013306-65 = "แต่เห็นทีฉันต้องระบายความร้อนออกแล้วละ"
1013306-68 = "ขอเสียมารยาทหน่อยนะ"
1013306-71 = "― [log=리오 결전]ฮู่ว... ตอนนี้ค่อยยังชั่วแล้วละ[/log][wa:1470] "
1013306-74 = "― [log=리오 결전]ฉันลืมนึกถึงอุณหภูมิห้องไปน่ะสิ[/log][wa:1050] "
1013306-77 = "― [log=리오 결전]สงสัยฉันคง... เผลอใจลอย[/log][wa:1610] "
1013306-79 = "― [log=리오 결전]ไปกับผลลัพธ์ตรงหน้าน่ะ... [/log]"
1013306-82 = "― [log=리오 결전]ขอฉันพักหน่อยนะ...[/log][wa:2370] "
1013306-84 = "― [log=리오 결전]ฉันร้อนจนคิดอะไรไม่ค่อยออกเลย...[/log][wa:1200] "
1013306-87 = "― [log=리오 결전]ครู...? ทำไมถึงทำหน้าแบบนั้นล่ะ... [/log][wa:3230] "
1013306-90 = "― [log=리오 결전]อ๊ะ...!![/log][wa:2080] "
1013306-92 = "― [log=리오 결전](นะ... นี่ฉัน... ทำอะไรลงไป...!?)[/log][wa:970] "
1013306-95 = "― [log=리오 결전]ฉะ... ฉันไม่ได้ตั้งใจนะ...! ขอโทษ...! [/log][wa:2470] "
1013306-97 = "― [log=리오 결전]ฉัน... ตอนนี้ฉัน... ไม่เป็นไรแล้วละ...! [/log][wa:1030] "
1013306-101 = "ระ... เรื่องปล่อยความร้อน พอเท่านี้ละ!"
1013306-102 = "ส่วนที่เหลือ เดี๋ยวฉันแก้ไขด้วยระบบทำความเย็นของชุดก็ได้...!"
1013306-103 = "เพราะงั้นไม่เป็นไรแล้วละ! จริงๆ นะ!"
1013306-111 = "[ns] \"แต่ยังดูร้อนอยู่เลยนะ?\""
1013306-112 = "...!!"
1013306-117 = "[ns] \"ระ... ริโอะ...?!\""
1013306-119 = "(หลังจากนั้นคุณครูก็พัดให้ริโอะอย่างขะมักเขม้นเพื่อลดอุณหภูมิร่างกาย)"
1013306-120 = "(โชคดีที่ริโอะฟื้นตัวได้รวดเร็วโดยไม่มีปัญหาอะไร)"
1013306-123 = "การทดลองนี้... มีตัวแปรเยอะจริงๆ เลย..."
