[translation]
1013306-1 = "預料之外的變數"
1013306-2 = "（不久之後，收到了莉央的聯絡）"
1013306-5 = "啊，老師。請問現在有空嗎？"
1013306-6 = "我剛完成戰鬥服的改造。"
1013306-7 = "但是……只有我自己一個人沒辦法測試。"
1013306-8 = "家事幫手前衛君也幫不上忙……"
1013306-9 = "老師願意幫忙嗎？"
1013306-10 = "[s] 「嗯！我馬上過去！」"
1013306-11 = "謝謝。"
1013306-12 = "那麼……請到我的房間來吧。"
1013306-20 = "歡迎。"
1013306-21 = "就像剛才說的一樣，戰鬥服的改造已經完成了。"
1013306-22 = "……嗯？看起來沒什麼變化？"
1013306-23 = "從外觀來看確實是這樣沒錯。"
1013306-24 = "因為我沒有使用新零件，而是應用了原有的功能。"
1013306-25 = "這次改造的，是關於發熱功能的部分。"
1013306-26 = "這套服裝帶有能增幅體內電信號的裝置。#n所以只要運用它，就能將熱量傳導到全身。"
1013306-27 = "因為只需要修改幾行程式碼，完成改造的速度也比想像中來得快。"
1013306-28 = "即便如此……驗證還是必須確實進行。"
1013306-29 = "所以請你幫個忙吧，老師。"
1013306-30 = "[s] 「我該怎麼幫呢？」"
1013306-31 = "我接下來會開始提高戰鬥服的溫度，麻煩老師用熱像儀檢查熱能的分布是否均勻。"
1013306-32 = "[s] 「很簡單呢～」"
1013306-33 = "然後……麻煩確認是否有熱能洩漏的部分。"
1013306-34 = "請逐一用手觸摸服裝的表面。"
1013306-35 = "[s] 「一點也不簡單啊──！！」"
1013306-36 = "我能碰到的地方我自己來，老師只要負責背面就可以了。"
1013306-37 = "本來是想讓家事幫手前衛君幫忙的，不過那孩子並沒有藉由觸覺感測溫度的功能。"
1013306-38 = "我希望能盡可能確認服裝的狀態，希望你願意配合。"
1013306-39 = "[s] 「只，只有背面的話……！」"
1013306-40 = "嗯，那就拜託了。"
1013306-42 = "（之後用熱像儀測量溫度，觸摸莉央的背部檢查熱能）"
1013306-47 = "唔，唔嗯……"
1013306-48 = "[ns] 「對，對不起！不舒服嗎！？」"
1013306-49 = "不是那樣的。只是比我想像中還癢……"
1013306-50 = "溫度也比預期中來得高而已……"
1013306-51 = "總之，麻煩你繼續檢查吧。"
1013306-52 = "[s] 「嗯，嗯……！」"
1013306-53 = "（之後努力地檢查了服裝和莉央的體溫）"
1013306-59 = "呼……辛苦了。測試到此結束。"
1013306-60 = "多虧有老師的幫忙，已經確認發熱功能可以完美運作了。"
1013306-61 = "……不過，出現了一個預料之外的變數。"
1013306-62 = "[s] 「嗯？什麼變數？」"
1013306-63 = "……太熱了。"
1013306-64 = "我剛才因為老師要來而把房間的溫度調暖，結果就變成了這樣……"
1013306-65 = "看來得排出熱量才行。"
1013306-68 = "恕我失禮了。"
1013306-71 = "— [log=리오 결전]呼……涼快多了。[/log][wa:2350] "
1013306-74 = "— [log=리오 결전]我沒有考慮到室內溫度。[/log][wa:1810] "
1013306-77 = "— [log=리오 결전]我也真是的……似乎是被眼前的結果，[/log][wa:1810] "
1013306-79 = "— [log=리오 결전]分散了注意力……[/log]"
1013306-82 = "— [log=리오 결전]……讓我稍微，休息一下吧。[/log][wa:2530] "
1013306-84 = "— [log=리오 결전]因為太熱，思考不是很……[/log][wa:1960] "
1013306-87 = "— [log=리오 결전]……老師？為什麼露出那種表情……[/log][wa:3950] "
1013306-90 = "— [log=리오 결전]……啊！！[/log][wa:2160] "
1013306-92 = "— [log=리오 결전]（我，我做了……什麼……！？）[/log][wa:1650] "
1013306-95 = "— [log=리오 결전]這，這不是故意的……！對不起……！ [/log][wa:3230] "
1013306-97 = "— [log=리오 결전]我，我已經，沒事了……！[/log][wa:2110] "
1013306-101 = "熱，熱量已經排出去了！"
1013306-102 = "接下來可以用戰鬥服的冷卻系統來解決……！"
1013306-103 = "所以沒問題的！真的！"
1013306-111 = "[ns] 「可是你的額頭還是很燙啊？」"
1013306-112 = "……！！"
1013306-117 = "[ns] 「莉，莉央……！？」"
1013306-119 = "（之後在莉央旁邊，用扇子努力幫他降溫）"
1013306-120 = "（幸好沒什麼大礙，很快就恢復了）"
1013306-123 = "這次實驗的變數……實在太多了啊……"
