[translation]
10052065-2 = "Kether's silence is verified. The machine is inactive. "
10052065-3 = "Ugh... Ughhh..."
10052065-4 = "You were great, Yuzu."
10052065-5 = "Thank you for your kind words, but..."
10052065-6 = "Kei! Over here, please!"
10052065-10 = "Yes, yes. I see. Himari, you can take it from here."
10052065-11 = "Understood. I'll send support to the provided coordinates. Please stay clear of the area."
10052065-12 = "The drop don't stop!"
10052065-16 = "Sis, please get serious... Sis..."
10052065-23 = "Phew... Upon further assessment, gravity is such a swift...yet barbaric...way to rendezvous..."
10052065-24 = "You're telling me."
10052065-25 = "The area's takeover is nearly complete. Can you retrieve the core, Kei?"
10052065-26 = "Yes. That won't be difficult. The problem is that, in the meantime..."
10052065-28 = "[ns] \"...We need to secure the area in case more forces show up.\""
10052065-29 = "Rest assured, Sensei. This is my specialty."
10052065-30 = "...You talk as if EVERYTHING is your \"specialty.\""
10052065-31 = "Indeed. To be a perfect maid and agent, I must strive for no less."
10052065-32 = "(I think Himari's a bad influence on her...)"
10052065-33 = "Now it is MY turn to protect Kei! I shall do my best!"
10052065-34 = "Uh, I-I suppose that's how...we'll do it. Um... Thank you, Aris. I'm counting on you."
10052065-35 = "Yes! Leave everything to me."
10052065-36 = "Come to think of it, I heard that Kether's research district was completely shut down in the wake of the dam's collapse."
10052065-37 = "Yes. At the time, all we knew was that Decagrammaton's true form was an AI in a vending machine."
10052065-38 = "Somehow, it was reborn as a super AI after experiencing auditory hallucinations."
10052065-39 = "Thank you for the context, Eimi. "
10052065-40 = "It's nothing. I remember you referring to Decagrammaton as a \"megalomaniacal being.\""
10052065-41 = "...? And it was. I fail to see the problem here."
10052065-42 = "Your phrasing indicated that you felt Decagrammaton had a personality... You seemed to find it human-like. "
10052065-43 = "You're often very careful with your word choices."
10052065-44 = "W-Well... If I didn't acknowledge it has a kind of \"personality,\" implying a \"humanness\"... "
10052065-45 = "...It would be quite the statement against at least two of our current companions! "
10052065-46 = "So what I'm trying to say is that... Eimi, it would be best if we tried to avoid the reductive nature of over-classification!"
10052065-47 = "?"
10052065-48 = "..."
10052065-49 = "I see. You're proposing flexible classification criteria based on practicality. Noted."
10052065-50 = "Of all people, YOU should not be making that conclusion."
10052065-51 = "I-I shouldn't?"
10052065-52 = "That's enough. I've retrieved the core."
10052065-53 = "I'll share the info to the Tree of Life's display in the transport ship, so you can personally examine the data."
10052065-54 = "Confirmed on our end as well. Good work, everyone."
10052065-55 = "Bum bum bum! Kei has shot up 10 levels! Let us keep the momentum, and progress rolling!"
10052065-56 = "Right, Aris. Thank you."
10052065-61 = "Um, and...I have a request for you, Sensei."
10052065-62 = "[s] \"Hm? What?\""
10052065-63 = "Lower your voice!"
10052065-64 = "Um... Later, when you see Himari..."
10052065-65 = "Please give her my thanks."
10052065-66 = "[ns] \"...\""
10052065-68 = "[ns] \"DON'T WORRY! I'll make sure to let her know!\""
10052065-69 = "Did I NOT JUST ASK you to keep it down? Are you capable of retaining information for more than two seconds?"
10052065-70 = "Kei? Sensei? Why are you screaming?"
10052065-71 = "I-I-It's nothing! Nothing happened! Right, Sensei?!"
10052065-75 = "[ns] \"Look, Aris. Uh, about Kei! She wants to...\""
10052065-77 = "SHUT IT!!"
