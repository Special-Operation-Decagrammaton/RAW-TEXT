[translation]
10052065-2 = "เคเทอร์หยุดเคลื่อนไหวแล้วค่ะ "
10052065-3 = "อึกก... อึกกก..."
10052065-4 = "ทำได้ดีมากเลย ยูสึ ยอดเยี่ยมเลยละ"
10052065-5 = "ขอบคุณที่ช่วยพูดแบบนั้นค่ะ..."
10052065-6 = "เคย์! ตรงนี้ค่ะ! รบกวนด้วยค่ะ!"
10052065-10 = "ได้ค่ะ เข้าใจแล้วค่ะ ฝากดำเนินการขั้นต่อไปด้วยค่ะ ฮิมาริ"
10052065-11 = "ทราบแล้วค่ะ ฉันจะส่งพิกัดไปให้ ช่วยหลีกเลี่ยงพิกัดนั้นด้วยนะคะ"
10052065-12 = "เริ่มร่อนลงได้!"
10052065-16 = "พี่โมโมอิ ขอร้องละ... หืม? พี่..."
10052065-23 = "ฮู่ว... พอมานึกดูอีกที... นี่เป็นวิธีการมาสมทบกันที่[ruby=ดิบเถื่อน]ตรงไปตรงมา[/ruby]จังเลยนะคะ..."
10052065-24 = "ฉันเห็นด้วยเป็นอย่างยิ่งเลยละ..."
10052065-25 = "การยึดพื้นที่ใกล้จะสำเร็จแล้วค่ะ เราจะได้คอร์มามั้ยคะ เคย์?"
10052065-26 = "ค่ะ เรื่องนั้นไม่ยากหรอกค่ะ แต่ปัญหาก็คือ..."
10052065-28 = "[ns] \"ช่วยอยู่ตรงนั้นกันก่อนนะ เผื่อจะมีกำลังเสริมของศัตรูตามมา\""
10052065-29 = "ไม่ต้องห่วงนะคะ คุณครู ฉันเป็นผู้เชี่ยวชาญในด้านนี้อยู่แล้วค่ะ"
10052065-30 = "คุณก็ชอบบอกว่าตัวเองเป็นผู้เชี่ยวชาญในทุกด้านที่นึกออกอยู่แล้วไม่ใช่เหรอคะ...?"
10052065-31 = "ใช่ค่ะ ก็นั่นคือทัศนคติที่สุดยอดสายลับและเมดที่สมบูรณ์แบบควรยึดถือนี่คะ"
10052065-32 = "(ต้องไปติดนิสัยแปลกๆ มาจากฮิมาริแน่ๆ เลย...)"
10052065-33 = "ครั้งนี้อาริสึจะได้เป็นคนปกป้องเคย์สินะคะ... อาริสึจะทำให้เต็มที่ค่ะ!"
10052065-34 = "อ่า... ปะ... เป็นอย่างนั้น... จนได้สินะคะ เอ่อ... ขอบคุณ... ค่ะ ต้องรบกวนด้วยนะคะ..."
10052065-35 = "ค่ะ! วางใจอาริสึได้เลยค่ะ!"
10052065-36 = "จะว่าไป ฉันเคยได้ยินว่าพื้นที่วิจัยของเคเทอร์ถูกปิดตายอย่างสมบูรณ์จากน้ำท่วมหลังเขื่อนแตกค่ะ"
10052065-37 = "ใช่แล้วละค่ะ สุดท้ายแล้ว ข้อสรุปที่พอจะหาได้ในตอนนั้นก็คือ ตัวจริงของเดคาแกรมมาทอนก็คือ AI ที่อยู่ในตู้ขายของอัตโนมัติ..."
10052065-38 = "ที่บังเอิญได้ยินเสียงบางอย่าง แล้วก็กลายเป็น AI ต้นแบบด้วยตัวเองน่ะ"
10052065-39 = "ขอบคุณที่ช่วยเสริมค่ะ เอมิ "
10052065-40 = "ไม่หรอก ฉันก็แค่นึกคำพูดของหัวหน้าในตอนนั้นได้น่ะ ที่บอกว่าเดคาแกรมมาทอนเป็นคนที่เพ้อฝัน และหลงผิดไปเองยังไงล่ะ"
10052065-41 = "ก็ถูกแล้วไม่ใช่เหรอคะ? มันทำไมเหรอคะ?"
10052065-42 = "ก็การที่หัวหน้าพูดแบบนั้น มันคือการมองว่าเดคาแกรมมาทอน... เป็นมนุษย์ที่มีบุคลิกภาพอย่างหนึ่ง#nไม่ใช่เหรอ? "
10052065-43 = "เห็นอย่างนี้หัวหน้าก็เข้มงวดเรื่องการเลือกใช้ภาษานี่นา"
10052065-44 = "กะ... ก็... ถ้าเราไม่ยอมรับในส่วนนั้นละก็... "
10052065-45 = "งั้นเราก็ต้องตั้งหมวดหมู่อื่นให้สหายที่ร่วมงานกับเราในตอนนี้อย่างน้อยสองคนไม่ใช่เหรอคะ...? "
10052065-46 = "ก็นั่นละค่ะ! เราควรลดเกณฑ์การจำแนกประเภทให้น้อยที่สุดเท่าที่จะเป็นไปได้ค่ะ!"
10052065-47 = "?"
10052065-48 = "..."
10052065-49 = "อย่างนี้นี่เอง เป็นเกณฑ์การจำแนกประเภทที่พิจารณาจากมุมมองของความสมเหตุสมผลสินะ เป็นข้อมูลอ้างอิงที่ดีเลยละ"
10052065-50 = "แต่คนอย่างคุณก็ไม่ควรยอมรับในส่วนนั้นขนาดนั้นสิคะ..."
10052065-51 = "งะ... งั้นเหรอ?"
10052065-52 = "เอาละๆ เราได้คอร์มาแล้วค่ะ"
10052065-53 = "ฉันจะแชร์ไปพร้อมกับภาพ <ต้นไม้แห่งชีวิต> ที่ปรากฏอยู่บนหน้าจอของยานขนส่งนะคะ ถ้ามีเวลาก็มาตรวจสอบได้เลยค่ะ"
10052065-54 = "ทางนี้ก็ตรวจสอบสำเร็จแล้ว ทุกคนทำได้ดีมาก"
10052065-55 = "ปาปัม ปาปัม ป๊าม! เคย์อัปเลเวลเป็นเลเวล 10 แล้วค่ะ! รักษาระดับต่อไปเรื่อยๆ นะคะ!"
10052065-56 = "ค่ะ อาริสึ ทำแบบนั้นละค่ะ"
10052065-61 = "อืม... แล้วฉันก็มีเรื่องอยากขอร้องคุณครู... นิดหน่อยด้วยค่ะ"
10052065-62 = "[s] \"หืม? เรื่องอะไรเหรอ?\""
10052065-63 = "ช่วยลดเสียงลงหน่อยสิคะ!"
10052065-64 = "คือว่า... ไว้คุณครูช่วยไปบอกฮิมาริ..."
10052065-65 = "บอกว่าฉันขอบคุณฮิมาริให้หน่อยได้มั้ยคะ?"
10052065-66 = "[ns] \"...\""
10052065-68 = "[ns] \"ไม่ต้องห่วงนะ! ครูจะไปบอกให้แน่นอน!\""
10052065-69 = "ก็บอกให้ลดเสียงลงหน่อยยังไงล่ะคะ! ไม่เข้าใจคำที่ฉันพูดหรือยังไงคะ!"
10052065-70 = "มีเรื่องอะไรเหรอคะ เคย์? คุณครู?"
10052065-71 = "มะมะมะมะมะมะ... ไม่มีอะไรทั้งนั้นค่ะ! ไม่มีเลยจริงๆ ค่ะ! ใช่มั้ยคะ คุณครู?!"
10052065-75 = "[ns] \"อ้อ! อาริสึ! พอดีว่าเคย์จัง...\""
10052065-77 = "เงียบๆ ไปเลยค่ะ!!!!!"
