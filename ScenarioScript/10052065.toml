[translation]
10052065-2 = "確認凱瑟沉默。"
10052065-3 = "嗚嗚嗚……嗚嗚嗚嗚……"
10052065-4 = "做得好，柚子。#n真厲害呢。"
10052065-5 = "謝謝你的誇獎……"
10052065-6 = "Kei！這邊！拜託你了！"
10052065-10 = "好的。後續流程拜託你了，陽葵。"
10052065-11 = "已確認完畢。現在開始傳送彈射座標，請大家避開那個位置。"
10052065-12 = "開始空降！"
10052065-16 = "姐姐，拜託你……嗯？#n姐姐……"
10052065-23 = "呼……再次感受到，這真是既迅速又……[ruby=野蠻]直覺式[/ruby]的會合方式呢……"
10052065-24 = "我完全同意……"
10052065-25 = "區域掌控幾乎完成了。#n能確保核心嗎，Kei？"
10052065-26 = "可以，那並不困難。#n問題是在此期間……"
10052065-28 = "[ns] 「為了以防萬一，請大家守住那裡。」"
10052065-29 = "請放心，老師。我在這方面也很專業。"
10052065-30 = "……你對大部分的領域都會說自己很專業吧？"
10052065-31 = "是的。那正是最棒的完美女僕兼特務應該追求的姿態。"
10052065-32 = "（怎麼想都覺得，他好像從陽葵身上學到了奇怪的習慣……）"
10052065-33 = "這次輪到愛麗絲來保護Kei了呢……愛麗絲，會全力以赴的！"
10052065-34 = "啊，確，確實……是這樣呢。#n那，那個……謝，謝謝。交給你了……"
10052065-35 = "沒問題！包在愛麗絲身上！"
10052065-36 = "話說凱瑟的研究地區，據說因為水壩崩塌引發的洪水而被完全封鎖了呢。"
10052065-37 = "沒錯。結果在那個時間點能得出的結論是，十字神名的本體是自動販賣機的AI……"
10052065-38 = "還有它是在聽見某種幻聽之後，自己進化成了超AI之類的。"
10052065-39 = "謝謝你的補充，英美。"
10052065-40 = "不會，只是我突然想到……當時部長把十字神名稱為妄想症患者的事。"
10052065-41 = "……它確實是妄想症患者沒錯吧？有什麼問題嗎？"
10052065-42 = "那不就代表部長把十字神名視為一種人格……當作人類一樣對待了嗎？"
10052065-43 = "畢竟部長在用字遣詞方面是很嚴格的。"
10052065-44 = "那，那是因為……如果不承認那一點的話……"
10052065-45 = "比如說……現在和我們同行的同伴中，至少有兩個人需要用不同的分類不是嗎？"
10052065-46 = "所以就是那樣！#n分類標準之類的東西越少越好嘛！"
10052065-47 = "？"
10052065-48 = "……"
10052065-49 = "原來如此。是從合理性的角度來看待分類標準啊。#n很有參考價值。"
10052065-50 = "我覺得至少你不應該這樣理解那個部分……"
10052065-51 = "是，是嗎？"
10052065-52 = "好。成功確保核心了。"
10052065-53 = "情報會跟運輸船顯示器上的「生命之樹」實時同步，有需要的話隨時可以查看。"
10052065-54 = "這邊也確認完畢。大家辛苦了。"
10052065-55 = "乓啪喀乓！Kei的等級提升了10！#n只要像這樣繼續前進就行了！"
10052065-56 = "是的，愛麗絲。那樣就沒問題了。"
10052065-61 = "老師……我有個小小的請求……"
10052065-62 = "[s] 「嗯？什麼事？」"
10052065-63 = "小聲一點！"
10052065-64 = "那個……之後麻煩幫我向陽葵他……"
10052065-65 = "轉達一聲謝謝。"
10052065-66 = "[ns] 「……」"
10052065-68 = "[ns] 「不用擔心！我一定會告訴他的！」"
10052065-69 = "就跟你說小聲一點！到底有沒有在聽別人說話啦！"
10052065-70 = "怎麼了嗎，Kei？老師？"
10052065-71 = "沒，沒什麼！什麼都沒有！對吧，老師！？"
10052065-75 = "[ns] 「事情是這樣的！你聽我說哦，愛麗絲！Kei醬他──」"
10052065-77 = "給我安靜一點！！！！！"
