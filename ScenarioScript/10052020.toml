[translation]
10052020-1 = "JEHOVAH ELOHIM"
10052020-2 = "抵達Point Oscar。#n那麼……開始吧。"
10052020-3 = "[s] 「我們能幫忙做點什麼嗎？」"
10052020-4 = "首先……我會用這個HMD連接這片區域的網路。"
10052020-9 = "只靠視覺資訊的輸入輸出應該是不夠的……#n啊啊，原來如此。那套服裝裡安裝了能放大體內神經電訊號的裝置對吧。"
10052020-10 = "沒錯。所以這片區域的網路會藉由這個HMD，以概念空間的形式被我感知。"
10052020-11 = "其中的所有資料都會帶著三維座標值化為圖像，在無限的空間內形成集群──"
10052020-12 = "我懂了，會長！#n我已經看出會長的套路了！"
10052020-13 = "唔，唔嗯……？"
10052020-14 = "禁止使用別人聽不懂的複雜解釋！#n請養成從結論開始簡單說明的習慣！"
10052020-15 = "嗯，這次我也贊同姐姐的意見。#n雖然知道莉央會長其實希望親切地為大家說明……"
10052020-16 = "……不過有時候有點過頭了。#n尤其是像現在這種時間有限的時候。"
10052020-17 = "（我倒是覺得剛剛好呢……）"
10052020-22 = "[ns] 「那麼再重來一次。我們能做點什麼嗎？」"
10052020-23 = "那麼……在我平安回來之前，希望你們能守住這附近。"
10052020-24 = "因為在Net Running期間，我免不了會陷入毫無防備的狀態。"
10052020-25 = "然後為了以防萬一，請Kei負責輔助我吧。"
10052020-26 = "知道了！那我們走吧，綠！柚子！"
10052020-33 = "姑且問你一下，那個HMD看起來只準備了一個……"
10052020-34 = "這樣我也沒什麼能輔助的吧？"
10052020-35 = "目前是這樣沒錯。#n但是如果發生什麼事的話……"
10052020-36 = "我希望Kei能接手這個HMD。"
10052020-37 = "咦？那是什麼意思……？"
10052020-41 = "……你該不會在想什麼奇怪的事吧！？#n不，神經電訊號的放大是雙向的……"
10052020-42 = "萬一Running失敗的話，回饋也會在放大之後被傳回來……？"
10052020-43 = "沒錯，確實如此。#n假如失敗的話……"
10052020-44 = "我大概會連同神經一起被燒焦吧。"
10052020-45 = "你瘋了嗎！？快把那個東西交給我！#n這個身體至少比你們人類更能承受電擊！"
10052020-47 = "[ns] 「我也不能同意讓你承擔這種風險，莉央。」"
10052020-48 = "不，這樣才是正確的。因為Kei……是我們最後的堡壘。#n當然，我和Kei雙雙失敗的可能性也不是沒有。"
10052020-49 = "但是即便如此，讓Kei先嘗試這件事也是不對的。"
10052020-50 = "而且至少在這件事上，希望老師你能夠相信我。"
10052020-51 = "如果這件事真的那麼危險、可能性那麼低的話……陽葵不是應該會拚命阻止我嗎？"
10052020-53 = "唔，那是……！"
10052020-54 = "[ns] 「……你是要我相信你們所有人嗎？」"
10052020-55 = "是的。請這麼做吧。"
10052020-60 = "……如果發現異常的話，我會強行阻止你的。#n這種程度你就別抱怨了。"
10052020-61 = "我知道了。"
10052020-62 = "那麼，我走了。"
10052020-67 = "唔……！"
10052020-68 = "（好暈……資訊量太多，感覺快要被沖走了……）"
10052020-69 = "（而且這種漂浮在空中的感覺……就像失去座標在漂流一樣）"
10052020-70 = "（先暫且增加一項虛擬重力的參數……）"
10052020-77 = "呼……稍微好一點了嗎？"
10052020-78 = "（話說，真是驚人的景象啊……）"
10052020-79 = "來得也太慢了吧？等你等到我都快老了耶？#n當然我們實際上不會老就是了。"
10052020-80 = "！？"
10052020-83 = "歡迎你，調月莉央。"
10052020-84 = "你是，Aur……！"
10052020-85 = "哎呀，你記住我們的名字了嗎？#n雖然挺感謝的，可惜沒什麼意義就是了。#n因為你的時間，將在這裡結束。"
10052020-86 = "那麼，請你去死吧！"
10052020-87 = "！！！"
10052020-92 = "哦？怎麼，你還挺會躲的嘛？那麼這樣如何？"
10052020-96 = "腳下居然……！？"
10052020-97 = "你習慣自由落體嗎？"
10052020-101 = "你在這個網路場域也構建了基於重力的地形結構呢。"
10052020-102 = "不過那對你們來說也是正常的吧。#n沒錯，要說那是無意識產生的想法也不為過。"
10052020-103 = "嗚……！"
10052020-104 = "但是我們不受那種東西的束縛。"
10052020-105 = "如果用Soph的話來說……#n我們和靈魂被重力束縛的你們相比，從發想的根源就不一樣。"
10052020-106 = "這樣如何？"
10052020-110 = "重力變成橫向了……！？！？"
10052020-111 = "向右落下的感覺怎麼樣呀？#n這次往左！接著往上！"
10052020-117 = "然後最後慈悲地，讓你往正下方掉下去！"
10052020-124 = "唔……！"
10052020-126 = "多少有點掃興了。#n差不多該結束了吧？"
10052020-127 = "在這裡的我們，可以說是一種意識體……"
10052020-128 = "再次借用Soph的比喻，就像是電子幽靈一樣的存在。"
10052020-129 = "從這個意義上來說，在這裡受到的物理傷害，不會影響到實際的肉體。"
10052020-131 = "不過相對地，那將會直接作用於你的精神本身。"
10052020-132 = "接著就來道問答題吧。"
10052020-134 = "如果在這裡「死了」的話，現實中的你會發生什麼事呢？"
10052020-135 = "……超過容許範圍的電擊衝擊，會把大腦直接燒毀吧。"
10052020-136 = "哦？你的思考居然能跟得上啊？#n我就稍微認可你一下吧。"
10052020-137 = "那麼……"
10052020-138 = "……"
10052020-142 = "可，可是這樣……真的好嗎……？#n就算是那些人，一旦碰上了那孩子……"
10052020-143 = "會，會死掉的哦……？"
10052020-144 = "嗯……那確實是個複雜的問題呢。"
10052020-145 = "雖然我們從來沒有傷害過任何人，也沒有產生過類似的想法……"
10052020-150 = "……嘖。"
10052020-151 = "做好覺悟吧，調月莉央！"
10052020-163 = "還沒結束……！我還沒有放棄……！"
10052020-164 = "沒用的！"
10052020-165 = "……！"
10052020-166 = "你可真是破綻百出啊！"
10052020-181 = "啊……！"
10052020-186 = "別愣在原地發呆了，快起來吧？"
10052020-191 = "嗯……？"
10052020-192 = "咦咦？？？"
10052020-193 = "陽葵……！？"
10052020-199 = "呵呵。"
10052020-201 = "我早就知道會這樣了，莉央。#n無法坐視不管的超天才病弱美少女親自來支援你了，別忘了要感謝我唷？"
10052020-202 = "你……那輛機車……"
10052020-203 = "這是輪椅。"
10052020-204 = "可是那分明是機車……"
10052020-205 = "這．是．輪．椅。"
10052020-206 = "我，我知道了……"
10052020-208 = "你還是放棄吧，莉央。#n他死也要堅持那是輪椅。"
10052020-209 = "誠如先前所說，我基本上是負責後方支援的工作。#n不過假如有需要的話，也隨時可以像這樣坐著輪椅趕過去哦？"
10052020-210 = "簡直可以說是萬能戰鬥美少女了呢。#n更重要的是，這部輪椅還有隱藏功能……"
10052020-211 = "……"
10052020-212 = "呵呵，還是就此打住吧。#n畢竟所謂的祕密，就在保持神祕的時候最強大嘛。"
10052020-213 = "尤其對於像我這樣的超天才病弱美少女騎……#n更正，超天才美少女病弱美少女來說，點到為止才是最適合的。"
10052020-214 = "……你剛才說了兩次美少女吧？"
10052020-215 = "哎呀，Kei。你還不太懂呢。"
10052020-216 = "對於像我這樣清純的一朵花、純淨無瑕的一級礦泉水，#n以及萬年雪結晶般綽號相配的世紀淑女來說……"
10052020-217 = "美少女這樣的詞，重複使用多少次都沒有任何問題。"
10052020-218 = "英美……快來救我……#n我現在精神有點恍惚了……"
10052020-222 = "來吧，下一招會是什麼呢？#n我們的小千金Aur小姐。"
10052020-223 = "目前為止的模式，已經被我超天才病弱美少女兼電腦妖精的明星陽葵全部掌握了哦？"
10052020-224 = "……明星陽葵跟過來了啊。#n即便如此，在這個地方……"
10052020-225 = "在這個由我Aur支配的空間裡……！"
10052020-226 = "你們從一開始就沒有勝利的可能！！！"
10052020-231 = "（唔，確實有點吃力呢……！）"
10052020-232 = "（不過現在，必須盡可能厚臉皮地爭取時間……！！！）"
10052020-233 = "哎呀，你真的這麼認為嗎？#n這次的攻擊也沒什麼大不了的哦？"
10052020-234 = "真是自信滿滿呢。#n在這個空間裡，我可以做任何想做的事，也可以成為任何東西。"
10052020-235 = "目前為止我所展現的，應該足以讓你明白了吧？"
10052020-236 = "調月莉央也好，明星陽葵也罷……#n雖然既愚蠢又低劣，至少還是具備那種程度的智力吧。"
10052020-237 = "這次想往哪個方向掉呢？要試試對角線嗎？"
10052020-238 = "小心，陽葵！這裡的重力是Aur……！"
10052020-242 = "？"
10052020-248 = "？？？"
10052020-249 = "呵呵呵。"
10052020-250 = "什，什麼……怎麼回事？#n再來一次……！"
10052020-257 = "……好像什麼都沒發生？"
10052020-258 = "咦，咦咦！？"
10052020-259 = "哎呀，嚇到你了嗎？"
10052020-260 = "我的信號無法輸入……！？"
10052020-261 = "你做了什麼，明星陽葵！！！"
10052020-262 = "想知道嗎？"
10052020-267 = "部長、會長。聽得到嗎？"
10052020-268 = "已經按照指示把這裡……那個……雖然不是很清楚。"
10052020-269 = "總之全部破壞掉了。"
10052020-270 = "辛苦你了，英美。#n時機恰到好處哦。"
10052020-271 = "嗯，那麼通訊就先到這邊。"
10052020-275 = "……"
10052020-276 = "…………"
10052020-277 = "………………"
10052020-278 = "全部破壞掉了！？！？#n難道是那裡的通訊樞紐系統！？！？"
10052020-279 = "某種意義上來說……那是最快的破解方式呢。"
10052020-280 = "你們人類果然無藥可救！！！"
10052020-281 = "……對不起。"
10052020-282 = "你為什麼要道歉啊，莉央。"
10052020-283 = "抱，抱歉……"
10052020-284 = "好，這樣條件就平等了。#n差不多也該放棄了吧，Aur？#n現在的話我還可以放過你哦。"
10052020-285 = "誰會讓你們繼續稱心如意啊！？"
