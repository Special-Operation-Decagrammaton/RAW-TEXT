10052020-165 = "...!"
10052020-166 = "ขนาดฉันเข้ามาหาจากด้านข้าง คุณยังไม่รู้ตัวเลย!"
10052020-181 = "อ๊ะ...!"
10052020-186 = "มัวทำอะไรอยู่ล่ะ? รีบหลบเข้าสิคะ"
10052020-191 = "เอ๋...?"
10052020-192 = "หืม???"
10052020-193 = "ฮิมาริ...?!"
10052020-199 = "ฮุฮุ"
10052020-201 = "ฉันรู้ว่าจะเป็นอย่างนี้ค่ะ ริโอะ สาวน้อยรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษทนไม่ได้จนออกมาซัพพอร์ต#nด้วยตัวเองเลยนะคะ คุณน่ะโชคดีแค่ไหนแล้ว"
10052020-202 = "เธอ... แล้วก็มอเตอร์ไซค์นั่น..."
10052020-203 = "วีลแชร์ค่ะ"
10052020-204 = "แต่ว่า มันรูปร่างเหมือนมอเตอร์ไซค์..."
10052020-205 = "วีล แชร์ ค่ะ"
10052020-206 = "กะ... ก็ได้..."
10052020-208 = "ยอมแพ้ไปเถอะค่ะ ริโอะ ให้ตายยังไงก็คงบอกว่าเป็นวีลแชร์อยู่ดีละค่ะ"
10052020-209 = "อย่างที่ฉันเคยบอกไปว่าหน้าที่หลักของฉันคือการสนับสนุนจากด้านหลัง แต่ถ้าต้องการละก็ ฉันนั่งวีลแชร์มาหาแบบนี้ได้เสมอเลยค่ะ"
10052020-210 = "จะเรียกว่าสาวน้อยนักสู้ครอบจักรวาลก็ได้นะคะ เพราะฟังก์ชันลับของวีลแชร์นี้ก็คือ..."
10052020-211 = "..."
10052020-212 = "ฮุฮุ ฉันขอไม่อธิบายมากกว่านี้ดีกว่าค่ะ ก็ความลับจะทรงพลังมากที่สุดเมื่อมันยังคงเป็นความลับนี่คะ"
10052020-213 = "แล้วสาวน้อยนักบิด... ฉันหมายถึงสาวน้อยรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษก็อยากมีความลับเหมือน#nอย่างคนอื่นเขาบ้างค่ะ"
10052020-214 = "เมื่อกี้พูดคำว่าสาวน้อยไป 2 รอบหรือเปล่าคะ...?"
10052020-215 = "ตายจริง เคย์ยังไม่เข้าใจฉันอย่างถ่องแท้สินะคะ "
10052020-216 = "สำหรับกุลสตรีแห่งยุคสมัยอย่างฉันที่คู่ควรกับฉายาดอกไม้งามบริสุทธิ์ น้ำแร่เกรดพรีเมียมที่ใสสะอาด และคริสตัลแห่งหุบเขาหมื่นปีแล้วนั้น"
10052020-217 = "ต่อให้จะใช้คำว่า 'สาวน้อย' สักกี่ครั้งก็ไม่เป็นปัญหาหรอกค่ะ"
10052020-218 = "เอมิ... มาช่วยเร็วๆ ทีค่ะ... ตอนนี้สติฉันเริ่มไม่สมประดีแล้วค่ะ..."
10052020-222 = "เอาละ งั้นต่อไปจะเป็นอะไรเหรอคะ? หนูออร์ สาวน้อยตัวเล็กของเรา"
10052020-223 = "จะบอกให้ว่าอาเกโบชิ ฮิมาริ สาวน้อยรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษและนางฟ้าไซเบอร์คนนี้ วิเคราะห์แพทเทิร์นที่ผ่านมาออกหมดแล้วละค่ะ"
10052020-224 = "อาเกโบชิ ฮิมาริตามมาด้วยสินะคะ... แต่ถึงยังไง..."
10052020-225 = "ตราบใดที่อยู่ในพื้นที่ปกครองของฉันคนนี้ละก็...!"
10052020-226 = "พวกคุณก็ไม่มีโอกาสชนะตั้งแต่แรกอยู่แล้วค่ะ!!!"
10052020-231 = "(อึก... เริ่มจะรับมือไม่ไหวแล้ว...!)"
10052020-232 = "(แต่ตอนนี้ก็ต้องยื้อเวลาเอาไว้ให้มากที่สุด...!!!)"
10052020-233 = "ตายจริง คิดอย่างนั้นจริงๆ เหรอคะ? แต่ครั้งนี้มันก็ไม่ได้หนักหนาอะไรเลยนะคะ"
10052020-234 = "ดูมั่นใจเหลือเกินนะคะ แต่จากทุกอย่างที่ฉันทำให้เห็นจนถึงตอนนี้ คุณก็น่าจะรู้ดีแล้วไม่ใช่เหรอคะ"
10052020-235 = "ว่าอย่างน้อยในที่แห่งนี้ ฉันคนนี้สามารถทำอะไรก็ได้ และจะเป็นอะไรก็ได้น่ะ"
10052020-236 = "ถึงสึคัตสึกิ ริโอะกับอาเกโบชิ ฮิมาริจะต่ำต้อยและด้อยปัญญาแค่ไหน แต่อย่างน้อยก็น่าจะพอมี#nความคิดอยู่บ้างใช่มั้ยล่ะคะ?"
