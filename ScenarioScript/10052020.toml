[translation]
10052020-1 = "JEHOVAH ELOHIM"
10052020-2 = "มาถึงจุดออสการ์แล้ว ถ้างั้นก็... จะเริ่มเลยนะ"
10052020-3 = "[s] \"ให้พวกเราช่วยอะไรดีล่ะ?\""
10052020-4 = "อันดับแรก... ฉันจะเชื่อมต่อเครือข่ายของพื้นที่นี้ด้วย HMD นี้ก่อน"
10052020-9 = "ลำพังแค่รับส่งข้อมูลภาพอย่างเดียวน่าจะไม่พอนะ... อ้อ คงจะติดตั้งอุปกรณ์ขยายสัญญาณประสาท#nไว้ในชุดนั้นแล้วสินะคะ"
10052020-10 = "ใช่แล้วละ แล้วฉันก็จะรับรู้เครือข่ายในพื้นที่นี้ได้ในรูปแบบพื้นที่เชิงมโนทัศน์ผ่าน HMD นี้"
10052020-11 = "ข้อมูลทั้งหมดในนั้นจะถูกแปลงเป็นรูปภาพที่คงค่าพิกัดแบบสามมิติเอาไว้ และรวมกลุ่มกันเป็น#nคลัสเตอร์ภายในพื้นที่อันไร้ขอบเขต..."
10052020-12 = "เข้าใจแล้วละ ประธาน! ฉันเข้าใจแพทเทิร์นของประธานแล้ว!"
10052020-13 = "หะ... หืม...?"
10052020-14 = "หยุดอธิบายอะไรซับซ้อนจนคนอื่นเข้าใจยาก! แล้วช่วยหัดนิสัยพูดสรุปประเด็นให้เข้าใจง่ายๆ ตั้งแต่แรกเถอะนะ!"
10052020-15 = "อ่า... อื้อ ครั้งนี้ฉันเห็นด้วยกับพี่โมโมอิค่ะ ต่อให้ฉันจะเข้าใจว่าประธานริโอะเป็นคนที่อยากอธิบายให้#nทุกคนรู้ก็เถอะ..."
10052020-16 = "แต่บางครั้งมันก็มากเกินไปค่ะ... โดยเฉพาะอย่างยิ่งในสถานการณ์ฉุกเฉินแบบนี้น่ะค่ะ"
10052020-17 = "(แต่ฉันว่ามันกำลังดีเลยนะ...)"
10052020-22 = "[ns] \"เอาละ ขอถามอีกรอบ อยากให้พวกเราทำอะไรดี?\""
10052020-23 = "อยากให้... ช่วยดูพื้นที่บริเวณนั้นไว้... จนกว่าฉันจะกลับมาอย่างปลอดภัยก็พอ"
10052020-24 = "นั่นก็เพราะระหว่างที่ฉันเชื่อมต่อเข้าระบบ ฉันจะตกอยู่ในสภาพไร้การป้องกัน"
10052020-25 = "แล้วก็เคย์ ช่วยสนับสนุนฉัน เผื่อมีอะไรฉุกเฉินด้วยนะ"
10052020-26 = "เข้าใจแล้ว! งั้นก็ไปกันเถอะ มิโดริ! ยูสึ! "
10052020-33 = "ฉันขอถามเผื่อไว้เฉยๆ นะคะ HMD นั่นก็น่าจะมีเตรียมไว้แค่เครื่องเดียว"
10052020-34 = "ถ้างั้นจะให้ฉันช่วยทำอะไรเหรอคะ?"
10052020-35 = "ตอนนี้ยังมีเครื่องเดียวอย่างที่ว่านั่นละ แต่ถ้าเกิดเรื่องอะไรขึ้นมาละก็..."
10052020-36 = "ฉันอยากให้เคย์ช่วยรับช่วงต่อในการใช้ HMD นี้น่ะ"
10052020-37 = "เดี๋ยวนะคะ? หมายความว่ายังไง...?"
10052020-41 = "นี่คุณไม่ได้คิดอะไรแปลกๆ ใช่มั้ยคะ? เดี๋ยวนะ การขยายสัญญาณประสาทเป็นแบบส่งผ่านถึงกัน..."
10052020-42 = "ถ้าเกิดเชื่อมต่อเข้าระบบไม่สำเร็จขึ้นมา ผลกระทบที่จะตีกลับก็จะขยายความรุนแรงขึ้นด้วย...?"
10052020-43 = "ใช่ เป็นอย่างนั้นละ และถ้าเกิดล้มเหลวขึ้นมา..."
10052020-44 = "สมองของฉันคงได้ถูกย่างจนไหม้เกรียมแน่ๆ"
10052020-45 = "นี่คุณบ้าไปแล้วเหรอคะ?! ส่งมาให้ฉันเดี๋ยวนี้เลยค่ะ! อย่างน้อยร่างของฉันในตอนนี้ก็ทนทานต่อ#nไฟฟ้าช็อตได้ดีกว่าร่างกายมนุษย์นะคะ!"
10052020-47 = "[ns] \"ครูก็ไม่เห็นด้วยกับการเสี่ยงอันตรายแบบนั้นนะ ริโอะ\""
10052020-48 = "ไม่หรอก แบบนี้ละถูกแล้ว เคย์คือปราการสุดท้ายของพวกเรา... ถึงจะมีความเป็นไปได้ที่ฉันและเคย์#nจะล้มเหลวกันไปทีละคน"
10052020-49 = "แต่อย่างน้อย การให้เคย์เป็นคนแรกที่ต้องเจอเรื่องแบบนี้ มันก็ไม่ถูกต้องอยู่ดี"
10052020-50 = "แล้วฉันก็อยากให้ครูเชื่อใจฉันในครั้งนี้ด้วย"
10052020-51 = "ถ้างานครั้งนี้มันอันตรายและมีโอกาสสำเร็จต่ำขนาดนั้นละก็... ฮิมาริก็คงพยายามห้ามไม่ให้ฉันมา#nตั้งแต่แรกแล้วละ"
10052020-53 = "อึก เรื่องนั้นมัน...!"
10052020-54 = "[ns] \"อยากให้ครูเชื่อใจในตัวทุกๆ คนใช่มั้ย...?\""
10052020-55 = "ใช่แล้วละ ช่วยเชื่อใจพวกฉันเถอะนะ"
10052020-60 = "ถ้าฉันเห็นความผิดปกติอะไร ฉันจะลากคุณออกมาจากตรงนั้นเลยค่ะ... ถึงตอนนั้นก็อย่าบ่นกันนะคะ"
10052020-61 = "เข้าใจแล้ว"
10052020-62 = "เอาละ งั้นเดี๋ยวฉันกลับมานะ"
10052020-67 = "อึก...!"
10052020-68 = "(เวียนหัวจัง... มีข้อมูลมากเกินจนรู้สึกเหมือนจะถูกกวาดไปทั้งอย่างนั้นเลย...)"
10052020-69 = "(ที่สำคัญก็คือความรู้สึกเหมือนอยู่กลางอากาศ... ราวกับฉันสูญเสียพิกัดและลอยเคว้งอยู่ด้วย)"
10052020-70 = "(ขอเพิ่มแรงโน้มถ่วงเสมือนเป็นการชั่วคราวหน่อยแล้วกัน...)"
10052020-77 = "ฮู่ว... รู้สึกดีขึ้นมาบ้างแล้ว"
10052020-78 = "(จะว่าไป ที่นี่กว้างใหญ่มากเลยนะ...)"
10052020-79 = "แหม กว่าจะมาได้ มาช้าเกินไปหรือเปล่าคะ? ฉันรอคุณนานจนคิดว่าตัวเองเริ่มแก่แล้วเสียอีกค่ะ ถึงพวกฉันจะอายุเพิ่มขึ้นไม่ได้ก็เถอะ"
10052020-80 = "??!!"
10052020-83 = "เชิญเข้ามาสิคะ สึคัตสึกิ ริโอะ ยินดีต้อนรับค่ะ"
10052020-84 = "เธอก็คือ... ออร์...!"
10052020-85 = "หืม? จำชื่อพวกฉันแต่ละคนได้ด้วยเหรอคะ? น่าซาบซึ้งใจดีจังเลยนะคะ แต่ก็คงไม่ได้มีความหมาย#nอะไรมากหรอกค่ะ เพราะเวลาของคุณจะสิ้นสุดลงที่นี่ยังไงล่ะคะ"
10052020-86 = "ถ้างั้นก็ช่วยตายไปเถอะค่ะ!"
10052020-87 = "!!!"
10052020-92 = "โอ้ หลบได้เก่งไม่เบาเลยนี่คะ? ถ้างั้นก็เจอแบบนี้หน่อยมั้ยคะ?"
10052020-96 = "ที่ใต้เท้าของฉัน...!?"
10052020-97 = "คุ้นเคยกับการตกอย่างอิสระหรือเปล่าคะ?"
10052020-101 = "คุณสร้างโครงสร้างทางภูมิศาสตร์ที่อาศัยแรงโน้มถ่วงได้แม้กระทั่งในพื้นที่เครือข่ายนี้เลยนะคะ"
10052020-102 = "แต่ฉันไม่ได้จะว่าอะไรเกี่ยวกับเรื่องนั้นหรอกค่ะ นั่นคงเป็นธรรมชาติของพวกคุณน่ะ ใช่ค่ะ มันเริ่มต้นจากระดับจิตใต้สำนึกเลยค่ะ"
10052020-103 = "อึก...!"
10052020-104 = "แต่พวกฉันก็ไม่ถูกผูกมัดด้วยเรื่องพรรค์นั้นหรอกค่ะ"
10052020-105 = "ถ้าจะยืมคำของซอฟมาพูด ก็ต้องบอกว่าพวกฉันกับคุณต่างกันตั้งแต่บ่อเกิดแห่งความคิดแล้วค่ะ ก็จิตใจของพวกคุณถูกตรึงไว้ด้วยแรงโน้มถ่วงนี่คะ"
10052020-106 = "ลองเจอแบบนี้หน่อยเป็นไงคะ?"
10052020-110 = "แรงโน้มถ่วงเปลี่ยนมาเป็นด้านข้างงั้นเหรอ...?!?!"
10052020-111 = "พอได้ตกไปทางขวาแล้วรู้สึกยังไงบ้างคะ? ต่อไปก็ทางซ้าย! ต่อไปขึ้นข้างบน!"
10052020-117 = "และสุดท้าย ฉันจะปล่อยคุณตกลงไปข้างล่างด้วยความเมตตาเลยค่ะ!"
10052020-124 = "อะ... อึก...!"
10052020-126 = "ชักจะหมดสนุกแล้วสิ งั้นก็มาจบกันเลยดีมั้ยคะ?"
10052020-127 = "พวกฉันที่อยู่ ณ ที่แห่งนี้คือจิตสำนึกที่มีชีวิต..."
10052020-128 = "ถ้าจะยืมคำเปรียบเปรยของซอฟมาพูดอีกครั้ง ก็ต้องบอกว่าพวกฉันไม่ต่างกับวิญญาณอิเล็กทรอนิกส์#nหรอกค่ะ"
10052020-129 = "และนั่นก็หมายความว่า ความเสียหายทางกายภาพในที่แห่งนี้จะไม่ส่งผลต่อร่างกายจริง"
10052020-131 = "ในอีกแง่หนึ่งก็หมายความว่า มันจะส่งผลโดยตรงต่อจิตใจของคุณค่ะ"
10052020-132 = "ถ้างั้นฉันขอตั้งคำถามสักข้อ"
10052020-134 = "ถ้าเกิดคุณ 'ตาย' ที่นี่ แล้วคุณที่อยู่ในความเป็นจริงจะเป็นยังไงคะ?"
10052020-135 = "ถ้าเจอแรงช็อตไฟฟ้าที่เกินขีดจำกัด... สมองก็คงจะไหม้เกรียม"
10052020-136 = "โอ้โห อะไรกันเนี่ย อ่านสถานการณ์ได้เก่งพอตัวเลยนะคะ คงต้องยอมรับในส่วนนี้เลยค่ะ"
10052020-137 = "ถ้างั้นก็..."
10052020-138 = "..."
10052020-142 = "ตะ... แต่ว่า... จะไม่เป็นไร... จริงๆ เหรอคะ...? ถ้าได้เจอกับเด็กคนนั้น ต่อให้เป็นคนพวกนั้นก็ตาม..."
10052020-143 = "ก็ไม่น่า... จะรอดนะคะ...?"
