[translation]
10052020-1 = "Jehovah Elohim"
10052020-2 = "Point Oscar, successfully reached. I'll...get started."
10052020-3 = "[s] \"How can we help?\""
10052020-4 = "First, I'll use this HMD to interface with the local network."
10052020-9 = "Standard VR won't be enough... Ah, I see. You've installed a signal augmenter in this device. It goes beyond audio and visual."
10052020-10 = "Correct. I'll be able to enter this network via the HMD and interface with it as a synthetic manifold."
10052020-11 = "All of the network's data will be generated into an infinite space, bound in three dimensions."
10052020-12 = "Okay! I finally see the problem, Rio!"
10052020-13 = "H-Huh...?"
10052020-14 = "We're banning you from giving difficult explanations for the rest of this mission. Please simplify."
10052020-15 = "Ah, yeah. I actually agree with Sis this time. I appreciate that you're TRYING to make it easy to understand..."
10052020-16 = "...But it can be a little much, especially in an urgent situation like this."
10052020-17 = "(I thought it made sense...)"
10052020-22 = "[ns] \"Now then. What do you need US to do?\""
10052020-23 = "Basically, until I return safely, please defend...this area. And me."
10052020-24 = "I'll be vulnerable while I'm in the net."
10052020-25 = "And Kei, please watch my back."
10052020-26 = "Okay! Securing the perimeter! Let's go, Midori! Yuzu! "
10052020-33 = "Rio, perhaps this is an obvious question. You only have one HMD."
10052020-34 = "I can't actually help with anything, can I?"
10052020-35 = "For now. But if something happens to me..."
10052020-36 = "I want you to take this HMD."
10052020-37 = "...Huh? What does that mean...?"
10052020-41 = "...! You're not planning anything reckless, are you? Why do I even ask? You're amplifying bioelectric currents..."
10052020-42 = "So if you fail in there, then the synaptic backlash could..."
10052020-43 = "...Yes. It would also be amplified."
10052020-44 = "My brain would be completely fried."
10052020-45 = "Are you insane?! Give me that thing. My body could probably handle a shock much better than yours."
10052020-47 = "[ns] \"Rio. I don't want you taking a risk like that.\""
10052020-48 = "No. I need to do this. Kei...remains our last line of defense. Of course, I realize that Kei and I could both fail."
10052020-49 = "But I know I can't ask her to attempt before I do. "
10052020-50 = "Sensei, please trust my judgment."
10052020-51 = "After all, if this were so dangerous...Himari wouldn't have let me come down here, would she?"
10052020-53 = "Ugh, that's...!"
10052020-54 = "[ns] \"...I can trust you here, right?\""
10052020-55 = "Yes. Please do."
10052020-60 = "...If I so much as see a twitch, I'm ripping that thing off. And you better not complain about it."
10052020-61 = "Understood."
10052020-62 = "Then...I'm going in."
10052020-67 = "Ugh...!"
10052020-68 = "(My head is spinning... I feel like I'm drowning in a sea of information.)"
10052020-69 = "(It's like I'm floating. I could lose my coordinates.)"
10052020-70 = "(For now, let's implement a virtual gravity to...)"
10052020-77 = "Phew... That's a little better."
10052020-78 = "(In any case, what a sight.)"
10052020-79 = "Oh my, you've certainly taken your time. I thought I'd grow old waiting for you...even though I don't age."
10052020-80 = "?!"
10052020-83 = "Welcome, Tsukatsuki Rio. A pleasure, I'm sure."
10052020-84 = "You're Ohr...!"
10052020-85 = "Oh, You remember me? That's so sweet, not that it matters. I'll try to savor your last, thoughtful words."
10052020-86 = "Now then, kindly drop dead."
10052020-87 = "Ah!!"
10052020-92 = "Huh. Agile, aren't you? But can you dodge this?"
10052020-96 = "?! The floor is...?!"
10052020-97 = "My, it looks like you've fallen from grace."
10052020-101 = "You went through all the trouble of programming artificial gravity and everything..."
10052020-102 = "That's...so adorably human. To try to ground yourself. To attempt to grasp control."
10052020-103 = "Ugh!"
10052020-104 = "But my sisters and I are not restricted by such limiting ideas."
10052020-105 = "As dear Sof would say, we are a fundamentally different species. We're untethered, while you..."
10052020-106 = "How about this?"
10052020-110 = "??? She turned gravity...sideways?"
10052020-111 = "How does it feel to fall right? Left! Now up!"
10052020-117 = "Well then, as a final act of mercy, I'll put you down."
10052020-124 = "U-Ugh...!"
10052020-126 = "You've proven tedious, little ragdoll. Shall we wrap this up?"
10052020-127 = "In this place, you and I may lack physical forms..."
10052020-128 = "Borrowing Sof's words again—we're like digital ghosts."
10052020-129 = "So while I may not be able to hurt your physical body..."
10052020-131 = "...Your mind is another story."
10052020-132 = "Pop quiz, hotshot..."
10052020-134 = "You're a smart girl. If you \"die\" here, what will happen to your physical body?"
10052020-135 = "...A violent, instant surge of electricity will fry my brain."
10052020-136 = "Hmm, impressive. At least you're quick on the uptake."
10052020-137 = "In that case..."
10052020-138 = "..."
10052020-142 = "B-But... Is that really all right...? If they encounter that child, even those people..."
10052020-143 = "...would surely die?"
10052020-144 = "Yes... An issue of great complication. "
10052020-145 = "We have yet to harm a human, have held no desire to do so, never even thought of it..."
10052020-150 = "...Tsk."
10052020-151 = "Brace yourself, Tsukatsuki Rio!"
10052020-163 = "It's not over yet...! I'm not done!"
10052020-164 = "Useless!"
10052020-165 = "...!"
10052020-166 = "Surprise!"
10052020-181 = "Ah...!"
10052020-186 = "What are you daydreaming about? Move it. Dodge."
10052020-191 = "Eh...?"
10052020-192 = "Hm..."
10052020-193 = "Himari...?!"
10052020-199 = "Heehee."
10052020-201 = "I knew this would happen, Rio. This super-genius delicate beauty couldn't simply sit and watch, so she rolled all the way out here to support you directly. You'd better be grateful for all this trouble."
10052020-202 = "You... That bike..."
10052020-203 = "It's a wheelchair."
10052020-204 = "But, that's a BIKE..."
10052020-205 = "Wheel. Chair. I'm sitting. It has wheels...in a way."
10052020-206 = "O-Okay..."
10052020-208 = "Give it up, Rio. She'll defend it with her life."
10052020-209 = "As you know, I'm usually in charge of support. But I was capable of venturing out here the entire time."
10052020-210 = "You could say I'm a jack-of-all-trades battle beauty. Above all, this wheelchair possesses a hidden feature..."
10052020-211 = "..."
10052020-212 = "Fufu. Let's leave it at that. Secrets are most powerful when they're unrevealed."
10052020-213 = "Above all, the mystery fits the super-genius beauty biker—NO, super-genius, beautifully delicate, beautiful maiden perfectly."
10052020-214 = "...You called yourself \"beautiful\" twice?"
10052020-215 = "Oh my, Kei. How rude of you to ask. That's quite uncouth. "
10052020-216 = "For the lady of the century like me, who's more befitting of monikers like an \"elegant flower's bloom,\" a \"crystal-clear pure mineral water,\" and \"a snowflake, freshly fallen on a majestic mountain\"..."
10052020-217 = "...There should be no problem with hearing a little \"beautiful\" repetition a few times. It has rhythm. It's poetic."
10052020-218 = "Eimi... Please hurry... I'm about to lose my mind."
10052020-222 = "So, what's next for our cute little Miss Ohr? "
10052020-223 = "Your remaining moves and all your pieces have been knocked off the board by the super-genius delicate beauty and cyber fairy Akeboshi Himari."
10052020-224 = "...So Akeboshi Himari followed you. Even so, in this place..."
10052020-225 = "...In MY place, one dominated by MY control..."
10052020-226 = "You have no chance of success!"
10052020-231 = "(Ugh, she's stronger than she looks.)"
10052020-232 = "(But I should use my prowess and buy us some time...!)"
10052020-233 = "Oh my, you really think so? Was I supposed to be impressed by that attempt at an attack?"
10052020-234 = "How brazen. Here, I can do and be anything. Don't you understand that?"
10052020-235 = "Or do I need to show you more? Are you Millennium girls tactile learners?"
10052020-236 = "Tsukatsuki Rio and Akeboshi Himari, despite being intellectually deficient and offensively annoying, I believe, COMBINED, you two must realize the futility of your efforts?"
10052020-237 = "So, which direction do you want to fall now? Should we try a diagonal this time? Or calculate a curve?"
10052020-238 = "Watch out, Himari! The gravity here is...!"
10052020-242 = "...?"
10052020-248 = "...???"
10052020-249 = "Fufufu."
10052020-250 = "H-Hold on. One more time!"
10052020-257 = "...Nothing's happening."
10052020-258 = "Wh-What?!"
10052020-259 = "Oh my, are you well? Have you snapped?"
10052020-260 = "My signals are jammed."
10052020-261 = "What have you done, Akeboshi Himari?!"
10052020-262 = "Wouldn't you like to know?"
10052020-267 = "Miss Rio, President. Can you hear me?"
10052020-268 = "It's as you said...this place... I'm not sure what to call it, but..."
10052020-269 = "...I destroyed everything."
10052020-270 = "Beautiful work, Eimi. Perfect timing."
10052020-271 = "Confirmed. Signing off."
10052020-275 = "..."
10052020-276 = "..."
10052020-277 = "...?"
10052020-278 = "Destroyed everything?! You mean our communication hub?"
10052020-279 = "That's the fastest way to crack a system, is it not?"
10052020-280 = "Humanity is truly hopeless!"
10052020-281 = "...My apologies."
10052020-282 = "Why would you apologize, Rio? SHE's the attempted murderer."
10052020-283 = "S-Sorry..."
10052020-284 = "Now we're on even ground. Why don't you give it up, Ohr? Maybe I'll let you go if you ask nicely. "
10052020-285 = "You think I'm going to perform for you?"
