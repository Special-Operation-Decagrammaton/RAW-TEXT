[translation]
1006702-1 = "Source of the Problem"
1006702-4 = "[ns] \"Okay. I have an idea of what's going on, Toki.\""
1006702-5 = "Thank you for your understanding, Sensei."
1006702-6 = "I'll give it my best and protect you until the end."
1006702-7 = "[ns] \"Thank you, Toki. I trust you, too. But...\""
1006702-8 = "Sensei, this is a mission as I've told you."
1006702-9 = "This secret party is being held at a luxury cruise, with entry only allowed for parties of two."
1006702-10 = "For me to infiltrate and accomplish my scouting mission, your help is necessary, Sensei."
1006702-11 = "[ns] \"Right, if I can help in any way...\""
1006702-14 = "[ns] \"But... why are you dressed like that?\""
1006702-17 = "You are asking an obvious question, Sensei."
1006702-18 = "The bunny costume is the official uniform of C&C's infiltration missions."
1006702-19 = "Where did I learn that, you asked? This is common knowledge for us at C&C."
1006702-20 = "Although, a normal person like you may not be used to this fact. I am sorry that my thoughts did not reach that far."
1006702-21 = "[s] \"Well... It's not necessarily like that...\""
1006702-22 = "Then we should have no issue. That's good."
1006702-23 = "Let's move to the cruise ship swiftly, then. We don't have time to waste."
1006702-24 = "[s3] \"It's just...! If other people see you dressed like that...\" \n[s4] \"Are you worried about the official uniform of decent society?\""
1006702-27 = "Is that necessary for accomplishing my mission?"
1006702-28 = "Not necessarily? Good. I don't need to consider those, then."
1006702-32 = "Let's go. We have no time."
1006702-34 = "With a somewhat excited-looking Toki, we made our way to our goal, a cruise ship..."
1006702-40 = "Luxury Cruise"
1006702-48 = "We've reached the target location safely."
1006702-49 = "Please stay close to me, Sensei. I will be protecting you."
1006702-50 = "Hmm? I sense lots of eyes towards us. Perhaps... they found out?"
1006702-51 = "If so, we must reestablish the basics of our strategy. That's a big deal, then..."
1006702-54 = "*sigh* Look at that. How could someone make their partner wear something like that to a party?"
1006702-55 = "I mean, personal preferences are nothing to be judged on, but that's..."
1006702-56 = "Agreed. I feel like bunny costume should be for...something more private, no?"
1006702-57 = "What has Kivotos come to... Tsk tsk..."
1006702-60 = "[ns] \"Well, I don't think they know, at the very least.\""
1006702-61 = "Are you sure? You are confident about that, Sensei?"
1006702-62 = "[s] \"...Instead, I feel like my social life is cut in half...\""
1006702-63 = "It's okay, Sensei. Social life changes from time to time."
1006702-64 = "It doesn't look like an important matter for us right now. At least to my eyes."
1006702-65 = "It's good that I can protect you physically, but you want me to protect you mentally, too?"
1006702-66 = "That is difficult for me. I suppose you do say strange things at times, though, Sensei. It'll be okay."
1006702-75 = "Toki proudly walked around the party room, arm-in-arm with me."
1006702-76 = "Toki seemed unaffected by the glares of suspicion coming from all around, but I... was mentally...approaching my limit..."
1006702-78 = "?! Sensei, be careful."
1006702-79 = "See over there? The target is here."
1006702-87 = "This mission was to scout if the target's underlings would appear..."
1006702-88 = "But the actual target showed up. This is unexpected."
1006702-89 = "Should I be finishing the scout mission only as planned, or should I make a move on the target, since the opportunity has arisen?"
1006702-90 = "..."
1006702-91 = "Sensei."
1006702-97 = "Do NOT show yourself until I tell you it's okay."
1006702-98 = "It's a must. Please promise me."
1006702-100 = "And then Toki quickly disappeared into the crowd of desks."
1006702-101 = "And then..."
1006702-103 = "*boom*"
1006702-106 = "W-What? Guards, guards!"
1006702-122 = "I think I got a bit ahead of myself, but I've successfully accomplished my mission."
1006702-123 = "Even when we revealed that we were C&C, I don't think there was much misunderstanding."
1006702-127 = "It might just be my imagination..."
1006702-128 = "But the chatter directed at us felt like it was somehow even louder."
1006702-129 = "Any thoughts, Sensei?"
1006702-130 = "[s] \"You don't think...it was your outfit...?\""
1006702-131 = "Is... that so?"
1006702-132 = "..."
1006702-133 = "Was my outfit that awkward on me...?"
1006702-134 = "Toki's expression was sad as she turned towards me."
1006702-135 = "Seeing that... I was at a loss for words."
1006702-136 = "[ns] \"No, but rather it looked too good.\""
1006702-137 = "Huh? It was too good that it was problematic?"
1006702-138 = "..."
1006702-139 = "Understood. That's what it was."
1006702-140 = "[s] \"I'm not sure if we're on the same page...?\""
1006702-141 = "It's simple. My outfit was too perfect that everyone was envious, right?"
1006702-146 = "Why are you silent? Oh, it's too apparent that you don't even have to say anything."
1006702-147 = "This is only natural. I am a perfect maid as well as the best agent, after all. Bam."
1006702-152 = "Then, Sensei. Shall we go?"
1006702-153 = "[s] \"To where...?\""
1006702-154 = "We're done with our mission, so we should head back."
1006702-155 = "Or... did you have something else in your mind?"
1006702-156 = "No? That's good to hear."
1006702-165 = "Let's go back. Let me escort you."
1006702-167 = "I went back to Schale, arm in arm with a rather confident-looking Toki..."
