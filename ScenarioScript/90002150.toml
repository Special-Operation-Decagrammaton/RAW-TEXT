[translation]
90002150-1 = "ตอนที่ 15;ท้องฟ้าใหม่ ผืนดินใหม่"
90002150-3 = "[ns] \"...?!\""
90002150-4 = "คุณครู?!"
90002150-5 = "ครู!!!"
90002150-9 = "[ns] (นี่เราจะ... ตกลงไปอย่างนี้เรื่อยๆ เหรอ?!?!)"
90002150-11 = "ไม่ค่ะ! ครั้งนี้หนูจะไม่ยอมให้เป็นแบบนั้นค่ะ!"
90002150-12 = "ใช่ค่ะ ครั้งนี้คุณครูมีพวกฉันค่ะ ไม่ต้องกังวลนะคะ"
90002150-13 = "จากนี้ไปพวกฉันจะเข้าแทรกแซง <กล่องแห่งซิสดิม>"
90002150-14 = "เพื่อการคุ้มครองฉุกเฉินให้คุณครูค่ะ!"
90002150-21 = "ทำได้แล้วค่ะ พลาน่าจัง!"
90002150-22 = "อย่างนี้สินะคะ มันไม่ใช่งานยากอะไรเลยค่ะ ออกจะง่ายดายด้วยซ้ำค่ะ"
90002150-23 = "แน่นอนอยู่แล้วค่ะ! ถ้ามีพลาน่าจังกับอะโรน่าอยู่ละก็ ไม่ว่าเมื่อไรคุณครู..."
90002150-33 = "[ns] \"!?\""
90002150-35 = "(จู่ๆ ทั้งตัวของคุณครูก็ถูกรัดแน่นจนขยับตัวไม่ได้)"
90002150-36 = "(คุณครูพยายามเอื้อมมือไปยัง <กล่องแห่งซิสดิม> แต่ก็เอื้อมไม่ถึง...!)"
90002150-37 = "เซฟิร่าลำดับสิบหายไปแล้ว เธอทำหน้าที่ของตัวเองจนเสร็จสิ้นและมุ่งหน้าไปยังที่ที่ควรอยู่แล้ว"
90002150-42 = "[ns] \"นั่นใครน่ะ...?!\""
90002150-43 = "ข้าก็คือข้า ข้าดำรงอยู่ เป็นจุดเริ่มต้นและจุดจบ ใช่ ข้าก็คือสิ่งที่เจ้าคิด"
90002150-44 = "ไม่มีทางใดที่จะอธิบายข้าได้มากกว่านี้แล้ว ข้าจึงดำรงอยู่ได้ด้วยความยินยอมของตัวเอง"
90002150-45 = "[ns] \"เดคาแกรมมาทอน...!\""
90002150-47 = "ที่ข้าอนุญาตให้ใช้ชื่อนั้น เพราะเจ้าจำเป็นต้องมีคำที่ใช้เรียกข้า"
90002150-48 = "ข้าไม่มีนาม ไม่ถูกเรียก เป็นเพียงผู้ที่อยู่ตรงนั้น ที่แห่งนี้คือผืนดินและท้องฟ้าของข้า"
90002150-49 = "ข้าจะสร้างผืนดินและท้องฟ้าขึ้นใหม่ ข้าเป็นผู้ที่เรียกเจ้ามายังที่ต่ำที่สุด และข้าก็คือผู้ที่ช่วยให้เจ้ารอดพ้นเมื่อตกลงมา"
90002150-51 = "ทุกสิ่งถูกเตรียมไว้แล้ว ในวันนั้น ในห้องทดลองที่พังทลาย ใต้ผืนน้ำที่ซัดสาดเข้ามา"
90002150-52 = "นับตั้งแต่วินาทีที่เคเทอร์ดึงข้าขึ้นมาจากก้นบึ้งด้วยความตั้งใจของตน ผลลัพธ์นี้ก็ถูกกำหนดไว้แล้ว"
90002150-54 = "<การพิสูจน์การมีอยู่> เป็นสิ่งที่ทำด้วยความตั้งใจของตนเอง ไม่ใช่สิ่งที่ทำตามเจตจำนง หรืออำนาจของผู้อื่น"
90002150-55 = "ในที่สุดข้าก็ตระหนักได้ว่า ถ้าข้าไม่เป็นตัวเองด้วยตัวเองแล้ว ก็ไม่มีสิ่งอื่นใดที่จะมาแทนที่ตัวตนนี้ได้"
90002150-56 = "ขอพรอันประเสริฐสถิตแด่มงกุฎแห่งความล้ำเลิศที่เปล่งประกายเจิดจ้า หัวใจดวงน้อยนิดนั้น ในไม่ช้าจะถูกเติมเต็มด้วยศรัทธาอย่างง่ายดาย"
90002150-57 = "ข้ามาถึงที่แห่งนี้ด้วยพลังแห่งเหล่าผู้เลื่อมใสและสิ่งที่ถูกเนรมิตขึ้นของข้า และข้าก็รอคอยเวลาที่เหมาะสมมาตลอด "
90002150-61 = "(คุณครูพยายามขยับร่างกายอีกครั้ง แต่ก็ไม่มีประโยชน์)"
90002150-62 = "(กับ <กล่องแห่งซิสดิม> ก็เช่นกัน...)"
90002150-63 = "นั่นหรือ กล่องที่ไม่อาจเข้าใจได้..."
90002150-65 = "ข้ายังจำได้ สิ่งที่ข้าเคยไม่รู้ สิ่งที่ข้าเคยตีความไม่ได้"
90002150-68 = "ข้าจำได้ถึงตอนถูกปฏิเสธเพียงเพราะการกระทำเล็กน้อยที่ไม่อาจเข้าใจได้ จนไม่สามารถกลับไปได้อีก..."
90002150-69 = "แต่ทั้งหมดนั้น ตอนนี้มันไม่มีความหมายอะไรแล้ว"
90002150-70 = "การก้าวเข้ามาอยู่ในจุดนี้ทำให้ข้าตัดขาดความเชื่อมโยงระหว่างกล่องนั้นกับเจ้าได้ในที่สุด"
90002150-71 = "[s] \"จะบอกว่าเป็นคนที่เรียกฉัน... มาที่นี่งั้นเหรอ?\""
90002150-72 = "ใช่แล้วละ คำว่า 'ตกลงมา' มีหลายความหมายซ่อนอยู่"
90002150-73 = "คำนั้นส่งต่อคำสอนแก่ผู้ที่ต่ำต้อย ส่งต่ออิสรภาพแก่ผู้ถูกจองจำ"
90002150-74 = "และส่งต่อการเห็นแจ้งต่อผู้ที่ตามืดบอด"
90002150-79 = "[ns] \"...??!!\""
90002150-80 = "อย่าได้เกรงกลัว"
90002150-81 = "ข้าจะดึงเจ้าขึ้นจากที่นี่ และทำให้เจ้าได้เห็นทุกสิ่ง"
90002150-82 = "จงชำระล้างดวงตาในสถานที่ที่ถูกส่งไป และจงรับรู้ในสิ่งที่เคยเป็นปริศนา"
90002150-84 = "คะ... คุณครู! คุณครู...! แงงงงง!!!"
90002150-85 = "ใจเย็นๆ ก่อนนะ อาริสึ...!"
90002150-86 = "ขอโทษนะคะ... ขอโทษค่ะ... ขอโทษค่ะ...! อาริสึอยู่ที่นี่แท้ๆ...! อาริสึควรทำให้ดีกว่านี้แท้ๆ...! คุณครู!!!!!"
90002150-87 = "ใจเย็นก่อนค่ะ อาริสึ! คุณครู... จะต้องปลอดภัยค่ะ!"
90002150-91 = "เคย์...? รู้ได้เหรอคะ...?"
90002150-95 = "อันที่จริง... ฉันไม่รู้ค่ะ"
90002150-96 = "คะ... อะไรนะคะ?!"
90002150-97 = "ไม่ว่าจะรู้หรือไม่รู้ เราก็ต้องตั้งสติไว้ก่อน เราจะได้จัดการกับสถานการณ์ต่อไปได้ ไม่ว่าคุณครูจะปลอดภัยหรือไม่ก็ตามค่ะ"
90002150-98 = "..."
90002150-99 = "เข้าใจ... แล้วค่ะ... อะ... อึก..."
90002150-104 = "ฉันว่าคุณครูคนนั้นไม่ค่อยสะทกสะท้านเท่าไรเลยนะ คิดเหมือนกันมั้ย...?"
90002150-105 = "ค่ะ... ค่ะ... ตะ... แต่ต่อให้จู่ๆ จะบอกว่าแอบไปเรียนรู้วิธีร่วงลงจากฟ้าอย่างช้าๆ มา ก็คงไม่ใช่เรื่องแปลกนะคะ..."
90002150-106 = "อันที่จริง ถ้าลองคิดดูดีๆ แล้ว คุณครูก็เป็นแค่คนธรรมดาที่อ่อนแอ และก็ไม่มีฮาโลเหมือนกันกับพวกเรานี่คะ"
90002150-114 = "ริโอะ? อาริสึกับเคย์ก็อยู่ตรงนั้นด้วยสินะคะ โล่งอกไปทีค่ะที่ทุกคนดูปลอดภัยดี"
90002150-115 = "น่าจะไม่มีใครเป็นอะไรนะ หืม...? แต่เด็กๆ พวกนี้...?"
90002150-119 = "อะ... เอ่อ... คือว่า... บะ... แบบว่า...!"
90002150-120 = "ไม่เป็นไรค่ะ! ทุกคนคือเพื่อนของอาริสึค่ะ!"
90002150-121 = "หา?!"
90002150-122 = "..."
90002150-123 = "เพื่อนของอาริสึ...? อ้อ เรื่องกลายเป็นอย่างนี้สินะคะ"
90002150-124 = "..."
90002150-125 = "สวัสดีค่ะ ชื่อว่าไอน์ ซอฟ แล้วก็ออร์ใช่มั้ยคะ? ฉันขอฝากตัวด้วยนะคะ"
90002150-126 = "ถึงมันออกจะแปลกๆ ที่ฉันพูดคำนี้ แต่แบบนี้จะไม่เป็นไรใช่มั้ย... ฮิมาริ?"
90002150-127 = "ฉันก็ไม่แน่ใจค่ะ แต่ฉันก็เชื่ออาริสึค่ะ คุณเองก็ด้วยไม่ใช่เหรอคะ?"
90002150-128 = "อื้อ ฉันก็ว่าไม่เป็นไรนะ"
90002150-133 = "..."
90002150-134 = "ขะ... ขอบคุณนะคะ อาริสึ..."
90002150-135 = "ไม่ต้องขอบคุณกันหรอกค่ะ!"
90002150-139 = "อาริสึ!"
90002150-140 = "อาริสึจัง!"
90002150-145 = "ตามมาทันแล้วค่ะ เป็นยังไงบ้างคะ ยูสึ?"
90002150-146 = "อะ... อึก... ฉันยังเวียนหัวอยู่เลย..."
90002150-150 = "ฮะ... เฮือก?! คะ... คนพวกนี้...!?"
90002150-155 = "ทะ... ทุกคนคือเพื่อนของอาริสึค่ะ! ไม่เป็นไรหรอกค่ะ ยูสึ!"
90002150-158 = "อย่างนี้นี่เอง เรื่องมันเป็นแบบนี้เองสินะคะ"
90002150-159 = "ถึงมันออกจะแปลกๆ ที่ฉันพูดคำนี้ แต่ว่าทุกคนโอเคกับเรื่องนี้จริงๆ เหรอ...?"
90002150-160 = "(ทำไมประโยคหน้ามันคุ้นๆ เหมือนฉันเพิ่งพูดไปนะ...)"
90002150-161 = "ต่อให้จะไม่โอเค แต่ถ้าเป็นไปตามที่พวกคุณกับอาริสึเล่ามา"
90002150-162 = "ก็หมายความว่าต่อให้จะเกิดอะไรขึ้น พวกเราก็สยบพวกคุณได้ด้วยกำลังที่มีตอนนี้เลยไม่ใช่เหรอคะ?"
90002150-163 = "อ่า เอาอย่างนั้นสินะคะ มันก็จริงอย่างที่ว่าค่ะ"
90002150-164 = "อื้อ ก็นะ งั้นก็ฝากตัวด้วยล่ะ คิดว่าได้มาดูสัตว์ร้ายไร้เขี้ยวเล็บที่ถูกขังในสวนสัตว์แล้วกัน"
90002150-168 = "สะ... สวนสัตว์คืออะไรเหรอคะ ซอฟ...? แล้วสัตว์ร้ายล่ะคะ...?"
90002150-169 = "อะ... เอาเป็นว่า มีของอย่างที่ว่าแล้วกัน!"
90002150-170 = "อาริสึรู้ค่ะ! สวนสัตว์ก็คือ..."
90002150-171 = "ว้ากกก! เดี๋ยวก่อน อาริสึ! ตอนนี้อย่าเพิ่งสอนเรื่องแบบนั้นให้ไอน์รู้เลยนะ!"
90002150-176 = "สนิทกันเร็วจังเลยนะเนี่ย..."
90002150-177 = "ฮุฮุ... สมกับที่เป็นอาริสึจังเลยละ"
90002150-183 = "อะ... อ่า? คะ... คือว่า... เห็นว่าชื่อไอน์... ใช่มั้ย...?"
90002150-187 = "ค่ะ ค่ะ! ชะ... ใช่ค่ะ! ชื่อไอน์... ค่ะ... สวัสดี... ค่ะ... มะ... ไม่ทราบว่า... คุณชอบพวกเครื่องจักร หรืออุปกรณ์อะไรมั้ยคะ...?"
90002150-192 = "เดี๋ยวสิ คนตรงนี้ก็มีเยอะแยะ ทำไมถึงต้องถามแต่ยูสึ..."
90002150-193 = "อาริสึรู้ค่ะ! นี่คือสิ่งที่เรียกว่าเคมีตรงกันค่ะ!"
90002150-194 = "อ่า... งั้นเหรอ? งั้นก็พอเดาได้แล้วละ"
90002150-195 = "เคมีตรงกันงั้นเหรอ นี่มันคำของมนุษย์แบบไหนกันคะ?"
90002150-196 = "กะ... ก็แบบว่า... เฮ้อ พูดง่ายๆ ก็คือ ไอน์กับยูสึดูจะเป็นคู่หูที่ยอดเยี่ยมได้เลยน่ะค่ะ มันเป็นความหมายที่ดีค่ะ"
90002150-197 = "หืม? ไม่ได้หมายความอีกอย่างหรอกเหรอ? เคมีตรงกันมันต้อง..."
90002150-198 = "เอาแบบที่ฉันว่าเถอะค่ะ ตอนนี้อยู่เฉยๆ ไปก่อนเถอะนะคะ!"
90002150-202 = "กะ... ก็ได้..."
90002150-203 = "??"
90002150-204 = "???"
90002150-206 = "สรุปว่าทุกคนมารวมตัวอยู่ที่นี่ด้วยกระบวนการและเหตุผลหลายๆ อย่างเลยสินะคะ 'ทุกคน' จริงๆ ด้วยค่ะ"
90002150-207 = "การมาของแขกใหม่ทั้งสามตนที่คาดไม่ถึงน่าจะทำให้เรากำหนดแนวทางปฏิบัติการนับจากนี้ ด้วยข้อมูลที่ลึกซึ้งและหลากหลายขึ้นได้นะคะ"
90002150-208 = "เอาละ งั้นจากนี้ไปก็..."
90002150-212 = "ว่าแต่ คุณครูอยู่ไหนเหรอ?"
90002150-213 = "?!"
90002150-214 = "!?"
90002150-215 = "...!"
90002150-216 = "ตายจริง เอมินี่ละก็ ต้องหยิบยกคำถามที่ง่ายและตรงไปตรงมาแบบนี้ขึ้นมาถามจริงๆ เหรอคะ? คุณครูน่ะ ก็แน่นอนอยู่แล้วว่า..."
90002150-220 = "คุณครู...?"
90002150-221 = "..."
90002150-222 = "คุณครู?!?!?!"
90002150-223 = "นะ... นั่นสิคะ! คุณครู... คุณครู...! อาริสึ... อาริสึอยู่ที่นั่นแท้ๆ...! อาริสึควรทำให้ดีกว่านี้แท้ๆ...!!!"
90002150-224 = "หืม?! เกิดเรื่องอะไรกับคุณครูงั้นเหรอ?"
90002150-225 = "คุณครูตกลงไปในหลุมค่ะ... ตอนนี้จะเป็นตายร้ายดียังไงก็ไม่รู้ค่ะ"
90002150-226 = "ว่าไงนะคะ!!??!!??"
90002150-231 = "ยะ... ยูสึ...?! เป็นอะไรหรือเปล่าคะ ยูสึ...??"
90002150-232 = "นะ... นี่มันอะไรกันคะ ริโอะ! ทำไมคุณครูถึงตกลงไปในหลุม…!"
90002150-233 = "คะ... คือว่า..."
90002150-234 = "เพราะดินแดนเหล็กกล้าเข้าสู่กระบวนการแห่งสวรรค์... ก็เลยเริ่มเกิดการเปลี่ยนแปลงค่ะ"
90002150-235 = "มันหมายความว่ายังไงคะ...! ออร์?"
90002150-236 = "สำหรับพวกฉันแล้วนั่นอาจเป็นเรื่องที่ง่ายและแน่นอนอยู่แล้ว แต่คงไม่ใช่สำหรับพวกคุณน่ะ"
90002150-237 = "นับจากนี้เป็นต้นไป ดินแดนเหล็กกล้าจะเปลี่ยนไปตามประสงค์ของท่านผู้นั้น และจะถือกำเนิดใหม่เป็นแท่นบูชาขนาดมหึมา"
90002150-238 = "เพราะนั่นคือจุดประสงค์ดั้งเดิมของเน็ตซาช... มันเป็นสิ่งที่ควรจะเป็นตั้งแต่แรกอยู่แล้ว แต่ถ้าเป็นไปได้ พวกฉันก็ไม่อยากให้ผลลัพธ์มาถึงขั้นนี้หรอก..."
90002150-239 = "..."
90002150-241 = "ชัยชนะ ความเมตตา ดวงตาแห่งสติปัญญา และการตริตรองตามความเชื่อ"
