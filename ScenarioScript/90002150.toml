[translation]
90002150-1 = "第15話;新天新地"
90002150-3 = "[ns] 「──！？」"
90002150-4 = "老師！？"
90002150-5 = "老師！！！"
90002150-9 = "[ns] （難道會就這樣……一直墜落下去嗎！？）"
90002150-11 = "不！這次絕對不會讓那種事發生的！"
90002150-12 = "是的。這次有我們在。請不必擔心。"
90002150-13 = "希迪姆的箱子，即刻起為執行老師的緊急保護──"
90002150-14 = "開始強制介入！"
90002150-21 = "成功了，星奈醬！"
90002150-22 = "是的。順利成功了。"
90002150-23 = "那當然！只要有星奈醬和我在，隨時都能將老師保護──"
90002150-33 = "[ns] 「！？」"
90002150-35 = "（不知不覺間，全身都被牢牢束縛住了）"
90002150-36 = "（想伸手觸碰希迪姆的箱子，卻怎麼也碰不到……！）"
90002150-37 = "第十個質點消失了。#n完成自己的使命，回到了該去的地方。"
90002150-42 = "[ns] 「你是……！？」"
90002150-43 = "我即是我。是存在之物。是起點與終點。#n沒錯。正是汝所想的那個存在。"
90002150-44 = "除此之外無從說明，我因自身之許可而存在。"
90002150-45 = "[ns] 「十字神名……！」"
90002150-47 = "允許那個名稱，是因為汝需要稱呼我的語言。"
90002150-48 = "我不被稱呼，不被呼喚，只是存在於此。#n這裡是我的大地，我的天空。"
90002150-49 = "我將創造新天新地，將汝召喚至最低之處的是我，拯救墜落之汝的也是我。"
90002150-51 = "一切早已準備就緒。#n那天，在崩塌的研究所之中，在傾瀉而來的洪水之下。"
90002150-52 = "在凱瑟憑藉自身的意志，將我從深淵撈起的那一刻起，這個結果便已經註定。"
90002150-54 = "「存在證明」必須由自己實踐，並非他人的意志或力量所能完成。"
90002150-55 = "我終於領悟了──若我不親自成為自己，任何事物都無法取而代之。"
90002150-56 = "願最耀眼奪目的至高王冠獲得祝福。#n渺小的心靈終將被信仰輕易填滿。"
90002150-57 = "我藉由我的預言者與被造物之力抵達此處，並持續等待著時機。"
90002150-61 = "（再次嘗試移動身體卻無濟於事）"
90002150-62 = "（……希迪姆的箱子也是一樣）"
90002150-63 = "……那個無法理解的箱子嗎。"
90002150-65 = "我記得。我所不知道的東西。我所無法解析的東西。"
90002150-68 = "我記得被無法理解的力量拒於門外，無法歸還之事。"
90002150-69 = "然而，如今那一切已無關緊要。"
90002150-70 = "我登上這個位置，才終於切斷了那個箱子與汝的連結。"
90002150-71 = "[s] 「是你……把我召喚到這裡的？」"
90002150-72 = "正是。「墜落」一事蘊含許多意義。"
90002150-73 = "予低微者以福音，予被俘者以自由。"
90002150-74 = "並使失明者重見光明。"
90002150-79 = "[ns] 「……！？」"
90002150-80 = "不要害怕。"
90002150-81 = "我將汝從此處拉起，讓汝看見一切。"
90002150-82 = "在被遣送之處洗淨雙眼，讓汝知曉未曾知曉之事。"
90002150-84 = "老，老師！老師……！哇啊啊啊啊！！！"
90002150-85 = "冷靜點，愛麗絲……！"
90002150-86 = "對不起……對不起……對不起……！#n明明愛麗絲就在旁邊……！愛麗絲應該做得更好的……！老師！！！！！"
90002150-87 = "先冷靜下來，愛麗絲！#n老師他……一定沒事的！"
90002150-91 = "Kei……？你能夠知道嗎……？"
90002150-95 = "……其實我不知道。"
90002150-96 = "咦，咦咦！？"
90002150-97 = "不管知不知道，我們都得先冷靜下來。#n這樣無論老師是否平安，我們才能應對接下來的狀況。"
90002150-98 = "……"
90002150-99 = "我知道了……嗚，嗚嗚……"
90002150-104 = "如果是那個老師的話，這種程度應該不會有事吧……？"
90002150-105 = "是，是啊……就，就算他突然因為某些理由，學會能從天上慢慢掉下來的方法，也，也不奇怪……"
90002150-106 = "不過話說回來，老師其實和我們一樣沒有被賦予光環，只是一個軟弱的普通人而已。"
90002150-114 = "莉央？愛麗絲和Kei也在呢。#n大家看起來都平安無事，真是太好了。"
90002150-115 = "大家都還好吧？#n嗯……？這些孩子是……？"
90002150-119 = "那，那個，就是……！"
90002150-120 = "沒問題的！大家都是愛麗絲的朋友！"
90002150-121 = "哇！？"
90002150-122 = "……"
90002150-123 = "愛麗絲的朋友……？#n啊啊，原來如此。"
90002150-124 = "……"
90002150-125 = "你們好。是Ain、Soph和Aur對吧？#n請多指教。"
90002150-126 = "雖然我說這種話可能有點奇怪……不過這樣真的沒問題嗎，陽葵？"
90002150-127 = "這麼說確實有道理，不過我相信愛麗絲。#n你不也跟我一樣嗎？"
90002150-128 = "嗯。這點我也贊成。"
90002150-133 = "……"
90002150-134 = "謝，謝謝你。愛麗絲……"
90002150-135 = "不客氣！"
90002150-139 = "愛麗絲！"
90002150-140 = "愛麗絲醬！"
90002150-145 = "趕上了。你還好嗎，柚子？"
90002150-146 = "嗚，嗚嗚……還是好暈……"
90002150-150 = "啊，啊啊啊！？#n這，這些人是……！？"
90002150-155 = "那，那個，大家都是愛麗絲的朋友！所以沒問題的，柚子！"
90002150-158 = "原來如此。發生了這樣的事啊。"
90002150-159 = "雖然我說這種話可能有點奇怪……不過這樣真的沒問題嗎？"
90002150-160 = "（感覺這好像是我剛才說過的話……）"
90002150-161 = "就算有問題，按照你們和愛麗絲的說法來看──"
90002150-162 = "即便有什麼萬一，我們現在的戰力也足以制壓你們不是嗎？"
90002150-163 = "啊，原來你是這麼想的啊。#n確實是這樣沒錯。"
90002150-164 = "嗯，你們就抱著在動物園裡，觀賞被拔光牙齒和爪子的猛獸的心情吧。請多指教。"
90002150-168 = "動，動物園是什麼呢，Soph……？#n猛獸又是什麼……？"
90002150-169 = "總，總之就是有那種東西啦！"
90002150-170 = "愛麗絲知道！所謂的動物園就是──"
90002150-171 = "哇啊啊！等等，愛麗絲！#n現在先不要教Ain那種東西！"
90002150-176 = "他們也太快就混熟了吧……"
90002150-177 = "呵呵……這種地方也很像愛麗絲的風格呢。"
90002150-183 = "那，那個……？#n你，你是……Ain，對吧……？"
90002150-187 = "是，是的！沒，沒錯！我是Ain……#n你，你好……請，請問……你喜歡機械或裝置之類的東西嗎……？"
90002150-192 = "明明旁邊還有其他人在，為什麼偏偏去找柚子搭話呢……"
90002150-193 = "愛麗絲知道！這就是所謂的同病相憐吧！"
90002150-194 = "啊，原來如此。這麼說我就理解了。"
90002150-195 = "同病相憐是什麼啊，又是你們人類的用語嗎？"
90002150-196 = "就是，那個……唉。#n簡單來說，就是Ain和柚子會成為很好的夥伴，是好的意思。"
90002150-197 = "嗯？那樣不對吧？#n同病相憐的意思應該是──"
90002150-198 = "現在先當成這樣就好，你給我少說幾句！"
90002150-202 = "好，好吧……"
90002150-203 = "？？"
90002150-204 = "？？？"
90002150-206 = "總之，經過種種過程和理由之後，大家都聚集到這裡了呢。#n在真正意義上的「所有人」。"
90002150-207 = "而且在增加三位意料之外的新客人之後，#n我們就能用更加多元的觀點，決定接下來的行動方針了。"
90002150-208 = "那麼──"
90002150-212 = "這麼說來，老師人呢？"
90002150-213 = "！？"
90002150-214 = "！？"
90002150-215 = "……！"
90002150-216 = "哎呀，英美也真是的，何必特地問這麼簡單的問題呢。#n老師他當然──"
90002150-220 = "……老師？"
90002150-221 = "……"
90002150-222 = "老師！？！？！？"
90002150-223 = "對，對不起！老師……老師他……！#n愛，愛麗絲明明就在旁邊……！愛麗絲應該更努力才對……！！！"
90002150-224 = "咦！？老師發生什麼事了嗎？"
90002150-225 = "……掉進了坑洞下面。#n之後就沒有任何消息了。"
90002150-226 = "什麼！？！？"
90002150-231 = "柚，柚子……！？你還好嗎，柚子……！？"
90002150-232 = "到，到底怎麼回事，莉央！#n老師為什麼會掉進坑洞裡……！"
90002150-233 = "這是因為……"
90002150-234 = "……因為鋼鐵大陸本身進入升天的過程，開始產生變化了。"
90002150-235 = "……！#n那是什麼意思呢，Aur？"
90002150-236 = "雖然對我們來說是理所當然的事，但對你們來說並不是吧。"
90002150-237 = "從現在起，鋼鐵大陸將按照那位大人的意志改變自身，轉化為一座巨大的祭壇。"
90002150-238 = "這是從一開始就注定的……涅察赫原本的目的。#n雖然想盡可能避開這個結果，可是……"
90002150-239 = "……"
90002150-241 = "勝利。慈悲。知性之眼與信仰的觀照。"
90002150-242 = "[ruby=Jehovah Tzeva'oth]耶和華澤巴奧特[/ruby]──萬軍之主啊。"
90002150-244 = "……！"
90002150-245 = "……！"
90002150-249 = "抱歉在這麼嚴肅的氛圍下突然打擾，不過那邊那個不是老師嗎？"
90002150-250 = "……嗯？"
90002150-251 = "什麼……？"
90002150-256 = "咦！？！？"
90002150-260 = "[ns] 「這到底是……？」"
90002150-261 = "不要害怕。"
90002150-262 = "我將引導汝至我的祭壇，汝將在那裡登上為汝準備好的席位。"
90002150-263 = "[s] 「祭壇……？」"
90002150-264 = "是的。汝有那個資格。"
90002150-265 = "汝有俯視一切的權利，也有見證一切重新開始的義務。"
90002150-269 = "有耳可聞的就應當聽。#n沒有偶然。只有看似偶然的必然。"
90002150-270 = "汝的到來是如此。"
90002150-271 = "我想扶持汝也是如此。"
90002150-273 = "下一話;觀察與結果"
