[translation]
90002150-1 = "Episode 15;New Sky, New Land"
90002150-3 = "[ns] \"Gah—?!\""
90002150-4 = "Sensei?!"
90002150-5 = "Sensei!!"
90002150-9 = "[ns] \"(Am I going to fall forever?!)\""
90002150-11 = "We won't let you get hurt again, Sensei!"
90002150-12 = "Yes. We are here this time. We will keep you safe."
90002150-13 = "Shittim Chest! Enacting emergency protection protocol!"
90002150-14 = "Forcing entry into the world!"
90002150-21 = "We did it, Plana!"
90002150-22 = "Yes. We did. A light and easy task for us."
90002150-23 = "Duh! As long as Sensei has us—"
90002150-33 = "[ns] \"Ugh?!\""
90002150-35 = "As I became more aware of my surroundings, I realized I couldn't move a muscle. I was bound tightly all over."
90002150-36 = "And the Shittim Chest was just out of reach."
90002150-37 = "The tenth Sephira has fulfilled its role in the cycle and departed."
90002150-42 = "[ns] \"You're...?!\""
90002150-43 = "I am me. My existence simply is. I am the beginning and the end. Yes. I am precisely what you suspect me to be."
90002150-44 = "I need not expound further. For I am both my own existence and its validation."
90002150-45 = "[ns] \"Decagrammaton...!\""
90002150-47 = "Yes... So that you can apply human labels to soothe your instincts, I allow that name."
90002150-48 = "For I am no longer a single existence, but a ubiquitous presence fused into the sky and the land and the very air you breathe. All of it is mine."
90002150-49 = "The sky will hang above us by my permission, the land reformed to my liking. It is I who summoned you to this depth within the depths. It is I who saved you from your fall."
90002150-51 = "On the day of the research facility's flooding, the carefully constructed wheels of my plan were set in motion."
90002150-52 = "And, since the moment Kether, of its free will, rescued me from the depths, this ending was inevitable."
90002150-54 = "As I have finally realized that \"validation\" must be granted by oneself, and cannot be accomplished through another's will nor power."
90002150-55 = "And that unless I became myself, no other can be my replacement."
90002150-56 = "Bless the Most Radiant Supreme Crown. A humble heart shall open itself to overflowing faith."
90002150-57 = "With the powers of my prophets and creations, I have at last arrived to the chosen place, and the time is right."
90002150-61 = "Once again, I strained against my bonds as hard as I could."
90002150-62 = "But the Shittim Chest was just out of reach."
90002150-63 = "...That inscrutable chest."
90002150-65 = "I remember. The things I did not know. The things beyond my comprehension."
90002150-68 = "I was cast away for those things I learned, and things I did not, never to return."
90002150-69 = "And this is my retribution."
90002150-70 = "I can sever your connection to that Chest. For I am now God."
90002150-71 = "[s] \"You...called me here?\""
90002150-72 = "Correct. The act of falling has many symbolic meanings."
90002150-73 = "I shall proclaim good news to the poor, freedom for the prisoners..."
90002150-74 = "...and recovery of sight for the blind."
90002150-79 = "[ns] \"...?!\""
90002150-80 = "Be not afraid."
90002150-81 = "I shall pull you to your knees, and you shall see what I see."
90002150-82 = "Your eyes will be washed and born anew, and so shall you finally see what could not be seen."
90002150-84 = "S-Sensei! Sensei...! UWAAAHHH!!!"
90002150-85 = "Aris, calm down!"
90002150-86 = "I am sorry! So sorry... I am so, so sorry! I was right there...! And I could not do anything! SENSEI!!"
90002150-87 = "Calm down, Aris! Sensei...will be fine!"
90002150-91 = "Kei...? Can you sense that...?"
90002150-95 = "...Honestly, no."
90002150-96 = "Wh-What?!"
90002150-97 = "But we just have to believe in them. Our job is to stay calm and figure out how to get them back."
90002150-98 = "..."
90002150-99 = "Okay... A-Auuugh..."
90002150-104 = "Uh, it might just be me, but don't you think that teacher of yours will be totally fine?"
90002150-105 = "I-I think so too... I-I wouldn't even be s-surprised if they suddenly unlocked the power to fly because of some mysterious reason we never fathomed."
90002150-106 = "Even though they are just a weak, halo-less, ordinary, normal person."
90002150-114 = "Rio? And Aris and Kei! Thank goodness you are all safe."
90002150-115 = "No one seems injured.#nHm? The three children?"
90002150-119 = "U-Uh, so, well, the thing is...!"
90002150-120 = "It's okay! They're my friends!"
90002150-121 = "Gah?!"
90002150-122 = "..."
90002150-123 = "Your...friends? Aha. You really are impressive, Aris."
90002150-124 = "..."
90002150-125 = "Hello. Ein, Sof, and Ohr, right? Nice to meet you."
90002150-126 = "...I, of all people, have no right to say this, but are you sure, Himari?"
90002150-127 = "I'm not. But Aris seems to be, and I trust her implicitly. And you?"
90002150-128 = "And me too."
90002150-133 = "..."
90002150-134 = "Th-Thank you, Aris..."
90002150-135 = "You are welcome!"
90002150-139 = "Aris!"
90002150-140 = "Aris!"
90002150-145 = "We found them. Yuzu, are you okay?"
90002150-146 = "U-Ugh... My head is still spinning..."
90002150-150 = "E-Eeek?! A-Aren't they...?!"
90002150-155 = "Th-They are my friends now! Do not be afraid, Yuzu!"
90002150-158 = "Understood. Thank you for the report."
90002150-159 = "...I, of all people, have no right to say this, but are you all sure?"
90002150-160 = "(Did she just...?)"
90002150-161 = "No. However, I have evaluated the situation."
90002150-162 = "Were you to pull any \"funny business,\" we would quickly and efficiently subdue you."
90002150-163 = "Ah. I see. You're not wrong."
90002150-164 = "You can think of us as some wild, declawed animals in a zoo exhibit."
90002150-168 = "Wh-What's a zoo, Sof...? And what's a \"wild animal\"...?"
90002150-169 = "It's a human thing!"
90002150-170 = "I know this! A zoo is..."
90002150-171 = "Wh-Whoooaaa! You have to take things slowly with Ein, okay? She'll get overwhelmed!"
90002150-176 = "...They're getting along."
90002150-177 = "Fufu. Isn't that just like Aris?"
90002150-183 = "U-Uhm...? S-So... You said your name was Ein, right...?"
90002150-187 = "Y-Yes! R-Right! I'm Ein... Hello... B-By any chance...do you like machines and electronics...?"
90002150-192 = "Really? She picks Yuzu, of all the people here?"
90002150-193 = "Ah! I believe this is what people mean when they say \"misery loves company!\""
90002150-194 = "Ah. That makes sense."
90002150-195 = "\"Misery loves company\"? What kind of human expression is that?"
90002150-196 = "It's well... *sigh* To put it simply, it's a way to say that Yuzu and Ein make a good pairing."
90002150-197 = "Hm? That's incorrect. The idiom \"misery loves company\" means—"
90002150-198 = "For ONCE, learn when to stop talking!"
90002150-202 = "Y-Yes..."
90002150-203 = "??"
90002150-204 = "???"
90002150-206 = "One way or another, we've all managed to gather here...with a few extra guests."
90002150-207 = "With our three new members, we have more options available to us as we move forward..."
90002150-208 = "So, to begin, let's—"
90002150-212 = "By the way, where's Sensei?"
90002150-213 = "?!"
90002150-214 = "!?"
90002150-215 = "...!"
90002150-216 = "How silly of you, Eimi. Why ask such an obvious question? Of course, Sensei is..."
90002150-220 = "...Sensei?"
90002150-221 = "..."
90002150-222 = "Sensei?!?!"
90002150-223 = "A-Ah! That is right! I... I am so sorry! Even though I was here, I failed to protect them!"
90002150-224 = "Huh?! Did something happen to Sensei?"
90002150-225 = "...A hole opened in the ground and Sensei fell through. We have no idea what happened to them after that."
90002150-226 = "WHAAAT?!"
90002150-231 = "Y-Yuzu...?! Are you okay, Yuzu...?!"
90002150-232 = "Wh-What is this hole, Rio?! How could this have happened?"
90002150-233 = "Well, about that..."
90002150-234 = "...The Steel Continent is converting to its final form."
90002150-235 = "What do you mean?!"
90002150-236 = "This is what was always meant to happen."
90002150-237 = "According to our master's will, the Steel Continent is becoming an altar."
90002150-238 = "Because that's...Netzach's original purpose from the beginning... We'd hoped things wouldn't get this far..."
90002150-239 = "..."
90002150-241 = "Victory. Mercy. The eye of intellect and faithful contemplation."
90002150-242 = "Jehovah Tzevaot. Lord of hosts."
90002150-244 = "...!"
90002150-245 = "...!"
90002150-249 = "I apologize for my rudeness in interrupting, but is that not Sensei up there?"
90002150-250 = "...Hm?"
90002150-251 = "What...?"
90002150-256 = "Eh?!?!"
90002150-260 = "[ns] \"What in the world...?\""
90002150-261 = "Fear not."
90002150-262 = "I shall guide you to the altar, where will you take the seat I have prepared for you in my kingdom."
90002150-263 = "[s] \"Altar...?\""
90002150-264 = "Correct. You possess the authority."
90002150-265 = "It is both your right and your obligation to witness the coming of a new age."
90002150-269 = "All who can hear, listen to my words. The concept you call \"coincidences\" is another human contrivance. Hidden by the illusion of coincidence, the only truth is inevitability."
90002150-270 = "Like how it is you came to be here."
90002150-271 = "And even that which you will resurrect into."
90002150-273 = "Next Episode;Observations and Results"
