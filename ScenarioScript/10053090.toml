[translation]
10053090-1 = "Epilogue;The Tsuchinoko is Blue"
10053090-2 = "Day 3"
10053090-3 = "AHHHHHH!! LET ME GOO!!!"
10053090-5 = "It's not too late!! In fact, we're in the nick of time!"
10053090-10 = "Don't be stupid! Climbing a mountain this late is really dangerous!"
10053090-11 = "But this is my last chance! I have to guard against the worst day of my life!"
10053090-12 = "It doesn't even have to be the Tsuchinoko. I'll take a snake, any snake. Even if it's skinny!"
10053090-13 = "Everyone, don't just stand there. Stop her!!"
10053090-17 = "Come on, girls! Give it all you got!"
10053090-21 = "Ahh! Are you a person, or a tank?!"
10053090-25 = "W-Wait!! My foot slipped! She's unstoppable! You're scraping my knees!"
10053090-30 = "Everyone, wait!"
10053090-31 = "Konoka, I have something important to tell you."
10053090-36 = "Don't get in my way. I'll mow you down, Director!"
10053090-37 = "I would not dream of trying to stop you. But listen. I just realized something."
10053090-38 = "According to my calculations, Konoka, the worst day, the one \"in three days\"..."
10053090-40 = "...has already passed...!!"
10053090-46 = "..."
10053090-47 = "...Huh?"
10053090-48 = "It was strange from the start. Daily fortunes usually are, as the name implies, for the day they're drawn."
10053090-49 = "So, if it was talking about the \"third day,\" then that would include the day you heard it."
10053090-50 = "Konoka, that means that your \"worst day\" was yesterday!! And you lived!"
10053090-51 = "My worst day...is over...?"
10053090-52 = "..."
10053090-53 = "...? But nothing even happened...?"
10053090-58 = "See? I told you. No bad luck, no curse."
10053090-59 = "These astrology things are just coincidence. You make connections because you're looking for them, so—"
10053090-73 = "Wait..."
10053090-74 = "Something DID happen. Lots of things! It was awful!"
10053090-75 = "We got hunted by some robot!"
10053090-76 = "Then jumped by thugs in the middle of the night!"
10053090-77 = "In fact, it was the WORST day. It was non-stop torture!"
10053090-82 = "Uh, are you talking about us?"
10053090-83 = "We're sorry for attacking you, but are we really...\"the worst\"?"
10053090-88 = "Ah... My apologies. I didn't mean to—"
10053090-89 = "...Wait!!"
10053090-90 = "Shyaah!! It WAS the worst! And still is!"
10053090-91 = "Don't make me feel bad for you!"
10053090-96 = "...One fight against a bus mech? How is that the \"worst\"? Sounds like a pretty everyday occurrence..."
10053090-97 = "Wait, if the \"worst day\" never came, then that means..."
10053090-101 = "Could it be?!"
10053090-102 = "I already found the Tsuchinoko?!"
10053090-103 = "A no-no... I didn't see any snakes. Nothing even close..."
10053090-106 = "What is a Tsuchinoko, anyway? Are you sure it's even a snake? Does it have any characteristics besides being fat?"
10053090-110 = "Oh... That's a pointed question. First off, it is not merely a \"fat snake.\" Saying so is rather crude, not to mention rude."
10053090-111 = "While witnesses differ, most agree that the Tsuchinoko makes a \"shyaah!\" sound when it feels threatened."
10053090-112 = "Even more astounding is that they can spring up! About one whole meter, right at you!"
10053090-115 = "Shyaah!! Shyaah!!!"
10053090-116 = "A Tsuchinoko!!"
10053090-122 = "H-Huh...?! What are you doing?!"
10053090-123 = "Why are you hugging me?! Shyaah!"
10053090-124 = "No, it's just that I realized..."
10053090-128 = "Perhaps the true \"Tsuchinoko\" was a friend I found along the way!"
10053090-129 = "What's going on?! Are you out of your mind?!"
10053090-131 = "And so our Tsuchinoko search finally concluded."
10053090-139 = "Ha! Doesn't it look good all tidied up like this?"
10053090-140 = "...Wait, why did we clean? We're about to leave."
10053090-141 = "Excuse me? We rented the lodge for a week. Why waste money? Now we can finally kick back and enjoy ourselves!"
10053090-142 = "Oh, that's why?! I thought it was because we found the entrance to the secret alien base?"
10053090-147 = "...Um, since we're all done here, can I leave?"
10053090-148 = "Abandon all hope. They'll never let you go."
10053090-149 = "And since we're all stuck here, we might as well relax and have some fun!"
10053090-154 = "Kivotos' Unsolved Mystery: In Search of Tsuchinoko, the Unknown Creature"
