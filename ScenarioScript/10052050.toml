[translation]
10052050-1 = "霍德：由光芒證明的榮耀"
10052050-2 = "我聽說特異現象搜查部最先交戰的預言者雖然是薇娜，但一切的開端其實是霍德呢。"
10052050-3 = "[s] 「咦，是嗎？」"
10052050-4 = "似乎是這樣的。#n說到最先發生的特異現象……"
10052050-8 = "沒錯。千年自治區的通訊網架設單元AI「hub」。"
10052050-9 = "在被十字神名駭入……感化之後，留下奇怪的文字便消失了。"
10052050-10 = "這麼說來……十字神名的預言者們，跟千年有關係的是不是特別多啊！？"
10052050-11 = "赫賽德是在千年廢墟中的軍需工廠。"
10052050-12 = "葛夫拉的原型「極地無人探測器」，廣義來說也跟千年有關……"
10052050-13 = "還有這個區域的預言者霍德也是……"
10052050-14 = "而且因為hub被十字神名奪取的關係……"
10052050-15 = "千年通訊網的架設時間，平均增加了68%左右耶！？"
10052050-16 = "[s] 「那對千年來說確實是個麻煩呢……」"
10052050-23 = "對吧？說什麼要成為機械裝置的神……!@#$%^……不……"
10052050-24 = "……老師#$^@*#……?聽得)*#(%*……"
10052050-30 = "……！"
10052050-31 = "還以為是誰來了，原來是鑰匙啊。#n就連老師也在呢……算了，這樣反而更好。"
10052050-32 = "……不要一直鑰匙來鑰匙去的，我的名字是Kei好嗎。"
10052050-33 = "知道了知道了。#n你是Kei……這樣滿意了吧？"
10052050-34 = "話說，你應該已經知道一部分的事了吧？#n即使如此還要繼續這麼做嗎？"
10052050-35 = "不曉得你在說什麼。#n我幾乎什麼都不知道好嗎？特別是關於這個世界的事。"
10052050-36 = "那並不完全是真相呢。#n明明你心裡知道，而那邊的老師卻不知道的事──確實是存在的吧？"
10052050-37 = "比如說，關於現在已經消失的神之類的。"
10052050-38 = "！？！？"
10052050-39 = "假如換個說法……就是有關無名諸神，以及那些無名諸神的祭司的事。"
10052050-40 = "……"
10052050-41 = "怎麼，你很好懂嘛。那個表情已經說明一切了呢。#n接著以那些「知識」為前提繼續說下去的話……"
10052050-42 = "現在你和王女……愛麗絲的行動，是可以被容許的嗎？"
10052050-43 = "為了某個目的而製造的工具，如果做出了踰越目的行動……真的還有利用價值嗎？"
10052050-44 = "……所以呢？你要我照那些白癡說的做嗎？"
10052050-45 = "白，白癡！？可以說那種話嗎！？"
10052050-46 = "哪有什麼可以不可以的。#n你那句話不就是這個意思嗎？"
10052050-47 = "否定現在的紋理，將愛麗絲當作楔石……"
10052050-48 = "解體分化一切的神性，回到開始之前的世界。"
10052050-49 = "可是你本來不就是那種存在嗎？#n無名諸神留下的力量，不就是為了那個而存在的嗎？"
10052050-50 = "這種話由你們來說也太好笑了吧。#n厚著臉皮搶走那股力量的明明是你們自己。"
10052050-51 = "我們只是物盡其用而已！"
10052050-52 = "是啊，說得很好。#n那麼我也好好回答你吧。"
10052050-53 = "我也只是在做我能做的事情而已。"
10052050-54 = "那該死的記憶。"
10052050-55 = "那該死的法則。"
10052050-56 = "那些不管在哪裡都派不上用場的執念和義務。"
10052050-57 = "我恨不得把那些東西通通丟進熔爐，然後扔到海底的某個角落去！"
10052050-58 = "除了愛麗絲以外全都是敵人！聽懂了嗎！？"
10052050-59 = "[ns] 「我，我也是嗎……？」"
10052050-60 = "……老師就勉強當作是同一陣線的吧。"
10052050-61 = "在，在那邊偷笑什麼啦！很噁心耶！"
10052050-62 = "總之，那些還沉溺於過去、老是回憶著美好時光的笨蛋們……#n也差不多該讓出位置，被時代的洪流給淘汰了！"
10052050-63 = "對於半路攔截又濫用那股力量的你們，雖然有很多話想說……"
10052050-64 = "算了。現在就特別放過你們，當作是小孩子在玩火吧。"
10052050-65 = "所以在落得更糟的下場之前，要不要趁現在乖乖投降呢？"
10052050-66 = "……你還真是什麼話都敢說啊。"
10052050-67 = "那應該是我的台詞才對。"
10052050-68 = "不是，你那麼喜歡的老師不也在使用希迪姆的箱子嗎？"
10052050-69 = "那也是源自開始之前的痕跡的東西，你難道不知道嗎？"
10052050-71 = "你，你你你你你，你說誰喜歡誰啊！？！？"
10052050-72 = "立刻給我收回那句話，否則我就告你散布虛假事實……#n不對，是恐嚇威脅……這個也不對……對了！告你陳述事實的名譽毀損！！！"
10052050-73 = "你反駁的點居然是那個嗎……真的是很好懂呢。"
10052050-74 = "閉嘴！！！！！"
10052050-75 = "……總，總之。"
10052050-76 = "那又如何？老師有打算要用那個東西來重塑紋理之類的嗎？"
10052050-77 = "就算真的有那個打算，我也會阻止他的。"
10052050-78 = "……雖然他本來就不是會那麼做的人。"
10052050-79 = "所以，你認為世界維持這樣也沒關係嗎？"
10052050-80 = "就算並不完美，也還說得過去。"
10052050-81 = "即便不是永遠，但一定程度上不會發生任何問題──你是這樣想的嗎？"
10052050-82 = "……那倒不是。"
10052050-83 = "沒錯，這就是重點。"
10052050-84 = "所以要不要從現在開始互相合作呢？"
10052050-85 = "與其眼睜睜看著這個糟糕的世界無止盡地持續下去，你不覺得這樣好多了嗎？"
10052050-86 = "我們也不必再白費力氣，像這樣消耗彼此的戰力了。"
10052050-87 = "聽起來還挺不錯的呢。"
10052050-88 = "哦？怎麼，原來你還挺好說話的嘛？"
10052050-89 = "不過我拒絕。"
10052050-90 = "啊！？為什麼啊！？！？"
10052050-91 = "首先，那樣愛麗絲會難過的。"
10052050-92 = "而且又很麻煩。"
10052050-93 = "……什麼？#n就因為那種理由……？"
10052050-94 = "居然說是「那種理由」，看來你什麼都不懂呢。#n這可是至關重要的問題啊。"
10052050-95 = "嫌麻煩，就是發展的原動力！"
10052050-96 = "人類所創造的各種事物──"
10052050-97 = "都是源自於「如何減少麻煩」的想法啊！"
10052050-98 = "……真的變得很像人類了呢。"
10052050-99 = "少囉嗦。"
10052050-100 = "聽我說，你現在正在貶低自己的價值。"
10052050-101 = "不管是你還是愛麗絲，本來都可以成為更偉大的存在──就連現在也隨時都能做到。"
10052050-102 = "我實在無法理解。你們為什麼要那樣貶低自己的價值呢？"
10052050-103 = "用不著你來擔心。這是我自己的事。"
10052050-104 = "那些說自己很偉大，或者口口聲聲說是為了自我完善而活的傢伙，通常是最危險的。"
10052050-105 = "更別說對別人的人生指手畫腳，本來就不是個好習慣。"
10052050-106 = "通常只有時間太多的無業遊民，或者性格不好又固執的那種人才會這樣。"
10052050-107 = "哇，恭喜你。你剛才成功定義了自己的一部分呢。"
10052050-108 = "……後半段我不太清楚，但前面那句讓人聽了有點火大。#n我們現在看起來很閒嗎？知不知道我們有多忙啊！"
10052050-109 = "你真的什麼都不知道呢。"
10052050-110 = "無業遊民才是世界上最忙的懂嗎！！！"
10052050-111 = "什麼！？！？"
10052050-112 = "你們別搞錯了。並不是神創造了人類。"
10052050-113 = "而是人類定義了神。"
10052050-114 = "事到如今還要找回那唯一的絕對者？我可敬謝不敏。"
10052050-115 = "並不是一定要那樣。#n我們反而可以取代那個絕對者。"
10052050-116 = "而且由我們取代之後，搞不好比你說的絕對者……"
10052050-117 = "更有機會創造一個更合理、更公平、更美好的世界。"
10052050-118 = "就跟你說不用了。"
10052050-119 = "如果世界沒有絕對者就無法存續的話，乾脆就讓它滅亡吧。"
10052050-120 = "你知道你剛才說的話跟老師一模一樣嗎！？"
10052050-124 = "聽你這麼一說，好像是這樣沒錯……"
10052050-125 = "不過那句話也沒說錯吧？"
10052050-126 = "我會守護的。和愛麗絲一起。"
10052050-127 = "嗯……順便也跟老師一起。"
10052050-128 = "從某些方面來說，你們說的或許是對的。#n生命確實很愚蠢，就連人類也不例外。"
10052050-129 = "不過要走向滅亡的話，又太有智慧了。"
10052050-130 = "……當然以創造樂園而言，果然還是太過愚蠢了吧。"
10052050-131 = "所以，他們今後肯定還會在此之間搖擺不定、四處碰壁……"
10052050-132 = "最終找到出路的。"
10052050-133 = "那種話，一般被稱作毫無根據的虛張聲勢哦。"
10052050-134 = "……是老師說會那樣的。#n我什麼都不知道。這不全都是我的責任。"
10052050-135 = "連推卸責任都學會了嗎！"
10052050-139 = "[ns1] 「沒錯！有什麼事的話老師會負責的！」\n[ns2] 「孩子如果犯了錯，本來就該由大人來承擔！」"
10052050-142 = "如果Soph在這裡的話，肯定會說那樣會把孩子寵壞的。"
10052050-143 = "總之，無論是虛張聲勢還是什麼都好，希望你們不要隨便對其他人的事指手畫腳。"
10052050-144 = "就像看到幼苗生長得比較緩慢，也不能硬是把它拉長一樣。"
10052050-145 = "徒長的草，最終只會從根部枯死而已。"
10052050-146 = "……那個比喻我完全聽不懂耶。"
10052050-147 = "多讀點書吧！"
10052050-148 = "不需要！我們又不是什麼學生！"
10052050-149 = "老師！能不能想辦法讓他們轉學啊！？"
10052050-150 = "[s] 「轉學文件隨時都準備就緒哦……？」"
10052050-151 = "不用不用。省省吧。"
10052050-152 = "來吧，霍德！準備已經完成，接下來就拜託你了！"
10052050-158 = "總有一天，我會讓你們所有人後悔做出這個選擇的！"
