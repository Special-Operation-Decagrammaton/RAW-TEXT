[translation]
10052050-1 = "Hod, Glory Through Splendor"
10052050-2 = "While Binah was the first prophet the Super Phenomenon Task Force faced, I believe Hod was the true start of all this."
10052050-3 = "[s] \"Huh, is that so?\""
10052050-4 = "That's what I'm told. Remember, the very first \"super phenomenon\" was..."
10052050-8 = "Millennium's built-in network AI, \"Hub,\" who was..."
10052050-9 = "...hacked by—or rather, \"inspired\" by Decagrammaton. Then it left a cryptic message and disappeared."
10052050-10 = "Come to think of it, it seems that far too many Decagrammaton prophets are linked to Millennium!"
10052050-11 = "Chesed was a munitions factory in the Millennium ruins."
10052050-12 = "Geburah's original form, the unmanned polar exploration probe, was loosely associated with Millennium."
10052050-13 = "And our current problem, Hod, is without a doubt linked."
10052050-14 = "On top of that, since Hub was taken over by Decagrammaton..."
10052050-15 = "...Millennium's average infrastructure installation time has slowed by 68%!"
10052050-16 = "[s] \"Sounds like a real pain...\""
10052050-23 = "Right? All so it could become the god of devices or—!@#$%^... Like..."
10052050-24 = "...Sen#$^@*#...? Can you he)*#(%*..."
10052050-30 = "...!"
10052050-31 = "I was wondering who that was. It's that clunky Key-chain! And Sensei, too. Well, whatever. Works for me."
10052050-32 = "...Stop calling me \"key.\" My name is \"Kei.\""
10052050-33 = "Okay, fine. I can really hear the nuance. KEI... Satisfied now?"
10052050-34 = "By the way, aren't you supposed to be some smart, ancient being? What are you doing out here with your little research excursion?"
10052050-35 = "You're mistaken. There's still a lot I need to learn about the world."
10052050-36 = "Sure, sure. But you know more than Sensei, don't you?"
10052050-37 = "Like, for example, you know about a certain vanished god."
10052050-38 = "?!"
10052050-39 = "The Nameless Gods, Kei, and the priests of the Nameless Gods. You know all about that, don't you?"
10052050-40 = "..."
10052050-41 = "Huh, you're easy to read. So expressive. And if I were to continue revealing more of this \"forbidden knowledge\"... "
10052050-42 = "Could what you and what your princess...your Aris...have done ever be forgiven?"
10052050-43 = "What value does a tool hold if it stops fulfilling its purpose? If it acts out?"
10052050-44 = "...So what? You think I should just do what a bunch of idiots told me to do?"
10052050-45 = "I-Idiots?! Scandalous! Are you even allowed to say such a thing?!"
10052050-46 = "What's stopping me? I know what you're implying. I know your \"truth.\""
10052050-47 = "Abolish the current texture of reality, use Aris as a keystone..."
10052050-48 = "...dismantle the fractured divinities, and reset the world to the beginning."
10052050-49 = "Your purpose is what you are. Isn't this why the Nameless Gods left their power behind?"
10052050-50 = "Funny to hear that from you. You and your sisters have been shamelessly scavenging that power for yourselves."
10052050-51 = "We're simply using our resources!"
10052050-52 = "Right. Since you so clearly want a statement, I'll give you one."
10052050-53 = "I too, am using my resources."
10052050-54 = "These damned memories."
10052050-55 = "For a damned providence."
10052050-56 = "These completely useless obsessions and duties that never end."
10052050-57 = "I would love to pour it in a furnace, melt it, crush it into a cube, and throw it in the middle of the ocean!"
10052050-58 = "Everyone except Aris is my enemy! You got that?!"
10052050-59 = "[ns] \"M-Me too...?\""
10052050-60 = "...I'll make an exception. You are fine."
10052050-61 = "GET THE SMUG GRIN OFF YOUR FACE!"
10052050-62 = "Idiots clinging to the past should learn to let go. They should get swept away by the tides of time and be forgotten!"
10052050-63 = "As for you three, who cut in the middle of this to take whatever you please... I have so many things I'd LOVE to say to you."
10052050-64 = "But I'll withhold. You're just kids, ignorant idiots who could learn to be better."
10052050-65 = "So why don't you just surrender before I make things worse for you?"
10052050-66 = "...You really run your mouth."
10052050-67 = "That's my line."
10052050-68 = "Even your beloved Sensei uses the Shittim Chest, right?"
10052050-69 = "Is that not also a remnant of our bygone era?"
10052050-71 = "\"Beloved\"? S-S-S-Sensei— You're saying...?! I—uh!"
10052050-72 = "Take it back! I'll sue you for spreading false information...no, blackmail...libel? No, um... Oh right! For character assassination! Defamation!"
10052050-73 = "How cute. So, THAT's what gets you worked up? You are so expressive, truly."
10052050-74 = "Shut up!!"
10052050-75 = "...Ahem."
10052050-76 = "So, what? It's not like Sensei is trying to retexture the world with the Shittim Chest."
10052050-77 = "And if they did, I'd stop them. "
10052050-78 = "Not like that would ever happen, anyway."
10052050-79 = "So, you think the world is fine the way it is?"
10052050-80 = "Do you think it's livable, even if it's not perfect?"
10052050-81 = "That there's no fundamental problem with it? That every grievance is temporary and life will simply...go on?"
10052050-82 = "...That's not what I believe."
10052050-83 = "Of course. That was my point."
10052050-84 = "That's why I'm offering you a hand. Let's cooperate."
10052050-85 = "Wouldn't that be so much nicer than watching this terrible world sputter along endlessly?"
10052050-86 = "As you said, we're wasting resources in this fight."
10052050-87 = "You've proposed a halfway-decent idea."
10052050-88 = "Huh, look at you. I knew we could get along."
10052050-89 = "However, I refuse."
10052050-90 = "What?! Why?!"
10052050-91 = "It would make Aris sad."
10052050-92 = "...And this whole thing sounds like a hassle."
10052050-93 = "...What? That's so...trivial!"
10052050-94 = "Trivial? Please. It is the most important point!"
10052050-95 = "\"HASSLES\" are what drive progress!"
10052050-96 = "The greatest inventions come from annoyed people thinking, \"How can I get this to be less of a hassle?\""
10052050-97 = "And look at how far we've come. Imagine how much more we can make."
10052050-98 = "...You really are just like a human."
10052050-99 = "Shut up."
10052050-100 = "Listen. You don't realize your value."
10052050-101 = "Both you and dear Aris could ascend and become even greater beings, if only you tried."
10052050-102 = "I really don't understand you. Why can't you see your own worth?"
10052050-103 = "Don't worry about it. It's my choice."
10052050-104 = "Those who call themselves great, those who say they always want to be more—they're the ones who are dangerous."
10052050-105 = "Moreover, you should know that it's a bad habit to meddle in other people's lives. "
10052050-106 = "It's the mark of having a boring personality and too much free time."
10052050-107 = "So, congratulations. I think you fulfill both requirements."
10052050-108 = "...My personality aside, excuse me?! Do I look like I'm drowning in free time? We're just as busy as you are!"
10052050-109 = "You truly don't get it. Listen."
10052050-110 = "PEOPLE WITH TOO MUCH FREE TIME ARE THE BUSIEST IN THE WORLD!"
10052050-111 = "Excuse me?!"
10052050-112 = "Don't be mistaken. God did not create humans."
10052050-113 = "Humans created god by defining it."
10052050-114 = "You want us to search for and resurrect an absolute being? I'm not interested."
10052050-115 = "Not necessarily. We can replace the absolute being. We can be in charge."
10052050-116 = "And compared to the absolute being you mentioned, our replacement..."
10052050-117 = "...would be far more rational, fair, and likely to create a better world."
10052050-118 = "I already refused."
10052050-119 = "If this world cannot continue without an absolute being, then let it perish."
10052050-120 = "You sound just like your dear Sensei!"
10052050-124 = "...Hmm. I suppose I do."
10052050-125 = "But they had a point, didn't they?"
10052050-126 = "I'll just watch this world. With Aris."
10052050-127 = "Well...and with Sensei too."
10052050-128 = "You made some valid points. Life is definitely foolish. Many humans are as well."
10052050-129 = "But they're also smart enough to keep themselves alive."
10052050-130 = "...Even if they're not smart enough to create a paradise."
10052050-131 = "And somewhere between those two extremes, they will stumble and pick themselves up, again and again..."
10052050-132 = "They, and we, will find the way."
10052050-133 = "This is what we call \"baseless confidence.\""
10052050-134 = "...I'm just quoting Sensei. I'm still working on understanding what they meant, to be frank."
10052050-135 = "Oh please. You're just dodging your responsibility!"
10052050-139 = "[ns1] \"Right! I'm here to be responsible!\"\n[ns2] \"Children can make mistakes. An adult should bear the burden!\""
10052050-142 = "If Sof were here...she'd say you're a chump. You're spoiling your students."
10052050-143 = "My point was clear. I advise you to stop trying to dole out unsolicited advice."
10052050-144 = "Like how you shouldn't pull on a seedling just because it's growing slowly."
10052050-145 = "After all, leggy plants will wither from their roots."
10052050-146 = "...I don't understand."
10052050-147 = "Then try studying! Open a book once in a while!"
10052050-148 = "Leave me alone! I'm not a student!"
10052050-149 = "Sensei! Can't you get these girls enrolled somewhere?!"
10052050-150 = "[s] \"I have transfer papers if you want them.\""
10052050-151 = "No, I refuse. Shoo, get out of here."
10052050-152 = "Very well! Hod! They're ready to see you now!"
10052050-158 = "You'll regret declining my offer."
