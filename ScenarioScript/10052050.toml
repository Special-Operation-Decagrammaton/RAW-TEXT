[translation]
10052050-1 = "#title;호드. 찬란함으로 증거하는 영광"
10052050-2 = "3;케이 프로토;01;듣자 하니, 초현상특무부가 처음으로 상대한 예언자는 비나였지만, 모든 것의 시작은 호드였다고도 볼 수 있다던데요.\n#3;a\n#3;em;[반응]"
10052050-3 = "[s] \"어라, 그랬던가?\""
10052050-4 = "3;케이 프로토;99;그렇다는 모양입니다. 가장 먼저 일어났던 이상 현상이 바로……."
10052050-5 = "#st;[0,0];instant;1;"
10052050-6 = "#clearST"
10052050-7 = "3;케이 프로토;99\n#3;d\n#wait;1000"
10052050-8 = "3;히마리 결전 비무장;01;네. 밀레니엄 자치구의 통신망 가설 유닛 AI <허브hub>가.\n#3;sig\n#3;a"
10052050-9 = "3;히마리 결전 비무장;01;데카그라마톤에게 해킹…… 감화된 뒤, 이상한 문장을 남기고 사라졌던 것이었으니까요.\n#3;sig"
10052050-10 = "3;히마리 결전 비무장;05;그렇다고 할까, 데카그라마톤의 예언자들, 밀레니엄과 엮인 게 유난히 많지 않나요?!\n#3;sig\n#3;em;[?!]"
10052050-11 = "3;케이 프로토;01;헤세드는 밀레니엄의 폐허에 있었던 생산 공장이었고."
10052050-12 = "3;케이 프로토;01;게부라의 원형인 극지 무인 탐사기도 넓게 보면 밀레니엄과 관련이 있다고 볼 수 있겠고……."
10052050-13 = "3;케이 프로토;02;이 구역의 예언자인 호드 역시…….\n#3;em;[...]"
10052050-14 = "3;히마리 결전 비무장;08;거기에, 허브가 데카그라마톤에게 탈취당한 바람에.\n#3;sig"
10052050-15 = "3;히마리 결전 비무장;05;밀레니엄의 통신망 가설 시간이 평균 68% 정도 증가하기도 했단 말이에요?!\n#3;sig\n#3;em;[!]"
10052050-16 = "[s] \"확실히 밀레니엄 입장에서는 민폐겠네…….\""
10052050-17 = "#st;[0,0];instant;1;"
10052050-18 = "#clearST"
10052050-19 = "3;히마리 결전 비무장;05\n#3;black\n#3;sig\n#wait;300"
10052050-20 = "3;히마리 결전 비무장;05\n#3;sig\n#wait;200"
10052050-21 = "3;히마리 결전 비무장;05\n#3;black\n#3;sig\n#wait;200"
10052050-22 = "3;히마리 결전 비무장;05\n#3;sig\n#wait;800"
10052050-23 = "3;히마리 결전 비무장;02;그렇죠? 무슨 기계 장치의 신이 되겠다는 것도…… !@#$%^…… 아니…….\n#3;shake\n#3;sig"
10052050-24 = "3;히마리 결전 비무장;02;……선생#$^@*#……? 들리)*#(%*…….\n#3;sig\n#3;black"
10052050-25 = "#st;[0,0];instant;1;"
10052050-26 = "#clearST"
10052050-27 = "3;히마리 결전 비무장;02\n#3;sig\n#3;shake\n#3;black\n#3;d\n#wait;300"
10052050-28 = "#wait;1700"
10052050-29 = "3;통신 오르;01\n#3;a\n#wait;1500"
10052050-30 = "1;케이 프로토;14;……!\n#1;ar\n#1;shake\n#3;m5"
10052050-31 = "3;통신 오르;03;누가 왔나 했더니, 열쇠였나요. 거기에 선생님도 있었군요. 네, 뭐. 차라리 좋아요.\n#3;em;[반응]"
10052050-32 = "1;케이 프로토;05;……자꾸 열쇠, 열쇠 그러지 말라고요. 제 이름은 케이니까.\n#1;em;[...]"
10052050-33 = "3;통신 오르;13;알겠습니다, 알겠어요. 케이……. 이제 됐죠?"
10052050-34 = "3;통신 오르;13;그런데, 당신은 이미 어느 정도 알고 있잖아요? 그런데도 그러고 있는 건가요?"
10052050-35 = "1;케이 프로토;01;뭐가 말입니까. 저 별로 아는 거 없는데요. 특히 이 세계에 대해서는요."
10052050-36 = "3;통신 오르;09;그건 완전한 진실이 아니군요. 당신은 알고 있고, 거기 있는 선생님은 모르는 것이 분명히 있잖아요?\n#3;em;[?]"
10052050-37 = "3;통신 오르;09;가령, 지금은 사라진 신에 대해서라든가."
10052050-38 = "1;케이 프로토;06;?!?!\n#1;em;[!]"
10052050-39 = "3;통신 오르;01;다른 말로 하자면 이름 없는 신들에 대해서라든가, 그리고 그 이름 없는 신들의 사제에 대한 것들 말이죠."
10052050-40 = "1;케이 프로토;07;……."
10052050-41 = "3;통신 오르;01;뭐야, 알기 쉽네요. 표정이 다 이야기해 주고 있잖아요. 그리고 그 '지식들'을 바탕으로 이야기를 이어 나가자면……. \n#3;em;[...]\n#3;m3\n#1;dl"
10052050-42 = "3;통신 오르;01;지금 당신과 왕녀…… 아리스의 행동은, 용납받을 수 있는 것일까요?"
10052050-43 = "3;통신 오르;01;어떤 목적을 위해 만들어진 도구가, 그 목적을 벗어나 행동한다면, 거기에 과연 효용 가치가 있기는 한 걸까요?"
10052050-44 = "3;케이 프로토;14;……그래서, 뭐요. 그 백치들이 하자는 대로 하라고요?\n#3;em;[빠직]\n#3;closeup"
10052050-45 = "3;통신 오르;15;배, 백치?!?! 그런 말 해도 돼요!?\n#3;em;[?!]\n#3;shake"
10052050-46 = "3;케이 프로토;07;안 될 건 뭔데요. 그 말은 이런 거잖아요.\n#3;em;[한숨]"
10052050-47 = "3;케이 프로토;14;지금 이대로의 텍스쳐를 부정하고, 아리스를 쐐기돌로 삼아서."
10052050-48 = "3;케이 프로토;14;모두의 분화된 신성을 해체하고, 시작 이전의 세계로 돌아가자는 거 아닙니까."
10052050-49 = "5;통신 오르;03;하지만 당신은 원래 그런 존재잖아요? 이름 없는 신들의 남겨진 힘이란 건, 그걸 위해 존재하는 것 아니었나요?\n#5;em;[?]\n#5;al\n#3;m2"
10052050-50 = "3;케이 프로토;01;그 말을 당신들이 하는 것도 웃기네요. 그 힘을 중간에서 뻔뻔하게 빼앗아 쓰고 있는 주제에."
10052050-51 = "5;통신 오르;13;우리는 쓸 수 있는 것을 쓸 뿐이라고요!"
10052050-52 = "3;케이 프로토;99;좋아요. 말 잘했어요. 저도 제대로 대답해 주죠.\n#3;m3\n#5;dr"
10052050-53 = "3;케이 프로토;05;저 역시 할 수 있는 것을 하고 있을 뿐입니다.\n#3;closeup"
10052050-54 = "3;케이 프로토;99;그 망할 기억.\n#3;closeup"
10052050-55 = "3;케이 프로토;07;그 망할 섭리.\n#3;closeup"
10052050-56 = "3;케이 프로토;14;그 어디에 써먹으려고 해도 쓸데가 없는 망집과 의무들.\n#3;closeup\n#3;stiff"
10052050-57 = "3;케이 프로토;15;마음 같아서는 전부 용광로에 부어 넣은 다음, 바닷속 어딘가에 내던져버리고 싶으니까 말이죠!\n#3;closeup"
10052050-58 = "3;케이 프로토;16;아리스 말고는 다 적이라는 겁니다! 알아들었어요?!\n#3;closeup\n#3;em;[!]"
10052050-59 = "[ns] \"나, 나도……?\""
10052050-60 = "3;케이 프로토;08;……선생님 정도까지는 한 편으로 생각해 드릴게요."
10052050-61 = "3;케이 프로토;13;뭐, 뭘 히죽히죽 웃고 있는 거예요! 기분 나쁘다고요!\n#3;em;[///]\n#fontsize;80\n#3;stiff"
10052050-62 = "3;케이 프로토;01;아무튼, 과거에 처박혀서 언제까지나 좋은 시절만 생각하는 멍청이들은, 이제 그만 좀 자리 비키고 시대의 흐름에 휘말려 사라지라죠!"
10052050-63 = "3;케이 프로토;14;그걸 중간에 가로채서, 좋을 대로 써먹고 있는 당신들에게도 할 말이 많습니다만……."
10052050-64 = "3;케이 프로토;07;좋습니다. 지금이라면 특별히 봐드리죠. 어린애들의 불장난이라고 생각하고 넘어가도록 하겠습니다.\n#3;em;[한숨]"
10052050-65 = "3;케이 프로토;02;그러니 더 험한 꼴 보기 전에, 적당히 항복하지 그래요?"
10052050-66 = "5;통신 오르;12;……듣자 듣자하니, 못하는 말이 없네요. 진짜.\n#5;al\n#3;m1\n#5;em;[빠직]"
10052050-67 = "3;케이 프로토;14;그거, 제 쪽에서 할 소리거든요?"
10052050-68 = "5;통신 오르;13;아니, 정작 당신이 그렇게 좋아하는 선생님도 싯딤의 상자를 쓰고 있잖아요."
10052050-69 = "5;통신 오르;13;그것도 시작 이전의 흔적으로부터 유래한 물건이라는 거, 알고 있지 않아요?"
10052050-70 = "#all;hide"
10052050-71 = "3;케이 프로토;13;제, 제제제제제가, 선생님을 뭐 어쩌고 어째요?!?!\n#3;em;[///]\n#3;closeup\n#fontsize;80\n#3;shake\n#5;hide"
10052050-72 = "3;케이 프로토;13;당장 취소하지 않으면 허위사실유포…… 아니죠, 공갈협박…… 이것도 아니네요…… 맞아요! 사실적시 명예훼손으로 고소할 거예요!!!\n#3;hophop\n#3;closeup"
10052050-73 = "3;통신 오르;12;태클 거는 부분이 그쪽입니까…… 진짜 알기 쉽네요, 당신.\n#3;em;[땀]"
10052050-74 = "3;케이 프로토;13;닥쳐요!!!!!\n#3;closeup\n#bgshake\n#fontsize;100"
10052050-75 = "3;케이 프로토;08;……아, 아무튼.\n#3;closeup"
10052050-76 = "3;케이 프로토;14;그래서, 뭐요. 그걸로 선생님이 리텍스쳐를 하려고 하나요, 뭘 하나요.\n#3;closeup"
10052050-77 = "3;케이 프로토;08;정말 만에 하나 그렇게 하려고 하면, 제가 막을 거지만요. \n#3;closeup\n#3;em;[한숨]"
10052050-78 = "3;케이 프로토;07;애초에 그럴 사람도 아니고 말이죠.\n#3;closeup\n#fontsize;50"
10052050-79 = "3;통신 오르;11;그럼 당신은, 세계가 이대로여도 괜찮다고 생각하나요?\n#3;em;[?]"
10052050-80 = "3;통신 오르;04;지금의 세계가, 완벽까지는 아니더라도 그럭저럭 다들 살아갈 만하고."
10052050-81 = "3;통신 오르;04;영원까지는 아니더라도 어느 정도는, 아무런 문제도 일어나지 않을 거라고 생각하냐는 뜻입니다."
10052050-82 = "3;케이 프로토;14;………그건, 아니긴 하죠.\n#3;em;[...]"
10052050-83 = "3;통신 오르;02;그래요. 바로 그 부분이 포인트인 겁니다."
10052050-84 = "3;통신 오르;02;그러니까 이쯤에서 서로 협력하는 게 어떠냐는 거죠."
10052050-85 = "3;통신 오르;03;지금의 이 끔찍한 세계가, 어디까지나 계속되는 걸 지켜보는 것보다는 훨씬 나은 일이 아닐까요?\n#3;em;[반응]"
10052050-86 = "3;통신 오르;05;서로 굳이 힘들여 가며, 이렇게 전력을 소모할 필요도 없을 거고요."
10052050-87 = "1;케이 프로토;99;나쁜 소리처럼은 들리지 않는군요.\n#1;ar\n#3;m5"
10052050-88 = "3;통신 오르;07;오, 뭐야. 제법 이야기가 통하잖아요?\n#3;em;[음표]"
10052050-89 = "1;케이 프로토;01;허나, 거절하죠."
10052050-90 = "3;통신 오르;13;뭐라고요?!?! 어째서인가요!?!?\n#3;em;[?!]\n#3;shake"
10052050-91 = "1;케이 프로토;02;일단, 아리스가 슬퍼할 거고."
10052050-92 = "1;케이 프로토;04;무엇보다 귀찮네요, 그거.\n#1;em;[한숨]"
10052050-93 = "3;통신 오르;12;………네? 고작, 그런 이유로요……?"
10052050-94 = "3;통신 오르;12\n1;케이 프로토;14;고작이라니, 아무것도 모르고 있네요. 이건 무엇보다 중요한 문제라고요.\n#1;m3\n#3;dr"
10052050-95 = "1;케이 프로토;16;귀찮음은, 발전의 원동력이란 말입니다!\n#1;closeup\n#fontsize;80"
10052050-96 = "1;케이 프로토;14;사람이 만든 이런저런 것들은! 어떻게 하면 일을 조금 덜 귀찮게 할 수 있을까 생각하다가!\n#1;closeup"
10052050-97 = "1;케이 프로토;14;그 끝에서 마침내 탄생한 것들이니 말이죠!\n#1;closeup"
10052050-98 = "3;통신 오르;18;……진짜 사람 다 됐구만요.\n#3;em;[땀]\n#1;hide"
10052050-99 = "3;케이 프로토;07;시끄러워요."
10052050-100 = "3;통신 오르;02;이봐요. 당신은 지금 스스로의 가치를 낮추고 있어요."
10052050-101 = "3;통신 오르;12;당신도 그렇고 아리스도 그렇고, 애초에 더 위대한 존재가 될 수 있었고, 지금도 얼마든지 그럴 수 있단 말입니다.\n#3;em;[반응]"
10052050-102 = "3;통신 오르;13;정말 이해가 가지 않네요. 왜 그렇게 자기 가치를 떨어트리려고 그러는 거죠?"
10052050-103 = "3;케이 프로토;02;신경 쓰지 말아요. 제 맘이니까."
10052050-104 = "3;케이 프로토;01;스스로 위대하다고 말하는 녀석들과, 자기완성을 위해 살아간다고 말하는 녀석들이 보통 제일 위험한 법이죠."
10052050-105 = "3;케이 프로토;99;애초에, 남의 인생에 이래라저래라 간섭하는 거 안 좋은 버릇입니다. \n#3;em;[...]"
10052050-106 = "3;케이 프로토;01;보통 시간이 엄청 많은 백수거나, 성격 안 좋고 꽉 막힌 부류들이 그러곤 하죠."
10052050-107 = "3;케이 프로토;03;와, 축하해요. 당신은 지금 스스로의 일부분을 정의했어요."
10052050-108 = "3;통신 오르;13;……뒷부분은 모르겠는데, 앞부분은 뭔가 화가 나네요. 지금 우리가 그렇게 한가해 보이나요? 우리가 얼마나 바쁘게 사는데!\n#3;em;[빠직]"
10052050-109 = "3;케이 프로토;07;이거, 정말로 아무것도 모르는군요."
10052050-110 = "3;케이 프로토;16;백수가 세상에서 제일 바쁜 법입니다!!!\n#3;closeup\n#fontsize;80"
10052050-111 = "3;통신 오르;06;뭐라고요?!?!\n#3;em;[?!]\n#3;shake"
