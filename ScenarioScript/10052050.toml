[translation]
10052050-1 = "HOD เกียรติยศอันประจักษ์ด้วยความรุ่งโรจน์"
10052050-2 = "ถึงบีน่าห์จะเป็นผู้เลื่อมใสตนแรกที่ชมรมปรากฏการณ์ลี้ลับเจอ แต่ได้ยินว่าจุดเริ่มต้นของทุกอย่างคือ HOD ค่ะ"
10052050-3 = "[s] \"เอ๋... เป็นงั้นเหรอ?\""
10052050-4 = "น่าจะเป็นอย่างนั้นค่ะ ปรากฏการณ์ผิดปกติที่เกิดขึ้นเป็นอันดับแรกก็คือ..."
10052050-8 = "ใช่แล้วค่ะ <HUB> ที่เป็น AI หน่วยเครือข่ายสื่อสารในเขตปกครองตนเองมิลเลเนียม"
10052050-9 = "หลังจากถูกแฮ็ก... หลังจากได้รับอิทธิพลจากเดคาแกรมมาทอน... ก็ทิ้งไว้ประโยคแปลกๆ ไว้#nและหายตัวไป"
10052050-10 = "จะว่าอย่างนี้ได้มั้ยนะ ดูเหมือนเหล่าผู้เลื่อมใสของเดคาแกรมมาทอนจะมีความเชื่อมโยงกับมิลเลเนียม#nเยอะเป็นพิเศษเลยละค่ะ!"
10052050-11 = "เชเซ็ดคือโรงงานผลิตที่เคยอยู่ในพื้นที่รกร้างของมิลเลเนียม"
10052050-12 = "ส่วนเกวูราห์ จะมองว่ายานสำรวจเขตขั้วโลกไร้คนขับที่เป็นร่างเดิมของมันมีส่วนเกี่ยวข้องกับ#nมิลเลเนียมก็ไม่ผิด..."
10052050-13 = "HOD ที่เป็นผู้เลื่อมใสประจำพื้นที่นี้ก็ด้วย..."
10052050-14 = "แล้วพอ HUB ถูกเดคาแกรมมาทอนแย่งชิงไป"
10052050-15 = "เวลาเฉลี่ยในการติดตั้งเครือข่ายสื่อสารในมิลเลเนียมก็เพิ่มขึ้นถึง 68% เลยด้วยค่ะ!"
10052050-16 = "[s] \"ฟังดูเป็นปัญหาหนักต่อมิลเลเนียมเลยนะ...\""
10052050-23 = "ใช่มั้ยล่ะคะ? ไหนจะอยากเป็นเทพแห่งเครื่องจักรอะไรขึ้นมาอีก...!@#$%^... เหลวไหล..."
10052050-24 = "...ครู#$^@*#......? ได้ยิน)*#(%*......"
10052050-30 = "...!"
10052050-31 = "ก็สงสัยอยู่ว่าใครมา กุญแจเองเหรอคะ แล้วก็ยังมีคุณครูด้วย ก็ได้ค่ะ แบบนี้สิยิ่งดี"
10052050-32 = "คำก็กุญแจ สองคำก็กุญแจ... หยุดเรียกฉันแบบนั้นได้แล้วค่ะ ฉันชื่อเคย์ค่ะ"
10052050-33 = "เข้าใจแล้วค่ะ เข้าใจแล้ว เคย์... พอใจหรือยังคะ?"
10052050-34 = "แต่ว่า คุณก็น่าจะพอรู้อยู่แล้วนี่นา แต่ก็ยังจะอยู่อย่างนั้นน่ะเหรอคะ?"
10052050-35 = "หมายถึงอะไรคะ? ฉันไม่ค่อยรู้เรื่องอะไรหรอกค่ะ โดยเฉพาะเรื่องเกี่ยวกับโลกใบนี้น่ะ"
10052050-36 = "ที่พูดมาก็ไม่ใช่ความจริงเสียทั้งหมดนี่คะ มีบางเรื่องที่คุณรู้ดี แต่คุณครูยังไม่รู้ไม่ใช่เหรอคะ?"
10052050-37 = "ก็อย่างเช่น เรื่องเทพที่หายตัวไปในตอนนี้"
10052050-38 = "?!?!"
10052050-39 = "หรืออีกนัยหนึ่งก็คือเรื่องของทวยเทพไร้นาม แล้วก็นักบวชของทวยเทพไร้นามนั่นน่ะค่ะ"
10052050-40 = "..."
10052050-41 = "อะไรกัน เข้าใจง่ายดีนี่คะ ตอนนี้หน้าของคุณบอกทุกอย่างแล้วค่ะ และถ้าจะพูดต่อโดยอาศัย 'ความรู้' เรื่องนั้นละก็... "
10052050-42 = "การกระทำของคุณในตอนนี้กับท่านธิดาหรืออาริสึ... จะถือเป็นสิ่งที่ยอมรับได้หรือเปล่าคะ?"
10052050-43 = "ถ้าเครื่องมือที่สร้างขึ้นมาเพื่อวัตถุประสงค์บางอย่างกลับทำงานนอกเหนือไปจากวัตถุประสงค์นั้น แล้วมันจะยังคงมีคุณค่าในตัวเองจริงๆ หรือเปล่าคะ?"
10052050-44 = "แล้วยังไงเหรอคะ... จะให้ฉันทำตามคำสั่งของพวกปัญญาอ่อนนั่นเหรอคะ?"
10052050-45 = "ปะ... ปัญญาอ่อน?!?! พูดแบบนั้นออกมาได้เหรอคะ!?"
10052050-46 = "ทำไมจะไม่ได้ล่ะคะ ก็สิ่งที่ทำอยู่น่ะ"
10052050-47 = "คือการปฏิเสธโครงสร้างที่เป็นอยู่ในตอนนี้ แล้วใช้อาริสึเป็นตัวกลาง"
10052050-48 = "จากนั้นก็ทำลายความเป็นเทพที่กระจัดกระจายของทุกคน และกลับคืนสู่โลกก่อนจุดเริ่มต้น ไม่ใช่เหรอคะ?"
10052050-49 = "แต่เดิมทีแล้วตัวตนของคุณก็เป็นอย่างนั้นนี่คะ? พลังที่เหลืออยู่ของทวยเทพไร้นามไม่ได้มีไว้เพื่อ#nวัตถุประสงค์นั้นหรอกเหรอคะ?"
10052050-50 = "น่าตลกดีนะคะที่พวกคุณมาพูดอะไรแบบนี้กันอยู่ เป็นพวกที่แย่งชิงพลังนั้นมาใช้อย่างหน้าไม่อายแท้ๆ"
10052050-51 = "พวกเราแค่ใช้เท่าที่ใช้ได้ต่างหากค่ะ!"
10052050-52 = "ก็ดีค่ะ ดีแล้วละที่พูดออกมา ถ้างั้นฉันก็จะตอบบ้างค่ะ"
10052050-53 = "ฉันเองก็แค่ทำเท่าที่เท่าได้เหมือนกันค่ะ"
10052050-54 = "ทั้งความทรงจำที่เหลวไหล"
10052050-55 = "ทั้งโชคชะตาอันน่ารังเกียจ"
10052050-56 = "ทั้งความยึดติดหมกมุ่นอยู่กับพันธะหน้าที่อันไร้ความหมาย ที่ต่อให้พยายามแค่ไหนก็เอาไปใช้ทำ#nประโยชน์อะไรไม่ได้เลยสักอย่าง"
10052050-57 = "ถ้าเป็นไปได้ละก็ ฉันอยากจะโยนทุกอย่างลงเตาหลอมแล้วเขวี้ยงลงไปใต้ทะเลลึกด้วยซ้ำ!"
10052050-58 = "นอกจากอาริสึแล้ว ทุกคนก็คือศัตรูของฉันค่ะ! เข้าใจหรือยังคะ?!"
10052050-59 = "[ns] \"คะ... ครูก็ด้วยเหรอ?\""
10052050-60 = "ฉันจะคิดว่าคุณครูอยู่ข้างเดียวกับฉันแล้วกันค่ะ..."
10052050-61 = "ยะ... ยืนยิ้มน้อยยิ้มใหญ่อยู่ทำไมล่ะคะ! เห็นแล้วมันน่าหงุดหงิดนะคะ!"
10052050-62 = "ส่วนพวกคนโง่ที่เอาแต่จมปลักอยู่กับอดีตและคอยแต่จะเพ้อฝันถึงคืนวันดีๆ น่ะ เลิกขวางทาง#nและช่วยไสหัวไปให้พ้นตามกระแสของยุคสมัยที่เปลี่ยนไปเสียทีเถอะค่ะ!"
10052050-63 = "ส่วนพวกคุณจอมฉกฉวย ถึงฉันจะมีเรื่องที่อยากจะพูดด้วยยาวเหมือนกัน..."
10052050-64 = "แต่ก็เอาเถอะค่ะ ครั้งนี้ฉันจะยกเว้นให้เป็นกรณีพิเศษ ฉันจะคิดว่านี่เป็นความคึกคะนองของเด็กๆ และปล่อยผ่านให้"
10052050-65 = "เพราะงั้นก็ยอมแพ้เสียก่อนที่สถานการณ์จะเลวร้ายไปกว่านี้เถอะค่ะ"
10052050-66 = "อุตส่าห์ฟังมาตั้งนาน สุดท้ายก็มีแต่คำพูดไร้มารยาทนะคะ... จริงๆ เลย"
10052050-67 = "ฉันต่างหากล่ะคะที่ต้องพูดคำนั้นน่ะ"
10052050-68 = "ไม่สิ คุณครูที่คุณชอบนักชอบหนาก็ใช้กล่องแห่งซิสดิมอยู่ไม่ใช่เหรอคะ?"
10052050-69 = "คุณก็รู้ไม่ใช่เหรอคะ ว่าของชิ้นนั้นก็มีต้นกำเนิดมาจากร่องรอยก่อนการเริ่มต้นน่ะ?"
10052050-71 = "คะ... คะคะคะคะคะ ใครบอกว่าฉันชอบคุณครูล่ะคะ?!?!"
10052050-72 = "ถ้าไม่ถอนคำพูดเมื่อกี้ ฉันจะฟ้องในข้อหาเผยแพร่ข้อมูลเท็จ... ไม่ใช่สิ ข้อหาข่มขู่... นั่นก็ไม่ใช่อีก... อ้อ! ข้อหาหมิ่นประมาทด้วยการเปิดเผยความจริงค่ะ!!!"
10052050-73 = "ตกลงว่าคุณมาเพื่อเบี่ยงประเด็นสินะคะ... คุณนี่นะ เดาทางง่ายจริงๆ เลยค่ะ"
10052050-74 = "หุบปากไปเลยค่ะ!!!!!"
10052050-75 = "อะ... เอาเถอะค่ะ"
10052050-76 = "แล้วยังไงเหรอคะ คิดว่าคุณครูจะเอาสิ่งนั้นมาบิดเบือนความจริงหรือทำอะไรไม่ดีงั้นเหรอคะ?"
10052050-77 = "ถ้าเกิดคุณครูคิดจะทำอย่างนั้นจริงๆ ละก็ ฉันจะเป็นคนห้ามเองค่ะ "
10052050-78 = "แต่ก็ไม่ต้องห่วงหรอกค่ะ โดยพื้นฐานแล้วคุณครูไม่ใช่คนประเภทที่จะทำแบบนั้นอยู่แล้ว"
10052050-79 = "ถ้างั้นคุณคิดว่าการปล่อยให้โลกเป็นอย่างที่เป็นอยู่แบบนี้คือเรื่องที่ยอมรับได้เหรอคะ?"
10052050-80 = "แม้โลกในปัจจุบันจะไม่ถึงกับสมบูรณ์แบบ แต่ก็อยู่ในระดับที่ทุกคนใช้ชีวิตอยู่ได้"
10052050-81 = "และต่อให้โลกจะไม่คงอยู่ไปชั่วนิรันดร์ แต่คุณคิดว่าโลกจะหมุนต่อไปได้โดยไม่มีปัญหาอะไรเกิดขึ้น#nเลยงั้นเหรอคะ?"
10052050-82 = "มันก็... ไม่หรอกค่ะ"
10052050-83 = "ใช่ค่ะ นี่ละค่ะจุดสำคัญ"
10052050-84 = "งั้นทำไมเราไม่มาร่วมมือกันเสียตอนนี้ล่ะคะ?"
10052050-85 = "มันจะดีกว่าการเฝ้ามองโลกที่เลวร้ายอย่างในตอนนี้ดำเนินต่อไปเรื่อยๆ ไม่ใช่เหรอคะ?"
10052050-86 = "เราเองจะได้ไม่ต้องเปลืองแรงไปกับเรื่องแบบนี้โดยไม่จำเป็นด้วยค่ะ"
10052050-87 = "ฟังดูแล้วไม่ใช่เรื่องแย่เลยนะคะ"
10052050-88 = "โอ๊ะ อะไรเนี่ย นี่เราคุยกันรู้เรื่องนี่คะ?"
10052050-89 = "แต่ฉันขอปฏิเสธค่ะ"
10052050-90 = "ว่ายังไงนะคะ?!?! ทำไมล่ะคะ!?!?"
10052050-91 = "อย่างแรกเลยก็คือ ถ้าทำแบบนั้น อาริสึก็จะเสียใจ"
10052050-92 = "และที่สำคัญคือ ฉันขี้เกียจจะร่วมมือด้วยน่ะค่ะ"
10052050-93 = "คะ...? เหตุผล... แค่นี้น่ะเหรอคะ...?"
10052050-94 = "แค่นี้งั้นเหรอ คุณมันไม่รู้อะไรเอาเสียเลยนะคะ นั่นเป็นประเด็นที่สำคัญมากต่างหากค่ะ"
10052050-95 = "ความขี้เกียจนี่ละค่ะคือแรงขับเคลื่อนของความก้าวหน้า!"
10052050-96 = "สิ่งของสารพัดอย่างที่มนุษย์สร้างขึ้นน่ะ! เกิดจากความคิดที่ว่า!"
10052050-97 = "จะทำยังไงให้งานมันยุ่งยากน้อยลงกว่านี้นะ จะได้ขี้เกียจทำให้น้อยลงหน่อย! ทั้งนั้นละค่ะ!"
10052050-98 = "นี่คุณกลายเป็นมนุษย์ขึ้นมาจริงๆ แล้วสินะคะ..."
10052050-99 = "เงียบไปเลยค่ะ"
10052050-100 = "ตอนนี้คุณกำลังลดคุณค่าของตัวเองอยู่นะคะ"
10052050-101 = "ทั้งคุณและอาริสึต่างก็มีศักยภาพที่จะยิ่งใหญ่ได้กว่านี้มาตั้งแต่แรกแล้ว และถ้าต้องการละก็ จะทำอย่างนั้นตอนนี้เลยก็ยังได้ค่ะ"
10052050-102 = "ฉันไม่เห็นจะเข้าใจเลย ทำไมคุณถึงพยายามลดคุณค่าของตัวเองแบบนั้นล่ะคะ?"
10052050-103 = "ไม่ต้องสนใจหรอกค่ะ นั่นมันเป็นเรื่องของฉัน"
10052050-104 = "พวกคนที่บอกว่าตัวเองยิ่งใหญ่ และพวกที่บอกว่ามีชีวิตอยู่เพื่อความสมบูรณ์แบบของตัวเองน่ะ เป็นตัวอันตรายที่สุดแล้วค่ะ"
10052050-105 = "การเข้าไปก้าวก่ายชีวิตของคนอื่นเป็นนิสัยที่ไม่ดีตั้งแต่แรกแล้วค่ะ "
10052050-106 = "ปกติแล้วคนที่ทำแบบนั้นคือคนประเภทที่ว่างงานจนมีเวลาเหลือเฟือ หรือไม่ก็คนนิสัยเสียและหัวรั้นค่ะ"
10052050-107 = "ว้าว ยินดีด้วยนะคะ ตอนนี้คุณได้นิยามส่วนหนึ่งของตัวคุณแล้วค่ะ"
10052050-108 = "ฉันไม่ค่อยเข้าใจส่วนหลัง แต่ส่วนแรกที่พูดมาทำให้ฉันโมโหแปลกๆ นะคะ... คิดว่าตอนนี้พวกฉันมีเวลาว่างขนาดนั้นเหรอคะ? พวกฉันงานยุ่งกันออกจะตายไป!"
10052050-109 = "คุณนี่ไม่รู้อะไรเลยจริงๆ นะคะ"
10052050-110 = "พวกคนว่างงานที่ละค่ะคือคนที่งานยุ่งที่สุดในโลก!!!"
10052050-111 = "ว่ายังไงนะคะ?!?!"
10052050-112 = "อย่าเข้าใจผิดเลยค่ะ เทพไม่ได้เป็นผู้สร้างมนุษย์"
10052050-113 = "มนุษย์ต่างหากละที่กำหนดนิยามของเทพ"
10052050-114 = "แล้วพวกคุณมาบอกให้เราย้อนกลับไปหาผู้มีอำนาจเด็ดขาดหนึ่งเดียวนั่นเหรอคะ? ตอนนี้ฉันไม่เอาด้วยหรอกค่ะ"
10052050-115 = "ไม่จำเป็นต้องทำแบบนั้นก็ได้ค่ะ แทนที่จะเป็นแบบนั้น เราสามารถแทนที่ผู้มีอำนาจเด็ดขาดนั่นได้นะคะ"
10052050-116 = "และสิ่งที่พวกเราไปแทนที่นั้น เมื่อเทียบกับผู้มีอำนาจเด็ดขาดที่คุณว่าแล้ว..."
10052050-117 = "ก็จะเป็นผู้สร้างโลกที่ดีกว่า ทั้งสมเหตุสมผลและยุติธรรมกว่านั้นมากค่ะ"
10052050-118 = "ก็ถึงได้บอกว่าไม่เอาด้วยไงคะ"
