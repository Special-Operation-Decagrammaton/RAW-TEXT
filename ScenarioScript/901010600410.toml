[translation]
901010600410-7 = "むにゃむにゃ……。"
901010600410-8 = "FOX4？"
901010600410-9 = "イチゴショートケーキに、ホイップクリームを乗せてぇ……。"
901010600410-10 = "オトギ――"
901010600410-11 = "ふふ……ケーキはいっぱいあるからぁ……。"
901010600410-15 = "えいっ。"
901010600410-22 = "うっ、ううぅ……ショートケーキにアジはダメぇ――！"
901010600410-27 = "……って、夢？アジがいっぱい乗ったショートケーキを食べる夢って……。"
901010600410-32 = "ただいま、FOX4。"
901010600410-33 = "あ、ニコ――FOX2か。"
901010600410-34 = "ごめん。ちょっと疲れてて一休みしてたら……。"
901010600410-35 = "今日の作戦で何か大変なことでもあったの？"
901010600410-36 = "ううん。ただ昨日、寝ようとしたら、FOX3の寝相が悪すぎて……。"
901010600410-37 = "そのせいで寝不足……ふぁあ……。"
901010600410-38 = "ふふっ、それは大変だったね。"
901010600410-39 = "作戦報告が終わるまでもうちょっと我慢してね。#n夕食に美味しいアジフライを作ってあげるから。"
901010600410-40 = "やったぁ！アジフライ！さっきのニオイはここからだったんだね。"
901010600410-41 = "じゃあ、夕飯の前に手早く報告を済ませよっか。"
