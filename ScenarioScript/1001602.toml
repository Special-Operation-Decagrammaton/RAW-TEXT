[translation]
1001602-1 = "The Deadline's Approaching, Sensei"
1001602-2 = "Millennium Game Development Department"
1001602-3 = "(I got a call from Midori and headed over to the Game Development Department.)"
1001602-4 = "When I arrived in the club room, I saw Midori concentrating with a sketchbook in the middle of the room."
1001602-5 = "Then..."
1001602-6 = "[ns] \"Midori?\""
1001602-8 = "Hmm, this isn't it."
1001602-9 = "[s] \"Hello...?\""
1001602-11 = "Hmmm. This isn't it either..."
1001602-12 = "[s] \"Can you hear me?\""
1001602-14 = "Hmmm... None of these would work."
1001602-15 = "[s] \"It looks like Midori can't hear me.\""
1001602-16 = "Oh, Sensei! Wh-When did you get here?!"
1001602-17 = "[s] \"You said you wanted to talk to me about something. What's up?\""
1001602-18 = "Oh, right. Counseling. I texted you about that."
1001602-19 = "..."
1001602-20 = "Waaah, Sensei! I-I'm in trouble!"
1001602-21 = "[s] \"Trouble?\""
1001602-22 = "The deadline is just around the corner, but I can't think of anything!"
1001602-24 = "[ns] \"Well, do you feel better now?\""
1001602-25 = "Yes, I'm embarrassed about how I acted. I'm sorry."
1001602-26 = "I've been agonizing over this for a few days..."
1001602-27 = "[s] \"So, what is it that you needed my advice on?\""
1001602-28 = "You know...in the Game Development Department..."
1001602-29 = "We don't know when or how we'll get to make a new game."
1001602-30 = "So I've been brainstorming all sorts of different ideas."
1001602-31 = "The deadline for the next conference is fast approaching, so I was trying to come up with something new by then..."
1001602-32 = "[s] \"And you couldn't think of anything all night?\""
1001602-33 = "Yeah. The deadline is just around the corner, but I've got nothing..."
1001602-34 = "[s] \"If you're having that much trouble, couldn't you ask to push back the deadline?\""
1001602-35 = "Push back the deadline?"
1001602-37 = "Sensei, a deadline is like a promise. Wouldn't it be irresponsible for me to ask it to be pushed back because I can't keep it?"
1001602-38 = "As an illustrator, and the person in charge of all game visuals in the Game Development Department, I won't allow myself to do that!"
1001602-39 = "[s1] \"You're very strict with yourself.\"\n[s2] \"I'm impressed by your sense of responsibility, Midori!\""
1001602-40 = "U-Um, I didn't realize how worked up I got."
1001602-41 = "U-Um, I didn't realize how worked up I got."
1001602-42 = "Anyway, no. I can't push back the deadline. No way."
1001602-43 = "That's why I texted you, Sensei. I needed your advice."
1001602-44 = "Can you think of anything?"
1001602-45 = "[s] \"What do you usually play?\""
1001602-46 = "I mostly play puzzle games and casual games, like Tetness and Poyoyopo."
1001602-47 = "[s3] \"Then how about trying a game from a genre you've never played before?\"\n[s4] \"That might give you an idea!\""
1001602-48 = "Oh, so shifting my perspective... You mean, I could stimulate my mind by playing games from genres I don't usually play."
1001602-49 = "Oh, so shifting my perspective... You mean, I could stimulate my mind by playing games from genres I don't usually play."
1001602-50 = "Hmm!"
1001602-51 = "I think that's a good idea!"
1001602-52 = "In that case..."
1001602-53 = "Can you accompany me through the process?"
1001602-64 = "So Midori got a competitive game that she'd never played before."
1001602-66 = "At the time, I had no idea..."
1001602-67 = "...what kind of catastrophe that choice would bring."
1001602-70 = "Ah! Again, I can't go anywhere because my path is blocked by bombs!"
1001602-71 = "Ugh! Again! Let's play again, Sensei! "
1001602-73 = "Wha?! Why did I just die?!"
1001602-74 = "I planted that bomb! Why did I die?!"
1001602-75 = "No, not yet, Sensei! It's not over yet!"
1001602-78 = "[ns] \"Midori, it's time to...\""
1001602-79 = "You just won that round, Sensei!"
1001602-80 = "I hope you're not the kind of rude grown-up who bails after winning a single round!"
1001602-81 = "[s] \"I mean, it's not that...\""
1001602-82 = "It's not over till it's over!"
1001602-83 = "The game is only over when I give up!"
1001602-84 = "Be prepared, Sensei. You can't leave until I win."
1001602-86 = "Taking a break from the brainstorming, Midori and I played the game all night."
