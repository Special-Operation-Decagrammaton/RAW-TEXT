[translation]
2002405-1 = "The Rich Flavor of Black Tea"
2002405-2 = "Good afternoon, Sensei."
2002405-3 = "I'm happy to say the new tea leaves we've been anticipating have arrived."
2002405-4 = "I was introduced to this brand by students who attended teatime a short while ago. They'd brought leaves that they said were leftovers from brewing kombucha. I tried them, and the taste was quite good!"
2002405-5 = "My usual stock of tea leaves ran out, so I ordered black tea from that brand as a change of pace."
2002405-6 = "[s] \"I can't wait to try it!\""
2002405-7 = "The crisp flavor of bergamot should make it a bit more refreshing than a traditional black tea."
2002405-8 = "I wasn't sure what the proper pairing would be, so I've prepared a variety of light refreshments."
2002405-9 = "[s] \"...That's quite a large variety.\""
2002405-10 = "This teatime is meant to be an apology for my previous behavior. It wouldn't be proper to skimp on cakes and desserts."
2002405-11 = "Please help yourself, and enjoy them."
2002405-12 = "In the meantime, I'll brew the tea."
2002405-16 = "Oh, the design of this box is slightly different than the one I saw before."
2002405-17 = "Wait a minute. Is this...?"
2002405-23 = "(This is dried kelp, not tea leaves!)"
2002405-24 = "(Why!? Who puts kelp in a tea box?)"
2002405-25 = "(Could the company have misunderstood my order this badly?!)"
2002405-26 = "(Even for a busy store, this kind of mistake is unforgivable.)"
2002405-27 = "(But... I have no tea leaves left. And of course it'd be outrageously rude to send Sensei away without a single cup of tea...)"
2002405-28 = "(So I guess I have no choice...but to serve Sensei...this kelp tea...)"
2002405-29 = "[ns] \"Is something wrong?\""
2002405-30 = "O-Oh, no! Absolutely nothing at all."
2002405-34 = "As this type of tea is new to me, I had to research the perfect temperature to brew it at."
2002405-37 = "T-Thank you for waiting. Please enjoy this royal blend, steeped just for you."
2002405-38 = "This tea should be sipped slowly and steadily."
2002405-41 = "— Heehee...the subtle scent of bergamot[wa:2300] "
2002405-43 = "― is so refreshing."
2002405-46 = "― (This is definitely kelp...[wa:1540] "
2002405-48 = "— The smell is unmistakable...)[wa:340] "
2002405-51 = "— And its unique, crisp aftertaste[wa:1810] "
2002405-53 = "— goes well with snacks...[wa:100] "
2002405-56 = "— (The kelp is too strong..."
2002405-58 = "— and tastes are colliding  in my mouth...)[wa:280] "
2002405-61 = "― Sensei, is it your first time[wa:1680] "
2002405-63 = "—  tasting something like this?"
2002405-66 = "― I-I see...[wa:860] "
2002405-68 = "— This kind of tea isn't easy to come by. Hee...heehee...[wa:2140] "
2002405-71 = "― (You haven't discovered my little deception, have you?[wa:10] "
2002405-73 = "— The smell may be...significantly off, but at least the color is right...)[wa:80] "
2002405-76 = "― (If I knew this would happen,[wa:440] "
2002405-78 = "— I would've just ordered my normal black tea.)[wa:920] "
2002405-81 = "Nagisa and I enjoyed tea and refreshments for a while."
2002405-83 = "Whew...it really wasn't as bad as I feared."
2002405-84 = "It wasn't correctly paired with the snacks, but at least it was better than offering plain water..."
2002405-85 = "What did you think, Sensei? Was it to your liking?"
2002405-86 = "[s] \"Yup, it was good!\""
2002405-88 = "[ns] \"That was some very tasty kelp.\""
2002405-89 = "Yes, that was certainly the taste of a perfect kelp infusion—"
2002405-93 = "Wait! Wait a moment, Sensei! You knew it wasn't black tea? When did you realize?"
2002405-94 = "[s] \"From the start...?\""
2002405-95 = "..."
2002405-96 = "The purpose of this tea party was to make amends for my previous poor conduct, but instead you just witnessed another embarrassing moment."
2002405-97 = "There's nothing else for it..."
2002405-98 = "I have no choice but to forcibly erase your memory."
2002405-100 = "It took some effort, but I managed to avoid Nagisa's memory-erasing attempts."
