[translation]
2005406-1 = "生活助理（２）"
2005406-4 = "真是抱歉……"
2005406-5 = "[s1] 「沒關係，你想必很累吧。」\n[s2] 「活著總是會睡過頭的嘛。」"
2005406-8 = "可是在這種時期，這種情況之下……"
2005406-9 = "從各種意義上來說都不合格呢……"
2005406-10 = "嗯？希望我不要太過自責？"
2005406-11 = "反而是因為老師太依賴我了，所以才會變成這樣……？"
2005406-12 = "可是……"
2005406-13 = "[s3] 「哎呀，看來說不通呢！」\n[s4] 「那麼今天就讓我來當陽葵的生活助理吧！」"
2005406-16 = "……咦？"
2005406-17 = "老師，要當我的……？"
2005406-18 = "可，可是那有點……！"
2005406-19 = "我以前不是也接受過其他孩子們的幫助……是嗎？"
2005406-20 = "這……確實是這樣沒錯。#n英美自然不必多說，最近季也偶爾會來幫忙……"
2005406-21 = "可，可是接受老師的幫助，這又是另一回事了……"
2005406-22 = "[s] 「……你這麼討厭嗎？」"
2005406-23 = "怎麼會呢！我反而……！"
2005406-24 = "反而……"
2005406-25 = "唔，唔唔唔……"
2005406-30 = "（雖然很開心……開心到難以言喻……！）"
2005406-31 = "（卻也因此害羞到說不出話來啊！）"
2005406-36 = "[ns5] 「陽葵一直都很努力，所以偶爾也希望你能依賴身邊的人。」\n[ns6] 「如果不嫌棄的話，要依賴我也沒問題！」"
2005406-41 = "老師？那種話最好不要隨意說出口比較好唷？"
2005406-42 = "雖然我並不是那樣的人……"
2005406-43 = "不過要是被莉央那種表面和內心一樣黑暗，頭腦又還算靈光的學生給纏上……"
2005406-44 = "到時候可能會變得很麻煩的哦？"
2005406-45 = "[s] 「那也挺有趣的！」"
2005406-46 = "咦！？！？"
2005406-47 = "學，學生隨時都可以給老師添麻煩？#n那在某種意義上是學生的特權？"
2005406-48 = "……"
2005406-49 = "真是的！請不要一直說那種話！"
2005406-50 = "……希望您不要那樣有意無意地測試我的忍耐力。"
2005406-51 = "假如我有那個意思，也能成為一個很麻煩的女孩子的哦……"
2005406-52 = "[ns] 「陽葵？」"
2005406-55 = "沒，沒沒沒，沒什麼！我什麼都沒說！"
2005406-56 = "咳哼……"
2005406-57 = "那麼，既然老師您都這麼說了……"
2005406-58 = "今天我打算盡情地給老師添麻煩，可以嗎？"
2005406-59 = "[s7] 「唔，這就是所謂的自作自受嗎……！」\n[s8] 「沒辦法！這個[ruby=Challenge]挑戰[/ruby]我接受了！」"
2005406-62 = "呵呵呵……"
2005406-63 = "這可是老師您親口說的，還請做好覺悟哦？"
2005406-64 = "（於是和陽葵的麻煩時間(?)就這樣開始了）"
2005406-67 = "啊～啊，我想洗手，有沒有人願意「抱著」我過去呢～？"
2005406-68 = "我應該不是很重，距離洗手台也不是很遠哦～？"
2005406-69 = "[ns] 「好好好。」"
2005406-75 = "（就在那個瞬間……陽葵溫暖的呼吸實實在在地掠過了耳邊！）"
2005406-76 = "[ns]「！？！？」"
2005406-77 = "哎呀，您為何那麼驚訝呢，老師？"
2005406-78 = "呼吸可是生命存續最基本的行為哦？"
2005406-80 = "（雖然是這樣沒錯啦……！）"
2005406-81 = "（總之一邊努力維持平衡，一邊幫助陽葵）"
2005406-87 = "……"
2005406-88 = "（我還以為心臟要爆炸了！）"
2005406-89 = "（哇，哇啊……這比想像中還要緊張……）"
2005406-90 = "（而且好令人害羞……！）"
2005406-93 = "啊～啊，該怎麼辦好呢？#n我的手臂突然沒力氣了耶～？"
2005406-94 = "雖然很感謝老師願意幫我按摩，但我現在突然有點餓了……"
2005406-95 = "放在冰箱裡的巧克力布朗尼～有沒有人願意餵我吃呢～？"
2005406-99 = "謝謝您，老師。"
2005406-100 = "那麼……"
2005406-104 = "[ns] 「！？！？！？」"
2005406-105 = "呵呵。怎麼了嗎，老師？"
2005406-106 = "我只是覺得血糖下降的速度，似乎比想像中還快……"
2005406-107 = "所以才稍微移動身體湊過去品嘗而已。"
2005406-108 = "[s] 「這，這樣啊。看來你真的很想吃呢……」"
2005406-113 = "（還以為臉要燒起來了！）"
2005406-114 = "（居然跟老師的臉靠得那麼近……！）"
2005406-115 = "（不，雖然主動接近的人是我，但就算是這樣……！）"
2005406-116 = "……"
2005406-117 = "（不過話又說回來……老師面對像我這種美少女的逼近，難道一點感覺也沒有嗎？）"
2005406-121 = "（不，先等一下……會不會正是因為這樣？）"
2005406-122 = "……"
2005406-123 = "（過於突然地調整距離，反而可能會造成反效果嗎……？）"
2005406-124 = "（沒錯，這就像是加入了過量的催化劑……）"
2005406-125 = "（為了提升反應速度而增加催化劑的劑量，雖然可以縮短獲得結果的時間……）"
2005406-126 = "（但是產出不必要的副產物，或者降低反應系統穩定性的可能性也會隨之上升……）"
2005406-127 = "（像我這樣的人居然會犯下這種錯誤……我得好好反省才行）"
2005406-130 = "哎呀，不知不覺已經到晚上了呢。"
2005406-131 = "[s] 「咦？已經這麼晚了嗎！？」"
2005406-132 = "因為這個地方很難明確區分晝夜，很容易出現時間感錯亂的情況。"
2005406-133 = "畢竟這裡可是「特異現象」正在實時發生的地方呢。"
2005406-134 = "啊～啊，生理時鐘亂掉會導致很難入睡，有沒有人能在旁邊哄我睡覺呢～？"
2005406-135 = "[s] 「那，那樣真的沒關係嗎！？！？」"
2005406-136 = "哎呀？"
2005406-137 = "我比世上的任何人都信任老師哦？#n老師難道不是嗎？"
2005406-138 = "[s] 「……！！！」"
2005406-140 = "[ns9] 「原來如此。我明白了。」\n[ns10] 「現在的我可是陽葵的生活助理啊！」"
2005406-144 = "（於是為了哄陽葵睡覺，朝著床邊走去）"
2005406-145 = "（就在這時……！）"
2005406-146 = "嘿咻♪"
2005406-151 = "[ns] 「陽葵！？」"
2005406-152 = "怎麼了嗎，老師？#n您不是說要哄我睡覺嗎？"
2005406-153 = "我這個人呢～在睡不著的時候～需要有人在旁邊才能睡著～"
2005406-154 = "咦？問我英美和季是不是也會這麼做……？"
2005406-158 = "（……其實並不是那樣的）"
2005406-159 = "（畢竟要是跟英美太接近的話，我幾乎肯定會中暑。但是……）"
2005406-164 = "雖然不是每次～不過像今天這樣睡不著的時候，或許就會這樣哦？"
2005406-165 = "（對不起。老師）"
2005406-166 = "（變成這麼麻煩的女孩子……真的很對不起）"
2005406-167 = "[ns11] 「真拿你沒辦法呢～」\n[ns12] 「那就真的只到你睡著為止哦？」"
2005406-170 = "好，好的。那當然！"
2005406-176 = "（讓陽葵躺下之後，將房間的燈給關上）"
2005406-177 = "（陽葵規律的呼吸聲，聽起來就像幫助睡眠的自然音效一樣）"
2005406-178 = "（明明說好只到陽葵睡著為止……）"
2005406-179 = "（先睡著的卻是…………）"
2005406-186 = "老師……"
2005406-187 = "您睡著了嗎？"
2005406-188 = "規律的呼吸聲，稍微下降的體溫……#n腦波測量裝置開始檢測到Theta波和微量的Delta波……"
2005406-189 = "呵呵……"
2005406-190 = "其實我們之中消耗最多體力的人，反而應該是老師您吧。"
2005406-194 = "（恍惚之間，感覺身體似乎被某種類似手臂的東西給環繞了起來……）"
2005406-196 = "老師。"
2005406-197 = "……老師。"
2005406-198 = "我們的……"
2005406-199 = "現在，只屬於我的老師……"
2005406-200 = "您知道嗎，老師？"
2005406-201 = "現在的我，真的是個壞孩子。"
2005406-202 = "如果您察覺到了，希望您能以睡眠與夢境為由將其遺忘。"
2005406-203 = "如果您尚未察覺，希望您能盡可能長久地維持下去。"
2005406-204 = "在身處這種情況與事態的當下，居然在思考這種事情……"
2005406-205 = "什麼天才病弱美少女……真是不禁對自己感到厭惡呢。"
2005406-206 = "如果硬要推卸責任的話，我也想稍微抱怨一下把我變成這樣的老師……"
2005406-207 = "不，那樣果然太過卑劣了吧。"
2005406-212 = "對不起，老師。"
2005406-213 = "對不起。"
2005406-214 = "但是老師在此時此刻……"
2005406-215 = "以及未來的每時每刻……"
2005406-216 = "對我來說，肯定都是任何人事物都無法取代的……"
2005406-217 = "如此重要而珍貴的人。"
2005406-220 = "（雖然不太清楚，但隱約感覺額頭上傳來了一股柔軟的觸感）"
2005406-221 = "請老師好好休息。"
2005406-222 = "務必保重身體。"
