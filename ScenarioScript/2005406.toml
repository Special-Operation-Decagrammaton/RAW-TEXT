[translation]
2005406-1 = "Life Support 2"
2005406-4 = "...I'm so embarrassed..."
2005406-5 = "[s1] \"It's okay. You must have been really tired.\"\n[s2] \"Sleeping in is part of life.\""
2005406-8 = "But given the current situation..."
2005406-9 = "Honestly, this really discredits me in so many ways. I—"
2005406-10 = "What's that? You don't want me to be so \"hard on myself\"?"
2005406-11 = "And you think this happened because you've been relying on me so much lately?"
2005406-12 = "Still..."
2005406-13 = "[s3] \"Hey, I don't think you're getting my message!\"\n[s4] \"I'll be your 'life support' today, Himari!\""
2005406-16 = "...Huh?"
2005406-17 = "Sensei will be my...?"
2005406-18 = "But, but that's—!"
2005406-19 = "Have I let others help me before? Sure, but..."
2005406-20 = "Well...yes, I have. Eimi assisted me a lot at the beginning, and lately Toki has occasionally been pitching in as well..."
2005406-21 = "S-Still! Receiving help from Sensei is a different matter..."
2005406-22 = "[s] \"...You hate the idea that much?\""
2005406-23 = "Of course not! In fact...!"
2005406-24 = "...In fact..."
2005406-25 = "Uh, uhhh..."
2005406-30 = "(I love it... I love it so much I can't even speak the words...!)"
2005406-31 = "(And I'm just as embarrassed by the feeling! I don't know what to say!)"
2005406-36 = "[ns5] \"You're so competent, Himari! But I wish you'd lean on someone else once in a while.\"\n[ns6] \"If I'm acceptable, then lean on me!\""
2005406-41 = "Sensei? You really shouldn't say things like that so lightly, you know!"
2005406-42 = "Unlike me, of course. I never need such a warning."
2005406-43 = "If you keep letting your guard down like that, especially around students like Rio—smart, dangerous girls who ask for a lot..."
2005406-44 = "It could end up being quite...troublesome, couldn't it?"
2005406-45 = "[s] \"That sounds like it could be fun, too!\""
2005406-46 = "What?!"
2005406-47 = "You're telling me that students have the unique privilege of being able to bother you \"whenever and with whatever they want\"?"
2005406-48 = "..."
2005406-49 = "Really! Please stop saying things like that!"
2005406-50 = "...Please don't test my patience. I know you don't mean to."
2005406-51 = "If I really wanted, I could just as easily be a real pain, you know."
2005406-52 = "[ns] \"Himari?\""
2005406-55 = "Ah, ahhhhh, no! It's nothing! Of course!"
2005406-56 = "Ahem..."
2005406-57 = "Well then, as you said, Sensei."
2005406-58 = "I'm planning to really bother you today. Be ever-so annoying and needy. Is that...acceptable?"
2005406-59 = "[s7] \"Ugh, is this what they call 'reaping what you sow'...?\"\n[s8] \"I guess I have no choice! Challenge accepted!\""
2005406-62 = "Fufufu..."
2005406-63 = "You said it yourself. Are you prepared for the consequences, Sensei?"
2005406-64 = "And just like that, my troublesome (?) time with Himari began."
2005406-67 = "Ahh. This sink is so high, but I need to wash my hands. Won't someone please lift me?"
2005406-68 = "I'm so dainty and light. And the sink isn't too far away...is it?"
2005406-69 = "[ns] \"Yeah, yeah.\""
2005406-75 = "Himari's warm breath brushed against my ear."
2005406-76 = "[ns] \"?!\""
2005406-77 = "Oh my. Why are you so surprised, Sensei?"
2005406-78 = "Isn't breathing...essential to living? I didn't BOTHER you, did I?"
2005406-80 = "She wasn't wrong, but...!"
2005406-81 = "I tried to stay focused as I helped her to the sink."
2005406-87 = " ..."
2005406-88 = "(What am I doing? I feel like my heart's about to explode!)"
2005406-89 = "(Ah... This is way more stressful than I anticipated.)"
2005406-90 = "(How embarrassing...!)"
2005406-93 = "Ahhh. What to do? My poor, delicate arms are losing their strength. I've been working so hard."
2005406-94 = "While I would LOVE a massage, I'm feeling quite peckish and weak..."
2005406-95 = "Oh, I think I have some chocolate brownies stashed in the fridge. If only someone would feed them to me..."
2005406-99 = "Thank you, Sensei."
2005406-100 = "In that case..."
2005406-104 = "[ns] \"?!\""
2005406-105 = "Fufu. What's wrong, Sensei?"
2005406-106 = "It seems like my blood sugar is dropping a little faster than I expected."
2005406-107 = "I couldn't help leaning over and reaching for a taste."
2005406-108 = "[s] \"I, I see. You really wanted to eat it, huh...?\""
2005406-113 = "(I feel like my cheeks are on fire! Don't let them see!)"
2005406-114 = "(Sensei's face is so close...!)"
2005406-115 = "(I mean, I was the one who moved in, but still...!)"
2005406-116 = "..."
2005406-117 = "(More than that, does Sensei really not feel anything, even with such a rare, delicate beauty of a girl leaning so close?)"
2005406-121 = "(No, could it be...? Have I made a mistake?)"
2005406-122 = "..."
2005406-123 = "(Perhaps closing the distance too abruptly backfired...? It was too aggressive.)"
2005406-124 = "(Right. It's like adding an excess of catalyst...)"
2005406-125 = "(While an increased amount of catalyst may speed up the reaction and yield a quicker result...)"
2005406-126 = "(It also brings the increased risk of unwanted and unforeseen byproducts. The stability of the whole system is compromised!)"
2005406-127 = "(How could someone like me make such a mistake? I must retire and reflect on my choices...)"
2005406-130 = "Oh my. It's already nighttime. What a day."
2005406-131 = "[s] \"What? Already?!\""
2005406-132 = "Since it's difficult to clearly distinguish between day and night here, it's easy to lose track of time."
2005406-133 = "After all, we're in the midst of a \"super phenomenon\" happening all around us. Everything is so...unique."
2005406-134 = "Ahhh. My sleep cycle is so dysregulated, and I'm having a hard time falling asleep on time. Won't someone please stay by my side and help me get a good rest?"
2005406-135 = "[s] \"Is that really okay?!\""
2005406-136 = "Oh?"
2005406-137 = "I trust you more than anyone else in the world, don't I?"
2005406-138 = "[s] \"...!!\""
2005406-140 = "[ns9] \"I see. I understand.\"\n[ns10] \"After all, I'm Himari's life support right now!\""
2005406-144 = "I took Himari to the bed, hoping to help her fall asleep."
2005406-145 = "But then...!"
2005406-146 = "Hiyah! ♪"
2005406-151 = "[ns] \"Himari?!\""
2005406-152 = "What's wrong, Sensei? You said you'd help me rest."
2005406-153 = "You know, when I can't sleep, I need someone right by my side. It helps a lot."
2005406-154 = "Hmm? \"What about Eimi and Toki\"?"
2005406-158 = "(...Truthfully, they can't help.)"
2005406-159 = "(...In fact, Eimi would probably make me pass out from heatstroke. And that simply is NOT a productive way to rest.)"
2005406-164 = "Oh, Sensei. They're nice, but..."
2005406-165 = "(Sorry, Sensei.)"
2005406-166 = "(I'm so sorry for being such a pain... I really am.)"
2005406-167 = "[ns11] \"Fine, sure.\"\n[ns12] \"Okay, but only until you fall asleep.\""
2005406-170 = "R-Right. Of course!"
2005406-176 = "I laid Himari down and turned off the lights."
2005406-177 = "Her steady breathing was surprisingly soothing."
2005406-178 = "I know I said that I'd only be there until Himari fell asleep..."
2005406-179 = "...But I ended up tiring out first."
2005406-186 = "Sensei..."
2005406-187 = "Are you awake?"
2005406-188 = "...Steady breathing, a slight drop in body temperature, and my EEG monitor shows theta waves and trace amounts of delta waves..."
2005406-189 = "Fufu..."
2005406-190 = "I suppose, among all of us, you've been using the most energy lately."
2005406-194 = "I wasn't positive, but I thought I felt arms wrapping around me..."
2005406-196 = "Sensei."
2005406-197 = "...Sensei."
2005406-198 = "Our—"
2005406-199 = "Right now, you're just mine, Sensei..."
2005406-200 = "Do you know that?"
2005406-201 = "And right now, I'm being very naughty."
2005406-202 = "If you've noticed, I hope you'll let it go, and just excuse this all as some dream."
2005406-203 = "If you haven't noticed... Well, I'd prefer you stay in the dark for as long as possible."
2005406-204 = "In our circumstances, in the midst of everything, to be thinking like this..."
2005406-205 = "...forgetting about being a genius, delicate, beautiful girl... I'm starting to feel disappointed in myself."
2005406-206 = "If I were to pin the blame on someone, I suppose I'd like to hold you, who made me this way, the slightest bit responsible, but..."
2005406-207 = "No. That truly does seem too unfair."
2005406-212 = "Sorry, Sensei."
2005406-213 = "I'm sorry."
2005406-214 = "But at this very moment, Sensei..."
2005406-215 = "And surely, from now on..."
2005406-216 = "To me, you're someone who cannot be replaced by anyone or anything in all the world..."
2005406-217 = "That's exactly the kind of precious, important person you are."
2005406-220 = "I wasn't sure, but I thought I felt something soft brush my forehead."
2005406-221 = "Sleep well, Sensei."
2005406-222 = "And please take good care of yourself."
