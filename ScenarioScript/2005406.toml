[translation]
2005406-1 = "ผู้ดูแลส่วนตัว 2"
2005406-4 = "ฉันละอายใจจริงๆ ค่ะ..."
2005406-5 = "[s1] \"ไม่เป็นไรเลย คงจะเหนื่อยมากสินะ\"\n[s2] \"คนเราก็ตื่นสายได้เหมือนกันนะ\""
2005406-8 = "แต่ในสถานการณ์แบบนี้น่ะ..."
2005406-9 = "ฉันถือว่าล้มเหลวในหลายๆ ด้านเลยนะคะ..."
2005406-10 = "คะ? ไม่อยากให้ฉันโทษตัวเองมากเกินไปเหรอคะ?"
2005406-11 = "และที่ฉันเป็นแบบนี้ อาจเป็นเพราะที่ผ่านมาคุณครูพึ่งพาฉันมากเกินไป...?"
2005406-12 = "แต่ว่า..."
2005406-13 = "[s3] \"งั้นวันนี้มาสลับบทบาทกัน ครูจะเป็นผู้ดูแลให้เอง!\"\n[s4] \"วันนี้ครูจะเป็นผู้ดูแลส่วนตัวให้ฮิมาริเอง!\""
2005406-16 = "คะ...?"
2005406-17 = "คุณครูน่ะเหรอคะ...?"
2005406-18 = "ตะ... แต่ว่าแบบนั้นมัน...!"
2005406-19 = "จะบอกว่าเมื่อก่อนฉันก็เคยได้รับความช่วยเหลือจากเด็กๆ คนอื่นงั้นเหรอคะ?"
2005406-20 = "มันก็... จริงอย่างที่ว่าค่ะ เมื่อก่อนเอมิช่วยเหลือฉันหลายอย่างเลย ส่วนตอนนี้ก็เป็นโทคิที่คอยมาช่วย#nฉันอยู่..."
2005406-21 = "ตะ... แต่ถึงยังไง! การได้รับความช่วยเหลือจากคุณครู... มันดูจะต่างออกไปนิดหน่อยนะคะ..."
2005406-22 = "[s] \"ไม่อยากให้ครูช่วยขนาดนั้นเลยเหรอ...?\""
2005406-23 = "จะเป็นแบบนั้นไปได้ยังไงคะ! ฉันแค่...!"
2005406-24 = "แค่..."
2005406-25 = "อะ... เอ่อ..."
2005406-30 = "(มันก็ดีอยู่หรอก... ดีมากจนอธิบายเป็นคำพูดไม่ได้...!)"
2005406-31 = "(นั่นสินะ ฉันเขินจนพูดไม่ออกมากกว่า!)"
2005406-36 = "[ns5] \"ฮิมาริเก่งอยู่แล้วละ แต่พึ่งพาคนอื่นบ้างก็ไม่เป็นไรหรอกนะ\"\n[ns6] \"บางครั้งครูก็อยากให้ฮิมาริพึ่งพาครูเหมือนกันนะ!\""
2005406-41 = "คุณครู? อย่าพูดอะไรแบบนั้นสุ่มสี่สุ่มห้าสิคะ?"
2005406-42 = "ถึงฉันจะไม่ได้รังเกียจก็เถอะ"
2005406-43 = "แต่ถ้าไปพูดอะไรแบบนั้นกับนักเรียนที่ใช้ความฉลาดในทางที่แปลกๆ อย่างริโอะละก็..."
2005406-44 = "อาจทำให้คุณครูเจอเรื่องน่าปวดหัวได้นะคะ?"
2005406-45 = "[s] \"นั่นก็น่าจะสนุกเหมือนกันนะ!\""
2005406-46 = "คะ?!?!"
2005406-47 = "นะ... นักเรียนทำให้คุณครูปวดหัวได้ตลอดอยู่แล้ว เพราะในบางแง่ นั่นก็คือสิทธิ์ของนักเรียนอย่างงั้น#nเหรอคะ?"
2005406-48 = "..."
2005406-49 = "จริงๆ เลยเชียว! หยุดพูดเรื่องทำนองนั้นได้แล้วค่ะ!"
2005406-50 = "อย่าทำให้ฉันหมดความอดทนโดยไม่รู้ตัวแบบนี้สิคะ..."
2005406-51 = "เห็นฉันอย่างนี้ แต่ถ้าตั้งใจจริงๆ ฉันก็เป็นเด็กดื้อได้เหมือนกันนะ..."
2005406-52 = "[ns] \"ฮิมาริ?\""
2005406-55 = "มะ... มะมะมะมะมะมะ... ไม่ค่ะ! ไม่มีอะไรทั้งนั้นค่ะ! ไม่มีเลยค่ะ!"
2005406-56 = "อะแฮ่ม..."
2005406-57 = "ถ้างั้น... ก็เอาตามที่คุณครูบอกไว้ค่ะ"
2005406-58 = "วันนี้ฉันจะทำให้คุณครูปวดหัวสุดๆ ไปเลย จะไหวหรือเปล่าล่ะคะ?"
2005406-59 = "[s7] \"อึก... นี่สินะที่เรียกว่ากรรมตามสนอง...!\"\n[s8] \"งั้นก็ช่วยไม่ได้นะ! ครูขอรับคำท้านั้นแล้วกัน!\""
2005406-62 = "ฮุฮุฮุ..."
2005406-63 = "คุณครูพูดเองนะคะ? งั้นก็เตรียมใจไว้ได้เลยค่ะ คุณครู"
2005406-64 = "(แล้วช่วงเวลาที่ฮิมาริทำให้คุณครูปวดหัว(?) ก็เริ่มขึ้นอย่างกะทันหัน) "
2005406-67 = "เฮ้อ~ อยากล้างมือจังเลยน้า มีใครที่ 'อุ้ม' ฉันไปล้างมือได้บ้างมั้ยนะคะ~?"
2005406-68 = "ตัวฉันก็ออกจะเบาหวิว แล้วอ่างล้างมือก็ไม่น่าจะอยู่ไกลเท่าไรด้วย?"
2005406-69 = "[ns] \"จ้า จ้า\""
2005406-75 = "(ในตอนนั้นเอง... ลมหายใจของฮิมาริก็พัดผ่านหูของคุณครูไปอย่างแผ่วเบา!)"
2005406-76 = "[ns] \"?!?!\""
2005406-77 = "ตายจริง ทำไมถึงตกใจขนาดนั้นล่ะคะ คุณครู?"
2005406-78 = "การหายใจเป็นสิ่งจำเป็นพื้นฐานที่สุดสำหรับการดำรงชีวิตนะคะ"
2005406-80 = "(คุณครูคิดว่าที่ฮิมาริพูดมาก็ไม่ผิด)"
2005406-81 = "(แต่ถึงอย่างนั้นก็พยายามไม่ให้สูญเสียการทรงตัวและช่วยฮิมาริต่อไป)"
2005406-87 = " ..."
2005406-88 = "(เหมือนหัวใจจะระเบิดออกมาแล้ว!)"
2005406-89 = "(ฮะ... เฮ้อ... น่าตื่นเต้นกว่าที่คิดไว้เยอะเลยนะ...)"
2005406-90 = "(น่าเขินจริงๆ เลย...!)"
2005406-93 = "เฮ้อ~ ทำยังไงดีล่ะคะ? จู่ๆ แขนฉันก็ไม่มีแรงขึ้นมาน่ะค่ะ~"
2005406-94 = "ถ้ามีใครมาช่วยนวดให้ก็น่าจะดีอยู่หรอก แต่ตอนนี้ท้องก็เริ่มหิวขึ้นมาด้วยน่ะสิคะ"
2005406-95 = "ในตู้เย็นมีบราวนี่ช็อกโกแลตอยู่ด้วย~ จะมีใครเอามาป้อนให้ได้มั้ยนะคะ~?"
2005406-99 = "ขอบคุณค่ะ คุณครู"
2005406-100 = "ถ้างั้นก็..."
2005406-104 = "[ns] \"?!?!?!\""
2005406-105 = "ฮุฮุ เป็นอะไรไปคะ คุณครู?"
2005406-106 = "ฉันรู้สึกว่าตัวเองน้ำตาลตกไวกว่าที่คิด"
2005406-107 = "ก็เลยขยับตัวและยื่นหน้าออกไปก่อน จะได้ลิ้มรสชาติไวๆ ก็เท่านั้นค่ะ"
2005406-108 = "[s] \"อะ... อื้อ... อยากกินจริงๆ สินะ...\""
2005406-113 = "(หน้าร้อนผ่าวจนเหมือนไฟลุกขึ้นมาเลย!)"
2005406-114 = "(แล้วหน้าคุณครูก็อยู่ใกล้มากๆ ด้วย ใกล้มากๆ เลย...!)"
2005406-115 = "(ไม่สิ ฉันเป็นฝ่ายเข้าไปหาก่อนแท้ๆ แต่ก็...!)"
2005406-116 = "..."
2005406-117 = "(แต่ต่อให้สาวสวยอย่างฉันเข้าไปใกล้ๆ แบบนั้น คุณครูก็ไม่รู้สึกอะไรเลยงั้นเหรอ?)"
2005406-121 = "(ไม่สิ เดี๋ยวนะ... หรือว่าเพราะเป็นอย่างนั้น?)"
2005406-122 = "..."
2005406-123 = "(หรือว่าการปรับระยะห่างกะทันหันอาจทำให้เกิดผลลัพธ์ตรงกันข้าม...?)"
2005406-124 = "(นั่นสินะ นี่คงเหมือนการใช้ตัวเร่งปฏิกิริยาที่มากเกินความจำเป็น...)"
2005406-125 = "(ถ้าเพิ่มตัวเร่งปฏิกิริยาให้เกิดปฏิกิริยาเร็วขึ้น ผลลัพธ์ที่ได้ก็อาจเกิดขึ้นในระยะเวลาที่สั้นลง...)"
2005406-126 = "(แต่ความเป็นไปได้ที่จะเกิดปัญหาต่างๆ เช่น เกิดผลพลอยได้ที่ไม่พึงประสงค์ หรือการลดความเสถียร#nของระบบปฏิกิริยา ก็จะเพิ่มขึ้นได้เช่นกัน...)"
2005406-127 = "(ผู้รอบรู้อย่างฉันทำพลาดในเรื่องแบบนี้ได้ยังไงกัน...)"
2005406-130 = "ตายจริง มืดค่ำแล้วสินะคะ"
2005406-131 = "[s] \"อ๊ะ?\" มืดแล้วเหรอ?!\""
2005406-132 = "พอมาอยู่ที่นี่ เราจะแยกแยะระหว่างกลางวันกับกลางคืนได้ยากค่ะ เพราะงั้นก็เลยหลงลืมเวลาได้ง่าย"
2005406-133 = "ถือว่าเป็นที่ที่เกิด 'ปรากฏการณ์ลี้ลับ' แบบเรียลไทม์อยู่เสมอเลยนะคะ"
2005406-134 = "เฮ้อ~ ปกติช่วงนี้วงจรชีวิตก็พังจนหลับยากอยู่แล้ว จะมีใครแถวนี้ช่วยกล่อมให้ฉันนอนหลับได้บ้างมั้ย#nนะคะ~?"
2005406-135 = "[s] \"ทะ... ทำแบบนี้ได้เหรอ?!?!\""
2005406-136 = "ตายจริง?"
2005406-137 = "ฉันเชื่อใจคุณครูมากกว่าใครในโลกเลย แต่คุณครูไม่ได้คิดเหมือนกันกับฉันเหรอคะ?"
2005406-138 = "[s] \"...!!!\""
2005406-140 = "[ns9] \"งั้นสินะ เข้าใจแล้วละ\"\n[ns10] \"ตอนนี้ครูเป็นผู้ดูแลส่วนตัวของฮิมารินี่เนอะ!\""
2005406-144 = "(แล้วคุณครูก็พาฮิมาริไปนอนบนเตียง)"
2005406-145 = "(และในตอนนั้นเอง...!)"
2005406-146 = "เดี๋ยวเหอะ♪"
2005406-151 = "[ns] \"ฮิมาริ?!\""
2005406-152 = "ทำไมทำแบบนี้ล่ะคะ คุณครู? ไหนว่าจะกล่อมฉันนอนยังไงล่ะคะ?"
2005406-153 = "ฉันน่ะ~ เวลานอนไม่หลับ~ ต้องมีใครมาอยู่ข้างๆ ตลอด จะได้หลับได้ค่ะ~"
2005406-154 = "คะ? เอมิกับโทคิก็ทำแบบนี้หรือเปล่าน่ะเหรอคะ?"
2005406-158 = "(ที่จริงก็ไม่ได้ทำแบบนั้น...)"
2005406-159 = "(และถ้าอยู่ใกล้ชิดกับเอมิมากเกินไป ฉันก็ป่วยเป็นโรคลมแดดได้เลยด้วย...)"
2005406-164 = "ก็ไม่ได้เป็นแบบนั้นเสมอไปหรอกค่ะ~ แต่ถ้าเป็นวันที่ฉันนอนไม่หลับอย่างวันนี้ คนอื่นก็จะมาอยู่ข้างๆ ฉันค่ะ"
2005406-165 = "(ขอโทษค่ะ คุณครู)"
2005406-166 = "(ฉันกลายเป็นเด็กดื้อที่ทำให้คุณครูปวดหัวจนได้... ขอโทษจริงๆ นะคะ)"
2005406-167 = "[ns11] \"งั้นก็ช่วยไม่ได้สินะ ครูจะอยู่ด้วยเดี๋ยวหนึ่งแล้วกัน~\"\n[ns12] \"งั้นครูจะอยู่ด้วยจนฮิมาริหลับไปเท่านั้นนะ?\""
2005406-170 = "ค่ะ ค่ะ แน่นอนค่ะ!"
2005406-176 = "(คุณครูพาฮิมาริไปนอนและปิดไฟ)"
2005406-177 = "(เสียงหายใจของฮิมาริฟังดูเหมือนเสียง ASMR ที่ช่วยให้หลับสบาย)"
2005406-178 = "(คุณครูมั่นใจว่าจะอยู่จนกว่าฮิมาริจะหลับไปเท่านั้น...)"
2005406-179 = "(แต่ว่าคนที่หลับไปก่อนก็คือ...)"
2005406-186 = "คุณครู..."
2005406-187 = "หลับแล้ว... เหรอคะ?"
2005406-188 = "เสียงหายใจที่สม่ำเสมอ อุณหภูมิร่างกายที่ลดลงเล็กน้อย คลื่นธีตาและเดลต้าปริมาณเล็กน้อยที่ตรวจ#nจับได้จากเครื่องวัดคลื่นสมอง..."
2005406-189 = "ฮุฮุ..."
2005406-190 = "อันที่จริง คนที่ใช้พลังงานมากที่สุดในหมู่พวกเราน่าจะเป็นคุณครูนะคะ"
2005406-194 = "(ถึงจะไม่แน่ใจนัก แต่คุณครูรู้สึกเหมือนมีแขนมาโอบร่างกายอยู่...)"
2005406-196 = "คุณครู"
2005406-197 = "คุณครู..."
2005406-198 = "คุณครูของพวกเรา..."
2005406-199 = "แต่ตอนนี้เป็นคุณครูของฉันเท่านั้น..."
2005406-200 = "คุณครูรู้หรือเปล่าคะ?"
2005406-201 = "ว่าตอนนี้ฉันเป็นเด็กไม่ดีเอามากๆ เลย"
2005406-202 = "ถ้ารู้แล้วละก็ ฉันหวังว่าคุณครูจะใช้การนอนหลับฝันเป็นข้ออ้างแล้วลืมมันไปนะคะ"
2005406-203 = "แต่ถ้ายังไม่รู้ ฉันก็หวังว่าคุณครูจะไม่รู้ต่อไปอีกนานๆ เลยค่ะ"
2005406-204 = "เราอยู่ท่ามกลางสถานการณ์แบบนี้แท้ๆ ฉันไม่คิดเลยว่าตัวเองจะมีความคิดแบบนี้อยู่..."
2005406-205 = "ต่อให้จะเป็นอัจฉริยะหรือสาวยิ้มสวยอะไรก็เถอะ ตอนนี้ฉันสิ้นหวังกับตัวเองจังเลยค่ะ"
2005406-206 = "ถ้าจะโยนความรับผิดชอบให้คนอื่นละก็ ฉันก็อยากจะตำหนิคุณครูนิดหน่อยที่ทำให้ฉันเป็นแบบนี้..."
2005406-207 = "ไม่สิคะ ทำแบบนั้นมันแย่เกินไปแล้ว"
2005406-212 = "ขอโทษนะคะ คุณครู"
2005406-213 = "ขอโทษค่ะ"
2005406-214 = "แต่สำหรับฉันแล้ว ในวินาทีนี้..."
2005406-215 = "และแน่นอนว่าในอนาคตด้วย..."
2005406-216 = "คุณครูคือคนสำคัญ..."
2005406-217 = "ที่ไม่มีใครหรือสิ่งใดมาแทนที่ได้เลยค่ะ"
2005406-220 = "(ถึงจะไม่แน่ใจเท่าไร แต่คุณครูรู้สึกเหมือนมีบางอย่างนุ่มๆ มาสัมผัสหน้าผาก)"
2005406-221 = "นอนให้หายเหนื่อยเลยนะคะ คุณครู"
2005406-222 = "แล้วก็ดูแลตัวเองให้ดีด้วยนะคะ"
