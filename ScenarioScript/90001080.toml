[translation]
90001080-1 = "ตอนที่ 8;ชอกมาห์"
90001080-11 = "ทางออกอยู่ตรงโน้นค่ะ! คุณครู หัวหน้าฮิมาริ เร่งฝีเท้าหน่อยค่ะ!"
90001080-12 = "ประตูล็อกไว้อยู่... ฉันจะเจาะละนะ!"
90001080-20 = "[ns] \"หืม...?\""
90001080-22 = "นี่มัน..."
90001080-23 = "ตรงนี้คือ... ด้านในของภูเขาไฟ... "
90001080-24 = "ที่เราเห็นในทุ่งทุนดราเหรอ...?"
90001080-25 = "[s] \"เราเดินตามทางมาจนถึงด้านในของภูเขาไฟงั้นเหรอ?\""
90001080-26 = "เดี๋ยวนะ ริโอะ ให้หนีมาทางนี้ถูกแล้วเหรอคะ?"
90001080-27 = "ฉันคิดว่าเป็นการตัดสินใจที่ดีที่สุดแล้ว ตอนนี้ก็ไม่เห็นการเคลื่อนไหวของกองกำลังที่ยอดเขาด้วย"
90001080-33 = "ต้องปีนเขา... และเป็นภูเขาไฟที่มีอุณหภูมิสูงอีก..."
90001080-34 = "แบบนี้ก็ยิ่งร้อนกว่าเดิมน่ะสิ... ฉันควรทำยังไงดีล่ะคุณครู มารับผิดชอบเลยนะ"
90001080-35 = "[s] \"แต่ชุดนี้ก็น่าจะดีกว่าชุดที่ใส่ประจำหรือเปล่า...?\""
90001080-36 = "มันก็จริงอยู่หรอก..."
90001080-37 = "แต่มันร้อนมากเลย..."
90001080-44 = "ฮู่ว... ถึงสถานการณ์จะไม่ดี แต่ก็รู้สึกเหมือนจะรอดตายเลยนะคะ"
90001080-45 = "อยากกลับขึ้นไปบนเฮลิคอปเตอร์แล้วเปิดแอร์เย็นๆ จัง..."
90001080-46 = "อย่าพูดเหมือนเฮลิคอปเตอร์เป็นตู้เย็นสิคะ..."
90001080-50 = "ฉันขึ้นมาสูงกว่าเดิมหน่อยแล้วค่ะ... ตรงนี้มีอุปกรณ์ขุดเจาะมากขึ้นพอสมควรเลยค่ะ"
90001080-51 = "นั่นสินะ ราวกับว่าภูเขาแห่งนี้เป็นสถานที่ทำเหมืองแร่เต็มรูปแบบอย่างนั้นละ"
90001080-52 = "(ธารน้ำแข็ง ทุนดรา และเขตภูเขาไฟ... พวกนั้นเอาทรัพยากรมากมายขนาดนี้ไปใช้ทำอะไรกันนะ)"
90001080-53 = "(หรือว่าเอาไปให้ <เชเซ็ด> ที่เป็นผู้ดูแล <โรงงานอาวุธ>? ไม่สิ ไม่น่าจะเป็นอย่างนั้น...)"
90001080-54 = "คือว่า เอมิดูไม่ค่อยดีเลยนะ... เป็นอะไรหรือเปล่า?"
90001080-55 = "..."
90001080-60 = "ถึงลิมิตของฉันแล้วละ"
90001080-61 = "ถ้าฉัน... ไปต่อเรื่อยๆ... ทั้งอย่างนี้ละก็..."
90001080-62 = "ฝากวางไอศกรีมไว้ที่หน้าหลุมศพฉัน... อันหนึ่ง... ไม่สิ ลังหนึ่งด้วยนะ..."
90001080-63 = "ไม่ได้สิคะ อย่าพูดล้อเล่นอะไรแบบนั้นสิคะ"
90001080-64 = "ดูเหมือนว่าศัตรูจะหยุดไล่ตามมาแล้วละ ทุกคนพักกันที่นั่นสักเดี๋ยวก็ได้"
90001080-65 = "พวกนั้นหยุดไล่ตามมาแล้วเหรอคะ...? "
90001080-66 = "ใช่ ฉันใช้โดรนกับ AMAS ลาดตระเวนรอบๆ อยู่ ตอนนี้ไม่พบกองกำลังของเดคาแกรมมาทอนที่เคย#nไล่ตามมาแล้ว"
90001080-67 = "มันก็ฟังเป็นเรื่องที่ดีอยู่นะคะ แต่อีกใจหนึ่งฉันก็รู้สึกเหมือนเป็นลางไม่ดีเลยค่ะ"
90001080-68 = "ในแง่ไหนเหรอ?"
90001080-69 = "ลองคิดอย่างนี้ดูนะคะ อาจจะมีบางอย่างในบริเวณนี้ที่กองกำลังไม่ควรเข้าใกล้ก็ได้?"
90001080-70 = "หรือไม่ก็มีบางอย่างที่ไม่จำเป็นต้องให้กองกำลังเข้ามา?"
90001080-72 = "น่าทึ่งจังเลยนะคะ ถูกทั้ง 2 ข้อเลยค่ะ~"
90001080-76 = "[ns] \"เสียงนี้มัน...!\""
90001080-78 = "มะ... มาถึงตรงนี้จนได้นะคะ... ไม่สิ มะ... มาถึงแล้วสินะคะ...!"
90001080-79 = "ถึงยังไง ทุกอย่างก็เปล่าประโยชน์อยู่ดีนั่นละ!"
90001080-80 = "ยอดเยี่ยมไปเลยนะคะ ต้องชื่นชมเลยละค่ะ"
90001080-81 = "ตะ... ตะ... แต่ว่านั่นก็เป็น... จุดสิ้นสุดด้วยค่ะ! "
90001080-82 = "แหะๆๆ ฉันพูดได้อย่างฉะฉานเลยค่ะ...!"
90001080-83 = "[s] \"แอบจับตามองพวกเราอยู่เหรอ?\""
90001080-84 = "กะ... ก็แน่อยู่แล้วค่ะ ตั้งแต่มาถึงเขตทุนดราแล้ว..."
90001080-85 = "ได้ต่อสู้กับเด็กๆ ของเราด้วยไม่ใช่เหรอ? คิดว่าพวกเราจะไม่รู้เรื่องนั้นได้ยังไง?"
90001080-86 = "ให้ตายเถอะ ต้องบอกในเรื่องที่แน่ชัดอยู่แล้วด้วยเหรอเนี่ย แบบนี้น่าผิดหวังนะคะ มนุษย์ก็เป็นกันอย่างนี้สินะ"
90001080-87 = "จะ... จะยังไงก็เถอะ! นะ... นั่นมัน... เป็นสิ่งสุดท้ายแล้วค่ะ...! จากนี้ไป... จากนี้ไป...!"
90001080-88 = "อืม อย่างที่ไอน์ว่านั่นละ เรามาปิดฉากกันที่นี่เลยดีกว่า"
90001080-89 = "แต่ถ้าจะยอมแพ้ให้พวกเรา พวกเราก็จะยอมรับให้นะคะ ถือว่าเป็นการเมตตาให้เป็นพิเศษด้วยความ#nรู้สึกเวทนาน่ะค่ะ"
90001080-90 = "[s1] \"แต่เราต้องรู้อะไรก่อนสิถึงจะตัดสินใจได้\"\n[s2] \"พวกเธอพยายามจะทำอะไรเหรอ?\""
90001080-93 = "ระ... เราเล่าให้พวกเขาฟัง... ได้มั้ยคะ?"
90001080-94 = "อืม... ถ้าให้ลงรายละเอียดเลยคงจะไม่ได้ เอาเป็นว่าเราบอกแค่ข้อมูลที่บอกได้แล้วกันค่ะ ว่ายังไงล่ะคะ ซอฟ?"
90001080-95 = "ก็ได้ พวกเราจะสร้างทุกอย่างขึ้นใหม่ และตั้งรากฐานใหม่ขึ้นมา และในอีกแง่หนึ่ง..."
90001080-96 = "จะเรียกว่านั่นเป็นการทำเพื่อพวกคุณด้วยก็ได้..."
90001080-97 = "ถะ... ถ้าจะให้อธิบายให้เข้าใจ พวกฉันอยาก... เสนอคำตอบที่เป็นแม่แบบและสมบูรณ์ให้กับพวกคุณค่ะ"
90001080-98 = "ค่ะ ค่ะ ค่ะ ตั้งใจฟังนะคะ จะเข้าส่วนที่สำคัญแล้วค่ะ "
90001080-99 = "มันก็เป็นอย่างนี้น่ะค่ะ มีบางครั้งที่เราไม่รู้ว่าต้องตัดสินใจแบบไหนดี และไม่รู้ว่าอะไรคือสิ่งที่ดีที่สุด ใช่มั้ยคะ?"
90001080-100 = "พวกเราก็เลยจะแสดงความเมตตา..."
90001080-101 = "และทำให้พวกคุณไม่ต้องกังวลเรื่องนั้นอีกต่อไปค่ะ!"
90001080-102 = "รู้สึกเหมือนออร์จะพูดไปเรื่อยนะ... แต่เอาเถอะ เพราะนั่นก็เป็นเหตุผลในการมีอยู่ของท่านผู้นั้นด้วย"
90001080-107 = "ตายจริง พูดเหมือนเป็นตัวร้ายที่อยู่ในหนัง Sci-Fi อย่างนั้นละค่ะ"
90001080-108 = "ไม่มีอะไรต้องฟังเพิ่มแล้วละ ถ้ามันเป็นเรื่องที่ซื่อสัตย์ตั้งแต่แรก ก็คงบอกทุกอย่างโดยไม่ปิดบังอะไร#nแล้วละ"
90001080-109 = "ใช่ค่ะ ฉันเคยได้ยินมาว่าโดยทั่วไปแล้ว งานที่ทำเพื่อทุกคนหรืองานที่สร้างทุกอย่างขึ้นมาใหม่ มักไม่ใช่สิ่งที่ดีนักค่ะ"
90001080-110 = "กะ... เกินไปแล้วนะคะ!"
90001080-111 = "ฟังแล้วโกรธขึ้นมาหน่อยๆ เลยแฮะ..."
90001080-112 = "แต่ก็เอาเถอะ... จนถึงตอนนี้ก็ยังอยู่ในขอบเขตที่คาดไว้ค่ะ"
90001080-117 = "พวกเธอคือเหล่าวิศวกรของเดคาแกรมมาทอนสินะ"
90001080-118 = "สึคัตสึกิ ริโอะ..."
90001080-119 = "สึคัตสึกิ ริโอะ"
90001080-120 = "ปรากฏตัวแล้วสินะคะ ตัวแปรใหม่ของพวกเรา"
90001080-121 = "ทำไมถึงได้มาเอาตอนนี้ด้วยนะ...? ไม่สิ ต่อให้ถามไปก็ไม่มีความหมายแล้วละ"
90001080-122 = "เพราะคุณคือคนที่รับรู้ถึงตัวตนของท่านผู้นั้นตั้งแต่แรก และยังกล้าดีมาไล่ตามท่านผู้นั้น"
90001080-123 = "ครั้งสุดท้ายที่คุณปรากฏตัวคือวันที่ท้องฟ้าในคิโวทอสถล่มลงมาใช่มั้ยล่ะคะ...?"
90001080-124 = "อยากให้ไปเก็บตัวอยู่ในร่มเงาไปตลอด เหมือนที่เคยทำมาจังเลยนะ"
90001080-125 = "ถ้าจะประเมินฉันแบบนั้นก็คงช่วยไม่ได้นะ ฉันยอมรับเรื่องนั้นแล้วกัน"
90001080-126 = "จะว่าไป พวกเธอรู้เรื่องของฉันดีจังเลยนะ?"
90001080-127 = "กะ... ก็หน้าที่ของพวกเราคือการเตรียมพร้อมเพื่อรับมือทุกสถานการณ์นี่คะ...!"
90001080-128 = "อะ... อะอะ... เอาเป็นว่า! จากนี้ไปชอกมาห์จังจะ... ทำให้ทุกอย่างกลับคืนสู่สภาพเดิมค่ะ!"
90001080-133 = "[ns3] \"พื้นสั่นเหรอ...?\"\n[ns4] \"เหมือนภูเขาไฟมีอะไรผิดปกติเลย...!\""
90001080-137 = "ครู จู่ๆ ภูเขาไฟก็ปะทุขึ้นมา"
90001080-138 = "อีกอย่าง...!"
90001080-148 = "[ns] \"ยังมีอะไรอีกเหรอ?!\""
90001080-149 = "สัญญาณของผู้เลื่อมใสตนใหม่ค่ะ!"
90001080-150 = "ฉันก็ตรวจจับได้เหมือนกัน สัญญาณนี้มัน? หรือว่าจะเป็น... <ชอกมาห์>...?!"
90001080-151 = "[s] \"<ชอกมาห์>...?\""
90001080-156 = "ชอกมาห์! เซฟิร่าลำดับที่ 2 ในต้นไม้แห่งชีวิต"
90001080-157 = "ผู้พิทักษ์แห่งบรรพกาล ผู้ปกป้องอาณาจักร!"
90001080-158 = "ปะ... ปัญญาเรืองรอง! และความเฉลียวฉลาดที่ซ่อนไว้!"
90001080-159 = "ตัวแปรเป็นสิ่งน่ารำคาญเสมอนั่นแหละ เพราะอย่างนั้นพวกเราจึงจะใช้ชอกมาห์ เพื่อทำให้ภูเขาไฟลูกนี้ปะทุ"
90001080-164 = "และจัดการตัวแปรที่ใหญ่ที่สุดอย่างคุณครูของชาเล่ต์ให้สิ้นซาก!"
90001080-165 = "และแน่นอนว่ารายต่อไปก็ต้องเป็นคุณ สึคัตสึกิ ริโอะ"
90001080-166 = "ไม่ติดอะไรใช่มั้ย ไอน์?"
90001080-167 = "..."
90001080-168 = "ค่ะ... ถ้าเพื่อพี่สาวแล้วละก็..."
90001080-169 = "อีกอย่าง พวกนั้นก็เป็นฝ่ายปฏิเสธข้อเสนอของเราก่อนด้วยค่ะ"
90001080-170 = "ชะ... ใช่ค่ะ เข้าใจแล้วค่ะ ได้ค่ะ!"
90001080-177 = "[ns] \"นั่นมัน... อะไรน่ะ?!?!\""
90001080-179 = "ไม่อยากเชื่อเลย! ของแบบนั้นอยู่บนลาวาได้เหรอ...? นี่มันปรากฏการณ์ลี้ลับอะไรกันคะเนี่ย...?"
90001080-180 = "จะว่าไป พวกเราก็เป็นชมรมที่ศึกษาปรากฏการณ์ลี้ลับอะไรแบบนี้อยู่แล้วนี่นา"
90001080-181 = "แต่ปรากฏการณ์ลี้ลับในความหมายของเรามันต่างออกไปนะคะ?!"
90001080-183 = "(นี่คือสัญญาณจาก <เทพไร้นาม> ...?)"
90001080-188 = "เกวูราห์น่ะไว้วางใจได้อยู่แล้ว ถึงจะเจ้าอารมณ์... แต่ก็ละเอียดรอบคอบด้วย เพราะแบบนั้นถึงได้รับ#nมอบหมายให้ไปลาดตระเวนพื้นที่ธารน้ำแข็งไงล่ะ"
90001080-189 = "การหลอกล่อให้ทุกคนมาที่นี่ก็เป็นแผนการของเกวูราห์นะคะ~"
90001080-190 = "นะ... ในลาวาที่ชอกมาห์ไปอยู่... ต่อให้เป็นคนที่เก่งกาจอย่างคุณครูก็ต้อง... และแม้กระทั่งสึคัตสึกิ ริโอะเอง... ก็คงไม่รอดหรอกค่ะ!"
90001080-191 = "อิ... อิซุมิโมโตะ เอมิเป็นคนที่อ่อนแอต่อความร้อน ส่วนอาบี เอชูห์ของอะซุมะ โทคิก็... ก็น่าจะอยู่ใน#nสภาพที่ต้องซ่อมแซม...!"
90001080-192 = "ที่ผ่านมาพวกคุณต่อสู้โดยไม่ได้พักกันเลยนี่? ตอนนี้คงถึงคราวที่จะได้พักกันแล้วละ"
90001080-193 = "พวกฉันก็เลยจะช่วยพวกคุณนิดๆ หน่อยๆ น่ะค่ะ การพักผ่อนในบางรูปแบบก็ทำได้อย่างนิรันดร์ด้วยนะ#nคะ~"
90001080-199 = "การจัดการกับศัตรูประเภทนั้นไม่จำเป็นต้องใช้กลยุทธ์หรือการทำตามแผนการที่ละเอียดละออหรอก..."
90001080-200 = "[s] \"คิดจะทำอะไรน่ะ ริโอะ?\""
90001080-211 = "ฉันจะใช้ AMAS ทั้งหมดที่มี สร้างแนวป้องกันสิ่งก่อสร้างจากเศษซากของอุปกรณ์และอาคารที่นั่นดู "
90001080-212 = "ถึงจะมีเวลาไม่พอที่จะทำให้ออกมาได้อย่างสมบูรณ์แบบ แต่กับศัตรูในแบบดั้งเดิมแล้ว เราก็ต้องรับมือ#nด้วยวิธีการที่สอดคล้องกัน"
90001080-213 = "นั่นมัน...?"
90001080-214 = "อย่างนี้สินะคะ ถ้าเป็นแบบนั้น ฉันว่า..."
90001080-219 = "[ns] \"ขอบใจนะ ริโอะ!\""
90001080-224 = "(แต่ว่า เมื่อกี้นี้พวกนักวิศวกรของเดคาแกรมมาทอนบอกว่าจะจัดการคุณครูที่เป็นตัวแปรที่ใหญ่ที่สุดให้สิ้น#nซาก)"
90001080-225 = "(เท่ากับว่า... พวกนั้นถือว่าการมีอยู่ของคุณครูเป็นภัยคุกคามต่อตนเองถึงขนาดนั้นเลยเหรอ...?)"
90001080-230 = "คุณครู?"
90001080-231 = "[s] \"ครูไม่รู้ว่าเด็กพวกนั้นคิดและเตรียมจะทำอะไรอยู่\""
90001080-235 = "[ns] \"แต่เรามาแก้ปัญหาตรงหน้ากันก่อนเถอะ!\""
90001080-236 = "แล้วคราวนี้จะเปิดแอร์ให้จริงๆ ใช่มั้ย?"
90001080-237 = "[s] \"จะเปิดให้ 10 ชั่วโมงเลย...!\""
90001080-238 = "ขอบคุณนะคุณครู แบบนี้ละฉันถึงชอบคุณครูน่ะ"
90001080-239 = "เอ่อ แต่ถ้าทำแบบนั้น อาจเป็นการผลาญเชื้อเพลงของเฮลิคอปเตอร์หมดเลยก็ได้นะคะ...?"
90001080-246 = "ฉันจะเตรียมตอบโต้ค่ะ"
90001080-248 = "เอาละ ทุกคนคะ ช่วยเตรียมตัวอย่างจริงจังกันให้หน่อยนะคะ"
90001080-249 = "กว่าจะไล่ต้อนให้มาถึงที่นี่ได้ พวกฉันก็ต้องเหนื่อยเอาเรื่องอยู่นะ~"
90001080-250 = "ฝะ... ฝากด้วยนะคะ ชอกมาห์จัง! "
90001080-251 = "ดูเหมือนสึคัตสึกิ ริโอะจะเตรียมอะไรไว้ด้วย แต่แค่นั้นคงทำอะไรชอกมาห์จังไม่ได้หรอกค่ะ...!"
90001080-256 = "[ns] \"ทุกคนระวังตัวด้วยนะ!\""
