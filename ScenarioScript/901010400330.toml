[translation]
901010400330-8 = "こんにちは、「FOX EATS」です！"
901010400330-9 = "お食事処をお探しではありませんか？"
901010400330-15 = "え、うん……何？デリバリーは間に合ってるんだけど。"
901010400330-17 = "「FOX EATS」のメインはデリバリーですが……お店のご紹介もしているんです。"
901010400330-18 = "よろしければ、鐘崎港で今すぐ入れるお店をお教えできますよ？"
901010400330-23 = "へー、それじゃあお願いしようかな。"
901010400330-24 = "配達員のおすすめって、どんなお店だろ。"
901010400330-26 = "そうですね……今だと、「[ruby=あきた]穐田[/ruby]水産」がオススメです！"
901010400330-27 = "毎日新鮮なカニを仕入れていて、色んなカニ料理が食べられるんです。"
901010400330-32 = "ここって……さっき見てたとこじゃない？"
901010400330-33 = "悪いけど、この店はちょっと。カニはあまり好きじゃないんだ。"
901010400330-35 = "甲殻類アレルギーとかでしょうか？"
901010400330-36 = "いや……カニって食べるの大変じゃん？"
901010400330-37 = "それに、最近なんかカニに襲われたって話もあるし……。"
901010400330-38 = "なんとなく、カニのハサミを見るのが、嫌なの。"
901010400330-40 = "そうそう。カニってなんであんなに食べにくいんだろ？"
901010400330-42 = "カニは美味しすぎるからじゃない？身を守るためとか"
901010400330-43 = "では、カニのほぐし身を使った料理はいかがですか？"
901010400330-48 = "カニのほぐし身？"
901010400330-49 = "はい。やはり、殻を割って食べるだけでは時間がかかっちゃいますからね。"
901010400330-50 = "本物のカニを使った天津飯はいかがでしょう？#nバターたっぷりのカニクリームコロッケもおすすめですよ！"
901010400330-51 = "それなら全然食べられそう！"
901010400330-52 = "ちょうど今日は脂っこいのが食べたかったんだよね。"
901010400330-53 = "お昼はあのお店で食べよっか！"
901010400330-62 = "い、いらっしゃいませ、何名様でしょうか？"
901010400330-64 = "2名です～"
901010400330-71 = "ここ4人席ありますか？"
901010400330-72 = "すいません、カニチャーハン3人前、テイクアウトでお願いします！"
901010400330-76 = "は、はい！少々お待ちください！"
901010400330-77 = "どういうことだ？さっきまでは全然客が来なかったのに、どうしていきなり……。"
901010400330-78 = "ここが「FOX EATS」おすすめのカニ専門店「穐田水産」ですよね？"
901010400330-79 = "美味しいカニ料理を食べるならここってみんなおすすめしてるんですけど……。"
901010400330-80 = "はい、ここが穐田水産ですが……「FOX EATS」ですか？"
901010400330-84 = "……まさか、さっきチラシを持っていったあの嬢ちゃんが？"
