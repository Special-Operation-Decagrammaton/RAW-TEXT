[translation]
2005506-1 = "โลก การไถ่บาป และเกมเมอร์"
2005506-2 = "ห้องชมรมพัฒนาเกม"
2005506-3 = "มะ... ไม่เป็นไรเลยค่ะ"
2005506-4 = "......"
2005506-5 = "ขะ... ขอบคุณนะคะ ทุกคน"
2005506-6 = "[ns] \"ยูสึ?\""
2005506-7 = "หืม? เสียงนี้...? "
2005506-12 = "คะ... คุณครู? มาตั้งแต่เมื่อไรคะ?!"
2005506-13 = "ฮือออ...!"
2005506-14 = "[s1] \"กำลังเล่นเกม VR อยู่นี่เอง\"\n[s2] \"เมื่อกี้คุยอะไรกันอยู่เหรอ?\""
2005506-17 = "คะ? ระ... เรื่องนั้น..."
2005506-18 = "เมื่อกี้พวก NPC ในเกมมาขอบคุณฉันกันน่ะค่ะ..."
2005506-19 = "ขอบคุณที่ช่วยปกป้องโลกของพวกเขาเอาไว้"
2005506-20 = "[s] \"ยูสึเป็นคนช่วยโลกเอาไว้สินะ!\""
2005506-21 = "ชะ... ช่วยโลกเหรอคะ...!"
2005506-22 = "ตะ... แต่ยังไงก็เป็นความภูมิใจเล็กๆ ที่ไม่ได้สัมผัสมานานเลยละค่ะ"
2005506-23 = "สิ่งที่ฉันทำได้ดีก็มีแค่เรื่องเล่นเกมเท่านั้น เพราะงั้นถึงในโลกจริงจะช่วยใครเอาไว้ไม่ได้..."
2005506-24 = "แต่อย่างน้อยในเกม ฉันก็ช่วยโลกเอาไว้ได้ค่ะ"
2005506-25 = "ถึงมันจะเป็นแค่เรื่องราวภายในเกม..."
2005506-26 = "และก็อาจไม่ได้มีความหมายยิ่งใหญ่อะไร..."
2005506-27 = "[s] \"แต่ก็ไม่ใช่ว่าเกมจะกลายเป็นเรื่องจริงไม่ได้นี่นา?\""
2005506-28 = "คะ? คุณครูหมายความว่ายังไง..."
2005506-29 = "เพราะทุกช่วงเวลาที่ผ่านไปของเรา มันก็คือความจริงไม่ใช่เหรอ... งั้นเหรอคะ?"
2005506-30 = "......"
2005506-31 = "ถ้าลองคิดในอีกแง่หนึ่ง ถึงจะเป็นโลกเสมือนภายในเกม..."
2005506-32 = "แต่ความสุข ความภูมิใจ และความดีใจที่ได้รับจากโลกนั้น..."
2005506-33 = "ก็เป็นของจริงอย่างแน่นอนค่ะ"
2005506-34 = "[s3] \"แล้วก็เกมอื่นๆ ที่ยูสึจะสร้างต่อไปด้วยนะ...\"\n[s4] \"โลกพวกนั้นอาจมีความหมายกับใครบางคนก็ได้\""
2005506-37 = "โลกเสมือนพวกนั้น... อาจมีความหมาย... กับใครบางคน..."
2005506-38 = "......"
2005506-39 = "คะ... คือว่าถ้างั้นคุณครู"
2005506-40 = "จะมาดูโลกที่ฉันช่วยเอาไว้... ด้วยกันมั้ยคะ?"
2005506-42 = "(ไม่มีเหตุผลอะไรที่คุณครูจะปฏิเสธคำชวน)"
2005506-43 = "(คุณครูกับยูสึสวมอุปกรณ์ VR และเข้าสู่โลกเสมือนในเกมไปด้วยกัน)"
2005506-47 = "― [log=유즈 결전]ดูตรงนี้สิคะ คุณครู [/log][wa:4230] "
2005506-49 = "― [log=유즈 결전]โลกที่ฉันปกป้องไว้ค่ะ [/log][wa:830] "
2005506-52 = "― [log=유즈 결전]ฉัน... รู้อยู่แล้วค่ะ... [/log][wa:2250] "
2005506-54 = "― [log=유즈 결전]ว่าคนที่เห็นทิวทัศน์ในตอนนี้ ไม่ได้มีแค่ฉันคนเดียว [/log][wa:2510] "
2005506-57 = "― [log=유즈 결전]ตอนแข่งเกมเมื่อครั้งที่แล้วคุณครูก็เคยบอกเอาไว้นี่คะ [/log][wa:2600] "
2005506-59 = "― [log=유즈 결전]ว่าช่วงเวลานี้ ว่าเกมเกมนี้คือความจริงของพวกเรา[/log][wa:5430] "
2005506-62 = "― [log=유즈 결전]เพราะงั้น แม้ว่าจะเป็นโลกที่ถูกกำหนดตอนจบเอาไว้แล้วก็ตาม[/log][wa:3850] "
2005506-64 = "― [log=유즈 결전]แม้ทุกคนในโลกนี้จะเดินไปตามเรื่องราวเดียวกันก็ตาม[/log][wa:1340] "
2005506-67 = "― [log=유즈 결전]แต่สิ่งที่ฉันเลือกมาตลอด... กับความรู้สึกนี้...[/log][wa:2900] "
2005506-69 = "― [log=유즈 결전]คือเรื่องจริงไม่ผิดอย่างแน่นอนค่ะ[/log][wa:1910] "
2005506-72 = "[ns] \"ตอนนี้ยูสึคงจะชอบชุดนี้ขึ้นมาแล้วสินะ?\""
2005506-73 = "คะ? หมายถึงชุดไหน..."
2005506-74 = "อ่า..."
2005506-75 = "คะ... คะ... คือว่า...! ชุดนี้...!"
2005506-76 = "กะ... กะ... ก็แค่มันเหมาะกับจะใส่เล่นเกมน่ะค่ะ...!"
2005506-77 = "คะ... แค่นั้นเลยค่ะ!"
2005506-78 = "เราเลือกวิธีช่วยโลกไม่ได้นี่คะ...!"
2005506-79 = "[ns] (ขำเบาๆ)"
2005506-80 = "ยะ... อย่ามาหัวเราะนะคะ...!"
2005506-82 = "(หลังจากนั้นคุณครูก็ใช้เวลาเที่ยวชมโลกที่สงบสุขกับยูสึอยู่อีกพักหนึ่ง)"
