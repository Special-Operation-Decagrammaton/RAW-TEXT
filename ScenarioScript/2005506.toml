[translation]
2005506-1 = "世界與救贖與玩家"
2005506-2 = "遊戲開發部．活動室"
2005506-3 = "不，不敢當。"
2005506-4 = "……"
2005506-5 = "謝，謝謝大家。"
2005506-6 = "[ns]「柚子？」"
2005506-7 = "嗯？這個聲音是……？"
2005506-12 = "老，老師？你是什麼時候在那裡的！？"
2005506-13 = "嗚嗚……！"
2005506-14 = "[s1]「在玩VR遊戲呢。」\n[s2]「剛才在跟誰對話？」"
2005506-17 = "咦？那，那個……"
2005506-18 = "……是[ruby=NPC]遊戲裡的人們[/ruby]正在向我道謝。"
2005506-19 = "說是謝謝我拯救了他們的世界。"
2005506-20 = "[s]「你拯救了世界啊！」"
2005506-21 = "沒，沒有啦……！"
2005506-22 = "不，不過，我確實久違地獲得了成就感。"
2005506-23 = "我唯一比較擅長的就只有遊戲，所以在現實中救不了任何人……"
2005506-24 = "但是如果在遊戲裡面，我也能像這樣拯救世界。"
2005506-25 = "當然，這只不過是個遊戲……"
2005506-26 = "所以可能沒有什麼太大的意義……"
2005506-27 = "[s]「不過，遊戲也未必不能變成現實吧？」"
2005506-28 = "咦？那是什麼意思……"
2005506-29 = "我們在體驗某件事的每個瞬間都是現實……是嗎？"
2005506-30 = "……"
2005506-31 = "這麼說來，就算遊戲裡的世界是虛擬的……"
2005506-32 = "在那之中所獲得的快樂、滿足，還有成就感……"
2005506-33 = "毫無疑問都是真實存在的。"
2005506-34 = "[s3]「而且柚子以後製作的遊戲……」\n[s4]「也可能會成為對某些人有意義的存在。」"
2005506-37 = "對某些人……有意義的存在……"
2005506-38 = "……"
2005506-39 = "那，那個，老師。"
2005506-40 = "可以一起看看……我守護的世界嗎？"
2005506-42 = "（沒有任何拒絕的理由）"
2005506-43 = "（戴上柚子遞來的VR設備，一起進入了遊戲世界）"
2005506-47 = "― [log=유즈 결전]請看，老師。[/log][wa:4790] "
2005506-49 = "― [log=유즈 결전]這就是我所守護的世界。[/log][wa:1270] "
2005506-52 = "― [log=유즈 결전]……當然，我也知道。[/log][wa:2850] "
2005506-54 = "― [log=유즈 결전]見過這片景色的，並不只有我一個人。[/log][wa:3870] "
2005506-57 = "― [log=유즈 결전]大賽的時候，你曾經這麼說過吧。[/log][wa:4120] "
2005506-59 = "― [log=유즈 결전]現在這個瞬間，這款遊戲──就是我們的現實。[/log][wa:6470] "
2005506-62 = "― [log=유즈 결전]所以，即使是結局已定的世界……[/log][wa:5490] "
2005506-64 = "― [log=유즈 결전]就算這個世界的大家，都照著相同的劇本前進……[/log][wa:2420] "
2005506-67 = "― [log=유즈 결전]我所做過的選擇，這份感情……[/log][wa:4220] "
2005506-69 = "― [log=유즈 결전]毫無疑問，是真實的。[/log][wa:2830] "
2005506-72 = "[ns]「話說回來，柚子你現在很喜歡那套衣服了呢？」"
2005506-73 = "咦？什麼衣服……"
2005506-74 = "……啊。"
2005506-75 = "那，那，那，那個……！這是……！"
2005506-76 = "只，只，只是因為這套衣服最適合這款遊戲……！"
2005506-77 = "就，就只是因為這樣而已！"
2005506-78 = "畢竟拯救世界的時候，不能拘泥於手段嘛……！"
2005506-79 = "[ns] 露出欣慰的笑容"
2005506-80 = "請，請不要取笑我啦……！"
2005506-82 = "（之後的一段時間，和柚子一起參觀了恢復和平的世界）"
