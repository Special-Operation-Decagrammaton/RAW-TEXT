[translation]
2005506-1 = "World, Salvation, and Gamers"
2005506-2 = "Game Development Department Club Room"
2005506-3 = "D-Don't mention it."
2005506-4 = "..."
2005506-5 = "Th-Thank you so much, everyone. It was my honor, truly."
2005506-6 = "[ns] \"Yuzu?\""
2005506-7 = "Huh? That voice...? "
2005506-12 = "S-Sensei? How long have you been here?!"
2005506-13 = "Ugh...!"
2005506-14 = "[s1] \"You were in the middle of a VR game, I see.\"\n[s2] \"Who were you talking to?\""
2005506-17 = "Huh? W-Well..."
2005506-18 = "...I was being thanked by the people in the game. There was a ceremony. I know they're just NPCs, but..."
2005506-19 = "...They were thanking me for saving their world."
2005506-20 = "[s] \"So you were the world's savior!\""
2005506-21 = "Wh-What do you mean, savior...?!"
2005506-22 = "Still, for the first time in a long time, I felt a sense of pride."
2005506-23 = "The only thing I'm really good at is games. In real life, I haven't saved a single person..."
2005506-24 = "But in games, someone like me can save an entire world."
2005506-25 = "Of course, it's really just a game storyline, and nothing more..."
2005506-26 = "So it really doesn't mean much..."
2005506-27 = "[s] \"But there's no reason why a game can't be reality.\""
2005506-28 = "Huh? What do you mean...?"
2005506-29 = "Isn't \"reality\" found in every moment we live through?"
2005506-30 = "..."
2005506-31 = "Come to think of it, even if the world inside the game is virtual..."
2005506-32 = "The joy, pride, and sense of accomplishment I felt there..."
2005506-33 = "Those things, at least, were definitely real."
2005506-34 = "[s3] \"And the games that you make...\"\n[s4] \"Those worlds will be meaningful to someone else.\""
2005506-37 = "My worlds...could have that kind of meaning...to someone..."
2005506-38 = "..."
2005506-39 = "Um, then, Sensei."
2005506-40 = "The world I've saved... Would you like to look at it with me?"
2005506-42 = "There was no reason to refuse."
2005506-43 = "Yuzu handed me another VR headset. We entered the game together."
2005506-47 = "― [log=유즈 결전]Look around, Sensei.[/log][wa:4230] "
2005506-49 = "― [log=유즈 결전]This is the world I protected.[/log][wa:510] "
2005506-52 = "― [log=유즈 결전]...I understand, of course.[/log][wa:2170] "
2005506-54 = "― [log=유즈 결전]I know that I'm not the only one to have seen this view. [/log][wa:2270] "
2005506-57 = "― [log=유즈 결전]Back at that gaming tournament, you said something like this, didn't you? [/log][wa:1760] "
2005506-59 = "― [log=유즈 결전]That this moment, this game, is our reality.[/log][wa:5550] "
2005506-62 = "― [log=유즈 결전]So, even if this world has a predetermined ending, [/log][wa:4050] "
2005506-64 = "― [log=유즈 결전]even if everyone in this world follows the same scenario,[/log][wa:1020] "
2005506-67 = "― [log=유즈 결전]The choices I make, these emotions...[/log][wa:3300] "
2005506-69 = "― [log=유즈 결전]Without a doubt, they are all real.[/log][wa:1830] "
2005506-72 = "[ns] \"Come to think of it, Yuzu, you seem to be fond of that outfit now.\""
2005506-73 = "Huh? Outfit...?"
2005506-74 = "...Ah."
2005506-75 = "Th-Th-That's...! This is...!"
2005506-76 = "I-I-It's just...the clothing that suits this game best...!"
2005506-77 = "Th-That's all, really!"
2005506-78 = "You can't be too picky about what to wear when saving the world, can you...?"
2005506-79 = "[ns] Smile with satisfaction."
2005506-80 = "D-Don't laugh...!"
2005506-82 = "Afterward, Yuzu and I spent quite some time looking around her now-peaceful world."
