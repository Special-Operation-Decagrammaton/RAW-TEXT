[translation]
10031020-1 = "Episode 2;The First Steps"
10031020-2 = "After I agreed to help, I got a call from Makoto on the first day of the Pandemonium Society's Gehenna Party preparations."
10031020-7 = "Kihehe. As I mentioned before, the Pandemonium Society is building a new assembly hall specifically to host our Gehenna Special Party."
10031020-8 = "As such, I want to invite you to the ribbon cutting ceremony for our new assembly hall. Would you do us the honor of attending?"
10031020-9 = "[s] \"For sure. I'll be there.\""
10031020-10 = "Kihehe. I'll be waiting."
10031020-17 = "Kihehe... "
10031020-18 = "Kekekekekekekekeke!!!"
10031020-19 = "And with that, I now have [USERNAME] Sensei's cooperation."
10031020-20 = "And not just cooperation with our party preparations... I'll get Chiaki to record Sensei helping us on site. Then we'll use that footage to make a propaganda documentary for the Pandemonium Society."
10031020-21 = "Kihehe. By broadcasting our video throughout Kivotos, the Pandemonium Society shall trick the whole world into believing that we're allied with Schale!"
10031020-22 = "If we can do that, we can expand the Pandemonium Society's influence infinitely!"
10031020-27 = "[ns] \"Um, Makoto. We're still on the call.\""
10031020-28 = "Oh..."
10031020-29 = "Th-This... No. Sensei, that was just—"
10031020-30 = "[s] \"I will respectfully decline being filmed.\""
10031020-31 = "M-My plans!"
10031020-32 = "Ugh! I-I-I I guess it can't be helped."
10031020-33 = "I-I'll be waiting for you at the build site!"
10031020-54 = "[ns] \"It looks like everyone's pretty busy.\""
10031020-57 = "Kihehe. It's because this party holds an important meaning behind it."
10031020-58 = "[s] \"Oh, Makoto.\""
10031020-59 = "Welcome to the Pandemonium Society, Sensei."
10031020-60 = "Although you did promise to, I'm still surprised you showed up. So I wanted to give thanks once again. Kihee."
10031020-61 = "[s1] \"Yeah, I did promise.\"\n[s2] \"I'm just not going to let you film me afterward.\""
10031020-64 = "Ugh! Th-That's—"
10031020-65 = "A-Anyway, what matters is the future, not the past!"
10031020-66 = "Is it not better to speak of the bright, broad future ahead of us instead of getting caught up in the past? Am I wrong, Sensei?!"
10031020-67 = "[s] \"(She's changing the subject again.)\""
10031020-71 = "[ns] \"Anyways, a ribbon cutting ceremony must mean that the assembly hall is finished, right?\""
10031020-72 = "Yes. As we complete preparations for the Gehenna Special Party..."
10031020-73 = "We figured we might as well expand our facilities as needed."
10031020-74 = "It's where we'll be hosting the party after all. Kihehe..."
10031020-75 = "[s] \"I see. That explains why the ceremony is being held now...\""
10031020-76 = "Of course, that's not all the building will be for!"
10031020-77 = "We also have facilities like an internet cafe, coin laundry, library, convenience store, and an arcade...! We'll have so many facilities, the Prefect Team will be green with envy!"
10031020-78 = "The Pandemonium Society's new assembly hall shall be the crown jewel cultural space in Gehenna, now and forever!"
10031020-79 = "[s] \"Wouldn't that be more of a shopping mall than an assembly hall?\""
10031020-80 = "Kekeke! My personal recommendation is the feature that cost us the most out of all the new facilities..."
10031020-81 = "...the new hot spring! I commissioned one to be built behind the assembly hall, so that it could be enjoyed by all of Gehenna's students as they sing the Pandemonium Society's praises!"
10031020-82 = "[s] \"Massive scope doesn't begin to describe this.\""
10031020-83 = "Kihehehe! That's right! I, the Great Makoto, alongside the rest of the Pandemonium Society, have put everything on the line to complete our new assembly hall!"
10031020-84 = "I can already imagine the Prefect Team's jaws on the floor as they see what we've created! Kihehehe!!!"
10031020-85 = "[s] \"Uh, quick question. Who did you commission to build the hot spring?\""
10031020-86 = "Huh? Obviously..."
10031020-87 = "The Gehenna Hot Springs Department. Obviously."
10031020-91 = "[ns] \"...Oh.\""
10031020-94 = "Wh-What's going on?!"
10031020-98 = "C-Chairman! It's an emergency! It's... "
10031020-99 = "Because of that hot spring, they—!"
10031020-100 = "They what?"
10031020-107 = "Huh?!"
10031020-119 = "Y-You're...!"
10031020-121 = "Hello hello! Hot Springs Department is here!"
10031020-122 = "Oh? I thought I saw a familiar face. Even Sensei is here."
10031020-123 = "Sensei and the Pandemonium Society chairman together? That's a spicy combination right there."
10031020-124 = "[s] \"Uh... Hi, Megu, and Kasumi.\""
10031020-125 = "Yup yup! Hi! Sensei!"
10031020-126 = "Nothing like a friendly greeting after an unexpected encounter."
10031020-127 = "Anyway, the client who commissioned us to develop the hot spring... That was you, right, Makoto?"
10031020-129 = "Correct... And why are you causing a commotion in front of the assembly hall?! This is where the ribbon cutting ceremony is supposed to be held! Shouldn't you be digging up a hot spring?"
10031020-130 = "This isn't even where you're supposed to be digging! Explain yourself, Hot Springs Department!"
10031020-131 = "Ah, about that. "
10031020-132 = "The original request was to build a hot spring facility behind the new assembly hall..."
10031020-133 = "But...I discovered a waaaaay stronger hot spring vein!"
10031020-134 = "Not behind the assembly hall, but right in front of it! At the Pandemonium Society parking lot!"
10031020-135 = "[s] \"Um... Based on what?\""
10031020-136 = "Why would you ask something like that, Sensei?"
10031020-137 = "Based on my intuition!"
10031020-139 = "I also had a lengthy, robust discussion about my idea with the president and other club members. NOT!"
10031020-140 = "Instead of following the commissioned plan, we should be developing this place instead!"
10031020-141 = "Hold it! We are about to hold a ribbon cutting ceremony!"
10031020-142 = "Oh. Is that so?"
10031020-143 = "Why should we care? You paid us to develop an amazing hot spring."
10031020-144 = "Wouldn't going above and beyond to develop the best hot spring be the natural thing to do?"
10031020-145 = "So you didn't OFFICIALLY ask us to dig up the parking lot. Haha, don't worry about it!"
10031020-146 = "Wahahaha! Once it's built, I'm sure Chairman Makoto will love it. Trust me! I'm an expert when it comes to hot springs!"
10031020-147 = "[s] \"...I knew something like this would happen.\""
10031020-148 = "Now, everyone! Charge! Break and dig and dig again! It's time to build us a hot spring!"
10031020-154 = "Follow President Kasumi! Onward!"
10031020-160 = "Ugh! D-Don't you dare think you can ruin my ribbon cutting ceremony! I won't allow it!"
10031020-161 = "Everyone! Stop them!"
10031020-179 = "[ns] \"W-Wait! Everyone, let's calm down and—\""
10031020-185 = "Everyone will be nice and relaxed after we dig up a hot spring!"
10031020-186 = "Exactly! Hot springs are so peaceful and restful! They're a great place to um...rest in peace!"
10031020-191 = "U-Urgh!! How could this happen?! Where did I go wrong?!"
10031020-192 = "[s] \"...Probably when you sent a commission to the Hot Springs Department?\""
10031020-198 = "Wahahahahaha!!! Develop! Explode! Wipe out everything so that Gehenna may have a hot spring for every student!"
10031020-203 = " ..."
10031020-211 = "[ns] \"Wh-What was that just now?!\""
10031020-217 = "We came here after hearing a report of a commotion at the Pandemonium Society."
10031020-218 = "Just what is going on here?"
10031020-219 = "[s] \"Hina?! Ako?!\""
10031020-220 = "Sensei?"
10031020-221 = "Huh?! What is Sensei doing here?"
10031020-223 = "Ugh! Hina, today is the Pandemonium Society's assembly hall ribbon cutting ceremony!"
10031020-224 = "To seek me out on a day like this... Are you here to get in my way as well?"
10031020-225 = "[s] \"No! Isn't it obvious? She's here to help...?\""
10031020-226 = "Ugh! I don't need any help from the head prefect!"
10031020-227 = "I would rather have a hot spring in my parking lot than depend on her!"
10031020-228 = "H-Have a h-hot spring..."
10031020-229 = "No... I can't let that happen either, but...!"
10031020-230 = "[s] \"So even you have lines you won't cross...\""
10031020-235 = "We're not here because we WANT to help the Pandemonium Society!"
10031020-236 = "Our duty is to address the report that the Hot Springs Department went on a rampage."
10031020-242 = "It's part of our everyday troubles... I hate that we have to help the Pandemonium Society, however..."
10031020-243 = "We'll handle this situation. Any objections, Sensei?"
10031020-244 = "[s] \"None, Head Prefect.\""
10031020-245 = "Good."
10031020-249 = "Prefect Team! Get ready to move!"
10031020-252 = "Yes, ma'am!"
10031020-257 = "The Prefect Team have taken battle positions! Including the head prefect!"
10031020-259 = "Whoa! This is real bad!"
10031020-263 = "E-E-Eeeeeeek!!!"
10031020-268 = "Ah! President Kasumi's panicked! "
10031020-269 = "That's because she's terrified of the head prefect!"
10031020-270 = "Emergency! Emergency! All forces, fight back!"
10031020-276 = "!!"
