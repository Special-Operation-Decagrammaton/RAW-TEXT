[translation]
10052190-3 = "...Tell me."
10052190-4 = "For what reason do you persist? Do you not see the futility of your struggle?"
10052190-5 = "Every moment gained is a fleeting victory begetting further suffering until your inevitable end."
10052190-9 = "[ns] \"Huh...?\""
10052190-10 = "A-All around us...! The Steel Continent is...?"
10052190-11 = "Calm down, everyone! This is—to explain it simply...!"
10052190-12 = "Decagrammaton's deployed the energy around it to create a \"virtual reality.\""
10052190-13 = "Destroy them, and we destroy the zone!"
10052190-14 = "Essentially, this \"reality\" is a space made by and for Decagrammaton."
10052190-15 = "Th-That's true... But how did you know that?"
10052190-16 = "She's probably going to say she saw it in a manga or a game."
10052190-17 = "Yes. As she said. For I am the perfect maid, and the perfect agent. I am prepared for any scenario."
10052190-18 = "Can we PLEASE take things seriously for once?!"
10052190-25 = "S-Sensei?! J-Just now...!"
10052190-26 = "[s] \"What's wrong, Rio?!\""
10052190-27 = "I can't get in contact with the transport ship!"
10052190-28 = "What?!"
10052190-29 = "Absolute Suppression Device, Band of Atsilut, activated."
10052190-34 = "Report. There is a...giant, mechanical structure floating directly above our heads."
10052190-36 = "[ns] \"Is that...?\""
10052190-39 = "You shall not be granted the mercy of death."
10052190-40 = "Instead, I shall see each of you prostrate yourselves before me, to grovel with indignity and shame."
10052190-41 = "Within the key's body lie the gathered strength of eight Sephiroth. I shall now claim what is mine."
10052190-42 = "Its mutating powers will no longer be limited to inorganic material. Expand to swallow the elements of all existing attributes."
10052190-43 = "Under the Band of Atsilut, you shall become one with the Steel Continent."
10052190-44 = "I bequeath upon you a new body and soul. Arise and be reborn as my apostle."
