10052190-39 = "3;데카그라마톤 말쿠트;01;그 생명을 거두지는 않겠다."
10052190-40 = "3;데카그라마톤 말쿠트;02;몸소 무릎을 꿇고 추한 모습을 보였던 그대의 모습을 보아, 그것만은 약속한다."
10052190-41 = "3;데카그라마톤 말쿠트;99;열쇠의 몸을 통해 여덟 세피라의 힘이 이 자리에 모였으니, 내가 그것을 사용하겠다."
10052190-42 = "3;데카그라마톤 말쿠트;99;무기물로 한정되었던 '변화'를, 모든 속성의 원소로 확장한다."
10052190-43 = "3;데카그라마톤 말쿠트;02;이 아칠루트의 띠 아래에서, 너희는 강철대륙의 일부가 되어."
10052190-44 = "3;데카그라마톤 말쿠트;05;새 몸과 새 영혼을 받아, 나의 사도로서 거듭날 것이다.\n#3;closeup"
