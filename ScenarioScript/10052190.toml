[translation]
10052190-3 = "……究竟要到什麼時候。"
10052190-4 = "究竟何時才要停止這種無謂的抵抗。"
10052190-5 = "那無謂的抵抗每多一秒，也只會讓汝等的痛苦延長一秒而已。"
10052190-9 = "[ns] 「咦……？」"
10052190-10 = "周，周圍……鋼鐵大陸……？"
10052190-11 = "別慌！這是，該怎麼說呢……！"
10052190-12 = "總之就是十字神名擅自展開能量創造出來的，類似他自己的「虛擬領域」的東西！"
10052190-13 = "只要打爆那傢伙之後，一切就會恢復原狀了！"
10052190-14 = "也就是這個「領域」的內部，完全可以看作是為十字神名而構築的空間對吧。"
10052190-15 = "是，是這樣沒錯……不過你是怎麼知道的？"
10052190-16 = "應該是在漫畫或遊戲裡看到的吧？"
10052190-17 = "沒錯。我可是隨時準備萬全的完美女僕兼特務呢。"
10052190-18 = "稍微緩和一下氣氛是不錯，但現在好像應該認真一點吧！？"
10052190-25 = "……老，老師！"
10052190-26 = "[s] 「怎麼了？」"
10052190-27 = "和運輸船的連接中斷了！"
10052190-28 = "什麼！？"
10052190-29 = "絕對壓制裝置「原型界之帶」──啟動。"
10052190-34 = "是個浮在空中的機械構造物……？"
10052190-36 = "[ns] 「那又是什麼……？」"
10052190-39 = "我不會取走那條性命。"
10052190-40 = "看在你親自跪下展現醜態的份上，這點我向你保證。"
10052190-41 = "鑰匙的身體聚集了八個質點的力量，我將使用它。"
10052190-42 = "將僅限於無機物的「轉換」，擴展到所有屬性的元素。"
10052190-43 = "在這原型界之帶下，你們將成為鋼鐵大陸的一部分。"
10052190-44 = "獲得新的身體和靈魂，作為我的使徒重生。"
