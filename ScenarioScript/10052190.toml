10052190-10 = "3;아리스 결전 비무장;02;주, 주위가……. 강철대륙이……?\n#3;em;[?]\n#3;a"
10052190-11 = "3;케이 프로토;06;당황하지 마요! 이건, 그러니까……. 결론만 말하자면……!\n#3;em;[!]"
10052190-12 = "3;케이 프로토;04;데카그라마톤이 멋대로 에너지를 전개해서 만들어낸, 자기만의 '가상 영역' 같은 거니까요!"
10052190-13 = "3;케이 프로토;14;저 자식을 박살 내면, 모든 게 원래대로 돌아올 거예요!"
10052190-14 = "1;토키 결전;02;바꿔 말해서 이 '영역' 안은, 완전히 데카그라마톤을 위해 구축된 공간이라고도 볼 수 있겠군요.\n#1;em;[반응]\n#1;a"
10052190-15 = "3;케이 프로토;04;그, 그건 그런데……. 어떻게 알았죠?"
10052190-16 = "5;에이미 결전;04;아마 만화책이나 게임에서 봤다고 할걸?\n#5;al\n#5;em;[한숨]"
10052190-17 = "1;토키 결전;99;그 말대로입니다. 역시 언제, 어느 때나 준비된 완벽한 메이드이자 요원인 저입니다.\n#1;em;[반짝]"
10052190-18 = "3;케이 프로토;13;긴장을 잠시 풀어줘서 좋기는 한데, 지금은 진지해야 할 때 같은데요?!\n#3;em;[?!]\n#3;shake"
10052190-19 = "#st;[0,0];instant;1;"
10052190-20 = "#clearST"
10052190-21 = "1;토키 결전;99\n5;에이미 결전;04\n3;케이 프로토;13\n#3;h\n#1;h\n#5;h\n#1;d\n#3;d\n#5;d\n#wait;1000"
10052190-22 = "3;리오 결전;02\n#3;a\n#3;greeting\n#wait;1000"
10052190-23 = "#wait;1000"
10052190-24 = "#wait;1000"
10052190-25 = "3;리오 결전;04;서, 선생?! 지금, 지금……!\n#3;em;[?!]\n#3;shake"
10052190-26 = "[s] \"왜 그래, 리오?!\""
10052190-27 = "3;리오 결전;05;수송선과의 연결이 끊겼어!\n#3;closeup\n#3;em;[!]"
10052190-28 = "3;토키 결전;07;네?!\n#3;closeup"
10052190-29 = "#all;hide\n#na;데카그라마톤 말쿠트;절대제압장치 <아칠루트의 띠>, 가동."
