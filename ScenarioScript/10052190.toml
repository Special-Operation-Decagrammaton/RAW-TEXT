[translation]
10052190-3 = "จะทำไปจนถึงเมื่อไรกันนะ..."
10052190-4 = "จะต่อต้านอย่างเปล่าประโยชน์แบบนี้ไปถึงเมื่อไร"
10052190-5 = "ยิ่งต่อต้านอย่างเปล่าประโยชน์ ความเจ็บปวดของพวกเจ้าก็จะมีแต่เพิ่มขึ้น"
10052190-9 = "[ns] \"หืม...?\""
10052190-10 = "บะ... บริเวณรอบๆ นี้... ดินแดนเหล็กกล้าตอนนี้...?"
10052190-11 = "อย่าเพิ่งตื่นตระหนกไปค่ะ! คือว่า... ที่นี่น่ะ... สรุปเลยก็คือ...!"
10052190-12 = "มันก็เหมือน 'พื้นที่เสมือนจริง' ที่เดคาแกรมมาทอนสร้างขึ้นมาและควบคุมพลังงานได้ตามใจชอบค่ะ!"
10052190-13 = "ถ้าจัดการเจ้านั่นได้ละก็ ทุกอย่างก็จะกลับมาเป็นปกติค่ะ!"
10052190-14 = "พูดอีกอย่างก็คือ อาจมองได้ว่า 'พื้นที่' นี้เป็นพื้นที่ที่สร้างขึ้นมาเพื่อเดคาแกรมมาทอนโดยเฉพาะเลย#nสินะคะ"
10052190-15 = "มะ... มันก็จริงอยู่หรอก... แต่รู้ได้ยังไงเหรอคะ?"
10052190-16 = "คงจะบอกว่าเคยเห็นมาจากหนังสือการ์ตูนไม่ก็ในเกมน่ะสิ"
10052190-17 = "อย่างที่ว่ามาเลยค่ะ ก็ฉันคือสายลับและเมดผู้สมบูรณ์แบบที่พร้อมรับมือทุกอย่างอยู่เสมอนี่คะ"
10052190-18 = "จะพูดผ่อนคลายความเครียดบ้างมันก็ดีอยู่หรอก แต่ฉันว่าตอนนี้คือเวลาที่เราต้องจริงจังกันนะคะ?!"
10052190-25 = "คะ... ครู?! ตอนนี้... ตอนนี้น่ะ...!"
10052190-26 = "[s] \"มีอะไรเหรอ ริโอะ?!\""
10052190-27 = "การติดต่อกับยานขนส่งขาดไปแล้ว!"
10052190-28 = "ว่าไงนะคะ?!"
10052190-29 = "เปิดระบบควบคุมเบ็ดเสร็จ <วงแหวนแห่งแอทซิลุธ>"
10052190-34 = "สิ่งปลูกสร้างจักรกลที่ลอยอยู่บนฟ้าเหรอ...?"
10052190-36 = "[ns] \"นั่นมันอะไรอีกน่ะ...?\""
10052190-39 = "ข้าจะไม่เอาชีวิตนั่นไป"
10052190-40 = "ข้าขอสัญญากับเจ้าที่ครั้งหนึ่งเคยคุกเข่าและแสดงให้เห็นด้านที่น่าเกลียดออกมา"
10052190-41 = "ในเมื่อพลังของเซฟีรอธทั้งแปดมารวมกันอยู่ที่นี่ผ่านร่างของกุญแจ ข้าก็จะใช้มัน"
10052190-42 = "ขยายขอบเขตของ 'การแปรสภาพ' จากเดิมที่จำกัดแค่สารอนินทรีย์ ให้เป็นสารทุกคุณสมบัติ"
10052190-43 = "ภายใต้วงแหวนแห่งแอทซิลุธนี้ พวกเจ้าจะเป็นส่วนหนึ่งของดินแดนเหล็กกล้า"
10052190-44 = "พวกเจ้าจะได้รับร่างกายและวิญญาณใหม่ และเกิดใหม่ในฐานะสาวกของข้า"
