10052190-1 = "#wait;1000"
10052190-2 = "3;데카그라마톤 말쿠트;01\n#3;a\n#wait;1500"
10052190-3 = "3;데카그라마톤 말쿠트;01;……언제까지인가."
10052190-4 = "3;데카그라마톤 말쿠트;99;언제까지 그렇게, 헛된 저항을 반복하려 하는가."
10052190-5 = "3;데카그라마톤 말쿠트;05;그대들의 헛된 저항이 1초 늘어날수록, 그대들의 고통 역시 1초 늘어날 뿐인 것을."
