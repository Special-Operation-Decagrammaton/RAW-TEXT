[translation]
10023020-1 = "Episode 2;Cleaning, Commence!"
10023020-2 = "Before I knew it, it was time to meet Momoi and the rest for their job."
10023020-3 = "Just when I was starting to wonder where they were..."
10023020-4 = "At your service, Sensei!"
10023020-5 = "[s] \"Hey there! ...M-Momoi?!\""
10023020-6 = "That's me! I changed my class to a maid! "
10023020-7 = "It's super cute, right?"
10023020-8 = "Isn't it perfect?"
10023020-9 = "Go on, praise me!"
10023020-10 = "[s1] \"The stars must have aligned for this moment to occur...\" \n[s2] \"I must have been born to witness Momoi in a maid uniform!\""
10023020-11 = "Y-You didn't have to go that far... Now I'm kinda embarrassed. Heh."
10023020-12 = "Y-You didn't have to go that far... Now I'm kinda embarrassed. Heh."
10023020-13 = "Huff...! Huff...! How is it that one second you're complaining about how uncomfortable your uniform is, and the next you're leaving us behind in the dust?!"
10023020-14 = "My excitement to show Sensei overpowered my discomfort!"
10023020-15 = "*sigh* Hello, Sensei. I'm sorry we got here after you."
10023020-16 = "[s] \"I'm sure the uniforms took a long time to get on. It looks great, Midori!\""
10023020-17 = "Y-You really think so? Thank you. Heehee."
10023020-18 = "You can't hide forever, Yuzu! Come on!"
10023020-19 = "No, wait! I can't... I...o...kay..."
10023020-20 = "Is the skirt too frilly...? What do you think, Sensei? The skirt is too frilly, isn't it..."
10023020-21 = "[s] \"It has the perfect amount of frill! And it's perfect for you, Yuzu.\""
10023020-22 = "Sensei?!"
10023020-23 = "That's not... I'm... Augh!"
10023020-28 = "Next up, Aris!"
10023020-29 = "Huh? Aris?"
10023020-30 = "Does it not fit, Aris?"
10023020-32 = "No! It is because... It is because I am not yet ready to wear a maid uniform."
10023020-33 = "I am not strong enough to equip Neru's uniform!"
10023020-35 = "I really thought we could get through to her..."
10023020-36 = "Well, people can't usually overcome phobias just like that. Although, I don't know if there's a name for a fear of maid uniforms..."
10023020-37 = "[s] \"Fear of maid uniforms?\""
10023020-38 = "Yes... Aris still gets anxious around maid uniforms, as you can see."
10023020-39 = "We thought becoming friends with Neru would help, but I think the association is too deep."
10023020-40 = "I won't stand for it! We have to help her. Heroes can always overcome their fears! It's just a piece of clothing!"
10023020-42 = "But I..."
10023020-43 = "[s3] \"All heroes have fears. But true heroes face them.\" \n[s4] \"Heroes never give up! No matter how tough the quest!\""
10023020-44 = "Sensei...is correct... But...!"
10023020-45 = "Sensei...is correct... But...!"
10023020-46 = "No! There is no \"but.\" I will overcome my fear because that is what a hero would do!"
10023020-47 = "I will complete my quest!"
10023020-50 = "Augh...!"
10023020-51 = "I do not know how I feel about wearing this uniform!"
10023020-52 = "[s] \"You did it, and that's what matters!\""
10023020-53 = "..."
10023020-54 = "I am...okay?"
10023020-55 = "I am still the same, even though I am wearing a maid uniform?"
10023020-58 = "Yup! You're our Aris!"
10023020-62 = "Thank you for showing me..."
10023020-66 = "...that this uniform is just a uniform, and that I will always be Aris, hero!"
10023020-68 = "I knew you could do it, Aris! I'm so proud of you!"
10023020-70 = "You're amazing, as usual, Aris."
10023020-72 = "It must've been hard, Aris... Good job."
10023020-76 = "[ns] \"You did so well, Aris.\""
10023020-79 = "Everyone cheered Aris on for overcoming her fear."
10023020-80 = "And they all lived happily ever after..."
10023020-82 = "...is not how this story ends."
10023020-84 = "[ns] \"...Why does everyone's uniform have a Double O call sign?\""
10023020-85 = "Oh, that? Well, Neru's uniform was the only one that fit us."
10023020-86 = "We know they're Neru's because of this note Akane left on them: \"Just in case the president grows.\""
10023020-90 = "We were able to distribute Neru's various spares among the four of us..."
10023020-91 = "The other uniforms were too big. Karin is very tall!"
10023020-92 = "I'm sure it won't matter! Since everyone is here, and Sensei's given us the thumbs up..."
10023020-93 = "Let us begin our adventure!"
10023020-94 = "Why do I have a bad feeling about this... Even with Sensei here, I..."
10023020-95 = "U-Ugh... Is there a locker I can crawl into...?"
10023020-97 = "And so began our adventure(?) to complete the Game Development Department's new quest..."
10023020-99 = "..."
10023020-100 = "..."
10023020-104 = "..."
10023020-105 = "?"
10023020-109 = "[ns] \"Am I the only one who wasn't expecting it to be so...intense?\""
10023020-110 = "M-Maybe we can tell them we had an emergency...!"
10023020-111 = "We're already here! We can't just back out now!"
10023020-118 = "Yuzu?! Hello? Talk to me, please!"
10023020-124 = "Welcome, everyone. I have been waiting for you."
10023020-125 = "You're not late, not early. Perfectly punctual."
10023020-127 = "(Midori, look... That's the person.)"
10023020-128 = "A-Are you the client?"
10023020-133 = "[ns5] \"We were told this was a cleaning job.\" \n[ns6] \"What will we be cleaning today?\""
10023020-134 = "Straight to business. I like it."
10023020-135 = "Straight to business. I like it."
10023020-136 = "My responsibilities lie with the management, distribution, and security of fine art. Often, I handle precious auction items."
10023020-137 = "Your responsibility will be to provide security and protection for the artwork. I have a particularly priceless piece that will be bid on in an upcoming auction."
10023020-138 = "Security? Protection?! I thought this was a cleaning job!"
10023020-139 = "It is to my understanding that \"cleaning\" is a codeword for undercover agent work for the C&C. Is it not?"
10023020-140 = "(Wait, really?!)"
10023020-141 = "(How would I know? Don't ask me!)"
10023020-142 = "(There's no way! What are we gonna do?!)"
10023020-143 = "(It'll be okay! We'll just improvise our way through this!)"
10023020-144 = "Y-You're correct! C&C at your service!"
10023020-145 = "[s] \"You really should be presenting all the terms of the job during the initial interview.\""
10023020-147 = "Yes, I'm sorry for that. I only thought that I should exercise discretion."
10023020-148 = "It seemed unwise to solicit a secret agent so openly in public."
10023020-149 = "But I would just like to say that I'm thrilled you accepted my request. Fate must have intervened."
10023020-150 = "I'm a bit of a fan, to be honest. To think I get to see you operate in person!"
10023020-153 = "...!"
10023020-155 = "Everyone knows C&C is made up of elite specialists, who are second to none in getting the job done."
10023020-156 = "Oh, please don't worry. I understand there are secrets of the trade you can't reveal to just anyone. A paltry cleaning job like this hardly requires your full effort."
10023020-157 = "I do hope I'm not asking too much, but I wanted to see just a small sample of your skills in action."
10023020-158 = "(Okay. That's it. We have to come clean.)"
10023020-159 = "(Do you want to die? Because Neru will literally kill us if she finds out!)"
10023020-160 = "(No! Obviously I don't want to die! But we're hardly secret agents!)"
10023020-161 = "(We can do this, I promise. Just follow my lead!)"
10023020-165 = "Now, where shall we begin?"
10023020-171 = "I get it, now! This is a job change quest. I will officially change to C&C!"
10023020-172 = "Aris...?"
10023020-173 = "What're you saying?!"
10023020-174 = "The C&C class I pick is..."
10023020-181 = "..."
10023020-187 = "..."
10023020-194 = "Eek!"
10023020-199 = "...!!!"
10023020-212 = "My class is a light-attribute, single-target DPS!"
10023020-213 = "And now, as a DPS, I will snipe that boulder!"
10023020-214 = "Haaah!"
10023020-215 = "Blinding Light!"
10023020-217 = "*BOOM*"
10023020-219 = "Wow! That boulder must have been at least 800 meters away. I-It's just dust now!"
10023020-220 = "I did hear that C&C's sniper could hit a fly from across Kivotos. That must be you!"
10023020-221 = "B-But, if you don't mind me asking, I thought snipers were supposed to be a bit more...subtle?"
10023020-222 = "N-Not this one! Her M.O. is complete suppression at any range. A-Across Kivotos even, like you said."
10023020-223 = "Exactly! It's her favorite catch phrase: \"No witnesses, no problems.\""
10023020-224 = "I see. C&C certainly operates under an...interesting philosophy."
10023020-225 = "Well, thank you. Please, continue your introductions."
10023020-226 = "Who is the quiet one hiding behind everyone?"
10023020-230 = "?! *gasp*"
10023020-233 = "(What do I do? What do I do? WhatdoIdo?!)"
10023020-234 = "(Stop panicking, Yuzu! You're good at a lot of things!)"
10023020-235 = "(You really are! Like...hiding! You're great at hiding!)"
10023020-236 = "(Oh! I've got it!)"
10023020-237 = "(Got it? Got what?!)"
10023020-238 = "(Just, come with me!)"
10023020-240 = "Hello? Is anyone here? I came back after five minutes, as you asked..."
10023020-244 = "What's this?"
10023020-247 = "Hm. Has this box always been here?"
10023020-262 = "Don't...move...!"
10023020-263 = "Augh?!"
10023020-265 = "How did you manage to get behind me?! You slipped completely past my defenses!"
10023020-266 = "You must be the member who specializes in infiltration! Not only do you move with a lithe grace, your inexplicable luck can get you as far as you can dream!"
10023020-267 = "I wasn't expecting you to be so small! That must make missions very difficult...or I suppose that's exactly what makes your stealth so lethal."
10023020-268 = "Yes... Th-That's exactly what I always say.."
10023020-269 = "Then, of course, we have our famed strategist. I've always admired how effectively you guide your team through any unexpected turn of events."
10023020-270 = "That must be you!"
10023020-271 = "Me? A strategist? I-I guess so. That's me."
10023020-272 = "And lastly..."
10023020-273 = "..."
10023020-274 = "..."
10023020-275 = "What's with that look?! If you've got something to say, just say it!"
10023020-276 = "Yes... The Little Menace..."
10023020-278 = "Since we've met, you've more than lived up to your reputation. I look forward to working with you."
10023020-279 = "I've told you I'm nothing like—!"
10023020-281 = "[ns7] \"I'm curious. Does an estate of this scale not have its own security?\"\n[ns8] \"Why did you come to C&C? You must have some measure of security here.\""
10023020-284 = "I will not lie. My estate is equipped with a state-of-the-art security system and detail."
10023020-285 = "Despite that, I had a need for the C&C's specific services."
10023020-289 = "Because, you see... I have received a calling card from the Benevolent Thief."
10023020-294 = "The...Benevolent Thief?"
