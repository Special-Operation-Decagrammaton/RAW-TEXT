[translation]
901010400420-8 = "あ、先生。いらっしゃいませ。"
901010400420-9 = "今日もお疲れ様でした！"
901010400420-10 = "[s1] \"ニコもお疲れ様！\"\n[s2] \"今日は鐘崎港に行ってきたんだよね？\""
901010400420-13 = "はい。先日お話した噂の真相を突き止めるために。"
901010400420-14 = "色々な話を聞いてきたので……情報の整理を手伝っていただけませんか？"
901010400420-15 = "[s3] \"もちろん。\"\n[s4] \"どんな話を聞いたのか楽しみだね！\""
901010400420-21 = "全員復帰したようだな。"
901010400420-22 = "では、各自報告するように。"
