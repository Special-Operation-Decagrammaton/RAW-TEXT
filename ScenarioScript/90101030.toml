90101030-32 = "3;유키노;01;그 안에 담긴 게들은 워낙 흉포하고 굶주린 녀석들이라, 생선이나 고깃 덩어리를 던져주면 수 시간 이내에 흔적도 남지 않을 정도로 말끔히 먹어치운다고 하는군요."
