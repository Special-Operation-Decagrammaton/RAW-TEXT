[translation]
90101030-1 = "第3話;カニとドラム缶"
90101030-2 = "連邦生徒会長執務室"
90101030-4 = "……カニ、ですか？"
90101030-9 = "ええ、カニです。"
90101030-10 = "生きたカニをご覧になったことは？"
90101030-11 = "あります。"
90101030-12 = "夏期訓練の時、干潟の近くでよく目にしました。"
90101030-13 = "干潟ですか。いいですね。"
90101030-14 = "最後に夏の海に行ったのは、いつだったか……もう思い出せないのですが。"
90101030-15 = "お忙しいのですね。"
90101030-16 = "それで……失踪事件とカニに何の関連性が？"
90101030-20 = "事件の犯人は、カニである、と。#nそんな噂がありまして。"
90101030-21 = "……はい？"
90101030-23 = "ここのところ、鐘崎港周辺で市民の失踪が相次いでいるのです。"
90101030-24 = "自発的なものなのか、はたまた事故なのか、あるいは……#nいずれにせよ、現時点では原因を特定できていません。"
90101030-25 = "ですが、とある証言がSNS上で出回っているのです。#n失踪現場の近くで「ドラム缶ガニ」を見た、と。"
90101030-27 = "ユキノさん。"
90101030-28 = "「ドラム缶ガニ」の調査をお願いできますか？"
90101030-30 = "[ns] \"……ドラム缶ガニ？\""
90101030-31 = "はい。とても大きなドラム缶の中に、カニが大量に詰め込まれているのだとか。"
90101030-32 = "中のカニは非常に凶暴で、常に飢えており……。#n魚を投げ込むと、瞬く間に食い尽くされてしまうのだとか。"
90101030-33 = "……派生する噂も、それに付随するものです。"
90101030-34 = "鐘崎港で、誰かに恨みを抱く者がいると「ドラム缶ガニ」を用意する。"
90101030-35 = "人目につかない場所に相手を呼び出して、ドラム缶の中で[ruby=・]処[/ruby][ruby=・]理[/ruby]してもらえば――"
90101030-36 = "自身の手を汚すことなく、失踪扱いにできる、と。"
90101030-37 = "[s1] \"……ぞっとする話だね。\"\n[s2] \"そんなに凶暴なカニが実在するのかな？\""
90101030-40 = "こんなの真剣に考えるような話じゃないって。"
90101030-41 = "だってカニよ？怪我させられるかどうかも怪しいでしょ。"
90101030-42 = "そもそもカニって[ruby=スカベンジャー]腐肉食[/ruby]だし。#n死んだ魚とか海藻を食べる生き物なんだから。"
90101030-43 = "それに、カニの殻は薄くて脆いですし……。"
90101030-44 = "定期的に脱皮をするので、殻の厚さには限界がありますから。"
90101030-45 = "ドラム缶の中で暴れたら、先にカニの方が潰れてしまいます。"
90101030-46 = "ハサミはそこそこ硬いけど、あのサイズじゃパワーが足りない。"
90101030-47 = "骨を砕くほどのハサミとなると――"
90101030-48 = "少なくとも、全長5メートルは欲しいよねぇ。"
90101030-49 = "……いや、もっとか。最低でも20メートルはないと。"
90101030-50 = "[s] \"ちょっと安心したけど……。\""
90101030-54 = "[ns] \"なんでそんなにカニに詳しいの？\""
90101030-55 = "私は、海難救助作戦に出た後輩に聞いたのよ。"
90101030-56 = "たまに調理していたので……。"
90101030-57 = "任務で寿司屋に潜入した時に教わったんだ。"
90101030-58 = "ただの噂だったとしても、それを利用している何者かがいるのは確実です。"
90101030-59 = "現に鐘崎港周辺で行方不明者が発生し、市民は不安に怯えているのですから。"
90101030-60 = "でも、ちょっと調べれば嘘だって分かるよね？#nこんな噂を流して何の得があるんだろ。"
90101030-61 = "犯罪のカモフラージュにしては回りくどいし……。"
90101030-62 = "でも、「なんでも食べちゃう化け蟹」って響きは怖いよね。#nそれを利用するとしたら――"
90101030-66 = "カニのイメージを悪くして相場を下げたいんじゃない？"
90101030-67 = "安くなったところを買い叩ける業者を洗えば――"
90101030-70 = "……今のところ、カニの価格と流通量に大きな変動はないみたいだね。"
90101030-71 = "まだ噂が広がり切ってないのかも。"
90101030-72 = "うーん……分かんないなぁ。"
90101030-73 = "[s] \"……まだ情報が足りないね。\""
90101030-74 = "はい。机上の推理には限界があります。"
90101030-75 = "こういう時は、憶測を重ねるより――"
90101030-76 = "現地で地道に情報集め、だよね？"
90101030-80 = "……その通りだ。"
90101030-81 = "目的地は、D.U.シラトリ区4番街に位置する鐘崎港。"
90101030-82 = "対象はカニ漁に関わる者全員だ。"
90101030-83 = "高速道路の次は港の調査か～"
90101030-84 = "日陰が多い分、熱中症の心配はなさそうだねぇ。"
90101030-90 = "FOX小隊。現時刻より、聞き込みを開始する。"
90101030-92 = "次回;港の人々（１）"
