[translation]
1001802-1 = "ที่พักผ่อนในตู้เก็บของ"
1001802-5 = "ห้องชมรมพัฒนาเกม"
1001802-7 = "คุณครูมาหาที่ชมรมพัฒนาเกมเพราะได้ยินว่ากำลังเตรียมเกมใหม่ แต่ไม่มีใครอยู่ในห้องเลย"
1001802-8 = "คุณครูรออยู่ที่ห้องอย่างสบายใจจนสมาชิกกลับมา"
1001802-9 = "[s] เปิดตู้เหล็กเพื่อแขวนเสื้อคลุม"
1001802-13 = "ฮะ... เฮือก!?"
1001802-14 = "ตะ... ตกใจหมดเลยค่ะ คุณครู! ช่วยเคาะก่อนเปิดตู้ด้วยค่ะ!"
1001802-15 = "...อ่า ฉันเองก็คิดว่านี่เป็นคำพูดแปลกๆ ค่ะ"
1001802-16 = "ละ... แล้วทำไมมาอยู่ที่นี่ล่ะคะ?#nมะ... มีเรื่องอะไรให้ฉันช่วยรึเปล่าคะ?"
1001802-17 = "....อ่า....เรียกมาดูเกมใหม่ของชมรมพัฒนาเกมเหรอคะ?"
1001802-18 = "งะ...งั้นเหรอคะ..... แต่เกมใหม่ที่กำลังเตรียมอยู่ มันอยู่ในโน้ตบุ้คที่โมโมอิถือไป#nก็เลยให้ดูตอนนี้ไม่ได้ค่ะ"
1001802-19 = "ช่วยรอสักครู่จนกว่าสมาชิกคนอื่นจะกลับมานะคะ"
1001802-20 = "[s] \"ทำไมยูสึเข้าไปอยู่ในตู้ล่ะ?\""
1001802-21 = "คือว่าเรื่องนั้น..."
1001802-22 = "เพราะถ้าเข้ามาอยู่ในนี้ คนอื่นจะไม่สังเกตเห็นค่ะ"
1001802-23 = "ถ้านั่งอยู่ที่ห้องตามสบาย จะมีคนมาชวนคุยกันเรื่อยๆ น่ะค่ะ"
1001802-24 = "โดยเฉพาะยูกะจากชมรมเซมิน่าที่เข้าร่วมการประชุมหัวหน้าชมรมและทำสีหน้าน่ากลัว...#nถ้าอยู่ต่อหน้า ฉันอยากจะวิ่งหนีเลยล่ะค่ะ"
1001802-25 = "แต่ถ้าอยู่ข้างในนี้จะไม่มีใครหาฉันเจอค่ะ"
1001802-26 = "ช่วงนี้ตู้นี้เป็นที่หลบภัยเล็กๆ ของฉันค่ะ แหะๆ..."
1001802-27 = "[s] \"ตู้นี้ออกจะแคบ ไม่อึดอัดเหรอ?\""
1001802-28 = "ไม่นะคะ ตรงกันข้ามมันทำให้รู้สึกสบายค่ะ"
1001802-29 = "นอกจากนั้นในวันที่อากาศร้อนแบบนี้ ฉันรู้สึกสดชื่นดีเพราะได้สัมผัสของกำแพงโลหะเย็นๆ ค่ะ"
1001802-30 = "พอพิงกำแพงจะได้ฟังเสียงที่ได้ยินจากข้างนอก... จนอยากจะอยู่ที่นี่ตลอดไป..."
1001802-31 = "[s] \"งั้นเข้าไปข้างในนั้นด้วยกันจะไม่เป็นไรเหรอ?\""
1001802-32 = "คะ... คะ?!"
1001802-33 = "แต่ตู้นี้สำหรับ 1 คนไม่ใช่เหรอคะ?"
1001802-34 = "แน่นอนว่าตู้ไม่ได้จำกัดจำนวนผู้ใช้งาน... แต่ว่า 2 คนมันจะไม่แคบไปเหรอคะ?"
1001802-35 = "กลับกันถ้าพื้นที่ลดลงจะรู้สึกสบายใจขึ้นอย่างนั้นน่ะเหรอคะ?"
1001802-36 = "อืม... ถ้าคุณครูว่าอย่างนั้นก็อาจจะไม่เป็นไรค่ะ..."
1001802-40 = "ดะ... เดี๋ยวก่อนสิคะ คุณครู! อย่าฝืนเบียดเข้ามาสิคะ!"
1001802-41 = "กะ... ใกล้เกินไปแล้วค่ะ... ทั้งอุณหภูมิ... ทั้งลมหายใจ... อือ..."
1001802-42 = "ว่าแล้วเชียว ไม่ได้ค่ะ...!"
1001802-46 = "มันเกินไปค่ะ! การอยู่ในตู้ 2 คนนี่มันเกินไปค่ะ!"
1001802-47 = "คะ? คุณครูจะเข้าไปในตู้คนเดียวแทนฉันงั้นเหรอคะ?"
1001802-48 = "ไม่ได้นะคะ! ที่นี่เป็นที่พักผ่อนของฉันค่ะ!"
1001802-50 = "หลังจากนั้นคุณครูกับยูสึก็แย่งชิงตู้กันจนสมาชิกคนอื่นๆ กลับมา..."
