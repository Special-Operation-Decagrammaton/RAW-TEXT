901010600130-38 = "#wait;500"
901010600130-39 = "3;어부;00;이 근처에서는 악명이 자자한 패거리인데, 평소에는 카네사키 항의 경비 업무를 담당하고 있거든.\n#3;a"
901010600130-40 = "3;어부;00;그런데 가끔 신용이 없는 사람들에게 돈을 빌려주기도 하는 모양인데, 카르파초 패밀리의 사채는 이자가 말도 안 되게 높은 모양이야.\n#3;em;[한숨]"
901010600130-41 = "3;어부;00;그러니 미야구치가 이자를 갚을 수나 있었겠어? 빚이 더 늘어나기 전에 몰래 도망친 거지.\n#3;stiff"
901010600130-42 = "1;니코 아르바이트;02;그런 사정이 있었군요…… 무서운 일이네요.\n#1;em;…\n#1;ar\n#3;m5"
901010600130-43 = "3;어부;00;그래. 그러니까 학생은 돈이 모자라더라도 도박 같은 일에는 손도 대지 마."
901010600130-44 = "3;어부;00;사채는 물론이고!\n#3;hophop"
