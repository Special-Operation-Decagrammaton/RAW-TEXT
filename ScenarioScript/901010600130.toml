901010600130-12 = "3;어부;00\n#3;em;[?]\n#3;h\n#wait;1000"
901010600130-13 = "3;어부;00;어라, 지난번의 배달부 학생이잖아?"
901010600130-14 = "3;어부;00;오늘도 신세 지는군. 잘 마실게!\n#3;hophop"
901010600130-15 = "3;니코 아르바이트;03;후후. 답례는 <FOX EATS> 계정에 '좋아요'를 눌러 주시는 걸로 대신 부탁드립니다!\n#3;em;[반짝]"
901010600130-16 = "3;니코 아르바이트;02;그런데 아까 저 쪽의 어르신과 이야기하다가 들었는데……"
901010600130-17 = "3;니코 아르바이트;01;미야, 뭔가 하는 신입 선원이 사라졌다면서요?"
901010600130-18 = "5;어부;00;아, 또 영감님이 그 이야기를 했나……\n#5;al\n#3;m1"
901010600130-19 = "5;어부;00;신경 쓰지 마. 뱃일을 하다보면 흔히 발생하는 일이니까."
901010600130-20 = "3;니코 아르바이트;04;흔하다니, 뱃일이 그렇게 많이 고된가요?\n#3;em;[땀]"
901010600130-21 = "5;어부;00;음, 뱃일이 힘들어서 도망치는 녀석도 꽤 있긴 하지만……"
901010600130-22 = "5;어부;00;최소한 미야구치는 영감님이 말씀하시는 것만큼 근성 없는 녀석은 아니었어.#n입으로는 불평이 많긴 했지만, 그래도 시킨 일은 늘 성실하게 해냈거든."
901010600130-23 = "5;어부;00;어디서 사고를 당했을지도 모르지만, 내 생각엔 그 녀석…… 빚 때문에 도망친 게 분명해.\n#5;em;[속상함]\n#5;stiff"
901010600130-24 = "#st;[0,0];instant;1;"
901010600130-25 = "#clearST"
901010600130-26 = "5;어부;00\n3;니코 아르바이트;02\n#3;em;[!]\n#5;h\n#3;h\n#wait;800"
901010600130-27 = "3;니코 아르바이트;04;빚이요?\n#3;stiff"
901010600130-28 = "5;어부;00;응. 어부 중에는 가끔 커다란 빚 때문에 배를 타는 녀석들도 몇 있거든.\n#5;em;[한숨]\n#5;m3\n#3;dl"
901010600130-29 = "5;어부;00;뱃일은 고된 만큼 단기간에 큰돈을 벌 수 있어서, 빚을 갚는 데는 이만한 직업도 없지만—"
901010600130-30 = "5;어부;00;미야구치는 도박에 빠져 있어서, 날이 갈수록 빚이 줄기는커녕 오히려 늘어났던 모양이야."
901010600130-31 = "5;어부;00;결국에는 \"카르파초 패밀리\"의 사채에도 손을 댄 것 같고……\n#5;em;[속상함]"
901010600130-32 = "#all;hide"
901010600130-33 = "3;니코 아르바이트;02;카르파초 패밀리요?\n#3;em;[?]"
901010600130-34 = "3;어부;00;응. 항구의 정문에서 검문을 하고 있는 검은 옷차림의 녀석들. 들어오면서 봤지?\n#3;em;[반응]"
901010600130-35 = "#3;hide\n1;카르파초 조직원 A;00\n5;카르파초 조직원 A;00\n#1;h\n#5;h"
