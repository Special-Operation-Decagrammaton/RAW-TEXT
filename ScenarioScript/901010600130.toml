[translation]
901010600130-8 = "すみません。"
901010600130-9 = "お仕事中、失礼します。#nよかったら冷えたエナジードリンク、いかがですか？"
901010600130-13 = "あれ、この間の配達の子かい？"
901010600130-14 = "今日も世話になるよ、ありがとう！いただくね！"
901010600130-15 = "ふふっ。「FOX EATS」の「いいね」、お願いしますね！"
901010600130-16 = "ところで、あちらの漁師さんから聞いたんですが……。"
901010600130-17 = "ミヤ……新入りの船員さんが失踪したって……。"
901010600130-18 = "はあ……あの爺、またあの話を……。"
901010600130-19 = "気にしないで。船仕事ではよくあることだよ。"
901010600130-20 = "そんなによくあることなんですか？"
901010600130-21 = "そうだねぇ……仕事自体がキツくて逃げ出すヤツもいるけど……。"
901010600130-22 = "ミヤグチは、爺が言うよう根性なしじゃない。#n口では文句ばっかだったけど、仕事は真面目にやってたんだ。"
901010600130-23 = "俺が思うに……アイツは借金苦で逃げたんじゃないかって思ってるよ。"
901010600130-27 = "借金、ですか？"
901010600130-28 = "ああ。漁師の中には借金返済のために船に乗るやつもいる。"
901010600130-29 = "船仕事は大変な分、実入りがいいからな。"
901010600130-30 = "だが、ミヤグチはギャンブルに手を出しちまったらしい。、借金が減るどころか、むしろ増えていたとか……。"
901010600130-31 = "結局は、「カルパッチョ・ファミリー」が牛耳ってるサラ金にも手を出したらしくて……。"
901010600130-33 = "カルパッチョ・ファミリーですか？"
901010600130-34 = "ああ。港の正門で検問をしてる黒服を見たことあるだろう？あいつらだよ。"
901010600130-39 = "この辺では結構有名な昔ながらのファミリーだよ。#n普段は鐘崎港で警事をしている。"
901010600130-40 = "たまに、金に困っている人間に貸しているらしいんだが……#nカルパッチョ・ファミリーの金利はとんでもなく高いらしい。"
901010600130-41 = "ギャンブルにハマったミヤグチが返済できるわけないだろう？#n借金がふくらむ前に、とんずらしたに違いない。"
901010600130-42 = "そんな事情があったんですね……。"
901010600130-43 = "ああ。君はギャンブルなんかに手を出しちゃダメだよ。"
901010600130-44 = "サラ金は言うまでもなく、ね。"
901010600130-45 = "はい、肝に銘じます。"
