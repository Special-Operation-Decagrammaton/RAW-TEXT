901010600130-8 = "3;니코 아르바이트;03;저기, 실례합니다.\n#3;em;[반응]"
901010600130-9 = "3;니코 아르바이트;01;오늘도 수고가 많으시네요. 잠깐 쉬면서 시원한 에너지 드링크라도 한 잔, 어떠신가요?"
