[translation]
80000130-1 = "冰冷的指尖"
80000130-6 = "啊，老師。"
80000130-7 = "還好你在夏萊。幸好不用白跑一趟呢。"
80000130-8 = "[s1] 「歡迎你來，名草。」\n[s2] 「今天不是值班日，突然來是有什麼事嗎……？」"
80000130-11 = "雖然不是夏萊的值班日，但今天是情人節不是嗎？"
80000130-12 = "因為在百花繚亂執行業務巡邏的過程中，自然而然就會知道這些紀念日的事了。"
80000130-13 = "來，這是情人節巧克力。我想親自交給老師所以特地過來了。"
80000130-14 = "[s3] 「名草的情人節巧克力……！」\n[s4] 「特地這樣跑來交給我，好開心。」"
80000130-17 = "不用這麼說……只是件微不足道的東西而已。"
80000130-18 = "其實一直以來都很想向總是給予許多幫助的老師傳達感謝之意。"
80000130-19 = "不過如果沒有什麼特別的理由就想表達真心的話，總覺得太突然了，話到嘴邊又說不出口……"
80000130-20 = "這種時候，這樣的紀念日就成了很好的藉口了。"
80000130-21 = "[s] 「沒錯。我能理解那種感覺呢。」"
80000130-25 = "[ns] 「話說回來，這巧克力莫名地有點眼熟呢。」"
80000130-28 = "嗯。是只有在百鬼夜行自治區才有賣的特製巧克力餅乾喔。在學園之間來往的時候應該有看過一次吧？"
80000130-29 = "這個餅乾上面塗了滿滿的用惠比壽產乳製品製成的、柔軟又甜蜜的白巧克力。"
80000130-30 = "我個人覺得是最喜歡的茶點之一，但不知道為什麼其他百花繚亂的成員都不太碰……"
80000130-31 = "買回部室放著的話，大部分最後都是我自己一個人吃掉了。"
80000130-32 = "[s] 「那讓我來嚐嚐看吧……」"
80000130-37 = "[ns5] 「哇，這個真的很好吃耶？」\n[ns6] 「巧克力一放進嘴裡就融化了，感覺風味更濃郁了呢。」"
80000130-40 = "對吧？我也覺得那甜甜的風味很好。"
80000130-41 = "不介意的話要不要再吃一塊？"
80000130-42 = "[s] 「啊，現在吃的話有點……」"
80000130-46 = "……啊。"
80000130-47 = "果然雖然嘴上那麼說，老師也覺得不合口味吧。"
80000130-48 = "抱歉。在其他成員都不碰的時候就該意識到是我的口味比較特別了才對。"
80000130-49 = "我跟其他成員不一樣，不是那麼普通的人嘛……"
80000130-50 = "[ns] 「不，不是那樣的！」"
80000130-52 = "[ns] 「不是別的原因，是因為我現在正在處理文件……」"
80000130-53 = "每次拿餅乾的時候巧克力都會沾到手上，所以在意的意思嗎？"
80000130-54 = "確實這個「白色女士」塗了入口即化的柔軟巧克力，但我從來沒有巧克力沾到手過呢。"
80000130-58 = "……啊，原來如此。是因為我的體溫的關係。"
80000130-59 = "[s] 「體溫？」"
80000130-60 = "嗯。我的體溫比其他人低一些。所以經常被說手腳冰冷──"
80000130-61 = "沒想到正因為如此，別人手上很容易融化的巧克力餅乾我卻能輕鬆地吃。"
80000130-62 = "[s7] 「感覺就像壽司師傅的手呢。」\n[s8] 「總覺得那一點還蠻令人羨慕的。」"
80000130-65 = "呵呵，是啊。"
80000130-66 = "一直以來都不覺得體溫低是什麼特別好的體質呢。"
80000130-67 = "就算待在別人身邊也傳遞不了體溫，在酷暑中也很容易變得虛弱……"
80000130-68 = "不過不管什麼事，找一找的話總會有一個優點吧。"
80000130-69 = "[s9] 「話說如果我的手不能用的話……」\n[s10] 「名草直接餵我吃不就好了嗎？」"
80000130-72 = "我，我親手直接……？"
80000130-73 = "老師不介意的話我倒是無所謂。"
80000130-78 = "來，老師。看這邊，啊──"
80000130-83 = "[ns11] 「果然好好吃……」\n[ns12] 「感覺大腦都被治癒了……」"
80000130-86 = "呵呵，那就好"
80000130-87 = " 看來有一個我自己不知道的優點呢。"
80000130-89 = "（之後像雛鳥一樣接受名草餵食的餅乾，度過了愉快的時光）"
