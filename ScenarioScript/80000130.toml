[translation]
80000130-1 = "#title;차가운 손끝"
80000130-2 = "#wait;2000"
80000130-3 = "#wait;1000"
80000130-4 = "#wait;1000"
80000130-5 = "3;나구사;00\n#3;ar\n#wait;1500"
80000130-6 = "3;나구사;03;아, 선생님. \n#3;em;[반응]"
80000130-7 = "3;나구사;16;다행히 샬레에 있었구나. 헛걸음을 하지 않아서 다행이야."
80000130-8 = "[s1] \"어서 와, 나구사.\"\n[s2] \"오늘은 당번 날이 아닌데, 갑자기 무슨 일로……?\""
80000130-9 = "#wait;100"
80000130-10 = "#wait;100"
80000130-11 = "3;나구사;03;샬레의 당번은 아니지만, 오늘은 발렌타인 데이잖아?"
80000130-12 = "3;나구사;03;백화요란의 업무차 순찰을 하다 보면 자연스럽게 이런 기념일에 대해서는 알게 되니까.\n#3;em;[재잘]"
80000130-13 = "3;나구사;16;자, 발렌타인 데이 초콜릿이야. 선생님께 직접 주고 싶어서 찾아왔어.\n#3;greeting"
80000130-14 = "[s3] \"나구사의 발렌타인 초콜릿……!\"\n[s4] \"일부러 이렇게 찾아와서 전해주다니, 기쁜걸.\""
80000130-15 = "#wait;100"
80000130-16 = "#wait;100"
80000130-17 = "3;나구사;01;그렇게 말할 것까지는…… 변변찮은 물건인걸."
80000130-18 = "3;나구사;02;사실 언제나 많은 도움을 주고 있는 선생님에겐 언제나 감사의 인사를 전하고 싶었어."
80000130-19 = "3;나구사;16;하지만 아무 일도 없는데 솔직한 감정을 전달하려 하면 새삼스러워서 그런지 뭔가 말을 주저하게 되니까……"
80000130-20 = "3;나구사;03;그럴 때는 이런 기념일이 좋은 핑계가 되는 것 같아.\n#3;em;[음표]"
80000130-21 = "[s] \"맞아. 어떤 느낌인지 이해가 가네.\""
80000130-22 = "#st;[0,0];instant;1;"
80000130-23 = "#clearST"
80000130-24 = "#wait;1000"
80000130-25 = "[ns] \"그나저나 묘하게 낯이 익은 초콜릿이네.\""
80000130-26 = "3;나구사;01\n#3;m1\n#wait;1000"
80000130-27 = "#wait;1500"
80000130-28 = "3;나구사;16;응. 백귀야행 자치구에서만 파는 특제 초콜릿 쿠키야. 학원을 오가면서 한 번쯤은 본 적 있지?"
80000130-29 = "3;나구사;03;이 쿠키에는 에비스산 유제품을 듬뿍 넣어 만든 부드럽고 달콤한 화이트초콜릿이 코팅되어 있어."
80000130-30 = "3;나구사;00;개인적으로는 제일 좋아하는 다과 중 하나인데, 이상하게 다른 백화요란 부원들은 좀처럼 손을 대지 않아서."
80000130-31 = "3;나구사;12;부실에 사다 놓으면 대부분 나 혼자서 먹게 되는 것 같아.\n#3;em;[한숨]"
80000130-32 = "[s] \"어디 한번 먹어볼까…….\""
80000130-33 = "#st;[0,0];instant;1;"
80000130-34 = "#clearST"
80000130-35 = "#wait;2000"
80000130-36 = "3;나구사;12\n#3;m3\n#wait;1500"
80000130-37 = "[ns5] \"우와, 이거 정말 맛있는데?\"\n[ns6] \"초콜릿이 입에 넣자마자 녹아 내려서 그런지 풍미가 더 진하게 느껴져.\""
80000130-38 = "#wait;100"
80000130-39 = "#wait;100"
80000130-40 = "3;나구사;16;그렇지? 나도 그 달콤한 풍미가 좋다고 생각했어."
80000130-41 = "3;나구사;03;괜찮다면 한 개 더 먹어볼래?"
80000130-42 = "[s] \"아, 지금 먹는 건 조금…….\""
80000130-43 = "#st;[0,0];instant;1;"
80000130-44 = "#clearST"
80000130-45 = "3;나구사;14\n#wait;1500\n#3;em;[?]\n#3;m3"
80000130-46 = "3;나구사;06;……아."
80000130-47 = "3;나구사;17;역시 그렇게 말하긴 했지만 선생님도 취향이 아니었구나.\n#3;em;[속상함]\n#3;stiff"
80000130-48 = "3;나구사;12;미안. 다른 부원들이 손을 대지 않는 시점에서 내 취향이 특이하다는 걸 깨달았어야 했는데."
80000130-49 = "3;나구사;12;나는 다른 부원들처럼 평범하지 않으니까…….\n#3;em;[세로선]"
80000130-50 = "[ns] \"그, 그런 게 아니야!\""
80000130-51 = "#wait;1000"
80000130-52 = "[ns] \"다른 게 아니라, 지금 서류 작업을 하고 있어서…….\""
80000130-53 = "3;나구사;02;쿠키를 집어들 때마다 초콜릿이 손에 묻어나서 신경 쓰인다고?\n#3;em;[?]"
80000130-54 = "3;나구사;16;물론 이 <하얀 여인>은 입에서 바로 녹아내릴 정도로 부드러운 초콜릿이 코팅되어 있긴 하지만, 정작 나는 한 번도 초콜릿이 손에 묻은 적이 없었는데."
80000130-55 = "#st;[0,0];instant;1;"
80000130-56 = "#clearST"
80000130-57 = "3;나구사;99\n#3;em;[…]\n#wait;2500"
80000130-58 = "3;나구사;16;……아, 그렇구나. 내 체온 때문이었어.\n#3;em;[전구]"
80000130-59 = "[s] \"체온?\""
80000130-60 = "3;나구사;02;응. 나는 다른 사람들보다 체온이 낮은 편이거든. 그래서 손발도 차다는 소리를 자주 듣는데—"
80000130-61 = "3;나구사;03;설마 그 때문에 다른 사람들의 손에서는 쉽게 녹는 초콜릿 쿠키를 편하게 먹고 있었을 줄이야."
80000130-62 = "[s7] \"뭔가 초밥 장인의 손 같네.\"\n[s8] \"어쩐지 그 점은 부러운걸.\""
80000130-63 = "#wait;100"
80000130-64 = "#wait;100"
80000130-65 = "3;나구사;16;후후, 그러게.\n#3;em;[음표]"
80000130-66 = "3;나구사;03;그동안 체온이 낮다는 게 특별히 좋은 체질이라고 생각한 적은 별로 없었지만 말이야."
80000130-67 = "3;나구사;02;다른 사람의 곁에 있어도 체온이 전해지지 않고, 무더위에도 약해지기 쉽지만……"
80000130-68 = "3;나구사;16;그래도 무엇이든, 찾아보면 좋은 점 하나 정도는 있을지도."
80000130-69 = "[s9] \"그러고 보니 내 손을 쓸 수 없다면……\"\n[s10] \"나구사가 직접 먹여주면 되지 않을까?\""
80000130-70 = "#wait;100"
80000130-71 = "#wait;100"
80000130-72 = "3;나구사;14;내, 내 손으로 직접……?"
80000130-73 = "3;나구사;12;선생님만 괜찮다면 나야 상관없지만.\n#3;em;[///]\n#3;stiff"
80000130-74 = "#st;[0,0];instant;1;"
80000130-75 = "#clearST"
80000130-76 = "3;나구사;12\n#3;d\n#wait;1500"
80000130-77 = "3;나구사;12\n#3;a\n#3;closeup\n#wait;1500"
80000130-78 = "3;나구사;02;자, 선생님. 이쪽을 보고 아, 해줘.\n#3;closeup"
80000130-79 = "#st;[0,0];instant;1;"
80000130-80 = "#clearST"
80000130-81 = "3;나구사;02\n#3;closeup\n#3;greeting\n#wait;1500"
80000130-82 = "#wait;2000"
80000130-83 = "[ns11] \"역시 맛있어…….\"\n[ns12] \"뇌가 치유되는 느낌이야…….\""
80000130-84 = "#wait;100"
80000130-85 = "#wait;100"
80000130-86 = "3;나구사;03;후후, 그래?\n#3;em;[반짝]\n#3;closeup"
80000130-87 = "3;나구사;16; 내가 모르는 나의 좋은 점이 하나 더 있었던 모양이네.\n#fontsize;40\n#3;closeup"
80000130-88 = "#all;hide"
80000130-89 = "#na;(이후 나구사가 집어 주는 쿠키를 아기새처럼 받아먹으며 즐거운 시간을 보냈다.)"
