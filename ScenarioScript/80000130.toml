[translation]
80000130-1 = "ปลายนิ้วมือที่เย็นเฉียบ"
80000130-6 = "อ่า คุณครู "
80000130-7 = "ค่อยยังชั่วนะที่คุณครูอยู่ที่ชาเล่ต์ โชคดีที่การเดินทางมาครั้งนี้ไม่สูญเปล่า"
80000130-8 = "[s1] \"เข้ามาสิ นางุสะ\"\n[s2] \"วันนี้ไม่ใช่เวรตัวแทนนี่นา ทำไมจู่ๆ ถึงมาเหรอ...?\""
80000130-11 = "ถึงไม่ใช่วันที่ฉันต้องมาเข้าเวรตัวแทน แต่วันนี้เป็นวันวาเลนไทน์นะ?"
80000130-12 = "เพราะต้องออกลาดตระเวนปฏิบัติหน้าที่ของเฮียกกะเรียวรัน เลยทำให้รับรู้ถึงวันเทศกาลต่างๆ ได้เองน่ะ"
80000130-13 = "เอ้า นี่ช็อกโกแลตวันวาเลนไทน์ ฉันอยากให้เองกับมือเลยมาหาน่ะ"
80000130-14 = "[s3] \"ช็อกโกแลตวาเลนไทน์จากนางุสะ...!\"\n[s4] \"ตั้งใจเอามาให้เลยเหรอเนี่ย ดีใจจัง\""
80000130-17 = "ไม่ต้องพูดขนาดนั้นหรอก... มันก็แค่เรื่องเล็กน้อยน่ะ"
80000130-18 = "ที่จริงแล้วฉันอยากจะแสดงความขอบคุณคุณครูที่คอยช่วยเหลือฉันมาโดยตลอด"
80000130-19 = "แต่จู่ๆ จะให้พูดความรู้สึกไปตรงๆ ทั้งที่ไม่ได้มีเรื่องอะไรเลย มันก็อาจจะดูแปลกๆ ไปสักหน่อย เลยทำให้รู้สึกลังเลที่จะพูดออกมา..."
80000130-20 = "เพราะงั้นวันเทศกาลแบบนี้เลยเป็นข้ออ้างที่ดีทีเดียว"
80000130-21 = "[s] \"ก็จริงนะ ครูเข้าใจความรู้สึกดีเลยละ\""
80000130-25 = "[ns] \"ว่าแต่ว่าช็อกโกแลตนี่ดูคุ้นๆ แฮะ\""
80000130-28 = "อื้อ คุกกี้เคลือบช็อกโกแลตสูตรพิเศษที่มีขายเฉพาะในเขตเฮียกคิยาโคน่ะ ตอนที่แวะไปที่โรงเรียนคงเคย#nเห็นมาบ้างใช่มั้ยล่ะ?"
80000130-29 = "คุกกี้นี่เคลือบด้วยไวท์ช็อกโกแลตโฮมเมดรสชาติหวานละมุนลิ้นที่ทำจากนมจากภูเขาเอบิสุด้วย"
80000130-30 = "มันเป็นหนึ่งในขนมทานเล่นที่ฉันชื่นชอบที่สุดเลย แต่ก็น่าแปลกที่สมาชิกคนอื่นๆ ของเฮียกกะเรียวรัน#nแทบไม่แตะต้องมันเลย"
80000130-31 = "ถ้าซื้อมาไว้ที่ห้องชมรม สุดท้ายก็มีฉันกินอยู่คนเดียว"
80000130-32 = "[s] \"ขอลองชิมดูหน่อยนะ...\""
80000130-37 = "[ns5] \"ว้าว อร่อยจริงๆ ด้วย\"\n[ns6] \"คงเพราะช็อกโกแลตละลายทันทีที่กินเข้าไป เลยทำให้รสชาติเข้มข้นขึ้น\""
80000130-40 = "ใช่มั้ยล่ะ? ฉันคิดว่ารสหวานละมุนแบบนั้นน่ะดีสุดๆ เลย"
80000130-41 = "ถ้าไม่รบกวนจนเกินไป ลองชิมอีกสักชิ้นได้มั้ย?"
80000130-42 = "[s] \"อ่า คือว่าจะให้กินตอนนี้มันก็...\""
80000130-46 = "อ่า..."
80000130-47 = "คิดแล้วเชียว ถึงคุณครูจะพูดแบบนั้นแต่ก็คงไม่ถูกปากคุณครูสินะ"
80000130-48 = "ขอโทษด้วย ฉันน่าจะรู้ตัวว่ารสนิยมของตัวเองมันแปลก ตั้งแต่ตอนที่สมาชิกคนอื่นๆ ไม่ยอมกินมันแล้ว"
80000130-49 = "เพราะฉันไม่เหมือนกับคนอื่นๆ..."
80000130-50 = "[ns] \"มะ... ไม่ใช่แบบนั้นเลยนะ!\""
80000130-52 = "[ns] \"ไม่ใช่แบบนั้นสักหน่อย คือว่าตอนนี้ครูทำงานเอกสารอยู่...\""
80000130-53 = "รำคาญใจนิดหน่อยที่ช็อกโกแลตติดมือทุกครั้งที่หยิบคุกกี้งั้นเหรอ?"
80000130-54 = "จริงอยู่ว่าคุกกี้ <ไวท์ เลดี้> อันนี้เคลือบด้วยช็อกโกแลตหวานละมุนลิ้นที่ละลายทันทีที่กินเข้าไป แต่ว่าจนถึงตอนนี้ ฉันยังไม่เคยหยิบแล้วช็อกโกแลตเลอะติดมือเลยนะ"
80000130-58 = "อ่า... งั้นเหรอ เป็นเพราะอุณหภูมิร่างกายฉันสินะ"
80000130-59 = "[s] \"อุณหภูมิร่างกายเหรอ?\""
80000130-60 = "อื้อ อุณหภูมิร่างกายฉันค่อนข้างต่ำเมื่อเทียบกับคนอื่นๆ น่ะ เพราะงั้นเลยมักได้ยินคนพูดบ่อยๆ ว่ามือและเท้าของฉันเย็น..."
80000130-61 = "นึกไม่ถึงเลยว่าเพราะแบบนั้น ฉันถึงได้กินคุกกี้ช็อกโกแลตที่ถ้าคนอื่นจับก็คงละลายง่ายๆ ได้แบบไม่ลำบาก"
80000130-62 = "[s7] \"พิเศษเหมือนมือของปรมาจารย์นักปั้นซูชิสินะ\"\n[s8] \"น่าอิจฉาจังเลยนะ\""
80000130-65 = "ฮุฮุ นั่นสินะ"
80000130-66 = "ที่ผ่านมาฉันไม่เคยคิดเลยว่าการมีอุณหภูมิร่างกายต่ำจะเป็นข้อดี"
80000130-67 = "เพราะถึงจะอยู่ใกล้คนอื่นแค่ไหน แต่ก็ช่วยมอบความอบอุ่นให้ไม่ได้ แถมอ่อนเพลียง่ายในวันที่ร้อนอบอ้าว..."
80000130-68 = "แต่ถึงยังไง หากลองมองให้ดีๆ มันก็อาจจะมีข้อดีอยู่บ้างก็ได้"
80000130-69 = "[s9] \"ครูใช้มือตัวเองไม่ได้แบบนี้... นางุสะช่วยหน่อยได้มั้ย?\"\n[s10] \"นางุสะป้อนให้ครูหน่อยได้มั้ย?\""
80000130-72 = "หะ... ให้ฉันป้อนเหรอ...?"
80000130-73 = "ถ้าคุณครูไม่ว่าอะไร ฉันก็ไม่ติดอะไรหรอกนะ"
80000130-78 = "เอ้า คุณครู หันมาแล้วอ้าปากสิ"
80000130-83 = "[ns11] \"อร่อยจริงๆ ด้วย...\"\n[ns12] \"เหมือนสมองได้รับการเยียวยาเลย...\""
80000130-86 = "ฮุฮุ งั้นเหรอ?"
80000130-87 = "ดูเหมือนฉันจะมีข้อดีที่ตัวเองก็ไม่เคยรู้มาก่อน เพิ่มขึ้นมาอีกข้อหนึ่งแล้วสินะ"
80000130-89 = "(หลังจากนั้นคุณครูก็เหมือนลูกนกตัวเล็กๆ ที่เพลิดเพลินกับการให้นางุสะป้อนคุกกี้ให้)"
