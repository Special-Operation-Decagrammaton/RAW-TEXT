[translation]
901010800350-6 = "荷降ろし場で見つかった物流データの内容をまとめると……。"
901010800350-7 = "カルパッチョ・ファミリー支部の主な収入源は……#n予想通り、港の警備業務でした。"
901010800350-8 = "もちろん、人件費やボスへの上納金を除くと、残りはほとんどないらしいけど。"
901010800350-9 = "でもおかしいのは、ここ数ヶ月、固定支出を減らしながらお金を増やしていることなの。"
901010800350-10 = "食べる予定のないカニを買っておいて、固定費は減らすなんて……一体何が目的なんだろう？"
901010800350-11 = "やっぱり大きな支出が控えてるんじゃない？自分たちの影響力を誇示するためのビッグイベントとか。"
901010800350-12 = "おおかた、予想できるけどねぇ。"
901010800350-13 = "昨日もお店で聞いたけど、カルパッチョ・ファミリーの悩み事はただ一つ。"
901010800350-14 = "彼らがお金を貯めている理由は――"
901010800350-22 = "彼らがお金を貯めている理由は――\n[as2] ボスに支払う上納金を集めるためだ。\n[as3] 限定版の変身ロボットを買うためだ。\n[as1] 港との再契約で委託金を支払うためだ。"
901010800350-23 = "そう。カルパッチョ・ファミリーは港との再契約を控えている。"
901010800350-24 = "正確な金額は把握できてないけど、入札には相当なお金が必要らしい。"
901010800350-25 = "それに公開入札は競売形式だから、予想額より入札費用が高くなる可能性もある。"
901010800350-27 = "なるほど、頑張ってお金を貯めるのも頷けるね。"
901010800350-28 = "たしかに、上納金はかなりの額になっていますが、最初から固定費として組み込まれています。"
901010800350-29 = "そのため、最近お金を貯めるようになったこととは関係ないかと思います。"
901010800350-30 = "ファミリーが貯めているお金は、おそらく別の目的があるはずです。"
901010800350-42 = "変身ロボット……ですか？"
901010800350-43 = "正気で言ってる？というか、変身ロボットを買うのにそんなに必要なの？"
901010800350-44 = "おもちゃなんて、高くても1万円じゃないの？"
901010800350-48 = "……大人の世界を甘く見ちゃダメだよ、FOX3。"
901010800350-52 = "最近の限定おもちゃは、桁が違うからね。ほら見て。"
901010800350-56 = "なにこれ、学園の年間運営資金と変わらないんだけど！？"
901010800350-57 = "このお金なら……新しい銃を数丁……いや、小隊の装備を全部新調できるのに。"
901010800350-58 = "もちろん、この世に高額の嗜好品が無数にあることは認知しています。"
901010800350-59 = "ですが、いくらカルパッチョ・ファミリーでも、公金を嗜好品に使うには色々と制約があると思います。"
901010800350-60 = "他の理由を考えていただけますか。"
