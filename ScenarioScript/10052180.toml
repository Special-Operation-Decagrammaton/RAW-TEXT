[translation]
10052180-1 = "วันแห่งความพิโรธ"
10052180-2 = "[log][FF6666]ครั้นเมื่อได้เห็นท้องนภาและพิภพใหม่[/log]"
10052180-4 = "[log][FF6666]ผืนนภาและพิภพเดิมพลันมลายหายไป[/log]"
10052180-6 = "[log][FF6666]และท้องทะเลก็ไม่หวนคืนมา[/log]"
10052180-13 = "วะ... เหวอ?! นี่มันอะไรกันน่ะ??!!"
10052180-14 = "ว้ายยยยย?! นะ... นี่พวกเรา... กำลังลอยขึ้นไปบนฟ้าเหรอ!!!"
10052180-15 = "พลังงานของดินแดนเหล็กกล้า... ถูกส่งไปยังแท่นบูชาอีกครั้งแล้ว...!"
10052180-18 = "เมื่อข้ามผืนดินนี้ไป จงสร้างแท่นบูชาบนภูเขารกร้าง"
10052180-19 = "เปลวถ่านลุกไหม้จะสัมผัสริมฝีปากของเจ้า และเจ้าจะได้รับการชำระให้บริสุทธิ์"
10052180-20 = "CAST IN THE NAME OF GOD, YE NOT GUILTY ข้ากระทำการนี้ในนามของพระผู้เป็นเจ้า หาได้มีบาปผิดใดไม่"
10052180-25 = "ที่นี่มัน...?"
10052180-26 = "นี่คือ 'แท่นบูชา' สินะ แท่นบูชาที่อยู่บนยอดหอคอยเลย..."
10052180-27 = "เมื่อกี้คุณครูมาอยู่ในที่แบบนี้สินะ..."
10052180-28 = "[s] \"อื้อ ใช่แล้วละ...\""
10052180-30 = "ตะ... ตะตะตะตะ... แต่ทำไมพวกเราถึงถูกลากมา... ยังสถานที่แบบนี้ล่ะคะ?"
10052180-31 = "ฉันเหมือนจะรู้เลยค่ะ นี่คือ... การ 'เชิญ' มายังสถานที่ที่ตัวเองคุ้นเคยที่สุดสินะคะ"
10052180-32 = "ฉันไม่แน่ใจว่าคำพูดนี้เหมาะสมหรือเปล่า แต่แบบนี้คือการสำคัญตนผิดอย่างใหญ่หลวงเลยค่ะ"
10052180-33 = "คะ... คุณโทคิ?! ที่พูดมามันก็จริงอยู่หรอกค่ะ แต่ว่าช่วยดูสถานการณ์ด้วย..."
10052180-38 = "[ns] \"ฮิมาริ! เรียกยานขนส่งมาที่นี่ได้หรือเปล่า?!\""
10052180-39 = "คะ? ค่ะ... ทำได้ค่ะ เราลงจอดไว้แถวนี้ตั้งแต่แรกแล้วด้วยค่ะ"
10052180-40 = "ว่าแต่ทำไมถึง...?"
10052180-41 = "[ns1] \"กลับไปที่ยานขนส่งก่อน! แล้วก็...\"\n[ns2] \"วิเคราะห์คอร์ของผู้เลื่อมใสที่เรารวบรวมได้...!\"\n[ns3] \"แล้วช่วยสนับสนุนข้อมูลจากระยะไกลด้วยนะ!\""
10052180-46 = "[ns] (และถ้าเกิดอะไรขึ้นละก็....!)"
10052180-47 = "แต่จู่ๆ ทำไมถึง...?"
10052180-48 = "(หรือว่า... เผื่อว่าเกิดอะไรขึ้นมา...?!)"
10052180-49 = "(แต่ถ้าเป็นอย่างนั้น แล้วคุณครูล่ะ...?)"
10052180-50 = "..."
10052180-51 = "......"
10052180-52 = "........."
10052180-53 = "เข้าใจแล้วค่ะ... คุณครู"
10052180-54 = "ยูสึ! โมโมอิ! มิโดริ! มาทางนี้ค่ะ!"
10052180-55 = "หืม? พะ... พวกฉันน่ะเหรอ?!"
10052180-56 = "รุ่นพี่ฮิมาริ!? ทำไมถึงให้พวกฉัน...?"
10052180-60 = "ว้ายยย?!"
10052180-64 = "..."
10052180-65 = "[ns] \"ไม่เป็นไรใช่มั้ย?\""
10052180-66 = "ใครกันแน่คะที่ต้องพูดอย่างนั้นน่ะ..."
10052180-67 = "ค่ะ บอกตามตรงว่ารู้สึกเหมือนจะตายให้ได้เลยค่ะ เหมือนฉันต้องเคลื่อนไหวทั้งๆ ที่มีตุ้มน้ำหนัก#nห้าร้อยโลผูกติดอยู่กับแขนขาเลยค่ะ"
10052180-68 = "ในขณะที่เรากำลังเป็นแบบนั้น เจ้านั่นก็อ้างว่าจะรวบรวมพลังงานไปยังร่างที่สองของตัวเอง แล้วไปซ่อนตัวอยู่ในเสาพลังงานบ้าบอนั่น"
10052180-69 = "เจ้านั่นมันอะไรกันคะ ให้ตายสิ เป็นพวกไร้มารยาทที่ถ้าทุกอย่างบนโลกไม่เป็นไปตามใจตัวเอง#nแล้วจะรู้สึกไม่สมใจอยากงั้นเหรอคะ?"
10052180-70 = "คะ... เคย์...? จะไม่เป็นไรจริงๆ เหรอคะ...?"
10052180-71 = "ไม่เป็นไรค่ะ แต่ถึงจะเป็นอะไรขึ้นมาก็ไม่เป็นไรหรอกค่ะ"
10052180-72 = "เจ้านั่นน่ะต้องโดนสักดอก ถ้าไม่อย่างนั้นละก็...!"
10052180-75 = "..."
10052180-79 = "......"
10052180-83 = "........."
10052180-89 = "ต่อให้ต้องตาย! ฉันก็คงไม่หายโกรธแน่!!!"
