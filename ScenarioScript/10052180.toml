[translation]
10052180-1 = "震怒之日"
10052180-2 = "[log][FF6666]我看見新天新地[/log]"
10052180-4 = "[log][FF6666]先前的天地已經過去[/log]"
10052180-6 = "[log][FF6666]海也不再有了[/log]"
10052180-13 = "咦，咦咦！？這是什麼！？！？"
10052180-14 = "呀啊啊啊啊！？#n我，我們現在……被拉到空中了！！！"
10052180-15 = "鋼鐵大陸的能量……又開始向祭壇聚集了……！"
10052180-18 = "若渡過此地，就在荒廢的山頂上築起祭壇。"
10052180-19 = "那炭火將觸及汝之唇，汝便得潔淨。"
10052180-20 = "[ruby=CAST IN THE NAME OF GOD]以神之名行此事[/ruby]，[ruby=YE NOT GUILTY]於此無罪[/ruby]。"
10052180-25 = "這裡是……？"
10052180-26 = "……是「祭壇」呢。#n就在塔的最頂端……"
10052180-27 = "老師剛才就在這種地方啊……"
10052180-28 = "[s] 「嗯，是啊……」"
10052180-30 = "可，可可可可，可是為什麼要把我們拉到這種地方來呢……？"
10052180-31 = "我好像明白了。#n這就像是……將我們「邀請」到他最熟悉的地方吧。"
10052180-32 = "雖然不知道這樣說對不對，他還真是自我意識過剩呢。"
10052180-33 = "季，季同學！？#n雖，雖然是這樣沒錯，不過也要稍微看一下場合……"
10052180-38 = "[ns] 「陽葵！能把運輸船叫來這裡嗎！？」"
10052180-39 = "咦？嗯……這倒不成問題。畢竟船本來就停泊在這附近。"
10052180-40 = "不過為什麼呢……？"
10052180-41 = "[ns1] 「先回到運輸船上！然後……」\n[ns2] 「分析我們收集的預言者核心……！」\n[ns3] 「再麻煩你遠端提供數據支援！」"
10052180-46 = "[ns] （而且，要是真的有個萬一……！）"
10052180-47 = "為何如此突然地……？"
10052180-48 = "（莫非是考量到可能有什麼萬一……！？）"
10052180-49 = "（可是那樣的話，老師他不就……？）"
10052180-50 = "……"
10052180-51 = "…………"
10052180-52 = "………………"
10052180-53 = "……我知道了，老師。"
10052180-54 = "柚子！桃井！綠！請跟我來！"
10052180-55 = "咦？嗯？我，我們嗎！？"
10052180-56 = "陽葵前輩！？為什麼我們要……？"
10052180-60 = "呀啊啊！！"
10052180-64 = "……"
10052180-65 = "[ns] 「你沒事吧？」"
10052180-66 = "……你還有心情擔心別人嗎。"
10052180-67 = "不過老實說，感覺快死了呢。#n就像在手腳上綁了500kg的鉛塊移動一樣。"
10052180-68 = "而且那傢伙還在這種時候，#n說什麼要把能量集中到第二個身體，結果又躲進那個自以為多厲害的能量柱裡了。"
10052180-69 = "那傢伙到底是怎樣啊，真是的。#n難不成是那種世上的一切不繞著自己轉就不甘心的無賴嗎？"
10052180-70 = "K，Kei……？你真的沒事嗎……？"
10052180-71 = "沒事的。雖然很有事但我沒事。"
10052180-72 = "要是不給那傢伙一點顏色瞧瞧……！"
10052180-75 = "……"
10052180-79 = "…………"
10052180-83 = "………………"
10052180-89 = "我就算死了也吞不下這口氣！！！"
