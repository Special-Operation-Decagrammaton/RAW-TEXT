[translation]
90100090-1 = "第9話;手掛かり"
90100090-3 = "シャーレの地下、FOX小隊作戦本部"
90100090-4 = "[ns1] \"みんな大丈夫！？\"\n[ns2] \"ロアに襲われたって聞いたけど……無事？\""
90100090-8 = "んぐっ……！？"
90100090-9 = "（ごくり）"
90100090-10 = "……失礼いたしました。"
90100090-11 = "FOX小隊、約1時間30分前に帰還しています。"
90100090-12 = "[s3] \"あ、ご飯中だったんだね。\"\n[s4] \"ごめん。出直そうか……？\""
90100090-15 = "いえ。乱れたところを見せてしまい……失礼しました。"
90100090-16 = "あ、せっかくですし。"
90100090-17 = "よければ先生もご一緒しませんか？"
90100090-18 = "[s] \"せっかくだけど、夜ごはん食べちゃったんだ。\""
90100090-22 = "[ns] \"それは……油揚げの巾着？\""
90100090-23 = "そう。ニコが作ったの。あ、ちゃんと油揚げは外から持ち込んだから。#n休憩室の冷蔵庫の食材には手を出してないから安心して。"
90100090-24 = "以前、作戦中に知り合った油揚げ工場の方がいらっしゃいまして。#n定期的に質の良い油揚げを送ってくださるので、こうして時々作っているんです。"
90100090-25 = "ま、そういうの抜きにしても、ニコの油揚げ料理ってほんと美味しいんだよね。"
90100090-26 = "ん～……この具はキノコかな？油揚げの中から出てくる旨味がたまんない～"
90100090-27 = "あのさ……さっきから気になってたんだけど、#nなんか私の巾着だけ豆しか入ってなくない？"
90100090-28 = "これ、罰ゲーム？私なにかしたっけ……。"
90100090-29 = "文句言わないで食べなさい。"
90100090-30 = "鬼は外～福は内～ともいうでしょ？"
90100090-31 = "節分の豆は魔除けだけど、そういう意味じゃなくない？"
90100090-32 = "まぁ、味は悪くないけどさ。"
90100090-33 = "[s] \"何があったの？\""
90100090-34 = "説明すると少々長くなるのですが……。"
90100090-36 = "……というわけで、FOX4に影響を及ぼした正体不明の白い個体は、#n白いかかし――通称「くねくね」と同一の存在であると判断できます。"
90100090-41 = "[ns] \"体調は平気？変なところとかない？\""
90100090-42 = "へーきへーき。戻ってすぐ身体検査もしたけど、特に異常なし。"
90100090-43 = "むしろクルミに殴られた頭の方が痛いんだけど。コブできた気がする……。"
90100090-44 = "恩知らずなこと言うじゃない。#nあと数秒遅れてたらどうなってたか分かんないんだからね？"
90100090-45 = "被害者たちみたいにならなかったのは不幸中の幸いだけど……。"
90100090-46 = "でも、起きたら記憶が全部飛んでてさ。#nくねくねの姿も、「青い草原」があった方向も、全然思い出せないみたいなんだよね……。"
90100090-47 = "幸い、FOX3のボディカメラにその時の会話が残っているようだ。"
90100090-52 = "道路の向こう。青空の草原が見える。#n地図には載ってないし……蜃気楼？"
90100090-53 = "草が生い茂ってて……かかしが、1つ……その向こうで笑ってる白い服の人が――"
90100090-55 = "……ねえ、私の声って本当にこんな感じ？聞くたびに、なんか妙な気分。"
90100090-56 = "元からそんな感じだから気にしないで。"
90100090-57 = "それにしても変よね。シロウナギ駅の近くに草原なんてないのに。"
90100090-58 = "蜃気楼だったんじゃないかな。陽炎が立つと、遠くの場所が見えたりするし。"
90100090-59 = "そういうのはアビドス大砂漠みたいに遮るものが何もない場所でしか起きないよ。"
90100090-60 = "ポイントロメオ――第3業務地区は建物で視界が遮られてるから、#nいくら像が歪んだって別の場所を観測できるはずがない。"
90100090-61 = "本来なら見えないはずの場所を見せてくる陽炎……。"
90100090-62 = "とにかく、私たちの相手が「[ruby=ロア]理解を超えた不可解[/ruby]」だってことははっきりしたね。"
90100090-63 = "[s5] \"これ以上手当たり次第に突っ込むのは危ないよ。\"\n[s6] \"この件はシャーレに任せて――\""
90100090-66 = "安全が確保できなければ引くのも、特殊部隊の美徳ではあります。"
90100090-67 = "ですが「兎」ならともかく、「狐」は用心深いだけじゃなく好奇心も旺盛な動物。"
90100090-68 = "新しい手掛かりを目の前にして引くのは……性分が許しません。"
90100090-69 = "[s] \"……新たな手掛かり？\""
90100090-70 = "こちらをご覧いただけますか。"
90100090-71 = "これはFOX4が陽炎に呑まれた際、引き金を引いて排出された薬莢です。"
90100090-72 = "これがあるということは、飛んでいった弾丸もあるはず。#nですが地上に弾痕は一切見つかっていません。"
90100090-73 = "おそらく、あのロアと共に消えたのでしょう。"
90100090-74 = "対物狙撃銃の50口径弾は、決して無視できない物理エネルギーを持ちます。#n良くも悪くも、それに干渉したということは――"
90100090-75 = "相手はただの幻ではなく、物理的に捉えられる「ターゲット」だという意味です。"
90100090-79 = "先生。このターゲットを他部隊へ引き継ぐ前に、#n後続の被害を減らすための威力偵察を、#nもう一度だけ実施させていただけないでしょうか。"
90100090-83 = "[ns7] \"……分かった。次が最後だよ。\"\n[ns8] \"それと、その時は私も同行する。\""
90100090-86 = "許可していただき、感謝します。"
90100090-87 = "相手が幻よりかは気が楽ね。#n形があるなら、爆薬をたっぷり食わせれば何かしら反応するでしょ。"
90100090-88 = "なんだか、前に後輩相手に嫌な思いをした記憶が蘇りそうで……。"
90100090-91 = "で、どこでやるの？またポイントロメオ？"
90100090-92 = "状況を再現するのならば同じ地点が最適だが……。"
90100090-93 = "もしも戦闘を想定するなら、私は別の場所でやるべきだと思う。"
90100090-94 = "どうして？"
90100090-95 = "考えてみて。開けた場所で「他の人には見えない敵」に向かって銃を乱射したら、#n市民から変な目で見られるかもしれない。"
90100090-96 = "それに、昼の商業地区は人通りも多い。下手をすれば銃撃戦に巻き込む危険もある。"
90100090-97 = "さんせー。#nくねくねを処理した後にヴァルキューレの生徒と第2ラウンドをするのは、ねぇ？"
90100090-98 = "……それは困るな。"
90100090-99 = "[s9] \"市民の説得は私に任せて。\"\n[s10] \"後始末は私が責任を――\""
90100090-102 = "いえ。場所を変えます。"
90100090-103 = "作戦であっても、市民への被害は最小限にしなければなりません。"
90100090-104 = "作戦中に市民を危険にさらしたのであれば……それは私たちの責任です。"
90100090-105 = "なにより私たちは、まだ完全に赦免されたわけではありません。"
90100090-106 = "先生が仲裁に入れば、連邦生徒会長の立場が余計にこじれてしまいますから。"
90100090-107 = "[s] \"……分かった。\""
90100090-108 = "陽炎が観測できることを第一条件に場所を選定する。"
90100090-109 = "その上で、なるべく人通りが少なく、温度差による空気の流れが極端な場所が望ましい。"
90100090-110 = "了解。作戦地図で近くを探してみる。"
90100090-111 = "それと、もう1つ。気になることがあって……。"
90100090-112 = "私たちが「くねくね」を認知した状態で、「普通の作戦」が成立するのかな？"
90100090-113 = "どういう意味……？"
90100090-114 = "前の作戦で、くねくねを見たオトギとは会話が成立しなくなっちゃったでしょ？"
90100090-115 = "退避命令すら通らない[ruby=NORDO]通信途絶[/ruby]状態で戦闘継続はできないよ。"
90100090-116 = "じゃあ2人1組で、片方が観測、もう片方が引き金を引くのは？"
90100090-117 = "それもダメだ。取り憑かれることを前提にした作戦は組めない。"
90100090-118 = "場合によっては4人全員が戦闘不能になる可能性だってある。"
90100090-119 = "じゃあ防護ゴーグルをつけるのはどう？"
90100090-120 = "どうだろう。オトギも一応、照準器越しに陽炎を見てたよね。"
90100090-121 = "単にガラスや鏡を挟んでも意味はないと思う。"
90100090-122 = "厄介だな。"
90100090-123 = "こうなったら霊能力者を呼んでくるしかないのかな？"
90100090-129 = "つまりさ、相手を直視せずに形だけ観測できればいいんでしょ？"
90100090-130 = "だったら――これを使えば問題なくない？"
90100090-131 = "…………。"
90100090-133 = "……本当に、これでいけるの？"
90100090-135 = "次回;闇の中へ"
