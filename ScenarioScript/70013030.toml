[translation]
70013030-1 = "一人では咲かない雑草（3）"
70013030-2 = "この日をどれだけ待ちわびてきたことか。"
70013030-3 = "正に運命的な再会だ！お前らにはここで消えてもらう！"
70013030-9 = "くふふ。あんな目に遭ったのに、ま～だ懲りないんだ？"
70013030-10 = "それなら部下たちの前で、あの日の恥ずかし～こと、バラしちゃうよー？"
70013030-11 = "だ、黙れ！これまで見逃してやったのに、恩知らずな奴め……！"
70013030-16 = "ウェブ上に広まるのが怖かったんじゃないんだ。"
70013030-17 = "お望みなら今、やってあげるけど。"
70013030-18 = "く、くぅぅっ……！"
70013030-19 = "おい！徹底的にやっちまえ！"
70013030-31 = "ふふっ、良いわ。最高ね。"
70013030-32 = "過去の敵と再会し、かっこよくやっつける。これもまたハードボイルド……！"
70013030-33 = "みんな、本気で行くわよ！"
70013030-34 = "はい、アル様！あの時の分まで……！！"
70013030-35 = "うわあああ！死んでください！みんな死んでください……！！"
70013030-42 = "ぐっ！い、一旦下がれ！近づくのは危険だ！"
70013030-44 = "くふふっ、ちゃ～んと集まれてえらいねー"
70013030-45 = "さあ、弾ける準備はいいかな～？"
70013030-46 = "……！"
70013030-56 = "ぐあああっ……！"
70013030-58 = "きゃははっ！ポップコーンみたい！"
70013030-59 = "な、なにを手こずってる！早く始末しろ！"
70013030-65 = "……しつこい。"
70013030-66 = "社長。修理代が増えちゃいそうだけど、大丈夫？"
70013030-67 = "構わないわ！私たちが勝てばいいのよ！"
70013030-68 = "歴史は勝者によって作られるものなんだから！"
70013030-69 = "なんか違う気がするけど……。"
70013030-70 = " 社長の考えには賛成……何が何でも勝つ。"
70013030-80 = "ふふっ、そろそろ降参しなさい。これ以上続けても、そっちが損するだけよ。"
70013030-81 = "くふふっ、今回もオモシロ写真を何枚か撮ったら終わってあげる！"
70013030-84 = "く、くそっ……！"
70013030-85 = "何か、何かないのか……！"
70013030-86 = "あれは……？そうだ！"
70013030-94 = " ひ、ひいいいっ！た、助けてください……！"
70013030-95 = "いい加減にしろ！こいつがどうなっても知らないぞ！！"
70013030-103 = "あ、あいつらを無事に返してほしけりゃ……降参するんだ！"
70013030-104 = "卑怯だわ！人質だなんて……！"
70013030-106 = "さあ、銃を置け！これはお遊びじゃないぞ！！"
70013030-113 = "（ううっ……！）"
70013030-114 = "（でもここで銃を置いたら……うちの社員が危ない！）"
70013030-115 = "（だからといって、戦い続けたら人質が……！）"
70013030-116 = "（あああっ……！）"
70013030-123 = "……。"
70013030-124 = "ムツキ、あのキッチンに料理用の小型リフトがある。"
70013030-125 = "ハルカとそっちに行って。"
70013030-126 = "ええーっ？それじゃあ、アルちゃんとカヨコちゃんは？"
70013030-127 = "ひとまず、降参するしかないかな。"
70013030-128 = "社長の性格、知ってるでしょ？人質を放ってはおけない。"
70013030-129 = "どういうことか、[ruby=・   ・   ・   ・   ・]分かるよね[/ruby]？"
70013030-130 = "……一旦下がってから、やっちゃえばいいってこと？オッケー！"
70013030-131 = "ハルカちゃん！行こう！"
70013030-136 = "はい？ど、どこへですか！？"
70013030-137 = "ついてきて！今は、こうするしかないのー！"
70013030-138 = "あ、アル様……！"
70013030-140 = "そ、そうよ！ここは私たちに任せて！"
70013030-141 = "あなたの望みどおり、銃を置いたわ！だからうちの社員は行かせてちょうだい！"
70013030-142 = "こ、こいつら、ふざけた真似を……！"
70013030-143 = "今！早く……！"
70013030-154 = "はあっ、はあっ……。"
70013030-155 = "ハルカちゃん、大丈夫～？"
70013030-156 = "あ、アル様……すみません。本当にすみません。アル様を残して逃げるだなんて……。"
70013030-157 = "や、やっぱり私に生きる資格なんてないんです！今すぐにでも死んだほうがいいんです……！！"
70013030-158 = "何言ってんの！私たちが力を合わせて二人を助けないとじゃん！"
70013030-159 = "あいつは前にも倒したんだから、今回だって大丈夫！"
70013030-160 = "だ、だけどその時私は……。"
70013030-163 = "あ……！見つけたわ！"
70013030-168 = "ひ、ひいいいっ……！"
70013030-169 = "どうして逃げるの？待って！"
70013030-170 = "で、でも、わ、私なんかに関わったら……！"
70013030-171 = "大丈夫よ……！"
70013030-172 = "は、はい……？"
70013030-176 = "心配ないわ！あなたを苦しめてた連中は私が懲らしめたから！"
70013030-177 = "マフィアたちも、おとなしくなるはずよ。"
70013030-179 = "ど、どうやって……。"
70013030-184 = "くふふっ、とっ捕まえて恥ずかし～写真を撮ってやったんだー！"
70013030-185 = "誓約書まで書かせたから、安心して。"
70013030-186 = "ほら！あんたも出てきて謝りなさーい！"
70013030-192 = "く、ううっ……！"
70013030-193 = "す、すみませんでした！二度とハルカ様の前に現れません！！"
70013030-194 = "こ、これからは深く反省しながら生きていきます……！！"
70013030-196 = "あ……ああっ……。"
70013030-197 = "ふふふっ、どう？私たちの実力は。"
70013030-198 = "こ、こんなことをタダでしていただけるはずは……。"
70013030-199 = "わ、私は皆さんに何をしたらよろしいでしょうか！？"
70013030-200 = "お、お金ですか？で、でも今は……！"
70013030-201 = "報酬なんていらないわ。そんなの、ハードボイルドじゃないでしょう？"
70013030-202 = "ハード……ボイルド？"
70013030-203 = "そう。一日一悪！冷酷無比！ハードボイルドなアウトロー！これがうちのモットーよ。"
70013030-204 = "あなたを助けたのも、その一環ってこと。報酬のためではないの。"
70013030-205 = "だから……立ちなさい。"
70013030-206 = "あなたはもう、自由なのよ！"
70013030-207 = "……！！"
70013030-209 = "あの時はただ……助けてもらうだけでした。"
70013030-210 = "だからアル様に私の全てを捧げようと決めたのに……。"
70013030-211 = "アル様のためなら……何でもすると誓ったのに……。"
70013030-216 = "そうそう！だから今でしょ～！"
70013030-217 = "何としてでも！二人でアルちゃんとカヨコちゃんを助けようよ！"
70013030-221 = "……。"
70013030-222 = "……そうですね。"
70013030-223 = "私がお助けいたします、アル様。"
70013030-224 = "あの時、アル様が……私を助けてくださったように……！"
