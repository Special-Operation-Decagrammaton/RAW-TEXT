901010600440-30 = "#Q;쿠루미;이렇게 된 이상, 미야구치가 자의로 항구를 벗어날 수 있는 방법은……\n[as2] 정문을 통해 빠져나갔다.\n[as3] 바다를 헤엄쳐 빠져나갔다.\n[as1] 통근 열차를 타고 빠져나갔다."
901010600440-31 = "5;쿠루미;01;확실히 이른 새벽에 차고지로 회차하는 통근 열차를 탔다면 다른 사람들의 눈에 띄지 않게 항구를 벗어나는 게 가능했겠네.\n#5;em;…\n#5;m3"
901010600440-32 = "5;쿠루미;02;승강장의 관리는 하이랜더 학원에서 하고 있으니 카르파초 패밀리의 눈에도 띄지 않았을 테고."
901010600440-33 = "5;쿠루미;12;안 그래도 승강장의 승차 기록을 확인해달라고 총학생회의 담당자에게 연락을 해두었는데—\n#5;em;[한숨]"
901010600440-34 = "#all;hide"
901010600440-35 = "3;유키노;99;……그건 어려울 것 같습니다.\n#3;em;…"
901010600440-36 = "3;유키노;02;카네사키 항구의 정문은 미야구치가 빚을 지고 있는 카르파초 패밀리가 지키고 있으니까요."
901010600440-37 = "3;유키노;01;다른 조직이라면 몰라도, 카르파초 패밀리가 채무자를 정문으로 순순히 보내주지는 않았을 것 같습니다."
