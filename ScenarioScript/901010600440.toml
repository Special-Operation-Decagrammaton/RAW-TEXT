[translation]
901010600440-7 = "鐘崎港に出入りできるルートをまとめると……。"
901010600440-8 = "現在「公式に確認された」出入口は、カルパッチョ・ファミリーが立っている正門だけ。"
901010600440-9 = "公式に？じゃあ、他にも出入口があるってこと？"
901010600440-10 = "一応港だからね。船に乗って入ることはできるよ。"
901010600440-11 = "でも鐘崎港は客船が泊まるような港じゃない。"
901010600440-13 = "密輸品みたいに、貨物に隠れて貨物船に乗って出ることはできても、危ないからおすすめできないみたい。"
901010600440-14 = "それ、誰が言ったの？"
901010600440-15 = "午前、港で会った作業員だよ。"
901010600440-16 = "昔、とある泥棒が港で貴重品を盗んで、貨物船に隠れていたらしいけど……。"
901010600440-17 = "貨物船の航海が長すぎて、栄養失調で発見されたんだって。"
901010600440-18 = "うわぁ……ここ最近聞いた怪談の中で一番鳥肌立つかも。"
901010600440-19 = "もう一つの手段として、港の駅を利用する方法もあったよ。"
901010600440-20 = "そこも旅客列車が停車しない貨物駅だけど、早朝だけ港で働く労働者のために通勤列車を走らせてるんだって。"
901010600440-21 = "車両基地に繋がっている路線で、普通の人はほとんど乗車しないけど……港を急いで出る必要があったら、こっちのルートも考えられるね。"
901010600440-22 = "ミヤグチが港を抜け出す方法は……。"
901010600440-30 = "ミヤグチが港を抜け出す方法は……。\n[as2] 正門を通って逃げた。\n[as3] 海を泳いで逃げた。\n[as1] 通勤列車に乗って逃げた。"
901010600440-31 = "たしかに、早朝の車両基地行きの通勤列車に乗ってたら、他の人にバレることなく港を抜け出すことができるわね。"
901010600440-32 = "駅の管理はハイランダーがやっているから、カルパッチョ・ファミリーに見つかることもないし。"
901010600440-33 = "ちょうど、連邦生徒会の担当者に乗車記録の確認を頼んでいたんだけど――"
901010600440-35 = "……それは難しいと思います。"
901010600440-36 = "鐘崎港の正門は、ミヤグチが借金をしているカルパッチョ・ファミリーが警備を担当しています。"
901010600440-37 = "他の組織ならまだしも、カルパッチョ・ファミリーが債務者を通すようなことはしないと思います。"
901010600440-46 = "真っ暗な夜の海を泳いで逃げた……ちょっと危険すぎない？"
901010600440-47 = "他に、もっと安全に港を出られる手段があると思うんだけど。"
901010600440-60 = "あ、交通室から返事きたわよ。"
901010600440-64 = "なんて返ってきたの？ミヤグチは列車に乗ってたの？"
901010600440-65 = "……うん。該当の時間にミヤグチは切符を発券して、港を出ていたわ。"
901010600440-66 = "なんだ、化け蟹の襲撃だの何だの色々言ってたけど、実際はこっそり逃げてただけじゃん。"
901010600440-67 = "事故にでも遭ったのかと心配してたのに。"
901010600440-69 = "でも、実際に失踪者はいなかったってことだから、良かったんじゃないかな。"
