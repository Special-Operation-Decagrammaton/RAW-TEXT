901010600440-6 = "3;니코;99\n#3;a\n#wait;1000"
901010600440-7 = "3;니코;02;카네사키 항구로 드나들 수 있는 통로에 대해 정리하자면……\n#3;em;[반응]"
901010600440-8 = "3;니코;01;현재 '공식적으로 확인된' 항구를 출입할 수 있는 유일한 통로는, 카르파초 패밀리가 지키고 있는 정문 도로뿐이었어."
901010600440-9 = "5;쿠루미;02;공식적으로? 그럼 또 다른 출입 통로가 있단 말이야?\n#5;al\n#3;m1"
901010600440-10 = "3;니코;02;일단은 항구니까, 배를 타고 들어오는 건 가능하지."
901010600440-11 = "3;니코;00;다만 카네사키 항구는 여객항이 아니니까, 평범한 여객선은 기항하지 않아."
901010600440-12 = "#all;hide"
901010600440-13 = "3;오토기;02;밀수품처럼 화물에 섞여 들어가 화물선을 타고 빠져나가는 수도 있다고 하지만, 그 방법은 위험해서 추천하지 않는다 하더라고.\n#3;em;…"
901010600440-14 = "3;쿠루미;02;누가 그런 걸 추천하는데?\n#3;em;[?]"
901010600440-15 = "3;오토기;03;오전에 항만에서 만난 인부가 알려줬어."
901010600440-16 = "3;오토기;99;옛날에 항구에 숨어 들어온 도둑이 귀중품을 훔친 뒤에 화물선에 숨어 들어갔다가……"
901010600440-17 = "3;오토기;02;화물선이 몇 개월 동안 항해를 계속하는 바람에 쫄쫄 굶어서, 영양실조에 걸린 상태로 발견된 적이 있다 하더라고."
901010600440-18 = "3;쿠루미;06;우와…… 근래에 들은 괴담 중에 제일 소름 끼치는데.\n#3;em;[땀]"
901010600440-19 = "3;니코;02;여하튼, 그 외에 다른 수단으로는 항구의 철도 승강장을 이용하는 방법이 있어.\n#3;em;[반응]"
901010600440-20 = "3;니코;10;이쪽도 여객 열차가 다니지 않는 화물역이지만, 이른 새벽에 한해서는 항만 노동자들을 위해 일시적으로 통근 열차를 운영한다나 봐."
901010600440-21 = "3;니코;05;열차 차고지와 연결된 노선이라, 평범한 승객은 거의 이용하지 않지만 항구에서 급하게 나가야 할 일이 있다면 이쪽도 고려해 볼 순 있겠지."
901010600440-22 = "3;쿠루미;99;이렇게 된 이상, 미야구치가 자의로 항구를 벗어날 수 있는 방법은……\n#3;em;[한숨]\n#3;h"
