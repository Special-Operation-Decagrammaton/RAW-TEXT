[translation]
22050-1 = "ตอนที่ 5;อาริสึและเหล่าผู้ถูกชี้นำ~ 2"
22050-2 = "จัตุรัสมิลเลเนียมที่ 19"
22050-3 = "(จากนั้นครูก็ออกไปผจญภัยกับอาริสึต่อ)"
22050-4 = "ถึงเขตผจญภัยต่อไปแล้วค่ะ!"
22050-11 = "อาริสึมีลางสังหรณ์ว่าไอเทมใหม่อยู่ในเขตผจญภัยนี้ค่ะ!"
22050-12 = "ถ้างั้นก็ขอเริ่มสำรวจ..."
22050-14 = "อ๊ะ อาริสึจังนี่นา"
22050-21 = "วันนี้มาทำอะไรเหรอ? หรือว่ามาทำภารกิจนักรบอีก?"
22050-22 = "ไม่ใช่ภารกิจนักรบ แต่เป็นภารกิจผู้กล้าค่ะ! วันนี้อาริสึคือผู้กล้าฝึกหัดพิเศษค่ะ!"
22050-23 = "แล้ว... มันไม่ใช่อย่างเดียวกันหรอกเหรอ...?"
22050-24 = "จะว่าไป คนข้างๆ คือใครเหรอ? เป็นผู้ใหญ่ซะด้วย?"
22050-25 = "คุณครูคือคุณครูค่ะ เป็นมาสคอตของปาร์ตี้ผู้กล้าอีกทีค่ะ"
22050-26 = "[s1] \"ครูคือครูจากชาเล่ต์น่ะ\"\n[s2] \"ครูคือมาสคอตของปาร์ตี้ผู้กล้าน่ะ\""
22050-29 = "คุณครู... คนที่อยู่ที่ชาเล่ต์น่ะเหรอ...?"
22050-30 = "ฉันไม่เคยเจอมาก่อนเลย ดูเป็นคนที่มีกลิ่นอายแปลกๆ อยู่นะ พอจะเข้าใจแล้วว่าทำไมถึงได้เป็น#nมาสคอตของอาริสึ..."
22050-31 = "งั้นเหรอ...?"
22050-32 = "เอาเถอะ งั้นวันนี้ก็สู้ๆ นะอาริสึจัง~"
22050-33 = "ใช่ค่ะ! อาริสึได้รับกำลังใจจนพลังเต็มหลอดเลยค่ะ!"
22050-34 = "(บางทีอาริสึก็ได้กำลังใจจากนักเรียนมิลเลเนียมที่บังเอิญได้เจอกัน)"
22050-36 = "ห้องเรียนใหญ่ที่ 11 ของมิลเลเนียม"
22050-37 = "หืม? นั่นอาริสึไม่ใช่เหรอ?"
22050-38 = "ว่าไงอาริสึ~ วันนี้ก็มาทำเควสอีกแล้วเหรอ?"
22050-39 = "ใช่ค่ะ วันนี้อาริสึออกมาผจญภัยเพื่อทำเควสที่ยูสึมอบให้ค่ะ"
22050-40 = "อืม~ งั้นเหรอ?"
22050-41 = "งั้นช่วยเอานี่ไปไว้ที่ห้องเรียนอาคารข้างๆ ให้หน่อยได้ไหม?"
22050-42 = "เฮือก! นี่เป็นเควสฉุกเฉินอย่างนั้นเหรอคะ?"
22050-43 = "อื้ม ถ้าทำสำเร็จจะได้รางวัลเป็นมองบลังค์จากร้านของหวานชื่อดังในทรีนิตี้เลยนะ!"
22050-44 = "อะไรเนี่ย! มีแบบนี้ด้วยเหรอ?!"
22050-45 = "ถ้างั้น ถ้าทำเควสสำเร็จ ฉันจะให้ช็อกโกบอลที่ซื้อมาจากร้านสะดวกซื้อเลย!"
22050-46 = "ได้ค่ะ! การทำเควสเป็นความสามารถพิเศษของอาริสึอยู่แล้วค่ะ! วางใจอาริสึได้เลยค่ะ!"
22050-47 = "(และบางทีอาริสึก็ได้ขนมเป็นรางวัลจากการทำเควส)"
22050-49 = "หืม?! เจอเงาคุ้นๆ ของใครบางคนในโรงเรียนด้วยละค่ะ!"
22050-56 = "อ้อ คุณครูกับอาริสึเองเหรอ?"
22050-57 = "สวัสดี~"
22050-59 = "สะ... สวัสดีค่ะ!"
22050-63 = "[ns] \"สวัสดี ชมรมวิศวกรรมมาทำอะไรที่นี่เหรอ?\""
22050-64 = "โอ้! คุณครูสนใจตารางกิจกรรมชมรมของพวกเราสินะคะ!"
22050-65 = "งั้นก็ดีค่ะ! ฉันจะอธิบายให้ฟังเองค่ะ! ชมรมวิศวกรรมตื่นนอนกันตั้งแต่ 7 โมงเช้า แล้วก็..."
22050-67 = "(โคโทริอธิบายยืดยาวไปเรื่อย)"
22050-69 = "...จนมาถึงที่นี่ค่ะ! เกิดเรื่องน่าทึ่งขึ้นซ้ำแล้วซ้ำเล่าเลยค่ะ ว่าไหมคะฮิบิกิ?! รุ่นพี่อุทาฮะ?!"
22050-70 = "เอ่อ... อื้ม ก็ประมาณนั้นน่ะ"
22050-71 = "...ก็อาจจะนะ?"
22050-72 = "สรุปก็คือ พวกเราออกมาหาอุปกรณ์ของชมรมวิศวกรรมที่ตอนนี้มีไม่พอน่ะ"
22050-73 = "อืมๆ... การพยายามสร้างสรรพาวุธใหม่ทุกวันอย่างไม่หยุดหย่อน..."
22050-74 = "สมกับที่เป็นช่างตีเหล็กผู้ยิ่งใหญ่ที่สร้างดาบแห่งแสงเลยค่ะ! อาริสึประทับใจมากค่ะ!"
22050-75 = "สรรพาวุธ...?"
22050-76 = "ถึงจะไม่ค่อยเข้าใจเท่าไร แต่จะคิดว่ามันเป็นคำชมก็แล้วกัน"
22050-77 = "ช่างตีเหล็กงั้นเหรอ... ได้ฟังศัพท์โบราณตามแบบฉบับของอาริสึจังอีกแล้วนะคะเนี่ย!"
22050-78 = "แต่ถ้ามองในแง่กว้างๆ คำนั้นก็ไม่ผิดหรอกนะ"
22050-79 = "อาวุธของอาริสึเป็นผลงานแห่งความพยายามที่ชมรมวิศวกรรมช่วยกันทำเลยนี่นา"
22050-83 = "จะว่าไป อาริสึ ช่วงนี้เรลกัน..."
22050-88 = "ไม่สิ ดาบแห่งแสงเป็นยังไงบ้าง? ยังใช้ได้ดีอยู่ไหม?"
22050-92 = "ค่ะ! ดาบแห่งแสงเป็นสมบัติล้ำค่าของอาริสึเลยค่ะ! เป็นสัญลักษณ์ของผู้กล้าด้วยค่ะ!"
22050-93 = "อาริสึใช้อย่างทะนุถนอมอยู่ตลอดเลยค่ะ!"
22050-94 = "[s] \"อืม เป็นของล้ำค่าของอาริสึที่ไม่มีอะไรมาแทนที่ได้เลยละ\""
22050-96 = "[ns] \"...ถึงบางทีเธอจะใช้มันก่อปัญหาทำให้เพดานทะลุก็เถอะ\""
22050-97 = "คะ? ปัญหางั้นเหรอคะ?"
22050-98 = "เรื่องแบบนี้เกิดขึ้นในมิลเลเนียมได้บ่อยๆ อยู่แล้ว"
22050-100 = "การเสียสละเป็นบ่อเกิดแห่งการพัฒนาเทคโนโลยีน่ะ"
22050-101 = "[s] \"จริงด้วย นี่คงเป็นเรื่องทั่วไปของชมรมวิศวกรรมสินะ?!\""
22050-102 = "อื้ม ก็จริงอยู่..."
22050-103 = "ถ้าใช้งานมันดีๆ พวกเราก็จะดีใจมากเลย"
22050-104 = "ต่อไปก็ฝากด้วยล่ะ อาริสึ"
22050-106 = "ค่ะ!"
22050-108 = "(ระหว่างที่ออกผจญภัย อาริสึก็มักจะได้กำลังใจจากผู้คนมากมาย)"
22050-109 = "(การผจญภัยของคุณครูกับอาริสึยังคงดำเนินต่อไป)"
22050-118 = "(และพวกเขาก็ได้พบกับ...)"
22050-120 = "เจอตัวสักที เด็กน้อย"
22050-125 = "คะ... คุณเมดป่าเถื่อนตัวเล็กๆ โผล่ออกมาแล้วค่ะ! (ตกใจ)"
22050-126 = "หา? ยัยเด็กนี่! เรียกใครว่าเมดป่าเถื่อนตัวเล็กๆ กันห้ะ?!"
22050-127 = "[s] \"อ้าว? เนรุ?\""
22050-128 = "อะไรเนี่ย ครูก็อยู่ด้วยเหรอ?"
22050-129 = "งั้นก็ดีเลย ไปกับฉันหน่อยสิ ทั้งสองคนนั่นแหละ"
22050-130 = "คะ... คะ?! แต่อาริสึยังผจญภัยไม่เสร็จ..."
22050-132 = "ไม่ต้องมาพูดอะไรไร้สาระ เอาละ ไปกันเลย"
22050-136 = "งะ... แงงงง....?!"
22050-137 = "อาริสึถูกคุณเมดตัวเล็กจับตัวได้แล้วค่ะ! การผจญภัยของอาริสึจะจบลงแค่นี้หรือเปล่าคะ?!"
22050-138 = "ถ้าจบแย่ๆ แบบนี้ละก็ อยากให้มีคัทซีนของกิจกรรมจัง!"
22050-139 = "เฮ้อ พูดอะไรไม่เห็นจะรู้เรื่อง..."
22050-141 = "อีกอย่าง เรียกฉันว่าเมดตัวเล็กงั้นเรอะ! อย่ามาเรียกฉันว่าเมดตัวเล็กนะ!"
22050-142 = "... ถ้างั้นอาริสึต้องเรียกว่าอะไรดีคะ?"
22050-143 = "รุ่นพี่ไง! รุ่นพี่!"
22050-144 = "เรียกว่ารุ่นพี่สิยัยบ๊องเอ๊ย!"
22050-145 = "อืม ค่ะ เข้าใจแล้วค่ะ!"
22050-146 = "รุ่นพี่เนรุตัวเล็ก"
22050-147 = "ไม่ต้องเติมคำว่าตัวเล็กมาด้วยว้อย!"
22050-148 = "[s] \"เดี๋ยวก่อน เนรุ พอดีพวกเรากำลังยุ่งกับการผจญภัยผู้กล้า...\""
22050-149 = "หืม? พูดอะไรของครูน่ะ?"
22050-150 = "ฉันมีเรื่องที่สำคัญกว่าผู้กล้าและการผจญภัยนะ!"
22050-151 = "[s] \"เรื่องที่สำคัญกว่า...?\""
22050-152 = "อ้อ? ก็..."
22050-156 = "ร้านเกมตู้ มิลเลเนียม"
22050-163 = "ฮึ่ยยยย!! แพ้อีกแล้ว! อ้ากกกก!! หัวร้อนชะมัด! เทคนิคเมื่อกี้มันอะไรกัน?!"
22050-164 = "โกงกันหรือเปล่าเนี่ย?!"
22050-165 = "ยูสึเคยบอกว่าการโกงก็เป็นส่วนหนึ่งของการเล่นเกมค่ะ!"
22050-166 = "ว่าไงนะ! ยิ่งเอามาพูดอย่างมั่นใจแบบนี้ยิ่งน่าหงุดหงิด!"
22050-167 = "งะ... แงงงง....?!"
22050-168 = "[s] \"เรื่องสำคัญกว่าที่ว่า... คือมาเล่นเกมกันในร้านเกมตู้งั้นเหรอ?\""
22050-169 = "หืม?"
22050-170 = "ก็แหงอยู่แล้ว วันนี้ฉันจะเอาคืนยัยเด็กบ๊องนี่ให้ได้เลยน่ะสิ!"
22050-171 = "ถึงครั้งที่แล้วฉันจะแพ้ยับเยินเพราะประมาทก็เถอะ..."
22050-172 = "แต่ครั้งนี้มันจะไม่เหมือนเดิม! ฉันศึกษาการทำคอมโบมาแล้ว! เธอต้องชดใช้ที่ทำให้ฉันเสียใจ!"
22050-174 = "อาริสึจำได้ว่า... อาทิตย์ที่แล้วรุ่นพี่เนรุก็พูดแบบนี้นะคะ"
22050-176 = "ว่าไงนะ?!"
22050-177 = "(ถึงแม้จะเถียงกันแบบนั้น แต่ทั้งสองคนก็ถูกเกมดูดวิญญาณไปอย่างรวดเร็ว)"
22050-194 = "[ns] \"เอ่อ... ทั้งสองคนมาเล่นเกมกันแบบนี้บ่อยๆ เหรอ?\""
22050-195 = "ค่ะ... รุ่นพี่เนรุส่งคำท้าดวลมาบ่อยๆ อาริสึก็เลยต้องออกมารับคำท้าอย่างหลีกเลี่ยงไม่ได้ค่ะ"
22050-196 = "พะ... พูดอะไรน่ะ! ใครมาได้ยินเข้าคงคิดว่าฉันบังคับลากตัวเธอออกมานะ!"
22050-197 = "[s] \"หืม? แล้วมันไม่ใช่เหรอ?\""
22050-198 = "ไม่ใช่สักหน่อย!!"
22050-199 = "ฉันก็แค่สงสัยว่า 'เกม' ที่เด็กน้อยคนนี้กับสมาชิกชมรมพัฒนาเกมคนอื่นเล่นมันเป็นแบบไหนกัน"
22050-200 = "ทำไปทำมาก็ได้มาแข่งกันตาสองตาแบบนี้นี่แหละ!"
22050-201 = "แต่ที่อาริสึจำได้ อาริสึแข่งเกมนี้กับรุ่นพี่เนรุมาหลายรอบแล้วนะคะ ถ้านับวันนี้ด้วยก็รอบที่ 50..."
22050-202 = "...พอเล่นไปเรื่อยๆ มันก็เพลินไปหน่อยน่ะ!"
22050-203 = "[s] \"เนรุ... ชอบเล่นเกมมากกว่าที่เห็นนะเนี่ย\""
22050-204 = "ค่ะ จากประสบการณ์ของอาริสึแล้ว รุ่นพี่เนรุชอบเล่นเกมมากเลยค่ะ"
22050-205 = "รุ่นพี่เนรุชอบมาที่ชมรมพัฒนาเกมบ่อยๆ บางทีก็มาเล่นเพลย์สเตชันของมิโดริด้วยค่ะ"
22050-206 = "ขอบอกเลยว่าเล่นมา 50 รอบก็ชนะ 50 รอบ ใช่แล้วค่ะ อาริสึชนะติดต่อกันค่ะ"
22050-208 = "รุ่นพี่เนรุยังต้องฝึกเล่นเกมอีกเยอะค่ะ!! อย่างเมื่อกี้ก็ด้วย ถ้าทำคอมโบได้แบบนี้ละก็..."
22050-209 = "[s] \"ชอบเล่นเกมจริงด้วยนะเนี่ย...\""
22050-210 = "ไม่ใช่! อ้ากกก! ไม่รู้ด้วยแล้ว!"
22050-211 = "ช่างเถอะ! เอาอีกตาหนึ่ง! จัดมาอีกรอบ!"
22050-212 = "คะ... คะ? เล่นอีกตาหนึ่งเหรอคะ...?"
22050-213 = "ไม่สิ! ไม่ใช่แค่อีกตาเดียว เล่นไปจนกว่าฉันจะชนะก็แล้วกัน! แล้วก็บอกฉันด้วยนะว่าต้องทำคอมโบยังไง"
22050-214 = "แย่แล้วค่ะ... จนกว่ารุ่นพี่เนรุจะชนะเลยเหรอคะ... แบบนี้อาริสึก็กลับชมรมไม่ได้จนกว่าจะค่ำเลยสิคะ..."
22050-215 = "เธอก็ช่วยสอนให้ฉันชนะก็ได้ไม่ใช่รึไงเล่า?!"
22050-221 = "(และสงครามระหว่างเนรุกับอาริสึก็เริ่มขึ้นอีกครั้ง)"
22050-222 = "อึก?! นะ... นี่มัน!"
22050-233 = "รุ่นพี่เนรุ...! กดปุ่มมั่วๆ ไม่ได้ทำให้เกิดคอมโบนะคะ! ต้องกดทีละปุ่มอย่างรอบคอบแบบนี้สินะ...!"
22050-234 = "โว้ย รู้แล้วน่า!"
22050-241 = "(ถึงจะผูกมิตรกันด้วยการเล่นเกม แต่พอเวลาผ่านไปเรื่อยๆ...)"
22050-246 = "งะ... แงงงง.... คอมโบของรุ่นพี่เนรุไม่ต่อเนื่องเลยค่ะ...!"
22050-247 = "แบบนี้เกจความหิวของอาริสึกับคุณครูได้ลดลงเหลือศูนย์แน่เลยค่ะ..."
22050-248 = "ชิ! เอาใหม่! ตั้งแต่แรกเลย! เริ่มใหม่แต่แรกเลย!"
22050-249 = "(ทั้งคู่ก็ทั้งเถียงกัน ทั้งบ่นอู้อี้ใส่กัน แล้วก็หัวร้อนใส่กันด้วย...)"
22050-265 = "ฮึ่ม... ถ้ายิงอีกสักหน่อย ก็คงทำคอมโบได้อย่างงดงามแล้วเชียว"
22050-266 = "........ (ทำตัวไม่ถูก)"
22050-271 = "อ้าาาาก...! ดีละ! เอาอีกตาหนึ่ง! ยังไหวใช่มั้ย?!"
22050-272 = "คะ... ค่ะ!"
22050-273 = "(แต่ทั้งคู่ก็ใช้เกมเป็นสื่อกลางเพื่อสร้างความเข้าใจและเพิ่มความสนิทสนมกัน...)"
22050-293 = "[ns] \"อ่า...\""
22050-294 = "......"
22050-295 = "นี่แน่ะ! เป็นไง! เป็นยังไงล่ะ! คอยดูคอมโบลับสุดยอดของฉันได้เลย!"
22050-296 = "คะ... คือ... ทางนั้น..."
22050-297 = "นี่เด็กน้อย บอกว่าอย่าละสายตาไปจากจอไง!"
22050-298 = "ถ้าประมาทแม้แต่นิดเดียว ตัวละครของเธอจะโดนคอมโบสุดเจ๋งของฉัน..."
22050-299 = "ก็คิดอยู่ว่าหนีงานแล้วโดดเรียนไปอยู่ที่ไหน..."
22050-300 = "มาสิงอยู่ที่นี่เองเหรอคะหัวหน้า?"
22050-302 = "ว้าก?! อะ... อาคาเนะ?! มาตั้งแต่เมื่อไรน่ะ?!"
22050-303 = "ฉันบอกไว้แล้วใช่ไหมคะ?"
22050-304 = "ว่าช่วงบ่ายวันนี้จะมีภารกิจจากประธาน และให้หัวหน้าเตรียมพร้อมไว้ให้ดี"
22050-305 = "เอ่อ..."
22050-306 = "[s] \"ลืมไปเลยละสิ...\""
22050-307 = "ไม่... ไม่ได้ลืมสักหน่อย! ก็ว่าจะไปอยู่พอดี! ขอแค่ชนะตานี้ก่อน..."
22050-318 = "หืม?!"
22050-319 = "อาริสึชนะใสๆ อีกแล้วค่ะ!"
22050-320 = "ดะ... เดี๋ยวก่อน! ขอเวลานอก! นี่มันผิดกฎนะ!"
22050-321 = "โลกแห่งการแข่งขันมันเหี้ยมโหดแบบนี้แหละค่ะ และโลกของเกมก็คือการคว้าชัยชนะด้วยสมาธิที่เป็นเลิศ#nอยู่เสมอค่ะ"
22050-322 = "หรือรุ่นพี่เนรุจะขอให้การแข่งขันเป็นโมฆะ เพราะตัวเองละสายตาไปจากการแข่งขันจนแพ้คะ?"
22050-323 = "ฮึ่ย... ยัยเด็กคนนี้... ทำคนเดือดปุดๆ ด้วยคำพูดได้ด้วยแฮะ..."
22050-324 = "ก็ได้ ตาเมื่อกี้ฉันจะยอมให้...!"
22050-326 = "เราสัญญากันแล้วไม่ใช่เหรอคะว่าจะเล่นเกมแค่วันละ 1 ชั่วโมง?"
22050-327 = "เอาละ ไปทำภารกิจได้แล้วค่ะหัวหน้า ถ้ายังโดดเรียนทั้งยังโดดงานอีก ฉันไม่ยอมให้แล้วนะคะ"
22050-328 = "อ๊ะ ดะ... เดี๋ยวก่อน! อาคาเนะ! ขออีกนิด..."
22050-335 = "[ns] (นี่เราก็โดดงานมาเจอนักเรียน... ที่โดดเรียนอีกทีรึเปล่านะ...)"
22050-337 = "อุ๊ย คุณครู? นี่ฉันมาเสียมารยาทหรือเปล่าคะ?"
22050-338 = "[s] \"ไม่หรอก...\""
22050-340 = "อ้ากกกก!! ฝากไว้ก่อนเถอะ! ครั้งหน้าฉันจะเอาชนะให้ได้เลย!"
22050-341 = "ค่า ค่า~ รู้แล้วค่า~ รีบไปเถอะค่ะ"
22050-346 = "คุณครู อาริสึ พวกฉันขอตัวก่อนนะคะ"
22050-358 = "(พอคุณครูกับอาริสึออกมาจากร้านเกมตู้ ก็พบว่าเวลาล่วงเลยมาถึงตอนเย็นแล้ว)"
22050-359 = "[s] \"อาริสึ จะว่าไป...\""
22050-360 = "คะ?"
22050-361 = "[s3] \"อาริสึไม่ได้กลัวเนรุหรอกเหรอ?\"\n[s4] \"ครูคิดว่าอาริสึกลัวเนรุจนเลี่ยงที่จะเจอเสียอีก...\""
22050-369 = "(วันนี้เห็นอาริสึเล่นเกมกับเนรุอย่างสนุกสนานเลย)"
22050-370 = "(หรือเราจะเข้าใจผิดไปเอง แต่ไหนๆ ก็คิดแบบนั้นแล้ว ถามให้คลายความสงสัยไปเลยแล้วกัน)"
22050-371 = "อ่า... คือว่า..."
22050-372 = "กับรุ่นพี่เนรุก็เคยเป็นศัตรูกันอยู่หรอกค่ะ... แต่ตอนนี้พัฒนามาเป็นฝ่ายเดียวกันแล้ว..."
22050-373 = "โมโมอิก็เคยพูดไว้ค่ะว่ารุ่นพี่เนรุจะอ่อนข้อลง"
22050-374 = "อาริสึก็เลยไม่กลัวรุ่นพี่เนรุอีกต่อไปแล้วค่ะ"
22050-375 = "[s] \"โมโมอิพูดแบบนั้นอีกแล้วเหรอ... ถ้าเนรุได้ยินจะโกรธเอานะ\""
22050-376 = "ตะ... แต่เอาเข้าจริง อาริสึก็ยังกลัวๆ อยู่ค่ะเวลาเห็นชุดเมดของรุ่นพี่เขา..."
22050-377 = "แต่ยังไงตอนนี้..."
22050-383 = "รุ่นพี่เนรุก็เป็นสหายอีกคนค่ะ!"
22050-384 = "สหายของอาริสึ และสหายเล่นเกมของทุกคน..."
22050-385 = "ถึงอาริสึจะไม่ได้ผจญภัยเพราะมัวแต่เล่นเกมกับรุ่นพี่เนรุก็เถอะค่ะ..."
22050-386 = "วันนี้อุตส่าห์ได้มาผจญภัยกับคุณครูแล้วเชียว..."
22050-387 = "[s] (อ๋อ เพราะเป็นแบบนี้ก็เลยหลบหน้าเนรุสินะ...)"
22050-389 = "[ns] \"เอาเถอะ วันนี้ครูก็สนุกกับการผจญภัยมากเลย\""
22050-390 = "!!"
22050-391 = "อย่างนั้นเหรอคะ?"
22050-392 = "[s] \"แล้วอาริสึล่ะ? การผจญภัยวันนี้เป็นยังไงบ้าง?\""
22050-394 = "(หลังจากเดินเที่ยวในมิลเลเนียมกับอาริสึมาทั้งวัน คุณครูก็ได้รู้ว่าอาริสึใช้ชีวิตในโรงเรียนอย่างไร)"
22050-402 = "(อาริสึได้เจอนักเรียนหลายต่อหลายคน)"
22050-408 = "(และแต่ละคนก็เอ็นดูอาริสึ)"
22050-420 = "(อาริสึที่ได้ผจญภัยที่นี่อย่างขยันขันแข็งก็คง...)"
22050-422 = "อาริสึ..."
22050-427 = "อาริสึก็สนุกกับการผจญภัยกับคุณครูในวันนี้มากเลยค่ะ!"
22050-428 = "ถะ... ถึงวันนี้จะทำเควสที่ยูสึมอบหมายให้ไม่สำเร็จก็ตาม..."
22050-429 = "แต่ยังไงอาริสึก็เป็นผู้กล้า ผู้กล้าไม่ยอมแพ้กันหรอกค่ะ!"
22050-435 = "ถึงจะยังเป็นแค่ผู้กล้าฝึกหัด แต่อาริสึก็จะตั้งใจทำเควส และผจญภัยเรื่อยๆ จนเลเวลสูงขึ้น..."
22050-436 = "และจะใช้ดาบแห่งแสงปราบจอมราชาปีศาจที่มาคุกคามโลกให้ได้ค่ะ!"
22050-441 = "คุณครูจะอยู่ผจญภัยไปด้วยกันกับอาริสึ… จนกว่าวันนั้นจะมาถึงได้หรือเปล่าคะ?"
22050-443 = "[s] \"อื้ม แน่นอนอยู่แล้ว\""
22050-450 = "(วันธรรมดาๆ ในมิลเลเนียมยังคงดำเนินต่อไป)"
22050-451 = "(ดั่งเช่นวันนี้ และวันอื่นๆ อีกในอนาคต)"
22050-452 = "(ใช่แล้ว... คุณครูคิดว่ามันจะดำเนินต่อไป)"
22050-455 = "ตอนต่อไป;อุปกรณ์ประหลาด 1"
