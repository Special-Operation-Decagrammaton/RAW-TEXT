[translation]
1006105-1 = "Walking the Halls"
1006105-2 = "Sakurako led me back to one of the inner corridors of the cathedral."
1006105-3 = "That late at night, all the lights were off and there were no signs of anyone else."
1006105-4 = "Thank you for coming, Sensei."
1006105-5 = "I've been waiting."
1006105-10 = "I feel I owe you thanks, and also an apology..."
1006105-11 = "Thanks for responding to my call, and an apology for the lateness of the hour."
1006105-12 = "I needed a place and a time when no one would be around."
1006105-13 = "The reason I asked you here today is...quite personal."
1006105-14 = "I was hoping you would hear my confession."
1006105-15 = "Hearing others' confessions and helping them to pray is usually my job."
1006105-16 = "But for this moment, today..."
1006105-22 = "I wish for you to hear my secret, Sensei."
1006105-23 = "[s1] \"Your secret? Did something happen?\"\n[s2] \"Your confession? Did something happen?\""
1006105-26 = "Heehee. I suppose one could say that. Or, then again, maybe not."
1006105-27 = "And, in your case... Perhaps you've been expecting this."
1006105-28 = "But... I admit, I'm still hesitant."
1006105-29 = "It's something that might become yet another burden for you to shoulder. The last thing I'd want is to be a source of worry for you."
1006105-30 = "And, just the knowledge of it..."
1006105-34 = "You can turn around and go back to Schale right now, if you'd like. You don't need to hear anything more tonight."
1006105-35 = "I swear to you, I won't be upset or disappointed, if that is your choice."
1006105-36 = "[s3] \"As a teacher, I can't do that.\"\n[s4] \"You've only made me want to know more.\""
1006105-39 = "Heehee. Is that so? I admit your response is not unexpected."
1006105-40 = "I had a feeling you'd be amenable, which helped me gather my courage to try. So hearing you say that has heartened me."
1006105-41 = "So, in that case..."
1006105-45 = "Shall we take a walk? I'd like to calm my nerves."
1006105-52 = "The truth is that I, as a member of the Sisterhood..."
1006105-53 = "I know some things that I cannot speak of to the rest of the world. In some cases, there are measures in place against divulging the information."
1006105-54 = "I think, to a certain extent..."
1006105-55 = "Any organization with the Sisterhood's size and longevity is bound to have secrets."
1006105-56 = "One might call it inevitable."
1006105-57 = "Of course, even within the Sisterhood, most do not know all the secrets we hold, or only know about them within the confines of scripture."
1006105-58 = "There are so many considerations which make these things impossible to speak of with others."
1006105-59 = "And, unfortunately..."
1006105-60 = "I can't reveal this information, even to you, Sensei. That's another reason why I'm struggling."
1006105-65 = "Ah. Yes. Just as I feared..."
1006105-66 = "It seems insensitive to tell you that I have secrets and not reveal them to you."
1006105-67 = "[s5] \"That's not what's important to me.\"\n[s6] \"I'm more interested in your story, Sakurako.\""
1006105-70 = "Sensei..."
1006105-71 = "Heehee."
1006105-72 = "Now where have I heard something like that before?"
1006105-73 = "Well..."
1006105-79 = "To be honest, that was my goal in calling you today."
1006105-82 = "― I don't want to hide anything...[wa:2760] "
1006105-84 = "― Not from you, of all people.[wa:10] "
1006105-87 = "― But, in my position,"
1006105-89 = "― it's hard for me to reveal everything...[wa:240] "
1006105-92 = "― Still,[wa:1280] "
1006105-94 = "― it is a relief just to be able to tell you[wa:1320] "
1006105-97 = "― that I have a secret to keep.[wa:1690] "
1006105-100 = "― I know[wa:1480] "
1006105-102 = "― you may not understand.[wa:10] "
1006105-105 = "― I don't expect that..."
1006105-108 = "― Nonetheless, I...[wa:1450] "
1006105-110 = "― I want you to accept me for who I am.[wa:1200] "
1006105-113 = "― Um...[wa:1010] "
1006105-116 = "― I was nervous."
1006105-118 = "― I thought you might not trust me once you knew...[wa:10] "
1006105-121 = "― I never dreamed[wa:1120] "
1006105-123 = "― I would get that answer, and so soon.[wa:10] "
1006105-126 = "― I sincerely thank you, Sensei.[wa:3250] "
1006105-129 = "I'm happy that I will be able to pray for you with a heart that is even lighter and more sincere than before."
1006105-130 = "May all your future endeavors be blessed with happiness and good fortune."
1006105-131 = "I've said it before, perhaps. But I hope you can sense the strength of my emotion in the repetition."
1006105-135 = "Every hour that I am awake, every moment..."
1006105-136 = "I will pray for you, Sensei."
1006105-138 = "We walked around the cathedral a bit longer, chatting about lighter subjects, before I returned to Schale."
