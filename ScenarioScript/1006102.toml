[translation]
1006102-1 = "คนที่ถูกเข้าใจผิดได้ง่าย"
1006102-5 = "(คุณครูรู้สึกติดใจกับข้อความใน MOMOTALK ก็เลยหาเวลาว่างไปที่มหาวิหาร)"
1006102-9 = "(เนื่องจากเป็นเวลาว่าง ที่มหาวิหารเลยไม่มีคนอยู่ แต่ก็เห็นซากุระโกะกำลังสวดอธิษฐานอยู่ไกลๆ)"
1006102-10 = "......"
1006102-11 = "[s1] เข้าไปหาและรอจะกว่าจะสวดอธิษฐานเสร็จ\n[s2] เข้าไปสวดอธิษฐานด้วยข้างๆ"
1006102-19 = "...?"
1006102-24 = "หืม...?"
1006102-29 = "เอะ... เอ๋? คะ... คุณครู!? มาที่นี่ตั้งแต่เมื่อไรกัน..."
1006102-30 = "[s3] \"ขอโทษที่มารบกวนนะ\"\n[s4] \"ครูไม่ได้ตั้งใจจะทำให้กลัวนะ...\""
1006102-31 = "มะ... ไม่ค่ะ ไม่เป็นไรค่ะ ฉันสวดอธิษฐานเสร็จพอดี..."
1006102-32 = "มะ... ไม่ค่ะ ไม่เป็นไรค่ะ ฉันสวดอธิษฐานเสร็จพอดี..."
1006102-33 = "ว่าแต่ คุณครูมีเรื่องอะไรเหรอคะ?"
1006102-34 = "เวลาตอนนี้มัน..."
1006102-35 = "...คะ?"
1006102-36 = "มาเพราะฉันเรียกให้มางั้นเหรอคะ?"
1006102-37 = "หมายความว่ายังไงน่ะ... ฉันไปเรียกครูไว้เหรอ..."
1006102-38 = "ทาง MOMOTALK เหรอคะ...?"
1006102-42 = "[ns5] \"เห็นบอกว่าอยากมีโอกาสพูดคุยกันไง...\"\n[ns6] ยื่นโทรศัพท์ให้อ่าน MOMOTALK"
1006102-46 = "อ๊ะ อย่าบอกนะว่า..."
1006102-50 = "นะ... นี่มัน..."
1006102-51 = "อืม เอ่อ... คือว่า... เรื่องนั้นน่ะค่ะ จะพูดยังไงดีนะ อืม..."
1006102-52 = "ไม่ได้มีความหมายอะไรหรอกค่ะ ก็แค่คำทักทายเท่านั้นเอง..."
1006102-53 = "...จริงๆ นะคะ"
1006102-54 = "...เฮ้อ"
1006102-55 = "ฉันคงทำให้คุณครูเข้าใจผิดอีกแล้วสินะคะ ขอโทษด้วยค่ะคุณครู"
1006102-56 = "[s7] \"ไม่เป็นไรหรอก ไม่ต้องคิดมากนะ\"\n[s8] \"เข้าใจผิด? ...อีกแล้วงั้นเหรอ?\""
1006102-59 = "อืม ที่จริงแล้วฉันมักจะถูกคนรอบข้างเข้าใจผิดอยู่บ่อยๆ..."
1006102-60 = "ทุกคนดูจะเกรงใจฉัน ก็เลยรู้สึกอึดอัดใจอยู่หน่อยน่ะค่ะ"
1006102-61 = "พออยู่ในตำแหน่งที่ต้องดูแลซิสเตอร์คนอื่นๆ ก็เลยรู้สึกห่างเหินกับคนอื่นๆ ไปด้วยมั้งคะ"
1006102-62 = "ฉันอยากทำให้ดีขึ้น ก็เลยขอคำแนะนำจากซิสเตอร์คนอื่นและพยายามปรับตัวแล้ว แต่มันก็ไม่ได้ผลค่ะ"
1006102-63 = "แน่นอนว่าทุกคนเป็นคนดี และพยายามจะเข้าใจด้านนี้ของฉัน แล้วก็ให้คำแนะนำนู่นนี่กับฉันด้วยค่ะ"
1006102-64 = "เรื่อง MOMOTALK ที่ส่งไปให้คุณครูก็เหมือนกัน... มันเป็นการเอาคำแนะนำที่ได้จากซิสเตอร์คนอื่นมา#nใช้น่ะค่ะ"
1006102-65 = "พอดีซิสเตอร์คนอื่นบอกว่า \"เวลาส่งข้อความ ถ้าใส่เสียงหัวเราะเข้าไปด้วย จะทำให้รู้สึกสนิทสนมกัน\" น่ะค่ะ..."
1006102-66 = "[s9] \"อาฮะ...\"\n[s10] \"ก็เลยเริ่มด้วย 'ฮุฮุฮุ' เหรอ...\""
1006102-69 = "ที่จริงแล้วฉันกังวลนิดหน่อยค่ะ ถ้าฉันเป็นนักเรียนธรรมดาก็คงไม่ใช่เรื่องใหญ่อะไร แต่นี่ฉันเป็นหนึ่งใน#nซิสเตอร์แห่งมหาวิหารทรีนิตี้"
1006102-70 = "การทำให้คนอื่นต้องมาลำบากในฐานะซิสเตอร์มันดูไม่ใช่เรื่องที่เหมาะสมเท่าไรน่ะค่ะ"
1006102-71 = "ที่บอกคุณครูไปว่าฉันอยากมีเวลาพูดคุยกับคุณครูก็ด้วย... ที่จริงแล้วฉันอยากจะปรึกษาหารือเกี่ยวกับ#nเรื่องนั้นน่ะค่ะ"
1006102-76 = "อืม ฉันพูดอะไรไร้สาระยืดยาวแล้ว ฉันอยากคุยเกี่ยวกับเรื่องนั้นทีหลังค่ะ"
1006102-77 = "ยังไงก็เถอะค่ะ ฉันต้องขอโทษที่ทำให้คุณครูต้องเป็นห่วงด้วยนะคะ ฉันจะเดินออกไปส่งคุณครูเองค่ะ"
1006102-81 = "เชิญทางนี้ค่ะ..."
1006102-87 = "สวนสาธารณะหน้ามหาวิหารทรีนิตี้"
1006102-88 = "ฉันขอส่งถึงตรงนี้นะคะ"
1006102-89 = "ถึงจะเป็นช่วงเวลาสั้นๆ แต่วันนี้ฉันก็สนุกที่ได้พูดคุยกับคุณครูนะคะ"
1006102-90 = "...ฮุฮุ"
1006102-91 = "ถ้างั้นก็ รักษาตัวด้วย..."
1006102-99 = "อ๊ะ ซิสเตอร์ซากุระโกะนี่นา ซิสเตอร์ซากุระโกะ!"
1006102-100 = "อรุณสวัสดิ์ค่ะ สบายดีรึเปล่าคะ?"
1006102-102 = "เอ๋? เหล่าซิสเตอร์..."
1006102-103 = "ฮุฮุ อรุณสวัสดิ์ค่ะ"
1006102-104 = "ขอให้วันนี้ซิสเตอร์พบเจอกับความสงบสุขและโชคดีนะคะ"
1006102-109 = "ฉันจะคอยจับตาดู... ทุกการเคลื่อนไหวของทุกคนนะคะ"
1006102-115 = "ขอให้เป็นวันที่ดีค่ะ... ฮุฮุฮุ"
1006102-119 = "ฮะ... เฮือก! ค่ะ... ค่ะ...!"
1006102-120 = "ขะ... ขอให้เป็นวันที่ดีค่ะ...!! พวกฉันขอตัวก่อน...!"
1006102-125 = "เอ๋... ถ้ารีบแจ้นไปขนาดนั้น เดี๋ยวจะบาดเจ็บเอานะคะ..."
1006102-129 = "[ns11] \"หัวเราะ 'ฮุฮุฮุ' ตอนคุยเรื่องนั้นเหรอ...\"\n[ns12] \"เป็นอย่างนี้นี่เองสินะ...\""
1006102-132 = "...หืม? คุณครู? หมายความว่ายังไงเหรอคะ?"
1006102-133 = "อ๋อ ไม่ได้พูดอะไรงั้นเหรอคะ?"
1006102-134 = "ค่ะ เข้าใจแล้วค่ะ"
1006102-135 = "ถ้างั้นฉันขอตัวก่อนนะคะ"
1006102-140 = "(ซากุระโกะเดินกลับไปพร้อมผ้าคลุมหัวที่พลิ้วไหว คุณครูยืนมองจากข้างหลังแล้วกลับไปยังชาเล่ต์)"
