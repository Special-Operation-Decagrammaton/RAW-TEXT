[translation]
10054010-1 = "#title;1화;갑작스러운 소식"
10054010-2 = "3;키사키;02\n#3;em;[반응]\n#3;a\n#wait;1500"
10054010-3 = "3;키사키;03;간만이라는 생각이 드는구나, 선생. 이따금 우리 산해경에도 얼굴을 보여 주었으면 좋았을 텐데 말이다."
10054010-4 = "3;키사키;13;조금 더 솔직한 본심을 이야기하자면, 1주일에 3일 정도는 산해경에 체류해 주었으면 한다만."
10054010-5 = "[s] \"주, 주 3일은 조금 무리일지도……?\""
10054010-6 = "3;키사키;05;그야 그렇겠지. 그렇다면 역시 샬레에 산해경의 상호 교류 대사관을 설치하여, 내가 직접 샬레에서 업무를 보는 방안을 추진해야겠군."
10054010-7 = "3;키사키;18;후후. 그렇게 놀라지 말거라. 농담으로 건넨 말임이 당연하지 않은가.\n#3;em;[음표]"
10054010-8 = "3;키사키;99;……절반 정도는, 말이다."
10054010-9 = "[s] \"……심장에 좋지 않은 말을 들었으니까, 반격해야겠어!\""
10054010-10 = "3;키사키;02;음? 반격이라니, 무슨……?"
10054010-11 = "#st;[0,0];instant;1;"
10054010-12 = "#clearST"
10054010-13 = "3;키사키;02\n#3;d\n#wait;1000"
10054010-14 = "3;키사키;14\n#3;a\n#3;closeup\n#wait;1500"
10054010-15 = "3;키사키;10;서, 선생? 무슨 일인가. 선생 쪽에서 먼저 이렇게 가까이…….\n#3;stiff\n#3;closeup\n#3;em;[///]"
10054010-16 = "3;키사키;99;읏……!\n#3;jump\n#3;closeup"
10054010-17 = "[ns] \"역시 안색이 조금 창백한 것 같기도 하고…….\""
10054010-18 = "3;키사키;17;……뭐라?\n#3;closeup\n#3;em;[?]"
10054010-19 = "#all;hide"
10054010-20 = "3;키사키;13;그러니까…… 내 몸이 괜찮은지, 상태를 확인해 보려 했다는 것이로구나.\n#3;a"
10054010-21 = "3;키사키;09;물론 선생이 신경 써 주는 것은 기쁜 일이다만…… 하아.\n#3;em;[땀]"
10054010-22 = "3;키사키;11;아니, 아니다. 내가 멋대로 기대한 것뿐이니, 잊어라. 그보다…… 흐음……."
10054010-23 = "3;키사키;05;……."
10054010-24 = "3;키사키;17;………혹시, 우리 현룡문 아이들이 사고라도 쳤는가?\n#3;em;[?]"
10054010-25 = "[s1] \"???!!!\"\n[s2] \"아, 아니야! 그런 건 아니고……!\""
10054010-26 = "#wait;10"
10054010-27 = "#wait;10"
10054010-28 = "3;키사키;02;흐음?"
10054010-29 = "3;키사키;13;……."
10054010-30 = "3;키사키;17;서운하구나. 선생과 나 사이에는 무엇 하나 숨기는 것이 없을 줄 알았거늘…….\n#3;em;[…]"
10054010-31 = "#all;hide"
10054010-32 = "#na;(어쩔 수 없이, 키사키에게 솔직하게 털어놓았다…….)"
10054010-33 = "#all;hide"
10054010-34 = "3;키사키;09;하아………….\n#3;a\n#3;em;[한숨]"
10054010-35 = "[s] \"너, 너무 혼내지는 말아 줘……?\""
10054010-36 = "3;키사키;05;알고 있다. 그 아이들도 나쁜 의도를 가졌던 것은 아니었을 테지……."
10054010-37 = "3;키사키;02;물론 의도가 불순하지 않다고 하여, 반드시 좋은 행동으로 열매가 맺어지는 것은 아니겠다만."
10054010-38 = "3;키사키;03;애초에, 그 아이들에게 걱정을 끼치게 한 나의 허물도 있지 않겠느냐."
10054010-39 = "[s] \"정말로…… 몸이 안 좋은 거야?\""
10054010-40 = "3;키사키;01;무얼, 그렇게 대단하게 반응할 일은 아니다. 세간의 표현을 빌리자면, 이른바 더위를 먹은 것이니."
10054010-41 = "3;키사키;02;루미의 말 그대로다. 이 시기가 되면 아무래도…… 체력이 조금 떨어지곤 했으니 말이지.\n#3;em;[…]"
10054010-42 = "3;키사키;03;후후. 그렇게 걱정할 필요는 없다, 선생. 내 평소 몸 상태와는 관계없는 일이니. "
10054010-43 = "3;키사키;18;애초에 정말로 그랬다면, 일단 사야가 이렇게 얌전할 리 없지 않겠느냐."
10054010-44 = "[s] \"그렇다면 일단 안심이기는 한데…….\""
10054010-45 = "3;키사키;07;허나, 몸과 마음을 쉬게 한다, 인가……."
10054010-46 = "[s] \"역시 그건 필요하다고 생각해.\""
10054010-47 = "3;키사키;06;……그래. 그렇게 할 수 있다면 말이지."
10054010-48 = "3;키사키;02;여름방학 같은 것을 이용해 쉬면 되지 않느냐고?\n#3;em;[?]"
10054010-49 = "3;키사키;18;후후. 그래……. 다른 학교라면 분명, 그렇게 해도 될 일이겠지. 허나 현룡문의 문주라는 자리는 아무래도……."
10054010-50 = "3;키사키;03;적합한 '명분' 없이는, 함부로 그런 시간을 내기 어려운 위치이기도 해서 말이다."
10054010-51 = "#st;[0,0];instant;1;"
10054010-52 = "#clearST"
10054010-53 = "3;키사키;03\n#3;h\n#wait;1000"
10054010-54 = "3;키사키;03\n#3;h\n#wait;1500"
10054010-55 = "3;키사키;02\n#3;h\n#wait;1500\n#3;em;[반응]"
10054010-56 = "3;키사키;02\n#3;h\n#3;greeting\n#wait;1500"
10054010-57 = "3;키사키;02\n5;통신 카나에;03\n#5;a\n#3;m1\n#5;h\n#na;카나에 언노운;안녕하세요, 문주님! 기체후 일향 만강하시었습니까?"
10054010-58 = "3;키사키;01;호오. 그대가 직접 내게 전화를 걸다니, 드문 일이로구나. 카나에 홍보부장. 그만한 일이라는 건가?"
10054010-59 = "3;키사키;01\n5;통신 카나에;15;아이참, 문주님도. 별일 없는데 연락드릴 수도 있죠."
10054010-60 = "3;키사키;01\n5;통신 카나에;22;정말로 대업에 필요한 사람이 있다면, 세 번이나 빈집을 찾아갈 수도 있다잖아요?"
10054010-61 = "3;키사키;01\n5;통신 카나에;02;어, 어라? 이 의미가 아니었던가요……?\n#5;em;[?!]\n#5;shake"
10054010-62 = "3;키사키;04;그래. 그게 아니라, 인재를 맞아들이기 위해서는 참을성 있게 노력하는 것이 아깝지 않다는 뜻이지…….\n#3;em;[땀]"
10054010-63 = "3;키사키;04\n5;통신 카나에;28;으앙!\n#5;em;[훌쩍]"
10054010-64 = "5;통신 카나에;28\n3;키사키;03;어쨌든, 다른 자라면 그 말이 맞을 터이다만, 그대는 그러하지 않을 듯하여 말이다.\n#3;m3\n#5;dr"
10054010-65 = "3;키사키;02;나의 동향이나 기색 같은 것은 진작에 파악하고 있을 것이고, 전언이 필요하다면 다른 사람을 시켜 우회하여 전하지 않겠는가?"
10054010-66 = "3;키사키;18;그리하는 것이 그대의 '낭만'일 것일 터이니.\n#3;em;[음표]"
10054010-67 = "3;통신 카나에;15;역시 문주님! 저를 잘 아신다니까요!"
10054010-68 = "3;통신 카나에;01;……그렇게 말씀드리고 보니, 한층 더 제 언행이 모순처럼 보이기는 하겠네요……."
10054010-69 = "3;통신 카나에;03;하지만 이정도로 풀이 죽을 생각은 없답니다! 이르기를, 힘을 산을 뽑을 만하고, 기운은 세상을 덮을 만큼 나아가라 하였으니!\n#3;jump"
10054010-70 = "3;통신 카나에;02;어, 어라? 이것도 이 의미가 아니었던가요?"
10054010-71 = "3;통신 카나에;02\n1;키사키;09;그래……. 그리고 그 이야기의 결말은 그다지 좋지 못했던 것으로 기억하는구나. 카구야가 들었다면 조금 서운했을 것이야…….\n#1;em;[땀]\n#3;m5\n#1;a"
10054010-72 = "1;키사키;09\n3;통신 카나에;27;그럴 수가……!"
10054010-73 = "1;키사키;09\n3;통신 카나에;10;아, 아무튼간에요! 실례와 모순을 무릅쓰고 말씀 올리고자 하는데요……."
10054010-74 = "1;키사키;09\n3;통신 카나에;01;제 집무실……은 아니고, 접대실에서 여러 분들을 모시고 자리를 가질까 해서요!"
10054010-75 = "3;통신 카나에;01\n1;키사키;02;…….\n#1;em;[…]"
10054010-76 = "3;통신 카나에;01\n1;키사키;05;여봐라, 카나에. 내가 알지 못하는, 산해경의 위기가 닥치려 하는가?"
10054010-77 = "1;키사키;05\n3;통신 카나에;12;……네?\n#3;em;[?]"
10054010-78 = "1;키사키;05\n3;통신 카나에;11;아…… 네. 그렇게 해석될 수도 있었겠네요……. 송구합니다. "
10054010-79 = "1;키사키;05\n3;통신 카나에;00;하지만 그런 일은 아니랍니다! 정말로 믿기 어려우실 수도 있으시겠지만……."
10054010-80 = "1;키사키;05\n3;통신 카나에;99;그냥, 여러 분들과 식사 자리를 마련하고자 하는 것뿐인데요…….\n#3;em;[땀]"
10054010-81 = "3;통신 카나에;99\n1;키사키;99;…….\n#1;m3\n#3;dr"
10054010-82 = "3;키사키;02;현무상회…… 루미 회장도 오는가?\n#1;hide\n#3;em;[?]"
10054010-83 = "3;통신 카나에;11;네? 네, 그렇습니다! 어떻게 보면 그분과 상당히 밀접하게 구축된 자리라고나 할까요……."
10054010-84 = "3;키사키;18;후후. 그렇구나. 알았다. 짐작이 가는구나. 허나 그렇다면……."
10054010-85 = "3;통신 카나에;02;네?"
10054010-86 = "3;키사키;03;한동안 사용하지 않았을, 그대의 접대실을 조금 정리할 필요가 있겠구나."
10054010-87 = "3;통신 카나에;99;그건, 그렇겠지요…….\n#3;em;[…]"
10054010-88 = "3;키사키;03"
10054010-89 = "[ns] \"방금은 누구였어?\""
10054010-90 = "3;키사키;02;그래. 선생에게도 초면이겠구나. 이렇게 산해경…… 현룡문과 선생의 연이 깊어졌는데도.\n#3;em;[반응]"
10054010-91 = "3;키사키;04;보기에 따라서는 불미스러운 일이었을지도 모를 일이로군. 내가 먼저 사죄의 뜻을 밝혀야 하겠다."
10054010-92 = "#st;[0,0];instant;1;"
10054010-93 = "#clearST"
10054010-94 = "3;키사키;99\n#3;h\n#3;greeting\n#wait;1500"
10054010-95 = "[ns] \"더더욱 영문을 모르겠는데……?\""
10054010-96 = "3;키사키;02;음. 카나에라는 아이다. 미나와 함께 현룡문을 지탱해 주고 있는 중요한 학생이지."
10054010-97 = "3;키사키;01;미나가 외치를 담당한다면, 카나에는 내치를 도맡고 있다. "
10054010-98 = "3;키사키;05;둘의 격은 완전히 같기에, 둘 중 하나만 빠져도 현룡문은 제 역할을 하기 힘들게야."
10054010-99 = "3;키사키;02;그런데 왜 선생은 지금까지 몰랐냐는 표정이로구나. 그래. 그런 의문을 품는 것이 당연하겠지.\n#3;em;[반응]"
10054010-100 = "3;키사키;03;그 이유에 대해서는……."
10054010-101 = "#st;[0,0];instant;1;"
10054010-102 = "#clearST"
10054010-103 = "3;키사키;99\n#3;em;[…]\n#wait;2500"
10054010-104 = "3;키사키;18;후후. 카나에를 직접 만난 뒤의 즐거움으로, 남겨 두도록 하는 것이 어떠한가?\n#3;em;[음표]"
10054010-105 = "#all;hide"
10054010-106 = "3;루미;00;현무상회 출장 뷔페 대령이오!\n#3;a"
10054010-107 = "3;루미;00\n4;레이죠;03;대단한 것은 아닙니다만, 나름대로 여름에 즐길 음식으로 준비했습니다. 마음껏 드셔 주세요.\n#4;a\n#4;em;[음표]\n#3;m2"
10054010-108 = "#st;[0,0];instant;1;"
10054010-109 = "#clearST"
10054010-110 = "3;루미;00\n4;레이죠;03\n#3;h\n#4;h\n#3;d\n#4;d\n#wait;1500"
10054010-111 = "1;키사키;03\n3;슌;03\n5;코코나;03\n#1;a\n#3;a\n#5;a\n#1;h\n#3;h\n#5;h"
10054010-112 = "#wait;1000"
10054010-113 = "1;키사키;03\n3;슌;03\n5;코코나;03\n#1;d\n#3;d\n#5;d\n#1;h\n#3;h\n#5;h\n#wait;1000"
10054010-114 = "3;미나;05\n#3;a\n#3;h\n#1;hide\n#5;hide\n#wait;1000"
10054010-115 = "4;카나에;03\n3;미나;05\n#3;h\n#4;h\n#3;m2\n#4;a\n#wait;1500"
10054010-116 = "3;미나;05\n4;카나에;15;안녕하세요, 안녕하세요! 모두, 바쁘신 가운데 이렇게 시간을 내주셔서 감사합니다!\n#4;h\n#4;em;[재잘]"
10054010-117 = "3;슌;12;후후. 오랜만이네요. 카나에 씨. 초대해 주셔서 감사합니다.\n#4;hide"
10054010-118 = "3;코코나;03;감사합니다, 카나에 언니! 어라? 선생님도 계셨네요? 안녕하세요!\n#3;em;[반응]"
10054010-119 = "[s] \"안녕, 코코나 쨩!\""
10054010-120 = "3;코코나;11;그러니까요! 저는 코코나 쨩이 아니라……!\n#3;jump"
10054010-121 = "[s] \"아참, 그랬지! 코코나 쨩 교관 쨩!\""
10054010-122 = "3;코코나;04;네? 으우…… 정말이지 선생님은 가끔 영문을 모르겠다니까요…….\n#3;em;[///]\n#3;stiff"
10054010-123 = "#st;[0,0];instant;1;"
10054010-124 = "#clearST"
10054010-125 = "3;코코나;04\n#3;d\n#wait;1000"
10054010-126 = "3;카나에;03\n#3;a\n#wait;1000"
10054010-127 = "3;카나에;15;이제서야 인사 올리게 되네요. 미야우치 카나에라고 합니다, 선생님! 처음 뵙겠습니다!\n#3;em;[반짝]\n#3;greeting"
10054010-128 = "3;카나에;03;저와 선생님이 만난 것, 그리고 선생님과 제가 만난 것……. 마치 물고기가 물을 만난 것과 같은 일이겠네요!"
