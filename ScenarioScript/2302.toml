[translation]
2302-1 = "Once Again! The Festival Department's Meeting!"
2302-4 = "On a peaceful holiday afternoon, the members of the Festival Operations Department gathered together at Momoyodou."
2302-10 = "Whiteboard, check. Dry erase marker, check. All good to go!"
2302-14 = "The stage is yours, Pina!"
2302-15 = "Yes, ma'am! We've received the president's blessing, so it's time! "
2302-22 = "Let us commence with the meeting of the Festival Operations Department! "
2302-27 = "Heehee. Heeheehee!"
2302-28 = "We may have been thwarted by the Inner Discipline Club's unwelcome intrusion last time..."
2302-29 = "But things will not be the same this round! No, indeed!"
2302-30 = "Why you ask? Because this time we have an ace up our sleeve."
2302-32 = "The one and the only, Umika has returned!"
2302-33 = "Yes! The best ace up our sleeve we could ask for!"
2302-34 = "Welcome, Umika! I've eagerly awaited your return!"
2302-36 = "It's good to be back, Boss!"
2302-37 = "I've missed you too, Pina!"
2302-38 = "Call me president, not boss!"
2302-39 = "*sigh*"
2302-40 = "Just how many times do I need to hammer that into your head?!"
2302-41 = "Moving on to business! We are scheduled to host a festival in the Foxy Shopping District next month!"
2302-42 = "Now, Our dearest Umika embarked on a grand festival expedition to learn more about the trade!"
2302-50 = "If you will, please share the stories of your exploits and the lessons you've learned! Armed with your new business acumen, we'll storm the shopping district and bring about a festival renaissance!"
2302-52 = "A renaissance!"
2302-57 = "Yes, yes! I have returned with many proposals."
2302-58 = "To begin, I learned about the Bloody Crimson Festival of Gehenna and found a treasure trove of inspiration."
2302-65 = "(Bloody crimson sounds... Oh. She means the Gehenna Tomato Festival.)"
2302-66 = "(I've only read about it, but the students gather together and throw tomatoes at each other to create the impression of a blood bath. It suits Gehenna.)"
2302-67 = "(A festival of that scale... I wonder...)"
2302-73 = "W-Wonderful!"
2302-74 = "Please enlighten us on what this treasure trove you discovered is."
2302-75 = "Yes, it's very enlightening."
2302-76 = "The origins of this festival can be traced far back in time. To call it a \"bloody history\" is rather apt, as the participants would shoot each other with live rounds until their bodies were soaked crimson red with blood!"
2302-77 = "What?!"
2302-82 = "That... That sounds like a violent conflict between two warring organizations..."
2302-83 = "As expected of Gehenna! How horrifying!"
2302-84 = "No, no, no. There's no way that's the actual origin! Who told you that?!"
2302-85 = "Hm? It was a kind member of the Helmet Gangsters I happened to meet."
2302-86 = "They offered to tell me the story of the secret, unknown origins of the bloody crimson festival for just 1,000 yen. It was rather generous of them."
2302-87 = "Umika! That was the most obvious scam of the century. Didn't I tell you to be careful of tourist traps?"
2302-88 = "Yes? And I was?"
2302-89 = "To return to my story, this bloody practice was eventually replaced with today's more peaceful iteration."
2302-90 = "It's become a wonderful festival where they throw tomatoes instead of bullets, but with the Gehenna touch of course!"
2302-94 = "They implement all kinds of throwing devices, such as tomato catapults, tomato launchers, tomato grenades, armor-piercing fin-stabilized discarding tomato sabots..."
2302-96 = "I was truly inspired by their limitless imagination."
2302-97 = "I could wile away weeks, no, months watching the different ways they project tomatoes at each other!"
2302-99 = "What in the world are armor-piercing fin-stabilized discarding tomato sabots?!"
2302-100 = "There are even rumors that the massive scale of this festival is so impressive that Millennium is entering into a partnership with them!"
2302-101 = "And thus, I would like to propose that we recreate the very same Bloody Crimson Festival in Hyakkiyako, Boss!"
2302-102 = "R-Recreate it?! Here?"
2302-105 = "You see, there is much more to the Gehenna Tomato Festival than throwing tomatoes."
2302-106 = "It's also environmentally friendly, as it is a chance to use up surplus tomatoes in a culturally enriching, non-wasteful method."
2302-109 = "Just imagine the possibilities, Boss!"
2302-110 = "If we can recreate it here..."
2302-111 = "Hyakkiyako will purchase all the surplus tomatoes from surrounding farms... "
2302-112 = "And the Festival Operations Department will be the leading force in revitalizing our markets!"
2302-113 = "It'll also be an opportunity to expand our traditional cuisine and discover new tomato dishes. Don't you think so?"
2302-119 = "This way, surplus tomatoes won't be left to simply rot in the fields."
2302-120 = "We'll cooperate with local restaurants to introduce these new tomato dishes to festival attendees. "
2302-121 = "And Hyakkiyako will consume even more tomatoes!"
2302-122 = "As an added bonus, the clean-up for the festival will require professional cleaners and laundromat services."
2302-127 = "These local industries will generate more business, which in turn will boost our economy. "
2302-128 = "Umika, you're truly an inspiration!"
2302-129 = "Your journeys have proven fruitful in broadening your knowledge of our trade!"
2302-130 = "None of these wonderful possibilities even occurred to me."
2302-132 = "I-Is that so?"
2302-133 = "Revitalizing the local economy is a definite benefit, so maybe it would be..."
2302-137 = "No! I almost got pulled in! We don't have the budget for any of this!"
2302-138 = "And there's way too much liability. People could get injured! Rejected! "
2302-139 = "That's okay. I observed the festival practices of many different places!"
2302-140 = "The Wildhunt Art Academy holds an academy-wide festival that's unique to their district."
2302-141 = "I like the sound of that. No blood or sabot things."
2302-142 = "Right? Right?"
2302-143 = "And, as I said, it has a very unique twist with the performance they hold. When one thinks of a play..."
2302-144 = "I'm at the edge of my seat! Yes? Yes?"
2302-150 = "They want a sense of realism, to create true immersion!"
2302-151 = "So they implement an MG5 right on the stage! And they use all one hundred rounds!"
2302-152 = "In retaliation, the opposing force utilizes incendiary munitions! Flames! Fire! "
2302-153 = "In a dramatic finish, the stages collapses as it burns to the ground, and explodes just as the play ends!"
2302-154 = "The clubs are given free reign to express art in whatever medium they wish!"
2302-155 = "It all comes together in a beautiful menagerie of explosion! Destruction and chaos! Dismantle the institution!"
2302-156 = "I love it! Explosions are the true essence of art, after all!"
2302-157 = "Or...was it destruction?"
2302-159 = "I don't think any of those words and festival should even be in the same sentence!"
2302-160 = "What...was your source for all this?"
2302-161 = "The internet!"
2302-166 = "For the last time! Not everything you read on the internet is true, Umika."
2302-167 = "Ah. I do remember you telling me that. Okay, how about a rural academy's racing festival?"
2302-168 = "A peaceful, rural academy... It sounds very healing. Tell me more. Is it like a track and field race?"
2302-169 = "To be precise, it's a technical race festival."
2302-170 = "Wh-What do you mean by technical?!"
2302-171 = "Exactly that! They race with modified vehicles, outfitted with any weapon they can think of: antiaircraft cannons, rocket launchers, automatic machine guns, whatever will fit!"
2302-172 = "It requires great technical skill to drive a vehicle with such an unstable center of gravity, pushing speed to its limits with their unauthorized V8 engines...!"
2302-173 = "It opened my eyes to a whole new world!"
2302-174 = "It'll breathe a new kind of energy into our streets! This race is the epitome of living life to its fullest."
2302-176 = "I want to absorb this energy!"
2302-177 = "This is exactly what we need to excite the student body here!"
2302-179 = "No, no, no! Absolutely not! Hyakkiyako is way too regulated for illegally modified vehicles, especially with that kind of weaponry."
2302-181 = "Rejected!"
2302-189 = "I'm begging you, Umika... Do you have anything that's in line with the Momoyodou brand? I'll take anything at all at this point..."
2302-190 = "In line with our brand... Hm. There is one festival. But it's rather underwhelming..."
2302-191 = "I don't really see the benefit behind it...and it's not nearly as exciting as illegal car racing..."
2302-192 = "It doesn't hold nearly the same amount of potential to revitalize the shopping district, but..."
2302-193 = "During my travels, there was a smaller festival that did catch my eye momentarily."
2302-198 = "It was called the Willow Tree Festival."
2302-203 = "What do they do in this one? Do they maybe swing around from the branches of a willow tree?"
2302-208 = "Nothing like that. They simply come together and create decorations resembling willow tree branches. Then, the participants all walk along the river bank while holding them."
2302-212 = "Their feelings and good intentions come together as they observe the branches swaying in the wind or flowing in the water."
2302-213 = "It's a festival celebrating the tranquility of life."
2302-214 = "The vendors prepare festival foods shaped like willow trees, such as candies or baked goods."
2302-215 = "According to legend, the positive energy stored within the willow tree branches protect and deliver good blessings to the locals."
2302-216 = "The festival then blossomed from this legend."
2302-218 = "How wonderful! I didn't know about the significance of willow trees!"
2302-223 = "It's quite beautiful! The legend likely stemmed from the fact that willow trees are capable of purifying nearby water sources."
2302-224 = "The bark and leaves of the willow tree also have medicinal properties, as they're filled with salicylic acid."
2302-225 = "When mixed with acetic acid, it can create acetylsalicylic acid. In other words, an antipyretic analgesic the local people have used for centuries."
2302-226 = "I also heard a story of a weary traveler who passed through the town, desperate for water. The residents added willow leaves both to revitalize the traveler and to ensure they didn't drink too quickly and harm themselves."
2302-227 = "What a romantic story!"
2302-228 = "I thought it was beautiful as well!"
2302-229 = "When the festival originally began, people would use actual willow tree branches..."
2302-230 = "But the locals didn't want to harm the trees, so they instead began creating their own decorative branches!"
2302-237 = "That's exactly what we needed, Umika!"
2302-238 = "You're amazing! I expected nothing less."
2302-243 = "I agree with the president! I was really moved by both the origins and the stories that came with it. That's our Umika for you."
2302-244 = "R-Really?"
2302-245 = "I'm surprised! But very happy. As long as you like it, Boss!"
2302-246 = "I know! We'll use all of our budget to create a large scale model of a willow tree instead of just branches!"
2302-248 = "Stop right there!"
2302-249 = "H-Huh?"
2302-250 = "But..."
2302-252 = "The original idea is plenty!"
2302-257 = "It's a little lackluster, but if you say so, Boss."
2302-261 = "Then that concludes today's meeting! "
2302-263 = "Yes! Umika's idea will be the perfect foundation for the shopping district's festival!"
2302-264 = "R-Really?! I suppose I did do most of the presenting, but I'm sure the boss has—"
2302-265 = "But your idea is good, Umika. And there's nothing to worry about. You're not doing it alone, after all!"
2302-266 = "The Festival Operations Department are loyal to each other, through blood, sweat, and tears!"
2302-268 = "Exactly! Festivals are meant for anyone and everyone!"
2302-273 = "So, let's go! We're going to prove just why we're called the Festival Operations Department!"
2302-276 = "Yes, ma'am! Come on, Umika!"
2302-277 = "Y-Yes! Boss! Pina!"
2302-280 = "And so began the Festival Operations Department's brilliant performance!"
2302-281 = "Once Again! The Festival Department's Meeting!"
