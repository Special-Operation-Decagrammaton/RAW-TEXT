[translation]
1601903-1 = "Tentative Measures"
1601903-3 = "Reporting on today's recon, Sensei."
1601903-4 = "To cut to the conclusion, nothing major occurred."
1601903-5 = "[s] \"Yeah. I'm glad to hear that.\""
1601903-6 = "Indeed. I destroyed and blew up a few things, which doubled as necessary stress relief."
1601903-7 = "[s] \"But you said nothing major occurred!\""
1601903-8 = "This continent is...an interesting place."
1601903-9 = "Every time I go out to perform recon, something changes, regardless of being a previously observed location."
1601903-10 = "The only thing that stays constant is this landscape made of metal."
1601903-11 = "Without exact coordinates, I'm certain I would have become lost."
1601903-12 = "In a way, I feel as if I am entering a maze with no clear path."
1601903-13 = "[s1] \"That sounds dangerous...\"\n[s2] \"Perhaps we should reduce recon missions...\""
1601903-16 = "That would also be problematic."
1601903-17 = "I see. This is a textbook \"desync\" between field and office staff."
1601903-18 = "Regardless, a moment ago, three metallic, animal-like beings attempted to charge our ship."
1601903-19 = "[s] \"Was it dangerous?!\""
1601903-20 = "Yes. Quite dangerous."
1601903-21 = "Unfortunately, they were so \"cute\" that I nearly experienced a syncopal episode."
1601903-22 = "[s] \"What...?\""
1601903-23 = "They were also behaving in a cute manner."
1601903-24 = "They rolled over and showed their bellies. Furthermore, they reacted positively when I performed scratching maneuvers on the exposed areas."
1601903-25 = "[s3] \"Ugh! I'm jealous! No fair!\"\n[s4] \"Are you sure those were metallic animals...?\""
1601903-28 = "They appeared to be."
1601903-29 = "Each appeared to be an amalgamation of a cat, a puppy, and a lamb."
1601903-30 = "I attempted to retrieve one, but they insisted on vacating after we terminated our round of \"play.\""
1601903-31 = "And thus, I hereby report that I have successfully repelled unidentified entities from encroaching on the ship."
1601903-32 = "[s] \"If recon's like that, I want to join!\""
1601903-33 = "Unfortunately, this is the duty of assigned field workers. Peace."
1601903-34 = "Most importantly, everything that happens on this continent must be kept secret."
1601903-35 = "It is lamentable that I could not live stream such an event..."
1601903-36 = "[s] \"A live stream?\""
1601903-37 = "Oh, you aren't familiar?"
1601903-38 = "This is quite serious. Those who can't keep up with the times will be left behind."
1601903-39 = "But we will manage. I can stay with you forever as your guide."
1601903-40 = "[s5] \"I know what a live stream is!\"\n[s6] \"I'm just surprised that YOU know!\""
1601903-43 = "Oh, are you so in the dark?"
1601903-44 = "This is also a serious issue. I cannot believe that you are so uninterested in your students, Sensei."
1601903-45 = "As a matter of fact, I watch live streams regularly as of late."
1601903-46 = "Observe. Due to Sensei's indifference, their lack of care..."
1601903-47 = "I am unable to function because of these overwhelming feelings of disappointment and sadness."
1601903-48 = "Therefore, Sensei must give me emergency head pats. Hurry. Now. At once."
1601903-52 = "I gave Toki many head pats."
1601903-54 = "Mmm. That felt nice."
1601903-55 = "With that, I have regained my energy and vitality. I am once again the perfectly-optimal Toki."
1601903-56 = "[s] \"That's nice to hear...\""
1601903-57 = "Now then, to return to our original topic."
1601903-58 = "Multiple students, as well as you, have encouraged me to find a \"hobby.\""
1601903-59 = "As such, I became invested in the culture of so-called \"live streams.\""
1601903-60 = "I was particularly intrigued by their custom of \"donations.\""
1601903-61 = "I've observed that higher amounts demand more arduous emotional labor. More money equates to more ridiculous conversations and demands the streamer must acknowledge."
1601903-62 = "Wouldn't you say that live streaming is the pinnacle of capitalism?"
1601903-63 = "[s] \"Toki... You're not doing anything weird with these streams, right...?\""
1601903-64 = "I am not."
1601903-65 = "More often than not, I am a silent observer."
1601903-66 = "That said, partaking in the audience allows me to relieve my boredom. Some streamers say things such as the following:"
1601903-72 = "\"You see that, chat? Let's spam those pogs!\""
1601903-73 = "\"Ah, man, this can't be right. My controller's busted. It's the ping.\""
1601903-77 = "\"...Next game! I'm refunding this. We're cooked.\""
1601903-78 = "\"Stop lying! They're only saying that because it's spon-con!\""
1601903-83 = "\"I can't suffer alone... Everyone, join my server...\""
1601903-84 = "[s] \"...\""
1601903-85 = "..."
1601903-86 = "Society is composed of such a diverse and colorful tapestry."
1601903-87 = "[s7] \"What should I do now...?\"\n[s8] \"Our Toki's watching weirdos...\""
1601903-90 = "Be at ease. I am not so far gone."
1601903-91 = "Indeed. Not so far yet."
1601903-92 = "That said, I find one particular live stream difficult to endure."
1601903-93 = "You wish to know the channel?"
1601903-94 = "..."
1601903-95 = "It describes a \"Girl's Ninja Scroll,\" though I have never seen any parchment. It revolves around the tales of \"Mitchy\"...some such."
1601903-96 = "[s] \"...\""
1601903-97 = "Um... To test myself, I have attempted to endure until the end of her streams. It has proven to be a challenge."
1601903-98 = "But it wasn't easy. The stream proved to be a strong foe."
1601903-99 = "I know I'll grow stronger with practice, but I do not think I can bear the full \"Ninja's Scroll\" at present time."
1601903-100 = "[s] \"You don't need to train for that...\""
1601903-101 = "Is that so? I'm not sure I understand..."
1601903-102 = "Do I have \"other hobbies,\" Sensei?"
1601903-103 = "Mm, I can think of one."
1601903-104 = "Still, Sensei. Watching internet live streams and partaking in other similar activities are all \"tentative\" pastimes."
1601903-105 = "That means that I am only interested for now, and that preoccupation is subject to change."
1601903-106 = "After all, my real hobby is..."
1601903-107 = "..."
1601903-108 = "I believe I've said enough."
1601903-109 = "[s] \"You're getting good at changing the topic!\""
1601903-110 = "Yes, Sensei. You taught me that skill."
1601903-111 = "After all, I, Asuma Toki, am still growing and improving. This current moment is included."
1601903-112 = "[s] \"Yeah, I see...\""
1601903-113 = "My conclusion is that people are easily influenced by their environment."
1601903-114 = "Through experience, they gradually and incrementally transform both themselves and their surroundings."
1601903-115 = "Therefore..."
1601903-116 = "..."
1601903-117 = "I have enjoyed playing video games."
1601903-118 = "...And reading manga, as well."
1601903-119 = "[s] \"I'm sure you get along with the Game Development Department...\""
1601903-120 = "I do. That is correct, and Aris has proven to be a formidable rival."
1601903-121 = "I am down one game at the present moment, but I am certain that I will clear the gap."
1601903-122 = "Yuzu, on the other hand..."
1601903-123 = "[s] \"I think she's in another realm of skill...\""
1601903-124 = "So you recognize that too, Sensei..."
1601903-125 = "I've learned the futility of frustration when in the presence of such a skill gap."
1601903-126 = "It is like fighting a natural disaster: a flood, a typhoon, a whirling tornado."
1601903-127 = "[s] \"(Yuzu has reached 'disaster' levels?)\""
1601903-129 = "After we finished our chat and the remaining work, Toki showed me her preferred live streamers."
1601903-130 = "...Later, I found Toki asleep, leaning on my shoulder."
