[translation]
1601903-1 = "มาตรการชั่วคราว"
1601903-3 = "ขอรายงานการลาดตระเวนของวันนี้ค่ะ คุณครู"
1601903-4 = "ถ้าจะให้พูดถึงข้อสรุปเลยละก็ ไม่มีเรื่องอะไรเป็นพิเศษค่ะ"
1601903-5 = "[s] \"อื้อ งั้นก็โล่งอกไปทีนะ\""
1601903-6 = "ค่ะ ฉันทำลายและก็ระเบิดนู่นนี่ไปบ้าง แต่ก็ถือว่าได้ระบายความเครียดก่อนกลับด้วยค่ะ"
1601903-7 = "[s] \"ไหนบอกว่าไม่มีเรื่องอะไรเป็นพิเศษไง!\""
1601903-8 = "ว่าแต่ที่นี่ช่างน่าประหลาดใจจริงๆ เลยนะคะ"
1601903-9 = "ทุกครั้งที่ฉันออกไปลาดตระเวน ถึงจะออกไปตามพิกัดเดิม แต่ก็มีบางอย่างเปลี่ยนไปเสมอเลยค่ะ"
1601903-10 = "ถ้าจะมีอะไรที่เหมือนกันก็คือ ทุกอย่างล้วนทำมาจากโลหะค่ะ"
1601903-11 = "ถ้าไม่มีระบบพิกัดละก็ ฉันคงจะหลงทางแน่นอนเลยละค่ะ"
1601903-12 = "ในแง่หนึ่งก็ให้ความรู้สึกเหมือนฉันกำลังเข้าไปในเขาวงกตที่มองไม่เห็นทางเดินในทุกครั้งเลยค่ะ"
1601903-13 = "[s1] \"ฟังดูน่าอันตรายนะ อย่าไปบ่อยๆ เลย...\"\n[s2] \"ครูว่าอย่าออกไปลาดตระเวนบ่อยๆ ดีกว่านะ...\""
1601903-16 = "ไม่ได้หรอกค่ะ"
1601903-17 = "จริงๆ เลยเชียว แบบนี้สินะคะถึงได้เกิดความแตกต่างระหว่างงานสำนักงานกับงานภาคสนามน่ะ"
1601903-18 = "เมื่อกี้มีตัวอะไรบางอย่างที่คล้ายกับสัตว์โลหะมุ่งหน้ามาทางนี้ตั้ง 3 ตัวเลยนะคะ"
1601903-19 = "[s] \"ไม่อันตรายเหรอ?!\""
1601903-20 = "อันตรายค่ะ"
1601903-21 = "มันน่ารักมากจนฉันแทบเสียสติไปชั่วขณะเลยละค่ะ!"
1601903-22 = "[s] \"ว่า... ไงนะ...?"
1601903-23 = "มันทำท่าน่ารักด้วยนะคะ"
1601903-24 = "มันพลิกตัวโชว์พุง และดูชอบใจมากเวลาฉันเกาให้ค่ะ"
1601903-25 = "[s3] \"ได้เกาพุงน้องมาเหรอ? น่าอิจฉาจัง!\"\n[s4] \"ว่าแต่มันเป็นสัตว์โลหะจริงเหรอ...?\""
1601903-28 = "น่าจะเป็นอย่างนั้นนะคะ"
1601903-29 = "สัตว์ตัวนั้นดูเป็นการผสมผสานระหว่างแมว หมา และลูกแกะค่ะ"
1601903-30 = "ฉันว่าจะพากลับมาสักตัว แต่พอมันได้เล่นด้วยจนหนำใจแล้วก็กลับไปเฉยเลยค่ะ"
1601903-31 = "แต่ก็ถือว่าฉันกำจัดสิ่งแปลกปลอมปริศนาที่เข้ามาใกล้ได้สำเร็จ ขอจบการรายงานค่ะ"
1601903-32 = "[s] \"ถ้าเป็นแบบนั้น ครูขอออกไปทำด้วยดีกว่า!\""
1601903-33 = "น่าเสียดายนะคะ แต่นี่เป็นสิทธิพิเศษของสมาชิกภาคสนามเท่านั้นค่ะ ปิ้วๆ"
1601903-34 = "แต่ก็เอาเถอะค่ะ ในเมื่อทุกสิ่งที่เกิดขึ้นที่นี่ต้องถูกเก็บเป็นความลับ"
1601903-35 = "ก็น่าเสียดายนะคะที่ฉันอัปโหลดลงรายการในอินเทอร์เน็ตไม่ได้"
1601903-36 = "[s] \"รายการในอินเทอร์เน็ตเหรอ?\""
1601903-37 = "ตายจริง ยังไม่รู้สินะคะ"
1601903-38 = "เป็นเรื่องใหญ่เลยนะคะ ถ้าคุณครูไม่ตามให้ทันยุคสมัยละก็ เดี๋ยวจะล้าหลังเอานะคะ"
1601903-39 = "แต่ไม่เป็นไรหรอกค่ะ เพราะฉันอาจอยู่ข้างๆ คุณครูได้ตลอดชีวิตเลยค่ะ"
1601903-40 = "[s5] \"ครูแค่ไม่รู้ว่าโทคิทำอะไรแบบนั้นต่างหาก!\"\n[s6] \"ครูแค่ตกใจที่โทคิพูดเรื่องแบบนี้ต่างหาก!\""
1601903-43 = "ตายจริง ยังไม่รู้สินะคะ"
1601903-44 = "เป็นเรื่องใหญ่เลยนะคะ ทำไมถึงไร้ความสนใจในตัวนักเรียนแบบนี้นะ"
1601903-45 = "หมู่นี้ฉันดูรายการในอินเทอร์เน็ตบ่อยๆ ค่ะ"
1601903-46 = "ดูสิคะ พอคุณครูไม่สนใจในตัวฉัน จู่ๆ ฉันก็ผิดหวังและเศร้าเสียใจขึ้นมา"
1601903-47 = "จนตอนนี้ฉันทำอะไรไม่ได้เลยค่ะ"
1601903-48 = "คุณครูต้องรีบเข้ามาลูบหัวฉันแล้วละค่ะ เร็วเข้าสิคะ"
1601903-52 = "(แล้วคุณครูก็ลูบหัวโทคิจนหนำใจ...)"
1601903-54 = "อืม ดีจังเลยนะคะ"
1601903-55 = "ฉันฟื้นฟูพละกำลังและกลับมาเป็นโทคิที่สมบูรณ์แบบอีกครั้งแล้วค่ะ"
1601903-56 = "[s] \"ค่อยยังชั่วหน่อยนะ...\""
1601903-57 = "กลับมาที่เรื่องนี้กันต่อดีกว่าค่ะ"
1601903-58 = "คุณครูกับนักเรียนคนอื่นต่างก็บอกให้ฉันลองหางานอดิเรกดู"
1601903-59 = "ตอนนี้ฉันก็เลยเริ่มสนุกกับการดูรายการทางอินเทอร์เน็ตบ้างแล้วค่ะ"
1601903-60 = "โดยเฉพาะกับวัฒนธรรมโดเนทในอินเทอร์เน็ตน่ะค่ะ"
1601903-61 = "ฉันคิดไม่ถึงเลยค่ะว่ายิ่งยอดโดเนทสูงมากเท่าไร ฉันยิ่งต้องฟังบทสนทนาและข้อเรียกร้องที่ไร้สาระ#nมากขึ้นเท่านั้น"
1601903-62 = "นี่มันจุดสูงสุดของระบบทุนนิยมจริงๆ ว่ามั้ยคะ?"
1601903-63 = "[s] \"โทคิ... ไม่ได้ไปทำอะไรแปลกๆ ใช่มั้ย...?\""
1601903-64 = "ไม่ทำหรอกค่ะ"
1601903-65 = "ส่วนใหญ่ฉันจะเป็นฝ่ายสังเกตการณ์เท่านั้น"
1601903-66 = "แต่การดูไปเรื่อยๆ มันก็แก้เบื่อได้นะคะ มีอะไรแบบนี้ด้วยค่ะ"
1601903-72 = "'ฝ่ามือ! พิฆาต!'"
1601903-73 = "'ทำอะไรผิดไปนะ! ฉันสินะที่ผิด! ผิดที่มาเล่นเกมอะไรแบบนี้อยู่นี่ไง!'"
1601903-77 = "'ไม่หรอกค่ะ ฉันคิดว่าเกมนี้สนุกนะคะ...'"
1601903-78 = "'อย่ามาโกหกเลย! ที่เล่นก็เพราะมีคนโดเนทให้ต่างหาก!\""
1601903-83 = "'ฉันจะไม่ยอมเล่นเกมนี้คนเดียวหรอก... ต้องแนะนำให้คนอื่นมาเล่นบ้าง...'"
1601903-84 = "[s] \"...\""
1601903-85 = "..."
1601903-86 = "มนุษย์และทุกสิ่งในโลกช่างหลากหลายจริงๆ เลยนะคะ"
1601903-87 = "[s7] \"ครูควรทำยังไงดีล่ะเนี่ย...\"\n[s8] \"โทคิของครูแปดเปื้อนอะไรแปลกๆ เข้าให้แล้ว...\""
1601903-90 = "วางใจเถอะค่ะ ฉันยังไม่ถึงขั้นนั้นหรอกค่ะ"
1601903-91 = "ค่ะ ตอนนี้ยังน่ะค่ะ"
1601903-92 = "แต่ต่อให้เป็นฉันคนนี้ ก็ยังมีรายการหนึ่งที่ดูยากค่ะ ถึงฉันจะพยายามทำอยู่เรื่อยๆ ก็เถอะ"
1601903-93 = "มันคืออะไรน่ะเหรอคะ?"
1601903-94 = "..."
1601903-95 = "วิถีนินจาสาว มิจิรุจจี้... หรือเปล่านะ เอาเป็นว่ามีแชนแนลแบบนั้นอยู่ค่ะ"
1601903-96 = "[s] \"...\""
1601903-97 = "คือว่า... มันเป็นการท้าทายตัวเองของฉันอย่างหนึ่งน่ะค่ะ ฉันพยายามดูให้จบหลายรอบแล้ว..."
1601903-98 = "แต่ก็ดูยากในหลายๆ แง่เลยค่ะ แชนแนลนั้นถือเป็นศัตรูที่เก่งกาจไม่เบาเลย ตอนนี้ก็ยังเป็นอย่างนั้นค่ะ"
1601903-99 = "ฉันรู้ว่าวันหนึ่งฉันจะแข็งแกร่งขึ้นจนทนดูให้จบได้ แต่ไม่น่าจะใช่ตอนนี้ค่ะ"
1601903-100 = "[s] \"ไม่ต้องแข็งแกร่งขึ้นเพื่อเรื่องแบบนั้นก็ได้นะ...\""
1601903-101 = "งั้นเหรอคะ? ถึงฉันจะไม่ค่อยแน่ใจว่าคุณครูจะสื่ออะไรก็เถอะ..."
1601903-102 = "ฉันมีงานอดิเรกอื่นนอกจากนี้หรือเปล่าน่ะเหรอคะ?"
1601903-103 = "อืม ก็พอมีค่ะ"
1601903-104 = "แต่ว่า คุณครูคะ ทั้งการดูรายการในอินเทอร์เน็ตและงานอดิเรกอื่นๆ เป็นแค่งานอดิเรก 'ชั่วคราว' ของฉันในตอนนี้ค่ะ"
1601903-105 = "ถึงตอนนี้ฉันจะสนใจสิ่งเหล่านี้อยู่ แต่ในอนาคตความสนใจก็อาจเปลี่ยนไปได้ง่ายๆ ค่ะ"
1601903-106 = "ที่เป็นอย่างนั้นก็เพราะว่า... งานอดิเรกจริงๆ ของฉันคือ..."
1601903-107 = "..."
1601903-108 = "เราจบเรื่องนี้กันเท่านี้ดีกว่าค่ะ"
1601903-109 = "[s] \"เดี๋ยวนี้ก็เปลี่ยนเรื่องคุยเก่งขึ้นแล้วนะ!\""
1601903-110 = "ต้องขอบคุณคุณครูน่ะค่ะ"
1601903-111 = "เพราะตอนนี้ฉันคืออะซุมะ โทคิที่กำลังเติบโตขึ้นเรื่อยๆ"
1601903-112 = "[s] \"อื้อ ตามนั้นก็ได้...\""
1601903-113 = "มนุษย์คือสิ่งมีชีวิตที่ได้รับอิทธิพลจากสิ่งรอบตัว"
1601903-114 = "และเติบโตขึ้นโดยการเปลี่ยนแปลงตัวเองและสิ่งแวดล้อมรอบตัวอย่างค่อยเป็นค่อยไป"
1601903-115 = "เพราะงั้น"
1601903-116 = "..."
1601903-117 = "เกมก็เลยสนุกค่ะ"
1601903-118 = "หนังสือการ์ตูนด้วยค่ะ"
1601903-119 = "[s] \"งั้นคงเข้ากับเด็กๆ ชมรมพัฒนาเกมได้เลยนะ...\""
1601903-120 = "ใช่ค่ะ ตอนนี้ฉันเริ่มเข้ากันได้ดีกับอาริสึแล้วค่ะ"
1601903-121 = "ถึงฉันจะชนะน้อยกว่าอยู่ 1 ครั้ง แต่ก็จะตามทันในไม่ช้าค่ะ"
1601903-122 = "แต่ว่ากับยูสึ..."
1601903-123 = "[s] \"คงไม่มีทางชนะเลยสินะ...\""
1601903-124 = "คุณครูก็รู้เหมือนกันสินะคะ..."
1601903-125 = "ฉันตระหนักได้แล้วว่าเมื่อฉันเผชิญกับความแตกต่างที่ยิ่งใหญ่ ฉันไม่แม้แต่จะโมโหเลยด้วยซ้ำค่ะ"
1601903-126 = "เพราะเมื่อเผชิญกับภัยพิบัติทางธรรมชาติ ไม่ว่าจะเป็นน้ำท่วม หรือพายุทอร์นาโด... มนุษย์ก็ไร้ซึ่งอำนาจทั้งนั้นละค่ะ"
1601903-127 = "[s] (ยูสึอยู่ในระดับภัยธรรมชาติเลยเหรอ...)"
1601903-129 = "(หลังจากเคลียร์งานและคุยกันไปพลางๆ คุณครูกับโทคิก็หารายการอินเทอร์เน็ตดูด้วยกัน)"
1601903-130 = "(ไม่นานนักโทคิก็เริ่มง่วงจนเอนตัวมาพิงไหล่...)"
