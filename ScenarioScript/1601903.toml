1601903-2 = "#wait;2500"
1601903-3 = "3;토키 결전;02;오늘의 정찰 보고드립니다. 선생님.\n#3;a\n#3;em;[반응]"
1601903-4 = "3;토키 결전;01;빠르게 결론부터 말씀드리자면, 대단한 일은 없었습니다.\n#3;greeting"
1601903-5 = "[s] \"응. 그건 다행이네.\""
1601903-6 = "3;토키 결전;03;네. 몇 개 부수고, 터트리고, 하는 김에 스트레스도 좀 풀고 그렇게 돌아왔으니까요.\n#3;em;[반짝]"
