[translation]
1601903-1 = "興趣（暫定）"
1601903-3 = "在此向您報告今天的偵察結果。老師。"
1601903-4 = "簡短從結論說起的話，並沒有發生什麼大事。"
1601903-5 = "[s] 「那真是太好了。」"
1601903-6 = "是的。只是隨手破壞、引爆了一些東西，順便發洩一下壓力後就回來了。"
1601903-7 = "[s] 「你不是說沒什麼大事嗎！？」"
1601903-8 = "不過這裡真的是個很神奇的地方。"
1601903-9 = "每次出去偵察，都會在同一個座標發生某些變化。"
1601903-10 = "其中唯一的共同點，就只有材質都是金屬而已。"
1601903-11 = "如果沒有座標系統的話，肯定會迷路的。"
1601903-12 = "某方面來說，就像進入了看不見出口的迷宮一樣。"
1601903-13 = "[s1] 「聽起來有點危險……」\n[s2] 「還是不要太常出去偵察好了……」"
1601903-16 = "那也有點困擾。"
1601903-17 = "這恐怕就是現場人員和內勤人員之間的隔閡吧。"
1601903-18 = "就在剛才，還有三隻類似金屬動物的東西朝這邊衝了過來。"
1601903-19 = "[s] 「不危險嗎！？」"
1601903-20 = "是的。很危險。"
1601903-21 = "因為它們可愛到差點讓我失去意識！"
1601903-22 = "[s] 「什麼……？」"
1601903-23 = "甚至還會撒嬌呢。"
1601903-24 = "像是翻過身來露出肚子，只要幫它們抓一抓就會很開心。"
1601903-25 = "[s3] 「啊！好羨慕！好狡猾！」\n[s4] 「不過那真的是金屬動物嗎……？」"
1601903-28 = "我想應該沒錯。"
1601903-29 = "因為它們看起來像是貓、狗和羊混合在一起的樣子。"
1601903-30 = "我本來想帶一隻回來，結果它們玩夠之後就跑回去了。"
1601903-31 = "以上，報告成功驅逐不明接近個體。"
1601903-32 = "[s] 「能遇到那種事情的話，我也要去！」"
1601903-33 = "很可惜，這是現場職位的特權。[ruby=V]耶[/ruby]。"
1601903-34 = "不過，在這裡發生的事情都必須視為機密，真是令人遺憾呢。"
1601903-35 = "我本來還想當成網路直播時的話題的說。"
1601903-36 = "[s] 「網路直播？」"
1601903-37 = "哎呀，您不知道嗎？"
1601903-38 = "這並不是個好消息呢。#n要是跟不上時代可是會被淘汰的。"
1601903-39 = "不過沒關係，我可以一輩子陪在您身邊。"
1601903-40 = "[s5] 「我知道什麼是直播啦！」\n[s6] 「只是覺得季會提到這種話題很新鮮而已！」"
1601903-43 = "哎呀，您不知道嗎？"
1601903-44 = "這並不是個好消息呢。#n老師居然對學生這麼不關心。"
1601903-45 = "剛好趁著這個機會跟您說，其實我最近經常會收看。"
1601903-46 = "請看。因為老師突然的漠不關心……"
1601903-47 = "那刻骨銘心的失落與悲傷，已經讓我什麼都做不了了。"
1601903-48 = "所以老師應該趕快摸摸我才對。"
1601903-52 = "（就這樣摸了摸季的頭……）"
1601903-54 = "嗯。真不錯呢。"
1601903-55 = "現在我已經恢復精神，成為「完全復活．Perfect季」了。"
1601903-56 = "[s] 「那真是太好了……」"
1601903-57 = "那麼讓我們回到剛才的話題吧。"
1601903-58 = "由於老師和其他學生，都推薦我尋找興趣。"
1601903-59 = "所以我就對所謂的「網路直播」產生了一點好奇。"
1601903-60 = "尤其是對於「斗內」的這個文化。"
1601903-61 = "只要金額夠多，實況主就必須聽從各種荒謬的對話和要求。"
1601903-62 = "簡直就是資本主義的極致呢。"
1601903-63 = "[s] 「季……你沒有做什麼奇怪的事情吧……？」"
1601903-64 = "並沒有。"
1601903-65 = "我主要是作為觀看的那一方。"
1601903-66 = "不過確實還挺有趣的呢。#n就比如這些──"
1601903-72 = "「我！使出了！氣功波！」"
1601903-73 = "「為什麼要這樣對我！玩這款遊戲的我簡直是大錯特錯！」"
1601903-77 = "「不會啊，我覺得這款遊戲還挺有趣的耶……」"
1601903-78 = "「少騙人了！你只是因為斗內收很爽才那麼說的吧！」"
1601903-83 = "「不能只有我受苦……得推薦給別人才行……」"
1601903-84 = "[s]「……」"
1601903-85 = "……"
1601903-86 = "世界之大無奇不有，人類也真是多采多姿呢。"
1601903-87 = "[s7] 「我該怎麼辦才好……」\n[s8] 「我們的季被奇怪的東西影響了……」"
1601903-90 = "請放心。我並沒有被影響。"
1601903-91 = "……嗯，至少現在還沒。"
1601903-92 = "然而即便是我，也有個幾經嘗試卻依舊難以欣賞下去的頻道。"
1601903-93 = "想知道是哪個頻道是嗎？"
1601903-94 = "……"
1601903-95 = "「少女忍法帖 小小三千留」……好像是叫這個名字吧。"
1601903-96 = "[s]「……」"
1601903-97 = "那個……雖然將其視為一種挑戰，好幾次嘗試想看完它……"
1601903-98 = "各方面都不容易呢……至今依然是個強敵。"
1601903-99 = "即便我遲早會變得更強，但現在的我還無法對付。"
1601903-100 = "[s] 「那種事不必變強也無所謂吧……」"
1601903-101 = "是嗎？我不太明白您的意思……"
1601903-102 = "問我還有沒有找到其他興趣是嗎？"
1601903-103 = "唔嗯，姑且還是有的。"
1601903-104 = "不過老師。#n網路直播也好，其他興趣也罷……對現在的我來說都是「暫定」的。"
1601903-105 = "充其量只是當前覺得有興趣，隨時可能會因為某些原因輕易改變。"
1601903-106 = "畢竟，我真正的興趣是……"
1601903-107 = "……"
1601903-108 = "這個話題就到此為止吧。"
1601903-109 = "[s] 「轉移話題的技術也變好了呢！」"
1601903-110 = "這都是託老師的福。"
1601903-111 = "因為我是每時每刻都在成長的飛鳥馬季。"
1601903-112 = "[s] 「這，這樣啊……」"
1601903-113 = "總之，人本來就會受到周圍的影響。"
1601903-114 = "並在改變自己和周圍的同時逐漸成長。"
1601903-115 = "因此……"
1601903-116 = "……"
1601903-117 = "遊戲，還挺有趣的呢。"
1601903-118 = "還有漫畫也是。"
1601903-119 = "[s] 「你跟遊戲開發部的孩子們……應該也很合得來吧……」"
1601903-120 = "是的。我和愛麗絲是很好的對手。"
1601903-121 = "雖然現在是我少贏一場，不過很快就能追上了。"
1601903-122 = "相較之下，柚子就……"
1601903-123 = "[s] 「那應該是不可能的領域吧……」"
1601903-124 = "老師也很清楚呢……"
1601903-125 = "我已經體會到，當真正巨大的差距擺在眼前時，甚至連不甘心的感情都不會產生。"
1601903-126 = "在洪水、颱風、龍捲風這樣的自然災害面前……人類只是無力的存在罷了。"
1601903-127 = "[s] （柚子是自然災害級別的嗎……）"
1601903-129 = "（就這樣在聊天的同時結束了工作，然後和季一起看了許多網路頻道）"
1601903-130 = "（……後來季靠在肩膀上打起了瞌睡）"
