1601903-10 = "3;토키 결전;99;유일한 공통점은, 그 재질이 모두 금속이라는 것 정도죠."
1601903-11 = "3;토키 결전;04;좌표계가 없으면, 분명 길을 잃고 말 것 같습니다.\n#3;em;[땀]\n#3;m3"
