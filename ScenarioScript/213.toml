[translation]
213-1 = "เยซ็อด รากฐานแห่งความบริสุทธิ์และอำนาจ"
213-4 = "อ๊ะ คุณครู! เข้ามาก่อนสิ!"
213-5 = "กำลังรออยู่เลยละ ฮ่าฮ่าฮ่า!"
213-6 = "หืม? ถึงจะพูดแบบนั้นแต่ว่าฉันดูเหมือนจะง่วงนอนงั้นเหรอ...?"
213-7 = "ปะ... เปล่านะ! ไม่ใช่แบบนั้นสักหน่อย..."
213-8 = "แป๊บหนึ่งนะ... สมาธิ! อื้อ ใช่แล้ว! ฉันแค่กำลังทำสมาธิอยู่น่ะ! "
213-9 = "เห็นมั้ยล่ะ? คิดแล้วเชียวว่าคุณครูจะต้องเข้าใจแน่ๆ!"
213-10 = "หืม? แล้วมีเรื่องอะไรน่ะเหรอ? อ๋อ จริงด้วย ฉันมีเรื่องจะคุยกับคุณครูนี่นา"
213-14 = "เรื่องอะไรนะ...?"
213-15 = "มะ... ไม่ใช่นะ! แน่นอนว่าฉันเองก็ชอบคุยกับคุณครูนะคะ แต่คราวนี้ฉันมีเรื่องสำคัญจริงๆ ค่ะ! ก็คือ... ก็คือ..."
213-16 = "นึกออกแล้ว!"
213-17 = "ฟังให้ดีนะคะคุณครู มันอาจฟังดูเหมือนเรื่องสนุก... แต่เปล่าเลยค่ะ นี่เรื่องใหญ่จริงๆ นะคะ"
213-18 = "อืม ได้ยินว่ามีสิ่งปลูกสร้างโลหะรูปร่างคล้ายกำแพงโผล่ขึ้นมาที่กลางทะเลที่ไกลมากๆ ไกลจนไม่มีเส้นทางเดินเรือแถวนั้นเลยค่ะ"
213-19 = "มันน่าแปลกใช่มั้ยล่ะคะ? ตอนแรกฉันคิดว่ามันอาจเป็นเรื่องลึกลับที่เป็นไวรัลในช่วงนี้"
213-20 = "แต่ฉันคิดว่าควรจะตรวจสอบก่อนก็เลยลองส่งโดรนลาดตระเวนไปดู..."
213-21 = "พอไปถึงพิกัดนั้นโดรนก็ส่งรูปกลับมาแค่หนึ่งรูปแล้วก็ขาดการสื่อสารไปเลย"
213-22 = "ฉันคิดว่ามันอาจจะติดอยู่ในกระแสอากาศแปรปรวนเลยส่งโดรนออกไปเพิ่ม แต่ก็หายไปเหมือนกันหมดเลย!"
213-23 = "แต่ก็มีเรื่องหนึ่งที่มั่นใจได้"
213-24 = "นั่นคือมีสิ่งปลูกสร้างรูปร่างเหมือนกำแพงอยู่ตรงนั้นจริงๆ! แล้วก็..."
213-25 = "ส่วนหนึ่งของกำแพงนั่นเปลี่ยนร่างเป็นบางอย่างคล้ายยักษ์ตัวใหญ่โตมโหฬารได้ด้วย!"
213-26 = "อ่า... ยักษ์โลหะที่ยืนอยู่บนกำแพงงั้นเหรอ สุดยอดเลย!"
213-27 = "ตัวจริงจะใหญ่แค่ไหน? จะมีพลังร้ายกาจแค่ไหนกันนะ? อยากลองแข่งงัดข้อด้วยจัง!"
213-28 = "ช่วงนี้ไม่ค่อยมีเรื่องให้ได้ไปยืดเส้นยืดสาย เลยรู้สึกคันไม้คันมือนิดหน่อย..."
213-29 = "หืม? มันฟังดูอันตรายเลยอยากให้ล้มเลิกความคิดนั้นไปดีกว่าเหรอคะ?"
213-30 = "พูดอะไรอย่างนั้นล่ะ คุณครู! เรื่องสมรรถภาพน่ะ... มันก็คือกีฬาอย่างหนึ่งนะคะ!"
213-31 = "เป็นการฝึกฝนที่มุ่งเน้นการสร้างความสมดุลระหว่างร่างกายและจิตใจด้วยความท้าทาย และการเอาชนะความเสี่ยงต่างๆ!"
213-32 = "แต่ฝ่ายงานด้านวัฒนธรรมและกีฬามีเอกสารที่ต้องจัดการอยู่เต็มไปหมด เลยปลีกตัวออกไปไม่ค่อยได้..."
213-33 = "ฮือออ... ไม่ชอบงานเอกสารเลย... มีแต่ทำให้ปวดหัวแล้วก็ไม่มีเวลาไปออกกำลังกาย..."
213-37 = "เพราะงั้นฉันเลยอยากขอให้คุณครูไปสืบสวนเรื่องยักษ์โลหะนั่น แทนองค์การนักเรียนหน่อยน่ะ!"
213-38 = "หืม? จะเดินทางไปได้ยังไงในเมื่อไม่มีเส้นทางเดินเรือน่ะเหรอ?"
213-39 = "นั่นสินะ ฉันก็กังวลเรื่องนั้นอยู่เหมือนกัน"
213-40 = "มีคนดีๆ บอกว่าจะช่วยแก้ปัญหาเรื่องนี้ให้ละ!"
213-41 = "ยานขนส่ง... ใช่มั้ยนะ? เห็นว่าเตรียมพาหนะที่จะใช้บินไปถึงที่นั่นไว้ให้ด้วยล่ะ!"
213-42 = "เป็นคนดีมากเลยใช่มั้ยล่ะ? ตอนลำบากก็ต้องช่วยกันแบบนี้ละ! "
213-43 = "ถ้าเกิดว่าคนคนนั้นขอให้ฉันช่วยอะไรบางอย่าง เช่น เรื่องออกกำลังกาย ฉันก็คงจะรีบวางงานเอกสาร แล้วไปช่วยทันทีเลยละ!"
213-44 = "จริงสิ คนคนนั้นฝากคำพูดมาถึงคุณครูด้วยนะ "
213-45 = "เห็นบอกว่าชื่อของยักษ์ใหญ่นั่นคือ <เยซ็อด> หรืออีกชื่อหนึ่งคือ <รากฐานแห่งความบริสุทธิ์และอำนาจ> น่ะ"
213-46 = "ฉันก็ไม่ค่อยรู้หรอกว่าที่คนคนนั้นพูดหมายถึงอะไร"
213-47 = "แต่ยังไงก็ฝากด้วยนะ คุณครู! และเดี๋ยวถ้ากลับมาแล้ว เราไปวิ่งด้วยกันนะ! "
213-51 = "อ่า..."
213-52 = "......"
213-53 = "นี่ คุณครู...?"
213-54 = "คือว่า... มีข้าวปั้นเหลือบ้างมั้ย?"
