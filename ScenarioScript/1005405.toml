[translation]
1005405-1 = "การตอบแทนของมารี"
1005405-2 = "สวนส่วนบุคคลด้านหลังวิหาร"
1005405-3 = "(คุณครูพอมีเวลาว่างเลยแวะมาที่วิหารของทรีนิตี้ หลังจากไม่ได้มาที่นี่นานแล้ว)"
1005405-4 = "(วันนี้เป็นวันที่เปิดให้คนทั่วไปเข้าชมได้ คุณครูเลยเดินมาที่สวนส่วนบุคคลด้านหลังวิหาร)"
1005405-9 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
1005405-16 = "แฮ่ก.. แฮ่ก... แฮ่ก..."
1005405-17 = "[ns1] \"...? เสียงคนหอบนี่?\"\n[ns2] \"ใครวิ่งจ๊อกกิ้งอยู่รึเปล่านะ?\""
1005405-20 = "เอ๊ะ เอ๋...?"
1005405-21 = "คุณครู...?"
1005405-22 = "[ns3] \"อื้อ...\"\n[ns4] \"เสียงนี้มัน...\""
1005405-29 = "คุณครูจริงๆ ด้วย เมื่อกี้เห็นอยู่ไกลๆ เลยไม่แน่ใจ ว่าแต่ว่ามาที่นี่มีอะไรรึเปล่าคะ..."
1005405-30 = "คะ...? แค่มาเฉยๆ ไม่ได้มีงานอะไรเป็นพิเศษงั้นเหรอคะ"
1005405-31 = "เปล่าค่ะๆ ไม่มีอะไรหรอกค่ะ ยินดีต้อนรับเสมอเลยค่ะ วิหารของเรายินดีต้อนรับทุกคนอยู่แล้วค่ะ"
1005405-32 = "อีกอย่างสำหรับคุณครูน่ะ... ยังคอยช่วยเหลือวิหารของเรา แถมยังคอยช่วยเหลือฉันเป็นการส่วนตัวอยู่#nเสมอเลยนี่คะ "
1005405-33 = "หืม? ทำไมถึงจ้องแบบนั้นละคะ..."
1005405-34 = "อ๋อ ชุดของฉัน...งั้นเหรอคะ?"
1005405-35 = "อ๋อ หมายถึงชุดนี้น่ะเหรอคะ วันนี้ทำงานเสร็จเร็วก็เลยเปลี่ยนเป็นชุดพละแล้วมาเล่นกีฬาน่ะค่ะ"
1005405-36 = "อันที่จริงมันก็ไม่เชิงว่าเป็นการเล่นกีฬาหรอกค่ะ... ฉันก็แค่วิ่งวนไปรอบๆ เท่านั้นเองค่ะ"
1005405-37 = "ฮิฮิ แต่หลังจากวันงานกีฬา ฉันก็มาวิ่งทุกวันไม่เคยขาดเลยค่ะ"
1005405-38 = "และการที่ฉันใส่ชุดพละได้เป็นธรรมชาติแบบนี้ ก็เพราะคุณครูเลยนะคะ"
1005405-39 = "ทั้งที่ตอนแรกๆ ลังเลที่จะเข้าร่วมงานกีฬาแท้ๆ เลยนะคะ"
1005405-40 = "เพราะคำพูดให้กำลังใจของคุณครู เลยทำให้ฉันได้ประสบการณ์สนุกๆ และเป็นได้อย่างตอนนี้ค่ะ"
1005405-41 = "ฉันนี่จริงๆ เลยนะคะ ไม่รู้จะพูดซ้ำๆ ให้คุณครูฟังทำไม แต่ฉันก็อยากขอบคุณคุณครูอยู่ดีค่ะ"
1005405-42 = "ถ้าเกิดว่าคราวหน้า... มีโอกาสแบบนี้อีกละก็ ฉันก็อยากเข้าร่วมงานแข่งกีฬาอีกค่ะ"
1005405-43 = "ถึงตอนนั้นอาจจะทำได้ดีกว่าครั้งนี้ก็ได้นะคะ...?"
1005405-44 = "[s5] \"ดีจังเลยน้าที่ครูช่วยได้น่ะ\"\n[s6] \"ดีเลยนะ ครูจะคอยเชียร์เอง\""
1005405-47 = "คุณครู..."
1005405-48 = "อืม... ไหนๆ คุณครูก็มาถึงที่นี่แล้ว ช่วยรอสักครู่ได้มั้ยคะ?"
1005405-49 = "เดี๋ยวฉันจะไปเปลี่ยนเป็นชุดซิสเตอร์ก่อน แล้วจะพาไปแนะนำสถานที่รอบๆ ให้เองค่ะ สิ่งที่ฉันพอจะทำ#nให้คุณครูได้ก็คงมีเท่านี้..."
1005405-50 = "ไม่เป็นไรงั้นเหรอคะ? แต่ว่า..."
1005405-51 = "คะ...?!"
1005405-52 = "ให้ฉันวิ่งต่อได้เลยงั้นเหรอคะ? ละ...แล้วถ้างั้นคุณครูล่ะคะ...?"
1005405-53 = "คุณครูจะนั่งพักผ่อนแล้วก็ดูฉันวิ่งไปด้วยงั้นเหรอคะ? มะ... ไม่ได้นะคะ! แบบนี้รู้สึกเหมือนฉันแย่งเวลา#nคุณครูมาเลย..."
1005405-54 = "เอ๋... ไม่ใช่แบบนั้นเหรอคะ? ถ้างั้นทำไมถึงทำแบบนั้นล่ะคะ...?"
1005405-55 = "[s7] \"คิดว่าถ้านั่งดูมารี ครูจะหายเหนื่อยได้เร็วขึ้นน่ะ\"\n[s8] \"ไม่ต้องคิดมากนะ นี่แหละวิธีฮิลลิ่งของครู!\""
1005405-58 = "ฉันไม่ค่อยเข้าใจเลย...ว่าคุณครูหมายความว่ายังไง..."
1005405-59 = "ถ้าคุณครูพูดแบบนั้น... ก็ตกลงค่ะ"
1005405-60 = "ถะ... ถ้างั้น..."
1005405-61 = "เดี๋ยวฉันมานะคะ...!"
1005405-67 = "(....)"
1005405-68 = "(จากนั้นคุณครูก็ไปนั่งที่ม้านั่ง และดูมารีวิ่งจ๊อกกิ้ง และทำท่ากายบริหารไปด้วย...)"
1005405-69 = "(ผ่านไปไม่นาน มารีก็ออกกำลังกายครบเซ็ตที่วางแผนเอาไว้)"
1005405-74 = "กลับมาแล้วค่ะ..."
1005405-75 = "ปะ...เป็นอะไรรึเปล่าคะ? ฉันใช้เวลานานไปหน่อย... คุณครูเบื่อหรือว่ารอจนเหนื่อยรึเปล่าคะ..."
1005405-76 = "มะ... ไม่ได้รู้สึกอย่างนั้นเลยเหรอคะ?"
1005405-77 = "อีกอย่าง... ตอนนี้สามารถดูได้อย่างสบายๆ แบบไม่ถูกคาดโทษด้วยงั้นเหรอคะ...?"
1005405-78 = "หมายความว่ายังไงคะ... ใครจะคาดโทษคุณครูเหรอคะ..."
1005405-79 = "ละ... ล้อเล่นงั้นเหรอคะ? แบบนี้นี่เอง... ฉันควรจะต้องขำใช่มั้ยคะ... แต่ฉันยังไม่ค่อยทันโลกเท่าไร เลยมีเรื่องที่ไม่รู้เยอะเลยค่ะ"
1005405-80 = "ยังไงก็เถอะค่ะ ฉันดีใจที่คุณครูพักจนหายเหนื่อยแล้วนะคะ ถึงไม่รู้ว่าจะทำประโยชน์ให้คุณครูได้มาก#nน้อยแค่ไหนก็เถอะค่ะ"
1005405-81 = "แต่ถ้ามันเป็นประโยชน์กับคุณครูได้ละก็ ฉันก็จะออกกำลังกายอย่างสนุกสนานทุกวันไม่ให้ขาดเลยค่ะ!"
1005405-82 = "คราวหน้าถ้าฉันเตรียมเครื่องดื่มและขนมไว้ด้วย คุณครูก็อาจจะพักผ่อนได้อย่างสบายขึ้นก็ได้นะคะ...?"
1005405-83 = "พอมาคิดๆ ดูแล้ว สวนนี่ทำให้รู้สึกสบายใจขึ้นจริงๆ นะคะ"
1005405-84 = "ถ้าคุณครูเข้ามานั่งพักผ่อนได้ทุกเวลาที่ต้องการก็คงจะดีนะคะ"
1005405-85 = "อ๊ะ... แต่ว่าที่นี่มีเวลาเปิดปิดกำหนดไว้อยู่ คงช่วยไม่ได้นะคะ..."
1005405-86 = "[s9] \"มารีเองก็ด้วย ถ้าเบื่อออกกำลังกายคนเดียวก็เรียกครูได้นะ\"\n[s10] \"ไม่เป็นไร ยังไงครูก็คงไม่ได้มานั่งที่นี่คนเดียวหรอกเนอะ\""
1005405-89 = "จะ... จู่ๆ ก็พูดแบบนั้น หมายความว่ายังไงคะ..."
1005405-93 = "ฮิฮิ... ฮิฮิฮิ..."
1005405-94 = "ค่ะ คุณครู ก็คงจะเป็นแบบนั้นแหละค่ะ "
1005405-95 = "ไหนๆ... คุณครูก็บอกว่าจะแวะมาที่นี่บ่อยๆ แล้ว..."
1005405-99 = "ถ้างั้นตอนนี้เรากลับกันดีมั้ยคะ?"
1005405-101 = "(จากนั้นทั้งสองคนก็เดินกลับไปที่วิหาร คุณครูรอมารีเปลี่ยนชุดอยู่ครู่หนึ่ง ก่อนที่มารีจะเดินไปส่ง#nคุณครูกลับชาเล่ต์)"
1005405-102 = "(อาจเป็นเพราะออกกำลังกายแล้วรู้สึกสดชื่น มารีจึงมีสีหน้ายิ้มแย้มตลอดทางที่เดินมา)"
