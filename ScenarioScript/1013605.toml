[translation]
1013605-1 = "訊號干擾"
1013605-2 = "（急忙前往英美最後一次發送信號的座標）"
1013605-3 = "（就在祈禱最壞的可能性不要發生，感到焦急萬分之時……！）"
1013605-6 = "呀齁～我在這裡哦，老師。#n等你好久了呢。"
1013605-7 = "[ns]「……！」"
1013605-9 = "[ns]「英美！」"
1013605-10 = "！？"
1013605-11 = "怎，怎麼了，老師？"
1013605-12 = "……你在生氣嗎？"
1013605-13 = "[s]「……」"
1013605-14 = "……"
1013605-15 = "原，原來是這樣……"
1013605-16 = "……"
1013605-17 = "對不起，老師。我，我……"
1013605-18 = "[s]「總之先回去吧。我們邊走邊說。」"
1013605-19 = "……"
1013605-20 = "嗯……"
1013605-21 = "[s]「……看到你平安無事，真是太好了。」"
1013605-22 = "嗯……"
1013605-25 = "那個……我當時正在進行偵察，結果回程路上發生了交戰。"
1013605-26 = "可能是輸出太多火力……背包的電池全部耗盡了。"
1013605-27 = "因為我的裝備全都跟背包裡的電池……也就是能量外殼連動的關係。"
1013605-28 = "雖然有把敵人的偵察隊全部殲滅，不過代價……就是變成了這樣。"
1013605-29 = "[s1]「……原來如此。」\n[s2]「不過，萬一真的出事了怎麼辦……」"
1013605-32 = "那個……對不起。"
1013605-33 = "可是，我還是覺得先殲滅敵人的偵察隊比較好。"
1013605-34 = "綜合各方面的條件來看，我認為那樣才是更有效率的作法。"
1013605-35 = "嗯？任何效率都不能拿我的安全來交換？"
1013605-36 = "……"
1013605-37 = "原來如此。"
1013605-38 = "也可以……這麼想呢。"
1013605-39 = "對不起，老師。別生氣了。"
1013605-40 = "老師現在的表情真的很可怕。"
1013605-41 = "以後我不會再這樣了。"
1013605-42 = "我向你保證。"
1013605-45 = "不過話又說回來……"
1013605-46 = "我其實沒想到會變得那麼危險。"
1013605-47 = "畢竟是在基地附近，電池耗盡之前也有發出求救信號。"
1013605-48 = "我本來就打算待在原地不動的。"
1013605-49 = "……"
1013605-50 = "對不起，這些全都是藉口。"
1013605-51 = "……"
1013605-52 = "真是不可思議。"
1013605-53 = "以前我只覺得找藉口是件沒效率的事。"
1013605-54 = "與其花時間辯解，不如用來解決或應對事態……我原本一直是這麼想的。"
1013605-55 = "……"
1013605-56 = "但是現在的我，或許……"
1013605-57 = "只是不想被老師討厭吧。"
1013605-58 = "[s3]「沒有那種事。我怎麼會討厭英美呢。」\n[s4]「我只是……很擔心你而已。真的非常擔心。」"
1013605-61 = "……"
1013605-62 = "呵呵，謝謝你。"
1013605-63 = "不過……老師。"
1013605-64 = "我有時候好像會跟一般的標準有點脫節。"
1013605-65 = "所以，我想向你提出一個請求。"
1013605-66 = "[s]「請求？」"
1013605-68 = "（英美停下了腳步）"
1013605-69 = "（就這樣輕輕閉上雙眼，並深深地吸了一口氣）"
1013605-75 = "請保護我。"
1013605-76 = "請注視著我。"
1013605-77 = "為了避免我走上歪路，請好好照顧我。"
1013605-78 = "我知道自己是個任性的人。"
1013605-79 = "也知道那樣會讓周圍的人感到不安。"
1013605-80 = "不過……你應該也知道吧？"
1013605-81 = "只要有老師在……"
1013605-82 = "我一定會沒事的。"
1013605-88 = "嗯？你說幼鳥總有一天要離開巢穴獨自飛翔？"
1013605-89 = "雖然是這樣沒錯……"
1013605-90 = "我現在才高中1年級而已，應該還處於能待在巢裡的時期吧？"
1013605-91 = "[s]「咦？仔細想想好像確實沒錯……？」"
1013605-92 = "呵呵。"
1013605-93 = "而且，就算是已經能獨自飛翔的鳥兒……"
1013605-94 = "這只是個假設……或者討論一下可能性而已……"
1013605-95 = "想找一個能共度餘生的夥伴，應該也很正常吧？"
1013605-96 = "[s]「這，這是什麼意思！？」"
1013605-99 = "沒什麼，我只是隨口說說而已。"
1013605-100 = "嗯，真的沒有特別的意思。"
1013605-101 = "不過你有注意到嗎，老師？"
1013605-107 = "現在老師的表情，已經不再那麼可怕了哦？"
