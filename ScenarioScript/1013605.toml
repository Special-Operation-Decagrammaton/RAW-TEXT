[translation]
1013605-1 = "Signal Obstruction"
1013605-2 = "I found the coordinates of Eimi's last signal and hurried there as fast as I could."
1013605-3 = "All the while, I was praying to myself the worst hadn't happened."
1013605-6 = "Ya-ho! Over here, Sensei. I've been waiting."
1013605-7 = "[ns] \"...!\""
1013605-9 = "[ns] \"Eimi!\""
1013605-10 = "?!"
1013605-11 = "Wh-What's wrong, Sensei?"
1013605-12 = "You're...mad?"
1013605-13 = "[s] \"...\""
1013605-14 = "..."
1013605-15 = "Oh, I see..."
1013605-16 = "..."
1013605-17 = "I'm sorry, Sensei. I..."
1013605-18 = "[s] \"For now, let's talk while we head back.\""
1013605-19 = "..."
1013605-20 = "Affirmative..."
1013605-21 = "[s] \"...I'm glad you're safe.\""
1013605-22 = "Y-Yeah..."
1013605-25 = "Well... I was on a reconnaissance mission. But I got into a skirmish on the way back."
1013605-26 = "I overdid it with the firepower, and my backpack battery died."
1013605-27 = "All of my equipment runs off of the energy cells that power my backpack."
1013605-28 = "I wiped out the enemy unit, but at the cost of... Well, you know from there."
1013605-29 = "[s1] \"...I see. That's what happened.\"\n[s2] \"What if something had happened to you...?\""
1013605-32 = "That's... I'm sorry."
1013605-33 = "I had to take all factors into account, though."
1013605-34 = "The most efficient plan of action was to take out the scouting party before it could find our base."
1013605-35 = "Huh? No amount of efficiency can make up for a lack of safety?"
1013605-36 = "..."
1013605-37 = "I see."
1013605-38 = "I can see it from your perspective."
1013605-39 = "I'm sorry, Sensei. Please don't be upset."
1013605-40 = "You look pretty scary right now, Sensei."
1013605-41 = "I promise. I'll always put my safety first from here on out, okay?"
1013605-42 = "I'll never do this again. Promise."
1013605-45 = "Still, though..."
1013605-46 = "I wasn't expecting things to end up like that."
1013605-47 = "Base was close enough, and I sent out a distress signal before my battery died."
1013605-48 = "I knew better than to move from that spot."
1013605-49 = "..."
1013605-50 = "...I know. I'm making excuses now."
1013605-51 = "..."
1013605-52 = "It's strange."
1013605-53 = "I used to think that excuses were inefficient at their core."
1013605-54 = "The time spent coming up with excuses could instead be focused on resolving the situation. So, to me, they made no sense."
1013605-55 = "..."
1013605-56 = "But now, I might..."
1013605-57 = "I just don't want you to hate me, Sensei."
1013605-58 = "[s3] \"That's not true. I could never hate you, Eimi.\"\n[s4] \"I was...just really, really worried. And scared.\""
1013605-61 = "..."
1013605-62 = "Heehee. Thank you."
1013605-63 = "But Sensei?"
1013605-64 = "Sometimes, I have a hard time figuring out what's wrong and right."
1013605-65 = "So, I have a request."
1013605-66 = "[s] \"A request?\""
1013605-68 = "Eimi hesitated for just a moment."
1013605-69 = "Closing her eyes, she took a deep breath in to steady herself."
1013605-75 = "Please look after me."
1013605-76 = "Please keep your eyes trained on me."
1013605-77 = "Please help keep me from straying from the right path."
1013605-78 = "I've always done things my own way."
1013605-79 = "And, sometimes, I'd forget that my actions can cause rippling effects in those who care about me."
1013605-80 = "But now? "
1013605-81 = "With you by my side, Sensei, I..."
1013605-82 = "I definitely know things will work out."
1013605-88 = "Huh? Birds have to leave the nest and fly on their own someday?"
1013605-89 = "That's true, but..."
1013605-90 = "I'm still a first year in high school. I still have a little more time in the nest, don't I?"
1013605-91 = "[s] \"Huh? Now that I think about it, you're right.\""
1013605-92 = "Heehee."
1013605-93 = "And even if I do leave the nest eventually..."
1013605-94 = "Now, this is just a hypothetical."
1013605-95 = "But I'll still need to find a partner to spend my life with, right?"
1013605-96 = "[s] \"Wh-What do you mean by that?!\""
1013605-99 = "Nothing at all. Just felt like it."
1013605-100 = "Yeah. Really, I wanted to try it out."
1013605-101 = "But did you know, Sensei?"
1013605-107 = "Your face isn't so scary anymore."
