[translation]
1013605-1 = "รบกวนสัญญาณ"
1013605-2 = "(คุณครูรีบมุ่งหน้าไปยังพิกัดที่ได้รับสัญญาณสุดท้ายจากเอมิ)"
1013605-3 = "(และในตอนที่กำลังภาวนาในใจขอไม่ให้เกิดเรื่องเลวร้ายที่สุดขึ้น...!)"
1013605-6 = "ยะฮู้ว ทางนี้ คุณครู ฉันกำลังรออยู่เลย"
1013605-7 = "[ns] \"...!\""
1013605-9 = "[ns] \"เอมิ!\""
1013605-10 = "?!"
1013605-11 = "มี... มีอะไรเหรอ คุณครู?"
1013605-12 = "โกรธ... งั้นเหรอ?"
1013605-13 = "[s] \"......\""
1013605-14 = "......"
1013605-15 = "งั้นเหรอ..."
1013605-16 = "......"
1013605-17 = "ขอโทษนะ คุณครู ฉัน... คือฉัน..."
1013605-18 = "[s] \"กลับไปแล้วค่อยคุยก็แล้วกัน\""
1013605-19 = "......"
1013605-20 = "อื้อ..."
1013605-21 = "[s] \"ค่อยยังชั่วนะที่ปลอดภัย\""
1013605-22 = "อะ... อื้อ..."
1013605-25 = "คือว่า... ระหว่างที่ลาดตระเวนก็มีการปะทะกันเกิดขึ้นน่ะ"
1013605-26 = "อาจเป็นเพราะใช้กระสุนพลังงานโจมตีเยอะเกินไป... ก็เลยใช้แบตของกระเป๋าเป้หมดเกลี้ยงเลย"
1013605-27 = "อุปกรณ์ของฉันมันเชื่อมต่อกับแบตในกระเป๋าเป้... หรือเอเนอจี้ เชลล์น่ะสิ"
1013605-28 = "ฉันทำลายกองกำลังลาดตระเวนของศัตรูได้ทั้งหมด... แต่ก็ตกอยู่ในสภาพนี้น่ะ"
1013605-29 = "[s1] \"อืม... อย่างนี้นี่เอง\"\n[s2] \"ยังไงก็เถอะ ถ้าเกิดเรื่องใหญ่ขึ้นมาจะทำยังไง...\""
1013605-32 = "เรื่องนั้น... ขอโทษนะ"
1013605-33 = "ยังไงก็เถอะ แต่ว่าในส่วนของการทำลายกองลาดตระเวนของศัตรูนั้น"
1013605-34 = "เมื่อพิจารณาจากองค์ประกอบทั้งหมด ฉันคิดว่ามันเป็นสิ่งที่มีประสิทธิภาพที่สุดแล้ว"
1013605-35 = "หืม? ถึงจะมีประสิทธิภาพแค่ไหนแต่มันก็แลกกับความปลอดภัยของฉันไม่ได้งั้นเหรอ?"
1013605-36 = "......"
1013605-37 = "นั่นสินะ"
1013605-38 = "จะคิดแบบนั้น... ก็ได้นี่นะ"
1013605-39 = "ขอโทษนะคุณครู อย่าโกรธฉันเลยนะ"
1013605-40 = "ตอนนี้หน้าตาคุณครูดูน่ากลัวมากๆ เลย"
1013605-41 = "ต่อไปฉันจะไม่ทำแบบนี้อีกแล้วละ สัญญา"
1013605-42 = "อื้อ ไม่ทำอีกแล้ว"
1013605-45 = "แต่ว่านะ..."
1013605-46 = "ฉันน่ะ... ไม่ได้คิดว่าตัวเองตกอยู่ในอันตรายขนาดนั้นหรอกนะ"
1013605-47 = "อย่างแรกเลย ฉันอยู่ใกล้ๆ ฐานแล้วก็ส่งสัญญาณขอความช่วยเหลือไป ก่อนที่แบตจะหมดแล้วด้วย"
1013605-48 = "แถมฉันก็ไม่มีความคิดที่จะเดินไปจากตรงนี้เลย"
1013605-49 = "......"
1013605-50 = "อื้อ ใช่แล้วละ ที่พูดมามันก็เป็นข้ออ้างทั้งนั้นแหละ"
1013605-51 = "......"
1013605-52 = "แปลกจังเลยนะ"
1013605-53 = "เมื่อก่อนนี้ ฉันคิดว่าการแก้ตัวเป็นเรื่องที่ไม่มีประสิทธิภาพ"
1013605-54 = "ฉันเคยคิดว่าแทนที่จะเอาเวลามาคิดหาคำแก้ตัว เอาสมองไปคิดหาวิธีรับมือ หรือแก้ไขสถานการณ์ซะยังเป็นอะไรที่มีประสิทธิภาพมากกว่า..."
1013605-55 = "......"
1013605-56 = "แต่ตัวฉันในตอนนี้น่ะ..."
1013605-57 = "บางทีฉันอาจไม่อยากถูกคุณครูเกลียดเอาก็ได้"
1013605-58 = "[s3] \"ไม่หรอก ครูไม่ได้เกลียดเอมิเลย\"\n[s4] \"ครูก็แค่... เป็นห่วงเอมิน่ะ เป็นห่วงมากๆ เลย\""
1013605-61 = "......"
1013605-62 = "ฮุฮุ ขอบคุณนะ"
1013605-63 = "แต่รู้มั้ยคุณครู?"
1013605-64 = "บางทีฉันก็รู้สึกว่าตัวเองไม่ค่อยเข้าใจเรื่องเกณฑ์มาตรฐานของคนทั่วไปน่ะ"
1013605-65 = "เพราะงั้น ฉันอยากให้คุณครูช่วยน่ะ"
1013605-66 = "[s] \"อยากให้ช่วยเหรอ?\""
1013605-68 = "(เอมิหยุดอยู่ที่เดิมครู่หนึ่ง)"
1013605-69 = "(เธอค่อยๆ หลับตาลงและสูดหายใจเข้าลึกๆ)"
1013605-75 = "ช่วยปกป้องฉัน"
1013605-76 = "และช่วยดูแลฉันด้วยนะคะ"
1013605-77 = "ช่วยดูแลไม่ให้ฉันหลงทางด้วยนะคะ"
1013605-78 = "ฉันเป็นพวกชอบทำอะไรตามใจตัวเอง..."
1013605-79 = "เพราะแบบนั้นเลยทำให้คนรอบตัวรู้สึกไม่ปลอดภัย"
1013605-80 = "แต่ว่านะ... "
1013605-81 = "ถ้ามีคุณครูอยู่ด้วย"
1013605-82 = "ฉันคงจะไม่เป็นอะไรแน่ๆ"
1013605-88 = "หืม? สักวันนกน้อยก็จะต้องออกจากรังและโผบินไปด้วยตัวเองงั้นเหรอ?"
1013605-89 = "มันก็จริงอยู่หรอก..."
1013605-90 = "แต่ฉันเพิ่งจะอยู่ม.ปลายปี 1 เองนะ น่าจะยังอยู่ในรังต่อได้ไม่ใช่เหรอ?"
1013605-91 = "[s] \"หืม? พอคิดดูแล้วก็ใช่นะ...\""
1013605-92 = "ฮุฮุ"
1013605-93 = "แล้วรู้ไหมว่าถึงจะเป็นนกที่บินได้ด้วยตัวเอง"
1013605-94 = "คือ... มันก็แค่เรื่องราวของความเป็นไปได้นะ..."
1013605-95 = "มันอาจจะอยากตามหาคู่ที่จะใช้เวลาที่เหลือด้วยกันก็ได้"
1013605-96 = "[s] \"ที่พูดนั่นหมายความว่ายังไงน่ะ?!\""
1013605-99 = "ไม่มีอะไรหรอก ฉันก็แค่พูดไปงั้นแหละ"
1013605-100 = "อื้อ ฉันแค่พูดไปเฉยๆ น่ะ"
1013605-101 = "ว่าแต่ว่ารู้อะไรมั้ย คุณครู?"
1013605-107 = "ตอนนี้สีหน้าของคุณครูน่ะ ไม่น่ากลัวแล้วละ"
