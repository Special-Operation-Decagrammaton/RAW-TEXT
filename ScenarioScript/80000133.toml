[translation]
80000133-1 = "ระลึกชาติ"
80000133-2 = "(วันหนึ่ง ขณะที่คุณครูกำลังนั่งทำงานอยู่ที่สำนักงานชาเล่ต์...)"
80000133-7 = "สวัสดี ครู..."
80000133-8 = "[s] \"โอ้ะ คาโนเอะ! มีอะไรเหรอ?\""
80000133-9 = "อิฮิฮิฮิ..."
80000133-10 = "ฉันติดต่อมาเพราะอะไร... ถ้าเป็นครูละก็น่าจะรู้อยู่แล้วนะ...?"
80000133-11 = "เพราะครูกับฉันน่ะ... เชื่อมโยงกันอยู่ด้วยด้ายแดงแห่งโชคชะตายังไงล่ะ"
80000133-12 = "[s] \"หรือว่า... ช็อกโกแลต?\""
80000133-13 = "ถูก... ต้อง"
80000133-14 = "และนี่ไม่ใช่ช็อกโกแลตธรรมดาๆ หรอกนะ แต่นี่คือมัฟฟินช็อกโกแลตที่น่ารักมากๆ ต่างหาก..."
80000133-15 = "ฉันนำวัตถุดิบสุดพิเศษที่อัดแน่นด้วยความรักของฉันใส่ลงในหม้อปรุงยา แล้วทำมันขึ้นมายังไงล่ะ"
80000133-16 = "เป็นไง? ลองกินดูหน่อยมั้ย...?"
80000133-17 = "[s] \"เอาสิ! ก็คาโนเอะทำอาหารอร่อยนี่นา!\""
80000133-18 = "ต้องอย่างนี้สิ ฉันกำลังรอคำตอบนั้นอยู่เลย"
80000133-19 = "ฮิฮิ... อิฮิฮิฮิ...!"
80000133-20 = "[s1] \"อืม แต่ครูมีธุระข้างนอก ตอนนี้อาจจะยังไม่สะดวกน่ะสิ\"\n[s2] \"ไว้กลับมาค่อยมานั่งกินด้วยกันสบายๆ ดีมั้ย?\""
80000133-23 = "ตอนนี้แหละ..."
80000133-24 = "[s] \"ตะ... ตอนนี้เลยเหรอ? ครูมีเวลาแค่ 30 นาทีเองนะ...\""
80000133-25 = "ไม่ต้องห่วงหรอกนะ..."
80000133-26 = "คิดแล้วว่าจะต้องเป็นแบบนี้... เพราะงั้นเลยเตรียมทุกอย่างไว้แล้วละ"
80000133-27 = "ก๊าาา! ก๊าาาา...!!"
80000133-28 = "[ns] \"สะ... เสียงนี้มัน...?!\""
80000133-34 = "คิดแล้วว่าต้องเป็นแบบนี้..."
80000133-35 = "ฮิฮิ... ฉันนี่เก่งรอบด้านจริงๆ"
80000133-36 = "[s] \"มะ... มาตั้งแต่เมื่อไรน่ะ?!\""
80000133-37 = "เรื่องนั้นมันไม่สำคัญหรอก"
80000133-38 = "เรื่องสำคัญก็คือ... ตอนนี้ฉันอยู่ตรงหน้าครูแล้วต่างหาก"
80000133-39 = "เอาละ หลับตาหน่อยได้มั้ย...?"
80000133-40 = "(แววตาของคาโนเอะเต็มไปด้วยความคาดหวัง)"
80000133-41 = "(คุณครูจึงยอมทำตามที่คาโนเอะบอก)"
80000133-46 = "ฮิฮิ... รอแป๊บหนึ่งนะ..."
80000133-50 = "ก๊าาา~! ก๊าาาา~!"
80000133-53 = "แง๊ววว~! แง๊ววววว~!"
80000133-54 = "[ns] \"ดูเหมือนเสียงของพวกสัตว์จะดังขึ้นเลยแฮะ...?\""
80000133-55 = "มารวมตัวกันเพราะได้กลิ่นรึเปล่านะ..."
80000133-56 = "มัฟฟินพิเศษนี่... ฉันทำให้คุณครูคนเดียวนะ..."
80000133-57 = "ออกไปก่อนเถอะ เดี๋ยวฉันจะทำให้พวกเธอทีหลัง..."
80000133-63 = "เอาละ เสร็จแล้วละ ลืมตาขึ้นได้แล้ว..."
80000133-68 = "คุณครู..."
80000133-69 = "[ns3] \"บะ... บรรยากาศแบบนี้...?\"\n[ns4] \"คาโนเอะโหมดน่ารักคาวาอี้...!\""
80000133-72 = "เอ้า รับไปสิ ความรู้สึกของฉันที่มีให้คุณครู"
80000133-77 = "คาโนเอะ... ไม่ว่ายังไงก็อยากให้ช็อกโกแลตกับคุณครูให้ได้"
80000133-78 = "ถ้าทำแบบนี้ความทรงจำในชาติก่อนจะต้องกลับมาได้แน่ๆ"
80000133-79 = "ความทรงจำที่เราเคยแบ่งช็อกโกแลตกินด้วยกัน..."
80000133-80 = "เพราะงั้นรีบๆ กินสิ"
80000133-81 = "มัฟฟินพิเศษของฉัน...!"
80000133-82 = "[s] \"...!!!\""
80000133-83 = "(คุณครูหยิบมัฟฟินช็อกโกแลตของคาโนเอะมากินโดยไม่รู้ตัวราวกับถูกอะไรบางอย่างสิง...!)"
80000133-88 = "เป็นยังไง? อร่อยมั้ย?"
80000133-89 = "[s] \"อร่อยสุดๆ เลย...!!\""
80000133-90 = "อ่า...!"
80000133-91 = "ฉันคิดแล้วว่าคุณครูจะต้องชอบ!"
80000133-96 = " ......"
80000133-97 = "ฮิฮิ... อิฮิฮิฮิ..."
80000133-98 = "ดูดซับตัวฉันเข้าไปแล้ว... เท่านี้พิธีก็สำเร็จแล้ว"
80000133-99 = "ตอนนี้ครูก็เป็นของฉันตลอดกาล...! อิฮิฮิฮิ...!"
80000133-100 = "เอาละ... บอกมาสิว่าฉันเป็นใคร?"
80000133-101 = "ฉันเป็นใครสำหรับคุณครูในชาติที่แล้ว...?"
80000133-102 = "[ns5] \"ลูกแมวน้อยที่น่ารัก...!\"\n[ns6] \"อีกาตัวน้อยแสนฉลาด...!\""
80000133-106 = "หรือว่าจำนวนมันยังไม่พอที่จะทำให้พิธีสมบูรณ์นะ..."
80000133-107 = "งั้นคงต้องกินไปเรื่อยๆ จนกว่าจะระลึกได้..."
80000133-108 = "ฉันทำมาเผื่อไว้สำหรับสถานการณ์แบบนี้แล้วละ"
80000133-110 = "(หลังจากนั้นคุณครูก็สนุกกับการกินมัฟฟินช็อกโกแลตของคาโนเอะ จนกระทั่งถึงเวลาต้องออกไปธุระ)"
80000133-111 = "(น่าเสียดายที่ความทรงจำในชาติก่อนก็ยังไม่กลับมาอยู่ดี...)"
80000133-117 = "แต่ว่า... ไม่เป็นไรหรอก..."
80000133-118 = "ถ้าทำแบบนี้ซ้ำอีกสัก 2-3 ครั้งละก็..."
80000133-119 = "ฮิฮิ... อิฮิฮิฮิ...!"
