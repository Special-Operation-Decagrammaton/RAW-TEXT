[translation]
80000133-1 = "Until You Remember Your Previous Life"
80000133-2 = "It was another work-filled day at Schale..."
80000133-7 = "Hello, Sensei..."
80000133-8 = "[s] \"Oh, Kanoe! Why'd you call? Are you all right?\""
80000133-9 = "Eheeheehee..."
80000133-10 = "The reason I reached out... Surely, you, of all people, already know?"
80000133-11 = "Since we...are connected through fate's red thread..."
80000133-12 = "[s] \"Is it because of...chocolate?\""
80000133-13 = "Correct."
80000133-14 = "And it's not just any chocolate, but a very cute chocolate muffin..."
80000133-15 = "I made it with love...and by melting special ingredients in an alchemy furnace."
80000133-16 = "What do you say? Would you like to try it...?"
80000133-17 = "[s] \"Yeah! Your dishes are always delicious, after all!\""
80000133-18 = "Yeah. That's the answer I was waiting for."
80000133-19 = "Heehee, eheeheehee...!"
80000133-20 = "[s1] \"Mm, but I have to head out on a business trip soon.\"\n[s2] \"Can I catch you on my way back and try it?\""
80000133-23 = " ...Right now would be best."
80000133-24 = "[s] \"R-Right now? But I only have about 30 minutes before...\""
80000133-25 = "Don't worry..."
80000133-26 = "I knew this would happen... So I already completed all the preparations."
80000133-27 = "Caw! Caaw...!"
80000133-28 = "[ns] \"Th-That must be...?!\""
80000133-34 = " ...I knew this would happen."
80000133-35 = "Heehee... I truly am a capable woman."
80000133-36 = "[s] \"Wh-When did you get here?!\""
80000133-37 = "That's not important right now."
80000133-38 = "What's actually important...is that I'm in front of you."
80000133-39 = "Now then, would you kindly close your eyes...?"
80000133-40 = "Her gaze was locked in anticipation."
80000133-41 = "I decided to do what she said."
80000133-46 = "Heehee... Wait just a little longer..."
80000133-50 = "Caw! Cacaaw!"
80000133-53 = "Meow! Meooow!"
80000133-54 = "[ns] \"Did you bring MORE animals in here...?\""
80000133-55 = "Perhaps the smell lured them."
80000133-56 = "But this special muffin...is only for you, Sensei..."
80000133-57 = "The rest of you should leave. I'll make yours later..."
80000133-63 = "Very well. You can open your eyes now..."
80000133-68 = "Sensei..."
80000133-69 = "[ns3] \"Th-The room changed...?\"\n[ns4] \"Kanoe, everything is so cute...!\""
80000133-72 = "Here, please take it. It...holds my feelings for you, Sensei."
80000133-77 = "I...truly wanted to share some special chocolate with you."
80000133-78 = "This should help you recover your memories...from your previous life..."
80000133-79 = "...I made you something very similar, if you can remember."
80000133-80 = "Please enjoy this..."
80000133-81 = "My...special muffin...!"
80000133-82 = "[s] \"...!!\""
80000133-83 = "As if bewitched, I placed Kanoe's chocolate muffin in my mouth...!"
80000133-88 = "How is it? Good?"
80000133-89 = "[s] \"It's absolutely fantastic...!\""
80000133-90 = "Ah...!"
80000133-91 = "I knew it! I knew you'd like it, Sensei!"
80000133-96 = " ..."
80000133-97 = "...Heehee. Eheeheehee."
80000133-98 = "Sensei has taken me in... Now, the ritual is complete."
80000133-99 = "With this, you are forever mine...! Eheeheehee...!"
80000133-100 = "Now...tell me. Who am I?"
80000133-101 = "What was I to you in your previous life...?"
80000133-102 = "[ns5] \"A cute kitten...!\"\n[ns6] \"A clever little crow...!\""
80000133-106 = "...Perhaps that wasn't enough to complete the ritual."
80000133-107 = "In that case, you should keep eating until you remember..."
80000133-108 = "I baked quite a few...just in case this happened."
80000133-110 = "I had fun with Kanoe, eating delicious chocolate muffins until I had to leave for my business trip."
80000133-111 = "Unfortunately, I couldn't recall any memories from my previous life..."
80000133-117 = "But...it's okay..."
80000133-118 = "We'll repeat this a few more times..."
80000133-119 = "Heehee. Eheeheehee...!"
