[translation]
80000133-2 = "（在夏萊的辦公室正忙著工作的某一天……）"
80000133-7 = "你好，老師……"
80000133-8 = "[s] 「哦，鹿江！有什麼事嗎？」"
80000133-9 = "咿嘻嘻……"
80000133-10 = "我聯絡你的原因……老師應該已經知道了吧……？"
80000133-11 = "老師和我……是被命運的紅線牽在一起的嘛……"
80000133-12 = "[s] 「該不會……是巧克力？」"
80000133-13 = "正──確。"
80000133-14 = "而且不是普通的巧克力，是非常可愛的巧克力瑪芬喔……"
80000133-15 = "將滿載我愛意的特別材料，在煉金術的窯爐中熔煉而成。"
80000133-16 = "如何？想吃看看嗎……？"
80000133-17 = "[s] 「嗯！因為鹿江做的料理都很好吃嘛！」"
80000133-18 = "嗯。我就在等你這個回答。"
80000133-19 = "咿嘻，咿嘻嘻嘻……！"
80000133-20 = "[s1] 「嗯，不過我馬上有外出的工作，現在有點不太方便。」\n[s2] 「回來的時候再碰面，悠哉地吃可以嗎？」"
80000133-23 = " ……現在比較好。"
80000133-24 = "[s] 「現，現在？可是只剩下30分鐘左右的時間……」"
80000133-25 = "別擔心……"
80000133-26 = "我就料到會這樣……所以已經做好了所有準備。"
80000133-27 = "嘎啊！嘎啊啊啊……！"
80000133-28 = "[ns] 「這，這個聲音是……！？」"
80000133-34 = " ……我就知道會這樣。"
80000133-35 = "咿嘻……不愧是我，果然是個能幹的女人。"
80000133-36 = "[s] 「你，你什麼時候來的！？」"
80000133-37 = "那不重要。"
80000133-38 = "重要的是……我現在就在老師的面前這個事實而已。"
80000133-39 = "來，可以閉上眼睛嗎……？"
80000133-40 = "（他的眼中充滿了期待）"
80000133-41 = "（先安靜地照他說的做看看吧）"
80000133-46 = "嘻嘻……稍等一下……"
80000133-50 = "嘎啊～嘎啊啊啊～！"
80000133-53 = "喵～喵喵喵～！"
80000133-54 = "[ns] 「動物的聲音好像變更多了……？」"
80000133-55 = "是聞到味道聚過來的嗎……"
80000133-56 = "這個特別的瑪芬……是只為老師準備的呀……"
80000133-57 = "先出去吧。你們的份之後會另外給的……"
80000133-63 = "好。這下沒問題了。可以睜開眼睛了……"
80000133-68 = "老師……"
80000133-69 = "[ns3] 「氣，氣氛怎麼……？」\n[ns4] 「是可愛的鹿江模式嗎……！」"
80000133-72 = "來，收下吧。這是我對老師的心意。"
80000133-77 = "鹿江……無論如何都想送巧克力給老師。"
80000133-78 = "這樣的話，前世的記憶一定會浮現出來的。"
80000133-79 = "一起分享巧克力的，那段回憶也……"
80000133-80 = "所以，快點吃吧。"
80000133-81 = "我的，特別的瑪芬……！"
80000133-82 = "[s] 「……！！！」"
80000133-83 = "（彷彿被什麼吸引了一般，把鹿江的巧克力瑪芬放入了口中……！）"
80000133-88 = "如何？好吃嗎？"
80000133-89 = "[s] 「夢幻般的味道……！！」"
80000133-90 = "啊啊……！"
80000133-91 = "不愧是老師！我就知道你會喜歡的！"
80000133-96 = " ……"
80000133-97 = "……咿嘻。咿嘻嘻嘻。"
80000133-98 = "吸收了我……這樣儀式就完成了。"
80000133-99 = "現在老師永遠都是我的了……！咿嘻嘻嘻嘻……！"
80000133-100 = "來……告訴我。我是誰？"
80000133-101 = "我在前世是老師的什麼……？"
80000133-102 = "[ns5] 「可愛的小貓咪……！」\n[ns6] 「聰明的小烏鴉……！」"
80000133-106 = "……要完成儀式的話數量還不夠嗎。"
80000133-107 = "那麼，就吃到想起來為止……"
80000133-108 = "為了這種情況，我準備了一大堆呢。"
80000133-110 = "（之後到出門前一直和鹿江吃著巧克力瑪芬，度過了愉快的時光）"
80000133-111 = "（很可惜前世的記憶並沒有浮現……）"
80000133-117 = "但是……沒關係的……"
80000133-118 = "只要再重複幾次的話……"
80000133-119 = "咿嘻……咿嘻嘻嘻……！"
