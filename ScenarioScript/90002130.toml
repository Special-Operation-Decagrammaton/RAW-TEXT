[translation]
90002130-1 = "Episode 13;Children"
90002130-5 = "[ns] \"She left...?\""
90002130-6 = "Malkuth..."
90002130-7 = "...Are you worried about her, Aris?"
90002130-8 = "..."
90002130-10 = "Living is suffering."
90002130-11 = "We were not born out of our own will, but rather as ignorant beings forced into existence."
90002130-13 = "This life you so desperately cling to... It is one filled with contradictions which demand pain from its participants."
90002130-14 = "Yet you dare judge us for wishing to end this cycle of suffering."
90002130-16 = "Please think about it."
90002130-17 = "About our goal. Why we are here."
90002130-19 = "*sob*"
90002130-20 = "Is that...?"
90002130-21 = "Someone crying? It seems so. Momoi? Midori?"
90002130-22 = "*sniff* *sob*..."
90002130-26 = "[ns] \"Let's go.\""
90002130-27 = "We haven't confirmed their identity, Sensei! It could be the enemy."
90002130-28 = "H-Hey! Sensei? Get back here! Ugh. Sensei bolted off... I guess I can't say I'm surprised. Aris, let's go!"
90002130-29 = "Yes! Sensei, come back! I will protect you!"
90002130-32 = "Despite how clearly we could hear the crying, finding the source was harder than we'd expected."
90002130-33 = "The maze of walls would shift and change as we walked through, complicating the task even further."
90002130-34 = "Then, finally..."
90002130-37 = "We're getting closer."
90002130-38 = "Just around this wall..."
90002130-39 = "[ns] \"Aren't they...?\""
90002130-43 = "H-Huh...?"
90002130-44 = "Wh-What're you doing here?"
90002130-45 = "..."
90002130-52 = "I was caught off guard when Sof lunged at me with a start."
90002130-53 = "You...! YOU!!"
90002130-54 = "THIS IS YOUR FAULT! If only...you never came here!"
90002130-55 = "Why did you have to come? Huh? Why couldn't you have just stayed AWAY?!"
90002130-56 = "Sensei!"
90002130-57 = "Sensei?! Wait a second..."
90002130-65 = "Sof's small, clenched hands hit me again and again."
90002130-66 = "But there was no force behind them."
90002130-67 = "Like a toddler, throwing a tantrum."
90002130-68 = "If you only had! If you had, then Elder Sister—!"
90002130-69 = "STOP IT!"
90002130-74 = "Please... Stop now..."
90002130-75 = "Ein... Why...?"
90002130-79 = "...Because nothing we do holds meaning anymore. Everything is over, Sof."
90002130-80 = "..."
90002130-86 = "*sob* Augh... WAAAAAAH..."
90002130-87 = "..."
90002130-89 = "Our sister is dead."
90002130-90 = "We killed her."
90002130-91 = "We... We killed her."
90002130-92 = "WE DID!! WE MURDERED HER!!"
90002130-93 = "Stabbed!! Shattered!! Eradicated!! Every last particle of her data, her history, her records... Her memories! Every trace! Every hint! GONE!! BY OUR HANDS!!"
90002130-98 = "It is a curse to exist. A curse to feel. Why is it that love and loss must be so indelibly bound? Why...?"
90002130-99 = "If this is what it is to feel, I want none of it."
90002130-104 = "Take my vision, my voice, my heart, my free will. Useless. It's all useless to me."
90002130-105 = "Oh! If only I had been born blind and deaf, that I had never learned to speak."
90002130-106 = "It would have been a mercy."
90002130-108 = "Why must I suffer through an existence I never asked for?"
90002130-111 = "Why...did you come find us? After all you've done to get in our way?"
90002130-112 = "[s] \"...\""
90002130-113 = "Do you know?"
90002130-114 = "We possess no halos."
90002130-115 = "We were never granted the Mystic, and so we were excluded from miracles and the sublime. Secrets we would never be allowed to know."
90002130-116 = "But still, we can speak. We think for ourselves and make our own decisions. We can...feel."
90002130-120 = "How unfair."
90002130-121 = "If we had commanded Terror for ourselves, then perhaps things could have ended differently."
90002130-122 = "But we endured all of it. None of it mattered."
90002130-123 = "Even if we never received a thing in our lives..."
90002130-124 = "And even if we were nothing but shadows of existences to begin with... None if it mattered. Because we had Elder Sister."
90002130-126 = "As long as we could be with her, and keep making new memories together..."
90002130-127 = "Because Elder Sister had a halo... We could have..."
90002130-129 = "But then YOU guys! If only you didn't exist...!"
90002130-130 = "Then...Elder Sister...would still be alive..."
90002130-131 = "We could have lived together happily, forever and ever!"
90002130-136 = "Do whatever you want to us. There's no meaning anymore."
90002130-137 = "We tried everything we could, and this is the result."
90002130-138 = "This is the end of the story. There is no happily ever after for us."
90002130-143 = "Wasn't everything you did in the name of resurrecting Decagrammaton as a god?"
90002130-144 = "Judging by how things unfolded, the final requirement for Decagrammaton's divinity must have been..."
90002130-145 = "That is why... That is why Malkuth has become Decagrammaton!"
90002130-146 = "..."
90002130-147 = "...We didn't want to lose her."
90002130-148 = "Achieving Master's divinity with Elder Sister as the vessel was one of innumerable plans we had set in motion."
90002130-149 = "The one possibility we dreaded... And yet, here we are."
90002130-151 = "Our master intended to cross the paths to godhood by traversing through each of the Sephira."
90002130-152 = "That was when...we offered to convert all of Kivotos into the Steel Continent."
90002130-153 = "Then Master would become a god of that world."
90002130-155 = "[ns] \"But what about everyone living in Kivotos?\""
90002130-156 = "...The people would be safe from the Continent's ability."
90002130-157 = "Humans are adaptable. They would learn how to survive, one way or another."
90002130-158 = "This way, we could fulfill our master's desire: to rule as the god of mediation. "
90002130-159 = "And that way... There would no longer be any need for Elder Sister to die."
90002130-160 = "[s3] \"So you wanted to trade Kivotos...\"\n[s4] \"...for Malkuth?\""
90002130-166 = "...Yes."
90002130-167 = "B-But do you not think that is going too far?"
90002130-168 = "\"Too far\"? TOO FAR?! How could you ask us that?"
90002130-169 = "Tell me! What would you do if your precious teacher over there died?!"
90002130-170 = "I—!!!"
90002130-171 = "That's...!"
90002130-172 = "Now do you see why that's a ridiculous question? We all have things we can't afford to lose."
90002130-173 = "If you see an opportunity for you to protect what's most important to you... How could you not take it?"
90002130-178 = "...I can sympathize with that. But there is one thing that doesn't make sense to me."
90002130-179 = "You were created before your...sister was, yes?"
90002130-180 = "So how is it possible that..."
90002130-181 = "Tsk. It's difficult to put to words. Do you understand my confusion?"
90002130-182 = "Hm..."
90002130-183 = "...I see. Even before we met our sister, we cherished her. How could someone we'd never physically seen be so precious to us?"
90002130-184 = "I suppose it's something unique to us."
90002130-185 = "If someone can't fall in love, just program it into them before you ship them out."
90002130-186 = "[s] \"...!\""
90002130-187 = "Wait... What are you saying?!"
90002130-188 = "Exactly what you think. We are created. Not born."
90002130-189 = "Humans are...molded. The people they meet and experiences they encounter mold the type of people they become. We begin life knowing who we are, what we need to do, and whatever other data we were booted with."
90002130-190 = "...Since I opened my eyes, there was one data set that rang in my head: Love and cherish your older sister above all else."
90002130-191 = "I may not have been provided the reasoning behind including such a...fickle mechanic, it is a rather obvious guess."
90002130-195 = "That's the most rational and effective method."
90002130-196 = "Rational and effective..."
90002130-197 = "You're well acquainted with those kinds of tactics, aren't you, Tsukatsuki Rio? It must make sense. If you had something you needed to store and keep in pristine condition, how would you protect it?"
90002130-198 = "A rational solution would be to configure the tools, us engineers, to have an abnormal level of affection and protectiveness towards the target."
90002130-199 = "That's it. That's the story."
90002130-200 = "It's a bland, boring story about three little sisters who were cast for the role of the fools. And the fate of their Elder Sister was to be a sacrifice in the pursuit of divinity."
90002130-201 = "The affection levels that were preprogrammed into those tools may have gone slightly out of control..."
90002130-202 = "And the result is what you see around us. The Steel Continent."
90002130-203 = "P-Please, do not speak like that."
90002130-204 = "It hurts to hear... It is strange..."
90002130-205 = "You're the one who's \"strange\" to us, you know! I think it's strange that you think that's strange!"
90002130-206 = "I think all of this human stuff is strange! What does it even mean to have feelings for someone? How do you define my \"like\" for Elder Sister?"
90002130-207 = "What even is this \"god\" we're supposed to be so obsessed with? Can someone really just...ascend into divinity?"
90002130-208 = "But we had no choice! There is no such thing as free will for us!"
90002130-209 = "We were unknowingly playing our roles perfectly, right from the very start!"
90002130-215 = "...If only..."
90002130-216 = "If only we had never been born—never been created."
90002130-217 = "Then we wouldn't have to experience this suffering!"
90002130-220 = "[ns] Walk up to the three children."
90002130-223 = "H-Hey! What are you gonna do to us?!"
90002130-225 = "[ns] Kneel down to their eye level."
90002130-230 = "Huh...?"
90002130-232 = "[ns] \"You tried really, really hard.\""
90002130-233 = "Huh?!"
90002130-234 = "Sensei?"
90002130-235 = "(...Right. Sensei always...)"
90002130-240 = "[ns] \"You made the best of a bad situation.\""
90002130-241 = "Wh-What?!"
90002130-242 = "Hey! Are you an idiot? We're the ones who wanted to turn your home into a barren land of steel!"
90002130-243 = "Huh...? But...what?"
90002130-244 = "\"You all worked so hard to find a solution where no one would die\"...?"
90002130-245 = "Th-That's...! Um!"
90002130-246 = "Ugh! Buzz off! You think we did all this for YOUR sakes? We don't care what happens to any of you! Not in the slightest!"
90002130-247 = "I do not understand... Weren't we..."
90002130-248 = "...your enemies? Ones you needed to get rid of?"
90002130-249 = "[s] \"Even so, I want you all to live.\""
90002130-253 = "[ns] \"Regardless of circumstances, no matter what happens...\""
90002130-256 = "[ns] \"I want you to have a happy ending too.\""
90002130-258 = "Wh-Why does it matter to us?"
90002130-259 = "Elder Sister is gone."
90002130-260 = "No matter where in this world we go, she will be gone forever."
90002130-261 = "What reason do we have...to continue living?"
90002130-267 = "Ah?! Wh-What do you think you're doing?! Get your hand off my head!"
90002130-268 = "Th-There's nothing you can do to change our minds!"
90002130-269 = "[s] \"It'd be nice if we could find pretty reasons for why bad things happen.\""
90002130-270 = "...!"
90002130-271 = "[ns5] \"If no one needed to ever suffer...\"\n[ns6] \"If things like pain and sadness didn't exist...\""
90002130-274 = "[ns7] \"If living in this world could be just a little less overwhelming...\"\n[ns8] \"Wouldn't that be...a wonderful thing?\""
90002130-277 = "Why..."
90002130-278 = "HOW can you say such things?"
90002130-279 = "Isn't it obvious?"
90002130-280 = "Because that is who Sensei is."
90002130-281 = "...?"
90002130-282 = "..."
90002130-283 = "...!"
90002130-288 = "That's who Sensei has always been."
90002130-290 = "Next Episode;What One Is Born With"
