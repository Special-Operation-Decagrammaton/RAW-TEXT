[translation]
90002130-1 = "ตอนที่ 13;เด็กๆ"
90002130-5 = "[ns] \"หายไปไหนแล้วนะ...?\""
90002130-6 = "มัลคูธ..."
90002130-7 = "กังวลเหรอคะ อาริสึ...?"
90002130-8 = "..."
90002130-10 = "การมีชีวิตอยู่คือความเจ็บปวดค่ะ"
90002130-11 = "เราไม่ได้เกิดมาด้วยเจตจำนงของตนเอง แต่แค่ถูกโยนเข้ามาในโลกโดยไม่รู้อะไรเลยค่ะ"
90002130-13 = "ชีวิตคือความย้อนแย้งและไม่สมเหตุสมผล มันก็เลยบังคับให้ทุกคนที่มีชีวิตอยู่ต้องทนต่อความเจ็บปวด#nที่เหลวไหล"
90002130-14 = "พวกฉันก็เพียงต้องการที่จะทำลายวงจรนั้นค่ะ"
90002130-16 = "ลองคิดดูสิคะ"
90002130-17 = "เป้าหมายของพวกเรา เหตุผลที่เรามาอยู่ที่นี่"
90002130-19 = "ฮือ... ฮืออ..."
90002130-20 = "เสียงนี้มัน...?"
90002130-21 = "เสียงร้องไห้... ใช่มั้ยคะ? หรือจะเป็นคนอื่น... ใช่โมโมอิกับมิโดริหรือเปล่า...?"
90002130-22 = "ฮะ... ฮือออ..."
90002130-26 = "[ns] \"ไปดูกันเถอะ\""
90002130-27 = "ครู? แต่เราไม่รู้ว่าจะเกิดอะไรขึ้น และนั่นอาจเป็นกับดักก็ได้นะ...!"
90002130-28 = "คุณครู? ฮึ่ย จริงๆ เลย! เดินไปนู่นแล้ว! คนคนนั้นก็เป็นแบบนี้แหละค่ะ อาริสึ!"
90002130-29 = "ค่ะ ค่ะ! อาริสึจะไปปกป้องคุณครูเองค่ะ!"
90002130-32 = "(การหาเจ้าของเสียงร้องไห้ไม่ใช่เรื่องง่ายเลย)"
90002130-33 = "(กำแพงผุดขึ้นมาขวางทางเป็นระยะๆ ระหว่างทาง)"
90002130-34 = "(แต่ในที่สุดคุณครูกับทุกคนก็...)"
90002130-37 = "เรามาถูกแล้วละ ครู เสียงนั้นดังใกล้เข้ามาเรื่อยๆ แล้ว"
90002130-38 = "น่าจะอยู่ข้ามกำแพงนี้ไปนะคะ..."
90002130-39 = "[ns] \"นั่นมัน...?\""
90002130-43 = "อ่า... อ๊ะ...!"
90002130-44 = "ทำไมพวกคุณถึงมาที่นี่ได้...!"
90002130-45 = "..."
90002130-52 = "(จู่ๆ ซอฟก็วิ่งเข้ามา)"
90002130-53 = "นะ... นี่แหนะ...!"
90002130-54 = "พะ... พะ... พะ... พวกคุณ! ถ้าไม่มี! ถ้าไม่มีคนอย่างพวกคุณ!"
90002130-55 = "ถ้าพวกคุณไม่ได้มาที่นี่! และถ้าพวกคุณอยู่เฉยๆ กันละก็!"
90002130-56 = "คุณครู!"
90002130-57 = "คุณครู?! เอ๋...?"
90002130-65 = "(ซอฟเอากำปั้นเล็กๆ ทุบไปทั่วร่างกายของคุณครู)"
90002130-66 = "(แต่สัมผัสนั้นช่างบอบบาง)"
90002130-67 = "(เหมือนกับหมัดของเด็กที่อายุยังไม่ถึงห้าขวบด้วยซ้ำ...)"
90002130-68 = "ถ้าเป็นอย่างนั้นละก็! ถ้ามันเป็นอย่างนั้น! พี่มัลคูธคง...!"
90002130-69 = "พอเถอะค่ะ!"
90002130-74 = "พอ... ได้แล้วค่ะ..."
90002130-75 = "ไอน์... ทำไมล่ะ...?"
90002130-79 = "ตอนนี้เราเปลี่ยนแปลงอะไรไม่ได้แล้วค่ะ... รู้อยู่แล้วไม่ใช่เหรอคะ ซอฟ?"
90002130-80 = "..."
90002130-86 = "ฮือ... งะ... แงงงง..."
90002130-87 = "..."
90002130-89 = "พี่มัลคูธ... ตายไปแล้วค่ะ"
90002130-90 = "พวกเรา... ฆ่าพี่ไปแล้วค่ะ"
90002130-91 = "พวกเรา... พวกเรา... เป็นคนฆ่าเอง"
90002130-92 = "พวกเรา!!! ฆ่าพี่ไปแล้ว!!!!!"
90002130-93 = "ทั้งทิ่มแทง! ทั้งทำลาย! ไม่ว่าจะตัวตน ข้อมูล บันทึก ประวัติศาสตร์ ร่องรอย หรือแม้แต่รอยแผล! สุดท้ายก็ไม่เหลืออะไรทั้งนั้น! เราทำให้ทุกอย่างหายไปหมดเลย!!"
90002130-98 = "การที่เรามีความสามารถในการคิด นั่นถือว่าเป็นคำสาปค่ะ การที่เราสามารถรู้สึก และชื่นชอบบางอย่างได้ก็เหมือนกัน"
90002130-99 = "ถ้าเราไม่ต้องมีอารมณ์ความรู้สึกตั้งแต่แรกก็คงจะดีน่ะสิ"
90002130-104 = "พลังในการได้ยิน มองเห็น สัมผัส พูด ตัดสิน และรู้สึกชอบ พลังพวกนั้นน่ะไร้ประโยชน์สิ้นดี"
90002130-105 = "ถ้าเรามองไม่เห็น ไม่ได้ยิน หรือพูดอะไรไม่ได้เลยละก็"
90002130-106 = "ทุกอย่างมันก็คงง่ายกว่านี้"
90002130-108 = "ทำไมเราถึงต้องเกิดมาเพื่อทนทุกข์ทรมานแบบนี้ด้วยล่ะคะ?"
90002130-111 = "ทำไม... ถึงมาหาพวกฉันล่ะคะ? ทั้งๆ ที่พวกคุณขัดขวางพวกฉันกันถึงขนาดนั้น"
90002130-112 = "[s] \"...\""
90002130-113 = "รู้อะไรหรือเปล่าคะ?"
90002130-114 = "พวกฉันน่ะ ไม่มีฮาโลค่ะ"
90002130-115 = "นั่นหมายความว่าพวกฉันไม่ได้รับความลึกลับ ความงดงาม ปาฏิหาริย์ หรือความลับใดๆ มาตั้งแต่แรกอยู่แล้วค่ะ"
90002130-116 = "แต่ถึงอย่างนั้น พวกฉันก็ยังสามารถคิด รู้สึก กระทำ และตัดสินอะไรได้ค่ะ"
90002130-120 = "มันช่างไร้ค่าจริงๆ เลยนะคะ"
90002130-121 = "ถ้าตอนนั้นพวกฉันรู้สึกกลัวขึ้นมาสักหน่อยละก็... บางทีอาจจะสร้างผลลัพธ์ที่ต่างไปจากตอนนี้ก็ได้"
90002130-122 = "แต่ก็ไม่เป็นไรหรอกค่ะ พวกฉันทนกันได้ค่ะ"
90002130-123 = "ต่อให้พวกฉันจะไม่ได้รับอะไรเลยก็ตาม"
90002130-124 = "ต่อให้พวกฉันถูกสร้างมาโดยไม่มีอะไรติดตัวมาเลย แต่ก็ยังมีพี่มัลคูธ..."
90002130-126 = "ถ้าพี่มัลคูธฟื้นขึ้นมาและได้อยู่ด้วยกันกับพวกฉัน ถ้าเราได้ใช้ชีวิตและใช้เวลาร่วมกัน..."
90002130-127 = "พี่สาวน่ะ มีแม้กระทั่งฮาโลที่พวกเราไม่มี..."
90002130-129 = "ถ้าไม่มีคนอย่างพวกคุณละก็...! ถ้าเป็นอย่างนั้น...!"
90002130-130 = "พี่สาวของพวกฉัน... ก็ไม่ต้องตายก็ได้"
90002130-131 = "และพวกฉันก็จะได้ใช้ชีวิตไปตลอดกาล ราวกับว่ามันไม่เคยเกิดเรื่องอะไรขึ้น!"
90002130-136 = "อยากทำอะไรก็ทำเลยค่ะ จากนี้ไปไม่มีอะไรสำคัญแล้วละ"
90002130-137 = "เราต่างทำทุกอย่างเท่าที่จะทำได้ และพวกฉันได้บรรลุผลลัพธ์แล้วค่ะ"
90002130-138 = "ก็แค่นั้นละค่ะ ไม่มีอะไรพิเศษหรอก"
90002130-143 = "แต่พวกคุณก็พยายามมาตลอด เพื่อทำให้เดคาแกรมมาทอนเป็นเทพไม่ใช่เหรอคะ?"
90002130-144 = "และจากเหตุการณ์ที่เกิดขึ้นจนถึงตอนนี้... หนทางที่เดคาแกรมมาทอนจะกลายเป็นเทพขึ้นมาได้..."
90002130-145 = "ก็เลยทำให้เดคาแกรมมาทอน... อยู่ในร่างของ 'มัลคูธ' งั้นเหรอ...!"
90002130-146 = "..."
90002130-147 = "แต่ถึงยังไงพวกฉันก็ไม่อยากเสียพี่มัลคูธไปค่ะ..."
90002130-148 = "การที่ท่านผู้นั้นใช้ร่างกายของพี่มัลคูธเป็นภาชนะเพื่อก้าวขึ้นสู่การเป็นเทพ... มันเป็นเพียงหนึ่งในแผนการนับไม่ถ้วนที่วางไว้..."
90002130-149 = "ถึงทุกอย่างจะจบลงแบบนี้ แต่มันก็เป็นสิ่งที่ฉันไม่อยากให้เกิดขึ้นที่สุดเลยค่ะ"
90002130-151 = "ตอนที่ท่านผู้นั้นผ่านพ้นทุกเซฟิร่า ข้ามผ่านทุกเส้นทางอย่างถูกต้อง และตั้งใจจะเป็นเทพในที่สุด..."
90002130-152 = "พวกฉัน... บอกกับท่านไปว่า จะทำให้คิโวทอสปกคลุมไปด้วยดินแดนเหล็กกล้า"
90002130-153 = "ถ้าเป็นอย่างนั้น ท่านผู้นั้นก็จะก้าวขึ้นเป็นเทพผู้เป็นสื่อกลางของโลกได้โดยธรรมชาติค่ะ"
90002130-155 = "[ns] \"แล้วผู้คนที่อาศัยอยู่ในคิโวทอสล่ะ?\""
90002130-156 = "ต่อให้คิโวทอสจะเปลี่ยนเป็นดินแดนเหล็กกล้า... ก็ไม่ได้หมายความว่าผู้คนที่มีชีวิตอยู่ที่นั่นจะ#nกลายเป็นแบบนั้นไปด้วยค่ะ"
90002130-157 = "ผู้คนก็แค่ต้องปรับตัวให้เข้ากับโลกที่เปลี่ยนไปเป็นดินแดนเหล็กกล้า"
90002130-158 = "สิ่งที่ท่านผู้นั้นต้องการ ก็แค่การได้เป็นเทพผู้บงการที่ครองอำนาจอยู่บนจุดสูงสุดก็เท่านั้นค่ะ "
90002130-159 = "ถ้าเป็นอย่างนั้นได้จริง พี่มัลคูธก็ไม่จำเป็น... ต้องหายไปด้วยค่ะ"
90002130-160 = "[s3] \"ทุกคนก็เลยพยายามช่วยชีวิตมัลคูธด้วยวิธีนั้นเหรอ?\"\n[s4] \"ทุกคนก็เลยจะเปลี่ยนคิโวทอสให้เป็นดินแดนเหล็กกล้าเหรอ?\""
90002130-166 = "ค่ะ..."
90002130-167 = "จะ... จำเป็นต้องทำถึงขนาดนั้นเลยเหรอคะ...?"
90002130-168 = "'จำเป็น' งั้นเหรอ ถามมาได้? แล้วมันจำเป็นต้องถามถึงขนาดนั้นเลยเหรอไง?!"
90002130-169 = "แล้วถ้าคุณครูที่ยืนอยู่ตรงนั้นต้องตายบ้าง พวกเธอจะทำยังไงล่ะ!!!"
90002130-170 = "!!!"
90002130-171 = "...!"
90002130-172 = "ใช่มั้ยล่ะ? ทุกคนต่างก็มีสิ่งที่ไม่ว่ายังไงก็เปลี่ยนแปลงไม่ได้อยู่ดีไม่ใช่เหรอไง...?"
90002130-173 = "และถ้ามีหนทางที่จะรักษาสิ่งนั้นไว้ รวมถึงหนทางที่จะอยู่ร่วมกันกับทุกคนได้... ไม่ว่ายังไงก็คงพยายามทำทุกวิถีทางเพื่อให้เป็นอย่างนั้น... ไม่ใช่เหรอ?"
90002130-178 = "เข้าใจแล้วค่ะ... ฉันเข้าใจความรู้สึกนั้นเป็นอย่างดีเลย แต่ก็ยังมีบางประเด็นที่ฉันสงสัยค่ะ"
90002130-179 = "พวกคุณลืมตาขึ้นมาก่อน 'พี่สาว' คนนั้นอีกไม่ใช่เหรอคะ?"
90002130-180 = "สิ่งที่ฉันอยากรู้ก็คือ..."
90002130-181 = "อ่า จริงๆ เลย... ฉันพูดต่อไม่ได้น่ะค่ะ แต่ก็รู้กันใช่มั้ยคะว่าฉันพยายามจะสื่ออะไร?"
90002130-182 = "เรื่องนั้นน่ะ..."
90002130-183 = "คุณสงสัยว่าทำไมพวกฉันถึงหวงแหนพี่มัลคูธมากขนาดนั้น... ทั้งๆ ที่ไม่เคยได้มานั่งพูดคุยกัน#nอย่างลึกซึ้งสินะคะ"
90002130-184 = "ในบางแง่มันก็... ตอบได้ง่ายๆ ค่ะ ถึงคำตอบนี้จะใช้ได้เฉพาะกับพวกฉันเท่านั้นก็เถอะค่ะ"
90002130-185 = "ถ้ารักเองไม่ได้ ก็แค่ต้องกำหนดให้รักมาตั้งแต่แรกค่ะ"
90002130-186 = "[s] \"...!\""
90002130-187 = "มะ... หมายความว่า...?!"
90002130-188 = "อื้อ พวกฉันถูกสร้างขึ้นมา ไม่ได้เกิดมาเองหรอก"
90002130-189 = "พวกฉันไม่ได้หล่อหลอมนิสัยหรือบุคลิกภาพขึ้นมาจากการเผชิญเรื่องราวต่างๆ เหมือนพวกคุณ แต่ลักษณะส่วนใหญ่ถูกตั้งค่าไว้ตั้งแต่แรกแล้วต่างหาก"
90002130-190 = "และฉันก็ได้ยินมาว่า... หนึ่งในการตั้งค่านั้นก็คือ 'ต้องรักพี่มัลคูธมากกว่าสิ่งใด'... ค่ะ"
90002130-191 = "ฉันไม่รู้ว่าทำไมถึงมีการตั้งค่าที่ยุ่งยากแบบนี้ แต่ถ้าให้เดา มันก็คงเป็นเรื่องง่ายๆ ค่ะ"
90002130-195 = "เพราะนั่นจะเป็นวิธีที่สมเหตุสมผลและมีประสิทธิภาพที่สุดยังไงล่ะ"
90002130-196 = "สมเหตุสมผล... และมีประสิทธิภาพ..."
90002130-197 = "คุณคงพอเดาออกใช่มั้ยล่ะคะ สึคัตสึกิ ริโอะ? ว่าถ้าจะปกป้องและรักษาของบางอย่างให้อยู่ใน#nสภาพสมบูรณ์จนกว่าจะถึงเวลาที่กำหนดไว้"
90002130-198 = "ก็ต้องทำให้[ruby=พวกฉัน]วัตถุ[/ruby]ที่จะปกป้องเป้าหมายนั้น มีความรักต่อเป้าหมายนั้นอย่างผิดวิสัย"
90002130-199 = "เรื่องราวมันก็เป็นอย่างนี้ละค่ะ"
90002130-200 = "เรื่องไร้สาระที่พี่สาวของพวกฉันเป็นเครื่องบูชายัญที่ต้องทำให้สมบูรณ์อยู่แล้วตั้งแต่แรก และพวกฉันก็เป็นตัวตลกที่ถูกตั้งค่าไว้ตั้งแต่ต้น"
90002130-201 = "แต่ในกระบวนการนั้น การตั้งค่า[ruby=พวกฉัน]วัตถุ[/ruby]อาจจะมากเกินไปหน่อย"
90002130-202 = "ก็เลยเกิดผลลัพธ์ที่คาดไม่ถึงขึ้นมา นั่นก็คือดินแดนเหล็กกล้าค่ะ"
90002130-203 = "อะ... อาริสึไม่อยากให้ทุกคน... พูดแบบนั้นเลยค่ะ... แบบนั้นมัน..."
90002130-204 = "เป็นเรื่องราวที่ฟังดูเศร้าและก็แปลกค่ะ..."
90002130-205 = "มาบอกว่าแปลกเนี่ยนะ? คนพูดแบบนั้นต่างหากที่แปลก! สำหรับพวกคุณแล้ว ไม่ว่าอะไรก็ดูแปลกประหลาดไปหมดเลยสินะ!"
90002130-206 = "ถ้าลองคิดดูดีๆ ทุกอย่างมันก็แปลกทั้งนั้นเลยเนอะ? ทั้งการชอบพี่มัลคูธ การชอบใครสักคนนี่น่ะ"
90002130-207 = "แล้วสิ่งที่เรียกว่าเทพมันคืออะไรกันแน่? มันคือสิ่งที่เรารับมือได้หรือเปล่า?"
90002130-208 = "แต่ถึงยังไงพวกฉันก็ต้องทำแบบนั้น ต้องทำอย่างไม่มีทางเลือก!"
90002130-209 = "นั่นก็เพราะพวกฉันไม่ได้มีทางเลือกอื่นมาตั้งแต่แรกอยู่แล้วไงล่ะ!"
90002130-215 = "ถ้าเกิดว่า..."
90002130-216 = "พวกฉันไม่ได้[ruby=ถูกสร้าง]เกิดมา[/ruby]ตั้งแต่แรกละก็"
90002130-217 = "พวกฉันก็คงไม่ต้องทนทุกข์ทรมานแบบนี้หรอก"
90002130-220 = "[ns] (เดินเข้าไปหาเด็กๆ)"
90002130-223 = "อะ... อะไรน่ะ...? คิดจะทำอะไร?! จะทำอะไรพวกฉันอีก...!"
90002130-225 = "[ns] (ลงไปนั่งให้อยู่ในระดับสายตาเด็กๆ)"
90002130-230 = "หืม...?"
90002130-232 = "[ns] \"คงเหนื่อยกันมามากเลยนะ\""
90002130-233 = "หืม?!"
90002130-234 = "คุณครู?"
90002130-235 = "(อื้อ... คนคนนี้น่ะ...)"
90002130-240 = "[ns] \"พวกเธอทำงานกันหนักตามเงื่อนไขที่ถูกกำหนดมาแล้วละ\""
90002130-241 = "คะ... คะ?!"
90002130-242 = "บะ... บ้าหรือเปล่าเนี่ย?? ถ้าแผนการของพวกฉันสำเร็จขึ้นมาละก็ คิโวทอสจะกลายเป็นดินแดนเหล็กกล้าเชียวนะ?!"
90002130-243 = "หืม...? แต่ว่า..."
90002130-244 = "แต่พวกฉันก็พยายามหาหนทางที่จะทำให้ไม่มีใครต้องสูญเสียชีวิต... งั้นเหรอคะ...?"
90002130-245 = "เรื่องนั้น... เรื่องนั้นมัน..."
90002130-246 = "ยะ... อย่ามาตลกเลยน่า! คิดว่าพวกฉันคิดแผนการนี้มาเพื่อพวกคุณงั้นเหรอ?#nพวกฉันน่ะ ไม่ว่าพวกคุณจะเป็นยังไง! ไม่ว่าจะยังไง...!"
90002130-247 = "ทำไมคุณถึง... พูดแบบนั้นกับพวกฉันล่ะคะ? สำหรับคุณแล้ว ยังไงพวกฉันก็..."
90002130-248 = "เป็น 'ศัตรู' ที่ต้องกำจัดทิ้งไม่ใช่เหรอคะ...?"
90002130-249 = "[s] \"แต่ครูก็อยากให้พวกเธอมีชีวิตต่อนะ\""
90002130-253 = "[ns] \"ไม่ว่าจะเกิดเรื่องอะไรก็ตาม\""
90002130-256 = "[ns] \"ครูก็อยากให้พวกเธอมีความสุขในท้ายที่สุดเหมือนกันนะ\""
90002130-258 = "พูดแบบนั้นหมายความว่ายังไงคะ...?"
90002130-259 = "ตอนนี้พี่มัลคูธไม่อยู่แล้วค่ะ"
90002130-260 = "ไม่ว่าจะที่ไหน พี่มัลคูธก็ไม่อยู่แล้วค่ะ"
90002130-261 = "แล้วพวกฉันจะมีชีวิตต่อในโลกที่ไม่มีพี่มัลคูธไปทำไมล่ะคะ...?"
90002130-267 = "อ๊ะ?! ทะ... ทำอะไรน่ะ? เอามือออกไปจากหัวเลยนะ!"
90002130-268 = "ตะ... ต่อให้มาทำอะไรแบบนี้ พวกฉันก็...!"
90002130-269 = "[s] \"ถ้าทุกๆ เรื่องมีเหตุผลที่ยอมรับได้มารองรับ ก็คงจะดีไม่น้อยเลยเนอะ\""
90002130-270 = "...!"
90002130-271 = "[ns5] \"ถ้าไม่มีใครต้องทุกข์ทรมาน\"\n[ns6] \"ถ้าไม่มีใครต้องทนเจ็บปวด\""
90002130-274 = "[ns7] \"ถ้ามีโลกไหนที่การใช้ชีวิตไม่ใช่เรื่องหนักหนาละก็\"\n[ns8] \"ถ้าเป็นแบบนั้นได้... ก็คงวิเศษมากเลยละ\""
90002130-277 = "ทำไม..."
90002130-278 = "คุณครูถึง... พูดแบบนั้น...?"
90002130-279 = "ไม่มีอะไรซับซ้อนหรอกค่ะ"
90002130-280 = "ก็คนคนนั้น... เป็นคนแบบนี้ยังไงล่ะคะ"
90002130-281 = "...?"
90002130-282 = "..."
90002130-283 = "...!"
90002130-288 = "ก็อย่างที่ฉันว่าค่ะ คุณครูเป็นคนแบบนี้มาตลอดค่ะ"
90002130-290 = "ตอนต่อไป;สิ่งที่ติดตัวมาแต่เกิด"
