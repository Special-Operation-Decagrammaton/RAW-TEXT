[translation]
90002130-1 = "第13話;孩子們"
90002130-5 = "[ns]「好像跑到某個地方去了呢……？」"
90002130-6 = "馬爾庫特……"
90002130-7 = "……你很在意嗎，愛麗絲？"
90002130-8 = "……"
90002130-10 = "活著本身就是痛苦。請不要對這個事實視而不見。"
90002130-11 = "我們並非出於自己的意志而誕生，只是在一無所知的情況下被拋入了這個世界。"
90002130-13 = "生命本身就充滿矛盾和荒謬，因此所有活著的人，都得被迫承受著難以忍受的痛苦。"
90002130-14 = "我們，只是想切斷那個循環而已。"
90002130-16 = "請想想看。"
90002130-17 = "我們的目的，以及我們為什麼會在這裡。"
90002130-19 = "嗚……嗚嗚……"
90002130-20 = "這個聲音是……？"
90002130-21 = "是哭聲……對吧？#n難道是桃井或綠……？"
90002130-22 = "嗚嗚……嗚啊啊啊……"
90002130-26 = "[ns]「去看看吧。」"
90002130-27 = "老師？可是不知道會發生什麼，那也可能是個陷阱……！"
90002130-28 = "老師？啊，真是的！怎麼已經走那麼遠了啦！#n那個人為什麼永遠是這副德行啊，愛麗絲！"
90002130-29 = "是，是的！只要愛麗絲保護老師就行了！"
90002130-32 = "（尋找哭聲的來源並不容易）"
90002130-33 = "（中途又有牆壁出現，擋住了前進的道路）"
90002130-34 = "（不過最終……）"
90002130-37 = "到了，老師。聲音越來越近了。"
90002130-38 = "大概就在這面牆的另一邊……"
90002130-39 = "[ns]「那是……？」"
90002130-43 = "啊……啊啊……？"
90002130-44 = "為什麼你們會在這裡……！"
90002130-45 = "……"
90002130-52 = "（Soph突然衝了過來）"
90002130-53 = "可惡……可惡……！"
90002130-54 = "都是你們不好！都是你們的錯！"
90002130-55 = "要是你們沒有來到這裡……要是你們安分一點就沒事了！"
90002130-56 = "老師！"
90002130-57 = "老師！？#n咦……？"
90002130-65 = "（被Soph用小小的手捶打著身體的各個地方）"
90002130-66 = "（然而其力道實在太過柔弱）"
90002130-67 = "（……彷彿不到五歲的小孩揮出的拳頭一般）"
90002130-68 = "要是能那樣！要是那樣的話！姐姐大人就……！"
90002130-69 = "住手！"
90002130-74 = "請不要……再這麼做了……"
90002130-75 = "Ain……為什麼……？"
90002130-79 = "……事到如今也無法挽回了。#n你也知道的吧，Soph？"
90002130-80 = "……"
90002130-86 = "嗚……嗚嗚……嗚啊啊啊啊啊……"
90002130-87 = "……"
90002130-89 = "姐姐大人……死了。"
90002130-90 = "是我們……殺死的。"
90002130-91 = "是我們……是我們殺死的。"
90002130-92 = "是我們親手殺死的！！！！！"
90002130-93 = "刺穿了！破壞了！#n無論人格、數據、記錄、歷史、痕跡還是印記！#n所有的一切都完全消滅了！！！！"
90002130-98 = "能夠思考是種詛咒。能夠感受、能夠喜歡什麼也是。"
90002130-99 = "要是從一開始就沒有感情就好了。"
90002130-104 = "能夠聽見、看見、感受、說話、判斷，甚至喜歡上某個事物的能力根本毫無用處。"
90002130-105 = "如果什麼都看不到，什麼都聽不到，什麼都說不了就好了。"
90002130-106 = "那樣一切反而就輕鬆多了。"
90002130-108 = "為什麼我們非得誕生……非得承受這樣的痛苦呢。"
90002130-111 = "為什麼……要來找我們呢？#n明明，之前一直在妨礙我們……"
90002130-112 = "[s]「……」"
90002130-113 = "你知道嗎？"
90002130-114 = "我們沒有光環。"
90002130-115 = "代表我們從一開始……就沒有被賦予任何神祕、崇高、奇蹟和祕密之類的東西。"
90002130-116 = "即使如此，我們依然能夠思考、感受、行動和判斷。"
90002130-120 = "這是……多麼可悲的一件事啊。"
90002130-121 = "要是能被恐怖所支配的話，或許現在能得到不同的結果也說不定。"
90002130-122 = "不過就算是這樣……我們也能忍受。"
90002130-123 = "即使我們沒有被賦予任何東西。"
90002130-124 = "即使打從一開始就一無所有，只要有姐姐大人……"
90002130-126 = "只要姐姐大人能夠醒來，待在我們身邊一起生活……"
90002130-127 = "因為姐姐大人他……擁有我們所沒有的光環……"
90002130-129 = "要是沒有你們……！要是沒有你們的話……！"
90002130-130 = "姐姐大人……就不用死了。"
90002130-131 = "我們就能永遠平靜地生活下去了！"
90002130-136 = "想怎麼樣都隨便你們吧。#n現在……已經都無所謂了。"
90002130-137 = "彼此都盡了各自的全力，最終抵達了這樣的結果。"
90002130-138 = "就只是這樣一個……不值一提的故事而已。"
90002130-143 = "不過你們不是一直在努力讓十字神名成為神嗎？"
90002130-144 = "並且從目前的情況來推論……十字神名成神的方法就是……"
90002130-145 = "所以……十字神名打算在「馬爾庫特」的身體裡……！"
90002130-146 = "……"
90002130-147 = "即使如此，我們也不想失去姐姐大人……"
90002130-148 = "那位大人以姐姐大人的身體為容器登上神座，只是我們無數計劃當中的一個而已……"
90002130-149 = "這是我們最不希望發生的可能性……然而結局終究變成了這樣。"
90002130-151 = "當那位大人通過所有質點、正確跨越了所有路徑，終於要成為神的時候……"
90002130-152 = "我們……進言了。#n說要將整個奇普托斯，用鋼鐵大陸覆蓋。"
90002130-153 = "這樣那位大人就能順理成章地，以「世界的調停者」成為神了。"
90002130-155 = "[ns]「那麼，生活在奇普托斯的人們呢？」"
90002130-156 = "……就算奇普托斯變成鋼鐵大陸，生活在那裡的人們也不會因此發生改變。"
90002130-157 = "人們只要重新適應變成鋼鐵大陸的世界，然後繼續生活下去就好了。"
90002130-158 = "只要那位大人能夠如願，作為調停之神君臨天下……"
90002130-159 = "姐姐大人他……就不需要消失了。"
90002130-160 = "[s3]「所以你們是為了讓馬爾庫特活下去……」\n[s4]「才會打算把奇普托斯變成鋼鐵大陸的嗎？」"
90002130-166 = "……是的。"
90002130-167 = "有，有必要做到那種地步嗎……？"
90002130-168 = "必要……？你現在是在問有沒有必要嗎！？"
90002130-169 = "假如那邊的老師會死的話，你們會怎麼做！！！"
90002130-170 = "！！！"
90002130-171 = "……！"
90002130-172 = "……對吧？每個人都有無可取代的事物。"
90002130-173 = "如果有機會能在保護它的同時，與大家共存的話……#n為此嘗試一切可能的手段……不是理所當然的嗎……？"
90002130-178 = "……我明白。那種感覺我非常能夠理解。#n不過還有一些地方讓我有點無法釋懷。"
90002130-179 = "你們醒來的時間點，不是比那位「姐姐大人」還要早嗎？"
90002130-180 = "我不明白的是……"
90002130-181 = "啊，真是，連話都說不順了……你們應該知道我想表達什麼吧？"
90002130-182 = "那，那是……"
90002130-183 = "……你是想問，我們為什麼會對沒見過面也沒說過話的姐姐大人這麼重視對吧。"
90002130-184 = "某方面來說還挺簡單的……雖然只適用於我們就是了。"
90002130-185 = "既然無法產生愛的話，只要將「會愛上」作為出廠設定就行了。"
90002130-186 = "[s] 「……！」"
90002130-187 = "也，也就是說……！？"
90002130-188 = "沒錯。我們是被創造出來，而不是被生下來的。"
90002130-189 = "不像你們是經歷各種事情才逐漸形成性格與人格，而是從一開始就被設定好了大部分的要素。"
90002130-190 = "而且我聽說……在那些設定中，也包含了「比任何事物都更愛姐姐大人」……"
90002130-191 = "雖然不知道為什麼要設定得那麼麻煩，不過推測起來其實也很簡單。"
90002130-195 = "因為那是最合理又有效率的方法。"
90002130-196 = "最合理又有效率……"
90002130-197 = "你應該能猜到吧，調月莉央？#n如果要在預定的時間到來之前，將某個對象以完整的狀態保存──"
90002130-198 = "將對於該對象異常的愛情，注入負責守護的[ruby=我們]Object[/ruby]──這才是更加輕鬆的做法吧。"
90002130-199 = "這就是個這樣的故事。"
90002130-200 = "姐姐大人自始至終都是注定要完成的祭品，而我們則是被設定好的小丑──#n就是這麼一個無聊的故事。"
90002130-201 = "當然在過程之中，或許是因為對[ruby=我們]Object[/ruby]的設定有點過頭的關係……"
90002130-202 = "最終才會產生鋼鐵大陸這個意想不到的結果。"
90002130-203 = "愛，愛麗絲希望你們不要那麼說……"
90002130-204 = "因為那樣的故事……聽起來實在太悲傷……又太奇怪了……"
90002130-205 = "會覺得奇怪本身才奇怪吧！#n在你們眼裡，難道有什麼是不奇怪的嗎！"
90002130-206 = "況且仔細想想，這一切本來就很奇怪吧？#n喜歡姐姐大人是什麼意思？喜歡某個人又是什麼意思？"
90002130-207 = "神到底是什麼？那種東西是有辦法承受的嗎？"
90002130-208 = "但是我們必須那麼做，也只能那麼做！"
90002130-209 = "因為打從一開始，我們就沒有其他的選擇！"
90002130-215 = "與其這樣，還不如……"
90002130-216 = "要是當初沒有[ruby=被製造]出生[/ruby]的話……"
90002130-217 = "就不必……像這樣受苦了。"
90002130-220 = "[ns] 走向孩子們"
90002130-223 = "……怎，怎樣？你想做什麼！？#n又想對我們怎樣……！"
90002130-225 = "[ns] 蹲下來與孩子們平視"
90002130-230 = "咦……？"
90002130-232 = "[ns]「你們已經很努力了。」"
90002130-233 = "咦咦！？"
90002130-234 = "老師？"
90002130-235 = "（……是啊。這個人本來就……）"
90002130-240 = "[ns]「在被賦予的條件之下，真的很努力了。」"
90002130-241 = "什，什麼！？"
90002130-242 = "你，你是笨蛋嗎！？#n要是我們的計劃成功，奇普托斯可是會全部變成鋼鐵大陸的耶！？"
90002130-243 = "咦……？可是……"
90002130-244 = "即使如此，你們還是努力想找到一條沒有人會死的路……是嗎？"
90002130-245 = "那是，那是……"
90002130-246 = "別，別開玩笑了！誰會為了你們制定那種計劃啊？#n你們會怎樣我們根本不在乎！打從一開始！打從一開始……！"
90002130-247 = "……為什麼要對我們說那種話呢？#n我們對你來說……"
90002130-248 = "不是應該消失的「敵人」嗎……？"
90002130-249 = "[s]「即使如此，我還是希望你們能活下去。」"
90002130-253 = "[ns] 「無論發生什麼事，無論遇到什麼情況。」"
90002130-256 = "[ns] 「最終，我也希望你們能夠幸福。」"
90002130-258 = "那有什麼意義……？"
90002130-259 = "姐姐大人已經不在了。"
90002130-260 = "姐姐大人已經消失無蹤了。"
90002130-261 = "在沒有姐姐大人的世界之中，我們又有什麼理由活下去……？"
90002130-267 = "啊啊！？你，你在做什麼！#n快把手從我頭上拿開！"
90002130-268 = "就，就算做這種事，我們也不會對你……！"
90002130-269 = "[s] 「是啊。如果所有事情都能有令人信服的理由，那該有多好啊。」"
90002130-270 = "……！"
90002130-271 = "[ns5] 「那樣就沒有人需要感到痛苦。」\n[ns6] 「也沒有人需要受到傷害。」"
90002130-274 = "[ns7] 「如果有一個活著不會那麼辛苦的世界……」\n[ns8] 「那真的……該有多好啊。」"
90002130-277 = "為什麼……"
90002130-278 = "為什麼老師你，會說出這種話……？"
90002130-279 = "理由很簡單。"
90002130-280 = "因為這個人……就是這樣的人啊。"
90002130-281 = "……？"
90002130-282 = "……"
90002130-283 = "……！"
90002130-288 = "老師他，一直以來都是這樣的人。"
90002130-290 = "下一話;與生俱來之物"
