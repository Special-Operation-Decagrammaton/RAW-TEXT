[translation]
90002170-1 = "Episode 17;The Human Answer, Human Answer"
90002170-3 = "[ns] \"Nope. Wrong answer.\""
90002170-4 = "...On what grounds, Sensei?"
90002170-5 = "[s] \"That answer is too human. I thought you were a god.\""
90002170-9 = "[ns] \"That can't be your validation for existing.\""
90002170-10 = "...!"
90002170-11 = "[ns] \"Who gave you the right to take away our pain?\""
90002170-13 = "[ns1] \"What's done is already done.\"\n[ns2] \"There's no such thing as 'starting over' in real life.\""
90002170-16 = "That is what I am rectifying. I shall construct perfection in this world."
90002170-17 = "[s] \"No. You can't.\""
90002170-18 = "And by what authority can you deny me?"
90002170-19 = "[s3] \"Because the sorrow, the pain, it's MINE.\"\n[s4] \"...Our sins and struggles are what connect us.\""
90002170-22 = "You...!"
90002170-23 = "[ns5] \"And I can't just run away.\"\n[ns6] \"How could I look my students in the eye if I did?\""
90002170-28 = "...!"
90002170-29 = "Hah. I see... That's how it is..."
90002170-30 = "..."
90002170-31 = "...Eheehee."
90002170-32 = "Me. I'm jealous."
90002170-33 = "Hm...? Why's that?"
90002170-34 = "Because that's what your teacher's like. Heehee."
90002170-35 = "Fufu. You are correct. Except on one count."
90002170-36 = "What...exactly do you mean?"
90002170-41 = "Sensei is your teacher too. Consider them OUR Sensei."
90002170-42 = "Yes, consider this your induction ceremony."
90002170-43 = "...!"
90002170-45 = "...Always the students first, even now. You are a fool."
90002170-46 = "[s] \"Most likely.\""
90002170-47 = "I expected greatness from you."
90002170-48 = "[s] \"From a nobody like me?\""
90002170-49 = "There is no need for you to perform. Here, there is only us. Let your truth be bared."
90002170-50 = "There would be no one to bear witness, should you denounce your principles for this one moment."
90002170-54 = "[ns] \"That would be how you see it.\""
90002170-56 = "But Sensei, I am your ally. And you are my ally."
90002170-58 = "It may be a teacher's duty to help their students, but it's a student's desire to help their teacher."
90002170-60 = "I believe we should trust Momoi and Midori."
90002170-62 = "And somewhere between those two extremes, they will stumble and pick themselves up, again and again..."
90002170-63 = "They, and we, will find the way."
90002170-77 = "[ns] \"But not me. I couldn't.\""
90002170-79 = "[ns7] \"After all, every student...\"\n[ns8] \"...needs a teacher, right?\""
90002170-82 = "Even if none will bear witness to your sin?"
90002170-85 = "[ns9] \"...That's not true, not really.\"\n[ns10] \"What matters is whether I bear witness to my sins.\""
90002170-90 = "..."
90002170-91 = "I see."
90002170-92 = "As the one who has reached the divine, I will respect your decision."
90002170-93 = "However, know that this places you on the opposite side of the battlefield."
90002170-94 = "Then, return to your students, to your old world. It is your choice."
90002170-98 = "[ns] \"...?\""
90002170-99 = "I shall allow you everything."
90002170-100 = "The Shittim Chest, the credit card. Even your precious students."
90002170-101 = "But know this."
90002170-102 = "I will allow it, because, should you and your students truly wish to rebel against a god, you shall find yourself face to face with absolute extinction."
90002170-103 = "Heed my words, those who are listening."
90002170-104 = "Let those with ears hear my words, as this is my wrath and declaration."
90002170-111 = "Eh?! W-We got caught!"
90002170-112 = "More importantly— EH?!"
90002170-113 = "Look! Up there! Sensei's coming down!"
90002170-116 = "Slowly, I began my descent to the ground."
90002170-117 = "It might have been a brief respite, a phenomenon born of mercy or grace."
90002170-118 = "Because we would receive none of it as we faced what awaited us."
90002170-122 = "Sensei!"
90002170-123 = "Sensei, are you okay?"
90002170-124 = "[s] \"I'm okay! More importantly...\""
90002170-129 = "Uh..."
90002170-130 = "Eh..."
90002170-131 = "H-Hello... We...meet again."
90002170-132 = "[USERNAME] Sensei."
90002170-133 = "[s] \"Long time no see, huh? How have you been?\""
90002170-134 = "Y-Yeah..."
90002170-135 = "More importantly... What happened?"
90002170-136 = "[s] \"Right. We should go over that first.\""
90002170-138 = "I quickly explained the situation to everyone."
90002170-140 = "I see. If that's the case..."
90002170-141 = "Ah. In the words of the unreliable yet courageous Momoi..."
90002170-142 = "We will now engage with the final boss, the evil demon lord."
90002170-147 = "E-Eeek... If this was a video game, w-we would've had more time to level up."
90002170-148 = "We've come this far. The only path available to us now is forward."
90002170-149 = "We're already ready for this, Sensei. Don't worry."
90002170-150 = "Hm? How did we know? Ah."
90002170-151 = "U-Um! Maybe we should...um...! Change the subject!"
90002170-152 = "Why?"
90002170-156 = "W-Well, in the human world, isn't this \"eavesdropping\" thing considered a social faux pas?"
90002170-157 = "There's nothing unusual about it. We have a student whose life mission is to bug Sensei's office at Schale."
90002170-163 = "...Are you sure there's nothing...wrong with that place?"
90002170-165 = "H-How can we help?"
90002170-166 = "[s] \"By getting some rest.\""
90002170-167 = "B-But..."
90002170-168 = "They're right. Right now, this isn't your fight."
90002170-169 = "I'll look forward to what I'm sure will be a stellar performance the next time we need you."
90002170-173 = "...I apologize for having to renege on my word so quickly, but..."
90002170-174 = "Wh-What...? Wh-What's wrong?"
90002170-175 = "I actually would like you three to hide for the time being, if you wouldn't mind too terribly."
90002170-176 = "What...?"
90002170-178 = "That sociopathic god of yours deigned to visit this mortal realm."
90002170-186 = "A-Ahh...!"
90002170-190 = "Now, hurry."
90002170-191 = "O-Okay...!"
90002170-196 = "I am here with you, Sensei!"
90002170-197 = "No, no. Please do not apologize."
90002170-198 = "I believe that maybe...from receiving my name to all the way until now... All of it was for this moment."
90002170-202 = "So please watch my back, and I will watch yours, Sensei! And we shall do it with a smile!"
90002170-204 = "We're here too, Sensei! We're ready for anything."
90002170-205 = "Shittim Chest process optimization complete. Please give us your orders."
90002170-208 = "[ns] \"Yeah. Let's do this, everyone!\""
90002170-218 = "Yes!!"
90002170-220 = "Next Episode;Story for You"
