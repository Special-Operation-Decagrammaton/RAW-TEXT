[translation]
90002170-1 = "第17話;人類的回答，人類的回答"
90002170-3 = "[ns] 「那不能成為答案。」"
90002170-4 = "……什麼意思，老師。"
90002170-5 = "[s] 「可以是人類的回答，但不能是神的回答。」"
90002170-9 = "[ns] 「那不是自我證明。」"
90002170-10 = "……！"
90002170-11 = "[ns] 「不需要把悲傷從我們身上帶走。」"
90002170-13 = "[ns1] 「發生的事就是發生了。」\n[ns2] 「不存在能夠挽回的方法。」"
90002170-16 = "從今以後將有所不同。我會將其修正。"
90002170-17 = "[s] 「那也不行。不可以這麼做。」"
90002170-18 = "為何如此認為？"
90002170-19 = "[s3] 「因為，那一切都是我啊。」\n[s4] 「沒有經歷[ruby=罪]悲傷[/ruby]就能理解他人的方法，根本不存在。」"
90002170-22 = "……！"
90002170-23 = "[ns5] 「況且，如果連我都選擇那樣逃避的話──」\n[ns6] 「就沒臉面對我的學生了吧？」"
90002170-28 = "……！"
90002170-29 = "原來如此……原來，是這樣嗎……"
90002170-30 = "……"
90002170-31 = "……耶嘿嘿。"
90002170-32 = "真羨慕呢。"
90002170-33 = "嗯……？羨慕什麼？"
90002170-34 = "各，各位的老師，居然是個那樣的人。耶嘿嘿。"
90002170-35 = "……呵呵，還請容我稍微更正一下。"
90002170-36 = "咦，要更正什麼？"
90002170-41 = "是「我們」的老師哦。"
90002170-42 = "沒錯，從今以後都是。"
90002170-43 = "……！"
90002170-45 = "……即使到了這裡還是離不開學生嗎。真是愚蠢啊，老師。"
90002170-46 = "[s] 「或許是吧。」"
90002170-47 = "我本以為汝能做出更好的選擇。"
90002170-48 = "[s] 「畢竟我打從一開始就是個微不足道的人。」"
90002170-49 = "沒有人會責怪汝。此處只有我和汝二人。"
90002170-50 = "即便違背一次自己的內心，也不會被任何人看見。"
90002170-54 = "[ns] 「也許可以這麼想吧。」"
90002170-56 = "但是老師──愛麗絲是老師的夥伴。#n同樣的，老師也是愛麗絲的夥伴。"
90002170-58 = "假如老師幫助學生是理所當然的，那麼學生想要幫助老師──也同樣是理所當然的。"
90002170-60 = "現在應該相信桃井和綠才對。"
90002170-62 = "所以，他們今後肯定還會在此之間搖擺不定、四處碰壁……"
90002170-63 = "最終找到出路的。"
90002170-77 = "[ns] 「不過還是不行。」"
90002170-79 = "[ns7] 「如果老師不再是老師的話──」\n[ns8] 「學生也無法再當學生了。」"
90002170-82 = "即使沒有任何人看著也是？"
90002170-85 = "[ns9] 「……沒錯。」\n[ns10] 「因為自己正在看著自己啊。」"
90002170-90 = "……"
90002170-91 = "是嗎。"
90002170-92 = "作為即將成神者，我尊重汝的選擇。"
90002170-93 = "然而尊重汝的選擇，和放任汝是兩回事。"
90002170-94 = "回去吧。回到汝的學生身邊。#n以汝之意志，回歸汝那古老的世界。"
90002170-98 = "[ns] 「……？」"
90002170-99 = "一切都被允許。"
90002170-100 = "希迪姆的箱子、大人的卡片──以及汝的學生所擁有的一切力量。"
90002170-101 = "不過，唯有這點要事先聲明。"
90002170-102 = "如果汝和汝的學生真心想違抗我，等待你們的將只有徹底的毀滅。"
90002170-103 = "這便是我的話語。在那邊聆聽的你們也一樣。"
90002170-104 = "這便是我的憤怒與警告。#n有耳可聞的就應當聽。"
90002170-111 = "咦！？原，原來早就被發現了嗎……！？"
90002170-112 = "姐姐，比起那種事情……咦？"
90002170-113 = "大家！老師開始下降了！"
90002170-116 = "（身體維持著漂浮狀態，從空中緩緩降向了地面）"
90002170-117 = "（從某種角度來看，這或許可以被視為神的權能、慈悲、恩惠……之類的現象）"
90002170-118 = "（然而在前方等待著我們的，卻絕對不是那樣的東西）"
90002170-122 = "老師！"
90002170-123 = "老師，你還好嗎？"
90002170-124 = "[s] 「我沒事！不過現在……」"
90002170-129 = "啊……"
90002170-130 = "那個……"
90002170-131 = "你，你好……又，又見面了呢。"
90002170-132 = "[USERNAME]老師。"
90002170-133 = "[s] 「……嗯。大家都還好嗎？沒想到這麼快就又見面了呢。」"
90002170-134 = "嗯，嗯……"
90002170-135 = "先不說這個了……接下來沒問題嗎？#n老師，還有其他人……"
90002170-136 = "[s] 「說的也是。得先談談那件事才行。」"
90002170-138 = "（快速向大家說明了所有情況）"
90002170-140 = "……原來如此。"
90002170-141 = "我明白了。#n如果借用桃井那不太可靠卻不失勇氣的說法──"
90002170-142 = "終於來到必須與最終BOSS的魔王開戰的時刻了呢。"
90002170-147 = "嗚，嗚嗚……如果是在遊戲裡的話，說不定還能想點辦法……"
90002170-148 = "既然已經走到這一步，想必也沒有回頭路了吧。"
90002170-149 = "沒事的，老師。#n我們其實也多少知道一些情況。"
90002170-150 = "嗯？問我們怎麼知道的？#n那是──"
90002170-151 = "先，先等一下！#n那件事還是不要隨便說出來比較好吧……？"
90002170-152 = "為什麼？"
90002170-156 = "如果用你們人類的說法，那不就是所謂的「竊聽」嗎……？"
90002170-157 = "所以呢？反正也有前輩經常嘗試竊聽夏萊的辦公室啊？"
90002170-163 = "……你們那邊真的沒問題嗎？各種意義上來說。"
90002170-165 = "那，那我們該怎麼做呢……？"
90002170-166 = "[s] 「你們只要好好休息就行了。」"
90002170-167 = "可，可是……"
90002170-168 = "沒關係的。畢竟你們的立場也比較尷尬。"
90002170-169 = "如果實在想要幫忙的話，就期待下一次的機會吧。"
90002170-173 = "……抱歉。我恐怕得收回剛才的話了。"
90002170-174 = "咦……？#n為，為什麼呢……？"
90002170-175 = "你們最好先找個地方躲起來。"
90002170-176 = "什麼……？"
90002170-178 = "因為剛才那位偉大的「神」，已經親自降臨這個下界了。"
90002170-186 = "啊，啊哇哇哇……！"
90002170-190 = "走吧。動作快。"
90002170-191 = "知，知道了……！"
90002170-196 = "老師，愛麗絲準備好了。"
90002170-197 = "沒關係。老師不需要道歉。"
90002170-198 = "或許愛麗絲……正是為了這個時刻和這個目的，才會重新獲得名字也說不定。"
90002170-202 = "拜託你了，老師！#n既然要做就要打起精神！"
90002170-204 = "是，老師！我們也會全力以赴的！"
90002170-205 = "希迪姆的箱子，流程最佳化已完成。#n請下達指示。"
90002170-208 = "[ns] 「好，來試試看吧！」"
90002170-218 = "是！！！"
90002170-220 = "下一話;為你而寫的故事"
