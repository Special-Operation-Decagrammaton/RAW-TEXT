[translation]
90002170-1 = "ตอนที่ 17;คำตอบของมนุษย์ คำตอบของมนุษย์"
90002170-3 = "[ns] \"นั่นเป็นคำตอบไม่ได้หรอก\""
90002170-4 = "ครูเอ๋ย นั่นหมายความว่าอย่างไร..."
90002170-5 = "[s] \"นั่นอาจเป็นคำตอบของมนุษย์ได้ แต่เป็นของเทพเจ้าไม่ได้\""
90002170-9 = "[ns] \"สิ่งนั้นไม่ใช่การพิสูจน์ตนเองหรอกนะ\""
90002170-10 = "...!"
90002170-11 = "[ns] \"ไม่ต้องพยายามเอาความเศร้าไปจากเราหรอก\""
90002170-13 = "[ns1] \"เรื่องที่เกิดขึ้นน่ะ มันเกิดขึ้นไปแล้ว\"\n[ns2] \"ไม่มีวิธีเปลี่ยนแปลงสิ่งที่เกิดขึ้นไปแล้วได้หรอก\""
90002170-16 = "จากนี้ทุกอย่างจะเปลี่ยนไป ข้าจะแก้ไขให้ถูกต้องเอง"
90002170-17 = "[s] \"ถึงอย่างนั้นก็ไม่ได้ จะทำแบบนั้นไม่ได้หรอก\""
90002170-18 = "ทำไมถึงคิดเช่นนั้นล่ะ?"
90002170-19 = "[s3] \"เพราะทั้งหมดนั่นคือตัวเรายังไงล่ะ\"\n[s4] \"ไม่มีทางที่จะเข้าใจคนอื่นโดยกำจัด[ruby=บาป]ความเศร้า[/ruby]ออกไปได้หรอก\""
90002170-22 = "...!"
90002170-23 = "[ns5] \"ที่สำคัญก็คือ ถ้าเกิดว่าฉันหนีไปทั้งๆ แบบนี้\"\n[ns6] \"แล้วจะเอาหน้าที่ไหนไปเจอพวกนักเรียนได้ล่ะ?\""
90002170-28 = "...!"
90002170-29 = "งั้นเหรอ... เป็นอย่างนั้น... สินะ..."
90002170-30 = "..."
90002170-31 = "แหะๆๆ..."
90002170-32 = "น่าอิจฉา... จังเลยนะคะ"
90002170-33 = "คะ...? อะไรเหรอคะ?"
90002170-34 = "กะ... ก็การที่คุณครูของพวกคุณทุกคน... เป็นคนอย่างนี้น่ะค่ะ แหะๆๆ"
90002170-35 = "ฮุฮุ... ฉันว่าเราควรแก้ไขอะไรสักหน่อยนะคะ"
90002170-36 = "เอ๋ แก้ไข? อะไรเหรอคะ?"
90002170-41 = "คุณครูของ 'พวกเรา' ต่างหากค่ะ"
90002170-42 = "ใช่ค่ะ จากนี้ไปจะเป็นอย่างนั้นค่ะ"
90002170-43 = "...!"
90002170-45 = "อยู่ที่นี่ก็ยังจะนึกถึงนักเรียนอยู่อีกสินะ ช่างโง่เขลาเสียจริง ครูเอ๋ย"
90002170-46 = "[s] \"จะว่าอย่างนั้นก็ได้\""
90002170-47 = "ข้าคิดว่าเจ้าจะเลือกได้ดีกว่านี้เสียอีก"
90002170-48 = "[s] \"ฉันไม่ใช่คนพิเศษอะไรตั้งแต่แรกอยู่แล้ว\""
90002170-49 = "ไม่มีใครตำหนิเจ้าหรอก ที่นี่น่ะมีเพียงข้ากับเจ้าเท่านั้น"
90002170-50 = "ต่อให้เจ้าจะเบือนหน้าหนีความรู้สึกของตัวเองดูสักครั้ง ก็ไม่มีใครจับตามองเจ้าหรอก"
90002170-54 = "[ns] \"จะคิดอย่างนั้นก็ได้\""
90002170-56 = "แต่ว่า คุณครูคะ อาริสึคือสหายของคุณครูนะคะ ในทำนองเดียวกัน คุณครูก็เป็นสหายของอาริสึด้วย"
90002170-58 = "ถ้าเป็นเรื่องปกติที่คุณครูอยากช่วยเหลือนักเรียน งั้นก็เป็นเรื่องปกติที่นักเรียนก็อยากช่วยเหลือคุณครู#nเหมือนกัน"
90002170-60 = "ฉันว่าตอนนี้เราต้องเชื่อใจโมโมอิกับมิโดริให้มากที่สุดนะคะ"
90002170-62 = "เพราะงั้นก็ใช้ชีวิตอยู่ท่ามกลางความฉลาดและความโง่เขลานั้น และเผชิญกับสิ่งต่างๆ มากมาย..."
90002170-63 = "จนเราหาทางออกได้ในที่สุดค่ะ"
90002170-77 = "[ns] \"แต่ไม่ว่ายังไงก็ไม่ได้อยู่ดี\""
90002170-79 = "[ns7] \"ถ้าครูเป็นครูต่อไปไม่ได้\"\n[ns8] \"นักเรียนก็เป็นนักเรียนต่อไปไม่ได้เหมือนกัน\""
90002170-82 = "ต่อให้จะไม่มีใครจับตาดูอยู่ก็ตามทีหรือ?"
90002170-85 = "[ns9] \"ใช่แล้วละ...\"\n[ns10] \"ฉันหลอกตัวเองไม่เป็นหรอก\""
90002170-90 = "..."
90002170-91 = "เช่นนั้นหรือ"
90002170-92 = "ในฐานะผู้จะยืนหยัดเป็นเทพเจ้า ข้าจะเคารพการตัดสินใจของเจ้า"
90002170-93 = "แต่การที่ข้าเคารพการตัดสินใจของเจ้า กับการที่ข้าจะปล่อยเจ้าไปตามลำพังน่ะ มันเป็นคนละเรื่องกัน"
90002170-94 = "เช่นนั้นก็กลับไปเถอะ กลับไปหานักเรียนของเจ้า ด้วยเจตจำนงของเจ้า สู่โลกเก่าของเจ้า"
90002170-98 = "[ns] \"...?\""
90002170-99 = "ข้าจะอนุญาตทุกอย่าง"
90002170-100 = "ทั้งกล่องแห่งซิสดิม บัตรประจำตัวผู้ใหญ่ และพลังทั้งหมดที่เหล่านักเรียนของเจ้ามี"
90002170-101 = "แต่ข้าจะบอกสิ่งหนึ่งกับเจ้าเอาไว้"
90002170-102 = "ถ้าเจ้ากับนักเรียนของเจ้าลุกฮือขึ้นมาต่อต้านข้า สิ่งเดียวที่พวกเจ้าจะได้รับกลับไปก็คือการดับสูญ#nจนหมดสิ้น"
90002170-103 = "นี่คือวาจาของข้า และข้าหมายรวมถึงพวกเจ้าที่กำลังฟังวาจาของข้าอยู่ตรงนั้นด้วย"
90002170-104 = "นี่คือความพิโรธและคำเตือนของข้า ผู้ใดที่มีหูจงรับฟัง"
90002170-111 = "หา?! ดะ... โดนจับได้ตั้งแต่แรกแล้วเหรอ...!"
90002170-112 = "พี่โมโมอิ ที่สำคัญกว่านั้นน่ะ... เฮือก?"
90002170-113 = "ทุกคน! คุณครูกำลังตกลงมาค่ะ!"
90002170-116 = "(คุณครูตัวลอยอยู่ในอากาศ ในขณะเดียวกันก็ค่อยๆ ร่วงลงจากอากาศสู่พื้นดิน)"
90002170-117 = "(นี่คือปรากฏการณ์ที่อาจมองได้ว่าเป็นอำนาจ ความเมตตา หรือบุญคุณของเทพก็ได้...)"
90002170-118 = "(ทว่าสิ่งที่รอทุกคนอยู่ไม่ใช่สิ่งเหล่านั้นอย่างแน่นอน)"
90002170-122 = "คุณครู!"
90002170-123 = "คุณครู เป็นยังไงบ้างคะ?"
90002170-124 = "[s] \"ครูไม่เป็นไร! แต่ที่สำคัญตอนนี้คือ...\""
90002170-129 = "อ่า..."
90002170-130 = "เอ่อ..."
90002170-131 = "สะ... สวัส... ดีค่ะ ได้เจอกัน... อีกแล้วนะคะ"
90002170-132 = "คุณครู [USERNAME]"
90002170-133 = "[s] \"อื้อ... ทุกคนสบายดีใช่มั้ย? ได้เจอกันอีกแล้วนะ\""
90002170-134 = "อะ... อื้อ..."
90002170-135 = "แต่ว่าจากนี้ไป... จะไม่เป็นไรเหรอคะ? ทั้งคุณครู... แล้วก็คนอื่นทุกคนด้วย..."
90002170-136 = "[s] \"นั่นสินะ ครูน่าจะต้องเริ่มจากตรงนั้นก่อน\""
90002170-138 = "(คุณครูอธิบายสถานการณ์ทั้งหมดให้เด็กๆ ฟังอย่างรวดเร็ว)"
90002170-140 = "เรื่องมันเป็นอย่างนี้เองสินะ... ถ้างั้นก็..."
90002170-141 = "เข้าใจแล้วค่ะ ถ้าจะยืมคำของโมโมอิ คนที่เชื่อถือไม่ได้แต่ไม่เคยหมดกำลังใจมาพูดละก็"
90002170-142 = "ถึงเวลาเผชิญหน้ากับราชาปีศาจที่เป็นบอสตัวสุดท้ายจริงๆ แล้วสินะคะ"
90002170-147 = "ฮะ... เฮือก... ถ้านี่เป็นสถานการณ์ในเกมจริงๆ ฉันก็คงจะหาทางแก้ไขได้แล้ว..."
90002170-148 = "ในเมื่อมาถึงจุดนี้แล้ว เราก็ไม่มีทางย้อนกลับไปได้อีกแล้วละค่ะ"
90002170-149 = "ไม่เป็นไรหรอกนะ คุณครู อันที่จริงพวกเราก็พอรู้อยู่บ้างเหมือนกัน"
90002170-150 = "หืม? รู้ได้ยังไงน่ะเหรอ? คือว่า..."
90002170-151 = "ดะ... เดี๋ยวก่อน! ฉันว่าอย่าเพิ่งบุ่มบ่ามพูดไปน่าจะดีกว่านะ...?"
90002170-152 = "ทำไมล่ะ?"
90002170-156 = "ก็ถ้าตามคำที่มนุษย์ใช้กัน ที่ทำเมื่อกี้มันจัดว่าเป็น 'การดักฟัง' ไม่ใช่เหรอ...?"
90002170-157 = "แล้วมันทำไมเหรอ? ที่คิโวทอสก็มีรุ่นพี่คนหนึ่งที่พยายามดักฟังในสำนักงานชาเล่ต์ของคุณครูอยู่#nเป็นประจำเลยนะ"
90002170-163 = "ที่เมืองนั้น... ในหลายๆ แง่แล้วมัน... โอเคจริงๆ ใช่มั้ยคะ? "
90002170-165 = "ละ... แล้วพวกฉันควรทำยังไงดีล่ะคะ...?"
90002170-166 = "[s] \"ไม่ต้องหรอก ไปพักผ่อนกันได้เลยนะ\""
90002170-167 = "ตะ... แต่ว่า..."
90002170-168 = "ใช่ค่ะ พวกคุณเองก็อยู่ในสถานการณ์ที่คลุมเครือด้วย"
90002170-169 = "แต่ถ้าอยากช่วยพวกเรา ก็รอจังหวะได้เลยค่ะ"
90002170-173 = "ขอโทษนะคะ... เห็นทีฉันต้องขอกลับคำที่เพิ่งพูดไปแล้วละค่ะ"
90002170-174 = "คะ... คะ...? ทะ... ทำไมล่ะคะ?"
90002170-175 = "ดูเหมือนว่าวิธีที่ดีที่สุดสำหรับพวกคุณตอนนี้คือการไปซ่อนตัวก่อนค่ะ"
90002170-176 = "ว่าไงนะ...?"
90002170-178 = "ตอนนี้ 'เทพ' ผู้เก่งกล้านั่นกำลังจุติลงมาที่พื้นดินด้วยตัวเองน่ะสิคะ"
90002170-186 = "อะ... อ่าาา...!"
90002170-190 = "ไปก่อน เร็วเข้า"
90002170-191 = "ขะ... เข้าใจแล้วค่ะ...!"
90002170-196 = "คุณครู อาริสึพร้อมแล้วค่ะ"
90002170-197 = "ไม่เป็นไรค่ะ อย่าพูดคำว่าขอโทษกันเลยนะคะ"
90002170-198 = "ในบางแง่แล้ว บางทีอาริสึ... อาจรับชื่อนี้มาอีกครั้งเพื่อการนี้ก็ได้ค่ะ "
90002170-202 = "ขอร้องละค่ะ คุณครู! ไหนๆ ก็ไหนๆ แล้ว ขอแบบเต็มพลังเลยนะคะ!"
90002170-204 = "ค่ะ คุณครู! พวกหนูก็จะพยายามเต็มที่เหมือนกันค่ะ!"
90002170-205 = "ปรับกระบวนการทำงานของกล่องแห่งซิสดิมสำเร็จ สั่งการมาได้เลยค่ะ"
90002170-208 = "[ns] \"อื้อ มาลองดูกัน!\""
90002170-218 = "ค่ะ!!!"
90002170-220 = "ตอนต่อไป;เรื่องราวสำหรับเธอ"
