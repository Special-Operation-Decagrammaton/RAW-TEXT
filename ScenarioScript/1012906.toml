[translation]
1012906-1 = "ประกายแสงที่เด็กสาวไล่ตาม"
1012906-2 = "(คุณครูมาถึงสถานที่ที่สึซึมินัดเจอ)"
1012906-3 = "(ซึ่งสถานที่ที่สึซึมินัดเจอก็คือสวนสนุกที่เงียบสงบแห่งหนึ่งในทรีนิตี้)"
1012906-6 = "(ผ่านไป 10 นาที สึซึมิก็มาถึง)"
1012906-10 = "ขอโทษที่ฉันมาช้านะคะ คุณครู!!"
1012906-11 = "ขอโทษจริงๆ ค่ะ"
1012906-12 = "[s1] \"ไม่เลยๆ ครูก็เพิ่งมาถึงเมื่อกี้เอง!\"\n[s2] \"ไม่เป็นไรๆ\""
1012906-15 = "ขอบคุณที่ไม่ถือสาฉันนะคะ..."
1012906-16 = "คะ... คือว่าชุดนี้มันเกี่ยวข้องกับสาเหตุที่ทำให้ฉันมาสายนิดหน่อย..."
1012906-17 = "ที่จริงแล้ว..."
1012906-18 = "ฉันคงเหนื่อยมากเกินไป เลยเผลอเอาปากกาเคมีที่ใช้เซ็นใส่ปนลงไปกับผ้าที่ซักด้วย..."
1012906-19 = "เลยเหลือแค่เสื้อตัวนี้ตัวเดียวที่ไม่เปื้อนสีค่ะ..."
1012906-20 = "นะ... แน่นอนว่า... ฉันโทรไปขออนุญาตกับทางสวนสนุกไว้เรียบร้อยแล้วค่ะ"
1012906-21 = "วันนี้ที่นี่ไม่มีกิจกรรมพิเศษอะไร คงไม่มีเรื่องให้เข้าใจผิดเกี่ยวกับตัวละครนี้แน่นอนค่ะ"
1012906-22 = "[s3] \"เธอคงรู้สึกไม่ดีสินะ ยังไงก็ขอบคุณที่มานะ\"\n[s4] \"โทรไปบอกล่วงหน้าให้ด้วย จัดการได้เรียบร้อยมากเลย\""
1012906-25 = "ก็การตรวจสอบเรื่องพวกนี้... มันสำคัญยังไงล่ะคะ"
1012906-26 = "(...แถมฉันยังไม่อยากเลื่อนนัดคุณครูด้วย)"
1012906-27 = "(ก็อยากเจอกันวันนี้นี่นา...)"
1012906-28 = "[s5] \"น่ารักมากเลย เท่สุดๆ ด้วย!\" \n[s6] \"ครูว่าเหมาะกับใส่มาสวนสนุกดีออก!\""
1012906-31 = "งะ... งั้นเหรอคะ? โล่งอกไปที"
1012906-33 = "(คุณครูใช้เวลาที่สวนสนุกกับสึซึมิอย่างสนุกสนาน)"
1012906-34 = "(และเป็นเพราะชุดที่ใส่ทำให้สึซึมิเป็นที่สนใจของพวกเด็กๆ อย่างมาก)"
1012906-38 = "เจอนี่ซะ กีก้าไลท์นิ่ง!!"
1012906-39 = "พวกปีศาจโผล่มาอีกแล้ว!!"
1012906-40 = "นั่น... มีการแสดงกันสินะ"
1012906-41 = "การต่อสู้ครั้งใหญ่กับกองทัพปีศาจ... สินะคะ โชว์การแสดงฮีโร่นี่นา"
1012906-42 = "......"
1012906-44 = "(สึซึมิยืนนิ่งมองไปทางเวทีอยู่พักใหญ่)"
1012906-51 = "อ๊ะ"
1012906-52 = "ขอโทษที่ทำให้เสียเวลานานเลยค่ะ"
1012906-53 = "[s] \"มีอะไรกวนใจอยู่รึเปล่า?\""
1012906-54 = "ฉันไม่รู้ว่า... จะเรียกมันว่าเรื่องกวนใจจริงๆ ได้รึเปล่าค่ะ"
1012906-55 = "ผู้คนคงชื่นชอบเรื่องราวเกี่ยวกับฮีโร่ที่ช่วยเหลือผู้อื่นสินะคะ"
1012906-56 = "ทั้งเรื่องราวของฮีโร่และเรื่องราวของสาวน้อยเวทมนตร์ที่ฉันใส่ชุดอยู่นี่ก็เหมือนกัน"
1012906-57 = "ที่ทุกคนชื่นชอบและคาดหวังก็คงเป็นเพราะวีรบุรุษนั้นไม่มีอยู่ในชีวิตจริง"
1012906-58 = "...ฉันกำลังคิดแบบนั้นอยู่ค่ะ"
1012906-59 = "[s7] \"ฮีโร่ก็อยู่ตรงหน้าครูแล้วนะ\"\n[s8] \"สึซึมิใส่ชุดฮีโร่แล้วก็ทำสิ่งที่เหมือนฮีโร่เลยนี่นา\""
1012906-64 = "งั้นเหรอคะ?"
1012906-65 = "......"
1012906-66 = "ฉันไม่อยากคิดว่าตัวเองเป็นฮีโร่หรอกค่ะ"
1012906-67 = "แต่ถ้าคุณครูจะเรียกฉันแบบนั้น ฉันก็ยินดีค่ะ"
1012906-68 = "เพราะคุณครูคอยดูแลฉันด้วยความจริงใจเสมอๆ"
1012906-69 = "การที่ตอบรับความปรารถนาดีจากคนอื่นได้อย่างบริสุทธิ์ใจแบบนี้... มันเป็นเรื่องน่ายินดีมากเลยนะคะ"
1012906-70 = "[s9] \"ก็สึซึมิเท่จริงๆ นี่นา!\"\n[s10] \"ก็สึซึมิเท่สุดๆ เลยนี่นา!\""
1012906-73 = "ขอบคุณที่คอยอยู่ด้วยกันเสมอเลยนะคะ"
1012906-74 = "ขอบคุณที่ใจดีกับฉันมาตลอด แม้ว่าฉันจะเอาแต่พูดเรื่องที่ไม่สนุกเลยก็ตาม"
1012906-75 = "อ๊ะ มืดขนาดนี้แล้ว..."
1012906-81 = "ถ้าเป็นที่นี่ในตอนนี้ละก็... ฉันรู้สึกเหมือนจะคว้าดวงดาวเอามาไว้ในมือได้แล้วละค่ะ"
