10052110-99 = "3;아리스 결전;05;하지만 역시, 아리스는 모두와 있고 싶습니다.\n#3;stiff"
10052110-100 = "3;아리스 결전;20;밀레니엄의 모두…… 게임개발부 여러분과 유우카, 엔지니어부, 지금 함께 하는 초현상특무부를 포함한 다른 여러 친구들."
10052110-101 = "3;아리스 결전;10;다른 학교…… 게헨나의 고인물 선도부장님과, 소심하지만 엄청난 SRT의 저격수분, 그리고 아리스가 만나 왔던 모든 사람."
10052110-102 = "3;아리스 결전;07;그리고 무엇보다, 선생님과요.\n#3;em;[반짝]\n#3;greeting"
10052110-103 = "3;아리스 결전;10;이것은 아리스의 느낌입니다만, 소프의 말대로 모든 것이 이루어진다면, 그런 일상은…… 사라지고 말 것 같습니다."
10052110-104 = "3;통신 소프;12;……그건 그렇겠지.\n#3;em;[땀]"
10052110-105 = "3;통신 소프;13;하지만, 더 나은 세계가 펼쳐질 거야."
10052110-106 = "3;통신 소프;14;거기에서 [ruby=아리스]왕녀[/ruby]는 보다 중요한 위치…… 이름 없는 신들의 왕녀이자 증거, 주춧돌로서 모두를 이끄는 자리에 올라설 것이고."
10052110-107 = "3;아리스 결전;99;……."
10052110-108 = "3;아리스 결전;10;그런 것은, 괜찮습니다. 아리스에게는 그렇게까지 중요하지 않습니다.\n#3;em;[반응]"
10052110-109 = "3;케이 프로토;00;아리스……!\n#3;em;[?!]\n#3;shake"
10052110-110 = "3;아리스 결전;10;그런 것보다 선생님과, 다른 모두와 함께 보내는 일상이 사라진다는 것이, 아리스에게는 무엇보다 중요합니다."
10052110-111 = "3;아리스 결전;03;기억의 손실은 죽음과 같은 것이라고, 소프 역시 이야기하지 않았던가요?"
