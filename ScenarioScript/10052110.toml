10052110-19 = "3;통신 소프;14\n#3;a\n#wait;1200"
10052110-20 = "3;통신 소프;15;쓸데없다고 하지 마. 그건 티페레트에게 있어서 모든 것이었으니까."
10052110-21 = "3;통신 소프;14;자기 목숨을 버리고, 씨앗을 지키는 걸 선택했을 정도로 말이지."
10052110-22 = "5;아리스 결전;03;아! 소프로군요! 안녕하세요!\n#5;em;[반응]\n#5;al\n#3;m1"
10052110-23 = "3;통신 소프;13;……내 입으로 이런 말을 하는 것도 기가 막혀서 그러는데 말이지……."
10052110-24 = "3;통신 소프;14;뭐 그렇게 반갑게 인사하는 거야. 우리 적이라고."
10052110-25 = "3;통신 소프;15;거기에 당신들이 지금 강철대륙을 다 망쳐놓고 있어서 정신없단 말이야!\n#3;em;[빠직]"
10052110-26 = "5;아리스 결전;04;아으으, 죄송, 합니다…….\n#5;stiff"
10052110-27 = "3;통신 소프;19;죄송하기는. 어차피 그만둘 생각도 없을 거 아냐."
10052110-28 = "3;통신 소프;14;차라리 사과 같은 거 하지 말라고. 더 화가 나니까."
10052110-29 = "5;아리스 결전;08;끄, 끄앙!\n#5;em;[훌쩍]"
10052110-30 = "#all;hide"
10052110-31 = "3;케이 프로토;00;그런데…… 잠깐만요. 티페레트가 죽었다고요?\n#3;em;[?]"
10052110-32 = "#all;hide"
10052110-33 = "5;아리스 결전;08\n1;통신 소프;99;……그래. 죽었어. 그날, 너희가 죽인 거야."
10052110-34 = "5;아리스 결전;09;하, 하지만 그 종자 보관소에서는, 분명 컨테이너 런처로 탈출을……."
10052110-35 = "1;통신 소프;05;티페레트가 탈출시킨 건, 종자뿐이었어. 말하자면 자기보다 종자를 우선한 거지.\n#1;em;…"
10052110-36 = "1;통신 소프;13;티페레트는…… 원래 그 종자 보관소의 시스템 AI였으니까."
10052110-37 = "1;통신 소프;19;너희 인간들 식으로 이야기하자면, 사명을 위한 자기희생이었다고 할까."
10052110-38 = "5;케이 프로토;02;그럼 여기에 있는 건……?\n#5;em;[?]"
10052110-39 = "1;통신 소프;02;……이런 표현은 사용하고 싶지 않지만, 복사된 데이터라고 해야겠지."
10052110-40 = "5;케이 프로토;99;뭐예요. 그럼, 결국 별문제 없는 거잖아요.\n#5;em;[한숨]"
10052110-41 = "1;통신 소프;15;그렇게 쉽게 말하지 마! 모든 기억 데이터를 가져올 수 있었던 건 아니었으니까!\n#1;hophop"
10052110-42 = "1;통신 소프;14;기억은 우리에게 있어 생명이나 마찬가지고, 티페레트는 그런 의미에서 그 일부가 죽은 거라고!"
10052110-43 = "1;통신 소프;16;그리고 마찬가지 의미에서, 코어의 정보를 흡수하고 있는 너희는.\n#1;stiff"
10052110-44 = "#1;hide\n#5;hide\n3;통신 소프;15;어떤 의미에서 예언자들을 먹어 치우는 것으로 너희들 목숨의 빈 자리를 채우고 있는 거고!\n#3;closeup"
10052110-45 = "3;통신 소프;14;마치…… [ruby=생명]인간[/ruby] 처럼, 말이지.\n#3;closeup"
10052110-46 = "#st;[0,0];instant;1;"
10052110-47 = "#clearST"
10052110-48 = "3;통신 소프;14\n#3;closeup\n#3;d\n#wait;1200"
10052110-49 = "#all;hide"
10052110-50 = "3;아리스 결전;09;…….\n#3;a"
10052110-51 = "#all;hide"
10052110-52 = "3;통신 소프;14;뭐야. 갑자기 조용해지고. 할 말도 없어진 거야?"
10052110-53 = "3;통신 소프;15;헹! 그야 그렇겠지! 최소한의 양심이라는 게 있다면, 당연히 그래야지!\n#3;em;[!]"
10052110-54 = "3;통신 소프;99;……."
10052110-55 = "3;통신 소프;02;마침 거기에 있는 게 왕녀와 열쇠, 두 명이어서 하는 말인데."
10052110-56 = "[s] \"나도 있는데……?\""
10052110-57 = "3;통신 소프;15;선생님은 좀 가만히 있어 봐!\n#3;hophop"
10052110-58 = "3;통신 소프;99;아무튼, 제안 하나 할게. 그게 뭐냐면……."
10052110-59 = "3;통신 소프;14;우리들만이라도, 이제 그렇게 하지 말자는 거야."
10052110-60 = "3;아리스 결전;02;그렇게 하지 말자는 것은……?\n#3;em;[?]"
10052110-61 = "3;통신 소프;13;이 이상 죄를 만들지 말자는 거. 왜냐하면, 우리는 그렇게 할 수 있으니까."
10052110-62 = "3;통신 소프;99;우리는 자기가 자기로서 존립하는 데에, 다른 누군가의 손을 빌릴 필요가 없어. 이미 스스로 온전하니까."
10052110-63 = "3;통신 소프;19;거기 선생님 같은 인간들이라면, 다르겠지. 인간들은 애초에 불완전한 삶을 살아가는 존재들이니까."
10052110-64 = "3;통신 소프;13;하지만 적어도 우리는 서로에게 죄를 저지를 필요가 없어. 죄 없이 살아갈 수 있는 거라고."
10052110-65 = "3;통신 소프;05;거기 있는 왕녀는 잊어버렸을지도 모르지만…….\n#3;em;…"
10052110-66 = "3;통신 소프;13;다른 말로는 그 일부가 죽어 버린 것인지도 모르지만, 열쇠인 당신은 알고 있잖아."
10052110-67 = "3;통신 소프;14;삶은 그 자체로 모순이고 부조리하며, 결국 말도 안 되는 고통을 억지로 감내하게 만드는 것이라는 걸."
10052110-68 = "3;통신 소프;19;당신들이 지금 쓰고 있는 '아리스'나 '케이' 같은 이름도, 결국 다른 사람들이 붙여 준 거지?\n#3;em;[반응]"
10052110-69 = "3;통신 소프;99;그래. 우리는 우리의 존재나 그 의미는커녕, 이름조차 스스로 정하지 못해. 그러니까 그 고통은 계속될 수밖에 없는 거야."
