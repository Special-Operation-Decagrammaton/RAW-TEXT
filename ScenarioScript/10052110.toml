[translation]
10052110-1 = "提法瑞特：頌揚苦難的美之贖罪者"
10052110-4 = "已經進入提法瑞特區域的建築內部了……"
10052110-5 = "[s] 「總覺得跟那個時候很像？」"
10052110-10 = "不過卻變乾淨了呢。#n也就是說……這裡完全重現了種子保管庫嗎？"
10052110-11 = "真是的，何必做這種沒意義的麻煩事呢……"
10052110-20 = "別說沒意義好嗎？那對提法瑞特來說可是一切啊。"
10052110-21 = "甚至到了不惜放棄自己的生命，也要選擇保護種子的程度。"
10052110-22 = "啊！是Soph呢！你好！"
10052110-23 = "雖然這句話從我嘴裡說出來也挺讓人無言的……"
10052110-24 = "為什麼要那麼高興地跟我打招呼啊？我們可是敵人耶。"
10052110-25 = "而且你們把鋼鐵大陸搞得亂七八糟，害我們現在忙到不行知道嗎！"
10052110-26 = "啊嗚，對不起……"
10052110-27 = "對不起有什麼用，反正你們也沒打算停下來吧。"
10052110-28 = "還不如乾脆別道歉了，那樣只會更讓人生氣。"
10052110-29 = "嗚，嗚哇！"
10052110-31 = "但是……先等一下。#n你剛才說提法瑞特死了？"
10052110-33 = "……沒錯，死了。#n就在那天，被你們給殺死了。"
10052110-34 = "可，可是在種子保管庫的時候，它不是用貨櫃發射器逃走了嗎……"
10052110-35 = "提法瑞特發射的只有種子而已。#n也就是說，它把種子看得比自己還重要。"
10052110-36 = "畢竟提法瑞特……本來就是那個種子保管庫的系統AI。"
10052110-37 = "如果用你們人類的說法，應該能算是為了使命而自我犧牲了吧。"
10052110-38 = "既然如此，現在在這裡的是……？"
10052110-39 = "雖然不太想用這種說法……可以說是複製的數據吧。"
10052110-40 = "什麼嘛，那不就沒問題了嗎？"
10052110-41 = "別說得那麼簡單好嗎！不是所有記憶數據都能帶過來的！"
10052110-42 = "記憶對我們來說就等同於生命，提法瑞特的一部分就跟死了沒兩樣！"
10052110-43 = "同理，你們現在吸收核心情報的行為……"
10052110-44 = "簡直就是在藉由捕食預言者，來填補自己生命的空缺！"
10052110-45 = "就像……[ruby=生命]人類[/ruby]一樣。"
10052110-50 = "……"
10052110-52 = "突然安靜是什麼意思。已經無話可說了是嗎？"
10052110-53 = "哼！那當然！如果你們還有最基本的良心，本來就應該這樣！"
10052110-54 = "……"
10052110-55 = "剛好現在王女和鑰匙都在，所以姑且跟你們說一聲。"
10052110-56 = "[s] 「我也在啊……？」"
10052110-57 = "老師你先安靜！"
10052110-58 = "總之，我有個提議。那就是……"
10052110-59 = "至少我們之間，別再那樣做了吧。"
10052110-60 = "那樣做指的是……？"
10052110-61 = "不要再製造更多罪過了。#n要問為什麼的話，是因為我們能做得到。"
10052110-62 = "我們不需要借助別人的手來讓自己存在。因為我們本來就是完整的。"
10052110-63 = "不過像老師那樣的人類就不同了。#n人類本來就是不完整的存在。"
10052110-64 = "至少我們不需要對彼此犯罪。我們可以無罪地活下去。"
10052110-65 = "雖然那邊的王女可能已經忘了……"
10052110-66 = "或者也能說那個部分已經死了，但作為鑰匙的你應該知道才對。"
10052110-67 = "生命本身就充滿矛盾和荒謬，只會強迫我們忍受難以忍受的痛苦。"
10052110-68 = "你們現在用的「愛麗絲」或「Kei」這樣的名字，也是別人取的對吧？"
10052110-69 = "沒錯。我們就連自己的存在和意義，甚至連名字都無法自己決定。#n因此那種痛苦才會一直持續下去。"
10052110-73 = "所以……就到此為止吧。"
10052110-74 = "至少在我們之間……照我說的這麼做吧。"
10052110-75 = "明明能做到卻選擇不做，這本身就是另一種罪過啊。"
10052110-81 = "……"
10052110-82 = "對不起，Soph。愛麗絲不太能理解。#n或許是因為愛麗絲是個笨蛋也說不定。"
10052110-83 = "Soph剛才說的話，也可能並沒有錯。"
10052110-84 = "但是……就算是這樣。"
10052110-85 = "我依然覺得作為「愛麗絲」而不是「王女」……"
10052110-86 = "一路以來經歷過的那些時間，並不是沒有意義的。"
10052110-87 = "那分明是在狡辯！"
10052110-88 = "沒錯。這並不是在談論邏輯，更多是愛麗絲個人的感覺。"
10052110-99 = "但是，愛麗絲果然還是想和大家在一起。"
10052110-100 = "千年的所有人……#n像是遊戲開發部的各位、優香、工程師部、身邊的特異現象搜查部和其他朋友們。"
10052110-101 = "還有其他學園的大家……#n格黑娜滿級的風紀委員長、膽小卻很厲害的SRT狙擊手，以及一路遇見過的所有人。"
10052110-102 = "當然還有最重要的老師。"
10052110-103 = "雖然這只是愛麗絲的感覺……#n如果一切都變得跟Soph說的一樣……那樣的日常應該會消失吧。"
10052110-104 = "……這倒是沒錯。"
10052110-105 = "不過更好的世界也會隨之展開。"
10052110-106 = "在那裡，[ruby=愛麗絲]王女[/ruby]將站上更重要的位置……#n作為無名諸神的王女與證明，以基石之身引領眾人。"
10052110-107 = "……"
10052110-108 = "那種事……對愛麗絲來說並沒有那麼重要。"
10052110-109 = "愛麗絲……！"
10052110-110 = "和老師、和大家一起度過的日常會消失這件事，對愛麗絲才是最重要的。"
10052110-111 = "Soph不也說過，記憶的喪失等同於死亡嗎？"
10052110-112 = "所以愛麗絲……"
10052110-116 = "會把這份記憶和情感貫徹到底！"
