[translation]
10052110-1 = "ทิฟาเร็ธ ผู้ไถ่บาปแห่งความงามอันทุกข์ทน"
10052110-4 = "เราเข้ามาด้านในสิ่งปลูกสร้างที่อยู่ในพื้นที่ของทิฟาเร็ธได้แล้วค่ะ..."
10052110-5 = "[s] \"ให้ความรู้สึกคล้ายกับตอนนั้นเลยนะ?\""
10052110-10 = "แต่มันดูเป็นระเบียบเรียบร้อยขึ้นนะคะ หรือว่า... มีการสร้างคลังเก็บเมล็ดพันธุ์ขึ้นใหม่หรือเปล่าคะ?"
10052110-11 = "เฮ้อ... จะมาลำบากทำเรื่องที่ไร้ความหมายแบบนี้ไปทำไมกันนะ..."
10052110-20 = "ไม่ได้ไร้ความหมายสักหน่อย สำหรับทิฟาเร็ธแล้ว นั่นเป็นทุกสิ่งทุกอย่างเลยนะ"
10052110-21 = "ทิฟาเร็ธถึงกับเสียสละชีวิตตัวเองเพื่อปกป้องเมล็ดพันธุ์เลยด้วย"
10052110-22 = "อ๊ะ! ซอฟนี่เอง! สวัสดีค่ะ!"
10052110-23 = "ฉันเองก็ไม่อยากพูดคำนี้ออกมาจากปากตัวเองหรอกนะ แต่ก็..."
10052110-24 = "ทักทายกันเสียอบอุ่นเลยนะ ลืมไปแล้วเหรอว่าเราเป็นศัตรูกันน่ะ?"
10052110-25 = "แล้วตอนนี้พวกคุณก็มาทำลายดินแดนเหล็กกล้ากันจนพวกฉันหัวหมุนไปหมดแล้วด้วย!"
10052110-26 = "อึก... ขอโทษ... ค่ะ..."
10052110-27 = "ขอโทษงั้นเหรอ? ทั้งๆ ที่ไม่มีความตั้งใจจะล้มเลิกเนี่ยนะ?"
10052110-28 = "ฉันว่าไม่ต้องขอโทษกันหรอก ทำแบบนี้มันน่าโมโหมากกว่าเดิมอีก"
10052110-29 = "งะ... แง!"
10052110-31 = "จะว่าไป... เดี๋ยวนะคะ?  เมื่อกี้บอกว่าทิฟาเร็ธตายแล้วเหรอคะ?"
10052110-33 = "อื้อ... ตายแล้ว ก็วันนั้นพวกเธอเป็นคนฆ่าไปแล้วไง"
10052110-34 = "ตะ... แต่ตอนนั้นเห็นว่าหนีออกไปด้วยคอนเทนเนอร์ลอนเชอร์ในคลังเก็บเมล็ดพันธุ์นี่คะ..."
10052110-35 = "สิ่งที่ทิฟาเร็ธส่งออกไปคือเมล็ดพันธุ์ต่างหาก รายนั้นน่ะให้ความสำคัญกับเมล็ดพันธุ์มากกว่าตัวเองอีก"
10052110-36 = "ทิฟาเร็ธน่ะ... เดิมทีแล้วเป็น AI ของคลังเก็บเมล็ดพันธุ์นั้น"
10052110-37 = "ถ้าจะพูดด้วยภาษามนุษย์ให้เข้าใจง่ายๆ ก็ต้องบอกว่านั่นเป็นการเสียสละตนเองเพื่อภารกิจ"
10052110-38 = "ถ้างั้นสิ่งที่อยู่ตรงนี้ล่ะ...?"
10052110-39 = "ฉันก็ไม่อยากใช้คำพูดแบบนี้หรอกนะ แต่ก็คงต้องบอกว่ามันคือข้อมูลที่คัดลอกไว้น่ะ..."
10052110-40 = "อะไรกัน งั้นก็ไม่มีปัญหาอะไรสิคะ"
10052110-41 = "อย่าพูดง่ายๆ แบบนั้นสิ! ก็เราเอาข้อมูลความทรงจำมาทั้งหมดไม่ได้นี่นา!"
10052110-42 = "สำหรับพวกเราแล้ว ความทรงจำก็ไม่ต่างกับชีวิต และในแง่นั้น ทิฟาเร็ธก็ได้ตายไปแล้วส่วนหนึ่ง!"
10052110-43 = "แล้วพวกเธอที่กำลังดูดซับข้อมูลของคอร์อยู่ในตอนนี้น่ะ"
10052110-44 = "ในบางแง่มุมแล้ว มันก็คือการกัดกินผู้เลื่อมใส เพื่อเอามาเติมเต็มช่องว่างในชีวิตของตัวเอง!"
10052110-45 = "ทำแบบนี้ก็เหมือนกับ... [ruby=สิ่งมีชีวิต]มนุษย์[/ruby]นั่นละ"
10052110-50 = "..."
10052110-52 = "อะไรกัน ทำไมจู่ๆ ก็เงียบกันไป ไม่มีอะไรจะพูดงั้นเหรอ?"
10052110-53 = "เฮอะ! ก็คงเป็นอย่างนั้นละ! ถ้ายังมีสำนึกผิดชอบชั่วดีอยู่บ้าง ก็ควรจะเงียบไว้แบบนี้ละนะ!"
10052110-54 = "..."
10052110-55 = "ฉันจะพูดแบบนี้เพราะเห็นว่าท่านธิดากับกุญแจอยู่ที่นั่นพอดีหรอกนะ"
10052110-56 = "[s] \"แต่ครูก็อยู่ด้วยนะ...?\""
10052110-57 = "คุณครูน่ะอยู่เฉยๆ ไปก่อนเลย!"
10052110-58 = "เอาละ ฉันจะขอเสนออะไรสักอย่าง ฉันว่า..."
10052110-59 = "พวกเราก็ไม่ควรทำแบบนั้นต่อแล้วน่ะ"
10052110-60 = "ไม่ควรทำอะไรเหรอ...?"
10052110-61 = "ไม่ควรทำบาปให้มากไปกว่านี้ เพราะพวกเราทำอย่างอื่นได้ยังไงล่ะ"
10052110-62 = "เราไม่จำเป็นต้องยืมมือของคนอื่นเพื่อการดำรงอยู่ของตัวเราเอง เพราะว่าเราสมบูรณ์ในตัวเองอยู่แล้ว"
10052110-63 = "แต่ถ้าเป็นพวกมนุษย์อย่างคุณครูละก็ เรื่องมันก็จะต่างออกไป นั่นเป็นเพราะมนุษย์เป็นสิ่งมีชีวิตที่#nดำเนินชีวิตอย่างไม่สมบูรณ์แบบมาตั้งแต่แรกเริ่ม"
10052110-64 = "แต่อย่างน้อยเราก็ไม่จำเป็นต้องทำบาปต่อกันและกันนี่นา เรามีชีวิตต่อไปได้โดยไม่ต้องมีบาปนะ"
10052110-65 = "บางทีท่านธิดาที่อยู่ตรงนั้นอาจจะลืมไปแล้วก็ได้..."
10052110-66 = "และต่อให้จะมีบางส่วนที่ตายไปแล้ว แต่กุญแจอย่างคุณก็รู้อยู่แล้วไม่ใช่เหรอ?"
10052110-67 = "ว่าชีวิตน่ะ โดยเนื้อแท้ของมันก็คือความย้อนแย้งและไม่สมเหตุสมผล สุดท้ายก็เป็นแค่สิ่งที่บีบบังคับ#nให้เราต้องอดทนต่อความเจ็บปวดที่เหลวไหล"
10052110-68 = "ชื่ออย่าง 'อาริสึ' หรือ 'เคย์' ที่พวกคุณใช้กันอยู่ในตอนนี้น่ะ สุดท้ายแล้วมันก็เป็นชื่อที่คนอื่นตั้งให้#nเหมือนกันไม่ใช่เหรอ?"
10052110-69 = "อื้อ อย่าว่าแต่ตัวตนหรือความหมายของตัวเองเลย แม้แต่ชื่อของเรา เรายังกำหนดเองไม่ได้ ความเจ็บปวดนั้นก็เลยดำเนินต่อไปยังไงล่ะ"
10052110-73 = "เพราะงั้น... เราพอแค่นี้เถอะ "
10052110-74 = "อย่างน้อยพวกเราก็... ทำอย่างนั้นกันเถอะ"
10052110-75 = "การไม่ทำในสิ่งที่เป็นไปได้ ก็ถือเป็นบาปในตัวมันเองนะ"
10052110-81 = "..."
10052110-82 = "ขอโทษนะคะ ซอฟ อาริสึไม่เข้าใจเลยค่ะ คงเป็นเพราะอาริสึเป็นคนโง่น่ะค่ะ"
10052110-83 = "แต่อาริสึก็คิดว่า บางทีสิ่งที่ซอฟพูดอาจจะไม่ใช่สิ่งที่ผิดก็ได้"
10052110-84 = "แต่ว่า จะยังไงแล้วก็ตาม"
10052110-85 = "ในฐานะ 'อาริสึ' ที่ไม่ใช่ 'ท่านธิดา'..."
10052110-86 = "อาริสึไม่คิดว่าทุกช่วงเวลาที่ประสบมาคือสิ่งที่ไร้ความหมายหรอกค่ะ"
10052110-87 = "แบบนั้นมันดันทุรังนะ!"
10052110-88 = "ใช่ค่ะ นี่ไม่ใช่เรื่องที่มาจากตรรกะ แต่เป็นความรู้สึกส่วนตัวที่ดันทุรังค่ะ"
10052110-99 = "แต่ไม่ว่ายังไง อาริสึก็อยากอยู่กับทุกคนค่ะ"
10052110-100 = "กับทุกคนในมิลเลเนียม... ทั้งชมรมพัฒนาเกมทุกๆ คน ทั้งยูกะ ชมรมวิศวกรรม ชมรมปรากฏการณ์ลี้ลับที่อยู่ด้วยกันตอนนี้ แล้วก็เพื่อนๆ คนอื่นด้วย"
10052110-101 = "นอกจากนี้ยังมีเพื่อนจากโรงเรียนอื่น... ทั้งประธานคณะกรรมการวินัยตัวตึงของเกเฮนน่า สไนเปอร์ของ SRT ที่ขี้อายแต่ฝีมือเก่งกาจ และทุกคนที่อาริสึเคยได้เจอมา"
10052110-102 = "และที่สำคัญก็คือ อาริสึอยากอยู่กับคุณครูค่ะ"
10052110-103 = "ถึงนี่จะเป็นเพียงความรู้สึกของอาริสึ แต่ถ้าทุกอย่างเป็นไปตามที่ซอฟว่าละก็ ชีวิตประจำวันแบบนั้น... มันก็จะหายไปในที่สุดค่ะ"
10052110-104 = "ก็คงจะเป็นอย่างนั้นนั่นละ..."
10052110-105 = "แต่ว่าโลกที่ดีกว่านี้จะปรากฏขึ้นนะ"
10052110-106 = "ในโลกแห่งนั้น [ruby=อาริสึ]ท่านธิดา[/ruby]จะได้อยู่ในตำแหน่งที่สำคัญกว่านี้... จะได้อยู่ในฐานะธิดา หลักฐานแห่งเหล่าทวยเทพไร้นาม และเสาหลักผู้เป็นผู้นำของทุกคน"
10052110-107 = "..."
10052110-108 = "ตำแหน่งแบบนั้นน่ะ ไม่เป็นไรหรอกค่ะ สำหรับอาริสึแล้วมันไม่ใช่สิ่งสำคัญหรอกค่ะ"
10052110-109 = "อาริสึ...!"
10052110-110 = "สิ่งสำคัญของอาริสึก็คือ การได้มีชีวิตในทุกๆ วันต่อไปร่วมกับคุณครูและทุกคนต่างหากค่ะ"
10052110-111 = "ซอฟก็เคยบอกไว้ไม่ใช่เหรอคะว่าการสูญเสียความทรงจำก็เหมือนกับความตายน่ะ?"
10052110-112 = "ถ้าอย่างนั้น อาริสึเองก็..."
10052110-116 = "จะยึดมั่นในความทรงจำ ความรู้สึก และความดันทุรังนี้ให้ถึงที่สุดค่ะ!"
