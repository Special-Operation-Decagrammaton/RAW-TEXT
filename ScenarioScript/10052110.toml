10052110-10 = "3;케이 프로토;01;하지만 깔끔해지긴 했네요. 그렇다는 건…… 아예 종자 보관소 자체를 재현해 놓은 걸까요?\n#3;a"
10052110-11 = "3;케이 프로토;99;나, 참. 뭐 하러 이런 쓸데없는 수고를…….\n#3;em;[한숨]"
