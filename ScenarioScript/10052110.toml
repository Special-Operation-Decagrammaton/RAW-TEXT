10052110-81 = "3;아리스 결전;09;……."
10052110-82 = "3;아리스 결전;99;미안합니다. 소프. 아리스는 잘 모르겠습니다. 그건 아마 아리스가 바보라서 그런 것이겠지요."
10052110-83 = "3;아리스 결전;09;어쩌면 소프가 하는 말이, 틀리지 않은 것일지도 모르겠다는 생각도 들기는 합니다."
10052110-84 = "3;아리스 결전;05;그렇지만, 그래도.\n#3;stiff"
10052110-85 = "3;아리스 결전;02;'왕녀'가 아닌 '아리스'로서……."
10052110-86 = "3;아리스 결전;05;겪어 왔던 그 모든 시간에, 의미가 없었던 것은 아니라고 생각합니다.\n#3;em;[반응]"
