[translation]
10052030-2 = "หน็อยยยยยย!!!"
10052030-3 = "ฝากไว้ก่อนเถอะค่ะ! ฮิมาริ ริโอะ แล้วก็คุณครูด้วย!!!!!"
10052030-8 = "มารีบปิดงานนี้กันเถอะค่ะ ริโอะ"
10052030-9 = "อื้อ... "
10052030-18 = "[ns] \"ฮิมาริ! ริโอะ! เป็นยังไงบ้าง?\""
10052030-19 = "ตายจริง คุณครูเป็นห่วงกันขนาดนี้เลยเหรอคะ คุ้มค่ากับที่ฉันฝืนแทรกแซงสัญญาณเข้าไปจริงๆ เลยค่ะ"
10052030-20 = "ฉันไม่บาดเจ็บตรงไหนเลยค่ะ ต้องขอบคุณคุณครูเลยนะคะ♪ "
10052030-21 = "แต่ถ้าคุณครูจะเป็นห่วงเป็นใยกันแบบนี้ทุกครั้ง ฉันก็อยากออกโรงแบบนี้อีกเรื่อยๆ เลยค่ะ♬"
10052030-22 = "อืม... ถึงจะไม่ค่อยแน่ใจเท่าไร แต่ฉันว่าอย่าเลยดีกว่า..."
10052030-23 = "[ns] \"ใช่แล้วละ ครั้งนี้ริโอะพูดถูกนะ\""
10052030-24 = "เฮ้อ..."
10052030-25 = "ทำไมถึงทำหน้าบูดบึ้งแบบนั้นล่ะคะ ฮิมาริ...?"
10052030-26 = "แต่ก็เอาเถอะค่ะ ยังไงก็โล่งอกไปทีนะคะที่ทั้งสองคนกลับมาได้อย่างปลอดภัย"
10052030-27 = "ตายจริง พอเคย์เป็นห่วงจากใจจริงแบบนี้ ฉันก็รู้สึกมีพลังขึ้นมาอีกครั้งเลยนะคะ"
10052030-28 = "พะ... พอเลยค่ะ! ไม่น่าเสียเวลาเป็นห่วงเลยนะคะเนี่ย!!!"
10052030-32 = "หัวหน้า? ประธาน? เป็นยังไงกันบ้าง? ฉันว่า... เราเจอสิ่งที่เรียกว่า 'คอร์' อะไรนั่นแล้วละ"
10052030-37 = "นั่นคือคอร์จริงๆ เหรอ...?"
10052030-39 = "เคย์? ถึงจะอยู่คนละที่กัน แต่พอจะตรวจสอบให้หน่อยได้หรือเปล่า?"
10052030-40 = "รอเดี๋ยวนะคะ... ช่วยเอาสิ่งนั้นวางไว้ที่พื้นให้หน่อยได้มั้ยคะ เอมิ?"
10052030-41 = "หืม? อื้อ ได้สิ"
10052030-45 = "..."
10052030-46 = "ความเข้าใจ... ผู้สังเกตการณ์... [ruby=JEHOVAH ELOHIM]เยโฮวาห์ เอโลฮิม [/ruby]... ความเงียบและความโลภ ความอุดมและความเศร้าโศก..."
10052030-47 = "...!"
10052030-48 = "ค่ะ ใช่แน่นอนค่ะ นั่นคือคอร์ของบีนาห์ค่ะ "
10052030-49 = "ว้าว ถึงไม่เห็นด้วยตาของตัวเอง แต่ก็เข้าใจได้เลยเหรอคะ?"
10052030-50 = "ก็ถ้าเป็นตอนนี้น่ะค่ะ"
10052030-51 = "อย่างนั้นสินะ เหตุผลเพราะพื้นที่รอบๆ หลุมนี้อยู่ในการยึดครองของพวกเราแล้ว...!"
10052030-52 = "ใช่ค่ะ แล้วพื้นที่นี้ก็ยังเป็นเหมือนจุดเริ่มต้นของเครือข่ายของดินแดนเหล็กกล้า ฉันก็เลยทำแบบนั้นได้ค่ะ"
10052030-53 = "อีกอย่าง... ฉันก็ได้รู้ข้อมูลชุดใหม่เกี่ยวกับคอร์ของผู้เลื่อมใสมาด้วยค่ะ"
10052030-54 = "รู้อะไรเหรอคะ?"
10052030-55 = "คอร์ข้อมูล... หรือข้อมูลที่จับต้องไม่ได้... "
10052030-56 = "หรืออีกนัยหนึ่งก็คือสิทธิ์การเข้าถึงเครือข่ายระดับสูงและเทวานุภาพ... และแต่ละตัวตนในเซฟิร่า... สามารถย้ายมาไว้ในร่างกายฉันได้ ในส่วนนี้ฉันเคยบอกกับทุกคนไว้แล้วใช่มั้ยล่ะคะ?"
10052030-57 = "แต่ถ้ามองให้ลึกลงไปอีกขั้น..."
10052030-58 = "ถ้าเราใช้ประโยชน์จากคอร์ของผู้เลื่อมใสกับยานขนส่ง ฉันว่าเราจะปรับปรุงและเสริมความแข็งแกร่ง#nให้กับตัวยานได้ค่ะ"
10052030-59 = "ยังไงเหรอ...?"
10052030-60 = "ก็ถ้าเรา... ปลูกถ่ายคอร์ของบีนาห์ไว้ในยานขนส่ง เราก็จะใช้พลังงานบางส่วนของบีนาห์กับยานขนส่ง#nของเราได้ค่ะ"
10052030-61 = "กับผู้เลื่อมใสตนอื่นก็เหมือนกันค่ะ"
10052030-66 = "ถ้าทำแบบนั้น...? อย่าบอกนะว่า!!!"
10052030-67 = "เป็นอย่างนั้นสินะคะ เคย์! ทำแบบสิ่งมีชีวิตกลมๆ ที่กลืนกินศัตรูและเลียนแบบความสามารถมา!"
10052030-68 = "ไม่ใช่ค่ะ อาริสึ... เฮ้อ... "
10052030-69 = "พูดเปรียบเปรยว่าเป็นอาวุธติดแขนที่เพิ่มฟังก์ชันเข้าไปโดยการติดตั้งชิพอาวุธพิเศษแทนเถอะค่ะ..."
