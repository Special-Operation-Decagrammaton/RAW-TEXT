10052030-50 = "For here and now, yes."
10052030-51 = "...! I see. While we're still in the process of taking over Binah's territory, the area around this pit is already integrating...!"
10052030-52 = "Exactly. On top of that, this place resembles the Steel Continent's entrance, making interfacing like this possible."
10052030-53 = "And...I've gleaned additional information from the prophet's core."
10052030-54 = "What would that be?"
10052030-55 = "The core's information... So, the immaterial data... "
10052030-56 = "The network's higher access authority and divine power...the persona of each Sephira, can be downloaded into my body. I mentioned this previously."
10052030-57 = "But, to take it a step further..."
10052030-58 = "If we were to implant the prophets' cores into the transport ship and utilize them, we could modify and enhance the transport ship itself."
10052030-59 = "In what way...?"
10052030-60 = "So... For example, if we implanted Binah's core into the transport ship, the ship would be able to use some of Binah's abilities and output."
10052030-61 = "The other prophets' cores should behave in the same way."
10052030-66 = "...? No way!"
10052030-67 = "It is like that guy, Kei! The round entity that inhales his foes and copies their abilities!"
10052030-68 = "No, Aris... *sigh*"
10052030-69 = "I would prefer an analogy like...an arm-mounted weapon where its functions can be expanded by equipping special chips."
