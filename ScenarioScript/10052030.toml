10052030-51 = "1;리오 결전;05;……! 그렇구나. 비나의 구역 전체는 아직 점령 중이지만, 이 구덩이 근처는 벌써……!\n#3;m4\n#1;ar\n#1;em;[!]"
10052030-52 = "3;케이 프로토;99;그래요. 더군다나 이 구역은 강철대륙 네트워크의 도입부 같은 곳이기도 하니까, 이 정도는 가능한 거죠."
10052030-53 = "3;케이 프로토;02;그리고…… 예언자들의 코어에 대해서, 또다시 새롭게 알아낸 정보가 있었습니다."
