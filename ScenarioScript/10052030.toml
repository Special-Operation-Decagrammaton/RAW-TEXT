10052030-28 = "...!! Q-Quit it! It was nothing, after all!"
10052030-32 = "President? Miss Rio? I believe I have recovered the core."
10052030-37 = "That...is the core?"
10052030-39 = "Kei? Can you confirm it through the screen?"
10052030-40 = "I'll try... Eimi, please place it on the ground."
10052030-41 = "Hm? Sure."
10052030-45 = "..."
