[translation]
10052030-2 = "可惡可惡可惡可惡！！！"
10052030-3 = "通通給我記住！#n陽葵、莉央，還有老師！！！！！"
10052030-8 = "那麼我們快點收尾吧，莉央。"
10052030-9 = "……是啊。"
10052030-18 = "[ns] 「陽葵！莉央！你們沒事吧？」"
10052030-19 = "哎呀，老師居然這麼關心我，看來勉強介入線路是值得的呢。"
10052030-20 = "託老師的福，我完全沒事♪"
10052030-21 = "如果每次都能這樣的話，我甚至都在考慮要不要以後都用這種方式了呢♬"
10052030-22 = "唔嗯……雖然不是很理解，但是那樣感覺不太好……"
10052030-23 = "[ns] 「就是說啊。這次莉央說得對。」"
10052030-24 = "嗚嗚……"
10052030-25 = "……何必沮喪地那麼明顯啊，陽葵。"
10052030-26 = "總之，兩個人都平安回來真是太好了。"
10052030-27 = "哎呀，Kei居然會真心地為我擔心，讓我又打起精神了呢？"
10052030-28 = "……！！！#n夠，夠了！真是白擔心一場！！！"
10052030-32 = "部長？會長？你們沒事吧？#n這裡……好像發現了那個叫核心的東西。"
10052030-37 = "那就是核心……？"
10052030-39 = "Kei？雖然只能透過遠端的方式，能請你確認一下嗎？"
10052030-40 = "請等一下……英美，可以先把那個東西放在地上嗎？"
10052030-41 = "嗯？嗯，知道了。"
10052030-45 = "……"
10052030-46 = "理解……觀察者……[ruby=JEHOVAH ELOHIM]耶和華．以羅欣[/ruby]……#n沉默與貪婪，豐富與悲傷……"
10052030-47 = "……！"
10052030-48 = "已確認完畢。是薇娜的核心沒錯。"
10052030-49 = "哎呀，不用親眼看見也能知道嗎？"
10052030-50 = "現在的話可以。"
10052030-51 = "……原來如此。#n雖然薇娜的區域還在佔領之中，不過這個坑洞附近已經……！"
10052030-52 = "沒錯。而且這片區域就像鋼鐵大陸網路的入口一樣，所以這個程度還是沒問題的。"
10052030-53 = "除此之外……關於預言者們的核心，我又有了一些新的發現。"
10052030-54 = "是什麼呢？"
10052030-55 = "核心中帶有的資訊，也就是非物質的數據……"
10052030-56 = "或者說是網路的高級訪問權限和神威……各質點的位格，都可以下載到我的身體裡。#n這個部分之前也說過了。"
10052030-57 = "並且，如果在這個基礎上更進一步……"
10052030-58 = "將預言者的核心移植到運輸船上加以應用，似乎就能對運輸船本身進行強化和改造。"
10052030-59 = "是以什麼樣的形式……？"
10052030-60 = "舉例來說……#n如果將薇娜的核心移植到運輸船上，運輸船就能使用薇娜的部分能力或輸出了。"
10052030-61 = "其他預言者的核心應該也是同理。"
10052030-66 = "……？#n那難道是……！！！"
10052030-67 = "果然是那個呢，Kei！#n可以吞噬敵人並複製能力的圓形生物！"
10052030-68 = "不是的，愛麗絲……唉……"
10052030-69 = "至少請改成「裝備特殊武器晶片來擴展功能的腕部武器」的比喻吧……"
