10052030-57 = "3;케이 프로토;99;그런데 여기에서 한층 더 나아가서……"
10052030-58 = "3;케이 프로토;01;예언자들의 코어를 수송선에 이식시켜서 응용한다면, 수송선 자체를 새롭게 개조하고 강화하는 것도 가능해 보여요."
10052030-59 = "3;리오 결전;02;어떤 식으로……?\n#3;em;[?]"
10052030-60 = "3;케이 프로토;01;그러니까…… 가령 비나의 코어를 수송선에 이식하면, 비나의 능력이나 출력 중 일부를 수송선이 사용할 수 있게 된다는 거죠."
10052030-61 = "3;케이 프로토;02;다른 예언자들의 코어 역시 마찬가지일 거고요."
