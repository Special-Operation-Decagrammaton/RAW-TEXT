901010400210-6 = "3;니코 아르바이트;03;실례합니다~\n#3;em;[반응]\n#3;a"
901010400210-7 = "1;용역 알바 인부;00;응? 갑자기 무슨 일이야?\n#1;em;[?]\n#1;ar\n#3;m5"
901010400210-8 = "3;니코 아르바이트;00;안녕하세요, 도시락 배달부터 인기 레스토랑의 예약까지— 모든 걸 대행드리는 <FOX EATS>입니다!"
901010400210-9 = "3;니코 아르바이트;02;이번에 <FOX EATS>에서 카네사키 항만 내의 배달 서비스를 개시해서, 프로모션 차 인기 도시락을 증정하고 있는데요."
901010400210-10 = "3;니코 아르바이트;03;잠깐 쉬시면서 맛있는 유부초밥 하나, 맛보지 않으시겠어요?\n#3;em;[반짝]\n#3;greeting"
901010400210-11 = "1;용역 알바 인부;00;으음…… 구미가 당기긴 하지만, 지금은 쉴 때가 아니라서 말이야.\n#1;em;[땀]\n#1;stiff"
901010400210-12 = "3;니코 아르바이트;02;무슨 바쁜 일이라도 있으신가요?"
901010400210-13 = "1;용역 알바 인부;00;그게…… 혹시 이 근처에서 톱밥 포대 같은 거, 본 적 없어?"
901010400210-14 = "3;니코 아르바이트;04;톱밥, 포대요?\n#3;em;[…]"
901010400210-15 = "1;용역 알바 인부;00;응. 나무를 손질할 때 나오는 부스러기를 모아둔 포대 말이야.\n#1;m3\n#3;dr"
901010400210-16 = "1;용역 알바 인부;00;그게 있어야 게를 상자에 쌓고 포장할 수 있는데…… 어떤 녀석이 준비해 둔 톱밥 포대를 몽땅 치워버렸어."
901010400210-17 = "1;용역 알바 인부;00;그게 없으면 작업을 할 수 없는데..…\n#1;stiff"
901010400210-18 = "1;용역 알바 인부;00;혹시 이 근처에서 '방치된 톱밥 포대'를 보게 된다면 우리에게 알려줄래?\n#1;em;[?]"
901010400210-19 = "1;용역 알바 인부;00;게의 신선도와 관련된 문제니까, 제발 부탁할게!\n#1;hophop"
