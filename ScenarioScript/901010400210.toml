[translation]
901010400210-6 = "お取り込み中失礼します。"
901010400210-7 = "あぁ？誰だ？"
901010400210-8 = "こんにちは、お弁当配達から人気レストランの予約まで――なんでも代行「FOX EATS」です！"
901010400210-9 = "鐘崎港への配達エリア拡大プロモーションとして、お弁当をプレゼントしているのですが……。"
901010400210-10 = "美味しいいなり寿司、ひとつ食べてみませんか？"
901010400210-11 = "うーん……気持ちは嬉しいけど、今はちょっと忙しくてね。"
901010400210-12 = "何かあったんですか？"
901010400210-13 = "それが……この近くでおがくず袋を見なかったか？"
901010400210-14 = "おがくず袋、ですか？"
901010400210-15 = "ああ。木を加工する時に発生するおがくずを入れた袋なんだけど。"
901010400210-16 = "カニを箱に入れる時に必要なのに……誰かが袋を全部移動させたみたいで。"
901010400210-17 = "それがないと作業できないんだ……。"
901010400210-18 = "この近くで「放置されたおがくず袋」を見つけたら知らせてくれる？"
901010400210-19 = "カニの鮮度に関わる問題なんだ……頼む！"
901010400210-21 = "分かりました。「放置されたおがくず袋」を見つけたら必ずお知らせしますね。"
