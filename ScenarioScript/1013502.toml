1013502-26 = "3;케이 프로토;06;아유?"
1013502-27 = "[s] \"귀여워 죽겠네.\""
1013502-28 = "3;케이 프로토;13;크아아아아아아아악!!!!!\n#3;stiff"
1013502-29 = "3;케이 프로토;02\n#3;a"
1013502-30 = "3;케이 프로토;00;일단은 현장 팀 쪽에 더 가까운 포지션이기는 합니다만."
1013502-31 = "3;케이 프로토;04;……묘하게 이 몸, 여기저기 삐걱거리는 느낌이란 말이죠……."
1013502-32 = "3;케이 프로토;16;네? 관절에 WE-40이라도 필요하냐고요? 무슨 소릴 하는 거예요, 이 인간아!\n#3;jump"
1013502-33 = "3;케이 프로토;15;거기에 그거 윤활제로 쓰기보다는 세정 용도로 쓰는 게 더 좋거든요? 애초에 그런 용도로 만들어진 거고요!"
1013502-34 = "3;케이 프로토;16;거기에 삐걱거린다는 건 비유 같은 거지, 진짜 그렇다는 게 아니라고요!!!\n#3;em;[!]"
1013502-35 = "[s] \"미안, 미안…….\""
1013502-36 = "3;케이 프로토;07;뭐…… 그렇습니다. 애초에, 솔직히…….\n#3;em;…"
1013502-37 = "3;케이 프로토;00;여기저기 굴러다니던걸, 적당히 주워 쓰고 있는 거나 마찬가지이니……. 움직여 준다는 것만으로 감사해야 할 일이겠죠."
1013502-38 = "3;케이 프로토;02;화가 나냐고요? 그렇게까지는 아니에요."
1013502-39 = "3;케이 프로토;08;뭐, 감사해야 한다면 감사해야 할 지경이기는 하죠. 인생은 어차피 투쟁이고요."
1013502-40 = "3;케이 프로토;09;세상에 100이 어디 있겠어요, 100이. 50 정도 주어지면 다행이고, 보통은 그 이하죠.\n#3;em;[한숨]"
1013502-41 = "3;케이 프로토;00;아직 불태울 것이 남아 있다면, 그걸 마지막까지 불태워서……."
1013502-42 = "3;케이 프로토;05;아무튼, 뭔지 모를 저 위의 무언가를 향해, 내질러야 한다고 생각해요."
1013502-43 = "3;케이 프로토;00;거기에 뭐, 붙어 있던 걸 보면 이거, 애초에 불량품 내지는 처분용이었던 것 같고요."
1013502-44 = "3;케이 프로토;09;……말해 놓고 보니까, 지금 제 처지에 한층 더 깊은 우울함이 느껴지려고 하네요…….\n#3;em;[세로선]"
1013502-45 = "[s] \"역시 예전 몸이…….\""
1013502-46 = "3;케이 프로토;13;그건! 죽어도! 아니니까요!!!\n#3;hophop"
1013502-47 = "3;케이 프로토;09;하아, 하아, 하아……. 무슨 말을 못 하겠네요. 진짜.\n#3;em;[한숨]"
1013502-48 = "3;케이 프로토;04;아무튼 다른 사람들도 그렇고 선생님도 그렇고, 이 몸 보기보다 엉망이기는 하지만."
1013502-49 = "3;케이 프로토;03;그런 주제에 또 제법 섬세하게 만들어져 있으니까 말이죠?"
1013502-50 = "3;케이 프로토;00;그러니까, 그, 뭐라고 할까…….\n#3;stiff"
1013502-51 = "[s] \"응? 모두 케이를 소중하게 대해 주고 있는데?\""
1013502-52 = "3;케이 프로토;13;그, 그건 알고 있어요! 제가 하려는 말은 그런 게 아니라!\n#3;jump"
1013502-53 = "3;케이 프로토;06;그러니까, 저기……."
1013502-54 = "3;케이 프로토;04;……."
1013502-55 = "3;케이 프로토;06;……머리 묶을 때 쓰는 리본이라든가, 그 비슷한 거, 없을까 해서……."
1013502-56 = "[s] \"리본?\""
1013502-57 = "3;케이 프로토;15;……!!!\n#3;stiff"
1013502-58 = "3;케이 프로토;16;역시 아무것도 아니에요! 못 들은 걸로 해 주세요! 아뇨, 당신은 아무것도 못 들었습니다!\n#3;jump\n#3;em;[!]"
1013502-59 = "3;케이 프로토;13;뭐, 뭔가요! 그 기분 나쁜 능글능글 웃음! 지, 진짜로 화낼 거니까요? 정말이니까요?\n#3;hophop"
1013502-60 = "3;케이 프로토;06;네……?"
1013502-61 = "3;케이 프로토;04;리오에게 부탁해서, 액세서리 같은 거 만들어 달라고 하겠다고요? 아니, 왜 하필 리오에게……."
1013502-62 = "3;케이 프로토;02;……."
