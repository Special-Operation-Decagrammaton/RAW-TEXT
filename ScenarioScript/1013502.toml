1013502-18 = "3;케이 프로토;06;…………."
1013502-19 = "3;케이 프로토;07;……싫은 건, 아니에요.\n#fontsize;50"
1013502-20 = "[s] \"잘 안 들렸는데~?\""
1013502-21 = "3;케이 프로토;08;……싫어하지 않는다고요……."
1013502-22 = "3;케이 프로토;04;………네? 여전히 안 들린다고요?"
1013502-23 = "3;케이 프로토;15;…………."
1013502-24 = "3;케이 프로토;13;안 싫어해요! 굳이 어느 쪽이냐고 한다면! 그래요! 좋아해요! 이제 됐어요?!?!\n#3;hophop\n#3;em;[스팀]"
