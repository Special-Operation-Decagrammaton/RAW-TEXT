1013502-14 = "3;케이 프로토;16;절대, 절대, 절대, 절대, 절대로! 아니니까!!! 말이죠!!!!!\n#3;hophop"
1013502-15 = "3;케이 프로토;14;네? 그러면 귀여운 거 싫어하는 거냐고요?"
