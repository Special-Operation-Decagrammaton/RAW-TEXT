1013502-9 = "[s] \"잘 됐구나~ 싶어서.\""
1013502-10 = "3;케이 프로토;03;……그럼요."
1013502-11 = "[s] \"그리고 역시 케이 쨩은 귀엽구나~ 싶어서.\""
1013502-12 = "3;케이 프로토;13;왜 또 바로 그런 이야기로 흐르는 건데요!\n#3;jump\n#3;em;[!]"
