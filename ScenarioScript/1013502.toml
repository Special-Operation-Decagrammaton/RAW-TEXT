[translation]
1013502-1 = "紓解壓力"
1013502-3 = "……"
1013502-4 = "[s]「……」"
1013502-5 = "有什麼事啦？為什麼要那樣盯著我看？"
1013502-6 = "是我臉上沾到什麼了嗎？#n應該沒有才對，因為我剛才有照過鏡子。"
1013502-7 = "[s] 「沒有啦，只是覺得……」"
1013502-8 = "覺得？"
1013502-9 = "[s] 「覺得真是太好了～這樣。」"
1013502-10 = "……是啊。"
1013502-11 = "[s] 「還有Kei醬果然好可愛啊～」"
1013502-12 = "為什麼又馬上扯到那種話題了啦！"
1013502-13 = "[s] 「啊，還是你覺得以前的身體比較好？」"
1013502-14 = "絕絕絕絕絕對不是！！！#n聽見沒有！！！！！"
1013502-15 = "咦？你說，所以我是不喜歡可愛的東西……？"
1013502-16 = "……"
1013502-17 = "…………"
1013502-18 = "………………"
1013502-19 = "……倒也沒有不喜歡。"
1013502-20 = "[s] 「我沒聽清楚呢～」"
1013502-21 = "我說沒有不喜歡……"
1013502-22 = "……什麼？還是聽不到？"
1013502-23 = "………………"
1013502-24 = "我說我沒有不喜歡！#n硬要我選一邊的話就是喜歡！這樣滿意了嗎！？！？"
1013502-25 = "[s] 「哎呀。」"
1013502-26 = "哎呀？"
1013502-27 = "[s] 「真是可愛死我了。」"
1013502-28 = "啊啊啊啊啊啊啊！！！！！"
1013502-30 = "雖然以定位來說，我比較接近於負責現場的成員……"
1013502-31 = "不過這個身體，總覺得好像到處都在嘎吱作響……"
1013502-32 = "咦？關節要不要噴一點WE-40之類的？#n到底在胡說八道什麼啊，你這個人！"
1013502-33 = "而且那個東西比起潤滑，更適合用來清潔懂嗎？#n清潔才是它本來的用途！"
1013502-34 = "還有嘎吱作響只是個比喻而已，沒有真的那樣啦！！！"
1013502-35 = "[s] 「抱歉抱歉……」"
1013502-36 = "嗯……不過雖然這麼說……"
1013502-37 = "這本來就是隨便撿來用的東西……光是能動就該心存感激了吧。"
1013502-38 = "問我會不會生氣？#n倒也不至於吧。"
1013502-39 = "真要說的話，更多應該是感謝才對。#n反正人生就是一場鬥爭。"
1013502-40 = "世上哪來的100分呢，能拿個50分左右就該偷笑了。#n一般只會比那更低而已。"
1013502-41 = "如果還有什麼能燃燒的東西，就盡可能讓它燃燒到最後……"
1013502-42 = "總之，我覺得必須得朝著上面那個不知道是什麼的東西，全力一擲才行。"
1013502-43 = "而且從它被打上的標籤來看，這個身體本來就是類似不良品或廢棄品的東西。"
1013502-44 = "……越說越覺得自己的處境令人憂鬱了。"
1013502-45 = "[s] 「果然還是以前的身體比較……」"
1013502-46 = "那是！死也！不可能的！！！"
1013502-47 = "唉……我真的是無話可說。"
1013502-48 = "雖然不管在老師還是其他人眼裡，這個身體看起來都還挺糟糕的……"
1013502-49 = "但它其實比想像中更加精密哦？"
1013502-50 = "所以……那個，該怎麼說好呢……"
1013502-51 = "[s] 「嗯？大家都很珍惜Kei的哦？」"
1013502-52 = "那，那種事我知道啦！#n我想說的不是那個！"
1013502-53 = "所以，就是……"
1013502-54 = "……"
1013502-55 = "有沒有能用來綁頭髮的緞帶，或者類似的東西呢……"
1013502-56 = "[s] 「緞帶？」"
1013502-57 = "……！！！"
1013502-58 = "果然還是算了！請當作沒聽見吧！#n不，你就是什麼都沒聽見！"
1013502-59 = "怎，怎樣啦！那詭異的笑容是什麼意思！#n我，我真的要生氣了哦？是認真的哦？"
1013502-60 = "咦……？"
1013502-61 = "會去請莉央幫忙做點飾品？#n不是，為什麼偏偏要找莉央啊……"
1013502-62 = "……"
1013502-63 = "……！？！？"
1013502-64 = "你分明是故意的吧，老師！？！？"
1013502-65 = "[s1] 「老師我！自始至終！」\n[s2] 「都是基於純粹的善意，為了Kei醬著想！」"
1013502-70 = "我最討厭老師了啦！！！！！"
