[translation]
1013502-1 = "วิธีคลายเครียด"
1013502-3 = "..."
1013502-4 = "[s] \"...\""
1013502-5 = "ทำไมคะ มีอะไรคะ ทำไมคะ ทำไมถึงจ้องแบบนั้นล่ะคะ?"
1013502-6 = "มีอะไรติดหน้าฉันเหรอคะ? ไม่มีใช่มั้ยคะ? ไม่มีหรอกค่ะ ฉันเพิ่งส่องกระจกไปเมื่อกี้เอง"
1013502-7 = "[s] \"เปล่าหรอก ก็แค่\""
1013502-8 = "ก็แค่?"
1013502-9 = "[s] \"คิดว่าดีจังเลยนะที่เป็นแบบนี้~\""
1013502-10 = "ก็ต้องดีสิคะ..."
1013502-11 = "[s] \"แล้วก็คิดว่า เคย์จังนี่น่ารักจังเลยนะ~\""
1013502-12 = "ทำไมถึงไหลไปเรื่องนั้นอีกแล้วล่ะคะ!"
1013502-13 = "[s] \"อ๊ะ หรือว่าชอบร่างก่อนหน้านี้มากกว่า?\""
1013502-14 = "ไม่ค่ะ ไม่ ไม่ ไม่ ไม่เด็ดขาดเลย! ไม่มีทางชอบร่างนั้นมากกว่า!!! แน่นอนค่ะ!!!!!"
1013502-15 = "คะ? ถ้างั้น ฉันไม่ชอบอะไรที่น่ารักหรือเปล่าน่ะเหรอคะ?"
1013502-16 = "..."
1013502-17 = "......"
1013502-18 = "........."
1013502-19 = "ก็ไม่ได้ไม่ชอบหรอกค่ะ..."
1013502-20 = "[s] \"ได้ยินไม่ชัดเลยน้า~?\""
1013502-21 = "ฉันบอกว่าไม่ได้ไม่ชอบค่ะ..."
1013502-22 = "คะ...? ยังไม่ได้ยินอยู่ดีเหรอคะ?"
1013502-23 = "..."
1013502-24 = "ไม่ได้ไม่ชอบค่ะ! แต่ถ้าถามว่าชอบแบบไหนมากกว่าละก็! ก็ได้ค่ะ! ฉันชอบร่างนี้ค่ะ! พอใจหรือยังคะ?!?!"
1013502-25 = "[s] \"โอ๊ย\""
1013502-26 = "โอ๊ย?"
1013502-27 = "[s] \"น่ารักจนใจเจ็บเลย\""
1013502-28 = "ฮึ่ยยยยยยยยย!!!!!"
1013502-30 = "ตอนนี้ถึงฉันจะอยู่ในตำแหน่งที่ใกล้เคียงกับทีมภาคสนาม"
1013502-31 = "แต่ก็น่าแปลกที่ฉันรู้สึกเหมือนร่างกายของฉันมีเสียงดังเอี๊ยดอ๊าดไปทั่วเลยค่ะ..."
1013502-32 = "คะ? ฉันอยากได้ WE-40 ที่ข้อต่อหรือเปล่าน่ะเหรอคะ? พูดอะไรอย่างนั้นล่ะคะ คนคนนี้นี่!"
1013502-33 = "อีกอย่างนะคะ อันนั้นเหมาะกับการเอาไปใช้เป็นน้ำยาทำความสะอาดมากกว่าสารหล่อลื่นค่ะ มันถูกผลิตขึ้นมาเพื่อจุดประสงค์นั้นตั้งแต่แรกแล้วด้วยค่ะ!"
1013502-34 = "แล้วที่ฉันบอกว่าร่างกายส่งเสียงดังเอี๊ยดอ๊าด ก็แค่เป็นการเปรียบเทียบเฉยๆ ค่ะ!!!"
1013502-35 = "[s] \"ขอโทษๆ...\""
1013502-36 = "ก็... ก็ได้ค่ะ อันที่จริง..."
1013502-37 = "ร่างกายของฉันก็เหมือนกับหยิบเอาอะไรก็ไม่รู้ที่กลิ้งอยู่บนพื้นมาประกอบเป็นตัวตั้งแต่แรกแล้ว... แค่เคลื่อนไหวแบบนี้ได้ก็โชคดีเป็นไหนๆ แล้วค่ะ"
1013502-38 = "ฉันโกรธหรือเปล่าน่ะเหรอคะ? ก็ไม่ถึงขนาดนั้นหรอกค่ะ"
1013502-39 = "ถ้าเป็นอะไรที่ควรรู้สึกขอบคุณ ฉันก็ควรขอบคุณสิคะ ยังไงชีวิตก็เป็นการต่อสู้อยู่แล้ว"
1013502-40 = "โลกนี้ไม่มีอะไรได้มาแบบเต็มร้อยหรอกค่ะ ได้มาสักครึ่งหนึ่งก็ถือว่าโชคดีแล้วค่ะ ปกติจะได้น้อยกว่านั้นด้วยซ้ำ"
1013502-41 = "เพราะงั้นถ้ายังมีอะไรที่ทำได้ ฉันคิดว่าเราต้องทำให้ได้อย่างถึงที่สุด..."
1013502-42 = "เอาเป็นว่า ฉันคิดว่าเราต้องพุ่งเข้าหาและจัดการบางอย่างที่อยู่ข้างบนนั้นให้ได้ค่ะ"
1013502-43 = "แต่ดูจากร่างกายของฉันก็รู้แล้วค่ะว่าเป็นของที่มีตำหนิตั้งแต่แรกแล้ว"
1013502-44 = "พอพูดแบบนี้... ฉันก็รู้สึกหดหู่กับสภาพของตัวเองมากกว่าเดิมอีกนะคะ"
1013502-45 = "[s] \"ชอบร่างก่อนหน้านี้มากกว่าจริงด้วย...\""
1013502-46 = "ร่างนั้นน่ะ! ต่อให้ต้องตาย! ก็ไม่มีวันชอบค่ะ!!!"
1013502-47 = "เฮ้อ... เฮ้อ... เฮ้อ... ฉันไม่รู้จะพูดอะไรต่อแล้วค่ะ จริงๆ เลย"
1013502-48 = "ทั้งคนอื่นและคุณครูก็เป็นอย่างนี้กันหมดเลยค่ะ แต่ร่างนี้น่ะ ถึงจะดูไม่สมประกอบเท่าไร"
1013502-49 = "แต่มันก็ถูกสร้างมาอย่างประณีตใช้ได้เลยนะคะ"
1013502-50 = "อืม จะว่ายังไงดีนะ..."
1013502-51 = "[s] \"หืม? แต่ทุกคนก็เอาใจใส่เคย์กันอย่างดีเลยนะ?\""
1013502-52 = "ระ... เรื่องนั้นฉันรู้ดีค่ะ! ฉันไม่ได้จะหมายความอย่างนั้น!"
1013502-53 = "คือว่า แบบว่า..."
1013502-54 = "..."
1013502-55 = "ฉันอยากรู้ว่าพอจะมีอะไรมัดผมได้บ้างหรือเปล่า อย่างเช่นริบบิ้นหรืออะไรทำนองนี้..."
1013502-56 = "[s] \"ริบบิ้นเหรอ?\""
1013502-57 = "...!!!"
1013502-58 = "ไม่ใช่เรื่องอะไรมากมายหรอกค่ะ! ฟังแบบเข้าหูซ้ายทะลุหูขวาไปเถอะค่ะ! ไม่สิ คุณไม่ได้ยินอะไรเลย#nตั้งแต่แรกด้วยซ้ำค่ะ!"
1013502-59 = "อะ... อะไรกันคะ! รอยยิ้มเจ้าเล่ห์ที่เห็นแล้วน่าหงุดหงิดนั่น! ฉะ... ฉันจะโกรธจริงๆ นะคะ? ฉันพูดจริงนะ?"
1013502-60 = "คะ...?"
1013502-61 = "จะไปขอให้ริโอะช่วยทำเครื่องประดับให้งั้นเหรอคะ? เดี๋ยวสิ แล้วทำไมต้องเป็นริโอะด้วย..."
1013502-62 = "..."
1013502-63 = "...??!!!"
1013502-64 = "ตั้งใจใช่มั้ยคะ คุณครู?!?!"
1013502-65 = "[s1] \"ครูเจตนาดีต่างหาก!\"\n[s2] \"นี่คือเจตนาดีล้วนๆ เลยนะ!\""
1013502-70 = "ฉันไม่ชอบคุณครูเอาซะเลยค่ะ!!!!!"
