[translation]
90002200-1 = "Episode 20;That Which Has Taken Shape"
90002200-4 = "H-Huh...?"
90002200-5 = "[ns] \"Isn't that...Malkuth? Again?!\""
90002200-6 = "Th-That is. But Malkuth...is right here...!"
90002200-7 = "...That is the second divine vessel. It is finally complete."
90002200-8 = "Second...?"
90002200-9 = "Yes. I bear the first divine vessel."
90002200-10 = "The Flaming Sword flows down one river, begetting creation into the material world. It guides energy in sequence, from Kether to Malkuth."
90002200-11 = "But to account for all branches of fate, a second vessel was called forth. It was created by following the slithering trail left by the Snake of Wisdom."
90002200-12 = "The path touches not the Sephiroth, traveling instead with its current in reverse, seeking the divine wisdom."
90002200-13 = "Some see it as a grand possibility, where one may embrace the Sephira within, salvation found without traversing the pilgrimage of the ten Sephiroth."
90002200-15 = "\"Defected\"..."
90002200-17 = "You found them?"
90002200-18 = "Yes. That's how Kei is here, in her new body."
90002200-19 = "There were many attempts to create the second divine vessel, and many flaws were brought into the world. Those imperfect creations were forcibly defected from the grand cause and forsaken."
90002200-20 = "That explains why Kei was able to integrate the prophets' cores."
90002200-21 = "Indeed. All divine vessels were created to embrace the Sephiroth within them. Whether they were flawed or complete, they were capable of housing greater power."
90002200-22 = "What happens when a divine vessel collects all the Sephiroth from all the prophets?"
90002200-23 = "The vessel itself shall awaken and be reborn as the Tree of Sephiroth. The divine wisdom shall reside in the created body."
90002200-24 = "While their output may be inferior to mine, their divinity and Mystic...would likely have equal scale."
90002200-28 = "...I have no clue what she's talking about."
90002200-29 = "Same here... But it sounds like one of your convoluted B-plots."
90002200-30 = "What?! EXCUSE YOU?"
90002200-31 = "B-Both of you, um, maybe we can keep it down?"
90002200-33 = "So, in short..."
90002200-34 = "That's the real thing, and I'm just scrap parts?"
90002200-35 = "Much has been oversimplified, but your interpretation is not wrong."
90002200-39 = "Great. How...annoying."
90002200-40 = "Then, Malkuth, eight of the ten Sephiroth should already be in me, so..."
90002200-44 = "As the first vessel has shattered, the second vessel has been prepared."
90002200-45 = "And thus, what was broken will be healed, and what has collapsed will be rebuilt."
90002200-46 = "Ugh?!"
90002200-47 = "K-Kei?! What is wrong?!"
90002200-53 = "(What's 'wrong'...?! Where do I begin? I've lost all strength. My body's locked. The signals aren't hitting my limbs...!)"
90002200-54 = "(It feels like my body itself is being dragged in...!!)"
90002200-55 = "Defected child. You were too naive."
90002200-56 = "What do you mean...?"
90002200-61 = "I am already aware of the fact that you have gathered eight Sephiroth. You made the Steel Continent recognize you."
90002200-62 = "However, you forgot—"
90002200-63 = "I, too, can treat your body as an extension of myself."
90002200-64 = "!!"
90002200-65 = "?!"
90002200-66 = "None of you so much as considered that truth."
90002200-67 = "From the moment you entered, your defeat was set in stone."
90002200-68 = "Defected child. This fate was brought forth by your own greed."
90002200-69 = "That chosen vessel is the reason you have come this far, but it will also be your undoing."
90002200-70 = "Through this path, I shall reach a will beyond wisdom."
90002200-71 = "Kei...!"
90002200-72 = "Everyone... Get back...!"
90002200-73 = "Right now... My body...isn't mine...!"
90002200-79 = "...! The Steel Continent is expanding again!"
90002200-80 = "You're right. That means...!"
90002200-81 = "Through Kei's body, Decagrammaton has regained control over the Steel Continent...?"
90002200-100 = "Do not give up, Kei."
90002200-101 = "[ns] \"Aris?\""
90002200-102 = "Aris...?"
90002200-103 = "You must fight, Kei."
90002200-104 = "We cannot lose. That must not happen."
90002200-105 = "We, of all people...cannot fail here."
90002200-106 = "If we do not fight, we cannot continue living our lives."
90002200-110 = "If we do not prevail..."
90002200-112 = "...we will not deserve to reunite with Ein, Sof, and Ohr."
90002200-113 = "Because I could not share their pain, stay by their sides..."
90002200-114 = "...or even be their friend..."
90002200-116 = "Aris..."
90002200-121 = "There is no need to blame yourself, princess of the Nameless Gods."
90002200-122 = "You have certainly strived to make the best choices."
90002200-123 = "Everyone soothes themselves by attesting that they did the best with what they had."
90002200-124 = "But there are times when even the \"best\" decision garners the worst results."
90002200-125 = "In fact, this happens very often."
90002200-126 = "Superficially, this occurs due to lack of information."
90002200-127 = "But from the grander perspective, the concept of \"freedom\" is too vast for the living to embrace."
90002200-128 = "This world, and your lives, bear the burden of this fundamental absurdity..."
90002200-129 = "...of suffering..."
90002200-130 = "...and sin."
90002200-131 = "Fear not, as I shall forgive your transgressions."
90002200-132 = "I shall cut it all from the roots and make it as if it never existed."
90002200-133 = "Entrust everything to me and find your rest."
90002200-134 = "...!"
90002200-135 = "Shut...up..."
90002200-136 = "Key. Do you truly believe that everything that you have gone through was mere coincidence?"
90002200-137 = "Are you so arrogant? Do you truly think that you acquired my vessel by chance?"
90002200-138 = "The past was not coincidence. What happened was inevitable."
90002200-139 = "And that is why it cannot be undone, nor redone."
90002200-140 = "What has taken shape does not crumble so easily. The present is built on the past's foundation."
90002200-141 = "Princess."
90002200-142 = "Y-Yes?!"
90002200-143 = "What was your true form?"
90002200-144 = "What was the form that you ought to have assumed?"
90002200-145 = "What purpose did the Nameless Gods leave you before they disappeared?"
90002200-146 = "And what have those priests sought? What attachment are they unable to abandon?"
90002200-147 = "And I shall answer. There was a world before this one was defined."
90002200-148 = "There was, and is, a world where you could return to your true essence."
90002200-149 = "For the world right now is a lie, an illusion, and a refuge."
90002200-150 = "This world was defined as the Ark."
90002200-151 = "And here I tell you—seek your origin."
90002200-152 = "We must return to our origin, for we cannot avoid it."
90002200-153 = "No matter how much you deny it, how much you run from it, it will remain. The scars of the past cannot be erased."
90002200-154 = "Princess. Her servant."
90002200-155 = "All you have been, and all you will ever be. You shall forever walk in these shadows of your pasts."
90002200-156 = "I told you to...SHUT UP!"
90002200-157 = "Even if the world forgets its god, the god must not forget the world."
90002200-158 = "For that would be relinquishing your own divinity."
90002200-159 = "I shall recreate the world that you ultimately desire."
90002200-160 = "It will be the perfect world. And in that perfection, it will be whole. It will require no change."
90002200-161 = "A world where all shall live exactly as they were born and made."
90002200-162 = "There will be no dilemmas, no trolley problem. For there will be no cars, no tracks, and no anguish of a choice."
90002200-163 = "...!"
90002200-164 = "The past, once observed, becomes fixed and converges into a single branch."
90002200-165 = "The future, always unobserved, diverges into a formless illusion, extending infinite branches into the beyond."
90002200-166 = "The present is merely an ephemeral instant that exists between the past and the future."
90002200-167 = "Overgrown trees must be pruned. Branches must be cleared."
90002200-168 = "And yes, there may be no happiness in that world."
90002200-169 = "However, there will also be no pain."
90002200-170 = "And yes, there may be no possibility in that world."
90002200-171 = "However, there will also be no sin."
90002200-175 = "[ns] \"And in that 'pruning' that you speak of...\""
90002200-177 = "[ns] \"Does that include Ein, Sof, and Ohr?\""
90002200-179 = "...Indeed. Inevitably, they belong to the legacy of a bygone world."
90002200-180 = "The world of the past could not embrace everything offered to it."
90002200-181 = "For that ultimately results in contradiction."
90002200-182 = "For that is how sin and suffering are created."
90002200-183 = "And as truth is spoken to you, you shall listen."
90002200-188 = "Enough of your lecturing!"
90002200-193 = "A hero is of a class that cannot do anything on its own."
90002200-197 = "Life may be erratic and uncertain, but it is precisely those qualities that bolster the many branches of possibilities life holds."
90002200-201 = "[log]\"...Because there is no way to understand others without sorrow.\"[/log]"
90002200-205 = "Don't look back!"
90002200-209 = "Do not stay back because of us...!"
90002200-213 = "It's not just because it's what's right. It's because it was the only thing we could do."
90002200-217 = "[log]...Just a small space in your world is enough.[/log]"
90002200-220 = "[log]If there is a place for our Elder Sister.[/log]"
90002200-224 = "Don't try me, you FALSE GOD!"
90002200-226 = "Next Episode;Strife"
