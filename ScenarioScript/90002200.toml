[translation]
90002200-1 = "ตอนที่ 20;สิ่งที่ก่อตัวขึ้นแล้ว"
90002200-4 = "เอะ... เอ๋?"
90002200-5 = "[ns] \"โน่นก็... มัลคูธ? มีสองคนงั้นเหรอ?!\""
90002200-6 = "ชะ... ใช่ค่ะ นั่นคือมัลคูธ... แล้วตอนนี้คนที่อยู่กับเราก็ด้วย...!"
90002200-7 = "นั่นเป็นกายศักดิ์สิทธิ์ที่สองที่ก่อตัวสมบูรณ์แล้ว..."
90002200-8 = "กายที่สอง...?"
90002200-9 = "ใช่ค่ะ ส่วนร่างกายนี้ของฉันเป็นกายศักดิ์สิทธิ์แรกที่ถูกเตรียมพร้อมไว้ค่ะ"
90002200-10 = "เส้นทางของ <ดาบเพลิง> การสร้างสรรค์ในโลกแห่งสสาร พลังงานที่ส่งถึงเคเทอร์หลั่งไหลตามลำดับ#nมายังมัลคูธ"
90002200-11 = "แต่ก็ต้องมีกายศักดิ์สิทธิ์ที่สองเพื่อเตรียมพร้อมสำหรับทุกความเป็นไปได้ และร่างนั้นก็ถูกหล่อหลอมขึ้นตามเส้นทางของ <งูแห่งปัญญา>"
90002200-12 = "ผลของเส้นทางสู่ปัญญาอันศักดิ์สิทธิ์ในลำดับย้อนกลับโดยไม่สัมผัสกับเซฟีรอธโดยตรง"
90002200-13 = "อีกนัยหนึ่ง มันคือสัญลักษณ์แห่งความเป็นไปได้ที่โอบอุ้มเซฟีรอธไว้ในตัวเอง โดยไม่ต้องผ่านเซฟิร่าทั้งสิบ"
90002200-15 = "<DEFECTED>..."
90002200-17 = "เห็นแล้วสินะคะ?"
90002200-18 = "เพราะถ้าไม่ใช่อย่างนั้น เคย์ก็คงไม่ได้มาอยู่ที่นี่ในสภาพนี้หรอก"
90002200-19 = "ใช่ค่ะ เครื่องบูชายัญที่มีตำหนิทั้งหมดที่ถูกทิ้งไว้ในดินแดนเหล็กกล้าล้วนเป็นการลองผิดลองถูก เพื่อสร้างกายศักดิ์สิทธิ์ที่สองให้เสร็จสมบูรณ์ค่ะ"
90002200-20 = "นั่นเป็นเหตุผลที่เคย์บอกว่าในตัวเองมีที่ว่างเพื่อดูดซับคอร์ข้อมูลของเหล่าผู้เลื่อมใสสินะ"
90002200-21 = "ใช่ค่ะ ก็เพราะร่างที่สองทั้งหมดถูกสร้างขึ้นให้มีพื้นที่สำหรับกักเก็บเซฟีรอธไว้ในตัวเอง ไม่ว่ามันจะสมบูรณ์หรือมีตำหนิก็ตามค่ะ"
90002200-22 = "แล้วถ้าร่างกายนั้นกักเก็บเซฟีรอธไว้ทั้งหมด จะเกิดอะไรขึ้นเหรอ?"
90002200-23 = "ตอนนั้นร่างกายนั้นก็จะตื่นรู้ขึ้นในฐานะต้นไม้แห่งชีวิตค่ะ เท่ากับว่าปัญญาศักดิ์สิทธิ์ของเทพมาสถิต#nอยู่ในร่างกายที่ถูกสร้างขึ้นนั่นเองค่ะ"
90002200-24 = "ถึงประสิทธิภาพจะด้อยกว่าร่างกายของฉัน แต่ความศักดิ์สิทธิ์และความลึกลับ... ก็น่าจะเทียบเคียงกันได้ค่ะ"
90002200-28 = "พูดเรื่องอะไรไม่เห็นจะเข้าใจเลย..."
90002200-29 = "ฉันเองก็เหมือนกัน... แล้วก็รู้สึกว่านี่คล้ายๆ กับพล็อตเฉพาะกิจที่พี่โมโมอิชอบพูดถึงด้วย..."
90002200-30 = "ว่าไงนะ...?! มิโดริ เธอนี่นะ...!"
90002200-31 = "ทะ... ทั้งสองคนเบาเสียงลงหน่อยดีกว่านะ"
90002200-33 = "สรุปแล้วก็ประมาณนี้สินะคะ"
90002200-34 = "ตรงโน้นคือร่างหลัก ส่วนนี่ก็คือร่างเศษเดนสินะ?"
90002200-35 = "ถึงจะดูรวบรัดตัดตอนไปหน่อย แต่ก็... ค่ะ จะตีความแบบนั้นก็ได้ค่ะ"
90002200-39 = "ได้ค่ะ แต่แบบนั้นมัน... น่าโมโหนะคะ"
90002200-40 = "แล้วก็มัลคูธ ถ้าที่คุณพูดมาเป็นความจริงละก็ ตอนนี้เซฟีรอธแปดในสิบก็อยู่ในตัวของฉันแล้ว..."
90002200-44 = "ในเมื่อภาชนะแรกแตกไปแล้ว ภาชนะที่สองจึงถูกเตรียมไว้ที่นี่"
90002200-45 = "สิ่งที่เสียหายจะได้รับการเยียวยา และสิ่งที่แตกหักจะได้รับการตั้งขึ้นใหม่"
90002200-46 = "อะ... อึก?!"
90002200-47 = "คะ... เคย์?! เกิดเรื่องอะไรคะ!?"
90002200-53 = "(นี่มัน...?! ฉันยืนตรงไม่ได้เลย ร่างกายก็ไม่มีแรงเลยด้วย ทำไมกัน...?)"
90002200-54 = "(ไม่สิ ฉันกลับรู้สึกเหมือนกำลังถูกลากไปอีกทางเลย...!!!)"
90002200-55 = "นึกไม่ถึงล่ะสินะ เจ้าเด็กมีตำหนิ"
90002200-56 = "หมายความ... ว่ายังไง...?"
90002200-61 = "ข้ารู้ว่าเจ้ารวบรวมเซฟีรอธทั้งแปดและทำให้ดินแดนเหล็กกล้ารับรู้ได้"
90002200-62 = "แต่การทำเช่นนั้น"
90002200-63 = "ก็หมายความว่าข้าสามารถควบคุมร่างกายของเจ้าในฐานะส่วนหนึ่งของข้าได้เหมือนกัน"
90002200-64 = "!!!"
90002200-65 = "?!?!"
90002200-66 = "ไม่มีใครเลยในหมู่พวกเจ้าที่ตระหนักถึงข้อเท็จจริงนั้น"
90002200-67 = "พวกเจ้าโอบกอดความเสี่ยงที่จะพ่ายแพ้อย่างหมดสิ้นอยู่แล้วละ"
90002200-68 = "เจ้าเด็กมีตำหนิ จะบอกว่าตอนจบนี้ถูกกำหนดไว้ตั้งแต่ที่เจ้าเลือกใช้ร่างกายนั้นแล้วก็ย่อมได้"
90002200-69 = "แต่ก็ต้องยอมรับว่าถ้าเจ้าไม่ได้เลือกใช้ร่างกายนั่น เจ้าก็คงมาถึงจุดนี้ไม่ได้"
90002200-70 = "นี่คือหนทางที่เจตจำนงเหนือปัญญาจะกลายเป็นความจริง"
90002200-71 = "เคย์...!"
90002200-72 = "ทุกคน... ออกห่างจากฉันก่อนค่ะ...!"
90002200-73 = "ตอนนี้ฉัน... ขยับร่างกายเอง... ไม่ได้เลยค่ะ...!"
90002200-79 = "ดินแดนเหล็กกล้าเริ่มขยายตัวอีกแล้ว...!"
90002200-80 = "ใช่ค่ะ ถ้างั้นก็หมายความว่า...?"
90002200-81 = "หลังจากได้ครอบงำร่างต้นแบบของเคย์ เดคาแกรมมาทอนก็ได้อำนาจควบคุมดินแดนเหล็กกล้า#nกลับไปอีกครั้ง...?"
90002200-100 = "อย่ายอมแพ้นะคะ เคย์"
90002200-101 = "[ns] \"อาริสึ?\""
90002200-102 = "อาริ... สึ...?"
90002200-103 = "ต้องสู้นะคะ เคย์"
90002200-104 = "เราจะแพ้ให้กับสิ่งนั้นไม่ได้ค่ะ ไม่ได้เด็ดขาดค่ะ"
90002200-105 = "พวกเรา... จะปล่อยให้เป็นแบบนั้นไม่ได้เด็ดขาดนะคะ"
90002200-106 = "ถ้าเราไม่สู้ เราก็มีชีวิตอยู่ด้วยตัวเองไม่ได้ค่ะ"
90002200-110 = "ถ้าเราไม่สู้ อาริสึก็จะ..."
90002200-112 = "ไม่มีหน้าไปเจอไอน์ ซอฟ และก็ออร์หรอกค่ะ"
90002200-113 = "ถึงอาริสึจะเจ็บปวดไปพร้อมๆ กับเด็กพวกนั้นไม่ได้ ทั้งยังช่วยอยู่ข้างๆ กันไม่ได้ด้วยก็ตาม"
90002200-114 = "แล้วก็ยังไม่ทันได้เป็นเพื่อนกันด้วยเลยค่ะ..."
90002200-116 = "อาริสึ..."
90002200-121 = "ไม่ต้องโทษตัวเองไป ธิดาแห่งทวยเทพไร้นามเอ๋ย"
90002200-122 = "ที่ผ่านมาเจ้าเลือกแต่สิ่งที่ดีที่สุดแล้วละ"
90002200-123 = "ทุกคนต่างปลอบใจตัวเองด้วยการคิดว่าทางเลือกของตัวเองนั้นดีที่สุดแล้ว"
90002200-124 = "แต่บางครั้งการเลือกสิ่งที่ดีที่สุดก็อาจนำไปสู่ผลลัพธ์ที่เลวร้ายที่สุดได้"
90002200-125 = "เรื่องแบบนั้นมันเกิดขึ้นบ่อยมากเลยละ"
90002200-126 = "ส่วนหนึ่งสาเหตุอาจมาจากการขาดข้อมูล"
90002200-127 = "ถ้ามองจากภาพกว้าง เหตุผลก็คืออิสรภาพนั้นเป็นแนวคิดที่ยิ่งใหญ่เกินกว่าที่สิ่งมีชีวิตหนึ่งจะดื่มด่ำ#nกับมันได้อย่างเต็มที่"
90002200-128 = "นั่นคือความไร้แก่นสารและความย้อนแย้งที่ฝังรากลึกอยู่ในโลกใบนี้และในชีวิตของพวกเจ้า"
90002200-129 = "และยังเป็นความเจ็บปวด"
90002200-130 = "และเป็นบาปด้วย"
90002200-131 = "จงอย่าได้เกรงกลัว เพราะข้าจะให้อภัยในสิ่งนั้น"
90002200-132 = "ข้าจะถอนรากถอนโคนทุกอย่าง และจะทำให้มันเหมือนว่าไม่เคยมีมาก่อน"
90002200-133 = "จงฝากทุกสิ่งไว้ที่ข้า ส่วนพวกเจ้าจงเข้าสู่การพักผ่อนอันเป็นนิรันดร์"
90002200-134 = "...!"
90002200-135 = "หุบปาก... ไปเลย..."
90002200-136 = "กุญแจเอ๋ย เจ้าคิดว่าสิ่งต่างๆ ที่เจ้าเผชิญมาเป็นเรื่องบังเอิญหรือเปล่า?"
90002200-137 = "เจ้าคิดว่าการได้กายศักดิ์สิทธิ์ของข้าไปเป็นเพียงเรื่องบังเอิญหรือ?"
90002200-138 = "อดีตไม่ใช่เรื่องบังเอิญ สิ่งที่เกิดขึ้นไปแล้ว ท้ายที่สุดก็คือชะตาที่ไม่อาจหลีกเลี่ยง"
90002200-139 = "มันก็เลยย้อนกลับไม่ได้ และไม่อาจเกิดขึ้นได้ซ้ำสอง"
90002200-140 = "สิ่งที่ก่อตัวขึ้นแล้วย่อมไม่แตกสลายไปง่ายๆ ทุกสิ่งในปัจจุบันจึงเป็นผลรวมของอดีต"
90002200-141 = "ธิดาเอ๋ย"
90002200-142 = "คะ... คะ?!"
90002200-143 = "ตัวตนดั้งเดิมของพวกเจ้าเป็นอย่างไร"
90002200-144 = "รูปกายที่พวกเจ้าควรจะเป็นคือแบบไหน"
90002200-145 = "<ทวยเทพไร้นาม> ทิ้งพวกเจ้าไว้บนผืนดินนี้แล้วหายไปเพื่ออะไร"
90002200-146 = "แล้วเหล่านักบวชนั้นปรารถนาสิ่งใดกัน ถึงยังไม่ยอมละทิ้งสิ่งที่ยังติดค้างอยู่"
90002200-147 = "ข้าจะเปิดปากเอื้อนเอ่ย ก่อนที่โลกจะถูกกำหนดเอาไว้ให้เป็นแบบนี้ เคยมีโลกก่อนหน้านี้อยู่"
90002200-148 = "เคยมีโลกใบหนึ่ง โลกที่พวกเจ้าสามารถหวนคืนสู่แก่นแท้ของตนเองได้ยิ่งกว่าที่เป็นอยู่"
90002200-149 = "นั่นก็เพราะโลกในปัจจุบันเป็นเรื่องโกหก เป็นภาพลวงตา และเป็นที่หลบภัย"
90002200-150 = "โลกนี้ถูกนิยามว่าเป็น[ruby=κιβωτός]เรือ[/ruby]"
90002200-151 = "ข้าจะเปิดปากเอื้อนเอ่ย พวกเจ้าจงหารากเหง้าของตัวเอง"
90002200-152 = "เหตุผลที่พวกเราต้องกลับไปสู่รากเหง้า นั่นก็เพราะมันเป็นสิ่งที่หลีกเลี่ยงไม่ได้"
90002200-153 = "ไม่ว่าพวกเจ้าจะปฏิเสธและพยายามหนีมากเพียงใด สุดท้ายมันก็จะหาพวกเจ้าจนเจอราวกับแผลเป็น#nจากอดีต"
90002200-154 = "ธิดาเอ๋ย หญิงรับใช้เอ๋ย"
90002200-155 = "เช่นเดียวกับที่พวกเจ้าต้องแบกเงาของอดีตไว้บนร่างกายไปตลอดกาล"
90002200-156 = "บอกว่า... ให้หุบปากไปไง...!"
90002200-157 = "แม้ว่าโลกจะลืมเทพ แต่เทพต้องไม่ลืมโลก"
90002200-158 = "นั่นก็เพราะมันคือการสละความศักดิ์สิทธิ์ของตัวเอง"
90002200-159 = "ข้าจะบันดาลโลกที่พวกเจ้าปรารถนาขึ้นมาใหม่"
90002200-160 = "มันจะเป็นโลกที่สมบูรณ์แบบจนไม่จำเป็นต้องมีการเปลี่ยนแปลงใดๆ"
90002200-161 = "มันจะเป็นโลกที่ทุกคนใช้ชีวิตได้ตามที่ตนเกิดมาและถูกสร้างขึ้นมา"
90002200-162 = "มันจะเป็นโลกที่ปัญหาการดึงคันโยกเพื่อสับรางรถไฟ หรือรถไฟอาจไม่ถูกสร้างขึ้นมาเลยก็ได้"
90002200-163 = "...!"
90002200-164 = "อดีตถูกกำหนดไว้ ณ ขณะที่ถูกสังเกต และบรรจบกันเป็นกิ่งก้านเดียว"
90002200-165 = "อนาคตเป็นสิ่งที่ไม่อาจสังเกตได้ มันจึงแผ่ขยายออกไปเป็นภาพลวงตาที่ไร้รูปร่าง และแผ่กิ่งก้านสาขาออกไปอย่างไม่มีที่สิ้นสุด"
90002200-166 = "ส่วนปัจจุบันเป็นเพียงชั่วพริบตาที่เบาบางและคงที่ซึ่งดำรงอยู่ระหว่างอดีตและอนาคต"
90002200-167 = "ต้นไม้ที่แผ่กิ่งก้านสูงเกินไปจะต้องถูกตัดแต่ง"
90002200-168 = "โลกใบนั้น ใช่แล้วละ โลกใบนั้นอาจไม่มีความสุขก็ได้"
90002200-169 = "แต่อย่างน้อยที่นั่นก็จะไม่มีความเจ็บปวด"
90002200-170 = "โลกใบนั้น ใช่แล้วละ โลกใบนั้นอาจไม่มีความเป็นไปได้ใดๆ อีกแล้ว"
90002200-171 = "แต่อย่างน้อยที่นั่นก็จะไม่มีบาป"
90002200-175 = "[ns] \"เรื่องตัดแต่งกิ่งก้านที่พูดถึงนั่นน่ะ\""
90002200-177 = "[ns] \"รวมถึงไอน์ ซอฟ และออร์ด้วยงั้นเหรอ?\""
