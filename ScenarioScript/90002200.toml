[translation]
90002200-1 = "第20話;成形之物"
90002200-4 = "咦，咦咦……？"
90002200-5 = "[ns] 「那是……馬爾庫特？還有另外一個！？」"
90002200-6 = "可，可是馬爾庫特現在……明明就跟我們一起待在這裡……！"
90002200-7 = "……那是完成形態的第二具神體。"
90002200-8 = "第二具……？"
90002200-9 = "是的。我的這個身體是第一具神體。"
90002200-10 = "「炎之劍」的流向。在物質世界中進行的創造。#n從與凱瑟相連的氣息依序流下，直至抵達馬爾庫特。"
90002200-11 = "然而為了應對所有可能性，還需要準備第二具神體。#n所以才會沿著「智慧之蛇」的流向來鑄造它。"
90002200-12 = "那是在不直接觸及質點的情況下，以相反流向朝神的智慧前進的路徑之產物。"
90002200-13 = "如果換個方法解釋，就是不經過十個質點，#n而是將質點本身納入自己體內的可能性的象徵。"
90002200-15 = "「DEFECTED」……"
90002200-17 = "你們也看到了呢？"
90002200-18 = "沒錯，否則Kei也不可能以這副模樣出現在這裡了。"
90002200-19 = "原來如此。#n所有被遺棄在鋼鐵大陸上「帶有缺陷」的祭品，都是為了完成第二具神體的試錯。"
90002200-20 = "Kei曾說自己體內具有能吸收預言者核心資訊的空間，也是因為這個原因啊。"
90002200-21 = "正是如此。#n所有的第二神體，都是在體內保有能容納質點空間的情況下被製造出來的。#n這點無論是否帶有缺陷都一樣。"
90002200-22 = "當神體容納所有預言者的質點之後，會發生什麼事呢？"
90002200-23 = "屆時神體本身將作為質點之樹覺醒，而神的智慧將寄宿於被創造的身體當中。"
90002200-24 = "雖然輸出可能不及這個身體，但其神聖與神祕……恐怕不相上下。"
90002200-28 = "……我完全聽不懂在說什麼耶。"
90002200-29 = "我也聽得一頭霧水……#n不過總覺得跟姐姐平常隨口講的一次性設定有點類似……"
90002200-30 = "你說什麼……！？"
90002200-31 = "你，你們兩個都小聲一點，好嗎？"
90002200-33 = "所以綜合起來就是這個意思吧？"
90002200-34 = "那邊那個才是本體，我的身體則是殘渣？"
90002200-35 = "雖然似乎省略了很多……不過那樣的解讀也不算錯。"
90002200-39 = "這還真是……讓人火大呢。"
90002200-40 = "而且按照你的意思……#n馬爾庫特，現在十個質點之中已經有八個在我體內了──"
90002200-44 = "第一個器皿碎裂，第二個器皿已準備就緒。"
90002200-45 = "受損之物將得到修復，崩壞之物將重新站立。"
90002200-46 = "唔！？"
90002200-47 = "K，Kei！？你怎麼了！？"
90002200-53 = "（這是……！？身體無法站穩又使不上力……？）"
90002200-54 = "（或者應該說，這個身體感覺正在被拉向那邊……！！！）"
90002200-55 = "看來你似乎始料未及啊──被賦予缺陷的孩子。"
90002200-56 = "這是，什麼意思……？"
90002200-61 = "我知道你收集了八個質點，讓鋼鐵大陸認知到了你的存在。"
90002200-62 = "然而那同時也意味著──"
90002200-63 = "我能將你的身體作為我的一部分來操控。"
90002200-64 = "！！！"
90002200-65 = "！？！？"
90002200-66 = "你們之中沒有任何人察覺這個事實。"
90002200-67 = "自那一刻起，你們便已具備從根本上敗北的可能性。"
90002200-68 = "被賦予缺陷的孩子啊。#n在你選擇那具神體的瞬間，這個結局就已經注定了。"
90002200-69 = "然而若不選擇那具神體便無法走到這裡，也同樣是事實。"
90002200-70 = "這便是超越智慧的意志所能夠實現的，一條道路。"
90002200-71 = "Kei……！"
90002200-72 = "大家……離我遠一點……！"
90002200-73 = "我現在……沒辦法按照自己的意思……控制身體……！"
90002200-79 = "……！#n鋼鐵大陸又開始擴張了！"
90002200-80 = "我這邊也確認了！#n也就是說……！"
90002200-81 = "十字神名藉由支配Kei的軀體，重新奪回了對鋼鐵大陸的控制權……？"
90002200-100 = "請不要輸給他，Kei。"
90002200-101 = "[ns]「愛麗絲？」"
90002200-102 = "愛麗，絲……？"
90002200-103 = "必須戰鬥，Kei。"
90002200-104 = "不可以輸給他。"
90002200-105 = "唯獨我們……絕對不能輸給那個存在。"
90002200-106 = "如果不戰鬥的話，我們就無法作為自己活下去。"
90002200-110 = "如果不挺身戰鬥並獲得勝利……"
90002200-112 = "就沒有臉面對那些孩子……面對Ain、Soph和Aur了。"
90002200-113 = "因為愛麗絲沒能和他們一起感到悲傷、沒能陪在他們身邊……"
90002200-114 = "……也沒能成為他們的朋友。"
90002200-116 = "愛麗絲……"
90002200-121 = "無需自責。無名諸神的王女啊。"
90002200-122 = "你們確實只做出了最好的選擇。"
90002200-123 = "任何人都會以那是最好的選擇來安慰自己。"
90002200-124 = "然而即便是自認最好的選擇，有時也會帶來最惡劣的結果。"
90002200-125 = "那是極為常見的事。"
90002200-126 = "從局部來看，原因在於資訊的不足。"
90002200-127 = "不過從整體的視角來看──#n那是因為自由對生命而言是個過於龐大，以至於無法完全享受的概念。"
90002200-128 = "這便是這個世界與你們的生命之間，從根本上所具有的荒謬與矛盾。"
90002200-129 = "亦是痛苦。"
90002200-130 = "以及罪孽。"
90002200-131 = "無須畏懼。我將赦免那一切。"
90002200-132 = "將其從根源斬斷，並化為虛無。"
90002200-133 = "將一切交給我，你們只管安息吧。"
90002200-134 = "……！"
90002200-135 = "閉……嘴……"
90002200-136 = "鑰匙啊。汝以為自己經歷的一切都只是偶然嗎？"
90002200-137 = "汝以為自己得到我的神體只是偶然嗎？"
90002200-138 = "過去並非偶然。發生的事在結果上皆是必然。"
90002200-139 = "所以既無法逆轉，也無法重新來過。"
90002200-140 = "成形之物不易碎裂，所有現在皆為過去的總和。"
90002200-141 = "王女啊。"
90002200-142 = "是，是！？"
90002200-143 = "汝等原本的模樣應當如何。"
90002200-144 = "汝等該有的形態應當如何。"
90002200-145 = "「無名諸神」為何將汝等留在這片土地上，隨後便消失無蹤。"
90002200-146 = "那些祭司的渴求為何，以至於如今依然無法放下執念。"
90002200-147 = "我開口宣告──在世界被規定為現在的模樣之前，存在著另一個世界。"
90002200-148 = "一個汝等能夠更加回歸本質的世界曾經存在。"
90002200-149 = "由於現在的世界是虛假、是幻象、是逃避之所──"
90002200-150 = "這個世界才被定義[ruby=κιβωτός]為方舟。[/ruby]"
90002200-151 = "我開口宣告──去尋找汝等的根源吧。"
90002200-152 = "之所以必須回歸根源，是因為我們無法逃避它。"
90002200-153 = "無論汝等如何否認或逃離，最終都會如過去的傷痕一般找到汝等。"
90002200-154 = "王女啊，還有侍女啊。"
90002200-155 = "就如同汝等必須永遠將過去的影子背負在身上一樣。"
90002200-156 = "我已經說過……要你閉嘴了……！"
90002200-157 = "即便世界逐漸將神遺忘，神也不該將世界遺忘。"
90002200-158 = "因為那無異於自行放棄了自身的神聖。"
90002200-159 = "我將重新創造汝等所終極渴望的世界。"
90002200-160 = "那將是個完美的世界，因為本身已然完整而不需要改變。"
90002200-161 = "是個所有人都能以被誕生、被創造時的模樣生活的世界。"
90002200-162 = "是個連列車難題中的列車本身都不存在的世界。"
90002200-163 = "……！"
90002200-164 = "過去在被觀測的瞬間便已確定，並收束為單一的枝條。"
90002200-165 = "未來則因無法觀測而化為不具形態的幻象向外發散，將無限的枝條伸向彼方。"
90002200-166 = "現在只不過是存在於過去與未來之間，被薄薄固定住的剎那而已。"
90002200-167 = "過度生長的樹木應當被修剪。"
90002200-168 = "那個世界之中，或許並不存在幸福。"
90002200-169 = "然而在那之中，至少不會存在痛苦。"
90002200-170 = "那個世界之中，或許不會存在更多的可能性。"
90002200-171 = "然而在那之中，至少不會存在罪孽。"
90002200-175 = "[ns] 「你所謂的修剪──」"
90002200-177 = "[ns] 「Ain、Soph、Aur也包含在內嗎？」"
90002200-179 = "……是的。那必然屬於已逝世界的遺產。"
90002200-180 = "已逝的世界，無法容納一切。"
90002200-181 = "因為那終究會引發矛盾。"
90002200-182 = "痛苦與罪孽，正是由此而生。"
90002200-183 = "我將宣告真理，你們應當傾聽。"
90002200-188 = "你那張嘴，還真是嘰嘰喳喳地說個沒完……！"
90002200-193 = "只靠自己一個人什麼都做不了，這就是名為勇者的職業。"
90002200-197 = "雖然生命充滿不確定性又恣意妄為……但也正因如此，才擁有了更多的可能性。"
90002200-201 = "[log]「沒有經歷[ruby=罪]悲傷[/ruby]就能理解他人的方法，根本不存在。」[/log]"
90002200-205 = "不要回頭！"
90002200-209 = "不能讓你們……被我們給拖累……！"
90002200-213 = "不是因為正確才這麼做。而是因為除此之外沒有別的選擇。"
90002200-217 = "[log]在[ruby=老師]你們[/ruby]的世界之中，哪怕只有一點點也沒關係……[/log]"
90002200-220 = "[log]如果，還有姐姐大人的容身之處的話──[/log]"
90002200-224 = "別開玩笑了，你這個冒充神的混帳東西！！！"
90002200-226 = "下一話;鬥爭"
