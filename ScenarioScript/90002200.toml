90002200-17 = "3;말쿠트 부상;02;보았군요?"
90002200-18 = "3;말쿠트 부상;02\n1;리오 결전;05;그렇지 않았다면, 케이가 이 모습으로 이곳에 있을 리 없었을 테니까.\n#1;a\n#3;m4"
90002200-19 = "3;말쿠트 부상;99;네. 강철대륙에 방치된 모든 흠 있는 제물들은, 저 두 번째 신체를 완성시키기 위한 시행착오들이었습니다."
90002200-20 = "1;리오 결전;01;케이가 자신 안에, 예언자들의 코어 정보를 흡수할 자리가 있었다고 이야기했던 것은, 그 때문이었겠구나."
90002200-21 = "3;말쿠트 부상;02;그렇습니다. 모든 두 번째 신체는 자기 안에 세피라를 품을 자리를 가진 채 만들어졌으니까요. 흠이 있는 것이든, 완전한 것이든."
90002200-22 = "1;리오 결전;01\n3;말쿠트 부상;02\n5;에이미 결전;02;신체가 모든 예언자의 세피라를 품게 되면, 무슨 일이 일어나는 거야?\n#1;dl\n#3;m2\n#5;al\n#5;em;[?]"
90002200-23 = "3;말쿠트 부상;06;그때에는 신체 자체가, 세피로트의 나무로서 각성하게 될 것입니다. 만들어진 몸에 신의 지혜가 깃드는 것이죠."
90002200-24 = "3;말쿠트 부상;02;출력은 이 몸에 비해 모자라겠지만, 그 신성과 신비는…… 아마도 그에 버금가겠지요."
