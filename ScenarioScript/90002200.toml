90002200-4 = "3;아리스 결전 비무장;04;어, 어어……?\n#3;a\n#3;em;[?!]\n#3;shake"
90002200-5 = "[ns] \"저건…… 말쿠트? 또?!\""
90002200-6 = "3;아리스 결전 비무장;08;마, 맞습니다. 말쿠트는 분명……. 그리고 지금은 여기, 우리와 함께……!\n#3;stiff"
90002200-7 = "3;말쿠트 부상;01;……저것은, 완성된 형태의 두 번째 신체(神體)."
90002200-8 = "3;아리스 결전 비무장;08\n2;리오 결전;02;두 번째……?\n#2;a\n#3;m4\n#2;em;[?]"
90002200-9 = "3;말쿠트 부상;99;네. 저의 이 몸은 온전히 준비된 첫 번째 신체였죠.\n#2;hide"
90002200-10 = "3;말쿠트 부상;02;<불타는 검>의 흐름. 물질세계로 이루어지는 창조. 케테르에게로 이어진 기운을, 차례대로 흘러내리게 하여 말쿠트에 이르기까지."
90002200-11 = "3;말쿠트 부상;06;하지만 모든 가능성에 대비한다는 뜻에서 두 번째의 신체가 필요했고, <지혜의 뱀>의 흐름을 따라 그것을 주조했습니다."
90002200-12 = "3;말쿠트 부상;99;세피라를 직접 건드리지 않은 채, 흐름을 역순으로, 신의 지혜를 향해 나아가는 경로의 결과물."
90002200-13 = "3;말쿠트 부상;01;다르게 해석하자면, 열 개의 세피라를 거치지 않은 채, 세피라 그 자체를 자신의 안에 품어내는 가능성의 상징물."
90002200-14 = "#all;hide"
