[translation]
41060-1 = "Episode 6;Food Delivery Operation"
41060-2 = "The next morning, I went to the park to check on how the RABBIT Squad was doing."
41060-4 = "In Front of Kousagi Park"
41060-11 = "[ns1] \"Wh-Whoa!\"\n[ns2] \"Who put a trap here?!\""
41060-16 = "The Schale Sensei?"
41060-17 = "Here I thought it was a dirty, stray dog."
41060-18 = "[s3] \"A dirty stray dog... You wound me.\"\n[s4] \"Why is there a trap here?\""
41060-19 = "It's your fault for getting caught."
41060-20 = "Isn't it obvious?"
41060-21 = "We're securing the perimeter against possible intruders."
41060-22 = "Is that our least favorite Sensei?"
41060-23 = "Ooh, I'd be careful. I buried a mine around there."
41060-24 = "[s5] \"This is overkill!\"\n[s6] \"Where is it?!\""
41060-25 = "Heehee. I dunno where it is, though."
41060-26 = "Heehee, I dunno."
41060-27 = "Let's see... How to find it... I guess if something goes ka-boom, voila! We found it!"
41060-28 = "[s] \"You guys are turning this park into a war zone!\""
41060-29 = "Well, how else are we supposed to protect ourselves?"
41060-30 = "This is basic procedure!"
41060-31 = "Apparently using anti-tank mines and exploding trap wire aren't basic procedure though..."
41060-32 = "[s] \"I'm guessing Miyako told you that...\""
41060-33 = "When on a mission, you can never be too prepared."
41060-34 = "Never be lulled into a false sense of security. That's what losers do."
41060-41 = "Saki, Moe... Are you both okay?"
41060-42 = "I heard a lot of noise coming from over here."
41060-43 = "E-Eeek... I-It's Sensei."
41060-44 = "Hello, Sensei."
41060-45 = "What business do you have, before the sun is even up?"
41060-46 = "[s7] \"How did you sleep last night?\"\n[s8] \"I wanted to see if you needed anything.\""
41060-47 = "Fine. You shouldn't worry yourself so much."
41060-48 = "There's nothing for you to worry about here."
41060-49 = "SRT students are well-trained for these kinds of situations."
41060-50 = "Yeah! We could pitch a tent and get a fire going with our eyes closed."
41060-51 = "Survival skills are a must for any SRT student."
41060-53 = "Well, we're hardly in the wilderness here. We have running water and electricity. It's practically a 5-star hotel!"
41060-54 = "And there's lots of shade too, so lookout duty isn't bad."
41060-56 = "The situation is entirely under control, Sensei. You may leave."
41060-57 = "Yep, yep, yup! No issues whatsoever. Nada! Zero! Zilch!"
41060-62 = "[ns] \"Was that noise...\""
41060-63 = "I-It was thunder. Maybe we should prepare for a thunderstorm."
41060-65 = "Saki! Your tummy betrayed us all, you dummy."
41060-66 = "It's not like I can stop it from happening, all right?!"
41060-67 = "I wanna go home..."
41060-69 = "As I said, we're all quite content here."
41060-73 = "[ns] \"...Is that so?\""
41060-74 = "..."
41060-76 = "You ever heard the term \"hangry\"? It means I'm angry because I'm hungry!"
41060-77 = "Y-You see, Sensei..."
41060-78 = "You know what, fine! Yeah! We haven't seen a single crumb of food since yesterday."
41060-80 = "This base was built from a retrofitted park, and the only consumable thing is water from the drinking fountains."
41060-81 = "And there isn't anywhere we can request supplies from."
41060-82 = "Ugh. We should have gotten food rations from SRT Academy."
41060-83 = "Who brought this anti-aircraft missile instead? Can you eat an anti-aircraft missile? Huh?"
41060-84 = "Hey! Don't come after my missiles just because you're hungry."
41060-85 = "They're important too! Think about the glitz and glamor of its KA-BOOM!"
41060-86 = "And anyway, Miss Hypocritical. Didn't you just bring a bunch of textbooks? Why don't you eat the paper?"
41060-87 = "Th-The blasphemy!"
41060-88 = "We're still SRT students. How could a dedicated student possibly leave their textbooks behind?"
41060-90 = "Th-There are some shops around, but our student accounts were suspended so we have no money."
41060-91 = "And now we're going to be left here, forgotten and starved. Slowly wasting away into nothingness..."
41060-92 = "I-I wanna go back to the SRT building... It's not fair."
41060-96 = "[ns] Produce an instant cup ramen."
41060-100 = "Is that..."
41060-101 = "Is that instant cup ramen?!"
41060-102 = "Th-The Mitoshin brand chicken soy sauce ramen! I normally only drool this much for explosives."
41060-103 = "[s9] \"I brought a lot of different flavors.\"\n[s10] \"There's enough for everyone.\""
41060-104 = "Well, if the ever-generous Sensei is simply insisting we take the ramen, what's a li'l girl like me to do?"
41060-105 = "Well, if the ever-generous Sensei is simply insisting we take the ramen, what's a li'l girl like me to do?"
41060-107 = "Stop right there."
41060-108 = "I would beware of accepting that."
41060-109 = "Providing essential goods to people in desperate circumstances only to extract whatever they want in return is an extortion tactic as old as time."
41060-110 = "We don't know what Sensei's true motivations are. Don't be fooled by their supposed kindness."
41060-111 = "[s] \"I really just don't want you to starve to death.\""
41060-112 = "Are you looking down on us, Sensei?"
41060-113 = "Any agent worth their salt knows not to consume anything you didn't personally pack during an operation."
41060-114 = "I'll never accept your extortion food!"
41060-115 = "[s] Open the instant cup ramen."
41060-119 = "Wh-What are you doing?"
41060-120 = "We really aren't going to eat a single bite, you know!"
41060-124 = "[ns] Add boiling water and wait three minutes."
41060-137 = "Urgh..."
41060-138 = "Is this a new form of t-torture?"
41060-139 = "[s11] \"It smells pretty good, huh?\"\n[s12] \"It's getting colder as we speak.\""
41060-142 = "Stay strong, RABBIT Squad! See Sensei's cunning tactics to break down our will?"
41060-143 = "I guarantee Sensei is waiting for us to take the bait to attack!"
41060-144 = "Th-That's right!"
41060-145 = "Do you really think you'll break my will with a cup of cheap instant ramen?"
41060-146 = "I want something a hundred times yummier if you're going to extort me!"
41060-147 = "[s] \"If that's really what you want. More for me.\""
41060-153 = "S-Saki, I'm losing concentration..."
41060-154 = "Can't you smell the umami in the savory broth? Sensei's every slurp drives me closer to madness!"
41060-155 = "Stay strong, Moe. The elite students of SRT can't be brought down by one measly cup of ramen."
41060-160 = "Everyone! Take a deep breath and focus!"
41060-161 = "Remember how we learned to counteract torture methods with antipsychotic drugs at the academy?"
41060-162 = "The stimulus of the ramen's smell may be strong, but our will is stronger!"
41060-167 = "This is worse torture than tickling...but I'll do my best."
41060-168 = "We'll never give up on SRT Academy, Sensei!"
41060-172 = "[ns] Add an onsen egg."
41060-173 = "...!"
41060-175 = "Th-Th-That just now. That was an onsen egg, wasn't it?"
41060-176 = "L-Look at the soft consistency of the yolk. It can only be one thing."
41060-178 = "The thick, salty broth is seeping into the barely set egg...turning it into a savory pudding-like treat..."
41060-179 = "Prepared with all the fixings like that...even that cheap instant ramen cup..."
41060-180 = "...Must be delicious!"
41060-181 = "[s] \"...Do you want some?\""
41060-183 = "Yes!"
41060-184 = "[s13] \"I think they might have some at Valkyrie.\"\n[s14] \"Valkyrie has even better ramen, I've heard.\""
41060-189 = "I knew it. As I said, an extortion trick as old as time."
41060-190 = "You've revealed your true colors, you evil grown-up!"
41060-191 = "I agree! That was m-mean, Sensei..."
41060-193 = "I thought I was the crazy one around here..."
41060-194 = "I'll reiterate. We have no intention of transferring schools."
41060-195 = "You thought you could take advantage of our abysmal situation. But we will remain here, where we can preserve the convictions and justice we've always fought for at SRT Academy."
41060-196 = "Creature comforts are no substitute for conviction."
41060-201 = "[ns] Hand over an address written on a piece of paper."
41060-203 = "What's this?"
41060-204 = "[s15] \"It's okay to get food from anyone but me, right?\"\n[s16] \"Go to this address and you can get fed for free.\""
41060-205 = "You're offering us food? For nothing in return?"
41060-206 = "You're offering us food? For nothing in return?"
41060-207 = "I've made it clear, we're not students you can help, Sensei."
41060-210 = "(Sensei's sudden shift in tactics is suspicious to the say least, but...)"
41060-213 = "Understood. I don't believe we have much choice but to accept."
41060-215 = "So... Thank you. Sensei."
41060-220 = "Do you really believe that wily Sensei has no evil intentions sending us here?"
41060-221 = "M-Maybe our conviction swayed Sensei's mind."
41060-222 = "Puh-lease, Miyu. Ugh, this is why I can't stand you. Do you really think our googly eyes and grumbly tummies made someone like Sensei go, \"Oh dear, I have to help these poor students out of the goodness of my heart?\""
41060-223 = "I-I don't know. Sensei seemed sincere when they gave us the note."
41060-224 = "Maybe they'd even help us bring back SRT."
41060-226 = "This should be the place."
41060-227 = "Wh-Where's the food? Saki, catch me. I think I'm gonna faint from hunger."
41060-228 = "Wait, isn't this where the Schale office is?"
41060-229 = "There's only old weapons and junk..."
41060-234 = "They should be here by now."
41060-239 = "Hey, [USERNAME] Sensei directed us here."
41060-240 = "Ah, yes! I'm glad you found it!"
41060-241 = "I'm so happy Sensei set this up for me! You must be..."
41060-242 = "...The Bento Disposal Specialists!"
41060-243 = "B-Bento Disposal Specialists?!"
41060-244 = "Yes! Our convenience store isn't the most popular, so we end up having a lot of old product."
41060-245 = "Usually I have to get rid of them myself, but it's a lot of work for someone as small as me."
41060-246 = "So when Sensei told me they found some people to come dispose of them for me, I was so happy! They're right here."
41060-253 = "..."
41060-255 = "Oh no! Did I offend you? Oh my gosh, are you not the disposal specialists?"
41060-256 = "Oh no, not at all! That's us! The Bento Disposal Specialists at your service!"
41060-257 = "We just weren't sure if this was the right place!"
41060-258 = "Oh, that's a relief... But th-the looks on your faces are a little scary right now..."
41060-259 = "Because we're hungry!! *ahem* I mean, because we work so hard, you know? Hah! Haha!"
41060-260 = "You don't happen to have any old milk or drinks, do ya?"
41060-261 = "Oh yes, of course! Let me bring you everything right now!"
41060-267 = "Are you stupid, Moe? Accepting expired lunches?"
41060-268 = "How could you stoop so low?"
41060-269 = "They're about to expire, not expired, okay?! What else are we supposed to do, Miss Superiority?"
41060-270 = "B-But... We're the RABBIT Squad of SRT Academy! Elites of the elite!"
41060-271 = "Well, go get your panties in a bunch somewhere else!"
41060-272 = "I'm gonna enjoy every last delectable bite of lunch myself."
41060-276 = "W-W-Wait a second! I didn't say I wouldn't eat! Please, Moe!"
41060-283 = "Is this the end for us?"
41060-284 = "Is this our lives now? Begging for food like stray dogs, never knowing the sweet comfort of a home-cooked meal..."
41060-289 = "[USERNAME] Sensei..."
41060-290 = "I will never, ever forget this insult. Never."
41060-292 = "Next Episode;Operation Carrot 1"
