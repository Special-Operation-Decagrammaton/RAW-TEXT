[translation]
901010800230-11 = "これは……。"
901010800230-15 = "ふふっ、どうやら当たりを引いたみたい。"
901010800230-19 = "こちらFOX2、出口の荷降ろし場で興味深いデータをいくつか発見したよ。"
901010800230-20 = "一つはこの倉庫で働く構成員の名簿で、もう一つは支部のキャッシュフローを記録していた売上の内訳。"
901010800230-24 = "――組織の目的を把握するには売上台帳が手っ取り早い。"
901010800230-25 = "よくやった、FOX2。確保したデータをコピーして、こちらへ転送するように。"
901010800230-26 = "うん、すぐ終わるよ。"
901010800230-27 = "FOX2。売上の内訳に目立った記録はない？怪しい取引内容とか。"
901010800230-28 = "うーん、特に目立つものはないけど……。"
901010800230-29 = "気になるのは、最近支出を抑えているように見えることかな。"
901010800230-30 = "構成員に支給するお菓子も安いせんべいに変えているし、定期購入している弾丸も今期は購入していない。"
901010800230-31 = "急にお金がなくなったとか？"
901010800230-32 = "ううん、全体的な保有額はむしろ平年より増えているよ。"
901010800230-33 = "何か大金を使うことを予定しているとかなのかも。"
901010800230-34 = "それなのに、食べる予定のないカニを大量に買うなんて、なんだか怪しいねぇ……。"
901010800230-40 = "こちらFOX3。"
901010800230-41 = "FOX2。さきほど裏門で会話してた構成員の二人、タンゴ3とタンゴ4が指定位置から移動したわ。"
901010800230-42 = "事務所へ向かっているのかもしれない。早くそこから離れて。"
901010800230-43 = "でもまだデータのコピーが――"
901010800230-47 = "FOX2、誰かがそちらに向かっている。気をつけろ。"
901010800230-48 = "……！"
901010800230-57 = "あれ、ドアが開いている？"
901010800230-63 = "誰だ！"
901010800230-71 = "こんにちは、FOX EATSです！"
901010800230-72 = "……FOX EATS？"
901010800230-73 = "あ、カポ、この前言ってたやつです。最近この辺で噂になってるデリバリーがあるって。"
901010800230-74 = "そこの配達員じゃないですかね。"
901010800230-75 = "そんなものうちは頼んでないぞ！なんで外部の人間がうちらの事務所にいるんだよ！"
901010800230-76 = "なんだ、お前？他のファミリーからのスパイか！？"
901010800230-78 = "あ、その……。"
901010800230-82 = "すみません～デリバリーをお届けに来たのですが、入り口に誰もいなくて。"
901010800230-83 = "外においておいたら悪くなっちゃうので、人を探しにここまで来てしまいました。"
901010800230-84 = "本当か？正門の警備がここまで通したと？"
901010800230-85 = "えっと……正門には誰もいませんでしたよ？"
901010800230-86 = "ちっ、あいつらまたサボりやがって。"
901010800230-87 = "それで、誰が何を注文した？"
901010800230-88 = "えっと……いなり寿司2人分です！"
901010800230-89 = "おそらく夜食で注文したのかと。#nいなり寿司なら夜に食べても胃の負担にならないですし、ちょうどいいですね。"
901010800230-90 = "誰か、いなり寿司頼んだやついるか？"
901010800230-92 = "さあ、とりあえず聞いてみます……。"
901010800230-94 = "分かった。いなり寿司はここに置いておいて。"
901010800230-95 = "次勝手に入ったら、容赦しないからな！"
901010800230-96 = "はい！ご利用ありがとうございました！"
