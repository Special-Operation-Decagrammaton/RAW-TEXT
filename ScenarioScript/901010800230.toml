901010800230-27 = "1;통신오토기;02;FOX 2. 매출 내역에 특이한 기록은 없어? 수상한 거래 내역이라든가.\n#1;em;[?]"
901010800230-28 = "3;니코 아르바이트;00;글쎄. 특별히 눈에 띄는 부분은 없는 것 같은데……"
901010800230-29 = "3;니코 아르바이트;02;하나 신경 쓰이는 부분이라면, 최근 지출을 전반적으로 억제하고 있는 것처럼 보여."
901010800230-30 = "3;니코 아르바이트;00;조직원들에게 지급하는 간식도 저렴한 센베이로 바꾸었고, 정기적으로 구입하던 탄환 구매도 이번 분기에는 진행하지 않았어."
901010800230-31 = "1;통신오토기;00;돈이 갑자기 궁해진 거 아냐?"
901010800230-32 = "3;니코 아르바이트;99;아니, 전반적인 보유금은 오히려 평년에 비해 늘었어."
