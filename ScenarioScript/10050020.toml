10050020-93 = "3;시미코;05;그건 그렇죠…….\n#fontsize;50"
10050020-94 = "3;나기사;02;그런 의미에서, 우리는 이 책의 근원을 알아낼 필요가 있습니다. 그야말로 학원의 안전과도 관련된 문제니까요.\n#3;em;…"
10050020-95 = "3;나기사;17;하지만 여기에서 또 다른 문제가 발생합니다. 이 서적이 트리니티 바깥으로부터 온 것이 확실한 이상."
10050020-96 = "3;나기사;15;저희들, 티파티가 직접 나서는 것은 모양이 좋지 않겠지요.\n#3;em;[한숨]"
10050020-97 = "3;나기사;16;……모든 흐름이 최악으로 흘러갈 경우, 외교 문제가 발생할 가능성도 있을 것이고요."
10050020-98 = "3;나기사;23;질서 확립이라는 측면에서, 정의실현부에게 맡겨야 할 일이라고 볼 수도 있지만……."
10050020-99 = "3;나기사;15;동시에 이 일에 정의실현부를 본격적으로 활동하게 한다는 것은, 교내 분위기에 그다지 좋지 않은 영향을 끼칠 것 같기도 합니다.\n#3;em;[속상함]"
10050020-100 = "3;나기사;02;그러니, 도서부에게 부탁하고자 했던 것이었어요. 트리니티에서 유통되는 서적의 관리는 기본적으로 도서부의 일이고."
10050020-101 = "3;나기사;15;그렇기 때문에 우이 씨를 부른 것입니다만……. 네.\n#3;em;[땀]"
