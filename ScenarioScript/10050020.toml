10050020-77 = "1;시미코;05;이건……? 최근 트리니티에서 암암리에 유행 중이라는 그 책이군요.\n#1;em;[?]"
10050020-78 = "3;나기사;02;맞습니다. 잘 알고 계시니, 이야기가 빨라지겠네요. 혹시 내용에 대해서도 알고 계신가요?"
10050020-79 = "1;시미코;99;…….\n#3;dr\n#1;m3"
10050020-80 = "1;시미코;04;(정말은 파악하고 있지만, 있는 사실을 그대로 이야기했다가는…… 여러모로 곤란해질 것 같은 분위기네요.)\n#1;em;[땀]"
10050020-81 = "1;시미코;01;아니요, 내용에 대해서까지는 잘 모릅니다.\n#3;hide"
10050020-82 = "3;나기사;20;좋아요. 저도 조금 전까지는 모르고 있었으니, 어떻게 보면 당연한 일이겠지요.\n#1;hide"
10050020-83 = "3;나기사;02;일단 이 서적은, 트리니티 바깥으로부터 온 것이 확실합니다."
10050020-84 = "3;시미코;02;네. 트리니티 내부에서 만들어진 책이라면, 저희 도서부가 관리하고 있어야 할 테니까요.\n#3;em;[반응]"
10050020-85 = "3;나기사;23;그래요. 하지만 유감스럽게도, 지금은 이 책의 출처를 알 수가 없어요."
10050020-86 = "3;나기사;13;즉, 지금의 트리니티는! 외부로부터 트리니티를 안으로부터 무너뜨리는 그 어떤 세력에게!\n#3;stiff"
