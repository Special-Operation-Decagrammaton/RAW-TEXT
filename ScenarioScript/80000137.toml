[translation]
80000137-1 = "ต้องไปอยู่ในพิพิธภัณฑ์เลยละ!"
80000137-2 = "(ขณะที่คุณครูนั่งทำงานอยู่ที่ชาเล่ต์ ก็รับรู้ได้ถึงการมาถึงของราบุ)"
80000137-3 = "(คุณครูลองไปที่ตรอกแห่งหนึ่งที่คิดว่าราบุน่าจะผ่าน)"
80000137-5 = "ตรอกด้านหลังใกล้ชาเล่ต์"
80000137-10 = "อืม ดีละ..."
80000137-11 = "อ๊ะ ฉันควรหวีผมหน้าม้าหน่อยดีมั้ยนะ..."
80000137-12 = "[ns1] \"รา... บุ!\"\n[ns2] \"ราบุ!\""
80000137-18 = "วะ... ว้ากกก!! ตกใจหมดเลย!!"
80000137-19 = "ฉันตกใจนะ!! เกือบยิงสวนเพราะคิดว่าโดนลอบยิงแล้วด้วย!!"
80000137-20 = "อะไรกัน ตอนนี้เวลาทำงานของครูไม่ใช่เหรอ?! ไม่ได้อยู่ที่ชาเล่ต์หรอกเหรอ?"
80000137-21 = "[s] \"ก็ครูคิดว่าราบุน่าจะอยู่แถวนี้น่ะสิ\""
80000137-22 = "ทำไมถึงรู้ได้เนี่ย... เฮ้อ ช่างเถอะ ดีใจที่เจอกันเกินไปรึเปล่าน่ะ? ให้ตายสิ..."
80000137-23 = "แต่ก็ดีเลยนะ ฉันกำลังจะไปที่ชาเล่ต์อยู่พอดี"
80000137-24 = "ฉันมีของอยากจะให้ก็เลย... มาที่นี่ยังไงล่ะ!"
80000137-25 = "[s3] \"หมวกถักเอง?\"\n[s4] \"จะแลกกันเขียนไดอารี่เหรอ?\"\n[s5] \"อัลบั้มภาพงานจบการศึกษาม.ต้น?\""
80000137-29 = "ทำไมฉันต้องเอาของพวกนั้นมาด้วยเล่า?!"
80000137-30 = "นี่คุณครูยุ่งจนไม่มีเวลาดูปฏิทินเลยรึไง? น่าเป็นห่วงจริงๆ..."
80000137-34 = "เอ้า!"
80000137-35 = "ฉันไม่มีเวลา แล้วก็ไม่มั่นใจที่จะทำเองด้วย..."
80000137-36 = "ถึงจะเป็นช็อกโกแลตที่ซื้อมาจากร้านสะดวกซื้อก็รับๆ ไว้เถอะนะ"
80000137-37 = "ฉันซื้อมาสองอัน อันหนึ่งให้คุณครู แล้วก็สำหรับฉันอันหนึ่ง... ไหนลองชิมดูหน่อยซิ... ง่ำ"
80000137-41 = "ไอยอูอิ๊... อันเอาอั้ยอี้ไอยอะ... (ไหนดูซิ เอาไว้ที่ไหนนะ)"
80000137-46 = "อื้มมมม?"
80000137-47 = "[s6] \"เจ็บตรงไหนเหรอ?\"\n[s7] \"ไข้ขึ้นเหรอ?\"\n[s8] \"หิวเหรอ?\" "
80000137-51 = "โธ่!! วุ่นวายจริงๆ เลย! ฉันคาบช็อกโกแลตอยู่จะให้พูดได้ยังไงเล่า!"
80000137-52 = "ฉันหยิบใส่กระเป๋ามาสองอันนะ แต่ตอนนี้มันเหลืออันเดียวแล้ว"
80000137-53 = "สงสัยคงทำหล่นตอนที่มีเรื่องกับนักเรียนคนอื่นเมื่อกี้น่ะ..."
80000137-54 = "[s] \"แค่ความรู้สึกของราบุก็เพียงพอแล้วละ!\""
80000137-55 = "โธ่ ได้ยังไงล่ะ แถมวันนี้ยังเป็นวันนั้นด้วย ถ้าพลาดไปมันน่าเสียดายออก"
80000137-56 = "ฮึ่ย..."
80000137-60 = "ครู ฉันกัดไปแล้วคำหนึ่งก็จริง... แต่เรามาแบ่งกันกินดีมั้ย?"
80000137-65 = "ด้านที่ฉันหยิบอยู่มันเปื้อนไปแล้ว ครูกินด้านที่สะอาดๆ ไปก็แล้วกัน"
80000137-66 = "หักตามรอยผ่าได้อยู่ใช่มั้ย?"
80000137-70 = "[ns] \"ไว้ใจครูได้เลย!\""
80000137-71 = "อ่า น่าเสียดายจัง อุตส่าห์ซื้อมาตั้งสองอัน"
80000137-72 = "อืม งั้นแบ่งเป็นสองอันเท่าๆ กันก็คง..."
80000137-78 = "......"
80000137-79 = "มีคนโทรมาเรื่องงานสินะ?"
80000137-80 = "[s] \"อื้อ ก็ใช่อยู่หรอก...\""
80000137-84 = "รีบไปเถอะ อย่าให้เขาต้องรอเลย"
80000137-85 = "คงมีใครต้องการให้คุณครูไปหาอยู่ใช่มั้ยล่ะ?"
80000137-86 = "[s] \"ขอโทษนะราบุ! ไว้ครูจะมาเล่นด้วยใหม่นะ!\""
80000137-90 = "ตอนวิ่งก็มองทางด้วยเซ่! มันอันตรายนะ?!"
80000137-97 = "ให้ตายสิ..."
80000137-98 = "\"คราวหน้า\" งั้นเหรอ..."
80000137-99 = "ฉันจะมาใหม่แน่ๆ เพราะงั้นเตรียมตัวเอาไว้ก็แล้วกัน..."
80000137-100 = "ไปรื้อตู้กดน้ำอัตโนมัติดูดีกว่า"
80000137-106 = "ช็อกโกแลตหายไปไหนแล้วเนี่ย?"
80000137-110 = "เมื่อกี้ยังคาบไว้ในปากอยู่เลย...?"
80000137-111 = "ครูเอาไปทั้งอันเลยเหรอเนี่ย...?!"
