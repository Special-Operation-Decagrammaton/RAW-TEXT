[translation]
80000137-1 = "This Should Be in a Museum!"
80000137-2 = "While at Schale, I sensed Rabu's presence."
80000137-3 = "I decided to go to an alley where she might be hanging."
80000137-5 = "Back Alley Near Schale"
80000137-10 = "...Hm, nice."
80000137-11 = "Ah, maybe I'll comb my bangs a little."
80000137-12 = "[ns1] \"Ra!\"\n[ns2] \"Bu!\""
80000137-18 = "Wh-Whoa!!! Yikes!!!"
80000137-19 = "Tone it down! I thought it was an ambush! I almost shot you!"
80000137-20 = "Wait, shouldn't you be at work?! Why aren't you in the Schale building?"
80000137-21 = "[s] \"It's because I sensed that you were nearby!\""
80000137-22 = "How do you even... *sigh* Whatever. I feel like you're way too happy to just be seeing me, seriously..."
80000137-23 = "Still, this is great timing. I was on my way to Schale anyway."
80000137-24 = "I came here because I had something to give you!"
80000137-25 = "[s3] \"A hand-knitted hat?\"\n[s4] \"A couple's diary?\"\n[s5] \"Your middle school yearbook?\""
80000137-29 = "Why do you even want things like that?!"
80000137-30 = "More importantly, are you too busy to even look at the calendar? That's concerning..."
80000137-34 = "Here!"
80000137-35 = "I lack the skills and confidence to make you something special..."
80000137-36 = "...So you're going to have to settle with this. It's chocolate I bought at the convenience store."
80000137-37 = "I bought two. One for you and one for me. Hmm, let's see... Nom..."
80000137-41 = "...Lessee...wher di I put it..."
80000137-46 = "Hm?"
80000137-47 = "[s6] \"Are you hurt?\"\n[s7] \"Are you sick?\"\n[s8] \"Are you hungry?\" "
80000137-51 = "Mmph! Tone it down and stop distracting me! I can't answer while holding this chocolate in my mouth!"
80000137-52 = "I'm sure I bought two, then I put them in my bag. But I only see one now."
80000137-53 = "Maybe I dropped it during that brawl earlier..."
80000137-54 = "[s] \"Just the sentiment is more than enough!\""
80000137-55 = "Eh, no it isn't. What a shame, and on a holiday..."
80000137-56 = "Ugh..."
80000137-60 = "Sensei, I know I was biting on it, but would you still like some? I only got the corner..."
80000137-65 = "My hands are a little dirty right now, so you can break off some of the clean rectangles."
80000137-66 = "Just snap it along that line, right?"
80000137-70 = "[ns] \"Leave it to me!\""
80000137-71 = "Eh, what a disappointment. I went out of my way to buy two."
80000137-72 = "Yeah, I think we'll just have to split this—"
80000137-78 = "..."
80000137-79 = "What's that? Duty calls?"
80000137-80 = "[s] \"Y-Yeah, that's right, but...\""
80000137-84 = "Go on ahead. Don't keep them waiting."
80000137-85 = "After all, someone needs help, right?"
80000137-86 = "[s] \"Sorry, Rabu! Make sure to drop in next time! We'll have fun!\""
80000137-90 = "Watch where you're running! It's dangerous and slippery!"
80000137-97 = "Geez..."
80000137-98 = "...Next time, you say?"
80000137-99 = "...I'll have to take you up on that."
80000137-100 = "Well then, I guess I'll go scavenge for coins under the vending machine..."
