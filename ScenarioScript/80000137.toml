[translation]
80000137-1 = "這個得送去博物館！"
80000137-2 = "（在夏萊處理業務時，感覺到了良舞的氣息）"
80000137-3 = "（前往良舞可能會經過的巷子看看）"
80000137-5 = "夏萊附近的後巷"
80000137-10 = "……嗯，好。"
80000137-11 = "啊，要不要稍微梳一下瀏海……"
80000137-12 = "[ns1]「良！」\n[ns2]「舞！」"
80000137-18 = "哇，哇啊啊啊！！嚇死我了！！"
80000137-19 = "你嚇到我了！！我差點以為是突襲開槍了！！"
80000137-20 = "什麼嘛，不是工作時間嗎！？你不是在夏萊嗎？"
80000137-21 = "[s]「因為感覺良舞來附近了！」"
80000137-22 = "那到底是什麼……唉，算了。也太高興了吧，真是的……"
80000137-23 = "正好，我本來就正在去夏萊的路上。"
80000137-24 = "因為有東西要給你所以才親自過來的──就是這樣！"
80000137-25 = "[s3]「親手織的帽子？」\n[s4]「交換日記？」\n[s5]「國中畢業紀念冊？」"
80000137-29 = "為什麼會想要那種東西啊！？"
80000137-30 = "比起那個，你忙到連日曆都沒看嗎？真令人擔心……"
80000137-34 = "拿去！"
80000137-35 = "自己做的話既沒時間也沒信心。"
80000137-36 = "雖然是在便利商店買的巧克力，就忍耐一下吧。"
80000137-37 = "買了我的和老師的，兩個，讓我看看……嗯嗯……"
80000137-41 = "呃滋茲……唔嗯呢嘞哈……"
80000137-46 = "嗯，嗯嗯嗯？"
80000137-47 = "[s6]「你痛嗎？」\n[s7]「發燒了嗎？」\n[s8]「肚子餓嗎？」"
80000137-51 = "呸哈！！真是吵死了，真是的！我嘴裡含著巧克力沒辦法回答啦！"
80000137-52 = "明明買了兩個放在包包裡的，卻只剩這一個。"
80000137-53 = "大概是剛才被找碴打架的時候弄掉了吧，嘖……"
80000137-54 = "[s]「光是心意就夠了！」"
80000137-55 = "不行啊，不可以。好歹今天是這麼特別的日子，太可惜了。"
80000137-56 = "唔嗯……"
80000137-60 = "老師，雖然我咬過了，你要分著吃這個嗎？"
80000137-65 = "我現在手有點髒，老師你把乾淨那邊掰下來吃吧。"
80000137-66 = "沿著分割線就能輕鬆掰開吧？"
80000137-70 = "[ns]「交給我吧！」"
80000137-71 = "唉唉，好可惜。明明下了很大決心才買了兩個的。"
80000137-72 = "嗯，剛好對半掰開就好了……"
80000137-78 = "……"
80000137-79 = "看來是工作的聯絡呢？"
80000137-80 = "[s] 「嗯嗯，是這樣沒錯……」"
80000137-84 = "快去吧。別讓人家等。"
80000137-85 = "有人需要老師不是嗎？"
80000137-86 = "[s]「抱歉，良舞！下次一定要來玩！」"
80000137-90 = "跑步的時候只看前面跑！很危險的你知道嗎！？"
80000137-97 = "……真是的。"
80000137-98 = "……下次，嗎。"
80000137-99 = "……既然說了一定要來玩，那你就做好心理準備吧。"
80000137-100 = "那，去找找自動販賣機吧。"
80000137-106 = "巧克力，去哪了？"
80000137-110 = "明明是我咬在嘴裡的……？"
80000137-111 = "老師就那樣拿走了……！？"
