[translation]
80000137-1 = "這個得送去博物館！"
80000137-2 = "（在夏萊處理業務時，感受到了良舞的氣息）"
80000137-3 = "（於是前往良舞可能會經過的巷子看看）"
80000137-5 = "夏萊附近的後巷"
80000137-10 = "……嗯，好。"
80000137-11 = "啊，稍微整理一下瀏海……"
80000137-12 = "[ns1]「良！」\n[ns2]「舞！」"
80000137-18 = "哇啊啊啊！！嚇死我了！！"
80000137-19 = "你嚇到我了啦！！我差點以為是突襲，準備要開槍了耶！！"
80000137-20 = "而且，現在不是工作時間嗎！？#n你人應該待在夏萊才對吧？"
80000137-21 = "[s]「因為我感覺到了良舞在附近！」"
80000137-22 = "那到底是什麼莫名其妙的……唉，算了。#n你看起來也太高興了吧，真是的……"
80000137-23 = "不過這樣正好，我本來也正在去夏萊的路上。"
80000137-24 = "因為我有東西要親自送給你。"
80000137-25 = "[s3]「像是親手織的帽子？」\n[s4]「交換日記？」\n[s5]「國中的畢業紀念冊？」"
80000137-29 = "為什麼會想要那種東西啊！？"
80000137-30 = "比起那個，你居然忙到連日曆都沒在看嗎？#n真令人擔心……"
80000137-34 = "來！"
80000137-35 = "因為自己做的話既沒時間也沒什麼信心……"
80000137-36 = "雖然是在便利商店買的巧克力，你就先將就一下吧。"
80000137-37 = "我買了自己和老師的各一份，等我找找……啊姆……"
80000137-41 = "唔嗯……晃去啊以爾……"
80000137-46 = "嗯……嗯嗯嗯！？"
80000137-47 = "[s6]「哪裡痛嗎？」\n[s7]「發燒了嗎？」\n[s8]「肚子餓嗎？」"
80000137-51 = "噗哈！！吵死了，真是的！#n我嘴裡含著巧克力沒辦法回答啦！"
80000137-52 = "明明買了兩個放在包包裡的，現在卻只剩下一個。"
80000137-53 = "大概是剛才被找碴的時候，在打架的過程中弄丟了吧，嘖……"
80000137-54 = "[s]「只要有心意就足夠了！」"
80000137-55 = "不不不，那怎麼行呢。#n今天好歹是個特別的日子，那樣未免太可惜了吧。"
80000137-56 = "唔嗯……"
80000137-60 = "老師，雖然這片剛才被我咬在嘴裡，你介意跟我分著吃嗎？"
80000137-65 = "我現在手有點髒，你就把乾淨的那邊掰下來吃吧。"
80000137-66 = "沿著分割線應該能輕鬆掰開才對。"
80000137-70 = "[ns]「交給我吧！」"
80000137-71 = "唉……真可惜。明明是下定很大的決心才買了兩個的。"
80000137-72 = "嗯，剛好分成一半應該就可以──"
80000137-78 = "……"
80000137-79 = "是工作的聯絡對吧……？"
80000137-80 = "[s] 「嗯……是沒錯……」"
80000137-84 = "那你趕快去吧。別讓人家等太久了。"
80000137-85 = "現在有人需要老師，不是嗎？"
80000137-86 = "[s]「抱歉，良舞！下次一定要來玩哦！」"
80000137-90 = "跑步的時候要看前面啦！#n你知道那樣很危險嗎！？"
80000137-97 = "……真是的。"
80000137-98 = "下次嗎……"
80000137-99 = "既然你都那麼說了，就做好心理準備吧。"
80000137-100 = "好……來去找找自動販賣機吧。"
80000137-106 = "話說，巧克力跑哪去了？"
80000137-110 = "我明明咬在嘴裡的啊……？"
80000137-111 = "老，老師就那樣拿走了……！？"
