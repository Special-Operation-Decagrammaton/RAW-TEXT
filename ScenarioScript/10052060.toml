[translation]
10052060-1 = "เคเทอร์ มหามงกุฎเหนือสุด ผู้เปล่งรัศมีเจิดจรัส"
10052060-2 = "เข้ามาในพื้นที่ของเคเทอร์แล้วค่ะ"
10052060-3 = "ถึงฉันจะยังไม่รู้ความหมายที่แน่ชัด แต่เห็นว่าตัวเลขเชิงสัญลักษณ์ในเซฟิร่าของคือเคเทอร์เลข 1 ค่ะ"
10052060-4 = "โอ้ว... ยอดเยี่ยมเลยค่ะ โทคิ! อาริสึไม่รู้เรื่องนั้นด้วยซ้ำค่ะ!"
10052060-5 = "ฉันแค่อ่านข้อมูลของผู้เลื่อมใสแต่ละตนมาก็เท่านั้นค่ะ อาริสึที่น่ารัก"
10052060-6 = "โทคิใส่ใจรายละเอียดจังเลยนะคะ! ทำแค่นั้นก็ถือว่ายอดเยี่ยมแล้วละค่ะ!"
10052060-7 = "ขอบคุณค่ะ อาริสึ เข้ามาใกล้ๆ กันสิคะ ฉันจะลูบหัวให้ค่ะ"
10052060-8 = "ค่ะ!"
10052060-15 = "แต่ถ้าคิดดูดีๆ เคเทอร์ควรจะถูกเรียกว่าเป็นผู้เลื่อมใสตนแรก..."
10052060-16 = "แต่ก็นานมากเลยนะคะกว่าเราจะได้เจอเคเทอร์"
10052060-17 = "คุณครูยังจำได้หรือเปล่าคะ? ที่พวกเราเจอเคเทอร์เป็นครั้งแรกในพื้นที่จมน้ำรกร้างน่ะ "
10052060-18 = "[s] \"ตอนนั้นเหมือนเล่นซ่อนแอบกันเลยละ\""
10052060-19 = "ใช่ค่ะ ถึงพวกเราจะได้เป็นฝ่ายหาอย่างเดียวก็เถอะค่ะ "
10052060-20 = "[s] \"แล้วฮิมาริก็ออกมาที่นั่นด้วยตัวเองเลยด้วย\""
10052060-21 = "ฉันก็เคยได้ยินเรื่องมาค่ะ ได้ยินว่าหัวหน้าอยากเห็นเดคาแกรมมาทอนด้วยตาของตัวเอง ก็เลยตื่นเต้นและตาเป็นประกายเหมือนเด็กน้อยเลยค่ะ"
10052060-22 = "นั่นสิคะ ฉันก็เหมือนจะเคยได้ยินอะไรคล้ายๆ กันมาเลยค่ะ"
10052060-23 = "ทั้งสองคนไปได้ยินข่าวลือที่มีแต่การใส่ร้ายป้ายสีแบบนั้นมาจากใครคะ? ริโอะใช่มั้ยคะ?"
10052060-24 = "จากเอมิค่ะ"
10052060-25 = "อย่างนั้นสินะคะ... เอมิก็จริงๆ เลย บางครั้งเราก็มองวัตถุและปรากฏการณ์จากสัญชาตญาณไม่ได้นะคะ"
10052060-26 = "ไม่หรอก ตอนนั้นหัวหน้าเป็นแบบนั้นจริงๆ ต่างหาก"
10052060-27 = "อะ... เอมิ?!"
10052060-28 = "(อย่างนั้นสินะ...)"
10052060-29 = "ไม่เป็นไรหรอกค่ะ รุ่นพี่ฮิมาริ! หนึ่งวันก่อนที่เกมใหม่จะเปิดตัว อาริสึก็จะรู้สึกแบบนั้นเหมือนกันค่ะ!"
10052060-30 = "งะ... งั้นเหรอคะ? อะแฮ่ม จะยังไงก็เถอะค่ะ ถึงตอนนั้นฉันจะไม่ได้ตื่นเต้นหรือแสดงท่าทีกระตือรือร้น#nอะไร"
10052060-31 = "แต่ฉันก็คาดหวังว่า ถ้าได้เห็น 'ปรากฏการณ์' ที่ได้ชื่อว่าเดคาแกรมมาทอนด้วยตาของตัวเอง ทุกอย่างก็จะจบลงค่ะ"
10052060-32 = "และในแง่หนึ่ง เมื่อสิ่งสิ่งหนึ่งจบลง ความเป็นไปได้อื่นๆ ก็จะเริ่มต้นขึ้น... "
10052060-33 = "และนำมาสู่สถานการณ์แบบนี้ในที่สุด..."
10052060-34 = "และการที่ฉันคาดเดาและเตรียมรับมือกับผลลัพธ์นั้นไม่ได้ ก็เป็นสิ่งที่น่าเจ็บปวดสำหรับฉันค่ะ"
10052060-35 = "หัวหน้าฮิมาริ ระหว่างนี้หัวหน้าได้ความสามารถในการทำนายขึ้นมางั้นเหรอคะ?"
10052060-36 = "ไม่หรอกค่ะ แน่นอนว่าเหตุผลหนึ่งที่ฉันศึกษาเรื่องลี้ลับ ก็เพื่อจะได้เห็นลางบอกเหตุของอนาคต"
10052060-37 = "แต่ตอนนี้ฉันยังไม่ได้คำตอบที่แน่ชัดเกี่ยวกับเรื่องนั้นค่ะ..."
10052060-38 = "แล้วทำไมหัวหน้าถึงพยายามจะรับผิดชอบต่อผลลัพธ์ที่คาดเดาไม่ได้ล่ะคะ?"
10052060-39 = "...!"
10052060-40 = "(ไนซ์ช็อตเลยละ โทคิ)"
10052060-41 = "ไนซ์ช็อตเลยนะคะ โทคิ"
10052060-46 = "เอ่อ ขอโทษที่ขัดจังหวะนะคะ ที่จริงฉันไม่ได้มีปัญหากับใครเลย แต่ว่า..."
10052060-47 = "เราต้องร่อนลงไปอีกเหรอคะ?!"
10052060-48 = "ใช่แล้วละ นั่นเป็นวิธีที่สมเหตุสมผลที่สุดแล้ว"
10052060-49 = "ใช่ค่ะ นั่นคือแผนที่สมเหตุสมผลที่สุดแล้วค่ะ"
10052060-50 = "ม่านการยิงประสานของเคเทอร์รุนแรงมาก การบุกเข้าไปทางภาคพื้นดินแทบจะเป็นไปไม่ได้เลยค่ะ"
10052060-51 = "ไม่ต้องกังวลเรื่องความปลอดภัยตอนร่อนลงมาหรอกค่ะ เคยร่อนลงไปแล้วไม่ใช่เหรอคะ?"
10052060-52 = "แล้วปฏิบัติการทางอากาศก็น่าจะเป็นสิ่งที่เคยทำมาหลายครั้งแล้วด้วยนี่คะ?"
10052060-53 = "ถึงจะเคยเล่นเครื่องเล่นที่ตกแนวดิ่งในสวนสนุกมาหลายครั้ง แต่ก็ไม่ได้หมายความว่ามันจะไม่น่ากลัว#nอีกต่อไปแล้วนี่คะ?!"
10052060-54 = "ไม่ได้เห็นยูสึพูดฉะฉานแบบนี้มานานแล้วนะคะ แสดงว่าต้องกลัวจริงๆ แน่ๆ เลยค่ะ"
10052060-55 = "แต่ว่าแคปซูลลงจอดนี้ก็มาจากความคิดเห็นของยูสึกับชมรมพัฒนาเกมทุกคนไม่ใช่เหรอคะ?"
10052060-56 = "แต่ฉันไม่ได้คิดว่าตัวเองจะต้องนั่งแคปซูลแล้วร่อนลงไปเองนี่คะ?!"
10052060-57 = "ทุกคน ได้เวลาร่อนลงแล้ว เตรียมตัวกันเถอะ"
10052060-58 = "เฮือก??!!"
10052060-59 = "ไหวหรือเปล่าคะ ยูสึ?"
10052060-60 = "บะ... แบบนี้มัน ฉัน... ฉัน...!"
10052060-61 = "ทีมร่อน ไปประจำที่แคปซูลลงจอดค่ะ ขอย้ำอีกครั้ง ทีมร่อน ไปประจำที่แคปซูลลงจอดค่ะ"
10052060-62 = "แคปซูลลงจอด พร้อมปล่อยตัว"
10052060-69 = "เอาละ งั้นก็ไปกันเถอะ"
10052060-70 = "ฉันจะอยู่หน้าสุดให้เองค่ะ"
10052060-72 = "หัวหน้าฮิมาริ โมโมอิ ฝากจัดการขั้นตอนต่อไปตามที่เห็นสมควรได้เลยนะ"
10052060-73 = "เฮือกกกกกก...!"
10052060-75 = "เริ่มร่อนลงได้!"
10052060-77 = "ดีละ... ก็แค่ต้องผลักคันโยกนี้ใช่มั้ย น่าจะใช่เนอะ?"
10052060-78 = "พี่โมโมอิ... ขอร้องละ ช่วยทำอะไรให้รอบคอบด้วยเถอะ"
10052060-79 = "ฉันทั้งรอบคอบและจริงจังนะ!"
10052060-86 = "ว้ายยยยยยย!!!"
10052060-87 = "(จะฟังกี่ครั้ง เสียงร้องนั่นก็ยังทรงพลังไม่เปลี่ยนเลยนะ...)"
