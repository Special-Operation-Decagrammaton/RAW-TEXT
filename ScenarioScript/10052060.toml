[translation]
10052060-1 = "Kether, the Most Radiant Supreme Crown"
10052060-2 = "We have entered Kether's area of influence."
10052060-3 = "I still do not understand what this means, but it is said that the Sephira's symbolic number is \"1.\""
10052060-4 = "Wow... That is amazing, Toki! I did not know that!"
10052060-5 = "Sweet Aris, I obtained this information from reading the prophet's reference material."
10052060-6 = "You are so meticulous, Toki! I think that alone is amazing!"
10052060-7 = "Thank you, Aris. Approach, and I will distribute appreciative head pats. Fear not. My safeties are activated."
10052060-8 = "Sure!"
10052060-15 = "Thinking about it, it IS the first prophet..."
10052060-16 = "...Even though we met Kether much later."
10052060-17 = "Sensei, do you remember? We first met Kether in the Ruined Submerged District. "
10052060-18 = "[s] \"We played tag.\""
10052060-19 = "Yes. Unfortunately, we were \"it.\" "
10052060-20 = "[s] \"And it was one of the rare moments where you were in the field."
10052060-21 = "I heard the story as well. I was told that Himari's eyes sparkled with excitement. She was so eager to see Decagrammaton in person."
10052060-22 = "Yeah. I think I heard something like that too."
10052060-23 = "...Who is spreading such malicious slander? Ugh. It was Rio, wasn't it?"
10052060-24 = "It was Eimi."
10052060-25 = "I see... Seriously, Eimi. You must practice seeing things more objectively."
10052060-26 = "That's not true. You acted that way, President."
10052060-27 = "E-Eimi?!"
10052060-28 = "(I see...)"
10052060-29 = "Oh, Himari! I also feel that way on the first night a game releases!"
10052060-30 = "I-Is that so? Ahem. Anyway, I was definitely not excited, or thrilled, or uncomposed."
10052060-31 = "But, as someone who enjoys a good \"phenomenon,\" I felt I should witness Decagrammaton with my own eyes."
10052060-32 = "...Ultimately, as one thing ended, another possibility began... "
10052060-33 = "...And that is how we ended up here."
10052060-34 = "It pains me that I failed to anticipate and prepare for such an outcome."
10052060-35 = "...? President Himari. Did you acquire prophetic powers without my knowledge?"
10052060-36 = "Surely not. Of course, one of the reasons why I study the occult is to investigate precognition."
10052060-37 = "But I haven't uncovered a definite answer regarding that field yet..."
10052060-38 = "If that is so, then why are you trying to take responsibility for a result you couldn't feasibly anticipate?"
10052060-39 = "...!"
10052060-40 = "(Nicely said, Toki.)"
10052060-41 = "Good one, Toki."
10052060-46 = "Um, I'm glad that everything is sorted and all, but..."
10052060-47 = "Do we have to...DROP?!"
10052060-48 = "Yes. That is the most logical choice."
10052060-49 = "Indeed. It is basic strategy."
10052060-50 = "Kether's crossfire is too strong for us to attempt a ground approach, after all."
10052060-51 = "You are already familiar with the drop system. Your safety is not in jeopardy."
10052060-52 = "After all, this isn't even your first descent operation, is it?"
10052060-53 = "It's not like a theme park ride! It's scary!"
10052060-54 = "It's rare to see you talk so spiritedly. This must indicate that you are genuinely scared, Yuzu."
10052060-55 = "But weren't the drop pods designed with the Game Development Department's input?"
10052060-56 = "BUT NOT FOR ME! I WAS NEVER SUPPOSED TO RIDE ONE!"
10052060-57 = "Everyone, it's time to descend. Get in the pod, Yuzu."
10052060-58 = "Eek?!"
10052060-59 = "Yuzu, are you all right?"
10052060-60 = "No, no, we don't have to—"
10052060-61 = "Descent team to the drop pods. Repeating. Descent team to the drop pods."
10052060-62 = "Drop pods ready to deploy. GET IN THE POD, YUZU."
10052060-69 = "Let us proceed."
10052060-70 = "Leave the frontline to me."
10052060-72 = "President Himari, Momoi. Please provide backup. Exercise appropriate judgment."
10052060-73 = "Eeeeeeeeek...!"
10052060-75 = "Dropping!"
10052060-77 = "Okay... So I just have to push this lever, right? Or is it more of a pull?"
10052060-78 = "Sis... I'm begging you, please take this seriously."
10052060-79 = "I'm being super serious right now!"
10052060-86 = "Kyaaaaaaaaah!!!"
10052060-87 = "(No matter how many times I hear it, that's a truly terrifying scream...)"
