10052060-15 = "3;히마리 결전 비무장;99;생각해 보면 케테르는 첫 번째 예언자라고 해야겠지만……\n#3;sig\n#3;a"
10052060-16 = "3;히마리 결전 비무장;01;우리가 케테르를 만났던 건, 생각해 보면 꽤 나중이었죠.\n#3;sig"
10052060-17 = "3;히마리 결전 비무장;02;기억나세요, 선생님? 폐허수몰지구에서 우리는, 케테르를 처음으로 만났죠. \n#3;sig"
