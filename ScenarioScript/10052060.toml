10052060-19 = "3;히마리 결전 비무장;06;네. 단지 저희 쪽이 술래였을 뿐이었지만요. \n#3;sig\n#3;em;[한숨]"
10052060-20 = "[s] \"드물게도, 히마리까지 현장에 나왔었고.\""
10052060-21 = "4;케이 프로토;01\n2;토키 결전;02;저도 이야기는 들었습니다. 데카그라마톤을 직접 눈으로 보고 싶어서, 어린아이처럼 눈을 반짝이며 흥분하셨다고.\n#4;sig\n#3;hide"
10052060-22 = "4;케이 프로토;01;그러게요. 저도 그 비슷한 말을 들은 것 같네요.\n#4;sig\n#4;em;[반응]"
10052060-23 = "3;히마리 결전 비무장;05;……둘 다, 누구에게서 그런 악의적인 음해로 넘쳐나는 헛소문을 들은 건가요? 역시 리오인가요?\n#3;sig\n#3;em;[?]\n#4;hide\n#2;hide"
10052060-24 = "1;토키 결전;99;에이미에게서였습니다.\n#1;ar\n#3;m5"
10052060-25 = "3;히마리 결전 비무장;06;그렇군요……. 에이미도 참. 가끔 사물과 현상을 직관적으로 바라보지 못할 때가 있단 말이죠.\n#3;sig"
10052060-26 = "3;에이미 결전;04;아닌데? 그때 부장은 분명 그랬어.\n#3;em;[한숨]\n#3;closeup\n#1;hide"
10052060-27 = "3;히마리 결전 비무장;02;에, 에이미?!\n#3;sig\n#3;em;[?!]\n#3;closeup"
10052060-28 = "3;리오 결전;99;(그랬구나…….)"
10052060-29 = "3;아리스 결전;07;괜찮습니다, 히마리 선배! 아리스도 새로운 게임이 발매되기 하루 전에는 그런 기분이 들고는 하니까요!\n#3;em;[재잘]"
10052060-30 = "3;히마리 결전 비무장;04;그, 그런가요? 크흠. 어쨌든 그때의 저는, 절대 흥분하거나 신을 내지는 않았지만.\n#3;sig\n#3;em;[땀]\n#1;hide\n#5;hide"
10052060-31 = "3;히마리 결전 비무장;01;데카그라마톤이라는 하나의 '현상'을 제 눈으로 확인하면, 모든 것이 끝날 것이라고 기대하기는 했어요.\n#3;sig"
10052060-32 = "3;히마리 결전 비무장;01;……그리고 어떤 의미로는 한 가지가 끝났지만, 또 다른 가능성이 시작되고 말았고…… \n#3;sig"
10052060-33 = "3;히마리 결전 비무장;02;그게 결국에는 이런 상황에 이르고야 말았다는 것.\n#3;sig"
10052060-34 = "3;히마리 결전 비무장;06;그리고 그런 결과를 예상하고 대비하지 못했다는 것이, 저로서는 뼈아픈 부분이긴 하네요.\n#3;sig\n#3;em;[속상함]"
10052060-35 = "1;토키 결전;02;? 히마리 부장. 제가 모르는 사이에 예언 능력이라도 얻으셨습니까?\n#1;ar\n#1;em;[?]\n#3;m5"
10052060-36 = "3;히마리 결전 비무장;02;설마요. 물론 제가 오컬트를 연구하는 이유 중 하나가 미래에 대한 예지의 목격이긴 하지만.\n#3;sig"
10052060-37 = "3;히마리 결전 비무장;07;아직까지 그 영역에 대한 확실한 답은 얻지 못한 상황이기도 하니까요…….\n#3;sig"
10052060-38 = "1;토키 결전;01;그렇다면 어째서 예측하지 못한 결과에 대해 구태여 책임을 지려 하시는 건가요?"
