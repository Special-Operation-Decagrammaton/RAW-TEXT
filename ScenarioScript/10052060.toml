[translation]
10052060-1 = "凱瑟：最耀眼奪目的至高王冠"
10052060-2 = "已進入凱瑟的區域。"
10052060-3 = "雖然不太清楚確切的意思，不過聽說這個質點的象徵數字是1。"
10052060-4 = "哦哦……好厲害，季！#n愛麗絲連那個都不知道呢！"
10052060-5 = "我只是讀了各個預言者的標記情報而已，可愛的愛麗絲。"
10052060-6 = "季很細心呢！光是那樣就很厲害了！"
10052060-7 = "謝謝你，愛麗絲。#n過來這邊的話，我幫你摸摸頭。"
10052060-8 = "嗯！"
10052060-15 = "現在想想，雖然凱瑟應該算是第1名預言者……"
10052060-16 = "不過我們遇到凱瑟，已經是相當後面的事了。"
10052060-17 = "您還記得嗎，老師？#n我們是在廢墟淹沒地區第一次遇見凱瑟的。"
10052060-18 = "[s] 「當時還玩了捉迷藏呢。」"
10052060-19 = "是的。只是我們是當鬼的那一方而已。"
10052060-20 = "[s] 「而且陽葵還難得親自跑到現場來。」"
10052060-21 = "那件事我也聽說過。#n似乎是為了親眼見到十字神名，像小孩子一樣雙眼發光地興奮著。"
10052060-22 = "是啊，我也曾聽過類似的說法。"
10052060-23 = "……你們兩個，到底是從哪裡聽到那種充滿惡意中傷的謠言的？果然是莉央嗎？"
10052060-24 = "是從英美那裡聽到的。"
10052060-25 = "這樣啊……英美也真是的，有時就會無法看清事物和現象的本質呢。"
10052060-26 = "沒有啊？當時的部長確實是那樣的。"
10052060-27 = "英，英美！？"
10052060-28 = "（原來如此……）"
10052060-29 = "沒關係的，陽葵前輩！愛麗絲在新遊戲發售的前一天也會有那種心情！"
10052060-30 = "是，是嗎？咳哼。#n總之那時的我，絕對沒有感到興奮或激動。"
10052060-31 = "只是期待親眼在確認十字神名這個「現象」之後，一切就能結束而已。"
10052060-32 = "某方面確實結束了一件事情，卻也開啟了另一個可能性……"
10052060-33 = "最終演變成了這種情況。"
10052060-34 = "沒能預測並防範這樣的結果，對我來說是個痛心疾首的失誤呢。"
10052060-35 = "陽葵部長，難道您在我不知道的時候獲得了預言能力嗎？"
10052060-36 = "怎麼可能。#n雖然我研究神秘學的理由之一，的確是希望能窺見關於未來的預知……"
10052060-37 = "然而對於那個領域，我還沒有得到確切的答案。"
10052060-38 = "既然如此，您為何要特意為無法預測的結果承擔責任呢？"
10052060-39 = "……！"
10052060-40 = "（Nice shot，季）"
10052060-41 = "Nice shot，季。"
10052060-46 = "那個，雖然大家說的都很好……"
10052060-47 = "不過又要空降了嗎！？"
10052060-48 = "沒錯，因為那是最合理的選擇。"
10052060-49 = "是的。因為那是最具戰略性的方案。"
10052060-50 = "凱瑟的十字火網過於強大，從地面路線很難進入。"
10052060-51 = "不用擔心空降時的安全問題。"
10052060-52 = "而且你們不是已經執行過好幾次空降作戰了嗎？"
10052060-53 = "就算有坐過遊樂園裡垂直落下的遊樂設施，也不代表現在就不會怕啊！？"
10052060-54 = "柚子難得這麼積極地發言呢。#n這也代表他是真的很害怕吧。"
10052060-55 = "不過這個投放艙，應該有積極採納柚子和遊戲開發部的意見不是嗎？"
10052060-56 = "我根本沒想過自己會親自搭上去啊！？"
10052060-57 = "大家，空降時間到了。做好準備吧。"
10052060-58 = "噫噫！？！？"
10052060-59 = "你還好嗎，柚子？"
10052060-60 = "果，果然這還是，還是……！"
10052060-61 = "請空降隊伍進入投放艙。#n再重複一次，請空降隊伍進入投放艙。"
10052060-62 = "投放艙，彈射準備完成。"
10052060-69 = "那麼，出發吧。"
10052060-70 = "前鋒交給我。"
10052060-72 = "陽葵部長、桃井。#n後續行動請根據情況自行判斷。"
10052060-73 = "噫噫噫噫……！"
10052060-75 = "開始空降！"
10052060-77 = "好……只要推這個操縱桿就行了吧？"
10052060-78 = "姐姐……拜託你謹慎一點。"
10052060-79 = "我超謹慎的好不好！"
10052060-86 = "呀啊啊啊啊啊啊啊啊啊──！！！"
10052060-87 = "（不管聽幾次都是很驚人的尖叫呢……）"
