10052060-1 = "#title;케테르. 가장 찬란하게 빛나는 지고의 왕관"
10052060-2 = "3;토키 결전;01;케테르의 구역으로 진입했습니다.\n#3;a\n#3;em;[반응]"
10052060-3 = "3;토키 결전;02;아직도 정확한 의미는 모르겠습니다만, 세피라의 상징 숫자는 1이라고 하는군요."
10052060-4 = "5;아리스 결전;17;오오…… 대단합니다, 토키! 아리스는 그것조차 모르고 있었습니다!\n#5;al\n#5;em;[반짝]\n#3;m1"
10052060-5 = "3;토키 결전;99;각 예언자의 표기 정보를 읽었을 뿐입니다. 귀여운 아리스."
10052060-6 = "5;아리스 결전;03;토키는 꼼꼼하네요! 그것만으로도 충분히 대단하다고 생각합니다!\n#5;em;[!]"
10052060-7 = "5;아리스 결전;03\n3;토키 결전;01;감사합니다. 아리스. 이리 가까이 오면 쓰다듬어 드릴게요."
