[translation]
10051050-1 = "Episode 5;A Ninja's Other Side"
10051050-2 = "Fashion Show Venue Sculpture Garden"
10051050-3 = "No... The show is over...! Ruined!"
10051050-4 = "Well... We got your dress back. I think it looks okay."
10051050-5 = "Yes, you did. And I truly..."
10051050-7 = "...have no gratitude for your efforts!"
