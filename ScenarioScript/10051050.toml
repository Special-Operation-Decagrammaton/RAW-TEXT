10051050-29 = "Um, please clear the way, Mr. Shinecat. She won't be able to perform anytime soon."
10051050-30 = "What?!"
10051050-31 = "It's a concussion. See, she's got scorch marks at the back of her head and lower jaw. My diagnosis: a direct grenade hit."
10051050-32 = "Even if we administered adrenaline and smelling salts to wake her up, it would take several hours for her to move properly."
10051050-33 = "By the heavens...!"
10051050-37 = "You're saying that even if we woke her, she couldn't walk for me? For US?"
10051050-38 = "Sir, do you want the patient to perform in a runway show?"
10051050-39 = "Well, can she walk or not? Be direct."
10051050-40 = "...She'll tremble. A lot. And I don't recommend pushing her, literally or figuratively."
10051050-41 = "After a blow like this, her foremost priority must be rest and recovery. It's for the sake of her health."
10051050-42 = "*sigh* I understand..."
10051050-43 = "You're the professionals. Take care of her. She's still under contract, after all."
10051050-44 = "We will. Now, let's get her to the hospital."
10051050-48 = "But... What of my dress? My show?! Ah..."
10051050-49 = "...Well, I guess I have no choice."
10051050-50 = "You three."
10051050-51 = "Yes?!"
10051050-52 = "Hmph, for starters, I apologize for my reaction. You did good work in recovering my dress."
10051050-53 = "...Of course, your work would've been even better if you took a few marksmanship classes. Consider them."
10051050-54 = "Then, goodbye."
10051050-59 = "Fashion Show Green Room"
10051050-60 = "*sigh*"
10051050-61 = "*siiiiiiiiiigh*"
