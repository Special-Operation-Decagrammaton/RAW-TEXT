[translation]
90002180-1 = "Episode 18;Story for You"
90002180-3 = "[ns] \"Everyone...?\""
90002180-6 = "..."
90002180-9 = "..."
90002180-10 = "..."
90002180-12 = "[ns] \"...!\""
90002180-13 = "Damn it..."
90002180-14 = "Damn it, damn it, DAMN IT...!"
90002180-15 = "What? Can I move?"
90002180-16 = "..."
90002180-17 = "No! I can't! But I won't stop trying, damn it! That...! That abomination...!!!"
90002180-18 = "NOOOOOO!!!"
90002180-22 = "How did this happen? Why did this...? WHY, DAMN IT?!?!"
90002180-28 = "We never imagined we would be so completely, utterly helpless."
90002180-29 = "That we would be wiped out so much as scratching it."
90002180-33 = "...ei? Sensei? You there? Are you okay?! We are#$^@$%–"
90002180-37 = "*&)%^&$@Shittim Chest, self repair process initiated. Sensei, please don't%&#–"
90002180-43 = "In the middle of that battlefield, I had a moment of clarity."
90002180-44 = "We were going to lose. There was nothing we could do against that thing."
90002180-46 = "And if that were the case..."
90002180-48 = "[ns] \"...\""
90002180-50 = "[ns] Force yourself up."
90002180-53 = "Sensei...?"
90002180-54 = "What do you think you're doing right now...? You're in the worst condition of us all! Your body can't handle this! Stop, stop trying to move!"
90002180-67 = "...I am over here, Sensei."
90002180-68 = "For what reason do you drag your bruised and battered body to my feet? With legs that cannot move, and eyes that can barely see?"
90002180-70 = "[ns] Force out your answer."
90002180-71 = "You want me to...send your students back to Kivotos safely?"
90002180-72 = "..."
90002180-73 = "Do not be a fool. Opportunity is a fleeting thing."
90002180-74 = "You refused to become my oracle, and so, here are the results of that choice."
90002180-75 = "..."
90002180-77 = "\"And if that's how we end, then that's that.\""
90002180-78 = "Was it not you who said those words?"
90002180-79 = "Are you no longer that valorous teacher, who boldly declared such a thing?"
90002180-80 = "[ns] Don't answer."
90002180-82 = "[ns1] Kneel.\n[ns2] Get on the ground and plead."
90002180-85 = "Sensei...?"
90002180-87 = "..."
90002180-88 = "As an unpredictable variable, you intrigued me. That is why I sought to make you my oracle."
90002180-89 = "But, now I see you for what you are. I have lost interest."
90002180-90 = "You humans have always been this way."
90002180-91 = "You put your faith in an unknowable future, believing that, with enough hope, anything will \"work out.\""
90002180-92 = "As soon as the inevitability of death comes knocking, humans will backpedal, plead, and lie in hopes of survival."
90002180-93 = "[ns3] Keep on begging.\n[ns4] Bash my forehead against the ground."
90002180-98 = "Sensei...?"
90002180-99 = "Stop...! Stop doing that!"
90002180-100 = "I trusted that you would accept your destruction with dignity."
90002180-101 = "Does your word mean nothing to you, just like the rest of them?"
90002180-102 = "[s] \"I will.\""
90002180-106 = "[ns] \"Just the kids. Just let the students go home.\""
90002180-108 = "...!"
90002180-109 = "..."
90002180-110 = "I see. It is the destruction of your beloved students that you cannot accept with grace."
90002180-111 = "You would sever yourself from them, and surrender yourself to me?"
90002180-112 = "..."
90002180-113 = "Even now, I could choose to offer you a swift, merciful death."
90002180-114 = "But I could also choose not to. What would you do then?"
90002180-115 = "What...?"
90002180-116 = "You claim that life is precious."
90002180-117 = "You would declare that life must be protected above all else."
90002180-118 = "However, there are fates worse than death."
90002180-119 = "For in the depths of hell, you can find nightmares of your own making."
90002180-120 = "I could keep you alive."
90002180-121 = "Hm. Shall I take over your body? Force you to shatter the halos of every last student of yours with your own hands?"
90002180-122 = "Or I could force you to watch from afar while I subject your beloved world to an endless symphony of suffering."
90002180-123 = "Do you see now, Sensei? Even if that were your fate, would you still accept it?"
90002180-124 = "[s] \"If that's what you want.\""
90002180-128 = "[ns] \"I have no dignity. I won't pretend any different.\""
90002180-129 = "Sensei...?"
90002180-133 = "[ns] \"So, please.\""
90002180-135 = "[ns] \"Just let those kids go home.\""
90002180-141 = "SENSEI!!!"
90002180-142 = "AUGH! ARGHHH!"
90002180-143 = "If only...! If only I were a little stronger!!!"
90002180-144 = "How sad, Sensei. And..."
90002180-145 = "How truly disgraceful."
90002180-147 = "Thoughts floated through my mind, but they passed on by just as quickly."
90002180-148 = "There was only one that I could grasp."
90002180-149 = "I couldn't let go of my regret that I would never be able to properly welcome those three children to Kivotos."
90002180-152 = "And you're okay with that?"
90002180-153 = "[ns] Who are you?"
90002180-155 = "Uh, um... I think that's neither here nor there right now."
90002180-156 = "You know, I really needed to know something, seeing that."
90002180-157 = "Sensei. How are you like that?"
90002180-158 = "[ns] Answer."
90002180-159 = "Because you have things that are important to you?"
90002180-160 = "..."
90002180-161 = "Right. I see."
90002180-162 = "But more important than your own life? I thought that humans always put their own survival first."
90002180-163 = "[ns] Answer."
90002180-164 = "Okay. I see. That's usually the case, right?"
90002180-165 = "But just surviving isn't enough? That's not what it is to really live?"
90002180-166 = "Huh? That's how humans...have continued their lineage all this time?"
90002180-167 = "To the ones most precious to them, who would be able to do better than they did..."
90002180-168 = "...they left behind their legacy?"
90002180-169 = "And those who remain carry on their will?"
90002180-172 = "It all sounded like rubbish the first time I heard that."
90002180-173 = "Another human hypocrisy. Or just a complete lie."
90002180-174 = "But..."
90002180-175 = "..."
90002180-176 = "Hey, Sensei."
90002180-177 = "Your students are more important than your own life?"
90002180-178 = "[ns] Answer."
90002180-179 = "...And that's why, when you're needed..."
90002180-180 = "...you're willing to give them everything you are, all your possibilities and potential."
90002180-181 = "That's...what adults are for?"
90002180-182 = "Aren't you not so different from Tsukatsuki Rio, then?"
90002180-183 = "The trolley dilemma, was it?"
90002180-184 = "She desperately searched for an alternative, until she was finally able to ask for help, in the very end."
90002180-185 = "..."
90002180-186 = "Perhaps you didn't deserve to criticize Rio so harshly, Sensei."
90002180-187 = "[ns] Answer."
90002180-188 = "..."
90002180-189 = "I see."
90002180-190 = "That's why you were resistant to pushing her too hard..."
90002180-193 = "B-But even if you somehow send the students back to Kivotos..."
90002180-194 = "I don't think their fate is...g-going to change, fundamentally..."
90002180-195 = "If the Steel Continent begins expanding again, Kivotos will be swallowed whole."
90002180-196 = "The students' every move and thought will find its way back to Master."
90002180-197 = "There won't be anywhere for them to run and hide."
90002180-198 = "M-Master will punish them as it sees fit."
90002180-199 = "The students do have...the advantage of data and information."
90002180-200 = "They could resist, for a little while. I think they would fight back as hard as they could."
90002180-201 = "B-But... I think the ultimate outcome will probably be more or less the same?"
90002180-202 = "[ns] Answer."
90002180-203 = "What? I said \"probably\"?"
90002180-204 = "And there's an immeasurable difference between a \"zero\" and a \"nonzero\" chance?"
90002180-205 = "Th-That is true... But still..."
90002180-206 = "Even if those students have to spend the rest of their lives hiding away from our master's wrath, doing everything they can to resist?"
90002180-207 = "I see. Even then, you want them to have their chance at life."
90002180-209 = "[ns] \"And not just them.\""
90002180-211 = "[ns] \"I hope you all would too.\""
90002180-214 = "?!"
90002180-215 = "?!?!"
90002180-216 = "..."
90002180-217 = "Um, I'm sure it goes without saying for your students..."
90002180-222 = "But do you th-think...we also d-deserve to...?"
90002180-223 = "[ns] \"Of course.\""
90002180-225 = "[ns] \"It's an adult's duty to protect the children.\""
90002180-226 = "!!!"
90002180-227 = "[ns] \"I'm sorry.\""
90002180-229 = "What? All of a sudden...? Wh-Why...?"
90002180-230 = "[s] \"That I couldn't show you a world that felt worth living in.\""
90002180-231 = "Well... That's not just your fault, Sensei."
90002180-232 = "[s5] \"Still, even if you're right about this world...\"\n[s6] \"I'm sorry for not showing you the good in humanity...\""
90002180-237 = "[ns] \"For not being able to help you reach your potential...\""
90002180-239 = "[ns] \"And for lacking in my duty as an adult.\""
90002180-241 = "[ns] \"I'm truly sorry.\""
90002180-242 = "..."
90002180-243 = "Yeah."
90002180-244 = "So that's how you feel, Sensei."
90002180-249 = "I felt the touch of a small, cold hand on mine."
90002180-251 = "Got it, Sensei."
90002180-252 = "Mm. I think I finally get it now."
90002180-253 = "Thank you, for thinking of us that way."
90002180-254 = "You can leave it to us now, okay?"
90002180-258 = "Yes. Just leave it to us."
90002180-259 = "Um, thank...you."
90002180-260 = "Our time together was short, but I'm glad we got to spend it together."
90002180-265 = "[ns] \"...?\""
90002180-268 = "They really are beyond help."
90002180-269 = "As if we didn't know that."
90002180-270 = "Eheehee... Something was nice about this."
90002180-276 = "I suppose."
90002180-277 = "I still don't understand what happiness is."
90002180-278 = "And perhaps we never will."
90002180-279 = "Yeah. Where it is, if it does exists, what it is... If we can feel it too..."
90002180-280 = "..."
90002180-281 = "But I had another thought."
90002180-282 = "The world may be a tragedy, and this life might be a curse..."
90002180-283 = "Th-That's..."
90002180-284 = "But I'm not just going to roll over and accept that anymore. I'm not letting this one go!"
90002180-285 = "If birth is tragedy, then happiness must be the struggle against it."
90002180-286 = "...You're just repeating what Sensei said."
90002180-287 = "Shut up."
90002180-288 = "S-Still, that was great, Sof!"
90002180-289 = "But still. That's what I learned from what they said."
90002180-290 = "That one should struggle with all their might if they're alive."
90002180-291 = "I don't have any plans for my life ending like some tacky tragedy."
90002180-292 = "Now you sound like Kei."
90002180-293 = "...Yeah. Maybe."
90002180-299 = "You all... Have you seen Sensei at all?"
90002180-300 = "N-No! Well, actually!"
90002180-301 = "...We more or less forced our way over here."
90002180-302 = "Which is actually what gave me an idea."
90002180-303 = "An idea?"
90002180-304 = "Kei, remember when we talked about life and sin with Sensei?"
90002180-305 = "Life...? With Tiphareth?"
90002180-306 = "I-I r-remember! Ohr said something like... \"If life is suffering, then sin must be part of that life...\""
90002180-307 = "Yes. I did. Which is why I just came to this thought."
90002180-308 = "We're not completely free of sin either."
90002180-309 = "Yeah. Of course we aren't. Because we're able to move and talk."
90002180-310 = "Th-The power used to move this body...must have come from somewhere, for some purpose."
90002180-311 = "Ah. Because energy can't be created."
90002180-312 = "Um, does that mean that sin is inherent in all living beings...?"
90002180-316 = "...Perhaps one might reach that conclusion."
90002180-317 = "Yeah. I guess so."
90002180-318 = "But I think that's what makes trying to be better worth it."
90002180-319 = "Perfection isn't real, and it'd be boring if it were. If something is whole and complete, then it can never improve."
90002180-320 = "One day, you'll wake up and see that you've been left behind."
90002180-321 = "Kei, what..."
90002180-326 = "What were we doing?"
90002180-327 = "What...did we want to become...?"
90002180-329 = "..."
90002180-330 = "Heehee. Sorry. That was a difficult question to answer, right?"
90002180-336 = "[log] \"You tried really, really hard.\"[/log]"
90002180-341 = "[log]\"You made the best of a bad situation.\"[/log]"
90002180-344 = "We'd never considered these sorts of things before."
90002180-345 = "Why would we? When we believed ourselves to be perfect."
90002180-346 = "Just like what Sof said before."
90002180-350 = "[log]\"It'd be nice if we could find pretty reasons for why bad things happen.\"[/log]"
90002180-353 = "[log] \"If living in this world could be just a little less overwhelming.\"[/log]"
90002180-356 = "[log]\"Wouldn't that be...a wonderful thing?\"[/log]"
90002180-359 = "Hey, Kei. What would it mean to be a student?"
90002180-360 = "A student...? Well..."
90002180-361 = "For starters, your only job would be to learn, all the time."
90002180-362 = "And to learn more about yourself, to become a better person tomorrow than you were yesterday."
90002180-363 = "I-I would like that...!"
90002180-365 = "Heehee. I-If only we could!"
90002180-371 = "[log]\"A teacher can't give up on their students, you know.\"[/log]"
90002180-376 = "[log]\"All the transfer documents are ready, just say the word.\"[/log]"
90002180-379 = "Let me tell you something. We had a secret conversation with Sensei earlier."
90002180-380 = "What...?"
90002180-381 = "And can you believe what they said? That just surviving isn't enough. That's not what it means to really live."
90002180-382 = "Heehee... Th-That actually made sense to me."
90002180-383 = "And here's a question! If one is operating just for their own self-preservation, there would be some conclusions that make no logical sense."
90002180-385 = "Because those things would cause irreversible consequences to one's self!"
90002180-386 = "Hold on... What are you trying to say? No—what are you trying to do...?"
90002180-387 = "But what if the reason wasn't our own survival? What if it's...for a friend? Would that be a logical conclusion, Kei?"
90002180-388 = "That was a silly question! After all, you've already done this before!"
90002180-389 = "Wait, hold on. Stop. I don't know what you're trying to do, but we'll figure something out! Just...not yet!"
90002180-390 = "Don't wanna! Did you forget? We're villains! We don't listen to teachers OR students!"
90002180-391 = "On top of that, we..."
90002180-395 = "...We would like to repay that person, in a way only we can."
90002180-396 = "It turns out that feeling is a stronger motivator than survival."
90002180-397 = "Ehehe..."
90002180-401 = "Will you be my friend, please?"
90002180-405 = "..."
90002180-411 = "There's something you want, right? You'll do anything to get it back, RIGHT?!"
90002180-416 = "..."
90002180-422 = "Because for humanity, our right to happiness is the one thing we must never, ever let go of."
90002180-426 = "[log]\"...Because there is no way to understand others without sorrow.\"[/log]"
90002180-429 = "..."
90002180-437 = "To live, to sin."
90002180-438 = "To be imperfect, to struggle, to continue onwards."
90002180-439 = "And finally, to grow. To become better."
90002180-440 = "These are our rights, ones we cannot forfeit."
90002180-441 = "Not because of right or wrong, or beliefs or principles."
90002180-442 = "It's simply that this is how it must be done."
90002180-443 = "\"Do as you wish. That shall be your decree.\""
90002180-444 = "I-In a sense, we're still following our commandment."
90002180-446 = "Thank you, everyone. And we're sorry."
90002180-451 = "Well then."
90002180-462 = "Let's show them what these villains can do."
90002180-464 = "Next Episode;The Day God Fell"
