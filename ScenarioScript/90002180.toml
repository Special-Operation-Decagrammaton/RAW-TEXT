[translation]
90002180-1 = "第18話;為你而寫的故事"
90002180-3 = "[ns] 「大家……？」"
90002180-6 = "……"
90002180-9 = "……"
90002180-10 = "……"
90002180-12 = "[ns] 「……！」"
90002180-13 = "可，惡……"
90002180-14 = "可惡，可惡，可惡……！"
90002180-15 = "什麼？問我能不能動？"
90002180-16 = "……"
90002180-17 = "就算動不了也會動給你看！#n那傢伙……那傢伙竟然……！！！"
90002180-18 = "啊啊啊啊啊啊啊啊！！！！！"
90002180-22 = "到底……為什麼！為什麼！為什麼！！！！！"
90002180-28 = "（完全無能為力）"
90002180-29 = "（就連一根手指都無法撼動）"
90002180-33 = "……師？老師？你在嗎？沒事吧！？我們#$^@$%–"
90002180-37 = "*&)%^&$@希迪姆的箱子，自我修復流程啟動。請老師再撐一下$%&#–"
90002180-43 = "（心裡莫名能夠感受到）"
90002180-44 = "（那根本不是有辦法對付的存在）"
90002180-46 = "（既然如此──）"
90002180-48 = "[ns] 「……」"
90002180-50 = "[ns] 將力氣灌注到雙腿，設法站起身來"
90002180-53 = "老師……？"
90002180-54 = "你在做什麼……？#n不可以動！老師的狀況比我們更嚴重啊！"
90002180-67 = "……不是那邊，老師。我在這裡。"
90002180-68 = "拖著連走路都做不到、連前方都看不見的身體……打算做什麼？"
90002180-70 = "[ns] 開口回答"
90002180-71 = "要我把學生們安全送回奇普托斯？"
90002180-72 = "……"
90002180-73 = "汝也應該知道。凡事皆有其時。"
90002180-74 = "汝拒絕成為我的預言者。#n因此，這也是汝與我所選擇的結果。"
90002180-75 = "……"
90002180-77 = "「如果那是我們的結局，也只能選擇接受」。"
90002180-78 = "汝曾說過的那句話，我至今依然記得。"
90002180-79 = "當時的汝和現在的汝，是不同的存在嗎？"
90002180-80 = "[ns] 不回答"
90002180-82 = "[ns1] 跪下\n[ns2] 俯身懇求"
90002180-85 = "老師……？"
90002180-87 = "……"
90002180-88 = "我之所以想立汝為我的預言者，是因為汝對我而言是最難以預測的變數。"
90002180-89 = "然而汝方才的行為，已經證明現在的汝不再是個變數。"
90002180-90 = "[ruby=生命體]你們[/ruby]總是這樣。"
90002180-91 = "盲目地認為一切終將好轉，將自身託付給不確定的未來。"
90002180-92 = "為了生存不惜推翻自己的言行，再以無可奈何為由將自己的行為合理化。"
90002180-93 = "[ns3] 再次懇求\n[ns4] 將額頭重重磕在地上"
90002180-98 = "老師……？"
90002180-99 = "不要……不要這樣……！"
90002180-100 = "當自己選擇的滅亡逼近之時，我本期望汝會坦然接受。"
90002180-101 = "因為那並非別人，而是汝自己所說的話。"
90002180-102 = "[s] 「我會這麼做的。」"
90002180-106 = "[ns] 「但是，請讓孩子們回家吧。」"
90002180-108 = "……！"
90002180-109 = "……"
90002180-110 = "是嗎。汝打算將自己與學生們分開。"
90002180-111 = "並且作為交換，汝願將自己完全交由我來處置。"
90002180-112 = "……"
90002180-113 = "我現在也能立即賜汝於死地。"
90002180-114 = "然而若我不願如此，汝又該如何應對？"
90002180-115 = "什麼……？"
90002180-116 = "生命是珍貴的，汝等如此說道。"
90002180-117 = "沒有什麼比生命更重要，汝等如此說道。"
90002180-118 = "然而我在此宣告，比死亡更痛苦的生存不勝其數。"
90002180-119 = "那也是此時此刻，汝等親手在現世所創造出的地獄。"
90002180-120 = "我可以強迫汝過著那樣的人生。"
90002180-121 = "只留下汝的意識，操控汝的一切，讓汝親手殺害自己的學生。"
90002180-122 = "只留下不會熄滅的生命，將其餘的一切推入無盡的痛苦之中。"
90002180-123 = "即便我如此決定，汝也會接受嗎──老師。"
90002180-124 = "[s] 「如果你希望如此，那就這麼做吧。」"
90002180-128 = "[ns] 「我是個醜陋的人。我不打算否認這個事實。」"
90002180-129 = "老師……？"
90002180-133 = "[ns] 「所以拜託你了。」"
90002180-135 = "[ns] 「至少讓孩子們回家吧。」"
90002180-141 = "老師！！！"
90002180-142 = "啊啊啊，嗚啊啊啊啊啊啊啊啊！！！"
90002180-143 = "要是……要是我能再強一點的話！！！！！"
90002180-144 = "真是可悲啊，老師。"
90002180-145 = "著實醜陋不堪。"
90002180-147 = "（許多想法在腦海中掠過，卻都沒能形成確切的畫面）"
90002180-148 = "（只是──）"
90002180-149 = "（還沒為孩子們做到任何事的事實，深深刺痛了胸口）"
90002180-152 = "那樣真的好嗎？"
90002180-153 = "[ns] 是誰？"
90002180-155 = "啊，唔嗯……其實我們是誰好像已經不重要了。"
90002180-156 = "只是……該怎麼說呢？覺得有點不可思議而已。"
90002180-157 = "可以告訴我嗎，老師？#n為什麼老師有辦法做到那種事呢？"
90002180-158 = "[ns] 回應"
90002180-159 = "因為有重要的事物，是嗎？"
90002180-160 = "……"
90002180-161 = "原來如此。"
90002180-162 = "可是一般來說，人們不是都會認為自己的生命最重要嗎？#n還是其實是我誤會了？"
90002180-163 = "[ns] 回應"
90002180-164 = "嗯，果然一般來說確實是那樣的吧？"
90002180-165 = "不過光是那樣還不夠？有些事情不是只要活著就夠了……？#n這又是什麼意思？"
90002180-166 = "嗯？是人類延續物種的方式……？"
90002180-167 = "將一切留給比自己更有可能性的人，以及自己認為比自己更重要的人……"
90002180-168 = "留下自己所擁有的一切，並將其傳承下去。"
90002180-169 = "已逝之人的意志，就由留下的人來繼承……？"
90002180-172 = "我一直不太能理解那種事。"
90002180-173 = "只覺得那不過是偽善或謊言之類的東西。"
90002180-174 = "可是……"
90002180-175 = "……"
90002180-176 = "老師。"
90002180-177 = "對老師來說，學生真的有那麼重要嗎？"
90002180-178 = "[ns] 回應"
90002180-179 = "……原來如此。#n如果有必要，就能將自己所擁有的一切……"
90002180-180 = "甚至自己所有的可能性都託付出去。"
90002180-181 = "所以，你認為那就是大人的存在意義嗎？"
90002180-182 = "可是話又說回來，這搞不好是和當時的調月莉央相同的選擇哦？"
90002180-183 = "說白了就是該如何決定鐵軌方向的問題。"
90002180-184 = "雖然莉央最後似乎改變了立場，決定盡可能嘗試其他方法並尋求協助就是了。"
90002180-185 = "……"
90002180-186 = "說不定老師你啊，其實也沒資格太責備莉央呢。"
90002180-187 = "[ns] 回應"
90002180-188 = "……"
90002180-189 = "這樣啊。"
90002180-190 = "所以那個時候，才不想把那孩子逼得太緊……"
90002180-193 = "可，可是就算老師想辦法，把學生們送回奇普托斯……"
90002180-194 = "我，我認為他們的命運……也無法產生根本上的改變……"
90002180-195 = "如果鋼鐵大陸再次開始擴張，奇普托斯成為了鋼鐵大陸的一部分……"
90002180-196 = "那些學生在哪裡，想要做什麼……都會被那位大人所掌握……"
90002180-197 = "不管逃到哪裡，躲到哪裡……最終都會被發現的……"
90002180-198 = "所以遲早，會受到那位大人認定的……合，合理的懲罰……"
90002180-199 = "當然那些學生……畢竟擁有在這裡獲得的情報……"
90002180-200 = "也許會組織反抗軍之類的組織，進行最大限度的抵抗……"
90002180-201 = "可，可是就算這樣，我覺得結果……應該也不會有太大的改變才對……"
90002180-202 = "[ns] 回應"
90002180-203 = "咦？但是依然會留下可能性？"
90002180-204 = "0與非0之間，存在著無法比擬的差距？"
90002180-205 = "這……確實是這樣沒錯，可是……"
90002180-206 = "就算那些學生往後的人生，都必須不斷逃避或反抗那位大人的震怒也是嗎？"
90002180-207 = "……這樣啊。#n即便如此，老師還是希望那些孩子能夠活下來呢……"
90002180-209 = "[ns] 「不只是那些孩子。」"
90002180-211 = "[ns] 「我希望你們也能活下來。」"
90002180-214 = "！？"
90002180-215 = "！？！？"
90002180-216 = "……"
90002180-217 = "如，如果是對學生的話，當然是這樣沒錯……"
90002180-222 = "你真的認為……我，我們也有那樣的價值嗎……？"
90002180-223 = "[ns] 「那當然。」"
90002180-225 = "[ns] 「大人的職責，就是保護孩子啊。」"
90002180-226 = "！！！"
90002180-227 = "[ns] 「對不起。」"
90002180-229 = "咦？為什麼……要突然道歉……？"
90002180-230 = "[s] 「我沒能讓你們見到──這個世界是個值得活下去的地方。」"
90002180-231 = "那也不完全……是老師一個人的錯吧。"
90002180-232 = "[s5] 「即便這個世界稱不上有多麼美好。」\n[s6] 「我也沒能讓你們看見其實也有好人存在。」"
90002180-237 = "[ns] 「沒能將像樣的可能性留給你們。」"
90002180-239 = "[ns] 「沒能成為一個好的大人──」"
90002180-241 = "[ns] 「真的，很對不起。」"
90002180-242 = "……"
90002180-243 = "這樣啊。"
90002180-244 = "原來你是這麼想的啊，老師。"
90002180-249 = "（感覺到了冰涼的觸感）"
90002180-251 = "我知道了，老師。"
90002180-252 = "嗯。清楚地知道了。"
90002180-253 = "真的很謝謝你願意這麼想。"
90002180-254 = "所以，接下來就交給我們吧。"
90002180-258 = "沒錯，就是這樣。"
90002180-259 = "那個……謝謝你。"
90002180-260 = "能夠短暫地和老師度過相同的時光……真的很開心。"
90002180-265 = "[ns]「……？」"
90002180-268 = "真是拿那個人沒辦法耶。"
90002180-269 = "他果然是個那樣的人啊。"
90002180-270 = "耶嘿嘿……總覺得很不錯呢……"
90002180-276 = "不過……"
90002180-277 = "我果然還是沒搞清楚「幸福」到底是什麼。"
90002180-278 = "或許我們永遠都無法理解吧。"
90002180-279 = "是啊。它究竟在哪裡、如果存在會是什麼樣子……還有我們能不能抓住它也是。"
90002180-280 = "……"
90002180-281 = "但是，我現在也有了這樣的想法。"
90002180-282 = "或許世界確實是場悲劇，誕生也可能是種詛咒──"
90002180-283 = "那，那是……"
90002180-284 = "可是從現在開始，我不打算再原諒那些了。"
90002180-285 = "如果誕生是悲劇的話，那麼幸福就是與之對抗的鬥爭。"
90002180-286 = "……什麼嘛，這不就只是在模仿老師說過的話嗎？"
90002180-287 = "你少囉嗦啦。"
90002180-288 = "不，不過，不愧是Soph呢！"
90002180-289 = "總之，我確實從那句話之中感受到了一些東西。"
90002180-290 = "只要還活著，就應該拚盡全力去抵抗。"
90002180-291 = "就算是我，也不打算讓自己的人生成為被悲劇塗滿的紀念品。"
90002180-292 = "那聽起來……有點類似Kei說過的話呢。"
90002180-293 = "……嗯，或許是吧。"
90002180-299 = "你們……從老師那裡聽到了什麼嗎……？"
90002180-300 = "不，不是！與其說是聽到的，那個……"
90002180-301 = "……應該說硬是問出來的比較貼切。"
90002180-302 = "所以，我現在突然產生了一個想法。"
90002180-303 = "想法……是嗎？"
90002180-304 = "你還記得嗎，Kei？#n我們之前和老師討論過有關生命與罪的話題。"
90002180-305 = "生命……？#n你是說提法瑞特那時候的事嗎？"
90002180-306 = "我，我還記得！Aur曾經說過……#n「如果說生命即是痛苦，那麼罪就是生命不可分割的一部分」……"
90002180-307 = "嗯，沒錯。#n所以我不禁覺得……"
90002180-308 = "我們或許也不是無罪的。"
90002180-309 = "嗯，那是不可能的。因為我們已經在行動了。"
90002180-310 = "驅，驅動這個身體所需的動力……也不是無緣無故就能憑空出現的……"
90002180-311 = "是啊，畢竟能量總不可能自己從地底下冒出來嘛……？"
90002180-312 = "所以這麼說來……難道活著的一切，都是有罪的嗎……？"
90002180-316 = "……或許，可以得出那樣的結論。"
90002180-317 = "嗯，應該是吧。"
90002180-318 = "不過也正因如此，才能努力變得更好不是嗎。"
90002180-319 = "打從一開始就完美的東西沒有意義。#n因為那同時也意味著無法變得更好或繼續前進。"
90002180-320 = "只能停在原地僵化不前，就這樣被留下。"
90002180-321 = "Kei，我們……"
90002180-326 = "我們，究竟在做什麼呢？"
90002180-327 = "究竟……想成為什麼呢……？"
90002180-329 = "……"
90002180-330 = "耶嘿嘿，對不起。#n這個問題很難回答對吧？"
90002180-336 = "[log]「你們已經很努力了。」[/log]"
90002180-341 = "[log]「在被賦予的條件之下，真的很努力了。」[/log]"
90002180-344 = "老實說，我們以前從來沒有想過那種事情。"
90002180-345 = "因為覺得沒有那個必要。#n以為我們自己……已經是完美的了。"
90002180-346 = "就像Soph之前說的一樣。"
90002180-350 = "[log]「如果所有事情都能有令人信服的理由，那該有多好啊。」[/log]"
90002180-353 = "[log]「如果有一個活著不會那麼辛苦的世界……」[/log]"
90002180-356 = "[log]「那真的……該有多好啊。」[/log]"
90002180-359 = "我問你哦，Kei。#n成為學生是怎樣的一回事啊？"
90002180-360 = "學生……是嗎？#n那是……"
90002180-361 = "至少是需要不斷學習的立場吧？"
90002180-362 = "變得更好、變得不同……朝著與現在不同的自己，以及更好的目標前進……"
90002180-363 = "那，那樣果然，很帥氣呢……！"
90002180-365 = "耶嘿嘿。要，要是能做到就好了……"
90002180-371 = "[log]「身為老師可不能放棄任何一個學生啊。」[/log]"
90002180-376 = "[log]「你們的轉學資料我都準備好了，有興趣的話隨時聯絡我。」[/log]"
90002180-379 = "告訴你一個祕密！#n我們剛才跟老師說了一些只有我們知道的事情哦！"
90002180-380 = "嗯……？"
90002180-381 = "而且老師還說，只有活著是不夠的！"
90002180-382 = "耶嘿嘿……總覺得好像，有點明白那句話是什麼意思了。"
90002180-383 = "在這裡問一個問題！#n如果只考慮到自己的話，有些抉擇肯定是做不到的。"
90002180-385 = "因為有些事情……會帶來絕對無法挽回的結果！"
90002180-386 = "等等……你在說什麼？#n不對，你們想做什麼……？"
90002180-387 = "然而，如果是為了朋友呢？#nKei，你能做得到嗎？"
90002180-388 = "不，畢竟你已經實際做過，應該也不需要問了吧？"
90002180-389 = "不是，先等等好嗎。雖然不知道你們想做什麼但先停一下。#n現在還，還不行……！"
90002180-390 = "才不要咧～？#n誰叫我們本來就是不聽老師話的搗蛋鬼兼壞蛋呢！"
90002180-391 = "而且，我們其實……"
90002180-395 = "也有不少想還給那位大人的東西呢。"
90002180-396 = "是啊。「想要回敬」的這種心情，可是相當強烈的動機呢。"
90002180-397 = "耶嘿嘿……"
90002180-401 = "請和愛麗絲成為朋友吧。"
90002180-405 = "……"
90002180-411 = "如果有渴望的事物，而且是比任何東西都迫切的願望……！"
90002180-416 = "……"
90002180-422 = "[ruby=戰鬥]幸福[/ruby]才是我們絕對不能停止的，對我們來說最重要的事之一。"
90002180-426 = "[log]「沒有經歷[ruby=罪]悲傷[/ruby]就能理解他人的方法，根本不存在。」[/log]"
90002180-429 = "……"
90002180-437 = "活著、犯罪。"
90002180-438 = "變得不完美、鬥爭、前進。"
90002180-439 = "然後最終，成為更好的自己。"
90002180-440 = "絕對無法放棄的那些事物。"
90002180-441 = "不是因為正確才這麼做。"
90002180-442 = "而是因為除此之外沒有別的選擇。"
90002180-443 = "「行汝意志，即為全法」"
90002180-444 = "我，我們在某種意義上，是在遵循我們自己的律法。"
90002180-446 = "大家，謝謝你們……還有，對不起。"
90002180-451 = "那麼──"
90002180-462 = "去做個真正的壞蛋吧。"
90002180-464 = "下一話;讓神墜落之日"
