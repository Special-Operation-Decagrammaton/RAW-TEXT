[translation]
90002180-1 = "ตอนที่ 18;เรื่องราวสำหรับเธอ"
90002180-3 = "[ns] \"ทุกคน...?\""
90002180-6 = "..."
90002180-9 = "..."
90002180-10 = "..."
90002180-12 = "[ns] \"...!\""
90002180-13 = "โธ่เอ้ย..."
90002180-14 = "โธ่เอ้ย... โธ่เอ้ย โธ่เอ้ย...!"
90002180-15 = "คะ? ฉันขยับได้หรือเปล่าน่ะเหรอคะ?"
90002180-16 = "..."
90002180-17 = "ขยับไม่ได้ แต่จะลองขยับดูค่ะ! เจ้าชั่วนั่น... ไอ้เจ้าบ้านั่นน่ะ...!!!"
90002180-18 = "อ๊าาา!!!!"
90002180-22 = "ทำไมล่ะ... ทำไมกัน! ทำไม! ทำไม!!!!!"
90002180-28 = "(หมดหนทางแล้ว)"
90002180-29 = "(แม้แต่ปลายนิ้วก็ขยับหรือทำอะไรไม่ได้เลย)"
90002180-33 = "...ครู? คุณครู? อยู่ตรงนั้นหรือเปล่าคะ? เป็นยังไงบ้างคะ?! พวกหนู#$^@$%–"
90002180-37 = "*&)%^&$@กล่องแห่งซิสดิม เริ่มกระบวนการซ่อมแซมตัวเอง คุณครูคะ $%&#–อีกนิดเดียว"
90002180-43 = "(คุณครูรู้สึกได้ด้วยเหตุผลบางอย่าง)"
90002180-44 = "(ว่านั่นไม่ใช่สิ่งที่จะต่อกรด้วยได้เลย)"
90002180-46 = "(ถ้าเป็นอย่างนั้น)"
90002180-48 = "[ns] \"...\""
90002180-50 = "[ns] ออกแรงที่ขาแล้วพยายามลุกขึ้นยืนให้ได้"
90002180-53 = "คุณครู...?"
90002180-54 = "จะทำอะไรคะ...? อย่าเพิ่งขยับตัวสิคะ ตอนนี้สภาพของคุณครูหนักกว่าพวกเราอีกนะคะ!"
90002180-67 = "ไม่ใช่ทางนั้นหรอก... ครูเอ๋ย ข้าอยู่ตรงนี้"
90002180-68 = "จะเดินก็ยังไม่ไหว จะมองไปข้างหน้าก็ไม่เห็น เจ้าคิดจะทำอะไรในสภาพร่างกายนี้หรือ"
90002180-70 = "[ns] เอ่ยปากตอบ"
90002180-71 = "ขอให้ข้าช่วยส่งนักเรียนทั้งหมดไปยังคิโวทอสอย่างปลอดภัยงั้นหรือ?"
90002180-72 = "..."
90002180-73 = "เจ้าเองก็น่าจะรู้ว่าทุกอย่างมีเวลาของมัน"
90002180-74 = "เจ้าปฏิเสธที่จะเป็นผู้พยากรณ์ของข้า ในแง่หนึ่งแล้ว นี่ก็เป็นผลจากการตัดสินใจเลือกของเจ้า และข้าเช่นกัน"
90002180-75 = "..."
90002180-77 = "\"ถ้าการล่มสลายเป็นบทสรุปจากการเลือกของเรา ฉันจะยอมรับมัน\""
90002180-78 = "ข้ายังจำคำพูดนั้นของเจ้าได้"
90002180-79 = "ตัวเจ้าที่พูดคำคำนี้ในตอนนั้น กับตัวเจ้าในตอนนี้คือตัวตนเดียวกันหรือเปล่า?"
90002180-80 = "[ns] ไม่ตอบ"
90002180-82 = "[ns1] คุกเข่าลง\n[ns2] หมอบลงราวกับจะอ้อนวอน"
90002180-85 = "คุณครู...?"
90002180-87 = "..."
90002180-88 = "เหตุผลที่ข้าอยากแต่งตั้งเจ้าเป็นผู้พยากรณ์ของข้า ก็เพราะเจ้าเป็นตัวแปรที่คาดเดาไม่ได้มากที่สุด#nสำหรับข้า"
90002180-89 = "ครูเอ๋ย การกระทำของเจ้าในตอนนี้พิสูจน์แล้วว่าเจ้าในตอนนี้ไม่ใช่ตัวแปรใดสำหรับข้าอีกต่อไปแล้ว"
90002180-90 = "[ruby=สิ่งมีชีวิต]พวกเจ้า[/ruby]ก็เป็นแบบนี้มาตลอด"
90002180-91 = "คิดอย่างเลือนรางว่าทุกอย่างจะคลี่คลายได้ด้วยดีในที่สุด และฝากความหวังไว้กับอนาคตที่ไม่แน่นอน"
90002180-92 = "เปลี่ยนคำพูดและการกระทำของตัวเองได้จากหน้ามือเป็นหลังมือเพื่อความอยู่รอด และหาเหตุผลมาอ้างการกระทำนั้นว่าเป็นสิ่งที่หลีกเลี่ยงไม่ได้"
90002180-93 = "[ns3] วิงวอนอีกครั้ง\n[ns4] จรดหน้าผากกับพื้น"
90002180-98 = "คุณครู...?"
90002180-99 = "ไม่เอาค่ะ... อย่าทำแบบนั้นเลยค่ะ...!"
90002180-100 = "เมื่อการล่มสลายที่เจ้าเลือกมาปรากฏต่อหน้า ข้าก็หวังว่าเจ้าจะยอมรับสิ่งนั้นแต่โดยดี"
90002180-101 = "เพราะนั่นไม่ใช่คำพูดของใครอื่น แต่เป็นคำพูดของเจ้าเอง"
90002180-102 = "[s] \"ฉันจะทำแบบนั้น\""
90002180-106 = "[ns] \"แต่ขอให้เด็กๆ กลับบ้านอย่างปลอดภัยด้วย\""
90002180-108 = "...!"
90002180-109 = "..."
90002180-110 = "เช่นนั้นหรือ พยายามจะแยกนักเรียนออกจากตัวเองหรือ?"
90002180-111 = "หรือเจ้ากำลังบอกข้าว่า จะฝากการตัดสินของเจ้าทั้งหมดไว้กับข้าแต่เพียงผู้เดียว"
90002180-112 = "..."
90002180-113 = "ข้ามอบความตายที่เฉียบพลันให้เจ้าเลยตอนนี้ก็ยังได้"
90002180-114 = "แต่ถ้าข้าไม่ทำเช่นนั้น เจ้าจะทำเช่นไรเล่า"
90002180-115 = "ว่าไงนะ...?"
90002180-116 = "พวกเจ้าบอกว่าชีวิตเป็นสิ่งมีค่า"
90002180-117 = "พวกเจ้าบอกว่าไม่มีอะไรสำคัญไปกว่าชีวิต"
90002180-118 = "แต่ข้าขอบอกตรงนี้ว่ายังมีชีวิตอีกมากมายที่เลวร้ายกว่าความตาย"
90002180-119 = "นั่นคือด้านหนึ่งของนรกที่พวกเจ้ากำลังสร้างขึ้นมาด้วยพลังของพวกเจ้าเอง แม้กระทั่งในชั่วขณะนี้ก็ตาม"
90002180-120 = "ข้าบังคับให้พวกเจ้าใช้ชีวิตแบบนั้นได้"
90002180-121 = "ข้าจะเหลือไว้เพียงสติรับรู้ของเจ้า ข้าบงการทุกอย่างของเจ้าได้ และนั่นรวมถึงการทำให้เจ้าฆ่านักเรียนของเจ้าด้วยน้ำมือของเจ้าเอง"
90002180-122 = "ข้าจะรักษาชีวิตของเจ้าไว้ไม่ให้ตาย แต่จะโยนทุกอย่างในตัวเจ้าลงไปในความทรมานที่ไม่มีจุดจบ"
90002180-123 = "ต่อให้ข้ากำหนดให้เป็นเช่นนั้น แต่เจ้าก็จะยอมรับเส้นทางนั้นหรือ ครูเอ๋ย"
90002180-124 = "[s] \"ถ้าต้องการแบบนั้น ก็ทำไปเถอะ\""
90002180-128 = "[ns] \"ฉันคือมนุษย์ที่น่าเกลียด ฉันไม่คิดจะปฏิเสธความจริงนั้นหรอก\""
90002180-129 = "คุณครู...?"
90002180-133 = "[ns] \"เพราะงั้นก็ ได้โปรดเถอะ\""
90002180-135 = "[ns] \"อย่างน้อยก็ช่วยให้เด็กๆ ได้กลับบ้านเถอะ\""
90002180-141 = "คุณครู!!!"
90002180-142 = "อะ.... อ๊ากกกกก!!!"
90002180-143 = "ถ้าฉันแข็งแกร่งกว่านี้อีกหน่อยละก็!!!!!"
90002180-144 = "น่าเศร้านะ ครูเอ๋ย แล้วก็..."
90002180-145 = "เจ้ามันช่างน่าเกลียดจริงๆ"
90002180-147 = "(ความคิดมากมายผุดขึ้นในสมองคุณครู แต่ก็ไม่เห็นเป็นภาพที่ชัดเจน)"
90002180-148 = "(แต่ว่า)"
90002180-149 = "(สิ่งหนึ่งที่เสียดแทงจิตใจก็คือ ความจริงที่ว่าตัวเองยังไม่ได้ทำอะไรให้เด็กๆ อย่างจริงจัง)"
90002180-152 = "แบบนั้นจะไม่เป็นไรจริงเหรอ?"
90002180-153 = "[ns] ใครน่ะ?"
90002180-155 = "อะ... อืม.... พวกฉันจะเป็นใคร จากนี้มันไม่น่าจะสำคัญเท่าไรแล้วละ"
90002180-156 = "จะว่ายังไงดีนะ ฉันว่ามันน่าประหลาดใจเลยละ"
90002180-157 = "คุณครู คุณครูทำแบบนั้นได้ยังไงกัน?"
90002180-158 = "[ns] ตอบกลับ"
90002180-159 = "เพราะว่า 'มีสิ่งที่มีค่า' งั้นเหรอ?"
90002180-160 = "..."
90002180-161 = "อื้อ อย่างนั้นสินะ"
90002180-162 = "แต่ปกติแล้วคนเราจะมองว่าชีวิตของตัวเองเป็นสิ่งที่มีค่าที่สุดไม่ใช่เหรอ? หรือว่าที่ฉันรู้มามันผิด?"
90002180-163 = "[ns] ตอบกลับ"
90002180-164 = "อื้อ อย่างนั้นสินะ โดยทั่วไปแล้วมันก็เป็นอย่างนั้นใช่มั้ยล่ะ?"
90002180-165 = "แต่แค่นั้นมันไม่ได้? เพราะลำพังแค่การมีชีวิตอยู่มันไม่เพียงพอสำหรับบางอย่างที่สำคัญกว่านั้น? หมายความว่ายังไงเหรอ?"
90002180-166 = "หืม? มนุษย์... คือสิ่งมีชีวิตที่สืบทอดเผ่าพันธุ์มาด้วยวิธีการแบบนั้น... งั้นเหรอ?"
90002180-167 = "คนที่มีความเป็นไปได้มากกว่าตัวเอง และคนที่ตัวเองคิดว่าสำคัญยิ่งกว่าชีวิตของตน..."
90002180-168 = "เราจะทิ้งและส่งต่อทุกอย่างที่มีให้กับคนเหล่านั้น"
90002180-169 = "ในขณะเดียวกัน ผู้คนที่เหลืออยู่ก็จะสืบทอดเจตนารมณ์ของผู้ที่ล่วงลับไป...?"
90002180-172 = "ฉันน่ะ คิดมาตลอดเลยค่ะว่าตัวเองไม่เข้าใจเรื่องนั้น"
90002180-173 = "ฉันคิดว่ามันก็แค่การเสแสร้งหรือไม่ก็การโกหกค่ะ"
90002180-174 = "แต่ว่า..."
90002180-175 = "..."
90002180-176 = "คุณครูคะ"
90002180-177 = "สำหรับคุณครูแล้ว นักเรียนพวกนั้นมีค่าถึงขนาดนั้นเลยเหรอคะ?"
90002180-178 = "[ns] ตอบกลับ"
90002180-179 = "อย่างนั้นสินะคะ... ถ้าต้องทำ ก็จะยอมมอบทุกอย่างที่มี..."
90002180-180 = "และถ้าจำเป็น ก็พร้อมสละทุกความเป็นไปได้ของตัวเองให้สินะคะ"
90002180-181 = "นั่นก็เพราะ \"การเป็นผู้ใหญ่ย่อมหมายถึงการทำอย่างนั้น\" งั้นเหรอคะ?"
90002180-182 = "แต่ว่า นี่อาจเป็นการเลือกที่เหมือนกับของสึคัตสึกิ ริโอะก็ได้นะคะ?"
90002180-183 = "ฉันหมายถึงสถานการณ์ที่ถามว่าจะตัดสินใจดึงคันโยกให้รถไฟไปทางไหนน่ะค่ะ"
90002180-184 = "ดูเหมือนตอนนี้ริโอะจะเปลี่ยนท่าทีแล้วค่ะ เธอบอกว่าจะมองหาวิธีอื่นและขอความช่วยเหลือจนถึงที่สุด#nน่ะค่ะ"
90002180-185 = "..."
90002180-186 = "ตอนนั้นคุณครูอาจไม่มีคุณสมบัติที่จะตำหนิริโอะจนเกินไปก็ได้นะคะ"
90002180-187 = "[ns] ตอบกลับ"
90002180-188 = "..."
90002180-189 = "อย่างนี้นี่เองสินะคะ"
90002180-190 = "จะบอกกันว่าเพราะอย่างนั้นในตอนนั้นก็เลยไม่อยากกดดันเด็กคนนั้นมากเกินไปงั้นเหรอคะ..."
90002180-193 = "ตะ... แต่การที่คุณครูบอกว่าไม่ว่ายังไงก็จะส่งนักเรียนกลับไปยังคิโวทอสให้ได้..."
90002180-194 = "ฉันไม่คิดว่าทำแบบนั้นแล้วโชคชะตาของนักเรียนเหล่านั้นจะเปลี่ยนไป... หรอกนะคะ..."
90002180-195 = "ถ้าดินแดนเหล็กกล้าเริ่มขยายอาณาเขตอีกครั้งจนคิโวทอสกลายเป็นส่วนหนึ่งของดินแดนเหล็กกล้า#nอีกละก็..."
90002180-196 = "ไม่ว่านักเรียนเหล่านั้น จะ... จะทำอะไรอยู่ที่ไหน หรือพยายามทำอะไรในอนาคต... สุดท้ายแล้วท่านผู้นั้นก็จะรู้ได้ค่ะ..."
90002180-197 = "ไม่ว่าจะหนีไปที่ไหน ไม่ว่าจะซ่อนตัวอยู่ที่ใด... สุดท้ายแล้ว... ก็ต้องถูกพบตัวอยู่ดีค่ะ..."
90002180-198 = "และในท้ายที่สุด นักเรียนเหล่านั้นก็จะ ดะ... ได้รับโทษตามที่ท่านผู้นั้นคิดว่าเหมาะสมค่ะ..."
90002180-199 = "แน่นอนว่านักเรียนเหล่านั้น... มีข้อมูลทั้งหมดเกี่ยวกับสิ่งที่เกิดขึ้นที่นี่..."
90002180-200 = "และอาจจัดตั้งกลุ่มอะไรขึ้นมาเพื่อต่อต้านอย่างสุดความสามารถก็ได้..."
90002180-201 = "ตะ... แต่ถึงอย่างนั้น ฉันก็คิดว่า... ผลลัพธ์คงไม่เปลี่ยนแปลงมากนักค่ะ..."
90002180-202 = "[ns] ตอบกลับ"
90002180-203 = "คะ? แต่ยังไงก็ยังมีโอกาสเหลืองั้นเหรอคะ?"
90002180-204 = "ระหว่างศูนย์กับค่าอื่นที่ไม่ใช่ศูนย์ ยังมีความแตกต่างที่ไม่อาจเทียบกันได้งั้นเหรอคะ?"
90002180-205 = "มันก็... จริงอยู่หรอกค่ะ... แต่ถึงยังไง..."
90002180-206 = "ต่อให้นักเรียนเหล่านั้นต้องใช้ชีวิตที่เหลืออยู่โดยการหลีกเลี่ยงหรือต่อต้านความโกรธของท่านผู้นั้น#nอยู่ตลอดเวลาก็ตามทีเหรอคะ?"
90002180-207 = "อย่างนั้น... สินะคะ หมายความว่าคุณครูยังต้องการให้เด็กเหล่านั้นมีชีวิตอยู่ต่อไปสินะคะ..."
90002180-209 = "[ns] \"ไม่เฉพาะเด็กๆ เหล่านั้นหรอก\""
90002180-211 = "[ns] \"กับพวกเธอเองก็เหมือนกันนะ\""
90002180-214 = "?!"
90002180-215 = "!?!?"
90002180-216 = "..."
90002180-217 = "เอ่อ ถ้าเป็นนักเรียนน่ะแน่นอนอยู่แล้ว..."
90002180-222 = "แต่ว่าคุณครูก็คิดว่าพวกฉันก็คู่ควร... กับสิ่งนั้นด้วยเหรอคะ...?"
90002180-223 = "[ns] \"แน่นอนอยู่แล้ว\""
90002180-225 = "[ns] \"หน้าที่ของผู้ใหญ่คือการปกป้องเด็กๆ นะ\""
90002180-226 = "!!!"
90002180-227 = "[ns] \"ขอโทษด้วยนะ\""
90002180-229 = "คะ? ทำไมจู่ๆ ถึง...? ทะ... ทำไมล่ะคะ...?"
90002180-230 = "[s] \"ขอโทษที่ทำให้เห็นไม่ได้ว่าโลกใบนี้เป็นที่ที่น่าอยู่\""
90002180-231 = "แต่ว่าเรื่องนั้น... มันไม่ใช่ความผิดของคุณครูคนเดียวสักหน่อย"
