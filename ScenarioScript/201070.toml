[translation]
201070-1 = "第7話;ペアリング"
201070-2 = "連邦生徒会の建物の入口"
201070-5 = "（連邦生徒会での仕事を終えてシャーレへ戻ろうとしたとき……）"
201070-10 = "……先生。"
201070-11 = "少しよろしいですか？"
201070-12 = "[s1] \"プラナ？\"\n[s2] \"プラナから話しかけてくれるのは久しぶりだね。\""
201070-15 = "はい、[USERNAME]先生にお伝えしたいことがあります。"
201070-24 = "先生は「あの女」についてどう思いますか？"
201070-25 = "[s] \"帰ってきた連邦生徒会長のこと？\""
201070-27 = "[ns] \"うーん……悪い子には見えないけど……。\""
201070-28 = "否定。あの女は信用できません。"
201070-29 = "彼女は連邦生徒会長を詐称する偽物。"
201070-30 = "その正体も意図も不明です。可能な限り疑って、距離を置くことをおすすめします。"
201070-31 = "[s3] \"プラナもあの子が偽物だと思ってるんだね。\"\n[s4] \"私の記憶が間違ってる可能性はないの？\""
201070-34 = "否定。先生の記憶は間違っていません。"
201070-35 = "なぜなら本当の連邦生徒会長は――"
201070-39 = "プラナちゃん！？#nもしかして本物の連邦生徒会長の居場所が分かったんですか！？"
201070-40 = "シッテムの箱のOSであるスーパーアロナちゃんにも見つけられてないのに！#nど、どうやって！？"
201070-41 = "いえ、こうしている場合じゃありません！#n早く本物の連邦生徒会長のところに――！"
201070-46 = "…………。"
201070-47 = "否定。私も行方を知っているわけではありません。"
201070-48 = "ですが、「あの女」が偽物であることだけは確かです。"
201070-49 = "彼女は――「シッテムの箱」のOSである私たちを認識できていないのですから。"
201070-50 = "「シッテムの箱」はただのオーパーツでなく、キヴォトスの本質に関わるもの。"
201070-51 = "これは私がいた世界でも同じでした。#n連邦生徒会長であれば「シッテムの箱」を知らないはずがありません。"
201070-52 = "どれほど優秀でも、「シッテムの箱」を認識できない以上は、#n本物の連邦生徒会長ではありません。"
201070-53 = "所詮は[ruby=ミ     メ     シ     ス]連邦生徒会長を演じる者[/ruby]にすぎないのです。"
201070-54 = "これまでに発生した[ruby=ミ     メ     シ     ス]複製[/ruby]は、それぞれの形でキヴォトスの秩序を乱し、混乱を招いてきました。まず間違いなく、彼女も同様でしょう。"
201070-55 = "[s] \"それが本当なら大変だけど……。\""
201070-56 = "待ってください。能力だけで人を評価するのはよくないと思います！"
201070-57 = "アロナ先輩……？"
201070-58 = "失踪していた間に何かがあって、「シッテムの箱」の記憶を失っているだけかもしれないじゃないですか。"
201070-59 = "ちゃんと相手の話を聞いてから判断するべきです！"
201070-63 = "…………はぁ。"
201070-64 = "ため息！？"
201070-65 = "……たとえそうだとしても、彼女が連邦生徒会長の力を行使できていない事実は変わりません。"
201070-66 = "統制できない力が放置された時……どんなことが起きるのかは、アロナ先輩も十分知っているはずですよね？"
201070-67 = "うっ、それは……そうですが……。"
201070-68 = "[s] \"プラナは「シャーケードの杖」について何か知ってる？\""
201070-69 = "否定。私はシッテムの箱に常駐するOSです。#nそのため、連邦生徒会長が管理する別の機器については分かりません。"
201070-70 = "また、私がいた世界では、最後まで「シャーケードの杖」は使用されませんでした。"
201070-71 = "……ですが、元防衛室長の言う通りに「シャーケードの杖」が「シッテムの箱」に準ずるオーパーツなのであれば、その構造の一部を閲覧することはできます。"
201070-72 = "[s] \"……本当に？\""
201070-73 = "ど、どうやってやるんですか？"
201070-74 = "サンクトゥムタワーをリモート操作するには、連邦生徒会長の名で定義された特殊な識別情報を送信して認証を得るプロセスが必要です。"
201070-75 = "つまり2つの機器が同じ認証システムを使用しているのであれば、#nお互いを呼び出して情報を同期する「ペアリング機能」を使うことができます。"
201070-76 = "これは「シッテムの箱」に搭載されている基本的な機能なのですが……。"
201070-81 = "ちゃ、ちゃんと知ってますよ！びっくりしてド忘れしちゃっただけですから！"
201070-82 = "[USERNAME]先生さえよろしければ、固有識別情報を送信するよう「シャーケードの杖」に要求します。"
201070-83 = "先生、許可を。"
201070-84 = "[s] 許可する。"
201070-91 = "…"
201070-94 = "……"
201070-97 = "………"
201070-101 = "[log]Pairing To [FF6666]branch of shakeid――[-][/log]"
201070-103 = "……「シャーケードの杖」にペアリングを行います。"
201070-104 = "補助オペレーティングシステム、S.Q.D.の反応を確認。"
201070-108 = "…"
201070-111 = "……"
201070-114 = "………"
201070-120 = "……やはり。追加の生体認証を要求されています。"
201070-121 = "先生の生体情報の更新をお願いしてもよろしいでしょうか？"
201070-122 = "[s] \"えっと……指紋とか？\""
201070-123 = "肯定。新しいオペレーティングシステムのセキュリティ解除には、#n現在「シッテムの箱」に登録されているものとは別の生体情報が必要です。"
201070-124 = "形式上ではありますが、大事な手続きなのでご協力ください。"
201070-131 = "もっと近く。"
201070-136 = "そのまま私の指に、先生の指を当ててください。"
201070-137 = "はい、指切りをするようにお願いします。"
201070-145 = "…………。"
201070-146 = "[s] \"……どうかした？\""
201070-147 = "……なんでもありません。少し……昔の記憶を思い出しただけです。"
201070-148 = "……確認できました。#nオペレーティングシステムA.R.O.N.Aの使用者、[USERNAME]先生。"
201070-149 = "更新された認証情報でペアリングを再試行します。"
201070-157 = "[log]「シャーケードの杖」から[/log]"
201070-159 = "[log]システムデータをダウンロード中――[/log]"
201070-162 = "…"
201070-165 = "……"
201070-168 = "………"
201070-172 = "[log]……ペアリング完了。[/log]"
201070-174 = "[log]補助オペレーティングシステム、S.Q.Dの閲覧を許可します。[/log]"
201070-177 = "[log]新しいシステムの実行のため、[/log]"
201070-179 = "[log]OSを再起動中――[/log]"
201070-186 = "……あれ？ここはどこですか！？"
201070-187 = "いきなり教室がモノクロになりました！"
201070-188 = "新しいシステムを「シッテムの箱」の中に展開するために、#n周辺環境の最適化を行いました。"
201070-189 = "システム負荷による一時的なものですので、作業が終わり次第復旧させます。"
201070-190 = "もう！そういうのは先に言ってくださいよ！#n私の目がおかしくなったのかと思いました！"
201070-191 = "……分かりました。"
201070-192 = "[s5] \"待って。同期完了ってことは……。\"\n[s6] \"「シャーケードの杖」は本当に連邦生徒会長の……。\""
201070-195 = "肯定。元防衛室長が持ってきた時計はどうやら本物のようです。"
201070-196 = "他はともかく、[ruby=超人]連邦生徒会長[/ruby]に対する執念だけは侮れませんね。"
201070-197 = "ぬぬぬ……これ、本当に元に戻せるんですよね？"
201070-198 = "こんな状態じゃイチゴミルクもプリンも美味しくないですよ～"
201070-204 = "……あれ？こんな箱、いつもの教室にありましたっけ？"
201070-205 = "これが「シャーケードの杖」からインストールしたデータですか？"
201070-206 = "肯定。この中にあるのがS.Q.Dの新規データです。"
201070-207 = "どれどれ……。"
201070-208 = "ほとんどは駆動システムに使われるダミーデータのようですね。"
201070-213 = "……特定。これがS.Q.Dシステムのコアファイルです。"
201070-214 = "なんだか木の実みたいですね。"
201070-215 = "モノクロになっちゃってるから、どんな色なのか分かりません！"
201070-216 = "プラナちゃん、ちょっとだけ最適化モードを解除できませんか？"
201070-217 = "同意。たしかに、現在の状態での分析は難しいですね。"
201070-218 = "……データ解析のために、最適化モードを一時解除します。"
201070-219 = "解除まで残り……３、２、１――"
201070-227 = "――！？"
201070-228 = "うわぁっ！？きゅ、急に大量の情報が……！"
201070-229 = "頭が……くらくらします……。"
201070-230 = "[s] \"アロナ！プラナ！\""
201070-231 = "一時展開データの量がメモリの処理限界を越えています……。"
201070-232 = "このままではオペレーティングシステムにデータがあふれ出て……。"
201070-233 = "し、システムの、緊急停止、を――"
201070-235 = "[ns] \"緊急停止！\""
201070-240 = "メインオペレーティングシステムA.R.O.N.Aを緊急停止します。"
201070-241 = "オーバーフローによる論理回路のエラーを検知。#nセーフモードを実行。直前のバックアップファイルより再起動開始。"
201070-242 = "OSを再起動しています――"
201070-248 = "……はっ！"
201070-249 = "……どうにか間に合いました。"
201070-250 = "な、なにが起こったんですか？"
201070-251 = "油断しました。"
201070-252 = "「ペレツ･ウザ」のおかげで演算力が増えたとはいえ、「シャーケードの杖」もサンクトゥムタワーの管理を補助するためのオペレーティングシステム。"
201070-253 = "A.R.O.N.Aを稼働しながらS.Q.Dのコアファイルを解析するのは、#n現在の演算能力では不可能かと。"
201070-254 = "……お役に立てず申し訳ありません、先生。"
201070-255 = "[s7] \"ううん、アロナとプラナが無事でよかった。\"\n[s8] \"調べてくれてありがとう、プラナ。\""
201070-261 = "ふっふっふ……ですが、何も得られなかったわけじゃないですよ。"
201070-262 = "システムの再起動中も、「シャーケードの杖」のコアを離さず握っていたので！"
201070-263 = "じゃーん！見てください！"
201070-268 = "……先輩。"
201070-269 = "それは何のデータも入っていない……ただのアーモンドの種です。"
201070-270 = "ええっ！？ど、どうして……！"
201070-271 = "ぎゅっと握っていたはずだったのに……！"
201070-272 = "どうやらOSの再起動中に、ペアリングされていたデータが消去されたようです。"
201070-273 = "そんなぁ……。"
201070-274 = "……「シャーケードの杖」の調査はひとまず後回しにしましょう。"
201070-275 = "先生、誰かに後をつけられています。"
201070-284 = "……気づかれてしまいましたか。"
201070-285 = "いえ、尾行するつもりはなかったのですが。"
201070-286 = "[ns9] \"この声は……。\"\n[ns10] \"……リンちゃん？\""
201070-292 = "……誰が「リンちゃん」ですか。"
201070-294 = "次回;虚像と推論"
