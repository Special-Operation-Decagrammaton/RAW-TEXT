[translation]
1013508-1 = "人住的地方？"
1013508-3 = "啊，你來啦。"
1013508-4 = "受不了，這裡真的是人住的地方嗎……"
1013508-5 = "[s] 「我來幫忙吧。」"
1013508-6 = "咦？"
1013508-7 = "啊，那個……謝謝你。#n兩個人總比一個人好吧。"
1013508-12 = "唉……桃井是只會把環境弄亂，根本不可能會收拾的類型。"
1013508-13 = "綠則是一旦開始動手就能收拾得很好，生活能力也最強。#n不過可能因為是插畫師的關係……"
1013508-14 = "雖然不會主動把東西弄亂，但打掃的次數本身就很少……"
1013508-15 = "而柚子……現在已經比較少無緣無故躲起來了，但平常除了玩遊戲就是寫程式……#n至於愛麗絲……"
1013508-19 = "愛麗絲……讓我很擔心。"
1013508-20 = "雖然他算是在四個人當中第二有生活觀念的，不過人往往會被周圍的人同化……#n而說到他周圍的人……"
1013508-21 = "不，我也不是說那三個人不好，反而應該說是好人才對。#n只不過……"
1013508-30 = "呼，總算好一點了。"
1013508-31 = "不過我可以跟你打賭，這個狀態能撐過3天就謝天謝地了。"
1013508-32 = "[s] 「3天啊……原來如此……」"
1013508-33 = "是的。"
1013508-34 = "……"
1013508-35 = "……？"
1013508-36 = "請等一下，老師。"
1013508-37 = "[s] 「怎，怎麼了，Kei醬。」"
1013508-38 = "你剛才怎麼好像在迴避我的視線？"
1013508-39 = "[s] 「那恐怕是你誤會了呢，Kei同學。」"
1013508-40 = "Kei同學……？"
1013508-41 = "……"
1013508-42 = "老師。"
1013508-43 = "請看著我的眼睛。"
1013508-44 = "[s] 「不，不要！我不會屈服的！！」"
1013508-45 = "好好看著我的臉！"
1013508-46 = "[s] 「嗚……！」"
1013508-47 = "很好。現在把手放在胸前回答我。"
1013508-48 = "你平常，有好好打掃嗎？"
1013508-49 = "[s]「……！」"
1013508-54 = "站住！你剛才的行為已經說明一切了，給我站住！！！"
1013508-58 = "……"
1013508-59 = "[s]「……」"
1013508-60 = "老師。"
1013508-61 = "[s] 「請，請說？」"
1013508-62 = "請問這裡是人住的地方還是豬圈？"
1013508-63 = "如果回答人住的地方就是沒良心，回答豬圈的話就不是人了。"
1013508-64 = "我給你10秒，請開始你的解釋。"
1013508-65 = "[s1] 「你聽我說，Kei醬！我完全可以解釋！」\n[s2] 「打掃或家務這種事情，本來就永遠都做不完啊！」"
1013508-68 = "然後呢？"
1013508-69 = "[s] 「就算今天做完，明天又會堆積出同樣的量！」"
1013508-70 = "繼續說。"
1013508-71 = "[s3] 「所以就該留到想做的時候一次做完！」\n[s4] 「這樣不是既爽快又合理嗎！」"
1013508-77 = "這是什麼某個黑漆漆的合理主義者會用的藉口啊！！！"
1013508-78 = "去死吧！給我去死一死！！！#n大不了我陪你一起死，與其這樣活著不如去死！！！！！"
1013508-84 = "真是的，我到底為什麼要……"
1013508-90 = "雖然比莉央的房間好一點，但那也不是什麼值得驕傲的事……"
1013508-94 = "這樣萬一灰塵傷到氣管或肺部怎麼辦……肺一旦受損就沒辦法恢復了耶……"
1013508-101 = "呼……"
1013508-102 = "那麼，老師？"
1013508-103 = "[s] 「是。」"
1013508-104 = "你沒有什麼話要說嗎？"
1013508-105 = "[s5] 「對不起。謝謝你。」\n[s6] 「非常抱歉。萬分感激。」"
1013508-108 = "……知道就好。"
1013508-109 = "下次要是再弄亂的話……！"
1013508-113 = "……"
1013508-114 = "反正你還是會弄亂的吧……"
1013508-115 = "不用自己一個人這麼辛苦，叫我過來幫忙吧。"
1013508-116 = "[s7] 「……！？！？」\n[s8] 「你願意幫忙嗎……？」"
1013508-119 = "什，什麼啦……"
1013508-120 = "反正兩個人總比一個人好吧。"
1013508-124 = "[ns] 「果然……果然……！！」"
1013508-125 = "果然……？"
1013508-126 = "不是，等一下，我不是說過禁止那種滿足又狡猾的笑容了嗎？"
1013508-127 = "拜託好好聽別人說話！#n要是敢再說奇怪的話，我就──！！！"
1013508-128 = "[ns9] 「Kei醬好可愛！」\n[ns10] 「Kei醬好可愛！！」\n[ns11] 「Kei醬好可愛！！！」"
1013508-132 = "啊啊啊啊啊啊啊啊！！！！！"
