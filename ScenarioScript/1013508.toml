[translation]
1013508-1 = "สถานที่ที่คนอยู่?"
1013508-3 = "อ๊ะ มาแล้วสินะคะ"
1013508-4 = "จริงๆ เลยเชียว นี่มันที่ที่คนอยู่จริงๆ หรือเปล่านะ..."
1013508-5 = "[s] \"ครูช่วยเอง\""
1013508-6 = "คะ?"
1013508-7 = "ค่ะ... ขอบคุณนะคะ ช่วยกันทำย่อมดีกว่าคนเดียวอยู่แล้วค่ะ"
1013508-12 = "เฮ้อ... โมโมอิน่ะ เรื่องทำให้รกละถนัดนัก แต่เรื่องเก็บกวาดละไม่เคยสนใจ"
1013508-13 = "ส่วนมิโดริน่ะ ถ้าจะให้เก็บกวาดก็ทำได้สะอาดสะอ้านดี แถมสกิลการใช้ชีวิตก็ดีกว่าใครเพื่อน แต่ก็น่าจะเพราะเป็นนักวาดภาพ"
1013508-14 = "ก็เลยไม่ค่อยทำอะไรรกเท่าไร แต่ปัญหาก็คือไม่ค่อยทำความสะอาดเท่าไรด้วยค่ะ..."
1013508-15 = "ส่วนยูสึ... ถึงตอนนี้จะไม่ค่อยไปซ่อนตัวแล้ว แต่ก็ยังเอาแต่เล่นเกมไม่ก็เขียนโค้ด... ส่วนอาริสึ..."
1013508-19 = "อาริสึ... น่ากังวลเลยค่ะ"
1013508-20 = "ถ้าเทียบในบรรดาสี่คน ก็ยังถือว่ามีสามัญสำนึกในการใช้ชีวิตเป็นอันดับสองละนะคะ แต่ท้ายที่สุดแล้ว#nคนเราจะมีชีวิตคล้ายคลึงกับสิ่งแวดล้อมรอบตัว และผู้คนรอบตัวอาริสึก็..."
1013508-21 = "ไม่ค่ะ ฉันไม่ได้บอกว่าอีกสามคนนั้นไม่ดีหรอกค่ะ ทุกคนเป็นเด็กดีด้วยซ้ำ แต่ว่า..."
1013508-30 = "เฮ้อ... ห้องดูดีขึ้นมาหน่อยแล้วนะคะ"
1013508-31 = "ฉันขอพนันเลยค่ะ คงจะอยู่ในสภาพนี้ไม่เกินสามวันหรอกค่ะ"
1013508-32 = "[s] \"สามวันเหรอ... งั้นสินะ...\""
1013508-33 = "ค่ะ"
1013508-34 = "..."
1013508-35 = "...?"
1013508-36 = "เดี๋ยวก่อนนะคะ คุณครู"
1013508-37 = "[s] \"ทำไม เป็นอะไรไปเหรอ เคย์จัง?\" "
1013508-38 = "เหมือนคุณครูกำลังหลบเลี่ยงสายตาของฉันอยู่เลยนะคะ?"
1013508-39 = "[s] \"เข้าใจผิดแล้วละ คุณเคย์\""
1013508-40 = "คุณเคย์...?"
1013508-41 = "..."
1013508-42 = "คุณครู"
1013508-43 = "มองตาฉันสิคะ"
1013508-44 = "[s] \"มะ... ไม่ ครูไม่ยอมจำนนให้หรอก!\""
1013508-45 = "หันมามองหน้าฉันตรงๆ เลยค่ะ!"
1013508-46 = "[s] \"อึก...!\""
1013508-47 = "เอาละ ต่อไปก็เอามือวางตรงตำแหน่งหัวใจแล้วตอบมาค่ะ"
1013508-48 = "ปกติเก็บกวาดห้องเรียบร้อยหรือเปล่าคะ?"
1013508-49 = "[s] \"...!\""
1013508-54 = "หยุดอยู่ตรงนั้นเลยค่ะ! ฉันอ่านท่าทางของคุณครูออกหมดแล้ว หยุดเดี๋ยวนี้นะคะ!!!"
1013508-58 = "..."
1013508-59 = "[s] \"...\""
1013508-60 = "คุณครู"
1013508-61 = "[s] \"หะ... หืม?\""
1013508-62 = "ที่นี่เอาไว้ให้คนอยู่หรือให้ขยะอยู่กันแน่คะ?"
1013508-63 = "ถ้าตอบว่าให้คนอยู่ ก็หมายความว่าไม่มีจิตสำนึก แต่ถ้าตอบว่าให้ขยะอยู่ ก็แปลว่าคุณครูไม่ใช่คนค่ะ"
1013508-64 = "ฉันจะให้เวลาสิบวินาทีค่ะ เริ่มแก้ตัวได้"
1013508-65 = "[s1] \"ฟังก่อนนะ เคย์จัง! ครูอธิบายทุกอย่างได้นะ!\"\n[s2] \"ปกติแล้วการทำความสะอาดเป็นงานที่ไม่มีวันจบสิ้นหรอก!\""
1013508-68 = "แล้วยังไงคะ"
1013508-69 = "[s] \"ถึงวันนี้จะทำไปแล้ว เดี๋ยวพรุ่งนี้ก็เละใหม่อยู่ดี!\""
1013508-70 = "พูดมาเรื่อยๆ เลยค่ะ"
1013508-71 = "[s3] \"ไว้ค่อยเก็บกวาดตอนที่อยากขยับร่างกายดีกว่านะ\"\n[s4] \"ทำตอนอยากทำดีกว่า แบบนั้นทำเสร็จแล้วโล่งใจดีนะ!\""
1013508-77 = "ไม่ต้องมาพูดเหมือนเป็นคนมีเหตุผลแต่เหตุผลฟังไม่ขึ้นเลยค่ะ ผู้ใหญ่คนนี้เนี่ย!!!"
1013508-78 = "ตายไปเลยค่ะ! ตายไปบนกองขยะนี่ละ!!! ฉันจะตายไปด้วยอีกคนเลย ถ้าคิดจะใช้ชีวิตแบบนี้ก็ตายไปซะเถอะ!!!!!"
1013508-84 = "จริงๆ เลยเชียว ทำไมฉันต้องเจออะไรแบบนี้ด้วย..."
1013508-90 = "แต่ถึงยังไงก็ยังดูดีกว่าห้องของริโอะนิดหน่อยนะคะ ถึงจะไม่น่าภูมิใจก็เถอะ..."
1013508-94 = "ฝุ่นเขรอะแบบนี้ ถ้ามันเข้าไปทำลายหลอดลมหรือปอดขึ้นมาจะว่ายังไงคะ... ถ้าปอดได้รับความเสียหายขึ้นมา มันจะฟื้นตัวไม่ได้นะ..."
1013508-101 = "ฮู่ว..."
1013508-102 = "ถ้างั้นก็ คุณครู?"
1013508-103 = "[s] \"อื้อ\""
1013508-104 = "มีอะไรจะพูดมั้ย?"
1013508-105 = "[s5] \"ครูผิดไปแล้ว แล้วก็ขอบใจนะ\"\n[s6] \"ขอโทษนะ แล้วก็ขอบพระคุณมากเลย\""
1013508-108 = "ถ้ารู้ตัวก็ดีแล้วค่ะ..."
1013508-109 = "ไว้คราวหน้าถ้าห้องรกอีกละก็...!"
1013508-113 = "..."
1013508-114 = "ยังไงก็ต้องรกอีกอยู่ดีละ..."
1013508-115 = "ถึงตอนนั้นก็ไม่ต้องลำบากอยู่คนเดียวนะคะ เรียกหาฉันได้เลย"
1013508-116 = "[s7] \"...?!?!\"\n[s8] \"จะช่วยเหรอ...?\""
1013508-119 = "มีอะไรคะ ทำไมคะ มีอะไรคะ"
1013508-120 = "ก็สองคนมันดีกว่าคนเดียวนี่คะ"
1013508-124 = "[ns] \"จริงด้วย จริงด้วยสินะ...!\""
1013508-125 = "จริงด้วย...?"
1013508-126 = "เดี๋ยวค่ะ ฉันบอกว่าห้ามทำแบบนั้นนี่คะ? ห้ามยิ้มน้อยยิ้มใหญ่อย่างมีเลศนัยแบบนั้นสิ! "
1013508-127 = "คนพูดก็ฟังหน่อยสิคะ! อย่าพูดอะไรแปลกๆ นะ!!!"
1013508-128 = "[ns9] \"เคย์จังน่ารักจังเลยนะ!\"\n[ns10] \"เคย์จังน่ารักจังเลยนะ!!\"\n[ns11] \"เคย์จังน่ารักจังเลยนะ!!!\""
1013508-132 = "ฮึ่ยยยยยยยย!!!!!"
