[translation]
90002100-1 = "ตอนที่ 10;000, 00, 0"
90002100-2 = "ปฏิบัติการ...!"
90002100-3 = "ยะ... ยึดดินแดนเหล็กกล้า...! อึก..."
90002100-4 = "ไม่ได้สิ ยูสึ! ได้ใส่ชุดต่อสู้แบบนี้ทั้งที! ต้องออกแรงฮึบ! ให้มีพลังมากกว่านี้หน่อย!"
90002100-5 = "ตะ... แต่ว่า..."
90002100-6 = "ไม่ต้องไหลตามพี่โมโมอิให้มากไปหรอก ยูสึจัง เดี๋ยวติดเป็นนิสัยพอดี พี่โมโมอิก็ด้วย อย่าไปแกล้งยูสึจังแบบนั้นสิ"
90002100-7 = "แกล้งที่ไหนล่ะ? พูดแรงไปแล้วนะน้องสาวคนนี้! ฉันแค่จัดบทบาทสมมติให้ยูสึมีความกล้าหาญ ก็เท่านั้นเอง!"
90002100-11 = "ใช่ค่ะ! ความกล้าหาญคืออาวุธที่สำคัญที่สุดของผู้กล้านะคะ!"
90002100-12 = "อาริสึก็อย่าคล้อยตามไปด้วยสิคะ..."
90002100-14 = "[ns] \"เอาละๆ เราจะไปพื้นที่ของบีนาห์กันก่อนใช่มั้ย?\""
90002100-15 = "ถ้าเรายึดครองพื้นที่ของบีนาห์ได้ งานต่อไปก็จะง่ายขึ้น เพราะเราจะเคลื่อนที่โดยใช้ยานขนส่งเป็นฐานได้"
90002100-16 = "ถ้าได้คอร์ของบีนาห์กับสิทธิ์ในการเชื่อมต่อกับเครือข่ายของดินแดนเหล็กกล้ามาแล้ว... ต่อไปก็จะเป็นปัญหาที่ต้องให้ครูตัดสินใจละนะ"
90002100-17 = "ฉันคิดว่าเราควรแบ่งกันเป็น 2 ทีมแล้วแยกกันรับมือ แต่สมาชิกของแต่ละทีมก็อาจเปลี่ยนแปลงได้ตาม#nสถานการณ์ค่ะ"
90002100-18 = "การใช้ยานขนส่งเป็นฐานก็เพื่อการนั้นตั้งแต่แรกด้วยค่ะ"
90002100-19 = "แต่ถึงยังไง หลังจากยึดพื้นที่ของผู้เลื่อมใสแต่ละตนได้ เราก็ต้องบอกให้เคย์รู้"
90002100-20 = "ใช่ค่ะ เคย์จะได้ดูดกลืนข้อมูลจากแก่นของผู้เลื่อมใส แล้วก็จะแปลงมันให้เป็นพลังของพวกเราค่ะ"
90002100-21 = "อย่าพูดเหมือนฉันเป็นสิ่งมีชีวิตกลมๆ ที่กลืนกินศัตรูและเลียนแบบความสามารถของมันมาสิคะ..."
90002100-22 = "อ๊ะ เคย์ก็รู้จักเกมนั้นเหมือนกันสินะคะ! เกมเทพเลยละค่ะ!"
90002100-24 = "[ns] \"เคย์ก็ชอบเกมเหมือนกันเหรอ?\""
90002100-25 = "มะมะมะมะ... ไม่มีทางหรอกค่ะ! นี่เป็นแค่ความทรงจำกับประสบการณ์ที่ยังเหลืออยู่จากตอนที่ฉันได้#nซิงก์กับอาริสึก็เท่านั้น!"
90002100-26 = "อย่างนั้นสินะคะ... ความทรงจำที่มีร่วมกับอาริสึเป็นภาระหนักใจของเคย์สินะคะ..."
90002100-27 = "เปล่าค่ะ! ไม่ใช่อย่างนั้นนะคะ อาริสึ! ไม่มีทางเป็นอย่างนั้นหรอกค่ะ! ที่ฉันพูดไป ฉันไม่ได้หมายความอย่างนั้น คือว่า...!"
90002100-28 = "ไม่เป็นไรค่ะ... ยังไงอาริสึก็อยากให้ความสำคัญกับเคย์ค่ะ... ไม่ว่าเคย์จะคิดยังไงกับอาริสึก็เถอะ..."
90002100-29 = "มะ... ไม่ใช่อย่างนั้นนะคะ! ฉันจะเป็นแบบนั้นไปได้ยังไงล่ะคะ! ฟังที่ฉันพูดหน่อยสิคะ!!!"
90002100-30 = "ไม่เป็นไรค่ะ เคย์ อาริสึไม่เป็นไรค่ะ..."
90002100-31 = "อาริสึ!!!"
90002100-37 = "(ในตอนนั้นเอง...!)"
90002100-38 = "(อาริสึก็เหลือบมองคุณครูเล็กน้อยแล้วยิ้มอย่างขี้เล่น...!)"
90002100-40 = "[ns] \"เลิกแกล้งเคย์ได้แล้ว อาริสึ...\""
90002100-41 = "แหะๆๆ ขอโทษค่ะ คุณครู เคย์ด้วยค่ะ"
90002100-42 = "คะ? แกล้งกันเหรอ...? เดี๋ยวนะ? หมายความว่า... เมื่อกี้คือ???"
90002100-43 = "[ns] \"แต่การแกล้งเคย์ก็สนุกดีนะ...\""
90002100-44 = "ใช่ค่ะ! คุณครูก็คิดเหมือนกันสินะคะ!"
90002100-45 = "..."
90002100-46 = "......"
90002100-47 = "........."
90002100-48 = "คุณครูเนี่ย แย่ที่สุดเลยค่ะ!!!"
90002100-50 = "เราไปกันเถอะค่ะคุณครู อะซุมะ โทคิคนนี้จะคอยซัพพอร์ตในฐานะเมดที่สมบูรณ์แบบของคุณครูค่ะ"
90002100-51 = "แต่เมดไม่ได้ใส่ชุดแบบนั้นไม่ใช่เหรอ...?"
90002100-52 = "ฉันจะคอยซัพพอร์ตในฐานะสายลับพิเศษที่สมบูรณ์แบบของคุณครูค่ะ"
90002100-53 = "เดี๋ยวนี้เปลี่ยนบทบาทเร็วเลยนะ โทคิ..."
90002100-54 = "แต่ว่า คุณครูคะ การตอบสนองอย่างรวดเร็วต่อสถานการณ์และบรรยากาศแบบนี้"
90002100-55 = "คือจิตวิญญาณพื้นฐานที่สายลับพิเศษควรมีไม่ใช่เหรอคะ? ปิ้วๆ"
90002100-56 = "[s] \"อื้อ ตามนั้นก็ได้...\""
90002100-57 = "ขอโทษนะคะ เราควรต้องเริ่มงานกันแล้วไม่ใช่เหรอคะ?"
90002100-58 = "ใช่แล้วละ ทุกคนช่วยไปประจำที่ของตัวเองด้วย"
90002100-59 = "เอาละ คุณครูคะ ฉันจะคืนอำนาจสั่งการให้อีกครั้งค่ะ"
90002100-60 = "[s] \"น่าหนักใจจังเลยนะ~\""
90002100-61 = "ตายจริง ฉันคิดว่านี่เป็นเรื่องที่คุณครูคุ้นเคยแล้วเสียอีกค่ะ"
90002100-62 = "[s] \"มันก็จริงอยู่หรอกนะ~\""
90002100-67 = "[ns] \"งั้นเราไปโจมตีเพื่อยึดพื้นที่ของบีนาห์กันเลย!\""
