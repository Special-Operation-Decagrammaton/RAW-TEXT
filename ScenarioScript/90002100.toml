[translation]
90002100-1 = "第10話;000, 00, 0"
90002100-2 = "鋼鐵大陸──！"
90002100-3 = "攻，攻略戰……！嗚嗚……"
90002100-4 = "不行哦，柚子！#n都已經穿上新戰鬥服了，得表現得更有精神才行！"
90002100-5 = "可，可是……"
90002100-6 = "不要太配合姐姐了，柚子醬。這樣會寵壞他的。#n還有姐姐也不要那樣欺負柚子醬。"
90002100-7 = "什麼？這話未免有點過分了吧，妹妹啊！#n姐姐我只是為了幫柚子鼓起勇氣，所以才演了這齣情境劇啊！"
90002100-11 = "沒錯！勇氣是勇者最重要的裝備！"
90002100-12 = "怎麼連你也這樣，愛麗絲……"
90002100-14 = "[ns] 「好好好。總之要先去薇娜的區域對吧？」"
90002100-15 = "佔領薇娜的區域，能讓接下來的行動變得輕鬆一點。#n因為我們可以將運輸船當作基地來移動。"
90002100-16 = "取得薇娜的核心，獲得鋼鐵大陸的網路存取權之後……#n接下來的行動就交由老師來決定。"
90002100-17 = "將成員分成兩隊，並根據情況隨時調整應該是個不錯的選擇。"
90002100-18 = "之所以將運輸船當成基地，也是為了保有這麼做的彈性。"
90002100-19 = "不過在佔領各預言者的區域之後，一定要把Kei給叫過來才行。"
90002100-20 = "是的。這樣Kei就會吸收預言者的核心情報，並將其轉化為我們的戰力。"
90002100-21 = "……不要把別人說得跟可以吞噬敵人並複製能力的圓形生物一樣。"
90002100-22 = "啊，Kei也知道那款遊戲呢！真的是神作哦！"
90002100-24 = "[ns] 「姑且問一下，Kei也喜歡遊戲嗎？」"
90002100-25 = "怎怎怎怎，怎麼可能！#n這只是和愛麗絲同步時的記憶和經驗殘留下來了而已──！"
90002100-26 = "這樣啊……原來對Kei來說，和愛麗絲的記憶是種負擔啊……"
90002100-27 = "沒有！絕對不是的，愛麗絲！那怎麼可能呢！#n我剛才不是那個意思，只是想說……！"
90002100-28 = "沒關係……愛麗絲還是想珍惜Kei……無論Kei是怎麼看待愛麗絲的都一樣……"
90002100-29 = "就，就說了不是那個意思！我怎麼可能會那樣想呢！#n拜託請好好聽我說話！！！"
90002100-30 = "沒關係的，Kei。愛麗絲沒關係的……"
90002100-31 = "愛麗絲──！！！"
90002100-37 = "（就在那個瞬間……！）"
90002100-38 = "（愛麗絲悄悄看向這邊，並露出了惡作劇般的笑容……！）"
90002100-40 = "[ns] 「你就別再捉弄他了，愛麗絲……」"
90002100-41 = "耶嘿嘿。對不起，老師、Kei。"
90002100-42 = "什麼？捉弄……？#n咦，所以是……啊？啊啊？？？"
90002100-43 = "[ns] 「不過捉弄Kei確實挺有趣的呢……」"
90002100-44 = "沒錯！老師也很清楚呢！"
90002100-45 = "……"
90002100-46 = "…………"
90002100-47 = "………………"
90002100-48 = "老師你才是罪魁禍首──！！！"
90002100-50 = "那麼老師，我們出發吧。#n我飛鳥馬季，將作為老師的完美女僕提供協助。"
90002100-51 = "穿著那套服裝，好像不算女僕吧……？"
90002100-52 = "作為老師的完美特務提供協助。"
90002100-53 = "轉換態度很快呢，季……"
90002100-54 = "話雖如此，老師您不覺得這正是能配合情況和氛圍靈活應對……"
90002100-55 = "作為優秀特務的基本素養嗎？V。"
90002100-56 = "[s] 「是是是……」"
90002100-57 = "各位，差不多要開始囉？"
90002100-58 = "是啊。請大家先回到各自的位置。"
90002100-59 = "那麼老師，我在此將指揮權交還給您。"
90002100-60 = "[s] 「真是壓力山大～」"
90002100-61 = "哎呀，不過某種意義上來說，這不是您再習慣不過的工作嗎？"
90002100-62 = "[s] 「那倒也是啦～」"
90002100-67 = "[ns] 「那麼，開始薇娜攻略戰吧！」"
