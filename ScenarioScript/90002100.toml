[translation]
90002100-1 = "Episode 10;000, 00, 0"
90002100-2 = "Operational Plan!"
90002100-3 = "S-S-Steel Continent...! Ah..."
90002100-4 = "C'mon, Yuzu! You're suited up and everything! Put some force behind it!"
90002100-5 = "B-But..."
90002100-6 = "You don't have to entertain her like that, Yuzu. It just spoils her rotten.#nAnd Sis! Leave Yuzu alone!"
90002100-7 = "C'mon! You're my favorite sister. You shouldn't be so mean to me! I was trying to help Yuzu feel braver!"
90002100-11 = "That is right! Courage is the most important weapon for a hero!"
90002100-12 = "Why are you getting swept up in the mood too, Aris...?"
90002100-14 = "[ns] \"Now, now. We're heading to Binah's area first, right?\""
90002100-15 = "Things will get easier once we take over Binah's area, since we can use the transport ship itself as our base."
90002100-16 = "Once we retrieve Binah's core and gain access to the Steel Continent's network... Sensei will take it from there."
90002100-17 = "We'll split into two teams for each area, but the members themselves will switch depending on our needs."
90002100-18 = "That's the entire point of using the transport ship as our base."
90002100-19 = "Once we've taken over a prophet's area, Kei will have to be there as well."
90002100-20 = "Yes. Kei will absorb the prophet's core data and convert it."
90002100-21 = "...Don't describe me like I'm that round creature that swallows enemies and copies their abilities."
90002100-22 = "Ah, so you know that game too, Kei! It is a masterpiece!"
90002100-24 = "[ns] \"Out of curiosity, do you like games too, Kei?\""
90002100-25 = "N-N-N-N-No way! This is just coming from my memories and experiences from back when I was synchronized with Aris!"
90002100-26 = "I see... So that time together...is just troublesome memories to Kei now..."
90002100-27 = "No! That's not true at all, Aris! There's no way! That's not what I meant, what I was trying to say was...!"
90002100-28 = "It is okay... No matter what you think of me... I will always cherish what we had, Kei..."
90002100-29 = "No, that's not it! I wouldn't ever think such a thing! YOU HAVE TO BELIEVE ME!!"
90002100-30 = "It is okay, Kei. I'm fine..."
90002100-31 = "ARIS!!"
90002100-37 = "And at that very moment...!"
90002100-38 = "Aris glanced over at me with a playful smile...!"
90002100-40 = "[ns] \"Stop teasing her, Aris...\""
90002100-41 = "Heehee. I'm sorry, Sensei, and Kei."
90002100-42 = "What? Tease...? What? So, um. Huh?!"
90002100-43 = "[ns] \"But teasing Kei is fun...\""
90002100-44 = "That is true! So you know it too, Sensei!"
90002100-45 = "..."
90002100-46 = "..."
90002100-47 = "..."
90002100-48 = "You're the absolute worst, Sensei!"
90002100-50 = "Well then, Sensei, let's go. I, Asuma Toki, will support you as the perfect maid."
90002100-51 = "Can you really call yourself a maid in that outfit...?"
90002100-52 = "I will support you as the perfect special agent."
90002100-53 = "You're so adaptable, Toki."
90002100-54 = "However, isn't the ability to swiftly adapt to any condition..."
90002100-55 = "...a fundamental for an exceptional special agent? V for victory."
90002100-56 = "[s] \"Yeah, yeah...\""
90002100-57 = "Ugh. Shouldn't we get started already?"
90002100-58 = "Everyone, to your positions."
90002100-59 = "Then we're under your command, Sensei."
90002100-60 = "[s] \"Phew! That's a lot of pressure!\""
90002100-61 = "Oh my. But isn't this just another Tuesday for you?"
90002100-62 = "[s] \"You could see it that way.\""
90002100-67 = "[ns] \"Well then, let's get started with Operation Binah!\""
