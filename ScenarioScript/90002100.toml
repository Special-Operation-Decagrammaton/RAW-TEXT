[translation]
90002100-1 = "#title;10화;000, 00, 0"
90002100-2 = "4;모모이 결전;03;강철대륙–!\n#4;a\n#4;em;[!]"
90002100-3 = "2;유즈 결전;04;고, 공략전……! 으우우…….\n#2;em;[속상함]\n#2;a\n#2;stiff"
90002100-4 = "4;모모이 결전;05;안 돼, 유즈! 이렇게 새 슈트까지 입었는데! 좀 더 확실하게 기합을 넣어야지!\n#4;jump"
90002100-5 = "2;유즈 결전;02;하, 하지만……."
90002100-6 = "3;미도리 결전;99;언니에게 너무 어울려 주면 안 돼, 유즈 쨩. 버릇 나빠지니까. 그리고 언니도 유즈 쨩을 그렇게 괴롭히지 말고.\n#3;em;[한숨]\n#4;hide\n#2;hide"
90002100-7 = "5;모모이 결전;15;무엇이라? 말이 심하군, 여동생이여! 이 몸은 그저 유즈에게 용기를 불어넣어 주려고 상황극을 하고 있을 뿐이네만!\n#5;al\n#5;hophop\n#5;em;[스팀]"
90002100-8 = "#st;[0,0];instant;1;"
90002100-9 = "#clearST"
90002100-10 = "5;모모이 결전;15\n3;미도리 결전;99\n#3;h\n#5;h\n#3;d\n#5;d\n#wait;1000"
90002100-11 = "1;케이 프로토;01\n5;아리스 결전;03;맞습니다! 용사에게 용기는 가장 중요한 무장입니다!\n#5;a\n#1;a\n#5;em;[반짝]"
90002100-12 = "1;케이 프로토;04;당신까지 분위기를 타면 어떡합니까, 아리스……."
90002100-13 = "1;케이 프로토;04\n5;아리스 결전;03\n#1;h\n#5;h"
90002100-14 = "[ns] \"자, 자. 우선은 비나의 구역으로 가는 거야. 맞지?\""
90002100-15 = "3;리오 결전;01;비나의 구역을 확보한 다음부터는, 조금 더 수월해질 거야. 수송선 자체를 베이스로 해서 이동하면 되니까.\n#3;em;[...]\n#1;hide\n#5;hide"
90002100-16 = "3;리오 결전;99;비나의 코어를 확보하고, 강철대륙 네트워크의 접속 권한을 얻은 다음의 행보는…… 선생이 결정하면 될 문제라는 거지."
90002100-17 = "3;히마리 결전 비무장;02;크게 두 팀으로 나눠서 대응하는 것이 좋아 보이지만, 팀의 구성원은 상황에 따라 언제든지 바뀔 수 있어요."
90002100-18 = "3;히마리 결전 비무장;01;애초에 그것을 위해 수송선을 베이스로 삼은 것이기도 하고요."
90002100-19 = "5;에이미 결전;01;그래도 각 예언자의 구역을 점령한 다음에는, 꼭 케이를 불러 줘야 해.\n#5;al\n#5;em;[반응]"
90002100-20 = "1;토키 결전;01;네. 그렇게 하면 케이가 예언자의 코어 정보를 흡수해, 우리의 전력으로 바꾸어 줄 겁니다.\n#1;a"
90002100-21 = "5;아리스 결전;01\n1;케이 프로토;07;……거 사람을 무슨 적을 삼키고 능력을 카피하는 동그란 생명체처럼 묘사하지 마시죠.\n#1;em;[한숨]\n#3;hide"
90002100-22 = "5;아리스 결전;07;아, 케이도 그 게임 아는군요! 정말 갓겜입니다!\n#5;hophop\n#5;em;[재잘]"
90002100-23 = "5;아리스 결전;07\n1;케이 프로토;07\n#5;h\n#1;h"
90002100-24 = "[ns] \"혹시나 해서 묻는 건데, 케이도 게임 좋아해?\""
90002100-25 = "1;케이 프로토;13;그그그그, 그럴 리가요! 이건 그냥 아리스와 동기화되었던 때의 기억과 경험이 남아있는 것뿐이니까–!\n#1;shake\n#1;em;[///]"
90002100-26 = "5;아리스 결전;99;그렇군요……. 케이에게는 아리스와의 기억이 부담스러운 것이었군요…….\n#fontsize;50"
90002100-27 = "1;케이 프로토;06;아뇨! 절대 아니에요, 아리스! 그럴 리가 없잖습니까! 제 말은 그런 게 아니라, 그러니까……!\n#1;em;[!]\n#1;jump"
90002100-28 = "5;아리스 결전;06;괜찮습니다……. 아리스는 그래도 케이를 소중히 여기고 싶습니다……. 케이가 아리스를 어떻게 여기든지…….\n#5;em;[세로선]"
90002100-29 = "1;케이 프로토;13;아니, 아니라고요! 제가 그럴 리 없잖아요! 제 말 좀 잘 들어보세요!!!\n#1;hophop"
90002100-30 = "3;아리스 결전;12;괜찮습니다, 케이. 아리스는 괜찮습니다…….\n#3;stiff\n#3;closeup\n#1;hide\n#5;hide"
90002100-31 = "3;케이 프로토;13;아리스–!!!\n#3;closeup\n#fontsize;80"
90002100-32 = "#st;[0,0];instant;1;"
90002100-33 = "#clearST"
90002100-34 = "3;아리스 결전;12\n#3;closeup\n#wait;1000"
90002100-35 = "3;아리스 결전;19\n#3;closeup\n#3;em;[음표]\n#wait;1500"
90002100-36 = "3;아리스 결전;19\n1;???;00\n#3;closeup\n#1;hide"
90002100-37 = "#na;(바로 그 순간……!)"
90002100-38 = "#na;(아리스는 이쪽을 살짝 바라보며, 장난스러운 웃음을 보여주었다……!)"
90002100-39 = "3;아리스 결전;19\n#3;closeup\n#3;h"
90002100-40 = "[ns] \"그만 놀리렴, 아리스…….\""
90002100-41 = "3;아리스 결전;03;에헤헤. 죄송합니다, 선생님. 케이.\n#3;em;[재잘]\n#3;closeup"
90002100-42 = "3;케이 프로토;04;예? 놀려……? 네? 그러니까, 어? 어어???\n#3;em;[땀]\n#3;stiff"
90002100-43 = "[ns] \"하지만 케이를 놀리는 건 재미있지…….\""
90002100-44 = "3;아리스 결전;07;맞습니다! 선생님도 잘 알고 계시는군요!\n#3;jump"
90002100-45 = "3;케이 프로토;02;…….\n#3;em;[...]"
90002100-46 = "3;케이 프로토;06;………."
90002100-47 = "3;케이 프로토;07;………….\n#3;stiff"
90002100-48 = "3;케이 프로토;13;선생님이 제일 나빴어요–!!!\n#3;closeup\n#fontsize;80"
90002100-49 = "4;에이미 결전;01\n2;토키 결전;01\n#4;h\n#2;h\n#3;hide"
90002100-50 = "4;에이미 결전;01\n2;토키 결전;02;그러면, 선생님. 가시죠. 저 아스마 토키가, 선생님의 완벽한 메이드로서 보조하겠습니다.\n#2;em;[반응]"
90002100-51 = "4;에이미 결전;04;그런데 그 복장으로 메이드는 아니지 않을까……?\n#4;em;[?]"
90002100-52 = "4;에이미 결전;04\n2;토키 결전;01;선생님의 완벽한 특수요원으로서 보조하겠습니다."
90002100-53 = "4;에이미 결전;07;태세 전환이 빨라졌네, 토키…….\n#4;em;[...]"
90002100-54 = "4;에이미 결전;07\n2;토키 결전;99;그렇지만 선생님. 이것이야말로 상황과 분위기에 맞춰 기민하게 대응하는."
90002100-55 = "4;에이미 결전;07\n2;토키 결전;01;우수한 특수요원으로서의 기본적인 태도가 아닐까요. 브이.\n#2;em;[반짝]"
90002100-56 = "[s] \"그래, 그래…….\""
90002100-57 = "3;케이 프로토;01;저기요. 다들 슬슬 시작해야 할 것 같지 않나요?\n#2;hide\n#4;hide"
90002100-58 = "5;히마리 결전 비무장;01\n1;리오 결전;02;그래. 우선은 모두 자리로 돌아가 줘.\n#3;hide"
90002100-59 = "5;히마리 결전 비무장;03;그러면, 선생님. 다시 지휘권을 돌려드리겠습니다.\n#5;em;[음표]"
90002100-60 = "[s] \"부담스럽구만~\""
90002100-61 = "5;히마리 결전 비무장;02;어머나. 하지만 어떤 의미에서는 익숙한 일 아니신가요?"
90002100-62 = "[s] \"그것도 그렇지~\""
