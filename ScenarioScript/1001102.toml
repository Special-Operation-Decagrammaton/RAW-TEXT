[translation]
1001102-1 = "เวลาของว่าง"
1001102-2 = "ทางเข้าสวนต้นบ๊วย"
1001102-3 = "อุ้ย คุณครูคะ มาที่สวนต้นบ๊วยแบบนี้มีธุระอะไรรึเปล่าคะ?"
1001102-4 = "เวลาของว่างเหรอคะ? ใช่แล้วค่ะ ฉันกำลังจะแจกขนมให้กับนักเรียนของสวนต้นบ๊วยค่ะ...."
1001102-5 = "โอ๊ะ ฉันเผลอส่งข้อความไปให้คุณครูด้วยอย่างนั้นเหรอคะ ฉันนี่แย่จริงๆ เลย"
1001102-6 = "แต่ก็พอดีเลยนะคะ ไหนๆ คุณครูก็มาแล้ว สนใจมาร่วมรับประทานขนมกับพวกเราไหมคะ"
1001102-7 = "ไม่ต้องห่วงค่ะ ฉันเตรียมผลไม้กับขนมไว้เยอะมากเลยค่ะ!"
1001102-8 = "อีกอย่าง... ฉันมีเรื่องที่อยากถามคุณครูด้วยค่ะ เอาละค่ะ เชิญค่ะ มาทางนี้สิคะ"
1001102-11 = "ห้องครัวสวนต้นบ๊วย"
1001102-12 = "ฮุฮุ ทุกอย่างดูสดใหม่มากๆ เลยใช่ไหมคะ? พอบอกว่าจะนำผลไม้ไปแจกให้กับพวกเด็กๆ#nทางย่านการค้าก็เลยเลือกแต่ผลไม้ที่สดใหม่มาให้เราทั้งนั้นเลยค่ะ"
1001102-13 = "แต่ว่าพวกเขาส่งมาเยอะมากเกินไปจนน่าจะจัดการคนเดียวไม่ไหวค่ะ คุณครูช่วยฉันล้างและเตรียม#nผลไม้พวกนี้หน่อยได้ไหมคะ?"
1001102-14 = "ไหนดูซิ... เดี๋ยวฉันจะล้างลูกพลับกับลูกแพร์เองค่ะ ส่วนคุณครูช่วยปอกแอปเปิลให้หน่อยนะคะ"
1001102-15 = "[s] \"ได้เลย\""
1001102-17 = "ไหนดูซิคะ โอ้โห... คุณครูปอกแอปเปิลได้สวยมากเลยค่ะ!"
1001102-18 = "ฝีมือละเอียดอ่อนแบบนี้ ต่อไปคุณครูจะต้องเป็นผู้ใหญ่ที่ยอดเยี่ยมมากแน่ๆ เลยค่ะ"
1001102-19 = "โอ๊ะๆ ฉันหมายถึงว่าคุณครูเป็นผู้ใหญ่ที่ยอดเยี่ยมอยู่แล้วค่ะ ปกติฉันจะอยู่แต่กับพวกเด็กๆ เลยมัก#nติดการพูดอะไรแบบนี้ตลอดค่ะ"
1001102-20 = "ลองดูผลไม้ที่ฉันปอกสิคะ เป็นยังไงบ้างคะ?"
1001102-21 = "[s] \"ปอกได้สวยเลยนะ\""
1001102-22 = "จริงเหรอคะ? คุณครูชมฉันแบบนี้ดีใจจังเลยค่ะ ฮุฮุ...."
1001102-24 = "ถ้างั้นมาลองชิมดูก่อนดีไหมคะ? นี่ค่ะคุณครู อ้าม~"
1001102-25 = "ไม่ต้องอายหรอกค่ะ ลองชิมผลไม้ดูหน่อยสิคะ"
1001102-26 = "หรือว่า... คุณครูไม่อยากรับประทานผลไม้ที่ฉันป้อนงั้นเหรอคะ?"
1001102-27 = "จุ๊จุ๊! เด็กดีไม่ควรเลือกทานนะคะ! คุณครูเองก็เหมือนกันค่ะ!"
1001102-28 = "เอาละ อ้าปากสิคะ อ้ามมม~"
1001102-31 = "ฮุฮุ เก่งมากเลยค่ะ รสชาติเป็นยังไงบ้างคะ?"
1001102-32 = "[s] \"สดมากๆ แล้วก็รสชาติหวานดีด้วย\""
1001102-33 = "จริงเหรอคะ? ถ้างั้นคราวนี้คุณครูป้อนฉันหน่อยสิคะ"
1001102-34 = "อุ๊ย ไม่ต้องเขินหรอกค่ะ ถ้าฉันป้อนคุณครูอยู่ฝ่ายเดียวก็ไม่ยุติธรรมสิคะ"
1001102-36 = "ป้อนฉันหน่อยสิคะ อ้าม~"
1001102-38 = "[s] ป้อนผลไม้ให้ชุน"
1001102-40 = "อื้มมมม~ คงเป็นเพราะคุณครูป้อนให้แน่ๆ ผลไม้เลยหวานขึ้นกว่าเดิม..."
1001102-41 = "ถ้างั้นขออีกคำนะคะ.... อุ้ยตายจริง! เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย…"
1001102-43 = "ถ้าไม่รีบละก็ เดี๋ยวจะเลยเวลาของว่างแล้วนะคะ เร่งมือกันเถอะค่ะ"
1001102-44 = "คุณครูคะ ช่วยยกจานตรงนั้นไปหน่อยได้ไหมคะ เดี๋ยวฉันยกจานที่วางอยู่ตรงนี้ไปเองค่ะ"
1001102-45 = "ฮุฮุ อยากให้ถึงเวลาของว่างไวๆ แล้วละค่ะ"
