[translation]
1013403-1 = "起始之村"
1013403-3 = "老師，這個是……？"
1013403-4 = "[ns] 「是特訓哦！」"
1013403-5 = "唔嗯……可是這個……"
1013403-6 = "不就只是普通的遊戲嗎……？"
1013403-7 = "[ns] 「是特訓哦！」"
1013403-8 = "糟，糟糕！"
1013403-9 = "老師壞掉了！"
1013403-10 = "[s1] 「等等，你先聽我說！」\n[s2] 「目前愛麗絲還不習慣勇者的裝甲對吧！」"
1013403-15 = "[ns3] 「所以要先從讓身體適應開始！」\n[ns4] 「也就是要養成習慣！」"
1013403-18 = "讓身體適應……？"
1013403-19 = "大部分的運動員都會這麼做……？#n是創造最佳狀態的訣竅……？"
1013403-23 = "所以，只要穿著勇者的裝甲玩遊戲就可以了嗎？"
1013403-24 = "唔嗯……這樣為什麼能算是修行，愛麗絲不太明白。"
1013403-28 = "咦，老師？為什麼要關燈呢？"
1013403-29 = "……把燈關掉會更有沉浸感，這樣更有趣？"
1013403-30 = "那個，雖然愛麗絲也這麼認為……"
1013403-31 = "可是老師不是常說「關燈玩遊戲對眼睛不好」嗎？"
1013403-32 = "[s5] 「沒錯，平常不可以這樣。」\n[s6] 「不過今天是特訓所以例外。」"
1013403-35 = "……！"
1013403-36 = "不知道為什麼，開始有股心跳加速的感覺了！"
1013403-37 = "就跟半夜玩遊戲的時候，偷偷溜去便利商店的感覺很像！"
1013403-41 = "哈……！這件事應該要保密才對……！"
1013403-42 = "還，還是來玩遊戲吧！要玩什麼遊戲呢？"
1013403-43 = "咦？遊戲也是愛麗絲自己選嗎？"
1013403-44 = "愛麗絲喜歡的遊戲有很多！"
1013403-50 = "……每一款都是名作，所以選不出來！"
1013403-54 = "比如這款！"
1013403-55 = "這是一款拿大型武器狩獵龍的遊戲！"
1013403-56 = "玩家可以用狩獵龍得到的素材製作更強的武器，然後再去狩獵更強的龍！"
1013403-57 = "當然，光是裝備好不代表馬上就會變強！#n如果玩家本人沒有變強就沒有意義了！"
1013403-61 = "某方面來說，這可能是非常適合現在愛麗絲狀況的遊戲！"
1013403-62 = "[s] 「那就玩那款遊戲嗎？」"
1013403-63 = "……愛麗絲確實很喜歡這款遊戲。"
1013403-64 = "不過這款遊戲的遊玩時間非常長，現在玩的話好像有點不太適合。"
1013403-65 = "果然還是再看看其他的吧。"
1013403-66 = "啊，這款是……！"
1013403-70 = "以超級困難聞名的遊戲！"
1013403-71 = "地圖的各個角落都隱藏著會讓玩家即死的陷阱……"
1013403-72 = "就算好不容易到達Boss面前，#n也會因為不理解機制就必輸無疑的攻擊模式而瞬間敗北！"
1013403-73 = "正因如此，在不斷挑戰的過程中漸漸成長，最後順利通關的體驗才顯得無比珍貴！"
1013403-74 = "這麼說起來，跟現在愛麗絲的處境也很類似呢……"
1013403-75 = "[s] 「那就玩那款遊戲嗎？」"
1013403-76 = "……不。#n雖然愛麗絲確實很喜歡這款遊戲……"
1013403-77 = "可是如果玩這款遊戲的話，反而可能會對勇者的裝甲產生心理創傷……"
1013403-78 = "有沒有遊玩時間適中，又能讓人心情平靜的遊戲呢……"
1013403-83 = "啊。"
1013403-87 = "決定了。愛麗絲想玩這款。"
1013403-88 = "[s7] 「那個遊戲是……」\n[s8] 「《故事．傳說．編年史》？」"
1013403-91 = "是的！《故事．傳說．編年史》！#n準確來說是《故事．傳說．編年史１》！"
1013403-92 = "這是在愛麗絲加入遊戲開發部之前，遊戲開發部的大家一起製作的第一部作品。"
1013403-93 = "雖然愛麗絲並沒有參與製作的過程，#n不過在玩的時候能生動地感受到大家是懷著什麼樣的想法製作的。"
1013403-94 = "最重要的是，這款遊戲……"
1013403-95 = "是款爛遊戲！"
1013403-96 = "[s9] 「愛，愛麗絲！？」\n[s10] 「雖然有聽說過這款遊戲非同小可……！」"
1013403-99 = "因為這是事實！"
1013403-100 = "第一次玩的時候還不知道，但是現在接觸過各種遊戲的愛麗絲可以斷言。"
1013403-101 = "《故事．傳說．編年史１》是款真．正．的．爛．遊．戲！"
1013403-105 = "……不過，愛麗絲還是想選它。"
1013403-106 = "因為這是愛麗絲第一次玩的遊戲。"
1013403-107 = "這款遊戲，是第一次稱呼愛麗絲為勇者的遊戲。"
1013403-108 = "……所以愛麗絲還是很喜歡。"
1013403-109 = "而且遊玩時間也剛剛好！"
1013403-110 = "知道怎麼攻略的話，3小時之內就能達到True End！"
1013403-111 = "來，老師！一起玩吧！"
1013403-113 = "（就這樣被愛麗絲推著一起玩了《故事．傳說．編年史１》）"
1013403-115 = "[56cd7b]宇宙世紀2354年，人類被劫火之炎所包圍……[-]"
1013403-116 = "明明說是正統奇幻RPG，結果開場的序言卻是這樣呢！"
1013403-117 = "而且「宇宙世紀」這個專有名詞，從頭到尾就只出現在這裡而已！"
1013403-118 = "[56cd7b]開始進行新手教學。[-]"
1013403-120 = "[56cd7b]首先請按下B鍵，將眼前的武器裝備起來吧。[-]"
1013403-121 = "啊，這是陷阱。#n要是在這裡按B鍵的話就會直接Game Over了。"
1013403-122 = "要按A鍵才能繼續。"
1013403-124 = "[ns11] 「比我聽說的還要奇怪呢……」\n[ns12] 「真的能在3小時內通關嗎？」"
1013403-127 = "唔嗯……如果不知道攻略的話，可能一輩子都無法通關也說不定呢。"
1013403-128 = "不過對於愛麗絲這種熟練玩家來說不成問題！"
1013403-130 = "啊。"
1013403-131 = "沒有遭遇敵人就抵達第一個村莊了。"
1013403-132 = "初期的回復手段相對有限，運氣很不錯呢！"
1013403-138 = "……這首「起始之村」的BGM。"
1013403-139 = "愛麗絲真的很喜歡。#n聽著聽著，感覺就像回到了第一次遇見這款遊戲的時候一樣。"
1013403-140 = "……呵呵。"
1013403-141 = "真是不可思議。#n當時的愛麗絲，就像剛出生的嬰兒一樣什麼都不知道。"
1013403-142 = "在那之後獲得了光之劍、遇見了夥伴……經歷了無數的冒險……"
1013403-143 = "現在還來到了這麼遙遠的冰海。"
1013403-144 = "真的就像勇者的冒險一樣。"
1013403-145 = "某種意義上來說，這個「起始之村」也是愛麗絲的起點。"
1013403-149 = "……啊！遇到怪物了！"
1013403-150 = "是拿著雙管霰彈槍的史萊姆！這個敵人很難用近戰對付！#n所以現在應該……"
1013403-152 = "（就這樣繼續和愛麗絲一起玩了《故事．傳說．編年史》）"
1013403-153 = "（然後……）"
1013403-156 = "……這樣就打倒最終Boss了！"
1013403-157 = "咦，老師？怎麼了嗎？"
1013403-158 = "表情就像悲傷的小狗一樣！"
1013403-159 = "[s] 「那個，愛麗絲……我可以問一件事嗎？」"
1013403-163 = "[ns13] 「為什麼母親是女主角，而且還是前世的妻子……」\n[ns14] 「然後妻子又是從小分開且同父異母的朋友穿越時空而來的？」"
1013403-167 = "愛麗絲也不知道！"
1013403-168 = "但是……"
1013403-169 = "不覺得很有趣嗎？"
1013403-170 = "[s15] 「……是啊。」\n[s16] 「真的很有趣。」"
1013403-173 = "果然是這樣嗎？愛麗絲也覺得非常有趣！"
1013403-174 = "那麼接下來……"
1013403-176 = "（就這樣自然而然地繼續玩著遊戲）"
1013403-177 = "（之後的一段時間裡，都和愛麗絲一起享受了各種遊戲）"
