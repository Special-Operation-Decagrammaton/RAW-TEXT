[translation]
1013403-1 = "หมู่บ้านแห่งการเริ่มต้น"
1013403-3 = "คือว่า คุณครูคะ นี่มัน...?"
1013403-4 = "[ns] \"การฝึกฝนพิเศษไงล่ะ!\""
1013403-5 = "อ่า... แต่ว่านี่มัน..."
1013403-6 = "แค่เกมไม่ใช่เหรอคะ?"
1013403-7 = "[ns] \"เป็นการฝึกฝนพิเศษไงล่ะ!\""
1013403-8 = "กะ... เกิดเรื่องใหญ่แล้วค่ะ!"
1013403-9 = "คุณครูเครื่องรวนแล้วค่ะ!"
1013403-10 = "[s1] \"เดี๋ยวสิๆ ฟังครูก่อน!\"\n[s2] \"ตอนนี้อาริสึยังไม่คุ้นกับชุดเกราะของผู้กล้าไม่ใช่เหรอ? \""
1013403-15 = "[ns3] \"งั้นก็ต้องเริ่มจากการทำให้ร่างกายคุ้นชินสิ!\"\n[ns4] \"งั้นก็ต้องทำให้ร่างกายคุ้นชินก่อนสิ!\""
1013403-18 = "ทำให้ร่างกายคุ้นชิน...?"
1013403-19 = "นักกีฬาส่วนใหญ่ก็ทำแบบนั้นเหมือนกัน...? และมันก็เป็นเคล็ดลับในการสร้างฟอร์มที่ดีที่สุดด้วย...?"
1013403-23 = "สรุปว่าอาริสึแค่ต้องเล่นเกมในชุดเกราะของผู้กล้างั้นเหรอคะ?"
1013403-24 = "อืม... อาริสึไม่เข้าใจเลยค่ะว่านั่นมันจะเป็นการฝึกฝนยังไง"
1013403-28 = "เอ๋ คุณครูคะ? ทำไมถึงปิดไฟล่ะคะ?"
1013403-29 = "ถ้าปิดไฟ ก็จะสมจริงและสนุกยิ่งขึ้นงั้นเหรอคะ?"
1013403-30 = "เรื่องนั้นอาริสึก็เห็นด้วยค่ะ แต่ว่า..."
1013403-31 = "คุณครูเคยกำชับอยู่บ่อยๆ ไม่ใช่เหรอคะว่าถ้าปิดไฟเล่นเกมแล้วจะเสียสายตาน่ะ?"
1013403-32 = "[s5] \"ก็ใช่อยู่หรอก ในเวลาปกติน่ะนะ\"\n[s6] \"วันนี้ยกเว้นให้เพราะเป็นการฝึกฝนพิเศษน่ะ\""
1013403-35 = "...!"
1013403-36 = "เริ่มตื่นเต้นขึ้นมาแล้วสิคะ!"
1013403-37 = "รู้สึกเหมือนตอนที่เล่นเกมจนดึกแล้วแอบย่องไปร้านสะดวกซื้อเลยค่ะ!"
1013403-41 = "อ๊ะ...! นั่นมันความลับนี่คะ...!"
1013403-42 = "วะ... ว่าแต่เกมนี้! ต้องเล่นยังไงเหรอคะ?"
1013403-43 = "คะ? ให้อาริสึเลือกเกมได้ตามใจเลยเหรอคะ?"
1013403-44 = "มีเกมที่อาริสึชอบอยู่เพียบเลยค่ะ!"
1013403-50 = "แต่ก็เป็นเกมเทพทั้งนั้นเลย อาริสึเลือกไม่ถูกเลยค่ะ...!"
1013403-54 = "อย่างเช่นเกมนี้!"
1013403-55 = "นี่เป็นเกมที่ต้องล่ามังกรด้วยอาวุธขนาดยักษ์ค่ะ!"
1013403-56 = "ส่วนไอเทมที่ได้จากการล่ามังกร ก็เอามาสร้างเป็นอาวุธที่ทรงพลังกว่าเดิมเพื่อล่ามังกรตัวที่แข็งแกร่ง#nกว่าเดิมได้ค่ะ!"
1013403-57 = "แน่นอนว่าการมีอุปกรณ์ที่ดีก็ไม่ได้แปลว่าเราจะเก่งขึ้นทันทีค่ะ! ถ้าตัวละครไม่แข็งแกร่งเอง อุปกรณ์ที่มีก็ไร้ความหมายค่ะ!"
1013403-61 = "จะว่าไป นี่เป็นเกมที่เหมาะกับสถานการณ์ของอาริสึในตอนนี้เลยนะคะ!"
1013403-62 = "[s] \"งั้นเล่นเกมนี้มั้ย?\""
1013403-63 = "อาริสึก็ชอบเกมนี้อยู่หรอกค่ะ แต่ว่า..."
1013403-64 = "เกมนี้ใช้เวลาเล่นนานมาก ถ้าเล่นตอนนี้คงไม่เหมาะค่ะ"
1013403-65 = "ขอเลือกต่ออีกหน่อยดีกว่าค่ะ"
1013403-66 = "อ๊ะ เกมนี้...!"
1013403-70 = "เกมนี้ขึ้นชื่อเรื่องความยากแบบเหลือเชื่อเลยค่ะ!"
1013403-71 = "นอกจากกับดักที่ซ่อนอยู่เต็มไปหมดจนทำให้ตัวละครตายได้ทันทีแล้ว..."
1013403-72 = "ยังมีบอสที่ต่อให้เล่นไปถึงแบบหวุดหวิด ก็จะโจมตีด้วยแพทเทิร์นที่คาดไม่ถึงจนเราแพ้ได้ในพริบตา#nเลยค่ะ!"
1013403-73 = "แต่ทุกครั้งที่เราท้าทาย ประสบการณ์ที่เราได้จากการพัฒนาทีละน้อยก็เป็นสิ่งที่มีค่าเกินกว่าอะไรทั้งสิ้น#nเลยละค่ะ!"
1013403-74 = "จะว่าไปแล้ว นี่ก็เหมือนสถานการณ์ของอาริสึในตอนนี้เลยนะคะ..."
1013403-75 = "[s] \"งั้นก็เล่นเกมนั้นมั้ย?\""
1013403-76 = "ไม่ดีกว่าค่ะ... ถึงมันจะเป็นเกมที่อาริสึชอบ"
1013403-77 = "แต่ถ้าเล่นเกมนี้ อาริสึน่าจะเกิดบาดแผลทางใจจากชุดเกราะของผู้กล้าก็ได้ค่ะ..."
1013403-78 = "ต้องหาเกมที่ใช้เวลาเล่นที่เหมาะสม และทำให้รู้สึกสบายใจ..."
1013403-83 = "อ๊ะ"
1013403-87 = "เลือกได้แล้วค่ะ อาริสึเอาเกมนี้ค่ะ"
1013403-88 = "[s7] \"เกมนี้มัน...\"\n[s8] \"<เทลส์ ซาก้า โครนิเคิล>?\""
1013403-91 = "ค่ะ! เกม <เทลส์ ซาก้า โครนิเคิล> ถ้าจะให้ถูกต้องเลยก็คือ <เทลส์ ซาก้า โครนิเคิล 1> ค่ะ!"
1013403-92 = "เป็นเกมแรกที่ชมรมพัฒนาเกมทุกคนช่วยกันสร้างขึ้นตั้งแต่ก่อนที่อาริสึจะมาเข้าชมรมพัฒนาเกมอีกค่ะ"
1013403-93 = "ถึงอาริสึจะไม่ได้อยู่ด้วยระหว่างกระบวนการสร้างสรรค์ แต่ก็ได้ฟังเรื่องราวมาว่าทุกคนสร้างเกมนี้ด้วย#nความมุ่งมั่นแบบไหนค่ะ"
1013403-94 = "และที่สำคัญกว่านั้นก็คือ เกมนี้..."
1013403-95 = "เป็นเกมกากค่ะ!"
1013403-96 = "[s9] \"อะ... อาริสึ?!\"\n[s10] \"ครูก็เคยได้ยินอยู่หรอกว่าไม่ใช่เกมธรรมดา...!\""
1013403-99 = "แต่ก็เป็นเรื่องจริงค่ะ!"
1013403-100 = "ตอนเล่นครั้งแรก อาริสึไม่รู้เลยค่ะ แต่ตอนนี้อาริสึเล่นเกมมาอย่างโชกโชนแล้ว ก็เลยพูดได้ค่ะ"
1013403-101 = "ว่าเกม <เทลส์ ซาก้า โครนิเคิล 1> เป็นเกมที่ กาก ไม่ มี ใคร เกิน ค่ะ"
1013403-105 = "แต่ยังไงอาริสึก็ชอบเกมนี้นะคะ..."
1013403-106 = "นี่เป็นเกมแรกที่อาริสึได้เล่นค่ะ"
1013403-107 = "และเกมนี้ก็ทำให้อาริสึได้ชื่อว่าเป็นผู้กล้าเป็นครั้งแรกค่ะ"
1013403-108 = "อาริสึชอบเกมนี้จริงๆ ค่ะ..."
1013403-109 = "ส่วนเวลาที่ใช้ในการเล่นก็เหมาะสมนะคะ!"
1013403-110 = "ถ้ารู้จักวิธีบุกละก็ จะเล่นไปถึงตอนจบที่แท้จริงได้ภายใน 3 ชั่วโมงเท่านั้นค่ะ!"
1013403-111 = "เอาละ คุณครู! เรามาเล่นด้วยกันนะคะ!"
1013403-113 = "(แล้วคุณครูก็ได้เล่นเกม <เทลส์ ซาก้า โครนิเคิล 1> กับอาริสึตามคำชวน)"
1013403-115 = "[56cd7b]< ยุคคอสมอส ปี 2354 มนุษยชาติตกอยู่ในเปลวเพลิงอันโชติช่วง >[-]"
1013403-116 = "บอกว่าเป็นเกม RPG แนวแฟนตาซีแท้ๆ แต่ตอนเริ่มเกมก็ใช้บทนำแบบนี้เฉยเลยค่ะ!"
1013403-117 = "แล้วที่บอกว่าเป็นยุคคอสมอส ชื่อยุคก็ถูกพูดถึงแค่ในตอนนี้ด้วยค่ะ!"
1013403-118 = "[56cd7b]< เริ่มโหมดฝึกสอน >[-]"
1013403-120 = "[56cd7b]< กรุณากดปุ่ม B แล้วติดตั้งอาวุธ >[-]"
1013403-121 = "อ๊ะ อันนี้เป็นกับดักหลอกกันค่ะ ถ้ากดปุ่ม B ตรงนี้ละก็ เกมโอเวอร์แน่ค่ะ"
1013403-122 = "ถ้าจะเล่นต่อก็ต้องกดปุ่ม A ค่ะ"
1013403-124 = "[ns11] \"เป็นเกมที่แปลกกว่าที่เคยได้ยินมาอีกนะ จะไหวมั้ยเนี่ย...\"\n[ns12] \"เล่นจบได้ใน 3 ชั่วโมงจริงๆ เหรอ?\""
1013403-127 = "อืม... ถ้าไม่รู้กลยุทธ์ ก็อาจจะเคลียร์ไม่ได้ไปทั้งชีวิตก็ได้นะคะ"
1013403-128 = "แต่สำหรับผู้เล่นมากประสบการณ์อย่างอาริสึแล้วละก็ ไม่มีปัญหาหรอกค่ะ!"
1013403-130 = "อ๊ะ"
1013403-131 = "มาถึงหมู่บ้านโดยไม่เจอศัตรูเลยค่ะ"
1013403-132 = "ถือว่าโชคดีที่ในช่วงแรกมีวิธีฟื้นฟูที่จำกัดนะคะ! "
1013403-138 = "ส่วนเพลง BGM ของ 'หมู่บ้านแห่งการเริ่มต้น' เพลงนี้..."
1013403-139 = "อาริสึชอบมากๆ เลยค่ะ พอได้ฟังอีกครั้ง ก็รู้สึกเหมือนได้ย้อนกลับไปในตอนที่ได้รู้จักเกมนี้เป็นครั้งแรก#nเลยค่ะ"
1013403-140 = "ฮุฮุ..."
1013403-141 = "น่าทึ่งจังเลยนะคะ ตอนนั้นอาริสึเหมือนเป็นเด็กแรกเกิดที่ไม่รู้อะไรเลย"
1013403-142 = "แต่หลังจากนั้นก็ได้ดาบแห่งแสง ได้เจอเหล่าสหาย... แล้วก็ได้ออกผจญภัยมากมาย..."
1013403-143 = "จนตอนนี้ได้มาอยู่ในธารน้ำแข็งที่แสนไกลแบบนี้ค่ะ"
1013403-144 = "เหมือนเป็นการผจญภัยของผู้กล้าจริงๆ เลยนะคะ"
1013403-145 = "ในแง่หนึ่ง 'หมู่บ้านแห่งจุดเริ่มต้น' แห่งนี้ก็เป็นจุดเริ่มต้นสำหรับอาริสึเหมือนกันค่ะ"
1013403-149 = "อ๊ะ...! เจอมอนสเตอร์ค่ะ!"
1013403-150 = "นี่คือพูนี่เยลลี่ที่ถือปืนลูกซองสองลำกล้องค่ะ! เป็นศัตรูที่รับมือยากในการต่อสู้ระยะประชิดค่ะ! งั้นตรงนี้ก็ต้อง..."
1013403-152 = "(คุณครูเล่นเกม <เทลส์ ซาก้า โครนิเคิล 1> กับอาริสึ)"
1013403-153 = "(และ...)"
1013403-156 = "เคลียร์บอสตัวสุดท้ายได้แล้วค่ะ...!"
1013403-157 = "เอ๋ คุณครู? เป็นอะไรไปเหรอคะ?"
1013403-158 = "ทำหน้าเหมือนน้องหมาตัวน้อยที่เศร้าสร้อยเลยค่ะ!"
1013403-159 = "[s] \"นี่ อาริสึ... ครูขอถามอะไรอย่างหนึ่งได้มั้ย?\""
1013403-163 = "[ns13] \"ทำไมตัวเอกที่เป็นแม่คือภรรยาในชาติก่อนล่ะ?\"\n[ns14] \"ทำไมภรรยาถึงข้ามเวลามาหาเพื่อนที่จากกันไปในอดีตล่ะ?\""
1013403-167 = "อาริสึก็ไม่รู้เหมือนกันค่ะ!"
1013403-168 = "แต่ว่า..."
1013403-169 = "มันก็สนุกดีไม่ใช่เหรอคะ?"
1013403-170 = "[s15] \"นั่นสินะ...\"\n[s16] \"สนุกมากเลยละ\""
1013403-173 = "ใช่มั้ยล่ะคะ? อาริสึก็สนุกมากเหมือนกันค่ะ!"
1013403-174 = "ถ้างั้นต่อไปก็..."
1013403-176 = "(แล้วอาริสึก็เลือกเกมเล่นต่อไปเรื่อยๆ)"
1013403-177 = "(คุณครูกับอาริสึได้ใช้เวลาเล่นเกมด้วยกันอย่างสนุกสนาน)"
