[translation]
1013403-1 = "Starting Village"
1013403-3 = "Excuse me, Sensei? What...is this?"
1013403-4 = "[ns] \"It's special training!\""
1013403-5 = "Uh... But this..."
1013403-6 = "Are these not games?"
1013403-7 = "[ns] \"It's special training!\""
1013403-8 = "Th-This is an emergency!"
1013403-9 = "Sensei has finally broken! They are malfunctioning!"
1013403-10 = "[s1] \"No, no! Just hear me out for a second.\"\n[s2] \"Right now, you're still settling into your hero armor.\""
1013403-15 = "[ns3] \"So, basically, you just have to break it in!\"\n[ns4] \"Build a routine and familiarity with it!\""
1013403-18 = "Break...it in...?"
1013403-19 = "Like an athlete breaking in shoes...? A way to raise my proficiency?"
1013403-23 = "So all I must do is play games while I have the hero's armor equipped?"
1013403-24 = "Hm... I am still confused as to how this is training."
1013403-28 = "Sensei? Why are you turning off the lights?"
1013403-29 = "...Games feel more immersive in the dark?"
1013403-30 = "I do think so too, however..."
1013403-31 = "You are always telling me that it is bad for my eyes if I play with the lights off!"
1013403-32 = "[s5] \"Yes. This is something you normally shouldn't do.\"\n[s6] \"But we're making an exception for special training!\""
1013403-35 = "...!"
1013403-36 = "For some reason, that made me feel very excited!"
1013403-37 = "Like the time when I played games until really late, and I had to break into the convenience store to get snacks!"
1013403-41 = "Ah...! That was a secret...!"
1013403-42 = "A-Anyway, game! The game! What should I play?"
1013403-43 = "Really? I can choose any game I like?"
1013403-44 = "I have many I enjoy!"
1013403-50 = "...There are so many masterpieces, it is difficult to pick one."
1013403-54 = "For example, this game!"
1013403-55 = "In this game, you hunt dragons with a giant weapon!"
1013403-56 = "Then, with the materials you gain from hunting, you can create even stronger weapons to hunt even stronger dragons!"
1013403-57 = "Of course, it is not just about the equipment! You will not be able to use anything you make until your character is strong enough to wield them!"
1013403-61 = "Now that I say it, I believe this game is exactly like what I am going through right now!"
1013403-62 = "[s] \"Then do you want to play it?\""
1013403-63 = "...I do like this game."
1013403-64 = "But the playtime is very long, so I do not believe it would be a good choice right now."
1013403-65 = "Let me think a little more."
1013403-66 = "...Oh, this game!"
1013403-70 = "This one is infamous for its high difficulty!"
1013403-71 = "There are innumerable insta-kill traps hidden across the map!"
1013403-72 = "And if you do not learn the boss' attack patterns, it will kill you immediately as well!"
1013403-73 = "But the arduous journey of slowly inching a little further forward with every challenge makes clearing the game a truly fulfilling feeling!"
1013403-74 = "This, too, sounds like my current situation, actually..."
1013403-75 = "[s] \"How about that one then?\""
1013403-76 = "...No. Though I do like this game..."
1013403-77 = "I do not want to associate such terrible memories with the hero's armor."
1013403-78 = "A game that has the right amount of playtime, and something that feels pleasant..."
1013403-83 = "Ah."
1013403-87 = "I have chosen one. I believe this is the perfect pick."
1013403-88 = "[s7] \"That game...\"\n[s8] \"Tales Saga Chronicle?\""
1013403-91 = "Yes! Tales Saga Chronicle, or more precisely, Tales Saga Chronicle 1!"
1013403-92 = "It is the first game the Game Development Department created together, before I joined."
1013403-93 = "Though I was not with them during that time, I can feel vividly what kind of thought process went into the game when I play it."
1013403-94 = "And more importantly, this game..."
1013403-95 = "...is very bad!"
1013403-96 = "[s9] \"A-Aris?!\"\n[s10] \"I HAVE heard that it's one of a kind...!\""
1013403-99 = "It is true!"
1013403-100 = "I did not know when I first played, but, now that I have mastered many games, I am confident in this evaluation!"
1013403-101 = "Tales Saga Chronicle 1 is a total disaster of a game!"
1013403-105 = "...But I still like it."
1013403-106 = "It is the first game I ever played."
1013403-107 = "The first game to call me \"hero.\""
1013403-108 = "...I truly do love this game."
1013403-109 = "And it is the perfect length as well!"
1013403-110 = "As long as you know what to do, you can reach the true ending in three hours!"
1013403-111 = "Now, Sensei! Let us play together!"
1013403-113 = "So I was...convinced into playing Tales Saga Chronicle 1 with her."
1013403-115 = "[56cd7b]Cosmic Calendar Year 2354. Mankind is engulfed in the flames of retribution.[-]"
1013403-116 = "They say it is a traditional fantasy RPG, yet this is how they start the opening!"
1013403-117 = "On top of that, this is the only place they use that term, the Cosmic Calendar Year!"
1013403-118 = "[56cd7b]Beginning tutorial.[-]"
1013403-120 = "[56cd7b]Press the B button to equip the weapon in front of you.[-]"
1013403-121 = "Oh, this is a trap. If you press the B button, it is game over."
1013403-122 = "You must press A to proceed."
1013403-124 = "[ns11] \"It's more bizarre than what I've heard...\"\n[ns12] \"Are you sure we can clear this in just three hours?\""
1013403-127 = "Hm... As a newbie, it would likely be impossible."
1013403-128 = "However, I am a veteran player! It will be no problem!"
1013403-130 = "Ah."
1013403-131 = "We arrived at the first village without encountering any enemies."
1013403-132 = "Means of HP recovery are very limited in the beginning, so we were lucky!"
1013403-138 = "...This is the BGM for the starting village."
1013403-139 = "I really like it. Hearing it reminds me of the first time I played this game."
1013403-140 = "...Heehee."
1013403-141 = "It is very interesting to look back. I was like a newborn baby back then, completely ignorant of everything."
1013403-142 = "Since then, I have been bequeathed the Sword of Light, made friends, and gone on many adventures."
1013403-143 = "And now, I am far away from home, all the way in the Glacial Sea."
1013403-144 = "It really does feel like I have been on a hero's journey!"
1013403-145 = "The starting village in this game was the beginning for me as well."
1013403-149 = "...Ah! We have encountered a monster!"
1013403-150 = "It is a Puny Jelly with a double-barrel shotgun! It is difficult to handle with close combat! Here..."
1013403-152 = "I played Tales Saga Chronicle 1 with Aris."
1013403-153 = "A little while later..."
1013403-156 = "...With that, we have defeated the final boss!"
1013403-157 = "Sensei...? Is something wrong?"
1013403-158 = "You look like a sad puppy again!"
1013403-159 = "[s] \"Hey, Aris... Can I ask you one thing?\""
1013403-163 = "[ns13] \"Why is the mom, my wife in a previous life, a love interest?\"\n[ns14] \"Why is my wife my time-leaped 'step-friend' that I was separated from as a child?\""
1013403-167 = "I have no idea!"
1013403-168 = "But..."
1013403-169 = "Was it not fun?"
1013403-170 = "[s15] \"...You're right.\"\n[s16] \"It was really fun.\""
1013403-173 = "You agree, Sensei? I had a lot of fun as well!"
1013403-174 = "Then, for the next one..."
1013403-176 = "Before I knew it, we'd gone through more games than I could count."
1013403-177 = "We spent more time playing than we should have, but it was really fun."
