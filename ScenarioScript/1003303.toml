[translation]
1003303-1 = "A Solo Date Together"
1003303-2 = "Today is my first day off from Schale work in a while."
1003303-3 = "[s1] \"I've needed this...\"\n[s2] \"Now I have time for things I put off because of work.\""
1003303-11 = "First, I went to the shopping mall down the street from Schale."
1003303-12 = "[s] \"It looks like they're having some kind of sale.\""
1003303-13 = "Hello! Thank you all for shopping with us today! "
1003303-14 = "To mark our store's 15th anniversary, we're offering a special discount on our highest-grade premium wagyu beef!"
1003303-15 = "We only have 100 packs in stock, and it's first come, first served.#nDon't miss out on this opportunity!"
1003303-16 = "The sale starts NOW!"
1003303-21 = "I fought the crowd and managed to get a place in line, thankfully."
1003303-22 = "Next! Here you are. Thank you for shopping with us... Next!"
1003303-26 = "It was finally my turn after a long wait."
1003303-27 = "Here you are. Our very last pack! "
1003303-33 = "Hmph."
1003303-34 = "I'll be taking that!"
1003303-35 = "Oh! B-But, sir...!"
1003303-36 = "[s] \"Hold up! You can't just cut the line!\""
1003303-37 = "\"Cut,\" you say?"
1003303-38 = "No. I merely passed you because you were taking too long."
1003303-39 = "So what if I started out behind you? It's first come, first served.#nYou heard the manager."
1003303-40 = "All's fair in beef and war."
1003303-41 = "[s] \"Can you hear yourself right now?\""
1003303-43 = "I don't need your remarks! I have my beef, and that's all I need!"
1003303-44 = "You needn't fear. This beef is much better off with me, where it will get the proper cooking it deserves! Ahahaha!"
1003303-45 = "Now, if you'll excuse me."
1003303-51 = "Oh, no!"
1003303-55 = "A-Are you all right?"
1003303-59 = "[s] \"What the...?!\""
1003303-60 = "Can you hear me?! Sir...!"
1003303-61 = "Someone call a doctor! He's completely out cold!"
1003303-62 = "We need a doctor over here!"
1003303-66 = "Phew. He should be in good hands now."
1003303-67 = "It would be a shame to let the last pack go to waste.#nWould you still like it?"
1003303-68 = "[s] \"Sure... I just hope that guy's gonna be okay.\""
1003303-76 = "I managed to successfully purchase the wagyu beef for reasons I still didn't quite understand, and then I made my way to a popular diner for lunch."
1003303-80 = "[ns] \"What was that dish everyone on social media was talking about again?\""
1003303-81 = "The food here is as great as I heard!"
1003303-82 = "One more! I'll have another!"
1003303-83 = "I'm gonna mix a jungle juice at the drink bar!"
1003303-87 = "Those three over there are so noisy."
1003303-88 = "Shhh! Be quiet, or they'll hear you."
1003303-89 = "This sucks. I came all the way here after I heard about this place,#nbut I can't even eat in peace."
1003303-90 = "Hahahaha!"
1003303-91 = "Heeheehee!"
1003303-92 = "Ahahahaha!"
1003303-97 = "E-Excuse me, ladies. We've received complaints from our other customers.#nWould it be too much trouble to keep down ever so slightly?"
1003303-100 = "Whaaat? You think we're being too loud?"
1003303-101 = "How's about we stick your speakers where the sun don't shine,#nya bucket of bolts."
1003303-102 = "Then we'll see who's REALLY loud when yer screamin' in pain!"
1003303-104 = "*gasp* P-Please! Anything but..."
1003303-105 = "[s] \"Hey. You're causing a scene.\""
1003303-108 = "Huh?!"
1003303-109 = "Aren't you that...?"
1003303-110 = "Sensei from Schale!"
1003303-111 = "You were there when we got blasted the other day!#nDon't think we've forgotten about that!"
1003303-112 = "What do you say, ladies? Now's the perfect time to get our reven—"
1003303-125 = "Oh, my GOODNESS! Are you three all right?!"
1003303-129 = "Th-Those were gunshots..."
1003303-130 = "Where did they come from?"
1003303-131 = "[s] \"Again?\""
1003303-140 = "The final thing to do on my day off was to pick up some necessities at the convenience store."
1003303-141 = "[s3] \"What a day...\"\n[s4] \"This shouldn't take long. What's the worst that could happen?\""
1003303-146 = "[ns] \"Oh, come on!\""
1003303-147 = "Wh-What's going on?!"
1003303-148 = "Hahaha! This is a stick up!"
1003303-149 = "Empty the cash register, and do it now!"
1003303-156 = "[ns] \"W-Wait!\""
1003303-164 = "Ahhhhhh!"
1003303-165 = "I-I've been hit!"
1003303-170 = "[ns] \"*sigh*\""
1003303-173 = "My stressful day off finally came to an end."
1003303-175 = "Then, the next day..."
1003303-176 = "[s] \"Yesterday sure was something.\""
1003303-180 = "[ns] \"Who is it?\""
1003303-184 = "Heehee. It's me, Sensei. Wakamo. I just couldn't keep myself away."
1003303-185 = "I had such a wonderful time with you yesterday, even if we didn't get to talk much."
1003303-186 = "Thinking back on it, I couldn't resist the urge to come see you again.#nThough I know you don't have the day off from work this time."
1003303-187 = "Nevertheless, I couldn't keep myself away! ♥"
1003303-188 = "[s] \"I...see. Wait, did you say 'yesterday'?\""
1003303-189 = "Hmm? Yes, I did. "
1003303-190 = "Don't you remember?"
1003303-191 = "I still get butterflies in my stomach thinking about how much time we spent together yesterday!"
1003303-192 = "[s] \"Stop. There. That part. Explain what you mean by that.\""
1003303-193 = "Ah, I see."
1003303-194 = "I'd be happy to. Anything for you, Sensei."
1003303-195 = "We had quite an eventful day yesterday, though it was nice to go on our first date on your much needed day off."
1003303-196 = "[s] \"D-Date? What date?!\""
1003303-197 = "First, we encountered that clueless idiot that was jealous of us."
1003303-198 = "Still, I'm glad you were able to purchase that wagyu beef you deserved in the end."
1003303-199 = "How should we prepare it today?"
1003303-200 = "I'll make it however you like. I can already picture us sharing dinner together, discussing our favorite foods and flavors..."
1003303-201 = "I feel closer to you by simply imagining it, my darling.#nIt makes me so happy."
1003303-202 = "[s] \"...?\""
1003303-203 = "Although..."
1003303-204 = "...our happiness wouldn't last for very long. We ran into yet another disturbance at the restaurant we visited for lunch."
1003303-205 = "Those noisy insects couldn't help but loudly buzz around those of us simply trying to enjoy our afternoons. How inconsiderate."
1003303-206 = "I wanted nothing more than to pluck their wings off one-by-one where they stood so they could never make another sound again..."
1003303-207 = "...but I couldn't do it. I couldn't bring myself to ruin our precious time together, so I let them off with a warning."
1003303-208 = "Then we ran into those fools living out their fantasy of being big shot robbers at the convenience store."
1003303-209 = "It was quite an eventful day, but I could say the same of any day I spend when I'm with you."
1003303-210 = "I wouldn't have it any other way, my darling! ♥"
1003303-214 = "[ns] \"So you were stalking me everywhere I went yesterday?\""
1003303-215 = "Stalking?"
1003303-216 = "I would never do such a thing. I was simply following closely behind by letting you lead the way."
1003303-217 = "I didn't want to do anything to get in the way of our date."
1003303-218 = "Oh, but you don't have to concern yourself."
1003303-219 = "I'll be more careful next time we go out together..."
1003303-220 = "...by eliminating every would-be obstacle in our way before they can interfere."
1003303-221 = "That way nothing will interrupt our second date!"
1003303-222 = "[s] \"Stop it, Wakamo!\""
1003303-223 = "Darling...?"
1003303-224 = "[s] \"You don't have to do that next time!\""
1003303-231 = "Oh, my. Next time?"
1003303-232 = "[s5] \"We'll hold hands all day on our date!\"\n[s6] \"(I can't take my eyes off her for everyone else's sakes!)\""
1003303-237 = "O-Oh, Sensei. You're being so forward!"
1003303-238 = "But, okay. If that's what you want."
1003303-239 = "I-I can't wait. I'll be looking forward to it. "
1003303-240 = "G-Goodbye for now, my darling."
1003303-245 = "I calmly saw Wakamo outside, and she ran away as fast as she could, still flustered."
