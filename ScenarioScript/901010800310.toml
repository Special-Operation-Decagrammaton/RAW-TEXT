[translation]
901010800310-9 = "FOX2、ただいま復帰しました。"
901010800310-13 = "ああ、お帰り。"
901010800310-14 = "今日もお疲れ様。"
901010800310-15 = "あれ、そんな深刻な顔して、どうしたの？"
901010800310-16 = "D.U.一帯で起きた失踪事件の現状を整理していたんだ。"
901010800310-17 = "幸い、鐘崎港で消えた人々の行方は明らかになったが……。"
901010800310-18 = "依然として、この街では失踪者がかなりの数いることは間違いない。"
901010800310-19 = "仕事が多いってこと？"
901010800310-20 = "いや、そうではなく……。"
901010800310-25 = "私がこの事件に対して、責任が取れるか……まだ確信が持てない。"
901010800310-26 = "いつものように、真実を詳らかにしたとしても、皆を満足させられないだろう。"
901010800310-27 = "その選択によって責任を負わなければならない時が来た瞬間――"
901010800310-28 = "私は、一人で耐えきれるのだろうか？"
901010800310-32 = "一人で耐える必要があるの？"
901010800310-33 = "だが、私の責任を他人に負わせるわけには――"
901010800310-41 = "ユキノちゃんの責任じゃないよ。私たちみんなの責任。"
901010800310-45 = "……そうだな。"
901010800310-46 = "まずは、今に集中しないと。"
901010800310-47 = "小隊長は色々考えてくれるところが長所だけど、短所でもあるからね。"
901010800310-48 = "ああ。"
901010800310-49 = "まずは目の前の仕事からだな。"
