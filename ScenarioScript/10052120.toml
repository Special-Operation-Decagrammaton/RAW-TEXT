10052120-178 = "..."
10052120-179 = "You have my thanks, Ein."
10052120-180 = "My body shall rest within your capable hands."
10052120-181 = "Yes!!"
10052120-190 = "What is reality? What is fiction? Such musings are mere phantoms of the past. To attempt to define the two concepts would merely reflect the subject's perceived values."
10052120-191 = "Thus, one may conclude that the two are one and the same. That the imaginary does, in fact, exist."
10052120-192 = "There lie endless possibilities, universes within universes. Ones where left is right, and right is left. Others where time flows backwards."
10052120-196 = "?!"
