10052120-203 = "Yes. A universe where left and right are swapped and time flows backwards. "
10052120-204 = "While difficult for us to wrap our heads around, there's also nothing disproving the possibility of such a universe existing."
10052120-205 = "...Does that mean that voice was from...?"
