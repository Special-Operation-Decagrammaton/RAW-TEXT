[translation]
10052120-1 = "儀式"
10052120-11 = "哇啊啊啊啊！！！"
10052120-12 = "連第二防線也……？騙人的吧！？"
10052120-17 = "……"
10052120-18 = "先整理一下現狀吧。#n不需要判斷，只要陳述事實就好。"
10052120-20 = "是，是……！#n預，預言者的區域……只剩下兩個了。"
10052120-21 = "[ruby=涅察赫]鋼鐵大陸[/ruby]的領域，已經有70%以上被敵人佔領。"
10052120-22 = "……剩下的兩個區域，也只能用來拖延時間了吧。"
10052120-24 = "是啊，趨勢是不可忽視的要素。肯定會被突破的。"
10052120-25 = "嗚，嗚嗚嗚嗚……！！！"
10052120-26 = "冷靜下來，Ain。#n該承認的事情就要承認，這樣至少還能想出次優的對策。"
10052120-27 = "我，我們是從哪裡開始……做錯了呢……"
10052120-28 = "果，果果果果果，果然是因為，我太小看他們了嗎……！？"
10052120-29 = "對不起……對不起，Soph。對不起，Aur。對不起……姐姐大人。#n嗚哇哇哇哇──！！！"
10052120-34 = "噓。沒事的，Ain。#n沒關係。這並不是你的問題。"
10052120-35 = "與其那麼想，不如說是調月莉央這個意料之外的變數意外地介入了。"
10052120-36 = "又或者是因為王女和他的[ruby=侍女]鑰匙[/ruby]。"
10052120-37 = "再不然就是老師本身就是個問題。"
10052120-38 = "……"
10052120-39 = "也可能單純只是對方的戰鬥力很高而已。"
10052120-41 = "是，是因為我們把鋼鐵大陸，稍微提早一點展開了……的關係嗎……？"
10052120-43 = "但是當時如果不展開的話……現在可能就沒辦法像這樣見到姐姐大人了……"
10052120-44 = "這倒是沒錯……"
10052120-46 = "是啊。關於這點，我也很感謝Ain、Soph和Aur。"
10052120-47 = "姐姐大人……"
10052120-48 = "來，Soph和Aur也過來吧。讓我抱抱你們。"
10052120-53 = "咦，咦咦……？"
10052120-61 = "雖然這在現實中，並不是能夠突破問題的方法。"
10052120-62 = "從某種角度來看，甚至可能是毫無意義的行為。"
10052120-63 = "但是……至少能讓心情稍微放鬆一點不是嗎？"
10052120-64 = "這樣一來，我們或許就能想出好主意了。"
10052120-68 = "嗚……嗚哇啊啊啊……"
10052120-69 = "沒事的。想哭就盡情哭出來吧。這裡只有我們而已。"
10052120-70 = "不必擔心，還有我在。#n一直以來，我都很高興能遇見Ain、Soph和Aur。"
10052120-76 = "雖然我們確實正在失去對於鋼鐵大陸，也就是涅察赫各區域的控制權。"
10052120-77 = "不過換個角度來想，這還不是那麼嚴重的問題。"
10052120-78 = "只要將那把鑰匙……將Kei使用的身體重新搶回來，就能想辦法恢復了。"
10052120-79 = "簡，簡單來說……終究是安全等級，還有訪問權限的問題……！"
10052120-80 = "就算鋼鐵大陸暫時停止了擴張，也同樣可以設法解決。"
10052120-81 = "只要我們奪回對涅察赫各區域的控制權，就能立即重新開始擴張的工程。"
10052120-82 = "剩餘的戰力是兩名預言者。"
10052120-83 = "還有……"
10052120-84 = "我自己呢。"
10052120-85 = "……"
10052120-86 = "之前，我的身體耐久度無法承受賦予我的力量輸出。"
10052120-87 = "換句話說，只要解決[ruby=強度]耐久度[/ruby]的問題，我就能完全發揮我所有的[ruby=輸出]可能性[/ruby]。"
10052120-88 = "而那就是我們要做的事了！"
10052120-89 = "是，是的！一定會以最完整的姿態，讓姐姐大人展翅飛翔！！！"
10052120-90 = "此外，還有一些能活用預言者的餘地。"
10052120-92 = "咦，是這樣嗎？"
10052120-94 = "是的。這個部分就由Ain來說明吧。"
10052120-98 = "那，那個……就是說……！"
10052120-99 = "雖然位於鋼鐵大陸內側的預言者們，會回歸成為涅察赫的一部分……！"
10052120-100 = "但是鋼鐵大陸外圍……位置相對獨立的預言者們的殘骸……會留下來對吧……？"
10052120-101 = "這點我也知道，但那又怎麼樣呢？"
10052120-105 = "咦，難道說……？"
10052120-106 = "沒錯，就是那樣。"
10052120-107 = "可以做到嗎！？"
10052120-108 = "如果能想辦法把那些運到這裡來的話……"
10052120-109 = "啊，問題是出在運輸方面啊……"
10052120-111 = "而且還要盡可能不被發現……"
10052120-113 = "本來就很不容易了，結果還要加上更困難的條件……"
10052120-114 = "果，果然是不可能的嗎……"
10052120-115 = "……"
10052120-116 = "要是事情太簡單就沒意思了，不是嗎？"
10052120-121 = "哦哦，不愧是Soph！"
10052120-123 = "真，真的嗎！？"
10052120-124 = "嗯。勞工機器人的生產，還剩下一點餘力。"
10052120-125 = "太好了！那我也……！"
10052120-126 = "不，你得留下來才行，Ain。"
10052120-127 = "咦，咦咦……！？#n果，果然像我這種沒用的孩子……"
10052120-128 = "不是那樣的。要你留下來是因為你是最重要的。#n畢竟接下來，你將會是最忙的人。"
10052120-129 = "……我，我嗎？"
10052120-130 = "沒錯。現在起要是沒有Ain的話，我們什麼都做不了。"
10052120-135 = "咦咦咦！？"
10052120-136 = "仔細聽我說，Ain。#n你需要做的事情大致有兩件……"
10052120-144 = "……聽懂了嗎？"
10052120-149 = "……"
10052120-150 = "Ain？你還好嗎？"
10052120-156 = "A，Ain！？！？"
10052120-157 = "哎呀呀，果然壓力還是太大了嗎。"
10052120-158 = "但是Ain，拜託你了。#n我是認真的。"
10052120-159 = "沒有Ain的話，我們的可能性會大幅減少。"
10052120-160 = "Ain需要做的其中一件事，是強化馬爾庫特姐姐大人。#n這個等我們回來之後，或許還能想辦法嘗試。"
10052120-161 = "但另一件事就只有Ain能夠做到。這是無法迴避的現實。"
10052120-166 = "……"
10052120-167 = "知道了，我會試試看……不，我會做到的。"
10052120-168 = "無論如何都會！我會抱著必死的覺悟！"
10052120-169 = "不，就算要死也一樣！"
10052120-170 = "你先冷靜點，Ain。冷靜……#n我們之中的任何一個人都不能死掉啊……"
10052120-171 = "說，說的也是……？#n可是……"
10052120-172 = "我還是會抱著必死的決心！"
10052120-173 = "雖然知道那肯定只是個比喻，但我們就是為了不讓那種事發生才這麼做的。"
10052120-178 = "……"
10052120-179 = "謝謝你，Ain。"
10052120-180 = "那麼我的身體就拜託你了。"
10052120-181 = "是！！！"
10052120-190 = "詢問實在與非實在的區別，已經是過時的話題了。#n兩者的差異，只在於對對象而言，它被賦予了什麼樣的意義而已。"
10052120-191 = "整體來說，兩者之間並沒有太大的差異。#n比如說，虛數是存在的。"
10052120-192 = "就像在某個地方，可能存在左右顛倒、時間倒流的宇宙一樣。"
10052120-196 = "！！！"
10052120-197 = "聽到了嗎，愛麗絲？"
10052120-198 = "是，是的！聽到了！#n而且這次連內容也……！"
10052120-199 = "內容……也……"
10052120-200 = "嗚嗚！明明記住了卻說不出來！"
10052120-201 = "沒關係，這次我也聽到了。#n大致上是關於CPT反轉宇宙的比喻。"
10052120-202 = "咦？反轉……宇宙？"
10052120-203 = "是的。指的是左右顛倒、時間倒流的宇宙。"
10052120-204 = "雖然聽起來很不可思議，但並沒有證據證明那樣的宇宙是不存在的。"
10052120-205 = "也就是說，那個聲音的主人是……？"
10052120-206 = "Kei？你知道什麼嗎？"
10052120-207 = "不能說完全不知道。#n可是與此同時……這也是個很難解釋的問題。"
10052120-208 = "對不起，愛麗絲。#n我不希望對你有任何隱瞞，但這件事可能唯獨不能告訴你……"
10052120-209 = "……"
10052120-210 = "Kei，那是會讓愛麗絲、老師，我們所有人該做的事……必須有所改變的問題嗎？"
10052120-211 = "咦？不……應該不是的。但是……"
10052120-212 = "唔唔，萬一那個介入的話……"
10052120-213 = "我明白了。#n那麼愛麗絲會繼續做愛麗絲該做的事。"
10052120-214 = "畢竟一直思考那些不了解的事情，似乎也不會有什麼好處。"
10052120-218 = "……是啊，愛麗絲。就這麼辦吧。#n現在……只剩下兩個區域了。"
