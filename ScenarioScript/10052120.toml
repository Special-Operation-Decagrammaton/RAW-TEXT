10052120-213 = "Understood. Then I will keep doing just that. What I need to do."
10052120-214 = "There is no reason for us to worry and fret about something we do not even know."
10052120-218 = "...Correct, as usual, Aris. Let's focus on what we can control: the remaining two areas."
