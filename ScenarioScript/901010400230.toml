901010400230-5 = "#showmenu"
901010400230-6 = "3;통신유키노;00\n#3;a\n#wait;1200"
901010400230-7 = "3;통신유키노;02;여기는 FOX 1. FOX 2, 진척사항 보고할 것.\n#3;em;[반응]"
901010400230-8 = "5;니코 아르바이트;00;FOX 2, 확인. 타겟의 경계가 심해서 라포를 확보하는 것을 우선시 하는 중이야.\n#5;al\n#3;m1"
901010400230-9 = "5;니코 아르바이트;02;가볍게 지나가는 말처럼 <드럼통 속의 게>에 대해 묻긴 했지만, 다들 처음 듣는 눈치던데."
901010400230-10 = "#3;hide\n1;통신쿠루미;02;시치미를 떼고 있을 가능성은 없을까?\n#1;em;[?]"
901010400230-11 = "5;니코 아르바이트;99;거짓말을 하는 사람이 있었을지도 모르지만…… 항만에서 일하는 대부분의 사람들은 드럼통에 게를 넣는 게 무의미한 일이라고 생각하는 모양이었어."
901010400230-12 = "5;니코 아르바이트;02;항만의 불특정 다수에게 겁을 주고 싶은 게 목적이었다면, 좀 더 현실성있는 협박 수단을 썼지 않았을까?"
901010400230-13 = "1;통신오토기;02;그건 그렇네. 드럼통에 게를 넣으면 죽을 걸 뻔히 아는 사람들이, <드럼통 게> 같은 도시 괴담을 퍼트리진 않았겠지."
901010400230-14 = "#all;hide"
901010400230-15 = "3;통신유키노;00;그럼 오늘 조사는 이것으로 종료할 예정인가? \n#3;em;[?]"
901010400230-16 = "3;니코 아르바이트;02;음…… 시간이 조금 남았으니 상업지구에 가서 조금 더 이야기를 들어볼까 하는데."
901010400230-17 = "#all;hide"
901010400230-18 = "1;통신오토기;00\n5;통신쿠루미;02;FOX 3, 이견 없어. 오늘은 바람이 시원해서 좀 더 버틸 수 있을 것 같아.\n#5;em;[반응]"
901010400230-19 = "1;통신오토기;02;FOX 4도 이견 없음. 계속해서 수상한 사람은 없는지 항구 주변을 살펴볼게."
901010400230-20 = "#all;hide"
901010400230-21 = "3;통신유키노;00;좋아. FOX 2, 포인트 찰리로 이동하여 작전을 속행하도록."
901010400230-22 = "3;니코 아르바이트;03;FOX 2, 확인.\n#3;em;[음표]"
901010400230-23 = "#all;hide"
