[translation]
901010400230-7 = "こちらFOX1。FOX2、進捗状況を報告するように。"
901010400230-8 = "こちらFOX2、ターゲットの警戒が強いから、信頼関係優先で動いているよ。"
901010400230-9 = "軽く「ドラム缶ガニ」について聞いてみたんだけど、みんな初耳みたい。"
901010400230-10 = "シラを切っている可能性は？"
901010400230-11 = "嘘をついている人もいるかもしれないけど……#n港で働いている人たちは、ドラム缶にカニを入れるのはおかしいと思ってるみたい。"
901010400230-12 = "港の人間を怖がらせるのが目的なら、もっと現実的な脅し方にしていたんじゃないかな？"
901010400230-13 = "そうだね。ちょっとでも知識があれば「ドラム缶ガニ」なんて噂を広めるわけないし。"
901010400230-15 = "では、今日の調査はこれで終了か？"
901010400230-16 = "うーん……まだ時間が残っているから、商業エリアで話を聞いてみようかな。"
901010400230-18 = "FOX3、異論ないわ。今日は風も涼しいし、まだ耐えられると思う。"
901010400230-19 = "FOX4も異論なし。引き続き、怪しい人がいないか港周辺を見張っておくね。"
901010400230-21 = "よし。FOX2、ポイントチャーリーへ移動し、作戦を続行するように。"
901010400230-22 = "FOX2、了解。"
