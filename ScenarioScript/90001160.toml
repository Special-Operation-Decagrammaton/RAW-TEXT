[translation]
90001160-1 = "第16話;呼喚聲"
90001160-5 = "嘶……呼……"
90001160-6 = "時機成熟了！"
90001160-10 = "是，是！"
90001160-14 = "……是啊，時機成熟了。#n是時候該認真了。從現在開始一刻都不能失誤。"
90001160-15 = "沒，沒錯……！因為，因為……喚醒姐姐大人的時候終於到了！"
90001160-17 = "Ain也暫時禁止結巴！"
90001160-19 = "咦，咦咦！？！？"
90001160-20 = "知道了……我會努力……"
90001160-21 = "畢竟……不能因為太緊張而失誤，也不能因為太放鬆而失手嘛。"
90001160-25 = "檢查冷卻水量……勉強沒問題！"
90001160-26 = "把可用能量全部送到「佐哈爾基地」。#n展開的多次元防護罩也暫時關閉。"
90001160-28 = "雖然危險，但這也是沒辦法的……"
90001160-32 = "好，開始吧！"
90001160-47 = "資料膠體濃度轉換。"
90001160-48 = "神經訊號連結準備確認。"
90001160-50 = "進行連結的同時確認結合強度。"
90001160-51 = "已確認在穩定值以內。"
90001160-52 = "那麼開始進行相互連結。"
90001160-58 = "確認相互連結穩定……檢查連結體動作區。"
90001160-59 = "連結體動作正常……要把結果傳送到畫面嗎？"
90001160-60 = "不用了，Ain。我相信你。"
90001160-66 = "接近第1意識區Peshat。#n皮質表層區正常。Delta波確認。"
90001160-67 = "接下來，接近第2意識區Remez。#n髓質中層區正常。已確認Theta波。"
90001160-68 = "接近第3意識區Derash。#n核心內部區……訊，訊號異常！？"
90001160-69 = "怎，怎怎怎怎，怎麼辦？是不是出大事了！？"
90001160-70 = "沒事的，Ain。#n這樣是正常的。"
90001160-72 = "沒錯，從這裡開始就不是我們能隨便接近的領域了。"
90001160-78 = "……第4意識區Sod，觀測成功。"
90001160-79 = "為了穩定能量供給，暫時解除多次元防護罩。"
90001160-80 = "接下來就只能觀察結果了。"
90001160-82 = "那，那我們……該做什麼呢……？"
90001160-86 = "……"
90001160-87 = "祈禱吧，我猜。"
90001160-88 = "那個主意不錯。#n畢竟我們處於侍奉他的立場。"
90001160-89 = "是，是……在內心默默祈求……"
90001160-91 = "祈求我們的[ruby=馬爾庫特]姐姐大人[/ruby]，能平安在這塊土地睜開眼睛。"
90001160-101 = "那麼，我來說明有關「Kei.sav」的事吧。"
90001160-102 = "我之前曾運用所有方法分析這個檔案，卻沒能取得任何成果。"
90001160-103 = "但是莉央你剛才說過，#n如果用的是奇普托斯的普通技術，出現那種結果也是理所當然的對吧？"
90001160-104 = "沒錯，正是如此。"
90001160-105 = "而且你還說需要大量儲存空間，#n所以準備了能在這個基地收集到的所有資料儲存裝置……"
90001160-106 = "如果你想把「Kei.sav」植入儲存空間裡的話，那應該沒有太大的意義。#n因為我之前就已經嘗試過了。"
90001160-107 = "光是那樣還不夠。#n如果想應對無名諸神的技術……就需要與之相符的環境。"
90001160-111 = "……可以再說得詳細一點嗎？"
90001160-112 = "如果「Kei.sav」真的是無名之神的鑰匙或痕跡，#n那麼它和我們常用的記錄媒體就是無法相容的。"
90001160-113 = "如果要用生物學來比喻的話……就是需要和與之相符的培地。"
90001160-114 = "什麼意思……？"
90001160-115 = "該怎麼說呢……"
90001160-119 = "難道你的意思是……這和有生命的意識體沒兩樣嗎！？"
90001160-120 = "如果是以前的我，應該會否定「有生命」這個說法……"
90001160-121 = "不過你說的沒錯，陽葵。#n雖然我們還不清楚生命的範疇有多大，也不知道該如何定義……"
90001160-122 = "但是在體內恆定、反應、適應性和自我認知方面，一定存在能這麼解釋的部分。"
90001160-131 = "[ns1]「季和英美真厲害……」\n[ns2]「我聽得一頭霧水……」"
90001160-136 = "您不必擔心，老師。#n因為我也完全聽不懂，[ruby=V]耶[/ruby]。"
90001160-137 = "我好像還是幫上了很多忙？#n謝謝您這麼說。"
90001160-138 = "但是我從莉央大人身上偷學到的就只有這些。#n剛才也只是聽從兩位的指示罷了。"
90001160-139 = "現在兩位的指示剛好告一段落，閒得發慌的我只好要求老師陪我了。"
90001160-143 = "嗯，不是我要說，剛才那句話真是最完美、最強的女僕台詞了。#n請您立刻稱讚我。"
90001160-144 = "季。才想說你在做什麼而已。#n真是的，禁止你獨占老師。"
90001160-154 = "老師，之後請一定要找時間單獨陪我哦，我們說好了。#n就算老師否認這件事也一樣，知道了嗎？"
90001160-155 = "[s]「好啦好啦……」"
90001160-162 = "「全知」的我也許不適合這麼說，但是……"
90001160-163 = "關於這點……我其實覺得部長你，不如乾脆做一個真的學位授予自己如何？"
90001160-164 = "那是什麼意思，英美。那樣不就顯得我像是個為了塑造形象而深陷民粹主義與設定，#n結果反而失去了本質的可悲研究者了嗎？"
90001160-165 = "我怎麼感覺不到哪裡可悲了呢……"
90001160-166 = "總之我們現在要做的，或許會是踏入尚未被人定義的嶄新領域對吧？"
90001160-171 = "……所以我認為如果可以的話，這個領域的知識應該受到管制。"
90001160-172 = "因為自以為了解自己所運用的知識，實則並非如此的情況並不少見。"
90001160-173 = "那都已經是過去的事了吧。"
90001160-174 = "是啊，都已經過去了。"
90001160-183 = "這樣……準備就結束了嗎？"
90001160-184 = "只是初步的準備而已。接下來才是真正的開始。"
90001160-185 = "要把Kei植入這個儲存空間……"
90001160-186 = "其實接下來的步驟並不困難。#n基本上只在一旁觀察而已。"
90001160-187 = "但是萬一……發生了無法預期的情況……"
90001160-192 = "會怎麼樣呢？"
90001160-194 = "恐怕只能採取物理性的手段了。"
90001160-196 = "原來如此。#n這些東西之所以暴露在外，就是為了能隨時分離啊。"
90001160-197 = "所以一旦發現異常就把它破壞掉嗎？"
90001160-199 = "……簡單來說就是這樣。"
90001160-205 = "為什麼要盯著我看呢，莉央？"
90001160-206 = "沒什麼……只是覺得你應該會反對這個方式而已……#n說這樣的作法很野蠻……或者很像我的作風之類的。"
90001160-210 = "……就算是我，遇到必須承認的事情還是會承認的。#n畢竟這樣既乾淨俐落又優雅，而且還不失謙遜。"
90001160-211 = "再怎麼說，你都是對無名之神的力量最了解的人。"
90001160-212 = "因此對於你在你的領域所下的決定，我不打算貶低或指責。"
90001160-213 = "……謝謝。"
90001160-215 = "如果可以的話，真希望別用上物理的解決方法。"
90001160-216 = "這邊已經準備就緒了。隨時可以開始。"
