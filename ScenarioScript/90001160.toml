[translation]
90001160-1 = " Episode 16;The Sounds of Summoning"
90001160-5 = "*inhale* *exhale*"
90001160-6 = "It's time!"
90001160-10 = "Y-Yes!"
90001160-14 = "...Yes. It truly is. We must compose ourselves. From this point onward, not a single mistake can be made."
90001160-15 = "R-Right...! It's finally, finally...time to wake up E-Elder Sister!"
90001160-17 = "Ein! You're forbidden from stuttering too!"
90001160-19 = "E-Eh?!"
90001160-20 = "Okay... I'll do my best..."
90001160-21 = "Yes. Nervousness shall not cause any fumbling, nor shall overconfidence cause carelessness."
90001160-25 = "Checking remaining coolant... Just barely enough!"
90001160-26 = "Reroute all available energy to the Foundation of Zohar. The Multidimensional Barrier will also shut down for a moment. "
90001160-28 = "A little dangerous, but we have to do what we have to do."
90001160-32 = "Let's begin, everyone!"
90001160-47 = "Converting Data Gel density."
90001160-48 = "Checking nerve signal connection."
90001160-50 = "Checking connection strength."
90001160-51 = "Confirmed. Values are stable."
90001160-52 = "Commencing mutual connection."
90001160-58 = "Confirmed stabilization of mutual connection. Checking connectome's active areas."
90001160-59 = "Connectome activation stabilized... Should I display the results?"
90001160-60 = "That's fine, Ein. I trust you."
90001160-66 = "Approaching the first realm of consciousness, Peshat. Cortex surface region, normal. Confirmed Delta waveforms."
90001160-67 = "Next, approaching the second realm of consciousness, Remez. Medulla central layer region, normal. Confirmed Theta waveforms."
90001160-68 = "Approaching the third realm of consciousness, Derash. Core internal region— A s-signal error?!"
90001160-69 = "Wh-Wh-Wh-What should we do? This is catastrophic, isn't it?"
90001160-70 = "No, Ein. Everything is as intended. It's normal."
90001160-72 = "She's correct. The realms are no longer ours to do with as we please."
90001160-78 = "The fourth realm of consciousness, Sod... Observation successful."
90001160-79 = "Energy supply stabilized. Temporarily disabling the Multidimensional Barrier."
90001160-80 = "I guess all we can do is wait for results now."
90001160-82 = "Th-Then what...should we do...?"
90001160-86 = "..."
90001160-87 = "Pray, I guess."
90001160-88 = "An excellent proposition. We do worship our master, after all."
90001160-89 = "Y-Yes... Silently pray, deep inside our hearts..."
90001160-91 = "...that our Elder Sister, Malkuth, safely awakens in this land."
90001160-101 = "Now, let's discuss \"Kei.sav.\""
90001160-102 = "I utilized every possible means at my disposal to analyze it, but they yielded no results."
90001160-103 = "However, you say that, with Kivotos' level of technology, that was to be expected."
90001160-104 = "Right. I did."
90001160-105 = "And you said you need as many data fields as possible. So we've gathered every single data storage device in this base."
90001160-106 = "But if you're planning on transplanting \"Kei.sav\" to a data field, it won't do much. I've already tried that."
90001160-107 = "Because the field itself was flawed. For the Nameless Gods' technology, you need the proper environment."
90001160-111 = "...Elaborate, please."
90001160-112 = "If \"Kei.sav\" really is a key or trace of the Nameless Gods, then it won't be compatible with the data storage types we're used to."
90001160-113 = "If I were to make an analogy to biology... It needs the proper medium for the situation."
90001160-114 = "Which means...?"
90001160-115 = "It means..."
90001160-119 = "...So you're equating this to a living, conscious being?!"
90001160-120 = "The old me would have denied the \"living\" classification, however..."
90001160-121 = "...I'm no longer sure of how or to what extent we're able to define \"life.\" So in a way, yes."
90001160-122 = "In regard to homeostasis, feedback, and self-consciousness, there are definitely aspects of it that could be interpreted that way."
90001160-131 = "[ns1] \"Toki, Eimi, you're both incredible...\"\n[ns2] \"I have no clue what's being said right now...\""
90001160-136 = "Do not worry, Sensei. I have zero understanding of the situation."
90001160-137 = "...But it seemed like I knew what I was doing? Thank you for saying that."
90001160-138 = "However, everything I know is simply from watching Rio. Even now, I am only following their orders."
90001160-139 = "And right now, because I've completed my orders and am bored, I demand that you play with me."
90001160-143 = "Mm. Even for me, that was truly a strong and perfect line, befitting of a maid. Please hurry and compliment me."
90001160-144 = "And here I was wondering what you were up to, Toki. You're trying to sneak off and hog Sensei all for yourself."
90001160-154 = "Sensei, you are now obligated to play with me at some point, just the two of us. It's a promise. You may not have made the promise, but I did. Okay?"
90001160-155 = "[s] \"Yeah, yeah...\""
90001160-162 = "This may sound contradictory, coming from an Omniscient being, such as myself—"
90001160-163 = "Please pause. Why don't you consider making a REAL degree and conferring it on yourself?"
90001160-164 = "What is this nonsense, Eimi? You make me sound like some fragile, pitiful researcher, swept up in populism, losing my values for the sake of academic renown."
90001160-165 = "I'm not sure about the fragile and pitiful part, but okay..."
90001160-166 = "Anyways. We are about to set foot onto the horizon of a new discipline, one that has never before been broached in this world."
90001160-171 = "Which is exactly why I was trying to limit and control this field of knowledge to begin with."
90001160-172 = "More often than not, humanity has a tendency to attempt to utilize knowledge that we don't truly understand."
90001160-173 = "So the past repeats itself."
90001160-174 = "Yes. The past repeats itself."
90001160-183 = "Are preparations...complete?"
90001160-184 = "The first round, yes. But this next step is crucial."
90001160-185 = "Now, we need to transplant Kei to this data field..."
90001160-186 = "There is nothing necessarily difficult to be done on our end. Our job is to watch."
90001160-187 = "However, by any chance...if something unexpected happens..."
90001160-192 = "Then?"
90001160-194 = "The only option available to us is physical force."
90001160-196 = "I understand now. You exposed this data disc to an external environment so that you could disconnect it any moment."
90001160-197 = "As in, to destroy it, if something strange happens?"
90001160-199 = "...To summarize, yes."
90001160-205 = "Why are you staring at me like that, Rio?"
90001160-206 = "I was anticipating your protest to my methods. That they're too savage, that this is typical of me..."
90001160-210 = "...I can acknowledge reality. Even if I'm being modest, this is a clean and elegant method."
90001160-211 = "And above all, no one is more intimately familiar with the Nameless Gods' power than you are."
90001160-212 = "I have no intention of judging or criticizing your work in your specialized field."
90001160-213 = "...Thank you."
90001160-215 = "I do hope we don't have to resort to that."
90001160-216 = "Preparations complete on this side. You may start whenever you are ready."
