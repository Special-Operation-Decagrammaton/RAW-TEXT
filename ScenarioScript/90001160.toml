90001160-379 = "Confirmed initiation of self-replication from \"Kei.sav.\" "
90001160-384 = "This speed...! The data encroachment is too fast! How much further is it going to go?"
90001160-385 = "Just hold. We're still within the expected range. Occupancy at 96%... 97%... 98%... Proliferation ended!"
90001160-386 = "It may not be proliferating any longer, but the data is diverging from the inside instead."
90001160-390 = "Himari. We're getting a signal. Please confirm!"
90001160-393 = "[log=???]To be born is to be thrown into the world.[/log]"
90001160-395 = "[log=???]Birth is rarely the result of will.[/log]"
90001160-399 = "We are a small boat lost at sea, a wanderer stumbling under a moonless night."
90001160-400 = "Thence, conflicts are born, hatred festers, and sins are committed upon others."
90001160-404 = "...!!"
90001160-405 = "The signal... There's a signal!"
90001160-406 = "Yes... There's no mistaking it. This signal is...!"
90001160-407 = "Ah! Ahh! "
90001160-413 = "[log=???]Birth begins as a curse,[/log]"
90001160-415 = "[log=???]and one must[/log]"
90001160-417 = "[log=???]dispel it.[/log]"
90001160-420 = "[log=???]To be born, the infinite[/log]"
90001160-422 = "[log=???]is degraded to finality.[/log]"
90001160-424 = "[log=???]With birth, comes destruction.[/log]"
90001160-428 = "And thus, the bird that hatches from its egg will soar towards a god."
90001160-431 = "Finally... We can finally meet!"
90001160-432 = "All of our work wasn't in vain."
90001160-433 = "Uw...Uwaaah!"
90001160-435 = "Don't cry, Ein. Don't cry. It's a good day. It's the greatest day."
90001160-436 = "Aren't you holding back tears yourself, Sof?"
90001160-437 = "You're not supposed to acknowledge it when someone's trying to be strong."
90001160-439 = "Touch upon the ends of land and bear witness."
90001160-440 = "Bestow life where sin has been wrought, and again shall it rise."
90001160-444 = "Sing to the righteous, and silence the unscrupulous."
90001160-445 = "Dawn upon the dark night, and heal those wounded."
90001160-448 = "Hello, Elder Sister. And welcome."
90001160-449 = "We sacrificed all we had and waited for you. We really, really, really waited, all this time."
90001160-450 = "For this moment was this world worth enduring."
90001160-454 = "As I relay the words of the beginning, let there be light."
90001160-455 = "Your name is the kingdom. Now rise up and prove thy existence."
90001160-456 = "And so I ask, who are you?"
90001160-459 = "I am the will brought forth from the flagship, the pilgrim of the kingdom at world's end."
90001160-460 = "And the name to prove myself..."
90001160-462 = "I am Malkuth."
90001160-469 = "This is... This form is...!"
90001160-471 = "..."
90001160-477 = "Rio?!"
90001160-478 = "Hold on. She's okay. Her legs gave way because she was overwhelmed. I guess Ms. Rio is human after all."
