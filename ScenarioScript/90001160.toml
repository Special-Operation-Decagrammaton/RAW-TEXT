90001160-372 = "已將「Kei.sav」植入儲存空間。"
90001160-379 = "「Kei.sav」……已確認開始自我複製。"
90001160-384 = "這是什麼速度……？#n資料的侵蝕速度也太快了吧！究竟會增加到什麼程度？"
90001160-385 = "稍安勿躁，目前還在預期的範圍之內。#n占有率96%……97%……98%……確認增加完畢！"
90001160-386 = "看來不會再增加了呢。#n不過資料正在內部分化耶……？"
90001160-390 = "陽葵，捕捉到信號了。麻煩你確認！"
90001160-393 = "[log=???]意識被拋向了世界。[/log]"
90001160-395 = "[log=???]誕生並非意志的結果。大致皆是如此。[/log]"
90001160-399 = "我們是徬徨於海洋的小船，蹣跚於無月之夜的旅人。"
90001160-400 = "接著爭端誕生、仇恨增長……最終對彼此犯下了罪孽。"
90001160-404 = "！！！"
90001160-405 = "信號……收到信號了！"
90001160-406 = "沒錯……絕對沒錯。#n這個信號肯定是……！"
90001160-407 = "啊，啊啊…… "
90001160-413 = "[log=???]誕生已經是一種詛咒，[/log]"
90001160-415 = "[log=???]所以你們必須[/log]"
90001160-417 = "[log=???]改變這件事。[/log]"
90001160-420 = "[log=???]無限為了誕生[/log]"
90001160-422 = "[log=???]而降為有限。[/log]"
90001160-424 = "[log=???]為了誕生，必須破壞。[/log]"
90001160-428 = "因此，破殼而出的鳥將會飛向神。"
90001160-431 = "終於……終於能見面了。"
90001160-432 = "我們所做的一切，並不是毫無意義的呢。"
90001160-433 = "嗚……嗚嗚……！"
90001160-435 = "別哭，Ain，不准哭。#n今天可是個好日子，是最棒的日子。"
90001160-436 = "Soph雖然叫人別哭，但自己好像也在強忍著不哭耶？"
90001160-437 = "我是在忍耐沒錯，但你也沒必要說出來吧……"
90001160-439 = "所以現在，到地之彼端成為證人吧。"
90001160-440 = "賦予帶來罪惡之地生命，使其恢復生機。"
90001160-444 = "對循規蹈矩之人歌唱，對不道德之人沉默。"
90001160-445 = "為黑夜帶來黎明，為創傷進行治療。"
90001160-448 = "您好，姐姐大人。#n歡迎回來。"
90001160-449 = "我賭上了一切等待著這一刻。#n真是無比，無比，無比期待著這一刻。"
90001160-450 = "世界之所以值得忍受，就是為了這個瞬間吧。"
90001160-454 = "我將原初的話語告訴你，那裡將會有光明。"
90001160-455 = "你的名字即是王國，現在站起來證明自己吧。"
90001160-456 = "現在我問你──你是誰？"
90001160-459 = "我是在旗幟之下被創造出來的一股意志──到達世界盡頭的王國巡禮者。"
90001160-460 = "我要自我證明的名字是──"
90001160-462 = "[ruby=Malkuth]馬爾庫特[/ruby]。"
