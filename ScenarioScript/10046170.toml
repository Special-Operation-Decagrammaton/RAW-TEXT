[translation]
10046170-3 = "A member of the Justice Task Force. I was looking for you."
10046170-4 = "You...know Koharu, right?"
10046170-9 = "(Shirasu Azusa. A student in the Make-Up Work Club with Koharu... If only that was it.)"
10046170-14 = "(She's a problem child who's caused countless incidents. Because of her characteristic emotionless expression, she is known as the \"Ice Queen.\")"
10046170-15 = "(Despite her fragile look, she specializes in attrition tactics to force the opponent to bleed as much as possible.)"
10046170-16 = "(...Honestly, not who I wanted to face on a busy day.)"
10046170-21 = "Well, you found me! What can I do for you, Azusa?"
10046170-22 = "I'm not here \"for\" anything."
10046170-23 = "I came here to assist you."
10046170-27 = "...Huh?!"
10046170-28 = "That's great...but don't you hate the Justice Task Force?"
10046170-29 = "I do?"
10046170-30 = "On account of...we're always fighting each other?"
10046170-31 = "Yes. We've clashed a few times since I moved to Trinity."
10046170-32 = "That was on account of you keeping Trinity secure. That was your duty. It wasn't personal."
10046170-33 = "I admire how your Force executes their missions."
10046170-34 = "Uh, thank you."
10046170-35 = "There's more."
10046170-36 = "Thanks to the Justice Task Force, I made friends. I value Hifumi, Mashiro, and your president."
10046170-37 = "I thank your organization for giving me that experience."
10046170-38 = "Huh... I see."
10046170-39 = "Then, you want to...?"
10046170-40 = "...Express my gratitude. Trinity has taught me the value in that."
10046170-41 = "Naturally, you would have to approve of my company..."
10046170-42 = "Haha... You're something else, something rare. And that's a good thing!"
10046170-43 = "...Sure! I needed help anyway. We'll call this even!"
10046170-44 = "I doubt one day of volunteering will be sufficient..."
10046170-45 = "...but I will not disappoint you. I'm highly trained and can handle any situation."
10046170-46 = "Yeah...just circling back... You know what I'm doing out here, right?"
10046170-47 = "Of course. You are a mobile combatant identifying and terminating enemies."
10046170-48 = "What...? \"Terminating\"...?"
10046170-49 = "I understand that we are already overwhelmed. The infiltration has begun and we must push back."
10046170-50 = "Time is short. Let's move."
10046170-56 = "...Better keep an eye on her."
