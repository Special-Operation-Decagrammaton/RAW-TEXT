10053120-13 = "3;히마리;00\n2;에이미;04;부장, 불 꺼놓고 뭐해? 그러다 눈 나빠진다.\n#2;em;[?]"
10053120-14 = "3;히마리;02\n2;에이미;04\n#na;히마리;어머, 에이미? 노크도 없이, 실례잖아요.\n#3;h\n#3;em;[반응]"
10053120-15 = "3;히마리;02\n2;에이미;02;뭐야, 또 이상한 거 보고 있어?\n#2;em;[한숨]"
10053120-16 = "3;히마리;01\n2;에이미;02\n#na;히마리;그 표현은 성립하지 않잖아요, 에이미. 제가 평소에는 이상한 것을 보고 있다는 오해가 생길 법한 어휘는 삼가 주실래요?\n#3;h"
10053120-17 = "3;히마리;01\n2;에이미;04;아니, 엄청 보잖아. 외계인이라든지, UFO라든지……."
10053120-18 = "3;히마리;01\n2;에이미;02;이번에는…… 우와, 츠치노코라니. 진짜 한물간 거잖아.\n#2;stiff"
10053120-19 = "3;히마리;02\n2;에이미;02\n#na;히마리;에이미, 이 부분을 명확히 해두고 싶네요. 외계인이나 UFO, 그리고 츠치노코는 이상한 게 아니라, 증명되지 않은 것이랍니다.\n#3;h"
10053120-20 = "3;히마리;03\n2;에이미;02\n#na;히마리;증명되지 않은 것은 존재하지 않는다고 간주한다면, 저희는 어떤 새로운 것을 발견할 수 있을까요?\n#3;h\n#3;em;[음표]"
10053120-21 = "3;히마리;03\n2;에이미;04;정론이기는 한데…… 그걸 부장한테 들으니까 좀…….\n#2;em;[…]"
10053120-22 = "3;히마리;06\n2;에이미;04\n#na;히마리;네?! 아까부터 저한테 조금 신랄하지 않아요?! 저는 어린 왕자의 장미꽃처럼, 보듬어줘야 하는 존재라고요?\n#3;h\n#3;em;[?!]"
10053120-23 = "3;히마리;06\n2;에이미;02;그 장미, 우주 한복판에서 멀쩡히 살아가는 슈퍼 장미잖아."
10053120-24 = "3;히마리;03\n2;에이미;02\n#na;히마리;아무튼, 저희 사이를 봐서, 조금 전까지의 무례는 없던 걸로 해줄게요. 그리고, 마침 잘 왔어요. 안 그래도 부르려던 참이었거든요.\n#3;h"
10053120-25 = "3;히마리;03\n2;에이미;00;응? 나를? 왜? 초현상특무부 활동은 공식적으로 종료된 거 아니었어?\n#2;em;[?]"
