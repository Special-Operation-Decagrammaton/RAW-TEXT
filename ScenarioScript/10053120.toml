[translation]
10053120-1 = "Afterword;Anonymous Who?"
10053120-3 = "I see."
10053120-4 = "I'd expect nothing less from [USERNAME] Sensei."
10053120-5 = "This is...even more data than I anticipated."
10053120-6 = "If we analyze these findings... We can, perhaps..."
10053120-13 = "President, don't use the computer in the dark. You will strain your eyes."
10053120-14 = "Oh, Eimi? It's rude not to knock."
10053120-15 = "Why? Are you watching weird content again?"
10053120-16 = "Eimi, please mind your words. If you speak like that, people will think I frequently enjoy...\"weird\" videos."
10053120-17 = "Well, you do. Aliens, UFOs, and..."
10053120-18 = "...Wow, the Tsuchinoko? Very dated."
10053120-19 = "Eimi, I want to make this clear. Aliens, UFOs, and the Tsuchinoko are not \"weird.\" They're simply unproven."
10053120-20 = "If we assume everything unproven is nonexistent, then how can we hope to make new discoveries?"
10053120-21 = "That's true... Still, coming from YOU..."
10053120-22 = "What?! Aren't you being so cruel today? I should be nurtured and doted on...like that rose in \"The Little Prince.\""
10053120-23 = "That was a talking super-rose living in the middle of space."
10053120-24 = "Considering our ongoing relationship, I'll let your uncouthness slide. Nevertheless, I'm glad you're here. I was about to call you."
10053120-25 = "Huh? Me? Why? I thought the Super Phenomenon Task Force was disbanded."
10053120-26 = "Before you say that, would you kindly look at this data?"
10053120-32 = "...?"
10053120-33 = "...What is this?"
10053120-34 = "I don't know."
10053120-35 = "How blunt."
10053120-36 = "Much has been seen, but nothing has been explained."
10053120-37 = "A mysterious bus of no origin, a stone doll that moves on its own, a public phone ringing in the dead of night."
10053120-38 = "All are supernatural phenomena that defy conventional wisdom and theory."
10053120-39 = "...Supernatural phenomena."
10053120-46 = "...Fufu. How about it, Eimi?"
10053120-47 = "Doesn't it seem like there's still work for us to do?"
