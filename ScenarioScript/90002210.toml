[translation]
90002210-1 = "第21話;鬥爭"
90002210-2 = "別開玩笑了，你這個冒充神的混帳東西！！！"
90002210-7 = "是你殺的。"
90002210-8 = "跟你殺的沒兩樣！"
90002210-9 = "做了那種事還敢自稱是神！！"
90002210-13 = "我根本就不期望你所謂的修剪！！"
90002210-14 = "應該把矛盾消除，那種事我絕對不能接受！！！！！"
90002210-30 = "我會變得幸福。"
90002210-31 = "不管發生什麼，我都會拚盡全力變得幸福！"
90002210-32 = "即使會在矛盾之中迷失方向，無論面對任何阻礙都一樣！！！"
90002210-33 = "愚蠢至極。"
90002210-34 = "罪的工價乃是死。#n其結果將以既定的形式迎來終結。"
90002210-35 = "倘若那便是你所認為的結局……"
90002210-40 = "[log]「對於無法克服自己的缺陷，從而自取滅亡的存在……」[/log]"
90002210-43 = "[log]「我不會致上敬意或予以袒護。」[/log]"
90002210-46 = "會有什麼樣的結局，我一點都不在乎！！！"
90002210-47 = "！？"
90002210-48 = "這不可能。#n你為何……還能動？"
90002210-49 = "唔，唔唔……！"
90002210-56 = "老，師……？"
90002210-57 = "[ns1] 「……我們能為已逝之物做的，或許只有哀悼而已。」\n[ns2] 「雖然令人悲傷，不過那也是觸碰到我們極限的事。」"
90002210-60 = "這樣很危險……請退後一點……"
90002210-61 = "[s] 「你就原諒我這一次，好嗎？」"
90002210-62 = "……算了，就算說了你也不會聽進去吧，老師。"
90002210-63 = "為何非得試探自身的極限呢。"
90002210-64 = "老，師……！"
90002210-65 = "鬥爭即是痛苦，且終將孕育罪孽。"
90002210-66 = "[s3] 「我知道。但是不要將其奪走。」\n[s4] 「不要試圖抹消我們的可能性。」"
90002210-69 = "……！"
90002210-70 = "[s5] 「只要還活著，或許就無法擺脫痛苦。」\n[s6] 「但我不會屈服於要替我們承擔一切的說辭。」"
90002210-73 = "即便最終要如蟲子般掙扎，醜陋地匍匐在地也在所不惜？"
90002210-77 = "[log]「是啊，或許就像你說的一樣。」[/log]"
90002210-80 = "[log]「即便如此，我依然會選擇那條道路。」[/log]"
90002210-83 = "[log]「就算只能跌倒、掙扎、滿身泥濘地蠕動前行。」[/log]"
90002210-86 = "[log]「我們也一定會在最後一刻，一起站起來的。」[/log]"
90002210-89 = "[ns] 「對吧，愛麗絲？」"
90002210-90 = "……"
90002210-91 = "嗯。是的，老師。"
90002210-92 = "你還記得嗎，Kei？#n愛麗絲曾經說過，勇者是和所有人一起前進的職業。"
90002210-93 = "我當然記得，愛麗絲。"
90002210-95 = "勇者正是藉由這種方式，和大家一起觸及一人之力無法抵達的──"
90002210-96 = "那遙遠彼方的職業啊。"
90002210-102 = "……放肆。"
