[translation]
90002210-1 = "ตอนที่ 21;ต่อสู้"
90002210-2 = "อย่ามาตลกเลยน่า แกน่ะมันเทพจอมปลอม!!!"
90002210-7 = "แกน่ะฆ่าพวกเขา"
90002210-8 = "แกน่ะมันไม่ต่างอะไรกับฆาตกรหรอก!"
90002210-9 = "ทำแบบนั้นแล้วยังกล้าเรียกตัวเองว่าเป็นเทพอีกเหรอ!!!"
90002210-13 = "ตัดแต่งกิ่งก้านงั้นเหรอ ฉันไม่ได้อยากได้อะไรแบบนั้นเลยสักหน่อย"
90002210-14 = "ความขัดแย้งที่ต้องตัดออกและทำให้มันหายไปแบบนั้น ฉันยอมรับมันไม่ได้หรอก!!!!!"
90002210-30 = "ฉันจะมีความสุขยิ่งกว่านี้"
90002210-31 = "ไม่ว่าจะเกิดอะไรขึ้น ฉันก็จะดิ้นรนจนกว่าจะมีความสุขให้ดู!"
90002210-32 = "ต่อให้ฉันจะหลงทางอยู่ในความขัดแย้ง ต่อให้จะมีใครมาขวางด้วยวิธีใดก็ตาม!!"
90002210-33 = "ช่างเป็นเรื่องโง่เขลา"
90002210-34 = "ค่าแรงของบาปคือความตาย และผลลัพธ์จะจบลงในรูปแบบที่กำหนดไว้"
90002210-35 = "ถ้านั่นคือตอบจบที่แกคิดไว้ละก็..."
90002210-40 = "[log]\"ครูขอเป็นคนที่เลือกและยอมรับสิ่งที่ตามมาดีกว่า\"[/log]"
90002210-43 = "[log]\"ครูจะไม่เคารพคนที่เอาชนะข้อบกพร่องของตัวเองไม่ได้หรอก\"[/log]"
90002210-46 = "ไม่ว่ามันจะลงเอยยังไง ฉันก็ไม่สนทั้งนั้น!!!"
90002210-47 = "?!"
90002210-48 = "เป็นไปไม่ได้ ทำไมถึง... ขยับตัวได้ล่ะ?"
90002210-49 = "อะ... อึก...!"
90002210-56 = "คุณ... ครู...?"
90002210-57 = "[ns1] \"สิ่งเดียวที่ทำได้... เพื่อสิ่งที่สูญเสียไปแล้วคงเป็นการแสดงความเสียใจ\"\n[ns2] \"น่าเศร้านะ เพราะมันคือการเผชิญหน้ากับขีดจำกัดของเราด้วย\""
90002210-60 = "ฉันบอกว่ามันอันตรายยังไงล่ะคะ... ถอยออกไปค่ะ..."
90002210-61 = "[s] \"ครั้งนี้อย่าว่าครูเลยนะ ขอร้องละ\""
90002210-62 = "ก็ได้ค่ะ... คุณครูน่ะ ต่อให้พูดไปก็ไม่ยอมฟังอยู่แล้วนี่คะ"
90002210-63 = "เหตุใดถึงพยายามทดสอบขีดจำกัดของตัวเองเล่า?"
90002210-64 = "คุณ... ครู...!"
90002210-65 = "การต่อสู้คือความเจ็บปวด และในที่สุดมันจะก่อให้เกิดบาป"
90002210-66 = "[s3] \"ฉันรู้ แต่อย่าพยายามแย่งสิ่งนั้นไปจากพวกเราเลย\"\n[s4] \"อย่ามาขจัดความเป็นไปได้ออกไปจากพวกเราเลย\""
90002210-69 = "...!"
90002210-70 = "[s5] \"ต่อให้ไม่มีทางหลุดพ้น ฉันก็จะไม่ยอมให้ใครมาทำทุกอย่างแทนเด็ดขาด\"\n[s6] \"ตราบใดที่ยังมีชีวิตอยู่ ฉันจะไม่ยอมให้ใครมาทำทุกอย่างแทนเด็ดขาด\""
90002210-73 = "ต่อให้สุดท้ายแล้วจะต้องคืบคลานเหมือนหนอนน่าเกลียดอยู่บนพื้นก็ตามทีงั้นหรือ?"
90002210-77 = "[log]\"ก็ใช่ มันอาจจะเป็นอย่างนั้นก็ได้\"[/log]"
90002210-80 = "[log]\"แต่ถึงยังไงฉันก็จะเลือกเส้นทางนั้น\"[/log]"
90002210-83 = "[log]\"แม้จะทำได้แค่ล้มลง กระเสือกกระสน และดิ้นไปมาในโคลนตม\"[/log]"
90002210-86 = "[log]\"แต่ในที่สุดพวกเราจะลุกขึ้นยืนด้วยกันได้แน่นอน\"[/log]"
90002210-89 = "[ns] \"ใช่มั้ย อาริสึ?\""
90002210-90 = "..."
90002210-91 = "ค่ะ ใช่แล้วค่ะ คุณครู"
90002210-92 = "ยังจำได้มั้ยคะ เคย์? ที่อาริสึเคยบอกไว้ว่าผู้กล้าคืออาชีพที่ก้าวไปข้างหน้าพร้อมกับทุกคนน่ะค่ะ"
90002210-93 = "ฉันจำได้ค่ะ อาริสึ ต้องจำได้อยู่แล้วค่ะ"
90002210-95 = "อาริสึบอกไว้ว่าผู้กล้าจะกลายเป็นคนที่ก้าวไปข้างหน้าพร้อมกับทุกๆ คน"
90002210-96 = "สู่สถานที่อันไกลโพ้นที่เราไม่อาจไปถึงได้ด้วยพละกำลังของเราคนเดียวค่ะ"
90002210-102 = "ไร้มารยาทเสียจริง..."
