[translation]
90002210-1 = "Episode 21;Strife"
90002210-2 = "Don't try me, you FALSE GOD!"
90002210-7 = "You killed them."
90002210-8 = "YOU KILLED THEM!"
90002210-9 = "DON'T YOU DARE CALL YOURSELF A \"GOD\"!"
90002210-13 = "I don't want your damn pruning."
90002210-14 = "And I...will never accept that so-called \"contradictions\" need to be cut away as if they never existed! AS IF THEY NEVER MATTERED!"
90002210-30 = "Pursuing happiness."
90002210-31 = "No matter what, with absolute certainty, I'll give everything I have for it!"
90002210-32 = "Even if I get lost in the CONTRADICTIONS, even if someone tries to GET IN MY WAY!"
90002210-33 = "Foolish."
90002210-34 = "The price of sin is death. The outcome is absolute."
90002210-35 = "If that's the only outcome you believe in..."
90002210-40 = "[log] \"I don't have any respect for those who...\"[/log]"
90002210-43 = "[log]\"...destroy themselves while clinging to their flaws.\"[/log]"
90002210-46 = "I won't care how it ends as long as I write my own ending!"
90002210-47 = "?!"
90002210-48 = "Impossible. How...are you moving?"
90002210-49 = "U-Ugh...!"
90002210-56 = "Sensei...?"
90002210-57 = "[ns1] \"...All we can do for those we have lost is grieve.\"\n[ns2] \"It's sad, but that's all we can do.\""
90002210-60 = "I told you it's dangerous... Please...get back!"
90002210-61 = "[s] \"Please let me off the hook, just this once.\""
90002210-62 = "...Fine. You never were one to do what you're told."
90002210-63 = "Why must you insist on testing your own limits?"
90002210-64 = "Sensei...!"
90002210-65 = "To struggle is to suffer, and it will ultimately give birth to sin."
90002210-66 = "[s3] \"I know. But don't try to take that away from us.\"\n[s4] \"Don't try to eradicate possibility from us.\""
90002210-69 = "...!"
90002210-70 = "[s5] \"As long as we're alive, we cannot escape suffering.\"\n[s6] \"But I will not let another bear that burden in my place.\""
90002210-73 = "Even if it means squirming and crawling on the ground like a wretched insect?"
90002210-77 = "[log] \"Yeah. That might be the case.\"[/log]"
90002210-80 = "[log] \"Even so, that is the path I choose.\"[/log]"
90002210-83 = "[log] \"Even if all we can do is to fall, struggle, and squirm in the mud.\"[/log]"
90002210-86 = "[log] \"In the end, we will rise up together.\"[/log]"
90002210-89 = "[ns] \"Isn't that right, Aris?\""
90002210-90 = "..."
90002210-91 = "Yes. That is right, Sensei."
90002210-92 = "Do you remember, Kei? When I said that a \"hero is someone who marches constantly forward with their party members\"?"
90002210-93 = "Aris, of course I remember."
90002210-95 = "A hero can go to all the places..."
90002210-96 = "...that would be impossible to reach with just their own strength."
90002210-102 = "...Such blasphemy."
