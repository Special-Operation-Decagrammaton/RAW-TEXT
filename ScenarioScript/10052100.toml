[translation]
10052100-1 = "#title;게부라. 합리를 넘어선 용기의 중재자"
10052100-2 = "#wait;2000"
10052100-3 = "3;히마리 결전;02;…….\n#3;a"
10052100-4 = "3;히마리 결전;05;여긴 왜 아직도 빙해…… 같은 곳이죠?!\n#3;em;[?!]\n#3;shake"
10052100-5 = "[s] \"진정해, 히마리……. 조금만 건너가면 다시 강철대륙이야…….\""
10052100-6 = "3;히마리 결전;10;그건 아는데요! 왜 여기에서까지 추운 지형을 고집하느냐는 거예요, 게부라는!"
10052100-7 = "3;유즈 결전;02;호, 호크마 역시 마찬가지였으니까…… 예언자들도, 자기가 좋아하는 지형이나 환경 같은 게…… 있는 것 아닐까요……?\n#3;em;…"
10052100-8 = "3;토키 결전;00;그렇군요. 히마리 부장이 에이미와 에어컨을 두고 다투는 것과 마찬가지인 것으로 이해했습니다."
10052100-9 = "3;히마리 결전;10;……그건 언제나 말씀드리는 것이지만, 에이미가 지나치게 추위를 느끼지 않는 탓이니까요?\n#3;em;[땀]"
10052100-10 = "3;토키 결전;01;어쨌든, 어떤 의미에서는 그립게 느껴지는 환경이기도 합니다."
10052100-11 = "3;토키 결전;02;빙해에서 돌연 포착된 데카그라마톤의 신호를 추적했고, 바로 이…… 게부라를 상대하게 되었죠."
10052100-12 = "[s] \"생각해 보면 그게 토키의 첫 임무였지.\""
10052100-13 = "3;토키 결전;99;네. 초현상특무부로서 선생님과 함께한, 최초의 미션이기도 했고요."
10052100-14 = "3;토키 결전;01;덧붙여서 그때 저는 상당한 추위를 느끼고 있었습니다만, 에이미를 보며 어떻게든 기합으로 버티고 있었던 것입니다."
10052100-15 = "3;토키 결전;03;어떠신가요, 선생님. 지금이라도 그때의 저에게 기특함을 느끼시고, 적절한 칭찬을 주실 기회를 드려 보고자 하는데요.\n#3;em;[반짝]\n#3;closeup"
10052100-16 = "[s] \"……그렇게 어필하지 않아도, 토키는 기특한 학생이니까…….\""
10052100-17 = "3;토키 결전;99;감사합니다. 하지만 부족하군요. 저는 아스마 토키이기에 더 많은 것을 태연하게 바라고자 합니다.\n#3;closeup"
10052100-18 = "3;히마리 결전;05;……선생님. 너무 그렇게 응석을 받아 주시면, 토키의 교육에 안 좋아요……?\n#3;em;[반응]"
10052100-19 = "[s] \"……그렇다고 하는데?\""
10052100-20 = "3;토키 결전;99;그렇군요. 그렇다면 저는 약간 떨어진 곳에서 적당히 풀 죽어 있도록 하겠습니다…….\n#3;em;[한숨]"
10052100-21 = "1;유즈 결전;02;저, 저기! 지금은 춥지 않은…… 건가요……?\n#1;em;[?]\n#1;ar\n#3;m5"
10052100-22 = "3;토키 결전;01;네. 이 슈트는 상당한 수준의 방한 기능이 내장되어 있기에, 그 부분은 문제없습니다. 신경 써 주셔서 감사합니다, 유즈."
10052100-23 = "3;토키 결전;02;……생각해 보니, 방한 기능이 내장되어 있지 않았더라면, 그것을 핑계로 조금 더 선생님께 밀착할 수 있지 않았을까요? 불찰이군요……."
10052100-24 = "#all;hide"
10052100-25 = "3;히마리 결전;02;자, 자. 토키. 이제 그만 현장 조사로 돌아가죠. \n#3;em;[반응]"
10052100-26 = "3;히마리 결전;01;게부라의 기원은 극지 연구 기지의 무인 탐사기와 그 AI가, 데카그라마톤에 의해 해킹된 것으로 추정되고 있어요."
10052100-27 = "3;히마리 결전;99;데카그라마톤 쪽의 용어를 사용하자면, 해킹이 아니라 '감화'라고 하지만…… 이 부분은 넘어가죠."
10052100-28 = "3;히마리 결전;05;저는 그것보다 무인 탐사기가, 뭘 어떻게 하면 이렇게까지 바뀔 수 있었는지, 그 부분이 더 공학적으로 신경 쓰이네요……. \n#3;em;…"
10052100-29 = "#st;[0,0];instant;1;"
10052100-30 = "#clearST"
10052100-31 = "#all;hide"
10052100-32 = "#wait;1500"
10052100-33 = "#bgshake\n#wait;1500"
10052100-34 = "3;유즈 결전;10;히, 히익……?!\n#3;em;[?!]\n#3;shake\n#3;a"
10052100-35 = "3;토키 결전;99;바로 그 감화된 극지 무인 탐사기가 도착한 모양이군요."
10052100-36 = "#st;[0,0];instant;1;"
10052100-37 = "#clearST"
10052100-38 = "3;토키 결전;01\n#3;greeting\n#wait;1200"
10052100-39 = "3;토키 결전;02;그러면, 선생님. 지휘 부탁드리겠습니다.\n#3;closeup"
