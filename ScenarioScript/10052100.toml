[translation]
10052100-1 = "葛夫拉：超乎常理的勇猛仲裁者"
10052100-3 = "……"
10052100-4 = "這裡為什麼還是冰海……之類的地方啊！？"
10052100-5 = "[s] 「冷靜，陽葵……再走一點就是鋼鐵大陸了……」"
10052100-6 = "這點我也知道！問題是葛夫拉為什麼連在這裡也要堅持寒冷的地形啊！"
10052100-7 = "霍，霍刻瑪也是一樣的呢……#n預言者們，也有各自喜歡的地形或環境……是嗎……？"
10052100-8 = "原來如此。#n這就跟陽葵部長和英美會為了冷氣機吵架一樣呢。"
10052100-9 = "……我已經說過很多次，那是因為英美太不怕冷了吧？"
10052100-10 = "總之，這可以說是個令人懷念的環境呢。"
10052100-11 = "追蹤在冰海突然捕捉到的十字神名信號後……就遇上了葛夫拉。"
10052100-12 = "[s] 「話說那是季的第一個任務呢。」"
10052100-13 = "沒錯。是作為特異現象搜查部的成員，和老師一起執行的第一個任務。"
10052100-14 = "順帶一提，當時的我感到相當寒冷，不過看著英美用毅力撐過去了。"
10052100-15 = "您覺得怎麼樣呢，老師？#n是不是對那時的我感到欣慰，想要給予適當的稱讚呢？"
10052100-16 = "[s] 「不用那樣推銷，季也是很棒的學生哦……」"
10052100-17 = "謝謝您，不過那樣是不夠的。#n因為我是飛鳥馬季，所以還要索求更多。"
10052100-18 = "……老師。太寵他的話，對季的教育不好哦……？"
10052100-19 = "[s] 「……他是這麼說的？」"
10052100-20 = "是嗎。那麼我就在稍微遠一點的地方，適當地垂頭喪氣吧……"
10052100-21 = "那，那個！所以現在不會冷了……是嗎……？"
10052100-22 = "是的。這套戰鬥服配備了相當優秀的禦寒功能，因此那個部分不成問題。#n謝謝你的關心，柚子。"
10052100-23 = "……不過現在想想，要是沒有禦寒功能就能藉機更靠近老師一點了吧？#n真是失策……"
10052100-25 = "好了好了，季。#n差不多該回到現場調查囉。"
10052100-26 = "葛夫拉的起源被推測是極地研究基地的無人探測器，#n以及其AI被十字神名駭入後所生。"
10052100-27 = "雖然按照十字神名陣營的說法，那並非駭入而是「感化」……這個部分就先跳過吧。"
10052100-28 = "我更在意的是，無人探測器究竟是怎麼變成那樣，以及在工程學上該如何解釋……"
10052100-34 = "噫，噫噫……！？"
10052100-35 = "看來被感化的極地無人探測器出現了呢。"
10052100-39 = "那麼老師，指揮就拜託您了。"
