[translation]
10052100-1 = "เกวูราห์ ผู้ตัดสินแห่งความกล้า ผู้อยู่เหนือตรรกะทั้งปวง"
10052100-3 = "..."
10052100-4 = "ทำไมที่นี่ยังเป็น... ธารน้ำแข็งอยู่เลยล่ะคะ?!"
10052100-5 = "[s] \"ใจเย็นนะ ฮิมาริ... ข้ามไปอีกหน่อยก็จะเป็นดินแดนเหล็กกล้าแล้วละ...\""
10052100-6 = "เรื่องนั้นฉันก็รู้ค่ะ! แต่ที่ฉันถามก็คือ ทำไมเกวูราห์ถึงยึดติดกับสภาพภูมิประเทศที่หนาวเย็น แม้กระทั่งที่นี่เลยต่างหากค่ะ!"
10052100-7 = "ชะ... ชอกมาห์ก็ด้วยเหมือนกัน... หรือว่าผู้เลื่อมใสจะมีสภาพภูมิประเทศหรือสภาพแวดล้อม... ที่ชื่นชอบกันเป็นพิเศษคะ...?"
10052100-8 = "นั่นสินะคะ นึกถึงตอนที่หัวหน้าฮิมาริกับเอมิทะเลาะกันเรื่องเปิดแอร์เลยค่ะ"
10052100-9 = "แต่ฉันก็พูดอยู่ตลอดนะคะ เอมินั่นละค่ะที่ขี้ร้อนเกินจนไม่รับรู้ถึงความหนาวเลย..."
10052100-10 = "แต่ในบางแง่ สภาพแวดล้อมแบบนี้ก็ชวนให้นึกถึงเรื่องเมื่อก่อนเลยนะคะ"
10052100-11 = "ก็เราติดตามสัญญาณของเดคาแกรมมาทอนที่ตรวจจับอย่างกะทันหันได้ในธารน้ำแข็ง... จนสุดท้ายก็ได้มาเผชิญหน้ากับเกวูราห์นี่คะ"
10052100-12 = "[s] \"จะว่าไป นั่นเป็นภารกิจแรกของโทคิเลยนะ\""
10052100-13 = "ใช่ค่ะ แล้วก็เป็นภารกิจแรกที่ฉันทำร่วมกับคุณครูในนามของชมรมปรากฏการณ์ลี้ลับด้วยค่ะ"
10052100-14 = "แล้วตอนนั้นฉันก็หนาวมากๆ แต่พอเห็นเอมิ ฉันก็บอกตัวเองว่าต้องพยายามอดทนและผ่านไปให้ได้ค่ะ"
10052100-15 = "ว่ายังไงล่ะคะ คุณครู รู้สึกภูมิใจกับฉันในตอนนั้นและอยากชื่นชมฉันในตอนนี้ขึ้นมาหรือยังคะ นี่ฉันเปิดโอกาสให้แล้วนะคะ?"
10052100-16 = "[s] \"ต่อให้ไม่พูดแบบนั้น โทคิก็เป็นนักเรียนที่น่าภูมิใจของครูอยู่แล้วละ...\""
10052100-17 = "ขอบคุณค่ะ แต่มันยังไม่พอน่ะสิคะ อะซุมะ โทคิคนนี้อยากได้อะไรที่มากกว่านี้ค่ะ"
10052100-18 = "คุณครู... ถ้าตามใจมากเกินไป จะทำให้โทคิเคยตัวนะคะ..."
10052100-19 = "[s] \"หัวหน้าว่าอย่างนั้นน่ะ โทคิ...\""
10052100-20 = "อย่างนั้นสินะคะ ถ้างั้นฉันจะออกไปนั่งเหงาหงอยอยู่ห่างๆ แล้วกันค่ะ..."
10052100-21 = "ดะ... เดี๋ยวก่อนค่ะ! แล้วตอนนี้ไม่หนาว... เหรอคะ...?"
10052100-22 = "ค่ะ ชุดนี้มีระบบป้องกันความหนาวเย็นในตัวอยู่แล้ว เรื่องความหนาวก็เลยไม่เป็นปัญหาค่ะ ขอบคุณที่ใส่ใจกันนะคะ ยูสึ"
10052100-23 = "แต่พอมาคิดดูแล้ว... ถ้าชุดของฉันไม่มีระบบป้องกันความหนาวเย็น ฉันก็คงใช้เรื่องนั้นเป็นข้ออ้าง#nในการเข้าใกล้คุณครูได้มากขึ้นนะคะ ไม่น่าสะเพร่าเรื่องนี้เลย..."
10052100-25 = "เอาละๆ โทคิ ออกไปสำรวจพื้นที่ได้แล้วค่ะ"
10052100-26 = "ตอนนี้เราสันนิษฐานว่าต้นกำเนิดของเกวูราห์คือยานสำรวจไร้คนขับในฐานการวิจัยเขตขั้วโลก#nและ AI นั้นก็โดนเดคาแกรมมาทอนแฮ็กค่ะ"
10052100-27 = "ถ้าจะใช้คำของทางเดคาแกรมมาทอน ก็ต้องบอกว่าเป็นการ 'ใช้อิทธิพล' มากกว่าการแฮ็ก... แต่ส่วนนี้เราข้ามไปเถอะค่ะ"
10052100-28 = "ในมุมของวิศวกรรม ฉันสนใจว่ายานสำรวจไร้คนขับนี้ไปทำอะไรมา ถึงได้เปลี่ยนไปได้ขนาดนั้นมากกว่าค่ะ... "
10052100-34 = "ฮะ... เฮือก...!!"
10052100-35 = "ท่าทางยานสำรวจเขตขั้วโลกไร้คนขับที่พูดถึงกันอยู่จะมาแล้วนะคะ"
10052100-39 = "ถ้างั้นก็ คุณครูคะ ช่วยสั่งการพวกเราด้วยค่ะ"
