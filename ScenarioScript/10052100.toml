[translation]
10052100-1 = "Geburah, Ruler of Recklessness"
10052100-3 = "..."
10052100-4 = "WHY are we back in the Glacial Sea?"
10052100-5 = "[s] \"It's just this section of the Steel Continent. It'll be okay, Himari.\""
10052100-6 = "It is NOT that I don't understand that! I just fail to understand why Geburah must insist on freezing temperatures no matter where they go!"
10052100-7 = "I-It was the same with Chokmah too... So maybe the prophets have...preferred natural environments?"
10052100-8 = "Understood. Like Himari and Eimi fighting over the AC."
10052100-9 = "...At the risk of repeating myself for the thousandth time, Eimi's cold tolerance is the outlier here."
10052100-10 = "Moving on. It is somewhat nostalgic."
10052100-11 = "After tracking Decagrammaton's signals to the Glacial Sea, it was...Geburah we faced first."
10052100-12 = "[s] \"Thinking about it, that was Toki's first mission.\""
10052100-13 = "Yes. It was also my first mission with Sensei as a member of the Super Phenomenon Task Force."
10052100-14 = "I would like everyone to know something, however. I was freezing at the time, but I observed Eimi's behavior and endured it through sheer willpower."
10052100-15 = "Am I not impressive, Sensei? This is an opportunity to compliment me and tell me how proud you are of me."
10052100-16 = "[s] \"...Regardless, I'm always proud of you, Toki.\""
10052100-17 = "I appreciate the sentiment. However, such a statement is insufficient. I, Asuma Toki, will calmly ask again."
10052100-18 = "...Sensei. It's not good for her growth if you keep spoiling her like that."
10052100-19 = "[s] \"...Himari said it.\""
10052100-20 = "Affirmative. I will now keep a small distance from the rest of the group, so I may properly sulk."
10052100-21 = "U-Um! Are you...still feeling cold?"
10052100-22 = "No. This suit was built with such conditions in mind. There is no need for worry. Thank you for worrying, Yuzu."
10052100-23 = "...In hindsight, if this suit DIDN'T have such advanced cold protection, I could have held onto Sensei for warmth. An error on my part."
10052100-25 = "Now, now. Toki. Let's return to the matter at hand. "
10052100-26 = "We suspect that Geburah was an unmanned AI drone operating from a research center in the polar region before Decagrammaton hacked it."
10052100-27 = "Or, to use Decagrammaton's words, \"inspired\" the AI to follow its teachings. But that's irrelevant for our current task."
10052100-28 = "Much more importantly, I'm curious about the kind of engineering work that can turn an unmanned drone into— "
10052100-34 = "E-Eek...?!"
10052100-35 = "Speaking of the inspired, unmanned drone..."
10052100-39 = "Then, Sensei. Ready for orders."
