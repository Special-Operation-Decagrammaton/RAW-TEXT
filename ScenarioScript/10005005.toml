[translation]
10005005-1 = "Prologue;C&C's New Member"
10005005-3 = "Infiltration successful."
10005005-4 = "We're clear. No enemies spotted."
10005005-5 = "Excellent."
10005005-11 = "Engine Room Aboard the Golden Fleece"
10005005-14 = "*sigh* What was that? I expected way worse."
10005005-15 = "It was significantly easier than I projected to sneak aboard a moving cruise ship..."
10005005-16 = "And a ship belonging to another school, on top of that."
10005005-17 = "We've slipped right in without anyone noticing."
10005005-18 = "It's all perfectly going to plan, isn't it? Heehee."
10005005-19 = "*sigh*"
10005005-20 = "You don't seriously mean that. The whole thing's a disaster."
10005005-21 = "I hate every single little thing about this!"
10005005-22 = "We're following orders! From the Seminar treasurer, of all people! And sneaking around like a bunch of robbers!"
10005005-23 = "And the cherry on the cake..."
10005005-24 = "(glare)"
10005005-25 = "[s1] \"I'm counting on you, Neru.\"\n[s2] \"I'm sensing some kind of hostility.\""
10005005-26 = "The absolute worst thing about all of this is having a babysitter! And why is it Sensei?!"
10005005-27 = "The absolute worst thing about all of this is having a babysitter! And why is it Sensei?!"
10005005-28 = "[s] \"I wouldn't say babysitter...\""
10005005-29 = "Now, now. That's not how we see Sensei at all."
10005005-30 = "Let's not get too upset about an unfortunate situation."
10005005-31 = "It may have not been Sensei's intention, but it definitely was Seminar's."
10005005-32 = "Exactly! I'm seriously pissed off! What did I do to deserve this?"
10005005-33 = "Didn't I say I could handle it myself? Why didn't they just leave it to me and let me do my job?"
10005005-34 = "Aha...ha..."
10005005-35 = "Hmm."
10005005-36 = "Well..."
10005005-37 = "I do believe you're not entirely faultless here..."
10005005-39 = "...Two days ago."
10005005-42 = "Hello? This is Akane of C&C."
10005005-43 = "How is the reception on your end?"
10005005-44 = "Y-Yes! All clear."
10005005-45 = "*sigh* I wish I wasn't having this conversation right now..."
10005005-46 = "Heehee. The sweet sound of a new commission."
10005005-47 = "On the bright side, you come to us because you can trust us to get it done, right?"
10005005-48 = "We can talk about bright sides after I'm done cleaning up the mess I know you're gonna cause!"
10005005-49 = "Have you ever, in the entire history of time, handled things quietly like I asked?"
10005005-50 = "Equipment destroyed! Buildings on fire! And endless paperwork for me!"
10005005-51 = "Do you remember last month? You exceeded your budget by almost six times! You are my worst nightmare!"
10005005-52 = "Never again. I promised myself, never again."
10005005-53 = "So this time, I've come with reinforcements."
10005005-54 = "I'm sorry? What do you mean?"
10005005-55 = "Please greet your new...supervisor, of sorts."
10005005-60 = "They'll simply confirm if the amount of damages incurred on this commission were a necessary cost."
10005005-61 = "Think of it as a small, procedural check-up, nothing more. Best of luck!"
10005005-62 = "Ahaha... But..."
10005005-63 = "Huh...?"
10005005-67 = "Sensei?"
10005005-69 = "Ugh, I still can't believe this is happening."
10005005-70 = "I didn't think those Seminar jerks would stoop so low!"
10005005-71 = "And Yuuka! Over-budget this! Infirmary is flooded that!"
10005005-72 = "Isn't dealing with that kind of stuff her job?! I'm doing the same thing, just getting my job done!"
10005005-73 = "The more I think about it, the madder I get! Argh! That's it! We're going in!"
10005005-74 = "Please, Neru. Let's evaluate and be reasonable."
10005005-75 = "I think we'll be in a bit of trouble if we're reckless at another school."
10005005-76 = "Well, I think it's worth the trouble! If I cause conflict between schools, so be it!"
10005005-77 = "If you're scared, that's fine. I guess I'll just have to take care of everything myself."
10005005-78 = "[s3] \"I don't think you should do that, Neru.\"\n[s4] \"Sorry, Neru, but I can't agree with you on this one.\""
10005005-79 = "...Huh?"
10005005-80 = "...Huh?"
10005005-86 = "Say that again, Sensei."
10005005-87 = "You're taking their side? Do you agree with that nagging treasurer too?!"
10005005-88 = "[s5] \"Yep.\"\n[s6] \"No means no.\""
10005005-89 = "Wh-What?"
10005005-90 = "Wh-What?"
10005005-91 = "Hmm."
10005005-95 = "I'm-! AARGH! Are you serious? Seriously?!"
10005005-96 = "*sigh* Okay. Fine. I'll stay put."
10005005-97 = "To be clear, I still don't like any of this."
10005005-102 = "Whoa..."
10005005-103 = "Akane, a-are you seeing what I'm seeing?"
10005005-104 = "I believe I am, Karin. I believe the Seminar treasurer's questionable methods..."
10005005-105 = "...may have actually been rather effective. Even the president can't say no to Sensei."
10005005-106 = "In fact, this may have been Yuuka's ultimate goal from the beginning."
10005005-107 = "All of you, shut up! I'm in a bad mood now, so not a word out of any of you!"
10005005-108 = "Heehee. Yes, ma'am."
10005005-109 = "Anyways, Sensei, our goal today is to complete our mission quickly and quietly."
10005005-110 = "Regardless of why, you'll be with us from now on, so if you'd please board."
10005005-112 = "Are my eyes seeing correctly? Master?!"
10005005-113 = "You're coming to play with us today?"
10005005-114 = "Master's going to be on our team! C&C's newest member!"
10005005-119 = "Huh?"
10005005-120 = "...?"
10005005-121 = "Sensei...as C&C's new member?"
10005005-122 = "I guess that's one way to look at it."
10005005-123 = "Oh dear, no complaints here! Heehee."
10005005-124 = "Sensei's one of us now. What an exciting turn of events."
10005005-126 = "Doesn't that make you hate this a little less, President?"
10005005-127 = "Are you kidding me? There's no way that makes me feel even one tiny bit better."
10005005-128 = "Are you sure? It sure makes me happy!"
10005005-129 = "I am absolutely, without a shadow of doubt, completely sure."
10005005-130 = "I detect a small smile."
10005005-131 = "Didn't I tell you all to shut up?! I'm not happy, okay?! I hate all of it!"
10005005-132 = "[s7] \"Your happy expression is cute.\"\n[s8] \"I look forward to working with you today.\""
10005005-135 = "...!"
10005005-136 = "...Aa...Argh...!"
10005005-140 = "..."
10005005-141 = "F-Fine! I guess this isn't the worst thing that's ever happened to me."
