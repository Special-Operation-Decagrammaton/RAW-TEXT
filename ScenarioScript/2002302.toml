[translation]
2002302-1 = "The Director's Rumors"
2002302-2 = "Schale Executive Office"
2002302-8 = "Hello, [USERNAME] Sensei."
2002302-9 = "I'm Ogata Kanna. As discussed previously, I'll be working a shift at Schale today."
2002302-10 = "This is my first time being assigned this duty, so I may be lacking in necessary skills. Nevertheless, I look forward to working with you."
2002302-11 = "[s1] \"Likewise, Kanna.\"\n[s2] \"Me... too...? Ma'am?\""
2002302-12 = "By the way, I have been informed that a number of Valkyrie Police School students have worked shifts at Schale in the past."
2002302-13 = "Hm? Do you think I'm being too formal? It's natural considering our positions."
2002302-14 = "By the way, I have been informed that a number of Valkyrie Police School students have worked shifts at Schale in the past."
2002302-15 = "I have noticed a number of them engaging in conduct that does not conform with the duties of a police officer during these times."
2002302-16 = "It would be regrettable if they're being an inconvenience when they should be helping."
2002302-17 = "I hope they haven't said anything too stupid."
2002302-20 = "E-Excuse me? You wanna know about Director Kanna?"
2002302-21 = "Um, don't tell anyone I said this...but she's basically the face of terror to Police School students."
2002302-22 = "She's so strict, and she always looks angry..."
2002302-27 = "*whisper* She's even got a scary nickname. They call her the Feral Hound."
2002302-28 = "So, no matter what you do, Sensei..."
2002302-29 = "Don't get on Director Kanna's bad side!"
2002302-34 = "[ns] \"I-I haven't heard anything...!\""
2002302-35 = "That's a relief."
2002302-36 = "You appear to be sweating quite profusely. Are you sick?"
2002302-37 = "[s3] \"It's pretty hot today...\"\n[s4] \"M-Maybe I should turn the AC on.\""
2002302-40 = "Whatever you prefer."
2002302-41 = "I'll be taking care of paperwork over there."
2002302-47 = "[ns] \"(Note to self: don't antagonize Kanna. Under any circumstances.)\""
2002302-53 = "Sensei, I'd like to go over the expenses for the joint public security training run by Valkyrie Police School and Schale last week."
2002302-54 = "Where can I find Schale's receipts?"
2002302-55 = "[s5] \"Expense receipts... They're over there...\"\n[s6] \"Look inside the desk drawer on the right.\""
2002302-63 = "Ah. Found them."
2002302-64 = "Momo Friends limited edition Pinky-Paca backpack for 5,000 yen..."
2002302-65 = "Pre-paid mobile game store gift card for 10,000 yen..."
2002302-66 = "3 boxes of \"Return of the Giant Beetles\" Mushiqueen booster packs for 5,000 yen...?"
2002302-71 = "Sensei, it seems your receipts..."
2002302-72 = "[s7] \"O-Oops...\"\n[s8] \"I guess I mixed those in by mistake!\""
2002302-81 = "My recommendation is to have separate, dedicated storage solutions for personal and official expenses. That way, your receipts won't be mixed together by mistake."
2002302-82 = "If it's absolutely necessary to store them in the same location, you might use different color labels to separate them."
2002302-83 = "[s] \"Y-Yes, ma'am...\""
2002302-84 = "Excellent. I will continue carrying out my duties."
2002302-90 = "Sensei, I've organized your list of witness accounts of notable wanted criminals."
2002302-91 = "You can also see that I've marked the locations of the witnesses on this jurisdiction map for easy reference."
2002302-92 = "[s] \"Already? That was fast!\""
2002302-93 = "This is quite simple, compared to my work at Valkyrie Police School."
2002302-94 = "There's no need to individually approve each sheet, compare serial numbers, or forward copies to the records department..."
2002302-95 = "So, comparatively, Schale's paperwork is actually quite flexible. It makes it much easier."
2002302-96 = "[s] \"Sounds like you've got it rough.\""
2002302-97 = "It's nothing. Ensuring protocol is followed is a police officer's duty."
2002302-98 = "Also, the map markers aren't affixed to the map, so please take care when you're—"
2002302-103 = "[ns] \"S-Sorry! I meant to pin it up on the bulletin board...\""
2002302-109 = "...Too late."
2002302-110 = "Don't worry too much. I should've warned you earlier."
2002302-111 = "I'll reorganize the markers."
2002302-116 = "[ns] \"(So awkward...)\""
2002302-118 = "*sigh* It looks like all of the pressing tasks have been completed."
2002302-119 = "[s9] \"Good work!\"\n[s10] \"Would you like a cup of coffee?\""
2002302-122 = "Yes, please."
2002302-123 = "An iced coffee, if you don't mind."
2002302-124 = "[s11] \"Sure! One second.\"\n[s12] \"I'll get you the best cup of coffee you've ever had.\""
2002302-131 = "Um, Sensei? I may be worrying too much, but..."
2002302-132 = "Keep an eye on those papers scattered on the ground when you—"
2002302-135 = "[ns] \"Ahhh!\""
2002302-139 = "[ns] \"I-I'm sorry! Did you get a lot on you?!\""
2002302-145 = "...It's fine. I would like to change, though."
2002302-146 = "Could you point me towards the changing room, Sensei?"
2002302-147 = "Excuse me."
2002302-155 = "[s] \"Umm...\""
2002302-156 = "Yes? Did you have something to say?"
2002302-157 = "[s] \"Are you... angry?\""
2002302-158 = "Angry? Did you do something I should be angry about?"
2002302-159 = "Mistakes may have been made today, but I don't think they were anything to be angry about."
2002302-160 = "That reminds me. I did notice that you've seemed uncomfortable all day. Is that the reason why you couldn't focus on your work?"
2002302-161 = "Was the problem caused by me?"
2002302-162 = "[ns] Tell her the rumors you've heard."
2002302-163 = "Hah. Hahaha."
2002302-164 = "So you've heard rumors about the Feral Hound."
2002302-165 = "You don't need to worry. They're just rumors."
2002302-166 = "Even the Feral Hound of the Public Peace Bureau must be able to control her emotions. Otherwise, there's no way I could call myself an officer of Valkyrie Police School, and be trusted to uphold the law."
2002302-167 = "I'm aware others may find me uncomfortable to be around. It is true that I am strict with the underclassmen and that many are intimidated by my facial expressions."
2002302-168 = "But even I wouldn't get angry with you over such trivial matters."
2002302-169 = "And I don't give out rebukes for simple mistakes."
2002302-170 = "Unlike crime, a mistake made without intent can be rectified through individual effort. If the individual is afraid of being rebuked, though, they may try to hide their mistake rather than fix it."
2002302-171 = "So I hope, in the future, you feel comfortable enough to ask me anything."
2002302-172 = "[s] \"That's an admirable way to be.\""
2002302-173 = "I am the director of the Public Peace Bureau. It's my job to be admirable."
2002302-174 = "And in order to lead Bureau members with strong personalities, I can't be afraid to put myself in uncomfortable positions."
2002302-175 = "[ns] \"I see. That's a great mindset.\""
2002302-177 = "[ns] \"...Did you mean it when you said I could ask you anything?\""
2002302-178 = "Yes. Of course I did."
2002302-179 = "[ns13] \"I noticed you brought an extra uniform...\"\n[ns14] \"But...did you bring...anything to wear under it...?\""
2002302-182 = "Wh—"
2002302-187 = "That's—"
2002302-188 = "That's not a question! That's sexual harassment!"
2002302-190 = "Kanna yelled at me with a terrifying look on her face for quite some time."
