[translation]
2004303-1 = "การทดลองแบบใหม่"
2004303-2 = "ปีใหม่ก็ต้องกินโอเซจิแบบใหม่ ว่ามั้ยล่ะ?!"
2004303-3 = "[s] \"โอเซจิแบบใหม่เหรอ ฟังดูเข้ากับอิซุมิดีนะ!\""
2004303-4 = "ใช่มั้ยล่ะ?"
2004303-5 = "แต่ว่า คุณครู โอเซจิแบบทั่วไปมันมีบางอย่างที่น่าเสียดายนิดหน่อยนะ"
2004303-6 = "ปกติแล้วโอเซจิส่วนใหญ่เป็นอาหารที่ไม่ค่อยใช้ไฟใช่มั้ยล่ะ?"
2004303-7 = "แน่นอนว่ามันก็อร่อยอยู่หรอก!"
2004303-8 = "แต่มันก็มีข้อเสียตรงที่รสชาติจะคล้ายๆ กันไปหมดน่ะสิ..."
2004303-9 = "ฉันก็เลยคิดว่าอาหารนี้มันไม่ตอบโจทย์การผจญภัยหาอาหารเลิศรสของเรา!"
2004303-10 = "[s] \"อ่า อื้ม... เรากำลังผจญภัยหาอาหารเลิศรสอยู่สินะ...\""
2004303-11 = "อื้อ! นั่นแหละ!"
2004303-12 = "แน่นอนว่าเราเอาโอเซจิที่เหลือมาทำเป็นนาเบะ ข้าวราดแกงกะหรี่ หรือเมนูเส้นก็ได้..."
2004303-13 = "ถ้าทำแบบนั้นก็จะได้เมนูที่มีรสชาติเข้มข้นอีกครั้ง"
2004303-14 = "แต่ของแบบนั้นมันเอาไว้ทำทีหลังตอนไหนก็ได้ไม่ใช่เหรอ?"
2004303-15 = "วันนี้ฉันก็เลย! คิดค้นโอเซจิในแบบฉบับของฉันดู!"
2004303-16 = "ขอตั้งชื่อว่า <โอเซจิตำรับพิเศษของอิซุมิ>!"
2004303-17 = "[s] \"อิซุมิทำโอเซจิด้วยตัวเองเลยเหรอ?\""
2004303-21 = "เอ่อ ตอนแรกฉันก็ว่าจะทำอย่างนั้นหรอกนะ... "
2004303-22 = "แต่มันเกินตัวฉันไปหน่อยน่ะ! แหะๆๆ!"
2004303-23 = "แต่ฉันก็ลองหาข้อมูลนู่นนี่ดู"
2004303-24 = "แล้วก็โชคดีไปเจอร้านอาหาร Made-to-order ที่ทำอาหารตามสั่งให้เป็นพิเศษน่ะสิ!"
2004303-25 = "ฮารุนะก็บอกว่าใช้บริการร้านนั้นบ่อยๆ ด้วยนะ! อินเทอร์เน็ตทำให้ชีวิตเราสะดวกสบายมากเลยละ!"
2004303-26 = "พอเจอร้านนั้น ฉันก็เลยขอให้ช่วยทำโอเซจิในแบบฉบับของฉันดู"
2004303-27 = "งั้นเราไปร้านนั้นกันเถอะนะคุณครู นะๆๆ!"
2004303-32 = "[ns] \"อิซุมิ? อิซุมิ?? ก็ได้ อย่างน้อยก็ไปก่อนแล้วกัน~!\""
2004303-41 = "เป็นยังไงบ้าง คุณครู? ร้านนี้บรรยากาศดีใช่มั้ยล่ะ?"
2004303-42 = "บรรยากาศดูไม่ค่อยเหมือนร้านอาหารที่ทำโอเซจิงั้นเหรอ?"
2004303-43 = "ก็เพราะร้านนี้ไม่ได้ทำแค่โอเซจิน่ะสิ ถ้าสั่งล่วงหน้าก็ทำอาหารอื่นให้ได้ทุกอย่างเลยละ!"
2004303-48 = "คุณชิชิโทอุ อิซุมิ ใช่มั้ยครับ? เราทำ <โอเซจิตำรับพิเศษของอิซุมิ> ไว้ให้แล้วครับ"
2004303-49 = "ช่วยรอสักครู่นะครับ จะไปนำมาเสิร์ฟเดี๋ยวนี้เลยครับ!"
2004303-55 = "ขอให้มีช่วงเวลาที่เพลิดเพลินกับอาหารนะครับ"
2004303-59 = "[ns] \"ดูภายนอกแล้วก็เป็นโอเซจิทั่วไปนี่นา?\""
2004303-63 = "ดูเป็นอย่างนั้นเหรอ? งั้นก็ค่อยยังชั่วหน่อย! ว่ากันว่าโอเซจิต้องกินด้วยสายตาก่อนใช่มั้ยล่ะ?"
2004303-64 = "ถึงนี่จะเป็นโอเซจิตามสั่งในแบบฉบับของฉัน แต่ภายนอกก็ต้องดูสวยด้วย ถึงจะได้ชื่อว่าเป็นโอเซจิ#nจริงๆ!"
2004303-65 = "ถ้างั้น... ฉันจะชิมถั่วดำต้มตรงนี้ก่อนแล้วกัน!"
2004303-72 = "อื้อ! สดใหม่จัง! อร่อยด้วย!"
2004303-73 = "หืม? ดูเผินๆ ก็เหมือนถั่วดำต้มซีอิ๊วทั่วไปงั้นเหรอ?"
2004303-74 = "แหะๆๆ นี่ไม่ใช่ถั่วดำต้มซีอิ๊วที่คุณครูรู้จักหรอกนะ นั่นก็เพราะว่า..."
2004303-75 = "มันทำจากถั่ว น้ำส้มสายชู แล้วก็ช็อกโกแลตจากโกโก้ 99% ยังไงล่ะ!"
2004303-79 = "[ns] \"โกโก้... 99% เหรอ? ทำไมถึงเอาของแบบนี้มาใส่...!\""
2004303-83 = "หืม? ก็มันเป็นเมนูถั่วดำต้มนี่นา? ช็อกโกแลตที่สีเข้มที่สุดคือช็อกโกแลตจากโกโก้ 99% ต้องแบบนี้สิ#nถึงจะได้สีคล้ายถั่วดำน่ะ"
2004303-84 = "งั้นต่อไปก็คือ... กุ้งผัด! กุ้งตัวนี้น่ะ..."
2004303-85 = "ไม่ใช่กุ้งผัดซีอิ๊วหรือน้ำตาล แต่เป็นกุ้งผัดแอนโชวี่ดอง!"
2004303-90 = "ว้าว! รสเค็มๆ มันๆ อร่อยโดนใจจริงๆ!"
2004303-91 = "คุณครูชอบลูกชิ้นปลาสีชมพูหรือเปล่า? ฉันชอบนะ!"
2004303-92 = "และลูกชิ้นปลาอันนี้ก็ทำจาก... สตรอว์เบอร์รี!"
2004303-93 = "[s] \"สตรอว์เบอร์รี?! ทำไมต้องเป็นสตรอว์เบอร์รีล่ะ!?\""
2004303-97 = "มันก็แน่อยู่แล้วนี่ ก็สตรอว์เบอร์รีมันเป็นสีชมพูนี่นา"
2004303-98 = "อื้อ! รสชาติของเนื้อปลากับสตรอว์เบอร์รีผสมผสานกัน ทำให้เกิดรสชาติใหม่ที่ไม่เคยสัมผัสมาก่อนเลย!"
2004303-99 = "ต่อไปก็เป็นคิวของมันเทศต้มเกาลัด"
2004303-104 = "รสเผ็ดจากขิงถือว่าจัดจ้านมากเลย!"
2004303-105 = "ทำไมถึงใส่ขิงน่ะเหรอ? อ่า... ก็เพราะ... ทั้งมันเทศ เกาลัด แล้วก็ขิง... มันเป็นสีเหลืองเหมือนกัน#nทั้งหมดไง? อย่างที่ฉันบอกไปเมื่อกี้ว่าโอเซจิเป็นอาหารที่ต้องกินด้วยตาก่อน เพราะงั้นก็เลยต้องทำให้#nสีสันสวยๆ เข้าไว้สิ"
2004303-106 = "คุณครูก็ลองชิมดูมั้ย? มีรากบัวตุ๋นที่ใส่รากหญ้าเจ้าชู้ลงไปด้วยนะ ฉันเห็นว่าทั้งสองอย่างมีคำว่า 'ราก' เหมือนกัน ก็เลยน่าจะเข้ากันน่ะ"
2004303-107 = "ส่วนนี่ก็คือไข่ปลาเฮร์ริงดอง... อันนี้จู่ๆ ฉันก็อยากใส่อบเชย ปลาหมึกดอง แล้วก็บลูชีสลงไปดูน่ะ!"
2004303-108 = "[s] \"ครูก็ซึ้งในน้ำใจหรอกนะ แต่ขอรับไว้แค่น้ำใจดีกว่า!\""
2004303-109 = "เอางั้นเหรอ...? แต่นี่เป็นอาหารที่มีเอกลักษณ์เลยนะ"
2004303-110 = "พูดถึงของหวานก็ต้องนึกถึงอะไรที่นุ่มลิ้นและหวานหอม... อาหารที่นุ่มลิ้นมากที่สุดในโอเซจิก็ต้อง#nยกให้ไข่ม้วนใช่มั้ยล่ะ!"
2004303-111 = "และไข่ม้วนตำรับของอิซุมิก็ใส่ไอศกรีมและหมึกสีม่วงลงไปนิดหน่อยด้วย!"
2004303-112 = "[s] \"ไอศกรีมพอเข้าใจได้อยู่ แต่ทำไมใส่หมึกด้วยล่ะ?!\""
2004303-113 = "คุณครูก็ดูการผสมผสานระหว่างสีม่วงกับสีเหลืองนี่สิ เห็นมั้ยว่ามัน..."
2004303-117 = "ก็ไม่ได้สวยถึงขนาดนั้นนี่นา อันนี้ไม่เป็นไปตามที่คิดแฮะ อื้ม"
2004303-118 = "ฉันคิดว่าไอศกรีมจะช่วยกลบรสคาวและขมของหมึกที่ใส่ลงไป..."
2004303-119 = "แล้วให้ความรู้สึกเหมือนเรากินวากาชิหวานๆ กับชาเขียวขมๆ ไปพร้อมกันน่ะ!"
2004303-121 = "(แล้วการชิมโอเซจิของอิซุมิก็ยังดำเนินต่อไปด้วยความตื่นเต้น...)"
2004303-122 = "(อย่างน้อยอิซุมิก็ดูมีความสุขจริงๆ...)"
2004303-126 = "ฮ่าฮ่า! กินหมดแล้ว! เป็นอาหารที่ฉันพึงพอใจเลยละ!"
2004303-127 = "แค่โอเซจิก็สร้างประสบการณ์ที่แปลกใหม่และหลากหลายได้ขนาดนี้เลยเหรอเนี่ย ขนาดฉันเองยัง#nประหลาดใจเลยนะ!"
2004303-128 = "ว่าแต่... แบบนี้จะไม่เป็นไรเหรอ คุณครู? ขอโทษที่ฉันสนุกกับอาหารอยู่คนเดียวนะ"
2004303-129 = "อ่า... ฉันหมกมุ่นกับการกินมากเกินไปจนลืมไปเลยว่าคุณครูก็ควรจะได้สนุกด้วยกัน..."
2004303-130 = "[s1] \"ไม่หรอก อิซุมิ! ครูไม่เป็นไรเลย! จริงๆ นะ!\"\n[s2] \"ไม่หรอก ครูมาเพื่อดูการทดลองของอิซุมิมากกว่าน่ะ!\""
2004303-133 = "งั้นเหรอ? แต่ถึงยังไงก็..."
2004303-137 = "ดีละ คุณครู! งั้นคราวหน้าฉันจะหาอะไรอร่อยๆ ไว้ให้นะ!"
2004303-141 = "ตั้งตารอได้เลย ตกลงนะ?"
2004303-143 = "(ถ้าบอกว่าไม่รู้สึกถึงลางไม่ดีเลยก็คงเป็นการโกหก...)"
2004303-144 = "(แต่อย่างน้อยรอยยิ้มของอิซุมิก็สดใสมาก...)"
