[translation]
901010400410-8 = "ただいま～"
901010400410-14 = "あ、ニコ――いや、FOX2、お疲れ。"
901010400410-15 = "ふふっ、FOX3もお疲れ様。"
901010400410-16 = "ううん、私とFOX4は高いところで見てただけだし。#n色々動き回ってたニコの方が大変でしょ。"
901010400410-17 = "そう？じっと待つほうが大変じゃないかな。"
901010400410-18 = "あれ……その盾、この間も整備してなかった？"
901010400410-19 = "それがさ……今日って潮風が強かったじゃない？"
901010400410-20 = "だから盾に塩が積もっちゃって。"
901010400410-21 = "ちゃんと拭いておかないと、すぐに錆びちゃうのよ。"
901010400410-22 = "大変だね。"
901010400410-23 = "潮風に長くあたってたから、私たちの身体にも塩がついてるだろうし……#n終わったら一緒にシャワー行こう。"
901010400410-24 = "うん、あとで呼んで。"
