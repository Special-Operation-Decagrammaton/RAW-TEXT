901010400410-14 = "3;쿠루미;01;아, 니코…… 아니, FOX 2. 어서 와. 오늘도 수고 많았어."
901010400410-15 = "1;니코;00;후후, FOX 3도 수고 많았어.\n#1;ar\n#3;m5"
901010400410-16 = "3;쿠루미;12;뭘, 나랑 FOX 4는 높은 곳에 가만히 앉아만 있었는데. 직접 발품 팔며 돌아다닌 네가 더 고생 많았지.\n#3;em;[한숨]"
901010400410-17 = "1;니코;02;그런가? 나는 오히려 가만히 대기하는 게 더 힘들던데."
901010400410-18 = "1;니코;00;그나저나 방패는 지난 주말에도 정비하지 않았어? 무슨 문제라도 생긴 거야?\n#1;em;[?]"
901010400410-19 = "3;쿠루미;01;그게…… 오늘 바닷 바람이 강했잖아?"
901010400410-20 = "3;쿠루미;02;그래서인지 HQ에 돌아오니 방패 위에 소금이 하얗게 내려 앉아 있더라고."
901010400410-21 = "3;쿠루미;01;소금기를 제대로 털어내지 않으면 금방 녹이 슬어버리니까, 작전을 마치기 전에 닦아내고 있었어."
901010400410-22 = "1;니코;02;고생이 많네.\n#1;em;…"
901010400410-23 = "1;니코;03;몸에도 보이지 않는 소금기가 남아 있을테니, 정비 끝나면 같이 샤워하러 올라가자."
901010400410-24 = "3;쿠루미;02;알겠어. 잠시 후에 보고 시작할 때 불러줘.\n#3;em;[반응]"
