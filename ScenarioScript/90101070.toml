[translation]
90101070-1 = "第7話;定期入札の公告"
90101070-2 = "鐘崎港、「穐田水産」"
90101070-5 = "へぃらっしゃい！"
90101070-6 = "うん？嬢ちゃんは――"
90101070-11 = "こんにちは。いつもお世話になっています。"
90101070-12 = "少し早い時間ですが……もう開いてますか？"
90101070-13 = "ああ。ちょうど今、開けたとこだが……。"
90101070-14 = "配達の嬢ちゃんが来るってことは、どっかから注文が入ったのかい？"
90101070-15 = "いえ、今日はここでご飯をいただこうと思いまして。"
90101070-16 = "ふふっ、友だちも連れて来たんですよ。"
90101070-23 = "ここが、ニコが前に言ってたお店？"
90101070-24 = "見た感じは周りのお店とそんなに変わんないね。"
90101070-25 = "水槽にシミひとつない。それに火口もきれいだ。衛生には相当気を使っているな。"
90101070-26 = "これなら魚の鮮度も心配はいらなさそうだ。"
90101070-27 = "おっ、なんだなんだ嬉しいねぇ！"
90101070-28 = "若い生徒さんが喜びそうなメニューは多くないが、すぐ作れる。何でも頼んでくれ！"
90101070-29 = "あ、メニュー裏の揚げ物だけは無しだ。まだ材料が届いてなくってな。"
90101070-30 = "[ns] \"アジフライも気になってたのに……残念。\""
90101070-31 = "で……あんたは？"
90101070-32 = "朝っぱらから女子生徒を連れて港をうろつくって、ちょっと怪しいぞ。"
90101070-33 = "[s1] \"この子たちの保護者であり――\"\n[s2] \"ニコの雇い主……みたいな者です！\""
90101070-36 = "ああ、「狐の配達」だか何だかの社長さんか！こりゃ失敬！"
90101070-37 = "おたくんとこの配達員さんには色々と助けてもらってるよ。"
90101070-38 = "困りごとに先回りして商談を持ちかけてくるんだ。なかなかやり手だねぇ。"
90101070-39 = "[s3] \"お目が高いですね。\"\n[s4] \"うちの生徒は全員優秀ですから。\""
90101070-42 = "何でそんなに誇らしげなのよ……。"
90101070-43 = "直球の誉め言葉は効くよねぇ。"
90101070-44 = "ニコの耳、真っ赤になってるよ。"
90101070-45 = "せ、先生！はやく決めましょう！選んで頼んじゃってください！"
90101070-50 = "[ns5] \"そっ、それじゃあ……。\"\n[ns6] \"「気まぐれ海鮮丼」を5つください！\""
90101070-53 = "「気まぐれ海鮮丼」ね。はいよ！"
90101070-62 = "これ……「気まぐれ海鮮丼」ってなんでこの名前なんですか？"
90101070-63 = "そりゃネタが決まってないからな。"
90101070-64 = "うちみたいな店の海鮮丼ってのは、刺身切った残りとか雑魚で作るんだよ。"
90101070-65 = "となりゃその日入った魚で中身が変わる。#n店主の気分で決まるから「気まぐれ」ってわけだ。"
90101070-66 = "代わりに一番安いし、運試しだってあえて頼む客もいる。"
90101070-67 = "え、じゃあアジの刺身だけ山盛りで出てくる可能性もあるってこと？"
90101070-68 = "クルミはまだ社会の闇に触れてないねぇ。#n「刺身しか乗らない」とは限らないんだよ。"
90101070-69 = "単価合わせでカニカマとかツナ缶が乗ってくる可能性だってある。"
90101070-70 = "それ海鮮丼って呼んでいいわけ！？"
90101070-71 = "ツナマヨ丼も味は悪くない。カロリーがやや高いのは難点だが。"
90101070-76 = "ほらよ、「気まぐれ海鮮丼」5つ！"
90101070-77 = "これは……。"
90101070-78 = "あの、間違ってませんか？"
90101070-79 = "ほかのお客さんのマグロ丼と入れ替わった、とか……。"
90101070-80 = "なに言ってんだ。今日の一発目の注文だぞ？"
90101070-81 = "今朝マグロをさばいてたら手ぇ滑らせてな。#n切れ端が思ったより残っちまっただけだ。"
90101070-82 = "……毎日こうなるわけじゃねぇ。毎回期待すんなよ。"
90101070-87 = "ふふっ、今日はツイてますね。"
90101070-88 = "それじゃあ、いただきます！"
90101070-94 = "こっ、この味は……！？"
90101070-95 = "[s] \"何か分かるの！？\""
90101070-96 = "いや、よく分かんないけど。"
90101070-97 = "でも、このマグロ……高い部位っぽい。高そうな味がする！"
90101070-98 = "私も詳しくないけど……これは絶対いいマグロって感じ。"
90101070-99 = "脂がのってて、口にいれたら溶けちゃうみたいで――"
90101070-100 = "まさか……！#nこれが「大トロ」ってやつ！？食べたことないから分かんないけど。"
90101070-101 = "かかってる醤油だれも、すごく美味しいね。"
90101070-102 = "柚子の香りがふわっとしていて……酸味が魚の味を邪魔せず、他の具ともよくあっています。"
90101070-103 = "ああ。味のバランスが取れているな。"
90101070-104 = "気まぐれという割には手が込んでいるように思うが。"
90101070-105 = "へへっ、うまそうに食ってくれるのは嬉しいねぇ。"
90101070-106 = "他のメニューも自信あるんだ。次は別のも食べに来てくれよな。"
90101070-110 = "……もっとも、来月もこの店が残ってりゃの話だが。"
90101070-114 = "このお店、なくなっちゃうんですか？"
90101070-115 = "いや、まだ決まったわけじゃねぇさ。"
90101070-116 = "つっても、鐘崎港の中に入ってる店は、定期的に入札で再契約する決まりでよ。"
90101070-117 = "なにせ立地が良くて来る人も多い。競争がきついったらありゃしない。#nんで、次の入札がもうすぐなんだが、最近客足が落ちてたんだ。"
90101070-118 = "だから次は諦めるか悩んでたんだが……嬢ちゃんたちに元気もらったぜ。#n来月も挑んでみる気になった。"
90101070-119 = "それは良かったです。"
90101070-123 = "……まぁ、うちなんかよりカルパッチョ・ファミリーのほうが大変そうだがな。"
90101070-124 = "この前、派手にやられたろ？#n次の入札で、港の「警備業務」の枠を狙ってくる連中が湧いてくるはず……。"
90101070-125 = "……次の入札、ですか？"
90101070-126 = "……やっちまった。"
90101070-127 = "悪ぃな。今のは聞かなかったことにしてくれ。"
90101070-128 = "カルパッチョの評判を下げたなんてバレたら、連中この店を放っとかねぇからよ……。"
90101070-129 = "いえ、そうではなくて――"
90101070-130 = "カルパッチョ・ファミリーが担っている警備業務も、入札を通して資格を得ているのですか？"
90101070-131 = "ああ。鐘崎港の仕事の大半は連邦生徒会の入札で決まる。"
90101070-132 = "ただ、今までは誰も競争に踏み込めなかったんだ。#nカルパッチョの報復が怖くてな。"
90101070-133 = "それが今回の抗争で、あいつらが「牙の抜けた虎」だと知れ渡っちまった。#nやってみようって奴も出てくるだろうさ。"
90101070-134 = "ああもう、口が滑る滑る。私としたことが……。"
90101070-139 = "[ns] \"……ユキノ。\""
90101070-140 = "はい。"
90101070-141 = "もしもカルパッチョ・ファミリーが対外的なイメージを気にしているのなら。"
90101070-142 = "「恐怖」をばら撒く動機は十分かと。"
90101070-146 = "ごちそうさまでした！"
90101070-147 = "そんな急いで食わなくたって――"
90101070-148 = "急に用事を思い出してしまって。"
90101070-149 = "また来るね～"
90101070-155 = "……まさか。"
90101070-156 = "あの子たち、カルパッチョ・ファミリーの関係者じゃねぇよな……？"
90101070-158 = "次回;カルパッチョ・ファミリーの秘密"
