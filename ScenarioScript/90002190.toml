[translation]
90002190-1 = "ตอนที่ 19;วันที่พระเจ้าหล่นร่วงจากสรวงสวรรค์"
90002190-2 = "ไปเป็นวายร้ายของจริงกันเลยดีกว่า"
90002190-4 = "รอยแผลศักดิ์สิทธิ์แรกจะถูกทำลายลง"
90002190-5 = "?!"
90002190-7 = "เฉกเช่นผีเสื้อที่หลุดออกจากดักแด้"
90002190-12 = "รอยแผลศักดิ์สิทธิ์ที่สองจะถูกทำลายลง เฉกเช่นทารกแรกคลอดที่ร้องไห้ออกมาเป็นครั้งแรก"
90002190-17 = "รอยแผลศักดิ์สิทธิ์ที่สามจะถูกทำลายลง เฉกเช่นสายนํ้าที่พังทลายมวลน้ำแข็งและเริ่มรินไหลออกไป#nอีกครั้ง"
90002190-24 = "นี่... มัน...!"
90002190-29 = "[ruby=คอร์บัน โอลาห์]ดาบบูชายัญ[/ruby]ถูกดึงออกงั้นเหรอ...?!"
90002190-30 = "อึกกก...!"
90002190-35 = "...?"
90002190-36 = "ฉัน...? ทำไมฉันถึงกลับมาเป็น...?"
90002190-37 = "...!?"
90002190-38 = "หืม...?"
90002190-39 = "ทุกคน รู้สึกได้หรือเปล่าคะ...?!"
90002190-40 = "ฉันรู้สึกได้! นี่มัน... เหลือเชื่อเลย...!"
90002190-41 = "พี่มัลคูธ... กลับมาแล้วค่ะ..."
90002190-43 = "พี่สาวของพวกเรา! กลับมาแล้วค่ะ!!! ฮือออ!!!!!"
90002190-44 = "พี่ไม่ได้หายหรือสูญสลายไป! แต่ยังคงอยู่ได้แบบหวุดหวิดเลยค่ะ! ไม่อยากเชื่อเลย นี่มันปาฏิหาริย์จริงๆ เลยนะคะ!!!"
90002190-45 = "ไอน์? ซอฟ? ออร์? ทำไม... ฉันถึง? เป็นอย่างนี้...?"
90002190-46 = "พี่มัลคูธ!!!!!"
90002190-53 = "ร่างกาย... ค่อยๆ...?"
90002190-54 = "ทุกคน ตั้งสติไว้ค่ะ! เป็นอะไรหรือเปล่าคะ?"
90002190-58 = "หืม...? เคย์...? อาริสึ..."
90002190-59 = "อ๊ะ! เราต้องสู้กับเดคาแกรมมาทอนค่ะ! เอ๋...?"
90002190-60 = "คุณครู? เป็นอะไรหรือเปล่า คุณครู?"
90002190-61 = "[s] \"อื้อ... ครูไม่เป็นไร\""
90002190-62 = "คุณครู! โล่งอกไปทีนะคะ..."
90002190-64 = "พี่มัลคูธ!"
90002190-66 = "สวัสดีค่ะ ไอน์ ซอฟ ออร์ แล้วก็..."
90002190-67 = "..."
90002190-71 = "ขอสวัสดีอีกครั้งนะคะ คุณครู แล้วก็... ทุกคน"
90002190-72 = "นี่มัน... เป็นแบบนั้นเป๊ะเลย ศัตรูที่กลายเป็นพันธมิตร? ศัตรูในวันวานคือพรรคพวกของเราในวันนี้?"
90002190-88 = "หืม...?"
90002190-89 = "เอ๋...?"
90002190-90 = "เอะ... เอ๋...?"
90002190-91 = "...!"
90002190-92 = "อะไร... กันเนี่ย...?"
90002190-93 = "ไอน์...? ซอฟ...? ออร์...?"
90002190-97 = "อะ... อ่า... อ๊าาาาาาาาา?!?!!!!"
90002190-98 = "[ns] \"...!!!\""
90002190-99 = "ไม่นะคะ! ไม่เอาค่ะ! แบบนี้น่ะ แบบนี้มัน...!!!"
90002190-100 = "อย่ามองย้อนกลับไปนะ!"
90002190-101 = "!!!???"
90002190-104 = "[ns] \"???!!!\""
90002190-106 = "นี่คือการสังหารเทพ! ฉันเตรียมใจรับผลแบบนี้ไว้แล้วละ! เพราะสำหรับพวกฉันแล้ว มันก็เหมือนคำสั่งทำลายตัวเองอย่างหนึ่งนั่นละ!"
90002190-107 = "แค่ก... แค่ก... แค่กๆ...! ชะ... ใช่ค่ะ... พวกคุณจะให้พวกฉันมาฉุดรั้งไว้ไม่ได้หรอกค่ะ...!"
90002190-108 = "ได้โปรดจำไว้ด้วยนะคะ ก็พวกคุณเดินทางมาไกลถึงที่นี่เพื่อป้องกันไม่ให้โลกถูกปกคลุมไปด้วยโลหะ#nกันเลยนี่คะ?"
90002190-110 = "นี่เป็นโอกาสเดียวแล้วค่ะ! ก้าวไปข้างหน้าสิคะ! ไม่งั้นการตัดสินใจแบบนี้ของพวกฉันจะไร้ความหมาย#nนะคะ!"
90002190-114 = "แต่... แต่ว่า...!"
90002190-115 = "ไอน์? ซอฟ? ออร์? ทำไมล่ะ?"
90002190-116 = "ทำไมกัน...?"
90002190-117 = "แหะๆ... แหะๆๆ เรื่องนั้นน่ะค่ะ พี่มัลคูธ"
90002190-118 = "แบบนี้ละถูกแล้ว อื้อ ควรต้องทำแบบนี้ละ ถึงนี่จะเป็นครั้งสุดท้าย แต่ฉันก็ดีใจมากที่ได้เจอทุกคนอีกนะ ฮ่าฮ่า อะฮะฮะฮ่า...!"
90002190-119 = "ฉันมีคำพูดที่อยากบอกออกไปค่ะ เป็นสิ่งที่อยากบอกมาตลอดเลยค่ะ"
90002190-121 = "มีคนที่บอกว่าพวกฉันคงเหนื่อยกันมามากเลยน่ะค่ะ"
90002190-124 = "มีคนที่บอกว่าอยากให้พวกเรามาเป็นเพื่อนกัน และบอกว่าถ้ามีสิ่งที่ปรารถนา ก็ให้ต่อสู้ให้ได้มันมา"
90002190-127 = "พวกฉันไม่ได้ทำแบบนั้นเพราะมันถูกต้องหรอกนะคะ มันเป็นเพราะพวกฉันไม่มีทางเลือกอื่น นอกจากทำแบบนั้นน่ะค่ะ"
90002190-130 = "ใช่ค่ะ เพราะงั้นพวกฉันก็เลยอยากให้พี่มัลคูธมีชีวิตต่อไปค่ะ"
90002190-133 = "ไม่ว่าพวกฉันจะเป็นยังไง ก็อยากให้พี่มีชีวิตต่อไป"
90002190-136 = "อยากให้ได้เห็น ได้พบเจอ และได้รู้สึกอะไรให้มากกว่านี้ ให้มากๆ..."
90002190-139 = "มากมากมาก มากกว่าพวกฉันอีก"
90002190-142 = "เพราะเทียบกับพวกฉันแล้ว ยังมีอีกตั้งหลายสิ่งที่พี่มัลคูธยังไม่ได้ทำ"
90002190-145 = "เพราะงั้นช่วยมีชีวิตต่อไปด้วยนะคะ อย่าเพิ่งถอดใจจนกว่าจะถึงตอนสุดท้าย ไปต่อ... ต่อไป..."
90002190-147 = "ฮะ... ฮืออ... ฮืออออ...!"
90002190-148 = "ฉันก็บอกไปแล้วนี่นา อาริสึ อย่าหันไปมองอดีตเลย"
90002190-149 = "ทำไมทุกคนถึงเป็นอย่างนี้กันล่ะ แบบนี้มันทำให้พวกเราอับอายกันนะคะ พวกฉันไม่ได้อยากให้เป็น#nอย่างนี้สักหน่อยค่ะ"
90002190-150 = "ค่ะ... ค่ะ... และที่สำคัญ ขอบคุณนะคะ ขอบคุณที่ชวนให้เป็นเพื่อนกัน..."
90002190-151 = "อย่าหยุดนะคะ ไม่ว่าจะเป็นยังไงก็ตามค่ะ เดินไปจนสุดทางและทำให้ลุล่วงจนถึงที่สุดเลยค่ะ"
90002190-152 = "ชะ... ใช่ค่ะ! การสานต่อเจตนาของผู้ที่ล่วงหน้าไปก่อนแล้วหรือบุกเบิกเส้นทางของเราเองต่อไป คือวิถีการใช้ชีวิตของทุกคนไม่ใช่เหรอคะ...?"
90002190-153 = "นั่นน่ะสิ! แล้วก็ระวังพวกคนที่ใช้ชีวิตเพื่อความสมบูรณ์แบบของตัวเองไว้ด้วยนะ! ฮ่าฮ่าฮ่าฮ่า!"
90002190-155 = "ขอโทษที่พยายามทำลายโลกของ[ruby=คุณครู]พวกคุณทุกคน[/ruby]ด้วยนะคะ"
90002190-156 = "ขอโทษนะที่ทำตัวตามอำเภอใจมาตลอด"
90002190-157 = "แต่ถึงยังไง ถ้าไม่ว่าอะไรละก็"
90002190-158 = "ถ้ามีที่ไหนในโลกของ[ruby=คุณครู]พวกคุณทุกคน[/ruby] จะแค่นิดเดียวก็ได้"
90002190-159 = "ถ้ามีที่ที่ให้พี่สาวของพวกฉันอยู่ได้ละก็"
90002190-160 = "ฉันก็อยากให้ช่วยรับพี่สาวของพวกฉันไว้ด้วยค่ะ"
90002190-164 = "[ns] \"...!\""
90002190-165 = "ไอน์...? ซอฟ...? ออร์...?!"
90002190-166 = "ฮะ... ฮือ... ฮืออออ...!!"
90002190-167 = "ฮืออออออออออ!!!"
90002190-171 = "ร่างนี้คง... ถึงขีดจำกัดแล้วสินะ..."
90002190-177 = "แค่ก แค่ก...!"
90002190-178 = "[ns] \"มัลคูธ...!\""
90002190-182 = "[ns] \"มีใครช่วยครูพามัลคูธมาได้มั้ย?\""
90002190-183 = "..."
90002190-187 = "อาริสึก็จะไปด้วยค่ะ คุณครู!"
90002190-188 = "ฉันด้วย"
90002190-189 = "ถ้าเป็นงานที่ต้องใช้แรงละก็ ให้เป็นหน้าที่ของฉันเถอะ"
90002190-192 = "[ns] \"เป็นอะไรหรือเปล่า?\""
90002190-193 = "ฉันน่ะ... แต่ว่าไอน์... ซอฟ... ออร์..."
90002190-194 = "[s3] \"ลุกขึ้นก่อนเถอะ...\"\n[s4] \"เรามา[ruby=ใช้ชีวิต]ต่อสู้[/ruby]ไปด้วยกันนะ\""
90002190-197 = "แต่... ว่า..."
90002190-198 = "[s5] \"อย่าลืมคำพูดที่เด็กๆ เคยบอกไว้สิ\"\n[s6] \"อย่าลืมคำพูดที่น้องๆ เคยบอกไว้สิ\""
90002190-201 = "...!"
90002190-202 = "อึก...!"
90002190-207 = "[ns] \"ริโอะ! ฮิมาริ! ช่วยวิเคราะห์สถานการณ์ให้ทีนะ!\""
90002190-208 = "คะ? ค่ะ ได้ค่ะ!"
90002190-213 = "ไม่พบสัญญาณของเดคาแกรมมาทอนในร่างกายของมัลคูธแล้วค่ะ!"
90002190-214 = "ถ้างั้นตอนนี้เดคาแกรมมาทอนตัวจริงอยู่ไหนน่ะ...?"
90002190-220 = "คุณครู เหมือนจะมีบางอย่างปรากฏขึ้นตรงโน้นเลยค่ะ"
90002190-228 = "ตอนต่อไป;สิ่งที่ก่อตัวขึ้นแล้ว"
