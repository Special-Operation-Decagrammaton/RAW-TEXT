[translation]
90002190-1 = "第19話;讓神墜落之日"
90002190-2 = "去做個真正的壞蛋吧。"
90002190-4 = "第一道聖痕將會碎裂。"
90002190-5 = "！？"
90002190-7 = "如同破繭而出的蝴蝶重獲自由。"
90002190-12 = "第二道聖痕將會碎裂。#n如同撕裂胎衣的嬰兒發出第一聲啼哭。"
90002190-17 = "最後的聖痕將會碎裂。#n如同突破堅冰的流水再度開始流淌。"
90002190-24 = "這，這是……！"
90002190-29 = "[ruby=Korban Olah]燔祭之劍[/ruby]被拔出來了……！？"
90002190-30 = "咕，唔唔唔……！"
90002190-35 = "……？"
90002190-36 = "我……為何會再次……？"
90002190-37 = "……！？"
90002190-38 = "嗯……？"
90002190-39 = "……！#n大家，感覺到了嗎……！？"
90002190-40 = "感覺到了！#n真不敢相信……這是……！"
90002190-41 = "姐姐大人他……"
90002190-43 = "姐姐大人回來了！！！嗚啊啊啊啊！！！！！"
90002190-44 = "並沒有消失或消滅，依然留了下來！#n天啊，這簡直是奇蹟！！！"
90002190-45 = "Ain？Soph？Aur？#n我為什麼……怎麼會……？"
90002190-46 = "姐姐大人！！！！！"
90002190-53 = "身體，漸漸能動了……？"
90002190-54 = "大家都還好嗎？快點醒醒！"
90002190-58 = "唔唔……？Kei……？#n愛麗絲怎麼……"
90002190-59 = "啊！必須跟十字神名戰鬥才行！#n……咦？"
90002190-60 = "老師？你沒事吧，老師？"
90002190-61 = "[s] 「嗯……勉勉強強。」"
90002190-62 = "老師！太好了……"
90002190-64 = "姐姐大人……！"
90002190-66 = "……？#n你們好，Ain、Soph、Aur。"
90002190-67 = "……"
90002190-71 = "再次向你們問好……老師，還有大家。"
90002190-72 = "這……完全就是那種套路吧？#n變成夥伴的敵人？昨天的敵人是今天的夥伴？"
90002190-88 = "啊……？"
90002190-89 = "咦……？"
90002190-90 = "什麼……？"
90002190-91 = "……！"
90002190-92 = "怎麼會……？"
90002190-93 = "Ain……？Soph……？Aur……？"
90002190-97 = "啊，啊啊……啊啊啊啊啊啊啊啊啊──！？！？！？！？"
90002190-98 = "[ns]「……！！」"
90002190-99 = "不要！我不要！這種事，這種事──！！！"
90002190-100 = "不要回頭！"
90002190-101 = "！？！？！？"
90002190-104 = "[ns]「……！！！」"
90002190-106 = "這可是要殺掉神啊！我們早就做好覺悟了！#n因為這對我們來說，就像某種自我毀滅的程式一樣！"
90002190-107 = "咳咳，咳咳……！#n沒，沒錯……不能讓你們……被我們給拖累……！"
90002190-108 = "你們沒有忘記……自己為什麼要來到這裡吧？#n不就是為了阻止世界被金屬覆蓋嗎？"
90002190-110 = "機會只有現在！繼續前進吧！#n不然我們下定的決心就要失去意義了！"
90002190-114 = "可是，可是……！"
90002190-115 = "Ain？Soph？Aur？為什麼？"
90002190-116 = "究竟，為什麼……？"
90002190-117 = "耶，耶嘿嘿。#n姐姐大人，那是因為……"
90002190-118 = "這樣才是正確的……應該要這麼做才對。#n能在最後一刻再見姐姐大人一面……真是太好了。#n啊哈哈……！"
90002190-119 = "我有些……一直很想說出口的話。"
90002190-121 = "有人對我們說，我們已經很努力了。"
90002190-124 = "有人對我們說，希望能跟我們成為朋友、如果有渴望的事物就應該反抗。"
90002190-127 = "不是因為正確才這麼做。而是因為除此之外沒有別的選擇。"
90002190-130 = "嗯。所以我們，希望姐姐大人能活下去。"
90002190-133 = "無論我們會變成怎樣，都希望姐姐大人能活下去。"
90002190-136 = "去看更多東西、遇見更多的人、感受更多事物。"
90002190-139 = "要比我們……更多更多。"
90002190-142 = "因為姐姐大人，還有很多沒經歷過的事。"
90002190-145 = "所以請活下去。#n在無能為力之前都不要放棄……繼續前進下去。"
90002190-147 = "啊……啊啊……嗚啊啊啊啊啊……！"
90002190-148 = "……明明跟你說過不要回頭了，愛麗絲。"
90002190-149 = "什麼嘛，這樣我們會不好意思的。#n我們可不是為了這個才這麼做的啊。"
90002190-150 = "是，是啊……不過，謝謝你。#n謝謝你對我們說，希望能成為我們的朋友……"
90002190-151 = "無論將來發生什麼……都別停下來啊。#n一路前進，直到抵達盡頭吧。"
90002190-152 = "沒，沒錯……！#n追隨前人的腳步開拓道路……那就是你們生存的方式，對吧……？"
90002190-153 = "嗯！然後記得小心那些口口聲聲為了自我完善而活的人哦！啊哈哈！"
90002190-155 = "想要破壞[ruby=老師]你們[/ruby]的世界，對不起。"
90002190-156 = "一直以來都這麼恣意妄為，對不起。"
90002190-157 = "但是，如果可以的話……"
90002190-158 = "在[ruby=老師]你們[/ruby]的世界之中，哪怕只有一點點也沒關係……"
90002190-159 = "如果，還有姐姐大人的容身之處的話……"
90002190-160 = "希望你們……願意接納我們的姐姐大人。"
90002190-164 = "[ns]「……！」"
90002190-165 = "Ain……？Soph……？Aur……！？"
90002190-166 = "啊，啊啊……啊啊啊啊啊……！！"
90002190-167 = "唔啊啊啊啊啊啊啊啊！！！"
90002190-171 = "用這具身體，已經到極限了……"
90002190-177 = "咳咳，咳咳……！"
90002190-178 = "[ns] 「馬爾庫特……！」"
90002190-182 = "[ns] 「有人能跟我一起去把馬爾庫特帶回來嗎？」"
90002190-183 = "……"
90002190-187 = "愛麗絲也要去，老師！"
90002190-188 = "那麼我也去。"
90002190-189 = "需要力氣的事情就交給我吧。"
90002190-192 = "[ns] 「你還好嗎？」"
90002190-193 = "我……Ain……Soph……Aur……"
90002190-194 = "[s3] 「……站起來吧。」\n[s4] 「一起[ruby=活下去]戰鬥[/ruby]吧。」"
90002190-197 = "但是……"
90002190-198 = "[s5] 「我知道這些話對你來說可能很殘忍。」\n[s6] 「不過，希望你不要忘記妹妹們說過的話。」"
90002190-201 = "……！"
90002190-202 = "唔唔……！"
90002190-207 = "[ns] 「莉央！陽葵！麻煩幫我分析情況！」"
90002190-208 = "咦？好，好的。我知道了！"
90002190-213 = "從馬爾庫特的身體之中，已經偵測不到十字神名的訊號了！"
90002190-214 = "既然如此，十字神名現在究竟在哪裡……？"
90002190-220 = "老師，那邊似乎出現了什麼東西。"
90002190-228 = "下一話;成形之物"
