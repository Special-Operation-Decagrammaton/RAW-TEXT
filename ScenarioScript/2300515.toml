2300515-31 = "3;아야네;00\n#3;a\n#wait;1000"
2300515-32 = "3;아야네;00;자요, 선생님. 커피와 초콜릿이에요.\n#3;greeting"
2300515-33 = "3;아야네;02;네? 선생님의 커피 취향을 어떻게 알았냐고요?"
2300515-34 = "3;아야네;00;후후……."
2300515-35 = "3;아야네;03;저희가 알고 지낸 시간이 얼마인데요. 그 정도는 어렵지 않죠.\n#3;em;[재잘]"
