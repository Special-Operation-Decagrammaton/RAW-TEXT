2300515-1 = "#title;사막에 내린 비"
2300515-2 = "#wait;1000"
2300515-3 = "[ns1] \"저녁이 되기 전에 일이 끝났다–!\"\n[ns2] \"모두 아야네 덕분이야–!\""
2300515-4 = "#wait;100"
2300515-5 = "#wait;100"
2300515-6 = "3;아야네;00\n#3;a\n#wait;1000"
2300515-7 = "3;아야네;08;그, 그렇게 말씀해 주시는 건 감사하지만, 저는 특별히 한 게 없는 것 같은데요……?"
2300515-8 = "3;아야네;02;제 일처리는 언제나 빠르고 정확해서 도움이 된다고요? 마, 말씀은 감사하지만…….\n#3;em;[땀]"
2300515-9 = "3;아야네;00;그런데 생각해 보니 궁금해지네요."
2300515-10 = "3;아야네;02;이렇게 평소보다 일이 빨리 끝나면, 남은 시간에는 뭐 하세요?\n#3;em;[?]"
2300515-11 = "[s3] \"아야네와 땡땡이치기?\"\n[s4] \"아야네와 노닥거리기?\""
2300515-12 = "#wait;100"
2300515-13 = "#wait;100"
2300515-14 = "3;아야네;07;서, 선생님!\n#3;em;[///]"
2300515-15 = "3;아야네;08;……."
2300515-16 = "3;아야네;09;사실, 그렇다고 해도 싫지는, 않지만…….\n#fontsize;50\n#3;stiff"
2300515-17 = "3;아야네;07;오히려 정말로 그렇게 해 주시면 기쁘겠지만…….\n#fontsize;50"
2300515-18 = "3;아야네;08;그, 그러면 일단, 다과라도 준비해 오겠습니다!\n#3;hophop"
