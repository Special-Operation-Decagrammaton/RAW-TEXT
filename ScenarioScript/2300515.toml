2300515-37 = "#na;(아야네와 함께, 커피와 초콜릿을 즐겼다.)"
2300515-38 = "3;아야네;00\n#3;a"
2300515-39 = "[ns] \"그러고 보니 언제나 그 머리핀을 하고 있는 것 같네?\""
2300515-40 = "3;아야네;00\n#3;m5\n#wait;1000"
2300515-41 = "#wait;1000"
2300515-42 = "3;아야네;12;네?\n#3;em;[?]"
2300515-43 = "3;아야네;08;아, 알아주셨네요……."
2300515-44 = "[ns] \"왠지 모르게?\""
2300515-45 = "3;아야네;00;네……."
2300515-46 = "3;아야네;99;그래도 조금, 아뇨……. 많이, 기쁠지도요…….\n#3;em;[///]\n#fontsize;50"
2300515-47 = "3;아야네;00;사실 이 꽃 머리핀, 현실에는 없는 형태에요."
2300515-48 = "[ns] \"어? 어디에선가…… 있을 법한데?\""
2300515-49 = "3;아야네;08;저도 처음에 그렇게 생각했는데, 찾아보니까 아니더라구요.\n#3;em;[땀]"
2300515-50 = "3;아야네;00;바위취꽃이 조금 비슷한 느낌이지만, 그건 잎이 5개고요."
2300515-51 = "3;아야네;00;그냥…… 이런 제품이 그렇듯이, 들꽃을 단순하게 표현한 것인 모양이에요.\n#3;em;[재잘]"
2300515-52 = "3;아야네;02;하지만 그 단순하고 평범한 느낌이, 뭔가 마음에 들었거든요.\n#3;m3"
2300515-53 = "3;아야네;03;이런 꽃, 저라도 기억해 주면 좋지 않을까, 같은 느낌으로요."
2300515-54 = "[ns] \"좋은 마음씨야, 아야네.\""
2300515-55 = "3;아야네;00;감사합니다.\n#3;greeting"
2300515-56 = "3;아야네;05;평범하고 지나치기 쉬운 것들을 잘 챙겨야, 나중에 여러 가지 의미로 손해가 적거든요."
2300515-57 = "3;아야네;06;영수증이라든가……. 약관이라든가…….\n#3;stiff"
2300515-58 = "3;아야네;15;보험 계약서 마지막 장 아래 페이지에, 돋보기를 가져와야 간신히 보일 만큼 작은 글씨로 쓰여 있는 위험 조항이라든가!!!\n#3;closeup"
2300515-59 = "[s] \"……간절한 마음씨야, 아야네.\""
2300515-60 = "3;아야네;99;후우……. 감사합니다. 선생님.\n#3;em;[한숨]"
2300515-61 = "3;아야네;00;이 머리핀……. 중학생이 되고 나서부터 쓰고 다녔어요."
2300515-62 = "3;아야네;03;양말도 비슷한 무늬가 있어서 그걸로 샀을 정도였죠.\n#3;em;[재잘]"
2300515-63 = "3;아야네;02;……어라?"
2300515-64 = "3;아야네;08;그, 그런데 저는 왜 갑자기 선생님 앞에서 양말 이야기를 하고 있는 걸까요?!\n#3;stiff"
2300515-65 = "3;아야네;10;제가 무슨 부뚜막 위에 먼저 올라가는 고양이도 아니고요!\n#3;em;[///]"
2300515-66 = "[s] \"그걸 나한테 물어도 말이지!\""
2300515-67 = "3;아야네;16;그, 그렇죠……. 죄송합니다. 너무 당황해서요.\n#3;em;[땀]"
2300515-68 = "3;아야네;99\n#3;a"
2300515-69 = "3;아야네;99\n#3;em;[…]\n#wait;2500"
2300515-70 = "3;아야네;99;……."
2300515-71 = "3;아야네;00;선생님. 사막에도 꽃이 핀다는 거, 아시나요?\n#3;greeting"
2300515-72 = "[s] \"사막에?\""
2300515-73 = "3;아야네;08;사실 저도 아직 본 적은 없긴 해요."
2300515-74 = "3;아야네;00;하지만 드물게 몇 년, 또는 십여 년에 한 번씩 비가 내리면……."
2300515-75 = "3;아야네;99;모래 속에 숨어 있던 씨앗들이 앞다투어 자라나, 일제히 꽃을 피운다고 해요."
2300515-76 = "3;아야네;09;몇 주만 지나면 다시 뜨거운 바람이 불어서 모두 말라 죽고 마는데.\n#3;em;[한숨]"
2300515-77 = "3;아야네;00;그렇게 되기 전에 어떻게든 다음 씨앗을 남겨야 하기 때문이죠."
2300515-78 = "3;아야네;99;그리고 그 씨앗들은 다시 모래 속에서, 또다시 비가 내릴 때까지 쭉 잠들어 있는 거죠."
2300515-79 = "3;아야네;00;그런 걸 생각하면 왠지, 남 이야기 같지가 않았어요.\n#3;em;[반응]"
2300515-80 = "3;아야네;02;……아비도스에도, 언젠가 비가 내릴까요?"
2300515-81 = "[s] \"응. 그랬으면 좋겠네.\""
2300515-82 = "3;아야네;00;사실 사막에 비가 내리려면요. \n#3;em;[…]"
2300515-83 = "3;아야네;13;어느 정도 기후 이상 현상이 동반되어야 비가 내릴 가능성이 높아지다 보니…….\n#3;stiff"
2300515-84 = "3;아야네;08;그게 꼭 좋은 일은 아닐 수도 있기도 하지만요.\n#3;em;[땀]"
2300515-85 = "[s] \"바, 방금 한 말을 취소해야 하려나……?!\""
2300515-86 = "3;아야네;08;아하하……. 꼭 그렇지는 않을 거예요."
2300515-87 = "3;아야네;00;기후 이상 현상 없이도, 여러 다른 이유로 비가 내릴 수도 있으니까요."
2300515-88 = "3;아야네;99;그리고 어떤 의미로 아비도스에는……. 이미 비가 찾아온 셈이기도 하고요."
2300515-89 = "[s5] \"그랬었어?\"\n[s6] \"나한테도 알려 주지!\""
2300515-90 = "#wait;100"
2300515-91 = "#wait;100"
2300515-92 = "3;아야네;00;후후……. 역시 선생님은, 그렇게 말씀하실 줄 알았어요."
2300515-93 = "3;아야네;02;네? 그러면 꽃은 피었냐고요?"
2300515-94 = "3;아야네;99;음…….\n#3;stiff"
2300515-95 = "3;아야네;00;적어도, 저에게는요?\n#3;em;[///]"
2300515-96 = "[s] \"점점 더 모르겠는데…….\""
2300515-97 = "3;아야네;08;그, 그렇죠?\n#3;em;[땀]"
2300515-98 = "3;아야네;99;그래도 다행이네요……."
2300515-99 = "[s] \"그건 또 어째서?\""
2300515-100 = "3;아야네;03;그러게요. 어째서일까요?\n#3;em;[음표]"
2300515-101 = "3;아야네;00;그렇지만 다음에 정말로 비가 내리면."
2300515-102 = "3;아야네;99;그래서 아비도스에 꽃이 피게 된다면……."
2300515-103 = "3;아야네;00;그 광경은, 선생님과 같이 보고 싶어요.\n#3;em;[///]"
2300515-104 = "[s] \"그래. 꼭 같이 보자.\""
