[translation]
901010600320-6 = "こんにちは！"
901010600320-7 = "いらっしゃい――"
901010600320-8 = "おや？君、最近よく見かけるね？"
901010600320-9 = "うーむ、何か行き違いがあったようだが、うちは生鮮食品を扱っていて、デリバリーはやっていないんだ。"
901010600320-10 = "あはは、ご心配なく。今は配達のことで来ているわけではありませんので。"
901010600320-11 = "今日の夕飯のお魚を探していまして……アジはありますか？"
901010600320-12 = "アジならたくさんあるよ。どうやって食べたい？"
901010600320-13 = "焼くか、フライにしようかなと。"
901010600320-14 = "この時期のアジは脂が乗ってて刺身で食べるのもオススメだよ。"
901010600320-15 = "刺身ならここで用意することもできる。どうだい？"
901010600320-16 = "うーん、迷いますね。#n刺身も美味しそう……でも、アジフライも食べたくて……。"
901010600320-17 = "……半々ってできますか？"
901010600320-18 = "もちろん！"
901010600320-19 = "半分は刺身にして、残りはアジフライ用にすればいいんだな？ちょいとお待ちを。"
901010600320-20 = "ありがとうございます！"
901010600320-21 = "ふふっ、この港の方はみんな優しいですね。"
901010600320-22 = "……正門で検問をしていた方は、ちょっと冷たかったですが――"
901010600320-23 = "正門で検問をしてる連中……カルパッチョ・ファミリーのことか？"
901010600320-24 = "うーん、あいつらについてあまり口にしたくはないが……。"
901010600320-25 = "できれば、カルパッチョ・ファミリーとは関わらないほうがいい。#nあいつらは常に悪い噂の的になるからな。"
901010600320-27 = "悪い噂……高い利率でお金を貸す話、ですか？"
901010600320-28 = "いや、それではなく――"
901010600320-34 = "お金を返さなかったときの話だよ。"
901010600320-35 = "カルパッチョ・ファミリーのお金を借りて返済できなかったら、ひどい目に遭うんだとか。#nまぁ、借りたものを返さない方が悪いんだけどな。"
901010600320-36 = "ひどい目……ですか？"
901010600320-37 = "ああ。この港の出入り記録はカルパッチョ・ファミリーが管理してるだろう？"
901010600320-38 = "だから、人の出入りがないタイミングで債務者をこっそり港に連れてきて――#n密かに処分するって噂だ。"
901010600320-39 = "ここは海に面してるだろう？#n箱やドラム缶もいっぱいあるから……一人や二人くらい始末するのに都合が良い。"
901010600320-40 = "まあ、カニがいっぱい入ってるドラム缶にぶち込んで、餌にするなんて噂もあるが……あれはさすがに嘘だと思うがね。"
901010600320-41 = "なんだか怖いですね。"
901010600320-42 = "でも、債務者を処分するより、お金を返済してもらったほうが得なんじゃないですか？"
901010600320-43 = "ここからは俺の推測だけど……債務者の取り立てだって限界があると思うんだ。"
901010600320-44 = "巨額の借金をしている時点で、返済能力がないヤツがほとんどだし、利子分を回収するのも簡単じゃあないらしい。"
901010600320-45 = "だからPMCあたりの傭兵に売り飛ばしたら、ある程度は――"
901010600320-49 = "こほん！とにかく、最近なにかと物騒だから、君も気をつけたほうがいいよ。"
901010600320-50 = "他の人ならともかく、どうも世間知らずのお節介に見えてね……誰かに騙されて変なとこ連れていかれないよう、ちゃんと覚えておくんだよ。"
901010600320-51 = "はい、気をつけますね。"
901010600320-55 = "というわけで、おまちどおさま！刺身用とフライ用できたぞ！"
901010600320-56 = "ありがとうございます！"
