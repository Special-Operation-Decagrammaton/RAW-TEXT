901010600320-6 = "3;니코 아르바이트;03;안녕하세요, 사장님!\n#3;em;[반짝]\n#3;a"
901010600320-7 = "5;상인구역 기모노 시바 상인;00;어서 오세요—\n#5;al\n#3;m1"
901010600320-8 = "5;상인구역 기모노 시바 상인;00;아니, 요새 이 근처에서 자주 보이는 배달부 학생이잖아?\n#5;em;[반응]"
901010600320-9 = "5;상인구역 기모노 시바 상인;00;으음, 이거 뭔가 착오가 있었던 모양인데. 우리 가게는 생물만 취급해서 배달은 하지 않거든.\n#5;stiff"
901010600320-10 = "3;니코 아르바이트;01;아하하, 걱정 마세요. 지금은 배달 일 때문에 온 게 아니거든요."
901010600320-11 = "3;니코 아르바이트;02;오늘 저녁에 반찬거리로 쓸 생선을 보고 있는데, 혹시 전갱이 있나요?\n#3;em;[?]"
901010600320-12 = "5;상인구역 기모노 시바 상인;00;전갱이야 잔뜩 있지. 어떻게 먹을 건데?"
901010600320-13 = "3;니코 아르바이트;01;굽거나 튀겨서 먹을까 하는데요…… "
901010600320-14 = "5;상인구역 기모노 시바 상인;00;전갱이는 튀겨 먹어도 맛있지만, 지금은 전갱이에 기름이 잔뜩 올라 있을 때라 회로 먹는 것도 맛이 좋거든."
901010600320-15 = "5;상인구역 기모노 시바 상인;00;회로 먹을 거라면 여기서 떠줄 수도 있는데, 어때?\n#5;em;[반응]"
901010600320-16 = "3;니코 아르바이트;02;으음, 고민되네요. 전갱이회도 맛있을 것 같지만, 전갱이 튀김도 맛보고 싶은데……"
901010600320-17 = "3;니코 아르바이트;01;……혹시 반씩 손질해 주실 수도 있나요?"
901010600320-18 = "5;상인구역 기모노 시바 상인;00;그야 물론이지!\n#5;em;[재잘]\n#5;hophop"
901010600320-19 = "5;상인구역 기모노 시바 상인;00;절반은 회로 썰고, 절반은 튀김용으로 손질해 주면 되는 거지? 금방 준비해 줄게."
901010600320-20 = "3;니코 아르바이트;03;감사합니다!\n#3;em;[반짝]\n#3;greeting"
901010600320-21 = "3;니코 아르바이트;00;후후, 이 항구에서 만난 분들은 모두 하나같이 친절하시네요."
901010600320-22 = "3;니코 아르바이트;02;아. 정문에서 검문을 하시는 분들은 조금 무뚝뚝하긴 했지만—"
901010600320-23 = "5;상인구역 기모노 시바 상인;00;정문에서 검문을 하는 녀석들이라면…… 카르파초 패밀리 말이야?\n#5;em;[?]"
901010600320-24 = "5;상인구역 기모노 시바 상인;00;으음, 그 녀석들에 대해 이러쿵저러쿵하고 싶진 않지만……\n#5;m3\n#3;dl"
901010600320-25 = "5;상인구역 기모노 시바 상인;00;학생. 가능하면 카르파초 패밀리와는 얽히지 않는 게 좋아. 그 녀석들은 언제나 안 좋은 소문을 몰고 다니거든."
901010600320-26 = "#all;hide"
901010600320-27 = "3;니코 아르바이트;02;소문이라면…… 비싼 이율로 돈을 빌려준다는 이야기 말씀인가요?\n#3;em;…"
901010600320-28 = "3;상인구역 기모노 시바 상인;00;아니, 그건 소문이 아니라 공공연한 사실이지만. 아무튼 문제는 그게 아니라—\n#3;stiff"
901010600320-29 = "#st;[0,0];instant;1;"
901010600320-30 = "#clearST"
901010600320-31 = "3;상인구역 기모노 시바 상인;00\n#3;d\n#wait;1500"
901010600320-32 = "#all;hide"
901010600320-33 = "3;상인구역 기모노 시바 상인;00\n#3;a\n#3;closeup\n#wait;1500"
901010600320-34 = "3;상인구역 기모노 시바 상인;00;돈을 갚지 않았을 때의 이야기야.\n#3;em;[반응]\n#3;closeup\n#fontsize;50"
901010600320-35 = "3;상인구역 기모노 시바 상인;00;카르파초 패밀리에게 돈을 제때 갚지 못하면 끔찍한 꼴을 당하게 된다는 이야기가 있거든.\n#3;closeup\n#fontsize;50"
901010600320-36 = "3;니코 아르바이트;07;끔찍한…… 꼴이요?\n#3;em;…\n#3;closeup"
901010600320-37 = "3;상인구역 기모노 시바 상인;00;응. 이 항구의 출입 명부는 카르파초 패밀리가 관리하고 있잖아?"
901010600320-38 = "3;상인구역 기모노 시바 상인;00;그렇다 보니 카르파초 패밀리가 인적이 드문 때 채무자들을 몰래 항구로 데려와, 은밀하게 처리한다는 소문이 있어.\n#3;m4"
901010600320-39 = "3;상인구역 기모노 시바 상인;00;바닷길도 열려 있고, 상자와 드럼통도 잔뜩 널려 있으니…… 사람 한 둘 정도 처리하기엔 이만한 장소도 따로 없지."
901010600320-40 = "3;상인구역 기모노 시바 상인;00;뭐, 게가 잔뜩 든 드럼통에 넣어 게 먹이로 준다는 괴소문도 있지만…… 그건 너무 허황된 소리고.\n#3;m3"
901010600320-41 = "3;니코 아르바이트;04;뭔가 무시무시한 이야기네요.\n#3;em;[땀]"
901010600320-42 = "3;니코 아르바이트;02;하지만 채무자를 납치하는 것보다는 독촉해서 빚을 받아내는 게 더 돈이 되지 않을까요?"
901010600320-43 = "3;상인구역 기모노 시바 상인;00;여기서부턴 내 추측이긴 하지만, 채무자를 독촉하는 데에도 한계가 있거든.\n#3;em;[한숨]"
901010600320-44 = "3;상인구역 기모노 시바 상인;00;빚을 잔뜩 지고 있는 시점에서 일할 의욕이 없는 경우가 태반이니, 본전을 돌려받는 것도 쉽지 않다 하더라고."
901010600320-45 = "3;상인구역 기모노 시바 상인;00;그러니 PMC 같은 곳에 용병으로 팔아넘기기라도 하면 어느 정도는—\n#3;stiff"
901010600320-46 = "#st;[0,0];instant;1;"
901010600320-47 = "#clearST"
901010600320-48 = "3;상인구역 기모노 시바 상인;00\n#3;em;[반응]\n#wait;1000"
901010600320-49 = "3;상인구역 기모노 시바 상인;00;크흠! 어찌 되었든 요즘은 세상이 흉흉하니 학생도 조심하는 게 좋아. \n#3;hophop"
901010600320-50 = "3;상인구역 기모노 시바 상인;00;다른 사람이면 몰라도 학생은 너무 순진해 보여서…… 아무나 덥석덥석 믿고 따라갈까 봐 하는 소리니 귀담아들어 줘."
901010600320-51 = "3;니코 아르바이트;01;네, 조심할게요."
901010600320-52 = "#st;[0,0];instant;1;"
