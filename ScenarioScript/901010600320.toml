901010600320-54 = "3;상인구역 기모노 시바 상인;00\n#3;greeting\n#wait;1200"
901010600320-55 = "3;상인구역 기모노 시바 상인;00;자, 여기 횟감용과 튀김용 전갱이. 맛있게 먹어!\n#3;em;[재잘]"
901010600320-56 = "3;니코 아르바이트;03;감사합니다. 많이 파세요!\n#3;em;[반짝]"
