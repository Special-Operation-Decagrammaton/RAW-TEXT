[translation]
1006405-1 = "สาเกหวานและแมว"
1006405-2 = "(เช้าวันต่อมา... คุณครูกำลังรอคาโยโกะอยู่แถววัดพุทธ...)"
1006405-3 = "อ้าว ครู? ออกมารออยู่แถวนอกวัดก่อนฉันเหรอ?"
1006405-4 = "วันนี้ยิ่งอากาศหนาวอยู่ แทนที่จะเข้าไปรอด้านใน..."
1006405-5 = "[s] \"ไม่เป็นไร ครูก็ไม่ได้รอนานอะไรหรอก\""
1006405-10 = "แต่มือเย็นขนาดนี้เลยนะ..."
1006405-11 = "ต้องรีบเข้าไปด้านในให้ร่างกายอบอุ่นกันแล้วละ"
1006405-12 = "แถวนี้น่าจะมีเครื่องดื่มอุ่นๆ ขายอยู่นะ"
1006405-13 = "ดื่มสาเกหวานสักแก้วมั้ยครับ?"
1006405-14 = "เพิ่งต้มออกมาร้อนๆ เลย รีบรับไปดื่มคนละแก้วสิ เดี๋ยวจะเย็นซะก่อน~"
1006405-15 = "ปีใหม่ทั้งทีก็เลยแจกสาเกแถววัดให้กันแบบนี้เลยสินะ"
1006405-16 = "ครู... ดื่มสาเกหวานให้ร่างกายอบอุ่นแล้วค่อยไปซื้อเครื่องรางดีมั้ย?"
1006405-17 = "[s] \"เอาสิ\""
1006405-18 = "ขอสาเกหวานสองแก้วให้ทางนี้ที"
1006405-22 = "[ns1] \"เฮ้อ อุ่นดีจัง...\"\n[ns2] \"รู้สึกอุ่นไปถึงข้างในเลย...\""
1006405-23 = "ฮุฮุ... นี่ละรสชาติที่คิดถึง"
1006405-24 = "ฮุฮุ... นี่ละรสชาติที่คิดถึง"
1006405-25 = "จะว่าไปก็เป็นครั้งแรกเลยนะที่มาดื่มสาเกหวานแบบไม่ต้องกังวลอะไรเลยแบบนี้"
1006405-26 = "[s] \"ก่อนหน้านี้มีเรื่องอะไรงั้นเหรอ?\""
1006405-27 = "ก็สาเกหวานมันเป็นเครื่องดื่มหมักดอง มันมีส่วนผสมของแอลกอฮอล์ด้วยน่ะ ถึงจะไม่ได้มากก็เถอะ"
1006405-28 = "พวกนักเรียนคออ่อนเลยมักจะเมาสาเกหวานแล้วก็ก่อความวุ่นวายกัน"
1006405-29 = "เพราะแบบนั้น ในทุกๆ ปีที่ดื่มสาเกหวาน ฉันเลยต้องคอยกังวลตลอดว่าจะมีนักเรียนเมาแถวนั้นมั้ย ทำเอาดื่มไม่รู้รสอะไรเลย..."
1006405-30 = "แต่ถ้าอยู่กับครูคงไม่ต้องกังวลเรื่องพวกนั้นแล้วน่ะ ก็เป็นผู้ใหญ่นี่นะ"
1006405-31 = "[s] \"คาโยโกะไม่เคยเมาเพราะสาเกหวานเลยเหรอ?\""
1006405-32 = "มันแน่อยู่แล้ว ใครมันจะเมาเพราะเครื่องดื่มแบบนี้กันล่ะ?"
1006405-33 = "ฉันก็ไม่รู้หรอกว่าเวลาดื่มติดต่อกันหลายแก้วแล้วจะเป็นยังไง..."
1006405-34 = "มันอาจจะมีรสหวานอร่อย แต่กินเพื่อคลายความหนาวสักแก้วก็พอแล้วละ"
1006405-35 = "เอาละ ร่างกายอุ่นแล้ว เราไปกันเลยมั้ย..."
1006405-39 = "อ่า..."
1006405-40 = "ขอโทษนะครู แต่ช่วยรอตรงนี้แป๊บหนึ่งได้มั้ย?"
1006405-41 = "พอดีมีเรื่องต้องจัดการนิดหน่อย..."
1006405-42 = "[s] \"อื้ม ตามสบายเลย\""
1006405-43 = "งั้นขอตัวแป๊บนะ"
1006405-48 = "(แต่เกิน 10 นาทีแล้วก็ยังไม่เห็นคาโยโกะกลับมาเลย...)"
1006405-50 = "[ns] ตามคาโยโกะไป"
1006405-53 = "นั่นแหละๆ เป็นเด็กดีสินะเรา? ฮุฮุ..."
1006405-54 = "เธออยู่แถวนี้หรอกเหรอ? ท่าทางจะโดนคนลูบจนชินแล้วเลยสินะ"
1006405-58 = "จ้าๆ เมี๊ยว เมี๊ยว~ เสียงร้องน่ารักเชียว"
1006405-62 = "เมี๊ยวๆ~ เมี๊ยวๆ~ เจ้าปุกปุย~ เมี๊ยวๆ~"
1006405-63 = "[s3] \"ดูสนุกจังเลยนะ\"\n[s4] \"มาเล่นเป็นเพื่อนแมวเหรอ?\""
1006405-64 = "คะ... ครู...?! มาตอนไหนเนี่ย...?"
1006405-65 = "คะ... ครู...?! มาตอนไหนเนี่ย...?"
1006405-66 = "เห็นฉันไม่กลับไปเลยเป็นห่วงจนออกมาตามหาเหรอ...? ขอ... ขอโทษด้วยนะ เล่นกับแมวเพลินเลย..."
1006405-67 = "คือว่า... เอ่อ... เรื่องนั้น..."
1006405-68 = "ครูเห็นแล้วเหรอ...?"
1006405-69 = "[s] \"อื้ม...\""
1006405-70 = "ฉันไม่ได้ตั้งใจทำเสียงน่ารักเลียนแบบแมวเลยนะ..."
1006405-71 = "ไม่สิ ก็ตั้งใจอยู่... แต่คิดว่าคงไม่มีใครเห็น..."
1006405-75 = "ต้องโทษเจ้าสาเกหวานเลย..."
1006405-76 = "ที่ดื่มสาเกหวานไปเมื่อกี้... ฉันเลยมึนๆ จนขาดสติไป..."
1006405-77 = "ตั้งแต่นี้ไปฉันจะไม่ดื่มสาเกหวานอีกเด็ดขาด...!"
1006405-79 = "(หลังจากปลอบคาโยโกะที่เขินอาย คุณครูถึงได้ไปซื้อเครื่องราง...)"
