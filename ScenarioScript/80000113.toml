[translation]
80000113-1 = "ความปรารถนาที่เปี่ยมล้นในมือ"
80000113-2 = "(คุณครูได้รับการติดต่อจากยูคาริ 1 วันก่อนวันวาเลนไทน์)"
80000113-8 = "ท่านอาจารย์! ท่านอาจารย์! รู้เรื่องนั้นหรือเปล่าเจ้าคะ?! "
80000113-9 = "พรุ่งนี้คือวันพิเศษเจ้าค่ะ...!"
80000113-10 = "วันที่ 14 กุมภาพันธ์ของทุกปี วันที่มีความหมายที่ได้ชื่อว่า <บัลเลนไทน์เดย์> เจ้าค่ะ!"
80000113-11 = "[s1] \"ถ้าเรื่องนั้นน่ะครูต้องรู้อยู่แล้ว\"\n[s2] \"ฮุฮุ ยูคาริเรียกครูว่าปรมาจารย์แห่งวันวาเลนไทน์ยังได้เลยนะ?\""
80000113-14 = "ว้าว~! ตอบอย่างร่าเริงและไม่ลังเลใจเลย! สมแล้วที่เป็นท่านอาจารย์เจ้าค่ะ!"
80000113-15 = "อย่างนั้นสินะเจ้าคะ คนที่ล้าหลังเรื่องกระแสปัจจุบันคงจะมีแต่ข้าคนเดียวเจ้าค่ะ"
80000113-16 = "เจ้าคะ...? ที่ผ่านมาข้ารู้จักเกี่ยวกับวันบัลเลนไทน์เดย์หรือเปล่าน่ะเหรอเจ้าคะ...?"
80000113-17 = "อืม~ ช่วงนี้ของทุกปี คนรับใช้ของตระกูลจะเอาขนมมาให้ข้าเจ้าค่ะ"
80000113-18 = "และทุกครั้งที่ได้ขนม ข้าก็จะแค่คิดว่า 'อื้ม~ วันนี้เป็นวันที่ได้กินขนมอย่างจุใจสินะ ลักกี้สุดๆ เลยเจ้าค่ะ!'"
80000113-19 = "แต่ข้าเพิ่งมารู้ว่าความจริงแล้วนั่นเป็นวันที่ให้ <ส่งต่อความรู้สึกขอบคุณที่มีต่อคนสำคัญ> เจ้าค่ะ"
80000113-20 = "ต้องบอกความรู้สึกขอบคุณด้วยขนมหวานๆ... ถึงข้าจะไม่รู้ว่าตัวเองจะนึกถึงใครเป็นคนแรก"
80000113-21 = "แต่วันนั้นก็น่าจะเป็นวันที่น่ารักและอบอุ่นหัวใจนะเจ้าคะ!"
80000113-22 = "[s] (ไม่บอกว่าเป็นกลยุทธ์ทางการค้าดีกว่า...)"
80000113-23 = "ถึงข้าจะรู้จักความหมายของวันนี้ช้าไปหน่อย... แต่ในเมื่อได้รู้แล้ว ข้าก็จะไม่อยู่เฉยหรอกเจ้าค่ะ!"
80000113-24 = "ขออภัยที่ข้ามาขอร้องอย่างกะทันหันนะเจ้าคะ... แต่ถ้าท่านอาจารย์ไม่ว่าอะไร พรุ่งนี้เรามาเจอกัน#nได้ไหมเจ้าคะ?"
80000113-25 = "[s] \"อื้ม ได้สิ เจอกันที่ไหนดีล่ะ?\""
80000113-26 = "อืม... เรื่องสถานที่..."
80000113-27 = "อ้อ! เรื่องเวลาก่อนเจ้าค่ะ! ขอเป็นช่วงบ่ายได้ไหมเจ้าคะ! และถ้าได้สถานที่แล้วข้าจะติดต่อมาบอก#nรายละเอียดทันทีเลยเจ้าค่ะ!"
80000113-29 = "(หลังเวลาอาหารกลางวันของวันต่อมา คุณครูก็ออกไปหายูคาริตามพิกัดที่ยูคาริบอก)"
80000113-38 = "(และสถานที่ที่มาถึงก็คือ...)"
80000113-40 = "บ้านคาเดโนะโคจิ"
80000113-41 = "คุณหนูจะออกมาต้อนรับหลังจากแต่งตัวเสร็จเจ้าค่ะ ช่วยรอสักครู่นะเจ้าคะ"
80000113-42 = "[s] \"อืม...\""
80000113-47 = "(คุณครูนั่งรออย่างประหม่าท่ามกลางบรรยากาศเคร่งขรึมของบ้านที่ใหญ่โตมโหฬาร แต่หลังจากนั้นไม่#nนานนัก...)"
80000113-54 = "[ns] \"อ้อ ยูคาริ ครูกำลังรอ...\""
80000113-58 = "อ๊ะ เชิญเจ้าค่ะ! ท่านอาจารย์! ขออภัยที่ทำให้รอนะเจ้าคะ!"
80000113-59 = "[s] \"ไม่ๆ ไม่เป็นไรเลย ว่าแต่... ชุดมิโกะนั่น...?\""
80000113-62 = "อย่างที่ข้าบอกไปเมื่อวานว่าวันนี้คือวันบัลเลนไทน์เดย์"
80000113-63 = "วันที่ส่งต่อความขอบคุณจากใจจริงให้กับคนสำคัญ"
80000113-64 = "ข้าก็เลยคิดว่าจะทำยังไงดีถึงจะถ่ายทอดความรู้สึกออกมาได้..."
80000113-65 = "จะทำยังไงถึงจะให้ท่านอาจารย์ได้รับรู้ถึงความรู้สึกที่ข้ามีจนล้นใจได้อย่างไม่ขาดตกบกพร่องเลย..."
80000113-66 = "และจากที่ข้าคิดหนักอยู่จนมืดค่ำ ก็ได้คำตอบว่า...!"
80000113-67 = "[s] \"ได้คำตอบว่า...?\""
80000113-68 = "จะให้ท่านอาจารย์ได้เห็นข้า ยูคาริ... "
80000113-69 = "ในฐานะสมาชิกตระกูลคาเดโนะโคจิแบบ <เวอร์ชั่นฟูลเพ้าเวอร์>! "
80000113-70 = "ที่มีนามว่า มิโกะยูคาริ มาร์คุ ทูว์! "
80000113-71 = "ข้าคิดว่าถ้าแต่งตัวแบบนี้ก็จะสามารถถ่ายทอดพลังแห่งความจริงใจทั้งหมดได้น่ะเจ้าค่ะ!"
80000113-72 = "และเพราะอย่างนั้น ท่านอาจารย์เจ้าคะ! ได้โปรดรับสิ่งนี้ไว้!"
80000113-76 = "[ns] \"นี่มัน... เครื่องราง?\""
80000113-77 = "เจ้าค่ะ! ข้าตื่นตั้งแต่เช้ามืดแล้วไปตักน้ำบริสุทธิ์มาสวดอธิษฐาน... จนได้เป็นเครื่องรางพิเศษของ#nคาเดโนะโคจิชิ้นนี้เจ้าค่ะ!"
80000113-78 = "เครื่องรางนี้จะช่วยเรื่องความปลอดภัยของครอบครัว สุขภาพแข็งแรง ความประสบความสำเร็จในการ#nทำธุรกิจ การสอบผ่านฉลุย ตลอดจนความอุดมสมบูรณ์! "
80000113-79 = "ถ้าของชิ้นนี้ถูกใจท่านอาจารย์... ข้าเองก็จะดีใจมากเลยละเจ้าค่ะ!"
80000113-80 = "[s3] \"สะ... สุดยอดเลย...! ครูดีใจมากเลยที่ได้ของแบบนี้...!\"\n[s4] \"แต่มันเป็นของที่... ยิ่งใหญ่เกินกว่าจะให้กันในวันวาเลนไทน์นะ...!\""
80000113-83 = "ฮุฮุ ท่านอาจารย์ละก็... ใช่ว่าข้าจะให้แค่เครื่องรางชิ้นนี้หรอกนะเจ้าคะ!"
80000113-84 = "เพราะถึงจะเป็นเครื่องรางของคาเดโนะโคจิ แต่ก็ได้แค่ครึ่งหนึ่งของความจริงใจที่ข้าอยากส่งต่อให้#nท่านอาจารย์"
80000113-85 = "ถ้าจะส่งต่อความรู้สึกจากใจของข้าอย่างเต็มที่แล้วละก็ ต้องเป็นสิ่งนี้...!"
80000113-90 = "[ns] \"เปลี่ยนร่างได้เหรอเนี่ย?!\""
80000113-91 = "ถ้าเครื่องรางที่ข้าเพิ่งให้ไปเมื่อกี้คือหัวใจจากข้าที่เป็นคนของตระกูลคาเดโนะโคจิ"
80000113-95 = "งั้นของชิ้นนี้ก็คือ... หัวใจของข้า ยูคาริ ในฐานะเฮียกกะเรียวรันที่ได้เรียนรู้หลายๆ สิ่งหลายๆ อย่าง#nจากท่านอาจารย์เจ้าค่ะ"
80000113-96 = "[s] \"นี่มันขนมรสช็อกโกแลตสินะ\""
80000113-97 = "เจ้าค่ะ! นี่คือขนมข้าวโพดกรอบ รสดีลักซุ ช็อกโกแลตโตะพาร์เฟ่! ที่ทำขายแค่ช่วงนี้เท่านั้นนะเจ้าคะ!"
80000113-98 = "ข้าต้องใช้เวลาเกือบทั้งครึ่งเช้าในการไปหาซื้อมาเลยเจ้าค่ะ!"
80000113-99 = "[s] \"อ๋อ ก็เลยให้มาเจอตอนบ่ายสินะ...\""
80000113-104 = "ที่ข้าสามารถเป็นทั้งยูคาริแห่งตระกูลคาเดโนะโคจิ... และเป็นได้ทั้งยูคาริแห่งเฮียกกะเรียวรันแบบนี้ ทั้งหมดเป็นเพราะความช่วยเหลือของท่านอาจารย์"
80000113-105 = "ข้าก็เลยอยากให้ของขวัญทั้งสองอย่างเลยเจ้าค่ะ"
80000113-106 = "เพราะข้าเป็นคนโลภมากน่ะ..."
80000113-107 = "เพราะงั้น ท่านอาจารย์ก็ช่วยรับของขวัญนี้ไว้ด้วยได้ไหมเจ้าคะ?"
80000113-108 = "[s] \"ขอบใจนะ ครูดีใจที่ได้รับความรู้สึกจากใจของยูคารินะ\""
80000113-109 = "ฮุฮุฮุ! ได้ยินอย่างนั้นก็ดีใจเจ้าค่ะ!"
80000113-110 = "[s] \"ดีละ งั้นเรามากินขนมรสช็อกโกแลตนี้ด้วยกันเลยมั้ย?\""
80000113-111 = "ดีเลยเจ้าค่ะ!"
