[translation]
90101090-1 = "第9話;SRT式尋問法"
90101090-2 = "鐘崎港倉庫前"
90101090-7 = "誰だ？"
90101090-12 = "私だよ。あんたらの[ruby=Capo]支部長[/ruby]だ。"
90101090-13 = "私の顔を忘れたわけ？"
90101090-14 = "あっ、姐さん……失礼しました！"
90101090-15 = "はいはい。で、午後は何もなかった？"
90101090-16 = "はい！私らがここを守ってる間、カニ一匹近寄りませんでした！"
90101090-17 = "まぁ、そりゃそうだ。#nカルパッチョ・ファミリーの縄張りをうろつくような怖いもの知らずなんて――"
90101090-18 = "――いや、最近ちょっと増えてきてる気もするけどね。"
90101090-20 = "すみません～デリバリーをお届けに来たのですが、入り口に誰もいなくて。"
90101090-21 = "外においておいたら悪くなっちゃうので、人を探しにここまで来てしまいました。"
90101090-22 = "本当か？正門の警備がここまで通したと？"
90101090-23 = "えっと……正門には誰もいませんでしたよ？"
90101090-25 = "チッ……カルパッチョ・ファミリーの格も、昔ほどじゃないってことか。"
90101090-26 = "ボスの信頼を取り戻すためにも、次の入札を落とすわけにはいかない……！"
90101090-27 = "姐さん、何か心配事でも？"
90101090-28 = "いや、別に。"
90101090-29 = "それよりあんた達、昼の巡回当番じゃなかった？#nもう18時過ぎてるのに、なんでまだ倉庫に張り付いてるわけ？"
90101090-30 = "あ、それが……。"
90101090-31 = "夜の巡回だった連中が腹を壊しまして。"
90101090-32 = "弱っちい奴らね。何食ったらそうなるの？"
90101090-33 = "なんとか寿司？だったような。#n昨日デリバリーで頼んだとかで。"
90101090-34 = "それで今夜の巡回に穴が空いちまって、どうするか悩んでたとこです。"
90101090-35 = "こんのバカども……。"
90101090-36 = "私が来なかったら一晩中待つつもりだったの！？"
90101090-37 = "す、すみません！"
90101090-38 = "寮に行ってサトウとスズキ連れてきな。今日は非番だから暇してるはずさ。"
90101090-39 = "休みは後でカポが埋め合わせするって言っときな。今日はちょいと頑張れって。"
90101090-40 = "は、はい……！"
90101090-46 = "……何グズグズしてんの？"
90101090-47 = "あ、どっちが行くかで悩んでまして。"
90101090-48 = "いつもボスが言ってるじゃないですか。#n区画守る時は常に2人1組。持ち場を空けるなって。だから……。"
90101090-49 = "はぁ……ほんっと、手がかかるわね。"
90101090-50 = "じゃあ何？#n片方が呼びに行ってる間、もう片方はここで私と駄弁るつもりだったの？"
90101090-51 = "1分1秒でも早く連れてくるなら、2人で動いた方が早いに決まってんでしょ！"
90101090-52 = "それとも……いっちょ前に私の心配でもしてるわけ？"
90101090-53 = "い、いえ！"
90101090-54 = "さっさと行って連れてきな！"
90101090-59 = "……はぁ。あんな間抜けを抱えて区画を回す羽目になるなんて。"
90101090-60 = "あの……。"
90101090-61 = "さすがに不意打ちされたら、カポでも危ないんじゃないですかね？"
90101090-62 = "は？いま、何て――"
90101090-67 = "――っぐ。"
90101090-72 = "多分あんたのボスは、こういう状況を心配してたんだろうけど。"
90101090-75 = "こちらFOX3。カルパッチョ・ファミリーの中間管理職を確保したわ。"
90101090-76 = "FOX4、了解。半径50m以内に他構成員の気配なし。"
90101090-77 = "FOX1、了解。ターゲットは秘匿してポイントチャーリーへ移送。目撃者に注意しろ。"
90101090-78 = "何なんだ、よ……。"
90101090-86 = "うっ……うぅぅ……。"
90101090-95 = "……意識、戻りました？"
90101090-99 = "ここは……どこだ。お前らは……？"
90101090-100 = "鐘崎港外れの廃倉庫"
90101090-104 = "FOX1、ターゲットの意識が回復したよ。"
90101090-108 = "横で騒音を出し続けた甲斐があったな。"
90101090-109 = "では、尋問を始める。"
90101090-114 = "尋問……？ハッ、私をか？"
90101090-115 = "あんたら、見たことない制服だが――"
90101090-116 = "アランチーノ・ファミリーの差し金か？"
90101090-117 = "大人まで連れて、ずいぶん威勢がいいじゃないか。#nこんなことして、うちのボスが黙っちゃいないよ？"
90101090-118 = "[s] \"え、えっと……。\""
90101090-119 = "耳を貸す必要はありませんよ。"
90101090-120 = "苦し紛れの脅しですから。"
90101090-124 = "黙れ。お前に質問は許していない。"
90101090-125 = "はは、ずいぶん偉そうだね。"
90101090-126 = "いいよ、見せてもらおうか。何をしようが私は口を割らないけどね。"
90101090-127 = "組織を裏切るくらいなら、いっそカニの餌になった方が――"
90101090-134 = "FOX2。これ、発電機逝ってない？"
90101090-135 = "他にないの？ついでにもうちょっとパワフルなやつ。"
90101090-136 = "ま、待て！何をする気だ！？"
90101090-137 = "何って。さっき言ったでしょ？#n尋問。"
90101090-138 = "でも悪いけど、もう少し待ってくれる？#n配線がまだ途中なんだよね。"
90101090-139 = "そ、それで拷問しようってのか！？"
90101090-142 = "そんな残酷なこと……連邦生徒会が黙ってないぞ！"
90101090-143 = "お、お前らも聞いたことくらいあるだろ？#nD.U.で度を過ぎたことをすると、連邦生徒会長直属の特殊部隊が来るって……！"
90101090-149 = "逃げたってキヴォトスの果てまで追ってくるんだぞ……！#nお、お前ら、連邦生徒会長が怖くないのか！？"
90101090-150 = "[s] \"あ、その特殊部隊なら……。\""
90101090-151 = "問題ないわ。話はつけてきたから。"
90101090-152 = "うんうん。ものすごーく誠実な「対話」をしてきたよ。"
90101090-153 = "あんたらが連邦生徒会長と直で話した？ホラも大概に――"
90101090-154 = "まぁまぁ。そんなに心配しなくていいよ。#n傷跡が残るようなことまではするつもりないし。"
90101090-155 = "この発電機は、サーバーを回すために持ってきただけ。#n人に使うためじゃないから。"
90101090-156 = "サーバー……？"
90101090-160 = "あなたのお名前は、タカハシさん。#nカルパッチョ・ファミリーのカポで、鐘崎港を警備するチームのリーダー……ですよね？"
90101090-161 = "構成員からは、血も涙もないと怖がられているみたいですけど、#n実は「可愛いもの集め」が趣味だとか――"
90101090-162 = "お、お前……どうしてそれを……！"
90101090-163 = "ご自身で全部書いているじゃないですか。「フルリンク」の裏アカに。"
90101090-164 = "もちろん、隠しているつもりだったようですが……。"
90101090-165 = "フォローしているアカウントと、タカハシさんの行動ルーティンを照らし合わせたら、#nすぐに特定できました。"
90101090-166 = "先月はウロミちゃんの限定ぬいぐるみを買いに、#nコーギータウンのポップアップストアにも行ってて……。"
90101090-167 = "あら。可愛い猫も一匹、飼ってるんですね。"
90101090-168 = "くっ……。"
90101090-169 = "さて。この裏アカをバラしたら……どうなるでしょう？"
90101090-170 = "[s1] \"なんて恐ろしい発想なんだ……！\"\n[s2] \"怖い……怖すぎます……。\""
90101090-173 = "や、やめろ！そんなことをされたら私の威厳が――！"
90101090-174 = "であれば、質問に素直に答えた方がいいと思いますよ。"
90101090-175 = "「化け蟹」の噂を流した理由は何ですか？"
90101090-176 = "チッ……そこまで掴んでるのか。"
90101090-177 = "だが……私はボスの寵愛を受けるカポ。港の商人会が震える恐怖の――"
90101090-178 = "まだ分かってないみたいだねぇ。"
90101090-179 = "FOX1。さっき言われたやつ、持ってきたわよ。"
90101090-180 = "これでしょ？"
90101090-181 = "……よし、ご苦労。"
90101090-182 = "FOX3、交渉が決裂したらすぐカポの家に行け。これを飼い猫に食わせるんだ。"
90101090-183 = "なっ、何を食わせる気だ……！？"
90101090-184 = "「いなり社」のツナ味ウェットの缶。#n猫がどれだけ食いつくか……猫好きなら分かるわよね？"
90101090-185 = "知らない人から高級缶を差し出されたら……猫はどうすると思う？"
90101090-186 = "ま、まさか……。"
90101090-187 = "いつもの味気ないカリカリとは段違い。たまらず普段は見せないような甘え方をしたり――"
90101090-188 = "あ。[ruby=・]ま[/ruby][ruby=・]ず[/ruby][ruby=・]い[/ruby][ruby=・]餌[/ruby][ruby=・]し[/ruby][ruby=・]か[/ruby][ruby=・]く[/ruby][ruby=・]れ[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby][ruby=・]飼[/ruby][ruby=・]い[/ruby][ruby=・]主[/ruby]とは、ちょっと距離できちゃうかも？"
90101090-189 = "どうしてそんな残酷なことができるんだ！？"
90101090-190 = "……残酷？"
90101090-191 = "勘違いしているみたいだな。"
90101090-192 = "私たちは人じゃない。「執念深くて残酷な狐」だ。"
90101090-193 = "取引に応じないのなら、お前が想像している以上のことも平気でやる。"
90101090-194 = "ぐぅっ……！"
90101090-195 = "[s3] \"みんな落ち着いて。\"\n[s4] \"相手が話す隙は残してあげよう？\""
90101090-198 = "大人……お前は誰だ？"
90101090-199 = "お前らにしたって、大人を連れてるってことは、ただのチンピラじゃないな。#n企業の人間か？"
90101090-200 = "[s5] \"私はシャー……この子たちの保護者だよ。\"\n[s6] \"乱暴なやり方で連れてきてごめんね。\""
90101090-203 = "はっ、今さら謝られて誰が信じる？"
90101090-204 = "丸め込もうったって、腹の底は見え見えなんだよ。"
90101090-205 = "[s7] \"私の顔を賭けて誓うよ。\"\n[s8] \"私たちはカルパッチョ・ファミリーの利権に、欠片も興味がない。\""
90101090-208 = "そんな言葉を信じ――"
90101090-212 = "……本当に、今回の入札には興味ないのか？"
90101090-217 = "お、先生が出ると一気に空気が柔らかくなるねぇ。"
90101090-218 = "古典的だが、飴とムチは有効な戦略だ。先生が飴役とは想定外だったが。"
90101090-219 = "たぶん先生はそういう意図で宥めたわけじゃないと思うけど……。"
90101090-224 = "[ns] \"私たちは、噂を流した理由が知りたいだけだよ。\""
90101090-225 = "恐怖を煽る理由くらい、大人なら分かるだろ。"
90101090-230 = "人間は感情が昂ると判断が鈍る。それが喜びでも、悲しみでも、恐怖でも……。"
90101090-231 = "感情が先に立てば理性的には考えられない。他人の言葉にも簡単に振り回される。"
90101090-236 = "このキヴォトスには、[ruby=・]恐[/ruby][ruby=・]怖[/ruby]が足りない。"
90101090-238 = "[log=카야]このキヴォトスには、[ruby=・]恐[/ruby][ruby=・]怖[/ruby]が足りない。[/log]"
90101090-240 = "……ありったけの恐怖を見せれば、"
90101090-244 = "……ありったけの恐怖を見せれば、"
90101090-245 = "誰もが私の言うことを聞くようになる。"
90101090-247 = "[log=카야]……ありったけの恐怖を見せれば、誰もが私の言うことを聞くようになる。[/log]"
90101090-249 = "その中で最もコントロールしやすいのが「恐怖」だ。#n未知の存在は、とりあえず怖がるからな。"
90101090-250 = "そう、連邦生徒会長の特殊部隊みたいなもんだよ。#nいるかもしれない。それだけでチンピラどもは手を出しにくくなるだろ？"
90101090-251 = "本当に存在するか、何人捕まえたかなんて、重要じゃない。"
90101090-255 = "人々の恐怖の上に建てられた学園が……"
90101090-257 = "[log=미야코]人々の恐怖の上に建てられた学園が……[/log]"
90101090-261 = "どうしてSRT特殊学園になれるというのですか？"
90101090-263 = "[log=미야코]どうしてSRT特殊学園になれるというのですか？[/log]"
90101090-265 = "………。"
90101090-266 = "組織を維持するために、似た手を借りただけだ。"
90101090-267 = "「怖い目にあいたくないなら、ウチの仕事に手を出すな」、ってな。"
90101090-268 = "恐怖を植えつけるなら、他にも手段はあったはずだ。"
90101090-269 = "わざわざ「カニ」の噂を選んだ理由は何だ？"
90101090-270 = "港で動く連中に馴染みがある怪談を見つけたから使っただけだ。"
90101090-271 = "「カルパッチョに逆らえばカニの餌。未知の恐怖に直面する」"
90101090-272 = "とはいえ、一番大事なのは誰も傷つかないってことだ。"
90101090-273 = "少し調べれば――いや、港で働く者ならすぐに分かる。#n[ruby=・]普[/ruby][ruby=・]通[/ruby][ruby=・]サ[/ruby][ruby=・]イ[/ruby][ruby=・]ズ[/ruby][ruby=・]の[/ruby][ruby=・]カ[/ruby][ruby=・]ニ[/ruby]に大した力は無い。"
90101090-274 = "だけど私らが相手にしてるのは不特定多数の一般人だ。"
90101090-275 = "鋭そうなハサミと硬そうな甲羅、そのイメージだけで恐怖を連想する。"
90101090-276 = "ただの噂話じゃあヴァルキューレは動かない。"
90101090-277 = "私らは形のない恐怖を利用しているだけだ。"
90101090-278 = "何も問題ないだろう？なにせ、誰も消えてないじゃないか。"
90101090-285 = "……よくもまぁぬけぬけと。"
90101090-289 = "多くの者が不安を抱き、入札が始まる前から勝者が決まってしまう。"
90101090-290 = "どうして「問題がない」と言い切れる！？"
90101090-291 = "な、なんだよ急に。何か地雷踏んだか？"
90101090-294 = "[ns] \"ユキノ、落ち着いて。\""
90101090-295 = "ですが、私は――"
90101090-301 = "ん？何の音？"
90101090-302 = "なんか「カチカチ」してる？"
90101090-303 = "昆虫とか、節足動物が動く時みたいな……。"
90101090-304 = "……ゴキブリが大量発生してるとか？"
90101090-305 = "ゾッとすること言わないで！#nゴキブリがこんな音出すわけないでしょ！？"
90101090-306 = "ていうか、この揺れなに？近くで重機でも使ってるわけ？"
90101090-307 = "この時間に工事の予定があるなんて聞いてないよ。"
90101090-308 = "……それに、音がどんどん大きくなってる。"
90101090-309 = "先生、下がってください。"
90101090-313 = "……来ます。"
90101090-314 = "[s] \"な、何が……？\""
90101090-320 = "なんだよアレ――！？"
