[translation]
901010600210-8 = "すみません、ちょっとお話いいですか？"
901010600210-14 = "はい！おや、この近くでは見ない顔ですね。"
901010600210-15 = "最近新しく来られた方ですか？"
901010600210-16 = "はい。お弁当配達からお店の宣伝まで――なんでも配達する「FOX EATS」です！"
901010600210-17 = "この度、鐘崎港が配達エリア対象に追加されたんです。是非ご利用ください！"
901010600210-18 = "いいですね。毎回お昼ご飯のために、港の外へ出るのも手間だったので……。"
901010600210-19 = "これから使ってみますね。"
901010600210-20 = "ところで、ここにはどういったご用件でしょうか？#n港の外に送る荷物でも？"
901010600210-21 = "いえ、荷物ではなく……少しお伺いしたいことがありまして。"
901010600210-22 = "この駅って旅客列車も止まるんですか？"
901010600210-23 = "ここから列車に乗って外へ行けるのか気になりまして……。"
901010600210-24 = "旅客列車が停車する駅ではありませんが……早朝に車両基地と港の間を走る2両編成の通勤列車なら1本ありますよ。"
901010600210-25 = "経由する駅がないので、港の関係者以外はほとんど利用しませんが。#nご乗車をご希望でしたら切符を発券しますね。"
901010600210-26 = "なるほど。正門以外からも港を出る手段はあるんですね。"
901010600210-27 = "あの、もう一つお伺いしてもいいですか？"
901010600210-28 = "「ミヤグチ」という名前の乗客がその通勤列車を利用したことはありますか？"
901010600210-29 = "最近、知り合いと連絡がとれなくなってしまって……行方を探しているところなんです。"
901010600210-30 = "それは……申し訳ありませんが、お答えしかねます。"
901010600210-31 = "乗車記録は機密情報ですので。外部に提供はできません。ご了承ください。"
901010600210-32 = "いえ、そうですよね。こちらこそ変なことを聞いてしまい、すみませんでした。"
901010600210-33 = "よい一日を！"
