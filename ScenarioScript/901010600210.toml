901010600210-13 = "3;하이랜더 승강장 역무원;02\n#3;em;[?]\n#3;a\n#wait;1000"
901010600210-14 = "3;하이랜더 승강장 역무원;00;안녕하세요! 이 근처서는 못 보던 얼굴이시네요.\n#3;em;[반짝]\n#3;greeting"
901010600210-15 = "3;하이랜더 승강장 역무원;03;최근에 새로 오신 분이신가요?"
901010600210-16 = "1;니코 아르바이트;03;네, 도시락 배달부터 찾아가는 맛집 서비스까지— 뭐든지 배달해 드리는 <FOX EATS> 입니다!\n#1;em;[재잘]\n#1;ar\n#3;m5"
901010600210-17 = "1;니코 아르바이트;01;얼마 전부터 카네사키 항만 일대에도 배달 서비스를 시작했으니, 많은 이용 부탁드려요!"
901010600210-18 = "3;하이랜더 승강장 역무원;00;그거 잘됐네요. 매번 점심때마다 항구 밖으로 나가는 것도 귀찮았었는데……"
901010600210-19 = "3;하이랜더 승강장 역무원;03;앞으로는 자주 애용해야겠어요."
901010600210-20 = "3;하이랜더 승강장 역무원;02;그나저나 이 외진 역에는 무슨 일로 오셨나요? 항만 밖으로 부칠 짐이라도 있으신가요?"
901010600210-21 = "1;니코 아르바이트;02;아, 물건을 부치려는 건 아니고 갑자기 궁금한 게 생겨서요.\n#1;em;[반응]"
901010600210-22 = "1;니코 아르바이트;01;혹시, 이 역에서 승객을 태울 수 있는 여객 열차도 탈 수 있나요?"
901010600210-23 = "1;니코 아르바이트;03;여기서 열차를 타고 외부로 나갈 수 있는지 궁금해서요."
901010600210-24 = "3;하이랜더 승강장 역무원;02;정기적으로 방문하는 여객 열차는 없지만…… 이른 아침에 철도 차고지와 항만을 오가는 2량짜리 통근 열차가 하나 있어요.\n#3;em;…"
901010600210-25 = "3;하이랜더 승강장 역무원;03;경유하는 역이 없어서 항만 관계자들 이외에는 거의 사용하지 않지만, 혹시 탑승을 희망하신다면 표를 발권해 드릴게요."
901010600210-26 = "1;니코 아르바이트;99;그렇군요. 정문 이외에도 항만을 빠져나가는 방법이 있었나 보네요."
901010600210-27 = "1;니코 아르바이트;02;저, 하나만 더 여쭈어 봐도 괜찮을까요?\n#1;em;[?]"
901010600210-28 = "1;니코 아르바이트;01;혹시 얼마 전에 '미야구치'라는 이름의 승객이 통근 열차를 이용한 적이 있었나요?"
901010600210-29 = "1;니코 아르바이트;03;최근에 지인이 갑자기 사라져서 행방을 찾는 중이었거든요."
901010600210-30 = "3;하이랜더 승강장 역무원;08;그건…… 죄송하지만 확인해 드리기 어려울 것 같네요.\n#3;em;[땀]"
901010600210-31 = "3;하이랜더 승강장 역무원;02;열차의 승객 기록은 기밀이라 외부인에게 제공해 드릴 수는 없어서요. 양해 부탁드립니다."
901010600210-32 = "1;니코 아르바이트;01;아뇨, 당연한 말씀이신걸요. 괜한 걸 여쭈어서 죄송합니다."
901010600210-33 = "1;니코 아르바이트;03;그럼 좋은 하루 되세요!\n#1;em;[반짝]\n#1;greeting"
901010600210-34 = "#all;hide"
