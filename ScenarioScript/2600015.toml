[translation]
2600015-1 = "#title;누군가는 해야 할 일"
2600015-2 = "#na;(잠시 시간을 내어 주변을 둘러보고 있었다.)"
2600015-3 = "#na;???;……? 어라, 선생님?"
2600015-4 = "#na;???;우연이네요. 뵙게 되다니……"
2600015-5 = "#st;[0,0];instant;1;"
2600015-6 = "#clearST"
2600015-7 = "#wait;1500"
2600015-8 = "[ns1] \"이 목소리는……! 럭키!!\"\n[ns2] \"치나츠? 치나츠지!!\""
2600015-9 = "#wait;10"
2600015-10 = "#wait;10"
2600015-11 = "3;치나츠;04;마, 맞습니다. 접니다.\n#3;em;[땀]\n#3;a\n#3;stiff"
2600015-12 = "3;치나츠;06;늘 그렇듯 꽤 큰 리액션이시네요. 환대는 감사할 일입니다만……."
2600015-13 = "3;치나츠;07;이렇게 거리에서 바로 뵙게 될 거라고는 생각지도 못했네요. 마치 아침의 메시지가 약속이라도 잡은 것마냥……"
2600015-14 = "3;치나츠;02;……아."
2600015-15 = "3;치나츠;04;그…… 절대로 의도했다거나 그런 의미는 아니고요. 이건 그저……\n#3;em;[///]"
2600015-16 = "3;치나츠;02;……네?"
2600015-17 = "3;치나츠;01;그보다 쉬는 날 아니었냐고요? 네, 맞습니다만. 아침에도 말씀드렸었지요."
2600015-18 = "3;치나츠;01;……가방?\n#3;em;[?]"
2600015-19 = "#st;[0,0];instant;1;"
2600015-20 = "#clearST"
2600015-21 = "3;치나츠;01\n#3;m5\n#wait;1500"
2600015-22 = "#wait;1500"
2600015-23 = "3;치나츠;02;아, 이거 말씀이시군요."
2600015-24 = "[s3] \"쉬는 날에도 가방이 한가득이라니.\"\n[s4] \"약품 가방이잖아. 오늘도 쓸 일이 있어?\""
2600015-25 = "#wait;10"
2600015-26 = "#wait;10"
2600015-27 = "3;치나츠;03;아아. 그런 의미로 하신 말씀이군요. 죄송해요. 제가 설명이 조금 부족했나 봅니다.\n#3;m3\n#3;em;[땀]"
2600015-28 = "3;치나츠;07;쉰다는 건 선도부의 이야기였으니까요. 모처럼의 시간이 생겼으니, 오늘은 응급의학부를 조금 들러 볼까 했습니다."
2600015-29 = "3;치나츠;99;별일이야 없겠지만…… 거기도 선도부 못지않게 바쁜 곳이라, 혹시 일손이 필요할지도 모를 일이고 말이에요."
2600015-30 = "[s5] \"응급의학부에서 부른 거야?\"\n[s6] \"치나츠 스스로 찾아가는 거구나.\""
2600015-31 = "#wait;10"
2600015-32 = "#wait;10"
2600015-33 = "3;치나츠;02;네, 맞습니다. 기억하실진 모르겠지만, 저도 초기에는 응급의학부 부원이었으니까요.\n#3;em;[반응]"
2600015-34 = "3;치나츠;01;이 가방도 그때부터 쓰던 것이고…… 의료 기술도 거기서 배운 게 많습니다."
2600015-35 = "3;치나츠;99;부장이나 다른 분들도……"
2600015-36 = "#st;[0,0];instant;1;"
2600015-37 = "#clearST"
2600015-38 = "3;치나츠;99\n#3;em;…\n#wait;2500"
2600015-39 = "3;치나츠;03;……조금 괴짜인 분들이 많지만, 실력만큼은 정말로 확실한 분들이니까요.\n#3;em;[땀]\n#3;stiff"
2600015-40 = "[s7] \"부 전체가…… 그런 식이구나……\"\n[s8] \"고생 많았겠네, 그때도.\""
2600015-41 = "#wait;10"
2600015-42 = "#wait;10"
2600015-43 = "3;치나츠;07;후후. 고생이라고 할 것까지는 없다고 생각합니다만 말이죠.\n#3;em;[재잘]"
2600015-44 = "3;치나츠;07;업무량 자체는 선도부가 더 많다면 많았지, 적다고 할 수는 없는 양이기도 하니까요."
2600015-45 = "3;치나츠;02;……네?"
2600015-46 = "3;치나츠;04;물어보고 싶은 게 있는데, 물어봐도 괜찮냐고요?\n#3;em;[?]"
2600015-47 = "3;치나츠;02;음…… 무슨 이야기일까요? 이 시점에서 질문이라고 하시면, 대충 예상은 갑니다만……"
2600015-48 = "3;치나츠;03;저는 괜찮으니 편히 물어보세요. 대답할 수 없는 거라면, 그렇다고 말씀드리면 됩니다.\n#3;em;[반응]"
2600015-49 = "[s9] \"치나츠는 어째서 선도부로 온 거야?\"\n[s10] \"부를 옮긴 이유가 따로 있는 거야?\""
2600015-50 = "#wait;10"
2600015-51 = "#wait;10"
2600015-52 = "3;치나츠;07;역시 그 질문이셨군요. 후후.\n#3;em;[음표]"
2600015-53 = "3;치나츠;02;아, 괜찮습니다. 대답할 수 있는 이야기고, 대답해도 전혀 문제없는 이야기입니다."
2600015-54 = "3;치나츠;03;사실 이미 몇 번이나, 선생님 이외의 분들께도 받은 적이 있던 질문이고 말이지요."
2600015-55 = "3;치나츠;99;간단하게 말씀드리자면…… 그저…….\n#3;em;…"
2600015-56 = "3;치나츠;02;누군가는 해야 하니까……라고 할 수 있겠네요.\n#3;closeup"
2600015-57 = "3;치나츠;06;솔직히 여기니까 드리는 말씀으로는, \"내버려둘 수 없었다\" 쪽의 기분이긴 했습니다만…….\n#3;closeup\n#3;em;[한숨]"
2600015-58 = "[s11] \"누군가는 해야 하니까?\"\n[s12] \"내버려둘 수 없었다……?\""
2600015-59 = "#wait;10"
2600015-60 = "#wait;10"
2600015-61 = "3;치나츠;01;……네."
2600015-62 = "3;치나츠;01;선도부와 응급의학부는 꽤 사이가 좋은 조직입니다만, 그렇다고 해서 하나의 조직은 아닙니다."
2600015-63 = "3;치나츠;99;두 부장님도 사이는 좋지만, 그렇다고 서로에게 막 지시할 수 있는 입장 또한 아니지요."
2600015-64 = "3;치나츠;06;하지만 선도부는 업무상 부상자가 자주 발생하고, 또 부상자를 자주 만들어냅니다.\n#3;em;[속상함]"
2600015-65 = "3;치나츠;01;그때마다 응급의학부도 출동하긴 하지만, 아무래도 즉각적으로 반응하기 어려울 때라는 건 생기기 마련."
2600015-66 = "3;치나츠;02;이건 응급의학부에 들어가고 나서, 몇 번의 상황을 겪으며 스스로 느꼈던 일이었답니다."
2600015-67 = "3;치나츠;02;누군가는 응급의학부가 아니라 선도부 안에서, 가장 빠르게 필수적인 기초 조치를 취해 놓는 것이 좋겠다고 말이죠.\n#3;em;[반응]"
2600015-68 = "3;치나츠;06;하지만 아시다시피 두 부장님 모두 그다지 융통성이 있는 성격은 아니라서, 조직 개편 이야기 같은 건 계속해서 반려됐습니다."
2600015-69 = "3;치나츠;01;나름대로 많은 이유가 있었겠죠. 두 분도 사정을 모르는 분들은 아니실 테니까요."
2600015-70 = "3;치나츠;05;그렇다면 남은 방법은…… 제가 개인으로서 자리를 옮기는 것 정도.\n#3;em;…"
2600015-71 = "3;치나츠;07;네, 그게 지금의 제 상태입니다. 이 정도면 궁금증에 대한 답변이 잘 되었을까요?"
2600015-72 = "3;치나츠;03;자화자찬 같아서 부끄러운 이야깁니다만, 실제로 제가 선도부로 옮기고 나서 선도부의 전선 유지 능력이 향상됐다……라고.\n#3;em;[반응]"
2600015-73 = "3;치나츠;07;선도부장님은 그렇게 평가한 적이 있습니다. 사적인 감정을 실어서 말하는 분은 아니시니, 분명 사실이긴 하겠지요."
2600015-74 = "#st;[0,0];instant;1;"
2600015-75 = "#clearST"
2600015-76 = "#wait;2500"
2600015-77 = "[ns13] \"……역시 치나츠는 대견한 아이야.\"\n[ns14] \"모두에게 예쁨 받는 이유가 있다니까.\""
2600015-78 = "#wait;10"
2600015-79 = "#wait;10"
2600015-80 = "3;치나츠;04;그, 그런…… 그런 이야기를 듣고자 말씀드린 건 아닙니다만.\n#3;em;[///]"
2600015-81 = "3;치나츠;02;아무튼 그런 이유에서, 가끔은 응급의학부에 들러 상황을 살피곤 합니다."
2600015-82 = "3;치나츠;01;지금도 향하는 길이기도 했지요."
2600015-83 = "3;치나츠;99;……음…….\n#3;em;…"
2600015-84 = "3;치나츠;04;그러고 보니 선생님께서는 어떤 일로 나오셨나요? 아까 전 메시지로는, 오늘은 분명……."
2600015-85 = "3;치나츠;02;……네?"
2600015-86 = "3;치나츠;02;응급의학부에 들르실 일이 있으시다고요?"
2600015-87 = "3;치나츠;02;……이렇게 갑자기요?\n#3;em;[?]"
2600015-88 = "3;치나츠;04;혹시 그건…… 방금 생긴 일정인가요?"
2600015-89 = "[s] \"글쎄, 어떨까나…….\""
2600015-90 = "#st;[0,0];instant;1;"
2600015-91 = "#clearST"
2600015-92 = "#wait;1000"
2600015-93 = "[ns] \"나도 '내버려둘 수 없는 것'들이 조금 있거든.\""
2600015-94 = "#st;[0,0];instant;1;"
2600015-95 = "#clearST"
2600015-96 = "3;치나츠;00\n#3;em;…\n#wait;2500"
2600015-97 = "3;치나츠;03;……정말이지, 어쩔 수 없는 분이군요. 선생님도.\n#3;em;[한숨]"
2600015-98 = "3;치나츠;07;거기서 그렇게 나오시면 저도 대답하기가 참 곤란해지는데 말이지요."
2600015-99 = "3;치나츠;07;뭐…… 좋습니다. 일손은 많을수록 좋겠지요. 응급의학부 분들도 좋아할 게 뻔하고요.\n#3;em;[반응]"
2600015-100 = "3;치나츠;06;생각지도 않은 부분에서 또 빚을 지게 되는 느낌입니다."
2600015-101 = "3;치나츠;01;그러면 그 대신이라기에 조금 뭐하지만……."
2600015-102 = "3;치나츠;99;이번에는 선생님께서 이쪽으로 와 주셨으니, 그……"
2600015-103 = "3;치나츠;04;다음 번 휴일에는……. 선생님 업무도 도와드릴 겸…….\n#3;em;…"
2600015-104 = "3;치나츠;03;……제가, 샬레로 한 번 가겠습니다.\n#3;em;[하트]"
2600015-105 = "#all;hide"
2600015-106 = "#na;(이후 치나츠와 함께 응급의학부에 들러 이런저런 업무들을 도왔다.)"
2600015-107 = "#na;(응급의학부에 있는 모두가, 치나츠를 알아보고는 기다렸다는 듯 환대했다.)"
