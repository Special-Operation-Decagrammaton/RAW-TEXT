[translation]
10053030-1 = "Episode 3;Ghost Bus"
10053030-5 = "Uh..."
10053030-6 = "We might be in over our heads."
10053030-11 = "Are you sure this is the right way?"
10053030-12 = "According to the map, definitely."
10053030-13 = "Maybe you were scammed?"
10053030-14 = "No. I reserved everything through a well-vetted website, and checked the veracity of the most recent reviews. I'm positive."
10053030-15 = "This is the only way to head to our mountain lodge."
10053030-16 = "And this bridge is stable? It's not just going to...collapse?"
10053030-20 = "Well, even if it does, it's over a river. You know how to swim, right?"
10053030-21 = "As if..."
10053030-23 = "Afternoon, ladies."
10053030-28 = "I don't suppose you're looking for the cabin at the other end of the bridge?"
10053030-30 = "Oh, so it does exist."
10053030-32 = "Yes. And, if you're looking for that cabin in the woods..."
10053030-33 = "You should turn back."
10053030-35 = "Huh?! So it WAS a scam! They stole our money?"
10053030-37 = "No. It's there, all right. But...it's best if you didn't stay."
10053030-38 = "The reason... You'll know it when you see it. And you'll wish you never did."
10053030-40 = "...!"
10053030-42 = "I warned you. It's not too late to look for another place."
10053030-48 = "...? What a strange old man."
10053030-49 = "Now, let's move before it gets too late. The sun sets earlier in the countryside."
10053030-50 = "W-Wait! We're just going to head in?!"
10053030-51 = "Hm? Did I miss something?"
10053030-52 = "I mean! There was a creepy old man warning us not to! And he was all beat up! That's not a coincidence. He must have been waiting for us."
10053030-53 = "Konoka... I admire your ability to center yourself in the universe."
10053030-54 = "But believing the world revolves around you will lead to delusions of grandeur."
10053030-55 = "This too can be overcome."
10053030-60 = "Come to think of it, Konoka's kind of a scaredy cat..."
10053030-61 = "She reads every creepy story she finds on the internet, then spooks herself so badly that she can't get to sleep."
10053030-62 = "Me? \"Scared\"? You got it all wrong!"
10053030-63 = "This guy was waiting here all day to give us a foreboding warning. He wouldn't do that for no reason. You know what they say about today's society and its lack of regard for basic safety!"
10053030-64 = "Right, Sensei?! Didn't you find that at least a LITTLE suspicious?"
10053030-65 = "[s1] \"It was too convenient to be a coincidence...\"\n[s2] \"It bothers me.\""
10053030-68 = "See! Sensei agrees!"
10053030-70 = "Yeah. But, in case you all missed the point, there's no other lodging nearby."
10053030-71 = "The closest village is an hour's walk."
10053030-72 = "Bleh. Disgusting."
10053030-73 = "We should proceed. We already paid, and we can't get a refund if we cancel this late."
10053030-75 = "Please, Sensei!"
10053030-76 = "[ns3] \"An hour's walk...\"\n[ns4] \"And it doesn't look like there are any taxis...\""
10053030-80 = "[ns] \"Konoka.\""
10053030-82 = "[ns] \"There are times when one must summon their courage.\""
10053030-83 = "Sensei?!"
10053030-87 = "Now, if a ghost appears, we will take full responsibility for protecting Konoka."
10053030-88 = "Wh-Why did you say that?! You know just saying the \"G-word\" attracts them!"
10053030-89 = "If it were that easy, we'd be able to document them reliably. Come now. I'll hold your hand."
10053030-90 = "A-All right. Don't tug at me! I can walk at my own pace!"
10053030-99 = "It's cleaner in here than I thought it'd be."
10053030-102 = "The outside led me to think this place would be a dump. But, honestly... It's not too bad."
10053030-103 = "Hey, Rena. Isn't the vibe here a little...creepy?"
10053030-104 = "...Are you still thinking about that old guy?"
10053030-105 = "No, it's not because of that! I feel something! In my bones! Something chilling...!"
10053030-107 = "Cold spots are one of the telltale signs of a phantasmal visitation."
10053030-112 = "However, I do not detect any unnatural localized temperature fluctuations. You can relax."
10053030-117 = "What's that? A camera?"
10053030-118 = "Yes! More accurately, this is a thermal imaging camera. It allows me to see the relative heat of the room. It even takes pictures."
10053030-119 = "You're really prepared..."
10053030-120 = "Of course I am. We are on the hunt for a never-before-seen legendary creature."
10053030-121 = "To reiterate, I have scientifically verified that there are no cold spots here. Please calm down, Konoka—you appear rather warm."
10053030-123 = "Always looking out for me, Director! You're so reliable."
10053030-124 = "Fufu, I am a professional, after all."
10053030-129 = "...Hm? Sensei? Do you have a question?"
10053030-130 = "[ns5] \"Well, you said you're a 'pro'...\"\n[ns6] \"Is this part of a club activity?\""
10053030-133 = "...!"
10053030-134 = "Th-That is also an interesting topic, but it's probably best to delve into it some other time!"
10053030-135 = "Time is of the essence! As I said, the sun sets early in the countryside! Let's not go wasting the day!"
10053030-140 = "...? What's gotten into her?"
10053030-141 = "Not wanting to talk about clubs... I can empathize."
10053030-142 = "[s7] \"You two don't know either?\"\n[s8] \"You've never talked about her club?\""
10053030-145 = "Well, you know..."
10053030-149 = "Hm. That's odd, isn't it? Why don't I know anything about her?"
10053030-150 = "Sure, we've known each other for a while, but mainly as online friends. We don't go around talking about our daily lives."
10053030-151 = "Kinui Rena. Wildhunt Art Academy, first year. Fashion Design major."
10053030-152 = "H-Huh...? What are you doing?"
10053030-156 = "Assigned Dormitory 4. The room number..."
10053030-157 = "Ugh, I don't want to mention the number... But it's \"404,\" right? You have three senior roommates."
10053030-158 = "The room number, the number of girls staying there... Ugh, it gives me the chills."
10053030-159 = "I'm the one getting the chills here! How did you know all that?! Are you stalking me...?!"
10053030-160 = "Tsk, tsk, sweet child. There's always a way."
10053030-161 = "People can't help but leak personal information when they post online."
10053030-162 = "I could tell which dorm you lived in from the way you talked about your closest mart, the hill you hate trudging up, and the winding path you take to your classes. The one leading to the...Design Building, right?"
10053030-163 = "I never mentioned my room number."
10053030-164 = "You said that you felt cursed because of your room number. Unlucky numbers would probably be \"4,\" \"6,\" or \"13.\" But since you live in Dormitory 4, it was probably \"404,\" since \"406\" is meaningless. \"413\" even more so."
10053030-165 = "What are you, a detective?!"
10053030-166 = "A detective? How laaaaaaame."
10053030-167 = "I'm part of the Public Peace Bureau. I've learned from the best. I have a friend who can make a hardened thug sob like a baby."
10053030-168 = "Ah, so you really DO go to Valkyrie, Konoka. I thought you were just making it up."
10053030-169 = "Aha, how harsh! You're saying that I look like too much of a delinquent?"
10053030-170 = "I did NOT say that!"
10053030-171 = "But you thought it, didn't you?"
10053030-172 = "I-I did not!"
10053030-173 = "Come on, you must have considered it. Just a little bit, right? When you first saw me? Hm?"
10053030-174 = "...Well, when you put it like that..."
10053030-175 = "Sensei!! Rena called me a delinquent!!"
10053030-176 = "Huh?! Wh-What?! You made me say that!"
10053030-177 = "[s9] \"Don't tease Rena too much...\"\n[s10] \"Rena, respect your seniors.\""
10053030-178 = "Yup!"
10053030-183 = "S-Sensei?!"
10053030-186 = "Ah! Come on! Stop teasing me!!"
10053030-189 = "...All the Tsuchinoko eyewitness accounts have been along the Mt. Shirakawa river bank."
10053030-192 = "If the Tsuchinoko is indeed a biological creature, it would need access to a consistent water source. Logically, it would reside near the mountainside or deep in the valley—to avoid human intervention."
10053030-197 = "Okay, got it!"
10053030-198 = "Next stop: the mountain! And this line heads straight to Mt. Shirakawa!"
10053030-202 = "...Wow, Sensei. Get a load of this."
10053030-203 = "There's only one line, and it only runs twice a day."
10053030-204 = "I mean, this is the countryside. It's not exactly a tourist spot..."
10053030-205 = "*sigh* How is this my lifeeeee...?"
10053030-206 = "Well, only thirty minutes to go, ladies. Might as well talk! Or we could...siiiiiing?"
10053030-211 = "Hm? That's the correct number, right?"
10053030-212 = "Yeah. How...strange. It's waaaay ahead of schedule."
10053030-217 = "..."
10053030-220 = "..."
10053030-221 = "...Gah!"
10053030-222 = "Could this be...?!"
10053030-225 = "Now that I'm closer to the Tsuchinoko, my good fortune is returning!"
10053030-226 = "Keep a snake nearby! It's like the fortune-teller said!"
10053030-231 = "Her fortune really said...? No, it must be a coincidence."
10053030-232 = "Wait, Rena. Sensei."
10053030-233 = "Am I the only one who finds the license plate on that bus strange?"
10053030-234 = "[s11] \"Huh? F 44-66...?\"\n[s12] \"It's really ominous...\""
10053030-237 = "\"Four\" is not usually used for license plates. It's sinister and evokes the concept of death."
10053030-238 = "And 44-66 on top of that..."
10053030-239 = "The F 44-66 bus...?"
10053030-240 = "Hm? Have you heard of it?"
10053030-241 = "Mm... Well, I wouldn't say I'm an expert, but some people were sharing a story about it online."
10053030-242 = "They said it's a bus ridden by ghosts..."
10053030-243 = "Ghosts...?"
10053030-244 = "It's a typical horror cliche. Someone hops on a bus without thinking, then they see it's full of ghosts, so they jump off."
10053030-245 = "Or someone falls asleep on the bus, and ends up in a parallel Kivotos... You know, like isekai."
10053030-246 = "The bus framing device was popular for a while..."
10053030-247 = "And all the buses in the ghost stories had F 44-66 license plates...?"
10053030-251 = "S-Surely that's just a coincidence! A gag! It's not like I believe in any of that stuff!"
10053030-252 = "Besides, why would we find a haunted ghost bus in the countryside during the middle of the day? Right as we're on an investigation? That's too contrived! It's impossible."
10053030-253 = "Unless it is real."
10053030-254 = "..."
10053030-259 = "Hey, beep-beep! Sensei, gang, are you getting on? The ride's waiting!"
10053030-260 = "[ns13] \"Maybe not this bus.\"\n[ns14] \"Let's wait for the next one.\""
10053030-264 = "Huh? But there's only one bus that stops here...?"
10053030-265 = "...What?"
10053030-266 = "Huh. Now that I look at it, this bus doesn't match the route number on the sign."
10053030-267 = "Excuse me, kind driver. Is this the bus to Mt. Shirakawa?"
10053030-268 = "..."
10053030-269 = "...? Hello, do you hear me?"
10053030-270 = "..."
10053030-274 = "Something about this stinks."
10053030-275 = "...Perhaps it's time to bring it out."
10053030-277 = "Bring out what? Not that gun on your back, right?!"
10053030-278 = "I don't think it's a good idea to pick a fight with a ghost..."
10053030-281 = "Sensei, please keep an eye on Konoka."
10053030-282 = "When it comes to superstitions... Konoka always gets herself into trouble."
10053030-284 = "[ns15] \"(Is this what Kanna warned me about...?)\"\n[ns16] \"Um, Konoka, let the bus go...\""
10053030-289 = "No, Sensei. My \"little friend\" works wonders for situations like this."
10053030-290 = "You've left me with no other choice, bub."
10053030-295 = "[ns17] \"...? What is that?\"\n[ns18] \"A student notebook?\""
10053030-298 = "Ah, it seems you're unfamiliar."
10053030-299 = "Well, watch and learn. Kivotos drivers fear this way more than my rifle."
10053030-300 = "Hello, sir. I'm from Valkyrie—hence the badge. Mind showing me your license?"
10053030-302 = "..."
10053030-303 = "Oh, was I too quiet? I said I want to see your Operator's License for this heavy-duty conveyance. Refusal to surrender documentation is an automatic violation."
10053030-305 = "..."
10053030-309 = "Ah! Sir! Halt! Don't you dare—"
10053030-314 = "...He really dared."
10053030-315 = "Maybe ghosts are also afraid of tickets...?"
10053030-317 = "Tsk... You just wait, buddy. I know your plates..."
10053030-318 = "But still, Sensei. Those were impressive investigative skills! That looked JUST like an ordinary bus."
10053030-319 = "[s19] \"Well... Rena tipped me off.\"\n[s20] \"Tsubasa suspected it...\""
10053030-321 = "H-Huh?! O-Oh! Th-That's right! They were acting pretty...suspicious! Right?"
10053030-322 = "(Warn me if you're going to put me on the spot like that!)"
10053030-327 = "Hmm?"
10053030-329 = "Huh? That's because... I am an expert! There were many signs..."
10053030-330 = "Really? What gave it away, Director?"
10053030-331 = "A-All shall be revealed in time, Konoka."
10053030-335 = "Ah?"
10053030-342 = "Oh, I think this is the REAL bus!"
10053030-347 = "The REAL one...! Wait, I mean—I'm not saying I thought the other one was a \"ghost bus\" or something like that!"
10053030-354 = "Welcome aboard! Please mind the step, little lady!"
10053030-355 = "Thank you. H-Hello."
10053030-356 = "Um, this may seem like a strange question, but there was a bus here earlier, and..."
10053030-358 = "...Huh? Another bus? That's strange."
10053030-359 = "This is the only bus that stops here. See the sign?"
10053030-360 = "...?!"
10053030-363 = "Ultimately, we never figured out where the suspicious bus came from, or where it went..."
