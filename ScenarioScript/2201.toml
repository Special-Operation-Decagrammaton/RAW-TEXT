[translation]
2201-1 = "แผนธุรกิจที่บกพร่อง"
2201-2 = "ย่านการค้าของสถาบันทรีนิตี้"
2201-4 = "ฮ่ะฮ่ะฮ่า จริงเหรอ~?"
2201-5 = "จริงสิ ถ้าอย่างนั้นไปที่ร้านของหวานที่อยู่สุดซอยย่านการค้าแล้ว...."
2201-8 = "อืม... ทุกคนก็ดูเดินลอยชายอย่างไม่รู้ร้อนรู้หนาวอะไรดีนะ"
2201-9 = "ฟังจากที่พูดแล้วเหมือนกับ \"เดอะเลดี้\" เลยไหม?"
2201-10 = "ระ...รู้สึกว่าทุกคน...ดู...ดูเจิดจ้าเปล่งประกายกันจริงๆ ค่ะ"
2201-11 = "มะ... มีของที่เหมือนกันกับฉันอยู่ที่นี่ด้วยหรือเปล่าคะ?"
2201-12 = "ฮ่าฮ่า ถ้าโยนระเบิดไปลงตรงกลางเลยน่าจะสนุกนะ ใช่ไหม?"
2201-13 = "..... (ส่ายหน้าไปมา)"
2201-14 = "ไม่รู้ว่าจะมีลูกค้าจ้างวานให้ไประเบิดถนนใจกลางเมืองของทรีนิตี้ไหมนะ"
2201-15 = "เดี๋ยวก่อนนะ มุสึกิ วันนี้ฉันมาเพราะมีธุระเรื่องอื่นต่างหากล่ะ"
2201-16 = "ทำไมจู่ๆ ถึงมาที่เขตสถาบันทรีนิตี้ล่ะ มีเรื่องอะไรงั้นเหรอ? อารุจัง"
2201-17 = "ฮุฮุฮุฮุ ฟังแล้วอย่าตกใจล่ะ"
2201-18 = "อ่า~ ไม่เป็นไรหรอก ฉันไม่ตกใจกับเรื่องที่อารุจังเล่ามาหรอก\n"
2201-19 = "ของมันแน่อยู่แล้วน่ะสิ"
2201-20 = "ฉะ...ฉันตกใจนะคะ! จะรีบเตรียมตัวให้พร้อมค่ะ....!"
2201-21 = "อ๊ะ...! ประธานสั่งว่าห้ามตกใจนี่... ทำยังไงดีล่ะ!"
2201-22 = "พอแล้ว ไม่ต้องพูดอะไรไร้สาระอีกแล้วล่ะ!"
2201-23 = "ฮึ่ม... เหตุผลที่เรามาที่ทรีนิตี้วันนี้ก็ไม่ใช่เพราะอะไรหรอกนะ..."
2201-25 = "เพราะที่นี่มีงานบรรยายเกี่ยวกับธุรกิจใหม่ยังไงล่ะ"
2201-26 = "งานบรรยายเกี่ยวกับธุรกิจเหรอ?"
2201-27 = "แล้วอีกอย่าง นั่นมัน...เด็กจากโรงเรียนทรีนิตี้นี่?"
2201-28 = "อื้อ ใช่แล้ว ได้ข่าวว่ารู้มาจากคนรู้จักน่ะ"
2201-29 = "พรรคพวกของอารุจังเหรอ?"
2201-30 = ".... (ทำหน้ามุ่ย)"
2201-31 = "ทำไมทุกคนถึงทำหน้าแบบนั้นล่ะ?!"
2201-32 = "นี่เป็นข้อมูลที่ยืนยันแล้วนะ! จากสายข่าวที่ได้รู้จักจากภารกิจที่แล้วน่ะ"
2201-33 = "\"มีโอกาสทางธุรกิจดีๆ แล้วล่ะ เรื่องนี้จะบอกแค่อารุ เก็บเป็นความลับด้วยนะ เข้าใจรึเปล่า?\"#nเขาพูดแบบนี้แล้วก็แนะนำมาให้..."
2201-35 = "มันคือข้อมูลลับสุดยอดที่มีแต่ผู้อยู่ในโลกเบื้องหลังของคิโวทอสเท่านั้นที่รู้ยังไงล่ะ!"
2201-36 = "ความลับทางธุรกิจที่พวกโจรเถื่อนเผยแพร่ให้กันและกัน....!"
2201-37 = "ไม่คิดว่ามันสุดยอดไปเลยกันบ้างเหรอ?!"
2201-38 = "ฮื่อ~ ถ้าฮารุจังพูดแบบนั้นล่ะก็... ก็คงเป็นแบบนั้นแหละ"
2201-39 = "ปะ...ประธานคะ สุดยอดเลยค่ะ!"
2201-40 = "ฮ่าฮ่า! จะชมอีกฉันก็ได้นะ!"
2201-41 = "การที่เราได้มีโอกาสดีๆ แบบนี้ก็เป็นเพราะทักษะทางธุรกิจที่ยอดเยี่ยมของฉันยังไงล่ะ!"
2201-42 = "...ถ้าไม่มีเรื่องน่ารำคาญเกิดขึ้นก็คงดี"
2201-43 = "เอาล่ะ รีบไปร่วมงานบรรยายกันเถอะ!"
2201-46 = "ว้าว... คนเยอะสุดๆ ไปเลย"
2201-47 = "คนพวกนี้คงจะเป็นพวกนักธุรกิจที่มาเข้าร่วมงานบรรยายธุรกิจใหม่สินะ"
2201-48 = "โอกาสที่หาได้ไม่ง่ายๆ ยังไงล่ะ"
2201-49 = "พวกนักธุรกิจที่มารวมตัวกันที่นี่ ทุกคนต่างเป็นผู้เชี่ยวชาญและประสบความสำเร็จในสาขาต่างๆ#nในโลกเบื้องหลังนะ!\n"
2201-50 = "ถ้าทำให้พวกเขาจำเราได้ล่ะก็ แค่นั้นก็สบายแล้วล่ะ"
2201-51 = "ถ้าอย่างนั้น ถ้าเราร่วมลงทุนในธุรกิจล่ะก็ หน่วยรับจ้างสารพัดของเราก็จะยิ่งเติบโตมากขึ้นกว่านี้อีกนะ"
2201-52 = "โอ๊ะ ตรงโพเดียมนั่น... ใครอยู่ตรงนั้นน่ะ"
2201-56 = "ต้องขอขอบคุณเจ้าของธุรกิจทุกท่านที่มาร่วมงานบรรยายเกี่ยวกับธุรกิจของเราในวันนี้ด้วยนะครับ"
2201-57 = "โอกาสทองแบบวันนี้หาไม่ได้ง่ายๆ"
2201-58 = "ผมรับประกันได้เลยว่าทุกท่านคือผู้ที่โชคดีมากๆ ที่ได้รับโอกาสนี้ "
2201-59 = "ทุกๆ ท่านคือผู้ที่เราคัดสรรมาแล้วครับ!"
2201-60 = "หืม...~ คัดสรรเหรอ....?"
2201-61 = "....หืม?"
2201-62 = "โอ้ๆ! ว่าแล้ว!  คิดแล้วว่ามันต้องไม่ธรรมดา!"
2201-64 = "ถ้าอย่างนั้น เราจะขอแนะนำให้ทุกท่านได้ทราบ"
2201-65 = "สินค้ามาแรงที่ทางบริษัทของเรานำมาเสนอให้ทุกท่านในวันนี้! "
2201-66 = "และนั่นก็คือ....!"
2201-67 = "(ตึงงง!)"
2201-68 = "<แบตเตอรี่แคชเมียร์ เอโค่ไพรด์> ครับ!"
2201-70 = "เอโค่..."
2201-71 = "แคชเมียร์....?"
2201-72 = "...แบตเตอร์รี่?\n\n"
2201-73 = ".....?"
2201-75 = "และขอให้ทราบว่าสินค้าของเราไม่ได้มีเพียงแค่แบตเตอรี่เท่านั้นนะครับ!"
2201-76 = "จากการศึกษาเชิงลึกด้วย AI และจัดทำมาจากวัสถุที่มีประสิทธิภาพสูง..."
2201-77 = "ในอนาคต เรามุ่งมั่นที่จะผลิตสินค้าที่ยอดเยี่ยมและมีประสิทธิภาพกว่าแบตเตอรี่ที่เคยมีมา#nอีกทั้งยังจะดำเนินการผลิตด้วยวัสดุที่เป็นมิตรกับสิ่งแวดล้อมด้วยครับ!"
2201-78 = "อารุจัง... คือว่าเรื่อง..."
2201-80 = "...... "
2201-81 = "มะ...ไม่นะ....! ลองฟังต่ออีกหน่อยเถอะน่า! "
2201-83 = "คนรู้จักที่เป็นนักธุรกิจของฉันยืนยันกับฉันเองเลยนะ...!"
2201-84 = "และยิ่งไปกว่านั้น สิ่งที่บริษัทของเรานำเสนอไม่ได้มีเพียงแค่สินค้าชิ้นนี้เท่านั้นนะครับ!"
2201-85 = "บริษัทของเราได้ใช้ระบบการตลาดที่ทันสมัยเพื่อให้บริษัทของลูกค้าทุกท่านได้ปรับผลกำไรสูงสุด..."
2201-86 = "เราได้คำนึงถึงการป้องกันความเสี่ยงที่จะเกิดขึ้น..."
2201-87 = "ระ...ระบบ... ป้องกันความเสี่ยง (จดๆๆ)"
2201-88 = "....."
2201-89 = "ขณะที่เราเฝ้าติดตามและศึกษาเส้นกราฟความผันผวนทางเศรษฐกิจของคิโวทอสอย่างใกล้ชิด#nทางเราก็ได้วางแผนการเตรียมพร้อมรับมือกับทุกเหตุการณ์ที่อาจจะเกิดขึ้น..."
2201-90 = "ตัวชี้วัดเศรษฐกิจคิโวทอส?"
2201-91 = "(ตัวสั่นหงึกๆ)"
2201-92 = "อืม...\n"
2201-93 = "(แปลกใจ)"
2201-95 = "ผมขอจบการอธิบายเพียงเท่านี้ครับ"
2201-96 = "วิธีการลงทุนในธุรกิจของพวกเรานั้น"
2201-97 = "ไม่มีอะไรยุ่งยากเลยครับ ทุกท่านเพียงแค่สมัครสมาชิกเพื่อเข้าร่วมลงทุนในบริษัทของเรา"
2201-98 = "เพียงแค่สมัครสมาชิกเท่านั้น ทุกท่านก็จะได้เป็นส่วนหนึ่งของระบบที่น่าเชื่อมั่นนี้ครับ!"
2201-100 = "และหากทุกท่านซื้อบัตรสมาชิกมูลค่าห้าล้านเยนในงานนี้#nก็จะได้เลื่อนระดับสมาชิกเป็นระดับเซฟีรอธทันทีครับ!"
2201-101 = "ลูกค้าทุกท่านจะสามารถรับ \"นางฟ้า 100 องค์\" ได้ในทันที!"
2201-102 = "อย่าเอาไสยศาสตร์มาผสมกับธุรกิจลูกโซ่สิ!!!"
2201-103 = "ฮ่าฮ่าฮ่า! ไม่มีที่ให้ไปต่อแล้วนะ อารุจัง!"
2201-104 = "ยอมรับว่าตัวเองเป็นพวกต้มตุ๋นได้ยังไงกันล่ะ ฮ่าๆๆๆ"
2201-105 = "ฮ่า... ประธาน... คนรู้จักคนนั้น...."
2201-106 = "...รู้แล้วล่ะน่า! ...ไม่ต้องพูดมาก!!"
2201-107 = "ถ้างั้น... ฉันไปกำจัดคนรู้จักคนนั้นให้หายไปจากโลกเลยดีไหมคะ?"
2201-108 = "(ทำหน้าเศร้า)"
2201-109 = "ได้ยินว่ามีงานบรรยายเกี่ยวกับธุรกิจจัดขึ้นที่ใกล้ๆ กับโรงเรียนทรีนิตี้นะ งานเกี่ยวกับอะไรเหรอ"
2201-110 = "สุดท้ายแล้วก็มุ่งเป้าไปที่เด็กสาวใสซื่อที่ไม่รู้จักโลกสินะ"
2201-111 = "ฮ่าฮ่าฮ่า!! กับดักแบบนั้น... แต่อารุจัง...! พรืดดด!"
2201-112 = "ฉันอุตส่าห์เชื่อใจ... ฉันอุตส่าห์เชื่อใจเพราะบอกว่าเป็นข้อมูลระดับสูงที่บอกให้ฉันรู้แค่คนเดียว! "
2201-113 = "กล้าดียังไง ถึงตอบแทนความไว้ใจของฉันแบบนี้?!"
2201-115 = "คุณครับ! คะ...คุณลูกค้าท่านนั้น! เอะอะโวยวายอะไรกันครับ?"
2201-116 = "พวกเรามุ่งมั่นที่จะกระจายแผนธุรกิจที่ดีให้กับทุกๆ ท่าน..."
2201-117 = "ช่างมันสิ"
2201-118 = "กล้าดียังไง... มาทำให้ฉันต้องเสียเวลาอันมีค่าแบบนี้..."
2201-119 = "อะไรนะครับ คุณลูกค้า?  คุณพูดอะไรกัน นี่เป็นโอกาสทองที่หาไม่ได้อีกแล้วนะครับ!"
2201-120 = "ขอให้ทุกท่านคว้าโอกาสทองนี้ไว้...!"
2201-123 = "(กึ่ก)"
2201-124 = "หือ? ไม่สิ... ไม่ใช่แค่โอกาสธรรมดา แต่เป็นโอกาสที่จะได้เคียงบ่าเคียงไหล่กัน..."
2201-125 = "ฮารุกะ"
2201-128 = "คะ...ค่ะ!"
2201-129 = "จัดการด้วยล่ะ"
2201-131 = "ฮิฮิ ฮี่ๆๆๆๆ!"
2201-132 = "ค่า! ถ้าเป็นคำสั่งของท่านอารุละก็ได้เสมอเลย!"
2201-134 = "อ๊ากกก?! ทะ...ทำอะไรน่ะ?!"
2201-135 = "กล้าดียังไงถึงได้มาแย่งช่วงเวลาที่มีค่าของท่านอารุแบบนี้! ทุกคน... ออกไปให้หมดเลย!"
2201-136 = "...กล้าดียังไงถึงได้คิดหลอกลวงหน่วยรับจ้างสารพัดของเรา... ฮึ่ม ปล่อยไว้ไม่ได้... ไม่ยอมแล้ว!"
2201-137 = "เพราะวิธีที่แสนเจ้าเล่ห์พวกนี้ ทำให้เงินกองกลางของหน่วยรับจ้างสารพัดร่อยหรอจนใกล้จะหมดแล้ว!"
2201-138 = "เพราะได้อารุจังช่วยเลยเกือบทำสำเร็จแล้วเชียว~?"
2201-139 = "อ๊าาา! พอแล้ว! มุสึกิ! คาโยโกะ!"
2201-141 = "อื้อ~ ฉันเองก็สนุกมากเหมือนกัน เอาล่ะ! เริ่มกันเลยมั้ย!"
2201-142 = "เฮอะ ช่วยไม่ได้นะ"
2201-144 = "ทุกคน! จัดการพวกมันให้หมด!"
2201-153 = "ชมรมทวงความยุติธรรมค่ะ!"
2201-154 = "ฉันมาที่นี่เพราะได้ยินว่ามีการจัดงานบรรยายเกี่ยวกับธุรกิจผิดกฎหมายขึ้นค่ะ!"
2201-155 = "มาแล้วค่ะ!"
2201-156 = "หือ...? วุ่นวายไปหมดแล้วเลยนี่?"
2201-157 = "เอ๊ะ รุ่นพี่ฮาสุมิ ไม่มีใครเลยนี่คะ?"
2201-161 = "อึ่ก ไม่คิดว่าชมรมทวงความยุติธรรมของทรีนิตี้จะโผล่มาในนาทีสุดท้ายแบบนี้!"
2201-162 = "ถ้าเข้าไปพัวพันกับพวกนั้น คงทำให้คณะกรรมการวินัยวุ่นวายแน่ๆ"
2201-163 = "ถ้าทำให้ประธานกรรมการเสียหน้าได้ก็คงจะสนุกไม่น้อยเลยน้า~"
2201-164 = "สะ...สั่งมาได้เลยค่ะ! แล้วฉันจะทำตามทุกอย่างเลย....!"
2201-167 = "อ๊าาาาาา! อย่าพูดอะไรให้มันยุ่งยากสิ!"
2201-168 = "อ่า...."
2201-169 = "วะ...วันนี้ฉันจะยอมถอยก่อน แต่คราวหน้าเจอดีกันแน่!"
2201-170 = "สินค้าที่คนรู้จักแนะนำมาให้ลอยๆ แบบนี้ คราวหน้าฉันไม่เชื่ออีกแล้ว!"
2201-171 = "คอยดูแล้วกัน ฉันจะทำให้ธุรกิจประสบความสำเร็จด้วยมือของฉันเอง!!"
2201-172 = "ฮ่ะฮ่ะฮ่า~ สมกับเป็นอารุจังจริงๆ เลยน้า!"
2201-173 = "ฮ่า... คิดแล้วเชียวว่าจะเป็นแบบนี้"
2201-174 = "ช่างเถอะ! ทุกคน! ถอยก่อน!"
2201-178 = "ค่า~ ค่ะ!"
2201-180 = "(เพื่อหลีกเลี่ยงการปะทะกับชมรมทวงความยุติธรรม#nหน่วยรับจ้างสารพัดจึงออกมาที่ถนนของสถาบันทรีนิตี้ในเวลากลางคืน)"
2201-181 = "แผนธุรกิจที่บกพร่อง"
