10052010-34 = "2;리오 결전;02;지금으로서는 알 방법이 없지만…… 비나 자체가 다른 예언자들과는 약간 궤를 달리하는 부분이 있어.\n#2;a\n#2;sig\n#3;m4"
10052010-35 = "3;모모이 결전;02;응? 그건 무슨 소리야, 회장?\n#3;em;[?]\n#2;hide"
10052010-36 = "2;리오 결전;01\n4;히마리 결전 비무장;02;비나의 목격 기록은 데카그라마톤이 본격적으로 활동한 시기보다 훨씬 이전이에요. \n#4;sig\n#2;sig\n#3;hide"
10052010-37 = "2;리오 결전;99;이전, 아비도스 학생회가 상세한 연구 자료를 만들었다고 하지만, 지금은 유실되었고…….\n#2;sig\n#2;em;[...]"
10052010-38 = "2;리오 결전;09;애초에 이런 수수께끼의 AI 기계 구조체가, 무슨 이유로 아비도스 자치구의 사막에서 활동하고 있었는지부터가 의문이라고 해야 하겠지만.\n#2;sig"
10052010-39 = "3;미도리 결전;02;두 분의 말만으로는…… 비나만 뭔가 따로 놀고 있는 것 같다는 이야기처럼 들리네요?\n#2;hide\n#4;hide"
