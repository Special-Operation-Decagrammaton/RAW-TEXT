[translation]
10052010-1 = "薇娜：深感不同的靜觀理解者"
10052010-2 = "桃井，登場！"
10052010-3 = "空降還真厲害呢……"
10052010-4 = "嗚嗚嗚，好暈……#n咦……？"
10052010-6 = "[ns] 「這是……什麼？」"
10052010-9 = "就像你見到的一樣……"
10052010-10 = "像你見到的一樣……"
10052010-11 = "……這該怎麼形容好呢。"
10052010-12 = "嗯？不就是個很大的洞穴嗎？#n放到遊戲裡就會叫大空洞之類的！"
10052010-13 = "這命名也太一維了吧，桃井……？"
10052010-14 = "命，命名本來就是容易理解才好啊，Kei醬！"
10052010-19 = "怎麼……好像聽見了很大的聲音……？"
10052010-20 = "是人工的動作聲……類似某種東西正在運轉的聲音。"
10052010-21 = "[s] 「所以直覺上來說，薇娜就在下面囉？」"
10052010-22 = "……直覺上是這樣沒錯。"
10052010-27 = "各位都平安抵達了嗎？#n從下方偵測到了薇娜的信號，但是……"
10052010-28 = "有什麼問題嗎，陽葵前輩？"
10052010-29 = "那個信號，看起來比其他預言者弱了一些。#n雖然可以推測出幾種原因……"
10052010-30 = "我知道了！它是在睡覺吧！"
10052010-31 = "……那種可能性當然也是有的。"
10052010-32 = "或者也可能是目前捕捉到的那個大空洞……坑洞實在太大的關係，信號因此變弱了。"
10052010-33 = "[s] 「為什麼只有這個區域變成這樣呢？」"
10052010-34 = "目前還不得而知……況且薇娜本身也和其他預言者存在一些不同之處。"
10052010-35 = "嗯？怎麼說呢，會長？"
10052010-36 = "薇娜的目擊記錄，遠比十字神名正式開始活動的時期要早得多。"
10052010-37 = "據說阿拜多斯學生會曾經製作過詳細的研究資料，不過現在似乎已經遺失了……"
10052010-38 = "說到底，這個神祕的AI機械構造體，究竟為何會在阿拜多斯自治區的沙漠活動……#n這件事本身就是個謎團。"
10052010-39 = "從兩位的說法聽起來……感覺只有薇娜特別不一樣呢？"
10052010-40 = "沒錯。雖然這麼說並沒有什麼根據……#n不過或許就是因為這樣，它才會被單獨配置在這個異常又特別的地方吧。"
10052010-41 = "無論如何，得先把那個叫薇娜的傢伙叫出來才行。"
10052010-42 = "叫出來……這個說法挺不錯的呢。#n我正好也在思考類似的事情。"
10052010-43 = "柚子？能請你照著我指定的角度和彈速，向空中發射榴彈嗎？"
10052010-44 = "咦，咦咦咦！？我的榴彈……是嗎？#n為什麼呢……？"
10052010-45 = "我想測量一下那個坑洞大致的大小和深度。"
10052010-46 = "柚子那把槍的性能，我們之前已經分析過了。"
10052010-47 = "考慮到榴彈的彈速比子彈慢得多，#n只要以指定角度進行低速射擊，就能讓彈藥以自由落體的狀態墜落。"
10052010-48 = "而且還能利用爆炸的回聲，大致測算出大空洞的規模。"
10052010-49 = "我已經派出無人機了，應該很快就會抵達。"
10052010-56 = "那，那麼……我要開槍了！"
10052010-63 = "[ns] 「怎麼樣？有什麼發現嗎？」"
10052010-64 = "……比想像中還要厲害。#n要說大致大小的話，首先大空洞底部的寬度是──"
10052010-65 = "好好好，這種時候就簡單直觀地說「遠遠超出了我們所能想像的範圍」吧！"
10052010-71 = "──！？！？#n大家小心！剛才捕捉到了巨大的質量反應！"
10052010-78 = "老，老師！會長！陽葵前輩！"
10052010-79 = "有股巨大的聲音……正從坑洞底下傳過來……！"
10052010-80 = "薇，薇娜好像要爬上來了！"
10052010-81 = "果然……把它吵醒了嗎……嗚嗚嗚……"
10052010-82 = "[s] 「嗯，我猜也是吧。」"
10052010-83 = "某種意義上來說，事情正按預測的方向進行著。"
10052010-84 = "[ns] 「這個區域……接下來是我們的了！」"
10052010-85 = "怎麼講得好像已經贏了一樣啊……"
