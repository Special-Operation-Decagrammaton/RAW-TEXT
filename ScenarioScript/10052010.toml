[translation]
10052010-1 = "บีนาห์ ผู้ตระหนักรู้แก่นแท้แห่งความแตกต่าง"
10052010-2 = "โมโมอิ มาถึงแล้ว!"
10052010-3 = "การร่อนลงมาแบบเมื่อกี้มันไม่ใช่เล่นๆ เลยนะ..."
10052010-4 = "อึก... เวียนหัวจังเลยค่ะ... ว่าแต่...?"
10052010-6 = "[ns] \"นี่มัน... อะไรกันเนี่ย?\""
10052010-9 = "จะเป็นอะไรได้ล่ะคะ ก็อย่างที่เห็นนั่นละ"
10052010-10 = "ก็อย่างที่เห็น..."
10052010-11 = "ฉันควรจะอธิบายยังไงดีนะ..."
10052010-12 = "หืม? นี่มันก็แค่หลุมขนาดใหญ่ไม่ใช่เหรอ? ถ้าอยู่ในเกม ที่แบบนี้จะเรียกว่าหลุมยักษ์น่ะ!"
10052010-13 = "ชื่อมันเรียบง่ายเกินไปหรือเปล่าคะ โมโมอิ...?"
10052010-14 = "ไม่รู้อะไรซะแล้ว การตั้งชื่อน่ะต้องทำให้เข้าใจง่ายๆ แบบนี้ละ เคย์จัง!"
10052010-19 = "เหมือนจะ... ได้ยินเสียงดังสนั่นมาจากที่ไหนเลยนะคะ...?"
10052010-20 = "ฟังดูเหมือน... เสียงการทำงานของเครื่องจักรเลยค่ะ"
10052010-21 = "[s] \"งั้นก็หมายความว่าบีนาห์อยู่ข้างใต้นี้สินะ\""
10052010-22 = "โดยสัญชาตญาณแล้ว มันก็น่าจะเป็นอย่างนั้นละค่ะ..."
10052010-27 = "ทุกคนไปถึงโดยสวัสดิภาพหรือยังคะ? ตอนนี้ฉันจับสัญญาณของบีนาห์ได้จากข้างใต้นั้นค่ะ แต่ว่า... "
10052010-28 = "มีปัญหาอะไรงั้นเหรอคะ รุ่นพี่ฮิมาริ?"
10052010-29 = "สัญญาณนั้นดูจะอ่อนกว่าของผู้เลื่อมใสตนอื่นนิดหน่อยค่ะ ส่วนสาเหตุก็เป็นได้หลายอย่าง..."
10052010-30 = "ฉันรู้ๆ! กำลังนอนหลับอยู่สินะ!"
10052010-31 = "ก็เป็นไปได้ที่จะเป็นแบบนั้นค่ะ... "
10052010-32 = "หรือไม่ก็เพราะหลุมยักษ์... ฉันหมายถึงหลุมที่ค้นพบมันมีขนาดใหญ่มาก สัญญาณก็เลยอ่อนลงค่ะ"
10052010-33 = "[s] \"แล้วทำไมถึงเป็นแบบนี้แค่ในพื้นที่นี้ล่ะ?\""
10052010-34 = "ตอนนี้เรายังไม่มีทางรู้อย่างแน่ชัด... แต่บีนาห์ก็มีบางมุมที่แตกต่างจากผู้เลื่อมใสตนอื่นน่ะค่ะ"
10052010-35 = "หืม? หมายความว่ายังไงเหรอ ประธาน?"
10052010-36 = "บันทึกการพบเจอบีนาห์มีมาตั้งแต่ก่อนที่เดคาแกรมมาทอนจะเริ่มเคลื่อนไหวอย่างจริงจังค่ะ "
10052010-37 = "ฉันได้ยินว่าสภานักเรียนอะบิดอสก็เคยทำเอกสารวิจัยอย่างละเอียดเอาไว้ แต่ตอนนี้สูญหายไปแล้ว..."
10052010-38 = "ต้องบอกว่ามันเป็นปริศนาที่น่าสงสัยตั้งแต่แรกเลยละ ว่าทำไมเครื่องกล AI ลึกลับนี้มาเคลื่อนไหวอยู่#nในทะเลทรายของเขตปกครองตนเองอะบิดอส"
10052010-39 = "จากที่ทั้งสองคนพูดมา... ดูเหมือนบีนาห์จะทำตัวไม่เข้าพวกอยู่ตัวเดียวเลยนะคะ?"
10052010-40 = "ใช่ค่ะ ถึงนี่จะเป็นแค่ความเห็นส่วนตัวที่พูดลอยๆ เท่านั้น แต่ฉันว่านั่นอาจเป็นเหตุผลที่บีนาห์ถูกแยก#nไว้ต่างหากในสถานที่ที่แปลกประหลาดและพิเศษแบบนั้นค่ะ"
10052010-41 = "ต่อให้จะคาดเดาไปทางไหน ก่อนอื่นเราก็ต้องเรียกบีนาห์หรืออะไรนั่นออกมาก่อนค่ะ"
10052010-42 = "เรียกงั้นเหรอ... เป็นคำที่ดีเลยนะคะ ฉันกำลังคิดอะไรคล้ายๆ กันอยู่พอดีเลยค่ะ"
10052010-43 = "ยูสึ จากนี้ฉันจะกำหนดองศาและความเร็วกระสุนให้ ช่วยยิงระเบิดขึ้นฟ้าให้ตรงตามนั้นได้มั้ยคะ?"
10052010-44 = "คะ... คะคะคะ?! ให้ยิงกระสุนระเบิดของฉันเหรอคะ...? ทำไมล่ะคะ...?"
10052010-45 = "ฉันว่าเราควรประเมินขนาดและความลึกของหลุมนั้นน่ะค่ะ "
10052010-46 = "แล้วพวกเราก็วิเคราะห์คุณสมบัติปืนของยูสึเอาไว้แล้วด้วย "
10052010-47 = "เมื่อเทียบกับกระสุนปืนแล้ว กระสุนระเบิดจะยิงออกไปได้ช้ากว่ามาก ถ้ายิงด้วยความเร็วต่ำในองศา#nที่กำหนด กระสุนระเบิดจะตกได้อย่างอิสระน่ะ"
10052010-48 = "ในเมื่อมันระเบิดได้ เราก็จะใช้การสะท้อนกลับของเสียงในการวัดขนาดคร่าวๆ ของหลุมยักษ์นั่นได้ค่ะ"
10052010-49 = "ฉันส่งโดรนออกไปแล้ว อีกเดี๋ยวก็คงไปถึงค่ะ"
10052010-56 = "ถะ... ถ้างั้น... ฉันจะยิงเลยนะคะ!"
10052010-63 = "[ns] \"เป็นยังไงบ้าง? พอจะประเมินได้มั้ย?\""
10052010-64 = "ยิ่งใหญ่กว่าที่คิดไว้มากเลยละ... ถ้าจะให้ลองบอกคร่าวๆ ก็คงต้องบอกว่าความกว้างของส่วนล่างของ#nหลุมนั่น..."
10052010-65 = "เอาละๆ พูดให้เข้าใจง่ายๆ ก็คือ มันอยู่เหนือขอบเขตที่เราจินตนาการได้อีกค่ะ!"
10052010-71 = "ทุกคนระวังด้วย! ฉันเพิ่งตรวจพบปฏิกิริยาของมวลขนาดมหาศาล!"
10052010-78 = "คะ... คุณครู! ประธาน! รุ่นพี่ฮิมาริ!"
10052010-79 = "เสียงดังสนั่น... กำลังก้องขึ้นมาจากใต้หลุมนี้ค่ะ...!"
10052010-80 = "บะ... บีนาห์กำลังมาแน่เลยค่ะ!"
10052010-81 = "ระเบิดเมื่อกี้... ไปปลุกบีนาห์เข้าสินะคะ... อึกกก..."
10052010-82 = "[s] \"อื้อ น่าจะเป็นอย่างนั้นนะ\""
10052010-83 = "เอาเถอะ ในแง่หนึ่งก็หมายความว่ากำลังเป็นไปตามแผนการที่คาดไว้นี่คะ"
10052010-84 = "[ns] \"ต่อไปนี้... พื้นที่นี้จะเป็นของพวกเรา!\""
10052010-85 = "พูดเหมือนเอาชนะได้แล้วเลยนะคะ..."
