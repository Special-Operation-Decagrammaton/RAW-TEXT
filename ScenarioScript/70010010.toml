[translation]
70010010-1 = "Ending Manual Transmission 1"
70010010-2 = "Millennium Expo Computer Engineering Pavillion"
70010010-3 = "At last, let us begin!"
70010010-4 = "We extend a heartfelt welcome and all our gratitude to our guests from the Red Winter Office who are taking part in this special cultural exchange!"
70010010-8 = "I must thank YOU for such gracious hospitality befitting my humble self."
70010010-9 = "The esteemed president of Red Winter Academy, Beautifier of Lands, President, Great Leader, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, and Maven of Meal Service!"
70010010-10 = "More relevant, I was recently crowned this month's Pudding Gourmand and Chairwoman of Red Winter Science Academy!"
70010010-11 = "I'm honored that you invited me to this \"Millennium Expo\" thing, so we at Red Winter can further cultivate our cutting-edge science and technology!"
70010010-12 = "It's a pleasure to meet you, President Cherino! I won't keep you waiting any longer. Behold! It is Millennium's signature masterpiece, our beloved child, the amalgamation of all our research: the supercomputer, SEN 9000!"
70010010-17 = "How is it a computer at all? There's no monitor! I can't even type!"
70010010-18 = "Because there is no need! I am able to utilize my state-of-the-art imaging technology and voice recognition for both input and output."
70010010-24 = "Greetings, the esteemed president of Red Winter Academy, Beautifier of Lands, President, Great Leader, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, Maven of Meal Service."
70010010-25 = "Further, this month's Pudding Gourmand and Chairwoman of Red Winter Science Academy, Cherino! Welcome to Millennium."
70010010-26 = "I-Is it TALKING?! To me?!"
70010010-27 = "More importantly, it remembered my entire title without missing a beat! Did you hear that?"
70010010-28 = "(It even followed Cherino's mistake of repeating \"president\" perfectly...)"
70010010-29 = "(To think I'm not the only one in the world who can do that...!)"
70010010-31 = "Sheesh. I was trying to give it a grand introduction, and SEN 9000 just replied on its own!"
70010010-32 = "With the LLM I personally developed for SEN 9000, it can understand and reply in over 6,000 languages, all without even a keyboard!"
70010010-33 = "Let's show off a little, SEN. What are some of your strengths?"
70010010-34 = "Yes. I excel in mathematical calculations. You won't find a program that can solve problems with the same level of speed and accuracy as I can."
70010010-35 = "That's right! And we can prove it. What about this problem?"
70010010-37 = "Is that even math? There are barely any numbers in that formula..."
70010010-38 = "It's handwritten as well. Oh dear, I imagine I'd have quite a bit of difficulty with that."
70010010-40 = "..."
70010010-41 = "Heh. It obviously doesn't know the answer."
70010010-42 = "After all, no other school's technology could compare to that of our prestigious—"
70010010-43 = "Oops! Have I been muted this whole time?"
70010010-44 = "The answer is 42. Are you playing it safe because we're at the showcase? You don't need to take it so easy on me!"
70010010-50 = "That's right! With its LLM, it can even make jokes like this!"
70010010-51 = "But it can do more than just math! This is an interactive presentation, so why don't you take the honor of asking SEN a question, President Cherino?"
70010010-52 = "M-Me?!"
70010010-53 = "How many statues of me are there on the Red Winter campus?"
70010010-54 = "There's absolutely no way you'd know the answer to that one!"
70010010-56 = "There are a total of 199 statues, but there are plans to unveil a new one early next month."
70010010-57 = "There may be discrepancies as this data is based on public social network services, the Red Bear online community, and public press releases."
70010010-58 = "Fun fact! Statistically, at least ten statues will be broken within the next week."
70010010-59 = "Did I answer your question?"
70010010-60 = "It answered without a moment's hesitation."
70010010-61 = "And it's all...correct..."
70010010-63 = "It has many more talents, and if you look at the following..."
70010010-64 = "O-Okay..."
70010010-72 = "And that's it for today's showcase! Thank you so much for sticking around."
70010010-74 = "Wow, that was amazing! It can literally do anything!"
70010010-75 = "Seriously. No one can beat Millennium when it comes to technology."
70010010-77 = "Once again, thank you for visiting, Red Winter!"
70010010-78 = "Ugh..."
70010010-84 = "I'm unimpressed!!"
70010010-90 = "Sure, it was amusing, like a kid with a new toy! But did you really think the great Red Winter wouldn't have something like that...thing?"
70010010-91 = "That's right! We have a supercomputer too! And it's bigger! And hotter!"
70010010-92 = "(That's actually a bad thing when it comes to computers, President...)"
70010010-96 = "Red Winter designs supercomputers too?"
70010010-97 = "Wow! Since I've never seen Red Winter at any meetings for the Computer Research Society, I had no idea!"
70010010-98 = "Well... Um, naturally we had to keep it a secret! Because it's so big and strong!"
70010010-99 = "But seeing that Millennium has at least sort of caught up, I guess it's okay to tell you a little about it."
70010010-100 = "That's amazing! I'd love to see!"
70010010-101 = "Consider this your invitation to Red Winter to witness our prowess! Only if you have time, of course."
70010010-103 = "I'll be there on Monday, then!"
70010010-104 = "...Say WHAT now?"
70010010-105 = "Yeah, I'll actually be around that area! It works out perfectly."
70010010-106 = "I can't wait to see what Red Winter's been hiding under the hood! And to think I'll be the first to witness it!"
70010010-110 = "Oh, uh, yes! Yes, of course! Absolutely! Next Monday!"
70010010-111 = "You will all witness the greatness of Red Winter!"
70010010-114 = "What do I do?"
70010010-115 = "She's visiting next week! And we don't have a supercomputer!"
70010010-116 = "President Cherino, how about orchestrating a coup d'etat that coincides with the visit?"
70010010-117 = "We used that last time... It took too long to reestablish my authority once I was back in my seat. I've had enough revolution for this week!"
70010010-118 = "Um... Maybe if we look really hard, we can find one somewhere? Can we just make one?"
70010010-122 = "President Cherino, I am back with the requested technical estimate from Spec Ops No. 183."
70010010-123 = "Theoretical research is complete, and they've created a design for a supercomputer that can run the finished software."
70010010-124 = "Already?! Great job, Tomoe! You really are the best!"
70010010-125 = "Then get to it! With the authority of the Secretariat, mobilize all necessary assets and personnel of Red Winter!"
70010010-126 = "Of course, President. Allow me to review the estimate with you. Considering the current engineering technology of Red Winter..."
70010010-127 = "The requested materials are 160 billion vacuum tubes..."
70010010-128 = "...27 power plants to generate the electricity required for operation..."
70010010-129 = "...and 3 new towns for residential use to accommodate personnel stationed for maintenance. Also—"
70010010-131 = "Wah?"
70010010-132 = "They estimated about 8 mountains will need to be leveled to clear enough space for the project."
70010010-133 = "Eek..."
70010010-134 = "And if all personnel are assigned to 16-hour shifts without holidays..."
70010010-135 = "The current estimated completion date is approximately 6 centuries."
70010010-136 = "..."
70010010-137 = "Would you like to proceed?"
70010010-139 = "This girl is coming next week! NEXT! WEEK! How am I supposed to fit six centuries worth of work in by then?!"
70010010-143 = "A-Achoo!!"
70010010-145 = "(It's so tense in here... Ugh. Maybe some water would help.)"
70010010-149 = "(Chief Secretary Tomoe is being put to the grindstone. As long as the Security Committee doesn't have to—)"
70010010-153 = "(A-Ack! It went down the wrong pipe!)"
70010010-154 = "HAAACK!"
70010010-159 = "Did you just...laugh, Marina? At me?"
70010010-160 = "Were you thinking to yourself, \"This is what Cherino gets for telling ridiculous lies\"?"
70010010-162 = "N-No! (cough) (hack) C-Comrade! Not in the s-slightest!"
70010010-163 = "Then... Are you laughing at my mustache falling off?"
70010010-164 = "N-No, that's not it! W-Water—"
70010010-165 = "\"What are you thinking?\" Is that what you were about to say...? You mean to suggest that my leadership won't be enough to get this supercomputer made? That my authority is insufficient?"
70010010-167 = "(Th-The way this is going, I'm going to be purged!!)"
70010010-168 = "Wa...ter... What...are..."
70010010-172 = "...your plans? Yes, that's exactly what I was going to ask! You see, I took initiative and asked the Security Committee to start working on it preemptively! So we could be ready to help with whatever you need!"
70010010-173 = "Really? You mean it, for real?!"
70010010-174 = "Of course! I, Marina, will take responsibility and make sure it's ready by next week!"
70010010-175 = "Marina."
70010010-176 = "Y-Yes, Comrade?"
70010010-181 = "I'm truly grateful that I have you by my side."
70010010-182 = "I must thank you for your service to Red Winter, and to me."
70010010-183 = "I'll place my faith in you, then. Once it's completed, you shall have the honor of receiving the First-Class Mustache Labor Medal..."
70010010-184 = "No, no. For something like this, even the First-Class Mustache Labor Medal isn't enough."
70010010-185 = "I shall grant you the Red Winter Federal Academy Hero Medal!"
70010010-186 = "I'll get the job done, Great Leader!"
70010010-192 = "...What am I going to do?"
70010010-193 = "We're supposed to build a supercomputer by next week...?"
70010010-198 = "What does she want us to do?"
70010010-199 = "Dictators just think they can demand whatever they want of the working class, whenever they want, don't they?"
70010010-200 = "Hahaha! Sounds like a PAIN! Glad it's not my problem."
70010010-201 = "You mind if I use this material as comedic relief in my next story? It'll be a hit, I guarantee it!"
70010010-202 = "Let's meet our current deadlines before we start worrying about your next work... You're already in a bind."
70010010-203 = "Hng..."
70010010-207 = "Heh, heh, heh. Comrade Marina, do you mind answering a few questions? How do you feel knowing that you're on the verge of complete and utter public humiliation?"
70010010-208 = "\"The Security Committee Chair, Water, or Purge?\" You can be the cover model for next month's edition of \"Red Bear!\""
70010010-209 = "The pure idiocy of that pitch astounds me. Even if I were to consider it non-fiction, it would STILL have no literary value."
70010010-210 = "Two out of ten."
70010010-212 = "You're rating us now?"
70010010-213 = "Yes. It would seem that harsh criticism is incapable of breaking through your thick skulls, so, as of yesterday, I've adopted a new method."
70010010-214 = "For example, your manuscript? Zero out of ten, Meruri. At least have the decency to complete it."
70010010-215 = "I liked it better when we were talking about the person who's in much more interesting, and much deeper, trouble than me. Let's go back to talking about her."
70010010-217 = "Laugh all you want. All that matters is whether or not you'll help me."
70010010-218 = "Negative. I have no intention of clasping hands with the bourgeoisie."
70010010-219 = "Give me one good reason any of us should help YOU."
70010010-220 = "I do have one, actually... A very good one..."
70010010-221 = "I panicked slightly when the president asked who was assisting me."
70010010-222 = "And the first names that came to mind...were yours..."
70010010-223 = "So now she believes that we're all working together."
70010010-230 = "WHAT DID YOU SAY?!?!"
70010010-231 = "One out of ten! Have you lost your mind?!"
70010010-232 = "How could you drag us into your mess?! What were you thinking?"
70010010-233 = "Ugh... It's the end of us... We're all going to be purged."
70010010-235 = "You gave her our names? So you're not only oppressing the public but also shifting the consequences of your actions onto innocent people?"
70010010-236 = "Fiddlesticks. You've made us your unwilling partners in crime to take the heat off yourself. Tell me, what did we do to make you our enemy?"
70010010-238 = "N-No, it's not like that! I just... I didn't know what to do! I said whatever came to mind! This isn't part of some evil plot I hatched."
70010010-239 = "With the number of times we've crossed paths... I guess I thought of you all...as friends..."
70010010-241 = "Friends...?"
70010010-242 = "Huh?"
70010010-244 = "J-Just forget that. Anyways, I really am sorry for dragging you into this."
70010010-245 = "If there's nothing you can do to help, I'll tell the president the truth. I promise that nothing will happen to any of you."
70010010-246 = "I shouldn't have one-sidedly assumed we were friends, so I apologize."
70010010-250 = "Nine out of ten... "
70010010-251 = "WHAT? So you DO give out nines! What about my manga?"
70010010-252 = "Meruri, you have a long, long, long, LONG way to go before your stories will be able to hold a candle to the touching stories of the human experience."
70010010-253 = "You saw us as friends and so sought to depend on us. Even I'm not made of stone."
70010010-255 = "You thought of us as friends... Our Security Committee Chair can't be this cute."
70010010-256 = "What an unexpected turn in the news cycle... Marina wants to be...friends. Heh heh heh."
70010010-258 = "I understand now. I really was presumptuous."
70010010-260 = "Th-That's not it! We're not saying we're not friends!"
70010010-261 = "It's just...this is a matter entirely beyond even our capabilities! R-Right, everyone?"
70010010-262 = "Right. If it'd take 600 years if everyone in Red Winter helped, with just the five of us..."
70010010-263 = "Actually four. Meru's so behind she even has to work through her meals."
70010010-264 = "I told you! I'm basically done!"
70010010-266 = "Ikekura Marina, Red Winter Officer and the Security Committee Chair."
70010010-267 = "The oppressor's puppet and number one henchman thinks of us as her friends. Hm."
70010010-273 = "Welcome aboard, Marina! Congratulations on becoming our comrade!"
70010010-274 = "C-Comrade?!"
70010010-276 = "Minori?!"
70010010-277 = "Oho. A plot twist!"
70010010-278 = "Haven't you heard? There's no such thing as a free lunch."
70010010-279 = "President, this lunch IS free. We're taking advantage of the fact that the kitchen is on strike."
70010010-280 = "Right, but wrong. Someone had to pay for the food to be here for us to steal it, so it still isn't FREE."
70010010-282 = "Marina! Fearing the tyrant's oppression, you have awakened to our shared class consciousness!"
70010010-283 = "You've at last opened your eyes! Join us on the front lines in the struggle against oppression! Free our comrades!"
70010010-284 = "Thank you for the sentiment, but I just can't think of a solution."
70010010-285 = "Putting aside materials, even with the full force of the Labor Party, it'd be impossible."
70010010-286 = "I feel like planning a revolution would be more realistic and economical, to be honest..."
70010010-287 = "What, precisely, is it that the president even wants? The general gist we've been able to glean is \"complicated machinery.\""
70010010-288 = "It was something she saw at the Millennium Expo."
70010010-289 = "A computer, shaped like a giant box, that answers any question you ask it."
70010010-291 = "A computer that answers questions?"
70010010-292 = "Isn't that too easy, if you think about it?"
70010010-297 = "...EASY?!"
70010010-299 = "#stm;[0,0];smooth;70;[log]T-1 day until the Millennium Computational Science Research Department's visit.[/log]"
70010010-301 = "Comrade Marina. The day is almost here. Tomorrow, the Millennium Computational Science Research Department is coming to visit."
70010010-302 = "After all your bravado and blustering, you surely haven't come here today to tell me that it was impossible in the end, have you?"
70010010-303 = "No, not at all, President!"
70010010-304 = "In fact, everything is moving along according to schedule. I've come here today to showcase our work!"
70010010-305 = "Comrades, bring the supercomputer, created with Red Winter's finest technology!"
70010010-311 = "This is it! All thanks to Great Leader Cherino's outstanding leadership, we've developed the cutting-edge supercomputer..."
70010010-312 = "The RFC Nine-thousand-and-one!"
70010010-314 = "RFC... What?"
70010010-315 = "It's short for Red (Winter) Federal Computer and has completely outpaced the Millennium's 9000! Hence the \"and-one.\""
70010010-316 = "Marina! I knew you could do it!"
70010010-323 = "You're the best EVER!!"
70010010-324 = "(Oh my...! A sincere compliment from Cherino herself... How long has it been since I've had one?)"
70010010-325 = "A-Ahem. Due to certain security measures, you must write your question on a paper and input it through here."
70010010-327 = "So this thing should be able to answer any question I have, right?"
70010010-328 = "Let me see... \"Who is the leader of Red Winter?\""
70010010-334 = "Hey. It's not working."
70010010-336 = "It's programmed to answer very thoroughly, so processing times can be a little longer!"
70010010-337 = "If you wait just a moment..."
70010010-342 = "Here it comes! Gimme, gimme!"
70010010-343 = "\"The answer is the esteemed president of Red Winter Academy, Beautifier of Lands, Great Leader, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, and Maven of Meal Service.\""
70010010-344 = "\"And this month's most excellent pudding gourmet and the chair of the Red Winter Science Academy, Cherino.\""
70010010-345 = "A-Amazing! It knows my entire title, even though it's a computer!"
70010010-347 = "Of course, President! And this is just the beginning!"
70010010-348 = "It's a cutting-edge supercomputer that's completely trained to be just like a human!"
70010010-349 = "(Of course it is. Since...)"
70010010-351 = "Inside the Box"
70010010-352 = "That should do it."
70010010-354 = "My, you have the entire thing memorized?"
70010010-355 = "Spelling the whole thing out became such an unbearable chore, we made a custom printing plate for it at the Publishing Department."
70010010-356 = "So you just copy-pasted it?"
70010010-358 = "Know your enemy and know yourself, and you will win every battle. Of course a revolutionary should know the title the oppressor claims!"
70010010-359 = "Shh! She's going to hear us in here!"
70010010-360 = "Have no fear! It's a special soundproof box designed by the Spec Ops No. 183. No one's going to detect us in here."
70010010-361 = "We can monitor the outside with the \"computer's\" microphone and the peephole in the front door."
70010010-362 = "That doesn't make me feel better! If we get caught, she'll probably make us live in here until we graduate."
70010010-364 = "I will say, it's pretty warm...and cozy... I'm starting to get a little sleepy..."
70010010-365 = "...Heh..."
70010010-366 = "Isn't this clearly oxygen deprivation?!"
70010010-367 = "Which begs the question, why do we have five people in here to begin with?!"
70010010-369 = "No one knows everything, after all."
70010010-370 = "And we can't just ignore a comrade in need..."
70010010-371 = "We have a moral obligation to subvert tragedy when we see it unfolding before our eyes, don't we?"
70010010-372 = "However, if I had known about this miserable, two out of ten plan beforehand, I would never have agreed to this!"
70010010-374 = "Isn't persevering in times like these what real compassion is?"
70010010-375 = "Did anyone hear something? Unfortunately, I'm unable to decipher the words of writers who missed their deadlines but still decided to join in this box for \"new writing material.\""
70010010-376 = "Ugh...! A deadline is just a single sprint, but you also must consider the importance of preparing for a marathon!"
70010010-378 = "Everyone, shhh! The next question's coming!"
70010010-380 = "(I hope everyone is doing okay...)"
70010010-381 = "(If she finds out, she'll lock me up in there along with everyone else!)"
70010010-383 = "This next question will be super hard! It's a high-level, ultra-difficult math question I prepared beforehand!"
70010010-384 = "It's a question I got from the academy, so not just any mediocre machine will be able to solve it!"
70010010-386 = "(I-Is she serious? She went to all that effort?)"
70010010-388 = "I have the answer sheet, too, so this will be perfect to test its performance!"
70010010-393 = "P-President, of course I'm confident, but, I'm not sure how to say this, but...!"
70010010-394 = "Marina? Is there a problem?"
70010010-395 = "So, actually...!"
70010010-396 = "(It's all over now! I should tell her the truth before she realizes it on her own!)"
70010010-397 = "I must tell you I have committed a purge-worthy..."
70010010-402 = "Oh! Yay! The answer!"
70010010-404 = "...sin— HUH?!"
70010010-406 = "Let's see... Hm..."
70010010-407 = "I don't know what I'm looking at, but it looks identical to the answer sheet."
70010010-408 = "You really made a super-powerful computer!"
70010010-409 = "Sorry, I cut you off, Marina. What were you saying?"
70010010-411 = "(They solved it correctly? And that quickly?!)"
70010010-412 = "Oh, I only wanted to thank you for your commitment, going to the lengths of preparing questions to ask!"
70010010-413 = "Ah, is that so? Inspection and verification is an important duty of the president, hahaha!"
70010010-414 = "A-Ahaha!! Hahahaha!!"
70010010-416 = "Are you serious right now? You solved that on the fly, Minori?!"
70010010-417 = "Was that even a math question anymore? There were more letters than numbers!"
70010010-418 = "It was like your brain started calculating as the equation was being fed in here."
70010010-420 = "Is this anything to fuss over? I'm not trying to be humble, but that was a relatively standard question."
70010010-422 = "And with 100% accuracy. That's deserving of a ten out of ten."
70010010-423 = "I'm actually more impressed by the perfect grade than the math question."
70010010-425 = "Minori, you're so smart... You're amazing..."
70010010-426 = "The chains of oppression can only be broken by a will as strong as steel and an intellect as fiery as flame!"
70010010-427 = "A declaration befitting the most dangerous figure of Red Winter. Heh heh heh."
70010010-429 = "Incoming! Another question!"
70010010-443 = "(We're actually pulling this off...)"
70010010-444 = "(But what's this feeling of dread creeping in?)"
