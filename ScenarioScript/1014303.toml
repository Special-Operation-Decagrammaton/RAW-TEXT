1014303-15 = "3;슈에링 수영복;01;저기 보세요, 선생님! 건물이 장난감 같아요!"
1014303-16 = "3;슈에링 수영복;02;여기 산은 정말 신기하네요……. 꼭 종을 세워 놓은 것처럼 생기기도 했고, 땅에서 병풍이 갑자기 솟아난 것처럼 보이기도 하고…….\n#3;em;[재잘]"
1014303-17 = "3;슈에링 수영복;13;아, 그거 아세요? 여기에는 계수나무가 엄청 많대요!"
1014303-18 = "[s] \"그런데…… 몸은 괜찮은 거야?\""
1014303-19 = "3;슈에링 수영복;09;네? 아, 회춘의 비약 말씀이군요?\n#3;em;[반응]"
1014303-20 = "3;슈에링 수영복;03;에헤헤. 문제없어요. 예전보다 훨씬 안전해졌다고 연단방…… 에서 직접 이야기를 들었거든요."
1014303-21 = "3;슈에링 수영복;08;아, 그런데 그 대신 살짝 불안정해질 수도 있다고 했는데, 건강상에 직접 문제가 되지는 않을 거라고도 했어요."
1014303-22 = "[ns] (살짝 불안정해질 수도 있다……?)"
1014303-23 = "3;슈에링 수영복;08;왜 그러세요, 선생님? 혹시…… '슈에링'과는…… 놀고 싶지 않으신 건가요?\n#3;em;[훌쩍]\n#3;closeup"
1014303-24 = "[ns] \"아니야! 그럴 리가!\""
1014303-25 = "3;슈에링 수영복;03;다행이에요! 저는 혹시 선생님께서 저를 싫어하게 되신 건 아닌지, 걱정이 되었거든요.\n#3;jump"
