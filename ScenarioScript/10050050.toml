10050050-11 = "2;야쿠모;03;트리니티 분들이 판매원을 자처해 주신다니, 이것이 문화의 힘이 아닐까요? 힛. 힛. 히.\n#2;em;[음표]"
10050050-12 = "4;타카네;07;그렇지요. 문화…… 소프트파워의 가장 큰 위력은, 자발적인 행동을 이끌어내는 매력에 있으니까요.\n#4;greeting"
10050050-13 = "4;타카네;12;……이왕 트리니티까지 온 김에, 키보토스 최대 규모를 자랑한다는 중앙 도서관이나, 그 안에 숨겨져 있다는 고서관도 가 보고 싶지만요."
10050050-14 = "2;야쿠모;09;뭐, 언젠가 또 기회가 있겠죠. 확실히 타카네는 평론가로서 트리니티의 장서에도 관심이 많겠군요."
10050050-15 = "4;타카네;02;부장님은 안 그러신가요?\n#4;em;[?]"
10050050-16 = "2;야쿠모;04;전혀요. 그걸 제가 마음대로 거래해서 매출을 올릴 수 있다면 이야기는 또 달라지겠지만……."
10050050-17 = "2;야쿠모;99;저는 가능성 없는 것들에게 그렇게까지 관심을 할애하고 싶지는 않아서요."
10050050-18 = "4;타카네;01;……그런 것 치고는 편집과 수정 활동은 열심히 하시면서…….\n#4;em;…"
10050050-19 = "2;야쿠모;09;편집과 수정이 아니에요. 원석을 깎아서 보석을 만드는 거라고요. 상품 가치의 재발견이라 이겁니다.\n#2;m3\n#4;dr\n#2;jump"
10050050-20 = "2;야쿠모;03;그리고 그 연장선상에서…… 타카네 역시 제 몫을 해 주길 기대하고 있고요!"
10050050-21 = "3;타카네;06;으, 윽……! 그걸, 또 해야 하나요……?\n#2;hide\n#3;em;[땀]"
10050050-22 = "3;야쿠모;09;정 하고 싶지 않다면, 저도 강요할 방법은 없습니다만……. 이미 충분히 소문나지 않았던가요?"
