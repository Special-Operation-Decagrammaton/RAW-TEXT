10050050-31 = "#na;트리니티 모브 A;그리고 그 '낯선 부분'에 대해, 가장 공신력을 갖고 이야기를 나눠 주실 수 있는 분이야말로, 타카네 공녀님뿐이고요!"
10050050-32 = "#zmc;instant;-395,222;1896\n#bgshake\n#na;타카네;그, 그그그그, 그렇게 봐주시면, 저는 황송한 나머지 몸 둘 바를 모르겠습니다만……."
