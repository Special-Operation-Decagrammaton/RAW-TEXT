10050050-28 = "#na;트리니티 모브 D;되고 말고요! 애초에 이 작품 자체가 트리니티에서는 좀처럼 찾아보기 힘든……."
10050050-29 = "#na;트리니티 모브 D;붉은겨울 특유의, 뭔가 끈끈하고 야성적이며 현실 그 자체를 그려내면서도."
