[translation]
10052015-3 = "..."
10052015-4 = "......"
10052015-5 = "หะ... หะหะหะหะหะหะ... เห็นหรือเปล่า มิโดริ?! เมื่อกี้น่ะ? เมื่อกี้นี้เลย!"
10052015-6 = "เห็นสิ... มันใหญ่มากเลย! ที่ดิ้นไปมาเมื่อกี้ด้วย แล้วก็...!"
10052015-7 = "พวกเรา... จะกลับไปได้อย่างปลอดภัยใช่มั้ย...?"
10052015-8 = "เรื่องนั้นไม่ต้องห่วงหรอก คุณครูอยู่กับเราทั้งคน พวกเราต้องปลอดภัยน่า"
10052015-9 = "อื้อ น่าจะนะ"
10052015-10 = "ทะ... ทำไมถึงชิลได้ขนาดนั้นล่ะคะ...?"
10052015-11 = "อืม ก็คงมีหลายๆ เหตุผลน่ะนะ"
10052015-12 = "คงเป็นเพราะเมื่อก่อนเราก็เคยเจอกันมาแล้วน่ะ?"
10052015-14 = "[ns] \"ว่าแต่... คอร์ของบีนาห์ล่ะ?\""
10052015-15 = "ค่ะ จะว่ายังไงดีล่ะคะ..."
10052015-16 = "ถ้าจะให้พูดสรุปเลยละก็ ฉันว่าเราน่าจะต้องลงไปใต้หลุมยักษ์หลุมนั้นค่ะ ฉันตรวจจับปฏิกิริยาของ#nคอร์ได้จากที่นั่นค่ะ"
10052015-17 = "หา?! ให้ลงไปในนั้นเหรอ!?"
10052015-18 = "กะ... กับผู้เลื่อมใสตนอื่น... เราก็ต้องทำแบบนี้หรือเปล่าคะ คุณครู?"
10052015-19 = "น่าจะไม่ค่ะ มีแต่บีนาห์ที่เป็นกรณีพิเศษค่ะ ในบางแง่จะมองว่านี่เป็นมาตรการรักษาความปลอดภัยก็ได้#nนะคะ"
10052015-20 = "อะ... อื้อ... เป็นมาตรการรักษาความปลอดภัยทางกายภาพชั้นยอดเลยละ..."
10052015-21 = "แต่ถึงอย่างนั้น การให้ลงไปในหลุมที่มองไม่เห็นพื้นที่ไม่ต่างจากการไต่ลงจากผาสูงทั้งอย่างนั้น มันไม่มีประสิทธิภาพเอาเสียเลยนะ..."
10052015-22 = "หัวหน้า ในยานขนส่งมีเครื่องบินขนาดเล็กอยู่ใช่มั้ย? ช่วยส่งมาที่นี่หน่อยสิ"
10052015-23 = "ฉันรู้ว่าต้องใช้ ก็เลยส่งออกไปแล้วค่ะ "
10052015-24 = "แต่ริโอะก็ดื้อดึงว่าจะออกไปเอง ก็เลยเป็นคนขับออกไปค่ะ"
10052015-25 = "ประธานน่ะเหรอ?"
10052015-26 = "ค่ะ จากผลการตรวจสอบเพิ่มเติม... พื้นที่ตรงนั้นมีคลัสเตอร์กับไฟร์วอลล์ที่เจาะเข้าไปไม่ได้ด้วย#nเครือข่ายภายใน เพราะงั้นแล้ว..."
10052015-27 = "การออกไปเองคือวิธีที่สมเหตุสมผลที่สุด ริโอะว่าไว้อย่างนั้นน่ะค่ะ"
10052015-28 = "สมกับที่เป็นริโอะเลยนะคะ..."
10052015-31 = "(ไม่นานนัก เครื่องบินสนับสนุนขนาดเล็กก็มาถึงพร้อมกับริโอะ)"
10052015-32 = "(เมื่อได้เห็นสีหน้าที่บอกว่า 'ก็ไม่ผิดคาดหรอก' ของทุกคน ริโอะก็แค่เอียงศีรษะให้เล็กน้อย...)"
