[translation]
10052015-3 = "..."
10052015-4 = "..."
10052015-5 = "D-D-Did you just see that, Midori?! Just now! Right in front of us!"
10052015-6 = "I saw... It was huge! And it writhed, and shifted all that weight, and...!"
10052015-7 = "Can we...still get back safely...?"
10052015-8 = "There is no need to fret. We have Sensei here."
10052015-9 = "Yeah. We should be fine."
10052015-10 = "H-How can you be so calm...?"
10052015-11 = "Mmm, there are a number of reasons."
10052015-12 = "But I have previously encountered Binah. I am familiar with its patterns."
10052015-14 = "[ns] \"By the way, how will we get Binah's core?\""
10052015-15 = "Yes. About that, how should I put it...?"
10052015-16 = "Basically, we have to go down the pit. I detect the core's signal down there."
10052015-17 = "Eh?! You want us to jump down there?!"
10052015-18 = "W-Will we have to do this...for the other prophets as well, Sensei?"
10052015-19 = "I can answer that. The answer is likely no. It seems that Binah is a special case and required additional security measures."
10052015-20 = "Y-Yeah... An underground physical security measure, quite literally..."
10052015-21 = "Even so, rappelling down as if we're rock climbing would be inefficient."
10052015-22 = "President, we should have a small support aircraft in the transport ship, right? Requesting deployment."
10052015-23 = "It's already on its way. "
10052015-24 = "...Although Rio is driving it. She insisted."
10052015-25 = "Miss Rio is on her way?"
10052015-26 = "Yes. She detected security clusters and firewalls that can't be breached remotely. Therefore..."
10052015-27 = "...she found it most logical to go down there herself."
10052015-28 = "...That sounds like Rio."
10052015-31 = "The small support aircraft arrived shortly after."
10052015-32 = "After exiting the cockpit, Rio tilted her head at everyone's incredulous expressions."
