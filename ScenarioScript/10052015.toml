[translation]
10052015-1 = "#wait;1000"
10052015-2 = "2;미도리 결전;02\n4;모모이 결전;02\n#2;a\n#4;a\n#2;h\n#4;h\n#2;em;[...]\n#4;em;[...]\n#wait;2500"
10052015-3 = "2;미도리 결전;02\n4;모모이 결전;02;……."
10052015-4 = "2;미도리 결전;02;………."
10052015-5 = "3;모모이 결전;15;봐, 봐봐봐봐봐봐, 봤어, 미도리?! 방금 그거? 조금 전 그거?!\n#3;closeup\n#3;shake\n#2;hide\n#4;hide\n#fontsize;80"
10052015-6 = "3;미도리 결전;04;봤어……. 엄청났어! 그리고 막 꿈틀거리고, 그리고……!\n#3;closeup\n#3;shake\n#3;em;[!]"
10052015-7 = "3;미도리 결전;04;우리…… 무사히 돌아갈 수 있는 거겠지……?\n#3;closeup"
10052015-8 = "3;에이미 결전;01;그건 걱정하지 마. 선생님이 있으니까, 무사할 거야.\n#3;em;[반응]"
10052015-9 = "3;에이미 결전;03;응. 아마도."
10052015-10 = "1;유즈 결전;04;어, 어떻게 그렇게 태연할 수 있는 건가요……?\n#1;ar\n#3;m5\n#1;em;[?]"
10052015-11 = "3;에이미 결전;12;으음, 여러 가지 이유가 있겠지만."
10052015-12 = "3;에이미 결전;13;역시, 예전에 만나 봤기 때문일까?"
10052015-13 = "1;유즈 결전;04\n3;에이미 결전;13\n#1;h\n#3;h"
10052015-14 = "[ns] \"그런데, 비나의 코어는?\""
10052015-15 = "3;케이 프로토;01;네. 그 부분 말입니다만, 뭐라고 해야 할까요…….\n#3;em;[...]\n#1;hide"
10052015-16 = "3;케이 프로토;02;결론부터 말씀드리자면, 저 대공동 아래로 내려가야 할 것 같습니다. 코어의 반응이 거기에서 검출되고 있어요."
10052015-17 = "2;미도리 결전;15\n4;모모이 결전;08;끄엑?! 이걸 내려가라고!?\n#3;hide\n#4;em;[?!]\n#4;shake"
10052015-18 = "2;미도리 결전;16;다, 다른 예언자들도…… 이렇게 해야 하는 걸까요. 선생님?"
10052015-19 = "1;유즈 결전;01\n5;케이 프로토;99;그건 아닐 겁니다. 이 비나만 특수케이스인 모양이에요. 이것도 어떤 의미로는 보안 대책이라고 해야겠군요.\n#2;hide\n#4;hide"
10052015-20 = "1;유즈 결전;09;으, 응……. 그야말로, 물리적인 보안 대책이네…….\n#1;em;[땀]"
10052015-21 = "3;에이미 결전;07;그렇다고는 해도, 바닥도 보이지 않는 이 구덩이를, 암벽을 타듯이 내려가라는 건 너무 비효율적이야…….\n#3;em;[속상함]\n#1;hide\n#5;hide"
10052015-22 = "3;에이미 결전;01;부장. 수송선에 소형 지원기 있지? 그거 좀 보내 줘."
10052015-23 = "1;히마리 결전 비무장;01;그럴 줄 알고, 이미 출발시켜 두었답니다. \n#1;a\n#1;sig\n#3;m5"
10052015-24 = "1;히마리 결전 비무장;06;……리오가 굳이 자기가 가겠다고 고집을 부려서, 직접 몰고 가는 중이지만요.\n#1;sig"
10052015-25 = "3;에이미 결전;02;회장이?\n#3;em;[반응]"
10052015-26 = "1;히마리 결전 비무장;07;네. 추가 조사 결과에 따르면…… 네트워크만으로는 돌파할 수 없는 클러스터와 방화벽이 설치되어 있어요. 그래서…….\n#1;sig"
10052015-27 = "1;히마리 결전 비무장;09;……자기가 직접 내려가는 게, 가장 합리적인 방법일 거라더군요.\n#1;sig\n#1;em;[한숨]"
10052015-28 = "3;케이 프로토;04;……리오답네요.\n#3;em;[땀]\n#3;closeup\n#1;hide"
10052015-29 = "#all;hide"
10052015-30 = "#wait;2000"
10052015-31 = "#na;(곧 소형 지원기가 도착했고, 리오 역시 모습을 드러냈다.)"
10052015-32 = "#na;(……리오는 우리들의 '역시나……' 라는 표정에, 고개를 갸웃거릴 뿐이었다.)"
10052015-33 = "#continued"
