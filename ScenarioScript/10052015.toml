[translation]
10052015-3 = "……"
10052015-4 = "…………"
10052015-5 = "你，你你你你你你，你看到了嗎，綠！？#n剛才那個……剛才那個！？"
10052015-6 = "看到了……好厲害！#n而且還在蠕動，然後……！"
10052015-7 = "我們……能平安回去吧……？"
10052015-8 = "不用擔心。#n有老師在肯定沒事的。"
10052015-9 = "嗯。大概吧。"
10052015-10 = "為，為什麼能那麼鎮定……？"
10052015-11 = "唔嗯，要說原因的話其實有很多……"
10052015-12 = "不過主要還是因為以前見過吧？"
10052015-14 = "[ns] 「話說薇娜的核心呢？」"
10052015-15 = "關於這點，該怎麼說呢……"
10052015-16 = "如果直接說結論的話，就是我們必須下降到那個大空洞裡。#n因為核心的反應，是從那裡檢測出來的。"
10052015-17 = "什麼！？要降到底下去！？"
10052015-18 = "面，面對其他預言者的時候……每次都得這樣嗎，老師？"
10052015-19 = "我想應該不至於，只有薇娜比較特別而已。#n某方面來說，這也能算是一種安全對策吧。"
10052015-20 = "嗯，嗯……可以說是，物理意義上的安全對策……"
10052015-21 = "說是這麼說，不過要像攀岩一樣爬下這個深不見底的坑洞，未免太沒效率了……"
10052015-22 = "部長，運輸船上應該有小型支援機才對，把那個派過來吧。"
10052015-23 = "我早就料到你會這麼說，因此已經把它派出去了。"
10052015-24 = "……雖然因為莉央堅持要自己去的關係，所以是由他親自駕駛就是了。"
10052015-25 = "會長也要來嗎？"
10052015-26 = "是的。由於追加調查的結果顯示……存在無法只藉由網路突破的集群和防火牆……"
10052015-27 = "……所以他說自己親自到場，才是最合理的方法。"
10052015-28 = "……很像莉央的作風呢。"
10052015-31 = "（小型支援機不久後就抵達了現場，莉央也隨之現身）"
10052015-32 = "（……面對大家「果然是這樣……」的表情，莉央只是歪了歪頭）"
