[translation]
2005402-1 = "ผู้ดูแลส่วนตัว"
2005402-8 = "[ns] \"!?!?!!!!!\""
2005402-11 = "ฮุฮุ นอนหลับสบายมั้ยคะ? คุณครู"
2005402-12 = "เป็นยังไงบ้างคะ มอร์นิ่งคอลจากผู้ดูแลส่วนตัวที่เป็นสาวน้อยผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ?"
2005402-13 = "[s] \"ทำให้ครูตื่นเต็มตาเลยละ!\""
2005402-14 = "อย่างนั้นสินะคะ การได้เห็นผลลัพธ์ที่ออกมาตามโครงสร้างระบบที่วางไว้ ถือเป็นความสุขหนึ่งของ#nผู้พัฒนาเลยละค่ะ"
2005402-15 = "งั้นเรามาเริ่มงานของวันนี้กันเลยมั้ยคะ?"
2005402-19 = "[ns] \"นี่มัน...?\""
2005402-20 = "เพื่อการเริ่มต้นวันใหม่อย่างสดชื่น เรามาเริ่มจากการยืดเหยียดกล้ามเนื้อกันก่อนเถอะค่ะ"
2005402-21 = "ถึง AMAS จะเป็นผลงานของริโอะ แต่ในสถานการณ์แบบนี้ ก็น่าจะเอามาใช้ร่วมกันได้ค่ะ"
2005402-22 = "เพื่อช่วยให้คุณครูยืดเหยียดกล้ามเนื้อได้ดีขึ้น ฉันก็เลยปรับปรุง แก้ไข และพัฒนาตามแบบฉบับของฉัน#nมาด้วยค่ะ"
2005402-23 = "เอาละค่ะ คุณครู เริ่มจากยืดเอวก่อนเลย~"
2005402-30 = "[ns1] \"!?!?!!!!!\"\n[ns2] \"เจ็บบบ!!!!!\""
2005402-35 = "ฮุฮุ อดทนไว้หน่อยนะคะ คุณครู มีคำกล่าวที่ว่ายาดีมักมีรสขมไม่ใช่เหรอคะ?"
2005402-39 = "ต่อไปก็ต้องล้างหน้าล้างตาสิคะ ฉันเตรียมคลีนซิ่งชนิดน้ำที่ตัวเองใช้เอาไว้ให้ด้วยค่ะ"
2005402-40 = "ผลิตภัณฑ์นี้เหมาะสำหรับใช้ชะล้างความมันและเหงื่อที่สะสมอยู่ตลอดคืนค่ะ"
2005402-41 = "แล้วก็ไม่ต้องกังวลเรื่องการระคายเคืองผิวนะคะ นี่คือคลีนซิ่งชนิดน้ำที่อ่อนโยนต่อผิวที่บอบบาง#nในตอนเช้าค่ะ"
2005402-52 = "วันนี้ก็ใส่ชุดเดิมอีกแล้วสินะคะ กะไว้แล้วเชียว..."
2005402-53 = "แน่นอนว่าเมื่อพิจารณาจากสถานการณ์ที่เผชิญอยู่ การมีเสื้อผ้าหลายๆ ชิ้นก็อาจมองได้ว่าฟุ่มเฟือย..."
2005402-54 = "ส่วนนี่ก็เรื่องพื้นฐานเลย... ที่จริงฉันก็ไม่ค่อยชอบการเปรียบเทียบแบบนี้เท่าไร แต่อย่างน้อยเราก็ต้อง#nแต่งตัวให้ 'เป็นผู้เป็นคน' สิคะ"
2005402-55 = "ฉันจะใช้เตารีดไอน้ำรีดเสื้อให้ค่ะ จะได้หายยับยู่ยี่"
2005402-59 = "ทีนี้ก็ถึงเวลาไปห้องทำงานแล้วสินะคะ ในฐานะ 'ผู้รอบรู้' ฉันจะเลือกเส้นทางที่เหมาะสมที่สุดให้ค่ะ"
2005402-60 = "ฉันจะทำเครื่องหมายลูกศรนำทางไว้บนพื้น คุณครูเดินตามมาให้ดีนะคะ"
2005402-61 = "[s] \"แค่เดินไปนิดเดียวก็ถึงแล้วไม่ใช่เหรอ...?\""
2005402-62 = "..."
2005402-63 = "มันมีส่วนที่ต่างกันอยู่ค่ะ"
2005402-64 = "[ns] \"ยังไงเหรอ...?\""
2005402-65 = "..."
2005402-66 = "เอาเป็นว่าไม่เหมือนกันก็แล้วกันค่ะ!"
2005402-70 = "รีบเดินมาสิคะ คุณครู ฉันรออยู่นะคะ"
2005402-71 = "ฮุฮุ ผู้ดูแลส่วนตัวใจดีที่เป็นแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ นอกจากฉันแล้วก็คง#nไปหาใครอื่นไม่ได้แล้วละค่ะ"
2005402-72 = "[s] \"อืม... นั่นสินะ... จิตใจดีจริงๆ...\""
2005402-73 = "จิตใจ...?"
2005402-74 = "จะไม่เป็นไรใช่มั้ยคะ? ว่ากันว่าทางที่ใจเราเลือกเดิน มักเป็นเส้นทางที่ดีที่สุดเสมอค่ะ"
2005402-75 = "เอาเถอะค่ะ ต่อไปฉันก็จะมาช่วยเหลือในชีวิตประจำวันของคุณครูเหมือนอย่างวันนี้อีก งั้นก็ให้รู้เอาไว้ด้วยนะคะ"
2005402-76 = "[s] \"เดี๋ยวก่อน แล้วไม่ถามครูเลยเหรอ?\""
2005402-77 = "..."
2005402-78 = "ตายจริง... นักเรียนคนหนึ่งอุตส่าห์แฮ็กกว่าครึ่งหนึ่งของระบบที่ริโอะผูกขาดอยู่คนเดียว... ไม่สิ อุตส่าห์เอาระบบมาได้ด้วยการเจรจาทางอิเล็กทรอนิกส์"
2005402-79 = "และพยายามเอาทรัพยากรเหล่านั้นมาใช้ให้คุณครูมีชีวิตประจำวันที่สะดวกขึ้น... แต่คุณครูกลับเป็น#nคนใจร้ายที่ปฏิเสธหัวใจอันงดงามของนักเรียนคนนั้นเหรอคะเนี่ย..."
2005402-80 = "ฮิมาริ... ช็อกเลยค่ะ..."
2005402-81 = "ฉันรู้สึกเหมือนเด็กไร้เดียงสาที่เห็นดอกไม้บานสะพรั่งอย่างทระนงอยู่บนยอดผา แต่กลับอยากเด็ดมันมา เพียงเพราะแค่อยากลองทำดู..."
2005402-82 = "แต่ถ้านั่นเป็นสัมผัสที่จะได้รับจากคุณครู ต่อให้ฉันจะต้องเอื้อมมือออกไปจนเจ็บปวดอย่างแสนสาหัส ฉันก็จะอดทนรับมันเลยนะคะ...?"
2005402-83 = "[s] \"ขอบใจนะ ฮิมาริ! ช่วยครูได้เยอะมากเลยละ!\""
2005402-84 = "ฮุฮุ กะไว้แล้วค่ะว่าต้องเป็นแบบนี้"
2005402-85 = "นอกจากนี้ หลักโหราศาสตร์ของวันนี้บอกว่าพลังงานสีแดงจะมาโอบล้อมตัวเราไว้"
2005402-86 = "ฉันก็เลยเปลี่ยนรูปพื้นหลังหน้าจอให้เป็นโทนสีแดงด้วยค่ะ"
2005402-87 = "[ns] \"แบบนี้มันแสบตานะ ให้แค่เครื่องรางเฉยๆ ก็พอ!\""
