2005402-37 = "#wait;1000"
2005402-38 = "3;통신 히마리 결전 비무장;00\n#3;a"
2005402-39 = "3;통신 히마리 결전 비무장;00;세수도 하셔야죠? 제가 즐겨 사용하는 클렌징 워터도 준비해 드렸답니다?"
2005402-40 = "3;통신 히마리 결전 비무장;07;밤사이 분비된 피지와 땀을 씻어내기 딱 좋을 거예요."
2005402-41 = "3;통신 히마리 결전 비무장;03;아침의 약해진 피부를 너무 자극하지 않도록, 충분히 순한 클렌징 워터니까 피부 자극은 걱정하지 마세요.\n#3;em;[반짝]"
