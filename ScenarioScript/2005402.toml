2005402-9 = "3;통신 히마리 결전 비무장;01\n#3;a\n#wait;1500"
2005402-10 = "#wait;1000"
2005402-11 = "3;통신 히마리 결전 비무장;01;후후. 안녕히 주무셨나요. 선생님.\n#3;em;[반응]"
2005402-12 = "3;통신 히마리 결전 비무장;07;어떠셨나요? 이 초천재병약미소녀 라이프 스태프가 보내 드리는, 모닝콜은요."
2005402-13 = "[s] \"일단 잠은 확실하게 깼네!\""
2005402-14 = "3;통신 히마리 결전 비무장;03;그렇군요. 시스템 아키텍처대로 구현되는 아웃풋을 바라보는 것은, 개발자의 즐거움 중 하나죠.\n#3;em;[음표]"
2005402-15 = "3;통신 히마리 결전 비무장;01;그러면 오늘의 업무, 시작하도록 할까요?"
2005402-16 = "#st;[0,0];instant;1;"
2005402-17 = "#clearST"
2005402-18 = "3;통신 히마리 결전 비무장;01\n1;AMAS A;01\n#3;m5\n#1;ar\n#3;h\n#wait;1500"
2005402-19 = "[ns] \"이건……?\""
2005402-20 = "3;통신 히마리 결전 비무장;02;상쾌한 하루의 시작을 위해, 스트레칭부터 시작하도록 하죠."
2005402-21 = "3;통신 히마리 결전 비무장;07;물론 그 AMAS는 리오의 결과물이지만, 지금은 상황이 상황인 만큼 공용으로 사용해도 될 것이고요.\n#3;em;[재잘]"
2005402-22 = "3;통신 히마리 결전 비무장;03;선생님의 스트레칭을 보조해 드리기 위해서, 제 나름대로 개조와 개량, 개선을 거쳤답니다?"
2005402-23 = "3;통신 히마리 결전 비무장;02;그러면, 선생님? 우선 허리를 쭈~욱."
2005402-24 = "#st;[0,0];instant;1;"
2005402-25 = "#clearST"
