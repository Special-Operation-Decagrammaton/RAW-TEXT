2005402-49 = "3;통신 히마리 결전 비무장;02\n#3;d\n#wait;1000"
2005402-50 = "3;통신 히마리 결전 비무장;02\n#3;a\n#3;closeup\n#wait;1000"
2005402-51 = "3;통신 히마리 결전 비무장;02\n#3;closeup\n#wait;1000"
2005402-52 = "3;통신 히마리 결전 비무장;06;혹시나 했더니 오늘도 같은 옷이네요…….\n#3;em;[속상함]\n#3;closeup"
2005402-53 = "3;통신 히마리 결전 비무장;02;물론 저희가 처해 있는 상황을 고려해 보면, 다양한 의복 같은 것은 아무래도 사치에 가까운 것이라고 할 수 있겠습니다만…….\n#3;closeup"
2005402-54 = "3;통신 히마리 결전 비무장;99;그래도 기본적인 부분…… 이런 비유를 그렇게까지 좋아하지는 않습니다만, '사람 구실'을 할 정도는 되어야겠지요.\n#3;closeup"
2005402-55 = "3;통신 히마리 결전 비무장;01;스팀으로 금방 주름을 펴 드리도록 할게요.\n#3;em;[음표]\n#3;closeup"
2005402-56 = "#all;hide"
2005402-57 = "#wait;2500"
2005402-58 = "3;통신 히마리 결전 비무장;01\n#3;a"
2005402-59 = "3;통신 히마리 결전 비무장;01;이제 집무 공간으로 가실 차례네요. '전지'인 제가, 최적화된 루트를 골라 드리죠.\n#3;em;[반응]"
2005402-60 = "3;통신 히마리 결전 비무장;02;바닥에 화살표를 출력해서 길을 안내해 드릴 테니, 잘 따라오시면 된답니다?"
2005402-61 = "[s] \"……그냥 조금만 걸어가면 되는 거 아니야……?\""
2005402-62 = "3;통신 히마리 결전 비무장;04;……."
2005402-63 = "3;통신 히마리 결전 비무장;07;그게, 달라요."
2005402-64 = "[ns] \"어디가……?\""
2005402-65 = "3;통신 히마리 결전 비무장;04;……."
2005402-66 = "3;통신 히마리 결전 비무장;05;아무튼 다르답니다!\n#3;closeup"
2005402-67 = "#all;hide"
2005402-68 = "#wait;2300"
2005402-69 = "3;히마리 결전 비무장;01\n#3;h"
2005402-70 = "3;히마리 결전 비무장;03;어서 오세요. 선생님. 기다리고 있었어요."
2005402-71 = "3;히마리 결전 비무장;07;후후. 이렇게 친절한 초천재병약미소녀해커이자 라이프 스태프는, 지금 여기 말고는 어디에서도 찾을 수 없으실 테니까요?\n#3;em;[반짝]"
2005402-72 = "[s] \"응……. 그래……. 마음 고마워……\""
2005402-73 = "3;히마리 결전 비무장;04;마음……?\n#3;em;[땀]"
2005402-74 = "3;히마리 결전 비무장;02;괜찮겠죠. 마음 가는 길은 쭉 곧은 길이라는 말도 있고요."
2005402-75 = "3;히마리 결전 비무장;03;어쨌든, 앞으로도 이번처럼 계속해서 선생님의 생활 어시스턴트를 해 드릴 생각이니, 그렇게 알아 두시면 좋을 거예요.\n#3;em;[재잘]"
2005402-76 = "[s] \"저기, 내 의사는?\""
2005402-77 = "3;히마리 결전 비무장;02;…….\n#3;em;[...]"
2005402-78 = "3;히마리 결전 비무장;06;그런……. 선생님께서 설마, 리오가 독점하던 여기의 시스템을 절반 정도 해킹…… 전자적 협상을 통해 가져와서."
2005402-79 = "3;히마리 결전 비무장;02;그 리소스를 선생님 본인의 더 나은 생활을 위해 사용하려는, 한 학생의 기특한 마음을 물리칠 정도로 매정한 분이셨다니……."
2005402-80 = "3;히마리 결전 비무장;06;히마리, 쇼크…….\n#3;em;[세로선]\n#3;stiff"
2005402-81 = "3;히마리 결전 비무장;06;절벽 위에 애처롭지만 고고하게 피어난 한 송이 꽃을, 그저 그렇게 해 보고 싶다는 이유만으로 꺾어서 가져가려는 어린아이마냥……."
2005402-82 = "3;히마리 결전 비무장;09;그렇지만 그 손길이 선생님의 손길이라면, 저는 허리가 끊어지는 아픔과 고통을 무릅쓰더라도 참아내 보이겠지만요……?\n#3;em;[훌쩍]"
2005402-83 = "[s] \"고마워, 히마리! 정말 엄청나게 도움이 됐어!\""
2005402-84 = "3;히마리 결전 비무장;03;후후. 역시 그러실 줄 알았답니다.\n#3;em;[반응]"
2005402-85 = "3;히마리 결전 비무장;99;덧붙여서 오늘의 점성술에 따르면, 당분간은 붉은색의 기운이 우리를 감쌀 것이라고 하기에."
2005402-86 = "3;히마리 결전 비무장;03;모니터의 배경 색조를 붉은색으로 바꿔 보았답니다?\n#3;em;[하트]\n#3;closeup"
2005402-87 = "[ns] \"눈이 너무 아프니까 부적 정도로 참아 줘!\""
2005402-88 = "#all;hide"
