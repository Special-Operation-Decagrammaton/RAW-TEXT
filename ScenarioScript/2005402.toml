2005402-34 = "3;통신 히마리 결전 비무장;03\n#3;a\n#3;closeup\n#wait;1000"
2005402-35 = "3;통신 히마리 결전 비무장;03;후후. 조금만 참으세요, 선생님. 좋은 약은 입에 쓰다고 하는 말도 있고요.\n#3;em;[음표]\n#3;closeup"
