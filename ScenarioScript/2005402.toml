[translation]
2005402-1 = "生活助理（１）"
2005402-8 = "[ns]「！？！？」"
2005402-11 = "呵呵。睡得好嗎，老師。"
2005402-12 = "超天才病弱美少女生活助理為您準備的Morning Call怎麼樣呢？"
2005402-13 = "[s] 「睡意確實被趕跑了！」"
2005402-14 = "這樣啊。看見輸出符合系統架構的預期，可是開發者的樂趣之一呢。"
2005402-15 = "那麼，來開始今天的工作吧？"
2005402-19 = "[ns] 「這是……？」"
2005402-20 = "為了迎接清爽的一天，我們就先從伸展開始做起吧。"
2005402-21 = "雖然那個AMAS是莉央的開發成果……#n不過現在畢竟是特殊情況，應該能將其視為公物才對。"
2005402-22 = "為了輔助老師的伸展運動，我可是按照自己的方式進行了不少改造與改良唷？"
2005402-23 = "那麼老師？首先把腰給伸～展開來吧。"
2005402-30 = "[ns1] 「！？！？」\n[ns2] 「好痛！！！！！」"
2005402-35 = "呵呵。請稍微忍耐一下，老師。#n俗話說良藥苦口嘛。"
2005402-39 = "接著也別忘了洗臉哦？#n我為您準備了我愛用的洗面乳。"
2005402-40 = "很適合洗去夜間分泌的皮脂和汗水。"
2005402-41 = "由於它足夠溫和，不必擔心會過度刺激早上脆弱的皮膚。"
2005402-52 = "果然今天也是同一套衣服呢……"
2005402-53 = "考慮到我們目前的處境，追求穿搭或許略顯奢侈……"
2005402-54 = "雖然我不是很喜歡這種比喻……不過至少得「像個人樣」吧。"
2005402-55 = "我馬上用蒸汽幫您把皺褶燙平。"
2005402-59 = "現在是時候前往辦公空間了呢。#n就由「全知」的我來為您挑選最佳的路線吧。"
2005402-60 = "我會在地板上投影箭頭來引導路線，還請您跟隨箭頭的指示前進哦？"
2005402-61 = "[s] 「不是走幾步路就到了嗎……？」"
2005402-62 = "……"
2005402-63 = "這是不一樣的。"
2005402-64 = "[ns] 「哪裡不一樣……？」"
2005402-65 = "……"
2005402-66 = "總之就是不一樣！"
2005402-70 = "歡迎您，老師。恭候多時了。"
2005402-71 = "呵呵。如此親切的超天才病弱美少女駭客兼生活助理，#n除了這裡以外可是哪裡都找不到的唷？"
2005402-72 = "[s] 「嗯……是啊……謝謝你的心意……」"
2005402-73 = "心意……？"
2005402-74 = "也對。俗話說心之所向皆為坦途嘛。"
2005402-75 = "總之，我今後也打算繼續擔任老師的生活助理，再麻煩您多多配合囉。"
2005402-76 = "[s] 「那個……我的意願呢？」"
2005402-77 = "……"
2005402-78 = "為了讓老師的生活更加舒適，不惜駭──#n更正，是藉由電子協商奪取了莉央獨佔的系統資源……"
2005402-79 = "這樣一名學生的可貴心意……老師難道打算無情地拒絕嗎？"
2005402-80 = "陽葵有點震驚……"
2005402-81 = "就像一個孩子只因為想要，就打算摘下崖上那可憐而高潔綻放的花一樣……"
2005402-82 = "不過如果那是老師的手，我願意忍受腰斬般的痛苦……？"
2005402-83 = "[s] 「謝謝你，陽葵！真的超有幫助的哦！」"
2005402-84 = "呵呵。我就知道您會這麼說。"
2005402-85 = "另外根據今天占星術的結果，紅色的運氣似乎會暫時包圍我們。"
2005402-86 = "所以我把螢幕的桌布換成紅色了！"
2005402-87 = "[ns] 「那樣眼睛會很痛，麻煩縮減成護身符的程度就好！」"
