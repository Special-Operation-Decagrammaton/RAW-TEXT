[translation]
10052160-1 = "มัลคูธ ผู้แสวงบุญแห่งอาณาจักรที่เดินทางมาถึงที่สุดของโลก"
10052160-2 = "[ns] \"เด็กๆ พวกนั้นล่ะ?!\""
10052160-3 = "ฉันว่า... น่าจะไปซ่อนตัวอยู่นะ"
10052160-4 = "เรื่องมาถึงขนาดนี้แล้ว แต่ก็ยังไม่ยอมบอกพวกเราสักทีนะคะ ว่าทำไมตัวเองถึงมาทำเรื่องแบบนี้อยู่"
10052160-5 = "นั่นสิคะ... อาริสึน่าจะเป็นเพื่อนกับเด็กพวกนั้นได้แท้ๆ..."
10052160-6 = "ใจอ่อนเกินไปแล้วค่ะ... อาริสึ แต่ถึงอย่างนั้นมันก็แปลกๆ อยู่ดีนะคะ"
10052160-7 = "พวกนั้นเอาแต่พูดว่าทำเรื่องแบบนี้ก็เพื่อพวกเราหรืออะไรทำนองนั้น"
10052160-8 = "ทั้งที่ถูกต้อนให้จนมุมถึงขนาดนี้แล้ว แต่ก็ยังไม่ยอมปริปากบอกเหตุผลเลยแม้แต่นิดเดียวนะคะ"
10052160-9 = "นั่นน่ะสิ อย่างน้อยก็น่าจะถ่วงเวลาได้บ้างแท้ๆ ช่างเป็นวิธีที่ไม่มีประสิทธิภาพเอาซะเลยนะ"
10052160-10 = "หรือบางทีนั่นอาจจะเป็นสิ่งที่ทำลงไปโดยไม่ได้คิดอะไรจริงๆ ก็เลยไม่มีอะไรจะพูดตั้งแต่แรกก็ได้ค่ะ"
10052160-11 = "ไม่หรอกค่ะ... ถึงยังไงก็คงไม่ทำเรื่องอะไรแบบนี้ ราวกับตัวเองเป็นเด็กที่เล่นก่อปราสาททรายกันอยู่#nหรอกค่ะ..."
10052160-15 = "ก็นะ ปกติจตุรเทพองค์สุดท้ายของป้อมราชาปีศาจหรืออะไรพวกนั้นก็ชอบไม่รู้สถานการณ์ที่แท้จริง หรือไม่ก็ชอบพูดจาไร้สาระอยู่แล้ว!"
10052160-16 = "สำหรับพวกเราก็ถือว่าได้ประหยัดเวลานั่นแหละ!"
10052160-17 = "แต่ถ้าพวกนั้นมีเหตุผลที่สุดวิสัยจริงๆ ล่ะ พี่โมโมอิ..."
10052160-18 = "ตะ... ต่อให้จะเป็นเหตุผลสุดวิสัยแค่ไหน แต่ก็ไม่ควรก่อเรื่องใหญ่โตขนาดนี้... หรือเปล่า..."
10052160-20 = "ทะ... ที่นี่น่าจะปลอดภัยนะคะ...! คะ... คนพวกนั้นน่าจะไม่สังเกตเห็นด้วยค่ะ..."
10052160-22 = "เฮ้อ... เหนื่อยใจจังเลยนะ"
10052160-23 = "จะว่าไปก็น่าโมโหนะคะ..."
10052160-27 = "ยังโอเคกันมั้ยคะ ไอน์ ซอฟ ออร์?"
10052160-28 = "ค่ะ ค่ะ...! พวกฉัน... ไม่เป็นไรค่ะ! ยะ... ยังไงก็มีพี่มัลคูธอยู่ด้วย...!"
10052160-34 = "แค่นี้ไม่เท่าไรหรอก! อ่า... ไอน์ดูจะเหนื่อยๆ นิดหน่อยนะ แต่เดี๋ยวก็ลุกขึ้นมาเองนั่นละ พี่มัลคูธไม่ต้องห่วงหรอก"
10052160-40 = "ยังขาดเลือดนักสู้กันทั้งคู่เลยสินะคะ ถ้าขืนเป็นแบบนี้ละก็...!"
10052160-46 = "..."
10052160-47 = "ไอน์ ซอฟ ออร์"
10052160-48 = "ดินแดนเหล็กกล้ามาจากความตั้งใจที่แน่วแน่ของทุกคนใช่มั้ยคะ?"
10052160-49 = "ทะ... ทำไม... เหรอคะ?"
10052160-50 = "ฉันดีใจมากที่ได้ยินว่าไอน์ ซอฟ ออร์สร้างดินแดนเหล็กกล้าแห่งนี้ขึ้นมาด้วยเจตนารมณ์ของตัวเองค่ะ"
10052160-51 = "แต่ฉันยังไม่ได้ฟังเหตุผลจากทุกคนเลยค่ะว่าทำไมถึงพยายามสร้างดินแดนเหล็กกล้าขึ้นมา และต้องการอะไรจากการทำแบบนี้ "
10052160-52 = "เราไม่มีความจำเป็นที่จะต้องขยายดินแดนเหล็กกล้าและทำให้คิโวทอสเป็นส่วนหนึ่งของดินแดนนี่คะ"
10052160-53 = "ระ... เรื่องนั้นน่ะ..."
10052160-54 = "ไม่ต้องห่วงนะคะ ฉันไม่ได้จะตำหนิหรือต่อว่าทุกคนหรอกค่ะ"
10052160-55 = "ฉันแค่สงสัยนิดหน่อยว่าทำไมถึงต้องพยายามอย่างหนักในการขยายดินแดนเหล็กกล้า"
10052160-56 = "และสงสัยว่าทำไมถึงไม่ยอมบอกเหตุผลนั้นกับทั้งคุณครูและเด็กนักเรียนพวกนั้น"
10052160-57 = "รวมถึงตัวฉันด้วยค่ะ"
10052160-58 = "ถ้าไม่ยึดติดกับดินแดนเหล็กกล้า เรื่องทั้งหมดนี้อาจจะไม่เกิดขึ้นก็ได้นะคะ"
10052160-59 = "..."
10052160-60 = "ขอโทษค่ะ พี่มัลคูธ"
10052160-61 = "แต่พวกฉันมีเหตุผลที่บอกไม่ได้ค่ะ"
10052160-62 = "ยิ่งไปกว่านั้น... ยังมีเหตุผลว่าทำไมเรื่องราวนี้ถึงไม่ควรเผยแพร่ออกไปในรูปแบบของคำพูด... ด้วยค่ะ"
10052160-63 = "แต่ยังไงก็เชื่อพวกฉันเถอะนะคะ ทั้งหมดนี้ก็เพื่อพี่มัลคูธ..."
10052160-67 = "ไม่สิ ที่ทำแบบนี้... ก็เพื่อพี่มัลคูธและพวกฉันด้วยค่ะ"
10052160-68 = "เพื่อไอน์ ซอฟ และออร์เองน่ะเหรอคะ?"
10052160-69 = "แบบนั้นฉันยิ่งไม่เข้าใจเลยค่ะ"
10052160-70 = "พี่มัลคูธ คือว่า..."
10052160-71 = "ค่ะ ซอฟ บอกมาได้เลยค่ะ"
10052160-75 = "พี่อยากมีชีวิตหรือเปล่า?"
10052160-76 = "คะ?"
10052160-77 = "..."
10052160-78 = "ขอโทษด้วยค่ะ ฉันไม่ค่อยเข้าใจที่ถามแบบนี้"
10052160-79 = "ตราบใดที่ยังมีความรู้สึกนึกคิด ไม่ว่าใครก็อยากมีชีวิตไม่ใช่เหรอคะ? และในแง่มุมของฉัน ค่ะ ฉันอยากมีชีวิตค่ะ"
10052160-80 = "แต่ว่าไอน์ ซอฟ และออร์คะ "
10052160-81 = "ทุกคนต่างก็รู้ดีนี่คะ?"
10052160-82 = "อื้อ เรารู้ ต้องรู้สิ พวกเรากับพี่ต้องรู้ดีกว่าใครอยู่แล้ว"
10052160-83 = "แต่ยังไงพวกเรา... ก็อยากมีชีวิต"
10052160-84 = "อยากมีชีวิตอยู่กับพี่มัลคูธ... ไปตลอดเลย"
10052160-85 = "พูดแบบนั้นหมายความว่า..."
10052160-86 = "...!"
10052160-87 = "อย่างนั้นเองสินะคะ"
10052160-88 = "ถึงฉันจะยังไม่เข้าใจอย่างถ่องแท้ แต่ถ้าไอน์ ซอฟ และออร์ต้องการอย่างนั้น"
10052160-89 = "ฮะ... ฮือ..."
10052160-90 = "..."
10052160-91 = "ขอโทษค่ะ พี่มัลคูธ ตอนนี้สิ่งที่เหลืออยู่สำหรับพวกเราคือ..."
10052160-92 = "ค่ะ ฉันรู้ค่ะ"
10052160-93 = "ถ้างั้นจากนี้ก็เชื่อใจฉันเถอะค่ะ"
10052160-94 = "เพื่อท่านผู้นั้น และเพื่อน้องๆ ที่มีค่าของฉัน"
10052160-97 = "ทุกคน ทางโน้นค่ะ!"
10052160-102 = "จากนี้ก็เหลือแค่การต่อสู้กับราชาปีศาจที่เป็นบอสตัวสุดท้ายใช่มั้ยล่ะ? "
10052160-103 = "ใช่ค่ะ ฉันว่านั่นเป็นคำเปรียบเทียบที่เหมาะสมเลยค่ะ โมโมอิ คนที่บางครั้งก็พูดอะไรเข้าท่า"
10052160-104 = "นี่ โทคิ? ฉันขอถามหน่อยเถอะ ตั้งฉายาฉันไว้กี่แบบแล้วน่ะ...?"
10052160-105 = "อยากรู้จริงๆ เหรอคะ?"
10052160-106 = "ไม่... ไม่หรอก... ช่างมันเถอะ..."
10052160-107 = "ตั้งใจกันหน่อยสิคะ จริงๆ เลย!"
