10052160-3 = "3;리오 결전;01;일단…… 몸을 숨긴 것 같아.\n#3;a\n#3;em;[...]"
10052160-4 = "3;히마리 결전;06;이 지경이 되어서까지도, 끝까지 제대로 이야기해 주지 않는군요. 자기들이 왜 이런 일을 벌였는지 말이에요.\n#3;em;[한숨]"
10052160-5 = "1;케이 프로토;02\n5;아리스 결전;09;그렇습니다……. 아리스, 어째서인지 그 아이들과는 친구가 될 수 있을 것 같은데…….\n#5;em;[속상함]\n#3;hide"
10052160-6 = "1;케이 프로토;99;……너무 무른 생각이에요. 아리스. 하지만 이상하기는 하네요."
10052160-7 = "1;케이 프로토;02;그렇게 우리들을 위해서 이런 일을 벌이는 거다, 뭐다 하더니.\n#1;m3\n#5;dr"
