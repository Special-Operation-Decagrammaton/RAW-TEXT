10052160-9 = "4;에이미 결전;00\n2;토키 결전;01\n#na;에이미 결전;그러게. 최소한 시간이라도 어느 정도 끌 수 있을 텐데, 정말 효율적이지 않네.\n#4;h\n#4;em;[반응]\n#1;hide"
10052160-10 = "4;에이미 결전;00\n2;토키 결전;02;아니면 정말 아무 생각 없이 저질러 버린 일이어서, 할 말이 처음부터 없었던 것일지도 모르겠군요."
10052160-11 = "3;케이 프로토;04;아뇨……. 아무리 그래도, 어린아이가 모래 장난을 하는 기분으로, 이런 일을 벌였을 리가요…….\n#3;em;[땀]\n#4;hide\n#2;hide"
