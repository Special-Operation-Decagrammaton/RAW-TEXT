[translation]
10052160-1 = "馬爾庫特：到達世界盡頭的王國巡禮者"
10052160-2 = "[ns] 「那些孩子呢！？」"
10052160-3 = "好像……暫時躲起來了。"
10052160-4 = "究竟為何要做這種事情……都到這個地步了，還是不肯好好說明呢。"
10052160-5 = "嗯……愛麗絲還以為能跟那些孩子成為朋友的說……"
10052160-6 = "……那多少有點太過天真了，愛麗絲。#n不過話又說回來，這確實很奇怪呢。"
10052160-7 = "明明聲稱是為了我們才做出這種事……"
10052160-8 = "卻連被逼入這般絕境都不肯開口。"
10052160-9 = "就是說啊。明明說出來至少能拖延一些時間，這樣真的很沒效率呢。"
10052160-10 = "或者也可能真的是沒想太多就做下去了，所以本來就沒什麼好說的也說不定。"
10052160-11 = "不……再怎麼說，也不太可能抱著小孩子玩沙一樣的心情做出這種事吧……"
10052160-15 = "不過什麼魔王城的最後四天王，#n通常都不知道真正的內情，或者只會說一些有的沒的嘛！"
10052160-16 = "對我們來說也算是節省時間了！"
10052160-17 = "要是真的有什麼不得已的原因怎麼辦啊，姐姐……"
10052160-18 = "就，就算有不得已的原因，做到這種程度……也不行吧……"
10052160-20 = "這，這裡應該沒問題……！#n不，不會被那些人發現的……"
10052160-22 = "唔啊……這個還真累呢。"
10052160-23 = "……還是有點不甘心呢。"
10052160-27 = "你們還好嗎，Ain、Soph、Aur？"
10052160-28 = "是，是的……！沒，沒問題！還，還有姐姐大人在……！"
10052160-34 = "沒問題！啊……Ain好像有點累了。#n他等等就會醒過來的，姐姐大人別擔心。"
10052160-40 = "你們兩個都缺乏毅力啊，毅力。#n只要這樣就能……！"
10052160-46 = "……"
10052160-47 = "Ain、Soph、Aur。"
10052160-48 = "鋼鐵大陸確實是Ain、Soph、Aur的意志吧？"
10052160-49 = "是，是的……"
10052160-50 = "我聽說Ain、Soph、Aur憑藉自己的意志創造了這個鋼鐵大陸，感到非常高興。"
10052160-51 = "但是為什麼要創造鋼鐵大陸，以及你們想藉此得到什麼……我還沒有聽說過。"
10052160-52 = "擴張鋼鐵大陸，將奇普托斯變成它的一部分……應該沒有非得這麼做的理由才對。"
10052160-53 = "那，那是……"
10052160-54 = "沒關係。我並不是想要責怪或訓斥你們。"
10052160-55 = "只是對於你們為什麼要這麼努力擴張鋼鐵大陸……"
10052160-56 = "以及不只是對老師一行人，就連對我也不太願意說明的原因……"
10052160-57 = "純粹，感到有些疑問而已。"
10052160-58 = "如果不執著於鋼鐵大陸的話，這一切可能就不會發生了呢。"
10052160-59 = "……"
10052160-60 = "對不起，姐姐大人。"
10052160-61 = "可是，我們確實有不能說出口的理由。"
10052160-62 = "或者更進一步來說，那些具體的內容……是絕對不能以言語的形式讓外界聽見的。#n……那樣的理由，確實存在。"
10052160-63 = "不過請相信我們。#n這一切都是為了姐姐大人……"
10052160-67 = "不，是為了姐姐大人和我們自己，所以才會這麼做的。"
10052160-68 = "為了Ain、Soph、Aur和我自己？"
10052160-69 = "更加難以理解了呢。"
10052160-70 = "那個，姐姐大人。"
10052160-71 = "嗯，Soph。有什麼事呢？"
10052160-75 = "姐姐大人……想活下去嗎？"
10052160-76 = "什麼？"
10052160-77 = "……"
10052160-78 = "抱歉。我不太理解這個問題。"
10052160-79 = "既然擁有意識，想要活下去應該是理所當然的事情才對。#n從這個意義上來說……是的，我想活下去。"
10052160-80 = "但是Ain、Soph、Aur。"
10052160-81 = "大家都知道的吧？"
10052160-82 = "嗯，當然知道。#n沒有人比姐姐大人和我們更清楚這件事了。"
10052160-83 = "可是我們……果然還是想活下去。"
10052160-84 = "想和姐姐大人一起……永遠活下去。"
10052160-85 = "那句話的意思是……"
10052160-86 = "……！"
10052160-87 = "原來如此。"
10052160-88 = "我還沒有完全理解，但如果Ain、Soph、Aur是這麼希望的話。"
10052160-89 = "嗚，嗚嗚……"
10052160-90 = "……"
10052160-91 = "對不起，姐姐大人。#n現在我們剩下的就只有……"
10052160-92 = "是的，我知道。"
10052160-93 = "那麼接下來，請相信我吧。"
10052160-94 = "為了那位大人，以及我重要的妹妹們。"
10052160-97 = "大家，在那裡！"
10052160-102 = "這就是最終BOSS的魔王戰了吧？"
10052160-103 = "是的。我認為那是個恰當的比喻。偶爾會說些正經話的桃井。"
10052160-104 = "那個，季？我姑且問一下，你取了多少個關於我的綽號……？"
10052160-105 = "你真的想聽嗎？"
10052160-106 = "沒，沒關係……還是算了吧……"
10052160-107 = "你們專心一點好不好，真是的！"
