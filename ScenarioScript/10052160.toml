[translation]
10052160-1 = "Malkuth, Pilgrim of the Kingdom at World's End"
10052160-2 = "[ns] \"Where did the kids go?!\""
10052160-3 = "I think... They found themselves a place to hide."
10052160-4 = "We've come so far down the road, and we still don't know their motives."
10052160-5 = "Yes... I do think we can become friends with them, though... Somehow."
10052160-6 = "...That's a naive thought, Aris. But I agree that something is strange."
10052160-7 = "They keep prattling on about how they're doing this all for our sakes."
10052160-8 = "But, even when they've been driven into a corner, they've revealed nothing else."
10052160-9 = "Yeah. At the very least, they could've bought some time. They're operating inefficiently."
10052160-10 = "Or maybe they had nothing to say in the first place because they did it without a second thought."
10052160-11 = "No... As much as it seems like it, they're not a bunch of children playing in a sandbox."
10052160-15 = "Well, the four generals of the demon lord, and other types like that, tend to just follow orders and have nothing useful to actually say! "
10052160-16 = "So I consider it time saved!"
10052160-17 = "Sis, but what if they actually had some sort of unavoidable circumstances...?"
10052160-18 = "W-Well, no matter how unavoidable, th-they still shouldn't be...doing stuff like this..."
10052160-20 = "I-I think this will be okay...! Th-They won't see us here..."
10052160-22 = "Ugh... This is rough."
10052160-23 = "...But still, I'm a bit frustrated."
10052160-27 = "Are you okay, Ein, Sof, and Ohr?"
10052160-28 = "Y-Yes...! W-We're okay! We, we still have you, Elder Sister...!"
10052160-34 = "We're completely fine! Um... I think Ein is a bit tired. She'll wake up later, so you don't have to worry about us."
10052160-40 = "Both of you lack resilience. At this rate...!"
10052160-46 = "..."
10052160-47 = "Ein, Sof, Ohr."
10052160-48 = "The Steel Continent was something created of your own will, yes?"
10052160-49 = "Y-Yes...and?"
10052160-50 = "I was happy when I learned of that."
10052160-51 = "However, even I find myself at a loss as to what you gain from it."
10052160-52 = "For no sordid justification can defend swallowing Kivotos whole."
10052160-53 = "Th-That's because..."
10052160-54 = "I do not come here to castigate you."
10052160-55 = "The reason why you're so relentless in this quest..."
10052160-56 = "Why you have withheld this information from not only Sensei, but from me as well..."
10052160-57 = "I could not help but to be curious."
10052160-58 = "For was it not this fixation upon the Steel Continent that brought us here?"
10052160-59 = "..."
10052160-60 = "We're sorry, Elder Sister."
10052160-61 = "But there is a reason why we cannot tell you."
10052160-62 = "...Beyond that, there is a reason why... We cannot let the specifics of this to be released to the outside world in form of...words."
10052160-63 = "But trust us. Everything we're doing is for sake of our Elder Sister..."
10052160-67 = "No. For ours and Elder Sister's sake."
10052160-68 = "For the sake of all of us?"
10052160-69 = "My confusion deepens."
10052160-70 = "Elder Sister, you know."
10052160-71 = "Yes, Sof. Please continue."
10052160-75 = "Do you...want to live?"
10052160-76 = "Hm?"
10052160-77 = "..."
10052160-78 = "I apologize. I do not understand."
10052160-79 = "As long as one is conscious, it is only natural for them to wish to live. In that sense, yes. I do."
10052160-80 = "However, Ein, Sof, and Ohr. "
10052160-81 = "Is that not something you already knew?"
10052160-82 = "Yes. We do. Of course we do. I'm sure that us four know that better than anyone else."
10052160-83 = "But still, we...want to live."
10052160-84 = "We want to live...forever with you, Elder Sister."
10052160-85 = "That means..."
10052160-86 = "...!"
10052160-87 = "I see."
10052160-88 = "While there still aspects beyond my comprehension, that feeling... That feeling I can understand."
10052160-89 = "A-Augh..."
10052160-90 = "..."
10052160-91 = "We're sorry, Elder Sister. What we have left is..."
10052160-92 = "Yes. I know."
10052160-93 = "Then, from now on, please trust me."
10052160-94 = "For our master, and for my precious sisters."
10052160-97 = "Everyone, over there!"
10052160-102 = "Is this the final demon lord boss battle?"
10052160-103 = "Yes. I believe that is an appropriate analogy, sometimes insightful Momoi."
10052160-104 = "Um, Toki? I'm just curious, exactly how many of these names do you have for me?"
10052160-105 = "Do you really want to know?"
10052160-106 = "No, no... I'm fine..."
10052160-107 = "Can you all PLEASE focus?"
