[translation]
80000140-1 = "Chocolate Medovik"
80000140-2 = "This is out of the blue, but what do you think are the three principles of negotiation?"
80000140-3 = "[s] \"Sounds like you're getting ready for a lecture.\""
80000140-4 = "Hm, you're quick to catch on. This is why I like you, Sensei. Heh, heh, heh."
80000140-5 = "The first and foremost principle is active listening."
80000140-6 = "[s] \"Mm. It's important.\""
80000140-7 = "That's because it's important to threaten—I MEAN, persuade others to listen to what you have to say."
80000140-8 = "[s] \"Hold on.\""
80000140-9 = "Secondly, there's profit. Profit is always an important element, obviously. "
80000140-10 = "This is also the reason why it is necessary to convince the other party to believe that both sides will mutually benefit."
80000140-11 = "And lastly, there's trust."
80000140-12 = "It is essential to create an atmosphere where failing to fulfill your promise will result in a disaster, thereby leaving absolutely no room for escape."
80000140-13 = "[s] \"I like the principles, but what's with the explanations?!\""
80000140-14 = "If you liked the core tenets, then shouldn't we consider that...at least HALF a success?"
80000140-15 = "After all, negotiation requires technique."
80000140-16 = "It's good to lead and approach by saying, \"we'll provide this on our end, so in exchange, you should get us that.\""
80000140-17 = "That said, here. I brought this."
80000140-23 = "[ns] \"Is this...chocolate cake?\""
80000140-24 = "Yes. In particular, this cake is called medovik. "
80000140-25 = "It's made by layering a thin sponge sheet cake with honey, then sugar, then following that up with another sheet of sponge cake."
80000140-26 = "It's a specialty in Red Winter. See the layers of cake sheets, honey, and cream?"
80000140-27 = "And this is CHOCOLATE medovik, with chocolate cake and chocolate cream."
80000140-28 = "It's also handmade, by the way. Today is Valentine's day, a day that anyone with money is familiar with."
80000140-29 = "And to offer a handmade chocolate on a day like this..."
80000140-30 = "Surely Sensei, of all people, knows what this means, right? Heh, heh, heh."
80000140-31 = "[s] \"Huh...\""
80000140-32 = "Honestly, I am quite fond of this variety."
80000140-33 = "Because it's a cake built layer by layer, the cross section reminds me of a stack of books."
80000140-34 = "[s] \"That's quite a romantic observation.\""
80000140-35 = "And it even looks like a tall pile of money."
80000140-36 = "[s] \"...Now THAT sounds like Yakumo...\""
80000140-37 = "So, I'm telling you that medovik is an important cake to me. Just looking at it fills up my heart with emotion, Sensei."
80000140-38 = "And again, this is handmade. Hand. Made."
80000140-39 = "To give such a cake on this holiday, right here in the printing office—my workplace, my sanctuary, my battlefield."
80000140-40 = "\"Surely Sensei, of all people, knows what this means, right?\" Heh, heh, heh."
80000140-41 = "[s] \"So, Yakumo.\""
80000140-42 = "Yes, what is it, Sensei?"
80000140-43 = "[s] \"Who did you outsource this to?\""
80000140-44 = "What?! H-How did you...?!"
80000140-45 = "What? I should \"reflect on my past behavior\"?"
80000140-46 = "You're too mean! I'm not usually that...!"
80000140-47 = "...that..."
80000140-48 = "..."
80000140-49 = "Shouldn't we leave the past behind and take new, wise steps towards the hopeful future?"
80000140-50 = "[s] \"Yakumo, Yakumo...\""
80000140-51 = "...All right, you got me..."
80000140-52 = "But it's not like I purchased this ONLY to show off."
80000140-53 = "And remember! I didn't lie!"
80000140-54 = "Because, like I said earlier, I believe trust to be one of the three principles of negotiation!"
80000140-55 = "After all, the cafe made the cake by HAND, didn't they?"
80000140-56 = "The thing is, a new cafe opened up near Red Winter, and they came to me wanting some quality advertising."
80000140-57 = "I tried \"negotiating\" with them, but, given the holiday..."
80000140-58 = "...I agreed to give them a discount, PROVIDED they offer me a special cake to sample."
80000140-59 = "I assure you, I only agreed because I was thinking of you."
80000140-60 = "[s] \"Yeah. Thank you for the sentiment.\""
80000140-61 = "Yes. Chocolate medovik on Valentine's Day. I negotiated a quality deal and now we both get to profit."
80000140-62 = "[s] \"...Yeah. Thank you for being honest...\""
80000140-63 = "...Who said I was being honest?"
80000140-64 = "Please take your time and enjoy it. Um... It seems I've run out of tricks, so I'll be on my way. Heh, heh, heh."
80000140-69 = "S-Sensei?! Wh-What are you suddenly grabbing my hand...?"
80000140-70 = "What? It'll be meaningless if we don't \"eat it together\"? But this is something I got just for you."
80000140-71 = "\"That's all the more reason\"?"
80000140-72 = "Here? In the printing office? While I like it here, I doubt you enjoy the ambiance."
80000140-73 = "...It's not exactly a picnic, with all the clanking, the heat, the scent of ink... Isn't it all a little off-putting?"
80000140-74 = "Well...just like me, I suppose."
80000140-75 = "Thinking about it, maybe this is a fitting ending, in a way."
80000140-76 = "[s] \"We can just go elsewhere, then.\""
80000140-77 = "Wh-What?"
80000140-78 = "That's, that's true, but..."
80000140-79 = "..."
80000140-80 = "Okay."
80000140-81 = "Since things have to come to this, let's have a proper \"negotiation\" and make a good outing out of it. Heh, heh, heh."
80000140-83 = "And so, Yakumo and I went to that cafe that has just opened."
80000140-89 = "Surely enough, the conversation with Yakumo happened to be a bit presumptuous, slightly dangerous, and definitely came close to skirting the line."
80000140-90 = "But it was fun nonetheless."
