[translation]
80000140-1 = "เค้กน้ำผึ้งช็อกโกแลต"
80000140-2 = "ถึงจะเป็นคำถามที่กะทันหันไปหน่อย แต่คุณครูคิดว่าหลักการสามประการของการเจรจามีอะไรบ้างคะ?"
80000140-3 = "[s] \"คำถามแบบนี้มักถามเพื่อบอกว่า 'ข้อโต้แย้งของฉัน' คืออะไรนะ...\""
80000140-4 = "อะไรกัน แบบนี้การพูดคุยก็จบเร็วไปน่ะสิ แต่นี่ก็เป็นเหตุผลที่ฉันชอบคุณครูนะคะ ฮิ ฮิ ฮิ"
80000140-5 = "ข้อแรกเลยคือการฟังค่ะ"
80000140-6 = "[s] \"อืม เรื่องนี้ก็สำคัญนะ\""
80000140-7 = "ค่ะ สิ่งสำคัญคือการโน้มน้าว... ให้คนอื่นตั้งใจฟังคำพูดของเราค่ะ"
80000140-8 = "[s] \"เดี๋ยวก่อนนะ\""
80000140-9 = "ข้อสองคือผลกำไรค่ะ ผลกำไรเป็นปัจจัยที่สำคัญเสมอเลยค่ะ "
80000140-10 = "และเป็นเหตุผลที่จะทำให้ฝ่ายตรงข้ามเชื่อว่าสิ่งที่เราพูดจะเป็นประโยชน์ต่อทั้งสองฝ่ายด้วย"
80000140-11 = "และข้อสุดท้ายคือความไว้วางใจค่ะ"
80000140-12 = "เราต้องสร้างบรรยากาศให้อีกฝ่ายรับรู้ได้ว่าถ้าไม่ทำตามที่บอกจะต้องเผชิญกับปัญหาใหญ่ เพื่อปิดตายทุกทางหนีทีไล่ยังไงล่ะคะ"
80000140-13 = "[s] \"ที่พูดมาก็ดีอยู่หรอก แต่คำอธิบายมันแปลกๆ นะ!\""
80000140-14 = "ถ้าบอกว่าสิ่งที่ฉันพูดมาฟังดูดีแล้ว ก็ถือว่าสำเร็จไปกว่าครึ่งแล้วไม่ใช่เหรอคะ?"
80000140-15 = "ยังไงก็ตาม การเจรจาก็เป็นสิ่งที่ต้องอาศัยทักษะค่ะ"
80000140-16 = "เพราะมันเป็นงานประเภทที่ต้องเข้าหาอีกฝ่ายในลักษณะที่แสดงให้เห็นว่ามีการแลกเปลี่ยนในสิ่งที่#nต้องการของกันและกันค่ะ"
80000140-17 = "และในแง่นั้นก็คือ นี่ค่ะ ฉันเอาเจ้านี่มาด้วยค่ะ"
80000140-23 = "[ns] \"นี่มัน... เค้กช็อกโกแลต?\""
80000140-24 = "ค่ะ เป็นเค้กชนิดหนึ่งที่มีเรียกว่า[ruby=Medovik]เค้กน้ำผึ้ง[/ruby]ค่ะ"
80000140-25 = "ทาน้ำผึ้งลงบนแผ่นแป้งเค้กบางๆ แล้วก็ตามด้วยครีม จากนั้นก็วางแผ่นแป้งเค้กซ้อนลงไปอีกชั้น"
80000140-26 = "เค้กชนิดนี้เป็นเค้กสูตรเฉพาะของเรดวินเทอร์ที่ทำขึ้นโดยการวางเรียงแผ่นแป้งเค้กทาน้ำผึ้งซ้อนกัน#nเป็นชั้นๆ ค่ะ"
80000140-27 = "และนี่ก็คือเค้กน้ำผึ้งที่เปลี่ยนเนื้อเค้กให้เป็นเนื้อเค้กช็อกโกแลต แล้วก็เปลี่ยนครีมที่ใช้เป็นช็อกโกแลตค่ะ"
80000140-28 = "บอกไว้ก่อนว่าเป็นเค้กโฮมเมดนะคะ~ ก็วันนี้เป็นวันวาเลนไทน์นี่นา เป็นวันที่คนที่เคยจับเงินทองมาก่อน#nไม่มีวันที่จะไม่รู้จักแน่นอนค่ะ"
80000140-29 = "การนำช็อกโกแลตโฮมเมดมาให้ในวันแบบนี้มีความหมายแค่ไหน"
80000140-30 = "ถ้าเป็นคุณครูละก็ต้องทราบเป็นอย่างดีแน่นอนเลย ใช่มั้ยล่ะคะ~? ฮิ ฮิ ฮิ"
80000140-31 = "[s] \"อืม...\""
80000140-32 = "ขอบอกไว้ก่อนเลยนะคะ ฉันน่ะชอบเค้กนี้มากๆ อยู่แล้วค่ะ"
80000140-33 = "เพราะมันเป็นเค้กที่ซ้อนกันเป็นชั้นๆ เวลามองจากด้านข้างแล้วจะเหมือนหนังสือที่กองซ้อนทับกันอยู่#nเลยค่ะ"
80000140-34 = "[s] \"เหตุผลโรแมนติกจังเลยนะ\""
80000140-35 = "ยิ่งกว่านั้น มันยังดูเหมือนกองเงินที่ซ้อนกันสูงๆ ด้วยค่ะ"
80000140-36 = "[s] \"คราวนี้เป็นเหตุผลที่สมกับเป็นยาคุโมะดีแฮะ...\""
80000140-37 = "ยังไงก็ตาม สำหรับฉันแล้วเค้กน้ำผึ้งมีความหมายหลายอย่างเลยค่ะ เป็นเค้กที่แค่ได้เห็นก็ทำให้อิ่มเอม#nหัวใจแล้วค่ะ คุณครู"
80000140-38 = "ขอย้ำอีกครั้งนะคะ นี่เป็นเค้กโฮมเมดนะคะ ทำเองกับมือเลยค่ะ"
80000140-39 = "การที่นำเค้กแบบนี้มามอบให้ในวันแบบนี้ แถมยังมอบให้ในโรงพิมพ์ที่เป็นทั้งที่ทำงานและสนามรบ#nของฉันแบบนี้ มันมีความหมายว่ายังไง..."
80000140-40 = "ถ้าเป็นคุณครูละก็ต้องทราบเป็นอย่างดีแน่นอนเลย ใช่มั้ยล่ะคะ~? ฮิ ฮิ ฮิ"
80000140-41 = "[s] \"คือว่านะยาคุโมะ...\""
80000140-42 = "มีอะไรเหรอคะ~?"
80000140-43 = "[s] \"เธอจ้างใครทำเค้กนี่เหรอ?\""
80000140-44 = "คะ?! ทะ... ทำไมคุณครูถึง...?!"
80000140-45 = "คะ? ให้ฉันลองทบทวนพฤติกรรมของตัวเองดูงั้นเหรอคะ?"
80000140-46 = "พูดเกินไปแล้วนะคะ! ปกติแล้วฉันไม่ได้....!"
80000140-47 = "ไม่ได้... ไม่ได้..."
80000140-48 = "......"
80000140-49 = "เราทุกคนควรจะลืมอดีตที่ผ่านไป แล้วก้าวต่อไปเพื่ออนาคตที่สดใสกันไม่ใช่เหรอคะ?"
80000140-50 = "[s] \"นี่ยาคุโมะ... ยาคุโมะเอ๋ย...\""
80000140-51 = "ช่วยไม่ได้นะคะ..."
80000140-52 = "ถึงอย่างนั้น ฉันก็ไม่ได้ซื้อมาตั้งเอาไว้ดูเฉยๆ... หรอกนะคะ..."
80000140-53 = "เพราะอย่างนั้นแหละค่ะ! ฉันไม่ได้โกหกหรอกนะคะ!"
80000140-54 = "อย่างที่บอกไปค่ะ หนึ่งในหลักการสำคัญของการเจรจาคือความเชื่อใจค่ะ!"
80000140-55 = "ค่ะ... เค้กโฮมเมดของคาเฟ่ ก็นับเป็นเค้กโฮมเมดเหมือนกันนี่คะ"
80000140-56 = "ที่จริงแล้ว ใกล้ๆ สำนักเลขาธิการ มีคาเฟ่เปิดใหม่อยู่ค่ะ และที่ร้านก็กำลังอยากโปรโมตอยู่พอดีด้วย"
80000140-57 = "ฉันเลยเจรจากับทางร้านว่าจะโปรโมตให้เป็นการตอบแทนที่ให้ส่วนลด และเนื่องจากวันนี้เป็นวันเทศกาล..."
80000140-58 = "ก็เลยลอง \"เจรจา\" ขอเค้กตัวอย่างมาน่ะค่ะ..."
80000140-59 = "ทั้งที่ตัวฉันทำลงไป... เพราะนึกถึงคุณครูแท้ๆ..."
80000140-60 = "[s] \"นั่นสินะ ขอบคุณที่นึกถึงครูนะ\""
80000140-61 = "ค่ะ เค้กช็อกโกแลตน้ำผึ้งสำหรับวันวาเลนไทน์แบบนี้ ฉันคิดว่าถ้าทุ่มสุดตัวก็น่าจะใช้เจ้านี่มาเจรจา#nต่อรองสร้างกำไรครั้งใหญ่ได้ค่ะ"
80000140-62 = "[s] \"งั้นเหรอ ขอบคุณที่บอกมาตามตรงนะ...\""
80000140-63 = "ที่จริง... ฉันก็ยังไม่ได้บอกไปทั้งหมดหรอกค่ะ..."
80000140-64 = "ยังไงก็ค่อยๆ ทานนะคะ อืม... ในเมื่อแผนการของนักเจรจาถูกเปิดเผยแล้ว ฉันก็ขอตัวก่อนนะคะ ฮิ ฮิ ฮิ"
80000140-69 = "คะ... คุณครู?! จะ... จู่ๆ จับมือฉันไว้ทำไม... กันคะ?"
80000140-70 = "คะ? ถ้าไม่กินด้วยกันก็ไม่มีความหมายงั้นเหรอคะ? แต่ฉันเตรียมมาให้คุณครูนะคะ...?"
80000140-71 = "เพราะงั้นเลยยิ่งต้องมากินด้วยกันเหรอคะ?"
80000140-72 = "ตะ... แต่ว่าที่นี่คือโรงพิมพ์นะคะ แน่นอนว่ามันเป็นสถานที่ที่มีความหมายสำหรับฉัน แต่ไม่น่าจะมีความหมายอะไรสำหรับคุณครูนี่คะ...!"
80000140-73 = "แถมสถานการณ์ตอนนี้ และบรรยากาศของที่นี่ก็ไม่น่าเหมาะสำหรับใช้เป็นพื้นที่สังสรรค์ด้วย..."
80000140-74 = "ก็... เหมือนตัวฉันในตอนปกติยังไงล่ะคะ"
80000140-75 = "พอคิดดูแล้ว นี่ก็อาจจะเป็นบทสรุปที่เหมาะกับฉันก็ได้นะคะ..."
80000140-76 = "[s] \"แค่ย้ายที่ก็พอแล้วนี่นา ทำไมเหรอ\""
80000140-77 = "คะ...?"
80000140-78 = "มะ... มันก็จริงอยู่หรอกค่ะ แต่ว่า..."
80000140-79 = "......"
80000140-80 = "เข้าใจแล้วค่ะ"
80000140-81 = "ไหนๆ ก็เป็นแบบนี้แล้ว งั้นเรามา \"เจรจา\" กันให้ถูกต้องเถอะค่ะ ฮิ ฮิ ฮิ"
80000140-83 = "(หลังจากนั้นคุณครูกับยาคุโมะก็ไปที่คาเฟ่เปิดใหม่ด้วยกัน)"
80000140-89 = "(และก็เป็นไปตามคาด การพูดคุยกับยาคุโมะแฝงไปด้วยความโอ้อวดและความอันตรายอยู่เล็กน้อย และบางครั้งก็เหมือนกำลังเดินอยู่บนเส้นลวดบางๆ...)"
80000140-90 = "(แต่ก็เป็นการพูดคุยที่สนุกมาก)"
