[translation]
80000140-1 = "巧克力蜂蜜蛋糕"
80000140-2 = "雖然很突然，不過你認為協商的三大原則是什麼？"
80000140-3 = "[s]「通常問這種問題，是為了說『我的主張是這樣』吧……」"
80000140-4 = "哎呀，話題進展得真快啊。#n我就是因為這樣才喜歡老師，呣呵呵。"
80000140-5 = "首先第一個是傾聽。"
80000140-6 = "[s]「嗯。那確實很重要呢。」"
80000140-7 = "是的。讓對方乖乖聽我的話，脅……引導是很重要的。"
80000140-8 = "[s]「等一下。」"
80000140-9 = "第二個是利益。利益永遠都是重要的要素。 "
80000140-10 = "同時也是需要讓對方相信「雙方都能獲益」的原因。"
80000140-11 = "最後是信賴。"
80000140-12 = "必須營造出「不聽話的下場會很慘」的氣氛，讓對方無處可逃。"
80000140-13 = "[s]「用詞是還挺不錯的，但你的說明也太奇怪了吧！」"
80000140-14 = "既然用詞還不錯的話，也算是成功一半了吧？"
80000140-15 = "總之，協商是需要技巧的。"
80000140-16 = "因為要用以物易物的方式去交涉。"
80000140-17 = "從這個意義上來說……來。我帶來了這個。"
80000140-23 = "[ns]「這是……巧克力蛋糕？」"
80000140-24 = "沒錯，這是一種叫做Medovik的蛋糕。 "
80000140-25 = "在薄薄的海綿蛋糕片上塗上蜂蜜與奶油，然後再疊上海綿蛋糕片。"
80000140-26 = "就這樣把蛋糕片、蜂蜜、奶油層層疊起的赤冬特產蛋糕。"
80000140-27 = "而這是把蛋糕片換成巧克力口味，奶油換成巧克力奶油的巧克力Medovik。"
80000140-28 = "順帶一提這是手工做的，手工做的哦～#n今天可是有點常識的人都不可能不知道的情人節。"
80000140-29 = "在這樣的日子裡，帶來手工巧克力的含意……"
80000140-30 = "老師應該不會不知道吧～？呣呵呵呵呵。"
80000140-31 = "[s]「哦……？」"
80000140-32 = "順帶一提，我本來就很喜歡這款蛋糕。"
80000140-33 = "因為是層層疊起的蛋糕，橫切面看起來就像堆滿的書一樣。"
80000140-34 = "[s]「是個很浪漫的理由呢。」"
80000140-35 = "進一步來說，看起來也像是堆滿了鈔票。"
80000140-36 = "[s]「那倒是很有八雲風格的理由呢……」"
80000140-37 = "總之，Medovik對我而言是看著就能讓心靈富足，並且具有重要意義的蛋糕。"
80000140-38 = "再強調一次，這是手工製作的哦。"
80000140-39 = "這樣的日子、這樣的蛋糕，還是在對我如同戰場般的印刷所送出……#n其中代表著什麼意義……"
80000140-40 = "老師應該不會不知道吧～？呣呵呵呵。"
80000140-41 = "[s]「所以說，八雲。」"
80000140-42 = "怎麼了～？"
80000140-43 = "[s]「這是外包給誰做的？」"
80000140-44 = "什麼！？你，你怎麼會……！？"
80000140-45 = "咦？要我反省一下平時的行為？"
80000140-46 = "太過分了！我平時有那麼……！"
80000140-47 = "那麼過分……"
80000140-48 = "……"
80000140-49 = "我們大家不是都應該乾脆地忘掉過去，朝著充滿希望的未來邁出明智的步伐嗎？"
80000140-50 = "[s]「八雲啊，八雲……」"
80000140-51 = "看來沒辦法了呢……"
80000140-52 = "不過，這也不完全是為了敷衍了事隨手弄來的東西……"
80000140-53 = "而且！我並沒有說謊！"
80000140-54 = "就像剛才提過的一樣，我認為協商的三大原則之一就是信賴！"
80000140-55 = "而且……咖啡廳的手工蛋糕，也能算是手工蛋糕吧……"
80000140-56 = "其實事務局附近新開了一家咖啡廳，正好表示需要打廣告。"
80000140-57 = "我就說可以便宜一點提供廣告版面，剛好今天又是這樣的日子……"
80000140-58 = "所以就嘗試「協商」了一下，看看能不能拿到蛋糕的樣品……"
80000140-59 = "以我自己的立場來說，這是為了老師才做出的行動。"
80000140-60 = "[s]「好吧。那份心意我很感謝。」"
80000140-61 = "對吧。如果在情人節送出Medovik的話，應該能大肆協商一番狠狠獲利才對。"
80000140-62 = "[s]「……好吧。謝謝你坦白跟我說……」"
80000140-63 = "其實也沒有多麼坦白啦……"
80000140-64 = "那麼，就請老師慢慢享用吧。#n嗯……底牌被看穿的協商者就先告辭了。呣呵呵。"
80000140-69 = "老，老師！？#n為，為什麼突然抓住我的手……？"
80000140-70 = "咦？不一起吃就沒有意義了……？#n可是這是我為老師準備的……"
80000140-71 = "正因如此才更應該一起吃……？"
80000140-72 = "可，可是這個印刷所雖然對我很有意義，對於老師來說應該不是才對……！"
80000140-73 = "無論氣氛還是情況，就各方面而言……這裡都不太適合一起享用茶點吧……"
80000140-74 = "嗯……就像平時的我一樣。"
80000140-75 = "你想想看，這樣的結局也挺符合我一貫的風格吧……"
80000140-76 = "[s]「所以換個地方就行了對吧。」"
80000140-77 = "咦，咦？"
80000140-78 = "那，那倒是沒錯……"
80000140-79 = "……"
80000140-80 = "我明白了。"
80000140-81 = "既然老師都這麼說了……#n我就好好「協商」一番，確實蹭一頓飯吧。呣呵呵。"
80000140-83 = "（就這樣和八雲一起，前往了那家據說是新開的咖啡廳）"
80000140-89 = "（果然和八雲的對話充滿著有點刺激、危險、遊走在邊緣的感覺）"
80000140-90 = "（度過了一段愉快的時光）"
