80000140-66 = "#clearST"
80000140-67 = "3;야쿠모;04\n#3;d\n#wait;1000"
80000140-68 = "3;야쿠모;12\n#3;a\n#wait;1500\n#3;closeup"
80000140-69 = "3;야쿠모;13;서, 선생님?! 가, 갑자기 제 손은 왜 잡으시는, 건가…… 요?\n#3;em;[///]\n#3;closeup"
80000140-70 = "3;야쿠모;02;예? 같이 먹지 않으면 의미가 없다고요? 하지만 이건 제가 선생님을 위해서 준비한 건데요……?\n#3;em;[?]\n#3;closeup"
80000140-71 = "3;야쿠모;01;오히려 그러니까 더 같이 먹어야 할 것 같다고요?\n#3;closeup"
80000140-72 = "3;야쿠모;04;그, 그렇지만 여기는 인쇄소고, 물론 저에게야 의미가 있는 곳이지만 선생님에게는 그렇지 않을 거고……!\n#3;closeup"
80000140-73 = "3;야쿠모;12;……다과를 나누기에는 분위기도 상황도, 여러 가지로…… 어울리지 않는 곳이 아닐까 합니다만…….\n#3;em;[…]\n#3;closeup"
80000140-74 = "3;야쿠모;09;뭐…… 평소의 저처럼, 말이죠.\n#3;closeup"
80000140-75 = "3;야쿠모;08;생각해 보니 이거, 나름 어울리는 결말이려나요…….\n#3;closeup"
80000140-76 = "[s]\"자리 옮기면 돼지, 왜.\""
80000140-77 = "3;야쿠모;02;네, 네에?\n#3;em;[?]"
80000140-78 = "3;야쿠모;12;그건, 그렇기는 합니다만…….\n#3;em;[///]"
80000140-79 = "3;야쿠모;02;……."
80000140-80 = "3;야쿠모;03;알겠습니다.\n#3;greeting"
80000140-81 = "3;야쿠모;07;이왕 이렇게 된 거, 제대로 '협상'해서 확실하게 얻어먹기로 하죠. 힛. 힛. 히.\n#3;em;[음표]"
