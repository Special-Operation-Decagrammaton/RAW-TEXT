[translation]
80000140-1 = "#title;초콜릿 미다비크"
80000140-2 = "3;야쿠모;02;갑작스럽지만, 협상의 3원칙이 뭐라고 생각하십니까?\n#3;a\n#3;em;[반응]"
80000140-3 = "[s]\"보통 이런 질문은, '내 주장은 이렇다'는 말을 하기 위해서지…….\""
80000140-4 = "3;야쿠모;00;뭐야, 이야기가 빠르지 않습니까. 제가 이래서 선생님을 좋아한다니까요. 힛. 힛. 히.\n#3;em;[음표]"
80000140-5 = "3;야쿠모;99;우선 첫 번째는 경청입니다."
80000140-6 = "[s]\"음. 중요하지.\""
80000140-7 = "3;야쿠모;01;네. 상대에게 내 말을 잘 듣도록 협ㅂ…… 유도하는 것이 중요하죠."
80000140-8 = "[s]\"잠깐만.\""
80000140-9 = "3;야쿠모;02;두 번째는 이득입니다. 이득은 언제나 중요한 요소죠. \n#3;em;[...]"
80000140-10 = "3;야쿠모;03;상대에게 이렇게 하면 서로 이득을 볼 수 있을 것이라고, 믿게 하는 것이 필요한 이유이기도 합니다."
80000140-11 = "3;야쿠모;01;마지막으로는 신뢰입니다."
80000140-12 = "3;야쿠모;03;내 말을 지키지 않으면 큰일이 나고 말 것이라는 분위기를 조성해, 빠져나갈 틈을 없게 만들어 두어야 하는 것이죠.\n#3;em;[재잘]"
80000140-13 = "[s]\"단어는 좋은데 설명이 왜 그래!\""
80000140-14 = "3;야쿠모;04;단어라도 좋았다니 절반은 성공한 셈 쳐야 하지 않을까요?\n#3;em;[?]"
80000140-15 = "3;야쿠모;02;아무튼, 협상에는 기술이 필요합니다."
80000140-16 = "3;야쿠모;07;이쪽에서는 이것을 제공할 테니, 그 대신 상대에게는 저것을 달라는 식으로 접근해야 하는 일이거든요."
80000140-17 = "3;야쿠모;03;그런 의미에서, 자. 가져왔습니다."
80000140-18 = "#st;[0,0];instant;1;"
80000140-19 = "#clearST"
80000140-20 = "3;야쿠모;03\n#3;m5\n#wait;1000"
80000140-21 = "3;야쿠모;03\n#3;greeting\n#wait;1500"
80000140-22 = "#wait;2000"
80000140-23 = "[ns]\"이건…… 초콜릿케이크?\""
80000140-24 = "3;야쿠모;03;네. 그중에서도 [ruby=Medovik]미다비크[/ruby]라는 케이크입니다. \n#3;em;[반짝]"
80000140-25 = "3;야쿠모;01;얇은 스펀지케이크 시트 위에 꿀을 바르고, 크림을 바르고, 다시 스펀지케이크 시트를 쌓고."
80000140-26 = "3;야쿠모;02;그렇게 케이크 시트, 꿀, 크림을 층층이 쌓아 올린 붉은겨울 특산 케이크죠."
80000140-27 = "3;야쿠모;03;그리고 이건 케이크 시트를 초콜릿케이크로, 크림을 초코 크림으로 바꾼 초콜릿 미다비크이고요.\n#3;m3"
80000140-28 = "3;야쿠모;07;참고로 수제랍니다, 수제~ 오늘은 돈 좀 만져 본 사람이면 모를 수가 없는 발렌타인 데이.\n#3;em;[음표]"
80000140-29 = "3;야쿠모;11;그런 날에 수제 초콜릿을 가져왔다는 것이 어떤 의미인지."
80000140-30 = "3;야쿠모;03;다른 분도 아니고 선생님께서 모르시지는 않겠죠오~? 힛. 힛. 히."
80000140-31 = "[s]\"호오…….\""
80000140-32 = "3;야쿠모;07;조금 더 이야기를 드리자면, 저는 애초에 이 케이크를 상당히 좋아합니다."
80000140-33 = "3;야쿠모;03;켜켜이 쌓아 올린 케이크이다 보니, 그 단면이 뭔가 가득 쌓인 책처럼 보이거든요."
80000140-34 = "[s]\"그건 낭만적인 이유네.\""
80000140-35 = "3;야쿠모;11;그리고 나아가, 돈이 가득 쌓여 있는 것처럼 보이기도 하고요."
80000140-36 = "[s]\"……그건 야쿠모다운 이유네…….\""
80000140-37 = "3;야쿠모;02;아무튼, 미다비크는 저에게 있어 보는 것만으로 마음이 풍요로워지는, 그런 중요한 의미를 갖는 케이크라는 겁니다. 선생님.\n#3;em;[한숨]"
80000140-38 = "3;야쿠모;03;다시 말씀드리지만, 이거 수제라고요. 수제."
80000140-39 = "3;야쿠모;09;이런 날에, 이런 케이크를, 그것도 제 현장이자 전쟁터나 다름없는 인쇄소에서 드린다는 것이 어떤 의미인지."
80000140-40 = "3;야쿠모;00;'다른 분도 아니고 선생님께서 모르시지는 않겠죠오~?' 힛. 힛. 히.\n#3;jump"
80000140-41 = "[s]\"그래서 야쿠모야.\""
80000140-42 = "3;야쿠모;11;왜 그러시나요~?\n#3;em;[?]"
80000140-43 = "[s]\"이건 누구에게 하청을 줘서 만든 거니?\""
80000140-44 = "3;야쿠모;13;넷?! 그, 그걸 어떻게……?!\n#3;em;[?!]\n#3;shake"
80000140-45 = "3;야쿠모;12;예? 평소 제 행실을 돌이켜 보라고요?"
80000140-46 = "3;야쿠모;04;너무하시네요! 제가 평소에 그렇게까지……!\n#3;em;[땀]"
80000140-47 = "3;야쿠모;12;……그렇게, 까지……."
80000140-48 = "3;야쿠모;13;…….\n#3;em;[…]"
80000140-49 = "3;야쿠모;03;우리 모두 지나간 과거는 깨끗하게 잊고, 희망찬 미래를 향해 슬기로운 발걸음을 내디뎌야 하지 않겠습니까?"
80000140-50 = "[s]\"야쿠모야, 야쿠모야…….\""
80000140-51 = "3;야쿠모;07;……어쩔 수 없구만요……."
80000140-52 = "3;야쿠모;04;그래도 완전히 겉치레로 조달한 것은…… 아니긴 했는데 말이죠오…….\n#fontsize;60"
80000140-53 = "3;야쿠모;12;그래도 말입니다! 저는 거짓말은 하지 않았어요!\n#3;em;[!]"
80000140-54 = "3;야쿠모;00;말씀드렸지만, 저는 협상의 3원칙 중 하나가, 신뢰라고 생각하고 있으니까 말입니다!"
80000140-55 = "3;야쿠모;04;……네, 뭐……. 카페 수제 케이크도, 수제 케이크이긴 하니까 말이죠……."
80000140-56 = "3;야쿠모;11;사실 사무국 부지 근처에 카페가 새로 문을 열었는데, 마침 광고가 필요하다고 해서 말입니다.\n#3;em;[재잘]"
80000140-57 = "3;야쿠모;03;광고 지면을 조금 싸게 할애해 줄 테니, 마침 날도 날이고 해서……."
80000140-58 = "3;야쿠모;07;샘플 케이크를 받을 수 없겠냐고, '협상'을 시도했거든요……."
80000140-59 = "3;야쿠모;04;저 나름대로는, 선생님을 생각하면서 한 일이었는데 말입니다."
80000140-60 = "[s]\"그래. 그 마음은 고마워.\""
80000140-61 = "3;야쿠모;03;네. 발렌타인 데이에 초콜릿 미다비크라니, 이거라면 거하게 한 건 협상해서 제대로 이익을 볼 수 있을 것 같았거든요.\n#3;em;[음표]"
80000140-62 = "[s]\"……그래. 솔직하게 말해 줘서 고마워…….\""
80000140-63 = "3;야쿠모;11;……사실, 그렇게 솔직한 말은 아니었습니다만……."
80000140-64 = "3;야쿠모;04;그러면 천천히 드셔 주세요. 으음…… 밑천이 드러난 협상가는, 이만 물러나 보겠습니다. 힛. 힛. 히.\n#3;em;[…]"
