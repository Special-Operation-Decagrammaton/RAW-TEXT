[translation]
80000140-1 = "巧克力蜂蜜蛋糕"
80000140-2 = "雖然很突然，你認為協商的三大原則是什麼？"
80000140-3 = "[s]「通常問這種問題，是為了說『我的主張是這樣』吧……」"
80000140-4 = "哎呀，話題進展得真快啊。我就是因為這樣才喜歡老師的嘛。呣呵呵。"
80000140-5 = "首先第一個是傾聽。"
80000140-6 = "[s]「嗯。很重要呢。」"
80000140-7 = "是的。讓對方乖乖聽我的話，脅……引導是很重要的。"
80000140-8 = "[s]「等一下。」"
80000140-9 = "第二個是利益。利益永遠都是重要的要素。 "
80000140-10 = "這也是為什麼需要讓對方相信這樣做雙方都能獲益的原因。"
80000140-11 = "最後是信賴。"
80000140-12 = "要營造出不遵守我的話就會出大事的氣氛，讓對方無處可逃。"
80000140-13 = "[s]「詞彙是很好，但說明怎麼是這樣！」"
80000140-14 = "能說詞彙還不錯的話，不就該算成功了一半嗎？"
80000140-15 = "總之，協商需要技巧。"
80000140-16 = "因為要以我方提供這個，作為交換向對方要那個的方式去接洽。"
80000140-17 = "在這個意義上，拿去。我帶來了。"
80000140-23 = "[ns]「這是……巧克力蛋糕？」"
80000140-24 = "沒錯，這是一種叫做Medovik的蛋糕。 "
80000140-25 = "在薄薄的海綿蛋糕片上塗上蜂蜜與奶油，然後再疊上海綿蛋糕片。"
80000140-26 = "就這樣把蛋糕片、蜂蜜、奶油層層疊起的赤冬特產蛋糕。"
80000140-27 = "而這是把蛋糕片換成巧克力口味、奶油換成巧克力奶油的巧克力Medovik。"
80000140-28 = "順帶一提，這是手工做的，手工做的哦～#n今天可是做過生意的人不可能不知道的情人節。"
80000140-29 = "在這樣的日子，帶來手工巧克力意味著什麼……"
80000140-30 = "老師應該不會不知道吧～？呣呵呵呵呵。"
80000140-31 = "[s]「哦……？」"
80000140-32 = "再多說一點的話，我本來就很喜歡這款蛋糕。"
80000140-33 = "因為是層層疊起的蛋糕，橫切面看起來就像堆滿的書一樣。"
80000140-34 = "[s]「那倒是很浪漫的理由呢。」"
80000140-35 = "而且更進一步，看起來也像堆滿了鈔票。"
80000140-36 = "[s]「那倒是很有八雲風格的理由呢……」"
80000140-37 = "總之Medovik對我而言，是光看著就能讓心靈富足的、具有重要意義的蛋糕。"
80000140-38 = "再說一次，這是手工做的哦。手工。"
80000140-39 = "這樣的日子、這樣的蛋糕，而且還是在我的現場，也就是如同戰場般的印刷所送出，這代表什麼意義。"
80000140-40 = "「不是別人，老師應該不會不知道吧～？」嘻嘻嘻。"
80000140-41 = "[s]「所以啊八雲。」"
80000140-42 = "怎麼了～？"
80000140-43 = "[s]「這是外包給誰做的？」"
80000140-44 = "什！？你，你怎麼會……！？"
80000140-45 = "咦？你說讓我反省一下平時的行為？"
80000140-46 = "太過分了！我平時有那麼……！"
80000140-47 = "……那麼，過分……"
80000140-48 = "……"
80000140-49 = "我們大家不是都應該乾脆地忘掉過去，朝著充滿希望的未來邁出明智的步伐嗎？"
80000140-50 = "[s]「八雲啊，八雲啊……」"
80000140-51 = "……沒辦法了……"
80000140-52 = "不過也不是完全敷衍了事去弄來的……確實不是就是了……"
80000140-53 = "但是！我沒有說謊！"
80000140-54 = "我說過了，我認為協商三大原則之一就是信賴！"
80000140-55 = "……是啊，嗯……咖啡廳的手工蛋糕，確實也算是手工蛋糕就是了……"
80000140-56 = "其實事務局附近新開了一家咖啡廳，正好說需要打廣告。"
80000140-57 = "我說可以便宜一點提供廣告版面，正好今天又是這樣的日子……"
80000140-58 = "所以就嘗試「協商」了一下，能不能拿到蛋糕樣品……"
80000140-59 = "以我自己的方式來說，這是想著老師才做的事。"
80000140-60 = "[s]「好吧。那份心意我很感謝。」"
80000140-61 = "是啊。情人節的巧克力蜂蜜蛋糕，我覺得用這個應該能大大地協商一把好好獲利。"
80000140-62 = "[s]「……好吧。謝謝你坦白跟我說……」"
80000140-63 = "……其實，也沒有那麼坦白就是了……"
80000140-64 = "那麼請慢慢享用。嗯嗯……底牌被看穿的協商者，就此告退了。嘻嘻嘻。"
80000140-69 = "老，老師！？為，為什麼突然抓住我的手……呢？"
80000140-70 = "咦？你說不一起吃就沒有意義嗎？可是這是我為老師準備的……？"
80000140-71 = "正因如此才更應該一起吃嗎？"
80000140-72 = "可，可是這裡是印刷所，雖然對我來說是有意義的地方，但對老師來說應該不是……！"
80000140-73 = "……不管是氣氛還是狀況，在各方面……這裡都不太適合一起享用茶點吧……"
80000140-74 = "嗯……就像平時的我一樣。"
80000140-75 = "想想看，這也算是蠻搭的結局吧……"
80000140-76 = "[s]「換個地方不就好了，幹嘛。」"
80000140-77 = "咦，咦？"
80000140-78 = "那，那倒是沒錯……"
80000140-79 = "……"
80000140-80 = "我明白了"
80000140-81 = "既然都這樣了，就好好地「協商」一下確實蹭一頓吧。嘻嘻嘻。"
80000140-83 = "（就這樣和八雲一起，前往了那家據說新開的咖啡廳）"
80000140-89 = "（而且果然和八雲的對話有點放肆、有點危險、有點踩線）"
80000140-90 = "（果然，很開心）"
