[translation]
90002030-1 = "第3話;出擊"
90002030-2 = "那麼，我來整理一下情況。"
90002030-3 = "現在有一個已經查明的事實，還有一個必須解決的問題。#n要先聽哪一個呢？"
90002030-5 = "通常必須解決的「問題」聽起來都比較沉重，還是先談已經查明的事實吧。"
90002030-7 = "首先，我們已經查明在提法瑞特的種子保管所，#n以及在這裡襲擊我們的十字神名新型兵種的相關情報。"
90002030-8 = "是的。那個兵種的型號名稱似乎是[ruby=Labor]「勞工機器人」[/ruby]。"
90002030-10 = "勞工……機器人？"
90002030-15 = "也就是勞動者的意思。#n從這個兵種的職責來看，可以稱得上是相當貼切吧。"
90002030-16 = "至少就目前掌握的資訊來看，勞工機器人的種類最多有三種。"
90002030-17 = "嗯，我也有在現場感覺到。#n首先是外部有裝甲包覆，呈長方體形狀的型號。"
90002030-18 = "沒錯！這種型號非常堅固！"
90002030-19 = "直觀來看，我想應該可以稱之為「防禦型勞工機器人」。"
90002030-20 = "再來是裝甲強度比防禦型稍弱，配備有一眼就能看出的巨大砲塔的型號。"
90002030-22 = "雖然在設計層面上不太滿意……不過應該可以稱之為「砲塔型勞工機器人」。"
90002030-23 = "除，除此之外……還有一種相對較小、疑似是其他兩種型號原型的勞工機器人……"
90002030-25 = "既然看起來像原型，就稱之為「基本型勞工機器人」吧。"
90002030-26 = "通常小巧的東西往往看起來會比較可愛……#n不過這怎麼看都像蜘蛛，實在是沒有那種感覺呢……"
90002030-27 = "你的意思是蜘蛛不可愛嗎？"
90002030-28 = "一般而言是這樣。#n當然你的審美本來就比較獨特，並且美學基本上也屬於主觀的領域……"
90002030-30 = "好好好，這個話題就先說到這吧。部長、會長。"
90002030-31 = "[s]「還有什麼新發現嗎？」"
90002030-35 = "……有。甚至可能是最重要的部分。"
90002030-36 = "那些勞工機器人，基本上能將周圍的無機物都轉化成鋼鐵大陸的構成成分。"
90002030-37 = "也就是說……？"
90002030-38 = "咦？所以打從一開始，就是那些傢伙在擴大鋼鐵大陸嗎？"
90002030-39 = "我想應該不是一開始就是這樣的。"
90002030-40 = "勞工機器人開始量產的時間點，應該是在鋼鐵大陸的基本結構與規模建立完成之後。"
90002030-41 = "而它們之所以接近我們的運輸船，很可能是為了將這艘船變成鋼鐵大陸的一部分。"
90002030-42 = "我們並沒有調查所有勞工機器人的創造紀錄，而且那實際上也是不可能做到的事。"
90002030-43 = "以目前能查到的結果來看……#n勞工機器人似乎正在重新整備急速擴大的鋼鐵大陸內部構造。"
90002030-44 = "重新整備……？"
90002030-45 = "例如建造結構物，或者修復受損區域……"
90002030-46 = "以及對擴大過程中吸入的無機物進行同化。"
90002030-47 = "啊，所以才會對我們的運輸船……"
90002030-49 = "這樣事實的部分算是搞清楚了。#n那麼必須解決的問題是什麼呢，部長？"
90002030-50 = "這個部分，說起來其實很容易……"
90002030-54 = "那就是突破耶索德。"
90002030-55 = "[s]「……」"
90002030-56 = "我先整理一下目前已知的，有關於第9名預言者耶索德的情報。"
90002030-57 = "特別的是，耶索德並沒有原型的型態。"
90002030-58 = "那是什麼意思呢，莉央大人？"
90002030-59 = "以霍德為例，它原本是千年科學學園通訊網的設置單元AI「hub」。"
90002030-60 = "霍刻瑪是工程船，葛夫拉則是無人探測機。"
90002030-61 = "這些預言者都是既有的AI系統結構體，#n在連同其AI一起被十字神名駭入後創造出來的。"
90002030-62 = "唯一能稱得上例外的，大概就是薇娜了吧……#n因為薇娜最早的目擊記錄，出自於數十年前的阿拜多斯沙漠。"
90002030-63 = "意思是耶索德並非如此對吧，莉央。"
90002030-64 = "沒錯。雖然這只是我的推測……"
90002030-65 = "耶索德應該是在鋼鐵大陸構築到一定程度之後，才以此為基礎創造的預言者。"
90002030-68 = "否則我們不可能直到現在才察覺到耶索德如此龐大的訊號。"
90002030-69 = "是啊，這是個合理的推測。"
90002030-71 = "可以說耶索德不像其他預言者那樣，需要被結構體覆蓋或保有原型……"
90002030-72 = "而是純粹為了某種目的所製造，經過「最佳化」的預言者對吧？"
90002030-73 = "……應該是這樣沒錯。"
90002030-74 = "那驚人的體型與威力，恐怕也是這種最佳化的結果。"
90002030-76 = "怎麼越講越覺得無解了呢……"
90002030-77 = "不，不會的！愛麗絲……大家一定能做到的！"
90002030-78 = "勇，勇者……在出發冒險之前不可以害怕……唔哇！"
90002030-79 = "[s]（看起來已經有點害怕了……）"
90002030-81 = "不過也因為它是在鋼鐵大陸上創造出來的，反而也有值得感到慶幸的地方。"
90002030-82 = "怎麼說呢，英美同學？"
90002030-83 = "你們看，它似乎被固定在屏障上無法移動吧？"
90002030-84 = "沒，沒錯……在遊戲裡面，超大型BOSS通常也是無法隨意移動的……"
90002030-85 = "我其實沒有要把一切比喻成遊戲的意思……"
90002030-87 = "呵呵，不過剛才柚子可能也說到了一個重點。"
90002030-88 = "即便是十字神名的預言者，或者經過最佳化的結構體……#n只要具備質量並進行實體化，就一定會有無法避免的限制。"
90002030-89 = "無法避免的限制……？"
90002030-90 = "原來如此。是速度與耐久性吧。"
90002030-91 = "沒錯。想移動如此巨大的質量，就勢必需要相對應的能量。"
90002030-92 = "雖然可以透過高度集中輸出的方式，讓巨大的質量體快速移動……#n不過這樣一來，耐久性自然也會有極限。"
90002030-93 = "當然我們並不清楚構成鋼鐵大陸的那種神祕物質，#n其強度、硬度與耐久性究竟如何。"
90002030-94 = "不過凡是具有質量的實體，就不可能擁有無限的耐久性。"
90002030-95 = "[s]「也就是說……？」"
90002030-96 = "沒錯，就是這樣，老師。"
90002030-97 = "耶索德的攻擊，一定會受到身為巨大質量體的行動限制。"
90002030-98 = "基於這點來進行作戰的話……"
90002030-99 = "……是佯攻作戰吧。"
90002030-100 = "是啊。如果是你……這種程度應該跟得上吧。"
90002030-101 = "耶索德的攻擊，嚴格來說是「揮動巨大手臂的攻擊」雖然致命而強大……"
90002030-102 = "不過也勢必伴隨相對的遲緩與笨重。"
90002030-103 = "只要我們之中有足夠敏捷且應變能力強的人，或許可以躲避一兩次攻擊。"
90002030-104 = "如此巨大的體型，終究還是會面臨一些限制的。"
90002030-105 = "至少要轉移耶索德的注意力，應該不成問題才對。"
90002030-106 = "接著我們再趁機搭著運輸船……"
90002030-107 = "對屏障上方發動突襲。"
90002030-113 = "簡直就像是我會提出的戰略呢，陽葵……"
90002030-114 = "……如果是以前的你，可能會不跟我們討論就直接執行吧。"
90002030-115 = "現在的你居然會先提出想法……"
90002030-116 = "……不，不對。#n應該說我們已經被逼到這種地步了吧。"
90002030-117 = "……沒時間了，莉央。"
90002030-118 = "是啊……"
90002030-119 = "[s1]「等等，大家先等一下。」\n[s2]「我好像還沒跟上你們的想法，想再確認一次……」"
90002030-122 = "……"
90002030-123 = "沒錯，老師。"
90002030-124 = "這是個在某人充當誘餌的同時，對耶索德發動攻擊的作戰。"
90002030-125 = "除了無法保證誘餌的安全之外，也同樣無法保證一定能順利打倒耶索德。"
90002030-126 = "換言之，這是個極有可能將某個人推向死亡的……作戰方案。"
90002030-127 = "[s3]「我……很難贊同這個方法。」\n[s4]「身為你們的……老師。」"
90002030-130 = "不過除了這個之外，我跟陽葵也提不出其他方法了。"
90002030-132 = "那，那麼……！這次也由愛麗絲……！"
90002030-133 = "……"
90002030-135 = "你是不行的，愛麗絲。"
90002030-136 = "為，為什麼呢？#n愛麗絲雖然還在見習卻也是勇者！所以必須保護身邊的人……！"
90002030-137 = "沒錯，正是因為你是勇者。"
90002030-138 = "所以你或許會成為我們的王牌。"
90002030-139 = "……意思是我也包含在那之中對吧？"
90002030-140 = "……沒錯。正是如此。"
90002030-141 = "你還是努力讓自己看起來那麼冷靜啊，莉央。"
90002030-142 = "……這種事我已經習慣了。"
90002030-143 = "我討厭你這一點。"
90002030-147 = "真的是……讓人氣到不行……！"
90002030-148 = "Kei不是隨時都在生氣嗎？"
90002030-149 = "雖然是這樣沒錯……啊，真是的！我不是那個意思啦！"
90002030-150 = "火跟岩漿當然都很燙，但岩漿總是更燙一點嘛！#n為什麼要火上澆油啊！！！"
90002030-151 = "[s]「真的……沒有其他方法了嗎？」"
90002030-153 = "……"
90002030-154 = "……"
90002030-155 = "（氣氛忽然變得沉重）"
90002030-156 = "（在沉默之中，時間仍舊流逝著……）"
90002030-161 = "那麼，就由我去吧。"
90002030-165 = "[ns]「！？」"
90002030-166 = "咦？英美！？"
90002030-171 = "總之只要吸引注意力和拖延時間就行了吧？"
90002030-173 = "那，那樣好像有點……！"
90002030-174 = "就，就是說啊！英美同學！#n老師他也很擔心……！"
90002030-176 = "沒關係。這樣是最有效率的。#n明確到連「大概」之類的修飾都不需要。"
90002030-177 = "況且我本來就習慣實戰，耐打程度跟速度也不錯。"
90002030-178 = "可，可是……！萬一出了什麼差錯……！"
90002030-179 = "[s5]「還是再考慮一下吧，英美……！」\n[s6]「我……不想看到你們受傷……！」"
90002030-182 = "……"
90002030-190 = "！？"
90002030-191 = "！？"
90002030-192 = "（英美靜靜地走近，並抱了過來）"
90002030-193 = "[s]「英，英美……？」"
90002030-196 = "果然老師的身體溫暖的，很舒服。"
90002030-197 = "沒問題的，老師。"
90002030-198 = "[s]「但是……！」"
90002030-199 = "嗯，我知道你要說什麼。"
90002030-200 = "但是……真的沒問題的。"
90002030-201 = "如果你真的為我們著想的話，這一次就相信我們吧。"
90002030-202 = "假如老師幫助學生是理所當然的，那麼學生想要幫助老師──也同樣是理所當然的。"
90002030-203 = "萬一我不幸因此受了重傷的話……"
90002030-204 = "到時候我可是會狠狠埋怨老師的，所以要對我負起一輩子的責任哦。"
90002030-205 = "那麼，我出發了。"
90002030-210 = "[ns]「英美！」"
90002030-213 = "……大家，開始行動吧。"
90002030-214 = "沒錯，開始吧。"
90002030-215 = "如果想要英美平安回來，我們就必須先有所覺悟。"
90002030-216 = "是吧，老師？"
90002030-217 = "[s]「……把該做的事告訴我吧。」"
90002030-224 = "[ns]「那麼，各就各位。」"
90002030-225 = "報告引擎修復現況。#n目前緊急起飛與緊急降落皆可執行。"
90002030-226 = "我現在將前往機庫，開始進行下降準備。"
90002030-228 = "是！愛麗絲會和季一起行動！"
90002030-229 = "我，我會加油的……！"
90002030-231 = "後方就拜託你了，陽葵。"
90002030-232 = "……季和愛麗絲是我們最強大的戰力與王牌。"
90002030-233 = "雖然柚子在這類任務中，或許也會有出乎意料的表現……"
90002030-234 = "不過……由莉央你親自出動真的合適嗎？"
90002030-235 = "……現場也同樣需要戰術指揮官。"
90002030-236 = "這不是出於你的責任感或虧欠感所做出的情緒性行動吧？"
90002030-237 = "…………我出發了。"
90002030-244 = "唉……真是的。#n我最近是不是越來越沒有人緣了啊，老師？"
90002030-245 = "[s]「這個嘛……至少還有我在？」"
90002030-246 = "呵呵，看來我的身邊，至少還留著最大的幸運呢。"
90002030-247 = "投放艙準備完成。隨時可以下降。"
90002030-248 = "那麼，老師？"
90002030-249 = "[s]「聽從前線指揮官的判斷，自主出擊。」"
90002030-250 = "機庫，聽得到嗎？現在情況如何？"
90002030-256 = "已抵達機庫。正在搭乘投放艙。"
90002030-257 = "愛麗絲，流程都記得吧？"
90002030-259 = "是！愛麗絲，已經都記住了！"
90002030-260 = "可是……該從哪個開始好呢……？"
90002030-261 = "我，我來幫你，愛麗絲醬……#n這種東西……就像一種遊戲說明書一樣……"
90002030-263 = "那麼愛麗絲就交給你了，柚子。"
90002030-266 = "下降準備完成。#n隨時可以開始，陽葵。"
90002030-267 = "那麼……"
90002030-268 = "讓運輸船前往指定位置吧。 "
90002030-278 = "這個體積真的很誇張呢。"
90002030-279 = "不用太過害怕，也不用太過緊張。"
90002030-280 = "有效率地前進吧。"
90002030-281 = "首先──"
90002030-293 = "──從處理駐守兵力開始。"
