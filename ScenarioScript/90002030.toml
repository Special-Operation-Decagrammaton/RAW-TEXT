[translation]
90002030-1 = "Episode 3;Mobilization"
90002030-2 = "Now then, let's review the situation."
90002030-3 = "We've learned something new, and we've gained a new problem. Which should we discuss first?"
90002030-5 = "Taking care of a \"problem\" tends to be the harder part, so begin with what we've learned."
90002030-7 = "We finally have verifiable data on the new Decagrammaton units that attacked us in Tiphareth's seed vault and here."
90002030-8 = "This particular unit is called a Laborer."
90002030-10 = "\"Labor...er\"?"
90002030-15 = "Yes. A worker. A fitting name for its functionality."
90002030-16 = "Based on the data we've gathered so far, we've been able verify three different types of Laborers."
90002030-17 = "Yes. I noticed that as well. The rectangular model was outfitted with heavy armor."
90002030-18 = "Yes! That is correct! It was very difficult to pierce!"
90002030-19 = "Simply put, a Defensive Laborer."
90002030-20 = "Next, this Laborer had lighter armor than the Defensive, but a large turret attached to it."
90002030-22 = "The design's a little... But let's call that one the Turret Laborer!"
90002030-23 = "A-And... There was this smaller Laborer that looked like the base form of the other two..."
90002030-25 = "In that case, we can call it the Basic Laborer. The others are likely built from this one."
90002030-26 = "While items that are smaller than normal are usually regarded as cute, this spider-like...thing has no redeeming qualities in that department."
90002030-27 = "Doesn't everyone think spiders are cute?"
90002030-28 = "Not to most... Although, when it comes to aesthetics, you hardly are like \"most\" people..."
90002030-30 = "President. Ms. Rio, let's move on."
90002030-31 = "[s] \"Did you find out anything else?\""
90002030-35 = "Yes. And this is the most important discovery by far."
90002030-36 = "It would appear that Laborers are responsible for converting organic matter into material for the Steel Continent."
90002030-37 = "Which means...?"
90002030-38 = "So they've been the ones...building this Steel Continent thingie?"
90002030-39 = "Likely not from the very beginning."
90002030-40 = "The Laborers were probably mass manufactured after the Steel Continent was already created."
90002030-41 = "However, I'd surmise that the Laborers approached our transport ship to turn it into part of the Steel Continent."
90002030-42 = "We weren't able to view the data logs for every single Laborer. With how many there are, that'd be impossible."
90002030-43 = "But from what we saw, it seems the Laborers are reorganizing the interior structure of the Steel Continent that has expanded at an incredible pace."
90002030-44 = "What do you mean by...\"reorganizing\"?"
90002030-45 = "They're building its exterior structure, while maintaining repairs to any damaged parts."
90002030-46 = "All while converting inorganic matter for the Steel Continent to further absorb."
90002030-47 = "And that's why they went after our ship..."
90002030-49 = "I see. Then what is the problem, President?"
90002030-50 = "Well, it's much easier said than done."
90002030-54 = "We'll need to break through Yesod's defense."
90002030-55 = "[s] \"...\""
90002030-56 = "Let's review the data we have on Yesod, the ninth prophet."
90002030-57 = "Oddly enough, Yesod does not have a form of origin."
90002030-58 = "What does that mean, Ms. Rio?"
90002030-59 = "For example, Hod was once \"Hub,\" Millennium's communication network unit."
90002030-60 = "Chokmah used to be an auxiliary ship, and Geburah was an unmanned exploration probe."
90002030-61 = "The prophets we've encountered thus far were all created by Decagrammaton hacking an already existing AI system."
90002030-62 = "The exception to that being Binah, since it's an unexplained phenomenon that was first observed in the Abydos desert dozens of years ago."
90002030-63 = "But you're saying Yesod is not like that, Rio."
90002030-64 = "Yes. This is just my assumption..."
90002030-65 = "But the most probable explanation is that Yesod was born from the Steel Continent."
90002030-68 = "That would explain why we weren't able to differentiate the signals of a giant like that until it was attacking us."
90002030-69 = "Yes. I believe that's a fair conclusion."
90002030-71 = "So, unlike the other prophets, Yesod isn't an AI evolved to adapt to Decagrammaton's purposes..."
90002030-72 = "...but rather a prophet created and optimized for their purposes."
90002030-73 = "...I think."
90002030-74 = "It would explain its monstrous size and strength, if it was created purely for the purpose of defending the Steel Continent."
90002030-76 = "It'd seem we're all problems and no solutions here."
90002030-77 = "D-Do not concern yourself! I— We! We can do this!"
90002030-78 = "A h-hero...is never afraid...before an adventure... *sniff*"
90002030-79 = "[s] \"(I think she's already a bit scared...)\""
90002030-81 = "It's not all bad. If it's part of the Steel Continent, it'll have weaknesses we can use."
90002030-82 = "Like what?"
90002030-83 = "Look. It looks like it's stuck on the wall."
90002030-84 = "Y-Yeah... Even in games, giant bosses can't really move freely either..."
90002030-85 = "...I'm not making a video game reference every time I speak, you know..."
90002030-87 = "Fufu. Perhaps Yuzu has a good point."
90002030-88 = "As long as it has a mass, even Decagrammaton's prophet or an \"optimized being\" is still bound by the rules of physics."
90002030-89 = "Bound by...?"
90002030-90 = "Ah. So it's a matter of speed and durability."
90002030-91 = "Correct. To move a huge amount of mass, you need a lot of energy."
90002030-92 = "The faster something is, the less durable it'll be. And vice versa."
90002030-93 = "Naturally, we must consider that we have yet to even identify what kind of alloy the Steel Continent is made of. We're woefully ignorant of its hardness and strength."
90002030-94 = "But as long as it has mass and a form, it can't be impenetrable."
90002030-95 = "[s] \"Wouldn't that mean...?\""
90002030-96 = "Yes, Sensei."
90002030-97 = "Yesod's greatest limitation is its speed."
90002030-98 = "And if we were to come up with a plan based on that fact..."
90002030-99 = "...You want to use a decoy."
90002030-100 = "Yes. If it were you... Well, I'm not surprised you came to the same conclusion."
90002030-101 = "Yesod's attack, when it brings down its arm, is powerful and devastating."
90002030-102 = "So, inevitably, we'll need to counter it with agility and speed."
90002030-103 = "The decoy will need to be fluid enough to respond to any situation, and they'll likely be able to dodge at least two attacks."
90002030-104 = "Fundamentally, its enormous size is intimidating, but it means Yesod has its limits as well."
90002030-105 = "Something too quick for it to hit will divert its attention for long enough."
90002030-106 = "Long enough for us to fly over it with the transport ship..."
90002030-107 = "...and carry out an ambush from atop the wall."
90002030-113 = "I can't help but rationally be in agreement with your plan, Himari."
90002030-114 = "In the past, you would have carried it out without even conferring with us, no?"
90002030-115 = "And, yet, we're at the point now where you suggest it without my prompting..."
90002030-116 = "I suppose that means we've arrived at the edge."
90002030-117 = "...We're running out of time, Rio."
90002030-118 = "Yes. I know."
90002030-119 = "[s1] \"Wait, everyone. Give me a second.\"\n[s2] \"I don't think I'm following, so just asking to make sure...\""
90002030-122 = "..."
90002030-123 = "You're right, Sensei."
90002030-124 = "We're saying that the only way to take down Yesod is by using someone as bait."
90002030-125 = "We can't guarantee that person's safety, nor that this plan will even work."
90002030-126 = "To put it bluntly, we'll be sending someone into danger with little chance of victory."
90002030-127 = "[s3] \"I...don't think I can agree to this method.\"\n[s4] \"As... As your teacher.\""
90002030-130 = "We have no other options."
90002030-132 = "I-In that case...! Once again, I will...!"
90002030-133 = "..."
90002030-135 = "No, Aris. You can't."
90002030-136 = "Wh-Why? While I may only be an apprentice, I am still a hero, so I must...!"
90002030-137 = "That's exactly why. It's because you're the hero."
90002030-138 = "You're our hidden ace. Our trump card for the final stand."
90002030-139 = "...Am I included in that as well?"
90002030-140 = "...Yes."
90002030-141 = "You're still so cold and Rio-like."
90002030-142 = "...It's how I'm used to being."
90002030-143 = "I hate that part about you!"
90002030-147 = "It really, truly infuriates me! I can't hold it in anymore!"
90002030-148 = "Aren't you always angry, Kei?"
90002030-149 = "Well, yes, but... This is different! Different, okay!"
90002030-150 = "Fire's hot, and magma is also hot! But magma is hotter! Wh-Why are you making things worse?!"
90002030-151 = "[s] \"Is there...really no other way?\""
90002030-153 = "..."
90002030-154 = "..."
90002030-155 = "The atmosphere in the room was heavy as everyone considered the gravity of the situation."
90002030-156 = "But, as Himari said, we were running out of time."
90002030-161 = "I'll go. I can do it."
90002030-165 = "[ns] \"What?!\""
90002030-166 = "H-Huh? Eimi?!"
90002030-171 = "My mission is to divert its attention and buy time for the assault team to get into position, yes?"
90002030-173 = "Y-You make it sound so simple!"
90002030-174 = "Sh-She is right, Eimi! Sensei will worry about you, but I will as well!"
90002030-176 = "It's the most efficient method. There's no room for \"probably\" or \"maybe\" here."
90002030-177 = "I'm more comfortable in the field, anyway. And strong. And fast."
90002030-178 = "B-But...! If something goes wrong...!"
90002030-179 = "[s5] \"You have to reconsider, Eimi...!\"\n[s6] \"I can't watch you get hurt!\""
90002030-182 = "..."
90002030-190 = "?!"
90002030-191 = "?!"
90002030-192 = "Eimi's hug was soft and gentle, just like her."
90002030-193 = "[s] \"E-Eimi...?\""
90002030-196 = "As I thought, Sensei. You're warm. And soft."
90002030-197 = "Don't worry so much, Sensei."
90002030-198 = "[s] \"But...!\""
90002030-199 = "I know."
90002030-200 = "But I'll be okay."
90002030-201 = "If you care about me, trust me."
90002030-202 = "It may be a teacher's duty to help their students, but it's a student's desire to help their teacher."
90002030-203 = "Anyways, if I do get hurt..."
90002030-204 = "...then I'll just have to put all the blame on you, Sensei. And you'll have to take care of me for the rest of my life."
90002030-205 = "Then, I'll see you soon."
90002030-210 = "[ns] \"Eimi!\""
90002030-213 = "...Begin the operation."
90002030-214 = "Affirmative."
90002030-215 = "We will NOT waste the chance Eimi is giving us."
90002030-216 = "Right, Sensei?"
90002030-217 = "[s] \"...Tell me where you need me.\""
90002030-224 = "[ns] \"Everyone, to your positions.\""
90002030-225 = "Reporting engine repair status. Emergency takeoff and landing should be possible."
90002030-226 = "I will go to the hangar and prepare for descent."
90002030-228 = "Yes! I will join Toki!"
90002030-229 = "I-I'll do my best...!"
90002030-231 = "I'll leave the rest to you, Himari."
90002030-232 = "...I understand that Toki and Aris are our strongest forces at the moment."
90002030-233 = "And Yuzu has proven herself time and again in this operation..."
90002030-234 = "But you as well, Rio?"
90002030-235 = "...We'll need an on-site operator and strategist as well."
90002030-236 = "And you're not still trying to pay back some imagined debt for your past wrongs?"
90002030-237 = "...I'll see you soon, Himari."
90002030-244 = "*sigh* I suppose I'll have to leave well enough alone. Sensei, don't you think that I don't have enough good, loyal subordinates by my side?"
90002030-245 = "[s] \"Uh... How about me?\""
90002030-246 = "Fufu. After hearing that, it seems that I still have the best of fortunes with me."
90002030-247 = "Drop pod is ready for descent."
90002030-248 = "Well then, Sensei?"
90002030-249 = "[s] \"Let's move out!\""
90002030-250 = "Hangar, do you copy? What's the situation?"
90002030-256 = "Arrived at the hangar. We will be boarding drop pods shortly."
90002030-257 = "Aris. You are aware of the procedure?"
90002030-259 = "Yes! I memorized it very well!"
90002030-260 = "Uh... I just need a reminder on the first step!"
90002030-261 = "I-I'll help you, Aris... This is sort of like...a game manual..."
90002030-263 = "Then I'll leave Aris to you, Yuzu."
90002030-266 = "Ready to descend, Himari."
90002030-267 = "Well, then."
90002030-268 = "Dispatching ship to the target drop location. "
90002030-278 = "It's even bigger up close."
90002030-279 = "Now's not the time for nerves."
90002030-280 = "Now is the time for efficiency."
90002030-281 = "Let's start with..."
90002030-293 = "...those stationed forces first."
