90002030-71 = "3;히마리 방한복;05;그렇다는 것은, 예소드는 다른 예언자들처럼 어떤 구조체에 덧씌워지거나 원형을 가질 필요 없이.\n#3;em;[반응]\n#3;a"
90002030-72 = "3;히마리 방한복;02;순수하게 목적성을 가지고 만들어진, '최적화'된 예언자라는 뜻도 되겠군요?"
