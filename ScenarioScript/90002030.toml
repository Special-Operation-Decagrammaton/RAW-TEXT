90002030-1 = "#title;제3화;출격"
90002030-2 = "3;리오 동복;02;그러면, 상황을 정리해 보도록 하자.\n#3;em;[반응]\n#3;a"
90002030-3 = "5;히마리 방한복;02;알아낸 사실이 한 가지 있고, 해결해야 할 문제가 한 가지 있어요. 어느 쪽부터 할까요?\n#5;em;[?]\n#5;al\n#3;m1"
90002030-4 = "#all;hide"
90002030-5 = "3;케이 AMAS;05;보통 해결해야 '할' 문제는 부담스럽기 마련이니, 알아낸 사실부터 이야기해 보죠."
90002030-6 = "#all;hide"
90002030-7 = "5;히마리 방한복;99\n1;리오 동복;02;우선 확실하게 알아낸 것은, 티페레트의 종자 보관소와 이곳에서 우리를 습격해 왔던, 데카그라마톤의 신규 병종에 대한 것이야."
90002030-8 = "5;히마리 방한복;05;네. 우선 그 병종의 모델명은, [ruby=Labor]레이버[/ruby]라고 하는 것 같아요."
90002030-9 = "#all;hide"
90002030-10 = "3;모모이 동복;02;레이… 버?\n#3;em;…"
90002030-11 = "3;데카 레이버;00\n1;데카 레이버;00\n5;데카 레이버;00\n#1;h\n#3;h\n#5;h"
90002030-12 = "#wait;500"
90002030-13 = "#all;hide"
90002030-14 = "#wait;500"
90002030-15 = "3;리오 동복;02;작업자라는 뜻이야. 이 병종 모델의 역할에 비추어 보면, 어울리는 이름이라고도 할 수 있겠지.\n#3;em;[반응]\n#3;a"
90002030-16 = "3;히마리 방한복;02;레이버의 종류에는, 적어도 지금까지 우리가 알게 된 정보만으로 한정한다면, 최대 3종류가 있는 것으로 보여요."
90002030-17 = "3;에이미 수영복ND;02;응 현장에서도 느꼈어. 우선 겉을 장갑으로 단단하게 두른, 직육면체 모양의 모델이 있었지."
90002030-18 = "3;아리스 동복;05;맞습니다! 엄청나게 튼튼했습니다!\n#3;em;[!]"
90002030-19 = "3;토키 모드 1;02;직관적으로 그 모델은 방어형 레이버라고 이름 붙여도 좋을 것 같군요."
90002030-20 = "3;리오 동복;01;다음으로는, 방어형 레이버에 비해서는 장갑의 강도가 낮지만, 한눈에 알 수 있을 만큼 커다란 포탑을 장착한 모델이 있었어."
90002030-21 = "#all;hide"
90002030-22 = "4;유즈 동복;01\n2;미도리 동복;02;디자인적인 측면에서는 아쉽기는 하지만…… 그건 포탑형 레이버라고 부를 수 있겠네요.\n#2;em;…"
90002030-23 = "4;유즈 동복;02;그, 그리고…… 아마 제가 보기에는, 나머지 두 모델의 원형처럼 보이는 상대적으로 조그마한 레이버가 있었어요…….\n#4;stiff"
90002030-24 = "#all;hide"
90002030-25 = "3;히마리 방한복;99;원형처럼 보인다는 측면에서, 그 모델을 기본형이라고 부르도록 하죠."
90002030-26 = "3;히마리 방한복;05;……보통 작다고 하면 귀엽게 보이는 부수 효과가 있기 마련인데, 이건 어떻게 봐도 거미처럼 생겨서 그런지 그런 느낌은 들지 않네요……."
90002030-27 = "1;리오 동복;02;거미는 귀엽지 않다는 느낌인 거야?\n#1;em;[?]\n#1;ar\n#3;m5"
90002030-28 = "3;히마리 방한복;02;보통은 그래요. 물론 당신의 미적 감각은 어딘가 독특하긴 하고, 미학이란 건 기본적으로 주관의 영역에 속하는 부분이기도 한데……."
90002030-29 = "#all;hide"
90002030-30 = "3;에이미 수영복ND;02;자, 자. 그 부분은 넘어가자. 부장, 회장.\n#3;em;[반응]"
