90002030-91 = "3;히마리 방한복;05;그래요. 거대한 질량을 움직이기 위해서는, 그만한 에너지가 필요하죠.\n#3;em;[반응]"
90002030-92 = "3;히마리 방한복;99;출력을 과도하게 집중시켜 거대 질량체를 빠르게 움직일 수도 있겠지만, 이 경우에는 내구도에 한계가 생길 것이고요."
90002030-93 = "3;히마리 방한복;01;물론 이 강철대륙을 이루고 있는, 수수께끼의 물질들의 강도나 경도, 내구도에 대해서 우리가 정확히 알고 있지는 못하지만."
90002030-94 = "3;히마리 방한복;02;그렇다고는 해도, 질량을 가지고 실체화된 이상, 무한의 내구도를 가지는 건 불가능한 일이니까요."
