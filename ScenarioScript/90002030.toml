90002030-100 = "3;히마리 방한복;01;그래요. 뭐, 당신이라면…… 당연히 이 정도 흐름은 따라와야 하겠지요."
90002030-101 = "3;히마리 방한복;99;예소드의 공격, 더 정확히는 그 팔을 휘둘러서 가해지는 공격은…… 분명 치명적이고 강력하겠지만."
