90002030-76 = "3;케이 AMAS;05;……어째 이야기를 하면 할수록, 답이 없다는 결론으로 가까워지고 있는 것 같은데 말이죠…….\n#3;em;…"
90002030-77 = "5;아리스 동복;04;아, 아닙니다! 아리스는…… 우리는! 분명 할 수 있습니다!\n#5;hophop\n#5;al\n#3;m1"
