[translation]
90002030-1 = "ตอนที่ 3;ออกจู่โจม"
90002030-2 = "เรามาสรุปสถานการณ์กันเถอะ"
90002030-3 = "ตอนนี้มีหนึ่งเรื่องที่เราค้นพบ และมีหนึ่งปัญหาที่เราต้องแก้ค่ะ จะเริ่มจากเรื่องไหนก่อนดีคะ?"
90002030-5 = "ถ้าเริ่มจากปัญหาที่ 'ต้องแก้' เดี๋ยวจะหมดแรงกันไปก่อน งั้นเริ่มจากเรื่องที่เราค้นพบก่อนดีกว่าค่ะ"
90002030-7 = "อันดับแรกเลย สิ่งที่เราได้รู้อย่างแน่ชัดแล้วก็คือเรื่องของคลังเก็บเมล็ดพันธุ์ของทิฟาเร็ธกับหน่วยจู่โจม#nประเภทใหม่ของเดคาแกรมมาทอนที่มาจู่โจมพวกเราที่นี่"
90002030-8 = "ค่ะ และหน่วยจู่โจมนั้นน่าจะเป็นหุ่นรับใช้ที่มีชื่อโมเดลว่า[ruby=Labor]เลเบอร์[/ruby]ค่ะ"
90002030-10 = "เลเบอร์...?"
90002030-15 = "หมายถึงแรงงานน่ะ ถ้าพิจารณาจากบทบาทแล้ว ชื่อนี้ก็ถือว่าเหมาะสมแล้วละ"
90002030-16 = "จากข้อมูลทั้งหมดที่เรามีตอนนี้ หุ่นรับใช้มีไม่เกิน 3 ประเภทค่ะ"
90002030-17 = "อื้อ ตอนออกไปสู้ภาคสนามฉันก็รู้สึกแบบนั้นเหมือนกัน มีโมเดลหนึ่งที่ลำตัวเป็นทรงสี่เหลี่ยมผืนผ้า ผิวภายนอกหุ้มด้วยเกราะทึบ"
90002030-18 = "ใช่ค่ะ! มันอึดถึกทนมากเลยค่ะ!"
90002030-19 = "คิดตามสัญชาตญาณแล้ว ฉันว่าเราเรียกโมเดลนั้นว่า 'หุ่นรับใช้ป้องกัน' ก็น่าจะเหมาะนะคะ"
90002030-20 = "ต่อไปเป็นโมเดลที่เกราะมีความแข็งแกร่งน้อยกว่าหุ่นรับใช้ป้องกัน แต่ก็มีป้อมปืนขนาดใหญ่ที่สังเกต#nเห็นได้ในทันทีค่ะ"
90002030-22 = "ในแง่ของการดีไซน์ ฉันว่ามันไม่ค่อยสวยเท่าไร... แต่ก็น่าจะใช้ชื่อว่า 'หุ่นรับใช้ป้อมปืน' ได้อยู่นะคะ"
90002030-23 = "ละ... แล้วก็... ฉันเห็นหุ่นรับใช้ขนาดเล็กที่เหมือนจะเป็นต้นแบบของอีก 2 โมเดลก่อนหน้าด้วยค่ะ..."
90002030-25 = "ถ้าเป็นต้นแบบ งั้นเราเรียกโมเดลนั้นว่า 'หุ่นรับใช้พื้นฐาน' แล้วกันค่ะ"
90002030-26 = "ปกติถ้าเป็นสิ่งที่มีขนาดเล็ก มันก็จะดูน่ารักน่าเอ็นดูไปด้วย แต่หุ่นรับใช้ตัวเล็กนี้ดูเหมือนแมงมุม ต่อให้ขนาดเล็กแค่ไหนฉันก็ไม่รู้สึกว่ามันน่ารักเลยค่ะ..."
90002030-27 = "แปลว่าแมงมุมไม่น่ารักงั้นเหรอ?"
90002030-28 = "ปกติก็ไม่น่ารักค่ะ แต่รสนิยมด้านสุนทรียศาสตร์ของคุณก็ค่อนข้างไม่เหมือนใคร แล้วสุนทรียศาสตร์ก็เป็นเรื่องของอัตวิสัยล้วนๆ..."
90002030-30 = "เอาละๆ เรื่องนั้นน่ะปล่อยผ่านไปเถอะ ทั้งหัวหน้า ทั้งประธานเลย"
90002030-31 = "[s] \"มีเรื่องอื่นที่ค้นพบอีกหรือเปล่า?\""
90002030-35 = "มีสิ... และมันก็อาจเป็นส่วนสำคัญที่สุดเลยก็ได้"
90002030-36 = "หุ่นรับใช้พวกนั้นเปลี่ยนสารอนินทรีย์ที่อยู่โดยรอบให้กลายเป็นองค์ประกอบของดินแดนเหล็กกล้าได้"
90002030-37 = "ถ้างั้นก็หมายความว่า...?"
90002030-38 = "หืม? หมายความว่าหุ่นรับใช้พวกนั้นกำลังขยายพื้นที่หรือดินแดนเหล็กกล้าอะไรนี่กันอยู่ตั้งแต่แรกเลย#nงั้นเหรอ?"
90002030-39 = "อาจไม่ใช่อย่างนั้นตั้งแต่แรกก็ได้ค่ะ"
90002030-40 = "นั่นก็เพราะช่วงเวลาที่เริ่มมีการผลิตหุ่นรับใช้จำนวนมาก น่าจะเป็นช่วงหลังจากที่ดินแดนเหล็กกล้ามี#nโครงสร้างพื้นฐานและมีขนาดพอประมาณแล้วค่ะ"
90002030-41 = "แต่สาเหตุที่หุ่นรับใช้เข้ามาใกล้ยานขนส่งของเรา ฉันมองว่ามีความเป็นไปได้สูงที่พวกนั้นต้องการเอา#nยานขนส่งไปเป็นส่วนหนึ่งของดินแดนเหล็กกล้าค่ะ"
90002030-42 = "ถึงฉันจะยังไม่ได้ตรวจสอบบันทึกการผลิตหุ่นรับใช้ทั้งหมดก็เถอะ และจะทำแบบนั้นก็ไม่ได้อยู่แล้วด้วย"
90002030-43 = "จากการตรวจสอบในส่วนที่ตรวจสอบได้ ตอนนี้พวกหุ่นรับใช้กำลังปรับโครงสร้างภายในของ#nดินแดนเหล็กกล้าที่กำลังขยายอาณาเขตอย่างรวดเร็ว"
90002030-44 = "ปรับสร้างโครง... ยังไงนะ...?"
90002030-45 = "ก็อย่างเช่นสร้างสิ่งใหม่ หรือไม่ก็ซ่อมแซมส่วนที่เสียหายไป"
90002030-46 = "แล้วก็หลอมรวมสารอนินทรีย์ที่ได้มาจากกระบวนการขยายดินแดนเหล็กกล้า"
90002030-47 = "อ่า เพราะงั้นก็เลยอยากได้ยานขนส่งของเราสินะ..."
90002030-49 = "นี่คือเรื่องที่เราค้นพบสินะ งั้นปัญหาที่เราต้องแก้คืออะไรเหรอ หัวหน้า?"
90002030-50 = "ถ้าแค่ให้พูดให้ฟังเฉยๆ ก็คงเป็นเรื่องง่ายนะคะ แต่มันไม่น่าจะจบแค่นี้น่ะสิ"
90002030-54 = "ปัญหาที่ว่าก็คือ การเอาชนะเยซ็อดค่ะ"
90002030-55 = "[s] \"...\""
90002030-56 = "ฉันจะสรุปข้อมูลของเยซ็อด ผู้เลื่อมใสลำดับที่ 9 จากข้อมูลที่เรามีให้ก่อนนะ"
90002030-57 = "สิ่งที่น่าแปลกก็คือ เยซ็อดไม่มีรูปร่างต้นแบบ"
90002030-58 = "หมายความว่ายังไงเหรอคะ ท่านริโอะ?"
90002030-59 = "ก็อย่างเช่น HOD เป็น <HUB> ที่เป็นหน่วยเครือข่ายสื่อสารในโรงเรียนวิทย์มิลเลเนียม"
90002030-60 = "ชอกมาห์เป็นยานสอดแนม ส่วนเกวูราห์ก็เป็นยานสำรวจไร้คนขับ"
90002030-61 = "เหล่าผู้เลื่อมใสมักถูกสร้างขึ้นจากโครงสร้างที่อิงกับระบบ AI เดิมที่มีอยู่แล้ว โดยถูกเดคาแกรมมาทอน#nแฮ็กยึดระบบ AI ไปทั้งชุด"
90002030-62 = "ถ้าจะมีข้อยกเว้นเดียวก็คือบีนาห์... นั่นก็เพราะการพบเห็นบีนาห์ครั้งแรกเกิดขึ้นในทะเลทรายอะบิดอส#nเมื่อหลายสิบปีก่อนตามที่มีการบันทึกไว้"
90002030-63 = "แต่จะบอกว่าเยซ็อดไม่เป็นแบบนั้นสินะคะ ริโอะ"
90002030-64 = "ใช่ แต่มันก็เป็นแค่การคาดเดาของฉันน่ะ..."
90002030-65 = "เยซ็อดน่าจะเป็นผู้เลื่อมใสที่ถูกสร้างขึ้นบนรากฐานของดินแดนเหล็กกล้า หลังจากที่ดินแดนนั้นเป็นรูปเป็นร่างขึ้นมาระดับหนึ่งแล้ว"
90002030-68 = "ถ้าไม่อย่างนั้น ที่ผ่านมาเราก็คงตรวจพบสัญญาณของเยซ็อดที่มีขนาดมหึมาขนาดนั้นไปแล้วละ"
90002030-69 = "ค่ะ ดูจะเป็นข้อสรุปที่สมเหตุสมผลนะคะ"
90002030-71 = "ถ้างั้นก็หมายความว่า เยซ็อดคือผู้เลื่อมใสที่ถูกออกแบบมาให้ 'สมบูรณ์แบบที่สุด' ในการทำภารกิจหนึ่งให้สำเร็จ"
90002030-72 = "โดยไม่จำเป็นต้องมีร่างต้นหรือการครอบงำสิ่งใดเหมือนอย่างผู้เลื่อมใสตนอื่นๆ สินะคะ?"
90002030-73 = "อาจจะเป็นอย่างนั้นนะ..."
90002030-74 = "ทั้งขนาดและพลังที่มหาศาลนั้นก็น่าจะเป็นผลมาจากการปรับแต่งให้เหมาะสมและสมบูรณ์ที่สุดด้วย"
90002030-76 = "ยิ่งบอกข้อมูลมากเท่าไร ก็เหมือนจะยิ่งเข้าใกล้ข้อสรุปที่ว่า 'เราจนปัญญา' เลยค่ะ..."
90002030-77 = "มะ... ไม่ใช่อย่างนั้นนะคะ! อาริสึต้อง... พวกเราต้อง! ทำได้แน่นอนค่ะ!"
90002030-78 = "ผะ... ผู้กล้าน่ะ... ไม่หวาดกลัวก่อนออกผจญภัยหรอกค่ะ... แง!"
90002030-79 = "[s] (แต่เหมือนจะหวาดกลัวล่วงหน้าไปแล้วนะ...)"
90002030-81 = "แต่การที่มันถูกสร้างขึ้นในดินแดนเหล็กกล้า ก็เหมือนจะมีจุดอ่อนอยู่บ้างนะ"
90002030-82 = "จุดอ่อนอะไรเหรอคะ คุณเอมิ?"
90002030-83 = "ก็มันเคลื่อนไหวไม่ได้เมื่ออยู่บนกำแพงป้องกันตรงโน้นไง"
90002030-84 = "ค่ะ... ใช่ค่ะ... บอสขนาดยักษ์ในเกมก็เคลื่อนที่อย่างอิสระไม่ได้... เหมือนกันค่ะ..."
90002030-85 = "ฉันไม่ได้ตั้งใจจะเปรียบเทียบทุกอย่างกับเกมหรอกนะ..."
90002030-87 = "ฮุฮุ แต่บางทียูสึอาจชี้ให้เห็นประเด็นสำคัญเลยก็ได้นะคะ"
90002030-88 = "ต่อให้เป็นผู้เลื่อมใสของเดคาแกรมมาทอนหรือเป็นสิ่งที่มีโครงสร้างสมบูรณ์แบบแค่ไหน แต่ถ้ามันมีมวลของวัตถุ ก็ย่อมมีสิ่งที่หลีกเลี่ยงไม่ได้ค่ะ"
90002030-89 = "สิ่งที่หลีกเลี่ยงไม่ได้...?"
90002030-90 = "อย่างนี้นี่เอง งั้นปัญหาก็อยู่ที่ความเร็วและระดับความทนทานสินะ"
90002030-91 = "ใช่ค่ะ การเคลื่อนย้ายมวลขนาดใหญ่ย่อมต้องใช้พลังงานมหาศาลค่ะ"
90002030-92 = "การใช้กำลังส่งที่มากเกินควรจะทำให้เคลื่อนย้ายมวลสารขนาดใหญ่ได้รวดเร็วก็จริง แต่ถ้าทำแบบนี้ ความทนทานของมวลสารนั้นจะลดลงค่ะ"
90002030-93 = "แน่นอนว่าตอนนี้เรายังไม่รู้แน่ชัดถึงความแข็งแรงและระดับความทนทานของสารลึกลับที่อยู่ในดินแดน#nเหล็กกล้า"
90002030-94 = "แต่ตราบใดที่สารนั้นมีมวล ระดับความทนทานของมันก็ย่อมมีขีดจำกัดค่ะ"
90002030-95 = "[s] \"งั้นก็หมายความว่า...?\""
90002030-96 = "ค่ะ เป็นอย่างนี้ละค่ะ คุณครู"
90002030-97 = "การโจมตีของเยซ็อดมีข้อจำกัดด้านการเคลื่อนไหว เนื่องจากเยซ็อดเป็นมวลสารขนาดยักษ์ค่ะ"
90002030-98 = "ถ้าจะวางกลยุทธ์โดยอ้างอิงจากข้อเท็จจริงนี้ละก็..."
90002030-99 = "ต้องใช้แผนล่อเป้าสินะ..."
90002030-100 = "ใช่ค่ะ ฉันคิดอยู่แล้วว่า... คุณต้องทำตามนี้แน่นอน"
90002030-101 = "การโจมตีของเยซ็อด หรือจะพูดให้แม่นยำว่าการโจมตีโดยการเหวี่ยงแขน... เป็นการโจมตีที่ทรงพลัง และอันตรายอย่างยิ่ง"
90002030-102 = "แต่ก็เห็นได้ชัดว่ามันค่อนข้างเชื่องช้าค่ะ"
90002030-103 = "ถ้าพวกเรามีคนที่คล่องแคล่วและตอบสนองในภาคสนามได้ทันควัน ก็น่าจะหลีกเลี่ยงการโจมตีของ#nเยซ็อดได้ 1-2 ครั้ง"
90002030-104 = "ถึงจะมีขีดจำกัดที่เกิดจากขนาดที่มหึมานั้น"
90002030-105 = "แต่อย่างน้อย เรื่องการเบี่ยงเบนสายตาของเยซ็อดก็ไม่น่าจะมีปัญหาค่ะ"
90002030-106 = "และในระหว่างนั้น พวกเราก็จะ..."
90002030-107 = "ปฏิบัติการจู่โจมเหนือกำแพงด้วยยานขนส่งค่ะ"
90002030-113 = "เสนอแผนการอย่างที่ฉันคิดไว้เลยนะ ฮิมาริ..."
90002030-114 = "ถ้าเป็นคุณในอดีต ก็คงผลักดันแผนการนี้ก่อนใครแล้วละค่ะ..."
90002030-115 = "แต่ถ้าเธอในตอนนี้ถึงกับเสนอแผนการแบบนี้ขึ้นมาก่อน ก็หมายความว่า..."
90002030-116 = "ไม่สิ ไม่หรอก... คงหมายความว่าเรากำลังตกอยู่ในสถานการณ์ที่ยากลำบากถึงขนาดนั้นมากกว่า"
90002030-117 = "เราไม่มีเวลาแล้วค่ะ ริโอะ..."
90002030-118 = "อื้อ... ก็จริงของเธอ"
90002030-119 = "[s1] \"เดี๋ยวก่อน ทุกคนรอครูด้วย\"\n[s2] \"ครูยังตามไม่ทันน่ะ ขอถามอีกรอบได้มั้ย...\""
90002030-122 = "..."
90002030-123 = "จริงสินะ ครู"
90002030-124 = "สรุปก็คือเราจะส่งใครบางคนไปเป็นเหยื่อล่อเพื่อเบี่ยงเบนความสนใจ แล้วระหว่างนั้นก็จะไปจัดการเยซ็อดน่ะ"
90002030-125 = "แต่เราก็รับประกันความปลอดภัยของเหยื่อล่อไม่ได้ แล้วก็ไม่แน่ใจด้วยว่าจะโค่นเยซ็อดได้หรือเปล่า"
90002030-126 = "มันมีความเป็นไปได้สูงที่จะเป็น... แผนการที่ส่งใครบางคนไปเสี่ยงชีวิตน่ะ"
