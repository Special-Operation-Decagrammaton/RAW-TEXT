90002030-59 = "3;리오 동복;99;가령 호드는, 밀레니엄 사이언스 스쿨의 통신망 가설 유닛인 <허브hub>였지."
90002030-60 = "3;리오 동복;01;호크마는 공작선이었고, 게부라는 무인 탐사기였어."
90002030-61 = "3;리오 동복;02;그런 식으로 예언자들은, 기존에 존재하던 AI 시스템 기반의 구조체가, AI째로 데카그라마톤에 의해 해킹되는 것으로 만들어지곤 했어.\n#3;m3\n#1;dl"
90002030-62 = "3;리오 동복;01;유일한 예외라고 볼 수 있는 것이 비나 정도이겠지만…… 비나의 최초 목격 기록은 수십 년 전 아비도스 사막이었으니."
90002030-63 = "5;히마리 방한복;02;하지만 예소드는 그렇지 않다는 말이군요, 리오.\n#5;em;…\n#5;al\n#3;m1"
90002030-64 = "3;리오 동복;99;그래. 이건 내 추측 같은 것이지만……."
90002030-65 = "3;리오 동복;01;예소드는 아마도, 강철대륙이 어느 정도 구축된 이후 그 기반 위에서 비로소 만들어진 예언자였을 거야."
