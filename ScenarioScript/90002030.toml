90002030-35 = "3;리오 동복;99;……있어. 그리고, 어쩌면 이게 가장 중요한 부분일 거야."
90002030-36 = "3;리오 동복;01;그 레이버들은, 기본적으로 주위의 무기물을 강철대륙의 구성 성분으로 변화시킬 수 있어."
90002030-37 = "3;토키 모드 1;02;그렇다는 것은……?\n#3;em;[?]"
90002030-38 = "3;모모이 동복;02;어? 그러면 그 녀석들이 처음부터, 이 강철대륙인가 뭔가 하는 걸 넓혀 가고 있었단 소리야?\n#3;stiff"
90002030-39 = "3;히마리 방한복;99;처음부터 그랬던 것은 아니었을 거예요."
90002030-40 = "3;히마리 방한복;02;레이버들이 양산되기 시작한 시기는, 강철대륙의 기본적인 구조와 크기가 구축된 다음부터였을 테니까요.\n#3;em;[반응]"
90002030-41 = "3;히마리 방한복;05;다만 레이버들이 우리의 수송선에 접근한 이유 자체는, 이 수송선을 자기들 강철대륙의 일부로 만들기 위해서였을 가능성이 높지만요."
90002030-42 = "1;리오 동복;01;모든 레이버들의 구축 기록을 살펴본 것도 아니고, 애초에 그렇게 하는 게 불가능한 일이기도 하지만.\n#1;ar\n#3;m5"
90002030-43 = "1;리오 동복;02;가능한 부분까지 조사한 결과, 레이버들은 지금 급속도로 넓어진 강철대륙의 내부 구조를 재정비하고 있는 것으로 보여."
90002030-44 = "#3;hide\n5;미도리 동복;02;재정비라고 하면…… 어떤……?\n#5;em;…"
90002030-45 = "1;리오 동복;99;가령 구조물을 건축한다든가, 손상된 부분을 수리한다든가."
90002030-46 = "1;리오 동복;01;그리고 강철대륙의 확장 과정에서 유입된 무기물에, 동화작용을 실시한다든가."
90002030-47 = "5;유즈 동복;02;아, 그래서 우리의 수송선을…….\n#5;em;[전구]"
90002030-48 = "#all;hide"
90002030-49 = "3;에이미 수영복ND;02;하나는 알았어. 그러면 해결해야 할 문제란 건 뭐야, 부장?"
