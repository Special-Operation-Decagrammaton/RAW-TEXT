1013506-44 = "3;케이 교복;07;그러니까 Quality Assurance……. 간단하게 말하자면 버그 리포터 겸 게임 테스터 같은 거죠."
1013506-45 = "3;케이 교복;02;결국 반드시 해야 하는 일이지만…… 나중 일정으로 밀리기 일쑤인 일이고요."
1013506-46 = "3;케이 교복;11;네……. 버그 리포트도 게임 테스트도, 누군가는 해야 하니까요."
