[translation]
1013506-1 = "Out Of Control"
1013506-2 = "(คุณครูมุ่งหน้าไปยังชมรมพัฒนาเกมตามที่เคย์บอก...)"
1013506-6 = "เฮ้อ... ตรงนี้เป็นอย่างนี้อีกแล้ว..."
1013506-10 = "ตรงนี้น่าจะเพราะไม่ได้กำหนดค่าปะทะไว้ให้ถูกต้อง... ส่วนตรงนี้ก็..."
1013506-11 = "[s] \"เคย์จัง...?\""
1013506-12 = "อ๊ะ มาแล้วสินะคะ คุณครู"
1013506-13 = "ฉันกำลังทำอะไรอยู่น่ะเหรอคะ? ก็อย่างที่เห็นค่ะ..."
1013506-14 = "..."
1013506-15 = "มีคำกล่าวที่ว่า ร้อยคำบอกเล่าก็ไม่เท่ากับลองทำเองสักครั้งค่ะ"
1013506-16 = "เข้ามาลองทำดูสิคะ!"
1013506-18 = "(เคย์ยื่นจอยเกมให้พร้อมกับรอยยิ้มสดใส...)"
1013506-19 = "(แล้วก็...!)"
1013506-25 = "คุณครู...?"
1013506-29 = "[ns] \"ฮะ... เฮือก?\""
1013506-30 = "วะ... ไหวหรือเปล่าคะ? คุณครูดูจะ..."
1013506-31 = "คะ? แทบจะวูบไปชั่วขณะ เพราะพลังอันมหาศาลของเกมกากที่ไม่ค่อยได้เจอบ่อยๆ งั้นเหรอคะ?"
1013506-32 = "พูดแบบนั้นมันค่อนข้างเสียมารยาทนะคะ ถึงมันจะเป็นความจริงก็เถอะค่ะ"
1013506-33 = "แล้วเกมนี้มันคืออะไรน่ะเหรอคะ?"
1013506-34 = "..."
1013506-35 = "เป็นเกมใหม่ของชมรมพัฒนาเกม แต่ยังเป็นเวอร์ชันอัลฟ่าค่ะ..."
1013506-36 = "[s] \"อ้อ\""
1013506-37 = "ทำไมถึงทำหน้าราวกับว่าเข้าใจทุกอย่างในทันทีเลยล่ะคะ? จริงๆ เลยเชียว"
1013506-38 = "ถึงจะพอเข้าใจได้ก็เถอะค่ะ..."
1013506-39 = "[s1] \"ทำไมเคย์จัง... ต้องมาลำบากแบบนี้ด้วยนะ...\"\n[s2] \"เบื่อชีวิต... หรืออยากบรรลุสัจธรรมขั้นสูงสุดงั้นเหรอ...?\""
1013506-42 = "เสียมารยาทนะคะ! ฉันกำลัง QA เกมอยู่ต่างหากค่ะ!"
1013506-43 = "[s3] \"QA?\"\n[s4] \"QA งั้นเหรอ?\""
1013506-44 = "QA ก็คือ Quality Assurance... พูดให้เข้าใจง่ายๆ มันก็เหมือนงานทดสอบเกมและก็รีพอร์ตบั๊กไปด้วย#nน่ะค่ะ"
1013506-45 = "นี่คืองานจำเป็นที่ยังไงก็ต้องทำ... แต่มักจะถูกเลื่อนไปทำทีหลังอยู่เรื่อยค่ะ"
1013506-46 = "ค่ะ... ยังไงก็ต้องมีคนรับผิดชอบงานทดสอบเกมกับรีพอร์ตบั๊กค่ะ"
1013506-47 = "นอกจากนี้แล้วก็มีเรื่องอื่นให้จัดการเยอะเป็นภูเขาเลยด้วย"
1013506-48 = "แต่ถึงยังไง รายการแก้ไขบั๊กนี้มันก็... เฮ้อ..."
1013506-49 = "ปัญหามันเริ่มมาจากตรงไหนกันนะคะ... ถ้าจะหนักขนาดนี้ ฉันก็เริ่มสงสัยแล้วค่ะว่ามันมีปัญหามาตั้งแต่#nระดับโครงสร้างเลยหรือเปล่า..."
1013506-50 = "ไม่สิ... คงไม่ถึงกับต้องทำขนาดนั้นหรอกค่ะ... ถ้าจะแก้ไขทั้งหมดนั่น ก็แทบจะต้องสร้างเกมใหม่#nตั้งแต่ต้นเลย..."
1013506-51 = "งั้นก็คงต้องหาแนวทางแก้ไขแบบถูๆ ไถๆ ไปก่อน..."
1013506-52 = "[s] \"ลำบากน่าดูเลยนะ เคย์จัง\""
1013506-53 = "ไม่หรอกค่ะ นี่ไม่ถึงกับลำบากหรอกค่ะ ถือว่าเป็นงานง่ายด้วยซ้ำค่ะ"
1013506-54 = "ถ้าต้องไปร่างแผนการหรือจัดการทรัพยากรละก็ ฉันว่าระบบตรรกะของฉันอาจรวนได้เลยค่ะ"
1013506-55 = "[s] \"ต้องทำเรื่องแบบนั้นด้วยเหรอ?\""
1013506-56 = "..."
1013506-57 = "ค่ะ ทำไปทำมาก็กลายเป็นอย่างนั้นไปแล้วค่ะ"
1013506-58 = "จริงๆ เลยเชียว ฉันทนดูด้วยตาตัวเองไม่ไหวน่ะค่ะ..."
1013506-59 = "เพราะอะไรกันนะคะ?"
1013506-60 = "การเปลี่ยนแผนการเป็นสิ่งที่เกิดขึ้นเป็นปกติในวงการนี้อยู่แล้ว"
1013506-61 = "แต่ทำไมถึงมีแต่ยกเครื่องทำใหม่ทั้งหมด แทนที่จะเป็นการลดภาระงานล่ะคะ?!"
1013506-62 = "พวกเราตั้งใจทำเกมแนวใช้ชีวิตประจำวันที่แค่ทำเควสชิลๆ แท้ๆ!"
1013506-63 = "แล้วทำไมมันถึงกลายมาเป็นเกมที่ต้องสร้างเรือรบทางบกในฐานลับใต้ดิน แล้วมากอบกู้โลกที่ถูกมนุษย์ต่างดาวยึดครองไปซะแล้วล่ะคะ?"
1013506-64 = "พอฝ่ายศิลป์หยุดฝ่ายเนื้อเรื่องไม่ได้ สุดท้ายก็ต้องนั่งทำงานงกๆ ตามบรีฟ!"
1013506-65 = "แล้ววิศวกรก็จะฝืนยัดระบบนั้นลงไปให้ได้ จนเกิดปัญหาอื่นตามมา!"
1013506-66 = "ส่วนโปรแกรมเมอร์ที่เพิ่งเริ่มทำงานด้านนี้อย่างจริงจังก็ต้องมาเรียนรู้จากปัญหาพวกนี้ด้วยค่ะ!"
1013506-67 = "ช่วยด้วยค่ะ Hello World! ฉันลืมบันทึกเกมที่เล่นไว้ค่ะ!"
1013506-68 = "ปัญหาอยู่ที่ฝ่ายที่ทำให้ค่ะ! พอทำให้บ่อยจนชิน อีกฝ่ายก็เลยเคยตัวยังไงล่ะคะ!"
1013506-69 = "[s] \"ถึงครูจะไม่ค่อยเข้าใจ แต่ก็คงเหนื่อยน่าดูเลยนะ...\""
1013506-70 = "เป็นห่วงให้มันจริงใจกว่านี้หน่อยสิคะ!"
1013506-71 = "[s] \"คะ... ครูก็จริงใจนะ!\""
1013506-72 = "..."
1013506-73 = "ขะ... ขอบคุณค่ะ"
1013506-75 = "[ns] \"สรุปว่าต้องเป็น QA โปรดิวเซอร์ และทำงานอื่นด้วยสินะ\""
1013506-76 = "ถ้าจำเป็นต้องมีชื่อตำแหน่งในชมรมเล็กๆ แบบนี้ละก็ จะว่าอย่างนั้นก็ได้ค่ะ"
1013506-77 = "แต่พอมาคิดดู... ฉันสังกัดชมรมปรากฏการณ์ลี้ลับนี่คะ...?"
1013506-78 = "[s] \"แต่ก็มาใช้เวลาอยู่ที่นี่มากที่สุดเลยไม่ใช่เหรอ?\""
1013506-79 = "..."
1013506-80 = "มันก็จริงค่ะ"
1013506-81 = "แต่ก็เอาเถอะค่ะ"
1013506-82 = "ถึงบางครั้งฉันก็ยังสับสนว่ากำลังเทสเกมหรือต่อสู้กับมอนสเตอร์ที่ไม่รู้จักอยู่กันแน่"
1013506-83 = "แต่ท้ายที่สุดแล้วนี่ก็เป็นเรื่องที่ใครสักคนต้องเข้ามาจัดการนี่คะ"
1013506-84 = "พูดง่ายๆ ก็คือ มันเป็นปัญหาที่ว่าเราจะให้ฟีดแบ็กในรูปแบบไหนและยังไงต่างหาก"
1013506-85 = "[s] \"ครูเข้าใจนะ... นั่นเป็นเรื่องยากเลยละ...\""
1013506-86 = "จริงเหรอคะ?"
1013506-87 = "[s5] \"ก็มันเป็นปัญหาที่ให้อีกฝ่ายทำตามที่เราคิด'\"\n[s6] \"มากกว่าจะทำตามที่คนคนนั้นต้องการนี่นา\""
1013506-90 = "ค่ะ... เป็นอย่างนั้นเลยค่ะ"
1013506-91 = "การใช้คำพูดแบบนี้อาจจะฟังดูเด็กน้อยไปสักหน่อยนะคะ แต่สุดท้ายแล้วถ้าเป็นอย่างนั้นละก็..."
1013506-92 = "ความสัมพันธ์ของเราก็จะแย่ลงค่ะ..."
1013506-93 = "[s7] \"พูดได้ถูกต้องแล้วละ\"\n[s8] \"แล้วถ้าความสัมพันธ์แย่ลง งานก็จะไม่ราบรื่นด้วย\""
1013506-96 = "..."
1013506-97 = "คุณครูก็รู้สินะคะ"
1013506-98 = "แต่ถึงยังไงก็ ก็ยังมีโมโมอิที่เป็นผู้ฟังที่ดีค่ะ"
1013506-99 = "ถึงต่อมาจะบอกว่าคิดอะไรที่ดีกว่าเดิมได้ และพรรณนาแผนการออกมาโดยที่ไม่มีลายลักษณ์อักษรเลย#nก็ตามทีค่ะ..."
1013506-100 = "ฉันละอยากให้ทุกคนคิดได้เสียทีค่ะว่าทำไมเราถึงต้องบันทึกทุกอย่างในทุกขั้นตอนของการพัฒนา!"
1013506-101 = "มิโดริก็ด้วยค่ะ อย่าพูดว่าทำได้ทุกอย่างแบบไม่ไตร่ตรองอะไรเลยสิคะ!"
1013506-102 = "จะต้องทรมานตัวเองไปถึงเมื่อไรกัน ถึงตอนนี้อาจจะยังไหว แต่พรุ่งนี้จะล้มพับไปตอนไหนก็ไม่มีใครรู้#nหรอกนะคะ!"
1013506-103 = "อย่าให้การโหมงานหนักของใครคนหนึ่งกลายเป็นบรรทัดฐานหลักในการพัฒนาเกมสิคะ! แบบนี้เหมือนใช้งานเยี่ยงทาสเลยค่ะ!"
1013506-104 = "[s] \"ค่อยยังชั่วหน่อยนะที่มีเคย์จังอยู่ด้วย...\""
1013506-105 = "ฉันรู้สึกเหมือนกำลังถูกเอาเปรียบอยู่ฝ่ายเดียวเลยค่ะ!"
1013506-106 = "แต่ยังไงก็เถอะ..."
1013506-107 = "ก็นะ..."
1013506-108 = "อืม..."
1013506-109 = "แต่เมื่อทุกอย่างเสร็จสมบูรณ์ ทุกคนก็มีความสุขกันนี่คะ"
1013506-116 = "ฮุฮุ..."
1013506-117 = "[s] \"น่าเสียดายจัง\""
1013506-118 = "อะไรเหรอคะ...?"
1013506-119 = "[s] \"ตอนเคย์ทำหน้าแบบนั้น ครูน่าจะถ่ายรูปเก็บไว้น่ะสิ\""
1013506-120 = "ลองถ่ายดูสิคะ จริงๆ เลย"
1013506-122 = "(แล้วคุณครูก็ได้เล่นเกมใหม่... ไม่สิ ได้ QA เกมใหม่)"
1013506-123 = "(ที่สร้างขึ้นโดยชมรมพัฒนาเกมกับเคย์)"
1013506-124 = "(และระหว่างนั้นก็เหมือนจะมีครั้งสองครั้งที่สติเลือนรางไปบ้าง...)"
