[translation]
1013506-1 = "Out Of Control"
1013506-2 = "（按照Kei說的，前往了遊戲開發部的部室……）"
1013506-6 = "唉……這裡又變成這樣了……"
1013506-10 = "肯定是因為沒有設定好碰撞值……還有這個……"
1013506-11 = "[s] 「Kei醬……？」"
1013506-12 = "啊，你來啦。老師。"
1013506-13 = "問我在做什麼？#n就跟你看到的……"
1013506-14 = "……"
1013506-15 = "有句話說百聞不如一見。"
1013506-16 = "來，實際試試看吧！"
1013506-18 = "（Kei帶著爽朗的笑容，將遊戲手把遞了過來……）"
1013506-19 = "（然後……！）"
1013506-25 = "……老師。"
1013506-29 = "[ns] 「啊……嗯？」"
1013506-30 = "那個……你還好嗎？#n剛才好像稍微……"
1013506-31 = "嗯？你說意識差點被前所未有的壓倒性爛遊戲給擊潰了？"
1013506-32 = "那種說法有點失禮耶……雖然可能是事實啦。"
1013506-33 = "所以這個遊戲是什麼……？"
1013506-34 = "……"
1013506-35 = "這是遊戲開發部新作的Alpha版本……"
1013506-36 = "[s]「啊。」"
1013506-37 = "為什麼一副恍然大悟的表情啊，真是的。"
1013506-38 = "……雖然我能理解就是了。"
1013506-39 = "[s1] 「為什麼Kei醬……要做這種苦行……」\n[s2] 「是人生太無聊了嗎……還是想參透究極的真理……？」"
1013506-42 = "說話太失禮了吧！我是在做QA好嗎！"
1013506-43 = "[s3] 「QA？」\n[s4] 「啊，QA。」"
1013506-44 = "就是Quality Assurance……簡單來說就是Bug回報員兼遊戲測試員之類的。"
1013506-45 = "雖然是必須要做的工作……卻往往會被推延到後面才進行。"
1013506-46 = "是啊……無論Bug回報還是遊戲測試，終究得要有人來做。"
1013506-47 = "當然除此之外還有一大堆要處理的事就是了。"
1013506-48 = "不過話又說回來，這份Bug修復列表到底是……唉……"
1013506-49 = "到底是從哪裡開始出問題的啊……#n簡直嚴重到讓人懷疑是不是從架構層級就有問題了……"
1013506-50 = "不，再怎麼說也不至於吧……#n假如得重做那個的話，幾乎等於要把遊戲砍掉重做了……"
1013506-51 = "得想辦法找到能繞過去的修復方向才行……"
1013506-52 = "[s] 「辛苦你了，Kei醬。」"
1013506-53 = "談不上什麼辛苦，這已經算是比較好的了。"
1013506-54 = "……在整理企劃案和資源的時候，我才覺得自己的邏輯核心都快崩壞了呢。"
1013506-55 = "[s] 「你連那種事也得做嗎？」"
1013506-56 = "……"
1013506-57 = "算是吧，不知不覺就變成這樣了。"
1013506-58 = "畢竟他們實在讓人看不下去……"
1013506-59 = "……到底是為什麼呢？"
1013506-60 = "雖然更改企劃案，對這個行業而言是家常便飯……"
1013506-61 = "不過為什麼不是朝節省資源的方向走，而是選擇全部重來啊！？"
1013506-62 = "當初明明說好要做「我們的小小生活任務」遊戲的！"
1013506-63 = "為什麼會變成在地下祕密基地建造陸上戰艦，拯救被外星人佔領的世界的遊戲啊！"
1013506-64 = "美術人員不但沒能擋下那個劇本，還照著要求把東西全做了出來！"
1013506-65 = "工程師又為了勉強實現那些功能，結果搞到最佳化整個大爆炸！"
1013506-66 = "而且才剛入門的程式設計師，還只能看著這些東西學習！"
1013506-67 = "救救我，Hello World！我沒辦法保存我的遊戲啊！"
1013506-68 = "這已經是配合的那一方有問題了！#n就是因為老是慣著他才會一直亂來！"
1013506-69 = "[s] 「雖然不是很懂，真是辛苦你了呢……」"
1013506-70 = "請你更認真地擔心我好嗎！"
1013506-71 = "[s] 「我，我本來就很認真啊！」"
1013506-72 = "……"
1013506-73 = "謝，謝謝……"
1013506-75 = "[ns] 「所以總結來說就是QA兼製作人兼雜務負責人呢。」"
1013506-76 = "可以這麼說吧……如果硬要在這個小社團裡給個職稱的話。"
1013506-77 = "……雖然我的所屬其實是特異現象搜查部就是了。"
1013506-78 = "[s] 「不過你在這裡待的時間比較長吧？」"
1013506-79 = "……"
1013506-80 = "這倒是沒錯。"
1013506-81 = "總之情況就是這樣。"
1013506-82 = "有時候我都快搞不清楚自己到底是在測試遊戲，還是在跟未知的怪物戰鬥了。"
1013506-83 = "但這終究是個得有人來拉住韁繩的問題。"
1013506-84 = "或者換句話說，是該如何給予回饋的問題。"
1013506-85 = "[s] 「那的確很困難呢……我可以理解……」"
1013506-86 = "真的嗎？"
1013506-87 = "[s5] 「因為一不小心就可能不再是『那個人想做的事』……」\n[s6] 「而是強迫對方去做『我想做的事』了。」"
1013506-90 = "……沒錯，問題就出在這裡。"
1013506-91 = "雖然這種說法可能有點幼稚……不過要是那樣的話……"
1013506-92 = "……關係會變差的。"
1013506-93 = "[s7] 「我覺得你說得很貼切。」\n[s8] 「如果關係變差，本來能成功的事也會失敗的。」"
1013506-96 = "……"
1013506-97 = "看來你也明白呢。"
1013506-98 = "但說是這麼說，其實桃井還算能接受意見的。"
1013506-99 = "……問題在於他下一秒就會說想到了更好的點子，然後口頭報告另一份企劃案。"
1013506-100 = "為什麼要在每個階段留下記錄和日誌，真希望他能動動腦子好好理解一下！"
1013506-101 = "還有綠也是，不要動不動就說什麼都做得到！"
1013506-102 = "就算現在燃燒自己還能勉強撐住，也不保證明天能繼續維持下去啊！"
1013506-103 = "單一成員的勉強不能成為開發的基準！那是黑心企業的行為啊，黑心企業！"
1013506-104 = "[s] 「有Kei醬在真是太好了……」"
1013506-105 = "我只覺得自己在單方面吃虧好嗎！"
1013506-106 = "不過嘛……"
1013506-107 = "唔……"
1013506-108 = "……嗯。"
1013506-109 = "完成的時候，大家都很開心呢。"
1013506-116 = "呵呵……"
1013506-117 = "[s] 「真可惜。」"
1013506-118 = "……又怎麼了？"
1013506-119 = "[s] 「剛才那個表情，應該要拍下來的。」"
1013506-120 = "你敢拍試試看。"
1013506-122 = "（就這樣和Kei一起遊玩遊戲開發部的新遊戲……）"
1013506-123 = "（不對，是為新遊戲進行QA）"
1013506-124 = "（在過程中，意識好像有一兩次稍微模糊了一下……）"
