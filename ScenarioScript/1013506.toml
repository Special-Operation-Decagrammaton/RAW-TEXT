[translation]
1013506-1 = "Out of Control"
1013506-2 = "I visited the Game Development Department Room, just as Kei said."
1013506-6 = "*sigh*... It's happening again here..."
1013506-10 = "This is probably because the collision value is not properly defined... And then there's this..."
1013506-11 = "[s] \"Kei-Kei...?\""
1013506-12 = "Ah, you're here, Sensei."
1013506-13 = "What was I doing? As you can see, quite plainly..."
1013506-14 = "..."
1013506-15 = "They say it's better to experience it once rather than hearing it explained a hundred times."
1013506-16 = "Here, try it for yourself!"
1013506-18 = "With a refreshingly welcoming smile, Kei handed me the gamepad."
1013506-19 = "And then...!"
1013506-25 = "...Sensei?"
1013506-29 = "[ns] \"Oh... Huh?\""
1013506-30 = "Uh, are you all right? You were a little...out."
1013506-31 = "What? You're telling me that this game was so bad that you \"almost lost consciousness\"?"
1013506-32 = "That's dramatic. And rude. Though it's probably true."
1013506-33 = "Oh, this game?"
1013506-34 = "..."
1013506-35 = "It's the alpha version of the Game Development Department's newest project..."
1013506-36 = "[s] \"Ah.\""
1013506-37 = "Your face indicates that you're not particularly surprised."
1013506-38 = "...I understand."
1013506-39 = "[s1] \"Why Kei-Kei...? Why go through that torture...?\"\n[s2] \"Is life too boring...? Were you trying to transcend?\""
1013506-42 = "Rude! I was QA testing!"
1013506-43 = "[s3] \"QA?\"\n[s4] \"Oh, Q and A.\""
1013506-44 = "Quality assurance, yes... In other words, I was working as a game tester, and, naturally, a bug reporter."
1013506-45 = "It's underappreciated work, but very valuable. If only the devs respected a deadline..."
1013506-46 = "Yes... Well, whether it be bug reports or game testing, someone needs to do it."
1013506-47 = "Aside from that, I still have a mountain of things to attend to."
1013506-48 = "Still, what kind of bug fix list is this...? *sigh*..."
1013506-49 = "Where to begin? If the game's THIS bad, I suspect there's a problem at the base architectural level."
1013506-50 = "No, surely not... Overhauling that would mean basically remaking the game from scratch."
1013506-51 = "We need to find a fix that will bypass that..."
1013506-52 = "[s] \"Must be a lot of trouble, Kei-Kei.\""
1013506-53 = "It's not a big deal. This is comparatively easy."
1013506-54 = "...But I feel like my brain will explode if we have to go back to the planning, proposal, and resource stage."
1013506-55 = "[s] \"You take care of those as well?\""
1013506-56 = "..."
1013506-57 = "Yes. It somehow ended up this way."
1013506-58 = "Really, after seeing the state the game was in, I had to take over."
1013506-59 = "I wonder why it's always so difficult."
1013506-60 = "Proposal changes are supposed to be easy. Expected, even."
1013506-61 = "But why is the solution always \"overhaul the resources\" instead of \"let's reduce and refine them\"?"
1013506-62 = "This all started off as a cozy slice-of-life game!"
1013506-63 = "Why has this turned into an RTS where you build land battleships in a secret underground base to save the world from alien occupation?!"
1013506-64 = "The artist hears a ridiculous scenario, and, despite their better judgment, gets to work."
1013506-65 = "Then the engineer tries to implement these new models, only to end up forcing it. Everything gets unoptimized..."
1013506-66 = "The rookie programmers of today think this is how it's done! Why? Because they are surrounded by it."
1013506-67 = "\"Hello World, I have an emergency! I did not manage to save my game!\""
1013506-68 = "The problem is the enabling! Because if they keep allowing terrible games to be released, they'll keep making them!"
1013506-69 = "[s] \"I don't really understand...but it sounds like a lot of trouble...\""
1013506-70 = "Can you please take this seriously?"
1013506-71 = "[s] \"I-I was serious!\""
1013506-72 = "..."
1013506-73 = "Th-Thank you..."
1013506-75 = "[ns] \"So you're the QA, the producer, and someone who takes care of miscellaneous tasks.\""
1013506-76 = "Sure, if you think such a tiny club needs so many superfluous titles."
1013506-77 = "...But come to think of it, I'm also technically part of the Super Phenomenon Task Force...?"
1013506-78 = "[s] \"But don't you spend most of your time here?\""
1013506-79 = "..."
1013506-80 = "It's true. I do."
1013506-81 = "Anyway, that's how things are."
1013506-82 = "Whether I'm reviewing a game or fighting some unknown monster..."
1013506-83 = "Ultimately, I've always known when someone needs to step up and take the wheel."
1013506-84 = "That said, the most important—and difficult—part is in giving feedback."
1013506-85 = "[s] \"Now, THAT I understand...\""
1013506-86 = "Really?"
1013506-87 = "[s5] \"If you go too far, it's no longer helping someone find their vision.\"\n[s6] \"...and you're instead telling them what to think.\""
1013506-90 = "...Yes. That's the problem."
1013506-91 = "When that happens, and forgive me for sounding so immature and trite..."
1013506-92 = "...It sours a relationship."
1013506-93 = "[s7] \"That's a good expression.\"\n[s8] \"Once a relationship sours, nothing works right anymore.\""
1013506-96 = "..."
1013506-97 = "You DO understand."
1013506-98 = "Well, at least Momoi tends to take feedback well."
1013506-99 = "...The problem is that she immediately brings a fresh proposal as soon as I finish talking."
1013506-100 = "I just wish she would understand the importance of documentation and logs!"
1013506-101 = "And Midori should stop blindly agreeing to every project!"
1013506-102 = "She may somehow be able to make the deadlines, but only through chopping away at herself. It's not sustainable!"
1013506-103 = "One overworked developer shouldn't be the only one holding the game together! It's disgraceful!"
1013506-104 = "[s] \"I'm glad you're here, Kei-Kei.\""
1013506-105 = "Really? Because I think I'm being taken advantage of!"
1013506-106 = "Well, still..."
1013506-107 = "Well..."
1013506-108 = "Hm..."
1013506-109 = "Ultimately, everyone does seem happy."
1013506-116 = "Fufu..."
1013506-117 = "[s] \"A shame.\""
1013506-118 = "...What."
1013506-119 = "[s] \"I wish I could have taken a picture of your smile.\""
1013506-120 = "Try it next time. I dare you to. Really."
1013506-122 = "So I spent a few more hours playing the Game Development Department's new game..."
1013506-123 = "I mean—I was \"performing QA\" with Kei."
1013506-124 = "I nearly lost consciousness a couple times."
