1013506-48 = "3;케이 교복;29;그렇다고는 해도, 뭔 버그 픽스 리스트가…… 하아…….\n#3;em;[한숨]"
1013506-49 = "3;케이 교복;22;도대체 어디부터 문제였던 거죠, 여기는……. 이 정도면 아키텍처 수준에서부터 문제가 있지 않았나 의심이 갈 지경인데……."
1013506-50 = "3;케이 교복;22;아뇨, 아무리 그래도 그건 아니겠죠……. 그걸 갈아엎으려면 게임을 거의 처음부터 만들어야 하는 수준일 테니까……."
1013506-51 = "3;케이 교복;11;어떻게든 우회할 수 있는 픽스 방향을 찾아야 하는데……."
