1013506-57 = "3;케이 교복;29;네, 뭐. 어쩌다 보니 그렇게 됐어요."
1013506-58 = "3;케이 교복;29;정말이지, 도저히 두 눈 뜨고 볼 수가 없어서 말입니다…….\n#3;em;[속상함]"
