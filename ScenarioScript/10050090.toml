10050090-23 = "3;나기사;05;(그것인가요?! 만에 하나 협정이 잘못되면, 붉은겨울의 대리인이 된 샬레가 일정 부분 책임을 지게 될 것이고…….)\n#3;em;…"
10050090-24 = "3;나기사;13;(마찬가지로, 협정에 합의한 트리니티에도 책임이 돌아올 수밖에 없으며……!)"
