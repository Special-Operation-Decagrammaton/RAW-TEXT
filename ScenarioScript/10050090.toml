10050090-1 = "#title;제9화;흐르는 강물처럼"
10050090-2 = "3;나기사;01;……그리하여, 체리노 회장. 이것이 저희가 제안드리고자 하는, 트리니티와 붉은겨울 사이의 문화 교류 협정의 내용입니다.\n#3;a\n#3;em;…"
10050090-3 = "3;나기사;02;이 협정은 샬레의 선생님께서 보증하셨으며, 도서부가 인가하는 형태로 진행될 것입니다. 그리고 저희 티파티는 그 결정에 이견 없습니다."
10050090-4 = "3;나기사;01;다만 앞으로는 이번 일처럼 협의가 이뤄지지 않은 상태에서 책을 비롯한 문화 매체를 유통하는 것은 삼가 주셨으면 합니다."
10050090-5 = "3;나기사;03;괜찮으시겠지요? 야쿠모 씨의 말대로, 문화는 흘러야 하는 것이니까요.\n#3;em;[반짝]"
10050090-6 = "3;체리노;99;으, 으음…….\n#3;a\n#3;sig"
10050090-7 = "3;체리노;06;귀찮은데……. 애초에 출판부 녀석들이 멋대로 일을 벌인 거고.\n#3;sig\n#fontsize;50"
10050090-8 = "3;체리노;02;잠깐. 지금 콤라드가 거기에 있다고 했지? 그래…… 그렇다면!\n#3;em;[전구]\n#3;sig\n#fontsize;50"
10050090-9 = "3;체리노;01;이해했다. 이 건에 한해서, 붉은겨울의 의견은 샬레의 의견으로 대신하도록 하지.\n#3;jump\n#3;sig"
10050090-10 = "[s] \"어? 나?\""
10050090-11 = "3;나기사;02;네? 그러니까 그 말씀은…… 샬레의 선생님께?\n#3;em;[?]"
10050090-12 = "1;체리노;02;그렇다. 마찬가지로 이 건 한정으로, 샬레는 붉은겨울의 대리인이 될 것이야. 붉은겨울은 샬레에 모든 결정을 일임하도록 하겠다.\n#1;ar\n#3;m5\n#1;em;[반응]\n#1;sig"
10050090-13 = "1;체리노;01;무엇보다, 지금부터 이 몸은 결코 피할 수 없는 일정을 수행하러 가야 하니까!\n#1;sig"
10050090-14 = "3;나기사;04;겨, 결코 피할 수 없는 일정이라뇨……?"
10050090-15 = "#all;hide"
