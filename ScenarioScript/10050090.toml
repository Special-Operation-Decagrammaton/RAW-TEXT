10050090-37 = "2;미카;04;그, 그렇지. 미안해, 선생님…….\n#2;stiff"
10050090-38 = "2;미카;03;응? 나는 이대로도 괜찮다고……? 고마워, 선생님! 정말 좋아!\n#2;em;[음표]"
10050090-39 = "3;타카네;07;다시 한번 인사드립니다. 티파티 여러분. 그리고 관대한 처분에 감사드립니다.\n#2;hide\n#4;hide\n#3;a\n#3;greeting"
10050090-40 = "3;나기사;02;안녕하세요, 출판부 여러분. 이렇게 정식으로 만나 뵐 수 있게 되어서 기쁩니다.\n#3;em;[반응]"
10050090-41 = "3;나기사;99;저희 트리니티로서는 이번 일을 계기로, 앞으로도 붉은겨울과 더욱 좋은 관계를 쌓아 갔으면 하는 마음이 있습니다."
10050090-42 = "3;나기사;01;좋은 책이 있다면, 트리니티 학우분들께도 더욱 많이 소개해 주시고요?"
10050090-43 = "3;타카네;12;네. 그렇게 하도록 하겠습니다. 이런 자리를 마련해 주신 것, 무한한 영광으로 생각하겠습니다.\n#3;greeting\n#3;em;[반짝]"
10050090-44 = "#all;hide"
10050090-45 = "3;미카;03;저기저기, 야쿠모 쨩이라고 했지? 반가워! 나는 티파티의 미카라고 해!\n#3;a\n#3;hophop\n#3;em;[재잘]"
10050090-46 = "3;미카;02;그래서 말인데, 잠시 우리 둘이서만…… 이야기 좀 할 수 있을까?"
