10050090-17 = "3;나기사;24;낮잠, 이요? 그건 무언가의 은유인가요?!\n#3;shake\n#3;em;[?!]\n#3;closeup"
10050090-18 = "[s] (아마 아닐 걸…….)"
10050090-19 = "3;나기사;04;그, 그리고 샬레를 이번 문화 협정의 대리인으로 내세운다는 것은……?"
