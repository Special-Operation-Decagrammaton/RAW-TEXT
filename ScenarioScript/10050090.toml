10050090-53 = "1;미카;12;저기, 근데 말이지. 이건 그냥 내 생각일 뿐인데…….\n#1;m2\n#1;em;[반응]"
10050090-54 = "1;미카;04;그, 주인공이, 뭐라고 할까. 내가 보기에는 어딘가 선생님을 닮은 부분이 좀 있었던 것 같았거든? 그래서 특히 좋았던 것 같아.\n#1;stiff"
10050090-55 = "1;미카;08;그러니까 말이야. 이건 어디까지나 내 개인적인 부탁? 희망? 같은 거긴 한데……."
