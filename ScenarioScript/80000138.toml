[translation]
80000138-1 = "巧克力蛋白霜餅乾"
80000138-2 = "（在約定的時間之前，抵達了和昴約好的咖啡廳）"
80000138-3 = "（正在慢慢環顧四周的時候……）"
80000138-4 = "你好，老師。"
80000138-5 = "咦……？難道我來晚了嗎？"
80000138-6 = "[s]「你好，昴。只是我比較早到而已。」"
80000138-7 = "這，這樣啊……那你稍微跟我說一聲也好啊……"
80000138-8 = "[s]「想給我們家昴一個驚喜嘛。」"
80000138-9 = "又，又說那種話……"
80000138-10 = "每當遇到這種時候，就能深刻體會到「老師偶爾會變成壞心的大人」這種說法呢。"
80000138-11 = "呵呵，就算擺出委屈的表情也沒用哦。#n這是老師你自作自受。"
80000138-12 = "那麼，今天之所以把老師叫到這裡來……"
80000138-13 = "唔嗯……該怎麼說呢……"
80000138-14 = "……"
80000138-15 = "就，就是，想說平時受到老師很多照顧，所以才……！"
80000138-16 = "……！"
80000138-17 = "[ns]「話說回來，這家咖啡廳真不錯呢。」"
80000138-18 = "咦？"
80000138-19 = "呵呵，是啊。我現在也漸漸習慣這種地方了呢。"
80000138-20 = "……當然也是因為投入了不少時間打工就是了。"
80000138-21 = "咦？打工雖然是好事，不過也要認真讀書？"
80000138-22 = "唔……我知道，我知道啦。#n這種嘮叨還真像老師會說的呢……"
80000138-23 = "總，總之！"
80000138-24 = "……"
80000138-25 = "這是我打工的時候知道的……#n聽說在奧利斯外面的世界，有一種叫做蛋白霜餅乾的點心。"
80000138-26 = "啊，又說外面的世界了……抱歉，我還有點改不掉這個口頭禪。"
80000138-27 = "總之，那是一種在蛋白裡加入砂糖快速攪拌，做出像奶油一樣的泡沫……"
80000138-28 = "然後在100度左右的溫度下，像烘乾一樣烤出來的點心。"
80000138-29 = "我無法原諒這種行為！！！"
80000138-30 = "[s]「為什麼！？蛋白霜又沒有罪！！！」"
80000138-31 = "可是只用蛋白就把蛋黃扔掉，這種行為可是會遭天譴的啊！！！！！"
80000138-32 = "[s]「啊……」"
80000138-33 = "當然也有一種用蛋黃取代蛋白，名叫布朗雪的做法……#n只是跟蛋白霜相比，用途實在受限很多。"
80000138-34 = "而且蛋黃又比蛋白更容易腐壞……#n到頭來終究無法把所有蛋黃都用完，有些還是只能被迫丟棄不用。"
80000138-35 = "這是多麼可怕的罪行啊！這種蠻橫的行為，我絕對無法原諒！！！"
80000138-36 = "就算神原諒了，我也無法原諒！！！！！"
80000138-37 = "所以我就收下了本來要被丟掉的蛋黃，用砂糖、味醂和醬油醃漬之後……"
80000138-38 = "做成蛋黃醬分給奧利斯的孩子們吃……除此之外也在嘗試各種用途。"
80000138-39 = "唉……這個世界到底是怎麼了……居然連食物的珍貴都不懂……"
80000138-40 = "[s]「你先冷靜一下，昴！食物確實很重要沒錯！」"
80000138-41 = "謝謝你的認同。#n話說，我剛才要說什麼來著……？"
80000138-42 = "啊，對了。是蛋白霜餅乾的話題吧。"
80000138-43 = "唔嗯……該怎麼說呢……"
80000138-47 = "老師，在奧利斯外面的世──不，聽說世上有個叫做情人節的日子。"
80000138-48 = "在那一天……"
80000138-49 = "……"
80000138-50 = "就是，會向平時想表達感謝的人……"
80000138-51 = "或者想表達自己心意的人……"
80000138-52 = "總之！是個送巧克力給對方的日子！"
80000138-53 = "所，所以！我也有準備！"
80000138-58 = "[ns]「用蛋白霜也能做出這樣的東西啊……！」"
80000138-59 = "是，是的。#n只要在製作的時候，混入巧克力粉之類的東西就可以了。"
80000138-60 = "……畢竟我比較擅長做需要體力的工作。#n而打發蛋白最重要的就是一點點訣竅……以及強大的臂力。"
80000138-61 = "某種程度上，也可以說我只能做到這種程度…………"
80000138-62 = "而且烤箱以我們的條件有點負擔不起，所以還得借用打工地點的設備………………"
80000138-63 = "說出來才發現，自己還真寒酸呢……"
80000138-64 = "……"
80000138-65 = "果然這種東西是不會有人喜歡的！#n而我竟然還想把這種東西送給老師！"
80000138-66 = "我果然是個笨蛋，簡直無藥可救！#n這種東西……這種東西……！"
80000138-73 = "（連忙阻止了打算將巧克力蛋白霜餅乾摔到地上砸碎的昴！）"
80000138-75 = "[ns1]「沒關係的，昴！那種事沒有人會介意！」\n[ns2]「我真的很高興！真的很謝謝你！！！」"
80000138-78 = "……真的嗎？"
80000138-79 = "[s]「嗯！」"
80000138-80 = "要是之後改口，我會恨你一輩子哦……？"
80000138-81 = "[s]「我怎麼可能改口呢……」"
80000138-84 = "……嗯。"
80000138-85 = "我相信你。"
80000138-86 = "……呵呵。"
80000138-88 = "（就這樣和昴一起分享蛋白霜餅乾，度過了悠閒的時光）"
