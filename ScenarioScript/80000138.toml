[translation]
80000138-1 = "Chocolate Meringue Cookies"
80000138-2 = "I arrived at the cafe a little early, before Subaru."
80000138-3 = "I was admiring the decor, then..."
80000138-4 = "Hey, Sensei."
80000138-5 = "Huh...? Oh, am I late?"
80000138-6 = "[s] \"Hi, Subaru. I got here early.\""
80000138-7 = "I-I see. You should've told me."
80000138-8 = "[s] \"I just wanted to surprise my dear Subaru.\""
80000138-9 = "There you go saying things like that again..."
80000138-10 = "Now I know why all the other students say you're sooo mean."
80000138-11 = "Haha. Pout all you want. You've brought this on yourself."
80000138-12 = "Right, so... I wanted to meet you here because..."
80000138-13 = "Um, so..."
80000138-14 = "..."
80000138-15 = "Well, you've done so much for me. And I can never pay it back, I know, but that made me think—"
80000138-16 = "...!"
80000138-17 = "[ns] \"You know, this is a nice cafe.\""
80000138-18 = "Hm?"
80000138-19 = "Fufu. You're right. I'm getting used to places like this... You know, buildings with aesthetics, climate control...and basic maintenance."
80000138-20 = "...It's probably because I've been working part-time so much."
80000138-21 = "Hm? Working part-time is fine, but I should \"focus on school\"?"
80000138-22 = "Ugh... I know. I know. Always with the exams and the studying. We get it—you're a teacher."
80000138-23 = "R-Regardless...!"
80000138-24 = "..."
80000138-25 = "While working in the outside world, I discovered these things called \"meringue cookies.\" Have you ever had them?"
80000138-26 = "Ah, I said \"outside world\" again... My apologies. Some habits are hard to break."
80000138-27 = "Anyway, they make this dessert by whipping sugar and egg WHITES into a creamy foam."
80000138-28 = "Then they bake them low, at 100 degrees, to dry them out."
80000138-29 = "Isn't that so truly unforgivable?!"
80000138-30 = "[s] \"Why?! What did meringue do to you?!\""
80000138-31 = "The audacity! The arrogance to only use egg whites while throwing the yolks away!"
80000138-32 = "[s] \"Ah.\""
80000138-33 = "Then I learned that there's this thing called \"blanchir,\" and it's supposed to help with the waste. It's when they whip only the egg yolks, much like a meringue. But it's not nearly as popular or practical."
80000138-34 = "And since yolks go bad faster than the whites... That means that not all the yolks get used! Some have to be thrown out."
80000138-35 = "What kind of heinous sin is this?! I can't get over the opulence and greed!"
80000138-36 = "Even if god forgives these bakers, I cannot!"
80000138-37 = "Which is why I've been taking egg yolks that would otherwise be tossed. I marinate them in sugar, mirin, and soy sauce to make seasoned yolks."
80000138-38 = "Then I share them with the girls back at Arius... And I've been looking up other ways to use them up, too."
80000138-39 = "*sigh* What is the world coming to...? People don't even realize how precious food is..."
80000138-40 = "[s] \"Let's calm down, Subaru! Food is definitely precious, I agree!\""
80000138-41 = "Thank you for that. By the way, what were we talking about...?"
80000138-42 = "Ah, right. Meringue cookies."
80000138-43 = "Um, so..."
80000138-47 = "Sensei. I heard that in the outside world... No. In THIS world, there's a holiday called Valentine's Day."
80000138-48 = "And on that day..."
80000138-49 = "..."
80000138-50 = "You're supposed to express thanks to the people you're grateful for..."
80000138-51 = "Or...sometimes...deliver a message to people who you have special feelings for..."
80000138-52 = "But anyway! I heard you're supposed to gift chocolates."
80000138-53 = "Wh-Which is why I tried making something!"
80000138-58 = "[ns] \"Wow! You can do this with meringue?\""
80000138-59 = "Y-Yes. You just add a little chocolate powder."
80000138-60 = "...Ultimately, I excel at physical work. Whipping meringue requires a bit of finesse...and, most importantly, strong muscles."
80000138-61 = "...In a way, I suppose this was the only thing I COULD make..."
80000138-62 = "...And, since we can't afford an oven right now, I had to bake these at work..."
80000138-63 = "Now that I've said that, it sounds really pathetic..."
80000138-64 = "..."
80000138-65 = "I knew it. Why would anyone want this?! I can't believe I tried to give this to Sensei."
80000138-66 = "I really am an idiot. It's over! To try something like this... Something like this...!"
80000138-73 = "Subaru attempted to throw the chocolate meringues to the floor, but I quickly stopped her!"
80000138-75 = "[ns1] \"It's okay, Subaru! None of those details matter!\"\n[ns2] \"I'm really happy with it! I'm so thankful!\""
80000138-78 = "...You mean it?"
80000138-79 = "[s] \"Of course!\""
80000138-80 = "If you take that back, I'll resent you for the rest of my life, got it...?"
80000138-81 = "[s] \"I would never...\""
80000138-84 = "..."
80000138-85 = "Okay, sure."
80000138-86 = "...Heehee."
80000138-88 = "Subaru and I enjoyed the cookies and relaxed at the cafe."
