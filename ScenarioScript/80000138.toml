[translation]
80000138-1 = "คุกกี้เมอแร็งก์ช็อกโกแลต"
80000138-2 = "(คุณครูมาถึงคาเฟ่ที่นัดเจอกับสุบารุเร็วกว่ากำหนดเล็กน้อย)"
80000138-3 = "(มองไปรอบๆ อย่างช้าๆ...)"
80000138-4 = "สวัสดีค่ะ คุณครู"
80000138-5 = "เอ๋...? ฉันมาช้างั้นเหรอคะ?"
80000138-6 = "[s] \"ว่าไง สุบารุ ครูมาเร็วเองน่ะ\""
80000138-7 = "งะ... งั้นเหรอคะ งั้นก็น่าจะบอกกันสักหน่อยสิคะ..."
80000138-8 = "[s] \"ครูแค่อยากเซอร์ไพรส์สุบารุน่ะ\""
80000138-9 = "เอาอีกแล้วๆ พูดแบบนี้อีกแล้ว..."
80000138-10 = "เวลาเจอคำพูดแบบนี้ฉันมักนึกถึงคำพูดที่บอกว่าบางครั้งคุณครูก็เป็นผู้ใหญ่ที่ใจร้ายเลยนะคะ"
80000138-11 = "ฮะฮ่า ทำหน้าเหมือนไม่ได้รับความยุติธรรมไปก็ไม่มีประโยชน์หรอกค่ะ กรรมตามสนองไงล่ะคะ"
80000138-12 = "อืม เรื่องที่ฉันขอให้คุณครูมาพบที่นี่น่ะ"
80000138-13 = "อืม คือว่า..."
80000138-14 = "......"
80000138-15 = "เอ่อ... ฉันคิดว่าที่ผ่านมาฉันได้รับความช่วยเหลือจากคุณครูบ่อยๆ เลยนะค่ะ..."
80000138-16 = "......!"
80000138-17 = "[ns] \"พอดูดีๆ แล้ว คาเฟ่นี้ก็ดีทีเดียวเลยนะ\""
80000138-18 = "คะ?"
80000138-19 = "ฮุฮุ ใช่มั้ยล่ะคะ ตอนนี้ฉันค่อยๆ ชินกับสถานที่แบบนี้แล้วละค่ะ"
80000138-20 = "คงเป็นเพราะฉันแบ่งเวลาไปทำพาร์ทไทม์ด้วยล่ะมั้งคะ"
80000138-21 = "คะ? ไปทำงานพาร์ทไทม์ก็เป็นเรื่องที่ดี แต่ก็ต้องใส่ใจเรื่องการเรียนด้วยงั้นเหรอคะ?"
80000138-22 = "ระ... รู้แล้วค่ะ เรื่องนั้นฉันรู้หรอกค่ะ คุณครูนี่ขี้บ่นจังเลยนะคะ..."
80000138-23 = "ยะ... ยังไงก็เถอะค่ะ!"
80000138-24 = "......"
80000138-25 = "ตอนไปทำงานพาร์ทไทม์ ฉันได้รู้ว่านอกโลกของอาเรียสมีคุกกี้ที่เรียกว่า เมอแร็งก์อยู่ด้วยล่ะค่ะ"
80000138-26 = "อ่า เผลอพูดว่านอกโลกของอาเรียสอีกแล้ว... ขอโทษนะคะ มันติดปากไปแล้ว แก้ไม่หายสักทีเลยค่ะ"
80000138-27 = "ยังไงก็เถอะค่ะ มันเป็นขนมที่นำไข่ขาวมาตีอย่างรวดเร็วแล้วค่อยๆ ผสมน้ำตาลลงไปจนกลายเป็น#nฟองเนียนนุ่มคล้ายครีม"
80000138-28 = "แล้วก็นำไปอบด้วยความร้อนประมาณ 100 องศาเซลเซียสค่ะ"
80000138-29 = "แต่ฉันน่ะยกโทษให้ไม่ได้เด็ดขาดเลยค่ะ!!!"
80000138-30 = "[s] \"ทำไมล่ะ?! เมอแร็งก์ทำอะไรผิด!!!\""
80000138-31 = "ใช้แค่ไข่ขาวแล้วก็เหลือไข่แดงทิ้งไว้แบบนี้... ทำเรื่องที่น่าชวนให้โดนพระเจ้าลงโทษเอาไว้ ได้ยังไงกันล่ะคะ!!!!"
80000138-32 = "[s] \"อ่า\""
80000138-33 = "แน่นอนว่ามันมีกรรมวิธีที่เรียกว่า \"บล็องเช\" ที่ใช้แค่ไข่แดงมาตีจนฟูคล้ายๆ กับการทำเมอแร็งก์อยู่#nเหมือนกัน แต่ถ้าเทียบกับเมอแรงค์แล้ว ก็ยังนับว่ามีข้อจำกัดอยู่มาก "
80000138-34 = "ไข่แดงจะเสียเร็วกว่าไข่ขาวมาก... ท้ายที่สุดเราก็ไม่สามารถใช้ไข่แดงทั้งหมดได้ และต้องทิ้งไปบางส่วนค่ะ"
80000138-35 = "นี่มันเป็นเรื่องบาปหนาที่สุด! ฉันไม่มีวันยกโทษให้การกระทำอันป่าเถื่อนแบบนี้เด็ดขาดค่ะ!!!"
80000138-36 = "ถึงพระเจ้าจะทรงอภัยให้ แต่ฉันไม่มีวันยกโทษให้เด็ดขาดค่ะ!!!"
80000138-37 = "เพราะงั้นฉันเลยขอไข่แดงที่จะต้องทิ้งมา แล้วนำไปหมักกับน้ำตาล มิริน แล้วก็โชยุ..."
80000138-38 = "ทำเป็นไข่แดงดองแล้วก็เอาไปแจกให้พวกเด็กๆ อาเรียส... ฉันพยายามลองเอามาใช้หลายๆ แบบแล้ว"
80000138-39 = "เฮ้อ... โลกนี้จะเป็นยังไงต่อไปกันนะ... ช่างไม่รู้ถึงคุณค่าของอาหารกันซะเลย..."
80000138-40 = "[s] \"ใจเย็นๆ ก่อนนะ สุบารุ! ของกินต้องสำคัญอยู่แล้วละ!\""
80000138-41 = "ขอบคุณที่เห็นด้วยกับฉันนะคะ ว่าแต่ว่าเมื่อกี้ฉันจะพูดเรื่องอะไรนะ...?"
80000138-42 = "อ๋อ ใช่แล้วค่ะ เรื่องคุกกี้เมอแรงค์ค่ะ"
80000138-43 = "อืม คือว่า..."
80000138-47 = "คุณครูคะ โลกภายนอกอาเรียส... ไม่สิ ได้ยินว่าโลกนี้น่ะมีวันที่เรียกว่าวันวาเลนไทน์อยู่ด้วยค่ะ"
80000138-48 = "และในวันนั้น..."
80000138-49 = "......"
80000138-50 = "ได้ยินว่าปกติแล้วก็จะแสดงความขอบคุณ..."
80000138-51 = "หรือสื่อความรู้สึกของตัวเองให้กับอีกฝ่าย..."
80000138-52 = "ยังไงก็เถอะค่ะ! ฉันได้ยินว่าวันนี้เป็นวันที่จะมอบช็อกโกแลตให้เป็นของขวัญกันค่ะ!"
80000138-53 = "พะ... เพราะงั้นฉันเลยเตรียมมาด้วยค่ะ!"
80000138-58 = "[ns] \"เมอแร็งก์... ทำแบบนี้ได้ด้วยเหรอเนี่ย!\""
80000138-59 = "ทะ... ทำได้ค่ะ แค่ใส่ผงช็อกโกแลตเพิ่มเข้าไปตอนที่ทำน่ะค่ะ"
80000138-60 = "ท้ายที่สุดแล้วฉันก็ถนัดงานที่ต้องใช้แรงจริงๆ ด้วยค่ะ การตีเมอแร็งก์ให้ฟูต้องใช้ทักษะมากๆ และจำเป็นต้องมีกล้ามเนื้อที่แข็งแรงด้วย "
80000138-61 = "ถ้ามองในอีกมุมหนึ่ง มันอาจเป็นสิ่งเดียวที่ฉันพอจะทำได้ก็ได้ละมั้งคะ..."
80000138-62 = "ขนาดราคาเตาอบยังเกินงบประมาณที่เรามีอยู่เลยค่ะ เลยต้องไปยืมใช้อุปกรณ์ของร้านที่ทำพาร์ทไทม์#nอยู่..."
80000138-63 = "พอมาเล่าแบบนี้มันดูน่าสมเพชจริงๆ นะคะ..."
80000138-64 = "......"
80000138-65 = "คิดแล้วเชียวว่าของพวกนี้คงไม่มีใครชอบหรอกค่ะ! แถมยังคิดจะเอาของแบบนั้นมาให้คุณครูอีก!"
80000138-66 = "ฉันนี่มันบ้าจริงๆ ด้วย ฉันมันบื้อที่สุดเลยค่ะ! แบบนี้มัน... แบบนี้มัน...!"
80000138-73 = "(สุบารุโยนคุกกี้เมอแร็งก์ช็อกโกแลตลงพื้นแล้วพยายามจะเหยียบให้แตก คุณครูเลยรีบเข้าไปห้ามไว้)"
80000138-75 = "[ns1] \"ไม่เป็นไรหรอก สุบารุ! ไม่ต้องสนใจเรื่องแบบนั้นหรอกนะ!\"\n[ns2] \"ครูดีใจจริงๆ นะ รู้สึกขอบใจสุบารุมากๆ เลยด้วย!\""
80000138-78 = "คุณครูพูดจริงเหรอคะ...?"
80000138-79 = "[s] \"อื้อ!\""
80000138-80 = "ถ้ามากลับคำทีหลัง ฉันจะโกรธไปตลอดชีวิตเลยนะคะ..."
80000138-81 = "[s] \"ครูไม่มีวันทำแบบนั้นหรอก...\""
80000138-84 = "......"
80000138-85 = "ค่ะ ฉันเข้าใจแล้วค่ะ"
80000138-86 = "แหะๆ..."
80000138-88 = "(จากนั้นคุณครูก็ใช้เวลาอย่างสบายๆ แบ่งคุกกี้เมอแร็งก์กินกับสุบารุ)"
