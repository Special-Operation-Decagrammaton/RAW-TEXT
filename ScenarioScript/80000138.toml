[translation]
80000138-1 = "#title;초코 머랭 쿠키"
80000138-2 = "#na;(스바루와 만나기로 한 카페에, 조금 먼저 도착했다.)"
80000138-3 = "#na;(천천히 주위를 둘러보고 있으려니…….)"
80000138-4 = "3;니코 스바루;03;안녕하세요. 선생님.\n#3;a\n#3;em;[반응]"
80000138-5 = "3;니코 스바루;04;어라……? 제가 조금 늦게 왔나요?"
80000138-6 = "[s]\"안녕, 스바루. 그냥 내가 빨리 왔어.\""
80000138-7 = "3;니코 스바루;99;그, 그렇군요. 그럴 거면 살짝 말씀이라도 해 주시지……."
80000138-8 = "[s]\"우리 스바루 놀라게 해 주려고 그랬지.\""
80000138-9 = "3;니코 스바루;25;또, 또 그런 식으로 말씀하시고…….\n#3;em;[///]\n#3;stiff"
80000138-10 = "3;니코 스바루;18;선생님은 가끔 못된 어른이 된다는 말, 이럴 때마다 실감하게 된다니까요."
80000138-11 = "3;니코 스바루;03;하핫. 억울하다는 표정 지으셔도 소용없어요. 자업자득이라구요.\n#3;em;[음표]"
80000138-12 = "3;니코 스바루;99;음, 그러니까 오늘 선생님을 이곳으로 부른 건 말이죠."
80000138-13 = "3;니코 스바루;26;으음, 그러니까……."
80000138-14 = "3;니코 스바루;06;……."
80000138-15 = "3;니코 스바루;25;그, 저기, 역시 선생님께는 평소에도 신세를 많이 지고 있고, 그런 생각이 든 김에……!"
80000138-16 = "3;니코 스바루;26;……!\n#3;em;[///]"
80000138-17 = "[ns]\"그러고 보니 좋은 카페네, 여기.\""
80000138-18 = "3;니코 스바루;02;네?\n#3;em;[?]"
80000138-19 = "3;니코 스바루;01;후후. 그렇죠. 이제 이런 곳에도 제법 익숙해지게 되었달까요."
80000138-20 = "3;니코 스바루;99;……그만큼 아르바이트에 제법 시간을 들이고 있기 때문이기도 하지만요."
80000138-21 = "3;니코 스바루;02;예? 아르바이트도 좋지만, 학업에도 성실해야 한다고요?"
80000138-22 = "3;니코 스바루;16;으…… 알아요. 알고 있어요. 정말 선생님 같은 잔소리 하시네요…….\n#3;em;[세로선]"
80000138-23 = "3;니코 스바루;04;아, 아무튼 간에요!"
80000138-24 = "3;니코 스바루;01;…….\n#3;em;[…]"
80000138-25 = "3;니코 스바루;99;아르바이트를 하다가 알게 된 건데, 아리우스 바깥세상에는 머랭 쿠키라는 과자가 있다고 하더라고요."
80000138-26 = "3;니코 스바루;04;아, 또 바깥세상이라고……. 죄송합니다. 입버릇이 되어서 잘 안 고쳐지네요."
80000138-27 = "3;니코 스바루;00;어쨌든, 달걀흰자에 설탕을 섞어 가며 빠르게 휘저어서, 크림 같은 거품을 만들고."
80000138-28 = "3;니코 스바루;99;그걸 100도 정도에서 말리듯이 구운 과자인데요."
80000138-29 = "3;니코 스바루;20;저는 용서할 수 없었어요!!!\n#3;closeup\n#fontsize;80"
80000138-30 = "[s]\"어째서?! 머랭은 죄가 없잖아!!!\""
80000138-31 = "3;니코 스바루;08;하지만 흰자를 쓰고 노른자를 버린다니, 그런 천벌 받을 짓이 어디 있나요!!!!!\n#3;jump\n#3;closeup\n#fontsize;80"
80000138-32 = "[s]\"아.\""
80000138-33 = "3;니코 스바루;06;물론 블랑셰라고 해서, 노른자만으로 머랭을 치듯이 만드는 것도 있기는 한데, 머랭에 비해서는 아무래도 쓰임새가 한정되기도 하고.\n#3;em;[…]"
80000138-34 = "3;니코 스바루;05;노른자가 흰자보다 훨씬 빨리 상하기도 해서……. 결국 모든 노른자를 사용하지는 못하고, 일부는 버리기도 한단 말이죠."
80000138-35 = "3;니코 스바루;20;이 무슨 끔찍한 죄악입니까! 이런 횡포 절대 용서 못 해요!!!\n#3;closeup\n#3;hophop\n#fontsize;80"
80000138-36 = "3;니코 스바루;08;설령 신께서 용서하신다고 해도, 제가 용서할 수 없어요!!!!!\n#3;closeup\n#fontsize;80"
80000138-37 = "3;니코 스바루;05;그래서 버리는 노른자만 받아와서, 설탕과 맛술과 간장에 재운 다음.\n#3;closeup"
80000138-38 = "3;니코 스바루;02;노른자장을 만들어서 아리우스 아이들에게 나누어 주기도 하고……. 여러 가지로 사용해 보고 있기는 합니다만.\n#3;closeup"
80000138-39 = "3;니코 스바루;06;하아…… 세상이 도대체 어떻게 되려는지……. 먹을 것의 소중함도 모르고…….\n#3;closeup\n#3;em;[한숨]"
80000138-40 = "[s]\"진정하자, 스바루! 확실히 먹을 것은 소중하지!\""
80000138-41 = "3;니코 스바루;27;동의해 주셔서 감사합니다. 그런데 무슨 이야기를 하려고 했더라……?"
80000138-42 = "3;니코 스바루;02;아, 맞아요. 머랭 쿠키 이야기였죠."
80000138-43 = "3;니코 스바루;99;으음, 그러니까……."
80000138-44 = "#st;[0,0];instant;1;"
80000138-45 = "#clearST"
80000138-46 = "3;니코 스바루;06\n#3;em;[…]\n#wait;2500"
80000138-47 = "3;니코 스바루;02;선생님. 아리우스 바깥세상……. 아뇨. 세상에는, 발렌타인 데이라는 게 있다고 들었습니다."
80000138-48 = "3;니코 스바루;99;그러니까 그날은……."
80000138-49 = "3;니코 스바루;26;…….\n#3;em;[///]"
80000138-50 = "3;니코 스바루;10;그, 평소에 감사하고 싶은, 사람에게나……."
80000138-51 = "3;니코 스바루;11;자기의 마음을, 표현하고 싶은 상대에게…….\n#fontsize;50"
80000138-52 = "3;니코 스바루;25;아무튼! 초콜릿을 선물하는 날이라고 하더라고요!\n#3;em;[!]\n#3;jump"
80000138-53 = "3;니코 스바루;11;그, 그래서! 준비해 봤어요!"
80000138-54 = "#st;[0,0];instant;1;"
80000138-55 = "#clearST"
80000138-56 = "3;니코 스바루;11\n#3;m1\n#wait;1200"
80000138-57 = "#wait;2000"
80000138-58 = "[ns]\"머랭으로…… 이런 것도 되는구나!\""
80000138-59 = "3;니코 스바루;04;네, 네에. 만들 때 초코 파우더를 섞거나 하면요."
80000138-60 = "3;니코 스바루;01;……결국 저는 몸으로 하는 걸 가장 잘하니까요. 머랭을 치는 건 약간의 요령과…… 강한 근력이 가장 중요하고."
80000138-61 = "3;니코 스바루;06;………어떻게 보면 이런 것밖에는 할 수 있는 게 없었다고 할까요…….\n#3;m3"
80000138-62 = "3;니코 스바루;05;…………심지어, 오븐도 저희 형편에는 조금 빠듯해서, 아르바이트하는 곳의 설비를 빌려야 했고요…….\n#3;em;[한숨]"
80000138-63 = "3;니코 스바루;01;말씀드려 놓고 보니 참 궁상맞네요……."
80000138-64 = "3;니코 스바루;06;……."
80000138-65 = "3;니코 스바루;08;역시 이런 건 아무도 좋아하지 않을 게 뻔해요! 그것도 모자라서 그런 걸 선생님께 드리려고 했다니!\n#3;jump"
80000138-66 = "3;니코 스바루;06;역시 전 바보예요. 틀려먹었어요! 이런 건…… 이런 건……!\n#3;stiff\n#3;em;[속상함]"
80000138-67 = "#st;[0,0];instant;1;"
80000138-68 = "#clearST"
80000138-69 = "3;니코 스바루;06\n#3;greeting\n#wait;1000"
