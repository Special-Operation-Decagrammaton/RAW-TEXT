80000138-73 = "#na;(스바루가 초코 머랭 쿠키를 바닥에 던져 부수려고 했기에, 황급히 막았다!)"
80000138-74 = "#all;hide"
80000138-75 = "[ns1]\"괜찮아, 스바루! 그런 거 아무도 신경 안 써!\"\n[ns2]\"난 정말 기쁘니까! 진짜로 고마우니까!!!\""
80000138-76 = "#wait;10"
80000138-77 = "#wait;10"
80000138-78 = "3;니코 스바루;05;……진심이시죠?\n#3;em;[반응]\n#3;a"
80000138-79 = "[s]\"응!\""
80000138-80 = "3;니코 스바루;25;나중에 다른 소리 하시면, 평생 원망할 거예요……?"
80000138-81 = "[s]\"내가 그럴 리 없잖니…….\""
