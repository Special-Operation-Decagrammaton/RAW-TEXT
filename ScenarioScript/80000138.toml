[translation]
80000138-1 = "巧克力蛋白霜餅乾"
80000138-2 = "（比約定時間早一點抵達了和昴約好的咖啡廳）"
80000138-3 = "（正在慢慢環顧四周的時候……）"
80000138-4 = "你好，老師。"
80000138-5 = "咦……？是我來晚了嗎？"
80000138-6 = "[s]「你好，昴。只是我來早了。」"
80000138-7 = "這，這樣啊。要是這樣的話稍微跟我說一聲也好啊……"
80000138-8 = "[s]「想給我們家昴一個驚喜嘛。」"
80000138-9 = "又，又那樣說話了……"
80000138-10 = "每次遇到這種時候，就會深刻體會到老師有時候會變成壞大人的說法啊。"
80000138-11 = "哈哈。就算你擺出委屈的表情也沒用喔。這是自作自受。"
80000138-12 = "嗯，所以今天把老師叫到這裡來呢。"
80000138-13 = "唔嗯，該怎麼說呢……"
80000138-14 = "……"
80000138-15 = "那，那個，果然平時受老師很多照顧，趁著有這個想法的時候……！"
80000138-16 = "……！"
80000138-17 = "[ns]「話說回來，這家咖啡廳真不錯呢。」"
80000138-18 = "咦？"
80000138-19 = "呵呵。是啊。現在也漸漸習慣這種地方了呢。"
80000138-20 = "……也是因為在打工上投入了不少時間的關係就是了。"
80000138-21 = "咦？打工雖然很好，但也要認真讀書？"
80000138-22 = "嗚……我知道。我知道啦。真的很像老師會說的嘮叨呢……"
80000138-23 = "總，總之！"
80000138-24 = "……"
80000138-25 = "打工的時候才知道的，聽說在奧利斯外面的世界有一種叫蛋白霜餅乾的點心。"
80000138-26 = "啊，又說外面的世界了……抱歉。已經變成口頭禪了改不太掉。"
80000138-27 = "總之，在蛋白裡一邊加入砂糖一邊快速攪拌，做出像奶油一樣的泡沫。"
80000138-28 = "然後在100度左右像烘乾一樣烤出來的點心。"
80000138-29 = "我無法原諒！！！"
80000138-30 = "[s]「為什麼！？蛋白霜又沒有罪！！！」"
80000138-31 = "但是只用蛋白就把蛋黃扔掉，哪有這種天打雷劈的事！！！！！"
80000138-32 = "[s]「啊。」"
80000138-33 = "當然也有叫做布朗雪的，用蛋黃像打發蛋白一樣製作的方法，不過和蛋白霜相比用途畢竟有限。"
80000138-34 = "而且蛋黃比蛋白更容易壞……結果不是所有蛋黃都能用完，有些還是會被丟掉。"
80000138-35 = "這是什麼可怕的罪行啊！這種蠻橫的行為我絕對無法原諒！！！"
80000138-36 = "就算神原諒了，我也無法原諒！！！！！"
80000138-37 = "所以我把要被丟掉的蛋黃拿回來，用砂糖、味醂和醬油醃漬之後。"
80000138-38 = "做成蛋黃醬分給奧利斯的孩子們吃……也在嘗試各種用途。"
80000138-39 = "唉……這世界到底是要怎樣……連食物的珍貴都不懂……"
80000138-40 = "[s]「冷靜一下，昴！食物確實很重要！」"
80000138-41 = "謝謝你同意。不過我剛才要說什麼來著……？"
80000138-42 = "啊，對了。是馬林糖餅乾的話題吧。"
80000138-43 = "唔嗯，該怎麼說呢……"
80000138-47 = "老師。在奧利斯外面的世……不對。聽說世上有個叫做情人節的日子。"
80000138-48 = "所以那一天……"
80000138-49 = "……"
80000138-50 = "那，平時想表達感謝的，人啊……"
80000138-51 = "想向對方表達自己心意的人……"
80000138-52 = "總之！聽說是送巧克力的日子！"
80000138-53 = "所，所以！我也準備了！"
80000138-58 = "[ns]「用蛋白霜……也能做出這樣的東西啊！」"
80000138-59 = "是，是的。製作的時候混入巧克力粉之類的就可以了。"
80000138-60 = "……畢竟我最擅長用身體做事。打發蛋白最重要的是一點訣竅和……強大的臂力。"
80000138-61 = "………某種程度上，也可以說我只能做到這種程度……"
80000138-62 = "…………而且，烤箱以我們的條件來說有點勉強，得借打工地方的設備才行……"
80000138-63 = "說出來之後才發現真是寒酸呢……"
80000138-64 = "……"
80000138-65 = "果然這種東西不會有人喜歡的！不僅如此竟然還想把這種東西送給老師！"
80000138-66 = "果然我是笨蛋。大錯特錯了！這種東西……這種東西……！"
80000138-73 = "（昴正要把巧克力蛋白霜餅乾摔到地上砸碎，趕緊攔住了他！）"
80000138-75 = "[ns1]「沒關係，昴！那種事沒有人在意！」\n[ns2]「我真的很高興！真的很感謝你！！！」"
80000138-78 = "……你是認真的吧？"
80000138-79 = "[s]「嗯！」"
80000138-80 = "如果之後說了不一樣的話，我會怨恨你一輩子的喔……？"
80000138-81 = "[s]「我怎麼可能那樣……」"
80000138-84 = "……"
80000138-85 = "我知道了。"
80000138-86 = "……嘿嘿。"
80000138-88 = "（就這樣和昴一起分享蛋白霜餅乾，度過了悠閒的時光）"
