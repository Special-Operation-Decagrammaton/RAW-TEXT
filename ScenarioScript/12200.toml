[translation]
12200-1 = "ตอนที่ 20;บทส่งท้าย"
12200-2 = "สวัสดีค่ะคุณครู อรุณสวัสดิ์ค่ะ!\n\n\n"
12200-3 = "วันของคณะกรรมการแผนงานอะบิดอสเริ่มขึ้นอย่างวุ่นๆ อีกครั้งแล้วค่ะ"
12200-4 = "คณะกรรมการแผนงานได้รับการอนุมัติจากคุณครูให้เป็นชมรมทางการของโรงเรียนอะบิดอสแล้วค่ะ"
12200-5 = "ฉันโล่งใจมากเลย เพราะเราถูกสบประมาทมาตลอดว่าเป็นชมรมกำมะลอ\n"
12200-6 = "และนี่ทำให้คณะกรรมการแผนงานได้รับบทบาทในสภานักเรียนอะบิดอส"
12200-7 = "ส่วนตัวแล้วฉันอยากให้รุ่นพี่โฮชิโนะดำรงตำแหน่งประธานสภานักเรียน แต่รุ่นพี่ก็ปฏิเสธหัวชนฝา...\n"
12200-8 = "ตอนนี้ตำแหน่งประธานสภานักเรียนจึงว่างอยู่ค่ะ"
12200-10 = "สวัสดีค่ะ! ชิบะเซกิ ราเม็งค่ะ!\n\n\n"
12200-12 = "ส่วนชิบะเซกิ ราเม็งก็กลับมาเปิดให้บริการอีกครั้งแล้วค่ะ"
12200-15 = "ตอนนี้กิจการกำลังเป็นไปได้ด้วยดี เซริกะจังก็เลยได้กลับไปทำงานพาร์ทไทม์อีกครั้ง"
12200-17 = "เจ้าของร้านก็ทำงานอย่างไม่รู้จักเหน็ดเหนื่อย สงสัยจะไม่เกษียณเร็วๆ นี้แล้วละค่ะ"
12200-19 = "แต่ถึงเราจะคลี่คลายเหตุการณ์ของรุ่นพี่โฮชิโนะได้ แต่หนี้ของอะบิดอสก็ยังเป็น 900 ล้านเยนอยู่ดีค่ะ...#nอืม.. ถึงมันจะไม่ต่างจากตอนแรกก็เถอะ..."
12200-20 = "แต่เรื่องที่สินเชื่อไคเซอร์ทำการค้าผิดกฎหมายอยู่ในตลาดมืดก็แดงขึ้นมา องค์การนักเรียนก็เลยสืบสวน#nเรื่องนี้อยู่ค่ะ"
12200-21 = "หรือว่าคุณฮิฟุมิเอาเรื่องนี้ไปบอกทรีนิตี้กันนะ...?"
12200-22 = "ฉันแอบสงสัยว่าองค์การนักเรียนจะสืบสวนได้มากแค่ไหน... แต่ยังไงสินเชื่อไคเซอร์ก็คงจะไม่กล้าทำอะไร#nผิดกฎหมายแล้วล่ะค่ะ"
12200-23 = "ส่วนกรรมการของทาง PMC ก็ถูกหมายจับเพราะเป็นผู้ต้องสงสัยหลักในคดีลักพาตัวนักเรียนอย่างผิด#nกฎหมาย"
12200-24 = "ทางไคเซอร์ คอร์เปอเรชั่นออกหนังสือแจ้งว่าคนคนนี้ไม่มีอะไรข้องเกี่ยวกับบริษัท แล้วก็ไล่ออกไปทันที#nความสัมพันธ์ในวงการธุรกิจคงเป็นแบบนี้สินะคะ..."
12200-25 = "ส่วนเรื่องดอกเบี้ยที่ขึ้นเอาๆ อย่างตามใจก็ได้รับการไต่สวน ทำให้อะบิดอสจ่ายดอกเบี้ยน้อยลง#nกว่าเดิมมาก นี่นับเป็นเรื่องที่ดีเลยค่ะ"
12200-26 = "ส่วนกรรมการไคเซอร์ที่หลบหนีไป ตอนนี้ทางองค์การนักเรียนคงจะส่งคนออกไปจับกุมได้ยาก เพราะตอนนี้#nทางประธานองค์การหายตัวไปค่ะ..."
12200-28 = "และพื้นที่ส่วนใหญ่ของเขตปกครองตนเองอะบิดอสยังคงตกอยู่ในมือของไคเซอร์ คอร์เปอเรชั่น"
12200-29 = "เพราะการทำธุรกรรมระหว่างอะบิดอสและไคเซอร์ยังคงมีผล"
12200-30 = "และยังไม่มีการเปิดเผยจนถึงทุกวันนี้ว่าทางนั้นกำลังทำเรื่องอะไรอยู่..."
12200-32 = "อ้อ! หน่วยรับจ้างสารพัด! ดูเหมือนพวกเขาจะหาสำนักงานใหม่ได้แล้วนะคะ"
12200-33 = "มีข่าวลือที่ว่าพวกเขากลับไปยังเขตปกครองตนเองเกเฮนน่า แต่บางคนก็บอกว่าย้ายไปที่อื่น..."
12200-34 = "แต่ทางคณะกรรมการวินัยก็กำลังจับตาดูพวกเขาอยู่ เพราะว่ากลัวจะไปก่อเรื่องที่ไม่ดีอีก คงหนักใจ#nอยู่เหมือนกันนะคะ"
12200-36 = "ส่วนคนที่เรียกตัวเองว่าสูทดำ..."
12200-37 = "คุณครูและรุ่นพี่โฮชิโนะบอกว่าไม่มีใครหาข้อมูลของคนคนนั้นได้เลย"
12200-38 = "เพราะความผิดทั้งหมดตกไปอยู่กับกรรมการของไคเซอร์ จึงไม่มีใครรู้ชื่อและตัวตนที่แท้จริงของเขาเลย..."
12200-39 = "ฉันคงทำอะไรต่ออีกไม่ได้แล้ว ดังนั้นเรื่องนี้ ฉันจะขอรบกวนทาง <ชาเล่ต์> แล้วกันค่ะ"
12200-41 = "เอาละ ฉันขอเริ่มการประชุมคณะกรรมการแผนงานอะบิดอสเลยนะคะ"
12200-42 = "ถึงเราจะต้องเผชิญเรื่องต่างๆ มามากมาย แต่หนี้ของเราก็ยังไม่หายไป"
12200-43 = "แต่ดอกเบี้ยที่เราต้องจ่ายทุกเดือนก็ลดลงค่ะ\n\n"
12200-44 = "เยี่ยม~ ได้ยินแค่นี้ก็หายเหนื่อย งั้นขอใช้โอกาสนี้ไปงีบสักหน่อย...\n\n"
12200-45 = "อื้ม! ทุกคนทั้งยุ่งและเหน็ดเหนื่อยกันมามาก เรามาพักร้อนกันหน่อยดีไหมคะ?\n\n\n"
12200-46 = "พูดอะไรน่ะ!! ถึงจะมีเวลาให้ได้พักหายใจบ้าง แต่ก็ไม่ใช่ว่าเราจะว่างนะ!"
12200-47 = "เซริกะจัง..."
12200-48 = "ฉันขอพูดในฐานะผู้ดูแลบัญชีของคณะกรรมการแผนงาน ตอนนี้พวกเราอยู่ในวิกฤต! แล้วก็ไม่เคยหลุด#nพ้นวิกฤตนี้เลยด้วย!\n"
12200-49 = "อืม...\n\n"
12200-50 = "ฉันก็เลยไปสำรวจตลาดมาแล้วละ!"
12200-52 = "ดูนี่สิ! รู้ไหมว่าคืออะไร?\n\n"
12200-53 = "เอ๋... อะไหล่คอมพิวเตอร์เหรอ?\n"
12200-54 = "นี่คือสิ่งที่เรียกว่า GPU! และฉันจะขุดเงินดิจิทัลที่เรียกว่าสแกมคอยน์ขึ้นมาด้วยสิ่งนี้แหละ!"
12200-55 = "เงินดิจิทัลก็คือ... อะ.. อะไรเนี่ย?! ทำไมทุกคนทำหน้าแบบนี้ล่ะ?!!"
12200-56 = "เปล่า ฉันมีวิธีที่ดีกว่านี้ ทุกคนดูนี่\n"
12200-57 = "ปัดตกทั้งหมด~"
12200-58 = "คณะกรรมการแผนงานก็เป็นแบบนี้แหละค่ะ"
12200-59 = "ไม่มีอะไรเปลี่ยนแปลงไปเลย..."
12200-60 = "อะฮ่ะฮ่า..."
12200-64 = "จากนี้ไปก็ขอรบกวนด้วยนะคะ คุณครู"
12200-65 = "สิ่งที่หลุดลอยไปกับสิ่งที่ยังคงอยู่"
12200-67 = "องก์ <คณะกรรมการแผนงาน>;To be Continued in Chapter 3"
