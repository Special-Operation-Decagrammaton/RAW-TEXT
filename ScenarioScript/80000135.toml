[translation]
80000135-1 = "甜蜜又堅定"
80000135-2 = "夏萊辦公室"
80000135-4 = "老師，你好！"
80000135-5 = "我來送好東西給你了！"
80000135-6 = "[s]「……你是剛做完交易回來嗎？」"
80000135-7 = "是的，我去購買狂獵的客戶委託的物品。"
80000135-8 = "不過今天的交易還算輕鬆。因為要買的東西就只有一樣而已。"
80000135-9 = "老師要看看嗎？"
80000135-15 = "（還沒來得及說什麼，冬就打開包包展示了裡面的東西）"
80000135-16 = "（包包裡裝滿了一顆顆獨立包裝的可疑球狀物）"
80000135-17 = "[ns]「這是……？」"
80000135-18 = "呵呵，如你所見，這些是……"
80000135-19 = "[s]「炸彈？」"
80000135-20 = "沒錯，就是炸──"
80000135-21 = "不對！是糖果，糖果啦！"
80000135-22 = "老師你到底把我們特殊交易部當成什麼了！"
80000135-23 = "而且爆裂物其實沒什麼賺頭，委託的件數也很少！"
80000135-24 = "[s]「原來是這樣啊……？」"
80000135-25 = "沒錯。畢竟只要收集家用彈藥和手榴彈，要製作土製炸彈並不難嘛。"
80000135-26 = "[s]「話說回來，那些糖果為什麼是違禁品呢？」"
80000135-27 = "這些是叫做Gobstopper的糖果。"
80000135-28 = "雖然成分的99%都是糖，構造極其簡單……"
80000135-29 = "但是這種糖果的特色就在於它的「硬度」。"
80000135-30 = "由於是把融化的糖層層緊密壓製而成，所以非常的堅硬。"
80000135-31 = "……也正是因為那個硬度，才被列為了違禁品。"
80000135-32 = "[s]「嗯……？」"
80000135-33 = "以前有幾個學生，在咬這個糖果的時候咬斷了牙齒。"
80000135-34 = "所以在那件事情之後，舍監隊就禁止攜帶這種糖果入校了。"
80000135-35 = "[s]「啊……」"
80000135-36 = "不過因為可以在嘴裡含很久，能讓人長時間專注於藝術創作的關係……#n直到現在，這個糖果的需求量還是相當高。"
80000135-37 = "我們的收入也因此相當豐──啊，這個不是重點。"
80000135-42 = "來，給你，老師。"
80000135-44 = "（冬遞過來的，是一顆比其他糖果都要大上許多的……）"
80000135-45 = "（比棒球還要大的一顆糖果）"
80000135-47 = "[ns]「這是……？」"
80000135-48 = "我不是說了嗎，是來送好東西給你的。"
80000135-49 = "這是限量版的特大號巧克力Gobstopper哦，老師。"
80000135-50 = "今，今天，畢竟是情人節嘛？"
80000135-51 = "[s]「哦哦！謝謝你，冬！」"
80000135-52 = "……嘿嘿。"
80000135-53 = "[s1]「不過這個大小……得要敲碎才能吃吧？」\n[s2]「槌子放到哪裡去了……」"
80000135-56 = "啊，沒必要那麼麻煩哦，老師。"
80000135-60 = "[ns] 「……槍？」"
80000135-62 = "（砰！！）"
80000135-66 = "來，老師請慢用！"
80000135-67 = "[s] 「謝，謝謝你……」"
80000135-69 = "（將糖果放入口中一嘗……）"
80000135-70 = "（比想像中還要好吃）"
80000135-71 = "[ns] 「好好吃……！」"
80000135-72 = "對吧對吧？"
80000135-73 = "據說這個限定版，可是做得相當用心呢！"
80000135-74 = "[s] 「來，拿去。冬也吃一個吧。」"
80000135-79 = "……！#n好，好的……！"
80000135-81 = "……真的耶。巧克力的味道又甜又濃郁。"
80000135-82 = "[s] 「而且非常硬，可以吃很久呢。」"
80000135-83 = "是啊，可以甜蜜很長一段時間呢。"
80000135-84 = "……這樣應該能讓你想我想得更久吧。"
80000135-88 = "啊，已經這麼晚了。那我就先告辭囉！"
80000135-95 = "唔唔……"
80000135-96 = "我瘋了我瘋了我真的是瘋了……！"
80000135-97 = "讓你想我想得更久什麼的……竟然說出那麼羞恥的話……！"
80000135-98 = "可，可是，就算是這樣……"
80000135-99 = "應該算是做得還不錯吧……？"
80000135-103 = "算了，不管了啦！"
