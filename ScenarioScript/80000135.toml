[translation]
80000135-1 = "甜蜜又堅定"
80000135-2 = "夏萊辦公室"
80000135-4 = "老師，你好！"
80000135-5 = "我是來送好東西給你的！"
80000135-6 = "[s]「……是做完交易回來的路上嗎？」"
80000135-7 = "是的，去買了狂獵客戶委託的物品。"
80000135-8 = "不過今天的交易還算輕鬆。因為要買的東西就只有一樣。"
80000135-9 = "老師也要看看嗎？"
80000135-15 = "（還沒來得及說什麼，冬就打開包包展示了裡面的東西）"
80000135-16 = "（包包裡面裝滿了一顆顆獨立包裝的可疑球狀物）"
80000135-17 = "[ns]「這是……？」"
80000135-18 = "呵呵，如你所見，這些是……"
80000135-19 = "[s]「炸彈？」"
80000135-20 = "是的，炸彈……"
80000135-21 = "不對！是糖果！是糖果啦！"
80000135-22 = "你到底把我們特殊交易部當成什麼了，老師！"
80000135-23 = "爆裂物其實沒什麼賺頭啦！購買委託也不太進來。"
80000135-24 = "[s]「啊，原來是那個原因啊……？」"
80000135-25 = "是的。只要收集家用彈藥和手榴彈，要做土製炸彈並不難嘛。"
80000135-26 = "[s]「話說回來，那些糖果為什麼是違禁品啊？」"
80000135-27 = "這些是叫做Gobstopper的糖果。"
80000135-28 = "99%由糖做成的極其簡單的構造……"
80000135-29 = "但這個糖果的核心在於它的「硬度」。"
80000135-30 = "把融化的糖一層一層緊緊壓製而成的東西，所以硬得不得了。"
80000135-31 = "……而正因為那個硬度，才被列為了違禁品。"
80000135-32 = "[s]「嗯……？」"
80000135-33 = "有幾個學生咬這個糖果的時候把牙齒咬斷了。"
80000135-34 = "因為那件事，舍監隊就禁止攜帶這種糖果入校了。"
80000135-35 = "[s]「啊……」"
80000135-36 = "不過因為含在嘴裡可以含很久，能夠專注於藝術創作，所以到現在這個糖果的需求還是相當大的。"
80000135-37 = "多虧如此我們的收入也相當豐……啊，這個不是重點。"
80000135-42 = "來，給你，老師。"
80000135-44 = "（冬遞過來的，是一顆比其他糖果都要大上許多的……）"
80000135-45 = "（比棒球還要大的一顆糖果）"
80000135-47 = "[ns]「這是……？」"
80000135-48 = "我不是說了嗎，是來送好東西給你的。"
80000135-49 = "這是限量版特大號巧克力Gobstopper喔，老師。"
80000135-50 = "今天，情，情人節不是嗎？"
80000135-51 = "[s]「喔喔，謝謝你，冬！」"
80000135-52 = "……嘿嘿。"
80000135-53 = "[s1]「不過這個大小……得敲碎了才能吃吧？」\n[s2]「槌子放在哪裡了……」"
80000135-56 = "啊，那個不需要喔，老師。"
80000135-60 = "[ns] 「……槍？」"
80000135-62 = "（碰咻！！）"
80000135-66 = "來，請慢用，老師！"
80000135-67 = "[s] 「謝……謝謝你！」"
80000135-69 = "（放入口中一嚐的糖果……）"
80000135-70 = "（比想像中還要好吃）"
80000135-71 = "[ns] 「好好吃……！」"
80000135-72 = "對吧對吧？"
80000135-73 = "這個，據說因為是限定版所以做得相當用心呢！"
80000135-74 = "[s] 「來，拿去。冬也吃一個吧。」"
80000135-79 = "咿……！好，好的……！"
80000135-81 = "……真的呢。巧克力的味道又甜又濃郁。"
80000135-82 = "[s] 「而且非常硬，可以吃很久呢。」"
80000135-83 = "是的。可以甜蜜很長一段時間呢。"
80000135-84 = "……也因此，應該能讓你更長時間地想起我吧。"
80000135-88 = "啊，你看看時間。那我先告辭了！"
80000135-95 = "呃嗚嗚……"
80000135-96 = "我瘋了我瘋了我瘋了……！"
80000135-97 = "讓你更長時間想起我什麼的……竟然說出那麼丟臉的話……！"
80000135-98 = "可，可是，即便如此，即便如此……"
80000135-99 = "應，應該做得沒錯……吧？"
80000135-103 = "我，我不知道！"
