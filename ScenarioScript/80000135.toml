[translation]
80000135-1 = "Sweet and Tough"
80000135-2 = "Schale Office"
80000135-4 = "Hello, Sensei!"
80000135-5 = "I'm here to deliver you some exclusive, premium products!"
80000135-6 = "[s] \"...Are you on your way back from a deal?\""
80000135-7 = "As a matter of fact, yes. I was securing a few things requested by my Wildhunt clientele."
80000135-8 = "But today's deal was simple and easy. I only needed to pick up one item."
80000135-9 = "Would you like to take a look, Sensei?"
80000135-15 = "Before I could reply, Fuyu opened the bag and showed me its contents."
80000135-16 = "There were several large, individually wrapped spheres."
80000135-17 = "[ns] \"These are...?\""
80000135-18 = "Fufu, as you can see, these are..."
80000135-19 = "[s] \"Bombs?\""
80000135-20 = "Yes, the FINEST bom—"
80000135-21 = "No! Candies! They're candies!"
80000135-22 = "Just what do you take the Free Trade Cartel for, Sensei?!"
80000135-23 = "Bombs aren't as profitable as you might think! And we rarely get commissions on them."
80000135-24 = "[s] \"Oh, so that's the reason...?\""
80000135-25 = "Yeah. Even a baby could make a homemade bomb. All you need are some grenades and your mom's emergency gunpowder."
80000135-26 = "[s] \"So...why are these candies banned?\""
80000135-27 = "These candies are called \"jawbreakers.\""
80000135-28 = "They're simple, obviously, and made out of 99% layered sugar..."
80000135-29 = "But the crucial thing about these candies are their trademark \"hardness.\""
80000135-30 = "They're made by tightly compressing layers of melted sugar over each other, which makes it an incredibly hard choking hazard."
80000135-31 = "...And THAT is how this ended up on the banned list."
80000135-32 = "[s] \"Huh...?\""
80000135-33 = "A few students have chipped their teeth on these. Sounds tough."
80000135-34 = "So, naturally, the Prefectural Council decided that no one can have any."
80000135-35 = "[s] \"Oh...\""
80000135-36 = "Nevertheless, there's a market for these. Artists, writers, even certain musicians enjoy them. The jawbreakers last a long time, and they give you something to enjoy while you toil away at work."
80000135-37 = "Thanks to that, we've been making a decent profit... Ah, but that's not the point here."
80000135-42 = "Here you go, Sensei."
80000135-44 = "Fuyu handed me a candy substantially bigger than others..."
80000135-45 = "It was larger than a baseball!"
80000135-47 = "[ns] \"This is...?\""
80000135-48 = "I told you. I came here to deliver you quality goods."
80000135-49 = "This is the limited-edition supersized chocolate jawbreaker, Sensei."
80000135-50 = "Since today is V-Valentine's Day, you know? ...R-Right?"
80000135-51 = "[s] \"Oh wow, thank you, Fuyu!\""
80000135-52 = "...Heehee."
80000135-53 = "[s1] \"But if it's this big... Do I have to break it first?\"\n[s2] \"Where did I leave my hammer...?\""
80000135-56 = "Ah, no need for that, Sensei. Let's be direct."
80000135-60 = "[ns] \"...Your gun?\""
80000135-62 = "Bang!"
80000135-66 = "Here, feel free to dive in, Sensei!"
80000135-67 = "[s] \"Th-Thank you!\""
80000135-69 = "I put a piece of candy in my mouth..."
80000135-70 = "...which tasted much better than I imagined."
80000135-71 = "[ns] \"It's good...!\""
80000135-72 = "Right? Right?"
80000135-73 = "They went all-out. I told you it was an exclusive, artisanal, limited-edition candy!"
80000135-74 = "[s] \"Here. You should have a piece, Fuyu.\""
80000135-79 = "Oh...! Y-Yes...!"
80000135-81 = "...You're right. For something so hard, it has such a rich chocolate flavor."
80000135-82 = "[s] \"It's also really hard, so it should last a while.\""
80000135-83 = "Yes. It'll stay sweet and stick with you for hours."
80000135-84 = "...It'll give you something to do while you keep thinking about me."
80000135-88 = "Ah, oh, you know what? I have to... It's late. I gotta go!"
80000135-95 = "Ugh..."
80000135-96 = "I must've lost my mind!"
80000135-97 = "\"Keep thinking about me\"... I can't believe I said that! Like I'm so smooth. Oh, this is so embarrassing!"
80000135-98 = "B-But, still...still..."
80000135-99 = "M-Maybe that worked...out?"
80000135-103 = "I-I don't know!"
