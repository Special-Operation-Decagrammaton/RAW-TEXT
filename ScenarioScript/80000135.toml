[translation]
80000135-1 = "หวานและแข็ง"
80000135-2 = "สำนักงานชาเล่ต์"
80000135-4 = "สบายดีรึเปล่าคะ คุณครู"
80000135-5 = "ฉันมีของดีที่อยากมอบให้คุณครูค่ะ!"
80000135-6 = "[s] \"เพิ่งส่งของเสร็จเหรอ...?\""
80000135-7 = "ค่ะ ฉันแวะออกไปหาซื้อสินค้าตามคำขอของลูกค้าที่ไวลด์ฮันต์มาค่ะ"
80000135-8 = "ยังไงก็เถอะค่ะ งานวันนี้ก็ราบรื่นดี เพราะของที่ต้องซื้อมีแค่ชิ้นเดียวน่ะค่ะ"
80000135-9 = "คุณครูจะลองดูหน่อยมั้ยคะ?"
80000135-15 = "(ก่อนที่คุณครูจะตอบอะไร ฟุยุก็เปิดกระเป๋าให้ดูของข้างในแล้ว)"
80000135-16 = "(ข้างในกระเป๋าเต็มไปด้วยลูกแก้วน่าสงสัยที่ห่อแยกชิ้นกันไว้) "
80000135-17 = "[ns] \"นี่มัน...?\""
80000135-18 = "ฮุฮุ อย่างที่เห็นเลยค่ะ..."
80000135-19 = "[s] \"ระเบิด?\""
80000135-20 = "ค่ะ ระเบิดค่ะ..."
80000135-21 = "เดี๋ยวก่อนนะคะ! ขนมค่ะ ขนมต่างหาก!"
80000135-22 = "คิดว่าชมรมการค้าพิเศษของเราเป็นชมรมอะไรกันคะ คุณครู "
80000135-23 = "วัตถุระเบิดทำกำไรไม่ได้มากอย่างที่คิดหรอกค่ะ! แล้วก็ไม่มีคำสั่งซื้อเข้ามาบ่อยๆ ด้วย"
80000135-24 = "[s] \"อ๋อ แบบนั้นเองเหรอ...\""
80000135-25 = "ค่ะ แถมการทำระเบิดมือก็ไม่ใช่เรื่องยากด้วย แค่รวบรวมลูกกระสุนกับดินปืนมาก็ทำได้แล้วค่ะ"
80000135-26 = "[s] \"ว่าแต่ว่า ทำไมถึงลูกอมถึงกลายเป็นสินค้าต้องห้ามล่ะ?\""
80000135-27 = "นี่เป็นลูกอมกอบสต็อปเปอร์ค่ะ"
80000135-28 = "เป็นลูกอมที่ประกอบด้วยน้ำตาลล้วน 99 เปอร์เซนต์..."
80000135-29 = "และจุดเด่นของลูกอมชนิดนี้คือ \"ความแข็ง\" ค่ะ"
80000135-30 = "เพราะมันเป็นของที่ทำขึ้นมาด้วยการอัดน้ำตาลเคี่ยวเคลือบไว้หนาๆ ในแต่ละชั้น เพราะงั้นเลยแข็งมากๆ เลยค่ะ"
80000135-31 = "และเพราะมันแข็งมากๆ เลยทำให้กลายเป็นของต้องห้ามค่ะ"
80000135-32 = "[s] \"หืม...?\""
80000135-33 = "มีนักเรียนหลายคนที่กินลูกอมนี้แล้วฟันหักค่ะ"
80000135-34 = "เพราะงั้นฝ่ายดูแลหอพักเลยสั่งห้ามนำเข้าลูกอมนี้โดยเด็ดขาดค่ะ"
80000135-35 = "[s] \"อ้อ...\""
80000135-36 = "แต่ว่าพออมลูกอมนี้แล้วมันจะช่วยให้มีสมาธิจดจ่ออยู่กับการทำงานศิลปะได้นานขึ้น ก็เลยทำให้มีคนที่ต้องการลูกอมชนิดนี้อยู่ค่ะ"
80000135-37 = "เพราะงั้นพวกเราเลยทำกำไรได้ค่อนข้างดีเลยทีเดียว... อ่า แต่นั่นไม่ใช่เรื่องสำคัญหรอกค่ะ"
80000135-42 = "เอ้า นี่ค่ะ คุณครู"
80000135-44 = "(สิ่งที่ฟุยุยื่นมาให้นั้นมีขนาดใหญ่กว่าลูกอมอันอื่นๆ อย่างเห็นได้ชัด...)"
80000135-45 = "(เป็นลูกอมที่มีขนาดใหญ่พอๆ กับลูกเบสบอล)"
80000135-47 = "[ns] \"นี่คือ...?\""
80000135-48 = "อย่างที่บอกไปค่ะว่าฉันมีของดีๆ ที่อยากให้คุณครู"
80000135-49 = "นี่คือช็อกโกแลตกอบสต็อปเปอร์ยักษ์ลิมิเต็ดเอดิชั่นค่ะ คุณครู"
80000135-50 = "ก็วันนี้เป็นวันวะ... วาเลนไทน์นี่คะ"
80000135-51 = "[s] \"โอ้ ขอบใจนะ ฟุยุจัง!\""
80000135-52 = "ฮิฮิ..."
80000135-53 = "[s1] \"ว่าแต่ว่าใหญ่ขนาดนี้... ต้องทุบให้แตกแล้วค่อยกินมั้ยนะ?\"\n[s2] \"ต้องทุบก่อนสินะ ครูเก็บค้อนไว้ตรงไหนนะ...\""
80000135-56 = "อ๋อ ไม่ต้องใช้ค้อนหรอกค่ะ คุณครู"
80000135-60 = "[ns] \"ปืน...?\""
80000135-62 = "ปัง!"
80000135-66 = "นี่ค่ะ ทานให้อร่อยนะคะ คุณครู!"
80000135-67 = "[s] \"ขะ... ขอบใจนะ!\""
80000135-69 = "(ลองหยิบเศษลูกอมมาชิมดู...)"
80000135-70 = "(รสชาติดีกว่าที่คิดไว้)"
80000135-71 = "[ns] \"อร่อยจัง...!\""
80000135-72 = "ใช่มั้ยล่ะคะ?"
80000135-73 = "พวกเขาใส่ใจในขั้นตอนการทำมาก สมกับเป็นสินค้าลิมิเต็ดเอดิชั่นเลยค่ะ!"
80000135-74 = "[s] \"เอ้า ฟุยุก็ลองชิมสักหน่อยสิ\""
80000135-79 = "อึก...! เอ่อ ค่ะ...!"
80000135-81 = "อร่อยจริงด้วยค่ะ... ช็อกโกแลตทั้งหวานแล้วก็เข้มข้นมากเลยค่ะ"
80000135-82 = "[s] \"แข็งๆ แบบนี้กินได้นานเลยด้วยนะ\""
80000135-83 = "ค่ะ คงความหวานไว้ได้นานเลยทีเดียว"
80000135-84 = "เพราะงั้น... ก็อาจทำให้คุณครูนึกถึงฉันได้นานขึ้น"
80000135-88 = "อ๊ะ เวลานี้แล้วเหรอเนี่ย ฉันต้องกลับก่อนแล้วละค่ะ!"
80000135-95 = "ฮือ..."
80000135-96 = "บ้าไปแล้วแน่ๆ ต้องบ้าไปแล้วแน่ๆ บ้าไปแล้วแน่ๆ...!"
80000135-97 = "\"ทำให้คุณครูนึกถึงฉันได้นานขึ้น\" เหรอ... พูดอะไรน่าอายแบบนั้นออกไปได้ยังไง...!"
80000135-98 = "ตะ... แต่ว่า... แต่ถึงยังไง..."
80000135-99 = "ก็ถือว่าทำได้ดีแล้ว... ใช่มั้ยนะ?"
80000135-103 = "มะ... ไม่รู้ด้วยแล้ว!"
