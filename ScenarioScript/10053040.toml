[translation]
10053040-1 = "Episode 4;Living Stone Doll"
10053040-4 = "Ah, take in that fresh air! That'll cure what ails ya!"
10053040-5 = "Sensei? Why are you lagging so far behind?"
10053040-6 = "[s1] \"A bit slower, please...\"\n[s2] \"I can't walk anymore...\""
10053040-9 = "Haha, what is that about? Sounds like you're out of shape!"
10053040-14 = "No! *huff* You're the freak here!"
10053040-15 = "We've been yelling at you to slow down for the past ten minutes!"
10053040-16 = "Geez, what a bunch of slackers. What about Director Mo?"
10053040-21 = "*huff* *huff*"
10053040-22 = "Wow! You look like death warmed over!"
10053040-23 = "But doesn't it feel good to sweat a little?"
10053040-24 = "*gasp* *wheeze*"
10053040-25 = "Can't even muster the energy to answer? Hahaha!"
10053040-26 = "This is not a laughing matter...!"
10053040-33 = "*sigh* We're finally at the first spot..."
10053040-34 = "Really? There's nothing here."
10053040-35 = "W-Wait. Let me catch my breath..."
10053040-40 = "Yes. This is our first exploration site on Mt. Shirakawa."
10053040-41 = "Of course this location looks unassuming. A Tsuchinoko wouldn't den somewhere interesting. It's trying to avoid people."
10053040-42 = "Well, you're not wrong..."
10053040-46 = "Really, last question, I promise."
10053040-47 = "Are we just going to keep searching? Like, this entire mountain? To find a fat snake that may not even exist?"
10053040-52 = "...If this mountain has a Tsuchinoko..."
10053040-53 = "We will find it."
10053040-57 = "Thirty minutes later..."
10053040-61 = "..."
10053040-66 = "Hey! What're you doing down there?! We've barely started!"
10053040-67 = "I briefly had an out-of-body experience... Therefore, souls exist... Cite that. Q...E...D."
10053040-68 = "What is she even talking about...?"
10053040-69 = "Sensei...?"
10053040-70 = "[ns5] \"Muscle aches from desk work...!\"\n[ns6] Don't respond. Pretend to be a corpse."
10053040-73 = "You two are useless..."
10053040-74 = "...? What are you smirking at?"
10053040-75 = "Huh? Me?"
10053040-76 = "You didn't know? You were smiling practically from ear-to-ear!"
10053040-77 = "Oh, was I...? Well, there is no special reason."
10053040-78 = "It is just fun being out here with you all."
10053040-79 = "...I see."
10053040-80 = "Hey... I'm curious."
10053040-81 = "Does Millennium not have club activities, Tsubasa?"
10053040-82 = "Because then you could go on outings like this with even more people..."
10053040-83 = "Ah."
10053040-87 = "Well, how should I explain this? It's a bit of a long story."
10053040-88 = "Truthfully, I did actively participate in a club, but I cannot any longer."
10053040-89 = "Uh, our club..."
10053040-90 = "It was closed down. Due to...budget stuff, underperformance, lack of intellectual justification..."
10053040-91 = "...Sorry."
10053040-92 = "N-No! It's fine! It didn't discourage me, or anything!"
10053040-93 = "Millennium is a merit-based academy, so if I manage to find the Tsuchinoko, maybe I can revive the club!"
10053040-94 = "Though I have never heard of a shuttered club being reopened..."
10053040-95 = "Well, I'll help you. Even if I don't believe the Tsuchinoko exists."
10053040-96 = "Of course. If a theory is incorrect, then proving that is also important."
10053040-97 = "By the way, where is Konoka?"
10053040-98 = "You know, I think I heard her run off. Maybe she found something."
10053040-99 = "We'll have to watch out for her. Konoka is the weakest among us."
10053040-100 = "...Seriously? She's in Valkyrie!"
10053040-101 = "Hm? What's your point?"
10053040-103 = "A-Ahhh!!"
10053040-104 = "What was that pathetic scream?!"
10053040-105 = "Konoka?! Quick, let's find her!"
10053040-109 = "...Aah, uah... S-Sensei... Help..."
10053040-110 = "[s7] \"What's wrong, Konoka?!\"\n[s8] \"You look so pale!\""
10053040-113 = "I-I noticed something buried in the ground... I dug it up..."
10053040-118 = "It's so over."
10053040-119 = "Wh-What is this? It's so ominous..."
10053040-120 = "It's a worn wooden chest. We'll need to check the manufacturing date."
10053040-121 = "But these charms look intact, despite being made of paper. I don't think it's that old."
10053040-122 = "How can you be so calm about this?! This is serious stuff!"
10053040-126 = "Wh-Wh-Wh-What do I do?! Should I throw it back in the hole? Should I dig even deeper?"
10053040-127 = "Wait. You're not going to open it?"
10053040-129 = "Who would?!"
10053040-134 = "No, listen. While the so-called \"mainstream media\" only focuses on mysterious charms being \"hexed\" or \"omens,\" that's historically inaccurate!"
10053040-135 = "It's very much the opposite. If you do your research, you'll learn that these are mainly used for blessings and wishes."
10053040-136 = "A no-no. Not this box! No matter how you spin it, this one's cursed."
10053040-137 = "Aha! You're a water-type, aren't you?! You're trying to transfer your bad luck to me, a fire-type!"
10053040-139 = "I-I also think we should bury it and pretend this never happened..."
10053040-140 = "N-Not because I believe it's cursed, or anything! It's just rude to open someone's stuff. It could be sentimental!"
10053040-142 = "Hm..."
10053040-148 = "[ns9] \"Ah...\"\n[ns10] \"It's open.\""
10053040-154 = "It's...a stone statue? Maybe an idol? Or even a doll..."
10053040-155 = "It's \"dangerous\" is what it is!"
10053040-156 = "Calm down. It is just an ordinary stone doll. It is probably a local custom."
10053040-157 = "There's nothing \"ordinary\" about a stone doll that had to be locked away in a box, sealed with charms, and tied with rope!"
10053040-162 = "It is fine. Unfortunately, this is a fake."
10053040-163 = "H-Huh? A fake?"
10053040-168 = "First of all, this isn't made of solid stone. It's too light relative to its volume, and the surface's texture is far too even."
10053040-169 = "I would say it's a mix of plastic resin and stone powder. It is likely mass-produced. Probably from some gardening store."
10053040-170 = "However, this box is made out of real wood, and seems quite old. Someone did that on purpose. They were hoping the box would grant the stone an air of legitimacy."
10053040-176 = "...Who's got that much time on their hands? Isn't this a bit much for a prank?"
10053040-178 = "You would think, but it happens fairly often."
10053040-179 = "Mainly it's for content creation—like videos, augmented reality games, or viral marketing... And sometimes people just hide what they make for no reason."
10053040-180 = "They could have done it for attention...or purely to scare whoever finds it. It could be a hoax or a particularly nasty prank."
10053040-181 = "I've seen this type of thing before. People plant them in the abandoned buildings I explore."
10053040-187 = "S-See? I told you it was nothing, Sensei!"
10053040-188 = "[s11] \"...? You're blaming me?\"\n[s12] \"Well if it's fake, then Konoka can relax...\""
10053040-195 = "I'll start digging!"
10053040-197 = "Eh...?"
10053040-199 = "Just in case! Even if it's a prank, it still holds evil intentions, right? It's definitely an ominous object!"
10053040-200 = "So I'll seal it away for good, so no one will ever see it again!"
10053040-201 = "I see your point... But, if you're trying to protect others, we might as well take it with us and dispose of it properly."
10053040-202 = "No!! This should have never been unearthed in the first place!!"
10053040-203 = "I'll make sure it's buried below the mantle!!"
10053040-205 = "Everyone, grab a shovel!! LET'S GO!!"
10053040-207 = "H-Huh?"
10053040-208 = "HUUUUH?!"
10053040-217 = "*phew* Sealing complete!! Problem solved!!"
10053040-218 = "A clear mind and a clear heart! Even my body feels rejuvenated! Hahaha!"
10053040-223 = "*pant* *pant*... Doesn't she ever get tired...?"
10053040-224 = "..."
10053040-229 = "She dug like 10 meters...all by herself."
10053040-230 = "It was 8 meters, last I measured..."
10053040-232 = "Aw, you're all so dramatic! We barely did anything!"
10053040-233 = "We just moved a little soil."
10053040-234 = "This was hardly a playdate at the sandbox..."
10053040-235 = "Hey, are all you Valkyrie students like this?"
10053040-236 = "Aw, I'm small potatoes compared to the others. My girl Kanna—now SHE'S something special."
10053040-241 = "..."
10053040-242 = "Remind me to stay on the right side of the law."
10053040-243 = "...Good idea."
10053040-248 = "Then, perhaps we should..."
10053040-252 = "Head back?"
10053040-253 = "[s13] \"YES!!\"\n[s14] \"Are we done looking for the Tsuchinoko?\""
10053040-254 = "You make it sound like I'm holding you hostage."
10053040-255 = "Though, keeping people in custody is my job, after all. Hahaha!"
10053040-259 = "It's almost dinnertime! And we still have a few days left."
10053040-260 = "And, after finding that statue... I think I've had enough \"adventuring\" for one day."
10053040-265 = "Phew... At least it's over."
10053040-266 = "...But we worked all day and have nothing to show for it."
10053040-267 = "Well, it wouldn't be very \"legendary\" if it was that easy to find, right?"
10053040-268 = "Good point..."
10053040-276 = "Hm?"
10053040-277 = "I think something in the bushes is following us... A little animal?"
10053040-281 = "...!!"
10053040-282 = "KYAAAH!!"
10053040-286 = "[ns15] \"Rena...?\"\n[ns16] Investigate what Rena saw."
10053040-290 = "It was that same stone doll...even though we buried it 8 meters underground!"
10053040-291 = "..."
10053040-292 = "And yet...it looked grubbier than before...and even...exhausted?"
10053040-293 = "Sensei, why are you lagging behind?"
10053040-297 = "I only shifted my eyes for a moment. But when I looked back, the stone doll was gone."
10053040-298 = "...Somehow, it seemed we earned a mysterious grudge."
