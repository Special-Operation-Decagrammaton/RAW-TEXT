[translation]
10053080-1 = "Episode 8;Grey Alien Appears"
10053080-3 = "Sorry to keep you waiting. I have the results."
10053080-4 = "...Oh, where's Konoka?"
10053080-5 = "She's barricaded herself in her room, hiding from the \"ghost.\""
10053080-6 = "Can you get her? She'll be relieved. It is not a ghost."
10053080-7 = "Hear that?! Hurry down here!!"
10053080-8 = "Don't rush her... Konoka is sensitive, so we should go easy on her."
10053080-9 = "...Seriously?"
10053080-14 = "...It really wasn't a ghost?"
10053080-15 = "I will explain. Everyone, gather round and look at this photo."
10053080-20 = "..."
10053080-21 = "..."
10053080-22 = "...And? There's nothing here."
10053080-27 = "I thought so too...at first."
10053080-28 = "But see here, in the corner. If you really zoom in between the bushes..."
10053080-29 = "There's some...pale thing?"
10053080-33 = "I captured this right after Konoka opened the window. It's a little out of focus. I wasn't ready...for some reason."
10053080-34 = "But this is it! I am certain! This is the common \"X factor\"! This has been watching us, and causing all the trouble!"
10053080-35 = "And, naturally, we can only conclude that this is..."
10053080-37 = "A Grey!"
10053080-43 = "You know, I think it's more of an...ivory? A white?"
10053080-44 = "Not \"grey\" the color. It's a type of alien."
10053080-45 = "Tsubasa, what makes you so sure this is a Grey?"
10053080-50 = "I know it seems unlikely, but hear me out."
10053080-51 = "Consider this. In the middle of the night, someone was watching us from outside the window. This is the classic precursor to an alien abduction."
10053080-52 = "Most abductees report feeling \"watched\" before their alien encounter. Sound familiar?"
10053080-53 = "What it SOUNDS like is a paranoid delusion."
10053080-54 = "I do not think so, not if we all saw the same thing. Sensei saw it too."
10053080-55 = "...Is that right, Sensei?"
10053080-56 = "[s1] \"I'm not sure if it was an alien...\"\n[s2] \"But someone was there.\""
10053080-59 = "But...what about \"mass hysteria\"?"
10053080-60 = "That does not explain the photo. This is irrefutable proof. This isn't a lens flare or noise, clearly."
10053080-61 = "I would like to present an additional hypothesis."
10053080-62 = "Aliens are capable of hypersonic movement, which happens to be silent. UFOs are usually said to fly without a single whisper of sound."
10053080-63 = "...You're saying that an alien was watching us, and then fled super-fast once we opened the window?"
10053080-64 = "And, because of their \"alien technology,\" we didn't hear anything?"
10053080-65 = "...There is no other way to explain it."
10053080-67 = "There definitely is! You've made wild leaps of logic."
10053080-68 = "First, you said the Tsuchinoko was an alien drone! But if they had a snake scouting drone, why would they show up and creep on us in person? Where's the consistency?!"
10053080-73 = "Phew. As long as it's not a ghost."
10053080-77 = "That's all she cares about?"
10053080-78 = "Sure, but consider everything we've experienced. It was all supernatural. Nothing made rational sense."
10053080-79 = "Rather than pretending it was coincidence, isn't it more realistic to conclude that they have a shared cause?"
10053080-80 = "You're not wrong to think that..."
10053080-84 = "No! I still don't buy it! Unless I see an alien with my own two eyes, I refuse to believe!"
10053080-85 = "You're on my side, right, Sensei?"
10053080-86 = "[ns3] \"First off, if someone was outside the lodge...\"\n[ns4] \"Shouldn't we report that to Valkyrie?\""
10053080-90 = "That's a good point. No matter who or WHAT that was, it's dangerous."
10053080-91 = "Wait. If you call it in, then the General Student Council might start a coverup! Just like they did with all the other UFOs!"
10053080-92 = "I've had enough of your paranoid conspiracies! I'm calling!"
10053080-96 = "..."
10053080-101 = "There's no tone. Is this plugged in?"
10053080-102 = "The cord looks intact."
10053080-103 = "Then why is it...?"
10053080-109 = "Could it be?!"
10053080-116 = "...As I thought. According to my predictions, this is the worst-case scenario."
10053080-121 = "What do you have there, Director?"
10053080-122 = "It is a telephone line."
10053080-123 = "Or, more accurately...a CUT telephone line."
10053080-124 = "...What?"
10053080-125 = "The telephone was our only lifeline... If they got this... Then...!"
10053080-135 = "As I thought. We are too late."
10053080-140 = "What?! This was fine a few hours ago!"
10053080-141 = "What happened to the bridge?"
10053080-145 = "Everyone calm down and listen."
10053080-146 = "My theory is that this bridge was cut intentionally."
10053080-147 = "This was likely by the same person who cut the telephone line...and the same person who is watching us."
10053080-148 = "They are trying to keep us isolated."
10053080-149 = "Who?! Why?! Why would they do that?!"
10053080-150 = "...Because we are looking for the Tsuchinoko."
10053080-151 = "If the Tsuchinoko is a scouting drone, then we, Expedition Team X, are the aliens' greatest threat!"
10053080-152 = "Maybe we have come closer to revealing the TRUTH about the Tsuchinoko than anyone else has ever before!"
10053080-153 = "Tsubasa, cut the nonsense and get real!"
10053080-155 = "Wh-What's going on? It's so bright!"
10053080-156 = "It's a UFO! It's here!"
10053080-157 = "Th-They're really aliens...?"
10053080-160 = "...Wait. Hold up. I've seen this before."
10053080-161 = "It's a flare."
10053080-162 = "Hm?"
10053080-165 = "Yeeeeah! Looks like Deputy Director really is a superstitious coward!"
10053080-166 = "Come on, everybody! It's time for some payback!"
10053080-171 = "What's going on?"
10053080-172 = "They...don't look like aliens."
10053080-173 = "Of course not! What do we do?!"
10053080-178 = "...Aha. Finally, something I understand."
10053080-182 = "TIME TO TAKE OUT THE TRASH!!"
