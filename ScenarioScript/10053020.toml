[translation]
10053020-1 = "Episode 2;She Has That Kind Of Gimmick"
10053020-2 = "Wh-What?! What are you doing here, Sensei?!"
10053020-3 = "[s1] \"I should ask what YOU are doing!\"\n[s2] \"How are you even out here?!\""
10053020-6 = "What? What do you mean \"how\"? I got official permission through the proper channels!"
10053020-7 = "...Ah, I know you think you know everything about our school, but don't believe the rumors."
10053020-8 = "Wildhunt doesn't literally imprison its students, you know?"
10053020-9 = "Of course, getting an outing pass approved is a bit of a hassle..."
10053020-10 = "Huh? Oh, Sensei... Do you know Gurumin?"
10053020-11 = "[s3] \"Yes, very well.\"\n[s4] \"She's an underclassman from a past life.\""
10053020-14 = "...? What kind of relationship is that?"
10053020-15 = "Shyaah! No! Not you too, Sensei! Don't indulge that nonsense—you'll only make Kanoe even more annoying!"
10053020-16 = "Still, you need to answer my question. Why are you here, Sensei?"
10053020-17 = "I thought the THREE of us were looking for a Tsuchinoko."
10053020-18 = "Ah, sorry. I forgot to mention Sensei was tagging along. It was a little last-minute."
10053020-19 = "But, regardless, the more the merrier! Right, ladies?"
10053020-20 = "Keep your extroversion away from me."
10053020-21 = "Since it seems like Sensei already knows Gurumin, we can skip THAT introduction."
10053020-22 = "Then... Hm."
10053020-30 = "..."
10053020-35 = "[ns5] \"...? Are you pointing at me...?\"\n[ns6] Press your fingertips together."
10053020-36 = "...Telepathy has failed."
10053020-37 = "It seems Sensei and I operate on different wavelengths."
10053020-41 = "...!"
10053020-42 = "As suspected. You and I share auras, Sensei."
10053020-47 = "Nice to meet you. And welcome."
10053020-48 = "My name is Hanemoto Tsubasa, leader of this expedition. I operate the Mo Paranormal Research Institute."
10053020-49 = "When addressing me, I'd appreciate if you call me \"Director Tsubasa.\""
10053020-50 = "[ns7] \"Director...?\"\n[ns8] \"Rena...?\""
10053020-55 = "Look, I know what you're thinking... But she's not as strange as she seems. I would know."
10053020-56 = "It's just live stream stuff. \"Mo Paranormal Research Institute\" is her channel."
10053020-57 = "So, it's kind of her gimmick."
10053020-58 = "A \"gimmick\"? You wound me, Rena."
10053020-59 = "Our research institute is the only organization utilizing scientific methodology to investigate paranormal activities in Kivotos."
10053020-60 = "First off, there's no \"our\" or \"organization.\" It's just you."
10053020-61 = "Th-That's... There's a complicated reason for it to appear that way."
10053020-62 = "Above all, Sensei! I don't want you to misunderstand!"
10053020-63 = "Paranormal research is not pseudoscience!"
10053020-64 = "Ahhh... There she goes again..."
10053020-68 = "Paranormal activities not only exist throughout Kivotos, but locally and frequently. I'm sure you are familiar."
10053020-69 = "Recently, something absolutely OUTSTANDING happened at Millennium. Do you know about it, Sensei?"
10053020-70 = "[s] \"...!\""
10053020-75 = "Oh... I can read your face. You suspect that you know EXACTLY what I'm talking about, don't you?"
10053020-76 = "I suppose it makes sense. It was so ground-breaking, so incredible, that it would be strange if Schale's Sensei didn't know."
10053020-77 = "That's right. I'm talking about the Millennium Higashi Alps UFO Witness Case!"
10053020-78 = "[ns9] \"...Huh?\"\n[ns10] \"Higashi Alps, what...?\""
10053020-83 = "According to eyewitness accounts, in the early morning, an unidentified white disc-like figure, surrounded by light, was flying freely, ignoring the established rules of acceleration!"
10053020-84 = "This is only a hypothesis, but you cannot deny that flying object sounds like an archetypal UFO sighting, as popularized by Adamski!"
10053020-85 = "Some say that due to the craft's formulaic, and, dare I say, CLICHE appearance, that it is a hoax or confirmation bias. I disagree with such assertions."
10053020-86 = "UFOs exist!"
10053020-91 = "You cannot deny the evidence. There are numerous consistent, independent eyewitness accounts."
10053020-92 = "If I were able, I would visit the encounter sites myself and attempt to communicate. Unfortunately, I can't freely traverse within Millennium's boundaries...for...some reason..."
10053020-93 = "[s11] \"Communicating with a UFO...?\"\n[s12] \"Rena...?\""
10053020-96 = "Sure... She's strange! But it's nothing like the Occult Society!"
10053020-97 = "She's much more realistic and rational than my roommates, and we get along surprisingly well..."
10053020-98 = "Wait, why am I even making excuses right now?"
10053020-102 = "Director Mo may not look like it, but she's quite famous in the industry."
10053020-103 = "She uploads urban explorer videos every day, without fail. You wouldn't BELIEVE the abandoned buildings she's trespassed into!"
10053020-104 = "No, there's no such industry. And...she's not THAT famous."
10053020-105 = "She only explores abandoned buildings with nothing going on. There are practically no views or subscribers."
10053020-107 = "[ns13] \"You explore abandoned buildings every day...?\"\n[ns14] \"And there's still time for schoolwork...?\""
10053020-112 = "O-Of course there is! Every Millennium student takes her classes seriously. Especially math!"
10053020-113 = "...? You're from Millennium?"
10053020-114 = "Huh? Did I not mention that?"
10053020-115 = "No, you didn't... I'm surprised. I thought Millennium students wouldn't believe in this kind of stuff."
10053020-116 = "What kind of \"stuff\"?"
10053020-117 = "Well, you know. The Tsuchinoko or Yeti..."
10053020-118 = "...or magic."
10053020-119 = "Oh. Now, as a Millennium Student, I cannot let that slide."
10053020-120 = "No theory was proven from the onset. Every proposition went through the scientific method to be interpreted and verified before eventually settling as a universal truth."
10053020-121 = "...Huh?"
10053020-125 = "In other words, denying a possibility simply because it has not yet been proven is denying the very FOUNDATION of the natural philosophy built up by humanity."
10053020-126 = "Furthermore, even Millennium, the seat of cutting-edge, modern science, has its own mysteries. Just look at the unexplored Ruins next door."
10053020-127 = "Paranormal exploration should be tackled by scientists, not shunned as a superstitious taboo."
10053020-128 = "And, while more CONSERVATIVE and INCURIOUS researchers consider the field to be \"pseudoscience,\" I find..."
10053020-133 = "Ah... You really ARE a Millennium student."
10053020-134 = "My roommates say similar things—though with a slightly different fervor."
10053020-135 = "And yet we are all aligned because we share that same curiosity!"
10053020-136 = "Perhaps we have something in common, Rena. After all, you're out here, searching for the Tsuchinoko."
10053020-137 = "...Ah. That's not why I'm here."
10053020-138 = "Hm?"
10053020-142 = "Let me be crystal clear, in case there's a misunderstanding."
10053020-143 = "I don't believe in the Tsuchinoko!!"
10053020-149 = "[ns15] \"...Sure, you don't.\"\n[ns16] \"I understand completely.\""
10053020-153 = "Excuse me! What's that about?"
10053020-154 = "Actually, I think we should ask you the same question."
10053020-155 = "If you don't believe in the Tsuchinoko, then why are you on this expedition?"
10053020-156 = "Well, it's because..."
10053020-161 = "*sigh*...Sensei already knows this, but my roommates are...eccentric. You could say they're occult fanatics."
10053020-162 = "Just imagine them scrolling, then finding some yahoo who claims to have seen a Tsuchinoko. They'd be so smug, then declare that it's proof of the occult or art or whatever!"
10053020-163 = "That's why I'm beating them to it!"
10053020-164 = "All these witnesses probably saw some flat lizard or a snake that ate a hot dog."
10053020-165 = "If I can find the source of all this nonsense and prove how the false rumors began, then they'll have to listen to me."
10053020-166 = "...Though I wonder if that's enough to wake them up."
10053020-167 = "[s17] \"...Sure, that's why.\"\n[s18] \"I understand completely.\""
10053020-170 = "I JUST told you it's not like that...!"
10053020-175 = "Wait. I can't allow someone with such impure motives to participate."
10053020-176 = "Our goal is to confirm the existence of the legendary cryptid, Tsuchinoko."
10053020-177 = "Here, here!"
10053020-178 = "And then...to prove that it is ACTUALLY an alien scouting drone!"
10053020-179 = "...Huh? That's...really what we're doing?"
10053020-181 = "No, it's not! Stop shoehorning your freaky obsession into this."
10053020-182 = "We're here...to prove the Tsuchinoko exists!"
10053020-183 = "Ah, ahh... I see. Perhaps that was too much for me to spring on an amateur."
10053020-184 = "But extraterrestrial studies aren't just something I made up. They're actively being researched in academia."
10053020-185 = "A related article was published in the most recent edition of \"New Pyramid Future,\" Red Winter's renowned academic journal."
10053020-186 = "That pseudoscience rag?!"
10053020-187 = "Sensei, that magazine is just a collection of conspiratorial articles that were rejected by every publisher in Millennium. They PAY to be printed in Red Winter!"
10053020-188 = "You're wrong. The Seminar elites are the ones censoring the truth. They're the Millennium academia who only promote THEIR version of \"mainstream science\"..."
10053020-189 = "That said, Rena... You're pretty well versed for such a skeptic."
10053020-190 = "Even some longtime subscribers don't know that much about the magazine's background..."
10053020-191 = "...!"
10053020-192 = "...I see. It seems you, too, are an expert. You come here armed with your own theories."
10053020-193 = "Very well. I accept your challenge. If you wish to debate..."
10053020-194 = "...My argument remains the same. The Tsuchinoko is an alien camouflage drone."
10053020-195 = "Its unnatural look is the result of a half-hearted attempt to mimic indigenous life forms from a different gravitational environment. Its elusive nature reflects the exploration drone's goal: quiet reconnaissance."
10053020-196 = "Ah, you know... I was really hoping that we were looking for an ACTUAL snake."
10053020-197 = "I am not ruling that out. Anything is possible."
10053020-198 = "I am eager to see who has the more accurate interpretation. This expedition is bound to be interesting!"
10053020-203 = "\"Interpretation\"? I, well..."
10053020-204 = "*sigh* Whatever. At least we're all looking for the same thing."
10053020-205 = "...Am I the only normal person in Kivotos?"
10053020-206 = "[ns19] \"...Sure, you are.\"\n[ns20] \"I understand completely.\""
10053020-211 = "SHYAAH!! Stop it!!"
