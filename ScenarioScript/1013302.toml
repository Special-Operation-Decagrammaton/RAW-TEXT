[translation]
1013302-1 = "หุ่นยนต์เมด"
1013302-2 = "(คุณครูสงสัยว่าริโอะจัดระเบียบห้องส่วนตัวในยานขนส่งดีหรือเปล่า)"
1013302-3 = "(สุดท้ายก็ตัดสินใจแวะไปดูด้วยความเป็นห่วง...)"
1013302-10 = "ครู? จู่ๆ มีธุระอะไรเหรอ?"
1013302-11 = "[ns1] \"โอ้...?\"\n[ns2] \"โอ้ววว...!!\""
1013302-14 = "...?"
1013302-15 = "[ns3] \"ห้องสะอาดเรียบร้อยดีจัง!\"\n[ns4] \"ยอดเยี่ยมเลยนะ! ริโอะ!\" "
1013302-18 = "อ่า ที่มาก็เพราะเป็นห่วงสินะ"
1013302-19 = "ตอนนี้ไม่เป็นไรแล้วละ ฉันมีผู้ช่วยที่มาช่วยจัดห้องให้น่ะ"
1013302-20 = "ฉันจะแนะนำให้รู้จัก นี่คือหุ่นรบล้ำยุคแม่บ้าน"
1013302-25 = "ถึงรูปลักษณ์จะเหมือนหุ่นรบล้ำยุคที่มีอยู่เดิม แต่ฉันก็แก้ไขฟังก์ชันโดยรวมให้ช่วยงานบ้านส่วนใหญ่ได้"
1013302-26 = "เป็นยังไงล่ะ? ยอดเยี่ยมไปเลยใช่มั้ย?"
1013302-27 = "[ns] \"ริโอะไม่ได้ทำความสะอาดห้องด้วยตัวเองสินะ...\""
1013302-30 = "ในเมื่อหุ่นรบล้ำยุคที่ฉันสร้างขึ้นเป็นคนทำ งั้นการที่ห้องสะอาดก็ถือว่าเป็นผลงานของฉันไม่ใช่เหรอ?"
1013302-31 = "เอาเถอะ ยังไงความพยายามครั้งนี้ของฉันก็ประสบความสำเร็จมากเลยละ"
1013302-32 = "ถ้าได้กลับไปที่โรงเรียน ฉันวางแผนจะใช้หุ่นรบล้ำยุคแม่บ้านนี้ต่อด้วย"
1013302-33 = "และถ้าเป็นไปได้ ฉันก็อยากผลิตหุ่นรบนี้ให้ได้เยอะๆ แล้วแจกจ่ายให้ผู้คนรอบตัวเอาไปใช้งานด้วย"
1013302-34 = "[s] \"ถ้าจะผลิตเยอะๆ งั้นแค่หุ่นยนต์เมดธรรมดาๆ ก็น่าจะพอนะ!\""
1013302-35 = "หุ่นยนต์เมดเหรอ...?"
1013302-36 = "โดยทั่วไปแล้ว หุ่นยนต์เมดก็คือหุ่นยนต์ที่ช่วยงานบ้านต่างๆ ใช่มั้ย?"
1013302-37 = "ถ้างั้น หุ่นรบล้ำยุคแม่บ้านก็ถือว่าเป็น..."
1013302-38 = "หุ่นยนต์เมดที่ยอดเยี่ยมเลยน่ะสิ?"
1013302-39 = "หืม...? ทำหน้าเหมือนไม่เห็นด้วยเลยนะ"
1013302-40 = "อ่า อย่างนั้นสินะ ฉันลืมสิ่งที่สำคัญที่สุดไป"
1013302-41 = "ต้องให้ใส่ชุดเมดด้วยสินะ"
1013302-42 = "เห็นทีฉันต้องหาชุดเมดให้หุ่นรบล้ำยุคแม่บ้านใส่แล้วละ"
1013302-43 = "[s] \"ครูขอละ พับไอเดียนี้ไว้ก่อนเถอะ!!\""
1013302-44 = "หืม? ทำไมล่ะ...?"
1013302-45 = "ปัญหานี้แก้ได้ด้วยการให้ใส่ชุดเมดไม่ใช่เหรอ?"
1013302-46 = "[s] \"ครูอยากให้ใส่ใจรูปลักษณ์ภายนอกให้มากกว่านี้หน่อยน่ะ!\""
1013302-50 = "ช่วยอธิบายให้ละเอียดหน่อยได้มั้ย?"
1013302-51 = "ถ้างั้นในความคิดของครู หุ่นยนต์เมดควรมีรูปลักษณ์แบบไหนกันล่ะ?"
1013302-52 = "[s] \"ต้องน่ารัก น่าเอ็นดู!\""
1013302-53 = "แต่หุ่นรบล้ำยุคของฉันก็... ทั้งน่ารักและน่าเอ็นดูนะ?"
1013302-54 = "[s] \"ต้องดูดีและมีท่วงท่าสง่างาม!\""
1013302-55 = "หุ่นรบล้ำยุคของฉันก็... มันอาจจะขึ้นอยู่กับมุมมอง แต่ก็..."
1013302-56 = "[s] \"ต้องวางใจได้ว่าจะทำทุกอย่างสำเร็จ!\""
1013302-57 = "นั่นก็... หุ่นรบล้ำยุคเลยนี่?"
1013302-58 = "[s] \"ตะ... ต้องใส่ชุดเมดที่น่ารักๆ ด้วย!\""
1013302-59 = "ก็เมื่อกี้เราเพิ่งพูดเรื่องชุดเมดกันไปไง..."
1013302-60 = "แต่ในแง่นั้น หุ่นรบล้ำยุคของฉันก็ถือว่าเหนือชั้นกว่า"
1013302-61 = "ถ้าเทียบกับสมาชิก C&C เด็กพวกนั้นใส่ชุดเมดกัน แต่ก็ไม่ใช่หุ่นยนต์ งั้นก็ถือว่า 'ไม่ใช่หุ่นยนต์เมด'"
1013302-62 = "และต่อให้จะเอาชุดเมดให้อาริสึใส่ แต่ก็ไม่อาจเป็น 'หุ่นยนต์เมด' ได้ นั่นก็เพราะอาริสึไม่ใช่หุ่นยนต์ แต่เป็นมนุษย์"
1013302-63 = "ในทางกลับกัน หุ่นรบล้ำยุคแม่บ้านของฉันคือหุ่นยนต์อย่างไม่ต้องสงสัย"
1013302-64 = "เพราะงั้นถ้าเอาชุดเมดให้หุ่นรบล้ำยุคแม่บ้านใส่..."
1013302-65 = "ก็จะเป็นหุ่นยนต์เมดที่ยอดเยี่ยมเลยละ"
1013302-66 = "[s] (ตะ... ตรรกะนี้ก็... เหมือนจะถูก...!)"
1013302-67 = "ดูเหมือนการรับรู้ของเราจะยังแตกต่างกันอยู่นะ..."
1013302-68 = "ไม่คิดเลยว่ารสนิยมของเราจะต่างกันได้ถึงขนาดนี้"
1013302-69 = "ฉันคงต้องเปิดใจรับฟังความคิดเห็นของคนอื่นดูบ้างแล้วละ"
1013302-70 = "ถ้างั้นเรารีบหาชุดเมดให้หุ่นรบล้ำยุคใส่ แล้วไปถามความคิดเห็นจากทุกคนกันเถอะ"
1013302-71 = "ชุดเมดกับหุ่นยนต์..."
1013302-72 = "รวมกันเป็นหุ่นยนต์เมด"
1013302-73 = "ทุกคนจะต้องยอมรับข้อเท็จจริงที่ปฏิเสธไม่ได้นี้แน่"
1013302-74 = "[s] \"แล้วจะไปหาชุดเมดมาจากไหนเหรอ...?\""
1013302-75 = "โทคิน่าจะมีชุดเมดเหลืออยู่บ้างนะ?"
1013302-76 = "[s] \"ครูว่าน่าจะใส่ไม่ได้นะ...!!\""
1013302-77 = "ถ้างั้นฉันจะปรับสัดส่วนหุ่นรบล้ำยุคให้พอดีกับชุดเมดเอง"
1013302-78 = "เอาละ ฉันจะออกไปยืมชุดเมดจากโทคิก่อน"
1013302-79 = "ไว้เจอกันนะ"
1013302-83 = "[ns] \"ริโอะ เอาจริงเหรอเนี่ย...\""
1013302-85 = "(คุณครูอดสงสัยไม่ได้ว่าผลลัพธ์จะออกมาเป็นยังไง...)"
