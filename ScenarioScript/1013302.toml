[translation]
1013302-1 = "何謂女僕機器人"
1013302-2 = "（擔心莉央有沒有好好整理運輸船的個人房間……）"
1013302-3 = "（……於是決定先去看看情況）"
1013302-10 = "老師？突然過來有什麼事嗎？"
1013302-11 = "[ns1] 「……哦？」\n[ns2] 「哦哦哦……！！」"
1013302-14 = "……？"
1013302-15 = "[ns3] 「房間這麼乾淨！」\n[ns4] 「做得好！莉央！」"
1013302-18 = "啊，原來是擔心這個才來的啊。"
1013302-19 = "現在沒問題了。#n因為有個能幫忙整理房間的孩子在。"
1013302-20 = "我來向你介紹一下吧。#n這是家事幫手前衛君。"
1013302-25 = "雖然外觀和原本的前衛君差不多，不過我將其改造得能夠幫忙做家事了。"
1013302-26 = "怎麼樣？還不錯吧？"
1013302-27 = "[ns] 「原來莉央不是自己整理的啊……」"
1013302-30 = "既然是我製作的前衛君做的，不就等於是我整理的嗎？"
1013302-31 = "總之這次的嘗試非常成功。"
1013302-32 = "將來回到學園之後，我也打算繼續使用家事幫手前衛君。"
1013302-33 = "如果可以的話，或許量產後普及給周圍的人也不錯。"
1013302-34 = "[s] 「如果有量產計畫的話，感覺做普通的女僕機器人比較好！」"
1013302-35 = "女僕機器人……？"
1013302-36 = "一般來說，女僕機器人是指幫忙做各種家事的機器人吧？"
1013302-37 = "那麼家事幫手前衛君……"
1013302-38 = "應該已經能稱得上是很優秀的女僕機器人了吧？"
1013302-39 = "……嗯？看來你似乎不太能接受呢。"
1013302-40 = "啊，對了。#n我遺忘了最重要的東西。"
1013302-41 = "那就是並沒有讓它穿上女僕裝呢。"
1013302-42 = "既然如此，就讓家事幫手前衛君穿上女僕裝後進行普及吧。"
1013302-43 = "[s] 「還請務必三思！！」"
1013302-44 = "嗯？為什麼……？"
1013302-45 = "穿上女僕裝不就解決了嗎？"
1013302-46 = "[s] 「希望你能多注意外觀！」"
1013302-50 = "能請你具體說明一下嗎？"
1013302-51 = "老師心目中的女僕機器人，應該是什麼樣子呢？"
1013302-52 = "[s] 「既可愛又討人喜歡！」"
1013302-53 = "前衛君……也既可愛又討人喜歡啊？"
1013302-54 = "[s] 「整潔高雅的姿態！」"
1013302-55 = "前衛君……從某種角度來看，或許也是如此吧。"
1013302-56 = "[s] 「什麼事都能做到的可靠存在！」"
1013302-57 = "和前衛君……一樣呢？"
1013302-58 = "[s] 「還，還有可愛的女僕裝！」"
1013302-59 = "女僕裝的事，剛才不是已經討論過了嗎……"
1013302-60 = "不過在這一點上，前衛君也有優勢。"
1013302-61 = "舉例來說，C&C的孩子們也穿著女僕服。#n然而他們並非機器人，因此無法成為「女僕機器人」。"
1013302-62 = "即使讓愛麗絲穿上，也同樣不能成為「女僕機器人」。#n因為那孩子不是機器人，而是人類。"
1013302-63 = "然而，家事幫手前衛君是不折不扣的機器人。"
1013302-64 = "所以只要讓家事幫手前衛君穿上女僕裝……"
1013302-65 = "就是個優秀的女僕機器人了。"
1013302-66 = "[s] （怎，怎麼好像挺有道理的……！）"
1013302-67 = "……認知上似乎還是有差異呢。"
1013302-68 = "沒想到我們的意見居然會如此分歧。"
1013302-69 = "看來有必要參考其他人的意見了。"
1013302-70 = "我這就把換上女僕裝的前衛君展示給大家看看。"
1013302-71 = "女僕裝和機器人……"
1013302-72 = "合在一起就是女僕機器人。"
1013302-73 = "在這個明確的事實面前，大家也只能承認了吧。"
1013302-74 = "[s] 「女僕裝要從哪裡弄來呢……？」"
1013302-75 = "季的話應該有備用的衣服吧？"
1013302-76 = "[s] 「尺寸肯定不合吧……！！」"
1013302-77 = "那就配合衣服，對前衛君進行改造吧。"
1013302-78 = "我現在就去借女僕裝。"
1013302-79 = "待會見。"
1013302-83 = "[ns] 「莉央是認真的呢……」"
1013302-85 = "（結果究竟會如何呢……）"
