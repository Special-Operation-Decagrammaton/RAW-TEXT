[translation]
202-1 = "เชเซ็ด ผู้พิพากษาด้วยความทุกข์เปี่ยมการุณ"
202-2 = "บริเวณที่เรียกว่า <พื้นที่รกร้าง> แห่งนี้... สำหรับพวกเราแล้วคือพื้นที่ที่น่าสนใจเช่นกัน \n"
202-3 = "เหล่าพี่น้องของเกมาเทรียเองก็จับตาดูที่แห่งนี้อยู่ด้วยความสนใจ"
202-4 = "โรงงานอาวุธที่ถูกทิ้งร้างอยู่ในตอนนี้"
202-5 = "เดคาแกรมมาทอนได้ติดต่อกับ AI ที่ควบคุมโรงงานที่สร้างกองทัพไร้ขีดจำกัด \"ดิวิชั่น\""
202-6 = "ตอนนี้โรงงานอาวุธทั้งโรงงานกำลังจะเริ่มเดินบนเส้นทางของตัวเอง#nในฐานะผู้เลื่อมใสตนใหม่ของเดคาแกรมมาทอน"
202-8 = "-- เชเซ็ด"
202-9 = "เส้นทางของเขาคือความเมตตาที่ขับเคลื่อนด้วยอำนาจ"
202-10 = "ชื่อเรียกของเขาก็คือผู้พิพากษาด้วยความทุกข์เปี่ยมการุณ#n(the judge who condemns with compassionate torment)"
202-12 = "อาณาจักรที่มีความเข้มแข็งและประชาชนที่เปี่ยมด้วยความภักดี#nจะสามารถแย่งอำนาจไปจากเขาได้หรือไม่..."
202-13 = "นี่ก็คงเป็นคำถามที่น่าสนใจมากทีเดียว"
