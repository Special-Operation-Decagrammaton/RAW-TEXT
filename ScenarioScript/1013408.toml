[translation]
1013408-1 = "歸來的勇者大人？"
1013408-2 = "（……結束鋼鐵大陸的決戰，回歸日常後過了一段時間）"
1013408-3 = "（為了尋找發來的MomoTalk與平時截然不同的愛麗絲，前往了他提供的地址）"
1013408-6 = "（人潮擁擠得連站的地方都沒有）"
1013408-7 = "（雖然是在離開之後才得知，不過這裡似乎正在舉辦非常有名的遊戲展）"
1013408-16 = "（……看來要邊走邊找愛麗絲是不可能的）"
1013408-17 = "（向愛麗絲發送了已經到達會場的訊息和當前的位置）"
1013408-22 = "老師？"
1013408-23 = "你在哪裡？愛麗絲在這裡！"
1013408-24 = "[ns1] 「愛麗絲！？」\n[ns2] 「不好意思，麻煩借過一下……」"
1013408-27 = "啊，老師！找到了！"
1013408-28 = "愛麗絲馬上過去，請老師待在那裡就好！"
1013408-33 = "乓啪喀乓！"
1013408-34 = "老師加入隊伍了！"
1013408-35 = "[s3] 「那個樣子是……！？」\n[s4] 「Abi-Eshuh！？」"
1013408-38 = "沒錯！勇者愛麗絲，完全復──"
1013408-46 = "他剛才是不是飛起來了啊！？"
1013408-47 = "那是什麼構造啊？#n品質完全不是普通Cosplay的等級吧？"
1013408-48 = "是哪款遊戲？是哪個攤位的宣傳啊？"
1013408-50 = "嗚哇啊！愛麗絲忘記自己正在逃跑了！"
1013408-51 = "待會再跟老師說明，總之先離開吧！"
1013408-57 = "……所以，遊戲開發部也想藉著這個機會用新作參展。"
1013408-58 = "而為了比周圍的攤位更引人注目，宣傳是很重要的……"
1013408-59 = "雖然宣傳效果確實很好，可是卻好到有點過頭了！"
1013408-60 = "不知道從什麼時候開始，大家就變得不再聚集到攤位，而是都朝愛麗絲湧過來了！"
1013408-61 = "完全是本末倒置！"
1013408-62 = "[s5] 「這也難怪，畢竟既華麗又能飛……」\n[s6] 「我好像也會想圍觀。」"
1013408-65 = "連老師都這麼說！？"
1013408-66 = "要這樣一個一個回應所有人的話，就永遠都回不了部室了！"
1013408-67 = "飛到那邊去了！"
1013408-68 = "那個，請問可以拍照嗎？#n不介意的話能不能擺個姿勢？"
1013408-69 = "啊！被發現了！"
1013408-76 = "請，請大家一個一個慢慢說！嗚哇啊！"
1013408-82 = "（結果直到活動結束為止，都和愛麗絲忙得不可開交）"
1013408-90 = "……總，總算結束了。"
1013408-91 = "中途開始發生了什麼，記憶都有點模糊了……"
1013408-92 = "[s7] 「辛苦了……」\n[s8] 「我也只記得一直在拍照而已……」"
1013408-97 = "[ns9] 「啊，對了！那個樣子是怎麼回事！？」\n[ns10] 「Abi-Eshuh不是在那時候壞掉了嗎？」"
1013408-100 = "啊，剛才因為太忙就忘記說明了！"
1013408-101 = "乓啪喀乓！勇者愛麗絲完全復活！"
1013408-102 = "……雖然很想這麼說。"
1013408-103 = "其實，這只是複製品。"
1013408-104 = "啊，不過它也是以原版為基礎製作的。"
1013408-105 = "在離開鋼鐵大陸之前，愛麗絲發現了Abi-Eshuh的殘骸。"
1013408-106 = "雖然說是殘骸，實際上也只是一隻手就能撿起來的小碎片而已……"
1013408-107 = "[s11] 「你想把它一起帶回來吧。」\n[s12] 「因為Abi-Eshuh也是夥伴。」"
1013408-112 = "……是的！"
1013408-113 = "然後愛麗絲想說也許能夠修好，就把殘骸拿給千年的大家看了。"
1013408-123 = "可惜因為損壞太嚴重的關係，無法恢復原狀。"
1013408-124 = "不過他們也告訴愛麗絲，#n如果能說明[ruby=原型]Master Model[/ruby]的形態和功能的話，會盡可能相似地重現出來。"
1013408-125 = "多虧有大家的幫忙，Abi-Eshuh才能恢復原來的樣子！"
1013408-126 = "……雖然原版只佔了一小部分就是了。"
1013408-127 = "啊，不過輸出跟以前相比弱了很多，所以沒辦法長時間飛行或進行高速機動。"
1013408-128 = "裝備的耐久度也相當有限，因此他們再三叮嚀不能用它來戰鬥。"
1013408-129 = "[s13] 「所以是複製品啊。」\n[s14] 「好不容易能夠修復，實在有點可惜呢。」"
1013408-132 = "……？"
1013408-133 = "愛麗絲一點都不覺得可惜。"
1013408-134 = "在與魔王的戰鬥結束後被封印力量的勇者，在這行是很常見的。#n最近甚至都有點老套了。"
1013408-135 = "而且……"
1013408-142 = "今天是愛麗絲第一次穿著Abi-Eshuh站在大家面前。"
1013408-143 = "大家看到Abi-Eshuh之後都說它很帥、很喜歡……"
1013408-144 = "那比能在天上飛，或者擁有與魔王戰鬥的力量好得太多太多了。"
1013408-145 = "所以今天的愛麗絲非常幸福！"
1013408-147 = "（和愛麗絲手牽手回到了遊戲開發部的部室）"
1013408-148 = "（……就連途中也被路人請求一起拍照了好幾次）"
