[translation]
1013408-1 = "The Hero Returns?"
1013408-2 = "...How much time had passed since we'd won the final battle at the Steel Continent and returned to daily life?"
1013408-3 = "Aris' MomoTalk seemed a little different from usual, so I rushed over to the location she sent me."
1013408-6 = "Once I got there, I saw an intimidating sea of people before me. It seemed impossible to get a single foot in the crowd."
1013408-7 = "Apparently, it was for a very big gaming convention being held there."
1013408-16 = "...After a while, I realized it'd be impossible to spot Aris just by wandering around."
1013408-17 = "So, instead, I sent her a message with my location attached, letting her know I'd arrived."
1013408-22 = "Sensei?"
1013408-23 = "Where are you? I am right here!"
1013408-24 = "[ns1] \"Aris?!\"\n[ns2] \"I'm sorry, excuse me...\""
1013408-27 = "Ah! Sensei! I found you!"
1013408-28 = "I will go to you, so please do not move!"
1013408-33 = "Bum bum bum!"
1013408-34 = "Sensei has joined the party!"
1013408-35 = "[s3] \"Is that...?!\"\n[s4] \"Abi-Eshuh?!\""
1013408-38 = "That's right! Hero Aris, completely revive—"
1013408-46 = "Did she just fly?!"
1013408-47 = "How does it work? This goes beyond your average cosplay!"
1013408-48 = "Is this for a game? Which booth are you from?!"
1013408-50 = "Eek! I forgot I was escaping!"
1013408-51 = "I will explain later, so please run away with me for now!"
1013408-57 = "...And so, the Game Development Department entered with a new game!"
1013408-58 = "I heard that good marketing is the key to stand out from other booths..."
1013408-59 = "However, one CAN have too much of a good thing!"
1013408-60 = "People were only paying attention to me, not our booth!"
1013408-61 = "Which defeated our original purpose entirely!"
1013408-62 = "[s5] \"Makes sense. A flying mecha-girl is pretty flashy...\"\n[s6] \"I'd 100% come and look too.\""
1013408-65 = "Et tu, Sensei?!"
1013408-66 = "If I talk to everyone in the crowd, I will never make it back to the club room!"
1013408-67 = "She flew that way!"
1013408-68 = "Could you strike a pose for a picture, please?"
1013408-69 = "Gah! We have been discovered!"
1013408-76 = "S-Slowly, one person at a time, please! EEEEEEK!"
1013408-82 = "I spent the rest of a very hectic day at the event with Aris."
1013408-90 = "...W-We have made it to the end, somehow..."
1013408-91 = "I believe my memory drives stopped functioning halfway through."
1013408-92 = "[s7] \"Good work...\"\n[s8] \"All I remember is taking a lot of pictures...\""
1013408-97 = "[ns9] \"Oh, by the way! What happened?!\"\n[ns10] \"I thought Abi-Eshuh was beyond repair!\""
1013408-100 = "Ah, in the chaos, I forgot to explain!"
1013408-101 = "Bum bum bum! Hero Aris, completely revived!"
1013408-102 = "...At least that is what I would like to say."
1013408-103 = "However, this is a replica."
1013408-104 = "But not completely! Part of it comes from the original!"
1013408-105 = "I somehow managed to find what was left of Abi-Eshuh before we left the Steel Continent."
1013408-106 = "It was just a small fragment of it. I could hold it in the palm of my hand."
1013408-107 = "[s11] \"But you still wanted to return together.\"\n[s12] \"Since Abi-Eshuh is your friend too.\""
1013408-112 = "Yes, exactly, Sensei!"
1013408-113 = "I showed it to everyone I could in Millennium, hoping that we could fix it."
1013408-123 = "I was told the same thing from every person. That it was just too damaged. Abi-Eshuh could never be brought back."
1013408-124 = "However, they suggested that, if I could explain it to them in great detail, they could recreate it as best they could!"
1013408-125 = "And this is how Abi-Eshuh has returned!"
1013408-126 = "...It only has a small piece from the original, though."
1013408-127 = "And it is much weaker...so I cannot fly very fast or for very long."
1013408-128 = "Also, its durability is very fragile, so I was warned many times that I could not fight with it."
1013408-129 = "[s13] \"Nothing can beat the original, after all.\"\n[s14] \" That must be a shame, after finally having it back.\""
1013408-132 = "...?"
1013408-133 = "I do not see it that way at all."
1013408-134 = "It is common for the hero's powers to be sealed after the final battle against the demon lord. It is almost a cliche these days."
1013408-135 = "And..."
1013408-142 = "I stood before everyone with Abi-Eshuh for the first time again today."
1013408-143 = "And everyone said Abi-Eshuh was cool and that they loved it."
1013408-144 = "I think that is much better than flying or having the power to fight the demon lord."
1013408-145 = "So I was very happy today!"
1013408-147 = "Hand in hand, we returned to the Game Development Department club room."
1013408-148 = "...Even on the way, multiple passersby requested photos of Aris."
