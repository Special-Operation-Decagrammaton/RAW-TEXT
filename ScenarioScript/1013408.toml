[translation]
1013408-1 = "ผู้กล้าที่กลับมา?"
1013408-2 = "(เป็นเวลานานแล้วที่กลับมาใช้ชีวิตประจำวันอีกครั้ง หลังจากสิ้นสุดการต่อสู้ในดินแดนเหล็กกล้า...)"
1013408-3 = "(อาริสึส่ง MOMOTALK ที่น่ากังวลมาให้ คุณครูจึงมุ่งหน้าไปหาตามที่อยู่ที่อาริสึให้ไว้)"
1013408-6 = "(คุณครูเจอกับฝูงชนจำนวนมากจนแทบจะเดินเข้าไปไม่ได้)"
1013408-7 = "(จนได้รู้จากข้างนอกว่ามีการจัดงานเทศกาลเกมชื่อดังมากงานหนึ่ง)"
1013408-16 = "(แต่คนก็แน่นจนเดินตามหาอาริสึไม่ได้...)"
1013408-17 = "(คุณครูจึงส่งข้อความไปบอกอาริสึมาว่าถึงงานแล้ว และส่งโลเคชั่นไปให้)"
1013408-22 = "คุณครู?"
1013408-23 = "อยู่ตรงไหนคะ? อาริสึอยู่ตรงนี้ค่ะ!"
1013408-24 = "[ns1] \"อาริสึ?!\"\n[ns2] \"ขอโทษนะ ขอครูเดินเข้าไปหน่อย...\""
1013408-27 = "อ๊ะ คุณครู! เจอแล้วค่ะ!"
1013408-28 = "อาริสึจะไปหาเองค่ะ รออยู่ตรงนั้นนะคะ!"
1013408-33 = "ปาปัม ปาปัม ป๊าม!"
1013408-34 = "ได้เจอกับสหายคุณครูแล้วค่ะ!"
1013408-35 = "[s3] \"ชุดนี้มัน...?!\"\n[s4] \"ใส่อาบี เอชูห์มาเลยเหรอ?!\""
1013408-38 = "ใช่ค่ะ! ผู้กล้าอาริสึกลับมาแล้ว..."
1013408-46 = "เมื่อกี้บินอยู่บนฟ้าใช่มั้ย?!"
1013408-47 = "นี่มันโครงสร้างชุดแบบไหนกันเนี่ย? ดูไม่ใช่คอสเพลย์ธรรมดาเลยนะ?"
1013408-48 = "เกมอะไรเหรอ? โปรโมตให้บูธไหนอยู่เหรอ?"
1013408-50 = "แง! ลืมไปเลยค่ะว่ากำลังหนีอยู่!"
1013408-51 = "เรื่องอธิบายเอาไว้ทีหลังนะคะ ตอนนี้เราหนีกันก่อนเถอะค่ะ!"
1013408-57 = "ชมรมพัฒนาเกมก็เลยตกลงกันว่า <งั้นเราส่งเกมใหม่ไปร่วมงานกันเถอะ!> เรื่องก็เป็นอย่างนี้ละค่ะ..."
1013408-58 = "แล้วเราก็ได้ยินมาว่าถ้าอยากให้บูธเป็นที่สนใจ ก็ต้องโปรโมตให้ดี..."
1013408-59 = "การโปรโมตมันก็ได้ผลดีอยู่หรอก แต่ว่ามันโดดเด่นมากเกินไปน่ะสิคะ!"
1013408-60 = "โปรโมตไปโปรโมตมา ผู้คนก็มารุมกันที่อาริสึ แทนที่จะไปรุมดูบูธของเราค่ะ!"
1013408-61 = "สถานการณ์กลับตาลปัตรไปหมดเลย!"
1013408-62 = "[s5] \"ชุดทั้งสวยทั้งบินได้ เป็นครูก็คงไปดูนะ\"\n[s6] \"ชุดทั้งสวยทั้งบินได้ เป็นครูก็คงไปยืนดูนะ\""
1013408-65 = "คุณครูก็เป็นไปอีกคนเหรอคะ?!"
1013408-66 = "ถ้าต้องสาธิตให้ดูทีละคนๆ แบบนี้ละก็ อาริสึคงไม่ได้กลับไปห้องชมรมตลอดชีวิตแน่เลยค่ะ!"
1013408-67 = "บินไปทางโน้นแล้ว!"
1013408-68 = "ขอโทษนะคะ ช่วยโพสท่าถ่ายรูปให้หน่อยได้มั้ยคะ?"
1013408-69 = "อ๊ะ! โดนหาตัวเจอจนได้ค่ะ!"
1013408-76 = "คะ... ค่อยๆ พูดทีละคนนะคะ! แง!"
1013408-82 = "(สุดท้ายคุณครูก็ได้อยู่กับอาริสึที่ยุ่งจนหัวหมุนจนจบงาน)"
1013408-90 = "จะ... จบงานได้สักทีนะคะ"
1013408-91 = "เหมือนความทรงจำจะเลือนรางจนจำไม่ได้เลยค่ะว่าระหว่างนั้นเกิดอะไรไปบ้าง..."
1013408-92 = "[s7] \"เก่งมากเลยนะ...\"\n[s8] \"ครูจำได้แค่มีคนมารุมถ่ายรูปเยอะเลย...\""
1013408-97 = "[ns9] \"อ้อ จริงสิ! แล้วอาบี เอชูห์กลับมาได้ยังไงนะ?!\"\n[ns10] \"ครูคิดว่าอาบี เอชูห์พังไปหมดแล้วเสียอีกนะ\""
1013408-100 = "อ๊ะ อาริสึยุ่งจนลืมอธิบายให้ฟังไปเลยค่ะ!"
1013408-101 = "ปาปัม ปาปัม ป๊าม! ผู้กล้าอาริสึกลับมาแล้ว!"
1013408-102 = "ก็อยากพูดแบบนั้นอยู่หรอกนะคะ..."
1013408-103 = "แต่ที่จริงแล้ว ของวันนี้คือแบบจำลองน่ะค่ะ"
1013408-104 = "อ๊ะ ถึงจะเป็นแบบจำลอง แต่ก็สร้างโดยอ้างอิงจากของจริงนะคะ"
1013408-105 = "ที่จริงก่อนออกมาจากดินแดนเหล็กกล้า อาริสึไปเจอชิ้นส่วนของอาบี เอชูห์มาน่ะค่ะ"
1013408-106 = "ถึงจะเรียกว่าชิ้นส่วน แต่ก็เป็นแค่เศษซากขนาดแค่กำมือเดียวเท่านั้น..."
1013408-107 = "[s11] \"อยากพากลับมาด้วยสินะ\"\n[s12] \"อาบี เอชูห์ก็เป็นสหายคนหนึ่งนี่เนอะ\""
1013408-112 = "ใช่ค่ะ"
1013408-113 = "อาริสึก็เลยเอามาให้ทุกคนในมิลเลเนียมดู เผื่อว่าจะซ่อมได้น่ะค่ะ"
1013408-123 = "แต่ทุกคนก็บอกว่าความเสียหายมันรุนแรงเกินกว่าจะซ่อมให้กลับคืนสู่สภาพเดิมได้"
1013408-124 = "แต่ถ้าอธิบายรูปแบบกับฟังก์ชันของโมเดลเดิมให้ฟัง ก็จะลองสร้างขึ้นใหม่ให้คล้ายกันมากที่สุดค่ะ"
1013408-125 = "อาบี เอชูห์ก็เลยได้กลับมาอีกครั้งค่ะ!"
1013408-126 = "ถึงจะได้แค่บางส่วนของโมเดลเดิมก็เถอะค่ะ..."
1013408-127 = "อ้อ แต่เมื่อเทียบกับเวอร์ชันก่อนหน้านี้ กำลังขับถือว่าอ่อนลงมาก ก็เลยบินนานๆ หรือบินด้วย#nความเร็วสูงไม่ได้ค่ะ"
1013408-128 = "ความทนทานของอุปกรณ์ก็มีขีดจำกัด ทุกคนเลยกำชับว่าไม่ให้เอาไปใช้ต่อสู้ค่ะ"
1013408-129 = "[s13] \"ก็เลยต้องจำลองขึ้นมาใหม่สินะ น่าเสียดายจัง\"\n[s14] \"น่าเสียดายนะ อุตส่าห์กลับมาได้แล้วเชียว\""
1013408-132 = "...?"
1013408-133 = "อาริสึไม่เสียดายเลยสักนิดนะคะ"
1013408-134 = "เป็นเรื่องปกติที่ผู้กล้าจะถูกผนึกพลังหลังจากได้ต่อสู้กับราชาปีศาจค่ะ มันเป็นเรื่องจำเจไปแล้วด้วยค่ะ"
1013408-135 = "อีกอย่าง..."
1013408-142 = "วันนี้เป็นครั้งแรกที่อาริสึได้สวมอาบี เอชูห์อีกครั้งแล้วยืนอยู่ต่อหน้าทุกคนค่ะ"
1013408-143 = "ทุกคนที่ได้เห็นอาบี เอชูห์ก็เลยบอกว่าเท่และชอบชุดนี้มากๆ ด้วย"
1013408-144 = "อาริสึว่าแบบนี้มันเท่กว่าการบินบนฟ้า หรือการมีพลังไปต่อสู้กับราชาปีศาจอีกนะคะ"
1013408-145 = "วันนี้อาริสึก็เลยสนุกมากๆ เลยค่ะ!"
1013408-147 = "(แล้วคุณครูกับอาริสึก็เดินจับมือกลับชมรมพัฒนาเกมด้วยกัน)"
1013408-148 = "(และระหว่างทางก็มีคนมาขอถ่ายรูปด้วยเป็นครั้งคราว)"
