[translation]
41070-1 = "Episode 7;Operation Carrot 1"
41070-2 = "A few days later, I visited the park to check on how Miyako and the rest were doing."
41070-5 = "In Front of Kousagi Park"
41070-8 = "Hold it right there, Moe! Who said YOU get to have the yakiniku bento?"
41070-9 = "I did, actually. What are you gonna do about it?"
41070-10 = "You took the shogayaki bento yesterday! It had the most meat! Give me that back and take this mung bean sprout bento."
41070-11 = "Make me! I don't see you jumping at the chance to eat that junk."
41070-15 = "H-Hi. I'm still here. C-Can I eat this Vienna sausage bento?"
41070-18 = "Yes!!"
41070-23 = "Will you settle down? You're acting like wild dogs fighting over the last bone. It's undignified."
41070-24 = "We're not even certain where our next meal is going to come from right now. The best thing to do is fill our stomachs while we can and not fight amongst ourselves."
41070-25 = "Hm? Oh yeah? Do you want the mung bean sprout bento then?"
41070-26 = "I..."
41070-27 = "...I think I'll eat this karaage bento here. No one wants it, right?"
41070-28 = "That's the most expensive one here, Miyako! You're not doing anyone any favors!"
41070-29 = "[s] \"So, how's it going??\""
41070-33 = "..."
41070-35 = "Is your superpower bad timing or something?"
41070-36 = "I-I promise we're not fighting over old expired bentos."
41070-37 = "What're you doing here? We were about to have a nice, friendly lunch with our beloved squad members."
41070-38 = "[s1] \"You have a weird definition of friendly.\"\n[s2] \"Most people would call that fighting.\""
41070-39 = "Maybe you're the weird one, Sensei!"
41070-40 = "Well good thing we're not most people!"
41070-41 = "To you it may have looked like yelling, but to us it's simply our very fair, democratic process of distributing our rations."
41070-42 = "No matter the results, we're comrades-in-arms who are dedicated to our cause and each other! We're all willing to make the necessary sacrifices!"
41070-43 = "I'm sure you don't mind sacrificing the yakiniku bento then~"
41070-44 = "If you don't take your stinking hands off that bento..."
41070-50 = "Well. This is embarrassing."
41070-51 = "But as Saki said... There's nothing to concern yourself with."
41070-52 = "Our initial food supply problem has been resolved. We're fine."
41070-54 = "I-Is it resolved? We've just been scrounging for thrown-out bentos..."
41070-55 = "Heehee, are you surprised, Sensei? Your little plan to humiliate us with leftovers as Bento Disposal Experts flopped like a dead fish!"
41070-57 = "Yes. The disciplined students of SRT Academy would never let something so trivial deter us from accomplishing our mission."
41070-58 = "You thought you would humiliate us into submission, but it backfired! Now we can survive here for as long as we want. So, go away!"
41070-59 = "[s] \"You say that, but you look a little peaked...\""
41070-61 = "[s] \"Do you have a fever? Are you sick?\""
41070-67 = "N-No! Don't come closer!"
41070-71 = "Take one more step and I'll show you the strenuous combat training we receive at SRT!"
41070-72 = "[s] \"Why are you panicking?\""
41070-74 = "...Well. Here comes embarrassment number two."
41070-81 = "Stop inching closer. Or I won't miss next time."
41070-82 = "[s] \"Why is everyone so on edge?\""
41070-84 = "It's because...of the smell..."
41070-85 = "[s3] \"I knew I shouldn't have eaten fish.\"\n[s4] \"I shower every day! I promise!\""
41070-88 = "N-No! It's not that, Sensei!"
41070-89 = "[s5] \"Have I smelled bad this whole time? And no one told me?\"\n[s6] \"Out of everything, this might've hurt my feelings the most.\""
41070-92 = "Dammit, Sensei! No! WE'RE the ones who smell!"
41070-94 = "Saki, have you ever heard of... Hmm, how do you say it? Oh yeah. SHUTTING UP?!"
41070-95 = "Don't tell me you don't feel gross too! I can't even remember the last time I showered!"
41070-96 = "[s] \"Why don't you go to a public bath?\""
41070-98 = "Does money grow out of our ears? If we can't even buy food, how are we meant to afford public baths?"
41070-99 = "I don't wanna wash in public restrooms anymore... You can't even take a real shower in them."
41070-100 = "Having to rough it out is par for the course during operations. But it's not very sustainable in the long run..."
41070-101 = "[s] \"If you need a place to get cleaned up, you can use the showers at Schale.\""
41070-105 = "I've never heard anything more suspicious in my life."
41070-106 = "And we've heard some pretty suspicious things in our time."
41070-107 = "Wh-Wh-What are you gonna do while we shower? Are you gonna steal all our weapons?"
41070-109 = "I've seen this on TV! Sensei wants to sniff our icky, stinky clothes while we shower. Isn't that right, weirdo?"
41070-110 = "[s] \"What do you guys think I am?!\""
41070-112 = "An adult who can't be trusted."
41070-113 = "Evil incarnate."
41070-114 = "Someone I'd like to blow up?"
41070-115 = "Maybe, it won't matter..."
41070-116 = "[s] \"...This is cruel.\""
41070-118 = "The point is, please refrain from visiting the park until we can shower. You can refrain from visiting again at all, actually."
41070-119 = "\"Until we can shower.\" And just when would that be?"
41070-120 = "We have no hot water, and a cold shower in this weather is a recipe for illness."
41070-122 = "Oh! Oh! How about I throw an incendiary bomb into the bathroom and it'll warm up the water! Heehee, Moe you're just too smart sometimes."
41070-123 = "I-I think that'll just make everything dirtier. Including us."
41070-124 = "[s] \"What about an empty drum barrel?\""
41070-126 = "A drum barrel?"
41070-127 = "...We could fill one with water and light a fire underneath it."
41070-128 = "I have seen it done before at Hyakkiyako Academy. It seemed to work."
41070-130 = "Do I look like a freaking ninja to you? Do you want to die?"
41070-131 = "Another dumb idea from the dumb teacher. They only do that in the old movies."
41070-132 = "Seriously! Are you an old fart, Sensei?"
41070-134 = "I hate to say this but..."
41070-135 = "What are our other options? Install a tub in the park?"
41070-136 = "That's expensive. We're a buncha broke students."
41070-141 = "Moe. Access Kivotos' digital resource management system and locate any work sites utilizing drum barrels nearby."
41070-142 = "Everyone else. Gear up and be ready for dispatch."
41070-143 = "Dispatch? Have you lost your mind, Miyako?"
41070-144 = "Successful operations aren't just flashy shooting skills. Without meeting our basic needs, the squad will never be able to perform at their best."
41070-145 = "So, starting now..."
41070-147 = "Commence Operation Carrot: Secure a drum barrel tub!"
41070-149 = "Next Episode;Operation Carrot 2"
