[translation]
212-1 = "เกวูราห์ ผู้ตัดสินแห่งความกล้า ผู้อยู่เหนือตรรกะทั้งปวง"
212-2 = "อืม อืม..."
212-3 = "อ๊ะ คุณครู เข้ามาสิ ตอนนี้ฉันยุ่งนิดหน่อยน่ะ..."
212-4 = "หืม? ฉันดูงานยุ่งต่างจากปกติงั้นเหรอ? ปกติฉันก็ต้องจัดการงานน่ารำคาญนู่นนี่นั่นตั้งเยอะเถอะนะ?!!"
212-5 = "แต่ตอนนี้มันเป็นสถานการณ์ฉุกเฉินที่เลื่อนออกไปไม่ได้... ฉันก็เลยกำลังตรวจสอบตารางการเดิน#nรถไฟของทั้งคิโวทอสอยู่"
212-6 = "ทำไมฉันถึงรีบร้อนขนาดนี้น่ะเหรอ? อืม ตอนนี้ฉันไม่มีเวลามาคุยกับครูอย่างชิลๆ ด้วยสิ..."
212-7 = "จริงสิ บางทีครูอาจจะช่วยคลี่คลายปัญหานี้ให้ก็ได้นะ...?"
212-8 = "ครูเองก็อาจจะรู้ดีว่าระบบโลจิสติกส์ในคิโวทอสเป็นการขนส่งทางทะเลเสียส่วนใหญ่ "
212-9 = "นั่นก็เพราะเรือขนส่งสินค้าได้มากกว่ารถไฟเป็นสิบเท่าเลยยังไงล่ะ"
212-10 = "ในบรรดาเส้นทางเดินเรือก็มีเส้นทางเขตขั้วโลกที่ตัดผ่านธารน้ำแข็งด้วย... เส้นทางนั้นลดระยะทาง#nในการขนส่งสินค้าได้มาก ถือว่าเป็นเส้นทางเดินเรือที่สำคัญของคิโวทอสเลยละ"
212-11 = "แต่เมื่อไม่นานมานี้ก็เหมือนว่าจะมีเครื่องจักรปริศนาขนาดยักษ์ที่ขับเคลื่อนด้วยตนเองโผล่มาแถวๆ เส้นทางเดินเรือเขตขั้วโลกน่ะ!"
212-12 = "เพราะแบบนั้นการขนส่งด้วยเส้นทางนั้นก็เลยล่าช้า และเครือข่ายโลจิสติกส์ก็ยุ่งเหยิงไปหมด..."
212-13 = "นี่เป็นปัญหาที่หัวหน้าฝ่ายคมนาคมที่ดูแลเครือข่ายขนส่งสาธารณะทั้งหมดของคิโวทอสอย่างฉัน#nต้องจัดการก็จริง แต่ว่าปัญหาที่ใหญ่กว่านั้นก็คือ..."
212-14 = "พอไข่ปลาที่ขนส่งผ่านเขตขั้วโลกขาดแคลน มันฝรั่งทอดรสไข่ปลาที่ฉันชอบก็อาจขาดตลาดไปด้วย#nก็ได้น่ะสิ!"
212-15 = "อะไรกัน มองกันเหมือนฉันเป็นคนน่าสมเพชอย่างนั้นละ นี่มันเป็นปัญหาร้ายแรงจริงๆ นะ"
212-16 = "ถ้าไม่ได้กินมันฝรั่งทอดรสไข่ปลาละก็ แม้แต่วันเดียวฉันก็อยู่ไม่ได้หรอกนะ คุณครูควรพิจารณาสถานการณ์นี้อย่างจริงจังอีกสักนิดนะ"
212-17 = "เพราะงั้นตอนนี้ฉันต้องระดมพลังอำนาจทั้งหมดของชาเล่ต์และองค์การนักเรียน แล้วฟื้นฟูเส้นทางการเดินเรือในเขตขั้วโลกให้ได้"
212-18 = "ในระหว่างที่ฉันปรับผังการคมนาคมเพื่อลดความเสียหายด้านโลจิสติกส์ ครูก็ช่วยจัดการเครื่องจักรที่#nขับเคลื่อนด้วยตนเองที่โผล่มาในเขตขั้วโลกให้หน่อยนะ"
212-19 = "ครูก็คงจะรู้ดีว่าในเขตขั้วโลกนั้นหนาวมาก อย่าลืมเตรียมเตาไฟฟ้าที่ให้ความอุ่นไปด้วยล่ะ แล้วมันจะทำให้หายหนาวได้"
212-20 = "จริงสิ จะว่าไปฉันก็ไม่รู้ว่านี่จะช่วยได้หรือเปล่า แต่ฉันได้ข้อความแบบนี้มาจากยานขนส่งสินค้า#nก่อนที่เส้นทางในเขตขั้วโลกจะตัดขาดไปน่ะ"
212-21 = "<ชื่อของเขาคือเกวูราห์ ผู้ตัดสินแห่งความกล้า ผู้อยู่เหนือตรรกะทั้งปวง>"
212-22 = "เจ้าเครื่องจักรที่มาคุกคามเส้นทางเดินเรือของคนอื่นนี่มันต้องการอะไรกันแน่นะ...? เฮอะ ใช้ชื่อซะหรูหราหมาเห่าเลย"
212-23 = "เอาเถอะ ยังไงก็ช่วยรีบหน่อยนะครู~ ตอนนี้ฉันเหลือมันฝรั่งรสไข่ปลาอีกแค่สามลังเท่านั้นน่ะ"
