[translation]
80000126-1 = "三神器"
80000126-4 = "你好，老師！我來了！"
80000126-5 = "[s] 「歡迎！不過怎麼了嗎？」"
80000126-6 = "那個呢！就，就是說……"
80000126-7 = "……"
80000126-10 = "（嗚，嗚哇……明明已經做好覺悟了！在腦海裡也演練了好幾次的說……！）"
80000126-11 = "（真的站到老師面前之後，就鼓不起勇氣……！）"
80000126-12 = "（怎，怎麼辦？果然還是就簡單打個招呼就回去吧……？）"
80000126-13 = "（不對！不管怎麼想，那絕對不對吧！）"
80000126-16 = "[ns] 「莉？」"
80000126-17 = "！？！？"
80000126-18 = "那，那個，老，老師？就是說那個，今天不是嘛，就是那種日子嘛？"
80000126-19 = "[s] 「那種日子？」"
80000126-20 = "情，情，情人……"
80000126-21 = "情人節啊！"
80000126-22 = "對，對不起！聲音太大了吧？嗚，嗚嗚……"
80000126-23 = "所以，所以說呢！我，做了這個……"
80000126-24 = "如果你願意收下的話，我會非常感謝的！"
80000126-25 = "（莉突然遞出了一個小小的巧克力色手套……？）"
80000126-30 = "嘿，嘿嘿……做到了呢。呼……"
80000126-31 = "[s1] 「手套巧克力……？原來是這個啊？」\n[s2] 「謝謝你。我會好好品嚐的。」"
80000126-36 = "！！！"
80000126-37 = "好的！謝謝您！"
80000126-38 = "咦？你問是不是親手做的嗎？這種造型的巧克力通常不會有在賣吧……？"
80000126-39 = "……"
80000126-40 = "那個，要說能硬撐的部分倒也有，但再想想也有完全說不過去的部分就是了……"
80000126-42 = "（越來越搞不清楚是怎麼回事，於是仔細追問了）"
80000126-45 = "首先這個手套，是仿照我以前用的手套造型做的喔。"
80000126-46 = " ……也就是說，把它進行3D掃描後，將縮小模型圖像化的意思。"
80000126-47 = "………然後再用3D列印機把那個縮小模型輸出出來。"
80000126-48 = "…………再以那個為基礎來製作模具，這些全部都交給AI處理了……"
80000126-49 = "我怎麼可能有那種程度的手藝嘛……"
80000126-50 = "當，當然用砂紙打磨模型表面這種程度的事情我還是有做的啦？"
80000126-51 = "結果我做的事情，說到底就只是把融化的巧克力倒進模具裡而已……"
80000126-52 = "這樣的話到底算不算手工都搞不清楚了呢。唉……"
80000126-53 = "[s3] 「不會啊。這樣就很足夠了。」\n[s4] 「辛苦你了。謝謝你。」"
80000126-56 = "真，真的嗎？"
80000126-57 = "嘿嘿……"
80000126-58 = "那麼呢！其實我還做了這個！"
80000126-63 = "[ns] 「手套、球棒、還有棒球巧克力……？」"
80000126-64 = "對！這就是我想到的，棒球用品三神器！"
80000126-65 = "只要有這三樣，隨時都能跟任何人打棒球喔！"
80000126-66 = "像這樣～把棒球往手套那邊滾過去～然後用球棒打出去的話～"
80000126-67 = "野正莉選手！安打！越過游擊手的安打！"
80000126-68 = "莉選手，速度好快！究竟能不能跑到二壘呢！"
80000126-70 = "（和開心玩耍的莉一起，分享了棒球用品三神器巧克力）"
80000126-71 = "（莉一邊吃著巧克力，一邊繼續閃閃發光地享受著棒球遊戲）"
