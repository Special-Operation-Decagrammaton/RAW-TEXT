[translation]
80000126-1 = "3 สิ่งสำคัญ"
80000126-4 = "สวัสดีค่ะคุณครู! ฉันมาแล้วค่ะ!"
80000126-5 = "[s] \"ยินดีต้อนรับ! ว่าแต่มีเรื่องอะไรเหรอ?\""
80000126-6 = "เรื่องนั้นน่ะค่ะ! เอ่อ คือว่า..."
80000126-7 = "......"
80000126-10 = "(ฮะ... ฮือ... อุตส่าห์เตรียมใจมาแล้วแท้ๆ! ซ้อมพูดในหัวตั้งกี่รอบแล้วก็ไม่รู้...!)"
80000126-11 = "(ตอนนี้อยู่ตรงหน้าคุณครูแล้ว กลับไม่กล้าขึ้นมาซะงั้น...!)"
80000126-12 = "(ทะ... ทำยังไงดี? ทักทายนิดหน่อยแล้วชิ่งเลยดีมั้ย...?)"
80000126-13 = "(ไม่สิ! ยังไงแบบนั้นก็ไม่เวิร์กหรอก!)"
80000126-16 = "[ns] \"เรย์?\""
80000126-17 = "?!?!!!"
80000126-18 = "เอ่อ คือว่า... คุณ... ครู คือว่านะ วันนี้น่ะ เอ่อ... เป็น 'วันนั้น' ใช่มั้ยล่ะคะ"
80000126-19 = "[s] \"วันนั้น?\""
80000126-20 = "วะ... วะ... วะ..."
80000126-21 = "วันวาเลนไทน์ไงล่ะคะ!"
80000126-22 = "ขะ... ขอโทษค่ะ! ฉันเสียงดังเกินไปใช่มั้ยคะ? ฮืออ..."
80000126-23 = "พะ... เพราะอย่างนั้น! ฉัน... เลยลองทำเจ้านี่มา...."
80000126-24 = "ถ้าคุณครูรับไว้ ฉันจะขอบคุณมากๆ เลยค่ะ!"
80000126-25 = "(จู่ๆ เรยก็ยื่นถุงมือสีช็อกโกแลต (?) ให้คุณครู)"
80000126-30 = "แหะ... แหะๆ... ทำได้สักทีนะคะ ฮู่ว..."
80000126-31 = "[s1] \"ช็อกโกแลตรูปถุงมือ... งั้นเหรอ?\"\n[s2] \"ขอบใจนะ ครูจะกินให้อร่อยเลย\""
80000126-36 = "!!!"
80000126-37 = "ค่ะ! ขอบคุณนะคะ!"
80000126-38 = "คะ? ฉันทำเองรึเปล่าน่ะเหรอคะ? เพราะช็อกโกแลตรูปทรงนี้ไม่ค่อยมีขายทั่วไป...?"
80000126-39 = "......"
80000126-40 = "จะเรียกแบบนั้นก็ได้ แต่พอคิดดูอีกที จะพูดแบบนั้นก็ไม่ถูกน่ะค่ะ..."
80000126-42 = "(คุณครูเริ่มจับต้นชนปลายไม่ถูก เลยถามรายละเอียดเพิ่มขึ้น)"
80000126-45 = "ก่อนอื่นเลยถุงมือนี้น่ะ ฉันออกแบบโดยใช้ถุงมือที่เคยใช้เป็นต้นแบบค่ะ"
80000126-46 = "ก็คือ... ใช้ถุงมืออันนั้นมาสแกนสามมิติ แล้วก็ใช้กราฟิกสร้างแบบจำลองย่อส่วนลงมาค่ะ"
80000126-47 = "แล้วก็ใช้เครื่องพิมพ์สามมิติพิมพ์แบบจำลองย่อส่วนนั้นออกมา"
80000126-48 = "จากนั้นก็ใช้สิ่งนั้นเป็นพื้นฐาน... จนถึงขึ้นโครงก็ให้ AI ทำทั้งหมด..."
80000126-49 = "ลำพังแค่ตัวฉันคงไม่มีฝีมือทำได้ถึงขนาดนั้นหรอกค่ะ..."
80000126-50 = "นะ... แน่นอนว่าฉันขัดผิวของต้นแบบให้เนียนแล้วนะคะ"
80000126-51 = "สรุปแล้ว สิ่งที่ฉันทำเองก็มีแค่เทช็อกโกแลตที่ละลายแล้วลงแม่พิมพ์ก็เท่านั้นเองค่ะ..."
80000126-52 = "เพราะงั้นเลยไม่รู้ว่าจะเรียกว่าทำเองได้รึเปล่าน่ะค่ะ เฮ้อ..."
80000126-53 = "[s3] \"ไม่หรอก แค่นั้นก็พอแล้วละ\"\n[s4] \"ลำบากแย่เลย ขอบใจมากนะ\""
80000126-56 = "จริง... เหรอคะ?"
80000126-57 = "แหะๆ..."
80000126-58 = "ถ้างั้นละก็... อันที่จริงยังมีเจ้านี่อยู่ด้วยค่ะ!"
80000126-63 = "[ns] \"ช็อกโกแลตรูปถุงมือ ไม้เบสบอล ลูกบอล...?\""
80000126-64 = "ค่ะ! 3 เทพแห่งอุปกรณ์เบสบอลในความคิดของฉันค่ะ!"
80000126-65 = "ถ้ามีสามอย่างนี้ละก็ ไม่ว่าใครก็เล่นเบสบอลได้ทุกเวลาค่ะ!"
80000126-66 = "ทำแบบนี้ไงคะ~ กลิ้งลูกบอลไปทางถุงมือ~ แล้วก็ค่อยใช้ไม้ตี~"
80000126-67 = "นักกีฬาโนมาสะ เรย์! ฮิตหนึ่งแต้ม! ตีข้ามชอร์สสต็อปไปแล้ว!"
80000126-68 = "นักกีฬาเรย์ เร็วมากจริงๆ! เธอจะวิ่งไปถึงเบสที่ 2 ทันเวลารึไม่!"
80000126-70 = "(คุณครูแบ่งช็อกโกแลต 3 เทพแห่งอุปกรณ์เบสบอลนั่งกินร่วมกับเรย์ที่กำลังสนุกสนาน)"
80000126-71 = "(เรย์ยังคงสนุกกับการเล่นเบสบอลด้วยดวงตาอันเปล่งประกายขณะที่กินช็อกโกแลตไปด้วย)"
