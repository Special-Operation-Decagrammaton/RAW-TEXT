[translation]
80000126-1 = "三神器"
80000126-4 = "你好，老師！我來了！"
80000126-5 = "[s] 「歡迎！不過怎麼了嗎？」"
80000126-6 = "那個呢！就，就是說……"
80000126-7 = "……"
80000126-10 = "（唔，唔哇……明明已經做好覺悟了！在腦海裡也演練了好幾次的說……！）"
80000126-11 = "（結果真的站到老師面前，卻無法鼓起勇氣……！）"
80000126-12 = "（怎，怎麼辦？果然還是簡單打個招呼就回去吧……？）"
80000126-13 = "（不對！那樣不管怎麼想都絕對不行吧！）"
80000126-16 = "[ns] 「莉？」"
80000126-17 = "！？！？"
80000126-18 = "那，那個，老，老師？#n就是說，那個……今天就是那個，就是那種日子嘛？"
80000126-19 = "[s] 「哪種日子？」"
80000126-20 = "就是，情，情……"
80000126-21 = "情人節啊！"
80000126-22 = "對，對不起！我太大聲了吧？#n嗚嗚……"
80000126-23 = "所，所以！我，我做了這個……"
80000126-24 = "如果你願意收下的話，我會很開心的！"
80000126-25 = "（莉突然遞出了一個小小的巧克力色手套……？）"
80000126-30 = "嘿，嘿嘿……成功了呢。#n呼……"
80000126-31 = "[s1] 「這是手套巧克力……對吧？」\n[s2] 「謝謝你。我會好好品嚐的。」"
80000126-36 = "！！！"
80000126-37 = "嗯！謝謝老師！"
80000126-38 = "咦？問我是不是親手做的？#n因為這種造型的巧克力，外面通常沒有人會賣……？"
80000126-39 = "……"
80000126-40 = "這個嘛……雖然要這麼說也不是不行，但是仔細想想也不完全是……？"
80000126-42 = "（越來越搞不懂是怎麼回事，於是向他詢問了詳細情況）"
80000126-45 = "首先，這個手套是仿照我以前用的手套做的。"
80000126-46 = "也就是對手套進行3D掃描之後，將縮小的模型進行圖像化……"
80000126-47 = "然後用3D列印機，把縮小的模型列印出來…………"
80000126-48 = "最後再以此為基礎製作模具，而且都是交給AI處理………………"
80000126-49 = "畢竟我不可能有那種等級的手藝嘛……"
80000126-50 = "當，當然我還是有自己用砂紙打磨一下表面哦？"
80000126-51 = "結果說到底，我所做的好像只有把融化的巧克力倒進模具裡而已……"
80000126-52 = "這樣究竟算不算親手做的……都有點搞不清楚了呢。#n唉……"
80000126-53 = "[s3] 「沒關係。這樣已經很足夠了。」\n[s4] 「辛苦了。謝謝你。」"
80000126-56 = "真，真的嗎？"
80000126-57 = "嘿嘿……"
80000126-58 = "其實，我還做了這個哦！"
80000126-63 = "[ns] 「是手套、球棒和棒球的巧克力……？」"
80000126-64 = "沒錯！這就是我心目中的棒球用品三神器！"
80000126-65 = "只要有這三樣神器，隨時都能跟任何人打棒球哦！"
80000126-66 = "像這樣～把棒球往手套那邊滾過去～然後用球棒打出去的話～"
80000126-67 = "野正莉選手！擊出了安打！是隻飛越游擊手的安打！"
80000126-68 = "莉選手，速度好快！究竟能不能跑到二壘呢！"
80000126-70 = "（和放鬆下來開心玩耍的莉，一起分享了棒球用品三神器巧克力）"
80000126-71 = "（莉一邊吃著巧克力，一邊神采奕奕地繼續享受著棒球遊戲）"
