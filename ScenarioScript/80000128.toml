[translation]
80000128-1 = "Unexpected Gift"
80000128-2 = "I was busy with work when..."
80000128-3 = "[ns] \"I'm beat...\""
80000128-5 = "Sensei, you here?"
80000128-10 = "Oh, you are!"
80000128-11 = "[s] \"Hi, Nozomi...\""
80000128-12 = "Pahyahya, what's with those half-dried fish eyeballs?"
80000128-13 = "Ah, ah. Yeah, yeah. I knew you'd be overworked."
80000128-14 = "And that's exactly why..."
80000128-15 = "Here you go!"
80000128-20 = "Well, it's not a big deal. They're just health gummies. They're supposed to be good for fatigued adults like yourself."
80000128-21 = "You probably got tons of sweet stuff already...and I know you're always SOOOO busy."
80000128-22 = "So I figured you might need some vitality supplements! Pahyahya!"
80000128-23 = "[ns] \"Nozomi...!\""
80000128-25 = "Whoa, what's with that weird face?"
80000128-26 = "You were \"moved\"?"
80000128-27 = "Pshh. It's not like I made them..."
80000128-28 = "Pahyahya, you're surprisingly mushy when it comes to things like this, Sensei."
80000128-29 = "Well, I hope you enjoy them, since I went out of my way to come here."
80000128-30 = "In that case, I'll get going."
80000128-31 = "I was thinking of playing hooky, but you seem kind of busy..."
80000128-32 = " Oh yeah? You want me to \"stay for a bit\"?"
80000128-36 = "Hm, does that mean you'll play with me?"
80000128-37 = "[s] \"Yeah! I'll finish work later!\""
80000128-38 = "Pahyahya, that's the spirit! You seem more lively already!"
80000128-43 = "Great, in that case..."
80000128-44 = "What should we do first?"
80000128-46 = "I decided to forget my work and instead have fun playing with Nozomi."
80000128-47 = "She said that playing around helped her de-stress as well. After that, she helped me with work until it got late..."
