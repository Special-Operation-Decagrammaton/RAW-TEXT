[translation]
80000128-1 = "意外的禮物"
80000128-2 = "（整天都因為工作忙得不可開交時……）"
80000128-3 = "[ns] 「好累……」"
80000128-5 = "老師～在嗎？"
80000128-10 = "哦，在耶。"
80000128-11 = "[s] 「你好，希望……」"
80000128-12 = "噗哈哈，怎麼啦？#n眼神怎麼跟死魚沒兩樣啊。"
80000128-13 = "啊～好好好，我就知道你八成又過勞了。"
80000128-14 = "所以呢……"
80000128-15 = "來，這個給你！"
80000128-20 = "雖然不是什麼特別的東西，但這是對疲勞恢復非常有效的營養果凍哦。"
80000128-21 = "老師應該已經收到很多甜食，平時又得為了各種事情操勞……"
80000128-22 = "所以我才想說，老師搞不好更需要這種營養品之類的～！噗哈哈！"
80000128-23 = "[ns] 「希望……！」"
80000128-25 = "唔哇，怎麼了？為什麼露出那種表情。"
80000128-26 = "覺得很感動嗎？"
80000128-27 = "雖然這也不是我親手做的啦……"
80000128-28 = "噗哈哈～老師意外地對這種事缺乏抵抗力呢。"
80000128-29 = "既然是我難得送給你的，記得要好好吃掉哦～"
80000128-30 = "我今天只是順路過來，差不多也該走了。"
80000128-31 = "本來其實想多偷懶一下再走，可惜老師看起來也很忙的樣子。"
80000128-32 = "你說再多待一下也沒關係？"
80000128-36 = "哼嗯……那你要陪我玩嗎？"
80000128-37 = "[s] 「工作之後再做也行嘛！！」"
80000128-38 = "噗哈哈，這樣就對了！"
80000128-43 = "好，那麼……"
80000128-44 = "該玩什麼好呢？"
80000128-46 = "（就這樣忘掉一切，和希望盡情地玩了一陣子）"
80000128-47 = "（希望表示玩得很盡興且釋放了壓力，就這樣留下來幫忙處理工作到了很晚……）"
