[translation]
80000128-1 = "ของขวัญที่คาดไม่ถึง"
80000128-2 = "(ขณะที่คุณครูยุ่งหัวหมุนกับงานอยู่ตลอดทั้งวัน...)"
80000128-3 = "[ns] \"เหนื่อยจัง...\""
80000128-5 = "คุณครู~ อยู่รึเปล่า?"
80000128-10 = "โอ้ อยู่นี่นา"
80000128-11 = "[s] \"ว่าไง โนโซมิ...\""
80000128-12 = "วะฮ่าฮ่า อะไรกันน่ะ? ขอบตาดำเหมือนปลาตากแห้งเลย"
80000128-13 = "อ่า~ อ่า~ อืม อืม... ดูเหมือนจะทำงานหนักเกินไปนะ"
80000128-14 = "และนั่นก็หมายความว่า..."
80000128-15 = "เอ้า นี่!"
80000128-20 = "ไม่มีอะไรพิเศษหรอก ก็แค่เยลลี่อาหารเสริมที่ช่วยบรรเทาความเหนื่อยล้าน่ะ"
80000128-21 = "ฉันคิดว่าคุณครูคงได้รับของหวานเยอะแล้ว แถมปกติก็ต้องเหนื่อยกับงานสารพัดอยู่แล้วด้วย"
80000128-22 = "เลยคิดว่าอาจต้องการอาหารเสริมแบบนี้น่ะ~! วะฮ่าฮ่า!"
80000128-23 = "[ns] \"โนโซมิ...!\""
80000128-25 = "ว้าว ทำไมทำหน้าแบบนั้นล่ะ"
80000128-26 = "ประทับใจงั้นเหรอ?"
80000128-27 = "อะไรกัน ไม่ใช่ของที่ฉันทำเองสักหน่อย..."
80000128-28 = "วะฮะฮ่า~ คุณครูนี่อ่อนไหวกับเรื่องแบบนี้จริงๆ เลยนะ"
80000128-29 = "เอาละ ในเมื่อเอามาให้แล้ว คุณครูก็อย่าลืมกินนะ~"
80000128-30 = "ฉันแค่แวะมาแป๊บเดียว เพราะงั้นขอตัวก่อนนะ"
80000128-31 = "ตอนแรกฉันกะว่าจะขออู้อยู่ที่นี่สักหน่อย แต่เห็นคุณครูยุ่งอยู่"
80000128-32 = "ให้อยู่อีกสักพักแล้วค่อยกลับก็ได้งั้นเหรอ?"
80000128-36 = "ฮืม งั้นคุณครูจะมาเล่นกับฉันเหรอ?"
80000128-37 = "[s] \"เอาไว้ค่อยทำงานทีหลังก็ได้!!\""
80000128-38 = "วะฮ่าฮ่า ต้องอย่างนี้สิ!"
80000128-43 = "ดีละ ถ้างั้น..."
80000128-44 = "จะเล่นอะไรดีล่ะ?"
80000128-46 = "(คุณครูลืมสิ้นทุกอย่าง และใช้เวลาเล่นกับโนโซมิอยู่พักใหญ่)"
80000128-47 = "(หลังจากโนโซมิเล่นจนพอใจแล้วก็ช่วยคุณครูทำงานที่เหลืออยู่จนถึงช่วงดึก...)"
