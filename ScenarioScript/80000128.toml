[translation]
80000128-1 = "意外的禮物"
80000128-2 = "（忙了一整天的工作中……）"
80000128-3 = "[ns] 「好累……」"
80000128-5 = "老師～在嗎？"
80000128-10 = "喔，在呢。"
80000128-11 = "[s] 「你好，希望……」"
80000128-12 = "啪哈哈，怎麼了？那雙半乾魚乾一樣的眼睛是怎麼回事。"
80000128-13 = "啊～啊～好，好。我就覺得你大概在過勞了。"
80000128-14 = "所以呢……"
80000128-15 = "來，這個！"
80000128-20 = "嘛，沒什麼特別的，是對恢復疲勞有益的營養果凍。"
80000128-21 = "老師，甜食應該已經收到很多了吧。而且平時也為各種事情辛苦著嘛。"
80000128-22 = "我就想說這種營養品之類的是不是更需要呢～！啪哈哈！"
80000128-23 = "[ns] 「希望……！」"
80000128-25 = "哇，怎麼了，那個表情。"
80000128-26 = "很感動嗎？"
80000128-27 = "嘛，又不是自己做的……"
80000128-28 = "啪哈哈～意外地在這種事情上很脆弱呢，老師。"
80000128-29 = "那，既然是難得送的，就好好吃喔～"
80000128-30 = "我只是順便過來一下，就先走了。"
80000128-31 = "本來想偷懶一下再走的，但老師看起來還是很忙。"
80000128-32 = " 再多待一會兒也可以嗎？"
80000128-36 = "嗯？那你要陪我玩嗎？"
80000128-37 = "[s] 「工作之後也可以做嘛！！」"
80000128-38 = "啪哈哈，就是這種態度！"
80000128-43 = "好，那麼……"
80000128-44 = "要玩什麼好呢？"
80000128-46 = "（忘掉一切，和希望盡情玩了一陣子）"
80000128-47 = "（希望說玩夠了壓力都消除了，然後幫忙處理了留到很晚的工作……）"
