[translation]
2404-1 = "กลางคืนแสนสั้น เร่งมือกันเถอะ! 2"
2404-11 = "ย่อง ย่อง..."
2404-13 = "ค่อยๆ ไป ค่อยๆ ไป"
2404-15 = "อ๊ะ! ซ่วบ!"
2404-16 = "[s1] \"นั่นคาเอเดะเหรอ?\"\n[s2] \"...ทำอะไรอยู่?\""
2404-17 = "ชู่ว! คุณครู! เงียบก่อน!"
2404-18 = "ชู่ว! คุณครู! เงียบก่อน!"
2404-19 = "ตอนนี้ฉัน... เป็นนักสะกดรอยตาม...อยู่น่ะ..."
2404-20 = "ตอนนี้ฉันต้องแสดงความสามารถของฉันที่ได้ฝึกตอนเล่นเป็นสายลับกับมิกุริ...!"
2404-21 = "อ๊ะ! คุณครู! อย่าเดินไปทางนั้น!"
2404-22 = "[s] \"หืม?\""
2404-23 = "ถ้าเดินออกนอกเส้นจะตกลงไปได้นะ!"
2404-24 = "ข้างล่างนั่นเป็นทะเล! เห็นว่ามีฝูงปลาฉลามอยู่เต็มไปหมดเลยด้วยมั้งนะ? "
2404-25 = "อ๊ะ! นั่นก็หมายความว่าเราจะปลอดภัยถ้าเดินตามเส้นนี้ไป! "
2404-26 = "มีกฎอยู่ว่าถ้าเดินตามเส้นนี้ไปเกิน 10 วินาที เท้าจะเริ่มรู้สึกร้อนและตกลงไป!"
2404-27 = "[s3] \"ครูเข้าใจว่าหมายถึงอะไรอยู่นะแต่ว่า...!\"\n[s4] \"กฎของหมู้บ้านเฮียกคิยาโคนี่ไม่โหดร้ายไปเหรอ?!\""
2404-28 = "นี่ก็เป็นเรื่องปกติไม่ใช่เหรอ~?"
2404-29 = "นี่ก็เป็นเรื่องปกติไม่ใช่เหรอ~?"
2404-30 = "คุณครูนี่ดู... อ่อนหูดกว่าที่คิดนะ!"
2404-31 = "[s5] \"ครูจำไม่ได้ว่าเคยบอกว่าเป็นหูดนะ...\"\n[s6] \"เธอหมายถึงอ่อนหัดหรือเปล่า...\""
2404-32 = "อ๊ะ! นี่ไม่ใช่เวลามาทำแบบนี้นะ! ขืนเป็นอย่างนี้จะคลาดกับรุ่นพี่เอา! รีบตามไปเร็วเข้าเถอะ คุณครู!"
2404-33 = "อ๊ะ! นี่ไม่ใช่เวลามาทำแบบนี้นะ! ขืนเป็นอย่างนี้จะคลาดกับรุ่นพี่เอา! รีบตามไปเร็วเข้าเถอะ คุณครู!"
2404-34 = "ปึง!"
2404-37 = "[ns] \"ไหนว่าให้แอบสะกดรอยตามไปเงียบๆ ...\""
2404-47 = "เมื่อกี้... พวกรุ่นพี่คุยเรื่องสำคัญมากกันอยู่แน่ๆ!"
2404-48 = "[s7] \"หืม? งะ... งั้นเหรอ?\"\n[s8] \"ที่ครูเห็นคือพวกเธอแค่คุยกันธรรมดาๆ\""
2404-49 = "ไม่ใช่นะ! คุณครู! ดูสิ! พวกรุ่นพี่ออกมายืนหน้าราวบันไดอย่างนี้"
2404-50 = "ไม่ใช่นะ! คุณครู! ดูสิ! พวกรุ่นพี่ออกมายืนหน้าราวบันไดอย่างนี้"
2404-51 = "ทอดสายตามองออกไปไกลๆ และคุยกันจริงจังแบบนี้..."
2404-52 = "เอ๋?! ฉะ... ฉันรู้แล้ว! คุณครู! ฉันว่าฉันรู้แล้ว!"
2404-53 = "[s] \"รู้ว่าอะไรเหรอ?\""
2404-54 = "รุ่นพี่สึบากิกับรุ่นพี่มิโมริ... มองไปยังจุดชมวิวและคุยกันอย่างจริงจัง...!"
2404-55 = "ในฐานะชมรมฝึกฝน พวกเขาจะต้องตัดสินใจโดยมองเส้นทางที่ต้องรักษาไว้!"
2404-56 = "[s] \"อะไรนะ...?\""
2404-57 = "'เส้นทางที่เราจะต้องกำจัดพวกวายร้าย...'"
2404-58 = "'ใช่แล้ว ถึงจะเป็นงานที่หนักหนา พวกเราจะต้องปกป้องเส้นทางนี้ไว้ให้ได้ค่ะ...!’"
2404-59 = "...พวกรุ่นพี่คุยเรื่องแบบนี้กันหรือเปล่านะ?!"
2404-60 = "อย่างที่ฉันเห็นในละครฮีโร่ตอนเช้าวันอาทิตย์บ่อยๆ!"
2404-61 = "[s] \"หืม...?\""
2404-62 = "แต่ว่า... ถ้างั้นทำไมต้องออกมากันสองคนโดยที่ไม่มีฉันด้วยล่ะ?! "
2404-63 = "ฮึ่ย! งั้นก็ตามต่อ! ตามต่อไป! อีกสักหน่อย! จะต้องสะกดรอยตามต่อให้รู้ให้ได้ว่าพวกรุ่นพี่ทำอะไรกัน!"
2404-64 = "[s] “คาเอเดะ ไม่ว่าจะมองยังไง ครูว่านี่เป็นเรื่องเข้าใจผิดอยู่นะ...\""
2404-65 = "ไปกันเลย! ซ่วบ! "
2404-71 = "พวกรุ่นพี่! ผ่านตรงนี้ไปด้วย! มาทำอะไรที่นี่กันนะ?!"
2404-75 = "[ns9] \"แมวข้างถนนนี่นา?\"\n[ns10] \"หรือว่าสองคนนั้นมาหาน้องแมวพวกนี้...\""
2404-76 = "มาสคอตนี่เองสินะ!"
2404-77 = "มาสคอตนี่เองสินะ!"
2404-78 = "[s] “...หืม?\""
2404-79 = "เพื่อภาพลักษณ์ที่ดีของชมรมฝึกฝน พวกรุ่นพี่เลยเลี้ยงน้องแมวที่นี่อย่างลับๆ...#nเพื่อเป็นมาสคอตลับของชมรมฝึกฝนแน่ๆ เลย!"
2404-80 = "ดูสิ! เจ้าพวกนี้!"
2404-83 = "เข้ามาใกล้ๆ แบบนี้ใจคอไม่ดีเลย... เจอน้องตกเข้าให้แล้ว!"
2404-84 = "แต่ว่าฉันก็เป็นมาสคอตของชมรมฝึกฝนอยู่นี่นา?! หรือว่าแค่ฉันคนเดียวมันไม่พอเหรอ?!"
2404-85 = "ฮือฮือ! รุ่นพี่สึบากิ! รุ่นพี่มิโมริ~~!"
2404-88 = "[ns] \"รอด้วย คาเอเดะ!\""
2404-90 = "(หลังจากนั้นก็แอบตามสึบากิกับมิโมริไปตามที่ต่างๆ ในเฮียกคิยาโคกับคาเอเดะ)"
2404-91 = "(และตามไปทุกครั้ง...)"
2404-92 = "พวกรุ่นพี่เพิ่งผ่านตรงนี้ไปเมื่อกี้! ถ้างั้นตรงนี้จะมีความลับอะไรรึเปล่านะ! ต้องตรวจสอบดูแล้วล่ะ!"
2404-93 = "ฟุดฟิด... ฟุดฟิด...!"
2404-94 = "?!"
2404-97 = "ครั้งนี้ใช่แน่! ด้วยการสันนิษฐานที่ชาญฉลาดของฉัน ไม่ผิดแน่!"
2404-98 = "คุณครู! ความลับต้องอยู่แถวนี้แน่นอน!"
2404-99 = "...!"
2404-100 = "...!!!"
2404-103 = "(นี่เรามาหาเรื่องวุ่นวายกับคาเอเดะที่จุ้นจ้านนานแค่ไหนแล้วกันนะ)"
2404-104 = "(ในที่สุด...)"
2404-106 = "[ns] “สองคนนั้นเดินมาทางนี้แล้ว\""
2404-107 = "ฮือ... เฮ้อ... รุ่นพี่สึบากิ... รุ่นพี่มิโมริ..."
2404-108 = "ทิ้งฉันไว้... ไปไหนกัน..."
2404-109 = "ฮือ..."
2404-110 = "[s] “คาเอเดะพอได้แล้ว กลับกันเถอะ\""
2404-111 = "ไม่เอา... คุณครู..."
2404-112 = "ถ้าฉันก็ไม่เจออะไรที่นี่... สุดท้ายแล้ว..."
2404-113 = "ฉัน... ที่เป็นคนใน... ชมรมฝึกฝน..."
2404-117 = "หืม...?"
2404-118 = "เอ๋? จู่ๆ มากระโจนใส่ฉันทำไมน่ะ จะหาเรื่องกันงั้นเรอะ?!"
2404-119 = "ก็มาเลยเซ่...!!"
2404-121 = "เอ๋? ฉันไม่ได้ตั้งใจ..."
2404-122 = "[s] \"พวกเธอใจเย็นก่อน...\""
2404-124 = "ชิ! คนอื่นไม่ต้องมายุ่ง!"
2404-125 = "อย่ามายุ่งน่า!"
2404-126 = "เมื่อกี้มีคนขายสกินสึจิโนโกะที่หายากๆ ฉันซื้อมาตั้งเยอะแต่มันกลับเป็นสกินจักจั่นซะได้ น่าโมโหสุดๆ!"
2404-127 = "อารมณ์เสียว้อย!"
2404-128 = "[s] \"ไม่หรอก มันอยู่กับที่เธอมอง\""
2404-129 = "งั้นฉันจะระบายความโกรธใส่เธอก็แล้วกัน!"
2404-130 = "เอาไปเลย!"
2404-132 = "อะ... อ๊าย~?!"
2404-133 = "ตรงนั้นน่ะ รอก่อนสิ"
2404-134 = "ทุกคนหยุดค่ะ!"
2404-136 = "หา? ใครน่ะ?!"
2404-137 = "นั่นใครน่ะ?!"
2404-141 = "รุ่นพี่สึบากิ...? รุ่นพี่มิโมริ...?"
2404-142 = "จะมาหาเรื่องรุ่นน้องของพวกเราตามใจชอบอย่างนี้ไม่ได้นะ"
2404-143 = "ถ้าจะใช้ความรุนแรงแบบนี้ต่อไป พวกเราจะไม่อยู่เฉยแล้วนะคะ"
2404-144 = "กลัวซะที่ไหนกันเล่า! เข้ามาเลย!"
2404-145 = "เข้ามาเลย!"
2404-153 = "บ้าเอ้ย! ฝากไว้ก่อนเถอะ!"
2404-156 = "พะ...พี่! รอฉันด้วยสิคะ!"
2404-160 = "ฮะ... ฮือ... ฮือ...!"
2404-161 = "[s] \"ฮือ...?\""
2404-162 = "ฮือฮือ!!! รุ่นพี่สึบากิ! รุ่นพี่มิโมริ!!"
2404-168 = "ไม่เป็นไรแล้วนะ คาเอเดะ พวกเด็กเจ้าปัญหาถูกไล่ไปหมดแล้วล่ะ"
2404-169 = "คาเอเดะจังกับคุณครูมาทำอะไรที่นี่เหรอคะ?"
2404-170 = "[s] \"เรื่องนั้นน่ะคือว่า...\""
2404-171 = "ก็พวกพี่ทิ้งฉันไว้! แล้วออกมากันสองคน! เราก็เลยตามมา!"
2404-172 = "หืม?"
2404-173 = "คะ...?"
2404-175 = "(อธิบายเรื่องที่เกิดขึ้นจนถึงตอนนี้ให้สองคนนั้นฟัง)"
2404-177 = "อ่า เรื่องนั้น..."
2404-178 = "เอ๋ แต่ว่า..."
2404-179 = "ข้อสันนิษฐานของฉันถูกต้องใช่มั้ย?! ทั้งสองคนตัดสินใจเรื่องสำคัญที่จุดชมวิวใช่มั้ย?! โดยที่ไม่มีฉัน!"
2404-180 = "เปล่านะ เราแค่แวะมาตรวจของอำนวยความสะดวก"
2404-181 = "พวกเราเดินมองไปตามที่ต่างๆ รอบเฮียกคิยาโคตอนกลางคืน และดูว่ามีตรงไหนเสียหายหรือเปล่า#nตรวจของอำนวยความสะดวกว่ามีส่วนที่ถูกละเลยจนอาจเกิดอันตรายหรือเปล่าน่ะค่ะ"
2404-182 = "[s] “ตรวจของอำนวยความสะดวก...\""
2404-183 = "ถะ... ถ้าอย่างงั้นแมวพวกนี้ล่ะ?!"
2404-184 = "แมวข้างถนนพวกนั้นเป็นมาสคอตใหม่ของชมรมฝึกฝนเหรอ?! เพราะแมวพวกนี้น่ารักกว่าฉันใช่ไหม?!"
2404-185 = "น้องแมวพวกนี้เป็นแมวที่เราดูแลตามปกติน่ะ"
2404-186 = "ใช่ค่ะ เราเตรียมอาหารมาให้ทุกคืน และคอยมาดูว่าพวกมันไม่เจ็บป่วยตรงไหนค่ะ"
2404-187 = "ถ้าอย่างนั้น... ทำไมถึงทิ้งฉันไว้แล้วออกมากันสองคนล่ะ?"
2404-188 = "เพราะว่าฉัน... ยังเป็นรุ่นน้องที่ไม่น่าไว้ใจเหรอ?! ฮือฮือ!!"
2404-189 = "อืม เรื่องนั้นมัน..."
2404-190 = "คาเอเดะจัง เรื่องนั้นฉันตอบให้ได้ค่ะ"
2404-191 = "...ฮึ่กๆ หืม?"
2404-192 = "เมื่อคืนนั้นเราชวนเธอออกไปลาดตระเวนด้วยกันแล้ว"
2404-193 = "แต่คาเอเดะจังบอกว่าง่วงและให้พวกเราไปกันเลยยังไงล่ะคะ"
2404-194 = "..."
2404-196 = "หืม?"
2404-197 = "[s] \"ครูว่าแล้ว...\""
2404-198 = "ถึงจะเป็นกิจกรรมชมรม แต่มันก็เป็นกิจกรรมอิสระ เลยไม่ได้บังคับน่ะ"
2404-199 = "มันก็จริงที่การทำกิจกรรมทุกคืนเป็นเรื่องยากนะคะ"
2404-200 = "ตอนนี้ฉันคงคุ้นแล้วล่ะมั้ง? ตาแป๋วสุดๆ ไปเลยล่ะ!"
2404-201 = "เป็นเพราะสึบากิจังแข็งแกร่งตอนเวลากลางคืนยังไงล่ะคะ ฮุฮุ"
2404-202 = "[s] \"มิน่าล่ะ เพราะอย่างนี้ถึงมีชีวิตชีวามากกว่าปกติ...\""
2404-203 = "อืม ถะ... ถ้างั้น ที่พวกรุ่นพี่ทิ้งฉันไว้คนเดียวแล้วออกไปข้างนอกจนถึงตอนนี้#nทั้งหมดก็เพราะแบบนี้เอง..."
2404-204 = "อื้อ ก็คาเอเดะขอไว้นี่นา"
2404-205 = "แต่ไม่นึกเลยว่าคาเอเดะจะคิดแบบนั้น ฉันขอโทษนะ คาเอเดะจัง"
2404-206 = "ที่ปล่อยให้เธออยู่คนเดียว ที่ทำให้เธอรู้สึกโดดเดี่ยว..."
2404-207 = "อื้อ ฉันก็ขอโทษนะ ทีหลังเราจะไม่ทิ้งไปอีกแล้ว ถ้าคาเอเดะจังโอเค#nเราจะปลุกเธอให้ออกมาด้วยกันทุกคืนเลยดีมั้ย?"
2404-208 = "เอ่อ... ทุกคืนตั้งแต่นี้ไปเลย...?"
2404-209 = "ดะ...เดี๋ยวนะ... การนอนหลับตอนกลางคืนมันก็...เป็นเรื่องดีๆ นะ?"
2404-210 = "...ฮุ"
2404-211 = "ฮุฮุฮุ"
2404-212 = "[s] \"ถ้างั้นก็หมดเรื่องเข้าใจผิดแล้วใช่ไหม?\""
2404-213 = "อื้อ! อย่างที่คุณครูบอกจริงด้วย! ทั้งหมดนี่เป็นเรื่องเข้าใจผิด! ฉันนี่คิดไร้สาระไปหมด! พวกรุ่นพี่คิดถึงฉันมากเลย!"
2404-214 = "ฮิฮิ!"
2404-215 = "คาเอเดะจังว่าแต่...?"
2404-216 = "หืม? ทำไมเหรอรุ่นพี่มิโมริ...?"
2404-217 = "การที่คาเอเดะจังไม่หลับและออกไปข้างนอกกับคุณครู..."
2404-218 = "หรือว่าคาเอเดะจัง ดื่มกาแฟที่ฉันห้ามดื่มมาหรือเปล่าคะ?"
2404-219 = "อ่า..."
2404-220 = "เออ?"
2404-221 = "คาเอเดะจัง ถึงจะไม่ดื่ม เธอก็นอนหลับไม่ค่อยสนิทอยู่แล้ว แล้วดื่มกาแฟอีกได้ยังไงคะ!"
2404-222 = "เออ?!"
2404-224 = "คุณครูก็เป็นไปด้วยเหรอคะ!"
2404-225 = "[s] \"ไม่เอาน่า!\""
2404-227 = "เห็นทีฉันจะต้องอบรมแล้วนะคะ!"
2404-228 = "ช่วยไม่ได้นะ~"
2404-229 = "ฮือฮือ! คุณครูช่วยด้วย~"
2404-231 = "(แล้วความเข้าใจผิดก็ได้คลี่คลายลงด้วยเหตุนี้ และความสัมพันธ์ของชมรมฝึกฝนก็แน่นแฟ้นยิ่งขึ้น)"
