[translation]
901010400460-6 = "では、これまでの内容を整理しようか。"
901010400460-7 = "「怪談がカニの価格や漁獲量に与えた影響は微々たるものだった」"
901010400460-8 = "「怪談の内容は心理的恐怖を引き起こすことに焦点が当てられていた」"
901010400460-9 = "「怪談の発信源は鐘崎港の関係者ではない、一般市民の口伝で広がっていた」"
901010400460-11 = "うーん……これだけじゃ、この失踪事件がロアと関係があるかは断定できないね。"
901010400460-12 = "ミヤグチ――失踪した漁師についての情報はないの？"
901010400460-14 = "うん。よそ者が失踪者の情報を聞いて回ったら疑われると思って。"
901010400460-15 = "ある程度交流はしたし、次は聞いてみるね。"
901010400460-17 = "明日は港の定休日だから、明後日から頑張ろう。"
901010400460-18 = "その間に噂が広まって、怪異が現れたりしないでほしいな～"
901010400460-19 = "そういえば、海ってよく怪獣が出る作品の舞台になるよね。"
901010400460-20 = "ほら、この間新しいマスコット姿の怪獣が現れたって噂もあったし。"
901010400460-21 = "ペパロニとかいうキモイ鳥のこと？"
901010400460-22 = "幻の限定ぬいぐるみがほしいっていうファンの願いで実体化したんだって……。"
901010400460-23 = "流石に笑っちゃったけど。"
901010400460-24 = "そうね。というか、逆にペパロニの怪異なら怖くないかも。"
901010400460-29 = "……あら？#nなんか変な顔をしているわね、先生。どうしたの？"
901010400460-30 = "[s1] \"その……。\"\n[s2] \"……「ペロロジラ」は本当にいるんだよ。\""
901010400460-35 = "ええ！？"
901010400460-38 = "えっと、つまり……先生の話をまとめると。"
901010400460-39 = "「ペロロジラ」って名前の限定ぬいぐるみが、ファンの願いで実体化して……#nそれで、D.Uに向かってて？"
901010400460-40 = "それをヴァルキューレと協同で倒した、ってこと？"
901010400460-41 = "……冗談よね？"
901010400460-42 = "[s] \"じょ、冗談じゃないよ！\""
901010400460-46 = "[ns3] \"市民の目に入る前に、シャーレで解決した事件で……。\"\n[ns4] \"ヴァルキューレの一部の生徒を除くと、知ってる人は誰もいないけどね。\""
901010400460-49 = "そういえば、以前見たヴァルキューレ警備局の報告書にも、大規模な警備部隊の出動記録があったね。"
901010400460-50 = "通報内容と被害の規模については、記録が抹消されていて確認できなかったけど……。"
901010400460-51 = "そんな大事件があったのに、どうして私たちは知らなかったの？"
901010400460-52 = "あの時は連邦生徒会襲撃の件で指名手配中だったでしょう。"
901010400460-53 = "あ……そっか。"
901010400460-55 = "それだけ大きな怪獣がD.U.近海に現れたのなら、私たち以外にも誰かが目撃したはずなのに……。"
901010400460-56 = "ニュースや目撃談がSNSに上がっていなかったというのも、不思議な話ですね。"
901010400460-57 = "[s5] \"混乱を防止するために、連邦生徒会が情報統制をしてたんだ。\"\n[s6] \"だから多くの生徒が都市伝説だと思っているみたい。\""
901010400460-61 = "たしかに、このペロッシャー……とかいう鳥、見た目はキモくても怖い感じはしないもんね。"
901010400460-62 = "ただの噂だって片づけちゃうのも納得だよ。"
901010400460-63 = "都市伝説で生まれた存在が、都市伝説そのものになるだなんて……なんだか皮肉よね。"
901010400460-64 = "こんな見た目のキャラでも、巨大怪獣になるんだねぇ。"
901010400460-65 = "というか、有名なら怪獣になっちゃうのってなんか困るな。#nいつか巨大シュッポくんと戦うことになったりして！？"
901010400460-70 = "……。"
901010400460-71 = "FOX2、明日の午後に少し席を外してもいいか？"
901010400460-72 = "うん。特に予定はないから大丈夫だけど……急にどうしたの？"
901010400460-73 = "個人的に調査したいことがあるんだ。"
