[translation]
1006403-1 = "เสียงระฆังรับปีใหม่"
1006403-4 = "อ้าว ครู ฉันรออยู่พอดีเลย"
1006403-5 = "[s] \"ขอโทษที่มาช้านะคาโยโกะ พอดีรถไฟมันดีเลย์...\" "
1006403-6 = "อย่าว่างั้นเลย ไม่เป็นไรหรอก ไม่ได้รอนานขนาดนั้น"
1006403-7 = "แถมงานลั่นระฆังก็เริ่มดึกๆ ใกล้เที่ยงคืนนู่น ไปตอนนี้ก็ยังมีเวลาเหลือเฟือ"
1006403-8 = "ที่นั่นมันไกลแค่ไหนน่ะเหรอ?"
1006403-9 = "อืม... แอบไกลอยู่นะ ต้องใช้เวลานั่งรถไฟจากตัวเมืองถึงชานเมืองกว่า 1 ชั่วโมงเลย..."
1006403-10 = "เราอาจจะกลับช้าหน่อย แต่วันนี้ไม่น่าจะมีปัญหาเพราะยังไงก็มีรถไฟเที่ยวพิเศษ"
1006403-11 = "งั้นเราออกเดินทางกันเลยมั้ย?"
1006403-16 = "(1 ชั่วโมงต่อมา...)"
1006403-17 = "แฮ่ก... แฮ่ก... มันอยู่กลางเชิงเขาที่ทุรกันดารกว่าที่คิดอีกนะเนี่ย"
1006403-18 = "ขอโทษนะครู ต้องมาเดินพร้อมกับฉันแบบนี้ ครูเหนื่อยมากเลยใช่มั้ย?"
1006403-19 = "ใส่กิโมโนขึ้นเขานี่มันลำบากกว่าที่คิดเอาไว้อีกนะ..."
1006403-20 = "[s] \"ไม่เป็นไรหรอกน่า ทางมันไม่ได้ชันขนาดนั้น\""
1006403-21 = "แต่ก็ดีแล้วแหละนะที่เรามาถึงงานทันเวลา เดี๋ยวงานลั่นระฆังจะเริ่มขึ้นแล้ว..."
1006403-25 = "เอ๋...? ทำไมไม่ค่อยมีคนเลยล่ะ?"
1006403-26 = "ไม่ทราบว่าเป็นแขกมาชมงานลั่นระฆังส่งท้ายปีหรือเปล่าครับ...?"
1006403-27 = "อื้อ ว่าแต่ไม่เห็นแขกคนอื่นๆ เลยนะ..."
1006403-28 = "คืออย่างนี้... ปีนี้หอแขวนระฆังสภาพไม่ดี เราจึงยกเลิกงานลั่นระฆังส่งท้ายปีอย่างเลี่ยงไม่ได้..."
1006403-29 = "ปกติไม่ค่อยมีคนเข้าวัดพุทธกันสักเท่าไร เราจึงแจ้งข่าวเฉพาะชาวบ้านละแวกนี้เท่านั้น..."
1006403-30 = "ขอโทษที่ทำให้มาเสียเที่ยวนะครับ..."
1006403-31 = "อ่า... ให้มันได้อย่างนี้สิ... ปีนี้อุตส่าห์อยากฟังเสียงระฆังส่งท้ายปีแท้ๆ..."
1006403-32 = "[s1] \"ช่วยไม่ได้แหละเนอะ\"\n[s2] \"เอาไว้ปีหน้าละกัน\""
1006403-33 = "อืม..."
1006403-34 = "อืม..."
1006403-37 = "อะไรนะ...? รถเที่ยวสุดท้ายออกไปแล้วเหรอ?!"
1006403-38 = "ถ้าอิงตามตารางเดินรถปีที่แล้ว ฉันมั่นใจว่ายังมีรถเที่ยวสุดท้ายอยู่นะ..."
1006403-39 = "ปีที่แล้วน่ะมีครับ แต่ปีนี้งานลั่นระฆังดันมาถูกยกเลิกไป... พวกเขาเลยตัดสินใจไม่ให้บริการเสริมน่ะครับ"
1006403-40 = "ขอโทษด้วยนะครับ คงต้องรอจนกว่ารถเที่ยวแรกของวันพรุ่งนี้จะเข้ามาแล้วละครับ"
1006403-44 = "เฮ้อ... จะไปสุดที่ตรงไหนกันเนี่ย..."
1006403-45 = "ขอโทษนะครู ถ้าฉันขยันหาข้อมูลล่วงหน้าสักหน่อย มันคงไม่เกิดเรื่องแบบนี้..."
1006403-46 = "ขอโทษด้วยนะที่พามาเจอความลำบากแบบนี้น่ะ"
1006403-47 = "[s] \"ไม่หรอก ผิดที่ครูมาสายเองด้วยแหละ...\""
1006403-48 = "ว่าแต่เราจะเอายังไงกันดีล่ะ? พอเป็นแถบนอกเมือง แถวสถานีรถไฟก็เลยไม่มีที่พัก ไม่มีสิ่งอำนวย#nความสะดวกให้เล่นฆ่าเวลาด้วย..."
1006403-49 = "[s3] \"เอาตามที่พนักงานสถานีบอกนั่นแหละ...\"\n[s4] \"ทำได้แค่รอรถเที่ยวแรกที่ห้องพักผู้โดยสารเท่านั้น\""
1006403-50 = "อือ... รอที่นี่ไม่กี่ชั่วโมงหรอก"
1006403-51 = "อือ... รอที่นี่ไม่กี่ชั่วโมงหรอก"
1006403-56 = "อืม... "
1006403-57 = "[s] \"คาโยโกะไม่หนาวเหรอ?\""
1006403-58 = "อื้ม ไม่เป็นไรหรอก กิโมโนตัวนี้มันอุ่นกว่าที่คิดเอาไว้น่ะ"
1006403-59 = "แล้วครูล่ะ เป็นยังไงบ้าง? ไม่หนาวเหรอ?"
1006403-60 = "[s5] \"อื้ม วันนี้อากาศค่อนข้างอุ่นเลยแหละ\"\n[s6] \"ครูก็สบายดี\""
1006403-61 = "อย่างนั้นสินะ..."
1006403-62 = "อย่างนั้นสินะ..."
1006403-66 = "รู้งี้เอาเครื่องเล่นเพลงพกพามาฟังเพลงด้วยดีกว่า..."
1006403-67 = "ทุกทีฉันจะอยู่กับเพื่อนร่วมงานที่คุยเก่งตลอดเวลาน่ะ พอมาอยู่เงียบๆ แบบนี้เลยรู้สึกอึดอัดนิดหน่อย"
1006403-68 = "[s] \"จะว่าไปคาโยโกะก็ฟังเพลงตลอดเลยเนอะ\""
1006403-70 = "[ns] \"มีงานอดิเรกแบบนั้นตั้งแต่เมื่อไรเหรอ?\""
1006403-71 = "นั่นสินะ น่าจะเป็นมาตั้งแต่ก่อนเข้าสำนักงานหน่วยรับจ้างสารพัดแล้ว...."
1006403-72 = "ตอนนั้นฉันก็ใช้ชีวิตแต่ละวันท่ามกลางพวกชอบเสียงดังเหมือนตอนนี้แหละ"
1006403-73 = "แค่ช่วงนั้นมีเสียงรบกวนประจำ ฉันเลยเริ่มฟังเพลงเพราะไม่อยากรับรู้ความเป็นจริงเฉยๆ"
1006403-74 = "แต่ก็ไม่ได้เกลียดความวุ่นวายที่พบเจอ... หลังจากเข้าหน่วยรับจ้างสารพัดหรอกนะ"
1006403-75 = "ฮุฮุ... จะว่าไปพักหลังนี้ไม่ค่อยมีข้ออ้างให้ฟังเพลงเลย"
1006403-77 = "(แล้วคุณครูก็พูดคุยเกี่ยวกับนักเรียนหน่วยรับจ้างสารพัดกับคาโยโกะอยู่พักใหญ่)"
1006403-79 = "เวลาล่วงเลยมาขนาดนี้แล้วเหรอเนี่ย..."
1006403-80 = "จะว่าไปก็มัวแต่คุยกับครูจนลืมเวลาไปแล้วเลยแฮะ"
1006403-84 = "หืม? เสียงระฆัง...?"
1006403-87 = "― อีกเดี๋ยว ก็ถึงเวลารถเที่ยวแรกแล้วสินะ[wa:740] "
1006403-90 = "― ถึงจะไม่ใช่เสียงที่คาดหวัง...[wa:1840] "
1006403-92 = "― แต่ก็ไม่ได้แย่อะไรหรอก"
1006403-95 = "― ถึงจะเป็นเสียงธรรมดา[wa:1520] "
1006403-97 = "― ที่ดังทุกเช้าต่างจากเสียงระฆังส่งท้ายปี ที่หนึ่งปีมีครั้งเดียว...[wa:1410] "
1006403-100 = "― แต่วันแรกของปีใหม่[wa:800] "
1006403-102 = "― ก็ไม่ได้มีทุกวัน"
1006403-105 = "― เสียงที่ได้ฟังในวันนี้[wa:350] "
1006403-107 = "― อาจจะเป็นเรื่องที่ดีสุดๆ เลยก็ได้"
1006403-110 = "― ขอให้ปีนี้เป็นปีที่ดีเหมือนเช่นเคยนะ[wa:400] "
1006403-112 = "― สวัสดีปีใหม่นะ ครู[wa:1630] "
1006403-115 = "เฮ้อ... หาทางกลับมาจนได้นะพวกเรา"
1006403-116 = "ขอบคุณที่โต้รุ่งด้วยกันนะ เกือบจะเป็นปีใหม่ที่ยอดแย่ไปซะแล้ว พอมีครูอยู่ด้วยฉันก็เลยรู้สึกดีน่ะ"
1006403-117 = "[s] \"ครูก็รู้สึกดีที่ได้พูดคุยกับคาโยโกะเหมือนกัน\""
1006403-118 = "ทีนี้ก็เหลือแค่นอนชดเชยเวลาจากเมื่อคืน... จะให้กลับสำนักงานหน่วยรับจ้างสารพัดก็คงจะใช้เวลา#nนานกว่าเดิม..."
1006403-119 = "ครู... ถ้าไม่ว่าอะไรฉันของีบที่ชาเล่ต์ได้มั้ย?"
1006403-120 = "ฉันจะแนะนำเพลงบำบัดการนอนให้สมการรอคอยเลย ครูเองก็ควรพักผ่อนในวันแรกของปีใหม่นะ"
1006403-122 = "(จากนั้นคุณครูก็กลับชาเล่ต์ไปนอนชดเชยพร้อมกับคาโยโกะ)"
