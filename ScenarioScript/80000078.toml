[translation]
80000078-1 = "Good Diver Chocolate"
80000078-2 = "Somewhere in the Black Market"
80000078-3 = "After getting Saori's message, I hurried to our meeting spot."
80000078-4 = "Oh, hey, Sensei."
80000078-5 = "I'm glad we could see each other before the day ended."
80000078-6 = "[s] \"Saori? What's going on?! What happened?!\""
80000078-7 = "Oh... It's nothing."
80000078-8 = "...But I know you won't be persuaded of that, with how I look right now."
80000078-9 = "So I'll just say... It was all to carry out my duty for today."
80000078-10 = "[s] \"What do you mean, your duty?!\""
80000078-11 = "Exactly what the word means."
80000078-12 = "Here. Take it."
80000078-17 = "[ns] \"...Chocolate? And this looks like an expensive brand...\""
80000078-18 = "Yes. I was informed that today is the day for that."
80000078-19 = "A day when one gives chocolate to a person they owe a debt to, to show appreciation."
80000078-20 = "I'm told it's known as Valentine's Day."
80000078-21 = "[s1] \"I mean... you're right but... Are you okay?\"\n[s2] \"But how did you get hurt so badly?\""
80000078-22 = "I pushed myself harder than usual during my commissions. Things got...messy."
80000078-23 = "I pushed myself harder than usual during my commissions. Things got...messy."
80000078-24 = "I never knew that chocolate could cost this much."
80000078-25 = "But I've been told that if the chocolate isn't of the highest quality..."
80000078-26 = "It won't be an appropriate show of appreciation."
80000078-27 = "And if an inappropriate gift is chosen, it conveys a desire to end the relationship."
80000078-28 = "Apparently, some people go as far as giving an enemy poor-quality chocolate as an insult, and at times even used it as a way to declare war..."
80000078-29 = "It's hard to believe this is simply common sense among those living in the outside world."
80000078-30 = "But, since I've decided to live in the outside world as well, I should adhere to those standards."
80000078-31 = "What do you think, Sensei?"
80000078-32 = "Is this chocolate sufficient?"
80000078-33 = "Your expression...is concerning."
80000078-34 = "[s] \"Who...\""
80000078-35 = "Y-Yes?"
80000078-36 = "[s] \"Who told you such nonsense?!\""
80000078-37 = "S-Sensei?!"
80000078-39 = "I-I see... I must have misunderstood."
80000078-40 = "Sorry for the trouble."
80000078-41 = "[s3] \"No, there's nothing you need to apologize for!\"\n[s4] \"Dishonest business owners are to blame...\""
80000078-42 = "Well, anyway, I didn't know it was possible to make chocolate yourself."
80000078-43 = "Well, anyway, I didn't know it was possible to make chocolate yourself."
80000078-44 = "Apparently some people actually prefer handmade chocolate, too."
80000078-45 = "So next time, I'll make it myself."
80000078-46 = "[s5] \"You don't really have to go through all that trouble!\"\n[s6] \"The gesture itself makes me perfectly happy.\""
80000078-47 = "I-Is that so?"
80000078-48 = "I-Is that so?"
80000078-49 = "This Valentine's Day tradition is...confusing."
80000078-50 = "Oh, you want to share the chocolate with me?"
80000078-51 = "But...it was supposed to be a gift for you, Sensei!"
80000078-52 = "[s] \"I'd still like to eat it together, Saori.\""
80000078-53 = "Well..."
80000078-54 = "All right. If you insist."
80000078-55 = "I'm grateful for your continued support, Sensei."
80000078-57 = "Saori and I shared expensive chocolate and a rare moment of free time."
