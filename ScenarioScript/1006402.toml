[translation]
1006402-1 = "อีกหนึ่งความเข้าใจผิด"
1006402-2 = "ร้านขายเสื้อผ้าใกล้ D.U."
1006402-6 = "คือว่า..."
1006402-7 = "อ๊ะ ขอโทษครับ ผมไม่เห็นว่าคุณลูกค้าเข้ามาครับ..."
1006402-8 = "ขอโทษที่รบกวนเวลาพักนะ... แต่ว่าฉันอยากซื้อกิโมโนใหม่สักชุดน่ะ"
1006402-9 = "อ้อ ดะ... ได้เลยครับ เดี๋ยวผมแนะนำให้เองครับ!"
1006402-10 = "เชิญทางนี้เลย..."
1006402-12 = "(รู้ตัวอีกทีก็ขายกิโมโนมา 10 ปีแล้วสิเรา...)"
1006402-13 = "(ที่ผ่านมาร้านนี้รับลูกค้าหลายคน จนแค่เห็นหน้าก็เดาออกว่าคนไหนทำงานอะไรบ้าง)"
1006402-14 = "(ปกติคนที่มาร้านช่วงนี้มักจะเป็นนักเรียนที่เตรียมกิโมโนตัวแรกเพราะใกล้ถึงพิธีบรรลุนิติภาวะ...)"
1006402-15 = "(แต่ลูกค้าคนนี้ที่แผ่รังสีความน่ากลัวทั้งสายตาและท่าทางระหว่างเลือกผ้าซับในอย่างพิถีพิถัน... เธอต้องเป็นคนใหญ่คนโตจากองค์กรเขตพื้นที่อาชญากรรมอย่างแน่นอน!)"
1006402-16 = "(ถ้าเราทำให้เธอเสียความรู้สึกแม้จะเป็นเรื่องเล็กน้อย... เราอาจต้องเจอเรื่องสยดสยองก็เป็นได้...!)"
1006402-18 = "วะ... วางใจได้เลยครับ ร้านเรามีกิโมโนสำหรับคนมีสง่าราศีอย่างคุณลูกค้าหลายแบบมากครับ!"
1006402-19 = "ผมจะเลือกกิโมโนสุดปังที่เหมาะกับคุณลูกค้าให้เองครับ!"
1006402-20 = "ไม่ๆ ไม่ต้องถึงขั้นกิโมโนสุดปังก็ได้นะ..."
1006402-25 = "เอาเป็นว่าตัวนี้เป็นยังไงบ้างครับ?"
1006402-26 = "กิโมโนแช่มช้อยตัวนี้เราตัดเย็บจากผ้าไหมชั้นดีเนื้อบางเบา ช่วยเพิ่มเสน่ห์คุณลูกค้าแบบเท่าทวีคูณ จนผู้คนละสายตาไม่ได้เลยครับ!"
1006402-30 = "ตัวนี้มัน... ไม่โชว์เนื้อหนังไปหน่อยเหรอ?"
1006402-31 = "น่ะ... นั่นน่ะสิครับ... ผมสะเพร่าแนะนำชุดนี้ให้คนระดับคุณลูกค้าไปซะได้...!"
1006402-32 = "ระ... รอสักครู่นะครับ!"
1006402-37 = "ถะ... ถ้างั้นตัวนี้เป็นยังไงบ้างครับ?"
1006402-38 = "แค่ใส่กิโมโนปักดิ้นทองลายเสือกับมังกรสุดหรูตัวนี้ มันก็เสริมความน่าเกรงขามของเราได้แล้วครับ!"
1006402-42 = "ชุดนี้... มันไม่หรูไปหน่อยเหรอ?"
1006402-43 = "ยะ... อย่างที่คาดไว้เลย... คุณลูกค้ามีออร่าจนไม่ต้องพึ่งชุดหรูหราแบบนี้เลย..."
1006402-44 = "ขอโทษด้วยนะครับ เดี๋ยวจะรีบเอาชุดใหม่มาให้ดู..."
1006402-49 = "นี่คือชุดที่แพงที่สุดของร้านเรา ชุดเกราะโยะโรยครับ...!"
1006402-53 = "อันนี้หาความเป็นกิโมโนไม่ได้เลย..."
1006402-55 = "ฮะ... เฮือก?!"
1006402-56 = "ตะ... ต้องขออภัยด้วยครับ!"
1006402-57 = "โปรดไว้ชีวิตผมเถอะครับ...!"
1006402-58 = "เดี๋ยวนะ พูดเรื่องอะไร..."
1006402-59 = "[s] \"มีเรื่องอะไรเหรอ...?\""
1006402-60 = "อ้าว คุณครู...?"
1006402-61 = "[s1] \"ผ่านมาได้ยินเสียงคาโยโกะพอดีน่ะ\"\n[s2] \"มีปัญหาอะไรหรือเปล่า?\""
1006402-62 = "คือว่า..."
1006402-63 = "คือว่า..."
1006402-65 = "(คุณครูฟังเรื่องราวแล้วจึงคลายความเข้าใจผิดของพนักงาน)"
1006402-67 = "ยะ... อย่างนั้นสินะครับ ผมต้องขอโทษด้วยจริงๆ ครับ ดูจากท่าทางแล้วผมนึกว่าเป็นแก๊งคุโระกาเมะ หรือไม่ก็คนใหญ่คนโตจากที่ไหนสักแห่ง..."
1006402-68 = "ผมด่วนสรุปและเข้าใจผิดไปเอง... ขอโทษด้วยนะครับ"
1006402-69 = "ไม่ต้องเก็บไปใส่ใจหรอก ฉันถูกเข้าใจผิดว่าเป็นคนแปลกๆ จนชินแล้วละ"
1006402-70 = "ถ้าไม่มีเรื่องเข้าใจผิดแล้ว ขอดูกิโมโนตัวอื่นหน่อยได้มั้ย?"
1006402-71 = "ถ้าอย่างนั้น... กิโมโนโซนนี้เป็นยังไงบ้างครับ?"
1006402-72 = "ดีไซน์เน้นสีดำเรียบแต่โก้น้อยแต่มาก ผมคิดว่ามันเข้ากับสีผมคุณลูกค้ามากเลยนะครับ ราคาก็ย่อมเยา เพราะเป็นชุดสำหรับพิธีบรรลุนิติภาวะของนักเรียนครับ!"
1006402-73 = "อืม ฉันชอบดีไซน์ของมันนะ แต่ว่า...."
1006402-74 = "กิโมโนสีดำมันจะไม่ดูดาร์กไปหน่อยเหรอ? ปกติยิ่งถูกเข้าใจผิดว่าเป็นคนโหดๆ อยู่ด้วย..."
1006402-75 = "ครูคิดว่าไง?"
1006402-76 = "[s3] \"ครูคิดว่ามันเข้ากับคาโยโกะนะ\"\n[s4] \"คาโยโกะจะน่ารักขึ้นหลายเท่าเลยละ!\""
1006402-78 = "น่ารักเหรอ พูดอะไรของครูเนี่ย..."
1006402-79 = "จริงๆ เลย... อย่าแกล้งกันนะครู"
1006402-83 = "งั้นซื้อกิโมโนตัวนี้ดีมั้ย ไหนๆ ครูก็แนะนำมาแล้ว...?"
1006402-84 = "ครับ? ยังไม่ได้ดูชุดอื่นเลย ไม่เป็นไรเหรอครับ?"
1006402-85 = "อื้ม มันให้ฟีลคล้ายชุดที่ใส่เมื่อก่อน อีกอย่างฉันก็ไม่ได้เกลียดสีนี้เป็นการส่วนตัวด้วย"
1006402-86 = "แถมครูยังบอกว่ามันน่าจะเข้ากับฉันด้วย..."
1006402-87 = "ครับ ผมจะเตรียมให้เดี๋ยวนี้เลยครับ!"
1006402-93 = "จะว่าไป... วันนี้ฉันเป็นหนี้บุญคุณอีกแล้วสินะ เหมือนรับแต่ความช่วยเหลือจากครูตลอดเลย"
1006402-94 = "มันอาจจะดูเหมือนข้ออ้าง แต่เอาไว้คราวหน้าฉันจะใส่กิโมโนให้ดูละกันนะ"
1006402-95 = "ใจก็อยากใส่ให้ดูตอนนี้เลย แต่กิโมโนมันใช้เวลาใส่นานอยู่น่ะ"
1006402-96 = "[s] \"อื้ม เดี๋ยวจะรอดูนะ!\""
1006402-97 = "งั้นไว้เจอกันใหม่นะ ครู"
