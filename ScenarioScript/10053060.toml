[translation]
10053060-1 = "Episode 6;Phone Booth from Hell"
10053060-2 = "The next day..."
10053060-7 = "This isn't going to work! This method is stupid!"
10053060-12 = "Huh? You're just saying that now?"
10053060-17 = "I've had ENOUGH of it now! We've been flipping rocks for two hours!"
10053060-18 = "But, Rena... Snakes like shaded, humid areas..."
10053060-19 = "What is a Tsuchinoko, anyway? Are you sure it's even a snake? Does it have any characteristics besides being fat?"
10053060-20 = "Oh... That's a pointed question. First off, it is not merely a \"fat snake.\" Saying so is rather crude, not to mention rude."
10053060-21 = "The public calls it such because that shape is easy to grasp. I would say the Tsuchinoko is more of a...rhomboid."
10053060-22 = "Oh, is that so? What else do you know?"
10053060-23 = "While witnesses differ, most agree that the Tsuchinoko makes a \"shyaah!\" sound when it feels threatened."
10053060-24 = "So...like a cat?"
10053060-25 = "Even more astounding is that they can spring up! About one whole meter, right at you!"
10053060-26 = "That's a CAT."
10053060-27 = "Hm, an interesting theory... Could the Tsuchinoko actually be a cat?!"
10053060-28 = "Why are you convincing yourself?!"
10053060-29 = "Don't you have any more-relevant information?"
10053060-30 = "Hm... I cannot say I do. But I do have a tool that may prove useful."
10053060-31 = "We should create a team name."
10053060-32 = "...?"
10053060-33 = "Explain. WHY would that help?"
10053060-38 = "A name sets intention. If we call ourselves an investigation team, from that moment on, our purpose becomes investigating. It'll unconsciously help us focus on our goal while building camaraderie."
10053060-39 = "And, some researchers believe in the \"law of attraction.\" The flow of the universe is said to readjust to one's thoughts and desires."
10053060-40 = "Don't start with a plausible theory on work ethic, only to pivot into pseudoscientific drivel!"
10053060-45 = "I'm with her. I think we could use a cooler name. Or ANY name."
10053060-46 = "What do you think, Sensei?"
10053060-47 = "[s1] \"I agree.\"\n[s2] \"Yes, for example...\""
10053060-53 = "[ns] \"Since we 'investigate' the 'occult,' we could call it the Occul─!\""
10053060-55 = "Don't you dare! I will MURDER YOU!!"
10053060-60 = "...? I thought it sounded pretty good."
10053060-61 = "Then, how about we stick to our original purpose and call ourselves the \"Tsuchinoko Investigation Team\"?"
10053060-62 = "...That doesn't really get the blood pumping, you know. Can't we spice it up a little?"
10053060-67 = "Wh-What? Why are you looking at me?!"
10053060-68 = "Hey, you're the one who axed the \"occult\" name. If you're going to be so critical, then come up with an alternative."
10053060-69 = "...Uh, \"Tsuchinoko Investigation Team\" is...good..."
10053060-70 = "[s3] \"For a great fashion designer, you're a little bland...\"\n[s4] \"Show us your creativity, Rena!\""
10053060-73 = "Wait, this has nothing to do with fashion design...!"
10053060-74 = "Ugh...!"
10053060-75 = "So you DO think there's some creative overlap?"
10053060-76 = "Yeah! Lock in, Wildhunt! Show us your chops!"
10053060-77 = "...X."
10053060-78 = "Hm?"
10053060-79 = "How about \"Expedition Team X\"?"
10053060-80 = "..."
10053060-81 = "..."
10053060-82 = "N-No! Scrap that! We should—"
10053060-83 = "I think it's cool! Expedition Team X!!"
10053060-84 = "It sounds like we're secret agents..."
10053060-85 = "I do youth outreach, and the little kids always pick weak names like \"Hope\" or \"Happy\" for their teams. I'm glad to see Wildhunt's got some bite!"
10053060-86 = "R-Really? It's fine...?"
10053060-87 = "H-Hmph. Of course it is. That's why I suggested it."
10053060-88 = "Now that we have a name, our search is sure to be more fruitful."
10053060-90 = "All right, Expedition Team X! Let's get serious and find that Tsuchinoko!"
10053060-97 = "This isn't working! This is somehow even MORE STUPID!"
10053060-102 = "Hm? Is there a problem?"
10053060-103 = "Well, we just glossed over it, but we didn't change our strategy at all!"
10053060-104 = "We've flipped so many rocks that I'm starting to recognize some of these bugs!"
10053060-105 = "Ah, ahhh, I see. Worry not. The Law of Attraction is already bringing us closer to the Tsuchinoko."
10053060-106 = "But be careful. Avoid negative language, and use the past tense whenever possible. For example, say \"I FOUND the Tsuchinoko\" instead of \"I WANT to find the Tsuchinoko.\" Does that make sense?"
10053060-108 = "What a joke! A load of pseudoscience!!"
10053060-110 = "Hm? Wait, what time is it?"
10053060-114 = "...Huh."
10053060-115 = "What do you mean? Do we need to head to the bus stop?"
10053060-116 = "Uh, no... Because, see..."
10053060-118 = "...the bus already left."
10053060-124 = "Aw, it's fine. You know what? We'll call a taxi. No problem."
10053060-133 = "Wow, really? The line's, uh...not working."
10053060-134 = "Kivotos still has dead zones?"
10053060-135 = "I don't have any bars either. There's no signal out here..."
10053060-136 = "How about we just start walking?"
10053060-137 = "...Ah. Wait."
10053060-138 = "You know, I think I saw a phone booth nearby."
10053060-139 = "Yes. I saw it too."
10053060-140 = "Right on! Then I'll call us a cab. Back in a jiffy!"
10053060-144 = "Wait! It's getting dark. It's dangerous to—"
10053060-145 = "And she's gone..."
10053060-147 = "[ns5] \"I'll join her.\"\n[ns6] \"You two wait here.\""
10053060-154 = "Your move, creep."
10053060-155 = "...Eh? Sensei?"
10053060-156 = "Sorry about that. I knew I was being tailed. Thought you might be my \"prisoner,\" ha."
10053060-157 = "So, what's up? Did you forget something?"
10053060-158 = "...Huh? You followed me because you were \"worried\"? About me?"
10053060-164 = "Wow, the royal treatment. Can't say I get THAT at the Bureau."
10053060-165 = "In fact, they're the ones who pull me into the field whenever there's an incident, hahaha!"
10053060-166 = "So, while I deeply appreciate your concern, I'm fine. As you can see, I even found the phone all by myself!"
10053060-167 = "Now, one moment please. I just need to make a quiiiiick call."
10053060-172 = "...Ah."
10053060-173 = "Sensei, I'm sorry, but do you have...some change?"
10053060-174 = "[s7] \"I thought this might happen...\"\n[s8] \"Good thing I tagged along...\""
10053060-179 = "Oh, you want in the booth too?"
10053060-182 = "Isn't it a little cramped? Should I step out? ...All right, whatever you say."
10053060-183 = "Let's get this over with."
10053060-188 = "...Ah, hello? Is this \"Kivo-Cab\"?"
10053060-189 = "Great. I need a ride. This is—"
10053060-190 = "Uh... Yeah, about that."
10053060-191 = "...I'm not sure, EXACTLY, but it's up Mt. Shirakawa..."
10053060-192 = "Ah! Sensei! We need to deposit another coin! Now!"
10053060-196 = "...So, where was I?"
10053060-197 = "Ah, right, right. We're near the Mt. Shirakawa bus stop. Yeah, we can meet you there."
10053060-198 = "There's four of us. So, maybe a compact car will be too uncomfortable for Sensei?"
10053060-199 = "Scratch that. If we give Sensei shotgun and the three of us sit in the back...with the scrawny girl in the middle..."
10053060-200 = "It's disconnecting again! What kind of payphone is this?!"
10053060-204 = "Uh, yes. The compact's fine, if it's the closest."
10053060-205 = "We'll be waiting, so head right over."
10053060-206 = "Yes, thank you so much. Have a nice night."
10053060-210 = "Yet another problem solved, Sensei! Now let's get the girls and head to the stop."
10053060-215 = "Hey! What is this, jammed? Rusty piece of—"
10053060-220 = "Ha? You cheeky little punk. Sensei, stand back for a moment. Just gotta finesse it..."
10053060-228 = "Sensei...? Uh..."
10053060-229 = "Got any more coins on you? I think we'll need to call for help."
10053060-230 = "[ns9] \"Not any more...\"\n[ns10] \"We used them all.\""
10053060-234 = "When it rains it pours, huh...?"
10053060-235 = "*sigh* Sorry. It's my fault."
10053060-236 = "[s11] \"You had nothing to do with it.\"\n[s12] \"It's an old door. It broke.\""
10053060-239 = "No, it's because I'm cursed. It's my bad luck infecting everyone else."
10053060-240 = "This is why I hide away when I'm feeling off. It's best to ride it out alone."
10053060-241 = "[s13] \"You really believe in those things.\"\n[s14] \"Luck and superstition.\""
10053060-244 = "It's not a \"belief.\" It's reality, isn't it?"
10053060-245 = "Think about it. Getting trapped in a phone booth? That's rare. Once-in-a-lifetime, if ever."
10053060-246 = "And for it to happen now, after EVERYTHING else... It's because I'm in a bad cycle."
10053060-247 = "Well... If it gets too late, I'm sure the other two will notice and call for help. And at least the taxi company is on alert."
10053060-251 = "...But it's pretty cramped in here."
10053060-252 = "[s15] \"Tell me about it...\"\n[s16] \"And it's getting warm...\""
10053060-255 = "No kidding."
10053060-256 = "This is probably why you're only supposed to have one person in a booth, huh?"
10053060-260 = "Ah, sorry. I didn't mean to bump you, but—"
10053060-261 = "Agh... What am I even doing?"
10053060-266 = "It's...ringing?"
10053060-267 = "A no-no-no-no. Can you even CALL a phone booth?"
10053060-268 = "[s17] \"Technically, yes...\"\n[s18] \"But it's not very common, right...?\""
10053060-271 = "What do we do? Should I pick it up?"
10053060-275 = "... I suppose I should. I mean... How could I not?"
10053060-281 = "Hello?"
10053060-286 = "Roaring flames and hellish screams pierced through the receiver."
10053060-287 = "You will burn here too. Burn until you die."
10053060-291 = "S-S-Sensei?!"
10053060-292 = "Y-You heard that too? That was real?"
10053060-293 = "[s19] \"C-Calm down, Konoka!\"\n[s20] \"It must be...a glitch! Or a prank!\""
10053060-296 = "That's impossible!"
10053060-297 = "Who would call THIS payphone, at all times, while WE'RE locked in here?"
10053060-298 = "They said we'd burn to death! And you know it's getting warm in here!"
10053060-299 = "No, no I'm not imagining it! The floor is really hot!! Scorching!"
10053060-300 = "[s21] \"It really is...!\"\n[s22] \"But...let's take calming breaths and wait to be rescued.\""
10053060-304 = "Ten minutes passed. Help never arrived."
10053060-307 = "*pant* *pant*"
10053060-308 = "Sensei, are you all right? You're sweaty. Really...fogging up the place."
10053060-309 = "[s23] \"Same to you, Konoka.\"\n[s24] \"I suppose it's a little uncomfortable.\""
10053060-312 = "..."
10053060-313 = "I guess we have no choice."
10053060-314 = "Sensei. Come a bit closer."
10053060-318 = "Right against me. Yes, that should work."
10053060-319 = "Now then..."
10053060-323 = "Charge!!"
10053060-333 = "Ah, that's so refreshing! I should have tipped it from the start!"
10053060-334 = "Sensei, you're not hurt, are you?"
10053060-335 = "[ns25] \"Nope. Thanks to you.\"\n[ns26] \"To think, you'd throw the booth...\""
10053060-338 = "Ah, that was nothing! Hardly a workout, hahaha!"
10053060-340 = "*static*"
10053060-341 = "...Wait...that's not...fai..."
10053060-350 = "Rest in pieces, creep! *huff* Glad that's over. Do you think it's actually haunted?"
10053060-351 = "Wait, forget that! Let's hurry back!"
10053060-353 = "Ultimately, we never learned who had called us."
