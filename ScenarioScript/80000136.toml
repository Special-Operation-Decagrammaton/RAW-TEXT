[translation]
80000136-1 = "I Made It!"
80000136-2 = "Schale Office"
80000136-3 = "I returned from a business trip and found something new in my office."
80000136-7 = "There was a...mass...of unwrapped chocolate standing in the corner."
80000136-11 = "And I had a feeling I knew who placed it..."
80000136-12 = "[ns] \"...Ritsu?\""
80000136-13 = "Yes! That's correct!"
80000136-14 = "It's my special surprise chocolate! Especially prepared for Sensei!"
80000136-15 = "Happy Valentine's Day, Sensei!"
80000136-16 = "[s] \"Thank you, Ritsu!\""
80000136-17 = "Heehee."
80000136-18 = "By the way, Sensei, how did you know just by looking?"
80000136-19 = "You know, that it was from me?"
80000136-20 = "[ns] \"How could I not know?\""
80000136-25 = "[ns] \"...That chocolate is bigger than the office fridge!\""
80000136-26 = "Aha...!"
80000136-27 = "Actually, you don't have to worry about that, Sensei!"
80000136-28 = "[s] \"Hm? Worry about what?\""
80000136-29 = "You don't have to put THIS chocolate in the fridge!"
80000136-30 = "No matter how hot summer gets!"
80000136-31 = "Because..."
80000136-32 = "This chocolate! Will never melt!"
80000136-33 = "[s1] \"Unmeltable chocolate?!\"\n[s2] \"Just what kind of chemistry did you use...?!\""
80000136-36 = "Ha! If you're curious, why don't you try touching it?"
80000136-37 = "I ran my fingertips over its surface, as Ritsu suggested."
80000136-38 = "[ns] \"Th-This is...!\""
80000136-39 = "Heehee, what do you think? Did you solve the mystery?"
80000136-40 = "[s] \"Yeah, I'm sure it'll never melt.\""
80000136-44 = "[ns] \"...Because it's chocolate made of rock...!\""
80000136-45 = "That's right! I found some brown marble and carved it!"
80000136-46 = "How is it? What do you think?"
80000136-47 = "[s3] \"It's incredibly precise.\"\n[s4] \"I honestly thought it was chocolate...\""
80000136-50 = "Heehee, that's quite the compliment!"
80000136-51 = "Hm? \"How is this possible\"?"
80000136-52 = "Here, come closer, Sensei."
80000136-53 = "I'll explain all the details!"
80000136-55 = "And so, I examined various parts of the chocolate(?) and listened to Ritsu's explanations."
80000136-56 = "But I still had a few OTHER questions..."
80000136-59 = "[ns5] \"...How did you get inside the office, Ritsu?\"\n[ns6] \"I'm sure the security system is on...\""
80000136-62 = "Yeah? But there's no security in the ventilation shafts!"
80000136-67 = "...After Ritsu returned to Wildhunt, I requested an upgraded security system."
