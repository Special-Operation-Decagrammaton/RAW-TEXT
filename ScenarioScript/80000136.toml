[translation]
80000136-2 = "夏萊辦公室"
80000136-3 = "（外出辦公回來後，發現了一個沒見過的奇特東西）"
80000136-7 = "（……剝了包裝的巧克力，被放在辦公室的一角）"
80000136-11 = "（呃，也就是說那個，難不成……）"
80000136-12 = "[ns]「……是律嗎？」"
80000136-13 = "對！答對了！！"
80000136-14 = "特別為老師準備的！驚喜特製巧克力！"
80000136-15 = "情人節快樂，老師！"
80000136-16 = "[s] 「謝謝你，律！」"
80000136-17 = "嘿嘿。"
80000136-18 = "不過老師，你怎麼一看就知道了？"
80000136-19 = "知道是我放了那個巧克力？"
80000136-20 = "[ns]「怎麼可能不知道呢。」"
80000136-25 = "[ns]「……巧克力的大小比辦公室冰箱還大呢。」"
80000136-26 = "啊哈……！"
80000136-27 = "不過不用擔心，老師！"
80000136-28 = "[s]「嗯？擔心什麼？」"
80000136-29 = "因為這是不用放冰箱的巧克力！"
80000136-30 = "不管多熱的夏天都沒問題！"
80000136-31 = "因為啊……"
80000136-32 = "這是絕對！不會融化的巧克力！"
80000136-33 = "[s1]「不會融化的巧克力！？」\n[s2]「到底用了什麼技術……！」"
80000136-36 = "如果好奇的話，要不要摸摸看，老師？"
80000136-37 = "（照著律的話，小心翼翼地將手放在巧克力的表面上）"
80000136-38 = "[ns]「這……這是……！」"
80000136-39 = "嘿嘿，怎麼樣？現在知道秘密了吧？"
80000136-40 = "[s]「確實，這樣的話絕對不可能融化呢。」"
80000136-44 = "[ns] 「……用石頭做的巧克力什麼的……！"
80000136-45 = "沒錯！是用棕色大理石雕刻而成的！"
80000136-46 = "怎麼樣，怎麼樣？"
80000136-47 = "[s3]「做得非常精緻耶？」\n[s4]「乍看之下根本分不出是石頭還是巧克力的程度……」"
80000136-50 = "嘿嘿，被老師稱讚了！"
80000136-51 = "嗯？你問怎麼做才能雕出這樣的作品？"
80000136-52 = "來，過來靠近一點，老師。"
80000136-53 = "我來仔細教你！"
80000136-55 = "（就這樣，和律一起仔細端詳著巧克力（？），聽他講述了關於雕刻的故事）"
80000136-56 = "（……不，比起那個更重要的是……）"
80000136-59 = "[ns5]「……不過你是怎麼進到辦公室的，律？」\n[ns6]「這裡的保安設備應該是啟動中的才對……」"
80000136-62 = "嗯？通風口通道裡面什麼都沒有啊？"
80000136-67 = "（……律離開後，重新檢查了保安設備）"
