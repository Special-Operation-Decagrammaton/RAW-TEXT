[translation]
80000136-1 = "是我做的！"
80000136-2 = "夏萊辦公室"
80000136-3 = "（外出辦公回來之後，發現了一個沒見過的奇特東西）"
80000136-7 = "（……一個已經拆過包裝的巧克力，被放在了辦公室的一角）"
80000136-11 = "（也就是說，那個難不成是……）"
80000136-12 = "[ns]「……是律嗎？」"
80000136-13 = "沒錯！答對了！！"
80000136-14 = "這是我特別為老師準備的！驚喜特製巧克力！"
80000136-15 = "情人節快樂，老師！"
80000136-16 = "[s] 「謝謝你，律！」"
80000136-17 = "嘿嘿。"
80000136-18 = "不過老師，你是怎麼一眼就看出來的呢？"
80000136-19 = "看出是我放了那個巧克力？"
80000136-20 = "[ns]「怎麼可能不知道呢。」"
80000136-25 = "[ns]「……那個巧克力的大小，可是比辦公室的冰箱還大呢。」"
80000136-26 = "啊哈……！"
80000136-27 = "這點你不用擔心哦，老師！"
80000136-28 = "[s]「嗯？什麼意思？」"
80000136-29 = "這是不用放冰箱冷藏的巧克力哦！"
80000136-30 = "不管夏天有多熱都沒問題！"
80000136-31 = "因為……"
80000136-32 = "這是絕對！不會融化的巧克力！"
80000136-33 = "[s1]「不會融化的巧克力！？」\n[s2]「到底用了什麼技術……！」"
80000136-36 = "如果好奇的話，老師要不要摸摸看？"
80000136-37 = "（按照律所說的，小心翼翼地將手放在巧克力的表面上）"
80000136-38 = "[ns]「這……這是……！」"
80000136-39 = "嘿嘿，怎麼樣？現在知道祕密了吧？"
80000136-40 = "[s]「確實，這樣的話絕對不可能融化呢。」"
80000136-44 = "[ns] 「居然是用石頭做的巧克力……！」"
80000136-45 = "沒錯！這是用棕色大理石雕刻而成的！"
80000136-46 = "怎麼樣，怎麼樣？"
80000136-47 = "[s3]「做得非常精緻耶？」\n[s4]「乍看之下根本分不出是石頭還是巧克力……」"
80000136-50 = "嘿嘿，被老師稱讚了！"
80000136-51 = "嗯？你問要怎麼做才能雕出這樣的作品？"
80000136-52 = "來，靠過來一點，老師。"
80000136-53 = "我來仔細教你！"
80000136-55 = "（就這樣和律一起仔細端詳著巧克力(?)，並聽他講述了關於雕刻的故事）"
80000136-56 = "（不過跟這個相比，更重要的是……）"
80000136-59 = "[ns5]「……話說你是怎麼進到辦公室裡的？」\n[ns6]「這裡的安全設備，應該都有正常啟動才對……」"
80000136-62 = "嗯？通風口裡面什麼都沒有啊？"
80000136-67 = "（……在律離開之後重新檢查了保安設備）"
