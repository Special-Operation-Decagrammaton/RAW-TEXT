[translation]
90002045-2 = "[ns] \"สำเร็จแล้ว!\""
90002045-3 = "ค่ะ! ตอนนี้สัญญาณของเยซ็อดอ่อนลงมากเลยค่ะ!"
90002045-4 = "[s] \"ปราบได้แล้วงั้นเหรอ?\""
90002045-8 = "อย่าเพิ่งด่วนสรุปสิคะ ถ้าไม่ใช่จะรับผิดชอบมั้ยคะ?!"
90002045-13 = "ว้ากกกกก?!"
90002045-14 = "ว้ายยย!?"
90002045-16 = "โมโมอิ มิโดริ ดูโน่นสิ"
90002045-18 = "อ่าา... ทั้งมึนหัว ทั้งปวดหูไปหมดเลย... ให้ดูอะไรตรงไหนเหรอ? เอ๋...?"
90002045-19 = "กำแพงที่กั้นดินแดนเหล็กกล้าไว้...?"
90002045-25 = "อื้อ มันหายไปแล้ว"
90002045-26 = "..."
90002045-27 = "ขอบคุณนะ คุณครู พวกเรารอดมาได้เพราะคุณครูเลยละ!"
90002045-30 = "ทีมโจมตี รีบกลับมาค่ะ!"
90002045-31 = "ตอนนี้กำลังกลับมาอยู่ค่ะ โรงเก็บยาน ได้ยินมั้ยคะ? ช่วยตรวจสอบสถานการณ์ด้วยค่ะ"
90002045-35 = "ปาปัม ปาปัม ป๊าม! อาริสึกลับมาอย่างปลอดภัยแล้วค่ะ! ไปเอาชนะกำแพงขนาดใหญ่ที่ขวางทางพวกเรา#nมาแล้วค่ะ!"
90002045-36 = "ค่ะ อาริสึ ทำได้ดีมากค่ะ"
90002045-38 = "ยืนยันการปิดฝาช่องทางเข้าออก ทางเอมิก็ติดต่อมาบอกว่าปลอดภัยเหมือนกัน งั้นจากนี้ก็..."
90002045-43 = "?!?!"
90002045-44 = "เป็นอะไรไปคะ ริโอะ? มีเรื่องอะไรงั้นเหรอคะ?"
90002045-45 = "ดูกำแพงนั่นสิ ฮิมาริ!"
90002045-46 = "กำแพงของเยซ็อด... เริ่มสร้างขึ้นใหม่แล้ว!"
90002045-47 = "!!!"
90002045-52 = "ครั้งนี้มันอะไรอีกเนี่ย?!"
90002045-53 = "เอ๋...? กำแพงตรงโน้น... จะว่ายังไงดีนะ? มันเริ่มงอกขึ้นมาใหม่จากขอบ และเติมส่วนที่หายไปทั้งซ้ายขวาอยู่นะ?"
90002045-55 = "ทุกคน วิ่ง!"
90002045-57 = "อีกแล้วเหรอ?!"
90002045-58 = "ต้องวิ่งสิ พี่โมโมอิ! ถ้ากำแพงปิด พวกเราก็เข้าไปในนั้นไม่ได้น่ะสิ!"
90002045-63 = "อีกนิด... อีกนิดเดียว...!"
90002045-64 = "อึกกกกก...!"
90002045-65 = "กระโดดเข้าไปเลย!"
90002045-74 = "ทุกคน เป็นยังไงบ้าง?"
90002045-80 = "โอ๊ยยย... เข้ามาทันใช่มั้ยนะ?"
90002045-84 = "เหลือจะเชื่อเลย..."
90002045-88 = "ว้าว..."
90002045-89 = "เหมือนภาพในฝันงั้นแหละ..."
90002045-95 = "อิซุมิโมโตะ เอมิ รายงานจากหน้างาน"
90002045-96 = "พวกฉันเข้ามาในดินแดนเหล็กกล้าแล้ว"
90002045-98 = "ตอนต่อไป;ฐานทัพหน้า"
