[translation]
90002045-2 = "[ns]「成功了！」"
90002045-3 = "沒錯！耶索德的訊號已經衰弱至極限！"
90002045-4 = "[s]「解決了嗎？」"
90002045-8 = "現在講這句話，萬一出事你要負責嗎！？"
90002045-13 = "哇啊啊啊！？"
90002045-14 = "呀啊啊！？"
90002045-16 = "桃井，綠。快看那邊。"
90002045-18 = "唔啊……好暈，耳朵好痛……#n那邊是……？咦……？"
90002045-19 = "原本阻擋鋼鐵大陸的屏障……？"
90002045-25 = "沒錯，消失了。"
90002045-26 = "……"
90002045-27 = "謝謝你，老師。多虧有你才能得救。"
90002045-30 = "立刻回收攻擊組！動作快！"
90002045-31 = "已經在行動了。#n機庫聽得到嗎？請確認狀況。"
90002045-35 = "乓啪喀乓！愛麗絲平安回歸！#n成功擊退阻擋在前方的巨大屏障了！"
90002045-36 = "沒錯，愛麗絲。你做得很棒。"
90002045-38 = "已確認艙門關閉，也收到英美回報安全的消息了。#n現在……"
90002045-43 = "！？！？"
90002045-44 = "怎麼了，莉央？發生什麼事了嗎？"
90002045-45 = "快看那邊的屏障，陽葵！"
90002045-46 = "耶索德的牆……開始再生了！"
90002045-47 = "！！！"
90002045-52 = "這次又是什麼啊！？"
90002045-53 = "咦……？那道牆…… 該怎麼說才好？#n正從邊緣開始重新生成，並從左右兩側向中間閉合？"
90002045-55 = "大家快跑！"
90002045-57 = "又來了！？"
90002045-58 = "快點跑起來，姐姐！#n要是牆關起來的話，我們就進不去了！"
90002045-63 = "差一點……就差一點……！"
90002045-64 = "唔唔唔唔……！"
90002045-65 = "往前跳！"
90002045-74 = "大家沒事吧？"
90002045-80 = "痛痛痛……勉勉強強吧？"
90002045-84 = "真不敢相信……"
90002045-88 = "哇啊……"
90002045-89 = "簡直就像在夢裡一樣……"
90002045-95 = "和泉元英美。回報現場情況。"
90002045-96 = "已成功進入鋼鐵大陸內部。"
90002045-98 = "下一話;前進基地"
