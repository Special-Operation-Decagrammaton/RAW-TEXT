[translation]
1006615-1 = "ไอเทมของผู้กล้าเมด"
1006615-2 = "และเพราะแบบนั้น! วันนี้อาริสึก็เลยมาที่นี่เพื่อจะมาทำความสะอาดกิลด์เฮาส์ของคุณครูค่ะ!"
1006615-3 = "[s] \"กะ... กิลด์เฮาส์?\""
1006615-4 = "ค่ะ อาริสึรู้จักดีค่ะ กิลด์เป็นสถานที่ที่ให้ความช่วยเหลือนักผจญภัย อย่างเช่น มอบหมายเควส มอบรางวัล หรือแม้แต่การรวบรวมสมาชิกในปาร์ตี้ค่ะ!"
1006615-5 = "และคอยติดประกาศแจ้งข่าวสารต่างๆ ให้กับคนอื่นๆ ได้รู้ด้วยค่ะ! เพราะงั้นแล้วที่นี่ก็เหมือนกับ#nกิลด์เฮาส์ค่ะ!"
1006615-6 = "อ๊ะ แต่ปกติที่กิลด์ จะต้องเป็นพี่สาวคนสวยคอยมอบเควสให้นี่นา... ทำยังไงดีล่ะคะ คุณครู?"
1006615-10 = "อ๊ะ นึกออกแล้วค่ะ! อาริสึจะเป็นคนมอบเควสแทนเองค่ะ!"
1006615-11 = "แต่พอคิดๆ ดูแล้ว... ตอนนี้อาริสึยังเป็นแค่ผู้กล้าเมดฝึกหัดอยู่ คงจะเปลี่ยนอาชีพกะทันหันไม่ได้ค่ะ..."
1006615-12 = "อ๊า! ทำยังไงดีคะคุณครู? อาริสึต้องการความช่วยเหลือค่ะ!"
1006615-13 = "[s] \"ก่อนอื่น เรามาทำความสะอาดกันก่อนดีกว่า....\""
1006615-14 = "..."
1006615-15 = "จริงด้วยค่ะ! อาริสึจะมาช่วยคุณครูทำความสะอาดนี่นา!"
1006615-16 = "ถ้างั้นคุณครู... เรามาทำความสะอาดด้วยกัน และพอได้ค่า EXP เพิ่มแล้วก็ไปหาไอเทมที่ซ่อนอยู่#nมาอัปเวลกันเถอะค่ะ!"
1006615-17 = "ไม่น่าจะมีพวกไอเทมที่ซ่อนอยู่หรอกงั้นเหรอคะ? ไม่หรอกค่ะ ใครจะไปรู้ล่ะคะ อาจจะมีก็ได้นะคะคุณครู!"
1006615-18 = "อาริสึเข้าใจเรื่องนี้ดีค่ะ เวลาทำความสะอาดห้องชมรม ก็จะเจอไอเทมที่ซ่อนอยู่ด้วยค่ะ! พวกเกมของโมโมอิกับมิโดริที่ทำหายไปน่ะค่ะ!"
1006615-19 = "บางทีก็เจอตัวยูสึด้วยค่ะ!"
1006615-24 = "(คุณครูทดไว้ในใจว่าจะต้องสอนเรื่องความสำคัญของการจัดเก็บของต่างๆ ให้สมาชิกชมรม#nพัฒนาเกมซะบ้าง...)"
1006615-38 = "ว้าววว! กิลด์เฮาส์สะอาดเอี่ยมแล้วค่ะ! แต่ว่า..."
1006615-43 = "อ๊ะ นี่มันไม่ใช่ตัวสเนล... แต่เป็นผ้าที่ต้องซักเหรอคะ? ค่ะ อาริสึเรียนรู้มาว่าการซักผ้า#nหลังทำความสะอาดก็เป็นเรื่องสำคัญค่ะ!"
1006615-44 = "อาริสึเรียนมาจากใครงั้นเหรอคะ? ก็ต้องเป็นรุ่นพี่เนรุสิคะ! รุ่นพี่เนรุยังดูน่ากลัวอยู่เหมือนเดิมเลย..."
1006615-45 = "แต่ถึงยังไง พอรู้จักรุ่นพี่มากขึ้น ก็ได้รู้ว่ารุ่นพี่เป็นคนที่ใจดีมากเลยค่ะ! ถ้างั้นคุณครูคะ เราเอาผ้าพวกนี้ไปซักให้สะอาดกันเถอะค่ะ เครื่องซักผ้าอยู่ตรงไหนเหรอคะ?"
1006615-46 = "คะ? ไม่มีของแบบนั้นหรอกงั้นเหรอคะ...?"
1006615-47 = "มะ... ไม่ได้นะคะ คุณครู! ที่ผ่านมาคุณครูใส่เสื้อผ้าโดยไม่ซักมาตลอดเลยเหรอคะ? แบบนั้นไม่ดีนะคะ "
1006615-48 = "ถ้าไม่ซ่อมแซมชุดเกราะที่ระดับความทนทานลดลงละก็ มันอาจจะพังจนต้องทิ้งไปเลยก็ได้นะคะ..."
1006615-49 = "[s] \"ไม่หรอกๆ ไม่เป็นไร ครูมีวิธีน่ะ...\""
1006615-50 = "วิธีอะไรเหรอคะ?"
1006615-53 = "อย่างนั้นเองเหรอคะ! คุณครูรับเควสซักผ้าแล้วก็เอาไปซักที่ร้านเครื่องซักผ้าหยอดเหรียญสินะคะ ถ้าเป็นอย่างนั้น อาริสึก็หายห่วงค่ะ!"
1006615-54 = "เอ๋ เป็นอะไรไปเหรอคะ คุณครู? คะ? หมายถึงที่คาดผมเมดของอาริสึเหรอคะ?"
1006615-55 = "เอ๋... สกปรกแล้วจริงๆ ด้วยค่ะ ฮือออ... สงสัยจะเลอะตอนที่ทำความสะอาดกิลด์เฮาส์ค่ะ "
1006615-56 = "[s] \"งั้นก็เอาไปซักด้วยกันเถอะ\""
1006615-57 = "..."
1006615-58 = "ค่ะ เข้าใจแล้วค่ะ คุณครู ถ้างั้นก็ขอรบกวนด้วยนะคะ"
1006615-59 = "อาริสึยังมีที่คาดผมเมดสำรองอยู่อีกค่ะ!"
1006615-65 = "[ns] \"เอ๋ พกที่คาดผมสำรองติดตัวด้วยเหรอ?\""
1006615-67 = "ค่ะ! นี่เป็นหนึ่งใน 3 สัญลักษณ์สำคัญของผู้กล้าเมดนี่คะ เพราะงั้นต้องพกที่คาดผมสำรองติดตัว#nไว้อยู่แล้วค่ะ!"
1006615-68 = "[s] \"3 สัญลักษณ์สำคัญของผู้กล้าเมดหมายถึงอะไรน่ะ...\""
1006615-69 = "เอ๋? คุณครูไม่รู้งั้นเหรอคะ? ช่วยไม่ได้นะคะ งั้นอาริสึจะบอกให้เองค่ะ"
1006615-70 = "อุปกรณ์สำคัญที่เป็นเครื่องยืนยันการเป็นผู้กล้าเมดคือ ไม้ถูพื้น ชุดเมด แล้วก็ที่คาดผมเมดค่ะ"
1006615-71 = "และในทั้ง 3 ชิ้น ที่คาดผมเมดก็เป็นสัญลักษณ์ที่สำคัญที่สุดค่ะ!"
1006615-72 = "ทำไมน่ะเหรอคะ? เรื่องนั้นมันก็แน่นอนอยู่แล้วค่ะ เพราะเป็นอุปกรณ์ที่ช่วยป้องกันศีรษะยังไงล่ะคะ!"
1006615-73 = "ศีรษะเป็นส่วนที่สำคัญมากนะคะ ทั้งในด้านของร่างกาย และด้านจิตใจค่ะ ถ้าได้รับบาดเจ็บที่ศีรษะละก็ อาจเกิดปัญหาใหญ่ได้ แล้วก็ถ้าเกิดคิดเรื่องอะไรน่าปวดหัวละก็ จะทำงานได้ไม่เต็มที่ด้วยค่ะ"
1006615-74 = "เพราะงั้นอาริสึน่ะ ทุกครั้งที่ใส่ที่คาดผมเมดก็จะนึกถึงความมุ่งมั่นในฐานะผู้กล้าเมดตลอดเลยค่ะ"
1006615-78 = "[ns] (ผู้กล้าเมดคืออะไรกันนะ...)"
1006615-79 = "ค่ะ... ใช่แล้วละค่ะ ความมุ่งมั่นเป็นสิ่งสำคัญนะคะ "
1006615-80 = "ถึงจะมองไม่เห็นด้วยตา หรือสัมผัสไม่ได้ด้วยมือ แต่ถ้าไม่มีมันแล้วละก็ อาริสึก็คงไม่รู้ว่าตัวเอง#nจะเป็นยังไงบ้างเลยค่ะ"
1006615-81 = "เพราะงั้นที่คาดผมเมดที่ช่วยให้นึกถึงความมุ่งมั่นนั้นได้ในทุกๆ ครั้งจึงเป็นอุปกรณ์สำคัญสำหรับ#nอาริสึมากค่ะ"
1006615-82 = "[s] \"แต่ว่าถ้าเทียบกับเมื่อก่อน ก็ดีขึ้นเยอะแล้วไม่ใช่เหรอ?\""
1006615-83 = "ดูเป็นอย่างนั้นเหรอคะ? ขอบคุณนะคะ คุณครู... อาริสึดีใจกับคำพูดของคุณครูมากเลยค่ะ"
1006615-84 = "แต่ถึงอย่างนั้น... เรื่องที่อาริสึรู้สึกว่าตัวเองยังต้องฝึกอีกมาก... ก็เป็นเรื่องจริงค่ะ"
1006615-89 = "กึงงงง..."
1006615-90 = "(ได้ยินเสียงเครื่องซักผ้าที่เปิดใช้งานจากด้านในร้าน)"
1006615-92 = "อาริสึยังบกพร่องเรื่องการทำหน้าที่ของเมดอยู่ค่ะ เรื่องการทำความสะอาดดีขึ้นบ้างแล้ว แต่เรื่องการซักผ้า หรือทำอาหารยังไม่ค่อยเก่งเท่าไรค่ะ"
1006615-93 = "อย่างตอนนี้เรื่องซักผ้าก็ยังแพ้เครื่องซักผ้าหยอดเหรียญอยู่ค่ะ ฮือออ!"
1006615-94 = "[s] \"ไม่เป็นไรนะ ไม่เป็นไร...\""
1006615-95 = "และในฐานะผู้กล้าก็ยังมีข้อบกพร่องอยู่อีกเยอะเลยค่ะ "
1006615-96 = "คุณครูคะ... ถ้าให้พูดถึงสิ่งที่คาดหวังละก็ อาริสึอยากให้ทุกๆ คนในโลกมีความสุขค่ะ ไม่อยากให้ใครต้องรู้สึกเศร้า หรือทุกข์ใจเลยค่ะ"
1006615-97 = "แน่นอนว่าเรื่องนั้น... อาริสึรู้ดีว่ามันเป็นเรื่องที่ยาก เป็นเควสที่ยิ่งใหญ่และยากจนทำสำเร็จได้ยากมากๆ ค่ะ"
1006615-98 = "ตอนนี้อาริสึยังอยู่ในระดับเด็กฝึกหัด คงจะทำเควสที่ย่ิงใหญ่แบบนั้นให้สำเร็จตอนนี้ไม่ได้... อย่างน้อย... อาริสึก็อยากดูแลและปกป้องคนที่อาริสึรู้จักทุกคนค่ะ"
1006615-99 = "ค่ะ อาริสึอยากทำแบบนั้นค่ะ และเพื่อการนั้นแล้ว..."
1006615-100 = "อาริสึคิดว่านอกจากพลังที่แข็งแกร่งแล้ว จะต้องมีความมุ่งมั่นที่เด็ดเดี่ยวด้วยค่ะ"
1006615-101 = "ค่ะ เพราะงั้นอาริสึจะต้องพยายามให้มากขึ้นกว่านี้ค่ะ"
1006615-102 = "แต่ว่าตอนนี้อาริสึก็ใส่ชุดเมดอยู่ด้วย เพราะงั้นอาริสึเองก็เป็นผู้กล้าเมดด้วยเหมือนกันค่ะ!"
1006615-106 = "[ns] (อยากถามจังว่าผู้กล้าเมดคืออะไรกันแน่...)"
1006615-107 = "คุณครูคะ อาริสึไม่คิดว่าโลกของเราไร้เวทมนตร์หรอกนะคะ เวทมนตร์มีจริงนะคะ"
1006615-109 = "และอาริสึคิดว่ามันเป็นสิ่งที่ทำให้ผู้คนมีความสุขค่ะ"
1006615-114 = "แล้วก็คิดว่าโลกนี้ยังต้องการความกล้าด้วยค่ะ"
1006615-119 = "สำหรับอาริสึแล้วความกล้าคือการมองโลกในมุมมองเดียวกันกับเหล่าผู้คนที่กำลังทุกข์ยากค่ะ"
1006615-124 = "เหตุผลที่เล่นเกมได้สนุกก็เพราะว่ามีความงดงามของโลกใบนี้อยู่ยังไงล่ะคะ"
1006615-125 = "เหตุผลที่ทะเลทรายงดงามก็เพราะอาจมีโอเอซิสซ่อนอยู่ที่ไหนสักแห่งในนั้นก็ได้ อ๊ะ... เรื่องนี้#nอาริสึอ่านมาจากหนังสือนิทานค่ะ!"
1006615-130 = "คุณครู อาริสึกำลังมุ่งไปข้างหน้าทีละก้าว เพื่อที่จะได้รู้จักโลกใบนี้ให้มากขึ้นค่ะ"
1006615-135 = "แน่นอนว่า... มันคงไม่ได้มีแต่เรื่องดีๆ และสิ่งสวยงามเท่านั้นค่ะ ตอนนี้อาริสึเข้าใจเรื่องนั้นดีแล้วค่ะ เพราะงั้น... ก็เลยมีบางครั้งที่รู้สึกกลัวอยู่บ้างค่ะ"
1006615-140 = "แต่ถึงอย่างนั้น อาริสึคิดว่าการไม่ยอมแพ้เรื่องพวกนั้น ก็อาจเป็นความกล้าในอีกรูปแบบหนึ่งก็ได้น่ะค่ะ"
1006615-142 = "[ns] \"แล้วตอนที่รู้สึกกลัว อาริสึจะทำยังไงเหรอ?\""
1006615-143 = "..."
1006615-144 = "เวลาที่กลัว อาริสึจะมาหาคุณครูค่ะ "
1006615-146 = "ก็คุณครูเป็นคนคนนั้นนี่คะ เป็นมาสคอตของปาร์ตี้นี่นา"
1006615-147 = "ถึงจะช่วยในตอนต่อสู้ไม่ได้เท่าไร แต่ถ้าอยู่ในปาร์ตี้ละก็ จะคอยให้พลังงานดีๆ กับสมาชิกทุกคนนี่คะ"
1006615-148 = "เพราะงั้นคุณครูคะ"
1006615-149 = "หลังจากนี้จะมาร่วมผจญภัยไปกับอาริสึได้มั้ยคะ?"
1006615-150 = "[s1] \"ได้สิ ครูเป็นมาสคอตนี่นา\"\n[s2] \"ครูจะทุ่มสุดตัวให้สมกับหน้าที่มาสคอตเลยละ\""
1006615-153 = "ว้าว! สมกับเป็นคุณครูจริงๆ ค่ะ! อาริสึชอบคุณครูที่เป็นแบบนี้ที่สุดเลยค่ะ!"
1006615-158 = "(ในตอนนั้นเสียงสัญญาณบอกการซักผ้าเสร็จก็ดังขึ้น)"
1006615-160 = "อ๊ะ ดูเหมือนผ้าที่ซักไว้จะซักเสร็จแล้วค่ะ! ที่คาดผมเมดก็ด้วย... สะอาดเหมือนใหม่เลยค่ะ!"
1006615-165 = "ถ้างั้นคุณครูคะ ออกไปผจญภัยด้วยกันกับผู้กล้าเมด อาริสึกันเถอะค่ะ!"
1006615-169 = "[ns] (ว่าแต่ผู้กล้าเมดเนี่ยคืออะไรนะ...)"
1006615-173 = "[ns] (ไม่สิ แบบนี้ก็อาจจะดีแล้วก็ได้...)"
1006615-175 = "(แล้วคุณครูกับก็อาริสึเดินจับมือและชมทิวทัศน์ระหว่างทางกลับด้วยกันอย่างเพลิดเพลิน)"
