[translation]
201060-1 = "第6話;超人の帰還"
201060-2 = "（自らを連邦生徒会長だと言う生徒に、今までの出来事について説明した）"
201060-5 = "連邦生徒会・会議室"
201060-6 = "……なるほど。"
201060-7 = "私が席を外していた間にそれほど多くのことが……面目次第もありません。"
201060-11 = "ですが先生のお話の中で、いくつかは私の記憶と食い違っている点があります。"
201060-12 = "まず、私が先生にお渡ししたという「シッテムの箱」。"
201060-13 = "私には、ただのタブレットにしか見えません。"
201060-14 = "そもそも、タブレット端末にサンクトゥムタワーのコントロール権限を与えるというのは、あまりにも危険な発想です。#nキヴォトスの全インフラを制御できてしまうのですから。"
201060-15 = "その「シッテムの箱」が悪意ある者たちに奪われてしまえば、#n取り返しのつかない事態が発生してしまうでしょう。"
201060-16 = "そうは思いませんか？"
201060-23 = "[ns] \"それはそうだけど……。\""
201060-24 = "同じく、リンが話していたもう1つのオーパーツ「シャーケードの杖」もまた、#n普通のスマートウォッチにしか見えません。"
201060-25 = "それに、キヴォトス全土の問題を、原理も分からないオーパーツに頼って解決するというのは……。"
201060-26 = "流石に理解ができません。私が立てた計画、ということですが。"
201060-27 = "戻ってきた今、計画の「調整」が必要ではないかと。"
201060-28 = "[s] （まさか、シャーレを閉鎖する、とか……？）"
201060-33 = "私は「連邦生徒会長」が残した文書に従って業務を全うしただけです。"
201060-39 = "シャーレの存在。先生の赴任。#nそれらに関する文書も記憶がない……とは言いませんよね。"
201060-40 = "……。"
201060-44 = "内容はともかく、このサインは確かに私の筆跡です。"
201060-45 = "シャーレの実績については、すでに書面で共有されています。"
201060-46 = "権限を濫用することなく、生徒の自治と安全に尽力してくださったシャーレの存在を否定するつもりはありません。"
201060-47 = "むしろ、連邦生徒会を代表して感謝を申し上げたいくらいです。"
201060-48 = "[s1] \"よかった……。\"\n[s2] \"いきなりクビになるかと思ったよ……。\""
201060-51 = "まさか。キヴォトスを救った恩人を、記憶にないという理由だけで切り捨てるほど、#n融通が利かないわけではありませんよ。"
201060-55 = "ただ……。"
201060-56 = "互いの認識をすり合わせるべく、もっと話し合う必要はあるかと。"
201060-62 = "あなたが[ruby=・]本[/ruby][ruby=・]当[/ruby]の連邦生徒会長だというのなら……。"
201060-63 = "どうして急に消えてしまったのですか？"
201060-64 = "今までどこで何をしていたのですか？"
201060-65 = "残念ですが、その質問にはお答えできません。"
201060-66 = "記録上の私が……つまり連邦生徒会長が失踪する直前、#n最後に行っていた業務については鮮明に覚えています。"
201060-67 = "あの日もいつものように公文書を読み、サインをして、退勤しました。"
201060-68 = "それ以降のことは……頭の中に靄がかかったように何も思い出すことができません。"
201060-69 = "知らぬ間に深い眠りについたのではないかとも思っていました。#nしかし気がついたときには、すでに長い時間が過ぎたあとで……#nキヴォトスの状況は大きく変わっていました。"
201060-70 = "そして、私を覚えていないあなたと出会ったのです。"
201060-71 = "そのようなことを言われても、納得できるわけが……。"
201060-72 = "ええ。当然できないでしょう。"
201060-73 = "……私ですら自分の状況を理解できていないのですから。"
201060-74 = "ですがこの不可解こそ、この世界の核心。"
201060-75 = "キヴォトスで起こる数多くのトラブルに比べれば、記憶の喪失は些末なものにすぎません。"
201060-76 = "それに、理解できないからといって立ち止まっているわけにはいかないのです。"
201060-77 = "私には、連邦生徒会長としての責務を果たす義務があるのですから。"
201060-78 = "…………。"
201060-79 = "リン。これからも時間が取れる限り話をしましょう。"
201060-80 = "あなたが納得できる連邦生徒会長を見つけるまで、全力で協力します。"
201060-81 = "たとえ偽物として記憶されようとも……私は自分の責任から逃げません。"
201060-87 = "どうしてあなたは……あの人と同じ言葉を……。"
201060-88 = "では私は仕事がありますので、お先に失礼します。"
201060-89 = "シャーレの先生も何かありましたら、いつでも連邦生徒会に足を運んでください。"
201060-98 = "連邦生徒会・調停室、第2リモート会議室"
201060-102 = "……ご無沙汰しております。#n突然のご連絡となり恐縮ですが、併せてお願いがございまして。"
201060-103 = "先月に発議された「トリニティ産茶葉の流通規制の条例」の撤回を検討していただけないでしょうか。"
201060-107 = "連邦生徒会長からのご連絡。#n何事かと思いましたが、例の件ですね。"
201060-108 = "私どもの返答は、先月、調停室長にお伝えした通りです。#n条例の撤回は致しかねます。"
201060-110 = "え、えっと……その……。"
201060-111 = "本件の条例は流通網を簡略化し、本校の生徒に対して安定的に嗜好品を供給するための措置です。"
201060-112 = "また、トリニティが誇る茶葉の価値を保つ目的もございます。#n連邦生徒会の皆様には、是非ともご理解を賜りたく思っております。"
201060-113 = "それと、これは私の記憶違いかもしれないのですが……#n各自治区で発案された条例に、連邦生徒会は不介入の立場を取っていたのでは？"
201060-114 = "今になって政策が変わったのでしょうか？"
201060-115 = "いえ、そのようなことはございません。#n各自治区は条例を発案する権限を持ち、連邦生徒会はそれを尊重しております。"
201060-116 = "ですので、[ruby=・]お[/ruby][ruby=・]願[/ruby][ruby=・]い[/ruby]なのですよ。#nトリニティ産の茶葉はキヴォトスの茶葉市場で多くのシェアを占めています。#nそれが突如として流通を制限されたことで、高騰しているのです。"
201060-117 = "レッドウィンター連邦学園のように、茶葉の調達を外部に依存してきた学園が、#nお茶を楽しむことができず大変困っているとのことでして。"
201060-118 = "他学園の事情まで気にかける義務はないと思いますが。"
201060-119 = "ええ、それはごもっとも。#n……そういえばこの前送ってくださった紅茶、私も堪能させていただきました。"
201060-120 = "以前のものより爽やかで柔らかい風味が加えられていたようですが……#n新しくブレンドされたのでしょうか？"
201060-124 = "……鋭いですね。レディグレイに使われるシトラスオイルを少し加えてみました。"
201060-125 = "お口に合ったようで何よりですが、どうして急にその話を……？"
201060-126 = "いえ。お茶のお供にスイーツを添えると、より良い味わいになるかと思いまして。"
201060-127 = "たとえば、レッドウィンター産のコケモモをふんだんに使ったチョコレートパイとか？"
201060-128 = "……。"
201060-129 = "日ごろ良質の果物を楽しむレッドウィンターの生徒たちが、#n相性抜群のトリニティの紅茶を味わうことになれば……#n御校へのイメージアップも狙えるかと思いますが……。"
201060-130 = "いかがでしょう？"
201060-131 = "良き紅茶には、それ相応のスイーツを揃えてこそ品格と言えるでしょう。"
201060-132 = "……分かりました。#n例の流通規制条例は撤回するよう前向きに検討いたします。"
201060-133 = "ご理解いただきありがとうございます。"
201060-134 = "いえ。こちらこそ久々にお茶の味を知る方とお話ができて、とても有意義な時間になりました。"
201060-135 = "今度いらした際は、新しくブレンドした紅茶でおもてなしさせていただきますね。"
201060-136 = "ええ、楽しみにしております。"
201060-139 = "最近、D.U.での不良生徒による騒動が日ごとに過激化しておりまして。"
201060-140 = "防衛室の調査によると、ここ数か月で発生したトラブルの50％はゲヘナ出身の生徒によるものだという報告があります。"
201060-141 = "これに関して、防衛次長から捜査協力を書面でお送りしておりますが、#n未だ返答が届いておりません。"
201060-142 = "[ruby=パンデモニウム・ソサエティー]万魔殿の議長、[/ruby]マコト様はこの問題について何かご存知でしょうか……？"
201060-147 = "キキッ……愚問だな。"
201060-148 = "それはもちろん――"
201060-149 = "知らない！"
201060-150 = "…………。"
201060-151 = "では今からでも構いません。#n万魔殿から応援の派遣および物資の支援を行い、不良生徒の取り締まりにご協力いただけますでしょうか？"
201060-152 = "なぜそれを私に言う？"
201060-153 = "不良生徒の取り締まりは風紀委員会の役割だ。#nゲヘナの自治区内だろうが外だろうが、我々万魔殿の仕事ではない！"
201060-154 = "言い換えれば、ゲヘナの不良生徒が消えないのはすべて……#nヒナ風紀委員長のせいなのだ！"
201060-155 = "お、お待ちください！#nゲヘナの行政協力に関する案件を、生徒会ではなく風紀委員会に任せることは――"
201060-157 = "……なるほど、理解しました。"
201060-164 = "すべてはヒナ委員長が無能なせい、ですね？"
201060-165 = "か、会長！？"
201060-166 = "う、うん……？ま、まあ、そういうことだな。"
201060-167 = "そのような無能な委員長を抱えながらも学園のために尽力なさっているマコト議長にご心配をおかけするだなんて……不甲斐ないばかりです。"
201060-168 = "謝罪は不要だ。マコト様は、罪を認め反省する者には寛大だからな！"
201060-169 = "なにより、連邦生徒会長は誰かと違って話が分かるようだ。"
201060-170 = "何か、我々への要求があれば聞こうではないか。"
201060-171 = "いえ、マコト議長は風紀委員長の世話で十分にお忙しいでしょうから。"
201060-172 = "はっはっ！気に入った！"
201060-173 = "今後は面倒ごとがあれば直接、風紀委員会に回すようにしろ。#nゲヘナのすべての責任は風紀委員会にあるからな！"
201060-174 = "肝に銘じます。"
201060-175 = "では、失礼いたします。"
201060-181 = "防衛次長。今すぐゲヘナ風紀委員会に連絡し、協力の要請を行ってください。#n防衛室で確保した容疑者のデータ共有も忘れずに。"
201060-182 = "それと、風紀委員会から物資の補給要請があれば、惜しみなく支援してください。#n費用は調停室のゲヘナ担当部署から請求をお願いします。"
201060-183 = "は、はい……！"
201060-184 = "……あ、最後に[ruby=そらさき]空崎[/ruby]委員長には別途、疲労回復薬と胃薬を1箱ずつ送ってください。きっと役に立つでしょう。"
201060-189 = "一体どういうことだ！"
201060-190 = "[ruby=もりこおり]森氷[/ruby]のシーズン限定チョコレートプリンがレッドウィンター自治区では販売されないなんて！"
201060-191 = "いや、だから企業の販売戦略をうちに聞かれも答えられないって……。"
201060-192 = "ていうかなんで交通室なの？#n面倒くさ……。"
201060-193 = "うむ？連邦生徒会のスイーツ関連業務はお前が担当しているのだろう？"
201060-194 = "こないだギャルビーの限定ポップアップストアが開かれたときだって、#n平日にも関わらず列に並んでいたではないか。#nてっきりお前の仕事だと思っていたのだが……。"
201060-198 = "そ、それは……人違いじゃない、かな？"
201060-199 = "とにかく！こういうのは対応できないから、他をあたって！"
201060-200 = "ぬぬぬ……その程度でおいらを騙せるとでも思っているのか！"
201060-201 = "他では販売する限定プリンを、レッドウィンターにだけは販売しない。#nこれは明白な差別であり、おいらの権威に対する挑戦でもある！"
201060-202 = "解決するまでの間、レッドウィンター事務局はあらゆる手段を以てしてでも、#n連邦生徒会への厳重抗議を続ける！"
201060-203 = "（困った……）"
201060-208 = "失礼、少しよろしいでしょうか。"
201060-209 = "お前は……？"
201060-210 = "ご無沙汰しております。レッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、清掃部部長兼、風紀委員長兼、給食部部長兼、レッドウィンター随一の美食家の称号を獲得されたチェリノ様。私は連邦生徒会長です。"
201060-211 = "本日もチェリノ様のお髭は相変わらず素敵ですね。#n秘訣をお尋ねしたいと思うくらいです。"
201060-215 = "えっへん。この髭の素晴らしさが理解できるとは、連邦生徒会長は見る目があるな。"
201060-216 = "だが秘訣は教えない。なぜなら、おいらは髭の手入れなど特にしていないからな！"
201060-217 = "手入れもせずそのようなお髭をお持ちだとは。羨ましい限りです。#nレッドウィンターの生徒がチェリノ会長の髭を羨む理由も分かる気がします。"
201060-218 = "ところで、森氷より発売される限定チョコレートプリンについてですが、#nべたつきがひどく、食べたあとは口元が汚れるという評判があるようです。"
201060-219 = "プリンのせいでチェリノ会長の髭が汚れてしまっていては、多くの生徒が失望するのではないでしょうか？"
201060-221 = "そ、それは……そうだな……。"
201060-222 = "だが待ちに待ったプリンを諦めるわけには……！"
201060-223 = "ちょうど私たちの手元に「ルワゾー・ブッレ」の限定キャラメルプリンがありまして。"
201060-224 = "つまらないものですがこのプリンを差し上げますので、今回はどうか矛を収めていただけないでしょうか？"
201060-228 = "ルワゾー・ブッレの、限定キャラメルプリン……！"
201060-229 = "ふ、ふむ……連邦生徒会長がそこまで言うならば仕方ない。#n今回はそれで我慢してやろう。"
201060-230 = "だが、次はないからな……！"
201060-231 = "ご了承くださりありがとうございます、チェリノ様。"
201060-239 = "モモカ……。"
201060-243 = "ち、違うよ！限定スイーツのポップアップストアなんて行ってないから！"
201060-244 = "好物だとしても、業務時間中に席を外してはいけません。#n私たちは生徒の模範となるべき連邦生徒会の役員なのですよ。"
201060-248 = "……代わりに、来週のキヴォトス製菓メーカー代表とのミーティングで、試食用のサンプルをもらえないか聞いてみます。"
201060-252 = "ほんと！？"
201060-256 = "すごい……連邦生徒会長が戻ってきた途端に今までの問題が一気に解決していく……。"
201060-257 = "プライドの高い各学園の代表も掌の上で転がしちゃうんだもんね……#nすごいカリスマ性だよ。"
201060-258 = "連邦生徒会長が戻ってきてくれて本当に良かった。"
201060-259 = "ね。やっぱ連邦生徒会長の代わりなんていないね。"
201060-263 = "……。"
201060-264 = "……このままではいけません。"
201060-269 = "次回;ペアリング"
