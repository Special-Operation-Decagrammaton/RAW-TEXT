[translation]
10044020-1 = "Episode 2;In Search of a Missing Train"
10044020-2 = "You're saying the automatic departure system sent the train off on its own?"
10044020-3 = "Y-Yes... Every train has an override switch in the driver's compartment, but..."
10044020-4 = "...I suppose everyone was here in the station office when it happened..."
10044020-9 = "What? Why are you looking at me like that?"
10044020-10 = "If only someone had been in that compartment, doing their job..."
10044020-11 = "Shut up! Anyway, it went off to a different station, so we just need to track it down."
10044020-13 = "Super annoying."
10044020-14 = "L-Let's see what lines we can take to go after it..."
10044020-15 = "I think the subway would be fastest right now, probably."
10044020-16 = "*sigh* All right, let's go. We've got to take care of this fast if we want to make the delivery on time."
10044020-17 = "Boo. The subway sucks."
10044020-20 = "...And that's where we are with this."
10044020-21 = "[ns1] \"I see.\"\n[ns2] \"Thank you for calling me.\""
10044020-24 = "H-Hold on...! You called Schale's Sensei?!"
10044020-25 = "Wh-Why are you bringing them into this? What's going on??"
10044020-27 = "Nozomi no call. Hikari call."
10044020-28 = "S-So why?!"
10044020-29 = "Because...Sensei said to call if we ever need any help."
10044020-30 = "That's just what people say when they're being polite. It doesn't mean anything!!"
10044020-35 = "E-Eek... They want to talk to ME...? Ah...!"
10044020-36 = "H-Hi, I'm Utsumi Aoba. ...Second-year from the Freight Logistics Department."
10044020-37 = "[s] \"Hi, Aoba. Nice to meet you.\""
10044020-38 = "N-Nice to meet you...too?"
10044020-40 = "Eh? You're a second-year?"
10044020-41 = "Y-Yes... You officers are first-years, right?"
10044020-42 = "Eh, those are all just numbers."
10044020-43 = "I-I wasn't trying to pull rank on you..."
10044020-44 = "I didn't even expect any special treatment in the first place..."
10044020-49 = "Ah, found it! Let's go!"
10044020-50 = "Awright!"
10044020-55 = "Seriously, HOW did I end up tagging along with these people...?"
10044020-62 = "Ooh. Wobble-wobble."
10044020-63 = "It wouldn't BE this wobbly if it were a train. Though I guess that's just how subway cars are, since they're smaller..."
10044020-64 = "O-Officers...could you please tone it down a little...?"
10044020-65 = "Why?"
10044020-66 = "Well...belittling the subway, ON the subway, WHILE wearing our school uniform is not a good look for the school."
10044020-67 = "Belittling? I'm just saying how it is."
10044020-68 = "It's true, but that doesn't mean you should say it out loud."
10044020-69 = "Wait, are you just...not aware of that concept? Do you know what the word \"tact\" means?"
10044020-70 = "No idea. What's the point of holding back like that?"
10044020-71 = "...And they made you both officers."
10044020-72 = "Okay, you know what, though...the higher-ups did say to take this mission seriously."
10044020-73 = "Annnd there's not a good excuse for losing a train."
10044020-74 = "No get caught, no need excuse!"
10044020-75 = "Pahyahya, that's true! All right, let's get this taken care of."
10044020-81 = "Hey, look over there."
10044020-82 = "Hm? Oh. Highlanders."
10044020-83 = "Jacking up the subway prices, and then showing up to lord it over us. That's a power move."
10044020-84 = "I mean, not that it matters in our case, since we're free-riding."
10044020-85 = "I didn't know Highlander people ran subways."
10044020-86 = "Maybe? Trains, subways, they're not that different."
10044020-88 = "Well, while they're here, maybe we should teach them a lesson."
10044020-90 = "Handle...stretching. Infinity...spiral...spin."
10044020-91 = "Pahyahya, these handles are great, though! Maybe we should put 'em on the trains too!"
10044020-93 = "[ns3] \"Hikari, maybe give that a rest.\"\n[ns4] \"You too, Nozomi.\""
10044020-96 = "Whatever you say, Sensei."
10044020-97 = "Was I being too loud? Okay."
10044020-99 = "Huh. They listen to Sensei."
10044020-100 = "Sensei, listen, not all of our officers are like this. Please don't judge our entire academy on them."
10044020-101 = "[s]\" It's fine. I'm here to help and supervise all three of you.\""
10044020-102 = "And yet I'm the only one with any shame..."
10044020-104 = "Yo, Highlanders!"
10044020-110 = "How dare you raise the subway fare!"
10044020-111 = "How are students like us supposed to pay that, huh?"
10044020-112 = "We...don't run the subway, though."
10044020-114 = "Ah, is that so? I learned something new. Heehee!"
10044020-115 = "Oh no, you're not getting out of this."
10044020-116 = "Rails are rails. You make money off the rails, so you're responsible."
10044020-118 = "(What kind of logic is that...?)"
10044020-119 = "Yeah, you should pay us...what's it called again? Emotional distress compensation! Yeah, that!"
10044020-120 = "Emotional distress compensation?"
10044020-121 = "You heard me! You're as responsible as anybody else for this!"
10044020-122 = "You think you're better than us, don't you? You think we're just a bunch of delinquents who can't study?"
10044020-123 = "That hurts. Thaaat hurts. I'm gonna need something to make me feel a WHOLE lot better."
10044020-125 = "Nozomi, you have any money?"
10044020-126 = "Nope. Sensei paid for our tickets."
10044020-127 = "No money. We're super poor."
10044020-129 = "Oh, you seriously think we're gonna believe that? Huh?"
10044020-130 = "Fine, if you're broke, you can pay us in ammo!"
10044020-132 = "[ns] \"Everyone, let's take a breath...\""
10044020-134 = "Who's this? An adult?"
10044020-135 = "Ooh, adults have money. Why don't you reach into that big, thick wallet and make a donation to some poor students, huh?"
10044020-136 = "[s5] \"My wallet is probably thinner than you'd expect...\"\n[s6] \"First, let's all calm down.\""
10044020-139 = "You're asking us to calm down NOW?!"
10044020-140 = "Our grades are bad, studying's boring, and our wallets are empty..."
10044020-141 = "Picking a fight with random people on the subway is the only way we can express the accumulated frustrations of all our failed dreams and disappointments!"
10044020-142 = "Bad grades AND a bad attitude."
10044020-144 = "You little...! You really want a piece of me?"
10044020-145 = "I-I know how you feel..."
10044020-146 = "Wha?"
10044020-147 = "I-I got a 25 percent in Classics... I do know what it means to fail..."
10044020-149 = "Okay, so you're bad at studying too. So what?"
10044020-150 = "B-But...if you CHOSE not to study, because you didn't want to..."
10044020-151 = "Shouldn't you also accept the results of that...?"
10044020-152 = "I don't wanna!"
10044020-153 = "Can't we just chill and be happy? Why's the world have to be so, you know, cold all the time?"
10044020-157 = "Wh-Why do you think the world should be kind to you...?"
10044020-162 = "What do you mean \"why\"? It'd be nice, that's why!"
10044020-164 = "That's...naive of you to say. Th-The world is a cold, harsh place. There's no one out there waiting to take responsibility for you."
10044020-165 = "Honestly, it's kind of astonishing that you're still so innocent and wishful."
10044020-166 = "A-Are we not allowed to wish for things now? I want to be loved too, you know!"
10044020-167 = "F-Fufu... Such meaningless wants and expectations only set you up for more disappointment. You have so much to learn..."
10044020-168 = "If you have no expectations, you won't be hurt so easily. You'll never be disappointed again... Fufufu..."
10044020-169 = "That's why I never look forward to anything. Fufu."
10044020-174 = "Y-You..."
10044020-175 = "Oh, she is, like, tainted... Seriously..."
10044020-176 = "L-Let's go...as far away from them as possible."
10044020-181 = "Wow, you chased them away with your negative aura! Not bad!"
10044020-182 = "I-I wouldn't call it \"negative.\" Just \"neutral.\" Normal, even...right?"
10044020-183 = "No expecties, though? Expecties are fun!"
10044020-184 = "Hm? Fun is...not a necessity of mine."
10044020-189 = "Well, it should be! Everything needs to be fun! Don't you think?"
10044020-190 = "I think so, yeah!"
10044020-192 = "[ns7] \"There are many different ways to approach life.\"\n[ns8] \"I hope you find something to look forward to every day, Aoba.\""
10044020-195 = "I-I wonder... Heehee... Well, even if I never do, it doesn't really matter."
10044020-201 = "Ah, this is our stop."
10044020-202 = "The train's gotta be here, right? It HAS to be here. It's GOING to be here!"
10044020-203 = "Yeah, this is gonna be the train lost-and-found."
10044020-210 = "[ns] \"Let's go, Aoba.\""
10044020-211 = "R-Right."
