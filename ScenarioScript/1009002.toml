[translation]
1009002-1 = "งานเทศกาลน่ะยอดเยี่ยมที่สุดไปเลยค่ะ!"
1009002-3 = "อ๊ะ คุณครู!"
1009002-7 = "แหะๆๆ ยินดีต้อนรับสู่งานเทศกาลค่ะ!"
1009002-8 = "ดูวุ่นวายหน่อยๆ ใช่มั้ยคะ? ฉันจะรีบพาทัวร์นะคะ"
1009002-9 = "[ns] \"นี่สินะกลิ่นอายงานเทศกาลของเฮียกคิยาโค...\""
1009002-10 = "ไม่หรอกค่ะ งานแค่นี้ยังเรียกว่ายิ่งใหญ่ไม่ได้ด้วยซ้ำค่ะ!"
1009002-11 = "ถ้าเทียบกับงานเทศกาลจริงๆ จังๆ อย่าง <เทศกาลแห่งค่ำคืนสีขาว> หรือ <เทศกาลหมู่บ้านสตูดิโอ#nภาพยนตร์> และ <เทศกาลโคมไฟเฮียกคิยาโค> แล้วละก็..."
1009002-16 = "เทศกาลของวันนี้ดูเป็นเทศกาลเล็กๆ ไปเลยค่ะ อืม... จะว่าไปก็เป็นอย่างนั้นจริงๆ นะคะเนี่ย"
1009002-17 = "อ๊ะ! ฉันไม่น่าเอางานเทศกาลมาเปรียบเทียบกันเลย ฉันนี่ไม่ได้เรื่องตั้งแต่แรกเลยนะคะ!"
1009002-18 = "งานเทศกาลแต่ละงานย่อมมีคุณค่าตามแบบฉบับของตัวเอง และทุกงานก็จัดขึ้นเพื่อให้ทุกคนได้มา#nสนุกสนานกันอยู่แล้ว!"
1009002-22 = "สมกับเป็นคุณครูเลยค่ะ! เวลาฉันจะทำอะไรผิดพลาดขึ้นมา คุณครูก็คอยช่วยดึงสติให้ฉันทำในสิ่งที่#nถูกต้องทุกครั้งเลย!"
1009002-25 = "[ns] \"เดี๋ยวก่อน ครูยังไม่ได้ทำอะไรเลยนะ?!\""
1009002-27 = "เอาละๆ! เชิญเลยค่ะ! อย่างที่เห็นว่าเทศกาลนี้เป็นเทศกาลแห่เกี้ยวที่บรรทุกตุ๊กตาหลายๆ แบบอยู่ค่ะ!"
1009002-28 = "ว่ากันว่าในสมัยก่อนมีการทำตุ๊กตาเจ้าหญิงเป็นส่วนใหญ่ค่ะ..."
1009002-29 = "แต่ในปัจจุบันไม่มีการบังคับว่าต้องทำตุ๊กตาอะไรเป็นพิเศษ ก็เลยมีการทำตุ๊กตาที่สวยงาม และมีรูปแบบหลากหลายเพื่อเอาใส่บนเกี้ยวให้ได้มากที่สุด แล้วก็จะแห่เกี้ยวตุ๊กตานั้นไปให้ทั่วค่ะ!"
1009002-33 = "แต่ว่า... การทำตุ๊กตาและการกำหนดรูปแบบของตุ๊กตาก็ทำให้เกิดปัญหาซับซ้อนมากมายพร้อมๆ กัน"
1009002-34 = "ไม่ว่าจะเป็นเรื่องล็อบบี้ของกลุ่มการค้าหรือฝั่งเจ้าภาพ และเรื่องสัญญาเกี่ยวกับการจัดหาวัสดุที่ใช้ใน#nการทำเกี้ยวขึ้นมาค่ะ..."
1009002-35 = "[s] \"ดูเป็นเบื้องหลังของงานที่ไม่ควรรู้เลยนะ...\""
1009002-36 = "ยะ... ยังไงก็เถอะค่ะ! แต่ยังไงก็มีข้อบังคับอย่างหนึ่งที่ไม่เคยเปลี่ยนแปลงค่ะ! นั่นก็คือการประดิษฐ์#nโคมไฟขนาดใหญ่เป็นรูปเจ้าหญิงแล้วเอาวางไว้ตรงกลางเกี้ยวตามประเพณีค่ะ!"
1009002-40 = "และถ้าดูตรงนี้! ก็จะเห็นการเฉลิมฉลองเทศกาลด้วยแอปเปิลแคนดี้ที่เคลือบน้ำตาลเป็นรูปดอกบัว และน้ำแข็งไสราดน้ำเชื่อมสีชมพูที่ทำจากสตรอว์เบอร์รีและเชอร์รีด้วยค่ะ!"
1009002-44 = "ดูสิคะ! การแสดงที่จัดขึ้นด้านหลังของเกี้ยวเริ่มแล้วค่ะ! เป็นการเต้นระบำตามจังหวะของดนตรี และแห่เกี้ยวไปพร้อมๆ กันน่ะค่ะ!"
1009002-48 = "คุณครูมีตั๋วเข้างานมั้ยคะ? งั้นก็ดีเลยค่ะ! เราเอาคูปองกับตั๋วเข้างานนั้นไปแลกของที่ระลึกได้นะคะ! ไม่ว่าจะเป็นหน้ากาก พัด หรือของกินอร่อยๆ!"
1009002-62 = "เฮ้อ... พอเดินตามเกี้ยวมาสักพักก็เริ่มเหนื่อยนะคะ..."
1009002-63 = "[s] \"ครูรู้สึกได้ทุกครั้งเลยนะว่าอุมิกะชอบงานเทศกาลมากเลย\""
1009002-64 = "หมายถึง... ฉันเหรอคะ?"
1009002-65 = "แหะๆๆ... พอได้ยินคำแบบนี้จากคุณครูก็... เขินๆ นิดหน่อยนะคะ"
1009002-68 = "..."
1009002-69 = "ค่ะ ฉันชอบงานเทศกาลค่ะ"
1009002-70 = "ก็งานเทศกาลมัน... เป็นงานที่จัดขึ้นเพื่อทุกคนนี่คะ?"
1009002-71 = "มันเหมือนกับการได้ลืมชีวิตประจำวันไปชั่วขณะ และหนีออกมาจากความเป็นจริงเพื่อมาอยู่ในโลก#nแห่งความฝัน..."
1009002-72 = "ถ้าคิดว่าสิ่งที่ฉันทำคือการเตรียมโลกแห่งความฝันแบบนั้นละก็ ฉันจะตื่นเต้นจนรอไม่ไหวเลยละค่ะ!"
1009002-73 = "คะ? พอได้ฟังแล้วก็รู้สึกว่ามีส่วนคล้ายกับสวนสนุกงั้นเหรอคะ?"
1009002-74 = "นะ... แน่นอนว่าอาจจะมองอย่างนั้นก็ได้!"
1009002-75 = "แต่ว่า... งานเทศกาลน่ะเปลี่ยนหน้าตาเสมอค่ะ!"
1009002-76 = "[s] \"เปลี่ยนหน้าตาเหรอ...?\""
1009002-77 = "อ่า... แบบว่า..."
1009002-82 = "ไม่มีเทศกาลไหนที่เหมือนกันเป๊ะๆ เลยนี่คะ?"
1009002-83 = "ดูจากเทศกาลเกี้ยวตุ๊กตาก็ได้ค่ะ เทศกาลของปีนี้ก็ไม่เหมือนปีที่แล้วเพราะว่าตุ๊กตาที่อยู่บนเกี้ยวก็ไม่#nเหมือนกันค่ะ!"
1009002-84 = "เพราะว่าทางกลุ่มการค้าไม่อนุญาตให้จัดทำตุ๊กตาที่เหมือนกับปีก่อนค่ะ..."
1009002-85 = "แล้วก็ตอนเตรียมงานเทศกาลด้วยค่ะ! เรื่องนี้อาจจะเป็นกับฉันคนเดียวก็ได้ แต่ฉันมักจะเตรียม และคาดหวังสำหรับงานเทศกาลครั้งต่อไปด้วยทัศนคติใหม่ๆ เสมอค่ะ!"
1009002-86 = "แม้ว่าสวนสนุกกับงานเทศกาลจะมีจุดที่เหมือนกันคือการทำให้ผู้คนได้สัมผัสโลกแห่งความฝัน แต่ระหว่างสวนสนุกกับงานเทศกาลแล้วนั้น..."
1009002-87 = "[s1] \"ใจเย็นๆ ก่อนนะ อุมิกะ\"\n[s2] \"ครูเข้าใจความกระตือรือร้นของอุมิกะแล้วละ\""
1009002-90 = "อ่า...! ขะ... ขอโทษค่ะ จู่ๆ ฉันก็ตื่นเต้นอยู่คนเดียวแล้วเอาแต่พูดพร่ำอะไรไปจนได้..."
1009002-91 = "คะ? ชอบภาพลักษณ์ใหม่ๆ แบบนั้นของฉันเหมือนกันเหรอคะ? อ่า... รู้สึกอายจังเลยค่ะ..."
1009002-92 = "ถ้าอย่างนั้น! คุณครูจะอยู่ทีมสวนสนุกหรือทีมงานเทศกาลเหรอคะ?!"
1009002-93 = "[s] \"ครูอยากสนุกกับทั้ง 2 ทีมเลย...\""
1009002-94 = "คะ? 'อยาก' สนุกงั้นเหรอคะ? ไม่ใช่ว่าสนุกอยู่แล้วเหรอ? แบบนี้หมายความว่าอะไรคะ...?"
1009002-95 = "อ่า... งานของชาเล่ต์ทำให้ครูหาเวลาไปเที่ยวทั้งสวนสนุกและงานเทศกาลไม่ได้งั้นเหรอคะ...?"
1009002-96 = "ขะ... ขอโทษค่ะ คุณครู ฉันไม่น่าถามอะไรแบบนั้นไปเลยค่ะ..."
1009002-97 = "[s] \"ไม่เป็นไรหรอก ไม่เป็นไร\""
1009002-98 = "อืม... ถ้าไม่มีเวลามาเที่ยวงานเทศกาลเพราะงานรัดตัวละก็ ถ้างั้น..."
1009002-102 = "!!"
1009002-103 = "[ns] \"มีอะไรงั้นเหรอ อุมิกะ?\""
1009002-104 = "ไม่ค่ะ... ไม่มีค่ะ! แต่ว่า..."
1009002-105 = "แหะๆๆ หรือต้องบอกว่าฉันมีความคิดดีๆ ดีคะ?"
1009002-106 = "คะ? ฉันคิดอะไรได้น่ะเหรอคะ? เรื่องนั้น... ขอเก็บเป็นความลับไว้ก่อนค่ะ!"
1009002-107 = "เรื่องที่สำคัญกว่าก็คือตอนนี้คุณครูกำลังมาเที่ยวงานเทศกาลอยู่ค่ะ! งั้นฉันจะแนะนำนู่นนี่ให้อีกนะคะ!"
1009002-108 = "ไม่ต้องห่วงนะคะ! เห็นอย่างนี้ ฉันก็เป็นคนที่... ใฝ่ฝันจะเป็นสุดยอดผู้เชี่ยวชาญด้านงานเทศกาลของ#nเฮียกคิยาโคค่ะ!"
1009002-112 = "(จากนั้นคุณครูกับอุมิกะก็เดินชมจุดต่างๆ ของงานเทศกาลด้วยกัน)"
