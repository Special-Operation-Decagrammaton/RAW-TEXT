[translation]
1006603-1 = "เปิดบทเรียนเมด"
1006603-2 = "(คุณครูได้รับข้อความจากอาริสึและมุ่งหน้าไปยังชมรมพัฒนาเกม...)"
1006603-8 = "ห้องชมรมพัฒนาเกม"
1006603-9 = "คุณครู! กำลังรออยู่เลยค่ะ"
1006603-10 = "มาเร็วกว่าที่คิดอีกนะคะ สงสัยจะรีบบึ่งมาน่าดู มีเรื่องอะไรหรือเปล่าคะ?"
1006603-11 = "[s1] \"คือว่า เรื่องข้อมูลของเมดน่ะ...\"\n[s2] \"ครูว่าอาริสึไม่ควรเรียนรู้เรื่องนี้คนเดียว\""
1006603-14 = "งั้นเหรอคะ? แต่อาริสึก็เห็นด้วยค่ะ"
1006603-15 = "อาริสึเคยได้ยินมาว่ายิ่งเรียนด้วยกัน ก็จะยิ่งได้ผลที่ดีขึ้นน่ะค่ะ!"
1006603-19 = "และข้อมูลที่อาริสึหามาได้...!"
1006603-28 = "ปาปัม ปาปัม! นี่ค่ะ!"
1006603-29 = "[s] \"นี่มัน... อย่าบอกนะว่า?!\""
1006603-30 = "ใช่แล้วค่ะ! นี่คือวิดีโอที่มีคุณเมดออกมาหลายคนเลยค่ะ!"
1006603-31 = "ถ้าศึกษาจากวิดีโอนี้ละก็... อาริสึมั่นใจว่า EXP เมดของตัวเองจะต้องเพิ่มขึ้นอย่างแน่นอนค่ะ!"
1006603-32 = "เรียกง่ายๆ ว่ามันเป็นวิดีโอเพิ่ม EXP ค่ะ!"
1006603-33 = "มีทั้ง <เมดเลดี้หน้ากาก> <มาโบโรแมนติก> แล้วก็ <แก๊งเมดทาชิบานะ>..."
1006603-34 = "อาริสึเลือกมาแต่เรื่องแนะนำที่ได้รับคำชมอย่างท่วมท้นค่ะ!"
1006603-35 = "[s] \"ก่อนอื่น ครูอยากรู้ว่าใครกันเหรอที่แนะนำมาให้?!\""
1006603-36 = "คะ? ก็อากู๋ไงคะ"
1006603-37 = "อยากรู้อะไรก็แค่ถามอากู๋ในอินเทอร์เน็ตค่ะ สะดวกมากๆ เลยละค่ะ!"
1006603-38 = "[s] \"แบบนี้ยิ่งอันตรายเข้าไปใหญ่เลย!?\" "
1006603-39 = "อันตราย... เหรอคะ? อาริสึไม่เข้าใจเลยค่ะ"
1006603-40 = "ได้ยินมาว่าบางคนถึงกับเขียนรีวิวว่าเป็นวิดีโอที่น่าประทับใจ และชีวิตเปลี่ยนเพราะได้ดูเรื่องนี้เลยนะคะ"
1006603-41 = "[s] \"มันก็ต้องมีคนแบบนั้นบ้าง! และถึงจะมีบางมุมที่เข้าใจได้บ้างก็เถอะ!\""
1006603-42 = "แต่มันเป็นผลงานที่ทำให้คนดูประทับใจจนชีวิตเปลี่ยนเลยนะคะ อาริสึอยากดูแล้วค่ะ! อาริสึก็มีประสบการณ์คล้ายๆ กันเพียบเลยค่ะ! "
1006603-43 = "และต่อให้บอกว่าอันตราย แต่อาริสึก็ไม่หวั่นหรอกค่ะ! ถึงอาริสึจะเป็นเด็กฝึกหัด แต่ก็เป็นผู้กล้านะคะ! ตอนนี้อาริสึกำลังขึ้นมาเป็นเมดแล้วด้วย! อาริสึสามารถปกป้องตัวเองได้ค่ะ!"
1006603-44 = "คะ? ไม่ได้หมายถึงความอันตรายแบบนั้นหรอกเหรอคะ? อืม... ไม่เข้าใจเลยค่ะ ถ้าอันตราย คุณครูก็เข้ามาช่วยก็ได้นี่คะ?"
1006603-45 = "เหมือนที่คุณครูชอบพูดอยู่บ่อยๆ ไงคะ! ว่าหน้าที่ของคนเป็นครูคือการช่วยเหลือนักเรียน!"
1006603-46 = "[s3] \"ถ้าเอาคำนั้นมาพูด ครูก็ไปต่อไม่ถูกน่ะสิ!\"\n[s4] \"...ก็ได้ ให้มีผู้ปกครองอยู่ด้วยก็น่าจะดีกว่านะ...\""
1006603-49 = "แปลว่าคุณครูจะอยู่ด้วยกันเหรอคะ? ใช่มั้ยคะ?"
1006603-50 = "ว้าว! สำเร็จแล้ว! แบบนี้อาริสึก็พัฒนาได้อีกขั้นแล้วค่ะ!"
1006603-51 = "คุณครูได้มาเป็นสหายของอาริสึแล้วค่ะ! ปาปัม ปาปัม!"
1006603-53 = "(จากนั้นคุณครูกับอาริสึก็เริ่มดูวิดีโอที่ค่อนข้าง... 'พิเศษ'... ด้วยกัน...)"
1006603-55 = "..."
1006603-56 = "[s] \"...\""
1006603-57 = "..."
1006603-58 = "[s] \"นี่ อาริสึ...?\""
1006603-59 = "..."
1006603-60 = "[ns] \"อาริสึ? อาริสึ?!\""
1006603-61 = "เปิดโลกอาริสึสุดๆ เลยค่ะ อาริสึรู้แล้วค่ะ!"
1006603-62 = "[s] \"หา?!!\""
1006603-63 = "คนเป็นเมดเขาทำแบบนี้กันนี่เอง! มันลึกซึ้ง กินใจมากเลยค่ะ!"
1006603-64 = "ที่ผ่านมาอาริสึไม่รู้อะไรเลยสินะคะ! เห็นทีต้องเริ่มจากการเปลี่ยนคำเรียกคุณครูก่อนแล้วค่ะ"
1006603-65 = "นายท่าน!"
1006603-66 = "[s] \"อาริสึ...? เรียกแบบนี้มันค่อนข้างจะ...?\""
1006603-67 = "และสิ่งที่ก่อนหน้านี้อาริสึคิดว่าเป็นความผิดพลาด ที่จริงแล้วมันคือทักษะพื้นฐานของเมดสินะคะ!"
1006603-68 = "ทั้งเรื่องที่เสิร์ฟเมนูผิด เรื่องที่เสียสมดุลการทรงตัวจนล้มมาชนนายท่าน แล้วก็เรื่องที่ซุ่มซ่ามเอาซอส#nผิดๆ มาใส่ในอาหารให้อีก!"
1006603-69 = "ที่จริงแล้วทั้งหมดนั่นคือการบริการแบบน่ารักที่ช่วยฮีลจิตใจสินะคะ!"
1006603-70 = "[s] \"ไม่ใช่แบบนั้นหรอก! ก็บอกแล้วว่ามันอันตราย!\" "
1006603-72 = "(จากนั้นอาริสึก็พูดเกี่ยวกับทักษะในการเป็น 'เมด' ให้คุณครูฟังต่ออย่างไม่รู้จบ...)"
1006603-73 = "(กว่าจะคลายความเข้าใจผิดของอาริสึได้ ก็ต้องใช้เวลานานเลยทีเดียว...)"
1006603-75 = "วันนี้สนุกมากเลยค่ะคุณครู"
1006603-76 = "เป็นวันที่อาริสึได้ทำความรู้จักกับเมดมากขึ้นค่ะ!"
1006603-77 = "[s] \"อืม... ถ้าอาริสึบอกว่าดี ครูก็ว่าดี...\""
1006603-78 = "แต่ทำไมคุณครูถึงดูเพลียๆ แบบนั้นล่ะคะ? วันนี้ต้องใช้พลังงานเยอะเหรอคะ..."
1006603-79 = "การเรียนรู้สิ่งใหม่ๆ ออกจะเป็นเรื่องสนุก คุณครูไม่สนุกเหรอคะ...?"
1006603-80 = "หรือว่า เป็นเพราะอาริสึคะ...?"
1006603-81 = "[s5] \"ไม่หรอก ครูก็สนุกเหมือนกัน\"\n[s6] \"ถ้ามีเรื่องอะไรแบบนี้อีก ต้องเรียกให้ครูมาหานะ ห้ามอยู่คนเดียวล่ะ\""
1006603-84 = "เอางั้นเหรอคะ? งั้นก็ดีเลยค่ะ"
1006603-85 = "อาริสึชอบเวลาที่มีคุณครูอยู่ด้วยที่สุดเลยค่ะ"
1006603-86 = "ต่อไปก็รบกวนด้วยนะคะ"
1006603-87 = "นายท่าน!"
