[translation]
901010400110-7 = "こちらFOX1。#nFOX2、目標エリアに進入できたか？"
901010400110-8 = "FOX2、ただいまポイントアルファに進入。#n現在トラブルはなし。引き続き作戦を進めるね。"
901010400110-14 = "こちらFOX3。FOX4と一緒にポイントシエラに到着。#n作戦エリアの視界は良好。こっちも問題ないわ。"
901010400110-15 = "さっきFOX2が検問で捕まりかけた時は、ハラハラしたけどね……。"
901010400110-16 = "FOX2すごかったね。本当のお弁当配達員って言っても信じちゃうくらい。"
901010400110-18 = "ふふっ、「FOX EATS」配達員の気持ちで作戦に臨んでいるからね。"
901010400110-19 = "……それでFOX1。#n最初のターゲットは誰？"
901010400110-20 = "作戦エリア――鐘崎港で最近失踪したのは、カニ漁船で働いていた「ミヤグチ」という青年だ。"
901010400110-21 = "新人だったようだが、金遣いも口も悪く、周囲とよく揉めていたらしい。#n噂では借金もしていたらしい。"
901010400110-22 = "借金に揉め事……心当たりがありすぎるねぇ。"
901010400110-23 = "消費者金融に手を出すと、一気に普通の生活に戻れなくなっちゃうからね……。#nみんなも気をつけるんだよ。"
901010400110-24 = "FOX4、聞いた？"
901010400110-25 = "うん……？急に私？"
901010400110-26 = "あんた、弾薬を受け取る時、たまにツケ払いにしてるでしょ。#nこの前だって高いハンドガードを注文したのに支払い忘れて――"
901010400110-30 = "ちょ、ちょっと、いつの話！？"
901010400110-31 = "ふ～ん、今度詳しく教えてね、FOX3。"
901010400110-32 = "今はそんな話してる場合じゃないよね？#nさ、作戦に集中しないと。"
901010400110-34 = "その通りだ、FOX2。説明を続けるぞ。"
901010400110-36 = "……そうだね。後でお話しよっか。"
901010400110-37 = "うう……。"
901010400110-39 = "同僚の漁師によると……ミヤグチは1週間前、停泊中の漁船から降りた後、いなくなったとのことだ。"
901010400110-40 = "荷物はそのまま船に残っていて、文字通り本人だけ行方をくらましたとのことだ。"
901010400110-41 = "下船しているところを見たのも同僚の漁師だけ？"
901010400110-42 = "ああ。だから、漁師も今回の失踪事件の容疑者として見ている。"
901010400110-43 = "なるべく慎重に近づくように。#n疑われるなよ。"
901010400110-44 = "大丈夫、任せて。"
901010400110-45 = "それで……漁師はどこにいるのかな？"
901010400110-47 = "3番埠頭にカニ漁船が泊まってるわ。"
901010400110-48 = "この時間帯なら、その辺で漁具を整理しているんじゃない？"
901010400110-49 = "うん、行ってくるね。"
