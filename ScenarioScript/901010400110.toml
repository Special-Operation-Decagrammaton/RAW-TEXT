901010400110-13 = "5;통신쿠루미;01\n1;통신오토기;01\n#1;a\n#5;a\n#1;h\n#5;h\n#wait;1200"
901010400110-14 = "5;통신쿠루미;02;여기는 FOX 3. FOX 4와 함께 포인트 시에라에 도착. 작전 구역 시야 양호. 이쪽도 문제 없어."
901010400110-15 = "5;통신쿠루미;99;방금 FOX 2가 검문에 붙잡혔을 때는 벌써 실패했나 싶어 조마조마했지만……"
901010400110-16 = "1;통신오토기;03;경비의 질문을 받아치는 솜씨가 제법이던 걸, FOX 2. 진짜 도시락 배달부라고 해도 믿겠어.\n#1;em;[재잘]"
901010400110-17 = "#all;hide"
901010400110-18 = "3;니코 아르바이트;03;후후, 지금 만큼은 진짜 <FOX EATS>의 배달부라는 마음으로 작전에 임하고 있으니까.\n#3;em;[반짝]"
901010400110-19 = "3;니코 아르바이트;01;……그래서 FOX 1. 첫번째 타겟은 누구야?"
901010400110-20 = "3;통신유키노;02;오늘의 작전 구역— 카네사키 항구에서 가장 최근에 실종된 인물은 게잡이 배에서 일하던 미야구치라는 청년이다."
901010400110-21 = "3;통신유키노;00;어업에 종사한지는 얼마 되지 않았지만, 돈 씀씀이가 헤프고 불평이 많아 주변 인물과 자주 다툼이 있었다는군. 소문으로는 빚도 제법 있었다고."
901010400110-22 = "3;통신오토기;02;빚에다가 주변 사람들과 다투기까지 했다니…… 짚이는 구석이 너무 많은 걸.\n#3;em;…"
901010400110-23 = "3;니코 아르바이트;00;사채는 범죄에 빠지는 지름길이니까. 그러니 다들 신용 거래를 할 때는 주의하도록 해."
901010400110-24 = "3;통신쿠루미;02;FOX 4, 들었지?"
901010400110-25 = "1;통신오토기;02;응……? 어째서 갑자기 지목당한 거야?\n#1;em;[?]\n#1;ar\n#3;m5"
