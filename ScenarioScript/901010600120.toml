901010600120-13 = "3;슈나우저 어부;00\n#3;em;[?]\n#3;a\n#wait;1200"
901010600120-14 = "3;슈나우저 어부;00;아, 그때 유부초밥을 가져다주었던 그 학생이잖아?"
901010600120-15 = "3;슈나우저 어부;00;오늘도 뭐, 프로젝트인지 프로모션인지 하는 것 때문에 온 거야?"
901010600120-16 = "5;니코 아르바이트;12;아뇨. 아쉽게도 <FOX EATS>의 리뷰 이벤트는 끝나버려서요……\n#5;em;[속상함]\n#5;al\n#3;m1"
901010600120-17 = "#st;[0,0];instant;1;"
901010600120-18 = "#clearST"
901010600120-19 = "5;니코 아르바이트;01\n3;슈나우저 어부;00\n#5;greeting\n#5;h\n#3;h\n#wait;1200"
901010600120-20 = "5;니코 아르바이트;03;대신 지난 이벤트 때 증정하고 남은 에너지 드링크라면 잔뜩 있는데, 혹시 하나 드시겠어요?\n#5;em;[음표]"
901010600120-21 = "3;슈나우저 어부;00;……공짜라면 마다할 이유가 없지."
901010600120-22 = "#st;[0,0];instant;1;"
901010600120-23 = "#clearST"
901010600120-24 = "5;니코 아르바이트;03\n3;슈나우저 어부;00\n#3;greeting\n#5;h\n#3;h\n#wait;1500"
901010600120-25 = "5;니코 아르바이트;00;오늘도 게는 많이 잡으셨나요?\n#5;em;[?]"
901010600120-26 = "3;슈나우저 어부;00;그래. 게가 하도 많이 잡혀서 배가 엎어지는 줄 알았다니까.\n#3;em;[속상함]"
901010600120-27 = "3;슈나우저 어부;00;게 가격이 바닥을 치지만 않았어도 좋았을 텐데.\n#3;stiff\n#fontsize;50"
901010600120-28 = "5;니코 아르바이트;06;그러게요. 이렇게나 잔뜩 잡았는데, 제값을 받지 못한다니 아쉽네요."
901010600120-29 = "5;니코 아르바이트;02;그러고 보니, 이 게들은 통발에 미끼를 놓아 잡으신 거죠?\n#5;em;[반응]"
901010600120-30 = "5;니코 아르바이트;00;어망이나 통발로 잡은 게는 다리가 부러지거나 집게가 상해 있는 경우가 많은데, 여기서 잡힌 게들은 깨끗하니 상태가 좋아 보이네요.\n#5;m3\n#3;dl"
901010600120-31 = "5;니코 아르바이트;03;게 한 마리를 잡는 데도 이렇게 정성을 들이고 계시니, 분명 게 가격도 금방 안정될 거예요."
901010600120-32 = "#st;[0,0];instant;1;"
901010600120-33 = "#clearST"
901010600120-34 = "#all;hide"
901010600120-35 = "3;슈나우저 어부;00\n#3;em;…\n#3;h\n#wait;2500"
901010600120-36 = "3;슈나우저 어부;00;……학생은 요즘 젊은 사람들답지 않구만. \n#3;em;[속상함]\n#3;stiff"
901010600120-37 = "3;슈나우저 어부;00;요즘 젊은 사람들이 다 학생 같았더라면, 사람 구하는 데 이렇게 애를 먹지 않아도 되었을 텐데."
901010600120-38 = "5;니코 아르바이트;02;뭔가 구인 관련해서 문제가 있으신가요?\n#5;al\n#3;m1"
901010600120-39 = "3;슈나우저 어부;00;별 건 아니야. 최근에 어선에서 일하던 미야구치라는 신입 녀석이 갑자기 사라져서, 일손을 구하는 데 어려움을 겪고 있거든."
901010600120-40 = "3;슈나우저 어부;00;미야구치 녀석, 다른 사람에게 말도 없이 도망치다니…… 나중에 만나게 된다면 엉덩이를 걷어차 줘야지.\n#3;stiff"
901010600120-41 = "5;니코 아르바이트;12;그것 참 큰일이었네요."
901010600120-42 = "5;니코 아르바이트;00;그나저나 갑자기 자취를 감추었다니, 그 미야구치라는 분께 무슨 일이 생긴 건 아니었을까요?\n#5;em;[?]"
901010600120-43 = "5;니코 아르바이트;99;큰 병에 걸렸다거나, 사고를 당했다거나……"
901010600120-44 = "3;슈나우저 어부;00;흥. 그 팔팔한 녀석이 갑자기 병은 무슨 병이야?\n#3;em;[한숨]"
901010600120-45 = "3;슈나우저 어부;00;분명 게잡이 일이 힘들어서 도망친 걸 거야. 매일 어구를 손질하면서도 못 해 먹겠다고 불평을 늘어놨었거든."
901010600120-46 = "5;니코 아르바이트;02;게잡이 일이 그렇게 힘든가요?"
901010600120-47 = "3;슈나우저 어부;00;쉬운 일이라고는 할 수 없겠지만, 근성만 있다면 누구나 할 수 있는 일이야.\n#3;em;[반응]\n#3;m3\n#5;dr"
901010600120-48 = "3;슈나우저 어부;00;정 의심 가면 다른 선원들에게 물어보던가. 그 녀석이 얼마나 나약한 녀석이었는지는 모두가 알고 있으니까."
901010600120-49 = "3;슈나우저 어부;00;하여튼 요즘 젊은 녀석들은……\n#3;stiff"
901010600120-50 = "#all;hide"
