[translation]
901010600120-8 = "こんにちは！"
901010600120-14 = "おや？君はこの間、いなり寿司を持ってきてくれた子じゃないか。"
901010600120-15 = "今日も何かのプロモーションで来たのかい？"
901010600120-16 = "いえ、残念ながら「FOX EATS」のレビューイベントは終了しまして……。"
901010600120-20 = "代わりに、イベントで余ったエナジードリンクならいっぱいあります。#n1本いかがですか？"
901010600120-21 = "……タダなら断る理由はないね。"
901010600120-25 = "今日もカニはいっぱい捕れましたか？"
901010600120-26 = "ああ。かなりの量でな。#n船が転覆するかと思ったくらいだよ。"
901010600120-27 = "カニが底値になっていなけりゃなぁ……。"
901010600120-28 = "たくさんあるのに、元値で売れないのは残念ですね。"
901010600120-29 = "そういえば、カニってカゴで捕るんですね。"
901010600120-30 = "捕獲した時に脚が折れたり、ハサミが傷んじゃうという話はよく聞きますが……ここのカニはどれも状態が良いです。"
901010600120-31 = "こうして丁寧に水揚げしているんですから、きっとカニの価格も落ち着きますよ。"
901010600120-36 = "……君は優しいね。"
901010600120-37 = "みんなが君みたいだったら、新人教育も苦労しないんだろうな。"
901010600120-38 = "新人教育？何かあったんですか？"
901010600120-39 = "大したことじゃあないさ。#n最近漁船で働いてた新入りが急にいなくなってしまってな……ったくミヤグチのやつどこに行ったんだか。"
901010600120-40 = "一言くらい書き置きしていけばいいものを……。"
901010600120-41 = "それは大変ですね。"
901010600120-42 = "急にいなくなってしまうなんて……何かあったんでしょうか？"
901010600120-43 = "大病に罹ったとか、事故に遭ったとか……。"
901010600120-44 = "ふんっアイツはただの根性なしなだけだ。"
901010600120-45 = "カニ漁が辛くて逃げ出したに違いない。漁具の手入れだって文句タラタラだったからな。"
901010600120-46 = "カニ漁ってそんなに大変なんですか？"
901010600120-47 = "大変ってほどじゃあない。根性さえあれば誰でもできる仕事だ。"
901010600120-48 = "他の船員にも聞いてみるといい。#nあいつがどれだけ軟弱だったか、みんな知ってるからな。"
901010600120-49 = "ったく、これだから最近の若者は……。"
