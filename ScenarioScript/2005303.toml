2005303-34 = "3;미치루 드레스;03;걷기, 뛰기, 무거운 물건 들기! 전부 깔끔하게 한 번에 해결!\n#3;em;[음표]"
2005303-35 = "3;미치루 드레스;01;거기다 마침 그곳의 몇몇 가게에 새롭게 닌자 굿즈…… 아니, 인법 도구를 들여놓기 시작한다는 소식도 들었고 말이야!"
