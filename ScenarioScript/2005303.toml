2005303-26 = "3;미치루 드레스;01;걷고, 뛰고, 무거운 물건도 들어 보고……!\n#3;hophop\n#3;em;[재잘]\n#3;m4"
2005303-27 = "3;미치루 드레스;10;거기까지는 테스트를 해 봐야, 비로소 옷의 수선이 제대로 되었는지 알 수 있는 거야!\n#3;m3"
