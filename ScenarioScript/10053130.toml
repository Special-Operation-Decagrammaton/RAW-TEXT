[translation]
10053130-1 = "Afterword;Iron Maiden"
10053130-3 = "...So."
10053130-15 = "What's all the commotion?"
10053130-16 = "Uh... They said they wanted to turn themselves in."
10053130-17 = "\"Turn themselves in\"? A likely story..."
10053130-18 = "Well, apparently they had a \"talk\" with Deputy Director Konoka."
10053130-23 = "We've decided to change our ways!"
10053130-24 = "Honestly, we just don't want to face a monster like her ever again..."
10053130-29 = "...Konoka? I thought she was on vacation."
10053130-30 = "Well, I'm sure she knows what she's doing."
10053130-31 = "Temporarily detain these students, question them, investigate their accounts, and respond accordingly."
10053130-32 = "Understood!"
10053130-36 = "Huh? I thought Director Kanna likes to handle the interrogations?"
10053130-37 = "She's meeting an important guest."
10053130-38 = "An important guest? Who?"
10053130-43 = "...My apologies for the noise."
10053130-45 = "Actually, I was impressed by the dedication. Heehee... The mark of the Public Peace Bureau, the pride of Valkyrie..."
10053130-46 = "Your Deputy Director remains diligent, even on vacation. Heehee."
10053130-47 = "You embarrass us."
10053130-48 = "We're no better than anyone else. Every department in Valkyrie is up to its neck in tasks."
10053130-49 = "Of course, it seems that the Corrections Bureau has it the worst. You deal with all the scum no one else can handle."
10053130-50 = "But I don't mean to flatter you too much, Director. I'd hate to make you uncomfortable."
10053130-56 = "Heehee... I wish everyone thought like you, Director Kanna."
10053130-57 = "After all, if everyone thought so highly of the Corrections Bureau..."
10053130-62 = "I suppose we might be a little busier, heehee..."
