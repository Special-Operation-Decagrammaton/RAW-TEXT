[translation]
2005502-1 = "Cabinetphobia"
2005502-4 = "Game Development Department Club Room"
2005502-5 = "[ns] \"Yuzu! Are you okay?! What's wrong?!\""
2005502-6 = "S-Sensei?!"
2005502-7 = "It's really not that big of a deal...!"
2005502-8 = "Huh? You think I'm \"showing a hidden side\" of myself?"
2005502-9 = "And that...in itself, is a big deal?"
2005502-10 = "..."
2005502-11 = "...To be honest, you...you're right, Sensei."
2005502-12 = "I...no longer feel comfortable in my cabinet..."
2005502-13 = "[s1] \"See? This is a serious matter.\"\n[s2] \"This is a major shift in your status quo!\""
2005502-16 = "Well, if you put it that way, it really hits home...!"
2005502-17 = "[s] \"How long have you found the cabinet uncomfortable?\""
2005502-18 = "Um... Well..."
2005502-19 = "I think it started right after we came home—after everything with the Steel Continent."
2005502-20 = "[s3] \"Is it because it's such a dark place...?\"\n[s4] \"Is it resurfacing bad memories?\""
2005502-23 = "N-No. I don't think it's that. I'm not afraid of the dark."
2005502-24 = "That's not to say that what happened on the Steel Continent has...nothing to do with it."
2005502-25 = "..."
2005502-26 = "See, when I enter a cramped space like the cabinet, my heart starts racing. It feels like the floor is going to drop any second..."
2005502-27 = "[s] \"Like the floor is going to...'drop'?\""
2005502-28 = "Yes... It reminds me of the pod...on the Transport Ship."
2005502-29 = "When I'm stuck in a cramped space and can't move, I feel as if the floor might suddenly fall, ejecting me out into the open... And then I'll be in a battle I'm not ready for, and..."
2005502-30 = "I just can't relax in there like I used to. I get so anxious."
2005502-31 = "[s] \"This is a problem.\""
2005502-32 = "...B-But, Sensei..."
2005502-33 = "I-It could be, that...it's actually a good thing...?"
2005502-34 = "[s] \"A good thing...?\""
2005502-35 = "Yes. Since I can't shut myself in the cabinet anymore..."
2005502-36 = "It may give me the opportunity to...go out more, like everyone else..."
2005502-37 = "Meet more people... Be...social."
2005502-38 = "So, maybe it's for the best... It'll force me to be more normal. That's what I was thinking, anyway..."
2005502-39 = "[s] \"Do you really mean that?\""
2005502-40 = "..."
2005502-41 = "...Don't you think it would be a positive change, Sensei?"
2005502-42 = "[s5] \"I think it's great to want to grow and move forward.\"\n[s6] \"But it's not good if that motivation stems from anxiety or avoidance.\""
2005502-45 = "...You're right, Sensei."
2005502-46 = "I...don't think I'm properly prepared to venture outside. Not yet."
2005502-47 = "Above all, I know what I need. And that's a safe place to hide when strangers or Yuuka suddenly barges into the club room, and—"
2005502-48 = "[s] \"Then we don't have a choice. Training begins now.\""
2005502-52 = "[ns] \"In that case, shall we practice getting back into the cabinet?\""
2005502-53 = "Huh? T-Training...? That's..."
2005502-54 = "...S-Sensei?!"
2005502-60 = "Wait, why am I wearing this?!"
2005502-61 = "[ns] \"There she is! The unstoppable UZQueen, ready for battle!\""
2005502-62 = "Why are you talking like a commentator?! You're the one who told me to wear this, Sensei!"
2005502-63 = "...Huh? You want me to enter the cabinet like this?"
2005502-64 = "Wait, th-that's...!"
2005502-65 = "Th-This actually makes it even scarier...!"
2005502-66 = "This is what I was wearing every time I was dropped! And ejected! With a parachute!"
2005502-67 = "Ugh... Now I'm being haunted by memories of the Neo-Avant Guard's cockpit too...!"
2005502-72 = "...Huh?"
2005502-74 = "I firmly held Yuzu's trembling hands."
2005502-75 = "S...Sensei? What...?"
2005502-76 = "You want me to \"try sitting in the cabinet\" again...?"
2005502-77 = "L-Like this...? "
2005502-83 = "W-Well, one moment..."
2005502-89 = "[ns] \"How is it?\""
2005502-90 = "I-I'm not sure."
2005502-91 = "I guess I'm a little relieved..."
2005502-92 = "I wonder why. All I'm doing is sitting in the same space as before."
2005502-93 = "But I feel a lot better."
2005502-94 = "[ns] \"Well, that's because I'm holding onto you, Yuzu.\""
2005502-96 = "[ns7] \"Now, even if the ground gives way or suddenly springs up, it's okay.\"\n[ns8] \"I'll always hold on tight so you don't go flying away.\""
2005502-99 = "You'll always...hold...me..."
2005502-100 = "..."
2005502-101 = "Th..."
2005502-102 = "...Thank you, Sensei."
2005502-107 = "And so, I held Yuzu's hands as we sat inside the cabinet for a while."
