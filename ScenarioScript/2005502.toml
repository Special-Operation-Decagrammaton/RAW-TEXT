[translation]
2005502-1 = "โรคกลัวตู้"
2005502-4 = "ห้องชมรมพัฒนาเกม"
2005502-5 = "[ns] \"ยูสึ! ไม่เป็นไรใช่มั้ย?! เกิดอะไรขึ้นน่ะ?!\""
2005502-6 = "คะ... คุณครู?!"
2005502-7 = "มะ... มันไม่ใช่เรื่องร้ายแรงอะไรหรอกค่ะ...!"
2005502-8 = "คะ? การที่จู่ๆ ก็แสดงด้านที่ปกติไม่เคยให้เห็นออกมาเลยน่ะ..."
2005502-9 = "เป็นเรื่องใหญ่มากเลยงั้นเหรอคะ...?"
2005502-10 = "......"
2005502-11 = "ทะ... ที่จริงแล้ว เอ่อ ใช่แล้วค่ะ คุณครู"
2005502-12 = "คือว่าตู้ใบนี้มันไม่ค่อยสะดวกสบายเหมือนเดิมแล้วน่ะค่ะ..."
2005502-13 = "[s1] \"นั่นไง เรื่องร้ายแรงเลยนะ\"\n[s2] \"เกิดการเปลี่ยนแปลงค่าสเตตัสครั้งใหญ่เลยนี่นา\""
2005502-16 = "พะ... พอคุณครูพูดแบบนั้นแล้ว ยิ่งวิตกกว่าเดิมอีก...!"
2005502-17 = "[s] \"รู้สึกอึดอัดใจเรื่องตู้เก็บของตั้งแต่เมื่อไรเหรอ?\""
2005502-18 = "ระ... เรื่องนั้น..."
2005502-19 = "คิดว่าตั้งแต่กลับมาจากดินแดนเหล็กกล้าน่ะค่ะ..."
2005502-20 = "[s3] \"เวลาเข้าไปในที่มืดๆ จะนึกถึงเรื่องตอนนั้นเหรอ?...\"\n[s4] \"เพราะนึกถึงเรื่องตอนนั้นเหรอ?\""
2005502-23 = "ปะ... เปล่าค่ะ ไม่เกี่ยวกับความมืดหรอกค่ะ"
2005502-24 = "จริงอยู่ที่ฉันนึกถึงเรื่องเมื่อตอนนั้น แต่ว่า..."
2005502-25 = "......"
2005502-26 = "คือว่าเวลาที่เข้าไปอยู่ในพื้นที่แคบๆ อย่างในตู้ ไม่รู้ทำไมฉันจะรู้สึกเหมือนว่าพื้นมันยุบลงไปเลยค่ะ..."
2005502-27 = "[s] \"รู้สึกเหมือนพื้นยุบงั้นเหรอ?\""
2005502-28 = "ค่ะ ถ้าให้พูดแบบเจาะจงก็คือ... มันทำให้ฉันนึกถึงตอนที่เข้าไปในช่องดีดตัวของยานขนส่งค่ะ"
2005502-29 = "ถ้านั่งอยู่ในพื้นที่แคบๆ ที่ถูกปิดกั้นทั้งด้านซ้ายและขวา มันรู้สึกเหมือนว่าจู่ๆ พื้นจะเปิดและโดนดีด#nออกไป จากนั้นก็ต้องเข้าต่อสู้โดยไม่รู้ตัว..."
2005502-30 = "เพราะความรู้สึกกังวลในเรื่องนี้ ทำให้ฉันเข้าไปพักในตู้อย่างสบายใจเหมือนเมื่อก่อนไม่ได้แล้วค่ะ"
2005502-31 = "[s] \"ลำบากทีเดียวเลยนะ\""
2005502-32 = "ทะ... ทำไมเหรอคะ คุณครู"
2005502-33 = "บะ... บางทีมันอาจจะเป็นเรื่องที่ดี... ไม่ใช่เหรอคะ...?"
2005502-34 = "[s] \"เรื่องดีงั้นเหรอ...?\""
2005502-35 = "ค่ะ ตอนนี้ฉันเข้าไปแอบอยู่ในตู้ไม่ได้อีกแล้ว..."
2005502-36 = "เพราะงั้นเลยคิดว่าจะใช้โอกาสนี้... ออกไปเที่ยวเล่นข้างนอกเหมือนคนอื่นๆ..."
2005502-37 = "พบปะกับผู้คนมากขึ้น..."
2005502-38 = "เพราะงั้นการได้เป็นคนธรรมดาๆ ก็อาจจะดีกว่าก็ได้... ฉันคิดแบบนั้นน่ะ..."
2005502-39 = "[s] \"ยูสึคิดแบบนั้นจริงเหรอ?\""
2005502-40 = "......"
2005502-41 = "คุณครูไม่คิดว่ามันเป็นการเปลี่ยนแปลงที่ดีเหรอคะ?"
2005502-42 = "[s5] \"ครูคิดว่าความพยายามที่จะเปลี่ยนแปลงเป็นเรื่องที่ดีนะ\"\n[s6] \"แต่ถ้าทำเพราะความกลัวหรืออยากจะหนีอะไร คงไม่ดีหรอก\""
2005502-45 = "จริงด้วยค่ะ คุณครู..."
2005502-46 = "ฉัน... ฉันคิดว่าตัวเองคงยังไม่พร้อมที่จะออกไปข้างนอกหรอกค่ะ"
2005502-47 = "ยิ่งกว่านั้นถ้าจู่ๆ ยูกะหรือนักเรียนที่ไม่รู้จักบุกเข้ามาในห้องชมรม ก็ต้องมีที่หลบภัยด้วย..."
2005502-48 = "[s] \"ถ้างั้นก็ช่วยไม่ได้นะ...\""
2005502-52 = "[ns] \"งั้นเราลองฝึกกลับเข้าตู้กันมั้ย?\""
2005502-53 = "คะ? ฝะ... ฝึกเหรอคะ... คุณครูหมายถึงอะไรคะ...?"
2005502-54 = "คะ... คุณครู?!"
2005502-60 = "ทะ... ทำไมต้องใส่ชุดนี้อีกล่ะคะ?!"
2005502-61 = "[ns] \"ออกมาแล้ว! พบกับ UZQueen โหมดพร้อมรบ!\""
2005502-62 = "ทำไมถึงต้องพูดเหมือนนักพากย์ด้วยล่ะคะ?! ก็คุณครูบอกให้ฉันใส่เองไม่ใช่เหรอคะ?!"
2005502-63 = "คะ...? ให้ลองเข้าไปในตู้ทั้งชุดนี้น่ะเหรอคะ?"
2005502-64 = "เดี๋ยวก่อนค่ะ ระ... เรื่องนั้น...!"
2005502-65 = "มะ... มันจะยิ่งน่ากลัวกว่าเดิมนะคะ...!"
2005502-66 = "ชุดนี้จะยิ่งทำให้ฉันนึกถึงเรื่องในตอนนั้นมากกว่าเดิมนะคะ...!"
2005502-67 = "ฮือ... ฉันเริ่มนึกถึงตอนที่ดีดตัวฉุกเฉินออกมาจากห้องบังคับหุ่นรบล้ำยุคนีโออีกแล้ว...!"
2005502-72 = "เอ๋...?"
2005502-74 = "(คุณครูจับมือทั้งสองข้างของยูสึที่เริ่มตื่นกลัวเอาไว้แน่น)"
2005502-75 = "คะ... คุณครู? ทำไม..."
2005502-76 = "ให้ฉันลองเข้าไปนั่งในตู้ดู... อีกครั้งเหรอคะ...?"
2005502-77 = "ทะ... ทั้งๆ แบบนี้เหรอ...? "
2005502-83 = "ถะ... ถ้าอย่าง... นั้น... แค่แป๊บเดียว..."
2005502-89 = "[ns] \"เป็นยังไงบ้าง?\""
2005502-90 = "มะ... ไม่แน่ใจเลยค่ะ"
2005502-91 = "มะ... เหมือนจะรู้สึกอุ่นใจขึ้นนิดหน่อย..."
2005502-92 = "เพราะอะไรกันนะคะ ทั้งๆ ที่ก็เป็นตู้ใบเดิมแท้ๆ"
2005502-93 = "รู้สึกดีกว่าเมื่อกี้เยอะเลยค่ะ"
2005502-94 = "[ns] \"นั่นเพราะครูจับมือยูสึเอาไว้แบบนี้ไง\""
2005502-96 = "[ns7] \"ตอนนี้ถึงพื้นจะยุบ หรือจู่ๆ จะถูกดีดตัวไปก็ไม่เป็นไรนะ\"\n[ns8] \"เพราะครูจะคอยจับยูสึไว้ ไม่ให้หายไปไหนเอง\""
2005502-99 = "คุณครู... จับฉันไว้... จนถึงที่สุด..."
2005502-100 = "......"
2005502-101 = "ขะ..."
2005502-102 = "ขอบคุณนะคะ คุณครู"
2005502-107 = "(จากนั้นคุณครูก็นั่งจับมือยูสึที่นั่งอยู่ในตู้ไว้แบบนั้นอยู่อีกพักใหญ่)"
