[translation]
2005502-1 = "櫃子恐懼症"
2005502-4 = "遊戲開發部．部室"
2005502-5 = "[ns]「柚子！你沒事吧！？發生什麼事了！？」"
2005502-6 = "老，老師！？"
2005502-7 = "也，也沒那麼嚴重啦……！"
2005502-8 = "咦？突然表現出平常絕對不會出現的樣子……"
2005502-9 = "這本身就是大事……？"
2005502-10 = "……"
2005502-11 = "其，其實，老師……"
2005502-12 = "我……已經沒辦法在櫃子裡放鬆了……"
2005502-13 = "[s1]「就說事情很嚴重吧。」\n[s2]「都陷入異常狀態了呢。」"
2005502-16 = "被，被你這麼一說，好像確實是這樣……！"
2005502-17 = "[s]「從什麼時候開始對櫃子感到不舒服的？」"
2005502-18 = "那……那個……"
2005502-19 = "好像是從鋼鐵大陸回來之後……"
2005502-20 = "[s3]「難道一進入漆黑的地方……」\n[s4]「就會想起那時候的回憶嗎？」"
2005502-23 = "不，不是的。跟漆黑的地方沒有關係。"
2005502-24 = "雖然確實是因為那時候的記憶……"
2005502-25 = "……"
2005502-26 = "就是……進入像櫃子這種狹窄的空間之後，總覺得地板好像會直接塌下去……"
2005502-27 = "[s]「地板會塌下去？」"
2005502-28 = "是的，具體來說……會想起進入運輸船彈射艙的事。"
2005502-29 = "只要坐在封閉的狹窄空間裡面……#n就會有種地板會突然打開，然後被彈射到地面開始戰鬥的感覺……"
2005502-30 = "這股不安，讓我變得沒辦法像以前一樣在櫃子裡安心休息。"
2005502-31 = "[s]「那確實很困擾呢。」"
2005502-32 = "……但，但是，老師。"
2005502-33 = "或，或許，這反而是件好事……不是嗎……？"
2005502-34 = "[s]「好事……？」"
2005502-35 = "是的。既然現在沒辦法在櫃子裡待著……"
2005502-36 = "不如乾脆趁這個機會……像其他人一樣多出去走走……"
2005502-37 = "認識更多的人……"
2005502-38 = "變得更普通一點或許也不錯……我是這麼想的……"
2005502-39 = "[s]「你是認真這麼想的嗎？」"
2005502-40 = "……"
2005502-41 = "……老師覺得這不是好的變化嗎？"
2005502-42 = "[s5]「想要有所改變並向前邁進的態度很值得讚許。」\n[s6]「但如果契機是源自於不安或逃避的話，那就不太好了。」"
2005502-45 = "……是啊，老師說的對。"
2005502-46 = "我好像……還沒有做好出去的準備。"
2005502-47 = "而且在不認識的學生或優香突然闖進部室的時候，也需要有個藏身之處……"
2005502-48 = "[s]「那就沒辦法了呢。」"
2005502-52 = "[ns]「既然這樣，要不要試著來做重新進入櫃子的訓練？」"
2005502-53 = "咦？訓，訓練……那是什麼意思……？"
2005502-54 = "……老，老師！？"
2005502-60 = "為，為什麼又要穿這套衣服！？"
2005502-61 = "[ns]「出現了！是UZQueen的武裝模式！」"
2005502-62 = "為什麼要用轉播的語氣說話！？明明是老師讓我穿的！？"
2005502-63 = "……咦？就這樣進入櫃子裡嗎……？"
2005502-64 = "等，等一下，那，那個……！"
2005502-65 = "這，這樣好像更可怕了……！"
2005502-66 = "因為穿著這套衣服，當時的記憶反而浮現得更加鮮明……！"
2005502-67 = "嗚嗚嗚……現在連從NEO前衛君的駕駛艙緊急彈出時的記憶都……！"
2005502-72 = "……咦？"
2005502-74 = "（緊緊握住不安的柚子的雙手）"
2005502-75 = "老……老師？你為什麼……"
2005502-76 = "要我再坐進櫃子裡……試試看嗎……？"
2005502-77 = "維，維持這個狀態……？"
2005502-83 = "如，如果是這樣的話……好像稍微……"
2005502-89 = "[ns]「感覺怎麼樣？」"
2005502-90 = "我，我也不太清楚……"
2005502-91 = "好，好像稍微安心了一點……"
2005502-92 = "究竟是為什麼呢……#n明明同樣是坐在這裡……"
2005502-93 = "感覺卻比剛才好多了……"
2005502-94 = "[ns]「因為我一直握著柚子的手啊。」"
2005502-96 = "[ns7]「就算地板塌陷或突然彈射出去也沒關係。」\n[ns8]「我會緊緊抓住柚子，不讓你飛走的。」"
2005502-99 = "一直……握著我的手……"
2005502-100 = "……"
2005502-101 = "謝……"
2005502-102 = "謝謝你，老師。"
2005502-107 = "（就這樣握著坐在櫃子裡的柚子的手，度過了一段悠閒的時光）"
