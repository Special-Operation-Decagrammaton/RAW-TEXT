[translation]
1601905-1 = "Upgrade"
1601905-2 = "As you already know, I have received upgraded weapons."
1601905-3 = "They are \"upgraded,\" as said. \"Improved.\""
1601905-4 = "[s] \"Yes. That's true.\""
1601905-5 = "Yes. Said weapons are these two energy pistols. You know this as well. I brandish them frequently."
1601905-6 = "As the name suggests, these are energy weapons."
1601905-7 = "Provided that there is an infinite supply of energy, energy weapons can be used indefinitely until they hit the limits of their structural durability."
1601905-8 = "In other words, I possess infinite ammo."
1601905-9 = "On top of that, they're dual pistols. One for each hand."
1601905-10 = "Sensei. Don't you feel anything after hearing me speak of this?"
1601905-11 = "[s1] \"Infinite ammo... Dual pistols... Ugh, my head...!\"\n[s2] \"N-Not really...?\""
1601905-14 = "This isn't my personal opinion, but a recent live stream informed me that this is an ideal combination. A \"loadout,\" as they say."
1601905-15 = "I believe that I have achieved the status of \"First & Perfect Asuma Toki.\" Yay."
1601905-16 = "[s] \"So what's really going on...?\""
1601905-17 = "It's nothing important."
1601905-18 = "I just had a passing thought..."
1601905-19 = "Sensei. As you know, I possess various armaments."
1601905-20 = "This includes the gauntlet I often use during infiltration missions."
1601905-21 = "Which is why I would be happy to upgrade it with an energy weapon system."
1601905-22 = "I believe optimizing as many things as possible would be \"cool\"..."
1601905-23 = "...\"fun\"..."
1601905-28 = "...and \"beneficial\" in strengthening our forces."
1601905-29 = "[s] \"I think two of your honest desires just slipped out!\""
1601905-30 = "You misheard me."
1601905-31 = "[s] \"Is that so?! I couldn't tell!\""
1601905-32 = "Very well. You are absolutely correct."
1601905-33 = "Hm? Why did you exhale like that? There is a saying that excessive sighing will decrease your luck, I'll have you know."
1601905-34 = "But I suppose that would be no problem because I, the lucky rabbit maid agent recon unit, am always here."
1601905-35 = "[s] \"...So what exactly do you want to upgrade...?\""
1601905-36 = "Right. We were discussing that."
1601905-37 = "I've been thinking."
1601905-38 = "If I applied an energy weapon system to my gauntlet, primarily to fire small projectiles..."
1601905-39 = "Wouldn't I be able to achieve a rocket punch with said gauntlet?"
1601905-40 = "[s] \"Rocket punch!\""
1601905-41 = "As expected from Sensei. I knew you'd be interested."
1601905-42 = "What do you think, Sensei? Isn't that quite literally the best idea there is?"
1601905-43 = "Please acknowledge it and compliment me to your heart's content."
1601905-44 = "Don't you want to see me throw rocket punches?"
1601905-45 = "Even if you don't want to personally witness such feats, I would like to. So hurry and approve the idea."
1601905-46 = "[s] \"But let me ask you one thing.\""
1601905-47 = "What is it, Sensei?"
1601905-48 = "[s] \"Why are you trying to get my permission?\""
1601905-52 = "..."
1601905-53 = "..."
1601905-54 = "..."
1601905-55 = "[s] \"Toki. Look me in my eyes.\""
1601905-56 = "Yes, Sensei."
1601905-57 = "[s] \"And speak honestly.\""
1601905-58 = "..."
1601905-59 = "[s] \"Why are you looking away now?\""
1601905-63 = "It seems I have no choice but to tell you."
1601905-64 = "It's because I wasn't able to get permission from Ms. Rio and President Himari due to alleged \"safety reasons.\""
1601905-65 = "The reason being that the booster's heat and pressure carry a high chance of inflicting burns."
1601905-66 = "[s] \"Then you really shouldn't do it.\""
1601905-67 = "Sensei."
1601905-68 = "Don't you believe that small losses and risks can be ignored for the greater good?"
1601905-69 = "Do you feel that this is not potentially a \"small loss\"? For a very great, perfect, astounding good?"
1601905-70 = "..."
1601905-71 = "It may not feel like a small risk to you, but it is to me. So please grant me appropriate permissions."
1601905-72 = "[s] \"No.\""
1601905-73 = "Sensei..."
1601905-74 = "[s] \"Even if you look at me like that, 'no' means 'no.'\""
1601905-75 = "Then at least allow me to install a high-output hand cannon."
1601905-76 = "What if I could shoot in bursts of three, and enjoy an improved and augmented charge?"
1601905-77 = "[s] \"Deeeniiied.\""
1601905-78 = "Sensei..."
1601905-80 = "It took a while to get Toki to stop sulking."
1601905-81 = "Eventually, she gave in. It took a lot of hugging and head pats."
