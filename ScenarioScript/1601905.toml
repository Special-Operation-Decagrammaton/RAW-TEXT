[translation]
1601905-1 = "#title;업그레이드"
1601905-2 = "3;토키 결전;02;알고 계시겠지만, 저는 새 무기를 받은 상태입니다.\n#3;a\n#3;em;[반응]"
1601905-3 = "3;토키 결전;01;이른바, '업그레이드'가 된 상태죠."
1601905-4 = "[s] \"응. 그건 그렇지.\""
1601905-5 = "3;토키 결전;01;네. 역시 알고 계시겠지만 이 두 정의 에너지 피스톨입니다.\n#3;greeting"
1601905-6 = "3;토키 결전;03;말 그대로, 에너지 웨폰이죠.\n#3;em;[음표]"
1601905-7 = "3;토키 결전;02;에너지 웨폰이란, 즉, 에너지만 무한히 공급된다면, 내구도가 보장되는 한도 내에서 언제까지나 사용할 수 있다는 것이기도 합니다."
1601905-8 = "3;토키 결전;03;그야말로, 무한 탄창입니다."
1601905-9 = "3;토키 결전;07;그것도 모자라, 무한 탄창에 쌍권총이기까지 하죠.\n#3;closeup\n#3;em;[!]"
1601905-10 = "3;토키 결전;03;선생님. 여기에서 뭔가 느껴지시는 것 없으신가요?\n#3;closeup"
1601905-11 = "[s1] \"무한 탄창…… 쌍권총……. 큭, 머리가……!\"\n[s2] \"자, 잘은 모르겠는데……?\""
1601905-12 = "#wait;10"
1601905-13 = "#wait;10"
1601905-14 = "3;토키 결전;02;저의 의견은 아닙니다만, 이건 최고의 조합 중 하나라고 어떤 인터넷 방송에서 들은 바 있습니다."
1601905-15 = "3;토키 결전;01;그야말로 지금의 퍼스트&퍼펙트 아스마 토키에게 어울리는 업그레이드이지 않을까 합니다. 이예이.\n#3;jump\n#3;em;[반짝]"
1601905-16 = "[s] \"그래서 도대체 무슨 일이니…….\""
1601905-17 = "3;토키 결전;99;별거 아닙니다."
1601905-18 = "3;토키 결전;01;그저 잠깐 이런 생각이 들었을 뿐이죠."
1601905-19 = "3;토키 결전;02;선생님. 아시다시피 저에게는 다양한 무장이 있습니다.\n#3;em;[반응]"
1601905-20 = "3;토키 결전;01;그중에서는, 잠입 작전에 주로 사용했던 암기어 건틀릿도 있죠."
1601905-21 = "3;토키 결전;07;그렇기에, 에너지 웨폰 시스템을 사용할 수 있게 된 지금.\n#3;jump"
1601905-22 = "3;토키 결전;03;가능한 한 많은 것을 업그레이드할 수 있다면 멋질 것이라고…….\n#3;em;[음표]"
1601905-23 = "3;토키 결전;04;재미있을 것이라고……."
1601905-24 = "#st;[0,0];instant;1;"
1601905-25 = "#clearST"
1601905-26 = "3;토키 결전;04\n#3;em;…\n#wait;2500"
1601905-27 = "3;토키 결전;99\n#3;greeting\n#wait;1000"
1601905-28 = "3;토키 결전;03;……전력 증강에 도움이 될 수 있을 것이라고 생각했기에.\n#3;em;[반짝]"
1601905-29 = "[s] \"지금 본심이 두 개 정도 새어 나온 것 같은데!?\""
1601905-30 = "3;토키 결전;07;잘못 들으신 겁니다."
1601905-31 = "[s] \"아하, 그랬구나?!?! 난 또 내가 그런 줄도 모르고!?!?\""
1601905-32 = "3;토키 결전;99;정말이지 그 말씀대로 이십니다."
1601905-33 = "3;토키 결전;02;음? 그 한숨은 무슨 의미이신지요. 한숨을 너무 자주 내쉬면 행운이 달아난다고 합니다.\n#3;em;[?]"
1601905-34 = "3;토키 결전;03;하지만 행운의 토끼 메이드 에이전트 정찰대인 제가 있으니, 문제는 없겠군요."
1601905-35 = "[s] \"……그래서 뭘 어떻게 업그레이드하고 싶다는 거니…….\""
1601905-36 = "3;토키 결전;02;네. 저희는 그 이야기를 하고 있었지요.\n#3;em;[반응]"
1601905-37 = "3;토키 결전;99;저는 생각했습니다."
1601905-38 = "3;토키 결전;07;소형 발사체 위주인 암기어 건틀렛에, 에너지 웨폰 시스템을 적용시키면."
1601905-39 = "3;토키 결전;05;건틀릿을 로켓 펀치처럼 쓸 수도 있지 않을까요?\n#3;closeup\n#3;em;[!]"
1601905-40 = "[s] \"로켓 펀치!\""
1601905-41 = "3;토키 결전;03;역시 선생님이십니다. 반응해 주실 줄 알았습니다.\n#3;em;[반짝]"
1601905-42 = "3;토키 결전;07;어떠신지요, 선생님. 그야말로 최고의 아이디어이지 않습니까?"
1601905-43 = "3;토키 결전;05;빨리 그렇다고 인정해 주시고, 저를 마음껏 칭찬해 주십시오.\n#3;hophop"
1601905-44 = "3;토키 결전;03;제가 로켓 펀치를 날리는 모습, 보고 싶지 않으십니까?\n#3;em;[음표]"
1601905-45 = "3;토키 결전;05;선생님이 보고 싶지 않으셔도 제가 보고 싶습니다. 그러니까 어서요."
1601905-46 = "[s] \"그런데 하나만 묻자꾸나.\""
1601905-47 = "3;토키 결전;02;무엇인가요, 선생님.\n#3;em;[?]"
1601905-48 = "[s] \"왜 굳이 내 허락을 받으려고 하는 거니?\""
1601905-49 = "#st;[0,0];instant;1;"
1601905-50 = "#clearST"
1601905-51 = "3;토키 결전;02\n#3;em;…\n#wait;2500"
1601905-52 = "3;토키 결전;04;……."
1601905-53 = "3;토키 결전;06;……….\n#3;stiff"
1601905-54 = "3;토키 결전;99;…………."
1601905-55 = "[s] \"토키야. 내 눈을 바라보렴.\""
1601905-56 = "3;토키 결전;07;네. 선생님.\n#3;em;[반응]"
1601905-57 = "[s] \"그리고 솔직하게 말해 다오.\""
1601905-58 = "3;토키 결전;99;……."
1601905-59 = "[s] \"왜 거기서 시선을 살짝 돌리는 거니.\""
1601905-60 = "#st;[0,0];instant;1;"
1601905-61 = "#clearST"
1601905-62 = "3;토키 결전;06\n#3;stiff\n#wait;1000"
1601905-63 = "3;토키 결전;99;어쩔 수 없군요. 말씀드릴 수밖에요.\n#3;em;[한숨]"
1601905-64 = "3;토키 결전;07;리오 님과 히마리 부장에게, 안전상의 이유로 허가를 받지 못했기 때문입니다."
1601905-65 = "3;토키 결전;06;추진 시의 열 압력으로, 화상을 입을 가능성이 크다는 이유였습니다."
1601905-66 = "[s] \"그러면 정말로 안 되는 거잖니.\""
1601905-67 = "3;토키 결전;07;선생님."
1601905-68 = "3;토키 결전;03;때론 어떤 결과 앞에서, 과정상의 사소한 손실이나 위험은 무시될 수 있다고 생각하지 않으십니까?\n#3;em;[반짝]"
1601905-69 = "3;토키 결전;04;사소하지가 않으니까 문제라고요?"
1601905-70 = "3;토키 결전;06;…….\n#3;stiff"
1601905-71 = "3;토키 결전;07;선생님께는 사소하지 않아도 저에게는 사소합니다. 그러니 어서 허가를.\n#3;em;[!]"
1601905-72 = "[s] \"안 돼.\""
1601905-73 = "3;토키 결전;06;선생님……."
1601905-74 = "[s] \"그렇게 바라봐도, 안 되는 건 안 돼.\""
1601905-75 = "3;토키 결전;07;그렇다면 적어도, 에너지를 고출력 빔으로 발사하는 핸드 캐논이라도."
1601905-76 = "3;토키 결전;05;한 번에 3점사로 끊어서 사격할 수 있고, 파츠를 장착하면 차지 단계가 늘어나는 방향이면 더욱 좋을 듯합니다.\n#3;closeup"
1601905-77 = "[s] \"기~각~\""
1601905-78 = "3;토키 결전;06;선생님……….\n#3;closeup\n#3;em;[속상함]"
1601905-79 = "#all;hide"
1601905-80 = "#na;(살짝 토라진 토키를 달래주느라, 조금 애먹었다.)"
1601905-81 = "#na;(결국 꼬옥 끌어안고 머리를 쓰다듬어 달라는 요구를 들어주고 나서야, 토키는 고집을 포기해 주었다…….)"
