[translation]
1601905-1 = "升級"
1601905-2 = "如您所知，我已經換上了新武器。"
1601905-3 = "可以說是處於「升級」的狀態。"
1601905-4 = "[s] 「嗯，確實是這樣呢。」"
1601905-5 = "是的。同樣如您所知，我的新武器就是這兩把能量手槍。"
1601905-6 = "它們顧名思義，屬於能量武器。"
1601905-7 = "也就是說，只要能持續供應能量，就能在耐久度允許的範圍內無限使用。"
1601905-8 = "簡直就是無限彈匣。"
1601905-9 = "不僅如此，無限彈匣再加上雙槍……"
1601905-10 = "老師，您難道沒有從中感受到什麼嗎？"
1601905-11 = "[s1] 「無限彈匣……雙槍……唔，頭好痛……！」\n[s2] 「我，我不是很懂耶……？」"
1601905-14 = "這並非我個人的意見，而是在某個網路直播聽到的。#n據說這是最佳組合之一。"
1601905-15 = "我認為這正是適合現在First & Perfect的飛鳥馬季的升級。耶。"
1601905-16 = "[s] 「所以有什麼事……？」"
1601905-17 = "其實也沒什麼。"
1601905-18 = "只是稍微有了這樣的想法而已。"
1601905-19 = "誠如老師所知，我擁有各式各樣的武裝。"
1601905-20 = "其中也包含以往潛入作戰時經常使用的Arm-Gear。"
1601905-21 = "既然現在可以使用能量武器系統……"
1601905-22 = "如果能盡可能升級更多武裝的話，應該會很帥──"
1601905-23 = "很有趣──"
1601905-28 = "……會有助於提升戰力才對。"
1601905-29 = "[s] 「剛才是不是洩露了兩次真心話！？」"
1601905-30 = "是您聽錯了。"
1601905-31 = "[s] 「原來是我聽錯了啊！？！？」"
1601905-32 = "是的，正是如此。"
1601905-33 = "嗯？您為何要嘆氣呢？#n聽說要是太常嘆氣的話，幸運會逃走的。"
1601905-34 = "不過有我這個幸運兔子女僕特務偵察隊員在，您不需要擔心。"
1601905-35 = "[s] 「……所以你想怎麼升級？」"
1601905-36 = "啊，剛才確實在說那件事呢。"
1601905-37 = "我是這麼想的。"
1601905-38 = "如果在以小型發射體為主的Arm-Gear上，應用能量武器系統──"
1601905-39 = "是不是就能像火箭飛拳一樣使用呢？"
1601905-40 = "[s] 「火箭飛拳！」"
1601905-41 = "不愧是老師。我就知道您會有反應的。"
1601905-42 = "怎麼樣，您不覺得這簡直是最棒的點子嗎？"
1601905-43 = "請迅速承認並盡情稱讚我吧。"
1601905-44 = "您不想看我發射火箭飛拳的樣子嗎？"
1601905-45 = "就算老師不想，我也想看。所以請動作快。"
1601905-46 = "[s] 「先讓我問一件事。」"
1601905-47 = "是什麼事呢，老師。"
1601905-48 = "[s] 「為什麼要特地來徵求我的許可？」"
1601905-52 = "……"
1601905-53 = "…………"
1601905-54 = "………………"
1601905-55 = "[s] 「季，看著我的眼睛。」"
1601905-56 = "是的。老師。"
1601905-57 = "[s] 「然後老實告訴我。」"
1601905-58 = "……"
1601905-59 = "[s] 「為什麼要移開視線。」"
1601905-63 = "沒辦法，看來只好告訴您了。"
1601905-64 = "因為莉央大人和陽葵部長，皆以安全方面的考量拒絕了我的申請。"
1601905-65 = "原因是推進時的熱壓可能會造成燙傷。"
1601905-66 = "[s] 「那確實不行呢。」"
1601905-67 = "老師。"
1601905-68 = "有時為了追求某種結果，可以忽視過程中微小的損失或危險……您不這麼認為嗎？"
1601905-69 = "那不是小事所以才不行，是嗎？"
1601905-70 = "……"
1601905-71 = "對老師來說可能不是小事，但對我來說就是小事。#n所以請快點給我許可吧。"
1601905-72 = "[s] 「不行。」"
1601905-73 = "老師……"
1601905-74 = "[s] 「就算你那樣看我，不行的事就是不行。」"
1601905-75 = "那如果是能將能量以高輸出光束發射的手炮呢……"
1601905-76 = "最好是能夠三連發，然後裝上零件就能增加充能階段的那種。"
1601905-77 = "[s] 「駁～回～」"
1601905-78 = "老師…………"
1601905-80 = "（費了一番功夫才安撫好鬧彆扭的季）"
1601905-81 = "（滿足他「抱緊處理並摸摸頭」的要求後，季才總算放下了他的堅持……）"
