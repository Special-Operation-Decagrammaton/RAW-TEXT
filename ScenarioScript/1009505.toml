[translation]
1009505-1 = "ช่วยจดจำเมดไว้ด้วยนะคะคุณครู"
1009505-2 = "พอมาคิดดู ฉันว่าเกิดเรื่องใหญ่แล้วค่ะ!"
1009505-3 = "[s] \"จู่ๆ มีเรื่องอะไรเหรอ มิโดริ?!\""
1009505-4 = "เอ่อ ที่ฉันบอกว่าจะเป็นเมดให้คุณครู เพื่อวาดรูปต้นแบบของเกมที่มีเมดเป็นตัวละครหลักน่ะค่ะ"
1009505-5 = "แต่พอมาคิดดูแล้ว..."
1009505-17 = "มะ... เหมือนที่ผ่านมาฉันเอาแต่เที่ยวเล่นกับคุณครูเลยค่ะ!"
1009505-18 = "[s1] \"ไม่เป็นไรหรอก ไม่เป็นไร...\"\n[s2] \"เป็นนักเรียนก็ต้องเที่ยวเล่นแบบนี้ละ...\""
1009505-21 = "แต่หน้าที่หลักของนักเรียนคือการเรียนหนังสือไม่ใช่เหรอคะ?"
1009505-22 = "[s3] \"ว้าว มิโดริพูดแบบนี้เลยเหรอ...\" \n[s4] \"ครูภูมิใจจนน้ำตาจะไหลเลย...\""
1009505-28 = "เอาเถอะค่ะ ฉันว่าเราจะอยู่อย่างนี้กันไม่ได้แล้วค่ะ!"
1009505-29 = "วันนี้ฉันต้องไปทำงานของเมดอย่างจริงจังแล้วค่ะ!"
1009505-30 = "ตอนนี้คุณครูจะไปที่ชาเล่ต์ใช่มั้ยคะ? ฉันไปด้วยค่ะ!"
1009505-31 = "[s] \"มิโดริ? เดี๋ยวก่อนสิ! มิโดริ~?!?!\""
1009505-34 = "จะว่าไปแล้ว คุณครูรู้เกี่ยวกับประเภทของเมดมั้ยคะ?"
1009505-35 = "[s] \"มีประเภทด้วยเหรอ ไม่รู้เลยแฮะ...?\""
1009505-36 = "งั้นสินะคะ...!"
1009505-37 = "อืม... อันดับแรกก็จะมีตำแหน่ง <เลดี้ส์เมด> ที่ได้รับการปฏิบัติตัวอย่างดีที่สุดค่ะ"
1009505-38 = "หน้าที่หลักของพวกเธอก็คือการดูแลเสื้อผ้า เครื่องประดับ ช่วยเหลือเรื่องการแต่งตัวและการแต่งหน้าค่ะ"
1009505-39 = "ว่ากันว่าเจ้าของบ้านจะจ้างพวกเธอเองโดยตรง และจะได้รับการดูแลต่างหากค่ะ"
1009505-40 = "แล้วก็จะมี <เฮ้าส์คีปเปอร์> ที่ได้รับการปฏิบัติตัวในระดับใกล้เคียงกันค่ะ"
1009505-41 = "ถ้าจะพูดให้ถูก เฮ้าส์คีปเปอร์ไม่ใช่ประเภทของเมดค่ะ เรียกว่าเป็นตำแหน่งผู้จัดการทั้งเรื่องงาน และข้าวของในบ้านทั้งหมดจะถูกต้องกว่าค่ะ"
1009505-42 = "เรียกได้ว่าพวกเธออยู่ในตำแหน่งสูงสุด และทำหน้าที่บริหารบุคลากรในบ้านที่รวมถึงเมดด้วยค่ะ"
1009505-43 = "[s] \"โอ้ว... เหมือนได้ความรู้ใหม่เลย...!\""
1009505-44 = "ส่วนตำแหน่งรองลงมาก็คือ <เฮ้าส์เมด> ค่ะ"
1009505-45 = "ตามที่ฉันศึกษามา เฮ้าส์เมดคือคนที่รับผิดชอบเรื่องความสะอาด พวกเธอจะจัดการ และก็ทำความ#nสะอาดห้องต่างๆ ค่ะ"
1009505-46 = "แล้วก็ยังมี <เนอร์สเซอรี่เมด> ที่มีหน้าที่ดูแลเด็ก และ <คิทเช่นเมด> ที่เป็นผู้ช่วยในครัว"
1009505-47 = "ทั้งยังมี <ลอนดรี้เมด> ที่ดูแลเรื่องการซักผ้า และ <แชมเบอร์> ที่รับผิดชอบงานเบ็ดเตล็ดทั่วไปด้วยค่ะ"
1009505-48 = "ถึงเมดจะมีด้วยกันอยู่หลายตำแหน่งตามที่ฉันบอก..."
1009505-49 = "แต่เมดที่มีจำนวนมากที่สุดก็คือ <เมดออฟออลเวิร์กส์>"
1009505-50 = "หรือก็คือเมดที่รับหน้าที่ทุกอย่างคนเดียวค่ะ"
1009505-51 = "เหตุผลน่าจะเป็นเพราะ... ผู้ว่าจ้างส่วนมากไม่มีเงินมากพอที่จะจ้างเมดมากกว่า 1 คนค่ะ"
1009505-52 = "[s] \"มิโดริข้อมูลแน่นจังเลยนะ\""
1009505-53 = "ค่ะ ระหว่างเตรียมวาดภาพ ฉันก็ค้นคว้ามาหลายเรื่องค่ะ"
1009505-60 = "เพราะงั้น! วันนี้ฉันก็เลยจะเป็นเมดอย่างจริงจังดูค่ะ!"
1009505-61 = "ขอให้ฉันได้จัดการงานเล็กๆ น้อยๆ ของชาเล่ต์นะคะ!"
1009505-63 = "(แล้วการฝึกงานเป็นเมดของมิโดริที่ไฟแรงก็เริ่มขึ้น...)"
1009505-65 = "งานพื้นฐานของเมดคงหนีไม่พ้นการทำความสะอาดใช่มั้ยคะ?"
1009505-69 = "ตามมุมต่างๆ ของสำนักงานมีฝุ่นเพียบเลยค่ะ..."
1009505-70 = "ปกติแล้วถ้าไม่ดูแลที่แบบนี้ให้ดี ฝุ่นก็จะมาเกาะจนเขรอะแบบนี้ค่ะ"
1009505-71 = "ที่จริงชมรมพัฒนาเกมของฉันก็เป็นเหมือนกันค่ะ..."
1009505-72 = "แต่ไม่ต้องห่วงนะคะคุณครู! ฉันจะทำความสะอาดให้เงาวับ ขนาดที่ถ้าเดินไม่ดีจะลื่นล้มเอาเลยค่ะ!"
1009505-73 = "[s] \"แต่เราก็ไม่ควรจะลื่นล้มหรือเปล่า?!\""
1009505-76 = "ต่อไปก็คืองานผู้ช่วยเรื่องอาหารสินะคะ!"
1009505-77 = "ถึงจะพูดสวยหรูว่าผู้ช่วยเรื่องอาหาร แต่ก็คงทำได้แค่ช่วยเก็บกวาดอาหารที่สั่งมาทานค่ะ..."
1009505-78 = "แต่จะว่าไป ถ้วยชามอาหารที่คุณครูสั่งมาทาน... มันเยอะ... เป็นภูเขาเลยนะคะ"
1009505-79 = "ฉันจะไปจัดการถ้วยชามพวกนั้นก่อนแล้วกันค่ะ"
1009505-80 = "[s] \"น่าขายหน้าจริงๆ เลย...\""
1009505-81 = "ไม่หรอกค่ะ ก็ฉันเป็นเมดนี่คะ"
1009505-84 = "การช่วยแต่งตัวก็เป็นหน้าที่หนึ่งของเมดใช่มั้ยคะ?"
1009505-85 = "[s5] \"เอ่อ มิโดริ? คุณมิโดริ...?\"\n[s6] \"ดูกระตือรือร้นมากไปแล้วหรือเปล่า...?"
1009505-88 = "ไม่หรอกค่ะ คุณครู ให้ฉันดูแลคุณครูทั้งกายและใจเถอะนะคะ"
1009505-95 = "เสื้อผ้าของคุณครูไม่เป็นระเบียบเรียบร้อยเลยค่ะ ให้ฉันช่วยจัดให้นะคะ"
1009505-100 = "ค่ะ ตอนนี้โอเคแล้วค่ะ ให้ฉันเอากระจกมาให้ดูมั้ยคะ?"
1009505-103 = "การล้างจานก็เป็นงานสำคัญของเมดค่ะ!"
1009505-107 = "แก้วมัคของคุณครู... วางซ้อนกันไว้ 5 ชั้นแล้วนะคะ..."
1009505-108 = "[s] \"ยอมรับผิดแล้ว...\""
1009505-109 = "ไม่หรอกค่ะ ก็ฉันเป็นเมดนี่คะ"
1009505-110 = "[s] \"เมื่อกี้ก็พูดแบบนี้ไปแล้วไม่ใช่เหรอ...?\""
1009505-111 = "ค่ะ หวังว่าจะไม่มีเรื่องให้ต้องพูดประโยคเดิมบ่อยๆ นะคะ"
1009505-120 = "วันนี้ฉันรู้สึกภูมิใจมากเลยค่ะ!"
1009505-121 = "ฉันถึงกับคิดเลยนะคะ... ว่าจะมาเป็นเมดถาวรให้คุณครูเลยดีมั้ย..."
1009505-122 = "[s] \"อ่า... อืม แบบนั้นครูน่าจะไม่สะดวกเท่าไร...\""
1009505-124 = "[ns] \"การลองเป็นเมดเพื่อการพัฒนาเกมถือว่าสำเร็จด้วยดีมั้ย?\""
1009505-125 = "คะ...?"
1009505-129 = "อ่า...!"
1009505-130 = "ฉันลืมเรื่องนี้ไปเลยค่ะ..."
1009505-131 = "ว่าไงนะคะ? ถ้าฉันสนุกกับงานเมดจนลืมเรื่องนั้นไป... ก็ถือว่านี่เป็นประสบการณ์ที่ยอดเยี่ยมเลย งั้นเหรอคะ?"
1009505-132 = "ขอบคุณนะคะที่ช่วยพูดปลอบกันอย่างนี้..."
1009505-133 = "ถะ... ถ้างั้น!"
1009505-134 = "ฉันขอร้องอะไรเป็นอย่างสุดท้ายได้มั้ยคะ?"
1009505-135 = "[s] \"ขออะไรเหรอ?\""
1009505-136 = "เอ่อ... คือว่า คือว่าเรื่องนั้น...!"
1009505-137 = "..."
1009505-138 = "ถึงจะยังไม่แน่ใจว่าจะใช้เป็นรูปหน้าปกหรือเปล่า..."
1009505-139 = "แต่ฉันอยากถ่ายรูปคอนเซ็ปต์ตอนที่ฉันเป็นเมดไว้น่ะค่ะ..."
1009505-140 = "เพราะงั้น... ถ้าคุณครูไม่ว่าอะไร..."
1009505-141 = "คุณครูช่วยถ่ายรูปฉันให้หน่อยได้มั้ยคะ...!"
1009505-146 = "(เมื่อได้ฟังบรีฟการถ่ายรูปคอนเซ็ปต์จากมิโดริ คุณครูก็หาจุดถ่ายรูปที่เหมาะสมในชาเล่ต์ให้)"
1009505-147 = "(และคอนเซ็ปต์ตามบรีฟของมิโดริก็คือ...!)"
1009505-151 = "― [log=미도리 메이드]ขะ... ขอโทษค่ะ นายท่าน![/log][wa:3430] "
1009505-152 = "― [log=미도리 메이드]ฉันเผลอทำพลาด จนหกล้มอีกแล้ว...[/log][wa:5180] "
1009505-155 = "― [log=미도리 메이드]ไม่เป็นไร... หรอกค่ะ ถ้าเป็นการตำหนิจากนายท่านละก็...[/log][wa:3170] "
1009505-156 = "― [log=미도리 메이드]ไม่ว่าจะเป็นอะไร... ฉันก็จะรับไว้ค่ะ...[/log][wa:3950] "
1009505-159 = "― [log=미도리 메이드]ปะ... เป็นยังไงบ้างคะ?[/log][wa:1590] "
1009505-162 = "[ns] \"รู้สึกเหมือนกำลังทำสิ่งที่ไม่ควรทำมากๆ เลยน่ะ!\""
1009505-163 = "― [log=미도리 메이드]ตะ... แต่ว่า เรากำลังอยู่ในสถานการณ์แบบนั้นนี่คะ![/log][wa:1220] "
1009505-164 = "― [log=미도리 메이드]แล้วคนที่ขอให้ช่วยถ่ายรูปให้ ก็คือฉัน...[/log][wa:5660] "
1009505-167 = "― [log=미도리 메이드]คือว่า คุณครูคะ?[/log][wa:2970] "
1009505-168 = "― [log=미도리 메이드]วันนี้เมดมิโดริ ทำได้น่าพอใจมั้ยคะ?[/log][wa:4660] "
1009505-171 = "ฮู่ว... รู้สึกเบาใจขึ้นมายังไงไม่รู้ค่ะ"
1009505-172 = "ขอบคุณนะคะ คุณครูทำได้ดีเลยค่ะ "
1009505-176 = "เอ๋ ทำไมทำหน้าอย่างนั้นล่ะคะ?"
1009505-177 = "[s] \"ไม่มีอะไรมากหรอก ครูแค่นับเลขในใจเพื่อตั้งสติอยู่น่ะ\""
1009505-178 = "อย่างงั้น... เหรอคะ?"
1009505-179 = "ฮุฮุ..."
1009505-180 = "คุณครู ครั้งนี้ฉันจะตั้งใจวาดรูปออกมาให้ดีเลยค่ะ"
1009505-181 = "และถ้าคุณครูไม่ว่าอะไร..."
1009505-182 = "ฉันอยากให้คุณครูได้เห็นภาพที่วาดเสร็จเป็นคนแรกเลยค่ะ จะได้มั้ยคะ?"
1009505-183 = "[s] \"อื้ม ครูจะตั้งตารอนะ\""
1009505-184 = "ค่ะ!"
