90002250-373 = "ทางมิลเลเนียมไม่มีกฎตายตัวว่าต้องตอบรับหรือดำเนินการตามขั้นตอนยังไงน่ะสิคะ"
90002250-376 = "[ns] \"ถ้ามีกฎแบบนั้น จะน่าแปลกกว่าอีกเนอะ...\""
90002250-377 = "ค่ะ ก็คงงั้นละค่ะ เพราะงั้นสำหรับเคสนี้น่ะ เราคงต้องมองเป็นกรณีพิเศษแล้วทำตามความคิดเห็นของ#nผู้มีอำนาจสูงสุดในการบริหารค่ะ"
90002250-378 = "แล้วประธานริโอะก็กลับมาพอดี จะบอกว่าทุกอย่างลงตัวพอดีก็คงได้ค่ะ"
