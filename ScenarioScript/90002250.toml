90002250-380 = "ก็น่าจะต้องใช้เวลาประชุมกันอย่างน้อย 4 วัน 3 คืนเลยค่ะ"
90002250-381 = "แต่พอประธานริโอะกลับมา ก็เท่ากับว่าเราข้ามขั้นตอนทั้งหมดนั้นไปได้ค่ะ"
