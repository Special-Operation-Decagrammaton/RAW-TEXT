[translation]
90002250-1 = "Episode 25;Epilogue 1"
90002250-3 = "Ah, Sensei!"
90002250-4 = "Sensei! And Aris and Toki too. Hiya!"
90002250-6 = "Hello!"
90002250-7 = "Hello. Today is a good day."
90002250-9 = "Come to think of it, I haven't seen you in a while... Did something happen?"
90002250-10 = "That's right! I had Student Rep duty two days ago, and you weren't there. You better have a good reason, Sensei!"
90002250-11 = "[s] \"Sorry! I'll make it up to you next week.\""
90002250-12 = "Really? Next week? I'll hold you to that promise."
90002250-20 = "Huh...? Did you just see something zoom by?"
90002250-22 = "?!"
90002250-23 = "Absolutely not! I-I-I am certain it was nothing! Surely! Right, Toki?!"
90002250-24 = "...Yes. You are \"right.\" Indeed..."
90002250-29 = "...?"
90002250-30 = "Hm...?"
90002250-31 = "[s1] \"Y-Yeah! What she said!\"\n[s2] \"I didn't see...or feel anything!\""
90002250-34 = "Is that so? Hmm, that's weird."
90002250-35 = "Sensei, you're not hiding something, are you? You seem surprisingly flustered. And a little sweaty."
90002250-36 = "Yeah, yeah. You're going to make things worse for yourself if you don't come clean!"
90002250-38 = "Waah! What should we do, Toki?!"
90002250-39 = "If necessary, I can deploy the repaired Abi-Eshuh and proceed with a \"physical\" memory erasure...!"
90002250-40 = "I-I do not think we should...!"
90002250-42 = "Ah! We can check CCTV and play it back. You can do that, right?"
90002250-43 = "Piece of cake."
90002250-44 = "[s] \"Y-You...really can do that?!\""
90002250-45 = "Of course we can. This is Millennium, after all. So, what was it?"
90002250-49 = "Huh...? Nothing interesting. Just us standing around."
90002250-50 = "Eh, whatever. Booooooring."
90002250-51 = "[s] \"See? You shouldn't be so quick to accuse people like that.\""
90002250-52 = "Lesson learned, okay?"
90002250-53 = "Yeah, Sensei. We'll catch you later. And you too, Aris and Toki! Be well!"
90002250-60 = "Th-That was close..."
90002250-61 = "We managed the mission. That said—Rio, Kei. I believe you are safe to come out."
90002250-67 = "What a relief..."
90002250-68 = "...You know, I get why Rio was hiding. But why did I join in, too?"
90002250-70 = "I suppose it was a team-building activity."
90002250-71 = "You don't have to voice every thought you have, Toki."
90002250-78 = "..."
90002250-79 = "What's wrong, Rio?"
90002250-80 = "I was just...realizing that I've finally returned here."
90002250-81 = "It is okay, Rio. I will be courageous with you! I am certain that all shall be—"
90002250-87 = "Oh my, how delightful. Greetings, Sensei and Aris. And Toki..."
90002250-88 = "G-Gah?!"
90002250-94 = "[ns3] \"Aris? Aris?! You said you'd be courageous!\"\n[ns4] \"If you hide behind me like that...!\""
90002250-97 = "What's wrong, Aris? You're acting like you've spotted a monster."
90002250-102 = "Ah... Sorry... That is not it... So..."
90002250-103 = "Fufu. And it is good to see you, Toki. I received your report. I assume this is a highly abridged version?"
90002250-107 = "Y-Yes. More information and details will later be r-revealed..."
90002250-108 = "[s] \"(Even Toki...is terrified...!)\""
90002250-109 = "Don't worry, Aris and Toki. You two have consistently done exemplary work under trying circumstances. "
90002250-110 = "And if you would pardon my manners, I feel I must stop and introduce myself."
90002250-114 = "Hello, Kei-Kei? It's wonderful to make your acquaintance. I'm Ushio Noa."
90002250-118 = "...I guess I'm \"Kei-Kei\" here too... Y-Yes, I mean. I am Tendou Kei. Nice to meet you, Noa."
90002250-119 = "Fufu. The pleasure's all mine. I look forward to working with you here in Millennium."
90002250-120 = "Also..."
90002250-127 = "Ugh...!"
90002250-128 = "..."
90002250-129 = "..."
90002250-130 = "It's been so long, President Rio."
90002250-131 = "W-Wait. I can...elucidate. "
90002250-132 = "It's fine, Rio. You don't need to explain things to me."
90002250-133 = "I-I don't...?"
90002250-134 = "Because there's someone else who really wants to hear your story."
90002250-135 = "Huh? Doesn't that mean...?!"
90002250-136 = "Yes."
90002250-140 = "Yuuka's been waiting to see you for so long, you know?"
90002250-141 = "?!"
90002250-142 = "Now then, would you please go through that door? Come in."
90002250-148 = "O-Okay..."
90002250-149 = "...Sensei. Even I'm feeling a little scared here..."
90002250-150 = "[s] \"My heart's about to stop...\""
90002250-151 = "By the way, President?"
90002250-152 = "H-Hm?"
90002250-153 = "Yuuka, on occasion, has been known to lose her temper. She even sulks."
90002250-154 = "Despite that, she's a kind friend of mine who is willing to listen to any reasonable request."
90002250-155 = "But, if Yuuka were to become...SERIOUSLY angry...not even I could help you."
90002250-156 = "So please mind your manners today."
90002250-157 = "?!"
90002250-158 = "S-Sensei...!"
90002250-159 = "[s] \"Rio.\""
90002250-161 = "[ns] \"Everyone...must steel their resolve sometimes...!\""
90002250-162 = "...Very well."
90002250-163 = "If this is the burden I must carry..."
90002250-172 = "Ah, President Rio. Please, have a seat. I heard you've been through a lot."
90002250-173 = "Or maybe I should be welcoming you back...finally...to Millennium?"
90002250-174 = "I heard you ended up saving Kivotos while we were twiddling our thumbs."
90002250-175 = "Excellent work. We are all SO grateful."
90002250-176 = "With that handled, shall we move on to the next topic?"
90002250-180 = "Yuuka, the thing is... Please hear me out. I can explain everything. So..."
90002250-181 = "What's wrong, President?"
90002250-182 = "It sounds almost like..."
90002250-183 = "...you think I'm going to bring up a delicate subject."
90002250-184 = "Or several. Embezzlement, conspiracy, several breaches of security..."
90002250-185 = "U-Ugh...!"
90002250-186 = "Now, then."
90002250-188 = "We can't avoid this forever, can we? It would be best to have a heart-to-heart."
90002250-189 = "You're fine with that, aren't you?"
90002250-190 = "Eeek...!"
90002250-197 = "Waah! Waaah! I'm scared!"
90002250-198 = "So this is...the rumored..."
90002250-200 = "Sensei, how shall we proceed?"
90002250-201 = "[s] \"Stay strong... We have to endure...!\""
90002250-208 = "Hm."
90002250-209 = "Somehow, I feel less stressed. It's almost...therapeutic."
90002250-215 = "R-Rio...?"
90002250-216 = "Are you okay, Rio? No, sorry...dumb question!"
90002250-225 = "[ns] \"Huh? Was that Koyuki? Why...?\""
90002250-227 = "..."
90002250-228 = "While it is difficult to ascertain the reason, she is likely in trouble."
90002250-229 = "[s] \"Probably...\""
90002250-231 = "[ns] \"More importantly, Rio! You good? You're fine, right...?\""
90002250-236 = "..."
90002250-237 = "Of course."
90002250-238 = "Of...course."
90002250-239 = "I prepared myself, per Sensei's recommendation..."
90002250-240 = "Um...it looks like you got a little more than you prepared for?"
90002250-241 = "..."
90002250-242 = "Sensei. Everyone, actually."
90002250-243 = "I've come to understand something."
90002250-244 = "While the truth...can sometimes..."
90002250-245 = "...almost...kill a person...mentally... We must..."
90002250-250 = "[ns5] \"Rio?! Rio!!\"\n[ns6] \"Noo...! Not Rio...!!\""
90002250-255 = "...Some might find this sight quite heartbreaking."
90002250-256 = "But I won't pity you, President. I fear that would make you feel even more miserable."
90002250-257 = "After all, your fate was sealed once you unleashed Yuuka's ire. There's no mitigating that."
90002250-263 = "*sigh* Honestly..."
90002250-264 = "[s7] \"H-Hi. Yuuka...?\"\n[s8] \"I-It's been a while, huh? R-Right?!\""
90002250-267 = "..."
90002250-268 = "That it has. Hello, Sensei. Aris and Toki—it's been so long."
90002250-269 = "...!"
90002250-270 = "H-Hello, Yuuka."
90002250-271 = "Yeah. Please say hi to Neru for me—no, I guess it would be \"Himari,\" wouldn't it?"
90002250-272 = "...Yes. I will deliver the greeting."
90002250-273 = "And..."
90002250-277 = "You're Kei, right?"
90002250-278 = "..."
90002250-279 = "Y-Yuuka! All is well! Kei is completely normal and has no problems! She is safe! "
90002250-280 = "If she is not acceptable, then...I-I will die with her!"
90002250-281 = "[s9] \"S-She's right! And I'll take responsibility.\"\n[s10] \"Aris, tone it down a little!\""
90002250-287 = "Hm? What's the matter, Sensei? And with you too, Aris."
90002250-288 = "..."
90002250-289 = "Very well. We'll have to talk more about this some other time, Sensei."
90002250-290 = "...!"
90002250-291 = "But still, about Aris and Kei..."
90002250-292 = "Waah..."
90002250-293 = "First, I ask you to stop being so scared. I'm aware of the general situation."
90002250-294 = "Huh...?"
90002250-295 = "...What? Eh..."
90002250-296 = "Why is that, Yuuka...?"
90002250-297 = "It's the same as your case, isn't it?"
90002250-298 = "What...? Like...how?"
90002250-303 = "She may have the uniform, but Kei needs to be properly enrolled! Isn't that right?"
90002250-305 = "...?"
90002250-307 = "...!"
90002250-308 = "Thank you, Yuuka!"
90002250-309 = "Yeah, I know. Very good, Aris."
90002250-313 = "And like I mentioned earlier, we need to have a talk later, Sensei. "
90002250-314 = "[s] \"U-Understood!\""
90002250-321 = "A-ny-way! President Rio has always been like this!!"
90002250-322 = "She never thinks about the consequences of her actions! The AGONY she puts others through. It's always \"the ends justify the means\" with her."
90002250-324 = "Oh, she thinks she can \"make money and pay the debt back\"? Who is she, Koyuki?!"
90002250-325 = "Of course, I know that YOU didn't mean to hurt anyone...or enable this behavior."
90002250-326 = "You'd never, ever think of hurting someone, but still! STILL!"
90002250-327 = "[s11] \"Yuuka, Yuuka! Let's have some chocolate, yeah?!\"\n[s12] \"Look! It's sugar-free!\""
90002250-332 = "Thank you, Sensei. *nom* *nom*"
90002250-333 = "Phew... That's better."
90002250-334 = "[s13] \"(We've been talking for hours...)\"\n[s14] \"(Still, I'm glad she feels better...)\""
90002250-337 = "So, for President Rio, the process would entail..."
90002250-338 = "...seeking accountability for tangible and intangible losses caused by her absence."
90002250-339 = "But ugh... There's a bit of a problem here. Millennium..."
90002250-340 = "...didn't lose anything tangible because of her absence."
90002250-341 = "If anything, I suppose losses only occurred once she became active again..."
90002250-342 = "[s15] \"I-In that case!\"\n[s16] \"You could ask her to resign from the presidency...?\""
90002250-347 = "Why? Who else could serve besides Rio?"
90002250-348 = "R-Regardless of your skepticism, Millennium is an academy fueled by meritocracy..."
90002250-349 = "In terms of ability, Rio is in a league of her own."
90002250-350 = "And on top of that, regarding her...transgressions, all I have is a blandly-formatted, Millennium-style report."
90002250-351 = "It contains...nothing that negates Rio's accomplishments."
90002250-352 = "After all, she saved the world...Kivotos."
90002250-353 = "[s17] \"Thank you for considering that...\"\n[s18] \"But I have another concern...\""
90002250-356 = "Hm? You want to know how we could \"handle President Rio\"?"
90002250-357 = "..."
90002250-358 = "You're right to question that... *sigh*"
90002250-359 = "But we ought to try, together. After all, Sensei, didn't you teach us to never give up on a student?"
90002250-360 = "And let's not forget that now we have YOU to help keep her in line!"
90002250-361 = "[s] \"Yeah. I'm sure Rio has learned her lesson.\""
90002250-363 = "[ns] \"...Right?\""
90002250-364 = "You're asking me? Well, you know I empathize..."
90002250-365 = "How about we move to the next order of business? Transferring one...\"Tendou Kei.\""
90002250-366 = "Hm? You want to know if \"it'll work out\"?"
90002250-367 = "..."
90002250-368 = "There was some...ambiguous wording in the rules. Some things were open to interpretation."
90002250-371 = "After all, Kei came here with no history, no background checks... It was as if a girl appeared out of nowhere and wanted an education."
90002250-372 = "And when it comes down to...UGH, I hate this expression...prospective students \"magically appearing\"..."
90002250-373 = "...Millennium has no established procedure."
90002250-376 = "[ns] \"...It would be pretty weird if you did.\""
90002250-377 = "Indeed. Which is why we decided that it would be best to treat this situation as a special case. We deferred to the highest authority."
90002250-378 = "Which happened to be quite convenient, seeing that President Rio had returned."
90002250-379 = "If this happened a week ago, we'd debate who's in charge, who oversees, who's on the ethics committee,..."
90002250-380 = "...It would go on for, at minimum, three nights and four days."
90002250-381 = "But, thanks to President Rio, we skipped all that."
90002250-382 = "[s] \"I can guess...but what did Rio actually say?\""
90002250-383 = "Hmm? What do you think, Sensei?"
90002250-384 = "Fufu. As you thought. Millennium's founding mission is to admit any student who is willing to learn."
90002250-388 = "So, naturally, Kei is now a transfer student at Millennium Science School!"
90002250-389 = "[s] \"Already?!\""
90002250-390 = "We've already done this with Aris."
90002250-391 = "Sure, it was difficult the first time. But it was an easy process with Kei."
90002250-392 = "Now, let's get to the real reason I came all the way here..."
90002250-393 = "[s] \"A-And what is that?\""
90002250-394 = "..."
90002250-399 = "DO! YOU! REALIZE! HOW! MUCH! I! WORRIED! ABOUT! YOU?!"
90002250-400 = "You know how much trouble I went through to find out where you were? And then it turns out you were fighting ROBOTS in the frozen tundra?"
90002250-401 = "I was so concerned. And you didn't give me any details! I was just supposed to TRUST that everything would work out?"
90002250-402 = "I know...I know it wasn't a good time. You were in a rush. The Steel Continent was expanding, and you had a job..."
90002250-403 = "But... But still...!"
90002250-405 = "I was scared, you know..."
90002250-406 = "[s] \"I'm sorry, Yuuka.\""
90002250-407 = "I don't believe you..."
90002250-408 = "[s] \"I won't do it again.\""
90002250-409 = "Don't make promises you can't keep. If something like this happens again... You know you'll leave again."
90002250-410 = "[s19] \"Uh, um. I can't deny that...\"\n[s20] \"But I'll at least try...to not go without saying anything.\""
90002250-413 = "...Really?"
90002250-414 = "[s] \"Y-Yeah!\""
90002250-415 = "...Fine."
90002250-418 = "Instead, you have to tell me everything that happened on the Steel Continent. Every detail."
90002250-419 = "What about the \"report,\" you ask? That's all it was, written in typical Millennium style."
90002250-420 = "Stripped of as many modifiers as possible...devoid of emotion to cite pure fact...concise statements based strictly on cause and effect..."
90002250-421 = "It was written under the mindset that words and language are mere tools—and tools must be used rationally and efficiently."
90002250-422 = "It was quite literally the quintessential Millennium-style report."
90002250-423 = "[s] \"Right. Then it sounds like I definitely need to step in.\""
90002250-424 = "Heehee. Thank you for understanding."
90002250-428 = "[ns] \"Well then... Where should I start...?\""
90002250-430 = "And so, I told Yuuka everything that happened."
90002250-431 = "I laughed, marveled, sometimes doubted, and even...wept at the end."
90002250-448 = "I told her about the Steel Continent, Decagrammaton, Ein, Sof, and Ohr."
90002250-449 = "...As well as Kei's story."
90002250-453 = "Sensei."
90002250-454 = "[s] \"Hm?\""
90002250-455 = "Are you sleepy?"
90002250-456 = "[s] \"A bit... No, I actually am a little tired.\""
90002250-457 = "I see."
90002250-458 = "Please spend the rest of today getting some rest."
90002250-459 = "And don't worry."
90002250-466 = "No matter what happens...or what it takes..."
90002250-467 = "I'll make sure that Kei and Aris have a place at Millennium."
90002250-468 = "You worked very hard. Great work. And, also..."
90002250-472 = "Thank you."
90002250-474 = "Next Episode;Epilogue 2"
