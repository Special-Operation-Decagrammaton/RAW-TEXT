90002250-67 = "โล่งอกไปที..."
90002250-68 = "พอมาคิดดูแล้ว... ฉันก็พอจะเข้าใจสถานการณ์ของริโอะอยู่หรอกนะคะ แต่ทำไมฉันถึงต้องซ่อนตัว#nไปด้วยอีกคนล่ะคะ..."
