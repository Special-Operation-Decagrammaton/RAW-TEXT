90002250-356 = "คะ? สงสัยว่าฉันจะรับมือประธานริโอะในหลายๆ แง่ได้หรือเปล่าน่ะเหรอคะ...?"
90002250-357 = "..."
90002250-358 = "ก็นั่นน่ะสิคะ... เฮ้อ..."
90002250-359 = "แต่ยังไงก็ต้องลองดูสักตั้งค่ะ คุณครูก็คงไม่ทอดทิ้งนักเรียนหรอกใช่มั้ยคะ?"
90002250-360 = "แล้วครั้งนี้ก็จะมีคุณครูคอยเฝ้าดูอยู่ด้วยนี่คะ?"
