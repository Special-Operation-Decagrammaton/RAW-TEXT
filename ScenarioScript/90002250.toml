[translation]
90002250-1 = "第25話;尾聲（１）"
90002250-3 = "啊，老師！"
90002250-4 = "你好，老師！愛麗絲和季也是，你們好呀！"
90002250-6 = "你好！"
90002250-7 = "你好。今天天氣真不錯呢。"
90002250-9 = "這麼說來，這幾天好像都沒看到老師……是發生了什麼事嗎？"
90002250-10 = "就是說啊！我前天可是夏萊的值日生呢，請老師負起責任！"
90002250-11 = "[s]「抱歉抱歉。」"
90002250-12 = "咦，下禮拜……？#n真的嗎？我們約好了哦？"
90002250-20 = "嗯……？剛才是不是有什麼東西經過……？"
90002250-22 = "！？！？"
90002250-23 = "什，什什，什麼都沒有！對吧，季！？！？"
90002250-24 = "是，是的……沒錯。"
90002250-29 = "……？"
90002250-30 = "哼嗯……？"
90002250-31 = "[s1]「對，對啊！就是這樣沒錯！」\n[s2]「我什麼都沒看到……什麼都沒感覺到啊！？！？」"
90002250-34 = "是嗎～？感覺怪怪的耶～？"
90002250-35 = "老師該不會在隱瞞什麼吧？#n看起來好像特別慌張哦？"
90002250-36 = "對啊對啊～這樣反而更會讓人起疑心耶。"
90002250-38 = "嗚哇！該怎麼辦才好，季！？"
90002250-39 = "真的有必要的話，就召喚修復好的Abi-Eshuh進行物理性的記憶消除……！"
90002250-40 = "我，我覺得那樣是不行的……！！！"
90002250-42 = "對了！只要看一下監視器就知道了吧！#n做得到嗎？"
90002250-43 = "這種程度輕輕鬆鬆。"
90002250-44 = "[s]「真，真的能做到嗎！？」"
90002250-45 = "那當然，這裡可是千年呢。#n……怎麼樣？有看到什麼嗎？"
90002250-49 = "唔嗯……？真的什麼都沒有耶……"
90002250-50 = "唉，什麼嘛。真無聊。"
90002250-51 = "[s]「咳，咳哼。不可以隨便懷疑別人哦～」"
90002250-52 = "是～"
90002250-53 = "那麼老師，下次再見囉。#n愛麗絲和季，待會見～"
90002250-60 = "差，差點就出大事了……"
90002250-61 = "總算順利應付過去了呢。#n莉央大人、Kei，現在可以出來了。"
90002250-67 = "太好了……"
90002250-68 = "仔細想想，莉央故且不談，為什麼連我也要躲起來呢……"
90002250-70 = "我想這也是某種團隊合作吧。"
90002250-71 = "不要老是想到什麼就說什麼好嗎……"
90002250-78 = "……"
90002250-79 = "你怎麼了，莉央？"
90002250-80 = "那個……只是覺得，真的來到這裡了呢……"
90002250-81 = "沒問題的，莉央前輩。愛麗絲也會一起鼓起勇氣！#n相信一定會順利──"
90002250-87 = "哎呀。你好，老師。#n愛麗絲醬和季也在呢？"
90002250-88 = "嗚，嗚哇！？！？"
90002250-94 = "[ns3]「愛麗絲？愛麗絲！？不是說好要鼓起勇氣嗎！」\n[ns4]「怎麼突然躲到老師身後了……！」"
90002250-97 = "怎麼了嗎，愛麗絲醬？#n你的反應就像看到了非常可怕的東西一樣呢。"
90002250-102 = "不，不是的。 #n對不起……我沒有那個意思……只是……"
90002250-103 = "呵呵。季同學也是，你好呀？報告我已經收到了。#n當然我相信那想必是省略了許多細節的版本。"
90002250-107 = "是，是的。關於該事件的詳細內容，還請留待日後……"
90002250-108 = "[s]（那個季……居然會嚇成這樣……！）"
90002250-109 = "沒關係的。愛麗絲醬、季同學。#n真的辛苦你們了。"
90002250-110 = "雖然可能有點失禮，但我想和在場的其他人多聊一下──"
90002250-114 = "你好呀，Kei醬？#n這是第一次直接和你見面吧？我是生塩乃愛。"
90002250-118 = "這裡也確定是Kei醬了呢……#n是，是的。我是天童Kei。很高興認識你，乃愛。"
90002250-119 = "呵呵，很高興能見到你。#n往後在千年還請多多關照。"
90002250-120 = "還有……"
90002250-127 = "唔……！"
90002250-128 = "……"
90002250-129 = "……"
90002250-130 = "真的是好久不見了呢，莉央會長。"
90002250-131 = "等，等等，我可以解釋……"
90002250-132 = "沒關係，莉央會長。#n您不必特地向我解釋。"
90002250-133 = "是，是嗎……？"
90002250-134 = "因為想聽莉央會長解釋的，另有其人哦。"
90002250-135 = "咦？你指的難道是……！？"
90002250-136 = "沒錯。"
90002250-140 = "優香醬他啊，一直在等著會長哦？"
90002250-141 = "！？！？"
90002250-142 = "那麼，麻煩您從那邊的門進去吧？"
90002250-148 = "我，我知道了……"
90002250-149 = "老師，我也開始感到害怕了……"
90002250-150 = "[s]「我也有種心臟快要凍結的感覺……」"
90002250-151 = "話說……會長？"
90002250-152 = "怎，怎麼了嗎？"
90002250-153 = "雖然優香醬平時看起來經常生氣，有時候也會鬧彆扭。"
90002250-154 = "不過他最終還是會答應大部分的請求……是我溫柔的朋友。"
90002250-155 = "然而如果優香醬真的生起氣來，就連我也愛莫能助。"
90002250-156 = "所以……今天還請您務必小心留意哦？"
90002250-157 = "！？！？！？"
90002250-158 = "老，老師……！"
90002250-159 = "[s]「莉央。」"
90002250-161 = "[ns]「人有時候……必須下定決心……！」"
90002250-162 = "……我知道了。"
90002250-163 = "如果這就是我必須背負的重擔……"
90002250-172 = "哎呀，莉央會長。歡迎回來。#n聽說你經歷了許多大風大浪呢？"
90002250-173 = "應該先歡迎你終於回歸了千年嗎？"
90002250-174 = "從結果上來看，會長似乎是在我們不知情的時候拯救了奇普托斯。"
90002250-175 = "整體而言，這個部分真的辛苦你了。"
90002250-176 = "如果不把應該鼓勵和認可的部分好好提出來，我們就無法進入下一個話題了對吧？"
90002250-180 = "優香，那個……你聽我說。#n我全部都可以解釋，所以──"
90002250-181 = "怎麼了，會長？"
90002250-182 = "那種說法聽起來……"
90002250-183 = "就好像是我一直對於會長以前隱瞞的，包含挪用預算在內的諸多問題……"
90002250-184 = "努力避而不談一樣呢？"
90002250-185 = "唔，唔……！"
90002250-186 = "那麼──"
90002250-188 = "接下來，我們也差不多該來聊聊更深入的話題了。"
90002250-189 = "沒問題吧？"
90002250-190 = "噫噫……！"
90002250-197 = "嗚哇！嗚哇！愛麗絲好害怕！"
90002250-198 = "這就是……傳說中的……"
90002250-200 = "老師，我們該怎麼辦……！"
90002250-201 = "[s]「必須撐住……要忍耐……！」"
90002250-208 = "唔嗯……"
90002250-209 = "不知為何，連我也感覺壓力獲得釋放了呢。"
90002250-215 = "莉，莉央前輩……？"
90002250-216 = "你還好嗎，莉央？#n不，一眼就能看出一點都不好……！"
90002250-225 = "[ns]「咦？小雪是什麼時候？為什麼……？」"
90002250-227 = "……"
90002250-228 = "我也不太清楚，不過大概是做了什麼必須受罰的事吧。"
90002250-229 = "[s]「說的也是……」"
90002250-231 = "[ns]「話說莉央你還好嗎？沒事吧……？」"
90002250-236 = "……"
90002250-237 = "不用擔心。"
90002250-238 = "我……我沒事。"
90002250-239 = "就像老師說的，我已經做好心理準備了……"
90002250-240 = "不過你受到的傷害，看起來似乎比預期大上好幾倍呢……？"
90002250-241 = "……"
90002250-242 = "老師，還有大家。"
90002250-243 = "我切身體會到了一件事。"
90002250-244 = "所謂的真相……有時候……"
90002250-245 = "也是能在精神上……讓人瀕臨死亡的呢……"
90002250-250 = "[ns5]「莉央！？莉央～！！！」\n[ns6]「嗚嗚嗚……！莉央居然變成了這樣……！！！」"
90002250-255 = "雖然從某些角度來看，這是個令人心痛的場景……"
90002250-256 = "不過我是不會同情您的，會長。#n因為那樣只會導致會長更加悲慘而已。"
90002250-257 = "況且從惹怒優香醬的那一刻起，這就已經是難以從輕發落的狀況了。"
90002250-263 = "唉……真是的……"
90002250-264 = "[s7]「嗨，嗨～優香……？」\n[s8]「我，我們好像有點久沒見了呢！對，對吧！？」"
90002250-267 = "……"
90002250-268 = "是啊。你好，老師。#n我們確實如你所說，很久沒見了呢。#n還有愛麗絲醬和季也是。"
90002250-269 = "……！"
90002250-270 = "你，你好。優香。"
90002250-271 = "寧瑠前輩……不，這種時候應該要請你替我向陽葵前輩問好呢。"
90002250-272 = "……知道了，我一定會向他轉達。"
90002250-273 = "還有……"
90002250-277 = "你就是Kei醬吧？"
90002250-278 = "……"
90002250-279 = "優，優香！不用擔心！#nKei他沒問題的！真的很安全！"
90002250-280 = "要是發生什麼問題的話……愛，愛麗絲也會一起死的！"
90002250-281 = "[s9]「是啊！沒錯！老師也會負責的，好嗎？」\n[s10]「總之先冷靜下來……我們慢慢聊吧！」"
90002250-287 = "咦？為什麼突然這樣？#n就連愛麗絲醬也是……"
90002250-288 = "……"
90002250-289 = "好吧。那麼與老師有關的事，我們就待會去夏萊再聊。"
90002250-290 = "……！"
90002250-291 = "然後，有關愛麗絲醬和Kei醬的事……"
90002250-292 = "嗚哇……"
90002250-293 = "拜託你們別那麼害怕。#n我已經大致瞭解過情況了。"
90002250-294 = "什麼……？"
90002250-295 = "咦……？"
90002250-296 = "為什麼呢，優香……？"
90002250-297 = "就跟你那時候的情況一樣。"
90002250-298 = "嗯……？"
90002250-303 = "Kei醬也得辦理轉學手續對吧？"
90002250-305 = "……？"
90002250-307 = "……！"
90002250-308 = "謝謝你，優香！"
90002250-309 = "嗯嗯，好乖好乖。"
90002250-313 = "然後就像剛才說的一樣，老師晚點來跟我聊聊吧。"
90002250-314 = "[s]「遵，遵命！」"
90002250-321 = "總～之～！雖然以前就是這樣，但莉央會長他也真是的！！！"
90002250-322 = "完全不考慮別人的辛苦！總覺得只要結果好就行了！"
90002250-324 = "什麼叫做最後賺回來補上就好啊！？#n那種行為跟小雪有什麼兩樣！"
90002250-325 = "當然我也知道會長其實沒有惡意！"
90002250-326 = "而且他本來就是個心軟的人，根本做不出什麼壞事！"
90002250-327 = "[s11] 「優香，優香！我們來吃點巧克力好嗎！？」\n[s12] 「聽說這是用代糖取代砂糖的零卡巧克力！」"
90002250-332 = "謝謝你，老師。#n嚼嚼……"
90002250-333 = "呼……心情好多了。"
90002250-334 = "[s13]（雖然聊了好幾個小時……）\n[s14]（不過能讓他消氣真是太好了……）"
90002250-337 = "雖然以行政上的程序來說……"
90002250-338 = "應該要求莉央會長他，對於自己缺席所產生的各種損失負起責任才對……"
90002250-339 = "唔唔……可是這裡卻有個問題。"
90002250-340 = "那就是我們千年……其實並沒有因為會長的缺席，而產生實質上的損失。"
90002250-341 = "或者應該說，損失反而是從他現身活動之後才造成的……"
90002250-342 = "[s15]「所，所以作為交換……！」\n[s16]「是要讓莉央辭去會長的職位……之類的？」"
90002250-347 = "沒有啊？除了莉央會長之外，還有誰能擔任會長呢？"
90002250-348 = "為，為什麼要擺出那麼意外的表情……？#n我們千年本來就是一所能力至上的學園……"
90002250-349 = "單純以能力來說，也沒有學生能比得上莉央會長。"
90002250-350 = "況且這次的事件，雖然我目前只收到了千年式的報告……"
90002250-351 = "不過從內容來看，會長取得的成果也無可挑剔。"
90002250-352 = "畢竟是拯救了世界……拯救了奇普托斯嘛。"
90002250-353 = "[s17]「謝謝你願意這麼想……」\n[s18]「不過有件事我突然有點擔心……」"
90002250-356 = "咦？我有沒有辦法應付得了莉央會長……？"
90002250-357 = "……"
90002250-358 = "說的也是呢……唉……"
90002250-359 = "不過總是得試試看才知道。#n老師是不會放棄任何學生的對吧？"
90002250-360 = "從這個意義上來說，這次還有老師這個煞車在嘛！"
90002250-361 = "[s]「是啊。我相信莉央應該也已經學到了很多才對。」"
90002250-363 = "[ns]「……應該有學到吧？」"
90002250-364 = "為什麼要問我呢……#n雖然我也能理解那種心情啦。"
90002250-365 = "總之，下一個議題是關於Kei醬的轉學手續。"
90002250-366 = "咦？問我能不能順利是嗎？"
90002250-367 = "……"
90002250-368 = "以規則來說確實有點曖昧。"
90002250-371 = "畢竟這就像是一個名叫Kei的學生，突然「鏘！」一聲從千年正中央冒了出來。"
90002250-372 = "雖然我不太喜歡這種說法，不過對於突然跟「魔法」一樣出現的學生……"
90002250-373 = "究竟該如何接納與進行後續處理，在千年的校規之中並沒有相關的規定。"
90002250-376 = "[ns]「如果真的有那種校規反而才奇怪吧……」"
90002250-377 = "是啊，我也這麼認為。#n所以將這個情況視為特例，遵從最高決策者的指示才是比較適當的做法。"
90002250-378 = "幸好莉央會長回來得正是時候。"
90002250-379 = "否則要是在以前……比如一週前的話，該由誰來決定、誰來負責、如何觀察情況……"
90002250-380 = "少說也得開上四天三夜的會議吧。"
90002250-381 = "多虧有他才能省掉那些流程。"
90002250-382 = "[s]「雖然能猜到答案……莉央他怎麼說？」"
90002250-383 = "哼嗯……你覺得他會怎麼說呢，老師？"
90002250-384 = "呵呵，沒錯。#n況且將有學習意願的學生拒於門外，也違背了千年的創校宗旨。"
90002250-388 = "從這個意義上來說，Kei醬從現在開始就是千年科學學園的轉學生了！"
90002250-389 = "[s]「這麼快！？」"
90002250-390 = "畢竟在愛麗絲醬的時候就有經歷過了嘛。"
90002250-391 = "第一次做的時候比較困難，第二次之後就沒什麼好怕的了。"
90002250-392 = "另外，我之所以特地來找老師……可不只有這些原因哦！"
90002250-393 = "[s] 「像，像是什麼呢……？」"
90002250-394 = "……"
90002250-399 = "你知道……我有多擔心老師嗎！？"
90002250-400 = "就連那個時候也是！#n好不容易才找到你的位置，結果居然跑到凍原地帶去了！？"
90002250-401 = "明明我那麼擔心，你卻只說會想辦法解決……也沒有好好說明情況……"
90002250-402 = "當然我知道那時候沒有時間和餘裕……#n而且多虧了老師，鋼鐵大陸的危機也已經解決了……"
90002250-403 = "可是，可是……"
90002250-405 = "我真的，非常擔心你啊……"
90002250-406 = "[s] 「對不起，優香。」"
90002250-407 = "以後不管你了啦……"
90002250-408 = "[s] 「我不會再這樣了。」"
90002250-409 = "要是之後又發生類似的事情，你還是會這樣做吧……"
90002250-410 = "[s19] 「唔嗯……雖然沒辦法否認……」\n[s20] 「不過我會努力避免什麼都沒說就消失的。」"
90002250-413 = "……真的嗎？"
90002250-414 = "[s] 「嗯，嗯！」"
90002250-415 = "……我知道了。"
90002250-418 = "那麼作為交換，老師接下來要更詳細地告訴我鋼鐵大陸發生的事情，知道了嗎？"
90002250-419 = "你說我應該已經收到報告了……？#n是這樣沒錯，不過我也說過那是「千年式」的報告書。"
90002250-420 = "盡可能排除修飾語……不帶情感地陳述事實……以原因和結果為主簡潔敘述……"
90002250-421 = "將言語同樣視為資源，並盡可能合理且有效率地加以運用。"
90002250-422 = "可說是充滿千年風格的報告書。"
90002250-423 = "[s] 「好吧。這確實也是我該做的事。」"
90002250-424 = "呵呵，謝謝你的理解。"
90002250-428 = "[ns] 「我想想……該從哪裡說起好呢……」"
90002250-430 = "（就這樣笑著、感嘆著，有時不敢置信，最後甚至哭了出來）"
90002250-431 = "（把所有事情都告訴了優香）"
90002250-448 = "（鋼鐵大陸、十字神名、Ain、Soph、Aur）"
90002250-449 = "（以及有關Kei的事情）"
90002250-453 = "老師。"
90002250-454 = "[s] 「嗯？」"
90002250-455 = "你睡著了嗎？"
90002250-456 = "[s] 「我有點……不，其實還挺睏的。」"
90002250-457 = "這樣啊。"
90002250-458 = "今天就好好休息吧。"
90002250-459 = "請不必擔心。"
90002250-466 = "不管發生什麼事情……無論要用什麼方法。"
90002250-467 = "我都一定會像愛麗絲醬的時候一樣，為Kei醬準備好在千年的容身之處的。"
90002250-468 = "真的辛苦你了。"
90002250-472 = "還有……謝謝你。"
90002250-474 = "下一話;尾聲（２）"
