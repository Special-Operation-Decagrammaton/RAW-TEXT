90002250-415 = "เข้าใจแล้วค่ะ..."
90002250-418 = "ถ้างั้นละก็ เพื่อเป็นการชดเชย! จากนี้คุณครูต้องเล่าเรื่องที่เกิดขึ้นในดินแดนเหล็กกล้าให้ฉันฟัง#nอย่างละเอียดเลยนะคะ"
