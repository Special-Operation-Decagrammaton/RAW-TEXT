90002250-325 = "แน่นอนว่าประธานก็ไม่ได้ทำแบบนั้นด้วยเจตนาไม่ดี!"
90002250-326 = "แล้วฉันก็รู้ด้วยค่ะว่าประธานน่ะเป็นคนจิตใจบอบบางที่คิดทำเรื่องไม่ดีไม่ได้ด้วยซ้ำ แต่ถึงยังไงก็เถอะ!"
90002250-327 = "[s11] \"ยูกะ ยูกะ! เรากินช็อกโกแลตกันเถอะ นะ?!\"\n[s12] \"กินช็อกโกแลตก่อนนะ มีสารให้ความหวานแทนน้ำตาลด้วย!\""
90002250-332 = "ขอบคุณค่ะ คุณครู ง่ำๆๆ..."
90002250-333 = "ฮู่ว... ค่อยรู้สึกดีขึ้นหน่อยนะคะ"
90002250-334 = "[s13] (ก็มาคุยกันอยู่ตั้งหลายชั่วโมงนี่เนอะ...)\n[s14] (ค่อยยังชั่วหน่อยที่ดูใจเย็นลงแล้ว...)"
90002250-337 = "เอาเป็นว่าทางเราจะมีการเรียกร้องความรับผิดชอบจากประธานริโอะตามระเบียบ"
90002250-338 = "ต่อความเสียหายทั้งทางตรงและทางอ้อมที่เกิดขึ้นจากการที่ประธานหายตัวไปจนถึงตอนนี้ค่ะ"
90002250-339 = "อึก... แต่ตรงนี้มันมีปัญหานิดหน่อยน่ะค่ะ ก็ที่มิลเลเนียมน่ะ..."
90002250-340 = "ไม่ได้เกิดเรื่องอะไรเลวร้ายเป็นพิเศษจากการที่ประธานไม่อยู่น่ะสิคะ..."
90002250-341 = "หรือควรจะบอกว่าความเสียหายมันเกิดขึ้นหลังจากที่มาปรากฏตัวและเริ่มลงมือทำอะไรแล้วดี..."
90002250-342 = "[s15] \"ถ้างั้นจะให้ออกจากตำแหน่งแทนเหรอ?\"\n[s16] \"ถ้างั้นจะให้ริโอะออกจากตำแหน่งแทนเหรอ...?\""
90002250-347 = "เปล่าสักหน่อยค่ะ ถ้าไม่ใช่ประธานริโอะ แล้วจะให้ใครเป็นประธานล่ะคะ?"
90002250-348 = "ทะ... ทำไมถึงทำสีหน้าเหมือนคาดไม่ถึงอย่างนั้นล่ะคะ...? มิลเลเนียมก็เป็นโรงเรียนที่ให้ความสำคัญ#nกับความสามารถอยู่แล้ว..."
90002250-349 = "ถ้ามองในแง่ของความสามารถแล้วละก็ ไม่มีนักเรียนคนไหนเทียบเท่าประธานริโอะได้หรอกค่ะ"
90002250-350 = "แล้วเรื่องนี้น่ะ ฉันก็ได้รับรายงานตามมาตรฐานของมิลเลเนียมมาเท่านั้น"
90002250-351 = "จากความสำเร็จของประธานที่ปรากฏตามเนื้อหาในรายงาน ก็ไม่มีจุดไหนที่ฉันจะว่าอะไรได้ด้วยค่ะ"
90002250-352 = "ก็นั่นเป็น... การช่วยเหลือโลกและคิโวทอสไว้นี่คะ"
