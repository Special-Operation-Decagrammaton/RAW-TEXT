90002250-363 = "[ns] \"คงได้บทเรียนแล้วละเนอะ...?\""
90002250-364 = "ฉันก็เข้าใจความรู้สึกของคุณครูอยู่หรอก... แต่เรื่องแบบนี้ทำไมถึงมาถามจากฉันล่ะคะ"
90002250-365 = "เอาเถอะค่ะ ประเด็นต่อไปก็คือการย้ายโรงเรียนของเคย์จังค่ะ"
90002250-366 = "คะ? ทุกอย่างราบรื่นดีหรือเปล่าน่ะเหรอคะ?"
90002250-367 = "..."
90002250-368 = "ถ้าจะว่ากันตามหลักการแล้ว ก็มีจุดที่ชวนให้สับสนในการตีความอยู่ค่ะ"
90002250-371 = "ในแง่หนึ่งก็เหมือนว่ามีนักเรียนคนหนึ่งที่ชื่อเคย์ ที่จู่ๆ ก็โผล่มากลางโรงเรียนวิทย์มิลเลเนียมเลยนี่คะ?"
