90002250-394 = "..."
90002250-399 = "ไม่รู้เหรอคะ! ว่าฉัน! เป็นห่วง! คุณครู! มากแค่ไหน?!"
90002250-400 = "ทีตอนนั้นก็ด้วย! ฉันอุตส่าห์สืบหาตำแหน่งได้! แต่ปรากฏว่าคุณครูไปโผล่อยู่ในเขตทุนดรา!"
