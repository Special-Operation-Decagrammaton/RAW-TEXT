[translation]
10052153-8 = "อะ... อึก... อึกกก..."
10052153-9 = "จะหนีไม่ได้สิ... หนีไม่ได้... หนีไม่ได้..."
10052153-12 = "ทะ... ทำยังไงดีล่ะคะ ประธานริโอะ! ขืนเป็นแบบนี้ต่อไป ยูสึจังคง...!"
10052153-13 = "มะ... มะมะมะมะ... ไม่มีท่าไม้ตายอะไรเหรอ?!?!"
10052153-14 = "ท่าไม้ตาย..."
10052153-18 = "ยูสึ! ฉันจะปลดล็อกข้อจำกัดทั้งหมดของหุ่นรบล้ำยุคนีโอให้เดี๋ยวนี้! แล้วก็..."
10052153-19 = "จะติดตั้ง[ruby=Battle Gear]อุปกรณ์ต่อสู้[/ruby] 'ของเธอโดยเฉพาะ' ให้ด้วย!"
