[translation]
1013503-1 = "Welcome to Kivotos"
1013503-2 = "I headed to Millennium to observe Kei's class."
1013503-3 = "Kei struck a very familiar expression the moment she caught my gaze."
1013503-10 = "Greetings, everyone."
1013503-11 = "Today's lesson is on \"Living Spaces and Society.\""
1013503-12 = "Regarding that, I intend to focus especially on the infrastructure involved in city planning, and how this impacts the populace."
1013503-13 = "Now, let's see... Kei?"
1013503-14 = "Can you tell me what you know about cities?"
1013503-15 = "Huh? Me? \"Kei,\" as in me?"
1013503-16 = "Yes, please. You're the only one."
1013503-17 = "Oh. Um..."
1013503-18 = "Basically, a \"city\" stands at a dichotomy. It's a human construct, usually thought to contrast with the so-called \"pure\" state of untouched nature."
1013503-19 = "The term \"civilization\" has the root \"civil,\" with the etymology of \"city,\" or \"civitas\" in the original form. \"Civil\" clearly is the root of words like \"civilization\" and \"civics,\" implying that the construction of space is what makes us \"people,\" so to speak."
1013503-20 = "Without cities, well..."
1013503-21 = "In other words, if there was no foundation where humans could gather, share ideas, and learn to cooperate, then the world as we know it would not exist."
1013503-22 = "After all, humans are communal animals. They bring fantasy into reality through collective creativity and ingenuity."
1013503-23 = "(Oh, ohhh?!)"
1013503-24 = "(That's...a fascinating point!)"
1013503-26 = "...When you compare ancient times to modern day, it becomes clear that our current living conditions are in a state of deterioration due to increasingly dense populations."
1013503-27 = "There's no real solution in our contemporary times. We've reached an unprecedented era of capitalism, where to have \"worth\" in \"civilization\" means gathering at a central location to perform labor."
1013503-28 = "...To be practical, I think our next steps should be relieving traffic congestion and mitigating environmental pollution."
1013503-29 = "(She covered all of today's lesson points!)"
1013503-30 = "(I...I'm the instructor, what do I...?)"
1013503-32 = "...I may have gone on a tangent by discussing quantum fields. I know they seem unrelated to vectors."
1013503-33 = "But, ultimately, this is a problem asking you to prove that the mass gap is greater than zero. And that is inextricable from mathematics."
1013503-34 = "It's not about raw calculations. That's only somewhat possible—just like how a general fluid dynamics equation can still somehow be solved through computational fluid dynamics."
1013503-35 = "Furthermore, this is due to the structural limits of mathematics. First of all, path integrals—"
1013503-36 = "Mm, hmm...! Indeed!"
1013503-37 = "Th-That's all for today's lesson. It's a little early... But how about we all get some fresh air?"
1013503-43 = "Incredible!"
1013503-44 = "I thought she had an aura about her, but this transfer student is amazing!"
1013503-46 = "Wh-What?"
1013503-47 = "Hey, you're Kei-Kei, right? Where did you previously go to school? Did you skip a few grades, or something?"
1013503-48 = "You mentioned the mass gap hypothesis, right? You must know that our school was founded to solve the Millenium Conundrum! Hence the name! You should join our club!"
1013503-49 = "W-Well, no, that is, I..."
1013503-51 = "We locked eyes across the room."
1013503-52 = "While holding a strained expression, Kei silently mouthed a message."
1013503-53 = "It looked like, \"What are you doing?! Save me!\""
1013503-55 = "And so, I mouthed a reply back."
1013503-57 = "[ns] \"I'm so glad Kei-Kei is making friends!\""
1013503-59 = "(First I'll kill Sensei, then I'll rip out my power supply and DIE!)"
1013503-61 = " U-Uh... I'm wiped..."
1013503-62 = "[s] \"You sure are smart, Kei-Kei.\""
1013503-63 = "Will you PLEASE shut up?!"
1013503-64 = "*sigh*..."
1013503-65 = "Since you brought it up, and were here to WITNESS and DO NOTHING, I think it's clear that...I possess a breadth of knowledge."
1013503-66 = "...I had to know a lot since I was a \"servant,\" so to speak."
1013503-67 = "I even...may have learned a little more after hacking while Millennium was researching in the Ruins."
1013503-68 = "Anyway."
1013503-69 = "What am I trying to say?"
1013503-70 = "..."
1013503-71 = "Sometimes, I feel like these lessons are mere formalities. Just exercises in attendance."
1013503-72 = "[s] \"You don't like them?\""
1013503-73 = "..."
1013503-74 = "Not necessarily, but it raises a fundamental question."
1013503-75 = "For example, if a student already knows everything, do we really need to make her go to school?"
1013503-76 = "[s] \"Of course. Why wouldn't we?\""
1013503-77 = "What?"
1013503-78 = "[s] \"It's nice to socialize and play.\""
1013503-79 = "What's that...? \"Play?\""
1013503-80 = "That's a priority for you? That's it?"
1013503-81 = "[s1] \"Of course.\"\n[s2] \"A student's responsibility is to play well and study well.\""
1013503-84 = "Another sloppy over-simplification..."
1013503-85 = "..."
1013503-86 = "What if a student...finds it all overwhelming? What if other people are \"too much\"?"
1013503-87 = "[s3] \"I'm sure that happens.\"\n[s4] \"But even for them...\"\n[s5] \"Even they would have moments when they need company.\""
1013503-91 = "...So, you're saying that's why that hypothetical student should stay the course? Just in case they feel...lonely?"
1013503-92 = "Ugh..."
1013503-93 = "But what if that student REALLY doesn't like most people?"
1013503-94 = "Huh? You're saying that's why you're here?"
1013503-95 = "..."
1013503-96 = "I get what you're saying, but you need to be realistic, Sensei."
1013503-97 = "You only have one body. Do you know how many students there are in Kivotos?"
1013503-98 = "I bet you can't even handle Millennium, never mind all of Kivotos. What gives you the confidence to think that you can—"
1013503-99 = "[s6] \"You're absolutely right.\"\n[s7] \"That's why you should help them in my place!\""
1013503-102 = "Why me? You can't spring this on me!"
1013503-103 = "What? It's \"because that's what Aris the hero would have done\"...?"
1013503-104 = "..."
1013503-105 = "..."
1013503-106 = "..."
1013503-107 = "*sigh*... Really..."
1013503-108 = "If only you couldn't talk. You'd be CONSIDERABLY less irritating."
1013503-109 = "All right, all right. "
1013503-110 = "I'll...consider it."
1013503-111 = "[s] \"You're really kind, Kei-Kei!\""
1013503-112 = "I said I'd consider it! I didn't commit. STOP IT!"
