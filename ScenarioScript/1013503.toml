[translation]
1013503-1 = "Welcome To Kivotos"
1013503-2 = "（於是為了觀摩Kei的課程而前往了千年）"
1013503-3 = "（Kei一看向這邊就露出了非常熟悉的表情）"
1013503-10 = "大家好。"
1013503-11 = "今天的課程內容是「生活空間與社會」。"
1013503-12 = "所以，我想跟大家聊聊其中不可或缺的，關於「都市」的話題。"
1013503-13 = "那麼……Kei同學？"
1013503-14 = "可以跟我們分享你所知道的，關於都市的事嗎？"
1013503-15 = "咦？我嗎？"
1013503-16 = "是的。麻煩你了。"
1013503-17 = "呃，嗯……"
1013503-18 = "所謂的都市，是與自然狀態形成最大對比的「文明的象徵」。"
1013503-19 = "在[ruby=文明]Civilization[/ruby]這個詞語之中，#n已經包含了[ruby=都市]City[/ruby]的語源Civil，其原文Civitas這個詞了。"
1013503-20 = "如果沒有都市……"
1013503-21 = "或者是說，沒有能讓許多人聚集生活的基礎的話，世界不太可能變成現在這個樣子。"
1013503-22 = "畢竟人類是通過集體思考，將虛構的想法變成現實的生物。"
1013503-23 = "（咦，咦咦！？）"
1013503-24 = "（雖然那是正確的觀點沒錯……）"
1013503-26 = "不過另一方面，都市自古至今都存在相同的特點──#n那就是過高的人口密度，以及隨之而來的環境惡化。"
1013503-27 = "即便到了現代，人們依舊沒有特別有效的解決手段。#n在資本無比深入生活的現在就更是如此了。"
1013503-28 = "……總而言之，我認為應該先從紓解交通和環境污染問題開始處理比較妥當。"
1013503-29 = "（今天的課程內容都被說完了！）"
1013503-30 = "（這……這要我這個講師如何是好……）"
1013503-32 = "雖然我也搞不太清楚，為什麼會從向量談到量子場的問題……"
1013503-33 = "但總而言之，這是一個要從數學角度證明質量間隙大於0的問題。"
1013503-34 = "不是要求你去計算。那種事還算能夠做到。#n就像流體力學方程式的一般解，可以用藉由計算流體力學硬是求出來一樣。"
1013503-35 = "其實這也是因為路徑積分所具有的數學結構的局限性──"
1013503-36 = "唔，唔唔……！"
1013503-37 = "今，今天的課就上到這裡。#n雖然時間還有點早……今天就提前下課吧……"
1013503-43 = "好厲害！"
1013503-44 = "雖然我一直有在關注，不過這次的轉學生也太厲害了吧！"
1013503-46 = "咦，咦咦……？"
1013503-47 = "哈囉，你叫Kei醬對吧？#n以前都在做什麼？都是怎麼念書的呀？"
1013503-48 = "剛才那個，是質量間隙假說問題對吧？#n畢竟我們學園，本來就是為了解決千年難題而設立的嘛！"
1013503-49 = "啊，不是。那個，我……"
1013503-51 = "（剛好和Kei對上眼了！）"
1013503-52 = "（Kei的嘴巴一張一合，似乎正傳達著什麼！）"
1013503-53 = "（你在做什麼！快來救我啊！）"
1013503-55 = "（決定也動動嘴巴回應！）"
1013503-57 = "[ns] （Kei醬～和朋友們感情很好呢～）"
1013503-59 = "（我今天一定要殺了老師再自殺！！！）"
1013503-61 = "嗚，嗚嗚……好累……"
1013503-62 = "[s] 「Kei醬懂得真多呢～」"
1013503-63 = "你少囉嗦啦！"
1013503-64 = "唉……"
1013503-65 = "既然都提到了就告訴你吧。#n如你所見，我幾乎什麼都知道。"
1013503-66 = "……畢竟從我還是「侍女」的時候開始，就有很多必須知道的事。"
1013503-67 = "在「廢墟」短暫建立起千年科學學園的研究園區時，我也連接過各式各樣的資料。"
1013503-68 = "所以……"
1013503-69 = "問我想說什麼？"
1013503-70 = "……"
1013503-71 = "我有時會覺得……上課這件事情，只是形式上的行為而已。"
1013503-72 = "[s]「不喜歡嗎？」"
1013503-73 = "……"
1013503-74 = "倒也不是不喜歡……只是有個根本性的疑問罷了。"
1013503-75 = "例如某個學生如果已經什麼都知道的話，究竟還有沒有必要上學之類的。"
1013503-76 = "[s] 「有啊，怎麼會沒有。」"
1013503-77 = "為什麼？"
1013503-78 = "[s] 「因為跟大家一起玩很開心啊。」"
1013503-79 = "……咦？"
1013503-80 = "就只有這樣？"
1013503-81 = "[s1] 「當然。」\n[s2] 「學生的工作就是好好玩、好好學習嘛。」"
1013503-84 = "又在糊弄別人……"
1013503-85 = "……"
1013503-86 = "不過，也有跟別人在一起會覺得有負擔的學生吧？"
1013503-87 = "[s3] 「當然有。」\n[s4] 「但是那種人偶爾……」\n[s5] 「也會遇到想要有人陪伴的時候吧。」"
1013503-91 = "……所以為了那種時候著想，最好別把一切都拒於門外？"
1013503-92 = "唔……"
1013503-93 = "可是，假如那個人真的很挑剔呢？"
1013503-94 = "咦？老師就是為了那種時候存在的……？"
1013503-95 = "……"
1013503-96 = "我知道你的意思，不過老師你也清醒一點吧。"
1013503-97 = "老師的身體只有一個，你知道奇普托斯有多少學生嗎？"
1013503-98 = "別說整個奇普托斯，光是千年一個學園就應付不來了吧。#n真不知道你哪來的自信……"
1013503-99 = "[s6] 「這麼說也有道理。」\n[s7] 「那就讓Kei醬代替我，跟那些孩子成為朋友吧！」"
1013503-102 = "為什麼又扯到我身上了！"
1013503-103 = "咦？如果是勇者愛麗絲的話，一定會這麼做的……？"
1013503-104 = "……"
1013503-105 = "…………"
1013503-106 = "………………"
1013503-107 = "唉……真是的……"
1013503-108 = "總是只會說這些有的沒的。"
1013503-109 = "知道了，知道了啦。"
1013503-110 = "我會……考慮看看的。"
1013503-111 = "[s] 「Kei醬真是個好孩子！」"
1013503-112 = "我只說會考慮看看而已！#n真是受不了你耶！！！"
