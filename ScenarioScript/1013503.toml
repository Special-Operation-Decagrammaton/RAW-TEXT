[translation]
1013503-1 = "Welcome To Kivotos"
1013503-2 = "(คุณครูมุ่งหน้าไปยังมิลเลเนียมเพื่อสังเกตการณ์คลาสเรียนของเคย์)"
1013503-3 = "(ทันทีที่เห็นคุณครู เคย์ก็ส่งสายตาที่คุ้นเคยมาให้)"
1013503-10 = "สวัสดี นักเรียนทุกคน"
1013503-11 = "เนื้อหาที่เราจะเรียนวันนี้ก็คือ 'พื้นที่อยู่อาศัยและสังคม'"
1013503-12 = "และในบรรดาสิ่งเหล่านั้น สิ่งที่จะไม่พูดถึงไม่ได้เลยก็คือ 'เมือง'"
1013503-13 = "ถ้างั้นก็... เคย์?"
1013503-14 = "ไหนช่วยบอกหน่อยซิว่ารู้อะไรเกี่ยวกับเมืองบ้าง?"
1013503-15 = "คะ? ฉันเหรอคะ?"
1013503-16 = "อื้อ ตอบตามที่รู้ได้เลย"
1013503-17 = "อ่า... อืม..."
1013503-18 = "เมืองก็คือ... สัญลักษณ์ของอารยธรรมที่เป็นขั้วตรงข้ามกับธรรมชาติอย่างสิ้นเชิงค่ะ"
1013503-19 = "ในคำว่าอารยธรรมหรือ Civilization ก็มีคำว่า Civil ที่เป็นรากศัพท์ของคำว่า City รวมอยู่ด้วย ซึ่งก็มีที่มาจากคำว่า Civitas อีกทีค่ะ"
1013503-20 = "ถ้าไม่มีเมืองละก็..."
1013503-21 = "พูดอีกอย่างก็คือ ถ้าไม่มีรากฐานที่ทำให้มนุษย์จำนวนมากอยู่ร่วมกันได้ โลกก็คงไม่เป็นอย่างที่เป็นอยู่#nทุกวันนี้ค่ะ"
1013503-22 = "นั่นก็เพราะว่า มนุษย์เป็นสิ่งมีชีวิตที่ทำให้ความคิดในจินตนาการกลายเป็นความจริงได้ด้วยกระบวนการ#nคิดร่วมกันค่ะ"
1013503-23 = "(หะ... หืม?!)"
1013503-24 = "(นั่นคือคำตอบที่ถูกต้องเลยนะ...?)"
1013503-26 = "ในทางกลับกัน เมืองก็มีลักษณะเฉพาะอยู่ที่ความหนาแน่นของประชากรที่สูงและสภาพแวดล้อมการใช้#nชีวิตที่แย่ลง ไม่ว่าจะในสมัยก่อนหรืออดีตก็ตาม"
1013503-27 = "และยังไม่มีวิธีรับมือที่เฉียบขาดในยุคปัจจุบันด้วยค่ะ โดยเฉพาะอย่างยิ่งในปัจจุบันที่ทุนนิยมแทรกซึม#nเข้ามาในชีวิตของเราอย่างลึกซึ้งกว่าที่เคยเป็นมา"
1013503-28 = "สำหรับตอนนี้... ฉันคิดว่าอย่างน้อยเราควรจัดการกับปัญหาการจราจรติดขัดกับเรื่องมลภาวะทาง#nสิ่งแวดล้อมก่อนค่ะ"
1013503-29 = "(พูดในสิ่งที่จะสอนของวันนี้ออกมาหมดเลย!)"
1013503-30 = "(ฉันเป็นผู้ฝึกสอนด้วยสิ... จะทำยังไงดี...)"
1013503-32 = "ฉันไม่รู้ว่าเราคุยเรื่องเวกเตอร์กันอยู่แล้วเลยมาถึงเรื่องโจทย์เกี่ยวกับสนามควอนตัมได้ยังไง..."
1013503-33 = "แต่โดยสรุปแล้ว โจทย์นี้คือการพิสูจน์ทางคณิตศาสตร์ว่าช่องว่างมวลมีค่ามากกว่าศูนย์ค่ะ"
1013503-34 = "ฉันไม่ได้บอกให้คำนวณค่ะ เรื่องนี้มันทำได้ง่ายๆ ค่ะ เหมือนกับการที่เราพอจะหาคำตอบทั่วไปของ#nสมการกลศาสตร์ของไหลได้ด้วยวิธีพลศาสตร์ของไหลเชิงคำนวณนั่นละค่ะ"
1013503-35 = "ที่จริงแล้ว ส่วนหนึ่งมันก็เป็นเพราะขีดจำกัดทางโครงสร้างคณิตศาสตร์ของปริพันธ์ตามเส้น..."
1013503-36 = "อะ... อื้อ...!"
1013503-37 = "วะ... วันนี้ขอจบคลาสเท่านี้ ถึงจะยังมีเวลาเหลืออีกนิดหน่อย... แต่ขอจบเท่านี้ก่อนแล้วกัน..."
1013503-43 = "สุดยอดเลย!"
1013503-44 = "เด็กที่ย้ายมาใหม่คนนี้ตอบได้ทุกอย่างเลยนะ!"
1013503-46 = "คะ... คะ...?"
1013503-47 = "ชื่อเคย์จังใช่มั้ย? ก่อนย้ายมาที่นี่ เธอเรียนหนังสือด้วยวิธีไหนเหรอ?"
1013503-48 = "เมื่อกี้คือโจทย์สมมติฐานเรื่องช่องว่างมวลใช่มั้ย? ย้ายมาเพื่อการนี้ใช่มั้ยล่ะ? ก็โรงเรียนของเราก่อตั้ง#nขึ้นมาเพื่อไขปริศนาที่ค้างคามานับพันปีเลยนี่นา!"
1013503-49 = "ปะ... เปล่าค่ะ คือว่า คือว่าฉันแค่..."
1013503-51 = "(ในตอนนั้นเอง คุณครูก็ได้สบตากับเคย์!)"
1013503-52 = "(เคย์ขยับปากพูดอะไรบางอย่าง!)"
1013503-53 = "(มัวทำอะไรอยู่คะ! รีบเข้ามาช่วยฉันสิคะ!)"
1013503-55 = "(คุณครูก็ขยับปากพูดบางอย่างเหมือนกัน!)"
1013503-57 = "[ns] (เคย์จัง~ สนิทสนมกับเพื่อนๆ เข้าไว้นะ~)"
1013503-59 = "(วันนี้คุณครูไม่รอดแน่ค่ะ จัดการคุณครูเสร็จแล้วฉันจะจัดการตัวเองตามไปด้วยเลย!!!)"
1013503-61 = "ฮะ... เฮ้อ... เหนื่อยจัง..."
1013503-62 = "[s] \"เคย์จังตอบได้ทุกอย่างเลยนะ~\""
1013503-63 = "เงียบไปเลยค่ะ!"
1013503-64 = "เฮ้อ... "
1013503-65 = "ไหนๆ ก็พูดถึงเรื่องนี้แล้ว ก็อย่างที่คุณครูเห็นค่ะว่าฉันรู้แทบทุกอย่างแล้ว"
1013503-66 = "ฉันต้องเรียนรู้อะไรมากมายตั้งแต่สมัยเป็น 'หญิงรับใช้' แล้วด้วยค่ะ..."
1013503-67 = "ในตอนที่ศูนย์วิจัยของโรงเรียนวิทย์มิลเลเนียมถูกสร้างขึ้นเป็นการชั่วคราวใน 'พื้นที่รกร้าง' ฉันก็ได้ลองเข้าถึงข้อมูลต่างๆ ดู"
1013503-68 = "เอาเถอะค่ะ..."
1013503-69 = "ฉันอยากสื่ออะไรน่ะเหรอคะ?"
1013503-70 = "..."
1013503-71 = "บางครั้งฉันก็รู้สึกว่าการเข้าเรียนเป็นสิ่งที่ทำเป็นพิธีเท่านั้นค่ะ"
1013503-72 = "[s] \"ไม่ชอบเรียนเหรอ?\""
1013503-73 = "..."
1013503-74 = "ไม่ใช่ว่าไม่ชอบหรอกค่ะ แต่ฉันแค่เกิดข้อสงสัยพื้นฐานน่ะค่ะ"
1013503-75 = "ก็อย่างเช่น ถ้ามีนักเรียนคนหนึ่งที่รู้ทุกอย่างแล้ว นักเรียนคนนั้นจำเป็นต้องไปโรงเรียนหรือเปล่า? อะไรทำนองนั้นน่ะค่ะ"
1013503-76 = "[s] \"ต้องไปสิ\""
1013503-77 = "ทำไมล่ะคะ?"
1013503-78 = "[s] \"ก็การได้เล่นกับเพื่อนๆ เป็นเรื่องสนุกไง\""
1013503-79 = "คะ...?"
1013503-80 = "นั่นคือ... เหตุผลทั้งหมดเหรอคะ?"
1013503-81 = "[s1] \"ก็ใช่น่ะสิ นั่นละหน้าที่ของนักเรียน\"\n[s2] \"หน้าที่ของนักเรียนคือการเรียนและเล่นสนุกนะ\""
1013503-84 = "ตอบอะไรแบบนี้อีกแล้ว..."
1013503-85 = "..."
1013503-86 = "แต่ก็น่าจะมีนักเรียนที่ไม่สะดวกอยู่ร่วมกับคนอื่นไม่ใช่เหรอคะ?"
1013503-87 = "[s3] \"ต้องมีอยู่แล้วละ\"\n[s4] \"แต่บางครั้งคนแบบนั้นก็น่าจะมีช่วงที่คิดว่า...\"\n[s5] \"อยากให้มีใครบางคนมาอยู่ข้างๆ บ้างเหมือนกันนะ\""
1013503-91 = "เพราะงั้นก็ไม่ควรปฏิเสธทุกอย่างมากจนเกินไป อย่างน้อยก็เพื่อช่วงเวลาแบบนั้นงั้นเหรอคะ...?"
1013503-92 = "อึก..."
1013503-93 = "แต่ถ้าคนคนนั้นเรื่องมากในการพบปะคนอื่นล่ะคะ?"
1013503-94 = "คะ? คนคนนั้นก็เลยต้องมีคุณครูเพื่อการนี้งั้นเหรอคะ?"
1013503-95 = "..."
1013503-96 = "ฉันพอเข้าใจที่คุณครูจะสื่อค่ะ แต่คุณครูก็ต้องรู้อะไรบ้างสิคะ"
1013503-97 = "คุณครูมีแค่ร่างเดียวนะคะ รู้หรือเปล่าคะว่าในคิโวทอสมีนักเรียนกี่คน?"
1013503-98 = "อย่าว่าแต่คิโวทอสเลย แค่มิลเลเนียมที่เดียวยังรับมือไม่ไหว แล้วทำไมถึงมั่นใจถึงขนาดนั้นนะ..."
1013503-99 = "[s6] \"งั้นเคย์จังช่วยทำหน้าที่แทนครูได้มั้ย?\"\n[s7] \"งั้นก็ให้เคย์จังไปเป็นเพื่อนกับนักเรียนเหล่านั้นก็ได้สิเนอะ!\""
1013503-102 = "ทำไมถึงเอาฉันไปเกี่ยวล่ะคะ!"
1013503-103 = "คะ? ถ้าเป็นผู้กล้าอาริสึละก็ ต้องทำแบบนั้นแน่นอนงั้นเหรอคะ?"
1013503-104 = "..."
1013503-105 = "......"
1013503-106 = "........."
1013503-107 = "เฮ้อ...  จริงๆ เลย..."
1013503-108 = "พูดเก่งจนน่าโมโหจริงๆ"
1013503-109 = "ก็ได้ค่ะ ก็ได้ "
1013503-110 = "ฉันจะ... เก็บไปคิดดูค่ะ"
1013503-111 = "[s] \"เคย์จังเป็นเด็กดีจริงๆ เลยนะ!\""
1013503-112 = "แค่บอกว่าจะเอาไปคิดดูเฉยๆ ต่างหากล่ะคะ! ไม่อยากเถียงต่อด้วยแล้ว จริงๆ เลย!!!"
