[translation]
901010600220-7 = "FOX3、聞こえる？"
901010600220-11 = "こちらFOX3、シエラポイントで待機中。"
901010600220-12 = "急にどうしたの？"
901010600220-13 = "ハイランダー鉄道学園の交通管理システムに接続して、特定人物の乗車記録を確認できる？"
901010600220-14 = "ハイランダーのデータベースに直接アクセスするのは難しいけど……連邦生徒会の交通室では運賃決済データが共有されているから、間接的に確認できると思うよ。"
901010600220-15 = "どんな情報を探してるの？"
901010600220-16 = "ミヤグチさんが失踪した日、鐘崎港のホームから列車に乗車した記録があるか調べてくれる？"
901010600220-17 = "前日と翌日の記録もお願い。"
901010600220-18 = "分かったわ。"
901010600220-19 = "でも、サーバーに接続するには時間がかかるかも……HQに復帰したあと共有するわね。"
901010600220-20 = "うん、お願い。"
