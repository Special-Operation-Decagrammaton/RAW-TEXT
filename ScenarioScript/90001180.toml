90001180-289 = "พรืด...!"
90001180-290 = "อุวะฮ่าฮ่าฮ่าฮ่า! อะไรเนี่ย เคย์! ทำไมหน้าตาแบบนี้ล่ะ? ดูก็รู้เลยนะว่าใครเป็นคนออกแบบน่ะ! แต่ถึงยังไง แบบนี้มันก็นะ! ฮะฮ่าฮ่าฮ่าฮ่าฮ่า!"
90001180-292 = "ฮะ... ฮึ่ย...!"
90001180-293 = "พะ... พี่โมโมอิ อย่าหัวเราะแบบนี้สิ... ขอโทษนะ เคย์จัง! ฉันก็ไม่ไหวเหมือนกัน! ฮะฮ่าฮ่าฮ่าฮ่า!"
