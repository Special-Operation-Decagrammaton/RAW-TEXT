90001180-341 = "ฮิมาริ..."
90001180-342 = "แต่อย่าลืมนะคะว่าฉันคืออัจฉริยะที่สุดของคิโวทอส แล้วฉันก็ไม่คิดจะยอมรับว่าคุณเก่งกว่าฉันด้วยค่ะ ไม่ว่าจะในตอนนี้หรือในวันข้างหน้าก็ตาม"
90001180-343 = "แต่ถึงยังไง ฉันก็ไม่คิดจะดูถูกหรืออิจฉาผลลัพธ์ที่คุณสร้างสรรค์หรอกค่ะ นี่คือทัศนคติที่ดีของ#nนักวิชาการเลยว่ามั้ยคะ?"
90001180-344 = "แน่นอนว่าเรื่องดีไซน์ของเคย์... ถ้าถามว่ามันจำเป็นต้องเป็นอย่างนั้นหรือเปล่า ฉันก็ยังมีความเห็นต่าง#nอยู่เล็กน้อยค่ะ..."
