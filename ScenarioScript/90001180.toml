90001180-311 = "ขอโทษด้วยค่ะ..."
90001180-312 = "ฉันไม่รู้ว่าต้องขอโทษที่ตรงไหน... แต่ก็ขอโทษด้วยนะคะ ขอโทษที่ฉันออกมาเป็นแบบนี้ค่ะ..."
90001180-313 = "คะ? ทำไมถึงพูดแบบนี้ล่ะคะ เคย์? อาริสึคิดว่าเคย์ในตอนนี้น่ะเท่มากๆ เลยนะคะ!"
90001180-319 = "เหนือสิ่งอื่นใด ไม่ว่าเคย์จะรูปร่างหน้าตาแบบไหน เคย์ก็ยังเป็นเคย์คนเดิมนะคะ"
90001180-320 = "...!"
90001180-321 = "ดีใจที่ได้เจอกันอีกครั้งนะคะเคย์ สวัสดีค่ะ"
90001180-322 = "ค่ะ ท่านธิดา ขอฝากตัวด้วยอีกครั้งนะคะ"
