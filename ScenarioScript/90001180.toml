90001180-241 = "ไม่ได้หรอก ยูสึ! เรื่องแบบนี้ต้องเซอร์ไพรส์~ สิ!"
90001180-242 = "ฉันก็เข้าใจอยู่หรอกนะ แต่ก็..."
90001180-248 = "อ๊ะ คุณครูส่ง MOMOTALK มา!"
90001180-249 = "..."
90001180-250 = "งั้นก็คงถึงเวลาแล้วสินะ"
90001180-251 = "เตรียมตัวกันเถอะ อาริสึ"
90001180-257 = "ค่ะ เข้าใจแล้วค่ะ"
90001180-261 = "[ns] \"ทุกคนเป็นยังไงกันบ้าง? หนาวหรือเปล่า?\""
90001180-265 = "ยะฮู้ว คุณครู! พวกเรากำลังรออยู่เลย! ขอไฮทัชหน่อย!"
90001180-271 = "ตกลงว่า... ราบรื่นดีใช่มั้ย?"
