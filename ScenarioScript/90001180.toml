90001180-346 = "อื้อ..."
90001180-347 = "อะแฮ่ม ถ้างั้นก็"
90001180-351 = "เอาละค่ะ ทุกคน! นี่ก็เริ่มจะหนาวขึ้นแล้ว เรากลับฐานกันเถอะค่ะ!"
90001180-352 = "ที่ฐานมีน้ำอุ่นเตรียมเอาไว้ให้อาบกันด้วยนะคะ ถ้ามีใครหนาวจนเป็นหวัดขึ้นมาคงเป็นเรื่องใหญ่ เรารีบๆ กลับเข้าไปกันเถอะค่ะ!"
