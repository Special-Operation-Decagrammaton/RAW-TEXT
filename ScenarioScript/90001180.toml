90001180-359 = "ธารน้ำแข็งตอนกลางคืนน่ะโหดร้ายมากค่ะ ถ้าไม่ได้เตรียมเสื้อผ้าและอุปกรณ์ป้องกันความหนาวมา#nอย่างเหมาะสม ก็อาจเจอปัญหาใหญ่ได้เลยค่ะ"
90001180-360 = "เข้าใจแล้วค่ะ รุ่นพี่ฮิมาริ!"
90001180-361 = "อื้อ เวลานี้แม้กระทั่งฉันยังรู้สึกหนาวหน่อยๆ เลย ทุกคนต้องระวังกันนะ"
90001180-362 = "เป็นข้อมูลใหม่เลยนะคะ ถึงฉันจะไม่รู้สึกว่าคุณก็หนาวเหมือนคนอื่นเลยก็ตามค่ะ เอมิ..."
90001180-363 = "เอาเถอะค่ะ เรามาคิดเรื่องกำหนดการต่อจากนี้ไปของเราดีกว่า..."
