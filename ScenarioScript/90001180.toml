90001180-382 = "สถานการณ์ฉุกเฉินค่ะ... ทุกคนกลับสู่ตำแหน่งของตัวเองก่อนค่ะ"
90001180-383 = "หืม? ละ... แล้วพวกเราล่ะ?!"
90001180-384 = "นั่นสิคะ พวกคุณไปหาที่นั่งให้ปลอดภัยกันก็ได้ค่ะ"
90001180-385 = "นี่มัน... เรื่องอะไรกันเหรอคะ รุ่นพี่ฮิมาริ?"
90001180-390 = "ถ้าให้สรุปให้เข้าใจเลยก็คือ นี่คือสัญญาณของผู้เลื่อมใสตนใหม่"
90001180-391 = "สัญญาณอยู่ในพิกัดตรงกับจุดที่พบบาเรียพหุมิติที่ก่อนหน้านี้ถูกปล่อยออกมาและหายไปอย่างรวดเร็ว#nค่ะ"
