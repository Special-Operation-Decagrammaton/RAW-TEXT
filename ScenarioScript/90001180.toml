[translation]
90001180-1 = "ตอนที่ 18;รุ่งอรุณ"
90001180-10 = "อะ... ไอน์?! ตั้งสติไว้สิ! พี่สาวมาหาแล้วทั้งที ทำไมเธอถึงเป็นลมไปก่อนล่ะเนี่ย!"
90001180-11 = "ฉันกลับรู้สึกขอบคุณมากกว่านะที่เป็นลมไปก่อนกันน่ะ... ไอน์ ฉันเองก็เกือบเป็นลมไปแล้วเหมือนกัน"
90001180-28 = "สวัสดีค่ะ ไอน์"
90001180-29 = "!!!"
90001180-31 = "สวัสดีค่ะ ซอฟ"
90001180-32 = "ว้าวว!"
90001180-34 = "สวัสดีค่ะ ออร์"
90001180-35 = "ค่ะ... สวัสดีค่ะ พี่..."
90001180-40 = "พี่มัลคูธ~~~!!!"
90001180-41 = "จำชื่อของพวกเราได้สินะคะ...!"
90001180-42 = "ฉันเคยคิดด้วยนะว่าถ้าพี่จำชื่อของพวกเราไม่ได้จะทำยังไง! แต่นั่นก็ไม่สำคัญอีกแล้วละ!"
90001180-43 = "ฮุฮุฮุ... ตอนนี้พี่มัลคูธตื่นแล้ว จากนี้ทุกอย่างก็เป็นไปตามประสงค์ของพวกเรา!"
90001180-45 = "มีอะไรที่ฉันต้องทำเป็นพิเศษหรือเปล่าคะ?"
90001180-47 = "มะ... ไม่ค่ะ! ไม่เป็นไรค่ะ พี่มัลคูธ พี่ก็แค่... อยู่ตรงนี้... แบบนี้ไปเรื่อยๆ ก็พอค่ะ"
90001180-48 = "ใช่แล้ว! เหนือสิ่งอื่นใด พี่มีรุ่นน้องผู้รอบรู้ ที่เป็นทั้งวิศวกรและนักวิทยาศาสตร์คนเก่ง...!"
90001180-49 = "อย่างพวกเราอยู่ที่นี่แล้วนี่คะ...!"
90001180-50 = "เพราะงั้นพี่วางใจและให้ทุกอย่างเป็นหน้าที่ของพวกเราได้เลยค่ะ!"
90001180-51 = "ฉะ... ฉันไอน์นะคะ... เอ่อ... ฉะ... ฉันช่วยซัพพอร์ตเรื่องทางกายภาพของพี่... แล้วก็รับหน้าที่จัดการอุปกรณ์ค่ะ แล้วก็... อืม... แบบว่า... พี่ชอบเครื่องจักรกลมั้ยคะ? ฉันชอบมากๆ เลยค่ะ แหะๆๆ..."
90001180-52 = "ฉันคือซอฟ! ฉันรับหน้าที่ดูแลระบบอาวุธเสริมของพี่อยู่น่ะ ถ้ามีใครคนไหนพูดอะไรแปลกๆ ละก็ พี่มาบอกฉันได้เลย ฉันจะจัดการให้เอง"
90001180-53 = "ส่วนฉันก็ออร์ค่ะ ฉันเป็นคนควบคุมสมดุลโดยรวมของพี่ค่ะ ฮุฮุฮุ... วางใจได้เลยนะคะ ฉันจะไม่ยอมให้#nใครมาแตะต้องพี่ตามอำเภอใจเด็ดขาดค่ะ"
90001180-57 = "ถ้างั้นก็..."
90001180-58 = "ในเมื่อพวกฉันแนะนำตัวกันครบแล้ว...!"
90001180-59 = "ถะ... ถ้าพี่ไม่รังเกียจละก็... เอ่อ... คือ... พี่จะ..."
90001180-64 = "ฉันอยากถามอะไรสักหน่อยค่ะ"
90001180-65 = "ไอน์ ซอฟ ออร์ พวกคุณก็น่าจะรู้จักฉันเป็นอย่างดีอยู่แล้วไม่ใช่เหรอคะ?"
90001180-67 = "มะ... มันก็... ก็ใช่อยู่หรอก... นะคะ..."
90001180-68 = "อ๋อ~ เรื่องนั้นน่ะเหรอ จะพูดว่ายังไงดีนะ"
90001180-69 = "ถ้าเป็นไปได้ พวกเราก็อยากฟังจากปากของพี่เองน่ะค่ะ ฮิฮิ"
90001180-71 = "..."
90001180-72 = "ถึงจะไม่ค่อยแน่ใจ แต่ฉันก็รู้สึกว่าต้องยอมรับคำขอนั้นนะคะ"
90001180-73 = "ถ้างั้นก็ สวัสดีค่ะ ไอน์ สวัสดีค่ะ ซอฟ สวัสดีค่ะ ออร์"
90001180-74 = "ฉันชื่อมัลคูธ ผู้เลื่อมใสลำดับที่ 10 ของเดคาแกรมมาทอน"
90001180-75 = "ผู้แสวงบุญแห่งอาณาจักรที่เดินทางมาถึงที่สุดของโลก เซฟิร่าสุดท้าย และความปรารถนาสุดท้าย ปลายสุดของการเดินทางที่รวมเป็นเส้นทางเดียว"
90001180-80 = "อะ... อ่า... เส้นทางที่ 10 คือปัญญาอันสุกสว่าง..."
90001180-81 = "และสิ่งนั้นจะส่องสว่างไปทั่วทั้งดินแดน...!"
90001180-82 = "ทุกคนจงแสดงความเคารพต่อผู้แสวงบุญแห่งอาณาจักรที่ทุกสิ่งทุกอย่างมาถึงจุดสิ้นสุดของโลก!"
90001180-83 = "พี่คะ~!!!"
90001180-90 = "...?"
90001180-91 = "อ๊ะ ไหงเป็นงั้นล่ะ! ฉันก็อยากกอดพี่เหมือนกันนะ! ฉันก็อยากให้พี่ลูบหัวเหมือนกัน!"
90001180-92 = "พี่มัลคูธ! ฉันด้วย!"
90001180-93 = "ลูบหัว~ ลูบหัว... ฮื้ม..."
90001180-95 = "อะ... อ่า... ฉะฉะฉะฉะ..."
90001180-100 = "..."
90001180-107 = "พะ... พะพะ...?"
90001180-108 = "มานี่สิ..."
90001180-109 = "พี่คะ...! อาแหะ แหะๆๆ..."
90001180-111 = "ไอน์ ขี้โกงนะ..."
90001180-112 = "แบบนี้ขี้โกงนะคะ"
90001180-113 = "อยากให้พี่กอดพวกเราเองก่อนบ้างจัง"
90001180-114 = "ใช่ค่ะ การเข้าไปกอดมันก็ดีอยู่หรอก แต่การถูกดึงเข้าไปกอดมันดีกว่าเห็นๆ...!"
90001180-115 = "พวกเราด้วย กอดพวกเราด้วยสิ!"
90001180-116 = "ชีวิตน่ะ ต้องยุติธรรมและเท่าเทียมกันสิคะ จะได้ไม่มีผลเสียตามมาภายหลัง เพราะงั้น... ฮุฮุฮุ..."
90001180-118 = "อ่า... เอ่อ... คือว่า..."
90001180-119 = "พี่คะ...?"
90001180-120 = "..."
90001180-121 = "ซอฟ ออร์"
90001180-123 = "อะ... อื้อ!"
90001180-124 = "พวกฉันเตรียมตัวพร้อมแล้วค่ะพี่ เข้ามาได้เลยค่ะ...!"
90001180-126 = "ไอน์กำลังลำบากใจอยู่นะคะ"
90001180-127 = "เพราะงั้น ไม่ได้ค่ะ"
90001180-129 = "อ้าว?!"
90001180-130 = "ฮืออ... โดนพี่มัลคูธดุแล้ว... "
90001180-132 = "ฉันไม่ได้ตั้งใจจะทำให้เศร้ากันขนาดนั้นนะคะ..."
90001180-135 = "เอาเถอะ! ในเมื่อพี่มัลคูธลืมตาขึ้นอย่างปลอดภัยแล้ว งั้นก็ถึงเวลาแล้วที่จะเข้าสู่ขั้นตอนถัดไป!"
90001180-136 = "คะ... ค่ะ! ขั้นตอนถัดไป... สินะคะ"
90001180-137 = "หืม? ฉันยังไม่เคยได้ยินเกี่ยวกับเรื่องนั้นเลย... มันคืออะไรเหรอคะ?"
90001180-138 = "มันก็คือ..."
90001180-144 = "ประกาศสงครามยังไงล่ะ!"
90001180-145 = "ประกาศ?"
90001180-146 = "สงคราม?"
90001180-147 = "ไปติดนิสัยการพูดที่ไร้ความหมายของพวกมนุษย์แปลกๆ มาจากที่ไหนอีกแล้วสินะคะ..."
90001180-152 = "ทะ... ที่บอกว่าเหมือนกับนิสัยของพวกมนุษย์น่ะ... มันก็จริงอยู่หรอก...! แต่มันไม่ได้ไร้ความหมาย#nเถอะนะ?! เคยได้ยินคำนั้นหรือเปล่า มันเรียกว่าอะไรนะ อ้อ! ละเมิดสนธิสัญญาไง!"
90001180-153 = "ฟังนะคะ คำว่าสนธิสัญญานั่นละค่ะที่เป็นเรื่องตลกที่ไร้ความหมายของพวกมนุษย์ ซอฟ"
90001180-154 = "อะ... อึก...!"
90001180-155 = "ฉะ... ฉัน... คิดว่าก็ไม่เลวนะคะถ้าจะทำอย่างนั้น...?"
90001180-156 = "ไอน์...!"
90001180-157 = "อึก เป็นไปได้ยังไง! แม้แต่ไอน์ของพวกเราก็โดนเล่ห์ร้ายของซอฟเข้าให้แล้ว...!"
90001180-158 = "นี่"
90001180-159 = "คือว่า... ถึงมันจะไม่มีความหมายมากนักสำหรับพวกเรา แต่สำหรับพวกมนุษย์แล้วอาจจะมีความหมาย#nก็ได้ค่ะ... ไม่คิดเหมือนกันเหรอคะ?"
90001180-160 = "มะ... มะมะมะ... แม้ว่าการโต้ตอบกับมนุษย์โดยตรง... ยังเป็นเรื่องที่น่ากลัวมากสำหรับฉันก็เถอะค่ะ..."
90001180-162 = "นั่นสินะคะ ไอน์เองก็พูดแบบนั้นด้วย ถ้างั้นเรามาลองทำอย่างที่ซอฟว่ากันดูมั้ยคะ?"
90001180-168 = "อืม... ค่ะ ก็ได้ค่ะ ถ้าทั้งพี่และไอน์ว่าอย่างนั้น ฉันก็คงไม่ขัดหรอกค่ะ"
90001180-169 = "ดีละ! ถ้างั้นเราก็มาเตรียมประกาศสงครามหรืออะไรนั่นกันเลยค่ะ!"
90001180-170 = "ค่ะ ค่ะ...! ซอฟดูน่าจะรู้เรื่องนี้ดีที่สุด งะ... งั้นฉันจะปล่อยให้เป็นหน้าที่ของซอฟนะคะ...!"
90001180-171 = "อื้อ! วางใจฉันได้เลย! "
90001180-174 = "ฮู่ว..."
90001180-175 = "ถึงจะไม่ง่าย แต่สุดท้ายก็ทำสำเร็จจนได้นะ"
90001180-176 = "ทุกคนทำได้ดีมากค่ะ อย่างที่เอมิบอก นี่ไม่ใช่ขั้นตอนง่ายๆ เลยจริงๆ ค่ะ"
90001180-177 = "แต่พอทำจนสำเร็จก็รู้สึกภูมิใจนะคะ..."
90001180-178 = "แบบนี้จะ... ไม่เป็นอะไรจริงๆ เหรอคะ...?"
90001180-179 = "มีปัญหาอะไรงั้นเหรอ หัวหน้า? มันก็มีประสิทธิภาพดีแล้วนะ"
90001180-180 = "ก็อาจจะเป็นอย่างนั้นได้ตามมุมมองของแต่ละคนงั้นเหรอ? งั้นมันก็ดีแล้วไม่ใช่หรือไง? "
90001180-181 = "ประธานริโอะก็ช่วยพูดอะไรสักอย่างทีสิ ประธานเป็นคนออกแบบโครงร่างเลยนะ"
90001180-186 = "ล้ำมาก..."
90001180-190 = "..."
90001180-191 = "[s] \"อ่า... เคย์? ลองบอกความรู้สึกอะไรหน่อยสิ...?\""
90001180-195 = "..."
90001180-196 = "ฉันขอกลับไปเป็นข้อมูลเหมือนเดิมค่ะ"
90001180-197 = "ไม่ได้นะ เคย์ ทุกคนพยายามกันตั้งขนาดนี้เลยนะ"
90001180-198 = "แล้วฉันก็คิดว่าโครงสร้างส่วนล้อน่ะยอดเยี่ยมมากเลยด้วย เพราะการเดินสองขาก็ไม่มีประสิทธิภาพใน#nบางด้านน่ะ"
90001180-199 = "นอกจากนี้ยังมีบูสเตอร์ที่มีกำลังไฟมากพอที่จะทำให้บินได้อีกด้วย นี่คือจุดสูงสุดของความสมเหตุ#nสมผลเลยนะ สมแล้วละที่เป็นผลงานของประธานริโอะ"
90001180-200 = "ใช่ค่ะ เคย์ มีคำโบราณกล่าวไว้ว่าถ้าวิ่งหนีจะได้เพียงหนึ่ง แต่ถ้าเดินหน้าจะได้ถึงสองนะคะ ได้ร่างกายมาแล้วทั้งที เคย์จะหนีไม่ได้สิคะ"
90001180-201 = "ที่พูดออกมาน่ะรู้เหรอคะว่าหมายความว่าอะไร?!"
90001180-202 = "บอกตามตรงว่าฉันก็ไม่รู้ค่ะ"
90001180-203 = "อ๊ากก! ฮิมาริ ริโอะ! พวกคุณพูดอะไรหน่อยสิคะ! นี่มันอะไรกันคะ!"
90001180-205 = "ฉันขอสงบปากสงบคำดีกว่าค่ะ... จริงสิ ลืมไปเสียสนิทเลยว่ามีเรื่องสำคัญที่ต้องไปทำ งั้นฉันขอตัวนะคะ"
90001180-210 = "จะหนีกันเหรอคะ!"
90001180-212 = "ล้ำมาก..."
90001180-213 = "ตอนนี้คุณพูดได้อยู่แค่คำเดียวหรือไงกันคะ!"
90001180-214 = "[s1] \"ใจเย็นๆ ก่อนนะ เคย์ ยังไงก็มีร่างกายและเคลื่อนไหวได้แล้วนี่นา\"\n[s2] \"ว้าว... แบบนี้ดีจังเลยนะ ดีเลยละ... เรามาจับมือทักทายกันมั้ย?\""
90001180-217 = "คุณครูเนี่ย แย่ที่สุดเลยค่ะ!"
90001180-218 = "[s] \"ทำไมล่ะ?! ไม่สิ ครูก็พอเดาได้อยู่หรอกนะ แต่ทำไมล่ะ?!?!\""
90001180-223 = "เอาเถอะน่า ตอนนี้คงถึงเวลาต้องเริ่มเตรียมตัวแล้วละ"
90001180-224 = "เตรียมตัวทำอะไรคะ...? ทำไมฉันถึงรู้สึกลางไม่ดีเลยล่ะคะ...?"
90001180-225 = "เตรียมตัวไปพบท่านธิดาที่รอเจอเคย์อยู่ไงล่ะ"
90001180-226 = "...!"
90001180-227 = "ฉันขอกลับไปเป็นข้อมูลเหมือนเดิมไม่ได้เหรอคะ...???"
90001180-228 = "ไม่ได้ค่ะ เคย์ ถ้าทำแบบนั้นละก็ อาริสึที่น่ารักของเราจะต้องเสียใจแน่นอนค่ะ"
90001180-229 = "ทีนี้ละมาพูดจาเหมือนคนปกติ!!!"
90001180-233 = "ดีละ! เท่านี้ก็รู้แล้วละว่าธารน้ำแข็งทั้งหมด... ไม่สิ รู้แล้วละว่ารอบๆ ฐานนี้เป็นยังไงบ้าง!"
90001180-234 = "อึก... เริ่มจะหนาวขึ้นแล้วนะ... เราพอแค่นี้เถอะ กลับกันดีกว่านะพี่..."
90001180-235 = "ฉันก็... เห็นด้วย... ฮัดชิ่ว...!"
90001180-236 = "ฉันก็หนาวเหมือนกัน แต่ถึงอย่างนั้นก็..."
90001180-237 = "เรารอกันก่อนอีกหน่อยเถอะนะ"
90001180-238 = "ทำไมถึงเป็นงั้นไปได้ล่ะคะ โมโมอิ?"
90001180-239 = "ก็เพื่อไปเจอร่างใหม่ของเคย์ไง!"
