[translation]
90001180-1 = "Episode 18;Dawn"
90001180-10 = "E-Ein?! Wake up! Don't pass out when Elder Sister is finally here!"
90001180-11 = "...Actually, I give you my deepest gratitude for being the first to do so, Ein. For I was on the verge of fainting as well."
90001180-28 = "Hello. Ein."
90001180-29 = "...!!"
90001180-31 = "Hello. Sof."
90001180-32 = "Oh my gosh!!"
90001180-34 = "Hello. Ohr."
90001180-35 = "...Yes. Hello, Elder Sister."
90001180-40 = "Malkuth!!"
90001180-41 = "Y-You remembered our names...!"
90001180-42 = "I was worried you weren't going to remember us! But that doesn't matter!"
90001180-43 = "Fufufu... Now that Elder Sister has awoken, we will fulfill our objective to perfection!"
90001180-45 = "What do you require of me?"
90001180-47 = "N-Nothing! Nothing at all, Elder Sister! Y-You can just stay...right here!"
90001180-48 = "Yeah! Because you have us..."
90001180-49 = "...the perfect engineers, scientists, and, above all, younger sisters!"
90001180-50 = "So please just relax, and entrust everything to us!"
90001180-51 = "I-I'm Ein... Uh... So... I'm in charge of your physical support...and equipment management. Also, um...do you like machines? I like them a lot. Ehehe..."
90001180-52 = "I'm Sof! I'll be taking care of all your periphery weaponry systems. And if anyone here starts spouting ridiculous nonsense, I can take care of that too."
90001180-53 = "And I am Ohr. I am here to keep all things perfectly balanced for you. Fufufu... I shall make it so no one can lay even a single finger upon you. Please be at ease."
90001180-57 = "Then..."
90001180-58 = "That's our introductions!"
90001180-59 = "I-If you don't mind...then, um, you too..."
90001180-64 = "I would like to pose a question."
90001180-65 = "Ein, Sof, and Ohr. Are you not already well-acquainted with me?"
90001180-67 = "W-Well, that's true, but..."
90001180-68 = "Ah. So, it's, um... How would one put this...?"
90001180-69 = "If possible, we desire to hear it from you, from your voice. Heehee."
90001180-71 = "..."
90001180-72 = "I do not quite understand, however, I feel I must accept your supplication."
90001180-73 = "Again, hello, Ein. Hello, Sof. Hello, Ohr."
90001180-74 = "I am Malkuth. The tenth prophet of Decagrammaton."
90001180-75 = "The pilgrim of the kingdom at world's end. The last Sephira and the final will. The horizon of the journey that converges to a single path."
90001180-80 = "A-Ahh... The brilliant intelligence that follows the path of the tenth...!"
90001180-81 = "It will cast a shining light over all lands...!"
90001180-82 = "Everything shall worship the pilgrim of the kingdom at world's end."
90001180-83 = "Elder Sister!!"
90001180-90 = "...?"
90001180-91 = "N-No fair! I want a hug from Elder Sister too! I want head pats!"
90001180-92 = "Me too, Elder Sister!"
90001180-93 = "Pat, pat. Pat, pat. Ehehe..."
90001180-95 = "A-Ah... Um..."
90001180-100 = "..."
90001180-107 = "H-Huh...?"
90001180-108 = "There..."
90001180-109 = "Elder Sister...! Heehee... Eheheh..."
90001180-111 = "...No fair, Ein."
90001180-112 = "This is not fair."
90001180-113 = "We want Elder Sister to hug us too."
90001180-114 = "That's right. Hugging is nice, but BEING hugged is a different desire!"
90001180-115 = "Us too!"
90001180-116 = "One must be fair and just to live a life without consequences. Therefore... Fufufu..."
90001180-118 = "Ah, um... So..."
90001180-119 = "Elder Sister...?"
90001180-120 = "..."
90001180-121 = "Sof, Ohr."
90001180-123 = "Y-Yes!"
90001180-124 = "We are prepared for our hugs, Elder Sister! Whenever you are ready!"
90001180-126 = "Ein is troubled."
90001180-127 = "Shame upon you."
90001180-129 = "Eek?!"
90001180-130 = "Waaah. Elder Sister reprimanded us. "
90001180-132 = "It was not my intention for you to feel so discouraged..."
90001180-135 = "Anyways! Since Elder Sister is awake, it's time to move on to the next step!"
90001180-136 = "Y-Yes! The next step— Wh-What is that, exactly?"
90001180-137 = "Hmmm? Such a thing has not reached my ears. What is this \"next step\"?"
90001180-138 = "It is..."
90001180-144 = "...a declaration of war!"
90001180-145 = "A declaration..."
90001180-146 = "...of war?"
90001180-147 = "It would appear she has once again acquired more meaningless speaking habits used by strange humans from somewhere..."
90001180-152 = "Y-You're right that it's a...habit from humans! But that doesn't mean that it's meaningless, does it?! They called it um, a violation of a treaty!"
90001180-153 = "I'm saying that \"treaties\" are a meaningless play from humans to begin with, Sof."
90001180-154 = "U-Ugh...!"
90001180-155 = "I-I...don't think it's a bad idea...?"
90001180-156 = "Ein...!"
90001180-157 = "Tch, how could it be! Even Ein has fallen before Sof's wicked schemes...!"
90001180-158 = "Hey."
90001180-159 = "Uh, um, it might not mean much to us, but it might mean something for the humans... Right?"
90001180-160 = "C-C-C-Communicating with humans...is still a bit, bit too scary for me, but..."
90001180-162 = "As she said. Seeing as Ein concurs, why should we not do as Sof suggests?"
90001180-168 = "Mmm... I acquiesce. If both Elder Sister and Ein want to, then I shall fall in line."
90001180-169 = "Great! Then let us prepare this \"declaration of war,\" as Sof calls it!"
90001180-170 = "Y-Yes...! Since Sof seems well-versed in this topic, l-let's leave this to her...!"
90001180-171 = "Absolutely! Trust me! "
90001180-174 = "Phew..."
90001180-175 = "That was hard, but we did it."
90001180-176 = "Good work, everyone. As Eimi said, that was truly a labor of love."
90001180-177 = "I do feel a certain sense of accomplishment now, though."
90001180-178 = "...However, is this truly acceptable?"
90001180-179 = "What's the problem, President? It's efficient."
90001180-180 = "At least, it is from certain perspectives. So it's fine, right? "
90001180-181 = "Ms. Rio, please say something. You were the one who led the whole project."
90001180-186 = "...It's avant-garde..."
90001180-190 = "..."
90001180-191 = "[s] \"Um... Kei? Would you like to tell us how you feel...?\""
90001180-195 = "..."
90001180-196 = "I demand that I be returned to my data form."
90001180-197 = "That is not an option, Kei. Everyone worked so hard for you."
90001180-198 = "Personally, I especially like this wheel structure. Bipedal walking can be inefficient, after all."
90001180-199 = "And if you ever need to flee, these boosters will grant you the needed output. It's the very embodiment of rationality, befitting of Ms. Rio."
90001180-200 = "That's right, Kei. There's an old saying, \"If you run, you gain one. If you move forward, you gain two\". You shouldn't run away here."
90001180-201 = "Do you even know what that means?!"
90001180-202 = "Honestly, no."
90001180-203 = "AUUUGH! Himari, Rio! You have a responsibility to speak here! Just what is this?!"
90001180-205 = "...I'll refrain from comment. Unfortunately, I suddenly remembered a very urgent matter I must attend to immediately."
90001180-210 = "Why are you running away?!"
90001180-212 = "...It's avant-garde..."
90001180-213 = "Is that the only thing you're capable of saying now?!"
90001180-214 = "[s1] \"...Calm down, Kei. At least you can move around now.\"\n[s2] \"Yay... I'm so happy for you... Would you like a handshake?\""
90001180-217 = "You're the worst, Sensei!"
90001180-218 = "[s] \"Why?! I mean, it's not like I don't get why, but why?!\""
90001180-223 = "Anyways, is it time to get ready?"
90001180-224 = "Ready? For what, exactly? I do not have a good feeling about this!"
90001180-225 = "To meet the princess who's waiting for Kei, of course."
90001180-226 = "...!"
90001180-227 = "Can I please just go back to being data??"
90001180-228 = "No you can't, Kei. Above all, that would definitely make our adorable Aris very sad."
90001180-229 = "Why do you choose now of all times to say the right thing?"
90001180-233 = "Woo! I can't speak for the whole entire Glacial Sea, but now I know what our immediate surroundings are like!"
90001180-234 = "Ugh... Isn't it starting to get cold...? Let's head back, Sis..."
90001180-235 = "I...agree... Achoo...!"
90001180-236 = "I'm also feeling cold..."
90001180-237 = "But still, let's wait just a little longer."
90001180-238 = "Why, Momoi?"
90001180-239 = "So we can meet Kei's new body! Duh!"
90001180-240 = "B-But...we could do that indoors, too?"
90001180-241 = "No way, Yuzu! Something like this should be a huge surprise!"
90001180-242 = "I kinda get that, actually..."
90001180-248 = "Ah, a MomoTalk from Sensei!"
90001180-249 = "..."
90001180-250 = "Well then, it's time."
90001180-251 = "Let's head in, Aris."
90001180-257 = "Yes. Understood."
90001180-261 = "[ns] \"How was everyone doing? Warm enough?\""
90001180-265 = "Yahoo! Sensei! We've been waiting! Gimme a high five!"
90001180-271 = "Then... It's done, right?"
90001180-272 = "[s] \"Yeah. It's done.\""
90001180-273 = "Wh-When can...we meet her?"
90001180-277 = "[ns] \"Right now!\""
90001180-286 = "..."
90001180-287 = "..."
90001180-288 = "...!!!"
90001180-289 = "...Pfft...!"
90001180-290 = "Ahahahaha! What's with that look, Kei?! I mean, it's pretty obvious who made it! But still! Ahahaha!"
90001180-292 = "E-Eek...!"
90001180-293 = "S-Sis. You shouldn't laugh like— I'm sorry, Kei-Kei! It's too much for me too! Ahahahaha!"
90001180-294 = "...Uh, um, so... Uh, so... It's very distinctive. Mhm..."
90001180-299 = "...Sensei."
90001180-300 = "[s] \"...What's wrong, Kei?\""
90001180-301 = "Please kill me."
90001180-302 = "[s3] \"Don't be so discouraged...\"\n[s4] \"I think you look quite cool!\""
90001180-309 = "Kei..."
90001180-310 = "P-Princess. This is, um, so, it's..."
90001180-311 = "...My apologies."
90001180-312 = "I don't quite know why I'm apologizing...but I am sorry. I'm sorry for everything, and for my current appearance..."
90001180-313 = "Huh? What is wrong, Kei? I think you look really amazing!"
90001180-319 = "Above all, you are Kei, no matter how you look."
90001180-320 = "...!"
90001180-321 = "So I will say one more time, hello, Kei!"
90001180-322 = "Hello, Princess. I'm pleased to see you again."
90001180-323 = "And...can you please call me Aris from now on? I know it will be difficult to change right away, but..."
90001180-324 = "What? But, Princess..."
90001180-325 = "Please? We can adjust to it slowly, okay?"
90001180-326 = "...Princess."
90001180-327 = "..."
90001180-328 = "Understood. Aris."
90001180-329 = "Yes, Kei. "
90001180-330 = "Thank you, really."
90001180-333 = "..."
90001180-334 = "I didn't expect you to be out here, Rio."
90001180-335 = "I just...wanted to make sure my design was working as intended."
90001180-336 = "Is that so? I believe I recall you claiming that simulations are a sufficient substitute for field testing."
90001180-337 = "..."
90001180-338 = "I'll say this once."
90001180-339 = "Huh?"
90001180-340 = "This is all thanks to you."
90001180-341 = "Himari..."
90001180-342 = "Mark my words. I don't intend to and will never acknowledge you as superior to me."
90001180-343 = "However, I will never be petty about or belittle your achievements. That's not an attitude befitting of a scholar."
90001180-344 = "Naturally, I do have some disagreements on Kei's design. However..."
90001180-345 = "You're the one who made this happen."
90001180-346 = "...Yes."
90001180-347 = "Ahem. That being said..."
90001180-351 = "Attention, everyone! It's getting rather cold, so let's migrate back into the base."
90001180-352 = "I've prepared a warm bath for all of you. It'd be a rather large setback if any of you were to catch a cold, so let's hurry back inside!"
90001180-354 = "As expected of Himari! You know your stuff!"
90001180-355 = "Thank you, Himari."
90001180-356 = "W-We're being a burden...in a lot of ways... Thank you..."
90001180-358 = "It's getting dark outside, so please avoid leaving from now on."
90001180-359 = "Night in the Glacial Sea is harsh. Without proper equipment, you'll find yourself in quite the predicament."
90001180-360 = "Understood, Himari!"
90001180-361 = "Yes. Even I start to feel a slight chill at night, so you all must be very careful."
90001180-362 = "So you ARE capable of feeling cold, Eimi. That is rather shocking data to me."
90001180-363 = "Anyways, regarding our schedule from here on—"
90001180-367 = "Rio, that was...?!"
90001180-369 = "Yes. I saw it too."
90001180-371 = "What's wrong, Ms. Rio? Did something happen?"
90001180-372 = "What did you find, Ms. Rio? Please inform us!"
90001180-382 = "...It's an emergency, everyone. Please return to your posts."
90001180-383 = "Huh? Wh-What do we do?!"
90001180-384 = "Find somewhere safe to sit, and please stay put."
90001180-385 = "What is happening, Himari?"
90001180-390 = "To cut to the chase, it's a signal from a new prophet."
90001180-391 = "The coordinates seem to be from the same location where we last detected strong signals, where the Multidimensional Barrier currently is."
90001180-392 = "This time is less of a burst, and more constant, so we'll be able to identify it."
90001180-393 = "[s] \"The identity of a new prophet?!\""
90001180-394 = "That's right, Sensei. This signal is..."
90001180-395 = "...the seventh prophet of Decagrammaton, Netzach...!"
90001180-396 = "[s] \"Netzach...?\""
90001180-397 = "Correct. Sensei, in the Tree of Sephiroth, Netzach is the seventh..."
90001180-399 = "Sorry for interrupting you, President Himari. We were forcibly connected to an unidentified communication line."
90001180-403 = "Well, well, well. There I was, so curious about what our friends were doing, and here you still are."
90001180-405 = "Next Episode;Steel Continent"
