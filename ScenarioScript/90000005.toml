[translation]
90000005-1 = "ตอนที่ 1;บทเริ่มต้น"
90000005-3 = "หวัดดีคุณครู ขอบคุณที่มาถึงที่นี่นะ"
90000005-4 = "เรื่องนี้สำคัญมาก เลยต้องขอให้มาที่นี่โดยไม่บอกคนอื่น มีคนรอเจอคุณครูอยู่น่ะ"
90000005-8 = "ทางนี้"
90000005-12 = "หัวหน้า พาคุณครู [USERNAME] มาแล้วล่ะ"
90000005-17 = "ขอบใจมากนะ เอมิ ยินดีที่ได้พบค่ะคุณครู "
90000005-18 = "ฉันชื่อฮิมาริ แฮ็กเกอร์ยอดอัจฉริยะแห่งมิลเลเนียมค่ะ"
90000005-19 = "[s] \"เรียกตัวเองว่าอัจฉริยะเหรอ...?!\""
90000005-20 = "อืม... ฉันค่อนข้างมีชื่อเสียงอยู่พอสมควร บางทีคุณครูอาจจะเคยได้ยินมาบ้างก็ได้นะคะ"
90000005-21 = "อย่างเช่นหัวหน้าคนสวยของเวอริทัสที่ปกปิดตัวจริง... หรือสาวน้อยที่แสนงดงามแต่ขี้โรค..."
90000005-22 = "ดอกไม้งามบริสุทธิ์แห่งมิลเลเนียม... อะไรประมาณนี้ค่ะ พอนึกออกบ้างไหมคะ? ไม่เคยได้ยินมาบ้างเลยเหรอคะ?"
90000005-23 = "[s1] \"หึ ไม่เคยเลย\"\n[s2] \"เหมือนเคยได้ยินมาบ้าง...\""
90000005-24 = "คะ?! งะ...งั้นเหรอคะ?"
90000005-25 = "ไม่มีทาง... แบบนั้นมัน..."
90000005-26 = "..."
90000005-27 = "หัวหน้าหงอยแล้วเนี่ย คุณครู จะรับผิดชอบยังไงน่ะ?"
90000005-28 = "มะ...ไม่ได้แล้วละค่ะ ต้องสนใจเรื่องการสร้างภาพลักษณ์ให้มากกว่านี้แล้ว..."
90000005-29 = "ว่าไหมคะ? ฮุฮุ ฮุฮุฮุฮุ..."
90000005-30 = "ฮุฮุฮุ..."
90000005-31 = "หัวหน้าเหลิงตัวเองคิดไปโน่นแล้วนะ คุณครู... จะรับผิดชอบยังไงน่ะ"
90000005-32 = "ตายจริง เอมิ?  ฉันไม่ได้เหลิงตัวเองหรอกนะคะ"
90000005-33 = "ฉันแค่ตรวจดูว่าทุกอย่างดำเนินการไปอย่างราบรื่นโดยการตรวจสอบข้อเท็จจริงก็เท่านั้นเองค่ะ"
90000005-34 = "ยังไงก็ตาม ฉันได้รับแต่งตั้งให้เป็นหัวหน้าของ <ชมรมปรากฏการณ์ลี้ลับ> เมื่อไม่นานมานี้ค่ะ"
90000005-35 = "ดังนั้นงานของทางเวอริทัสก็เลยจะมอบหมายให้จี้จังดูแลทั้งหมดค่ะ..."
90000005-36 = "[s] \"ชมรมปรากฏการณ์ลี้ลับคืออะไรน่ะ...?\""
90000005-37 = "<ชมรมปรากฏการณ์ลี้ลับ> เป็นองค์กรลับพิเศษที่คุณริโอะ ประธานนักเรียนโรงเรียนมิลเลเนียมก่อตั้งขึ้นมาค่ะ..."
90000005-38 = "อืม... เอมิ? ช่วยอธิบายให้หน่อยได้มั้ยคะ?"
90000005-39 = "ชมรมนี้เป็นชมรมที่อยู่ภายใต้การดูแลของเซมิน่า มีเป้าหมายเพื่อติดตามและศึกษาวิจัยปรากฏการณ์ ที่ไม่สามารถอธิบายด้วยวิทยาศาสตร์ได้"
90000005-40 = "ชมรมนี้ตั้งขึ้นตามคำสั่งของรุ่นพี่ริโอะก็จริงอยู่ แต่มีฉันเป็นสมาชิกคนเดียว ยังไม่มีกิจกรรมชมรมเป็นชิ้นเป็นอันเลย "
90000005-41 = "นั่นสินะคะ หรือว่าฉันจะกลายมาเป็นหัวหน้าชมรมผู้น่าสงสัยที่ริโอะตั้งขึ้นซะแล้ว... อีกอย่าง สมาชิกก็มีแค่คนเดียวด้วย..."
90000005-42 = "ถ้าตอนนี้รวมหัวหน้าฮิมาริด้วยก็เป็นสองคนนะ"
90000005-43 = "ค่ะ นั่นสินะคะ เอมิที่สุขภาพดีกับสาวน้อยน่ารักที่ขี้โรค เป็นส่วนผสมที่ลงตัวดีเหมือนกันนะคะ ฮุฮุ "
90000005-44 = "อืม... หัวหน้าฮิมาริ ขอฝากตัวด้วยนะ"
90000005-45 = "ว่าแต่... ที่นี่มันไม่ร้อนไปหน่อยเหรอ? "
90000005-49 = "ไม่ค่ะ ฉันหนาวจนสะท้านไปทั้งตัวแล้วค่ะ เพราะงั้นวางรีโมตแอร์ลงเดี๋ยวนี้เลยนะคะ เอมิ"
90000005-53 = "ไม่ได้นะคะ ห้ามถอดเสื้อออกด้วยค่ะ คะ? ซิปเหรอคะ? พูดอะไรกัน... ไม่ได้เด็ดขาดค่ะ ไม่ต้องโชว์ให้ฉันดูก็ได้ค่ะ ไม่เป็นไรค่ะ"
90000005-54 = "[s] \"ให้ครูช่วยอะไรมั้ย?\""
90000005-55 = "ค่ะ ใช่แล้วค่ะ ถ้างั้นจะขอเข้าประเด็นเลยนะคะ..."
90000005-56 = "คุณครูอาจจะทราบแล้วว่าฉันมีเรื่องขัดแย้งกับริโอะ ประธานสภานักเรียนมิลเลเนียมมานานแล้วค่ะ"
90000005-57 = "เธอที่ชอบทำตัวเป็นพี่สาวคนโตพยายามจะควบคุมทุกอย่างให้ได้ และฉันที่เป็นพวกยึดถือ#nการปฏิบัติโดยเสรี จึงต่อต้านการควบคุมอย่างสมบูรณ์แบบของเธอ เพราะงั้นเราเลยไม่มีทางที่จะ#nคุยกันถูกคอได้เลยค่ะ"
90000005-58 = "หรือพูดอีกอย่างก็คือ ถ้าริโอะเป็นน้ำที่ไหลอยู่ในท่อระบายน้ำใต้ดิน ฉันก็เป็นน้ำแร่บริสุทธิ์ชั้นยอด..."
90000005-59 = "อืม... ต้องบอกว่าเหมือนน้ำเน่าที่ไหลไปมาอยู่ในบ่อบำบัดน้ำเสียน่าจะเหมาะกว่านะคะ ส่วนฉันก็เหมือนกับคริสตัลแห่งหิมะบริสุทธิ์..."
90000005-60 = "ไม่ใช่สิ ต้องบอกว่าเหมือนเศษขยะถึงจะเห็นภาพได้ชัดเจนมากกว่าค่ะ"
90000005-61 = "อืม... เดี๋ยวนะคะ ขอนึกคำเปรียบที่ดีกว่านี้..."
90000005-62 = "หัวหน้า เข้าเรื่องเลยเถอะ"
90000005-63 = "ค่ะ... ยังไงก็เถอะค่ะ ตอนแรกฉันก็คิดจะปฏิเสธเพราะเป็นคำขอร้องจากริโอะ..."
90000005-64 = "แต่ว่าคำขอร้องของเธอก็ปฏิเสธยากมาก ฉันก็เลยได้รับมอบหมายให้เป็นหัวหน้าของ <ชมรมปรากฏการณ์ลี้ลับ> ค่ะ"
90000005-65 = "และเพื่อทำคำขอของเธอให้สำเร็จจำเป็นต้องให้ทาง <ชาเล่ต์> ช่วยค่ะ "
90000005-66 = "เพราะงั้นฉันถึงได้เชิญคุณครูให้มาที่นี่"
90000005-67 = "[s] \"คำขออะไรงั้นเหรอ?\""
90000005-71 = "เดคาแกรมมาทอน..."
90000005-72 = "คุณครูคงจะเคยได้ยินมาบ้างแล้วสินะคะ เพราะผู้ที่ติดต่อกับ AI ที่ไม่เคยมีมาก่อนเป็นคนแรก ก็คือทาง <ชาเล่ต์> นี่คะ"
90000005-75 = "\"การศึกษาวิจัย วิเคราะห์และพิสูจน์การมีอยู่ของเทพเจ้า และหากสามารถพิสูจน์ได้ ก็ดำเนินการวิเคราะห์โครงสร้างต่อ และหากสามารถวิเคราะห์โครงสร้างได้ ก็จะสร้างขึ้นมาใหม่ได้ ซึ่งนั่นก็คือวิธีการ... ที่จะสร้างเทพเจ้าขึ้นมาใหม่...\""
90000005-76 = "ระบบวิเคราะห์ตนเองแบบสมบูรณ์ที่สร้างขึ้นจากสมมติฐานนั้น"
90000005-77 = "หรือกล่าวอีกนัยหนึ่งก็คือ... ปัญญาประดิษฐ์ที่ค้นพบหนทางสู่เทพเจ้า"
90000005-79 = "แต่ว่าพวกเราเองก็ได้ลองค้นหามาหลายวิธีแล้ว แต่ก็ไม่พบสมมติฐานที่ว่านั่นเลยค่ะ"
90000005-80 = "พวกกลุ่ม <เกมาเทรีย> ที่คุณครูเขียนมาในรายงานเอง ก็ยังยืนยันไม่ได้ว่ามีตัวตนอยู่จริงหรือไม่ค่ะ"
90000005-81 = "รายงานของทาง <ชาเล่ต์> ยังคลุมเครืออยู่หลายอย่าง จนไม่สามารถดำเนินการวิจัยได้ค่ะ"
90000005-82 = "ฉันไม่ได้สงสัยคุณครูนะคะ แค่พูดเกี่ยวกับเรื่องหลักฐานเฉยๆ ค่ะ"
90000005-83 = "ถ้าฉันไม่ไว้ใจคุณครู คงไม่พามาที่นี่หรอก"
90000005-84 = "ค่ะ ใช่แล้วค่ะ ดังนั้นตอนนี้ เราเลยต้องการความช่วยเหลือจากทางชาเล่ต์ค่ะ"
90000005-85 = "ไม่นานมานี้เกิดเหตุการณ์ที่ หน่วยก่อสร้างเครือข่าย AI <HUB> ในเขตปกครองตนเองมิลเลเนียมได้ถูก AI ปริศนาแฮ็กเข้าไปและถูกพาไปซ่อนไว้ค่ะ"
90000005-86 = "<HUB> เป็นหน่วยประมวลผลที่มีระดับความสามารถสูงพิเศษเหมือนกับเป็นหอประวัติศาสตร์ ที่เก็บรักษาประวัติศาสตร์ของโรงเรียนมิลเลเนียม "
90000005-87 = "อาจเรียกได้ว่ามันเป็นหนึ่งในสิ่งประดิษฐ์ชิ้นเอกที่เก็บรักษาแก่นแท้ของเทคโนโลยี ของมิลเลเนียมไว้..."
90000005-88 = "แต่ว่า AI ตัวนั้นกลับถูกแฮ็กได้ภายในเวลา 0.00000031 วินาทีค่ะ"
90000005-89 = "ริโอะกับฉันจึงสงสัยว่า AI ที่แฮ็กระบบของ HUB อาจจะเป็น <เดคาแกรมมาทอน> ค่ะ"
90000005-90 = "เหตุผลก็คือ..."
90000005-96 = "หลังจากแฮ็ก <HUB> แล้ว เจ้านั่นได้ทิ้งประโยคพวกนี้ไว้ในเครือข่ายข้อมูลของมิลเลเนียม แล้วก็หายตัวไปค่ะ"
90000005-98 = "ในที่สุด ข้าก็ได้พบกับเส้นทาง (path) แห่งโชคชะตาแล้ว"
90000005-100 = "โอ้ - เส้นทาง (path) ของข้าได้ถูกเติมเต็มด้วยเกียรติภูมิ"
90000005-102 = "อีกหนึ่งนามเรียกขานของข้า... ก็คือเกียรติยศอันประจักษ์ด้วยความรุ่งโรจน์"
90000005-104 = "นามของข้าคือ \"HOD\""
90000005-106 = "ผู้เลื่อมใสลำดับที่ 8 ผู้ทำนายถึงปาฏิหาริย์และเป็นผู้พิสูจน์เทพเจ้าแห่งอักขระศักดิ์สิทธิ์ทั้งสิบ"
90000005-110 = "อักขระศักดิ์สิทธิ์ทั้งสิบ... นั่นหมายถึงเดคาแกรมมาทอนค่ะ"
90000005-111 = "เรื่องแรกที่สามารถอนุมานได้จากเรื่องนี้"
90000005-112 = "เดคาแกรมมาทอนได้เชื่อมต่อกับ AI และเปลี่ยนให้พวกนั้นกลายเป็นลูกสมุนของตนเอง... หรือทำให้เป็น <ผู้เลื่อมใส>  "
90000005-113 = "ริโอะมองว่านี่เป็นการแฮ็กของโมดูลบุคลิกที่เป็นมนุษย์ประเภทหนึ่ง แต่ว่าฉันคิดต่างไปจากนั้นค่ะ"
90000005-114 = "นี่เป็นการ <ล้างสมอง>... ไม่สิ คำนี้อาจไม่เหมาะสมเท่าไร คือ... ฉันมองว่าเป็นการ <ใช้อิทธิพล> จูงใจ AI ค่ะ"
90000005-115 = "เรื่องที่สอง เหล่าผู้เลื่อมใสของเดคาแกรมมาทอนเคลื่อนไหวแยกอิสระ"
90000005-116 = "ดูจากการที่เขาประกาศตัวเองว่าเป็นผู้เลื่อมใสที่พิสูจน์เทพเจ้าแห่งอักขระศักดิ์สิทธิ์ทั้งสิบแล้ว... ก็ยืนยันได้แล้วล่ะค่ะ "
90000005-117 = "รูปแบบการเป็นผู้เลื่อมใสของเดคาแกรมมาทอนไม่ใช่ <การครอบงำ> ค่ะ หากต้องการจะออกคำสั่ง... การกำหนดเป้าหมายด้วยตัวเองก็เป็นเรื่องที่สะดวกที่สุดแล้วใช่มั้ยล่ะคะ "
90000005-118 = "แต่ว่านั่นเป็น <การโน้มน้าว> และให้พวกเขาเคลื่อนไหวกันได้เองอย่างอิสระ"
90000005-119 = "มันเป็นวิธีที่ไม่มีประสิทธิภาพ และไม่สมเหตุสมผลเลย... แล้วทำไมถึงทำอย่างนั้นล่ะคะ?"
90000005-120 = "ดังนั้นตั้งแต่นี้ไปเราต้องไปสืบหาข้อมูลเรื่องนี้ค่ะ"
90000005-126 = "เพื่อการวิจัยและวิเคราะห์ <เดคาแกรมมาทอน> ทางชาเล่ต์จะให้ความร่วมมือกับ <ชมรมปรากฏการณ์ลี้ลับ> ใช่มั้ยคะ?"
90000005-128 = "ตอนต่อไป;รวบรวมข้อมูล 1 - ทะเลทรายอะบิดอส"
