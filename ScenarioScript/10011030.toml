[translation]
10011030-1 = "Episode 3; When I Say Ninja, You Say Princess!"
10011030-2 = "Thirty minutes before the start of the performance..."
10011030-3 = "[ns] \"So, this is backstage.\""
10011030-8 = "I'm a little nervous!"
10011030-9 = "Me too! My heart's pounding like crazy!"
10011030-11 = "Wahaha! What're you all so nervous about? We're more than capable of this mission."
10011030-12 = "Y-Yeah! And, um... Sensei. Thank you for making this happen for us."
10011030-13 = "Well said! My lordship... You have set the stage for the Ninjutsu Research Club to finally shine!"
10011030-14 = "[s1] \"I just asked the Yin-Yang Club for help since Michiru can't fill out the application.\"\n[s2] \"Well, it seems Michiru couldn't submit an official club application for some reason.\""
10011030-17 = "Oof! That's...!"
10011030-18 = "That's not... You're so...!"
10011030-19 = "That doesn't matter! I'm going to give my best ninja performance right here, right now!"
10011030-20 = "The end! Mission accomplished!"
10011030-21 = "G-Got it! I'll do my best to be an o-outstanding ninja!"
10011030-22 = "I'm all in! Nin nin!"
10011030-23 = "[s] \"You guys really do love ninjas.\""
10011030-24 = "Why do you think we made the Ninjutsu Research Club? Because we love puppies?"
10011030-25 = "I really do love them! I can't wait to be a full-fledged ninja!"
10011030-26 = "I mean, I'm definitely not very knowledgeable about ninjas..."
10011030-27 = "Don't worry, young grasshopper. Ninjas are the coolest of the cool, so you'll catch on soon!"
10011030-28 = "This is exactly why I want to spread awareness of ninja culture in Kivotos. It's the whole purpose behind my video channel."
10011030-29 = "[s] \"That's pretty ambitious.\""
10011030-30 = "I know. It only has a few subscribers, but as long as we keep hustling I know people will begin to see the beauty in ninjas!"
10011030-31 = "Why, you ask, do we persevere?"
10011030-32 = "Because to never give up..."
10011030-33 = "That's the way of the ninja! Nin nin!"
10011030-34 = "[s] \"So, tell me more about the Princess Waraku performance.\""
10011030-35 = "Princess Waraku is an experiential event, and one of the movie village's greatest attractions."
10011030-39 = "The story goes something like this: Chise is a princess from a prestigious family."
10011030-43 = "But one day, she's kidnapped by a cabal after her family's power."
10011030-47 = "And during this harrowing moment, the members of the audience..."
10011030-55 = "...suddenly become the main characters! They have to overcome a series of obstacles to rescue the princess."
10011030-57 = "It might be a pretty cliche plot, but the real experience is being the main character in the story, clearing the obstacles, and the excitement of saving the princess."
10011030-58 = "And the audience members compete amongst themselves to be the first to save her!"
10011030-59 = "And, thus, all these factors come together for a perfect experiential performance!"
10011030-60 = "I-I've only ever watched it broadcasted..."
10011030-61 = "I can't believe I get to participate this time!"
10011030-62 = "Heehee. I'd be lying if I said I wasn't excited for this opportunity."
10011030-63 = "Wait just one moment! The princess is played by none other than Chise herself!"
10011030-64 = "D-Do you think you could get her autograph?!"
10011030-65 = "President, how resourceful of you. U-Using this opportunity to finally achieve your life desire!"
10011030-66 = "You really are a true ninja...! Wow!"
10011030-67 = "...?"
10011030-68 = "Tsukuyo... Was that supposed to be a compliment?"
10011030-69 = "Well, regardless, OF COURSE I'll get Chise's autograph if I can!"
10011030-75 = "Assistants, please get ready."
10011030-76 = "The acting cast will be arriving soon."
10011030-80 = "[ns] \"Ooh, it's finally starting.\""
10011030-86 = "Ch-Chise...! I'm your b-b-biggest f-f-fan!"
10011030-88 = "Okie-dokie! Ibuki! Will try her best!"
10011030-90 = "...What?"
10011030-91 = "Isn't that...a Gehenna student?"
10011030-93 = "Haha. Chairman Makoto, thank you for your enthusiastic cooperation in planning for this exchange meeting."
10011030-95 = "Kiheheheheh! No thanks is necessary!"
10011030-96 = "I should be the one thanking you, in fact."
10011030-97 = "This exchange meeting will prove once and for all that Gehenna Academy IS capable of hosting a fun event."
10011030-98 = "Not only that... But it'll prove the only person with the clout! The influence! The vision to pull together the event of a lifetime.."
10011030-99 = "...Is me and only me! The Great Makoto! Kiheheheheh!"
10011030-100 = "Bwahaha! I love your energy! I have a little suggestion that might benefit from that wonderful influence of yours."
10011030-101 = "Would you like to hear it?"
10011030-102 = "Oh?"
10011030-104 = "They just changed the star of the show like that?"
10011030-105 = "What were they thinking? Wasn't this performance supposed to be super important?"
10011030-106 = "What? Is Ibuki not 'posed to be the princess?"
10011030-107 = "D-Did Ibuki do something wrong?"
10011030-108 = "[s] \"No, Ibuki. You didn't do anything wrong, per se.\""
10011030-115 = "Waaaahhhh?!"
10011030-116 = "The lights! Is it an enemy ambush?"
10011030-117 = "[s] \"It'll be okay. It's probably just an outage.\""
10011030-119 = "Wa..."
10011030-120 = "Waah...?"
10011030-121 = "Waaaaagh...! Where did the lights go? Ibuki doesn't like this at all!"
10011030-122 = "Is Ibuki in trouble? Is it Ibuki's fault? Ibuki can't see..."
10011030-123 = "Iroha... Makoto... *sob*"
10011030-125 = "(Dang it! The situation isn't good!)"
10011030-126 = "(I-If she has a meltdown and ruins the show, we'll fail our mission!)"
10011030-127 = "(This is part of being a ninja too! I need to calm her down.)"
10011030-129 = "Don't worry, little Ibuki! None of this is because of you. Right, Honorable Sensei?"
10011030-130 = "[s] \"Oh, yeah. It's just a little hiccup.\""
10011030-131 = "*sniff* Huh...? H-Hiccup...?"
10011030-132 = "Hiccups aren't scary, right? And Honorable Sensei is here too, so you know you're safe!"
10011030-133 = "You're right... Sensei is Ibuki's friend, but...but who are you?"
10011030-135 = "Izuna and Tsukuyo! And our president! The trio of three!"
10011030-141 = "And we are the Ninjutsu Research Club! Our dream is to become the best ninjas of all time!"
10011030-143 = "...Ninjas?"
10011030-144 = "I mean, ninjas are actually kind of a metaphor for..."
10011030-145 = "Y-You're lying? You're not ninjas?"
10011030-146 = "What, no! Stop making assumptions!"
10011030-147 = "O-Of course it's not a lie!"
10011030-151 = "Our dream is to become the best ninjas out there...! And ninjas are cool and strong!"
10011030-152 = "So there's nothing to be afraid of, student of Gehenna... Ibuki."
10011030-153 = "No matter what scary things happen, the Ninjutsu Research Club..."
10011030-154 = "...We ninjas will protect our princess, Ibuki! Right, President?"
10011030-155 = "[s] \"Do ninjas protect princesses?\""
10011030-157 = "Honorable Sensei?! Enough with the semantics!"
10011030-158 = "*sob*"
10011030-159 = "Stop distracting me, Sensei! We'll protect you no matter what, Ibuki!"
10011030-160 = "Waah... Wh-Where's Iroha..."
10011030-161 = "Hmm, we can't talk her out of it. But we can't fail our mission as ninjas."
10011030-165 = "I got it!"
10011030-169 = "Here! If you feel scared, this will keep you safe!"
10011030-170 = "[s] \"...New ninja merch?\""
10011030-178 = "...Wow!"
10011030-180 = "(Yes! It worked!)"
10011030-183 = "What is it? Ibuki wants to know!"
10011030-184 = "So you also appreciate the coolness of ninjas!"
10011030-185 = "Don't get too excited now! This is Ninpero, the star of the Ninja Ninpero!"
10011030-186 = "He's the strongest of the strong, defeating any evil that dares stand in his way!"
10011030-187 = "Bahaha! He's so weird looking! Ibuki wanna pull the wings off!"
10011030-188 = "Hey! That's a limited-edition plush I waited in line for three hours for!"
10011030-196 = "Ahem! Ninpero will be your protector during the performance!"
10011030-203 = "Should our adorable princess find herself in trouble, just hold on to Ninpero as a reminder of our promise."
10011030-204 = "We promise we'll come and rescue you, no matter what it takes! Okay, princess?"
10011030-205 = "You mean it?"
10011030-206 = "Of course! Rule three of being a ninja!"
10011030-207 = "A ninja never breaks their word!"
10011030-208 = "[s] \"You heard her. Isn't that cool, Ibuki?\""
10011030-209 = "Yay! Okay! Thanks!"
10011030-210 = "Another mission successfully completed!"
10011030-211 = "Heh. Eh-heh-heh!"
10011030-216 = "The lights are back on!"
10011030-218 = "I'm glad they could fix it quickly."
10011030-219 = "See? Told you it was nothing."
10011030-224 = "Our apologies, we had some technical difficulties! Princess, you're up!"
10011030-228 = "How exciting! Break a leg, Ibuki!"
10011030-229 = "You got this...!"
10011030-230 = "Good luck!"
10011030-232 = "Thanks, ninjas! Ibuki's gonna go now, Sensei!"
10011030-236 = "Phew... I wasn't sure we'd be able to calm her down."
10011030-237 = "That was really close... But ninjas must complete their missions no matter the adversities."
10011030-238 = "And now it's show time!"
10011030-239 = "Here's to hoping the rest of the performance goes smoothly!"
10011030-248 = "Who are you guys? I didn't know they hired more assistants."
10011030-253 = "[ns] \"Hang on a second... Aren't you...?\""
10011030-258 = "Don't forget, us Free-Spirited Mouryo are here for a specific goal. Execute the mission swiftly, and get rid of anyone who stands in our way. No distractions."
10011030-260 = "Yes, ma'am!"
10011030-263 = "Wh-Wh-What did they just say?! Get rid of...??"
10011030-264 = "President! My lord! This is a ninja emergency! Nin!"
10011030-265 = "What's going on?! I'm confused!"
