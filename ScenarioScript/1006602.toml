[translation]
1006602-1 = "เมดจำเป็น"
1006602-2 = "(คุณครูรีบมุ่งหน้าไปยังห้องชมรมพัฒนาเกม)"
1006602-9 = "ห้องชมรมพัฒนาเกม"
1006602-10 = "[ns] \"อาริสึ?\""
1006602-11 = "ผู้กล้าเอ๋ย... มาหาข้าจริงด้วยสินะ..."
1006602-12 = "[s1] \"มันก็แน่นอนอยู่แล้ว ก็ครูเป็นห่วงอาริสึไง\"\n[s2] \"ว่าแต่ อยู่ตรงไหนเหรอ?\""
1006602-15 = "ผู้กล้าเอ๋ย เจ้ากลับไปเถอะ... ตอนนี้อาริสึออกไปพบเจอใครไม่ได้..."
1006602-16 = "[s] \"เกิดเรื่องอะไรขึ้นจริงๆ งั้นเหรอ?\""
1006602-17 = "..."
1006602-18 = "[s3] \"ถ้ามีปัญหา ขอให้ครูได้ช่วยคิดหาทางแก้เถอะ\"\n[s4] \"ครูอยากเป็นกำลังใจให้อาริสึนะ\""
1006602-29 = "ไม่แฟร์เลยค่ะคุณครู... ถ้าพูดอย่างนั้น อาริสึก็ต้องออกไปหาสิคะ..."
1006602-30 = "[s] \"อ๊ะ... ว่าไงอาริสึ ใส่ชุดเมดด้วย? มีเรื่องอะไรเหรอ?\""
1006602-31 = "หวา...! คุณครูก็พูดคำต้องคำสาปอย่าง <ชุดเมด> ออกมาเสียแล้วค่ะ!"
1006602-32 = "อืม ชุดเมดคืออาวุธของอาริสึค่ะ! แต่ยังไงมันก็ยังไม่ชินอยู่ดีค่ะ!"
1006602-33 = "เดิมทีอาริสึไม่คิดที่จะใส่ชุดนี้หรอกค่ะ แต่พอคุณครูบอกว่าจะมาก็เลยรีบหยิบขึ้นมาใส่..."
1006602-34 = "...เพราะงั้นคุณครูต้องรับผิดชอบที่อาริสึเป็นแบบนี้ค่ะ!"
1006602-40 = "คุณครูคะ! ก่อนอื่นช่วยลูบหัวอาริสึหน่อยนะคะ!"
1006602-42 = "(คุณครูช่วยลูบหัวอาริสึ)"
1006602-43 = "(อาริสึเริ่มสงบลงบ้างแล้ว!)"
1006602-45 = "[ns] \"อาริสึ อธิบายกับครูมาก่อนได้มั้ยว่าเกิดอะไรขึ้น?\""
1006602-46 = "เรื่องนั้น..."
1006602-50 = "[ns5] \"เอ่อ... มีชุดเมดนี้เหลืออยู่ชุดเดียว\"\n[ns6] \"ก็เลยต้องหยิบชุดนี้มาใส่ใช่มั้ย?\""
1006602-53 = "ใช่ค่ะ... อาริสึเอาชุดอื่นไปซักหมด ชุดที่ใส่ได้ก็เลยมีแต่ชุดเมดที่มิโดริเอาไว้อ้างอิงเวลาออกแบบชุด#nในเกมค่ะ..."
1006602-54 = "แต่สำหรับอาริสึแล้ว ชุดเมดเป็นเสื้อเกราะที่ถูกสาป! มันทำให้สเตตัสทั้งหมดของอาริสึลดลงค่ะ!  "
1006602-55 = "ทั้งในการต่อสู้อย่างดุเดือดในอดีต ทั้งการฟาดฟันในอารีน่ากับรุ่นพี่เนรุ ทั้งสหายที่ล้มเจ็บ..."
1006602-56 = "ฉากดีๆ อย่างที่คาดไม่ถึง ภาพคัตซีนที่ประทับใจจนน้ำตาซึม ปลาวาฬสีน้ำเงินที่โบยบินเข้าสู่#nพระอาทิตย์ตกในฉากจบ และโฆษณา 'ขอตัวสักครู่นะคะ' กับ CM อีก..."
1006602-57 = "[s7] \"อ้อ~ มีเรื่องแบบนี้ด้วยสินะ\"\n[s8] \"น่าจะมีความทรงจำอื่นมาปนด้วยนะเนี่ย?!\""
1006602-60 = "เอาเถอะค่ะ! เอาเป็นว่าหลังจากนั้นชุดเมดกับอาริสึก็ทำงานร่วมกันได้แย่มากค่ะ..."
1006602-61 = "ร่างกายก็ขยับได้ไม่เหมือนเดิมด้วย... แขนขาอาริสึสั่นงึกๆ แล้วแทนที่จะมีความกล้าหาญ แต่ก็ได้ความ#nกลัวมาแทนค่ะ..."
1006602-62 = "กระซิก... ถ้ายังเป็นแบบนี้... อาริสึก็ทำหน้าที่เป็นผู้กล้าไม่ได้ค่ะ..."
1006602-63 = "[s] \"เอาอย่างนี้มั้ยอาริสึ!\""
1006602-64 = "...?"
1006602-65 = "[s] \"เรามาพิชิตชุดเมดด้วยกันเถอะ!\""
1006602-66 = "พิชิต... เหรอคะ? พิชิตยังไงคะ...?"
1006602-67 = "ไหนๆ ก็ใส่ชุดเมดแล้ว ก็เลยจะให้เปลี่ยนคลาสเป็นเมดเลยงั้นเหรอคะ?"
1006602-68 = "[s9] \"ใช่! ถ้าเปลี่ยนคลาสเป็นเมดแล้วลองใช้ชีวิตแบบเมดดู\"\n[s10] \"ก็จะอัปเลเวลได้ใหม่ แล้วก็ฟื้นฟูสเตตัสได้ด้วยไง!\" "
1006602-71 = "งือ... อาริสึไม่รู้ว่าจะทำได้หรือเปล่า... แต่จะลองเชื่อคำพูดของคุณครูดูนะคะ..."
1006602-72 = "ไม่สิ ต้องบอกว่าอาริสึอยากเชื่อค่ะ!"
1006602-73 = "ถ้าอย่างนั้นจากนี้อาริสึต้องทำยังไงเหรอคะ...?"
1006602-74 = "[s] \"ทำงานแบบที่คนเป็นเมดทำกันมั้ย\""
1006602-75 = "งานที่เมดทำกันเหรอคะ?"
1006602-79 = "ที่อาริสึรู้มาก็คือ... ปกติแล้ว... เมดจะทำความสะอาดกันเป็นส่วนใหญ่ค่ะ"
1006602-80 = "นอกจากนั้นก็มีออกไปต่อสู้ ทำลาย และก็ลักลอบบุกบ้าง..."
1006602-81 = "คะ? อย่างหลังก็ไม่เลวงั้นเหรอคะ?"
1006602-82 = "ถ้างั้น... อาริสึจะเริ่มจากทำความสะอาดก่อนเลยค่ะ!"
1006602-86 = "แง๊! ทำไมมีข้าวของให้เก็บกวาดเยอะแบบนี้คะ!"
1006602-87 = "มีทั้งขวดน้ำดื่มกลิ้งไปมา ถุงขนมเปล่าๆ เกลื่อนไปทั่ว แถมฝุ่นยังเต็มห้องชมรมไปหมดเลยค่ะ..."
1006602-88 = "อาริสึจะเก็บกวาดคนเดียวไหวมั้ยคะเนี่ยคุณครู?"
1006602-89 = "[s] \"ค่อยๆ เก็บทีละอย่างๆ กันเถอะ...\""
1006602-90 = "เข้าใจแล้วค่ะ... อาริสึจะค่อยๆ เก็บกวาดทีละอย่างค่ะ..."
1006602-92 = "คุณครู ช่วยเตรียมถุงพลาสติกให้หน่อยค่ะ ใบเดียวคงไม่พอแน่ น่าจะต้องใช้อีก 2-3 ใบเลยค่ะ"
1006602-94 = "หวา! เศษขนมกระเด็นออกมาจากถุงขนมค่ะ! ต้องเก็บกวาดเดี๋ยวนี้เลยค่ะ! ขอความช่วยเหลือด้วยค่ะ!"
1006602-96 = "แค่กๆ แค่กๆ! พอปัดฝุ่นแล้วฝุ่นก็เริ่มกระจายออกมามากกว่าเดิมอีกค่ะ! แบบนี้เราต้องฉีดน้ำเพื่อระงับ#nฝุ่นก่อนค่ะ!"
1006602-97 = "คะ? จะฉีดน้ำในอาคารสุ่มสี่สุ่มห้าไม่ได้งั้นเหรอคะ?"
1006602-98 = "มันก็จริงนะคะ..."
1006602-100 = "(สุดท้ายคุณครูก็ทำความสะอาดห้องชมรมกับอาริสึได้สำเร็จ...)"
1006602-106 = "..."
1006602-107 = "คุณครูคะ! ในที่สุดก็ทำความสะอาดเสร็จแล้วค่ะ! ห้องชมรมดูสะอาดตาขึ้นมาแล้วค่ะ!"
1006602-108 = "[ns] \"แล้วอาริสึก็ขยับตัวได้ดีขึ้นด้วยนะ\""
1006602-109 = "เอ๋...? จะว่าไปก็..."
1006602-110 = "สุดยอดเลยค่ะคุณครู! แขนขาอาริสึไม่สั่นอีกแล้วค่ะ! รู้สึกดีขึ้นด้วยค่ะ!"
1006602-111 = "เป็นอย่างนี้เองเหรอคะ? สำเร็จเควสทำความสะอาดในฐานะเมด แล้วได้ EXP จนเลเวลอัป ก็เลยฟื้นฟูค่าสเตตัสกลับมาได้นี่เอง!"
1006602-112 = "[s] \"โล่งอกไปทีนะที่ครูช่วยได้\""
1006602-113 = "ช่วยได้มากเลยค่ะ! ถ้าไม่ได้คุณครูละก็ ค่าสเตตัสอาริสึคงตกลงเรื่อยๆ จนเป็นลมล้มพับไปก่อนก็ได้ค่ะ"
1006602-114 = "คุณครูรู้ทุกอย่างจริงๆ เลยนะคะ! ว้าว!"
1006602-116 = "(จากนั้นคุณครูก็เล่นเกมกับอาริสึที่มีความสุขแล้วอย่างสนุกสนาน)"
