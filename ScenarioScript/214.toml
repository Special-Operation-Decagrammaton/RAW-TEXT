[translation]
214-1 = "#title;[ruby=Late Night with the Lore]로어와의 토크쇼[/ruby]"
214-2 = "#wait;2000"
214-3 = "3;오웰;01\n#3;black\n#3;a"
214-4 = "3;오웰;01\n#3;a\n#wait;1500"
214-5 = "3;오웰;03;미스터 오웰의 심야 토크쇼에 오신 걸 환영합니다!"
214-6 = "3;오웰 데칼코마니;01;그렇다!\n#fontsize;80"
214-7 = "3;오웰;02;안녕하십니까. 신사 숙녀 여러분."
214-8 = "3;오웰;02;새로운 시대의 세상을 정의하는 권력. 이 세계의 모든 파노플리를 여러분께 소개해 드리는 미스터 오웰입니다."
214-9 = "3;오웰;06;오늘 여러분께 소개해 드릴 텍스트는 흔하디흔한 두 가지의 기호가 혼합된, 아주 대중적인 크리피파스타입니다."
214-10 = "3;오웰;03;여러분 앞에…… <드럼통 게>를 소개합니다!"
214-11 = "#st;[0,0];instant;1;"
214-12 = "#clearST"
214-13 = "#wait;2200"
214-14 = "3;오웰 데칼코마니;01;그렇다! 그렇다!\n#fontsize;80"
214-15 = "3;오웰;09;드럼통 게를 이루고 있는 기호는 지극히 단순합니다."
214-16 = "3;오웰;09;누군가가 사람을 해치는 게를 부리고 있다는 허황된 '소문의 인식'에 더해, 그것이 가능하려면 게의 크기가 항만을 집어삼킬 만큼 거대해야 한다는 '상식'이 뒤섞여—\n#3;em;[...]"
214-17 = "3;오웰;99;그 누구도 예상하지 못한 형태로 새로운 텍스트가 탄생했지요."
214-18 = "3;오웰 데칼코마니;01;그렇다!\n#fontsize;80"
214-19 = "3;오웰;04;과연 이 복제된 세계에 나타난 저 새로운 크리피파스타는 미디어가 지어낸 허상의 영향을 받은 결과일까요?"
214-20 = "3;오웰;04;아니면 세계 밖에서 날아온 검은 백조가 흘리고 간 모순의 흔적일까요?"
214-21 = "3;오웰;11;가상의 커뮤니티가 불타고 성지가 재가 될 때까지— 지금 바로 토론에 참여하십시오!"
214-22 = "3;오웰;11;이 쇼는 우리 모두의 것이니까요!"
214-23 = "3;오웰 데칼코마니;01;그렇다!\n#fontsize;80"
214-24 = "#st;[0,0];instant;1;"
214-25 = "#clearST"
214-26 = "3;오웰 데칼코마니;01\n#3;d\n#wait;1000"
214-27 = "3;오웰;01\n#3;a\n#3;closeup\n#wait;1500"
214-28 = "3;오웰;02;어떻습니까. 당신은 저 기호에서 어떤 텍스트를 읽어 내고 계신지요?\n#3;closeup\n#3;em;[?]"
214-29 = "3;오웰;02;괴담의 무한도서관에는 모래알만큼이나 다양한 수의 원전이 존재하니까요.\n#3;closeup"
214-30 = "3;오웰;09;커뮤니티를 떠돌던 잔혹한 창작 괴담의 발현일지.\n#3;closeup"
214-31 = "3;오웰;06;아니면 오래된 미디어의 패러디, 혹은 오마주일지.\n#3;closeup"
214-32 = "3;오웰;14;그도 아니라면, 창작자의 변덕으로 만들어진 사소한 변형일지—\n#3;closeup\n#3;em;[...]"
214-33 = "3;오웰;08;하지만 해석에 정답은 없습니다.\n#3;closeup"
214-34 = "3;오웰;11;기호의 가치는, 소비하는 여러분의 선택에 달려 있으니까요!\n#3;closeup"
214-35 = "3;오웰 데칼코마니;01;그렇다!\n#fontsize;80\n#3;closeup"
214-36 = "3;오웰;03;그럼 이어지는 순서는 커머셜 타임입니다.\n#3;closeup"
214-37 = "3;오웰;03;다음 텍스트가 이어질 때까지 채널을 고정해 주시길!\n#3;closeup"
214-38 = "3;오웰 데칼코마니;01;그렇다!\n#fontsize;80\n#3;closeup"
