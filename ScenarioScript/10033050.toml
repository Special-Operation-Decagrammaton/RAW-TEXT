[translation]
10033050-1 = "ตอนที่ 5;กองทัพต้องเดินด้วยท้อง"
10033050-2 = "พอได้สนุกและเพลิดเพลินอย่างเต็มที่ ก็ถึงเวลานี้โดยไม่รู้ตัวเลย..."
10033050-3 = "ใช่แล้วค่ะ! ไม่ว่าจะมีเรื่องน่าสนุกรออยู่แค่ไหน แต่ถ้าเราหิวก็คงไม่มีแรงทำอะไรว่าไหมคะ!"
10033050-4 = "เพราะแบบนี้ พวกฉันเลยพาทุกคนจากเกเฮนน่ามาที่โรงอาหารดั้งเดิมของเฮียกคิยาโคค่ะ!"
10033050-6 = "หวังว่าทุกคนจะได้เพลิดเพลินกับกลิ่นอาย เสน่ห์ และอาหารรสเลิศของเฮียกคิยาโคกันนะคะ!"
10033050-11 = "ฮุฮุฮุ..."
10033050-12 = "อาหารรสเลิศ... เหมือนจะได้ยินคำที่ปล่อยผ่านไปไม่ได้เข้าให้แล้วสิคะ"
10033050-13 = "[ns] \"ฮารุนะ?!\""
10033050-14 = "ฮารุนะ!?"
10033050-15 = "ฉันยอมรับนะคะว่าอาหารของที่นี่ไม่มีจุดบกพร่องอะไรให้ตำหนิ"
10033050-16 = "แต่การกินแค่อาหารเมนูเดิมๆ ในที่เดิมๆ จะเรียกว่าเป็นการกินอาหารเลิศรสได้จริงๆ เหรอคะ?"
10033050-17 = "อาหารรสเลิศคือสิ่งที่สวยงาม และเป็นสิ่งที่ควรค่าแก่การไปสำรวจและท้าทายไม่ใช่เหรอคะ?"
10033050-18 = "[s] \"หมายความว่ายังไงกันแน่น่ะ ฮารุนะ?!\""
10033050-19 = "หมายความว่าไหนๆ เราก็มาที่เฮียกคิยาโคแล้วทั้งที เราน่าจะไปลองชิมของอร่อยๆ นู่นนี่เพิ่มน่ะค่ะ★"
10033050-20 = "เห็นด้วย เห็นด้วย! ฉันไปด้วยคน!"
10033050-24 = "ในเมื่อเป็นแบบนี้ เห็นทีก็คงจะช่วยไม่ได้ละนะ"
10033050-29 = "พวกนั้นเป็นแบบนี้อีกแล้ว..."
10033050-30 = "แต่มันดูน่าสนุกดีนะว่ามั้ย?"
10033050-31 = "เอาไงดี? ตามไปเลยมั้ย?"
10033050-32 = "เอาสิ!"
10033050-37 = "เดี๋ยวก่อนสิคะทุกคน! ถ้าจู่ๆ ก็ออกไปแบบนั้นละก็ กำหนดการของเรา...!"
10033050-38 = "ทะ... ทะ... ทำยังไงดีล่ะคะ คุณครู?!"
10033050-39 = "[s] \"ตามไปก่อนแล้วกัน!\""
10033050-42 = "อืม เป็นยากิโทริที่มีรสชาติของซอสถั่วเหลืองเข้มข้นจังเลยนะคะ กลิ่นขิงจางๆ ก็ทำให้รสชาติดีขึ้นด้วยค่ะ"
10033050-43 = "ว้าว! มันจูอันนี้มีมงจายากิอยู่ข้างในด้วย! ไม่เคยกินอะไรแบบนี้มาก่อนเลย! ต้องกินกับซอสอะไรถึงจะเข้ากันนะ... น่าจะวาซาบิกับซอสพริกรึเปล่านะ?"
10033050-44 = "อ๊ะ หมึกย่างอันนี้ให้เยอะจังเลยค่ะ ถูกใจฉันมากเลย จริงๆ แค่ใช้ปลาหมึกทั้งตัวก็ถูกใจแล้ว แต่นี่ยังใช้เป็นหมึกยักษ์ด้วย แบบนี้ให้คะแนนสิบเต็มเลยค่ะ"
10033050-45 = "ว่าไงนะคะ...? ถ้ากินหมด 10 ตัวใน 5 นาที จะให้กินฟรีงั้นเหรอคะ? หมึกพวกนี้เกิดมาเพื่อฉันแน่เลย★"
10033050-46 = "ให้เอาเทมปุระมาวางบนข้าวปั้น แล้วลองกินให้เหมือนข้าวราดเทมปุระงั้นเหรอ...? เหมือนจะเข้ากัน แต่ก็ไม่น่าจะเข้ากันเลย..."
10033050-47 = "งั้นขอลองกินเทมปุระอย่างเดียวก่อนแล้วกัน"
10033050-51 = "ว้าววว?!"
10033050-52 = "ดีเลยค่ะ ดูเหมือนเราจะทัวร์ร้านข้างทางในโซนนี้กันครบแล้วนะคะ"
10033050-53 = "ถ้างั้นก็ไปร้านข้างทางโซนอื่นกันต่อเลยค่ะทุกคน!"
10033050-54 = "เห็นด้วย!"
10033050-61 = "อืม... หาเจอแล้ว... คุณครู อยู่ทางนี้..."
10033050-62 = "[s] \"ขอบใจนะสึบากิ! ทุกคน มาทางนี้เร็ว!\""
10033050-63 = "แฮ่ก... แฮ่ก...! อะไรของคนพวกนั้นน่ะ?"
10033050-64 = "เร็วกันมากเลยค่ะ! เร็วกว่าพวกเราที่เอาแต่ไล่ตามมาเสียอีก ดูทรงแล้วน่าจะไปทัวร์กินครบทุกร้านเลย#nนะคะ!"
10033050-66 = "ว้ายยย! อย่าปล่อยฉันไว้อย่างนี้สิ!"
10033050-67 = "คุณครู ขืนอยู่อย่างนี้เดี๋ยวก็คลาดกับทางนั้นพอดีหรอกค่ะ! ต้องรีบกันแล้วนะคะ!"
10033050-71 = "เรามาถึงโซนร้านริมทางโซนใหม่ที่เป็นเป้าหมายของเรากันแล้วค่ะ..."
10033050-72 = "แต่ว่าอาหารของโซนนี้... จะว่ายังไงดีล่ะ? รสชาติมัน... มีเอกลักษณ์เฉพาะตัวมากเลยค่ะ"
10033050-73 = "โดยเฉพาะยากิโทริที่เผ็ดมากๆ อันนี้ แล้วก็ลูกอมแอปเปิลที่ไม่มีรสหวานเลย มีแต่รสเปรี้ยวๆ ฝาดๆ…"
10033050-74 = "อื้ม! เพราะแบบนี้ไงเลยถูกใจฉัน! เพราะรสชาติที่เป็นเอกลักษณ์แบบนี้หากินจากที่อื่นไม่ได้ยังไงล่ะ!"
10033050-75 = "(ว่าไงนะ? ถูกใจ... งั้นเหรอ? ถ้างั้นก็...!)"
10033050-76 = "เอาละๆ อาหารที่เราทำเตรียมไว้ครั้งนี้ก็คือ ข้าวปั้นที่ราดซอสซูเปอร์บ๊วยดอง ที่สกัดจากน้ำบ๊วยดอง#nเข้มข้นกว่าเดิมถึง 10 เท่า!"
10033050-81 = "ว้าว! ต้องให้รสชาติเปรี้ยวจัดจนปวดหัวตุบๆ แน่เลย! ถูกใจฉันนัก!"
10033050-85 = "(เป็นไปไม่ได้...! งั้นต้องเจออันนี้!)"
10033050-86 = "มาเลยๆ! เชิญชิมได้เลย! ขนมปังทาแยมคูซายะแบบจุกๆ!"
10033050-90 = "ผสมผสานกลิ่นเฉพาะตัวของปลากับกลิ่นเปรี้ยวกำลังดีเข้าด้วยกัน... แล้วรังสรรค์ให้เป็นแยมสินะ!"
10033050-91 = "เข้ากับขนมปังมากเลย! อร่อยเหาะ!"
10033050-92 = "เฮาคาตล์โซบะ!"
10033050-93 = "อื้อ อื้อ!"
10033050-94 = "ราเม็งปลาเฮร์ริงหมัก!"
10033050-95 = "รสกลมกล่อมอย่าบอกใคร!"
10033050-97 = "พาร์เฟต์วานิลลาที่ใส่ทาโกะยากิปลิงทะเล...!"
10033050-98 = "พอได้แล้ว! นั่นไม่ใช่อาหารที่ได้รับอนุญาตให้ขายนี่คะ! ฉันเพิ่งตรวจสอบมาเมื่อกี้เลยค่ะ!"
10033050-100 = "ชิ...!"
10033050-104 = "ไม่ค่ะ ไม่ใช่อย่างนั้นหรอกค่ะ"
10033050-105 = "คะ?!"
10033050-106 = "ถึงจะเป็นอาหารที่ไม่ได้รับอนุญาต... แต่การได้ลิ้มรสอาหารใหม่ๆ จากการมาพบกันแบบนี้ก็ถือว่าเป็น#nการศึกษาอาหารท้องถิ่นและเป็นความสนุกสนานของการทัศนศึกษานะคะ!"
10033050-107 = "ถ้าจะมาขัดขวางกันละก็ ชมรมชิมอาหารจะไม่ยอมอยู่เฉยๆ หรอกค่ะ!"
10033050-108 = "ใช่แล้ว! มันอร่อยมากเลยนะ!"
10033050-109 = "มีเธอคนเดียวเท่านั้นละที่กินได้อย่างอร่อยน่ะ!"
10033050-110 = "นี่เป็นความวุ่นวายที่เกิดขึ้นโดยบังเอิญในสถานที่ท่องเที่ยวสินะคะ★ แบบนี้ก็ถือว่าไม่เลวนะคะเนี่ย"
10033050-112 = "ไม่ใช่ ไม่เลยสักนิดเดียว!! มันไม่ถูกต้องตั้งแต่ขายอาหารที่ไม่ได้รับอนุญาตแล้วนะ!"
10033050-113 = "งั้นเหรอคะ? น่าเสียดายนะคะคุณฟูกะ ฉันคิดว่าคนอย่างคุณน่าจะเข้าใจชมรมชิมอาหารเสียอีกค่ะ"
10033050-114 = "ก็มีทั้งเรื่องที่เข้าใจได้และเข้าใจไม่ได้ไง!"
