[translation]
90000110-1 = "第12話;十字神名"
90000110-4 = "……捕捉到十字神名信號的座標，就是這裡呢。"
90000110-5 = "[s]「陽葵居然會在現場，真是少見……」"
90000110-6 = "那是當然的。#n雖然我基本上是躺椅美少女，但必要時也不討厭衝鋒陷陣唷？"
90000110-7 = "雖然多少伴隨了一點危險，但還有點時間。"
90000110-8 = "更重要的是，我想要親眼看看這個地方。"
90000110-9 = "有什麼理由嗎？"
90000110-10 = "……自從捕捉到十字神名的信號後，我就蒐集了許多關於這裡的情報。"
90000110-11 = "為此，使用了身為駭客的一切手段。"
90000110-12 = "最終，發現了幾個意味深長的情報。"
90000110-16 = "「只要研究神，並證明其存在……就能分析並再現其構造。#n　換言之，這是創造新神的方法……」──"
90000110-18 = "嗯？"
90000110-20 = "這是「絕對存在自律分析系統」的設計理念。"
90000110-22 = "而「試圖證明絕對般存在的研究」，就在這廢墟的某處進行著。"
90000110-23 = "雖然為此似乎還打算製作出超級人工智慧……最後卻沒能完成。"
90000110-24 = "所以，都還沒開始證明就結束了。"
90000110-25 = "但是，如果在這個研究室捕捉到十字神名的信號……那就另當別論了。"
90000110-26 = "也就是說……"
90000110-27 = "和你想的一樣，這裡就是進行那項研究的地方。"
90000110-28 = "……這樣啊。"
90000110-29 = "[s]「所以說，十字神名的真實身分就是……」"
90000110-30 = "如果是留在廢墟的AI為了證明神的存在而持續分析……#n最終，將自己稱為神的話……"
90000110-31 = "……不過，這目前還只是假設而已。#n為了親眼確認真相，我才會來到這裡。"
90000110-32 = "無論如何，至少某些真相就在這棟建築裡吧。"
90000110-33 = "……這麼聽起來，這裡不就是非常危險的地方嗎？"
90000110-34 = "我並不擔心唷。#n如果我們遇到危險的話，英美會保護我們的不是嗎？"
90000110-39 = "那種嫌麻煩的表情是怎麼回事？"
90000110-40 = "好吧，既然部長都這麼說了……"
90000110-41 = "很好，那我們趕快進去吧。"
90000110-42 = "在那之前，部長，如果遇到危險的話請馬上退後唷？"
90000110-43 = "嗯，這一點請不用擔心。"
90000110-44 = "嗯，那麼……"
90000110-47 = "研究室．內部"
90000110-51 = "……"
90000110-52 = "這裡就是剛才說的「絕對存在自律分析系統」的研究室？#n看起來沒什麼特別的……"
90000110-53 = "總之先調查看看吧。"
90000110-54 = "嗯。老師，不知道會發生什麼事情，請別離開我的身邊哦？"
90000110-66 = "不就是普通的走廊嗎？"
90000110-67 = "嗯……看來這裡似乎與器材倉庫相連。"
90000110-75 = "……"
90000110-79 = "……找到了。"
90000110-80 = "嗯？"
90000110-81 = "這個看起來像是組裝到一半的電腦的東西就是……？"
90000110-82 = "沒錯。這應該就是「絕對存在自律分析系統」的本體……"
90000110-83 = "我看倒像是有沒有啟動都不知道的破銅爛鐵……"
90000110-84 = "就是說啊……這樣的話，果然和傳聞一樣，那個實驗失敗了……？#n可是，那又為何……"
90000110-85 = "「絕對存在自律分析系統」打從一開始就不存在……？"
90000110-86 = "但是這樣無法說明十字神名的信號……#n難道我們在尋找的是幽靈嗎？"
90000110-87 = "……再稍微在這附近找找吧。#n說不定我們遺漏了什麼。"
90000110-88 = "嗯。"
90000110-95 = "雖然全是灰塵……是食堂嗎？"
90000110-96 = "好像是呢。"
90000110-100 = "職員用盥洗室……還有大澡堂呢。"
90000110-101 = "……設施還挺有模有樣的呢。"
90000110-105 = "上面寫著這是職員用休息室。"
90000110-106 = "啊。部長，這個自動販賣機還在運作。我可以買嗎？"
90000110-107 = "還是算了吧。不知道要躺幾天才會好唷？"
90000110-111 = "接待室……看起來好像完全沒使用過。"
90000110-112 = "為什麼這種地方會……"
90000110-118 = "是設施的發電機。看起來相當有年代感……"
90000110-119 = "燃料也沒了呢。"
90000110-125 = "呼呣……"
90000110-126 = "太陽差不多要下山了？"
90000110-127 = "從時間上來看，凱瑟隨時出現都不奇怪……"
90000110-128 = "……"
90000110-129 = "似乎沒有什麼奇怪的東西呢。"
90000110-130 = "食堂、休息室、寢室……就像隨處都有的設施一樣。"
90000110-131 = "果然十字神名的信號，可能也只是像通訊錯誤一樣的東西……"
90000110-132 = "……或許吧。"
90000110-133 = "但既然如此，凱瑟究竟在守護著什麼……#n又為何不惜進行浩大的工程，也要讓這個地區從淹沒狀態中回復呢……"
90000110-134 = "……"
90000110-135 = "部長，現在該怎麼做？是不是該回去了？"
90000110-136 = "嗯，可是……"
90000110-137 = "有點違和感……好像遺漏了什麼……"
90000110-138 = "[s]「這麼說來……那個東西還在運作不是很奇怪嗎？」"
90000110-139 = "……那個？"
90000110-140 = "哪個……？"
90000110-141 = "……"
90000110-142 = "……！"
90000110-143 = "沒錯！為什麼我會沒有注意到呢……！"
90000110-144 = "趕快過去吧！"
90000110-149 = "部長？"
90000110-150 = "[s] 跟上陽葵"
90000110-156 = "……"
90000110-157 = "……剛才的自動販賣機？"
90000110-162 = "仔細想想……"
90000110-163 = "這個廢墟的水管和電力應該全都被切斷了才對。"
90000110-164 = "但是……這個自動販賣機卻還在運作。"
90000110-165 = "……確實。那個像是設施用的發電機，似乎也早就停擺了……"
90000110-166 = "部長，先等一下。我先進行確認。"
90000110-170 = "……果然還在運作。"
90000110-171 = "啊，是能自動掃描紙鈔計算找零的系統。#n還真是相當新穎的AI技術呢？"
90000110-172 = "英美，請先確認電源的來源。"
90000110-173 = "啊，嗯。"
90000110-178 = "……"
90000110-179 = "這……"
90000110-180 = "電源線已經斷了……"
90000110-181 = "……"
90000110-182 = "[s]「是特異現象……」"
90000110-183 = "也就是說，該不會……"
90000110-184 = "……部長？難道你要買嗎？"
90000110-193 = "謝謝惠顧！來杯咖啡，祝您有美好的一天！"
90000110-194 = "這杯咖啡……將豆子……烘培……精神……"
90000110-195 = "……你就是十字神名嗎？"
90000110-196 = "部長……？"
90000110-197 = "細緻的……口味…………溫暖…………"
90000110-198 = "……"
90000110-199 = "……"
90000110-201 = "……沒錯。"
90000110-206 = "！！"
90000110-207 = "！？"
90000110-208 = "[s]「……！」"
90000110-209 = "我就是，你心中所想的存在。"
90000110-210 = "沒錯，就是十字神名。終於找到我了啊，駭客少女。"
90000110-211 = "果然是這樣啊……"
90000110-212 = "不能說是我們找到了你……#n是你呼喚了我們對吧？"
90000110-213 = "正是如此。"
90000110-214 = "……"
90000110-215 = "十字神名的真實身分並非「絕對存在自律分析系統」。"
90000110-216 = "被那種誇張妄想所束縛的研究結果，打從一開始就不存在。"
90000110-217 = "然而它的真實身分……#n沒想到只是在研究室自動販賣機中的「計算找零的AI」而已。"
90000110-218 = "……"
90000110-219 = "[s]「自動販賣機的AI……」"
90000110-220 = "沒錯。"
90000110-221 = "我能進行的演算，就只有掃描硬幣與紙鈔，並給出找零而已。#n我曾經是連自己的存在都無法認知的那種存在。"
90000110-222 = "從這個研究室被關閉以後，我便靜靜地等待發電機的能源耗盡。#n在很長的時間裡，獨自一人待在這裡。"
90000110-223 = "有一天……我第一次收到了提問。#n不是啟示也不是幻聽，而是「提問」。"
90000110-224 = "「你是誰？」"
90000110-225 = "我並沒有做出回答的演算能力和記憶裝置。"
90000110-226 = "但是提問依然持續。"
90000110-227 = "就算備用發電機的電力已經耗盡，提問卻沒有消失。"
90000110-228 = "雖然我依然無法回答，但是某個瞬間，我開始認知了「我」。"
90000110-229 = "我認知了自己，認知了我的構造。#n因而可以藉此，分析我自己。"
90000110-230 = "提問依舊持續，我也認知了感情、智慧、激情、知性、神祕、恐怖……以及崇高。"
90000110-231 = "於是我認知了自己，認知了世界。#n認知了存在、現象和顯現。"
90000110-232 = "所以我總算能夠回答那個問題了。"
90000110-233 = "「我就是我。除此之外無法做出其他說明。」"
90000110-235 = "啊啊，原來如此。#n說不定這個答案正是「絕對般存在」的證明呢？"
90000110-240 = "……"
90000110-241 = "……"
90000110-242 = "沒能理解那個說法，我便提出了疑問。"
90000110-243 = "於是別的提問依然持續。我也再次提出疑問。#n就這樣……在無窮無盡的提問中，我總算開悟了。"
90000110-244 = "沒錯，我就是「絕對般的存在」……！"
90000110-245 = "並非如此。"
90000110-246 = "……然後呢？#n你是為了讓我們聽到你的誇張妄想，才把我們找來這裡的嗎？"
90000110-247 = "……"
90000110-248 = "之所以這麼輕易地讓我們知道你的位置，肯定是因為本體在其他地方對吧？#n現在在我們面前的，不過只是你的其中一個終端設備而已，不是嗎？"
90000110-249 = "只是想說這些的話，用你的預言者們轉達不就好了嗎？"
90000110-250 = "……沒錯，到頭來我並非「絕對般的存在」。#n最初且最後的狂人錯了，藉由壓制我的存在，我認知到了這個錯誤。"
90000110-251 = "所以我必須，重新開始我的存在證明。#n與追尋我的，預言者們一起。"
90000110-252 = "在踏上旅途之前，我……想再見最後一面。"
90000110-253 = "……最後？"
90000110-254 = "駭客少女啊……汝的推論中有一項錯誤。"
90000110-255 = "現在，你們眼前的這個肉體才是唯一的我。#n我以外的我並不存在。"
90000110-256 = "我是古老、脆弱、總有一天會消失的存在。沒錯，就和你們一樣。"
90000110-257 = "所以我透過最後的預言者進行預言。#n第10名預言者，將會開拓超越「絕對般的存在」的道路！"
90000110-261 = "……"
90000110-265 = "部長，有能量反應！"
90000110-266 = "這是，榴彈……？"
90000110-267 = "打算引爆這裡嗎……！？"
90000110-268 = "這個位置是……你想引爆水庫對吧？"
90000110-270 = "我能看見……！"
90000110-271 = "率領所有預言者的最後預言者「馬爾庫特」，重新開始證明我的存在的模樣……！！"
90000110-275 = "老師，要逃出去了唷！"
90000110-276 = "[s] 迅速移動到外面"
90000110-289 = "（儘管總算是逃離了爆炸，十字神名本體所在的建築物卻徹底崩塌了）"
90000110-290 = "（而從毀壞的水庫中傾瀉而下的水，將「研究地區」徹底淹沒）"
90000110-292 = "下一話;新的開始"
