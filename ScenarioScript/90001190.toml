[translation]
90001190-1 = "ตอนที่ 19;ดินแดนเหล็กกล้า"
90001190-4 = "โถๆๆ ก็คิดอยู่ว่าทำอะไรอยู่ สุดท้ายก็ยังอยู่ที่เดิมกันสินะคะ"
90001190-5 = "[s] \"......!\""
90001190-9 = "ท่านธิดา ไม่สิ อาริสึ มาทางนี้เดี๋ยวหนึ่งได้มั้ย..."
90001190-10 = "มีเรื่องอะไรเหรอคะ เคย์?"
90001190-11 = "การให้เด็กพวกนั้นเห็นเราในตอนนี้ ดูจะเป็นเรื่องอันตรายน่ะค่ะ"
90001190-16 = "สะ... สะสะสะสะ... สวัสดีค่ะ! พวกคุณควรระวังตัว... กันไว้นะคะ! พะ... เพราะจากนี้ไปพวกฉันจะ..."
90001190-17 = "ทำเรื่องที่น่ากลัวมากๆ กับพวกคุณค่ะ!"
90001190-18 = "ฉันยังสงสัยอยู่เลยว่าจำเป็นต้องส่งสัญญาณแบบนี้ออกไปหรือเปล่า แต่ในเมื่อซอฟบอกให้ทำ ก็เลยช่วยไม่ได้ค่ะ..."
90001190-19 = "อื้อ! จากนี้ไปพวกเราจะ..."
90001190-24 = "ประกาศสงคราม! กับพวกคุณทุกคน!"
90001190-27 = "ประกาศ?"
90001190-28 = "สงคราม?"
90001190-30 = "มีอะไรก็ว่ามาเลยค่ะ... ดูเหมือนในที่สุดพวกคุณก็สร้างเน็ตซาชได้สักทีสินะคะ?"
90001190-35 = "มะ... ไม่ใช่นะคะ?! เน็ตซาช... เน็ตซาชจังเสร็จสมบูรณ์ไปนานแล้วต่างหาก...???"
90001190-36 = "ใช่! พวกเราก็แค่ซ่อนตัวเน็ตซาชไว้จนกว่าเน็ตซาชจะเป็น <ดินแดนเหล็กกล้า> ต่างหากล่ะ!"
90001190-37 = "อ้อ พวกคุณคงยังไม่รู้กันสินะคะว่านี่คือความสำเร็จอันยิ่งใหญ่แค่ไหน"
90001190-38 = "แต่ถ้าดูจากระดับของพวกคุณแล้วก็เข้าใจได้ค่ะ เข้าใจได้จนฉันรู้สึกสงสารพวกคุณขึ้นมาเลยนะคะ"
90001190-40 = "ดินแดนเหล็กกล้างั้นเหรอ...?"
90001190-41 = "เอ๋ หรือว่าสึคัตสึกิ ริโอะเองก็ไม่รู้ไปมากกว่านี้แล้ว? แต่ก็นะ พอคิดๆ ดูแล้วก็ไม่แปลกใจ"
90001190-42 = "ทำได้ดีมาก ไอน์! สมกับที่เป็นไอน์ของพวกเราเลย! ก็การทำเรื่องที่คาดไม่ถึงอย่างเยือกเย็นมันเป็น#nงานของพวกเรานี่เนอะ!"
90001190-43 = "แหะ... แหะๆๆ ขอบคุณค่ะ ซอฟ ต่อไปฉันก็จะพยายามอย่างเต็มที่ค่ะ...!"
90001190-44 = "และดินแดนเหล็กกล้าที่ว่าก็คือ!"
90001190-45 = "ค่ะ มันก็คือรูปแบบวิวัฒนาการของเน็ตซาชจัง... "
90001190-46 = "จากการใช้ <พลังต้องห้าม> ในการเปลี่ยนวัตถุที่ไปสัมผัส แล้วแปรให้เป็นดินแดนแห่งโลหะที่ขยาย#nอาณาเขตของตัวเองไปได้เรื่อยๆ...!"
90001190-47 = "[s] \"ดินแดนแห่งโลหะที่ขยายอาณาเขตได้เองเหรอ...?\""
90001190-48 = "งั้นฉันจะอธิบายอย่างง่ายๆ นะคะ พวกคุณที่มีความสามารถในการทำความเข้าใจน้อยจะได้เข้าใจได้"
90001190-49 = "สิ่งที่ประกอบดินแดนเหล็กกล้าขึ้นมา ก็คือสิ่งที่พวกคุณเรียกกันว่า <พลังของเหล่าทวยเทพไร้นาม> ค่ะ"
90001190-50 = "ละ... และหนึ่งในคุณสมบัติที่สำคัญของพลังนั้นก็คือ... มันสามารถเปลี่ยนองค์ประกอบของวัตถุนั้นได้#nโดยพื้นฐานค่ะ..."
90001190-51 = "มีคำถาม! แล้วถ้าโครงสร้างที่ถูกสร้างโดยพลังนั้นไปสัมผัสกับวัตถุอื่นที่อยู่รอบๆ ล่ะ?"
90001190-53 = "อย่าบอกนะว่า...!"
90001190-54 = "มันก็จะเปลี่ยนวัตถุที่ไปสัมผัสให้มีองค์ประกอบเหมือนกับของตัวเอง...?!"
90001190-56 = "ใช่แล้ว อย่างนั้นแหละ ต่อไปทุกสิ่งทุกอย่างที่ไปสัมผัสกับดินแดนเหล็กกล้าก็จะกลายเป็นดินแดน#nเหล็กกล้าเสียเอง!"
90001190-57 = "นี่ละดินแดนอันไร้เทียมทานที่กลืนกินทุกสิ่งทุกอย่างที่อยู่รอบๆ ตัวแล้วขยายอาณาเขตออกของตัวเอง#nได้!"
90001190-58 = "ใช่ค่ะ อีกอย่างนะคะ ถ้าเข้ามาในดินแดนเหล็กกล้าโดยไม่มีการเตรียมตัวอะไรมาละก็"
90001190-59 = "พวกคุณก็จะกลายเป็นหนึ่งเดียวกับดินแดนเหล็กกล้าในทันที... และไม่อาจกลับมาได้ตลอดกาลค่ะ...!"
90001190-60 = "ไอน์? ซอฟ? ออร์? มีอะไรให้ฉันช่วยมั้ยคะ?"
90001190-61 = "พะ... พี่เหรอคะ?! ไม่ค่ะ ไม่เป็นไร! พี่ไม่ต้องกังวลเรื่องแบบนี้หรอกนะคะ! พวกฉันจะจัดการทั้งหมด#nเองค่ะ!"
90001190-62 = "สงสัยหรือเปล่าล่ะคะว่าดินแดนเหล็กกล้าจะขยายอาณาเขตไปได้ไกลแค่ไหน? มาสังเกตการณ์ไปด้วย#nกันเถอะค่ะ พวกฉันก็สงสัยเหมือนกันว่า..."
90001190-63 = "ดินแดนเหล็กกล้า... หรือก็คือเน็ตซาชจัง... จะมีขีดจำกัดถึงแค่ไหนค่ะ...!"
90001190-64 = "ใช่แล้วละ! อยากรู้แล้วสิว่าจะใหญ่ขึ้นได้ถึงแค่ไหน! "
90001190-65 = "เน็ตซาชของพวกเรา... ดินแดนเหล็กกล้าของพวกเราจะขยายใหญ่ขึ้นด้วยการกลืนกินทุกสิ่งทุกอย่าง#nที่ไปแตะต้อง!"
90001190-66 = "และอีกไม่นาน คิโวทอสก็คงกลายเป็น...!"
90001190-67 = "ทั้งยอดเยี่ยมและน่าทึ่งไปเลยใช่ไหมคะ? ตกใจมากจนพูดไม่ออกเลยสินะคะ?!"
90001190-68 = "[s] \"ครูอยากถามอะไรสักอย่าง...\""
90001190-69 = "อะไรเหรอ? ในเมื่อตอนนี้พวกฉันกำลังประกาศสงครามอยู่ งั้นก็จะตอบให้เป็นพิเศษเลย"
90001190-70 = "[s1] \"พวกเธออยากฟื้นคืนชีพเดคาแกรมมาทอนที่สูญหายไปเหรอ?\"\n[s2] \"ทำแบบนี้เพื่อฟื้นคืนชีพเดคาแกรมมาทอนที่สูญหายไปเหรอ?\""
90001190-73 = "จะ... จะ... เจ้าคนไร้มารยาทนี่...! อย่าเอ่ยชื่อของท่านผู้นั้นตามอำเภอใจนะ! ชื่อของท่านคือคำ#nศักดิ์สิทธิ์ทั้งสิบที่ไม่ควรจะถูกเอ่ยจากปากของคุณนะ!"
90001190-74 = "เป็นคนที่ยอดเยี่ยมในหลายๆ แง่เลยนะคะ... คุณครูของชาเล่ต์ "
90001190-75 = "รอก่อนนะคะ... ฝากไว้ก่อนเถอะค่ะ! เมื่อถึงเวลานั้น จะไม่มีใครพูดถึงประสงค์ของท่านผู้นั้นตามอำเภอ#nใจได้...!"
90001190-76 = "ใช่! แล้วพวกฉันจะเปลี่ยนคำว่า 'ไม่เชื่อ' ให้เป็น 'ไม่อยากเชื่อเลย' ให้ดู!"
90001190-77 = "ต่อให้มาเสียดายเอาตอนนั้น แต่พวกฉันก็ไม่คิดจะสงสารหรอกนะคะ~? เพราะตามการคำนวณของ#nพวกฉันแล้ว ยังไงคิโวทอสก็ต้อง..."
90001190-78 = "กลายเป็นดินแดนเหล็กกล้าในอีก 3 วันข้างหน้าค่ะ!"
90001190-85 = "[ns] \"คิโวทอสจะกลายเป็นดินแดนเหล็กกล้าเหรอ...?\""
90001190-87 = "ถ้าเป็นคนอื่นมาพูดละก็ คงมองว่าเป็นการพูดเพ้อเจ้อเกินความจริงอยู่หรอกนะคะ"
90001190-88 = "แต่ในเมื่อเป็นคำพูดจากวิศวกรของเดคาแกรมมาทอน งั้นเราก็คงปล่อยผ่านไปไม่ได้ค่ะ"
90001190-89 = "แล้วจะทำยังไงล่ะ? ถ้าเราเข้าไปในดินแดนเหล็กกล้าโดยไม่มีการเตรียมตัวอะไรละก็..."
90001190-90 = "ค่ะ เราก็จะกลายเป็นหนึ่งเดียวกับดินแดนเหล็กกล้าในทันทีและไม่มีทางกลับมาได้อีก เด็กพวกนั้นพูด#nไว้อย่างนี้ค่ะ"
90001190-95 = "พวกคุณไม่มีทางเป็นแบบนั้นหรอกค่ะ มันมีแต่สิ่งที่ไม่มีชีวิตค่ะที่จะเปลี่ยนเป็นดินแดนเหล็กกล้าได้"
90001190-96 = "[s] \"เคย์!\""
90001190-97 = "จะว่าไป ฉันไม่เห็นคุณกับอาริสึมาสักพักแล้วนะคะ ตั้งใจหนีหายไปไหนมาหรือเปล่าคะ?"
90001190-98 = "ถ้าเด็กพวกนั้นเห็นพวกฉัน ก็น่าจะยุ่งยากในหลายๆ เรื่องน่ะค่ะ"
90001190-99 = "เอาเถอะค่ะ ฉันได้ยินเรื่องทั้งหมดแล้วค่ะ ถ้าให้พูดตรงๆ เลยละก็..."
90001190-100 = "มันเป็นเรื่องไร้สาระค่ะ"
90001190-101 = "จะ... จริงเหรอคะ? เคย์?!"
90001190-102 = "ค่ะ ท่านธิดา... ไม่สิ อาริสึ นั่นมันก็แค่พลังของทวยเทพไร้นามที่ถูกนำมาใช้ในรูปแบบที่อ่อนแอลงค่ะ"
90001190-103 = "โอ้... ฟังดูน่าเชื่อถือเลย! พอคู่ต่อสู้ที่แข็งแกร่งกลายมาเป็นพันธมิตรก็อุ่นใจดีนะ!"
90001190-104 = "ไม่หรอก ปกติมันจะอ่อนแอลงอยู่แล้วนี่คะ..."
90001190-105 = "อ๊ะ นั่นคือความรู้ทั่วไปในเกม... เคย์จังก็รู้อยู่เหมือนกันสินะ... ดีใจอย่างบอกไม่ถูกเลย..."
90001190-106 = "อ๊ะ...? จริงสิ!"
90001190-108 = "อย่างที่คุณครูเคยบอกว่าหนึ่งในคุณสมบัติของพลังของทวยเทพไร้นามก็คือการสร้างวัตถุใหม่ค่ะ"
90001190-109 = "อืม โปรโตคอล ATRAHASIS ก็มีอะไรแบบนี้เหมือนกัน"
90001190-110 = "ค่ะ ใช่ค่ะ ในพลังของทวยเทพไร้นามมีพลังที่จะเปลี่ยนความสัมพันธ์ระหว่างคลื่นกับวัตถุโดยพื้นฐาน#nแผ่ซ่านอยู่ค่ะ"
90001190-111 = "ฉันตีความมันว่าเป็นการ <รวบรวม> และ <แปลง> ข้อมูลน่ะ..."
90001190-112 = "โดยพื้นฐานแล้วก็ไม่แตกต่างกันค่ะ สุดท้ายแล้ววัตถุก็คือพลังงาน และพลังงานก็มีมูลค่าของข้อมูลค่ะ"
90001190-113 = "เพราะงั้นสำหรับเน็ตซาชที่เป็นผู้เลื่อมใสลำดับที่ 7 แล้ว ปรากฏการณ์ที่เรียกว่าดินแดนเหล็กกล้าก็#nไม่ใช่เรื่องใหญ่โตนักค่ะ"
90001190-114 = "ถ้าเปรียบเทียบกับโปรโตคอล ATRAHASIS ก็ถือว่าเป็นเรื่องพื้นฐานไปเลยค่ะ แต่ว่า..."
90001190-115 = "[s] \"แต่ว่า?\""
90001190-116 = "แต่ถึงยังไง การที่มีการสร้างวัตถุใหม่ในระดับใหญ่ก็ไม่ใช่เรื่องที่เราจะเมินเฉยได้ค่ะ"
90001190-117 = "และที่เรายังไม่มีวิธีในการสกัดกั้นดินแดนเหล็กกล้าก็เหมือนกันนะ"
90001190-118 = "ชิ..."
90001190-121 = "จะทำยังไงดีล่ะคะ?"
90001190-122 = "ต่อให้เรายอมรับสมมติฐานของเคย์ที่บอกว่า... มีแต่สิ่งไม่มีชีวิตที่จะเปลี่ยนเป็นดินแดนเหล็กกล้าได้ ก็ยังมีปัญหาอยู่ดีค่ะ"
90001190-123 = "ใช่ ก่อนอื่นเราสรุปได้ว่า AMAS ของฉันและเคย์ห้ามเข้าไปใกล้ดินแดนเหล็กกล้า"
90001190-124 = "แล้วอาบี เอชูห์ของฉันก็ไม่น่าจะใช้ได้ด้วยค่ะ"
90001190-127 = "คือว่า ถ้าเป็นอย่างนั้นละก็ ต่อให้เป็นเสื้อผ้าหรืออาวุธของเราก็ใช้ไม่ได้เลยสิคะ...?"
90001190-128 = "ห้ะ?! งั้นพวกเราจะต้องล่อนจ้อนกันเหรอ?"
90001190-129 = "เอ๋?!?! นะ... นั่นสินะ...??!!"
90001190-131 = "ทำไมเหรอ? ฉันไม่มีปัญหากับการไม่ใส่อะไรนะ?"
90001190-132 = "ไม่หรอกค่ะ เอมิ คุณคงเป็นคนเดียวน่ะค่ะที่จะตอบอะไรแบบนั้นได้..."
90001190-134 = "ฉะ... ฉะฉะฉะฉะฉะ... ฉันไม่ไหวแน่นอนค่ะ...!"
90001190-141 = "งั้นนี่ก็เป็นโอกาสที่จะได้อวดหุ่นอันสมบูรณ์แบบของเมดเลยสิคะ คุณครูคิดว่ายังไงเหรอคะ?"
90001190-145 = "[ns] \"คะ... ครูเหรอ?!\""
90001190-146 = "อ่า แต่นอกจากคุณครูแล้วฉันก็ไม่อยากจะให้ใครคนอื่นได้เห็นเท่าไร... นี่เป็นปัญหาใหญ่เลยนะคะ งั้นคงต้องเปลี่ยนใจแล้วค่ะ"
90001190-147 = "ทะ... โทคิ...?"
90001190-148 = "เดี๋ยวก่อนนะคะ ทุกคน เรามีเรื่องอื่นที่เป็นปัญหาพื้นฐานอยู่ไม่ใช่เหรอคะ?"
90001190-149 = "การเปิดเผยร่างกายของสาวน้อยผู้แสนงดงามสดใส ทั้งมีรอยยิ้มฮีลใจในสภาพแวดล้อมที่เลวร้ายนี้ มันเป็นปัญหาใหญ่ในตัวมันเองก็จริง..."
90001190-150 = "แต่ว่าที่ดินแดนเหล็กกล้ามีบาเรียพหุมิติอยู่นะคะ? พูดอีกนัยหนึ่ง ตอนนี้พวกเราจะเข้าไปในนั้นไม่ได้ค่ะ"
90001190-151 = "ขอบใจนะ ฮิมาริ พูดในส่วนที่เป็นประโยชน์เลยละ"
