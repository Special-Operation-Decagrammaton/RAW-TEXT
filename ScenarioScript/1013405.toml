1013405-31 = "3;아리스 동복;99;네, 알고 있습니다."
1013405-32 = "3;아리스 동복;01;아비 에슈흐는 처음부터 싸우기 위해 만들어진, 전투만을 위해 만들어진 병기라고요."
1013405-33 = "3;아리스 동복;02;거기에 슬프거나, 기쁘거나 하는 감정은 없다고요."
1013405-34 = "3;아리스 동복;99;아리스, 모두에게 들었습니다."
1013405-35 = "3;아리스 동복;01;처음 만났을 때, 아비 에슈흐는 정말로 무시무시하게 강했다고요."
1013405-36 = "3;아리스 동복;08;너무 크고 강해서, 어떻게 이겨야 할지도 모르겠는, 그야말로 치트 같은 갑옷이었다고요.\n#3;em;[속상함]"
1013405-37 = "3;아리스 동복;04;그렇지만 그 뒤로 싸우고, 부서지고를 반복해서……."
1013405-38 = "3;아리스 동복;09;끝내는 아리스에게 딱 맞을 만큼 작아지고 말았습니다."
1013405-39 = "3;아리스 동복;06;……어쩌면, 이번이 마지막일지도 모른다고 했습니다."
1013405-40 = "3;아리스 동복;04;또다시 파괴되면, 더는 고칠 수 없다고요."
1013405-41 = "3;아리스 동복;09;그런데도, 아비 에슈흐는 다음 싸움을 위해 개조되고 있습니다."
1013405-42 = "3;아리스 동복;04;마지막까지 싸우고 파괴될 운명이라니요."
1013405-43 = "3;아리스 동복;06;아리스는, 아리스는 그런 거 별로라고 생각합니다…….\n#3;em;[속상함]"
1013405-44 = "3;아리스 동복;01;아비 에슈흐도 함께 게임개발부 부실에 가고 싶습니다. 엔지니어부의 모두에게도 보여주고 싶습니다."
1013405-45 = "3;아리스 동복;99;좀 더 다양한 사람과 만나, 좀 더 여러 장소에 함께하고 싶습니다."
1013405-46 = "3;아리스 동복;06;아비 에슈흐도, 빛의 검처럼 사랑받았으면 좋겠습니다."
