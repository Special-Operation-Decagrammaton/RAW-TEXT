1013405-11 = "#na;안내 음성;경고. 훈련 중에 예기치 못한 사고가 발생했습니다."
1013405-12 = "#na;안내 음성;텐도 아리스는 훈련을 중단하고, 즉시 수송선 내부로 복귀해 주십시오."
