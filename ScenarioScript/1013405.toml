1013405-19 = "3;아리스 동복;02;아리스는 괜찮습니다."
1013405-20 = "3;아리스 동복;99;사고가 일어난 것은, 아리스가 아니라 용사의 갑옷, 그러니까, 아비 에슈흐 쪽이니까요."
1013405-21 = "3;아리스 동복;01;사실, 무슨 사고인지도 잘 모릅니다."
1013405-22 = "3;아리스 동복;99;하지만 왜 일어났는지는 들었습니다."
1013405-23 = "3;아리스 동복;09;'원래 모습과 너무 달라졌기 때문'이라고요. 불안정해져서, 조정이 필요하다고요."
