[translation]
1013405-1 = "失去的勇者資格"
1013405-2 = "（發現愛麗絲的氛圍和平時不同，正為了找他而來到走廊時）"
1013405-11 = "警告。訓練中發生了意外事故。"
1013405-12 = "請天童愛麗絲中止訓練，立即返回運輸船內部。"
1013405-13 = "（船內響起了關於愛麗絲遭遇「事故」的廣播）"
1013405-15 = "啊，老師。"
1013405-16 = "[s1] 「愛麗絲，你沒事吧？」\n[s2] 「有沒有受傷！？」"
1013405-19 = "愛麗絲沒事。"
1013405-20 = "發生事故的不是愛麗絲，而是勇者的裝甲……也就是Abi-Eshuh那邊。"
1013405-21 = "其實，愛麗絲也不太清楚是什麼事故。"
1013405-22 = "不過有聽說了發生的原因。"
1013405-23 = "好像是因為「跟原來的樣子變得太不一樣了」的關係。#n所以才會變得不穩定，需要進行調整。"
1013405-27 = "Abi-Eshuh感覺好可憐。"
1013405-28 = "[s3] 「可憐？」\n[s4] 「但是Abi-Eshuh是……」"
1013405-31 = "是的，愛麗絲知道。"
1013405-32 = "Abi-Eshuh從一開始就是為了戰鬥而製造、並且只為戰鬥而製造的兵器。"
1013405-33 = "在那之中沒有悲傷或喜悅的感情。"
1013405-34 = "愛麗絲有聽大家說過。"
1013405-35 = "第一次遇見它的時候，Abi-Eshuh真的非常非常強。"
1013405-36 = "強到完全不知道該怎麼贏，簡直就像作弊一樣的裝甲。"
1013405-37 = "但是，在歷經反覆的戰鬥與破壞之後……"
1013405-38 = "尺寸已經變得小到剛好適合愛麗絲了。"
1013405-39 = "……而且愛麗絲還被告知，這有可能是最後一次了。"
1013405-40 = "如果又被破壞的話，或許就再也無法修復了。"
1013405-41 = "即便如此，Abi-Eshuh依然在為下一場戰鬥進行改造。"
1013405-42 = "只能不斷戰鬥，直到被毀壞為止的命運……"
1013405-43 = "愛麗絲覺得……愛麗絲覺得那樣不太好……"
1013405-44 = "愛麗絲想帶Abi-Eshuh一起去遊戲開發部的部室。#n也想帶去給工程師部的大家看看。"
1013405-45 = "想帶著它和更多不同的人見面、一起去更多更多的地方。"
1013405-46 = "希望Abi-Eshuh也能像光之劍一樣被人愛著。"
1013405-50 = "請告訴愛麗絲，老師。"
1013405-51 = "Abi-Eshuh和光之劍，究竟有什麼不同呢？"
1013405-52 = "是被製造出來的目的嗎？"
1013405-53 = "[ruby=出生時]被製造時[/ruby]就已經決定的命運什麼的……"
1013405-54 = "愛麗絲……已經學到那是不對的……"
1013405-55 = "做出決定的，應該是自己才對。"
1013405-56 = "但是Abi-Eshuh……什麼都無法自己決定。"
1013405-57 = "所以愛麗絲……愛麗絲……"
1013405-62 = "老師？"
1013405-65 = "[ns] 抱住愛麗絲"
1013405-68 = "[ns5] 「不要忘記現在的這份心意。」\n[ns6] 「對Abi-Eshuh來說，這樣就足夠了。」"
1013405-71 = "……好奇怪。"
1013405-72 = "明明被老師抱住的時候總是會感到幸福。"
1013405-73 = "現在卻不知為何，眼淚一直流個不停。"
1013405-74 = "愛麗絲……搞不清楚為什麼會這樣。"
1013405-75 = "[s7] 「沒關係。愛麗絲還有很多時間。」\n[s8] 「總有一天會理解的。」"
1013405-78 = "……老師很神奇。"
1013405-79 = "現在的愛麗絲完全不理解老師說的話。"
1013405-80 = "但是因為老師這麼說，就會覺得總有一天一定會那樣。"
1013405-81 = "果然，老師很神奇。"
1013405-83 = "（……就這樣抱著愛麗絲好一陣子）"
1013405-84 = "（等到Abi-Eshuh的維修結束後，愛麗絲又回去訓練了）"
