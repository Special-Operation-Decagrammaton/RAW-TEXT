[translation]
1013405-1 = "คุณสมบัติของผู้กล้าที่ถูกลืม"
1013405-2 = "(คุณครูออกมาเดินหาอาริสึที่ดูแปลกๆ ไป)"
1013405-11 = "แจ้งเตือน เกิดเหตุการณ์ไม่คาดคิดระหว่างการฝึกฝน"
1013405-12 = "ขอให้เทนโด อาริสึยุติการฝึกฝนและกลับไปในยานขนส่งทันที"
1013405-13 = "(ในยานมีการประกาศแจ้งเตือนเกี่ยวกับ 'อุบัติเหตุ' ของอาริสึ)"
1013405-15 = "อ๊ะ คุณครู"
1013405-16 = "[s1] \"อาริสึ เป็นยังไงบ้าง?\"\n[s2] \"บาดเจ็บตรงไหนหรือเปล่า?!\""
1013405-19 = "อาริสึไม่เป็นไรค่ะ"
1013405-20 = "อุบัติเหตุไม่ได้เกิดกับอาริสึ แต่เกิดกับอาบี เอชูห์ที่เป็นชุดเกราะของผู้กล้าค่ะ"
1013405-21 = "อันที่จริง อาริสึไม่รู้ด้วยค่ะว่ามันเป็นอุบัติเหตุอะไร"
1013405-22 = "แต่ก็พอได้ยินมาว่าทำไมถึงเกิดขึ้นค่ะ"
1013405-23 = "เห็นว่าเป็นเพราะ 'มันเปลี่ยนแปลงไปมากจากรูปแบบเดิม' และพอมันไม่เสถียร ก็เลยต้องมีการปรับเปลี่ยนค่ะ"
1013405-27 = "อาบี เอชูห์น่าสงสารจังเลยนะคะ"
1013405-28 = "[s3] \"น่าสงสารงั้นเหรอ?\"\n[s4] \"แต่ว่าอาบี เอชูห์คือ... \""
1013405-31 = "ค่ะ อาริสึรู้ค่ะ"
1013405-32 = "อาบี เอชูห์เป็นอาวุธที่ถูกสร้างขึ้นเพื่อการต่อสู้ตั้งแต่แรกอยู่แล้วค่ะ"
1013405-33 = "นั่นก็แปลว่ามันเป็นสิ่งที่ไม่มีความรู้สึกเศร้าหรือสุข"
1013405-34 = "อาริสึได้ยินมาจากทุกคนค่ะ"
1013405-35 = "ตอนได้เจออาบี เอชูห์ครั้งแรก มันแข็งแกร่งเอาเสียมากๆ เลยค่ะ"
1013405-36 = "เหมือนชุดเกราะที่ใช้สูตรโกงที่ทั้งขนาดใหญ่โต ทั้งแข็งแกร่งจนอาริสึไม่รู้เลยว่าจะเอาชนะได้ยังไงเลย#nละค่ะ"
1013405-37 = "แต่พอต้องออกไปต่อสู้และได้รับความเสียหายซ้ำแล้วซ้ำเล่า..."
1013405-38 = "สุดท้ายมันก็เล็กลงจนขนาดพอดีตัวอาริสึเลยค่ะ"
1013405-39 = "ได้ยินว่า... บางทีนี่อาจเป็นครั้งสุดท้ายแล้วก็ได้ค่ะ"
1013405-40 = "ถ้ามันถูกทำลายจนเสียหายอีก ก็จะซ่อมกลับมาไม่ได้แล้วค่ะ"
1013405-41 = "แต่ถึงยังไง อาบี เอชูห์ก็กำลังได้รับการปรับปรุงเพื่อการต่อสู้ครั้งต่อไปอยู่ค่ะ"
1013405-42 = "ไม่อยากเชื่อเลยว่าชะตาของมันคือต้องต่อสู้จนถึงที่สุดและถูกทำลายลงในที่สุด"
1013405-43 = "อาริสึ... อาริสึไม่ชอบให้เป็นแบบนั้นเลยค่ะ..."
1013405-44 = "อาบี เอชูห์ก็อยากไปอยู่ที่ห้องชมรมพัฒนาเกมนะคะ แล้วอาริสึก็อยากพาอาบี เอชูห์ไปอวดทุกคนที่#nชมรมวิศวกรรมด้วยค่ะ"
1013405-45 = "อาริสึอยากให้อาบี เอชูห์ได้พบปะกับผู้คน และอยากพาไปในที่ต่างๆ ให้มากกว่านี้ด้วยค่ะ"
1013405-46 = "ถ้าอาบี เอชูห์ได้รับความรักเหมือนกับดาบแห่งแสง ก็ดีสินะคะ"
1013405-50 = "ทำไมเหรอคะ คุณครู?"
1013405-51 = "ทำไมอาบี เอชูห์กับดาบแห่งแสงถึงได้เปลี่ยนไปมากขนาดนี้คะ?"
1013405-52 = "เพราะถูกสร้างมาเพื่อจุดประสงค์แบบนั้นใช่มั้ยคะ?"
1013405-53 = "คิดไม่ถึงเลยว่าโชคชะตาจะถูกกำหนดไว้ตั้งแต่วินาทีที่[ruby=เกิด]ถูกสร้าง[/ruby]ขึ้นมาแล้ว..."
1013405-54 = "อาริสึ... ได้เรียนรู้มาว่าแบบนั้นมันไม่ถูกต้องเลยค่ะ..."
1013405-55 = "ตัวเราเองต่างหากล่ะคะที่เป็นคนกำหนดโชคชะตาตัวเอง"
1013405-56 = "แต่ว่า... อาบี เอชูห์... กำหนดอะไรเองไม่ได้เลยค่ะ"
1013405-57 = "เพราะงั้นอาริสึ... อาริสึ..."
1013405-62 = "คุณครู?"
1013405-65 = "[ns] เข้าไปกอดอาริสึ"
1013405-68 = "[ns5] \"มีหัวใจที่งดงามแบบนี้ตลอดไปนะ\"\n[ns6] \"ความรู้สึกนี้เพียงพอกับอาบี เอชูห์แล้วละ\""
1013405-71 = "แปลกจังเลยค่ะ..."
1013405-72 = "ถ้าคุณครูมากอด อาริสึจะมีความสุขทุกครั้งเลยนี่นา"
1013405-73 = "แต่ทำไมครั้งนี้... น้ำตาถึงไหลล่ะคะ"
1013405-74 = "อาริสึไม่เข้าใจเลยค่ะ"
1013405-75 = "[s7] \"ไม่เป็นไรนะ อาริสึยังมีเวลาอีกเยอะ\"\n[s8] \"สักวันอาริสึจะเข้าใจได้นะ\""
1013405-78 = "คุณครูนี่น่าทึ่งจังเลยนะคะ..."
1013405-79 = "ตอนนี้อาริสึไม่เข้าใจที่คุณครูพูดเลยสักนิดค่ะ"
1013405-80 = "แต่ถ้าคุณครูบอกไว้ว่าจะเป็นอย่างนั้น อาริสึก็รู้สึกว่ามันจะเป็นอย่างนั้นในสักวันค่ะ"
1013405-81 = "คุณครูทำให้อาริสึทึ่งได้เสมอจริงๆ ค่ะ"
1013405-83 = "(แล้วคุณครูก็กอดอาริสึไว้สักพัก...)"
1013405-84 = "(หลังจากซ่อมอาบี เอชูห์เสร็จ อาริสึก็กลับไปฝึกฝนต่อ)"
