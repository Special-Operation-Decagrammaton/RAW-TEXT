[translation]
1013405-1 = "Hero's Lost Authority"
1013405-2 = "I went out looking for Aris."
1013405-11 = "Warning. Unexpected incident in hangar."
1013405-12 = "Tendou Aris, please cease training and return to the cabin immediately."
1013405-13 = "News of Aris' incident blasted through the loudspeakers."
1013405-15 = "Ah, Sensei."
1013405-16 = "[s1] \"Aris, are you all right?!\"\n[s2] \"Are you hurt anywhere?!\""
1013405-19 = "I am okay."
1013405-20 = "The accident was not with me, but with Abi-Eshuh."
1013405-21 = "I am not quite sure what happened."
1013405-22 = "But I do know why it happened."
1013405-23 = "It is having difficulty adjusting to its new form, because it is so different from the original."
1013405-27 = "I feel bad for Abi-Eshuh."
1013405-28 = "[s3] \"You feel bad?\"\n[s4] \"But Abi-Eshuh...\""
1013405-31 = "Yes, I know."
1013405-32 = "Abi-Eshuh was made for fighting, a weapon for battles. That was its original fate."
1013405-33 = "Emotions, like sadness or happiness, do not exist to Abi-Eshuh."
1013405-34 = "...I have heard stories from the others."
1013405-35 = "Stories of how Abi-Eshuh was so scary and powerful in its first battle."
1013405-36 = "It was so strong that it felt like fighting against an unbeatable cheater."
1013405-37 = "But it fought, was destroyed, and then repaired, over and over again."
1013405-38 = "Now it has become small enough to fit me."
1013405-39 = "...They said this is likely its last battle."
1013405-40 = "It will be beyond repair if it is destroyed again."
1013405-41 = "Even as we speak, Abi-Eshuh is being adjusted to be perfectly tuned for the next fight."
1013405-42 = "Is its destiny to fight and get hurt and fight again, until the very end?"
1013405-43 = "I... I do not like that."
1013405-44 = "I wish to take Abi-Eshuh back to the Game Development Department with me. To show it to my friends in the Engineering Department."
1013405-45 = "I want it to meet the people I meet, to go to the places I go."
1013405-46 = "I want Abi-Eshuh to feel what it is to be loved, like the Sword of Light."
1013405-50 = "Tell me, Sensei."
1013405-51 = "How did Abi-Eshuh and Sword of Light end up so differently?"
1013405-52 = "Was it just their destiny?"
1013405-53 = "A predetermined destiny, set in stone from the moment you are created..."
1013405-54 = "I...have chosen not to believe in such a thing."
1013405-55 = "I have chosen to create my own destiny, for myself."
1013405-56 = "But...Abi-Eshuh was not given that right to choose."
1013405-57 = "So I... I..."
1013405-62 = "Sensei?"
1013405-65 = "[ns] Hug Aris."
1013405-68 = "[ns5] \"That feeling you're feeling... Never forget it.\"\n[ns6] \"Abi-Eshuh can hear and understand it too.\""
1013405-71 = "...How strange."
1013405-72 = "Usually your hugs make me very happy."
1013405-73 = "But I cannot seem to stop crying right now."
1013405-74 = "I do not understand."
1013405-75 = "[s7] \"It's all right. We're in no rush.\"\n[s8] \"You'll understand some day.\""
1013405-78 = "...You are amazing, Sensei."
1013405-79 = "I do not understand any of what you are saying."
1013405-80 = "However, I know I can trust in your words. I can believe in \"some day.\""
1013405-81 = "You very much amaze me, Sensei."
1013405-83 = "...I held Aris for as long as she needed."
1013405-84 = "And when Abi-Eshuh's maintenance was done, Aris went right back to training."
