[translation]
101100-1 = "Episode 10; Collision 2"
101100-4 = "A motion of censure... Yikes. This is really getting out of hand..."
101100-5 = "B-But...Rin's the proxy for the president of the General Student Council! If they take away Rin's authority..."
101100-6 = "The General Student Council will be paralyzed, Aoi. You remember what happened right after the president disappeared."
101100-7 = "It's a risk I'm willing to take, if it means reeling in your madness."
101100-8 = "We have no choice until Schale's Sensei or the chief of defense is found."
101100-9 = "..."
101100-10 = "Tomorrow morning, I'll summon every chief of staff and we will discuss the details of your censure."
101100-11 = "Rest while you can, Rin. Tomorrow will not be easy for you."
101100-12 = "..."
101100-13 = "If you have enough time to eavesdrop, maybe you don't have enough work to do!"
101100-14 = "Y-Yes, ma'am!"
101100-15 = "Let's get out of here..."
101100-21 = "Momoka, Ayumu. You two will leave as well. That's an order."
101100-22 = "Th-That's..."
101100-23 = "Ugh... U-Um..."
101100-24 = "It's fine. Go, both of you. Thank you for everything you've done for me. "
101100-25 = "I-I... Okay, Rin... But I'll be here first thing tomorrow."
101100-26 = "*sigh* ...This is...so awkward..."
101100-32 = "I'll see you tomorrow then, Aoi."
101100-33 = "..."
101100-51 = "...?! Wh-What...?!"
101100-57 = "Things are proceeding even more smoothly than expected. The General Student Council room is empty."
101100-58 = "Worst case, I was even expecting to collide with those foxes. Not that their presence would have changed the outcome."
101100-59 = "The chief officer is the only one here."
101100-60 = "...! You're...! The Kaiser Corporation?!"
101100-61 = "...So, this is the chief officer."
101100-62 = "I wouldn't try anything. All communication networks and alarm systems have been taken care of."
101100-63 = "...!!!"
101100-64 = "All rights of the General Student Council have been transferred to the Kaiser Corporation."
101100-65 = "Sanctum Tower Team, report."
101100-66 = "*tchhhk* We have control of the Sanctum Tower, sir!"
101100-67 = "Good. Connect to the president."
101100-71 = "*tchhhk* Excellent, connection has been established smoothly. Oh... But the next steps will take some time. "
101100-72 = "Beginning by declaring martial law on the D.U."
101100-73 = "From now on, all communication, logistics, and transportation in and out of the D.U. will be shut down, and all administrative agencies will be suspended."
101100-74 = "No outsiders will be able to know what is happening here. Meanwhile..."
101100-75 = "What is the meaning of this? What is the Kaiser Corporation's goal here?"
101100-76 = "We are occupying Sanctum Tower."
101100-77 = "...!"
101100-78 = "Why? We recently acquired an ancient weapon, and we need the Sanctum Tower's power to... Ah, well. I won't bore you with the petty details."
101100-79 = "All you need to know is that Kivotos is now under control of the Kaiser Corporation. The Academy City belongs to us now. Not Gematria, not the General Student Council. Us."
101100-80 = "...!"
101100-82 = "Aren't you glad? Corporate City sounds much better than Academy City. Hahaha."
101100-86 = "[ns] \"The Kaiser Corporation...\""
101100-87 = "The General Student Council was disbanded and the chairmen were scattered... We can't get a hold of anyone, and no one knows what's going on inside Sanctum Tower now..."
101100-88 = "Ugh... There's not a single thing we can do to alleviate the situation. It's so frustrating..."
101100-89 = "*sigh* ...I normally avoid annoying situations like this at all costs..."
101100-90 = "Huh? That door's open!"
101100-91 = "You're right. Let's investigate."
101100-92 = "Eek... Those PMC bastards are coming this way. We have to go."
101100-93 = "Th-This way, everyone."
101100-94 = "Ugh."
101100-95 = "[ns] \"Kanna, your injuries look bad...\""
101100-98 = "...This is it for me, Sensei."
101100-99 = "[ns] \"What...?!\""
101100-100 = "D-Director?! What does that mean?"
101100-101 = "What are you saying?!"
101100-103 = "Heh... This place looks exactly the same as when we had freshman retreat here... Nothing much has changed, huh?"
101100-104 = "I thought I was going to be a righteous police officer back then... I guess I'm the one who's different now."
101100-105 = "I...I have to apologize for inconveniencing you, Public Safety Bureau."
101100-106 = "Director Kanna..."
101100-107 = "N-No way... This is too much for me."
101100-108 = "I need you to listen carefully. Exit this building and keep going, you'll find a high-speed train station that goes outside of D.U. It's near Kousagi Park, so you know the area. And..."
101100-109 = "Ah, I almost forgot. Your things."
101100-110 = "I managed to get your tablet and cell phone."
101100-115 = "[ns] \"The Shittim Chest... How did you?!\""
101100-116 = "You think I've just been twiddling my thumbs? I infiltrated Valkyrie's confidential files to find where you were being confined...and where this was being hidden..."
101100-117 = "I had to convince Kaiser I was willing to collude with them to pull it off without any suspicion. Quickly, take it."
101100-118 = "[ns] Take the Shittim Chest."
101100-121 = "The situation is dire. The Kaiser corporation now has complete control of Kivotos and Sanctum Tower. "
101100-122 = "If someone doesn't do something, the entire city is going to descend into chaos."
101100-123 = "I'm still just a corrupt cop, compromising her ideals for safety. This was all the resistance I could muster. But, Sensei, if you hadn't shown me the error of my ways at my lowest point, I probably wouldn't have even managed this."
101100-124 = "Not everyone at Valkyrie is like me, Sensei."
101100-125 = "There are a lot more people out there fighting for what they believe in. For justice. Just look at these two here..."
101100-126 = "..."
101100-127 = "..."
101100-132 = "[ns1] \"No, Kanna, you're a great cop.\"\n[ns2] \"You didn't give up. You acted on your beliefs.\""
101100-135 = "..."
101100-136 = "[s3] \"And now that we have this, we should be fine.\"\n[s4] \"It's all gonna work out with this, somehow.\""
101100-139 = "...Huh?"
101100-140 = "S-Sensei?"
101100-141 = "That little tablet is that important?"
101100-146 = "[ns5] \"...We thirst for the seven wailings.\"\n[ns6] \"...We bear the koan of Jericho.\""
101100-154 = "WAHHH! Sensei! "
101100-155 = "I'm so glad you're safe! I was worried sick! I was so scared when the power went out!"
101100-156 = "And something terrible is happening now!"
101100-157 = "[s7] \"Yeah, I know.\" \n[s8] \"I'm glad you're safe, Arona.\""
101100-160 = "*sob* I'm... I'm okay, Sensei..."
101100-163 = "[ns] \"All right. Do you all trust me?\""
101100-165 = "Next Episode; Escape 1"
