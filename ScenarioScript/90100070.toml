[translation]
90100070-1 = "第7話;高速道路を走る人影"
90100070-2 = "第3業務地区第2区域"
90100070-5 = "こちらFOX3。1人目の被害者が発見された、第3業務地区の2区域を聞き込み中。"
90100070-6 = "被害者は近くにある製薬会社の営業で、昼間もこの辺りをよく歩いてたみたい。"
90100070-7 = "でも、ガラスの反射で眩しいってこと以外、白いかかしと見間違えるような物は見当たらないかな。"
90100070-11 = "甲種閉鎖区域内・解体現場"
90100070-13 = "こちらFOX4。3人目の被害者が見つかった甲種閉鎖区域の解体現場を捜索中。"
90100070-14 = "被害者は解体現場の作業員で、日陰のない空き地で作業することが多かったんだって。"
90100070-15 = "けほっ、けほっ……土煙がすっごい。白いかかしどころか白い物すらよく見えない。#n暑すぎる以外は異常なし。"
90100070-19 = "月天場外市場"
90100070-21 = "こちらFOX2。月天の場外市場で聞き込みをしてるよ。#n6人目の被害者が発見された場所だね。"
90100070-22 = "被害者はここの屋台の店主だって聞いたんだけど……#n暑いからかな？お店が閉まっちゃってて、人にはほとんど会えなかったよ。"
90100070-23 = "うーん……白い服の観光客をかかしと見間違えた可能性はあるのかも？"
90100070-24 = "特に目立った点はなさそう。"
90100070-26 = "KVハイウェイ35番道路"
90100070-28 = "こちらFOX1。KVハイウェイ35号道路を捜索中。"
90100070-29 = "９人目の被害者はD.U.道路管理局所属の整備士で、点検中に事故に遭ったらしい。"
90100070-30 = "発見された橋の下まで入念に確認したが――"
90100070-34 = "やはり足りないな。"
90100070-39 = "何が？水？もっと補給要る？"
90100070-40 = "たぶん、白いかかしを特定できる手掛かりが足りないってことかな。"
90100070-41 = "最初からやり直そう、なんて言わないよね……？"
90100070-42 = "しかし――"
90100070-46 = "[ns1] \"こんにちは、シャーレEATSです！\"\n[ns2] \"冷たいお水とエナジードリンクを持ってきたよ！\""
90100070-49 = "あ、先生……。"
90100070-50 = "こんなに……ありがとうございます。重かったんじゃないですか？#n毎回ついて来てくださるのも大変でしょうに……。"
90100070-51 = "[s3] \"思ったより時間かかってるみたいだったから。\"\n[s4] \"何か問題でもあった……？\""
90100070-54 = "大きな問題はありません。#nですが、被害者の証言を裏付ける情報が不足していて……。"
90100070-55 = "やはり捜索範囲を拡大し、聞き込みを再開する必要がありそうです。"
90100070-59 = "うぅっ……。"
90100070-61 = "[ns5] \"こんな暑さだし、後に回せないの？\"\n[ns6] \"せめて日が落ちてから再開するとか……。\""
90100070-64 = "それは……難しいですね。"
90100070-65 = "現場証拠は場所だけでなく、時間や天候によって姿を変えるものです。"
90100070-66 = "被害者は全員、日差しの強い真昼に発見されている。#nとなれば日が落ちてからの聞き込みは意味がありません。"
90100070-67 = "証拠集めとしては効率的だけど……#n小隊員のコンディションも少し考えたほうがいいんじゃないかな？"
90100070-68 = "何日も炎天下で動いてて、みんな疲れが溜まってるころだと思うよ。"
90100070-72 = "……仕方ない。"
90100070-73 = "みんなは周辺で休憩を取っていてくれ。次の聞き込みは私一人で――"
90100070-74 = "まったく……。"
90100070-75 = "また出た。いつもの悪い癖。"
90100070-76 = "ユキノ、そう言われて私たちが本気で休めると思う？#nそれとも私たちが、隊長の苦労を見て見ぬふりする最低な隊員だとでも？"
90100070-77 = "そ、そんなつもりでは……。"
90100070-78 = "[ns7] \"特に期日が決められてるわけじゃないし……。\"\n[ns8] \"少しくらい、肩の力を抜いてみない？\""
90100070-81 = "ですが……こうしている間にも新しい被害者が出るかもしれません。"
90100070-82 = "私の怠慢で市民が傷つくようなことが……また、起きたら。"
90100070-83 = "そうなる前にもっと早く判断して、責任を取れなければ――"
90100070-90 = "待って。高速道路のインターチェンジ方面から新規の存在が接近中。"
90100070-91 = "動きと速度的に……人っぽい？"
90100070-92 = "高速道路上に人がいるの？#n道路管理局の点検予定ってあったっけ。"
90100070-93 = "いや、スケジュールにはのってないね。"
90100070-94 = "まさか、噂の「白いかかし」が……。"
90100070-95 = "どこかへ消えてしまう前に、急いで追うぞ。"
90100070-103 = "未識別って、あそこを走ってる生徒？"
90100070-104 = "あのー、すみませ――"
90100070-108 = "あれ？こんな所に人が……？"
90100070-109 = "何かお困りですか？"
90100070-110 = "いやいや、困ってるのはむしろそっちに見えるんだけど。"
90100070-111 = "この先は歩行者通行禁止だ。迂回しろ。"
90100070-112 = "そもそも高速道路に入っちゃダメでしょ？どうして入ってきちゃったの？"
90100070-113 = "そりゃ当然――"
90100070-117 = "路上研修です！"
90100070-118 = "[s] \"あれ？その格好って、百鬼夜行連合学院の……。\""
90100070-119 = "……[USERNAME]先生？"
90100070-120 = "はいっ、百鬼夜行連合学院の人力車部所属！[ruby=あさくさ]浅草[/ruby]ナツキです！#nお祭り以来ですね！"
90100070-121 = "もしよかったら……乗っていかれます？"
90100070-122 = "今ならD.U.のどこへでも、タクシーより安くお送りできますよ！"
90100070-123 = "[s9] \"いや、人力車は大丈夫。\"\n[s10] \"それより、聞きたいことがあるんだけど……。\""
90100070-127 = "つまり……自治区の外まで行きたい客がいるかもしれないから、#n高速道路で人力車を引く練習をしてたってこと？"
90100070-128 = "はい！目的地まで最短ルートで迅速にお連れするのがモットーですから！"
90100070-129 = "地理の把握不足で遠回りになってしまっては、#nお客様からの信頼を失ってしまうかもしれませんし。"
90100070-130 = "うん……分かる。急に知らない道に入られて、わざと遠回りしてるんじゃないかって不安になったことあるし。"
90100070-131 = "タクシーと人力車を一緒にしないでよ！？"
90100070-132 = "ナツキちゃん、でいいかな？#nD.U.の高速道路は人力車の通行が禁止されてるんだ。#nだから、別ルートにしたほうがいいんじゃないかな。"
90100070-133 = "えっ、そうなんですか！？"
90100070-134 = "うぅ……百鬼夜行で禁止条例が出たばっかりなのに……まさかD.U.もだったなんて。"
90100070-135 = "人力車が高速道路に入ったら危ないのは、条例以前に常識でしょ……。"
90100070-136 = "というか、この天気でよく走ろうと思ったわね。#nそこらの運動部でも半日走ったらフラつきそうな暑さなのに。"
90100070-137 = "ちょっと暑いですけど……大丈夫です！よくあることですから！"
90100070-138 = "舗装された路面は照り返しが強いですし、暑い場所で走るのには慣れてるんです。"
90100070-139 = "繁忙期の真夏に比べれば、まだ涼しいほうですよ！"
90100070-140 = "[s11] \"それでも熱中症には気をつけてね。\"\n[s12] \"はい、1本あげる。よく冷えてるよ。\""
90100070-143 = "あ……ありがとうございます。"
90100070-144 = "まさかこんな場所でシャーレの先生から飲み物を頂けるなんて……#n今日は運がいいですね。"
90100070-149 = "いつも暑い道路を走っているのなら、聞きたいことがある。"
90100070-150 = "「白いかかし」を見たことはないか？"
90100070-151 = "白いかかし……ですか？"
90100070-152 = "そのかかしを見た人は、みんな意識を失って痙攣を起こしちゃうらしいんだけど……。"
90100070-153 = "……もしかして「くねくね」のことですか？"
90100070-154 = "くねくね……？"
90100070-155 = "あ、でも普通は田舎の田んぼで目撃されるものなので、#nビルだらけの都会で見たって話はあまり聞かないですけど……。"
90100070-156 = "何でも構わない。そのくねくねとは何だ？"
90100070-157 = "くねくねは百鬼夜行自治区で有名な都市伝説です。#nといっても、わりと最近流行り始めた怪談ですが。"
90100070-158 = "暗くてジメッとした場所で目撃される他の怪異とは違って、#n晴れて見晴らしのいい草原で目撃されるって言われてます。"
90100070-159 = "遠目には踊ってる白いかかしみたいにも見えるんですけど、#n正体が人なのか、かかしなのか分かった人はいない、って。なぜなら――"
90100070-160 = "近づいて正体を見た人は……気が狂って――#nくねくねと同じになっちゃうからです。"
90100070-161 = "薄気味悪い笑みを浮かべて、くねくね……って。"
90100070-162 = "えっ、何それこわ。"
90100070-163 = "まあ、あくまで怪談ですから。#n百鬼夜行でも本気で信じてる人はほとんどいないと思いますよ。#n私たちみたいな人力車引きならともかく。"
90100070-164 = "うん？じゃあナツキちゃんは信じてるの？"
90100070-165 = "怪談を信じてるっていうより……広まった理由を理解できる、って感じです。"
90100070-167 = "ほら、暑い日にアスファルトの上を歩いてると、陽炎が立ち上って……#nくねくねする白い煙みたいに見える時、あるじゃないですか。"
90100070-168 = "そういう日は、無理して人力車を引くと熱中症になることもあるんです。"
90100070-169 = "だから地平線の近くでくねくねする「白いかかし」を見たら帰れ、っていうのは……#n意外と常識的な助言なのかもしれません。"
90100070-172 = "陽炎……。"
90100070-173 = "……そうか。陽炎か。"
90100070-174 = "助かった。大きな手掛かりだ。"
90100070-175 = "え、えっ……？それはよかった……です？"
90100070-180 = "[USERNAME]先生。現時刻をもって小隊作戦を終了し、HQへ復帰します。"
90100070-181 = "[s] \"分かった。戻ろうか。\""
90100070-186 = "[ns] \"ナツキも暑さに気をつけて帰ってね～\""
90100070-187 = "はい、そちらもお気をつけて……！"
90100070-194 = "それにしても、あのセーラー服の生徒たち……見覚えがあるような……。"
90100070-195 = "うちに修学旅行とかで来てたっけ？"
90100070-197 = "次回;陽炎の向こうから"
