[translation]
102030-1 = "第3話;作戰準備（１）"
102030-2 = "第1聖所"
102030-3 = "阿拜多斯沙漠地區"
102030-5 = "我是負責第1聖所作戰的奥空綾音。"
102030-6 = "大家，到達指定位置了嗎？#n第1部隊，請回答。"
102030-10 = "沒問題唷綾音醬。我們準備好了。"
102030-11 = "嗯嗯！正在待機中☆"
102030-13 = "感謝回答！#n星野前輩呢？"
102030-15 = "嗯，大叔也準備好了。"
102030-16 = "那就是──「虛假的聖所」對吧？"
102030-17 = "是的。#n……並且，如果不把「薇娜」引誘過來，就無法破壞它。"
102030-19 = "「[ruby=誘餌]囮[/ruby]」的工作就由我們便利屋來負責。沒問題吧？"
102030-20 = "是，是！！只要讓這部故障的列車暴走，然後壯烈犧牲就可以了對吧！？#n我，我知道了！我會拚命去死的！！"
102030-21 = "啊哈哈！！遙香醬，還是跟往常一樣呢～"
102030-22 = "不是，不能死掉吧……#n第2部隊吸引住薇娜後，將與第1部隊會合並夾擊目標。"
102030-23 = "因為必須在列車「上」移動，如何避免受傷是很重要的。"
102030-24 = "沒錯，最危險的位置就交給我們便利屋68吧。#n這就是冷硬派的作風呀。"
102030-25 = "咯呵呵，感覺超好玩的！就像雲霄飛車一樣～！"
102030-26 = "對了對了，我打算在最後破壞掉列車……"
102030-27 = "有什麼意見嗎？"
102030-31 = "關於這點請不用在意。#n反正現在也已經沒在使用了……"
102030-33 = "而且──那部列車，可以說是加速阿拜多斯衰退的契機……"
102030-34 = "如果它能為拯救世界派上用場……"
102030-35 = "那就再好不過了♧"
102030-36 = "野乃美前輩……"
102030-37 = "難道說，"
102030-38 = "這部列車是奈芙蒂斯集團的──"
102030-42 = "好了好了，過去的事就說到這裡……#n這邊也準備完成了唷～"
102030-44 = "好的！「夏萊指揮中心」0號，聽到請回答！#n第1聖所準備完畢！"
102030-46 = "收到，確認完畢。#n真紀醬，那邊怎麼樣了呢？"
102030-49 = "沒問題唷！啊，不過有件事需要注意。"
102030-50 = "絕對不要碰到薇娜發出的雷射哦！"
102030-51 = "據說那是連岩石都能瞬間蒸發的超高溫雷射。"
102030-56 = "第2聖所目前的狀況怎麼樣呢？"
102030-58 = "第2聖所"
102030-59 = "千年郊外的封鎖地區"
102030-61 = "嗯。這裡是負責第2聖所作戰的和泉元英美。"
102030-62 = "接下來預計將與位於軍需工廠內的赫賽德交戰。"
102030-63 = "在工廠正面，負責與赫賽德創造出來的兵力戰鬥的部隊，以及──"
102030-64 = "將從空中進入工廠內部的空降部隊皆在待機中。還有──"
102030-65 = "狀況我明白了。感謝說明。#n空降部隊的成員已經決定好了嗎？"
102030-66 = "這個嘛……發生了一點問題。"
102030-67 = "……怎麼說呢？"
102030-69 = "啊？你這傢伙，有在聽我說話嗎？"
102030-70 = "嘰嘻嘻……"
102030-71 = "嘰嘻嘻嘻……"
102030-72 = "那個……"
102030-73 = "呃……真傷腦筋……"
102030-74 = "C&C的Double O與實現正義部的部長互不相讓。"
102030-75 = "……"
102030-77 = "隊長，時間就快到了……#n現在不是做這種事的時候……"
102030-78 = "我知道！#n可是，是這傢伙先來吵架的。"
102030-82 = "唉……#n那個……不好意思，能不能也麻煩您安撫一下那位……"
102030-83 = "抱歉，那太困難了。#n那個狀態的弦生前輩是沒有人能夠阻止的……"
102030-84 = "話說，為什麼要吵架呢～？#n讓[ruby=・   ・   ・]強的人[/ruby]負責正面不就好了嗎？"
102030-85 = "明，明日奈前輩，那種話不能說……！！"
102030-86 = "啊……完了。"
102030-92 = "……喂，到外面去。#n來分個高下吧。"
102030-96 = "……咯咯，嘰哈哈哈哈哈！"
102030-100 = "哇！打起來了～！！#n好像很有趣～！有好戲看囉～！"
102030-104 = "唉……結果還是變成這樣了嗎……"
102030-105 = "我們也走吧。"
102030-110 = "啊……"
102030-111 = "……真沒辦法。"
102030-118 = "英美同學？#n你們那邊究竟──"
102030-119 = "……他們去打架了。"
102030-120 = "……"
102030-129 = "實現正義部的部長，真厲害呢～！"
102030-130 = "能在近身戰與隊長平分秋色的人……我還是第一次看到。"
102030-131 = "弦生──他可是被稱為「三一的戰略兵器」的人啊。"
102030-133 = "哦～真厲害呢～#n很久沒見到面對弦生前輩也不會害怕的人了。"
102030-141 = "咯嘻嘻……"
102030-142 = "嘎啊啊啊啊啊啊啊──！！"
102030-147 = "哈哈哈！#n很好，接下來吃我這招！"
102030-160 = "啊哈哈哈！隊長好像也很開心呢～！"
102030-161 = "最近發生了各種事情，堆積了不少壓力吧。"
102030-162 = "弦生前輩今天的情緒也很高昂的說～"
102030-164 = "哈哈！挺有兩下子的嘛。不過該不會這樣就要結束了吧？#n還是說，你的傷會痛呢？"
102030-166 = "嘰嘻嘻……傷什麼的──"
102030-167 = "──已經痊癒了。"
102030-168 = "……哈哈！有兩下子。#n這樣就對了！！"
102030-169 = "嘎啊啊啊啊啊啊啊──！！"
102030-170 = "等等，你們兩個在做什麼啊！！"
102030-173 = "啊……優香……"
102030-174 = "居然會因為分組吵架……#n你們到底是幾年級的？"
102030-175 = "抱歉，各位。#n我想優香醬應該能阻止他們，所以……"
102030-176 = "……"
102030-177 = "呿，好不容易要有趣起來了的說……"
102030-179 = "咦～？可是可是，不決定誰比較強的話是分不了組的唷？"
102030-180 = "到底在說什麼……？"
102030-181 = "真是的……那邊的兩位！"
102030-182 = "啊？"
102030-183 = "？"
102030-184 = "用猜拳決定！現在馬上！"
102030-188 = "啊！？怎麼能用那種東西來決定啊！"
102030-189 = "我們也沒時間了。#n這樣下去計畫會失敗的。"
102030-190 = "呿……知道了啦。"
102030-196 = "那就……剪刀──"
102030-197 = "──石頭，"
102030-198 = "──布！！"
102030-200 = "……"
102030-201 = "分出勝負了呢。"
102030-203 = "桃井！綠！柚子！有緊急任務！#n是攻略地城唷！"
102030-204 = "愛麗絲，噓──！#n這是重要的作戰，稍微小聲一點……"
102030-205 = "姐姐……沒，沒問題嗎？"
102030-206 = "應，應該，沒問題吧……#n老師也說「集結了最強的隊伍」……"
102030-207 = "是！愛麗絲也聽說了！這次要和超強的夥伴一起戰鬥！所以，沒問題的！"
102030-208 = "超強的夥伴……"
102030-209 = "那個，好像說其中一個是特殊部隊對吧？"
102030-216 = "這裡就是史林皮亞嗎？#n氣氛比想像中還詭異啊。"
102030-217 = "RABBIT小隊，抵達目標位置。#n已與主力部隊會合。"
102030-219 = "來，來了！是SRT……！"
102030-220 = "你，你們好……請多多指教。"
102030-222 = "今天請各位多多指教。"
102030-223 = "RABBIT3、RABBIT4，請報告各自的位置。"
102030-224 = "RABBIT3，空中支援已準備就緒。等待命令中～#n美優，你那邊怎麼樣？"
102030-225 = "RABBIT4，視，視線不佳……風速為東南方向35節……環境不算太好……"
102030-226 = "不，不過……對狙擊的影響不大唷……"
102030-232 = "這已經是颱風級別的風速了……"
102030-234 = "來，來了！超強的夥伴之二……！#n格黑娜風紀委員長，空崎陽奈……！"
102030-235 = "請，請多多指教……！"
102030-237 = "狙擊手，與目標的距離有多遠呢？"
102030-238 = "是，是！？我，我嗎？#n啊……那個，大約950m左右……"
102030-239 = "你的武器是？"
102030-240 = "是RABBIT39式狙擊用步槍……！#n子彈使用7.62mm×53mmR……填彈數是5發，槍，槍隻編號是──"
102030-242 = "那個……"
102030-244 = "……抱歉，我沒有逼問你的意思。"
102030-245 = "位於有效射程2倍的距離，還能在這種惡劣的條件下進行狙擊──真不簡單。"
102030-246 = "咦，咦……？那那個，是，是這樣嗎？"
102030-247 = "嗚啊啊……謝，謝謝……！？"
102030-248 = "美優在距離1980m的位置，也成功狙擊過目標。"
102030-249 = "……是嗎。雖然是初次見面，卻能夠想像。#n今後還會繼續成長吧。"
102030-250 = "老師在重要時刻請求過RABBIT小隊的協助……#n並且一起進行了夏萊奪還作戰……看來都是事實呢。"
102030-252 = "這，這也不算什麼。"
102030-253 = "另外──"
102030-257 = "你就是傳聞中的天童愛麗絲……"
102030-258 = "（千年發生的那個事件的……）"
102030-263 = "乓啪喀乓！滿級的重度玩家成為了夥伴！！"
102030-264 = "……"
102030-265 = "哇哇！愛，愛麗絲！？"
102030-266 = "對，對不起！#n愛麗絲醬，偶爾會說些奇怪的話……"
102030-267 = "愛麗絲，有聽老師說過格黑娜風紀委員長的事！"
102030-269 = "……老師說過我的事？"
102030-270 = "（竊竊私語）格黑娜的風紀委員長是個非常可怕的人……聽說會毫不留情地消滅看不順眼的人……"
102030-271 = "（竊竊私語）好，好可怕……我，我們會不會被罵啊……"
102030-272 = "老師說過風紀委員長是個非常好的人！#n還有──"
102030-273 = "是，是嗎……？"
102030-274 = "老師嗎？"
102030-278 = "……還有？"
102030-279 = "還有……是老師信賴著的其中一人！#n非常值得信賴！"
102030-280 = "所以，愛麗絲可以和風紀委員長一起組隊，感到非常榮幸！非常開心！"
102030-281 = "……那個。"
102030-285 = "……不，沒什麼。"
102030-286 = "第3聖所準備完畢。RABBIT小隊及遊戲開發部待機中。#n作戰負責人，請確認。"
102030-287 = "這麼說來，這次作戰的負責人是──"
102030-292 = "我，我是第3聖所的，作戰負責人……花，花岡柚子……"
102030-293 = "為，為什麼會是我……嗚嗚。"
102030-294 = "柚子醬，加油！"
102030-295 = "沒錯！這是只有柚子才能辦到的作戰唷！"
102030-297 = "已確認完畢。#n柚子同學，請多指教。"
102030-299 = "是，是……嗚嗚……"
102030-301 = "下一話;作戰準備（２）"
