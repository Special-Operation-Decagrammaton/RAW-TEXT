[translation]
1013402-1 = "การฝึกฝนของผู้กล้า"
1013402-2 = "ปาปัม ปาปัม ป๊าม~!"
1013402-3 = "อาริสึได้อุปกรณ์ใหม่มาไว้ในมือแล้วค่ะ!"
1013402-7 = "ดาบแห่งแสง: ซูเปอร์โนวากับอาบี เอชูห์ได้มาเจอกัน ก็เหมือนอาวุธและชุดเกราะของผู้กล้าที่รวมกัน#nเป็นหนึ่งเดียวเลยค่ะ!"
1013402-8 = "ถ้ารวบรวมอุปกรณ์ในตำนานได้ทั้งหมดละก็ อาริสึจะได้เป็นผู้กล้าที่แท้จริงค่ะ!"
1013402-9 = "[s1] \"ดีใจด้วยนะ ทีนี้ก็เก่งเกินใครแล้วละ!\"\n[s2] \"ตอนนี้ไร้เทียมทานแล้วสินะ!\""
1013402-13 = "ไม่หรอกค่ะ... อาริสึลืมไปเลยค่ะ"
1013402-14 = "ต่อให้เป็นอุปกรณ์ดีๆ แต่ถ้าแค่มีไว้เฉยๆ ก็เท่านั้นละค่ะ!"
1013402-15 = "เราต้องเพิ่มความเชี่ยวชาญในการใช้อุปกรณ์ จะได้ใช้งานอุปกรณ์ได้อย่างเต็มประสิทธิภาพยังไงล่ะคะ!"
1013402-16 = "[s3] \"อาบี เอชูห์เป็นอาวุธที่คล่องตัวสูงเลยละนะ\"\n[s4] \"อาบี เอชูห์นี้มีฟังก์ชันการบินเพื่ออาริสึด้วยสิเนอะ\""
1013402-19 = "ใช่ค่ะ! ตอนนี้โลกของอาริสึเปลี่ยนจาก 2 มิติเป็น 3 มิติแล้วค่ะ..."
1013402-20 = "ตอนนี้อาริสึอยู่ในเวอร์ชัน 'อาริสึ 64' ค่ะ!"
1013402-21 = "ถ้าไม่รู้ว่าจะมีอะไรเข้ามาจากทิศทางไหนบ้าง ก็ต่อสู้อย่างมีประสิทธิภาพไม่ได้ค่ะ!"
1013402-22 = "เพราะงั้นก็เลยต้องมีการฝึกฝนของผู้กล้า เพื่อเอาชนะความยากลำบากนี้ค่ะ!"
1013402-23 = "เรื่องวิธีการทำงานของชุดเกราะ อาริสึได้รับการถ่ายทอดวิชามาแล้วค่ะ"
1013402-24 = "ที่เหลือก็คือการฝึกบ่อยๆ จนกว่าจะเชี่ยวชาญค่ะ!"
1013402-25 = "แต่การฝึกนี้มันก็ยากมากๆ เลยค่ะ... รู้สึกเหมือนกำลังเล่นเกมแอ็กชันด้วยจอยบังคับพังๆ ยังไงยังงั้นเลยละค่ะ!"
1013402-26 = "เพราะงั้น จากนี้คือตาของคุณครูแล้วค่ะ!"
1013402-27 = "[s5] \"ได้เลย! ให้ครูซัพพอร์ตยังไงดี?\"\n[s6] \"ได้อยู่แล้ว! ให้ครูช่วยทำอะไรดีล่ะ?\""
1013402-30 = "คุณครูช่วยให้กำลังใจอยู่ข้างๆ ก็พอค่ะ!"
1013402-34 = "[ns7] \"แค่นี้เหรอ...?\"\n[ns8] \"แค่นี้เองเหรอ...?\""
1013402-37 = "ค่ะ!"
1013402-38 = "ก็คุณครูคือมาสคอต พอได้อยู่ข้างๆ กันก็มีพลังแล้วค่ะ!"
1013402-39 = "ถ้ามีคุณครูอยู่ในปาร์ตี้ละก็ ไม่ว่าการฝึกฝนจะยากเย็นแค่ไหน กำลังใจก็เต็มหลอดอยู่ดีค่ะ!"
1013402-40 = "ทำไมเหรอคะ คุณครู?"
1013402-41 = "ทำหน้าเหมือนน้องหมาตัวน้อยที่เศร้าสร้อยเลยค่ะ"
1013402-42 = "คะ? ไม่มีอะไรทั้งนั้นงั้นเหรอคะ?"
1013402-43 = "...?"
1013402-44 = "ถ้างั้นก็เริ่มการฝึกฝนผู้กล้ากันค่ะ!"
1013402-46 = "(แล้วการฝึกฝนผู้กล้าของอาริสึก็เริ่มขึ้น...!)"
1013402-49 = "ตรงนี้ถ้าทำแบบนี้ละก็..."
1013402-53 = "อ๊ะ! เป็นทิศตรงข้ามค่ะ! หักล้างด้วยบูสเตอร์ฝั่งตรงข้าม..."
1013402-57 = "อ๊ะ! นี่มันบูสเตอร์ด้านหน้านี่คะ! แง!"
1013402-58 = "ตัวเริ่มหมุนติ้วแล้วค่ะ!"
1013402-60 = "(ถึงจะเกิดเหตุการณ์หลายอย่างระหว่างการฝึกฝน... แต่ก็โชคดีที่ไม่มีอุบัติเหตุร้ายแรงอะไร) "
1013402-63 = "แฮ่ก... แฮ่ก..."
1013402-64 = "ส่วนตรงนี้ก็เลี้ยวไปทางขวาอีกนิด..."
1013402-68 = "(การฝึกฝนผ่านไปนานพอสมควร...)"
1013402-69 = "(แต่ดูเหมือนว่าอาริสึยังไม่คิดที่จะหยุดฝึกแค่นี้)"
1013402-74 = "แง...!"
1013402-79 = "เมื่อกี้ยังทำได้ดีอยู่เลย..."
1013402-80 = "แต่ทำไมถึงทำผิดอยู่เรื่อยเลยล่ะคะ!"
1013402-81 = "[s9] \"หยุดพักสักหน่อยดีกว่านะ\"\n[s10] \"น่าจะเพราะฝึกจนเหนื่อยแล้วน่ะ\""
1013402-84 = "มะ... ไม่ค่ะ! ไม่เป็นไรค่ะ!"
1013402-85 = "อาริสึยังมีแรงอยู่ค่ะ! ตอนเล่นเกม อาริสึเคยเล่นจนถึงฟ้าสางด้วยนะคะ!"
1013402-86 = "อ้อ แล้วก็! อาริสึเคยเล่นเกมคล้ายๆ กันมาเยอะเลยค่ะ!"
1013402-91 = "ดูนะคะ! ทำแบบนี้...!"
1013402-92 = "อ๊ะ!"
1013402-97 = "[ns11] \"เจ็บตรงไหนหรือเปล่า?!\"\n[ns12] วิ่งไปหาอาริสึ"
1013402-101 = "อ๊ะ... คุณครู"
1013402-102 = "ไม่เป็นไรค่ะ แค่หกล้มแล้วขาเคล็ดนิดหน่อยค่ะ"
1013402-103 = "โอ๊ย..."
1013402-107 = "รู้งี้เชื่อที่คุณครูบอกตั้งแต่แรกก็ดีหรอกค่ะ"
1013402-108 = "การจัดการความเหนื่อยล้าคือพื้นฐานสำคัญที่สุดในการพัฒนาตัวละครค่ะ!"
1013402-109 = "ถ้ายังเพิกเฉยและฝืนฝึกต่อไป สเตตัสก็จะต่ำลงได้ค่ะ!"
1013402-110 = "แม้แต่ผู้มากประสบการณ์อย่างอาริสึก็ทำพลาดแบบนี้ได้นะคะ..."
1013402-111 = "........."
1013402-114 = "[ns] \"เอาเป็นว่าวันนี้เรากลับกันก่อนมั้ย...?\""
1013402-117 = "คุณครู...?"
1013402-118 = "ทำไมจู่ๆ ถึงลงไปคุกเข่าล่ะ...?"
1013402-119 = "[s13] \"ครูจะให้ขี่หลังกลับไปน่ะสิ\"\n[s14] \"จะเดินกลับทั้งๆ ที่ขาเคล็ดได้ยังไงล่ะ\""
1013402-122 = "คะ? แต่ใส่ชุดนี้แล้วอาริสึบินได้นะ..."
1013402-123 = "[s15] \"เอาละ! รีบมาขี่หลังเร็วเข้า!\"\n[s16] \"โอกาสแบบนี้ไม่ได้มีบ่อยๆ หรอกนะ?!\""
1013402-126 = "เอ่อ ถ้างั้นก็..."
1013402-130 = "แหะๆๆ"
1013402-131 = "อยากให้คุณครูพาขี่หลังทุกวันเลยค่ะ"
1013402-132 = "(คงเพราะเจอลมหนาวมาระหว่างฝึกฝน คุณครูจึงรู้สึกได้จากแผ่นหลังว่าอุณหภูมิร่างกายของอาริสึ#nลดลง)"
1013402-134 = "(ส่วน 'ชุดเกราะ' ของอาริสึนั้นก็หนักกว่าที่คิดไว้มาก...)"
1013402-141 = "(คุณครูแทบจะเอวเคล็ดระหว่างกลับมา...)"
