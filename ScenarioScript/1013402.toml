[translation]
1013402-1 = "勇者修行"
1013402-2 = "乓啪喀乓～！"
1013402-3 = "愛麗絲獲得了新裝備！"
1013402-7 = "這樣就湊齊[ruby=光之劍：Supernova]勇者的武器[/ruby]和[ruby=Abi-Eshuh]勇者的裝甲[/ruby]了！"
1013402-8 = "成功收集所有傳說武具的愛麗絲，成為了真正的勇者！"
1013402-9 = "[s1] 「哦哦，恭喜！」\n[s2] 「現在無敵了呢！」"
1013402-13 = "不……愛麗絲忘記了。"
1013402-14 = "裝備這種東西，只是穿上是沒有意義的！"
1013402-15 = "想要完整發揮裝備的性能，就必須提高裝備的熟練度！"
1013402-16 = "[s3] 「Abi-Eshuh確實是高機動兵器呢。」\n[s4] 「而且還配合愛麗絲的規格，追加了飛行之類的功能。」"
1013402-19 = "沒錯！現在愛麗絲的世界，可說是從橫向捲軸變成了3D……"
1013402-20 = "也就是愛麗絲64！"
1013402-21 = "在這種連上下都搞不清楚的狀態下是無法戰鬥的！"
1013402-22 = "為了克服這個試煉，必須要進行勇者修行！"
1013402-23 = "裝甲的操作方式，已經從賢者那裡全部學過了。"
1013402-24 = "接下來就是要重複練習到精通為止！"
1013402-25 = "只是這個訓練非常困難……就像在用偏向一邊的搖桿玩平台遊戲一樣！"
1013402-26 = "這時候就需要老師出場了！"
1013402-27 = "[s5] 「知道了！支援就交給我吧！」\n[s6] 「我該做什麼呢？」"
1013402-30 = "請老師在旁邊，為愛麗絲加油吧！"
1013402-34 = "[ns7] 「……？」\n[ns8] 「……只要這樣就行了嗎？」"
1013402-37 = "是的！"
1013402-38 = "因為老師是吉祥物，光是待在身邊就會讓人充滿活力！"
1013402-39 = "只要老師在隊伍裡，無論多麼辛苦的訓練都能保持滿滿的士氣！"
1013402-40 = "……怎麼了嗎，老師？"
1013402-41 = "表情好像變得跟悲傷的小狗一樣……"
1013402-42 = "咦？你說沒什麼？"
1013402-43 = "……？"
1013402-44 = "總之，勇者修行開始！"
1013402-46 = "（於是愛麗絲的勇者修行就此展開……！）"
1013402-49 = "這時這樣做的話……"
1013402-53 = "哎呀！方向弄反了！那麼就用對面的推進器抵消……"
1013402-57 = "啊！這是側面的推進器！"
1013402-58 = "嗚哇！身體開始轉圈圈了！"
1013402-60 = "（……途中雖然有各種小插曲，幸好訓練在沒有重大事故的情況下繼續進行）"
1013402-63 = "……哈啊，哈啊。"
1013402-64 = "在這裡稍微再往右轉……"
1013402-68 = "（……從訓練開始已經過了相當長的時間）"
1013402-69 = "（不過愛麗絲似乎還沒有要停止訓練的打算）"
1013402-74 = "……嗚嗚！"
1013402-79 = "明明剛才還做得很好的說……"
1013402-80 = "不知為何卻一直失敗！"
1013402-81 = "[s9] 「先稍微休息一下吧。」\n[s10] 「一定是因為累了的關係。」"
1013402-84 = "不，不用！沒關係！"
1013402-85 = "愛麗絲還很有活力！玩遊戲的時候也有通宵過的！"
1013402-86 = "而且愛麗絲也玩過很多類似的遊戲！"
1013402-91 = "請看！就像這樣……！"
1013402-92 = "啊！"
1013402-97 = "[ns11] 「沒事吧！？」\n[ns12] 向愛麗絲跑去"
1013402-101 = "……啊，老師。"
1013402-102 = "愛麗絲沒事，只是稍微扭到了而已。"
1013402-103 = "……好痛。"
1013402-107 = "果然應該聽老師的話的。"
1013402-108 = "管理疲勞度，是養成模擬類遊戲的基本！"
1013402-109 = "如果無視它繼續修行的話，就會觸發能力值下降的事件！"
1013402-110 = "連愛麗絲這樣的老手，偶爾也會犯下這種錯誤呢……"
1013402-111 = "………………"
1013402-114 = "[ns] 「……今天就先回去吧。」"
1013402-117 = "老師……？"
1013402-118 = "為什麼突然跪在地上……？"
1013402-119 = "[s13] 「我背你回去。」\n[s14] 「腳扭到沒辦法走路吧。」"
1013402-122 = "咦？可是這身裝備可以用飛的回去……"
1013402-123 = "[s15] 「來吧！沒關係的！」\n[s16] 「這種機會可不常有哦！？」"
1013402-126 = "那，那麼……"
1013402-130 = "耶嘿嘿。"
1013402-131 = "希望老師每天都可以背背愛麗絲。"
1013402-132 = "（可能是因為剛才一直吹著冷風的關係，愛麗絲冰涼的體溫從背部傳了過來）"
1013402-134 = "（愛麗絲的「裝甲」比想像中重多了……）"
1013402-141 = "（腰差點沒在回去的途中斷掉）"
