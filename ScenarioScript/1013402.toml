[translation]
1013402-1 = "Hero Training"
1013402-2 = "Bum bum bum!"
1013402-3 = "I have gotten new equipment!"
1013402-7 = "With this, the hero's weapon and armor are reunited!"
1013402-8 = "By gathering all the legendary equipment, I have been reborn as a true hero!"
1013402-9 = "[s1] \"Wow, congratulations!\"\n[s2] \"Now you're invincible!\""
1013402-13 = "No... I forgot something very important."
1013402-14 = "Just having the equipment is meaningless."
1013402-15 = "In order to bring out its true potential, I must increase my equipment proficiency!"
1013402-16 = "[s3] \"Abi-Eshuh is already a high-mobility weapon.\"\n[s4] \"And now the Aris edition has flight capabilities.\""
1013402-19 = "Yes, exactly! It's as if my world has changed from a side-scroller to a 3D one..."
1013402-20 = "You may consider me Aris 64!"
1013402-21 = "To fight effectively, I must be able to orient my position and direction in the air effortlessly!"
1013402-22 = "This trial calls for Hero Training!"
1013402-23 = "The wise sage has taught me how to control the armor..."
1013402-24 = "Now, I must master it through endless repetition!"
1013402-25 = "But a hero's training is not easy... It feels like I am playing a platformer with a broken joystick!"
1013402-26 = "Therefore, Sensei, I need your help!"
1013402-27 = "[s5] \"All right! Leave the support to me!\"\n[s6] \"Just tell me what you need!\""
1013402-30 = "Please cheer me on from the sides!"
1013402-34 = "[ns7] \"...?\"\n[ns8] \"...That's it?\""
1013402-37 = "Yes!"
1013402-38 = "You are a mascot, after all! Just your presence gives me strength!"
1013402-39 = "As long as you are one of my party members, I can overcome any training, no matter how difficult!"
1013402-40 = "...Is something wrong, Sensei?"
1013402-41 = "You look like an abandoned puppy."
1013402-42 = "Huh? It is nothing?"
1013402-43 = "...?"
1013402-44 = "Okay! If you say so! Now, it is time to begin Hero Training!"
1013402-46 = "And so, Aris began her intensive Hero Training...!"
1013402-49 = "Maybe if I do this..."
1013402-53 = "Ack! Wrong way! I just need to use my reverse thrusters..."
1013402-57 = "Wrong boosters! Eek!"
1013402-58 = "I'm spiiinnniiinnnggg!!"
1013402-60 = "...While it was an eventful training session, thankfully things proceeded without too many accidents."
1013402-63 = "*pant* *pant*"
1013402-64 = "Maybe if I make a sharper turn towards the right..."
1013402-68 = "...Aris' training went on for quite a long time."
1013402-69 = "As time ticked on, it became clear that she had no intention of letting up."
1013402-74 = "...Kyaaah!"
1013402-79 = "I was able to do it last time..."
1013402-80 = "But now I just cannot get it! I do not understand!"
1013402-81 = "[s9] \"Why don't you take a break?\"\n[s10] \"I'm sure it's because you're exhausted.\""
1013402-84 = "N-No! I am fine!"
1013402-85 = "I am still operating at 100%! I have endured countless sleepless nights playing video games!"
1013402-86 = "Ah, speaking of! I have also played many games with similar controls!"
1013402-91 = "Therefore! Just observe as I—!"
1013402-92 = "AAAH!!"
1013402-97 = "[ns11] \"Are you all right?!\"\n[ns12] Run toward Aris."
1013402-101 = "Sensei..."
1013402-102 = "I am okay. I may have injured my leg slightly when I tripped."
1013402-103 = "...Ow."
1013402-107 = "I should have listened to you, Sensei."
1013402-108 = "Managing fatigue is a basic mechanic in any training sim!"
1013402-109 = "You can even suffer status drops if you push your character too hard!"
1013402-110 = "Even a veteran like me can make mistakes at times..."
1013402-111 = "..."
1013402-114 = "[ns] \"...Shall we head back, Aris?\""
1013402-117 = "Sensei...?"
1013402-118 = "Why are you kneeling...?"
1013402-119 = "[s13] \"I'll give you a piggyback ride\"\n[s14] \"You can't walk on that leg!\""
1013402-122 = "Huh? B-But I can fly back with my armor..."
1013402-123 = "[s15] \"Come on! It's fine!\"\n[s16] \"It's a once-in-a-lifetime opportunity!\""
1013402-126 = "Then..."
1013402-130 = "Heeheehee."
1013402-131 = "I wish Sensei could carry me around every day."
1013402-132 = "As she leaned on my back, I could feel how cold Aris' body was from the hours of training in the cold wind."
1013402-134 = "The \"armor\" Aris carried was heavier than I'd realized."
1013402-141 = "...It was heavier than my back had realized too."
