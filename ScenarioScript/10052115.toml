[translation]
10052115-3 = "ฮู่ว ทำสำเร็จจนได้สินะคะ แล้วก็ยึดพื้นที่และได้ข้อมูลคอร์มาด้วยค่ะ"
10052115-9 = "ทำไมซอฟถึงติดต่อเข้ามานะคะ...?"
10052115-10 = "นี่เป็นแค่การคาดเดาของฉันนะคะ... แต่ฉันว่าผู้เลื่อมใสที่ชื่อทิฟาเร็ธน่าจะมีความสำคัญกับซอฟ#nมากกว่าที่คิดค่ะ"
10052115-11 = "และตามที่ซอฟพูด ทิฟาเร็ธก็ถึงกับเสียสละตัวเองเพื่อเมล็ดพันธุ์ที่ตัวเองปกป้อง..."
10052115-12 = "ถือว่าทิฟาเร็ธมีพฤติกรรมที่แตกต่างจากผู้เลื่อมใสตนอื่นด้วยค่ะ"
10052115-13 = "..."
10052115-14 = "[s] \"เป็นอะไรไปเหรอ อาริสึ? สีหน้าไม่ดีเลยนะ?\""
10052115-15 = "คุณครู พอจะ... จำได้หรือเปล่าคะ?"
10052115-16 = "ตอนที่เราฝ่าแนวป้องกันที่ 1 มาได้... แล้วอาริสึมีสิ่งที่อยากพูด แต่พูดออกมาไม่ได้น่ะค่ะ"
10052115-17 = "[s] \"อื้อ ตอนนั้นครูบอกไว้ว่าให้พูดตอนที่อยากพูดได้เลย\""
10052115-18 = "ใช่ค่ะ... ด้วยเหตุผลบางอย่าง ตอนนี้อาริสึรู้สึกเหมือนกับตอนนั้นเลยค่ะ..."
10052115-19 = "..."
10052115-20 = "คุณครู ที่ซอฟบอกว่าชีวิตมีแต่ความเจ็บปวด อาริสึควรตอบไปยังไงดีเหรอคะ?"
10052115-21 = "ถ้ามีใครบางคนพยายามระบายออกมาอย่างน่าเศร้าว่าโลกนี้เป็นเพียงโศกนาฏกรรม และการถือกำเนิดขึ้นมาก็เป็นแค่คำสาป"
10052115-22 = "และบอกว่าถ้าไม่ได้เกิดมาเลยน่าจะดีเสียกว่า..."
10052115-23 = "อาริสึจะพูดอะไรกับคนคนนั้นได้บ้างคะ...?"
10052115-24 = "อาริสึ... ไม่รู้เลยค่ะ รู้สึกเหมือนมันจุกอยู่ในอกไปหมด จนหายใจไม่ออกเลย..."
10052115-25 = "[s] \"อันที่จริง ที่ซอฟพูดมามันก็ไม่ได้ผิดไปเสียทีเดียวหรอก\""
10052115-26 = "คะ?!?!"
10052115-27 = "[s1] \"พรุ่งนี้คือวันที่เราจะสูญเสียบางอย่างไป...\"\n[s2] \"พรุ่งนี้จะมีเรื่องร้ายเกิดขึ้นมากกว่าเรื่องดี...\""
10052115-30 = "[ns] \"มันเป็นอย่างที่ซอฟว่าไว้เลยละ\""
10052115-31 = "ให้ยอมรับเรื่องแบบนั้นมันจะโอเคจริงเหรอคะ..."
10052115-32 = "ถ้าไม่ยอมรับมัน ก็คงไม่อาจก้าวต่อไปได้งั้นเหรอคะ?"
10052115-33 = "คุณครูเก่งเรื่องการใช้คำพูดตลอดเลยนะคะ..."
10052115-38 = "ถะ... ถ้าอย่างนั้น... อาริสึจะหาเหตุผลในการมีชีวิตต่อไปได้จากไหนล่ะคะ...?"
10052115-39 = "อาริสึไม่เคยคิดแบบนี้มาก่อน เพราะงั้น... อาริสึก็เลยกลัวค่ะ ถึงจะไม่แน่ใจนัก... แต่ก็กลัวค่ะ"
10052115-40 = "[s] \"บางทีอาริสึอาจจะตอบคำถามนั้นด้วยตัวเองไปแล้วนะ?\""
10052115-41 = "คะ? อาริสึน่ะเหรอ..."
10052115-42 = "อาริสึเคยพูดไว้ว่าอย่างนี้ค่ะ..."
10052115-43 = "อาริสึไม่คิดว่าทุกช่วงเวลาที่ประสบมาคือสิ่งที่ไร้ความหมาย"
10052115-44 = "และก็แค่... อยากอยู่กับทุกคนก็เท่านั้น"
10052115-45 = "แต่แค่นั้นมัน... เพียงพอแล้วเหรอคะ? เหตุผลแค่นั้นน่ะ..."
10052115-46 = "[s3] \"ครูว่าเท่านั้นก็เพียงพอแล้วละ\"\n[s4] \"ชีวิตคนเรามันไม่ได้มีความหมายหรือจุดหมายอะไรมากมายหรอก\""
10052115-49 = "คะ?!"
10052115-50 = "ว่าไงนะคะ!?"
10052115-51 = "อาริสึไม่เข้าใจเลยค่ะ ทำไมล่ะคะ...?"
10052115-52 = "อ่า... นั่นก็เพราะถ้าอะไรแบบนั้นมีอยู่จริง..."
10052115-53 = "ชีวิตที่ตามหาสิ่งนั้นไม่เจอ ก็อาจจะกลายเป็นชีวิตที่ไร้ค่าไปเลยทั้งชีวิตก็ได้... เหรอคะ?"
10052115-54 = "...!"
10052115-55 = "[s5] \"อื้อ เพราะงั้น... บางทีแค่พวกเราในตอนนี้ก็อาจจะเพียงพอแล้วก็ได้\"\n[s6] \"การที่ครูได้เจอทุกคนก็เป็นเรื่องน่ายินดีกว่าอะไรทั้งหมดแล้ว\""
10052115-58 = "อะ... อาริสึก็คิดอย่างนั้นค่ะ! ถ้าไม่มีคุณครูละก็ อาริสึคง...!"
10052115-59 = "..."
10052115-60 = "ฉันก็ด้วยหรือเปล่าคะ?"
10052115-61 = "[s] \"แน่นอนอยู่แล้ว\""
10052115-62 = "ค่ะ แค่นั้นก็... พอแล้วค่ะ"
10052115-63 = "[s7] \"อื้อ แค่นั้นก็พอแล้วละ\"\n[s8] \"พอลองมาคิดดูดีๆ ชีวิตมันก็เต็มไปด้วยความไม่สมเหตุสมผลอยู่แล้วละนะ\""
10052115-68 = "[ns] \"และปกติแล้ว ทางเลือกมันก็มีแค่หนึ่งในสองทาง\""
10052115-69 = "ระหว่างการยอมจำนนต่อสิ่งนั้น..."
10052115-70 = "หรือไม่ก็ต่อสู้กับมันไปเรื่อยๆ อย่างไม่มีที่สิ้นสุดสินะคะ..."
10052115-71 = "แต่ถ้าเรายอมจำนนละก็ โดยปกติแล้วเรื่องจะจบลงตรงนั้นเลยงั้นเหรอคะ...?"
10052115-72 = "..."
10052115-73 = "อย่างนั้นสินะคะ ถ้างั้นท้ายที่สุดแล้ว... ตัวเลือกก็เหลือเพียงตัวเลือกเดียวสิคะ"
10052115-74 = "[s9] \"และตอนจบของการต่อสู้อันยาวนานนั้น เราต้องมีความสุขให้ได้\" \n[s10] \"และปลายทางของการต่อสู้อันยาวนานนั้น เราจะมีความสุขในที่สุด\""
10052115-77 = "แท้จริงแล้ว... ความสุขก็คือการต่อสู้เหรอคะ?"
10052115-78 = "[s11] \"ใช่แล้วละ ถึงจะเพราะความโกรธก็เถอะนะ\"\n[s12] \"ใช่แล้วละ ถึงจะเพราะไม่ยอมทนกับอะไรที่ไร้เหตุผลก็ตาม\""
10052115-81 = "[ns] \"แต่มันก็เหมือนกับที่เคย์เคยพูดไว้นั่นละ\""
10052115-82 = "ทำไมจู่ๆ ถึงเอาฉันไปเกี่ยวล่ะคะ!?!?!?"
10052115-89 = "ยะ... อย่ามาลูบหัวฉันอย่างสบายใจแบบนั้นสิคะ! ต่อให้จะทำอะไรแบบนี้น่ะ...!"
10052115-90 = "ฉะ... ฉันจะอนุญาตให้แค่ครั้งนี้ครั้งเดียวนะคะ..."
10052115-91 = "..."
10052115-92 = "คุณครูอยากบอกพวกเราว่า เหตุผลที่เราต้องมีความสุข ก็เพราะความสุขเป็นการต่อสู้ที่ยิ่งใหญ่ที่สุด#nในชีวิตของเราสินะคะ"
10052115-93 = "[s13] \"ใช่แล้วละ นอกจากทุกคนแล้ว ครูก็อยากสุขตามไปด้วย\"\n[s14] \"ในเมื่อทุกคนมีความสุข ครูก็อยากสุขตามไปด้วย\""
10052115-98 = "สุขตามไปด้วย... งั้นเหรอคะ? "
10052115-99 = "อาริสึก็อยากให้คุณครูมีความสุขค่ะ! แต่พอพูดแบบนั้น ก็รู้สึกเศร้าขึ้นมาเลยนะคะ..."
10052115-100 = "คะ? ไม่ใช่อย่างนั้นงั้นเหรอคะ? "
10052115-101 = "คนเราอาจรู้สึกมีความสุขขึ้นได้ เมื่อได้เห็นใครบางคนมีความสุข"
10052115-102 = "และถ้าเห็นใครบางคนกำลังเจ็บปวด ตัวเองก็อาจเห็นอกเห็นใจคนคนนั้นขึ้นมาได้ด้วย... งั้นเหรอคะ?"
10052115-103 = "เวลาที่ใครกำลังร้องไห้อยู่ แค่การที่เราเข้าไปร้องไห้เงียบๆ อยู่ข้างๆ"
10052115-104 = "มันก็ช่วยให้คนคนนั้นมีความเข้มแข็งพอที่จะเอาชนะความเศร้านั้นได้แล้ว...?"
10052115-105 = "แต่สุดท้ายมันก็ไม่ใช่อย่างนั้น 100% นี่คะ? มันเป็นแค่ความเข้าใจผิดหรือคิดไปเองหรือเปล่าคะ?"
10052115-106 = "ถ้าบอกว่าเป็นการเข้าใจผิดหรือคิดไปเอง ดูจะเป็นการใช้คำที่ถนอมน้ำใจเลยนะคะ ก็ในบางแง่... มันเป็นแค่การเสแสร้งนี่คะ อึก... จู่ๆ ก็นึกถึงคำที่เด็กพวกนั้นพูดไว้ขึ้นมาเลยค่ะ"
10052115-107 = "ที่บอกว่าชีวิต ความสัมพันธ์ และสังคมก็ไม่ต่างกับสิ่งปลูกสร้างผิดกฎหมายที่ยึดกันไว้อย่างง่อนแง่น#nด้วยกาวห่วยๆ ที่ชื่อว่าการคิดไปเองยังไงล่ะคะ"
10052115-108 = "[s15] \"ก็ไม่เห็นจะเป็นไรเลยนี่\"\n[s16] \"จะเสแสร้งบ้างก็ไม่เป็นไรหรอก\""
10052115-111 = "คะ?!?!"
10052115-112 = "...!"
10052115-113 = "[s17] \"แบบไหนมันเท่กว่ากันล่ะ ระหว่างเกิดมาเป็นคนดีตั้งแต่แรก\"\n[s18] \"กับการเอาชนะธรรมชาติที่แท้จริงด้วยความพยายามน่ะ?\""
10052115-116 = "ทำไมจู่ๆ ถึงเป็นปัญหาเรื่องความเท่อะไรนี่ขึ้นมาได้ล่ะคะ...?"
10052115-117 = "คะ? ก็เพราะแบบนี้ นี่เลยยิ่งเป็นปัญหาสำคัญงั้นเหรอคะ?"
10052115-118 = "ชีวิตเราเกิดมาแค่ครั้งเดียว งั้นก็ต้องใช้ชีวิตให้เท่และคุ้มค่างั้นเหรอคะ?"
10052115-119 = "ว้าว สมกับที่เป็นคำพูดของคุณครูเลยนะคะ..."
10052115-120 = "ถึงจะยังไม่เข้าใจอยู่ดีก็เถอะ..."
10052115-121 = "แต่อาริสึก็เหมือนจะได้เรียนรู้สิ่งใหม่เลยละค่ะ! อาริสึ... ดีพออยู่แล้วในแบบที่เป็นค่ะ!"
10052115-122 = "[s] \"ถูกต้องที่สุดเลยละ!\""
10052115-123 = "ขอบคุณค่ะ คุณครู! อาริสึค้นพบสิ่งที่ตัวเองอยากทำในตอนนี้แล้วค่ะ!"
10052115-124 = "คืออะไรเหรอคะ อาริสึ?"
10052115-128 = "ค่ะ! อาริสึก็อยากเป็นเพื่อนกับทุกคนค่ะ!"
10052115-132 = "ทั้งไอน์ ซอฟ ออร์ ผู้เลื่อมใสที่ชื่อมัลคูธ แล้วก็ผู้เลื่อมใสตนอื่นด้วยค่ะ!"
10052115-133 = "ถึงเราจะแก้ปัญหาทุกอย่างด้วยการพูดคุยไม่ได้..."
10052115-134 = "แต่อย่างน้อยมันก็คุ้มค่าที่จะลองดูค่ะ"
10052115-135 = "เพราะต่อให้มันจะเป็นการเสแสร้ง แต่ก็ยังดีกว่าไม่ทำอะไรเลยนี่คะ!"
10052115-136 = "[s] \"อื้อ หวังว่าทุกอย่างจะออกมาดีนะ\""
10052115-137 = "ค่ะ!"
