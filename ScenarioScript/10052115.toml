[translation]
10052115-3 = "呼，總算搞定了。#n區域的掌控和核心數據的回收都完成了。"
10052115-9 = "……為什麼Soph會連絡我們呢？"
10052115-10 = "這只是我的推測……或許提法瑞特這個預言者，是對Soph來說特別重要的存在吧。"
10052115-11 = "按照Soph的說法，提法瑞特為了守護種子，甚至不惜犧牲自己……"
10052115-12 = "感覺它的行動模式，似乎跟其他預言者不太一樣。"
10052115-13 = "……"
10052115-14 = "[s] 「怎麼了，愛麗絲？你的臉色不太好哦？」"
10052115-15 = "老師……你還記得嗎？"
10052115-16 = "突破第一防線的時候，愛麗絲……說不出話的事。"
10052115-17 = "[s] 「嗯。我說過真的想說的時候再說就好。」"
10052115-18 = "是的……愛麗絲現在不知為何，產生了跟那時候一樣的感覺……"
10052115-19 = "……"
10052115-20 = "老師。對於Soph說生命只是痛苦的那段話，愛麗絲該怎麼回答才好呢？"
10052115-21 = "如果有人說世界只是場悲劇，誕生不過是個詛咒……"
10052115-22 = "還不如不要出生比較好的話……"
10052115-23 = "愛麗絲能對那個人說什麼呢……？"
10052115-24 = "愛麗絲……不太清楚。#n只覺得胸口悶得喘不過氣來……"
10052115-25 = "[s] 「其實Soph說的，也不是完全錯的。」"
10052115-26 = "什麼！？！？"
10052115-27 = "[s1] 「明天有可能是會失去什麼的日子。」\n[s2] 「不好的事情……往往比好事要來得多。」"
10052115-30 = "[ns] 「就像Soph說的一樣。」"
10052115-31 = "承認那種事真的可以嗎……"
10052115-32 = "嗯？不承認的話就無法前進了……？"
10052115-33 = "……你總是很會說話呢。"
10052115-38 = "那，那麼愛麗絲……該從哪裡找到活下去的理由呢……？"
10052115-39 = "愛麗絲，從來沒有想過這種事情。#n所以……很害怕。不太理解……只是覺得很害怕。"
10052115-40 = "[s] 「那個答案，愛麗絲不是已經回答過了嗎？」"
10052115-41 = "咦？愛麗絲明明……"
10052115-42 = "……愛麗絲剛才這麼說過吧。"
10052115-43 = "覺得經歷過的時間並不是沒有意義的。"
10052115-44 = "只是……想和大家在一起而已。"
10052115-45 = "可是……那樣就夠了嗎？#n只有那樣的話……"
10052115-46 = "[s3] 「我反而覺得那樣就足夠了。」\n[s4] 「畢竟所謂的人生，本來就沒有多麼龐大的意義或目的。」"
10052115-49 = "咦！？"
10052115-50 = "什麼！？"
10052115-51 = "愛麗絲不太懂。那又是為什麼呢……？"
10052115-52 = "啊……因為，如果那種東西真的存在的話……"
10052115-53 = "找不到它的人生，可能會變得毫無價值……是這樣嗎？"
10052115-54 = "……！"
10052115-55 = "[s5] 「嗯，所以……我們大家，只要維持現狀就好。」\n[s6] 「對老師我來說，能遇見你們就是最開心的事。」"
10052115-58 = "愛，愛麗絲也是！如果沒有老師的話，愛麗絲就……！"
10052115-59 = "……"
10052115-60 = "我，也是嗎？"
10052115-61 = "[s] 「當然。」"
10052115-62 = "好，好吧。那就好。"
10052115-63 = "[s7] 「沒錯，只要那樣就可以了。」\n[s8] 「人生本來就充滿了不合理。」"
10052115-68 = "[ns] 「而在那之中，通常只有兩個選項能選。」"
10052115-69 = "就看是要選擇屈服……"
10052115-70 = "……還是無止盡地戰鬥下去。"
10052115-71 = "可是如果選擇屈服的話，一般不就到此結束了嗎……？"
10052115-72 = "……"
10052115-73 = "原來如此。#n所以留給我們的選項……終究只有一個呢。"
10052115-74 = "[s9] 「嗯。然後在戰鬥的最後……」\n[s10] 「我們所有人，都要變得幸福才行。」"
10052115-77 = "……意思是幸福本身，就是一種戰鬥嗎。"
10052115-78 = "[s11] 「沒錯。」\n[s12] 「即使感到憤怒，也不能向不合理的事情妥協。」"
10052115-81 = "[ns] 「就像Kei說過的那樣。」"
10052115-82 = "為什麼要突然扯到我啊！？！？！？"
10052115-89 = "不，不要那樣欣慰地摸我的頭！#n就算那樣做也……！"
10052115-90 = "只，只有這一次哦……"
10052115-91 = "……"
10052115-92 = "總之你想說的是，我們必須幸福的理由，是因為那是對生命最大的抗爭對吧。"
10052115-93 = "[s13] 「嗯。所以我希望你們能夠幸福。」\n[s14] 「順帶一提，我也希望能順便變得幸福。」"
10052115-98 = "順便，是嗎……？"
10052115-99 = "愛麗絲也希望老師能幸福！#n可是那種說法……感覺有點悲傷……"
10052115-100 = "咦？不是那樣的？"
10052115-101 = "人看到別人幸福的樣子，自己也會感到幸福。"
10052115-102 = "看到別人痛苦的樣子，自己也會對痛苦產生共鳴……？"
10052115-103 = "有人在哭泣的時候，只要在旁邊靜靜地陪他一起哭……"
10052115-104 = "那個人，就能獲得克服悲傷的力量……是嗎？"
10052115-105 = "可是終究無法100%達成一致吧。#n那不就只是誤解或錯覺嗎？"
10052115-106 = "甚至這種說法已經算是比較好聽的了。#n某種意義上……那其實只是偽善吧。#n唔，突然想起那些孩子說過的話了。"
10052115-107 = "無論生命、羈絆，還是社會……#n只不過是藉著名為「錯覺」的劣質黏著劑，勉強支撐的違章建築而已。"
10052115-108 = "[s15] 「是又怎樣。」\n[s16] 「就算是偽善也比沒有好。」"
10052115-111 = "啊！？！？"
10052115-112 = "……！"
10052115-113 = "[s17] 「天生就善良，和憑藉偉大的努力克服本性。」\n[s18] 「哪個比較帥呢？」"
10052115-116 = "怎麼突然又變成帥不帥的問題了……"
10052115-117 = "咦？你說就是因為這樣才重要？"
10052115-118 = "人生只有一次，不活得帥一點怎麼行？"
10052115-119 = "哇，真像老師會說的話呢……"
10052115-120 = "雖然還是不太懂……"
10052115-121 = "不過愛麗絲好像又有了新的領悟！#n愛麗絲……只要維持現狀就行了呢！"
10052115-122 = "[s] 「沒錯！」"
10052115-123 = "謝謝你，老師！#n託老師的福，愛麗絲好像找到了現在想做的事！"
10052115-124 = "那是什麼呢，愛麗絲？"
10052115-128 = "是！愛麗絲也想和那些人成為朋友！"
10052115-132 = "和Ain、Soph、Aur、叫做馬爾庫特的預言者，還有其他所有預言者！"
10052115-133 = "雖然溝通不一定能解決所有問題……"
10052115-134 = "但是我覺得，至少可以試試看。"
10052115-135 = "因為就算那是偽善，也肯定比什麼都沒有來得好！"
10052115-136 = "[s] 「嗯。要是能那樣就好了呢。」"
10052115-137 = "是！"
