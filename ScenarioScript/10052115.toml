[translation]
10052115-3 = "*sigh* And that's that. We've retrieved the core data and this territory."
10052115-9 = "...Why did Sof decide to talk to us?"
10052115-10 = "This is just my speculation...but perhaps the prophet called Tiphareth was that important to Sof."
10052115-11 = "And, if I understand Sof's words correctly, Tiphareth's activity patterns were different from other prophets..."
10052115-12 = "...to the point that it would even sacrifice itself for the sake of the seeds..."
10052115-13 = "..."
10052115-14 = "[s] \"Is something wrong, Aris?\""
10052115-15 = "Sensei. Do you...remember?"
10052115-16 = "When we broke through the first line of defense... I could not explain exactly how I was feeling."
10052115-17 = "[s] \"Of course. I told you to talk to me about it when you felt able.\""
10052115-18 = "I do not know why, but I am experiencing a similar feeling at the moment."
10052115-19 = "..."
10052115-20 = "Sensei... Sof's story...about life being an endless cycle of suffering... How does one respond to such a thing?"
10052115-21 = "To someone who believes that existence is a curse and life is a sad tragedy..."
10052115-22 = "To someone who wishes they had never been created to begin with..."
10052115-23 = "What can I say to someone like that...?"
10052115-24 = "I... I cannot find an answer. And it makes my chest tighten, as if I am unable to properly breathe."
10052115-25 = "[s] \"Honestly speaking, Sof isn't completely wrong.\""
10052115-26 = "What?!"
10052115-27 = "[s1] \"With the promise of tomorrow comes the guarantee of loss.\"\n[s2] \"And every next day, it's possible that more bad will happen than good.\""
10052115-30 = "[ns] \"Just like what Sof said.\""
10052115-31 = "And we're just meant to accept that?"
10052115-32 = "...The only way to move forward IS to accept it?"
10052115-33 = "You sure are a smooth talker, Sensei."
10052115-38 = "B-But if that is the case, then what is the reason to continue living?"
10052115-39 = "I have never considered such things until now. And to consider it... I find this very scary. I cannot tell you why, only that it is."
10052115-40 = "[s] \"In a way, you've already answered that yourself.\""
10052115-41 = "What? I really—"
10052115-42 = "...Did answer it already."
10052115-43 = "That all this time we've spent wasn't meaningless."
10052115-44 = "That you wanted to stay with the friends you've made."
10052115-45 = "But...how can that be enough?"
10052115-46 = "[s3] \"It's exactly enough, actually.\"\n[s4] \"Life was never meant to be some grand pursuit of purpose.\""
10052115-49 = "What?!"
10052115-50 = "WHAAAT?!"
10052115-51 = "I do not understand... No purpose?"
10052115-52 = "...If such a thing existed..."
10052115-53 = "...then life without purpose or meaning would be considered useless."
10052115-54 = "...!"
10052115-55 = "[s5] \"So... Maybe we're all enough, just as we are.\"\n[s6] \"Above all, meeting you all has been my life's greatest happiness.\""
10052115-58 = "M-Me too! Without Sensei, I...!"
10052115-59 = "..."
10052115-60 = "Am I included in that?"
10052115-61 = "[s] \"That's not even a question.\""
10052115-62 = "Well. In that case, fine."
10052115-63 = "[s7] \"Yup. That's it. That's all that matters.\" \n[s8] \"The more you look, the more you'll realize how unreasonable life is.\""
10052115-68 = "[ns] \"And we can make one of two choices.\""
10052115-69 = "\"Give in\"..."
10052115-70 = "...\"or fight until the last\"?"
10052115-71 = "...But giving in is the end of the line?"
10052115-72 = "..."
10052115-73 = "Then that means... There is only one choice we can make now."
10052115-74 = "[s9] \"To fight and to win.\"\n[s10] \"To write a happy ending for us all.\""
10052115-77 = "So then, is happiness itself a struggle?"
10052115-78 = "[s11] \"Correct. It's refusing to acquiesce to the intolerable.\"\n[s12] \"Even if you have to do it while angry.\""
10052115-81 = "[ns] \"Just like you said, Kei.\""
10052115-82 = "Why me all of a sudden?!"
10052115-89 = "Stop! No head pats! No smiling! Even if you try it—"
10052115-90 = "...F-Fine. Just this once."
10052115-91 = "..."
10052115-92 = "So happiness IS the ultimate struggle of life?"
10052115-93 = "[s13] \"Exactly. And I want all of you to be happy.\"\n[s14] \"And maybe I can be an add-on to that.\""
10052115-98 = "An \"add-on\"? "
10052115-99 = "Of course, I wish for Sensei to be happy as well! But not as an add-on... Is that not sad?"
10052115-100 = "No? Not at all? "
10052115-101 = "...Some people feel happy seeing other people's joy?"
10052115-102 = "...And feel pain when seeing others suffer?"
10052115-103 = "...Being able to cry alongside someone who is suffering..."
10052115-104 = "...can give that person the strength to fight to the end?"
10052115-105 = "You can't guarantee that'll be the case all the time, though. Isn't that just a misunderstanding?"
10052115-106 = "That's a bit of a euphemism. It's hypocrisy. Ugh. I sound like those brats."
10052115-107 = "That life, relationship, and society are all like illegal constructs that hold up precariously in flimsy cement called misunderstanding."
10052115-108 = "[s15] \"So what if it is?\"\n[s16] \"I'd rather be a hypocrite.\""
10052115-111 = "What?!"
10052115-112 = "...!"
10052115-113 = "[s17] \"Being born kind, versus overcoming one's nature through immense effort...\"\n[s18] \"Which of the two seems cooler to you?\""
10052115-116 = "Why are we bringing \"coolness\" into this all of the sudden?"
10052115-117 = "...That's exactly what the crux of the problem is?"
10052115-118 = "...You only live once, so you should live a cool one? Otherwise, what's the point?"
10052115-119 = "That's very on brand for you, Sensei."
10052115-120 = "While I am still confused..."
10052115-121 = "...I do believe I have one takeaway! I am perfectly fine, exactly as I am in this moment!"
10052115-122 = "[s] \"Exactly!!\""
10052115-123 = "Thank you, Sensei! Because now I know what I want to do!"
10052115-124 = "And what is that, Aris?"
10052115-128 = "I want to be friends with them!"
10052115-132 = "With Ein, Sof, Ohr, the prophet called Malkuth, and all the other prophets too!"
10052115-133 = "I think our problems are too big to solve with just talking."
10052115-134 = "But I do not think it would be bad to still try."
10052115-135 = "Even hypocrisy is better than nothing!"
10052115-136 = "[s] \"I like it! I'm rooting for you!\""
10052115-137 = "Yes!"
