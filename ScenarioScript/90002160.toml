90002160-293 = "นั่นคือหนึ่งในเส้นทางนับไม่ถ้วนที่ถูกเตรียมเอาไว้"
90002160-294 = "[s] \"ด้วยการ... ควบคุมทุกคนน่ะเหรอ?\""
90002160-295 = "ใช่"
90002160-296 = "พวกเจ้าอาจพยายามปฏิเสธมันโดยสัญชาตญาณ แต่ในไม่ช้าก็จะตระหนักว่านั่นเป็นทางออกเดียว#nเท่านั้น"
90002160-297 = "ข้าจะเปิดทางด้วยปัญญาของชอกมาห์ จะล้างบาปและพิพากษาด้วยความเมตตาของเชเซ็ด"
90002160-298 = "ผู้เลื่อมใสแต่ละตนมีหน้าที่ให้นำทางพวกเจ้า และจะปฏิบัติหน้าที่ที่ได้รับมอบหมายบนผืนดินใหม่ และภายใต้ท้องฟ้าใหม่"
90002160-306 = "[ns] จะทำแทนทุกสิ่งไม่ได้หรอก"
90002160-309 = "[ns] สิ่งที่เกิดไปแล้วก็ย้อนกลับไม่ได้"
