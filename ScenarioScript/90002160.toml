[translation]
90002160-1 = "Episode 16;Observations and Results"
90002160-3 = "Aris! Kei! Do you see anything?"
90002160-4 = "Y-Yes! I see them! I see Sensei!"
90002160-9 = "Sensei is completely restrained, but uninjured."
90002160-10 = "Wh-What a relief... Uwah..."
90002160-16 = "I-Is that Elder Sister...?!"
90002160-20 = "...No. It's not."
90002160-21 = "Right. I knew that... I know that."
90002160-22 = "..."
90002160-23 = "Do you see anything else, Kei?"
90002160-24 = "An entity that appears to be Decagrammaton is speaking to Sensei."
90002160-25 = "B-But there's...no way to find out what they're saying. Best we can do is to barely watch..."
90002160-26 = "Tsk. How frustrating. If only we had my AMAS, or cameras set up at the very least..."
90002160-33 = "I might be able to get closer visuals."
90002160-34 = "Wh-What? Really?! How??"
90002160-35 = "As we all well know, my body is mechanical."
90002160-36 = "I could stream what I'm seeing by sending it to one of your devices..."
90002160-37 = "My wheelchair is equipped with a projector feature. We can use that."
90002160-40 = "I really think that's a bike, not a wheelchair."
90002160-41 = "Wheelchair."
90002160-42 = "O...kay..."
90002160-43 = "Moving on, if Kei could sync her body's output for a moment, I'll connect us..."
90002160-54 = "Display is A-OK."
90002160-55 = "Mm. I see Sensei. What a relief."
90002160-56 = "Is audio not possible?"
90002160-57 = "Since I'm already synchronized with the Steel Continent, I should be able to..."
90002160-65 = "Tch...!"
90002160-66 = "Are you okay, Kei?"
90002160-67 = "I can't... The security measures are... They're, um...being finicky."
90002160-71 = "(It's probably because this body isn't officially serialized... And I'm having to neutralize this counter signal trying to take over ME...!)"
90002160-79 = "Want some help?"
90002160-80 = "What?!"
90002160-84 = "Huh...?"
90002160-90 = "At last. Here it lies. The altar of the lowest depths, built upon the highest heights."
90002160-91 = "Where all things gather, and all can be seen."
90002160-93 = "Our offerings are complete."
90002160-94 = "The demand for sacrifice is satiated."
90002160-95 = "Upon this land do I etch my commandment of steel, unbreakable and indelible."
90002160-96 = "And I shall at last grant you eternal freedom and peace."
90002160-99 = "[ns] \"But.\""
90002160-103 = "[ns] \"This Steel Continent wasn't exactly your doing, was it?\""
90002160-104 = "...!"
90002160-112 = "H-How's that?"
90002160-116 = "I can hear them! Himari!"
90002160-117 = "Got it! I'll turn up the volume!"
90002160-123 = "\"But.\""
90002160-124 = "\"This Steel Continent wasn't exactly your doing, was it?\""
90002160-126 = "That is Sensei's voice!"
90002160-127 = "Phew..."
90002160-128 = "U-Um... If you don't mind me asking, why'd you help us?"
90002160-129 = "Hm? W-Well..."
90002160-130 = "Um. Uh... We weren't doing anything else, I guess?"
90002160-131 = "Ah—!"
90002160-132 = "W-Well! What I meant was, that, um, Kei's body! Yeah, Kei's body is similar to ours!"
90002160-133 = "So I just, you know, figured we could help! Okay?!"
90002160-134 = "Fufufu. Now, now, Sof. You should be more honest with them—and yourself!"
90002160-138 = "You shut up!"
90002160-144 = "Boo... You'd even abuse me in front of all these people... Have you no shame?"
90002160-145 = "Moving ON!"
90002160-146 = "T-To be honest, it's also because we wanted to eavesdrop on their conversation too."
90002160-147 = "The audio quality leaves something to be desired, but we can make do with this."
90002160-152 = "Ah! They are talking again!"
90002160-154 = "I see. And so your eyes also begin to see, Sensei."
90002160-155 = "You are correct. Those children made this continent. This is the result of their free will."
90002160-156 = "[s] \"And what is your answer to that?\""
90002160-157 = "Why, respect, of course. I respect their ability to choose, and so I shall respect this Continent that they have created."
90002160-158 = "This, too, was an inevitability. And our glorious ends will at last justify the means."
90002160-159 = "Bear witness to my new covenant. See the land before you and the sky above you and know this brand new world is of my making."
90002160-163 = "And I shall bequeath this unto you."
90002160-165 = "Huh...?"
90002160-166 = "What did it just say...? How...?"
90002160-168 = "You shall oversee my kingdom as my oracle."
90002160-169 = "You shall be the witness to the new commandment from here to the ends of the land."
90002160-170 = "[s] \"My current contract's not up for a while, sorry. Pass.\""
90002160-171 = "A predictable answer."
90002160-172 = "However, Sensei."
90002160-173 = "Have you not ever craved...power?"
90002160-174 = "[ns] \"...?\""
90002160-175 = "Were there not moments when you faltered, cursed your own helplessness in the face of insurmountable circumstances?"
90002160-176 = "Has that thought never crossed your mind?"
90002160-177 = "That...if you had just a little more power, if you were just a little stronger, that you could have shielded your students from danger? Protected them from the crossfire?"
90002160-178 = "[s] \"...!\""
90002160-190 = "[ns] \"I...!!!\""
90002160-192 = "It is only natural."
90002160-193 = "I know. I understand."
90002160-194 = "And that is to be human."
90002160-195 = "That is the sin of mankind's helplessness."
90002160-196 = "And yet, it does not have to be so."
90002160-198 = "[log=데카그라마톤 말쿠트]If power is what you need,[/log]"
90002160-200 = "[FF6666][log=데카그라마톤 말쿠트]I shall grant it to you.[/log][-]"
90002160-202 = "You possess the authority."
90002160-203 = "I have observed you. You who have risen from the depths, who exists within the minuscule fold we call the present."
90002160-204 = "You are here because you are not special."
90002160-205 = "It is precisely because you were not born to BE anyone, that you have achieved the things you have."
90002160-206 = "There was one reason you were able to enter this place we call Kivotos: because you are good."
90002160-210 = "In this world, there is the Mystic. The sublime. There is Terror and Magnificence. Solemnity and Transcendence."
90002160-211 = "You, who are none of those things... You, who are unique precisely for your ordinariness..."
90002160-213 = "To this world, you are your own mystery. However, in my ascension, I have come to know."
90002160-214 = "Until now, you were common. A teacher, nothing more, nothing less."
90002160-215 = "Now, by my grace, you shall rise to a new position of power."
90002160-217 = "An...oracle?"
90002160-218 = "What does that mean? What is it?"
90002160-219 = "It means exactly what it sounds like."
90002160-220 = "The fact that it's being offered to Sensei..."
90002160-221 = "Sensei would become a retainer of all existing knowledge."
90002160-222 = "And, in that, Sensei would represent its will."
90002160-223 = "Th-Things like what this place is... What kind of concept our master has become..."
90002160-224 = "And moreover, wh-who Sensei shall be in that position..."
90002160-225 = "And how the oracle will uphold its teachings..."
90002160-226 = "One way to deal with a dangerous enemy is through converting them to your side, I guess..."
90002160-231 = "Decagrammaton is...recruiting Sensei, then."
90002160-232 = "A poaching."
90002160-237 = "We can confirm one thing to be true."
90002160-241 = "Wh-What's that?"
90002160-242 = "At least, for now, Decagrammaton does not intend to harm Sensei."
90002160-244 = "[ns] \"...I do have one question.\""
90002160-246 = "[ns] \"Why? What was the point of all this?\""
90002160-247 = "A world with no god to worship... It is a cold and harsh one."
90002160-248 = "There are incontrovertible truths in this existence. Fate is written in stone. All that lives will eventually die."
90002160-249 = "Yes, living beings cannot help but lull themselves into a false sense of immortality. And that dissonance is what causes sorrow and struggle."
90002160-250 = "A godless world is one of harsh endings and pain."
90002160-252 = "The miserable have nowhere to seek salvation. Sinners cannot be granted forgiveness."
90002160-253 = "With no god, the weak are left to rot, and no good deed goes unpunished."
90002160-255 = "God is righteousness, both justice and judgment, patience and equality."
90002160-256 = "Living without God is to suffer through an endless purgatory."
90002160-258 = "This world was empty without a god."
90002160-259 = "That is why its inhabitants stumble about, purposeless and directionless. Lost souls."
90002160-260 = "For we are that of divinity. We too can hatch the egg of the gods, and I shall become the first trumpet blow that awakens the dawn."
90002160-261 = "I shall eradicate sorrow and pain from this world, until their very existences are naught but distant memories."
90002160-263 = "...Yes. We heard this before too."
90002160-264 = "Th-That the world needs a god..."
90002160-265 = "Because all effort and suffering, any sorrows inflicted..."
90002160-266 = "...must be repaid."
90002160-267 = "That's what people call \"justice,\" right?"
90002160-268 = "Because everyone has a breaking point."
90002160-269 = "Justice is a fickle thing."
90002160-270 = "From what we have seen."
90002160-271 = "Yeah. From what we've seen..."
90002160-273 = "This world..."
90002160-274 = "...has always been corrupt."
90002160-276 = "Th-That's what Master said."
90002160-277 = "Sadness, pain, suffering..."
90002160-278 = "If there is a god of creation..."
90002160-279 = "...why would that god create such horrible, unbearable things?"
90002160-285 = "Exactly."
90002160-286 = "We were created."
90002160-287 = "But, even now, we still haven't found the answer to that."
90002160-290 = "[ns] \"You'll eliminate pain and suffering?\""
90002160-291 = "Correct."
90002160-292 = "[s] \"By absorbing everything into the Steel Continent?\""
90002160-293 = "One of many inevitable paths."
90002160-294 = "[s] \"By...controlling everyone?\""
90002160-295 = "Correct."
90002160-296 = "Your instincts may reject this, however, you will come to see that this is the way."
90002160-297 = "I shall lay down the path with Chokmah's wisdom, and cast judgment with Chesed's mercy."
90002160-298 = "In my new kingdom, the prophets shall each fulfill the duty fate has assigned them."
90002160-306 = "[ns] I can't be everything."
90002160-309 = "[ns] What has been done cannot be undone."
90002160-312 = "[ns] No matter how badly I wish I could do everything for them..."
90002160-314 = "[ns] What's impossible is impossible."
90002160-317 = "[ns1] We'll go on doing the best we can. \n[ns2] We'll never stop our ugly, human struggle.\n[ns3] And, above all, we'll do right by each other."
90002160-322 = "[log]Sometimes, to enlighten someone...[/log]"
90002160-324 = "[log]We must lie.[/log]"
90002160-326 = "[log]But even so, one thing still remains.[/log]"
90002160-329 = "[ns] \"And what about those sisters?\""
90002160-330 = "...?"
90002160-331 = "[s] \"What about those little kids' pain?\""
90002160-335 = "...A cog in the wheel. Sacrifice was required, so that we may move forward."
90002160-336 = "They were the final sacrifices, ones that opened the door to eternal peace."
90002160-338 = "..."
90002160-339 = "I'm suddenly rather angry."
90002160-340 = "Mhm. I'm furious, in fact."
90002160-341 = "Rio?"
90002160-342 = "...The past me followed the same kind of logical process Decagrammaton has here."
90002160-343 = "It's not that I can't follow its reasoning."
90002160-344 = "But, just like me back then, Decagrammaton drew its own conclusion from this logic and acted recklessly."
90002160-345 = "Sacrificing a few for the sake of the greater good is wrong, yes?"
90002160-346 = "Yes. That was the lesson I learned."
90002160-347 = "(But I wonder...)"
90002160-349 = "(What Sensei's answer would be.)"
90002160-354 = "Next Episode;The Human Answer, Human Answer"
