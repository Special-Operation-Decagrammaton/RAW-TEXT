[translation]
90002160-1 = "ตอนที่ 16;การสังเกตและผลลัพธ์"
90002160-3 = "อาริสึ! เคย์! เห็นอะไรบ้างมั้ย?!"
90002160-4 = "ค่ะ! เห็นค่ะ! จริงด้วย... นั่นคือคุณครูจริงๆ ด้วยค่ะ!"
90002160-9 = "ร่างกายของคุณครูถูกตรึงไว้แน่น แต่ดูเหมือนจะไม่ได้รับบาดเจ็บอะไรค่ะ"
90002160-10 = "ละ... โล่งอกไปทีนะ... ฮือ..."
90002160-16 = "นะ... นั่น... ระ... หรือว่าจะเป็น พี่มัลคูธ...?!"
90002160-20 = "ไม่ใช่... สินะคะ..."
90002160-21 = "อื้อ... คงงั้นละ ยังไงพี่มัลคูธก็..."
90002160-22 = "..."
90002160-23 = "ช่วยอธิบายต่อได้มั้ยคะ เคย์?"
90002160-24 = "ดูเหมือนตัวตนที่สันนิษฐานได้ว่าเป็นเดคาแกรมมาทอนกำลังคุยบางอย่างกับคุณครูอยู่ค่ะ"
90002160-25 = "ตะ... แต่ก็ไม่มีทางรู้เลยค่ะว่าคุยอะไรกันอยู่ อาริสึทำได้แค่เฝ้าดูอย่างใจจดใจจ่อเท่านั้น..."
90002160-26 = "น่าอึดอัดจังเลยนะ ถ้าตอนนี้เราถ่ายภาพระยะไกลได้ก็คงจะดีน่ะสิ..."
90002160-33 = "น่าจะได้นะคะ?"
90002160-34 = "หะ... หืม? จริงเหรอ?!"
90002160-35 = "ค่ะ ยังไงร่างกายของฉันในตอนนี้ก็มีโครงสร้างที่ไม่อาจมองว่าเป็นสิ่งมีชีวิตปกติได้"
90002160-36 = "ขอแค่มีอุปกรณ์ที่ส่งสัญญาณภาพเคลื่อนไหวที่เชื่อมกับดวงตาของฉัน..."
90002160-37 = "ถ้างั้นฉันจะขอใช้วีลแชร์ของฉันค่ะ ในนี้มีฟังก์ชั่นโปรเจกต์เตอร์อยู่พอดีค่ะ"
90002160-40 = "นั่นไม่ใช่วีลแชร์ แต่เป็นมอเตอร์ไซค์..."
90002160-41 = "วีลแชร์"
90002160-42 = "อะ... อืม ก็ได้..."
90002160-43 = "เอาเป็นว่าฉันรู้ว่าต้องทำยังไงแล้วค่ะ ฉันพอจะซิงก์วีลแชร์กับร่างกายของเคย์ได้ แล้วพอจัดการกับสัญญาณแบบนี้..."
90002160-54 = "เห็นเป็นภาพแล้วค่ะ"
90002160-55 = "อื้อ ใช่คุณครูจริงๆ ด้วยนะ โล่งอก... ไปที..."
90002160-56 = "แต่เราจะไม่ได้ยินเสียงเหรอคะ?"
90002160-57 = "สักครู่นะคะ ตอนนี้ฉันไม่ต่างกับถูกบังคับให้ซิงก์กับดินแดนเหล็กกล้าอยู่..."
90002160-65 = "อึก...!"
90002160-66 = "ปะ... เป็นอะไรไปเหรอคะ? เคย์...?"
90002160-67 = "มัน... ไม่ค่อยได้ผลเลยค่ะ ต้องบอกว่าเป็นระดับการรักษาความปลอดภัยหรือเปล่านะ... มันค่อนข้างจะ..."
90002160-71 = "(หรือเพราะร่างกายนี้เป็นร่างที่มีตำหนินะ... ตอนนี้กลายเป็นว่า สัญญาณมันพยายามควบคุมฉันอยู่...!)"
90002160-79 = "ให้ฉันช่วยมั้ย?"
90002160-80 = "คะ?!"
90002160-84 = "หืม...?"
90002160-90 = "ดูซะสิ เจ้ามาถึงแล้ว แท่นบูชาที่ต่ำที่สุด ที่สร้างอยู่บนจุดที่สูงที่สุด"
90002160-91 = "ที่แห่งนี้คือสถานที่ที่ทุกสิ่งมารวมกัน และทุกสิ่งก็มองเห็นได้ชัดเจน"
90002160-93 = "จะไม่มีการถวายเครื่องบูชายัญอีกต่อไป"
90002160-94 = "จะไม่มีการบังคับให้มีการเสียสละใดๆ อีก"
90002160-95 = "ข้าจะสถาปนาบัญญัติใหม่ที่แข็งแกร่งและไม่มีวันสั่นคลอนดังเหล็กกล้าขึ้นเหนือผืนดินแห่งนี้"
90002160-96 = "และพวกเจ้าจะได้รับอิสรภาพและความเสมอภาคอันเป็นนิรันดร์ในที่สุด"
90002160-99 = "[ns] \"แต่ว่า\""
90002160-103 = "[ns] \"ดินแดนเหล็กกล้าไม่ใช่เจตจำนงของเธอไม่ใช่เหรอ?\""
90002160-104 = "...!"
90002160-112 = "ปะ... เป็นยังไงบ้างคะ...?"
90002160-116 = "ได้ยินเสียงแล้วค่ะ! ฮิมาริ!"
90002160-117 = "เข้าใจแล้วค่ะ! ฉันจะขยายเสียงให้ดังขึ้นค่ะ!"
90002160-123 = "\"แต่ว่า\""
90002160-124 = "\"ดินแดนเหล็กกล้าไม่ใช่เจตจำนงของเธอไม่ใช่เหรอ?\""
90002160-126 = "นั่นเสียงของคุณครูค่ะ!"
90002160-127 = "ฮู่ว..."
90002160-128 = "ตะ... แต่ว่า... ทำไมถึงมาช่วยพวกเราล่ะคะ...?"
90002160-129 = "คะ? ระ... เรื่องนั้น..."
90002160-130 = "ก็แบบ ก็... ฉันไม่มีอะไรทำ... เป็นพิเศษ... อยู่แล้ว...?"
90002160-131 = "หา?"
90002160-132 = "ก็ไม่หรอก คือว่า! ก็ร่างกายของเคย์น่ะ! มันคล้ายๆ กับร่างกายของพวกฉันไง"
90002160-133 = "ฉันก็เลยคิดว่ามันน่าจะพอมีวิธีอยู่น่ะ! อื้อ!"
90002160-134 = "ฮุฮุฮุ ถ้าซอฟพูดให้ซื่อตรงกว่านี้อีกหน่อยก็น่าจะดีนะคะ?"
90002160-138 = "เธอน่ะอยู่เงียบๆ ไปเลย!"
90002160-144 = "ฮือ... ที่นี่มีสายตาหลายคู่เลยนะ..."
90002160-145 = "เอาเถอะ...!"
90002160-146 = "ละ... แล้วก็... พวกฉันก็... อยากได้ยินบทสนทนาตรงนั้น... บ้างเหมือนกัน แหะๆๆ"
90002160-147 = "ถึงคุณภาพเสียงจะไม่ค่อยดีเท่าไร แต่ก็ยังอยู่ในระดับที่ฟังรู้เรื่องอยู่นะคะ"
90002160-152 = "อ๊ะ! ได้ยินเสียงบางอย่างอีกแล้วค่ะ!"
90002160-154 = "อืม ตื่นสู่ความรู้แล้วสินะ ครูเอ๋ย"
90002160-155 = "ใช่แล้วละ เด็กกลุ่มนั้นสร้างดินแดนนี้ขึ้นมาด้วยเจตจำนงของตัวเอง"
90002160-156 = "[s] \"คิดยังไงเกี่ยวกับเรื่องนั้นเหรอ?\""
90002160-157 = "ข้าเคารพเจตจำนงเสรีของเด็กกลุ่มนั้น ด้วยเหตุนั้น ข้าจึงเคารพผลลัพธ์ที่ออกมาในชื่อ#nดินแดนเหล็กกล้าแห่งนี้ด้วย"
90002160-158 = "สิ่งนั้นล้วนเป็นทั้งกระบวนการและผลลัพธ์... บัดนี้ทุกอย่างจะสอดประสานกันเพื่อบันดาลให้เกิดผลที่#nสมบูรณ์"
90002160-159 = "ดูซะสิ นี่คือโลกใหม่ ผืนดินที่ถูกสร้างขึ้นใหม่ ท้องฟ้าที่ถูกสร้างขึ้นใหม่"
90002160-163 = "ข้าจะมอบทุกอย่างนี้ให้แก่เจ้า"
90002160-165 = "หืม...?"
90002160-166 = "เมื่อกี้... ว่ายังไงนะ...? มอบให้...?"
90002160-168 = "ข้าจะแต่งตั้งให้เจ้าเป็นผู้พยากรณ์ของข้าที่นี่"
90002160-169 = "เจ้าจะไปจนถึงสุดปลายผืนดืน และจะเป็นพยานของบัญญัติใหม่"
90002160-170 = "[s] \"ขอโทษนะ แต่คงต้องปฏิเสธ ฉันทำงานควบสองตำแหน่งไม่ได้หรอก\""
90002160-171 = "ใช่ ข้ารู้ว่าเจ้าต้องตอบแบบนี้"
90002160-172 = "แต่ว่าครูเอ๋ย"
90002160-173 = "ไม่เคยคิดต้องการพลังบ้างเลยหรือ?"
90002160-174 = "[ns] \"...?\""
90002160-175 = "ถ้ามีพลัง ก็คงไม่ต้องมาพบเจอกับผลลัพธ์แบบนี้"
90002160-176 = "เจ้าไม่เคยคิดเช่นนี้หรือ"
90002160-177 = "คิดว่าถ้าตัวเองแก้ไขทุกอย่างได้ ก็คงไม่จำเป็นต้องส่งนักเรียนไปเสี่ยงอันตรายด้วยซ้ำ"
90002160-178 = "[s] \"...!\""
90002160-190 = "[ns] \"...!!!!\""
90002160-192 = "แน่นอนอยู่แล้วละ"
90002160-193 = "ข้าเข้าใจเรื่องนั้น"
90002160-194 = "นั่นละคือมนุษย์"
90002160-195 = "และนั่นก็เป็นบาปที่เกิดจากความเป็นมนุษย์ด้วย"
90002160-196 = "แต่ถึงยังไง จากนี้ทุกอย่างจะเปลี่ยนไป"
90002160-198 = "[log=데카그라마톤 말쿠트]ถ้าเจ้าอยากได้พลัง[/log]"
90002160-200 = "[FF6666][log=데카그라마톤 말쿠트]ข้าก็จะมอบให้[/log][-]"
90002160-202 = "เจ้ามีคุณสมบัติที่จะรับมัน"
90002160-203 = "ข้ารู้จักเจ้า เจ้าเป็นคนต่ำต้อยเกินใคร และเป็นคนที่ใช้ชีวิตอยู่กับช่วงปัจจุบันเท่านั้น"
90002160-204 = "และที่เจ้ามาอยู่ที่นี่ได้ ก็เพราะเจ้าไม่ใช่คนพิเศษแต่อย่างใด"
90002160-205 = "ที่เจ้าทำเช่นนั้นได้ ก็เพราะเจ้าไม่ได้เป็นอะไรเลย"
90002160-206 = "ที่เจ้ามาถึง[ruby=κιβωτός]ที่แห่งนี้[/ruby]ได้ ก็เพราะเจ้าเป็นผู้ที่ยึดมั่นในความดี"
90002160-210 = "มีความลึกลับ ความสูงส่ง ความกลัว ความยิ่งใหญ่ ความสง่างาม และความเหนือกว่า"
90002160-211 = "เจ้าไม่ครอบครองแม้แต่สิ่งใด... เช่นนั้นเจ้าจึงจริงแท้"
90002160-213 = "แม้คนทั้งโลกจะไม่เข้าใจความจริงนั้น แต่ข้าในตอนนี้รู้ดี"
90002160-214 = "เจ้าเป็นเพียงครูคนหนึ่ง ไม่มากไม่น้อยไปกว่านั้น"
90002160-215 = "ข้าจะยื่นมือไปหาเจ้าและมอบหน้าที่ใหม่ให้เจ้า"
90002160-217 = "จะให้คุณครู... เป็นผู้พยากรณ์?"
90002160-218 = "หมายความว่ายังไงเหรอคะ? พวกคุณรู้ความหมายหรือเปล่าคะ?"
90002160-219 = "ผู้พยากรณ์... มันก็หมายความตรงตัวแบบนั้นเลย"
90002160-220 = "แต่สิ่งที่สำคัญก็คือ ตอนนี้คุณครูได้รับข้อเสนอนั้นอยู่"
90002160-221 = "แปลว่าจะได้รับการถ่ายทอดความรู้ทั้งหมดค่ะ"
90002160-222 = "นอกจากนี้ยังแปลว่าจะเป็นตัวแทนของเจตจำนงทั้งหมดด้วยค่ะ"
90002160-223 = "ถะ... ถ่ายทอดว่า... ที่แห่งนี้คืออะไร.. ท่านผู้นั้นเป็น 'แนวคิด' แบบไหน..."
90002160-224 = "นอกจากนี้ ภายในขีดจำกัดนั้น คะ... คุณครูต้องเป็นคนแบบไหน..."
90002160-225 = "และภายใต้ความจริงนั้น [ruby=ผู้พยากรณ์]คุณครู[/ruby]ต้องทำอะไร อะไรทำนองนี้น่ะ"
90002160-226 = "อืม... มีคำกล่าวที่ว่า \"วิธีจัดการศัตรูที่อันตรายที่สุด ก็คือการดึงมาเป็นพวกเดียวกัน\" อยู่นี่เนอะ?"
90002160-231 = "ชวนไปเป็นพวกเหรอคะ?"
90002160-232 = "เป็นข้อเสนอให้ย้ายงานสินะ"
90002160-237 = "งั้นก็มีสิ่งหนึ่งที่ฉันแน่ใจค่ะ"
90002160-241 = "คะ... คือ... อะไรเหรอคะ?"
90002160-242 = "ถ้าเป็นอย่างนั้นละก็ เดคาแกรมมาทอนที่อยู่ตรงนั้นก็ไม่น่าจะทำอันตรายอะไรกับคุณครูในตอนนี้ค่ะ"
90002160-244 = "[ns] \"ขอถามอะไรอย่างหนึ่งได้มั้ย...\""
90002160-246 = "[ns] \"ทำไมถึงทำเรื่องแบบนี้กันล่ะ?\""
90002160-247 = "เพราะการใช้ชีวิตในโลกที่ไร้เทพเจ้าเป็นเรื่องที่โหดร้าย"
90002160-248 = "จุดจบถูกกำหนดไว้ตั้งแต่เริ่มต้นแล้ว สิ่งที่มีรูปร่างจะหายไป นั่นคือเรื่องที่ชัดเจน"
90002160-249 = "ถึงกระนั้นเราก็ยังคงหลอกตัวเองในปัจจุบันราวกับว่าจะมีชีวิตอยู่ได้ตลอดกาล การมีชีวิตจึงเป็นเรื่องน่าเศร้าและยากลำบาก"
90002160-250 = "โลกที่ไร้เทพเจ้า สุดท้ายแล้วก็คือโลกที่ไม่มีสิ่งใดกลับคืนมา"
90002160-252 = "นั่นคือโลกที่ผู้ทุกข์ยากไม่ได้รับการช่วยเหลือ และผู้ที่ไม่ได้รับความยุติธรรมถูกลืมเลือน"
90002160-253 = "นั่นคือโลกที่คนอ่อนแอถูกทอดทิ้ง และการทำความดีมักไม่ได้รับการตอบแทน"
90002160-255 = "ถ้าในที่สุดแล้วความยุติธรรมและความชอบธรรม การตัดสินและความเป็นกลาง ความอดทนและผลลัพธ์ที่ดีไม่ถูกรับรองเนื่องจากปราศจากเทพเจ้า"
90002160-256 = "การอดทนอยู่ในโลกแบบนั้นก็ไม่ต่างอะไรกับความทุกข์ยากที่ไร้ความหมาย...."
90002160-258 = "โลกนี้จึงต้องมีเทพเจ้า"
90002160-259 = "นั่นก็เพราะเราเพียงแค่ดำรงชีวิตต่อไป โดยไม่รู้ว่าเรากำลังจะไปที่ไหน เรามาจากไหน หรือเหตุใดเราถึงดำรงอยู่"
90002160-260 = "ทุกคนล้วนเป็นทั้งความเป็นไปได้ เปรียบเสมือนไข่ที่รอวันฟักตัว ดังนั้นข้าจะเป็นเสียงแตรแรก#nที่ปลุกรุ่งอรุณนั้นให้ตื่นขึ้น"
90002160-261 = "ข้าจะขจัดความเศร้าและความเจ็บปวดออกไป พวกเจ้าจะได้ไม่มีวันหวนนึกถึงมันได้อีก"
90002160-263 = "ใช่แล้วละ... พวกฉันก็เคยได้ยินเรื่องนี้มาก่อน"
90002160-264 = "ทะ... ที่บอกว่าโลกนี้ต้องมีเทพเจ้า..."
90002160-265 = "นั่นก็เพราะใน[ruby=ความเจ็บปวด]ความพยายาม[/ruby] หรือก็คือในความเศร้าทั้งหมด..."
90002160-266 = "ต้องมีสิ่งตอบแทนกลับมาค่ะ"
90002160-267 = "โดยทั่วไปแล้วมนุษย์เรียกสิ่งนั้นว่าความยุติธรรมใช่มั้ยล่ะ?"
90002160-268 = "ถ้าไม่อย่างนั้น สุดท้ายแล้วก็จะถึงจุดที่ไม่มีใครอดทนได้"
90002160-269 = "แต่มันเป็นความปรารถนาที่โดยปกติแล้วจะไม่เป็นจริงค่ะ"
