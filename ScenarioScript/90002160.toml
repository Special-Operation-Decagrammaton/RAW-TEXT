90002160-278 = "ถ้าเทพเจ้ามีอยู่จริง และท่านสร้างทุกสิ่งอย่างด้วยเหตุผล"
90002160-279 = "แล้วทำไมท่านถึง... สร้างสิ่งที่อดทนได้ยากขนาดนี้ขึ้นมาล่ะคะ"
90002160-285 = "อื้อ"
