90002160-335 = "นั่นคือกระบวนการที่ต้องเกิดขึ้น... เป็นสิ่งที่ต้องก้าวข้ามและผ่านไปให้ได้"
90002160-336 = "ข้าหวังว่านั่นจะเป็นตอนจบ และข้าจะทำให้เป็นเช่นนั้น"
