90002160-339 = "น่าโมโหจังเลยนะคะ"
90002160-340 = "ใช่ค่ะ คำตอบนั้นน่าโมโหมากเลยค่ะ"
90002160-341 = "คุณล่ะคะว่ายังไงบ้าง ริโอะ?"
90002160-342 = "ถ้าเป็นเมื่อก่อน ฉันคงตอบว่าเห็นด้วยกับบางส่วนที่เดคาแกรมมาทอนพูด"
90002160-343 = "แม้กระทั่งตอนนี้ ฉันก็รู้สึกว่ามันพอทำความเข้าใจได้ ถึงจะแค่นิดเดียวก็ตาม"
90002160-344 = "แต่ตอนนี้น่ะ ฉันมองว่าเดคาแกรมมาทอนและฉันในอดีต... ต่างก็ด่วนสรุปและกระทำโดยรีบร้อนเกินไป"
90002160-345 = "หมายความว่า การตัดสินใจตัดบางส่วนทิ้งเพื่อรักษาส่วนรวมไว้ ควรถูกให้เป็นทางเลือกสุดท้าย เท่าที่จะเป็นไปได้เหรอคะ?"
90002160-346 = "อื้อ ฉันคิดคล้ายๆ แบบนั้นละ"
