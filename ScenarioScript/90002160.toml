[translation]
90002160-1 = "第16話;觀察與結果"
90002160-3 = "愛麗絲！Kei！能看到什麼嗎！？"
90002160-4 = "是的！看到了！#n真的……真的是老師！"
90002160-9 = "雖然全身被完全束縛住，不過似乎沒有受傷。"
90002160-10 = "太，太好了……嗚嗚……"
90002160-16 = "那，那個……難，難道是姐姐大人……！？"
90002160-20 = "不，並不是呢……"
90002160-21 = "嗯……畢竟姐姐大人已經……"
90002160-22 = "……"
90002160-23 = "可以請你繼續說嗎，Kei？"
90002160-24 = "老師看起來正在和推測為十字神名的個體交談。"
90002160-25 = "可，可是我們沒辦法知道內容……只能勉強看著而已……"
90002160-26 = "真令人著急。#n要是能進行遠程拍攝之類的就好了……"
90002160-33 = "應該可以哦？"
90002160-34 = "咦，咦？真的嗎！？"
90002160-35 = "是的。畢竟這個身體怎麼看都不算是有機體……"
90002160-36 = "只要有個裝置能輸出我眼球裡的影像訊號就行了。"
90002160-37 = "那就用我的輪椅吧。#n裡面也內建了投影機的功能。"
90002160-40 = "那不是輪椅是機──"
90002160-41 = "是輪椅。"
90002160-42 = "啊，嗯。好吧……"
90002160-43 = "總之，我知道了。#n因為能和Kei的身體進行一定程度的同步，所以只要把這個訊號像這樣……"
90002160-54 = "順利輸出了呢。"
90002160-55 = "確實是老師的身影。#n真的……太好了。"
90002160-56 = "不過沒辦法聽見聲音嗎？"
90002160-57 = "稍等一下。#n我現在基本上處於被強制和鋼鐵大陸同步的狀態……"
90002160-65 = "嗚……！"
90002160-66 = "怎，怎麼了，Kei……？"
90002160-67 = "這……不太順利呢。#n該怎麼說才好，安全等級之類的有點……"
90002160-71 = "（果然是因為這個身體不是正式編號的關係嗎……#n　而且還有股想要反向控制這邊的訊號……！）"
90002160-79 = "要我幫忙嗎？"
90002160-80 = "嗯！？"
90002160-84 = "咦……？"
90002160-90 = "看吧。已經到了。#n建於最高之處，卻又最低的祭壇。"
90002160-91 = "這裡是萬物匯聚之處，也是萬物顯現之處。"
90002160-93 = "不會再有任何祭品被獻上。"
90002160-94 = "不會再有任何犧牲被強迫。"
90002160-95 = "我將在這片大地之上，制定如鋼鐵般堅韌的新律法。"
90002160-96 = "你們也終將獲得永不消逝的自由與平等。"
90002160-99 = "[ns] 「可是──」"
90002160-103 = "[ns] 「鋼鐵大陸並不是你的意志吧？」"
90002160-104 = "……！"
90002160-112 = "怎，怎麼樣呢……？"
90002160-116 = "……能聽見聲音了！陽葵！"
90002160-117 = "知道了！我來放大！"
90002160-123 = "「可是──」"
90002160-124 = "「鋼鐵大陸並不是你的意志吧？」"
90002160-126 = "是老師的聲音！"
90002160-127 = "呼……"
90002160-128 = "不，不過……你們為什麼要幫我們呢……？"
90002160-129 = "咦？那，那個……"
90002160-130 = "這，這個嘛，反正也沒什麼特別的事要做……？"
90002160-131 = "咦～？"
90002160-132 = "不是，你想想！Kei的身體構造其實跟我們差不多嘛！"
90002160-133 = "所以才會覺得，搞不好能想想辦法之類的！"
90002160-134 = "哼哼哼。我覺得Soph還是再坦率一點會比較好哦？"
90002160-138 = "你給我閉嘴！"
90002160-144 = "嗚嗚嗚……居然在這麼多人面前……"
90002160-145 = "總之……！"
90002160-146 = "而，而且……那段對話，我們也有點……想聽看看。耶嘿嘿。"
90002160-147 = "音質雖然有點遺憾，不過要理解內容應該不成問題。"
90002160-152 = "啊！又聽到聲音了！"
90002160-154 = "是嗎。你已經覺醒了知識啊，老師。"
90002160-155 = "沒錯。那些孩子創造了這片大陸。以他們自己的意志創造了它。"
90002160-156 = "[s] 「你對這件事有什麼看法？」"
90002160-157 = "我尊重那些孩子的自由意志。#n因此，我也尊重鋼鐵大陸這個結果。"
90002160-158 = "這既是過程也是結果，一切終將協力成就美善。"
90002160-159 = "看吧。這就是新的世界。#n全新創造的大地與天空。"
90002160-163 = "我要將這一切賜予汝。"
90002160-165 = "咦……？"
90002160-166 = "他剛才，說了什麼……？#n怎麼會……？"
90002160-168 = "在此，我要立汝為我的預言者。"
90002160-169 = "汝將到達地之彼端，成為新律法的見證者。"
90002160-170 = "[s] 「恕我拒絕。我可是禁止兼職的啊。」"
90002160-171 = "是啊。汝理當如此回答。"
90002160-172 = "然而老師啊。"
90002160-173 = "汝是否曾想過自己需要力量？"
90002160-174 = "[ns] 「……？」"
90002160-175 = "如果擁有力量，就不會走到這樣的結局。"
90002160-176 = "汝難道不曾這麼想過嗎？"
90002160-177 = "倘若能用自己的力量解決一切，就不必讓學生陷入危險了。"
90002160-178 = "[s] 「……！」"
90002160-190 = "[ns] 「…………！！！！」"
90002160-192 = "你當然想過。"
90002160-193 = "我能夠理解。"
90002160-194 = "這就是人類。"
90002160-195 = "也是身為人類所背負的罪。"
90002160-196 = "然而從今以後，一切都將改變。"
90002160-198 = "[log=데카그라마톤 말쿠트]如果需要力量，[/log]"
90002160-200 = "[FF6666][log=데카그라마톤 말쿠트]我便賜予汝。[/log][-]"
90002160-202 = "汝有那個資格。"
90002160-203 = "我知道汝。汝是比任何人都低微，活在剎那之間的人。"
90002160-204 = "正是因為沒有任何特別之處，才得以佇立於此。"
90002160-205 = "汝之所以能夠如此，正是因為汝什麼都不是。"
90002160-206 = "汝得以抵[ruby=κιβωτός]達此處，[/ruby]不過是因為汝是個善良的人。"
90002160-210 = "有神祕。有崇高。有恐怖、偉大、莊嚴，以及超越。"
90002160-211 = "一樣也不具備的汝，反而顯得真實。"
90002160-213 = "縱使世上無人能夠理解這個事實，如今的我亦能知曉。"
90002160-214 = "汝不過是一名老師，僅此而已。然而──"
90002160-215 = "我將向汝伸出手，賦予汝新的職責。"
90002160-217 = "要讓老師……成為預言者？"
90002160-218 = "你們知道些什麼嗎？"
90002160-219 = "……所謂的預言者，就是字面上的意思。"
90002160-220 = "重點在於，他正在向老師提出這件事。"
90002160-221 = "代表他打算將所有知識傳授給老師。"
90002160-222 = "進而讓老師代為表達一切的意志。"
90002160-223 = "這，這裡是什麼地方……那位大人，是什麼樣的「概念」……"
90002160-224 = "還有在那個極限之中，老，老師應該成為什麼樣的存在……"
90002160-225 = "以及[ruby=預言者]老師[/ruby]在那個事實之下應該做些什麼，諸如此類的事情。"
90002160-226 = "簡單來說……就是把最危險的敵人拉攏成自己人的意思？"
90002160-231 = "也就是在進行招募呢。"
90002160-232 = "或者說是挖角也可以。"
90002160-237 = "那麼，至少有件事是可以確定的。"
90002160-241 = "那，那是……什麼呢？"
90002160-242 = "如果情況真是如此，那個十字神名暫時應該不會傷害老師才對。"
90002160-244 = "[ns] 「……我有個問題想問你。」"
90002160-246 = "[ns] 「你為什麼要做這種事？」"
90002160-247 = "要在沒有神的世界生存，是件殘酷的事。"
90002160-248 = "結局從一開始就已經註定。#n有形之物終將消逝。此乃不言自明的真理。"
90002160-249 = "然而我們依舊欺騙著今天，彷彿能永遠活下去一般。#n生命本身就是悲傷而艱辛的。"
90002160-250 = "沒有神的世界，終究是個毫無回饋的世界。"
90002160-252 = "是個悲慘之人得不到救贖，蒙冤之人會被遺忘的世界。"
90002160-253 = "是個軟弱之人將被拋棄，善行大多得不到回報的世界。"
90002160-255 = "倘若沒有神，任何公義與正直、審判與公平、忍耐與果實都無法獲得保證。"
90002160-256 = "……忍受那樣的世界，不過是場毫無意義的苦行罷了。"
90002160-258 = "世界需要神。"
90002160-259 = "因為我們不知道自己從何而來、應該去向何方、又為何而存在……只是活著而已。"
90002160-260 = "我們所有人都是神的可能性，就像神的卵一般。#n而我將成為喚醒黎明的第一聲號角。"
90002160-261 = "悲傷與痛苦就由我來帶走，你們將永遠無法回想起那些往事。"
90002160-263 = "……是啊。這些話，我們之前也聽過。"
90002160-264 = "世，世界需要神……"
90002160-265 = "因為[ruby=痛苦]努力[/ruby]，也就是所有的悲傷……"
90002160-266 = "必須得到回報才行。"
90002160-267 = "人們通常會稱之為正義吧？"
90002160-268 = "如果不是這樣的話，任何人都遲早會有撐不下去的時候。"
90002160-269 = "遺憾的是，那通常是無法實現的願望。"
90002160-270 = "因為據我們所知──"
90002160-271 = "嗯。根據我們的觀察──"
90002160-273 = "這個世界──"
90002160-274 = "從一開始就是扭曲的。"
90002160-276 = "那，那位大人也說過這樣的話。"
90002160-277 = "悲傷、痛苦、煎熬……"
90002160-278 = "如果真的有所謂的神，為一切都賦予了意義的話。"
90002160-279 = "為什麼連那種難以忍受的東西……都要創造出來呢。"
90002160-285 = "是啊。"
90002160-286 = "我們雖然被製造了出來……"
90002160-287 = "不過對於那個疑問，直到最後也沒能得到回答。"
90002160-290 = "[ns] 「消除悲傷？」"
90002160-291 = "是的。"
90002160-292 = "[s] 「用鋼鐵大陸覆蓋一切？」"
90002160-293 = "那是無數已備好的道路之一。"
90002160-294 = "[s] 「透過……控制一切？」"
90002160-295 = "是的。"
90002160-296 = "你們會本能地想要拒絕，但很快就會理解那是唯一的方法。"
90002160-297 = "例如我將以霍刻瑪的智慧開路，以赫賽德的慈悲來定罪裁判。"
90002160-298 = "各個預言者都被賦予了引導你們的責任。#n在新的大地與天空之下，他們將會履行各自的使命。"
90002160-306 = "[ns] 不是所有事物都能被取代。"
90002160-309 = "[ns] 已經發生的事無法挽回。"
90002160-312 = "[ns] ……即使真的發自內心想替他人承擔。"
90002160-314 = "[ns] 有些事情也確實無法做到。"
90002160-317 = "[ns1] 我們所能做的──\n[ns2] 也就只有即使狼狽也盡力掙扎。\n[ns3] 對彼此盡最大的努力而已。"
90002160-322 = "[log]有時為了說出真相，[/log]"
90002160-324 = "[log]必須得要說謊。[/log]"
90002160-326 = "[log]即使如此，如果還有唯一能留下的東西。[/log]"
90002160-329 = "[ns] 「那些孩子們呢？」"
90002160-330 = "……？"
90002160-331 = "[s] 「那些孩子們的悲傷呢？」"
90002160-335 = "……那是過程。是必須跨越的。"
90002160-336 = "我期望那將成為最後的悲傷，並加以實現。"
90002160-338 = "……"
90002160-339 = "真讓人生氣。"
90002160-340 = "那個回答實在讓人火大。"
90002160-341 = "你覺得呢，莉央？"
90002160-342 = "……如果是以前的我，可能會回答「我能部分同意十字神名的話」吧。"
90002160-343 = "即便到了現在，我也覺得自己多少能夠理解。"
90002160-344 = "然而不管是十字神名還是當時的我……#n現在看來，都太急於下定結論並付諸行動了。"
90002160-345 = "意思是為了整體而切割部分的決定，應該盡可能拖延到最後一刻嗎……？"
90002160-346 = "是的。我有類似的想法。"
90002160-347 = "（不過……）"
90002160-349 = "（如果是老師的話，會做出什麼樣的回答呢……？）"
90002160-354 = "下一話;人類的回答，人類的回答"
