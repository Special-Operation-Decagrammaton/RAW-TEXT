[translation]
33160-1 = "Episode 16;Bits and Pieces"
33160-6 = "Azusa..."
33160-7 = "You turned the gift you cherished as much as your life into a murder weapon."
33160-8 = "The bomb that was meant to destroy my halo."
33160-9 = "You still had it all this time."
33160-12 = "*cough* *cough*..."
33160-13 = "H-Hime?!"
33160-14 = "Hime!!!"
33160-15 = "..."
33160-16 = "However, Saori is still alive. Her wounds may be grave, but she lived..."
33160-17 = "...because Atsuko protected her. "
33160-18 = "Hime, get a hold of yourself...! Atsuko!"
33160-19 = "Atsuko, the one they refer to as Hime..."
33160-20 = "She must be precious to Saori."
33160-22 = "..."
33160-23 = "The royal blood's strength has weakened... Could she be dead?"
33160-24 = "I can't have my experiments disrupted. The Communio Sanctorum is not yet ready."
33160-25 = "..."
33160-26 = "Ah. Perhaps I was mistaken."
33160-27 = "She had already taken precautions. Such is the course of one with precious royal blood."
33160-28 = "So be it. I shall overlook this minor disruption. I suppose it's the least I could do for an associate."
33160-33 = "The experiment continues."
33160-35 = "Sa...o..."
33160-36 = "Hime! Are you okay?"
33160-37 = "*nod*"
33160-38 = "Thank goodness..."
33160-43 = "She won't get away with this."
33160-44 = "Azusa... How dare you hurt Hime? "
33160-45 = "You'll pay for this...Azusa!"
33160-47 = "So Atsuko is still alive."
33160-48 = "Yet I have little doubt that bomb would have destroyed my halo."
33160-49 = "It even wounded Saori despite her being shielded from the brunt of it."
33160-50 = "Perhaps Atsuko's halo has its own guardian angel."
33160-51 = "..."
33160-52 = "Regardless, this is sure to throw a wrench into Arius Squad's plans."
33160-53 = "Their all-out assault on Trinity has been delayed, and their hold on the Council has been weakened."
33160-54 = "The fighting at the cathedral is also slowing down."
33160-55 = "It will be possible to search and rescue the wounded with the two sides at a stalemate."
33160-56 = "As for Azusa... This new turn of events may ease her despair, if only slightly."
33160-58 = "Another wounded spotted! Requesting transport!"
33160-59 = "This way! Bring the stretcher!"
33160-60 = "Over there! There's another!"
33160-62 = "President! We've rescued the Pandemonium Society members that were aboard the airship that crashed into the lake! Chair Makoto was among the recovered!"
33160-63 = "The lake? The chair is a lucky woman."
33160-64 = "We'll take care of the transportation. Continue your rescue efforts. Place any more you find into intensive care units."
33160-65 = "Yes, ma'am!"
33160-66 = "What of the Prefect Team?"
33160-67 = "Senior Administrator Ako remains in command. The head prefect has suffered serious injuries and is still unconscious."
33160-68 = "..."
33160-69 = "The head prefect supported the Eden Treaty more than any of us..."
33160-70 = "Huh?"
33160-71 = "Nothing. Please continue as you were. "
33160-75 = "... "
33160-76 = "A storm is coming. Hurry."
33160-79 = "The Justice Task Force's President Tsurugi is seriously injured, and Vice President Hasumi is in critical condition!"
33160-80 = "Sakurako is also in bad shape! The Remedial Knights' infirmary is full, so we're transporting them to empty rooms in the old library!"
33160-85 = "N-No... Sakurako... "
33160-86 = "What about Nagisa?"
33160-87 = "We're still searching for her!"
33160-88 = "..."
33160-89 = "Emergency! Radical Tea Party followers are preparing to declare war on Gehenna!"
33160-91 = "What?!"
33160-92 = "We can't allow that to happen. Especially not now."
33160-96 = "It's the Justice Task Force! They're marching on the cathedral! One of our units is doing their best to stop them."
33160-97 = "Huh?! What?!"
33160-101 = "The Tea Party's lower members must be in total disarray."
33160-102 = "We have to do something. The fighting needs to cease so we can put our focus into the rescue efforts."
33160-105 = "(This is getting out of hand. What am I supposed to do?)"
33160-106 = "(Seia...)"
33160-108 = "(Help me, Sensei...)"
33160-110 = "Makeshift Gehenna Infirmary"
33160-111 = "What do you mean the president disappeared?!"
33160-112 = "I-I mean...she was lying here just a moment ago..."
33160-113 = "Find her! She couldn't have gone far! She's in no condition to be going anywhere with those injuries!"
33160-114 = "Y-Yes, ma'am!"
33160-119 = "President Hina..."
33160-121 = "So the head prefect has vanished."
33160-122 = "Her heart has had to endure a lot. I hope it didn't break..."
33160-124 = "Tea Party Offices"
33160-125 = "Is the formal declaration prepared?"
33160-126 = "It's ready!"
33160-127 = "Good. Let's not wait a moment longer."
33160-131 = "I-I'm begging you—wait!"
33160-132 = "Urawa Hanako? Who let you in?!"
33160-133 = "Per Trinity bylaws, war cannot be declared without a proper Tea Party host."
33160-134 = "..."
33160-135 = "Didn't you see the footage?! Gehenna is not our enemy!"
33160-136 = "I don't have all the details yet...but I'm sure Arius are the ones behind what's happening."
33160-137 = "They were able to infiltrate the catacombs under the Trinity district."
33160-139 = "Arrest her."
33160-145 = "...?! "
33160-147 = "So you pledged your allegiance to the Sisterhood after all."
33160-148 = "What?!"
33160-149 = "You're correct—we've reviewed the footage. We identified those strange entities as the Saint Justina Council. "
33160-150 = "We also know the modern-day ties the Sisterhood has with the Council. That's why we had no choice but to take the cathedral."
33160-151 = "You can stop playing detective now, Urawa Hanako."
33160-152 = "...!"
33160-153 = "We've also confirmed the missile's launching point. It came from the cathedral ruins—an area controlled by the Sisterhood."
33160-154 = "Your assertion may be correct. It could be that Arius infiltrated our district through the catacombs below... "
33160-155 = "...but that leads us to believe Arius and the Sisterhood were working together all along."
33160-156 = "...!"
33160-157 = "It's not outside the realm of possibility, especially given how shrouded in mystery the Sisterhood keeps itself."
33160-158 = "That is why we, the Pater Faction, have taken matters into our own hands. "
33160-159 = "Don't tell me the rest of the Tea Party is... "
33160-160 = "Correct. Filius and Sanctus Faction members who opposed or reserved judgment regarding our actions have been placed in custody."
33160-161 = "This is a coup d'etat!"
33160-162 = "Is it? You're forgetting that one Tea Party leader remains."
33160-163 = "...?!"
33160-167 = "Pater Faction leader and Tea Party attendee, Misono Mika."
33160-168 = "She'll be released so that we can carry out all-out war against Gehenna, just as she wanted."
33160-169 = "...!"
33160-172 = "..."
33160-173 = "Right this way, Miss Mika."
33160-174 = "Hmm? "
33160-179 = "What will you do now, Azusa?"
33160-180 = "You managed to save many others through resolve, but you failed to abolish the Council by voiding the commandments."
33160-181 = "Gehenna's Hina disappeared, and Trinity's Hanako has been arrested."
33160-182 = "Mika is even free now."
33160-183 = "Is this the ending you were fighting for?"
33160-184 = "In the end, it truly was futile. Fleeting and meaningless like a dream..."
33160-185 = "No. Not yet."
33160-186 = "Azusa?"
33160-188 = "Now isn't the time to give up."
33160-189 = "You have to act. If you have time to feel sorry for yourself, then you have time to think of a solution."
33160-190 = "The next plan. The next goal. Whatever comes next..."
33160-195 = "I can't stop here. There has to be a way..."
33160-196 = "The Council hasn't disappeared. Saori and Atsuko are safe after all... No. Regardless of that..."
33160-197 = "...I have to keep moving. Saori must be stopped."
33160-198 = "There's no other way."
33160-206 = "Azusa, you...still intend to fight?"
33160-207 = "Even knowing it's all in vain, you still insist."
33160-208 = "Why? How?"
33160-210 = "A battle has broken out! We have to respond!"
33160-211 = "There's a riot in progress at Building 5! What should we do?"
33160-213 = "U-Uh..."
33160-214 = "I-I..."
33160-215 = "Huh? Weren't you put in the Make-Up Work Club? You haven't officially been cleared to return to duty yet, have you? What are you doing here?"
33160-216 = "H-Huh? Well, I, uh..."
33160-217 = "We don't have time for this. Go to the containment block if you have nothing better to do. There should be something to keep you busy there."
33160-221 = "But, I...!"
33160-223 = "S-Saori."
33160-224 = "Leader..."
33160-226 = "Prepare to march on Trinity!"
33160-227 = "We need more time."
33160-228 = "Sh-She's right. Hime is wounded, and the Council isn't doing so hot..."
33160-229 = "We have no choice but to return to the cathedral and renew the commandments."
33160-230 = "..."
33160-231 = "Fine. We'll do as you said."
33160-232 = "Now. Let's go."
33160-233 = "..."
33160-234 = "I said now!"
33160-236 = "Please, Miss Mika. This way."
33160-237 = "Miss Mika!"
33160-238 = "We're sorry for taking so long. You're free now!"
33160-242 = "I see. "
33160-243 = "Now I understand what must be going on. Are you all fans of mine or something? Have you come for my autograph?"
33160-244 = "N-No, that's not it. Trinity is in a state of—"
33160-246 = "Emergency, I know! You're gonna declare war on Gehenna, aren't you?! Hahaha! That's too funny."
33160-247 = "Precisely! This is our opportunity to wipe Gehenna off the map! "
33160-248 = "Just as you wished, Miss Mika. "
33160-249 = "We'll follow your orders. Please issue a command to prepare for battle throughout all of Trinity!"
33160-250 = "Ahaha. Hah!"
33160-251 = "You're right—I DO hate Gehenna! I'm so flattered that you remembered!"
33160-252 = "What of it? Is that why you're all acting like a bunch of crazed fanatics?"
33160-253 = "Pardon...me?"
33160-254 = "It's kind of pathetic! Barging in here, appealing to my hatred, pleading with me to do your dirty work! Can't you see how funny it is?!"
33160-255 = "M-Miss Mika! Don't you think you're going over the line...?"
33160-256 = "Am I? Sorry if you're the one who's offended."
33160-257 = "It's like you said: I do hate Gehenna. So much so that there are times where I'd like to burn them all like ants under a magnifying glass."
33160-258 = "But you know what? Now isn't one of those times. Did you hear me? I don't feel like it! So why don't you all be good girls and just go home? You're wasting your time."
33160-259 = "Y-You don't feel like it...?"
33160-260 = "How can you say something like that? This is a critical moment in Trinity's history..."
33160-261 = "So what? It's wrong to force someone to do something they don't feel like doing, you know."
33160-262 = "It's just like my hatred for Gehenna. It's...just because!#nThere's no greater meaning or purpose behind it."
33160-263 = "So stop wasting your breath and mosey along. I'm not in the mood to deal with this."
33160-264 = "Find someone else who will let you use their hate on your behalf."
33160-265 = "What did you just say...?"
33160-266 = "Did I stutter? I'm telling you it's stupid to need someone else to order you to carry out your own hate."
33160-267 = "That... That's not true!"
33160-272 = "Hmph."
33160-273 = "You...harpy! This is the thanks we get for breaking you out of prison?!"
33160-277 = "Ouch. Picking on the unarmed is a little unfair, don't you think?"
33160-283 = "O-Okay, that one hurt..."
33160-287 = "Know your place! Or would you rather lose your place in the Tea Party?!"
33160-291 = "Is this how you show gratitude?! Huh?!"
33160-300 = "..."
33160-301 = "Wh-What are you doing?!"
33160-302 = "And who are you?"
33160-303 = "B-Bullying is illegal! She's totally outnumbered!"
33160-305 = "I won't allow it!"
33160-306 = "...!"
33160-309 = "[ns] Open your eyes."
33160-315 = "[ns] Sit up."
33160-317 = "S-Sensei? You're awake!"
33160-318 = "You shouldn't be moving yet! Where do you think you're going?!"
33160-320 = "You insist on fighting too, Sensei?"
33160-321 = "So that your students can remain just students. They shouldn't have to become things such as soldiers or killers."
33160-322 = "That's the kind of outcome you're fighting to prevent, isn't it?"
33160-323 = "[s] \"Because that's how things should be.\""
33160-324 = "It isn't that simple, Sensei. "
33160-325 = "You're facing malice and distrust that dates back generations—practically an eternity."
33160-328 = "[ns] \"Then it's time someone put a stop to it.\""
33160-332 = "Next Episode;The Embodiment of Hate"
