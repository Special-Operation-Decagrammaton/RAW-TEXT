10050070-93 = "3;타카네;08;아뇨, 아뇨! 좋은 부분을 지적해 주셨어요, 선생님! 잘하신 거예요! 저렇게 된 부장님은 내버려두면 끝도 없이 폭주하거든요.\n#3;a\n#3;em;[반응]"
10050070-94 = "3;타카네;00;그렇지만…… 부장님의 말도 완전히 틀린 건 아니긴 해요."
10050070-95 = "3;타카네;07;말씀대로, 부장님이 순수하게 돈만 바라보는 사람이라면, 왜 출판업을 하고 있겠어요?"
