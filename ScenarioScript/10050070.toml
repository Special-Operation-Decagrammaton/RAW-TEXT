10050070-97 = "3;타카네;12;후후. 어떨까요?"
10050070-98 = "3;타카네;00;그리고 또, 애초에 평론가인 제가, 무엇 때문에 부장님 밑에서 일을 하고 있을까요?"
10050070-99 = "3;타카네;07;네. 짐작하시는 대로예요. 결국 문화가 좋으니까 관련 일을 하고, 돈을 벌면 더 좋고.\n#3;greeting\n#3;em;[반짝]"
10050070-100 = "3;타카네;00;거기에다 홍보까지 되면 최고이지 않겠느냐는 거죠."
10050070-101 = "3;타카네;10;엄청나게 욕심쟁이인 데다가 배배 꼬이기까지 했죠? 부장님은 그런 사람이랍니다."
10050070-102 = "3;타카네;07;어차피 이런 이야기는, 어차피 다른 사람 앞에서는 죽어도 인정하지 않으려 하겠지만요."
10050070-103 = "3;타카네;02;생각해 보세요, 선생님. 왜 저렇게 꼬인 사람이, 재능이니 링이니 하는 비유까지 쓰면서.\n#3;em;[반응]"
10050070-104 = "3;타카네;01;……결국, 자기 자신에 대한 것을 솔직하게 이야기했을지 말이죠."
10050070-105 = "3;타카네;99;가령 링에 오를 기회조차 얻지 못한 채 챔피언의 모습만 부러워한 것은, 그리고 열망을 주었다면 재능도 주었어야 한다고 말하고 싶었던 사람은…….\n#3;em;…"
10050070-106 = "3;타카네;00;과연 또 누구였을까, 하는 문제들 말이에요."
10050070-107 = "[s] \"그렇다는 건…… 혹시?\""
10050070-108 = "3;타카네;10;후훗. 어떨까요? 어떤 것들은, 이야기하지 않는 것으로 완성에 다가가기 마련이니까요?\n#3;em;[음표]"
10050070-109 = "2;야쿠모;05;……이상한 소리 하지 마시죠, 타카네. 그러다 부정 탄다고요? 들어올 대금도 안 들어오게 된다고요?\n#2;a\n#3;m4\n#2;em;[빠직]"
10050070-110 = "3;타카네;13;네에, 네에. 어련하시겠어요."
