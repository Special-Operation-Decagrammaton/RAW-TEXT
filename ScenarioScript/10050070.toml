[translation]
10050070-1 = "#title;제7화;One Last Chance"
10050070-2 = "3;우이;02;아…… 선생님. 안녕, 하세요…….\n#3;a\n#3;em;[반응]"
10050070-3 = "3;우이;01;그, 이야기는 어느 정도, 전해 들었어요……. 우선 들어오시죠."
10050070-4 = "[s] \"미안, 우이.\""
10050070-5 = "3;우이;18;아, 아뇨……. 선생님은 여기에 오셔도 되는 사람이니까요…….\n#3;em;[땀]"
10050070-6 = "3;우이;10;그런데 생각해 보니, 선생님과 저, 그리고 그 두 사람까지……. 그러면 모두, 네 명……?"
10050070-7 = "3;우이;11;으, 으으……. 이 고서관에 네 명은, 역시 너무 많은 것 같기도 하고…….\n#3;stiff\n#3;em;[세로선]"
10050070-8 = "[s] \"소, 소란은 안 피우도록 할게!\""
10050070-9 = "3;우이;13;네에……. 그러면, 이쪽, 입니다……. 따라오세요…….\n#3;m2"
10050070-10 = "#st;[0,0];instant;1;"
10050070-11 = "#clearST"
10050070-12 = "3;우이;13\n#3;dl\n#wait;1000"
10050070-13 = "#all;hide"
10050070-14 = "4;야쿠모;02\n2;타카네;17;어, 어서 오세요. 선생님. 정말로 트리니티에 와 계셨군요…….\n#2;a\n#4;a\n#2;em;[땀]"
10050070-15 = "4;야쿠모;04;트리니티에서 선생님을, 그것도 이런 곳에서 만날 줄은 정말 몰랐네요……."
10050070-16 = "[s1] \"심상치 않아 보이는 상황이니까, 빠르게 본론으로 들어갈게.\"\n[s2] \"왜 이런 일을 벌인 거야, 야쿠모?\""
10050070-17 = "#wait;10"
10050070-18 = "#wait;10"
10050070-19 = "4;야쿠모;12;으, 윽. 잡담이라거나 아이스브레이킹이거나, 그런 건 없는 건가요.\n#4;stiff"
10050070-20 = "4;야쿠모;04;알겠어요. 알겠으니까요……. 하아…….\n#4;em;[한숨]"
10050070-21 = "4;야쿠모;09;결론부터 말씀드리자면, 돈 벌려고 그랬습니다."
10050070-22 = "2;타카네;14;너, 너무 당당하신 것 아니에요, 부장님?!\n#2;shake\n#2;em;[?!]"
10050070-23 = "4;야쿠모;04;그렇지만 그게 전부인걸요. 다른 게 솔직히 뭐가 있다고……."
10050070-24 = "4;야쿠모;02;……네? 그 이유만이라면 납득을 못 하시겠다고요? 사업가답지 않은 선택이다?\n#2;dl\n#4;m3\n#4;em;[?]"
10050070-25 = "4;야쿠모;01;타 학교 자치구에 들어와서 이런다는 건, 리턴에 비해 리스크가 너무 큰 것 같다고요……?"
10050070-26 = "[s] \"나는 야쿠모가 그 정도 계산은 될 거라고 믿어.\""
10050070-27 = "4;야쿠모;04;아뇨아뇨아뇨, 저 그 정도 계산 못 하는데요? 완전 대충대충인데요?\n#4;em;[땀]"
10050070-28 = "4;야쿠모;12;윽, 그렇게 못 믿겠다는 표정으로 쳐다보셔도 말이죠…….\n#4;stiff"
10050070-29 = "4;야쿠모;99;……하아…….\n#4;em;[한숨]"
10050070-30 = "4;야쿠모;01;알겠습니다. 음. 선생님께서도 이야기를 빠르게 진행시키길 바라셨고, 그렇다면 저도……."
10050070-31 = "4;야쿠모;04;……그렇다고는 해도, 이렇게 바로 본론으로 들어가는 건 조금 낯설기는 합니다만……. 아, 혹시 이게 어른의 화법이라는 걸까요……."
10050070-32 = "4;야쿠모;02;그러면, 선생님. 문화라는 게 뭘 먹고 자란다고 생각하시나요?\n#4;em;[?]"
10050070-33 = "[s] \"어……. 사람들의 사랑과 관심?\""
10050070-34 = "4;야쿠모;99;그렇군요. 사랑과 관심…….\n#4;em;…"
10050070-35 = "4;야쿠모;01;틀리지 않았지만, 틀린 생각이군요, 그것은."
10050070-36 = "4;야쿠모;02;문화란 건 말이죠…… 돈을 먹고 자라는, 살아 있는 무언가입니다. 생명체인 우리와 다르지 않아요."
10050070-37 = "4;야쿠모;05;조금 과격한 발언 같으시다고요? 아니요. 슬프지만 이것이 현실이에요!\n#4;jump"
10050070-38 = "4;야쿠모;02;문화 매체를 누린다는 것은…… 다른 말로, 거기에 자신의 시간과 또 다른 교환 가치재…… 솔직하게, 돈을 소비한다는 이야기입니다."
10050070-39 = "4;야쿠모;01;……그리고 사람들은 거기에 대한 대가를 받아 내길 바라죠. 재미나 즐거움이나 웃음이나 뭐 그런 거 말이에요."
10050070-40 = "4;야쿠모;99;그런 게 없다면 차라리 감동이나 교훈이라도 좋고요."
10050070-41 = "4;야쿠모;02;선생님. 하루에 얼마나 많은 글이 쓰여질지, 그런 문제 생각해 본 적 있으신가요.\n#4;m2\n#4;em;[반응]"
10050070-42 = "4;야쿠모;01;좋은 걸 만들면 알아서 잘 읽힐 거라고 단순하게들 생각하지만…… 그건, 허상입니다."
10050070-43 = "4;야쿠모;99;왜냐하면 이 순간에도 너무 많은 글과…… 정보들이 쏟아지고 있으니까요."
10050070-44 = "4;야쿠모;01;조금 전, 하루라고 말씀드렸지만, 그 정도도 아니에요. 1시간, 1분, 1초 단위로, 정말이지 상상도 못 할 문화 매체들이 쏟아지고 있어요.\n#4;m3"
10050070-45 = "4;야쿠모;06;그리고 그중 대부분은, 잊히고 사라져 없던 것이 되고요."
10050070-46 = "4;야쿠모;99;……그건 어딘가, 억울하고 슬픈 일이 아닐까요."
10050070-47 = "[s] \"…….\""
10050070-48 = "4;야쿠모;01;제대로, 시장이라는 링에 올라 정정당당히 패배한 거라면 차라리 나아요."
10050070-49 = "4;야쿠모;02;누군가는 다음에 더 잘하겠다는 용기를 배울 것이고, 어떤 사람은 교훈을 배울 것이며."
10050070-50 = "4;야쿠모;01;……아니면 내 길은 이게 아니었던 거라고, 깔끔하게 포기할 수도 있겠죠."
10050070-51 = "#all;hide"
10050070-52 = "#na;야쿠모;그렇지만 대부분은 링에 오를 기회조차 얻지 못한 채……."
10050070-53 = "#na;야쿠모;……우승 트로피를 들고 환호하는, 챔피언의 모습만 부러워하기 마련이에요."
10050070-54 = "#na;야쿠모;아이 때 기억나세요? 아이들은 항상 자기 자신이 아닌 무언가가 되고 싶어 하죠."
10050070-55 = "#na;야쿠모;저렇게 되고 싶고, 저런 것을 만들고 싶고, 자기 자신을 증명하고 인정받고 싶고……."
10050070-56 = "#all;hide"
10050070-57 = "#na;야쿠모;아이만 그런 것도 아니긴 해요. 사람인 이상, 그렇게 생각하는 것은 자연스러운 일이죠."
10050070-58 = "#na;야쿠모;그렇지만, 선생님. 꿈도 오래 묵으면, 상하기 마련이에요."
10050070-59 = "#na;야쿠모;꿈이 없는 것도 비극이지만, 언제까지나 꿈속에 붙들려만 있는 것도 비극이죠. 왜, 그런 말도 있잖아요?"
10050070-60 = "#na;야쿠모;그렇게, 열망을 주었다면–"
10050070-61 = "#na;야쿠모;–재능도 주었어야지, 같은 말이요."
10050070-62 = "#all;hide"
10050070-63 = "[ns3] \"이런 말 하면 글러 먹은 어른 같기는 한데…….\"\n[ns4] \"몇 살이나 되었다고 벌써 그런 말을 하니…….\""
10050070-64 = "#wait;10"
10050070-65 = "#wait;10"
10050070-66 = "3;야쿠모;04;……그러게 말입니다.\n#3;a\n#3;em;[한숨]"
10050070-67 = "3;야쿠모;10;하지만, 나이와 상관없이 그런 말을 하게 될 수밖에 없었던 아이라는 것도, 세상 어딘가에는 있지 않을까요?"
10050070-68 = "3;야쿠모;03;아무튼, 그렇습니다. 제 말의 요지는 이거예요. \n#3;em;[반응]\n#3;jump"
10050070-69 = "3;야쿠모;08;자신의 꿈과 마주치고, 나아가거나 부서지기 위해서는, 한번은 링에 올라야 한다는 거죠."
10050070-70 = "3;야쿠모;07;그리고 그 링에 오르도록 안내해 주는 것이…… 홍보와 마케팅이라는 거고요."
10050070-71 = "3;야쿠모;10;싸울 기회조차 얻지 못하고 패배 통보를 받는다면, 그건 좀…… 가혹한 일이잖아요?"
10050070-72 = "3;야쿠모;03;그렇기 때문에 돈은 중요한 겁니다. 링까지 사람을 안내해 주는 것은, 중요한 일이니까요."
10050070-73 = "3;야쿠모;09;문화는 돈이라는 토양에서 자라고, 누군가는 그 토양을 가꾸어야 해요."
10050070-74 = "3;야쿠모;04;……뭐, 이번 일도 그러려다 보니, 어쩌다 이렇게 된 것이기도 하고요.\n#3;em;[땀]"
