2001415-49 = "#wait;10"
2001415-50 = "#wait;10"
2001415-51 = "3;사키;13;엑?!\n#3;em;[?!]"
2001415-52 = "3;사키;09;(아앗!! 교범 자투리 페이지에 낙서로 일기 써놨었던 걸 깜빡했어!!)\n#3;stiff"
2001415-53 = "[s] \"'어른들은 믿을 수가 없어.'\""
2001415-54 = "3;사키;04;따, 딱히 틀린 말한 건 아니잖아?! 그때는 그럴 만했지!\n#3;hophop"
2001415-55 = "3;사키;12;것보다 왜 계속 주절주절 읽고 있는 거야!\n#3;em;[빠직]"
2001415-56 = "[s] \"'착한 체하지만, 분명 속셈이 있을 거야.'\""
