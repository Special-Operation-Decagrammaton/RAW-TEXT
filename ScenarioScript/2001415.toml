[translation]
2001415-1 = "#title;토끼와 병기서"
2001415-2 = "#na;(사키의 이름이 적힌 책은 테이블 위에 있었다.)"
2001415-3 = "#st;[0,0];instant;1;"
2001415-4 = "#clearST"
2001415-5 = "#wait;1500"
2001415-6 = "3;사키;02;선생님, 책 있었어?\n#3;a"
2001415-7 = "3;사키;06;공원 쪽은 다 찾아봤는데, 없었거든…….\n#3;em;[한숨]"
2001415-8 = "[s] \"사키가 말한 책, 이거 맞아?\""
2001415-9 = "#st;[0,0];instant;1;"
2001415-10 = "#clearST"
2001415-11 = "3;사키;02\n#3;em;[반응]\n#wait;1500"
2001415-12 = "3;사키;07;응! 맞아! 이거야!"
2001415-13 = "3;사키;03;바로 내가 찾고 있던 거야!\n#3;greeting"
2001415-14 = "[s] \"그게 무슨 책이야?\""
2001415-15 = "3;사키;03;후후, 놀라지 말라구?\n#3;em;[재잘]"
2001415-16 = "3;사키;03;이건 그냥 평범한 책이 아니라구."
2001415-17 = "3;사키;07;자, 봐봐!\n#3;em;[반응]"
2001415-18 = "#st;[0,0];instant;1;"
2001415-19 = "#clearST"
2001415-20 = "3;사키;07\n#3;m5\n#wait;1500"
2001415-21 = "#wait;2000"
2001415-22 = "3;사키;03;어때, 대단하지?\n#3;em;[음표]"
2001415-23 = "[ns] \"평범한 책 같은데……?\""
2001415-24 = "3;사키;10;뭣……! 이건 SRT 학생들에게 보급되는 교범이야!\n#3;m3\n#3;hophop"
2001415-25 = "3;사키;99;SRT에서 생활하기 위해, 필요한 기본 사항과 전술 기초에 관한건데,"
2001415-26 = "3;사키;03;아무나 볼 수 있는 건 아니지만, 선생님이라면 봐도 괜찮아!\n#3;em;[반응]"
2001415-27 = "[s] \"메모지와 필기가 잔뜩 있네…….\""
2001415-28 = "3;사키;04;그게, 개학까지 도저히 못 기다리겠어서 열 번도 넘게 미리 예습해 뒀단 말이지.\n#3;em;…"
2001415-29 = "3;사키;99;기초를 잊지 않는 게 제일 중요하다 보니 틈만 나면 자꾸 꺼내보게 되더라구."
2001415-30 = "[s] \"'교내에서는 항상 발을 맞춰서 가야 한다.'라고 나와 있네.\""
2001415-31 = "3;사키;02;아아- 그거는 SRT 내에서 지켜야 하는 예절에 관한 거야.\n#3;em;[반응]"
2001415-32 = "3;사키;01;제각각 터벅터벅 걸어 다니면 다 같이 혼나거든. 그래서 아직도 발을 맞춰서 걷곤 해."
2001415-33 = "3;사키;03;습관이 안 됐을 때는 엄청나게 혼났었지-\n#3;em;[재잘]"
2001415-34 = "[s] \"저번에는 딱히 발을 안 맞추고 걸은 적이 있지 않았어?\""
2001415-35 = "3;사키;02;그건 아마 같이 다리를 걸어갈 때였을 거야. 맞지?\n#3;em;[반응]"
2001415-36 = "[s] \"생각해 보니 그랬던 것 같기도 해.\""
2001415-37 = "3;사키;03;후후…… 사실 그것도 교범을 잘 보면 나온다구!\n#3;em;…"
2001415-38 = "3;사키;03;다리를 건너갈 때는 발맞춰서 걸으면 교량의 고유 진동수하고 맞아버릴 수가 있거든."
2001415-39 = "3;사키;03;그렇게 되면 다리가 무너질 수도 있어서 각자 제 걸음으로 가야 해."
2001415-40 = "3;사키;07;어때? SRT의 교육은 빈틈이 없지?\n#3;em;[반짝]"
2001415-41 = "[s1] \"다리가 무너져?!\"\n[s2] \"오오 대단해!\""
2001415-42 = "#wait;10"
2001415-43 = "#wait;10"
2001415-44 = "3;사키;07;그치 그치? 보다 보면 재밌는 부분이 많아! 선생님도 읽어봐!\n#3;em;[재잘]"
