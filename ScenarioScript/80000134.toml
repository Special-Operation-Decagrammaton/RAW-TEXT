[translation]
80000134-1 = "恰到好處的提拉米蘇"
80000134-2 = "（受到美代的邀請，前往了狂獵的宿舍）"
80000134-3 = "（……他連舍監隊檢查最鬆懈的時段都精確地告訴了我，比平時更順利地進去了）"
80000134-4 = "特殊交易部的宿舍"
80000134-7 = "歡迎你來，老師。"
80000134-8 = "[s] 「你好嗎，美代？」"
80000134-9 = "小，小說寫不太出來這件事以外都還好。"
80000134-10 = "走私行動的計畫書倒是不知為何總是莫名地順暢……"
80000134-11 = "[s] 「嗯？」"
80000134-12 = "那，那個，不好意思。"
80000134-13 = "本來應該是我去找你的，但最近外出規定暫時變嚴格了……"
80000134-14 = "[s] 「沒關係。美代的邀請隨時都歡迎呢。」"
80000134-15 = "真，真的嗎？嘿嘿……"
80000134-16 = "[s] 「更何況要是拒絕邀請的話，搞不好會被綁架……」"
80000134-17 = "什，什麼嚇人的話！我才不會做那種事！"
80000134-18 = "你問有沒有可能嗎？那倒是得考慮各種變數……"
80000134-22 = "……才不是！我為什麼要做那種事啦！？"
80000134-23 = "呵呵呵……"
80000134-24 = "[s] 「話說回來，你在做什麼啊？」"
80000134-25 = "啊，這個是……"
80000134-26 = " ……正在做要送給老師的提拉米蘇。"
80000134-27 = "[s] 「提拉米蘇……？」"
80000134-28 = "是的。今天不是情人節嘛。"
80000134-29 = "所以想剛好在老師到的時間完成的，結果不知怎麼花了比較久的時間……"
80000134-30 = "畢竟也是第一次做……"
80000134-31 = "[s] 「那要不要一起把剩下的做完？」"
80000134-32 = "沒，沒關係！"
80000134-33 = "已，已經快完成了！"
80000134-34 = "把泡過咖啡的手指餅乾和馬斯卡彭起司一層層疊起來的作業……已經做完了……"
80000134-35 = "現在只要在上面撒上可可粉就……"
80000134-41 = "老師。"
80000134-42 = "[s] 「嗯？」"
80000134-43 = "在雪白的馬斯卡彭起司上面像這樣撒上黑黑的粉……"
80000134-44 = "是不是很像在白紙上寫字呢？"
80000134-45 = "[s] 「嗯，確實可以那樣看呢。」"
80000134-46 = "有時候我也會這樣想。"
80000134-47 = "寫作這件事，不就是用各自的方式去弄髒白紙嗎……"
80000134-48 = "嘛，就是這樣的想法……"
80000134-53 = "那，那個，總之……！"
80000134-57 = "完，完成了喔，老師！"
80000134-60 = "[ns] 「看起來好好吃……！」"
80000134-61 = "嘿，嘿嘿，謝謝你，老師。"
80000134-62 = "那，那個，可是……"
80000134-63 = "[s] 「嗯？」"
80000134-69 = "我，我也是今天才知道的……剛做好的提拉米蘇冷藏兩個小時後會更好吃。"
80000134-70 = "所，所以說，要是……"
80000134-71 = "老，老師不介意的話……"
80000134-72 = "[s] 「兩個小時左右我隨時都可以等的。」"
80000134-73 = "真，真的嗎！？謝謝你，老師！"
80000134-74 = "那我去泡茶。"
80000134-75 = "洋甘菊茶，可以嗎？"
80000134-77 = "（就這樣和美代一邊喝茶一邊聊了兩個小時）"
80000134-78 = "（兩個小時後吃的提拉米蘇，味道真的是夢幻般的美味）"
