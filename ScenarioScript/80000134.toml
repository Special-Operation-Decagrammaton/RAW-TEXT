80000134-69 = "3;미요;08;저, 저도 오늘에서야 알았는데…… 갓 만든 티라미수를 두 시간 동안 냉장시키면 더 맛있게 먹을 수 있대요.\n#3;em;[…]\n#3;closeup"
80000134-70 = "3;미요;36;그, 그래서 말인데, 혹시…….\n#3;closeup"
80000134-71 = "3;미요;31;서, 선생님만 괜찮으시면…….\n#3;stiff\n#3;closeup"
