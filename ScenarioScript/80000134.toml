[translation]
80000134-1 = "Timely Tiramisu"
80000134-2 = "After receiving Miyo's invitation, I visited the Wildhunt dorms."
80000134-3 = "...Thanks to her telling me the exact time when the Prefectural Council changed guards, I was able to move through the inspection point quickly."
80000134-4 = "Free Trade Cartel Dormitory"
80000134-7 = "Welcome, Sensei."
80000134-8 = "[s] \"How have you been, Miyo?\""
80000134-9 = "Everything's fine, besides the fact that I've been struggling with writer's block."
80000134-10 = "Though, of course, new smuggling schemes keep coming to me so naturally."
80000134-11 = "[s] \"What?\""
80000134-12 = "Anyway, I apologize for asking you to come all this way."
80000134-13 = "I should have visited you, but outing approvals have been so hard to come by lately."
80000134-14 = "[s] \"It's fine. I'll always welcome an invitation from Miyo.\""
80000134-15 = "R-Really? Heehee... "
80000134-16 = "[s] \"After all, if I say no, I might get kidnapped...\""
80000134-17 = "Wh-What kind of reply is that?! I would NEVER do such a thing. We hit you on the head ONE time, and I dragged you here to recover..."
80000134-18 = "But would a kidnapping be impossible? Well, I would have to consider the variables... You'd need to have an open schedule, a secluded location, soundproofed walls..."
80000134-22 = "...Wait, no! NO! I don't... I would never do something like that."
80000134-23 = "Ugh..."
80000134-24 = "[s] \"Ha. Anyway, what are you making, Miyo?\""
80000134-25 = "Ah, I was..."
80000134-26 = " ...making tiramisu. For you."
80000134-27 = "[s] \"Tiramisu...?\""
80000134-28 = "Yes. Today is Valentine's Day."
80000134-29 = "I wanted to finish it right before you got here, so it would be fresh. For some reason it ended up taking far longer than I planned. There are layers to this, Sensei—tiramisu."
80000134-30 = "It's also my first time making one..."
80000134-31 = "[s] \"Then should we finish making it together?\""
80000134-32 = "N-No! It's okay! Relax! "
80000134-33 = "I'm almost done with it, see?"
80000134-34 = "I've laid the ladyfingers. They're soaked in espresso and mascarpone..."
80000134-35 = "So I just need to sprinkle some cocoa powder on top..."
80000134-41 = "Hey, Sensei."
80000134-42 = "[s] \"Hm?\""
80000134-43 = "Me, sprinkling this black powder on the white mascarpone..."
80000134-44 = "It's almost like I'm writing on a blank sheet of paper. Right?"
80000134-45 = "[s] \"Hm, I guess you can think of it that way.\""
80000134-46 = "Sometimes, I consider..."
80000134-47 = "Maybe writing is just one's way of staining a white sheet of paper... Leaving a mark."
80000134-48 = "Well, something like that... "
80000134-53 = "Um, whatever, forget it. With that on top...! "
80000134-57 = "...I-It's done, Sensei!"
80000134-60 = "[ns] \"It looks good...!\""
80000134-61 = "H-Heehee, thank you, Sensei."
80000134-62 = "Um, by the way..."
80000134-63 = "[s] \"Hm?\""
80000134-69 = "I know I said I wanted to make it fresh, but I was reading right before you came. It turns out tiramisu should ACTUALLY be refrigerated for two hours minimum. To let the flavors meld...and get married."
80000134-70 = "So, I was wondering..."
80000134-71 = "I-If you happen to have the time..."
80000134-72 = "[s] \"I'm more than happy to wait two hours.\""
80000134-73 = "R-Really?! Thank you, Sensei!"
80000134-74 = "In that case, I'll go make some tea. Maybe something decaf to balance out the espresso?"
80000134-75 = "How does chamomile sound?"
80000134-77 = "And so, I shared tea with Miyo. We chatted for hours."
80000134-78 = "The delicious tiramisu was more than worth the wait."
