80000134-41 = "3;미요;02;선생님."
80000134-42 = "[s] \"응?\""
80000134-43 = "3;미요;03;새하얀 마스카포네 치즈 위에 이렇게 까만 파우더를 뿌리는 것……\n#3;em;[...]"
80000134-44 = "3;미요;07;마치 백지 위에 글을 써 내려가는 것 같지 않나요?"
80000134-45 = "[s] \"음, 그렇게도 볼 수 있겠네.\""
80000134-46 = "3;미요;02;가끔은 그런 생각도 해요."
80000134-47 = "3;미요;12;글을 쓴다는 건, 각자의 방식으로 흰 종이를 더럽히는 것 아닐까…….\n#3;em;[음표]"
80000134-48 = "3;미요;02;뭐, 그런 생각을……. \n#3;stiff"
