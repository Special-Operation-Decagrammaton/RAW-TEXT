[translation]
80000134-1 = "ทีรามิสุทันเวลา"
80000134-2 = "(คุณครูมาที่หอพักโรงเรียนไวลด์ฮันต์ตามคำชวนของมิโยะ)"
80000134-3 = "(โชคดีที่ช่วงเวลานั้นเป็นช่วงเวลาที่การตรวจตราความปลอดภัยของฝ่ายดูแลหอพักไม่เข้มงวด ทำให้คุณครูเข้าไปในหอพักได้ง่ายดาย)"
80000134-4 = "หอพัก ชมรมการค้าพิเศษ"
80000134-7 = "เชิญเลยค่ะ คุณครู"
80000134-8 = "[s] \"สบายดีมั้ย มิโยะ?\""
80000134-9 = "นะ... นอกจากเรื่องที่เขียนนิยายไม่ค่อยได้แล้ว ฉันก็สบายดีค่ะ"
80000134-10 = "แผนการลักลอบขนสินค้าก็เป็นไปได้อย่างราบรื่น แต่ว่า..."
80000134-11 = "[s] \"หืม?\""
80000134-12 = "ยะ... ยังไงก็ ฉันต้องขอโทษด้วยนะคะ"
80000134-13 = "ฉันควรจะเป็นฝ่ายไปหาคุณครูแท้ๆ แต่ตอนนี้กฎการเดินทางเข้าออกเข้มงวดขึ้นมาก..."
80000134-14 = "[s] \"ไม่เป็นไร ถ้ามิโยะชวนครูก็ยินดีมาหาเสมอแหละ\""
80000134-15 = "จะ... จริงเหรอคะ? ฮิฮิ... "
80000134-16 = "[s] \"ถ้าครูปฎิเสธคำชวนก็อาจถูกลักพาตัวมาก็ได้นี่นา...\""
80000134-17 = "พะ... พูดอะไรน่ากลัวแบบนั้นคะ! ฉันไม่ทำอะไรแบบนั้นหรอกค่ะ!"
80000134-18 = "ถามว่าเป็นไปได้มั้ยน่ะเหรอคะ? ก็ต้องลองพิจารณาจากตัวแปรทั้งหมดดูก่อน..."
80000134-22 = "ดะ... เดี๋ยวสิคะ! ฉันจะทำเรื่องแบบนั้นไปทำไมกันล่ะคะ?!"
80000134-23 = "ฮือ..."
80000134-24 = "[s] \"ว่าแต่ว่าเธอทำอะไรอยู่เหรอ?\""
80000134-25 = "อ๊ะ นี่คือ..."
80000134-26 = "ฉันกำลังทำทีรามิสุให้คุณครูอยู่ค่ะ"
80000134-27 = "[s] \"ทีรามิสุ...?\""
80000134-28 = "ค่ะ ก็วันนี้เป็นวันวาเลนไทน์นี่คะ"
80000134-29 = "ฉันพยายามทำให้เสร็จทันเวลาที่คุณครูจะมา แต่มันกลับใช้เวลามากกว่าที่คิดเอาไว้... "
80000134-30 = "อาจเป็นเพราะฉันเพิ่งเคยทำครั้งแรกด้วย..."
80000134-31 = "[s] \"งั้นมาทำไปด้วยกันมั้ย?\""
80000134-32 = "มะ... ไม่เป็นไรค่ะ! "
80000134-33 = "ตะ... ตอนนี้เกือบจะเสร็จแล้วละค่ะ!"
80000134-34 = "ฉันเรียงคุกกี้เลดี้ฟิงเกอร์ชุบกาแฟสลับกับชีสมาสคาร์โปเน... เสร็จเรียบร้อยแล้ว..."
80000134-35 = "ตอนนี้ก็เหลือแค่โรยผงโกโก้ลงด้านบน..."
80000134-41 = "คุณครูคะ"
80000134-42 = "[s] \"หืม?\""
80000134-43 = "การโรยผงโกโก้สีดำลงบนชีสมาสคาร์โปเนสีขาวแบบนี้..."
80000134-44 = "รู้สึกเหมือนกับการขีดเขียนลงบนแผ่นกระดาษเลยว่ามั้ยคะ?"
80000134-45 = "[s] \"อืม จะคิดแบบนั้นก็ได้\""
80000134-46 = "บางครั้งฉันก็คิดนะคะ"
80000134-47 = "ว่าการเขียนหนังสือคือการทำให้แผ่นกระดาษเปรอะเปื้อนในแบบฉบับของเรา..."
80000134-48 = "อืม... ฉันคิดแบบนั้น... "
80000134-53 = "เอ่อ ยังไงก็เถอะค่ะ ถ้างั้นตอนนี้...! "
80000134-57 = "สะ... เสร็จแล้วละค่ะ คุณครู!"
80000134-60 = "[ns] \"ดูน่ากินจัง...!\""
80000134-61 = "แหะ... แหะๆ... ขอบคุณค่ะคุณครู"
80000134-62 = "อะ... เอ่อ คือว่า..."
80000134-63 = "[s] \"หืม?\""
80000134-69 = "ฉะ... ฉันเองก็เพิ่งรู้วันนี้เหมือนกันค่ะ.... ว่าถ้าเอาทีรามิสุที่ทำเสร็จใหม่ๆ ไปแช่ตู้เย็นไว้ประมาณ#nสองชั่วโมงจะทำให้รสชาติอร่อยขึ้น"
80000134-70 = "พะ... เพราะงั้นคือว่า..."
80000134-71 = "ถะ... ถ้าคุณครูไม่ว่าอะไร..."
80000134-72 = "[s] \"สองชั่วโมงเอง ครูรอได้สบายอยู่แล้ว\""
80000134-73 = "จะ... จริงเหรอคะ?! ขอบคุณค่ะคุณครู!"
80000134-74 = "ถ้างั้นฉันจะไปชงชามาให้นะคะ"
80000134-75 = "เป็นชาคาโมมายล์ดีมั้ยคะ?"
80000134-77 = "(หลังจากนั้นคุณครูกับมิโยะก็ใช้เวลาดื่มชาด้วยกันประมาณสองชั่วโมง)"
80000134-78 = "(และทีรามิสุที่ได้กินหลังจากนั้นสองชั่วโมงก็รสชาติหวานอร่อยมาก)"
