[translation]
80000134-1 = "#title;때맞춘 티라미수"
80000134-2 = "#na;(미요의 초대를 받아 와일드헌트의 기숙사를 방문했다.)"
80000134-3 = "#na;(……사감대의 검문이 허술해지는 시간대까지 정확히 알려준 덕에, 평소보다 수월하게 들어갈 수 있었다.)"
80000134-4 = "#place;특수교역부 기숙사실\n3;미요;03\n#3;black"
80000134-5 = "#wait;1500"
80000134-6 = "3;미요;03\n#3;a\n#wait;1500"
80000134-7 = "3;미요;03;어서 오세요, 선생님.\n#3;greeting"
80000134-8 = "[s] \"잘 지냈어, 미요?\""
80000134-9 = "3;미요;08;소, 소설이 잘 안 써진다는 것 말고는 다 괜찮아요."
80000134-10 = "3;미요;09;밀수 작전 계획안은 어쩐지 쓸데없이 술술 나오지만…….\n#fontsize;40\n#3;em;[한숨]"
80000134-11 = "[s] \"응?\""
80000134-12 = "3;미요;21;그, 그나저나 죄송해요."
80000134-13 = "3;미요;33;제가 찾아뵀어야 했는데, 최근 일시적으로 외출 규정이 엄격해져서…….\n#3;em;[속상함]"
80000134-14 = "[s] \"괜찮아. 미요의 초대라면 언제든 환영인걸.\""
80000134-15 = "3;미요;08;저, 정말요? 헤헤……. \n#3;em;[반응]"
80000134-16 = "[s] \"무엇보다 초대를 거절하면 납치당할지도 모르니까…….\""
80000134-17 = "3;미요;24;무, 무슨 흉흉한 말씀이세요! 그런 거 안 해요!\n#3;em;[스팀]\n#3;hophop"
80000134-18 = "3;미요;04;가능은 하지 않느냐고요? 그야 일단 제반 변수들을 고려해 봐야 하지만……."
80000134-19 = "#st;[0,0];instant;1;"
80000134-20 = "#clearST"
80000134-21 = "3;미요;04\n#3;em;[…]\n#wait;2500"
80000134-22 = "3;미요;15;……이 아니라! 제가 그런 걸 왜 하겠어요?!\n#3;hophop"
80000134-23 = "3;미요;19;흐우우…….\n#3;em;[한숨]"
80000134-24 = "[s] \"그런데, 뭘 만들고 있던 거야?\""
80000134-25 = "3;미요;02;아, 이건…….\n#3;em;[반응]"
80000134-26 = "3;미요;36; ……선생님께 드릴 티라미수를 만들던 중이었어요."
80000134-27 = "[s] \"티라미수……?\""
80000134-28 = "3;미요;03;예. 오늘 발렌타인 데이잖아요."
80000134-29 = "3;미요;08;그래서 선생님 오실 시간에 딱 맞춰서 완성하려 했는데, 어쩐지 조금 오래 걸려 버려서…….\n#3;em;[땀]\n#3;stiff"
80000134-30 = "3;미요;19;처음 만들어보는 것이기도 하고……."
80000134-31 = "[s] \"그럼 같이 마저 만들어볼까?\""
80000134-32 = "3;미요;02;괘, 괜찮아요! \n#3;em;[!]\n#3;jump"
80000134-33 = "3;미요;08;이, 이제 거의 다 했으니까요!"
80000134-34 = "3;미요;03;커피에 적신 핑거 쿠키와 마스카포네 치즈를 층층이 쌓는 작업……은 끝났고…….\n#3;m4\n#3;greeting"
80000134-35 = "3;미요;02;이제 이 위에 코코아 파우더만 뿌리면……."
80000134-36 = "#st;[0,0];instant;1;"
80000134-37 = "#clearST"
