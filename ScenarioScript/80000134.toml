80000134-58 = "#st;[0,0];instant;1;"
80000134-59 = "#clearST"
80000134-60 = "[ns] \"맛있어 보여……!\""
80000134-61 = "3;미요;03;헤, 헤헤, 고마워요, 선생님.\n#3;em;[음표]"
80000134-62 = "3;미요;02;저, 저기, 그런데……."
