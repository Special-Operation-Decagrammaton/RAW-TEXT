[translation]
80000134-1 = "恰到好處的提拉米蘇"
80000134-2 = "（受到美代的邀請，前往了狂獵的宿舍）"
80000134-3 = "（由於他精準告知了舍監隊檢查最鬆懈的時段，進入時也比平常更加順利）"
80000134-4 = "特殊交易部的宿舍"
80000134-7 = "歡迎你來，老師。"
80000134-8 = "[s] 「美代，最近過得好嗎？」"
80000134-9 = "除，除了小說寫不太出來以外都還好。"
80000134-10 = "雖然走私行動的計畫書，總是莫名寫得特別順就是了……"
80000134-11 = "[s] 「嗯？」"
80000134-12 = "那，那個……不好意思。"
80000134-13 = "本來應該由我去找老師才對，可是最近外出的規定變得比較嚴格……"
80000134-14 = "[s] 「沒關係。如果是美代的邀請，我隨時都很歡迎。」"
80000134-15 = "真，真的嗎？嘿嘿……"
80000134-16 = "[s] 「畢竟要是拒絕邀請的話，搞不好會被綁架……」"
80000134-17 = "請，請別說這種嚇人的話！我才不會做那種事呢！"
80000134-18 = "問我有沒有可能是嗎？#n那得考慮各種變數之後才能……"
80000134-22 = "……不對！我為什麼要做那種事情呢！？"
80000134-23 = "唉……"
80000134-24 = "[s] 「話說回來，你在做什麼呢？」"
80000134-25 = "啊，這個是……"
80000134-26 = " ……我正在做要送給老師的提拉米蘇。"
80000134-27 = "[s] 「提拉米蘇……？」"
80000134-28 = "是的。今天不是情人節嗎？"
80000134-29 = "原本想剛好在老師抵達時完成的，結果不知道為什麼多花了一點時間……"
80000134-30 = "因為這也是我第一次做……"
80000134-31 = "[s] 「那要不要一起把剩下的做完？」"
80000134-32 = "沒，沒關係！"
80000134-33 = "已，已經快完成了！"
80000134-34 = "把浸泡過咖啡的手指餅乾，以及馬斯卡彭起司一層層疊起來的作業已經完成了……"
80000134-35 = "現在只要在上面撒上可可粉……"
80000134-41 = "老師。"
80000134-42 = "[s] 「嗯？」"
80000134-43 = "在雪白的馬斯卡彭起司上面，像這樣撒上黑色的可可粉……"
80000134-44 = "是不是很像在白紙上寫字呢？"
80000134-45 = "[s] 「嗯，確實很像呢。」"
80000134-46 = "我有時會覺得……"
80000134-47 = "寫作這件事情，會不會就是用各自的方式弄髒白紙呢……"
80000134-48 = "嗯，大概就是這種想法……"
80000134-53 = "那，那個，總之……！"
80000134-57 = "完，完成了哦，老師！"
80000134-60 = "[ns] 「看起來好好吃……！」"
80000134-61 = "嘿，嘿嘿，謝謝你。"
80000134-62 = "那，那個，可是……"
80000134-63 = "[s] 「嗯？」"
80000134-69 = "其，其實我也是今天才知道……#n剛做好的提拉米蘇，在冷藏兩個小時之後會變得更好吃。"
80000134-70 = "所，所以……"
80000134-71 = "如，如果老師不介意的話……"
80000134-72 = "[s] 「兩個小時的話，我完全沒問題的。」"
80000134-73 = "真，真的嗎！？謝謝你，老師！"
80000134-74 = "那我去幫你泡茶。"
80000134-75 = "洋甘菊茶可以嗎？"
80000134-77 = "（就這樣和美代一邊喝茶一邊聊天，度過了兩個小時）"
80000134-78 = "（兩個小時品嘗的提拉米蘇，真的是夢幻般的美味）"
