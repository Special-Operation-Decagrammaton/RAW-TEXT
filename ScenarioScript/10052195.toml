[translation]
10052195-3 = "คุณ... ครู..."
10052195-4 = "[s] \"เอมิ!!!\""
10052195-5 = "ฮุฮุ... คุณครูก็ดูไม่ได้เลยเหมือนกันนะ..."
10052195-6 = "ฉันเป็นยังไงบ้างน่ะเหรอ?"
10052195-7 = "..."
10052195-8 = "ถ้าเป็นปกติฉันคงตอบว่าไม่เป็นไร และตอนนี้ก็อยากตอบแบบนั้นเหมือนกัน แต่ว่า..."
10052195-9 = "ขอโทษนะ ฉัน... ไม่ค่อยไหวน่ะ"
10052195-10 = "[ns] \"...!\""
10052195-11 = "มันเริ่มส่องแสงเจิดจ้าแล้ว..."
10052195-12 = "สิ่งปลูกสร้างขนาดยักษ์นั่น... มันมีอะไรแปลกๆ นะ"
10052195-13 = "ฉันรู้สึกเหมือนกับว่า... มันกำลังพรากพละกำลังและความมีชีวิตชีวาไปจากเราอย่างนั้นละ"
10052195-14 = "ราวกับว่ามันจะเปลี่ยนทุกอย่างในชั่วพริบตาเลย"
10052195-18 = "อ่า"
10052195-21 = "ขอโทษนะ... คุณครู"
10052195-22 = "ขอโทษที่พวกเรา... อ่อนแอเกินไป..."
10052195-26 = "[ns1] \"...!!!\"\n[ns2] (จากนี้... เราทำอะไรไม่ได้แล้วจริงๆ เหรอ...)"
10052195-29 = "ไม่ได้นะ... ไม่ได้...! ขอร้องละ คุณครู...!"
10052195-30 = "คุณครู... เคย์... ทุกคน..."
10052195-31 = "ขอร้องละค่ะ... จะใครหรืออะไรก็ได้..."
10052195-32 = "ถ้ามีอะไรที่อาริสึยังพอทำได้ละก็...!"
10052195-36 = "หืม...?"
10052195-38 = "ที่นี่มัน...? ที่ไหนกัน...? แล้วคุณครูล่ะ...?"
10052195-39 = "ในที่สุดก็มาถึงที่นี่แล้วสินะ"
10052195-41 = "นั่นใคร... คะ? แล้วนี่มันที่ไหนกัน...?"
10052195-42 = "แล้วคุณครูล่ะ...? คนอื่นก็ด้วย..."
10052195-43 = "นะ... นั่นสิคะ! ถ้าเป็นแบบนี้ละก็ ทุกคนจะ...!"
10052195-44 = "ฉันเข้าใจ แต่อย่างน้อยตอนนี้ก็วางใจก่อนเถอะ เรื่องนั้นฉันรับรองให้ได้"
10052195-45 = "ก่อนอื่นช่วยลองฟังเรื่องนี้ก่อนนะ เคยคิดถึงจุดเริ่มต้นของทุกสิ่งทุกอย่างบ้างหรือเปล่า?"
10052195-46 = "?!"
10052195-47 = "อย่างเช่น เรามาจากที่ไหน? จุดประสงค์ของเราคืออะไร?"
10052195-48 = "เมื่อกระบวนการทุกอย่างจบสิ้นแล้ว เราจะไปที่ไหนต่อ?"
10052195-50 = "'สิ่งที่เรียกว่าเทพ บางทีอาจเป็นเพียงกฎเกณฑ์ที่ถูกสร้างขึ้นมาเพื่อผู้ที่เคารพศรัทธาก็ได้' ..."
10052195-51 = "ยังจำได้สินะ ค่อยยังชั่วหน่อย"
10052195-52 = "และเพราะอย่างนั้น สิ่งที่สำคัญอย่างแท้จริงก็คือ พวกคุณเป็นใคร และจะเลือกทำอะไรนับจากนี้เป็นต้นไป"
10052195-53 = "อาริสึ ท่านธิดาแห่งทวยเทพไร้นาม และเคย์ ผู้เป็นหญิงรับใช้และกุญแจ"
10052195-54 = "อาริสึ... ไม่ใช่ธิดาอีกต่อไปแล้วค่ะ อาริสึคือ..."
10052195-55 = "ฉันรู้ แต่ถึงกระนั้นฉันก็จำเป็นต้องหยิบยกเรื่องตัวตนที่แท้จริงและคุณสมบัติของคุณขึ้นมาพูด"
10052195-56 = "...?"
10052195-57 = "ฉันจะบอกให้เอง ถ้าพูดตามประสาคนยุคนี้ ก็ต้องบอกว่าคุณคือสิ่งที่ทำหน้าที่ทั้งส่งต่อ และขยายพลังออกไปในเวลาเดียวกัน"
10052195-58 = "ทำหน้าที่ส่งต่อ...? แล้วก็ขยายพลังด้วยเหรอคะ...?"
10052195-59 = "..."
10052195-60 = "ใช่แล้วละ คุณคือท่านธิดาแห่งทวยเทพไร้นามผู้มายังโลกที่ทวยเทพไร้นามจะควบคุมในแบบที่มัน#nควรจะเป็น"
10052195-61 = "ตอนนี้นักบวชเหล่านั้นได้เตรียมการที่จะเปลี่ยนแปลงทุกสรรพสิ่งใน[ruby=คิโวทอส]ที่แห่งนี้[/ruby]แล้ว"
10052195-62 = "ส่วนกุญแจแห่งทวยเทพไร้นามที่ได้ชื่อว่าเคย์"
10052195-63 = "ก็คืออุปกรณ์ที่ถูกเตรียมไว้ล่วงหน้า เพื่อให้ท่านธิดาแห่งทวยเทพไร้นามทำหน้าที่เป็นเครื่องมือนั้นได้"
10052195-64 = "อะ... อาริสึ... แต่ว่าอาริสึเป็น...!"
10052195-65 = "ชิ..."
10052195-66 = "แน่นอนว่าแผนการนั้นไม่อาจดำเนินการได้ เพราะคุณถอยออกมาจากตำแหน่งนั้นเอง"
10052195-67 = "ส่วนกุญแจก็ตัดสินใจที่จะลืมเรื่องของตัวเองไปบางส่วน"
10052195-68 = "แต่สิ่งสำคัญก็คือ ในตอนนี้เส้นทางสู่การตื่นรู้ครั้งใหม่ได้เปิดขึ้นอีกครั้งสำหรับคุณทั้งสองแล้ว"
10052195-69 = "การตื่นรู้ครั้งใหม่มันคืออะไรกันเหรอคะ?"
10052195-70 = "หรือว่า...?!"
10052195-71 = "ใช่แล้วละ ตอนนี้ในคิโวทอสกำลังเกิดปรากฏการณ์ที่ยิ่งใหญ่และลึกลับที่เรียกว่าดินแดนเหล็กกล้า"
10052195-72 = "การที่ฉันติดต่อสื่อสารกับพวกคุณทั้งสองได้ในรูปแบบนี้ ก็ถือเป็นการต่อยอดจากสิ่งนั้นเหมือนกัน"
10052195-73 = "ตราบใดที่ดินแดนเหล็กกล้าแห่งนี้ยังคงอยู่ อาริสึ คุณก็ไม่ใช่เพียงตัวส่งต่อ และเครื่องขยายพลังตามบทบาทเดิมอีกต่อไปแล้ว"
10052195-74 = "คุณอาจก้าวไปถึงตำแหน่งของเทพไร้นามได้เลยด้วยซ้ำ"
10052195-75 = "ว่าไงนะคะ? อาริสึ... ในตำแหน่งของเทพเหรอคะ? แล้วถ้าเป็นแบบนั้น... จะเกิดอะไรตามมาคะ?"
10052195-76 = "คุณก็จะได้เป็นเทพยังไงล่ะ"
10052195-77 = "คุณจะได้กลับคืนสู่ตัวตนที่แท้จริงของคุณ และได้บรรลุเป้าหมายมากมายจากจุดที่มีอำนาจรอบด้าน"
10052195-78 = "นั่นก็เพราะเดิมทีแล้ว พลังของทวยเทพไร้นามนั้นหมายถึง 'พลังแห่งความเป็นไปได้'"
10052195-79 = "มันก็เลยไม่ได้พิเศษอะไรมากมายนัก"
10052195-80 = "แล้วมันก็ยังเป็นพลังที่ทุกคนที่ใช้ชีวิตในตอนนี้ล้วนมีอยู่ในตัวเอง แม้จะเพียงเล็กน้อยก็ตาม"
10052195-81 = "แต่ถึงอย่างนั้นมันก็สามารถทำให้เทพจอมปลอมอย่างเดคาแกรมมาทอนกลายเป็น 'สิ่งที่ไม่เคยมีอยู่ตั้งแต่แรก' ได้ด้วยการขยับนิ้วเพียงแค่ครั้งเดียว"
10052195-82 = "และคุณก็จะพาเพื่อนๆ เคย์ รวมถึงคุณครูของคุณไปสู่สวรรค์ได้โดยไร้ข้อจำกัดเรื่องคุณสมบัติ และข้อบังคับ"
10052195-83 = "แล้วก็ไม่ต้องมีการเสียสละเพื่อให้ได้สิ่งนั้นมาเหมือนอย่างในอดีตด้วย คุณแค่ต้องยอมรับมันก็พอ"
10052195-84 = "แล้วถ้าเป็นแบบนั้น อาริสึในตอนนี้... จะเป็นยังไงเหรอคะ?"
10052195-88 = "พอจะเดาได้สินะ ใช่แล้วละ เมื่อได้กลับคืนสู่ตัวตนที่แท้จริงของคุณละก็"
10052195-89 = "เทนโด อาริสึในตอนนี้ก็จะไม่มีตัวตนอีกต่อไป"
10052195-90 = "!!!"
10052195-91 = "..."
10052195-92 = "แต่เทนโด อาริสึเป็นแค่ผลลัพธ์ที่เกิดขึ้นโดยบังเอิญ"
10052195-93 = "ถ้าแลกสิ่งนั้นกับสรวงสวรรค์ได้ ก็น่าจะเป็นทางเลือกที่น่าพิจารณาไม่ใช่หรือ?"
10052195-94 = "แต่ถ้าอาริสึหายไป... ทุกคนและคุณครูจะไม่เสียใจเหรอคะ...?"
10052195-95 = "ปัญหานั้นง่ายดายอยู่แล้ว คุณแค่ต้องลบความทรงจำเกี่ยวกับตัวคุณออกจากทุกคน"
10052195-96 = "พูดอะไรอย่างนั้นน่ะ!!!"
10052195-97 = "...!"
10052195-98 = "เราไม่อาจมีความรู้สึกต่อสิ่งที่ไม่เคยมีอยู่ตั้งแต่แรกอยู่แล้ว"
10052195-99 = "การทำให้ทุกคนมีความสุข ไม่ใช่ทัศนคติและเป้าหมายของคุณหรอกเหรอ?"
10052195-100 = "แต่ว่า...!"
10052195-101 = "..."
10052195-102 = "อาริสึ...?"
10052195-108 = "ไม่อยากได้ค่ะ"
10052195-109 = "อาริสึ ไม่อยากได้อะไรแบบนั้นค่ะ"
10052195-111 = "อาริสึ!"
10052195-116 = "เป็นคำตอบที่น่าตกใจเลยนะ ฉันขอถามเหตุผลจะได้หรือเปล่า?"
10052195-117 = "สวรรค์คือที่ที่เราทุกคนจะได้ไปถึงในสักวันอยู่แล้วค่ะ แล้วที่นั่นก็ไม่จำเป็นต้องมีอำนาจเบ็ดเสร็จ หรือปาฏิหาริย์อะไรด้วยค่ะ"
10052195-118 = "ต่อให้จะไปไม่ถึงสวรรค์ ต่อให้พวกเราทุกคนต้อง... เผชิญกับผลลัพธ์ที่น่าเศร้าในที่สุด"
10052195-122 = "แต่คุณครูก็เคยพูดไว้ว่าถ้าผลลัพธ์เป็นอย่างนั้น เราก็ต้องยอมรับมัน"
10052195-123 = "ตอนนั้นอาริสึยังไม่เข้าใจสิ่งที่คุณครูพูด... แต่ตอนนี้อาริสึเหมือนจะเข้าใจแล้วค่ะ"
10052195-124 = "ใช่แล้วค่ะ อาริสึ! พูดได้ดีเลยค่ะ!"
10052195-125 = "การทำให้คิโวทอสกลับสู่โลกเดิม อาจเป็นเรื่องที่ยิ่งใหญ่ก็ได้ค่ะ"
10052195-126 = "การที่ทุกคนได้ตัวตนของตัวเองคืนมา ก็คงเป็นเรื่องยิ่งใหญ่ไม่ต่างกันค่ะ"
10052195-127 = "แต่นั่นก็ไม่ใช่สิ่งที่เราบรรลุได้ด้วยกำลังของตัวเองค่ะ มันก็เหมือนการใช้โปรแกรมโกงเพื่ออัปเลเวล#nอย่างไม่ถูกต้องค่ะ"
10052195-128 = "การเล่นเกมก็ไม่ได้เป็นอย่างนั้นค่ะ"
10052195-129 = "เราต้องค่อยๆ อัปเลเวลและใช้แต้มสกิล แล้วฝึกฝนจากระดับล่างสุดจนคล่องแคล่วในทุกด้าน"
10052195-130 = "เพราะนั่นคือวิธีที่เราจะได้สัมผัสถึงความสนุกและความภาคภูมิใจที่แท้จริงได้ในที่สุดยังไงล่ะคะ"
10052195-131 = "อาริสึเชื่อว่าต่อให้จะไม่ใช่ตอนนี้ แต่เราก็จะไปถึงที่แห่งนั้นได้ในสักวันค่ะ"
10052195-132 = "และอาริสึก็คิดว่านั่นคือสิ่งที่มีคุณค่ากับพวกเรามากกว่าด้วยค่ะ"
10052195-133 = "อะไรที่ได้มาอย่างง่ายดาย ก็ย่อมสูญเสียไปได้ง่ายๆ เหมือนกันค่ะ เราจะเรียนรู้อะไรจากที่แห่งนั้นไม่ได้ และจะไม่มีอะไรคงอยู่ได้นานด้วยค่ะ"
10052195-134 = "แต่นั่นก็เป็นเพราะคุณได้เรียนรู้โลกผ่านการเล่นเกมไม่ใช่เหรอ?"
10052195-135 = "ใช่ค่ะ และอาริสึก็คิดว่าตัวเองโชคดีเหลือเกินค่ะ"
10052195-136 = "อาริสึก็รู้ดีค่ะว่าสิ่งที่ไม่เกิดขึ้นจะไม่มีวันเกิดขึ้น"
10052195-137 = "ตอนนี้อาริสึรู้แล้วว่าความจริงคืออะไร และบางส่วนของมันก็ช่างเย็นชาและโหดร้ายจนยากที่จะเข้าไป#nใกล้ด้วยซ้ำค่ะ"
10052195-138 = "แต่เกมไม่เป็นอย่างนั้นค่ะ มันไม่ได้ถูกสร้างมาแบบนั้น"
10052195-140 = "นั่นเป็นเพราะในเกมมีหัวใจของผู้คนที่อยากให้โลกสวยงามแบบนี้หลอมรวมอยู่ด้วยกันค่ะ"
10052195-142 = "และอาริสึก็เชื่อว่าตราบใดที่ยังมีผู้คนที่ปรารถนาให้โลกงดงาม ความหวังก็ยังคงมีอยู่ค่ะ"
10052195-144 = "เราจะได้รับรางวัลที่เหมาะสมกับความพยายาม และสมควรได้รับการเคารพอย่างเต็มที่จากการทำสิ่งนั้น"
10052195-145 = "ทุกการกระทำล้วนมีผลลัพธ์ที่ตามมา"
10052195-146 = "และอาริสึก็หวังว่าเราทุกคนจะอัปเลเวลและเก่งขึ้นได้ในสักวันค่ะ"
10052195-147 = "ถึงตอนนี้จะยังไม่เป็นแบบนั้น แต่มันจะเป็นอย่างนั้นในที่ที่เราไปถึงในที่สุดแน่นอนค่ะ"
10052195-148 = "นั่นก็เพราะว่า อาริสึ..."
10052195-154 = "รักทุกคนยังไงล่ะคะ"
10052195-155 = "ทุกคนในมิลเลเนียม ทุกคนในคิโวทอส เคย์เองก็ด้วยเหมือนกัน"
10052195-156 = "แล้วก็คุณครูด้วยค่ะ อาริสึรักทุกคนเลย"
10052195-160 = "..."
10052195-164 = "แต่ถึงยังไง อาริสึก็จะใช้พลังค่ะ!"
10052195-165 = "อาริสึ?!?!"
10052195-166 = "พูดได้น่าสนใจเลยนะ แต่คุณปฏิเสธเนื้อแท้ของตัวเองไปแล้วไม่ใช่เหรอ?"
10052195-167 = "ไม่ค่ะ! อาริสึตื่นขึ้นมาแล้วค่ะ!"
10052195-168 = "ตราบใดที่ยังอยู่เหนือปรากฏการณ์ดินแดนเหล็กกล้าแห่งนี้ อาริสึก็ยืนยันสิทธิ์ดั้งเดิมของตัวเองได้"
10052195-169 = "และอาริสึก็รู้ว่าต่อให้เป็นคุณที่อยู่ตรงนั้น ก็หยุดสิ่งนั้นไม่ได้ในตอนนี้ค่ะ!"
