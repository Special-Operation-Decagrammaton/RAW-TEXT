[translation]
10052195-3 = "老，師……"
10052195-4 = "[s] 「英美！！！」"
10052195-5 = "呵呵……老師也是，一團糟呢……"
10052195-6 = "……我嗎？"
10052195-7 = "……"
10052195-8 = "平常我可能會說自己沒事，現在也很想這麼回答……"
10052195-9 = "不過抱歉。稍微有點吃力呢。"
10052195-10 = "[ns]「……！」"
10052195-11 = "……開始發出強光了呢。"
10052195-12 = "那個巨大的構造物……感覺很不對勁。"
10052195-13 = "就像在從我們身上……奪走某種根本的力量或生命力。"
10052195-14 = "彷彿下一刻，就會將一切全部改變。"
10052195-18 = "啊。"
10052195-21 = "……對不起，老師。"
10052195-22 = "都怪我們，太弱了……"
10052195-26 = "[ns1] 「……！！！」\n[ns2] （這下真的……沒辦法了……）"
10052195-29 = "不行……不行啊……！拜託，老師……！"
10052195-30 = "老師……Kei……大家……"
10052195-31 = "拜託了……無論是誰，無論什麼都好……"
10052195-32 = "如果愛麗絲還能做點什麼的話……！"
10052195-36 = "咦……？"
10052195-38 = "這裡是……？#n老師呢……？"
10052195-39 = "終於，到達這裡了呢。"
10052195-41 = "是誰……？#n這裡到底是……？"
10052195-42 = "而且老師……還有大家人呢……？"
10052195-43 = "對，對了！再這樣下去的話，大家都會……！"
10052195-44 = "我明白。不過至少現在你可以放心。#n這點我能向你保證。"
10052195-45 = "先來聊聊這個話題吧──你有思考過一切的起點嗎？"
10052195-46 = "！？"
10052195-47 = "我們是從何而來？我們的目的為何？"
10052195-48 = "當所有過程結束之後，我們將會去向何處？"
10052195-50 = "……「所謂的神，或許是為了追隨者而存在的規律」。"
10052195-51 = "你記得呢。真是太好了。"
10052195-52 = "所以真正重要的是你們是誰，以及接下來將做出什麼樣的選擇。"
10052195-53 = "無名諸神的王女愛麗絲，以及作為其侍女和鑰匙的Kei。"
10052195-54 = "……愛麗絲，已經不是王女了。#n愛麗絲是……"
10052195-55 = "我知道。不過我似乎還是必須談及你本來的樣子與那個資格。"
10052195-56 = "……？"
10052195-57 = "讓我來告訴你吧。#n如果用現在的語言來說，你是一種中繼器和增幅器。"
10052195-58 = "中繼器……？增幅器……？"
10052195-59 = "……"
10052195-60 = "是的。你是為了作為無名諸神的王女，由那些祭司們所準備的。"
10052195-61 = "為了[ruby=奇普托斯]將這裡的[/ruby]一切，恢復成無名諸神以本來的面貌統治的世界。"
10052195-62 = "被稱為Kei的無名諸神的鑰匙也是一樣。"
10052195-63 = "是為了讓無名諸神的王女，作為工具啟動而準備的裝置。"
10052195-64 = "愛，愛麗絲是……但是，愛麗絲……！"
10052195-65 = "嘖……"
10052195-66 = "當然那個計畫並沒有被執行。因為你主動放棄了自己的位置。"
10052195-67 = "並且鑰匙也決定忘卻自己的一部分。"
10052195-68 = "然而最重要的是──此刻，你們兩位獲得了再覺醒的選項。"
10052195-69 = "再覺醒是什麼意思？"
10052195-70 = "難道說……！？"
10052195-71 = "是的。現在的奇普托斯，出現了鋼鐵大陸這個巨大的神祕現象。"
10052195-72 = "我能以這種形式與兩位交流，也可以說是這個現象的延伸。"
10052195-73 = "只要這個鋼鐵大陸存在……愛麗絲，你就能超越原本作為中繼器和增幅器的角色。"
10052195-74 = "甚至可以觸及無名之神本身的位置。"
10052195-75 = "咦？愛麗絲，變成神……？#n那樣一來……會怎麼樣呢？"
10052195-76 = "你將名副其實地成為神。"
10052195-77 = "回歸真正的自我，以全知全能的立場實現許許多多的事。"
10052195-78 = "無名諸神之力，本來就意味著「可能性的力量」。"
10052195-79 = "因此它其實並不是多麼特別的東西。"
10052195-80 = "就連活在當下的每個人，都或多或少在心裡懷抱著這股力量。"
10052195-81 = "像十字神名那種神的仿製品，只要動動手指就能讓它「從一開始就不存在」。"
10052195-82 = "而你的朋友們、Kei，甚至是老師，都能突破資格與規則的限制，將其引導至天國。"
10052195-83 = "想要獲得這股力量，也不必付出像以前那種犧牲──你只需要接受就可以了。"
10052195-84 = "可是那樣的話，現在的愛麗絲……會變成什麼樣子呢？"
10052195-88 = "看來你已經察覺到了呢。#n沒錯，當你回歸本來的樣子時──"
10052195-89 = "現在名為天童愛麗絲的可能性，也將不復存在。"
10052195-90 = "！！！"
10052195-91 = "……"
10052195-92 = "然而，天童愛麗絲只是偶然產生的結果。"
10052195-93 = "若能將其作為代價換來樂園，難道不是一個值得考慮的選項嗎？"
10052195-94 = "可是如果大家……如果老師知道愛麗絲消失的話，應該會有一點點傷心吧……？"
10052195-95 = "那也是個簡單的問題。#n只要從大家的記憶之中，刪除關於你的記憶就行了。"
10052195-96 = "你在胡說什麼！！！"
10052195-97 = "……！"
10052195-98 = "對於自始至終都不存在的東西，不可能會產生感情。"
10052195-99 = "讓所有人獲得幸福，不正是你的態度與目標嗎？"
10052195-100 = "可是……！"
10052195-101 = "……"
10052195-102 = "愛麗絲……？"
10052195-108 = "不需要。"
10052195-109 = "愛麗絲不需要那種東西。"
10052195-111 = "愛麗絲！"
10052195-116 = "真是個令人驚訝的回答呢。#n可以告訴我你的理由嗎？"
10052195-117 = "因為樂園──是我們大家終有一天能夠抵達的地方。#n不需要絕對的力量，也不需要所謂的奇蹟。"
10052195-118 = "即便出了什麼萬一，最終沒能抵達樂園……所有人都面臨了悲傷的結局。"
10052195-122 = "老師他曾經這麼說過──如果那是我們的結局，就應該接受它。"
10052195-123 = "當時愛麗絲還不太理解老師的意思……不過現在，似乎能夠明白了。"
10052195-124 = "說得對，愛麗絲！說得太好了！"
10052195-125 = "把奇普托斯恢復成以前的世界，或許是件非常了不起的事。"
10052195-126 = "讓大家找回各自原本的模樣，可能也是如此。"
10052195-127 = "但是，那並不是靠我們自己的力量實現的。#n就跟用[ruby=Cheat Engine]作弊引擎[/ruby]強行提升等級一樣。"
10052195-128 = "遊戲的設計，並不是那樣做的。"
10052195-129 = "漸漸提升等級、分配技能點數、從基礎開始一點點地熟悉……"
10052195-130 = "這樣才能感受到所有的樂趣和成就感。"
10052195-131 = "所以愛麗絲相信──就算不是現在，我們也終有一天會抵達那裡。"
10052195-132 = "同時我也認為，那對我們來說才是真正有價值的事。"
10052195-133 = "輕易獲得的東西，往往也會輕易失去。#n從那之中學不到任何東西，也無法長久延續下去。"
10052195-134 = "可是你之所以會產生這種想法，不是因為你是藉由遊戲學習世界的嗎？"
10052195-135 = "沒錯。所以愛麗絲真的覺得自己很幸運。"
10052195-136 = "愛麗絲也知道。不會發生的事情就是不會發生。"
10052195-137 = "同時也已經明白，所謂的現實究竟是什麼。#n也知道在那之中，存在某些殘酷且難以接近的部分。"
10052195-138 = "可是遊戲跟現實不一樣。它的設計並不是那樣的。"
10052195-140 = "因為在遊戲之中，蘊含著人們「希望世界變得如此美好」的心意。"
10052195-142 = "並且，只要期望世界變得美好的人還在，希望就不會消失。"
10052195-144 = "付出努力就會得到回報，並獲得應有的尊重──"
10052195-145 = "只要付諸行動，就必定會產生相應的結果──"
10052195-146 = "以及有朝一日能夠升級，讓自己變得更好的這股希望。"
10052195-147 = "即使現在並非如此，在終將抵達的那個地方也一定會的。"
10052195-148 = "因為愛麗絲──"
10052195-154 = "愛著這一切。"
10052195-155 = "無論是千年的大家、奇普托斯的所有人、Kei……"
10052195-156 = "還有老師也是。愛麗絲深深愛著這一切。"
10052195-160 = "……"
10052195-164 = "不過，我還是會使用這股力量！"
10052195-165 = "愛麗絲！？！？"
10052195-166 = "這話還真有趣呢。#n你不是已經拒絕了自己的本質嗎？"
10052195-167 = "不！愛麗絲明白了！"
10052195-168 = "在現在這個名為鋼鐵大陸的現象上，愛麗絲可以主張愛麗絲本來的權利。"
10052195-169 = "並且就連你也無法阻止！"
10052195-170 = "等等，這樣行的通嗎……如果先這樣再那樣，然後……"
10052195-171 = "！！！"
10052195-175 = "……你已經理解到那個程度了呢。"
10052195-176 = "那麼你應該也明白，在不具備王女資格的情況下使用那股力量的結果了吧。"
10052195-177 = "即便如此，你還是想做出那個選擇嗎？"
10052195-178 = "是的。無論要問多少次，愛麗絲都會做出相同的選擇。"
10052195-179 = "就像老師為我們示範的一樣！"
10052195-180 = "在那之後，你將淪落成一個普通的學生。"
10052195-181 = "並且耗盡所有留在你身上的可能性。"
10052195-182 = "這也意味著……你將忘卻在這裡看到、聽到、領悟到的一切。"
10052195-183 = "因為忘卻，是你們能夠留在這裡最重要的基本條件。"
10052195-184 = "我知道。不過，那對愛麗絲來說並不是那麼重要。"
10052195-185 = "你將會成長。"
10052195-186 = "是的。愛麗絲會成長！"
10052195-187 = "你將承受痛苦。"
10052195-188 = "那確實有點可怕……不過我會盡可能忍耐！"
10052195-189 = "你必須接受自己將從如今這種更加美好的存在，降格為不完整的存在。"
10052195-190 = "愛麗絲不認為那是不完整的。"
10052195-191 = "與那所有的可能性和榮耀相比，對愛麗絲來說現在這一刻……"
10052195-192 = "Kei和其他所有人。"
10052195-193 = "還有老師。"
10052195-194 = "比愛麗絲能想像的任何東西都更加珍貴。"
10052195-195 = "重要的並不是奇蹟、力量或權威。"
10052195-196 = "而是我們相信彼此、謹慎前進的每一步。"
10052195-197 = "沒錯沒錯！怎麼樣，我們愛麗絲很了不起吧！"
10052195-198 = "所以我要使用了。"
10052195-199 = "愛麗絲第一次，也是最後一次可以主張的──愛麗絲的權能！"
10052195-203 = "我明白了，那就這麼做吧。#n並且，請展現給我看吧。"
10052195-204 = "藉由拒絕奇蹟而抵達奇蹟的奇蹟。"
10052195-205 = "愉快。真令人愉快。"
10052195-206 = "如此有趣而愉快的結論……"
10052195-207 = "並不會以王女──不，以愛麗絲的妄想或徒勞告終，請展現給我看吧。"
10052195-208 = "向我證明並肩前行的步伐，最終將能如你所說，抵達地平線的彼端吧。"
10052195-209 = "那麼，你想用這完整歸還於你的、僅此一次的權能來實現什麼呢？"
10052195-211 = "愛麗絲希望，能將愛麗絲的朋友們……"
10052195-212 = "我知道你想說什麼。#n然而，唯獨那件事是不可能的。"
10052195-214 = "……是的。因為神祕無法干涉沒有神祕的存在。"
10052195-215 = "…………就算老師他，遭遇了愛麗絲實在不想想像的事情。"
10052195-216 = "愛麗絲也無法將其逆轉……或者重新開始。"
10052195-217 = "那麼我再問你一次──你想實現什麼呢，愛麗絲？"
10052195-218 = "真是個有趣的問題呢！你不是已經知道了嗎？"
10052195-219 = "……確實如此呢。是我多此一舉了。"
10052195-220 = "謝謝你，不知名的人！"
10052195-221 = "不必客氣。我也感到相當喜悅和新鮮呢。#n那麼，我們是時候該告別了。"
10052195-222 = "從此以後，你我想必不會再見面了吧。"
10052195-223 = "即便追隨者們永遠詛咒你為背叛者……"
10052195-224 = "我也想告訴你，我真心享受著這所有的過程。"
10052195-225 = "再見了，愛麗絲。#n願你將來的旅途與好運相伴。"
10052195-226 = "嗯！再見！愛麗絲也會一直全力以赴的！"
10052195-231 = "還有……應該已經猜到我是誰的Kei也是。"
10052195-232 = "……好吧。我會把這件事帶進墳墓裡的。"
10052195-233 = "你能夠理解這點，我就放心了。"
10052195-234 = "那麼，現在真的該告別了。"
10052195-235 = "沒事的。不需要擔心。"
10052195-236 = "我們總有一天會再見面的。"
10052195-243 = "[ns] 「咦……？」"
10052195-244 = "……？"
10052195-245 = "剛才……明明已經……"
10052195-246 = "都以為要不行了，為什麼會……？"
10052195-247 = "愛麗絲？你沒事吧？"
10052195-249 = "是的！愛麗絲沒事！而且Kei也是……"
10052195-250 = "接下來，一切都會沒事的！"
10052195-251 = "什麼……！？"
10052195-256 = "[log=아리스 결전 비무장]你好！[wa:1130]我是天童愛麗絲！[/log]"
10052195-257 = "[wa:1800][log=아리스 결전 비무장]是遊戲開發部的成員！[/log]"
10052195-262 = "[log=아리스 결전 비무장]最近開始學習寫程式，[/log]"
10052195-263 = "[wa:2230][log=아리스 결전 비무장]簡單的程式設計也[wa:1130]能做到了！[/log]"
10052195-268 = "[log=아리스 결전 비무장]而且，[wa:960]雖然是見習，但也是勇者！[/log]"
10052195-273 = "[log=아리스 결전 비무장]勇者……[wa:1080]雖然沒有什麼[wa:1690]特別擅長的事。[wa:80][/log]"
10052195-278 = "[log=아리스 결전 비무장]不過，[wa:790]是個能和大家一起鼓起勇氣，[wa:80][/log]"
10052195-279 = "[wa:1910][log=아리스 결전 비무장]向著地平線的彼方[wa:960]踏上旅程的職業！[/log]"
10052195-284 = "[log=아리스 결전 비무장]所以，[wa:920]愛麗絲直到最後的最後[wa:1550]都絕對不會放棄！[/log]"
10052195-287 = "愛麗絲……！"
10052195-288 = "請再忍耐一下，Kei！#n讓他清楚看看我們到底是什麼吧！"
10052195-289 = "這是……？這個神聖，這個神祕……！"
10052195-290 = "Kei，你想成為什麼！"
10052195-291 = "咦，咦咦！？"
10052195-292 = "試著想像吧！想像是不會輸給任何東西的！"
10052195-293 = "想要成為的自己、最強的自己，什麼都可以！"
10052195-294 = "想像一個面對任何人都不會羞愧的……屬於Kei自己的Kei吧！"
10052195-295 = "我，我是……！"
10052195-296 = "！？"
10052195-302 = "[log=케이 교복 무소속]……我明白了，[wa:1140]愛麗絲。[/log]"
10052195-303 = "[log=케이 교복 무소속][wa:1500]我會試試看。[/log]"
10052195-308 = "[log=케이 교복 무소속]搜索可用資源──[/log]"
10052195-309 = "[log=케이 교복 무소속][wa:1620]完成，[wa:970]無形物。[/log]"
10052195-314 = "[log=케이 교복 무소속]擴大可用資源領域[wa:1860]。[/log]"
10052195-315 = "[log=케이 교복 무소속][wa:1170]完成，[wa:1100]構造物「鋼鐵大陸」的所有情報體。[/log]"
10052195-320 = "[log=케이 교복 무소속]有缺陷的供品。[/log]"
10052195-321 = "[log=케이 교복 무소속][wa:40][wa:1180]結構變更[wa:1300]與轉換開始。[wa:40][/log]"
10052195-327 = "[log=아리스 결전 비무장]千年的勇者，[wa:1490]愛麗絲在此宣言！[/log]"
10052195-332 = "[log=아리스 결전 비무장]我們將攜手[wa:1690]向前邁進，[/log]"
10052195-333 = "[log=아리스 결전 비무장][wa:1300]繼續挑戰極限！[/log]"
10052195-338 = "[log=아리스 결전 비무장]即使不被理解，[wa:1960]愛麗絲也沒關係。[/log]"
10052195-343 = "[log=아리스 결전 비무장]愛麗絲，[wa:1030]只會把愛麗絲相信是正確的事，[/log]"
