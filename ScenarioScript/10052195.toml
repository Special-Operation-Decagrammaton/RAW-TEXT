[translation]
10052195-3 = "S-Sensei..."
10052195-4 = "[s] \"EIMI!!!\""
10052195-5 = "Fufu. Look at you. You're a mess, Sensei."
10052195-6 = "...You want to know if I'm okay?"
10052195-7 = "..."
10052195-8 = "I'd normally respond automatically: yes. I wish I could now."
10052195-9 = "Sorry, Sensei. I guess I'm the mess here."
10052195-10 = "[ns] \"...!\""
10052195-11 = "...It's so...bright."
10052195-12 = "It's that giant structure... It's...unnatural."
10052195-13 = "It's sucking away our strength...even our life..."
10052195-14 = "I feel as if something's about to shift."
10052195-18 = "Ah."
10052195-21 = "...Sorry, Sensei."
10052195-22 = "We weren't strong enough, in the end..."
10052195-26 = "[ns1] \"...!!!\"\n[ns2] \"(I don't have any other choice now.)\""
10052195-29 = "No... No...! Please, Sensei...!"
10052195-30 = "Sensei... Kei... Everyone..."
10052195-31 = "Please... Something, anything..."
10052195-32 = "If there is anything, ANYTHING I can do...!"
10052195-36 = "Where..."
10052195-38 = "...is this? Where did Sensei go?"
10052195-39 = "At last, you have arrived."
10052195-41 = "Do you know us? Who are you? And where are we?"
10052195-42 = "More importantly, where's Sensei...? And everyone else...?"
10052195-43 = "Y-Yes! With things the way they are, while we are here, everyone will...!"
10052195-44 = "Worry not. I promise you, for the time being, your friends are safe."
10052195-45 = "Allow me to ask you something. Have you ever stopped to consider the origin of all things?"
10052195-46 = "What?!"
10052195-47 = "Where did we come from? What is our purpose?"
10052195-48 = "What happens after the end of everything?"
10052195-50 = "...Perhaps god is, in a way, a discipline for its followers."
10052195-51 = "So you remember. I am glad."
10052195-52 = "Thus, you mustn't forget who you truly are, as you continue to forge your path forward. One all your own."
10052195-53 = "Aris, princess of the Nameless Gods, and Kei, her servant and key."
10052195-54 = "...I am no longer a princess. I am now..."
10052195-55 = "As is your right. However, your origins and the authority you have been afforded in this lifetime are intricately weaved into your path."
10052195-56 = "...?"
10052195-57 = "I can explain it as—perhaps a more modern take would be to your benefit. Imagine that Kei is a relay that operates the amplifier, you, Aris."
10052195-58 = "Relay...? Amplifier...?"
10052195-59 = "..."
10052195-60 = "That was your fate. Princess of the Nameless Gods, created by the Priests."
10052195-61 = "Your objective was to restore this place, Kivotos, to the world where the Nameless Gods once ruled. Where they could once again take the mantle in their original forms."
10052195-62 = "And she who has chosen for herself the name \"Kei,\" the key to the Nameless God's power."
10052195-63 = "A tool, a device. Her objective was to unlock the powers of the Princess of the Nameless Gods when the time was ripe."
10052195-64 = "I-I am... However, I...!"
10052195-65 = "Tsk..."
10052195-66 = "Naturally, you valiant two ensured such scheming would never come to fruition. You denounced your fate of your own accord. Of your own free will."
10052195-67 = "And so did the key valiantly cast off her own destiny and fate."
10052195-68 = "However, you have come to a crossroads. The path of reawakening opens its doors to you two once again."
10052195-69 = "What will this \"reawakening\" do?"
10052195-70 = "You can't mean...?!"
10052195-71 = "Correct. The Steel Continent, a behemoth Mystic phenomenon, has manifested in Kivotos."
10052195-72 = "It is the very reason I am able to speak with you now."
10052195-73 = "And so long as this phenomenon exists, Aris possesses the limitless potential to exceed the relationship of relay and amplifier."
10052195-74 = "She herself can become a Nameless God."
10052195-75 = "A...Nameless God? What does that mean?"
10052195-76 = "You would transcend into a GOD."
10052195-77 = "You would be an omnipotent being, your desires mere playthings at your fingertips."
10052195-78 = "For the Nameless Gods claim the power of possibility."
10052195-79 = "This power. \"Possibility.\" It is nothing particularly unique."
10052195-80 = "Every living being is born with this very power, however minuscule."
10052195-81 = "Were you to ascend to your birthright...a counterfeit claiming divinity like Decagrammaton could be removed from the annals of history, so that it had never existed at all."
10052195-82 = "You would possess the power to shepherd your friends, your Kei, even Sensei of Schale, to salvation itself."
10052195-83 = "This power requires no sacrifice of you, no hardship. Only your wholehearted acceptance."
10052195-84 = "But what would happen to me? What...would happen to Tendou Aris?"
10052195-88 = "You have keen instincts. Were you to transcend to who you were meant to be..."
10052195-89 = "...the possibility of today's Tendou Aris will be wiped from existence."
10052195-90 = "That's—!!"
10052195-91 = "..."
10052195-92 = "The Tendou Aris before me... She herself is merely a product of a singular possibility, one amongst millions, is she not?"
10052195-93 = "To bring about Paradise—is that not a noble and worthy path?"
10052195-94 = "But all of my friends...and Sensei... Wouldn't they feel at least a little sad if I disappeared?"
10052195-95 = "A simple solution. Any memory of you having ever existed will be wiped from their minds."
10052195-96 = "How dare you...?!"
10052195-97 = "...!"
10052195-98 = "One cannot mourn something, or someone, that does not exist."
10052195-99 = "Was it not your heart's desire to write a happy ending for all of us here?"
10052195-100 = "But...!"
10052195-101 = "..."
10052195-102 = "Aris...?"
10052195-108 = "I do not need it."
10052195-109 = "I do not need such a thing."
10052195-111 = "Aris!"
10052195-116 = "A surprising response. And what could your reasoning be?"
10052195-117 = "Paradise is something we will all reach together, hand in hand! It is not a place that would require miracles or absolute power from us."
10052195-118 = "And even if we fail... If we never reach paradise, and our stories end in tragedy..."
10052195-122 = "As Sensei said, \"If that's how we end, then that's that.\""
10052195-123 = "I did not understand what they meant at that time...but now I believe I do."
10052195-124 = "Exactly as you said, Aris!"
10052195-125 = "It would be wonderful if we could turn Kivotos back to the way it was."
10052195-126 = "I want more than anything to help everyone regain their true forms."
10052195-127 = "But that would not be the result of our own efforts. I do not wish to use a cheat engine to level boost myself."
10052195-128 = "Games are not designed to be played that way."
10052195-129 = "You level up, one slow level at a time, learning how best to allocate your skill points. It is the struggle of mastering the gameplay from the very bottom. That is where you are meant to begin."
10052195-130 = "And it is through that experience that you will learn feelings like \"fun\" and \"fulfillment.\""
10052195-131 = "So I will continue walking this path with my friends. And we will make it there eventually."
10052195-132 = "The journey is what is valuable to us!"
10052195-133 = "Things easily gained are just as easily lost. You learn nothing, and nothing lasting will come of it."
10052195-134 = "Is that not simply a perspective you, Aris, in particular gained from learning of the world through video games?"
10052195-135 = "Yes. And I am very lucky for that."
10052195-136 = "I am not as naive as I once was. I know that there are impossible, insurmountable things in this world."
10052195-137 = "I have learned that reality can be harsh and cruel. Sometimes, it is difficult to look it in the eye."
10052195-138 = "It is not that way in the world of video games."
10052195-140 = "You see, video games are built on the hopes of those who envision a more beautiful world."
10052195-142 = "As long as people continue dreaming of how to make their world, their home, a more beautiful place, I do not see how hope can possibly die."
10052195-144 = "The hope that hard work will pay off..."
10052195-145 = "The belief in one's efforts..."
10052195-146 = "I hope that we will all continue to level up together, to grow together."
10052195-147 = "Progress will be slow, but we will get to where we need to be. Eventually."
10052195-148 = "Because I..."
10052195-154 = "...love everyone."
10052195-155 = "Everyone in Millennium, everyone in Kivotos, Kei."
10052195-156 = "And Sensei too. I love each and every person I have met on my journey."
10052195-160 = "..."
10052195-164 = "However, I shall still borrow this power!"
10052195-165 = "ARIS?!"
10052195-166 = "You have come to an interesting conclusion. Have you not already rejected that fate?"
10052195-167 = "No! I finally understand!"
10052195-168 = "Here, on this Steel Continent, I am able to claim my fate as I wish!"
10052195-169 = "And not even you can stop me!"
10052195-170 = "Let's see, would that work...? It's going to be like this, that, and..."
10052195-171 = "Ah!!"
10052195-175 = "...So quick to adapt."
10052195-176 = "I am sure you understand the consequences of claiming this power, not as the Princess of the Nameless Gods, but as Tendou Aris."
10052195-177 = "And yet you would persist?"
10052195-178 = "Yes! You may ask me again and again, but my answer will not change."
10052195-179 = "Just like Sensei has taught us!"
10052195-180 = "You will become an ordinary student."
10052195-181 = "You will no longer have any possibilities left. This will be it."
10052195-182 = "All that you have gleaned from here, even the existence of this place, will be eradicated from your memories."
10052195-183 = "For your forgetting is the prerequisite for your entrance here."
10052195-184 = "I know. But I do not care."
10052195-185 = "You will grow."
10052195-186 = "Yes. I will grow!"
10052195-187 = "Yet that growth will be painful."
10052195-188 = "I cannot pretend I am not afraid. But that does not mean I cannot endure it!"
10052195-189 = "You will descend from that of the divine to an imperfect being."
10052195-190 = "I do not consider myself imperfect. Not at all."
10052195-191 = "The things I hold close to my heart are more important than glory or power."
10052195-192 = "Kei... My friends..."
10052195-193 = "...And Sensei."
10052195-194 = "They are what is important to me. More than I ever thought possible!"
10052195-195 = "Things like miracles or power or special privileges are not what we live for."
10052195-196 = "Because what matters is that we continue to take another step forward and that we trust in each other as we push forward."
10052195-197 = "That's right! What do you think of our Aris, hm? Isn't she the best?"
10052195-198 = "Therefore, I will claim my power!"
10052195-199 = "For the first and last time, I, Tendou Aris, will claim my birthright!"
10052195-203 = "I see. And I shall bear witness."
10052195-204 = "Show me. Show me what it is to achieve a miracle by rejecting it."
10052195-205 = "Hah... How fascinating! How very interesting!"
10052195-206 = "Allow me to witness the conclusion to this chapter."
10052195-207 = "Princess... Rather, Aris. Please, prove to me that this wishful thinking is not a byproduct of naive delusions."
10052195-208 = "I would like to see it. The vision of you, reaching the promised land hand in hand with those you place your faith in. Just as you prophesized it would be."
10052195-209 = "And so, you shall restore your claim to your throne. And what is it you will accomplish with this power that is uniquely yours, Aris?"
10052195-211 = "My... My friends..."
10052195-212 = "Yes. Your noble desires shine bright. However, what is impossible is impossible."
10052195-214 = "...Yes. Because only those granted with Mystic can be helped by it."
10052195-215 = "It is the same for Sensei... If something ever happened to them..."
10052195-216 = "I would not be able to undo what has already been done."
10052195-217 = "Then I ask again. What is it you wish to accomplish, Aris?"
10052195-218 = "Heehee! I have already answered that question!"
10052195-219 = "...Fufu. I suppose you are correct. A silly question, on my part."
10052195-220 = "Thank you, strange voice!"
10052195-221 = "The gratitude is mine. You brought with you something new.#nAnd now, it is time for our farewell."
10052195-222 = "Our paths will forever run parallel, and we shall never meet again."
10052195-223 = "Those who follow you will brand you a traitor and curse you for what you have done."
10052195-224 = "However, I have enjoyed every moment of our meeting."
10052195-225 = "Farewell, Aris. May you be blessed with luck alongside your every careful step."
10052195-226 = "Thank you! Goodbye! I will do my best, no matter what!"
10052195-231 = "And to you, Kei. The sole bearer of my identity."
10052195-232 = "...I suppose I'll have to bear it all the way to my grave."
10052195-233 = "Thank you. That brings me peace."
10052195-234 = "Now then. The time of your departure is upon us."
10052195-235 = "Worry not, and go forth with valor."
10052195-236 = "And, perhaps, one day, our possibilities will converge once again."
10052195-243 = "[ns] \"Huh...?\""
10052195-244 = "...?"
10052195-245 = "I'm sure...everything was..."
10052195-246 = "I thought I was done for... How?"
10052195-247 = "Aris? Are you okay?"
10052195-249 = "Yes! I am okay! And Kei too..."
10052195-250 = "From now on, everything will be okay!"
10052195-251 = "What...?!"
