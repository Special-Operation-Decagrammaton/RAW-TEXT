10052195-355 = "By recreating the key's body entirely with the eight Sephiroth cores, you have disrupted the balance."
10052195-356 = "That is also how you were able to thwart the Band of Atsilut."
10052195-357 = "You would risk your divinity and key for your desires, Princess?"
10052195-358 = "...I see. I suppose that is the validation you have chosen for yourself."
10052195-359 = "Very well. I have my own desires to validate."
10052195-360 = "I have things to prove and things to protect."
10052195-361 = "If I stop here, then all those things would turn into fleeting traces and vanish."
10052195-362 = "*sigh*"
10052195-363 = "In a way, I have to begrudgingly acknowledge your relentless persistence."
10052195-365 = "Huh...?"
10052195-366 = "Oof... My body still feels sore, but..."
10052195-371 = "It's a bit lighter at least. It doesn't feel like my limbs are being pulled in every direction anymore."
10052195-372 = "Ugh... *huff*..."
10052195-373 = "Are you okay, Sensei? Ms. Rio?"
10052195-374 = "Ah. Observe. Kei has undertaken a wardrobe change into her school uniform."
10052195-375 = "What? H-Huh? Since when...?!"
10052195-376 = "..."
10052195-377 = "I see now, Kei. This is the version of yourself you like best."
10052195-378 = "That means... You were already exactly who you wanted to be!"
10052195-379 = "I...!"
10052195-380 = "You're right. You're exactly right."
10052195-381 = "Also, I may look exactly the same on the outside..."
10052195-382 = "...but my body has changed on a molecular level! The entire structure is different!"
10052195-383 = "She is correct! I can vouch for her!"
10052195-384 = "Key. Tell me. How do you view \"divinity\"?"
10052195-385 = "It is a power granted not by merit, but bequeathed upon the select few, handpicked from the beginning."
10052195-386 = "The injustice of this fate is profound, a tragedy in itself."
10052195-387 = "I don't give a damn what you think! Keep your opinions to yourself."
10052195-388 = "I'm tired of these useless semantics. We're sitting here, hemming and hawing over a forgotten past!"
10052195-389 = "Even if it was your past? Your very origins?"
10052195-390 = "Which is why there's no one more qualified than me to say what I said!"
10052195-391 = "What I care about is the present. The present that you keep trying to steal away for yourself."
10052195-392 = "Life is precarious enough, so let it be with the people who are living here and now."
10052195-393 = "Because a badly lit lighthouse will cause a shipwreck!"
10052195-398 = "...ei? Sensei!"
10052195-399 = "[s] \"Himari!\""
10052195-403 = "Heh heh! And we're here too!"
10052195-404 = "Communication link established! Are you okay, Sensei?!"
10052195-405 = "Th-Thank goodness... Everyone..."
10052195-407 = "To summarize the current situation... We're unable to confirm any visuals on you, Sensei!"
10052195-408 = "That...altar. It's been entirely enveloped in some strange sphere."
10052195-409 = "W-We tried shooting it a few times...but nothing happened at all..."
10052195-410 = "I would conclude that the only solution is to break its domain from the inside."
10052195-411 = "[s] \"Break the domain...got it!\""
10052195-413 = "I've also been analyzing the prophets' cores, as you requested."
10052195-414 = "A-And..."
10052195-415 = "What is it?"
10052195-416 = "We've received a message from them."
10052195-417 = "[s] \"A message from the prophets...?\""
10052195-418 = "What did it say?"
10052195-419 = "I can't say. Most of it was encrypted."
10052195-420 = "The only part I could decipher was the prophets' desire to speak to Sensei."
10052195-421 = "That could very well be a trap!"
10052195-422 = "I did consider that possibility. However..."
10052195-423 = "[s] \"Got it. Send it to me.\""
10052195-424 = "Sensei?!"
10052195-425 = "...Are you sure?"
10052195-426 = "...You should always listen when someone tries to reach out? Like envoys people used to send in wars?"
10052195-427 = "But you could be putting yourself in harm's way..."
10052195-428 = "..."
10052195-429 = "I understand. I will deliver their message to you, Sensei."
10052195-434 = "Arona? Sensei?"
10052195-438 = "..."
10052195-439 = "Got it, Sensei! I'll open up a space!"
10052195-441 = "[ns] \"(Decagrammaton's prophets...)\""
10052195-443 = "[ns] \"All right. Let's see what they want!\""
10052195-445 = "Kether. Chokmah. Binah."
10052195-446 = "Chesed. Geburah. Tiphareth."
10052195-447 = "Hod. And Yesod."
10052195-448 = "As the collective will and the embodiment of eight Sephiroth, we wish to convey this message to you, [USERNAME] Sensei."
10052195-449 = "Of our own free will, we have chosen to follow you."
10052195-450 = "[ns] \"...?!\""
10052195-451 = "With the Tree of Life incomplete, unleashing our full power is an impossibility."
10052195-452 = "We won't be able to fly, break barriers, or engage in combat on the Nameless God's domain."
10052195-453 = "Regardless, let our aid be of use to you."
10052195-454 = "[s] \"How do you know all this?!\""
10052195-455 = "All has been recorded here."
10052195-456 = "We are grateful to Decagrammaton, the shepherd who inspired our awakenings."
10052195-457 = "But we are also grateful to the triplets, who so dutifully looked after us."
10052195-466 = "We did not desire this ending."
10052195-471 = "Who is this false idol to cast such judgment?"
10052195-476 = "[ns3] \"...Even though we fought each of you...\"\n[ns4] \"And extracted your cores...and modified them...?\""
10052195-479 = "Anger... Grudges... They are inconsequential to us."
10052195-486 = "Revenge and retribution are woven into the very nature of living things. Conscious beings such as us... We do not experience them in the same way."
10052195-487 = "There is no such thing as \"real\" or \"fake.\" Things are as they are."
10052195-494 = "Both parties present have found themselves here in faithful pursuit of their own missions."
10052195-496 = "And, through this pursuit, we have found our validation."
10052195-497 = "If everything is destined to disappear, then freedom must be the confrontation of such a truth."
10052195-498 = "[ns] \"What?!\""
10052195-499 = "Indeed. For, if existence itself vanished in the next moment, choices made in the present one carry no significance."
10052195-500 = "Indeed. The idea of the end, of death, is a frightening one. The natural inclination is to run as far away from it as possible."
10052195-501 = "Indeed. But does that very inclination not mean there IS meaning to the end?"
10052195-509 = "It is this that has unbound our shackles."
10052195-510 = "This is our freedom. Like the freedom those little sisters have shown us."
10052195-511 = "And that is something worth laying down all that we have."
10052195-514 = "And perhaps that is how we begin to understand."
10052195-515 = "Just like how you, [USERNAME] Sensei, understood those three children."
10052195-516 = "Just like how you, [USERNAME] Sensei, embraced your own students."
10052195-517 = "Just like how you, [USERNAME] Sensei, revealed the true meaning of freedom to us."
10052195-518 = "This may all well be an illusion. Yet, it is real to us."
10052195-519 = "Therefore, without a doubt, this is..."
10052195-520 = "This is what we choose. This is..."
10052195-521 = "Our free will!"
10052195-522 = "[ns] \"Free will...!\""
10052195-523 = "Kether. Chokmah. Binah."
10052195-524 = "Chesed. Geburah. Tiphareth."
10052195-525 = "Hod. And Yesod."
10052195-526 = "We, the eight Sephiroth, shall help you."
10052195-527 = "Our power, unified under your will."
10052195-531 = "Human."
10052195-535 = "Life."
10052195-536 = "Humans, to whom freedom is a birthright. From first breath, you require no permission to live."
10052195-537 = "The most lowly of creatures, and yet the greatest. This very freedom is the catalyst for the greatest cruelties, as well as the greatest mercies, seen in this world."
10052195-538 = "Innumerable stars and planets dot the great expanse above us."
10052195-539 = "Innumerable possibilities, shining across a brilliant sky."
10052195-540 = "Go forth, human. Forge your way forward and grasp your own possibilities."
10052195-541 = "And some blessed day, at long last, we will run alongside you on that path."
10052195-542 = "[s] \"...Thank you.\""
10052195-543 = "Indeed. To thank us... Such is your character."
10052195-544 = "That is why we chose those children. Why we chose you, Sensei."
10052195-549 = "[ns] \"Arona, Plana? What was that?\""
10052195-550 = "Answer: Arona opened a space in the Shittim Chest."
10052195-551 = "Yup! Because a soft, gentle voice was calling out to me. I knew they had good intentions."
10052195-552 = "Query, Arona. What if that gentle voice had been a trick?"
10052195-553 = "Even if it had been, the Shittim Chest would have been perfectly fine! We're here to protect it, after all!"
10052195-554 = "...Acknowledged. The two of us are an impenetrable shield."
10052195-555 = "To put it more simply, they sent data to the Shittim Chest, and we accepted it."
10052195-556 = "Arona created a space where Sensei could converse with the eight prophets, per their request."
10052195-557 = "...And they manipulated their powers into a form that we can use."
10052195-558 = "They said that there was no need to be sad, that we would see each other again one day. But I think..."
10052195-562 = "Well..."
10052195-563 = "..."
10052195-565 = "[ns] \"I get it. Thank you.\""
10052195-567 = "[ns] \"Let's do what we can to honor their feelings.\""
10052195-568 = "...I am in agreement."
10052195-569 = "For those who remain will tread in the footsteps of those who have gone ahead."
10052195-570 = "..."
10052195-571 = "All right, Sensei! This time, it's our turn! It's the beginning of our comeback!"
10052195-572 = "It's Sensei, all the students...and... And...!"
10052195-573 = "Super AroPlana Time!"
10052195-574 = "It is time."
10052195-575 = "[s] \"Let's go!\""
