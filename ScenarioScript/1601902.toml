[translation]
1601902-1 = "非常時期的女僕"
1601902-2 = "早安，老師。"
1601902-3 = "那麼開始今天的工作吧。"
1601902-10 = "沒關係的，您不必一一道謝。"
1601902-11 = "我只是在履行分配給我的義務而已。"
1601902-12 = "話說回來，這杯咖啡請您享用。"
1601902-13 = "我在預熱至90℃的[ruby=Demitasse]濃縮咖啡杯[/ruby]中，#n放入[ruby=Full City Roast]深城市烘焙[/ruby]的[ruby=Bourbon Pointu]波旁尖身[/ruby]豆，並以[ruby=Nel Drip]法蘭絨布手沖[/ruby]萃取了1.5盎司。"
1601902-14 = "應該可以品嚐到咖啡豆本身的風味才對。"
1601902-15 = "外套請交給我吧。#n如果還有其他需要換洗的衣物，請隨時跟我說。"
1601902-16 = "今天的工作清單已經整理在這裡。#n我先按照個人判斷安排了優先順序，詳細情況再麻煩老師進行確認。"
1601902-17 = "為了減輕壓力並適當補充糖分，我準備了一片黑森林蛋糕。"
1601902-18 = "請放心，裡面使用的是無酒精的櫻桃酒。#n推薦搭配咖啡一起享用。"
1601902-22 = "[ns] 「……季？」"
1601902-23 = "有什麼吩咐嗎，老師？"
1601902-24 = "[s] 「原來你……這麼精明能幹嗎？」"
1601902-25 = "這是當然的。因為我是完美的女僕。"
1601902-26 = "事實上，這些只是基本中的基本而已。"
1601902-27 = "當我待在莉央大人身邊時，會進入比現在的完美女僕更進一步的超級完美女僕模式。"
1601902-28 = "[s] 「那你之前為什麼要那樣對我呢……？」"
1601902-29 = "因為老師是能照顧好自己的人。"
1601902-30 = "[s] 「真的是因為那種理由嗎！？」"
1601902-31 = "老師，我也是人。#n該休息的時候就要休息，否則可是會壞掉的。"
1601902-32 = "除此之外，不斷經歷無聊的時間也是人會壞掉的理由之一。"
1601902-33 = "所以作為獎勵，老師之後必須陪我打發時間才行。明白了嗎？"
1601902-34 = "啊，請您不必擔心，我現在並不無聊。"
1601902-35 = "這種輕微的緊張感，反而使我現在的狀態恰到好處。"
1601902-36 = "[s] 「所以你的意思是，現在的我照顧不好自己囉……？」"
1601902-37 = "並非如此。我還是懂得分辨時機和場合的。"
1601902-38 = "現在畢竟是非常時期。"
1601902-39 = "也就是必須互相幫助、各司其職的時候。"
1601902-40 = "否則就無法展望明天了。"
1601902-41 = "[s] 「很高興季能正確看清現實……」"
1601902-42 = "您過獎了。Peace，Peace。"
1601902-43 = "嗯？您還是覺得有點奇怪？"
1601902-44 = "因為我每天都很仔細地照料莉央大人，是嗎……？"
1601902-45 = "……"
1601902-46 = "老師。"
1601902-50 = "那位大人的每一天都是非常時期。"
1601902-51 = "[s] 「我們季真的辛苦了……」"
1601902-52 = "感謝您的誇獎。"
1601902-53 = "總之情況就是如此。"
1601902-54 = "我本來應該穿著相應的服裝，也就是Perfect Maid的戰鬥服──女僕裝來輔佐您的。"
1601902-55 = "穿著與時機場合微妙不符的服裝，還請多多包涵。"
1601902-56 = "[s1] 「只要待在身邊就很有幫助了。」\n[s2] 「謝謝。真的讓我感到心裡很踏實。」"
1601902-59 = "既然您都這麼說了，要不要考慮進行24小時的貼身護衛呢？"
1601902-60 = "[s] 「咦……？」"
1601902-61 = "我可以幫您清洗身體或搓背。"
1601902-62 = "雖然這個說法似乎缺乏根據，不過據說人類感覺最舒適的溫度就是體溫。"
1601902-63 = "所以我可以用身體先幫您把床暖好。"
1601902-64 = "[s] 「等等，先等一下！」"
1601902-65 = "不好意思，剛才是我考慮不周。"
1601902-66 = "考慮到這裡的溫度略低於平均氣溫……"
1601902-67 = "我應該立刻用身體為您暖和才對。"
1601902-68 = "[s] 「你的好意我心領了！」"
1601902-69 = "請您不必客氣。"
1601902-70 = "現在的老師比任何人都重要，提供這點程度的服務也是理所當然的。"
1601902-72 = "（就這樣被迫和不斷貼過來的季，玩了一陣子類似鬼抓人的遊戲）"
1601902-73 = "（最終似乎不再無聊的季，露出了頗為滿足的表情……）"
