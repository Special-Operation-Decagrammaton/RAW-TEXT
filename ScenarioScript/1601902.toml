[translation]
1601902-1 = "Emergency Maid"
1601902-2 = "Hello, Sensei."
1601902-3 = "Now that you've been greeted, I will get to today's tasks."
1601902-10 = "It is quite all right. You don't need to continuously thank me."
1601902-11 = "I am merely fulfilling the duties entrusted to me."
1601902-12 = "Then, here you go. It's coffee."
1601902-13 = "I prepared a 1.5-ounce extraction of Full City roast Bourbon Pointu, flannel-dripped into a Demitasse preheated to exactly 90℃."
1601902-14 = "This is the purest expression of the coffee's distinct aroma and flavor."
1601902-15 = "Please give me your coat. And inform me if you have any additional laundry to surrender."
1601902-16 = "I have organized today's work list here. I've arranged it by priority, but it would be best if you reviewed it and made final judgments."
1601902-17 = "I have also prepared you a slice of black forest cake. This should provide stress relief and supplementary sugar."
1601902-18 = "You must not worry. I utilized non-alcoholic cherry liqueur. It will complement the coffee. Consume it."
1601902-22 = "[ns] \"...Toki?\""
1601902-23 = "What's wrong, Sensei?"
1601902-24 = "[s] \"Were you...always this skilled...?\""
1601902-25 = "Naturally. I am the perfect maid."
1601902-26 = "In fact, due to our circumstances, I'm only implementing the bare minimum right now."
1601902-27 = "When I attended to Ms. Rio, I was in \"hyper-perfect maid\" mode, which is a level above my current \"perfect maid\" protocol."
1601902-28 = "[s] \"...But why are you doing all this for me?\""
1601902-29 = "I realize that you can manage adequately on your own, Sensei."
1601902-30 = "[s] \"So what's the real reason?!\""
1601902-31 = "Sensei. As a matter of fact, I'm a person too. When I rest, I need to rest properly. Otherwise, I'm bound to break down."
1601902-32 = "Additionally, I require tasks and duties to stay functional. When I feel \"bored\" or \"uninvested,\" I begin to break down."
1601902-33 = "If you wish to thank me, you can entertain me later. Understood?"
1601902-34 = "At this current moment...I am neither idle nor bored. So, please do not fret immediately."
1601902-35 = "In fact, this feels like an ideal state. I enjoy the mild sense of tension."
1601902-36 = "[s] \"Does that mean that you NEED to attend to me...?\""
1601902-37 = "Not necessarily. I know how to act depending on time, place, and circumstances."
1601902-38 = "After all, we're currently in an emergency situation."
1601902-39 = "In times like these, we must support each other while fulfilling our assigned duties."
1601902-40 = "Otherwise, we could lose the hope for a more peaceful, happier tomorrow."
1601902-41 = "[s] \"I'm glad that you seem grounded in reality...\""
1601902-42 = "It was nothing special. Peace, peace."
1601902-43 = "What? You still find something strange?"
1601902-44 = "You think I \"treated Rio well every day,\" not just in dire circumstances?"
1601902-45 = "..."
1601902-46 = "Sensei."
1601902-50 = "For Miss Rio, every day was an emergency."
1601902-51 = "[s] \"...You must've had a lot on your plate, Toki...\""
1601902-52 = "Thank you for acknowledging that."
1601902-53 = "Anyway, that is the reality. There can be no other."
1601902-54 = "In normal circumstances, I would serve you in a maid uniform, which is the ideal armor for a perfect maid such as me."
1601902-55 = "But I ask for your understanding and patience. I realize that my current attire may not perfectly align with your expectations of hospitality."
1601902-56 = "[s1] \"Just having your presence helps.\"\n[s2] \"Thank you. You're so reliable.\""
1601902-59 = "That said, I do have these pistols. Would you like me to provide 24-hour close bodyguard services?"
1601902-60 = "[s] \"Huh...?\""
1601902-61 = "All hours. I've noticed your dexterity. I can assist you with our small showers. I can wash your back."
1601902-62 = "There's also the potentially baseless belief that people find the average body temperature most pleasant."
1601902-63 = "So I believe I could also warm up your small bed with my body. It should help you sleep, and that will help you focus."
1601902-64 = "[s] \"Wait, wait!\""
1601902-65 = "No. That was thoughtless of me."
1601902-66 = "After all, the ambient temperature here is clearly lower than average."
1601902-67 = "I believe I can warm you up with my body heat right now. Prepare."
1601902-68 = "[s] \"That's a very nice sentiment, but I'm fine!\""
1601902-69 = "You don't need to be so modest."
1601902-70 = "You are the most important person on this ship. Serving you, assisting you, is only natural."
1601902-72 = "I had to dodge Toki, who kept trying to close in."
1601902-73 = "At least she no longer seemed bored. I think I caught her slipping a slightly satisfied smile."
