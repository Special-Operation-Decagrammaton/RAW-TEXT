[translation]
1601902-1 = "เมดในสถานการณ์ฉุกเฉิน"
1601902-2 = "สวัสดีค่ะ คุณครู"
1601902-3 = "งั้นฉันจะเริ่มงานของวันนี้เลยนะคะ"
1601902-10 = "ไม่เป็นไรค่ะ ไม่ต้องขอบคุณฉันในทุกเรื่องหรอกค่ะ"
1601902-11 = "ฉันแค่ทำตามหน้าที่ที่ได้รับมอบหมายก็เท่านั้นค่ะ"
1601902-12 = "นี่ค่ะ กาแฟค่ะ"
1601902-13 = "นี่คือกาแฟเบอร์บอน ปวงตูว์ คั่วกลางค่อนข้างเข้มปริมาณ 1.5 ออนซ์ที่ดริปแบบใช้ผ้ากรองใส่ถ้วย#nเอสเพรสโซที่อุ่นไว้ที่อุณหภูมิ 90 องศาค่ะ"
1601902-14 = "คุณครูจะได้ลิ้มรสชาติและได้กลิ่นหอมตามธรรมชาติของเมล็ดกาแฟอย่างเต็มที่เลยค่ะ"
1601902-15 = "ส่งเสื้อคลุมมาทางนี้สิคะ ถ้ามีเสื้อผ้าจะซักเพิ่มก็บอกฉันได้ตลอดเลยนะคะ"
1601902-16 = "ส่วนลิสต์งานของวันนี้ ฉันจัดเอาไว้ให้ตรงนี้แล้วค่ะ ฉันกำหนดลำดับความสำคัญของงานไว้คร่าวๆ แล้ว แต่ฝากคุณครูช่วยตัดสินใจรายละเอียดอีกทีนะคะ"
1601902-17 = "แล้วฉันก็เตรียมเค้กแบล็กฟอเรสต์เอาไว้ชิ้นหนึ่งด้วย คุณครูจะได้กินเพื่อคลายเครียดและเติมน้ำตาล#nในร่างกายค่ะ"
1601902-18 = "ไม่ต้องห่วงนะคะ ฉันใช้เหล้าเชอร์รี่แบบไม่มีแอลกอฮอล์ค่ะ กินคู่กับกาแฟน่าจะอร่อยเลยค่ะ"
1601902-22 = "[ns] \"โทคิ...?\""
1601902-23 = "เป็นอะไรไปคะ คุณครู?"
1601902-24 = "[s] \"ปกติโทคิ... ทำงานเก่งแบบนี้เลยเหรอ...?\""
1601902-25 = "แน่นอนอยู่แล้วค่ะ ก็ฉันเป็นเมดที่สมบูรณ์แบบนี่คะ"
1601902-26 = "อันที่จริง นี่เป็นแค่พื้นฐานของพื้นฐานเองนะคะ"
1601902-27 = "ตอนอยู่กับท่านริโอะ ฉันอยู่ในโหมดไฮเปอร์เพอร์เฟกต์เมดที่สมบูรณ์แบบกว่าตอนนี้อีกขั้นด้วยซ้ำค่ะ"
1601902-28 = "[s] \"แล้วทำไมถึงใช้โหมดนี้กับครูเหรอ...?\""
1601902-29 = "ก็คุณครูจัดการอะไรเองได้พอตัวนี่คะ"
1601902-30 = "[s] \"นั่นคือเหตุผลจริงๆ เหรอ!\""
1601902-31 = "คุณครู ฉันก็เป็นคนนะคะ ถึงเวลาพักผ่อนก็ต้องพักบ้างสิคะ ไม่งั้นเดี๋ยวร่างกายฉันจะพังเอาค่ะ"
1601902-32 = "และตอนที่ร่างกายคนเราพังน่ะ ตอนนั้นจะเกิดความเบื่อหน่ายขึ้นซ้ำแล้วซ้ำเล่าค่ะ"
1601902-33 = "เพราะงั้นต่อไปคุณครูจะต้องช่วยคลายความเบื่อหน่ายให้ฉันนะคะ เข้าใจมั้ยคะ?"
1601902-34 = "อ๊ะ ฉันไม่ได้บอกว่าฉันเบื่อตอนนี้หรอกนะคะ ไม่ต้องกังวลหรอกค่ะ"
1601902-35 = "ดีเสียอีกที่ตอนนี้ฉันออกจะตึงเครียดอยู่บ้าง ถือว่าร่างกายอยู่ในสภาพที่เหมาะสมเลยค่ะ"
1601902-36 = "[s] \"แปลว่าตอนนี้ครูจัดการชีวิตตัวเองได้ไม่ดีหรือเปล่า...?\""
1601902-37 = "ไม่หรอกค่ะ ฉันแยกแยะเรื่องกาลเทศะออกนะคะ"
1601902-38 = "และที่สำคัญ ตอนนี้เราอยู่ในสถานการณ์ฉุกเฉินกันด้วย"
1601902-39 = "นี่เป็นช่วงเวลาที่เราต้องช่วยเหลือกันและทำหน้าที่ของตัวเองให้ดีที่สุดค่ะ"
1601902-40 = "ไม่งั้นเราก็คาดหวังในวันพรุ่งนี้ไม่ได้หรอกค่ะ"
1601902-41 = "[s] \"ครูดีใจนะที่โทคิมองความจริงได้ชัดเจนเลย...\""
1601902-42 = "ชมกันเกินไปแล้วค่ะ พีซ พีซ"
1601902-43 = "คะ? แต่ก็คิดว่ายังมีบางส่วนที่แปลกๆ อยู่งั้นเหรอคะ?"
1601902-44 = "ฉันดูแลท่านริโอะเป็นอย่างดีทุกวันหรือเปล่าน่ะเหรอคะ...?"
1601902-45 = "..."
1601902-46 = "คุณครู"
1601902-50 = "สำหรับท่านริโอะน่ะ ทุกวันคือสถานการณ์ฉุกเฉินอยู่แล้วค่ะ"
1601902-51 = "[s] \"โทคิของครูต้องเหนื่อยมากเลยนะเนี่ย...\""
1601902-52 = "ขอบคุณค่ะ"
1601902-53 = "เป็นอย่างนั้นเลยค่ะ"
1601902-54 = "ตามหลักแล้ว เพื่อให้เหมาะสมกับสถานการณ์ ฉันควรจะมาดูแลคุณครูในชุดเมดที่เป็นเครื่องแบบต่อสู้#nของเมดที่สมบูรณ์แบบ"
1601902-55 = "แต่ตอนนี้ฉันอยู่ในชุดที่ไม่เข้ากับกาลเทศะเท่าไร ยังไงก็ขอความเห็นใจด้วยนะคะ"
1601902-56 = "[s1] \"แค่มาอยู่ด้วยกันก็ช่วยเหลือครูได้มากแล้วละ\"\n[s2] \"ไม่เป็นไรหรอก แค่นี้ครูก็ขอบใจมากแล้วละ\""
1601902-59 = "ในเมื่อพูดเรื่องนี้แล้ว งั้นคุณครูลองรับการดูแลอย่างใกล้ชิด 24 ชั่วโมงจากฉันดูมั้ยคะ?"
1601902-60 = "[s] \"หืม..?\""
1601902-61 = "ฉันทั้งอาบน้ำและขัดหลังให้ได้เลยนะคะ"
1601902-62 = "มีคำกล่าวที่ไม่มีหลักฐานรองรับด้วยว่า มนุษย์จะรู้สึกสบายที่สุดในอุณหภูมิเทียบเท่ากับร่างกาย"
1601902-63 = "งั้นฉันน่าจะใช้ร่างกายของฉันทำให้เตียงอุ่นให้ก่อนล่วงหน้าได้ค่ะ"
1601902-64 = "[s] \"เดี๋ยวก่อนๆ!\""
1601902-65 = "ไม่สิ ฉันคิดน้อยไปหน่อยค่ะ"
1601902-66 = "อุณหภูมิของที่นี่ต่ำกว่าอุณหภูมิเฉลี่ยเล็กน้อยอยู่แล้ว"
1601902-67 = "งั้นตอนนี้ฉันน่าจะทำให้คุณครูอบอุ่นขึ้นด้วยร่างกายของฉันได้โดยตรงเลยค่ะ"
1601902-68 = "[s] \"ครูขอรับไว้แค่น้ำใจแล้วกัน!\""
1601902-69 = "ไม่ต้องปฏิเสธก็ได้ค่ะ"
1601902-70 = "ตอนนี้คุณครูสำคัญกว่าใครทั้งหมดเลยค่ะ เรื่องนั้นฉันทำให้ได้อยู่แล้วละค่ะ"
1601902-72 = "(จากนั้นโทคิก็พยายามเข้ามาใกล้ จนคุณครูต้องหนีเหมือนเด็กเล่นวิ่งไล่จับกัน)"
1601902-73 = "(โทคิดูพึงพอใจขึ้นมา ราวกับว่าไม่มีเรื่องให้รู้สึกเบื่ออีกต่อไปแล้ว...)"
