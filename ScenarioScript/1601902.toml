[translation]
1601902-1 = "#title;비상사태의 메이드"
1601902-2 = "3;토키 결전;99;안녕하십니까. 선생님.\n#3;a\n#3;greeting"
1601902-3 = "3;토키 결전;01;그러면 오늘의 업무를 시작하겠습니다."
1601902-4 = "#all;hide"
1601902-5 = "#wait;1000"
1601902-6 = "#wait;1000"
1601902-7 = "#wait;1500"
1601902-8 = "#all;hide"
1601902-9 = "#wait;2000"
1601902-10 = "2;토키 결전;02;괜찮습니다. 일일이 고마워하지 않으셔도 됩니다.\n#2;ar"
1601902-11 = "2;토키 결전;01;저는 다만 저에게 맡겨진 의무를 수행하고 있을 뿐이니까요.\n#2;m3"
1601902-12 = "3;토키 결전;99;그건 그렇고, 여기 있습니다. 커피입니다.\n#2;hide\n#3;greeting"
1601902-13 = "3;토키 결전;02;90℃로 예열한 데미타세에, 부르봉 푸엥튀 풀 시티 로스팅을, 융 드립으로 1.5온스 추출한 것입니다."
1601902-14 = "3;토키 결전;03;원두 본연의 맛과 향을, 가장 있는 그대로 음미하실 수 있을 겁니다.\n#3;em;[음표]"
1601902-15 = "3;토키 결전;02;겉옷은 이리 주십시오. 혹시 세탁물이 더 있으시다면, 언제든 말씀 주셔도 됩니다.\n#3;greeting"
1601902-16 = "3;토키 결전;01;오늘의 업무 리스트는 이쪽에 정리해 두었습니다. 제 나름대로 우선순위를 선정해 두었습니다만, 자세한 부분은 선생님께서 판단해 주시면 될 듯합니다.\n#3;m4"
1601902-17 = "3;토키 결전;02;스트레스 경감과 적절한 당분 보충을 위해, 키르쉬토르테를 한 조각 준비했습니다.\n#3;m3\n#3;em;[반응]"
1601902-18 = "3;토키 결전;03;걱정 마십시오. 무알콜 체리 리큐르를 사용했습니다. 커피와 함께 즐기시면 좋을 것입니다."
1601902-19 = "#st;[0,0];instant;1;"
1601902-20 = "#clearST"
1601902-21 = "#wait;2500"
1601902-22 = "[ns] \"……토키야?\""
1601902-23 = "3;토키 결전;02;왜 그러시죠, 선생님?\n#3;em;[?]"
1601902-24 = "[s] \"너…… 원래 이렇게 잘했니……?\""
1601902-25 = "3;토키 결전;03;당연한 것입니다. 저는 완벽한 메이드이기에.\n#3;em;[반짝]"
1601902-26 = "3;토키 결전;02;사실 이것도 기본 중의 기본만 하는 것입니다."
1601902-27 = "3;토키 결전;01;리오 님과 함께 있을 때는, 지금의 퍼펙트 메이드에서 한층 더 나아간, 하이퍼 퍼펙트 메이드 모드였으니까요."
1601902-28 = "[s] \"……그런데 나한테는 왜 그랬니……?\""
1601902-29 = "3;토키 결전;02;선생님은 알아서 잘 사시잖습니까."
1601902-30 = "[s] \"정말 그 이유였냐!\""
1601902-31 = "3;토키 결전;99;선생님. 저도 사람입니다. 쉴 땐 쉬어야 합니다. 안 그러면 고장 나기 마련입니다.\n#3;em;[한숨]"
1601902-32 = "3;토키 결전;01;그리고 또 사람이 고장 날 때가 있는데, 그건 바로 지루함이 반복될 때입니다."
1601902-33 = "3;토키 결전;07;그러니까 선생님은 포상으로, 나중에 제 심심함을 달래 주셔야 합니다. 아시겠지요?\n#3;jump"
1601902-34 = "3;토키 결전;02;아, 그렇다고 지금 심심하다는 것은 아니니까, 너무 걱정하지 않으셔도 됩니다.\n#3;em;[반응]"
1601902-35 = "3;토키 결전;03;오히려 가벼운 긴장감이 있어서, 딱 좋은 상태라고 해야 할 것 같습니다."
1601902-36 = "[s] \"그럼 지금의 나는, 알아서 잘 못 살고 있다는 뜻……?\""
1601902-37 = "3;토키 결전;02;그건 아닙니다. 저도 때와 상황은 구분할 줄 압니다.\n#3;em;[땀]"
1601902-38 = "3;토키 결전;01;무엇보다, 지금은 비상사태니까요."
1601902-39 = "3;토키 결전;99;그야말로, 서로가 서로를 도와야 하고 자기 역할을 다해야 할 때라는 것입니다."
1601902-40 = "3;토키 결전;01;그렇지 않으면, 내일을 바라볼 수 없게 될 테니까요."
1601902-41 = "[s] \"토키가 현실을 정확히 바라보고 있어서 기쁘구나…….\""
1601902-42 = "3;토키 결전;01;천만의 말씀입니다. 피스. 피스.\n#3;greeting\n#3;em;[반짝]"
1601902-43 = "3;토키 결전;02;네? 그래도 이상한 부분이 조금 있는 것 같다고요?\n#3;em;[?]"
1601902-44 = "3;토키 결전;04;리오 님에게는 매일 잘해 주지 않았냐고요……?"
1601902-45 = "3;토키 결전;06;…….\n#3;em;…"
1601902-46 = "3;토키 결전;07;선생님."
