1601902-49 = "3;토키 결전;07\n#3;stiff\n#wait;1500"
1601902-50 = "3;토키 결전;99;그분은, 매일이 비상사태였습니다."
1601902-51 = "[s] \"……우리 토키가 정말 고생이 많았구나…….\""
1601902-52 = "3;토키 결전;03;감사합니다.\n#3;greeting"
1601902-53 = "3;토키 결전;02;아무튼, 그런 것입니다.\n#3;em;[반응]"
1601902-54 = "3;토키 결전;99;본래대로라면 상황에 걸맞게, 퍼펙트 메이드의 전투복인 메이드복으로 보좌해 드려야 하겠으나."
1601902-55 = "3;토키 결전;01;때와 상황에 미묘하게 맞지 않는 복장을 하고 있는 것은, 선처해 주셨으면 합니다."
1601902-56 = "[s1] \"곁에 있어 주기만 해도 도움이 되니까.\"\n[s2] \"고마워. 정말로 든든해.\""
1601902-57 = "#wait;10"
1601902-58 = "#wait;10"
1601902-59 = "3;토키 결전;03;그러면 말이 나온 김에, 24시간 밀착 경호는 어떠신가요?\n#3;em;[반짝]"
1601902-60 = "[s] \"어……?\""
1601902-61 = "3;토키 결전;99;몸을 씻겨 드릴 수도 있고, 등을 밀어드릴 수도 있고.\n#3;em;…"
1601902-62 = "3;토키 결전;02;사람은 체온만큼의 온도를 가장 기분 좋게 느낀다는 근거 없는 이야기도 있으니."
1601902-63 = "3;토키 결전;03;침대를 제 몸으로 미리 덥혀 드릴 수도 있을 것 같습니다."
1601902-64 = "[s] \"잠깐만, 잠깐만!\""
1601902-65 = "3;토키 결전;04;아닙니다. 제 생각이 짧았군요.\n#3;jump\n#3;em;[!]"
1601902-66 = "3;토키 결전;07;이곳 온도는, 아쉽게도 평균 기온보다 약간 낮으므로."
1601902-67 = "3;토키 결전;05;바로 지금 제가, 몸으로 따듯하게 해 드리면 될 것 같습니다.\n#3;closeup"
1601902-68 = "[s] \"마음만 받을 테니까!\""
1601902-69 = "3;토키 결전;07;사양하지 않으셔도 됩니다.\n#3;closeup\n#3;greeting"
1601902-70 = "3;토키 결전;03;지금의 선생님은, 그 누구보다도 중요한 분이시니까요. 이 정도는 당연합니다.\n#3;closeup\n#3;em;[음표]"
