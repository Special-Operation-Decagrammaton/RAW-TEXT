10052175-246 = "คงเหนื่อยกันน่าดูเลยนะ อาริสึ เคย์ งั้นตอนนี้เราซิงก์ข้อมูลจากคอร์ของมัลคูธ..."
10052175-247 = "อื้อ จากนี้ก็เหลือแค่เข้าไปในสิ่งปลูกสร้างแห่งนั้น แล้วก็ซิงก์ข้อมูลจากคอร์ของเน็ตซาชมา"
10052175-248 = "ใช่ค่ะ! แล้วในที่สุดเคย์ก็จะถึงเลเวลสูงสุด...!"
10052175-249 = "[s] \"และเราจะหยุดยั้งปรากฏการณ์ดินแดนเหล็กกล้านี้ได้สินะ!\""
10052175-250 = "ใช่ค่ะ เป็นอย่างนั้นเลยค่ะ งั้นเราก็ไปกันเลยมั้ยคะ? เริ่มจากมัลคูธก่อนเลย..."
