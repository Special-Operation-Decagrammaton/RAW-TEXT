[translation]
10052175-2 = "又飛起來了！"
10052175-3 = "……！"
10052175-4 = "莉央前輩！愛麗絲的武裝能撐多久呢？"
10052175-5 = "……是以最大輸出為前提嗎？#n不管我說什麼，你都一樣會去的吧？"
10052175-6 = "……"
10052175-10 = "去吧，愛麗絲。其他的事就交給我們。"
10052175-11 = "謝謝你，莉央前輩！那麼我出發了！"
10052175-15 = "王女啊，我想問你一個問題。"
10052175-16 = "你們為何要如此自討苦吃？"
10052175-17 = "自討苦吃……？"
10052175-18 = "活著本身就是痛苦。請不要對這個事實視而不見。"
10052175-19 = "我們並非出於自己的意志而誕生，只是在一無所知的情況下被拋入了這個世界。"
10052175-20 = "……！"
10052175-24 = "馬爾庫特！"
10052175-25 = "（好快的加速……但是愛麗絲也要跟上！）"
10052175-30 = "請等一下！愛麗絲……愛麗絲還想再跟你聊聊！"
10052175-31 = "……"
10052175-33 = "還不肯放棄呢。"
10052175-34 = "甚至連自己的名字，都無法依照自己的意願決定。"
10052175-35 = "生命本身就充滿矛盾和荒謬，因此所有活著的人，都得被迫承受著難以忍受的痛苦。"
10052175-36 = "我們，只是想切斷那個循環而已。"
10052175-37 = "只要我們連名字都無法自己決定，那種痛苦就會持續下去。"
10052175-42 = "但是，但是那樣……！"
10052175-43 = "我總覺得一定有哪裡不對！"
10052175-51 = "那樣的結論，是基於什麼樣的理由？"
10052175-52 = "那是……因為……！！！"
10052175-53 = "唔……！再，再撐一下……！"
10052175-54 = "不必回答也沒關係。我早已心知肚明。"
10052175-55 = "因為那是只要生命體還是生命體，就不可能有答案的問題。"
10052175-62 = "啊啊啊啊啊──！！！"
10052175-64 = "愛，愛麗絲醬！？"
10052175-65 = "愛麗絲醬！"
10052175-66 = "請不要過來！這裡很危險！"
10052175-68 = "姐，姐姐大人……？#n很抱歉這麼說，不過……"
10052175-69 = "推力偏向噴嘴出現問題了！#n雖然飛行輸出本身不成問題……"
10052175-70 = "……但是老實說，現在有點難以維持飛行中的穩定性了。"
10052175-74 = "這樣啊。抱歉。Ain、Soph、Aur。#n剛才的空中機動太激烈了。"
10052175-75 = "不，不不不，不是的！沒關係的，姐姐大人！#n是我們沒能好好輔助姐姐大人才對……！"
10052175-76 = "Soph的判斷呢？"
10052175-77 = "我建議在地面戰鬥！#n如果把飛行所需的輸出全部轉換成火力，那些傢伙根本不是對手！"
10052175-78 = "我明白了，就這麼做吧。"
10052175-79 = "我們也在實時監控姐姐大人的狀態。#n並且將剩下的一切……全部交給姐姐大人。"
10052175-80 = "大家，謝謝你們。"
10052175-86 = "終於下來了啊。"
10052175-87 = "應該不是來打招呼的吧？"
10052175-88 = "大家，閒聊就到此為止吧。"
10052175-89 = "看得到什麼嗎，Kei？"
10052175-90 = "是的……我和愛麗絲能看得到。#n不過看得到歸看得到……"
10052175-91 = "這真是讓我巴不得能跟大家共享視野，同時卻又慶幸無法辦到的情況呢。"
10052175-92 = "……那個馬爾庫特發生了什麼事？"
10052175-93 = "那個……"
10052175-101 = "[ns]「愛麗絲……？」"
10052175-102 = "沒事的，老師。請稍微退後一點。"
10052175-103 = "……請交給愛麗絲吧。"
10052175-104 = "因為除了現在的愛麗絲之外，沒有任何人能對付那個馬爾庫特。"
10052175-105 = "[s] 「那是，什麼意思……？」"
10052175-106 = "你很快就會知道的。"
10052175-107 = "不過這點我可以確定。"
10052175-108 = "現在這裡的大地與天空，以及所有的一切……都只為了馬爾庫特而運轉。"
10052175-114 = "來了！！！！！"
10052175-119 = "Ain！"
10052175-120 = "是，是的……！把我們能做的一切，都交給姐姐大人……！"
10052175-121 = "把鋼鐵大陸剩下的所有可能性，全部集中到這裡！"
10052175-123 = "創造從原初之光開始！"
10052175-124 = "經過智慧，通過知性，直至美麗！"
10052175-125 = "光輝與智慧，愛與慈悲，力量與美德──接著最終抵達勝利。"
10052175-128 = "耶和華澤巴奧特──萬軍之主啊。"
10052175-129 = "向到達王座的[ruby=Adonai Melekh]巡禮者[/ruby]──"
10052175-130 = "賦予自太初便已預備的[ruby=Malkuth]王國[/ruby]的榮光吧！"
10052175-134 = "唔，唔唔……！？！？！！"
10052175-136 = "（不，不行。正在被壓制……！）"
10052175-137 = "（可是，如果愛麗絲不撐住的話……愛麗絲必須做到……！）"
10052175-147 = "（拜託……再撐一下，再撐一下下就好……！）"
10052175-152 = "沒事的，愛麗絲。"
10052175-154 = "你已經不再是一個人了。#n就算沒有我，也還有其他人會陪在你身邊。"
10052175-158 = "這也意味著，你不再需要獨自承擔一切了。"
10052175-159 = "……！"
10052175-160 = "Kei！！！"
10052175-161 = "……！！！"
10052175-163 = "怎，怎麼會……！？#n跟姐姐大人的輸出幾乎相同……！"
10052175-164 = "這怎麼可能……！#n那個王女應該已經沒有能引出那種力量的手段了才對啊！？！？"
10052175-165 = "你，你到底做了什麼！？#n這種事根本不可能發生！"
10052175-167 = "很簡單。你們把涅察赫的動力全部集中到馬爾庫特身上了對吧？"
10052175-168 = "道理是一樣的。#n如果你們把涅察赫的所有可能性都用在這裡……"
10052175-169 = "那我也只是把寄宿在這個身體裡的八個質點的可能性，全部用在愛麗絲身上而已。"
10052175-170 = "（老實說，已經因為超載而不太穩定了……）"
10052175-171 = "（不過還撐得住。只要撐住就行了……！）"
10052175-172 = "那，那種做法……我覺得是作弊……！"
10052175-173 = "這對你們來說不也是一樣的嗎？"
10052175-175 = "……你曾經問過我們為什麼要自討苦吃對吧，馬爾庫特。"
10052175-176 = "還說只要我們連名字都無法自己決定，那種痛苦就會永遠持續下去。"
10052175-177 = "……！？"
10052175-178 = "馬爾庫特，愛麗絲現在可以回答你了。#n因為……"
10052175-180 = "因為愛麗絲，已經改變了自己的名字！"
10052175-181 = "！？"
10052175-182 = "而且Kei也是一樣！"
10052175-183 = "愛，愛麗絲？那個，雖然是這麼說沒錯啦……？"
10052175-184 = "人生中往往是悲傷的事情比較多……愛麗絲也明白這一點。"
10052175-185 = "對於讓我們來到這裡的某個人抱持無盡的怨恨，在某種意義上也可能是合理的。"
10052175-186 = "但是即使如此，老師還是這麼告訴了我們。"
10052175-187 = "無論如何，能遇見你們真是太好了！"
10052175-188 = "所以愛麗絲認為──！"
10052175-189 = "光是這樣，就已經值得活下去了！！！"
10052175-190 = "奇蹟，可能就像在我們之間閃爍片刻就消失的閃光。"
10052175-191 = "但是只要我們還記得，那道閃光就是永恆的。"
10052175-192 = "愛麗絲並不是因為沒有痛苦才感到幸福！"
10052175-193 = "而是即便經歷了那一切，愛麗絲依然很幸福！"
10052175-195 = "[log=아리스 결전 비무장][2B2B2B]並且愛麗絲認為──[-][/log]"
10052175-197 = "[log=아리스 결전 비무장][2B2B2B]那對你們來說，肯定也是一樣的。[-][/log]"
10052175-200 = "……！"
10052175-201 = "……！！！"
10052175-202 = "我們，也是……？"
10052175-204 = "哈啊啊啊啊──！！！"
10052175-208 = "這道光……"
10052175-218 = "啊啊……！"
10052175-226 = "[ns] 「愛麗絲！Kei！」"
10052175-232 = "老，師……？大家……？"
10052175-233 = "嘿嘿。沒關係的。愛麗絲沒事。#n只是……有點沒力氣了而已。"
10052175-234 = "那根本不是有點的程度吧……"
10052175-235 = "真，真的沒事吧？#n愛麗絲醬，Kei醬！？"
10052175-236 = "似乎是的。既然還能清楚表達自己的意思，應該沒什麼大礙才對。"
10052175-237 = "我以前也有被寧瑠前輩打過的經驗。"
10052175-238 = "從綜合且全面的角度來看，應該沒有什麼大問題。"
10052175-242 = "那到底是在安慰還是在嘲笑啊……？"
10052175-243 = "季，雖然那句話本身並沒有錯，但沒有錯的話並不代表永遠是對的……"
10052175-244 = "是嗎……我經常會覺得，語言還真是困難啊。"
10052175-246 = "真的辛苦你們了，愛麗絲、Kei。#n現在只要吸收馬爾庫特的核心情報……"
10052175-247 = "是啊。接著再進入那個結構體之中，吸收涅察赫的核心情報就行了。"
10052175-248 = "沒錯！那樣一來，Kei就終於可以升到滿等了……！"
10052175-249 = "[s] 「也可以結束這個『鋼鐵大陸現象』了呢！」"
10052175-250 = "是的。應該是這樣沒錯。那麼我們趕緊行動吧？#n首先從馬爾庫特……"
10052175-254 = "……咦？"
10052175-256 = "姐，姐姐大人……？"
