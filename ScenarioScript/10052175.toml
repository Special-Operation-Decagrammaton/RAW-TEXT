10052175-226 = "[ns] \"อาริสึ! เคย์!\""
10052175-232 = "คุณ... ครู...? ทุกคน...?"
10052175-233 = "แหะๆๆ ไม่เป็นไรค่ะ อาริสึยังอยู่ดีค่ะ ก็แค่... รู้สึกหมดแรงนิดหน่อยก็เท่านั้นค่ะ"
