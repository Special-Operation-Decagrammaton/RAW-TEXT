10052175-163 = "ดะ... ได้ยังไงกัน...?! พลังเกือบจะเทียบเท่าของพี่มัลคูธแล้วค่ะ...!"
10052175-164 = "เป็นไปได้ยังไง...! ท่านธิดาไม่น่าจะดึงพลังมหาศาลขนาดนั้นออกมาใช้ได้แล้วนี่นา??!!"
10052175-165 = "ทะ... ทำอะไรลงไปคะ?? นี่มันเหลวไหลที่สุดเลย!"
10052175-167 = "ก็ง่ายๆ ค่ะ พวกคุณทุ่มพลังของเน็ตซาชทั้งหมดไปที่มัลคูธใช่มั้ยล่ะคะ?"
10052175-168 = "ฉันก็ใช้หลักการคล้ายๆ กันค่ะ ถ้าพวกคุณกำลังใช้ศักยภาพทั้งหมดของเน็ตซาชอยู่ที่นี่ในตอนนี้ละก็"
10052175-169 = "ฉันก็กำลังใช้ศักยภาพทั้งหมดและเซฟีรอธทั้ง 8 ที่อยู่ในร่างนี้กับอาริสึอยู่ค่ะ"
10052175-170 = "(ถึงจะรู้สึกไม่เสถียรเพราะปริมาณพลังงานมากจนเกินขีดจำกัด...)"
10052175-171 = "(แต่ฉันยังทนได้ แค่ต้องทนอีกนิดเดียว...!)"
10052175-172 = "บะ... แบบนั้นมัน... โกงกันนะคะ...!"
10052175-173 = "พวกคุณก็เหมือนกันไม่ใช่เหรอคะ"
10052175-175 = "ทำไมถึงทำให้ตัวเองเจ็บปวดขนาดนี้ล่ะคะ มัลคูธ...?"
10052175-176 = "ที่บอกเอาไว้ว่า ตราบใดที่เรายังตั้งแม้แต่ชื่อของตัวเองไม่ได้ ความทุกข์ทรมานนั้นก็ไม่มีวันจบสิ้นนั่นน่ะค่ะ"
