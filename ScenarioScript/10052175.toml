[translation]
10052175-2 = "It flew up again!"
10052175-3 = "...!"
10052175-4 = "Rio! How long can my suit hold out?"
10052175-5 = "Under maximum output?#n...Well. You're going to go regardless of my answer."
10052175-6 = "..."
10052175-10 = "Leave it to me, Aris. Just come back safely."
10052175-11 = "Thank you, Rio! I'll be off then!"
10052175-15 = "Princess. I must ask."
10052175-16 = "Why is it you seek out such suffering?"
10052175-17 = "Seek out suffering...?"
10052175-18 = "Living is suffering. You cannot avert your eyes from such simple truth."
10052175-19 = "We were not born out of our own will, but rather as ignorant beings forced into existence."
10052175-20 = "...!"
10052175-24 = "Malkuth!"
10052175-25 = "(So fast...! I have to catch up to her!)"
10052175-30 = "Please, wait! I just... I just want to talk!"
10052175-31 = "..."
10052175-33 = "You truly are relentless."
10052175-34 = "In birth, not even our names are ours to choose."
10052175-35 = "This life you so desperately cling to... It is one filled with contradictions which demand pain from its participants."
10052175-36 = "Yet you dare judge us for wishing to end this cycle of suffering."
10052175-37 = "In a world where our names are not our own, such suffering is simply an inevitability."
10052175-42 = "But, but that is...!"
10052175-43 = "I do not agree with that at all!"
10052175-51 = "And on what basis?"
10052175-52 = "That is... Well...!!"
10052175-53 = "Ugh...! Not yet... Just a bit more...!"
10052175-54 = "You need not answer. For it is simple."
10052175-55 = "Because as long as a living being remains as a living being, no answer to that question can ever exist."
10052175-62 = "KYAAAH!!"
10052175-64 = "A-Aris?!"
10052175-65 = "Aris!"
10052175-66 = "Do not come here! It is dangerous!"
10052175-68 = "E-Elder Sister...? I'm sorry to say this, but..."
10052175-69 = "There's a problem with the thrust vectoring nozzle! There's no problem with the flight output, but..."
10052175-70 = "...To be honest with you, maintaining stability is difficult. "
10052175-74 = "I see. I'm sorry, Ein, Sof, and Ohr. My maneuvers were too violent."
10052175-75 = "N-N-N-Not at all! It's okay, Elder Sister! We're the ones who aren't doing enough to help!"
10052175-76 = "What is your recommendation, Sof?"
10052175-77 = "Land, if you can! We'll convert the energy we're using for flight to firepower output instead. They won't be able to hold a candle to you!"
10052175-78 = "Understood."
10052175-79 = "We're keeping close track of all your vitals! We're going to give you everything we have!"
10052175-80 = "Thank you, everyone."
10052175-86 = "Finally, there she is."
10052175-87 = "Do you think she's here to say hi?"
10052175-88 = "Again. Focus, please."
10052175-89 = "Do you see something, Kei?"
10052175-90 = "Yes... Aris and I can see. But..."
10052175-91 = "I wish I could share my visual input with you, but in a way, I'm glad you aren't seeing this."
10052175-92 = "...Is something happening with Malkuth?"
10052175-93 = "That's..."
10052175-101 = "[ns] \"Aris...?\""
10052175-102 = "It is okay, Sensei. Really. Please get out of harm's way."
10052175-103 = "I will deal with her... With Malkuth."
10052175-104 = "I know now. This fight was always mine to fight."
10052175-105 = "[s] \"What do you mean by that...?\""
10052175-106 = "You'll know soon enough. "
10052175-107 = "But I can say this for sure."
10052175-108 = "Right now, the land, the sky, and even the air we breathe... All of it is being consumed by Malkuth."
10052175-114 = "Incoming!!"
10052175-119 = "Ein!"
10052175-120 = "Y-Yes...! I'm doing everything I can...!"
10052175-121 = "Let all remaining potentials converge upon the Steel Continent!"
10052175-123 = "Creation comes from the first light!"
10052175-124 = "From wisdom, through intellect, to beauty!"
10052175-125 = "Radiance and wisdom, love and mercy, strength and virtue. And finally, the victory to be attained."
10052175-128 = "Jehovah Tzevaot. Lord of hosts."
10052175-129 = "Glory to the pilgrim, Adonal Melekh, who reached the throne..."
10052175-130 = "To the kingdom, Malkuth, that has awaited us since!"
10052175-134 = "U-Ugh...?!"
10052175-136 = "(Th-This is bad. I am being...pushed back...!)"
10052175-137 = "(But I can hold out...! I must!)"
10052175-147 = "(Please... Just a bit more...!)"
10052175-152 = "It's okay, Aris."
10052175-154 = "You are no longer alone. Even if it isn't me, others will take up arms by your side."
10052175-158 = "The world's burdens are not yours alone to shoulder."
10052175-159 = "...!"
10052175-160 = "Kei!!"
10052175-161 = "...!!"
10052175-163 = "H-How...?! Her output is almost the same as Elder Sister's...!"
10052175-164 = "No way...! But that princess shouldn't be able to tap into that kind of power anymore!"
10052175-165 = "Wh-What did you even do?! This doesn't make sense!"
10052175-167 = "It's simple. You redirected all of Netzach's power into Malkuth, right?"
10052175-168 = "Same principle here. You're using the entirety of Netzach's potential."
10052175-169 = "And I'm using the entirety of the remaining eight Sephiroths' potential on Aris."
10052175-170 = "(...Honestly speaking, I'm straining myself more than I'm letting on.)"
10052175-171 = "(But I'm not out of the running yet...!)"
10052175-172 = "Th-That's not...fair...!"
10052175-173 = "Same goes to you."
10052175-175 = "...You asked me why I bring such suffering upon myself, Malkuth."
10052175-176 = "That suffering is inevitable in this world where not even our names are ours to claim."
10052175-177 = "...?!"
10052175-178 = "But I have an answer for you now, Malkuth! It is because..."
10052175-180 = "It is because I changed my name!"
10052175-181 = "?!"
10052175-182 = "And so did Kei!"
10052175-183 = "A-Aris? I mean... That is factually correct, I suppose..."
10052175-184 = "Many sad things happen in life. I know that much too."
10052175-185 = "I can understand such resentment. Against the person who put us here to begin with."
10052175-186 = "But even so, Sensei told me something."
10052175-187 = "That the thing that made them happiest was meeting us, their students!"
10052175-188 = "And this is why, I..."
10052175-189 = "I think that alone makes life and everything that comes with it worth living!"
10052175-190 = "Perhaps a miracle is like the flash of a supernova: blinding, but momentary."
10052175-191 = "But as long as we remember that flash, the light will be eternal."
10052175-192 = "It is not that I am happy because I have never suffered! "
10052175-193 = "It is that, despite everything we have gone through, I am happy!"
10052175-195 = "[log=아리스 결전 비무장][2B2B2B]And I am sure that[-][/log]"
10052175-197 = "[log=아리스 결전 비무장][2B2B2B]the same could be true for you too.[-][/log]"
10052175-200 = "...!"
10052175-201 = "...!!"
10052175-202 = "Us, too...?"
10052175-204 = "HAAAH!"
10052175-208 = "This light..."
10052175-218 = "Ahhh...!"
10052175-226 = "[ns] \"Aris! Kei!\""
10052175-232 = "Sensei...? Everyone...?"
10052175-233 = "Heehee. I am okay. I am completely fine. Just...a little tired."
10052175-234 = "I wouldn't call that \"just a bit\"..."
10052175-235 = "A-Are you guys okay? They're okay, right?! Aris! Kei-Kei!"
10052175-236 = "That appears to be the case. Seeing how they can express themselves well, it does not seem like they are in critical condition."
10052175-237 = "I too, had a moment when I was beaten up a little bit by Neru."
10052175-238 = "But I faced no major issues from a comprehensive and holistic view."
10052175-242 = "...Are you trying to console me or make fun of me here...?"
10052175-243 = "Toki. Sometimes, just because something is true, that doesn't mean you should say it aloud."
10052175-244 = "I see... Again, I see that language is quite difficult."
10052175-246 = "Aris, Kei. You did a great job. Let's absorb Malkuth's core data, and then..."
10052175-247 = "And then we'll go inside and retrieve and absorb Netzach's core."
10052175-248 = "And when that is done, Kei will reach max level!"
10052175-249 = "[s] \"And we'll finally close the book on the Steel Continent!\""
10052175-250 = "Yes. That sounds right. Shall we get moving then? Let's start with Malkuth..."
10052175-254 = "...Huh?"
10052175-256 = "E-Elder Sister...?"
