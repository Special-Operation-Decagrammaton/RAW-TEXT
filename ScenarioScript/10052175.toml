10052175-184 = "ในชีวิตนี้ยังมีเรื่องเศร้ามากกว่านี้อีกเยอะมาก เรื่องนั้นอาริสึก็รู้ดีค่ะ"
10052175-185 = "การที่เราจะฝังใจโกรธแค้นคนที่ทำให้เราต้องมาตกอยู่ในสภาพนี้ ในแง่หนึ่งมันก็อาจเป็นเรื่องที่สมควร#nแล้วก็ได้ค่ะ"
10052175-186 = "แต่ว่า ถึงอย่างนั้นคุณครูก็บอกไว้ว่าอย่างนี้ค่ะ"
10052175-187 = "เหนือสิ่งอื่นใด คุณครูดีใจมากที่ได้พบกับพวกเราทุกคน!"
10052175-188 = "ค่ะ! อาริสึก็เลยคิดว่า!"
10052175-189 = "แค่นั้นก็เพียงพอแล้ว ที่จะทำให้ชีวิตควรค่าแก่การอยู่ต่อไปค่ะ!!!"
10052175-190 = "ปาฏิหาริย์อาจเป็นเหมือนแสงสว่างวาบที่ส่องประกายเพียงชั่วครู่ แล้วหายไปจากสายตาเรา"
10052175-191 = "แต่ตราบใดที่เรายังจดจำแสงสว่างนั่นได้ แสงนั้นก็จะคงอยู่ไปชั่วนิรันดร์ค่ะ"
10052175-192 = "ไม่ใช่ว่าอาริสึมีความสุขได้เพราะไม่มีความเจ็บปวดเลยหรอกนะคะ! "
10052175-193 = "ถึงจะต้องเจอเรื่องราวมากมาย แต่อาริสึก็ยังมีความสุขได้ต่างหากค่ะ!"
