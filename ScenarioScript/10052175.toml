[translation]
10052175-2 = "ทะยานขึ้นอีกครั้งแล้ว!"
10052175-3 = "...!"
10052175-4 = "รุ่นพี่ริโอะ! อาวุธของอาริสึทนได้นานแค่ไหนเหรอคะ?"
10052175-5 = "หมายถึงตอนใช้พลังสูงสุดใช่มั้ย...? แต่ไม่ว่าฉันจะพูดอะไร เธอก็จะไปอยู่ดี"
10052175-6 = "..."
10052175-10 = "ไปเถอะ อาริสึ เรื่องอื่นปล่อยให้เป็นหน้าที่ของฉันได้เลย"
10052175-11 = "ขอบคุณค่ะ รุ่นพี่ริโอะ! ถ้างั้นอาริสึไปก่อนนะคะ!"
10052175-15 = "ท่านธิดา ฉันอยากถามหน่อยค่ะ"
10052175-16 = "ทำไมพวกคุณถึงทำให้ตัวเองเจ็บปวดขนาดนี้ล่ะคะ?"
10052175-17 = "ทำให้... ตัวเองเจ็บปวดเหรอคะ...?"
10052175-18 = "การมีชีวิตอยู่คือความเจ็บปวดค่ะ อย่าเพิกเฉยต่อข้อเท็จจริงนั้นสิคะ"
10052175-19 = "เราไม่ได้เกิดมาด้วยเจตจำนงของตนเอง แต่แค่ถูกโยนเข้ามาในโลกโดยไม่รู้อะไรเลยค่ะ"
10052175-20 = "...!"
10052175-24 = "มัลคูธ!"
10052175-25 = "(เร็วมากเลย... แต่ว่าอาริสึต้องตามให้ทัน!)"
10052175-30 = "เดี๋ยวก่อนสิคะ! อาริสึยัง... อยากคุยด้วยก่อนอีกหน่อยนะคะ!"
10052175-31 = "..."
10052175-33 = "ยังไม่ยอมแพ้สินะคะ"
10052175-34 = "แม้แต่ชื่อของพวกเรา เรายังเลือกเองไม่ได้ด้วยซ้ำ"
10052175-35 = "ชีวิตคือความย้อนแย้งและไม่สมเหตุสมผล มันก็เลยบังคับให้ทุกคนที่มีชีวิตอยู่ต้องทนต่อความเจ็บปวด#nที่เหลวไหล"
10052175-36 = "พวกฉันก็เพียงต้องการที่จะทำลายวงจรนั้นค่ะ"
10052175-37 = "ตราบใดที่เรายังตั้งแม้แต่ชื่อของตัวเองไม่ได้ ความทุกข์ทรมานนั้นก็ไม่มีวันจบสิ้นหรอกค่ะ"
10052175-42 = "แต่ว่า... แต่ถึงยังไง...!"
10052175-43 = "อาริสึคิดว่านั่นเป็นความคิดที่ผิดค่ะ!"
10052175-51 = "อะไรทำให้คิดแบบนั้นล่ะคะ?"
10052175-52 = "คือว่า... แบบว่า...!!!"
10052175-53 = "อึก...! เดี๋ยวก่อน... อีกนิดเดียว...!"
10052175-54 = "ไม่ต้องตอบก็ได้ค่ะ ยังไงฉันก็รู้อยู่แล้วค่ะ"
10052175-55 = "ก็นั่นเป็นคำถามที่ไม่อาจมีคำตอบได้ ตราบใดที่สิ่งมีชีวิตยังคงเป็นสิ่งมีชีวิตอยู่ยังไงล่ะคะ"
10052175-62 = "อ๊าาาาาาา!!!"
10052175-64 = "อะ... อาริสึจัง?!"
10052175-65 = "อาริสึจัง!"
10052175-66 = "อย่าเข้ามานะคะ! อันตรายค่ะ!"
10052175-68 = "พะ... พี่มัลคูธ...? ฉันขอโทษที่ต้องพูดแบบนี้นะคะ แต่ว่า..."
10052175-69 = "เราเจอปัญหาเกี่ยวกับท่อปรับทิศทางแรงขับน่ะ! ถึงมันจะไม่เป็นปัญหากับการบิน แต่ว่า..."
10052175-70 = "ถ้าให้บอกตามตรงก็คือ ตอนนี้การรักษาเสถียรภาพระหว่างบินจะเริ่มยากขึ้นนิดหน่อยน่ะค่ะ... "
10052175-74 = "อย่างนั้นสินะคะ ขอโทษด้วยค่ะ ไอน์ ซอฟ ออร์ เมื่อกี้คงเป็นการบังคับกลางอากาศที่ดุเดือดไปหน่อย#nน่ะค่ะ"
10052175-75 = "มะ... มะมะมะ... ไม่ใช่อย่างนั้นค่ะ! ไม่ใช่ความผิดของพี่มัลคูธหรอกค่ะ! พวกฉันต่างหากที่ช่วยพี่ไว้ไม่ได้...!"
10052175-76 = "ซอฟคิดว่ายังไงบ้างคะ?"
10052175-77 = "ฉันแนะนำให้ต่อสู้บนพื้น! ถ้าแปลงพลังงานที่ใช้ในการบินมาเป็นพลังทำลายล้าง พวกนั้นก็คงไม่มีโอกาสรอดหรอก!"
10052175-78 = "เข้าใจแล้วค่ะ ฉันจะทำอย่างนั้นค่ะ"
10052175-79 = "พวกฉันก็กำลังติดตามสถานะของพี่แบบเรียลไทม์อยู่ด้วยค่ะ พวกฉันจะมอบทุกอย่างที่เหลือ... ให้พี่มัลคูธทั้งหมดค่ะ"
10052175-80 = "ขอบคุณค่ะทุกคน"
10052175-86 = "ในที่สุดก็ลงมาแล้วสินะคะ"
10052175-87 = "คงไม่ได้จะลงมาทักทายกันเฉยๆ หรอกเนอะ?"
10052175-88 = "ทุกคน นี่ไม่ใช่เวลามาพูดอะไรล้อเล่นนะคะ"
10052175-89 = "เห็นอะไรงั้นเหรอ เคย์?"
10052175-90 = "ค่ะ... ฉันกับอาริสึสามารถเห็นได้ค่ะ มันมีบางอย่าง..."
10052175-91 = "ถ้าฉันแบ่งปันสิ่งที่พวกเรามองเห็นได้ก็คงจะดีเลย แต่อีกใจหนึ่งฉันรู้สึกโล่งใจที่ทำแบบนั้นไม่ได้ค่ะ"
10052175-92 = "เกิดเรื่องอะไรกับมัลคูธเหรอคะ...?"
10052175-93 = "เรื่องนั้น..."
10052175-101 = "[ns] \"อาริสึ...?\""
10052175-102 = "ไม่เป็นไรค่ะ คุณครู ไม่ต้องห่วงนะคะ แล้วก็รบกวนช่วยถอยออกไปด้านหลังอีกนิดได้ไหมคะ"
10052175-103 = "อาริสึ... จะเผชิญหน้ากับมัลคูธคนนั้นเองค่ะ"
10052175-104 = "นอกจากอาริสึในตอนนี้แล้ว ไม่มีใครที่จะต่อกรกับมัลคูธคนนั้นได้หรอกค่ะ"
10052175-105 = "[s] \"พูดแบบนั้น... หมายความว่ายังไง...?\""
10052175-106 = "อีกเดี๋ยวก็รู้ค่ะ "
10052175-107 = "แต่ฉันน่าจะบอกได้อย่างหนึ่งค่ะ"
10052175-108 = "ในเวลานี้ ทั้งผืนดิน ท้องฟ้า และทุกสรรพสิ่ง... ต่างกำลังเคลื่อนไหวเพื่อมัลคูธเพียงคนเดียวเท่านั้นค่ะ"
10052175-114 = "มาแล้วค่ะ!!!!!"
10052175-119 = "ไอน์!"
10052175-120 = "ค่ะ ค่ะ...! ทุกอย่างที่พวกฉันทำได้ ขอมอบให้พี่มัลคูธ...!"
10052175-121 = "ทุกความเป็นไปได้ที่เหลือในดินแดนเหล็กกล้า จงมุ่งสู่ที่นี่!"
10052175-123 = "การสร้างสรรค์เริ่มต้นจากแสงแรก!"
10052175-124 = "จากปัญญา ผ่านความเฉลียวฉลาด สู่ความงดงาม!"
10052175-125 = "ความสุกใสและปัญญา ความรักและความเมตตา อำนาจและคุณธรรม และชัยชนะที่มาถึงในตอนท้าย"
10052175-128 = "เยโฮวาห์ ซาบาโอท จ้าวแห่งกองทัพ"
10052175-129 = "ขอจงมอบความรุ่งโรจน์แห่ง[ruby=Malkuth]อาณาจักร[/ruby]ที่ได้รับการเตรียมมาตั้งแต่แรก!"
10052175-130 = "แด่[ruby=Adonai Melekh]ผู้แสวงบุญ[/ruby]ที่มาถึงบัลลังก์!"
10052175-134 = "อะ... อึก...?!?!!!"
