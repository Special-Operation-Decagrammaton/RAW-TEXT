10052175-152 = "ไม่เป็นไรนะคะ อาริสึ"
10052175-154 = "ตอนนี้คุณไม่ได้อยู่ตัวคนเดียว และถึงต่อให้จะไม่มีฉันอยู่ด้วยก็ตาม แต่คุณก็ยังมีคนอื่นทุกคน"
10052175-158 = "นั่นหมายความว่า คุณไม่จำเป็นต้องแบกรับทุกอย่างไว้เพียงคนเดียวอีกต่อไปแล้วค่ะ"
