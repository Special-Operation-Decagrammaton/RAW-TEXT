10052175-235 = "ตะ... แต่ไม่ได้เป็นอะไรใช่มั้ย? อาริสึจัง เคย์จัง?!"
10052175-236 = "น่าจะนะคะ ดูจากการใช้คำพูดตอบโต้แล้ว ไม่น่าจะมีปัญหาอะไรร้ายแรงค่ะ"
10052175-237 = "ฉันเองก็เคยโดนรุ่นพี่เนรุอัดเข้าให้เหมือนกันค่ะ"
10052175-238 = "แต่โดยรวมแล้วฉันก็ไม่ได้รับการกระทบกระเทือนอะไรใหญ่โตค่ะ"
10052175-242 = "นั่นมัน... เป็นการปลอบใจหรือพูดติดตลกคะ...?"
10052175-243 = "โทคิ ถึงนั่นจะไม่ใช่คำพูดที่ผิดอะไร แต่คำที่ไม่ผิดก็ไม่ได้หมายความว่าจะถูกต้องเสมอไปนะ..."
