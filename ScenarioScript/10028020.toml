[translation]
10028020-1 = "ตอนที่ 2;มันดูไม่ใช่เรื่องใหญ่นี่นา"
10028020-7 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10028020-8 = "วิ่งจนแทบหายใจไม่ทันแล้ว... ขอพักหายใจก่อนนะคะ..."
10028020-13 = "ตะ... แต่ยังไงเราก็ขึ้นรถไฟกันมาได้นะคะ แหะๆ..."
10028020-20 = "คะ... คุณครู...? ไหวมั้ยคะ!? เราวิ่งหน้าตั้งกันมาเลย บาดเจ็บตรงไหนรึเปล่า...!"
10028020-21 = "[s1] \"มะ... ไม่ต้องห่วง ครูยังไหว...\"\n[s2] \"สงสัยต้องออกกำลังกายบ้างแล้ว... แฮ่ก แฮ่ก...\""
10028020-24 = "ละ... โล่งอกไปทีนะคะ..."
10028020-25 = "อืม ทำไมถึงกลายเป็นแบบนี้ไปได้... ฉันตั้งใจจะช่วยให้คุณครูได้เดินทางกลับอย่างไร้ปัญหาแท้ๆ..."
10028020-29 = "ขอโทษค่ะ ฉันสร้างปัญหาตั้งแต่เริ่มเลย..."
10028020-30 = "...ไม่เป็นอะไรงั้นเหรอคะ? ถ้าพูดอย่างนั้นฉันก็รู้สึกซาบซึ้งอยู่หรอกนะคะ แต่ก็..."
10028020-31 = "ฉันเสียดายน่ะค่ะที่เหมือนผิดพลาดตั้งแต่การติดกระดุมเม็ดแรกเลย"
10028020-32 = "ฉันทำผิดไปตั้งแต่ตอนไหนเนี่ย... ฮือออ..."
10028020-36 = "ตะ... แต่ถ้ามองในอีกมุม ยังไงเราก็ไม่ได้ทำกระเป๋าหายไปนะคะ!"
10028020-37 = "ถ้าเราไม่รู้ตัวก่อน กระเป๋าก็คงหายไปแล้วว่ามั้ยคะ?"
10028020-38 = "[s3] \"ใช่ๆ นี่แค่เรื่องเล็กๆ น่า\"\n[s4] \"นี่ก็แค่เรื่องปกติในชีวิตประจำวัน\""
10028020-41 = "ชะ... ใช่ค่ะ! อะฮ่าฮ่าฮ่า! แค่นี้ไม่ใช่เรื่องใหญ่อะไรหรอก~"
10028020-42 = "ก็แค่ไปหากระเป๋าในตู้สินค้าให้เจอ พอเจอแล้วก็ลงที่สถานีถัดไปแล้วก็เปลี่ยนเป็นรถไฟสายทรีนิตี้ก็จบ~"
10028020-43 = "เรามีเวลาเหลือเฟือค่ะ~ ขอแค่จัดการเสร็จภายในวันนี้ก็พอ~"
10028020-47 = "โรงเรียนก็มีตั้งเยอะตั้งแยะ ทำไมเราต้องมาเจอรถไฟที่ไปเกเฮนน่าก็ไม่รู้นะคะ แต่ก็เอาเถอะ~"
10028020-52 = "......?"
10028020-53 = "อะไรของคนนั้นน่ะ? ไม่ได้เป็นเด็กทรีนิตี้หรอกเหรอ? ทำไมเด็กทรีนิตี้ถึงมาอยู่บนรถไฟนี้..."
10028020-54 = "เดี๋ยวก่อนนะ ดูปลอกแขนนั่นสิ... ชมรมทวงความยุติธรรมใช่มั้ย? ใช่รึเปล่าน่ะ?"
10028020-55 = "ทำไมยัยเด็กจากทรีนิตี้ถึงมาอยู่บนรถไฟสายเกเฮนน่าล่ะ...?"
10028020-70 = "...อ่า..."
10028020-71 = "อืม... คือว่า... บรรยากาศตอนนี้เหมือน..."
10028020-72 = "เหมือนเราไม่ถูกต้อนรับเลย..."
10028020-73 = "[s5] \"น่าจะเป็นเพราะความสัมพันธ์ระหว่างโรงเรียนนะ...\"\n[s6] \"บรรยากาศระหว่างโรงเรียนมันช่าง...\""
10028020-76 = "นี่ ตรงนั้นน่ะ! เอะอะโวยวายอะไรกัน! มีเรื่องอะไรงั้นเหรอ!?"
10028020-80 = "พวกเด็กเกเฮนน่า! ฉันไม่มีทางปล่อยไปแน่! หืม!?"
10028020-84 = "หืม...? อะไรน่ะ?"
10028020-85 = "คุณเป็นใคร? มาจากทรีนิตี้ไม่ใช่เหรอ? แล้วทำไมเด็กทรีนิตี้ถึงมาอยู่บนรถไฟขบวนนี้? รถไฟนี้มุ่งหน้า#nไปยังเกเฮนน่านะ!"
10028020-89 = "...แต่เดี๋ยวก่อน ฉันไม่จำเป็นต้องรู้รายละเอียดนี่นา เอาตั๋วมาดูก่อน ตั๋วรถไฟน่ะ เร็วเข้า"
10028020-90 = "คะ... คะ? ตะ... ตั๋วเหรอคะ? อ่า... คือ... พวกฉัน..."
10028020-91 = "...หืม? อะไรเนี่ย ไม่มีตั๋วเหรอ?"
10028020-92 = "แล้วผู้ใหญ่คนนั้นล่ะ?"
10028020-93 = "ไม่มีตั๋วทั้งคู่เลยเหรอ! เดี๋ยวนะ นี่มันไม่ตลกเลย..."
10028020-94 = "แหะๆๆ... เอ่อ ช่วยรอสักครู่นะคะ พวกฉันขอปรึกษากันก่อน... "
10028020-95 = "ปรึกษาเหรอ? ปรึกษาอะไร? ...หรือว่าคงจะคิดแบบนั้นกันอีกสินะ?"
10028020-96 = "เพราะยังไงนี่ก็เป็นรถไฟสายเกเฮนน่า... มันก็ต้องวุ่นวายอยู่แล้ว... "
10028020-97 = "......?"
10028020-98 = "...คะ?"
10028020-99 = "เด็กพวกนี้ไม่ได้รับการสั่งสอนอยู่แล้ว... ส่วนเจ้าหน้าที่ในรถไฟก็เป็นแค่ทาสรับใช้...!!"
10028020-100 = "ไม่นะ เอ่อ..."
10028020-101 = "เพราะคนพวกนี้เป็นแบบนั้น ถึงจะแอบขึ้นฟรีไปก็ไม่มีใครรู้หรอก... ใช่มั้ยล่ะ?"
10028020-102 = "ไม่ใช่แบบนั้นนะ... พวกฉันขอคุยกันสักครู่นะคะ..."
10028020-103 = "เอาอีกแล้วเหรอ...? จะมาไม้นั้นอีกใช่มั้ย...!?"
10028020-104 = "ไม่ใช่นะ พวกฉันยังไม่ได้..."
10028020-105 = "คิดว่า... คิดว่า...!!"
10028020-106 = "คิดว่ารถไฟขบวนนี้ไร้กฎหมาย ก็เลยมาขึ้นฟรีงั้นสิ!?"
10028020-107 = "ฉันยัง... ไม่ได้พูดอะไรเลย... นะคะ..."
10028020-108 = "ทนต่อไปไม่ไหวแล้ว!! เจอแบบนี้ฉันละเบื่อเต็มทน!! พวกทรีนิตี้มองว่าเราเป็นพวกไม่ได้เรื่องเหรอ!?"
10028020-109 = "ปี๊ดด---! ปี๊ดดดดดดด---!! เรียกรวมตัววว---!!"
10028020-110 = "พบคนร้ายขึ้นรถไฟโดยไม่จ่ายค่าโดยสาร 2 คน! ใช้การรับมือระดับ C ตามคู่มือ!!"
10028020-113 = "ว่าไงนะ?? คนร้ายขึ้นรถไฟโดยไม่จ่ายค่าโดยสาร!? คนพวกนี้ เอาอีกแล้วเหรอ...!"
10028020-114 = "ทนไม่ไหวแล้ว! ไม่ต้องสอบสวนให้มากความ!! จับคนร้ายไว้ให้ได้ทั้งหมด!!"
10028020-115 = "เรียกรวมตัววว---!!"
10028020-120 = "อืม..."
10028020-121 = "...อืม..."
10028020-122 = "แปลกจัง... อะไรกันเนี่ย..."
10028020-123 = "มันดู..."
10028020-128 = "มันดูไม่ใช่เรื่องใหญ่อะไรนี่นา..."
