[translation]
10028020-1 = "Episode 2;Everything Is Under Control!"
10028020-7 = "*huff* *puff*"
10028020-8 = "I-I just need...to catch...my breath..."
10028020-13 = "We made it... We actually made it. Hah..."
10028020-20 = "Augh! Sensei! You look spent. Are you okay? Did you sprain anything?"
10028020-21 = "[s1] \"D-Don't worry. I'm all right...\"\n[s2] \"I may...need to start...working out.\""
10028020-24 = "As long as you're not injured..."
10028020-25 = "How did this happen? Hasumi asked me to take good care of you..."
10028020-29 = "I might've really messed this one up. I'm sorry."
10028020-30 = "...Everything's fine? I appreciate the sentiment, but..."
10028020-31 = "I can't help but be a little disappointed our journey's starting out like this."
10028020-32 = "I'm still in shock at how fast things went south..."
10028020-36 = "But, well, at least we didn't lose track of the bag!"
10028020-37 = "I guess that sprint was worth it in the end! Haha..."
10028020-38 = "[s3] \"Exactly. At least we made it.\"\n[s4] \"This is pretty par for the course around these parts.\""
10028020-41 = "Yeah! I have everything completely under control. Ahahaha!"
10028020-42 = "All we have to do is go get the bag from the luggage car, and then we can swap to a Trinity-bound line at the next station."
10028020-43 = "Okay, we can do this. We just have to make it back by tonight."
10028020-47 = "I mean, the situation is hardly ideal, us being bound for Gehenna and all, but it could be worse!"
10028020-52 = "...?"
10028020-53 = "Hey. Check out that uniform. Isn't that Trinity's? What the hell is some Trinity kid doing here?"
10028020-54 = "That's not any old Trinity student. Only Justice Task Force members wear those armbands."
10028020-55 = "What's a cop from Trinity doing all the way out here? It's bad enough dealing with Gehenna's law enforcement."
10028020-70 = "Um..."
10028020-71 = "Is it just me, or is it a bit tense in here?"
10028020-72 = "I guess I shouldn't have said things could be worse..."
10028020-73 = "[s5] \"These aren't the types to be happy to see an officer...\"\n[s6] \"Trinity and Gehenna aren't exactly on good terms.\""
10028020-76 = "Hey! No loud noises on the train! What's happening back here?"
10028020-80 = "You Gehenna thugs again! Is it impossible for you all to have one peaceful train ride? Huh? Just one?!"
10028020-84 = "Huh? You're not what I was expecting."
10028020-85 = "What's a Trinity student doing here? This train is bound for Gehenna, you know."
10028020-89 = "Ugh, I don't care. Your loss. Or gain. It's not my business. I just need to see your ticket."
10028020-90 = "T-T-Ticket?! Well, we don't have one, but..."
10028020-91 = "You got on this train without a ticket?"
10028020-92 = "What about you, strange adult? No ticket either?!"
10028020-93 = "Is this a joke? A prank?"
10028020-94 = "I realize this looks bad, but I can explain.  "
10028020-95 = "Ah. I see what's happening here."
10028020-96 = "\"It's just a dingy old train going to Gehenna. It'll be a mess anyways.\"  "
10028020-97 = "...?"
10028020-98 = "Huh?"
10028020-99 = "That's what you thought, huh?! A train bound for Gehenna is probably filled with a bunch of useless crew members! No one in charge!"
10028020-100 = "I d-didn't say that at all!"
10028020-101 = "But that's what you were thinking! That's why you thought you could just hop on without a care in the world and hitch a free ride on our train!"
10028020-102 = "P-Please just hear me out... We didn't mean any disrespect..."
10028020-103 = "Well, disrespect taken! I know that's exactly what you conniving, ticket-less stowaways were thinking!"
10028020-104 = "You're really making assumptions from nothing here..."
10028020-105 = "Even if... Even if...!!"
10028020-106 = "Even if this train is chaotic sometimes...! And we might be a little understaffed...! That doesn't mean people can just get free rides whenever they want!"
10028020-107 = "I really...didn't...say...any of that!"
10028020-108 = "No! I can't stand this anymore! We train crew have rights too! Now even Trinity students think they can just come in and stomp all over us? Well, not anymore!"
10028020-109 = "*BEEP* *BEEP* RISE UP, MY FELLOW CREWMEMBERS!"
10028020-110 = "I've identified two stowaways trying to disrespect us and nab a free ride! Execute Emergency Response C!"
10028020-113 = "Stowaways?! Ugh! Those little...!"
10028020-114 = "Again?! I won't stand for this anymore! Raze the grounds! Have no mercy! We'll throw every last stowaway in jail!"
10028020-115 = "READY YOUR WEAPONS!"
10028020-120 = "Um..."
10028020-121 = "Ummm..."
10028020-122 = "Is this real life? What in the world is happening right now?"
10028020-123 = "I..."
10028020-128 = "I have...everything under control...?"
