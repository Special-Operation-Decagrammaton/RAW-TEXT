[translation]
901010800320-8 = "先生？この時間どうされたんですか……？"
901010800320-9 = "[s1] \"HQに明かりがついているのを見て。\"\n[s2] \"みんなまだ寝てないの？\""
901010800320-12 = "はい。今日は夜間作戦がある日でして。"
901010800320-13 = "寝る前に調査した内容をまとめようとしていたんですが……。"
901010800320-14 = "すみません、気を遣わせてしまいましたね。"
901010800320-15 = "[s3] \"ううん、私もちょうど残業しているところだったから。\"\n[s4] \"日中の相談で、まだ仕事を片づけてなくてね……。\""
901010800320-18 = "先生、体調大丈夫？"
901010800320-19 = "こっちは交代で睡眠をとってるけど、先生はちゃんと休めてないんじゃない？"
901010800320-20 = "[s] \"大丈夫。ちゃんとサプリを飲んでいるから！\""
901010800320-21 = "いや、それ心配になるだけだから……。"
901010800320-28 = "では、先生が早く眠れるよう、速やかに報告を済ませよう。"
