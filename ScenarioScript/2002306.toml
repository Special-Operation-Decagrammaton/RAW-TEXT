[translation]
2002306-1 = "The Director's Dream"
2002306-2 = "Schale Executive Office"
2002306-3 = "On an afternoon just like any other..."
2002306-9 = "[ns] \"Kanna...? What's going on?\""
2002306-10 = "Uh, Sensei? Sorry to bother you when you're busy, but..."
2002306-11 = "Could I ask for your help for just a moment?"
2002306-12 = "[s1] \"Yes, of course you can.\"\n[s2] \"You don't usually call me for help.\""
2002306-15 = "Yes, well. I'm facing an issue that's out of my control..."
2002306-16 = "*sob* Wahhhhh...."
2002306-20 = "[ns] \"Is that a child crying?\""
2002306-21 = "Yes, that's exactly the problem."
2002306-24 = "I ran into a lost child on my way back to school from a mission."
2002306-25 = "WAHHHHH!"
2002306-28 = "[ns3] \"So you were trying to find the lost child's home?\"\n[ns4] \"So you can't get the kid to stop crying, Kanna?\""
2002306-31 = "Yes. That's right."
2002306-32 = "The Public Peace Bureau rarely has a need to deal with small children..."
2002306-33 = "I was not attempting to be intimidating, but I believe I've unintentionally scared this child."
2002306-34 = "*sniffle* *sob*"
2002306-35 = "I've attempted to question the child a bit for information-gathering purposes, but no matter what I say, she won't stop crying. The talks are not proceeding well."
2002306-36 = "I also tried to contact the Public Safety Bureau and hand her over to them, but they were all out on lunch..."
2002306-37 = "Do you have any suggestions to help calm her down?"
2002306-38 = "[s] \"How about a silly smile?\""
2002306-39 = "A smile?"
2002306-40 = "I'll give it a shot."
2002306-44 = "Excuse me. Please look over here."
2002306-45 = "(smile)"
2002306-46 = "WAHHHHH!"
2002306-50 = "It was not successful."
2002306-51 = "[ns] \"That's discouraging.\""
2002306-53 = "[ns] \"I'll head over right away. Could you give me the address?\""
2002306-54 = "What? You want to come help in person?"
2002306-55 = "You don't have to. Protecting and guiding lost citizens is Valkyrie Police School's job."
2002306-56 = "I can't ask for your help with basic Valkyrie responsibilities when you're already so busy—"
2002306-57 = "WAHHHHHHHHHHHHH!"
2002306-61 = "...I'll be waiting in front of the entrance to 5th Street in the north district of D.U. Shiba Town."
2002306-63 = "I hurried to the location Kanna gave me and calmed down the frightened child, getting a home address and phone number."
2002306-64 = "We finally found a Public Safety Bureau student to get the lost child home safely."
2002306-67 = "...Phew. I owe you one."
2002306-68 = "If you hadn't stepped in, I may have panicked just as much as the child had. It would've been a mess."
2002306-69 = "While I'm grateful for your help...I'm the director of Valkyrie Police School. It's an embarrassment that I can't take care of a single lost child on my own."
2002306-70 = "At one point I considered joining the Public Safety Bureau, but some upperclassmen advised me not to. I'm glad I ended up heeding their advice."
2002306-71 = "An unsociable Feral Hound at the Public Safety Bureau would only escalate bad situations."
2002306-72 = "Well, anyway. It's a good thing we were able to find a Public Safety Bureau member in the end."
2002306-73 = "[s] \"I think you would've done a great job as a Public Safety Bureau member too, Kanna.\""
2002306-74 = "Really?"
2002306-75 = "I don't see how. An officer who can't even properly calm a young child could hardly be expected to handle civil complaints."
2002306-76 = "It's a talent that's often overlooked in Valkyrie, but greeting people with a smile and being reassuring is a talent that some are born with, and some aren't."
2002306-77 = "I'm one of those that was not born with it."
2002306-78 = "[ns] \"But you kept trying to comfort the crying child.\""
2002306-80 = "[ns5] \"Any problem is hard when you're facing it for the first time.\"\n[ns6] \"Differences in natural talent can be overcome with hard work.\""
2002306-86 = "Hm..."
2002306-87 = "That might be. But there's not much point in thinking about it. It's not the path I went down."
2002306-88 = "It would be a life for Ogata Kanna, not the Feral Hound..."
2002306-89 = "And I still think the Feral Hound suits me best."
2002306-90 = "Anyway. Thanks again for your help."
2002306-91 = "Until next time... I'll see you when I see you."
