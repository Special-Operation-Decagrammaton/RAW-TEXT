[translation]
90101100-1 = "第10話;変わらない価値"
90101100-6 = "ちょっと……硬すぎでしょ。"
90101100-7 = "こちらFOX3！目標の装甲に45口径が通らない！"
90101100-8 = "火力支援を要請する！"
90101100-14 = "狙撃のため、ポイントベータ方向へ誘導中。"
90101100-15 = "FOX4、弾種をHE弾に切り替えて再装填。現在位置で待機しろ。"
90101100-16 = "AP弾じゃなくて大丈夫？"
90101100-17 = "装甲を貫通するだけでは意味がない。"
90101100-18 = "どうやら再生能力も持っているようだ。"
90101100-19 = "手ぬるい攻撃ばかりでは外殻が厚くなる一方だ。"
90101100-20 = "「生体装甲」ってやつだっけ？実際に相手すると厄介だねぇ。"
90101100-21 = "FOX2、やつの腹にスラッグ弾を叩き込めるか？"
90101100-23 = "しっかり効かせるなら至近距離からじゃないと……少し時間を稼いでくれる？"
90101100-24 = "遠隔操作できるクレーンで注意を引く。"
90101100-31 = "……持って10秒。"
90101100-32 = "確認！"
90101100-38 = "目標への命中確認！"
90101100-42 = "FOX4。FOX2が破った部分を狙撃できるか？"
90101100-43 = "そこが弱点だ。"
90101100-44 = "距離700m。風向は北から南へ12ノット。"
90101100-45 = "余裕だね。"
90101100-49 = "タンゴダウン。"
90101100-50 = "今だ、FOX3。クレイモア起爆！"
90101100-51 = "くたばれキモイ甲殻類！"
90101100-60 = "うわっ、なにこれ！？#nカニの口から水が噴き出してきた！"
90101100-61 = "うぇっ……生臭い。これ、臭い取れるよね……？"
90101100-62 = "……帰ったらお洗濯しないとだね。"
90101100-64 = "ああ、あああ……。"
90101100-65 = "怪異は倒れた。これでこの区画は安全だ。"
90101100-66 = "そ、そんな……噂のカニが本当に……。"
90101100-67 = "こんな……カニなんかのせいで……。"
90101100-72 = "相当ショックだったみたいだねぇ。"
90101100-73 = "あんなの見ちゃったら無理もないわよ。"
90101100-74 = "ファミリーの債権……美術品……必死に守ってきたのに……。"
90101100-75 = "倉庫もろとも全部壊されるなんて……！"
90101100-76 = "もうボスに合わせる顔が無い……！"
90101100-77 = "あ、そっち……？"
90101100-78 = "この港の警備業務に固執してたのは、そういう理由だったんですね。"
90101100-79 = "自業自得でしょ。同情の余地なし。"
90101100-80 = "ヴァルキューレの公安局に情報を流しとけば、勝手に処理してくれるでしょ。"
90101100-81 = "化けガニの噂と違って、ヴァルキューレが動く理由として十分だし。"
90101100-85 = "…………。"
90101100-86 = "[s] \"大丈夫？\""
90101100-87 = "はい、私は大丈夫です。ずっと後方にいましたから。"
90101100-88 = "危険に身をさらしたのはニコとクルミの方で――"
90101100-89 = "[s] \"作戦の話じゃないんだ。\""
90101100-93 = "[ns1] \"さっき尋問してた時のが気になって。\"\n[ns2] \"何か、思い当たることでもあった？\""
90101100-96 = "あの時は……。"
90101100-97 = "申し訳ありません。柄にもなく感情的になりました。"
90101100-98 = "ふと昔のことを思い出して……腹が立ったんです。"
90101100-99 = "[s] \"相手に？\""
90101100-100 = "……分かりません。"
90101100-101 = "怒ってはいましたが、よく考えると誰に向けた怒りだったのかは曖昧で。"
90101100-102 = "相手なのか、それとも同じ過ちを犯した過去の自分なのか。"
90101100-103 = "……あるいは、こうしたことが繰り返される社会そのものなのか。"
90101100-104 = "子どもじみた不満だとは思います。#nそれでも、思い通りに動かないこの状況がどうしても許せなかった。"
90101100-105 = "[s3] \"子どもだけの問題じゃないよ。\"\n[s4] \"思い通りにいかなかったら、大人だって腹は立つよ。\""
90101100-108 = "先生も……そうなのですか？"
90101100-109 = "[s5] \"もちろん。\"\n[s6] \"むしろ、平気なら最初から期待してなかったってことじゃないかな。\""
90101100-115 = "カルパッチョ・ファミリーの構成員が言っていた通り、今回の行為は法的には問題ありませんでした。"
90101100-116 = "怪談を流布してイメージを作り、それを利用して入札を優位に進めようとしていただけです。"
90101100-118 = "ですがその結果、多くの人が恐怖に晒され、実害が生じました。"
90101100-119 = "前から感じていましたが……どれほど規則を厳密にしても、悪人を完全に縛ることはできません。"
90101100-120 = "悪人は、規則の隙を探すことに長けています。"
90101100-122 = "複雑な規則は、市民に不便を強いるだけで、善意の被害者を生みかねない。"
90101100-123 = "完全な正義のように……抜け穴のない完璧な規則は、存在するのでしょうか。"
90101100-124 = "[s] \"それは……存在しないと思った方がいいよ。\""
90101100-125 = "……やはり、そうですか。"
90101100-126 = "[s] \"だいたいの規則は、人のために作られていないからね。\""
90101100-130 = "……はい？"
90101100-131 = "[s7] \"人のために規則が作られてるって思われがちだけど――\"\n[s8] \"実際は規則に合わせて人が変えられてることの方が多い。\""
90101100-136 = "[ns9] \"一度決められた規則は、簡単には変えられないから。\"\n[ns10] \"……移ろいやすい人の心とは違ってね。\""
90101100-139 = "[ns] \"だから人は、過去が作った規則に縛られやすいんだ。\""
90101100-140 = "では、過去に縛られないためには――"
90101100-141 = "理解し合えず、揺れ続ける人は、何を拠り所に生きるべきなのでしょうか？"
90101100-142 = "[s] \"変わらない価値を、道しるべにするんだ。\""
90101100-143 = "変わらない……価値。"
90101100-144 = "[ns] \"ユキノの正義は今も変わってない？\""
90101100-148 = "……そうだと、信じたいです。"
90101100-149 = "[s] \"なら、その変わらない正義を軸に、規則を整理し直そう。\""
90101100-150 = "はい。"
90101100-156 = "さっきから何をそんな深刻そうに話してるの？"
90101100-157 = "もしかして抜け駆け？"
90101100-158 = "バカを言うな。#n現場の整理が終わったあと、連邦生徒会にどう報告するかを話していただけだ。"
90101100-164 = "ただいま戻りました～"
90101100-165 = "ご苦労だった、FOX2。#n現場に他の市民はいなかったか？"
90101100-166 = "うん。立ち入り禁止にしてたから、巻き込まれた人はいないと思う。#n前もって港湾事務所に連絡しておいて正解だったね。"
90101100-167 = "あ、そうそう。現場を見て回ってたら、あのカニが倒れた場所でこれを見つけたの。"
90101100-169 = "[ns] \"これは……。\""
90101100-170 = "カニの残骸には見えないな。"
90101100-171 = "ガラス片……というより、別の世界を映す鏡みたい。"
90101100-172 = "前にも見たことあるよね？"
90101100-173 = "「くねくね」を倒した時も、似たものが落ちてた。"
90101100-174 = "あの時のはくねくねが立ってた草原みたいな景色を映してたけど……#n今回のは何も見えないね。"
90101100-175 = "暗い青だから……カニが生まれた深海の景色とか？"
90101100-176 = "何にせよ、私たちが相手にしてきたロアが似た性質の「副産物」を残しているってことは――"
90101100-178 = "最近急増している都市伝説と、それに伴う失踪事件が、偶然ではない可能性が高まったな。"
90101100-179 = "もっとも、何かを導くにはまだ証拠が足りないが。"
90101100-180 = "先生。今回もこのガラス片の保管をお願いできますか。"
90101100-181 = "[s] \"うん、預かっておくよ。\""
90101100-182 = "はぁ……疲れた……。"
90101100-183 = "じゃあそろそろ帰って――"
90101100-187 = "ん……？あそこ……コンテナの間を小さいカニが歩いてない？"
90101100-188 = "大きいのと戦ったせいで感覚おかしくなってない？#nあれ、普通サイズの成体だよ。"
90101100-189 = "でも、なんで急にあんなに大量に？"
90101100-193 = "……あ、もしかして。#n脅しのためにカルパッチョ・ファミリーが買い占めてたカニじゃない？"
90101100-194 = "倉庫が崩れたから逃げ出したんだよ。"
90101100-195 = "海の方へ向かってるね。"
90101100-200 = "壊れた倉庫を背に、大群で海に帰っていくの……なんか不気味。"
90101100-201 = "まるで、役目を終えて帰っていくみたいな……。"
90101100-202 = "この海域はしばらくカニがよくとれそうだね。"
90101100-203 = "そこに建物を壊すカニの目撃談が加わったら――"
90101100-204 = "今度は「怪物ガニが人の住処を壊す」って新しい怪談が生まれるかもねぇ。"
90101100-205 = "それはイヤ！1匹だけでも面倒だったのに、群れとか無理！"
90101100-209 = "つまり、作戦終了を宣言するにはまだ少し早いようだ。"
90101100-210 = "全隊員、これより港を徘徊するカニを全力で回収する。"
90101100-214 = "全部……？私たちが？"
90101100-215 = "この数、いつ拾い終わるのよ！"
90101100-216 = "[s11] \"でも後腐れを残さないためなら……。\"\n[s12] \"私も手伝うよ。\""
90101100-219 = "ほんともう……。"
90101100-221 = "カニはもうこりごりだーー！！"
90101100-223 = "（倉庫から逃げ出したカニを捕まえるため、FOX小隊と一緒に、夜通し港を走り回った……）"
90101100-225 = "次回;エピローグ"
