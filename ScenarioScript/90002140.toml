[translation]
90002140-1 = "ตอนที่ 14;สิ่งที่ติดตัวมาแต่เกิด"
90002140-3 = "ตะ... แต่ว่าพวกฉัน... กะ... ก็แค่... ทำตามที่ถูกตั้งโปรแกรมไว้เท่านั้นนะคะ...?"
90002140-4 = "[s1] \"ถึงจะเป็นอย่างนั้น แต่พวกเราก็เหมือนกันนั่นละ\"\n[s2] \"พวกเราก็ถูกตั้งโปรแกรมให้มีความรักเหมือนกัน\""
90002140-7 = "คะ... คะ?!"
90002140-8 = "มนุษย์ก็ถูกตั้งค่าให้มีความรักเหมือนกันเหรอคะ? ปะ... เป็นครั้งแรกเลยค่ะที่ฉันได้ยินเรื่องแบบนั้น...?"
90002140-10 = "[log]\"ทั้งการที่พ่อแม่รักลูกอย่างไม่มีเงื่อนไข\"[/log]"
90002140-12 = "[log]\"ลูกๆ รักพ่อแม่อย่างไม่มีเงื่อนไข\"[/log]"
90002140-15 = "[log]\"และการที่เรารักใครคนอื่นด้วย\"[/log]"
90002140-18 = "แต่ก็... น่าจะมีคนที่ไม่ได้เป็นอย่างนั้นอยู่ด้วยหรือเปล่า...?"
90002140-19 = "[s] \"ก็ต้องมีคนที่แตกต่างออกไปบ้างละ บางคนก็คงมีข้อยกเว้น\""
90002140-23 = "[ns3] \"แต่ตราบใดที่ยังมีโปรแกรมที่ชื่อว่า 'ยีน' อยู่\"\n[ns4] \"เราก็ต้องโอบกอดบางสิ่งมา[ruby=ตั้งแต่ถูกสร้าง]ตั้งแต่เกิด[/ruby]แล้วใช้ชีวิตต่อไป\""
90002140-26 = "[ruby=โปรแกรม]ยีน[/ruby]...!"
90002140-27 = "แล้ว[ruby=ยีน]คน[/ruby]ที่ไม่ได้เป็นแบบนั้น ส่วนใหญ่ก็จะไม่รอดชีวิตและหายไปราวกับไม่เคยมีตัวตนมาก่อน...?"
90002140-28 = "เพราะ[ruby=สิ่งมีชีวิต]มนุษย์[/ruby]ดำรงชีวิตอยู่ได้ด้วยวิธีนั้นมาจนถึงปัจจุบันนี้งั้นเหรอ...?"
90002140-30 = "[log]\"เพราะงั้นสิ่งที่สำคัญก็อาจจะเป็น\"[/log]"
90002140-32 = "[log]\"การที่ใครบางคนสามารถรักใครสักคนได้\"[/log]"
90002140-37 = "[log]\"การที่พวกเธอรักพี่สาวคนนั้น ก็เป็นแบบนั้นเหมือนกัน\"[/log]"
90002140-40 = "แม้ว่าทุกอย่าง... จะเป็นของปลอมตั้งแต่แรกก็ตามทีเหรอคะ...?"
90002140-41 = "ต่อให้จะขึ้นอยู่กับมุมมองของแต่ละคน แต่โลกนี้ก็เต็มไปด้วยของปลอมอยู่แล้ว...?"
90002140-42 = "เหตุผลหลักที่พวกฉันสร้างดินแดนเหล็กกล้าขึ้นมาน่ะเหรอคะ?"
90002140-43 = "มันก็... ใช่ค่ะ ท้ายที่สุดแล้ว... ก็เพื่อพี่มัลคูธค่ะ..."
90002140-44 = "ว่าไงนะคะ? ในบางแง่มุม การลงมือทำก็อาจช่วยเราได้งั้นเหรอคะ?"
90002140-45 = "เพราะนั่นอาจเป็นเกณฑ์ในการพิสูจน์ความจริงใจได้...?"
90002140-46 = "[s5] \"ทุกคนสร้างดินแดนเหล็กกล้าเพื่อมัลคูธใช่มั้ยล่ะ?\"\n[s6] \"นั่นก็เป็นการพิสูจน์ให้เห็นถึงส่วนหนึ่งของทุกคนแล้วนะ\""
90002140-52 = "คุณครูกำลังบอกว่า... ไม่เป็นไรงั้นเหรอคะ...?"
90002140-56 = "เพราะไม่ว่าคนทั้งโลกจะว่ายังไง..."
90002140-57 = "ตอนนี้คุณครูก็รับรู้แล้วว่าพวกฉันทำดีที่สุดแล้ว... งั้นเหรอคะ?"
90002140-58 = "ตะ... แต่จากมุมมองของคุณครู พวกฉัน... ก่อเรื่องไว้หลายอย่างเลยไม่ใช่เหรอคะ...?"
90002140-59 = "[s7] \"อื้อ! แล้วครูก็เป็นผู้ใหญ่ที่ใช้ไม่ได้ด้วยนี่สิ!\"\n[s8] \"อื้อ! แล้วครูก็ชอบยกเรื่องที่พูดไปแล้วมาพูดอีกครั้งด้วย!\""
90002140-63 = "[log]\"เรื่องนั้นน่ะ ก็แค่เพราะ[wa:500]ตอนนั้นมีข้อมูลไม่เพียงพอ\"[/log]"
90002140-66 = "[log]\"เพราะแบบนั้น[wa:1000] เรามาลงมือทำใหม่อีกครั้งนะ[/log]"
90002140-69 = "!!!!!"
90002140-74 = "ใช่แล้วละ... ตอนที่ยังทำแบบนั้นได้อยู่"
90002140-75 = "ตอนที่ยังมีโอกาสย้อนกลับไปได้อยู่ ก่อนที่จะสายไปกว่านี้..."
90002140-80 = "..."
90002140-81 = "อาริสึรู้ว่าตัวเองไม่มีสิทธิ์พูดว่า 'อย่าร้องไห้เลย' ค่ะ"
90002140-82 = "อาริสึคงไม่มีทางเข้าใจความเศร้าของพวกคุณได้ทั้งหมด"
90002140-83 = "แต่อย่างน้อยที่สุด อาริสึก็น่าจะร่วมแบ่งปันความเศร้านี้ไปพร้อมกับพวกคุณได้ค่ะ"
90002140-84 = "ในทางกลับกัน ถ้าอาริสึก็ต้องสูญเสียคุณครูไป..."
90002140-86 = "ถ้าต้องสูญเสียเคย์ โมโมอิ มิโดริ ยูสึ เอมิ โทคิ รุ่นพี่ฮิมาริ รุ่นพี่ริโอะ..."
90002140-87 = "ถ้าต้องสูญเสียใครบางคนไป อาริสึก็คงเสียใจจนทรมานเหมือนกันค่ะ"
90002140-89 = "แต่ต่อให้เป็นเธอ ก็ใช่ว่าจะรู้จักพวกฉันดีไม่ใช่เหรอ..."
90002140-90 = "ใช่ค่ะ อาริสึไม่รู้อะไรเลยค่ะ"
90002140-91 = "อาริสึอาจจะเข้าใจความเศร้าเสียใจ..."
90002140-92 = "ในระดับเดียวกับที่คนคนนั้นรู้สึกไม่ได้ค่ะ..."
90002140-93 = "ก็นั่นมันเป็นเรื่องที่เป็นไปไม่ได้นี่คะ อาริสึไม่ได้รับความสามารถแบบนั้นมาค่ะ"
90002140-94 = "เพราะงั้นอาริสึก็เลยจะทำในสิ่งที่อาริสึทำได้ค่ะ"
90002140-95 = "สิ่งที่ทำได้... เหรอคะ...?"
90002140-96 = "ใช่ค่ะ"
90002140-101 = "เพราะงั้น ไอน์ ซอฟ ออร์"
90002140-106 = "มาเป็นเพื่อนกับอาริสึเถอะนะคะ"
90002140-110 = "พะ... เพื่อนเหรอ!?"
90002140-111 = "?!?!"
90002140-112 = "...!"
90002140-113 = "ใช่ค่ะ อาริสึอยากเป็นเพื่อนกับพวกคุณค่ะ"
90002140-114 = "ช่วยทำให้อาริสึได้ร่วมแบ่งปันความเศร้ากับทุกคนได้ด้วยเถอะนะคะ"
90002140-115 = "อึก...!"
90002140-116 = "คุณครูเคยสอนอาริสึไว้ว่า เวลาที่ใครกำลังร้องไห้อยู่ แค่การที่เราเข้าไปร้องไห้เงียบๆ อยู่ข้างๆ"
90002140-117 = "ก็ช่วยให้คนคนนั้นมีความเข้มแข็งพอที่จะเอาชนะความเศร้านั้นได้แล้วค่ะ"
90002140-118 = "แต่ว่า... พี่มัลคูธ..."
90002140-119 = "ค่ะ"
90002140-120 = "ถ้าการทำแบบนั้นยังไม่เพียงพอ"
90002140-121 = "ถ้าอาริสึกับเพื่อนๆ ของอาริสึจะต้องถูกเกลียดอย่างช่วยไม่ได้ละก็..."
90002140-122 = "ตอนนั้นแค่บอกเรื่องที่อาริสึบอกไปก็ได้ค่ะ..."
90002140-127 = "(อ่า...)"
90002140-129 = "เพราะไม่ว่าพวกคุณจะรู้สึกยังไง อาริสึก็จะพยายามเต็มที่"
90002140-130 = "เพื่อยอมรับสิ่งนั้น... ให้ได้ค่ะ"
90002140-131 = "อาริสึยังจำได้ค่ะ"
90002140-133 = "ยังจำคำพูดที่ว่าการมีชีวิตอยู่คือความเจ็บปวดได้ชัดเจนเลยค่ะ"
90002140-134 = "และก็คิดว่าคำพูดนั้นก็มีส่วนที่เป็นความจริงอยู่บ้าง เพราะคุณครูเคยสอนมาน่ะค่ะ"
90002140-136 = "..."
90002140-137 = "พรุ่งนี้คือวันที่เราจะสูญเสียบางอย่างไป และพรุ่งนี้จะมีเรื่องร้ายเกิดขึ้นมากกว่าเรื่องดีค่ะ"
90002140-138 = "สิ่งที่ผู้คนพูดถึงกันมันก็แค่ความหวังที่เลือนราง ไม่ใช่[ruby=พรุ่งนี้]อนาคต[/ruby]ที่กำลังคืบคลานเข้ามาอย่างเงียบๆ หรอกค่ะ"
90002140-142 = "อดีตมักถูกจดจำไว้อย่างสวยงามภายใต้ความทรงจำ..."
90002140-143 = "อนาคตมักเข้ามาในแง่ดีท่ามกลางความลุ่มหลงที่เรียกว่าการคาดหวัง"
90002140-144 = "ส่วนปัจจุบันนั้นดำรงอยู่เพียงเบาบางระหว่างอดีตกับอนาคต... แต่พวกเรากลับแทบจะไม่ได้ครอบครอง#nมันไว้ได้เลย"
90002140-145 = "ถ้าตัดหลายๆ อย่างออก สิ่งเดียวที่เหลือในชีวิตอาจเป็นแค่ความเจ็บปวดอย่างที่พวกเธอว่าไว้ก็ได้"
90002140-146 = "แต่ก็เพราะอย่างนั้น"
90002140-147 = "คุณครูถึงได้สอนพวกเราว่าอย่าปล่อยเรื่องนี้ไว้เฉยๆ ค่ะ"
90002140-148 = "และเพราะมันเป็นอย่างนั้น พวกเราทุกคนถึงต้องมีความสุข"
90002140-149 = "เราต้องต่อสู้ต่อไป... ด้วยการมีความสุขให้มากขึ้นค่ะ"
90002140-150 = "ก็เหมือนกับเคย์ยังไงคะ"
90002140-151 = "คะ... คะ?!?!"
90002140-152 = "เคย์เป็นคนแรกที่ออกไปต่อสู้ และเป็นเพื่อนที่น่าภูมิใจของอาริสึค่ะ"
90002140-153 = "เคย์มักจะโกรธกับทุกเรื่องแปลกประหลาดที่เจอ และพยายามหลีกหนีจากเรื่องพวกนั้นให้ได้ค่ะ"
90002140-154 = "อาริสึเองก็อยากทำแบบนั้นบ้างค่ะ! ในแง่นั้นแล้ว เคย์คือเพื่อนที่ดีจริงๆ นะคะ!"
90002140-155 = "ถึงตอนที่บ่น... จะน่ากลัวก็เถอะค่ะ..."
90002140-156 = "เดี๋ยวสิ ที่ฉันทำแบบนั้นก็เพื่ออาริสึ..."
90002140-157 = "แง! ก็นี่ละค่ะ..."
90002140-158 = "เฮ้อ..."
90002140-162 = "ส่วนรุ่นพี่ริโอะก็เป็นคนที่เตรียมพร้อมเสมอค่ะ"
90002140-163 = "ฉะ... ฉันเหรอ...?!"
90002140-164 = "ค่ะ รุ่นพี่ริโอะเตรียมพร้อมสำหรับทุกความเป็นไปได้ที่คาดการณ์ได้ และความเป็นไปได้อื่นๆ ที่คาดการณ์ไม่ได้ด้วย"
90002140-165 = "รุ่นพี่ริโอะเป็นคนที่พยายามค้นหาสิ่งที่ตัวเองสามารถทำได้เสมอเลยค่ะ"
90002140-166 = "ต่อให้มีอะไรผิดพลาดหรือล้มเหลวในระหว่างกระบวนการนั้น ก็จะไม่ยอมแพ้เด็ดขาด"
90002140-167 = "และพยายามเลือกตัวเลือกที่แย่น้อยที่สุด แม้ว่านั่นจะหมายถึงการต้องทุ่มเทตัวเองอย่างหนักหน่วง#nในบางครั้งก็ตามค่ะ"
90002140-168 = "อาริสึคิดว่า... ตัวเองโชคดีมากๆ ที่มีคนแบบนี้อยู่ข้างๆ ค่ะ"
90002140-169 = "ทั้งเคย์ ทั้งรุ่นพี่ริโอะ และทุกคนที่อาริสึรู้จักด้วย"
90002140-170 = "และแน่นอนว่าต้องมีคุณครูด้วยค่ะ"
90002140-171 = "เพราะงั้นอาริสึจะไม่ยอมแพ้หรอกค่ะ"
90002140-172 = "จะไม่มีทาง จะไม่มีวันยอมแพ้แน่นอนค่ะ อาริสึได้เรียนรู้สิ่งนั้นมาค่ะ"
90002140-173 = "ค่ะ ไม่ว่าจะเกิดเรื่องอะไร อาริสึก็จะไม่หยุด[ruby=ต่อสู้]มีความสุข[/ruby]ค่ะ"
90002140-174 = "และอาริสึก็อยากเป็นเพื่อนกับพวกคุณทุกคนด้วยค่ะ..."
90002140-175 = "พะ... เพื่อน..."
90002140-176 = "ใช่ค่ะ อาริสึยังเป็นผู้กล้าฝึกหัดอยู่ค่ะ"
90002140-177 = "มีบางครั้งที่อาริสึเสียใจที่ตัวเองยังไม่เก่งพอและยังอ่อนแอในทุกๆ เรื่อง"
90002140-178 = "แต่ยังไงอาริสึก็จะไม่หยุดเอื้อมมือไปยังผู้คนที่อยู่รอบๆ แน่นอนค่ะ"
90002140-179 = "เพราะนั่นคือสิ่งที่ดีที่สุดที่อาริสึทำได้ในตอนนี้นี่คะ"
90002140-180 = "ยังจำได้หรือเปล่าคะ คุณครู? ที่คุณครูเคยบอกอาริสึเอาไว้ว่า ชีวิตไม่ได้มีความหมายหรือจุดหมาย#nอะไรมากมายน่ะค่ะ"
90002140-184 = "[ns] \"อื้อ... จำได้สิ\""
90002140-185 = "แต่ว่า... เรื่องนั้น มันเพราะอะไรกันล่ะ...?"
90002140-186 = "เพราะถ้าอะไรแบบนั้นมีอยู่จริง ชีวิตที่ตามหาสิ่งนั้นไม่เจอ ก็อาจจะเป็นชีวิตที่ไร้ค่าไปเลยทั้งชีวิตก็ได้ค่ะ"
90002140-187 = "..."
90002140-188 = "อาริสึคิดว่านั่นเป็นความคิดที่ผิดค่ะ แบบนั้นมันน่าเศร้าออกนี่คะ แย่มากเลยค่ะ"
90002140-189 = "เกมที่มีอาชีพเดียวหรืออัปสกิลได้แค่สายเดียวคือเกมกากค่ะ เป็นเกมที่ล้มเหลวในเรื่องปรับสมดุล ตั้งแต่ขั้นตอนการวางแผนเลยค่ะ"
90002140-190 = "อาริสึไม่อยากให้ใครอื่นต้องเศร้า เหมือนกับที่อาริสึไม่อยากให้ตัวเองต้องเศร้าค่ะ"
90002140-192 = "คนเราอาจรู้สึกมีความสุขขึ้นได้เมื่อได้เห็นใครบางคนมีความสุข"
90002140-197 = "และถ้าเห็นใครบางคนกำลังเจ็บปวด ตัวเองก็อาจเห็นอกเห็นใจคนคนนั้นขึ้นมาได้ด้วยค่ะ"
90002140-199 = "เรื่องแบบนั้นน่ะ... ส่วนมากมันเป็นการเสแสร้ง เธอเข้าใจผิดแล้วละ"
90002140-201 = "เราจะไปเข้าใจความรู้สึกของใครอื่นได้ยังไงกันเล่า"
90002140-202 = "ค่ะ ก็น่าจะเป็นอย่างนั้นค่ะ"
90002140-203 = "แต่ถึงยังไง อาริสึก็เชื่อว่าพวกเรายังพอจะประคับประคองกันและกันเพื่อก้าวผ่านชีวิตนี้ไปด้วยกันได้ค่ะ"
90002140-204 = "เหมือนกับที่คุณครูบอกว่าตัวเองโชคดีและมีความสุข..."
90002140-205 = "ที่ได้เจออาริสึ เคย์ รุ่นพี่ริโอะ และทุกๆ คนค่ะ"
90002140-206 = "อาริสึดีใจมากที่ได้เจอและพูดคุยกับพวกคุณทุกคนแบบนี้ค่ะ"
90002140-207 = "เพราะงั้นก็ขอร้องอีกครั้งนะคะ พวกเรามาเป็นเพื่อนกันเถอะค่ะ"
90002140-208 = "ถ้าช่วยพูดอย่างนั้นให้ละก็ อาริสึจะมีความสุขมากๆ เลยละค่ะ"
90002140-209 = "และอาริสึก็หวังว่าพวกคุณทุกคนจะมีความสุขเหมือนกับที่อาริสึมีความสุขค่ะ"
90002140-210 = "ก็[ruby=การต่อสู้]ความสุข[/ruby]เป็นสิ่งสำคัญที่สุดอย่างหนึ่งสำหรับเรา และเราก็ไม่อาจหยุดยั้งมันได้นี่คะ"
90002140-215 = "เข้าใจแล้วค่ะ... คำพูดของท่านธิดาเป็นอย่างนี้สินะคะ"
90002140-216 = "คะ... คะ?! ไม่ใช่ค่ะ อาริสึไม่ใช่ท่านธิดาอะไรหรอกค่ะ! อาริสึเป็นแค่อาริสึ..."
90002140-220 = "ค่ะ ค่ะ ฉันรู้แล้วค่ะ ละ... และนั่นก็อาจถูกต้องแล้ว แต่ว่า..."
90002140-221 = "อื้อ เมื่อกี้ที่บอกไปว่า 'คำพูดของท่านธิดา' น่ะ... พวกฉันหมายถึงพลังที่แฝงอยู่ในคำพูดนั้นต่างหาก"
90002140-222 = "พลังที่ทำให้ผู้ฟังยอมรับฟังโดยที่ตัวเองก็ไม่รู้ตัว... "
90002140-223 = "และก็เป็นอำนาจที่ไม่ได้รับมาจากภายนอก แต่เกิดขึ้นเองจากภายใน"
90002140-224 = "เพราะอย่างนั้น ในบางแง่มันจึงเป็นคำพูดที่มีอำนาจเบ็ดเสร็จค่ะ"
90002140-225 = "ตะ... แต่ว่า... ที่เรียกว่าความสุข... หรืออะไรนั่น... บอกตามตรงว่าพวกฉัน... มะ... ไม่รู้เลยค่ะ ว่ามันคืออะไร"
90002140-226 = "แล้วก็ไม่รู้ด้วยว่ายังจะมีแนวคิดคล้ายๆ ความสุขหลงเหลืออยู่อีกหรือเปล่า..."
90002140-227 = "พวกฉันไม่รู้เลยค่ะว่าสิ่งนั้นจะเอื้อมมือมาถึงพวกฉันได้หรือเปล่า"
90002140-228 = "ตะ... แต่ว่า... แต่ถึงยังไงก็..."
90002140-232 = "ขอบคุณนะคะ"
90002140-233 = "ขอบคุณ... จริงๆ ค่ะ"
90002140-240 = "อ๊ะ?!"
90002140-244 = "ไอน์?"
90002140-250 = "อึก... ขาฉัน...!"
90002140-257 = "(คุณครูเข้าไปประคองตัวเด็กๆ ที่กำลังจะล้มลงไว้ได้ทัน)"
90002140-262 = "คุณ... ครู...?"
90002140-263 = "เฮ้อ~ ท่านจะพรากไปแม้กระทั่งพลังงานที่เหลืออยู่ตอนนี้ด้วยสินะ?"
90002140-264 = "นั่นสิคะ เครื่องมือที่หมดประโยชน์แล้วคงต้องถูกทิ้งเป็นธรรมดาค่ะ เฮอะ..."
90002140-265 = "พูดแบบนั้นหมายความว่ายังไงคะ...?"
90002140-266 = "ไม่ใช่เรื่องซับซ้อนอะไรหรอกค่ะ ก็แค่..."
90002140-267 = "ทั้งผู้เลื่อมใสและพวกฉัน ต่างก็เป็นเครื่องมือที่ถูกสร้างมาเพื่อให้เป็นแบบนั้น"
90002140-268 = "และในเมื่อตอนนี้เป้าหมายนั้นสำเร็จลุล่วงแล้ว..."
90002140-269 = "ถ้างั้นจะเกิดเรื่องอะไร... กับพวกเธองั้นเหรอ?"
90002140-270 = "ทะ... ท่านผู้นั้นจะ... มาจุติในคิโวทอสในฐานะเทพค่ะ"
90002140-271 = "เอะ... เอ๋...? พวกฉันเคยบอกเรื่องนั้นไปหรือยังคะ...?"
90002140-272 = "ทั้งพวกฉัน ทั้งดินแดนเหล็กกล้า ท้ายที่สุดแล้วก็ไม่ต่างจากวัตถุเพื่อทำให้บรรลุเป้าหมายนั้น"
90002140-273 = "ถึงจะไม่แน่ใจนัก แต่ก็อาจจะถูกให้หยุดการทำงานไปทั้งอย่างนี้ หรือไม่ก็ถูกดูดกลืนหรือย่อยทิ้งไปค่ะ พอมาคิดดูแล้ว มันก็น่าตลกดีนะคะ"
90002140-277 = "..."
90002140-278 = "เอ่อ คุณครูคะ ฉันว่า..."
90002140-279 = "พวกคุณครูหนีไปจะไม่ดีกว่ากันเหรอคะ...?"
90002140-280 = "[s] \"หืม..?\""
90002140-281 = "คะ...?"
90002140-282 = "ถึงมันจะแปลกที่พวกฉันมาพูดแบบนี้ แต่ก็..."
90002140-286 = "ขอบคุณนะคะ พวกฉันดีใจค่ะ"
90002140-288 = "ดีใจที่คุณครูบอกว่าพวกฉันพยายามกันอย่างเต็มที่แล้ว"
90002140-289 = "ดีใจที่คุณครูบอกว่าพวกฉันทำดีที่สุดแล้ว"
90002140-291 = "และดีใจมากๆ... ที่คุณครูบอกว่าอยากให้พวกฉันมีความสุขค่ะ"
90002140-296 = "อืม... ก็นะ ก็อย่างที่ว่านั่นละ"
90002140-297 = "ในมุมมองของคุณครูแล้ว ก็ไม่มีอะไรต้องคิดให้ยุ่งยากขนาดนั้นไม่ใช่เหรอคะ? พวกวายร้ายที่พยายามจะทำลายคิโวทอสกลับตกหลุมพรางของตัวเอง งั้นก็ถือว่าจบเรื่อง!"
90002140-298 = "ถึงจะเกิดปัญหาใหญ่กว่านี้ตามมาในไม่ช้า แต่ก็เอาไว้คิดตอนนั้นแล้วกัน! ใช่มั้ยล่ะคะ? หรือว่าไม่ใช่คะ? วะฮะฮ่าฮ่า!"
90002140-299 = "ฮ่าฮ่า... แหะๆ"
90002140-303 = "คนขี้โกหก..."
90002140-304 = "เราอย่ามาจับผิดกันเองเรื่องคำโกหกตื้นๆ ดีกว่าค่ะ"
90002140-305 = "ก็ได้ค่ะ... ถ้าเป็นเรื่องปกติละก็ ก็คงจะเป็นอย่างนั้นค่ะ... ต้องเป็นอย่างนั้นแน่นอน..."
90002140-306 = "แต่ว่า!"
90002140-310 = "ตอนนี้ฉันทนต่อไปไม่ไหวแล้วค่ะ! เพราะพวกคุณทำให้ฉันโกรธยังไงล่ะคะ!"
90002140-311 = "หะ? หะ? หา? ทะ... ทำไมล่ะคะ?!"
90002140-312 = "มันก็แน่อยู่แล้ว! ตัวเองไม่ได้โอเคเลยสักนิด แต่ก็ยังแสร้งว่าโอเคดีอยู่! จิตใจของทุกคนน่ะบอบบาง จนฉันมองออกหมดเลย!"
90002140-313 = "อาริสึก็ถึงกับพูดแบบนั้นตั้งแต่แรกแล้วไม่ใช่เหรอคะ? อุตส่าห์มาถึงจุดนี้แล้ว แต่กลับมาบอกให้พวกฉันไปกันง่ายๆ เพียงเพราะว่าทุกอย่างมันไร้ความหมายแล้วน่ะเหรอคะ?"
90002140-314 = "อย่ามาตลกเลยค่ะ! ถ้ายังมีชีวิตอยู่ก็ดิ้นรนเข้าสิคะ! จะด้วยวิธีไหนก็ช่าง ต้องตะเกียกตะกายสู้ต่อไปสิคะ!"
90002140-315 = "อย่ามัวแต่นั่งรอและภาวนาให้ความสุขเข้ามาหาเองเลยค่ะ! พวกคุณมีมือมีเท้านะคะ!"
90002140-316 = "ถ้ามีสิ่งที่ปรารถนา และมันเป็นสิ่งที่พวกคุณต้องการอย่างสุดหัวใจอยู่ละก็!"
90002140-317 = "พวกคุณต้องทุ่มเททุกอย่างแล้ว[ruby=ต่อสู้]ลงมือทำ[/ruby]สิคะ ต้องให้พูดอีกกี่ครั้งกันเนี่ย!"
90002140-322 = "สิ่งที่..."
90002140-323 = "ปรารถนา..."
90002140-324 = "..."
90002140-329 = "ฮือ..."
90002140-330 = "ฉันอยากเจอพี่มัลคูธค่ะ"
90002140-331 = "ไม่ว่าจะเกิดเรื่องอะไรขึ้นก็ตาม..."
90002140-332 = "ฉันก็อยากเจอพี่มัลคูธอีกครั้งค่ะ..."
90002140-334 = "ยังมีอีกหลายสิ่งที่ฉันยังไม่ได้พูดออกไป แล้วก็ยังมีอีกหลายอย่างที่เรายังไม่ได้เล่นสนุกด้วยกันค่ะ"
90002140-335 = "ยังมี... ยังมีหลายอย่าง... แต่ถึงยังไง..."
90002140-337 = "ฉันก็ไม่อยาก... จากลาพี่มัลคูธ... ด้วยมือของพวกฉันเอง... ด้วยวิธีแบบนี้เลยค่ะ..."
90002140-338 = "..."
90002140-339 = "..."
90002140-346 = "อ๊ะ...!"
90002140-347 = "เหวอ?!"
90002140-351 = "ระวังด้วยค่ะ ทุกคน!"
90002140-355 = "[ns] \"หืม...?\""
90002140-356 = "(พื้นที่เหยียบอยู่ 'หายไป' ในชั่วพริบตา)"
90002140-360 = "คุณครู?!"
90002140-361 = "คะ... คะคะ... คุณครู!!!"
90002140-366 = "ตอนต่อไป;ท้องฟ้าใหม่ ผืนดินใหม่"
