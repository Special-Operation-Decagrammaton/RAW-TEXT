[translation]
90002140-1 = "第14話;與生俱來之物"
90002140-3 = "可，可是我們……終，終究……只是照著程式設定行動而已，不是嗎……？"
90002140-4 = "[s1] 「或許是這樣沒錯，但我們也是一樣的。」\n[s2] 「我們也同樣是被設定成會去愛的。」"
90002140-7 = "咦，咦！？"
90002140-8 = "人類也同樣，被設定成會去愛？#n這，這種說法，我還是第一次聽到……？"
90002140-10 = "[log]「就像父母無條件愛著孩子。」[/log]"
90002140-12 = "[log]「以及孩子無條件愛著父母。」[/log]"
90002140-15 = "[log]「進而，就連人愛著人也是。」[/log]"
90002140-18 = "可是，也有不是這樣的人吧……？"
90002140-19 = "[s] 「當然在程度上會有差異，也會存在著例外。」"
90002140-23 = "[ns3] 「然而只要名為『基因』的程式還存在──」\n[ns4] 「我們就同樣是[ruby=從被創造時]從出生時[/ruby]就帶著某些東西活著。」"
90002140-26 = "[ruby=程式]基因[/ruby]……！"
90002140-27 = "所以那些無法如此的[ruby=基因]人們[/ruby]，大多都無法生存下來……#n就像從一開始就不存在一樣地消失了……？"
90002140-28 = "[ruby=生命]人類[/ruby]……就是這樣一路延續到現在的嗎？"
90002140-30 = "[log]「所以真正重要的──」[/log]"
90002140-32 = "[log]「或許是能夠去愛這件事。」[/log]"
90002140-37 = "[log]「也就是你們愛著姐姐大人的這個事實。」[/log]"
90002140-40 = "就算那一切，從一開始就是假的……？"
90002140-41 = "反正從某些角度來看，這個世界本來就是由謊言構成的……？"
90002140-42 = "我們創造鋼鐵大陸的根本原因……？"
90002140-43 = "那是……沒錯，終究是為了姐姐大人……"
90002140-44 = "咦？你說在某種層面上，行動可能會拯救我們？"
90002140-45 = "因為那可以成為辨別真實的一個標準……？"
90002140-46 = "[s5] 「你們是為了姐姐才創造了鋼鐵大陸對吧？」\n[s6] 「我認為那確實證明了你們的某些部分。」"
90002140-52 = "所以你是想告訴我們……沒關係嗎？"
90002140-56 = "就算全世界都指責我們也一樣……"
90002140-57 = "因為老師你，已經知道我們盡了最大的努力……？"
90002140-58 = "可，可是從老師的立場來看……我們不是把很多事情都搞得一團糟嗎……？"
90002140-59 = "[s7] 「嗯！畢竟我是個壞大人嘛！」\n[s8] 「我最喜歡把以前聽過的話，原封不動地奉還給別人了！」"
90002140-63 = "[log]「那只是因為[wa:500]資訊不足而已。」[/log]"
90002140-66 = "[log]「所以，[wa:1000]只要重新來過就好了。」[/log]"
90002140-69 = "！！！"
90002140-74 = "……是啊。現在還來得及。"
90002140-75 = "在一切都為時已晚，變得無法挽回之前……"
90002140-80 = "……"
90002140-81 = "愛麗絲知道……自己沒有資格請你們不要哭。"
90002140-82 = "也覺得愛麗絲可能無法完全理解你們的悲傷。"
90002140-83 = "不過，至少我可以陪你們一起悲傷。"
90002140-84 = "如果愛麗絲也失去了老師……"
90002140-86 = "失去Kei、桃井、綠、柚子、英美、季、陽葵前輩和莉央前輩……"
90002140-87 = "如果失去其他人的話，一定也會難過到無法忍受。"
90002140-89 = "說是這麼說，你對我們也還不是很了解吧……"
90002140-90 = "沒錯。愛麗絲什麼都不知道。"
90002140-91 = "我想……愛麗絲恐怕……"
90002140-92 = "……無法像當事人一樣，完整理解他的悲傷。"
90002140-93 = "那本來就是不可能的事……因為愛麗絲並沒有被賦予那樣的功能。"
90002140-94 = "所以愛麗絲，打算做愛麗絲能做到的事。"
90002140-95 = "能做到的事……？"
90002140-96 = "是的。"
90002140-101 = "Ain、Soph、Aur。"
90002140-106 = "請和愛麗絲成為朋友吧。"
90002140-110 = "朋，朋友！？"
90002140-111 = "！？！？"
90002140-112 = "……！"
90002140-113 = "是的。愛麗絲想成為你們的朋友。"
90002140-114 = "並且……希望能讓愛麗絲和你們一起悲傷。"
90002140-115 = "唔……！"
90002140-116 = "有人在哭泣的時候，只要在旁邊靜靜地陪他一起哭……"
90002140-117 = "那個人就能獲得克服悲傷的力量……這是老師之前教我的。"
90002140-118 = "可是，姐姐大人他……"
90002140-119 = "是的。"
90002140-120 = "如果這樣還是不夠……"
90002140-121 = "如果你們還是恨著愛麗絲和愛麗絲的朋友們的話……"
90002140-122 = "那個時候，請直接告訴我們。"
90002140-127 = "（啊啊……）"
90002140-129 = "無論你們感受到什麼……"
90002140-130 = "愛麗絲都會盡全力……努力去接受它。"
90002140-131 = "愛麗絲還記得。"
90002140-133 = "活著就是痛苦那段話，至今依然記憶猶新。"
90002140-134 = "而且愛麗絲認為，那段話想必有它正確的地方。#n因為，這也是老師教我的。"
90002140-136 = "……"
90002140-137 = "明天有可能是會失去什麼的日子，不好的事情往往比好事來得多。"
90002140-138 = "人們談論的只不過是模糊的希望，而不是悄然逼近的[ruby=明日]未來[/ruby]。"
90002140-142 = "……在回憶之中，過去通常會受到美化。"
90002140-143 = "而未來則會在名為期待的錯覺之中，被人樂觀地看待。"
90002140-144 = "現在雖然以極為稀薄的形式存在於兩者之間，我們卻很難真正擁有它。"
90002140-145 = "如果撇開這些不談，人生或許真的只會留下痛苦……就像你們說的一樣。"
90002140-146 = "但是正因如此，老師才會教導我們。"
90002140-147 = "要我們不能就這樣放著不管。"
90002140-148 = "我們所有人都應該變得幸福。"
90002140-149 = "藉由變得幸福……持續戰鬥下去。"
90002140-150 = "就像Kei一樣。"
90002140-151 = "咦，咦咦！？！？"
90002140-152 = "Kei是最先挺身戰鬥的、愛麗絲引以為傲的朋友。"
90002140-153 = "總是對生活中遇到的所有不合理感到生氣，並努力想辦法擺脫它們。"
90002140-154 = "愛麗絲也希望能這麼做！#n所以從這個意義上說，Kei真的是個非常好的朋友！"
90002140-155 = "……雖然碎碎念的時候，還是很可怕就是了。"
90002140-156 = "不，那都是為了愛麗絲好……"
90002140-157 = "嗚哇！愛麗絲害怕的就是這種地方……"
90002140-158 = "唉……"
90002140-162 = "還有莉央前輩是會做好準備的人。"
90002140-163 = "我，我嗎……！？"
90002140-164 = "是的。為了所有能夠預測，以及無法預測的可能性做好準備。"
90002140-165 = "盡可能找出自己能做的事。"
90002140-166 = "就算在過程中遭遇挫折或失敗，也絕對不會放棄。"
90002140-167 = "有時甚至不惜犧牲自己，也要迴避最糟的選項。"
90002140-168 = "愛麗絲覺得……能有這樣的人在身邊，真是太好了。"
90002140-169 = "不管是Kei、莉央前輩，還是愛麗絲認識的所有人……"
90002140-170 = "當然老師也是。"
90002140-171 = "所以──愛麗絲絕不會放棄的。"
90002140-172 = "絕對絕對不會放棄。愛麗絲已經學會了這一點。"
90002140-173 = "不管發生什麼事，愛麗絲都不會放棄[ruby=戰鬥]幸福[/ruby]。"
90002140-174 = "……並且同樣程度地，希望能和你們成為朋友。"
90002140-175 = "朋，友……"
90002140-176 = "是的。愛麗絲還只是見習勇者。"
90002140-177 = "既不成熟又充滿不足，有時甚至會為自己的弱小而感到難過。"
90002140-178 = "不過，唯獨向身邊的人伸出手這件事，無論什麼時候都不會停止。"
90002140-179 = "因為那是現在的愛麗絲所能做到的──最好的事。"
90002140-180 = "你還記得嗎，老師？#n老師曾經告訴過愛麗絲，人生不需要多麼龐大的意義或目的。"
90002140-184 = "[ns] 「嗯……我記得。」"
90002140-185 = "可是，為什麼呢……？"
90002140-186 = "因為如果那種東西真的存在……找不到它的人生，就會變得毫無價值了。"
90002140-187 = "……"
90002140-188 = "愛麗絲覺得那是錯誤的。#n因為那實在太過悲傷，也太過悲慘了。"
90002140-189 = "只有一種職業或技能樹的遊戲，只不過是個爛遊戲而已。#n那種東西從企劃階段就已經失敗了。"
90002140-190 = "愛麗絲不希望自己變得悲慘，也同樣不想看見其他人變得悲慘。"
90002140-192 = "人看到別人幸福的樣子，自己也會感到幸福。"
90002140-197 = "看到別人痛苦的樣子，自己也會對痛苦產生共鳴。"
90002140-199 = "……那不過是偽善。只是錯覺而已。"
90002140-201 = "人怎麼可能理解別人的心情呢。"
90002140-202 = "嗯，或許確實是這樣沒錯。"
90002140-203 = "不過愛麗絲認為，光是這樣就足以讓我們互相支持著活下去了。"
90002140-204 = "就像老師說過很高興能遇見愛麗絲、Kei、莉央前輩，還有其他所有人……"
90002140-205 = "說自己很幸福一樣。"
90002140-206 = "愛麗絲也認為能像這樣和你們相遇、交談……這件事本身就很值得高興。"
90002140-207 = "所以，愛麗絲想再次拜託你們成為愛麗絲的朋友。"
90002140-208 = "如果你們願意這麼說……愛麗絲會真的感到非常幸福。"
90002140-209 = "而且愛麗絲希望，能讓你們也獲得相同的幸福。"
90002140-210 = "[ruby=戰鬥]幸福[/ruby]才是我們絕對不能停止的，對我們來說最重要的事之一。"
90002140-215 = "……我明白了。那是王女的話語呢。"
90002140-216 = "什，什麼！？不是的！愛麗絲並不是什麼王女！#n愛麗絲只是愛麗絲而已……！"
90002140-220 = "是，是的。這點我也明白……#n雖然明白，可是……"
90002140-221 = "嗯。我們所說的王女的話語，指的是話語本身所擁有的力量。"
90002140-222 = "能讓聽者在不知不覺中傾耳聆聽……"
90002140-223 = "不是從外部賦予，而是由內部自然產生的權威。"
90002140-224 = "因此在某種意義上，也能稱得上是擁有絕對力量的話語。"
90002140-225 = "不，不過……幸福，是嗎……#n老實說，那究竟是什麼……我們還是不，不太明白。"
90002140-226 = "……也不知道幸福這個概念，究竟還有沒有殘留下來。"
90002140-227 = "就連它是否會向我們伸出手也是。"
90002140-228 = "但，但是……"
90002140-232 = "謝謝你。"
90002140-233 = "真的……很謝謝你。"
90002140-240 = "啊啊！？"
90002140-244 = "Ain？"
90002140-250 = "唔，我的腿……！"
90002140-257 = "（總算設法接住了快要跌倒的孩子們……）"
90002140-262 = "老，師……？"
90002140-263 = "啊～啊，居然連僅存的力氣也要拿走啊。"
90002140-264 = "也是啦。畢竟失去利用價值的工具，就只有被丟棄的命運而已……嘿嘿。"
90002140-265 = "……那是什麼意思？"
90002140-266 = "……不是什麼難懂的事。"
90002140-267 = "無論預言者還是我們，都只是為了變成這樣的工具而已。"
90002140-268 = "既然現在，那個目的已經達成……"
90002140-269 = "那麼你們……會發生什麼事呢？"
90002140-270 = "那，那位大人，將作為神……降臨奇普托斯……"
90002140-271 = "咦，咦……？這件事，我們有說過嗎……？"
90002140-272 = "我們也好，鋼鐵大陸也好……都只是為了那個目的而創造的材料。"
90002140-273 = "雖然不太確定，但我們可能會就這樣停止功能，或者被吸收分解吧？#n現在想想其實還挺好笑的。"
90002140-277 = "……"
90002140-278 = "那個，老師。果然……"
90002140-279 = "就算只有老師和大家也好，趁現在趕快逃走……你覺得怎麼樣呢……？"
90002140-280 = "[s] 「咦……？」"
90002140-281 = "嗯……？"
90002140-282 = "雖然我們這麼說可能很奇怪……"
90002140-286 = "謝謝你們。我很高興。"
90002140-288 = "被說努力了……很高興。"
90002140-289 = "被說已經盡力了……很高興。"
90002140-291 = "被說希望我們幸福……真的，很高興。"
90002140-296 = "嗯……是啊。就是這樣。"
90002140-297 = "站在老師的立場，其實不用想得太複雜吧？#n想把奇普托斯弄得亂七八糟的壞蛋，即將自食惡果到此結束了！"
90002140-298 = "雖然更大的問題可能很快就會到來，不過那種事等時候到了再考慮就好！#n大概就是這樣吧？哇哈哈哈！"
90002140-299 = "哈哈，哈……"
90002140-303 = "……騙子。"
90002140-304 = "這種明顯的謊言，就不要刻意拆穿了吧。"
90002140-305 = "是啊……如果是平常的情況，應該……肯定會那樣的吧……"
90002140-306 = "可是……！"
90002140-310 = "現在這樣實在是讓我氣到忍無可忍！#n你們現在把我惹火了知道嗎！"
90002140-311 = "咦，咦咦？#n為，為什麼！？"
90002140-312 = "這種事還需要問嗎！#n明明一點都不好卻裝作沒事！心思膚淺到一眼就能看穿！"
90002140-313 = "明明愛麗絲都說成那樣了，居然跟我說什麼不用想得太複雜，還叫我們逃跑？"
90002140-314 = "別開玩笑了！既然還活著就給我掙扎啊！#n不管做什麼都好，扭動、掙扎著去戰鬥啊！"
90002140-315 = "不要只是祈禱幸福總有一天能夠降臨！#n你們的手不是還能動嗎！"
90002140-316 = "如果有渴望的事物，而且是比任何東西都迫切的願望……！"
90002140-317 = "我已經說過很多次了，賭上一切去[ruby=戰鬥]行動[/ruby]啊！"
90002140-322 = "渴望……"
90002140-323 = "什麼的……"
90002140-324 = "……"
90002140-329 = "嗚……"
90002140-330 = "好想見姐姐大人。"
90002140-331 = "不管會發生什麼，會變成怎樣都好……"
90002140-332 = "好想再見姐姐大人一面……"
90002140-334 = "還有好多沒說出口的話……還有好多沒有一起玩過的事情。"
90002140-335 = "還有……還有……#n可是……"
90002140-337 = "像這樣，由我們親手……和姐姐大人分開……我不要……"
90002140-338 = "……"
90002140-339 = "……"
90002140-346 = "啊……！"
90002140-347 = "哇！？"
90002140-351 = "大家小心！"
90002140-355 = "[ns] 「咦……？」"
90002140-356 = "（就在那個瞬間，腳下的地面如字面上的意思「消失了」）"
90002140-360 = "老師！？"
90002140-361 = "老，老老，老師！！！"
90002140-366 = "下一話;新天新地"
