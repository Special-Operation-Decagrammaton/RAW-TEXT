[translation]
90002140-1 = "Episode 14;What One Is Born With"
90002140-3 = "A-All this time, weren't we just acting according to our programming?"
90002140-4 = "[s1] \"Sure, but it's not so different for humans.\"\n[s2] \"We are also programmed to love.\""
90002140-7 = "Wh-What?!"
90002140-8 = "Th-That's possible? I've never heard of that before..."
90002140-10 = "[log]\"Yes. Like the unconditional love a parent has for their child.\"[/log]"
90002140-12 = "[log]\"And the reciprocal love a child has for their parent.\"[/log]"
90002140-15 = "[log]\"And every day, people fall in love with each other.\"[/log]"
90002140-18 = "But not every single human is like that, right?"
90002140-19 = "[s] \"Of course, humans have exceptions and differences too.\""
90002140-23 = "[ns3] \"But our genes are our own preset programming.\"\n[ns4] \"We're born and created in some ways too. We live with those things everyday.\""
90002140-26 = "Genes...and programming...!"
90002140-27 = "Those people whose genes weren't programmed to love... Natural selection weeded them out?"
90002140-28 = "That's how human life has persevered, all this time?"
90002140-30 = "[log]\"The ability to love one another\"[/log]"
90002140-32 = "[log]\"is what makes us human.\"[/log]"
90002140-37 = "[log]\"And you loved your Elder Sister.\"[/log]"
90002140-40 = "Even if that love was artificially implanted into us?"
90002140-41 = "...You think that \"reality\" and \"artifice\" are all a matter of perspective?"
90002140-42 = "You want to know why we decided to create the Steel Continent?"
90002140-43 = "Because... We did it for Elder Sister. It was all to save her."
90002140-44 = "...What do you mean? How could that be our \"salvation\"?"
90002140-45 = "...It's evidence of an obvious truth?"
90002140-46 = "[s5] \"You did this out of love for your sister.\"\n[s6] \"More than anything, that shows your character.\""
90002140-52 = "You're...excusing what we've done?"
90002140-56 = "No matter how the world may condemn us..."
90002140-57 = "...you know that we were doing what we could?"
90002140-58 = "B-But, from a human perspective, do you not condone our actions?"
90002140-59 = "[s7] \"Hm! In the end, I really am a bad adult!\"\n[s8] \"I'll throw your words back in your face every chance I get!\""
90002140-63 = "[log]\"That was just[wa:500] simply because of lack of information.\"[/log]"
90002140-66 = "[log]\"So,[wa:1000] you just have to start over.\"[/log]"
90002140-69 = "!!!"
90002140-74 = "...Yes. As long as you take the opportunity when it arises..."
90002140-75 = "You can start over. You only have to take the first step."
90002140-80 = "..."
90002140-81 = "I have no right to try to stop your crying."
90002140-82 = "I will never be able to truly understand the pain you are enduring right now."
90002140-83 = "However, what I can do is empathize with your grief."
90002140-84 = "If I lost Sensei..."
90002140-86 = "Or Kei, Momoi, Midori, Yuzu, Eimi, Toki, Himari, or Rio..."
90002140-87 = "If I lost any of these people whom I love, I do not know if I could bear the sadness."
90002140-89 = "...You know nothing about us."
90002140-90 = "You are right. I do know nothing."
90002140-91 = "I may never be able to feel..."
90002140-92 = "...another's pain, exactly as they do."
90002140-93 = "What's impossible is impossible. I was not programmed with that feature."
90002140-94 = "But I would still like to do what I can."
90002140-95 = "What you can...?"
90002140-96 = "Yes."
90002140-101 = "That is why I have a request of you. Ein, Sof, Ohr."
90002140-106 = "Will you be my friend, please?"
90002140-110 = "F-Friend?!"
90002140-111 = "What?!"
90002140-112 = "...!"
90002140-113 = "Mhm. I have wanted to be your friend since we first met."
90002140-114 = "As your friend, I would be honored to carry some of your grieving."
90002140-115 = "Ugh...!"
90002140-116 = "\"Being able to cry alongside someone who is suffering..."
90002140-117 = "...can give that person the strength to fight to the end.\" Sensei taught me that."
90002140-118 = "But Elder Sister is..."
90002140-119 = "Yes."
90002140-120 = "And if the thought of our friendship is too much to abide by..."
90002140-121 = "If your hatred of me and my friends runs too deep..."
90002140-122 = "I will understand."
90002140-127 = "(Ah...)"
90002140-129 = "I will listen to any and all of your feelings."
90002140-130 = "And...I will try to accept them all."
90002140-131 = "I cannot seem to forget..."
90002140-133 = "The memory of you declaring that life is suffering keeps playing in my head."
90002140-134 = "And I believe you are correct. Because of something Sensei taught me."
90002140-136 = "..."
90002140-137 = "With the promise of tomorrow comes the guarantee of loss. And every next day, it's possible that more bad will happen than good."
90002140-138 = "It is easier to speak of vague hopes of a faraway future than to look a frightening tomorrow in the eye."
90002140-142 = "...It's easy to look at the past with rose-colored glasses."
90002140-143 = "Like how the illusion of expectations can easily color the future with optimism."
90002140-144 = "And the present lies somewhere between the two, difficult to grasp or hold on to."
90002140-145 = "It's easy to languish in suffering, to decide that fighting for tomorrow is too much."
90002140-146 = "However, after meeting Sensei..."
90002140-147 = "I have learned that we can also choose not to."
90002140-148 = "It is in those moments of suffering that we must protect our happiness the most."
90002140-149 = "It is then that happiness is our own kind of weapon."
90002140-150 = "Just like Kei."
90002140-151 = "Wh-What?!"
90002140-152 = "Kei is a friend I am very proud of, one who will always fearlessly lead the charge into battle."
90002140-153 = "She gets angry very easily, at all sorts of things I would not expect, but never stops putting one foot in front of the other."
90002140-154 = "She inspires me all the time! I want to be just like her. My best friend, Kei!"
90002140-155 = "...I do wish she could be less scary when she scolds me."
90002140-156 = "That's all for your own good, okay?!"
90002140-157 = "Waaah! See?!"
90002140-158 = "*sigh*..."
90002140-162 = "And Rio is my friend who always comes prepared."
90002140-163 = "M-Me?!"
90002140-164 = "She prepares for every single possibility she can think of, and somehow even the ones she can't."
90002140-165 = "No matter how difficult the situation, she will always try to do something to help."
90002140-166 = "If a plan gets messed up, or even if something breaks, she is never deterred!"
90002140-167 = "She'll always try to do what's best for everyone, sometimes at the risk of her own safety!"
90002140-168 = "I am...very blessed to be surrounded by such good people."
90002140-169 = "Kei, Rio, all my friends."
90002140-170 = "And, of course, Sensei."
90002140-171 = "That is why I cannot give up."
90002140-172 = "I have decided that I will never, ever give up."
90002140-173 = "No matter how bleak things become, I will always choose happiness."
90002140-174 = "...And I will always hold out my hand in friendship, if I can."
90002140-175 = "Friendship..."
90002140-176 = "You see, I am still only an apprentice hero."
90002140-177 = "Sometimes it is so frustrating. Because I am still weak and inadequate to protect those around me."
90002140-178 = "But that doesn't mean I should stop trying to help where I can."
90002140-179 = "That is me doing the best I can, in the here and now!"
90002140-180 = "Do you remember, Sensei? When you told me that life ultimately does not need a higher purpose."
90002140-184 = "[ns] \"Yeah... I do.\""
90002140-185 = "What...do you mean by that? How can that be?"
90002140-186 = "Because then that would mean if you could not find your purpose in life... You will have \"failed\" or \"lived incorrectly.\""
90002140-187 = "..."
90002140-188 = "To me, that is almost too sad to think about. Does that not sound like a miserable world?"
90002140-189 = "If a game had only one job or skill tree for every single person, it is not the people's fault. That is bad game design."
90002140-190 = "Of course I do not wish to feel sadness. However, I also do not wish to see others feel sad."
90002140-192 = "People can feel happiness by seeing others happy."
90002140-197 = "And feel pain when seeing others suffer."
90002140-199 = "...Illusions and hypocrisy. Those are fancy words to dress up a biological response."
90002140-201 = "It's impossible for someone to feel what another person is feeling."
90002140-202 = "Yes. That is true."
90002140-203 = "But I believe we can understand enough. Enough to support each other and live on."
90002140-204 = "When Sensei told us that they were glad they met all of us: me, Kei, Rio, and all our other friends..."
90002140-205 = "That I made them happy..."
90002140-206 = "I understand what they meant now. I am happy I got to talk to you again!"
90002140-207 = "So, if you are ready, I would like to try to be friends!"
90002140-208 = "I would be very, very happy if you did too!"
90002140-209 = "And maybe we'll be able to feel just enough of the same happiness."
90002140-210 = "Because for humanity, our right to happiness, is the one thing we must never, ever let go of."
90002140-215 = "...I see now... The words of the Princess of the Nameless Gods."
90002140-216 = "M-Me?! No, no way! I am Aris, not a princess!"
90002140-220 = "Y-Yes. We understand that too. A-And you would be correct, but..."
90002140-221 = "What she meant was the power your words hold."
90002140-222 = "A certain charisma that makes people listen. "
90002140-223 = "It's an authority of its own, one that comes from inside."
90002140-224 = "The greatest power one can wield with words."
90002140-225 = "B-But... We still don't really understand... What even is happiness...?"
90002140-226 = "We don't know if this \"happiness\" is something we are capable of feeling."
90002140-227 = "If it would ever hold out its hand to us."
90002140-228 = "B-But, but..."
90002140-232 = "From the bottom of my heart..."
90002140-233 = "Thank you."
90002140-240 = "Whoa?!"
90002140-244 = "Ein?"
90002140-250 = "Tch, my legs..."
90002140-257 = "I just barely managed to grab the three as their legs gave out from under them."
90002140-262 = "Sensei...?"
90002140-263 = "Aha. So you want to siphon away the last whispers of our energy."
90002140-264 = "A fitting end for disposable tools. Heh."
90002140-265 = "What... What are you saying?"
90002140-266 = "It's simple... It's logical."
90002140-267 = "Us... The prophets... Our only purpose was to make this moment happen."
90002140-268 = "Now that we've completed that mission, we'll..."
90002140-269 = "You'll...what? What is going to happen to you?"
90002140-270 = "O-Our master comes. He comes to descend upon Kivotos as a god."
90002140-271 = "H-Huh...? Have we had this conversation before?"
90002140-272 = "The Steel Continent, the prophets, and us, the engineers are nothing more than a means to an end."
90002140-273 = "Even we don't know exactly what will happen, but we'll probably be disconnected? Absorbed? Eaten? An amusing thought..."
90002140-277 = "..."
90002140-278 = "Um, Sensei. You should..."
90002140-279 = "You should run away while you still can..."
90002140-280 = "[s] \"Huh...?\""
90002140-281 = "What...?"
90002140-282 = "M-Maybe you don't want to hear this from us, but I wanted to say..."
90002140-286 = "Thank you. You made us happy."
90002140-288 = "We were happy to hear that we worked hard."
90002140-289 = "We were happy to hear that we did the best we could."
90002140-291 = "And hearing that you wanted us to live happily...made us very happy."
90002140-296 = "...What she said."
90002140-297 = "Logically, this isn't a difficult decision, you know! You've taken down the evil villains that wanted to destroy Kivotos, and everyone lives happily ever after! The end!"
90002140-298 = "Sure, the big bad boss is still lurking around the corner, but one day at a time? Right? Hahaha!"
90002140-299 = "Hah. Haha..."
90002140-303 = "...Liar."
90002140-304 = "You really need to learn to look the other way."
90002140-305 = "...I can't argue with that. Most of the time."
90002140-306 = "But not right now!"
90002140-310 = "You piss me off! If I don't say this right now, I will probably be mad about this for the rest of my life!"
90002140-311 = "H-H-Huh? Wh-Why?!"
90002140-312 = "Your superficial attempts at hiding your feelings are appalling! Not a single person is fooled by that flimsy brave face you're putting on!"
90002140-313 = "Didn't you listen to Aris' request? She wants to be friends! F-R-I-E-N-D-S! And you're going to answer her by just RUNNING AWAY?"
90002140-314 = "You three are seriously annoying me to the very end! You're alive, so keep on struggling! Even if it's ugly, and you have to crawl and squirm and claw forward, struggle! Keep fighting!"
90002140-315 = "Don't just sit there, bemoaning your situation and whining that you want to be happy! Do something about it!"
90002140-316 = "There's something you want, right? You'll do anything to get it back, RIGHT?!"
90002140-317 = "At the risk of repeating myself, DO SOMETHING! What do you have to lose?"
90002140-322 = "Something..."
90002140-323 = "...we want."
90002140-324 = "..."
90002140-329 = "*sob*"
90002140-330 = "We want to see our sister."
90002140-331 = "It doesn't matter what it will cost us..."
90002140-332 = "We just want to see her again!"
90002140-334 = "There's still so much I have to tell her! Many lifetimes of things we have to do together!"
90002140-335 = "But... But... We can't..."
90002140-337 = "This wasn't...how I wanted to say good bye to her... Not like this..."
90002140-338 = "..."
90002140-339 = "..."
90002140-346 = "Ah...!"
90002140-347 = "Whoa?!"
90002140-351 = "Everyone, watch out!"
90002140-355 = "[ns] \"Huh...?\""
90002140-356 = "The floor beneath me quite literally disappeared."
90002140-360 = "Sensei?!"
90002140-361 = "S-S-S-Sensei!!!"
90002140-366 = "Next Episode;New Sky, New Land"
