[translation]
10011075-7 = "Okey dokey! You passed! Congratulations!"
10011075-8 = "*pant* *pant* Is it over?"
10011075-9 = "Yes, ma'am! I'll have to go report it to the big guys. Be right back!"
10011075-13 = "[ns] \"Hopefully that's the end of that.\""
10011075-15 = "Y-You guys! Are you okay?"
10011075-16 = "My lord! President! Are you hurt?!"
10011075-17 = "Tsukuyo! Izuna!"
10011075-18 = "You vanished out of nowhere... Izuna and I tried to go after you..."
10011075-19 = "But we got lost inside the ninja mansion! Just when all hope was lost, Tsukuyo came up with a solution!"
10011075-20 = "I... I remembered this mansion from a c-c-comic book you lent me, President..."
10011075-21 = "Good thing you recommended it, right, President? Heehee!"
10011075-22 = "Oh, y-yeah?"
10011075-23 = "[s] \"By the way, where's Iroha?\""
10011075-25 = "Well, you see. She was with us, but somewhere along the way..."
10011075-26 = "She just disappeared. So, uh, it's only the two of us who made it out..."
10011075-27 = "W-We should go look for her..."
10011075-28 = "Unfortunately, we don't have time for that right now."
10011075-32 = "Um. Tsukuyo. Izuna. I have something to tell you two."
10011075-34 = "Y-Yes...?"
10011075-41 = "[ns] \"Huh? Aren't you...?\""
10011075-42 = "Thank goodness. I appear to have made it on time."
10011075-43 = "[s] \"Kaho?\""
10011075-44 = "If I had the time I would thoroughly chastise this garish performance you've put on."
10011075-45 = "But instead, I insist you cease your pursuit immediately."
