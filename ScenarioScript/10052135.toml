[translation]
10052135-3 = "We've broken through!"
10052135-4 = "...So that thing actually can break."
10052135-5 = "Did you see that, Sensei? I did it! Our revenge match was successful!"
10052135-6 = "D-Drop pods are still too scary... Ugh..."
