[translation]
10052135-3 = "突破了！"
10052135-4 = "……那東西真的會崩塌呢。"
10052135-5 = "看到了嗎，老師？愛麗絲做到了！復仇戰成功！"
10052135-6 = "空，空降果然很可怕……嗚嗚嗚……"
10052135-8 = "總之大家都平安，這樣不是皆大歡喜嗎？耶嘿嘿！"
10052135-9 = "接著只要Kei醬過來就可以了，老師。拜託你了。"
10052135-15 = "[ns] 「那我們也下去吧？」"
10052135-19 = "[ns] 「……怎麼了，Kei醬？表情好像有點複雜？」"
10052135-20 = "只是……覺得有點狂妄而已。#n明明使用了無名諸神的力量，結果居然是這副德性……"
10052135-21 = "在我那個時候……如果是我的話……！"
10052135-22 = "[s] 「啊，出現了。以『在我那時候啊』開頭的那種話。」"
10052135-26 = "你現在是在把我貶低成，那種凡事只會根據自己的經驗一概而論……"
10052135-27 = "堅持只有那樣才是對的、老是想教訓別人的那種死腦筋嗎！？"
10052135-28 = "[s] 「我又沒有說到那種程度……」"
