[translation]
10052135-3 = "ฝ่าเข้ามาได้แล้ว!"
10052135-4 = "เราทำลายสิ่งนั้นได้จริงๆ ด้วยนะคะ..."
10052135-5 = "เห็นหรือเปล่าคะ คุณครู? อาริสึทำได้แล้ว! เราชนะในแมตช์ล้างตาแล้วค่ะ!"
10052135-6 = "ฉะ... ฉันยังกลัวการร่อนลงมาอยู่ดีค่ะ... ฮือ..."
10052135-8 = "แต่ในเมื่อทุกคนปลอดภัย งั้นทุกอย่างก็เรียบร้อยดีละน่า อุฮุฮุ!"
10052135-9 = "ตอนนี้แค่ให้เคย์จังมาถึงพอก็ค่ะ คุณครู รบกวนด้วยนะคะ"
10052135-15 = "[ns] \"งั้นเราก็ลงไปด้วยเถอะนะ\""
10052135-19 = "[ns] \"เป็นอะไรไปเหรอ เคย์จัง...? ทำไมทำสีหน้าอย่างนั้นล่ะ?\""
10052135-20 = "ฉันแค่... เกิดความคิดที่อวดดีนิดหน่อยน่ะค่ะ การยืมพลังของทวยเทพไร้นามมาใช้ ท้ายที่สุดแล้วก็เป็นอย่างนี้งั้นเหรอ..."
10052135-21 = "สมัยฉันน่ะ... ถ้าเป็นฉันละก็นะ...!"
10052135-22 = "[s] \"อ่า 'สมัยฉันน่ะ' คำนี้เริ่มขึ้นมาแล้วสินะ\""
10052135-26 = "นี่คุณครูกำลังดูถูกว่าฉันเป็นเด็กหัวรั้นที่เอาแต่ตัดสินทุกอย่างจากประสบการณ์ส่วนตัว..."
10052135-27 = "แล้วก็เที่ยวสั่งสอนคนอื่นว่าตัวเองถูกอยู่ฝ่ายเดียวงั้นเหรอคะ?!!"
10052135-28 = "[s] \"ครูไม่เคยพูดแบบนั้นเลยนะ...\""
