[translation]
1013602-1 = " เดินเล่นหน้าบ้าน"
1013602-4 = "ว่าไง คุณครู"
1013602-5 = "[s] \"ว่าไง เอมิ ขยันจังเลยนะ...\""
1013602-6 = "ก็สถานการณ์มันเป็นแบบนี้ แต่ละคนก็ต้องทำหน้าที่ของตัวเองสิ"
1013602-7 = "งานตอนนี้น่ะเหรอ? อืม... ภารกิจลาดตระเวนของกองกำลังละมั้ง"
1013602-8 = "พอดีจับสัญญาณอะไรบางอย่างได้น่ะ"
1013602-9 = "[s] \"ครูตามไปด้วยได้มั้ย?\""
1013602-10 = "ก็ไม่เชิงว่าไม่ได้หรอก แต่ถ้าเกิดอะไรขึ้นละก็..."
1013602-14 = "อืม ไม่เป็นไร ฉันจะปกป้องคุณครูเอง ไม่ว่าจะเกิดอะไรขึ้นก็ตาม"
1013602-17 = "(คุณครูเดินตามเอมิออกไปข้างนอก)"
1013602-20 = "ขอบเขตลาดตระเวนจะกินเวลาประมาณ 2 ชั่วโมง จะลาดตระเวนตามแนวครึ่งวงกลมน่ะ"
1013602-21 = "แล้วก็ตั้งเป้าความเร็วที่ใช้... ประมาณ 4 กิโลเมตรต่อชั่วโมง"
1013602-22 = "แต่ถ้าช้ากว่านั้นนิดหน่อยก็ไม่เป็นไรหรอก แต่ถ้าทิ้งห่างมากเกินไปจะแย่เอาได้"
1013602-23 = "เพราะถ้าเป็นแบบนั้น ฉันจะปกป้องคุณครูได้ลำบากน่ะ"
1013602-25 = "(หลังจากนั้นคุณครูก็เริ่มออกลาดตระเวนพร้อมกับเอมิ)"
1013602-29 = "(การที่จะตามความเร็วของเด็กม.ปลาย... ไม่สิ ความเร็วของเอมินั้นเป็นเรื่องยากพอสมควร...)"
1013602-32 = "สุดยอดเลย คุณครู ตามมาทันได้ดีมาก"
1013602-33 = "[s] \"ถึงจะชมตามมารยาท... แฮ่กๆ... ขอบใจนะ... แฮ่กๆ...\""
1013602-34 = "ไม่ได้ชมตามมารยาทสักหน่อย ถ้าเป็นประธานริโอะน่ะ คงถูกหามออกไปตั้งแต่ 30 นาทีแรกแล้วมั้ง?"
1013602-35 = "หืม? ต้องไปบอกให้ประธานดูแลพละกำลังร่างกายหน่อยแล้วงั้นเหรอ?"
1013602-36 = "เรื่องนั้นฉันก็เห็นด้วยหรอก แต่ก็..."
1013602-37 = " ขอให้โชคดีแล้วกันนะ... แต่ถ้าเป็นคำพูดของคุณครู ประธานอาจจะยอมฟังก็ได้..."
1013602-38 = "?!"
1013602-39 = "คุณครู หลบเร็ว!"
1013602-43 = "(เอมิรีบดึงตัวคุณครูเข้าไปซ่อนไว้ในช่องว่างระหว่างเหล็ก)"
1013602-44 = "ขอโทษนะ คุณครู คงจะตกใจสินะ?"
1013602-45 = "จนกว่าฉันบอกว่าปลอดภัยดีแล้ว ห้ามออกมาจากตรงนั้นเด็ดขาดเลยนะ"
1013602-46 = "หนึ่ง สอง สาม... ประมาณหนึ่งกองกำลังสินะ ถ้างั้นก็...!"
1013602-53 = "ตอนนี้ไม่เป็นไรแล้วละ คุณครู กำจัดเป้าหมายไปเรียบร้อยแล้ว"
1013602-54 = "อืม... แต่ดูเหมือนจะยังไม่ใช่ศัตรูกลุ่มสุดท้ายแฮะ"
1013602-56 = "(หลังจากนั้นเอมิก็...)"
1013602-60 = "ยืนยันพิกัดศัตรู ระยะทาง... 427 เมตร จะตอบโต้เดี๋ยวนี้!"
1013602-63 = "(ต่อสู้กับศัตรูที่มองไม่เห็น...)"
1013602-66 = "ควรจะรอให้พวกมันแห่กันมาอีกดีมั้ยนะ... หรือว่าควรจะจัดการกับพวกกองสอดแนมแล้วย้ายตำแหน่ง#nก่อนดี...?"
1013602-67 = "......"
1013602-68 = "การทำให้เรื่องบานปลายเป็นสิ่งที่ไร้ประสิทธิภาพนี่นะ"
1013602-73 = "ดูเหมือนว่าตำแหน่งบริเวณนี้จะยังไม่ถูกพบ และดูจากระดับอาวุธแล้ว น่าจะเป็นแค่กองเสบียง..."
1013602-74 = "[ruby=Search and Destroy]ค้นหาและกำจัด![/ruby]"
1013602-77 = "(คุณครูทำได้แต่มองด้วยความทึ่ง... กับแผนการหยั่งเชิงศัตรูที่ดำเนินไปอย่างราบรื่น...)"
1013602-80 = "เท่านี้ก็คงไม่มีสัญญาณอันตรายเพิ่มอีกแล้วละ"
1013602-81 = "ทำได้ดีมากเลยนะ คุณครู ตอนนี้ก็กลับกันเลยมั้ย?"
1013602-82 = "[s] \"สุดยอด...\""
1013602-83 = "ไม่ใช่เรื่องใหญ่อะไรหรอก มันก็เป็นแบบนี้ตลอดแหละ"
1013602-84 = "การพูดแบบนี้ตอนเจ้าตัวไม่อยู่ก็อาจดูไม่ค่อยดีเท่าไรหรอก... แต่หัวหน้าฮิมาริก็ชอบใช้งานคนหนัก#nจริงๆ นั่นละ"
1013602-85 = "หรือว่าไม่จริง? แต่นึกดูแล้ว ฉันก็พูดแบบนี้ต่อหน้าหัวหน้าด้วยเหมือนกัน เพราะงั้นคงไม่นับว่าเป็น#nการพูดลับหลังหรอกมั้ง?"
1013602-86 = "[s] \"อยู่ด้วยกันดีๆ เถอะนะ...\""
1013602-87 = "ฉันก็คิดว่าตอนนี้ก็ทำแบบนั้นอยู่นะ..."
1013602-88 = "......"
1013602-89 = "ยังไงก็เถอะ นี่เป็นครั้งแรกเลยที่ได้ทำงานร่วมกับคนเยอะๆ แบบนี้"
1013602-90 = "ฉันเคยคิดว่าถ้าองค์กรมีขนาดใหญ่เกินไปจะทำให้ไม่มีประสิทธิภาพ"
1013602-91 = "แล้วคนอื่นๆ เองก็กลัวที่จะทำงานร่วมกับฉันด้วยเหมือนกัน"
1013602-92 = "ปกติแล้ว... ไม่ค่อยมีคนเข้าใจฉันเท่าไรหรอก"
1013602-93 = "[s] \"แล้วที่นี่ไม่เหมือนกันเหรอ?\""
1013602-94 = "ที่นี่น่ะ..."
1013602-95 = "ไม่รู้ว่าเพราะอะไร แต่ฉันรู้สึกสบายใจน่ะ"
1013602-96 = "อาจเพราะทุกคนเป็นคนแปลกๆ รึเปล่านะ? เพราะงั้นเลยเหมือนจะเข้ากันได้ดี..."
1013602-97 = "อื้อ ฉันรู้สึกสบายใจน่ะ"
1013602-98 = "[s] \"หวังว่าจะเข้ากับเด็กคนอื่นๆ ได้ดีด้วยนะ...\""
1013602-99 = "เด็กคนอื่นๆ..."
1013602-100 = "......"
1013602-101 = "ถ้าเป็นเมื่อก่อน ฉันคงคิดว่าเรื่องพวกนั้นเป็นสิ่งที่ไม่มีประสิทธิภาพ"
1013602-102 = "แปลกจังเลยนะ"
1013602-103 = "แต่พอคุณครูพูดแบบนั้น ก็รู้สึกว่ามันคุ้มค่าที่จะลองดูน่ะ"
1013602-104 = "[s] \"ถ้าเอมิคิดแบบนั้นครูก็ขอบใจมากเลย\""
1013602-105 = "อื้อ"
1013602-106 = "เพราะคุณครูเป็นคนพูดไงล่ะ"
1013602-108 = "(คุณครูกับเอมินั่งคุยเรื่องอื่นๆ กันอีกนิดหน่อย แล้วก็กลับไปลาดตระเวนต่อ)"
