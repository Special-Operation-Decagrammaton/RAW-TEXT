[translation]
1013602-1 = " Neighborhood Stroll"
1013602-4 = "Hey, Sensei."
1013602-5 = "[s] \"Hello, Eimi. You're hard at work...\""
1013602-6 = "It's the least any of us can do."
1013602-7 = "What's left? Hm... I'd call it \"strong-armed reconnaissance.\""
1013602-8 = "I saw something I didn't like on the radar."
1013602-9 = "[s] \"Mind if I tag along?\""
1013602-10 = "It should not be a problem. Unless..."
1013602-14 = "Hm. \"Unless\" nothing, actually. I'll keep you safe."
1013602-17 = "So, Eimi and I went outside to tackle her last task together."
1013602-20 = "There's two patrol routes, each about two hours. We'll more or less be walking in semicircles."
1013602-21 = "We'll be maintaining a tactical march at...4 kilometers per hour."
1013602-22 = "You do not need to maintain speed the entire patrol. However, try not to fall too far behind."
1013602-23 = "It would make it difficult for me to protect you, Sensei."
1013602-25 = "After her debrief, our patrol began."
1013602-29 = "As expected, keeping up with any high school student, let alone one with Eimi's stamina, was no walk in the park."
1013602-32 = "Impressive, Sensei. You're keeping up quite well."
1013602-33 = "[s] \"Even if it's just empty praise... *pant*... Thanks... *huff*...\""
1013602-34 = "It's not empty praise. Ms. Rio would have been carried out on a stretcher after half an hour, at most."
1013602-35 = "Huh? I should talk to her about her health?"
1013602-36 = "While I don't disagree..."
1013602-37 = " You know, best of luck. If it's coming from you, she may actually listen."
1013602-38 = "?!"
1013602-39 = "Hide, Sensei!"
1013602-43 = "Eimi pushed me into a small alcove in the metal floor to hide me."
1013602-44 = "Sorry, Sensei. I didn't mean to scare you."
1013602-45 = "Stay there until I give the all clear."
1013602-46 = "One, two, three... That's about one squad. No problem."
1013602-53 = "Clear, Sensei. Threat neutralized."
1013602-54 = "For now. I expect reinforcements will follow soon enough."
1013602-56 = "Eimi pushed forward relentlessly."
1013602-60 = "Enemy location confirmed. Distance... 427 meters. Taking first contact!"
1013602-63 = "She shot down enemies before I could even see them."
1013602-66 = "Should I wait and take them all down at once? Or take out the scouting party and opt for guerilla tactics?"
1013602-67 = "..."
1013602-68 = "Letting the situation escalate is inefficient!"
1013602-73 = "The enemy must not have found us yet. That robot can't be more than a transport unit, considering its lack of firepower."
1013602-74 = "Search and destroy!"
1013602-77 = "I could only marvel at Eimi's decisive and efficient fighting style as she moved us through the patrol route."
1013602-80 = "We've wiped out all of the concerning radar readings I was seeing earlier."
1013602-81 = "Well done, Sensei. Shall we head back now?"
1013602-82 = "[s] \"That was incredible...\""
1013602-83 = "All in a day's work."
1013602-84 = "Maybe I shouldn't be talking behind her back, but... President Himari has a tendency to run people ragged."
1013602-85 = "Actually, I tell her this to her face all the time, so am I really doing anything wrong?"
1013602-86 = "[s] \"Y-You should all do your best to get along...\""
1013602-87 = "We do, well enough. Don't you think?"
1013602-88 = "..."
1013602-89 = "I've never worked with this many people at once before."
1013602-90 = "I wasn't a fan of big organizations. The bigger they are, the more inefficient they tend to be."
1013602-91 = "...And the other kids found me intimidating."
1013602-92 = "I usually...had a hard time fitting in."
1013602-93 = "[s] \"Is it different here?\""
1013602-94 = "Here..."
1013602-95 = "Yes. It is. For some reason."
1013602-96 = "Maybe because the others are just as strange. That's probably why this works."
1013602-97 = "I don't feel out of place here."
1013602-98 = "[s] \"I hope you find more places like that, with more people.\""
1013602-99 = "More people, huh?"
1013602-100 = "..."
1013602-101 = "A few months ago, I might've called that notion inefficient."
1013602-102 = "But hearing it from you..."
1013602-103 = "I don't know. It makes me want to try."
1013602-104 = "[s] \"I'm glad you feel that way.\""
1013602-105 = "Yes."
1013602-106 = "Because it's you, Sensei."
1013602-108 = "Eimi and I chatted casually as we headed back to the base."
