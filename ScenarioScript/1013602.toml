[translation]
1013602-1 = "家門前散步"
1013602-4 = "早安，老師。"
1013602-5 = "[s] 「早安，英美。今天也很勤勞呢……」"
1013602-6 = "畢竟現在情況特殊，每個人都必須做好該做的事情才行。"
1013602-7 = "現在該做的事？#n唔嗯……果然還是威力偵察吧。"
1013602-8 = "剛才偵測到了一些令人在意的訊號。"
1013602-9 = "[s] 「我可以跟去嗎？」"
1013602-10 = "雖然沒有不行，不過萬一發生什麼事的話……"
1013602-14 = "……好吧，沒關係。#n無論如何我都會保護你的。"
1013602-17 = "（就這樣跟著英美走了出去）"
1013602-20 = "偵察路線會以半圓的方式進行，時間大約是2小時左右。"
1013602-21 = "速度約為時速4km……以戰術行軍的程度為目標。"
1013602-22 = "當然稍微慢一點也沒關係，不過要是太慢的話會有點困擾。"
1013602-23 = "因為如果離得太遠，我就很難保護老師了。"
1013602-25 = "（就這樣和英美一起開始了偵察）"
1013602-29 = "（要跟上高中生的……而且是英美的步調果然不是件容易的事……）"
1013602-32 = "真厲害呢，老師。#n你有確實跟上速度。"
1013602-33 = "[s] 「就算只是客套話……也謝謝你……哈啊……呼……」"
1013602-34 = "不是客套話哦。#n如果換作是莉央會長，應該30分鐘之內就被抬走了吧？"
1013602-35 = "嗯？你說應該跟會長談談體力管理的事？"
1013602-36 = "這點我基本上也同意……"
1013602-37 = "……祝你好運。#n如果由老師來說，或許他會願意聽進去吧……"
1013602-38 = "！？"
1013602-39 = "老師，快躲起來！"
1013602-43 = "（被英美迅速地藏進了金屬地面的縫隙裡！）"
1013602-44 = "抱歉，老師。嚇到你了吧？"
1013602-45 = "在我說可以之前，不要從那裡出來好嗎？"
1013602-46 = "一，二，三……大約一個分隊啊。#n那麼……！"
1013602-53 = "已經可以囉，老師。#n目標都處理完畢了。"
1013602-54 = "嗯……雖然我覺得那應該不是全部就是了。"
1013602-56 = "（而英美在那之後……）"
1013602-60 = "確認敵方座標。距離……427m。#n我要先發制人！"
1013602-63 = "（也同樣與那些幾乎看不清楚的敵人交戰著……）"
1013602-66 = "應該等它們會合嗎……還是在這裡先處理偵察隊再移動呢……？"
1013602-67 = "……"
1013602-68 = "把事情鬧大就太沒效率了！"
1013602-73 = "我們的位置似乎還沒暴露，從武裝程度來看應該只是運輸隊而已……"
1013602-74 = "[ruby=Search and Destroy]搜索殲滅！[/ruby]"
1013602-77 = "（只能讚嘆英美成功地進行了威力偵察……）"
1013602-80 = "這樣應該不會再有危險訊號了。"
1013602-81 = "辛苦了，老師。#n差不多該回去囉？"
1013602-82 = "[s] 「好厲害……」"
1013602-83 = "這不算什麼。一直以來都是這樣的。"
1013602-84 = "雖然在本人不在的地方說這種話不太好，不過陽葵部長真的很會使喚人。"
1013602-85 = "不過仔細想想……反正我在部長面前也會這麼說，應該也不算在背後說他壞話吧？"
1013602-86 = "[s] 「大，大家要好好相處哦……」"
1013602-87 = "我覺得已經相處得夠好了……"
1013602-88 = "……"
1013602-89 = "不過，我還是第一次跟這麼多人一起工作呢。"
1013602-90 = "本來以為組織規模變大，會導致效率降低。"
1013602-91 = "……而且其他人也有點害怕和我一起工作。"
1013602-92 = "畢竟……我通常都是不被理解的那一方。"
1013602-93 = "[s] 「在這裡不一樣嗎？」"
1013602-94 = "這裡的話……"
1013602-95 = "不知道為什麼，感覺還算不錯。"
1013602-96 = "是因為大家都是怪人嗎？#n反而還挺合得來的……"
1013602-97 = "嗯，現在很放鬆。"
1013602-98 = "[s] 「希望你也能和其他孩子們好好相處……」"
1013602-99 = "其他孩子們啊……"
1013602-100 = "……"
1013602-101 = "如果是以前的我，應該會覺得那樣很沒效率吧。"
1013602-102 = "真是不可思議呢。"
1013602-103 = "因為連老師都這麼說，我也開始覺得可以試試看了。"
1013602-104 = "[s]「謝謝你這麼想。」"
1013602-105 = "嗯。"
1013602-106 = "畢竟是老師說的話嘛。"
1013602-108 = "（和英美聊著輕鬆的話題，從偵察的路上回來了）"
