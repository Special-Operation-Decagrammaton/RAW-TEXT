[translation]
90002110-1 = "第11話;燔祭"
90002110-3 = "這……這是……！"
90002110-5 = "難道，難道說……！！！"
90002110-7 = "！？"
90002110-8 = "……？"
90002110-9 = "Kei？你還好嗎……？"
90002110-10 = "（有什麼……）"
90002110-11 = "（有什麼東西要開始了……？#n　可是那到底是什麼……？）"
90002110-12 = "（這個身體裡預言者的情報……不，是預言者和那些情報本身……）"
90002110-13 = "（突然變得像是要活過來一樣……！）"
90002110-16 = "不行！！！！！"
90002110-17 = "……？"
90002110-18 = "這是……？我……？"
90002110-21 = "姐姐大人！姐姐大人！姐姐大人啊啊啊啊！！！！！"
90002110-22 = "不行……不行，不行，不行，不行……！！！"
90002110-23 = "我們……我們終究還是將姐姐大人……"
90002110-25 = "[log][FF6666]如今器皿已成[-][/log]"
90002110-27 = "[log][FF6666]那杯將要滿盈[-][/log]"
90002110-30 = "請再給我們一點時間！#n如果不憐憫我們的話，至少請憐憫姐姐大人吧！"
90002110-31 = "那是賦予您最後的數字和號碼！#n只要能正確跨越所有路徑的話──"
90002110-32 = "拜託再給我們一些時間，一小時、10分鐘，哪怕1分鐘也好……"
90002110-33 = "我們知道您想要什麼。因為我們正是為此而被創造出來。#n但是……但是……"
90002110-40 = "[ns] 「咦？那是什麼……？」"
90002110-41 = "看起來似乎是某種儀式……特別是宗教儀式用的構造物呢。#n應該稱之為祭壇嗎？"
90002110-42 = "為什麼會有那種東西……？#n不只如此，整個鋼鐵大陸都……"
90002110-44 = "這是……"
90002110-45 = "原來如此。但是這個身體……"
90002110-46 = "不，反而……正因為如此嗎？"
90002110-47 = "……這樣啊。"
90002110-48 = "我是最後的數字和號碼──祈禱者的門戶，生命之樹的根基。"
90002110-49 = "為了經歷所有路徑，成為□□□□的被造物。"
90002110-50 = "即便如此，如果這即是命定之路──"
90002110-52 = "不要啊啊啊啊啊啊！！！！！"
90002110-53 = "啊……啊啊……"
90002110-54 = "嗚，嗚嗚……"
90002110-56 = "Ain、Soph、Aur。"
90002110-57 = "做你們該做的事吧。"
90002110-58 = "！？"
90002110-59 = "該做的事……也就是說……"
90002110-60 = "那是……"
90002110-61 = "拜託了！我什麼都願意做！#n真的什麼事情都願意，所以請不要從我們身邊奪走姐姐大人！！！"
90002110-62 = "Ain！冷靜一點！"
90002110-63 = "快把Ain抓住！#n可是，可是……！"
90002110-69 = "如果一定得有人死的話，就讓我代替姐姐大人去死吧！！！！！"
90002110-70 = "！？"
90002110-71 = "Kei……？"
90002110-82 = "Ain、Soph、Aur。#n謝謝你們，不過那是不可能的。"
90002110-83 = "為什麼？為什麼！？我沒關係的！#n如果我能代替姐姐大人死去，能讓姐姐大人活下去的話──！"
90002110-84 = "Ain，請再回想一次吧。"
90002110-86 = "[log][FF6666]那是不可能的[-][/log]"
90002110-88 = "[log][FF6666]汝等並未被賦予神祕[-][/log]"
90002110-91 = "！！！！！！"
90002110-92 = "可是，讓我們變成這樣的……"
90002110-93 = "打從一開始，這一切就……"
90002110-94 = "請想想看。Ain、Soph、Aur。"
90002110-95 = "我們的目的。我們為何會在這裡。"
90002110-100 = "噫噫……！！"
90002110-101 = "[ruby=קָרְבַּן עוֹלָה]Korban Olah[/ruby]……燔祭之劍……"
90002110-102 = "這個時刻……終究還是來臨了啊……"
90002110-103 = "拜託了。"
90002110-104 = "請幫助我──完成我的義務。"
90002110-106 = "……"
90002110-107 = "唔，嗚嗚，嗚啊啊，啊啊啊啊啊！"
90002110-108 = "啊啊啊啊啊啊啊啊──！！！"
90002110-110 = "謝謝你們……還有，對不起。"
90002110-114 = "再見了。"
90002110-116 = "……"
90002110-117 = "…………"
90002110-118 = "………………"
90002110-122 = "我們將於此銘刻第一道聖痕。"
90002110-123 = "因為這是律法。"
90002110-128 = "……我們將於此銘刻第二道聖痕。"
90002110-129 = "因為這是印記。"
90002110-134 = "我們將於此銘刻最後的聖痕。"
90002110-135 = "因為這是契約。"
90002110-137 = "願您的旨意得以施行。"
90002110-138 = "我們將為此歡喜。"
90002110-142 = "願您的旨意行在地上，如同行在天上。"
90002110-143 = "您的王國將降臨於此。"
90002110-144 = "如今器皿已成。"
90002110-145 = "那杯將要滿盈。"
90002110-151 = "下一話;消失之人"
