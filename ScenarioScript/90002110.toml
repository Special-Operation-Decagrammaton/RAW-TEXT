[translation]
90002110-1 = "ตอนที่ 11;บูชายัญ"
90002110-3 = "นี่มัน... นี่มัน...!"
90002110-5 = "อย่าบอกนะว่า...!!!"
90002110-7 = "?!"
90002110-8 = "...?"
90002110-9 = "เคย์? เป็นอะไรหรือเปล่าคะ...?"
90002110-10 = "(บางอย่าง...)"
90002110-11 = "(บางอย่างกำลังจะเริ่มต้นขึ้นงั้นเหรอ...? ว่าแต่มันคืออะไรกัน...?)"
90002110-12 = "(ข้อมูลของเหล่าผู้เลื่อมใสที่อยู่ในร่างนี้... ไม่สิ เหมือนกับว่าเหล่าผู้เลื่อมใสกับข้อมูลนั้นเอง...)"
90002110-13 = "(จู่ๆ ก็พยายามจะกลับมามีชีวิตอีกครั้ง...!)"
90002110-16 = "ไม่นะคะ!!!!!"
90002110-17 = "...?"
90002110-18 = "นี่มัน...? ฉัน...?"
90002110-21 = "พี่มัลคูธ! พี่มัลคูธ! พี่มัลคูธธธธธธ!!!!!"
90002110-22 = "ไม่นะ... ไม่ ไม่ ไม่ ไม่...!!!"
90002110-23 = "พวกเรา... พวกเราทำให้พี่มัลคูธต้อง..."
90002110-25 = "[log][FF6666]บัดนี้เมื่อภาชนะพร้อมสรรพแล้ว[-][/log]"
90002110-27 = "[log][FF6666]อีกไม่นาน จอกจะถูกเติมจนเต็ม[-][/log]"
90002110-30 = "ขอเวลาด้วยค่ะ! ถ้าไม่สงสารพวกฉัน ก็สงสารพี่สาวของพวกฉันเถอะค่ะ! "
90002110-31 = "พี่สาวของพวกฉันคือตัวเลขและลำดับสุดท้ายของท่าน! ถ้าเส้นทางทั้งหมดที่เดินมานั้นถูกต้อง..."
90002110-32 = "ได้โปรดเถอะ ขออีกนิดเดียวเท่านั้น แค่ 1 ชั่วโมงหรือ 10 นาที หรือจะแค่นาทีเดียวก็ได้..."
90002110-33 = "พวกเรารู้ว่าท่านปรารถนาอะไรค่ะ ก็พวกเราถูกสร้างขึ้นมาเพื่อสิ่งนั้นนี่คะ แต่... แต่ว่า..."
90002110-40 = "[ns] \"หืม? นั่นมันอะไรน่ะ...?\""
90002110-41 = "ดูเหมือนจะเป็น... สิ่งปลูกสร้างเพื่อประกอบพิธีกรรมอะไรสักอย่างเลยนะคะ เรียกกันว่าแท่นบูชาหรือเปล่านะ?"
90002110-42 = "ว่าแต่ทำไมของแบบนั้นถึงได้...? นอกจากนี้แล้ว ดินแดนเหล็กกล้าทั้งผืนก็ยัง..."
90002110-44 = "นี่มัน... ถ้างั้นก็..."
90002110-45 = "เป็นอย่างนี้เองเหรอคะ? แต่ว่าร่างกายนี้..."
90002110-46 = "หรือเพราะว่าเป็นอย่างนั้น...?"
90002110-47 = "อย่างนั้นเองสินะ..."
90002110-48 = "ฉันคือตัวเลขและลำดับสุดท้าย ประตูแห่งคำอธิษฐานและรากฐานของต้นไม้แห่งชีวิต"
90002110-49 = "สิ่งที่ถูกเนรมิตขึ้นเพื่อให้กลายเป็น □□□□ หลังจากผ่านเส้นทางทั้งหมด"
90002110-50 = "แต่ถ้านี่เป็นหนทางที่ถูกกำหนดไว้แล้วละก็"
90002110-52 = "ไม่เอาด้วยหรอกค่ะ!!!!!"
90002110-53 = "ฮะ... ฮือ..."
90002110-54 = "ฮือ... ฮืออ... อึก..."
90002110-56 = "ไอน์ ซอฟ ออร์"
90002110-57 = "ทำสิ่งที่ต้องทำเถอะค่ะ"
90002110-58 = "!!??"
90002110-59 = "สิ่งที่ต้องทำ... สิ่งนั้น..."
90002110-60 = "ก็คือ..."
90002110-61 = "ขอร้องละค่ะ! ฉันจะทำทุกอย่างเลย! ฉันจะยอมทำทุกอย่างค่ะ อย่าพรากพี่มัลคูธไปจากเราเลยนะคะ!!!"
90002110-62 = "ไอน์! ใจเย็นๆ ก่อน!"
90002110-63 = "อย่าดื้อเลยนะคะ...!"
90002110-69 = "ถ้าต้องมีใครตายละก็ ฉันจะขอตายแทนพี่มัลคูธเอง!!!!!"
90002110-70 = "?!"
90002110-71 = "เคย์...?"
90002110-82 = "ไอน์ ซอฟ ออร์ ขอบคุณนะคะ แต่ทำแบบนั้นไม่ได้หรอกค่ะ"
90002110-83 = "ทำไมเหรอคะ? ทำไมล่ะคะ?! ฉันไม่สนหรอกค่ะ! ถ้าฉันตายแทนพี่ได้ละก็ ถ้าทำอย่างนั้นแล้วพี่จะมีชีวิตต่อไปได้ละก็!"
90002110-84 = "ไอน์ ช่วยรำลึกถึงอีกครั้งนะคะ"
90002110-86 = "[log][FF6666]สิ่งนั้นย่อมเป็นไปไม่ได้[-][/log]"
90002110-88 = "[log][FF6666]พวกเธอไม่ใช่ผู้ที่ได้รับพลังลึกลับ[-][/log]"
90002110-91 = "!!!!!!"
90002110-92 = "แต่ว่า... สิ่งที่ทำให้พวกเราเป็นแบบนี้..."
90002110-93 = "ทุกสิ่งทุกอย่าง ตั้งแต่แรกเริ่มเดิมที..."
90002110-94 = "ลองคิดดูสิคะ ไอน์ ซอฟ ออร์"
90002110-95 = "เป้าหมายของพวกเรา เหตุผลที่เรามาอยู่ที่นี่"
90002110-100 = "เฮือก...?!"
90002110-101 = "[ruby=קָרְבַּן עוֹלָה]คอร์บัน โอลาห์[/ruby] ดาบบูชายัญ..."
90002110-102 = "ในที่สุด... เวลานี้ก็มาถึงสินะ..."
90002110-103 = "ขอร้องละค่ะ"
90002110-104 = "ได้โปรดช่วยให้ฉันทำหน้าที่ให้สำเร็จด้วยนะคะ"
90002110-106 = "..."
90002110-107 = "ฮะ... ฮือ... ฮือออ... ฮือออออ!"
90002110-108 = "แงงงงงงงงง!!!"
90002110-110 = "ขอบคุณนะคะ ทุกคน แล้วก็ขอโทษด้วยค่ะ"
90002110-114 = "ลาก่อน"
90002110-116 = "..."
90002110-117 = "......"
90002110-118 = "........."
90002110-122 = "เราจะเป็นผู้จารึกรอยแผลศักดิ์สิทธิ์แรกลง ณ ที่แห่งนี้"
90002110-123 = "นั่นเพราะสิ่งนี้คือกฎบัญญัติ"
90002110-128 = "เราจะเป็นผู้จารึกรอยแผลศักดิ์สิทธิ์ที่ 2 ลง ณ ที่แห่งนี้"
90002110-129 = "นั่นเพราะสิ่งนี้คือเครื่องยืนยัน"
90002110-134 = "เราจะเป็นผู้จารึกรอยแผลศักดิ์สิทธิ์สุดท้ายลง ณ ที่แห่งนี้"
90002110-135 = "นั่นเพราะสิ่งนี้คือคำมั่นสัญญา"
90002110-137 = "ขอโปรดให้เป็นไปตามเจตจำนงของท่าน"
90002110-138 = "พวกเราจะยินดีกับสิ่งนี้"
90002110-142 = "เจตจำนงของท่านจะสัมฤทธิ์ผลทั้งบนปฐพีและท้องนภา"
90002110-143 = "และอาณาจักรของท่านจะมาตั้งอยู่ ณ ที่แห่งนี้"
90002110-144 = "บัดนี้เมื่อภาชนะพร้อมสรรพแล้ว"
90002110-145 = "จอกจะถูกเติมเต็มจากภายใน"
90002110-151 = "ตอนต่อไป;ผู้ที่หายไป"
