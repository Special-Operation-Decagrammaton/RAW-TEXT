[translation]
70013010-1 = "一人では咲かない雑草（1）"
70013010-2 = "ホテルのファインダイニングレストランのラウンジ"
70013010-6 = "……。"
70013010-7 = "……ついに。"
70013010-8 = "来たわよ！"
70013010-9 = "最高級ホテルのレストラン……！"
70013010-14 = "こ、こんな場所でアル様と食事ができるなんて……もう死んでも心残りはありません！"
70013010-15 = "アルちゃん、本当に大丈夫～？#nここ、すっごく高そうだけど？"
70013010-17 = "安心してちょうだい、今日は私の奢りよ。#nそれに、最近は収入も安定してきているのよ。"
70013010-18 = "……とはいえ、あまり無理しない方がいいんじゃないかな。"
70013010-19 = "こ、これくらいは大丈夫よ！"
70013010-20 = "最近はちゃんと貯金できるくらいの余裕があるのよ。"
70013010-21 = "私も社長として、このくらいはしないとね。"
70013010-22 = "だからみんな、今日は楽しんでちょうだい。"
70013010-24 = "くふふ、そこまで言われたら楽しんであげなきゃね～"
70013010-25 = "一応聞くけど、予約はちゃんとしてる？"
70013010-27 = "あ、当たり前でしょ！"
70013010-28 = "えーっと、あの、すみません。"
70013010-29 = "いらっしゃいませ。"
70013010-30 = "[ruby=りくはちま]陸八魔[/ruby]ですが……。"
70013010-34 = "お待ちしておりました。こちらへどうぞ。"
70013010-46 = "窓側のお席へどうぞ。"
70013010-56 = "では、本日のコースを簡単に説明いたします。"
70013010-57 = "メインディッシュは、シェフ特製ワイルドハント風の牛フィレ煮込みです。"
70013010-58 = "酸味が控え目のワインと肉汁を[ruby=Deglaze]デグレイズ[/ruby]したソースで煮詰めています。"
70013010-59 = "また、芳醇で深い味わいが感じられるよう……。"
70013010-66 = "その後もウェイターの説明は続いたが――"
70013010-73 = "[ruby=Infusion]インフュージョン[/ruby]、 [ruby=Al dente]アルデンテ[/ruby]、[ruby=Brunoise]ブリュノワーズ[/ruby]など……アルたちにとって、普段耳にしない言葉ばかりが並んだ。"
70013010-74 = "な、なるほど！どれも美味しそうね！"
70013010-75 = "では、[ruby=amuse bouche]アミューズブーシュ[/ruby]からお持ちいたします。"
70013010-81 = "アルちゃん、ほんとに意味分かってる～？"
70013010-82 = "よ、要するに最高級の料理ってことでしょう？"
70013010-83 = "細かいことを気にしていてはダメよ。#n高いんだから、どれも美味しいはず。"
70013010-88 = "そういえば、水も……ちょっと違うね。"
70013010-89 = "……ミネラルウォーターだって。"
70013010-90 = "ど、どういう人が普段こんな所で食事をするんでしょうか……？"
70013010-100 = "わぁ！みんな、見るからにお金持ちそ～"
70013010-101 = "私たちだって客として来ているのよ、周囲と比べる必要はないわ。"
70013010-102 = "それに、ドレスコードだって完璧――"
70013010-103 = "ちょっと張り切りすぎじゃない？"
70013010-104 = "そ、そんなことないわよ……！"
70013010-105 = "優雅な食事にぴったりじゃない？"
70013010-106 = "くふふっ。じゃあアルちゃんはマナーも完璧なんだね？"
70013010-107 = "それじゃあしつもーん。#nナイフとフォークを使う順番は分かる？"
70013010-108 = "わ、私も気になってました。どうしてこんなに種類があるんですか？"
70013010-109 = "えっ……そ、それは……。"
70013010-111 = "料理ごとに使う食器が違うんだよ。"
70013010-112 = "……どれから使うのかは知らないけど。"
70013010-113 = "て、テキトーでいいんじゃないかしら？#n要は、食べられればいいのよ。"
70013010-120 = "やけに騒がしいな？"
70013010-121 = "どうやら、場違いな奴がいるようだが……。"
70013010-123 = "ふ～ん？それって、私たちのこと？"
70013010-124 = "今……アル様を侮辱しましたか？"
70013010-126 = "アル？"
70013010-130 = "……。"
70013010-131 = "おっ、お前たちは……！"
70013010-132 = "便利屋68！！"
70013010-137 = "えっと……どちら様？"
70013010-142 = "私を……！忘れたのか！？"
70013010-143 = "悪党ってみんな似たような感じだし～？"
70013010-144 = "いちいち覚えてないんだよね。"
70013010-145 = "リガトーニ・ファミリーの！#nブルーノ・リガトーニ！"
70013010-146 = "この名を忘れたとは言わせんぞ！"
70013010-151 = "リガトーニ……ファミリー……？"
70013010-152 = "……まさか。"
70013010-153 = "そういえば……。"
70013010-155 = "ふ、ふふ……。"
70013010-156 = "ふっはははは……！"
70013010-157 = "ようやく思い出したようだな！"
70013010-158 = "復讐の時だ！いくぞ、お前ら！！"
70013010-167 = "こんなところで戦うなんて正気？"
70013010-168 = "私はこの店にかなり金を払っているからな！#n何をしようが多少は目を瞑ってもらえるんだよ！"
70013010-169 = "ここで会ったが百年目――"
70013010-170 = "あの時の恨みを晴らしてやる！"
70013010-171 = "[ruby=や]殺[/ruby]っちまえ！"
70013010-183 = "きゃははっ。#nド派手な歓迎だねぇ。"
70013010-184 = "社長、どうする？"
70013010-185 = "店の物を壊して、弁償できる？"
70013010-186 = "う……で、でも――"
70013010-187 = "――ここで逃げたらハードボイルドじゃないわ！"
70013010-188 = "みんな、反撃開始よ！"
70013010-189 = "さすがアルちゃん！そうこなくっちゃ！"
70013010-190 = "お……お任せください、アル様。一人残らず始末します……！"
70013010-203 = "突如始まったレストランでの銃撃戦。"
70013010-204 = "便利屋68とリガトーニ・ファミリーの間に、一体何があったのだろう――"
