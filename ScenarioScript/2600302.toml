[translation]
2600302-1 = "นางฟ้าแห่งทรีนิตี้"
2600302-2 = "(หลังจากที่ทำงานมาทั้งวัน คุณครูเลยออกไปที่สวนเพื่อสูดอากาศข้างนอก และบรรเทา#nความเมื่อยล้าของร่างกาย)"
2600302-3 = "(พอออกมาข้างนอกในที่เปิดโล่ง ก็เกิดอยากดื่มน้ำแอปเปิลเย็นๆ ขึ้นมา)"
2600302-4 = "อ๊ะ คุณครูคะ! สวัสดีค่ะ เจอกันในที่แบบนี้ทุกทีเลยนะคะ"
2600302-5 = "มาเดินเล่นเพื่อเปลี่ยนบรรยากาศเหมือนกันเหรอคะ? ดีมากเลยค่ะ! คุณครูต้องดูแลร่างกาย#nตัวเองด้วยนะคะ!"
2600302-6 = "คะ? ฉันกำลังทำอะไรอยู่น่ะเหรอคะ? อ่า... ฉันก็แค่..."
2600302-7 = "พี่สาว ขอบคุณครับ!"
2600302-8 = "พี่สาวขอบคุณนะคะ!"
2600302-9 = "แหะๆ... ไม่ได้มีอะไรพิเศษค่ะ ฉันแค่ช่วยเด็กๆ ค่ะ พวกน้องๆ ดูมีปัญหานิดหน่อยน่ะค่ะ"
2600302-10 = "พี่สาวช่วยเอาลูกโป่งที่ติดอยู่บนต้นไม้ให้พวกหนู!"
2600302-11 = "พี่สาวช่วยรักษาแผลที่ผมบาดเจ็บจากลูกบอลด้วยครับ! พี่สาวสุดยอดเลยครับ!!"
2600302-12 = "...อืม รู้สึกเขินนิดหน่อย ไม่มีอะไรมากเลยค่ะ..."
2600302-13 = "อ่อนโยนเหรอคะ? ไม่หรอกค่ะ แค่นี้ทุกคนก็ทำกันค่ะ ก็ฉันเป็นสมาชิกชมรมอัศวินบรรเทาทุกข์นี่คะ"
2600302-14 = "นอกจากนั้นพอได้เห็นคนที่มีปัญหาได้มีสีหน้ามีความสุข..."
2600302-15 = "...ฉันก็มีความสุขไปด้วยเหมือนกันค่ะ"
2600302-16 = "ฮุฮุ ฉันก็อธิบายไม่ค่อยถูกค่ะ คิดซะว่ามันเป็นธรรมชาติของฉันก็ได้นะคะ"
2600302-17 = "ระยะหลังมานี้ดูเหมือนคุณครูจะเหนื่อยมากเลย... ไม่เป็นอะไรใช่มั้ยคะ?"
2600302-18 = "ก็ไม่มีอะไรมากเหมือนกันเหรอคะ? ...คุณครูจะมาพูดอย่างงั้นกับฉันไม่ได้นะคะ!"
2600302-19 = "ฉันรู้หมดแล้วค่ะ คุณครูทำงานดึกดื่นทุกคืน กินแต่ของว่างและกินอาหารไม่เป็นเวลา"
2600302-20 = "คุณครูดูแลคนอื่นอยู่ตลอดเวลา แม้แต่ในสถานการณ์ที่อันตราย... ถ้าอย่างนั้นจะเกิดเรื่องใหญ่#nได้นะคะ!"
2600302-21 = "ถึงฉันจะพร้อมเสมอที่จะคอยให้ความช่วยเหลือ แต่จริงๆ แล้วมันจะดีที่สุดถ้าฉันไม่ต้องใช้มันใช่มั้ยล่ะคะ?"
2600302-22 = "...อ่า"
2600302-23 = "ขอโทษค่ะ ฉันเองก็ไม่รู้ตัว... ที่พูดบ่นแบบนั้นกับคุณครู..."
2600302-24 = "พอมาคิดดูแล้ว เหมือนว่าฉันจะไม่ค่อยได้เอาใจใส่คุณครูเลยค่ะ น่าอายจัง"
2600302-25 = "ไม่รู้เพราะฉันมองว่าคุณครูเป็นผู้ใหญ่ เลยไม่ได้ใส่ใจเรื่องพวกนั้นหรือเปล่า..."
2600302-26 = "ฉันคงต้องทบทวนตัวเองแล้วล่ะค่ะ"
2600302-27 = "[s1] \"ไม่เป็นไรหรอก ครูเป็นผู้ใหญ่แล้ว\"\n[s2] \"เซรินะไม่ว่างเพราะต้องดูแลเด็กคนอื่นๆ นี่\""
2600302-28 = "อืม... การที่ฉันบอกว่าคุณครูเป็นผู้ใหญ่ ไม่ได้หมายความว่าฉันไม่สนใจนะคะ!"
2600302-29 = "คุณครูเข้าใจฉันใช่มั้ยคะ? แต่ก็นะ..."
2600302-31 = "...มันอาจจะแทนกันไม่ได้ คุณครูรับนี่ไปมั้ยคะ? น้ำแอปเปิลค่ะ"
2600302-32 = "อ่า... อยากดื่มพอดีเหรอคะ? ดีจัง พอดีเลยค่ะ!"
2600302-33 = "เห็นคุณครูมีความสุข ฉันเองก็มีความสุขยิ่งกว่าค่ะ จริงๆ นะ"
2600302-34 = "...ฮิฮิ"
2600302-35 = "งานที่เหลือก็สู้ๆ นะคะ! แต่ก็อย่าฝืนมากไปนะคะ!"
2600302-36 = "ถ้ารู้สึกว่าไม่ไหวก็เรียกฉันได้เสมอนะคะ คุณครู!"
2600302-37 = "ฉันจะไปหาคุณครูทันทีค่ะ!"
2600302-38 = "[s] \"อื้ม ขอบคุณนะ\""
2600302-39 = "...ฮุฮุ"
2600302-40 = "สัญญาแล้วนะคะ"
2600302-41 = "ฉันจดไว้แล้วนะคะ! พบฉันได้ตลอดเลยค่ะ!"
