[translation]
10052150-1 = "ดาอาธ ปัญญาอันลุ่มลึกใต้เงามืด"
10052150-3 = "เด็กพวกนั้นคิดจะทำอะไรคะ?"
10052150-4 = "นั่นมัน... อย่าบอกนะว่า?!"
10052150-14 = "ว้าว"
10052150-15 = "เฮือกกกกกก?!?!"
10052150-16 = "ยูสึจัง? พี่โมโมอิ!?"
10052150-17 = "มิโดริ... ฉันอาจจะคิดผิดมาตลอดเลยก็ได้...!"
10052150-18 = "จู่ๆ ก็พูดเรื่องอะไรน่ะ!?"
10052150-19 = "ฉันคิดมาตลอดว่ายานรบอวกาศเป็นองค์ประกอบที่ยังไงผู้เล่นก็ต้องชอบ... แต่ในฐานะนักเขียนบทแล้ว ฉันควรมองให้เหนือความเป็นไปได้ทั้งหมด...!"
10052150-20 = "หุ่นยนต์ไดโนเสาร์แปลงร่างใหญ่ยักษ์! มันมีอะไรแบบนี้อยู่ด้วยสินะ!"
10052150-21 = "ถ้าไม่ระวัง เราอาจโดนเหยียบตายพร้อมกันหมดก็ได้นะ?!?!"
10052150-22 = "ถึงจะไม่แน่ใจนัก แต่ฉันคิดว่าฉันรู้แน่ๆ อย่างหนึ่งค่ะ"
10052150-23 = "ถ้ารุ่นพี่เนรุอยู่ที่นี่ด้วยละก็... ต้องพูดแบบนี้ออกมาแน่นอนค่ะ"
10052150-24 = "\"โคตรเจ๋ง\""
10052150-25 = "[s1] \"นั่นไม่ใช่หุ่นยนต์ไดโนเสาร์แปลงร่างขนาดยักษ์หรอก โมโมอิ\"\n[s2] \"นั่นมันหุ่นยนต์ 'สัตว์ประหลาด' แปลงร่างขนาดยักษ์ต่างหาก!\""
10052150-28 = "..."
10052150-29 = "ตอนนี้เรื่องนั้นมันสำคัญเหรอไงคะ?!?!"
10052150-36 = "ส่วนตัวแล้วฉันคิดว่าอนุกรมวิธานหรือการจำแนกประเภทเป็นสิ่งที่สำคัญค่ะ#nแต่ว่าสิ่งนั้นมันกำลังมาทางนี้แล้วนะคะ? ตัวใหญ่ยักษ์เลยด้วย? ทำยังไงกันดีล่ะคะ?!"
10052150-41 = "..."
10052150-42 = "อื้อ เป็นอย่างนี้นี่เอง ไม่ต้องกังวลให้มากไปหรอก"
10052150-46 = "ริโอะ? นี่คุณ... หรือว่า...?"
10052150-47 = "ใช่แล้วละ ฉันเตรียมบางอย่างไว้เผื่อเหตุการณ์แบบนี้แล้ว"
10052150-51 = "หุ่นรบล้ำยุคนีโอ"
10052150-52 = "ออกโรงได้"
10052150-62 = "นี่มัน...!"
10052150-63 = "หุ่นรบล้ำยุคนีโอ...?"
10052150-70 = "..."
10052150-71 = "..."
10052150-72 = "อุ๊บส์! อะฮะฮะฮะฮะฮ่า! ตัวอะไรเนี่ย! ใครเป็นคนออกแบบน่ะ..."
10052150-73 = "โธ่ๆๆ มันตัวเล็กไปหรือเปล่าคะ? ตัวแค่นี้จะไปทำอะไรได้คะ? แค่โดนดาอาธดีดด้วยปลายนิ้ว ก็คงตัวแตกเป็นเสี่ยงๆ แล้วละค่ะ!"
10052150-75 = "บะ... แบบนี้ก็คงวางใจได้หน่อยนะคะ...! แหะๆๆ..."
10052150-76 = "คิดว่างั้นเหรอ? อื้อ ในหลายๆ กรณี เรื่องขนาดก็อาจเป็นปัญหาได้"
10052150-77 = "แต่ว่ามันไม่ใช่ในกรณีนี้หรอก"
10052150-81 = "คะ... คะ...?"
10052150-82 = "ใช้ได้ใช่มั้ย เคย์?"
10052150-83 = "ก็นะ... ก็เราสัญญากันไว้แล้วนี่คะ ดีเลยค่ะ ในเมื่อไม่มีเวลาแล้ว งั้นฉันจะเริ่มเลยนะคะ"
10052150-84 = "ฉันควรบอกไว้ล่วงหน้ามั้ยนะ? เอาเป็นว่าขอกล่าวคำขอบคุณไว้ก่อนแล้วกันค่ะ ไอน์ ซอฟ ออร์"
10052150-85 = "คะ... คะ?!"
10052150-86 = "พูดเรื่อง... อะไรน่ะ?"
10052150-87 = "คงเป็นอะไรไร้สาระนั่นละ! ดาอาธของเราน่ะ ทั้งแข็งแกร่งและไร้เทียมทาน! พวกคุณในตอนนี้ไม่มีทาง#nเอาชนะดาอาธได้หรอกค่ะ ความเป็นไปได้เป็นศูนย์เลย!"
10052150-88 = "ที่พูดมาก็ไม่ผิดหรอก ถ้าอยู่ภายใต้เงื่อนไขว่า 'ตอนนี้' และ 'แบบนี้' น่ะนะ"
10052150-89 = "แต่ทั้งหมดนี้ก็เป็นเพราะพวกเธอใช้พลังของทวยเทพไร้นามมาตลอด"
10052150-90 = "แล้วก็ต้องขอบคุณที่ใช้มันสร้างปรากฏการณ์ที่เรียกว่าดินแดนเหล็กกล้าขึ้นมาด้วย"
10052150-91 = "แล้วก็เหมือนว่าจะพยายามเปลี่ยนเฟสในตอนท้ายด้วยอยู่เหมือนกัน แต่ว่าฉันก็ชินกับการแก้ไขอะไร#nแบบนั้นแล้วละ..."
10052150-92 = "เดี๋ยวนะคะ...? เพราะพวกฉันสร้างดินแดนเหล็กกล้าขึ้นมางั้นเหรอ...?"
10052150-93 = "ต่อให้ <ท่านธิดา> กับ <กุญแจ> จะอยู่ที่นี่ แต่ก็...?"
10052150-94 = "..."
10052150-95 = "ยะ... อย่าบอกนะ...!!!"
10052150-96 = "มันก็ง่ายๆ ค่ะ สิ่งที่เคยเกิดขึ้นแล้วหนึ่งครั้ง ก็อาจเกิดซ้ำได้อีกนี่คะ และครั้งที่ 2 ก็จะง่ายดายกว่า#nครั้งแรกแน่นอนค่ะ"
10052150-97 = "เมื่อก่อนก็มี <สีสัน> พยายามจะบุกโจมตีคิโวทอสค่ะ"
10052150-98 = "พวกเราต่อสู้กับพลังนั่น และเอาพลังบางส่วนมาประยุกต์ใช้ด้วย"
10052150-99 = "ถ้าเราไม่ใช้ทุกอย่างที่ใช้ได้ ก็คงเอาชีวิตไม่รอดกันหรอก"
10052150-100 = "พวกคุณไม่ใช่คนเดียวที่กำลังต่อสู้อยู่หรอกนะคะ ไอน์ ซอฟ ออร์ ทุกคนที่มีชีวิตอยู่ก็เช่นเดียวกันค่ะ"
10052150-101 = "ดินแดนเหล็กกล้าถูกสร้างขึ้นมาด้วยการใช้พลังของทวยเทพไร้นาม"
10052150-102 = "และผู้เลื่อมใสทั้ง 8 ตนก็ได้รับอิทธิพลจากพลังนั้น"
10052150-103 = "หลังจากการต่อสู้ทั้งหมด สถานที่แห่งนี้ก็กลายเป็นที่ที่เต็มไปด้วยพลังของทวยเทพไร้นาม"
10052150-104 = "และเคย์ที่ดูดซับคอร์ข้อมูลของเหล่าผู้เลื่อมใสก็มาอยู่ที่นี่ด้วย"
10052150-105 = "ถ้าพลังงานมีอยู่จริงและเราวิเคราะห์มันได้ แถมยังสร้างมันขึ้นมาใหม่ได้"
10052150-106 = "ก็หมายความว่าเราจะแปรรูปและประยุกต์ใช้พลังงานนั้นในทิศทางที่ต้องการได้ค่ะ"
10052150-110 = "หืม? พูดแบบนั้น... หมายความว่า...!"
10052150-111 = "ทำไมล่ะคะ? อย่างไรเสียพลังงานนี้ก็ต้องกลับมายังฉันกับอาริสึอยู่แล้วไม่ใช่เหรอคะ? "
10052150-112 = "ฉันจะไม่รับฟังความไม่พอใจใดๆ ทั้งนั้นค่ะ รู้เอาไว้ด้วยนะคะ"
10052150-114 = "ถ้าอย่างนั้น หุ่นนีโออะไรนั่น...!"
10052150-115 = "ใช่แล้วละ ในกรณีนี้ ก็จะเกิด <การขยายขนาดของวัตถุ> ขึ้นมาอีกครั้งยังไงล่ะ"
10052150-129 = "เยี่ยมไปเลย!!!"
10052150-130 = "ตะ... ตัวใหญ่สุดๆ ไปเลย!"
10052150-131 = "(แต่เรื่องดีไซน์... ทำไมถึงออกมาดีกว่านี้ไม่ได้นะ...)"
10052150-132 = "นี่คือไพ่ตายที่ว่าสินะคะ..."
10052150-133 = "ขอโทษนะ แต่นี่คือดินแดนของศัตรู ถ้าพูดอะไรไม่ระมัดระวัง ข้อมูลก็อาจจะรั่วไหลได้น่ะ"
10052150-134 = "และนั่นก็เป็นเหตุผลที่บอกแค่เคย์คนเดียวสินะคะ"
10052150-135 = "ใช่แล้วละ ในเรื่องของการรักษาความปลอดภัย เคย์คือคนที่ปลอดภัยที่สุด"
10052150-136 = "หืม? หุ่นรบล้ำยุคนีโอขนาดยักษ์..."
10052150-143 = "กำลังยื่นมือไปหายูสึอย่างสุภาพเลยค่ะ"
10052150-144 = "วะ... หวา?!?!"
10052150-145 = "ใช่แล้วละ ก็ไม่แปลกหรอก นั่นก็เพราะ..."
10052150-146 = "นักบินของหุ่นรบล้ำยุคนีโอ ก็คือเธอยังไงล่ะ ยูสึ"
10052150-149 = "แต่ฉันไม่เคยตกลงเรื่องนั้นเลยนะคะ?!?!?!"
10052150-150 = "อ๊ะ! ครั้งนี้ยูสึพูดจาฉะฉานเลยค่ะ! แบบนี้แปลว่าตกใจมากๆ แน่นอนค่ะ!"
10052150-151 = "แต่ก็เคยควบคุมหุ่นรบล้ำยุคมาก่อนแล้วนี่?"
10052150-152 = "อ๊ะ...! จริงด้วยค่ะ รุ่นพี่ริโอะ! เมื่อก่อนเคยมีหุ่นรบล้ำยุคที่ถูกดัดแปลงสำหรับ UZQueen โดยเฉพาะ#nเลยละค่ะ!"
10052150-153 = "ใช่แล้ว ฉันก็วิเคราะห์สถิติพวกนั้นมาเหมือนกัน เพราะแบบนั้นละนะ ยูสึ..."
10052150-157 = "ขึ้นไปบนหุ่นรบล้ำยุคนีโอเลย"
10052150-163 = "ฮะ... ฮือออออ...!!!"
10052150-172 = "หะ... ให้ฉันทำยังไงเหรอคะ?!"
10052150-173 = "หุ่นรบล้ำยุคนีโอได้รับการออกแบบให้ปฏิบัติการผ่านการเชื่อมโยงคลื่นสมองและระบบประสาท"
10052150-174 = "ในตอนนี้น่ะนะ..."
10052150-175 = "ตอนนี้... เหรอคะ?!"
10052150-176 = "ใช่แล้วละ ตอนนี้หุ่นรบล้ำยุคนีโอจะเคลื่อนไหวตามความคิดของเธอ"
10052150-177 = "ตะ... ตะตะตะตะ... ต่อให้จะว่าอย่างนั้นก็เถอะค่ะ...!"
10052150-182 = "ไปเลย ดาอาธ! ทำลายหุ่นหน้าตาไม่ได้เรื่องนั่นเลย!"
