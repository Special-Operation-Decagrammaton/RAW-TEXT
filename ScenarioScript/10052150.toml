[translation]
10052150-1 = "達阿特：隱藏於陰影之下的深淵智慧"
10052150-3 = "那些孩子想做什麼？"
10052150-4 = "那是……難道！？"
10052150-14 = "哇。"
10052150-15 = "噫，噫咿咿咿咿咿咿咿！？！？"
10052150-16 = "柚子醬？姐姐！？"
10052150-17 = "綠……我可能一直以來都想錯了……！"
10052150-18 = "突然又在說什麼啊！？"
10052150-19 = "我本來以為宇宙戰艦是很受歡迎的題材……#n不過身為劇本作家，應該要超越所有可能性，看向更遠的地方才對……！"
10052150-20 = "巨大變形合體恐龍機器人！原來還有這招啊！"
10052150-21 = "我們搞不好會被一腳踩死耶！？！？"
10052150-22 = "雖然不是很懂，但有件事我可以肯定。"
10052150-23 = "如果寧瑠前輩在這裡的話……一定會留下這樣的感想。"
10052150-24 = "「簡直帥到離譜」。"
10052150-25 = "[s1] 「不是巨大變形合體恐龍機器人，桃井！」\n[s2] 「是巨大變形合體『怪獸』機器人──！」"
10052150-28 = "……"
10052150-29 = "那種事現在重要嗎！？！？"
10052150-36 = "即便我個人認為分類學是很重要的學問……不過那個東西，好像正往這邊過來耶？#n未免也太大了吧？有什麼辦法嗎！？"
10052150-41 = "……"
10052150-42 = "這樣啊，原來如此。#n大家不用太擔心。"
10052150-46 = "莉央？難道你……？"
10052150-47 = "沒錯。為了以防萬一，我已經事先做好了準備。"
10052150-51 = "NEO前衛君。"
10052150-52 = "出擊。"
10052150-62 = "這是……！"
10052150-63 = "……NEO前衛君？"
10052150-70 = "……"
10052150-71 = "……"
10052150-72 = "噗！啊哈哈哈哈哈！那是什麼東西啊！"
10052150-73 = "嘖嘖嘖。未免也太小了吧？#n那種東西能做什麼啊？只要被達阿特用指尖彈一下就會粉碎了吧！"
10052150-75 = "稍，稍微可以安心了呢……嘿嘿……"
10052150-76 = "你們是這麼認為的嗎？#n也對，在許多情況下，大小確實是個問題。"
10052150-77 = "只可惜現在並非如此。"
10052150-81 = "咦……？"
10052150-82 = "沒問題吧，Kei？"
10052150-83 = "……嗯，畢竟已經跟你約好了。#n沒時間了，我們馬上開始吧。"
10052150-84 = "不過在那之前，姑且先跟你們說聲謝謝。#nAin、Soph、Aur。"
10052150-85 = "什，什麼！？"
10052150-86 = "那是……什麼意思？"
10052150-87 = "八成只是在虛張聲勢吧！我們的達阿特可是名符其實的強韌！無敵！最強！#n現在的你們根本沒有對抗達阿特的可能性！"
10052150-88 = "你們說的沒錯。#n在「現在」、「這樣」的條件下，確實是如此。"
10052150-89 = "然而，這一切都要歸功於你們一直使用著無名之神的力量。"
10052150-90 = "甚至還用它引發了名為鋼鐵大陸的現象。"
10052150-91 = "即便最後似乎嘗試了相位轉換，但整流這種事我多少也已經習慣了。"
10052150-92 = "等等……？因為我們創造了鋼鐵大陸……？"
10052150-93 = "可是，就算「王女」和「鑰匙」都在這裡……？"
10052150-94 = "……"
10052150-95 = "難，難道說……！！！"
10052150-96 = "道理很簡單。發生過一次的事就會發生第二次。#n而且第二次往往會比第一次更加容易。"
10052150-97 = "在過去的某一天，「色彩」曾試圖降臨到奇普托斯。"
10052150-98 = "而我們為了與那股力量對抗，也應用了那股力量的一部分。"
10052150-99 = "因為如果不能物盡其用，我們就無法生存下來。"
10052150-100 = "正在掙扎的，並不只有你們而已。Ain、Soph、Aur。#n凡是活著的生命，大家都是一樣的。"
10052150-101 = "鋼鐵大陸是用無名諸神的力量創造的。"
10052150-102 = "除此之外，8名預言者也在不知不覺間受到了那股力量的影響。"
10052150-103 = "在與它們全數交戰之後，這個空間已經變成了充滿無名諸神力量的地方。"
10052150-104 = "並且吸收了那些預言者核心情報的Kei，現在就在這裡。"
10052150-105 = "如果有能量存在，能夠加以分析，進而重現的話……"
10052150-106 = "當然，那也意味著可以將那股能量加工，並應用到我們喜歡的用途上。"
10052150-110 = "咦？所以……！"
10052150-111 = "怎麼了嗎？某種意義上來說，這股力量本來就應該回到我和愛麗絲手中。"
10052150-112 = "所以我並不打算接受你們的抱怨。"
10052150-114 = "那麼，那個叫做NEO什麼的東西……！"
10052150-115 = "沒錯。將會在這種情況下，再次進行「物質的巨大化」。"
10052150-129 = "太神啦！！！"
10052150-130 = "確，確實很厲害！"
10052150-131 = "（不過在設計方面，就不能想想辦法嗎……）"
10052150-132 = "……這就是你所謂的王牌啊。"
10052150-133 = "抱歉。這裡畢竟是敵陣，我擔心隨便說出來有可能洩漏情報。"
10052150-134 = "所以才只告訴Kei呢。"
10052150-135 = "沒錯。在安全性方面，Kei是最安全的對象。"
10052150-136 = "咦？巨大NEO前衛君……"
10052150-143 = "正在[ruby=紳士地]恭敬地[/ruby]向柚子伸出手。"
10052150-144 = "咦，咦咦咦咦咦咦！？！？"
10052150-145 = "是啊，那是當然的。因為──"
10052150-146 = "NEO前衛君的駕駛員……就是你，柚子。"
10052150-149 = "我從來沒有答應過啊！？！？！？"
10052150-150 = "啊！柚子沒有結巴！這代表他真的受到了衝擊！"
10052150-151 = "不過你之前已經駕駛過前衛君了吧？"
10052150-152 = "啊……！沒錯，莉央前輩！#n之前有一台被改造成UZQueen專用機體的前衛君！"
10052150-153 = "是啊。那筆紀錄我也掌握了。#n所以，柚子──"
10052150-157 = "搭上NEO前衛君吧。"
10052150-163 = "嗚，嗚嗚嗚嗚嗚嗚嗚嗚……！！！"
10052150-172 = "該，該怎麼辦！？"
10052150-173 = "首先，NEO前衛君是透過腦波神經連結來運作的。"
10052150-174 = "……至少暫時是。"
10052150-175 = "暫時是！？"
10052150-176 = "沒錯。所以NEO前衛君在這個時間點，會照著你的想法來移動。"
10052150-177 = "就，就就就就，就算你這麼說……！"
10052150-182 = "去吧，達阿特！把那個可笑的東西給我炸飛！"
