10052150-83 = "3;케이 프로토;99;……뭐, 약속한 것도 있긴 하니까요. 좋아요. 시간이 없으니, 바로 시작하도록 하죠."
10052150-84 = "3;케이 프로토;02;그 전에 미리 말해 두도록 할까요. 일단 고맙다는 인사를 해 두겠습니다. 아인, 소프, 오르."
