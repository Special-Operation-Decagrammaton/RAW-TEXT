10052150-72 = "Pfft! Ahahahaha! What is that thing? Its design is one thing..."
10052150-73 = "But oh my, MY. Isn't this thing too small? What can you even do with that? I think a flick from Daath will break it into pieces!"
10052150-75 = "I-I feel relieved all of a sudden. Heehee!"
10052150-76 = "You think so? You're right. Size does matter in many different situations."
10052150-77 = "But not here and now."
10052150-81 = "Wh-What...?"
10052150-82 = "Kei?"
10052150-83 = "...Well, I did make you a promise. Fine. Since we don't have much time, let's get started."
10052150-84 = "But let me say this first. Ein, Sof, Ohr. Thank you."
10052150-85 = "Wh-What?"
10052150-86 = "What...are you talking about?"
10052150-87 = "They're bluffing, of course! Our Daath is resilient! Invincible! The strongest! There's no countermeasure in the world against it!"
10052150-88 = "Under any other conditions, your statement would've been correct."
10052150-89 = "However, your choice to use the power of the Nameless Gods was exactly the variable we needed to succeed."
10052150-90 = "And furthermore, you used that power to create this phenomenon you call the Steel Continent."
10052150-91 = "...I think you tried shifting your approach, but I've gotten used to accounting for that."
10052150-92 = "Wait... Because we created the Steel Continent...?"
10052150-93 = "But even if the princess and her key are here..."
10052150-94 = "..."
10052150-95 = "C-Could it be...?!"
10052150-96 = "It's simple. What has already happened once can happen again. And naturally, the second time tends to proceed more easily than the first."
10052150-97 = "There was a day when the Chroma tried to descend upon Kivotos."
10052150-98 = "We fought against that power, but we also utilized parts of that power."
10052150-99 = "We survived by using every single possible option available to us."
10052150-100 = "You're not the only ones struggling, Ein, Sof, and Ohr. Every living being is."
10052150-101 = "The Steel Continent was created using the power of the Nameless Gods."
10052150-102 = "And the eight prophets on said continent were influenced by that power at some point or another."
10052150-103 = "Our many battles against them have released that power into this area."
10052150-104 = "And then there is Kei, who has now absorbed all eight of those prophet's cores."
10052150-105 = "If I can analyze the energy, then I can recreate it."
10052150-106 = "And, once I do that, well, I can do whatever I want with it."
10052150-110 = "Huh? Wait, that means...!"
10052150-111 = "What's wrong? In a way, this power has always belonged to me and Aris. "
10052150-112 = "If you have any complaints, don't bother lodging them with me."
10052150-114 = "Then that Neo whatever will be...!"
10052150-115 = "Yes. This is what I would call \"matter gigantification.\""
10052150-129 = "THAT'S AMAZING!!"
10052150-130 = "I-It really is incredible!"
10052150-131 = "(I'd really love to be able to talk to her about the design, though...)"
10052150-132 = "...So this was your hidden ace."
10052150-133 = "Sorry. The enemy had ears everywhere, so I was scared of leaks."
10052150-134 = "Which is why you only shared this with Kei."
10052150-135 = "Kei was the safest choice when it came to security."
10052150-136 = "Huh? The giant Neo-Avant Guard is..."
10052150-143 = "Politely and gently reaching its hand out to Yuzu."
10052150-144 = "H-HUHHH?!"
10052150-145 = "Well, of course it is."
10052150-146 = "After all, Yuzu is the pilot of the Neo-Avant Guard."
10052150-149 = "I never agreed to that?!"
10052150-150 = "Ah! Yuzu didn't stutter! This means she's genuinely shocked!"
10052150-151 = "But you've controlled another Avant Guard before, right?"
10052150-152 = "Ah...! You are right, Rio! There was an Avant Guard modified exclusively for UZQueen!"
10052150-153 = "Yes. I am aware of that. Therefore..."
10052150-157 = "Get in the Neo-Avant Guard, Yuzu."
10052150-163 = "Waaaaaaaaahhhh...?!"
10052150-172 = "Wh-What do I do?!"
10052150-173 = "For starters, Neo-Avant Guard can be controlled by reading your brainwaves."
10052150-174 = "...For now."
