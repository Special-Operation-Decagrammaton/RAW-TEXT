[translation]
10053050-1 = "Episode 5;Shadow Over the Lodge"
10053050-6 = "We're back..."
10053050-11 = "I can't take another step..."
10053050-12 = "Same..."
10053050-13 = "[ns1] \"You all seem exhausted. Rest for now.\"\n[ns2] \"I'll get started on dinner...\""
10053050-18 = "[ns3] \"M-My body won't move...?\"\n[ns4] \"Has time stopped...?!\""
10053050-24 = "Ah, looks like a classic case of muscle ache."
10053050-25 = "Since everyone's beat, I'll do the cooking."
10053050-26 = "Oh! Th-Thank you!"
10053050-27 = "But no complaining, no matter how much you hate it! Deal?"
10053050-28 = "...You do know how to cook, right?!"
10053050-29 = "Easy-peasy! You grill stuff, you boil it. What's so difficult?"
10053050-33 = "That doesn't inspire confidence. Wait!"
10053050-34 = "Ugh... Should I watch her? Oh, but...this couch..."
10053050-35 = "What do you think, Tsubasa?"
10053050-40 = "..."
10053050-44 = "...She's already out."
10053050-45 = "I suppose we did run around a lot... Big day..."
10053050-46 = "It makes sense that...she's tired...*yawn*"
10053050-47 = "I'm a little sleepy too..."
10053050-48 = "..."
10053050-53 = "*clunk*"
10053050-57 = "...?! Wh-What the?!"
10053050-58 = "I guess I dozed off..."
10053050-59 = "..."
10053050-60 = "Konoka? Is that you, Konoka?"
10053050-61 = "..."
10053050-63 = "[ns5] \"Something wrong, Konoka?\"\n[ns6] \"Are you locked out?\""
10053050-66 = "S-Stop playing around! Just get over here!"
10053050-67 = "..."
10053050-68 = "I know what you're doing! Don't be childish! I get enough of these stupid pranks from my roommates!"
10053050-70 = "..."
10053050-71 = "S-Sensei...?"
10053050-72 = "[s7] \"Yes, leave it to me.\"\n[s8] \"I'll go check.\""
10053050-75 = "N-No, I'll join you."
10053050-76 = "Something doesn't feel right. Stay behind me, Sensei."
10053050-80 = "...Someone's...on the other side of the door..."
10053050-86 = "..."
10053050-92 = "Who's here to PAAAAAR-TAY?!"
10053050-93 = "?!"
10053050-102 = "Huh? What? Why're you hitting me with your weak little fists?"
10053050-103 = "You idiot! I've had enough of your pranks! Look... You scared Sensei!"
10053050-104 = "...? I did? What's up?"
10053050-105 = "[s9] \"...? Someone was at the front door.\"\n[s10] \"That wasn't you, Konoka?\""
10053050-108 = "Huh? What are you talking about? I just..."
10053050-109 = "Ah, then THAT's what that was."
10053050-110 = "Huh?! What's that supposed to mean?"
10053050-111 = "Well, while I was prepping the soup, I saw someone walking around the lodge."
10053050-112 = "But I knew you sleepyheads were inside, so I figured it was nothing."
10053050-113 = "Th-Then there's really someone out there? With us?"
10053050-114 = "Considering that you sensed someone behind the front door... Yeah. Probably."
10053050-115 = "Anyway, let's chow. Wake the director too. She needs the calories."
10053050-116 = "Don't you think there's something more important going on?"
10053050-117 = "Aw, come on. Nothing's more important than food! You gotta eat to live. Rise and shine, Director!"
10053050-119 = "And so, despite the awkwardness, we grabbed our plates."
10053050-120 = "...Unexpectedly, Konoka's food was quite delicious. Though her choice of menu was a bit...\"dad-coded.\""
10053050-123 = "I see... So all that happened while I was asleep."
10053050-124 = "...I need to ask. Just in case."
10053050-125 = "Do any of you have, say...a sworn enemy who lives to torment you?"
10053050-126 = "Who would?!"
10053050-128 = "Oh, I might."
10053050-130 = "Huh?!"
10053050-132 = "Let's see... There's that guy who swore revenge on my family line. That was about two weeks ago."
10053050-133 = "But there have been a few others. It makes sense that one or two would show up about now."
10053050-134 = "Surely you're joking."
10053050-135 = "Nope. Dead serious."
10053050-136 = "I don't just shuffle papers at the Public Peace Bureau, after all."
10053050-137 = "...Ah. But... That doesn't add up. It can't be me they're after. Only Kanna knows I'm out here."
10053050-138 = "...No, you can't be so sure."
10053050-139 = "Huh?"
10053050-140 = "If someone is trailing you with ill intentions, then this is the perfect opportunity for them. You're mostly alone, away from your colleagues, and in isolated, unfamiliar territory."
10053050-141 = "Of course, for this hypothesis to hold true, your pursuer would have to possess a superhuman level of patience, tenacity...and, most importantly, a deep-seated vendetta."
10053050-142 = "Wait, though! I don't think I've done anything deserving such an intense grudge."
10053050-146 = "...Or maybe I have?"
10053050-147 = "YOU HAVE?!"
10053050-148 = "Ah, well, when you carry out your duties, sometimes people get caught in the crossfire. You can't make an omelet without breaking a few eggs, you know."
10053050-149 = "Should a Valkyrie officer say that?! You're supposed to valiantly defend Kivotos!"
10053050-150 = "Oh, it's fine. Everything I've ever done was in self-defense. Believe me."
10053050-155 = "...The Seven Prisoners."
10053050-162 = "I've heard the rumors. They were seven criminals so dastardly, so unhinged, so violent, that their own schools called in the General Student Council's special forces. And, while in custody of the Corrections Bureau, they...escaped."
10053050-163 = "What if they're not just after Konoka, but the Public Peace Bureau...and the entire Valkyrie Police School?"
10053050-164 = "Maybe we ARE in actual danger...!"
10053050-169 = "Perhaps you're exaggerating...just a little?"
10053050-174 = "The theory's got some legs."
10053050-175 = "Really...?"
10053050-176 = "You want a criminal who's meticulous, persistent, and hates Valkyrie more than anything."
10053050-177 = "I know just the one."
10053050-178 = "..."
10053050-179 = "..."
10053050-181 = "Oh, what a relief!"
10053050-182 = "Huh?"
10053050-183 = "I was SO worried we were dealing with a ghost! A phantasm! They're pretty hard to shoot, you know."
10053050-184 = "An escaped criminal is easy as pie. I just need to capture them and...throw them in the slammer!"
10053050-185 = "...Ah, forget I said \"slammer.\" I mean...I'll lawfully transfer them to the Corrections Bureau for rehabilitation."
10053050-186 = "You make it sound so simple..."
10053050-187 = "They have a reputation. Even I've heard of the Seven Prisoners."
10053050-188 = "Oh yeah? You've heard of the Seven Prisoners, but not the Public Peace Bureau?"
10053050-189 = "Ah. Sorry, I didn't mean—"
10053050-190 = "Aw, no need to apologize for it! I'm just razzin' you!"
10053050-194 = "I've got it all handled! No matter who comes for us, or how many reinforcements they bring, I'll protect you. That's a promise."
10053050-195 = "Another problem solved! Ha! I was all worked up for nothing!"
10053050-196 = "..."
10053050-200 = "..."
