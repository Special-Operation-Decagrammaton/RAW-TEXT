10054005-100 = "3;키사키;13\n5;투명;01\n#na;루미;응. 키사키 녀석, 이쯤 되면 언제나 기운이 빠지곤 했거든. 더위에 약하니까.\n#5;hide"
10054005-101 = "#all;hide"
10054005-102 = "3;루미;01;그렇다고는 해도, 량피(凉皮)와 녹두탕(绿豆汤) 같은, 흔히 먹을 수 있는 요리 정도였지만.\n#3;a\n#3;em;[…]"
10054005-103 = "3;레이죠;02;아하……. 량피와 녹두탕이었군요. 확실히 쉽게 구할 수 있으면서도, 여름이라면 생각나는 요리들이죠.\n#3;em;[반응]\n#4;hide"
10054005-104 = "3;레이죠;16;쫄깃한 면에 오이와 두부, 숙주를 올려 새콤하고 차가운 맛으로 먹는 국수."
10054005-105 = "3;레이죠;18;그리고 녹두를 뭉근하게 끓여서 차게 식힌 뒤, 꿀을 넣어 달콤하게 마시는 녹두탕……."
10054005-106 = "3;레이죠;03;좋네요. 저도 기숙사에 돌아가면, 만들어서 먹어야겠습니다.\n#3;em;[음표]"
10054005-107 = "[s] \"여름엔 으레 기운이 빠지기 마련이긴 하지만…….\""
10054005-108 = "3;루미;02;키사키가 아플까 봐 신경 쓰이는 거야, 선생님? 응, 응. 무슨 말인지 알겠어.\n#3;em;[?]"
10054005-109 = "3;루미;06;하지만 누가 봐도 그 문제는, 좋은 음식을 먹어서 해결되는 것이 아니라, 몸과 마음을 좀 쉬게 해야 해결될 텐데."
10054005-110 = "3;루미;99;가령 공기 좋고 물 좋은 곳이라던가.\n#3;em;[…]"
10054005-111 = "3;루미;02;가만……. 몸과 마음을 쉬게 한다……?"
10054005-112 = "3;루미;07;!\n#3;em;[반짝]"
10054005-113 = "[ns] \"왜 그래, 루미?\""
10054005-114 = "3;루미;03;으음, 뭔가 좋은 생각이라고나 할까, 그 비슷한 것이라고나 할까! 그런 게 떠올라서 말이지!"
10054005-115 = "3;루미;00;그러니까 선생님. 지금부터 키사키한테 조금 다녀와 주겠어? 그 애 상태도 조금 볼 겸 해서 말이지."
10054005-116 = "5;투명;01\n#5;h\n#5;hide"
10054005-117 = "#na;(루미의 반짝이는 표정 역시 조금 신경 쓰였지만…….)"
10054005-118 = "5;투명;01\n#5;h\n#5;hide"
10054005-119 = "#na;(루미가 한 말이니까, 일단 믿어 보기로 했다.)"
10054005-120 = "3;루미;03;좋았어. 그러면 부탁할게, 선생님!\n#3;em;[음표]"
10054005-121 = "3;레이죠;04;회장님의 말씀이니 어련히 뜻이 있겠습니다만……. 저도 잘 부탁드리겠습니다.\n#3;em;[땀]"
