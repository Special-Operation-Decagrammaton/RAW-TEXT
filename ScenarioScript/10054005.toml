10054005-33 = "3;루미;00;하하하. 확실히 더운 날이네. 에어컨을 풀 가동중이지만, 이건 조금 심할 정도야.\n#3;em;[재잘]\n#3;a"
10054005-34 = "3;루미;01;자, 선생님. 너무 티 내지 말고, 이거 마셔."
10054005-35 = "5;투명;01\n#5;h"
10054005-36 = "#na;(루미가 웃으면서 건네준 것은…… 얼음컵과 레몬 홍차 음료였다!)\n#5;hide"
