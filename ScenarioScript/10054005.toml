10054005-47 = "3;루미;03\n4;레이죠;17\n#4;em;[음표]\n#3;h\n#4;h\n#wait;1500"
10054005-48 = "#all;hide"
10054005-49 = "#na;(그렇게 둘과 같이, 여름과 날씨와 산해경과…… 아무래도 좋은 이야기들을 나눴다.)"
10054005-50 = "2;루미;03\n4;레이죠;17\n#2;a\n#4;a\n#2;h\n#4;h"
10054005-51 = "[ns] \"그러고 보니, 산해경에서는 여름에 뭘 먹어?\""
10054005-52 = "2;루미;03\n4;레이죠;02;산해경의 여름 음식…… 말씀입니까?"
10054005-53 = "4;레이죠;02\n2;루미;07;좋은 주제네, 선생님. 제대로 설명하자면 한나절은 이야기할 수 있겠지만, 가장 흔한 것은–\n#2;em;[반짝]"
10054005-54 = "#all;hide"
10054005-55 = "#st;[0,0];instant;1;"
