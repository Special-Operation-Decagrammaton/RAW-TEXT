10054005-38 = "[ns] \"고마워, 루미. 루미 최고. 세계 최고의 요리사.\""
10054005-39 = "3;루미;04;그, 그 정도로 대단한 건 아닌데 말이야.\n#3;em;[///]\n#3;stiff"
10054005-40 = "3;루미;99;산해경은 찬 음료를 전통적으로 그다지 좋아하지 않았지만……. 아무래도 요즘은 외부 손님이 한층 더 늘어났으니 말이지."
10054005-41 = "3;루미;00;상황과 상대에 맞는 준비를 미리미리 해 둬야, 한층 더 좋은 접객을 할 수 있지 않겠어?"
10054005-42 = "3;루미;01;상업이라는 것은 기본적으로, 그 물건이 필요한 사람에게 그 물건을 가져다주는 일이니까."
10054005-43 = "3;루미;01\n4;레이죠;03;혹시 모자라신다면 더 말씀해 주십시오. 레몬 홍차 말고도 자몽 자스민차, 복숭아 우롱차, 유자 홍차도 있으니까요.\n#3;m2\n#4;a"
10054005-44 = "#st;[0,0];instant;1;"
