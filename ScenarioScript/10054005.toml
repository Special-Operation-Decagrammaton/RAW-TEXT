10054005-23 = "[ns] \"뜨거워?!\""
10054005-24 = "3;현무상회 부원 A;02;뜨겁다뇨. 이 정도면 아직 따듯한 정도인걸요?\n#3;em;[?]"
10054005-25 = "3;현무상회 부원 A;02\n4;현무상회 부원 B;07;그렇습니다, 선생님! 찬물은 기본적으로 몸에 안 좋다구요? \n#4;em;[재잘]\n#4;a\n#3;m2"
10054005-26 = "3;현무상회 부원 A;02\n4;현무상회 부원 B;99;더군다나 더운 날이라고 급하게 찬물을 마시면, 위장이 놀라서 아플 수도 있으니까요."
10054005-27 = "4;현무상회 부원 B;99\n3;현무상회 부원 A;07;양기가 강할수록 그 기운을 낭비하는 데 조심하라! 요리에도 적용되는 말이죠."
