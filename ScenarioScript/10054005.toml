10054005-59 = "1;현룡문 부원 A;01\n3;현룡문 부원 B;03\n5;현룡문 부원 C;02\n#1;a\n#3;a\n#5;a\n#1;h\n#3;h\n#5;h\n#wait;2000"
10054005-60 = "4;현무상회 부원 B;04\n2;현무상회 부원 A;02;응? 뭐야, 현룡문 녀석들이잖아……?\n#2;em;[?]\n#1;hide\n#3;hide\n#5;hide"
10054005-61 = "2;현무상회 부원 A;02\n4;현무상회 부원 B;06;안 그래도 더운 날인데, 더 짜증 나게만 하지 않았으면 좋겠네.\n#4;em;[속상함]"
10054005-62 = "4;현무상회 부원 B;06\n2;현무상회 부원 A;04;지금 그 말, 뭔가 불길하게 느껴진다……?"
10054005-63 = "5;현룡문 부원 C;02\n3;현룡문 부원 B;03\n1;현룡문 부원 A;05;현무상회에 고한다!\n#1;em;[반응]\n#2;hide\n#4;hide"
10054005-64 = "1;현룡문 부원 A;05\n5;현룡문 부원 C;02\n3;현룡문 부원 B;05;문주님의 여름을 위해…… 보양식을 내놓아라!\n#3;jump"
10054005-65 = "3;현룡문 부원 B;05\n1;현룡문 부원 A;05\n5;현룡문 부원 C;05;보다 구체적으로는, 불도장(佛跳墙)이나 그에 준하는 것을!\n#5;em;[!]"
10054005-66 = "4;레이죠;99\n2;루미;02;불도장……?\n#1;hide\n#3;hide\n#5;hide"
10054005-67 = "2;루미;02\n4;레이죠;06;아니면 그에 버금가는 것이요? 이거 또 골치 아픈 억지를…….\n#4;em;[한숨]"
10054005-68 = "4;현무상회 부원 B;02\n2;현무상회 부원 A;06;그래서 불길하댔잖아…….\n#2;em;[속상함]"
10054005-69 = "2;현무상회 부원 A;06\n4;현무상회 부원 B;01;내 탓이냐? 쟤네가 억지 부리기 시작한 거지.\n#4;jump"
10054005-70 = "2;현무상회 부원 A;06\n4;현무상회 부원 B;01\n#2;h\n#4;h"
10054005-71 = "[ns1] \"불도장?\"\n[ns2] \"아, 불도장.\""
10054005-72 = "#wait;10"
10054005-73 = "#wait;10"
10054005-74 = "3;레이죠;16;그렇습니다. 사슴 힘줄이나 화퇴, 송이버섯이나 말린 전복 같은…… 귀한 재료 스무 가지 정도를 한나절에서 이틀 동안 푹 고아서 만드는 요리죠.\n#2;hide\n#4;hide\n#3;em;[…]"
10054005-75 = "3;루미;06;재료 수급 측면까지 생각하면, 3일 전에 미리 예약해 줘야 제대로 만들 수 있는 요리인데 말이야.\n#3;em;[세로선]"
10054005-76 = "3;레이죠;02;알고 계시는군요. 네. 귀한 재료란 재료는 전부 모아……. 최소 한나절에서 이틀 정도 푹 고아야 완성되는 요리입니다.\n#2;hide\n#4;hide\n#3;em;[반응]"
10054005-77 = "3;루미;06;3일 전에는 미리 이야기해 줘야, 제대로 된 걸 만들 수 있는데. 그것 참. \n#3;em;[세로선]"
10054005-78 = "3;레이죠;99;불도장을…… 여름 보양식으로 먹기도 하는 것은 사실입니다."
10054005-79 = "3;레이죠;99\n2;루미;02;보양식이라는 것은 결국, 너무 덥거나 추운 나머지 기운을 빼앗겨서 허해진 몸에, 그 기운을 보충하는 음식인 거잖아?\n#2;em;[?]\n#3;m4\n#2;a"
10054005-80 = "4;레이죠;99\n2;루미;01;그러니…… 좋다는 것은 전부 넣고 푹 고아 낸 불도장이야말로, 어떤 의미로는 보양식에 어울리는 요리이기도 하지.\n#3;hide"
10054005-81 = "2;루미;01\n4;레이죠;06;네……. 그 요리에 여러 가지로 들어가는 자원을, 감당할 수 있다면 말이죠.\n#4;em;[한숨]"
10054005-82 = "#all;hide"
10054005-83 = "2;현무상회 부원 A;08;다짜고짜 들어와서 불도장 같은 걸 내놓으라고 하면 어떡해? 재룟값은 둘째 치더라도, 만드는 데 얼마나 오래 걸리는지 아냐?\n#2;a\n#2;em;[빠직]"
10054005-84 = "2;현무상회 부원 A;08\n4;현무상회 부원 B;05;맞아! 거기에 너희들, 문주님 드릴 거라고 온갖 잔소리는 다 할 거잖아!\n#4;a\n#4;jump"
10054005-85 = "3;현룡문 부원 A;05;그 정도는 미리 헤아려 준비해야 했을 거 아냐!\n#3;em;[!]\n#2;hide\n#4;hide"
10054005-86 = "3;현룡문 부원 A;05\n2;현룡문 부원 B;05;문주님의 위기는 산해경의 위기! 두 번 말하면 입이 아플 사안이다!\n#3;m4\n#2;a"
10054005-87 = "3;현룡문 부원 A;05\n2;현룡문 부원 B;05\n1;현룡문 부원 C;05;너희들도 산해경이잖아! 혹시 불충과 역심이라도 품고 있는 거냐? 안 그래도 문주님이 요즘 피곤하신 기색을 보이시는데!\n#3;m5\n#2;m3\n#1;a"
10054005-88 = "4;현무상회 부원 B;01\n2;현무상회 부원 A;04;언제부터 현무상회 업무에 '앞일 예측하기' 같은 게 추가된 거야?\n#1;hide\n#3;hide\n#2;em;[속상함]"
10054005-89 = "2;현무상회 부원 A;04\n4;현무상회 부원 B;05;그래! 우리는 요리사지 역술가가 아니라고!"
10054005-90 = "#all;hide"
10054005-91 = "3;레이죠;07;……어떻게 할까요, 회장님. 점내 소란 유발로 '강제 조치'라도 할까요?\n#3;em;[한숨]\n#3;a"
10054005-92 = "3;루미;00;조금만 더 두고 보자고. 뭐…… 보양식 같은 건 내가 따로 준비해 두고 있긴 했으니까.\n#3;em;[음표]"
10054005-93 = "3;루미;00\n2;레이죠;02;정말입니까?\n#3;m4\n#2;a"
