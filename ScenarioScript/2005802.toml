2005802-9 = "3;에리카 반짝부;03;이쪽 상가에 팬시 샵이 많거든."
2005802-10 = "3;에리카 반짝부;00;귀여운 신상이 있는지 한 번 둘러보고 있었지."
2005802-11 = "3;에리카 반짝부;16;최근에는 통신판매라든가, 특정 브랜드의 팝업스토어 같은 것도 자주 열리곤 하지만…….\n#3;em;[…]"
2005802-12 = "3;에리카 반짝부;23;아무래도 유행에 따라 움직인다는 느낌이 있잖아?"
2005802-13 = "3;에리카 반짝부;21;이렇게 딱히 카테고리를 정해놓지 않고 이것저것 구경하다 보면, 간혹 내 취향에 직격인 아이들이 하나씩 나온단 말이지."
2005802-14 = "3;에리카 반짝부;20;선생님도 알지? 남한테 명확하게 설명하긴 어렵지만 왠지 내 마음에 드는 거.\n#3;em;[재잘]"
2005802-15 = "[s3]\"알지, 알지.\"\n[s4]\"그런 거 있지.\""
2005802-16 = "#wait;10"
2005802-17 = "#wait;10"
2005802-18 = "3;에리카 반짝부;19;그리고 가끔 구하기 어려운 레어 아이템을 발견하기도 하고."
2005802-19 = "3;에리카 반짝부;03;아무튼, 이래저래 돌아다니다 보면 좋은 일이 많아."
2005802-20 = "3;에리카 반짝부;18;이렇게 선생님을 만난 것도 그중 하나가 아닐까 싶고?\n#3;em;[///]"
2005802-21 = "[s]\"그럼 모처럼이니까, 함께 구경해볼까?\""
2005802-22 = "3;에리카 반짝부;23;아, 정말?\n#3;jump\n#3;em;[!]"
2005802-23 = "3;에리카 반짝부;03;괜찮은 거야, 선생님? 별로 선생님이 흥미 있을 만한 쇼핑은 아닐지도 모르는데?"
2005802-24 = "3;에리카 반짝부;14;내가 어떤 걸 좋아하는지 궁금하다고?\n#3;em;[?]"
2005802-25 = "3;에리카 반짝부;16;이거 참…… 그렇게 말하면 어쩔 수 없네."
