2005802-52 = "3;에리카 반짝부;20;오, 선생님 같은 이야기였다. 방금."
2005802-53 = "3;에리카 반짝부;16;내가 좋아하는 걸 찾는다…….\n#3;em;[…]"
2005802-54 = "3;에리카 반짝부;22;그거 꽤 어려운 일인 것 같아. 나, 취향이 그렇게 명확하지 않거든."
2005802-55 = "3;에리카 반짝부;00;뭔가, '나는 이런 사람이야', '나는 이런 걸 좋아해~'라고 확실하게 말할 수 있는 사람은 대단하다고 생각해."
2005802-56 = "3;에리카 반짝부;99;난 호불호가 조금 옅다고 할까. 흐리다고 할까……."
2005802-57 = "3;에리카 반짝부;19;근데 장점도 있는 것 같아. 뭐든 좋아하려고 노력하다 보면, 점점 정이 가는 느낌? 익숙해져서 그러려나."
2005802-58 = "3;에리카 반짝부;08;아하하, 그럼 아무튼 이걸로 결정~!\n#3;em;[재잘]"
