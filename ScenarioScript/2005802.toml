2005802-40 = "3;에리카 반짝부;00;응! 보통 이런 레오파드 패턴의 팬시 용품 찾기가 어렵거든. 우연히 들른 스토어에서 발견하다니 럭키!\n#3;em;[음표]"
2005802-41 = "[s]\"그러고 보니 에리카의 총에도 같은 무늬가 있었지.\""
2005802-42 = "3;에리카 반짝부;03;하하, 맞아. 이런 게 왠지 눈에 들어오더라."
2005802-43 = "3;에리카 반짝부;02;왜냐고?\n#3;em;[?]"
2005802-44 = "3;에리카 반짝부;99;어, 글쎄……."
2005802-45 = "3;에리카 반짝부;20;그냥, 개성적인 느낌이라서?"
2005802-46 = "3;에리카 반짝부;18;남들 다 고르는 건 재미없으니까, 좀 자유로운 느낌도 들고?"
2005802-47 = "3;에리카 반짝부;03;철 지난 사춘기 학생이 할법한 소극적 반항, 뭐 그런 건가 봐. 아하하.\n#3;em;[재잘]"
2005802-48 = "[s5]\"개성을 찾는 건 중요하지.\"\n[s6]\"내가 뭘 좋아하는지 알아가는 것도 중요하고.\""
