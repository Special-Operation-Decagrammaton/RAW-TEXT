2005802-62 = "3;에리카 반짝부;22;에헤이~ 아니야! 지갑 넣으셔요~!\n#3;em;[!]\n#3;closeup"
2005802-63 = "3;에리카 반짝부;19;나도 그 정도 여유는 있다구.\n#3;closeup"
2005802-64 = "3;에리카 반짝부;20;그리고 선생님이랑 처음 밖에서 만난 건데, 첫 만남부터 부담 주고 싶지 않거든?\n#3;closeup"
2005802-65 = "3;에리카 반짝부;03;부담이 아니어도, 아무튼 그래! 무슨 말인지 알지?\n#3;closeup"
2005802-66 = "3;에리카 반짝부;00;후후. 아무튼 선생님, 시간 내서 같이 돌아주고. 고마웠어.\n#3;closeup\n#3;em;[음표]"
