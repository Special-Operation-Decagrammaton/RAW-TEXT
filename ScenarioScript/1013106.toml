[translation]
1013106-1 = "#title;밤하늘 아래의 공녀님"
1013106-2 = "#wait;2500"
1013106-3 = "[ns] \"그나저나 오로라라니…….\""
1013106-4 = "3;타카네;07;네. 붉은겨울에서는 가끔 볼 수 있거든요.\n#3;a\n#3;em;[재잘]"
1013106-5 = "3;타카네;00;여기, 이렇게 오로라 예보 앱도 있답니다."
1013106-6 = "[s] \"사진 찍는 거 좋아했구나?\""
1013106-7 = "3;타카네;02;그런…… 편이죠?"
1013106-8 = "3;타카네;12;저는 인물보다는 풍경 쪽을 조금 더 좋아하지만요.\n#3;em;…"
1013106-9 = "3;타카네;00;어떤 의미로…… 평론과 사진 사이에는, 어느 정도 공통점이 있다고 생각하기도 하고요."
1013106-10 = "[s] \"그런 식으로는 생각해 보지 못했어.\""
1013106-11 = "3;타카네;99;크흠. 이런 것이랍니다. 선생님.\n#3;greeting"
1013106-12 = "3;타카네;02;평론이라는 것은 결국, 어떤 문화적 창작물을 보았을 때 떠오르는 심상을…… 자기 나름의 논리를 사용하여.\n#3;em;[반응]\n#3;m2"
1013106-13 = "3;타카네;07;글자라는 형태로 '인화'한 것이잖아요?"
1013106-14 = "3;타카네;12;어떻게 보면 그 순간의 심상을, 자기 나름의 해석법을 사용하여, '고정'한 것이라고도 볼 수 있겠죠.\n#3;em;…"
1013106-15 = "3;타카네;00;그리고 그 해석된 심상…… '평론'은, 모두에게 읽히고 해석되는 것으로, 일종의 '객관성'을 어느 정도 확보할 수 있을 것이고요.\n#3;m3"
1013106-16 = "3;타카네;07;객관성이라는 것은 결국, 누가 보아도 동의할 수 있는 관점이라는 뜻이잖아요?"
1013106-17 = "3;타카네;08;바로 거기에서, 사진과의 공통점이 있을 수 있지 않을까, 하고 저는 생각하는 거죠.\n#3;em;[!]"
1013106-18 = "[s] \"사진도 어떤 의미에서 객관적인 것이니까?\""
1013106-19 = "3;타카네;07;네. 그렇지만 그러면서도 사진을 찍는 사람의 기술에 따라."
1013106-20 = "3;타카네;00;조금씩 느낌이 달라지고, 결과물이 달라지기도 하죠."
1013106-21 = "3;타카네;02;주관성에서 출발했지만, 객관성을 확보하고자 하는 평론.\n#3;em;…"
1013106-22 = "3;타카네;07;객관성에서 출발했지만, 주관성이 담기기도 하는 사진."
1013106-23 = "3;타카네;10;이 역설적으로 맞물린 관계, 흥미롭지 않으세요?\n#3;em;[음표]"
1013106-24 = "3;타카네;00;적어도…… 저는 그렇게 생각해요."
1013106-25 = "3;타카네;07;창작과 평론의 관계도, 마찬가지일 것 같고요."
1013106-26 = "[s] \"창작, 창작이라…….\""
1013106-27 = "3;타카네;17;네? 혹시 창작 같은 걸 해 보고 싶다고, 생각한 적이 있느냐고요?\n#3;em;[?]"
1013106-28 = "3;타카네;06;어, 그건…….\n#3;stiff"
1013106-29 = "3;타카네;11;……그건…….\n#3;em;…"
1013106-30 = "3;타카네;17;아……!"
1013106-31 = "#all;hide"
1013106-32 = "#wait;1000"
1013106-33 = "#all;hide"
1013106-34 = "3;타카네;08;선생님! 오로라예요!\n#3;a\n#3;em;[반짝]"
1013106-35 = "#st;[0,0];instant;1;"
1013106-36 = "#clearST"
1013106-37 = "3;타카네;00\n#3;m4\n#wait;1000"
1013106-38 = "3;타카네;00\n#wait;500"
1013106-39 = "3;타카네;00\n#wait;1000"
1013106-40 = "3;타카네;00\n#wait;1500"
1013106-41 = "3;타카네;07;……자연이란, 대단하죠?"
1013106-42 = "3;타카네;00;이런 걸 보고 있으면, 사람은 정말이지 아무것도 아닌 것 같고.\n#3;em;…"
1013106-43 = "3;타카네;12;뭐 하러 평론 같은 거 하고 있는지, 창작이란 게 무슨 의미가 있는지, 그런 생각까지도 하고는 하지만……."
1013106-44 = "3;타카네;07;그래도, 창작은 사람이 창조해 낼 수 있는, 정말 아름다운 결과물 중 하나라고 생각하니까요.\n#3;m3"
1013106-45 = "3;타카네;08;이런 말도 있잖아요? 사람 그 자체는 아름답지 않을 수 있지만, 사람이 만들어낸 것들은 아름다울 수 있다고요.\n#3;em;[반응]"
1013106-46 = "3;타카네;00;……무언가를 아름답다고 느끼지 못한다면, 그것을 만들어내고자 하는 생각 자체도 들지 않을 테니까요."
1013106-47 = "3;타카네;13;평론은 어쩌면…… 그런, 사람이 만들어낸 아름다움에 대한."
1013106-48 = "3;타카네;10;제가 보낼 수 있는…… 나름의 찬사인 셈이죠.\n#3;em;[음표]"
1013106-49 = "[s1] \"그러면 말이야.\"\n[s2] \"내가 타카네의 사진을 찍어 주고 싶은데, 괜찮을까?\""
1013106-50 = "#wait;10"
1013106-51 = "#wait;10"
1013106-52 = "3;타카네;04;네, 네에?! 선생님, 께서요……? 그, 그건 감사하고, 기쁜 일이지만…… 갑자기 왜요?"
1013106-53 = "3;타카네;15;네에에??!! 찍는 김에, 어떤 컨셉을 잡아서 찍자고요? 어, 어떤 컨셉을 생각하고 계시는지……?\n#3;em;[?!]\n#3;shake"
1013106-54 = "3;타카네;18;그걸 저보고 직접 창작해 보자고요?!?! 너무 뜬금없는 말씀인데요!!??"
1013106-55 = "[s3] \"하지만, 봐봐!\"\n[s4] \"오로라도 아름다운 거고, 창작도 아름다운 거니까!\""
1013106-56 = "#wait;10"
1013106-57 = "#wait;10"
1013106-58 = "3;타카네;17;네? 예쁜 것에 예쁜 것을 더하면, 더 예쁜 게 나오지 않겠냐고요?!"
1013106-59 = "3;타카네;06;그거 완전 타코야키에 민트초코 소스를 뿌려서 먹어도 맛있는 음식이 나올 거라는 논리잖아요!?\n#3;em;[땀]"
1013106-60 = "#st;[0,0];instant;1;"
1013106-61 = "#clearST"
1013106-62 = "3;타카네;06\n#3;em;…\n#wait;2500"
1013106-63 = "3;타카네;11;무엇보다 창작은…… 평론가의 영역이, 아니니까요……."
1013106-64 = "3;타카네;17;다, 당연히 읽고 본 건 많기는 한데요! 그래도요! 그건 어떤 의미로 영역 침범이고…….\n#3;stiff"
1013106-65 = "3;타카네;99;저는, 무언가를 만들어내는 분들의 고통을 폄하하고 싶지 않아요……."
1013106-66 = "3;타카네;16;……어설프게, 창작을 만만하게 보고 시작했다가, 모두에게 상처만 주고 끝나는 결말도 많이 봤고요."
1013106-67 = "3;타카네;02;네? 그러니까 여기에서만, 선생님 혼자 독자가 될 테니, 아무에게도 말하지 않는 비밀 창작을 해 보자고요……?\n#3;em;[?]"
1013106-68 = "3;타카네;17;여기에서만 마법을 부려서, 완전히 꿈 같은 것이라도 좋으니까, 되어 보고 싶은 것을 하자고……?"
1013106-69 = "[s] \"응. 지금은 내가 타카네의 '평론가'가 되어 줄게.\""
1013106-70 = "3;타카네;04;……!\n#3;em;[///]\n#3;stiff"
1013106-71 = "3;타카네;14;그, 그러면……."
1013106-72 = "3;타카네;06;적어도, 키워드 같은 것이라도…… 선생님께서 정해 주세요……."
1013106-73 = "[s5] \"그렇다면 몰락해서 쫓겨난, 공작가의 영애라는 설정으로!\"\n[s6] \"피난길 도중에 오로라를 보고, 순수하게 감격한 거지!\""
1013106-74 = "#wait;10"
1013106-75 = "#wait;10"
1013106-76 = "3;타카네;11;……왜 저를 만나는 사람마다, 한 번은 꼭 그 비슷한 이야기를 하는 건지 정말 모르겠는데 말이죠…….\n#3;em;[한숨]"
1013106-77 = "3;타카네;07;좋아요. 선생님께서 정해 주신 키워드이기도 하고."
1013106-78 = "3;타카네;99;크흠.\n#3;greeting"
1013106-79 = "3;타카네;08;제 위로는 언니가 세 분 계셨고, 저는 그 나름대로 유망한 가문의 막내딸이었답니다.\n#3;em;[재잘]"
1013106-80 = "3;타카네;00;많은 분이 감사하게도 저를 사랑해 주셨지만, 저는 어려서부터…… 그렇게 건강한 체질은 아니었어요."
1013106-81 = "3;타카네;02;자주 나가 놀지 못하는 것에 대한 보상 심리 때문이었을까요? 저는 주위에 사소한 장난을 많이 쳤답니다."
1013106-82 = "3;타카네;10;그 때문에 언니들은 저를 [ruby=Shvibzik]'작은 장난꾸러기'[/ruby] 라고 부르시곤 했고, 저는 특히 셋째 언니 마리아와 사이가 좋았어요.\n#3;em;[음표]"
1013106-83 = "3;타카네;07;아프지 않은 날이면 같은 베개로 간이침대에서 잤고, 아침에는 냉수로 목욕을 했지요."
1013106-84 = "3;타카네;12;사실 냉수 목욕은 하기 싫었는데, 언니가 건강해질 수 있을 거라고 해서요……."
1013106-85 = "3;타카네;99;하지만…… 여러 가지 좋지 않은 일이 일어나서, 가문은 몰락했고…….\n#3;em;…"
1013106-86 = "#all;hide"
1013106-87 = "#na;타카네;저희 네 자매는 각각 뿔뿔이 흩어져, 언젠가 다가와 줄지도 모르는 재회를 기약하며, 서로 먼 길을 떠나게 되었답니다……."
