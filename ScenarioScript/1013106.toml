1013106-138 = "#all;hide\n#clearST"
1013106-139 = "3;타카네;06;…….\n#3;a\n#3;em;…"
1013106-140 = "[s] \"왜, 왜 그렇게 토라지셨는지요, 공녀님……?\""
1013106-141 = "3;타카네;15;공녀님 아니에요! 이제 그거 끝났다고요! 저는 그냥 미요시 타카네이고, 앞으로도 그럴 거예요!\n#3;hophop\n#3;em;[스팀]"
1013106-142 = "3;타카네;06;정말…… 다른 누군가가 만든 창작물이었다면, 첫 페이지를 펼치는 것과 동시에."
1013106-143 = "3;타카네;05;너무 진부해서, 첫 줄을 읽은 순간, '저로 하여금 1분 만에 독서를 포기하게 만든 위업을 달성했다'는 평론을 내렸을 만한 내용이었어요!"
1013106-144 = "[s] \"하지만 직접 썼죠?\""
1013106-145 = "3;타카네;18;선생님이 하라고 하셨잖아요!!!!!\n#3;closeup\n#fontsize;80"
1013106-146 = "3;타카네;06;우우……. 사진이나 보여 주세요…….\n#3;em;[속상함]\n#3;closeup"
1013106-147 = "[s] \"어때?\""
1013106-148 = "3;타카네;16;……."
1013106-149 = "3;타카네;12;잘 나왔네요, 정말로……."
1013106-150 = "3;타카네;08;감사합니다. 선생님.\n#3;greeting\n#3;em;[반응]"
1013106-151 = "3;타카네;02;저기, 한 가지만 부탁드리고 싶은데요.-"
1013106-152 = "3;타카네;00;이 사진…… 그리고 여기에서 있었던 일……."
1013106-153 = "3;타카네;07;누구에게도, 이야기하지 말아 주셨으면 해요."
1013106-154 = "[s] \"그 정도로 부끄러워?\""
1013106-155 = "3;타카네;04;그런 것도 분명히 있지만.\n#3;em;[///]"
1013106-156 = "#st;[0,0];instant;1;"
