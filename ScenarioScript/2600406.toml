[translation]
2600406-1 = "More Often Please"
2600406-2 = "I arrived at the library and, to my surprise, found Shimiko in the lobby."
2600406-3 = "Oh, Sensei! I've been waiting for you."
2600406-4 = "Why am I here?"
2600406-5 = "B-Because...I want to help you, Sensei."
2600406-6 = "Huh? You only ever see me reading books?"
2600406-7 = "Oh, hahaha. I guess that's not entirely wrong."
2600406-8 = "It does make sense."
2600406-12 = "Heehee."
2600406-14 = "I do love reading books, but that's not the only thing I enjoy about the library."
2600406-15 = "I actually prefer reading at home."
2600406-16 = "I like volunteering at the library for a different reason."
2600406-17 = "Because of times like these!"
2600406-18 = "[s1] \"...Times like these?\"\n[s2] \"Are you talking about me?\""
2600406-19 = "Yes! So I'm very excited right now. I didn't think you'd really come."
2600406-20 = "Yes! So I'm very excited right now. I didn't think you'd really come."
2600406-21 = "A librarian's greatest joy is to find a book for someone that they couldn't find elsewhere!"
2600406-22 = "I don't know what book you need right now, but I'm sure it's hard to find!"
2600406-23 = "If it was easy, you could've found it on the internet."
2600406-24 = "[s3] \"Well, you're not wrong.\"\n[s4] \"I couldn't find it anywhere.\""
2600406-25 = "Heehee! I knew it."
2600406-26 = "Heehee! I knew it."
2600406-27 = "Since so much is available on the internet now, libraries are slowly becoming obsolete."
2600406-28 = "But surprisingly, there's also a lot that can only be found in books!"
2600406-29 = "Information not many people are looking for and stories that aren't easy to access are still preserved on paper."
2600406-30 = "As a librarian, it's so fun to search for that kind of stuff!"
2600406-31 = "And on top of that..."
2600406-35 = "[ns5] \"On top of that...?\"\n[ns6] \"Earth to Shimiko?\""
2600406-36 = "...Oh, it's nothing! Okay, what kind of a book are you looking for?"
2600406-37 = "...Oh, it's nothing! Okay, what kind of a book are you looking for?"
2600406-38 = "The library is well organized by genres and names, but it's also huge!"
2600406-45 = "...Hmm, okay. I got it."
2600406-46 = "If that's the case... Come this way!"
2600406-50 = "[ns] Follow Shimiko."
2600406-54 = "I followed Shimiko further into the library."
2600406-55 = "The library was so massive, an entire room only had one genre of books."
2600406-56 = "I had to check one by one, so I was searching for some time."
2600406-57 = "After a while..."
2600406-61 = "I found the book I was looking for."
2600406-62 = "[s] Pull out the book."
