[translation]
2005405-1 = "#title;안전 가동"
2005405-2 = "[ns] \"어떻게든 오늘도 하루가 갔구나…….\""
2005405-3 = "#wait;2000"
2005405-4 = "3;히마리 결전 비무장;01\n#3;a\n#wait;1000"
2005405-5 = "3;히마리 결전 비무장;07;저녁 식사는 괜찮으셨나요?"
2005405-6 = "[s] \"그게, 맛이 없지는 않았는데…….\""
2005405-7 = "3;히마리 결전 비무장;06;네? 아, 네에…… 없지는 않았지만, 있지도 않았다는 말씀이시군요…….\n#3;em;[속상함]"
2005405-8 = "3;히마리 결전 비무장;02;그야, 냉동 보존식 몇 종류를 계속 돌려 먹는 식이니 질릴 만도 하겠지요……."
2005405-9 = "3;히마리 결전 비무장;01;전투 식량은 아무리 잘 만들어도, 맛있지만 맛없다고 느껴지는 법이라고도 하고요."
2005405-10 = "3;히마리 결전 비무장;02;그러면, 선생님. 우선 여기 멀미약을 드시죠."
2005405-11 = "[s1] \"고마워. 조금 멀미를 하는 편이거든.\"\n[s2] \"괜찮을걸? 난 멀미에 강해서.\""
2005405-12 = "3;히마리 결전 비무장;99;후후. 이렇게 만사에 만반의 준비를 갖추는 라이프 스태프인 저에게."
2005405-13 = "3;히마리 결전 비무장;03;조금 더 한껏 반해 주셔도 무방하답니다?\n#3;em;[재잘]"
2005405-14 = "3;히마리 결전 비무장;02;그렇지만 만의 하나라는 것도 있으니까요."
2005405-15 = "3;히마리 결전 비무장;06;선생님께서 상태가 안 좋아지시면…… 무엇보다 제가 마음이 편치 않은걸요.\n#3;em;[속상함]"
2005405-16 = "#all;hide"
2005405-17 = "#wait;2000"
2005405-18 = "3;히마리 결전;01\n#3;a"
2005405-19 = "#wait;1500"
2005405-20 = "3;히마리 결전;01\n#3;greeting\n#wait;1000"
2005405-21 = "3;히마리 결전;07;그러면, 선생님?"
2005405-22 = "3;히마리 결전;02;성능 체험 테스트, 시작해도 될까요?"
2005405-23 = "[ns] \"좋아. 덤벼라!\""
2005405-24 = "#all;hide"
2005405-25 = "#wait;2500"
2005405-26 = "[ns] \"우와아아아!\""
2005405-27 = "3;히마리 결전;03\n#3;h"
2005405-28 = "3;히마리 결전;03;어떠세요, 선생님! 속도 더 올릴까요?\n#3;em;[반짝]"
2005405-29 = "[ns] \"히마리의 바이크, 대단해! 빨라!\""
2005405-30 = "3;히마리 결전;10;휠체어에요!\n#3;em;[스팀]\n#3;hophop"
2005405-31 = "[ns] \"히마리의 휠체어, 대단해~!!!\""
2005405-32 = "3;히마리 결전;03;꽉 잡으세요! 특히 제 허리요!"
2005405-33 = "3;히마리 결전;00;선생님께서 떨어져서 다치시면, 저도 곤란하니까요!"
2005405-34 = "[ns] \"알았어!!!\""
2005405-35 = "#st;[0,0];instant;1;"
2005405-36 = "#clearST"
