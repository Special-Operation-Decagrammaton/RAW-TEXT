2005405-40 = "#wait;1000"
2005405-41 = "3;히마리 결전;03;후아, 시원해! 속이 좀 풀리네요!\n#3;em;[음표]"
2005405-42 = "3;히마리 결전;03;그래서 어떠신가요, 제 휠체어!"
2005405-43 = "3;히마리 결전;08;부양 상태로 이동하기에 잦은 흔들림도 없고, 급가속도 급제동도 완벽하게 이루어지죠."
2005405-44 = "3;히마리 결전;03;저는 안전 운전…… 아뇨, 안전 가동을 하기에 사용할 일은 없겠지만."
2005405-45 = "3;히마리 결전;03;모든 리미트를 해제한 상태의 제로백은, 0.956초까지 단축시킬 수 있답니다?\n#3;em;[재잘]"
2005405-46 = "[s] \"꼭 안전 운전…… 아니, 안전 가동을 했으면 해!\""
2005405-47 = "3;히마리 결전;07;그럼요. 물론이죠. 어차피 몇 번 정도 해 본 것이기도 하고요."
2005405-48 = "3;히마리 결전;04;네에? 저녁에 잠은 안 자고 이런 거 하고 있었냐고요?"
2005405-49 = "3;히마리 결전;99;……."
2005405-50 = "3;히마리 결전;06;하지만 어쩔 수 없잖아요~ 여기에서 특별히 뭘 할 수 있는 것도 아닌데요~\n#3;em;[세로선]"
2005405-51 = "3;히마리 결전;00;일종의 휠체어 가동 한계 테스트 겸 정찰이라고나 할까요?"
2005405-52 = "3;히마리 결전;04;네? 정찰은 토키와 에이미의 몫이 아니냐고요? 그리고 드론으로도 어느 정도 가능하지 않으냐고요?"
2005405-53 = "3;히마리 결전;06;…….\n#3;em;[...]"
2005405-54 = "3;히마리 결전;04;때, 때로는 컨트롤 유닛에게도 현장의 생생한 정보가 필요한 법이랍니다!"
2005405-55 = "3;히마리 결전;99;현장 팀과 분석 팀의 괴리야말로, 잘못된 판단을 내리게 되는 큰 원인 중 하나니까요!"
2005405-56 = "[s] \"그래, 그래…….\""
2005405-57 = "3;히마리 결전;07;그리고 이 시간의 이곳은…….\n#3;em;[...]"
2005405-58 = "3;히마리 결전;03;어디에서도 볼 수 없는 것을, 우리에게 전해주기도 하거든요."
2005405-59 = "3;히마리 결전;08;물론 여기를 관리하고 있는 '분'들이 그걸 의도하지는 않았을 것이라고 확신할 수 있지만요."
2005405-60 = "3;히마리 결전;03;하지만 아시잖아요? 세상 돌아가는 일들은……."
2005405-61 = "3;히마리 결전;08;반드시, 명확한 의도와 결과만으로 이루어지지 않는다는 것을요."
2005405-62 = "3;히마리 결전;03;점성술과 수비학, 상징론 같은 것들이, 어쩌면 우리가 미처 모르고 있는."
2005405-63 = "3;히마리 결전;00;'세계'의 어떤 부분을 공개적으로, 그러나 비밀리에 우리에게 전해주고 있을 가능성처럼 말이죠."
2005405-64 = "3;히마리 결전;06;그렇다고는 해도 이곳에서는, 제가 지금까지 연구해 왔던 것들이 제대로 적용하지 않을 것 같지만요.\n#3;em;[속상함]"
2005405-65 = "[s] \"그건 어째서?\""
2005405-66 = "3;히마리 결전;08;'하늘의 법칙'이 완전히 다르기 때문이라고 말씀드려야 하겠네요."
2005405-67 = "3;히마리 결전;03;별의 위치도, 운행 방식도, 그것들이 얽혀 있는 공식도……."
2005405-68 = "3;히마리 결전;06;어떤 의미로는 그야말로, 새 하늘과 새 땅이라고도 할 수 있는 곳이어서요."
2005405-69 = "3;히마리 결전;03;물론 완전히 원점에서 새로운 점성술 이론을 구상하고 구축해 볼 수도 있을 것이고."
2005405-70 = "3;히마리 결전;02;백지에서부터 시작하는 이론 정립만큼 즐거운 것도 없을 것이겠습니다만……."
2005405-71 = "3;히마리 결전;08;아무래도 그럴 시간은 거의 주어지지 않을 것 같아, 아쉽기는 하네요.\n#3;em;[한숨]"
