[translation]
2005405-1 = "การเดินเครื่องที่ปลอดภัย"
2005405-2 = "[ns] \"ผ่านไปได้อีกวันแล้วสินะ...\""
2005405-5 = "อาหารเย็นเป็นยังไงบ้างคะ?"
2005405-6 = "[s] \"อืม... รสชาติมันก็ไม่ได้แย่นะ...\""
2005405-7 = "คะ? อ่า... ค่ะ... รสชาติไม่ได้แย่ แต่ก็ใช่ว่าจะรสชาติดี อย่างนี้สินะคะ..."
2005405-8 = "ก็แน่ละ ก็คุณครูกินแต่อาหารแช่แข็งสลับกันอยู่ไม่กี่อย่าง จะเบื่อก็ไม่แปลกหรอกค่ะ..."
2005405-9 = "ว่ากันว่าเสบียงอาหารสำหรับสู้รบน่ะ ต่อให้ทำออกมาดูดีหรือรสชาติดีแค่ไหน แต่ก็กินไม่อร่อยอยู่ดีค่ะ"
2005405-10 = "ถ้างั้นก็ คุณครูคะ ก่อนอื่นทานยาแก้เมารถนี้ก่อนนะคะ"
2005405-11 = "[s1] \"ขอบใจนะ ครูเหมือนจะเวียนหัวนิดหน่อยอยู่พอดี\"\n[s2] \"ไม่น่าเป็นอะไรนะ? ครูไม่ค่อยเมารถเมาเรือน่ะ\" "
2005405-12 = "ฮุฮุ ผู้ดูแลส่วนตัวอย่างฉันอุตส่าห์เตรียมของให้เสร็จสรรพขนาดนี้"
2005405-13 = "ถ้าจะตกหลุมรักฉันขึ้นมา ก็ไม่มีใครว่าอะไรหรอกนะคะ?"
2005405-14 = "แต่ยังไงก็ต้องเตรียมเผื่อไว้ก่อนค่ะ"
2005405-15 = "ถ้าเห็นว่าอาการของคุณครูแย่ลง... ฉันจะเศร้าโศกกว่าใครเลยนะคะ"
2005405-21 = "เอาละค่ะ คุณครู"
2005405-22 = "ฉันขอเริ่มการทดสอบประสิทธิภาพเลยได้มั้ยคะ?"
2005405-23 = "[ns] \"ได้สิ เอาให้เต็มที่เลย!\""
2005405-26 = "[ns] \"เหวออออ!\""
2005405-28 = "เป็นยังไงบ้างคะ คุณครู! เพิ่มความเร็วอีกหน่อยดีมั้ยคะ?"
2005405-29 = "[ns] \"มอเตอร์ไซค์ของฮิมารินี่เร็วสุดๆ ไปเลยนะ!\""
2005405-30 = "วีลแชร์ค่ะ!"
2005405-31 = "[ns] \"วีลแชร์ของฮิมาริ ซิ่งสะใจมากเลย~!!!\""
2005405-32 = "กอดเอวฉันไว้ให้แน่นนะคะ!"
2005405-33 = "ถ้าคุณครูตกลงไปจนบาดเจ็บขึ้นมา เดี๋ยวฉันจะงานเข้าค่ะ!"
2005405-34 = "[ns] \"เข้าใจแล้ว!!!\""
2005405-41 = "ฮู่ว ลมปะทะเย็นดีจัง! สดชื่นขึ้นมาเลยนะคะ!"
2005405-42 = "เป็นยังไงบ้างคะ วีลแชร์ของฉัน?"
2005405-43 = "มันเคลื่อนที่ขณะที่ลอยตัว ก็เลยไม่สั่นสะเทือนมากนัก ส่วนการเร่งความเร็วกะทันหัน และการเบรกฉับพลันก็ทำได้สมบูรณ์แบบเลยละค่ะ"
2005405-44 = "ฉันขับขี่... ไม่สิ ฉันเดินเครื่องอย่างปลอดภัยอยู่แล้ว ก็เลยไม่จำเป็นต้องใช้งานฟังก์ชันเหล่านั้น"
2005405-45 = "แต่ถ้าปลดข้อจำกัดทุกอย่างออก ฉันสามารถรีดความเร็ว 0-100 กม./ชม. ได้ภายในเวลาแค่ 0.956 วินาทีเองนะคะ"
2005405-46 = "[s] \"ครูว่าเราขับขี่... เดินเครื่องอย่างปลอดภัยดีกว่า!\""
2005405-47 = "ค่ะ แน่นอนอยู่แล้วค่ะ ยังไงฉันก็เคยทำมาแล้วครั้งสองครั้งค่ะ"
2005405-48 = "คะ? คิดว่าตอนกลางคืนฉันไม่ยอมเข้านอน แต่ออกมาทำอะไรแบบนี้งั้นเหรอคะ?"
2005405-49 = "..."
2005405-50 = "แต่จะให้ทำยังไงได้ล่ะคะ~ ก็อยู่ที่นี่ฉันไม่มีอะไรให้ทำเป็นพิเศษนี่คะ~"
2005405-51 = "เรียกว่าเป็นการลาดตระเวนที่ได้ทดสอบขีดจำกัดการทำงานของวีลแชร์ไปในตัวแล้วกันค่ะ"
2005405-52 = "คะ? การลาดตระเวนเป็นหน้าที่ของโทคิกับเอมิต่างหาก? แล้วถ้าจะทำ ก็ใช้โดรนแทนก็น่าจะได้?"
2005405-53 = "..."
2005405-54 = "บะ... บางครั้งหน่วยควบคุมก็ต้องการข้อมูลที่สดใหม่จากภาคสนามนะคะ!"
2005405-55 = "ช่องว่างระหว่างทีมภาคสนามกับทีมวิเคราะห์คือสาเหตุสำคัญอย่างหนึ่งที่ทำให้การตัดสินใจผิดพลาด#nได้เลยค่ะ!"
2005405-56 = "[s] \"อื้อ ตามนั้นก็ได้...\""
2005405-57 = "และที่นี่ในเวลานี้น่ะ..."
2005405-58 = "ยังมอบสิ่งที่หาดูจากที่ไหนไม่ได้ให้เราด้วยนะคะ"
2005405-59 = "ถึงฉันจะมั่นใจได้ว่านั่นไม่ได้มาจากเจตนาของ 'ท่าน' ที่ดูแลที่แห่งนี้อยู่ก็ตามทีค่ะ"
2005405-60 = "แต่คุณครูก็รู้ไม่ใช่เหรอคะ ว่าเรื่องราวในโลกนี้น่ะ..."
2005405-61 = "ไม่ได้ดำเนินไปด้วยเจตนาที่ชัดเจนและผลลัพธ์ที่แน่นอนเสมอไปหรอกค่ะ"
2005405-62 = "ก็เหมือนกับบางทีที่โหราศาสตร์ ศาสตร์แห่งตัวเลข หรือสัญลักษณ์ต่างๆ"
2005405-63 = "คอยบอกเล่าความลับที่เราไม่รู้เกี่ยวกับ 'โลก' อย่างเปิดเผย แต่ในขณะเดียวกันก็คงความลับนั้นเอาไว้#nอย่างมิดชิดด้วยค่ะ"
2005405-64 = "แต่ถึงอย่างนั้น ก็ดูเหมือนว่าสิ่งที่ฉันศึกษาค้นคว้ามาจนถึงตอนนี้จะเอามาประยุกต์ใช้อย่างเหมาะสม#nที่นี่ไม่ได้ค่ะ"
2005405-65 = "[s] \"ทำไมเหรอ?"
2005405-66 = "ฉันคงต้องตอบว่าเพราะ 'กลไกแห่งจักรวาล' มันแตกต่างกันอย่างสิ้นเชิงน่ะค่ะ"
2005405-67 = "ทั้งตำแหน่งของดวงดาว รูปแบบการเคลื่อนที่ และสูตรต่างๆ ที่เชื่อมโยงสิ่งเหล่านี้เข้าด้วยกัน..."
2005405-68 = "ในบางแง่แล้ว จะบอกว่าที่นี่เป็นดินแดนใหม่ที่มาพร้อมท้องฟ้าผืนใหม่ก็ได้ค่ะ"
2005405-69 = "แน่นอนว่าเราสามารถสร้างทฤษฎีโหราศาสตร์ขึ้นมาใหม่ตั้งแต่แรกได้เหมือนกัน"
2005405-70 = "และมันก็น่าจะสนุกมากๆ ที่ได้สร้างทฤษฎีขึ้นมาใหม่ตั้งแต่ต้น..."
2005405-71 = "แต่ก็น่าเสียดายนะคะที่ฉันไม่มีเวลามากพอสำหรับเรื่องแบบนั้น"
2005405-75 = "― [log=히마리 결전]น่าประหลาดใจนะคะ [/log][wa:140] "
2005405-77 = "― [log=히마리 결전]ตอนอยู่มิลเลเนียมก็เคยทำแบบนี้ พอมาอยู่ที่นี่ ก็แหงนหน้ามองท้องฟ้ายามค่ำคืนได้อีก[/log][wa:200] "
2005405-80 = "― [log=히마리 결전]ดาวที่ส่องแสงอยู่ที่นี่ ดูมีบางอย่างแตกต่างจากดาวที่เรารู้จักกันนะคะ[/log][wa:2070] "
2005405-82 = "― [log=히마리 결전]คงต้องบอกว่าเป็นความรู้สึกลึกลับ... ที่ยากจะถ่ายทอดเป็นคำพูดได้ค่ะ[/log][wa:1720] "
2005405-85 = "[ns] \"แต่สำหรับครู ฮิมาริดูลึกลับกว่าอีกนะ?\""
2005405-86 = "― [log=히마리 결전]คะ...?! [/log][wa:360] "
2005405-88 = "― [log=히마리 결전]ขะ... ขอบคุณค่ะ ฉะ... ฉันจะเข้าใจว่านี่เป็นการชมนะคะ[/log][wa:5630] "
2005405-91 = "― [log=히마리 결전]ต่อให้บอกว่าอยู่ภายใต้ท้องฟ้ายามค่ำคืนผืนเดียวกัน[/log][wa:10] "
2005405-93 = "― [log=히마리 결전]แต่ก็ใช่ว่าเราทั้งหมดจะเข้าใจทุกคนได้หรอกค่ะ[/log]"
2005405-96 = "― [log=히마리 결전]แต่อย่างน้อยก็เป็นเรื่องแน่แท้ว่าเราอยู่ใต้ท้องฟ้าเดียวกัน[/log][wa:1440] "
2005405-98 = "― [log=히마리 결전]อย่างน้อยนี่น่าจะเป็นโอกาสที่เราจะเข้าใจกันและกันได้นะคะ [/log][wa:1910] "
2005405-101 = "― [log=히마리 결전]ฉันคิดอย่างนั้นค่ะ [/log][wa:3130] "
2005405-103 = "― [log=히마리 결전]แล้วคุณครูล่ะ คิดยังไงบ้างคะ?[/log][wa:1450] "
2005405-109 = "เป็นยังไงบ้างคะ คุณครู? การใช้งาน... วีลแชร์ในวันนี้น่ะค่ะ"
2005405-110 = "[s3] \"ครูประทับใจไม่ลืมเลยละ ไว้มานั่งกันอีกนะ\"\n[s4] \"สนุกสุดเหวี่ยงเลยละ ไว้ครั้งหน้ามาทดสอบกันอีกนะ!\""
2005405-113 = "คะ? ค่ะ... ได้ค่ะ..."
2005405-114 = "คะ... คิดไม่ถึงเลยนะคะว่าคุณครูจะเป็นฝ่ายชวนก่อน..."
2005405-115 = "อะแฮ่ม"
2005405-116 = "เอาละค่ะ คุณครู"
2005405-117 = "เรารีบกลับเข้าไปเถอะค่ะ ก่อนที่คนอื่นจะเป็นห่วงกัน"
2005405-120 = "(ในขากลับ ฮิมาริก็ขับขี่... ก็เดินเครื่องวีลแชร์อย่างปลอดภัยเช่นกัน...)"
