[translation]
2005405-1 = "安全運行"
2005405-2 = "[ns] 「今天也總算平安度過了呢……」"
2005405-5 = "晚餐還滿意嗎？"
2005405-6 = "[s] 「這個嘛，雖然不能說不好吃……」"
2005405-7 = "咦？啊啊，原來如此……意思是雖然不難吃，卻也不怎麼好吃吧。"
2005405-8 = "一直輪流吃那幾種冷凍食品，總是會吃膩的……"
2005405-9 = "即便是製作精良的戰鬥口糧，吃久了還是會讓人產生好吃又不好吃的感覺。"
2005405-10 = "那麼老師。請先吃下這份暈車藥吧。"
2005405-11 = "[s1] 「謝謝。我確實有點容易暈車。」\n[s2] 「應該沒關係吧？我對暈車的抗性還挺強的。」"
2005405-12 = "呵呵。對於像我這樣凡事都準備周全的生活助理……"
2005405-13 = "要更加傾心於我也沒問題唷？"
2005405-14 = "就當作是以防萬一吧。"
2005405-15 = "尤其如果老師身體不適的話……我也會感到過意不去的。"
2005405-21 = "那麼，老師？"
2005405-22 = "性能體驗測試，可以開始了嗎？"
2005405-23 = "[ns] 「好。放馬過來吧！」"
2005405-26 = "[ns] 「哇啊啊啊！」"
2005405-28 = "怎麼樣呀，老師！還要繼續加速嗎？"
2005405-29 = "[ns] 「陽葵的機車好厲害！好快！」"
2005405-30 = "是輪椅！"
2005405-31 = "[ns] 「陽葵的輪椅好厲害～！！！」"
2005405-32 = "請您一定要抓緊！尤其是我的腰！"
2005405-33 = "萬一老師掉下去受傷的話，我也會很困擾的！"
2005405-34 = "[ns] 「知道了！！！」"
2005405-41 = "呼啊，真涼快！感覺心情舒暢多了！"
2005405-42 = "那麼，您覺得我的輪椅怎麼樣呢？"
2005405-43 = "懸浮狀態能避免頻繁的晃動，急加速和急煞車也能完美做到。"
2005405-44 = "當然我會安全駕駛……更正，是安全運行，所以沒什麼機會用到。"
2005405-45 = "在解除所有限制的狀態下，零百加速可以縮短到0.956秒唷？"
2005405-46 = "[s] 「一定要安全駕駛……不，安全運行哦！」"
2005405-47 = "那當然，而且我也已經嘗試過好幾次了。"
2005405-48 = "嗯？問我晚上不睡覺都在做這種事……？"
2005405-49 = "……"
2005405-50 = "這也沒辦法嘛～畢竟在這裡也沒什麼特別的事能做呀～"
2005405-51 = "就當作是輪椅運行的極限測試兼偵察吧？"
2005405-52 = "咦？您說偵察應該是季和英美負責，而且用無人機也能做到一定的程度才對？"
2005405-53 = "……"
2005405-54 = "有，有時候後勤也需要現場的第一手資訊呀！"
2005405-55 = "現場團隊與分析團隊之間的資訊落差，可是導致錯誤判斷的重大原因之一呢！"
2005405-56 = "[s] 「是是是……」"
2005405-57 = "此外，這個時間的這個地方……"
2005405-58 = "能向我們傳達在其他地方絕對看不見的東西。"
2005405-59 = "當然我可以肯定，這並非管理這裡的「那些人」有意為之。"
2005405-60 = "但是您應該也明白吧？世間萬物……"
2005405-61 = "未必都是由明確的意圖和結果所組成的。"
2005405-62 = "比如占星術、數秘術、象徵主義這類的事物……"
2005405-63 = "或許正以公開而隱密地的方式，將「世界」未知的真相傳達給我們也說不定。"
2005405-64 = "話雖如此，我至今為止研究的那些理論，在這裡似乎並不適用呢。"
2005405-65 = "[s] 「那是為什麼？」"
2005405-66 = "應該說是因為「天的法則」完全不同吧。"
2005405-67 = "星星的位置、運行的方式，乃至於將其相互交織的公式……"
2005405-68 = "從某種意義上來說，這裡確實足以被稱為「新天新地」。"
2005405-69 = "當然，也可以完全從零建立一套全新的占星術理論。"
2005405-70 = "畢竟沒有什麼是比從白紙開始建立理論更有趣的了……"
2005405-71 = "只可惜這裡似乎不會給予我們這樣的時間呢……現在想想實在令人遺憾。"
2005405-75 = "― [log=히마리 결전]真是不可思議呢。[/log][wa:500] "
2005405-77 = "― [log=히마리 결전]明明和千年一樣，在這裡也能仰望夜空。[/log][wa:2720] "
2005405-80 = "― [log=히마리 결전]閃耀的星星，卻和我們認識的有所不同。[/log][wa:4070] "
2005405-82 = "― [log=히마리 결전]是種很難用言語表達……難以形容的感覺。[/log][wa:3600] "
2005405-85 = "[ns] 「不過在我看來，陽葵比那些星星更神祕哦？」"
2005405-86 = "― [log=히마리 결전]咦……！？[/log][wa:480] "
2005405-88 = "― [log=히마리 결전]謝，謝謝您。那個……我就當作是在稱讚我了。[/log][wa:6870] "
2005405-91 = "― [log=히마리 결전]……即使身在同一片夜空之下。[/log][wa:1140] "
2005405-93 = "― [log=히마리 결전]也不代表彼此之間能夠互相理解。[/log]"
2005405-96 = "― [log=히마리 결전]不過至少，是在「同一片」夜空之下。[/log][wa:3080] "
2005405-98 = "― [log=히마리 결전]那或許能夠成為相互理解的契機也說不定。[/log][wa:3430] "
2005405-101 = "― [log=히마리 결전]我是這麼想的。[/log][wa:3610] "
2005405-103 = "― [log=히마리 결전]老師您，是怎麼想的呢？[/log][wa:2170] "
2005405-109 = "您的感想如何呢，老師？#n關於今天的……輪椅體驗。"
2005405-110 = "[s3] 「確實很令人印象深刻。」\n[s4] 「之後還想再體驗！」"
2005405-113 = "咦？好，好的……"
2005405-114 = "居，居然會被老師主動邀請……"
2005405-115 = "咳哼。"
2005405-116 = "那麼……老師？"
2005405-117 = "在其他人擔心之前，我們悠閒地回去吧。"
2005405-120 = "（回去的路上正如陽葵所說，是安全駕駛……不，是安全運行）"
