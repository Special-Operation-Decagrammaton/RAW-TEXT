[translation]
90000030-1 = "Episode 4;Research Part 3: PMC Excavation Site"
90000030-2 = "Millennium District Outskirts"
90000030-4 = "Welcome, Sensei. We've been waiting."
90000030-5 = "The new club room is finally ready."
90000030-6 = "[s] \"New club room?\""
90000030-7 = "We were exposed to Decagrammaton in our temporary room due to the lack of security.  "
90000030-8 = "It seemed like more trouble than it was worth to try to fix all of the destroyed equipment."
90000030-9 = "So, President Himari decided to find a new location."
90000030-10 = "According to the president, there is nowhere safer from Decagrammaton in Kivotos now."
90000030-11 = "She'll fill you in on the details. This way."
90000030-15 = "This is a top-secret facility, so please don't get lost.  "
90000030-16 = "[s] \"Lead the way.\""
90000030-23 = "I followed Eimi into a maze of back alleys, elevators, and hidden doors before we finally reached our destination."
90000030-28 = "Super Phenomenon Task Force Club Room"
90000030-30 = "[ns] \"Wait. Isn't this...?\""
90000030-31 = "I've brought Sensei with me.  "
90000030-37 = "President?"
90000030-38 = "Are you serious?"
90000030-49 = "[ns] \"Himari?\""
90000030-50 = "President... "
90000030-58 = "Ahhhhh?!"
90000030-62 = "Where am I? Who are you?! Oh, Eimi."
90000030-63 = "Sensei has arrived, President."
90000030-64 = "[s] \"Good morning.\""
90000030-65 = "Oh. Ahem.  "
90000030-66 = "Welcome, Sensei. You've finally made it.  "
90000030-67 = "I'd like to officially welcome you to the Super Phenomenon Task Force's club room.  "
90000030-68 = "This place is protected by a firewall system invented by yours truly. Naturally, there is nowhere safer in Kivotos than behind the barricade of my genius."
90000030-69 = "The three of us here are the only ones who know this place exists."
90000030-70 = "Heehee. Doesn't it feel like a secret organization? What? No, of course I wasn't sleeping before."
90000030-71 = "The drool on the side of your mouth suggests otherwise."
90000030-72 = "..."
90000030-73 = "It's not my fault you fell asleep. Maybe it's because of how abnormally high you set the thermostat."
90000030-74 = "The ideal indoor temperature is about fifty-five degrees. The cold helps stimulate your brain."
90000030-80 = "Are you insane? The temperature must be in at least the eighties for me to work comfortably."
90000030-85 = "Huh? Did I mishear you? Maybe you meant eight degrees.  "
90000030-90 = "Am I a popsicle stick? I don't want to work in a freezer."
90000030-95 = "[ns] \"Um... You two...\""
90000030-99 = "[ns3] \"On the left side, the AC is on full blast...\"\n[ns4] \"On the right side, the heater is on full blast...\""
90000030-100 = "It's because of the president! Aren't you worried about electricity?"
90000030-101 = "See, president? Aren't you worried about electricity?"
90000030-102 = "Your demands are unreasonable, Eimi. And the electric bill will go to Rio anyways."
90000030-103 = "You've shown all your cards. It's time for my last resort.  "
90000030-107 = "Huh? Last resort?"
90000030-108 = "...! No, absolutely not. Do not take even one step closer. Can't we resolve this in a civilized manner?"
90000030-109 = "[s] Change the thermostat."
90000030-115 = "[ns] \"This is what actual room temperature is.\""
90000030-116 = "...A bit warm, but survivable conditions."
90000030-117 = "I suppose a bit of a chill could help keep me awake."
90000030-118 = "[s] \"Good compromise, everyone.\""
90000030-121 = "President, what's our plan?"
90000030-122 = "Our original goal remains the same. To uncover the mystery of Decagrammaton."
90000030-123 = "However, as we all well know, Decagrammaton found us first."
90000030-124 = "I'm still recovering from the shame. To think this could happen to me, the most brilliant and beautiful hacker in Millennium."
90000030-125 = "(I don't think beauty has any role here.)"
90000030-126 = "They know of us, but we're still at square one. It's never ideal for your enemy to be better informed than you."
90000030-127 = "Knowledge is power. We won't be able to overcome Decagrammaton without it."
90000030-128 = "I have therefore come up with a new plan of attack. We will first find the prophets."
90000030-129 = "Prophets? Why the prophets?"
90000030-130 = "Even if Decagrammaton is some sort of organic technology, the concept of prophets stands out as odd. "
90000030-131 = "They're neither clones nor subordinates mindlessly following Decagrammaton, but rather fervent followers with free will.  "
90000030-132 = "And their names have been bothering me..."
90000030-134 = "We will collect and analyze the prophets' data, and in turn learn more about this mysterious AI."
90000030-135 = "There are three confirmed prophets as of now."
90000030-136 = "Binah, Chesed, and maybe...Hod."
90000030-137 = "Based on their names and Sensei's testimony, I believe them to be related to an ancient fable called the \"Tree of Life.\""
90000030-138 = "What is that?"
90000030-142 = "This is the Tree of Life. It's a long-lost secret, forgotten in nearly all of Kivotos."
90000030-143 = "Forgotten? Then how do you know about it, Himari?  "
90000030-144 = "I did say nearly, didn't I? Eimi, what is my nickname?"
90000030-145 = "Um... The Flower That Floats in the Septic Tank? "
90000030-146 = "How many times must I tell you? \"Septic Tank\" is reserved for Rio. How can you have so little common sense?"
90000030-147 = "That's supposed to be common sense?"
90000030-148 = "Anyways, I'm Millennium's Resident Genius, with a degree in omniscience. Of course I know Kivotos' secrets."
90000030-149 = "Hm..."
90000030-150 = "I've been meaning to ask, but.... Does a degree like that really exist?  "
90000030-151 = "I've heard some weird rumors, but I've been unable to confirm. I don't understand it. How can anyone know everything?"
90000030-152 = "Heehee. Eimi, one day you must learn how to wield the power of the people."
90000030-153 = "...That makes no sense."
90000030-154 = "[s] \"So, about the prophets...\""
90000030-155 = "Ah. Yes, of course.  "
90000030-156 = "Sorry, Sensei. I got carried away."
90000030-157 = "No, no. This one may have been my fault."
90000030-158 = "Anyways...  "
90000030-159 = "Looking back at the Tree of Life..."
90000030-163 = "Within it, there are ten attributes known as \"Sephiroth.\" The prophets of Decagrammaton have claimed the names of these Sephiroth."
90000030-164 = "Binah, Chesed, and Hod...  "
90000030-165 = "Wouldn't that mean there are seven more prophets? That's a lot more than we estimated.  "
90000030-166 = "The Tree of Life symbolizes \"the road to the providence of God.\" In other words, it's about becoming a god through the ten Sephiroth...which is consistent with Decagrammaton's claims."
90000030-167 = "I'm still gathering more data, but...if it's confirmed to exist we can't just ignore it."
90000030-168 = "The Tree of Life...Sephiroth...the road to the providence of God... To understand how these all connect, we need to secure data from the prophets."
90000030-169 = "How do you plan on that?"
90000030-173 = "The first step is to take them down."
90000030-176 = "We only know two of the ten prophets. Hod is still unconfirmed."
90000030-177 = "We'll start where we can. We may find answers along the way."
90000030-178 = "[s] \"Makes sense to me. Let's do this, team!\""
90000030-179 = "Affirmative.  "
90000030-180 = "If everyone is in agreement, the next mission of the Super Phenomenon Task Force is to find Binah and Chesed to secure their data."
90000030-184 = "The Super Phenomenon Task Force's Decagrammaton analysis mission begins anew."
90000030-188 = "Is our first target the Abydos Desert again, President?"
90000030-189 = "We lost all our data when we were hacked."
90000030-190 = "Yes, it is. But the data is of no concern, I've already restored most of it."
90000030-191 = "I'm more concerned with another issue."
90000030-192 = "What could be more important than our data?"
90000030-193 = "It's Kaiser PMC. "
90000030-194 = "We don't know what or why they were excavating in the Abydos Desert."
90000030-195 = "It's too much of a coincidence that it was precisely at Binah's last known sighting."
90000030-196 = "I wouldn't be surprised if Kaiser's mystery project was related to Decagrammaton. We should investigate."
90000030-197 = "You do have a point."
90000030-198 = "You plan to infiltrate Kaiser's DB? President, is that wise?"
90000030-199 = "Who do you think I am, Eimi?"
90000030-200 = "I'm Himari, the first president of Veritas and the most delicate yet beautiful girl in Millennium. I can go in and out of the DB of a private enterprise anytime I want."
90000030-201 = "...Always have to slip in the beauty comment."
90000030-202 = "Besides, they're bound to be less vigilant with PMC's data. It's not connected to Kaiser HQ.  "
90000030-203 = "There's nothing to lose by trying."
90000030-204 = "I'll take your word for it, President."
90000030-208 = "We have our mission. Our objective is to steal data from Kaiser PMC.  "
90000030-209 = "[s] \"All right. Let's do this.\""
