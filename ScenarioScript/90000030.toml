[translation]
90000030-1 = "ตอนที่ 3; รวบรวมข้อมูล 3 - เขตขุดค้น PMC"
90000030-2 = "นอกเขตปกครองตนเอง มิลเลเนียม"
90000030-4 = "สวัสดีคุณครู กำลังรออยู่เลย"
90000030-5 = "ในที่สุดห้องชมรมใหม่ก็พร้อมใช้งานแล้วละ"
90000030-6 = "[s] \"ห้องชมรมใหม่?\""
90000030-7 = "อืม ก็เพราะจุดยุทธศาสตร์อันก่อนถูกเดคาแกรมมาทอนเปิดโปงไปแล้วนี่นา "
90000030-8 = "ถูกระบุตำแหน่งแถมยังเกือบโดนแฮ็ก อุปกรณ์ของทางฝั่งนั้นก็ถูกทำลายไปหมดจนใช้งานไม่ได้แล้ว"
90000030-9 = "เพราะแบบนั้นหัวหน้าฮิมาริก็เลยตัดสินใจหาสถานที่ใหม่"
90000030-10 = "ตามที่หัวหน้าบอก ที่นั่นเป็นสถานที่ที่ปลอดภัยจากเดคาแกรมมาทอนมากที่สุดในคิโวทอส..."
90000030-11 = "นั่นแหละ รายละเอียดก็ไปฟังจากหัวหน้าเอาอีกทีนะ"
90000030-15 = "เขตแถวนี้คนทั่วไปไม่ค่อยรู้จัก จากนี้ไปก็เดินตามฉันมาให้ดีๆ ละ"
90000030-16 = "[s] \"เข้าใจแล้ว\""
90000030-23 = "(จากนั้นก็เดินตามเอมิเข้าไปในซอยเปลี่ยว แล้วก็ขึ้นลิฟต์อีกหลายครั้ง ผ่านประตูลับอีกนับไม่ถ้วน#nอย่างยากลำบาก สุดท้ายก็มาถึงยังที่แห่งหนึ่ง)"
90000030-28 = "ห้องชมรมปรากฏการณ์ลี้ลับ"
90000030-30 = "[ns] \"ที่นี่คือ...\""
90000030-31 = "หัวหน้า พาคุณครูมาแล้ว ...หัวหน้า? "
90000030-37 = "...หัวหน้า? รุ่นพี่ฮิมาริ?"
90000030-38 = "หรือว่า...?!"
90000030-49 = "[ns] \"ฮิมาริ...?!\""
90000030-50 = "หัวหน้า... "
90000030-58 = "อะเอ๋??!"
90000030-62 = "อะ... อะไรเหรอ? มีอะไรรึเปล่า?! มีอะไร... เอ๊ะ เอมิเหรอ?!"
90000030-63 = "พาคุณครูมาแล้วละ... หัวหน้า"
90000030-64 = "[s] \"...หวัดดี ฮิมาริ\""
90000030-65 = "อ่า... อืม... "
90000030-66 = "สวัสดีค่ะคุณครู กำลังรออยู่เลยค่ะ "
90000030-67 = "ในที่สุดก็ได้พาคุณครูมาที่นี่แล้วสินะคะ ที่นี่คือห้องของ <ชมรมปรากฏการณ์ลี้ลับ> ของพวกเราค่ะ "
90000030-68 = "ที่นี่ได้รับการป้องกันอย่างแน่นหนาด้วยไฟร์วอลล์แบบพิเศษที่ฉันคิดค้นขึ้น... หรือก็คือที่นี่ปลอดภัย#nจากเดคาแกรมมาทอนมากที่สุดในคิโวทอสค่ะ"
90000030-69 = "เป็นพื้นที่ลับสุดยอดที่ตอนนี้มีเพียงแค่ฉัน เอมิ และคุณครูเท่านั้นที่รู้ว่ามีอยู่ค่ะ"
90000030-70 = "ฮุฮุฮุ... เป็นยังไงบ้างคะ? เหมือนเป็นกองบัญชาการของลัทธิลับๆ เลยใช่มั้ยล่ะคะ? แล้วก็เมื่อกี้ฉันไม่ได้นอนหลับอยู่หรอกนะคะ"
90000030-71 = "หัวหน้า ตรงนี้มีคราบน้ำลายด้วยนะ"
90000030-72 = "..."
90000030-73 = "ทำหน้าไม่พอใจแบบนั้นฉันก็ไม่สนหรอกนะ... แล้วนี่อุณหภูมิในห้องมันสูงเกินไปจนชวนง่วงรึเปล่าน่ะ? "
90000030-74 = "อุณหภูมิในห้องควรจะอยู่ที่ 12 องศาถึงจะพอดีนะ ถ้ารู้สึกสบายขึ้นก็จะตื่นเองแหละ"
90000030-80 = "ไม่สิ พูดอะไรน่ะ? ตัวเลขมันแปลกๆ รึเปล่า? เพื่อให้อยู่ในสภาพที่เหมาะสมกับการทำงานมากที่สุด เลขตัวหน้าของอุณหภูมิในห้องจะต้องเป็นเลข 3 สิคะ"
90000030-85 = "3 องศาเหรอ? "
90000030-90 = "นั่นห้องชมรมหรือตู้เย็นกันคะ? หมายถึงเลขสองหลักสิคะ"
90000030-95 = "[ns] \"คือว่า...ทุกคน...\""
90000030-99 = "[ns3] \"ฝั่งหนึ่งแอร์กำลังทำงานหนักเลย...\"\n[ns4] \"อีกฝั่งฮีตเตอร์กำลังทำงานอย่างดุเดือดเลยนะ...\""
90000030-100 = "ยอมแพ้เถอะหัวหน้า ไม่เสียดายค่าไฟเหรอ?"
90000030-101 = "ยอมแพ้เถอะหัวหน้า ไม่เสียดายค่าไฟเหรอ?"
90000030-102 = "เอมินั่นแหละค่ะต้องเป็นฝ่ายยอมแพ้ ส่วนเรื่องค่าไฟน่ะยังไงก็ต้องไปทวงที่ริโอะอยู่แล้ว"
90000030-103 = "เตรียมรับมือไว้ถี่ถ้วนเลยสินะ ถ้างั้นก็เหลือทางออกเดียวแล้ว "
90000030-107 = "คะ? นั่นมัน?"
90000030-108 = "...ไม่นะคะ ทำไมถึงเป็นแบบนั้นไปได้ล่ะ? เราควรจะแก้ปัญหาด้วยการพูดคุยกันแบบผู้มีสติปัญญา#nไม่ดีกว่าเหรอคะ?"
90000030-109 = "[s] ปิดทั้งแอร์และฮีตเตอร์"
90000030-115 = "[ns] \"ปรับให้อุณหภูมิอยู่ระหว่างกลางแล้ว ทั้งสองคนอดทนก่อนนะ\""
90000030-116 = "...เข้าใจแล้ว ถึงจะร้อนก็จริง แต่ไม่ถึงกับทนไม่ได้ล่ะนะ"
90000030-117 = "...ฮึ่ม ช่วยไม่ได้นะคะ หนาวขนาดนี้ก็คงจะช่วยให้หายหัวร้อนได้บ้างละค่ะ"
90000030-118 = "[s] \"...ขอบคุณนะ ทั้งสองคน\""
90000030-121 = "หัวหน้า ถ้าอย่างงั้นแผนการต่อไปของเราคืออะไรล่ะ?"
90000030-122 = "เป้าหมายของเราก็คือการเปิดเผยธาตุแท้ของเจ้าเดคาแกรมมาทอน"
90000030-123 = "และเพื่อการนั้นเราเลยพยายามรวบรวมข้อมูล... แต่ว่าตัวตนของพวกเรากลับถูกเปิดเผยต่อเดคาแกรม#nมาทอน"
90000030-124 = "ไม่ว่าจะประมาทขนาดไหน แต่ถึงกับต้องเจอเรื่องเสียศักดิ์ศรีแบบนี้ รู้สึกเสียเกียรติในฐานะแฮ็กเกอร์#nที่แข็งแกร่งที่สุดและสาวน้อยน่ารักแห่งมิลเลเนียมเลยค่ะ"
90000030-125 = "(เรื่องนี้มันเกี่ยวกับสาวน้อยน่ารักตรงไหนล่ะเนี่ย?)"
90000030-126 = "ถึงแม้ว่าฝั่งนั้นจะรับรู้ถึงตัวตนของเราแล้ว แต่เราไม่รู้อะไรเกี่ยวกับฝั่งนั้นเลย... ตอนนี้ฝั่งเรากำลัง#nเสียเปรียบค่ะ"
90000030-127 = "ถ้าหากเราไม่พลิกสถานการณ์ ฝั่งนั้นก็จะเป็นฝ่ายได้เปรียบในการต่อสู้นี้ต่อไปค่ะ"
90000030-128 = "เพราะแบบนั้นเราจึงต้องเปลี่ยนเป้าหมายใหม่ ต่อจากนี้การตามหา <ผู้เลื่อมใส> ของเดคาแกรมมาทอน จะเป็นเป้าหมายที่สำคัญที่สุดค่ะ"
90000030-129 = "ผู้เลื่อมใสอย่างนั้นเหรอ... เข้าใจแล้ว วิธีนั้นคงจะเป็นทางลัดสินะ"
90000030-130 = "ใช่ค่ะ ถ้านิยามว่าเดคาแกรมมาทอนเป็นสิ่งมีชีวิตเชิงสารสนเทศละก็ แนวคิดเรื่องผู้เลื่อมใสมันก็ดู#nน่าประหลาดใช่ไหมล่ะคะ"
90000030-131 = "ไม่ใช่ <ร่างโคลน> ของตัวเอง แล้วก็ไม่ใช่ <ลูกน้อง> ที่อยู่ใต้บังคับบัญชา แต่เป็น <สาวก> ที่สามารถ#nตัดสินใจและลงมือทำด้วยตัวเองได้... และยังเลือกใช้คำว่า <ผู้เลื่อมใส> "
90000030-132 = "...ก็นะ ถึงจะยังไม่รู้เหตุผลที่เรียกแบบนั้นก็เถอะ"
90000030-134 = "แต่ถ้ารวบรวมข้อมูลของผู้เลื่อมใสแล้วนำมาวิเคราะห์ พวกเราก็อาจจะได้รู้เกี่ยวกับ AI ปริศนาตัวนี้มาก#nขึ้นก็ได้"
90000030-135 = "ผู้เลื่อมใสที่ตรวจสอบได้ตอนนี้มีทั้งหมดสามคน"
90000030-136 = "<บีนาห์> <เชเซ็ด> และก็น่าจะ... <HOD>"
90000030-137 = "ถ้าให้ลองเดาจากชื่อเหล่านี้ และข้อมูลที่คุณครูบอกมา พวกนี้ทั้งหมดน่าจะเรียกว่า <ต้นไม้แห่งชีวิต> ซึ่งมีความเกี่ยวข้องกับความลับในสมัยโบราณค่ะ"
90000030-138 = "ต้นไม้แห่งชีวิตเหรอ...?"
90000030-142 = "นี่ก็คือ <ต้นไม้แห่งชีวิต> ที่ถูกลืมเลือนและแทบจะไม่มีใครในคิโวทอสรู้จักอีกแล้วค่ะ"
90000030-143 = "ไม่มีใครรู้จัก...? ถ้าอย่างนั้นรุ่นพี่ฮิมาริรู้จักได้ยังไงล่ะ? "
90000030-144 = "โอ๊ะ? ก็แค่แทบไม่มีใครรู้จักแล้วน่ะ ไม่ใช่ไม่มีใครรู้จักแล้ว เอมิ? รู้มั้ยคะว่าฉายาของฉันคืออะไร?"
90000030-145 = "อืม... ดอกไม้ที่ไหลไปมาอยู่ในบ่อบำบัดน้ำเสีย? "
90000030-146 = "ไม่ใช่ค่ะ ถูกแค่ครึ่งหนึ่ง ส่วนหลังนั่นมันฉายาของริโอะนี่ค่ะ เอามาผสมกันมั่วๆ แบบนี้ไม่ได้นะคะเอมิ นี่เป็นความรู้พื้นฐานในคิโวทอสเลยนะ เป็นหน้าที่ของนักเรียนที่ต้องรู้นะคะ"
90000030-147 = "...ความรู้พื้นฐานเหรอ"
90000030-148 = "อัจฉริยะ หรือที่เรียกว่าเจ้าของใบปริญญา 'รอบรู้' ผู้ที่รู้เกี่ยวกับทุกสิ่ง ข้อมูลแค่นี้สำหรับฉันมันหาง่าย#nเหมือนปอกกล้วยเข้าปากค่ะ"
90000030-149 = "อืม..."
90000030-150 = "แต่ว่านะ ฉันสงสัยมานานแล้ว ที่มิลเลเนียมมีปริญญาสาขานั้นจริงๆ เหรอ? "
90000030-151 = "เคยได้ยินข่าวลือมาบ้างก็จริง แต่ไม่เคยได้ยินว่ามีปริญญาสาขานั้นด้วย ผู้ที่รู้เกี่ยวกับทุกสิ่งนี่มัน... เป็นชื่อที่ยิ่งใหญ่ไปหน่อยรึเปล่า"
90000030-152 = "ฮุฮุฮุ... การจะสร้างภาพลักษณ์ในโลกแบบนี้ ในบางสถานการณ์ประชานิยมก็เป็นเรื่องที่จำเป็นนะคะ เอมิ"
90000030-153 = "..."
90000030-154 = "[s] \"คือ... ทุกคน เรากลับเข้าเรื่องกันดีมั้ย\""
90000030-155 = "อ่า... ได้ค่ะ "
90000030-156 = "ขอโทษทีนะ คุณครู ถูกหัวหน้าพาออกนอกเรื่องอีกแล้ว"
90000030-157 = "ไม่ใช่นะคะ ที่ถูกพาออกนอกเรื่องน่ะคือฉันต่างหาก"
90000030-158 = "เอาเถอะ... "
90000030-159 = "กลับเข้าเรื่องเลยแล้วกันนะคะ เอาละ ถ้าดูตรงนี้..."
90000030-163 = "ที่ <ต้นไม้แห่งชีวิต> มีสิ่งที่เรียกว่า <เซฟีรอธ> สถิตอยู่ทั้งหมด 10 อย่าง และผู้เลื่อมใสของเดคาแกรมมาทอนก็ใช้ชื่อตามเซฟีรอธเหล่านี้"
90000030-164 = "<บีนาห์> <เชเซ็ด> <HOD> ทั้งหมดเป็นชื่อของเซฟิร่า "
90000030-165 = "แสดงว่ายังมีผู้เลื่อมใสที่เรายังหาไม่เจออีก 7 คนอย่างงั้นเหรอ? ยังมีอีกเยอะขนาดนั้นเลย... "
90000030-166 = "ต้นไม้แห่งชีวิตคือสัญลักษณ์แทน <เส้นทางไปสู่พระเจ้า> หรือก็คือจะเป็นพระเจ้าได้โดยใช้เซฟีรอธทั้ง 10 สอดคล้องกับภารกิจของเดคาแกรมมาทอน"
90000030-167 = "ถึงจะเป็นแนวคิดเชิงไสยศาสตร์ที่ไม่เข้าใจเลยสักนิด... แต่เราก็ปล่อยข้อมูลพวกนี้ไปเฉยๆ ไม่ได้ นอกจากว่าจะไปดูให้เห็นด้วยตาของตัวเองก่อน"
90000030-168 = "ต้นไม้แห่งชีวิต... เซฟีรอธ... เส้นทางไปสู่พระเจ้า... ถ้าจะหาความหมายของสิ่งเหล่านี้... เราก็จำเป็นต้องหาข้อมูลที่แน่ชัดเกี่ยวกับผู้เลื่อมใสทั้ง 10 ค่ะ"
90000030-169 = "หาข้อมูลที่แน่ชัด...? แล้วมันต้องทำยังไงล่ะ?"
90000030-173 = "ก็ต้องเผชิญหน้ากับพวกเขาด้วยตัวเองไงคะ"
90000030-176 = "อืม... อย่างนั้นสินะ แต่ว่าผู้เลื่อมใสที่เรารู้จักมีแค่สองคน และที่เกี่ยวกับ HOD ก็ยังเป็นแค่การคาดเดา#nเท่านั้น"
90000030-177 = "นั่นสินะคะ แต่ว่า... เราต้องทำเท่าที่เราทำได้ไปก่อน ระหว่างนั้นอาจจะเจอหนทางใหม่ก็ได้"
90000030-178 = "[s] \"เข้าใจแล้วละ ถ้างั้นก็มาเริ่มกันเลยเถอะ\""
90000030-179 = "อืม ฉันเองก็ไม่คัดค้านอะไร "
90000030-180 = "ค่ะ ถ้างั้นภารกิจต่อไปของชมรมปรากฏการณ์ลี้ลับก็คือการค้นหาข้อมูลเกี่ยวกับ <บีนาห์> และ <เชเซ็ต> สินะคะ..."
90000030-184 = "ปฏิบัติการวิเคราะห์เดคาแกรมมาทอนของ <ชมรมปรากฏการณ์ลี้ลับ> เริ่มต้นอีกครั้งแล้วละค่ะ"
90000030-188 = "งั้นเป้าหมายต่อไปก็คือทะเลทรายอะบิดอสเหรอ? หัวหน้า?"
90000030-189 = "ข้อมูลที่รวบรวมได้จากทะเลทราย... สูญหายไปหมดแล้วตอนที่พยายามจะป้องกันการถูกแฮ็กด้วยการ#nทำลายเครื่องคอมพิวเตอร์นี่นา"
90000030-190 = "ก็ใช่ แต่ว่าแค่นั้นสามารถกู้คืนได้อยู่แล้วค่ะ"
90000030-191 = "มันมีเรื่อง... ที่ต้องกังวลมากกว่านั้นอยู่น่ะค่ะ"
90000030-192 = "อะไรเหรอ?"
90000030-193 = "ก็คือ PMC ไคเซอร์ค่ะ "
90000030-194 = "พวกนั้นจะต้องกำลังขุดค้นอะไรบางอย่างอยู่ที่ทะเลทรายอะบิดอสแน่นอน แม้ว่าเราจะไม่รู้ตัวตน หรือเป้าหมายของพวกนั้นเลยก็ตาม..."
90000030-195 = "แต่การที่ทำแบบนั้นตรงสถานที่ที่บีนาห์เคยปรากฏตัวขึ้นก็น่าสงสัยมากพอแล้วค่ะ"
90000030-196 = "บางทีพวกนั้นอาจเกี่ยวข้องกับเดคาแกรมมาทอนก็ได้ อย่างน้อยพวกเราก็ควรไปตรวจสอบสักครั้งค่ะ"
90000030-197 = "ฮึ่ม นั่นสินะ อาจจะเป็นแบบนั้นก็ได้"
90000030-198 = "หมายความว่าจะแทรกแซงเข้าไปใน DB ของธุรกิจไคเซอร์ใช่มั้ย? หัวหน้า ทำแบบนั้นได้เหรอ?"
90000030-199 = "เอมิคิดว่าฉันเป็นใครกันคะ?"
90000030-200 = "ฉันคือฮิมาริ อดีตหัวหน้าชมรม <เวอริทัส> สาวน้อยแสนน่ารักที่ขี้โรคที่สุดแห่งมิลเลเนียม แค่ธุรกิจเล็กๆ อย่าง DB ฉันสามารถแทรกแซงเข้าไปได้ง่ายเหมือนเดินเข้าบ้านเลยค่ะ"
90000030-201 = "...แล้วมันเกี่ยวกับสาวน้อยน่ารักขี้โรคตรงไหนล่ะเนี่ย?"
90000030-202 = "และเป้าหมายของเราก็คือบันทึกของ PMC ไม่ใช่สำนักงานใหญ่ของไคเซอร์ การป้องกันจะต้อง#nหละหลวมกว่าแน่ๆ... "
90000030-203 = "ถึงจะไม่สำเร็จก็ไม่เสียหายอะไร มันคุ้มค่าที่จะลองดูนะคะ"
90000030-204 = "อืม... ถ้าหัวหน้าคิดแบบนั้นละก็"
90000030-208 = "ถ้างั้นก็ลงมือปฏิบัติการกันเลย เป้าหมายคือการโจรกรรมข้อมูลจาก PMC ไคเซอร์ "
90000030-209 = "[s] \"เอาละ งั้นก็ลุยกันเลย\""
