90002220-58 = "3;케이 교복 무소속;02;당신도 우리도, 여기까지 올 필요가 없었단 말입니다."
90002220-59 = "3;케이 교복 무소속;01;……자신을 굳이 정의하고 증명하려 하지 않아도, 우리는 충분히 지금을 살아갈 수 있을 테니까요."
