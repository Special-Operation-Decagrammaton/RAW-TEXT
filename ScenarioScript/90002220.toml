90002220-201 = "คิดว่าต่อไปจะทำอะไร ต่อไปจะทำสิ่งนี้แบบนี้ และจะทำสิ่งนั้นแบบนั้น"
90002220-206 = "ฟังให้ดีนะ"
90002220-207 = "ถ้ามีชีวิตผ่านวันนี้ไปไม่ได้ วันพรุ่งนี้ก็ไม่มาถึงให้หรอก"
