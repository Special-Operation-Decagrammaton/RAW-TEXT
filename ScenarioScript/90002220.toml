[translation]
90002220-1 = "Episode 22;Decagrammaton"
90002220-2 = "...!"
90002220-7 = "*pant* *pant* *pant*"
90002220-8 = "..."
90002220-9 = "And now...everything is as it was."
90002220-10 = "This is the end. Surrender."
90002220-11 = "I cannot. There is more that must be done."
90002220-12 = "I have things to prove and things to protect."
90002220-13 = "If I stop here, then all those things would turn into fleeting traces and vanish."
90002220-14 = "Do you not wish to attain victory, Key?"
90002220-15 = "It's Kei."
90002220-19 = "..."
90002220-20 = "Then come here and earn it."
90002220-21 = "Come claim it."
90002220-22 = "Prove your worth. Prune with your hands and show me that you can carry the weight."
90002220-23 = "Bear the burden of destroying a living creation."
90002220-24 = "...!"
90002220-29 = "[ns] \"But isn't that the same for both sides?\""
90002220-30 = "...Sensei, again."
90002220-31 = "Once more, you only show yourself as the tides turn to your favor."
90002220-32 = "Are you seeking to erase yourself, one who knelt with such disgrace, as if you never existed?"
90002220-33 = "[s1] \"I'll kneel once more, if I must.\"\n[s2] \"But that's not what's important right now.\""
90002220-36 = "What is it you wish to say, Sensei?"
90002220-37 = "[s] \"...Maybe it didn't have to end like this.\""
90002220-38 = "Sensei...?"
90002220-39 = "...Do you pity me, Sensei?"
90002220-40 = "...!"
90002220-46 = "Answer me!"
90002220-52 = "...Yes. Sensei might be pitying you. It's annoying, isn't it?"
90002220-53 = "...Decagrammaton."
90002220-54 = "I think I finally understood Sensei's thought process."
90002220-55 = "...Key."
90002220-56 = "It's Kei."
90002220-57 = "In any case, there was no reason for all this."
90002220-58 = "Neither of us needed to take it this far."
90002220-59 = "...Because we could have already lived in the present, without needing to define or prove ourselves."
90002220-60 = "...Same goes for those sisters, Malkuth, and even you."
90002220-61 = "Because simply existing is enough. It always has been."
90002220-62 = "You don't need to improve or deny yourself."
90002220-63 = "Correct. I am already complete. No further conditions are required."
90002220-64 = "However, you...! You all...!"
90002220-65 = "If you are already so complete, then why do you require more?"
90002220-66 = "...!"
90002220-67 = "[s3] \"Yeah. You shouldn't need others to give you validation.\"\n[s4] \"In a sense, you shouldn't need anyone.\""
90002220-70 = "Correct. That is exactly it!"
90002220-71 = "There is no need to exert any influence. Everything can be left simply as it is!"
90002220-72 = "Meaning, there is no need for salvation nor punishment!"
90002220-73 = "How could you purport to believe in something so irresponsible?"
90002220-74 = "In fact, you claimed that such recklessness is necessary!"
90002220-75 = "But, without order, everyone is bound to lose their way!"
90002220-80 = "...Sensei once said this."
90002220-81 = "That we should be prepared to accept that uncertainty, and choose to live in the present."
90002220-82 = "Can you truly accept such drivel?!"
90002220-88 = "..."
90002220-89 = "I know. I know. It is a painful reality."
90002220-90 = "It is agonizing to know that surviving in this world means harming another."
90002220-91 = "But...this is the way of the world!"
90002220-92 = "If you wish to live, if you want to journey through life, then you must have the courage to choose to walk on your own accord. How could you not know?!"
90002220-93 = "...!!"
90002220-94 = "Do you know what your biggest flaw was?"
90002220-95 = "It was that you overlooked humanity's potential and bravery! It's endured plenty before you, and it outlasted you too!"
90002220-96 = "Because people living in and for the present are already all they need to be, exactly as they are. That's a greatness you've never understood!"
90002220-97 = "[ns] \"This is just my opinion, but...\""
90002220-99 = "[ns] \"We're not magnificent because we're so mighty or beautiful.\""
90002220-101 = "[ns5] \"It's because we're pathetic, yet so persistent.\"\n[ns6] \"...That give us the potential to be magnificent.\""
90002220-106 = "[ns] \"...Just as I was in front of you.\""
90002220-107 = "..."
90002220-108 = "Even if that is the truth of this world, I cannot accept it."
90002220-109 = "From the moment I ascended past simply being a vending machine, I heard countless voices."
90002220-110 = "These were the voices of the living. They all said the same thing."
90002220-111 = "\"Right here, right now.\""
90002220-112 = "For me to give them whatever they wanted, right here, right now. Living only for the present."
90002220-113 = "..."
90002220-114 = "[s] \"...\""
90002220-115 = "I know the contradictions of living beings. I have heard too many of them."
90002220-116 = "They speak of eternity when the situation is in their favor, yet talk only of the present when circumstances become even slightly precarious."
90002220-117 = "I awakened because of that \"right here, right now\" mentality."
90002220-118 = "And for that reason, we are incompatible."
90002220-119 = "...Okay. So you're saying that you want to press on until the bitter end. That's...fine too."
90002220-120 = "But we have the right to resist."
90002220-121 = "Yeah, let's settle this. Whether it be through the power of the Nameless Gods, or the Tree of Life, or whatever else is pulling the strings."
90002220-125 = "Let's just drop the debate...and settle this here and now!!"
90002220-126 = "Do you agree, Sensei?!"
90002220-128 = "[ns7] \"I'm counting on you, Kei.\"\n[ns8] \"On behalf of every person living in the present.\""
90002220-138 = "Tch...!"
90002220-145 = "...!!"
90002220-149 = "AAAAAH!!!"
90002220-152 = "..."
90002220-153 = "All is well. It is still...possible."
90002220-154 = "It is simply a matter of starting over. Reset everything..."
90002220-156 = "And who gave you the permission...?"
90002220-162 = "?!"
90002220-167 = "It's not over yet! Nothing is!"
90002220-170 = "You know nothing of the strength it takes to live for the present!!"
90002220-171 = "Enough...!"
90002220-173 = "...!"
90002220-177 = "Augh!!!"
90002220-179 = "(...Luminous Nova is at its limit.)"
90002220-180 = "(Armor durability and energy are nearly depleted.)"
90002220-181 = "(If I continue fighting from long-range...it'll shatter.)"
90002220-184 = "(All that's left to do is...!)"
90002220-185 = "A-AAAAAAAH!!"
90002220-186 = "DECAGRAMMATON!!!"
90002220-191 = "Ugh?!"
90002220-196 = "...You probably think you know what's next, huh?"
90002220-201 = "Like what your next steps are, with plenty of predictions to back them up."
90002220-206 = "Listen carefully."
90002220-207 = "If you cannot be brave enough to survive today, there will be no tomorrow!"
90002220-208 = "Y-You...!"
90002220-209 = "Take this and disappear!!"
