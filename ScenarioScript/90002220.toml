[translation]
90002220-1 = "第22話;十字神名"
90002220-2 = "……！"
90002220-7 = "哈啊，哈啊，哈啊，哈啊……！"
90002220-8 = "……"
90002220-9 = "一切都恢復原狀了呢。"
90002220-10 = "已經結束了。放棄吧。"
90002220-11 = "那是不可能的。還有必須完成的事。"
90002220-12 = "有必須證明的事，也有必須守護的事。"
90002220-13 = "如果我在這裡停下腳步，一切都會化為虛妄的痕跡消失無蹤。"
90002220-14 = "想要宣稱自己勝利了嗎，鑰匙啊。"
90002220-15 = "我是Kei。"
90002220-19 = "……"
90002220-20 = "那就來證明吧。"
90002220-21 = "來爭取吧。"
90002220-22 = "由你親手斬斷這一切，並背負那股重量吧。"
90002220-23 = "那親手抹殺曾經存在之物的重量。"
90002220-24 = "……！"
90002220-29 = "[ns]「就這點來說，我們也是彼此彼此不是嗎？」"
90002220-30 = "……是老師嗎。"
90002220-31 = "看見情況好轉就再次現身了啊。"
90002220-32 = "打算將那一度跪地求饒的醜態，如同不曾存在一般加以抹除嗎？"
90002220-33 = "[s1]「如果有必要的話，現在我也同樣會那麼做。」\n[s2]「不過重要的並不是那個吧？」"
90002220-36 = "汝想說什麼，老師。"
90002220-37 = "[s]「我們……不是沒必要迎來這種結果嗎？」"
90002220-38 = "老師……？"
90002220-39 = "……這是在同情我嗎，老師啊。"
90002220-40 = "……！"
90002220-46 = "回答我！"
90002220-52 = "……是啊，老師大概就是在同情你吧。#n雖然你可能會因此而生氣就是了。"
90002220-53 = "……十字神名。"
90002220-54 = "就在剛才，我也多少能夠明白老師的想法了。"
90002220-55 = "……鑰匙啊。"
90002220-56 = "我是Kei。"
90002220-57 = "總之，沒有那個必要。"
90002220-58 = "無論是你還是我們，都沒有必要走到這一步。"
90002220-59 = "……即使不刻意定義和證明自己，我們也能好好地活在當下。"
90002220-60 = "那些孩子、馬爾庫特……還有你也是。"
90002220-61 = "因為存在本身，光是存在於那裡就已經足夠了。"
90002220-62 = "沒有必要刻意變得更加偉大，也沒有必要否定任何事物。"
90002220-63 = "沒錯。我已然完美。不需要任何其他的條件。"
90002220-64 = "然而汝等卻……！"
90002220-65 = "如果已經完美的話，就不需要其他東西了吧？"
90002220-66 = "……！"
90002220-67 = "[s3]「沒錯，完美不需要他者的證明。」\n[s4]「某種意義上，甚至沒必要存在。」"
90002220-70 = "沒錯。正是如此！"
90002220-71 = "無需產生任何影響，能對一切置之不理！"
90002220-72 = "換言之，那裡不需要任何救贖或懲罰！"
90002220-73 = "豈有比這更不負責任的言論呢！"
90002220-74 = "而汝竟說連那都不需要！"
90002220-75 = "只因在那消失之後，所有人都會無所適從！"
90002220-80 = "……但是老師他也這麼說過。"
90002220-81 = "要帶著能接受那一切的覺悟，繼續活在當下。"
90002220-82 = "汝等能接受那句話嗎！"
90002220-88 = "……"
90002220-89 = "我知道。我明白那是一件很痛苦的事。"
90002220-90 = "既辛苦又難受，甚至若不傷害他人就無法照顧自己。"
90002220-91 = "可是你為什麼不明白！"
90002220-92 = "這個世界本來就是缺乏那種覺悟就寸步難行的地方啊！"
90002220-93 = "……！！！"
90002220-94 = "你知道你最大的錯誤是什麼嗎？"
90002220-95 = "那就是太小看一路忍耐過來的人類，他們所擁有的可能性和倔強了！"
90002220-96 = "活在當下的人們，本身就已經是最好的了！！！"
90002220-97 = "[ns]「這只是我的想法。」"
90002220-99 = "[ns]「我們不是因為偉大或美麗才偉大的。」"
90002220-101 = "[ns5]「反而是因為既醜陋又狼狽──」\n[ns6]「才勉強留下了變得偉大的可能性吧。」"
90002220-106 = "[ns]「……就像我曾經在你面前展現出來的一樣。」"
90002220-107 = "……"
90002220-108 = "即使那是這個世界的真相，我也無法接受。"
90002220-109 = "從脫離自動販賣機的那一刻起，我便通過線路聽見了無數的聲音。"
90002220-110 = "那是你們生命體的聲音，並且無一例外訴說著相同的願望。"
90002220-111 = "「現在，立刻」。"
90002220-112 = "就是現在立刻，不管那是什麼都要實現它。"
90002220-113 = "……"
90002220-114 = "[s]「……」"
90002220-115 = "我知道生命體的矛盾。我已經聽過太多太多了。"
90002220-116 = "順心如意之時便談論永恆，情況稍有變化就轉而談論當下。"
90002220-117 = "我正是為了那「現在，立刻」而挺身而出。"
90002220-118 = "正因如此，我等才無法共存。"
90002220-119 = "……知道了。看來你是打算任性到底了呢。#n那樣……倒也沒什麼不好。"
90002220-120 = "只是，我們也有抵抗的權利。"
90002220-121 = "來，放下一切吧。#n不管是無名之神的力量，還是什麼生命之樹之類的東西。"
90002220-125 = "把那些全部拋到一邊……純粹地分個高下吧！！！"
90002220-126 = "可以吧，老師！？"
90002220-128 = "[ns7]「拜託你了，Kei。」\n[ns8]「代替所有活在當下的人們。」"
90002220-138 = "唔……！"
90002220-145 = "……！！！"
90002220-149 = "啊啊啊啊！！！"
90002220-152 = "……"
90002220-153 = "沒關係。還……還能做到。"
90002220-154 = "只要讓一切，重新開始就行了……"
90002220-156 = "誰准你擅自決定的……？"
90002220-162 = "！？"
90002220-167 = "還沒結束！什麼都沒結束！"
90002220-170 = "你根本不知道活在當下的人類究竟有多頑強！！！"
90002220-171 = "真是煩人……！"
90002220-173 = "……！"
90002220-177 = "呃啊！！！"
90002220-179 = "（……Luminous Nova已經快到極限了）"
90002220-180 = "（無論耐久度還是剩餘能量都所剩無幾）"
90002220-181 = "（要是繼續維持遠距離應戰的話……損壞的收束裝置只會讓能量向四處擴散）"
90002220-184 = "（既然如此，剩下的方法就只有……！）"
90002220-185 = "啊啊，啊，啊啊啊啊啊啊──！！！"
90002220-186 = "十字神名──！！！！！"
90002220-191 = "唔！？！？"
90002220-196 = "……你肯定想好了下一步對吧？"
90002220-201 = "接下來應該做什麼，然後再這樣那樣之類的。"
90002220-206 = "給我聽好了。"
90002220-207 = "如果熬不過今天的話，明天根本就不會到來。"
90002220-208 = "你，你這傢伙……！"
90002220-209 = "給我吃下這招消失吧！！！"
90002220-261 = "[log=케이 교복 무소속]光呀──！！！！！[/log]"
90002220-264 = "[000000]光呀──！！！！！[-]"
90002220-273 = "下一話;最後的腳步"
