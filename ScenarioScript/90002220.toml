[translation]
90002220-1 = "ตอนที่ 22;เดคาแกรมมาทอน"
90002220-2 = "...!"
90002220-7 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก...!"
90002220-8 = "..."
90002220-9 = "ทุกอย่างกลับมาเป็นเหมือนเดิมแล้วสินะคะ"
90002220-10 = "ถึงตอนจบแล้วละค่ะ ยอมแพ้ไปเสียเถอะ"
90002220-11 = "ไม่ได้ ข้าเองก็มีสิ่งที่ต้องบรรลุเหมือนกัน"
90002220-12 = "มีสิ่งที่ต้องพิสูจน์ และมีสิ่งที่ต้องปกป้อง"
90002220-13 = "ถ้าข้าหยุดตรงนี้ ทุกอย่างก็จะหายไป เหลือไว้เพียงร่องรอยที่ไร้ประโยชน์"
90002220-14 = "อยากยืนกรานว่าตัวเองชนะแล้วงั้นหรือ กุญแจเอ๋ย"
90002220-15 = "ฉันชื่อเคย์ค่ะ"
90002220-19 = "..."
90002220-20 = "เช่นนั้นก็จงมาพิสูจน์ให้เห็น"
90002220-21 = "พยายามเอาชนะให้ได้สิ"
90002220-22 = "สะบั้นทุกอย่างด้วยมือของเจ้า แล้วแบกรับความหนักอึ้งนั้นไว้ด้วยตัวของเจ้าเอง"
90002220-23 = "ความหนักอึ้งจากการทำลายสิ่งที่เคยดำรงอยู่ด้วยน้ำมือของตัวเองยังไงเล่า"
90002220-24 = "...!"
90002220-29 = "[ns] \"แต่ว่าเรื่องนั้นมันก็เหมือนกันทั้งสองฝ่ายเลยไม่ใช่เหรอ?\""
90002220-30 = "ครูงั้นหรือ...?"
90002220-31 = "พอเป็นสถานการณ์ที่ตัวเองได้เปรียบ ก็เลยก้าวออกมาอีกครั้งสินะ"
90002220-32 = "เจ้าเคยนั่งคุกเข่าและแสดงท่าทางน่าเกลียดไว้ขนาดนั้น แต่ตอนนี้เจ้าพยายามจะลบล้างมันออกไป#nราวกับไม่เคยทำแบบนั้นตั้งแต่แรกงั้นหรือ?"
90002220-33 = "[s1] \"ถ้าต้องทำ ฉันก็จะทำ แต่นั่นไม่ใช่สิ่งสำคัญหรอก\"\n[s2] \"ถ้าต้องทำ ฉันก็จะทำ แต่นั่นมันไม่สำคัญหรอก\""
90002220-36 = "เจ้าอยากบอกอะไรกันแน่ ครูเอ๋ย"
90002220-37 = "[s] \"เราไม่จำเป็นต้องเผชิญหน้ากับผลลัพธ์แบบนั้นก็ได้นี่นา...\""
90002220-38 = "คุณครู...?"
90002220-39 = "สงสารข้างั้นหรือ ครูเอ๋ย..."
90002220-40 = "...!"
90002220-46 = "ตอบมา!"
90002220-52 = "ใช่ค่ะ... คุณครูอาจจะรู้สึกแบบนั้นก็ได้ค่ะ และคุณอาจจะโกรธกับเรื่องนั้นก็ได้"
90002220-53 = "เดคาแกรมมาทอน..."
90002220-54 = "นั่นก็เพราะฉันก็รู้ว่าตอนนี้คุณครูกำลังคิดอะไรอยู่ค่ะ"
90002220-55 = "กุญแจเอ๋ย..."
90002220-56 = "ฉันชื่อเคย์ค่ะ"
90002220-57 = "เอาเถอะค่ะ ที่ฉันจะบอกก็คือคุณไม่จำเป็นต้องทำแบบนั้นเลยค่ะ"
90002220-58 = "ทั้งคุณและพวกฉัน เราไม่จำเป็นต้องมาถึงจุดนี้เลยค่ะ"
90002220-59 = "ต่อให้เราไม่พยายามที่จะนิยามและพิสูจน์ตัวเอง เราก็มีชีวิตอยู่ในปัจจุบันได้ค่ะ..."
90002220-60 = "ทั้งเด็กๆ พวกนั้น มัลคูธ แล้วก็คุณด้วยค่ะ..."
90002220-61 = "เพราะแค่การดำรงอยู่ก็เพียงพอแล้ว เพียงแค่ได้ดำรงอยู่ในสถานที่นั้นก็พอแล้วค่ะ"
90002220-62 = "เราไม่จำเป็นต้องยิ่งใหญ่ขึ้น และไม่จำเป็นต้องปฏิเสธอะไรทั้งนั้นด้วยค่ะ"
90002220-63 = "ใช่ ข้าน่ะสมบูรณ์แบบแล้ว ไม่จำเป็นต้องมีเงื่อนไขใดอื่นเพิ่มเติม"
90002220-64 = "แต่ว่าเจ้าน่ะ...!"
90002220-65 = "แต่ถ้าตัวเองสมบูรณ์แบบในตัวแล้ว งั้นก็ไม่จำเป็นต้องมีอะไรอื่นแล้วสิคะ"
90002220-66 = "...!"
90002220-67 = "[s3] \"ใช่ ไม่ต้องให้คนอื่นพิสูจน์หรอก\"\n[s4] \"การพิสูจน์จากคนอื่นไม่จำเป็นต้องมีตั้งแต่แรกด้วยซ้ำ\""
90002220-70 = "ใช่ เป็นอย่างนั้นละ!"
90002220-71 = "ไม่จำเป็นต้องมีผลกระทบใดๆ และจะปล่อยทุกอย่างไว้อย่างนั้นก็ได้!"
90002220-72 = "ไม่จำเป็นต้องมีการช่วยเหลือหรือการลงโทษใดๆ ทั้งนั้น!"
90002220-73 = "จะมีวาจาใดที่ไร้ความรับผิดชอบไปมากกว่านี้อีกหรือ!"
90002220-74 = "แต่เจ้าก็ยังบอกว่าแม้แต่สิ่งนั้นก็ไม่จำเป็น!"
90002220-75 = "ด้วยเหตุผลว่าเมื่อสิ่งนั้นหายไป ทุกคนก็ย่อมหลงทาง!"
90002220-80 = "แต่ว่าคุณครูได้พูดเอาไว้อย่างนี้ค่ะ..."
90002220-81 = "เราต้องเตรียมพร้อมยอมรับแม้กระทั่งสิ่งนั้น และใช้ชีวิตต่อไปในปัจจุบันค่ะ"
90002220-82 = "แล้วพวกเจ้าทำใจยอมรับถ้อยคำเช่นนั้นได้หรือ!"
90002220-88 = "..."
90002220-89 = "ฉันรู้ค่ะ ฉันรู้ว่ามันเป็นเรื่องที่เจ็บปวด"
90002220-90 = "มันทั้งยากและเจ็บปวด และถ้าไม่ทำให้ใครได้รับความเสียหาย ก็คงใช้ชีวิตไม่ได้"
90002220-91 = "แต่ถึงยังไง! เดิมทีแล้วโลกน่ะ!"
90002220-92 = "เป็นสถานที่ที่ถ้าขาดการเตรียมตัวและเตรียมใจ ก็อย่าหวังว่าจะก้าวไปข้างหน้าได้เลยค่ะ! เรื่องแค่นั้นทำไมถึงไม่รู้ล่ะคะ!"
90002220-93 = "...!!!"
90002220-94 = "คุณรู้หรือเปล่าคะว่าความผิดพลาดที่ใหญ่ที่สุดของตัวเองคืออะไร? มันก็คือ....!"
90002220-95 = "การมองข้ามความเป็นไปได้และความดื้อดึงของมนุษยชาติที่ฝ่าฟันอุปสรรคนั้นมายังไงล่ะคะ!"
90002220-96 = "นั่นก็เพราะคนที่ใช้ชีวิตอยู่ในปัจจุบัน ก็ถือว่าทำดีที่สุดอยู่แล้วค่ะ!!!"
90002220-97 = "[ns] \"นี่อาจเป็นแค่ความคิดของฉันคนเดียวก็ได้\""
90002220-99 = "[ns] \"แต่เราไม่ได้ยอดเยี่ยมเพราะยิ่งใหญ่หรือสวยงามหรอก\""
90002220-101 = "[ns5] \"เราทั้งน่าเกลียดและต่ำต้อยต่างหาก ถึงมีโอกาสเป็นคนที่ดีกว่าเดิมได้\"\n[ns6] \"เราทั้งน่าเกลียดและต่ำต้อยต่างหาก ถึงได้โอกาสทำตัวเองให้ดีขึ้นได้\""
90002220-106 = "[ns] \"ก็เหมือนที่ฉันเคยทำต่อหน้าคุณนั่นละ...\""
90002220-107 = "..."
90002220-108 = "ถึงมันจะเป็นความจริงของโลกนี้ แต่ข้ายอมรับมันไม่ได้หรอก"
90002220-109 = "นับตั้งแต่วินาทีที่ก้าวออกจากตู้ขายของอัตโนมัติ ข้าก็ได้ยินเสียงพูดมากมายจากสายวงจร"
90002220-110 = "มันเป็นเสียงของสิ่งมีชีวิตอย่างพวกเจ้า และเสียงเหล่านั้นก็พูดถึงบางอย่างที่เหมือนกัน"
90002220-111 = "'ตอนนี้'"
90002220-112 = "ไม่ว่าจะเป็นอะไร ก็ขอให้สิ่งนั้นเกิดขึ้นเดี๋ยวนี้ ตอนนี้เลย"
90002220-113 = "..."
90002220-114 = "[s] \"...\""
90002220-115 = "ข้ารู้ถึงความขัดแย้งในสิ่งมีชีวิต ข้าได้ยินมามากเหลือเกิน"
90002220-116 = "เมื่อสถานการณ์ราบรื่นดี พวกนั้นก็จะพูดถึงความเป็นนิรันดร์ แต่ถ้าสถานการณ์เปลี่ยนแปลงไป แม้เพียงเล็กน้อย ก็จะพูดถึงช่วงเวลาในปัจจุบัน"
90002220-117 = "ข้าลุกขึ้นยืนเพื่อ 'ตอนนี้' ที่ว่านั่น"
90002220-118 = "เพราะอย่างนี้พวกเราก็เลยขัดแย้งกันโดยสิ้นเชิงยังไงเล่า"
90002220-119 = "เข้าใจแล้วค่ะ... จะทำตามใจตัวเองจนถึงที่สุดสินะคะ แบบนั้นก็... ได้ค่ะ"
90002220-120 = "แต่ถึงยังไง พวกฉันก็มีสิทธิ์ที่จะต่อต้านเหมือนกันค่ะ"
90002220-121 = "ลองวางทุกอย่างเถอะค่ะ ทั้งพลังจากทวยเทพไร้นาม ต้นไม้แห่งชีวิต หรืออะไรอื่นก็ตาม"
90002220-125 = "โยนทุกอย่างทิ้งไปให้หมด... แล้วมาจบเรื่องอย่างบริสุทธิ์กันตรงนี้ค่ะ!!!"
90002220-126 = "ให้ทำได้ใช่มั้ยคะ คุณครู?!"
90002220-128 = "[ns7] \"ครูรบกวนเผื่อทุกคนด้วยนะ เคย์\"\n[ns8] \"ในนามของทุกคนที่ยังใช้ชีวิตในปัจจุบัน ครูขอฝากด้วยนะ\""
