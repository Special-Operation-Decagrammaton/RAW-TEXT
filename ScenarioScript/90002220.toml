90002220-170 = "แกไม่รู้หรอกว่ามนุษย์ที่ใช้ชีวิตในปัจจุบันน่ะ เด็ดเดี่ยวกันแค่ไหน!!!"
90002220-171 = "ข้าเบื่อหน่ายเรื่องนี้เต็มทีแล้ว...!"
