[translation]
2601305-1 = "The Last Picture"
2601305-2 = "I met up with Atsuko at the festival grounds to help her find subjects for her final photos."
2601305-4 = "Hello, Sensei."
2601305-5 = "Thank you for coming."
2601305-6 = "I'm having a difficult time deciding what to photograph, and my camera battery is nearly out."
2601305-7 = "I could really use your advice, Sensei."
2601305-8 = "[s1] \"Hm... That's a hard question.\"\n[s2] \"This seems like it would be good, but so does that...\""
2601305-11 = "In that case, why don't we explore the festival together?"
2601305-12 = "We may find inspiration walking around."
2601305-13 = "What do you think?"
2601305-14 = "[s] \"Let's get you the perfect last picture!\""
2601305-15 = "Heehee. I'll do my best, Sensei!"
2601305-17 = "Get yourself a cute little pet at the goldfish-scooping game! Gather round!"
2601305-18 = "Wow! There are so many fish in the aquarium."
2601305-19 = "They look so pretty while they swim."
2601305-20 = "[s] \"Do you want to take a picture?\""
2601305-21 = "No, I'm sure there's a better subject."
2601305-22 = "Let's try another place."
2601305-26 = "The Helmet Gang dance performance is starting soon!"
2601305-27 = "Come see our awesome dance moves!"
2601305-32 = "[ns] \"What about the outdoor performance, Atsuko?\""
2601305-33 = "If I had more battery left, that would be fun..."
2601305-34 = "But, for some reason, using my last photo on that..."
2601305-35 = "It seems like a waste."
2601305-36 = "Let's try another place."
2601305-38 = "What an impressive sand castle."
2601305-39 = "It's nearly as big as the person who made it. They're very skilled."
2601305-40 = "...But it's not perfect."
2601305-41 = "[s] \"Then let's keep looking!\""
2601305-43 = "Atsuko and I scoured the festival for her last picture, but..."
2601305-44 = "...we just couldn't find the perfect subject."
2601305-46 = "...The sun has already set."
2601305-47 = "We didn't manage to find what to photograph."
2601305-48 = "[s3] \"How about looking for something at the night festival?\"\n[s4] \"We can use a flash in dark places.\""
2601305-51 = "That would be nice, but...this camera was a bit cheap. The flash is broken."
2601305-52 = "So any pictures I take at night will just come out dark."
2601305-53 = "I suppose we'll have to mark today as a failure."
2601305-59 = "Oh?"
2601305-64 = "Fireworks..."
2601305-65 = "[s] \"Fireworks...\""
2601305-66 = "Indeed! It slipped my mind that there was a fireworks show scheduled for tonight."
2601305-67 = "Ah. In that case..."
2601305-72 = "[ns] \"You took your last picture?\""
2601305-73 = "Yes! I finally found my perfect subject."
2601305-74 = "Heehee. No, you can't see it."
2601305-75 = "...Huh? It looked like the lens was pointed at you?"
2601305-79 = "[ns] \"Show me, please...\""
2601305-80 = "It's my secret."
2601305-81 = "But I got to photograph exactly what I wanted to."
2601305-82 = "All because of you, Sensei. Thank you!"
