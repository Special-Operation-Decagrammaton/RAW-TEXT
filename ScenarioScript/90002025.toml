90002025-24 = "3;아리스 동복;00\n#3;a\n#3;sig\n#wait;1200"
90002025-25 = "3;아리스 동복;07;선생님! 히마리 선배! 케이! 아리스입니다. 모두 무사합니다!\n#3;em;[반짝]\n#3;hophop\n#3;sig"
90002025-26 = "3;히마리 방한복;00;고생 많았어요. 게임개발부 여러분. 그리고 에이미."
90002025-27 = "3;히마리 방한복;02;말이 나온 김에 말인데요. 우리를 습격해 온 데카그라마톤의 신규 병력의 잔해를, 회수할 수 있겠나요?"
90002025-28 = "1;에이미 수영복ND;02;응. 이번에는 가능해 보여. 얼마나 필요해? 한 스무 개?\n#1;a\n#1;sig\n#3;m5"
90002025-29 = "3;히마리 방한복;06;……그렇게 많이 가져왔다가는 우리 수납공간도 부족해질걸요…….\n#3;em;[땀]"
90002025-30 = "#all;hide"
