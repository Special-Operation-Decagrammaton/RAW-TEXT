90002025-1 = "#wait;1000"
90002025-2 = "3;모모이 동복;03;해냈다!\n#3;em;[반짝]\n#3;hophop\n#3;a"
90002025-3 = "5;미도리 동복;02;정말이야…… 물러가기 시작했어!\n#5;a"
90002025-4 = "1;유즈 동복;99;더 몰려오는 기색도…… 지금은, 없네요……. 휴우…….\n#1;em;[한숨]\n#1;a"
90002025-5 = "#all;hide"
90002025-6 = "3;아리스 동복;03;감사합니다, 에이미! 에이미가 아니었다면 엄청나게 힘들었을 겁니다!\n#3;em;[반응]"
90002025-7 = "1;에이미 수영복ND;02;아냐. 이런 현장 일은 익숙하기도 하고. 무엇보다…….\n#1;em;…\n#1;ar\n#3;m5"
90002025-8 = "1;에이미 수영복ND;99;나를 여기에 배치한 선생님의 판단이, 더 주효한 것이었겠지."
