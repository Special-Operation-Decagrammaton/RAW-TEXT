[translation]
90002025-2 = "สำเร็จแล้ว!"
90002025-3 = "ทำได้จริงด้วย... พวกนั้นเริ่มล่าถอยไปแล้วละ!"
90002025-4 = "ไม่มีสัญญาณว่าจะบุกมาเพิ่มด้วย... อย่างน้อยก็ตอนนี้นะคะ... ฮู่ว..."
90002025-6 = "ขอบคุณนะคะ เอมิ! ถ้าไม่มีเอมิ พวกเราคงเจอศึกหนักกว่านี้ไปแล้วค่ะ!"
90002025-7 = "ไม่หรอก ฉันแค่คุ้นชินกับการสู้ภาคสนามแบบนี้น่ะ และที่สำคัญคือ..."
90002025-8 = "การตัดสินใจส่งฉันมาที่นี่ของคุณครูมันเกิดผลดีน่ะ"
90002025-12 = "ครู? ได้ยินมั้ย? ฉันซ่อมเครื่องยนต์ฉุกเฉินเสร็จเมื่อกี้เลย "
90002025-13 = "ฉันก็อยู่ด้วยค่ะ รีบเอ่ยปากชมสิคะ"
90002025-14 = "[s] \"ริโอะ โทคิ ทั้งคู่ทำได้ดีมากเลยนะ!\""
90002025-15 = "ขอบคุณค่ะ การทำเรื่องดีๆ ทำให้เบิกบานใจจริงๆ เลยนะคะ"
90002025-17 = "ค่ะ ทราบแล้วค่ะ ตอนนี้ยานขนส่งฟื้นฟูไปมากน้อยแค่ไหนแล้วคะ เคย์?"
90002025-18 = "อันดับแรกเลย ตอนนี้ยานน่าจะบินได้อีกครั้งแล้วค่ะ แต่ถ้าได้รับความเสียอะไรเพิ่มอีก เรื่องราวก็จะต่างออกไปค่ะ..."
90002025-25 = "คุณครู! รุ่นพี่ฮิมาริ! เคย์! อาริสึเองค่ะ ทุกคนตรงนี้ปลอดภัยดีค่ะ!"
90002025-26 = "ลำบากกันน่าดูเลยนะคะ ชมรมพัฒนาเกมทุกคน แล้วก็เอมิด้วย"
90002025-27 = "ไหนๆ ก็อยู่ตรงนั้นแล้ว ช่วยเก็บเศษซากกองกำลังใหม่ของเดคาแกรมมาทอนที่มาจู่โจมเราให้หน่อย#nได้มั้ยคะ?"
90002025-28 = "อื้อ ครั้งนี้น่าจะทำให้ได้นะ อยากได้เยอะแค่ไหนเหรอ? สัก 20 ชิ้นพอมั้ย?"
90002025-29 = "ถ้าเอากลับมาเยอะขนาดนั้น ที่เก็บของของเราน่าจะไม่พอนะคะ..."
90002025-31 = "กล้องนอกยานทำงานได้อีกครั้งแล้วค่ะ ฉันจะส่งภาพขึ้นจอให้นะคะ"
90002025-37 = "นี่มัน..."
90002025-38 = "..."
90002025-39 = "[s] \"...\""
90002025-41 = "[ns] \"ตรงนั้นคือ... ดินแดนเหล็กกล้างั้นเหรอ...\""
90002025-44 = "ตอนต่อไป;ออกจู่โจม"
