[translation]
90002025-2 = "成功了！"
90002025-3 = "沒錯……敵人開始後退了！"
90002025-4 = "目前也沒有再湧上來的跡象呢……呼……"
90002025-6 = "謝謝你，英美！#n如果沒有英美，肯定沒辦法這麼順利的！"
90002025-7 = "不會。這種現場任務我已經很習慣了。"
90002025-8 = "真正的關鍵……應該是老師把我分配到這裡的判斷很正確吧。"
90002025-12 = "老師，聽得見嗎？#n引擎的緊急修復已經完成了。"
90002025-13 = "我也有幫忙。請迅速給予稱讚。"
90002025-14 = "[s]「莉央和季都辛苦了！」"
90002025-15 = "謝謝。果然做完一件好事後，心情也會變好。"
90002025-17 = "已確認完畢。#n目前運輸船的功能恢復到什麼程度了，Kei？"
90002025-18 = "應該可以重新起飛。#n不過如果再次受到損傷的話，情況就另當別論了……"
90002025-25 = "老師！陽葵前輩！Kei！#n這裡是愛麗絲。大家都平安無事。"
90002025-26 = "辛苦了。遊戲開發部的各位和英美。"
90002025-27 = "既然都說到這了，能麻煩你們回收剛才襲擊我們的十字神名新型兵力的殘骸嗎？"
90002025-28 = "嗯，這次應該沒問題。#n需要多少？大概20個左右？"
90002025-29 = "帶那麼多回來的話，我們的收納空間會不夠吧……"
90002025-31 = "重新啟動船外攝影機。傳輸畫面。"
90002025-37 = "這是……"
90002025-38 = "……"
90002025-39 = "[s]「……」"
90002025-41 = "[ns]「那裡就是鋼鐵大陸嗎……？」"
90002025-44 = "下一話;出擊"
