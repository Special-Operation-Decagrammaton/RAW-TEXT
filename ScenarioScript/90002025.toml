90002025-11 = "2;토키 모드 1;00\n4;리오 동복;01\n#2;sig\n#4;sig\n#4;a\n#2;a\n#2;h\n#4;h\n#wait;1200"
90002025-12 = "4;리오 동복;00;선생? 들려? 지금 막 엔진의 긴급 복구를 완료했어. \n#4;sig"
90002025-13 = "2;토키 모드 1;02;저도 있습니다. 신속하게 칭찬 부탁드리겠습니다.\n#2;em;[반짝]\n#2;sig"
90002025-14 = "[s] \"리오도 토키도, 수고 많았어!\""
90002025-15 = "2;토키 모드 1;03;감사합니다. 역시 좋은 일을 하면 기분이 좋군요.\n#2;sig\n#2;greeting"
90002025-16 = "#all;hide"
90002025-17 = "5;케이 AMAS;02\n1;히마리 방한복;00;네. 확인했습니다. 현재 수송선의 기능은 어디까지 회복된 상황인가요, 케이?\n#1;em;[반응]"
90002025-18 = "5;케이 AMAS;02;일단 비행은 가능할 거예요. 여기에서 추가 손상을 입는다면 이야기가 달라지겠지만……."
