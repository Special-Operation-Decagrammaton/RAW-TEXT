[translation]
10049030-1 = "Episode 3;Gushing Too Much Over Magical Girls"
10049030-2 = "[log]3 days ago, in the Library Committee Break Room...[/log]"
10049030-4 = "I've got it!"
10049030-5 = "You've got..."
10049030-6 = "What?"
10049030-10 = "Let's become magical girls!"
10049030-11 = "H-Heehee... I never thought I'd get a real chance to say that."
10049030-12 = "\"Magical Girl Heavy Caliber Borderland Specials\"...? What is this?"
10049030-13 = "Magical Girl Heavy Caliber is holding a special event at Borderland Amusement Park!"
10049030-14 = "I can see what it SAYS, but what does it mean?"
10049030-16 = "They're having multiple acting troupes, in costumes, doing performances all throughout the park."
10049030-17 = "It says, \"Due to the size of the venue, there will be multiple casts of characters on site.\""
10049030-18 = "Okay, but Reisa, what does that have to do with us?"
10049030-19 = "We could infiltrate AS magical girls."
10049030-20 = "It says they have multiple casts, so I'm sure they won't notice if there's one or two more!"
10049030-21 = "And wherever we are in the park, we won't look out of place!"
10049030-23 = "All the teams come from outside the park, so the staff won't suspect us at all!"
10049030-24 = "Hmm, right..."
10049030-25 = "I vaguely remember seeing that show a long time ago. Was it a morning broadcast for little kids?"
10049030-26 = "No, not at all! I mean, they do show it in the morning...but!"
10049030-27 = "Magical Girl Heavy Caliber is an epic story about a team of girls who protect Kivotos against the invasion of the evil officer, Era!"
10049030-28 = "I-I see..."
10049030-29 = "Now, if we DO dress up as these characters, we'll be at a disadvantage in combat."
10049030-30 = "It's not as if we can wear kevlar on top of our cosplay..."
10049030-31 = "And speaking of materials, I'm not familiar with any of these..."
10049030-32 = "Plus I've never watched a magical girl show before..."
10049030-33 = "And also...it'd be kind of embarrassing..."
10049030-34 = "Ah. I, um, I get it."
10049030-35 = "Okay, well, I just thought it might help. Imagine that. Me, coming up with a good idea."
10049030-36 = "It's fine. I'll think of something else."
10049030-40 = "N-No, I didn't mean that! I just, um..."
10049030-41 = "...these costumes would actually be great for infiltration!"
10049030-42 = "Someone sees us wearing these, they'll KNOW we're not there to fight!"
10049030-43 = "Suzumi...?"
10049030-45 = "Well, maybe, but I guess magical girls ARE kind of childish, and..."
10049030-46 = "N-Not at all! Magical Girl Happy Gulliver sounds awesome to me."
10049030-48 = "Wasn't it \"Heavy Caliber\"?"
10049030-49 = "Yes! That sounds even better!"
10049030-50 = "...And I could handle the cosplay. I'd just need some basic information about the show."
10049030-51 = "You sound like you know a lot about it, Reisa."
10049030-52 = "I do! I'm a huge fan!"
10049030-53 = "They're kind of like vigilantes, in the way they protect world peace."
10049030-54 = "I've loved them since I was little!"
10049030-55 = "I even watched the movie that came out recently!"
10049030-56 = "And you know, I haven't really had a chance to talk to anybody about it before now..."
10049030-57 = "..."
10049030-62 = "We, uh, ought to start working on the cosplay."
10049030-63 = "Like, ASAP. Just let me know which characters you recommend, Reisa."
10049030-65 = "Suzumi?!"
10049030-69 = "You mean it?! I'll get you some notes right away!"
10049030-74 = "(I wonder why I said that...)"
10049030-75 = "(I mean, Reisa loved the idea, and I GUESS it's working, but...)"
10049030-76 = "(...that doesn't make this any easier to wear.)"
10049030-77 = "I knew it'd look good on you! Come on, don't be shy!"
10049030-78 = "I'm glad I gave you the main character role! You've got that protagonist vibe down pat, Suzumi."
10049030-79 = "...I mean, \"Thermite White\"!"
10049030-80 = "\"Th-Thermite White\"...?"
10049030-81 = "We're undercover, remember? We can't use our real names. So we'll use our characters' names instead!"
10049030-82 = "And I am \"Thermite Pink,\" Thermite White's best friend-slash-sidekick!"
10049030-83 = "I-I see. Rei—"
10049030-89 = "...Uh, Thermite Pink..."
10049030-93 = "...So, wait, your name is Thermite Pink..."
10049030-94 = "...but your outfit's purple. Shouldn't that be your name too?"
10049030-95 = "Ah! That's a good question!"
10049030-101 = "[log=레이사 매지컬]To explain that, we need to go back to when I watched \"Magical Girl Heavy Caliber\"#nfor the very first time. See, Thermite Pink starts off with the Heart Jewel and[/log]"
10049030-102 = "[log=레이사 매지컬]pink dress as part of her main design! But when she finds herself in trouble#nfighting Era's loyal servant, Silver Plate, in \"Bolt catch! Heavy Caliber!\",#nshe does a Friendship Fusion with White. Despite getting new powers, the[/log]"
10049030-103 = "#st;[-1200,-230];serial;64;[log=레이사 매지컬]two fail to take down Silver Plate and fall. Their enemy, Silver Plate...[/log]"
10049030-107 = "H-Hold o..."
10049030-109 = "[log=레이사 매지컬]...And just about when they're about to send friendship energy to the planet of hatred,#nPink shows up in this outfit and takes them down. And so...[/log]"
10049030-117 = "...And that's why Pink looks different! I chose her special transformation outfit because I really loved that episode! In other words, this isn't Pink's basic form. It's what she looks like when her true powers come out!"
10049030-118 = "I-I see... That helped..."
10049030-119 = "By the way, Rei... Thermite Pink. Have you gotten in contact with Shimiko?"
10049030-120 = "It's \"Era,\" the evil officer!"
10049030-121 = "Right. Era. Where is she?"
10049030-122 = "I don't know. I haven't been able to get ahold of her."
10049030-123 = "I wonder if she's still asleep..."
10049030-124 = "Since we called her as backup, we should be able to respond to situations on site with just the two of us."
10049030-125 = "But I hope she's not in any trouble."
10049030-130 = "This is Mashiro from the Justice Task Force. I'm here to support you. Vigilante Crew, do you copy?"
10049030-132 = "I copy."
10049030-133 = "Thermite Pink here. I copy."
10049030-135 = "Good, you're both coming through loud and clear. Please contact me on this channel if you need support."
10049030-136 = "I'm at the observation tower, in Trinity territory."
10049030-138 = "Confirmed. I'll mark it."
10049030-140 = "How about you, Sensei? Do you copy?"
10049030-141 = "[s] \"Loud and clear.\""
10049030-142 = "Good. Call me if you need me."
10049030-144 = "Comm lines are open."
10049030-145 = "Thanks for the help, Mashiro."
10049030-150 = "W-Wait, \"Sensei\"?!"
10049030-151 = "Sensei!"
10049030-152 = "[s1] \"Hey there, Suzumi, Reisa.\"\n[s2] \"Hello, Thermite White and Pink.\""
10049030-156 = "Wh-Wh-When did you get here?!"
10049030-160 = "A-Ah, this costume is for...!"
10049030-161 = "[s3] \"I got here right before you first walked out.\"\n[s4] \"It looks good on you, Suzumi.\""
10049030-165 = "Hasumi told me you'd need immediate on-site support."
10049030-166 = "The only available personnel were Sensei and me, and I can't leave the tower."
10049030-167 = "No one told me Sensei would be here!"
10049030-168 = "Huh? You didn't know, Suzumi?"
10049030-169 = "Of course not!"
10049030-171 = "Hasumi told me she'd support us \"to the best of her abilities,\" and that bringing in Sensei was part of that."
10049030-172 = "That's all she said about it."
10049030-173 = "I-I see. I just wasn't expecting support from Schale."
10049030-174 = "[s5] \"Well, I'm glad to provide it, Suzumi.\"\n[s6] \"It looks fun here anyway!\""
10049030-177 = "(It's nice to see Sensei again, for the first time in a while...)"
10049030-178 = "(But still, in this outfit, it's...)"
10049030-179 = "Before I go into wireless standby, I did want to say one thing..."
10049030-180 = "Your outfits are quite unique."
10049030-181 = "Is that the Vigilante Crew's uniform?"
10049030-182 = "I like it. It's flashy, not like ours."
10049030-183 = "No, it's, um... The Vigilante Crew doesn't have a uniform, since we're not an official organization."
10049030-184 = "These are, um, operation outfits for field surveillance..."
10049030-186 = "We're the best-friend main characters from \"Magical Girl Heavy Caliber\"! Thermite White and Pink!"
10049030-187 = "The girls in these costumes protect world peace and justice!"
10049030-188 = "..."
10049030-189 = "..."
10049030-193 = "Well, I like it."
10049030-194 = "Warriors for peace, wearing those outfits. Makes sense now that I put it together."
10049030-195 = "..."
10049030-196 = "Oh, Suzumi, your call sign is \"Thermite White\"? Shouldn't that be \"Pink,\" like your outfit?"
10049030-197 = "Ah, that's a good question! There's a reason she wears pink, but goes by the name \"White.\" See, in Season 3, Episode 7..."
10049030-199 = "Th-The call sign is correct. Thank you for checking!"
10049030-200 = "Reisa, how about we...hold off on spoiling anything, so we can all watch it later?"
10049030-201 = "Ah! That sounds great! I'll bring the DVDs!"
10049030-202 = "Check. Switching over to wireless standby now."
10049030-203 = "I'll stay on the lookout and keep you covered."
10049030-204 = "Keeping in mind that I'll need authorization from the Justice Task Force before I can open fire."
10049030-208 = "*sigh*..."
10049030-209 = "I wonder if it's not too late to change back into our normal outfits for this."
10049030-210 = "Eh? But you look so good in that!"
10049030-211 = "It's still embarrassing."
10049030-212 = "Hey! You! You should be on call in the green room!"
10049030-213 = "Get moving! You're already late!"
10049030-214 = "U-Us?"
10049030-215 = "What?"
10049030-216 = "I thought you guys said you couldn't make it, because the train crew threw you off or something."
10049030-217 = "Whatever. You're here now. Let's get started."
10049030-218 = "Started with...what?"
10049030-223 = "The. Magical. Girl. Heavy. Caliber. Stage. Show!!"
10049030-224 = "We've got our cast. We're ready to roll."
10049030-225 = "Y-Your cast?"
