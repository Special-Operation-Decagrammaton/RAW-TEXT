[translation]
10053010-1 = "Episode 1;Misunderstanding and Misunderstanding"
10053010-2 = "Thank you so much! I owe ya big time! Don't burn the place down, and do NOT touch my desk!"
10053010-7 = "What is it now?"
10053010-8 = "I'm going on a trip. To the field, the great outdoors. VERY rural."
10053010-9 = "If I'm not back in a week, assume I'm gone for good. Don't look for me, and use a flattering photo for the—"
10053010-10 = "Oh, and who's this? I think I would remember a face like that."
10053010-11 = "If you hadn't come in hollering, I would have introduced you."
10053010-12 = "This is [USERNAME] Sensei. From Schale."
10053010-13 = "Sensei, this troublemaker is the Deputy Director of the Public Peace Bureau, Shima Konoka."
10053010-16 = "Ooh! So THIS is Sensei! I heard about you from the big dog here!"
10053010-17 = "...? But why did she cuff you?"
10053010-18 = "[s1] \"Uh... I hope you don't get confused.\"\n[s2] \"You could say there was a slight...misunderstanding.\""
10053010-25 = "They were caught possessing and smuggling a specific student's middle school yearbook. I don't think there's any \"misunderstanding\" here."
10053010-26 = "Well, given that it's Sensei, there's probably some convenient excuse."
10053010-27 = "..."
10053010-28 = "I'll contact the victim, explain the situation, and determine if further action is appropriate."
10053010-29 = "[s3] \"It's fine! I have nothing to hide!\"\n[s4] \"Iori will understand!\""
10053010-32 = "*sigh* Sensei, given that you are, strictly speaking, a public figure, I would appreciate it if you would refrain from drawing this kind of attention..."
10053010-33 = "But first things first, Konoka."
10053010-34 = "What was that about you going on a field trip?"
10053010-35 = "Ah, the thing is..."
10053010-36 = "I hope YOU don't get the wrong idea. Or judge me..."
10053010-40 = "But I only have one week to capture a Tsuchinoko!"
10053010-45 = "...Ah. How could I possibly get the wrong idea?"
10053010-46 = "Just a question, for courtesy's sake. Is this \"Tsuchinoko\" the one I'm familiar with, or some sort of criminal codename?"
10053010-47 = "Yes! It is THAT Tsuchinoko! The famous one. The snake."
10053010-48 = "...The mythical creature? The cryptid?"
10053010-49 = "That's right! It's the elusive legend, the creature often discussed, sometimes spotted, but, despite bounties, contests, and reality shows...never captured!"
10053010-50 = "Right now, the cumulative bounty is 100 million yen! You could say it's a walking—I mean, SLITHERING tube of gold!"
10053010-51 = "...Yes."
10053010-52 = "Now, I am aware this could be a sensitive topic."
10053010-53 = "Konoka, are you in dire need of money?"
10053010-54 = "Huh? What do you take me for? You really think I'm the type to chase a quick yen?"
10053010-55 = "I suppose not."
10053010-56 = "Then... It must be your superstitions, again."
10053010-57 = "Come on. Haven't I built up enough seniority to skip the interrogation? Just look at all the vacation days I have banked."
10053010-58 = "Ah, don't worry. I wasn't planning on stopping you."
10053010-59 = "In fact, you tend to burn yourself out. If you're finally motivated to rest, I'm not standing in your way."
10053010-60 = "However..."
10053010-61 = "However?"
10053010-62 = "If you have to go on some wild snake chase, take Sensei with you."
10053010-63 = "Huh?"
10053010-64 = "[s] \"...Huh? Me?\""
10053010-65 = "Sensei, Do you have a moment?"
10053010-69 = "If you accompany Konoka for this trip, I'll close today's investigation and let you go free."
10053010-70 = "[s5] \"You'll drop the case?!\"\n[s6] \"But I'm innocent! Let me talk to Iori!\""
10053010-73 = "No. It's not like that. Consider this a personal request."
10053010-74 = "...Konoka isn't actually a troublemaker. Of course, I can't exactly say she has a sterling reputation..."
10053010-75 = "But she's more diligent than she looks, and she deserves to be the Deputy Director, despite only being a second year. Unlike me, she's congenial and well-liked by her subordinates."
10053010-76 = "But, she has a tendency to go craz...ily enthusiastic about one thing."
10053010-79 = "Superstition."
10053010-84 = "Wow, I didn't think the famous Sensei would join me!"
10053010-85 = "Ah, as a \"preventative measure\"? Kanna sure is overprotective."
10053010-86 = "I feel very loved all the same!"
10053010-87 = "Don't you think? Ha! Hahaha!"
10053010-88 = " [s7] \"R-Right!\"\n[s8] \"(She's more worried about protecting the world from you...)\""
10053010-91 = "Oh, I should tell the others! You'll meet them soon, and love them, I'm sure."
10053010-92 = "You knew that, right? I wasn't about to go hunting in the boonies alone."
10053010-93 = "We're meeting up with Gurumin and Director Mo."
10053010-94 = "[s9] \"Gurumin and Director Mo...?\"\n[s10] \"Such unique names...\""
10053010-97 = "Ah, they're not names, they're IDs, handles, pseudonyms. You get the idea."
10053010-98 = "[s11] \"You met them on the internet?\"\n[s12] \"What if they're dangerous people...?\""
10053010-101 = "What?"
10053010-102 = "..."
10053010-103 = "Pfft! Hahahaha!"
10053010-104 = "Shoot, sorry. I shouldn't have laughed so loudly. When you see them, you'll understand."
10053010-105 = "Look, Sensei. What do you think I do at Valkyrie?"
10053010-106 = "So-called \"dangerous people\" should be scared of me."
10053010-107 = "Don't worry for a second. I know the girls we're meeting. They're great."
10053010-108 = "Seriously, we're mutuals on the socials too. We've even met up in-person several times."
10053010-109 = "Are you normally interested in this kind of stuff, Sensei? The...paranormal?"
10053010-110 = "Here, check out this account. They focus on urban legends and unsolved mysteries! Pretty neat, huh?"
10053010-111 = "At first, I used it for monitoring the area. But, honestly, their research is pretty impressive..."
10053010-116 = "Ah, we're here! I'll tell you more later."
10053010-125 = "*sniff*"
10053010-126 = "I'd only heard about it before. So, THIS is the countryside..."
10053010-131 = "Good. She's here."
10053010-132 = "...? Hm. Did she bring a friend?"
10053010-133 = "I think you're right."
10053010-137 = "Excuse me? Are you two—"
10053010-142 = "Eh, huh?! What?! SENSEI?!"
