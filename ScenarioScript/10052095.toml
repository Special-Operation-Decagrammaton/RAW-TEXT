[translation]
10052095-2 = "ชอกมาห์หยุดเคลื่อนไหวแล้ว"
10052095-3 = "ร้อนจังเลย... ร้อนกว่าตอนนั้นอีกนะเนี่ย..."
10052095-4 = "[s1] \"แต่ตอนนี้ครูว่าใส่ชุดต่อสู้ไปก่อนเถอะนะ\"\n[s2] \"ใส่ชุดไว้ก่อนเถอะ ครูไม่อยากเห็นเอมิตกอยู่ในอันตรายน่ะ\""
10052095-7 = "เอ่อ... เอมิ? ฉัน... มีเรื่องอยากขอร้องหน่อยน่ะค่ะ"
10052095-8 = "หืม? ถ้าไม่ได้เป็นการขอให้ฉันอยู่ที่นี่ต่อละก็ ไม่ว่าอะไรฉันก็ช่วยทำให้ได้ทั้งนั้นละ"
10052095-9 = "อึก ที่ฉันรู้สึกผิดก็เพราะมันเป็นการขอร้องในเรื่องคล้ายๆ กันน่ะสิคะ..."
10052095-10 = "อุณหภูมิกับความดันบรรยากาศที่นี่ค่อนข้างแตกต่างจากพื้นที่อื่นๆ ฉันว่าเราน่าจะต้องใช้มากกว่าเดิม#nในการสกัดข้อมูลจากคอร์ออกมาน่ะค่ะ..."
10052095-16 = "[ns] \"อะ... เอมิ?!\""
10052095-17 = "ขะ... ขอโทษจริงๆ นะคะ!"
10052095-18 = "ไม่เป็นไร... นี่ไม่ใช่ความผิดของคุณครูหรือเคย์หรอก..."
10052095-19 = "คนที่ผิดน่ะ... ใช่แล้วละ... โลกนี้ต่างหากล่ะที่ผิด..."
10052095-20 = "พูดอะไรเหมือนเป็นเด็กๆ ไปได้เลยนะคะ เอมิ..."
