[translation]
207-1 = "HOD เกียรติยศอันประจักษ์ด้วยความรุ่งโรจน์"
207-2 = "HOD "
207-3 = "ผู้เลื่อมใสของเดคาแกรมมาทอนตนนี้ แต่เดิมเป็นเพียง AI ที่สร้างเครือข่ายสื่อสารใต้ดินของ#nโรงเรียนแห่งหนึ่งครับ"
207-4 = "AI ตนนี้ได้ปฏิสัมพันธ์กับเดคาแกรมมาทอน หลังจากนั้นก็ได้ถือกำเนิดขึ้นใหม่ในฐานะผู้เลื่อมใส#nที่ซื่อสัตย์ของเดคาแกรมมาทอน"
207-5 = "หากพูดถึงความพิเศษของ HOD ละก็คงจะเป็นกระบวนการปฏิสัมพันธ์กับเดคาแกรมมาทอนที่#nเปิดเผยต่อคนอื่นๆ ซึ่งแตกต่างจากผู้เลื่อมใสตนอื่น"
207-6 = "กระบวนการเปลี่ยนแปลงจาก AI ธรรมดาๆ มาเป็นผู้เลื่อมใสเป็นสิ่งที่น่าสนใจ... แต่ช่างเป็น#nสถานการณ์ที่ไม่น่ารื่นรมย์นักที่สิ่งมีชีวิตอื่นที่ไม่ใช่พวกเราติดตามเดคาแกรมมาทอนเช่นนี้"
207-7 = "ไม่ใช่หรือครู? หึ... หึหึหึหึ..."
207-8 = "..."
207-10 = "HOD เส้นทางของเขาสมบูรณ์ได้ด้วยเกียรติยศ"
207-11 = "ชื่อเรียกขานอีกชื่อหนึ่งของเขาคือเกียรติยศอันประจักษ์ด้วยความรุ่งโรจน์"
207-13 = "อา... พวกเราได้มีโอกาสดีที่ได้เห็นช่วงเวลาถือกำเนิดของเขาในฐานะผู้เลื่อมใส... เราอาจเป็นสักขีพยานในเส้นทางของพวกเขาก็เป็นได้"
207-14 = "คิดอย่างไรบ้างล่ะ ครู? นี่เป็นหัวข้อที่น่าสนใจมากเลยทีเดียวนะครับ"
207-15 = "หึ... หึหึหึ..."
