[translation]
70013040-1 = "一人では咲かない雑草（4）"
70013040-3 = "リガトーニ・ファミリーが占領したホテル正門"
70013040-6 = "リガトーニ・ファミリーが占領したホテル後門"
70013040-10 = "近くの他のビルの屋上"
70013040-12 = "わ～お、警備が超厳重。このまま中に入るのは難しそうかなー？"
70013040-13 = "どうしましょう？アル様と連絡もできないですし……このままじゃ……！"
70013040-14 = "くふふっ、大丈夫だよ。ちゃ～んと考えてるから。"
70013040-15 = "ということでハルカちゃん、まずは着替えようか。"
70013040-16 = "着替えですか？どの服に……？"
70013040-17 = "あいつらに近づいてもバレない服！"
70013040-19 = "しばらくして――"
70013040-21 = "は、始めましょうか？け、消しちゃいましょうか！？"
70013040-22 = "ううん、ちょっと待って。何か話してるから、聞いてみようよ。"
70013040-23 = "……はあ、夜に緊急招集って、何があったんだ？"
70013040-24 = "以前ボスにちょっかい出した奴らを捕まえたんだけど、その内何人かに逃げられたんだと。"
70013040-25 = "えっ？何人？"
70013040-26 = "二人。"
70013040-27 = "は？……たった二人のために全員集合したのかよ？"
70013040-28 = "いったいどんな奴らなんだ？"
70013040-29 = "ボスがあれだけ神経質になってるんだ。もしかしたら七囚人のアケミぐらいヤバいのかもな。"
70013040-30 = "おいおい、あんな怪物が他にもいるってことか？"
70013040-31 = "構成員がみんな集まったみたいですね……。"
70013040-32 = "くふふっ、これは爆弾の使い甲斐がありそう～"
70013040-33 = "行こう、ハルカちゃん。"
70013040-40 = "いやあ～こんな時間にお疲れさま。"
70013040-41 = "お、お疲れさまです……！"
70013040-42 = "ん？お前たちは？"
70013040-43 = "全員招集されたよね？ちょっと遅れちゃった。"
70013040-44 = "初めて見る顔だな……新人か？"
70013040-45 = "うん。だからよく分からなんだけどー"
70013040-46 = "すごい集団のボスを捕まえたんでしょ？ちゃんと逃げられないようにしてるのかなぁ？"
70013040-47 = "ボスと最上階にいるから、平気だろ？"
70013040-48 = "くふふっ、そっか～ありがと！"
70013040-49 = "お礼にスペシャルなプレゼントをあげるね。"
70013040-55 = "ん？何だ突然……。"
70013040-60 = "い、入り口で爆発……！？"
70013040-61 = "おい！何があった！？"
70013040-64 = "よーし！バタついてる間に最上階まで行っちゃおー！"
70013040-65 = "待っていてください、アル様！今、参ります……！"
70013040-70 = "ぼ、防犯カメラを確認しろ！侵入者を見つけるんだ……！！"
70013040-71 = "ちゅ、中央廊下にいるぞ！急げ！！"
70013040-73 = "ホテル下層階の中央廊下"
70013040-84 = " 何！？奴らが侵入してきただと！？"
70013040-85 = "絶対にここへは来させるな……！！"
70013040-86 = "し、しかし奴ら……チビのくせに異様に強くて……！"
70013040-87 = "ぐ、わあああっ……！！ "
70013040-88 = "バカヤロー！チビ二人に手こずってどうすんだ！？"
70013040-89 = " ふふふっ……。"
70013040-94 = "ボスがその程度だから、部下だってその程度なのよ。"
70013040-95 = "つまり、[ruby=・   ・   ・]この私[/ruby]の下にいるうちの社員は最高に優秀ってこと。"
70013040-96 = "私たちを敵に回したのが――"
70013040-97 = "貴方の、最大のミスよ。"
70013040-98 = "ぐっ！捕らわれの身でえらそうに！"
70013040-104 = "あら？私を撃とうっていうの？"
70013040-105 = "好きにしなさい。"
70013040-106 = "けど、これだけは覚えておくのね。"
70013040-107 = "うちの社員が来たときに、私がケガでもしていたら……それはもう大変なことになるわ。"
70013040-108 = "よく考えたほうが賢明よ。"
70013040-109 = "ぐううっ……！"
70013040-113 = " 社長……大胆だね？"
70013040-114 = " こ、怖かった……！ホントは怖かったのよ……！！"
70013040-118 = "（……でも耐えないと）"
70013040-119 = "（私はうちの社員を信じてるんだから……！）"
70013040-121 = "ホテル中間階"
70013040-147 = "ホテル上層部"
70013040-156 = "ハルカちゃん！大丈夫？"
70013040-157 = "だ、大丈夫です！ちょっとかすっただけなので！"
70013040-158 = "それより、早く行きましょう！"
70013040-159 = "アル様が……私たちを待っているでしょうから……！"
70013040-163 = "何ぃ……！？もう近くまで来ているだと！？"
70013040-164 = "い、一体どうやって……！！"
70013040-165 = "あなたは、あの時から何も変わっていないのね。"
70013040-166 = "いや、むしろ退化したと言うべきかしら。"
70013040-167 = "それに比べて、私たちは劇的に強くなったわ。"
70013040-168 = "あなたに苦しめられてたあの弱々しい子が、今では我が便利屋68最強の爆破工作員になったの。"
70013040-169 = "さっきから聞こえてる爆発音は、全てあの子によるものよ。"
70013040-170 = "どうかしら？自分の過ちによって追い詰められた気分は？"
70013040-171 = "ひいいいっ……！"
70013040-176 = "社長……結構やるじゃん。"
70013040-177 = "わ、私もここまでかっこよくきまるとは思わなかったわ……！"
70013040-183 = "こ、ここまで来やがったか……！！"
70013040-188 = "アル様！カヨコ課長……！ただいま参りました！おケガはありませんか？"
70013040-189 = "ふふふっ、信じてたわよ。"
70013040-190 = "私たちは大丈夫だから、心配しなくていいよ。"
70013040-195 = "くふふっ、じゃあ散々困らせてくれたあいつに、たっぷりお仕置きしなきゃね～？"
70013040-196 = "…………。"
70013040-197 = "ふ、ふふふ……。"
70013040-198 = "ふはははは……！"
70013040-199 = "愚かな奴らめ！誰にお仕置きだと？"
70013040-200 = "お仕置きされるのは、お前たちの方だ！"
70013040-201 = "傭兵たちよ！出番だぞ……！！"
70013040-206 = "な、何よ？隠れてたの！？"
70013040-207 = "包囲された……！ムツキ！ハルカ！気を付けて！"
70013040-209 = "くはははは、お遊びもここまでだ！"
70013040-211 = "撃て……！！"
70013040-222 = "全弾発射。制圧完了です。"
70013040-223 = "ふふふ……ふははは！！"
70013040-224 = "これだけ弾丸を食らわせたら、無事ではいられまい。"
70013040-225 = "便利屋の社長！次はお前だ……！"
70013040-227 = "…………。"
70013040-228 = "…………まだよ。あっちを見てみなさい。"
70013040-232 = "…………。"
70013040-233 = "何ぃ！？"
70013040-235 = "ゴホッ、ゴホゴホッ！"
70013040-236 = "うう……助けてくれてありがとう。やっぱりハルカちゃんのタフさにはかなわないね～"
70013040-239 = "ど、どうなってる？あれほどの火力に耐えるなんて……。"
70013040-240 = "なんだ……お、お前はいったい何なんだ……！？"
70013040-242 = "私は……雑草……。"
70013040-243 = "踏まれても踏まれても死なない……雑草です。"
70013040-247 = "……。"
70013040-248 = "全部、消します。"
70013040-249 = "アル様を…そしてカヨコ課長を人質に取り……。"
70013040-250 = "ムツキ室長まで私の目の前で傷つけようとするなんて……。"
70013040-251 = "許さない……。"
70013040-252 = "許さない許さない許さない許さない許さない許さない許さない……！"
70013040-253 = "許さない……！"
70013040-254 = "ひ、ひいいいっ！？"
70013040-268 = "た、助けてくれ……！に、二度とお前たちの前に現れないから……！！"
70013040-269 = "お、お願いだ！こ、このとおり……！！"
70013040-270 = "……。"
70013040-271 = "……アル様、どうしましょう？"
70013040-272 = "ふっ、解放してあげなさい。"
70013040-273 = "評判が地に落ちたあいつらには、生きているほうが厳しい罰になるわ。"
70013040-274 = "ふふ、どん底を這いずりながら思い出すことね。"
70013040-276 = "冷酷無比で真のハードボイルドなアウトローは、誰なのかを！"
70013040-277 = "ひ、ひいいいっ！？"
70013040-278 = "……えへへ。さすがアル様、かっこいいです。"
70013040-279 = "お前……アル様のおかげで命拾いしましたね。"
70013040-285 = "ぐ、ぐはっ……！！"
70013040-291 = "アルちゃんとカヨコちゃん、大丈夫なの？"
70013040-292 = "ええ、私たちは大丈夫よ。"
70013040-293 = "社長の悪党ぶり、二人にも見せたかったね。"
70013040-294 = "ふふっ、私のハードボイルドな姿はこれからもずっと見られるわよ。"
70013040-299 = "えへへ……良かった……です……。"
70013040-304 = "は、ハルカ……！"
70013040-305 = "ハルカちゃん……！"
70013040-306 = "うぅ……。"
70013040-308 = "……。"
70013040-309 = "……大丈夫。ちょっと疲れただけみたい。"
70013040-310 = "……。"
70013040-311 = "……ありがとう、ハルカ。今回はあなたに大きな借りができたわね。"
70013040-313 = "と、とんでもないです……。私を助けてくださったのはアル様ですから……。"
70013040-314 = "まだまだ……ご恩に報いることはできていません……。"
70013040-315 = "ううん、恩返しならもう十分にしてもらったわ。だからこれからは、そんなこと思わなくていいのよ。"
70013040-316 = "アル様……ありがとうございます。"
70013040-317 = "あ、あのー、ハルカちゃん……。"
70013040-318 = "さっき自分のこと「雑草」って言ってたけど……まさか、まだそう思ってたの？"
70013040-319 = "前に私が……「雑草ちゃん」って呼んだせいで……？"
70013040-320 = "……。"
70013040-321 = "そ、そうじゃないです……。"
70013040-322 = " 私が、このあだ名を気に入ってるだけで……。"
70013040-323 = "は、ハルカちゃ～ん……！"
70013040-331 = "その後、到着したヴァルキューレによってリガトーニは逮捕された。"
70013040-332 = "便利屋68にとって、本当に忘れられない夜となった。"
