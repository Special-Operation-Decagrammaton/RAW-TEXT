[translation]
2000005-1 = "Strike Your Heart"
2000005-2 = "12th Millennium Stadium"
2000005-3 = "There you are!"
2000005-4 = "This is the first time the sports department has sent me a request."
2000005-5 = "Now if only I knew anything about baseball."
2000005-6 = "All I know is that you have to hit the ball with a bat and get a home run."
2000005-7 = "[s1] \"Well, that's a start.\"\n[s2] \"You don't say?\""
2000005-8 = "I'm pretty sure, anyway. You have to hit the ball the pitcher throws to score points for your team."
2000005-9 = "I'm pretty sure, anyway. You have to hit the ball the pitcher throws to score points for your team."
2000005-10 = "When it comes to inventing, the most important thing is..."
2000005-11 = "...knowing what \"purpose\" your invention will serve."
2000005-12 = "So I asked myself, \"How can I help the Millennium Baseball Club reach their goal of making the Interhigh Championship?\""
2000005-13 = "I came to one simple conclusion:"
2000005-14 = "To do that, they have to be skilled enough to get base hits against even the best pitcher."
2000005-15 = "I then got to work on creating something special."
2000005-16 = "I call it the \"Pitching Machine from Hell.\""
2000005-17 = "All I need to do now is test and fine-tune it."
2000005-18 = "Sensei."
2000005-20 = "Would you do me the honor of standing in the batter's box?"
2000005-21 = "[s3] \"Are you trying to send me to hell?\"\n[s4] \"One homer, coming right up.\""
2000005-22 = "You don't have to worry about that."
2000005-23 = "Even I know that the goal of baseball isn't to kill the batter."
2000005-24 = "So that's what you think, huh...?"
2000005-26 = "Let's get started."
2000005-27 = "First up: annihilation mode... Wait, I decided not to include that feature."
2000005-28 = "One more time."
2000005-29 = "Fire! Oops, I mean..."
2000005-30 = "Let's get pitching!"
2000005-32 = "The average speed of a major league pitcher is about 140 kilometers per hour."
2000005-33 = "A pitcher who was crowned MVP of the Interhigh Championship is sure to throw just as fast."
2000005-34 = "Keep in mind speed is relative, though."
2000005-35 = "So if you practiced against balls even faster than that...then hitting balls at 140 kilometers per hour should be a piece of cake."
2000005-36 = "Ready? Here comes the first pitch."
2000005-37 = "Since we're only warming up, I'll only crank this one up to Mach 2."
2000005-38 = "[s5] \"Wait! That's a bad idea!\"\n[s6] \"There's a lot more to baseball than throwing hard and fast.\""
2000005-39 = "Don't worry."
2000005-40 = "I know that."
2000005-41 = "What kind of pitching machine would it be if it didn't have a curveball?"
2000005-42 = "Pitchers that only throw fastballs are easy to hit against, right?"
2000005-43 = "There's also forkballs, sinkers, sliders...even knuckleballs."
2000005-44 = "Part of the game is pitching in an unpredictable trajectory..."
2000005-45 = "Changeups are slower than fastballs, but they can be just as menacing."
2000005-46 = "But hitting typical changeups and straight pitches isn't enough."
2000005-47 = "That alone won't earn the team a berth into the Interhigh Championship."
2000005-48 = "So I racked my brain until I thought of a special function to help them out."
2000005-49 = "Don't be alarmed, now."
2000005-50 = "This pitching machine can throw something called a \"Magicball.\""
2000005-51 = "As soon as it leaves the pitcher's hand...it disappears."
2000005-52 = "Or is the Magicball the one that goes up in flames? I can't remember."
2000005-53 = "Wait... There's also the one that splits up into a bunch of different balls so that you can't tell which one to hit."
2000005-54 = "There's also the one that emits a magnetic field and electrocutes the batter..."
2000005-55 = "[s7] \"Incredible! How is that even possible?!\"\n[s8] \"I'm pretty sure that last one is technically cheating.\""
2000005-56 = "Actually, it's quite simple."
2000005-57 = "Actually, it's quite simple."
2000005-58 = "The driving principle is basic: the Magicball uses optical camouflage and the flaming ball is coated with a flammable material so it can ignite."
2000005-59 = "The Magicball has technology you're familiar with. It uses a hologram of multiple balls flying at the same speed."
2000005-60 = "As for the magnetball..."
2000005-61 = "Huh? You think that's cheating?"
2000005-62 = "*sigh* I'll never understand sports."
2000005-63 = "Still, I get your point. I'll do what I can within the rules to make improvements to the changeups."
2000005-64 = "Thanks for all the help, Sensei."
2000005-65 = "There's one other thing I wanted to add too... "
2000005-66 = "A wireless speaker."
2000005-67 = "Experienced pitchers don't need to waste time throwing checks to first base."
2000005-68 = "They can guarantee strikes without having to even pitch the ball—with words and mind games."
2000005-69 = "That's why I gave my pitching machine the ability to trash talk."
2000005-70 = "Have a listen."
2000005-71 = "\"Come on, chicken! Hurry up!\""
2000005-72 = "\"Wow, are you slow! I'll pitch three strikes before you can even swing!\""
2000005-73 = "\"I'm gonna send you crying home to Mommy!\""
2000005-74 = "What do you think? What batter could possibly stay cool when it's shouting stuff like that at them?"
2000005-75 = "You'd have to be one of the greatest hitters alive to overcome that kind of trash talk!"
2000005-76 = "Heh heh. "
2000005-77 = "Are you as impressed as I am?"
2000005-78 = "That's a relief. It was touch and go for a while there, but I think I'm on the right track."
2000005-79 = "I'll deliver it to the baseball club after we complete the final tests!"
2000005-81 = "(Surely enough, the pitching machine helped the Millennium Baseball Club qualify for the Interhigh Championship.)"
