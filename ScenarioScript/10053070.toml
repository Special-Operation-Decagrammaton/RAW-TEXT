[translation]
10053070-1 = "Episode 7;The Ultimate Ghost Story"
10053070-3 = "Ah, Konoka. Sensei."
10053070-4 = "What happened to you two? We were about to start a search party!"
10053070-5 = "And why are you both so sweaty? And out of breath?"
10053070-10 = "Oh, Rena, I don't want to talk about it... It was an act of desperation!"
10053070-11 = "[ns1] \"Nothing happened...!\"\n[ns2] \"Well, a FEW things happened...\""
10053070-16 = "...? Something DEFINITELY happened."
10053070-18 = "I explained the incident in the phone booth."
10053070-19 = "Afterward, we all compared notes on that, the suspicious bus, and the stone doll."
10053070-22 = "What?! That was a GHOST BUS? I was threatening a GHOST? Why didn't you tell me?"
10053070-23 = "Because you'd get scared and freak out, obviously."
10053070-24 = "Throw salt! Circle the area!"
10053070-25 = "Sensei, sweat has a lot of salt. Maybe we're protected?"
10053070-27 = "[ns3] \"Sounds like a gray area...\"\n[ns4] \"We should still shower when we get back...\""
10053070-32 = "If all this is true, then it seems you two faced a poltergeist."
10053070-33 = "While poltergeists are mainly known for moving objects and flickering lights, they're also capable of causing sudden temperature fluctuations."
10053070-37 = "But it is strange. I am...fairly experienced in this field of study..."
10053070-38 = "...And I have encountered more paranormal phenomena in the past twenty-four hours than in the entirety of my career."
10053070-42 = "I noticed that too."
10053070-43 = "So, are you implying that someone's behind all this?"
10053070-44 = "Huh? Not at all... I am just noting that the density of paranormal occurrences has been exceptionally high."
10053070-45 = "Perhaps we are above ancient ruins, or aliens are conducting experiments over the area."
10053070-46 = "Are you serious...? You actually are."
10053070-50 = "...Maybe the Seven Prisoners are behind this?"
10053070-51 = "Common sense dictates that these can't all be coincidence. Logically, someone is targeting us."
10053070-52 = "Who among the Seven Prisoners is capable of this?"
10053070-57 = "Hmm, as long as it's not a ghost, I'll go with it."
10053070-58 = "If it's the criminal I'm thinking of...then I wouldn't be surprised. She's a planner. And always eerily prepared."
10053070-59 = "Is this the same prisoner you suspected last time?"
10053070-60 = "As a matter of fact, it is."
10053070-61 = "Ugh... I hate this. Of all the places, why did the Tsuchinoko have to show up here?"
10053070-62 = "Or, MAYBE, this is what attracted the Tsuchinoko?"
10053070-68 = "Wait. I see headlights coming! Let's hop in the taxi, get back to the lodge..."
10053070-72 = "...and think...this..."
10053070-76 = "...?"
10053070-79 = "...?!"
10053070-81 = "HEY! YOU LITTLE PUNKS! I'VE HAD IT WITH YOU!"
10053070-82 = "There's...a lot going on."
10053070-83 = "So dreadfully incohesive. It's more confusing than scary..."
10053070-84 = "LOOK, I WASN'T GOING TO MAKE YOU GET ON! BUT YOU HAD TO THREATEN ME WITH A TICKET?"
10053070-85 = "AND GO ALL TRIGGER HAPPY ON MY PHONE BOOTH?"
10053070-86 = "AND WHO IN THEIR RIGHT MIND DIGS EIGHT METERS DOWN?"
10053070-89 = "They seem to have quite the grudge."
10053070-90 = "They have some nerve mentioning a \"right mind\"..."
10053070-91 = "Even Konoka wouldn't find this scary..."
10053070-93 = "Wahhh?! What is that?!"
10053070-94 = "Oh. Never mind."
10053070-96 = "You! You silver devil! This is all your fault!"
10053070-97 = "I'll show you true terror!!"
10053070-99 = "They're heading for Konoka! Watch out!"
10053070-101 = "Aaaaaa, aaaaa..."
10053070-103 = "Oh no! She's freezing up!"
10053070-104 = "Hey! If you want to reenact a ghost story, then follow the script! You can't just run people over! Scare me, instead! I dare you!"
10053070-106 = "The ultimate ghost story is in creating one!"
10053070-107 = "Stop lying!! You're not a ghost at all, are you?"
10053070-108 = "...Eh?"
10053070-110 = "You're so scared that you can't even scream! End of the line!"
10053070-111 = "No! Konoka, you're going to get hit! You have to dodge! Please!"
10053070-112 = "S-Sensei!"
10053070-113 = "[ns5] \"I'll handle this!\"\n[ns6] \"Take Konoka and run...!\""
10053070-119 = "..."
10053070-124 = "Aaaaugh!"
10053070-129 = "..."
10053070-132 = "..."
10053070-136 = "Owwwwwwww! That reaaaaaaally hurt!"
10053070-137 = "Agh! Ugh! Oooh, that was hard."
10053070-141 = "What...just happened?"
10053070-142 = "Tsubasa, did you see that?"
10053070-143 = "[s7] \"She destroyed it...with her fist...\"\n[s8] \"It was a marvelous straight punch.\""
10053070-146 = "Ah, really... How did you...right up until the end?"
10053070-147 = "It just doesn't make sense..."
10053070-148 = "*static*"
10053070-149 = "Tsubasa? Hey, Tsubasa?"
10053070-155 = "Sensei, she's down!"
10053070-157 = "Ah, this really is the WORST! I took vacation days for this! I want to go home!"
10053070-159 = "So, it seemed the ghost encounter ended anticlimactically without anyone learning anything."
10053070-163 = "And, later that night..."
10053070-166 = "...To pass out during such a critical moment... As the leader of the expedition team, I'm so ashamed."
10053070-167 = "Konoka, you were about to be hit. How did you make it out?"
10053070-173 = "Ugh, well... Somehow..."
10053070-174 = "While there's no such thing as magic in this world, sometimes even WEIRDER things can happen."
10053070-176 = "...?"
10053070-177 = "I don't understand, but it seems like everything's resolved?"
10053070-178 = "Resolved... Resolved...?"
10053070-179 = "No. Not at all. I don't know what ANY of that was about. What do you think, Sensei?"
10053070-180 = "[s9] \"I know it wasn't normal.\"\n[s10] \"And... I think we should get out of here.\""
10053070-183 = "Then we agree."
10053070-184 = "A no-no. What about the Tsuchinoko?!"
10053070-185 = "You still want that thing?"
10053070-186 = "Since it's my bad luck that attracted the ghost, it's my duty to find the Tsuchinoko!"
10053070-188 = "It seems you two are split on our next course of action."
10053070-189 = "Nevertheless, it's late, and there is no point in moving out tonight."
10053070-190 = "Let's sleep for now, and decide what to do in the morning."
10053070-191 = "Oh, NOW you're acting like a leader? Well... I agree with you, actually."
10053070-196 = "...sei. Psst."
10053070-201 = "Sensei."
10053070-202 = "[s11] \"What's up, Konoka?\"\n[s12] \"Can't sleep?\""
10053070-208 = "Shh. Sensei."
10053070-209 = "Someone is outside the window."
10053070-210 = "[s13] \"What?\"\n[s14] \"Who? Since when?\""
10053070-213 = "I don't know. We just noticed."
10053070-214 = "More accurately, I noticed after I saw that Konoka was up."
10053070-215 = "The fact that they're watching us now makes it highly likely they're behind everything."
10053070-221 = "My hunch is still that it's one of the Seven Prisoners."
10053070-222 = "...Mitsui Kyoko."
10053070-227 = "Konoka. I prepped the camera. We can start recording when you're ready."
10053070-228 = "...Good. Then, we'll rush them on the count of three."
10053070-229 = "One. Two..."
10053070-230 = "Charge!!!"
10053070-239 = "H-Hm?! H-Huh? What?"
10053070-245 = "...? They were right here! Where'd they go?"
10053070-246 = "You saw them, right?"
10053070-247 = "Yes. They were standing there, peering in, until Konoka opened the window. I am sure of it."
10053070-248 = "But they disappeared into thin air?"
10053070-249 = "Ah, right. Director, did you get that photo?"
10053070-250 = "I will take a look, but don't hold your breath."
10053070-251 = "We were supposed to move on \"three.\""
10053070-257 = "What's all that racket? What happened, Sensei?"
10053070-258 = "[s15] \"Apparently, someone was outside.\"\n[s16] \"We think they're behind all the strangeness.\""
10053070-261 = "Outside? And you said they were looking \"through\" the window?"
10053070-262 = "...?"
10053070-263 = "What's the matter? You still half asleep, or something?"
10053070-264 = "No, I'm fine. But isn't it weird if you think about it?"
10053070-269 = "We're on the second floor."
