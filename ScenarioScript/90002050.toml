[translation]
90002050-1 = "Episode 5;Advance Base"
90002050-4 = "This is the last laptop, Ms. Rio. Should I place it here?"
90002050-5 = "Yes. That'll do. "
90002050-11 = "That said, this place looks..."
90002050-12 = "As a designer, I'm almost...inspired?"
90002050-13 = "[s] \"They weren't kidding when they called it a 'continent' of 'steel.'\""
90002050-15 = "Right. Those girls really do have a knack for naming things."
90002050-16 = "(She thinks...)"
90002050-17 = "(...that was a good name...?)"
90002050-18 = "Wh-Why are we...setting up a base here...though?"
90002050-19 = "That's because of the Steel Continent's unique nature."
90002050-20 = "Its unique nature?"
90002050-21 = "Yes. From what I can tell, even as we speak, our location and information are being processed in real time."
90002050-23 = "Eh? Like a personal information breach? Are we being hacked?! Who?"
90002050-24 = "Well, look around."
90002050-25 = "The very Steel Continent that we're on."
90002050-26 = "That's...what's hacking us...?"
90002050-27 = "The Steel Continent's ground... Well, \"ground\" for the purposes of this conversation."
90002050-28 = "The ground, the walls, everything is a part of the circuitry and machinery that makes up the Steel Continent. Like a large computer."
90002050-29 = "Which is how every breath we take is being monitored right now."
90002050-30 = "Um... So you mean to say that... The floors, the walls, everything around us is watching us?"
90002050-31 = "Yes. You can think of it that way."
90002050-32 = "Is there anything we can do about it, Kei...?"
90002050-33 = "Of course there is. That's what Himari and Rio are working on."
90002050-39 = "In simple terms, we're creating a secure location."
90002050-40 = "We are electronically...borrowing control over this area from the engineers."
90002050-41 = "Sort of a semi-permanent permission transfer."
90002050-42 = "[s] \"How long do you think it's going to take?\""
90002050-44 = "It's not something we've done before, so we'll only know when we're done."
90002050-45 = "But we're using the transport ship for power, so we'll be sitting ducks until we've occupied this zone."
90002050-46 = "At the cost of converting the enemy's territory into our own..."
90002050-47 = "...we're also restricting our own movement."
90002050-48 = "A painful conclusion, but you're right, Toki."
90002050-53 = "Understood, Ms. Rio. In that case, I will be on alert and guard this area with my life."
90002050-54 = "Me too! I will join her!"
90002050-55 = "Thank you. You're all so reliable."
90002050-56 = "I'll scout ahead for any of Decagrammaton's forces or Laborers coming to our location."
90002050-57 = "Understood. But don't go too far. It'll disperse our forces."
90002050-58 = "Yes, Ms. Rio."
90002050-61 = "They have broken through...Yesod."
90002050-68 = "...Naturally, I anticipated even this worst of scenarios. Would you like to respond with the next phase?"
90002050-69 = "...Sof?"
90002050-79 = "Hello, Sof. What are you doing alone?"
90002050-80 = "..."
90002050-81 = "Some things darken your thoughts. You wish to speak them aloud, yes, Sof?"
90002050-82 = "Elder Sister..."
90002050-83 = "While the answers are often not ones we seek, at times we must face them nonetheless."
90002050-84 = "So I will ask, what happened to Yesod?"
90002050-85 = "...!!"
90002050-86 = "It is okay, Sof."
90002050-87 = "B-But... We...!"
90002050-88 = "It's okay. It's all okay."
90002050-89 = "I...because of me, everything is..."
90002050-95 = "E-Elder Sister?! I-I can't breathe..."
90002050-96 = "Shh. Let us remain, like so, for just this moment."
90002050-97 = "*sniff* *sob*"
90002050-98 = "Yes, well done, Sof. Simply be, as you are."
90002050-101 = "Are your circuits now regulated?"
90002050-102 = "Yeah..."
90002050-103 = "Then I must make another inquiry."
90002050-104 = "What can I do, Sof?"
90002050-105 = "...!"
90002050-106 = "You need not look so apprehensive."
90002050-107 = "I am your elder sister, am I not, Sof? Naturally, I know what it is you desire."
90002050-108 = "And you are also my younger sister, so I also know why it is you do not speak."
90002050-109 = "So, you must not worry. I too must do what it is I can."
90002050-115 = "We... We just don't want to lose you!"
90002050-120 = "We just...really don't want to lose you, Elder Sister..."
90002050-121 = "Yes. I know."
90002050-122 = "Which must be why Ein, Sof, and Ohr brought me to this place, the Foundation of Zohar."
90002050-123 = "Despite my maintenance being complete."
90002050-124 = "Ugh...!"
90002050-125 = "Kind Sof, please do not bear this sadness alone."
90002050-126 = "I am aware that our paths forward have narrowed into one."
90002050-127 = "We will walk that path, as we must."
90002050-128 = "And, when all is said and done, I shall return to you."
90002050-129 = "Elder Sister..."
90002050-131 = "Question. Will that be enough?"
90002050-132 = "?!"
90002050-133 = "..."
90002050-138 = "...How'd you find us here?"
90002050-139 = "Ah, a triviality. There are only so many places you can go, after all."
90002050-140 = "I simply calculated the remaining probabilities and selected the most likely."
90002050-141 = "Do you remember? The first promise we made to each other?"
90002050-142 = "\"Come what may, we swear to prevent Elder Sister from dispatching until the Final Coming.\""
90002050-143 = "..."
90002050-144 = "And this is why we are here now, is it not? To prevent that from coming to fruition."
90002050-145 = "..."
90002050-146 = "Tell me. How will you explain when the other prophets discover the truth?"
90002050-150 = "...I know. I'm sorry. This is all my fault."
90002050-151 = "But...! But we still have to stop...those people. No matter what."
90002050-152 = "The situation changed once they defeated Yesod. You know as well as I do."
90002050-153 = "...Yes, as does Ein. She actually fainted."
90002050-154 = "I know that it's wrong to ask Elder Sister for her help. But if the situation gets any worse than it is..."
90002050-155 = "Then we'll only need her assistance that much more! If it comes to that, then it's all over."
90002050-156 = "We won't be able to do anything to stop the Final Coming."
90002050-157 = "..."
90002050-159 = "Ohr. Sof is—"
90002050-161 = "Eheehee. Don't worry. I know, I know! I am in complete and total agreement. "
90002050-162 = "I could hardly pass up a chance to tease Sof, though, could I?"
90002050-163 = "Hey!"
90002050-165 = "Naturally. I understand."
90002050-167 = "Now lower your fists! I, your fellow engineer, have come to discuss engineering with you!"
90002050-168 = "...If you say one more thing out of line, I'm not above smacking you again."
90002050-169 = "Look. All other circumstances aside, this is fundamentally a nigh impossible undertaking."
90002050-170 = "If we wish to succeed, we must hide Elder Sister's dispatch from everyone. That we must."
90002050-171 = "Yes... There's no other way."
90002050-172 = "On the other hand, we'll need to redirect every ounce of energy the Steel Continent can muster to Elder Sister. "
90002050-173 = "These two conditions contradict each other. One cannot be while the other is."
90002050-174 = "...That's true."
90002050-175 = "In summary, you must not be late in returning. Understood?"
90002050-176 = "So, a time limit. I'd expected as much. What about it?"
90002050-177 = "Well, this is where I step into the spotlight!"
90002050-178 = "Do you have a solution?"
90002050-179 = "When it comes to...redirecting the prophets' attentions, you may rely on me. It's rather my field of expertise, is it not?"
90002050-180 = "Doesn't that mean you intend to...lie to our allies?!"
90002050-181 = "That I do! Give me one of those human proverbs you're so fond of for this situation, Sof."
90002050-182 = "There is one. Something like, \"To fool your enemy, you must first make a fool of yourself.\""
90002050-183 = "I knew you'd have one. Now, it's still essential that you return on time! Do NOT go over the time limit!"
90002050-184 = "Even with my myriad of competencies at my disposal, there are limits to even my capabilities."
90002050-186 = "Does this please you, Sof?"
90002050-191 = "...Thank you."
90002050-197 = "What...are you doing? Why are you holding your hand out to me?"
90002050-198 = "Humans call it a \"handshake.\" You're supposed to hold it, like this, and shake it. It's something they do when making a promise."
90002050-199 = "...Another meaningless, mysterious, human custom... I suppose I have nothing to criticize about it."
90002050-200 = "May I participate as well? In this \"handshake\"?"
90002050-201 = "R-Really? Of course...!"
90002050-202 = "An enjoyable practice. I believe the three of us have grown closer through it. "
90002050-207 = "U-Um... But what about...Netzach? What are you going to do about the Steel Continent?"
90002050-208 = "Huh?!"
90002050-209 = "Ein?!"
90002050-210 = "Are you feeling better, Ein?"
90002050-215 = "Eheehee. Yeah! I'm sorry. I got dizzy, but now I'm better!"
90002050-216 = "But more importantly... Your plan... It won't work on Netzach."
90002050-217 = "It IS the Steel Continent itself right now. It'd be weirder if it couldn't tell what was happening on top of itself."
90002050-219 = "Ah. That's a good point..."
90002050-220 = "I guess even Ohr can't lie her way through that one..."
90002050-221 = "Let's think logically, okay? Do you think that'd be possible for anyone?"
90002050-222 = "Ugh. Fine. You win."
90002050-224 = "Eheehee... But it'll be okay! Netzach...said it'll let it slide, just this once."
90002050-225 = "Huh? Really?"
90002050-226 = "Yes! Although... It really does mean \"just this once\"..."
90002050-227 = "Even that is gracious of it. And once is all we need, yes, Sof?"
90002050-229 = "...! "
90002050-230 = "Y-Yeah! Once is all we need!"
90002050-232 = "Then Ein, Sof, and Ohr."
90002050-236 = "Please watch over me for my first mobilization."
90002050-239 = "Yes!"
90002050-241 = "Next Episode;Malkuth"
