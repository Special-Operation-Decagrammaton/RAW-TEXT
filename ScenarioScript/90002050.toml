[translation]
90002050-1 = "第5話;前進基地"
90002050-4 = "這是最後一台筆電了。#n莉央大人，要放在這裡嗎？"
90002050-5 = "嗯，放在那裡就行了。 "
90002050-11 = "話說回來，這裡的景色真是……"
90002050-12 = "感覺能獲得設計的靈感呢……"
90002050-13 = "[s]「確實是名符其實的『鋼鐵大陸』呢。」"
90002050-15 = "是啊……看來那些孩子就直觀性而言，似乎有不錯的命名品味呢。"
90002050-16 = "（不錯的……？）"
90002050-17 = "（品味……？）"
90002050-18 = "那，那個……為什麼要特地到外面來做這種……準備之類的事呢……？"
90002050-19 = "是因為鋼鐵大陸區域的特殊性。"
90002050-20 = "特殊性？"
90002050-21 = "根據我的分析……即便是此時此刻，我們的所在位置和其他資訊也正在被即時竊取。"
90002050-23 = "嗯？這是什麼個資外洩的駭客事件嗎！？到底是誰！？"
90002050-24 = "那當然是……"
90002050-25 = "這座鋼鐵大陸本身。"
90002050-26 = "鋼鐵大陸正在竊取我們的資訊……？"
90002050-27 = "雖然不知道這究竟能不能被稱為地面……#n總之，這裡的地面在本質上……"
90002050-28 = "幾乎等同於一個巨大的金屬基底電路、機械裝置與電腦系統。"
90002050-29 = "正因如此，我們的一舉一動現在幾乎都被即時監控著。"
90002050-30 = "所以……這片地板、那面牆壁，還有所有看起來像是建築的東西都在監視我們嗎？"
90002050-31 = "算是吧。"
90002050-32 = "沒有什麼辦法嗎，Kei……？"
90002050-33 = "當然有。現在陽葵和莉央正在實時處理。"
90002050-39 = "簡單解釋的話，我們現在開始要「佔領」這個地方。"
90002050-40 = "也就是將這片區域的主導權，從那些孩子手中以電子形式暫時借來。"
90002050-41 = "可以說是一種半永久性的權限轉移。"
90002050-42 = "[s]「大約要花多少時間呢？」"
90002050-44 = "目前還得等試了之後才知道。"
90002050-45 = "不過在完成區域佔領之前，必須將運輸船的資源轉換為運算裝置。#n因此在佔領期間，我們無法隨意移動位置。"
90002050-46 = "也就是說，我們雖然正在將敵方區域轉換為我方區域……"
90002050-47 = "卻也因此限制住了自己的行動吧。"
90002050-48 = "雖然是個令人難受的結論，不過事實就是如此。季。"
90002050-53 = "我明白了，莉央大人。#n那麼我將以最高警戒的狀態守護這裡。"
90002050-54 = "是！愛麗絲也要一起！"
90002050-55 = "太感謝了。大家都很可靠呢。"
90002050-56 = "那我就去巡視一下附近吧。#n說不定會有十字神名的兵力或勞工機器人過來。"
90002050-57 = "嗯，不過也不要走得太遠，否則戰力會被分散的。"
90002050-58 = "我知道了，會長。"
90002050-61 = "耶索德……被突破了呢。"
90002050-68 = "……事先姑且有預測了這種情況，要往那個方向前進嗎？"
90002050-69 = "……Soph？"
90002050-79 = "你好，Soph。#n這次只有你一個人嗎？"
90002050-80 = "……"
90002050-81 = "你看來有話想說。#n對吧，Soph？"
90002050-82 = "姐姐大人……"
90002050-83 = "雖然大家都已經知道了，我還是想再確認一次。"
90002050-84 = "耶索德現在的情況如何？"
90002050-85 = "……！！！"
90002050-86 = "沒關係的，Soph。"
90002050-87 = "但，但是……我們…… ！"
90002050-88 = "沒關係，大家都沒事。"
90002050-89 = "這都要怪我……全都是我的錯……"
90002050-95 = "姐，姐姐大人！？呼，呼吸有點……"
90002050-96 = "噓。就這樣……保持安靜。"
90002050-97 = "唔……唔唔……！"
90002050-98 = "很好，Soph。#n暫時先維持這樣吧。"
90002050-101 = "稍微冷靜一點了嗎？"
90002050-102 = "嗯……"
90002050-103 = "那麼就進入下一個話題吧。"
90002050-104 = "有什麼我能做的事嗎，Soph？"
90002050-105 = "……！"
90002050-106 = "沒必要那麼驚訝。"
90002050-107 = "我知道Soph想要什麼。#n畢竟我可是Soph的姐姐啊。"
90002050-108 = "我也明白為什麼Soph現在一句話都說不出來。#n因為Soph是我的妹妹。"
90002050-109 = "所以沒關係的。#n我也會去做自己力所能及的事。"
90002050-115 = "我們不想失去姐姐大人！"
90002050-120 = "只是……不想失去姐姐大人而已。"
90002050-121 = "是的，這點我也很清楚。"
90002050-122 = "所以Ain、Soph和Aur才會把我送來佐哈爾基地吧。"
90002050-123 = "明明我已經不再需要任何維護了。"
90002050-124 = "嗚嗚……！"
90002050-125 = "善良的Soph。請不要太難過。"
90002050-126 = "我明白的。而且我也知道該怎麼做才是「次選方案」。"
90002050-127 = "所以不用擔心。一切都會順利的。"
90002050-128 = "我會迅速結束後，盡快趕回來的。"
90002050-129 = "姐姐大人……"
90002050-131 = "可是……那樣真的就夠了嗎？"
90002050-132 = "！？"
90002050-133 = "……"
90002050-138 = "……你是怎麼知道的啊？"
90002050-139 = "事到如今還問這個……反正我們要去的地方早就已經註定了不是嗎？"
90002050-140 = "我只是把剩下的機率與變數全部推算一次，選出可能性最高的地方而已。"
90002050-141 = "這麼一說我倒想起來了。#n你還記得我們一開始是怎麼約定的嗎？"
90002050-142 = "不是說好無論發生什麼事──#n在「那個時候」到來之前， 都絕對不能讓姐姐大人走到外面去的嗎？"
90002050-143 = "……"
90002050-144 = "而且我們也是為了避免「那個時候」到來才這麼做的。"
90002050-145 = "……"
90002050-146 = "試著思考一下吧。#n要是這個情報被其他預言者知道的話，到時候你打算怎麼辯解？"
90002050-150 = "……對不起。這全都是我的錯。我無從辯解。"
90002050-151 = "但是……我們必須阻止那些人。"
90002050-152 = "耶索德被突破就意味著那件事。#n你應該也多少明白了吧？"
90002050-153 = "……是啊。Ain甚至直接昏過去了呢。"
90002050-154 = "你說的對，我們不該向姐姐大人求助。#n可是，如果現在不採取行動的話……"
90002050-155 = "到頭來，我們只會被迫向姐姐大人尋求更多協助。#n要是那樣的話……"
90002050-156 = "我們就再也無法阻止「那個時候」的到來了……"
90002050-157 = "……"
90002050-159 = "Aur。Soph他──"
90002050-161 = "沒關係，真的沒關係的哦？#n其實我都知道，而且我也不是過來追究的。 "
90002050-162 = "只是想稍微捉弄一下Soph而已！"
90002050-163 = "喂！"
90002050-165 = "果然如此啊。"
90002050-167 = "且慢！你先把手放下！#n我也是為了談工程上重要的事情才來的。"
90002050-168 = "要是敢再亂說話，我真的會扁你哦……"
90002050-169 = "聽我說。即便撇開其他條件，這件事本身也並不容易。"
90002050-170 = "首先，我們必須對其他預言者隱瞞姐姐大人出擊這件事──這是最重要的前提。"
90002050-171 = "嗯……沒錯。"
90002050-172 = "然而與此同時，我們又必須將鋼鐵大陸的全部能源，暫時集中到姐姐大人身上。 "
90002050-173 = "這兩個條件是相互矛盾的──你應該也知道吧。"
90002050-174 = "……嗯。"
90002050-175 = "也就是說，這件事必然會存在著時間限制。#n能理解我的意思嗎？"
90002050-176 = "時間限制……到目前為止都是必然的結果。然後呢？"
90002050-177 = "然後就該輪到我出場了！"
90002050-178 = "你有方法嗎？"
90002050-179 = "總之呢……將其他預言者「蒙混過去」的工作就交給我吧。#n畢竟這本來就是我的專長嘛？"
90002050-180 = "意思是說……你打算蒙騙自己人嗎！？"
90002050-181 = "可以這麼說吧。#nSoph熟悉的人類諺語之中，不是也有類似的話嗎？"
90002050-182 = "這倒是真的。#n比如「想要欺騙敵人，就得先欺騙隊友」之類的。"
90002050-183 = "果然有吧？不過一定要嚴守時間才行。"
90002050-184 = "要是超過一定程度的話，我就無法掩蓋過去了。#n欺瞞終究是有極限的。"
90002050-186 = "事情就是這樣。#n現在可以了嗎，Soph？"
90002050-191 = "……謝謝。"
90002050-197 = "這是……什麼意思？#n為什麼要對我伸手……？"
90002050-198 = "握住這隻手，然後上下搖晃……這就是所謂的握手。#n聽說人類在做重要約定，或者下定決心的時候好像會這麼做。"
90002050-199 = "又是難以理解的人類習慣啊……算了，反正這也沒什麼不好。"
90002050-200 = "那麼也和我來一次吧？那個所謂的握手。"
90002050-201 = "咦……？#n啊，嗯……"
90002050-202 = "真不錯呢。#n感覺Soph和Aur好像變得更加親近了。 "
90002050-207 = "那，那個……涅察赫醬……鋼鐵大陸本身該怎麼處理呢……？"
90002050-208 = "嗯！？"
90002050-209 = "Ain！？"
90002050-210 = "身體還好嗎，Ain？"
90002050-215 = "耶嘿嘿，嗯！#n對不起，剛才一時有點頭暈……現在已經沒事了……！"
90002050-216 = "比起這個，就算能對其他人隱瞞姐姐大人的出擊……恐怕也很難不被涅察赫醬發現。"
90002050-217 = "因為涅察赫醬……現在就是鋼鐵大陸……#n自己身上發生什麼事，應該不可能……不知道吧。"
90002050-219 = "說的也是……"
90002050-220 = "那裡真的瞞不住嗎……"
90002050-221 = "理性地思考一下吧。#n你覺得有可能嗎？"
90002050-222 = "唔，這次還真的無可反駁……"
90002050-224 = "耶嘿嘿……不過沒關係的！#n涅察赫醬說……這次會睜一隻眼閉一隻眼。"
90002050-225 = "咦？真的嗎？"
90002050-226 = "是的！不過他也說……下次恐怕就沒辦法了……"
90002050-227 = "至少我們有一次機會。#n而且……只要一次就足夠了。對吧，Soph？"
90002050-229 = "……！"
90002050-230 = "沒錯，只要一次就夠了！"
90002050-232 = "那麼Ain、Soph、Aur。"
90002050-236 = "我的初次出擊就拜託你們了。"
90002050-239 = "是！"
90002050-241 = "下一話;馬爾庫特"
