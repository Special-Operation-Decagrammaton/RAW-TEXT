[translation]
90002050-1 = "ตอนที่ 5;ฐานทัพหน้า"
90002050-4 = "นี่เป็นโน้ตบุ๊กเครื่องสุดท้ายค่ะ ท่านริโอะ ให้วางไว้ที่นี่มั้ยคะ?"
90002050-5 = "อื้อ ตรงนั้นละ "
90002050-11 = "จะว่าไป ทัศนียภาพที่นี่มัน..."
90002050-12 = "ในบางแง่ มันเหมือนจะให้แรงบันดาลใจเกี่ยวกับการออกแบบเลยละ..."
90002050-13 = "[s] \"เป็น 'ดินแดน' แห่ง 'เหล็กกล้า' จริงๆ ด้วยนะ\" "
90002050-15 = "นั่นน่ะสิ... ในทางสัญชาตญาณแล้ว เด็กๆ พวกนั้นดูจะมีเซนส์ที่ดีในการตั้งชื่อนะ"
90002050-16 = "(เซนส์...?)"
90002050-17 = "(ที่ดี...?)"
90002050-18 = "ตะ... แต่ทำไมถึงต้อง... ออกมาข้างนอก... แล้วเตรียมการอะไรแบบนี้ด้วยล่ะคะ...?"
90002050-19 = "เป็นเพราะลักษณะพิเศษของดินแดนเหล็กกล้านี้น่ะ"
90002050-20 = "ลักษณะพิเศษงั้นเหรอคะ?"
90002050-21 = "ใช่ค่ะ จากที่ฉันวิเคราะห์มา ตอนนี้พวกเรา... กำลังถูกขโมยข้อมูลตำแหน่งที่อยู่และข้อมูลอื่นๆ ไปแบบเรียลไทม์เลยละค่ะ"
90002050-23 = "เอ๋? เหมือนกับการแฮ็กข้อมูลส่วนตัวน่ะเหรอ?! ใครกันที่ทำเรื่องแบบนี้น่ะ!?"
90002050-24 = "ตอบได้อย่างแน่นอนเลยว่า"
90002050-25 = "ก็ดินแดนเหล็กกล้าแห่งนี้นั่นละ"
90002050-26 = "ดินแดนเหล็กกล้ากำลังเอาข้อมูลของพวกเราไปงั้นเหรอคะ...?"
90002050-27 = "ก็พื้นดินในดินแดนเหล็กกล้า... ฉันไม่แน่ใจว่าเราจะเรียกว่าพื้นดินได้หรือเปล่านะคะ แต่ก็เอาเถอะ"
90002050-28 = "พื้นดินของที่นี่ไม่ต่างกับพื้นที่ประกอบด้วยเครื่องจักร คอมพิวเตอร์ และวงจรโลหะขนาดใหญ่ค่ะ"
90002050-29 = "และนั่นก็คือเหตุผลที่แม้กระทั่งตอนนี้ ทุกการเคลื่อนไหวของเราจึงถูกเฝ้าดูแบบเรียลไทม์ค่ะ"
90002050-30 = "อ่า... สรุปง่ายๆ ว่า... พื้นตรงนี้ ผนังตรงนั้น และสิ่งที่ดูเหมือนจะเป็นตึกกำลังจ้องมองเราอยู่งั้นเหรอ?"
90002050-31 = "ใช่ค่ะ จะว่าอย่างนั้นก็ได้ค่ะ"
90002050-32 = "เราทำอะไรไม่ได้เลยเหรอคะ เคย์...?"
90002050-33 = "ไม่หรอกค่ะ ตอนนี้ฮิมาริกับริโอะก็กำลังรับมือแบบเรียลไทม์อยู่เหมือนกันค่ะ"
90002050-39 = "ถ้าให้พูดอย่างง่ายที่สุด จากนี้พวกเราต้อง... 'ยึด' ที่ตรงนี้ไว้ให้ได้"
90002050-40 = "ก็เหมือนเราไปหยิบยืมอำนาจในการควบคุมพื้นที่ในรูปแบบอิเล็กทรอนิกส์มาจากเด็กๆ เหล่านั้นน่ะค่ะ"
90002050-41 = "จะเรียกว่าเป็นการถ่ายโอนอำนาจแบบกึ่งถาวรก็ได้ค่ะ"
90002050-42 = "[s] \"จะใช้เวลานานแค่ไหนเหรอ?\""
90002050-44 = "ต้องลองทำดูก่อนถึงจะรู้น่ะ"
90002050-45 = "แต่จนกว่าจะยึดครองพื้นที่สำเร็จ ทรัพยากรของยานขนส่งจะต้องถูกแปลงเป็นหน่วยประมวลผล เพราะงั้นเราจะเคลื่อนที่ไปมาได้อย่างอิสระในระหว่างนี้ไม่ได้"
90002050-46 = "สรุปว่าตอนนี้พวกเราจะเปลี่ยนดินแดนของศัตรูให้เป็นดินแดนของพวกเรา"
90002050-47 = "แต่เราก็จะมีข้อจำกัดในการเคลื่อนไหวสินะคะ"
90002050-48 = "ถึงจะเป็นข้อสรุปที่เจ็บปวด แต่มันก็ถูกต้องแล้วละ โทคิ"
90002050-53 = "เข้าใจแล้วค่ะ ท่านริโอะ ฉันจะเฝ้าระวังที่สถานที่นี้อย่างเข้มงวดที่สุดค่ะ"
90002050-54 = "ค่ะ! อาริสึก็จะร่วมมือด้วยค่ะ!"
90002050-55 = "ขอบคุณค่ะ น่าอุ่นใจจังเลยนะคะ"
90002050-56 = "งั้นฉันจะไปสำรวจรอบๆ ให้นะ ดีไม่ดีอาจมีกองกำลังหรือหุ่นรับใช้ของเดคาแกรมมาทอนแห่เข้ามาก็ได้"
90002050-57 = "อื้อ แต่ก็อย่าไปไกลนักล่ะ เกาะกลุ่มกันไว้จะดีกว่า"
90002050-58 = "เข้าใจแล้ว ประธาน"
90002050-61 = "เยซ็อด... ถูกโจมตีจนได้สินะคะ"
90002050-68 = "ฉันก็ประเมินสถานการณ์แบบนี้ไว้บ้างแล้ว... งั้นเราควรไปต่อในทิศทางนั้นเลยมั้ยคะ?"
90002050-69 = "ซอฟ...?"
90002050-79 = "สวัสดีค่ะ ซอฟ รอบนี้มาคนเดียวเหรอคะ?"
90002050-80 = "..."
90002050-81 = "คงมีอะไรอยากพูดกับฉันสินะคะ ใช่มั้ยล่ะคะ ซอฟ?"
90002050-82 = "พี่มัลคูธ..."
90002050-83 = "ฉันรู้ว่าพวกเรารู้เรื่องนี้กันอยู่แล้ว แต่ขอถามให้แน่ใจอีกครั้งนะคะ"
90002050-84 = "เยซ็อด... เป็นยังไงบ้างคะ?"
90002050-85 = "...!!!"
90002050-86 = "ไม่เป็นไรค่ะ ซอฟ"
90002050-87 = "ตะ... แต่ว่า... พวกเรา...!"
90002050-88 = "ไม่เป็นไรค่ะ ทุกคนจะไม่เป็นไรค่ะ"
90002050-89 = "ฉัน... ทุกอย่างเป็นเพราะฉันแท้ๆ..."
90002050-95 = "พะ... พี่มัลคูธ?! กะ... กอดแน่น... จนหายใจไม่ออกแล้ว..."
90002050-96 = "ชู่ว ไม่เป็นไรค่ะ อยู่แบบนี้เงียบๆ สักพักนะ"
90002050-97 = "ฮือ... ฮืออ...!"
90002050-98 = "เป็นเด็กดีจริงๆ เลยนะคะ ซอฟ งั้นเราอยู่แบบนี้ต่ออีกหน่อยแล้วกันค่ะ"
90002050-101 = "รู้สึกดีขึ้นหรือยังคะ?"
90002050-102 = "อื้อ..."
90002050-103 = "ถ้างั้นฉันขอถามคำถามต่อไปเลยนะคะ"
90002050-104 = "มีอะไรที่ฉันพอจะทำได้หรือเปล่าคะ ซอฟ?"
90002050-105 = "...!"
90002050-106 = "ไม่ต้องตกใจหรอกค่ะ"
90002050-107 = "ฉันรู้ว่าซอฟต้องการอะไรค่ะ ก็ฉันเป็นพี่สาวของซอฟนี่คะ"
90002050-108 = "แล้วฉันก็รู้ด้วยค่ะว่าทำไมตอนนี้ซอฟถึงพูดอะไรไม่ออกเลย ก็ซอฟเป็นน้องสาวของฉันนี่คะ"
90002050-109 = "เพราะงั้นก็ไม่เป็นไรหรอกค่ะ ฉันเองก็จะทำในสิ่งที่ฉันทำได้เหมือนกันค่ะ"
90002050-115 = "พวกเราแค่ไม่อยากสูญเสียพี่มัลคูธไปน่ะ...!"
90002050-120 = "แค่ไม่อยาก... สูญเสียพี่ไป"
90002050-121 = "ค่ะ ฉันรู้ค่ะ"
90002050-122 = "ก็เพราะอย่างนั้น ไอน์ ซอฟและออร์ก็เลยส่งฉันมายังดินแดนแห่งโซฮาร์แห่งนี้ไงคะ"
90002050-123 = "ต่อให้ฉันไม่อยากได้การบำรุงรักษาเพิ่มเติมก็ตามทีค่ะ"
90002050-124 = "อึก...!"
90002050-125 = "ซอฟเด็กดี ไม่ต้องเศร้าให้มากไปนะคะ"
90002050-126 = "ฉันรู้ค่ะ แล้วก็รู้ด้วยค่ะว่าต้องทำแบบไหนถึงเป็น 'แผนสำรองที่ดีที่สุด'"
90002050-127 = "เพราะงั้นก็ไม่ต้องกังวลนะคะ ทุกอย่างจะออกมาดีเองค่ะ"
90002050-128 = "ฉันจะรีบทำให้เสร็จแล้วกลับมาโดยเร็วที่สุดค่ะ"
90002050-129 = "พี่มัลคูธ..."
90002050-131 = "แต่จะว่าไปนะคะ แค่นั้นจะเพียงพอจริงๆ เหรอคะ?"
90002050-132 = "?!"
90002050-133 = "..."
90002050-138 = "รู้ได้ไงว่าฉันอยู่ที่นี่น่ะ..."
90002050-139 = "ถามมาได้ ก็ที่ที่พวกเราจะไปมันถูกกำหนดไว้แล้วนี่คะ"
90002050-140 = "ฉันแค่ประมวลความน่าจะเป็นกับตัวแปรที่เหลือดูน่ะค่ะ ว่าจะมีสถานที่ไหนที่มีความเป็นไปได้สูงที่สุด"
90002050-141 = "จะว่าไป จู่ๆ ก็คิดออกขึ้นมาเลยนะคะ ตอนแรกพวกเราสัญญากันไว้ว่ายังไงนะคะ?"
90002050-142 = "ไม่ว่าจะเกิดอะไรขึ้น ถ้ายังไม่ถึง 'เวลานั้น' ก็ห้ามให้พี่มัลคูธออกไปข้างนอกเด็ดขาดไม่ใช่เหรอคะ?"
90002050-143 = "..."
90002050-144 = "และสิ่งที่เรากำลังทำอยู่นี้ ก็น่าจะเป็นเพราะเราไม่อยากให้ 'เวลานั้น' มาถึงมากกว่าด้วยค่ะ"
90002050-145 = "..."
90002050-146 = "ลองคิดดูนะคะ ถ้าข้อมูลนี้แพร่ออกไปถึงผู้เลื่อมใสตนอื่นๆ ถึงตอนนั้นจะแก้ตัวว่ายังไงเหรอคะ?"
90002050-150 = "ขอโทษนะ... ทุกอย่างเป็นความผิดของฉันเอง ฉันไม่มีอะไรจะแก้ตัวเลยละ"
90002050-151 = "แต่ยังไงก็ต้องขัดขวางไว้สิ พวกเรา... ต้องขัดขวางคนพวกนั้นไว้นะ"
90002050-152 = "แต่เยซ็อดถึงกับถูกโจมตีไปเลยนะ เธอเองก็น่าจะรู้ความหมายนั้นอยู่บ้างไม่ใช่เหรอ?"
90002050-153 = "ใช่ค่ะ... ไอน์ถึงกับเป็นลมไปเลยด้วยค่ะ"
90002050-154 = "เธอพูดถูกแล้วละ พวกเราไม่ควรขอความช่วยเหลือจากพี่มัลคูธ แต่ถ้าเราไม่ลงมือทำอะไรเลยละก็..."
90002050-155 = "สุดท้ายก็คงจบด้วยการไปขอความช่วยเหลือในสิ่งที่ยากขึ้นจากพี่มัลคูธ แล้วถ้าเป็นแบบนั้น..."
90002050-156 = "ตอนนั้นพวกเราจะหยุดยั้ง 'เวลานั้น' ไม่ให้มาถึงไม่ได้..."
90002050-157 = "..."
90002050-159 = "ออร์ ซอฟน่ะ..."
90002050-161 = "ไม่เป็นไรค่ะ ฉันบอกแล้วนี่คะว่าไม่เป็นไร ฉันรู้ทุกอย่างค่ะ แล้วก็ไม่ได้จะซักไซ้อะไรด้วยค่ะ "
90002050-162 = "ฉันก็แค่อยากหยอกซอฟดูบ้างสักครั้งน่ะค่ะ!"
90002050-163 = "นี่"
90002050-165 = "ค่ะ ก็คงจะเป็นอย่างนั้นนะคะ"
90002050-167 = "เดี๋ยวเหอะ เอามือลงเลยนะคะ! อีกอย่าง ฉันก็มาเพื่อจะคุยเรื่องสำคัญทางด้านวิศวกรรมด้วยค่ะ"
90002050-168 = "ถ้าพูดอะไรเหลวไหลละก็ โดนฝ่ามือของฉันแน่ คอยดูได้เลย..."
90002050-169 = "ดูสิคะ ต่อให้จะวางเงื่อนไขอื่นๆ ทั้งหมด นี่ก็ไม่ใช่เรื่องง่ายเลยละค่ะ"
90002050-170 = "อันดับแรก เราต้องปกปิดเรื่องการออกจู่โจมของพี่มัลคูธกับผู้เลื่อมใสตนอื่นค่ะ จะให้ใครรู้ไม่ได้เด็ดขาดค่ะ"
90002050-171 = "อื้อ... ก็จริงนะ"
90002050-172 = "แต่ในขณะเดียวกัน เราก็ต้องระดมพลังทั้งหมดของดินแดนเหล็กกล้ามาที่พี่มัลคูธเป็นการชั่วคราวด้วย "
90002050-173 = "และสองเรื่องนี้ก็เป็นเงื่อนไขที่ขัดแย้งกันอย่างสิ้นเชิงเลยละค่ะ ฉันว่าทุกคนก็น่าจะรู้อยู่แล้วนะคะ"
90002050-174 = "มันก็จริงเหมือนกัน..."
90002050-175 = "เรียกได้ว่างานนี้ต้องแข่งกับเวลาค่ะ พอเข้าใจมั้ยคะ?"
90002050-176 = "แข่งกับเวลา... อื้อ นั่นคือผลลัพธ์ที่หลีกเลี่ยงไม่ได้เลย แล้วยังไงต่อล่ะ?"
90002050-177 = "จากนี้ไปก็เลยจะเป็นเวลาที่ฉันต้องก้าวขึ้นมายังไงล่ะคะ!"
90002050-178 = "แล้วมีวิธีเหรอ?"
90002050-179 = "เรื่อง 'การหลอกตา' ผู้เลื่อมใสตนอื่นๆ น่ะ... ให้เป็นหน้าที่ของฉันเองค่ะ งานแบบนี้เป็นงานถนัดของฉัน#nอยู่แล้วนี่คะ"
90002050-180 = "เดี๋ยวนะ... สรุปว่า... จะไปหลอกฝ่ายเดียวกันงั้นเหรอ?!"
90002050-181 = "จะว่าอย่างนั้นก็ได้ค่ะ น่าจะมีคำคล้ายๆ สุภาษิตอะไรของมนุษย์ที่ซอฟรู้จักดีไม่ใช่เหรอคะ?"
90002050-182 = "มีสิ ที่บอกว่า 'จะหลอกศัตรูได้ ต้องหลอกพวกเดียวกันก่อน' ยังไงล่ะ"
90002050-183 = "มีจริงๆ ด้วยสินะคะ แต่ยังไงการรักษาเวลาก็เป็นเรื่องสำคัญค่ะ ถ้าเลยเวลาไปละก็ ฉันก็คงทำอะไรไม่ได้นะคะ"
90002050-184 = "เราคงปิดบังได้ไม่เกินระดับหนึ่งหรอก การหลอกลวงมันก็มีขีดจำกัดนี่คะ"
90002050-186 = "ออร์ถึงกับพูดอย่างนี้เลยนะคะ ว่ายังไงล่ะคะ ซอฟ?"
90002050-191 = "ขอบใจนะ..."
90002050-197 = "นี่มัน... อะไรกันคะ? ทำไมถึงยื่นมือให้ฉันล่ะ...?"
90002050-198 = "แค่จับมือของฉันไว้แล้วเขย่าขึ้นลงก็พอแล้วละ นี่เรียกว่าการจับมือน่ะ ตอนให้สัญญาหรือทำข้อตกลงที่สำคัญ มนุษย์จะทำแบบนี้กัน"
90002050-199 = "ทำอะไรตามอย่างพวกมนุษย์อีกแล้วนะคะ... ก็ได้ค่ะ ไม่เห็นจะมีอะไรเสียหายนี่คะ"
90002050-200 = "ถ้างั้นมา 'จับมือ' กับฉันอีกคนด้วยมั้ยคะ?"
90002050-201 = "หะ... หืม...? อะ... อื้อ..."
90002050-202 = "ดีจังเลยนะคะ รู้สึกเหมือนได้ใกล้ชิดซอฟกับออร์มากขึ้นเลยค่ะ "
90002050-207 = "อะ... เอ่อ... ว่าแต่... คิดจะทำยังไงกับ... เน็ตซาชจัง... หรือดินแดนเหล็กกล้าเหรอคะ...?"
90002050-208 = "หืม?!"
90002050-209 = "ไอน์!?"
90002050-210 = "อาการดีขึ้นหรือยังคะ ไอน์?"
90002050-215 = "แหะๆๆ ค่ะ! ขอโทษนะคะ เมื่อกี้ฉันรู้สึกวิงเวียนนิดหน่อย... แต่ว่าตอนนี้ไม่เป็นอะไรแล้วค่ะ...!"
90002050-216 = "แต่ที่สำคัญกว่านั้น ต่อให้เราจะ... ปกปิดเรื่องพี่มัลคูธกับผู้เลื่อมใสตนอื่นได้... แต่กับเน็ตซาชจังแล้ว#nน่าจะยากนะคะ"
90002050-217 = "ก็ตอนนี้เน็ตซาชจัง... คือดินแดนเหล็กกล้านี่คะ... คงเป็นไปไม่ได้หรอกค่ะที่เน็ตซาชจังจะไม่รู้ว่าเกิด#nอะไรขึ้นบนร่างกายของตัวเองบ้าง"
90002050-219 = "อึก ก็จริงอย่างที่ว่านะคะ..."
90002050-220 = "เราจะหลอกลวงถึงขั้นนั้นไม่ได้งั้นเหรอ..."
90002050-221 = "ลองคิดอย่างมีเหตุผลดูสิคะ คิดว่าจะได้เหรอคะ?"
90002050-222 = "อึก ครั้งนี้ฉันเถียงอะไรไม่ออกเลยละ..."
90002050-224 = "แหะๆๆ... แต่ก็ไม่น่าจะเป็นอะไรหรอกค่ะ! เน็ตซาชจังบอกว่า... ครั้งนี้จะหลับหูหลับตาให้ค่ะ"
90002050-225 = "หืม? จริงเหรอ?"
90002050-226 = "ค่ะ! แต่ว่าถ้ามีครั้งต่อไป... ก็น่าจะยากเลยค่ะ..."
90002050-227 = "จะมีครั้งต่อไปเหรอคะ... ฉันว่าครั้งเดียวก็น่าจะเพียงพอแล้วละค่ะ ว่ามั้ยคะ ซอฟ?"
90002050-229 = "...! "
90002050-230 = "ใช่ ครั้งเดียวก็พอแล้วละ อื้อ!"
90002050-232 = "เอาละค่ะ ไอน์ ซอฟ ออร์"
90002050-236 = "ขอฝากเรื่องการออกไปจู่โจมครั้งแรกของฉันด้วยนะคะ"
90002050-239 = "ค่ะ!"
90002050-241 = "ตอนต่อไป;มัลคูธ"
