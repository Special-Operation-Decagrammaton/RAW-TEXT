[translation]
901010600460-6 = "では、今まで話した内容を整理すると……。"
901010600460-7 = "「港で失踪した漁師は借金に追われていた」"
901010600460-8 = "「彼は事件当日、列車に乗って港を抜け出した」"
901010600460-9 = "「漁師と同じく、カルパッチョ・ファミリーからお金を借りた市民は多数存在した」"
901010600460-10 = "ようやく失踪事件の顛末が分かりそうだね。"
901010600460-11 = "鐘崎港一帯で姿を消した失踪者は、実はカルパッチョ・ファミリーからお金を借りた債務者だった。"
901010600460-12 = "でも返済に困っていた一部の債務者は、こっそり逃げる計画を立てて――逃げ出した。"
901010600460-13 = "だから失踪したように見えたんだね。"
901010600460-14 = "今回は私もFOX4の推測通りだと思うわ。"
901010600460-15 = "これ以外、人々が姿を消す理由も方法もないもの。"
901010600460-16 = "色々な噂や憶測が重なったから、陰惨な事件のように見えたけど……実際は思っていた以上に単純でしたね。"
901010600460-17 = "集めた情報を連邦生徒会に報告して、債務関係で不正受給はなかったか一度財務室に確認を要請しましょう。"
901010600460-18 = "[s] \"これで事件は終わりかな？\""
901010600460-19 = "はい、現段階ではそうですが……。"
901010600460-20 = "……。"
901010600460-24 = "何か心配事でもあるの？"
901010600460-25 = "いや、何か大事なことを見落としている気がして。"
901010600460-26 = "[s] \"気になることでもあるの？\""
901010600460-27 = "集めた情報にエラーはありません。"
901010600460-28 = "明瞭かつ分かりやすく……どの情報も一つの結論にたどり着いています。"
901010600460-29 = "だからこそ、この答えにたどり着くよう、まるで誰かが意図的に仕向けているような気がするんです。"
901010600460-30 = "それに……この事件がただの債務関係に起因するものだとしたら。"
901010600460-31 = "「ドラム缶ガニ」はどうして何度も噂に登場したのでしょうか？"
901010600460-32 = "誰かがわざと噂を広めているのなら、そこには理由が――"
901010600460-34 = "それは……人が食いつきそうな話題だからじゃない？"
901010600460-35 = "SNSの話題なんて、刺激が強ければすぐになるもの。"
901010600460-36 = "ミームに理由を求めることと同じくらい、意味なんてないんじゃないかな。"
901010600460-37 = "あの白くてキモイ鳥だって、全然可愛くないのにグッズ多いし？売れてるんじゃない？"
901010600460-39 = "それは……。"
901010600460-44 = "[ns] \"みんな、明日もう一回港に行ってみない？\""
901010600460-50 = "うん？先生も何か調査したいことでもあるの？"
901010600460-51 = "[s] \"ううん、調査じゃなくて……。\""
901010600460-55 = "[ns1] \"話を聞いたら、私も港に行ってみたくなって。\"\n[ns2] \"なんだか美味しそうなお店も多いって聞いたからね。\""
901010600460-61 = "そうですね……初日に訪れた「[ruby=あきた]穐田[/ruby]水産」が隠れた名店みたいでした。"
901010600460-62 = "一度話題になってから、毎日口コミが投稿されています。"
901010600460-63 = "[s3] \"じゃあ、明日の朝ご飯はそこで食べてみない？\"\n[s4] \"お金のことなら心配しないで！先生の奢りだから！\""
901010600460-68 = "で、でも、先生のお世話になるわけには――"
901010600460-69 = "お！やったー！タダなら行かない理由はないね！"
901010600460-70 = "極限の状態に備えて食料は可能な限り現地調達すべし――ってSRTの教範にも書かれてるし？"
901010600460-71 = "それ、人に頼れって意味じゃないと思うけど……。"
901010600460-72 = "まあ私も行くわ。任務中はちゃんとした漁港グルメも楽しめなかったし。"
901010600460-76 = "うう……では、お世話になります。"
901010600460-77 = "[s] \"ユキノ。\""
901010600460-82 = "はい？なんでしょうか。"
901010600460-83 = "[s5] \"……港で確認したいことがあるんだよね？\"\n[s6] \"明日、何か変なところがないか、もう一度調べてみよう。\""
901010600460-88 = "……ありがとうございます。先生は察しが良いんですね。"
901010600460-89 = "他人の苦しみに敏感であることは、いばらの道を歩くのと同義だというのに。"
901010600460-90 = "[s] \"……うん？\""
901010600460-91 = "いえ、なんでもありません。"
901010600460-97 = "FOX小隊、ご苦労だった。"
901010600460-98 = "では、明日の午前まで各自、自由時間にする。"
901010600460-101 = "了解！"
