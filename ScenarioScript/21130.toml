[translation]
21130-1 = "ตอนที่ 13;เนิร์ด vs เมด"
21130-2 = "ห้องควบคุม อาคารเรียนหลัก มิลเลเนียม"
21130-3 = "(ตู้มมมมม!)"
21130-4 = "อั๊ก!"
21130-5 = "ดะ... โดนเข้าแล้วไง!"
21130-6 = "ช่วย... ชุบชีวิต... ด้วย..."
21130-8 = "(ตุ้บ)"
21130-10 = "......"
21130-11 = "เหลวไหลสิ้นดี"
21130-12 = "เลือกที่จะ... บุกเข้าสภานักเรียนอย่างนั้นน่ะรึ?"
21130-13 = "เด็กคนนี้คืออาริสึสินะ"
21130-14 = "น่ารักจัง อยากเก็บไว้เป็นสายลับเมดคนที่ 6 จังเลยค่ะ ฉันขอเอาตัวไปได้ไหมคะ?"
21130-15 = "ไม่ได้..."
21130-16 = "หล่อนเป็นถึงคนร้ายที่บุกเข้าสภานักเรียน ก่อนอื่นฉันจะขังเอาไว้ในห้องแนะแนวในสภานักเรียนก่อน"
21130-17 = "เก่งไม่เบาเลยนะ ใครจะไปคิดว่าจะมีคนยิงประตูลิฟต์เพื่อจะฝ่า 'ระบบตรวจสอบลายนิ้วมือ'"
21130-18 = "ซ่อมประตูลิฟต์ไม่ได้... ต้องเปลี่ยนประตูเดี๋ยวนี้ค่ะ"
21130-19 = "ฮืม...... งั้นก็คงต้องเปลี่ยนใหม่... เดี๋ยวก่อนนะ"
21130-20 = "มาคิดๆ ดูแล้ว อาวุธอันนั้นของอาริสึจัง... สร้างขึ้นในชมรมวิศวกรรมใช่ไหม?"
21130-21 = "ปกติถ้าเกิดเหตุแบบนี้ ฉันจะให้ชมรมวิศวกรรมเข้ามาช่วยดู..."
21130-22 = "แต่ครั้งนี้คงต้องคิดให้รอบคอบแล้วสินะ"
21130-23 = "ไปซื้อระบบความปลอดภัยที่รัดกุมที่สุดในคิโวทอสมา แต่ห้ามเป็นของชมรมวิศวกรรมด้วยล่ะ"
21130-25 = "รอบนอกทางเดินในตึกมิลเลเนียม"
21130-26 = "อึ่ก! อาริสึถูกพาตัวไปแล้ว!"
21130-27 = "ใจเย็นๆ ก่อนโมโมอิ เรามาตามแผนแล้ว"
21130-28 = "รอก่อนนะอาริสึจัง... พวกเราจะไปช่วยออกมาเอง!"
21130-31 = "ฉันว่า... เราเริ่มได้ดีแล้วล่ะนะ"
21130-32 = "ว่าไหมคุณครู?"
21130-33 = "[s1] \"ใช่\"\n[s2] \"ขอถามชมรมวิศวกรรมหน่อยว่าเตรียมตัวเสร็จหรือยัง\""
21130-34 = "ติดต่อจากชมรมวิศวกรรม 'ทำได้ดีมาก เราส่งม้าไม้เมืองทรอยเข้าไปสำเร็จแล้ว'"
21130-35 = "ติดต่อจากชมรมวิศวกรรม 'ทำได้ดีมาก เราส่งม้าไม้เมืองทรอยเข้าไปสำเร็จแล้ว'"
21130-36 = "เฮ้อ โล่งอกไปที ถ้าหากไม่สำเร็จ อาริสึก็คงโดนขัง และแผนการก็คงจบทั้งแบบนี้ไปแล้ว"
21130-37 = "ไปสเต็ปต่อไปกันเลย"
21130-39 = "เอาล่ะ มาเริ่มกันเลยดีไหม"
21130-40 = "อ่า... ฉันประหม่าจัง"
21130-41 = "ไม่เคยรู้สึกแบบนี้เลยตั้งแต่ที่บุกเข้าตึกสมาคมศึกษาประวัติศาสตร์โบราณ"
21130-42 = "แล้วฮิบิกิกับรุ่นพี่อุทาฮะล่ะ?"
21130-44 = "สองคนนั้นพร้อมต้อนรับ 'ลูกค้า' แล้วล่ะ"
21130-45 = "ดีเลย"
21130-46 = "ฟังแล้วดูไม่น่าจะดีนะ"
21130-47 = "แล้วมากิกับโคโทริล่ะ?"
21130-48 = "กำลังรออยู่~"
21130-49 = "วางใจได้เลยค่ะ! จากการวิเคราะห์ทางทฤษฎีของฉัน แผนการนี้มีโอกาสสำเร็จมากกว่า 2%!"
21130-50 = "ก็แปลว่ามีโอกาสล้มเหลว 98% เลยนี่!?"
21130-51 = "แหะๆๆ ล้อเล่นค่ะ! มันต้องตรงกันข้ามต่างหาก!"
21130-52 = "ถ้าโคโทริจังกับมากิจังเตรียมตัวเสร็จแล้ว..."
21130-53 = "ก็เข้าสู่สเต็ปที่ 2 ได้เลย"
21130-54 = "เอาล่ะ... คุณครู!"
21130-55 = "[s] \"เริ่มแผนการ!\""
21130-57 = "ค่ะ!"
21130-58 = "ไปลุยกันเลย!"
21130-60 = "ห้องควบคุม อาคารเรียนหลัก มิลเลเนียม"
21130-62 = "(ติ๊ด ติ๊ด)"
21130-63 = "มาแล้วเหรอ?"
21130-64 = "พบเป้าหมายจากกล้องตรวจจับ เป้าหมายปรากฏตัวที่จุด A1 ที่ทางเข้าหมายเลข 1"
21130-65 = "กำลังเคลื่อนตัวไปที่จุด A2 ค่ะ"
21130-66 = "ถ้าเข้ามาถึงตรงนั้น ก็แทบจะหนีออกไปไม่ได้ใช่ไหมคะ? ฉันจะออกไปเองค่ะ"
21130-67 = "เอ๋? มีความจำเป็นต้องออกไปเองด้วยเหรอ?"
21130-68 = "จำเป็นสิคะ"
21130-71 = "เป็นเมดก็ต้องทำอย่างเต็มที่เพื่อออกไปต้อนรับลูกค้าสิคะ"
21130-73 = "เวอริทัส มิลเลเนียม"
21130-74 = "(2 ชั่วโมงก่อนหน้า)"
21130-75 = "ฉันจะอธิบายเกี่ยวกับคลังของที่ถูกยึดในสภานักเรียนก่อน ที่นั่นมี 'กระจก' ที่เป็นเป้าหมายของเราอยู่"
21130-76 = "สภานักเรียน 'เซมิน่า' ของมิลเลเนียมที่มีจุดน่าสงสัยอยู่หลายอย่างใช้ชั้นสูงสุด#nของหอคอยมิลเลเนียมเป็นสถานที่ของตัวเองอยู่"
21130-77 = "ส่วนคลังของที่ถูกยึดของสภานักเรียนที่เราจะเข้าไป อยู่ทางทิศตะวันตกของชั้นบนสุด"
21130-78 = "ตามข้อมูลแล้ว มีกล้องตรวจจับจากทางเข้าถึงคลังของที่ถูกยึดอยู่ประมาณ 400 ตัว#nและหุ่นยนต์คุ้มกันประมาณ 50 ตัว นอกจากนั้นยังมีหุ่นยนต์ต่อสู้หลายสิบตัว#nที่อายัดมาจากองค์กรมืดด้วย"
21130-79 = "สรุปก็คือ กล้อง 442 ตัว และหุ่นยนต์คุ้มกัน 3 ประเภทอีก 52 ตัว"
21130-80 = "และคนที่ช่วยในการสร้างระบบรักษาความปลอดภัยของที่นั่นก็คือชมรมวิศวกรรม"
21130-83 = "ว้าว..."
21130-84 = "ปัญหาที่ใหญ่ที่สุดคือ เราต้องขึ้นลิฟต์ไปเพื่อไปยังคลังของที่ถูกยึด#nแต่ลิฟต์นี้ใช้ระบบตรวจสอบลายนิ้วมือ ถ้าไม่ใช่พวกสภานักเรียนหรือคนที่มีสิทธิ์ก็จะใช้ไม่ได้"
21130-85 = "แต่ถึงเราจะผ่านลิฟต์นี้ไปได้ ก็ยังต้องเจอกับนักเรียนในสังกัดสภานักเรียน#nและพวกยามติดอาวุธ... นอกจากนั้น..."
21130-86 = "สถานที่ของสภานักเรียนยังมีระบบแบ่งห้องเป็นส่วนๆ ด้วย"
21130-87 = "แบ่งเป็นส่วนๆ...?"
21130-88 = "ถ้าเกิดไฟไหม้หรือมีควันในห้องไหน ฉากกั้นจะตกลงมาเพื่อแบ่งห้อง"
21130-89 = "และหากจะปลดฉากกั้นที่ตกลงมา จะต้องใช้ลายนิ้วมือของสภานักเรียนเท่านั้น"
21130-90 = "ถ้าเกิดใช้ลายนิ้วมือของคนอื่น.. ก็จะมีฉากกั้นแข็งแรงที่ทำจากไทเทเนียมตกลงมาอีกอันหนึ่ง#nและหากเป็นแบบนั้น จะต้องใช้ลายนิ้วมือและม่านตาของกรรมการสภานักเรียนเท่านั้นถึงจะผ่านไปได้"
21130-91 = "อืม... ระบบรัดกุมอะไรขนาดนี้เนี่ย จินตนาการไม่ออกเลย"
21130-92 = "สรุปก็คือ ต้องใช้ลิฟต์เท่านั้นในการไป 'ชั้นอื่น' ..."
21130-93 = "และทางเดินส่วนใหญ่จะมีอุปกรณ์รักษาความปลอดภัยที่ต้องใช้ลายนิ้วมือเพื่อผ่านไป#nถ้าผ่านไปไม่ได้ ก็จะมีฉากกั้นตกลงมา"
21130-94 = "และถ้าผ่านไปไม่ได้ ก็จะมีฉากกั้นที่แข็งแรงกว่าตกลงมาขังไว้..."
21130-95 = "อย่าลืมยามติดอาวุธและกล้องตรวจจับพวกนั้นด้วยล่ะ~"
21130-96 = "ถ้าเป็นกล้องตรวจจับเราเองก็คงแฮ็กได้ แต่พวกอุปกรณ์รักษาความปลอดภัยคงแฮ็กไม่ได้#nเพราะมันเป็นของเวอริทัส ทั้งหมดถูกเชื่อมโยงด้วยเครือข่ายภายในหมดเลย"
21130-97 = "ฉันเองก็เพิ่งรู้มาว่า ถ้าเราบุกเข้าไปใช้ลิฟต์โดยไม่มีสิทธิ์ผ่าน การเข้าถึงแต่ละชั้นก็จะถูกปิดไปด้วย"
21130-99 = "อ๊าาา! มีแต่ข่าวร้ายที่ทำให้สิ้นหวังทั้งนั้น! ไม่มีใครมีข่าวดีบ้างเลยเหรอ?!"
21130-100 = "ทางนั้นมีจุดอ่อน... และพวกเราก็ทำไว้แล้ว"
21130-101 = "ก่อนอื่นเลย พวกนั้นอ่อนต่อเรื่องการสกัดกั้นพลังงานจากภายนอก และถ้าเป็นอย่างนั้น#nหากเราเชื่อมต่อเครือข่ายภายนอกอย่างเป็นธรรมชาติ ก็จะสามารถแฮ็กระบบได้ชั่วคราว"
21130-102 = "EMP ขนาดจิ๋วของพวกเราน่าจะไปยกเลิกระบบทั้งหมดของมิลเลเนียม... ได้ประมาณ 6 วินาที"
21130-103 = "6 วินาที..."
21130-106 = "แค่นี้ก็เพียงพอแล้ว"
21130-108 = "รอบนอกทางเดินในตึกมิลเลเนียม"
21130-109 = "(กลับมาที่ปัจจุบัน ทางเดินในตึกมิลเลเนียม)"
21130-110 = "อืม... น่าจะประมาณนี้นะ"
21130-111 = "หรือว่าเรามาผิด? ฉันว่าเราเข้ามาลึกเกินไปนะ"
21130-113 = "ไม่หรอกค่ะ เข้ามาถูกแล้วค่ะ"
21130-114 = "?!"
21130-115 = "รีบเข้ามาสิคะ ฉันกำลังรออยู่เลย"
21130-116 = "คุณก็อาจจะรู้แล้วนะคะว่า... แผนการของพวกคุณล้มเหลวแล้ว"
21130-117 = "รหัสซีโร่ทรีแห่ง C&C ชื่อจริงของฉันเป็นความลับ ให้เรียกว่าเมดปริศนาคนสวยแล้วกัน"
21130-118 = "เฮือก! นั่นมันรุ่นพี่อาคาเนะ!"
21130-119 = "สายลับเมดที่ในช่องความสามารถพิเศษเขียนไว้ว่า 'ลอบสังหาร' เหรอ?"
21130-120 = "อืม เป้าหมายของเราคือสายลับปริศนา แต่ทำไมถึงได้รู้กันทั่วแบบนี้ล่ะ?#nหรือว่าต้องหยุดบทบาทของฮีโร่นิรนามแล้ว..."
21130-121 = "อีกอย่าง รุ่นพี่โคทามะบอกมาว่าน้ำหนักตัวของเธอ..."
21130-122 = "ดะ... เดี๋ยวก่อน! รู้กันมากไปแล้วนะคะ!"
21130-123 = "หยุดพูดอะไรที่รู้มาเลยนะคะ โดยเฉพาะเรื่องน้ำหนักนั่น ทั้งโมโมอิและมิโดริเลย!"
21130-125 = "......"
21130-126 = "......"
21130-127 = "ฮุฮุฮุ"
21130-131 = "คงยังไม่รู้สินะ แผนการของพวกเธอต่างหากที่ล้มเหลวแล้ว"
21130-132 = "คะ?"
21130-137 = "(พรึ่บ)"
21130-138 = "แหะๆ หวัดดี! รุ่นพี่อาคาเนะ! ทำไงดีล่ะ ฉันจะกลับหอพัก แต่ดันหลงทางเข้าซะได้"
21130-140 = "พะ.. พวกเธอคือใคร?!"
21130-141 = "ถ้าอยากรู้ว่าเราคือใคร! ก็คงจะต้องอธิบายให้ฟังหน่อยแล้ว!"
21130-142 = "โทโยมิ โคโทริ เทพีแห่งการอธิบายแห่งชมรมวิศวกรรมที่ไม่ว่าถามอะไรมาก็จะหาคำตอบมาให้!"
21130-143 = "ส่วนฉันก็มากิ! การผสมผสานระหว่างศิลปะและวิทยาศาสตร์ ดิจิทัลอาร์ตทิสท์แห่งเวอริทัส!"
21130-144 = "ไม่ใช่... ชมรมพัฒนาเกมเหรอ...?!"
21130-146 = "ยูกะ! นี่มันเกิดอะไรขึ้นคะ?"
21130-147 = "ในกล้องตรวจจับยังเห็นว่าโมโมอิและมิโดริเข้ามาที่จุด A2 อยู่เลย! อีกอย่าง#nฉันไม่เห็นเธอเลยนะอาคาเนะ...!"
21130-148 = "วะ.. ว่าไงนะ? หรือว่า...?!"
21130-149 = "รีเซ็ตการตั้งค่ากล้องเดี๋ยวนี้! ปิดการเข้าถึงคลาวด์ แล้วเปิดเฉพาะหน้าจอที่วงจรถูกปิดกั้น!"
21130-150 = "รีเฟรชหน้าจอใหม่! พบอาคาเนะแล้ว! โคโทริและมากิกำลังรออยู่ค่ะ!"
21130-151 = "งั้นก็แสดงว่า..."
21130-152 = "วิดีโอที่เราดูอยู่เมื่อกี้ก็คือ...?"
21130-154 = "ทางเดินในตึกมิลเลเนียม"
21130-155 = "จะโดนจับได้ยังนะว่าเป็นวิดีโอที่บันทึกไว้?"
21130-156 = "อืม รู้งี้เราน่าจะอัดวิดีโอในวันธรรมดาของพวกนั้นแล้วเปิดเล่น แล้วก็แอบไปเอากระจกออกมาดีกว่านะ"
21130-157 = "แต่การเข้าออกมันยากมาก หากเปิดวิดีโอผิดพลาดขึ้นมาล่ะก็ จะโดนจับได้ง่ายๆ เอานะ"
21130-158 = "ถ้าจะทำอย่างนั้น เราทำให้พวกเมดตกอยู่ในความสับสน แล้วค่อยปฏิบัติการจะดีกว่า"
21130-164 = "อ๊ะ! ถึงลิฟต์แล้ว ได้เวลาเข้าไป 'จริงๆ' แล้วสินะ"
21130-165 = "เดี๋ยวก่อน... ข้างในนี้มันมืด คุณครูจับมือพวกเราไว้ให้ดีนะคะ"
21130-166 = "...เตรียมพร้อมแล้ว!"
21130-167 = "ไปได้!"
21130-169 = "(ตี๊ดดดด)"
21130-171 = "ริมทางเดินในตึกมิลเลเนียม"
21130-172 = "พบผู้บุกรุก เขตเฉพาะของเซมิน่า เปิดการปิดกั้นฉุกเฉิน"
21130-173 = "อ๊ะ... ฉากกั้นตกลงมา... หรือว่า...?! เดี๋ยวนะ!"
21130-174 = "(ตุ้บ)"
21130-175 = "แย่ล่ะสิ..."
21130-176 = "แหะๆ โดนขังเข้าซะแล้ว~ มาอยู่ด้วยกันเถอะ"
21130-177 = "ไม่เอาด้วยหรอกค่ะ ฉันผ่านตรงนี้ไปได้ ไม่เหมือนพวกคุณหรอกนะ"
21130-178 = "สแกนลายนิ้วมือ ทุกคนโดนขังอยู่ที่นี่ แล้วดูฉันเดินออกไปสวยๆ... (ติ๊ดตี๊ด)"
21130-179 = "ลายนิ้วมือไม่ถูกต้อง"
21130-180 = "หา...?!"
21130-181 = "เปิดฉากกั้นชั้นที่ 2"
21130-182 = "ดะ... เดี๋ยวก่อนสิ!"
21130-184 = "(แกรกๆๆๆ แกร๊ง!)"
21130-186 = "ห้องควบคุม อาคารเรียนหลัก มิลเลเนียม"
21130-187 = "อาคาเนะถูกขังแล้วค่ะ"
21130-188 = "ส่งกรรมการสภานักเรียนไปคนหนึ่ง! โนอาอยู่แถวนี้! ให้ไปเปิดประตูด้วยลายนิ้วมือของพวกนั้นเลย!"
21130-191 = "คิดอะไรอยู่นะ ถ้าเป็นแบบนี้ โมโมอิและมิโดริ 'ตัวจริง' ก็น่าจะถูกขังอยู่ไหนสักที่นี่นา"
21130-192 = "ไม่นะ... หรือว่าจะ...?!"
21130-193 = "โนอาติดต่อเข้ามา! พวกนั้นก็โดนขังอยู่เหมือนกัน และประตูก็เปิดไม่ได้ค่ะ!"
21130-194 = "โนอาก็ถูกฉากกั้นที่ 2 ขังอยู่ค่ะ! พวกเธอขอความช่วยเหลือด้วยค่ะ!"
21130-195 = "วะ.. ว่าไงนะ?!"
21130-196 = "ทำไมถึงเป็นอย่างนี้ไปได้ล่ะ!? อุปกรณ์ทั้งหมดของวันนี้มัน... อย่าบอกนะว่า...?!"
21130-197 = "ตั้งใจให้อาริสึจังทำลายประตู เพราะจะทำสิ่งนี้อย่างนั้นเหรอ?!"
21130-199 = "ในอาคารเรียนหลัก มิลเลเนียม"
21130-200 = "คุณครู! พี่โมโมอิ! รุ่นพี่ฮาเระติดต่อมาว่าขังรุ่นพี่อาคาเนะสำเร็จแล้ว!"
21130-201 = "ส่วนเครื่องตรวจสอบลายนิ้วมือก็ทำงานตามปกติดี"
21130-202 = "พวกกรรมการสภานักเรียนก็ถูกขังไว้หมดแล้ว ทีนี้ก็มีแต่พวกเราเท่านั้นที่เดินไปเดินมา#nในอาคารสภานักเรียนได้!"
21130-203 = "ใช้อุปกรณ์รักษาความปลอดภัยรุ่นใหม่ล่าสุดของชมรมวิศวกรรมหลอกล่อไว้ได้แบบนี้ก็โล่งอกไปทีนะ"
21130-204 = "ทางสภาคงจะไม่รู้สินะว่านั่นเป็นผลงานของชมรมวิศวกรรม เอาละ งั้นเราก็ไปกันเถอะ"
21130-205 = "ติ๊ดตี๊ด ยืนยันตัวไซบะ โมโมอิ ไซบะ มิโดริ และคุณครู"
21130-206 = "หืม? นี่เหมือนเดจาวูเลย..."
21130-207 = "ใช่ ตอนนั้นเราอยู่ที่พื้นที่รกร้างไง~ ผ่านมานานมากแล้วนะเนี่ย"
21130-208 = "เอาเถอะ ถือเป็นเรื่องดีที่เราขังรุ่นพี่อาคาเนะได้... แต่ว่าอยากให้รุ่นพี่อาสึนะโดนขังด้วยจัง#nยังไม่พบตำแหน่งของรุ่นพี่คนนั้นใช่ไหม?"
21130-209 = "รุ่นพี่ฮาเระค้นหาทั่วมิลเลเนียมแล้ว แต่ก็เหมือนจะยังไม่เจอเลย หรือว่าจะไปอยู่นอกมิลเลเนียม?"
21130-210 = "ปกติเขาก็เป็นคนแบบนั้นอยู่แล้วนี่ ได้ข่าวว่าเคยออกไปซื้อพาร์เฟต์กินอย่างกะทันหัน#nระหว่างทำภารกิจด้วยนี่? แต่ก็เก่งที่ยังกลับมาทำภารกิจให้ได้สำเร็จ... ช่างเถอะ#nยังไงแผนการของเราก็ดำเนินไปได้ด้วยดีอยู่~"
21130-211 = "ใครน่ะ?!"
21130-212 = "เฮือก! พวกคนในสภานักเรียนมิลเลเนียมนี่นา! ยังมีหลงเหลืออยู่อีกเหรอเนี่ย?"
21130-213 = "คะ... คุณครู?!"
21130-214 = "[s3] \"ฝ่าไปเลย\"\n[s4] \"หนีกันเถอะ\""
21130-215 = "ช่วยไม่ได้สินะ"
21130-216 = "คุณครูเอง... ก็อยากฮึดสู้เหมือนกันสินะคะ"
21130-217 = "ไม่ได้! เราจะหนีไปไม่ได้! ต้องฝ่าพวกนั้นไปให้ได้ ไม่ว่าจะด้วยวิธีไหนก็ตาม!"
21130-218 = "ใช่! พวกเราถอยหลังไม่ได้แล้วนะ!"
21130-219 = "อย่างน้อยก็เพื่ออาริสึจัง!"
21130-221 = "......"
21130-222 = "[s] \"งั้นไปกันเลย!\""
