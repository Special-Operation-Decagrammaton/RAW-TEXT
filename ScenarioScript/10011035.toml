[translation]
10011035-4 = "What the hell was that?!"
10011035-5 = "[s] \"The Mouryo.\""
10011035-6 = "M-Mouryo? That known group of troublemakers?"
10011035-7 = "They called themselves the Free-Spirited Mouryo! Nin!"
10011035-8 = "I've heard of them...! Even for a Mouryo gang, they're extra-violent!"
10011035-11 = "They're against modernity and refuse to recognize anything other than the original traditional Hyakkiyako festivals..."
10011035-13 = "And demanded they be supplied with festival gift certificates twelve times a year...which seems a bit self-serving..."
10011035-15 = "But since the Hyakkiyako Academy refused, these festival hardliners have been causing scenes at every festival they attend."
10011035-17 = "That sounds like a bad comic book plot."
10011035-18 = "[s] \"Festival hardliners? That's a first.\""
10011035-20 = "But why would they attack this place?"
10011035-24 = "HELP! The actor for the princess has been kidnapped!"
10011035-28 = "The princess...was kidnapped?"
10011035-29 = "Th-That means...!"
10011035-30 = "Ibuki is in danger!"
10011035-31 = "[s] \"Their plan must have been to disrupt the meeting all along.\""
10011035-32 = "W-W-We have to report this! To the Yin-Yang Club! Or the Hyakkaryouran!"
10011035-33 = "N-No! That's too risky!"
10011035-37 = "[ns] \"What do you mean by risky, Michiru?\""
10011035-38 = "So, the thing is... Uh..."
10011035-39 = "Because... You know! The performance!"
10011035-41 = "A member of the Pandemonium Society has been kidnapped?"
10011035-42 = "If this gets out, it would set off a massive diplomatic catastrophe. Worst case scenario, it could even trigger a war between the two schools."
10011035-43 = "Yes! Exactly! Which is why we shouldn't report it right now!"
10011035-44 = "And isn't the head of the Pandemonium Society supposed to be, like, totally scary? If they were to ever find out, we'd be screwed!"
10011035-45 = "[s] \"Oh, I think it's a little late for that.\""
10011035-49 = "...Ibuki, a member of the Pandemonium Society, has been kidnapped?"
10011035-54 = "You're a Gehenna student?! Not only that, but a member of the Pandemonium Society?!"
10011035-55 = "Augh!! We're done for!"
10011035-56 = "D-Do we have to prepare for war?"
10011035-57 = "I need my anxiety meds! *wails*"
10011035-58 = "..."
10011035-59 = "[s] \"Iroha, take a deep breath. Let's talk about this.\""
10011035-60 = "Pardon me, Sensei. But I am EXTREMELY composed right now."
10011035-65 = "[ns] \"That's not really the vibe I'm getting from you...\""
10011035-66 = "Ugh... Fine, let's talk."
10011035-67 = "This is exactly why I was against this. Makoto said it would be \"an unforgettable experience\" for Ibuki, but I insisted it was too dangerous."
10011035-68 = "Didn't I warn you? This is on your hands, Makoto. What are you going to do about it? Hm?"
10011035-69 = "[s] \"Um, Iroha... You know Makoto isn't actually here, right...?\""
10011035-73 = "I could go out there right now and cause a furor the likes of which no one has ever seen. I'd rip everyone apart."
10011035-74 = "Whoa..."
10011035-75 = "Uh-oh..."
10011035-76 = "*gulp* ...Nin!"
10011035-77 = "...But I'm logical before I'm emotional. This can't become public knowledge."
10011035-78 = "We can't allow for political strife or conflict between the two schools."
10011035-79 = "...?!"
10011035-81 = "[ns] \"Iroha, I've never seen you be so considerate about the situation!\""
10011035-82 = "Because I'm gonna get roped into a lot more work if that happens."
10011035-83 = "[s] \"That's the Iroha I know and love!\""
10011035-84 = "Can you imagine if Makoto found out? Let alone Satsuki?"
10011035-85 = "In the end, who would have to clean up the mess? Nuh-uh. Not doing it."
10011035-86 = "Therefore, my recommendation is to handle this quietly."
10011035-87 = "...Wh-What do we do?"
10011035-88 = "...We do what we're meant to do."
10011035-89 = "President?"
10011035-90 = "This is the way of the ninja."
10011035-91 = "[s] \"What is it, Michiru?\""
10011035-92 = "I stake my pride as a ninja that we will resolve this before the public finds out!"
10011035-93 = "The people present here and now will be the only ones to ever know!"
10011035-95 = "Oh...!"
10011035-96 = "The genius president of our clan!"
10011035-97 = "And it's not just us. We have a top member of the Pandemonium Society and, most importantly, Sensei!"
10011035-98 = "We can do this!"
10011035-99 = "[s] \"I don't think it'll be that easy...\""
10011035-101 = "Sensei's right. How do we keep this under wraps?"
10011035-105 = "Mic check, one-two, one-two. Can you hear me?"
10011035-109 = "[ns] \"Is that the broadcast from the blimp?\""
10011035-111 = "Bwahaha! How's everyone enjoying the show so far?"
10011035-112 = "This extra-special performance is all thanks to the cooperation of those at the Pandemonium Society!"
10011035-113 = "Despite a few tweaks here and there, the time has come to for the experience you've all been waiting for... Hyakkiyako's Princess Waraku!"
10011035-114 = "Now, behold!"
10011035-126 = "As you can see, the cabal that kidnapped the princess is on the run!"
10011035-127 = "Who will be the first to rescue the princess from the evil cabal?"
10011035-128 = "The Yin-Yang Club have prepared a very, very special gift for the gallant hero who steps up as our savior."
10011035-129 = "To all the students of Gehenna who have graced us with your presence here at Hyakkiyako, as well as our own student body that has always given us unwavering support for our festivals..."
10011035-130 = "We look forward to your eager and enthusiastic participation in this event!"
10011035-131 = "We'll be cheering for you from the sidelines! Good luck!"
10011035-136 = "[ns] \"Wow...\""
10011035-137 = "Wow, indeed. Her message was loud and clear: \"The show must go on.\""
10011035-138 = "What a clever way to keep the audience from the situation."
10011035-139 = "That crafty... Uh, I mean, the president's reptuation truly precedes her. She bought us some time."
10011035-140 = "Okay, the mission is simple."
10011035-141 = "The Ninjutsu Research Club will rescue Ibuki before a single soul notices what happened!"
10011035-143 = "Yes, ma'am! A ninja will never ignore someone in need. Nin nin!"
10011035-144 = "Poor Ibuki... She must be so scared now..."
10011035-145 = "...Hang in there, Ibuki. I'm coming."
10011035-146 = "[s] \"Let's save the princess!\""
10011035-148 = "(Everything's okay. If we can just save Ibuki, the show will go on and so will our club.)"
10011035-149 = "(I have to fulfill my promise to Izuna and Tsukuyo.)"
10011035-150 = "(There's still a chance!)"
