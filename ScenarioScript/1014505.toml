[translation]
1014505-1 = "#title;천계 여행"
1014505-2 = "3;키사키 수영복;02;간밤에 나름대로 조사를 해 보았는데 말이다.\n#3;em;[반응]\n#3;a"
1014505-3 = "3;키사키 수영복;11;이 계곡에 와서 배 유람을 하지 않으면, 헛된 걸음을 한 것이라는 말이 있다는 것 같다."
1014505-4 = "[s] \"그렇…… 구나?\""
1014505-5 = "3;키사키 수영복;99;음."
1014505-6 = "3;키사키 수영복;00;작은 배를 타고 직접 물을 저어 나가며, 원하는 경치를 마음껏 관람하는 것이 핵심이라는 것 같더구나."
1014505-7 = "3;키사키 수영복;07;지금은 제법 이른 아침이지만, 오후가 되면 다른 관광객도 경치를 즐기러 오겠지.\n#3;em;[...]"
1014505-8 = "3;키사키 수영복;22;하지만 왠지, 선생과 고즈넉하게 이 분위기를 즐기고 싶어서 말이다."
1014505-9 = "[s1] \"확실히 여기에서도 대단한 경치인데.\"\n[s2] \"그걸 강 위에서 본다면 더 엄청나겠네.\""
1014505-10 = "#wait;10"
1014505-11 = "#wait;10"
1014505-12 = "3;키사키 수영복;03;음. 그러면 가 보도록 할까.\n#3;greeting"
1014505-13 = "#all;hide"
1014505-14 = "#na;안내원;–안내 사항은 여기까지입니다. 감사합니다! "
1014505-15 = "#na;안내원;여름이지만 아침 강물은 아직 차가우니, 충분히 주의해 주세요."
1014505-16 = "#na;안내원;즐거운 관람이 되시길 바랍니다!"
1014505-17 = "3;키사키 수영복;03;음. 기대되는구나.\n#3;em;[음표]\n#3;a"
1014505-18 = "3;키사키 수영복;15;저것이 그 배인가……. 두 명에서 네 명까지 탈 수 있다고 하던데, 정말로 그 정도이겠구나."
1014505-19 = "3;키사키 수영복;02;조금 전에 들었던 것이지만, 아침 안개가 낀 광경이 그렇게 볼만하다 하였지?\n#3;em;[?]"
1014505-20 = "3;키사키 수영복;02\n#na;안내원;그렇고말고요! 물론 아침 안개라는 것이 그렇게 원할 때마다 찾아와 주는 것은 아닙니다만……."
1014505-21 = "#na;안내원;강 위에 깔린 자욱한 안개 너머로, 저 봉우리들이 솟아 있는 광경을 보고 있으면……."
1014505-22 = "#na;안내원;마치 설화 속의 신선이 된 것 같다고 하니까요!"
1014505-23 = "3;키사키 수영복;03;후후. 확실히 그것은 기대가 되는구나.\n#3;em;[음표]"
1014505-24 = "3;키사키 수영복;10;자, 어서 가 보도록 하자."
1014505-25 = "#st;[0,0];instant;1;"
1014505-26 = "#clearST"
1014505-27 = "3;키사키 수영복;10\n#3;d\n#wait;2000"
1014505-28 = "#na;(키사키를 따라 배로 가려던 순간.)"
1014505-29 = "#na;안내원;아, 잠시 실례하겠습니다. 보호자 되시지요?"
1014505-30 = "[s] \"네? 네. 그런 셈입니다.\""
1014505-31 = "#na;안내원;예, 예. 말이 나온 김에 조금만 더 말씀드릴까 해서요."
1014505-32 = "#na;안내원;손님분들이 타실 배는, 전통적인 방법으로 만들어진 작은 배처럼 보이지만……."
1014505-33 = "#na;안내원;사실 자체적으로 움직일 수 있도록, 최신 시스템이 설치되어 있거든요!"
1014505-34 = "#na;안내원;그러니 그냥 노를 젓는 척만 하며, 분위기를 맞춰 주면 된답니다!"
1014505-35 = "[s] \"그건 좋네요.\""
1014505-36 = "#na;안내원;그렇지요? 그리고 만에 하나 안개가 짙어져서 길을 잃더라도……."
1014505-37 = "#na;안내원;자동 운행 모드로 바꿔 주시면, 알아서 이 선착장까지 돌아오게 되어 있으니, 걱정하지 않으셔도 됩니다!"
1014505-38 = "#na;안내원;그러면 즐거운 유람 되세요!"
1014505-39 = "#na;키사키 수영복;왜 그러는가, 선생? 무슨 일이라도 있는가?"
1014505-40 = "[ns] \"금방 갈게!\""
