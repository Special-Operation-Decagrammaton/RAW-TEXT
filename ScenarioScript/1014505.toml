1014505-48 = "3;키사키 수영복;22;그런가? 후후……. 선생의 팔은 내가 생각하고 있었던 것보다, 훨씬 튼튼했던 모양이구나.\n#3;em;[음표]"
1014505-49 = "3;키사키 수영복;11;천 개의 봉우리가 들판을 둘러싸 솟아 있고, 한 줄기 강물이 터를 안고 흐르는구나."
1014505-50 = "3;키사키 수영복;19;저 풍경이 보이는가, 선생? 두 마리 백로가 서로를 바라보며 즐거이 희롱하는구나. "
1014505-51 = "3;키사키 수영복;99;……."
1014505-52 = "3;키사키 수영복;02;선생. 잠시 배를 멈추어 줄 수 있겠는가?\n#3;em;[?]"
1014505-53 = "3;키사키 수영복;03;물은 계속해서 바다로 모일 것이고, 시간은 사람을 돌보지 않겠지만."
1014505-54 = "3;키사키 수영복;22;선생과 이렇게 있다는 것만으로, 지금만큼은 모든 것이 멈춘 듯하구나."
