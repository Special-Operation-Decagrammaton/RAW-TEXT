[translation]
10052090-1 = "霍刻瑪：守護王國的古代守護者"
10052090-3 = "[ns] 「話說，Kei醬。」"
10052090-4 = "怎麼了？"
10052090-5 = "[s] 「Kei醬一直參加實戰真的沒問題嗎？」"
10052090-6 = "怎麼事到如今才突然說這些啊。"
10052090-7 = "[s] 「老師很擔心Kei醬嘛～」"
10052090-8 = "你那樣真的是在擔心嗎……？"
10052090-9 = "沒事的，老師。#n要是有什麼萬一就交給我吧。"
10052090-10 = "[s] 「說的也是。英美是最棒的現場特務呢。」"
10052090-14 = "請問剛才有人提到最棒的特務嗎？"
10052090-15 = "[s] 「沒，沒什麼啦！季當然也是最棒的！嗯！」"
10052090-16 = "雖然不是很懂，不過聽見老師這麼說讓我心情很好，所以就先告辭了。"
10052090-22 = "兩個人都玩得很開心呢……"
10052090-23 = "回頭想想，最先發現霍刻瑪的應該是莉央會長吧。"
10052090-24 = "嗯？是啊……可以這麼說吧。"
10052090-25 = "畢竟是突然出現在地上的工作船，就算是我也會感到驚訝的。"
10052090-26 = "那確實是「特異現象」呢……"
10052090-27 = "……"
10052090-28 = "你覺得怎麼樣呢，莉央。#n身為創立特異現象搜查部的當事人，對於現在這個情況的感想如何啊？"
10052090-29 = "咦？Kei也知道那件事嗎？"
10052090-30 = "這個嘛……畢竟至今為止的數據和歷史，我幾乎都已經學習過了。"
10052090-31 = "可以說你們知道的事情，我也全都知道。#n等等，這句話我之前沒說過嗎……？"
10052090-33 = "是嗎……原來如此。"
10052090-34 = "感慨萬千這個詞彙……就是用在這種時候的嗎？"
10052090-36 = "……！"
10052090-37 = "……！"
10052090-42 = "大家為什麼都露出那種表情？"
10052090-44 = "啊……那個，就是……"
10052090-45 = "感覺會長也變了很多？"
10052090-46 = "說得也太直接了吧！"
10052090-48 = "是嗎……那麼這是好話還是壞話呢？"
10052090-50 = "你又為什麼只在這種時候不會看氣氛啦！"
10052090-51 = "冷靜點，Kei。#n要是每件事都生氣的話，情緒迴路可能會出問題。"
10052090-53 = "沒錯。而且我們還沒完全分析你現在的身體。"
10052090-54 = "萬一發生致命錯誤的話，可能會很難處理。"
10052090-61 = "我真的會被你們氣死……"
10052090-62 = "[s] 「……你還好嗎，Kei醬？」"
10052090-63 = "要是我哪天被氣死了，請一定要記住是誰害的……"
10052090-67 = "咦？Kei要死掉了嗎？#n不可以，Kei！"
10052090-68 = "不是……我不會死的。#n剛才那只是隨口說說，比喻一下而已……"
10052090-69 = "[s] 「真是辛苦我們Kei醬了……」"
10052090-70 = "感謝你的理解，老師……"
10052090-76 = "好了，現在該工作了，Kei。#n老師也找個安全的地方吧。"
10052090-77 = "知道了……在現場工作還比較不頭痛呢。"
10052090-78 = "那麼開始吧，老師。"
