[translation]
10052090-1 = "#title;호크마. 왕국을 지키는 고대의 수호자"
10052090-2 = "#wait;500"
10052090-3 = "[ns] \"그런데 말이지, 케이 쨩.\""
10052090-4 = "3;케이 프로토;00;왜요?\n#3;em;[?]\n#3;a"
10052090-5 = "[s] \"케이 쨩이 이렇게 계속 실전에 참여해도 괜찮을까?\""
10052090-6 = "3;케이 프로토;07;이제 와서 갑자기 무슨 소리십니까."
10052090-7 = "[s] \"선생님은 케이 쨩이 걱정이라서~\""
10052090-8 = "3;케이 프로토;04;……정말 걱정해 주시는 거 맞죠……?"
10052090-9 = "3;에이미 결전;15;괜찮아, 선생님. 만에 하나 무슨 일이 일어나면, 나에게 맡겨.\n#3;em;[반응]"
10052090-10 = "[s] \"그러네. 에이미는 최고의 현장 요원이니까.\""
10052090-11 = "#st;[0,0];instant;1;"
10052090-12 = "#clearST"
10052090-13 = "3;통신 토키 결전;00\n#3;a\n#wait;1000"
10052090-14 = "3;통신 토키 결전;02;최고의 요원이라는 표현이 들려서 난입했습니다만.\n#3;em;[반짝]"
10052090-15 = "[s] \"아무것도 아니야! 그리고 토키도 물론 최고지! 응!\""
10052090-16 = "3;통신 토키 결전;03;잘 모르겠지만, 선생님께서 그렇게 말씀해 주시니 기분이 좋아졌으므로, 이만 가 보도록 하겠습니다.\n#3;greeting"
10052090-17 = "#st;[0,0];instant;1;"
10052090-18 = "#clearST"
10052090-19 = "3;통신 토키 결전;03\n#3;d\n#wait;1200"
10052090-20 = "#all;hide"
10052090-21 = "3;케이 프로토;04\n#3;em;…\n#3;a\n#wait;2500"
10052090-22 = "3;케이 프로토;07;……둘 다 참 잘들 노네요…….\n#3;em;[한숨]"
10052090-23 = "3;에이미 결전;02;생각해 보면, 호크마를 처음 발견한 것은 리오 회장이었겠네."
10052090-24 = "3;통신 리오 결전;04;으, 응? 그래……. 그렇게 볼 수 있겠지."
10052090-25 = "3;통신 리오 결전;09;그래도 갑자기 땅 위에 나타난 공작선에는, 아무리 나라고 해도 놀랄 수밖에 없었어."
10052090-26 = "3;에이미 결전;99;확실히 그건 '초현상' 이었겠어……."
10052090-27 = "3;케이 프로토;99;……."
10052090-28 = "3;케이 프로토;02;어떤가요, 리오. 초현상특무부를 만든 장본인으로서, 지금 이 상황에 대해서요.\n#3;em;[반응]"
10052090-29 = "5;에이미 결전;02;어라? 케이도 그걸 알고 있었어?\n#5;em;[?]\n#5;al\n#3;m1"
10052090-30 = "3;케이 프로토;08;뭐……. 여기에 이르기까지의 데이터와 히스토리는, 거의 습득해 두었으니까요."
10052090-31 = "3;케이 프로토;02;당신들이 알고 있는 사항들은, 저 역시 알고 있다고 보시면 될 거예요. 잠깐만요. 이 말을 제가 한번 했던가요, 안 했던가요……?"
10052090-32 = "#all;hide"
10052090-33 = "3;통신 리오 결전;99;그래……. 그렇구나. \n#3;em;…"
10052090-34 = "3;통신 리오 결전;00;감회가 새롭다는 표현은…… 이럴 때 사용할 수 있는 걸까?"
10052090-35 = "#all;hide"
10052090-36 = "5;에이미 결전;15\n1;케이 프로토;00;……!\n#1;em;[?!]\n#1;shake"
10052090-37 = "5;에이미 결전;10;……!\n#5;stiff"
10052090-38 = "#st;[0,0];instant;1;"
10052090-39 = "#clearST"
10052090-40 = "#all;hide"
10052090-41 = "3;통신 리오 결전;01\n#3;em;[?]\n#3;h\n#wait;1000"
10052090-42 = "3;통신 리오 결전;02;다들 표정이 왜 그래?"
10052090-43 = "#all;hide"
10052090-44 = "5;에이미 결전;15\n1;케이 프로토;04;어…… 그, 아뇨. 그러니까.\n#1;em;[땀]"
10052090-45 = "5;에이미 결전;12;정말로 회장도 많이 변했구나 싶어서?"
10052090-46 = "1;케이 프로토;13;그걸 또 대놓고 말해 버리면 어떡합니까!\n#1;hophop\n#1;m2"
10052090-47 = "#all;hide"
10052090-48 = "3;통신 리오 결전;00;그렇구나……. 그런데 그건 좋은 말이야, 나쁜 말이야?\n#3;em;…"
10052090-49 = "#all;hide"
10052090-50 = "5;에이미 결전;02\n2;케이 프로토;13;당신은 또 왜 이럴 때만 사리 분별이 안 되는 건데요!\n#2;em;[///]"
10052090-51 = "5;에이미 결전;13;진정해, 케이. 일일이 화를 내다가는 감정 회로 쪽에 문제가 생길지도 몰라."
10052090-52 = "#all;hide"
10052090-53 = "3;통신 리오 결전;02;맞아. 거기에 우리가 아직 지금 네 신체를 완전히 분석하지 못한 상태니까."
10052090-54 = "3;통신 리오 결전;01;만에 하나 치명적인 오류가 발생하면 대처하기 어려울 수도 있어."
10052090-55 = "#st;[0,0];instant;1;"
10052090-56 = "#clearST"
10052090-57 = "#all;hide"
10052090-58 = "3;케이 프로토;13\n#3;em;[빠직]\n#3;h\n#wait;1000"
10052090-59 = "#all;hide"
10052090-60 = "#wait;1500"
10052090-61 = "#na;케이 프로토;죽겠네, 진짜……."
10052090-62 = "[s] \"……괜찮니, 케이 쨩?\""
10052090-63 = "#na;케이 프로토;제가 속 터져 죽으면, 누구들 때문이라고 생각해 주세요……."
10052090-64 = "#st;[0,0];instant;1;"
10052090-65 = "#clearST"
10052090-66 = "3;통신 아리스 결전;02\n#3;em;[?!]\n#3;h\n#3;shake\n#wait;1000"
10052090-67 = "3;통신 아리스 결전;04;네? 케이 죽는 겁니까? 안 됩니다, 케이!\n#3;stiff"
10052090-68 = "1;케이 프로토;04;아뇨……. 안 죽어요. 해 본 말이에요. 비유라고요…….\n#1;em;[땀]\n#1;a\n#3;m5"
10052090-69 = "[s] \"우리 케이 쨩이 고생이 많아…….\""
10052090-70 = "1;케이 프로토;09;알아주셔서 감사하네요. 선생님……."
10052090-71 = "#st;[0,0];instant;1;"
10052090-72 = "#clearST"
10052090-73 = "#all;hide"
10052090-74 = "#wait;2000"
10052090-75 = "#bgshake\n#wait;2500"
10052090-76 = "3;에이미 결전;02;자, 일을 할 시간이야. 케이. 선생님도 안전한 곳을 찾도록 하고.\n#3;em;[반응]\n#3;a"
10052090-77 = "3;케이 프로토;09;알겠습니다……. 차라리 현장 일을 하는 게 골치가 덜 아프겠네요.\n#3;stiff"
10052090-78 = "3;에이미 결전;03;그러면 시작해 보자. 선생님."
