[translation]
10052090-1 = "Chokmah, Realm's Ancient Guardian"
10052090-3 = "[ns] \"By the way, Kei-Kei.\""
10052090-4 = "Wh-What?"
10052090-5 = "[s] \"Is it okay for you to keep participating in field operations, Kei-Kei?\""
10052090-6 = "Why are you asking that NOW?"
10052090-7 = "[s] \"Because I'm worried about Kei-Kei!\""
10052090-8 = "...Are you actually worried...?"
10052090-9 = "She will be fine, Sensei. I will handle any unexpected occurrences."
10052090-10 = "[s] \"Right. You are the best field agent, after all.\""
10052090-14 = "Reporting in. Did somebody say \"best field agent\"?"
10052090-15 = "[s] \"Oh, did I? Toki is also the best. Absolutely!\""
10052090-16 = "I don't exactly understand the \"also,\" but I am happy with that answer. Goodbye."
10052090-22 = "...What is even going on here?"
10052090-23 = "Come to think of it, Rio was the first to discover Chokmah."
10052090-24 = "H-Hm? Yeah...I suppose so."
10052090-25 = "But even I was surprised when a ship suddenly rose from the ground."
10052090-26 = "Sounds like a definite \"super phenomenon\"..."
10052090-27 = "..."
10052090-28 = "Rio, as the creator of the Super Phenomenon Task Force, what do you think of all this?"
10052090-29 = "Huh? You knew that, Kei?"
10052090-30 = "Well... I've acquired most data and history leading up to this point, haven't I?"
10052090-31 = "Just assume I know everything you know. Wait, haven't I already told you this?"
10052090-33 = "Yeah... I see. "
10052090-34 = "Is this... I suppose, is this when I can say that I'm \"deeply moved\" that you asked?"
10052090-36 = "...!"
10052090-37 = "...!"
10052090-42 = "Why are you all looking at me like that?"
10052090-44 = "Uh... It's nothing. Well."
10052090-45 = "It seems like you've changed a lot since then, Rio."
10052090-46 = "Not subtle, Eimi!"
10052090-48 = "I see... Was that a compliment or an insult?"
10052090-50 = "You can't tell? Why do you only lose your common sense in times like these?"
10052090-51 = "Relax, Kei. Getting angry at every little thing could fry your emotional circuits."
10052090-53 = "It's certainly possible. I haven't fully analyzed your new body yet, after all."
10052090-54 = "If you experience a fatal error, I may have difficulty fixing it."
10052090-61 = "I? YOU'RE the ones who are killing me..."
10052090-62 = "[s] \"...You okay, Kei-Kei?\""
10052090-63 = "If I die out of frustration, you're all to blame."
10052090-67 = "What? Kei is dying? Kei, NOOOOO!"
10052090-68 = "No... I'm not dying. It's a turn of phrase, Aris. For...emotional resonance."
10052090-69 = "[s] \"Our Kei-Kei really has it rough...\""
10052090-70 = "Thank you for understanding, Sensei..."
10052090-76 = "It's time to get moving, Kei. See if you can find a place where Sensei can safely observe."
10052090-77 = "Understood... At this point, it would be less of a pain to do some ACTUAL work."
10052090-78 = "Let's get started then, Sensei."
