[translation]
10052090-1 = "ชอกมาห์ ผู้พิทักษ์แห่งบรรพกาล ผู้ปกป้องอาณาจักร"
10052090-3 = "[ns] \"ว่าแต่ว่า เคย์จัง\""
10052090-4 = "ทำไมเหรอคะ?"
10052090-5 = "[s] \"เคย์จังจะเข้าร่วมการต่อสู้จริงแบบนี้ต่อไปได้เหรอ?\""
10052090-6 = "มาถามอะไรแบบนั้นเอาตอนนี้ล่ะคะ?"
10052090-7 = "[s] \"ก็ครูเป็นห่วงเคย์จังนี่นา~\""
10052090-8 = "นี่เป็นห่วงฉันจริงๆ ใช่มั้ยคะ...?"
10052090-9 = "ไม่เป็นไรหรอกนะ คุณครู ถ้าเกิดเรื่องอะไรขึ้นมาละก็ ฉันจะดูแลให้เอง"
10052090-10 = "[s] \"นั่นสินะ ก็เอมิคือสมาชิกภาคสนามที่ยอดเยี่ยมที่สุดนี่นา\""
10052090-14 = "ฉันเข้ามาแทรกเพราะได้ยินคำว่าสมาชิกภาคสนามที่ยอดเยี่ยมที่สุดค่ะ ว่าแต่มีอะไรกันเหรอคะ?"
10052090-15 = "[s] \"ไม่มีอะไรหรอก! โทคิก็ยอดเยี่ยมที่สุดเหมือนกันนะ! อื้อ!\""
10052090-16 = "ถึงจะไม่เข้าใจเท่าไร แต่พอได้ยินคุณครูพูดแบบนั้นฉันก็อารมณ์ดีขึ้นนะคะ งั้นฉันขอตัวละค่ะ"
10052090-22 = "เชื่อเขาเลยนะคะ ทั้งคู่เลย..."
10052090-23 = "พอมาคิดดูแล้ว คนที่ค้นพบชอกมาห์เป็นคนแรกก็คือประธานริโอะสินะ"
10052090-24 = "หะ... หืม? อื้อ... จะว่าอย่างนั้นก็ได้"
10052090-25 = "แต่ยังไงฉันก็อดประหลาดใจไม่ได้เลยละ ตอนที่เห็นเรือสอดแนมโผล่ขึ้นมาจากพื้นเอาดื้อๆ น่ะ"
10052090-26 = "นั่นคือ 'ปรากฏการณ์ลี้ลับ' ของจริงเลยละ..."
10052090-27 = "..."
10052090-28 = "ว่ายังไงล่ะคะ ริโอะ ในฐานะผู้ก่อตั้งชมรมปรากฏการณ์ลี้ลับ รู้สึกยังไงกับสถานการณ์นี้บ้างคะ?"
10052090-29 = "เอ๋? เคย์ก็รู้เรื่องนั้นด้วยเหรอคะ?"
10052090-30 = "ก็... ฉันศึกษาข้อมูลและประวัติความเป็นมาเกือบทั้งหมดแล้วนี่คะ"
10052090-31 = "เรื่องที่พวกคุณรู้กันอยู่ ให้คิดว่าฉันก็รู้อยู่แล้วได้เลยค่ะ เดี๋ยวนะ ฉันเคยพูดทำนองนี้ไปแล้วครั้งหนึ่ง#nหรือเปล่าคะ...?"
10052090-33 = "อื้อ... อย่างนั้นสินะ "
10052090-34 = "ความรู้สึกที่ 'ตื้นตันจนบอกไม่ถูก'... คำนี้คงเหมาะที่จะใช้ในสถานการณ์นี้สินะ?"
10052090-36 = "...!"
10052090-37 = "...!"
10052090-42 = "ทำไมทุกคนถึงทำหน้าแบบนั้นล่ะ?"
10052090-44 = "อ่า... ไม่มีอะไรค่ะ ก็แค่"
10052090-45 = "คิดว่าประธานก็เปลี่ยนไปมากจริงๆ น่ะ"
10052090-46 = "ทำไมถึงพูดโต้งๆ ต่อหน้าแบบนั้นล่ะคะ!"
10052090-48 = "งั้นเองเหรอ... ว่าแต่มันดีหรือไม่ดีนะ?"
10052090-50 = "แล้วทีเวลาแบบนี้ ทำไมคุณถึงแยกแยะอะไรไม่ได้นะคะ!"
10052090-51 = "ใจเย็นๆ ก่อนนะ เคย์ ถ้าโกรธกับทุกเรื่องเล็กๆ น้อยๆ วงจรอารมณ์อาจเกิดปัญหาขึ้นมาก็ได้นะ"
10052090-53 = "ใช่แล้วละ นั่นก็เพราะการวิเคราะห์ร่างกายปัจจุบันของเคย์ยังไม่เสร็จสมบูรณ์"
10052090-54 = "ถ้าเกิดข้อผิดพลาดร้ายแรงอะไรขึ้นมา มันอาจจะแก้ไขได้ยากเลยนะ"
10052090-61 = "อยากจะบ้าตาย จริงๆ เลย..."
10052090-62 = "[s] \"ไหวหรือเปล่า... เคย์จัง?\""
10052090-63 = "ถ้าฉันอกแตกตายขึ้นมา ก็ให้รู้ไว้เลยนะคะว่าเป็นความผิดใคร..."
10052090-67 = "คะ? เคย์จะตายงั้นเหรอคะ? ไม่ได้นะคะ เคย์!"
10052090-68 = "เปล่าค่ะ... ไม่ได้ตายค่ะ ฉันก็แค่พูดไปอย่างนั้นค่ะ แค่เปรียบเปรยน่ะ..."
10052090-69 = "[s] \"เคย์จังของเราคงเหนื่อยน่าดูเลยนะ...\""
10052090-70 = "ขอบคุณที่เข้าใจค่ะ คุณครู..."
10052090-76 = "เอาละ ถึงเวลาทำงานแล้ว เคย์ คุณครูก็ไปหลบในที่ที่ปลอดภัยด้วยล่ะ"
10052090-77 = "เข้าใจแล้วค่ะ... การได้ไปทำงานภาคสนามน่าจะทำให้ฉันปวดหัวน้อยลงกว่าเดิมก็ได้ค่ะ"
10052090-78 = "งั้นก็มาเริ่มงานกันเลย คุณครู"
