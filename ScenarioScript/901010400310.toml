[translation]
901010400310-7 = "あ、見てみて。今朝水揚げしたばっかのカニだって。"
901010400310-8 = "お腹も空いてきたし……お昼にカニとかいいんじゃない？"
901010400310-9 = "うーん……カニ料理はちょっと……。"
901010400310-10 = "どうして？"
901010400310-11 = "カニって、ほら、殻剥くじゃん？"
901010400310-12 = "あれで怪我したことあってさ……。"
901010400310-13 = "ああ……身をほじるのもめんどいもんね。"
901010400310-14 = "じゃあ、お昼は他のにしよっか。"
901010400310-20 = "（もしかしたら、ここで事件の手がかりを見つけられるかも）"
901010400310-21 = "（ちょっとだけ、情報収集してみよう）"
