[translation]
2005202-1 = "#title;인프라스트럭처"
2005202-2 = "3;야쿠모;00;오늘도 날이 춥네요오~\n#3;em;[재잘]\n#3;a"
2005202-3 = "3;야쿠모;07;언제나 그렇긴 했지만요오~"
2005202-4 = "[s] \"이런 오지까지 올 이유가…… 있었어?\""
2005202-5 = "3;야쿠모;02;있고 말고요.\n#3;em;[반응]"
2005202-6 = "3;야쿠모;05;출판부에게는 사소한 한 걸음이지만."
2005202-7 = "3;야쿠모;11;붉은겨울에는…… 중요한 걸음이 될!"
2005202-8 = "3;야쿠모;04;……지도 모르는 일을 하기 위해서죠.\n#3;em;[세로선]"
2005202-9 = "[s] \"그게 뭔데?\""
2005202-10 = "3;야쿠모;00;바로, 말씀드린 것처럼, 통신선 설치입니다!\n#3;closeup\n#fontsize;80"
2005202-11 = "#st;[0,0];instant;1;"
2005202-12 = "#clearST"
2005202-13 = "#wait;2500"
2005202-14 = "3;야쿠모;09;어째서 출판부가 그런 일까지 하느냐는 표정으로 저를 바라보고 계시는군요.\n#3;em;[음표]\n#3;closeup"
2005202-15 = "3;야쿠모;07;이해합니다. 이해해요. 힛. 힛. 히. 이런 건 분명히 공적 영역이고.\n#3;closeup"
2005202-16 = "3;야쿠모;08;그런 의미에서, 원칙적으로는 붉은겨울 사무국이 담당해야 할 일이기도 하죠.\n#3;closeup"
2005202-17 = "3;야쿠모;04;사무국의 일 처리 속도를 생각해 보면, 공사는 100년이 지나도 시작조차 되지 않겠지만 말이죠오~\n#3;em;[한숨]\n#3;closeup"
2005202-18 = "[s] \"그러면 출판부가 이 일을 하고 있는 것은……?\""
2005202-19 = "3;야쿠모;07;네. 더 말해 무엇하겠습니까."
2005202-20 = "3;야쿠모;04;하청으로 받은 일이랍니다.\n#3;em;[속상함]"
2005202-21 = "[s1] \"그런 것인가…….\"\n[s2] \"하청으로 넘겼구나, 사무국…….\""
2005202-22 = "#wait;10"
2005202-23 = "#wait;10"
2005202-24 = "3;야쿠모;02;그러면 제가 혼자서 통신선을 다 설치하는 것이냐고요? 제가 왜요?\n#3;em;[?]"
2005202-25 = "3;야쿠모;07;어쨌든 중요한 것은, 설치되었다는 결과 아니겠습니까."
2005202-26 = "3;야쿠모;09;자, 여러분! 오시죠!\n#3;greeting"
2005202-27 = "#st;[0,0];instant;1;"
2005202-28 = "#clearST"
2005202-29 = "3;야쿠모;09\n#3;d\n#wait;1200"
