2005202-31 = "#wait;150"
2005202-32 = "#wait;1500"
2005202-33 = "1;용역부원 붉은겨울;00\n3;용역부원 붉은겨울;00\n5;용역부원 붉은겨울;00\n#1;a\n#3;a\n#5;a\n#1;h\n#3;h\n#5;h\n#wait;1500"
2005202-34 = "1;용역부원 붉은겨울;00;정말이지, 출판부? 이번 일 잘 끝내면, 추가 푸딩을 대신 사 주겠다는 거!\n#1;hophop\n#1;em;[반짝]"
2005202-35 = "5;용역부원 붉은겨울;00;거기에 빨리 끝내면 끝내는 만큼, 특별 루트로 구입한 '특제 모르스'까지 추가 급여로 주겠다는 것도!\n#5;em;[///]\n#5;stiff"
2005202-36 = "#all;hide"
2005202-37 = "3;야쿠모;07;물론이죠. 이런 일은 모름지기 신뢰가 중요한 것 아니겠습니까.\n#3;em;[재잘]"
2005202-38 = "3;야쿠모;08;저, 출판부 부장 아라마키 야쿠모, 돈 걸린 일은 허투루 처리하지 않으니까요!"
2005202-39 = "#st;[0,0];instant;1;"
2005202-40 = "#clearST"
2005202-41 = "3;야쿠모;01\n#3;em;[?]\n#3;h\n#wait;1000"
2005202-42 = "3;야쿠모;02;……선생님? 왜 그렇게 놀란 표정을 하고 계시는 건가요?"
2005202-43 = "[s3] \"이럴 수가…… 분명히 하청의 하청이라는 시스템을 가져온 이상……!\"\n[s4] \"어떤 식으로든 급여를 중간에 일부라도 가로채서!\"\n[s5] \"출판부의 이익을 극대화할 줄 알았는데!\""
2005202-44 = "#wait;10"
2005202-45 = "#wait;10"
2005202-46 = "#wait;10"
2005202-47 = "3;야쿠모;05;무슨 말씀을 하시는 건가요, 선생님. 저도 그렇게까지 악마는 아니랍니다."
2005202-48 = "3;야쿠모;04;……누군가 대금을 떼어먹으려고 한다면, 악마보다 더 한 악마가 되어 줄 각오는 되어 있지만요.\n#3;em;[…]"
2005202-49 = "3;야쿠모;00;어쨌든, 선생님도 하나는 알고 하나는 모르시는군요. 힛. 힛. 히."
2005202-50 = "[s6] \"크윽, 야쿠모에게 그런 말을 듣다니 분하다!\"\n[s7] \"그렇다면, 야쿠모가 알고 있는 또 하나는 무엇인가!\""
2005202-51 = "#wait;10"
2005202-52 = "#wait;10"
2005202-53 = "3;야쿠모;99;그것은 말이죠. 바로……"
2005202-54 = "3;야쿠모;09;인프라가 저렴하게 깔려야, 진짜 장사를 할 수 있다는 사실입니다!\n#3;em;[반짝]"
2005202-55 = "3;야쿠모;11;보세요, 선생님. 인프라 설치 비용이 올라가면, 설치 측에서는 당연히 그 비용을 사용자들에게 어떤 방식으로든 청구하게 되겠죠.\n#3;m2"
2005202-56 = "3;야쿠모;07;거기에 한층 더해서, 여기에서 안건 발주 주체는 사무국이니까 말이죠."
2005202-57 = "3;야쿠모;04;그 구두쇠들, 애초에 공사가 거의 불가능할 정도의 예산밖에는 편성해 주지 않았다구요?\n#3;em;[한숨]"
2005202-58 = "3;야쿠모;01;그렇다고 해서 모자란 예산분에다 추가로 바가지를 씌워서, 당장의 이익만을 추구하려는 것은……."
2005202-59 = "3;야쿠모;03;말 그대로 단기 이익과 장기 손실의 문제, 그 자체라고밖에 할 수 없는 것이죠!\n#3;greeting"
2005202-60 = "3;야쿠모;07;모두가 모두와 연결된 이 초연결사회! 통신망은 또 다른 의미의 라이프라인이라고 할 수 있습니다!\n#3;em;[재잘]\n#3;m3"
2005202-61 = "3;야쿠모;08;그리고 라이프라인을 무분별하게 민영화하면, 결국 모두가 망해요!"
2005202-62 = "3;야쿠모;09;여기에서는 출판부가 단기 손실을 감안하더라도, 최대한 저렴하게 통신 인프라를 구축한 다음!"
2005202-63 = "3;야쿠모;07;그 활용권을 사무국과 협상하는 게 장기적인 사업 방안인 거죠!"
2005202-64 = "3;야쿠모;11;활용권이에요, 활용권. 소유권 아닙니다. 이거 중요해요.\n#3;em;[음표]"
2005202-65 = "[s] \"그래서…… 결국 뭘 어떻게 할 건데……?\""
2005202-66 = "3;야쿠모;09;그 부분은 이제부터 두고 보시죠."
2005202-67 = "3;야쿠모;07;힛. 힛. 히.\n#3;em;[반짝]"
2005202-68 = "#all;hide"
2005202-69 = "#wait;2000"
2005202-70 = "#na;붉은겨울 학생 A;드디어 우리 기숙사에도…… 인터넷 유선망이 들어왔어!"
2005202-71 = "#na;붉은겨울 학생 B;이제 비싸고 느리고 끊기기까지 하는…… 저품질 무선 인터넷에 목맬 필요가 없는 거구나……."
2005202-72 = "#st;[0,0];instant;1;"
2005202-73 = "#clearST"
2005202-74 = "#wait;1500"
2005202-75 = "3;야쿠모;01\n#3;a\n#wait;1500"
2005202-76 = "3;야쿠모;02;그런데 말입니다. 여러분.\n#3;em;[반응]"
2005202-77 = "3;야쿠모;08;빠르고, 저렴하고, 끊김이 없는 인터넷으로…… 이제부터 뭘 할 생각이신가요?"
2005202-78 = "#all;hide"
2005202-79 = "3;야쿠모;08\n#na;붉은겨울 학생 A;어? 그, 그거야……."
2005202-80 = "#na;붉은겨울 학생 B;생각해 보니, 그런 걸 고민해 본 적이 없네……."
2005202-81 = "3;야쿠모;00;자, 자. 이럴 때는 우선 다 잊고, 재미있는 것부터 시작하는 게 어떨까요?\n#3;em;[재잘]"
2005202-82 = "3;야쿠모;09;여기, 저희 출판부가 만든 스트리밍 플랫폼에 접속하시면 말이죠. 우선 웹소설을 100편까지 무료로 감상하실 수 있거든요?"
2005202-83 = "3;야쿠모;09\n#na;붉은겨울 학생 A;100편이나?!"
2005202-84 = "#na;붉은겨울 학생 B;그것도 공짜!"
2005202-85 = "3;야쿠모;10;그렇습니다. 그리고 적절한 시간이 지나면, 또다시 무료 감상분이 풀리기도 하죠.\n#3;em;[음표]"
2005202-86 = "3;야쿠모;11;……물론, 소정의 요금을 지불하시면, 남들보다 빠르고 정확하게, 그다음 내용의 유료 결제분을 추가로 보실 수도 있고요?"
2005202-87 = "3;야쿠모;11\n#na;붉은겨울 학생 A;유료 결제분……?"
2005202-88 = "#na;붉은겨울 학생 B;에이. 우선 100편이나 무료로 보게 해 준다잖아. 굳이 결제까지 할 필요 있겠어?"
2005202-89 = "#st;[0,0];instant;1;"
2005202-90 = "#clearST"
2005202-91 = "3;야쿠모;11\n#3;h\n#wait;2000"
2005202-92 = "3;야쿠모;07;(후후후……. 처음에는 다들 그렇게 생각하는 법이죠…….)\n#3;em;[반짝]"
2005202-93 = "[s] (야쿠모…… 이 녀석……!)"
2005202-94 = "#all;hide"
2005202-95 = "#wait;2500"
2005202-96 = "#na;붉은겨울 학생 A;저, 전부 읽어버렸는데?!\n#fontsize;100"
2005202-97 = "#na;붉은겨울 학생 B;그러게! 다음 내용 없어? 다음 내용!"
2005202-98 = "3;야쿠모;00;진정하세요, 진정하세요. 아까 말씀드리지 않았습니까? 소정의 요금을 지불하시면…….\n#3;em;[재잘]\n#3;a"
2005202-99 = "#all;hide"
2005202-100 = "#na;붉은겨울 학생 A;그러니까 그거 내고도 다 봤다고!\n#fontsize;80"
2005202-101 = "#na;붉은겨울 학생 B;다음 이야기 언제 나와? 정액제 구독도 할 테니까 제발!"
2005202-102 = "3;야쿠모;13;?!\n#3;em;[?!]\n#3;shake"
2005202-103 = "3;야쿠모;12;이, 이건 조금 놀랍네요. 이렇게 빠르게 컨텐츠를 소모해 주시다니……."
2005202-104 = "3;야쿠모;08;그러면 말이죠. 우선 이 웹소설을 코미컬라이즈한 웹툰을 즐기시는 건 어떠신가요?"
2005202-105 = "3;야쿠모;11;글로 읽는 것과 그림으로 보는 것 사이에는, 비교할 수 없는 차이가 있으니까 말이죠?\n#3;em;[반짝]"
2005202-106 = "3;야쿠모;11\n#na;붉은겨울 학생 A;볼래! 볼래!"
2005202-107 = "#na;붉은겨울 학생 B;어…… 그런데 웹툰은 10화만 무료네……?"
2005202-108 = "3;야쿠모;06;아이고, 그 부분은 조금 봐주셨으면 하네요. 이게 또 그림을 그린다는 게 보통 힘든 일이 아니라서 말이죠!\n#3;em;[속상함]"
2005202-109 = "3;야쿠모;09;정 기다리기 힘드시다면…… '작가' 님께 소정의 '자발적 후원'을 통해, 펀딩을 하는 방법도 있답니다?"
2005202-110 = "3;야쿠모;00;이러니저러니 해도…… 이런 세상. 사람을 움직이는 힘은 금전이니까 말이에요. 힛. 힛. 히."
2005202-111 = "3;야쿠모;11;(그리고 펀딩을 주선하는 것은 우리 출판부이니, 수수료 장사도 아쉽지 않게 할 수 있을 거고요.)\n#3;em;[음표]"
2005202-112 = "3;야쿠모;11\n#na;붉은겨울 학생 A;그런데…… 왜 결제 금액에 상한선을 둔 거야?"
2005202-113 = "#na;붉은겨울 학생 B;맞아! 형편만 되면 제한 없이 모두 결제하고 싶은데!"
2005202-114 = "3;야쿠모;08;마음은 감사드립니다만, 저희 출판부의 목표는 어디까지나 독자분들의 행복과 즐거움이니까요.\n#3;em;[반응]"
2005202-115 = "3;야쿠모;00;독자분들이 저희 출판부의 플랫폼 때문에 일상생활을 이어 나가지 못한다면, 그야말로 주객전도라고밖에 할 수 없지 않겠어요?"
2005202-116 = "3;야쿠모;04;(……소비자를 금전적으로나 감정적으로 파산시키지 않아야, 더 오래 장사를 할 수 있기 때문이기도 하지만요.)"
2005202-117 = "3;야쿠모;03;그리고 추가로 보고 싶은 것이 있으시다면…… 이번에는 또 저희가 이런 영상 기획물을 여럿 준비하고도 있는데요.\n#3;em;[음표]"
2005202-118 = "#st;[0,0];instant;1;"
2005202-119 = "#clearST"
2005202-120 = "3;야쿠모;08\n#3;greeting\n#wait;1300"
2005202-121 = "3;야쿠모;02\n#3;em;[?]\n#3;h\n#wait;1000"
2005202-122 = "3;야쿠모;04;어라아…… 이건 조금 곤란하네요오…….\n#3;stiff"
2005202-123 = "3;야쿠모;04\n#na;붉은겨울 학생 A;또, 또 왜?"
2005202-124 = "#na;붉은겨울 학생 B;어……? 지금 여기에 설치된 인터넷 회선의 속도로는, 이 정도의 고화질 영상을 원활하게 볼 수 없다고……?"
2005202-125 = "3;야쿠모;06;아쉽게도, 그런 것 같네요. 이야아, 이것 참. 사무국이 예산을 좀처럼 주지 않아서 말이에요."
2005202-126 = "3;야쿠모;09;하지만 어떻게 생각하시나요? 더 많은 웹소설과, 웹툰과, 영상물과…….\n#3;em;[반응]"
2005202-127 = "3;야쿠모;99;보다 고품질의 컨텐츠를 즐기시려면, 더 빠른 인터넷 회선이……."
2005202-128 = "3;야쿠모;11;……필요하겠지요?\n#3;em;[반짝]\n#3;closeup"
2005202-129 = "#st;[0,0];instant;1;"
2005202-130 = "#clearST"
