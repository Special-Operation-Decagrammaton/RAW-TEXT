2005202-133 = "#wait;1500"
2005202-134 = "#na;붉은겨울 학생 A;그건 확실한 것 같아!\n#fontsize;100"
2005202-135 = "#na;붉은겨울 학생 B;여기에서도 사무국 때문인가……. 좋아! 항의하러 가야겠어!"
