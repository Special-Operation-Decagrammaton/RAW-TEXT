[translation]
90002070-1 = "ตอนที่ 7;เคย์"
90002070-2 = "เคย์? เคย์?! เป็นอะไรไปคะ เคย์!?!? ขอร้องละ! อย่าทิ้งให้อาริสึ... ต้องอยู่คนเดียวเลยนะคะ!"
90002070-3 = "เคย์!!!!!"
90002070-8 = "อาริสึ"
90002070-12 = "ค่ะ ค่ะ! วะ... ว่ายังไงคะ อาริสึจะรับฟังที่เคย์บอกทุกอย่างเลยค่ะ...!"
90002070-13 = "ขอโทษนะคะ ฉันยังมึนๆ อยู่เลย ช่วยเบาเสียงหน่อยได้มั้ยคะ?"
90002070-14 = "คะ...?"
90002070-15 = "อึกก... ไม่ไหวเลย..."
90002070-16 = "เป็นอะไรมากหรือเปล่าคะ เคย์...?"
90002070-17 = "ไม่เป็นไรค่ะ ฉันไม่เป็นไร อาริสึ แค่นี้สบายมากค่ะ ร่างกายฉันแค่มีเสียงดังเอี๊ยดอ๊าดเหมือนจะหักไป#nทั้งตัวเท่านั้นเองค่ะ"
90002070-20 = "ฉันดูให้เอง อาริสึ ขอฉันเข้าไปหน่อยนะ"
90002070-21 = "ค่ะ ได้ค่ะ! รุ่นพี่ริโอะ...!"
90002070-24 = "ก่อนอื่นเลย ไม่ต้องกังวลหรอก อาริสึ เคย์ยังมีสติอยู่... และไม่ได้อยู่ในระดับอันตรายถึงชีวิต"
90002070-25 = "จริงเหรอคะ? ขอบคุณค่ะ รุ่นพี่ริโอะ!"
90002070-26 = "แต่ถึงยังไง ร่างกายของเคย์ในตอนนี้ก็ใกล้จะถึงขีดจำกัดแล้วค่ะ"
90002070-27 = "จะ... จริงเหรอคะ? เราต้องทำยังไงเหรอคะ รุ่นพี่ฮิมาริ...?"
90002070-28 = "ไม่มีอะไรยากหรอก เราแค่ยกเครื่องใหม่ทั้งหมดก็พอ"
90002070-29 = "สุดท้ายแล้วจะมีก็แค่ปัญหาทางกายภาพเกี่ยวกับฟังก์ชันและการทำงานเท่านั้นน่ะ"
90002070-30 = "ยะ... อย่างนี้นี่เองสินะ ดีแล้วละ... เคย์จัง..."
90002070-31 = "เดี๋ยวนะคะ สรุปว่าต้องซ่อมบำรุงร่างกายนี้แล้วเอากลับมาใช้ใหม่งั้นเหรอคะ?"
90002070-32 = "ก็ใช่นะ? เราต้องแยกชิ้นส่วนออกมาตรวจสอบ แล้วก็ประกอบเข้าไปใหม่ ก็เลยน่าจะต้องใช้เวลาสักระยะ... ว่าแต่ เคย์ติดอะไรงั้นเหรอ?"
90002070-36 = "..."
90002070-37 = "นี่เป็นแค่ข้อเสนอแนะน่ะค่ะ"
90002070-38 = "ในเมื่อจะซ่อมฉันแล้ว งั้นเราใช้โอกาสนี้... เปลี่ยนให้ฉันอยู่ในร่างอื่นไม่ได้เหรอคะ?"
90002070-39 = "ร่างอื่นงั้นเหรอคะ? แต่เหมือนเราจะไม่มีร่างต้นแบบที่เหมาะสมเลยนะคะ?"
90002070-40 = "ร่างต้นแบบที่เหมาะสมก็อยู่ตรงนั้นไงคะ ตรงนั้นน่ะ!"
90002070-41 = "ตรงนั้นเหรอ...?"
90002070-43 = "ร่างต้นแบบที่ว่า... หมายถึงสิ่งที่อยู่ตรงนี้งั้นเหรอ?"
90002070-44 = "แต่นี่น่าจะเป็นสิ่งที่ฝ่ายเดคาแกรมมาทอนสร้างขึ้นมานะ...?"
90002070-45 = "พวกเราวิเคราะห์กันเกือบหมดแล้วเถอะค่ะ แล้วก็ตรวจสอบแล้วด้วยค่ะว่าไม่มีปัญหาอะไรทั้งนั้น"
90002070-46 = "ใจเย็นๆ ก่อนนะ เคย์ ที่บอกว่าไม่มีปัญหาคือเรื่องของการเคลื่อนไหวต่างหาก"
90002070-47 = "ใช่ค่ะ ฉันบอกว่าถ้าเราย้ายวงจรการรับรู้บางอย่างเข้าไป ก็จะเคลื่อนไหวได้ทันทีก็จริง..."
90002070-48 = "ก็เพราะแบบนั้นแหละ! ฉันถึงเสนอให้ใช้ฉันยังไงล่ะคะ!"
90002070-49 = "ฉันไม่เห็นด้วยหรอกนะ เราคาดการณ์ไม่ได้เลยว่าจะเกิดตัวแปรอะไรบ้าง ถ้าให้พูดง่ายๆ เลยก็คือ... มันเสี่ยงเกินไป"
90002070-50 = "เหนือสิ่งอื่นใด เรามั่นใจไม่ได้ด้วยว่าจะฝ่าด่านการรักษาความปลอดภัยของร่างต้นแบบนั้นได้"
90002070-51 = "เรื่องนั้นฉันจะทำเองค่ะ ฉันเคยบอกไปแล้วนี่คะว่าถ้ามีเวลาและทรัพยากร ก็ต้องทำได้อย่างแน่นอนน่ะ"
90002070-52 = "[s] \"แต่ตอนนี้เราไม่มีทั้งสองอย่างนั้นเลยหรือเปล่า?!\""
90002070-53 = "อะ... อืม... มันก็ใช่ว่าจะเป็นไปไม่ได้เสียทีเดียวหรอกค่ะ แต่ถ้าพิจารณาเรื่องความเสี่ยงแล้วละก็..."
90002070-57 = "ทำไมทุกคนถึงเอาแต่บอกว่าไม่ได้กันล่ะ!"
90002070-58 = "ทำไมถึงไม่ลองทำดูก่อนล่ะคะ!"
90002070-59 = "โอ้ เหมือนเคย์เวอร์ชันหัวร้อนจะกลับมาแล้วสินะ"
90002070-60 = "เอาละ ดูนี่นะคะ นี่คือสิ่งที่สร้างขึ้นจากวัสดุในดินแดนเหล็กกล้าใช่มั้ยคะ? ฉันพูดถูกใช่มั้ย?"
90002070-61 = "เพราะงั้นถ้ามันเป็นไปได้ด้วยดี และฉันได้เชื่อมต่อกับสิ่งนี้ละก็ บางทีเราอาจจะหาเบาะแสอะไรเจอก็ได้#nไม่ใช่เหรอคะ?"
90002070-62 = "แต่ถ้าเราล้มเหลวละก็..."
90002070-64 = "ทำไมถึงเอาแต่พูดในแง่ลบแบบนั้นล่ะคะ! แบบนั้นมันจะเป็นการปิดโอกาสของความเป็นไปได้นะคะ!"
90002070-65 = "ลองทำดูก่อนเถอะค่ะ! นะคะ? แล้วถ้ามันไม่ได้จริงๆ! ตอนนั้นค่อยมาคิดหาทางแก้ไขก็ได้ไม่ใช่เหรอคะ!"
90002070-66 = "วันนี้พูดเหมือนเป็นหัวหน้างานหัวโบราณจากที่ไหนสักแห่งเลยนะคะ เคย์..."
90002070-67 = "ขอร้องละค่ะ... เราเคยย้ายระบบการรับรู้ไปแล้วครั้งหนึ่งนี่คะ ครั้งหนึ่งฉันเคยอยู่ในพวงกุญแจนะคะ! ทุกคนก็รู้กันไม่ใช่เหรอคะ!"
90002070-73 = "ค่ะ! อาริสึยังเก็บมันไว้เป็นที่ระลึกอยู่เลยค่ะ!"
90002070-74 = "อ่า ค่ะ ขอบคุณค่ะ อาริสึ สรุปว่าสิ่งที่ฉันอยากพูดก็คือ"
90002070-75 = "ถ้ามันเคยได้ผลแล้วครั้งหนึ่ง ทำไมมันจะไม่ได้ผลอีกล่ะคะ!"
90002070-76 = "ขอย้ำอีกครั้งนะคะ ถ้ามันไม่ได้ผลขึ้นมาจริงๆ ละก็ ตอนนั้นเราค่อยหาวิธีอื่นกันก็ได้ค่ะ!"
90002070-77 = "ไม่ชอบร่างกายของตัวเองตอนนี้ขนาดนั้นเลยเหรอ...?"
90002070-78 = "ฉันขอร้องละค่ะ ได้โปรดเถอะ นะคะ? ถ้าไม่ย้ายให้ละก็..."
90002070-79 = "ฉันจะนอนประท้วงตรงนี้จนกว่าจะยอมกันเลยค่ะ~~~!!!"
90002070-88 = "เคย์?!"
90002070-89 = "อึก... สงสัยจะโมโหสุดขีดน่ะค่ะ สภาพก็ไม่ค่อยจะไหวอยู่แล้วด้วย..."
90002070-91 = "[ns] \"เราลองทำตามที่เคย์ต้องการไม่ได้เหรอ...?\""
90002070-92 = "ตะ... แต่ว่า ครู..."
90002070-93 = "มันเป็นไปไม่ได้เลยหรือเปล่าน่ะเหรอ? มันก็... พอเป็นไปได้อยู่หรอก แต่ว่า... มันจะมาพร้อมกับความเสี่ยงน่ะสิ"
90002070-94 = "ถ้าเป็นไปได้ ฉันก็ไม่อยากสร้างตัวแปรอะไรอื่นเพิ่มแล้ว..."
90002070-95 = "[s] \"แต่ถ้าทำสำเร็จ ก็จะได้อะไรตอบแทนตามที่เคย์บอกใช่มั้ย?\""
90002070-96 = "ถ้าทุกอย่างเป็นไปได้ด้วยดีน่ะค่ะ มีความเป็นไปได้สูงว่าสิ่งนั้นคือร่างต้นแบบที่เด็กๆ ของเดคาแกรมมาทอนพวกนั้นสร้างขึ้นมา"
90002070-97 = "ตอนนี้เรารู้แล้วว่าพื้นที่บางแห่งได้รับการปกป้องด้วยระบบรักษาความปลอดภัยเฉพาะ เพราะงั้นถ้าเราวิเคราะห์มันได้ ก็จะเป็นประโยชน์อย่างมากต่อปฏิบัติการของเราค่ะ"
90002070-98 = "เห็นได้ชัดว่าระบบรักษาความปลอดภัยกับเคย์มีความเชื่อมโยงกันในระดับหนึ่ง และในกรณีที่ล้มเหลว เราก็มีวิธีเชื่อมต่ออุปกรณ์หน่วยความจำเสริมเพิ่มเติมด้วย"
90002070-99 = "ถึงจะพูดได้ว่าไม่มีอันตรายร้ายแรงใดๆ ต่อการคงอยู่ของสติสัมปชัญญะของเคย์ก็ตาม..."
90002070-100 = "อื้อ แต่กรณีที่ล้มเหลว เราจะสูญเสียเวลาไปอย่างมากเลย"
90002070-101 = "ทั้งเวลาที่ใช้ในการยกเครื่องร่างกายเคย์ใหม่ และก็เวลาในการย้ายการรับรู้ของเคย์ไปยังร่างต้นแบบ#nใหม่ด้วย"
90002070-102 = "แล้วก็ต้องบวกเวลาในการวิเคราะห์ทุกอย่างอีก"
90002070-103 = "[s] \"...\""
90002070-107 = "[ns] \"ถ้างั้นก็ลองดูกันเถอะ!\""
90002070-108 = "อะ... เอาจริงเหรอ? ครู?!"
90002070-109 = "เหตุผลคือถ้าทำสำเร็จ เราก็จะได้ผลตอบแทนอย่างมหาศาล และต่อให้ล้มเหลว เราก็ไม่ได้จะเสียเคย์ไปงั้นเหรอ? มันก็จริงอยู่หรอก..."
90002070-110 = "แต่ฉันมั่นใจว่าจะมีปัญหามากมายตามมา ทั้งเรื่องเวลาและการซ่อมบำรุง..."
90002070-111 = "หืม? ให้คิดว่านี่คือการทำให้ความปรารถนาของใครสักคนเป็นจริงงั้นเหรอ?"
90002070-112 = "..."
90002070-116 = "เข้าใจแล้ว... ครู งั้นฉันจะลองดู"
90002070-117 = "เฮ้อ...  ถ้าคุณครูพูดอย่างนั้น ก็คงช่วยไม่ได้นะคะ แล้วนี่ก็เป็นคำขอร้องจากรุ่นน้องที่น่ารักด้วยค่ะ"
90002070-118 = "ดีเลยนะคะ เคย์! ทุกคนตอบตกลงแล้วว่าจะช่วยค่ะ!"
90002070-119 = "ฮุฮุ ฮุฮุฮุ... ความจริงใจและการโน้มน้าวจากก้นบึ้งของหัวใจ... ทำให้ทุกคนยอมรับ... จริงๆ ด้วยนะคะ..."
90002070-120 = "อย่างนี้นี่เอง! ได้เรียนรู้บทเรียนนี้จากเคย์เลยละ ครั้งหน้าเห็นทีต้องลองโน้มน้าวยูกะแบบนั้นดูบ้างแล้ว!"
90002070-121 = "ถ้าเป็นพวกเรา ฉันว่าไม่น่าจะได้ผลหรอก พี่โมโมอิ..."
90002070-123 = "นับหนึ่งถึงสามแล้วกรอกข้อมูลพร้อมกันนะ ฮิมาริ! หนึ่ง สอง..."
90002070-124 = "สาม!"
90002070-131 = "เคย์?"
90002070-132 = "ขอดูด้วย! ขอฉันดูด้วยคนสิ! ว้าว..."
90002070-136 = "อย่างแรกที่ยืนยันได้ก็คือ ร่างต้นแบบนี้ทำงานได้ตามปกติค่ะ แล้วก็..."
90002070-137 = "พอจะจำพวกเราได้มั้ย?"
90002070-140 = "[ns] \"เคย์...?\""
90002070-143 = "คุณครู? แล้วก็..."
90002070-144 = "อาริสึ?"
90002070-146 = "เคย์!!!"
90002070-152 = "เคย์จริงๆ ด้วยค่ะ! อาริสึเชื่อว่าเคย์จะกลับมาค่ะ!"
90002070-153 = "ฉันก็บอกไปแล้วนี่คะว่าจะไม่เกิดปัญหาอะไร... ทุกคนน่ะวิตกกังวลมากไปเองต่างหากค่ะ..."
90002070-154 = "[s] \"จะไม่ให้กังวลได้ยังไงล่ะ\""
90002070-155 = "นั่นน่ะสิ ถ้าทุกคนใจเย็นกันหมดเหมือนไม่กังวลอะไร เคย์อาจจะน้อยใจก็ได้นะ"
90002070-156 = "ช่วยไม่ได้นะคะ ในสถานการณ์นี้ อย่างน้อยฉันจะเป็นคนที่ใจเย็นให้แล้วกันค่ะ เคย์"
90002070-157 = "ไม่ค่ะ ไม่เป็นไรหรอก..."
90002070-159 = "อ่า... อืม... ถ้างั้นก็ ขอสวัสดีทุกคนอีกครั้งนะคะ ฉันคือเคย์ค่ะ"
90002070-160 = "เคย์นั่นเองค่ะ!"
90002070-161 = "โอ้ ตอนนี้เคย์เหมือนเป็นหุ่นยนต์สาวน้อยน่ารักเลยนะ!"
90002070-162 = "นั่นน่ะสิ ฉันว่าร่างนี้ดีไซน์สวยกว่าเยอะเลย"
90002070-163 = "ดะ... ดีเลยนะ... เคย์จัง"
90002070-164 = "(แต่ร่างเดิมก็ไม่ได้ดูแย่ขนาดนั้นสักหน่อย....)"
90002070-169 = "ตอนนี้ฉันเดินเหมือนคนอื่นได้แล้วสินะคะ... แล้วก็พูดโดยใช้ลำคอแทนลำโพงได้แล้วด้วย"
90002070-170 = "ฉันมีทั้งผม มือ นิ้วมือ... ถึงเมื่อก่อนจะเคยมีอยู่แล้วในอีกแง่หนึ่งก็ตามค่ะ"
90002070-174 = "(สะอื้น...)"
90002070-175 = "ยินดีด้วยนะคะ เคย์ ถ้าอย่างนั้นฉันจะไปที่กระบวนการต่อไปเลยนะคะ พอจะค้นพบอะไรจากร่างใหม่นั้น#nบ้างมั้ยคะ?"
90002070-176 = "แต่ต่อให้ตอนนี้ยังไม่ได้ผลลัพธ์อะไร ฉันก็ดีใจที่เคย์ดูจะพึงพอใจกับร่างนี้ค่ะ"
90002070-180 = "อืม... ค่ะ ถ้าฉันทุ่มความพยายามไปมากขนาดนั้นแล้วไม่ได้ผล มันก็คงจะน่าอายนะคะ"
90002070-181 = "งั้นฉันจะรีบเริ่มจากข้อสรุปเลยแล้วกันค่ะ อีกนัยหนึ่ง... นี่หมายความว่าฉันมีเรื่องให้พูดเยอะเลย"
90002070-182 = "เพราะงั้นพวกเรากลับไปที่ยานขนส่งกันก่อนเถอะค่ะ"
90002070-184 = "ตอนต่อไป;Level Up"
