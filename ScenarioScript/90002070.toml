[translation]
90002070-1 = "第7話;Kei"
90002070-2 = "Kei？Kei！？你沒事吧，Kei！？#n拜託！請不要……請不要留下愛麗絲一個人！"
90002070-3 = "Kei！！！！！"
90002070-8 = "愛麗絲。"
90002070-12 = "是，是！有，有什麼事嗎？#n只要是Kei的話，愛麗絲什麼都會聽的……！"
90002070-13 = "對不起，我現在腦袋裡還在嗡嗡作響，麻煩聲音稍微小聲一點。"
90002070-14 = "咦……？"
90002070-15 = "哈啊……感覺差點就死了……"
90002070-16 = "你真的沒事嗎……Kei？"
90002070-17 = "沒事的，愛麗絲。我真的沒事。#n只是全身上下都在嘎吱作響而已。"
90002070-20 = "我幫你看看吧。#n愛麗絲，能請你稍等一下嗎？"
90002070-21 = "是，是的！莉央前輩……！"
90002070-24 = "目前看來沒事，愛麗絲。#nKei的意識……沒有生命危險。"
90002070-25 = "真的嗎？謝謝你，莉央前輩！"
90002070-26 = "不過相對地，Kei的這副身體幾乎已經瀕臨極限了。"
90002070-27 = "真，真的嗎？#n這樣該怎麼辦呢，陽葵前輩……？"
90002070-28 = "這倒沒什麼困難。#n只要將身體進行全面翻修就行了。"
90002070-29 = "畢竟實際上出問題的，就只有機能與運作性的物理部分而已。"
90002070-30 = "這，這樣啊。#n真是太好了……Kei醬……"
90002070-31 = "先等一下。#n所以結論就是要把這副身體整修後繼續使用，對吧？"
90002070-32 = "是這樣沒錯。當然因為要分解成零件並且檢查後再重新組裝，#n所以可能得花費一點時間就是了……有什麼問題嗎？"
90002070-36 = "……"
90002070-37 = "只是想提出一個建議而已。"
90002070-38 = "……不能趁這個機會，換一個不同的身體嗎？"
90002070-39 = "不同的身體？#n可是現在也沒有適合的素體吧？"
90002070-40 = "適合的素體那邊不就有一個嗎？就在那邊啊！"
90002070-41 = "那邊……？"
90002070-43 = "你說的素體是指這個嗎？"
90002070-44 = "可是這應該是十字神名那邊製造的東西吧……？"
90002070-45 = "我們不是幾乎都分析完了嗎？也確認過沒有問題了吧？"
90002070-46 = "你先冷靜點，Kei。#n那只是在可動性方面沒有問題而已。"
90002070-47 = "是啊。雖然說過只要移植意識迴路就能立即啟動……"
90002070-48 = "所以！就讓我來！使用它吧！"
90002070-49 = "我無法贊成。因為完全無法預測會出現什麼變數。#n簡單來說……就是太危險了。"
90002070-50 = "況且究竟能不能突破素體內部的安全系統，我們也沒有把握。"
90002070-51 = "那個部分就交給我來試試看吧。#n我不是說過，只要給我時間和預算就能辦到了嗎？"
90002070-52 = "[s]「可是現在無論時間還是預算都沒有吧！？」"
90002070-53 = "唔嗯……雖然不是完全沒有可能性，不過考量到風險的話……"
90002070-57 = "為什麼大家只會一直說做不到呢！"
90002070-58 = "這種事不直接試試看怎麼會知道！"
90002070-59 = "哦？氣勢好像恢復了呢，Kei。"
90002070-60 = "來，有看到那個嗎？#n那應該是用鋼鐵大陸的素材製作的吧？"
90002070-61 = "所以只要好好運用，比如我過去連接看看的話，說不定能找到什麼線索不是嗎？"
90002070-62 = "但是如果失敗的話……"
90002070-64 = "為什麼一直說這些喪氣話啊！#n這樣本來能成功的事情也會失敗的！"
90002070-65 = "總之先試試看再說嘛！#n如果行不通的話，到時候再想其他方法就好了啊！"
90002070-66 = "感覺Kei今天特別像某個老古板的上司呢……"
90002070-67 = "拜託啦～而且我不是已經做過一次意識系統轉移了嗎？#n之前我可是住在鑰匙圈裡的！這點大家都知道吧！"
90002070-73 = "沒錯！愛麗絲還當成紀念品留著呢！"
90002070-74 = "啊，嗯。謝謝你，愛麗絲。#n總之，我想表達的意思是……"
90002070-75 = "既然曾經成功過，沒道理第二次就會失敗吧！"
90002070-76 = "還有雖然說過很多次了，要是失敗就再找別的方法也行啊！"
90002070-77 = "你就……那麼討厭現在的身體嗎？"
90002070-78 = "拜託！算我求你們了行嗎？#n要是這樣還不幫我進行轉移的話──"
90002070-79 = "我會躺在這裡耍賴到你們答應為止哦～～～！！！"
90002070-88 = "Kei！？"
90002070-89 = "唔……一不小心就用虛弱的身軀太激動了……"
90002070-91 = "[ns]「……不如就照Kei說的試試看吧？」"
90002070-92 = "可，可是老師……"
90002070-93 = "你說，那也不是完全行不通吧……？#n確實……不是沒有可能。不過……果然還是伴隨著危險性。"
90002070-94 = "如果可以的話，我比較傾向於不再增加更多變數……"
90002070-95 = "[s]「就像Kei說的一樣，要是成功的話也會有所收穫吧？」"
90002070-96 = "如果一切順利的話……確實是那樣沒錯。#n畢竟那個素體，很有可能是十字神名的那幾個孩子們製造的。"
90002070-97 = "既然已經確認某些區域受到了特定安全系統的保護，#n只要能完成解析，勢必會對作戰產生很大的幫助。"
90002070-98 = "而且那套安全系統和Kei確實存在著一定程度的關聯，#n也可以為了防範失敗而加裝輔助記憶裝置……"
90002070-99 = "可以說在保存Kei的意識方面，應該沒有太大的風險……"
90002070-100 = "沒錯。不過萬一失敗的話，將會耗費很多時間。"
90002070-101 = "既要修復Kei原本的身體，又要花時間把意識移植到新素體。"
90002070-102 = "再加上解析所需的時間。"
90002070-103 = "[s]「……」"
90002070-107 = "[ns]「那麼，就來試試看吧！」"
90002070-108 = "你，你是認真的嗎？老師！？"
90002070-109 = "因為已經能確定成功的回報很大，並且就算失敗也不會失去Kei……？#n話雖如此……"
90002070-110 = "時間與整備之類的問題，肯定會接踵而來的……"
90002070-111 = "嗯？就當作是實現一個心願？"
90002070-112 = "……"
90002070-116 = "好吧……老師。#n我們就試試看吧。"
90002070-117 = "唉……既然老師開口也沒辦法了。#n這終究也是可愛後輩的請求嘛。"
90002070-118 = "太好了，Kei！大家都願意幫忙！"
90002070-119 = "呵呵，呵呵呵……#n果然發自內心與充滿靈魂的說服……是能打動所有人的啊……"
90002070-120 = "原來如此！我也要把Kei的這招學起來，下次就用它來說服優香吧！"
90002070-121 = "我們大概沒辦法吧，姐姐……"
90002070-123 = "同時對三處進行輸入，陽葵！一，二──"
90002070-124 = "──三！"
90002070-131 = "Kei？"
90002070-132 = "我也要！我也要看！哇啊……"
90002070-136 = "確認素體成功啟動了。#n接下來就是……"
90002070-137 = "能認出我們嗎？"
90002070-140 = "[ns]「……Kei？」"
90002070-143 = "老師？#n還有……"
90002070-144 = "愛麗絲？"
90002070-146 = "Kei──！！！"
90002070-152 = "不愧是Kei！愛麗絲一直都相信你可以的！"
90002070-153 = "……我不是說過一定沒問題的嗎。#n只是大家都太大驚小怪了……"
90002070-154 = "[s]「這種情況會顧慮很多也是正常的。」"
90002070-155 = "就是說啊。要是大家都很冷靜的話，反而會讓人有點失落吧？"
90002070-156 = "沒辦法了。#n這種時候就由我來負責保持冷靜吧，Kei。"
90002070-157 = "這就不用了……"
90002070-159 = "那麼……再重新來一次吧。#n大家好，我是Kei。"
90002070-160 = "是Kei！"
90002070-161 = "哦哦，現在真的有種美少女機器人的感覺了耶！"
90002070-162 = "嗯，而且在設計方面也很不錯。"
90002070-163 = "太，太好了……Kei醬。"
90002070-164 = "（原本的設計也沒那麼差吧……）"
90002070-169 = "……現在的我也能走路了呢。#n還能不借助音響，而是透過喉嚨說話。"
90002070-170 = "就連頭髮、雙手和手指都有……雖然以前也不能算沒有啦。"
90002070-174 = "……嗚嗚。"
90002070-175 = "恭喜你，Kei。那麼就進入下一個階段吧。#n你有從那副身體裡發現什麼嗎？"
90002070-176 = "當然即便沒有任何發現，能看見Kei滿意的樣子，我也已經很開心了。"
90002070-180 = "嗯……有的。#n要是毫無成果的話，我反而會有點不好意思呢。"
90002070-181 = "我就直接從結論開始說吧。#n這也代表……我有很多話要說的意思。"
90002070-182 = "總之先回到運輸船上吧。"
90002070-184 = "下一話;Level Up"
