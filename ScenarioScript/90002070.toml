[translation]
90002070-1 = "Episode 7;Kei"
90002070-2 = "Kei? Kei?! Are you okay, Kei?! Please! KEI! Do not... You CANNOT leave me!"
90002070-3 = "Kei!!!"
90002070-8 = "Aris."
90002070-12 = "Y-Yes! Wh-What is it? Kei, Anything. I am listening, so...!"
90002070-13 = "Sorry. My head is ringing, so please stop screaming."
90002070-14 = "What...?"
90002070-15 = "Ugh... I'm beat..."
90002070-16 = "Are you okay, Kei...?"
90002070-17 = "I'm fine, I'm fine, Aris. I'm perfectly fine, so relax. It's just that my body is creaking all over the place."
90002070-20 = "Let me take a look, Aris."
90002070-21 = "Y-Yes, Rio...!"
90002070-24 = "She's fine, Aris. There's no danger to Kei's consciousness...her life."
90002070-25 = "Really? Thank you, Rio!"
90002070-26 = "However, Kei's body has just about hit its limit."
90002070-27 = "R-Really? What should we do, Himari...?"
90002070-28 = "It's not a big deal. We just have to do a comprehensive overhaul."
90002070-29 = "Ultimately, our only problem is restoring her hardware's functional and operational capabilities."
90002070-30 = "Y-Yeah. I'm glad... Kei..."
90002070-31 = "Hold on. So in conclusion, you're saying we should fix and use this body again?"
90002070-32 = "Yes? Of course, it will take time since we'll need to disassemble, run maintenance on the pieces, and reseat everything... Is there some sort of problem, Kei?"
90002070-36 = "..."
90002070-37 = "This is just a proposal."
90002070-38 = "...Can't we take this opportunity to look into...a different body?"
90002070-39 = "A different body? But there are no other suitable candidates."
90002070-40 = "There was a \"suitable candidate\" back there!"
90002070-41 = "Back where...?"
90002070-43 = "You meant this thing over here?"
90002070-44 = "But wasn't this made by Decagrammaton...?"
90002070-45 = "We almost finished analyzing it! And we confirmed that it's suitable, compatible, and doesn't have any problems!"
90002070-46 = "Calm down, Kei. We were solely talking about its mobility."
90002070-47 = "Right. We said that it would be mobile with a consciousness circuit implant, but..."
90002070-48 = "Which is why! You should! Put me in!"
90002070-49 = "I'm against the idea. I can't even imagine the unseen variables. To put it simply... It's too dangerous."
90002070-50 = "Above all, there's no guarantee that we could even jailbreak through the unit's security."
90002070-51 = "Let me try. Remember, I said I could, if given enough time and resources, right?"
90002070-52 = "[s] \"But we don't have either of those things right now!\""
90002070-53 = "U-Um... While it may not be...COMPLETELY impossible, there are still so many risks..."
90002070-57 = "Why is everyone saying that it's impossible?!"
90002070-58 = "Without! Trying it! First!"
90002070-59 = "Huh, looks like you're powered back up, Kei."
90002070-60 = "Here, look. This thing, it's made from the Steel Continent's materials, right?"
90002070-61 = "If the synch works, right? If I connect to that thing? Maybe it'll give us a clue on how to proceed!"
90002070-62 = "But if we fail..."
90002070-64 = "Why do you insist on being so negative?! You won't get anywhere with that attitude!"
90002070-65 = "Let's go for it! Right now! And if it doesn't work out? Then we will revert to your endless, circular logic and waste more time!"
90002070-66 = "You're sounding like a stressed middle-manager, Kei..."
90002070-67 = "Oh, please. We're capable! We've already moved a consciousness system once. I used to be in a keychain! A trinket! As you all know!"
90002070-73 = "Yes! I still have that as a souvenir!"
90002070-74 = "Ah, yes. Thank you for saving that, Aris.#nAnyway, what I wanted to say was..."
90002070-75 = "We've done it once, so we can do it again!"
90002070-76 = "And I already said, repeatedly, we'll try something else if this doesn't work out!"
90002070-77 = "...Do you truly hate your current body that much...?"
90002070-78 = "Please! I beg of you. If you don't even TRY to transfer me..."
90002070-79 = "...I'm going to collapse right here and throw a tantrum of error messages until you do!!"
90002070-88 = "Kei?!"
90002070-89 = "Ugh... I might have gotten carried away...in this busted body..."
90002070-91 = "[ns] \"...Why don't we try what Kei wants?\""
90002070-92 = "B-But Sensei..."
90002070-93 = "Is it completely impossible? Probably...not. But still... It comes with risks."
90002070-94 = "As I said, I would like to avoid introducing more variables if possible..."
90002070-95 = "[s] \"But if things work out, we'd gain something, right?\""
90002070-96 = "If EVERYTHING works out, yes. It's highly probable that this unit was made by those Decagrammaton kids."
90002070-97 = "We've also confirmed that some areas are being protected with a special security system. Being able to analyze it from the inside could be quite helpful."
90002070-98 = "It's clear that the security system has some relation to Kei. We could also connect an additional backup memory device in the event of failure."
90002070-99 = "So I can say there won't be a huge problem when it comes to preserving Kei's consciousness and safety, but..."
90002070-100 = "If we fail, it's going to cost us precious time."
90002070-101 = "As in, the time to overhaul Kei's current body, the time to implant Kei's consciousness into the new unit..."
90002070-102 = "...and the time to analyze it."
90002070-103 = "[s] \"...\""
90002070-107 = "[ns] \"In that case, let's give it a try!\""
90002070-108 = "A-Are you serious, Sensei?!"
90002070-109 = "Because we have a lot to gain, you say? And, yes, Kei will be safe, even if we fail. While that's true..."
90002070-110 = "I'm sure we'll face many problems. Can you imagine the time? The unforeseen maintenance?"
90002070-111 = "Huh? I should do it as a \"favor\"?"
90002070-112 = "..."
90002070-116 = "Very well, Sensei. I'll try."
90002070-117 = "*sigh* If Sensei says so, there's no helping it. It's also a request from my cute friend here."
90002070-118 = "I am overjoyed for you, Kei! Everyone will help you!"
90002070-119 = "Heehee, heeheehee... I knew it... A heartfelt persuasion...and collapse...was bound to move everyone..."
90002070-120 = "I see! I learned something new from Kei. I'll try that the next time I need to talk to Yuuka!"
90002070-121 = "...I don't think she'll buy that, Momoi..."
90002070-123 = "Hit \"Enter\" on the count of three, Himari! One, two..."
90002070-124 = "...Three!"
90002070-131 = "Kei?"
90002070-132 = "Me too! I want to see! Whoa..."
90002070-136 = "For now, I can confirm that this unit has been successfully activated. Also..."
90002070-137 = "Can you tell who we are?"
90002070-140 = "[ns] \"...Kei?\""
90002070-143 = "Sensei? And..."
90002070-144 = "...Aris?"
90002070-146 = "Kei!!"
90002070-152 = "As expected of the great Kei! I wholeheartedly believed in you!"
90002070-153 = "...I told you that nothing would go wrong. Everyone here is SO dramatic..."
90002070-154 = "[s] \"I think the fuss was justified.\""
90002070-155 = "Right. Wouldn't you have been disappointed if we were all nonchalant?"
90002070-156 = "It was necessary. I will try to remain calm for you, Kei."
90002070-157 = "No, it's fine..."
90002070-159 = "Uh... Um... In that case, hello, everyone. I'm Kei. Still Kei."
90002070-160 = "She is Kei!"
90002070-161 = "Okay, now you're a pretty android girl!"
90002070-162 = "Yeah. This is a better design."
90002070-163 = "I-I'm happy for you... Kei."
90002070-164 = "(...I don't think the original design was bad either...)"
90002070-169 = "...I can walk now. Hop! I can speak from my mouth instead of that tinny speaker."
90002070-170 = "I have hair, hands, fingers... Well, I had hands before, in a way, but... Anyway."
90002070-174 = "...*sniff*"
90002070-175 = "Congratulations, Kei. Then let's move on to the next step. Have you learned anything from inhabiting that body?"
90002070-176 = "Of course, even if you haven't, I'm still glad to see you happy."
90002070-180 = "Um... Yeah. It'd be embarrassing of me to say that I have nothing to offer, especially after throwing such a tantrum."
90002070-181 = "So, let me be clear. I have many things to share."
90002070-182 = "Let's head back to the transport ship."
90002070-184 = "Next Episode;Level Up"
