10054020-2 = "3;키사키;99;……흐음. 자세히 이야기해 보거라.\n#3;a\n#3;em;[…]"
10054020-3 = "3;카나에;11;네, 네엣! 그러니까 그게 말이죠. 그러니까…….\n#3;em;[땀]"
10054020-4 = "3;카나에;01;산해경에서 조금 떨어진 계곡에 휴양 시설이 있는데, 거기에 제법 대규모 투자를 했다고 하더라고요? 맞죠, 루미 회장님?"
10054020-5 = "3;카나에;99;물론 이런 일이 우리 현룡문에도 제대로 보고되지 않고.\n#4;hide"
10054020-6 = "3;카나에;17;현무상회에서 독단적으로 결정되어 자금 집행이 이루어졌다는 부분에서는, 상당~히 유감을 표하고 싶습니다만!\n#3;em;[스팀]\n#3;hophop"
10054020-7 = "3;카나에;01;이르기를, 몸을 삼가 공경스럽게 바쳐, 비로소 수고로움을 다해야 한다고 하잖아요?"
10054020-8 = "3;카나에;02;어라라……? 이럴 때 쓰는 말, 맞나요?"
10054020-9 = "3;카나에;02\n5;루미;02;글쎄? 그런 부분은 난 잘 몰라서…….\n#5;a"
10054020-10 = "3;카나에;02\n5;루미;02\n1;키사키;09;……틀렸다…….\n#1;a\n#1;em;[한숨]"
10054020-11 = "3;카나에;13\n5;루미;02\n1;키사키;09\n#na;카나에;으엥?!\n#3;em;[?!]\n#3;h\n#3;shake"
10054020-12 = "3;카나에;13\n1;키사키;09\n5;루미;99;뭐…… 확실히 해석의 영역에서 다툼이 있을 수 있는 부분이라는 것은 인정하겠어.\n#5;m3\n#1;dl\n#3;dl"
10054020-13 = "5;루미;03;하지만 입지라든가 발전 가능성, 교통편 같은 것도 모두 조사해 봤다구. 정말 공기 좋고 물 좋은 휴양지야."
10054020-14 = "3;레이죠;02;시설이 가지고 있는 잠재 가능성에 비해, 상당히 저평가되어 있더군요. 충분히 걸어볼 만한 이야기라고 판단했습니다.\n#3;em;[반응]\n#5;hide"
10054020-15 = "3;루미;00;하는 김에, 장기적으로는 현무상회의 외부 프랜차이즈 지점을 출범시키는 것까지 진행되면 더 좋지 않을까 싶기도 했고!"
10054020-16 = "3;미나;99;하지만 현무상회가 상회의 자금을 자기들끼리 어떻게 사용하는지에 대해서는……."
10054020-17 = "3;미나;02;명세서만 확실히 제출한다면, 암묵적으로 묵인하는 것이 관례이지 않았나?\n#3;em;[?]"
10054020-18 = "1;카나에;03\n3;미나;02\n#na;카나에;하지만 그것은 '산해경 내부'에 한정되는 이야기이기도 했죠. 조금 전 말씀드렸던 부분이지만요!\n#1;h\n#1;em;[!]\n#1;ar"
10054020-19 = "1;카나에;03\n3;미나;02\n5;슌;02;그렇군요. 지금까지 현무상회가 산해경 외부로 자금을 출자한 경우는 없었으니까요.\n#5;em;[반응]\n#5;a"
10054020-20 = "1;카나에;03\n3;미나;02\n5;슌;99;엄밀히 말씀드리자면 이번이 외부 출자가 이루어진 첫 케이스이다 보니."
10054020-21 = "1;카나에;03\n3;미나;02\n5;슌;02;지금까지의 관례로는 해석하기 어려운 사례가 된 것이겠네요.\n#1;dl\n#3;dl\n#5;m3"
10054020-22 = "3;슌;02\n4;코코나;02;지금까지 없었던 첫 사례…….\n#5;hide\n#4;em;[…]\n#3;m2\n#4;a"
10054020-23 = "2;슌;02\n4;코코나;03;매화원이었다면, 아이들을 모두 모아 놓고, 앞으로는 어떻게 하면 좋겠냐고 규칙을 정하자고 하겠네요. 토론 교육이죠.\n#3;hide"
10054020-24 = "2;슌;02\n4;코코나;04;……아이들이 늘 그렇지만, 몇 분 만에 그런 건 아무래도 좋고 자기들끼리 떠들고 놀기 시작하지만요……."
10054020-25 = "2;슌;12\n4;코코나;04\n#na;슌;잘하고 있어요, 코코나 쨩. 그리고 지금 여기 많은 분이 모인 것도, 기본적으로는 그 일과 마찬가지랍니다?\n#2;em;[반짝]\n#2;h"
10054020-26 = "3;키사키;18;그러하다. 코코나 교관. 그리고 우리 언니들이라고 해서…… 매화원의 원아들과 그렇게까지 다르지는 않을지도 모른단다.\n#2;hide\n#4;hide"
10054020-27 = "3;키사키;03;후후. 합의와 협의, 그리고 거기에서부터 도출된 결론을 무탈하게 지켜 나가는 것은, 누구라 해도 쉽지 않은 일이니 말이다.\n#3;em;[음표]"
