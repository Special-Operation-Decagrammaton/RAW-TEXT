90101050-4 = "3;유키노;01\n#3;a\n#wait;1000"
90101050-5 = "3;유키노;02;저, 실례합니다. 열람실의 신문 스크랩 파일을 확인하려 하는데요……\n#3;em;[반응]"
90101050-6 = "3;유키노;01;O월 O일의 조간 신문은 스크랩되지 않았나요? 그 날 신문만 스크랩북에서 빠져 있는 것 같아서요."
90101050-7 = "3;유키노;01\n#na;구립 도서관 사서;그런가요? 이상하네. 신문 스크랩 업무는 매일 아침 하고 있어서 빠진 날짜는 없을텐데……"
90101050-8 = "3;유키노;01\n#na;구립 도서관 사서;아…… 기억났다."
90101050-9 = "3;유키노;01\n#na;구립 도서관 사서;그 날 저녁, 신문사에서 직접 찾아와서, 신문에 정정 보도를 해야하는 내용이 있다며 신문을 회수해 갔거든요."
90101050-10 = "3;유키노;01\n#na;구립 도서관 사서;신문까지 회수하는 경우는 거의 없어서 똑똑하게 기억하고 있어요."
90101050-11 = "3;유키노;02;그렇군요…… 문제가 된 기사가 어떤 내용이었는지는 알고 계신가요?"
90101050-12 = "3;유키노;02\n#na;구립 도서관 사서;아뇨. 저희 업무는 스크랩 뿐이라…… 죄송합니다. 그 날 실린 기사에 대해서는 잘 모르겠네요."
90101050-13 = "3;유키노;03;아닙니다. 알려주셔서 감사합니다.\n#3;greeting"
