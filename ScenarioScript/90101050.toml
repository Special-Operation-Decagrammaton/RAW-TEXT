[translation]
90101050-1 = "第5話;ある怪異についての記録"
90101050-2 = "シラトリ区第3区立図書館閲覧室"
90101050-5 = "すみません、記事のまとめを探しておりまして……。"
90101050-6 = "O月O日付の朝刊の記録が抜け落ちているように見受けられまして。"
90101050-7 = "え？あれ？おかしいですね……毎朝まとめているので抜け漏れはないはずなんですが……。"
90101050-8 = "すみません、思い出しました！"
90101050-9 = "新聞社の方が「報道に誤りがある」と回収にいらっしゃった日があるんです。"
90101050-10 = "もしかしたらその日が抜け落ちているのかもしれません。#nまるごと回収されるのは珍しいですし……。"
90101050-11 = "なるほど……該当の記事がどのような内容だったのか、ご存知ですか？"
90101050-12 = "ごめんなさい……スクラップを作りはするんですが、内容までは覚えていなくて。"
90101050-13 = "分かりました。ありがとうございます。"
90101050-20 = "（……情報規制があったのは間違いないようだ）"
90101050-21 = "（だからこそ、奇妙な鳥のマスコットの姿をした怪異が出現した時――多くの者は、ただの噂だと受け取った）"
90101050-22 = "（私自身もそう考えていたが……）"
90101050-24 = "えっと、つまり……先生の話をまとめると。"
90101050-25 = "「ペロロジラ」って名前の限定ぬいぐるみが、ファンの願いで実体化して……#nそれで、D.Uに向かってて？"
90101050-26 = "それをヴァルキューレと協同で倒した、ってこと？"
90101050-27 = "そういえば、以前見たヴァルキューレ警備局の報告書にも、大規模な警備部隊の出動記録があったね。"
90101050-29 = "（あの日現れた怪獣が海岸を襲撃したのは事実。先生の証言もある。）"
90101050-30 = "（気になるのは……怪獣があまりにも間の抜けた鳥の姿だった点だ）"
90101050-31 = "（市民の間で語られる都市伝説となるのなら、恐ろしい外見になるのではないか？）"
90101050-32 = "（マニアの間で話題になっただけのぬいぐるみが、D.U.に大災害を起こそうとした……？）"
90101050-36 = "……理解できないな。"
90101050-37 = "（ぬいぐるみと当時の情報を当たっていこう）"
90101050-38 = "（だが、SNSにも新聞記事にも一切の情報が残っていない……）"
90101050-39 = "本をお探しですか？"
90101050-43 = "いえ、本ではなく……。"
90101050-44 = "お探しの情報がありましたら、お手伝いしますよ。#n知識を求める方の手助けをするのも、[ruby=私たち]司書[/ruby]の仕事ですから。"
90101050-46 = "ここに残っていないものでも……。"
90101050-50 = "私たちの図書館には、あるかもしれませんし。"
90101050-51 = "「私たちの」……？"
90101050-52 = "あっ、自己紹介が遅れました。#n私は[ruby=えんどう]円堂[/ruby]シミコと言います。"
90101050-53 = "トリニティの図書委員会に所属しています。#n今日は図書交換会があってここに。"
90101050-54 = "何かお手伝いしましょうか？"
90101050-55 = "いえ、もう手に入らない資料ですので。"
90101050-56 = "O月O日付の新聞記事です。#n新聞社が回収してしまったようで、どこにもなく……。"
90101050-57 = "O月O日付の回収された記事……。"
90101050-58 = "もしかして……「D.U.海岸で正体不明の怪獣が出現した」という内容のものでしょうか？"
90101050-62 = "そうです。ご存知ですか？"
90101050-63 = "はい。記事のおおまかな内容は覚えています。"
90101050-64 = "通報者は付近にいた漁師。#n水中で高速移動する巨大な影を目撃し、港湾管理事業所へ連絡したとのことです。"
90101050-65 = "曰く、クジラのように大きく、カジキのように素早い影……だったとか。"
90101050-67 = "ヴァルキューレ海洋警察は怪獣を海へ帰すことに成功しましたが……#nヘリコプターが複数台破壊されるなど、被害は甚大だったようです。"
90101050-68 = "怪獣は「モモフレンズ」社製のぬいぐるみである「ペロロジラ」に酷似していました。#n去年公開された映画同様、目から閃光を――"
90101050-69 = "該当のぬいぐるみは現在入手困難だそうです。"
90101050-71 = "ありがとうございます。助かりました。"
90101050-72 = "……まさか、記事の内容を覚えている司書の方と偶然出会えるなんて。"
90101050-73 = "読んだ新聞の内容を全部覚えているんですか……？"
90101050-74 = "あはは、いえ！興味深い記事だったので、たまたまですよ。"
90101050-75 = "あまり接点が多くなかった副委員長から、急に頼まれたのもあって覚えていたのですが。"
90101050-76 = "……お話を伺うに、「ペロロジラ」の原典はかなり普通なんですね。"
90101050-77 = "……[ruby=・]普[/ruby][ruby=・]通[/ruby]ですか？"
90101050-78 = "ネットで話題になった都市伝説の原典が地域新聞に載っていると聞き、調べていたのですが……。"
90101050-79 = "実際、記事に書かれていたのは怪獣映画のような話と、ぬいぐるみの生産終了の案内だけ、とは。"
90101050-80 = "……それだけ、とは言い切れないんじゃないでしょうか？"
90101050-81 = "……まだ他にも明かされていないものが存在する、と？"
90101050-82 = "いえ、というよりは……。"
90101050-83 = "怪獣映画とぬいぐるみ。それ自体が、誰かにとっては[ruby=・]普[/ruby][ruby=・]通[/ruby]ではないのかもしれません。"
90101050-84 = "幼い頃に読んだ騎士とドラゴンの冒険譚――当時の私は、実際にどこかで起こった出来事だと信じていました。"
90101050-85 = "成長するにつれ、物語の中の出来事だったと理解するようになりましたが……#n本を読んでいる間は、物語の世界に入り込んだように感じたんです。"
90101050-86 = "ですから、ぬいぐるみも怪獣映画のようなお話も。#n誰かにとっては、存在する世界だったのかもしれません。"
90101050-87 = "都市伝説は……理解できないからこそ伝説、と呼ばれるんだと思います。"
90101050-92 = "……そうかもしれませんね。"
90101050-93 = "恐怖以外の感情からもロアが生まれるのであれば……それはたしかに。"
90101050-94 = "他にお探しの本はありますか？"
90101050-95 = "なければ、私はこれで――"
90101050-96 = "あの、1つお願いしてもいいですか？"
90101050-97 = "最近触れてオススメだった作品を教えてください。"
90101050-98 = "オススメの作品ですか？#nうーん……1つだけ、というのは難しいのですが。"
90101050-99 = "そうですね……とても夢中になった作品、といえば。"
90101050-103 = "――『魔法少女ヘヴィキャリバー』を、ご存じですか？"
90101050-105 = "次回;港の人々（２）"
