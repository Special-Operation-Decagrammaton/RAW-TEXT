90101050-50 = "3;시미코;03;저희 도서관에는 남아 있을지도 모르니까요.\n#3;em;[반짝]\n#3;closeup"
90101050-51 = "3;유키노;02;저희 도서관……?\n#3;stiff"
90101050-52 = "5;시미코;02;아, 제 소개가 늦었네요. 저는 엔도우 시미코라고 합니다.\n#5;al\n#3;m1\n#5;em;[반응]"
90101050-53 = "5;시미코;03;평소에는 트리니티 도서부에서 사서로 일하고 있는데, 오늘은 도서 교환 행사 차 잠깐 나왔어서요."
90101050-54 = "5;시미코;01;혹시 제 도움이 필요하신가요?"
90101050-55 = "3;유키노;01;아닙니다. 아마 이제는 구할 수 없는 자료일 거라서요."
90101050-56 = "3;유키노;99;O월 O일의 회수된 신문에 실린 기사를 찾고 있는데, 어딜가도 찾을 수가 없어서……"
