90101050-97 = "1;유키노;03;혹시 최근에 재미있게 읽었던 책이나 미디어가 있다면 하나만 추천해 주시겠습니까?"
90101050-98 = "3;시미코;04;최근에 재미있게 읽은 책이요? 으음, 너무 많아서 하나만 고르기가 어려운데요.\n#3;stiff\n#3;em;[땀]"
