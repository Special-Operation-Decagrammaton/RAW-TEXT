90101050-24 = "3;쿠루미;02;그러니까, 선생님의 말에 의하면.\n#3;a\n#3;em;…"
90101050-25 = "3;쿠루미;99;그 '페로로지라'라는 이름의 한정판 봉제 인형이, 팬들의 염원으로 되살아나서……"
90101050-26 = "3;쿠루미;01;D.U.를 향해 접근하다 샬레와 발키리의 협동 작전으로 격퇴되었다는 거야?"
90101050-27 = "3;니코;02;그러고 보니 전에 확보한 발키리 경비국의 기록에도, 그 날 대규모의 경비 병력이 출동했다는 내용이 적혀 있었던 것 같아.\n#3;em;[반응]"
90101050-28 = "3;유키노;99\n#3;a\n#2;hide\n#4;hide"
90101050-29 = "3;유키노;01;(선생님의 증언도 있었으니, 그 날 바다에서 나타난 괴수가 해안을 습격했던 건 분명한 사실이었을 거야.)"
90101050-30 = "3;유키노;02;(다만 마음에 걸리는 부분이라면…… 어째서 괴수의 외형이 그런 '바보 같은 새'의 모습을 하고 있었던 걸까?)\n#3;m4\n#3;em;[?]"
90101050-31 = "3;유키노;01;(불특정 다수의 심상에 남을 만한 강력한 도시 전설이라면, 보통 공포스러운 외형을 지니는 것이 보통인데.)\n#3;greeting"
90101050-32 = "3;유키노;99;(특정 매니아 층에서만 화제가 되었던 우스꽝스러운 인형이, D.U.에 거대한 재해를 일으킬 뻔 했다니……)"
