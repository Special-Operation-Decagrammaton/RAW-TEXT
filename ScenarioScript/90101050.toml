90101050-62 = "3;유키노;02;그렇습니다. 혹시 기억하고 계신가요?\n#3;m2"
90101050-63 = "5;시미코;03;네. 그 기사의 내용이라면 대부분 기억하고 있어요.\n#5;greeting\n#5;em;[음표]"
90101050-64 = "5;시미코;01;신고를 한 사람은 인근 해역에서 조업 중이던 어부로, 수면 아래에서 거대한 그림자가 빠르게 움직이는 것을 보고 항만관리 사업소에 연락을 했다고 해요.\n#5;m3\n#3;dl"
90101050-65 = "5;시미코;02;신고 내용에 따르면 고래만큼이나 거대하지만, 청새치만큼 빠른 속도의 그림자…… 였다는데요."
90101050-66 = "#zmc;instant;474,0;2212\n#all;hide"
90101050-67 = "#zmc;instant;474,0;2212\n#na;시미코;신고를 받은 발키리 해양경찰은 괴수를 다시 바다로 돌려보내는 데에는 성공했지만, 대응 과정에서 다수의 헬리콥터가 파손되는 등 적지 않은 피해를 입었다고 해요."
90101050-68 = "#zmc;instant;474,0;2212\n#na;시미코;괴수의 외형은 <모모프렌즈> 사의 인형 <페로로지라>를 닮았고, 작년에 개봉한 괴수 영화의 주인공처럼 눈에서 섬광을 뿜기도 했고—"
90101050-69 = "#zmc;instant;474,0;2212\n#na;시미코;아, 참고로 그 모모프렌즈 사의 인형은 현재는 구할 수 없다는 내용도 적혀 있었어요. "
90101050-70 = "3;유키노;02\n#3;a"
90101050-71 = "3;유키노;03;감사합니다. 큰 도움이 되었습니다.\n#3;greeting"
90101050-72 = "3;유키노;99;……하지만 놀랍군요. 기사 내용을 기억하고 있는 사서 분과 우연히 마주치게 되다니."
90101050-73 = "3;유키노;01;설마, 그간 읽었던 모든 신문의 내용을 기억하고 계신 건—"
90101050-74 = "3;시미코;03;아하하, 설마요. 유난히 인상적인 기사라서 기억하고 있던 것뿐이에요.\n#3;em;[재잘]"
90101050-75 = "3;시미코;99;평소에는 거의 이야기도 하지 않던 부부장님이 갑자기 부탁했던 건이라 기억에 남은 것도 있고.\n#fontsize;50"
90101050-76 = "1;유키노;01;여하튼, 예상했던 것과는 달리 이 <페로로지라>의 원전은 평범한 이야기였군요.\n#1;ar\n#3;m5\n#1;em;[한숨]"
90101050-77 = "3;시미코;02;……'평범한' 이야기요?\n#3;em;[?]"
90101050-78 = "1;유키노;02;네. 한 때 다크웹을 떠들썩하게 한 도시 전설의 원전이 지역 신문에 실려있다고 해서 한 번 찾아와 보았는데……"
90101050-79 = "1;유키노;01;실제로 기사에 실려 있는 내용은 괴수 영화에서 흔히 마주할 수 있는 클리셰와 어수룩한 인형의 단종 소식 뿐이었으니까요."
90101050-80 = "3;시미코;99;……글쎄요. 그건 저희가 판단할 수 없지 않을까요?"
90101050-81 = "1;유키노;02;그 말씀은 아직 밝혀지지 않은 증거가 또 있다는 말씀이십니까?\n#1;stiff\n#1;em;[땀]"
90101050-82 = "3;시미코;02;아뇨. 다른 내용이 숨겨져 있다기 보다는……"
90101050-83 = "3;시미코;01;누군가에게는 그 괴수 영화와 인형이 평범하지 않았을지도 모른다는 이야기에요."
90101050-84 = "3;시미코;99;어릴적 용과 기사가 등장하는 마법책을 읽었을 때, 저는 이 세상에 실제로 용과 기사가 존재한다고 생각했었어요.\n#3;m3\n#1;dl\n#3;em;…"
90101050-85 = "3;시미코;02;물론 나이가 들며 동화에 나오는 존재가 모두 현실에 존재하지 않다는 사실을 깨달았지만, 책을 읽고 있을 때 만큼은 그 동화속의 세상이 제 전부처럼 느껴졌거든요.\n#1;hide"
90101050-86 = "3;시미코;01;그 어수룩한 인형과 흔한 괴수가 등장하는 가상의 세계도, 누군가에게는 현실보다 더 현실적으로 느껴지지 않았을까요?"
90101050-87 = "3;시미코;03;게다가 도시 전설은 완벽히 이해할 수 없기에 도시 전설이라고 불리는 것이니까요."
