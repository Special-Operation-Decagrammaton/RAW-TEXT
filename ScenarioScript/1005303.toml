[translation]
1005303-1 = "The Secrets of Scientific Cooking"
1005303-2 = "Millennium School Kitchen"
1005303-4 = "O-Oh! Sensei?"
1005303-5 = "Wh-What brings you here?"
1005303-6 = "[s1] \"I heard you were practicing cooking here...\"\n[s2] \"So I thought I would help you out.\""
1005303-7 = "...I didn't expect you to come at all..."
1005303-8 = "...I didn't expect you to come at all..."
1005303-9 = "If I had, I would have worn something better."
1005303-10 = "[s] \"...I'm not bothering you, am I?\""
1005303-11 = "N-No! Not at all!"
1005303-12 = "I just...don't want you to see me mess up..."
1005303-13 = "Plus...if it turned out well, it was going to be a surprise lunch for you."
1005303-14 = "[s] \"A homemade meal from Yuuka...\""
1005303-15 = "...What's with that face?"
1005303-16 = "You're not imagining how bad it'll taste, are you?"
1005303-17 = "Listen, maybe I don't have a lot of experience with cooking, but the scientific theory behind it couldn't be clearer to me."
1005303-18 = "Cooking is all about processing ingredients into an easily digestible form, often by heating or mixing them."
1005303-19 = "And during this process, the true cooking is prompting numerous physical and chemical changes to the ingredients, even on a cellular level."
1005303-20 = "Which is exactly why experts say that cooking is a science."
1005303-21 = "And as we all know, as long as you understand the theory behind the science perfectly, you can't fail!"
1005303-22 = "[s3] \"Science experiments and cooking seem slightly different to me...\"\n[s4] \"So, what kind of dishes are you going to experiment with?\""
1005303-23 = "According to this popular cookbook, Even Beginners Can Do It! Everyday Boxed Lunches Made Simple..."
1005303-24 = "According to this popular cookbook, Even Beginners Can Do It! Everyday Boxed Lunches Made Simple..."
1005303-25 = "Braised burdock, octopus sausage...and egg rolls should be good."
1005303-26 = "Let's start with the burdock!"
1005303-27 = "Let's see. To neutralize the bitterness of the burdock, add a tablespoon of vinegar to two liters of water..."
1005303-31 = "Hmm..."
1005303-32 = "[s] \"Something wrong?\""
1005303-33 = "...Hey, Sensei."
1005303-34 = "What temperature should the two liters of water be?"
1005303-35 = "[s] \"Does it matter?\""
1005303-36 = "Of course it does! The volume of water changes with temperature!"
1005303-37 = "What if my water is at a different temperature than the writer's water? Think of the offset-density-caused errors!"
1005303-38 = "Depending on the temperature, the density of water can differ up to 0.040 grams per milliliter, meaning that there are 80 grams worth of potential errors here..."
1005303-39 = "If you use water that's hotter than the temperature expected in the recipe, the burdock will turn out too sour..."
1005303-40 = "[s5] \"I don't think it'll really make a difference...\"\n[s6] \"Don't worry so much. Just let yourself cook.\""
1005303-41 = "But not worrying makes me anxious..."
1005303-42 = "But not worrying makes me anxious..."
1005303-44 = "And so, Yuuka worried."
1005303-46 = "S-Sensei, what do I do? The recipe calls for brown sugar, but we only have white sugar!"
1005303-47 = "What if white sugar reacts with the other ingredients and causes chemical changes in the recipe that completely alter it's taste?"
1005303-49 = "By God. It says to boil for two minutes at 60 degrees, but the temperature has reached 50..."
1005303-50 = "Wait, how many more seconds do I have to heat it now to compensate? And honestly, how much heat counts as heat in the first place?!"
1005303-52 = "S-Sensei! Are the egg rolls safe? Are they being cooked properly?!"
1005303-53 = "S-Stop laughing and help me!"
1005303-57 = "It's over... It's done..."
1005303-58 = "It's...complete! My first boxed lunch!"
1005303-59 = "[s] \"Three hours...\""
1005303-60 = "Things take as long they take, okay!"
1005303-61 = "It was my first time, and heat control was harder than I thought, and..."
1005303-62 = "...And I didn't want to fail in front of [USERNAME] Sensei."
1005303-63 = "[s] \"Rest assured, you did not.\""
1005303-64 = "Regardless, if it takes me three hours to make lunch, it won't be feasible to prepare food a day before the festival."
1005303-65 = "...Maybe I'll just order food or ask friends for food as a favor."
1005303-71 = "As for the food I made today... Please help yourself, Sensei."
1005303-72 = "[s] \"Are you sure? This is your inaugural boxed lunch, after all.\""
1005303-73 = "Which is exactly why I'd like you to have it."
1005303-77 = "A-As a taste tester, of course! Feedback is important after first attempts! It's not like I meant anything special by it!"
1005303-83 = "...So, uh, please let me know if you liked it or not."
1005303-85 = "I took Yuuka's lunch with me to Schale and ate it for dinner."
1005303-86 = "...It was a little cold, but it still tasted good."
