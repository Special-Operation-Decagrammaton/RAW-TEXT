[translation]
1005303-1 = "สูตรอาหารลับฉบับวิทยาศาสตร์"
1005303-2 = "ห้องฝึกคหกรรม โรงเรียนมิลเลเนียม"
1005303-4 = "อะ...เอ๋? คุณครู?"
1005303-5 = "ทะ... ทำไมมาที่นี่ได้ล่ะ?!"
1005303-6 = "[s1] \"ก็ยูกะบอกว่าจะมาฝึกทำอาหารที่นี่นี่นา...\"\n[s2] \"แค่สงสัยว่ามีอะไรที่ครูช่วยได้บ้างรึเปล่าน่ะ\""
1005303-7 = "อึก... ไม่คิดเลยว่าคุณครูจะมาที่ห้องฝึกคหกรรม..."
1005303-8 = "อึก... ไม่คิดเลยว่าคุณครูจะมาที่ห้องฝึกคหกรรม..."
1005303-9 = "ถ้ารู้ก่อนละก็ ฉันคงจะเตรียมชุดที่เหมาะกว่านี้มาแล้วค่ะ"
1005303-10 = "[s] \"หรือว่าครูมาขัดจังหวะอะไรรึเปล่า...?\""
1005303-11 = "มะ...ไม่ใช่แบบนั้นค่ะ!"
1005303-12 = "แต่ว่าถ้าเกิดเผลอแสดงท่าทางที่น่าอาย หรือทำอาหารผิดพลาดให้คุณครูเห็น คงจะน่าอายมากๆ..."
1005303-13 = "นอกจากนี้... ฉันคิดว่าถ้าทำข้าวกล่องได้ดีละก็ จะแอบเตรียมข้าวกล่องไปให้คุณครูด้วยแท้ๆ..."
1005303-14 = "[s] \"เบนโตะโฮมเมดของยูกะ...\""
1005303-15 = "อะไรน่ะ ทำไมทำหน้าแบบนั้นคะ?!"
1005303-16 = "คงไม่ได้คิดว่าอาหารที่ฉันทำมันแปลกหรอกใช่มั้ยคะ?"
1005303-17 = "ถึงฉันจะมีประสบการณ์ทำอาหารไม่เยอะก็จริง แต่ก็แม่นเรื่องทฤษฎีนะคะ"
1005303-18 = "การทำอาหารก็คือการแปรรูปวัตถุดิบโดยใช้ความร้อน หรือการนำวัตถุดิบมาปรุงให้อยู่ในรูปแบบ#nที่นำมารับประทานได้..."
1005303-19 = "และในขั้นตอนนี้ ส่วนผสมที่ใช้ก็จะเกิดกระบวนการเปลี่ยนแปลงทางเคมีและทางกายภาพนับไม่ถ้วนค่ะ"
1005303-20 = "ดังนั้นพวกผู้เชี่ยวชาญจึงกล่าวว่าการจะปรุงอาหารให้ได้ดีนั้น คุณจะต้องเข้าใจหลักการทาง#nวิทยาศาสตร์เสียก่อน"
1005303-21 = "ซึ่งหมายความว่า... ตราบใดที่ฉันเข้าใจหลักการทางวิทยาศาสตร์อย่างถ่องแท้ ฉันก็จะไม่ล้มเหลวในการ#nปรุงอาหารแน่นอนค่ะ!"
1005303-22 = "[s3] \"ครูว่าการทดลองวิทยาศาสตร์กับการทำอาหารมันต่างกันนิดหน่อยนะ...\"\n[s4] \"แล้วยูกะจะทำเมนูอะไรเหรอ?\""
1005303-23 = "งั้นเหรอคะ แต่ว่าถ้าทำตามสูตรในหนังสือเมนูทำอาหารยอดฮิต <ข้าวกล่องเรียบหรูทำได้ทุกวัน ที่แม้#nแต่มือใหม่ก็ทำได้ง่ายๆ!> แล้วละก็คงไม่มีปัญหาหรอกค่ะ ส่วนเมนูที่จะทำคงเป็น..."
1005303-24 = "ถ้าตามที่หนังสือเมนูทำอาหารยอดฮิต <ข้าวกล่องเรียบหรูทำได้ทุกวัน ที่แม้แต่มือใหม่ก็ทำได้ง่ายๆ!>#nแล้วละก็..."
1005303-25 = "ผัดโกโบและไส้กรอกหน้าทาโกะ... แล้วก็ไข่ม้วนก็คงจะใช้ได้แล้วค่ะ"
1005303-26 = "ถ้างั้นเริ่มจากตัดรากต้นโกโบก่อนแล้วกันนะคะ?"
1005303-27 = "ไหนดูซิ... ใส่น้ำส้มสายชูหนึ่งช้อนโต๊ะต่อน้ำสองลิตรเพื่อขจัดรสฝาดของต้นโกโบ... "
1005303-31 = "เอ๋..."
1005303-32 = "[s] \"ทำไมเหรอ? มีปัญหาอะไรรึเปล่า?\""
1005303-33 = "คุณครู..."
1005303-34 = "น้ำสองลิตรที่เขียนไว้ในสูตรตรงนี้ ต้องใช้น้ำอุณหภูมิเท่าไรเหรอคะ?"
1005303-35 = "[s] \"อุณหภูมิคงไม่เกี่ยวหรอกมั้ง?\""
1005303-36 = "จะไม่เกี่ยวได้ยังไงคะ! ปริมาตรของน้ำจะเปลี่ยนแปลงไปตาม#nอุณหภูมินะคะ!"
1005303-37 = "ถ้าไม่รู้อุณหภูมิของน้ำที่คนเขียนสูตรอาหารนี้ใช้ ก็อาจเกิดความคลาดเคลื่อนตามความหนาแน่น#nของน้ำได้นะคะ!"
1005303-38 = "เมื่อพิจารณาจากความหนาแน่นตามอุณหภูมิของน้ำ อาจทำให้เกิดความแตกต่างได้ถึง 0.040 กรัม/มล. และอาจส่งผลให้เกิดความคลาดเคลื่อนได้ถึง 80 กรัม..."
1005303-39 = "ถ้าเกิดใช้น้ำที่มีอุณหภูมิสูงกว่าที่เขียนเอาไว้ในสูตรละก็ อาจทำให้ต้นโกโบมีรสเปรี้ยวหรือทำให้มัน#nแข็งเกินไปก็ได้..."
1005303-40 = "[s5] \"คงไม่ขนาดนั้นหรอก...\"\n[s6] \"ครูว่าใจเย็นๆ แล้วมาทำอาหารต่อกันดีกว่า\""
1005303-41 = "อึก... ชักกังวลขึ้นมาซะแล้วค่ะ..."
1005303-42 = "อึก... ชักกังวลขึ้นมาซะแล้วค่ะ..."
1005303-44 = "(หลังจากนั้นความกังวลของยูกะก็ดำเนินต่อไป...)"
1005303-46 = "คะ... คุณครู ทำยังไงดีคะ? ในสูตรเขียนไว้ว่าให้ใช้น้ำตาลทรายแดง แต่ที่นี่มีแต่น้ำตาลทรายขาวค่ะ!"
1005303-47 = "ถ้าเกิดใส่น้ำตาลทรายขาวลงไปแทน อาจทำให้เกิดปฏิกิริยาเคมีที่คาดไม่ถึงที่ทำให้รสชาติเปลี่ยน#nจะทำยังไงดีล่ะคะ?"
1005303-49 = "เอ๋? สูตรเขียนว่าให้ต้ม 2 นาทีในน้ำเดือด 60 องศา แต่ว่าตอนนี้อุณหภูมิน้ำแค่ 50 องศาเองค่ะ..."
1005303-50 = "ถ้างั้นต้องเร่งไฟขึ้นอีกสักนิดหนึ่งสินะคะ...? แล้วเขียนไว้ว่า 2 นาทีเนี่ย ต้องใช้ไฟแรงขนาดไหนกันคะ?!"
1005303-52 = "คะ... คุณครู...! ขะ...ไข่ม้วนมันสุกได้ที่แล้วใช่มั้ยคะ?!"
1005303-53 = "ยะ...อย่ามัวแต่หัวเราะแล้วก็มาช่วยกันหน่อยสิคะ!!"
1005303-57 = "ในที่สุด..."
1005303-58 = "เสร็จแล้วค่ะ! ข้าวกล่องโฮมเมดกล่องแรกของฉัน!"
1005303-59 = "[s] \"ถึงจะใช้เวลาทำตั้งสามชั่วโมงก็เถอะนะ...\""
1005303-60 = "มะ...มันช่วยไม่ได้นี่คะ!"
1005303-61 = "นี่เป็นครั้งแรกของฉัน แล้วการควบคุมไฟก็ไม่ได้ง่ายอย่างที่คิดเลย แต่ว่า..."
1005303-62 = "อย่างน้อยฉันก็ไม่ได้ทำอะไรล้มเหลวต่อหน้าคุณครู [USERNAME] นะคะ"
1005303-63 = "[s] \"ครูคิดว่ายูกะยอดเยี่ยมมากแล้วละ\""
1005303-64 = "แต่ว่าถ้าใช้เวลาเตรียมข้าวกล่องตั้งสามชั่วโมงแบบนี้ คงจะเตรียมไว้ก่อนวันงานกีฬาไม่ได้สินะคะ..."
1005303-65 = "สงสัยต้องสั่งอาหารล่วงหน้าจากร้านสะดวกซื้อ หรือไม่ก็ขอให้เพื่อนๆ คนอื่นช่วยแล้วละค่ะ"
1005303-71 = "ส่วนข้าวกล่องที่ทำวันนี้... คุณครูช่วยรับประทานหน่อยก็แล้วกันนะคะ"
1005303-72 = "[s] \"ข้าวกล่องกล่องแรกที่ยูกะทำเองเลยนะ ให้ครูกินจะดีเหรอ?\""
1005303-73 = "ค่ะ เพราะเป็นครั้งแรก ก็เลยอยากมอบให้คุณครูค่ะ"
1005303-77 = "นะ...แน่นอนว่าไม่ได้มีความหมายอื่นหรอกนะคะ แค่อยากให้ลองชิมรสชาติดูเท่านั้นค่ะ!"
1005303-83 = "พะ...พอกินหมดแล้วต้องคอมเมนต์ให้ฉันฟังด้วยนะคะ"
1005303-85 = "(จากนั้นคุณครูก็ถือข้าวกล่องที่ยูกะทำให้กลับมาที่ชาเล่ต์ และเอามากินเป็นมื้อดึก)"
1005303-86 = "(...ถึงกับข้าวจะเย็นชืดไปสักหน่อย แต่โดยรวมข้าวกล่องก็อร่อยพอสมควร)"
