90002040-22 = "失誤了嗎……！"
90002040-23 = "雖然有躲過手臂的攻擊，腿卻被巨大的碎片壓住了。"
90002040-27 = "……！"
90002040-28 = "這樣，不太容易脫身呢……"
90002040-37 = "……！！！"
90002040-38 = "（耶索德再次了抬起手臂）"
90002040-39 = "（被用兵力包圍了呢。是打算連自己的兵力一起壓扁嗎？)"
90002040-40 = "（確實是個有效率的選擇。畢竟兵力只要再創造出來就行了）"
90002040-41 = "（但是，我就……）"
90002040-42 = "即便要承受一定程度的傷害……！"
90002040-54 = "咦……？"
90002040-59 = "你沒事吧！？"
90002040-60 = "姐姐！快把這個搬開！等我數到三就一起……！"
90002040-61 = "一，二──"
90002040-66 = "──三！！！"
90002040-72 = "……桃井？綠？"
90002040-74 = "嘿嘿，怎麼樣！老師特地拜託我們來幫忙囉！"
90002040-75 = "沒事吧，英美同學？#n外表看起來沒有大礙的樣子……"
90002040-77 = "我沒事。謝謝你們。"
90002040-78 = "還有……"
90002040-83 = "嗯？"
90002040-84 = "嗯？"
90002040-86 = "現在立刻頭也不回地，用最快的速度往右邊跑。"
90002040-88 = "那是為什麼…… 啊！？"
90002040-96 = "呀啊啊啊啊！？"
90002040-104 = "躲，躲掉了……"
90002040-105 = "謝，謝謝你。英美同學。"
90002040-107 = "不客氣。該道謝的人是我才對。"
90002040-108 = "那麼老師。"
90002040-109 = "接下來就拜託你們了。"
90002040-114 = "這已經是最快速度了嗎，Kei！？"
90002040-115 = "沒錯。要是再提高RPM的話，真的會爆炸的。"
90002040-116 = "使用後燃器也不行嗎？"
90002040-117 = "如果只有幾秒應該還能勉強撐住……沒關係嗎？"
90002040-118 = "准許使用！"
90002040-119 = "我明白了。將引擎輸出提升至最大上限。"
90002040-126 = "那麼各位，我們就在耶索德上再見吧。"
90002040-127 = "愛麗絲，出擊！"
90002040-133 = "耶索德攻擊組，確認全員順利出擊。"
90002040-134 = "指揮權也交還給您。拜託老師了。"
90002040-135 = "[s]「我知道了！在搜索組陷入危險之前……！」"
