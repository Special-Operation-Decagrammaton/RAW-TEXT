[translation]
90002040-1 = "ตอนที่ 4;เยซ็อด"
90002040-3 = "นึกว่าจะยากกว่านี้ซะอีก"
90002040-4 = "ว่าแต่แขนนั่นน่ะ... ยิ่งดูไปมันก็ยิ่งใหญ่โตมโหฬารนะ"
90002040-16 = "หลบได้ครั้งหนึ่งแล้ว ดีละ..."
90002040-17 = "อึก...?!"
90002040-22 = "พลาดไปเหรอ...!"
90002040-23 = "ถึงจะหลบการโจมตีของแขนได้ แต่ขาดันมาติดในเศษซากชิ้นใหญ่อะไรก็ไม่รู้"
90002040-27 = "...!"
90002040-28 = "เอาขาออกไม่ได้ง่ายๆ เลยแฮะ..."
90002040-37 = "...!!!"
90002040-38 = "(เยซ็อดยกแขนขึ้นอีกครั้งแล้ว)"
90002040-39 = "(แล้วก็ให้กองกำลังเข้ามาล้อมไว้สินะ จะสังเวยกองกำลังของตัวเองเลยงั้นเหรอ?)"
90002040-40 = "(ถือว่าเป็นทางเลือกที่มีประสิทธิภาพเลยนะ เพราะยังไงก็สร้างกองกำลังใหม่ได้อยู่แล้ว)"
90002040-41 = "(แต่ว่าตอนนี้ฉัน...)"
90002040-42 = "ต่อให้ต้องเสี่ยงตัวบาดเจ็บ แต่ก็คงต้อง...!"
90002040-54 = "เอ๋...?"
90002040-59 = "เป็นอะไรหรือเปล่า?!"
90002040-60 = "พี่โมโมอิ! รีบมายกอันนี้ไปเร็ว! นับถึงสามนะ...!"
90002040-61 = "หนึ่ง สอง..."
90002040-66 = "สาม!!!"
90002040-72 = "โมโมอิ? มิโดริ?"
90002040-74 = "แหะๆ เป็นยังไงล่ะ? คุณครูขอให้พวกฉันมาช่วยน่ะ!"
90002040-75 = "เป็นยังไงบ้างคะ คุณเอมิ? ดูจากภายนอกก็น่าจะยังปลอดภัยอยู่นะ แต่ก็..."
90002040-77 = "ฉันไม่เป็นไรหรอก ขอบใจทั้งสองคนนะ"
90002040-78 = "แล้วก็"
90002040-83 = "หืม?"
90002040-84 = "คะ?"
90002040-86 = "ตอนนี้ให้รีบวิ่งไปทางขวาให้เร็วที่สุด แล้วก็ห้ามหันหลังกลับมามองด้วย"
90002040-88 = "ทำไมเหรอ... อ๊ะ?!"
90002040-96 = "ว้ายยยยย!?!?"
90002040-104 = "ละ... หลบได้แล้ว..."
90002040-105 = "ขะ... ขอบคุณนะคะ คุณเอมิ"
90002040-107 = "ไม่หรอก ฉันต่างหากที่ต้องพูดคำนั้น"
90002040-108 = "ถ้างั้นก็ คุณครู"
90002040-109 = "ต่อไปก็ฝากด้วยนะ"
90002040-114 = "นี่คือความเร็วสูงสุดแล้วเหรอคะ เคย์?!"
90002040-115 = "ใช่ค่ะ ถ้าเพิ่มรอบเครื่องยนต์ให้มากกว่านี้ เครื่องยนต์จะระเบิดแน่ๆ ค่ะ"
90002040-116 = "เปิดอาฟเตอร์เบิร์นเนอร์ไม่ได้เหรอคะ?"
90002040-117 = "แบบนั้นน่าจะเพิ่มแรงขับได้ 2-3 วินาทีค่ะ... ให้เปิดมั้ยคะ?"
90002040-118 = "ฉันอนุญาตค่ะ!"
90002040-119 = "เข้าใจแล้วค่ะ เร่งพลังงานเครื่องยนต์สูงสุด"
90002040-126 = "แล้วเจอกันด้านบนเยซ็อดนะคะ ทุกคน"
90002040-127 = "อาริสึ ออกจู่โจมค่ะ!"
90002040-133 = "ทีมโจมตีเยซ็อดออกจากยานไปโดยสวัสดิภาพแล้วค่ะ"
90002040-134 = "ฉันจะคืนอำนาจสั่งการให้นะคะ คุณครู รบกวนด้วยค่ะ"
90002040-135 = "[s] \"เอาละ! ก่อนที่ทีมค้นหาจะตกอยู่ในอันตราย...!\""
