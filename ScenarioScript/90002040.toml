[translation]
90002040-1 = "第4話;耶索德"
90002040-3 = "這種情況反而還算好對付的呢。"
90002040-4 = "……那隻手臂，再看一次還是感覺大得嚇人。"
90002040-16 = "避開一次了。好……"
