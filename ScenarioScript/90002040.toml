[translation]
90002040-1 = "Episode 4;Yesod"
90002040-3 = "A piece of cake."
90002040-4 = "...Or a piece of a very large arm."
90002040-16 = "Dodged it. Good. Just keep that rhythm..."
90002040-17 = "Ugh!"
90002040-22 = "M-My leg!"
90002040-23 = "This debris...! I can't get it off my leg."
90002040-27 = "...!"
90002040-28 = "...I won't be able to get it out by myself."
90002040-37 = "...!!"
90002040-38 = "(Yesod is lifting its arms again.)"
90002040-39 = "(And sent its troops to surround me and keep me in place.)"
90002040-40 = "(It's efficient, in a way. Its troops are disposable and infinite.)"
90002040-41 = "(Me, on the other hand...)"
90002040-42 = "This is nothing! I'll take you down with me, Yesod!"
90002040-54 = "Eh...?"
90002040-59 = "Eimi! Are you okay?!"
90002040-60 = "Momoi! Let's move this, hurry! On three...!"
90002040-61 = "One, two..."
90002040-66 = "THREE!!"
90002040-72 = "...Momoi? Midori?"
90002040-74 = "Heehee, how'd we do? Sensei sent us to help!"
90002040-75 = "How's your leg? It seems okay now, but..."
90002040-77 = "I'm fine. Thank you both."
90002040-78 = "Also..."
90002040-83 = "Hm?"
90002040-84 = "Hm?"
90002040-86 = "Right now, I need you to run as fast as you can to your right. Don't look back."
90002040-88 = "What...? HUH?!"
90002040-96 = "KYAAAH!!"
90002040-104 = "I-I dodged it..."
90002040-105 = "Th-Thank you, Eimi."
90002040-107 = "Not at all. I should be thanking you."
90002040-108 = "Then, Sensei."
90002040-109 = "It's your turn now."
90002040-114 = "Can we not go any faster, Kei?!"
90002040-115 = "Unless you want me to blow up our engine."
90002040-116 = "What about our thrusters?"
90002040-117 = "I can give you three seconds. Is that enough?"
90002040-118 = "Do it! Do it now!"
90002040-119 = "Got it. Maximizing engine output."
90002040-126 = "I'll see you all above Yesod then."
90002040-127 = "Aris, rolling out!"
90002040-133 = "Confirming that Yesod attack squad has dispatched safely."
90002040-134 = "They're in your hands now, Sensei."
90002040-135 = "[s] \"Let's get this done and the decoy team home safe!\""
