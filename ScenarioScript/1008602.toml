[translation]
1008602-1 = "Hina and the Dress 1"
1008602-2 = "Greetings, Sensei. I've arrived."
1008602-3 = "[s1] \"Come on in, Hina. Would you like something to drink?\"\n[s2] \"Coffee? Black tea? Oh, I think we have oolong tea and cola too...\""
1008602-6 = "Coffee for me."
1008602-7 = "[s] \"Okay, leave it to me!\""
1008602-11 = "Hmm. So I'm back in the Schale office."
1008602-12 = "Feels like ages since I've been here."
1008602-13 = "[s] \"Yeah, getting a visit from you is quite a surprise, but a welcome one!\""
1008602-14 = "Oh, come now. It's not that big a deal..."
1008602-18 = "Huh? Are those...old cup noodles on your desk?"
1008602-19 = "Not only that... I see random socks... The sink is overflowing with dishes..."
1008602-20 = "And a brand new toy?"
1008602-21 = "[s] \"I can explain...\""
1008602-22 = "...Sensei. "
1008602-23 = "[s3] \"Listen, work's just been a tiny bit totally overwhelming lately.\"\n[s4] \"I'll get around to cleaning sooner or later. Promise!\""
1008602-26 = "Oh, no. I didn't mean to scold you, Sensei."
1008602-27 = "I know how easy it is to get caught up in the hustle and bustle of life and let cleanliness fall by the wayside."
1008602-28 = "...Which is fine. I don't care at all. Not a bit."
1008602-29 = "But there might be students passing through Schale who might... It could be a good opportunity to set an example for them!"
1008602-30 = "[s] \"Ugh! You're right. I need to tidy up.\""
1008602-31 = "If you don't mind, how about I pay a visit to Schale once in a while to help you clean?"
1008602-32 = "I keep a pretty spotless ship over at the prefect team offices, if I do say so myself."
1008602-33 = "Only if you're okay with it, of course."
1008602-34 = "[s5] \"No, you've got other important things you should be doing.\"\n[s6] \"I can't ask the head prefect to clean for me.\""
1008602-37 = "That so?"
1008602-38 = "..."
1008602-42 = "Are you sure? Positive?"
1008602-43 = "[s] \"Um...Hina...did I say something wrong?\""
1008602-44 = "Did you? I didn't hear anything."
1008602-45 = "...So, let's get down to business, Sensei."
1008602-46 = "[s] \"R-Right away!\""
1008602-47 = "Ahem..."
1008602-48 = "There was actually something I wanted to talk about today."
1008602-49 = "The Pandemonium Society is organizing a massive party for all of Gehenna. At the last minute, of course."
1008602-50 = "[s] \"I didn't think Gehenna had parties...\""
1008602-51 = "It'll be a social function for the who's who of Gehenna, and Kivotos at large."
1008602-52 = "To be frank, I don't think attending is worth all the headache."
1008602-53 = "...However, it is a public gathering. As a leader, there may be concern among my followers if my face is missing from the crowd."
1008602-54 = "So, I should at least make an appearance."
1008602-55 = "...No matter how annoying it is."
1008602-59 = "We do what we must. Even if it is VERY annoying."
1008602-60 = "[s] \"(If this is her annoyed face, I'd hate to see her mad.)\""
1008602-61 = "So the question is... Well... I hate to admit this..."
1008602-62 = "I'm not much of a socialite, so I have no clue what to expect... "
1008602-63 = "I need to get ready for the party, but I don't even know where to start."
1008602-64 = "That's why I came to..."
1008602-65 = "I know it's a bit beneath me. The head prefect should not be hanging on their Sensei for help with every little thing..."
1008602-66 = "But..."
1008602-67 = "[s] \"Don't be ashamed, Hina. I'm glad that you trust in me.\""
1008602-68 = "Oh. Really?"
1008602-69 = "[s] \"Hmm, there's a lot to do, but there's absolutely one thing you need for every social...\""
1008602-71 = "[ns] \"Do you have a party dress?\""
1008602-72 = "Dress...?"
1008602-73 = "[s7] \"Oh, before that, make sure you know the TPO: time, place, and occasion.\"\n[s8] \"Though, that's pretty basic. Apologies if you already knew.\""
1008602-76 = "Ugh. No, you're fine."
1008602-77 = "It's so obvious that I never even considered it."
1008602-78 = "I'd imagine I'd feel very out of place wearing my normal Prefect Team uniform."
1008602-79 = "I'm definitely going to need a \"party dress.\""
1008602-80 = "Hmm, but I can't just get away with only a dress, can I? I'll need accessories to match... Oh, and shoes... Hm, maybe I should style my hair?"
1008602-81 = "Thank you, Sensei. I feel a plan starting to come together."
1008602-82 = "[s] \"Happy to lend a hand.\""
1008602-84 = "[ns] \"Do you need help picking out a dress?\""
1008602-85 = "Hm? Oh, no. If it's just a dress, I don't need to buy it."
1008602-87 = "[ns] \"The dress is in a warehouse?\""
1008602-88 = "Yes. It's a warehouse I've been using."
1008602-89 = "I use it to store personal items, or things I don't bring out often."
1008602-90 = "There should be a dress around here somewhere."
1008602-91 = "[s] \"Why am I getting a sense of deja vu?\""
1008602-92 = "I keep clothes on this rack... Wait, no."
1008602-96 = "Maybe here?"
1008602-97 = "Ah."
1008602-101 = "[ns] \"You find it, Hina?\""
1008602-105 = "...Ah."
1008602-106 = "[s] \"...Uh, Hina, that's not a dress. That's a tutu. Here, let me—\""
1008602-107 = "D-Don't worry about that, Sensei! I'll handle grabbing the clothes."
1008602-113 = "...Phew. Ready to continue the search?"
1008602-114 = "[s] \"Are you embarrassed about your old cloth—?\""
1008602-115 = "READY to CONTINUE the search, Sensei?"
1008602-116 = "[s] \"Y-Yeah...\""
1008602-120 = "Phew. I don't see anything on this side... Let's try this side..."
1008602-124 = "I should definitely have something on this side... "
1008602-125 = "Ah."
1008602-129 = "[ns] \"This dress has an interesting design.\""
1008602-132 = "[ns] \"Wait. I think this is a track suit...\""
1008602-133 = "Oh, that's where that was. I lost it a while ago."
1008602-134 = "[s] \"...\""
1008602-142 = "Wh-What were you doing just now, Sensei?!"
1008602-143 = "[s] \"Ah! U-Um! ...Nothing in particular?\""
1008602-144 = "You were holding those clothes...a little close..."
1008602-145 = "Never mind, j-just put them down!"
1008602-146 = "Apologies... I may be overreacting. "
1008602-147 = "[s9] \"I mean...\"\n[s10] \"Maybe you aren't?\""
1008602-148 = "Wh-What?!"
1008602-149 = "*sigh* I can't let my guard down around you."
1008602-150 = "Okay..."
1008602-151 = "...From now on, let's just focus on finding the dress. I'll handle the clothes."
1008602-152 = "And hope we don't find any more embarrassing outfits..."
1008602-154 = "We continued to rummage around the warehouse. Eventually, we found what we were looking for."
1008602-156 = "Ah! Here it is. "
1008602-157 = "Look, Sensei. This was my favorite dress from back in the day."
1008602-162 = "Now we won't have to spend any money on a new one."
1008602-163 = "[s] \"Hmm. Hina. I have a concern...\""
1008602-164 = "Please wait here. I'll try it on."
1008602-165 = "Tell me what you think when I get back."
1008602-166 = "[s] \"Sure, but I think it's—\""
1008602-167 = "Then."
1008602-171 = "Then, like this... From here..."
1008602-172 = "Mm. Maybe, if I just..."
1008602-173 = "...Why...won't it fit...?"
1008602-177 = "...Ah."
1008602-178 = "[s] \"Hina?! Are you all right?! I heard something tear!\""
1008602-179 = "I-I'm fine! It's nothing serious!"
1008602-180 = "...I yanked too hard and my dress ripped..."
1008602-181 = "[s] \"That's very serious!\""
1008602-182 = "S-Stay where you are! Keep facing the wall! I can't have you see me like this!"
1008602-183 = "You take a single glance, and I'll never forgive you!"
1008602-184 = "[s] \"Yes, ma'am.\""
1008602-188 = "...Geez. I tore my way in, and then I had to tear my way out."
1008602-189 = "I've worn my old clothes again a few times before, so I don't know why..."
1008602-190 = "Have I grown without realizing it?"
1008602-191 = "[s] \"Hey Hina, just out of curiosity...when did you last wear this dress?\""
1008602-192 = "Hmm? It was some elementary school Christmas party."
1008602-193 = "Second grade, I think?"
1008602-194 = "[s] \"There's no way that the clothes you wore then will fit now!\""
1008602-195 = "R-Really?"
1008602-196 = "Growing up is hard..."
1008602-197 = "...What do I do now?"
1008602-198 = "[s] \"Hina, look. Why don't we just go to the store and buy you a dress?\""
1008602-199 = "...Dress shopping with Sensei?"
1008602-200 = " Hmmm. If I must... I do need to prepare for the party..."
1008602-201 = "And you did come all this way..."
1008602-202 = "But I... Hmm... Okay. Sensei, I know you're busy, but will you help me buy a dress?"
1008602-203 = "[s] \"Of course! Just leave it to me!\""
1008602-204 = "Y-Yes...Thank you."
1008602-205 = "Later..."
