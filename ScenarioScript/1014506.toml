1014506-139 = "3;키사키 수영복;07;그러나…… 마침내 소녀의 집에서, 소녀의 행방을 찾아내고야 말았다. 소녀는 문중 어른들의 뜻에 따라, 학문을 그만두고 혼인을 강요받았지."
