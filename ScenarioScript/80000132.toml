[translation]
80000132-1 = "Recharging Mana for Master"
80000132-2 = "Something magical happened this morning."
80000132-5 = "Master! You said you plan on visiting Wildhunt today, right?"
80000132-6 = "Then there's something I really want to give you!"
80000132-7 = "Nyuhuhu, I'll be meeting you at the secret spot! You know the one!"
80000132-9 = "And so, I arrived at a secluded park in Wildhunt."
80000132-12 = "Secluded Park"
80000132-14 = "Oh. Hello there, Master! You're here earlier than I foresaw!"
80000132-15 = "[s] \"Why'd you ask me to come here?\""
80000132-16 = "It's because... After much thought and research, I realized that THIS is the ideal place for us to meet and resonate our mana!"
80000132-17 = "Other places are too crowded. Our magical fields were bound to be drowning in interference."
80000132-18 = "[s] \"Hm...? Basically, you wanted to meet me alone, right?\""
80000132-19 = "P-Precisely!"
80000132-20 = "As expected of Master. You're quick to catch on."
80000132-21 = "So, now that there's just the two of us...!"
80000132-22 = "...I can take it off, right?"
80000132-23 = "[s] \"...What?!\""
80000132-24 = "Master. I want to show you my determination. My sincerity! My true magical heart!"
80000132-25 = "...Yah!"
80000132-30 = "Hyaaaah...!"
80000132-39 = "I-I know it's for your sake, but doing this outside... It's so e-embarrassing."
80000132-40 = "[s] \"Um... Eri?\""
80000132-41 = "I-I'm sorry, it's weird, right? I know that, but...!"
80000132-42 = "For me, I might as well be naked."
80000132-43 = "Ugh, I felt fine when I practiced this with the Occult Society members..."
80000132-44 = "[s] \"You don't feel embarrassed in front of them?\""
80000132-45 = "Well, we're close enough to wash together at the public baths..."
80000132-46 = "So, taking my hat off is..."
80000132-47 = "...it didn't feel special to THEM."
80000132-48 = " ...Ah?! I-It's not like I-I meant something else right now. There's no additional meaning. It was...the MANA!"
80000132-49 = "[s] \"Y-You don't have to push yourself! You can put it back on!\""
80000132-50 = "B-But I came here so determined...!"
80000132-51 = "Also, I must be unobscured...for an efficient magic transfer..."
80000132-52 = "..."
80000132-53 = "I-It's okay, I can do this...!"
80000132-54 = "Phew..."
80000132-55 = "I-In that case, Master!"
80000132-60 = "These...chocolates are packed with my powers."
80000132-61 = "I made them with my own magic. I did not rely on the power of my hat or ANY outside forces."
80000132-62 = "So I thought it wouldn't be right for me to give these to you while wearing the—"
80000132-63 = "...M-Master?"
80000132-64 = "[s] \"Ooh, I'm feeling stronger just by looking at them!\""
80000132-65 = "R-Really?"
80000132-66 = "I-In that case, um..."
80000132-67 = "Could I ask you to say \"aah\"...?!"
80000132-68 = "[s] \"So THIS is how you 'recharge mana'!\""
80000132-69 = "Y-You're right!"
80000132-70 = "I can't believe you saw through me again... You're impressive, Master."
80000132-71 = "I can't deal with this. My face is so exposed without the brim."
80000132-72 = "But I'll give it a try! For you. Are you ready?"
80000132-73 = "[s] \"I'm ready anytime!\""
80000132-74 = " I-In that case, here I go!"
80000132-75 = "Why don't we start with..."
80000132-80 = "...a-a star-shaped chocolate?"
80000132-85 = "[ns] \"Oh, it tastes sweet and I feel something crackling!\""
80000132-86 = "Heehee... I put popping candy in the star-shaped ones."
80000132-87 = "You should take one if you feel like you're dozing off..."
80000132-88 = "[s] \"What does the heart-shaped one taste like?\""
80000132-89 = "That's... How about you try it for yourself?"
80000132-90 = "P-Please go ahead...!"
80000132-94 = "[ns] \"Th-This flavor is...?!\""
80000132-95 = "...It tasted sweet and tangy."
80000132-96 = "For some reason, I felt like my depleted mana was being replenished...!"
80000132-97 = "D-Did you like it?"
80000132-98 = "For the hearts... I put some vitamins in them. Not a lot! Nothing crazy!"
80000132-99 = "So they're chocolates...and also nutritional supplements."
80000132-100 = "The thing is... You're always busy, right, Master?"
80000132-101 = "You can't even eat proper meals, and there are days where you're up all night."
80000132-102 = "Ugh, just thinking about that makes me sad..."
80000132-103 = "So, in those times, please have a heart-shaped chocolate while thinking about me."
80000132-104 = "I'm sure it will replenish your depleted mana!"
80000132-105 = "[s1] \"This is so thoughtful, Eri...\"\n[s2] \"I want to devour them all right now!\""
80000132-108 = "Y-You shouldn't have too much!"
80000132-109 = "If you overcharge your mana, it might cause an explosive overload."
80000132-110 = "[ns] \"Okay! I'll keep it in mind!\""
80000132-112 = "[ns] \"Do you want to have some too, Eri?\""
80000132-115 = "I-Is this a reverse mana charge...coming from Master...?!"
80000132-116 = "Then it must be twice as effective when compared to typical charging!"
80000132-117 = "Th-Then I'll leave you to it, Master!"
80000132-119 = "I made sure that Eri was happy and charged with mana."
