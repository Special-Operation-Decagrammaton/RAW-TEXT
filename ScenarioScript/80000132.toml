[translation]
80000132-1 = "ชาร์จพลังมานาให้มาสเตอร์"
80000132-2 = "(เหตุการณ์เกิดขึ้นในตอนเช้าวันนี้)"
80000132-5 = "มาสเตอร์! วันนี้จะมาที่โรงเรียนของเราใช่รึเปล่าคะ?"
80000132-6 = "ถ้างั้นฉันมีสิ่งที่อยากจะให้มาสเตอร์อยู่ด้วยค่ะ!"
80000132-7 = "ฮุฮุฮุ ถ้างั้นมาเจอกันที่สถานที่ลับของโรงเรียนนะคะ!"
80000132-9 = "(หลังจากนั้นคุณครูก็มาที่พื้นที่โล่งของสถาบันศิลปะไวลด์ฮันต์)"
80000132-12 = "พื้นที่โล่งที่ไร้ผู้คน"
80000132-14 = "โอ้ะ สวัสดีค่ะ มาสเตอร์! มาถึงเร็วกว่าที่คิดนะคะเนี่ย!"
80000132-15 = "[s] \"มีเรื่องอะไรเหรอถึงนัดเจอกันในที่แบบนี้น่ะ?\""
80000132-16 = "เรื่องนั้นเป็นเพราะ... ฉันคิดว่าที่นี่เป็นสถานที่ที่จะเพิ่มความสั่นพ้องพลังมานาของฉันกับมาสเตอร์ได้#nสูงสุดค่ะ"
80000132-17 = "ที่อื่นมีคนพลุกพล่าน ทำให้สนามพลังเวทถูกรบกวน..."
80000132-18 = "[s] \"หืม...? เพราะงั้นเลยนัดเจอกันแค่สองคนเหรอ?\""
80000132-19 = "ชะ... ใช่แล้วค่ะ!"
80000132-20 = "มองสถานการณ์ได้เฉียบขาดสมกับเป็นมาสเตอร์จริงๆ เลยค่ะ"
80000132-21 = "และตอนนี้เราก็อยู่กันสองคนแล้ว...!"
80000132-22 = "ฉันถอดเลยได้มั้ยคะ...?"
80000132-23 = "[s] \"หืม...?!\""
80000132-24 = "วันนี้ฉันอยากจะแสดงให้มาสเตอร์เห็นถึงความมุ่งมั่นของฉันค่ะ"
80000132-25 = "ฮึบ…!!!"
80000132-30 = "อ๊ายยยย...!!"
80000132-39 = "ถะ... ถึงจะเป็นการทำเพื่อมาสเตอร์ แต่ให้ทำข้างนอกแบบนี้... มะ... มันก็เขินอยู่ดีค่ะ"
80000132-40 = "[s] \"นี่... เอริ?\""
80000132-41 = "ขะ... ขอโทษค่ะ คงแปลกๆ สินะคะ... ทั้งๆ ที่ฉันรู้อยู่แล้วแท้ๆ...!"
80000132-42 = "สำหรับฉันการถอดหมวก มันก็เหมือนกับการปลดเปลื้องเสื้อผ้า..."
80000132-43 = "ฮือ... ตอนที่ซ้อมกับสมาชิกในชมรมก็ไม่เห็นเป็นอะไรเลย..."
80000132-44 = "[s] \"ตอนซ้อมกับคนอื่นๆ ไม่รู้สึกเขินเหรอ?\""
80000132-45 = "พะ... เพราะพวกเราใช้ห้องอาบน้ำเดียวกันด้วยน่ะค่ะ"
80000132-46 = "เพราะงั้นถึงจะถอดหมวกออก..."
80000132-47 = "จะบอกว่ามันเหมือนกันดีมั้ยนะ..."
80000132-48 = "อ๊ะ?! มะ... ไม่ได้มีความหมายอื่นแอบแฝงหรอกนะคะ!"
80000132-49 = "[s] \"มะ... ไม่ต้องฝืนตัวเองเกินไปหรอก! ใส่หมวกเหมือนเดิมก็ได้!\""
80000132-50 = "ตะ... แต่ว่าฉันอุตส่าห์เตรียมใจมาแล้วนะคะ...!"
80000132-51 = "อีกอย่างถ้าจะถ่ายทอดพลังเวทอย่างมีประสิทธิภาพ... ก็ต้องทำแบบนี้..."
80000132-52 = "......"
80000132-53 = "มะ... ไม่เป็นไรค่ะ ฉันจะต้องทำได้อย่างแน่นอนค่ะ...!"
80000132-54 = "ฮู่ว..."
80000132-55 = "ถะ... ถ้างั้นมาสเตอร์...!"
80000132-60 = "นี่เป็นช็อกโกแลต... ที่อัดแน่นด้วยพลังเวทของฉันค่ะ"
80000132-61 = "ฉันใช้พลังเวทของตัวเองทำขึ้นมา ไม่ได้พึ่งพลังของหมวกเลยค่ะ"
80000132-62 = "เพราะงั้นเลยคิดว่าจะมอบมันให้มาสเตอร์ทั้งๆ ที่ใส่หมวกอยู่ไม่ได้..."
80000132-63 = "มะ... มาสเตอร์?"
80000132-64 = "[s] \"โอ้ แค่เห็นก็รู้สึกได้เลยว่าพลังเพิ่มขึ้น!\""
80000132-65 = "จะ... จริงเหรอคะ?"
80000132-66 = "ถะ... ถ้างั้น..."
80000132-67 = "ช่วยอ้าปาก 'อ้ามมม~' หน่อยได้มั้ยคะ...!?"
80000132-68 = "[s] \"ชาร์จมานาสินะ!\""
80000132-69 = "ชะ... ใช่แล้วค่ะ!"
80000132-70 = "มองเจตนาของฉันทะลุปรุโปร่งเลยเหรอเนี่ย... สมกับเป็นมาสเตอร์จริงๆ เลยค่ะ"
80000132-71 = "พะ...พอไม่ใส่หมวกแล้วเห็นหน้าเต็มๆ แบบนี้ ฉันรู้สึกเขินนิดหน่อย..."
80000132-72 = "แต่ฉันจะลองดูค่ะ เตรียมพร้อมรึยังคะ?"
80000132-73 = "[s] \"ครูพร้อมเสมอ!\""
80000132-74 = "ถะ... ถ้างั้นจะเริ่มแล้วนะคะ!"
80000132-75 = "เริ่มจากอันที่เป็นรูปดาว..."
80000132-80 = "ปะ... เป็นยังไงบ้างคะ?"
80000132-85 = "[ns] \"โอ้ หวานแล้วก็กรุบกรอบดีนะ!\""
80000132-86 = "แหะๆ... ฉันใส่ลูกอมเป๊าะแป๊ะไว้ในช็อกโกแลตรูปดาวด้วยค่ะ"
80000132-87 = "ถ้ากินตอนง่วงๆ ก็จะช่วยให้ตาสว่างขึ้นได้ค่ะ"
80000132-88 = "[s] \"รูปหัวใจนี่รสอะไรเหรอ?\""
80000132-89 = "อันนั้น... คุณครูลองชิมดูแล้วบอกมาสิคะ"
80000132-90 = "ละ... ลองดูหน่อยนะคะ...!"
80000132-94 = "[ns] \"ระ... รสชาตินี้มัน...?!\""
80000132-95 = "(รสชาติหวานอมเปรี้ยวนิดๆ...)"
80000132-96 = "(จู่ๆ คุณครูก็รู้สึกได้ถึงพลังมานาที่ฟื้นฟูขึ้น...!)"
80000132-97 = "ปะ... เป็นยังไงบ้างคะ?"
80000132-98 = "ฉันลองใส่วิตามินหลายชนิดลงไป... ในช็อกโกแลตรูปหัวใจค่ะ"
80000132-99 = "เป็นทั้งช็อกโกแลตแล้วก็เป็นยาบำรุงไปในตัวด้วยค่ะ"
80000132-100 = "คือ... มาสเตอร์งานยุ่งอยู่ตลอดเลยใช่มั้ยล่ะคะ?"
80000132-101 = "กินอาหารก็ไม่ค่อยตรงเวลา แถมยังต้องทำงานจนดึกดื่นเลยด้วย..."
80000132-102 = "ฮือออ... แค่คิดเรื่องนั้นฉันก็เศร้าแล้วค่ะ..."
80000132-103 = "ในเวลาแบบนั้นให้นึกถึงฉันแล้วก็กินช็อกโกแลตรูปหัวใจนะคะ"
80000132-104 = "มานาที่ใช้ไปจะต้องฟื้นฟูกลับมาอย่างแน่นอนค่ะ!"
80000132-105 = "[s1] \"ครูสัมผัสได้ถึงจิตใจของเอริเลย...\"\n[s2] \"ครูจะกินให้หมดตอนนี้เลย!\""
80000132-108 = "กะ... กินเยอะเกินไปมันจะไม่ดีนะคะ!"
80000132-109 = "ถ้าชาร์จมานามากเกินความจำเป็นจะทำให้ร่างกายโอเวอร์โหลดได้ค่ะ"
80000132-110 = "[ns] \"อื้อ! ครูจะจำให้ขึ้นใจเลย!\""
80000132-112 = "[ns] \"เอริอยากกินด้วยกันมั้ย?\""
80000132-115 = "มะ... มาสเตอร์จะส่งมานาย้อนกลับ...?!"
80000132-116 = "ผลลัพธ์ที่ได้จะต้องดีกว่าการชาร์จมานาปกติถึงสองเท่าแน่นอนค่ะ!"
80000132-117 = "ถะ... ถ้างั้นก็รบกวนด้วยนะคะ มาสเตอร์!"
80000132-119 = "(หลังจากนั้น คุณครูก็ใช้เวลาชาร์จมานากับเอริอย่างสนุกสนาน)"
