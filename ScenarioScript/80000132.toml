[translation]
80000132-1 = "為御者補充魔力"
80000132-2 = "（那是今天早上發生的事）"
80000132-5 = "御者！你今天預定要來我們學園對吧？"
80000132-6 = "那我有一定要交給你的東西！"
80000132-7 = "妞呵呵，那我們就在學園的秘密地點見面吧！"
80000132-9 = "（於是來到了狂獵藝術學園的某處空地）"
80000132-12 = "杳無人煙的空地"
80000132-14 = "啊，你好呀，御者！比想像中來得早呢！"
80000132-15 = "[s] 「約在這種地方，有什麼事嗎？」"
80000132-16 = "那是因為……我判斷這裡是能將與御者的魔力共鳴最大化的地點。"
80000132-17 = "其他地方人太多了，各種魔力場會產生干涉效應……"
80000132-18 = "[s] 「嗯……？你的意思是想兩個人單獨見面嗎？」"
80000132-19 = "是，是的！"
80000132-20 = "不愧是御者。反應真快呢。"
80000132-21 = "所以說，就我們兩個人……！"
80000132-22 = "……脫掉，也可以吧？"
80000132-23 = "[s] 「……咦！？」"
80000132-24 = "御者。今天我想讓你看看我的覺悟。"
80000132-25 = "……嘿！！！"
80000132-30 = "呀啊啊啊啊……！"
80000132-39 = "就，就算是為了御者，在外面什麼的……果，果然好害羞。"
80000132-40 = "[s] 「那個……繪梨？」"
80000132-41 = "對，對不起，很奇怪吧！我自己也知道……！"
80000132-42 = "對我來說就跟裸體一樣的……"
80000132-43 = "嗚嗚，跟神秘研的大家練習的時候明明沒問題的……"
80000132-44 = "[s] 「在那些人面前就不會害羞嗎？」"
80000132-45 = "因，因為跟那些人是一起泡澡的關係嘛。"
80000132-46 = "所以就算脫掉帽子也不會特別……"
80000132-47 = "該怎麼說呢……"
80000132-48 = " ……啊！？不，不是說這裡面有什麼其他的意思啦！"
80000132-49 = "[s] 「不，不用勉強！再戴回去也沒關係的！」"
80000132-50 = "可，可是我也是做好覺悟才來的……！"
80000132-51 = "而且為了有效率地傳遞魔力……就得變成這副模樣……"
80000132-52 = "……"
80000132-53 = "沒，沒問題的，我可以好好做到的……！"
80000132-54 = "呼……"
80000132-55 = "那，那麼御者！"
80000132-60 = "這是……滿滿注入了我的魔力的巧克力。"
80000132-61 = "不靠帽子的力量，而是用我自己的魔法製作的。"
80000132-62 = "所以我覺得戴著帽子送給你不太好……！"
80000132-63 = "……御，御者？"
80000132-64 = "[s] 「喔喔，光看就覺得力量湧上來了！」"
80000132-65 = "真，真的嗎？"
80000132-66 = "那，那麼，那個……"
80000132-67 = "可以請你「啊～」地張開嘴嗎……！？"
80000132-68 = "[s] 「是要補充魔力呢！」"
80000132-69 = "是，是的！"
80000132-70 = "又一次看穿了我的意圖……不愧是御者真厲害呢。"
80000132-71 = "雖，雖然沒了帽子整張臉都露出來很害羞……"
80000132-72 = "我會加油的！你準備好了嗎？"
80000132-73 = "[s] 「隨時OK！」"
80000132-74 = "那，那我開始了！"
80000132-75 = "首先從星星形狀的巧克力開始……"
80000132-80 = "怎，怎麼樣呢？"
80000132-85 = "[ns] 「喔喔，甜甜的還有跳跳糖的感覺！」"
80000132-86 = "嘿嘿嘿……星星形狀的巧克力裡面加了跳跳糖喔。"
80000132-87 = "想睡覺的時候吃一顆，一定會有幫助的。"
80000132-88 = "[s] 「愛心形狀的是什麼口味？」"
80000132-89 = "那個……請你吃過之後再判斷吧。"
80000132-90 = "那，那就拜託了……！"
80000132-94 = "[ns] 「這，這個味道是……！？」"
80000132-95 = "（……甜甜的，同時又帶著一絲酸味）"
80000132-96 = "（總覺得枯竭的魔力正在恢復的感覺……！）"
80000132-97 = "怎，怎麼樣呢？"
80000132-98 = "愛心形狀的巧克力裡……我加了各種維他命進去。"
80000132-99 = "雖然是巧克力但同時也是營養品呢。"
80000132-100 = "那個……御者不是總是很忙嗎？"
80000132-101 = "飯也沒辦法好好吃，有時候還得加班到很晚……"
80000132-102 = "嗚嗚，光是想想就覺得有點難過……"
80000132-103 = "那種時候就請想著我，然後吃一顆愛心形狀的巧克力吧。"
80000132-104 = "這樣一來，枯竭的魔力一定會源源不絕地湧出來的！"
80000132-105 = "[s1] 「感受到繪梨的心意了……」\n[s2] 「好想現在就全部吃光！」"
80000132-108 = "吃，吃太多的話會出問題的！"
80000132-109 = "魔力補充過頭的話也是會超載的。"
80000132-110 = "[ns] 「嗯！我會記住的！」"
80000132-112 = "[ns] 「繪梨也一起吃嗎？」"
80000132-115 = "御，御者要反向提供魔力……！？"
80000132-116 = "那個效果一定會比平時高出兩倍以上吧！"
80000132-117 = "那，那就拜託了，御者！"
80000132-119 = "（之後和繪梨一起度過了魔力充沛的時光）"
