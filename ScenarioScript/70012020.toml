[translation]
70012020-1 = "ON AIR：ゲヘナ（２）"
70012020-2 = "キシシッ！さすがはイロハだ！"
70012020-3 = "まさにピッタリな人選じゃないか！"
70012020-4 = "私が選んだというか、向こうから来たといいますか……。"
70012020-5 = "[ruby=はたみ]旗見[/ruby]エリカと[ruby=よざくら]夜桜[/ruby]キララ。#nさぞや万魔殿にふさわしい放送にしてくれることだろう！！"
70012020-6 = "先輩、名前を覚えるのは得意ですよね……。"
70012020-7 = "とにかく、2人に任せることにしたんですから。後で文句とか言わないでくださいね。"
70012020-8 = "人を動かすなら信ずるべし。信ずるなら後悔するべからず――"
70012020-9 = "それこそトップが持つべき志！安心して進行せよ！"
70012020-10 = "はいはい……では。"
70012020-12 = "というわけで。次回のパーソナリティーとしてお二人のことを告知したところ――"
70012020-13 = "かなりの反響がありました。"
70012020-14 = "ほんと！？わー！嬉しい！"
70012020-15 = "お二人は校内の有名人ですから。こちらとしても助かっています。"
70012020-16 = "ちょっとプレッシャーだね……。進行マニュアルとか、あったりする？"
70012020-17 = "最低限は。とはいえ、そもそも適当で大丈夫ですから。#nいつもの放送みたいに――って、あれ？校内放送って聞いたことあります？"
70012020-18 = "え……どんな感じだったっけ……？あんま思い出せないかも。"
70012020-19 = "イブキちゃんが喋ってたよね。あと、何か歌ってた気がする。"
70012020-20 = "えっ、歌も歌うの？"
70012020-21 = "いえ、それはやる必要なくて……まあ普通の放送です。ラジオみたいな。"
70012020-22 = "ああ、そういえば。体験談のコーナー宛に、たくさんお便りが届いているみたいです。#nですが全部は読まなくていいので。"
70012020-23 = "そういうわけにはいかないっしょ。#n私の話を聞いてほしい！ってわざわざ送ってくれたんだから。"
70012020-24 = "いつ読まれるかな～って楽しみにしてるはずだもん。ガッカリさせちゃダメでしょ？"
70012020-25 = "まあ……そうですね。そこはお任せします。"
70012020-26 = "ほんと？本当にいいんだよね？"
70012020-27 = "はい。お二人を信じてお任せします。"
70012020-28 = "変なことをするような方々でもないでしょうし……。"
70012020-29 = "うわぁ、なんか万魔殿から信頼されてるって思ったらプレッシャーかも。"
70012020-30 = "そんなに大げさなものでもありませんよ。"
70012020-31 = "トラブルが起きても……最後はどうにかするので。"
70012020-32 = "あははっ！信じてくれたイロハちゃんのためにも頑張るね！"
70012020-33 = "お気持ちはありがたいですが……#n急なお願いでしたし、あまり気負わずにやってもらえれば。"
70012020-38 = "そろそろですね。"
70012020-39 = "では、よろしくお願いします。"
70012020-43 = "まっかせて！"
70012020-44 = "ふぅ……なんか緊張してきたかも。"
70012020-45 = "だいじょーぶだいじょーぶ！ここにコーナーの説明もあるし。なるようになるって。"
70012020-46 = "そうだね。じゃあいってみますか。"
70012020-52 = "コホン！みなさ～ん、こんにちはー！こちら、放送室からお届けしてまーす！"
70012020-53 = "本日の「ON AIR：ゲヘナ」の進行をサプライズで担当する、夜桜キララと――"
70012020-54 = "旗見エリカです。"
70012020-55 = "至らないところがあるかもしれませんが、よろしくお願いします。"
70012020-58 = "あれ？今日の放送……いつもと違う？"
70012020-59 = "担当変わったのかな？"
70012020-60 = "キララちゃんがやってるの……？"
70012020-62 = "それでは最初のコーナー！部活宣伝ターイムっ！"
70012020-63 = "今日もたくさんのお便りが届いているみたいですね。"
70012020-64 = "じゃあまずは最初のお便り！おー、カラフルで可愛いっ！"
70012020-65 = "すごい文字の量……気持ちが伝わってきますね。"
70012020-66 = "さてさて、どんな部活なんでしょうか。"
70012020-67 = "「この手紙はトリニティから始まり、受け取った人に幸せを届けてきました。#nですがこの手紙を1週間以内に7人に送らなければたちまち不幸が訪れ……」"
70012020-68 = "……え？"
70012020-69 = "うわぁ……懐かしいね、こういうの。今もあるんだ。"
70012020-70 = "どうやら部活の宣伝ではなさそうです！次のお便りにいっちゃいましょう！"
70012020-73 = "ちょっと、聞いちゃったじゃん！？不幸が訪れるってヤなんだけど！？"
70012020-74 = "送る相手7人もいないんだけど……どうしよう……。"
70012020-76 = "はい、つぎー！今度はちゃんと部活の宣伝でありますよーに！"
70012020-77 = "じゃあエリカさん、お願いします！"
70012020-78 = "コホン……では。"
70012020-79 = "「学園境界哲学部はあなたをお待ちしています。#n私たちと一緒に内と外の境界でたたずみ、その曖昧さを味わいませんか？#n登校とサボりの境界線上――あなたも癖になること間違いなし！」"
70012020-80 = "あっ、これ！いっつも校門らへんに座ってる人たちだ！"
70012020-81 = "あー、あれ、ガーゴイルごっこだと思ってた。部活だったんだ？"
70012020-82 = "えっと……入部希望の人は毎週火曜か木曜に西門に行けばいいみたい。#nそれでは、「学園境界哲学部」をよろしくお願いしまーす！"
70012020-89 = "（想像よりもスムーズですね。この2人に頼んで正解でした）"
70012020-93 = "今日の放送、なんか良い感じじゃない？"
70012020-94 = "ね。いつもは万魔殿の賛歌ばっかりなのに。"
70012020-95 = "いつもこんな感じなら、ちょっと楽しみかも……？"
70012020-99 = "（反応も悪くないようです）"
70012020-100 = "（……マコト先輩は嫌がるかもしれませんが）"
70012020-102 = "はい、では次のコーナー。"
70012020-103 = "みなさんお待ちかね！「キラキラ☆集まれ！リスナーエピソード」のお時間です！"
70012020-104 = "そんな名前だったっけ……まあ、いっか。"
70012020-105 = "たくさんのお便りをいただいていますが、時間の都合で全部読むのは難しそうです。#n読めなかった人はごめんなさい。"
70012020-106 = "では、最初のお便りです。"
70012020-110 = "「私は今2年生です。お昼の時間は1人でゆっくりご飯を食べるのが好きなのですが、よく誘ってくれる友達がいます」"
70012020-111 = "「悪い気がして、断りたくても断れません。友達のことが嫌いなわけではないんです。#nどうしたらいいでしょうか？」"
70012020-112 = "あーこういうタイプの子、結構多いんじゃない？"
70012020-113 = "たしかに悩むよね。自分の時間を大事にすべきか、友達を優先すべきか。"
70012020-114 = "あたし、これは自信をもって答えられます！"
70012020-115 = "お？そうなんですか？"
70012020-116 = "はいっ！！"
70012020-117 = "勇気を出して、正直に話してみてください。#n本当は、1人で食べるのも好きなんだって。"
70012020-118 = "友達と気まずくなりそうと思って一歩を踏み出せないかもしれません。#nでも本音で話し合ったら、もっと仲良くなれると思うんです。"
70012020-122 = "おお……。"
70012020-123 = "心を込めてお話しすれば、きっと分かってくれるはず。だって友達だもん！#nだからあんまり不安にならないで！"
70012020-124 = "ふふっ、そうですね。#nお互いの好みや性格を尊重しあえる関係。それが友達というものですよね。"
70012020-128 = "ではキララちゃん、次にいってみましょう。"
70012020-129 = "は～い。こちらも匿名のお便りですね。1年生の方だそうです。"
70012020-131 = "「私は常に不幸がつきまといます。よく転ぶし、お団子とかお菓子は落とすし、お店で何か食べようとすると爆発が起きるし、食券を失くしたり、自販機にお金を飲まれたりします。私の何が問題なんでしょう？」"
70012020-133 = "うわぁ……聞いてるだけで涙が出ちゃいそう。"
70012020-134 = "それでもいつも何かに挑戦してるってこと？すごいね。"
70012020-135 = "うーん、それだけ不幸があるってことは、#n後でおっきな幸せがやってくるんじゃないでしょうか？#n幸せはどこかでバランスが取れるっていうもんね。"
70012020-136 = "それか、ブイログとかストリーミングをやってみてもいいかも。"
70012020-137 = "いっつも不幸に襲われる……それって撮影のネタにピッタリだと思うので。"
70012020-138 = "つまりピンチをチャンスに変えるってことですね！#n日常の不幸を、むしろセールスポイントにしちゃう！みたいな？"
70012020-139 = "そうそう。不幸なことが起きない時も、それはそれで幸せだからね。"
70012020-140 = "頑張って！あたし達も応援してるね！"
70012020-141 = "はい、では次のお便りへ――"
70012020-149 = "うっ！？ヤな音！"
70012020-150 = "ん……機材トラブルかな。"
70012020-155 = "わっ、なに！？"
70012020-157 = "……！！"
70012020-159 = "どうしよ？ここまでにする？"
70012020-160 = "うーん、ケーブルが干渉してるだけなら……。"
70012020-166 = "これを、こうして……。"
70012020-172 = "できた。"
70012020-173 = "すごーい！エリカちゃん、どうやったの？"
70012020-174 = "ケーブルが絡まってるとたまに起きるんだよね。#nしかも放送室のは古くなってるやつが多いし。"
70012020-175 = "だから特別なことはしてないよ。絡まったケーブルをほどいただけ。"
70012020-176 = "お～さっすが。こういうの詳しいんだね！"
70012020-177 = "これくらい、なんてことないって。"
70012020-181 = "あーあー。機材トラブルによりご迷惑をおかけしてごめんなさい。#nただいま復旧しましたので、放送を続けます。"
70012020-182 = "はいっ！では次のお便りにいきましょ～！"
70012020-188 = "（ノイズに紛れてなんか声がした気がするけど……） "
70012020-189 = "（まあ、気のせいかな）"
70012020-191 = "いい感じだと思っていたら機材トラブル……。"
70012020-192 = "マコト先輩。この先も放送を続けるなら、交換した方がいいんじゃないんでしょうか。"
70012020-193 = "……。"
70012020-194 = "先輩？聞いてます？"
70012020-195 = "ん？ああ。"
70012020-196 = "キシシッ。たしかに、校内放送が注目されるのも悪くはないな。"
70012020-197 = "この私の威厳を示す朗読が、より多くの者に届くこととなる！"
70012020-198 = "イロハ！校内放送を活性化させるための案を積極的に提出するように！"
70012020-199 = "はぁ……そう言うと思いました。"
70012020-201 = "では、そろそろこの辺りで……。"
70012020-202 = "あれ？"
70012020-203 = "わあ、曲のリクエストが届いていますね！"
70012020-204 = "あ、その曲。エンディングにピッタリだね。"
70012020-205 = "――せん！"
70012020-206 = "どうしたの？"
70012020-207 = "そんな最新の曲……ありません！"
70012020-208 = "えっ？スマホを繋げるんじゃダメなの？"
70012020-209 = "そんな設備、ここにはなくて……いま流せるのは万魔殿の賛歌くらいしか……。"
70012020-210 = "リクエストと全然違うじゃん！？"
70012020-211 = "それなら仕方ないよ。リクエスト曲は残念ながら――"
70012020-215 = "エリカちゃん！"
70012020-216 = "うん？"
70012020-217 = "エリカちゃんが歌ってよ！ちょうどそこにギターもあるし。"
70012020-218 = "えっ？私？"
70012020-219 = "そ！エリカちゃん超歌うまじゃん！#nしかもこの曲、前にカラオケで歌ってなかった？"
70012020-220 = "いや、うまいってほどじゃ……歌える程度、っていうか……。"
70012020-221 = "それにカラオケと校内放送って全然違うし……。"
70012020-222 = "あははっ、いいのいいの！歌う人がいて、聞いてくれる人がいるんだから！"
70012020-223 = "リクエストを送ってくれた人も喜ぶと思うよ？"
70012020-224 = "うーん……私の歌を聞きたかったわけじゃない、とは思うけど……。"
70012020-228 = "……まあ、やれないこともない、か。"
70012020-229 = "わ～い！エリカちゃんの生歌～！！"
70012020-230 = "ふぅ……。"
70012020-236 = "では、お聞きください。タイトルは――"
70012020-237 = "～～～♪"
70012020-245 = "～～～♪"
70012020-250 = "（こうしてキラキラ部の校内放送は成功裏に終わった）"
70012020-252 = "お二人ともお疲れ様でした。……本当に。"
70012020-253 = "あははっ、すっごい楽しかったよ！案外、放送向いてるのかも！"
70012020-254 = "そうだね。結構新鮮だった。#n聞いてた人たち、どんな反応だったのかな。"
70012020-255 = "ああ、よかったですよ。すごく。"
70012020-256 = "ほんと！？じゃあこれでイロハちゃんも、少しは気が楽になったかな？"
70012020-257 = "それは……えっと……反応がよすぎて困っている、といいますか……。"
70012020-258 = "えっ？そんなに？"
70012020-259 = "反応がよくて困ることってあるの？"
70012020-261 = "まあ……反応とは関係なく手のかかる人がいるといいますか。#nそして案の定ご機嫌斜めのようで……。"
70012020-263 = "とはいえ個人的には、今後もお二人に放送をお任せしたいと思っています。"
70012020-264 = "……。"
70012020-265 = "お二人にも部活動があるでしょうし、無理にとは言いませんが。"
70012020-266 = "ヤバ！超嬉しい！"
70012020-267 = "そうだね。もったいない言葉って思うくらい。"
70012020-268 = "でも、もともと担当してた生徒がいるんだよね？"
70012020-269 = "はい。一身上の都合で辞めてしまいましたが……。"
70012020-270 = "その子が戻ってくるかは分からないけどさ。"
70012020-271 = "私たちが居場所を取っちゃうのはどうなのかなって。#nそういう経験って……案外引きずるんだよね。"
70012020-272 = "だから、お誘いは嬉しいけど……。"
70012020-273 = "あたしらはただの[ruby=・]補[/ruby][ruby=・]欠[/ruby]ってことで！#n……そういうことだよね？"
70012020-274 = "ふふっ……そう。さすがキララちゃん。"
70012020-279 = "ええ、お気持ちは分かりました。優しいんですね。"
70012020-280 = "その生徒が戻ってくるかどうかは分かりませんが、伝えておきます。"
70012020-281 = "ああ、それと。#n頑張ってくださったお二人に、ささやかなお礼をできればと思いまして。"
70012020-282 = "マコト先輩の直筆サインを渡す予定だったのですが、一旦これは置いといて――"
70012020-283 = "えっ、お礼？"
70012020-284 = "エリカちゃん……どう思う？"
70012020-285 = "うーん……多分、同じ考えじゃないかな？"
70012020-286 = "あははっ、そうだよね？じゃあ……。"
70012020-290 = "お礼は気持ちだけもらっておくね！#nあたしらはキラキラな経験ができただけで満足だから！"
70012020-291 = "うん。楽しかった。それでお役に立てたなら十分だよ。"
70012020-292 = "……そうですか。"
70012020-293 = "あー、じゃあじゃあ、イロハちゃんのモモトークとか。そっちの方が嬉しいかも？"
70012020-294 = "……。"
70012020-295 = "ふふっ、ええ。いいですよ。#nというより、こちらから言おうと思っていたところです。"
70012020-296 = "きゃ～！イロハちゃん、かわいーーっ！！"
70012020-297 = "たまに連絡してもいい？あ、もしこの後予定ないなら――"
70012020-299 = "キラキラな日々は、いつまでも。"
70012020-303 = "ON AIR：ゲヘナ"
