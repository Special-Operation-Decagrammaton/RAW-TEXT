[translation]
1600620-1 = "Best(?) Summer Vacation"
1600620-3 = "Gonna have...best food...beach...with Sensei... Even if it's too hot..."
1600620-4 = "[s] \"Beach with... Izumi...\""
1600620-5 = "No... Just a bit more... Shouldn't be...wasting time like this..."
1600620-6 = "Ahh..."
1600620-11 = "[ns1] \"Oh no... Izumi's overheating...\"\n[ns2] \"Stick a fork in me. I'm done...\""
1600620-14 = "Oh no... Sensei's overheating too..."
1600620-15 = "[s] \"It can't be helped...\""
1600620-16 = "You're right... It really can't..."
1600620-17 = "Because...it's too...dang..."
1600620-18 = "Hoooooooot!"
1600620-20 = "We made it to the shade. Thank goodness."
1600620-21 = "But it's so hot that all the restaurants shut down."
1600620-22 = "My plan to taste every delicacy along the beach with Sensei is ruined. Ruined!"
1600620-23 = "[s] \"Please... Just give me something cold to eat...\""
1600620-24 = "Right...cold, cold is good..."
1600620-25 = "Wait, Sensei! I have a good idea!"
1600620-26 = "What could it be? Behold! Tada!"
1600620-31 = "Yep! That's right! My ice cooler! Check out all this fruit and juice!"
1600620-32 = "I can use it to make you some ice cold fruit punch!"
1600620-33 = "[s] \"Izumi's Fruit Punch?\""
1600620-34 = "We start with a whole watermelon, then some pineapple, blueberries, cherries..."
1600620-35 = "Oh! I forgot the juice! Let's throw some orange juice and soda in there, also..."
1600620-36 = "Beneath the shade, the breeze brushed my skin."
1600620-37 = "A little calamansi, a little passion fruit, quince, avocado..."
1600620-40 = "The waves crashed against the sand, while the seagulls cried above our heads."
1600620-42 = "Grate the durian, mash the marmelo, dice the pepino, salted kiwano, and noni..."
1600620-43 = "Then mix together with extra tart cherry juice, pine needle juice, and root beer!"
1600620-44 = "[ns3] \"W-Wait a minute, Izumi!\"\n[ns4] \"Are you sure all of those things are safe in a fruit punch?!\""
1600620-47 = "Hm? What do you mean, Sensei? My fruit punch is made of nothing but the freshest fruits and juices from this cooler."
1600620-48 = "Oh, I see. You're worried it won't be cold? Don't! I've got plenty of ice in here!"
1600620-49 = "Heehee. Last but not least, let's sprinkle on my super secret seasoning!"
1600620-50 = "Mix it all together and...!"
1600620-51 = "All done! Give it a try, Sensei! "
1600620-52 = "Hm? What's wrong?"
1600620-53 = "Ah, I see. The creator should have the first taste, right?"
1600620-54 = "That's mighty generous of you, Sensei! Well, bottoms up!"
1600620-56 = "Izumi downed her concoction in a blink. Not a moment of hesitation..."
1600620-57 = "Sensei! This is SO good!"
1600620-58 = "The fruits blend together so smoothly, but you can still taste each unique flavor!"
1600620-59 = "[s] \"Truly, a drink worthy of Izumi! A-yep...\""
1600620-60 = "Yes! I really love this fruit punch!"
1600620-61 = "I know I made it myself, but this might be the most memorable drink I've ever had!"
1600620-62 = "Now then, it's your turn, Sensei!"
1600620-63 = "Or... You don't want to try my drink?"
1600620-64 = "[s] \"Izumi's using her trump card!\""
1600620-65 = "Hm? What do you mean, Sensei? Is it missing something?"
1600620-66 = "Oh I see! Let me get you a bigger bowl for it. Give it a try, Sensei!"
1600620-67 = "Faced with Izumi's bright and hopeful face, I gave in and took a big gulp."
1600620-80 = "—ei. Sensei!"
1600620-81 = "Wake up, Sensei! *sniffle*"
1600620-82 = "[s] \"Unfamiliar ceiling— Wait, that's the sky.\""
1600620-83 = "Are you okay, Sensei?!"
1600620-84 = "You're fine? But you passed out from my drink!"
1600620-85 = "[s] \"This is all just a midsummer night's dream...\""
1600620-86 = "Huh? I don't follow. Then again you do say weird things sometimes, Sensei."
1600620-87 = "*sigh* What are we gonna do now? It's already night time. We missed out on all the yummy restaurants."
1600620-88 = "[s5] \"Hey, at least we beat the heat.\"\n[s6] \"It's not hot anymore, so mission accomplished?\""
1600620-94 = "Is that...so?"
1600620-95 = "All right! Whatever you say, Sensei!"
