[translation]
10053100-1 = "Afterword;Barbecue and Chilli"
10053100-3 = "Mm. Nice char, here."
10053100-4 = "The \"steaks\" have never been higher! Everyone, grab a plate!"
10053100-9 = "..."
10053100-10 = "What are you cowering for? I said to grab. A. Plate."
10053100-11 = "Well... Uh, we're really grateful. Immensely."
10053100-12 = "But...are you sure it's okay for us to join your...backyard barbecue?"
10053100-13 = "...? What are you even talking about?"
10053100-14 = "You'd rather starve? Come on. You got to eat to live."
10053100-15 = "Well, yes, but..."
10053100-16 = "Then shut your traps and eat."
10053100-17 = "...? At the same time?!"
10053100-18 = "...? Good point. Maybe start with lowering the masks, grabbing a plate, and going from there. And quit complaining!"
10053100-21 = "..."
10053100-22 = "And what's your problem?"
10053100-23 = "Well, Konoka... If you keep being so nice, someone's going to stab you in the back."
10053100-24 = "Oh, are they?"
10053100-25 = "Wh-What? Why are you being so—?"
10053100-26 = "Aw, you're worried about me, aren't you?"
10053100-27 = "Shyaah! I never said that!"
10053100-28 = "I'm not...not worried!"
10053100-29 = "Well, good! Because there's no need."
10053100-33 = "...Rena, as your elder, let me give you two important life lessons. You listening?"
10053100-34 = "One, no matter what happens, once you actually face your problem, you'll find a way out of it."
10053100-35 = "Two, there's nothing you can't solve with power...or a little FIREPOWER. Hahaha!"
10053100-41 = "*sigh* I'd be carefree too, if I could punch a BUS in half."
10053100-43 = "Ah, this is so delightful."
10053100-44 = "I haven't had meat in ages..."
10053100-49 = "..."
10053100-50 = "Ah!"
10053100-51 = "I almost lost my composure before my junior. I must be more careful..."
10053100-52 = "Huh? What's wrong, President? Why did you stop eating?"
10053100-53 = "A-Ah... Oh, I just have fine, expensive meat so OFTEN that I got bored mid-bite. Haha..."
10053100-54 = "Of course you did, President! Sounds like you are doing great, as always."
10053100-55 = "W-Well of course I am!"
10053100-56 = "But, dear Tsubasa... Are you sure you want to hang...so close to me?"
10053100-57 = "Oh, I'm sorry. I was just so happy to see you again. It has been a long time."
10053100-58 = "Was I getting in the way...?"
10053100-59 = "Oh, no, I-I don't mind at all! I was just curious! Scientifically!"
10053100-60 = "Th-Then... I'll sit with you for a little longer."
10053100-61 = "Fufufu."
10053100-62 = "...I can't eat with her staring at me..."
10053100-65 = "Hey, grifter. Connie. Con artist."
10053100-66 = "Don't call me that!"
10053100-67 = "You seem to be a good leader, even if you're a con artist. The director likes you, at least. A lot."
10053100-68 = "I'm NOT a con artist...!"
10053100-70 = "Hey, Konoka."
10053100-71 = "If you don't mind, I wanted to tell you something. You cannot blindly trust what you hear."
10053100-73 = "Yeah...?"
10053100-75 = "The General Student Council controls the mainstream media. And they are known for being in cahoots with Seminar."
10053100-76 = "Our president was falsely accused."
10053100-77 = "Seminar was threatened by her talents, so \"Big Sister\" intervened to destroy her reputation."
10053100-79 = "...Ah, so that's your story?"
10053100-80 = "\"Story\"?! It's a clear, undeniable fact that I extracted from Big Sister myself!"
10053100-81 = "Yeah, suuuuure."
10053100-82 = "You don't believe a word of this, do you?!"
10053100-86 = "I'll ask the questions here."
10053100-87 = "Like, wasn't it a bit MUCH to climb to the second story just to watch your protege sleep?"
10053100-88 = "Though I understand why one would worry about the director..."
10053100-89 = "...What are you talking about?"
10053100-90 = "You know, that night we caught you. Didn't you say you were outside the window?"
10053100-91 = "When did I say that?"
10053100-92 = "...?"
10053100-96 = "The bridge was out, so I found your lodge, all lit up. I was considering knocking... And then you cracked the window open and screamed. Of course I ran."
10053100-97 = "But that reminds me. I wanted to ask you."
10053100-98 = "There WAS a woman pressed against your window. Who was she? I haven't seen her since."
10053100-103 = "...?"
10053100-104 = "Uh..."
10053100-106 = "Uwaaaah?!"
