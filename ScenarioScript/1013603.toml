1013603-42 = "3;에이미 결전;13;그냥, 지금 이렇게 하고 있는 게 나는 좋아.\n#3;closeup"
1013603-43 = "[s] \"……어?\""
1013603-44 = "3;에이미 결전;04;뭐야. 표정이 왜 그래 선생님. 내가 싫어?\n#3;closeup"
1013603-45 = "3;에이미 결전;03;후후. 농담이야. 선생님이 왜 그러는지도, 이제는 이해할 수 있어.\n#3;closeup\n#3;em;[음표]"
1013603-46 = "3;에이미 결전;13;응.\n#3;closeup"
1013603-47 = "3;에이미 결전;12;이것도, 예전의 나였다면 절대로 하지 않을 말이었겠지.\n#3;closeup"
1013603-48 = "3;에이미 결전;02;하지만 이렇게 몸을 맞대고 서로 체온을 나누면…….\n#3;em;[...]\n#3;closeup"
1013603-49 = "3;에이미 결전;00;이것도 일종의 열평형 상태에 관한 것이겠지만.\n#3;closeup"
1013603-50 = "3;에이미 결전;01;나는 선생님의 몸을 미지근하다고 느낄 수 있고.\n#3;closeup"
1013603-51 = "3;에이미 결전;02;선생님은 내 몸으로 따듯하다고 느낄 수 있잖아?\n#3;em;[재잘]\n#3;closeup"
1013603-52 = "3;에이미 결전;00;그건 어떻게 보면, 우리가 서로에게 줄 수 있는 변화 같다고 생각했어.\n#3;closeup"
1013603-53 = "3;에이미 결전;13;사람은 결국, 어떻게든, 조금씩이라도 서로를 바라보며 변해 가곤 하니까.\n#3;em;[음표]\n#3;closeup"
1013603-54 = "[s] \"에이미는…… 나 때문에 변했다고 생각해?\""
