[translation]
1013603-1 = "熱平衡"
1013603-4 = "雖然夜間偵察或索敵聽起來很誇張，不過這次應該不會出什麼事才對。"
1013603-5 = "問我為什麼這麼想？#n唔嗯……"
1013603-6 = "算是……一種直覺？"
1013603-7 = "[s]「英美居然會說直覺，還挺少見的呢。」"
1013603-8 = "是嗎？直覺有時候也是很有效率的哦。"
1013603-9 = "那是將過去十幾年的人生經驗……"
1013603-10 = "以及人類這個物種累積超過十萬年的基因大數據之中，推導出來的一種資訊性結論。"
1013603-11 = "絕對不是憑空冒出來的，而是一種啟發式演算法。"
1013603-12 = "就像如果感覺「怪怪的」，不管對象是人還是地點，先避開往往會比較好一樣。"
1013603-13 = "從這個意義上來說……我或許是偏好在某種程度上依靠本能行動的人？"
1013603-14 = "當然在進入現場之前，我也會仔細思考怎麼做才能更有效率。"
1013603-15 = "換句話說，就是會謹慎想想該如何減少工作量。"
1013603-16 = "[s]「英美也不喜歡工作嗎？」"
1013603-17 = "除非是工作狂，否則喜歡工作的人應該很少吧……"
1013603-18 = "[s]「說的也是……」"
1013603-23 = "[ns]「哈啾！！！」"
1013603-24 = "老師你會冷嗎？"
1013603-25 = "雖然稱不上冷，但是有股涼涼的感覺……？#n嗯……這麼說也對。"
1013603-26 = "這裡基本上是極地嘛。"
1013603-27 = "呵呵，那麼……"
1013603-32 = "（下個瞬間，英美緊緊貼過來挽住了我的手臂……！）"
1013603-33 = "[ns]「英，英美！？」"
1013603-36 = "這樣有好一點嗎，老師？"
1013603-37 = "嗯，那就好。"
1013603-38 = "我的話……溫溫的剛剛好吧。"
1013603-39 = "你問這樣做是不是因為比較有效率？"
1013603-40 = "雖然可以這麼說……"
1013603-41 = "……"
1013603-42 = "不過，我只是單純喜歡現在這樣而已。"
1013603-43 = "[s]「……咦？」"
1013603-44 = "為什麼露出那種表情？#n你不喜歡我嗎？"
1013603-45 = "呵呵，開玩笑的。#n現在我也能理解老師為什麼會那樣了。"
1013603-46 = "嗯……"
1013603-47 = "如果是以前的我，應該絕對不會說出這種話吧。"
1013603-48 = "像這樣把身體貼在一起，分享彼此的體溫……"
1013603-49 = "這也算是一種熱平衡的狀態吧。"
1013603-50 = "我能感覺到老師暖暖的體溫……"
1013603-51 = "老師也能從我的身體感受到溫暖對吧？"
1013603-52 = "我覺得從某種意義上來說，這就像是我們能為彼此帶來的變化。"
1013603-53 = "人們終究會以某種方式，看著彼此漸漸改變的。"
1013603-54 = "[s]「英美會覺得……自己是因為我而改變的嗎？」"
1013603-59 = "我也不確定……"
1013603-60 = "不過……也許是吧。"
1013603-61 = "如果沒有遇見老師的話，我大概……"
1013603-62 = "會一直保持原樣，停留在原地吧。"
1013603-63 = "仍然是個見到周圍有人感到寒冷，也不會想把體溫分享出去的孩子。"
1013603-64 = "但是現在……"
1013603-65 = "……"
1013603-66 = "呵呵，接下來的話我就不說了。"
1013603-67 = "……"
1013603-68 = "畢竟那樣實在有點沒效率呢。"
