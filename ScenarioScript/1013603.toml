1013603-36 = "3;에이미 결전;03;조금 따듯해졌어, 선생님?\n#3;closeup"
1013603-37 = "3;에이미 결전;02;응. 다행이네.\n#3;closeup"
1013603-38 = "3;에이미 결전;01;나는…… 미지근해서 딱 좋은 정도일까.\n#3;closeup"
1013603-39 = "3;에이미 결전;02;이렇게 하는 편이 효율적이라서 이러는 거냐고?\n#3;closeup"
1013603-40 = "3;에이미 결전;00;그렇게 볼 수도 있겠지만…….\n#3;closeup"
