1013603-60 = "3;에이미 결전;02;응. 확실히, 그럴지도."
1013603-61 = "3;에이미 결전;00;선생님과 만나지 않았다면, 나는 아마도."
1013603-62 = "3;에이미 결전;12;쭉 계속해서, 그 자리에 그런 모양으로 남아 있었겠지."
1013603-63 = "3;에이미 결전;17;주위에, 쌀쌀함을 느끼는 사람에게, 체온을 나눠 줄 생각도 떠올리지 못하는 그런 아이로.\n#3;em;[한숨]"
1013603-64 = "3;에이미 결전;02;하지만 지금은……."
1013603-65 = "3;에이미 결전;01;……."
1013603-66 = "3;에이미 결전;03;후후. 여기서부터는 더 이상 말 안 할래.\n#3;em;[음표]"
