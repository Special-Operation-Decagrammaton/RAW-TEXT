[translation]
1013603-1 = "แบ่งปันไออุ่น"
1013603-4 = "ถึงจะพูดว่าเป็นการลาดตระเวนตอนกลางคืน หรือการระบุพิกัดศัตรู แต่คราวนี้คงไม่มีอะไรเป็นพิเศษหรอก"
1013603-5 = "ทำไมฉันถึงคิดแบบนั้นน่ะเหรอ? อืม..."
1013603-6 = "ก็แค่... ลางสังหรณ์น่ะ?"
1013603-7 = "[s] \"ลางสังหรณ์ของเอมิงั้นเหรอ น่าทึ่งจังเลยนะ\""
1013603-8 = "ไม่ขนาดนั้นหรอก คุณครู บางครั้งลางสังหรณ์ก็เป็นประสาทสัมผัสที่มีประสิทธิภาพอย่างหนึ่ง"
1013603-9 = "อ้างอิงจากประสบการณ์ชีวิตของฉัน... ที่ผ่านมาสิบกว่าปีนี่น่ะ"
1013603-10 = "ยิ่งกว่านั้น มันคือข้อสรุปเชิงข้อมูลประเภทหนึ่งที่ได้มาจากการวิเคราะห์ข้อมูลขนาดใหญ่จากยีนของ#nมนุษยชาติ ที่สั่งสมมาในฐานะเผ่าพันธุ์หนึ่งมายาวนานนับแสนปีเลยละ"
1013603-11 = "มันไม่ใช่แค่สิ่งที่คิดขึ้นมาลอยๆ หรอกนะ แต่เป็นฮิวริสติก อัลกอริทึมน่ะ"
1013603-12 = "เหมือนกับเวลาที่เรารู้สึก 'สังหรณ์ใจไม่ดี' หรือสัมผัสได้ถึงอะไรแปลกๆ จากบุคคล หรือสถานที่ขึ้นมา ก็ควรเลือกพาตัวเองออกมาห่างๆ ทันที"
1013603-13 = "เพราะอย่างนั้น... เลยทำให้ฉันชอบทำอะไรตามสัญชาตญาณก็ได้?"
1013603-14 = "แน่นอนว่าก่อนที่จะลงพื้นที่ ฉันมักจะคิดหาวิธีทำภารกิจให้มีประสิทธิภาพ"
1013603-15 = "อีกนัยหนึ่งก็คือ ฉันกำลังหาทางลดงานลงน่ะ"
1013603-16 = "[s] \"เอมิก็ไม่ชอบงานเหรอ?\""
1013603-17 = "นอกจากพวกคนที่เสพติดความสำเร็จแล้ว คงไม่มีใครชอบทำงาน..."
1013603-18 = "[s] \"ครูเห็นด้วยเลย...\""
1013603-23 = "[ns] \"ฮัดชิ้ว!!!\""
1013603-24 = "หนาวเหรอ?"
1013603-25 = "ไม่ได้หนาวขนาดนั้นสักหน่อยนี่นา? หืม... ก็อาจจะหนาวนิดหน่อยนะ"
1013603-26 = "ก็ที่นี่เป็นเขตขั้วโลกนี่นา"
1013603-27 = "ฮุฮุ ถ้างั้น..."
1013603-32 = "(จู่ๆ เอมิก็เข้ามาใกล้และคล้องแขนกับคุณครู...!)"
1013603-33 = "[ns] \"อะ... เอมิ?!\""
1013603-36 = "อุ่นขึ้นบ้างมั้ย คุณครู?"
1013603-37 = "อืม ค่อยยังชั่วหน่อย"
1013603-38 = "ฉันน่ะ... คิดว่าอุ่นกำลังดีเลยนะ"
1013603-39 = "ทำแบบนี้มีประสิทธิภาพรึเปล่าน่ะเหรอ?"
1013603-40 = "จะคิดแบบนั้นก็ได้..."
1013603-41 = "......"
1013603-42 = "แต่ตอนนี้ฉันชอบทำแบบนี้มากกว่า"
1013603-43 = "[s] \"หืม...?\""
1013603-44 = "อะไรกัน ทำไมทำสีหน้าแบบนั้นล่ะคุณครู ไม่ชอบฉันเหรอ?"
1013603-45 = "ฮุฮุ ล้อเล่นน่ะ ตอนนี้ฉันเข้าใจแล้วละว่าทำไมคุณครูถึงทำแบบนั้น"
1013603-46 = "อื้อ"
1013603-47 = "เรื่องนี้ก็เหมือนกัน ถ้าเป็นตัวฉันในอดีตคงไม่มีวันพูดแบบนี้หรอก"
1013603-48 = "แต่การเอาตัวแนบเข้าด้วยกันแล้วแบ่งปันความอบอุ่นกันแบบนี้..."
1013603-49 = "เรื่องนี้อาจเกี่ยวข้องกับเรื่องภาวะสมดุลความร้อนรูปแบบหนึ่งก็ได้"
1013603-50 = "ฉันสัมผัสได้ถึงควมอบอุ่นของร่างกายคุณครูเลย"
1013603-51 = "คุณครูก็สัมผัสได้ถึงความอบอุ่นของร่างกายฉันใช่มั้ยล่ะ?"
1013603-52 = "ถ้ามองอีกมุมหนึ่ง ฉันคิดว่ามันก็เหมือนกับ 'การเปลี่ยนแปลง' ที่พวกเราต่างมอบให้แก่กันและกันนั่นละ"
1013603-53 = "เพราะท้ายที่สุดแล้วมนุษย์ก็เปลี่ยนแปลงไปจากการเฝ้ามองกันและกัน"
1013603-54 = "[s] \"เอมิ... เปลี่ยนไปเพราะครูเหรอ?\""
1013603-59 = "จะว่ายังไงดีล่ะ..."
1013603-60 = "อื้อ ก็อาจจะเป็นอย่างนั้น"
1013603-61 = "ถ้าฉันไม่ได้เจอกับคุณครูละก็ ตอนนี้ฉัน..."
1013603-62 = "ก็อาจจะเป็นเหมือนอย่างที่เคยเป็นก็ได้"
1013603-63 = "เป็นคนที่ไม่แม้แต่จะคิดถึงการแบ่งปันความอบอุ่นให้กับคนรอบข้างที่กำลังหนาวสั่นเลยก็ได้"
1013603-64 = "แต่ว่าตอนนี้..."
1013603-65 = "......"
1013603-66 = "ฮุฮุ ฉันจะไม่พูดต่อแล้ว"
1013603-67 = " ......"
1013603-68 = "เพราะมันดูไม่ค่อยมีประสิทธิภาพเท่าไรน่ะ"
