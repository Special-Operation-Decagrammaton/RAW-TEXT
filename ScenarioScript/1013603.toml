[translation]
1013603-1 = "Thermal Equilibrium"
1013603-4 = "I may have exaggerated a little with this \"night patrol.\" I don't expect it to be very eventful."
1013603-5 = "Why do I think so? Hm..."
1013603-6 = "Intuition?"
1013603-7 = "[s] \"I didn't think you'd trust things like 'intuition.'\""
1013603-8 = "Hm, is that so? In its own way, intuition can be very efficient."
1013603-9 = "Generalizing from my double-digit years of life experience..."
1013603-10 = "And the vast genetic data of humanity as a species spanning over 100,000 years... That's the data pool that intuition draws from."
1013603-11 = "It's not some vague, gut feeling. It's a heuristic algorithm."
1013603-12 = "People tend to avoid people or places that \"feel\" shady, as an understandable safety measure."
1013603-13 = "Along the same vein, I like to rely on my instincts when it makes sense to."
1013603-14 = "Of course, having an efficient plan in place before any mission is still a given."
1013603-15 = "But there's nothing wrong with carefully reducing my workload where I can."
1013603-16 = "[s] \"Do you hate working too, Eimi?\""
1013603-17 = "Who doesn't? Well, there are those overachieving workaholics out there in the world."
1013603-18 = "[s] \"That's really true...\""
1013603-23 = "[ns] \"Achoo!!\""
1013603-24 = "Are you cold?"
1013603-25 = "Just a little chill? Hm. I see."
1013603-26 = "In the end, we are still in the polar region."
1013603-27 = "Fufu. In that case."
1013603-32 = "Eimi snuggled up close to me, sharing her warmth as she linked her arm through mine."
1013603-33 = "[ns] \"E-Eimi?!\""
1013603-36 = "Are you warmer now, Sensei?"
1013603-37 = "Good. I'm glad."
1013603-38 = "Me? It's perfect for me. Not too hot, not too cold."
1013603-39 = "Hm? Is this efficient too?"
1013603-40 = "You could say that..."
1013603-41 = "..."
1013603-42 = "But it's pretty nice too."
1013603-43 = "[s] \"...Huh?\""
1013603-44 = "\"Huh\"? What's with that expression, Sensei? Do you not like me?"
1013603-45 = "Fufu. I'm joking. I understand why you act the way you do a little more now, Sensei."
1013603-46 = "Yes."
1013603-47 = "The old me would have never said, or even thought, that."
1013603-48 = "But when we press our bodies together like this, sharing what heat we have..."
1013603-49 = "I suppose this is a kind of thermal equilibrium as well."
1013603-50 = "I can feel that your body is lukewarm, Sensei."
1013603-51 = "And you can feel that my body is warm."
1013603-52 = "From a certain perspective, this is the change that people bring about in each other."
1013603-53 = "People have a tendency to learn from each other and to change because of that."
1013603-54 = "[s] \"Do you think...you've changed because of me, Eimi?\""
1013603-59 = "I wonder..."
1013603-60 = "Yes. I'd say so."
1013603-61 = "If I had never met Sensei from Schale..."
1013603-62 = "I may have been stuck in place forever."
1013603-63 = "I would've stayed the person who'd never even think to warm someone up with my body heat like this."
1013603-64 = "But now..."
1013603-65 = "..."
1013603-66 = "Fufu. I'll keep that thought to myself."
1013603-67 = " ..."
1013603-68 = "It seems a little inefficient, after all."
