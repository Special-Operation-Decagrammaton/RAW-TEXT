1013603-22 = "#bgshake\n#wait;1500"
1013603-23 = "[ns] \"에취!!!\""
1013603-24 = "3;에이미 결전;02;추워?\n#3;em;[?]"
1013603-25 = "3;에이미 결전;12;추운 것까지는 아닌데, 조금 그렇다고? 응……. 그럴 수 있겠네."
1013603-26 = "3;에이미 결전;02;여기는 기본적으로 극지니까."
1013603-27 = "3;에이미 결전;13;후후. 그러면.\n#3;em;[반짝]"
