1013603-1 = "#title;열평형"
1013603-2 = "3;에이미 결전;13\n#3;a\n#wait;1000"
1013603-3 = "3;에이미 결전;13\n#3;greeting\n#wait;1000"
1013603-4 = "3;에이미 결전;13;야간 정찰이니 색적이니 거창하게 이야기하기는 했지만, 이번에는 별거 없을 거야."
1013603-5 = "3;에이미 결전;02;왜 그렇게 생각하냐고? 으음……."
1013603-6 = "3;에이미 결전;03;일종의, 직감?\n#3;em;[전구]"
1013603-7 = "[s] \"에이미가 직감이라니, 신기하네.\""
1013603-8 = "3;에이미 결전;01;그렇지 않아, 선생님. 직감이란 건 때로 효율적인 감각이야."
1013603-9 = "3;에이미 결전;00;그건 지금까지 두 자릿수 정도 살아온 인생 경험과."
1013603-10 = "3;에이미 결전;02;그 이전, 10만 년 넘게 인류가 인간종으로서 쌓아 온, 유전자의 빅데이터로부터 추출한, 일종의 정보적 결론이야."
1013603-11 = "3;에이미 결전;01;절대로 그냥 드는 게 아닌, 휴리스틱 알고리즘이지.\n#3;em;[반짝]"
1013603-12 = "3;에이미 결전;02;무언가 '싸하다'는 느낌이 들면 그게 사람이든 장소든 일단 피하고 보는 게 좋은 것처럼."
1013603-13 = "3;에이미 결전;00;그런 의미에서…… 나는 어느 정도 본능적으로 움직이는 걸 선호하는 것일지도?"
1013603-14 = "3;에이미 결전;01;물론 현장에 들어가기 전에는 어떻게 하면 효율적일 수 있을지."
1013603-15 = "3;에이미 결전;02;다시 말해 일거리를 줄일 수 있을지 신중하게 생각하지만."
1013603-16 = "[s] \"에이미도 일하기 싫어?\""
1013603-17 = "3;에이미 결전;04;그걸 좋아하는 사람은 성취중독자 정도가 아니면 드물걸…….\n#3;em;[한숨]"
1013603-18 = "[s] \"정말로 그렇지…….\""
1013603-19 = "#st;[0,0];instant;1;"
