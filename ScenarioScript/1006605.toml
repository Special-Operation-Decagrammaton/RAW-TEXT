[translation]
1006605-1 = "พร้อมออกโจมตีแล้วค่ะ!"
1006605-2 = "(คุณครูรีบไปที่ที่อาริสึบอก)"
1006605-3 = "(เมื่อไปถึงก็กดกริ่งอย่างระมัดระวัง...)"
1006605-7 = "คุณครูหรือเปล่าคะ?"
1006605-8 = "[s] \"อื้ม ครูได้ข้อความจากอาริสึก็เลยมาที่นี่\""
1006605-9 = "อ๊ะ! คุณครู! แต่ว่าตอนนี้มัน...!"
1006605-10 = "ว้าย! ไม่ได้นะคะ ยังเข้ามาตอนนี้ไม่ได้ค่ะ"
1006605-11 = "[s] \"ครูอ่านข้อความก็รีบบึ่งมาเลย เกิดเรื่องอะไรขึ้นหรือเปล่า?\""
1006605-12 = "ไม่ใช่อย่างนั้นค่ะ! แต่มันก็..."
1006605-13 = "อ่า... คุณครูมาถึงเร็วจัง อาริสึก็ดีใจอยู่หรอกนะคะ แต่ว่ามันก็... ลำบากใจอยู่นิดหน่อย"
1006605-19 = "[ns] \"อาริสึ สบายดีหรือเปล่า?!\""
1006605-21 = "(คุณครูรีบเข้าห้องไปเพราะเป็นห่วงอาริสึ) "
1006605-22 = "(และตอนนั้นเอง...)"
1006605-25 = "― คะ... คุณครู!?[wa:660] "
1006605-27 = "― อาริสึยังเตรียมตัวอยู่เลย...[wa:1360] "
1006605-30 = "― อาริสึคิดว่าจะให้คุณครูได้เห็นอาริสึที่ก้าวข้ามชุดเมด[wa:2340] "
1006605-32 = "― แล้วเปลี่ยนคลาสมาได้แล้วน่ะค่ะ...[wa:740] "
1006605-35 = "― คุณครูช่วยรออีกนิด จนกว่าอาริสึ[wa:1000] "
1006605-37 = "― จะเตรียมตัวเสร็จได้มั้ยคะ[wa:780] "
1006605-40 = "[ns] \"ตอนนี้อาริสึไม่กลัวเมดแล้วสินะ\""
1006605-41 = "― ใช่แล้วค่ะ! ตอนนี้อาริสึไม่กลัวเมดแล้วค่ะ![wa:1700] "
1006605-43 = "― ทั้งหมดนี้เป็นเพราะคุณครูอยู่ข้างๆ กันไงคะ[wa:1680] "
1006605-46 = "― ถ้าอยู่กับคุณครู...[wa:680] "
1006605-48 = "― ไม่ว่าจะดันเจี้ยนแบบไหนอาริสึก็ฝ่าฟันได้ค่ะ![wa:1740] "
1006605-51 = "― ค่ะ! อาริสึพร้อมออกผจญภัยแล้วค่ะ![wa:2680] "
1006605-54 = "(สุดท้ายคุณครูก็รอให้อาริสึแต่งตัวเสร็จ)"
1006605-59 = "เสร็จแล้วค่ะคุณครู! เป็นยังไงบ้างคะ?"
1006605-60 = "[s] \"เหมาะกับอาริสึดีนะ\""
1006605-61 = "ดีใจจังเลยค่ะที่คุณครูพูดแบบนี้"
1006605-62 = "คุณครูเองก็คิดว่าอาริสึก้าวข้ามชุดเมดได้แล้วใช่มั้ยคะ?"
1006605-63 = "[s] \"อื้ม แน่นอนสิ!\" "
1006605-64 = "ปาปัม ปาปัม! ได้รับการรับรองจากคุณครูแล้วค่ะ! จากนี้ไป อาริสึก็พัฒนาได้อีกขั้นแล้วค่ะ!"
1006605-65 = "[s] \"อีกขั้นงั้นเหรอ... หมายถึงขั้นไหน?\""
1006605-66 = "การได้เป็นสุดยอดผู้กล้าเมดไงคะ!"
1006605-67 = "คนที่เป็นที่สุดของทั้งเมดและผู้กล้า อาริสึจะเป็นคนนั้นที่ทั้งปราบศัตรูและช่วยกู้โลกค่ะ!"
1006605-68 = "[s] \"ก็... อาริสึว่าดี ครูก็ว่าดี...\""
1006605-69 = "คุณครูก็เห็นด้วยสินะคะ! ตอนนี้อาริสึไร้เทียมทานเลยละค่ะ!"
1006605-73 = "เอาละค่ะ ได้เวลาออกโจมตีแล้ว! ไปลงฟีลด์ด้วยกันเลยค่ะ!"
1006605-74 = "มุ่งสู่โลกกว้าง เพื่อเก็บ EXP!"
1006605-75 = "โลกของเมด... กำลังรอให้พวกเราไปผจญภัยอยู่ค่ะคุณครู!"
1006605-77 = "(คุณครูจับมืออาริสึแล้วเดินช้าๆ ไปยังชาเล่ต์ด้วยกัน)"
