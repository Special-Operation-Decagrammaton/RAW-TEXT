[translation]
90002120-1 = "第12話;消失之人"
90002120-5 = "到底發生了什麼事……？"
90002120-6 = "那些孩子和馬爾庫特……不是同伴嗎？#n剛才也還在以姐妹相稱、互相幫助的說。"
90002120-11 = "是啊，確實很奇怪呢。這會是一開始就計畫好的嗎……？#n不過以他們三個的反應來看，實在很難這麼認為。"
90002120-16 = "看起來像是某種儀式，不過意義不得而知……#n究竟打算做什麼呢……？"
90002120-17 = "以驚人的速度聚集到馬爾庫特身上的能量已經穩定下來了。#n而且……就連鋼鐵大陸也是。"
90002120-18 = "Kei，你知道接下來會發生什麼事嗎？"
90002120-23 = "……我怎麼知道。狂信本來就是無法理解的東西。#n比起那個……"
90002120-25 = "請不要從我們身邊奪走姐姐大人！！！"
90002120-26 = "如果一定要有人死的話，就讓我代替姐姐大人去死吧！！！！！"
90002120-30 = "（究竟為什麼要說那種話……？）"
90002120-35 = "老師！！"
90002120-36 = "……！？#n老師！危險！"
90002120-41 = "[ns] 「嗚哇！？」"
90002120-43 = "（被Kei、愛麗絲和莉央推倒，跌向了某處）"
90002120-44 = "老師！你沒事吧！？"
90002120-45 = "[s]「怎麼回事！？」"
90002120-46 = "注意腳下！又要冒出來了！"
90002120-53 = "[ns]「牆壁……！」"
90002120-54 = "唔……！"
90002120-55 = "莉央！"
90002120-60 = "抱，抱歉……一瞬間失去平衡了。"
90002120-68 = "牆壁正毫無規律地出現，並分割著空間……暫時停止搖晃了呢。"
90002120-69 = "……不禁讓我想起了那個時候啊，莉央。"
90002120-74 = "那個時候？"
90002120-75 = "Kei，那個時候指的是……？"
90002120-76 = "就是「埃里都」的時候啊。#n當時你也是像這樣啟動隔板……隔離了C&C的各位不是嗎？"
90002120-77 = "啊……！"
90002120-78 = "嗯……不知為何，愛麗絲也還保留著當時的記憶。"
90002120-79 = "就像看著很久以前的夢一樣……有種朦朧不清的感覺。"
90002120-80 = "想想這也是當然的吧。#n因為那時的愛麗絲和Kei……是一體的。"
90002120-81 = "……"
90002120-82 = "……"
90002120-83 = "Kei，如果我──"
90002120-84 = "如果你在想「都是因為我才變成這樣」或者「要是我能做得更好」之類的事，#n請你現在立刻停止。"
90002120-85 = "K，Kei？"
90002120-86 = "Kei！？"
90002120-87 = "某些事情就是會發生。雖然沒人知道原因，但就是會這樣。#n有時只能被迫接受這樣的事實。"
90002120-88 = "回頭糾結往事的對錯沒有意義，尤其還是與自己無關的事情。"
90002120-89 = "沒錯！重要的不是那些！"
90002120-90 = "唔嗯……？"
90002120-91 = "現在我想知道的是，該怎麼才能脫離這個狀況平安回去！"
90002120-92 = "聽懂了嗎？我要回去！無論發生什麼事都要回去！"
90002120-93 = "一定要想盡辦法活下來，哪怕遇到再荒謬的事也要掙扎到最後！"
90002120-94 = "……！"
90002120-95 = "是的，Kei！Kei說的沒錯！"
90002120-96 = "[s]「嗯。我也贊成。」"
90002120-101 = "[ns1]「無論發生什麼事情……」\n[ns2]「Kei都應該要活著回去。」"
90002120-104 = "……老師，你好像沒有確實理解我說的話呢。"
90002120-109 = "我所謂的回去，指的是在這裡的所有人哦？#n況且，只有我一個人回去又能做什麼啊？"
90002120-113 = "[ns]「……說的也是。」"
90002120-114 = "用那種欣慰的表情看我是什麼意思……"
90002120-116 = "[ns]「那麼，趕快行動吧。」"
90002120-117 = "話雖如此，現在該去哪裡呢？"
90002120-118 = "無論哪裡都比縮在原地不動好吧？#n先到附近走走，盡可能收集情報吧。"
90002120-119 = "要是途中能遇到陽葵和英美……還有季就更好了。"
90002120-120 = "是！因為愛麗絲是勇者，所以會站在最前面！"
90002120-121 = "嗯，愛麗絲。真可靠呢。"
90002120-127 = "……嗯？等等。#n那是……什麼？"
90002120-128 = "咦……？"
90002120-130 = "（朝著莉央指向的方向看去）"
90002120-131 = "（從牆壁另一側的遠處映入眼簾的……）"
90002120-135 = "（是曾經被稱為馬爾庫特的「某物」的身影……）"
90002120-137 = "下一話;孩子們"
