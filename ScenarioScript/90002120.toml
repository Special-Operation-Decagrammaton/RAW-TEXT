[translation]
90002120-1 = "ตอนที่ 12;ผู้ที่หายไป"
90002120-5 = "เกิดอะไรขึ้นน่ะ?"
90002120-6 = "เด็กพวกนั้นกับมัลคูธ... ไม่ได้อยู่ฝ่ายเดียวกันหรอกเหรอ? เมื่อกี้ยังเรียกว่าพี่และก็ยังช่วยเหลือกันอยู่#nเลยนี่นา"
90002120-11 = "นั่นสิคะ เรื่องนี้ฉัน... ไม่รู้เลยค่ะ หรือว่าวางแผนไว้แบบนี้ตั้งแต่แรกแล้ว? แต่ต่อให้เป็นอย่างนั้น ท่าทีของเด็กๆ ทั้งสามก็แปลกอยู่ดีนะคะ"
90002120-16 = "ฉันว่ามันดูเหมือนพิธีกรรมบางอย่าง... แต่ก็ไม่เข้าใจความหมายของมันเลยนะคะ คิดจะทำอะไรกันแน่น่ะ...?"
90002120-17 = "พลังงานที่เคยไหลบ่าเข้าสู่มัลคูธด้วยความเร็วสูง ตอนนี้เข้าสู่สภาวะเสถียรแล้ว#nแล้วก็... ดินแดนเหล็กกล้าเองก็ด้วย แต่ว่า..."
90002120-18 = "เคย์ พอจะรู้หรือเปล่าว่าจะเกิดอะไรขึ้น?"
90002120-23 = "จะไปรู้ได้ยังไงล่ะคะ... ความงมงายเป็นสิ่งที่เข้าใจไม่ได้มาแต่ไหนแต่ไรอยู่แล้วค่ะ แต่ที่สำคัญกว่านั้น..."
90002120-25 = "อย่าพรากพี่มัลคูธไปจากเราเลยนะคะ!!!"
90002120-26 = "ถ้าต้องมีใครตายละก็ ฉันจะขอตายแทนพี่มัลคูธเอง!!!!!"
90002120-30 = "(ทำไมถึงได้พูดแบบนั้นออกมานะ...?)"
90002120-35 = "คุณครู?!"
90002120-36 = "คุณครู! อันตรายค่ะ!"
90002120-41 = "[ns] \"เหวอ?!\""
90002120-43 = "(เคย์ อาริสึ และริโอะเข้ามาผลักคุณครูให้พ้นจากอันตราย)"
90002120-44 = "คุณครู! เป็นยังไงบ้างคะ?!"
90002120-45 = "[s] \"เกิดอะไรขึ้นน่ะ?!\""
90002120-46 = "ระวังพื้นด้วยค่ะ! มันผุดขึ้นมาอีกแล้วค่ะ!"
90002120-53 = "[ns] \"กำแพง...!\""
90002120-54 = "อึก...!?"
90002120-55 = "ริโอะ!"
90002120-60 = "ขะ... ขอโทษนะ... ฉันเสียหลักไปชั่วขณะน่ะ"
90002120-68 = "เมื่อกี้กำแพงผุดขึ้นมาอย่างสะเปะสะปะแล้วแบ่งพื้นที่ออกเป็นส่วนๆ ค่ะ โชคดีที่... ตอนนี้หยุดสั่นไปแล้วนะคะ"
90002120-69 = "นึกถึงตอนนั้นเลยนะคะ... ริโอะ"
90002120-74 = "ตอนนั้น?"
90002120-75 = "ตอนนั้นงั้นเหรอคะ เคย์?"
90002120-76 = "ฉันหมายถึงตอนที่คุณสร้าง 'เอริดู' ขึ้นมาน่ะค่ะ คุณเปิดใช้งานแผงกั้นแบบนี้... แล้วกัก C&C ไว้นี่คะ?"
90002120-77 = "อ๊ะ...!"
90002120-78 = "ค่ะ... อาริสึก็ยังจำเรื่องนั้นได้เหมือนกันค่ะ"
90002120-79 = "ถึงตอนนี้ความทรงจำนั้นจะพร่ามัวและไม่ชัดเจน เหมือนมองไปยังความฝันที่อยู่ไกลออกไปก็เถอะค่ะ"
90002120-80 = "มาคิดดูอีกที นั่นก็เป็นสิ่งที่แน่นอนอยู่แล้วนะคะ เพราะในตอนนั้นอาริสึกับเคย์... เป็นหนึ่งเดียวกันนี่คะ"
90002120-81 = "..."
90002120-82 = "..."
90002120-83 = "ขอถามเผื่อๆ นะ เคย์ ถ้าเกิดฉัน..."
90002120-84 = "ถ้ากำลังคิดว่าเรื่องราวต่างๆ เป็นแบบนี้เพราะตัวเอง หรือถ้าตัวเองเก่งกว่านี้อีกหน่อยก็คงจะดีกว่านี้ละก็ พับความคิดนั้นไปเลยค่ะ"
90002120-85 = "คะ... เคย์?"
90002120-86 = "เคย์?!"
90002120-87 = "บางเรื่องก็เกิดขึ้นเองโดยธรรมชาติค่ะ ถึงจะไม่มีใครรู้เหตุผล แต่ก็เป็นอย่างนั้นละค่ะ บางครั้งเราก็ต้องยอมรับว่าเรื่องแบบนั้นมันเกิดขึ้นได้"
90002120-88 = "ไม่มีประโยชน์ที่จะโต้เถียงหาความถูกผิดในเรื่องที่เกิดขึ้นไปแล้วหรอกค่ะ โดยเฉพาะในกรณีที่ตัวเอง#nไม่มีส่วนเกี่ยวข้องด้วย นั่นไม่ใช่เรื่องสำคัญที่ควรทำหรอกค่ะ"
90002120-89 = "ค่ะ! สิ่งสำคัญน่ะไม่ใช่เรื่องนั้นค่ะ! สิ่งที่สำคัญน่ะ!"
90002120-90 = "หะ... หืม?"
90002120-91 = "สิ่งที่ฉันอยากรู้ก็คือ! เราต้องทำยังไงถึงจะออกจากสถานการณ์นี้ได้ และต้องทำยังไงถึงจะกลับไป#nอย่างปลอดภัยได้ต่างหากค่ะ!"
90002120-92 = "เข้าใจมั้ยคะ? ฉันจะกลับไปค่ะ! ไม่ว่าจะเกิดอะไรขึ้น ฉันก็จะกลับไปค่ะ!"
90002120-93 = "ฉันจะมีชีวิตรอดกลับไปให้ได้ และไม่ว่าสถานการณ์จะเลวร้ายแค่ไหน ฉันก็จะต่อสู้จนถึงที่สุด!"
90002120-94 = "...!"
90002120-95 = "ใช่แล้วค่ะ เคย์! เราจะทำอย่างที่เคย์ว่าเลยค่ะ!"
90002120-96 = "[s] \"อื้อ ครูก็เห็นด้วยกับอาริสึนะ\""
90002120-101 = "[ns1] \"และไม่ว่าจะเกิดอะไรขึ้น เคย์ก็ต้องได้กลับไป\"\n[ns2] \"และต่อให้จะเกิดอะไรขึ้นก็ตาม ยังไงเคย์ก็ต้องได้กลับไป\""
90002120-104 = "สงสัยจะยังไม่เข้าใจที่ฉันพูดอย่างถ่องแท้นะคะ คุณครู..."
90002120-109 = "ที่บอกว่ากลับไป ฉันหมายถึงพวกเราทั้งหมดทุกคนที่นี่ต่างหากค่ะ ถ้าให้ฉันกลับไปคนเดียว มันจะไปมีความหมายอะไรล่ะคะ?"
90002120-113 = "[ns] \"ก็จริงนะ...\""
90002120-114 = "อึก... ทำไมถึงมองด้วยสีหน้าปลาบปลื้มใจแบบนั้นล่ะคะ...?"
90002120-116 = "[ns] \"งั้นเราก็รีบเคลื่อนไหวกันเถอะ\""
90002120-117 = "แต่ว่า... จะไปที่ไหนล่ะ?"
90002120-118 = "ไม่ว่าจะไปที่ไหน ก็น่าจะดีกว่ามานั่งคุ้ดคู้อยู่แบบนี้อยู่แล้วค่ะ เราออกไปเดินสำรวจรอบๆ แล้วหาข้อมูลกันเถอะค่ะ"
90002120-119 = "แล้วระหว่างนั้นถ้าได้เจอฮิมาริ เอมิ... หรือโทคิ ก็จะยิ่งดีเลยค่ะ"
90002120-120 = "ค่ะ! อาริสึเป็นผู้กล้า อาริสึจะนำให้เองค่ะ!"
90002120-121 = "ค่ะ อาริสึ น่าอุ่นใจจังเลยนะคะ"
90002120-127 = "เดี๋ยวนะ...? ทางโน้นมัน... อะไรกันน่ะ?"
90002120-128 = "คะ...?"
90002120-130 = "(คุณครูหันไปมองตามที่ริโอะชี้)"
90002120-131 = "(ไกลออกไปจากกำแพง)"
90002120-135 = "(คือรูปร่างของ 'บางอย่าง' ที่ครั้งหนึ่งเคยถูกเรียกว่ามัลคูธ...)"
90002120-137 = "ตอนต่อไป;เด็กๆ"
