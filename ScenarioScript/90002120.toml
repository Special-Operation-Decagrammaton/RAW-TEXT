[translation]
90002120-1 = "Episode 12;The Vanished"
90002120-5 = "What just happened?"
90002120-6 = "I thought Malkuth was their Elder Sister... Weren't they supposed to be on the same side?"
90002120-11 = "Affirmative. I find their behavior unusual. It is possible it was a ruse. However, the children's reactions do not align with that hypothesis."
90002120-16 = "What's at least certain is that it appears to be some sort of a ritual. But I can't make out what the goal is. Just what are they trying to do...?"
90002120-17 = "The energy that was rapidly converging on Malkuth...and the Steel Continent as well. They've stabilized."
90002120-18 = "Kei. Do you have any insight?"
90002120-23 = "...As if. I can't pretend to understand the mind of a zealot.#nWhat I'm more concerned about..."
90002120-25 = "Please! We'll do anything! We'll really do anything, so please don't take Elder Sister away from us!"
90002120-26 = "TAKE ME!! IF THERE MUST BE A SACRIFICE, THEN I WILL BE IT!!! I'LL DIE IN ELDER SISTER'S STEAD!!!"
90002120-30 = "(What...did she mean by that?)"
90002120-35 = "Sensei?!"
90002120-36 = "...?! Sensei! Watch out!"
90002120-41 = "[ns] \"Huh?!\""
90002120-43 = "I fell as Kei, Aris, and Rio shoved me out of the way."
90002120-44 = "Sensei! Are you okay?!"
90002120-45 = "[s] \"What happened?!\""
90002120-46 = "Watch your feet! Another wave is coming!"
90002120-53 = "[ns] \"The walls...!\""
90002120-54 = "Ugh...?!"
90002120-55 = "Rio!"
90002120-60 = "S-Sorry... I slipped."
90002120-68 = "They're creating the walls to separate us!#nGeez, at least the shaking stopped."
90002120-69 = "...This reminds me of back then."
90002120-74 = "When?"
90002120-75 = "I am curious too, Kei!"
90002120-76 = "Back in Eridu. When you sealed off the C&C students from each other, remember?"
90002120-77 = "Ah...!"
90002120-78 = "I am...able to remember that well."
90002120-79 = "But not like a regular memory. It is as if I am watching my own dream, from someplace just out of reach."
90002120-80 = "Because that is when Kei and I were one."
90002120-81 = "..."
90002120-82 = "..."
90002120-83 = "Kei, about then..."
90002120-84 = "Let me guess. \"I'm sorry. This is all my fault,\" or, \"If only I were a little better.\" Save me the dramatics."
90002120-85 = "K-Kei?!"
90002120-86 = "Kei?!"
90002120-87 = "Life is a tangled knot of inexplicable twists and turns. There exist things in this world that are out of your control. Even for you, Rio."
90002120-88 = "Sitting here and pontificating on who is to blame for what regarding things long passed sounds like a colossal waste of time. It doesn't matter right now."
90002120-89 = "In fact, there are much more pressing matters to address!"
90002120-90 = "H-Hm?"
90002120-91 = "What I'm concerned with is how we're going to get through this! And how we're going to get home safely!"
90002120-92 = "That's what matters to me! Because, do or die, I am going to make it back!"
90002120-93 = "I don't care if I have to confront god, or fate, or transforming robots! I'll cling onto this life until the bitter end!"
90002120-94 = "...!"
90002120-95 = "Hear, hear, Kei! I feel the same way!"
90002120-96 = "[s] \"Hear, hear!\""
90002120-101 = "[ns1] \"No matter what...\"\n[ns2] \"I want Kei to make it home.\""
90002120-104 = "...You misunderstood me entirely, Sensei."
90002120-109 = "Did you think I only meant myself? There's no \"making it back\" if it's not with everyone we came with."
90002120-113 = "[ns] \"...Well said.\""
90002120-114 = "Ugh... Please wipe that grin off your face..."
90002120-116 = "[ns] \"All right, team. Let's get moving.\""
90002120-117 = "But what direction?"
90002120-118 = "Anywhere is better than staying put here. We'll begin with gathering as much data as we can."
90002120-119 = "We can search for Himari and Eimi...and Toki too."
90002120-120 = "Yes! I will take point, since I am the party's hero!"
90002120-121 = "Reliable as always, Aris."
90002120-127 = "...? Hold on. What...is that?"
90002120-128 = "What...?"
90002120-130 = "I turned my head in the direction Rio was pointing."
90002120-131 = "Then I saw it, out beyond the wall."
90002120-135 = "The existence we had once known as Malkuth had warped into...something else."
90002120-137 = "Next Episode;Children"
