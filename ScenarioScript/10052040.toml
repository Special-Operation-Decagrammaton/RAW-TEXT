[translation]
10052040-1 = "Uniform"
10052040-2 = "唔……"
10052040-3 = "[s] 「你還好嗎？」"
10052040-4 = "比我預想中還暈。#n特別是頭的左側……"
10052040-5 = "[s] 「頭的左側？」"
10052040-6 = "是的。應該是把薇娜的核心帶到運輸船上啟動造成的……"
10052040-7 = "……"
10052040-8 = "沒事的。只要這個身體習慣能量的流動就好了。"
10052040-9 = "[s] 「真的沒事吧……？」"
10052040-10 = "就跟你說沒事了。現在情況也正在逐漸好轉。#n不過每當帶回並啟動預言者的核心，恐怕都會出現相同的問題吧……"
10052040-11 = "這或許就是這個身體被視為「[ruby=帶有缺陷]DEFECTED[/ruby]」的原因也說不定……"
10052040-12 = "總之，每當像這樣啟動核心，我們就能重新設計運輸船的輸出和功能。"
10052040-13 = "並且那股能量的流動，現在正與這個身體互相連接……#n只說結論的話，就是我可以控制它的意思。"
10052040-14 = "[s] 「雖然不是很懂，但希望Kei醬不要太勉強自己。」"
10052040-15 = "就跟你說不是Kei醬了，真是的。"
10052040-24 = "愛麗絲……？這是什麼……？"
10052040-25 = "是制服，Kei！"
10052040-26 = "這，這點我也看得出來，但是為什麼要……"
10052040-27 = "因為這是愛麗絲睜開眼睛見到大家時，最先穿上的衣服！"
10052040-28 = "愛麗絲……真的覺得很開心，所以想跟Kei一起分享。"
10052040-32 = "難道……你不喜歡嗎……？"
10052040-33 = "不，不是的！怎麼會有那種事呢！#n我反而，反而……"
10052040-37 = "耶嘿嘿……"
10052040-38 = "那是當然的。#n穿上我們千年的制服才是最合理的選擇。"
10052040-39 = "……非要多補上一句，實在很像你的作風呢，莉央。"
10052040-41 = "[ns] 「說到學生的戰鬥服，果然還得是制服啊！」"
10052040-42 = "老師你又在說什麼啊……"
10052040-43 = "咦？如果打敗學習這個敵人的戰場是教室，那麼戰鬥服就是制服……？"
10052040-44 = "……"
10052040-45 = "這次就當作老師說的對吧……"
10052040-46 = "那，那我就……"
10052040-47 = "……"
10052040-48 = "來！請穿上吧，Kei！#n愛麗絲好想看呢！"
10052040-49 = "……！"
10052040-55 = "怎，怎麼樣……？"
10052040-56 = "哇啊！"
10052040-57 = "[ns] 「哦哦……」"
10052040-58 = "什，什麼啦！有意見就說清楚啊！這是在嘲笑我嗎！？"
10052040-59 = "才沒有呢……真的很適合你哦，Kei醬。"
10052040-60 = "就是說啊，果然跟我想的一樣呢。#n呵呵，現在真的很可愛。"
10052040-61 = "……！！！"
10052040-62 = "謝，謝謝你。柚子……還有綠。"
10052040-66 = "你還好嗎，Kei？會不會熱？"
10052040-67 = "怎麼可能……"
10052040-68 = "請放心，Kei。非常適合你。"
10052040-69 = "要說有多適合的話，我甚至在一瞬間感覺可愛蒼白系完美美少女的位置受到了威脅。"
10052040-70 = "……那種位置我才不在乎。"
10052040-71 = "不過完美可愛美少女女僕的位置依舊穩固，#n因此我還是能以不屈不撓的心繼續活下去。"
10052040-72 = "就跟你說我不在乎嘛……"
10052040-82 = "那個，大家……"
10052040-83 = "謝，謝謝你們……"
10052040-84 = "嗯～？你說什麼～？我剛才沒聽清楚耶～？"
10052040-85 = "唔……！"
10052040-89 = "謝，謝謝你們啦！這樣滿意了嗎！？"
10052040-90 = "啊哈哈哈！很好很好！就是這樣！#n說謝謝的時候，本來就應該確實表達出來嘛！"
10052040-91 = "[ns] 「沒錯沒錯！」"
10052040-92 = "唔……！明明是最正確的話，卻偏偏要從最討厭的兩個人口中說出來……！"
10052040-93 = "總，總之！"
10052040-94 = "這件制服……我會盡量只在需要的時候才穿。"
10052040-95 = "這是為什麼呢，Kei？"
10052040-96 = "那是，因為……"
10052040-97 = "……"
10052040-98 = "因為不想弄壞大家用心準備的衣服……可以這麼說吧。"
10052040-99 = "原來如此。#n謝謝你，Kei醬。"
10052040-100 = "不，不會……該說謝謝的是我才對……"
10052040-101 = "原來是這樣呀！#n真拿你沒辦法！畢竟Kei正值容易害羞的年紀嘛！"
10052040-102 = "你給我安靜，桃井！！！"
