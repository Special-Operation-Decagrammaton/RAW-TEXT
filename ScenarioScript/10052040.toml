[translation]
10052040-1 = "Uniform"
10052040-2 = "อึก..."
10052040-3 = "[s] \"โอเคหรือเปล่า?\""
10052040-4 = "เวียนหัวมากกว่าที่คิดอีกนะคะ แล้วก็ปวดหัวข้างซ้ายด้วย..."
10052040-5 = "[s] \"ปวดหัวข้างซ้ายเหรอ?\""
10052040-6 = "ใช่ค่ะ น่าจะเพราะเราเอาคอร์ของบีนาห์มาไว้ในยานขนส่งแล้วเปิดใช้งานมันน่ะค่ะ..."
10052040-7 = "..."
10052040-8 = "ไม่ต้องกังวลหรอกค่ะ แค่ฉันปรับตัวให้คุ้นเคยกับกระแสพลังงานในร่างกายนี้ก็สิ้นเรื่องค่ะ"
10052040-9 = "[s] \"ไม่เป็นไรจริงๆ ใช่มั้ย...?\""
10052040-10 = "จริงค่ะ ตอนนี้ฉันก็ดีขึ้นเรื่อยๆ แล้ว และยังไงเราก็ต้องเอาคอร์ของผู้เลื่อมใสตนอื่นๆ มาใช้อีก เดี๋ยวฉันก็คงชิน... "
10052040-11 = "ดูเหมือนว่าสาเหตุจะมาจากร่างกายนี้ถูกประเมินว่า [ruby=บกพร่อง]'ไม่เหมาะสม'[/ruby] ค่ะ..."
10052040-12 = "แต่ก็เอาเถอะค่ะ เอาเป็นว่าทุกครั้งที่เราเปิดใช้งานคอร์ในลักษณะนี้ เราก็จะปรับการจ่ายพลังงาน และฟังก์ชันของยานขนส่งใหม่ได้ค่ะ"
10052040-13 = "และในเมื่อกระแสของพลังงานนั้นเชื่อมอยู่กับร่างนี้ของฉัน... ก็สรุปง่ายๆ ได้เลยว่าฉันจะมีอำนาจ#nควบคุมมันค่ะ"
10052040-14 = "[s] \"ถึงครูจะไม่ได้เข้าใจเรื่องทั้งหมด แต่ก็หวังว่าเคย์จังจะไม่หักโหมเกินไปนะ\""
10052040-15 = "ก็บอกว่าไม่ได้ชื่อเคย์จังยังไงล่ะคะ จริงๆ เลย"
10052040-24 = "อาริสึ...? นี่มันอะไรกันคะ...?"
10052040-25 = "ชุดนักเรียนไงคะ เคย์!"
10052040-26 = "ฉะ... ฉันไม่ได้หมายความแบบนั้นค่ะ ฉันดูเองก็รู้ว่ามันคืออะไร แค่สงสัยว่าทำไมถึง..."
10052040-27 = "นี่คือชุดแรกที่อาริสึได้ใส่หลังจากลืมตาขึ้นมาเจอทุกคนค่ะ!"
10052040-28 = "อาริสึ... ชอบชุดนี้มาก ก็เลยอยากแบ่งปันเรื่องดีๆ นี้กับเคย์ด้วยค่ะ"
10052040-32 = "อ่า... หรือว่าไม่ถูกใจคะ...?"
10052040-33 = "ปะ... เปล่านะคะ! จะเป็นแบบนั้นไปได้ยังไงคะ! อันที่จริงฉัน..."
10052040-37 = "แหะๆ..."
10052040-38 = "ใครๆ ก็ชอบทั้งนั้นนั่นละ ชุดนักเรียนมิลเลเนียมของเราเป็นตัวเลือกที่สมเหตุสมผลที่สุดแล้ว"
10052040-39 = "การชอบแสดงความคิดเห็นเพิ่มเติมนี่เป็นนิสัยของคุณจริงๆ เลยนะคะ ริโอะ..."
10052040-41 = "[ns] \"แล้วชุดนักเรียนก็เป็นชุดต่อสู้ของนักเรียนด้วย!\""
10052040-42 = "พูดอะไรอย่างนั้นคะ คุณครู..."
10052040-43 = "ว่ายังไงนะคะ? ถ้าสนามรบคือห้องเรียนที่เราต้องต่อสู้กับศัตรูที่เรียกว่าการเรียนหนังสือ ถ้างั้นชุดต่อสู้ก็คือชุดนักเรียนนี่แหละ?"
10052040-44 = "..."
10052040-45 = "ครั้งนี้ฉันจะยอมรับแล้วกันค่ะว่าคุณครูพูดถูก..."
10052040-46 = "ถะ... ถ้างั้นฉัน..."
10052040-47 = "..."
10052040-48 = "ค่ะ! ไปใส่มาได้เลยค่ะ เคย์! อาริสึอยากเห็นแล้วค่ะ!"
10052040-49 = "...!"
10052040-55 = "ปะ... เป็นยังไงบ้างคะ...?"
10052040-56 = "ว้าว!"
10052040-57 = "[ns] \"โอ้...\""
10052040-58 = "ทำไมถึงมีแต่คำอุทานล่ะคะ! ช่วยพูดให้ชัดๆ ไม่ได้เหรอคะ! หรือว่าแกล้งกันอยู่คะ?!"
10052040-59 = "ไม่มีใครแกล้งหรอก... ชุดนี้เข้ากับเคย์จังมากๆ เลยนะ"
10052040-60 = "ใช่แล้วละ เป็นไปอย่างที่คิดเลย ฮุฮุ พอใส่ชุดนี้แล้วน่ารักสุดๆ ไปเลยละ"
10052040-61 = "...!!!"
10052040-62 = "ขะ... ขอบคุณค่ะ ยูสึ... มิโดริก็ด้วยค่ะ"
10052040-66 = "เป็นยังไงบ้าง เคย์? อยู่ในชุดนั้นแล้วไม่ร้อนเหรอ?"
10052040-67 = "ใครจะไปร้อนกันล่ะคะ..."
10052040-68 = "วางใจได้เลยค่ะ เคย์ดูดีในชุดนี้มากเลยค่ะ"
10052040-69 = "ถ้าถามว่าดูดีแค่ไหนละก็ ต้องบอกว่านั่นทำเอาฉันกลัวว่าจะมีใครมาแย่งตำแหน่งสาวน้อยสุดคิวท์#nที่บอบบางแต่เพอร์เฟกต์ไปเลยละค่ะ"
10052040-70 = "แต่ฉันไม่ได้จะแย่งตำแหน่งแบบนั้นนะคะ..."
10052040-71 = "แต่ยังไงตำแหน่งเมดสาวสุดคิวท์แสนเพอร์เฟกต์ก็ยังไม่สั่นคลอน ถ้างั้นฉันก็น่าจะยังใช้ชีวิตต่อด้วย#nตำแหน่งนั้นได้ค่ะ"
10052040-72 = "จะตำแหน่งไหนก็ใช้ไปเถอะค่ะ..."
10052040-82 = "อืม ทุกคนคะ..."
10052040-83 = "ขอบคุณ... นะคะ..."
10052040-84 = "หืม~? ว่าอะไรน้า~? ได้ยินไม่ค่อยชัดเลย~?"
10052040-85 = "อึก...!"
10052040-89 = "ขะ... ขอบคุณค่ะ! ได้ยินหรือยังคะ?!"
10052040-90 = "อะฮะฮะฮ่า! ได้ยินแล้วๆ! ต้องอย่างนี้ละ! จะขอบคุณคนอื่นน่ะต้องพูดให้เสียงดังฟังชัดแบบนี้แหละ!"
10052040-91 = "[ns] \"ถูกต้องเลย!\""
10052040-92 = "อึก...! ทำไมต้องเป็นสองคนนี้ที่พูดในสิ่งที่ถูกต้องที่สุดด้วยนะ...!"
10052040-93 = "อะ... เอาเถอะค่ะ!"
10052040-94 = "ชุดนักเรียนนี้น่ะ... ฉันจะใส่เฉพาะตอนที่จำเป็นจริงๆ และจะรักษาไว้อย่างดีเลยค่ะ"
10052040-95 = "ทำไมล่ะคะ เคย์?"
10052040-96 = "คือว่า ฉัน..."
10052040-97 = "..."
10052040-98 = "ไม่อยากให้ชุดที่มาจากน้ำใจของทุกคนต้องเปรอะเปื้อน... หรือเสียหายน่ะค่ะ"
10052040-99 = "อย่างนั้นสินะ ขอบใจนะ เคย์จัง"
10052040-100 = "มะ... ไม่เลยค่ะ... เป็นฉันมากกว่าค่ะที่ต้องพูดคำนั้น..."
10052040-101 = "งั้นเหรอ! เห็นทีต้องฟังอีกรอบแล้วละ! แต่เคย์ก็อยู่ในวัยที่ขี้อายด้วยสินะ!"
10052040-102 = "เงียบไปเลยค่ะ โมโมอิ!!!"
