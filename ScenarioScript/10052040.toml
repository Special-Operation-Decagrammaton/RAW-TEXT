[translation]
10052040-1 = "Uniform"
10052040-2 = "Ugh..."
10052040-3 = "[s] \"Are you okay?\""
10052040-4 = "I feel a little nauseous. Especially on the left side of my head..."
10052040-5 = "[s] \"Why?\""
10052040-6 = "It's because we brought Binah's core on board and activated it..."
10052040-7 = "..."
10052040-8 = "I'll be fine. I just have to get used to the energy flow... Imagine hearing a persistent whine that follows you around. It's something you need to adapt to."
10052040-9 = "[s] \"...You're really going to be okay, right...?\""
10052040-10 = "I really will be. I'm getting better every second. That said...this will happen every time we activate a prophet's core."
10052040-11 = "I may be reacting this way because this body was deemed \"defective\"... Or was it \"defected\"?"
10052040-12 = "The important thing is this. Activating a core allows us to reconfigure the ship's output and features."
10052040-13 = "And, since the flow of that energy is clearly and currently connected to this body...I should be able to control it."
10052040-14 = "[s] \"I don't really understand, but I'm worried dear Kei-Kei is pushing herself too hard.\""
10052040-15 = "I'm not \"Kei-Kei.\" Seriously. I already have enough of a headache."
10052040-24 = "Aris...? What is this...?"
10052040-25 = "It is a school uniform, Kei!"
10052040-26 = "N-No, I get that, but why...are you showing it to me?"
10052040-27 = "Because this is what I was wearing when I met everyone for the first time!"
10052040-28 = "I...really liked how that felt. Everything seemed so possible and optimistic. So I wanted to share that feeling with Kei. This is yours!"
10052040-32 = "Uh... Do you not like it...?"
10052040-33 = "N-No! Not at all, Aris! In fact, in fact..."
10052040-37 = "Heehee..."
10052040-38 = "It's only natural. Our Millennium school uniform was the only rational choice. "
10052040-39 = "...How very \"Rio\" to pipe in with such practical commentary."
10052040-41 = "[ns] \"A student's school uniform is their combat armor!\""
10052040-42 = "And what are you babbling about, Sensei...?"
10052040-43 = "What? You think class is a \"battlefield\" where you conquer bosses called \"exams\"?"
10052040-44 = "..."
10052040-45 = "I'll just let you have that one. As long as you stop explaining."
10052040-46 = "I-In that case, I'll..."
10052040-47 = "..."
10052040-48 = "Yes! Please don it, Kei! I want to see!"
10052040-49 = "...!"
10052040-55 = "H-How does it look?"
10052040-56 = "Wow!"
10052040-57 = "[ns] \"Ah...\""
10052040-58 = "H-How is it?! I asked a direct question! Tell me! Are you all making fun of me right now?!"
10052040-59 = "That's not it... It looks really good on you, Kei. It suits you."
10052040-60 = "Yeah. I knew it. Heehee. You look really cute!"
10052040-61 = "...!!!"
10052040-62 = "Th-Thank you. Yuzu... Midori, you too."
10052040-66 = "Are you well, Kei? Are you hot under all those layers? Your face is flushed."
10052040-67 = "No, I'm fine. I don't run as hot as you, Eimi."
10052040-68 = "Don't worry, Kei. You look good. "
10052040-69 = "TOO good. I almost feel threatened. After all, I need to retain the position as the preeminent cute, pale, perfect beauty."
10052040-70 = "...I have no desire to take that from you."
10052040-71 = "What a relief. My heart remains unbroken upon confirming that I am still the platonically perfect, cute maid of unparalleled beauty."
10052040-72 = "Yes. That's all yours, Toki."
10052040-82 = "Um, everyone..."
10052040-83 = "So... Thank you very much..."
10052040-84 = "Hm? What was that? We can't hear you!"
10052040-85 = "Ugh...!"
10052040-89 = "TH-THANK YOU VERY MUCH! DID THAT MAKE IT THROUGH YOUR HELMET? ARE YOU SATISFIED?!"
10052040-90 = "Ahahaha! Yes, of course! That came in loud and clear!"
10052040-91 = "[ns] \"Yeah, yeah!\""
10052040-92 = "Tch...! Having to hear this from the two most annoying people in Kivotos..."
10052040-93 = "A-Anyway!"
10052040-94 = "I will wear this uniform only when...necessary. For special situations."
10052040-95 = "But why, Kei?"
10052040-96 = "Well, it's..."
10052040-97 = "..."
10052040-98 = "You all clearly put so much thought and...emotion into this gift. I would like to cherish and preserve it for as long as possible."
10052040-99 = "I see. Thank you, Kei."
10052040-100 = "N-No... If anything, I should be the one thanking you all..."
10052040-101 = "I guess that's true, too! Well, there you have it! Kei can't help but be a little shy!"
10052040-102 = "Shut it, Momoi!!"
