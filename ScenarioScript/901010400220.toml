901010400220-6 = "3;니코 아르바이트;02;저기—\n#3;em;…\n#3;a"
901010400220-7 = "1;용역 알바 인부;00;앗, 아까의 배달부 학생이잖아?\n#1;ar\n#3;m5"
901010400220-8 = "1;용역 알바 인부;00;혹시 잃어버린 톱밥 포대를 찾은 거야?\n#1;em;[?]"
901010400220-9 = "3;니코 아르바이트;03;네, 저쪽에 안 쓰는 자재를 모아둔 공터에 버려져 있었어요."
901010400220-10 = "3;니코 아르바이트;01;누군가 쓰레기 봉투로 착각하고 한 데 모아둔 모양이에요."
901010400220-11 = "#st;[0,0];instant;1;"
901010400220-12 = "#clearST"
901010400220-13 = "3;니코 아르바이트;01\n1;용역 알바 인부;00\n#1;em;[!]\n#1;h\n#3;h\n#wait;800"
901010400220-14 = "1;용역 알바 인부;00;정말? 다행이다…… 정말 고마워!\n#1;stiff"
901010400220-15 = "1;용역 알바 인부;00;이 많은 수의 게를 모두 버려야 하나 걱정하고 있던 참이었는데…… 덕분에 살았어!\n#1;em;[재잘]\n#1;hophop"
901010400220-16 = "3;니코 아르바이트;03;아녜요. 도움이 되었다니 저도 기쁘네요."
901010400220-17 = "3;니코 아르바이트;02;그런데 어째서 게를 톱밥 속에 넣어서 운송하는 건가요? \n#3;em;[?]"
901010400220-18 = "1;용역 알바 인부;00;그건 게가 충격에 취약하기 때문이야."
901010400220-19 = "1;용역 알바 인부;00;게는 이렇게 딱딱한 껍질을 갖고 있으면서도 조금만 흔들리거나 충격을 받아도 죽어버리기 십상이거든.\n#1;m3\n#3;dr"
901010400220-20 = "1;용역 알바 인부;00;그래서 게를 운송할 때는 이렇게 하역장에서 구하기 쉬운 톱밥을 잔뜩 깔아서 충격을 완화하고 있어.\n#1;em;[반응]"
901010400220-21 = "1;용역 알바 인부;00;게다가 톱밥은 수분을 머금는 성질도 갖고 있으니, 수생생물인 게를 운송하기에는 더욱 적격이야."
901010400220-22 = "#all;hide"
901010400220-23 = "3;니코 아르바이트;02;그렇군요……! 흥미로운 이야기네요.\n#3;em;[반짝]"
901010400220-24 = "3;니코 아르바이트;00;참. 그나저나, 혹시 게를 드럼통에 담아서 운송한다는 이야기를 들어 보신 적은 없으신가요?"
901010400220-25 = "1;용역 알바 인부;00;드럼통에 담긴 게라고……? 처음 듣는 이야기인데.\n#1;em;[?]\n#1;ar\n#3;m5"
901010400220-26 = "3;니코 아르바이트;02;게를 드럼통에 담으면 안 되는 이유라도 있나요?"
901010400220-27 = "1;용역 알바 인부;00;아니, 안 될 건 없지만…… 드럼통은 게에 비하면 지나치게 무거우니까.\n#1;em;…"
901010400220-28 = "1;용역 알바 인부;00;무게가 늘어나면 운송비가 갑절로 들텐데, 굳이 저렴한 나무 상자를 두고 드럼통을 쓸 이유는 없잖아?"
901010400220-29 = "1;용역 알바 인부;00;게다가 드럼통에 게를 꽉꽉 채워 넣으면 공기가 잘 통하지 않아서, 바닥쪽에 있는 게는 폐사하고 말 걸……\n#1;stiff"
901010400220-30 = "3;니코 아르바이트;99;확실히…… 그 말씀을 들으니 <드럼통 속의 게>는 '게의 생리를 잘 모르는 사람'이나 믿을법한 이야기네요."
901010400220-31 = "1;용역 알바 인부;00;요즘은 그런 시시한 이야기도 화제가 되는 건가? 정말이지…… 다들 할 일도 없나보네.\n#1;em;[한숨]"
901010400220-32 = "3;니코 아르바이트;00;후후, 사람마다 관심사는 저마다 다른 법이니까요."
901010400220-33 = "3;니코 아르바이트;02;아차, 그러고 보니 깜빡할 뻔 했네요."
901010400220-34 = "#st;[0,0];instant;1;"
901010400220-35 = "#clearST"
901010400220-36 = "1;용역 알바 인부;00\n3;니코 아르바이트;01\n#3;m4\n#1;h\n#3;h\n#wait;1200"
901010400220-37 = "3;니코 아르바이트;03;재미있는 이야기를 들려주신 것에 대한 답례…… 라고 하긴 그렇지만, 저희 <FOX EATS>에서 큰 인기를 끌고 있는 <요시노 유부>의 유부 도시락을 선물로 드리겠습니다!\n#3;em;[반짝]\n#3;greeting"
901010400220-38 = "1;용역 알바 인부;00;아, 아냐! 톱밥 포대를 찾아 준 답례도 못했는데, 도시락까지 받을 수는 없는 걸……\n#1;em;[땀]\n#1;stiff"
901010400220-39 = "3;니코 아르바이트;00;괜찮아요. 어차피 프로모션 중이었는걸요."
901010400220-40 = "3;니코 아르바이트;03;혹시라도 답례가 신경이 쓰이신다면…… 나중에 SNS에 긍정적인 리뷰 하나만 부탁드리겠습니다!"
901010400220-41 = "1;용역 알바 인부;00;그야 물론이지. 정말 고마워. 잘 먹을게!\n#1;em;[재잘]\n#1;hophop"
901010400220-42 = "3;니코 아르바이트;00;네, 좋은 하루 되세요!"
901010400220-43 = "#all;hide"
