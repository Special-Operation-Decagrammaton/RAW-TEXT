[translation]
901010400220-6 = "あの――"
901010400220-7 = "あっ、おがくず袋があったの？"
901010400220-8 = "結構早かったけど。"
901010400220-9 = "はい、空き地に捨てられていました。"
901010400220-10 = "ゴミ袋だと思われちゃったのかもしれませんね。"
901010400220-14 = "ほんと？よかった……ありがとう！"
901010400220-15 = "最悪カニが全部廃棄処分になるところだったよ……おかげで助かった！"
901010400220-16 = "いえ、こちらこそお役に立てて嬉しいです。"
901010400220-17 = "ところで、どうしてカニをおがくずの中に入れるんですか？"
901010400220-18 = "カニは衝撃に弱いからね。"
901010400220-19 = "殻が硬くても、ちょっとした衝撃で死んでしまうことがあるんだ。"
901010400220-20 = "だからカニを輸送する時は、おがくずをたくさん敷いて、衝撃を和らげてあげるんだ。"
901010400220-21 = "それにおがくずは水を吸うからね。#nカニの鮮度を保つのにもちょうどいいってわけ。"
901010400220-23 = "なるほど……！"
901010400220-24 = "ところで、ドラム缶にカニを入れて輸送する、という話は聞いたことがありますか？"
901010400220-25 = "ドラム缶にカニを……？初めて聞いたな。"
901010400220-26 = "ドラム缶だとダメなんでしょうか？"
901010400220-27 = "いや、ダメなことはないけど……ドラム缶は重たいからね。"
901010400220-28 = "重量が増えると輸送費も高くなるから、わざわざ使う理由はないような気がするよ。"
901010400220-29 = "それに、木箱みたいに空気の通り道があるわけじゃないから、たくさん詰めたら下の方のカニは死んじゃうんじゃないかな？"
901010400220-30 = "たしかに……そうなると「ドラム缶ガニ」は「カニのことをよく知らない人」が信じるようなお話なんですね。"
901010400220-31 = "ドラム缶ガニ？なんだその話。……みんな暇なんだな。"
901010400220-32 = "ふふっ、まあ、人それぞれですから。"
901010400220-33 = "そうだ、忘れるところでした。"
901010400220-37 = "面白い話を聞かせてくださったお礼に……と言うほどでもありませんが、#n「FOX EATS」で大人気の「吉野いなり」のいなり弁当を差し上げます。"
901010400220-38 = "そんな！おがくず袋を探してくれたお礼もまだなのに……お弁当をもらうわけには。"
901010400220-39 = "お気遣いなく。プロモーション中ですので。"
901010400220-40 = "お礼のことが気になるようでしたら……SNSで口コミしてくれると嬉しいです！"
901010400220-41 = "ああ、もちろん。ありがとう。いただくね！"
901010400220-42 = "はい、よい一日を！"
