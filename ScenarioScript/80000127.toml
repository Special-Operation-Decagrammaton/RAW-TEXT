[translation]
80000127-1 = "Girl and Snack"
80000127-4 = "光～順利抵達夏萊～"
80000127-5 = "[s] 「嗯？今天是光當值日生嗎？」"
80000127-6 = "值日生～？不是哦～？"
80000127-7 = "今天～是向喜歡的人送點心的日子～"
80000127-8 = "所以就想到老師了～"
80000127-9 = "[s] 「多麼貼心的孩子……」"
80000127-14 = "來～這個～"
80000127-15 = "超～新品～烈焰組合C型巧克力球～"
80000127-16 = "厲害吧～光之前就一直想要～能買到真幸運～"
80000127-17 = "乘著這股氣勢，光今天搞不好完全無敵哦～？"
80000127-18 = "總之老師快吃吧～來～"
80000127-22 = "[ns1] 「光真厲害……！謝謝你！」\n[ns2] 收下光給的巧克力球"
80000127-31 = "[ns] 「……」"
80000127-33 = "[ns3] 「這個自己一個人吃太可惜了。」\n[ns4] 「要是能跟某個人一起吃就好了呢？」"
80000127-37 = "[ns] 「光，可以幫老師一個忙嗎？」"
80000127-38 = "嗯～？"
80000127-43 = "嗯～！！"
80000127-45 = "（和光一起分享了新上市的巧克力）"
80000127-46 = "（在表情因為超級酸而扭曲的時候，光非常開心地笑了……）"
