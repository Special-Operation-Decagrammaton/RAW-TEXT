[translation]
80000127-1 = "เด็กหญิงกับขนม"
80000127-4 = "ฮิคาริ- จอดเทียบท่าที่ชาเล่ต์สำเร็จ-"
80000127-5 = "[s] \"หืม? วันนี้เป็นเวรตัวแทนของฮิคาริเหรอ?\""
80000127-6 = "เวรตัวแทน-? เปล่าสักหน่อย-?"
80000127-7 = "วันนี้น่ะ- เป็นวันที่จะมอบขนมให้กับคนที่ชอบนะ-"
80000127-8 = "เพราะงั้นเลยนึกถึงคุณครู-"
80000127-9 = "[s] \"ครูปลื้มใจจนน้ำตาจะไหลเลย...\""
80000127-14 = "เอ้า- นี่-"
80000127-15 = "\"ช็อกโกบอล- สูตรลับ- แฟลมมิ่ง คอมโพซิชั่น ไทป์ ซี- แบบใหม่ล่าสุด-!\""
80000127-16 = "สุดยอดเลยใช่มั้ย- อยากรู้อยู่พอดีเลยว่าเป็นยังไง โชคดีที่หามาได้-"
80000127-17 = "ถ้าเป็นแบบนี้ ฮิคาริอาจจะไร้เทียมทานเลยก็ได้นะ-?"
80000127-18 = "ยังไงก็เถอะ กินเลยสิคุณครู- ของขวัญน่ะ-"
80000127-22 = "[ns1] \"สุดยอดเลยฮิคาริ...! ขอบใจนะ!\"\n[ns2] (รับช็อกโกบอลจากฮิคาริ)"
80000127-31 = "[ns] \"......\""
80000127-33 = "[ns3] \"ให้ครูกินคนเดียวมันก็น่าเสียดายนะ\"\n[ns4] \"ถ้ามีคนกินด้วยกันก็คงดี\""
80000127-37 = "[ns] \"ฮิคาริช่วยครูหน่อยได้มั้ย?\""
80000127-38 = "หะ... หืม-?"
80000127-43 = "อื้อ-!!"
80000127-45 = "(คุณครูแบ่งช็อกโกแลตให้ฮิคาริ)"
80000127-46 = "(พอคุณครูทำหน้ามุ่ยเพราะรสเปรี้ยว ฮิคาริก็ชอบใจเป็นอย่างมาก...)"
