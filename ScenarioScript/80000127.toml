[translation]
80000127-1 = "Girl and Snack"
80000127-4 = "光～抵達夏萊完畢～"
80000127-5 = "[s] 「嗯？今天是光值班嗎？」"
80000127-6 = "值班～？不是喔～？"
80000127-7 = "今天是～給喜歡的人送點心的日子喔～"
80000127-8 = "所以就想到老師了～"
80000127-9 = "[s] 「真是難得這麼貼心……」"
80000127-14 = "來～這個～"
80000127-15 = "超～新品～烈焰組合C型巧克力球～"
80000127-16 = "超厲害的吧～超好奇的結果幸運地買到了～"
80000127-17 = "照這個氣勢的話，光今天搞不好完全無敵～？"
80000127-18 = "總之，老師吃吧～禮物～"
80000127-22 = "[ns1] 「好厲害，光……！謝謝你！」\n[ns2] （收下了光給的巧克力球）"
80000127-31 = "[ns] 「……」"
80000127-33 = "[ns3] 「這個一個人吃的話太可惜了。」\n[ns4] 「能跟誰一起吃的話就太好了呢？」"
80000127-37 = "[ns] 「光可以幫老師一個忙嗎？」"
80000127-38 = "嗯～？"
80000127-43 = "嗯～！！"
80000127-45 = "（和光一起分享了新品巧克力）"
80000127-46 = "（因為超級酸而表情扭曲的時候，光非常開心地笑了……）"
