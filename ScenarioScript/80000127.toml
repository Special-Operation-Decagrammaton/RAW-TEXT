[translation]
80000127-1 = "A Girl and a Snack"
80000127-4 = "Hikari made a stop at Schale."
80000127-5 = "[s] \"Hm? Do you have Student Rep duty today?\""
80000127-6 = "Student Rep? ...No?"
80000127-7 = "Today is...the day when you give snacks to someone you like..."
80000127-8 = "So I thought of you. Sensei..."
80000127-9 = "[s] \"How nice of you...\""
80000127-14 = "Here...you go..."
80000127-15 = "Super new... Flaming composition type-C chocolate truffles..."
80000127-16 = "No jokes... I was sooo curious, and I was lucky to get some..."
80000127-17 = "At this rate...maybe Hikari is invincible?"
80000127-18 = "Anyway, here you go, Sensei. ...A gift."
80000127-22 = "[ns1] \"That's so cool, Hikari...! Thank you!\"\n[ns2] (Kindly accept Hikari's chocolate truffles.)"
80000127-31 = "[ns] \"...\""
80000127-33 = "[ns3] \"It'd be a shame to eat this all by myself.\"\n[ns4] \"I wish I could share it with someone!\""
80000127-37 = "[ns] \"Would you mind giving me a hand, Hikari?\""
80000127-38 = "H-Hm?"
80000127-43 = "Sure!!"
80000127-45 = "I shared the brand-new chocolates with Hikari."
80000127-46 = "She was quite amused when she saw my face pucker from the surprisingly sour taste."
