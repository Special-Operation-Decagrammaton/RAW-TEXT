[translation]
10052105-2 = "ทีมเก็บข้อมูลคอร์มาถึงแล้ว"
10052105-3 = "ส่วนหัวหน้าน่ะ บอกว่า 'เลือกคนมาไม่ตรงกับงาน' ก็เลยกลับไปที่ยานขนส่งก่อนแล้วละ"
10052105-4 = "[s] \"เย็นสบายขึ้นแล้วหรือยัง เอมิ?\""
10052105-5 = "ก็นิดหน่อยน่ะ... แต่แค่นี้ยังไม่พอหรอก ต้องเป็นธารน้ำแข็งของจริงสิ ถึงจะเย็นสะใจน่ะ"
10052105-6 = "สภาพแวดล้อมที่ถูกสร้างขึ้นน่ะ เอาชนะสภาพแวดล้อมจากธรรมชาติไม่ได้หรอก..."
10052105-12 = "แต่ในความคิดของฉัน คุณดูไม่เป็นธรรมชาติกว่าคนอื่นอีกนะคะ..."
