[translation]
10052130-1 = "#title;예소드. 기초 위에 올라선 힘의 정화자"
10052130-2 = "#wait;200"
10052130-3 = "3;에이미 결전;99\n#3;greeting\n#3;a\n#wait;1200"
10052130-4 = "3;에이미 결전;01;위치 확보."
10052130-5 = "1;토키 결전;00;네, 에이미. 위치 확보. 이제부터 저 위로 올라가야 하는 것이군요.\n#1;em;[반응]\n#1;ar\n#3;m5"
10052130-6 = "1;토키 결전;99;……."
10052130-7 = "1;토키 결전;02;그런데 저걸 뭐라고 해야 할까요?"
10052130-8 = "3;에이미 결전;15;글쎄? 성벽?\n#3;em;[?]"
10052130-9 = "1;토키 결전;01;네. 그게 가장 직관적인 표현인 것 같습니다."
10052130-10 = "3;에이미 결전;01;예소드였지, 이 예언자."
10052130-11 = "#all;hide"
10052130-12 = "#wait;500"
10052130-13 = "#na;토키 결전;도착하자마자 성대하게 환영식을 받았죠."
10052130-14 = "#na;에이미 결전;응. 어떻게든 한번 물러나게 했지만……."
10052130-15 = "1;토키 결전;99\n5;에이미 결전;99\n#5;h\n#1;h"
10052130-16 = "#wait;500"
10052130-17 = "5;에이미 결전;12;……말 그대로, 성벽의 수호자라는 느낌이었지."
10052130-18 = "1;토키 결전;01;그 패스path와 이명은 완전히 달랐지만 말이죠."
10052130-19 = "5;에이미 결전;15;그거, 뭐였더라?\n#5;em;[?]"
10052130-20 = "1;토키 결전;02;패스path는 <완성을 향해 나아가는 진리>."
10052130-21 = "1;토키 결전;99;그리고 이명은 <기초 위에 올라선 힘의 정화자>."
10052130-22 = "5;에이미 결전;04;……그런 거 다 외우고 다녀?\n#5;em;[땀]"
10052130-23 = "1;토키 결전;03;특별히 할 일도 없지 않습니까.\n#1;em;[반짝]"
10052130-24 = "5;에이미 결전;00;뭐……?"
10052130-25 = "1;토키 결전;99;죄송합니다. 실언이었군요. 사실 다들 할 일이 너무 많아서 쓰러질 지경이지요.\n#1;greeting"
10052130-26 = "5;에이미 결전;04;토키, 또 반사적으로 농담 같은 대답 했구나? 그러다 눈치 없다고 미움받을지도 몰라?\n#5;em;[한숨]"
10052130-27 = "1;토키 결전;02;그렇군요. 주의하겠습니다, 에이미. 그리고 반사적으로 농담한 것은 맞습니다."
10052130-28 = "1;토키 결전;99;……무서우니까요."
10052130-29 = "5;에이미 결전;15;……토키도, 무섭다고 생각해?\n#5;em;[?]"
10052130-30 = "1;토키 결전;01;에이미는요?"
10052130-31 = "#st;[0,0];instant;1;"
10052130-32 = "#clearST"
10052130-33 = "1;토키 결전;00\n5;에이미 결전;12\n#5;em;…\n#1;h\n#5;h\n#wait;2500"
10052130-34 = "5;에이미 결전;11;나도 무서워."
10052130-35 = "5;에이미 결전;99;남들은 나를.\n#5;m3\n#1;dl"
10052130-36 = "5;에이미 결전;12;우리를."
10052130-37 = "5;에이미 결전;11;어딘가 태연하고 엉뚱한 학생처럼 생각할지도 모르지만……."
10052130-38 = "5;에이미 결전;99;느낄 건 다 느끼지.\n#5;em;[속상함]"
10052130-39 = "5;에이미 결전;11;귀찮은 건 싫고, 게으름도 부리고 싶고."
10052130-40 = "#5;hide\n3;토키 결전;02;그렇습니다. 저도 가능하면 선생님과 같이 감자칩을 먹으며, 인터넷 방송이라도 보고 싶습니다.\n#3;em;[반응]"
10052130-41 = "3;에이미 결전;10;인터넷 방송이라니, 그건 또 뭐야?\n#3;em;[땀]"
10052130-42 = "1;토키 결전;02;저, 취미 찾는 중이잖습니까?\n#1;ar\n#3;m5"
10052130-43 = "1;토키 결전;03;이른바 임시 취미라는 것이죠. 브이.\n#1;em;[반짝]"
10052130-44 = "3;에이미 결전;07;……임시?"
10052130-45 = "1;토키 결전;99;맞습니다. 지금은 인터넷 방송에 조금 흥미가 가는 중입니다만, 어디까지나 임시이기에 금방 또 바뀔 수도 있겠지요."
10052130-46 = "3;에이미 결전;04;임시 취미 같은 거 또 있어?\n#3;em;[?]"
10052130-47 = "1;토키 결전;01;음. 역시 게임일까요. 아리스와 노는 것은 즐겁습니다."
10052130-48 = "1;토키 결전;02;만화도 그럭저럭이더군요. 보다 보니 조금 알았습니다. 재미라는 것은 어느 정도 비합리성과 비효율성을 내포한다는 것을 말이죠."
10052130-49 = "3;에이미 결전;14;만화, 게임……. 왠지 그럴 거 같더라."
10052130-50 = "3;에이미 결전;12;아무튼, 나도 싸우는 걸 좋아하는 건 아니야. 다른 방법으로 해결하는 게 언제나 효율적이잖아?\n#3;em;[반응]"
10052130-51 = "3;에이미 결전;11;그냥, 다 적당히 잘 지냈으면 좋겠는데 말이지."
10052130-52 = "1;토키 결전;01;하지만 이런 상황에서는 잘 안될 것 같네요. 무엇보다 앞서 말씀드렸던 것처럼, 저는 두렵습니다."
10052130-53 = "1;토키 결전;99;만에 하나 무슨 일이 일어나서, 선생님이나 제가 내일을 바랄 수 없게 된다거나, 더…… 말로 하기 힘든 일이 일어난다거나…….\n#1;em;…"
10052130-54 = "1;토키 결전;07;그런 것을 생각하는 것만으로도, 숨이 막힐 것 같습니다."
10052130-55 = "3;에이미 결전;02;나는?"
10052130-56 = "1;토키 결전;02;저나 선생님보다는 조금 아래겠네요."
10052130-57 = "3;에이미 결전;10;……진심?\n#3;em;[땀]"
10052130-58 = "1;토키 결전;03;그럴 리가요. 사람 목숨에 어떻게 위아래가 있다는 겁니까.\n#1;em;[반짝]"
10052130-59 = "3;에이미 결전;04;그래……. 고마워."
10052130-60 = "1;토키 결전;99;저는 가능하다면 누구도 다치지 않았으면 합니다."
10052130-61 = "1;토키 결전;00;지금을 살아가는 누구든, 너무 힘들거나 고통스럽지는 않았으면 합니다."
10052130-62 = "3;에이미 결전;17;그건 좀 많이 어려운 일이지.\n#3;em;[한숨]"
10052130-63 = "3;에이미 결전;12;그래서 다들, 자기가 아는 사람들만이라도 무사하길 바라는 거고. 참 생각해 보면, 겁나는 것투성이란 말이지.\n#3;m3\n#1;dl"
10052130-64 = "3;에이미 결전;11;부장 혼자만으로도 가끔 버거운데, 이젠 회장에다가……."
10052130-65 = "3;에이미 결전;06;……선생님도, 너무, 걱정이야.\n#3;em;[속상함]"
10052130-66 = "3;에이미 결전;15;역시 언제 날 잡아서, 선생님을 밀레니엄 특제 밀실에 가둬 버릴까."
10052130-67 = "3;에이미 결전;01;그게 선생님의 안전을 보장하는, 가장 효율적인 방식일지도 모르는데."
10052130-68 = "3;토키 결전;02;밀레니엄발 키보토스 대전이라도 일으킬 생각인가요, 에이미.\n#3;em;[?]"
10052130-69 = "3;토키 결전;03;좋습니다. 그렇게 되면 저는 떳떳하게 최전선에 서도록 하겠습니다.\n#3;greeting"
10052130-70 = "3;에이미 결전;04;……농담이야.\n#3;em;[땀]"
10052130-71 = "3;토키 결전;02;저도 그렇습니다."
10052130-72 = "3;에이미 결전;06;토키의 농담은 구분이 잘 안된단 말이지……."
10052130-73 = "3;토키 결전;01;그런가요. 하지만 배웠습니다.\n#3;em;[반응]"
10052130-74 = "3;토키 결전;99;상황이 힘들고 위험할수록."
10052130-75 = "3;토키 결전;01;오히려 더 농담을 하고 의미 없는 소리를 하고, 실없는 이야기를 하면서 의미 없이 웃거나 장난을 치거나…….\n#3;m2"
10052130-76 = "3;토키 결전;02;그렇게 하지 않으면, 버티기 어려운 것이라고요."
10052130-77 = "5;에이미 결전;04;그러면 평소에 뜬금없이 뻔뻔한 소리를 하는 것도 그 연장선상이야?\n#5;em;…\n#5;al\n#3;m1"
10052130-78 = "3;토키 결전;03;아뇨. 그건 그냥 떠오르는 대로 이야기하는 건데요."
10052130-79 = "5;에이미 결전;06;……진짜, 토키답네.\n#5;em;[땀]"
