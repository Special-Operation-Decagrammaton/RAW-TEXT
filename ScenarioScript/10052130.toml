10052130-86 = "#all;hide"
10052130-87 = "#wait;500"
10052130-88 = "#na;리오 결전;에이미, 토키. 들려? 이쪽은 준비 완료야. 먼저 돌입하면, 우리가 움직임을 맞출게."
10052130-89 = "#na;히마리 결전 비무장;드디어 마지막이 보이네요. 이런 때가…… 오긴 오는군요."
10052130-90 = "#na;모모이 결전;사실상 이게 마지막 예언자인 거지?"
10052130-91 = "#na;미도리 결전;정확히는 둘이 더 있기는 해. 강철대륙 그 자체라는 네차흐와……."
10052130-92 = "#na;유즈 결전;말쿠트……."
10052130-93 = "#na;유즈 결전;으으으……. 우, 우리가 다시 싸울 수 있을까? 이번에는…… 이길 수 있을까……?"
10052130-94 = "#na;아리스 결전;할 수 있을 겁니다, 유즈! 우리 모두 새로운 무기와 갑옷을 얻은 상태고, 케이도 잔뜩 레벨업을 해 왔으니까요!"
10052130-95 = "#na;케이 프로토;네……. 예전만큼 비관적이지는 않겠죠. 우리도 적 예언자들의 힘을, 제법 많이 활용할 수 있게 된 상태고요."
10052130-96 = "#all;hide"
10052130-97 = "#wait;500"
10052130-98 = "#na;에이미 결전;정말로, 때가 됐다는 느낌이네."
10052130-99 = "#na;토키 결전;네. 그렇군요."
10052130-100 = "#st;[0,0];instant;1;"
10052130-101 = "#clearST"
10052130-102 = "#all;hide"
10052130-103 = "#wait;1200"
10052130-104 = "#na;토키 결전;제가 먼저 움직이도록 하죠. 이번은 제가 선봉이니까요."
10052130-105 = "#na;토키 결전;평소와는 달리, 무장도 옷도 가벼워져서 좋군요."
10052130-106 = "#all;hide"
10052130-107 = "#wait;500"
10052130-108 = "#na;에이미 결전;응. 토키가 시선을 끌고, 그사이에 후속 부대가 강하하는 작전이었으니까."
10052130-109 = "#na;에이미 결전;[ruby=Operation Steel Rain]<강철의 비 작전>[/ruby] 이었던가……."
10052130-110 = "#all;hide"
10052130-111 = "#wait;500"
10052130-112 = "#na;토키 결전;에이미는 반대로 최후방 화력 지원이었죠?"
10052130-113 = "#na;에이미 결전;맞아. 나는 어떤 포지션이든 적응할 수 있으니까. 나를 가장 효율적으로 사용한다면 그것으로 만족해."
10052130-114 = "#zmc;instant;-550,-222;1896\n#na;토키 결전;네. 그러면 잘 부탁합니다. 다치지 마세요. 에이미."
10052130-115 = "#zmc;instant;-550,-222;1896\n#na;토키 결전;무사히, 다시 만나죠."
10052130-116 = "#zmc;instant;400,-222;1896\n#all;hide"
