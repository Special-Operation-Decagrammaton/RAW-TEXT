[translation]
10052130-1 = "เยซ็อด รากฐานแห่งความบริสุทธิ์และอำนาจ"
10052130-4 = "ยึดพื้นที่เรียบร้อย"
10052130-5 = "ค่ะ เอมิ ยึดพื้นที่เรียบร้อย จากนี้ก็ต้องขึ้นไปข้างบนนั้นสินะคะ"
10052130-6 = "..."
10052130-7 = "ว่าแต่ต้องเรียกสิ่งนั้นว่าอะไรเหรอคะ?"
10052130-8 = "นั่นน่ะสิ? กำแพงเหรอ?"
10052130-9 = "ค่ะ นั่นน่าจะเป็นคำเรียกที่เหมาะสมที่สุดค่ะ"
10052130-10 = "เยซ็อดใช่มั้ยนะ ผู้เลื่อมใสของที่นี่?"
10052130-13 = "ต้อนรับเราอย่างยิ่งใหญ่ตั้งแต่ที่มาถึงเลยนะคะ"
10052130-14 = "อื้อ ต่อให้จะยาก แต่ว่าเราก็ทำสำเร็จจนได้..."
10052130-17 = "รู้สึกเหมือนเป็นผู้พิทักษ์กำแพงสมชื่อเลยละ..."
10052130-18 = "ถึงแม้เส้นทางกับชื่อเรียกจะแตกต่างอย่างสิ้นเชิงก็เถอะค่ะ"
10052130-19 = "มันคืออะไรนะ?"
10052130-20 = "เส้นทางของมันคือ <ความจริงที่มุ่งสู่ความสมบูรณ์>"
10052130-21 = "และอีกชื่อก็คือ <รากฐานแห่งความบริสุทธิ์และอำนาจ>"
10052130-22 = "จำอะไรแบบนั้นได้หมดเลยเหรอ...?"
10052130-23 = "ก็เราไม่มีอะไรให้ทำเป็นพิเศษนี่คะ"
10052130-24 = "ว่าไงนะ...?"
10052130-25 = "ขอโทษด้วยค่ะ ฉันพลั้งปากไปค่ะ อันที่จริงทุกคนมีงานให้ทำเยอะจนแทบหมดแรงแล้วเลยมากกว่าค่ะ"
10052130-26 = "โทคิ นี่เธอตอบโต้งๆ เหมือนล้อเล่นอีกแล้วนะ ทำแบบนั้นบ่อยๆ เดี๋ยวโดนคนอื่นหมั่นไส้ไม่รู้ด้วยนะ?"
10052130-27 = "อย่างนั้นสินะคะ ฉันจะระวังค่ะ เอมิ แต่ฉันก็ตอบเชิงแกล้งเล่นไปจริงๆ ค่ะ"
10052130-28 = "ก็ฉันกลัวนี่คะ..."
10052130-29 = "โทคิก็กลัวเหมือนกันเหรอ...?"
10052130-30 = "แล้วเอมิล่ะคะ?"
10052130-34 = "ฉันก็กลัวเหมือนกัน"
10052130-35 = "คนอื่นอาจจะคิดว่าตัวฉัน..."
10052130-36 = "หรือเราสองคน..."
10052130-37 = "เป็นเหมือนนักเรียนที่ดูนิ่งๆ หรือไม่ก็ดูเพี้ยนๆ ไปบ้างก็จริง..."
10052130-38 = "แต่ฉันก็รู้สึกทุกอย่างที่คนอื่นรู้สึกกันนั่นละ"
10052130-39 = "ฉันมีเรื่องที่ไม่อยากทำ แล้วบางครั้งก็อยากจะขี้เกียจด้วย"
10052130-40 = "ใช่ค่ะ ถ้าเป็นไปได้ ฉันก็อยากกินมันฝรั่งทอดกับคุณครูแล้วก็ดูรายการในอินเทอร์เน็ตด้วยกันค่ะ"
10052130-41 = "รายการอินเทอร์เน็ตอะไรอีกล่ะทีนี้?"
10052130-42 = "พอดีฉันกำลังหางานอดิเรกอยู่น่ะค่ะ"
10052130-43 = "ถึงจะเป็นแค่งานอดิเรกชั่วคราวก็เถอะค่ะ ปิ้วๆ"
10052130-44 = "ชั่วคราวเหรอ...?"
10052130-45 = "ใช่ค่ะ ตอนนี้ฉันเริ่มสนใจพวกรายการในอินเทอร์เน็ต แต่มันก็เป็นเพียงแค่ชั่วคราว อีกไม่นานก็อาจจะเปลี่ยนเป็นอย่างอื่นก็ได้ค่ะ"
10052130-46 = "แล้วมีงานอดิเรกชั่วคราวอื่นๆ อีกหรือเปล่า?"
10052130-47 = "อืม น่าจะเป็นเรื่องเกมนะคะ ตอนเล่นเกมกับอาริสึ ฉันก็สนุกค่ะ"
10052130-48 = "บางครั้งฉันก็อ่านหนังสือการ์ตูนเหมือนกันค่ะ พอมาคิดดูแล้ว สิ่งที่เรียกว่าความสนุกก็แฝงไว้ด้วย#nความไร้เหตุผลและความไม่มีประสิทธิภาพนะคะ"
10052130-49 = "หนังสือการ์ตูน เกม... ก็ไม่แปลกหรอกนะ"
10052130-50 = "เอาเถอะ ที่ฉันจะบอกก็คือ ฉันก็ไม่ได้ชอบการต่อสู้นักหรอก การแก้ปัญหาด้วยวิธีอื่นมันมีประสิทธิภาพ#nมากกว่าใช่มั้ยล่ะ?"
10052130-51 = "ฉันแค่หวังว่าทุกคนจะอยู่ด้วยกันได้อย่างราบรื่นน่ะ"
10052130-52 = "แต่ในสถานการณ์นี้มันคงจะเป็นแบบนั้นไม่ได้นะคะ ทั้งนี้ทั้งนั้น มันก็เป็นอย่างที่ฉันเพิ่งบอกไปเมื่อกี้ค่ะ ว่าฉันกลัว"
10052130-53 = "ถ้าเกิดเรื่องอะไรขึ้นมา แล้วคุณครูหรือฉันไม่อาจคาดหวังในวันพรุ่งนี้ได้... หรือหากเกิดเรื่องที่เลวร้ายยิ่งกว่านั้น..."
10052130-54 = "แค่คิดแบบนั้น ฉันก็จุกอกจนหายใจไม่ออกแล้วค่ะ"
10052130-55 = "แล้วฉันล่ะ?"
10052130-56 = "ก็คงอยู่รองลงมาจากฉันและคุณครูค่ะ"
10052130-57 = "พูดจริงใช่มั้ยเนี่ย...?"
10052130-58 = "จะเป็นอย่างนั้นไปได้ยังไงคะ ชีวิตมนุษย์จะมีการจัดลำดับขั้นได้ยังไงกัน"
10052130-59 = "อื้อ... ขอบใจนะ"
10052130-60 = "ถ้าเป็นไปได้ ฉันก็ไม่อยากให้มีใครต้องบาดเจ็บค่ะ"
10052130-61 = "ฉันหวังว่าทุกคนที่ยังมีชีวิตอยู่ตอนนี้จะไม่ต้องเจอความยากลำบากหรือความเจ็บปวดจนเกินไปค่ะ"
10052130-62 = "นั่นเป็นเรื่องยากทีเดียวเลยนะ"
10052130-63 = "เพราะงั้นฉันก็เลยหวังว่าทุกคน รวมถึงคนรู้จักของทุกคนจะปลอดภัย พอคิดดูแล้ว โลกนี้มีแต่เรื่องน่ากลัวเต็มไปหมดเลยนะ"
10052130-64 = "ลำพังหัวหน้าคนเดียว บางครั้งฉันก็สาหัสเอาการแล้ว ทีนี้ยังมีประธานอีก..."
10052130-65 = "แล้วฉันก็เป็นห่วงคุณครูมากๆ ด้วย..."
10052130-66 = "สักวันคงต้องจับคุณครูขังไว้ในห้องปิดพิเศษของมิลเลเนียมแล้วละ"
10052130-67 = "นั่นอาจเป็นวิธีที่มีประสิทธิภาพที่สุดในการรับประกันความปลอดภัยให้คุณครูก็ได้"
10052130-68 = "คิดจะก่อสงครามระหว่างคิโวทอสกับมิลเลเนียมงั้นเหรอคะ เอมิ?"
10052130-69 = "แต่ก็ได้นะคะ ถ้าเกิดสงครามนั้นขึ้นมาจริงๆ ละก็ ฉันจะเสนอตัวไปอยู่แนวหน้าอย่างภาคภูมิใจเลยค่ะ"
10052130-70 = "ฉันล้อเล่นหรอกน่า..."
10052130-71 = "ฉันก็ด้วยค่ะ"
10052130-72 = "ฉันละแยกแยะทีเล่นกับทีจริงของโทคิไม่ออกเลยจริงๆ..."
10052130-73 = "งั้นเหรอคะ? แต่ฉันก็เรียนรู้บางอย่างมานะคะ"
10052130-74 = "ยิ่งสถานการณ์ยากลำบากและอันตรายมากเท่าไร"
10052130-75 = "เรายิ่งต้องพูดเรื่องตลก ไร้สาระ เรื่องเหลวไหล และหัวเราะอย่างไร้เหตุผลออกมา หรือไม่ก็แกล้งกันเล่น..."
10052130-76 = "เพราะไม่อย่างนั้น มันก็จะยากที่เราจะทนต่อสถานการณ์ได้ค่ะ"
10052130-77 = "แล้วที่พูดแบบนั้นโดยไม่เกรงใจกันอยู่ตลอดเวลา ก็เป็นการต่อยอดจากความคิดนั้นด้วยหรือเปล่า?"
10052130-78 = "เปล่าค่ะ อันนั้นฉันแค่พูดตามที่นึกขึ้นได้ค่ะ"
10052130-79 = "สมกับเป็นโทคิจริงๆ เลยนะ..."
10052130-88 = "เอมิ โทคิ ได้ยินหรือเปล่า? ทางนี้เตรียมตัวพร้อมแล้ว เปิดฉากบุกก่อนได้เลย แล้วเราจะเคลื่อนไหวตามไป"
10052130-89 = "ถึงฉากสุดท้ายแล้วสินะคะ ในที่สุดก็... ถึงเวลานี้จริงๆ แล้ว"
10052130-90 = "นี่คือผู้เลื่อมใสตนสุดท้ายแล้วใช่มั้ย?"
10052130-91 = "ถ้าจะพูดให้ถูก ต้องบอกว่าเหลืออีก 2 ตนน่ะ เหลือเน็ตซาชที่เป็นดินแดนเหล็กกล้าเอง และก็..."
10052130-92 = "มัลคูธ..."
10052130-93 = "อึก... ระ... เราจะสู้อีกไหวเหรอ? แล้วครั้งนี้... เราจะชนะได้หรือเปล่า...?"
10052130-94 = "เราจะทำได้ค่ะ ยูสึ! ตอนนี้พวกเราทุกคนมีอาวุธและชุดเกราะใหม่แล้ว ส่วนเคย์ก็อัปเลเวลขึ้นเยอะเลย#nด้วยค่ะ!"
10052130-95 = "ค่ะ... ครั้งนี้คงไม่เลวร้ายเหมือนครั้งก่อนแล้วละค่ะ แล้วตอนนี้เราก็ใช้พลังของผู้เลื่อมใสฝ่ายศัตรูได้#nระดับหนึ่งด้วย"
10052130-98 = "ถึงเวลาจริงๆ แล้วสินะ"
10052130-99 = "ค่ะ นั่นสินะคะ"
10052130-104 = "ฉันจะเคลื่อนไหวก่อนเองค่ะ ครั้งนี้ฉันเป็นแนวหน้าให้เอง"
10052130-105 = "ดีจังเลยนะคะที่ฉันในตอนนี้อยู่ในชุดและอาวุธที่เบากว่าปกติ"
10052130-108 = "อื้อ แผนการของเราคือให้โทคิไปดึงดูดความสนใจ ระหว่างนั้นก็ให้กองกำลังที่คอยรับช่วงต่อ ร่อนเข้าไปในพื้นที่"
10052130-109 = "เรียกว่า [ruby=Operation Steel Rain]<ปฏิบัติการฝนเหล็ก>[/ruby] หรือเปล่านะ..."
10052130-112 = "ส่วนเอมิคือแนวสนับสนุนสุดท้ายใช่มั้ยคะ?"
10052130-113 = "ใช่แล้ว เพราะฉันปรับตัวให้เข้ากับทุกตำแหน่งได้ยังไงล่ะ แค่ใช้งานฉันให้มีประสิทธิภาพสูงสุด แค่นั้นฉันก็พอใจแล้วละ"
10052130-114 = "ค่ะ ถ้างั้นก็ขอฝากด้วยนะคะ อย่าบาดเจ็บด้วยนะคะ เอมิ"
10052130-115 = "แล้วเรามาเจอกันใหม่โดยสวัสดิภาพกันนะคะ"
10052130-118 = "อื้อ โทคิก็ด้วยนะ"
