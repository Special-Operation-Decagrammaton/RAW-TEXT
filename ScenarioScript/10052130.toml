[translation]
10052130-1 = "耶索德：立於基礎之上的力量淨化者"
10052130-4 = "抵達預定位置。"
10052130-5 = "是的，英美。接下來必須爬到那上面去呢。"
10052130-6 = "……"
10052130-7 = "話說，那該怎麼稱呼比較好呢？"
10052130-8 = "這個嘛……城牆？"
10052130-9 = "是。那應該是最直觀的表達方式了。"
10052130-10 = "這個預言者叫耶索德對吧。"
10052130-13 = "我們才剛抵達就受到了它盛大的歡迎。"
10052130-14 = "嗯，雖然想辦法將它擊退了一次……"
10052130-17 = "……顧名思義，給人一種城牆守護者的感覺呢。"
10052130-18 = "雖然跟Path和異名完全不同就是了。"
10052130-19 = "那是什麼來著？"
10052130-20 = "Path是「邁向完成的真理」。"
10052130-21 = "然後異名是「立於基礎之上的力量淨化者」。"
10052130-22 = "……那些你都背下來了嗎？"
10052130-23 = "反正也沒有其他能做的事。"
10052130-24 = "咦……？"
10052130-25 = "抱歉，是我失言了。#n其實大家都忙到快累垮了。"
10052130-26 = "季，你又反射性地開玩笑了？這樣會因為不會看氣氛而被討厭的哦？"
10052130-27 = "是嗎。我會注意的，英美。#n至於會反射性開玩笑，這的確是事實沒錯。"
10052130-28 = "……因為我會害怕。"
10052130-29 = "……季也覺得害怕嗎？"
10052130-30 = "英美呢？"
10052130-34 = "我也是。"
10052130-35 = "雖然其他人可能會認為我……"
10052130-36 = "認為我們……"
10052130-37 = "是無論什麼時候都很淡定又古怪的學生……"
10052130-38 = "不過該感受的東西還是會感受到的。"
10052130-39 = "遇到麻煩事會覺得討厭，也會想要偷懶。"
10052130-40 = "是啊。如果可以的話，我也想和老師一起吃洋芋片配網路直播。"
10052130-41 = "網路直播……那是什麼？"
10052130-42 = "我不是正在尋找興趣嗎？"
10052130-43 = "那就是所謂的臨時興趣。[ruby=V]耶[/ruby]。"
10052130-44 = "……臨時？"
10052130-45 = "沒錯。雖然現在對網路直播有點興趣，但那終究只是暫時的。#n搞不好很快就會改變也說不定。"
10052130-46 = "還有其他臨時興趣嗎？"
10052130-47 = "唔嗯……果然是遊戲吧。#n和愛麗絲一起玩的時候會很開心。"
10052130-48 = "還有漫畫也還算不錯。看著看著我也漸漸明白了一些道理。#n樂趣這種東西，其實包含一定程度的非理性和非效率性。"
10052130-49 = "漫畫、遊戲……的確有那種感覺呢。"
10052130-50 = "我其實也不喜歡戰鬥。#n如果能用其他方法解決，不是更有效率嗎？"
10052130-51 = "要是大家都能適可而止，好好相處就好了。"
10052130-52 = "可惜在這種情況下似乎行不通呢。#n況且誠如剛才所說，我現在感到很害怕。"
10052130-53 = "要是有什麼萬一，老師或我無法期待明天……#n或者發生更加難以言喻的事情……"
10052130-54 = "光是想到這些，就讓人喘不過氣來。"
10052130-55 = "那我呢？"
10052130-56 = "擔心程度比我和老師稍微低一點吧。"
10052130-57 = "……認真的？"
10052130-58 = "怎麼可能。人的性命並沒有上下之分。"
10052130-59 = "是嗎……謝謝你。"
10052130-60 = "如果可以的話，我希望不會有人受傷。"
10052130-61 = "希望現在活著的每個人，都不要太辛苦或痛苦。"
10052130-62 = "那是相當困難的事呢。"
10052130-63 = "所以大家都會祈禱，至少自己認識的人能夠平安無事。#n畢竟仔細想想就會發現，可怕的事情實在太多了。"
10052130-64 = "有時候光是部長就已經很難應付了，現在又多了會長……"
10052130-65 = "就連老師……也很讓人擔心。"
10052130-66 = "果然還是找個機會，把老師關進千年特製的密室裡好了。"
10052130-67 = "要保障老師的安全，那搞不好才是最有效率的方式呢。"
10052130-68 = "你打算從千年發起奇普托斯大戰嗎，英美。"
10052130-69 = "好吧。到時候我會堂堂正正地站在最前線的。"
10052130-70 = "……我是開玩笑的啦。"
10052130-71 = "我也是開玩笑的。"
10052130-72 = "季的玩笑很難分辨呢……"
10052130-73 = "是嗎。不過我學到了一件事。"
10052130-74 = "越是處於困難和危險的情況……"
10052130-75 = "反而更應該開玩笑，或者說些沒什麼意義的話娛樂一下。"
10052130-76 = "……否則會很難撐下去的。"
10052130-77 = "所以你平常會突然說一些厚臉皮的話，也是那個想法的延伸嗎？"
10052130-78 = "不是。那只是想到什麼就說什麼而已。"
10052130-79 = "……真的很像季呢。"
10052130-88 = "英美、季。聽得到嗎？這邊準備完畢了。#n你們突入之後，我們也會配合展開行動。"
10052130-89 = "終於看到終點了呢。#n這種時候……原來真的會到來啊。"
10052130-90 = "實際上，這是最後一個預言者了對吧？"
10052130-91 = "準確來說還有兩個。#n作為鋼鐵大陸本身的涅察赫，以及……"
10052130-92 = "馬爾庫特……"
10052130-93 = "嗚嗚嗚……我，我們還能再打一次嗎？#n這次……能贏嗎……？"
10052130-94 = "可以的，柚子！我們大家都獲得了新的武器和裝甲，Kei也大幅升級了！"
10052130-95 = "是啊……情況應該不像之前那麼悲觀了。#n而且我們如今也能在一定程度上，運用敵方預言者的力量。"
10052130-98 = "真的……有種時候到了的感覺呢。"
10052130-99 = "是啊。確實如此。"
10052130-104 = "我先展開行動吧。這次由我擔任先鋒。"
10052130-105 = "和平常不同，輕量化的武裝和衣服感覺相當不錯。"
10052130-108 = "嗯。由季先吸引視線，後續部隊再趁機下降……"
10052130-109 = "名[ruby=Operation Steel Rain]稱是「鋼鐵之雨作戰」對吧[/ruby]……"
10052130-112 = "英美與我相反，負責最後方的火力支援對嗎？"
10052130-113 = "沒錯。我能適應任何位置。#n只要能最有效率地使用我，我就滿足了。"
10052130-114 = "好的，那麼就拜託你了。#n還請務必注意安全，英美。"
10052130-115 = "平安地再見吧。"
10052130-118 = "嗯。季也是。"
