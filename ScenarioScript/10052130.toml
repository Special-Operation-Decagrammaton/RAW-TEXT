[translation]
10052130-1 = "Yesod, the Foundation of Purity and Power"
10052130-4 = "Position secured."
10052130-5 = "Ditto. Position secured. And now we must get up there."
10052130-6 = "..."
10052130-7 = "By the way, what should we call that?"
10052130-8 = "Maybe a rampart?"
10052130-9 = "That makes sense to me."
10052130-10 = "This prophet was called Yesod, I believe."
10052130-13 = "It gave us a grand welcome when we first arrived."
10052130-14 = "Yeah. We did make it take a step backwards..."
10052130-17 = "...but it felt like fighting an ancient guardian of a castle."
10052130-18 = "Its path and title were completely different, though."
10052130-19 = "What were they again?"
10052130-20 = "Its path is \"truth towards completion.\""
10052130-21 = "And its title is \"Foundation of Purity and Power.\""
10052130-22 = "...You memorized that?"
10052130-23 = "There wasn't much to do."
10052130-24 = "Huh...?"
10052130-25 = "My apologies. That was a thoughtless remark. Everyone has so much to do that we're all about to collapse from work."
10052130-26 = "Toki, did you instinctively respond with a joke again? If you can't learn to read the room, people might start resenting you."
10052130-27 = "Ah. I will be careful. Because, yes, I did make an instinctive joke."
10052130-28 = "...I am a little scared."
10052130-29 = "...So even you can feel fear."
10052130-30 = "What about you, Eimi?"
10052130-34 = "Me too."
10052130-35 = "The others might think that..."
10052130-36 = "We're..."
10052130-37 = "...eccentric, but always composed."
10052130-38 = "But we're just students. We feel all the same things."
10052130-39 = "Things like hating menial work and just wanting to laze around."
10052130-40 = "Yes. I would like to watch live streams with Sensei while eating potato chips."
10052130-41 = "Why live streams?"
10052130-42 = "Because I have been searching for a hobby."
10052130-43 = "This is what they call a \"fleeting interest.\" Victory."
10052130-44 = "...Fleeting?"
10052130-45 = "Yes. While I am somewhat interested in streamers and live streams, I realize that this is tentative. My hobby could change at any given moment."
10052130-46 = "Do you have other fleeting hobbies?"
10052130-47 = "Hm. I suppose video games. I enjoy playing with Aris."
10052130-48 = "Reading manga was not half bad either. Through reading them, I learned that \"fun\" implies a degree of irrationality and ineffectiveness."
10052130-49 = "Manga, video games... I figured."
10052130-50 = "My point is, if I didn't have to fight, I wouldn't. There are ways to resolve things without using bullets."
10052130-51 = "I just... It'd be nice if we lived in a perfect world and everyone could get along."
10052130-52 = "However, that is not the world we are currently living in. And that is why I am scared."
10052130-53 = "If something happens that takes away my and Sensei's ability to look forward to tomorrow...or if the unspeakable happens..."
10052130-54 = "It makes my chest tighten. My breath won't come out properly."
10052130-55 = "What about me?"
10052130-56 = "Somewhere below me or Sensei."
10052130-57 = "...Seriously?"
10052130-58 = "Of course not. Human life is human life. One cannot have higher value than another."
10052130-59 = "Yeah... Thanks."
10052130-60 = "I would like for no one to be injured."
10052130-61 = "For all living beings to experience an existence free from pain and struggle."
10052130-62 = "Now you're asking for too much."
10052130-63 = "The most we can do is hope for our friends to be safe. Life sure is scary, isn't it?"
10052130-64 = "Our first burden was President Himari, but with President Rio on top of that..."
10052130-65 = "...And Sensei. I'm really worried about Sensei too."
10052130-66 = "One day, maybe I'll just lock Sensei up in one of Millennium's secret chambers."
10052130-67 = "That would be the most efficient way to keep them safe."
10052130-68 = "Do you want to turn all of Kivotos against Millennium, Eimi?"
10052130-69 = "Because if you do, I will be right there with you on the frontlines."
10052130-70 = "...I'm just joking."
10052130-71 = "Same."
10052130-72 = "It's hard to tell with you sometimes, Toki."
10052130-73 = "Is that so? But there is something I've learned."
10052130-74 = "The more difficult and dangerous a situation is..."
10052130-75 = "...the more people will make jokes and act in meaningless, silly ways."
10052130-76 = "It's too much to bear otherwise."
10052130-77 = "Is that also why you're always making those brazen statements?"
10052130-78 = "No. That is simply me speaking my mind."
10052130-79 = "...That's just like you, Toki."
10052130-88 = "Eimi, Toki. Can you hear me? We're ready here. Once you engage, we'll follow your path in."
10052130-89 = "We can see the finish line now. To think we really made it this far..."
10052130-90 = "This is basically the last prophet, right?"
10052130-91 = "Technically, there are two more. Netzach, the Steel Continent itself, and..."
10052130-92 = "Malkuth..."
10052130-93 = "Ughhh... A-Are you sure we can fight her again? Can we...win...?"
10052130-94 = "I am sure we can, Yuzu! We all received new weapon and armor sets, and Kei has leveled up a lot!"
10052130-95 = "Yes... It won't be as one-sided as last time. We can also utilize a sizable portion of the prophets' powers ourselves now."
10052130-98 = "Then, I guess it's about time."
10052130-99 = "It is."
10052130-104 = "I will lead. As the vanguard."
10052130-105 = "I feel so light with my new gear. I like it."
10052130-108 = "Mhm. The plan is for you to draw its attention to give the reinforcement team enough leeway to drop."
10052130-109 = "Operation Steel Rain..."
10052130-112 = "And you'll have my back?"
10052130-113 = "The entire time. As long as it feels efficient to me, I can adapt to any role."
10052130-114 = "Then I won't look back. Don't get hurt. Eimi."
10052130-115 = "I will see you on the other side."
10052130-118 = "Right. I'll see you."
