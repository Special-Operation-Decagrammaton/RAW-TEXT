[translation]
80000139-1 = "เค้กช็อกโกแลตของนักวิจารณ์"
80000139-2 = "คุณครูทราบรึเปล่าคะว่าคนทั่วไปมีทัศนคติอย่างไรต่อวันวาเลนไทน์?"
80000139-3 = "[s] \"ก็หลายอย่างนะ ต่างคนต่างความเห็นแหละ...\""
80000139-4 = "ฮุฮุ ค่ะ และสิ่งที่พูดถึงกันบ่อยที่สุดในหมู่ผู้คนก็คือว่าทั้งหมดนี้เป็นแค่กลยุทธ์ทางการค้าของบริษัท#nช็อกโกแลตค่ะ"
80000139-5 = "อย่างเช่นคำพูด มันคือตัวบ่งชี้ที่พิสูจน์ให้เห็นถึงความจริงที่ว่า แม้แต่ความรักและความรู้สึก ยังถูกระบบทุนนิยมกลืนกินไปแล้ว อะไรทำนองนั้นค่ะ แต่ว่า..."
80000139-6 = "[s] \"แต่ว่า...?\""
80000139-10 = "มันจำเจจะตายไปค่ะ!"
80000139-11 = "แม้แต่การถกเถียงกันเรื่องพวกนั้นก็กลายเป็นเรื่องที่เห็นได้เจนตาแล้วในตอนนี้ เลยไม่ได้รู้สึกอะไรกับมันอีกแล้วละค่ะ!"
80000139-12 = "เรื่องแบบนี้มันสำคัญอะไรงั้นเหรอคะ? การที่ผู้คนมอบช็อกโกแลตให้กันในวันนี้น่ะ"
80000139-13 = "ในวันที่วุ่นวาย แม้จะเป็นช่วงสั้นๆ แต่การได้ใช้เวลาพักผ่อนหย่อนใจบ้างก็เป็นเรื่องสำคัญนะคะ"
80000139-14 = "[s1] \"ทีเรื่องแบบนี้ละยอมง่ายจังนะ\"\n[s2] \"นึกว่าจะเป็นคนยึดมั่นในหลักการซะอีก\""
80000139-17 = "ตายจริง มันก็ต้องเป็นแบบนั้นอยู่แล้วนี่คะ คุณครู"
80000139-18 = "ฉันคิดว่านักวิจารณ์มีหน้าที่ที่จะต้องตามยุคสมัยให้ทันค่ะ"
80000139-19 = "นักวิจารณ์จะต้องรู้ว่าผู้คนคิดยังไง และต้องการอะไร..."
80000139-20 = "เพราะฉันคิดว่าบางครั้งเราก็ต้องจับประเด็นให้ได้ดีกว่าคนทั่วไป ถึงจะพิสูจน์ได้ว่าตัวเองคู่ควรกับ#nการเป็นนักวิจารณ์จริงๆ ค่ะ"
80000139-21 = "ตอนนี้ฉันคิดว่าเราคุยเกริ่นกันมาพอสมควรแล้วนะคะ"
80000139-22 = "ทานสิคะ คุณครู"
80000139-23 = "ฉันทำมาในแบบฉบับของฉันเองเลยค่ะ"
80000139-29 = "ช็อกโกแลตวาเลนไทน์"
80000139-30 = "สิ่งที่เป็นเสมือนตัวแทนของความหมายและสัญลักษณ์ที่สามารถตีความออกไปได้ต่างๆ นานา ขึ้นอยู่กับว่าจะสร้างสรรค์และสื่อความหมายออกมาอย่างไร"
80000139-31 = "แม้จะไม่มีอะไรที่ชัดเจน และอาจเป็นเรื่องยากที่จะร้อยเรียงออกมาให้เป็นรูปธรรมได้"
80000139-32 = "เพราะแบบนั้นมันถึงเป็นเสมือนตัวแทนที่ทำให้เราได้ยืนยันความรู้สึกที่มีต่อกันและกันอีกครั้งยังไงล่ะคะ"
80000139-33 = "ก็เหมือนกับคำสุภาษิตที่ว่า \"ชีวิตก็เหมือนกล่องช็อกโกแลต\" ยังไงล่ะคะ"
80000139-34 = "[s3] \"งั้นเหรอ~ งั้นช็อกโกแลตนี่ก็ใส่ความจริงใจของทาคาเนะไว้สินะ~\"\n[s4] \"ไม่คิดจะบอกกันเลยสินะ~\""
80000139-37 = "......!"
80000139-38 = "คะ... คุณครูนี่ไม่เปลี่ยนเลยนะคะ!"
80000139-39 = "มักจะ... พูดอ้อมไปอ้อมมาเพื่อเซฟคำพูดเสมอเลย..."
80000139-40 = "เพราะทุกคนต่างหวาดกลัว เลยพยายามปกปิดเนื้อแท้ที่อยู่ในสุดเอาไว้นี่คะ..."
80000139-41 = "ถ้าคุณครูเข้าใจผิดเกี่ยวกับช็อกโกแลตนี้เหมือนกัน ฉันจะดีใจกว่านี้อีก..."
80000139-42 = "[s] \"โทษที เมื่อกี้พูดว่าอะไรนะ\""
80000139-43 = "ไม่มีอะไรหรอกค่ะ!"
80000139-46 = "[ns] \"เค้กช็อกโกแลต... สินะ?\""
80000139-47 = "ค่ะ เค้กช็อกโกแลตที่เรียกว่า \"คาร์โต้ชูการ์\" ค่ะ"
80000139-48 = "ฮุฮุ ทำหน้าเหมือนไม่เคยได้ยินคำนี้มาก่อนเลยนะคะ"
80000139-49 = "ก็ต้องเป็นอย่างนั้นอยู่แล้วค่ะ เพราะมันเป็นหนึ่งในเมนูเฉพาะของเรดวินเทอร์ค่ะ"
80000139-50 = "เค้กทุกชนิดย่อมมีความพิเศษในตัวอยู่แล้ว แต่คาร์โต้ชูการ์จะมีความพิเศษที่เหนือชั้นขึ้นไปอีกค่ะ"
80000139-51 = "ก่อนอื่นก็ต้องบดขนมปังขิงให้เป็นผงละเอียดก่อน"
80000139-52 = "จากนั้นก็นำผงขนมปังขิงมาผสมกับส่วนผสมอื่นๆ เช่น นมข้นหวาน น้ำตาล ผงโกโก้ และผงอบเชยค่ะ"
80000139-53 = "[s] \"ขั้นตอนพิถีพิถันมากเลยนะ...\""
80000139-54 = "แต่พอได้ลองทำดูแล้ว มันก็ไม่ได้ยากอย่างที่คิดหรอกค่ะ"
80000139-55 = "ตอนที่ซื้อขนมปังขิงจากร้านที่บังเอิญเจอมา..."
80000139-56 = "ก็เกิดนึกถึงคุณครูเข้า เลยลองทำมาดูน่ะค่ะ"
80000139-57 = "[s] \"ครูเหรอ?\""
80000139-58 = "ค่ะ"
80000139-59 = "......"
80000139-60 = "ขนมปังขิงนั้นแท้จริงเป็นเพียงผลพลอยได้จากกระบวนการผลิตน้ำตาล"
80000139-61 = "เป็นของเหลวสีดำข้น และมีกลิ่นคาราเมลเข้มข้นมาก แต่เพราะส่วนประกอบที่เป็นน้ำตาลถูกดึงออกไป#nจนหมดแล้ว เลยอาจจะมีรสเปรี้ยวนิดๆ ค่ะ"
80000139-62 = "เพราะงั้นอย่างมากก็ทำได้แค่ดึงกลิ่นหอมนั้นมาใช้เป็นส่วนผสมรองเท่านั้นค่ะ นอกนั้นส่วนใหญ่จะนำไปแปรรูปเป็นอาหารสัตว์หรือวัตถุดิบสำหรับทำเครื่องปรุงรสอื่นๆ"
80000139-63 = "แต่ว่าแม้จะเป็นวัตถุดิบที่ดูเหมือนจะไม่มีความเป็นไปได้ใดๆ เหลืออยู่แล้ว..."
80000139-64 = "แต่ก็ยังนำมาทำเป็นขนมอร่อยๆ อย่างขนมปังขิงหรือคาร์โต้ชูการ์ได้อยู่นะคะ"
80000139-65 = "และมันทำให้ฉันคิดได้ว่า..."
80000139-66 = "......"
80000139-67 = "มันช่างเหมือนกับคุณครูที่คอยค้นหาความเป็นไปได้ในตัวของนักเรียนเลยค่ะ"
80000139-68 = "[ns5] (เป็นคำพูดที่แปลกใหม่และน่าซาบซึ้งใจมากๆ...)\n[ns6] (ชมกันเกินไปหน่อยแล้วละมั้ง...)"
80000139-71 = "คุณครู...? ทำไมถึงทำหน้าแบบนั้นล่ะคะ? ดูเหมือนจะดีใจ แต่ก็ดีใจได้ไม่สุดอย่างไรอย่างนั้นเลยค่ะ?"
80000139-72 = "ระ... หรือว่า...?"
80000139-73 = "......"
80000139-74 = "นะ... นั่นสินะคะ! ฉันเอาแต่เล่าเรื่องไร้สาระ พูดอะไรเกินจริง และเอาแต่พูดเรื่องที่ตอบได้ยากสินะคะ!"
80000139-75 = "ฮือ... ฉันไม่น่าพูดแบบนั้นเลยค่ะ... ไม่สิ ฉันคงคิดมากเกินไปเองค่ะ... เพราะแบบนี้ถึงจำเป็นจะต้องรู้#nว่าตอนไหนควรจะหยุดพูด..."
80000139-76 = "[s7] \"เปล่าหรอก ทาคาเนะ! ไม่ใช่แบบนั้นเลย!\"\n[s8] \"ทาคาเนะเป็นนักวิจารณ์นี่นา ก็ต้องพูดแบบนั้นอยู่แล้วนี่นา\""
80000139-79 = "จริงเหรอคะ...?"
80000139-80 = "[s9] \"อื้อ! ครูชอบนะ มันแปลกใหม่ดี!\"\n[s10] \"เหมือนพวกคำวิจารณ์ที่ค้นหาความหมายแฝงเลย!\""
80000139-83 = "......"
80000139-84 = "ฮุฮุ"
80000139-85 = "ขอบคุณนะคะ คุณครู"
80000139-86 = "งั้นมาทานเค้กนี้กับฉันมั้ยคะ?"
80000139-87 = "ฉันจะไปชงชาที่เข้ากับเค้กชิ้นนี้มาให้ รอสักครู่นะคะ"
80000139-89 = "(คุณครูนั่งกินเค้กคาร์โต้ชูการ์กับทาคาเนะอย่างเอร็ดอร่อย)"
80000139-90 = "(เค้กมีกลิ่นคาราเมลอ่อนๆ เนื้อเค้กเหนียวนุ่มไม่ร่วนเลย... เป็นเค้กช็อกโกแลตที่อร่อยมากจริงๆ)"
