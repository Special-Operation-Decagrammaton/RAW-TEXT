[translation]
80000139-1 = "評論家的巧克力蛋糕"
80000139-2 = "您知道世人對情人節這個紀念日的評價嗎？"
80000139-3 = "[s]「有各式各樣的說法吧……」"
80000139-4 = "呵呵，沒錯。#n其中最常被提到的，不外乎「這一切都是巧克力公司的商業手段」……"
80000139-5 = "或者「這是連感性與愛情都被資本主義吞噬的象徵」之類的說法吧。#n不過……"
80000139-6 = "[s]「不過？」"
80000139-10 = "我已經聽膩了！"
80000139-11 = "現在就連那些討論也已經過於氾濫，甚至到了令人麻木的程度！"
80000139-12 = "說到底，那種事真的有那麼重要嗎？#n人們能夠享受今天，彼此分享巧克力……"
80000139-13 = "在忙碌的日子裡度過片刻的愉快時光──這才是最重要的。"
80000139-14 = "[s1]「你在這方面倒是很寬容呢。」\n[s2]「本來還以為你是個原則主義者呢。」"
80000139-17 = "哎呀。那是當然的，老師。"
80000139-18 = "我認為評論家有跟上時代的義務。"
80000139-19 = "必須了解人們在思考什麼、追求什麼……"
80000139-20 = "有時甚至要比當事人更敏銳地察覺那些事物，才能勉強證明評論家的存在意義。"
80000139-21 = "那麼，氣氛應該醞釀得差不多了……"
80000139-22 = "老師，請享用。"
80000139-23 = "這是我自己試著做的……"
80000139-29 = "情人節巧克力。"
80000139-30 = "這是能根據裡面承載了什麼、以什麼樣的方式製作──#n從而獲得無數種詮釋的、一種意義與象徵性的表現。"
80000139-31 = "沒有一樣是清晰明確的，也沒有一樣能編織出確切的含意。"
80000139-32 = "不過正因如此，它反而能夠成為再次確認彼此心意與信任的一種象徵。"
80000139-33 = "不是有句話說「人生就像一盒巧克力」嗎？"
80000139-34 = "[s3]「這樣啊～所以貴音在這份巧克力裡蘊含的真心～」\n[s4]「你不打算告訴我嗎～？」"
80000139-37 = "……！"
80000139-38 = "老，老師您總是……！"
80000139-39 = "總是……用保守的方式說著曖昧的話……"
80000139-40 = "所以大家才會因為害怕，選擇將最後一層給隱藏起來吧……"
80000139-41 = "如果您能誤解這份巧克力的涵義，我反而會由衷地感到高興……"
80000139-42 = "[s]「抱歉，我剛才沒聽清楚。」"
80000139-43 = "沒什麼啦！"
80000139-46 = "[ns]「這是巧克力蛋糕吧……？」"
80000139-47 = "沒錯，是一種名為卡爾圖什卡的巧克力蛋糕。"
80000139-48 = "呵呵，果然是一副不太理解的表情呢。"
80000139-49 = "不過這也是理所當然的，畢竟這是赤冬的特產之一。"
80000139-50 = "儘管每種蛋糕都會主張自己是最特別的，但是卡爾圖什卡在其中更是別具一格。"
80000139-51 = "首先需要把糖蜜餅乾碾碎成粉……"
80000139-52 = "再把糖蜜餅乾粉混入煉乳、砂糖、可可和肉桂粉等等材料才能製作而成。"
80000139-53 = "[s]「原來這麼費工夫啊……」"
80000139-54 = "其實做起來意外地並不困難。"
80000139-55 = "我也是因為找到了不錯的糖蜜餅乾店，並在前往的途中……"
80000139-56 = "……突然想起了老師，才決定製作這個蛋糕的。"
80000139-57 = "[s]「我？」"
80000139-58 = "是的。"
80000139-59 = "……"
80000139-60 = "其實糖蜜本身，只不過是在製糖過程中產生的副產品。"
80000139-61 = "雖然是種黑色、黏稠、帶有濃郁焦糖香氣的液體……#n然而因為糖分都被提取出來的關係，吃起來只能感覺到酸味。"
80000139-62 = "即便可以活用它的香氣作為副材料使用，#n不過大多只會當成動物飼料和其他調味料的原料而已。"
80000139-63 = "可是，就算是看似毫無可能性的材料……"
80000139-64 = "也能做出糖蜜餅乾，或者卡爾圖什卡這類出色的成品不是嗎？"
80000139-65 = "那在某種程度上……"
80000139-66 = "……"
80000139-67 = "讓我覺得，就像是能從學生身上找出可能性的老師一樣。"
80000139-68 = "[ns5]（雖然是段非常令人感激且新奇的話……）\n[ns6]（不過總覺得好像被賦予了過多的意義……）"
80000139-71 = "……老師？為何露出那種表情呢？#n看起來似乎很高興，卻又好像不是那麼回事……？"
80000139-72 = "難，難不成……！"
80000139-73 = "……"
80000139-74 = "對，對啦！反正我就只會說一些冗長、意義過剩、不知道該怎麼回答的話！"
80000139-75 = "嗚嗚嗚……果然不該那樣說……也不該想這麼多的……#n明明要懂得適時收斂才對……"
80000139-76 = "[s7]「不是的，貴音！真的不是那樣！」\n[s8]「貴音可是評論家哦？說出那種話也是理所當然的！」"
80000139-79 = "……真的嗎？"
80000139-80 = "[s9]「嗯！感覺很新穎，我很喜歡！」\n[s10]「就像是在為他人解說隱藏在背後意義的評論一樣！」"
80000139-83 = "……"
80000139-84 = "呵呵。"
80000139-85 = "謝謝您，老師。"
80000139-86 = "那麼，您願意和我一起品嘗這份蛋糕嗎？"
80000139-87 = "我這就去準備合適的茶，還請稍待片刻。"
80000139-89 = "（和貴音一起津津有味地享用了卡爾圖什卡）"
80000139-90 = "（帶著淡淡的焦糖香氣，口感Q彈又濕潤……真的是非常好吃的巧克力蛋糕）"
