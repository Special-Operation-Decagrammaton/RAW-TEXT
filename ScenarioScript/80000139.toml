[translation]
80000139-1 = "#title;평론가의 초콜릿케이크"
80000139-2 = "3;타카네;02;발렌타인 데이라는 기념일에 대한 세간의 평가, 알고 계신가요?\n#3;a\n#3;em;[반응]"
80000139-3 = "[s]\"여러 가지 있지. 여러 가지…….\""
80000139-4 = "3;타카네;07;후훗. 네. 그중 흔히 이야기되는 것은 이 모든 것이 초콜릿 회사의 상술이라든가."
80000139-5 = "3;타카네;12;감성과 사랑마저 자본주의적인 방종 속으로 팔려 들어갔다는 현실을 증명하는, 하나의 지표라는 이야기 같은 것이 있겠죠. 하지만……."
80000139-6 = "[s]\"하지만?\""
80000139-7 = "#st;[0,0];instant;1;"
80000139-8 = "#clearST"
80000139-9 = "3;타카네;12\n#3;em;[…]\n#wait;2500"
80000139-10 = "3;타카네;09;식상해요!\n#3;closeup\n#3;em;[!]\n#fontsize;100"
80000139-11 = "3;타카네;06;그런 논의들마저도 이제는 너무 흔해져서, 아무 감상도 들지 않을 정도로요!\n#3;closeup"
80000139-12 = "3;타카네;05;애초에 그런 게 뭐가 그렇게 중요할까요? 사람들이 오늘을 즐기며, 초콜릿을 나누며.\n#3;closeup\n#3;em;[?]"
80000139-13 = "3;타카네;01;바쁜 나날 중에서도 잠시나마 즐거운 시간을 보낼 수 있다는 게 중요한 거죠.\n#3;closeup"
80000139-14 = "[s1]\"그런 부분에서는 너그럽구나.\"\n[s2]\"원칙주의일 줄 알았는데.\""
80000139-15 = "#wait;10"
80000139-16 = "#wait;10"
80000139-17 = "3;타카네;02;어머나. 당연한 것이랍니다. 선생님.\n#3;em;[반응]"
80000139-18 = "3;타카네;01;평론가에게는 시대를 따라가야 하는 의무가 있다고, 저는 생각하거든요."
80000139-19 = "3;타카네;99;평론가는 사람들이 무엇을 생각하고 무엇을 원하는지……."
80000139-20 = "3;타카네;02;가끔은 그 사람들 본인보다도 더 잘 캐치해야, 간신히 자기 자리에 대한 증명을 할 수 있다고 생각하거든요."
80000139-21 = "3;타카네;01;그러면, 이 정도면 아이스브레이킹은 된 것 같으니."
80000139-22 = "3;타카네;99;드세요, 선생님.\n#3;em;[음표]"
80000139-23 = "3;타카네;13;제가 나름대로 만들어 본 것이랍니다."
80000139-24 = "#st;[0,0];instant;1;"
80000139-25 = "#clearST"
80000139-26 = "3;타카네;12\n#3;m5\n#wait;1000"
80000139-27 = "3;타카네;12\n#3;greeting\n#wait;1500"
80000139-28 = "#wait;2000"
80000139-29 = "3;타카네;02;발렌타인 초콜릿."
80000139-30 = "3;타카네;01;거기에 무엇을 담고, 어떻게 만드느냐에 따라 수많은 해석이 가능한, 의미와 상징으로서의 표상.\n#3;em;[...]"
80000139-31 = "3;타카네;99;무엇 하나 명징하지 않고 무엇 하나 확실하게 직조해 내기 힘들지만."
80000139-32 = "3;타카네;12;오히려 그렇기에 서로에 대한 생각과 신뢰를 재확인할 수 있는 표상이기도 하죠"
80000139-33 = "3;타카네;13;보세요. 인생은 초콜릿 상자 같은 것이라는 말도 있잖아요?\n#3;m3"
80000139-34 = "[s3]\"그런가~ 그렇다면 이 초콜릿에 담긴 타카네의 진심은~\"\n[s4]\"가르쳐주지 않을 생각인 건가~\""
80000139-35 = "#wait;10"
80000139-36 = "#wait;10"
80000139-37 = "3;타카네;17;……!\n#3;em;[!]"
80000139-38 = "3;타카네;14;서, 선생님께서는 항상!"
80000139-39 = "3;타카네;06;항상…… 그렇게, 돌아가듯이 안전하게 말씀하곤 하시니까……."
80000139-40 = "3;타카네;06;다들 무서워서, 마지막 한 꺼풀을 감추려고 하는 거잖아요…….\n#3;stiff\n#3;em;[///]\n#fontsize;50"
80000139-41 = "3;타카네;16;차라리 이 초콜릿을 오해해 주신다면 저는, 오히려 진심으로, 기쁠 텐데…….\n#fontsize;50"
80000139-42 = "[s]\"미안. 잘 안 들렸어.\""
80000139-43 = "3;타카네;14;아무것도 아니랍니다!\n#3;jump\n#fontsize;80"
80000139-44 = "#all;hide"
80000139-45 = "#wait;2000"
80000139-46 = "[ns]\"초콜릿케이크…… 지?\""
80000139-47 = "5;타카네;00;네. 카르토슈카라는 초콜릿케이크예요.\n#5;a\n#5;greeting\n#5;em;[반짝]"
80000139-48 = "5;타카네;12;후후. 역시 잘 모르신다는 표정이시네요."
80000139-49 = "5;타카네;07;당연하죠. 붉은겨울 특산 중 하나인걸요.\n#5;em;[재잘]"
80000139-50 = "5;타카네;02;모든 케이크는 자기가 가장 특별하다고 주장하지만, 카르토슈카는 그중에서도 한층 더 특별한 부분이 있답니다."
80000139-51 = "5;타카네;01;우선 당밀 과자를 가루가 될 때까지 잘게 부숴야 하는 과정이 필요하거든요."
80000139-52 = "5;타카네;02;그 당밀 과자 가루에 연유와 설탕, 카카오와 계피 분말 같은 재료를 섞어서 만들어 낸 것이니까요.\n#5;m3"
80000139-53 = "[s]\"엄청나게 정성이 들어간 것이었구나…….\""
80000139-54 = "5;타카네;12;의외로 해 보면 할 만하답니다.\n#5;em;[음표]"
80000139-55 = "5;타카네;01;괜찮은 당밀 과자 가게를 찾아서 그 과자를 사 오던 중에……."
80000139-56 = "5;타카네;16;……선생님이 떠올라서, 만들기로 한 것이니까요.\n#5;em;[///]\n#5;stiff"
80000139-57 = "[s]\"나?\""
80000139-58 = "5;타카네;99;네."
80000139-59 = "5;타카네;16;…….\n#5;em;[…]"
80000139-60 = "5;타카네;99;당밀 자체는 설탕을 만들면서 나오는 부산물에 지나지 않죠."
80000139-61 = "5;타카네;01;검고 찐득거리는 액체에, 캐러멜 향이 강하지만, 설탕 성분이 다 빠져나갔기 때문에 신맛밖에 나지 않기도 하고요."
80000139-62 = "5;타카네;02;그 향기를 살려 부재료 정도로나 사용될 수 있을 뿐, 보통은 동물의 사료나 다른 조미료의 원료가 되는 게 전부죠."
80000139-63 = "5;타카네;16;……그렇지만 그렇게, 아무 가능성도 남지 않은 것처럼 보이는 재료로도……."
80000139-64 = "5;타카네;12;당밀 과자나 카르토슈카 같은, 멋진 결과물을 만들 수 있잖아요?\n#5;em;[음표]"
80000139-65 = "5;타카네;13;그것이 어딘가……."
80000139-66 = "5;타카네;10;…….\n#5;em;[///]"
80000139-67 = "5;타카네;00;학생에게서 가능성을 찾아내 주시는, 선생님 같다는 생각이 들었답니다.\n#5;em;[반짝]"
80000139-68 = "[ns5](엄청나게 고맙고 신선한 말이기는 했는데…….)\n[ns6](약간, 의미를 과하게 부여해 준 것 같기도 하네…….)"
80000139-69 = "#wait;10"
80000139-70 = "#wait;10"
80000139-71 = "5;타카네;06;……선생님? 왜 그런 표정을 짓고 계시죠? 기뻐하는 것처럼 보이면서도, 어딘가 그렇지 않기도 한 표정이신데요?\n#5;em;[?]"
80000139-72 = "5;타카네;04;서, 설마……?"
80000139-73 = "5;타카네;17;…….\n#5;em;[///]\n#5;stiff"
80000139-74 = "5;타카네;15;그, 그래요! 저는 어차피 장황하고, 의미 과잉이고, 뭐라고 대답해 주면 좋을지 모르는 이야기밖에 못 해요!\n#5;jump"
80000139-75 = "5;타카네;14;우우우……. 괜히 그렇게 말씀드렸어요……. 아뇨, 괜히 생각했어요……. 이래서 적당히 끊을 줄 알아야 하는 건데…….\n#5;stiff\n#5;em;[속상함]"
80000139-76 = "[s7]\"아니야, 타카네! 그렇지 않아!\"\n[s8]\"타카네는 평론가잖아? 그런 말을 하는 게 당연한 거지!\""
80000139-77 = "#wait;10"
80000139-78 = "#wait;10"
80000139-79 = "5;타카네;06;……정말요?\n#5;em;[…]"
80000139-80 = "[s9]\"응! 신선해서 좋았어!\"\n[s10]\"말 그대로 숨은 의미를 찾아내 주는 평론처럼!\""
80000139-81 = "#wait;10"
80000139-82 = "#wait;10"
80000139-83 = "5;타카네;02;……."
80000139-84 = "5;타카네;12;후훗."
80000139-85 = "5;타카네;07;감사합니다. 선생님.\n#5;greeting\n#5;em;[반짝]"
80000139-86 = "5;타카네;00;그러면 저와 함께 이 케이크, 같이 드셔 주시겠어요?"
80000139-87 = "5;타카네;03;어울리는 차를 곧 내 올 테니, 조금만 기다려 주세요.\n#5;em;[음표]"
80000139-88 = "#all;hide"
80000139-89 = "#na;(타카네와 함께, 타카네의 카르토슈카를 맛있게 먹었다.)"
80000139-90 = "#na;(캐러멜 같은 향이 살짝 나고, 쫄깃하면서도 촉촉한 식감이 느껴지는…… 정말 맛있는 초콜릿케이크였다.)"
