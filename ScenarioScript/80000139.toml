[translation]
80000139-1 = "評論家的巧克力蛋糕"
80000139-2 = "您知道世人對情人節這個紀念日的評價嗎？"
80000139-3 = "[s]「有各式各樣的說法吧。各式各樣的……」"
80000139-4 = "呵呵。是的。其中最常被提到的就是這一切都是巧克力公司的商業手段之類的。"
80000139-5 = "比如說，連感性和愛情都被資本主義的放縱所吞噬這一現實的佐證之類的說法吧。不過……"
80000139-6 = "[s]「不過？」"
80000139-10 = "聽膩了！"
80000139-11 = "就連那些討論都已經太過氾濫，到了完全無感的程度了！"
80000139-12 = "說到底那種事有什麼重要的呢？人們享受今天，分享巧克力。"
80000139-13 = "在忙碌的日子裡，能有片刻的愉快時光才是重要的。"
80000139-14 = "[s1]「在那方面倒是很寬容呢。」\n[s2]「還以為你是原則主義者呢。」"
80000139-17 = "哎呀。那是當然的，老師。"
80000139-18 = "我認為評論家有跟上時代的義務。"
80000139-19 = "評論家必須了解人們在想什麼、想要什麼……"
80000139-20 = "有時候甚至要比那些人自己更敏銳地捕捉到，才能勉強證明自己存在的意義。"
80000139-21 = "那麼，暖場到這裡應該差不多了。"
80000139-22 = "請享用，老師。"
80000139-23 = "這是我自己試著做的。"
80000139-29 = "情人節巧克力。"
80000139-30 = "根據往裡面放了什麼、如何製作，可以有無數種解讀的，作為意義與象徵的表徵。"
80000139-31 = "沒有一樣是清晰的，也沒有一樣能確切地編織出來。"
80000139-32 = "正因如此，它也是能重新確認彼此心意與信賴的表徵呢。"
80000139-33 = "你看。不是有句話說人生就像巧克力盒子一樣嗎？"
80000139-34 = "[s3]「是嗎～那麼這巧克力裡蘊含的貴音的真心是～」\n[s4]「不打算告訴我嗎～」"
80000139-37 = "……！"
80000139-38 = "老，老師您總是……！"
80000139-39 = "總是……那樣拐著彎安全地說話……"
80000139-40 = "大家都是因為害怕，才想隱藏最後那一層……"
80000139-41 = "如果你能誤解這份巧克力的話，我反而會由衷地高興……"
80000139-42 = "[s]「抱歉。沒聽太清楚。」"
80000139-43 = "什麼都不是！"
80000139-46 = "[ns]「巧克力蛋糕……吧？」"
80000139-47 = "是的。是叫做卡爾圖什卡的巧克力蛋糕。"
80000139-48 = "呵呵。果然是不太認識的表情呢。"
80000139-49 = "當然啦。畢竟是赤冬的特產之一。"
80000139-50 = "每種蛋糕都主張自己最特別，但卡爾圖什卡在其中更是特別。"
80000139-51 = "首先需要把糖蜜餅乾碾碎成粉的步驟。"
80000139-52 = "把糖蜜餅乾粉混入煉乳、砂糖、可可和肉桂粉等材料製成的。"
80000139-53 = "[s]「原來這麼費工夫啊……」"
80000139-54 = "意外地做起來還蠻容易的。"
80000139-55 = "在找到不錯的糖蜜餅乾店並去買的途中……"
80000139-56 = "……因為想起了老師，所以決定做的。"
80000139-57 = "[s]「我？」"
80000139-58 = "是的。"
80000139-59 = "……"
80000139-60 = "糖蜜本身不過是製糖過程中產生的副產品。"
80000139-61 = "是黑色黏稠的液體，雖然焦糖香氣很濃，但因為糖分都被提取掉了，只剩下酸味。"
80000139-62 = "只能利用那個香氣當作副材料使用，通常不過是作為動物飼料或其他調味料的原料。"
80000139-63 = "……但是，即便是看似毫無可能性的材料……"
80000139-64 = "也能做出糖蜜餅乾或卡爾圖什卡之類出色的成品不是嗎？"
80000139-65 = "那在某種程度上……"
80000139-66 = "……"
80000139-67 = "讓我覺得就像是能從學生身上找到可能性的老師一樣。"
80000139-68 = "[ns5]（雖然是非常感激而且新穎的話語……）\n[ns6]（總覺得有點被賦予了過多的意義……）"
80000139-71 = "……老師？為什麼露出那種表情呢？看起來很高興，卻又有些不太像的樣子？"
80000139-72 = "難，難不成……！"
80000139-73 = "……"
80000139-74 = "對，對啦！反正我只會說些冗長的、意義過剩的、不知道該怎麼回答的話！"
80000139-75 = "嗚嗚嗚……不該那樣跟你說的……不，不該那樣想的……所以才說要懂得適時收住……"
80000139-76 = "[s7]「不是的，貴音！才不是那樣！」\n[s8]「貴音不是評論家嗎？說出那樣的話是理所當然的啊！」"
80000139-79 = "……真的嗎？"
80000139-80 = "[s9]「嗯！很新穎我很喜歡！」\n[s10]「就像字面上那樣，能找出隱藏意義的評論！」"
80000139-83 = "……"
80000139-84 = "呵呵。"
80000139-85 = "謝謝您，老師。"
80000139-86 = "那麼，可以和我一起吃這個蛋糕嗎？"
80000139-87 = "我馬上去泡搭配的茶，請稍等一下。"
80000139-89 = "（和貴音一起，津津有味地吃了貴音做的卡爾圖什卡）"
80000139-90 = "（帶著淡淡的焦糖香氣，口感Q彈又濕潤……真的是非常好吃的巧克力蛋糕）"
