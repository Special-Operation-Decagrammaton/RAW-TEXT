[translation]
70013050-1 = "一人では咲かない雑草（5）"
70013050-2 = "数日後……。"
70013050-4 = "ホテルのファインダイニングレストランのラウンジ"
70013050-5 = "……。"
70013050-6 = "……まさか、また来ることになるとはね。"
70013050-7 = "くふふ、ホテルのほうからお礼だって言われたんでしょ？それならありがたくいただいちゃうのが礼儀だって！"
70013050-8 = "だ、大丈夫かしら？損害賠償を請求するための罠じゃないわよね？"
70013050-9 = "大丈夫。"
70013050-10 = "このホテル、前からリガトーニ・ファミリーに悩まされてたみたい。"
70013050-11 = "それを退治してあげたんだから、お礼をしたいって気持ちは嘘じゃないと思う。"
70013050-12 = "もし我々をだますようなことがあれば……私が消します。"
70013050-13 = "だから心配しないでください、アル様。"
70013050-14 = "え、えぇ！？"
70013050-15 = "し、心配なんてしてないわよ？私はただ、色々な可能性を考慮した方がいいって言いたかっただけ。"
70013050-16 = "えへへ……。さすがアル様……何事も慎重に、ですね。"
70013050-18 = "皆様！ようこそいらっしゃいました！"
70013050-19 = "ご案内いたします！"
70013050-26 = "変なことをしてきたら……すぐに始末します。"
70013050-27 = "だ、だから、そんな心配いらないわよ！"
70013050-29 = "では、お好きなところにお座りください。"
70013050-30 = "あら……？私たち以外、誰もいないのね？"
70013050-31 = "今夜は皆様だけを特別招待させていただきました。"
70013050-32 = "メニューも特別なものを準備しております。"
70013050-33 = "本日のために我こそはというシェフが集まりましたので、ご期待ください。"
70013050-34 = "こちらがメニューです。"
70013050-39 = "こ、これは……！"
70013050-40 = "ん？なになに？ま～た変なことでも書いてあった？"
70013050-44 = "お～"
70013050-45 = "……どうしたの？"
70013050-49 = "これは……。"
70013050-54 = "ど、どうしましたか？私たち、罠にはめられたんですか？"
70013050-55 = "ハルカちゃん。これ、どういうことか分かる～？"
70013050-60 = "オシェトラ・ゴールデンインペリアルキャビア・ブリニ……？"
70013050-61 = "こ、これは何ですか……？読めはしますが、意味不明なものだらけです……。"
70013050-62 = "そ、そもそも料理の名前で合ってるんでしょうか？何かの暗号ではないですよね？"
70013050-63 = "くふふっ、さっぱり分からないけど、頼んでみよっ！"
70013050-64 = "これとーこれとー、これも！"
70013050-65 = "でも一つぐらい、ちゃんと分かりそうなものを頼んだほうがいいんじゃない？"
70013050-66 = "例えば……トリュフクリームリゾットとか。"
70013050-67 = "そ、それもよく分かりませんけど……お任せします……！"
70013050-68 = "いいわ。じゃあ注文しましょう。"
70013050-69 = "すみません！"
70013050-70 = "いかがなさいますか？"
70013050-71 = "ここからここまで、全部お願いするわ。"
70013050-72 = "あと、このトリュフクリームリゾットもね！"
70013050-77 = "お飲み物は？"
70013050-78 = "の、飲み物？"
70013050-83 = "（ううっ、それは考えてなかったわ……）"
70013050-84 = "（こんな所で平凡なものを頼むわけにはいかないじゃない……！）"
70013050-90 = "ふふ、ごゆっくりどうぞ。"
70013050-91 = "このレストランは本日、皆様のものですから。"
70013050-99 = "その後、一同は豪華な夕食を楽しんだ。"
70013050-100 = "便利屋68が始まって以来、一番豪華とも言える夕食だった。"
70013050-103 = "あー、お腹いっぱい。本当に幸せ～"
70013050-104 = "デザートの前に食べた料理？あれ超おいしかったー"
70013050-105 = "何ていう料理だったっけ？アルちゃん覚えてる？"
70013050-106 = "ぎゅ、牛肉を焼いたものだからステーキでしょう。"
70013050-107 = "ただのステーキじゃなかったけど。"
70013050-108 = "と、とにかくおいしかったんだから、いいのよ。ね、ハルカ？"
70013050-114 = "……。"
70013050-115 = "ハルカ？"
70013050-116 = "あ……はい！アル様。私もうれしかったです。えへへ……。"
70013050-117 = "どこを見てたの？"
70013050-118 = "あ、その……あっちに見慣れた路地があったので……。"
70013050-123 = "あの路地……。"
70013050-124 = "……あ。"
70013050-125 = "くふふ、あっちに行こうよ。なんか、面白そうじゃん。"
70013050-126 = "ですが……。"
70013050-127 = "大丈夫。行こー行こー！"
70013050-128 = "ええ。気になることがあるなら、行きましょう。"
70013050-129 = "時には、過去と向き合うことも大事よ。"
70013050-130 = "……はい。"
70013050-131 = "皆さんが……そうおっしゃるなら……。"
70013050-133 = "……久しぶりですね。"
70013050-134 = "皆さんと初めて会ったのが……この路地です。"
70013050-136 = "ここは変わらないね。"
70013050-137 = "けどさー、ハルカちゃんは、すっごく変わったよね？"
70013050-139 = "そ、そうですか？よく分かりません……。"
70013050-140 = "確かにそうね。"
70013050-141 = "あの時はただ弱くてかわいそうな子だったけど、今じゃ我が便利屋68の優秀社員なんだから。"
70013050-142 = "えへへ……そんな風に言っていただけるなんて……感謝してもしきれません。"
70013050-143 = "……。"
70013050-144 = "たぶんこっちの方です。アル様が私を助けてくださった場所は。"
70013050-145 = "あの時、私は……面倒を見ていた子を守ろうと思ったのに……。"
70013050-146 = "……。"
70013050-147 = "で、ですが大丈夫です！私は皆さんのおかげで……！"
70013050-148 = "……あれ？ちょっと待って、ハルカちゃん。"
70013050-149 = "今ハルカちゃんが立っているところにある草、あの時の草じゃな～い？"
70013050-150 = "……はい？それはどういう……。"
70013050-155 = "あ……！あぁ……！"
70013050-156 = "い、生きていました……！この子……ちゃんと生きていました……！！"
70013050-157 = "それに花まで咲かせて……。どうやって一人で……。"
70013050-160 = "この子は一人で咲いたんじゃないわ。"
70013050-161 = "ハルカが毎日面倒を見てあげたから咲いたのよ。"
70013050-162 = "あなたのおかげで、花を咲かせられるほどの栄養を蓄えられたの。"
70013050-163 = "そ、それは……。"
70013050-164 = "あっ！いいこと思いついちゃった～"
70013050-165 = "この子、事務所に持っていこうよ！鉢に入れて、みんなで面倒を見てあげるの！"
70013050-166 = "ええ、すごくクールだわ。これぞまさにハードボイルドね。"
70013050-167 = "だって、ハルカ。"
70013050-172 = "…………。"
70013050-173 = "あ、ありがとうございます。"
70013050-174 = "あのとき、引き取ってくださり、感謝しています。"
70013050-175 = "小さい頃から周りに嫌われていた私を……大事にしてくださって、ありがとうございます。"
70013050-176 = "本当に、このご恩は死んでもお返しします……！"
70013050-177 = "何言ってるのよ。恩返しはすでに終わってるって言ったでしょう。"
70013050-178 = "くふふっ、「死ぬ」って言うのもやめてよー、ハルカちゃんがいなくなったら、私たちどうしたらいいの？"
70013050-179 = "うん。みんなが揃ってこその便利屋68なんだから。"
70013050-180 = "そうよ。これからもよろしくね、ハルカ。"
70013050-190 = "こうして次の日も、その次の日も――"
70013050-191 = "便利屋68のハードボイルドな日常は続いた。"
70013050-193 = "一人では咲かない雑草"
