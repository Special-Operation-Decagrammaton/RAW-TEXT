[translation]
10052070-1 = "เชเซ็ด ผู้พิพากษาด้วยความทุกข์เปี่ยมการุณ"
10052070-2 = "เบื่อ~ จัง~ เลย~!!!"
10052070-3 = "เอาอีกแล้ว พูดอย่างนี้เดี๋ยวก็เกิดเรื่องใหญ่อีกนะ พี่โมโมอิ"
10052070-4 = "แต่ว่า~ คนอื่นก็ออกไปกันหมดแล้ว~ คุณครูก็ไม่อยู่ด้วย~"
10052070-5 = "เราไม่ได้มาเล่นสนุกกันสักหน่อยนะ? ตอนนี้เราอยู่ท่ามกลางสถานที่อันตรายมากๆ เลยต่างหาก..."
10052070-6 = "ผู้เลื่อมใสของที่นี่ชื่อว่าอะไรนะ... เชเซ็ดหรือเปล่า?"
10052070-7 = "อื้อ ใช่แล้วละ"
10052070-8 = "เชเซ็ดจะเป็นเด็กแบบไหนนะ..."
10052070-9 = "ดูพูดเข้าสิ พูดเหมือนผู้เลื่อมใสเป็นเพื่อนในโรงเรียนอย่างนั้นละ... แต่ก็ช่างเถอะ ได้ยินว่าเป็นเหมือนโรงงานอะไรสักอย่างนี่ละนะ?"
10052070-10 = "เห็นว่าเคยอยู่ในพื้นที่รกร้างของมิลเลเนียมมาก่อนหรือเปล่านะ? จะว่าไปแล้ว พวกเราก็มีความผูกพันกับ#nที่นั่นอยู่..."
10052070-11 = "นั่นสินะ เราเข้าไปหา G.Bible ในพื้นที่รกร้างนั่น แล้วก็ตกลงไปข้างล่าง..."
10052070-13 = "แล้วก็ได้เจอกับอาริสึจัง..."
10052070-16 = "เดิมทีชื่อว่าดิวิชั่น (Divi:SION) หรือเปล่านะ... ที่บอกว่าเป็น AI ที่สร้างสิ่งนั้นขึ้นมาน่ะ?"
10052070-17 = "เป็นชื่อที่ได้ยินแล้วไม่รู้สึกยินดีเลยแฮะ... หมายถึงพวกที่รูปร่างคล้ายปลาหมึกใช่มั้ย?"
10052070-19 = "แล้วมันก็มีส่วนเกี่ยวข้องกับเคย์ด้วย... เดี๋ยวก่อนนะ ถ้าเป็นแบบนั้นละก็ ผู้เลื่อมใสที่ชื่อว่าเชเซ็ดก็มี#nความเกี่ยวข้องกับพวกเราเยอะมากเลยน่ะสิ?"
10052070-20 = "แต่ถึงอย่างนั้นพวกเราก็ไม่ได้ออกไปหน้างาน แต่ต้องมาสแตนด์บายอยู่ที่ยานขนส่ง~ น่าเบื่อจังเลย~ ไม่มีอะไรให้ทำหรือไงนะ~"
10052070-21 = "ก็ช่วยไม่ได้นี่นา เชเซ็ดเป็นถึงโรงงานที่ผลิตกองกำลังจำนวนมหาศาลออกมาได้แบบเรียลไทม์เลยนะ"
10052070-22 = "ถ้าจะรับมือกับพวกนั้น ทางเราก็ต้องใช้กองกำลังทั้งหมดที่มีเลย"
10052070-23 = "แล้วเราสองคนไม่ใช่กองกำลังหรือไง!"
10052070-24 = "ที่เหลือเรากันอยู่แบบนี้เพราะพี่โมโมอิเป็นคนจับสลากต่างหาก..."
10052070-25 = "อึก อย่าขุดคุ้ยความทรงจำที่น่าเจ็บปวดมาตอกย้ำกันสิ...!"
10052070-26 = "แต่การได้พักผ่อนบ้างก็เป็นเรื่องที่ดีไม่ใช่เหรอ? ฉันจะพูดอีกครั้งนะ เราไม่ได้มาที่นี่เพื่อเล่นสนุกกันนะ พี่โมโมอิ"
10052070-30 = "พวกเราฝาแฝดน่ะ..."
10052070-31 = "อื้อ"
10052070-32 = "ได้ทำเรื่องอะไรหลายอย่างเลยเนอะ ว่ามั้ย?"
10052070-33 = "ทั้งไปพื้นที่รกร้าง อวกาศ แล้วก็ดินแดนเหล็กกล้า..."
10052070-34 = "อึก... พวกเราแค่จะสร้างเกมกันเฉยๆ แท้ๆ..."
10052070-35 = "พูดอะไรอย่างนั้นล่ะ มิโดริ ทั้งหมดนี้เป็นวัตถุดิบในการสร้างเกมทั้งนั้นละ"
10052070-36 = "ตอนไปอวกาศก็เคยพูดแบบนี้ แต่สุดท้ายก็ไม่เห็นเอาอะไรมาสร้างเกมเลยนี่นา... เฮ้อ ช่างเถอะ ฉันไม่ควรพูดเรื่องนี้ตั้งแต่แรกด้วยซ้ำ"
10052070-47 = "อะ... อะไรน่ะ?!"
10052070-51 = "พี่! ดูหน้าจอทางโน้นสิ! เกิดเรื่องใหญ่แล้วละ!"
10052070-58 = "หืม?! พวกนั้นมัน... หุ่นรับใช้หรือเปล่านะ? แล้วก็...!"
10052070-60 = "กองกำลังจำนวนมากกำลังมาแล้ว!"
10052070-65 = "ยานขนส่ง ได้ยินมั้ยคะ? ขอโทษนะคะ ทุกคน!"
10052070-66 = "ฉันสกัดหุ่นรับใช้กับกองกำลังบางส่วนไว้ไม่ได้ พวกนั้นก็เลยกำลังมุ่งหน้าไปทางนั้นอยู่ค่ะ!"
10052070-67 = "ถึงระบบป้องกันยานขนส่งของเราจะไม่แข็งแรง... แต่ฉันจะพยายามควบคุมระบบจากที่นี่ดูค่ะ เพราะงั้น...!"
10052070-71 = "..."
10052070-72 = "พวกเราจะสกัดไว้ให้เอง รุ่นพี่ฮิมาริ ไม่ต้องห่วงนะ"
10052070-73 = "พะ... พี่โมโมอิ?!"
10052070-74 = "ไม่เป็นไรหรอก พวกเราก็ต้องลงมือทำอะไรบ้างสิ แล้วชุดนี้ก็ออกแบบมาโดยเน้นเรื่องความปลอดภัย#nตั้งแต่แรกแล้วไม่ใช่เหรอ? เราต้องทำได้อยู่แล้วน่า!"
10052070-75 = "คุณครูกับอาริสึก็ออกไปสู้ยิบตากันขนาดนั้น แล้วพวกเราจะมานั่งเฉยๆ อยู่ได้ยังไงล่ะ!"
10052070-76 = "ตะ... แต่พวกคุณก็ไปช่วยเหลือในพื้นที่อื่นเยอะเลยนี่คะ?"
10052070-77 = "ที่ตอนนี้ยังเหลืออยู่ในยานขนส่งก็เพราะได้เป็นกองกำลังสำรองก็เท่านั้น..."
10052070-78 = "เรื่องนั้นไม่สำคัญหรอก!"
10052070-82 = "..."
10052070-83 = "อื้อ ฉันเข้าใจพี่แล้วละ"
10052070-84 = "ไม่ต้องกังวลไปนะคะ รุ่นพี่ฮิมาริ พวกฉันจะหาทางจัดการกับทางนี้เองค่ะ"
10052070-98 = "ทะ... ทะทะทะทะ... ทำยังไงดีล่ะคะ?!"
10052070-99 = "ระ... เราควรกลับไปหาโมโมอิกับมิโดริหรือเปล่าคะ คุณครู?"
10052070-100 = "..."
10052070-101 = "นั่นก็อาจเป็นตัวเลือกหนึ่ง แต่ฉันอยากเสนอให้เรารีบยึดพื้นที่นี้ให้ได้ก่อนแล้วค่อยกลับไปนะ"
10052070-102 = "ใช่ค่ะ เรามาถึงจุดนี้กันแล้ว การจะหันหลังกลับเป็นเรื่องยากแล้วค่ะ "
10052070-103 = "และที่สำคัญคือ ถ้าเราถอนทัพสุ่มสี่สุ่มห้าตอนนี้ ก็จะมีโอกาสสูงที่จะเจอศึกขนาบข้างเลยค่ะ"
10052070-104 = "ฉันว่าตอนนี้เราต้องเชื่อใจโมโมอิกับมิโดริให้มากที่สุดนะคะ"
10052070-105 = "ใช่แล้วละ... ถ้าเป็นพื้นที่ของผู้เลื่อมใสตนอื่น เราอาจสั่งให้กองกำลังบางส่วนของเรากลับไปก่อนได้"
10052070-106 = "แต่ที่นี่คือพื้นที่ของเชเซ็ด เป็นที่ที่บีบให้เราต้องสู้แบบผลาญกำลังกันไปข้างหนึ่ง"
10052070-107 = "แต่เพื่อเตรียมพร้อมสำหรับสถานการณ์ที่ไม่คาดคิด ขอให้ฮิมาริกับอาริสึเตรียมพร้อมออกจากที่นี่ไว้#nด้วยนะ"
10052070-108 = "ทำไมถึงเป็นพวกเราล่ะคะ?"
10052070-109 = "ก็เพราะว่าเร็วที่สุดยังไงล่ะ"
10052070-110 = "ก็ดีค่ะ เป็นตัวเลือกที่สมเหตุสมผลเลยละ ฉันเห็นด้วยกับแผนสำรองนี้ค่ะ"
10052070-112 = "[ns1] \"เรารีบโค่นเชเซ็ดให้เร็วที่สุดแล้วกลับยานกันเถอะ\"\n[ns2] \"จัดการเชเซ็ดแล้วกลับไปหาโมโมอิกับมิโดริกันเถอะ\""
10052070-115 = "ได้เลยค่ะ ถ้างั้นก็ขอรบกวนช่วยสั่งการให้ด้วยนะคะ คุณครู"
