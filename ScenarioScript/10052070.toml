[translation]
10052070-1 = "赫賽德：以慈悲的痛苦定罪的審判者"
10052070-2 = "好～無～聊～！！！"
10052070-3 = "姐姐你又來了。再說那種話搞不好又要出事了哦？"
10052070-4 = "可是～只有我們被留下來～就連老師也不在嘛～"
10052070-5 = "我們不是來玩的好嗎？#n某方面來說，我們正處在危險地帶的正中央耶……"
10052070-6 = "……這裡的預言者叫什麼來著？是赫賽德嗎？"
10052070-7 = "嗯。沒錯。"
10052070-8 = "那傢伙會是什麼樣的孩子呢……"
10052070-9 = "怎麼把預言者叫得跟學校的朋友一樣……#n總之，好像聽說是類似工廠之類的東西？"
10052070-10 = "還說是在千年的廢墟裡對吧？#n這麼說來，我們跟那裡還挺有緣的呢……"
10052070-11 = "我也想起來了。#n那時候為了找G.Bible跑到廢墟，結果掉了下去……"
10052070-13 = "……然後遇見了愛麗絲醬。"
10052070-16 = "那本來是生產叫做Divi:SION……來著？生產那些東西的AI對吧？"
10052070-17 = "有點不太想聽見那個名字……總之就是類似章魚或烏賊的東西吧？"
10052070-19 = "然後那些東西又跟Kei有關……等等。#n這麼說起來，那個叫赫賽德的預言者，跟我們的淵源也太深了吧？"
10052070-20 = "結果居然不能去現場，只能在運輸船待命～#n好無聊哦～太過分了～"
10052070-21 = "這也沒辦法。#n據說赫賽德是字面意思上的工廠，所以能實時製造大量兵力。"
10052070-22 = "要對付它的話，我們也得派出所有能用的戰力才行。"
10052070-23 = "意思是我們不算是戰力嗎！？"
10052070-24 = "明明是姐姐抽籤的時候，剛好抽到我們兩個留守的關係……"
10052070-25 = "唔啊，怎麼在這種時候挖出別人痛苦的回憶……！"
10052070-26 = "不過久違休息一下不也挺好的嗎？#n再強調一次，我們不是來玩的，姐姐。"
10052070-30 = "……話說我們啊。"
10052070-31 = "嗯？"
10052070-32 = "還真是什麼都經歷過了呢？"
10052070-33 = "廢墟、宇宙，這次又是鋼鐵大陸……"
10052070-34 = "嗚嗚……我們明明只是想做遊戲而已……"
10052070-35 = "怎麼這麼說呢，綠。#n這些都是素材啊，素材。"
10052070-36 = "那句話去宇宙的時候也說過，結果後來也沒用上……#n唉，算了。當我沒說吧……"
10052070-47 = "怎，怎麼了！？"
10052070-51 = "姐姐！快看那邊的畫面！糟糕了！"
10052070-58 = "咦！？那些是……勞工機器人嗎？#n而且……！"
10052070-60 = "還有大量的兵力正在湧過來！"
10052070-65 = "運輸船，聽得到嗎？#n大家抱歉！"
10052070-66 = "有一些遺漏的勞工機器人和兵力，似乎正朝你們那邊過去！"
10052070-67 = "雖然運輸船的防禦系統很薄弱……我這邊會盡可能啟動的。#n所以……！"
10052070-71 = "……"
10052070-72 = "交給我們來防守吧，陽葵前輩。不用擔心。"
10052070-73 = "姐，姐姐！？"
10052070-74 = "沒關係。我們也得做點什麼才行。#n而且這套戰鬥服的設計，本來就特別重視安全性不是嗎？一定沒問題的！"
10052070-75 = "老師、愛麗絲和大家都那麼努力，不能只有我們在這裡玩樂！"
10052070-76 = "話，話雖如此，大家在其他區域也幫了很多忙哦？"
10052070-77 = "現在只是剛好留在運輸船上而已……"
10052070-78 = "那種事不重要！"
10052070-82 = "……"
10052070-83 = "嗯。我懂你的意思了，姐姐。"
10052070-84 = "別擔心，陽葵前輩。這裡我們會想辦法的。"
10052070-98 = "怎，怎怎怎怎，怎麼辦！？"
10052070-99 = "現，現在是不是應該回到桃井和綠那邊，老師？"
10052070-100 = "……"
10052070-101 = "那也是一個方法，不過我建議盡快佔領這個區域之後再回去。"
10052070-102 = "沒錯。都走到這裡了，要回頭恐怕很困難。"
10052070-103 = "況且如果貿然撤退的話，很可能會陷入兩面作戰的窘境。"
10052070-104 = "現在應該相信桃井和綠才對。"
10052070-105 = "……是啊。如果換作其他預言者的區域，我可能會選擇讓一部分的人先行返回。"
10052070-106 = "然而這裡是赫賽德的區域，免不了會進行消耗戰。"
10052070-107 = "不過為了以防萬一，麻煩陽葵和愛麗絲做好隨時離開這個區域的準備。"
10052070-108 = "為何是我們呢？"
10052070-109 = "因為你們是最快的。"
10052070-110 = "好吧，我接受。確實是個合理的理由。"
10052070-112 = "[ns1] 「……盡快攻略赫賽德吧。」\n[ns2] 「然後回到桃井和綠那邊。」"
10052070-115 = "好的。那麼老師，拜託您了。"
