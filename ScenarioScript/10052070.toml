[translation]
10052070-1 = "Chesed, the Merciful Arbitrator"
10052070-2 = "I'm bored!"
10052070-3 = "Not this again. You know, we might end up in some crisis soon. You should enjoy the boredom."
10052070-4 = "But they all left! Even Sensei. It's just us on this boring ship."
10052070-5 = "We're not here for a vacation, you know? In a way, we're in enemy territory."
10052070-6 = "Right. The one out there is...Chesed?"
10052070-7 = "Yes. This is Chesed's territory."
10052070-8 = "I wonder what they're like..."
10052070-9 = "It's not like some old friend from school... You don't need to get to know them. I think Chesed is some sort of factory."
10052070-10 = "A factory in the Millennium ruins. Wow, that takes me back."
10052070-11 = "I remember. We went to the ruins to look for the G.BIBLE. Instead, we fell..."
10052070-13 = "...And we found Aris."
10052070-16 = "It was an AI factory, right? I think it was called \"Divi:Sion\"?"
10052070-17 = "Whatever it was called... It kept making these big-headed squids? Jellyfish?"
10052070-19 = "And Kei was a part of it, too. Wait, now that I think about it, it seems like we have a LOT of personal history with Chesed."
10052070-20 = "And we're cooped up here working on standby. No fair!"
10052070-21 = "Too bad. They said Chesed is literally a factory, and it manufactures hordes of troops in real time."
10052070-22 = "So we need to use all of our personnel and resources to stop it."
10052070-23 = "Well, I find it a little \"personal\" that they're not using the \"personnel\" they have right here!"
10052070-24 = "...You're the one who drew the straws and picked us to stay behind..."
10052070-25 = "Ugh. I can't believe you'd bring up something so painful!"
10052070-26 = "Still, we should appreciate that we get a small break...though I know we're not here to have fun."
10052070-30 = "...About us. The two of us..."
10052070-31 = "Yes?"
10052070-32 = "We've really been through so much together, haven't we?"
10052070-33 = "Ruins, space, and now the Steel Continent..."
10052070-34 = "Yeah... We just wanted to make games... How'd we get so off track?"
10052070-35 = "It's not a waste, Midori! All of these adventures make for great inspiration!"
10052070-36 = "That's what you said when we were thrown into the stratosphere. But we haven't exactly used THAT, have we?"
10052070-47 = "Wh-What's that? Some kind of...\"everything-is-okay\" alarm?"
10052070-51 = "Momoi! Look at the screen. Oh, this is bad!"
10052070-58 = "Eh?! Aren't those...Laborers? And...!"
10052070-60 = "And they're headed right for us!"
10052070-65 = "Transport ship, do you copy? We're sorry, but..."
10052070-66 = "We lost track of some Laborers and a few troops. They're heading your way."
10052070-67 = "The ship's defense system is sub-optimal...but you two will have to make do!"
10052070-71 = "..."
10052070-72 = "We'll hold them off, Himari. Don't worry."
10052070-73 = "S-Sis?!"
10052070-74 = "We can't just huddle in here and do nothing. These suits are so well-armored! We'll have to step up and do something!"
10052070-75 = "Sensei and Aris are working hard, so we can't laze about!"
10052070-76 = "You two have done plenty for us."
10052070-77 = "Staying on the ship is an important role, too."
10052070-78 = "It's not \"important\" right now!"
10052070-82 = "..."
10052070-83 = "Yeah. I think I get it."
10052070-84 = "Don't worry, Himari. We'll figure something out."
10052070-98 = "Wh-What should we do?!"
10052070-99 = "Should I retreat to help Midori and Momoi?"
10052070-100 = "..."
10052070-101 = "That's an option, but it would be more prudent to do so after we secure this area."
10052070-102 = "Agreed. We traveled a long way to get here. It would be unwise to leave without finishing the mission. "
10052070-103 = "Retreating now will risk our formation's integrity."
10052070-104 = "I believe we should trust Momoi and Midori."
10052070-105 = "...Yes. I would spare some of us if we were facing anyone but Chesed."
10052070-106 = "But, with this many troops, we're fighting a war of attrition."
10052070-107 = "Nevertheless, I suggest Himari and Aris prepare for an immediate rescue if necessary."
10052070-108 = "Why us?"
10052070-109 = "Because you two are the fastest."
10052070-110 = "Reasonable and fair. I agree."
10052070-112 = "[ns1] \"...Let's defeat Chesed as fast as we can.\"\n[ns2] \"And return to Momoi and Midori.\""
10052070-115 = "Yes. In that case, Sensei, give us your orders."
