[translation]
901010400440-6 = "港の人に「ドラム缶ガニ」について聞いてみたよ。"
901010400440-7 = "ほとんどの人は、「カニが入ったドラム缶」は見たこともない上に、理解できないって反応だった。"
901010400440-8 = "生きているカニは通気性の悪いところだと死んじゃうから、普通はおがくずが入った木箱に入れて輸送するんだって。"
901010400440-9 = "それに、ドラム缶は木箱より高いから、普通生き物には使われないんだって。"
901010400440-10 = "浪費したいわけでもないのなら、カニをわざわざドラム缶に入れる必要はないというわけか。"
901010400440-12 = "でも噂のカニは、ドラム缶にいっぱい入ってるらしいじゃん？"
901010400440-13 = "……虫かごに詰めた虫みたいに。"
901010400440-17 = "いやな例えしないでよ！鳥肌が立ったじゃない！"
901010400440-22 = "もしかしたら……それが目的なのかもしれない。"
901010400440-23 = "特定のイメージを強調する裏には、意図があるはずだ。"
901010400440-24 = "怪談で登場するカニが、ドラム缶の中に入っている理由は、おそらく――"
901010400440-32 = "怪談で登場するカニが、ドラム缶の中に入っている理由は、おそらく――\n[as1] 現実的な保管方法だから。\n[as2] ドラム缶を宣伝するためだ。\n[as3] 恐怖を呼び起こす。"
901010400440-36 = "……うん？さっきカニはドラム缶に入れると死んじゃうから、輸送には使わないって言ってたじゃん。"
901010400440-37 = "カニの保管方法を伝えたいなら、木箱じゃないの？"
901010400440-38 = "話聞いてた？もう一度考えて、先生。"
901010400440-49 = "この噂でドラム缶はあんまりポジティブに使われていないようだけど。"
901010400440-50 = "というか、不特定多数にドラム缶を宣伝してどうするの？"
901010400440-51 = "……ちょっと違うんじゃないかな。"
901010400440-62 = "……恐怖ですか。"
901010400440-63 = "たしかにドラム缶の中で何かが蠢く様子は、心理的な恐怖を引き起こしやすいです。"
901010400440-64 = "特定の集合体が密集しているイメージは、本能的に避けたくなりますからね。"
901010400440-65 = "毒を持つ生物の多くは、似たようなパターンがありますし……。"
901010400440-66 = "あ、そういう感じ？キッチンの隅に隠れている――"
901010400440-67 = "それ以上言わないで。"
901010400440-68 = "じゃあ、誰かが嫌悪感や恐怖を引き起こしてるって話？"
901010400440-69 = "お金にもならないのに、なんでそんなことを……。"
901010400440-70 = "世間を甘く見ちゃダメだよ、FOX3。"
901010400440-71 = "ネットを見てみなよ。グロ画像で悪ふざけをしてる連中に理由があると思う？"
901010400440-72 = "FOX4が言ったように、単なるいたずらならいいけど……今回は失踪者がいるんでしょう？"
901010400440-73 = "漁港の新人もそうだし。"
901010400440-74 = "もしかして……この前の「くねくね」みたいに、ロアから発生した怪異が暴れているとか？"
901010400440-75 = "人を襲うカニをモチーフにして作られた怪異、かぁ。#n想像するだけでなんか嫌だね。"
901010400440-77 = "憶測で断じるのは危険だ。#n失踪事件と都市伝説は別件である可能性もある。"
