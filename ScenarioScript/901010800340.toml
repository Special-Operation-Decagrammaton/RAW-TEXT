901010800340-52 = "3;니코;10\n5;쿠루미;02;그런데 이 정도로 수상한 소문이 돌았는데, 왜 발키리 경찰학교에서는 조사를 하지 않았던 걸까?\n#5;al\n#3;m1"
901010800340-53 = "5;쿠루미;01;카르파초 패밀리도 이를 신경 쓰지 않았을 리가 없는데."
901010800340-54 = "#3;hide\n1;유키노;02;그건 아마도…… 지난번의 우리와 같은 결론에 도달한 게 아닐까?\n#1;em;…"
901010800340-55 = "5;쿠루미;01;같은 결론?\n#5;em;[?]"
901010800340-56 = "1;유키노;00;아무리 수상한 소문이 돌더라도, 직접 확인해 보면 실제로 실종된 사람은 없다는 걸 알 수 있잖아."
901010800340-57 = "1;유키노;99;그러니 발키리 경찰학교도 수사를 계속할 명분을 찾지 못한 게 아닐까."
901010800340-58 = "#all;hide"
901010800340-59 = "3;오토기;99;하긴. 발키리 경찰학교의 행정력도 한정되어 있으니까. 소문을 추적하는 데에도 한계가 있었겠지.\n#3;em;[한숨]"
901010800340-60 = "3;오토기;05;생각보다 교묘한 수법을 쓰고 있는걸."
901010800340-61 = "#all;hide"
