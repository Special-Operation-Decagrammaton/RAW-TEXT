901010800340-6 = "3;니코;02;식료품 구역에서 발견한 상자들에 대해 이야기하자면……\n#3;em;…\n#3;a"
901010800340-7 = "3;니코;99;창고 중앙의 식료품 구역에는 다른 식재료는 없었지만, 유독 게 만큼은 이해가 되지 않을 정도로잔뜩 쌓여 있었어."
901010800340-8 = "3;니코;00;성대한 게 파티를 준비 중이라고 해도 과할 정도의 양이었지."
901010800340-9 = "3;니코;02;카르파초 패밀리는 다 먹지도 못할 만큼의 게를 사들여서 무엇을 할 생각이었을까?"
901010800340-10 = "5;쿠루미;02;사들인 게를 다른 지역에 가서 되팔려는 목적은 아니었을까?\n#5;em;[?]\n#5;al\n#3;m1"
901010800340-11 = "#3;hide\n1;유키노;99;수산물의 전매는 원칙적으로 금지되어 있기 때문에 쉽지는 않을 거야. 더욱이 그렇게 많은 양의 게를 유통시키면 쉽게 눈에 띄겠지."
901010800340-12 = "5;쿠루미;01;그럼 그 게를 의도치 않게 손에 넣은 거라면? 이해관계에 있는 어느 어부가 카르파초 패밀리에게 대금 대신 게를 보냈을지도 모르잖아."
901010800340-13 = "#all;hide"
901010800340-14 = "3;오토기;02;그런 간 큰 어부가 실존하는지는 모르겠지만, 니코가 창고에서 발견한 게는 카르파초 패밀리가 정식으로 구입한 게가 맞을 거야.\n#3;em;…"
901010800340-15 = "3;오토기;01;수산물 경매 시장의 매매 기록을 확인해 보니, 최근 카르파초 패밀리가 대량의 게를 낙찰해 간 기록이 있더라고."
901010800340-16 = "3;오토기;99;그 때문에 카르파초 패밀리를 둘러싸고 수상한 소문이 돌기 시작한 모양이지만……"
901010800340-17 = "3;니코;99;어쩌면 게를 구매하는 행위 그 자체에 목적이 있었을지도 모르겠네."
901010800340-18 = "3;니코;02;그렇다면 카르파초 패밀리가 대량의 게를 구매한 이유는—"
901010800340-19 = "#st;[0,0];instant;1;"
