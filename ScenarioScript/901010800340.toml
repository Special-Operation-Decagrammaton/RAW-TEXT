[translation]
901010800340-6 = "食料品エリアで発見した箱についてだけど……。"
901010800340-7 = "倉庫中央の食料品エリアに他の食材はなくて、カニだけがたくさんあったよ。"
901010800340-8 = "カニパーティーでも準備してるのかなって思うくらい。"
901010800340-9 = "カルパッチョ・ファミリーは食べ切れないほどのカニを買って、何をするつもりだったのかな？"
901010800340-10 = "他のとこに転売するとか？"
901010800340-11 = "水産物の転売は原則禁止されている。#nそれに、大量のカニを流通させたら、逆に目立つだろう？"
901010800340-12 = "じゃあ、カニが偶然集まってたとか？#nとある漁師がカルパッチョ・ファミリーに資金の代わりにカニを送っていたとか。"
901010800340-14 = "そんな肝が据わってる漁師がいるかは分からないけど、ニコが倉庫で発見したカニはカルパッチョ・ファミリーが購入したもので合ってるよ。"
901010800340-15 = "市場の売買記録を見てたんだけど、カルパッチョ・ファミリーが大量のカニを落札した記録があった。"
901010800340-16 = "その影響もあって、カルパッチョ・ファミリーを取り巻く怪しい噂が出回っているようだけど……。"
901010800340-17 = "もしかすると、カニを購入する行為そのものに目的があったのかもしれないね。"
901010800340-18 = "なら、カルパッチョ・ファミリーが大量にカニを購入した理由は――"
901010800340-26 = "なら、カルパッチョ・ファミリーが大量にカニを購入した理由は――\n[as1] カニパーティーを開くためだ。\n[as3] カニを転売して儲けようとしたためだ。\n[as2] カニに関する噂を広めるためだ。"
901010800340-27 = "まあ、あり得ない話ではないね。"
901010800340-28 = "でも、カルパッチョ・ファミリーが和気あいあいとパーティーを開く姿は想像できないかも。"
901010800340-29 = "それに、カニしか倉庫になかったのも説明がつかない。"
901010800340-30 = "きっと他の理由があると思うよ。"
901010800340-39 = "はい、おそらく「ドラム缶ガニ」に関する噂だと思います。"
901010800340-40 = "水産物の輸送と関係ないカルパッチョ・ファミリーがカニを大量に購入していたら、その用途について様々な憶測が飛び交うことくらい、本人たちも認識しているはずです。"
901010800340-41 = "その上、最近は失踪事件をめぐって化け蟹に関する噂も広まっていますし――"
901010800340-42 = "知らない人からすれば、事実だと誤認してもおかしくありません。"
901010800340-43 = "あはは……それはちょっと。"
901010800340-44 = "先ほどもお話した通り、海産物の転売は禁じられていて、最近はカニの値段も下がっていますし……転売で儲けるのは難しいと思いますよ。"
901010800340-45 = "連邦生徒会の財務室を敵に回すつもりなら、もっと高額のものを密輸するはずです。"
901010800340-52 = "でも、こんなに噂が流されているのに、なんでヴァルキューレは調査しないの？"
901010800340-53 = "カルパッチョ・ファミリーだって、気にするとこじゃない？"
901010800340-54 = "それは……この前の私たちと同じ結論に至ったせいではないだろうか？"
901010800340-55 = "同じ結論？"
901010800340-56 = "いくら怪しい噂が出回っていても、調査したら失踪者がいないと判明する。"
901010800340-57 = "そのため、ヴァルキューレ警察学校も捜査を打ち切っているのかと。"
901010800340-59 = "まぁ、ヴァルキューレだって動ける人数は限られているし。#n噂を追跡するにも、限度はあると思うよ。"
901010800340-60 = "思ったより巧妙な手を使ってるんだね。"
