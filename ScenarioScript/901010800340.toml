901010800340-39 = "5;니코;00;네. 아마도 ‘게 드럼통’과 관련된 소문이겠지요.\n#5;m3"
901010800340-40 = "5;니코;99;수산물 운송과 상관없는 카르파초 패밀리가 대량의 게를 구매한다면, 그 용도에 대해 분명 말이 나올 거라는 걸 본인들도 모르지는 않았을 거예요."
901010800340-41 = "5;니코;05;더군다나 최근 실종 사건을 둘러싸고 괴물 게에 대한 소문이 퍼지고 있었으니—\n#5;em;…"
901010800340-42 = "5;니코;10;모르는 사람 입장에서는 소문이 더 사실처럼 느껴졌겠지요."
901010800340-43 = "5;니코;06;아하하…… 그 방법은 추천하고 싶지 않네요.\n#5;em;[땀]\n#5;m3"
901010800340-44 = "5;니코;12;아까도 말씀드렸지만 수산물 전매는 불법인데다, 게는 요즘 값이 저렴해서 차익을 남기기도 쉽지 않거든요."
901010800340-45 = "5;니코;00;총학생회 재무실을 적으로 돌릴 생각이라면, 좀 더 비싼 물건을 밀수하지 않았을까요?"
