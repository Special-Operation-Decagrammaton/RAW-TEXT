901010800340-25 = "#3;hide\n5;니코;02\n#5;h"
901010800340-26 = "#Q;니코;그렇다면 카르파초 패밀리가 대량의 게를 구매한 이유는—\n[as1] 게 파티를 열기 위해서.\n[as3] 게를 다른 곳에 팔아 차익을 남기기 위해서.\n[as2] 게와 관련된 소문을 퍼뜨리기 위해서."
901010800340-27 = "#5;hide\n3;오토기;02;뭐, 게가 너무 많다고 해서 파티를 못 열 이유는 없긴 하지.\n#3;em;…"
901010800340-28 = "3;오토기;99;하지만 카르파초 패밀리의 무서운 언니들이 화기애애한 표정으로 파티를 준비하는 모습은 쉽게 떠올리기 어렵네."
901010800340-29 = "3;오토기;00;게다가 그것만으로는 다른 식재료 없이 게만 구입한 정황도 설명되지 않아."
901010800340-30 = "3;오토기;02;분명 다른 이유가 있을 거야."
901010800340-31 = "#st;[0,0];instant;1;"
