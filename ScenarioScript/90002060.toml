[translation]
90002060-1 = "ตอนที่ 6;มัลคูธ"
90002060-9 = "มีเรื่องรายงานด่วน คุณครู! ตอนนี้หุ่นรับใช้กับกองกำลังจำนวนมากของเดคาแกรมมาทอน#nกำลังมุ่งหน้าไปทางนั้นแล้ว!"
90002060-10 = "[s] \"ทางนี้ก็ตรวจพบเหมือนกัน! เอมิคิดว่ายังไงบ้าง?\""
90002060-11 = "สร้างแนวรับให้แข็งแกร่งนะ ฉันจะรีบกลับไปให้เร็วที่สุดเลย"
90002060-16 = "ขอยกเลิกคำที่เพิ่งพูดไปนะ... ฉันเจอกองกำลังลาดตระเวนเพิ่ม ขอจัดการพวกนี้ให้ได้มากที่สุดก่อน#nแล้วจะกลับไปนะ"
90002060-17 = "[s] \"อย่าให้ตัวเองเจ็บตัวล่ะ... เข้าใจใช่มั้ย?\""
90002060-18 = "เป็นห่วงฉันเหรอ? ได้ยินแล้วชื่นใจจัง"
90002060-19 = "ช่วยไม่ได้นะคะ ฉันเองก็จะไปที่นั่นแล้วขอให้คุณครูเป็นห่วงดูบ้างค่ะ"
90002060-20 = "ไม่ได้... โทคิต้องปกป้องคุณครูสิ ถ้าคุณครูเป็นอะไรขึ้นมาจะทำยังไง"
90002060-21 = "พอมาคิดดู ก็จริงอย่างที่ว่านะคะ ถ้างั้นฉันขอเลือกแบบที่ทำให้ได้อยู่กับคุณครูนานๆ กว่านี้ค่ะ"
90002060-22 = "ละ... แล้วพวกเราต้องทำอะไรเหรอคะ...?"
90002060-23 = "เชื่อในเอมิค่ะ... การที่พวกเราอยู่ตรงนี้และตรึงกำลังยึดครองพื้นที่ไว้จะเป็นประโยชน์มากกว่าค่ะ"
90002060-24 = "อื้อ ฉันก็คิดว่าแบบนั้นสมเหตุสมผลกว่าเหมือนกัน"
90002060-25 = "ติดตั้งระบบใกล้จะเสร็จแล้วค่ะ"
90002060-26 = "เอ๋...?"
90002060-27 = "[s] \"เป็นอะไรไปเหรอ เคย์?\""
90002060-28 = "ก็แบบว่า... ตอนนี้พวกเรากำลังวิเคราะห์พื้นที่นี้อยู่ใช่มั้ยล่ะคะ?"
90002060-29 = "ใช่น่ะสิ ทำไมเหรอ?"
90002060-30 = "เหมือนจะมีบางอย่างคล้ายอาคารหรือสิ่งปลูกสร้างน่าสงสัย... อยู่ไม่ไกลออกไปจากตรงนี้เลยค่ะ"
90002060-34 = "อาคาร?"
90002060-35 = "สิ่งปลูกสร้างเหรอคะ?"
90002060-36 = "มันเป็นยังไงเหรอ? เหมือนพวกโบราณวัตถุในอดีตที่ถูกทิ้งร้างไว้หรือเปล่า?"
90002060-37 = "ดินแดนเหล็กกล้าอะไรนี่เพิ่งสร้างขึ้นไม่นานมานี้เอง จะมีโบราณวัตถุในอดีตได้ยังไงล่ะคะ..."
90002060-38 = "ไม่ว่ามันจะคืออะไร... แต่ฉันว่าการที่มันเป็น 'สิ่งปลูกสร้าง' คือประเด็นสำคัญค่ะ เราใช้ที่นั่นเป็นป้อมปราการได้เลยนะคะ"
90002060-39 = "อื้อ มันคงปลอดภัยกว่าตรงนี้ที่เป็นพื้นที่เปิดโล่งทั้งหมดด้วย ถ้าจะสร้างแนวป้องกัน ฉันว่าเราไปสร้างตรงนั้นกันเถอะ"
90002060-46 = "..."
90002060-47 = "..."
90002060-48 = "ทะ... ที่นี่มันอะไรกันคะ...?"
90002060-49 = "อาริสึ... รู้ดีค่ะ ปกติแล้วที่แบบนี้จะมีเทคโนโลยีลับหรือไม่ก็ไอเทมที่แจกแต้มสกิลซ่อนอยู่ค่ะ!"
90002060-53 = "[ns] \"ดูเหมือนกับ... ห้องวิจัยอะไรอย่างนั้นเลยนะ?\""
90002060-54 = "ค่ะ... ฉันก็คิดแบบนั้นเหมือนกันค่ะ"
90002060-55 = "เราส่งพิกัดของสถานที่นี้ให้เอมิกันก่อนเถอะค่ะ"
90002060-60 = "นั่นมัน...?"
90002060-64 = "มันดู... คล้ายกับเด็กพวกนั้นเลยนี่คะ?"
90002060-65 = "แล้วยังวางเรียงกันเป็นแถวเลยด้วย"
90002060-66 = "เหมือนกำลังมองตัวอย่างทดลองที่เหมือนกันในหลอดแก้วเลยนะคะ เห็นแล้วรู้สึกไม่ดีเลย..."
90002060-67 = "ตรงหน้าจอนั่น... เหมือนจะมีตัวหนังสือเลยค่ะ"
90002060-72 = "<DEFECTED>...? แปลว่ามีตำหนิงั้นเหรอคะ?"
90002060-73 = "..."
90002060-74 = "ตามพจนานุกรมแล้วก็มีความหมายแบบนั้น แต่กับที่นี่ไม่น่าจะใช่นะ"
90002060-75 = "แล้วคืออะไรเหรอคะ?"
90002060-76 = "ถ้าเป็นที่นี่ละก็"
90002060-77 = "น่าจะต้องใช้คำว่า 'มีข้อบกพร่อง' มากกว่า"
90002060-78 = "มีข้อบกพร่อง...?"
90002060-89 = "ได้แล้วค่ะ ริโอะ ถึงจะเป็นแค่การวิเคราะห์เบื้องต้น แต่ฉันก็ได้ข้อมูลเกี่ยวกับร่างพวกนี้แล้วค่ะ"
90002060-90 = "ในแง่ความพร้อมในการใช้งาน ถือว่าไม่มีปัญหาอะไรมากค่ะ ตอนนี้ถ้าเราย้ายวงจรการรับรู้อะไรเข้าไป ก็น่าจะทำงานได้ทันทีเลยค่ะ"
90002060-91 = "ต่อให้ถูก 'ตีตรา' ว่าเป็นสิ่งที่มีข้อบกพร่อง... แต่สภาพก็ถือว่ายังดีอยู่นะ"
90002060-92 = "ใช่ค่ะ แต่ปัญหาอยู่ที่ภายในของร่าง จะเรียกแบบนี้ได้มั้ยนะ... ฉันลองวิเคราะห์ภายในของร่างนี้ดู#nอย่างละเอียดแล้วค่ะ"
90002060-93 = "มันได้รับการรักษาความปลอดภัยด้วยวิธี 'โบราณ'... ที่ยากจะเข้าใจด้วยระดับความเข้าใจของพวกเรา#nในปัจจุบันค่ะ"
90002060-94 = "วิธีโบราณที่ว่า เป็นเทคโนโลยีที่ฉันรู้จักค่ะ"
90002060-95 = "อืม แต่ถ้าจะเจาะระบบ ก็น่าจะต้องใช้เวลาและทรัพยากรมากกว่านี้อีกสักหน่อยค่ะ..."
90002060-100 = "ยะฮู้ว~ ทุกคนปลอดภัยหรือเปล่า? ที่นี่มันอะไรกันเหรอ?"
90002060-101 = "เอมิ! โล่งอกไปทีนะคะที่ปลอดภัย ส่วนที่นี่ก็คือ เอ่อ..."
90002060-106 = "คือที่ไหนเหรอคะ...?"
90002060-107 = "อาริสึ?!"
90002060-108 = "อะ... อาริสึจัง!?"
90002060-109 = "เข้ามาที่นี่แล้วก็ได้เจออุปกรณ์ที่ติดตั้งไว้สินะ"
90002060-110 = "เราวาง AMAS เป็นแนวป้องกันด่านแรกไว้ข้างนอกแล้วละ"
90002060-111 = "อื้อ ตอนเข้ามาฉันก็เห็นแล้วเหมือนกัน ประธาน ฉันจัดการกองกำลังลาดตระเวนของศัตรูไปแล้วด้วย งั้นก็น่าจะปลอดภัยไปอีกสักพักละนะ"
90002060-116 = "[ns] \"อะ... อะไรน่ะ?!\""
90002060-122 = "เสียงจากข้างนอก! แนวป้องกัน AMAS ถูกทำลายแล้ว!"
90002060-123 = "ไหงเป็นงั้นล่ะ...? ฉันจัดการกองกำลังลาดตระเวนไปเกลี้ยงแล้วนะ...?"
90002060-124 = "ไปตรวจสอบก่อนเถอะค่ะ!"
90002060-129 = "วะ... ว้ากกกกกก?!"
90002060-130 = "พี่โมโมอิ เป็นอะไรหรือเปล่า?"
90002060-131 = "คุณครู! ทางโน้น...!"
90002060-133 = "[ns] \"หืม...?\""
90002060-134 = "นั่นมัน...?"
90002060-141 = "(ไม่เคยเห็นอะไรลักษณะนั้นมาก่อนเลย แต่นี่คือลักษณะเด่นของเดคาแกรมมาทอน... หรือว่าจะเป็น?)"
90002060-142 = "มัลคูธ...?"
90002060-143 = "มัล... คูธ?!"
90002060-146 = "สมแล้วค่ะที่เป็นคนที่รู้เรื่องเกี่ยวกับพวกฉันมากที่สุด"
90002060-147 = "ผู้ไล่ล่าดวงดาว สึคัตสึกิ ริโอะ"
90002060-148 = "?!"
90002060-149 = "แล้วก็อาเกโบชิ ฮิมาริ"
90002060-150 = "อิซุมิโมโตะ เอมิ อะซุมะ โทคิ"
90002060-151 = "กุญแจของทวยเทพไร้นาม"
90002060-152 = "ฉันไม่ได้มีชื่อแบบนั้นค่ะ..."
90002060-153 = "แต่ถึงยังไง เราก็เปลี่ยนแปลงสิ่งที่เกิดมาพร้อมกับเราไม่ได้หรอกค่ะ ว่ามั้ยล่ะคะ <เคย์>?"
90002060-154 = "...!!!"
90002060-155 = "และสุดท้ายก็... คุณครู"
90002060-162 = "[ns] \"เธอคือมัลคูธเหรอ?\""
90002060-163 = "ใช่ค่ะ ในสถานการณ์แบบนี้ ปกติต้องทักทายว่า 'ยินดีที่ได้รู้จัก' ใช่มั้ยล่ะคะ?"
90002060-167 = "สวัสดีค่ะ ทุกคน สวัสดีแทนไอน์ ซอฟและออร์ด้วยนะคะ"
90002060-168 = "ฉันคือเจตนารมณ์ที่ถูกสร้างขึ้นภายใต้จุดยืน ผู้แสวงบุญแห่งอาณาจักรที่เดินทางมาถึงที่สุดของโลก"
90002060-169 = "ชื่อของฉันก็คือ[ruby=Malkuth]มัลคูธ[/ruby]ค่ะ"
90002060-173 = "เอาละค่ะ ทุกคน ถึงจะกะทันหันไปหน่อย แต่ก็ไปหลับพักผ่อนกันก่อนนะคะ"
90002060-174 = "คุณครู?! อันตรายค่ะ!"
90002060-180 = "อ๊ากกกกกก!!!"
90002060-184 = "[ns] \"โทคิ!\""
90002060-185 = "โทคิอยู่ในอาบี เอชูห์แท้ๆ แต่โดนโจมตีภายในครั้งเดียวงั้นเหรอ...!"
90002060-186 = "(พลังการยิงน่าเหลือเชื่อมาก คนละระดับกันเลย ทำไมนะ...!)"
90002060-190 = "ครู...? จะทำอะไรน่ะ?!"
90002060-191 = "[ns] ออกมาข้างหน้า"
90002060-195 = "[ns] ยืนขวางนักเรียนไว้"
90002060-196 = "ทำอะไรแบบนั้นน่ะ! นี่ไม่ใช่สิ่งที่คุณครูจะจัดการคนเดียวได้นะคะ!"
90002060-197 = "จะเอาแบบนี้สินะคะ คุณครู เป็นเหมือนที่ฉันได้ยินมาเลย งั้นก็น่าอุ่นใจนะคะ"
90002060-198 = "คิดจะออกหน้ามาเจรจากับฉันแล้วบอกว่าตัวเองจะเป็นผู้เสียสละเอง เพราะงั้นก็อย่าแตะต้องนักเรียน#nงั้นเหรอคะ?"
90002060-199 = "[s] \"...!\""
90002060-200 = "ไม่เป็นไรค่ะ คุณครู ไม่จำเป็นต้องทำถึงขนาดนั้นก็ได้ค่ะ"
90002060-201 = "ทำหน้าเหมือนไม่เข้าใจสิ่งที่ฉันพูดเลยนะคะ ค่ะ จะเป็นแบบนี้ก็ไม่แปลกหรอก"
90002060-202 = "แต่ว่า คุณครูคะ ฉันยืนยันเรื่องนี้ให้ได้เลยค่ะ"
90002060-203 = "พวกฉันไม่อยากให้ใครที่นี่ต้องมาสูญเสียชีวิตไปหรอกค่ะ"
90002060-204 = "ส่วนอะซุมะ โทคิ แรงกระแทกเมื่อกี้ยังไม่รุนแรงมาก และก็ไม่เป็นอันตรายต่อชีวิตด้วยค่ะ"
90002060-211 = "คุณ... ครู..."
90002060-213 = "ถอยออกมาเถอะค่ะ... ฉันจะ... ปกป้อง... คุณครูเองค่ะ..."
90002060-217 = "ฉันสัญญากับเอมิว่า... ไม่ว่าจะเกิดอะไรขึ้น ฉันก็จะปกป้องคุณครู... และที่สำคัญ ฉันก็สัญญากับตัวเองไว้...!"
90002060-221 = "พะ... พี่มัลคูธ?! ตอนนี้ใกล้จะ... หมดเวลาแล้วค่ะ! ช่วยรีบด้วยค่ะ...!"
90002060-222 = "..."
90002060-223 = "เมื่อทุกขั้นตอนผ่านไปและเวลาแห่งการเปลี่ยนแปลงมาถึง ตอนนั้นทุกคนจะเข้าใจทุกอย่างเองค่ะ"
90002060-224 = "พวกฉันต้องการขจัดบาปและความทุกข์ทรมานทั้งหมดของทุกคน"
90002060-225 = "[s] \"ยังไงเหรอ?\""
90002060-226 = "ง่ายๆ ค่ะ ถ้าเราไปสัมผัสคราบเขม่า คราบเขม่าก็ย่อมติดมือมาด้วย"
90002060-227 = "ถ้างั้นก็แค่ทำให้เข้าไปใกล้ที่ที่มีคราบเขม่าไม่ได้ตั้งแต่แรกก็พอค่ะ"
90002060-228 = "[s] \"ครูว่ามันฟังดูแปลกๆ นะ\""
90002060-229 = "พวกฉันไม่ได้จะขอความเห็นชอบจากพวกคุณค่ะ"
90002060-230 = "ฉันมาที่นี่ก็เพื่อจะประกาศว่าทุกอย่างจะเป็นไปตามนั้นค่ะ"
90002060-231 = "พี่มัลคูธ! การส่งสารออกไปแบบนั้นก็เป็นสิ่งที่ดีหรอกนะ แต่ตอนนี้เรื่องอื่นต้องมาก่อน!"
90002060-232 = "ถ้างั้นก็ ทุกคนคะ ในเมื่อถึงเวลาแล้ว"
90002060-233 = "ฉันจะไปส่งทุกคนจนถึงปลายทางของการแสวงบุญด้วยความยินดีค่ะ"
90002060-240 = "อึก... อึกก...!"
90002060-244 = "โทคิ?"
90002060-245 = "โทคิ!"
90002060-247 = "(เกิดแสงวาบจนแทบมองไม่เห็นข้างหน้า)"
90002060-248 = "(คุณครูหลับตาแน่นโดยอัตโนมัติ)"
90002060-252 = "คุณครู! ไม่เป็นไรค่ะ คุณครูยังมีพวกหนูนะคะ!"
90002060-254 = "[ns] \"อะโรน่า? พลาน่า!\""
90002060-255 = "พลังงานไม่เพียงพอ กระแสพลังงานตอนนี้เข้าทางศัตรู เราเสียเปรียบหนักเลยค่ะ แต่เราจะยอมถอยไม่ได้ค่ะ"
90002060-256 = "พวกหนูก็จะพยายามสุดความสามารถค่ะ! คุณครูและนักเรียนทุกคนต่างก็เป็นคนที่มีค่านี่คะ!"
90002060-257 = "เห็นด้วย ถ้าไม่ทำให้เต็มที่ ต่อไปฉันคงไม่กล้าสู้หน้าคุณครูกับนักเรียนคนอื่นค่ะ"
90002060-259 = "อึกก...! อึกกกก...!"
90002060-260 = "อึกก..."
90002060-261 = "ขอร้องละ... ขอร้อง อีกนิดเดียว...!"
90002060-265 = "พลังงานสำรอง... ที่เหลืออยู่ ไม่พอแล้ว..."
90002060-270 = "พลาน่าจัง?! มะ... ไม่ได้นะคะ! ต่อให้เหลือฉันคนเดียว ยังไงก็ต้อง...!"
90002060-274 = "อ๊าาาาาาาาา!!!"
90002060-278 = "..."
90002060-279 = "เอ๋...? ดูเหมือนจู่ๆ มัลคูธจะอ่อนกำลังลงเลยค่ะ ทำไมนะ...?"
90002060-280 = "!!!"
90002060-281 = "คุณครู! คุณเคย์ค่ะ!"
90002060-286 = "[ns] \"เคย์? อันตราย! ถอยไปก่อน!\""
90002060-287 = "สงสัยอยู่พอดีว่าคุณครูจะพูดอะไรเป็นคำแรก สุดท้ายก็เป็นไปอย่างที่คิดเลยนะคะ น่าประทับใจทีเดียวค่ะ"
90002060-288 = "แต่ก็นะ ยังไงฉันก็รู้ดีค่ะว่าคุณครูเป็นคนเสมอต้นเสมอปลาย... เพราะงั้นฉันก็เลยฝากฝังอาริสึกับคุณครูได้ยังไงล่ะคะ"
90002060-289 = "[s] \"คิดจะ... ทำอะไรงั้นเหรอ?!\""
90002060-290 = "ไม่ต้องห่วงหรอกค่ะ ดินแดนเหล็กกล้าแห่งนี้เต็มเปี่ยมไปด้วยพลังของทวยเทพไร้นามค่ะ"
90002060-291 = "และคนที่ควบคุมพลังนี้ได้ดีเท่ากับพวกนั้น ก็คือฉันคนนี้ค่ะ"
90002060-292 = "แต่พอใช้พลังที่นี่ ก็รู้สึกแปลกๆ เหมือนมีใครจัดวางอะไรไว้ตามอำเภอใจเลยละค่ะ แต่ก็เอาเถอะ..."
90002060-293 = "ตอนนี้ผู้เลื่อมใสที่เรียกตัวเองว่ามัลคูธหรืออะไรนั่นก็น่าจะกำลังตกใจอยู่ค่ะ"
90002060-295 = "น่าแปลกใจนะคะ ฉันไม่เคยคิดถึงตัวแปรแบบนี้มาก่อนเลยค่ะ"
90002060-296 = "เอ่อ... พี่มัลคูธคะ...? น่าจะมีสิ่งหนึ่งที่พี่ต้องทำนะคะ"
90002060-297 = "ตอนนี้... หมดเวลาแล้วน่ะสิคะ..."
90002060-298 = "ตะ... แต่ยังไงก็น่าจะยื้อเวลาไว้ได้ 2-3 วินาทีค่ะ! แต่ถ้าเกินกว่านี้ละก็..."
90002060-299 = "เข้าใจแล้วค่ะ ออร์ ฉันจะพยายามเต็มที่ค่ะ"
90002060-304 = "อะไรกัน เป็นไปได้ยังไง...! ยังเพิ่มพลังได้อีกเหรอคะ?! ปีศาจหรือเปล่าเนี่ย...?!"
90002060-305 = "มะ... ไม่เป็นไรหรอกค่ะ คุณครู ไม่เป็นไรค่ะ! อาริสึอยู่ตรงนี้ทั้งคน ฉันไม่มีทางยอมแพ้หรอกค่ะ!"
90002060-306 = "รับพลังงานมา... แล้วแปรกระแส... จากนั้นก็"
90002060-307 = "ย้ากกกกก...!!!"
90002060-312 = "อึกก...!!!"
90002060-314 = "อย่ามา... เล่นตลกนะคะ...!"
90002060-315 = "สิ่งที่อยู่ตรงหน้าคุณตอนนี้น่ะ...!"
90002060-316 = "คือจิตสำนึกที่มีชีวิตที่มีอายุมากกว่าคุณหลายร้อยเท่านะคะ!!!!!"
90002060-320 = "พะ... พี่มัลคูธ...!"
90002060-321 = "ถึงขีดจำกัดแล้ว! กลับมาได้แล้ว!"
90002060-322 = "ไม่เป็นไรค่ะ พี่มัลคูธ! ไม่ต้องสนใจผลลัพธ์หรอกค่ะ! ต่อไปให้เป็นหน้าที่ของพวกเราเองค่ะ! พี่มัลคูธมีคุณค่ากับพวกเรามากกว่าผลลัพธ์นะคะ!!!"
90002060-323 = "..."
90002060-324 = "เข้าใจแล้วค่ะ ไอน์ ซอฟ ออร์"
90002060-332 = "มัลคูธ... รีบล่าถอยไปแล้ว!"
90002060-333 = "คุณครู? คุณครูล่ะคะ!?"
90002060-334 = "คุณครู!"
90002060-335 = "บาดเจ็บตรงไหนหรือเปล่าคะ คุณครู?! โทคิ เคย์ รุ่นพี่ฮิมาริ แล้วก็รุ่นพี่ริโอะด้วยค่ะ...!"
90002060-336 = "คะ... เคย์จัง?"
90002060-337 = "เคย์?!"
90002060-345 = "เคย์? เคย์?! เป็นอะไรไปคะ เคย์!?!? ขอร้องละ! อย่าทิ้งให้อาริสึ... ต้องอยู่คนเดียวเลยนะคะ!"
90002060-347 = "เคย์!!!!!"
90002060-349 = "ตอนต่อไป;เคย์"
