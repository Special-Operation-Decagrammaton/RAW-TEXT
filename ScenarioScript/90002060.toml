[translation]
90002060-1 = "Episode 6;Malkuth"
90002060-9 = "Sensei, I have an urgent report! Multiple Laborers and Decagrammaton units are approaching your location!"
90002060-10 = "[s] \"Confirmed! They're in our sights. What's your call, Eimi?\""
90002060-11 = "Form a defensive line. I'll return ASAP for support."
90002060-16 = "...Scratch that. Additional recon units spotted. I'll cull what I can, then make my return."
90002060-17 = "[s] \"Don't get hurt...okay?\""
90002060-18 = "Are you worried about me? That's happy to hear."
90002060-19 = "The situation must be handled. I will join you, so Sensei can worry about me too."
90002060-20 = "...No, you should protect Sensei, Toki. You can't let them get hurt."
90002060-21 = "Upon further consideration, I will remain here. This option allows me to stay beside Sensei for an extended period."
90002060-22 = "Wh-What should we do...?"
90002060-23 = "...Let's trust Eimi. We'll be more helpful if we defend this location."
90002060-24 = "Agreed. I think that's the most rational approach."
90002060-25 = "The system setup is almost complete."
90002060-26 = "Eh...?"
90002060-27 = "[s] \"What's wrong, Kei?\""
90002060-28 = "So... We were currently analyzing this area, correct?"
90002060-29 = "Clearly. What's the matter?"
90002060-30 = "There seems to be a notable structure—a facility—nearby."
90002060-34 = "A facility?"
90002060-35 = "You mentioned a structure?"
90002060-36 = "Like what? Some ancient abandoned ruins, maybe?"
90002060-37 = "...This Steel Continent, or whatever we're calling it, was recently made. How could there be \"ruins\"?"
90002060-38 = "But, to put the pieces together for you, the point is that it is a \"structure.\" With walls. We can use it as a defensive base if necessary."
90002060-39 = "Got it. It beats standing out in the open like this. Let's shore up our defenses there."
90002060-46 = "..."
90002060-47 = "..."
90002060-48 = "Wh-What is this place...?"
90002060-49 = "I know! Special, secret relics and legendary skill items are always hidden in places like this!"
90002060-53 = "[ns] \"Is this...some sort of a research center?\""
90002060-54 = "Yes... That's also how I see it."
90002060-55 = "I'll relay our coordinates to Eimi."
90002060-60 = "That's...?"
90002060-64 = "Doesn't this look like...those kids?"
90002060-65 = "There are multiple units, lined up side by side."
90002060-66 = "Identical experiments are floating in these glass tubes. Ugh, this feels gross..."
90002060-67 = "This tube... Its console is logging an error."
90002060-72 = "\"Defected\"...? Does this mean this one was faulty?"
90002060-73 = "..."
90002060-74 = "That's one definition, but I doubt it applies here."
90002060-75 = "Is that so?"
90002060-76 = "If that were the case, I think a word like..."
90002060-77 = "...\"flawed\" would work better."
90002060-78 = "Flawed...?"
90002060-89 = "Enough speculation, Rio. Although it's only a preliminary analysis, I've gleaned some information."
90002060-90 = "There are no major flaws in the unit's mobility. In fact, we could get it moving immediately if we implanted it with a consciousness circuit."
90002060-91 = "So, despite being \"branded\" as flawed... I suppose it's in good condition."
90002060-92 = "Correct. But beyond that... I tried running a detailed analysis on the body's interior."
90002060-93 = "It's esoteric, to say the least. It's protected with so-called \"ancient\" methods that are difficult to parse."
90002060-94 = "She says \"ancient\" because it's odd, but not entirely unfamiliar."
90002060-95 = "Hmm. I feel like I could bypass it if given more time and resources..."
90002060-100 = "Yoohoo! Is everyone all right? What is this place?"
90002060-101 = "Eimi! I am so glad that you are safe. This place is...uh..."
90002060-106 = "...What goes on here, exactly?"
90002060-107 = "Aris?!"
90002060-108 = "A-Aris?!"
90002060-109 = "It looks like some sort of facility?"
90002060-110 = "Yes. We've also used AMAS to establish a first line of defense outside the building's walls."
90002060-111 = "Right. I confirmed the same, President. I eliminated the recon forces too, so we should be secure for now."
90002060-116 = "[ns] \"Wh-What was that?!\""
90002060-122 = "Outside! They've breached the AMAS!"
90002060-123 = "How...? I took out all the reconnaissance units..."
90002060-124 = "Let's see for ourselves!"
90002060-129 = "Wh-Whoaaa!"
90002060-130 = "Momoi, are you okay?"
90002060-131 = "Sensei! Over there...!"
90002060-133 = "[ns] \"Huh...?\""
90002060-134 = "That's...?"
90002060-141 = "(A new being... But with a clear resemblance to Decagrammaton... Could it be?)"
90002060-142 = "...Malkuth?"
90002060-143 = "Malkuth?!"
90002060-146 = "As is to be expected of the seeker of the grand knowledge."
90002060-147 = "Tsukatsuki Rio, the one who chases stars."
90002060-148 = "?!"
90002060-149 = "Akeboshi Himari."
90002060-150 = "Izumimoto Eimi, Asuma Toki."
90002060-151 = "Key of the Nameless Gods."
90002060-152 = "...That's not my name, I'm—"
90002060-153 = "One cannot change what one is born bearing. Does that not hold true, \"Kei\"?"
90002060-154 = "...!!"
90002060-155 = "Lastly, Sensei."
90002060-162 = "[ns] \"So, you're Malkuth?\""
90002060-163 = "I am. I believe proper pleasantries must be exchanged at times like these."
90002060-167 = "Hello, all. On behalf of Ein, Sof, and Ohr, I offer greetings."
90002060-168 = "I am the will brought forth from the flagship, the pilgrim of the kingdom at world's end."
90002060-169 = "My name is Malkuth."
90002060-173 = "You appear weary. I believe it is time to rest."
90002060-174 = "?! Sensei! Watch out!"
90002060-180 = "Aaaaaah!"
90002060-184 = "[ns] \"Toki!\""
90002060-185 = "She crumpled Toki's Abi-Eshuh with a single blow...!"
90002060-186 = "(Unfathomable firepower. We're outclassed. What in the...?!)"
90002060-190 = "...? Sensei...? What are you trying to do?!"
90002060-191 = "[ns] Step forward."
90002060-195 = "[ns] Stand in front of your students."
90002060-196 = "What do you think you're doing?! You don't have a chance."
90002060-197 = "So this is your soul, Sensei... It is such a relief to see you rise to your lofty reputation."
90002060-198 = "Are you considering a grand gesture, perhaps by volunteering yourself as a sacrifice, in exchange for the lives of your students?"
90002060-199 = "[s] \"...!\""
90002060-200 = "Be not afraid, Sensei. You do not need to offer so much."
90002060-201 = "You appear confused. That is an expected and natural reaction."
90002060-202 = "Sensei. I intend to make one unassailable truth clear."
90002060-203 = "I do not wish to take the life of anyone here."
90002060-204 = "Asuma Toki suffered but a moderate shock. She shall recover."
90002060-211 = "Sen...sei..."
90002060-213 = "Please, step back... I'll...protect...you..."
90002060-217 = "No matter what, I must protect Sensei... I promised Eimi...and above all, MYSELF...!"
90002060-221 = "Elder Sister?! It's almost time! Please hurry...!"
90002060-222 = "..."
90002060-223 = "Once everything is complete and the transition washes over you, you too will come to understand."
90002060-224 = "I say that you shall be freed of sin and suffering."
90002060-225 = "[s] \"How?\""
90002060-226 = "It is simple. In the act of touching burned ash, you will be marred with soot."
90002060-227 = "The only prevention is to free you from the temptation of fire."
90002060-228 = "[s] \"That's a strange way to approach it.\""
90002060-229 = "We seek not your approval."
90002060-230 = "We only seek to herald the truth that shall come to pass."
90002060-231 = "Elder Sister! Thanks for preaching the gospel and everything, but please stay focused!"
90002060-232 = "Very well. The time is upon us."
90002060-233 = "I will gladly see you off at the end of your pilgrimage."
90002060-240 = "Ugh... Augh...!"
90002060-244 = "Toki?"
90002060-245 = "Toki!"
90002060-247 = "A blinding flash surrounded me."
90002060-248 = "I instinctively closed my eyes."
90002060-252 = "Sensei! It's okay. We're here!"
90002060-254 = "[ns] \"Arona? Plana!\""
90002060-255 = "Insufficient power output. The energy flow puts us at a disadvantage. But we cannot back down."
90002060-256 = "Still, we'll try our best! It's all for Sensei and the students, right?"
90002060-257 = "Agreed. If I fail to do my best, then I have no right to show my face again."
90002060-259 = "Ugh...! Urgh...!"
90002060-260 = "...Ack..."
90002060-261 = "Please... please, just a bit longer...!"
90002060-265 = "Insufficient...stored energy..."
90002060-270 = "Plana?! N-No! At least I need to...!"
90002060-274 = "Yaaaaaaaah!!!"
90002060-278 = "..."
90002060-279 = "Huh...? It feels like Malkuth is losing power. How...?"
90002060-280 = "!!"
90002060-281 = "Sensei! It's Kei!"
90002060-286 = "[ns] \"Kei? It's dangerous! Get back!\""
90002060-287 = "Here I was wondering what you would say, and it's exactly what I thought. I'm impressed, in a way."
90002060-288 = "...You're nothing if not consistent. That's how I know I can entrust Aris to you."
90002060-289 = "[s] \"What...are you trying to do?!\""
90002060-290 = "Don't worry. The Steel Continent is overflowing with the power of the Nameless Gods."
90002060-291 = "And the only one who can control that power like they do...is me."
90002060-292 = "...It's been rearranged in a new, unpredictable way, but, nevertheless..."
90002060-293 = "I'm sure that Malkuth, or whatever prophet she is, is also confused."
90002060-295 = "Surprising. An unexpected variable."
90002060-296 = "Elder Sister...? I need to tell you one important thing."
90002060-297 = "We just hit the...time limit..."
90002060-298 = "I-I can buy you a few seconds, but—"
90002060-299 = "Understood, Ohr. I shall give my all."
90002060-304 = "What the, there's no way...! She's giving out even MORE power?! What kind of monster is she?!"
90002060-305 = "I-It's okay, Sensei. Relax! I'm not falling like this, not while Aris is here!"
90002060-306 = "Take the energy... Rectify it... And return it...!"
90002060-307 = "Aaaaaahhh!!"
90002060-312 = "Ugh...!!"
90002060-314 = "Don't...play with me, kid...!"
90002060-315 = "Because right in front of you..."
90002060-316 = "...is a consciousness hundreds of years your elder!!"
90002060-320 = "E-Elder Sister...!"
90002060-321 = "We're really at our limit! Come back, now!"
90002060-322 = "Elder Sister! Don't worry about the results! We'll figure it out! You're more important to us than ANY of that!"
90002060-323 = "..."
90002060-324 = "Understood, Ein, Sof, and Ohr."
90002060-332 = "Malkuth...retreated!"
90002060-333 = "Sensei? What about Sensei?!"
90002060-334 = "Sensei!"
90002060-335 = "Are you okay, Sensei?! Toki, Kei, Himari, Rio...!"
90002060-336 = "K-Kei...?"
90002060-337 = "Kei?!"
90002060-345 = "Kei? Kei?! Are you okay, Kei?! Please! KEI! Do not... You CANNOT leave me!"
90002060-347 = "Kei!!"
90002060-349 = "Next Episode;Kei"
