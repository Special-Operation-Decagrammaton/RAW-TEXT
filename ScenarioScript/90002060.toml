[translation]
90002060-1 = "第6話;馬爾庫特"
90002060-9 = "老師，有緊急情況要報告！#n大量的勞工機器人和十字神名的兵力正在往那邊前進！"
90002060-10 = "[s]「我們這邊也確認到了！英美的判斷如何呢？」"
90002060-11 = "請建立防線吧。#n我也會儘快返回的。"
90002060-16 = "……剛才的話當我沒說。確認到了額外的偵察兵力。#n我會盡可能打倒它們後再回去。"
90002060-17 = "[s]「不能受傷哦……知道嗎？」"
90002060-18 = "是在擔心我嗎？真令人高興呢。"
90002060-19 = "沒辦法了。我也要前往現場，好讓老師為我擔心。"
90002060-20 = "……不行，季必須保護老師。#n萬一老師出事的話該怎麼辦。"
90002060-21 = "這麼說也有道理。#n那我就選擇能陪在老師身邊更久的方案吧。"
90002060-22 = "現，現在該怎麼做呢……？"
90002060-23 = "……相信英美吧。#n我們提高這個區域的佔領度會更有幫助。"
90002060-24 = "沒錯，我也認為那樣比較合理。"
90002060-25 = "系統建構也幾乎已經完成了。"
90002060-26 = "咦……？"
90002060-27 = "[s]「Kei，怎麼了？」"
90002060-28 = "就是……我們剛才不是在分析這片區域嗎？"
90002060-29 = "是這樣沒錯。為什麼這麼問？"
90002060-30 = "在不遠處似乎有個讓人在意的結構物……好像是某種設施。"
90002060-34 = "設施？"
90002060-35 = "是結構物嗎？"
90002060-36 = "會是什麼呢？像是很久以前被遺棄的古代遺跡之類的嗎？"
90002060-37 = "鋼鐵大陸本身都才形成沒多久而已，哪來什麼遺跡啊……"
90002060-38 = "話雖如此……那個「結構物」本身應該還挺重要的。#n有必要的時候，搞不好能當成防禦據點來使用。"
90002060-39 = "確實。反正總比四面八方都暴露在外的這裡要來得安全。#n既然要建立防線，就改在那裡進行吧。"
90002060-46 = "……"
90002060-47 = "……"
90002060-48 = "這，這裡是……？"
90002060-49 = "愛麗絲……知道。#n這種地方通常會藏著祕密技術或技能點數道具！"
90002060-53 = "[ns]「感覺……有點像間研究室？」"
90002060-54 = "是啊……我也這麼認為。"
90002060-55 = "先把這裡的座標傳給英美吧。"
90002060-60 = "那是……？"
90002060-64 = "這個……是不是有點像那些孩子？"
90002060-65 = "而且還有好多個體並排在這裡。"
90002060-66 = "簡直就像裝在玻璃管中的相同實驗體樣本一樣……#n唔哇，真噁心……"
90002060-67 = "這個玻璃管……盒子上好像寫著什麼東西。"
90002060-72 = "「DEFECTED」……？#n是瑕疵品的意思嗎？"
90002060-73 = "……"
90002060-74 = "雖然字面上可以這麼解釋，不過這裡應該不是這個意思才對。"
90002060-75 = "那麼是什麼意思呢？"
90002060-76 = "我想這應該……"
90002060-77 = "是「帶有缺陷」的意思。"
90002060-78 = "帶有缺陷？"
90002060-89 = "好了，莉央。雖然只經過初步分析，不過已經取得這些素體的資訊了。"
90002060-90 = "它們在可動性方面並沒有太大的問題，只要植入類似意識迴路的裝置就能立刻運作。"
90002060-91 = "雖然被打上了「帶有缺陷」的烙印，狀態卻還算不錯啊……"
90002060-92 = "沒錯。不過關於更深層的內部資訊……我有嘗試對這些素體內部進行詳細分析。"
90002060-93 = "然而以我們目前的技術，恐怕難以解析……#n也就是說，它被以一種「古代」的方式進行了加密保護。"
90002060-94 = "之所以說是「古代」的方式，是因為我有嘗試接觸過的關係。"
90002060-95 = "唔，要是能多給我一些時間與預算的話，應該有辦法破解的說……"
90002060-100 = "呀齁～大家都沒事吧？#n這裡是用來做什麼的地方啊？"
90002060-101 = "英美！你沒事真是太好了。#n那個，這裡是……"
90002060-106 = "……是哪裡咧？"
90002060-107 = "愛麗絲！？"
90002060-108 = "愛，愛麗絲醬！？"
90002060-109 = "看來是發現了設置在這裡的設施啊。"
90002060-110 = "我在設施外部用AMAS建立了第一道防線。"
90002060-111 = "嗯，那部分也確認完畢了，會長。#n敵方的偵察兵力也已經處理完畢，短時間內應該是安全的。"
90002060-116 = "[ns]「怎，怎麼了！？」"
90002060-122 = "是外面！確認AMAS防線全滅！"
90002060-123 = "怎麼會……？#n我明明已經把偵查兵力消滅了啊……？"
90002060-124 = "先去確認吧！"
90002060-129 = "唔，唔哇啊啊啊啊！？"
90002060-130 = "姐姐，你沒事吧？"
90002060-131 = "老師！那邊……！"
90002060-133 = "[ns]「咦……？」"
90002060-134 = "那是……？"
90002060-141 = "（從來沒見過的型態。不過特徵明顯屬於十字神名……難道說？)"
90002060-142 = "……馬爾庫特？"
90002060-143 = "馬爾庫特！？"
90002060-146 = "不愧是最瞭解我們的人。"
90002060-147 = "追逐星辰之人，調月莉央。"
90002060-148 = "！？"
90002060-149 = "還有明星陽葵。"
90002060-150 = "和泉元英美和飛鳥馬季。"
90002060-151 = "無名之神的鑰匙。"
90002060-152 = "我的名字並不是那樣──"
90002060-153 = "不過與生俱來的東西是無法改變的。#n對吧，Kei？"
90002060-154 = "……！！！"
90002060-155 = "最後是老師。"
90002060-162 = "[ns]「你是馬爾庫特？」"
90002060-163 = "沒錯。在這種時候，應該要說初次見面對吧。"
90002060-167 = "各位好。這是來自Ain、Soph與Aur的問候。"
90002060-168 = "我是在旗幟之下被創造出來的一股意志──到達世界盡頭的王國巡禮者。"
90002060-169 = "[ruby=Malkuth]馬爾庫特[/ruby]。"
90002060-173 = "那麼各位。#n雖然有點突然，麻煩你們在這裡好好休息一段時間吧？"
90002060-174 = "老師！危險！"
90002060-180 = "啊啊啊啊啊──！！！"
90002060-184 = "[ns]「季！」"
90002060-185 = "只靠一擊就把Abi-Eshuh狀態的季……！"
90002060-186 = "（這個火力太誇張了，我們根本不是對手。這到底是……！)"
90002060-190 = "老師……？你打算做什麼！？"
90002060-191 = "[ns] 走上前去"
90002060-195 = "[ns] 擋在學生前面"
90002060-196 = "這是在做什麼！#n老師一個人怎麼可能應付得了！"
90002060-197 = "你果然會站出來啊，老師。#n看見你跟我想的一樣，我就放心了。"
90002060-198 = "是打算來場犧牲自己，換取不傷害學生的談判嗎？"
90002060-199 = "[s]「……！」"
90002060-200 = "沒事的，老師。你沒有必要做到這種地步。"
90002060-201 = "表情似乎相當疑惑呢。#n是啊，會有這種反應也是正常的。"
90002060-202 = "不過老師，唯有這點我可以明確地告訴你。"
90002060-203 = "我們並不想讓在場的任何人喪命。"
90002060-204 = "就連飛鳥馬季也是，我只是給了他一個不至於危及生命的衝擊而已。"
90002060-211 = "老……師……"
90002060-213 = "請快躲開……我會，保護你的……"
90002060-217 = "無論發生什麼事，都要保護老師……和英美……#n還有最重要的，我自己……"
90002060-221 = "姐，姐姐大人！？#n時間所剩不多了！請，請加快動作……！"
90002060-222 = "……"
90002060-223 = "當所有過程結束，迎來轉換的那一刻，各位也會理解一切的。"
90002060-224 = "因為我們將會杜絕你們所有的罪與痛苦。"
90002060-225 = "[s]「要用什麼樣的方式？」"
90002060-226 = "道理很簡單──觸碰燒焦處，自會沾上焦痕。"
90002060-227 = "既然如此，只要從一開始就讓人無法靠近燒焦處就行了。"
90002060-228 = "[s]「我覺得那樣有點不太對。」"
90002060-229 = "我們並不是來徵求各位的同意。"
90002060-230 = "只是前來宣告一切都將如此而已。"
90002060-231 = "姐姐大人！傳遞福音固然好，但是現在請優先處理別的事情！"
90002060-232 = "各位，時機已經成熟。"
90002060-233 = "我會懷著喜悅的心情，目送各位走向巡禮的終點。"
90002060-240 = "咳……唔……！"
90002060-244 = "季？"
90002060-245 = "季！"
90002060-247 = "（極其刺眼的閃光遮蔽了視野）"
90002060-248 = "（反射性地閉上雙眼）"
90002060-252 = "老師！沒問題的！有我們在！"
90002060-254 = "[ns]「彩奈？星奈！」"
90002060-255 = "輸出不足。能量流動對我們相當不利。但是不能就此退縮。"
90002060-256 = "我們會竭盡全力的！老師和學生們，都是重要的人！"
90002060-257 = "同意。如果不竭盡全力，就無顏面對老師與學生們了。"
90002060-259 = "唔……！唔唔唔……！"
90002060-260 = "哈唔……"
90002060-261 = "拜託……拜託，再堅持一下……！"
90002060-265 = "儲藏能量……剩餘不足……"
90002060-270 = "星奈醬！？#n不，不行！就算只有我也……！"
90002060-274 = "唔啊啊啊啊啊啊啊！！！"
90002060-278 = "……"
90002060-279 = "咦……？馬爾庫特的輸出好像突然減弱了。#n為什麼呢……？"
90002060-280 = "！！！"
90002060-281 = "老師！是Kei！"
90002060-286 = "[ns]「Kei？這樣很危險！快退後！」"
90002060-287 = "本來還期待你會說點什麼， 結果果然如我所料啊。#n某方面來說，我還挺佩服你的。"
90002060-288 = "……不過，這也讓我再次明白老師是個始終如一的人。#n所以我才能把愛麗絲託付給你。"
90002060-289 = "[s]「什麼……你打算做什麼！？」"
90002060-290 = "不必擔心。這片鋼鐵大陸充滿了無名之神的力量。"
90002060-291 = "而能像那些傢伙一樣操控這股力量的人，就是我。"
90002060-292 = "……雖然實際在這裡用起來才發現，有種經過改造而有點陌生的感覺就是了。"
90002060-293 = "那位叫馬爾庫特之類的的自稱預言者應該也很疑惑吧。"
90002060-295 = "真讓人意外。我倒是沒想到這個變數呢。"
90002060-296 = "那個……姐姐大人……？#n有件事姐姐大人好像必須知道。"
90002060-297 = "就是……時間限制已經到了……"
90002060-298 = "如，如果只有幾秒，我會想辦法盡量爭取！#n不過要是再多的話就……"
90002060-299 = "我明白了，Aur。#n接下來我會全力以赴的。"
90002060-304 = "什麼，這怎麼可能……！#n輸出竟然還能再上升！？那到底是什麼怪物啊……！？"
90002060-305 = "沒，沒事的，老師。我沒事的！#n現在愛麗絲也在，我可不打算在這裡倒下！"
90002060-306 = "接收能量……整流……再輸出……"
90002060-307 = "唔啊啊啊啊──！！！"
90002060-312 = "唔──！！！"
90002060-314 = "別開……玩笑了……！"
90002060-315 = "現在站在你面前的……！"
90002060-316 = "可是比你古老幾百倍的意識體啊！！！！！"
90002060-320 = "姐，姐姐大人……"
90002060-321 = "真的到極限了！必須趕快回來才行！"
90002060-322 = "沒關係的，姐姐大人！結果怎樣都好！我們會想辦法的！#n比起那些事情，我們更重視姐姐大人啊！！！"
90002060-323 = "……"
90002060-324 = "我明白了，Ain、Soph、Aur。"
90002060-332 = "馬爾庫特……迅速撤退了！"
90002060-333 = "老師，老師呢！？"
90002060-334 = "老師！"
90002060-335 = "你還好嗎，老師！？#n季、Kei、陽葵前輩、莉央前輩……！"
90002060-336 = "K，Kei醬……？"
90002060-337 = "Kei！？"
90002060-345 = "Kei？Kei！？你沒事吧，Kei！？#n拜託！請不要……請不要留下愛麗絲一個人！"
90002060-347 = "Kei！！！！！"
90002060-349 = "下一話;Kei"
