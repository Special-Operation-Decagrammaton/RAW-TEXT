[translation]
90002240-1 = "第24話;合一之空"
90002240-3 = "都上船了嗎？馬爾庫特呢？"
90002240-4 = "搬運完成了。隨時可以出發。"
90002240-9 = "季，拜託你了。"
90002240-10 = "是，莉央大人。#n我們準備起飛。"
90002240-18 = "……"
90002240-19 = "為什麼要救我？"
90002240-20 = "[s]「總覺得應該這麼做。」"
90002240-21 = "我曾是你們的敵人。"
90002240-22 = "[s]「現在已經不是了。」"
90002240-23 = "或許某天又會成為敵人也說不定。"
90002240-24 = "[s]「你會那樣嗎？」"
90002240-28 = "……"
90002240-29 = "我不太清楚。"
90002240-30 = "鋼鐵大陸是我的一切。"
90002240-31 = "我在那裡醒來，遇見了Ain、Soph和Aur。"
90002240-35 = "……"
90002240-36 = "現在，已經再也見不到了呢。"
90002240-37 = "真的……變成這樣了呢。"
90002240-38 = "……嗚。"
90002240-39 = "應該多抱抱他們的。"
90002240-40 = "應該多摸摸他們的頭，多跟他們說說話的。"
90002240-41 = "如果知道會變成這樣，我肯定不會那麼做的。"
90002240-42 = "如果，能事先知道的話……"
90002240-43 = "[s]「……」"
90002240-48 = "老師？"
90002240-50 = "[ns1]「假設……這真的只是假設而已。」\n[ns2]「要是我什麼都沒做的話，那些孩子能夠活下來嗎。」"
90002240-54 = "……"
90002240-55 = "我認為結果應該不會改變。#n那些孩子的身體已經開始崩壞了……"
90002240-56 = "[s3]「即便如此，假如我什麼都不做的話……」\n[s4]「哪怕只有一分鐘，甚至一秒鐘也好……」\n[s5]「那些孩子是不是就能多活久一點了呢。」"
90002240-60 = "你感到自責嗎，老師？"
90002240-61 = "對於……那種無法承擔的責任。"
90002240-62 = "……"
90002240-63 = "我這個人……只會說出討人厭的話。#n一直以來都是如此，我也漸漸覺得這是無可奈何的事了。"
90002240-64 = "所以，如果非要在這裡說點讓人討厭的話……#n撇開情感不提，只談論發生過的事實……"
90002240-65 = "那些孩子，終究是企圖隨心所欲改變奇普托斯的孩子。"
90002240-66 = "他們有自己的苦衷、理由和想法……#n或許從他們的立場來看，這麼做確實是為了拯救大家。"
90002240-67 = "然而在變成鋼鐵大陸的奇普托斯生活，會是什麼情況呢？#n那……是在奇普托斯生活的人們有辦法承受的嗎？"
90002240-68 = "那些孩子……犯了錯。就像曾經的我一樣。"
90002240-69 = "但是，如果要問那是否有嚴重到必須迎來這樣的結果……"
90002240-70 = "很抱歉……這點我也不太清楚。#n畢竟沒有人受傷，也沒有造成實際的損害……"
90002240-72 = "……"
90002240-77 = "[ns]「……莉央真實的感想如何呢？」"
90002240-79 = "……"
90002240-80 = "我曾經說過，不想再犯錯和失敗了。"
90002240-81 = "換句話說，那也代表不想再後悔的意思。"
90002240-82 = "不過……或許就是因為這樣吧。#n想要控制所有變數，想要為所有可能性做好準備……"
90002240-83 = "然而結果卻……"
90002240-84 = "莉央前輩……"
90002240-85 = "謝謝你。"
90002240-86 = "咦……？"
90002240-87 = "你叫莉央對吧？#n謝謝你。"
90002240-88 = "謝謝你願意……為我的妹妹們感到悲傷。"
90002240-89 = "我……我只是，對於無法接受的事情……"
90002240-90 = "這樣啊。"
90002240-91 = "即使如此，現在那也已經足夠了。"
90002240-95 = "Kei也好，老師也好。"
90002240-96 = "還有在這裡的所有人。"
90002240-97 = "真的……很謝謝你們。"
90002240-102 = "……"
90002240-103 = "嗚……"
90002240-104 = "嗚嗚……我無法接受……到現在還是無法接受……"
90002240-105 = "為什麼……為什麼……！"
90002240-106 = "[s]「……」"
90002240-111 = "[ns]「你接下來想做什麼？」"
90002240-112 = "……不知道。"
90002240-113 = "那種事情，我之前從來沒有想過。"
90002240-114 = "但是……"
90002240-116 = "[log=아인]我們，希望姐姐大人能活下去。[/log]"
90002240-117 = "[log=소프]無論我們會變成怎樣，都希望姐姐大人能活下去。[/log]"
90002240-120 = "[log=오르]去看更多東西、遇見更多的人──[/log]"
90002240-121 = "[log=오르]感受更多事物。[/log]"
90002240-124 = "[log=아인]要比我們……更多更多。[/log]"
90002240-127 = "他們說希望我能活下去。"
90002240-128 = "雖然那是什麼，有著什麼樣的意義……我現在還不太清楚。"
90002240-129 = "不過既然那是Ain、Soph和Aur最後留下的話……"
90002240-130 = "我覺得自己應該試著那麼做。"
90002240-131 = "即使在被製造出來之後，沒能達成目的就被拋棄了……"
90002240-132 = "那種事其實無所謂吧。"
90002240-133 = "……？"
90002240-134 = "我也同樣是被製造出來的。"
90002240-135 = "失去了目的、遺忘了初衷，必須從現在開始重新思考……"
90002240-136 = "但我認為，這並不代表無法活下去。"
90002240-138 = "沒，沒錯！自己究竟是誰……終究只能由自己來決定！#n這點對任何人來說都是一樣的！"
90002240-139 = "……"
90002240-140 = "對你們而言，這樣的問題或許並不困難……"
90002240-145 = "不，我們也是一樣的。"
90002240-146 = "是啊。如果那麼簡單的話，大家也不必這麼辛苦了。"
90002240-151 = "……"
90002240-152 = "話說，也差不多該停止區分「你們」和「我們」之類的了吧……？"
90002240-154 = "嗯？可是我和你們之間……"
90002240-156 = "不是那樣的。#n我認為……我們大家的處境其實都一樣。"
90002240-157 = "這跟是如何醒來，或者如何誕生的都沒有關係。"
90002240-162 = "……"
90002240-163 = "可是……這樣真的可以嗎？"
90002240-164 = "[s]「我個人認為可以，大家覺得呢？」"
90002240-177 = "……"
90002240-179 = "謝謝你們。"
90002240-181 = "……"
90002240-182 = "……"
90002240-183 = "綠？你還好嗎？"
90002240-184 = "咦？嗯……我沒事，姐姐。#n畢竟大家最後都平安無事嘛。"
90002240-185 = "……我看起來倒不像呢。"
90002240-186 = "……嗯。"
90002240-187 = "果然是因為馬爾庫特的事嗎？"
90002240-188 = "嗯……馬爾庫特，還有Ain、Soph、Aur……"
90002240-189 = "……"
90002240-190 = "跟你說哦，我剛才稍微想了一下。"
90002240-191 = "大致上呢……就是……"
90002240-192 = "總之發生了超嚴重的事情，然後現在逃生艙只剩下一個！"
90002240-193 = "這種時候……我們該怎麼辦呢？"
90002240-194 = "逃，逃生艙只有一個……？"
90002240-195 = "姐姐……會怎麼做呢？"
90002240-196 = "唔嗯……"
90002240-197 = "唔～嗯……！"
90002240-198 = "唔～～嗯……！！！"
90002240-202 = "突然覺得很麻煩，還是等時候到了再來考慮吧！哇哈哈哈！"
90002240-203 = "姐姐！？"
90002240-207 = "唉……我就知道會這樣……"
90002240-212 = "……"
90002240-213 = "還能怎麼辦，當然是讓給你囉。"
90002240-214 = "當姐姐的，就是為了這種時候而存在的嘛。"
90002240-218 = "（也許是因為過於疲憊，大家幾乎都是倒頭就睡）"
90002240-219 = "（而自己之所以無法入睡……是因為一旦閉上眼睛，似乎就會想起什麼）"
90002240-228 = "老師……"
90002240-229 = "老師……"
90002240-231 = "[ns]「你們兩個怎麼了？明明一切……都順利結束了啊。」"
90002240-232 = "順利……結束了嗎？#n是的，某種意義上確實是這樣……"
90002240-233 = "不，果然還是不對！#n老師你明明不是這麼想的！"
90002240-234 = "肯定。老師的生命徵象，以及老師的表情都表明完全並非如此。"
90002240-235 = "[s]「咦，有那麼明顯嗎？」"
90002240-236 = "是……是的！#n已經嚴重到，連看著的我們……連我們都……嗚……！"
90002240-237 = "肯定。彩奈前輩……我也是……"
90002240-238 = "[s6]「這樣啊。」\n[s7]「不過，你們其實沒必要哭的。」"
90002240-241 = "不是的！不是那樣的！這是沒辦法的事……！#n因為……老師你沒有哭……"
90002240-242 = "因為老師沒有哭出來……一直在裝作沒事的樣子……！"
90002240-243 = "[s8]「謝謝你們願意這麼想。」\n[s9]「不過，這種事本來就應該這樣。」"
90002240-246 = "為什麼呢……？"
90002240-247 = "[s10]「因為發生的事情無法挽回。」\n[s11]「任何後悔和藉口都是不被允許的。」"
90002240-250 = "……"
90002240-251 = "……"
90002240-252 = "那麼，我們究竟能做些什麼呢？"
90002240-253 = "[s12]「必須活下去。」\n[s13]「無論再怎麼艱難與荒謬。」"
90002240-256 = "要背負並將其記住是嗎……？"
90002240-257 = "為了那些被遺落和錯過的事物……？"
90002240-258 = "[s14]「嗯。即使不知道盡頭會有什麼。」\n[s15]「……即使最後什麼也得不到。」"
90002240-263 = "……"
90002240-264 = "……"
90002240-265 = "我們會陪在你身邊的。"
90002240-266 = "無論發生任何事情……"
90002240-267 = "所以，請老師你也……"
90002240-268 = "是的。請不要放棄。"
90002240-269 = "只要老師不放棄，我們也會拚盡全力直到最後的。"
90002240-271 = "[ns]「……嗯。」"
90002240-277 = "[ns]「謝謝你們。」"
90002240-279 = "（發生了很多事）"
90002240-288 = "（回顧起來彷彿只是一個瞬間）"
90002240-297 = "（卻發生了太多無法一次說完的事情）"
90002240-302 = "（將那所有的事情拋在腦後）"
90002240-309 = "（我們與一名新學生一起）"
90002240-315 = "（前往了千年科學學園）"
