90002240-63 = "3;케이 교복 무소속;06\n1;리오 동복;00;나는…… 밉상인 말밖에 할 줄 몰라. 늘 그래 왔고, 어느 사이엔가 어쩔 수 없다고 생각하게 되었어.\n#3;dr\n#1;m3"
