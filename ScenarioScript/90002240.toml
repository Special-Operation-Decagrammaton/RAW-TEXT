[translation]
90002240-1 = "Episode 24;The Sky of Unity"
90002240-3 = "Everyone on board? Malkuth's secure?"
90002240-4 = "All are accounted for. Ready to depart."
90002240-9 = "Then, if you will, Toki."
90002240-10 = "Yes, Ms. Rio. We're taking off."
90002240-18 = "..."
90002240-19 = "Whyever did you save me?"
90002240-20 = "[s] \"It felt like the right thing to do.\""
90002240-21 = "I wrought terror upon you. I stood as your enemy."
90002240-22 = "[s] \"Not anymore.\""
90002240-23 = "The present moment is short. Do you not fear that I shall once more turn against you?"
90002240-24 = "[s] \"Are you going to?\""
90002240-28 = "..."
90002240-29 = "I know not."
90002240-30 = "Everything I had, all I was, was to serve the Steel Continent."
90002240-31 = "I awakened there, witnessed dawn's first light, and met my sisters. Ein. Sof. Ohr."
90002240-35 = "..."
90002240-36 = "I will never see them again. "
90002240-37 = "That...is the truth."
90002240-38 = "...Ugh."
90002240-39 = "I should have held them more."
90002240-40 = "I should have embraced them more. I should have spoken with them more. I should have comforted them."
90002240-41 = "If I had known that this would be our fate, there is not a thing I would do in the same manner."
90002240-42 = "If only..."
90002240-43 = "[s] \"...\""
90002240-48 = "Sensei?"
90002240-50 = "[ns1] \"Hypothetically, just saying...\"\n[ns2] \"If I hadn't interfered, would the sisters still be alive?\""
90002240-54 = "..."
90002240-55 = "Ultimately, nothing would have changed. Their bodies were already deteriorating."
90002240-56 = "[s3] \"But still, even so, if I didn't interfere...\"\n[s4] \"Could they have lived maybe a minute, ten seconds...\" \n[s5] \"...even one second longer?\""
90002240-60 = "Do you feel responsible, Sensei?"
90002240-61 = "Responsible for...something you cannot bear?"
90002240-62 = "..."
90002240-63 = "I...know I come off cold. Insensitive. That has always been my way. I've come to accept it."
90002240-64 = "So, if I may be cold, if I may speak bluntly and focus solely on what occurred..."
90002240-65 = "Those girls wanted to reshape Kivotos into a shape of their choosing."
90002240-66 = "They had their circumstances, reasons, and thoughts... I'm sure they believed they were trying to save everyone in their own way."
90002240-67 = "But I implore you to imagine living in a Kivotos assimilated by the Steel Continent. Imagine a citizen. Any of them. If they had a life, what would it even look like?"
90002240-68 = "Those girls...made a mistake. Just as I once did."
90002240-69 = "Still, if you were to ask me if I thought they deserved this fate..."
90002240-70 = "I'm sorry... I do not know. Since no one got hurt, and no irreversible damage was done..."
90002240-72 = "..."
90002240-77 = "[ns] \"...And what's your honest opinion, Rio?\""
90002240-79 = "..."
90002240-80 = "I once said that I wanted to make no more mistakes, cause no more failures."
90002240-81 = "In other words, I aimed to live without regrets. But..."
90002240-82 = "Perhaps that was why I became as I was. I wanted to control all variables and prepare for every possibility... But, in the end..."
90002240-83 = "In the end..."
90002240-84 = "Rio..."
90002240-85 = "You have my gratitude."
90002240-86 = "What...?"
90002240-87 = "Your name is Rio, I believe? Yes. I sincerely thank you."
90002240-88 = "Thank you for...grieving my little sisters."
90002240-89 = "It's just...I can't let myself accept..."
90002240-90 = "I understand."
90002240-91 = "Then we shall let that be enough."
90002240-95 = "Kei. Sensei..."
90002240-96 = "And all who are gathered here."
90002240-97 = "Truly...thank you."
90002240-102 = "..."
90002240-103 = "*sob*"
90002240-104 = "Ugh... It's not okay... I still can't accept it..."
90002240-105 = "Why...? Why...?!"
90002240-106 = "[s] \"...\""
90002240-111 = "[ns] \"What do you want to do now?\""
90002240-112 = "...I know not."
90002240-113 = "I never fathomed such a possibility."
90002240-114 = "Nevertheless..."
90002240-116 = "[log=아인]We want you to live.[/log]"
90002240-117 = "[log=소프]No matter what happens to us, we want you to live.[/log]"
90002240-120 = "[log=오르]We want you to see things, meet people,[/log]"
90002240-121 = "[log=오르]and experience all you can in life.[/log]"
90002240-124 = "[log=아인]Way, way more than we have.[/log]"
90002240-127 = "They said they wanted me to live."
90002240-128 = "I still question what exactly that entails."
90002240-129 = "But if those were the last words that Ein, Sof, and Ohr bequeathed me..."
90002240-130 = "...then I shall attempt."
90002240-131 = "I was created. I failed to achieve my sole purpose, and now I am ultimately abandoned."
90002240-132 = "All right, none of that matters now, okay?"
90002240-133 = "...?"
90002240-134 = "I too, was created with a designated purpose."
90002240-135 = "Now I've lost it, forgotten it, and I have to figure out everything on my own, starting from square one."
90002240-136 = "But that doesn't mean that I can't go on living."
90002240-138 = "She is right! Ultimately...only you can choose who you are. No matter how you started or what anyone says!"
90002240-139 = "..."
90002240-140 = "Perhaps this grand question has not proven difficult for you all..."
90002240-145 = "Incorrect. The agony has been the same for us."
90002240-146 = "Right. We're all having a hard time."
90002240-151 = "..."
90002240-152 = "You know, how about you stop with the \"you all\" talk? There's no line, no separation. There's only \"us.\""
90002240-154 = "Pardon? The distinctions are clear between what I am and what you all—"
90002240-156 = "No, Malkuth. I...believe we're all in the same boat. The same ship, literally."
90002240-157 = "It doesn't matter how we woke up or where we were born. We're together now. That's what's important."
90002240-162 = "..."
90002240-163 = "Is such...truly acceptable?"
90002240-164 = "[s] \"I think it's okay. How about the others?\""
90002240-177 = "..."
90002240-179 = "Thank you. Everyone. Us."
90002240-181 = "..."
90002240-182 = "..."
90002240-183 = "Midori? You good?"
90002240-184 = "H-Huh? Y-Yeah... I'm fine, sis. Everyone's safe, right? We all made it."
90002240-185 = "...Doesn't feel that way, though."
90002240-186 = "...Yeah."
90002240-187 = "Is it because of Malkuth?"
90002240-188 = "Y-Yeah... Malkuth, Ein, Sof, and Ohr..."
90002240-189 = "..."
90002240-190 = "You know! I just had a weird thought."
90002240-191 = "Let's say...for some reason..."
90002240-192 = "Like imagine there's an emergency, but we only have one escape pod left!"
90002240-193 = "In that case...what would we do?"
90002240-194 = "Th-There's only one escape pod...?"
90002240-195 = "I don't know, sis... What do you think?"
90002240-196 = "Um."
90002240-197 = "Hm...!"
90002240-198 = "Hmm...!"
90002240-202 = "That's too much for me. I'll guess I'd figure it out in the moment! Hahaha!"
90002240-203 = "Momoi?!"
90002240-207 = "*sigh* Typical..."
90002240-212 = "..."
90002240-213 = "It's obvious, isn't it? I'd give it to you, Midori."
90002240-214 = "What are older sisters for, after all?"
90002240-218 = "Everyone was so fatigued that they had already gone to sleep."
90002240-219 = "But...I couldn't. Every time I closed my eyes, I had the same thought..."
90002240-228 = "Sensei..."
90002240-229 = "Sensei..."
90002240-231 = "[ns] \"What's wrong, you two? Everything ended well, didn't it?\""
90002240-232 = "Ended...well? One...could say that..."
90002240-233 = "No, you know better! You know you don't believe that, Sensei."
90002240-234 = "Agreed. Sensei's vitals, and above all, Sensei's expression, suggest ulterior feelings."
90002240-235 = "[s] \"It was that obvious?\""
90002240-236 = "Y-Yes...! Even looking at you makes us...makes us feel...! *sniff*"
90002240-237 = "Agreed. Arona...and myself, as well..."
90002240-238 = "[s6] \"I see.\"\n[s7] \"But I don't think you two should cry for my sake.\""
90002240-241 = "No! That's not it! We can't help it...! Because...you won't cry..."
90002240-242 = "You won't cry...and you act like everything is fine...!"
90002240-243 = "[s8] \"Thank you for your compassion.\"\n[s9] \"But still, I must endure.\""
90002240-246 = "Why is that?"
90002240-247 = "[s10] \"Because you can't undo what's already been done.\"\n[s11] \"No regrets. No excuses.\""
90002240-250 = "..."
90002240-251 = "..."
90002240-252 = "In that case, what should we do?"
90002240-253 = "[s12] \"Live on.\"\n[s13] \"No matter how hard or painful it may be.\""
90002240-256 = "Live, you're saying? While carrying all this? While remembering every detail?"
90002240-257 = "For the \"sake of what's been lost and overlooked\"...?"
90002240-258 = "[s14] \"That's right. Even if you don't know what lies ahead.\"\n[s15] \"...And even if, ultimately, nothing is gained.\""
90002240-263 = "..."
90002240-264 = "..."
90002240-265 = "We'll stay with you, as always."
90002240-266 = "...No matter what, in any circumstance."
90002240-267 = "So, Sensei. You should also remember..."
90002240-268 = "Never give up."
90002240-269 = "If you keep trying, we will always find the strength to carry on with you."
90002240-271 = "[ns] \"...Yeah.\""
90002240-277 = "[ns] \"Thank you, everyone.\""
90002240-279 = "So much happened."
90002240-288 = "And, looking back, it felt like it all went by in a flash."
90002240-297 = "Even so, I could never explain it all."
90002240-302 = "We continued on, leaving the past behind..."
90002240-309 = "...And returned to Millennium Science School."
90002240-315 = "With one new student to enroll."
