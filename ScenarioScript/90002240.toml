[translation]
90002240-1 = "ตอนที่ 24;ท้องฟ้าแห่งเอกภาพ"
90002240-3 = "ขึ้นมาครบทุกคนหรือยังคะ? มัลคูธล่ะ?"
90002240-4 = "ขึ้นมาเรียบร้อย ออกเดินทางได้เลย"
90002240-9 = "โทคิ ฝากด้วยนะ"
90002240-10 = "ค่ะ ท่านริโอะ จะบินขึ้นเดี๋ยวนี้ค่ะ"
90002240-18 = "..."
90002240-19 = "ทำไม... ถึงช่วยฉันมาเหรอคะ?"
90002240-20 = "[s] \"คิดว่าต้องทำอย่างนั้นน่ะ\""
90002240-21 = "ฉันเคยเป็นศัตรูของพวกคุณนะคะ"
90002240-22 = "[s] \"แต่ตอนนี้ไม่ใช่แล้วนี่\""
90002240-23 = "แต่อาจจะกลับมาเป็นศัตรูอีกครั้งก็ได้นะคะ?"
90002240-24 = "[s] \"จะทำอย่างนั้นเหรอ?\""
90002240-28 = "..."
90002240-29 = "ฉันก็ไม่รู้ค่ะ"
90002240-30 = "ดินแดนเหล็กกล้าเคยเป็นทุกสิ่งทุกอย่างสำหรับฉัน"
90002240-31 = "ฉันลืมตาขึ้นที่นั่น และได้พบกับไอน์ ซอฟ และออร์ที่นั่นค่ะ"
90002240-35 = "..."
90002240-36 = "ตอนนี้... ฉันเจอกับเด็กๆ พวกนั้นไม่ได้แล้วสินะคะ "
90002240-37 = "เป็นอย่างนั้น... จริงๆ สินะคะ"
90002240-38 = "อึก..."
90002240-39 = "ควรจะกอดไว้ให้นานกว่านี้แท้ๆ"
90002240-40 = "ควรจะลูบหัวและพูดคุยกันให้มากกว่านี้แท้ๆ"
90002240-41 = "ถ้ารู้ว่าจะจบลงแบบนี้ ฉันคงไม่ทำอย่างนั้นแน่นอนค่ะ"
90002240-42 = "ถ้าฉันรู้ละก็..."
90002240-43 = "[s] \"...\""
90002240-48 = "ครู?"
90002240-50 = "[ns1] \"ถ้าครูอยู่เฉยๆ เด็กพวกนั้นจะยังมีชีวิตอยู่หรือเปล่า?\"\n[ns2] \"ถ้าครูไม่ได้ทำอะไรเลย เด็กพวกนั้นจะมีชีวิตอยู่หรือเปล่า?\""
90002240-54 = "..."
90002240-55 = "ท้ายที่สุดแล้วผลลัพธ์ก็คงออกมาเหมือนกันค่ะ ร่างกายของเด็กๆ ก็เริ่มทรุดโทรมแล้วด้วย..."
90002240-56 = "[s3] \"แต่ถึงยังไง ถ้าครูแค่อยู่เฉยๆ ไว้\"\n[s4] \"เด็กพวกนั้นก็อาจจะมีชีวิตต่อได้อีก...\" \n[s5] \"1 นาที หรือสัก 1 วินาทีก็ได้ไม่ใช่เหรอ?\""
90002240-60 = "คิดว่าเป็นความรับผิดชอบของตัวเองเหรอ ครู?"
90002240-61 = "นั่นมัน... น่าจะเป็นความรับผิดชอบที่ยากเกินกว่าจะแบกรับได้นะ?"
90002240-62 = "..."
90002240-63 = "ฉันน่ะ... พูดได้แต่คำที่ไม่น่าฟัง ฉันเป็นอย่างนั้นมาตลอด และถึงจุดหนึ่งฉันก็คิดว่ามันก็ช่วยไม่ได้#nที่เป็นแบบนี้"
90002240-64 = "เพราะงั้นถ้าจะให้ฉันพูดอะไรสักหน่อย โดยตัดเรื่องความรู้สึกและพูดเฉพาะสิ่งที่เกิดขึ้นเท่านั้นละก็..."
90002240-65 = "เด็กพวกนั้นน่ะ ท้ายที่สุดแล้วก็พยายามเปลี่ยนแปลงคิโวทอสไปในแบบที่ตัวเองต้องการ"
90002240-66 = "ถึงเบื้องหลังทุกอย่างมีทั้งเหตุผลและความคิดที่แตกต่างกัน... และเด็กพวกนั้นก็พยายามจะช่วยทุกคน#nตามแบบของตัวเองแล้วก็เถอะ"
90002240-67 = "แล้วการใช้ชีวิตในคิโวทอสที่เปลี่ยนเป็นดินแดนเหล็กกล้าจะเป็นยังไง? แล้วนั่น... เป็นสิ่งที่ผู้คนในคิโวทอสรับมือได้หรือเปล่า?"
90002240-68 = "เด็กพวกนั้นน่ะ... ทำผิดไป เหมือนกับที่ฉันเคยทำในอดีต"
90002240-69 = "แต่ถ้าถามว่าสิ่งที่ทำมันสมควรแล้วหรือเปล่ากับผลลัพธ์ที่ได้..."
90002240-70 = "ขอโทษนะ... ฉันเองก็ไม่รู้ถึงขนาดนั้นหรอก นั่นก็เพราะไม่มีใครบาดเจ็บ และไม่มีความเสียหายอะไรเกิดขึ้น..."
90002240-72 = "..."
90002240-77 = "[ns] \"ความรู้สึกที่แท้จริงของริโอะคืออะไรเหรอ...?\""
90002240-79 = "..."
90002240-80 = "ฉันเคยบอกว่าฉันไม่อยากทำผิดพลาดหรือล้มเหลวอีกต่อไปแล้ว"
90002240-81 = "อีกนัยหนึ่ง นั่นก็หมายความว่าฉันไม่อยากเสียใจในภายหลังด้วย แต่ว่า..."
90002240-82 = "นั่นอาจจะเป็นสาเหตุก็ได้ ทั้งการที่ฉันอยากควบคุมตัวแปรทั้งหมด และการที่ฉันอยากเตรียมพร้อม#nสำหรับทุกความเป็นไปได้... แต่สุดท้าย"
90002240-83 = "สุดท้ายก็..."
90002240-84 = "รุ่นพี่ริโอะ..."
90002240-85 = "ขอบคุณนะคะ"
90002240-86 = "หืม...?"
90002240-87 = "ชื่อของคุณคือริโอะใช่มั้ยคะ? ค่ะ ขอบคุณนะคะ"
90002240-88 = "ขอบคุณที่ร่วมอาลัย... เพื่อน้องๆ ของฉันนะคะ"
90002240-89 = "ฉันก็แค่... ไม่เข้าใจในบางเรื่องน่ะ..."
90002240-90 = "อย่างนั้นเองสินะคะ"
90002240-91 = "ถ้างั้นเท่านี้ก็เพียงพอแล้วค่ะ"
90002240-95 = "เคย์กับคุณครูก็ด้วย"
90002240-96 = "แล้วก็ทุกคนที่อยู่ที่นี่ด้วยค่ะ"
90002240-97 = "ฉัน... ขอบคุณจริงๆ นะคะ"
90002240-102 = "..."
90002240-103 = "ฮือ..."
90002240-104 = "อึก... ไม่เข้าใจเลย... ยังไงก็ยังไม่เข้าใจอยู่ดี..."
90002240-105 = "ทำไมล่ะ... ทำไมกัน...!"
90002240-106 = "[s] \"...\""
90002240-111 = "[ns] \"แล้วจากนี้ไปอยากทำอะไรเหรอ?\""
90002240-112 = "ฉันก็ไม่รู้ค่ะ..."
90002240-113 = "ฉันไม่เคยคิดอะไรแบบนั้นมาก่อนเลย"
90002240-114 = "แต่ว่า"
90002240-116 = "[log=아인]ฉันอยากให้พี่มัลคูธมีชีวิตต่อไปค่ะ[/log]"
90002240-117 = "[log=소프]ไม่ว่าพวกฉันจะเป็นยังไง ก็อยากให้พี่มีชีวิตต่อไป[/log]"
90002240-120 = "[log=오르]อยากให้ได้เห็น ได้พบเจอ[/log]"
90002240-121 = "[log=오르]และได้รู้สึกอะไรให้มากกว่านี้ ให้มากๆ[/log]"
90002240-124 = "[log=아인]มากมากมาก มากกว่าพวกฉันอีก[/log]"
90002240-127 = "เด็กๆ บอกว่าอยากให้ฉันมีชีวิตต่อค่ะ"
90002240-128 = "ถึงฉันจะยังไม่รู้แน่ชัดว่านั่นคืออะไร และเป็นงานแบบไหนกันแน่"
90002240-129 = "แต่ถ้านั่นคือคำสั่งเสียสุดท้ายจากไอน์ ซอฟ และออร์..."
90002240-130 = "ฉันก็น่าจะต้องลองทำดูค่ะ"
90002240-131 = "ถึงฉันจะถูกสร้างขึ้นมา แต่ล้มเหลวในการบรรลุเป้าหมายจนถูกทิ้งแบบนี้ในที่สุดก็ตาม..."
90002240-132 = "เรื่องแบบนั้นน่ะไม่สำคัญหรอกค่ะ"
90002240-133 = "...?"
90002240-134 = "ฉันเองก็ถูกสร้างขึ้นมาเหมือนกันค่ะ"
90002240-135 = "ฉันสูญเสียเป้าหมาย ฉันลืมมันไป และตอนนี้ฉันต้องคิดใหม่ตั้งแต่ต้นเลย"
90002240-136 = "แต่ถึงอย่างนั้นก็ไม่ได้หมายความว่าเราจะมีชีวิตอยู่ต่อไม่ได้ค่ะ"
90002240-138 = "ชะ... ใช่ค่ะ! ตัวเราจะเป็นใครน่ะ... ท้ายที่สุดแล้วเราจะเป็นคนกำหนดด้วยตัวเองค่ะ! สิ่งนี้ใช้ได้กับทุกคนเลยค่ะ!"
90002240-139 = "..."
90002240-140 = "สำหรับพวกคุณแล้ว ปัญหาแบบนี้อาจไม่ใช่เรื่องยากนัก แต่สำหรับฉัน..."
90002240-145 = "ไม่ค่ะ พวกเราเองก็ไม่ต่างหรอกค่ะ"
90002240-146 = "ใช่แล้วละ ถ้ามันง่ายขนาดนั้น ก็คงไม่มีใครดิ้นรนหรอก"
90002240-151 = "..."
90002240-152 = "อีกอย่างนะ อย่าเรียกพวกเราว่า 'พวกคุณ' เลย เราไม่ต้องแบ่งแยกกันหรอกนะ..."
90002240-154 = "คะ? แต่ว่าฉันกับพวกคุณ..."
90002240-156 = "ไม่หรอกค่ะ คุณมัลคูธ ฉันคิดว่า... พวกเราก็ตกอยู่ในสถานการณ์เดียวกันหมดค่ะ"
90002240-157 = "ไม่ว่าจะลืมตาดูโลกมายังไง หรือเกิดมาในรูปแบบไหนก็ตามทีค่ะ"
90002240-162 = "..."
90002240-163 = "ให้ฉันทำแบบนั้นได้... จริงๆ เหรอคะ?"
90002240-164 = "[s] \"ครูคิดว่าได้นะ แล้วคนอื่นล่ะ?\""
90002240-177 = "..."
90002240-179 = "ขอบคุณค่ะ ทุกคน"
90002240-181 = "..."
90002240-182 = "..."
90002240-183 = "มิโดริ? เป็นอะไรหรือเปล่า?"
90002240-184 = "หะ... หืม? อะ... อื้อ... ฉันโอเคดี พี่โมโมอิ สุดท้ายทุกคนก็ปลอดภัยดีนี่นา?"
90002240-185 = "แต่จากที่ดูแล้ว ฉันว่าเธอไม่โอเคนะ..."
90002240-186 = "อื้อ..."
90002240-187 = "เป็นเพราะมัลคูธเหรอ?"
90002240-188 = "อะ... อื้อ... คุณมัลคูธ ไอน์ ซอฟ แล้วก็ออร์..."
90002240-189 = "..."
90002240-190 = "นี่ๆ! จู่ๆ ฉันก็คิดอะไรแบบนี้ขึ้นมา"
90002240-191 = "ก็แค่... แบบว่า..."
90002240-192 = "เอาเป็นว่าพอเกิดเรื่องใหญ่ขึ้น แคปซูลหนีภัยก็เลยเหลือแค่อันเดียว!"
90002240-193 = "แล้วพวกเรา... จะทำยังไงกันดีล่ะ?"
90002240-194 = "ละ... เหลือแคปซูลหนีภัยแค่อันเดียวเหรอ...?"
90002240-195 = "ถ้าเป็นพี่โมโมอิ... จะทำยังไงล่ะ?"
90002240-196 = "อืม"
90002240-197 = "อืมม...!"
90002240-198 = "อืมมม...!!!"
90002240-202 = "ขี้เกียจคิดอะ เอาไว้คิดหน้างานเลยแล้วกัน! วะฮะฮ่าฮ่า!"
90002240-203 = "พี่โมโมอิ?!"
90002240-207 = "เฮ้อ... กะไว้แล้วละว่าต้องตอบแบบนี้..."
90002240-212 = "..."
90002240-213 = "ถามมาได้ว่าจะทำยังไง ก็ต้องให้เธออยู่แล้ว"
90002240-214 = "ก็ถ้าไม่ใช่เพื่อทำเรื่องแบบนั้น... แล้วจะมีพี่สาวไว้ทำไมกันล่ะ?"
90002240-218 = "(อาจเป็นเพราะความเหนื่อยล้า ทุกคนจึงพากันสลบเหมือด)"
90002240-219 = "(ที่คุณครูนอนไม่หลับก็เพราะรู้สึกว่าถ้าหลับตาลง จะมีเรื่องบางอย่างผุดขึ้นมาในความคิด)"
90002240-228 = "คุณครูคะ..."
90002240-229 = "คุณครู..."
90002240-231 = "[ns] \"ทั้งสองคนเป็นอะไรไปเหรอ? ทุกอย่าง... จบลงด้วยดีแล้วนี่\""
90002240-232 = "จบลง... ด้วยดี... งั้นเหรอคะ? ค่ะ จะมองอย่างนั้นก็ได้..."
90002240-233 = "ไม่ค่ะ ไม่ใช่อย่างนั้นหรอกค่ะ! ก็ตอนนี้คุณครูไม่ได้คิดอย่างนั้นอยู่นี่คะ!"
90002240-234 = "เห็นด้วย ทั้งชีพจรของคุณครู และที่สำคัญก็คือ สีหน้าของคุณครูกำลังบอกว่าไม่ได้เป็นแบบนั้นเลยค่ะ"
90002240-235 = "[s] \"เอ๋? ดูออกขนาดนั้นเลยเหรอ?\""
90002240-236 = "ค่ะ... ค่ะ...! ถ้าถามว่าคุณครูเป็นหนักขนาดไหนละก็ ต้องบอกว่าแค่พวกหนูที่เห็นอยู่... ก็ถึงกับ...! ฮือ..."
90002240-237 = "เห็นด้วยค่ะ รุ่นพี่อะโรน่า... ฉันก็ด้วย..."
90002240-238 = "[s6] \"อย่างนั้นเองสินะ ไม่ต้องร้องไห้กันหรอกนะ\"\n[s7] \"ทั้งสองคนก็ไม่ต้องถึงกับร้องไห้กันก็ได้\""
90002240-241 = "ไม่หรอกค่ะ! ไม่ร้องไม่ได้หรอก! ที่หนูเสียใจน่ะ มันช่วยไม่ได้หรอกค่ะ...! ก็เพราะ... คุณครูไม่ร้องไห้ออกมานี่คะ..."
90002240-242 = "ก็คุณครูไม่ร้องไห้... และแสร้งทำเหมือนไม่เป็นอะไรเลยนี่คะ...!"
90002240-243 = "[s8] \"ขอบใจที่คิดแบบนั้นนะ แต่ครูไม่เป็นไร\"\n[s9] \"ขอบใจที่คิดแบบนั้นนะ แต่ครูต้องทำแบบนี้น่ะ\""
90002240-246 = "ทำไม... เหรอคะ?"
90002240-247 = "[s10] \"ก็เราย้อนคืนสิ่งที่เกิดขึ้นไปแล้วไม่ได้นี่นา\"\n[s11] \"สิ่งที่เกิดขึ้นไปแล้ว ไม่มีที่ว่างให้เสียใจหรือแก้ตัวหรอก\""
90002240-250 = "..."
90002240-251 = "..."
90002240-252 = "ถ้างั้นสิ่งที่พวกเราทำได้คืออะไรเหรอคะ?"
90002240-253 = "[s12] \"มีชีวิตต่อไป ถึงจะยากหรือไม่สมเหตุสมผลก็ตาม\"\n[s13] \"มีชีวิตต่อไป ต่อให้มันจะยากหรือไม่สมเหตุสมผลก็ตาม\""
90002240-256 = "ต้องแบกรับมันต่อไป และในขณะเดียวกันก็ต้องจดจำมันด้วย?"
90002240-257 = "อย่างน้อยก็เพื่อสิ่งที่ทำหล่นหายและพลาดไปงั้นเหรอคะ...?"
90002240-258 = "[s14] \"อื้อ ต่อให้ไม่รู้ว่าจะเกิดอะไรขึ้นในตอนจบก็ตาม\"\n[s15] \"อื้อ ต่อให้ใครจะบอกว่าสุดท้ายแล้วมันจะไม่ได้อะไรมาเลยก็ตาม\""
90002240-263 = "..."
90002240-264 = "..."
90002240-265 = "พวกหนูจะอยู่ข้างๆ คุณครูเองค่ะ"
90002240-266 = "ไม่ว่าจะเกิดเรื่องอะไรก็ตาม..."
90002240-267 = "เพราะงั้น คุณครูคะ คุณครูเองก็..."
90002240-268 = "ค่ะ อย่ายอมแพ้นะคะ"
90002240-269 = "เพราะถ้าคุณครูไม่ยอมแพ้ พวกเราก็จะรวบรวมเรี่ยวแรงขึ้นมาสู้ใหม่ได้เสมอจนถึงวินาทีสุดท้ายเลยค่ะ"
90002240-271 = "[ns] \"อื้อ...\""
90002240-277 = "[ns] \"ขอบใจนะ ทั้งสองคนเลย\""
90002240-279 = "(มีเรื่องราวเกิดขึ้นมากมาย)"
90002240-288 = "(ถ้ามองย้อนกลับไป มันก็แค่ช่วงเวลาสั้นๆ เท่านั้น)"
90002240-297 = "(แต่มันคือหลายเรื่องราวที่ไม่อาจอธิบายได้ทั้งหมดในคราวเดียว)"
90002240-302 = "(แต่คุณครูก็ได้ตัดสินใจวางสิ่งเหล่านั้นไว้ก่อน)"
90002240-309 = "(และมุ่งหน้าไปยังโรงเรียนวิทย์มิลเลเนียม)"
90002240-315 = "(พร้อมกับนักเรียนคนใหม่หนึ่งคน)"
