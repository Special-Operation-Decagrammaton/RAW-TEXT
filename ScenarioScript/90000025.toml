[translation]
90000025-2 = "辛苦您了，老師。"
90000025-3 = "我試著整理了目前為止蒐集到的十字神名的情報。"
90000025-4 = "有這麼多資料的話……或許可以對那個存在的構造加以解析也說不定。"
90000025-6 = "那麼……"
90000025-7 = "……嗯？"
90000025-11 = "咦……？"
90000025-12 = "部長，我們的伺服器正遭到駭入。"
90000025-13 = "你說什麼？#n這裡可是只存在千年專用線路的封閉空間，究竟是怎麼……？"
90000025-18 = "請，請等一下！？#n這是……防火牆全都被開啟了！？"
90000025-19 = "緊急情況。#n我要破壞電源了，請後退。"
90000025-27 = "不行……似乎已經太遲了。"
90000025-32 = "……！！"
90000025-33 = "……"
90000025-34 = "我們所在的位置……已經被發現了。"
90000025-35 = "電源已經被切斷了。不過……"
90000025-36 = "面對物理上沒有與外部連接的封閉網路，連供電也沒有的情況下……#n居然能做到這種程度……"
90000025-37 = "……這的確是「特異現象」呢，英美。"
90000025-41 = "……是音響發出來的。#n好像能聽到什麼聲音。"
90000025-42 = "……了呢……終於………………"
90000025-43 = "音響竟然……"
90000025-44 = "……終於見面了呢，[USERNAME]。"
90000025-45 = "……！？老師！？"
90000025-46 = "[s] 「你是誰？」"
90000025-47 = "不，不行！不可以回答它！不能與它接觸啊！"
90000025-48 = "我就是我，為存在而存在。既是開端也是終焉。正是汝所想之物……"
90000025-51 = "我就是我。除此之外無法做出其他說明。"
90000025-52 = "我的存在證明不需要任何人的允許……我因自身的允許而存在。"
90000025-53 = "我既是[ruby=Mystery]神祕[/ruby]與[ruby=Terror]恐怖[/ruby]──也是[ruby=Logos]知性[/ruby]與[ruby=Pathos]激情[/ruby]。"
90000025-54 = "我的光環即為我的證明……見證吧，我終於可以證明我自己。"
90000025-58 = "它正在對這裡進行掃描……"
90000025-59 = "老師……待在這裡別動，不然會有危險。"
90000025-60 = "………………"
90000025-61 = "[USERNAME]……你擁有我不知道的東西。我無法解析的東西。"
90000025-62 = "我將在此傳達福音──帶著信仰接受吧！"
90000025-66 = "……老師，您的平板！#n請小心！它打算對其進行駭入！"
90000025-71 = "[ns] （對希迪姆的箱子……！？）"
90000025-72 = "哦哦哦哦……！"
90000025-73 = "哦哦……"
90000025-74 = "……"
90000025-76 = "呣喵……嗯嗯……呼……"
90000025-77 = "嗚嘻……不，不可以搔癢，啦……嗯，嗯嗯……！"
90000025-78 = "……哈啾！"
90000025-81 = "哦哦哦……！為何，為何……！"
90000025-82 = "唔，哦……哦啊啊啊啊啊！！"
90000025-87 = "……！？"
90000025-91 = "消失了……？"
90000025-92 = "確認入侵紀錄……已經消滅了。"
90000025-93 = "未知的入侵者確實已經消失。#n陽葵部長，沒事吧？"
90000025-94 = "我，我沒事。老師您呢……？"
90000025-95 = "[s] 「嗯，我也沒事。」"
90000025-99 = "這樣啊……"
90000025-100 = "它似乎……沒能駭入老師的那部平板呢。#n我記得那是聯邦學生會長留下的東西……"
90000025-101 = "剛才那就是「十字神名」嗎……？#n似乎是個遠比想像中深陷浮誇妄想的存在呢。"
90000025-102 = "話雖如此，僅是對情報稍加分析就能做到如此程度……#n那個存在相當危險的事實依舊沒有改變。"
90000025-103 = "若單純將其視為失控的AI，疑點實在太多了呢……"
90000025-104 = "看來今後應該在防護更加完善的設施進行研究比較妥當。"
90000025-105 = "英美，藉著這個機會來打造「特異現象搜查部」的部室吧。#n為了防範今天這種情況，必須做得萬無一失。"
90000025-106 = "知道了。需要的東西我會用社團經費來準備。"
90000025-107 = "嗯，雖然是場意料之外的奇襲……就將其視為與十字神名的初次接觸吧。"
90000025-108 = "但下次可就不一樣了。"
90000025-109 = "拭目以待吧。"
90000025-111 = "下一話;蒐集情報(3)PMC挖掘區域"
