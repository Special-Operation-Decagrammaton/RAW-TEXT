901010600430-7 = "3;니코;99;사라진 어부에 대해 조사한 내용을 정리하자면……\n#3;em;…"
901010600430-8 = "3;니코;02;이미 알고 있던 것처럼 그 미야구치라는 어부는 주위 평판이 그리 좋지 않았던 모양이야."
901010600430-9 = "3;니코;01;일은 성실하게 했었지만, 매사에 불평이 많아서 쓴소리를 듣기도 했고."
901010600430-10 = "3;니코;99;심지어 함께 일하는 어부들의 말로는 도박에 빠져 모습을 보이지 않을 때도 많았다는데."
901010600430-11 = "3;쿠루미;02;도박? 돈을 걸고 노름을 했단 말이야?\n#3;em;[?]"
901010600430-12 = "3;니코;00;응. 돈 씀씀이가 헤픈 만큼 주머니 사정이 궁할 때가 많아서, 도박으로 한탕을 노릴 때가 잦았대."
901010600430-13 = "3;니코;02;하지만 타고난 재능은 없었는지, 큰돈을 딴 경우는 없었던 것 같아."
901010600430-14 = "3;니코;10;그 때문에 결국에는 사채에까지 손을 댄 모양이고……"
901010600430-15 = "3;유키노;02;도박에 재능이라는 건 통하지 않아. 도박은 무조건 돈을 잃는 방향으로 설계되어 있으니까.\n#3;em;[반응]"
901010600430-16 = "3;유키노;01;한두 번은 돈을 벌 수 있을지 몰라도, 계속되면 가진 돈을 전부 잃게 될 거야."
901010600430-17 = "3;쿠루미;12;돈은 정직하게 버는 게 제일이지. 쉽게 번 돈은 쉽게 나간다는 소리도 있고.\n#3;em;[한숨]"
901010600430-18 = "1;오토기;03;그래도 꿈은 꿔 볼 수도 있잖아.\n#1;em;[음표]\n#1;ar\n#3;m5"
901010600430-19 = "1;오토기;99;아아~ 나도 복권에 당첨되어서 호화롭게 살고 싶다~"
901010600430-20 = "#all;hide"
901010600430-21 = "3;유키노;99;여하튼 미야구치가 사고를 당했거나, 갑자기 증발해 버린 게 아니라면, 모습을 감추어야만 할 이유는 몇 가지로 좁힐 수 있겠군.\n#3;em;…"
