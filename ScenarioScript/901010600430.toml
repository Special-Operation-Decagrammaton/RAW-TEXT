[translation]
901010600430-7 = "失踪した漁師について調べた内容を整理すると……。"
901010600430-8 = "みんな知っての通り、新人漁師のミヤグチさんは周囲からの評判がよくなかったみたい。"
901010600430-9 = "仕事は真面目にやっても、愚痴っぽくて指摘されることがあって――"
901010600430-10 = "同僚の漁師によれば、ギャンブルにも手を染めていたんだって。"
901010600430-11 = "ギャンブル？お金を賭けて遊んでたの？"
901010600430-12 = "うん。浪費家でお金に困ることが多かったみたい。#nよくギャンブルで一発逆転を狙ってたんだって。"
901010600430-13 = "でも、大勝ちしたとかはなくて……。"
901010600430-14 = "最終的には、消費者金融に手を出しちゃったみたい……。"
901010600430-15 = "ギャンブルなんてそもそも、必ず胴元が得するよう設計されているものだ。"
901010600430-16 = "ビギナーズラックを鵜呑みにすると、いずれは全てを失う羽目になる。"
901010600430-17 = "お金は堅実に稼ぐのが一番よね。悪銭身につかずっていうし。"
901010600430-18 = "でも夢くらい見たっていいじゃん。"
901010600430-19 = "あ～あ、私も宝くじ当たらないかなぁ～"
901010600430-21 = "話を戻そう。ミヤグチが事故に遭ったわけじゃないのなら、自ずと理由は絞られてくる。"
901010600430-22 = "ミヤグチが急いで港から逃げ出した理由は……。"
901010600430-30 = "ミヤグチが急いで港から逃げ出した理由は……。\n[as2] 強盗に狙われていたから。\n[as3] 周りからいじめられていたから。\n[as1] ギャンブルの借金を返せなかったから。"
901010600430-32 = "そうね。しかもかなりの高利貸しだったっていうじゃない。#n普通の人なら利息返済でも手一杯だったんじゃないかしら。"
901010600430-33 = "同僚の漁師もミヤグチの借金事情を知っているくらいだし……。"
901010600430-34 = "誰もいない時間に逃げ出したに違いないわ。"
901010600430-39 = "うーん、金遣いが荒いから勘違いする人は出るかもしれないけど……。"
901010600430-40 = "でも、ギャンブルでお金を失っているのに、強盗に狙われて逃げたとは考えにくいかも。"
901010600430-41 = "もう一度考えてみて、先生。"
901010600430-50 = "たしかに、不満が多くて苦手だと思う人もいたみたいでしたけど……。"
901010600430-51 = "いじめを受けていたという話はありませんでした。"
901010600430-52 = "他に理由があるんじゃないでしょうか？"
901010600430-60 = "借金のせいで夜逃げするのは結構あることだよね。"
901010600430-61 = "でも他の自治区に逃げたら、借金ってチャラになるの？"
901010600430-62 = "まさか。自己破産でもしない限り、個人の借金は一生つきまとうよ。"
901010600430-64 = "とある学園は、増え続ける借金を返済できなくて、自治区ごと企業に買われたケースもあるんだって。"
901010600430-69 = "学園規模の借金だなんて、どう返済すればいいのか想像もつかない……。"
