[translation]
1012006-1 = "Drums of Dawn"
1012006-2 = "I was pulling an all-nighter and catching up on work before the deadline..."
1012006-3 = "Feeling frazzled and needing a break, I ventured outside for some fresh air."
1012006-11 = "And who did I find at the river's side, but..."
1012006-12 = "Hm? Sensei?"
1012006-16 = "What brings you here so late? Or is it early?"
1012006-17 = "Oh my. You were working all night?"
1012006-18 = "...Responsibility is a double-edged sword."
1012006-19 = "[s] \"What brings YOU here, Natsu?\""
1012006-20 = "I was jogging."
1012006-21 = "Since starting the band, I've been running along the river every morning."
1012006-22 = "Banging on the drums is a lot more physically demanding than you may think."
1012006-23 = "So I'm working to improve my stamina."
1012006-24 = "You could say that I...am exhausting power offstage in order to exert my power onstage."
1012006-25 = "[s] \"You're a hard worker, Natsu.\""
1012006-26 = "Hah."
1012006-27 = "You're one to talk, Sensei."
1012006-28 = "[s1] \"A hard-working student...\"\n[s2] \"...needs a treat.\""
1012006-36 = "I bought two cans of black coffee at a nearby vending machine and handed one to Natsu."
1012006-38 = "Oh, thank you, Sensei."
1012006-39 = "Zero-calorie coffee...a unique post-exercise dessert."
1012006-40 = "I sat on a bench with Natsu."
1012006-44 = "While I was practicing, I realized the drums perfectly demonstrate the concept of \"antinomy.\""
1012006-45 = "Consider the drummer, seated at the back of the stage, mostly unnoticed."
1012006-46 = "They are the least seen, yet their beat leads the performance."
1012006-47 = "All instruments follow their lead, their driving rhythm."
1012006-48 = "While other members may want to rush the tempo, the drummer must remain steady."
1012006-49 = "She must stay calm and keep the beating heart of the song on track."
1012006-50 = "So even though I play the loudest instrument, I must do so with a calm mind and composed heart."
1012006-51 = "Of course, I don't mean to imply that the drummer is the most important."
1012006-52 = "Every role has its place."
1012006-53 = "But, to me, the drums are very rewarding."
1012006-54 = "So..."
1012006-61 = "I continued to listen to Natsu, but..."
1012006-62 = "I was so sleepy that not even the coffee could keep me awake."
1012006-72 = "My eyelids grew heavy, and I began to drift..."
1012006-76 = "S-Sensei...?"
1012006-77 = "My shoulders..."
1012006-78 = "..."
1012006-79 = "...!"
1012006-80 = "*ba-dum* *ba-dum*"
1012006-81 = "Um..."
1012006-82 = "Sensei...?"
1012006-83 = "Uhh..."
1012006-84 = "..."
1012006-85 = "This is concerning..."
1012006-86 = "The beat shouldn't be...this fast..."
1012006-93 = "I woke up a few minutes later. Natsu had somehow dragged me back to Schale."
1012006-94 = "As soon as she saw that I was well, she quickly disappeared into the dawn without another word."
