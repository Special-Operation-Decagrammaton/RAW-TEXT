[translation]
1000415-1 = "並不輕盈的[ruby=責任]重量[/ruby]"
1000415-2 = "（於是便毫不猶豫地奔向了陽奈的房間）"
1000415-6 = "[ns]「陽奈，我照約定來了。」"
1000415-8 = "啊，嗯。請進，老師。"
1000415-9 = "[s]「打擾了。」"
1000415-15 = "呵呵……你好呀，老師。#n你來的比我想像中還早呢。"
1000415-19 = "哎呀……怎麼汗流浹背的呢，你沒事吧？"
1000415-20 = "難道是……在來的路上發生了什麼……"
1000415-21 = "[ns1]「啊，是因為被陽奈邀請實在太高興……」\n[ns2]「所以就全力衝過來了……」"
1000415-24 = "[ns3]「……不是啦！我才想問陽奈你還好嗎？」\n[ns4]「你的黑眼圈很嚴重耶！？」"
1000415-27 = "啊……你說這個啊。"
1000415-28 = "唔嗯，因為今天也忙風紀委員會的事忙到凌晨，所以有點疲勞過度了。"
1000415-29 = "不過也是因為這樣，我才能請假休息。"
1000415-30 = "[s]「咦！？那我還跑過來沒關係嗎？」"
1000415-31 = "那個……"
1000415-32 = "就，就因為是這種時候……我反而……"
1000415-33 = "更希望老師能來找我……"
1000415-34 = "聯絡得這麼突然，老師還是馬上趕了過來……"
1000415-35 = "明明只是在撒嬌而已……老師卻還是答應了……"
1000415-36 = "謝謝你。"
1000415-37 = "[s]「不用客氣。陽奈能在這種時候叫我來，我反而很開心呢。」"
1000415-38 = "是，是嗎？"
1000415-39 = "……這樣啊，呵呵……"
1000415-43 = "唔嗯，雖然現在說這個好像有點晚了……"
1000415-44 = "不過就像老師說的一樣，現在的我不只黑眼圈很重……而且還一臉憔悴。"
1000415-45 = "居然用這副模樣迎接老師……"
1000415-46 = "回頭想想好像有點……該怎麼說呢……"
1000415-47 = "感覺很不好意思……"
1000415-48 = "[s5]「不用在意！」\n[s6]「重要的是接下來該怎麼度過休假。」"
1000415-51 = "是，是嗎？"
1000415-52 = "[ns]「嗯，一起把今天變成最棒的休假吧！」"
1000415-56 = "……嗯。"
1000415-61 = "啊……抱，抱歉，老師。"
1000415-62 = "我忙到都忘了吃早餐。"
1000415-63 = "[s]「如果想好好休息就要先填飽肚子。」"
1000415-64 = "說的也是……"
1000415-65 = "那我們去外面找點吃的吧……"
1000415-66 = "[s]「不，那可不行！」"
1000415-67 = "嗯？為什麼……？"
1000415-68 = "[s]「不能那樣浪費精力！」"
1000415-69 = "你說難得的休假……為了吃飯特意外出反而很浪費……？"
1000415-70 = "那，那怎麼辦……"
1000415-71 = "我家裡沒什麼吃的……"
1000415-72 = "[s]「話說陽奈……」"
1000415-76 = "[ns]「你喜歡杯麵嗎？」"
1000415-77 = "嗯……？"
1000415-84 = "[ns]「好，接下來等3分鐘就行了。」"
1000415-85 = "可是老師……你真的不介意只吃杯麵嗎？"
1000415-86 = "老師親自過來，我本來想好好招待你的……"
1000415-87 = "[s7]「重要的不是吃什麼。」\n[s8]「而是跟陽奈一起吃。」"
1000415-90 = "[ns9]「啊……如果陽奈其實不想吃……」\n[ns10]「只是為了配合我的話……」"
1000415-93 = "不，不是那樣的！這點不用擔心。"
1000415-94 = "……我也不討厭杯麵。"
1000415-95 = "只是……嗯。#n雖然有在作戰中吃過幾次……"
1000415-96 = "但我好像不會把杯麵當成正餐……"
1000415-97 = "[s11]「畢竟杯麵只適合用來簡單填飽肚子。」\n[s12]「如果你說常用杯麵代替正餐，我反而會很傷腦筋。」"
1000415-100 = "[ns]「即使工作再忙，也必須好好吃飯才行。」"
1000415-104 = "……呵呵。"
1000415-105 = "老師居然也會說這種話嗎？"
1000415-106 = "聽老師這麼說，我倒是想把這句話還給你哦？"
1000415-107 = "[s]「唔嗯……我很慚愧。」"
1000415-108 = "不過話又說回來……"
1000415-109 = "之前我都沒注意到……"
1000415-110 = "像這樣坐在我的房間……和老師一起等杯麵泡好……"
1000415-111 = "感覺有點新鮮呢……"
1000415-116 = "[ns]「啊，陽奈，麵泡好囉！我們開動吧！」"
1000415-117 = "嗯。"
1000415-122 = "[ns] 「怎麼樣？」"
1000415-123 = "…………嗯，很好吃。"
1000415-125 = "（之後也和陽奈一起進行了許多休假會做的活動）"
1000415-128 = "接下來……一起坐著看電視？"
1000415-129 = "這種時候隨意看一些不怎麼期待，而且也不會特別去看的節目……"
1000415-130 = "藉此打發時間有助於消除疲勞……是嗎。"
1000415-131 = "唔嗯，雖然還不是很明白……"
1000415-132 = "不過既然老師這麼說了，就來試試看吧。"
1000415-133 = "（於是兩人並肩而坐，一起看著不認識的藝人演出的短劇）"
1000415-136 = "[ns]「陽奈，接下來來挑戰4層撲克牌城堡吧！」"
1000415-137 = "這，這麼突然？"
1000415-138 = "唔嗯……這種簡單的勞動有減少精神負擔的效果……？"
1000415-139 = "我，我知道了。#n雖然沒什麼把握，但我會努力看看。"
1000415-142 = "（即使反覆失敗了好幾次，兩人依舊帶著笑容進行著無關緊要的挑戰）"
1000415-145 = "[ns]「陽奈！你是無法輕易逃離格黑娜學園的……！」"
1000415-147 = "[ns]「覺悟吧！」"
1000415-148 = "各個自治區都已經被占領……#n再加上隨機加收雙倍通行費的危機……"
1000415-149 = "……想克服的話，就需要採取特別的手段。"
1000415-153 = "既然如此……"
1000415-154 = "我要從「無人島」下手……！"
1000415-160 = "（玩著走遍奇普托斯各地，擲骰子累積房地產的桌遊）"
1000415-167 = "啊。"
1000415-168 = "剛，剛才的攻擊就消耗掉了一半的體力……！"
1000415-169 = "[s13]「陽奈，別放棄！」\n[s14]「我們還有剛才省下來的靈藥……！」"
1000415-172 = "靈藥……只要喝下去就能恢復魔力……"
1000415-173 = "對頭目施展強大的攻擊魔法……！"
1000415-174 = "可是……"
1000415-175 = "可是如果之後出現更強的頭目的話……#n果然還是讓人有點擔心……！"
1000415-176 = "現在還不能喝！"
1000415-177 = "[s]「我能理解你的心情！完全能夠明白！」"
1000415-187 = "（玩著之前抱著姑且試試的心情買下，卻一直都沒機會挑戰的遊戲）"
1000415-193 = "（就這樣和陽奈一起享受休假的輕鬆時光，彷彿忘記了時間的流逝）"
1000415-197 = "（時間不知不覺地過去，轉眼已經到了太陽下山的時間）"
1000415-200 = "……呼。"
1000415-201 = "沒想到今天能玩得這麼開心。"
1000415-202 = "謝謝你，老師。#n這全都多虧了老師。"
1000415-203 = "[s]「別這麼說，我很高興能幫上陽奈的忙。」"
1000415-205 = "[ns15]「而且今天能看到陽奈令人意外的一面……」\n[ns16]「我也覺得很開心。」"
1000415-208 = "嗯？令人意外的一面……？"
1000415-209 = "[s17]「平常的陽奈讓人有種一板一眼的印象……」\n[s18]「不過陽奈玩遊戲的時候，卻會在無意中露出那種表情呢……」"
1000415-212 = "咦……？"
1000415-213 = "我，我玩遊戲的表情有那麼奇怪嗎……？"
1000415-214 = "那，那個，老師……？"
1000415-215 = "[s]「啊哈哈，我是開玩笑的。」"
1000415-219 = "……唉，老師你也真是的。"
1000415-220 = "[s]「陽奈，風紀委員會的工作很辛苦吧？」"
1000415-221 = "……說不辛苦是騙人的。"
1000415-227 = "不過現在已經變得理所當然，就像自己的一部分一樣。"
1000415-228 = "從初次戴上風紀委員會臂章的那天起……我無時無刻不在思考這份責任代表的重量。"
1000415-229 = "雖然有時會想要逃避、想要放棄……"
1000415-230 = "也曾有覺得很辛苦、很想發牢騷的時候。"
1000415-231 = "……就像今天一樣。"
1000415-235 = "不過我並不是只靠自己的力量，而是因為有其他人的幫助──#n才能讓我這樣的人能夠堅持下去，克服重擔走到今天……我是這麼想的。"
1000415-236 = "尤其是……現在和以前不同……#n有很多像老師一樣對我寄予厚望的人。"
1000415-237 = "所以哪怕有多麼艱難和辛苦……"
1000415-238 = "我都會堅持下去。"
1000415-242 = "[ns]「真不愧是陽奈！太了不起了！」"
1000415-243 = "唔，唔嗯？"
1000415-244 = "別，別這麼說。#n如果遇到相同的狀況，就算是其他人也會這麼做的。"
1000415-245 = "其實也不是什麼值得稱讚的事……"
1000415-246 = "[s19]「就算是這樣……」\n[s20]「我還是想用盡全力──」"
1000415-249 = "[ns21]「稱讚下定如此決心的陽奈。」\n[ns22]「這是我身為老師應該做的事。」"
1000415-252 = "…………嗯……這樣啊。"
1000415-260 = "是我。"
1000415-264 = "委，委員長！真的很抱歉！"
1000415-265 = "雖然知道您今天休假……"
1000415-266 = "但是現在格黑娜北部地區發生了驚天動地的騷動……！"
1000415-271 = "咦！？溫泉開發部、頭盔團和太妹集團發動了全面戰爭！？#n為什麼！？"
1000415-272 = "因為販售溫泉泡湯券的黃牛票！？"
1000415-276 = "……我知道了。"
1000415-280 = "唉……"
1000415-281 = "老師，雖然可惜，但休息時間好像只能到此為止了。"
1000415-282 = "[s]「嗯……辛苦你了。」"
1000415-283 = "……今天已經和老師放鬆了一天，所以沒事的。"
1000415-284 = "那……"
1000415-291 = "──現在我該回到風紀委員長的崗位了。"
1000415-292 = "[s]「路上小心，陽奈。」"
