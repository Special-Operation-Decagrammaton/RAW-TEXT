[translation]
1000415-1 = "น้ำหนักที่แขนซ้าย"
1000415-2 = "(หลังจากคุยกันเสร็จ คุณครูก็รีบไปที่ห้องของฮินะทันที)"
1000415-6 = "[ns] \"ฮินะ ครูมาตามนัดแล้ว\""
1000415-8 = "อ่า... อืม เข้ามาก่อนสิ คุณครู"
1000415-9 = "[s] \"ขอรบกวนหน่อยน้า\""
1000415-15 = "ฮุฮุ... มาเร็วกว่าที่คิดอีกนะ คุณครู"
1000415-19 = "เอ๋... เหงื่อท่วมเชียว เป็นอะไรรึเปล่า?"
1000415-20 = "หรือว่า... เกิดเรื่องอะไรขึ้นระหว่างมาที่นี่งั้นเหรอ..."
1000415-21 = "[ns1] \"อ้อ ครูแค่ตื่นเต้นที่ฮินะเรียกมาน่ะ\"\n[ns2] \"ครูตื่นเต้นจัดๆ เลยวิ่งมาสุดแรงเลยน่ะ...\""
1000415-24 = "[ns3] \"ไม่เป็นไรหรอก! ว่าแต่ว่าฮินะเป็นอะไรรึเปล่า?\"\n[ns4] \"ฮินะขอบตาดำเป็นหมีแพนด้าแล้ว?!\""
1000415-27 = "อ่า... หมายถึงนี่สินะ"
1000415-28 = "อืม ฉันทำงานของคณะกรรมการวินัยจนถึงเช้าติดกันมากไปหน่อย"
1000415-29 = "เพราะงั้นก็เลยได้ใช้วันลาหยุดมาพักผ่อนอยู่แบบนี้น่ะ"
1000415-30 = "[s] \"เอ๋?! แล้วครูมาแบบนี้จะไม่เป็นไรเหรอ?\""
1000415-31 = "คือ..."
1000415-32 = "กะ... กลับกันเลยละ เพราะเป็นแบบนั้น..."
1000415-33 = "ฉันเลยอยากให้คุณครูมาหา... น่ะ"
1000415-34 = "มันเป็นการติดต่อที่กะทันหันเกินไป จนฉันเองก็คิดไม่ถึงว่าคุณครูจะรีบมาหาด้วยท่าทางยินดีแบบนี้..."
1000415-35 = "ทั้งที่เป็นคำขอที่เอาแต่ใจของฉันแท้ๆ... แต่คุณครูก็ยอมทำตาม... "
1000415-36 = "ขอบคุณนะ"
1000415-37 = "[s] \"ไม่เป็นไรเลย ฮินะเรียกครูมาในเวลาแบบนี้น่ะ ครูดีใจนะ\""
1000415-38 = "งะ... งั้นเหรอ?"
1000415-39 = "ยะ... อย่างนั้นเองเหรอ ฮุฮุ..."
1000415-43 = "อืมมม... ถึงไม่เคยรู้สึกมาก่อน..."
1000415-44 = "แต่ขอบตาฉันก็คล้ำเป็นหมีแพนด้าอย่างที่คุณครูพูด... แถมหน้าก็ดูซีดเซียวอีกด้วย"
1000415-45 = "นี่ฉันออกมาต้อนรับคุณครูด้วยสภาพแบบนี้เหรอเนี่ย... "
1000415-46 = "พอคิดดูอีกทีแล้ว... จะว่ายังไงดีล่ะ"
1000415-47 = "มัน... น่าอายน่ะ"
1000415-48 = "[s5] \"ไม่ต้องใส่ใจหรอก!\"\n[s6] \"สิ่งสำคัญก็คือตั้งแต่ตอนนี้ไปเราจะใช้วันหยุดยังไงต่างหาก\""
1000415-51 = "งะ... งั้นเหรอ?"
1000415-52 = "[ns] \"เอาละ มาทำให้วันนี้เป็นวันหยุดที่ดีที่สุดกันเถอะ!\""
1000415-56 = "อื้อ..."
1000415-61 = "อ๊ะ ขะ...ขอโทษนะ คุณครู "
1000415-62 = "พองานยุ่งๆ ฉันก็ลืมเรื่องมื้อเช้าไปสนิทเลยละ"
1000415-63 = "[s] \"ต้องกินให้ท้องอิ่มก่อน เราถึงจะสนุกกับวันหยุดได้\""
1000415-64 = "นั่นสินะ..."
1000415-65 = "ถ้างั้นไหนดูซิ ฉันจะลองหาร้านอาหารที่ออกไปนั่งกินข้างนอก..."
1000415-66 = "[s] \"ไม่ล่ะ ไม่เอาแบบนั้น!\""
1000415-67 = "หืม? ทำไมล่ะ...?"
1000415-68 = "[s] \"ครูไม่อนุญาตให้ทำเรื่องที่เสียพลังงานโดยเด็ดขาด!\""
1000415-69 = "ไหนๆ ก็เป็นวันหยุดทั้งที ถ้าต้องออกไปหาอะไรกินข้างนอก มันเป็นการเสียพลังงานอย่างรุนแรง... งั้นเหรอ?"
1000415-70 = "ถะ... ถ้างั้นจะทำยังไงดีล่ะ"
1000415-71 = "ที่บ้านฉันไม่มีของกินเลย..."
1000415-72 = "[s] \"คือว่านะ ฮินะ...\""
1000415-76 = "[ns] \"ชอบราเม็งถ้วยมั้ย?\""
1000415-77 = "หืม...?"
1000415-84 = "[ns] \"ดีละ งั้นรอแค่ 3 นาทีก็เรียบร้อยแล้ว\""
1000415-85 = "แต่ว่านะคุณครู คือว่า... กินแค่ราเม็งถ้วยแค่นี้พอจริงๆ เหรอ?"
1000415-86 = "คุณครูอุตส่าห์มาหาด้วยตัวเองแบบนี้ ฉันก็อยากเลี้ยงต้อนรับให้เหมาะสม..."
1000415-87 = "[s7] \"มันไม่สำคัญหรอกว่าจะกินอะไร\"\n[s8] \"สิ่งสำคัญคือการได้กินข้าวกับฮินะต่างหาก\""
1000415-90 = "[ns9] \"อ่า... ฮินะไม่ได้อยากกินงั้นเหรอ\"\n[ns10] \"ถ้าฮินะไม่ได้อยากกิน แต่ต้องฝืนกินเพราะครู...\""
1000415-93 = "ปะ... เปล่านะ! ไม่ใช่อย่างนั้นซะหน่อย"
1000415-94 = "ฉันไม่ได้เกลียดราเม็งถ้วยหรอก"
1000415-95 = "ก็นะ ฉันเคยกินราเม็งถ้วยระหว่างออกไปปฏิบัติภารกิจอยู่หรอก"
1000415-96 = "แต่แค่ไม่เคยคิดว่าการกินราเม็งถ้วยจะแทนมื้ออาหารได้... ก็เท่านั้นเอง"
1000415-97 = "[s11] \"ก็มันเป็นของที่กินได้ง่ายๆ นี่นะ\"\n[s12] \"ถ้ากินบ่อยๆ แทนมื้ออาหารเลยก็ไม่ดีหรอก\""
1000415-100 = "[ns] \"ถึงงานจะยุ่งแค่ไหน ฮินะก็ควรใส่ใจเรื่องอาหารมากกว่านี้นะ\""
1000415-104 = "...ฮิฮิ"
1000415-105 = "คุณครูพูดแบบนี้ได้เหรอ?"
1000415-106 = "ถ้าคุณครูพูดแบบนั้นละก็ ฉันเองก็คงจะพูดคำนั้นกับคุณครูเหมือนกัน"
1000415-107 = "[s] \"อืม... ครูเถียงไม่ออกเลย\""
1000415-108 = "แต่ถึงอย่างนั้น..."
1000415-109 = "ก็ไม่เคยคิดเลยนะ..."
1000415-110 = "ว่าจะได้มานั่งในห้องฉัน... แล้วรอให้ราเม็งถ้วยสุกด้วยกันกับคุณครูแบบนี้"
1000415-111 = "รู้สึกแปลกใหม่ยังไงไม่รู้..."
1000415-116 = "[ns] \"อ๊ะ ฮินะ เสร็จแล้วละ! มากินกันเถอะ!\""
1000415-117 = "อืม"
1000415-122 = "[ns] \"เป็นไงบ้าง?\""
1000415-123 = "อืม... อร่อยดี"
1000415-125 = "(หลังจากนั้นคุณครูกับฮินะก็ใช้เวลาวันหยุดพักผ่อนทำกิจกรรมต่างๆ ด้วยกัน)"
1000415-128 = "ต่อไป... ให้นั่งดูทีวีด้วยกันเหรอ?"
1000415-129 = "ตอนนี้ไม่มีรายการอะไรที่ฉันรอดูอยู่ แล้วก็ไม่มีเหตุผลพิเศษอะไรที่จะต้องดู..."
1000415-130 = "แต่ว่าการเปิดทีวีแล้วก็ใช้เวลานั่งดูไปเรื่อยๆ มันจะช่วยทำให้สดชื่นขึ้น... สินะ"
1000415-131 = "อืม ไม่ค่อยเข้าใจเท่าไร"
1000415-132 = "แต่ถ้าคุณครูพูดแบบนั้น... ก็ตกลง"
1000415-133 = "(คุณครูกับฮินะนั่งลงข้างๆ กัน และนั่งดูรายการคอมเมดี้ของนักแสดงที่ไม่รู้จักเล่นด้วยกัน)"
1000415-136 = "[ns] \"ฮินะ ต่อไปเรามาลองต่อไพ่ 4 ชั้นกันเถอะ!\""
1000415-137 = "จะ... จู่ๆ ก็จะเล่นเนี่ยนะ?"
1000415-138 = "อืม... พอเล่นอะไรง่ายๆ แบบนี้จะช่วยให้สมองปลอดโปร่งขึ้น... งั้นเหรอ?"
1000415-139 = "ขะ... เข้าใจแล้ว ฉันไม่มั่นใจว่าจะเล่นได้ดีหรอก แต่ก็จะลองพยายามดูนะ"
1000415-142 = "(คุณครูกับฮินะต่างทำไพ่ล้มอยู่หลายครั้ง แต่ทุกๆ ครั้งทั้งสองคนก็จะหันมาหัวเราะกัน#nแล้วก็ลองต่อไพ่ใหม่ซ้ำไปเรื่อยๆ)"
1000415-145 = "[ns] \"ฮินะ! ไม่มีทางหนีออกไปจากรอบสถาบันเกเฮนน่าได้หรอก...!\""
1000415-147 = "[ns] \"เตรียมใจไว้เลย!\""
1000415-148 = "พวกเขตปกครองตนเองที่ยึดมาได้... มีโอกาสที่จะต้องเสียค่าผ่านทางสองเท่าตามกฎของเกม..."
1000415-149 = "และสิ่งที่จะช่วยให้ผ่านวิกฤตนี้ไปได้ก็คือ... มาตรการพิเศษ"
1000415-153 = "ถ้าอย่างนั้นฉันก็จะ... "
1000415-154 = "เลือก <เกาะร้าง> ตรงนี้แหละ...!"
1000415-160 = "(ทั้งสองคนนั่งเล่นบอร์ดเกมที่เดินทางไปรอบๆ คิโวทอสและทอยลูกเต๋าเพื่อชิงกันซื้ออสังหาริม#nทรัพย์ต่างๆ มาเก็บไว้)"
1000415-167 = "อ๊ะ"
1000415-168 = "กะ... การโจมตีเมื่อกี้ทำให้พลังงานลดลงไปเกือบครึ่งเลย...!"
1000415-169 = "[s13] \"ฮินะ อย่ายอมแพ้เด็ดขาด!\"\n[s14] \"เรายังมีโพชั่นเติมพลังอยู่อีกเยอะ...!\""
1000415-172 = "โพชั่น... ถ้าใช้โพชั่นระหว่างต่อสู้ละก็... พลังเวทคงจะฟื้นฟูขึ้น..."
1000415-173 = "แล้วก็ใช้เวทโจมตีสกัดบอสเอาไว้ได้แน่ๆ...!"
1000415-174 = "แต่ว่า..."
1000415-175 = "แต่ว่าก็อดเป็นห่วงไม่ได้ว่าถ้าเกิดมีบอสที่แข็งแกร่งกว่านี้โผล่มาอีกจะทำยังไงดี..."
1000415-176 = "ขอเก็บโพชั่นไว้ก่อนแล้วกัน!"
1000415-177 = "[s] \"ครูเข้าใจที่ฮินะกังวลนะ! ครูเข้าใจดีเลยละ!\""
1000415-187 = "(คุณครูซื้อเกมมาเก็บเอาไว้ แต่จนถึงตอนนี้ก็ยังไม่ได้มีโอกาสเอาออกมาเล่นเลย เพราะงั้นวันนี้#nก็เลยตัดสินใจหยิบมาเล่นกับฮินะ...)"
1000415-193 = "(คุณครูใช้เวลาวันหยุดอย่างเอื่อยเฉื่อยอย่างมีความสุขร่วมกับฮินะ)"
1000415-197 = "(และเวลาก็ผ่านไปจนพระอาทิตย์ลับขอบฟ้าไป)"
1000415-200 = "ฮู่ว... "
1000415-201 = "วันนี้สนุกมากกว่าที่คิดอีกนะ"
1000415-202 = "ขอบคุณนะคุณครู ทั้งหมดเป็นเพราะคุณครูเลย..."
1000415-203 = "[s] \"ไม่หรอก ครูดีใจที่พอจะช่วยฮินะได้นะ\""
1000415-205 = "[ns15] \"แถมวันนี้ยังได้เห็นอะไรใหม่ๆ...\"\n[ns16] \"วันนี้ได้เห็นมุมที่คาดไม่ถึงของฮินะด้วย ครูรู้สึกดีมากเลย\""
1000415-208 = "หืม? มุมที่คาดไม่ถึง...?"
1000415-209 = "[s17] \"ปกติแล้วฮินะมักจะดูสมบูรณ์แบบอยู่เสมอๆ\"\n[s18] \"แต่ตอนเล่นเกมฮินะก็ทำหน้าเหวอๆ ออกมาด้วยละ...\""
1000415-212 = "เอ๋...?"
1000415-213 = "สะ... สีหน้าของฉันตอนเล่นเกม มันปะ... แปลกขนาดนั้นเลยเหรอ?"
1000415-214 = "คะ... คือว่าคะ... คุณครู...? "
1000415-215 = "[s] \"ฮ่าๆ ครูล้อเล่นน่ะ\""
1000415-219 = "...จริงๆ เลยเชียว คนอย่างคุณครูนี่มัน..."
1000415-220 = "[s] \"ฮินะ... งานของคณะกรรมการวินัยเหนื่อยมากเลยใช่มั้ย?\""
1000415-221 = "ถ้าบอกว่าไม่เหนื่อยอะไรมากละก็ คงเป็นการโกหก"
1000415-227 = "ถึงตอนนี้ดูเหมือนมันจะกลายเป็นส่วนหนึ่งของชีวิตฉันไปแล้วก็จริง"
1000415-228 = "ตั้งแต่ตอนที่ใส่ปลอกแขนคณะกรรมการวินัยเป็นครั้งแรก... ฉันไม่เคยคิดถึงน้ำหนักของสิ่งที่แบก#nรับเลยแม้แต่ครั้งเดียว"
1000415-229 = "บางครั้งรู้สึกอยากจะหนีไปให้พ้นๆ บางครั้งก็อยากจะโยนทุกอย่างทิ้ง... "
1000415-230 = "บางครั้งก็อยากบ่น อยากงอแงเพราะเหนื่อยสายตัวแทบขาด"
1000415-231 = "แต่วันนี้ฉันก็คิดว่า..."
1000415-235 = "นอกจากตัวฉันเองแล้ว ก็คงเป็นเพราะมีคนอื่นๆ ที่ไม่เคยหมดหวังในตัวฉัน เลยทำให้อดทนกับสิ่งที่#nแบกรับอยู่มาจนถึงวันนี้ได้น่ะ"
1000415-236 = "โดยเฉพาะ... ก็ยังมีคนอื่นๆ ที่เหมือนกับคุณครูที่คาดหวังในตัวฉันที่ต่างจากเมื่อก่อน..."
1000415-237 = "อื้อ... เพราะงั้นฉันจะไม่ยอมแพ้แล้วเดินหน้าต่อไป "
1000415-238 = "ไม่ว่ามันจะยากแล้วก็ลำบากแค่ไหน"
1000415-242 = "[ns] \"สมกับเป็นฮินะจริงๆ! สุดยอดเลยนะ!\""
1000415-243 = "หะ... หืม?"
1000415-244 = "มะ... ไม่หรอก ถ้าอยู่ในสถานการณ์เดียวกัน ใครๆ ก็คงคิดและทำแบบนั้นเหมือนกัน"
1000415-245 = "ไม่ใช่เรื่องที่ต้องชื่นชมกันสักหน่อย..."
1000415-246 = "[s19] \"แต่ครูคิดว่าไม่ใช่ใครก็ได้หรอกนะ\"\n[s20] \"คนที่ครูอยากจะชื่นชมน่ะคือฮินะ\""
1000415-249 = "[ns21] \"ครูอยากชมฮินะที่พยายามอย่างสุดตัวต่างหาก\"\n[ns22] \"การชื่นชมเด็กๆ คืองานของครูไงล่ะ\""
1000415-252 = "อืมมม... ยะ... อย่างนั้นเองเหรอ"
1000415-260 = "หืม มีคนติดต่อมาน่ะ"
1000415-264 = "ทะ... ท่านประธาน...! ขอโทษที่รบกวนนะคะ!"
1000415-265 = "ฉันรู้ว่าวันนี้เป็นวันหยุดของท่านประธาน..."
1000415-266 = "แต่ว่าตอนนี้ที่เขตเหนือของเกเฮนน่ากำลังเกิดเหตุวุ่นวายครั้งใหญ่ขึ้น...!"
1000415-271 = "หา?! แก๊งนักเลงกับพวกแก๊งหมวกกันน็อก แล้วก็ชมรมพัฒนาออนเซ็นปะทะกันครั้งใหญ่งั้นเหรอ?! เกิดอะไรขึ้นน่ะ?!"
1000415-272 = "เกิดเรื่องขึ้นเพราะขายตั๋วผีบัตรเข้าใช้ออนเซ็นงั้นเหรอ?!"
