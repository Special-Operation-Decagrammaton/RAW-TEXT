[translation]
1000415-1 = "A Heavy Weight"
1000415-2 = "Without a moment's hesitation, I hurried to Hina's room."
1000415-6 = "[ns] \"I'm here, Hina.\""
1000415-8 = "Yes, Sensei, please come in."
1000415-9 = "[s] \"...Excuse me for a moment.\""
1000415-15 = "Heehee... Well now, Sensei, you must have rushed right over."
1000415-19 = "Look at all that sweat. Are you all right?"
1000415-20 = "Did something...happen on the way here?"
1000415-21 = "[ns1] \"No, I just ran here.\"\n[ns2] \"I was happy that you called me.\""
1000415-24 = "[ns3] \"...Are you all right, though?\"\n[ns4] \"You have some huge dark circles.\""
1000415-27 = "Oh, well, you see..."
1000415-28 = "I was a bit overworked with my Prefect Team duties until early this morning."
1000415-29 = "But that also allowed me to take a day off today and rest a bit."
1000415-30 = "[s] \"Oh, should I be here on your day off?\""
1000415-31 = "Well..."
1000415-32 = "Actually...you're here BECAUSE of my day off."
1000415-33 = "I wanted to see you, Sensei..."
1000415-34 = "Of course, I didn't really think you'd come so willingly on such short notice..."
1000415-35 = "It was a childish request. You were very kind to grant it."
1000415-36 = "Thank you."
1000415-37 = "[s] \"Don't mention it. I'm always glad to be here for you.\""
1000415-38 = "I-Is that so?"
1000415-39 = "...Heehee, good..."
1000415-43 = "It's a bit late to say this now, but..."
1000415-44 = "As you mentioned, I have these dark circles, and...well, I don't exactly look my best."
1000415-45 = "I can't believe I invited you to come see me like this..."
1000415-46 = "Thinking it over... How should I put it...?"
1000415-47 = "Well, it's a bit embarrassing, I'll say that."
1000415-48 = "[s5] \"Don't worry about it!\"\n[s6] \"What's important is enjoying the rest of your day off.\""
1000415-51 = "O-Oh?"
1000415-52 = "[ns] \"Sure! Let's make today the greatest break ever.\""
1000415-56 = "...Yes, let's."
1000415-61 = "Oh... S-Sorry, Sensei, something else..."
1000415-62 = "I was so busy with work that I forgot I skipped breakfast."
1000415-63 = "[s] \"If you want to enjoy the day, you'd better start with a full stomach.\""
1000415-64 = "That's very true..."
1000415-65 = "Should we venture outside to look for something to eat...?"
1000415-66 = "[s] \"No, that's a negative!\""
1000415-67 = "Huh? Why...?"
1000415-68 = "[s] \"I can't allow you to waste your energy like that!\""
1000415-69 = "Would it truly be a waste to go out to eat on a day off?"
1000415-70 = "W-What do you suggest, then?"
1000415-71 = "I don't have much to eat here at home..."
1000415-72 = "[s] \"Hina, I'm thinking...\""
1000415-76 = "[ns] \"Do you like cup ramen?\""
1000415-77 = "Well enough..."
1000415-84 = "[ns] \"Great. Give me three minutes. We'll eat it together.\""
1000415-85 = "But Sensei...surely you deserve more than cup ramen."
1000415-86 = "You came all the way here. I was hoping to serve you something more proper..."
1000415-87 = "[s7] \"It doesn't matter what we eat.\"\n[s8] \"What matters is that we eat it together.\""
1000415-90 = "[ns9] \"Unless you don't want it.\"\n[ns10] \"You don't have to, just because I say.\""
1000415-93 = "No, no! This is fine."
1000415-94 = "...I don't hate cup ramen."
1000415-95 = "I've had it now and again, during operations mostly. It's just that..."
1000415-96 = "...it never felt like a proper meal to me."
1000415-97 = "[s11] \"It's convenient, at least.\"\n[s12] \"Well, I'm glad to hear you haven't had it too often.\""
1000415-100 = "[ns] \"You need to eat well, no matter how busy you get.\""
1000415-104 = "Pfft."
1000415-105 = "You of all people should be the last one saying that."
1000415-106 = "I could say the same to you."
1000415-107 = "[s] \"Hmm...good point.\""
1000415-108 = "Still..."
1000415-109 = "Now that I think about it..."
1000415-110 = "Sitting here in my room with you...waiting for the cup ramen to cook..."
1000415-111 = "...It's all rather refreshing."
1000415-116 = "[ns] \"It's ready, Hina! Let's eat!\""
1000415-117 = "All right."
1000415-122 = "[ns] \"How is it?\""
1000415-123 = "...It's good."
1000415-125 = "After that, Hina and I continued to enjoy various activities on her day off."
1000415-128 = "Hmm? You'd like to sit and watch TV together?"
1000415-129 = "Is that a good way to relax, just sit and watch whatever's on TV..."
1000415-130 = "...without expecting anything special to be on...?"
1000415-131 = "Hmm... I wouldn't know, but..."
1000415-132 = "If you say so, Sensei."
1000415-133 = "We watched a sketch comedy show, featuring celebrities neither of us had ever heard of."
1000415-136 = "[ns] \"Hey, Hina, I know! Let's build a house of cards, four stories high!\""
1000415-137 = "W-What, just out of the blue?"
1000415-138 = "Hmm, so that kind of simple labor can have a soothing effect on the mind...?"
1000415-139 = "W-Well, I'm not sure if I'll be any good at it, but I'll try."
1000415-142 = "We failed time after time, but we laughed throughout, enjoying the challenge."
1000415-145 = "[ns] \"Hina, those Gehenna Academy grounds are tightly guarded.\""
1000415-147 = "[ns] \"Be prepared!\""
1000415-148 = "Every district ahead of us is occupied. We have enough to pay their toll, IF they don't decide to double it."
1000415-149 = "We'll need to take decisive measures to escape this threat."
1000415-153 = "All right. All I have to do..."
1000415-154 = "...is get to that deserted island!"
1000415-160 = "We played a board game, where you travel around the regions of Kivotos, rolling dice to accumulate real estate."
1000415-167 = "Gah..."
1000415-168 = "Th-That attack just took us down to half health!"
1000415-169 = "[s13] \"Don't give up!\"\n[s14] \"We still have an Elixir we've been saving...!\""
1000415-172 = "The Elixir, right. If I drink it now, I'll get my magic back..."
1000415-173 = "...and then I can blast this boss!"
1000415-174 = "But then..."
1000415-175 = "...what if we need it later, for a stronger boss? I can't decide!"
1000415-176 = "I'll save it for now!"
1000415-177 = "[s] \"I understand how you feel! I really do!\""
1000415-187 = "We played a video game that I'd bought a while back, but hadn't had the time to play."
1000415-193 = "And that's how we passed the time together."
1000415-197 = "Before we knew it, the sun was already going down."
1000415-200 = "...Ah. "
1000415-201 = "I didn't think I'd have so much fun today."
1000415-202 = "All thanks to you, Sensei."
1000415-203 = "[s] \"I'm just glad I could be of help to you.\""
1000415-205 = "[ns15] \"Besides, it was a good day for me too.\"\n[ns16] \"I got to see an unexpected side of you.\""
1000415-208 = "Oh? An unexpected side of me...?"
1000415-209 = "[s17] \"You're normally very meticulous with everything.\"\n[s18] \"When you're gaming, there's this look on your face...\""
1000415-212 = "Huh...?"
1000415-213 = "Wh-What look are you talking about...?"
1000415-214 = "H-Hey, S-Sensei...? "
1000415-215 = "[s] \"Hahaha, I'm just kidding.\""
1000415-219 = "...Ah, you really are something."
1000415-220 = "[s] \"Hey, your work as a prefect is pretty tough, huh?\""
1000415-221 = "...I'd be lying if I said it was easy."
1000415-227 = "But now, it's so natural to me, it's like a part of myself."
1000415-228 = "Ever since I first put on the Prefect Team armband...I've felt the weight of it every day."
1000415-229 = "At times, I've wanted to run away, and at times, I've wanted to quit..."
1000415-230 = "Now and again, I've wanted to complain and say I couldn't handle it all, but..."
1000415-231 = "...then there are days like today."
1000415-235 = "When I realize that I've persevered and come this far thanks not only to my own efforts, but the support of others."
1000415-236 = "And now that there are people like you, Sensei, who've placed their trust in me..."
1000415-237 = "I know I can go on, without giving up."
1000415-238 = "No matter how tough or challenging it gets."
1000415-242 = "[ns] \"You're really amazing, Hina.\""
1000415-243 = "R-Really?"
1000415-244 = "Oh no, anyone would have done the same in my situation."
1000415-245 = "I don't deserve that sort of praise..."
1000415-246 = "[s19] \"You deserve all the praise in the world.\"\n[s20] \"Not just anyone could do what you've done.\""
1000415-249 = "[ns21] \"You've shown extraordinary commitment.\"\n[ns22] \"I'm just telling you the truth, like a teacher should do.\""
1000415-252 = "Well, I suppose I understand."
1000415-260 = "...Yes, message received."
1000415-264 = "H-Head Prefect! I'm so sorry..."
1000415-265 = "I know you're off today, but..."
1000415-266 = "There's a huge commotion right now at the Gehenna North District...!"
1000415-271 = "What?! There's an all-out war between the Hot Springs Department and the Helmet Gang?! What are they fighting about?!"
1000415-272 = "They're mad about resold hot springs tickets?!"
1000415-276 = "...All right, yes, that's what they're mad about."
1000415-280 = "*sigh*"
1000415-281 = "Well, Sensei, that's it for my day off."
1000415-282 = "[s] \"Yeah. Sounds like you have your hands full.\""
1000415-283 = "...I do, but I had a full day of rest with you. I'm ready for it now."
1000415-284 = "If you'll excuse me..."
1000415-291 = "This Head Prefect has work to do."
1000415-292 = "[s] \"Take care, Hina.\""
