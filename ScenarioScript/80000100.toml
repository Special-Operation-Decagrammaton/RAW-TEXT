[translation]
80000100-1 = "จิตวิญญาณสามประการ"
80000100-2 = "ย่านการค้าเทพเต่าดำ"
80000100-3 = "(คุณครูได้รับการติดต่อจากรูมิให้มาช่วยชิมอาหาร ก็เลยมาที่ย่านการค้าเทพเต่าดำ)"
80000100-4 = "อ๊ะ คุณครู มาแล้วเหรอ"
80000100-5 = "เอ้าๆ นั่งก่อน ไม่เจอกันนานจนลืมหน้าลืมตากันไปแล้วเนี่ย แวะมาบ่อยๆ หน่อยสิ"
80000100-6 = "[s] \"โทษทีๆ ว่าแต่จะให้มาลองชิมอะไรเหรอ?\""
80000100-7 = "ตอนนี้กำลังเตรียมหลายๆ อย่างอยู่น่ะ"
80000100-8 = "ก่อนอื่น... ดื่มชาก่อนไหม? ฉันเตรียมชาเขียวรสชาติดีไว้แล้วละ"
80000100-9 = "(คุณครูดื่มชาเขียวที่รูมิรินให้ดับกระหาย)"
80000100-10 = "เอาละ ถ้าเป็นคุณครูคนที่หูตาไวแล้วละก็ คิดว่าอาจจะพอเดาความหมายบางอย่างจากการที่ฉันเตรียม#nชาเขียวไว้ได้นะ"
80000100-11 = "[s1] \"อืม... ครูไม่รู้เลย\"\n[s2] \"ก็พอจะเดาได้แหละ\""
80000100-12 = "ฮ่าฮ่าฮ่า งั้นเหรอ คำใบ้น้อยไปสินะ นั่นสินะ... ถ้าเกิดเดาความหมายทุกอย่างได้จากชาถ้วยเดียว ก็คงไม่ต้องคุยกันต่อตั้งแต่แรกแล้วสินะ"
80000100-13 = "เอ้า ฉันเตรียมอันนี้ไว้ให้ อันนี้คือของจริงแล้ว"
80000100-14 = "เป็นไง? ขอลองฟังคำตอบของคุณครูหน่อยได้ไหม?"
80000100-15 = "ฉันเตรียมของหวานเอาไว้ใช่รึเปล่างั้นเหรอ? สมแล้วที่เป็นคุณครู... ถึงไม่ได้พูดออกมาแต่ก็สื่อ#nความหมายไปถึงได้สินะ"
80000100-20 = "นี่คืออะไรน่ะเหรอ? ถ้าให้เข้าใจง่ายๆ ก็... ขนมไหว้พระจันทร์นั่นแหละ"
80000100-21 = "สิ่งที่ทำให้มันแตกต่างจากขนมไหว้พระจันทร์ทั่วไปก็คือมันมีส่วนผสมของช็อกโกแลตอยู่ไงล่ะ"
80000100-22 = "[s] \"มีตั้ง 3 ชิ้นแบบนี้แสดงว่ามันไม่เหมือนกันสินะ?\""
80000100-23 = "ช่างสังเกตดีเลยนี่ ใช่แล้วละ ขนมไหว้พระจันทร์ทั้งสามชิ้นใช้วิธีทำที่ต่างกันสามวิธี"
80000100-24 = "ชิ้นที่หนึ่งเป็นขนมไหว้พระจันทร์ธรรมดา... ที่ใช้แป้งห่อไส้ถั่วแดงกวนเอาไว้ข้างใน และเคลือบผิว#nด้านนอกด้วยช็อกโกแลต"
80000100-25 = "ชิ้นที่สอง ไส้ด้านในทำจากช็อกโกแลตและใช้แป้งห่อเอาไว้"
80000100-26 = "ส่วนชิ้นสุดท้าย วิธีทำมันค่อนข้างท้าทายสักหน่อย ฉันใช้แป้งโมจิบางๆ มาทำเป็นแป้งห่อให้เห็น#nไส้ข้างใน"
80000100-27 = "พอใส่ไส้ครีมช็อกโกแลตที่มีความหนืดสูงลงเพิ่มด้านใน มันก็จะถูกแช่เย็นไปในตัว สุดท้ายก็ได้เป็น#nขนมไหว้พระจันทร์ช็อกโกแลตเย็นยังไงล่ะ"
80000100-28 = "ฉันอยากถามคุณครูเรื่องนี้แหละ ในสามชิ้นนี้ ชิ้นไหนเหมาะกับชื่อ 'ขนมไหว้พระจันทร์ ช็อกโกแลต' ที่สุดเหรอ?"
80000100-29 = "เอ้าๆ ลองชิมดูก่อนแล้วค่อยตัดสินใจ ถ้าหวานเกินไปก็ดื่มชาเขียวล้างปากซะล่ะ"
80000100-31 = "(คุณครูชิมขนมไหว้พระจันทร์ ช็อกโกแลตอย่างละคำตามที่รูมิบอก)"
80000100-32 = "(ขนมไหว้พระจันทร์ ช็อกโกแลตที่รูมิทำอร่อยทุกชิ้น...)"
80000100-34 = "งั้นตอนนี้ก็ขอฟังคำตอบของคุณครูหน่อยนะ"
80000100-35 = "ชิ้นไหนเหมาะกับชื่อ 'ขนมไหว้พระจันทร์ ช็อกโกแลต' ที่สุดล่ะ?"
80000100-36 = "[s3] \"ก็ต้องสูตรดั้งเดิมที่เคลือบช็อกโกแลตด้านนอก อันที่ 1 สิ\"\n[s4] \"ครูว่าอันที่ 2 นะ ได้รสช็อกโกแลตแบบฉ่ำๆ เลย\"\n[s5] \"การทำอาหารคือความท้าทาย งั้นก็ต้องอันที่ 3 ที่ใช้วิธีใหม่น่ะ\""
80000100-40 = "งั้นเหรอ... ดีละ เข้าใจแล้ว! ขอบคุณนะคุณครู"
80000100-41 = "[s] \"ขอบคุณที่ชวนครูมาชิมขนมไหว้พระจันทร์วันนี้นะ\""
80000100-42 = "หืม? คือว่านะ วันนี้เป็นวันวาเลนไทน์ไม่ใช่รึไง?"
80000100-43 = "ฉันเรียกมาเพราะอยากให้คุณครูได้ชิมช็อกโกแลตต่างหาก"
80000100-44 = "[s] \"อ้าว...?\""
80000100-45 = "......"
80000100-46 = "ท่าทางแบบนี้... ฉันคิดไม่ถึงเลยแฮะ"
80000100-47 = "พอนึกดูแล้ว... มันก็เขินๆ อยู่หน่อยนะ"
80000100-48 = "เมื่อวานตอนที่ซ้อมพูดก็ยังไม่เป็นไรเลย ทำไมตอนนี้ถึงเป็นแบบนี้กันเนี่ย..."
80000100-49 = "แย่ละสิ พอพูดแบบนี้แล้วมันก็ยิ่งเขินใหญ่เลย... แย่จัง"
80000100-50 = "[s6] \"ครูพูดเองแบบนี้มันก็ยังไงๆ อยู่...\"\n[s7] \"คือ... แค่หาทางเปลี่ยนเรื่องคุยไปก็ได้แล้วไม่ใช่เหรอ\""
80000100-53 = "แบบนั้น... ฉันไม่ค่อยชอบเท่าไรน่ะ"
80000100-54 = "ระหว่างฉันกับคุณครู... ไม่มีอะไรที่ต้องปิดบังกันนี่นา"
80000100-55 = "เพราะงั้นฉันเลยตัดสินใจว่าจะพูดตรงๆ น่ะ..."
80000100-56 = "แต่ฉันไม่คิดว่ามันจะนำมาสู่ผลลัพธ์แบบนี้..."
80000100-57 = "[s] \"กินขนมไหว้พระจันทร์ด้วยกันไหม?\""
80000100-58 = "หืม? แต่นั่นเป็นขนมที่ฉันเตรียมไว้ให้คุณครูนะ"
80000100-59 = "มันเยอะเกินไปเลยไม่น่าจะกินคนเดียวหมดงั้นเหรอ...?"
80000100-60 = "......"
80000100-61 = "เอางั้นก็ได้ งั้นรอแป๊บหนึ่งนะ ฉันจะไปชงชามาเพิ่ม"
80000100-63 = "(หลังจากนั้นคุณครูกับรูมิก็แบ่งขนมไหว้พระจันทร์กินและใช้เวลาพูดคุยกันไปอย่างเพลิดเพลิน)"
