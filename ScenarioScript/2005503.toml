[translation]
2005503-1 = "UZQueen ฟอร์มตก"
2005503-2 = "ทางไปห้องชมรมพัฒนาเกม"
2005503-3 = "(คุณครูไม่คาดคิดมาก่อนว่าจะได้ยินคำว่า \"เกมนี้ยาก\" จากยูสึ)"
2005503-4 = "(เหตุการณ์ที่คาดไม่ถึงนี้ ทำให้คุณครูรีบมาที่มิลเลเนียมทันที)"
2005503-9 = "นี่ ลองเล่นเกมที่ปล่อยมาเมื่อเดือนก่อนรึยัง?"
2005503-11 = "[ns] (หืม? เกมเหรอ?)"
2005503-12 = "อ๋อ หมายถึงเกมต่อสู้อันใหม่ <เควสซิมูเลียน> ใช่มั้ย?"
2005503-13 = "เก็บรายละเอียดและธีมโลกอนาคตแนวไซเบอร์พังก์ได้สมบูรณ์สุดๆ เลยละ ฟังก์ชั่นการโต้ตอบต่างๆ ก็ออกแบบมาอย่างละเอียด การเคลื่อนไหวก็ลื่นมากด้วย"
2005503-14 = "แต่ว่ามันไม่แปลกไปหน่อยเหรอ?"
2005503-15 = "แปลกเหรอ? อ้อ ถ้าเป็นปัญหาเรื่องปรับปรุงระบบ ทางนักพัฒนาก็เพิ่งออกประกาศมาไม่นานนี้เอง..."
2005503-16 = "เปล่า ไม่ใช่เรื่องนั้นหรอก ที่แปลกคือไม่เห็น UZQueen ติดอันดับเลยน่ะสิ"
2005503-17 = "ระบบจัดอันดับเปิดมาเป็นอาทิตย์แล้วนะ"
2005503-19 = "(UZQueen...?)"
2005503-20 = "จะ... จริงด้วย! ไม่เคยมีช่วงไหนที่ชื่อ UZQueen ไม่อยู่ในระบบจัดอันดับของเกมต่อสู้มาก่อนเลยนะ... "
2005503-21 = "หรือว่าจะเกิดเรื่องอะไรกับ UZQueen กันนะ?"
2005503-23 = "(ทันที่ได้ยินบทสนทนาของเหล่านักเรียน คุณครูก็เร่งฝีเท้าขึ้นโดยไม่รู้ตัว) "
2005503-27 = "ห้องชมรมพัฒนาเกม"
2005503-28 = "[ns] \"ยูสึ! เป็นอะไรหรือเปล่า?!\""
2005503-29 = "คะ... คุณครู?!"
2005503-33 = "มะ... มีอะไรเหรอคะ?!"
2005503-34 = "ทำไมถึงดูรีบร้อนแบบนั้น..."
2005503-35 = "[s] \"ไม่ได้มีเรื่องอะไรใช่มั้ย ยูสึ?\""
2005503-36 = "คะ? มะ... ไม่มีอะไรนี่คะ คุณครู"
2005503-37 = "ดะ... ดูสิคะ ตอนนี้ฉันเข้าไปในตู้ได้เหมือนเดิมแล้วนะคะ"
2005503-42 = "ระ... หรือว่าเป็นเพราะข้อความที่ฉันส่งไปทาง MOMOTALK เมื่อครู่นี้?!"
2005503-43 = "แค่เพราะฉันบอกว่าเกมมันยาก...?!"
2005503-44 = "เพราะปกติฉันไม่เคยพูดอะไรแบบนี้เลย... งั้นเหรอคะ?"
2005503-48 = "คะ... คิดดูแล้วก็เป็นแบบนั้นจริงๆ ด้วยนะคะ..."
2005503-49 = "ที่ผ่านมาฉันไม่เคยต้องกังวลเรื่องระดับความยากของเกมเลย..."
2005503-50 = "[s1] \"ว่าแต่ว่าเกมที่ยูสึเล่นน่ะ ใช่เกมต่อสู้มั้ย...\"\n[s2] \"ใช่เกม <เควสซิมูเลียน> รึเปล่า?\""
2005503-53 = "คะ... คุณครูรู้ได้ยังไงคะ?!"
2005503-55 = "(เล่าเรื่องที่ได้ยินมาระหว่างทางให้ยูสึฟัง)"
2005503-56 = "อ่า คะ... คือว่า..."
2005503-57 = "ฉันยังเล่นเกมไม่ผ่านอย่างที่คุณครูได้ยินมาเลยค่ะ..."
2005503-58 = "นั่นก็เพราะว่า..."
2005503-59 = "คุณครูอยากลองเล่นดูมั้ยคะ...?"
2005503-61 = "(ยูสึเปิดเกม <เควสซิมูเลียน> ขึ้นมา)"
2005503-62 = "(และทันทีที่เกมเปิดขึ้นมา คุณครูก็เข้าใจได้ทันทีว่าทำไมยูสึถึงยังเล่นเกมนี้ไม่ผ่าน)"
2005503-64 = "[ns3] \"เป็นเกมที่ต้องต่อสู้แบบเสมือนจริงเองสินะ...\"\n[ns4] \"เกมวีอาร์นี่เอง...!\""
2005503-67 = "ค่ะ นอกจากจะต้องควบคุมปุ่มบังคับแล้ว จะต้องขยับร่างกายเพื่อหลบการโจมตีด้วยค่ะ"
2005503-68 = "แต่ว่าฉัน... ถนัดควบคุมปุ่มบังคับอย่างเดียว ส่วนเรื่องเคลื่อนไหวทางกายภาพไม่ค่อยถนัดเท่าไร..."
2005503-69 = "ฉันอยากเล่นให้ผ่านเหมือนกัน แต่แค่บทสอนเล่นก็ยังยากเลยค่ะ..."
2005503-70 = "คะ? คุณครูอยากลองเล่นด้วยงั้นเหรอคะ?"
2005503-71 = "คือ... มันมีโหมดเล่นพร้อมกันสองคนอยู่ด้วย..."
2005503-72 = "เป็นไอเดียที่ดีเลยนะคะ...?"
2005503-77 = "ทำไมฉันต้องใส่ชุดนี้อีกแล้วล่ะคะ...!"
2005503-78 = "ถ้าใส่ชุดที่เหมือนกับตัวเอกของเกมจะทำให้เล่นได้ลื่นขึ้นงั้นเหรอคะ?#nทะ... ที่คุณครูพูดมันก็ถูกอยู่หรอกค่ะ...!"
2005503-79 = "[s5] \"เอาละ ถ้างั้นตอนนี้...\"\n[s6] \"ขึ้นมานั่งบนไหล่ครูสิ ยูสึ\""
2005503-82 = "คะ?!"
2005503-83 = "ฮึก?!"
2005503-88 = "(คุณครูให้ยูสึขึ้นมาขี่คอ)"
2005503-91 = "ฮะ... ฮืออออ สูงจังเลยค่ะ...!"
2005503-92 = "คะ... คุณครูคะ แบบนี้มันไม่ใช่โหมดเล่นพร้อมกัน 2 คนนะคะ..."
2005503-93 = "[s7] \"แต่แบบนี้ก็เล่นเกมได้ดีนี่นา\"\n[s8] \"ดูนี่สิ ตัวละครในเกมของยูสึขี่คอครูด้วยนะ\""
2005503-96 = "มะ... มันก็เป็นแบบนั้น..."
2005503-97 = "[s9] \"เดี๋ยวเรื่องใช้แรง ครูจะจัดการให้เองนะ คุณนักบิน\"\n[s10] \"ยูสึตั้งสมาธิอยู่กับสิ่งที่ยูสึทำได้ก็พอ!\""
2005503-100 = "...!"
2005503-101 = "ถ้าอย่างนั้น ฉันจะคอยดูตำแหน่งของศัตรูและบอกให้เองค่ะ ส่วนคุณครูก็รับหน้าที่เคลื่อนไหว แล้วก็โจมตีให้ทีนะคะ"
2005503-102 = "[s] \"ดีละ ลุยกันเลย!\""
2005503-107 = "(หลังจากเริ่มเล่นเกมโหมดเล่นด้วยกันสองคนกับยูสึ...)"
2005503-108 = "(ทั้งสองคนใช้เวลาไม่ถึงหนึ่งวันก็ไต่อันดับขึ้นไปสู่อันดับสูงสุดได้)"
2005503-109 = "(และ...)"
2005503-111 = "(เริ่มมีการพูดถึงเรื่องการพบปาร์ตี้ 2 คน ที่พิชิตบอสกันด้วยการขี่คอลงในคอมมูนิตี้ของเกม <เควสซิมูเลียน> อย่างต่อเนื่อง) "
2005503-112 = "(แต่ถึงจะมีเรื่องเล่ากันไปต่างๆ นานา... แต่ว่ากันว่านอกจาก UZQueen แล้วก็ไม่มีผู้เล่นคนอื่น#nสามารถเลียนแบบวิธีนี้ได้เลย...)"
