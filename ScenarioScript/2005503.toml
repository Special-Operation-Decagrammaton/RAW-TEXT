[translation]
2005503-1 = "UZQueen的低潮期"
2005503-2 = "前往遊戲開發部的路上"
2005503-3 = "（柚子竟然會說遊戲很難）"
2005503-4 = "（面對這不可思議的狀況，急忙趕往了千年）"
2005503-9 = "話說，你玩過上個月發售的遊戲了嗎？"
2005503-11 = "[ns]（嗯？遊戲？）"
2005503-12 = "啊，你指的是新的格鬥遊戲《Simulion Quest》吧？"
2005503-13 = "以賽博龐克風格的近未來為舞台，世界觀的完成度相當高呢。#n不只互動細緻，動作也相當流暢。"
2005503-14 = "不過你不覺得有點怪怪的嗎？"
2005503-15 = "怪怪的……？#n啊，如果是說最佳化的問題，製作公司之前已經有公告了……"
2005503-16 = "我指的不是那個，是排行榜上看不到UZQueen啊。"
2005503-17 = "明明排行系統都已經開放一個星期了。"
2005503-19 = "（UZQueen……？）"
2005503-20 = "對，對耶！？#n至今為止，UZQueen從來沒有在格鬥遊戲的排行榜上缺席過……！"
2005503-21 = "難道UZQueen發生了什麼事嗎？"
2005503-23 = "（聽到這段對話的瞬間，不由得加快了腳步）"
2005503-27 = "遊戲開發部．部室"
2005503-28 = "[ns]「柚子！你沒事吧！？」"
2005503-29 = "老，老師！？"
2005503-33 = "發，發生什麼事了！？"
2005503-34 = "為什麼那麼著急……"
2005503-35 = "[s]「柚子，是不是發生什麼事了？」"
2005503-36 = "咦？沒，沒有啊，老師。"
2005503-37 = "你，你看，我現在也能順利進入櫃子裡了。"
2005503-42 = "難，難道老師是為了剛才那則MomoTalk趕過來的！？"
2005503-43 = "只因為我說了遊戲很難……！？"
2005503-44 = "平常絕對不會表現出的樣子讓人很擔心……是嗎？"
2005503-48 = "仔，仔細想想確實是這樣……"
2005503-49 = "以前玩遊戲的時候，我幾乎沒有因為難度而煩惱過……"
2005503-50 = "[s1]「那個遊戲的名字……」\n[s2]「是《Simulion Quest》嗎？」"
2005503-53 = "老，老師是怎麼知道的！？"
2005503-55 = "（把在來的路上聽見的事告訴了柚子）"
2005503-56 = "原，原來如此……"
2005503-57 = "……就像老師聽到的一樣，我還沒有認真挑戰過那款遊戲。"
2005503-58 = "至於原因……"
2005503-59 = "……老師要不要親自看看呢？"
2005503-61 = "（柚子啟動了《Simulion Quest》）"
2005503-62 = "（而在遊戲開始之後，馬上就明白了柚子認為這款遊戲很難的原因）"
2005503-64 = "[ns3]「原來這是一款必須實際動手戰鬥的……」\n[ns4]「……VR遊戲啊！」"
2005503-67 = "是的。除了操作手把之外，還需要活動全身來進行閃避和攻擊。"
2005503-68 = "但我……如果只是手部動作還不成問題，要跑步或活動身體就有點困難了……"
2005503-69 = "雖然想認真玩，卻連突破新手教學都有障礙……"
2005503-70 = "咦？老師也想一起玩嗎？"
2005503-71 = "那個……確實是有雙人合作模式沒錯……"
2005503-72 = "你，你有個好主意……？"
2005503-77 = "為什麼又要穿這套衣服……！？"
2005503-78 = "因為跟遊戲裡的主角服裝很像，玩起來會比較順暢……？#n雖，雖然是這樣沒錯……！"
2005503-79 = "[s5]「好，那麼……」\n[s6]「坐到我肩膀上吧，柚子。」"
2005503-82 = "咦！？"
2005503-83 = "噫噫！？"
2005503-88 = "（將柚子抱起，並讓他坐在肩膀上）"
2005503-91 = "哇，哇啊啊……好高……！"
2005503-92 = "老，老師，雙人合作模式不是這樣玩的……"
2005503-93 = "[s7]「不過有確實反映在遊戲裡啊？」\n[s8]「你看，柚子的角色在遊戲裡也騎在肩膀上。」"
2005503-96 = "確，確實是這樣沒錯……！"
2005503-97 = "[s9]「活動身體的部分就由我來代勞吧，駕駛員。」\n[s10]「柚子就專心做柚子擅長的事吧！」"
2005503-100 = "……！"
2005503-101 = "……那我負責索敵和說明，移動和攻擊就交給老師了。"
2005503-102 = "[s]「好，開始吧！」"
2005503-107 = "（就這樣和柚子以雙人模式進行遊戲……）"
2005503-108 = "（只花費不到一天就進入了排行榜前列）"
2005503-109 = "（在那之後……）"
2005503-111 = "（《Simulion Quest》的遊戲社群，#n　開始大量湧現「騎在肩膀上攻略BOSS的雙人組」的目擊情報）"
2005503-112 = "（然而即便如此，據說能做出這種操作的玩家就只有UZQueen而已……）"
