[translation]
2005503-1 = "UZQueen's Slump"
2005503-2 = "En Route to the Game Development Department"
2005503-3 = "I couldn't believe that Yuzu would find a game difficult."
2005503-4 = "Baffled, I rushed over to Millennium."
2005503-9 = "Hey, have you played that new game? You know, the one that came out last month?"
2005503-11 = "[ns] \"(Hm? A game?)\""
2005503-12 = "Oh, the new fighting game, \"Simulion Quest\"?"
2005503-13 = "Yeah! I love the near-future cyberpunk setting. The worldbuilding is immersive, the interactions are super detailed, and the animations are buttery smooth."
2005503-14 = "But isn't it a little strange?"
2005503-15 = "Strange? Oh, if you're talking about that optimization thing, the developer posted an announcement about it the other day. They're working on a patch, and—"
2005503-16 = "No, that's not it. I mean, isn't it weird that UZQueen isn't in the rankings?"
2005503-17 = "The board opened a week ago, and she's nowhere on it."
2005503-19 = "\"(UZQueen...?)\""
2005503-20 = "Oh, right! UZQueen's always dominating the fighting game rankings! How strange... Wow. Maybe she's on vacation?"
2005503-21 = "Or sick. What could have happened to her? I hope she's okay."
2005503-23 = "After overhearing the conversation, I walked even faster."
2005503-27 = "Game Development Department Club Room"
2005503-28 = "[ns] \"Yuzu! Are you okay?!\""
2005503-29 = "S-Sensei?!"
2005503-33 = "Wh-What's the matter?!"
2005503-34 = "Why are you in such a rush...? Please, catch your breath."
2005503-35 = "[s] \"Nothing's happened to you, right, Yuzu?\""
2005503-36 = "Huh? O-Of course not, Sensei."
2005503-37 = "L-Look, I can enter the cabinet perfectly fine now."
2005503-42 = "D-Don't tell me that you came here because of my MomoTalk?!"
2005503-43 = "All I said was that a game was a little hard...?!"
2005503-44 = "You're worried...because this is a \"new side of me\" that you've never seen before?"
2005503-48 = "Now that I think about it, that's true..."
2005503-49 = "I've almost never had difficulty playing a game."
2005503-50 = "[s1] \"Would that game's name happen to be...\"\n[s2] \"...Simulion Quest?\""
2005503-53 = "H-How did you know?!"
2005503-55 = "I told her about the conversation I overheard on campus."
2005503-56 = "Ah, I, I see..."
2005503-57 = "...As you already learned, I haven't been able to properly master this game yet."
2005503-58 = "Because, well..."
2005503-59 = "...Do you want to see for yourself?"
2005503-61 = "Yuzu booted up Simulion Quest."
2005503-62 = "As soon as the game started and she pulled out the peripherals, I suspected why she'd been having a hard time."
2005503-64 = "[ns3] \"You have to fight with your own hands...\"\n[ns4] \"...It's a VR game!\""
2005503-67 = "Yes. It's not just about buttons or timing. You have to move your entire body to dodge and attack."
2005503-68 = "But for me... It would be one thing if it were just using my hands, but moving my whole body feels so stiff and awkward, so..."
2005503-69 = "I really wanted to give it a proper try, but even the tutorial was difficult..."
2005503-70 = "Huh? You'd like to give it a go, Sensei?"
2005503-71 = "Well, there is a two-player co-op mode, but..."
2005503-72 = "You have an \"idea\"?"
2005503-77 = "Why am I wearing this again?!"
2005503-78 = "Oh, because it \"looks like what the protagonist wears\"? Well, that's not exactly wrong, but still...! Isn't this a bit much?"
2005503-79 = "[s5] \"Now, then...\"\n[s6] \"Get on my shoulders, Yuzu.\""
2005503-82 = "What?!"
2005503-83 = "Eek!"
2005503-88 = "I picked up Yuzu as if I were giving her a piggyback ride."
2005503-91 = "W-Waaah, I'm so high up...!"
2005503-92 = "S-Sensei, this isn't how you're meant to play two-player co-op...!"
2005503-93 = "[s7] \"But it's reflected in the game, see?\"\n[s8] \"Look, your character is on piggyback!\""
2005503-96 = "Th-That's true, but...!"
2005503-97 = "[s9] \"I'll handle moving the body, pilot.\"\n[s10] \"Concentrate on your job, Yuzu!\""
2005503-100 = "...!"
2005503-101 = "...In that case, I'll handle surveillance and briefing, and I'll leave you in charge of movement and attacking, Sensei."
2005503-102 = "[s] \"Sounds good. Let's do this!\""
2005503-107 = "And so, after starting a two-player co-op game with Yuzu..."
2005503-108 = "...It took less than a day to break into the top rankings."
2005503-109 = "After that..."
2005503-111 = "...Players flooded the Simulion Quest forums. They posted screenshots and wrote personal accounts of seeing a unique co-op piggyback party sweeping through the bosses."
2005503-112 = "However, despite all the interest, UZQueen proved to be the only player capable of replicating this technique..."
