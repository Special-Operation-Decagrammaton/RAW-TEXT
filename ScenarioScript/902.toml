[translation]
902-1 = "ชอกมาห์ ผู้พิทักษ์แห่งบรรพกาล ผู้ปกป้องอาณาจักร"
902-2 = "สวัสดีค่ะ คุณครู"
902-3 = "นี่เป็นสถานการณ์เร่งด่วน ดังนั้นฉันจะรีบสรุปให้แต่ประเด็นสำคัญนะคะ"
902-4 = "มีรายงานว่ามีการพบเรือลึกลับลำหนึ่งที่ภูเขาไฟในเขตขั้วโลกของคิโวทอสค่ะ"
902-5 = "ค่ะ... ฉันรู้ดีค่ะว่าภูเขาไฟกับเรือเป็นสิ่งที่ดูไม่เกี่ยวข้องกันเลย"
902-6 = "ตอนได้รับรายงาน ฉันก็สงสัยว่ามีความผิดพลาดอะไรหรือเปล่า..."
902-7 = "รายงานบอกว่าตอนนี้เรือลึกลับลำนั้นกำลังแล่นอยู่บนลาวาภูเขาไฟค่ะ"
902-8 = "นอกจากนี้ เมื่อเรือลำนั้นเข้าไปใกล้ภูเขาไฟ สัญญาณการระเบิดของภูเขาไฟก็เพิ่มขึ้นอย่างมากเลยค่ะ"
902-9 = "ถึงเราจะยังไม่รู้สาเหตุ แต่เป็นที่แน่ชัดว่าเรือลึกลับลำนั้นกำลังกระตุ้นให้เกิดภูเขาไฟระเบิดค่ะ"
902-10 = "ที่จริงเราได้รับความช่วยเหลือจากผู้ช่วยเหลือปริศนาในการวิเคราะห์สถานการณ์นี้ค่ะ..."
902-11 = "แต่ถ้าจะถามว่าคนนั้นคือใคร ฉันก็ตอบไม่ได้ค่ะ เพราะต่อให้ตรวจสอบทุกวิถีทางแล้ว ฉันก็ไม่อาจรู้ตัวตนของผู้ช่วยเหลือคนนั้นได้เลยค่ะ"
902-12 = "แถมเรื่องราวจากผู้ช่วยเหลือคนนั้นก็เป็นเรื่องที่เข้าใจยากขึ้นไปอีกค่ะ"
902-13 = "ทั้งเรื่องคำศักดิ์สิทธิ์ทั้งสิบที่ไม่อาจเอื้อนเอ่ยได้ด้วยตัวเอง ทั้งเรื่องผู้เลื่อมใสผู้บุกเบิกเส้นทางไปสู่#nความศักดิ์สิทธิ์..."
902-14 = "ถึงเราจะปล่อยพวกคำที่ไม่อาจรู้ความหมายพวกนั้นไปได้ก่อน แต่ตอนนี้สถานการณ์ภูเขาไฟเป็นสิ่งที่#nเราวางมือไม่ได้ค่ะ"
902-15 = "จากบันทึกในอดีตและการประเมินขนาดของภูเขาไฟ มีการวิเคราะห์ว่าถ้าภูเขาไฟระเบิดอย่างรุนแรง ก็อาจเกิดภาวะฤดูหนาวจากภูเขาไฟในคิโวทอสได้ค่ะ"
902-16 = "ค่ะ ถ้าเป็นไปได้ ฉันอยากขอให้คุณครูช่วยตรวจสอบเรือลึกลับลำนั้น... แล้วป้องกันเพื่อไม่ให้ภูเขาไฟ#nระเบิดค่ะ"
902-17 = "เพราะดูเหมือนว่าเรือกับความเคลื่อนไหวของภูเขาไฟจะมีความสัมพันธ์ระหว่างกันค่ะ"
902-18 = "นอกจากนี้ ผู้ช่วยเหลือคนนั้นบอกไว้ว่าตอนนี้เหมือนจะมีการเตรียมมาตรการบางอย่างเพื่อตอบโต้#nภูเขาไฟไว้แล้วค่ะ"
902-19 = "ชื่อของเรือที่ผู้ช่วยเหลือเรียกต่อๆ กันมาคือ <ชอกมาห์> ซึ่งมีชื่อเต็มๆ ว่า <ผู้พิทักษ์แห่งบรรพกาล#nผู้ปกป้องอาณาจักร> ค่ะ"
902-20 = "ฉันเองก็ยังไม่รู้ค่ะว่าหมายความว่าอะไร"
902-21 = "แต่ก็... รบกวนด้วยนะคะ คุณครู"
