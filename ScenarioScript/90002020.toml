90002020-85 = "3;히마리 방한복;03;……조금 분위기를 환기할 필요가 있겠네요. 현재 항로는 어떤가요, 토키?\n#3;em;[음표]\n#3;a"
90002020-86 = "#all;hide"
90002020-87 = "4;에이미 수영복ND;01\n2;토키 모드 1;02;항로에는 아무 문제 없습니다. 강철대륙의 신호 역시 점점 커지고 있습니다."
90002020-88 = "4;에이미 수영복ND;02;굳이 문제라면, 그 신호가 너무 강력해서 착륙 지점을 확정하기 어려울 수도 있다는 것 정도야."
