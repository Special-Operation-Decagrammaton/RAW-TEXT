[translation]
90002020-1 = "Episode 2;Transport Ship"
90002020-3 = "Hello, passengers. This is your pilot and de facto captain, Asuma Toki, speaking."
90002020-4 = "We are currently flying on a set course, 8 kilometers above the tropopause. Clear skies."
90002020-5 = "We will be arriving at our destination, the Steel Continent, shortly. There may be unexpected turbulence, so please take a moment now to ensure your seatbelt is fastened."
90002020-6 = "Also, please return your chairs and trays to their original positions."
90002020-7 = "Huh? What trays?"
90002020-8 = "I was kidding. Ha ha."
90002020-9 = "Fufu. De Facto Captain Toki has a sense of humor. "
90002020-10 = "In that case, I am your operations and flight assistant, Akeboshi Himari. ♪"
90002020-11 = "It looks like we're on a bit of a tight schedule, but we'll be sure to get everyone there in time to save the world."
90002020-12 = "Is everyone comfortable? Feeling okay after last time?"
90002020-18 = "Well, it almost didn't feel like we were even flying then, because we were up so high."
90002020-19 = "But now... We really are flying through the sky. Heehee."
90002020-21 = "I accepted the co-pilot role as you directed, President, but am I really needed here?"
90002020-22 = "It's inefficient..."
90002020-23 = "No, no. It's rational, Eimi. "
90002020-24 = "As our crew grows, so do the potential variables. Therefore, we needed to lessen the scope of Toki's responsibilities."
90002020-25 = "However, I, Toki, am the perfect maid. I would achieve perfection, regardless of the number of problems, Ms. Rio."
90002020-26 = "Humans are fallible, and we have to always prepare for that."
90002020-27 = "Understood, Ms. Rio."
90002020-29 = "Rio! Rio! This transport ship is very mind-blowing! It is unbelievable!"
90002020-31 = "W-We've never seen it...from the inside..."
90002020-32 = "Hmph. I wasn't done exploring the whole thing yet."
90002020-33 = "C'mon, Momoi. That's not the priority right now."
90002020-39 = "Well, there was quite a lot to see. A lobby outside the cockpit, textbook shared living arrangements..."
90002020-43 = "Honestly, it was cleaner than my room in there..."
90002020-44 = "...Please learn to clean up after yourselves."
90002020-45 = "Yes. I've recently been reminded of just how important cleaning is."
90002020-46 = "Pfft?!"
90002020-47 = "Coming from you, that's a bit..."
90002020-50 = "While the hangar is the most important section of this ship, it's also arguably the most vulnerable."
90002020-51 = "The hatch in there connects directly to the outside. As well as the drop pods."
90002020-52 = "AND all of your AMAS. At least, the ones you brought. Wasn't there a...cone-shaped structure in there as well?"
90002020-53 = "That's..."
90002020-54 = "...nothing."
90002020-55 = "Is that so?"
90002020-56 = "I was surprised how quiet the engine was, even from down there."
90002020-57 = "Yeah... It was nice... It felt like I could hide down there in an emergency...like my locker..."
90002020-58 = "I must stress, the hangar is the most vulnerable and dangerous place to be during an emergency, understood...?"
90002020-65 = "[ns1] \"Color me THOROUGHLY impressed.\"\n[ns2] \"How did you manage all of this, Rio?\""
90002020-68 = "I did little. This is just Millennium's technology being put to work."
90002020-69 = "In one form or another, researching and executing the imaginable is...feasible."
90002020-70 = "Researching beyond mankind's imagination is something else entirely."
90002020-71 = "To put it more simply, if you can imagine it, you can find it. Clues exist within our reality."
90002020-72 = "But what do you do when something happens that's inexplicable in every facet of your imagination?"
90002020-73 = "[s] \"Is that possible?\""
90002020-74 = "Entirely so. I run into it all the time in my research of the submicroscopic and super macroscopic worlds."
90002020-75 = "Take gravity for example. We're all subject to the laws of gravity, but graviton, the root of—"
90002020-76 = "Stop! Stop! President Rio, stop right there! This kind of droning about physics and technical stuff is exactly why people don't like you!"
90002020-77 = "R-Really?"
90002020-78 = "Well... I'm used to it at this point anyway..."
90002020-80 = "How do you expect us to respond to that...?"
90002020-85 = "Let's lighten things up a little. Flight report, De Facto Captain Toki?"
90002020-87 = "No issues to report, President. The Steel Continent's signal has been steadily increasing."
90002020-88 = "...To the point that it's overwhelming our sensors. Identifying a safe landing area will be difficult."
90002020-90 = "Huh? Well, if it's that big, can't we just land anywhere?"
90002020-92 = "Negative, Momoi. If we are unlucky, and we land somewhere with an efficient enough anti-air system, we will be saying goodbye to one another early."
90002020-93 = "In more human terms, this ship's function is transport and research, so it is lacking in defensive capabilities."
90002020-95 = "And keep in mind that our opponent is the Steel Continent: Netzach, the seventh prophet."
90002020-96 = "We'll need to imagine the unimaginable from here on out."
90002020-97 = "Honestly, it's difficult to discern if flying high or low puts us at a better advantage right now."
90002020-99 = "Our temporary solution is to evade detection by sight, infrared, or scanners by cloaking ourselves in the clouds."
90002020-100 = "...But it's hard to confirm visual of the Steel Continent this way."
90002020-102 = "Do we have no other methods of detecting Netzach?"
90002020-104 = "None that would not reveal our position. If we activate the radar, they will pinpoint our location just as quickly."
90002020-105 = "And the strength of the Continent's signal is still an issue."
90002020-106 = "The signals are...one convergent mass. Analysis is impossible."
90002020-107 = "[s] \"So... What's the plan?\""
90002020-108 = "..."
90002020-110 = "..."
90002020-111 = "We must simply keep moving forward and stay alert."
90002020-112 = "Wow. Cutting straight to the point, Toki..."
90002020-113 = "Do you take issue with that?"
90002020-114 = "...No. Not at all."
90002020-115 = "I am left more confused than before. Well, we shall be reaching our target location—"
90002020-121 = "No, our target continent soon. Lowering altitude."
90002020-133 = "Augh?!"
90002020-134 = "Wh-What happened, Toki?"
90002020-135 = "Reporting anomaly! It is a huge...thing!"
90002020-136 = "More precisely, it's a giant robot arm!"
90002020-137 = "These signals...! It's the ninth prophet! Yesod!"
90002020-139 = "Yesod?!"
90002020-145 = "Aaaaah?!"
90002020-146 = "Aaaaugh?!"
90002020-152 = "Awawawa...!"
90002020-153 = "Wh-What is that THIIING?!"
90002020-154 = "E-Eek...! EEEK...!"
90002020-156 = "Everyone, grab onto something! Damage report!"
90002020-159 = "Engine is compromised, but the main power is still functioning! Multiple auxiliary engines are in critical condition."
90002020-160 = "Fire in the main engine. Activating fire extinguisher response."
90002020-165 = "Losing altitude, fast! President, at this rate—"
90002020-166 = "We're going down!"
90002020-171 = "Update on the engine fire?!"
90002020-172 = "Extinguished! But it's spread to the exterior wall!"
90002020-173 = "Full throttle the reverse thrusters until critical!"
90002020-177 = "Full throttle until critical point. Activating emergency landing sequence. Colliding with surface in 3...2...1...!"
90002020-191 = "[ns] \"Is anyone hurt?!\""
90002020-192 = "Ugh... Ow, ow, owww... The world is—no, the ground... The ground is spinning..."
90002020-193 = "And that's why you wear your seatbelt..."
90002020-194 = "Does anyone feel bad for me? I had to do that with one wheel..."
90002020-195 = "A-Anyways... Where are we? Th-This isn't exactly what I'd imagined the Steel Continent to look like..."
90002020-196 = "It's what's left of the terrain on the outskirts of the Continent. "
90002020-197 = "Yesod's giant...mechanical arm attacked us just as we were about to pass over its borders."
90002020-199 = "Resulting in our crash landing here."
90002020-212 = "Wh-What is it now?!"
90002020-213 = "Detecting a high volume of forces! Toki, can you display the external cameras?"
90002020-214 = "Displaying."
90002020-229 = "They're the same units as the ones that attacked us at the seed vault... At Tiphareth's seed vault."
90002020-230 = "We're surrounded! At this rate...!"
90002020-231 = "Do not worry, Rio! I shall protect this ship and our crew!"
90002020-236 = "A-Ah...!"
90002020-237 = "Aris?!"
90002020-242 = "..."
90002020-243 = "Game Development Department! Move out!"
90002020-245 = "Momoi?"
90002020-246 = "U-Us too...?"
90002020-248 = "Duh! Are you seriously gonna leave everything to Aris out there? Did you get that, Sensei? We'll be back!"
90002020-254 = "G-Geez! I got it! Seriously, Momoi..."
90002020-255 = "One...for all... All...for one..."
90002020-260 = "All of you, wait!"
90002020-261 = "[s] \"...\""
90002020-263 = "[ns] \"Eimi. Can I entrust the Game Development Department to you?\""
90002020-264 = "Huh? To me?"
90002020-265 = "..."
90002020-266 = "Understood, Sensei. Yes, you can."
90002020-272 = "[ns] \"In the mean time, Rio, Toki, repair what you can here.\""
90002020-273 = "Yes, understood."
90002020-274 = "Let us start with assessing the damage to the engine, Rio."
90002020-276 = "And us?"
90002020-277 = "[s] \"Kei and Himari... Please be on standby!\""
90002020-278 = "Oh my, Sensei. Do you have no use for us?"
90002020-279 = "Ah, I see. Of course. Someone of my caliber must be the one to oversee the entire operation."
90002020-287 = "Ugh. It never ends!"
90002020-288 = "We cannot give up now! No matter what, we must protect Sensei and the others!"
90002020-293 = "Let's take one big step back, everyone. Except you, Momoi. Come with me."
90002020-297 = "Huh...?"
90002020-298 = "Isn't that—Eimi?"
90002020-299 = "Reporting for duty. Sensei sent me as reinforcements. Momoi and I will hold the frontline."
90002020-300 = "Aris, you're our firepower. Provide support from the rear."
90002020-301 = "Midori, marksman. Yuzu, grenadier. Keep the center pushed back."
90002020-302 = "Sensei sent... Yes! Understood! We shall be in your care, Eimi!"
90002020-303 = "Yes. Let's do what we can."
90002020-305 = "A-Are we going to be okay?"
90002020-313 = "Hm..."
90002020-314 = "This much, we can handle."
