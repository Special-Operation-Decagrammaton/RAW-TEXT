90002020-50 = "#na;리오 동복;어떻게 보면, 이 수송선에서 가장 취약한 공간이자 가장 중요한 공간이지."
90002020-51 = "#na;토키 모드 1;네. 외부와 바로 연결되는 해치가 있으며, 낙하기…… [ruby=Drop Pod]드랍 포드[/ruby]도 있으니까요."
90002020-52 = "#na;히마리 방한복;가져온 AMAS들도 모두 격납고에 배치 중이죠? 그러고 보니 뭔가, 정체 모를…… 원뿔형? 모양의 구조체가 보이던데요?"
90002020-53 = "#na;리오 동복;그건……."
90002020-54 = "#na;리오 동복;……아무것도, 아니야."
