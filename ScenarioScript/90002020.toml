[translation]
90002020-1 = "第2話;運輸船"
90002020-3 = "各位乘客，大家好。#n我是各位的主駕駛，同時也擔任機長的飛鳥馬季。"
90002020-4 = "我們現在正位於雲層之上、對流層頂約8km的高空，目前航線狀況一切正常。"
90002020-5 = "不久後便會抵達目的地鋼鐵大陸。#n為了預防突發的亂流，還請各位務必繫好安全帶。"
90002020-6 = "並將桌子豎直後收回原位。"
90002020-7 = "咦？這裡……好像沒有桌子吧？"
90002020-8 = "我知道，只是隨口說說罷了。"
90002020-9 = "呵呵。季機長意外地很愛開玩笑呢。 "
90002020-10 = "而我則是負責操作與飛行輔助的明星陽葵♪"
90002020-11 = "雖然過程略顯驚險，不過應該能按照預定時間順利抵達。"
90002020-12 = "大家的心情如何呢？#n尤其是和那個時候相比。"
90002020-18 = "那個時候因為飛得太高，反而沒有翱翔天際的感覺……"
90002020-19 = "現在……好像真的在天上飛翔一樣呢。#n耶嘿嘿……"
90002020-21 = "雖然當初是說因為有需要才坐在副駕駛座上……不過這個職務真的有必要嗎，會長？"
90002020-22 = "總覺得這樣有點沒效率……"
90002020-23 = "這樣才是更合理的選擇，英美。 "
90002020-24 = "人員增加就代表要顧慮的事也會變多，所以有必要減輕季的負擔。"
90002020-25 = "身為完美女僕的我，就算自己一個人也完全沒問題的，莉央大人。"
90002020-26 = "凡事總有萬一。#n必須預防所有的變數才行。"
90002020-27 = "既然莉央大人這麼說，我明白了。"
90002020-29 = "話說……這艘運輸船真是太厲害了，莉央前輩！"
90002020-31 = "這，這還是我第一次……完整看到內部的構造……"
90002020-32 = "唔嗯～我本來還想一一仔細參觀的說。"
90002020-33 = "這也沒辦法，姐姐……你也知道目前的情況。"
90002020-39 = "從駕駛艙出來就是大廳……感覺是個名符其實的公共空間呢？"
90002020-43 = "老實說，這裡好像比我的房間還乾淨……"
90002020-44 = "……麻煩你打掃一下吧。"
90002020-45 = "沒錯……我也深刻體會到了打掃的重要性。"
90002020-46 = "噗哈！？"
90002020-47 = "哇……這種話居然會從你口中說出來……"
90002020-50 = "某方面來說，這裡是整艘運輸船中最為脆弱，卻也最為重要的空間。"
90002020-51 = "是的。這裡有直接通往外部的艙門，還有空降……投放用的[ruby=Drop Pod]投放艙[/ruby]。"
90002020-52 = "帶來的AMAS也都正在機庫內配置吧？#n這麼說來，我好像還有看到……接近圓錐形的未知構造體？"
90002020-53 = "那是……"
90002020-54 = "……沒什麼。"
90002020-55 = "哼嗯……"
90002020-56 = "引擎聲出奇地安靜呢……"
90002020-57 = "嗯……甚至讓人覺得如果發生了什麼事，好像可以躲在這裡……"
90002020-58 = "如果真的出事的話，這裡應該也是最危險的吧……？"
90002020-65 = "[ns1]「我也再次感受到了這裡的厲害程度……」\n[ns2]「你是什麼時候準備的呢，莉央？」"
90002020-68 = "其實這也沒什麼大不了的。#n我只不過是活用了千年發展至今的技術而已。"
90002020-69 = "將想像得到的事情，用研究加以實現……總有辦法能夠達成。"
90002020-70 = "問題在於研究那些無法想像的事情。"
90002020-71 = "確實如此呢。#n事物既然能夠想像得到，就代表已經存在某些蛛絲馬跡。"
90002020-72 = "真正困難的……是那些未曾想像過的事，突然「啪」地一聲將結果擺在眼前。"
90002020-73 = "[s]「會有這種事嗎？」"
90002020-74 = "當然有。比如在研究超微觀世界或超宏觀世界時，經常會發生這種情況。"
90002020-75 = "例如重力就是個很好的例子。#n雖然我們都是在被重力束縛的情況下生活，但作為其根源的重力子──"
90002020-76 = "卡卡卡！莉央會長，說到這裡就好！#n時不時就開始進行專業解說的話，可是會被大家討厭的哦！？"
90002020-77 = "是，是嗎？"
90002020-78 = "不過……我已經習慣被人討厭了……"
90002020-80 = "你回這種話是要我們怎麼辦啊……"
90002020-85 = "……看來需要轉換一下氣氛呢。#n目前航線的狀況如何，季？"
90002020-87 = "沒有任何問題。鋼鐵大陸的訊號也正逐漸增強。"
90002020-88 = "硬要說的話，就是因為訊號過於強大，可能會導致難以確定著陸地點吧。"
90002020-90 = "咦？不能隨便找個地方著陸嗎？"
90002020-92 = "那並不是個好方案，桃井。#n萬一飛向防空系統完善的區域，可是會出大事的。"
90002020-93 = "而且這艘運輸船主要用於運輸與研究，所以防禦性能並不是特別優秀。"
90002020-95 = "再加上對方是鋼鐵大陸……也就是名為「涅察赫」的第7名預言者。"
90002020-96 = "我們所具備的常識極有可能派不上用場。"
90002020-97 = "沒錯。事實上就連該採取高空還是低空飛行都很難判斷。"
90002020-99 = "因此才會選擇藏身於濃厚的雲層之中。#n這樣至少能干擾可見光線、紅外線以及部分的探測電波。"
90002020-100 = "……不過相對地，我們也難以用肉眼確認鋼鐵大陸的樣貌。"
90002020-102 = "無法提前偵測到涅察赫嗎？"
90002020-104 = "畢竟這次行動算是偷偷潛入……#n如果隨意發射電波，反而可能會引發更大的麻煩。"
90002020-105 = "而且就如剛才所說，訊號過於強大也引發了另一個問題。"
90002020-106 = "無論感測到什麼訊號，最後都會被歸為同一個來源……這樣就失去分析的意義了。"
90002020-107 = "[s]「所以……結論是什麼？」"
90002020-108 = "……"
90002020-110 = "……"
90002020-111 = "大概也就只能小心翼翼地前進了。"
90002020-112 = "哇，你就直接這樣說出來了嗎，季……"
90002020-113 = "有什麼問題嗎？"
90002020-114 = "……沒有。沒問題。"
90002020-115 = "雖然搞不太懂，總之目的地……說是目的地又好像有點奇怪。"
90002020-121 = "似乎即將抵達目標大陸。開始慢慢降低高度吧。"
90002020-133 = "哇啊！？"
90002020-134 = "怎，怎麼了，季！？"
90002020-135 = "出現異常反應！#n是個極其巨大的……質量體！"
90002020-136 = "說得更具體一點的話，是隻巨無霸的機械手臂！"
90002020-137 = "訊號分析成功。#n是第9名預言者……「耶索德」！"
90002020-139 = "耶索德！？"
90002020-145 = "哇啊啊啊啊！？"
90002020-146 = "唔哇啊啊啊！？"
90002020-152 = "啊哇哇哇哇……！"
90002020-153 = "那，那是什麼啊啊啊啊！！！"
90002020-154 = "噫，噫噫……！"
90002020-156 = "無論什麼都好，快抓緊能抓的東西！#n回報受損情況！"
90002020-159 = "報告受損情況。#n引擎損壞、主引擎輸出尚可維持、輔助引擎多數嚴重損壞。"
90002020-160 = "引擎發生火災。啟動滅火裝置。"
90002020-165 = "高度與機體平衡無法維持……#n會長！再這樣下去……！"
90002020-166 = "要墜落了！"
90002020-171 = "引擎的火勢呢？狀況如何！"
90002020-172 = "已成功撲滅引擎的火勢！#n但是位於外側的火勢無法撲滅！"
90002020-173 = "進行引擎逆向噴射，直到臨界點為止！"
90002020-177 = "執行引擎逆向噴射直至臨界點。#n啟動緊急迫降程序。即將與地面衝撞！"
90002020-191 = "[ns]「大家沒事吧！？」"
90002020-192 = "哎呀呀呀……有種天旋地轉的感覺……"
90002020-193 = "幸好有繫安全帶呢……"
90002020-194 = "必須靠著一個輪子站立的我才更辛苦吧……"
90002020-195 = "話，話說……這裡是哪裡……？#n看起來不像傳聞中的鋼鐵大陸啊……？"
90002020-196 = "應該是鋼鐵大陸外圍殘存的地形。 "
90002020-197 = "在我們降落鋼鐵大陸的前一刻，受到了耶索德巨大的……機械手臂的攻擊。"
90002020-199 = "進而導致被迫在這裡進行緊急迫降。"
90002020-212 = "又，又怎麼了！？"
90002020-213 = "雷達偵測到大量敵對勢力！#n季，連接外部攝影機！"
90002020-214 = "進行畫面輸出。"
90002020-229 = "是當時在種子保管所……在提法瑞特的種子保管所襲擊我們的那些個體。"
90002020-230 = "我們被包圍了！再這樣下去……！"
90002020-231 = "別擔心，莉央前輩！#n愛麗絲會在這裡保護大家！"
90002020-236 = "啊，啊啊……！"
90002020-237 = "愛麗絲醬！？"
90002020-242 = "……"
90002020-243 = "遊戲開發部！準備出動！"
90002020-245 = "姐姐！？"
90002020-246 = "我，我們嗎……？"
90002020-248 = "沒錯！總不能全部交給愛麗絲一個人吧？#n我們去去就回，老師！"
90002020-254 = "我，我知道了！姐姐真的是……"
90002020-255 = "一個人……為了大家……大家……為了一個人……"
90002020-260 = "等等，各位！"
90002020-261 = "[s]「……」"
90002020-263 = "[ns]「英美，遊戲開發部的孩子們交給你了。」"
90002020-264 = "咦？我？"
90002020-265 = "……"
90002020-266 = "知道了，老師。儘管交給我吧。"
90002020-272 = "[ns]「莉央和季，請努力修好運輸船。」"
90002020-273 = "嗯？#n……嗯，我知道了。"
90002020-274 = "開始行動吧，莉央大人。#n目前需要緊急處理的應該是引擎。"
90002020-276 = "我們沒事可做嗎？"
90002020-277 = "[s]「Kei和陽葵……就先待命吧！」"
90002020-278 = "哎呀，難道老師信不過我們嗎？"
90002020-279 = "啊啊，您的意思是必須有人負責掌握整體狀況吧。#n既然如此……好，我明白了。"
90002020-287 = "哇，真的是沒完沒了耶！"
90002020-288 = "但是絕不能就此退縮！不管怎樣都要守護老師和大家！"
90002020-293 = "大家先後退。#n桃井就跟我來吧。"
90002020-297 = "咦……？"
90002020-298 = "這個聲音是……英美同學！"
90002020-299 = "嗨，我受老師之託來幫忙了。#n最前線就交給我跟桃井吧。"
90002020-300 = "請愛麗絲在後方進行火力支援，也就是擔任砲兵戰力。"
90002020-301 = "綠擔任指定射手，柚子則擔任榴彈手……隊形中央就麻煩你們了。"
90002020-302 = "是老師他……收到！#n拜託你了，英美！"
90002020-303 = "沒錯，盡全力試試看吧。"
90002020-305 = "沒，沒問題嗎？"
90002020-313 = "唔嗯……"
90002020-314 = "這點程度應該不成問題吧。"
