90002020-18 = "4;미도리 동복;02;그때에는 너무 높이 올라가서, 하늘을 난다는 실감이 없었는데…….\n#4;em;…"
90002020-19 = "2;유즈 동복;03;……지금은…… 진짜 하늘을 날고 있는 것, 같네요. 에헤헤…….\n#2;em;[///]\n#2;stiff"
90002020-20 = "#all;hide"
90002020-21 = "3;에이미 수영복ND;02;일단 필요하다고 해서 서브 파일럿 자리에 앉기는 했는데, 이렇게 보직을 늘릴 필요가 있었어? 회장?\n#3;em;[?]"
90002020-22 = "3;에이미 수영복ND;01;아무래도 조금 비효율적인 면이 있는 것 같단 말이지……."
90002020-23 = "5;리오 동복;02;이편이 합리적이야. 에이미. \n#5;em;[반응]\n#5;al\n#3;m1"
90002020-24 = "5;리오 동복;01;사람이 늘어났고, 그만큼 신경 쓸 것도 많아졌으니, 그만큼 토키의 부담을 줄일 필요가 있었어."
90002020-25 = "#3;hide\n1;토키 모드 1;02;하지만 저는 완벽한 메이드이므로, 혼자서도 아무 문제 없었을 겁니다. 리오 님."
90002020-26 = "5;리오 동복;02;만에 하나라는 가능성도 있으니까. 모든 변수에는 대비해야지."
90002020-27 = "1;토키 모드 1;99;그렇다면, 알겠습니다. 리오 님.\n#1;greeting"
90002020-28 = "#all;hide"
90002020-29 = "3;아리스 동복;03;그렇다고는 해도…… 굉장합니다, 리오 선배! 이 수송선, 엄청납니다!\n#3;em;[반짝]\n#3;hophop"
90002020-30 = "#all;hide"
90002020-31 = "4;미도리 동복;01\n2;유즈 동복;02;내, 내부 구조를 확실하게 보게 된 건…… 처음, 이었으니까요…….\n#2;em;…"
90002020-32 = "1;모모이 동복;21;으~음. 가능하면 하나하나 자세히 둘러보고 싶었지만 말이야.\n#1;ar\n#1;em;[속상함]\n#2;m3\n#4;m5"
90002020-33 = "4;미도리 동복;19;어쩔 수 없잖아, 언니……. 상황이 상황이니까."
