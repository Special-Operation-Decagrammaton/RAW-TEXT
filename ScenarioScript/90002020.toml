90002020-65 = "[ns1] \"새삼스럽게 대단하다고 느낀 건데 말이지.\"\n[ns2] \"언제 이런 걸 준비한 거야, 리오?\""
90002020-66 = "#wait;10"
90002020-67 = "#wait;10"
90002020-68 = "3;리오 동복;01;대단한 건 아니야. 밀레니엄이 지금까지 발전시킨 기술을 응용하면 되는 결과물이었으니까.\n#3;a"
90002020-69 = "3;리오 동복;99;상상할 수 있는 일을 연구하고 구현하는 건…… 어떻게든 되는 분야지.\n#3;em;…"
90002020-70 = "3;리오 동복;01;문제는, 보통이라면 상상도 못 하는 일을 연구하는 것이고."
90002020-71 = "3;히마리 방한복;03;확실히 그렇죠. 상상할 수 있다는 것은 어떻게든 실마리를 잡을 수 있다는 뜻이니까요.\n#3;em;[반짝]"
90002020-72 = "3;히마리 방한복;08;가장 힘든 것은…… 상상도 못 하고 있었던 일에, 결과만 갑자기 툭, 하고 도출될 때니까요."
90002020-73 = "[s] \"그런 일도 있어?\""
90002020-74 = "3;히마리 방한복;01;그럼요. 초 미시 세계나 초 거시 세계를 연구하다 보면, 종종 그러곤 한답니다."
90002020-75 = "3;리오 동복;02;중력만 해도 그래. 우리는 모두 중력에 붙잡혀 살고 있지만, 그 근원이라고 볼 수 있는 중력자의 경우는–\n#3;em;[반응]"
90002020-76 = "1;모모이 동복;05;컷, 컷! 리오 회장, 거기까지만! 그렇게 아무 때나 전문적인 설명을 시작하면 모두에게 미움받는다고?!\n#1;hophop\n#1;ar\n#3;m5"
90002020-77 = "3;리오 동복;04;그, 그래?\n#3;stiff"
90002020-78 = "3;리오 동복;09;하지만…… 미움받는 것은, 익숙해져 있으니까…….\n#3;em;…"
90002020-79 = "#all;hide"
90002020-80 = "3;케이 AMAS;22;거기에서 그 말을 그렇게 받으면 어떡합니까…….\n#3;em;[속상함]"
