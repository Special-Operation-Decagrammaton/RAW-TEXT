[translation]
90002020-1 = "#title;제2화;수송선"
90002020-2 = "3;토키 모드 1;99\n#3;greeting\n#3;a\n#wait;1300"
90002020-3 = "3;토키 모드 1;03;안녕하십니까, 승객 여러분. 여러분의 메인 파일럿이자 실질적인 기장인, 아스마 토키 인사드립니다.\n#3;em;[반짝]"
90002020-4 = "3;토키 모드 1;02;저희는 지금 구름 위, 대류권 계면인 8km 상공을 날고 있으며, 항로는 지극히 정상입니다."
90002020-5 = "3;토키 모드 1;01;목적지인 강철대륙까지는 얼마 남지 않았지만, 예상치 못한 난류에 대비하여 안전벨트를 확실히 착용해 주시고."
90002020-6 = "3;토키 모드 1;02;테이블은 똑바로 세운 뒤 제자리에 돌려놓아 주시길 바랍니다."
90002020-7 = "3;모모이 동복;02;어? 테이블 같은 거…… 없는데?\n#3;em;[?]"
90002020-8 = "3;토키 모드 1;02;압니다. 그냥 해 본 말입니다."
90002020-9 = "3;히마리 방한복;09;후후. 토키 기장님은 생각보다 장난기가 많군요? \n#3;em;[음표]"
90002020-10 = "3;히마리 방한복;01;그렇다면 저는 오퍼레이팅 및 운항 어시스트를 담당하고 있는 아케보시 히마리랍니다♪"
90002020-11 = "3;히마리 방한복;02;조금 아슬아슬하지만, 어떻게든 예정대로의 시간 안에 도착할 수 있을 것 같네요."
90002020-12 = "3;히마리 방한복;03;다들 기분은 어떤가요? 특히 그때와 비교해서 말이죠.\n#3;em;[반응]"
