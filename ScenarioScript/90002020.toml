90002020-56 = "#na;미도리 동복;엔진 소리가 엄청나게 조용해서 놀랐어요……."
90002020-57 = "#na;유즈 동복;네……. 여차하면, 여기로 숨어도 될 것 같다는 생각이 들 정도로……."
