90002020-92 = "4;에이미 수영복ND;01\n2;토키 모드 1;00;그 방안은 추천할 수 없습니다, 모모이. 만에 하나 대공 시스템이 잘 구축된 곳으로 향하게 되면, 그야말로 끝장일 테니까요."
