[translation]
90002020-1 = "ตอนที่ 2;ยานขนส่ง"
90002020-3 = "สวัสดีค่ะผู้โดยสารทุกคน ฉันมีชื่อว่าอะซุมะ โทคิ เป็นนักบินหลักและกัปตันตัวจริงของทุกคนค่ะ"
90002020-4 = "ขณะนี้เรากำลังบินอยู่เหนือกลุ่มเมฆที่ระดับความสูงประมาณ 8 กิโลเมตร บริเวณรอยต่อของชั้นโทรโพสเฟียร์ ส่วนเส้นทางการบินก็เป็นไปตามปกติค่ะ"
90002020-5 = "เราอยู่ไม่ไกลจากดินแดนเหล็กกล้าที่เป็นจุดหมายปลายทางของเราแล้ว แต่ก็ขอให้คาดเข็มขัดนิรภัย#nให้มั่นเพื่อรับมือกับแรงสั่นสะเทือนที่คาดไม่ถึงค่ะ"
90002020-6 = "และขอให้พับโต๊ะให้ตั้งตรง และเก็บกลับเข้าที่เดิมด้วยค่ะ"
90002020-7 = "หืม? ไม่เห็นจะมีโต๊ะอะไร... เลยนี่?"
90002020-8 = "ฉันรู้ค่ะ ฉันก็แค่พูดไปอย่างนั้นค่ะ"
90002020-9 = "ฮุฮุ กัปตันโทคิขี้เล่นกว่าที่คิดเยอะเลยนะคะ"
90002020-10 = "ถ้างั้นฉันขอแนะนำตัวบ้างค่ะ ฉันชื่อว่าอาเกโบชิ ฮิมาริ รับผิดชอบด้านการปฏิบัติการและการช่วยเหลือ#nด้านการบินค่ะ♪"
90002020-11 = "ถึงจะกระชั้นชิดไปหน่อย แต่เราก็น่าจะไปถึงจุดหมายทันเวลาค่ะ"
90002020-12 = "เมื่อเทียบกับตอนนั้นแล้ว ทุกคนรู้สึกยังไงบ้างคะ?"
90002020-18 = "ตอนนั้นเราขึ้นไปสูงมากจนไม่รู้สึกเหมือนบินอยู่บนฟ้าเลยละ..."
90002020-19 = "แต่ตอนนี้... ให้ความรู้สึกเหมือนเราบินอยู่บนท้องฟ้าจริงๆ เลยนะคะ แหะๆๆ..."
90002020-21 = "ฉันได้มานั่งตำแหน่งผู้ช่วยนักบินเพราะมีคนบอกว่าจำเป็น แต่การเพิ่มตำแหน่งแบบนี้มันจำเป็นจริงๆ เหรอ ประธาน?"
90002020-22 = "ฉันว่ามันไม่ค่อยจะมีประสิทธิภาพเท่าไรเลยน่ะ..."
90002020-23 = "แบบนี้ละสมเหตุสมผลแล้ว เอมิ"
90002020-24 = "เรามีคนเยอะขึ้น เรื่องที่เราต้องใส่ใจก็เลยเยอะขึ้นตามไปด้วย แล้วเราก็ควรลดภาระงานของโทคิด้วยน่ะ"
90002020-25 = "แต่ว่าฉันคือเมดที่สมบูรณ์แบบ ฉันรับมือคนเดียวไหวอยู่แล้วค่ะ ท่านริโอะ"
90002020-26 = "กันไว้ดีกว่าแก้ เราต้องเตรียมพร้อมกับทุกตัวแปรสิ"
90002020-27 = "ก็ได้ค่ะ เข้าใจแล้วค่ะ ท่านริโอะ"
90002020-29 = "ยานขนส่งลำนี้... สุดยอดไปเลยนะคะ รุ่นพี่ริโอะ!"
90002020-31 = "นะ... นี่เป็นครั้งแรกเลยค่ะ... ที่ฉันได้เห็นโครงสร้างภายในของยานแบบนี้..."
90002020-32 = "อืม~ ถ้าเป็นไปได้ ฉันก็อยากเดินดูทุกส่วนให้ละเอียดๆ เลยละ"
90002020-33 = "ทำแบบนั้นไม่ได้หรอก พี่โมโมอิ... ก็สถานการณ์มันเป็นแบบนี้นี่นา"
90002020-39 = "ก็ใช่ค่ะ ถ้าออกจากห้องนักบินไปก็จะเจอล็อบบี้ค่ะ ฉันว่าให้ความรู้สึกเหมือนเป็นพื้นที่สาธารณะจริงๆ เลยค่ะ"
90002020-43 = "บอกตามตรงว่ามันอบอุ่นกว่าห้องของฉันอีก..."
90002020-44 = "ทำความสะอาดกันหน่อยเถอะค่ะ ของเต็มไปหมดแล้ว..."
90002020-45 = "ใช่... ฉันตระหนักได้อีกครั้งเลยละว่าการทำความสะอาดเป็นสิ่งสำคัญ"
90002020-46 = "อุ๊บส์?!"
90002020-47 = "ว้าว... คุณพูดอะไรแบบนั้นออกมาจากปากตัวเองเลยเหรอคะ..."
90002020-50 = "ตรงนั้นเป็นพื้นที่ที่เปราะบางและสำคัญที่สุดของยานขนส่งลำนี้เลยละ"
90002020-51 = "ใช่ค่ะ ที่นั่นมีประตูที่เชื่อมต่อโดยตรงกับภายนอก แล้วก็... ยังมี[ruby=Drop Pod]แคปซูลลงจอด[/ruby]ติดตั้งไว้ด้วยค่ะ"
90002020-52 = "AMAS ที่เอามาก็อยู่ในโรงเก็บยานหมดแล้วใช่มั้ยคะ? จะว่าไป ฉันเหมือนจะเห็น... ของบางอย่างที่เป็นทรงกรวย แต่ก็ไม่รู้ว่าคืออะไรเลยนะคะ?"
90002020-53 = "อันนั้นน่ะ..."
90002020-54 = "ไม่มีอะไรทั้งนั้น ไม่ต้องสนใจหรอก..."
90002020-55 = "หืม?"
90002020-56 = "เสียงเครื่องยนต์ตรงนี้เงียบมากจนน่าแปลกใจเลยนะคะ..."
90002020-57 = "ค่ะ... ฉันแอบคิดเลยค่ะว่าถ้าเกิดอะไรขึ้น ฉันจะมาซ่อนตัวที่นี่..."
90002020-58 = "อย่าเลยค่ะ ถ้าเกิดอะไรขึ้นมา ตรงนี้จะเป็นสถานที่ที่อันตรายที่สุดนะคะ..."
90002020-65 = "[ns1] \"ที่นี่วิเศษมากเลยละ\"\n[ns2] \"ไปเตรียมของแบบนี้มาตั้งแต่เมื่อไรน่ะ ริโอะ?\""
90002020-68 = "ไม่ได้วิเศษอะไรขนาดนั้นหรอก มันก็แค่ผลลัพธ์จากการประยุกต์ใช้เทคโนโลยีที่พัฒนาขึ้นในมิลเลเนียม#nมาจนถึงตอนนี้น่ะ"
90002020-69 = "การศึกษาสิ่งที่จินตนาการได้และทำให้เป็นรูปเป็นร่างจริงขึ้นมาน่ะ... ไม่ใช่เรื่องยากขนาดนั้นหรอก"
90002020-70 = "ปัญหาจริงๆ คือการที่เราพยายามศึกษาสิ่งที่จินตนาการไม่ได้ต่างหาก"
90002020-71 = "ถูกต้องเลยค่ะ นั่นก็เพราะถ้าพวกเราจินตนาการได้ นั่นก็หมายความว่าเราจะหาเบาะแสได้ในทางใด#nทางหนึ่งยังไงล่ะคะ"
90002020-72 = "และตอนที่ยากที่สุดก็คือ... ตอนที่เราได้ผลลัพธ์อย่างกะทันหันจากสิ่งที่ไม่เคยจินตนาการมาก่อนค่ะ"
90002020-73 = "[s] \"มีเรื่องแบบนั้นด้วยเหรอ?\""
90002020-74 = "แน่นอนอยู่แล้วค่ะ เมื่อศึกษาโลกในระดับจุลภาคสุดขีดหรือมหภาคสุดขั้ว ก็จะเจอเรื่องแบบนั้นบ้างค่ะ"
90002020-75 = "กับเรื่องแรงโน้มถ่วงก็ด้วย เราทุกคนต่างอยู่ภายใต้แรงโน้มถ่วง แต่ในกรณีของกราวิตอนที่เป็น#nตัวกลางให้แรงโน้มถ่วงแล้ว..."
90002020-76 = "คัท! คัท! พอแค่นั้นเลย ประธานริโอะ! ถ้าจะอธิบายทุกอย่างแบบละเอียดยิบในทุกที่ทุกเวลา ทุกคนจะพากันไม่ชอบใจได้นะ?!"
90002020-77 = "งะ... งั้นเหรอ?"
90002020-78 = "แต่ว่า... ฉันก็ชินกับการถูกคนอื่นไม่ชอบอยู่แล้ว..."
90002020-80 = "ทำไมถึงพูดแบบนั้นล่ะคะ..."
90002020-85 = "เห็นทีต้องทำให้บรรยากาศผ่อนคลายลงหน่อยแล้วละค่ะ... เส้นทางบินตอนนี้เป็นยังไงบ้างคะ โทคิ?"
90002020-87 = "เรื่องเส้นทางบินไม่มีปัญหาอะไรค่ะ สัญญาณจากดินแดนเหล็กกล้าก็เพิ่มขึ้นอยู่เรื่อยๆ ด้วยค่ะ"
90002020-88 = "ถ้าจะมีปัญหา ก็คงเป็นเรื่องสัญญาณที่รุนแรงมากจนอาจระบุจุดลงจอดได้ยากน่ะ"
90002020-90 = "หืม? งั้นก็ยิ่งลงจอดที่ไหนก็ได้ไม่ใช่เหรอ?"
90002020-92 = "ฉันไม่แนะนำให้ทำแบบนั้นค่ะ โมโมอิ ถ้าเราลงจอดในที่ที่มีระบบการต่อสู้ทางอากาศติดตั้งไว้#nเป็นอย่างดีละก็ แบบนั้นพวกเราก็จะจบเห่ค่ะ"
90002020-93 = "อื้อ ยานขนส่งลำนี้เน้นเรื่องการขนส่งและศึกษาวิจัย ก็เลยค่อนข้างด้อยเรื่องการป้องกันน่ะ"
90002020-95 = "แล้วฝ่ายตรงข้ามก็เป็นถึงดินแดนเหล็กกล้า... หรือก็คือผู้เลื่อมใสที่ชื่อเน็ตซาช"
90002020-96 = "ถ้าดูจากลักษณะเฉพาะแล้ว ฉันว่ากฎเกณฑ์หรือความเข้าใจแบบมนุษย์เราน่าจะใช้ไม่ได้ผล"
90002020-97 = "ใช่ค่ะ อันที่จริงตอนนี้ตัดสินใจยากเลยค่ะว่าควรบินสูงหรือบินต่ำดี"
90002020-99 = "ตอนนี้พวกเราก็เลยกำลังบินแฝงตัวในเมฆหนา อย่างน้อยก็เพื่อเป็นการก่อกวนการตรวจจับด้วยแสงที่#nมองเห็น รังสีอินฟราเรด และคลื่นตรวจจับอย่างเรดาร์ค่ะ"
90002020-100 = "ถึงมันจะส่งผลให้เรามองเห็นดินแดนเหล็กกล้าด้วยตาเปล่าได้ยากขึ้นก็เถอะนะ..."
90002020-102 = "ทางเราเป็นฝ่ายตรวจจับเน็ตซาชก่อนไม่ได้เหรอคะ?"
90002020-104 = "พวกเราไม่ต่างกับแอบเข้ามาที่นี่ตั้งแต่แรกค่ะ ถ้าเราปล่อยคลื่นวิทยุหรือสัญญาณอะไรออกไปอย่าง#nไม่ระมัดระวัง ก็อาจเกิดผลกระทบร้ายแรงได้ค่ะ"
90002020-105 = "และเรื่องสัญญาณรุนแรงที่ฉันบอกไปก่อนหน้านี้ ตอนนี้มันกำลังก่อปัญหาอื่นอยู่ด้วย"
90002020-106 = "ไม่ว่าจะตรวจจับสัญญาณอะไรจากตรงไหนได้ สุดท้ายมันจะรวมกันเป็นหนึ่งเดียว ต่อให้วิเคราะห์ไปก็แทบไม่มีความหมายเลยละ"
90002020-107 = "[s] \"ตกลงว่า... ได้ข้อสรุปว่ายังไงนะ?\""
90002020-108 = "..."
90002020-110 = "..."
90002020-111 = "ก็คงทำอะไรไม่ได้นอกจากปฏิบัติการอย่างระมัดระวังต่อไปค่ะ"
90002020-112 = "ว้าว พูดอย่างตรงไปตรงมาเลยนะคะ โทคิ..."
90002020-113 = "มีปัญหาตรงไหนงั้นเหรอคะ?"
90002020-114 = "ไม่ค่ะ... ไม่มีค่ะ"
90002020-115 = "ฉันเริ่มไม่แน่ใจมากขึ้นเรื่อยๆ... แต่ถ้าจะบอกว่าใกล้ถึงพิกัดเป้าหมาย... มันก็น่าจะเจาะจงเกินไป"
90002020-121 = "งั้นฉันขอเปลี่ยนคำพูดเป็น เราใกล้ถึงดินแดนเป้าหมายแล้วค่ะ ค่อยๆ ลดระดับความสูงกันเถอะค่ะ"
90002020-133 = "เหวอ?!"
90002020-134 = "กะ... เกิดอะไรขึ้นคะ โทคิ!?"
90002020-135 = "พบปฏิกิริยาแปลกๆ! มันเป็น... มวลสารที่ใหญ่มากค่ะ!"
90002020-136 = "ถ้าให้บอกแบบละเอียด... มันคือแขนจักรกลขนาดมหึมาเลย!"
90002020-137 = "วิเคราะห์สัญญาณเสร็จแล้วค่ะ นี่คือ <เยซ็อด>... ผู้เลื่อมใสลำดับที่ 9 ค่ะ!"
90002020-139 = "เยซ็อดเหรอ?!"
90002020-145 = "ว้ากกกก?!?!"
90002020-146 = "ว้ายยยย!?!?"
90002020-152 = "เหวออออ...!"
90002020-153 = "นะ... นั่นมันอะไรกันน่ะ!!!"
90002020-154 = "ฮะ... เฮือก...! เฮือก...!!!"
90002020-156 = "ทุกคนหาอะไรยึดไว้ให้มั่น! รายงานความเสียหายด้วย!"
90002020-159 = "รายงานความเสียหาย! พบการเสียหายของเครื่องยนต์ ตอนนี้ยังรักษากำลังของเครื่องยนต์หลักไว้ได้ ส่วนเครื่องยนต์เสริมได้รับความเสียหายหนัก"
90002020-160 = "มีไฟลุกลามที่เครื่องยนต์ค่ะ ฉันจะเปิดระบบดับเพลิงค่ะ"
90002020-165 = "รักษาระดับความสูงและสมดุลไว้ไม่ได้แล้ว... ประธาน! ขืนเป็นแบบนี้ละก็...!"
90002020-166 = "ยานกำลังตกค่ะ!"
90002020-171 = "แล้วเพลิงตรงเครื่องยนต์ล่ะ? เป็นยังไงบ้างคะ!"
90002020-172 = "ดับไฟด้านในได้สำเร็จแล้วค่ะ! แต่ไฟที่ลามไปผิวด้านนอก เราควบคุมไว้ไม่ไหวค่ะ!"
90002020-173 = "เปิดระบบเปลี่ยนทิศทางแรงขับจนถึงจุดวิกฤต!"
90002020-177 = "เปิดระบบเปลี่ยนทิศทางแรงขับจนถึงจุดวิกฤต เริ่มการลงจอดฉุกเฉิน ยานจะพุ่งชนผิวน้ำในไม่ช้า!"
90002020-191 = "[ns] \"ทุกคนเป็นยังไงกันบ้าง?!\""
90002020-192 = "โอ๊ยยย... หัวหมุนไปหมดแล้ว... ไม่สิ ตกลงว่าพื้นหรือหัวที่กำลังหมุนอยู่..."
90002020-193 = "ค่อยยังชั่วที่พวกเราคาดเข็มขัดนิรภัยกันนะคะ..."
90002020-194 = "ส่วนฉันต้องทรงตัวบนล้ออันเดียว ก็เลยลำบากกว่าหลายเท่าเลยค่ะ..."
90002020-195 = "จะ... จะว่าไป... ที่นี่มัน... ที่ไหนเหรอคะ...? ดูไม่เหมือนดินแดนเหล็กกล้าที่เคยได้ยินมาเลยนี่คะ...?"
90002020-196 = "น่าจะเป็นพื้นผิวที่ยังเหลืออยู่รอบนอกของดินแดนเหล็กกล้าน่ะ "
90002020-197 = "ก่อนที่เราจะลงจอดบนดินแดนเหล็กกล้า... เราโดนโจมตีด้วยแขนจักรกลขนาดมหึมาของเยซ็อด"
90002020-199 = "ยานของเราก็เลยต้องลงจอดฉุกเฉินตรงนี้สินะคะ"
90002020-212 = "อะ... อะไรอีกน่ะ?!"
90002020-213 = "เรดาห์ตรวจพบปฏิกิริยาของศัตรู! โทคิ เชื่อมต่อกล้องภายนอกให้ที!"
90002020-214 = "ฉันจะแสดงภาพบนหน้าจอให้ค่ะ"
90002020-229 = "นั่นมันพวกที่เคยโจมตีเรา... ที่คลังเก็บเมล็ดพันธุ์ของทิฟาเร็ธนี่คะ"
90002020-230 = "เราถูกล้อมแล้ว! ขืนเป็นแบบนี้ละก็...!"
90002020-231 = "ไม่ต้องกังวลนะคะ รุ่นพี่ริโอะ! จากนี้ไปอาริสึจะปกป้องทุกคนเองค่ะ!"
90002020-236 = "อ่า... อ๊ะ...!"
90002020-237 = "อาริสึจัง?!"
90002020-242 = "..."
90002020-243 = "ชมรมพัฒนาเกม! ออกปฏิบัติการ!"
90002020-245 = "พี่โมโมอิ?"
90002020-246 = "พะ... พวกเราน่ะเหรอ...?"
90002020-248 = "ก็ใช่น่ะสิ! จะให้อาริสึรับมือคนเดียวไม่ได้หรอก เดี๋ยวฉันกลับมานะ คุณครู!"
90002020-254 = "กะ... ก็ได้! พี่นี่ก็นะ..."
90002020-255 = "ฝ่ายหนึ่ง... ทำเพื่อทุกคน... ส่วนอีกฝ่าย ทุกคน... ทำเพื่อสิ่งเดียว..."
90002020-260 = "เดี๋ยวก่อนค่ะ ทุกคน!"
90002020-261 = "[s] \"...\""
90002020-263 = "[ns] \"เอมิ ครูฝากชมรมพัฒนาเกมด้วยนะ\""
90002020-264 = "หืม? ฉันเหรอ?"
90002020-265 = "..."
90002020-266 = "เข้าใจแล้ว คุณครู วางใจฉันได้เลย"
90002020-272 = "[ns] \"ส่วนริโอะกับโทคิก็ช่วยซ่อมยานให้ได้มากที่สุดนะ\""
90002020-273 = "หืม? อะ... อื้อ เข้าใจแล้ว"
90002020-274 = "ไปกันเถอะค่ะ ท่านริโอะ เครื่องยนต์น่าจะเป็นส่วนที่ต้องแก้ไขเร่งด่วนเลยนะคะ"
90002020-276 = "ไม่มีอะไรให้พวกเราทำบ้างเหรอคะ?"
90002020-277 = "[s] \"เคย์กับฮิมาริ... ให้สแตนด์บายไว้ก่อนนะ!\""
90002020-278 = "ตายจริง คุณครูคิดว่าพวกฉันไม่น่าไว้วางใจเหรอคะ?"
90002020-279 = "อ้อ คุณครูจะบอกว่าต้องให้ใครสักคนเข้ามารับผิดชอบสถานการณ์โดยรวมสินะคะ ถ้างั้นก็... ได้ค่ะ เข้าใจแล้วค่ะ"
90002020-287 = "ฮึ่ย ไม่ยอมหมดสักทีนะ!"
90002020-288 = "แต่เราจะยอมถอยไม่ได้ค่ะ! ไม่ว่ายังไงเราก็ต้องปกป้องคุณครูกับทุกคนให้ได้ค่ะ!"
90002020-293 = "ทุกคน ถอยออกมาก่อน ส่วนโมโมอิก็ไปกับฉันนะ"
90002020-297 = "เอ๋...?"
90002020-298 = "เสียงนี้มัน... คุณเอมิ!"
90002020-299 = "สวัสดี คุณครูขอให้ฉันมาช่วยน่ะ ฉันกับโมโมอิจะไปเป็นแนวหน้าให้"
90002020-300 = "ส่วนอาริสึก็ให้สนับสนุนจากข้างหลัง ยิงให้สุดพลังเลย"
90002020-301 = "มิโดริให้เป็นพลแม่นปืน ส่วนยูสึเป็นพลยิงระเบิด ประจำอยู่แนวกลางนะ"
90002020-302 = "คุณครูขอให้มาช่วยเหรอคะ... ค่ะ! รับทราบค่ะ! รบกวนด้วยนะคะ เอมิ!"
90002020-303 = "อื้อ มาสู้ให้สุดความสามารถกันเลย"
90002020-305 = "จะ... จะไหวใช่มั้ยนะ...?"
90002020-313 = "อืม"
90002020-314 = "แค่นั้นน่ะ ฉันว่ายังไงก็น่าจะจัดการได้"
