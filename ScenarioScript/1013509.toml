[translation]
1013509-1 = "Flowing Twilight"
1013509-3 = "[ns] \"Kei-Kei's at Schale!\""
1013509-4 = "Don't be so dramatic!"
1013509-5 = "...Besides, this is hardly the first time."
1013509-6 = "[s] \"I'm still glad to see you.\""
1013509-7 = "..."
1013509-8 = "I'm not saying I'm not happy too..."
1013509-12 = "?! STOP! Get back or I'm going to shoot!"
1013509-14 = "It looks like many of Schale's tasks involve proposing ideas or reaching a consensus."
1013509-15 = "These people...they left so many records. They could have just talked it out among themselves. Ugh."
1013509-16 = "And all these paper files for so-called \"security measures\"..."
1013509-17 = "I, of course, realize that no network is 100% secure."
1013509-18 = "But then again, not RECORDING every minute detail on the agenda like this would be even more secure."
1013509-19 = "[s] \"It's part of working with people.\""
1013509-20 = "And thanks to that, this place is grinding away."
1013509-21 = "It would be one thing if the work lightened up occasionally, or at least remained constant."
1013509-22 = "But you've been here long enough to realize that the workload will only ever increase."
1013509-23 = "The better Schale is at solving problems, the more everyone else will run to them with their petty issues."
1013509-24 = "Weren't you an educator in the first place, Sensei?"
1013509-25 = "What is your role now? Are you a bureaucratic administrator or...some kind of mentor meant to help students reflect on their lives and futures?"
1013509-26 = "[s1] \"Tell me about it...\"\n[s2] \"At this rate, I'm going to forget everything I wanted to teach...\""
1013509-29 = "Don't talk about it like it's someone else's problem. Seriously..."
1013509-30 = "I'll wrap up this document."
1013509-31 = "Oh, no. There's no need to make such a production out of thanking me. It's part of being a Student Rep, right?"
1013509-32 = "The Academy City. What a concept. I'm sure there are SOME advantages to shoving so many students in such a cramped space."
1013509-33 = "But students are the most susceptible to scams. That's why there's always something outrageous happening in the streets."
1013509-34 = "And on top of that, students are known for lacking impulse control."
1013509-35 = "While I know this is a VERY controversial view today, people used to believe that anyone under twenty years old couldn't be considered a full, responsible human."
1013509-36 = "And now it's just one disaster after another. Daily explosions and property damage. The construction companies are clearly making a killing. If you want to get rich, invest there."
1013509-37 = "[s] \"But, that would deny the very foundation of Academy City...\""
1013509-38 = "I say all this because the system is beyond repair. It will never end."
1013509-39 = "No one will come to their senses until something, or SOMEONE, actually collapses."
1013509-40 = "Here. Submit these. Supplementary data is attached."
1013509-41 = "Sometimes the numbers just speak for themselves."
1013509-45 = "[ns] \"Kei-Kei.\""
1013509-46 = "Huh?"
1013509-51 = "[ns] \"I love you!\""
1013509-52 = "Go away! You're gross!!"
1013509-58 = "[ns] \"We...actually finished the whole day's work!\""
1013509-61 = "...Are you all right?"
1013509-62 = "Huh? You think my concern helps you \"feel better\"?"
1013509-63 = "Really, I shouldn't have bothered worrying."
1013509-64 = "What? You want to \"take me out\"? Eat some deluxe dinner special? Then buy me accessories?"
1013509-65 = "Wow. Sensei, aren't you tired? You just seemed so..."
1013509-66 = "...You're sure it's fine? W-Well then..."
1013509-67 = "..."
1013509-68 = "Anyway, who's tomorrow's Student Rep?"
1013509-69 = "[s] \"Let's see...\""
1013509-73 = "[ns] \"Huh? It looks like something's missing. It's not decided yet.\""
1013509-74 = "...Is that so?"
1013509-75 = "But you still need to choose one by tomorrow morning, right?"
1013509-76 = "..."
1013509-77 = "Then...pick me."
1013509-78 = "[s] \"What?!\""
1013509-79 = "Wh-What's with that weird face? I mean, just think about it..."
1013509-80 = "What I'm trying to say here is..."
1013509-81 = "This is part of my Kivotos adaptation training. I need to familiarize myself with Schale operations, while improving the trade balance deficit! And I can also help you adjust the tariff rates."
1013509-82 = "Think of how much I could help. I could advise you on...the collapse of real income! And declining public education, the future of humanity, the planet, and the best ways to purify our world's decaying soul. And, and..."
1013509-83 = "Listen! It's training, it's a learning exercise, it offers real-world experience...and much, much more!"
1013509-84 = "It's the most rational decision for both of us. You should be grateful that I already did all the thinking for you!"
1013509-85 = "[s] \"A 'rational decision'... Sounds like...\""
1013509-86 = "?!"
1013509-87 = "I-I misspoke a little... Stop trying to embarrass me!"
1013509-88 = "Anyway, do you understand what I'm trying to say?!"
1013509-89 = "[s] \"Kei-Kei.\""
1013509-90 = "What now?"
1013509-91 = "[s] \"I want to say, 'That's a good Kei-Kei!' just once. May I?\""
1013509-92 = "I'm going to kill you, Sensei, then go DIE!!"
1013509-94 = "But, in conclusion, nice work today."
1013509-95 = "...And we'll do some more tomorrow."
1013509-96 = "Now, back to business. You said we'd dine together...and do a bunch of stuff. Hurry up."
1013509-97 = "[s] \"Yes, yes. One moment.\""
1013509-99 = "And the moment I said that..."
1013509-106 = "[ns] \"Oh...\""
1013509-107 = "...?"
1013509-108 = "What's wrong, Sensei?"
1013509-113 = "[ns] \"...!\""
1013509-114 = "Sensei?"
1013509-119 = "Huh? What do you mean that I appeared \"blurry and disappeared\"? Clearly, YOU'RE the problem."
1013509-120 = "I was here this whole time... Obviously."
1013509-121 = "..."
1013509-122 = "You must be tired. Blurred vision is a symptom of sleep deprivation. "
1013509-123 = "You should rest up tonight."
1013509-126 = "― [log=케이 교복]Don't worry.[/log][wa:2060] "
1013509-127 = "― [log=케이 교복]I won't disappear. [/log][wa:2700] "
1013509-130 = "― [log=케이 교복]It'll be the opposite, in fact.[/log][wa:1080] "
1013509-131 = "― [log=케이 교복]I will struggle to survive no matter what it takes.[/log][wa:4530] "
1013509-134 = "― [log=케이 교복]If Sensei does not give up on this world...[/log][wa:3780] "
1013509-135 = "― [log=케이 교복]I too, will never give up.[/log][wa:5570] "
1013509-138 = "― [log=케이 교복]So... It's okay. Everything is okay.[/log][wa:4040] "
1013509-139 = "― [log=케이 교복]I'll continue to be here.[/log][wa:3690] "
1013509-142 = "― [log=케이 교복]I'm just saying this here... But I...[/log][wa:4730] "
1013509-143 = "― [log=케이 교복]don't hate you that much.[/log][wa:4860] "
1013509-155 = "I escorted her to Millennium, so we parted a bit later than normally."
1013509-156 = "At first, we walked with a slight gap."
1013509-157 = "But, for some reason, Kei moved closer. She slowly entwined the tip of her pinky with mine."
