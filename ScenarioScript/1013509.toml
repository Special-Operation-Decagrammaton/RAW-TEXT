1013509-11 = "3;케이 교복;21\n#3;closeup\n#wait;2000"
1013509-12 = "3;케이 교복;26;?!?! 갑자기 달려들지 마요! 쏴 버릴 겁니다??!!\n#3;em;[///]\n#3;shake\n#3;closeup"
1013509-13 = "3;케이 교복;01\n#3;a"
1013509-14 = "3;케이 교복;02;애초에 말이죠. 샬레 업무 중 어느 정도는 의견 제안이나 합의 도출, 뭐 그런 거잖아요.\n#3;greeting"
1013509-15 = "3;케이 교복;04;그런 거, 자기들끼리 적당히 이야기한 다음, 규칙 안에서 끝을 내면 될 텐데, 뭘 이렇게 여기까지 다 가져오고…….\n#3;em;…"
1013509-16 = "3;케이 교복;00;거기에 어떤 부분은 그놈의 보안 때문에 종이 서류로 처리해야 한다는 것도 그래요.\n#3;greeting"
1013509-17 = "3;케이 교복;99;물론 네트워크에 100%의 보안 같은 것은 없습니다만."
1013509-18 = "3;케이 교복;11;애초에 이 정도의 상위 보안 레벨을 요구하는 안건을 안 만들면 되는 거 아닌지……."
1013509-19 = "[s] \"사람이 하는 일이다 보니 말이지…….\""
1013509-20 = "3;케이 교복;05;그 덕에 여기가 갈려 나가고 있고요.\n#3;em;[한숨]"
1013509-21 = "3;케이 교복;02;그래서 일이 줄어들거나, 최소한 현상 유지라도 되면 모르겠어요."
1013509-22 = "3;케이 교복;00;쭉 보아 왔으니 아시잖아요. 이거, 늘어나면 늘어났지 절대 줄어들 수 없다는걸요.\n#3;greeting"
1013509-23 = "3;케이 교복;11;샬레가 문제를 잘 해결하면 해결할수록, 사방에서 더 일거리를 가지고 달려드는 꼴이라고요."
1013509-24 = "3;케이 교복;02;애초에 선생님, 원래 직책은 교육자잖아요?\n#3;em;[?]"
1013509-25 = "3;케이 교복;05;이게 무슨 행정 부품인가요, 학생들의 진로와 인생을 함께 고민하는 스승인가요?"
1013509-26 = "[s1] \"그러게…….\"\n[s2] \"이러다 가르치려던 거 다 잊어버리겠네…….\""
1013509-27 = "#wait;100"
1013509-28 = "#wait;100"
1013509-29 = "3;케이 교복;04;남의 일처럼 말하지 마세요, 진짜…….\n#3;em;[땀]"
1013509-30 = "3;케이 교복;99;이 서류는 이렇게 끝내 두겠습니다."
1013509-31 = "3;케이 교복;04;아뇨, 뭐. 그렇게 호들갑을 떨며 고마워하셔도……. 그냥 당번으로서 할 일이고요…….\n#3;em;[///]"
1013509-32 = "3;케이 교복;11;키보토스…… 학원도시만 해도 그래요. 학생들을 한 도시에 몰아넣으면, 그야 장점도 있겠지만."
1013509-33 = "3;케이 교복;05;학생만큼 일명 '벗겨 먹기' 좋은 애들이 어디 있다고요? 그러니까 매일매일 말도 안 되는 사고가 터지는 거잖아요."
1013509-34 = "3;케이 교복;02;그리고 그와 정확히 반대로, 학생만큼 자기 통제가 안 되는 애들도 없죠."
1013509-35 = "3;케이 교복;00;지금은 절대로 통할 수 없는 관점이지만, 예전에는 그래서 스무 살 이전의 아이들을 온전한 인간 취급하지 않았던 때도 있었고요."
1013509-36 = "3;케이 교복;29;안팎으로 아주 사고투성이네요, 사고투성이. 이러니까 건축재건업이 이 도시의 영원한 1순위 유망 사업이죠.\n#3;em;[한숨]"
1013509-37 = "[s] \"그렇지만 학원도시의 근간을 부정해도 말이지…….\""
1013509-38 = "3;케이 교복;29;끝이 안 보이니까 하는 말입니다. 끝이 안 보이니까."
1013509-39 = "3;케이 교복;11;진짜, 이러다 사람 하나 쓰러져 봐야 다들 제정신을 차리지."
1013509-40 = "3;케이 교복;02;여기요. 이건 이렇게 처리하면 될 겁니다. 여기 보조 통계 자료에요.\n#3;greeting"
1013509-41 = "3;케이 교복;05;가끔은 숫자가 그 스스로 무언가를 증명하는 셈이니까요."
