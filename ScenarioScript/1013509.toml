[translation]
1013509-1 = "流逝的夕陽時光"
1013509-3 = "[ns] 「Kei醬來夏萊了～！」"
1013509-4 = "不要那麼大驚小怪！"
1013509-5 = "……而且這也不是第一次了吧。"
1013509-6 = "[s] 「但我還是很高興呀～」"
1013509-7 = "……"
1013509-8 = "我也沒說我不高興……"
1013509-12 = "不要突然飛撲過來！#n小心我開槍打你哦！？！？"
1013509-14 = "話說在夏萊的工作之中，有一部分是提供意見或調解之類的對吧。"
1013509-15 = "那種事明明自己商量，在規則內解決就好了，為什麼要全部搬到這裡來……"
1013509-16 = "尤其某些部分因為安全問題，還必須用紙本的文件來處理。"
1013509-17 = "當然，網路確實不存在100%的安全……"
1013509-18 = "但說到底，一開始不要製造這種需要高級安全等級的案件不就好了嗎……"
1013509-19 = "[s] 「畢竟是人做的事嘛……」"
1013509-20 = "結果就是這裡的人忙到快不成人形了。"
1013509-21 = "假如工作能減少，或者至少維持現狀的話倒還好說……"
1013509-22 = "一路看過來的你應該知道吧？#n這種事情只會越來越多，永遠沒有減少的一天。"
1013509-23 = "夏萊越是能漂亮地解決問題，問題就更會從四面八方不斷湧入。"
1013509-24 = "而且老師，你本來的職責應該是教育者吧？"
1013509-25 = "現在的你究竟是行政的零件，還是跟學生一起思考前途與人生的老師呢？"
1013509-26 = "[s1] 「說的也是……」\n[s2] 「再這樣下去的話，都快忘記想教的東西了……」"
1013509-29 = "不要說得一副事不關己的樣子好不好啊，真是的……"
1013509-30 = "這份文件已經處理好了。"
1013509-31 = "不是，你何必那麼誇張地跟我道謝……這只是身為值日生該做的事而已……"
1013509-32 = "奇普托斯……學園都市本身也是個問題。#n雖然把學生集中在一個都市固然有優點……"
1013509-33 = "不過哪有比學生更好「剝削」的對象呢？#n就是因為這樣，每天才會發生那麼多荒唐的事故。"
1013509-34 = "而與之相反的是，學生恰好又是無比缺乏自制力的存在。"
1013509-35 = "雖然現在絕對不會被接受，#n但是以前也有不把二十歲以下的孩子視為健全人類的時代。"
1013509-36 = "從裡到外都是事故連連，也難怪建築跟重建產業永遠是這裡最有前途的產業了。"
1013509-37 = "[s] 「可是如果否定學園都市的根基的話……」"
1013509-38 = "我是因為看不到盡頭才這麼說的，這樣下去沒完沒了啊。"
1013509-39 = "真是的，我看八成得等到有人倒下，大家才會清醒過來吧。"
1013509-40 = "給你。這個這樣處理就可以了。這是輔助的統計資料。"
1013509-41 = "有時候數字本身就能證明一切了。"
1013509-45 = "[ns] 「Kei醬。」"
1013509-46 = "嗯？"
1013509-51 = "[ns] 「我愛你。」"
1013509-52 = "走開啦！很噁心耶！！！"
1013509-58 = "[ns] 「總算結束今天的工作了……」"
1013509-61 = "……你還好嗎？"
1013509-62 = "咦？因為我擔心你所以好多了？#n啊，真是的！"
1013509-63 = "早知道就不該擔心你的……"
1013509-64 = "嗯？你說有家晚間特餐很好吃的店，要不要一起去？#n還要順便去買飾品？"
1013509-65 = "可是老師，你不是已經很累了嗎？#n剛才甚至還差點……"
1013509-66 = "……沒關係？#n既，既然你都這麼說了……"
1013509-67 = "……"
1013509-68 = "這麼說來，明天的值日生是誰？"
1013509-69 = "[s] 「我看看……」"
1013509-73 = "[ns] 「咦？好像出了點狀況，現在還沒決定呢。」"
1013509-74 = "……這樣可以嗎？"
1013509-75 = "明天上午前發出去就行了，所以沒問題……？"
1013509-76 = "……"
1013509-77 = "那麼，就讓我來吧。"
1013509-78 = "[s] 「什麼！？」"
1013509-79 = "你，你那是什麼表情！#n這，這從某種意義上來說……！"
1013509-80 = "也是……怎麼說呢……"
1013509-81 = "對，對了！是我的奇普托斯適應訓練！#n透過了解夏萊的業務，進而改善貿易收支逆差、調整關稅稅率……"
1013509-82 = "以及不見恢復跡象的實質所得、公立教育的崩壞、人類與行星的未來、#n墮落世界靈魂的淨化與拯救。還有，還有就是……"
1013509-83 = "總之！是為了這一切的訓練和實戰……！"
1013509-84 = "而且對老師和我來說都是非常合理的決定！記得要對我心懷感激！"
1013509-85 = "[s] 「合理的決定……聽起來簡直就像……」"
1013509-86 = "！？"
1013509-87 = "不，不小心說錯話了……這種屈辱……！"
1013509-88 = "總之！聽懂我的意思了嗎！？"
1013509-89 = "[s] 「Kei醬。」"
1013509-90 = "又怎麼了。"
1013509-91 = "[s] 「可以讓我摸頭『好乖好乖』嗎？」"
1013509-92 = "我會殺了老師再自殺！！！"
1013509-94 = "那麼，辛苦了。"
1013509-95 = "……剩下的就明天再處理吧。"
1013509-96 = "還在磨蹭什麼，快點走吧。#n不是說好要一起吃晚餐……還有做一些有的沒的嗎？"
1013509-97 = "[s] 「好好好，稍等我一下。」"
1013509-99 = "（說完這句話的瞬間）"
1013509-106 = "[ns] 「咦……」"
1013509-107 = "……？"
1013509-108 = "怎麼了，老師？"
1013509-113 = "[ns]「……！」"
1013509-114 = "老師？"
1013509-119 = "咦？我剛才看起來好像變得模糊，甚至一瞬間消失了？"
1013509-120 = "我一直都在這裡啊……"
1013509-121 = "……"
1013509-122 = "看來你真的累了呢。#n人在疲勞的時候，視力通常會最先受到影響。"
1013509-123 = "今晚就好好休息吧。"
1013509-126 = "― [log=케이 교복]請不用擔心。[/log][wa:2300] "
1013509-127 = "― [log=케이 교복]我不會消失的。[/log][wa:3180] "
1013509-130 = "― [log=케이 교복]反而，正好相反。[/log][wa:2000] "
1013509-131 = "― [log=케이 교복]我，無論用什麼方法都打算活下去。[/log][wa:5930] "
1013509-134 = "― [log=케이 교복]既然老師不放棄這個世界，[/log][wa:5020] "
1013509-135 = "― [log=케이 교복]我也直到最後都絕對不會放棄。[/log][wa:6050] "
1013509-138 = "― [log=케이 교복]所以沒事的……絕對，沒事的。[/log][wa:4920] "
1013509-139 = "― [log=케이 교복]我會一直待在這裡。[/log][wa:4330] "
1013509-142 = "― [log=케이 교복]偷偷告訴你……我呢──[/log][wa:5770] "
1013509-143 = "― [log=케이 교복]對於老師， 並不覺得討厭。[/log][wa:5340] "
1013509-155 = "（為了送他回到千年，與Kei道別的時間比平時晚了一些）"
1013509-156 = "（起初還隔著微妙的距離並肩走著……）"
1013509-157 = "（後來Kei卻漸漸將小指的指尖，朝我的小指勾了過來）"
