[translation]
1013509-1 = "ช่วงเวลาแห่งตะวันตกดิน"
1013509-3 = "[ns] \"เคย์จังมาชาเล่ต์แล้ว~!\""
1013509-4 = "อย่าดี๊ด๊านักสิคะ!"
1013509-5 = "ฉันไม่ได้เพิ่งเคยมาที่นี่เป็นครั้งแรกสักหน่อยนี่คะ..."
1013509-6 = "[s] \"แต่ครูดีใจที่เจอนี่นา~\""
1013509-7 = "..."
1013509-8 = "ไม่ใช่ว่า... ฉันไม่ดีใจที่เจอหรอกค่ะ..."
1013509-12 = "อย่าเข้ามาหากันกะทันหันสิคะ! เดี๋ยวฉันยิงนะคะ??!!"
1013509-14 = "งานส่วนหนึ่งของชาเล่ต์เกี่ยวข้องกับการเสนอความคิดเห็นหรือให้ความเห็นชอบใช่มั้ยล่ะคะ"
1013509-15 = "เรื่องแบบนั้นน่ะ แค่เจ้าตัวคุยกันเองและตกลงกันตามกฎก็ได้ ทำไมจะต้องส่งเรื่องมาถึงที่นี่ด้วย..."
1013509-16 = "แล้วงานบางอย่างก็ต้องใช้กระดาษเท่านั้น ด้วยเหตุผลเรื่องการรักษาความปลอดภัยบ้าบอนั่นอีกค่ะ"
1013509-17 = "แน่นอนว่าไม่มีอะไรที่อยู่ในเครือข่ายแล้วจะปลอดภัย 100%"
1013509-18 = "แต่มันจะไม่ดีกว่าเหรอคะถ้าเราไม่สร้างงานที่ต้องการระดับความปลอดภัยสูงขนาดนั้นตั้งแต่แรกน่ะ...?"
1013509-19 = "[s] \"ก็นี่เป็นงานที่จัดการโดยมนุษย์นี่เนอะ...\""
1013509-20 = "เพราะอย่างนั้นละค่ะ ที่นี่ก็เลยแทบจะพังพินาศแบบนี้"
1013509-21 = "ถ้าทำแล้วงานมันลดลง หรืออย่างน้อยถ้าจะประคองให้เท่าเดิมได้ ฉันก็คงไม่ว่าอะไรหรอกค่ะ"
1013509-22 = "แต่คุณครูก็รู้ดีนี่คะ งานของที่นี่น่ะมีแต่จะเพิ่มขึ้น ไม่เห็นจะลดลงบ้างเลยค่ะ"
1013509-23 = "ยิ่งชาเล่ต์แก้ปัญหาได้ดีเท่าไร งานก็ยิ่งไหลเข้ามามากมายจากทุกทิศทุกทาง ก็เลยเป็นสภาพแบบนี้#nยังไงล่ะคะ"
1013509-24 = "ตำแหน่งเดิมของคุณครูคือนักวิชาการศึกษาไม่ใช่เหรอคะ?"
1013509-25 = "ตกลงตอนนี้ทำงานเป็นฝ่ายบริหารจัดการ หรือคุณครูที่คอยดูแลเส้นทางอาชีพและชีวิตของนักเรียนกัน#nแน่คะ?"
1013509-26 = "[s1] \"นั่นสินะ ได้ยังไงเนี่ย...\"\n[s2] \"ทำงานแบบนี้ เดี๋ยวก็คงลืมว่าเคยสอนหนังสือมาก่อน...\""
1013509-29 = "อย่าพูดเหมือนเป็นเรื่องของคนอื่นสิคะ จริงๆ เลย..."
1013509-30 = "เอกสารนี้ ฉันจะทำไว้ให้แบบนี้นะคะ"
1013509-31 = "ไม่ต้องหรอกค่ะ ไม่ต้องขอบอกขอบใจกันใหญ่โตก็ได้... ฉันแค่ทำงานของนักเรียนที่มาเข้าเวรก็เท่านั้น#nค่ะ..."
1013509-32 = "เมืองแห่งการศึกษา... คิโวทอส... การรวมนักเรียนไว้ในเมืองเดียวก็อาจมีข้อดีอยู่เหมือนกัน"
1013509-33 = "แต่พวกนักเรียนนี่ละค่ะที่ 'เอารัดเอาเปรียบ' ได้ง่ายที่สุดแล้ว ก็เพราะแบบนี้ยังไงล่ะ จึงเกิดปัญหาเหลวไหลได้ไม่เว้นวันน่ะ"
1013509-34 = "อีกอย่างนะคะ ก็นักเรียนอีกนั่นละที่ควบคุมตัวเองกันไม่ได้มากที่สุด"
1013509-35 = "ถึงนี่จะเป็นมุมมองที่ไม่น่าจะใช้ได้ผลในปัจจุบัน แต่ก็ด้วยเหตุผลนี้ละ ในสมัยก่อนก็เลยมีช่วงที่เด็ก#nอายุต่ำกว่ายี่สิบปีไม่ได้รับการปฏิบัติเหมือนเป็นมนุษย์เต็มตัว"
1013509-36 = "เด็กพวกนี้น่ะก่อปัญหามากมายไม่ว่าจะอยู่ที่ไหนค่ะ เพราะอย่างนี้ละค่ะ กิจการก่อสร้างและบูรณะ#nถึงมีอนาคตสดใสเป็นอันดับหนึ่งมาตลอด"
1013509-37 = "[s] \"แต่ต่อให้จะปฏิเสธรากฐานของเมืองแห่งการศึกษา...\""
1013509-38 = "ยังไงก็คงไม่ได้หรอกค่ะ คงเถียงกันไม่จบไม่สิ้นหรอก"
1013509-39 = "จริงๆ เลย คงต้องให้มีคนทำงานจนสลบไปก่อน ทุกคนถึงจะตั้งสติกันได้"
1013509-40 = "นี่ค่ะ งานนี้จัดการแบบนี้ได้ค่ะ ส่วนนี่ก็ข้อมูลสถิติเพิ่มเติมค่ะ"
1013509-41 = "บางครั้งตัวเลขก็พิสูจน์บางอย่างได้ในตัวของมันเองนี่คะ"
1013509-45 = "[ns] \"เคย์จัง\""
1013509-46 = "คะ?"
1013509-51 = "[ns] \"รักนะ\""
1013509-52 = "ไปทางโน้นเลยค่ะ! น่าขนลุกที่สุด!!!"
1013509-58 = "[ns] \"ทำงานเสร็จจนได้สินะ...\""
1013509-61 = "เป็นยังไงบ้างคะ...?"
1013509-62 = "คะ? พอฉันเป็นห่วง ก็หายเหนื่อยเป็นปลิดทิ้งงั้นเหรอคะ? พอเลยค่ะ!"
1013509-63 = "จริงๆ เลย ไม่น่าเป็นห่วงเลยนะคะ..."
1013509-64 = "คะ? ชวนไปร้านอาหารที่มีเมนูดินเนอร์สเปเชียลที่อร่อยมากๆ งั้นเหรอคะ? แล้วก็ไปซื้อเครื่องประดับด้วย?"
1013509-65 = "แต่คุณครูไม่ได้เหนื่อยหรอกเหรอคะ? เมื่อกี้ยังดูเพลียๆ อยู่เลย..."
1013509-66 = "สบายมากงั้นเหรอคะ...? ถ้างั้น... ก็..."
1013509-67 = "..."
1013509-68 = "ว่าแต่ พรุ่งนี้เป็นเวรของนักเรียนคนไหนเหรอคะ?"
1013509-69 = "[s] \"ไหนดูซิ...\""
1013509-73 = "[ns] \"เอ๋? สงสัยจะตกหล่นไปนะ ยังไม่มีใครในตารางเวรเลย\""
1013509-74 = "แบบนั้นก็ได้เหรอคะ...?"
1013509-75 = "เอาไว้แจ้งภายในพรุ่งนี้เช้าก็ได้ ก็เลยไม่มีปัญหางั้นเหรอคะ?"
1013509-76 = "..."
1013509-77 = "งั้นก็ให้เป็นฉันแล้วกันค่ะ"
1013509-78 = "[s] \"ว่าไงนะ?!\""
1013509-79 = "ทะ... ทำไมถึงทำหน้าแปลกๆ แบบนี้ล่ะคะ! ฉันแค่จะ!"
1013509-80 = "ฉัน... ก็แค่จะ..."
1013509-81 = "ชะ... ใช่ค่ะ! นี่ก็เพื่อฝึกให้ฉันได้ปรับตัวในคิโวทอส และเพื่อทำความเข้าใจเกี่ยวกับงานของชาเล่ต์ ยิ่งไปกว่านั้นก็เพื่อปรับปรุงภาวะขาดดุลการค้าและปรับอัตราภาษีศุลกากร"
1013509-82 = "แล้วก็ยังมีเรื่องรายได้และการล่มสลายของการศึกษาที่ไร้วี่แววว่าจะฟื้นตัวคืนกลับมา อนาคตของมนุษยชาติและโลก การชำระล้างและการกอบกู้จิตวิญญาณแห่งโลกที่กำลังเสื่อมทรามลง แล้วก็ แล้วก็..."
1013509-83 = "เอาเถอะค่ะ! มันคือการฝึกฝนเพื่อทุกสิ่งที่ว่ามา แล้วก็...!"
1013509-84 = "ช่างมันเถอะค่ะ! สรุปว่ามันเป็นการตัดสินใจที่สมเหตุสมผลสำหรับทั้งคุณครูและฉันค่ะ! เป็นโชคดีของคุณครูแล้วค่ะ!"
1013509-85 = "[s] \"การตัดสินใจที่สมเหตุสมผล... ช่างเหมือนกับ...\""
1013509-86 = "!??!"
1013509-87 = "ฉะ... ฉันเผลอพูดผิดไปนิดหน่อยค่ะ... น่าอายอะไรอย่างนี้...!"
1013509-88 = "จะยังไงก็เถอะ! เอาเป็นว่าเข้าใจแล้วใช่มั้ยคะ?!"
1013509-89 = "[s] \"เคย์จัง\""
1013509-90 = "ทำไมอีกคะ"
1013509-91 = "[s] \"ขอพูดว่า 'เป็นเด็กดีจังเลยน้า' สักครั้งได้มั้ย?\""
1013509-92 = "ข้ามศพตัวเองและศพของฉันไปก่อนเถอะค่ะ!!!"
1013509-94 = "ถ้างั้นก็... วันนี้ขอบคุณที่เหนื่อยด้วยกันนะคะ"
1013509-95 = "ไว้เจอกันพรุ่งนี้ค่ะ..."
1013509-96 = "มัวยืนทำอะไรคะ? รีบไปสิคะ เราตกลงว่าจะไปกินข้าวเย็นด้วยกัน... แล้วก็ทำนู่นนี่ด้วยไม่ใช่เหรอคะ"
1013509-97 = "[s] \"อื้อๆ แป๊บหนึ่งนะ\""
1013509-99 = "(ในขณะนั้นเอง)"
1013509-106 = "[ns] \"อ่า...\""
1013509-107 = "...?"
1013509-108 = "ทำไมเหรอคะ คุณครู?"
1013509-113 = "[ns] \"...!\""
1013509-114 = "คุณครู?"
1013509-119 = "คะ? เห็นฉันเบลอๆ ไปชั่วขณะ แล้วก็หายไปแวบหนึ่งด้วยเหรอคะ?"
1013509-120 = "แต่ฉันก็อยู่ตรงนี้ตลอดเลยนะ..."
1013509-121 = "..."
1013509-122 = "สงสัยคุณครูจะเหนื่อยนะคะ ปกติเวลาเหนื่อย ได้ยินว่าสายตาของเราจะพร่ามัวค่ะ "
1013509-123 = "งั้นคืนนี้ก็พักผ่อนให้เต็มที่นะคะ"
1013509-126 = "― [log=케이 교복]ไม่ต้องกังวลนะคะ[/log][wa:1900] "
1013509-127 = "― [log=케이 교복]ฉันไม่หายไปไหนหรอกค่ะ [/log][wa:2580] "
1013509-130 = "― [log=케이 교복]จะตรงกันข้ามด้วยซ้ำค่ะ [/log][wa:1400] "
1013509-131 = "― [log=케이 교복]ไม่ว่าจะต้องใช้วิธีไหน ฉันก็จะดิ้นรนมีชีวิตต่อให้ได้ค่ะ[/log][wa:4370] "
1013509-134 = "― [log=케이 교복]ถ้าคุณครูไม่ยอมแพ้ต่อโลกใบนี้[/log][wa:4340] "
1013509-135 = "― [log=케이 교복]ฉันก็จะไม่มีวันยอมแพ้ค่ะ[/log][wa:5650] "
1013509-138 = "― [log=케이 교복]เพราะงั้น... ไม่เป็นไรหรอกค่ะ ทุกอย่างจะไม่เป็นไรค่ะ[/log][wa:3400] "
1013509-139 = "― [log=케이 교복]ฉันจะอยู่ที่นี่ไปตลอดค่ะ[/log][wa:3730] "
1013509-142 = "― [log=케이 교복]ถึงฉันจะพูดแค่ที่นี่เท่านั้น... แต่ฉัน...[/log][wa:4570] "
1013509-143 = "― [log=케이 교복]ก็ไม่ได้ไม่ชอบคุณครูขนาดนั้นหรอกค่ะ[/log][wa:4460] "
1013509-155 = "(คุณครูออกไปส่งเคย์ถึงมิลเลเนียม เลยทำให้แยกจากกันช้ากว่าปกติเล็กน้อย)"
1013509-156 = "(ตอนแรกทั้งสองคนเดินเคียงข้างกัน แต่ห่างกันเล็กน้อย)"
1013509-157 = "(แต่ต่อมา เคย์ก็เหมือนจะยื่นปลายนิ้วก้อยมาให้จับมือ...)"
