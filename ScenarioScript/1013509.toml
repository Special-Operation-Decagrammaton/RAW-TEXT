1013509-6 = "[s] \"그래도 나는 반가운데~\""
1013509-7 = "3;케이 교복;20;……."
1013509-8 = "3;케이 교복;21;안 반갑다는 거, 아닙니다…….\n#fontsize;50"
1013509-9 = "#st;[0,0];instant;1;"
