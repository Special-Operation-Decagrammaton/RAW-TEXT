[translation]
10046005-1 = "บทเริ่มต้น;เรื่องราวที่แย่ ยาก และเศร้า"
10046005-21 = "[log]<ความเดิมที่ผ่านมา>[/log]"
10046005-25 = "พอดีเรามีกระเป๋าสำคัญอยู่ใบหนึ่ง และเราแค่ต้องไปรับมาแล้วนำไปส่งให้สภาน้ำชา... ภายในวันนี้ค่ะ"
10046005-26 = "แต่ว่าตอนนี้กระเป๋าใบนั้นอยู่ในที่ที่ห่างไกลจากเขตปกครองตนเองทรีนิตี้ไม่น้อยเลย..."
10046005-32 = "วะฮ่าฮ่าฮ่าฮ่าฮ่า!!"
10046005-37 = "ไม่ได้เจอกันนานเลยนะคุณครู ว่าแต่มาทำอะไรที่นี่เหรอ?"
10046005-38 = "คินุกาวะ คาสุมิ...?"
10046005-42 = "อาชญากรที่มีประกาศจับ... ของเกเฮนน่า...?"
10046005-45 = "(แต่ด้วยสถานการณ์บางอย่าง กระเป๋าใบนั้นจึงตกไปอยู่ในมือของคินุกาวะ คาสุมิ ผู้เป็นหัวหน้าชมรม#nพัฒนาออนเซ็นและอาชญากรที่มีประกาศจับในขณะนั้น)"
10046005-49 = "อะไรน่ะ!? เธอมาได้ยังไง?!!?!!?"
10046005-50 = "รถไฟขบวนนี้จะไปเกเฮนน่าไม่ใช่เหรอ!? แล้วทำไมชมรมทวงความยุติธรรมของทรีนิตี้ถึงมาอยู่ที่นี่ล่ะ?"
10046005-51 = "แล้วก็อยู่กับคาสุมิอีก...!??"
10046005-52 = "คาสุมิ...!? คาสุมิ!? คุณครู นี่คุณครูอยู่บนรถไฟนี้กับคาสุมิมาตลอดเลยเหรอ!? บอกมานะว่าไม่ใช่!!"
10046005-55 = "(สถานการณ์นี้ยิ่งซับซ้อนขึ้นเมื่อคณะกรรมการวินัยของเกเฮนน่าเข้ามาเกี่ยวข้อง แถมยัง...)"
10046005-59 = "แบบนี้คุณหนูทรีนิตี้คนนั้นกับคุณครูก็ต้องมาอยู่ข้างฉันน่ะสิ~ ใช่มั้ย คุณหนู~?"
10046005-60 = "เอาละๆ งั้นก็มาดูการตัดสินใจของทั้งสองคนนี้กัน ยังไงก็ต้องเลือกแก้วชา...? กระโถน? หรืออะไรสัก#nอย่างนี่แล้วมาอยู่ข้างฉันอยู่แล้วละ"
10046005-61 = "ใช่มั้ย? คุณหนูชมรมทวงความยุติธรรม... ที่ชื่ออะไรนะ?"
10046005-62 = "...นิกะจัง?"
10046005-63 = "จะให้ของในกระเป๋าแตกไม่ได้ ใช่มั้ยล่ะ?"
10046005-69 = "......"
10046005-70 = "เฮ้อ~!! ให้ตายเถอะ!! เอาแต่พล่ามเรื่องกระเป๋ามาตั้งแต่เมื่อกี้แล้ว! กระเป๋าของพวกนั้นน่ะ...!!!"
10046005-71 = "......"
10046005-72 = "มันจะสำคัญอะไรกันนักกันหนาถึงได้เอามาพูดอยู่ได้...!!"
10046005-82 = "โอ๊ะ!"
10046005-83 = "ฮะฮ่า! ฮ่าฮ่าฮ่า!!!"
10046005-84 = "วะฮ่าฮ่าฮ่าฮ่าฮ่า!!!!"
10046005-85 = "ดูเข้าสิ! ดูสิๆ เป็นอย่างที่คิดไว้เลย ฉันบอกไปตั้งกี่ครั้งแล้วล่ะ?"
10046005-86 = "จนกว่าฉันจะให้กระเป๋า... เด็กคนนั้นไม่มีทาง..."
10046005-87 = "ทำอะไรฉัน..."
10046005-95 = "เฮือก...!?"
10046005-102 = "อ่า..."
10046005-103 = "...เผลอยิงไปจนได้"
10046005-105 = "(แล้วเหตุการณ์บนรถไฟที่วิ่งผ่านทรีนิตี้กับเกเฮนน่าก็จบลงด้วยความหายนะ...)"
10046005-113 = "แหมๆ ก็คุณครูน่ะสิ! บอกว่ามีคนที่ต้องไปเจอให้ได้ ฉันก็สงสัยว่าใคร~"
10046005-114 = "ไม่คิดเลยนะว่าคุณหนูอิจิกะจะเสด็จมาด้วยตัวเองแบบนี้"
10046005-115 = "......"
10046005-116 = "ถึงขนาดกับต้องให้อีลีทของชมรมทวงความยุติธรรมเดินทางติดตามคุณครูมาด้วยเลยสินะ"
10046005-117 = "แต่ก็คงไม่ได้ถ่อมาที่นี่เพื่อจับตัวฉันหรอก... สงสัยจังเลยนะว่ามาด้วยธุระใหญ่โตอะไร~?"
10046005-118 = "......"
10046005-119 = "...ค่ะ"
10046005-123 = "หืม~?"
10046005-127 = "ช่วยฉันสักครั้งเถอะค่ะ! ถือว่าฉันขอร้องละ"
10046005-133 = "หา?"
10046005-134 = "ฮะ... ฮะฮ่า...! วะฮะฮะฮ่า...!!"
10046005-135 = "ตายแล้ว ตายแล้ว~ ข้างนอกหิมะตกหรือเปล่าเนี่ย อิจิกะจังของเราถึงได้พูดอะไรแบบนั้นออกมาจาก#nปากตัวเองเลย?"
10046005-136 = "ฉันต้องช่วยอยู่แล้วละ เราก็ไม่ใช่คนอื่นคนไกลกันนี่ ใช่มั้ยล่ะ?"
10046005-137 = "......"
10046005-138 = "แต่ว่า~ คุณหนูที่น่ารักของเราก็ฝีมือดีไม่น้อยเลยไม่ใช่เหรอ? ตอนเหตุการณ์รถไฟก็จัดการเองเรียบ~ คนเดียวเลยนี่?"
10046005-139 = "แต่ก็อย่างที่รู้ว่าฉันเป็นแค่ชาวบ้านคนดีมีศีลธรรม ฉันก็ไม่รู้หรอกว่าเรื่องที่เธอจะขอให้ช่วยเป็นเรื่องที่ฉันช่วยได้หรือเปล่า~"
10046005-140 = "เรื่องตอนนั้น..."
10046005-141 = "เป็นความผิดของฉันเองค่ะ"
10046005-142 = "ยกโทษให้ฉันสักครั้งเถอะนะคะ"
10046005-143 = "อ่า อ่า... เข้าใจว่าฉันอยากฟังคำนี้สินะ?"
10046005-144 = "จำที่ฉันเคยพูดก่อนหน้านี้ได้มั้ยล่ะ? ที่บอกว่าเธอกับฉันเหมือนกันน่ะ"
10046005-148 = "แล้วฉันก็ไม่ใช่คนที่ลืมแม้แต่ความแค้นเล็กๆ น้อยๆ ด้วย"
10046005-149 = "เธอไม่ได้เกลียดฉันหรอกเหรอ? หรือว่ามีอะไรทำให้เธอเปลี่ยนไปได้ถึงขนาดนี้เลย?"
10046005-150 = "......"
10046005-151 = "โอ๊ะ? ดูทำหน้าเข้าสิ เธอไม่ได้เปลี่ยนไปเลยสักนิดสินะ แค่ดูก็รู้ได้เลยว่าเธอยังเกลียดชังฉันอยู่"
10046005-152 = "......"
10046005-153 = "ดีละ ดีละ... น่าสนุกจริงเชียว แต่ถึงยังไงก็จะก้มหัวให้ฉันงั้นสินะ? เพราะอะไรกันล่ะเนี่ย?"
10046005-157 = "ไหนขอลองฟังเหตุผลหน่อยได้มั้ย?"
