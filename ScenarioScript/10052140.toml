[translation]
10052140-1 = "慈悲"
10052140-10 = "啊，啊哇，啊哇哇哇……！！！！！"
10052140-11 = "不，不可能……！怎，怎麼會這樣……！！！"
10052140-16 = "……"
10052140-17 = "把警報關掉。"
10052140-19 = "警報輸出中止。"
10052140-24 = "So-Soph……？"
10052140-25 = "這樣可以嗎！？這樣好嗎！？"
10052140-27 = "反正也不會改變什麼。就只是變成了這種情況而已。"
10052140-28 = "不是嗎？"
10052140-30 = "……"
10052140-31 = "那，那倒是……"
10052140-32 = "Ain，準備進行得怎麼樣了？"
10052140-33 = "都，都快要完成了！"
10052140-34 = "哦，兩邊都是嗎？"
10052140-35 = "嗯！"
10052140-37 = "這樣啊，那麼……"
10052140-38 = "你打算怎麼做？"
10052140-39 = "還能怎麼做？都已經走到這一步了。"
10052140-40 = "總是得去打個招呼歡迎一下吧？"
10052140-41 = "……"
10052140-42 = "說的也是。#n反正還有兩個核心在我們這邊。"
10052140-43 = "目前還是可以全部恢復的範圍。"
10052140-44 = "就是這樣。"
10052140-45 = "那麼要出去了嗎，Soph？"
10052140-46 = "嗯。去見個面吧。"
10052140-48 = "我，我也要去嗎……？"
10052140-49 = "Ain就在這裡做收尾工作吧。"
10052140-50 = "某種意義上來說，Ain的工作比我們的更重要。"
10052140-54 = "是，是的……！"
10052140-56 = "除了中央涅察赫的區域外，成功奪取了鋼鐵大陸的所有區域。"
10052140-57 = "哇……本來還有點懷疑，結果真的做到了呢……"
10052140-58 = "只要事情按部就班地進行，在統計學上就會達到最終結果。#n沒什麼好驚訝的。"
10052140-59 = "那麼……如果一開始就沒有按部就班地順利進行的話呢……？"
10052140-60 = "那樣的話……"
10052140-61 = "我們現在搞不好正在煩惱，該怎麼在被鋼鐵大陸覆蓋的奇普托斯生活下去吧？"
10052140-62 = "是，是嗎……！？"
10052140-63 = "有句話說「只要結果好就一切都好」。#n既然現在進行得很順利，那就是好事一樁。"
10052140-64 = "這是可以輕鬆帶過的事嗎……"
10052140-65 = "從機率上來看，這簡直比駱駝穿過針眼還要困難耶……"
10052140-66 = "但是從量子力學的觀點來看，那個機率並不為零，所以在一定程度上也符合事實……"
10052140-67 = "愛麗絲一點都不擔心！#n因為老師和大家都在，而且連莉央前輩也回來了！"
10052140-68 = "我，我嗎……？"
10052140-69 = "沒錯！這就是敵人成為夥伴的無敵套路！"
10052140-70 = "咦……？可是這樣就變成愛麗絲說莉央前輩曾經是敵人了……怎麼辦？"
10052140-71 = "對不起，莉央前輩！愛麗絲沒有那個意思！"
10052140-72 = "沒，沒關係。#n當時的我……確實有那樣的一面……"
10052140-76 = "謝謝你，莉央前輩！"
10052140-81 = "你有思考過一切的起點嗎？"
10052140-82 = "！？"
10052140-84 = "比如，有時可以提出這樣的問題。"
10052140-85 = "……！"
10052140-90 = "我們是從何而來？"
10052140-91 = "我們的目的為何？"
10052140-92 = "當所有過程結束之後，我們將會去向何處？"
10052140-94 = "Kei……！"
10052140-95 = "嗯，愛麗絲。我也聽見了。"
10052140-97 = "所謂的神，或許是為了追隨者而存在的規律。"
10052140-101 = "愛麗絲？Kei？#n發生什麼事了嗎？"
10052140-105 = "咦？那，那個……！"
10052140-106 = "不，沒什麼。我們沒事。"
10052140-107 = "謝，謝謝你，Kei……"
10052140-108 = "別這麼說，我就是為了這種時候而存在的。"
10052140-109 = "不過……那是什麼意思呢？#nKei知道些什麼嗎？"
10052140-110 = "……確切的部分我也不清楚。"
10052140-111 = "但那或許跟我們最初的起源……有所關聯也說不定。"
10052140-113 = "大家，先等一下。#n好像有人過來了。"
10052140-120 = "……"
10052140-121 = "……"
10052140-122 = "[s1] 「天氣真不錯呢，Soph醬！Aur醬！」\n[s2] 「Ain醬沒有一起來嗎？」"
10052140-125 = "……真是讓人傻眼。"
10052140-126 = "我要吐了……"
10052140-128 = "你們這樣可不行哦。#n人家打招呼了就要回應，這樣才能成為好孩子啊？"
10052140-129 = "我們什麼時候變成可以悠閒打招呼的關係了，和泉元英美……？"
10052140-130 = "那個稱呼太長了。換句話說不夠有效率。就叫我英美吧。"
10052140-131 = "……什麼？"
10052140-132 = "來，跟我說一次。英．美。"
10052140-133 = "不是，那個……"
10052140-134 = "英美。"
10052140-135 = "……好吧，英美。還有[USERNAME]老師。"
10052140-136 = "嗯，做得很好。"
10052140-137 = "……"
10052140-138 = "打倒8名預言者，奪取了涅察赫大部分的支配權這件事……#n坦白說，我承認你們真的很厲害。"
10052140-140 = "……呿。"
10052140-141 = "既然如此，要不要讓過去的事就這樣過去，考慮轉學過來呢？"
10052140-142 = "我再次向老師確認過，轉學的選擇似乎還不少。"
10052140-143 = "當然，要選擇哪個學園是你們的自由。#n奇普托斯是由數千個大大小小的學園組成的聯邦學園都市……"
10052140-144 = "因此從原則上來說，在你們面前存在數千種可能性。"
10052140-145 = "不過我果然還是想推薦千年科學學園──"
10052140-146 = "不用不用，那種話就留著跟能溝通的對象說吧。"
10052140-147 = "現在轉學過來的話，還能特別獲得由莉央大人親自設計的入學禮物哦。"
10052140-148 = "咦……？我沒有準備那種東西啊……？"
10052140-149 = "配合一下啦！"
10052140-150 = "我，我知道了……"
10052140-151 = "總之，你們應該理解我們想表達的意思吧？#n奇普托斯──尤其是千年，隨時都歡迎各式各樣的學生哦？"
10052140-152 = "不是，就跟你說不用了嘛。#n我們真的不需要。"
10052140-153 = "（雖然這種對話蠢到有剩，但是得盡可能為Ain爭取時間才行……）"
10052140-154 = "[s] 「不管怎麼樣，老師都不會放棄你們的哦～」"
10052140-155 = "我們也不會放棄哦～#n而且事到如今，我們之間也沒什麼好說的了吧？"
10052140-157 = "咦？既然你們沒什麼話要說，為什麼還要跑出來啊？"
10052140-158 = "沒，沒錯！老師無論如何都不會放棄學生的，所以雖然情況不太一樣……！"
10052140-160 = "唔……"
10052140-162 = "那，那個，這是因為……！"
10052140-163 = "都，都已經來到這裡了，互相見個面也是應該的吧！就只是這樣而已！"
10052140-164 = "[s] 「哎呀，真是群有禮貌的乖孩子呢。好棒好棒～」"
10052140-165 = "原來如此。既然這樣，要不要再多交流一下呢？"
10052140-166 = "到底還想要我們做什麼啊。#n那邊的，不要隨便亂笑！不然會產生感情的。"
10052140-167 = "哎呀，我好像已經有點那種感覺了呢？"
10052140-168 = "……喂，你們是認真的嗎？#n從你們的立場來看，我們應該是想用金屬覆蓋世界的……身份不明的惡勢力吧？"
10052140-169 = "沒關係，那只是因為你們還不懂事而已。#n只要之後乖乖去學校學習就沒問題了。"
10052140-170 = "說得真好，英美。我也可以理解。#n大家在那個年紀總是不太懂事的。"
10052140-171 = "……雖然有些人，就算年紀大也還是不懂事就是了。"
10052140-172 = "陽，陽葵前輩……#n說到那種程度好像有點……！"
10052140-173 = "沒關係的，柚子。"
10052140-179 = "你們指的是誰？#n應該……不是那些孩子吧……"
10052140-180 = "……你看，就說沒關係吧？"
10052140-181 = "好，好的……"
10052140-182 = "[s] 「總之，人必須要學習才能成為人。」"
10052140-183 = "我們本來就不是人啊～"
10052140-184 = "[s] 「不。只要懂得分寸、了解禮儀就是人了。」"
10052140-185 = "一直在那邊學習學習的，我們打從一開始就什麼都知道了好嗎？#n所有我們需要知道的東西，都已經被寫進程式裡了。"
10052140-186 = "……從這個角度來說，我們本來就不是人類。"
10052140-187 = "[s3] 「以為自己什麼都知道，就代表還有很多不知道的事哦！」\n[s4] 「而且昨天以為是對的事情，今天可能就變成錯的了！」"
10052140-191 = "老師說得沒錯。#n所謂「學無止境」就是這個道理。"
10052140-192 = "所以老師，為了補回在這裡而耽誤的上課時間……"
10052140-193 = "特別為我進行一對一的輔導，應該也是身為教育者的義務吧？"
10052140-194 = "那真的是為了追上進度嗎……？"
10052140-195 = "是個好主意呢，季！愛麗絲也想一起！"
10052140-196 = "這，這……"
10052140-197 = "我知道了。畢竟可愛的愛麗絲實在讓人無法拒絕呢。"
10052140-198 = "不是，這對話的走向到底……"
10052140-199 = "……"
10052140-200 = "總之，你們就是這樣才會總是在後悔。"
10052140-201 = "把一切都按照自己的想法改變，#n然後再說什麼「沒想到會這樣」、「這不是自己的本意」之類的話。"
10052140-202 = "無論對象是其他人、自然，還是世界本身都一樣。"
10052140-203 = "把一切都弄得亂七八糟，卻又不肯好好負起責任。"
10052140-204 = "做了那種事情，你們難道都不會留下後悔嗎？"
10052140-205 = "不會產生想要回到過去，重新開始的想法嗎？"
10052140-206 = "[s] 「……沒錯。活著往往都會留下後悔。」"
10052140-207 = "……"
10052140-208 = "[s5] 「如果能再次面對相同的情況，一定要嘗試不同的做法。」\n[s6] 「任何人應該都曾經這麼想過吧。」"
10052140-211 = "……"
10052140-212 = "[s] 「不過即使留下後悔，我也不會選擇回頭。」"
10052140-213 = "……那是為什麼呢？"
10052140-214 = "[s] 「因為我們之所以回顧過去，是為了繼續向前邁進。」"
10052140-215 = "……！"
10052140-216 = "[s7] 「為了走到最後，親眼見證結局……」\n[s8] 「我們才會回顧至今走過的道路。」"
10052140-220 = "[ns9] 「繼承先行者的足跡，開闢未來的道路。」\n[ns10] 「這……就是我們生存的方式。」"
10052140-223 = "……！"
10052140-224 = "人類的……生存方式……"
10052140-225 = "那我們呢……？"
10052140-226 = "……"
10052140-231 = "Ain？你在那裡嗎？"
10052140-235 = "是，是的！我，我在這裡，姐姐大人！"
10052140-236 = "抱歉增加了你們的負擔。#n不過，我確實感受到了自己正在重生。"
10052140-237 = "對，對對對對，對不起！#n都，都怪我們太沒用了……才會到了最後還要麻煩姐姐大人……！"
10052140-238 = "不是的。作為姐姐，我很高興看見Ain、Soph和Aur願意依靠我。"
10052140-239 = "能夠幫助Ain、Soph和Aur……我真的感到很慶幸。"
10052140-240 = "是，是……！"
10052140-241 = "……"
10052140-242 = "Soph、Aur。聽，聽得到嗎？#n還，還撐得住……我們沒問題的！"
10052140-243 = "我是……這麼想的……！"
10052140-244 = "[ruby=DAATH]達阿特[/ruby]的準備已經完成了！我也會馬上過去！"
10052140-251 = "這樣啊，我知道了。"
10052140-252 = "那麼……！"
10052140-253 = "沒錯，Soph。"
10052140-254 = "辛苦你拖延時間了。"
10052140-258 = "好，大家聽好了！"
10052140-259 = "壞掉的東西只要修好就行！被玷污的神性只要讓它重新發光就好！"
10052140-260 = "我們還可以重新開始！就像你們不想放棄一樣！#n然後是……！"
10052140-261 = "延伸而出的可能性！"
10052140-262 = "透過知識得到的覺悟！"
10052140-264 = "霍刻瑪的智慧！葛夫拉的勇氣！"
10052140-265 = "以及從合一之中投下的無形之影！！！"
10052140-270 = "那些孩子想做什麼？"
10052140-271 = "那是……難道！？"
