10052140-1 = "ความเมตตา"
10052140-10 = "มะ... มะ... ไม่นะ....!!!!!"
10052140-11 = "เป็นไป... ได้ยังไงคะ...! เป็นแบบนี้ไปได้ยังไง...!!!"
10052140-16 = "..."
10052140-17 = "ปิดการเตือน"
10052140-19 = "หยุดการส่งสัญญาณเตือนภัย"
10052140-24 = "ซะ... ซอฟ...?"
10052140-25 = "จะไม่เป็นอะไรเหรอคะ?! ทำแบบนี้ได้เหรอคะ??"
10052140-27 = "มันก็ไม่ได้มีอะไรเปลี่ยนแปลงไปอยู่แล้วนี่ แค่สถานการณ์มันออกมาเป็นอย่างนี้น่ะ ทั้งหมดมันก็เท่านั้นแหละ"
10052140-28 = "หรือว่าไม่ใช่?"
10052140-30 = "..."
10052140-31 = "มันก็... จริงอยู่หรอกค่ะ..."
10052140-32 = "ไอน์ เตรียมตัวพร้อมแค่ไหนแล้ว?"
10052140-33 = "ทะ... ทุกอย่างเรียบร้อยดีค่ะ! อีกนิดก็เสร็จแล้วค่ะ!"
10052140-34 = "โอ้ ทั้งสองฝั่งเลยเหรอคะ?"
10052140-35 = "ค่ะ!"
10052140-37 = "อื้อ อย่างนั้นสินะ ถ้างั้น..."
10052140-38 = "คิดจะทำยังไงต่อเหรอคะ?"
10052140-39 = "จะยังไงเสียอีกล่ะ ในเมื่อมาถึงที่นี่แล้ว"
10052140-40 = "ก็ต้องต้อนรับน่ะสิ หรือว่าไม่ใช่?"
10052140-41 = "..."
10052140-42 = "ก็ใช่ค่ะ ยังไงฝ่ายเราก็ยังเหลือคอร์อยู่อีก 2 อัน"
10052140-43 = "จะว่าไป ตอนนี้ก็ยังอยู่ในขอบเขตที่พอจะแก้ไขให้กลับมาเป็นเหมือนเดิมได้อยู่นะคะ"
10052140-44 = "ใช่แล้วละ"
10052140-45 = "งั้นเราออกไปกันเลยมั้ยคะ ซอฟ?"
10052140-46 = "อื้อ คงต้องออกไปเจอหน้ากันสักหน่อยละนะ"
10052140-48 = "ฉะ... ฉันด้วยมั้ยคะ?"
10052140-49 = "ไอน์น่ะ อยู่ทำงานตรงนี้ให้เสร็จเถอะ"
10052140-50 = "งานของไอน์น่ะสำคัญกว่างานของพวกเราอีก"
10052140-54 = "ค่ะ ค่ะ...!"
10052140-56 = "ถ้าไม่นับพื้นที่ตอนกลางของเน็ตซาช ตอนนี้เรายึดทุกส่วนของดินแดนเหล็กกล้ามาได้สำเร็จแล้วค่ะ"
10052140-57 = "ว้าว... มันเกิดขึ้นจริงๆ ด้วยสินะ..."
10052140-58 = "เรื่องพวกนี้น่ะ ถ้าเราทำตามขั้นตอนไปเรื่อยๆ ท้ายที่สุดก็จะได้ผลลัพธ์ตามหลักสถิตินั่นละ ไม่ต้องตกใจให้มากไปหรอก"
10052140-59 = "ละ... แล้วถ้ามันไม่เป็นไปตามขั้นตอนตั้งแต่แรกล่ะคะ...?"
10052140-60 = "ถ้าเป็นอย่างนั้น..."
10052140-61 = "ตอนนี้เราก็คงกำลังคิดหาวิธีเอาตัวรอดกันในคิโวทอสที่ถูกดินแดนเหล็กกล้ากลืนกินอยู่ละมั้ง?"
10052140-62 = "คะ... คะ...?!"
10052140-63 = "มีคำกล่าวที่ว่า ถ้าผลลัพธ์ออกมาดี ส่วนใหญ่ก็ถือเป็นเรื่องที่ดีไม่ใช่เหรอคะ? ถ้าออกมาดี มันก็เป็นเรื่องที่ดีค่ะ"
10052140-64 = "นี่คือเรื่องที่เราเอามาพูดอย่างสบายใจในสถานการณ์แบบนี้ได้เหรอคะ...? "
10052140-65 = "ถ้าพูดกันตามหลักสถิติแล้ว มันเป็นเรื่องยากกว่าการที่อูฐจะลอดผ่านรูเข็มอีกนะคะ..."
10052140-66 = "จากมุมมองของกลศาสตร์ควอนตัม ความน่าจะเป็นไม่ใช่ศูนย์ และถึงแม้จะมีบางแง่มุมที่สอดคล้อง#nกับความเป็นจริงอยู่บ้าง..."
10052140-67 = "แต่ยังไงอาริสึก็ไม่กังวลหรอกค่ะ! ตอนนี้เรามีทั้งคุณครู มีทุกคน และที่สำคัญก็คือ รุ่นพี่ริโอะกลับมาแล้วนี่คะ!"
10052140-68 = "ฉะ... ฉันเหรอ...?"
10052140-69 = "ค่ะ! นี่คือพล็อตจำเจที่ศัตรูกลายมาเป็นพันธมิตรยังไงล่ะคะ! แบบนี้เราไร้เทียมทานแน่นอนค่ะ!"
10052140-70 = "หืม...? ถ้างั้นก็ตีความได้ว่าอาริสึเคยมองว่ารุ่นพี่ริโอะเป็นศัตรูน่ะสิ... ทำยังไงดีล่ะคะ?"
10052140-71 = "ขอโทษด้วยค่ะ รุ่นพี่ริโอะ! อาริสึไม่ได้มีเจตนาอย่างนั้นนะคะ!"
10052140-72 = "มะ... ไม่เป็นไรหรอก เพราะตอนนั้นฉันก็... มีด้านที่เป็นอย่างนั้น... จริงๆ..."
10052140-76 = "ขอบคุณค่ะ รุ่นพี่ริโอะ!"
10052140-81 = "เคยคิดถึงจุดเริ่มต้นของทุกสิ่งทุกอย่างหรือเปล่า?"
10052140-82 = "?!"
10052140-84 = "บางทีเราอาจลองตั้งคำถามแบบนี้ดูก็ได้"
10052140-85 = "...!"
10052140-90 = "อย่างเช่น เรามาจากที่ไหน?"
10052140-91 = "จุดประสงค์ของเราคืออะไร?"
10052140-92 = "เมื่อกระบวนการทุกอย่างจบสิ้นแล้ว เราจะไปที่ไหนต่อ?"
10052140-94 = "เคย์...!"
10052140-95 = "ค่ะ อาริสึ ฉันก็ได้ยินอยู่เหมือนกันค่ะ"
10052140-97 = "สิ่งที่เรียกว่าเทพ บางทีอาจเป็นเพียงกฎเกณฑ์ที่ถูกสร้างขึ้นมาเพื่อผู้ที่เคารพศรัทธาก็ได้"
10052140-101 = "อาริสึ? เคย์? มีเรื่องอะไรงั้นเหรอคะ?"
10052140-105 = "คะ? คะ... คือว่า...!"
10052140-106 = "เปล่าค่ะ ไม่มีอะไรทั้งนั้นค่ะ ทุกอย่างปกติค่ะ"
10052140-107 = "ขะ... ขอบคุณนะคะ เคย์..."
10052140-108 = "ไม่เป็นไรหรอกค่ะ ฉันอยู่ที่นี่เพื่อเวลาแบบนี้อยู่แล้วค่ะ"
10052140-109 = "แต่ว่า... เมื่อกี้มันหมายความว่ายังไงเหรอคะ? เคย์รู้อะไรบ้างหรือเปล่าคะ?"
10052140-110 = "ฉันเองก็ไม่รู้รายละเอียดที่แน่ชัดเหมือนกัน แต่ว่า..."
10052140-111 = "นั่นอาจเกี่ยวข้องกับ... จุดเริ่มต้นแรกของพวกเราก็ได้ค่ะ"
10052140-113 = "ทุกคน เดี๋ยวก่อน ฉันรู้สึกว่ามีใครกำลังเข้ามาน่ะ"
10052140-120 = "..."
10052140-121 = "..."
10052140-122 = "[s1] \"ว่าไง ซอฟจัง! ออร์จัง!\"\n[s2] \"อ้าว ไอน์จังไม่ได้มาด้วยเหรอ?\""
10052140-125 = "เหลือจะเชื่อเลย..."
10052140-126 = "เหอะ..."
10052140-128 = "พวกเธอไม่ควรทำแบบนั้นนะ ถ้ามีคนเอ่ยคำทักทาย ก็ควรทักทายกลับสิ จะได้เป็นเด็กดีไง?"
10052140-129 = "นี่เราสนิทกันถึงขั้นที่จะมาทักทายกันอย่างสบายใจแบบนี้ตั้งแต่ตอนไหนเหรอคะ อิซุมิโมโตะ เอมิ...?"
10052140-130 = "เรียกชื่อยาวไปแล้วนะ ไม่มีประสิทธิภาพเอาซะเลย เรียกสั้นๆ ว่าเอมิก็ได้"
10052140-131 = "คะ...?"
10052140-132 = "ไหน ลองพูดตามซิ เอมิ"
10052140-133 = "เดี๋ยวนะ คือว่า..."
10052140-134 = "เอมิ"
10052140-135 = "ก็ได้... เอมิ แล้วก็คุณครู [USERNAME] ด้วย"
10052140-136 = "อื้อ ดีมาก"
10052140-137 = "..."
10052140-138 = "ที่พวกคุณเอาชนะผู้เลื่อมใสทั้ง 8 และยึดพื้นที่ส่วนใหญ่ของเน็ตซาชได้ ขอบอกตามตรงว่าน่าประทับใจเลยละ"
10052140-140 = "ชิ..."
10052140-141 = "ถ้างั้นก็ปล่อยอดีตที่ผ่านไปแล้วให้ไหลลงอ่างล้างหน้าไป แล้วย้ายมาเรียนกับพวกเรามั้ยล่ะคะ?"
10052140-142 = "ฉันลองไปถามคุณครูมาอีกครั้งแล้ว เห็นว่าตอนนี้ยังมีใบสมัครเรียนเหลืออยู่นะคะ"
10052140-143 = "แน่นอนว่าการเลือกว่าจะไปโรงเรียนไหนนั้นมันก็ขึ้นอยู่กับพวกคุณ เพราะคิโวทอสเป็นเมืองแห่ง#nการศึกษาที่ประกอบไปด้วยโรงเรียนน้อยใหญ่นับพันแห่ง"
10052140-144 = "โดยหลักการแล้ว อาจบอกได้ว่าทุกคนมีทางเลือกนับพันเลยละค่ะ"
10052140-145 = "แต่ฉันก็อยากแนะนำโรงเรียนวิทย์มิลเลเนียมที่สุด..."
10052140-146 = "ไม่ไปค่ะ ไม่ไป ไปพูดอะไรแบบนั้นกับคนอื่นเถอะค่ะ"
10052140-147 = "ถ้าย้ายมาเรียนตอนนี้ จะได้ของขวัญต้อนรับที่ออกแบบเป็นพิเศษโดยท่านริโอะเลยนะคะ"
10052140-148 = "หะ... หืม...? ฉันไม่เคยเตรียมของอะไรแบบนั้นไว้สักหน่อย...?"
10052140-149 = "ช่วยพูดๆ ไปก่อนเถอะค่ะ!"
10052140-150 = "กะ... ก็ได้..."
10052140-151 = "เอาเถอะค่ะ พอจะเข้าใจสิ่งที่พวกฉันพยายามจะสื่อแล้วใช่มั้ยคะ? คิโวทอสเป็นสถานที่ที่เปิดรับ#nนักเรียนทุกคนเสมอค่ะ โดยเฉพาะมิลเลเนียมของเรา"
10052140-152 = "ก็บอกว่าไม่ไปไง จริงๆ เลย ไม่จำเป็นหรอก"
10052140-153 = "(ถึงจะไม่อยากมาคุยเรื่องอะไรแบบนี้ แต่ตอนนี้เราต้องยื้อเวลาเพื่อไอน์ให้ได้มากที่สุด...)"
10052140-154 = "[s] \"แต่ยังไงครูก็จะไม่ยอมแพ้กับทุกคนหรอกนะ~\""
10052140-155 = "พวกเราก็ไม่ยอมแพ้เหมือนกันค่ะ~ ยังไงตอนนี้เราก็ไม่มีเรื่องอะไรต้องคุยกันอีกแล้วนี่คะ"
10052140-157 = "เอ๋? ถ้าไม่มีเรื่องอะไรจะคุย แล้วพวกเธอมาทำอะไรที่นี่ล่ะ?"
10052140-158 = "นะ... นั่นสิคะ! ถึงสถานการณ์ฝั่งเราจะไม่เหมือนกัน เพราะคุณครูเป็นคนที่จะไม่มีวันทอดทิ้งนักเรียน#nเด็ดขาดก็เถอะ...!"
10052140-160 = "อึก "
10052140-162 = "ระ... เรื่องนั้น คือว่า...!"
10052140-163 = "กะ... ก็แบบ! ดั้นด้นมาถึงที่นี่ทั้งที อย่างน้อยเราก็ต้องได้เจอหน้ากันหน่อยไม่ใช่หรือไง? นี่ละเหตุผล!"
10052140-164 = "[s] \"เป็นเด็กดีกันจังเลยนะ รู้จักมารยาทด้วย น่าชื่นชมจริงๆ~\""
10052140-165 = "นั่นสินะคะ ในเมื่อเป็นแบบนี้แล้ว งั้นก็ลองทำอะไรอีกสักหน่อยสิคะ?"
10052140-166 = "จะให้ทำอะไรอีกล่ะคะ? นี่ หยุดยิ้มเลยนะคะ เดี๋ยวก็ผูกพันกันขึ้นมาหรอก"
10052140-167 = "ตายจริง แต่ฉันว่าตัวเองรู้สึกผูกพันขึ้นมาบ้างแล้วนะคะ?"
10052140-168 = "พวกคุณเสียสติกันหมดแล้วหรือไง...? ถ้าให้มองจากมุมมองของพวกคุณ พวกฉันก็ยังเป็นกองกำลัง#nวายร้ายปริศนา... ที่พยายามจะทำให้โลกนี้ปกคลุมไปด้วยโลหะเลยนะ?"
10052140-169 = "ไม่หรอก พวกเธอแค่ยังไม่รู้อะไรน่ะ ถ้าไปโรงเรียนแล้วได้เรียนหนังสือ มุมมองต่อสิ่งต่างๆ ก็คงกว้างขึ้นน่ะ"
10052140-170 = "พูดได้ดีเลยค่ะ เอมิ ฉันก็เข้าใจได้ค่ะ ในวัยนี้น่ะ ทุกคนย่อมไร้เดียงสาอยู่แล้วค่ะ"
10052140-171 = "ถึงจะมีบางคนที่ต่อให้อายุมากขึ้น แต่ก็ไม่รู้จักเติบโตขึ้นอยู่ก็ตามค่ะ..."
10052140-172 = "ระ... รุ่นพี่ฮิมาริ... ไม่เห็นจะต้องพูดถึงขนาดนั้นเลย...!"
10052140-173 = "ไม่เป็นไรหรอกค่ะ ยูสึ"
10052140-179 = "พูดถึงใครเหรอ? ฉันว่าเธอไม่น่าจะหมายถึงเด็กพวกนั้นนะ...?"
10052140-180 = "ดูสิคะ... บอกแล้วไงคะว่าไม่เป็นไร"
10052140-181 = "ค่ะ... ค่ะ..."
10052140-182 = "[s] \"แต่เราต้องเรียนรู้ จะได้เป็นมนุษย์ที่สมบูรณ์นะ \""
10052140-183 = "พวกฉันไม่ใช่มนุษย์ตั้งแต่แรกอยู่แล้วค่ะ~"
10052140-184 = "[s] \"ไม่หรอก สิ่งที่รู้จักความเหมาะสมและมารยาทนี่ละที่เรียกว่ามนุษย์\""
10052140-185 = "เอาแต่พูดเรื่องเรียนกันอยู่นั่นละ พวกฉันเกิดมาแบบรู้ทุกอย่างแล้วต่างหากล่ะ ทุกอย่างถูกตั้งโปรแกรมเอาไว้แล้วแทบทั้งนั้น"
10052140-186 = "และในแง่นั้น พวกฉันก็ไม่นับว่าเป็นมนุษย์หรอก..."
10052140-187 = "[s3] \"การคิดว่ารู้ทุกอย่างแล้ว แปลว่ายังมีหลายอย่างที่ยังไม่รู้นะ!\"\n[s4] \"สิ่งที่เมื่อวานคิดว่าถูกต้อง วันนี้อาจจะผิดก็ได้!\""
10052140-191 = "คุณครูพูดถูกแล้วค่ะ มีคำกล่าวที่ว่า การเรียนรู้ไม่มีที่สิ้นสุดด้วยค่ะ "
10052140-192 = "เพราะงั้น คุณครูคะ คาบเรียนทั้งหมดที่ฉันขาดเรียนไประหว่างมาทำภารกิจที่นี่"
10052140-193 = "ไว้กลับไปแล้วช่วยสอนชดเชยให้ฉันแบบตัวต่อตัวจะได้มั้ยคะ?"
10052140-194 = "นั่นเป็นการขอคลาสเสริมเพื่อจะเรียนให้ทันเพื่อนจริงๆ ใช่มั้ยคะ...?"
10052140-195 = "เป็นความคิดที่ดีเลยค่ะ โทคิ! อาริสึก็อยากไปเรียนด้วยค่ะ!"
10052140-196 = "ระ... เรื่องนั้น..."
10052140-197 = "ก็ได้ค่ะ ถ้าเป็นอาริสึที่น่ารักละก็ ฉันยอมให้ได้ค่ะ"
10052140-198 = "เดี๋ยวนะ ทำไมถึงพากันออกนอกเรื่องได้ขนาดนี้เลยล่ะ..."
10052140-199 = "..."
