901010800110-8 = "3;카르파초 패밀리 경비원 A;00;다녀왔어~\n#3;em;[반응]"
901010800110-9 = "5;카르파초 패밀리 경비원 B;00;늦었잖아. 혼자서 여기 앞을 지키느라 심심해 죽는 줄 알았다고.\n#5;em;[속상함]\n#5;al\n#3;m1"
901010800110-10 = "3;카르파초 패밀리 경비원 A;00;미안, 미안. 생각보다 드럼통이 무거워서…… 옮기는 데 시간이 좀 걸렸거든."
901010800110-11 = "5;카르파초 패밀리 경비원 B;00;확실히 요령이 없으면 그냥 굴리는 것도 꽤 어렵지. 처음에는."
901010800110-12 = "3;카르파초 패밀리 경비원 A;00;그런데 아무것도 안 든 드럼통을 굴리면서 항구를 배회하는 게 무슨 의미가 있는 거야?\n#3;em;[?]"
901010800110-13 = "3;카르파초 패밀리 경비원 A;00;게다가 인적이 드문 새벽 시간대에 드럼통을 옮기라면서, 이렇게 시끄러운 소리가 나면 우리가 드럼통을 운반하는 걸 다들 알아차리지 않을까?"
901010800110-14 = "5;카르파초 패밀리 경비원 B;00;높은 분들이 생각하는 일을 우리가 어떻게 알겠어?\n#5;em;[한숨]"
901010800110-15 = "5;카르파초 패밀리 경비원 B;00;우리 같은 말단은 그냥 시키는 말만 잘 들으면 되는 거야."
