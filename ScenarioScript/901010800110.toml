[translation]
901010800110-8 = "ただいま。"
901010800110-9 = "遅かったじゃん。一人で門番するの退屈なんだよね。"
901010800110-10 = "ごめんって。思ったよりもドラム缶が重くてよ……運ぶのに時間がかかっちまった。"
901010800110-11 = "慣れないと転がすのも難しいもんな。"
901010800110-12 = "でも中に何も入ってないドラム缶を転がして港を歩き回って、一体何の意味があるんだ？"
901010800110-13 = "それも深夜にさ……騒音の苦情が来るんじゃないのか？"
901010800110-14 = "上の考えがうちらに分かるわけないだろ？"
901010800110-15 = "うちらみたいな末端は、言われた通り仕事をすりゃいいんだよ。"
901010800110-20 = "こちらFOX2。現在、ポイントウィスキーで待機中。"
901010800110-21 = "指定ポイントから離れたタンゴ2の復帰を確認。その他、特にないよ。"
901010800110-25 = "……あいつら何やってるの？夜中にドラム缶を転がすなんて。"
901010800110-26 = "まさか……あのドラム缶にカニや人が入っているんじゃないわよね？"
901010800110-27 = "そうは見えないよ。"
901010800110-28 = "倉庫を出てからすぐに戻ってきたし――"
901010800110-29 = "ドラム缶の音が軽すぎる。中に何か入っていたらもっと重たい音がすると思うよ。"
901010800110-30 = "深夜のトレーニングじゃないなら、何か理由があるんだろうね。"
901010800110-32 = "FOX3、ターゲットを裏門方向へ誘導できるか？"
901010800110-33 = "任せて。鬼ごっこなら私の専門よ。"
901010800110-34 = "FOX4は現場の管制を、FOX2はターゲットの注意が逸れた隙に倉庫内部へ進入するように。"
901010800110-37 = "了解。"
901010800110-43 = "なんの音だ？"
901010800110-44 = "ネコとかカラスじゃない？"
901010800110-45 = "いや、足音が聞こえた気がする……。"
901010800110-46 = "確認しに行こう。"
