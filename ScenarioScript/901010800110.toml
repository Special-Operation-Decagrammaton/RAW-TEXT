901010800110-20 = "3;니코 아르바이트;02;여기는 FOX 2. 현재 포인트 위스키에서 대기 중.\n#3;em;[반응]\n#3;a"
901010800110-21 = "3;니코 아르바이트;01;지정 포인트를 벗어났던 탱고 2의 복귀를 확인. 그 외 특이 사항은 없어."
901010800110-22 = "#st;[0,0];instant;1;"
