901010800110-24 = "3;니코 아르바이트;00\n5;통신쿠루미;01\n#3;m1\n#5;a\n#3;h\n#5;h\n#wait;1200"
901010800110-25 = "5;통신쿠루미;02;……저 녀석들 뭐 하는 거야? 갑자기 밤 중에 드럼통을 굴리고 다니다니."
901010800110-26 = "5;통신쿠루미;04;설마, 저 드럼통 안에 게나 사람이 들어 있는 건 아니겠지?\n#5;stiff"
901010800110-27 = "3;니코 아르바이트;02;그렇게 보이지는 않는데.\n#3;em;…"
901010800110-28 = "3;니코 아르바이트;99;창고에서 나온 뒤 어디에도 들르지 않고 주변을 배회하다 곧장 돌아왔고—"
901010800110-29 = "3;니코 아르바이트;00;드럼통이 구르면서 내는 소리가 너무 가벼워. 안에 뭔가 들어 있었다면 더 요란하거나 묵직한 소리가 났을 거야."
901010800110-30 = "5;통신오토기;02;쓸데없이 한밤중에 체력 단련을 하려는 게 아니라면, 뭔가 꿍꿍이가 있는 거겠지."
901010800110-31 = "#all;hide"
901010800110-32 = "3;통신유키노;02;FOX 3, 목표를 후문 방향으로 유인할 수 있겠나?\n#3;em;[?]"
901010800110-33 = "3;통신쿠루미;02;맡겨만 줘. 술래 역할이라면 내 전문이지."
901010800110-34 = "3;통신유키노;00;FOX 4는 현장 관제를. 그리고 FOX 2는 목표의 주의가 흐트러진 틈을 타 창고 내부로 진입하도록."
