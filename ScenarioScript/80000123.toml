[translation]
80000123-1 = "การรายงานข่าวแสนหวาน"
80000123-2 = "ขอบคุณสำหรับวันนี้ค่า-!"
80000123-3 = "ขอขอบคุณที่ทำให้เราได้มีบทความพิเศษวันวาเลนไทน์ที่พิเศษและร้อนแรงนะคะ!"
80000123-4 = "[s] \"เหมือนครูจะเผลอพูดอะไรบางอย่างที่ไม่ควรไปเลยแฮะ...\""
80000123-5 = "โธ่เอ๊ย อย่าคิดมากเรื่องเล็กๆ น้อยๆ แบบนั้นเลยค่ะ~ เรื่องพวกนี้แหละที่จะทำให้บทความน่าสนใจขึ้น#nนะคะ"
80000123-6 = "งั้นฉันขอไปปั่นต้นฉบับก่อนนะคะ!"
80000123-10 = "อ๊ะ! พอคิดดูแล้วยังไงวันนี้ก็เป็นวันวาเลนไทน์ ฉันจะมาหาคุณครูมือเปล่าก็ยังไงๆ อยู่ ก็เลยเตรียมของ#nบางอย่างมาด้วยค่ะ!"
80000123-11 = "คุณครูอุตส่าห์สละเกียรติยศและอนาคตเพื่อบทความอันทรงคุณค่าให้กับนิตยสาร <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ทั้งที ก็ควรมีของตอบแทนด้วยสิคะ!"
80000123-12 = "[s] \"สิ่งที่ครูให้สัมภาษณ์ไปมันแย่เบอร์นั้นเลยเหรอ?!\""
80000123-13 = "มันเป็นคำพูดที่ดีต่างหากล่ะคะ! เอ๋ แต่มันอยู่ไหนนะ..."
80000123-14 = "อ๊ะ อยู่นี่ไง!"
80000123-18 = "แต่นแต๊น~ เป็นไงคะ?"
80000123-19 = "[s1] \"จะว่ายังไงดีล่ะ...\"\n[s2] \"อันนี้มันคืออะไรน่ะ?\""
80000123-22 = "เฮ้อ ฉันเสียใจนะคะ! นี่เป็น <แพนเดโมเนียม โซไซตี้รายสัปดาห์ ฉบับพิเศษ> สำหรับคุณครูเลยนะ!"
80000123-23 = "ปกติช็อกโกแลตพวกนี้จะต้องทำด้วยมือถึงจะมีความหมายใช่มั้ยล่ะ? เพราะงั้นฉันเลยเอาไอเดียมาทำ#nเป็นจุดสำคัญยังไงล่ะ"
80000123-24 = "รูปที่ถ่ายทอดภาพลักษณ์ออกมาได้ดีที่สุด นั่นละคือวิธีที่มีประสิทธิภาพที่สุดที่จะส่งมอบช็อกโกแลต#nให้อย่างดีที่สุดยังไงล่ะคะ"
80000123-25 = "[s] \"งั้นเหรอ...\""
80000123-29 = "[ns] \"แต่ช็อกโกแลตมันไม่เหมือนในรูปเลยนะ...?\""
80000123-30 = "ใช่แล้วค่ะ สายตาเฉียบแหลมสมกับเป็นแฟนนิตยสาร <แพนเดโมเนียม โซไซตี้รายสัปดาห์> จริงๆ เลยนะคะ!"
80000123-31 = "ถ้าจะถ่ายรูปช็อกโกแลตให้ได้สวยที่สุดละก็ จำเป็นต้องจัดฉากเยอะแยะเลยนะคะ"
80000123-32 = "ตัวอย่างเช่น เวลาจะถ่ายรูปซุปที่มีเครื่องตกแต่งจานสวยๆ อยู่ด้านบน จะต้องทำยังไงคะ?"
80000123-33 = "[s] \"ใส่เครื่องเยอะๆ ให้พูนๆ เหรอ?\""
80000123-34 = "แอ๊ดดด! ผิดแล้วค่ะ!"
80000123-35 = "ถ้าใส่เครื่องเยอะๆ แบบนั้น จะกลายเป็นว่าเครื่องจะจมเร็ว แล้วถ่ายรูปออกมาได้ไม่สวยเลยค่ะ"
80000123-36 = "เพราะงั้นเวลาจะถ่ายรูปจะต้องเอาถ้วยเล็กๆ ใส่ไว้ข้างในชามแล้ววางของตกแต่งลงไปอีกทีค่ะ!"
80000123-37 = "[s] \"ซ้อนถ้วยในถ้วยเหรอ...?\""
80000123-38 = "แต่ว่าถ้าเอาถ้วยเล็กข้างในออกก็กินซุปในถ้วยได้ตามปกตินะคะ!"
80000123-39 = "สิ่งสำคัญคือต้องรู้จักการจัดองค์ประกอบให้ดี ถึงจะถ่ายรูปออกมาได้สวยๆ ค่ะ!"
80000123-40 = "คราวนี้ฉันมัวแต่ยุ่งอยู่กับการหาจังหวะกดชัตเตอร์นานเกินไปหน่อย จนทำให้ช็อกโกแลตแข็งตัวเกิน#nไปนิดหนึ่ง แต่มันก็ช่วยไม่ได้นี่คะ"
80000123-41 = "[s] \"มันดูเรียลเกินกว่าจะเรียก 'ภาพข่าวที่มีชีวิตชีวา' ได้นะ...\""
80000123-42 = "ยังไงเราก็ได้รูปถ่ายที่เก็บภาพช็อกโกแลต แล้วก็ยังชิมรสชาติไปพร้อมๆ กันได้ด้วยแบบนี้ ก็ถือว่ายังเป็นเรื่องดีอยู่ไม่ใช่เหรอคะ?"
80000123-43 = "กินช็อกโกแลตไปดูภาพไป เดี๋ยวก็ได้ฟีลเองนั่นแหละค่ะ!"
80000123-44 = "[s] \"มันควรสลับกันไม่ใช่เหรอ?\""
80000123-46 = "(หลังจากนั้นคุณครูก็นั่งกินช็อกโกแลตและดูรูปถ่ายไปพลางๆ)"
80000123-47 = "(ถึงช็อกโกแลตจะมีรสชาติธรรมดา แต่คนให้อย่างจิอากิก็น่ารักมากทีเดียว)"
