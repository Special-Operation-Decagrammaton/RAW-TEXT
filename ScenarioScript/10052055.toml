[translation]
10052055-2 = "呼，總算是搞定了……"
10052055-3 = "……"
10052055-4 = "[s] 「有什麼在意的事嗎？」"
10052055-5 = "要說在意……也不至於。"
10052055-6 = "……有餘裕關心那些孩子的話，不如先擔心我們自己能不能平安吧。"
10052055-7 = "可是……"
10052055-8 = "老師。"
10052055-9 = "[s] 「嗯？」"
10052055-10 = "為什麼大家……都那麼急著要互相爭鬥呢。"
10052055-11 = "[ns] 「是因為有無法讓步的東西吧。」"
10052055-12 = "那種東西當然每個人都有……"
10052055-13 = "但是，在彼此都不清楚那究竟是什麼的情況下……"
10052055-17 = "……生命，真的會有能互相和解的一天嗎。"
10052055-18 = "[s] 「我希望能這麼相信。」"
10052055-19 = "意思是現在還沒完全相信呢。"
10052055-20 = "[s1] 「可以這麼說。」\n[s2] 「即便如此也是一樣。」"
