[translation]
10052055-2 = "ฮู่ว ยังไงก็สำเร็จจนได้นะคะ..."
10052055-3 = "..."
10052055-4 = "[s] \"มีอะไรกวนใจงั้นเหรอ?\""
10052055-5 = "ก็ไม่ถึงกับ... กวนใจหรอกค่ะ"
10052055-6 = "ถ้ามีเวลามาเป็นห่วงเด็กพวกนั้น ฉันว่าเราเอาเวลามาห่วงความปลอดภัยของพวกเราเองดีกว่าค่ะ..."
10052055-7 = "แต่ว่า..."
10052055-8 = "คุณครูคะ"
10052055-9 = "[s] \"หืม?\""
10052055-10 = "ทำไมทุกคนถึงเอาแต่จะทะเลาะกันล่ะคะ?"
10052055-11 = "[ns] \"คงเป็นเพราะมีบางอย่างที่ยอมให้กันไม่ได้น่ะ\""
10052055-12 = "ถ้าเป็นเรื่องแบบนั้น ก็คงมีกันทุกคนละค่ะ"
10052055-13 = "แต่นี่เป็นสถานการณ์ที่ทั้งสองฝ่ายก็ไม่รู้ด้วยซ้ำว่ามันคืออะไรนี่คะ"
10052055-17 = "สิ่งมีชีวิต... จะหันมาคืนดีกันได้ในที่สุดมั้ยคะ?"
10052055-18 = "[s] \"ครูอยากเชื่อแบบนั้นนะ\""
10052055-19 = "หมายความว่าตอนนี้คุณครูยังไม่ได้ปักใจเชื่อมากขนาดนั้นสินะคะ"
10052055-20 = "[s1] \"จะมองอย่างนั้นก็ได้ แต่ถึงยังไงก็...\"\n[s2] \"จะว่าอย่างนั้นก็ได้ แต่ถึงยังไงก็...\""
