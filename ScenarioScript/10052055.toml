[translation]
10052055-2 = "We did it...somehow."
10052055-3 = "..."
10052055-4 = "[s] \"Is something bothering you?\""
10052055-5 = "I wouldn't say \"bothered\"..."
10052055-6 = "...Right now, I don't have room to be bothered by anything other than our own safety."
10052055-7 = "But still..."
10052055-8 = "You know, Sensei..."
10052055-9 = "[s] \"Hm?\""
10052055-10 = "Why...are we all so eager to fight each other?"
10052055-11 = "[ns] \"Conflicts arise when compromise fails.\""
10052055-12 = "Everyone has principles they can't compromise. I know that."
10052055-13 = "But I feel like this is a case where neither side truly knows what their principles even are."
10052055-17 = "...I wonder if life, if people, will ever be able to compromise. Could they ever reconcile?"
10052055-18 = "[s] \"I'd like to believe so.\""
10052055-19 = "\"Like to.\" So even you aren't sure."
10052055-20 = "[s1] \"You could say that.\"\n[s2] \"But even so...\""
