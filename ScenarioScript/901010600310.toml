[translation]
901010600310-8 = "こんにちは！港の正門で警備を担当していた方ですよね？"
901010600310-12 = "……。"
901010600310-13 = "今日は蒸し暑いですね。"
901010600310-14 = "こんな日に一日中立ち仕事なんて……私でも疲れちゃいます。"
901010600310-15 = "……ちっ。"
901010600310-16 = "SNSでこのロゴを見たことはありますか？"
901010600310-17 = "もしお時間よろしければ、FOX EATSの新規キャンペーンについて簡単に――"
901010600310-21 = "うるさい！興味ねぇから、とっとと失せろ。"
901010600310-22 = "あ……はい。失礼しました。"
901010600310-23 = "（どうしよう？話を聞いてくれそうには見えないけど）"
901010600310-28 = "FOX2、大丈夫？"
901010600310-29 = "なんか怒鳴られてたように見えたけど。"
901010600310-33 = "大丈夫だよ。ちょっと軽く考えすぎてただけ。"
901010600310-34 = "でもどうしよう……話し合いができなさそうだけど。"
901010600310-35 = "あの人たち、失踪した漁師について知っていそうなんだけど……#n何かいい方法はないかな？"
901010600310-37 = "一旦、「カルパッチョ・ファミリー」に直接話しかけるのはやめにしよう。"
901010600310-38 = "彼らと関わりのある商人なら、何か知っているかもしれない。"
901010600310-39 = "FOX2、残り時間は港でカルパッチョ・ファミリーの評判について調査するように。"
901010600310-40 = "その後、全員HQに復帰する。"
901010600310-41 = "了解！"
