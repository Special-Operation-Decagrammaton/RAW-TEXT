901010800360-6 = "3;유키노;00\n#3;a\n#wait;1000"
901010800360-7 = "3;유키노;02;그럼, 지금까지 추론한 내용을 정리하면……\n#3;em;…"
901010800360-8 = "3;유키노;00;<카르파초 패밀리는 게 드럼통 소문을 확산시키기 위해 고의로 드럼통을 굴리고 대량의 게를 사들였다.>"
901010800360-9 = "3;유키노;99;<카르파초 패밀리는 재계약을 앞두고 금전적인 부담을 느끼고 있다.>"
901010800360-10 = "3;유키노;00;아무래도 ‘드럼통 속의 게’ 소문이 퍼지는 데에는 카르파초 패밀리가 깊게 관여하고 있었던 것 같군."
901010800360-11 = "3;니코;05;맞아. 카르파초 패밀리는 불필요한 지출을 감수하면서까지 소문의 해상도를 높이기 위해 여러 방향으로 손을 쓰고 있었어.\n#3;em;[반응]"
901010800360-12 = "1;오토기;02;그리고 그 이유는 카르파초 패밀리의 이권—특히 용역 재계약에 도움이 될 가능성이 높다는 거지.\n#1;ar\n#3;m5"
901010800360-13 = "3;니코;00;응. ‘사람을 잔혹하게 다루는 조직’이라는 소문은 보통 부정적인 인상을 주지만, 불량한 일을 자주 저지르는 주먹패에게는 오히려 긍정적으로 작용할 수도 있으니까."
901010800360-14 = "3;니코;99;게다가 카네사키 항구의 용역 외주처럼 경매를 통해 입찰자를 선정할 때는 경쟁자가 적을수록 유리하겠지."
901010800360-15 = "3;니코;00;아무리 이번 안건이 매력적이라 하더라도, 게를 이용한 고문을 일삼는 조직에게 미운털이 박히고 싶지는 않을 거 아냐?\n#3;m3\n#1;dl"
901010800360-16 = "3;니코;02;게다가 실제로 그런 일은 존재하지도 않았으니, 발키리를 적으로 돌릴 필요도 없겠지."
901010800360-17 = "[s1] \"확실히 일리는 있지만……\"\n[s2] \"만약 상대가 잡아떼면 어쩌지?\""
