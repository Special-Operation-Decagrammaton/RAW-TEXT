[translation]
901010800360-7 = "では、今まで話した内容を整理すると……。"
901010800360-8 = "「カルパッチョ・ファミリーは、ドラム缶ガニの噂を広めるべく、わざとドラム缶を転がし、カニを大量に購入していた」"
901010800360-9 = "「カルパッチョ・ファミリーは再契約を目前に、金銭的負担を抱えていた」"
901010800360-10 = "どうやら「ドラム缶ガニ」の噂が広まった背景には、カルパッチョ・ファミリーが深く関わっているようですね。"
901010800360-11 = "うん。カルパッチョ・ファミリーは不必要な支出をしてまで、噂の解像度を高めようと、あらゆる手段を使っていた。"
901010800360-12 = "そしてその理由は、カルパッチョ・ファミリーの利権――特に、再契約において有利になる可能性が高いからだね。"
901010800360-13 = "うん。「人使いが荒い組織」という噂は、ネガティブな印象を与えるけど、不良集団にはむしろポジティブになることもあるからね。"
901010800360-14 = "それに、鐘崎港の業務委託のように、競売で入札者を選ぶ場合、競争者が少ないほど有利になる。"
901010800360-15 = "いくら魅力的な案件でも、カニを使って人を虐げる組織の反感を買うのは避けたいでしょう？"
901010800360-16 = "それに、実際そういうことは起きてないから、ヴァルキューレから目をつけられることもない。"
901010800360-17 = "[s1] \"たしかに、一理あると思うけど……。\"\n[s2] \"もし相手がシラを切ったらどうする？\""
901010800360-20 = "たしかに、ただお金をドブに捨てたかっただけって言い切られたら、追及することもできないねぇ。"
901010800360-21 = "証拠はあっても、動機ばっかりは主観だものね……。"
901010800360-23 = "その点に関しては、ご心配なく。"
901010800360-24 = "証拠で証明できない部分は、当事者に[ruby=・]直[/ruby][ruby=・]接[/ruby]確認すればいいんです。"
901010800360-25 = "[s] \"直接……？\""
