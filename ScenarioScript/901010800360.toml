901010800360-20 = "4;쿠루미;01\n2;오토기;00;확실히 그냥 돈을 낭비하고 싶었을 뿐이라며 뻔뻔하게 잡아떼면, 추궁할 방법이 없긴 하네.\n#2;em;…"
901010800360-21 = "4;쿠루미;02;증거는 확실해도 동기는 심증의 영역에 불과하니까……"
