[translation]
901010400430-7 = "港で聞いたカニの漁獲量と価格について整理すると……。"
901010400430-8 = "小売店で販売しているカニの値段は大きく変わってないけど、産地ではカニの漁獲量が増えて卸値は大幅に下がっているみたい。"
901010400430-9 = "漁に出る回数を減らそうと思ってる漁師もいたよ。"
901010400430-10 = "どういうこと？ちょっと理解できないんだけど……。"
901010400430-11 = "カニの値段が下がったなら、1匹でも多く売って、利益を出すべきじゃないの？"
901010400430-12 = "FOX3、何も分かってないんだねぇ。"
901010400430-16 = "水産物はすぐに鮮度が落ちちゃうんだよ。それに急に需要が上がることもない。#nだから、量が多くなると逆に損しちゃうんだ。"
901010400430-17 = "むやみに値下げしても、単価が下がったら元も子もないからね。"
901010400430-18 = "あっそう。あんたは物知りなのね。"
901010400430-20 = "つまり、カニの価格変動で漁師が困っている、と。"
901010400430-21 = "これに加え「ドラム缶ガニ」の噂も相まって、民衆はますますカニを遠ざけるだろう。"
901010400430-22 = "というか、こんな噂を広めてどうするのよ？#nカニの値段とどう関係あるの？"
901010400430-30 = "というか、こんな噂を広めてどうするのよ？カニの値段とどう関係あるの？\n[as1] 価格が下がったら、利益を得られる人だろうね。\n[as2] 価格が上がったら、利益を得られる人だろうね。\n[as3] 価格とは関係ない人なんじゃない。"
901010400430-31 = "それさっきも言わなかったっけ？#nカニを安く買い叩きたい商人が広めた話かもって。"
901010400430-32 = "もちろん、原価が安くなったら、差額分の利益は出るけど……。"
901010400430-33 = "この噂だと、カニの価格どころか需要そのものを減少させちゃってる。#n長期的に見たら損だよ。"
901010400430-34 = "それに、漁に出る回数を減らそうとしているのなら、これ以上価格が下がることはないはずだ。"
901010400430-35 = "うーん……そうかな。"
901010400430-36 = "先生、本当にそう思うの？"
901010400430-43 = "いや、この噂のせいで下がるかもしれないのに、どうしてそんな結論になるの？"
901010400430-44 = "先生……もしかして、さっき私たちが話してるとき寝てた？"
901010400430-45 = "もっと真面目に考えて。"
901010400430-55 = "カニの価格とは関係ない人……？なんで？"
901010400430-56 = "……私も同意見です。"
901010400430-57 = "カニの卸値が継続的に下がっている状況で、需要に影響が出るリスクを承知のうえで悪い噂を広めたということは――"
901010400430-58 = "犯人はカニの価格とは無関係な人だということになります。第三者である可能性が高い。"
901010400430-59 = "どんどん謎めいてきたわね。別に利益を得ているわけでもないのに、カニに関する悪い噂を流すって何よ。"
901010400430-60 = "……最初怪談を広めた人には、アレルギーがあったとか？"
901010400430-61 = "昔、カニが入った食べ物で痛い目に遭ってから、産業全体に恨みを抱くようになったとか。"
901010400430-62 = "いくらなんでも適当すぎない？"
