10050010-22 = "3;트리니티 학생;01\n#3;a\n#wait;1000"
10050010-23 = "3;트리니티 학생;03;어머나? 평안하신가요. 처음 뵙는 분들 같은데, 누구시죠?\n#3;em;[반응]"
10050010-24 = "1;야쿠모;02\n5;타카네;14;어, 어떻게 하죠. 부장님?!\n#3;hide\n#5;stiff\n#fontsize;50"
10050010-25 = "1;야쿠모;08;…….\n#1;em;[전구]"
10050010-26 = "1;야쿠모;03;안녕하십니까! 이야~ 이것도 인연이라고 할 수 있는 걸까요. 우리는 붉은겨울 연방학원에서 온…… 그렇네요! 트리니티를 견학하러 온 학생들입니다!\n#1;m2"
10050010-27 = "5;타카네;15;그, 그렇게 대놓고 이야기해도 되는 걸까요?!\n#5;em;[!]\n#5;m4\n#fontsize;50"
10050010-28 = "1;야쿠모;07;냉정해져요. 타카네. 기껏해야 최악의 경우라고 해도 추방밖에 더 당하겠어요?\n#fontsize;50"
10050010-29 = "1;야쿠모;08;오히려 무언가를 숨기는 척하다가, 더 큰 오해를 사는 게 진짜 문제라고요.\n#fontsize;50"
10050010-30 = "3;트리니티 학생;08;붉은겨울! 그렇군요. 정말로 반가워요. 트리니티에 잘 오셨습니다. 이야기는…… 네. 약간 전해 들었어요. \n#1;hide\n#5;hide\n#3;em;[반짝]"
10050010-31 = "3;트리니티 학생;03;언제나 극한의 추위 속에서 곰과 싸우며, 신체를 극한까지 단련하는 분들이라면서요?"
10050010-32 = "2;야쿠모;09\n4;타카네;17;우리, 그런 식으로 안 지내는데요…….\n#3;hide\n#4;em;[땀]\n#fontsize;50"
10050010-33 = "2;야쿠모;07;그런가 보다 합시다. 말 맞춰요, 말.\n#fontsize;50"
10050010-34 = "4;타카네;04;네, 네에! 그보다 저희는, 이렇게 말도 없이 트리니티 종합학원에, 어떻게 보면 무례를 무릅쓰고 들어온 것이나 다름없는데…….\n#4;m3\n#2;dl\n#4;jump"
10050010-35 = "4;타카네;17;괜찮으신, 걸까요……?\n#2;hide\n#4;em;[?]"
10050010-36 = "3;트리니티 학생;03;어머나. 무슨 말씀을. 괜찮답니다. 얼마든지 편하게 계시다 가셔요.\n#4;hide"
10050010-37 = "3;트리니티 학생;04;물론 트리니티 종합학원이 조금 폐쇄적인 면이 있다는 소문이 있고, 그 소문의 어떤 부분은 사실이기도 했지만…….\n#3;em;[땀]\n#3;stiff"
10050010-38 = "3;트리니티 학생;00;저희도 늘 그런 것은 아니랍니다. 가능한 한 변화하려 하고 있죠."
10050010-39 = "3;트리니티 학생;03;오히려 3대 학원의 한 축으로서, 더욱 많은 외부 학생분에게 친절해지려 노력하고 있으니까요."
10050010-40 = "5;야쿠모;10;안내 감사합니다! 그런데 혹시, 책이나 이야기 같은 거 좋아하시는지요?\n#3;m1\n#5;al\n#5;em;[반응]"
10050010-41 = "3;트리니티 학생;02;책 말씀이신가요? 네. 취미 정도로 가끔 읽기도 하고, 익숙하답니다. 채플 시간에도 경전을 읽어야 하고 말이죠."
10050010-42 = "3;트리니티 학생;00;무엇보다 키보토스에서 출판되는 웬만한 책은, 트리니티 중앙 도서관에도 배치되어 있으니까요."
10050010-43 = "5;야쿠모;03;그거 정말 듣던 중 반가운 말씀이로군요! 그런 의미에서 저희가 조금…… 특별할 수도 있는 책을 가져와 봤는데 말이에요.\n#5;em;[음표]"
