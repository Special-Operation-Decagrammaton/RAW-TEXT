10050010-63 = "2;야쿠모;04;어떻게 된 거냐니, 오히려 그건 내가 묻고 싶은 말인데요……."
10050010-64 = "4;타카네;17\n2;야쿠모;01;일단 깨워서 다시 말을 걸도록 하죠. 자, 여기 캄포트 조금 드셔 보세요. 227호 특제랍니다.\n#2;greeting"
