10050010-8 = "5;타카네;17;이거 이래도 되나요, 트리니티……?\n#5;em;[땀]"
10050010-9 = "1;야쿠모;04;화, 확실히 이건 예상 밖이네요. 이렇게 타 학교 자치구에 아무 제재도 없이 들어올 수 있다니…….\n#1;stiff"
10050010-10 = "1;야쿠모;09;흐음. 여차하면 검문, 감시, 뇌물에 이은 탈출과 암약까지도 생각하고 있었는데 말이죠."
10050010-11 = "5;타카네;04;……그런 뒤숭숭한 걸 생각하고 있었나요, 부장님……?"
10050010-12 = "1;야쿠모;03;무슨 말씀을. 계획을 세울 때는, 항상 최악의 가능성을 고려해 봐야 하는 법이라고요?\n#1;em;[음표]"
10050010-13 = "5;타카네;06;원칙적으로는 동의 드리는 바인데요…….\n#5;stiff"
10050010-14 = "5;타카네;11;아무튼, 너무 아무렇지도 않게 들어올 수 있어서, 이게 현실인가 하는 생각마저 들 정도네요."
10050010-15 = "1;야쿠모;04;현실이든 아니든 우리는 이 재고를 처리…… 판매해야 해요.\n#1;m3\n#5;dr\n#1;em;[한숨]"
