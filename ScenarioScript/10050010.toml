10050010-85 = "2;야쿠모;08\n4;타카네;01;……조금 전에, 검열했다고 말씀하시지 않았나요. 부장님?\n#3;hide\n#4;em;[?]"
10050010-86 = "2;야쿠모;09;편집입니다."
10050010-87 = "4;타카네;02;하지만……."
10050010-88 = "2;야쿠모;04;뭐, 엄밀히 따지자면 검열 비슷한 걸 하기는 했지만, 어쩌겠어요. 사무국에서 하라는데.\n#2;em;[한숨]"
10050010-89 = "2;야쿠모;11;하지만 알아 두세요, 타카네! 물건을 팔려면…… 검열이라는 사항까지 이용할 줄 알아야 하는 법이라는 걸!\n#2;jump"
10050010-90 = "4;타카네;17;즉, 검열을 빌미로 적당한 부분을 편집해서, 오히려 상품성을 극대화했다는 말씀이신가요……?"
10050010-91 = "2;야쿠모;09;바로 그겁니다. 위에는 지시대로 검열을 이행했다고 둘러댈 수 있고!\n#2;em;[음표]\n#2;m3\n#4;dr"
10050010-92 = "2;야쿠모;07;상품을 소비하는 입장에서는 오히려 만족스러운 결과물을 얻을 가능성도 있죠!"
10050010-93 = "2;야쿠모;03;바로 여기, 이 트리니티 학생분이 그 증거입니다!\n#2;em;[!]\n#2;closeup"
