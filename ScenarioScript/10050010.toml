10050010-72 = "2;야쿠모;03;그런가요? 그렇겠지요! 하지만 그렇다고 해서 크게 문제가 될 부분은 없을 겁니다!\n#2;m3\n#4;dr"
10050010-73 = "2;야쿠모;11;제일 중요한 부분들은 묘사되지 않았을 테니까요! 당연할 겁니다! 왜냐하면 제가 전부 검열…… 편집했으니까요!\n#4;hide"
10050010-74 = "1;트리니티 학생;02;그, 그건 맞는 말 같긴 했는데요.\n#1;ar\n#2;m5"
10050010-75 = "1;트리니티 학생;04;저기, 그래서 오히려 더……. 강하게, 느껴지는 부분이 있다고나, 할까요…….\n#1;stiff\n#1;em;[///]"
