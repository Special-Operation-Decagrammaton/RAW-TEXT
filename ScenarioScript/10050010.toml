10050010-77 = "3;타카네;17;(손님……?)\n#1;hide\n#2;hide\n#3;em;[땀]"
10050010-78 = "3;야쿠모;03;원래 말이죠. 이런 것은, 이른바 적당히 가리는 것이 더 중요한 법이니까요."
10050010-79 = "3;야쿠모;09;……창작자란 분들은, 자주 폭주하는 나머지, 그만 끝까지 가 버리는 경향이 있기는 합니다만……. 그거야말로 하나만 알고 둘은 모르는 행위라고요!\n#3;em;[!]\n#3;jump"
10050010-80 = "3;야쿠모;11;문화 매체에서 가장 중요한 것은, 상상의 여지를 남겨 두는 것이니까요!\n#3;closeup"
10050010-81 = "3;트리니티 학생;07;그, 그런가요?!\n#3;shake\n#3;em;[?!]"
10050010-82 = "3;야쿠모;08;네. 왜냐하면 사람의 상상력에는 한계가 없기 때문이죠. 바로 그렇기 때문에! 상상력의 수위는 한도가 없는 법!"
10050010-83 = "3;야쿠모;03;상상의 여지를 적당히 남겨 주면 남겨 주는 만큼! 그 수위 역시 스스로 한계를 뚫고 돌파하기 마련입니다!"
