10050010-100 = "3;트리니티 학생;02;저, 저기. 그래서 말인데요……. 다음 권, 없을까요……?"
10050010-101 = "5;야쿠모;03;있고 말고요! 얼마든지 있답니다, 손님! 그리고 혹시 마음에 드신다면 주위 분들에게 조심스럽게 권유해 보는 것도 어떠실까 하는데요!\n#3;m1\n#5;al"
