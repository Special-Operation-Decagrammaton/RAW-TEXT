[translation]
1013305-1 = "思考實驗"
1013305-2 = "（準時前往了莉央所在的機庫）"
1013305-6 = "啊，你來啦。"
1013305-7 = "我正在更新AMAS的AI演算法。"
1013305-8 = "因為從這裡獲得的情報之中，有很多陌生的東西……"
1013305-9 = "所以得像這樣更新相關數據，才能正確地處理那些資訊。"
1013305-14 = "[ns] 「哦，動了。」"
1013305-16 = "嗯，不過這樣還不算結束。"
1013305-17 = "必須驗證它是否有正確認識新增的數據才行。"
1013305-18 = "這就是只能執行固定指令的弱人工智慧的局限吧。"
1013305-19 = "[s] 「弱人工智慧？」"
1013305-20 = "指的是按照特定規則執行固定任務的AI。"
1013305-21 = "它們各自擁有專業領域，能在該領域中展現超越人類的卓越性能。"
1013305-22 = "但是……因為是基於學習過的數據運作，所以無法像人類一樣進行創造性思考。"
1013305-23 = "反之，也存在能像人類一樣自由進行創造性思考的AI。"
1013305-24 = "我們稱這種AI為強人工智慧。"
1013305-25 = "比如愛麗絲的情況……就屬於這一類。"
1013305-26 = "……雖然現在有所不同，不過我以前認為AI是沒有自我的。"
1013305-27 = "就像「陌生語言房間實驗」一樣，只是在模仿智慧的行為而已。"
1013305-28 = "[s1] 「模仿智慧……」\n[s2] 「具體來說是什麼樣的實驗呢？」"
1013305-31 = "假設有一種老師完全不懂的語言，#n並且在某個房間中，記載著那種語言所有的問題和答案。"
1013305-32 = "如果老師進入那個房間，就會像在欣賞「圖畫」一樣，#n知道這個「[ruby=問題]圖畫[/ruby]」對應那種形狀的「[ruby=答案]圖畫[/ruby]」。"
1013305-33 = "接著，我會把房間裡的其中一個問題寫在紙上給你。"
1013305-34 = "這時如果老師看著問題紙的「[ruby=問題]圖畫[/ruby]」，#n把房間裡適當的「[ruby=答案]圖畫[/ruby]」寫給我的話……"
1013305-35 = "即使老師完全不懂那種語言，也能透過筆談進行對話的情況就產生了。"
1013305-36 = "既然對話能順利成立，外部的觀察者就會認為老師能夠理解那種語言。"
1013305-37 = "然而老師實際上只是在看見圖畫後，選擇了適當的圖畫而已。"
1013305-38 = "也就是說，你只是在按照規則回答問題，而不是真正理解了那種語言。"
1013305-39 = "將這個領域擴大討論……"
1013305-40 = "如果強人工智慧也是按照這種系統運作的話──"
1013305-41 = "我們真的能說它擁有自我嗎？"
1013305-42 = "[s] 「是個困難的問題呢。」"
1013305-43 = "所以……我才會一直認為AI並不存在自我。"
1013305-44 = "只是在模仿人類的機器而已。"
1013305-45 = "認定那樣才是合理的。"
1013305-49 = "……直到遇見愛麗絲為止。"
1013305-50 = "我無法理解，像愛麗絲那樣的孩子究竟是如何誕生的。"
1013305-51 = "所以……才會因此感到害怕吧。"
1013305-52 = "就像面對未知領域所產生的恐懼一樣。"
1013305-53 = "不過……那種事其實只要接受它就行了。"
1013305-54 = "就像每個人的個性各不相同，只要把那理解成愛麗絲的個性就好。"
1013305-55 = "邏輯思考固然重要，但不是所有事情都需要用邏輯來思考。"
1013305-56 = "因為現實並不是思考實驗啊。"
1013305-57 = "[s] 「哦哦，我們莉央成長了呢！」"
1013305-58 = "……這只是個開始而已。"
1013305-59 = "所以……以後也請你多多指教了。"
1013305-60 = "我打算要繼續成長。#n從這個意義上來說……"
1013305-61 = "家事幫手前衛君的量產計畫，也得加緊腳步才行。"
1013305-62 = "[s] 「我，我會支持你的……」"
1013305-64 = "（之後繼續和莉央聊天，同時進行AMAS的更新作業）"
1013305-68 = "（不久之後……）"
1013305-73 = "這樣今天預定的作業就結束了。"
1013305-74 = "比想像中還早結束呢。#n這都是多虧了老師的幫忙。"
1013305-75 = "[s] 「我只是擔任你的聊天對象而已哦。」"
1013305-76 = "光是那樣就足以提升效率了。"
1013305-77 = "既然因此有了一些空閒時間……"
1013305-78 = "剛才提過的「陌生語言房間實驗」，要不要一起試試看呢？"
1013305-79 = "雖然我並不認為那個實驗完全正確，不過實驗本身還挺有趣的。"
1013305-80 = "要在這裡準備房間實在有點困難，所以就用解答表和卡片的方式來代替吧。"
1013305-81 = "我以前就想過可能會有這種機會，因此已經事先準備好了。"
1013305-82 = "[s3] （看來他從以前就很想嘗試了啊……）\n[s4] 「嗯，一起做吧！」"
1013305-88 = "那麼，我接下來會給你各種看起來像文字的圖畫卡片。"
1013305-89 = "老師只要看著答案卡，像配對圖畫一樣選擇適合的卡片給我就行了。"
1013305-90 = "我們開始吧。"
1013305-95 = "（於是就像莉央說的一樣，收到了好幾張寫著各種圖形或文字的卡片）"
1013305-96 = "（接著又拿到了同樣不知道寫了什麼的解答表和問題卡片）"
1013305-97 = "（雖然都是看不懂的圖形文字，還是盡量看著解答表選擇了看起來適合的卡片）"
1013305-98 = "（至於那是不是正確答案，實在沒有把握……）"
1013305-101 = "……老，老師！？#n這個意思是，難道老師你……！"
1013305-102 = "沒，沒什麼。#n這終究只是個實驗而已。"
1013305-106 = "嗯……？"
1013305-107 = "……"
1013305-108 = "……真可惜。如果這是老師的真心就好了。"
1013305-109 = "嗯？問我是什麼意思？"
1013305-110 = "……"
1013305-111 = "請，請不要讓我說那種話。"
1013305-112 = "[s] 「對，對不起，你別生氣……」"
1013305-113 = "我倒也……沒有生氣……"
1013305-114 = "……抱歉。我們繼續吧？"
1013305-116 = "（按照莉央說的，繼續進行「實驗」）"
1013305-123 = "呵呵，是呢。我也同意。"
1013305-127 = "哼嗯……原來老師有那樣的一面啊。#n是個意料之外的資訊呢。"
1013305-132 = "這，這樣不會有點太大膽了嗎……？"
1013305-136 = "如果老師願意的話……我也不是不能接受……"
1013305-138 = "（隨著實驗繼續，又進行了大約十個問答）"
1013305-144 = "（而莉央在過程中……展現出了非常豐富的反應）"
1013305-146 = "辛苦了，老師。"
1013305-147 = "嗯？想知道那些是什麼樣的問題跟回答是嗎？"
1013305-148 = "……"
1013305-149 = "…………"
1013305-155 = "………………"
1013305-156 = "還請容我拒絕。"
1013305-157 = "[s5] 「為什麼！？」\n[s6] 「我明明是當事人耶！？」"
1013305-160 = "話是這麼說沒錯……"
1013305-161 = "……"
1013305-162 = "願望是要藏在心裡的。#n直到老師用卡片回答的事情成為現實之前──"
1013305-163 = "我想盡可能把一切都保密。"
