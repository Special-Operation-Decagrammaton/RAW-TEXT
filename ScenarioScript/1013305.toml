1013305-17 = "3;리오 결전;02;추가된 데이터를 잘 인지하고 있는지 검증하는 작업도 거쳐야 해."
1013305-18 = "3;리오 결전;09;정해진 명령만 수행하는 약인공지능의 한계라고 할까."
1013305-19 = "[s] \"약인공지능?\""
1013305-20 = "3;리오 결전;01;특정 규칙에 따라 정해진 작업을 수행하는 AI를 말해."
1013305-21 = "3;리오 결전;02;각자 전문화된 분야가 있고, 그 분야에서는 인간을 뛰어넘는 월등한 성능을 보이지."
1013305-22 = "3;리오 결전;09;하지만…… 학습된 데이터를 기반으로 작동하기에, 인간과 같은 창의적인 사고는 하지 못해.\n#3;em;[반응]"
1013305-23 = "3;리오 결전;05;반면 인간 같은 자유롭고 창의적인 사고를 할 수 있는 AI들도 존재하지."
1013305-24 = "3;리오 결전;02;우린 그러한 AI를 강인공지능이라 불러."
1013305-25 = "3;리오 결전;99;아리스 같은 경우가…… 이에 해당하지."
1013305-26 = "3;리오 결전;09;……지금은 아니지만, 예전엔 AI에는 자아가 없다고 생각했어.\n#3;em;…"
1013305-27 = "3;리오 결전;01;<낯선 언어 방 실험>처럼, 그저 지능을 모방한 행동을 하고 있다고 말이야."
1013305-28 = "[s1] \"지능을 모방했다니…….\"\n[s2] \"구체적으로 어떤 실험인데?\""
1013305-29 = "#wait;10"
1013305-30 = "#wait;10"
1013305-31 = "3;리오 결전;02;선생이 전혀 모르는 언어가 있고, #n여기 그 언어의 모든 질문과 답변이 적힌 방이 있다고 가정해 보자."
1013305-32 = "3;리오 결전;01;선생이 그 방에 들어간다면, 마치 <그림>을 보듯이 이 <[ruby=질문]그림[/ruby]>엔 이런 모양의 <[ruby=답변]그림[/ruby]>이 나온다는 사실을 알겠지."
1013305-33 = "3;리오 결전;01;이제 내가 선생에게 그 방에 있는 여러 질문 중 하나를 종이에 써서 줄 거야."
1013305-34 = "3;리오 결전;02;이때 선생이 질문지의 <[ruby=질문]그림[/ruby]>을 보고 방에 있는 적절한 <[ruby=답변]그림[/ruby]>을 나에게 써준다면……."
1013305-35 = "3;리오 결전;01;선생이 언어를 전혀 모르는 상태에서도 필담을 통해 대화가 되는 상황이 만들어져."
1013305-36 = "3;리오 결전;99;대화가 이루어지니, 그 모습을 보는 외부인은 선생이 언어를 이해한다고 생각할 거야."
1013305-37 = "3;리오 결전;09;하지만 선생은 그저 그림을 보고 적절한 그림을 제시했을 뿐이야."
1013305-38 = "3;리오 결전;01;즉 규칙에 따라 대답하고 있을 뿐, 언어를 이해하고 있는 것은 아니라는 거야."
1013305-39 = "3;리오 결전;99;이 영역을 좀 더 크게 확장한다면."
1013305-40 = "3;리오 결전;01;그리고 강인공지능도 그런 시스템을 따르고 있는 것이라면."
1013305-41 = "3;리오 결전;02;그것에 자아가 있다고 해도 되는 걸까?\n#3;em;[?]"
1013305-42 = "[s] \"어려운 질문이네.\""
