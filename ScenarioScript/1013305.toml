[translation]
1013305-1 = "การทดลองทางความคิด"
1013305-2 = "(คุณครูไปที่โรงเก็บยานที่ริโอะอยู่ให้ตรงเวลา)"
1013305-6 = "อ๊ะ มาแล้วสินะ"
1013305-7 = "ฉันกำลังอัปเดตอัลกอริทึม AI ของ AMAS อยู่พอดี"
1013305-8 = "จากข้อมูลทั้งหมดที่ได้จากที่นี่ มีหลายอย่างที่ฉันยังไม่คุ้นเคย..."
1013305-9 = "ฉันก็เลยต้องคอยอัปเดตข้อมูล จะได้มีการประมวลผลข้อมูลอย่างถูกต้อง"
1013305-14 = "[ns] \"โอ๊ะ ขยับแล้ว\""
1013305-16 = "อื้อ แต่ยังไม่เสร็จแค่นี้หรอก"
1013305-17 = "ฉันต้องตรวจสอบด้วยว่าระบบรับทราบข้อมูลที่เพิ่มเข้ามาใหม่หรือเปล่า"
1013305-18 = "จะบอกว่านี่เป็นข้อจำกัดของ Weak AI ที่ทำตามแค่คำสั่งที่ตั้งไว้ก็ได้"
1013305-19 = "[s] \"Weak AI เหรอ?\""
1013305-20 = "หมายถึง AI ที่ทำงานตามกฏเกณฑ์ที่กำหนดไว้น่ะ"
1013305-21 = "Weak AI จะมีความเชี่ยวชาญเฉพาะด้าน โดยจะแสดงผลงานที่โดดเด่นเหนือกว่ามนุษย์ทั่วไปใน#nด้านนั้นออกมา"
1013305-22 = "แต่ถึงยังไง... พอมันทำงานโดยอาศัยข้อมูลที่ได้เรียนรู้มา ก็เลยคิดสร้างสรรค์เองอย่างมนุษย์ไม่ได้"
1013305-23 = "แต่ในทางกลับกัน ก็ยังมี AI ที่มีความสามารถในการคิดอย่างอิสระและสร้างสรรค์ได้เหมือนมนุษย์"
1013305-24 = "และเราก็เรียก AI ประเภทนี้ว่า Strong AI"
1013305-25 = "ในกรณีของอาริสึ... จัดว่าอยู่ในประเภทนี้"
1013305-26 = "ถึงตอนนี้ฉันจะไม่ได้คิดแบบนั้นแล้ว... แต่เมื่อก่อนฉันเคยคิดว่า AI ไม่มีความคิดเป็นของตัวเอง"
1013305-27 = "คิดว่ามันก็แค่เลียนแบบสติปัญญา เหมือนกับ <การทดลองห้องภาษาที่ไม่คุ้นเคย> น่ะ"
1013305-28 = "[s1] \"เลียนแบบสติปัญญา... ยังไงเหรอ?\"\n[s2] \"เป็นการทดลองแบบไหนเหรอ?\""
1013305-31 = "ลองสมมติว่ามีภาษาหนึ่งที่ครูไม่รู้จักเลย และห้องนี้ก็เป็นห้องที่รวบรวมคำถามและคำตอบทั้งหมด#nเกี่ยวกับภาษานั้นไว้นะ "
1013305-32 = "ถ้าครูเข้าไปในห้องนั้น ก็จะได้เห็น<[ruby=คำถาม]ภาพ[/ruby]>ที่ต่อไปก็จะได้รู้ว่าเกี่ยวข้องกับ<[ruby=คำตอบ]ภาพ[/ruby]>อะไร"
1013305-33 = "ต่อไปฉันจะเขียนคำถามข้อหนึ่งใส่กระดาษ แล้วยื่นให้ครูที่อยู่ในห้องนั้น"
1013305-34 = "แล้วทีนี้ครูก็จะดู<[ruby=คำถาม]ภาพ[/ruby]>ในกระดาษคำถาม แล้วเขียน<[ruby=คำตอบ]ภาพ[/ruby]>ที่เหมาะสมที่อยู่ในห้องให้ฉัน..."
1013305-35 = "จากกระบวนการนี้ ก็จะเกิดเป็นสถานการณ์ที่ครูสามารถเขียนสนทนาโต้ตอบได้ แม้จะไม่รู้ภาษานั้นเลยสักนิดก็ตาม"
1013305-36 = "และเมื่อมีการสนทนาเกิดขึ้น ผู้สังเกตการณ์ที่อยู่ข้างนอกก็จะคิดว่าครูเข้าใจภาษานั้น"
1013305-37 = "แต่ครูเพียงแค่ดูภาพ แล้วเลือกภาพที่เหมาะสมกลับมาให้"
1013305-38 = "พูดอีกอย่างก็คือ ครูก็แค่ให้คำตอบตามกฎ แต่ไม่ได้เข้าใจภาษานั้นจริงๆ"
1013305-39 = "ถ้าเราขยายแนวความคิดนี้ออกไปอีกหน่อย"
1013305-40 = "และถ้า Strong AI ก็ทำงานตามระบบนี้ด้วย"
1013305-41 = "ถ้างั้นจะบอกว่ามันมีอัตตาได้หรือเปล่า?"
1013305-42 = "[s] \"เป็นคำถามที่ยากเลยนะ\""
1013305-43 = "เพราะแบบนั้น... ฉันก็เลยคิดว่า AI ไม่มีอัตตาน่ะ"
1013305-44 = "หมายความว่ามันเป็นแค่เครื่องจักรที่เลียนแบบมนุษย์เท่านั้น"
1013305-45 = "และฉันก็มองว่านั่นเป็นความคิดที่สมเหตุสมผลแล้ว"
1013305-49 = "จนกระทั่งได้มาเจออาริสึ..."
1013305-50 = "ฉันยังไม่เข้าใจว่าเด็กอย่างอาริสึเกิดขึ้นมาได้ยังไง"
1013305-51 = "เพราะงั้น... บางทีนั่นอาจเป็นเหตุผลที่ฉันกลัวก็ได้"
1013305-52 = "ฉันหมายถึงความกลัวที่มีต่อเรื่องที่ฉันไม่รู้น่ะ"
1013305-53 = "แต่ว่า... นั่นก็เป็นแค่ปัญหาที่ฉันต้องยอมรับ"
1013305-54 = "แค่ยอมรับว่าอาริสึก็มีบุคลิกเฉพาะตัว เหมือนกับที่แต่ละคนมีบุคลิกเฉพาะตัวของตัวเองก็พอ"
1013305-55 = "การคิดอย่างมีเหตุผลก็เป็นสิ่งสำคัญ แต่เราไม่จำเป็นต้องคิดอย่างมีเหตุผลในทุกเรื่องหรอก"
1013305-56 = "ก็ความจริงมันไม่ใช่การทดลองทางความคิดนี่นะ"
1013305-57 = "[s] \"โอ้ ริโอะของครูโตขึ้นมากเลยนะ!\""
1013305-58 = "นี่แค่เริ่มต้นเท่านั้นน่ะ..."
1013305-59 = "เพราะงั้น... จากนี้ไปฉันก็ฝากตัวต่อด้วยล่ะ"
1013305-60 = "ก็ฉันอยากเติบโตให้มากกว่านี้นี่นา และนั่นก็หมายความว่า..."
1013305-61 = "ฉันต้องเร่งดำเนินการตามแผนการผลิตหุ่นรบล้ำยุคแม่บ้านแล้วละ"
1013305-62 = "[s] \"คะ... ครูจะเป็นกำลังใจให้นะ...\""
1013305-64 = "(หลังจากนั้นคุณครูก็คุยกับริโอะต่อ และการอัปเดต AMAS ก็ดำเนินต่อไป)"
1013305-68 = "(หลังจากนั้นไม่นาน...)"
1013305-73 = "งานที่ตั้งเป้าไว้ของวันนี้เสร็จแล้วละ"
1013305-74 = "เสร็จเร็วกว่าที่คิดอีก ต้องขอบคุณครูที่มาช่วยนะ"
1013305-75 = "[s] \"ครูแค่มาเป็นเพื่อนคุยเฉยๆ เอง\""
1013305-76 = "แค่นั้นก็ช่วยเพิ่มประสิทธิภาพในการทำงานแล้วละ"
1013305-77 = "พองานเสร็จเร็วขึ้น ก็พอมีเวลาเหลือนิดหน่อยนะ..."
1013305-78 = "งั้นลองมาทำ <การทดลองห้องภาษาที่ไม่คุ้นเคย> ที่ฉันพูดถึงเมื่อกี้กันมั้ย?"
1013305-79 = "ถึงฉันจะไม่คิดว่าการทดลองนั้นจะถูกต้องทั้งหมด แต่การทดลองมันก็สนุกดีน่ะ"
1013305-80 = "แต่ยังไงเราก็น่าจะสร้างห้องขึ้นมาใหม่ในนี้ไม่ได้ งั้นเราเปลี่ยนรูปแบบเป็นการใช้กระดาษเฉลย#nกับบัตรภาพแทนแล้วกัน"
1013305-81 = "ฉันคิดว่าอาจเกิดเรื่องแบบนี้ขึ้นก็ได้ ก็เลยเตรียมเอาไว้ล่วงหน้าแล้วน่ะ"
1013305-82 = "[s3] (คงจะอยากทดลองแบบนี้มาตั้งนานแล้วสินะ...)\n[s4] \"ได้สิ งั้นก็มาเล่นกัน!\""
1013305-88 = "งั้นต่อไปนี้ฉันจะเอาบัตรภาพที่มีตัวอักษรหลายๆ ตัวให้ดูนะ"
1013305-89 = "ส่วนครูก็ดูกระดาษเฉลย จากนั้นก็เลือกบัตรภาพที่เหมาะสมให้ฉัน"
1013305-90 = "เอาละ จะเริ่มละนะ"
1013305-95 = "(คุณครูได้รับบัตรภาพที่มีตัวอักษรต่างๆ จากริโอะมาหลายใบ)"
1013305-96 = "(จากนั้นริโอะก็ยื่นกระดาษเฉลยและบัตรที่เขียนคำถามมาให้)"
1013305-97 = "(ถึงทั้งหมดจะเป็นภาพที่ไม่รู้จัก แต่คุณครูก็พยายามดูเฉลยและเลือกภาพที่เหมาะสมกลับไปให้)"
1013305-98 = "(แต่ก็ไม่แน่ใจว่านั่นเป็นคำตอบที่ถูกต้องหรือเปล่า...)"
1013305-101 = "คะ... ครู?! งั้นนี่ก็หมายความว่าครู...!"
1013305-102 = "มะ... ไม่สิ ก็นี่เป็นการทดลองแบบนั้นนี่เนอะ"
1013305-106 = "หืม...?"
1013305-107 = "..."
1013305-108 = "น่าเสียดายนะ... ถ้านี่เป็นความรู้สึกที่แท้จริงของครูละก็"
1013305-109 = "หืม? หมายความว่าอะไรน่ะเหรอ?"
1013305-110 = "..."
1013305-111 = "ยะ... อย่าทำให้ฉันต้องพูดออกมาสิ"
1013305-112 = "[s] \"ยะ... อย่าโกรธกันเลยนะ...\""
1013305-113 = "ฉัน... ไม่ได้โกรธหรอก ก็แค่..."
1013305-114 = "ขอโทษนะ... มะ... มาทำกันต่อเถอะ"
1013305-116 = "(จากนั้นคุณครูก็ทำการ 'ทดลอง' ต่อตามที่ริโอะบอก)"
1013305-123 = "ฮุฮุ นั่นสินะ ฉันก็เห็นด้วยเหมือนกัน"
1013305-127 = "ฮืม... ครูก็มีมุมแบบนี้อยู่สินะ เป็นข้อมูลที่คาดไม่ถึงเลยละ"
1013305-132 = "ตะ... แต่ถึงยังไงก็... ถือว่าใจกล้าไปหน่อยหรือเปล่า...?"
1013305-136 = "ถ้าครูต้องการละก็... ฉันก็... ไม่ว่าอะไรหรอก..."
1013305-138 = "(หลังจากนั้นการทดลองก็ยังดำเนินต่อไป และมีคำถามเพิ่มอีกประมาณ 10 ข้อ)"
1013305-144 = "(และทุกครั้งริโอะก็จะ... แสดงปฏิกิริยาหลายๆ แบบออกมา)"
1013305-146 = "ทำได้ดีมากเลยละ ครู"
1013305-147 = "หืม? ทั้งหมดนั้นเป็นคำถามและคำตอบอะไรบ้างน่ะเหรอ?"
1013305-148 = "..."
1013305-149 = "......"
1013305-155 = "........."
1013305-156 = "ฉันไม่บอกครูดีกว่า"
1013305-157 = "[s5] \"แต่ครูก็อยู่ในการทดลองนะ?!\"\n[s6] \"แต่ครูเป็นผู้ถูกทดลองนะ?!\""
1013305-160 = "มันก็จริงอยู่หรอก แต่ว่า..."
1013305-161 = "..."
1013305-162 = "ความปรารถนาเป็นสิ่งที่เราต้องเก็บไว้ในใจสิ และจนกว่าเรื่องที่ครูตอบมาจะกลายเป็นความจริงขึ้นมา..."
1013305-163 = "ถ้าเป็นไปได้ ฉันก็อยากเก็บทุกอย่างนั้นไว้เป็นความลับน่ะ"
