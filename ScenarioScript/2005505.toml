[translation]
2005505-1 = "遊戲大賽"
2005505-2 = "遊戲開發部．部室"
2005505-3 = "沒想到「Virtual Boss」居然會成為遊戲大賽的冠軍獎品……"
2005505-4 = "……不過考慮到它的人氣，作為冠軍獎品好像也還挺合理的。"
2005505-5 = "等等，難道老師所說的方法……"
2005505-6 = "是在大賽中贏得「Virtual Boss」嗎……！？"
2005505-10 = "這，這不是條簡單的路呢……"
2005505-11 = "[s]「會覺得害怕嗎？」"
2005505-12 = "不，請讓我參加吧，老師！#n如果是遊戲的話，我……！"
2005505-13 = "……先等一下！#n請問是什麼遊戲的大賽呢？"
2005505-14 = "《Simulion Quest》？#n也就是之前跟老師一起玩過的VR遊戲……！"
2005505-15 = "……如果是那款遊戲的話，確實有勝算。"
2005505-16 = "不過，我還沒有自信能在單人模式打進排行榜……"
2005505-17 = "[s]「所以我已經報名雙人合作部門了。」"
2005505-21 = "咦！？老師也要一起參加嗎？"
2005505-22 = "不能讓夥伴獨自上戰場……？"
2005505-23 = "如，如果是《Simulion Quest》的話……我一個人可能真的連預賽都很難通過……"
2005505-24 = "……謝謝你，老師。#n我們一起以冠軍為目標吧……！"
2005505-25 = "[s1]「對了，柚子。」\n[s2]「《Simulion Quest》的大賽，好像還有另一個參加條件。」"
2005505-28 = "條件……？"
2005505-30 = "（不久之後，遊戲大賽的決賽當天）"
2005505-32 = "遊戲大賽會場入口"
2005505-34 = "我做不到！"
2005505-35 = "我明明這麼相信老師……這麼相信你的說……！"
2005505-36 = "[s]「你先冷靜一點，柚子。」"
2005505-40 = "[ns3]「大家不都是穿著遊戲內的服裝嗎？」\n[ns4]「把這裡當成普通的Cosplay會場就沒事了。」"
2005505-43 = "話，話是這麼說沒錯……可是也有人穿著普通的衣服啊……"
2005505-44 = "老，老師你不也穿著正常的西裝嗎！"
2005505-45 = "[s5]「這是遊戲裡市民NPC的服裝啊。」\n[s6]「畢竟西裝是大人的盔甲嘛。」"
2005505-48 = "早，早知道會這樣的話，我也穿制服過來就好了……"
2005505-49 = "當，當然我也不否認，這套衣服是最適合拿來玩VR遊戲的……"
2005505-50 = "[s]「啊，好像開始了。走吧，柚子！」"
2005505-51 = "嗚哇哇哇……！！！"
2005505-53 = "（之後在比賽期間，柚子都緊緊貼在我的背後）"
2005505-55 = "遊戲大賽會場內部"
2005505-56 = "好！氣氛越來越熱烈了！"
2005505-57 = "那麼最後，讓我們歡迎決賽的對戰隊伍登上舞台！"
2005505-58 = "對手是……打破上榜時間紀錄的傳說雙人組！"
2005505-59 = "「UZQueen & Throne」！讓我們用熱烈的掌聲歡迎他們！"
2005505-64 = "UZQueen……？#n剛才確實說了UZQueen吧！？"
2005505-65 = "他果然也來參賽了！#n從精心打扮的服裝就能感受到高手的氣場！"
2005505-66 = "不過……那到底是什麼姿勢？"
2005505-72 = "難道說，用奇怪的騎肩姿勢擊敗無數敵人的雙人組……就是UZQueen嗎！？"
2005505-73 = "能親眼觀賞UZQueen比賽的機會……我一刻都不會錯過的！"
2005505-74 = "嗚嗚……！#n老師，我果然還是沒辦法在那麼多人面前騎在肩膀上……！"
2005505-75 = "那，那樣太害羞了，比平常更難集中精神……"
2005505-76 = "沒，沒辦法專心在遊戲上……"
2005505-77 = "[s]「柚子。」"
2005505-78 = "是，是！？"
2005505-79 = "[s]「至少在這一刻，把《Simulion Quest》的世界當成現實吧。」"
2005505-80 = "可，可是……"
2005505-81 = "如果遊戲裡的世界是現實的話，我們現在就是賭上性命在揮劍……#n那樣不會更讓人不安嗎？"
2005505-82 = "雖然遊戲的沉浸感確實很重要沒錯……"
2005505-86 = "結果想要奪冠的話，還是得打倒UZQueen啊……"
2005505-87 = "沒想到那個奇怪姿勢的高手就是UZQueen……該怎麼辦？"
2005505-88 = "先不說對手是UZQueen……那個奇怪姿勢的攻略法，不管在哪個社群都找不到啊！"
2005505-89 = "別擔心。為了應對這種情況，我已經找出必勝的方法了。"
2005505-90 = "我們的目標不是UZQueen而是Throne……#n他的搭檔只是個普通玩家，先把他打倒就有勝算了！"
2005505-91 = "好……！"
2005505-93 = "老，老師！請小心！"
2005505-94 = "[ns]「咦，對方瞄準的是我……？」"
2005505-97 = "（如果遊戲是現實的話……）"
2005505-98 = "（這套衣服和周圍的視線，完全不會讓人覺得害羞……）"
2005505-99 = "（現在更應該擔心的是……）"
2005505-100 = "……老師有危險！！"
2005505-105 = "怎，怎麼回事……？"
2005505-106 = "一瞬間就攻擊了我們的弱點……？"
2005505-110 = "真不敢相信！居然一瞬間就分出了勝負──獲勝者是「UZQueen & Throne」！"
2005505-111 = "你，你剛才看到了嗎？#n在Throne被攻擊的瞬間，UZQueen迅速地突襲了兩人的弱點……！"
2005505-112 = "快，快到我根本看不見……那真的有可能在現實中做到嗎？"
2005505-114 = "老，老師，你沒事吧……？"
2005505-115 = "[s]「我沒事……」"
2005505-119 = "[ns]「話說剛才的攻擊是怎麼做到的？」"
2005505-120 = "我，我也不太清楚……"
2005505-121 = "只是覺得既然這裡是現實，老師就遇到了危險……#n手就不由自主地動了起來……"
2005505-122 = "等我回過神來，就已經攻擊了對方的弱點……"
2005505-123 = "[s]「好厲害的專注力……」"
2005505-124 = "不，不過太好了。#n這樣總算能拿到「Virtual Boss」──"
2005505-131 = "UZQueen，剛才那個招式可以再展示一次嗎？"
2005505-132 = "……我，我也拜託你！#n我還是第一次親身體驗這樣的技術呢！"
2005505-133 = "如果可以的話，要直接打在我身上也行──"
2005505-134 = "我，我也拜託你！我也想再被打一次！"
2005505-135 = "請，請你也打我吧！"
2005505-136 = "我也拜託你了，UZQueen！"
2005505-137 = "（總，總覺得奇怪的請求好像越來越多了……）"
2005505-138 = "求求你，UZQueen！"
2005505-139 = "能被UZQueen打的話，就算要付錢我也願意……！"
2005505-140 = "那，那樣我會很困擾的……"
2005505-141 = "老師……救救我……！"
2005505-142 = "UZQueen！UZQueen！"
2005505-147 = "老，老師～！！"
2005505-149 = "（之後好不容易才把被人群圍住而困擾的柚子抱出來，並逃離了會場……）"
