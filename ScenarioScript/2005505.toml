[translation]
2005505-1 = "การแข่งขันเกม"
2005505-2 = "ห้องชมรมพัฒนาเกม"
2005505-3 = "คิดไม่ถึงเลยว่าเขาจะให้เกม <เวอร์ชวล บอส> เป็นรางวัลการแข่งขันเกม..."
2005505-4 = "แต่มันเป็นเกมที่ฮิตกันมากๆ และคู่ควรที่จะนำมามอบเป็นของรางวัลจริงๆ ค่ะ..."
2005505-5 = "เดี๋ยวก่อนนะคะ งั้นวิธีที่คุณครูคิดเอาไว้..."
2005505-6 = "ก็คือต้องชนะการแข่งเพื่อให้ได้เกม <เวอร์ชวล บอส> มางั้นเหรอคะ...?!"
2005505-10 = "วะ... วิธีนี้ไม่ง่ายเลยนะคะ..."
2005505-11 = "[s] \"กลัวเหรอ?\""
2005505-12 = "เปล่าค่ะ บอกมาได้เลยค่ะ คุณครู! ถ้าเป็นเรื่องเกมละก็ ฉัน...!"
2005505-13 = "ไม่ใช่สิ...! งานแข่งเกมอะไรงั้นเหรอคะ?"
2005505-14 = "เกม <เควสซิมูเลียน> งั้นเหรอคะ? นั่นมันเกม VR ที่เราเพิ่งเล่นกันมาเมื่อไม่นานมานี้...!"
2005505-15 = "อันที่จริง ถ้าเป็นเกมนั้นก็คงมีโอกาสชนะอยู่ค่ะ"
2005505-16 = "แต่ว่าฉันยังไม่มั่นใจว่าถ้าเล่นคนเดียวจะไต่แรงก์ขึ้นไปสูงๆ ได้รึเปล่า..."
2005505-17 = "[s] \"เพราะงั้นครูเลยสมัครแบบเล่นสองคนไปแล้วละ\""
2005505-21 = "คะ?! คุณครูก็จะลงแข่งด้วยเหรอคะ?"
2005505-22 = "จะให้สหายลงสนามรบไปคนเดียวได้ยังไง... อย่างนั้นเหรอคะ?"
2005505-23 = "นะ... แน่นอนว่าถ้าเป็นเกม <เควสซิมูเลียน> แล้วละก็... แค่ฉันคนเดียวก็คงผ่านรอบคัดเลือกไปได้#nอย่างสบายๆ..."
2005505-24 = "แต่ยังไงก็ขอบคุณนะคะ คุณครู มาคว้าชัยชนะไปด้วยกันเถอะค่ะ...!"
2005505-25 = "[s1] \"ว่าแต่ว่านะ ยูสึ\"\n[s2] \"ดูเหมือนจะมีเงื่อนไขการเข้าร่วมแข่งขันอีกอย่างหนึ่งนะ\""
2005505-28 = "เงื่อนไขเหรอคะ...?"
2005505-30 = "(หลังจากนั้นไม่นานก็ถึงวันแข่งขันรอบชิงชนะเลิศ)"
2005505-32 = "ทางเข้าสถานที่จัดงานแข่งขัน"
2005505-34 = "ไม่ไหวหรอกค่ะ!"
2005505-35 = "ฉันอุตส่าห์เชื่อใจคุณครู... อุตส่าห์ไว้ใจคุณครู...!"
2005505-36 = "[s] \"ใจเย็นๆ ก่อนสิ ยูสึ\""
2005505-40 = "[ns3] \"ก็ทุกคนใส่ชุดในเกมเหมือนกันหมดเลยนี่นา?\"\n[ns4] \"คิดซะว่าเป็นงานคอสเพลย์เฉยๆ ก็แล้วกันนะ\""
2005505-43 = "ตะ... แต่ถึงคุณครูจะพูดอย่างนั้น.. ก็มีคนใส่ชุดธรรมดามาด้วยเหมือนกันนะคะ..."
2005505-44 = "คะ... คุณครูเองก็ยังใส่ชุดธรรมดามาเลยนี่คะ!"
2005505-45 = "[s5] \"นี่ชุด NPC ชาวเมืองในเกมต่างหาก\" \n[s6] \"นี่ชุดเกราะของผู้ใหญ่ต่างหาก\""
2005505-48 = "ถะ... ถ้าฉันรู้ตัวก่อนหน้านี้ก็คงจะใส่ชุดธรรมดาๆ มาเหมือนกัน..."
2005505-49 = "ถึงชุดนี้มันจะเหมาะกับการเล่นเกม VR ก็เถอะ..."
2005505-50 = "[s] \"อ่า การแข่งจะเริ่มแล้วละ ไปกันเถอะ ยูสึ!\""
2005505-51 = "แงงงงงง...!!!"
2005505-53 = "(หลังจากนั้น ยูสึก็คอยเอาแต่แอบอยู่ข้างหลังคุณครูตลอด)"
2005505-55 = "ด้านในสถานที่จัดงาน"
2005505-56 = "เอาละ! ตอนนี้บรรยากาศค่อยๆ ดุเดือดขึ้นเรื่อยๆ แล้ว!"
2005505-57 = "ขอเชิญทีมที่เข้าสู่รอบชิงชนะเลิศขึ้นมาบนเวทีได้เลย!"
2005505-58 = "ทีมฝ่ายตรงข้าม... คู่หูที่สร้างตำนานการไต่ขึ้นแรงก์สูงสุดภายในเวลาที่สั้นที่สุด!"
2005505-59 = "ขอปรบมือให้กับทีม <UZQueen & Throne>!"
2005505-64 = "UZQueen...? เมื่อกี้ประกาศว่า UZQueen ใช่มั้ย?!"
2005505-65 = "ลงแข่งจริงๆ ด้วยสินะ! สัมผัสได้ถึงออร่าความเป็นมืออาชีพจากชุดที่ใส่เลยทีเดียว!"
2005505-66 = "ว่าแต่ว่า... ท่าทางแบบนั้นหมายความว่ายังไงกันน่ะ?"
2005505-72 = "อย่าบอกนะว่า... คู่หูที่กำจัดศัตรูไปมากมายด้วยท่าขี่คอสุดพิสดารนั่นจะเป็น UZQueen จริงๆ น่ะ!"
2005505-73 = "โอกาสที่จะได้ดู UZQueen เล่นเกมสดๆ... ฉันจะไม่ยอมพลาดอย่างแน่นอน!"
2005505-74 = "แงงง...! คิดแล้วเชียวว่าขี่คอต่อหน้าคนอื่นแบบนี้มันไม่ไหวจริงๆ ค่ะ..."
2005505-75 = "ฉะ... ฉันอายจนแทบไม่มีสมาธิเลย..."
2005505-76 = "ฉะ... ฉันโฟกัสกับการเล่นเกมไม่ได้เลยค่ะ..."
2005505-77 = "[s] \"ยูสึ\""
2005505-78 = "คะ... คะ?!"
2005505-79 = "[s] \"คิดว่าโลกใน <เควสซิมูเลียน> คือโลกในความเป็นจริงซะ\""
2005505-80 = "ตะ... แต่ว่า..."
2005505-81 = "ถ้าโลกในเกมคือความจริง พวกเราที่หันดาบเข้าหากันก็คงอยู่ในสถานการณ์หน้าสิ่วหน้าขวานที่ต้อง#nเอาชีวิตเข้าแลก... การคิดแบบนั้นจะทำให้กังวลกว่าเดิมไม่ใช่เหรอคะ?"
2005505-82 = "ถึงการอินกับความสมจริงของเกมจะเป็นเรื่องสำคัญก็เถอะ..."
2005505-86 = "ฉันต้องเอาชนะ UZQueen เพื่อคว้าแชมป์มาให้ได้งั้นเหรอ..."
2005505-87 = "อย่าบอกนะว่าอีกฝ่ายที่มีท่าแปลกๆ นั่นคือ UZQueen จริงๆ น่ะ... ทำยังไงดีล่ะ?"
2005505-88 = "เรื่องที่คู่ต่อสู้คือ UZQueen คือคู่ต่อสู้น่ะเอาไว้ก่อนเถอะน่า ที่สำคัญคือไม่มีใครเขียนวิธีเอาชนะ#nท่าขี่คอแปลกๆ นั่นไว้เลยสักคนเดียว!"
2005505-89 = "ไม่ต้องห่วงหรอก ฉันคิดวิธีเผื่อไว้รับมือเรื่องฉุกเฉินแบบนี้แล้วละ"
2005505-90 = "Throne ที่เป็นคู่หูของ UZQueen เป็นแค่ผู้เล่นธรรมดา ถ้าเราโจมตีเจ้านั่นให้ได้ก่อน ชัยชนะก็จะเป็นของพวกเราไงล่ะ!"
2005505-91 = "ดีละ...!"
2005505-93 = "ระ... ระวังด้วยค่ะ คุณครู!"
2005505-94 = "[ns] \"เอ๋ อีกฝ่ายโจมตีครูเหรอ...?\""
2005505-97 = "(ถ้าเกมนี้คือความจริงละก็...)"
2005505-98 = "(ฉันจะไม่ต้องเขินเรื่องชุด แล้วก็ไม่ต้องสนใจสายตาคนรอบข้างด้วย...)"
2005505-99 = "(แถมสิ่งที่น่าเป็นห่วงตอนนี้...)"
2005505-100 = "อันตรายค่ะ คุณครู...!!"
2005505-105 = "กะ... เกิดอะไรขึ้นน่ะ...?"
2005505-106 = "พวกเราโดนโจมตีทะลุจุดอ่อนในพริบตาเดียวเหรอเนี่ย...?"
2005505-110 = "โอ้โห! รู้ผลแพ้ชนะในพริบตาเลยทีเดียว! ผู้ที่ชนะก็คือทีม <UZQueen & Throne>!"
2005505-111 = "มะ... เมื่อกี้เธอเห็นหรือเปล่า? การโจมตีสายฟ้าแล่บของ UZQueen ที่เข้าโจมตีจุดอ่อนศัตรู ก่อนที่อีกฝ่ายจะโจมตี Throne..."
2005505-112 = "ระ... เร็วมากจนมองไม่เห็นเลย... เทคนิคแบบนั้นทำได้ในโลกจริงด้วยเหรอ?"
2005505-114 = "คะ... คุณครู เป็นอะไรรึเปล่าคะ...?"
2005505-115 = "[s] \"ครูไม่เป็นไร...\""
2005505-119 = "[ns] \"ว่าแต่ว่าท่าโจมตีเมื่อกี้ทำได้ยังไงน่ะ?\""
2005505-120 = "ฉะ... ฉันก็ไม่รู้เหมือนกันค่ะ..."
2005505-121 = "พอคิดว่านี่คือโลกจริงและคุณครูก็กำลังตกอยู่ในอันตราย มือมันก็ขยับไปโดยไม่รู้ตัวเลย..."
2005505-122 = "ฉันไม่รู้ตัวเลยค่ะว่าโจมตีโดนจุดอ่อนของคู่ต่อสู้ด้วย..."
2005505-123 = "[s] \"สมาธิดีสุดๆ เลยนะ...\""
2005505-124 = "ยะ... ยังไงก็ค่อยยังชั่วหน่อยนะคะ เท่านี้ก็จะได้รับ <เวอร์ชวล บอส> แล้ว..."
2005505-131 = "UZQueen ช่วยแสดงเทคนิคเมื่อสักครู่ให้ดูอีกทีได้รึเปล่า?"
2005505-132 = "ขะ... ขอร้องละ! เพิ่งเคยเห็นเทคนิคแบบนั้นเป็นครั้งแรกเลย!"
2005505-133 = "ถ้าไม่ติดอะไรละก็โจมตีมาที่ฉันก็ได้..."
2005505-134 = "ขะ... ขอร้องเถอะนะ! ฉันเองก็อยากลองโดนท่าเมื่อกี้โจมตีเหมือนกัน!"
2005505-135 = "ชะ... ช่วยโจมตีฉันด้วยคนสิ!"
2005505-136 = "โจมตีใส่ฉันด้วยสิ UZQueen!"
2005505-137 = "(ระ... รู้สึกว่าคำขอร้องมันเริ่มแปลกขึ้นเรื่อยๆ...)"
2005505-138 = "ขอร้องละ UZQueen!"
2005505-139 = "จะให้ฉันจ่ายเงินให้ UZQueen ก็ได้นะ...!"
2005505-140 = "บะ... แบบนั้นฉันลำบากใจนะคะ..."
2005505-141 = "ช่วยด้วยค่ะ คุณครู...!"
2005505-142 = "UZQueen! UZQueen!"
2005505-147 = "คะ... คุณครู~!"
2005505-149 = "(หลังจากนั้น คุณครูก็พายูสึที่กำลังลำบากเพราะโดนฝูงชนรุมล้อม ฝ่าออกมาจากสถานที่จัดงานได้#nสำเร็จ...)"
