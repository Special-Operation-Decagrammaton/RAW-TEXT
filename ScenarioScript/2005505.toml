[translation]
2005505-1 = "Gaming Tournament"
2005505-2 = "Game Development Department Club Room"
2005505-3 = "I can't believe the gaming tournament's offering a Virtual Boss as the grand prize..."
2005505-4 = "...Well, considering how popular and scarce it is, it's definitely worthy of the top spot."
2005505-5 = "Wait a minute, so that was your plan?"
2005505-6 = "You think I should just \"win the tournament and get a Virtual Boss that way\"...?!"
2005505-10 = "Th-That's not exactly easy, Sensei..."
2005505-11 = "[s] \"Why, are you scared?\""
2005505-12 = "No. Just give me the command, Sensei! When it comes to gaming, I'm the—!"
2005505-13 = "...Wait a second! This is a tournament for which game?"
2005505-14 = "Simulion Quest? That's the VR game we played together, Sensei...!"
2005505-15 = "...I have a chance. Maybe. I'm definitely getting the hang of it."
2005505-16 = "But I'm not confident enough to fight solo..."
2005505-17 = "[s] \"And that's why I've signed us up for the two-person co-op competition.\""
2005505-21 = "Huh?! You're going to join me?"
2005505-22 = "\"You can't send an ally into battle alone.\" Ah, what a line, Sensei."
2005505-23 = "O-Of course, with Simulion Quest... I'd probably have a hard time making it through the preliminaries solo..."
2005505-24 = "...So, thank you, Sensei. Let's aim for the championship prize!"
2005505-25 = "[s1] \"By the way, Yuzu.\"\n[s2] \"There are additional requirements to enter the Simulion Quest tournament.\""
2005505-28 = "\"Requirements\"...?"
2005505-30 = "A few days passed, and it was finally time for the tournament."
2005505-32 = "Gaming Tournament Venue Entrance"
2005505-34 = "No way!"
2005505-35 = "I trusted you, Sensei... I trusted you...!"
2005505-36 = "[s] \"Calm down, Yuzu.\""
2005505-40 = "[ns3] \"Everyone's wearing in-game outfits, aren't they?\"\n[ns4] \"Just think of it as a cosplay convention.\""
2005505-43 = "\"Everyone\"? I see quite a few people dressed normally..."
2005505-44 = "E-Even you're wearing a regular suit, Sensei!"
2005505-45 = "[s5] \"I'm cosplaying as an NPC.\" \n[s6] \"Suits are the 'official armor' of adults, after all.\""
2005505-48 = "I-If I'd known this would happen, I would've just worn my normal clothes..."
2005505-49 = "Well, I won't deny that this outfit is perfect for playing VR games, but..."
2005505-50 = "[s] \"Ah, looks like it's starting. Let's head inside, Yuzu!\""
2005505-51 = "Waaaah...!!"
2005505-53 = "From that point on, Yuzu stayed glued to my back."
2005505-55 = "Inside the Gaming Tournament Venue"
2005505-56 = "This is what you came for, people! It's time for the finals, and things are heating up!"
2005505-57 = "And now, let's welcome our challengers to the stage."
2005505-58 = "Introducing...the legendary duo who climbed the Simulion Quest ranks in record time!"
2005505-59 = "\"UZQueen & Throne\"! Let's give them a hand, everybody!"
2005505-64 = "UZQueen...? They just said UZQueen, right?!"
2005505-65 = "So she decided to compete after all! And look at that fit! She's got the aura of a master!"
2005505-66 = "But...what on earth is that stance?"
2005505-72 = "She must be part of that bizarre piggyback duo that kept sweeping through the bosses. That was UZQueen the whole time?!"
2005505-73 = "A chance to watch UZQueen playing live... I can't miss a second!"
2005505-74 = "Waaah...! Sensei, the piggyback stance doesn't really seem appropriate to do in public...!"
2005505-75 = "I-I'm so embarrassed. I can barely think..."
2005505-76 = "I can't concentrate on the game like this..."
2005505-77 = "[s] \"Yuzu.\""
2005505-78 = "Y-Yes?!"
2005505-79 = "[s] \"Just for now, imagine that the world of Simulion Quest is real.\""
2005505-80 = "B-But..."
2005505-81 = "If the game world were real, we'd be in a life-threatening situation, with swords drawn... Won't thinking about it that way just make me even more anxious?"
2005505-82 = "That may be getting TOO immersed..."
2005505-86 = "So in the end, we have to defeat UZQueen to win the championship..."
2005505-87 = "I can't believe UZQueen was the one using that weird stance the whole time... What should we do?"
2005505-88 = "Forget about UZQueen! I'm looking through the forums... No one has a CLUE how to counter the piggyback stance!"
2005505-89 = "Don't worry. I've got a surefire strategy."
2005505-90 = "Set aside UZQueen, and look at Throne... Since her partner is just an ordinary player, if we take them out first, we'll have a chance to win!"
2005505-91 = "Let's rock!"
2005505-93 = "S-Sensei! Be careful!"
2005505-94 = "[ns] \"Huh, why are they targeting me...?\""
2005505-97 = "(If this game were reality...)"
2005505-98 = "(I wouldn't be embarrassed by this outfit, or the stares of everyone around me...)"
2005505-99 = "(What I'd really focus on is...)"
2005505-100 = "...Sensei, watch out!!"
2005505-105 = "Wh-What happened...?"
2005505-106 = "In an instant, she found our weak points...?"
2005505-110 = "What a turn! A blink of an eye, a flash, and UZQueen & Throne have claimed victory!"
2005505-111 = "D-Did you just see that? Right before Throne was attacked, UZQueen struck both of their weak spots with blazing speed...!"
2005505-112 = "I-It was so fast that I didn't catch it... How was that actually possible? Can we get an instant replay?"
2005505-114 = "S-Sensei. Are you okay...?"
2005505-115 = "[s] \"I'm fine...\""
2005505-119 = "[ns] \"More importantly, how did you do that?\""
2005505-120 = "I don't really know..."
2005505-121 = "I suppose I changed my reality. I imagined that you were in actual danger, and my hands moved faster than my thoughts..."
2005505-122 = "Before I even realized it, I was exploiting their weaknesses."
2005505-123 = "[s] \"That was very impressive concentration...\""
2005505-124 = "Still, I'm relieved. And now, we finally have a Virtual Boss!"
2005505-131 = "UZQueen, could you show us that move again?"
2005505-132 = "...P-Please, walk me through it! I've never faced anything like it!"
2005505-133 = "If you're interested, you can even hit me in real life—"
2005505-134 = "M-Me too! I want to get hit again!"
2005505-135 = "H-Hit me too!"
2005505-136 = "Oh, me, me, hit me too, UZQueen! Yes!"
2005505-137 = "(I can't help but feel like the requests are getting a little strange...)"
2005505-138 = "Please, UZQueen! Step on me!"
2005505-139 = "I'll pay good money to be struck by UZQueen! Destroy me, queen!"
2005505-140 = "Th-This isn't good..."
2005505-141 = "Sensei... Please help...!"
2005505-142 = "UZQueen! UZQueen!"
2005505-147 = "S-Sensei!"
2005505-149 = "I managed to lead Yuzu, who was struggling to escape the crowd, out of the venue..."
