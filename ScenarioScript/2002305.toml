[translation]
2002305-1 = "The Director's Rest"
2002305-2 = "D.U. Kanesaki Port"
2002305-3 = "I was out at the port to assist the Public Peace Bureau mission to apprehend a smuggler."
2002305-7 = "...I see. Good work."
2002305-8 = "Attention, all officers. The smuggler was found attempting to escape via boat at Port 3, and was apprehended by students of the Security Bureau."
2002305-9 = "Well done, everyone. Operation wraps up in one hour."
2002305-10 = "Good work!"
2002305-11 = "[s] \"You did well today, Kanna.\""
2002305-12 = "It wasn't a difficult assignment."
2002305-13 = "Without the witness accounts you collected from nearby Schale students, it would have taken significantly longer, though."
2002305-14 = "So, as a representative of the Public Peace Bureau, allow me to offer you our heartfelt thanks."
2002305-15 = "[s] \"Oh, I didn't really do that much...\""
2002305-22 = "Director Kanna! After the operation, would you like to have a drink with us?"
2002305-24 = "A drink? Where?"
2002305-25 = "Baizeriya, of course! You know, the family restaurant nearby?"
2002305-26 = "The drink bar has a new kind of root beer on tap."
2002305-27 = "People have been making root beer floats with ice cream from the dessert bar. It's been all over social media lately."
2002305-28 = "We want to get together and toast a job well done!"
2002305-29 = "...I'm sorry. There's a great deal of work I still need to do this afternoon."
2002305-30 = "Please go and enjoy yourselves. I'm sure having the director there would just bring the mood down."
2002305-31 = "But... You say you have too much work whenever we invite you anywhere."
2002305-32 = "We were really hoping to hang out with you today..."
2002305-33 = "It can't be that fun to hang out with your commanding officer."
2002305-34 = "I'm sure there are other students you'd rather invite. I'm just too busy."
2002305-35 = "[s1] \"Why not have fun yourself?\"\n[s2] \"If you really have that much work, I'll help you with it.\""
2002305-38 = "Thanks, but I'm needed elsewhere after I finish work."
2002305-39 = "Unfortunately, I'll have to go out with the others another time."
2002305-40 = "Excuse me."
2002305-42 = "As I was on my way back to Schale after finishing work that night..."
2002305-47 = "[ns3] \"I forgot to eat dinner again...\"\n[ns4] \"I wonder if anywhere is still open...\""
2002305-52 = "Come one, come all! Menya Suzu, the traveling food stall, is open for business!"
2002305-53 = "We have ramen! We have oden!"
2002305-58 = "[ns] Amazed by the perfect timing, I head to the food stall."
2002305-61 = "Welcome! Welcome to Menya Suzu!"
2002305-62 = "Can I take your order?"
2002305-63 = "[s] \"A bowl of ramen please.\""
2002305-64 = "Got it. There's a few customers waiting ahead of you, so it will be just a couple minutes."
2002305-69 = "Ahhh, there's nothing better than a chicken skewer after a hard day's work..."
2002305-70 = "And nowhere else does them like they do here."
2002305-71 = "And the tea that comes with it... I love the way the fresh taste of their oolong tea washes down the grease of the skewer and the day's exhaustion at the same time."
2002305-72 = "[s] \"...Kanna?\""
2002305-76 = "Huh?"
2002305-77 = "S-Sensei?! What are you doing here?"
2002305-80 = "― I didn't expect to run into you here...[wa:1960] "
2002305-82 = "― I lost my composure. Sorry.[wa:10] "
2002305-85 = "[ns] \"I didn't think that I'd run into you here, either.\""
2002305-86 = "― Is that so?[wa:800] "
2002305-88 = "― I feel most at ease here.[wa:2680] "
2002305-91 = "― I can't ever take a day of from being the intimidating Public Peace Bureau Director, but...[wa:820] "
2002305-93 = "― ...I need a place where I can lower my guard for a moment.[wa:1280] "
2002305-96 = "― So, today...[wa:2340] "
2002305-98 = "― Please pretend that you never saw me here.[wa:2860] "
2002305-106 = "[ns5] \"If you needed a break...\"\n[ns6] \"Why didn't you go out with the others earlier?\""
2002305-109 = "There's no point lying now that you've seen me here."
2002305-110 = "You may have already guessed this, but it's not that I dislike going out with others."
2002305-111 = "But as the Feral Hound of the Public Peace Bureau, I have to be aware of my image."
2002305-112 = "If criminals learn that the feared Feral Hound has been seen going out to eat and having fun with other students..."
2002305-113 = "It could compromise the security of Kivotos."
2002305-114 = "So, if there's a chance of being seen by civilians, I can't show my more...human side."
2002305-115 = "But that's not something I can keep a secret from you, either."
2002305-116 = "So please keep this between us."
2002305-117 = "[s] \"What do you recommend here?\""
2002305-118 = "What? That's a change of subject."
2002305-119 = "[s7] \"That's the price of my silence.\"\n[s8] \"I want a dish recommendation.\""
2002305-122 = "...Haha. Well, that price is one I have no problem paying."
2002305-123 = "I like their skewer sampler plate, but you can't go wrong with freshly boiled oden on a day like today."
2002305-124 = "This stall starts boiling their oden stock well before they open every day, so it's suffused with the flavor of the beef tendon."
2002305-125 = "[s] \"Sounds good. I'll add that to my order.\""
2002305-126 = "Can we get two orders of oden, please?"
2002305-127 = "And the house special oolong."
2002305-128 = "Coming right up!"
2002305-131 = "I spent the rest of the night sharing oden with Kanna."
