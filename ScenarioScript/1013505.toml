[translation]
1013505-1 = "需要幫助"
1013505-2 = "（急忙趕往了千年！）"
1013505-7 = "抓到Kei醬了！"
1013505-8 = "放，放開我！"
1013505-9 = "Kei醬討厭我們嗎？"
1013505-10 = "也不是討厭！只，只是有點……"
1013505-11 = "啊，害羞了！#n我就知道，果然跟愛麗絲是不一樣的感覺呢！"
1013505-12 = "（為什麼愛麗絲就是愛麗絲，而我卻是Kei「醬」呢……好想問清楚！）"
1013505-16 = "[ns1] 「什麼嘛。還以為有急事才連忙趕來……」\n[ns2] 「原來是千年的新流行『寵愛Kei醬』啊。」"
1013505-19 = "老師！？你來得正好！#n作為一名老師，請解救身陷危機的學生──"
1013505-20 = "啊，是老師！老師好！"
1013505-21 = "老師也要一起「寵愛Kei醬」嗎？"
1013505-22 = "[s] 「當然囉！」"
1013505-23 = "咦！？！？"
1013505-24 = "……"
1013505-26 = "相信這種大人的我真是個笨蛋──！！！"
1013505-29 = "話說Kei醬是愛麗絲的雙胞胎妹妹對吧？"
1013505-30 = "咦？這，這個嘛……差不多是那樣吧。"
1013505-31 = "可是髮色完全不一樣耶？明度是相反的。"
1013505-32 = "啊！我知道了！是異卵雙胞胎吧！"
1013505-33 = "啊……唔……嗯……就當是那樣吧……"
1013505-34 = "那麼，今天也要給Kei醬委託任務囉～"
1013505-35 = "又是那個嗎……"
1013505-36 = "咦，難道你不喜歡？"
1013505-37 = "倒也不是……！"
1013505-41 = "……"
1013505-42 = "……不是不喜歡。"
1013505-43 = "只是有點不太習慣，或者說有點害羞……"
1013505-45 = "啊啊啊啊啊～"
1013505-47 = "唔，突然有種非常不妙的預感……！"
1013505-49 = "Kei醬好可愛～！！！"
1013505-54 = "[ns] 「Kei醬好可愛～！！！」"
1013505-55 = "你又在起什麼鬨啦！！！！！"
1013505-56 = "話說回來……能幫我把這個送到隔壁棟的教室嗎？"
1013505-57 = "啊，好的……是所謂的配送任務呢……"
1013505-58 = "嗯，而且這次是先給獎勵的那種哦。#n來，這條項鍊給你。"
1013505-59 = "……！"
1013505-60 = "好漂亮……"
1013505-61 = "裝飾不會華麗到讓人有負擔，帶有藍色鉻光澤和稍微混入黃色的寶石……"
1013505-62 = "這，這看起來還挺貴重的，真的沒關係嗎？"
1013505-64 = "沒事沒事。這是用我們新素材開發部做東做西時剩下的材料做的。"
1013505-65 = "那個寶石也是人造鑽石，從成分來看就只是一團碳塊而已。"
1013505-67 = "這樣啊……也對，最近反而是人造鑽石的品質更好呢。"
1013505-69 = "那就拜託你囉～"
1013505-70 = "如果還想要更多任務的話，隨時可以跟我說！"
1013505-72 = "沒，沒關係……我想今天應該夠了……"
1013505-73 = "……？"
1013505-74 = "從剛才開始就有股令人討厭的感覺，老師為什麼要露出那種表情站在那裡啊……？"
1013505-75 = "[s] 「哎呀，怎麼說呢～」"
1013505-76 = "什麼怎麼說？"
1013505-77 = "[s] 「感覺看到了很棒的畫面呢～」"
1013505-78 = "哎～～～～！！！"
1013505-81 = "唔唔，真是的……為什麼大家老是要針對我……"
1013505-82 = "停停停，我知道你要說什麼。#n八成是「大家都很疼愛我」、「大家都很珍惜我」之類的吧。"
1013505-83 = "……怎麼又因為這種事沮喪了啊。#n這個大人真的是……！"
1013505-84 = "[s] 「學園生活都還好嗎？」"
1013505-85 = "……"
1013505-86 = "嗯，還算過得去吧。"
1013505-87 = "[s] 「Kei語翻譯機：『我真的很喜歡！簡直超棒的！』。」"
1013505-88 = "在胡說八道什麼啊！！！#n為什麼要把別人說的話再翻譯成人話啦！！！"
1013505-89 = "哈啊，哈啊，哈啊……"
1013505-90 = "總之我正在執行任務，請不要讓我一直分心。"
1013505-91 = "咦？就跟你說在執行任務……"
1013505-92 = "……！！！"
1013505-93 = "是，是跑腿啦！！！！！"
1013505-94 = "我說過禁止那種滿足又狡猾的笑容了吧！！！！！"
1013505-95 = "[s] 「你還沒說過！」"
1013505-96 = "那就從現在開始禁止！"
1013505-97 = "[s] 「本人要求擁有表情自由！！」"
1013505-98 = "只有老師是例外！"
1013505-99 = "啊，是Kei。怎麼了嗎？"
1013505-106 = "咦……？時機正好。#n我接到了把這個送過來的任務……不對，是請求。"
1013505-107 = "我看看……啊啊，終於有結果了啊。#n這次金屬化合物的超導性……"
1013505-108 = "話說這種東西用網路傳送不就好了嗎？"
1013505-109 = "一般案件的話確實可以，不過這個是不行的。"
1013505-110 = "為什麼？"
1013505-111 = "因為安全問題。#n這個結果只能讓我們社團知道！不能把機密洩漏給其他社團的傢伙！"
1013505-112 = "網路僅有的兩個缺點，就是安全的脆弱性和資料保存的年限啊！"
1013505-113 = "也對。這也是磁帶儲存裝置至今仍然難以被淘汰的原因。"
1013505-114 = "如果預算充足的話，真想用一堆水晶資料碟片把一切都存檔起來……#n唉……可惜那是不可能的吧……"
1013505-115 = "總之辛苦你了，Kei。#n待會要不要一起去遊戲中心？"
1013505-116 = "咦，咦咦？這個嘛……"
1013505-117 = "怎麼了？你之前不是很喜歡的嗎？"
1013505-118 = "當時是這樣沒錯啦！#n只是，那個……"
1013505-119 = "[s] 「啊哈！Kei醬也喜歡遊戲啊！」"
1013505-120 = "就是說呀，老師！#n要是老師一起來看的話，肯定會嚇一跳的哦？"
1013505-121 = "不是的！那單純只是……！"
1013505-122 = "咦……？所以那時候你其實不太喜歡，只是勉強陪著我玩嗎……？"
1013505-123 = "那也不是！"
1013505-127 = "[ns] 「究竟是哪邊呢～？Kei醬～？」"
1013505-128 = "這，這，這……！"
1013505-130 = "這個明明都知道卻故意裝傻的邪惡大人！！！！！"
