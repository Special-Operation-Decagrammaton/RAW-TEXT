[translation]
1013505-1 = "ต้องการความช่วยเหลือค่ะ"
1013505-2 = "(คุณครูรีบมุ่งหน้าไปยังมิลเลเนียม!)"
1013505-7 = "เจอตัวเคย์จังแล้ว!"
1013505-8 = "ปะ... ปล่อยนะคะ!"
1013505-9 = "เคย์จังไม่ชอบพวกเราเหรอ?"
1013505-10 = "ก็ไม่ได้ไม่ชอบหรอกค่ะ! ตะ... แต่ว่า..."
1013505-11 = "อ้อ เขินสินะ! อย่างนี้นี่เอง! คนละขั้วกับอาริสึเลย!"
1013505-12 = "(ทำไมอาริสึได้เป็น 'อาริสึ' เฉยๆ ส่วนฉันต้องเป็น 'เคย์จัง' ด้วยล่ะคะ!)"
1013505-16 = "[ns1] \"อะไรกัน ครูก็คิดว่ามีเรื่องเร่งด่วนอะไรเสียอีก...\"\n[ns2] \"เคย์จัง คนดังมิลเลเนียมกำลังได้รับความเอ็นดูอยู่นี่เอง\""
1013505-19 = "คุณครู?! มาก็ดีแล้วค่ะ! ช่วยนักเรียนที่ตกอยู่ในวิกฤตด้วยค่ะ..."
1013505-20 = "อ๊ะ คุณครูนี่นา! สวัสดีค่ะ คุณครู!"
1013505-21 = "คุณครูก็มา 'เอ็นดูเคย์จัง' กับพวกเรามั้ยคะ?"
1013505-22 = "[s] \"ต้องเอาด้วยอยู่แล้ว!\""
1013505-23 = "คะ?!?!"
1013505-24 = "..."
1013505-26 = "ฉันโง่เองละค่ะที่ไว้ใจผู้ใหญ่!!!"
1013505-29 = "จะว่าไป ได้ยินว่าเคย์จังคือน้องสาวฝาแฝดของอาริสึใช่มั้ย?"
1013505-30 = "คะ? ค่ะ... ค่ะ... ก็ประมาณนั้น ค่ะ..."
1013505-31 = "เอ๋? แต่ว่าผมคนละสีกันเลยนะ? เป็นเฉดที่ตรงข้ามกันเลยด้วย?"
1013505-32 = "อ๊ะ! อย่างนี้นี่เอง! เป็นแฝดคนละฝาที่เป็นเพศเดียวกันสินะ!"
1013505-33 = "อึก... อ่า... ค่ะ... เอาตามนั้นแล้วกันค่ะ..."
1013505-34 = "ถ้างั้นวันนี้ฉันก็จะมอบเควสให้เคย์จังอีกค่ะ~"
1013505-35 = "อีกแล้วเหรอคะ..."
1013505-36 = "อ๊ะ หรือว่าไม่อยากทำ?"
1013505-37 = "ไม่...!"
1013505-41 = "..."
1013505-42 = "ไม่ได้ไม่อยากทำค่ะ..."
1013505-43 = "ฉันแค่อาย... และยังไม่คุ้นเคยกับอะไรแบบนี้เท่าไร..."
1013505-45 = "ตายแล้ว~"
1013505-47 = "อึก... มีลางสังหรณ์ว่าจากนี้ไปจะเกิดเรื่องอันตรายมากๆ...!"
1013505-49 = "เคย์จังน่ารักจังเลย~!!!"
1013505-54 = "[ns] \"เคย์จังน่ารักจังเลย~!!!\""
1013505-55 = "ทำไมถึงเป็นไปกับเขาด้วยล่ะคะ!!!!!"
1013505-56 = "ถ้างั้นก็... ช่วยเอานี่ไปไว้ที่ห้องเรียนอาคารข้างๆ ให้หน่อยได้หรือเปล่า?"
1013505-57 = "อ่า... ค่ะ... เป็นเควสส่งของสินะคะ..."
1013505-58 = "อื้อ แล้วนี่ก็เป็นเควสที่ให้รางวัลล่วงหน้าเลยด้วย นี่ไง ฉันจะให้สร้อยเส้นนี้เป็นรางวัล"
1013505-59 = "...!"
1013505-60 = "สวย... จังเลยค่ะ "
1013505-61 = "ถึงจะไม่ได้ดูฉูดฉาดจนเกินไป แต่อัญมณีที่มีประกายแวววาวคล้ายโครเมียมผสมกับสีน้ำเงิน และสีเหลืองอ่อนๆ นั้นมันช่าง..."
1013505-62 = "ตะ... แต่ดูจะเป็นสร้อยที่มีค่ามากเลย เอามาให้ฉันแบบนี้ได้เหรอคะ?"
1013505-64 = "ได้สิ ได้อยู่แล้ว เราทำสร้อยเส้นนี้จากวัสดุที่เหลือจากการประดิษฐ์ของในชมรมพัฒนาวัสดุใหม่น่ะ"
1013505-65 = "อัญมณีที่เห็นก็เป็นเพชรสังเคราะห์ ถ้าดูจากองค์ประกอบแล้ว มันก็คือก้อนคาร์บอนก้อนหนึ่งเท่านั้นน่ะ"
1013505-67 = "อย่างนั้นสินะคะ... ก็นะ เพชรสังเคราะห์สมัยนี้น้ำดีกว่าเยอะเลยค่ะ"
1013505-69 = "งั้นก็รบกวนด้วยนะ~"
1013505-70 = "ถ้าอยากทำเควสเพิ่มก็มาบอกได้ตลอดเลย!"
1013505-72 = "มะ... ไม่ค่ะ... เท่านี้ก็น่าจะพอแล้วค่ะ..."
1013505-73 = "...?"
1013505-74 = "ก็ว่าอยู่ว่าทำไมตัวเองถึงรู้สึกหงุดหงิดแปลกๆ ตั้งแต่เมื่อกี้แล้ว คุณครูมายืนทำหน้าแบบนี้อยู่ตรงนั้น#nทำไมกันคะ...?"
1013505-75 = "[s] \"เพราะอะไรน้า~\""
1013505-76 = "เพราะอะไรคะ?"
1013505-77 = "[s] \"เพราะได้เห็นภาพที่น่าประทับใจน่ะสิ~\""
1013505-78 = "ฮึ่ยยยยยยย!!!"
1013505-81 = "เฮ้อ... จริงๆ เลยเชียว... ทำไมทุกคนถึงเป็นแต่กับฉัน..."
1013505-82 = "สต็อป สต็อป! ฉันรู้ค่ะว่าจะพูดว่าอะไร จะบอกว่าก็เพราะทุกคนเอ็นดูและห่วงใยฉันใช่มั้ยล่ะคะ?"
1013505-83 = "ฉันไม่ได้ว่าอะไรมากสักหน่อย ทำไมถึงทำหน้ามุ่ยอีกแล้วล่ะคะ...? จริงๆ เลย ผู้ใหญ่คนนี้เนี่ย...!"
1013505-84 = "[s] \"ชีวิตในโรงเรียนโอเคอยู่มั้ย?\""
1013505-85 = "..."
1013505-86 = "ก็... ไม่ได้แย่ค่ะ โอเคอยู่ค่ะ"
1013505-87 = "[s] \"แปลภาษาเคย์ได้ว่า <ชอบมากเลยค่ะ!  ฉันชอบชีวิตแบบนี้ค่ะ>\""
1013505-88 = "พูดอะไรเหลวไหลคะ!!! ทำไมต้องแปลภาษาคนให้เป็นภาษาคนอีกรอบด้วยล่ะคะ!!!"
1013505-89 = "แฮ่ก... แฮ่ก... แฮ่ก..."
1013505-90 = "เอาเถอะค่ะ ตอนนี้ฉันอยู่ระหว่างทำเควส คุณครูไม่ต้องสนใจฉันมากก็ได้ค่ะ"
1013505-91 = "คะ? ก็บอกว่าทำเควสอยู่..."
1013505-92 = "...!!!"
1013505-93 = "วะ... วานให้ช่วย! ถูกวานให้ช่วยงานต่างหากค่ะ!!!!!"
1013505-94 = "ฉันบอกไปแล้วไม่ใช่เหรอคะว่าห้ามยิ้มน้อยยิ้มใหญ่อย่างมีเลศนัยแบบนั้นน่ะ!!!!!"
1013505-95 = "[s] \"ยังไม่เคยบอกเลย!\""
1013505-96 = "งั้นก็ห้ามตั้งแต่ตอนนี้เลยค่ะ!"
1013505-97 = "[s] \"ให้ครูมีสิทธิ์ในการแสดงออกเถอะนะ!\""
1013505-98 = "คุณครูไม่ได้สิทธิ์นั้นค่ะ!"
1013505-99 = "อ๊ะ เคย์นี่นา มีเรื่องอะไรเหรอ?"
1013505-106 = "หืม...? มาได้จังหวะพอดีเลยค่ะ พอดีฉันได้รับเควส... ฉันถูกวานให้เอาอันนี้มาให้ค่ะ"
1013505-107 = "ไหนดูซิ... อ้อ ได้ผลลัพธ์สักทีสินะ คุณสมบัติการนำยิ่งยวดของสารประกอบโลหะในครั้งนี้..."
1013505-108 = "แต่ผลแบบนี้ก็ส่งให้กันทางอินเทอร์เน็ตได้ไม่ใช่เหรอคะ?"
1013505-109 = "ถ้าเป็นเรื่องทั่วไปก็คงทำแบบนั้น แต่เรื่องนี้น่ะไม่ได้หรอก"
1013505-110 = "ทำไมล่ะคะ?"
1013505-111 = "เป็นเรื่องของความปลอดภัยน่ะ ผลลัพธ์นี้รู้ได้แค่ชมรมของเราเท่านั้น! จะเปิดเผยความลับสุดยอดให้#nชมรมอื่นรู้ไม่ได้!"
1013505-112 = "ข้อเสียสองอย่างของอินเทอร์เน็ตก็คือ ช่องโหว่ด้านความปลอดภัยและระยะเวลาการเก็บรักษาข้อมูล#nยังไงล่ะ!"
1013505-113 = "อ่า มันก็จริงอย่างที่ว่าค่ะ แล้วมันก็เป็นเหตุผลที่ทำให้การทิ้งไดรฟ์เทปเป็นเรื่องยากด้วยค่ะ"
1013505-114 = "ถ้ามีงบมากพอ ฉันก็อยากใช้คริสตัลดาต้าดิสก์แล้วบันทึกข้อมูลทั้งหมดอยู่หรอก... แต่ก็นะ... แบบนั้นคงเป็นไปไม่ได้น่ะ"
1013505-115 = "เอาละ ในเมื่อเคย์เหนื่อยกับการทำเควสมา งั้นเราไปร้านเกมด้วยกันมั้ย?"
1013505-116 = "คะ... คะ? คือว่า..."
1013505-117 = "หืม? ทำไมล่ะ? แต่ก่อนเห็นชอบออกไม่ใช่เหรอ?"
1013505-118 = "ก็นั่นมันแต่ก่อนนี่คะ! ตอนนี้น่ะ คือว่า..."
1013505-119 = "[s] \"อ้อ! เคย์จังก็ชอบเล่นเกมสินะ!\""
1013505-120 = "ใช่ค่ะ คุณครู! ถ้าคุณครูได้ไปเห็นละก็ ต้องตกใจแน่ๆ ค่ะ"
1013505-121 = "ไม่ใช่นะคะ! เรื่องนั้นน่ะ ฉันก็แค่...!"
1013505-122 = "หืม...? แสดงว่าตอนนั้นไม่ได้ชอบเท่าไร แต่ก็ฝืนตัวเองมาเล่นกับพวกเรางั้นเหรอ...?"
1013505-123 = "ไม่ใช่ค่ะ!"
1013505-127 = "[ns] \"ตกลงเป็นแบบไหนน้า~? เคย์จัง~?\""
1013505-128 = "ฮะ... ฮึ่ยยย...!"
1013505-130 = "ผู้ใหญ่เจ้าเล่ห์ ทำเป็นไขสือทั้งที่รู้ทุกอย่างดีอยู่แล้ว!!!!!"
