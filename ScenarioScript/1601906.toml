[translation]
1601906-1 = "黎明偵察"
1601906-2 = "──當然，我們的防禦系統不會有漏洞。#n畢竟這可是由莉央大人親手建構的。"
1601906-3 = "不過還是必須時刻為意料之外的事態做好準備。"
1601906-4 = "而且這裡在各種意義上，都是常識難以作用的地方。"
1601906-5 = "[s] 「季果然很可靠呢。」"
1601906-6 = "謝謝您的讚美。"
1601906-7 = "而且黎明偵察還有另一個理由。"
1601906-8 = "[s] 「是什麼理由？」"
1601906-9 = "您很快就會知道了。"
1601906-17 = "現在時間正好。"
1601906-21 = "請看，老師。#n太陽正從那邊升起。"
1601906-25 = "― [log=토키 결전]真是美麗的朝霞呢。[/log][wa:2140] "
1601906-27 = "― [log=토키 결전]在這裡的每一天，都能觀測到這樣的景色。[/log][wa:2140] "
1601906-30 = "― [log=토키 결전]話雖如此，由於只有來到這裡之後[/log][wa:1810] "
1601906-32 = "― [log=토키 결전]幾天份的記錄……[/log][wa:1030] "
1601906-35 = "― [log=토키 결전]或許不是每天都有也說不定。[/log][wa:1040] "
1601906-38 = "[ns] 「真壯觀呢。」"
1601906-40 = "― [log=토키 결전]是的。不過，從這裡看的話[/log][wa:3560] "
1601906-42 = "― [log=토키 결전]感覺顏色完全不同。[/log][wa:1090] "
1601906-45 = "― [log=토키 결전]無論是天空……[/log]"
1601906-47 = "― [log=토키 결전]還是閃耀著橙色的大地……[/log][wa:1030] "
1601906-50 = "― [log=토키 결전]我，喜歡像這樣和老師共享景色的時光。[/log][wa:4020] "
1601906-52 = "― [log=토키 결전]將令人心動的事物傳達出去的這個時刻……[/log][wa:3830] "
1601906-55 = "― [log=토키 결전]這個瞬間，只存在於此時此刻。[/log][wa:4330] "
1601906-57 = "― [log=토키 결전]並且再也不會重現。[/log][wa:1550] "
1601906-60 = "― [log=토키 결전]老師。[/log][wa:2550] "
1601906-62 = "― [log=토키 결전]如果現在，「最後」的時刻到來的話──[/log][wa:2010] "
1601906-65 = "― [log=토키 결전]我，能成為在老師身邊共度那個瞬間的……[/log][wa:3690] "
1601906-67 = "― [log=토키 결전]「最後」的那個人嗎？[/log][wa:1050] "
1601906-70 = "[ns] 「這就是季喜歡上的風景呢。」"
1601906-71 = "是的。"
1601906-72 = "當然，我明白這是種矛盾的感情。"
1601906-73 = "這裡毫無疑問是敵陣。"
1601906-74 = "那些乍看之下不錯的東西，也可能在下一秒為我們帶來致命的結果。"
1601906-75 = "但是……我再次感受到，人類真是種任性的生物呢。"
1601906-76 = "無論身處的情況多麼荒謬……只要自己覺得好，就會情不自禁地以那種方式看待。"
1601906-77 = "[s] 「能夠發現並感受到美，這不是件好事嗎？」"
1601906-81 = "[ns1] 「也算是『無論在什麼情況下都不會放棄希望』──」\n[ns2] 「這種精神的另一項證據吧。」"
1601906-84 = "……原來如此。"
1601906-85 = "咦？不過「最後的瞬間」或「最後的一個人」這種表達聽起來有點可怕？"
1601906-86 = "……"
1601906-87 = "仔細想想，或許確實如此呢。"
1601906-88 = "不過沒關係的。老師身邊有我在。"
1601906-89 = "我無論如何都絕對會阻止那種事情發生。"
1601906-90 = "也是為了達成這個目標，我才會身穿這樣的武裝站在這裡。"
1601906-94 = "哎呀，朝霞已經結束了呢。#n美好的時光過得還真快。"
1601906-95 = "……"
1601906-97 = "要是能夠抓住時間，那該有多好啊。"
1601906-98 = "那樣我就能將最閃耀的瞬間──"
1601906-99 = "收集在不會被任何人奪走的地方，永遠保存下去了。"
1601906-101 = "[ns3] 「是啊。如果能做到一定很棒吧。」\n[ns4] 「不過至少我們現在就在彼此身邊，不是嗎？」"
1601906-104 = "……"
1601906-105 = "確實是呢。#n至少老師您……"
1601906-106 = "我和老師……"
1601906-107 = "……"
1601906-108 = "老師。"
1601906-109 = "[s] 「嗯？」"
1601906-110 = "能請您暫時保持不動嗎？"
1601906-114 = "（話才剛剛說完……）"
1601906-120 = "（下一秒，季便輕輕地抱了過來……！）"
1601906-121 = "[ns] 「季，季！？！？」"
1601906-122 = "噓。可能會吵醒其他人的。"
1601906-123 = "只要一下下就好，老師。#n真的只要一下下。"
1601906-125 = "……"
1601906-126 = "與抓住時間相比，我更希望……"
1601906-127 = "嗯……"
1601906-131 = "謝謝您，老師。"
