[translation]
1601906-1 = "Early Morning Recon"
1601906-2 = "...Of course, any defense system possesses vulnerabilities. This was established by Ms. Rio, of all people."
1601906-3 = "But we must always be prepared for unexpected situations."
1601906-4 = "On top of that, this is a special place where common sense doesn't apply, in many ways."
1601906-5 = "[s] \"You're so reliable, Toki.\""
1601906-6 = "Thank you for acknowledging that."
1601906-7 = "And there's another reason for the early morning recon."
1601906-8 = "[s] \"And what would that be?\""
1601906-9 = "You'll find out soon enough."
1601906-17 = "Yes. This seems perfect."
1601906-21 = "Look, Sensei. Even here, the morning sun rises."
1601906-25 = "― [log=토키 결전]What a pretty sunrise.[/log][wa:1620] "
1601906-27 = "― [log=토키 결전]We see this view daily here.[/log][wa:1780] "
1601906-30 = "― [log=토키 결전]Although, we only have a few records [/log][wa:930] "
1601906-32 = "― [log=토키 결전]logged since we got here...[/log][wa:270] "
1601906-35 = "― [log=토키 결전]So it may not be EVERY day.[/log][wa:480] "
1601906-38 = "[ns] \"It's incredible.\""
1601906-40 = "― [log=토키 결전]Yes. Still, the color feels completely [/log][wa:2480] "
1601906-42 = "― [log=토키 결전]different here. [/log][wa:810] "
1601906-45 = "― [log=토키 결전]The sky...[/log]"
1601906-47 = "― [log=토키 결전]and even the land glows orange.[/log][wa:270] "
1601906-50 = "― [log=토키 결전]I enjoy these moments where I can share the scenery with Sensei.[/log][wa:2180] "
1601906-52 = "― [log=토키 결전]I like being able to share my experiences with you.[/log][wa:2550] "
1601906-55 = "― [log=토키 결전]This moment only exists right now.[/log][wa:3530] "
1601906-57 = "― [log=토키 결전]And it will never return.[/log][wa:910] "
1601906-60 = "― [log=토키 결전]Sensei.[/log][wa:2390] "
1601906-62 = "― [log=토키 결전]If the \"final\" moment were to come right now...[/log][wa:850] "
1601906-65 = "― [log=토키 결전]Would I be capable of being the \"final\" person[/log][wa:2610] "
1601906-67 = "― [log=토키 결전]to stand by your side?[/log][wa:570] "
1601906-70 = "[ns] \"So, you enjoy this scenery.\""
1601906-71 = "Correct."
1601906-72 = "Of course, I'm also aware of the paradox."
1601906-73 = "We are in enemy territory..."
1601906-74 = "Any act could be fatal."
1601906-75 = "But...I also have a self-centered thought."
1601906-76 = "No matter how absurd the situation may be, one must acknowledge if they find joy in it."
1601906-77 = "[s] \"Isn't being able to find and feel beauty a wonderful thing?\""
1601906-81 = "[ns1] \"That...we must keep looking and observing.\"\n[ns2] \"It shows hope for the future.\""
1601906-84 = "...I see."
1601906-85 = "What? You felt that my thoughts on finality were \"overly dramatic\"?"
1601906-86 = "..."
1601906-87 = "If that's your perspective, then you may have a point."
1601906-88 = "But that's all right. After all, I'm next to you, Sensei."
1601906-89 = "Above all, I'll make sure nothing so drastic ever happens to you."
1601906-90 = "That's why I'm fully armed with these two pistols. See? They are always ready, like me."
1601906-94 = "Oh dear. The sun has already risen. Time truly flies when I'm with you."
1601906-95 = "..."
1601906-97 = "I wish I could catch \"time.\" I would like to keep it close and safe, held in my hands."
1601906-98 = "If I could do that, I would capture only the most brilliant moments."
1601906-99 = "And I would carry them with me forever. I'd keep them safe, in a place where no one could ever take them from me."
1601906-101 = "[ns3] \"Yeah. If only that were possible.\"\n[ns4] \"But still, we're here together right now, aren't we?\""
1601906-104 = "..."
1601906-105 = "Yes. That's right. At least I'm with Sensei..."
1601906-106 = "Me, and Sensei..."
1601906-107 = "..."
1601906-108 = "Sensei."
1601906-109 = "[s] \"Hm?\""
1601906-110 = "For this moment, could you stay just the way you are? Do not move, please."
1601906-114 = "After saying that, Toki..."
1601906-120 = "...carefully approached and nestled into my arms...!"
1601906-121 = "[ns] \"T-Toki?!\""
1601906-122 = "Shh. You might wake the others."
1601906-123 = "Just a moment will do, Sensei. Just a moment with you, all my own."
1601906-125 = "..."
1601906-126 = "Instead of catching time, yes. This is better."
1601906-127 = "Yes..."
1601906-131 = "Thank you, Sensei."
