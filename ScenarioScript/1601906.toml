[translation]
1601906-1 = "การลาดตระเวนยามรุ่งสาง"
1601906-2 = "แน่นอนว่าระบบป้องกันของเราไม่มีช่องโหว่ใดๆ ทั้งสิ้นค่ะ เพราะว่านั่นเป็นระบบป้องกันที่สร้างโดย#nท่านริโอะค่ะ"
1601906-3 = "แต่ถึงยังไง เราก็ต้องเตรียมพร้อมสำหรับสถานการณ์ที่ไม่คาดฝันอยู่เสมอ"
1601906-4 = "แล้วสถานที่นี้ก็ทำความเข้าใจด้วยสามัญสำนึกทั่วไปไม่ได้ด้วยค่ะ"
1601906-5 = "[s] \"มีโทคิอยู่ด้วยแล้วอุ่นใจจริงๆ เลยนะ\""
1601906-6 = "ขอบคุณค่ะ"
1601906-7 = "นอกจากนี้ยังมีเหตุผลอื่นที่ฉันออกมาลาดตระเวนยามรุ่งสางด้วยค่ะ"
1601906-8 = "[s] \"มันคืออะไรเหรอ?\""
1601906-9 = "อีกเดี๋ยวก็รู้ค่ะ"
1601906-17 = "ค่ะ ดีจังเลยนะคะ"
1601906-21 = "ดูสิคะ คุณครู ที่นี่ก็มีดวงอาทิตย์ขึ้นยามเช้าเหมือนกันค่ะ"
1601906-25 = "― [log=토키 결전]เป็นแสงรุ่งอรุณที่สวยจังเลยนะคะ[/log][wa:1260] "
1601906-27 = "― [log=토키 결전]ฉันเห็นวิวทิวทัศน์แบบนี้ จากที่นี่ทุกวันเลยค่ะ [/log][wa:1020] "
1601906-30 = "― [log=토키 결전]แต่ถึงยังไงก็มีบันทึกของที่นี่ [/log][wa:1170] "
1601906-32 = "― [log=토키 결전]แค่สองสามวันเท่านั้น[/log][wa:550] "
1601906-35 = "― [log=토키 결전]งั้นก็อาจจะไม่ใช่ทุกวันก็ได้ค่ะ[/log][wa:320] "
1601906-38 = "[ns] \"สวยจังเลยนะ\""
1601906-40 = "― [log=토키 결전]ค่ะ แต่ถึงยังไง ฉันก็รู้สึกว่า[/log][wa:2840] "
1601906-42 = "― [log=토키 결전]สีสันของที่นี่มันต่างออกไปค่ะ [/log][wa:250] "
1601906-45 = "― [log=토키 결전]ทั้งสีท้องฟ้า[/log]"
1601906-47 = "― [log=토키 결전]และผืนดินที่เป็นประกายสีส้ม...[/log][wa:310] "
1601906-50 = "― [log=토키 결전]ฉันชอบช่วงเวลาที่ได้ชมวิวทิวทัศน์กับคุณครูแบบนี้ค่ะ[/log][wa:2700] "
1601906-52 = "― [log=토키 결전]ฉันชอบการที่ฉันส่งต่อความรู้สึกที่มีต่อคุณครูได้ค่ะ[/log][wa:2550] "
1601906-55 = "― [log=토키 결전]ช่วงเวลานี้มีอยู่จริงแค่ในปัจจุบันขณะเท่านั้นค่ะ [/log][wa:2930] "
1601906-57 = "― [log=토키 결전]อีกอย่าง มันก็คงไม่กลับมาอีกแล้วค่ะ[/log][wa:510] "
1601906-60 = "― [log=토키 결전]คุณครู[/log][wa:2430] "
1601906-62 = "― [log=토키 결전]ถ้า 'ช่วงเวลาสุดท้าย' มาถึงในตอนนี้[/log][wa:1330] "
1601906-65 = "― [log=토키 결전]ฉันขอเป็น 'คนสุดท้าย' ที่จะอยู่ในช่วงเวลานี้[/log][wa:2690] "
1601906-67 = "― [log=토키 결전]ข้างๆ กับคุณครูได้มั้ยคะ?[/log][wa:450] "
1601906-70 = "[ns] \"นี่คือทิวทัศน์ที่โทคิชอบสินะ\""
1601906-71 = "ใช่ค่ะ"
1601906-72 = "ฉันรู้ดีว่านี่เป็นอารมณ์ที่ขัดแย้งในตัวเองค่ะ"
1601906-73 = "เพราะที่นี่คือดินแดนของศัตรู และสิ่งที่ดูดีในสายตาของเราตอนนี้"
1601906-74 = "ในชั่วพริบตาถัดไป อาจนำไปสู่ผลร้ายแรงถึงชีวิตก็ได้ค่ะ"
1601906-75 = "ถึงนี่จะเป็นความรู้สึกที่ฉันเพิ่งมารู้สึกเอาป่านนี้ แต่ทำไมมนุษย์ถึงได้เอาแต่ใจแบบนี้กันนะคะ?"
1601906-76 = "ไม่ว่าสถานการณ์จะไม่สมเหตุสมผลแค่ไหน แต่ถ้าตัวเองรู้สึกดีขึ้นมา ก็มักจะทึกทักเอาเองว่ามันเป็น#nแบบนั้นไปน่ะค่ะ"
1601906-77 = "[s] \"การได้ค้นพบและสัมผัสความสวยงามคือเรื่องดีไม่ใช่เหรอ?\""
1601906-81 = "[ns1] \"นั่นคือ... หลักฐานว่าเราควรมีความหวังในทุกสถานการณ์น่ะ\"\n[ns2] \"นั่นคือหลักฐานว่าในทุกๆ สถานการณ์ คนเราต้องมีความหวังกันน่ะ\""
1601906-84 = "อย่างนั้นสินะคะ..."
1601906-85 = "คะ? แต่พอได้ยินคำว่า 'ช่วงเวลาสุดท้าย' หรือ 'คนสุดท้าย' ก็รู้สึกกลัวขึ้นมานิดหน่อยงั้นเหรอคะ? "
1601906-86 = "..."
1601906-87 = "พอมาคิดดู ก็อาจจะเป็นอย่างนั้นได้นะคะ"
1601906-88 = "แต่ไม่เป็นไรหรอกค่ะ ก็ข้างๆ คุณครูมีฉันอยู่นี่คะ"
1601906-89 = "สิ่งสำคัญที่สุดก็คือ ฉันจะทำให้มั่นใจว่าเรื่องแบบนั้นจะไม่เกิดขึ้นค่ะ"
1601906-90 = "ที่ฉันมาที่นี่พร้อมอาวุธแบบนี้ ก็เพื่อการนั้นค่ะ"
1601906-94 = "ตายจริง ดูเหมือนแสงรุ่งอรุณจะจางไปแล้วนะคะ ช่วงเวลาดีๆ ช่างผ่านไปเร็วเหลือเกินค่ะ"
1601906-95 = "..."
1601906-97 = "ถ้าฉันหยุดเวลาเอาไว้ได้ ก็คงจะวิเศษเลยนะคะ"
1601906-98 = "ถ้าทำอย่างนั้นได้ ฉันคงเลือกเก็บแต่ช่วงเวลาที่เปล่งประกายที่สุด"
1601906-99 = "แล้วรวบรวมไว้ในที่ที่ไม่มีใครแย่งเอาไปได้ และพกมันติดตัวไปให้นานเท่าที่ฉันต้องการเลยนะคะ"
1601906-101 = "[ns3] \"นั่นสินะ ถ้าทำได้อย่างนั้นก็คงจะดีมากเลย\"\n[ns4] \"แต่อย่างน้อยตอนนี้เราก็อยู่ด้วยกันที่นี่แล้วไม่ใช่เหรอ?\""
1601906-104 = "..."
1601906-105 = "ค่ะ นั่นสิคะ อย่างน้อยก็มีคุณครู..."
1601906-106 = "ฉันกับคุณครู..."
1601906-107 = "..."
1601906-108 = "คุณครูคะ"
1601906-109 = "[s] \"หืม?\""
1601906-110 = "ช่วยอยู่แบบนี้ต่ออีกหน่อยได้มั้ยคะ?"
1601906-114 = "(เมื่อพูดจบ โทคิก็เข้ามา)"
1601906-120 = "(และค่อยๆ กอดคุณครูอย่างอ่อนโยน...!)"
1601906-121 = "[ns] \"ทะ... โทคิ?!?!\""
1601906-122 = "ชู่ว เดี๋ยวคนอื่นตื่นนะคะ"
1601906-123 = "แค่เดี๋ยวเดียวเท่านั้นค่ะ คุณครู แค่เดี๋ยวเดียว"
1601906-125 = "..."
1601906-126 = "ถ้าฉันหยุดเวลาไม่ได้ ก็ขอทำแบบนี้แทน..."
1601906-127 = "ค่ะ..."
1601906-131 = "ขอบคุณนะคะ คุณครู"
