[translation]
90101010-1 = "第1話;恨み晴らさでおくべきか"
90101010-2 = "鐘崎港第4埠頭"
90101010-5 = "はぁっ、はぁっ……。"
90101010-6 = "早く……早く逃げねぇと。"
90101010-7 = "あいつら正気じゃねぇ。#nでなきゃ「あんなもん」に手を出すわけが……。"
90101010-8 = "返済がちょっと遅れたけどよ……わざとじゃなかったんだ……！"
90101010-9 = "あの程度の額でここまでやるか普通！？"
90101010-10 = "たしかに大した金額じゃないよな。#nだがそれは――"
90101010-15 = "それすら用意できないヤツの台詞じゃあねぇよなぁ？"
90101010-16 = "ひっ、ひいっ……！？"
90101010-17 = "す、すみません！今のは、その――"
90101010-18 = "ああ、謝らなくていい。"
90101010-19 = "今のが本音だろうが、強がりだろうが、どうでもいい。"
90101010-20 = "だが……「見せしめ」は必要だ。#nどんな額だろうが、返済しないヤツの末路を見せてやらんとな。"
90101010-21 = "み、見せしめって……まさか……。"
90101010-22 = "ああ、知ってるのか？#nなら話は早いな。"
90101010-27 = "お前には、このドラム缶に入ってもらう。"
90101010-28 = "こいつら食い意地張ってるからな。満足するまで止まらないんだが……。"
90101010-29 = "さて……今回はどれくらい持つかな？"
90101010-33 = "は、はは……なぁ、冗談だろ？冗談だって言ってくれよ！"
90101010-34 = "なんでも食っちまうって噂の「化け蟹」がドラム缶にいるわけじゃないよなぁ！？"
90101010-35 = "さあな。"
90101010-36 = "それは自分で確かめてくれ。"
90101010-41 = "まっ、待てっ！借りた金の3倍……いや、5倍払う！"
90101010-47 = "頼む、やめてくれ！「ドラム缶」だけは――！"
90101010-49 = "次回;カニ味魚肉ソーセージ"
