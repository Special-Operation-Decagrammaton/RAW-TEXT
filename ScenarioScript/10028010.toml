[translation]
10028010-1 = "ตอนที่ 1;รถไฟสายเกเฮนน่า 15:10 น."
10028010-50 = "...เชิญเลยค่ะ"
10028010-57 = "ขอเสียมารยาทหน่อยนะคะ~ รุ่นพี่ฮาสุมิ เรียกหาฉันเหรอคะ?"
10028010-58 = "ค่ะ อิจิกะ มาตรงเวลาเลยนะคะ "
10028010-59 = "หลับสบายดีมั้ยคะ? ขอโทษที่เรียกมาตั้งแต่เช้านะคะ"
10028010-60 = "ไม่เป็นไรค่ะ ไม่ติดอะไรเลยค่ะ! พอดีว่าฉันนอนหลับสบาย~ เต็มตื่นมาแล้วละค่ะ! ฮ่าฮ่า!"
10028010-61 = "แต่การที่รุ่นพี่เรียกฉันมาตั้งแต่เช้าตรู่แบบนี้... คงจะมีเรื่องอะไรใช่มั้ยคะ?"
10028010-62 = "ที่จริงก็ไม่ได้มีเหตุการณ์สำคัญอะไรเกิดขึ้นหรอกค่ะ แต่ว่าถ้าบอกว่ามี 'เรื่อง' ก็คงจะถูกค่ะ"
10028010-63 = "ฉันลองหารือกับซึรุกิดูแล้ว และคิดว่าอิจิกะเหมาะสมกับงานนี้ที่สุดค่ะ"
10028010-64 = "คะ? หารือกับรุ่นพี่ซึรุกิ...? และฉันคือ 'คนที่เหมาะสมที่สุด'... งั้นเหรอคะ? "
10028010-65 = "งานที่ว่าคืองานอะไรกันแน่..."
10028010-66 = "อ่า ฉันไม่ได้พูดให้กดดันหรอกนะคะ และงานนั้นก็ไม่ได้อันตรายหรือยากอะไรด้วยค่ะ"
10028010-67 = "พอดีเรามีกระเป๋าสำคัญอยู่ใบหนึ่ง และเราแค่ต้องไปรับมาแล้วนำไปส่งให้สภาน้ำชา... ภายในวันนี้ค่ะ"
10028010-68 = "แต่ว่าตอนนี้กระเป๋าใบนั้นอยู่ในที่ที่ห่างไกลจากเขตปกครองตนเองทรีนิตี้ไม่น้อยเลย..."
10028010-69 = "พวกฉันก็เลยคิดว่าคนอัธยาศัยดีที่เข้ากับนักเรียนในเขตปกครองตนเองอื่นได้ดีอย่างอิจิกะน่าจะเหมาะ#nที่สุดสำหรับงานนี้ค่ะ"
10028010-70 = "ขืนให้ฉันหรือซึรุกิเป็นฝ่ายไปเอง... การส่งอิจิกะไปน่าจะทำให้ทำงานได้อย่างราบรื่นและยืดหยุ่นมาก#nกว่าค่ะ"
10028010-71 = "อ้อ~ เข้าใจแล้วค่ะ นึกว่าจะมีเรื่องอะไรใหญ่โตเสียอีก... ไหว้วานฉันไปทำธุระแทนสินะคะ?"
10028010-72 = "จะมองอย่างนั้นก็ได้ แต่ก็อย่างที่บอกไปค่ะว่านี่คืองาน 'สำคัญ' มากกว่าจะเป็นการไหว้วานทั่วไป"
10028010-73 = "ของที่อยู่ในกระเป๋าคือวัตถุโบราณชิ้นสำคัญของสภาน้ำชากับทรีนิตี้น่ะค่ะ"
10028010-75 = "คุณนางิสะจากสภาน้ำชาถึงกับออกปากเองว่าให้เราไปเอามาเลยค่ะ..."
10028010-76 = "ถ้าจะให้สรุปแล้วละก็..."
10028010-83 = "...มันเป็นวัตถุโบราณชิ้นสำคัญที่ \"ส่งผลกระทบต่อปณิธานทางการเมืองของสภาน้ำชา\" ได้เลยค่ะ"
10028010-88 = "เมื่อกี้ฉันต้องขออภัยด้วยนะคะที่มองว่าเป็นการไหว้วานให้ไปทำธุระแทน"
10028010-89 = "...อ่า"
10028010-90 = "แล้วก็มีอีกอย่างค่ะ..."
10028010-91 = "นี่อาจจะสำคัญพอๆ กับกระเป๋าใบนั้นได้เลย..."
10028010-95 = "ตอนที่ได้กระเป๋าคืนแล้วเดินทางกลับมา อิจิกะจะได้นั่งรถไฟขบวนเดียวกันกับคุณครูค่ะ"
10028010-96 = "ถ้าไม่ติดอะไรละก็... ระหว่างทางกลับ ช่วยคุ้มกันคุณครูให้กลับมาอย่างปลอดภัยจะได้หรือเปล่าคะ?"
10028010-97 = "พอดีว่าคุณครูมาช่วยพวกฉันในการขุดค้นวัตถุโบราณชิ้นนั้นน่ะค่ะ"
10028010-98 = "ส่วนตัวฉันคิดว่าอย่างน้อยก็อยากให้คุณครูได้เดินทางกลับมาอย่างสะดวกสบายค่ะ"
10028010-102 = "...คะ?"
10028010-103 = "คุณครูเหรอคะ? ...คุณครูอยู่ที่นั่นเหรอคะ?"
10028010-104 = "แต่นี่ไม่ใช่คำสั่งหรอกนะคะ คำสั่งจากฉันในฐานะชมรมทวงความยุติธรรมมีแค่เรื่องกระเป๋าค่ะ"
10028010-105 = "หากว่าเรื่องอย่างหลังเป็นการรบกวนงานแม้เพียงเล็กน้อย ก็ไม่ต้องทำก็ได้ค่ะ"
10028010-111 = "อิจิกะคิดว่ายังไงบ้างคะ... พอจะไหวมั้ยคะ?"
10028010-112 = "ฮืม..."
10028010-113 = "ค่ะ เอาเป็นว่าฉันเข้าใจแล้วค่ะ สักครู่นะคะ ขอฉันคิดหน่อย..."
10028010-114 = "คุณครู... คุณครูงั้นเหรอ..."
10028010-115 = "กระเป๋า... คุณครู... รถไฟ... อืม..."
10028010-116 = "...ฮิฮิ"
10028010-117 = "ก็ไม่เลวนะคะ? ขากลับจะได้มีเพื่อนคุยด้วย ฉันก็อยากเจอกับคุณครูอย่างเป็นกิจจะลักษณะมานานแล้ว#nด้วย"
10028010-118 = "อืม..."
10028010-119 = "คงไม่มีปัญหาอะไรหรอกค่ะ ก็แค่เอากระเป๋ากลับมาให้ได้"
10028010-125 = "งั้นก็วางใจฉันได้เลยค่ะ!!"
10028010-127 = "...และนั่นก็เป็นเรื่องของเมื่อเช้านี้ค่ะ~"
10028010-128 = "ฮึบ!"
10028010-185 = "ฮู่วว~"
10028010-186 = "นี่คือของชิ้นสุดท้ายแล้วสินะคะ! ไม่ได้เสียเหงื่อแบบนี้มานานแล้วเลย!"
10028010-187 = "คุณครูก็คงเหนื่อยมากเลยด้วย ขอบคุณนะคะ ฉันขอขอบคุณแทนชมรมทวงความยุติธรรม... ไม่สิ ขอบคุณแทนทรีนิตี้ด้วยนะคะ"
10028010-188 = "ปกติฉันไม่ได้มีโอกาสในการเป็นตัวแทนอะไรหรอก... แต่ในเมื่อวันนี้สถานการณ์มันบังคับ!"
10028010-189 = "ฉันก็เลยต้องแสดงภาพลักษณ์ดีๆ ให้เห็นค่ะ! ฮ่าฮ่า!"
10028010-190 = "[s1] \"อิจิกะก็ทำได้ดีมากเลยนะ\"\n[s2] \"อิจิกะก็เดินทางมาไกลและลำบากก็เหมือนกันแหละ\""
10028010-193 = "ไม่หรอกค่ะ~ ไม่ได้ลำบากอะไรเลยค่ะ คนที่ทำงานอย่างลำบากคือคุณครูกับทีมขุดค้นต่างหากล่ะคะ"
10028010-194 = "งานของฉันมีแค่มาเอาของที่ขุดค้นได้ และไหนๆ ก็มาแล้วก็เลยช่วยจัดการอะไรนิดหน่อยเท่านั้นเอง..."
10028010-195 = "จะว่าไปก็แปลกดีนะคะ <ชุดถ้วยชาที่เคยใช้ในการประชุมครั้งแรกของสภาน้ำชา> งั้นเหรอ"
10028010-196 = "นี่เป็นของสืบทอดสำคัญของโรงเรียนเลยนะคะเนี่ย แถมยังอยู่ในสภาพดี ไม่มีรอยแตกหักอะไรด้วย"
10028010-197 = "แล้วก็ยังมาอยู่ในพื้นที่ห่างไกลของเขตปกครองตนเองทรีนิตี้เสียขนาดนี้..."
10028010-198 = "...คะ?"
10028010-199 = "อ้อ คุณครูรู้ว่าเป็นชุดถ้วยชาที่สำคัญ แต่ก็ไม่รู้ว่ามีความหมายที่ชัดเจนว่าอย่างไรงั้นเหรอคะ?"
10028010-200 = "ฮ่าฮ่า คนในสภาน้ำชานี่ก็นะ... ขอร้องให้ช่วยงานแบบนี้ แล้วทำไมไม่อธิบายให้ชัดเจนก็ไม่รู้..."
10028010-201 = "ก็นะ ในเมื่อมันไม่ได้เป็นความลับสุดยอดหรืออะไรที่ฉันไม่ควรบอก... อืม~"
10028010-202 = "...มันเป็นเรื่องของ 'ความถูกต้องตามทำนองคลองธรรม' น่ะค่ะ"
10028010-203 = "คุณครูก็อาจจะรู้ดีว่าหมู่นี้มีเรื่องราวเกิดขึ้นมากมาย คนในสภาน้ำชาก็เลยเหมือนจะคุยกับคนจากชมรม#nอัศวินบรรเทาทุกข์และชมรมซิสเตอร์ได้ไม่สะดวกใจมากขึ้นค่ะ"
10028010-204 = "การค้นพบวัตถุโบราณแบบนี้ในสถานการณ์นี้มันเป็นเรื่องใหญ่เลยไม่ใช่เหรอคะ? เพราะเราสามารถ#nบอกได้ว่า 'เรามีต้นกำเนิด และเราก็อยู่กันมานานขนาดนี้'"
10028010-205 = "เพราะแบบนี้ทางสภาน้ำชาก็เลยขอให้คุณครูมาเข้าร่วมในการขุดค้นแบบนี้ยังไงล่ะคะ "
10028010-206 = "และที่ส่งฉันมาที่นี่ตั้งแต่แรกก็เพื่อให้ฉันมาช่วยเหลืองานของคุณครูด้วย"
10028010-207 = "...ก็เลย! สรุปได้ว่า~"
10028010-208 = "วันนี้ทั้งวัน ฉันจะช่วยทำทุกอย่าง~ ที่คุณครูขอเลยละ~!"
10028010-209 = "เข้าใจมั้ยคะ? โอกาสแบบนี้ไม่ได้มีบ่อยๆ นะคะ เพราะงั้นถ้ามีเรื่องจะสั่งให้ทำ ก็สั่งมาได้เลยค่ะ! ไม่ต้องเกรงใจ~"
10028010-210 = "เพราะยังไงฉันก็มาที่นี่เพื่อคุณครูอยู่แล้ว!"
10028010-211 = "[s3] \"ได้ยินแบบนี้ก็อุ่นใจ ขอบใจนะ อิจิกะ\"\n[s4] \"งั้นก็ขอติดหนี้บุญคุณหน่อยแล้วกันนะ\""
10028010-214 = "ฮุฮุฮุ ได้ฟังคำแบบนี้จากคุณครูแล้วรู้สึกดีเลยนะคะเนี่ย! ตัดสินใจไม่ผิดจริงๆ ค่ะที่มา"
10028010-215 = "ฉันเคยคิดว่าอยากทำงานด้วยกันกับคุณครูสักครั้งน่ะค่ะ"
10028010-216 = "ทั้งรุ่นพี่ซึรุกิ รุ่นพี่ฮาสุมิ รวมทั้งมาชิโระเองต่างก็เล่าเรื่องของคุณครูให้ฟังเยอะเลย..."
10028010-217 = "...อ่า ไม่ต้องกังวลอะไรไปหรอกนะคะ~ พวกนั้นเล่าแต่เรื่องดีๆ ค่ะ"
10028010-218 = "ก็อย่างเช่น คุณครูเป็นคนดี เป็นคนที่จิตใจอบอุ่น... ประมาณนี้น่ะค่ะ"
10028010-219 = "พอได้ยินเรื่องแบบนั้นมากๆ เข้า ฉันก็เลยสงสัยขึ้นมาว่าถ้าได้ทำงานด้วยกันจะรู้สึกยังไง อีกใจหนึ่งก็#nแอบหวังด้วยค่ะ"
10028010-220 = "แต่ว่างานส่วนใหญ่ที่ฉันได้รับผิดชอบมันไม่ค่อยมีโอกาสได้เจอคุณครูเท่าไร..."
10028010-221 = "...คะ?"
10028010-222 = "ให้ฉันติดต่อหาได้ตามสบายทุกเมื่อเลยเหรอคะ?"
10028010-223 = "แหะๆ..."
10028010-224 = "ขอบคุณที่บอกอย่างนั้นนะคะ แต่ฉันก็ไม่ได้อยากเป็นเด็กที่คอยหาเรื่องให้คุณครูรำคาญใจหรอกค่ะ"
10028010-225 = "ถึงคุณครูจะบอกว่าไม่เป็นไร แต่ถ้าอยู่ในสถานการณ์แบบนั้นก็คงถูกมองว่าไปทำให้รำคาญใจนี่คะ?"
10028010-226 = "...ฉันแค่จะบอกว่า 'ฉันไม่อยากเป็นเด็กเอาแต่ใจที่มีแต่เรื่องเรียกร้อง' ค่ะ"
10028010-227 = "ไว้ถ้ามีโอกาสแบบนี้อีกฉันค่อย..."
10028010-228 = "ใส่ความรู้สึกส่วนตัวลงไปด้วยนิดหน่อย?"
10028010-232 = "ฮ่าฮ่า..."
10028010-233 = "ฉันเผลอพูดอะไรแปลกๆ ไปซะได้นะคะ มาเก็บของให้เสร็จกันเถอะค่ะ"
10028010-238 = "ไหนดูซิ... อุปกรณ์ก็เก็บเกือบเสร็จแล้ว..."
10028010-239 = "...คะ?"
10028010-240 = "อ้อ ชุดถ้วยชาเหรอคะ? หมายถึงที่อยู่ในกระเป๋าสีขาวใช่มั้ยคะ?"
10028010-241 = "ไม่ต้องห่วงเลยค่ะ! ฉันตรวจสอบเผื่อไว้ก่อนที่เราจะมาเก็บของกันแล้วค่ะ"
10028010-242 = "มันถูกวางไว้ในตู้สินค้าของรถไฟเป็นอย่างดีเลยค่ะ~ เราไปขึ้นรถไฟกันก็พอค่ะ"
10028010-247 = "...คะ?"
10028010-251 = "ทำไมถึงเอาไปไว้ในตู้สินค้างั้นเหรอคะ? หมายความว่ายังไง..."
10028010-252 = "คุณครูไม่ได้จะนั่งรถไฟกลับเหรอคะ? ฉันก็จะนั่งไปด้วยไง...?"
10028010-253 = "...คะ?"
10028010-254 = "ไม่ใช่รถไฟขบวนนี้ แต่เป็นขบวนอีก 3 ชั่วโมงข้างหน้า... เหรอคะ?"
10028010-255 = "รถเที่ยว 18:10 น.?"
10028010-260 = "แต่ตอนนี้เพิ่ง 15:00 น. เอง...?"
10028010-261 = "อ๊ะ สักครู่นะคะ ฉันว่ามีบางอย่างแปลกๆ นะ"
10028010-262 = "กำหนดการที่ฉันได้รับตอนมาที่นี่บอกว่ารถไฟจะออกในเวลา..."
10028010-266 = "...ไม่สิ เดี๋ยวนะคะ ตอนนี้นั่นไม่ใช่เรื่องสำคัญ"
10028010-267 = "ถ้างั้นรถไฟขบวนที่ฉันเอากระเป๋าไปวางไว้...?"
10028010-272 = "ขอประกาศให้ผู้โดยสารทุกท่านทราบ"
10028010-273 = "<รถไฟความเร็วสูงสายเกเฮนน่า> จะออกจากสถานีรถไฟในอีกสักครู่"
10028010-274 = "ขอให้ผู้โดยสารทุกท่านนำตั๋วมาที่สถานีรถไฟ และนั่งประจำที่ที่กำหนดก่อนที่รถไฟจะออกค่ะ"
10028010-275 = "ขอประกาศให้ทราบอีกครั้ง <รถไฟความเร็วสูงสายเกเฮนน่า> จะออกจากสถานีรถไฟในอีกสักครู่..."
10028010-280 = "เกเฮนน่า...?"
10028010-282 = "...นี่ล้อกันเล่นหรือเปล่าคะเนี่ย?"
