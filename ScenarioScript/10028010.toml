[translation]
10028010-1 = "Episode 1;3:10 to Gehenna"
10028010-50 = "Come in."
10028010-57 = "It's me! What did you need, Hasumi?  "
10028010-58 = "Thank you for coming on such short notice, Ichika.  "
10028010-59 = "Are you well rested? I apologize for calling you here so early."
10028010-60 = "I've got zero eye bags and glowing skin! I'm ready for anything."
10028010-61 = "And by the sounds of it...something bad's happened, hasn't it?"
10028010-62 = "I wouldn't necessarily say bad, but you are correct in assuming I didn't call you here for a tea party."
10028010-63 = " Tsurugi and I have evaluated and discussed the situation, and we think you're the most qualified to handle it."
10028010-64 = "Even Tsurugi thinks so? Qualified for what exactly...?"
10028010-65 = "Um... You said this wasn't something bad, but..."
10028010-66 = "I may have made it sound worse than it is. We wouldn't send you off on a difficult mission alone."
10028010-67 = "It's a simple delivery mission. You need to retrieve and deliver an extremely important bag to the Tea Party. Today."
10028010-68 = "The only real concern is the pick-up is a bit further than expected..."
10028010-69 = "You're personable and have many friendly connections in other districts. Quite the opposite of me or Tsurugi."
10028010-70 = "You can see why we thought this case a little more fitting for your particular capabilities."
10028010-71 = "That makes more sense. You just need me to be your errand girl for the day, right?"
10028010-72 = "Essentially. But I must emphasize that this is more than just a mere errand."
10028010-73 = "A lot hinges on the successful delivery of this bag."
10028010-75 = "So much so that Nagisa herself directly requested our help."
10028010-76 = "To sum it up..."
10028010-83 = "You'll be delivering a relic that could influence the Tea Party's very hold on power within Trinity."
10028010-88 = "...I shouldn't have called it an errand.  "
10028010-89 = "You'll be fine. But..."
10028010-90 = "One more thing."
10028010-91 = "On a personal level, this second task is just as important as the delivery."
10028010-95 = "Sensei will be there when you go to pick up the item and will be taking the same train back with you."
10028010-96 = "I'd like you to ensure Sensei's safe return as well as the item's."
10028010-97 = "It's just... We never would have been able to acquire the relic without Sensei's help."
10028010-98 = "It would be remiss of us if we didn't ensure their safety and comfort in return."
10028010-102 = "Huh?"
10028010-103 = "...Sensei? Sensei will be there too?"
10028010-104 = "Yes. I understand I'm burdening you further with my request. Our official order only accounts for the safe delivery of the relic."
10028010-105 = "If you fear it'll interfere with your duties in any way, please prioritize our orders."
10028010-111 = "What do you think? Does that all seem palatable to you, Ichika?"
10028010-112 = "Hm..."
10028010-113 = "I think I understand the situation. Give me a sec to think this through..."
10028010-114 = "Sensei, you say... Interesting..."
10028010-115 = "Bag... Sensei... Train... Hm..."
10028010-116 = "Heehee."
10028010-117 = "I think it's okay. I'll only have to be by myself on the way there, and I even get to sneak in some quality time with Sensei?"
10028010-118 = "I mean..."
10028010-119 = "What's the worst that could happen while delivering a bag? I'm sure it'll be smooth sailing."
10028010-125 = "Consider it done!"
10028010-127 = "And thus, here I am!"
10028010-128 = "Heave... Hup!"
10028010-185 = "Phew."
10028010-186 = "That's the last piece of luggage, thank goodness. I haven't sweat like this in a while."
10028010-187 = "On behalf of the Justice Task Force...no, of Trinity Academy, thank you, Sensei.  "
10028010-188 = "Any other day, that'd be a pretty audacious thing for me to say. But I'm acting as a special representative for this mission!"
10028010-189 = "I have to live up to such an important role! Heehee."
10028010-190 = "[s1] \"You've worked hard today, Ichika.\"\n[s2] \"You're more than doing that.\""
10028010-193 = "Are you kidding? My trip out here wouldn't mean anything without yours and the excavation team's hard work."
10028010-194 = "All I did was join the clean-up crew since I was picking up the bag anyway."
10028010-195 = "And it was all worth it in the end! I'm still in awe... This teacup set goes all the way back to the very first Tea Party meeting."
10028010-196 = "Thank goodness it's been preserved all these years. It's a really important piece of our history."
10028010-197 = "To think it was hidden beyond the borders of Trinity..."
10028010-198 = "...Hm?"
10028010-199 = "Ah! Why is this teacup set so important?"
10028010-200 = "The Tea Party asked you to come all the way out here and excavate this without explaining anything? Haha. How typical of them."
10028010-201 = "It's not like it's a big secret or anything. Hm, where do I start..."
10028010-202 = "It all comes down to legitimacy, I guess."
10028010-203 = "You're already well aware of the tension between the Tea Party, Remedial Knights, and Sisterhood, considering everything that went down as of late."
10028010-204 = "So, when the scales of power are teetering like this, this kind of symbolic relic is just what they need. An awe-inspiring reminder of just how long the Tea Party's history is."
10028010-205 = "That's why they wanted you here too. To legitimize the process and make sure it goes well.  "
10028010-206 = "And to support you in that endeavor, I'm here!"
10028010-207 = "So, in other words..."
10028010-208 = "I'm Sensei's executive assistant today!"
10028010-209 = "I hope you understand what a rare opportunity this is for you. Please don't let it go to waste and ask me for anything!"
10028010-210 = "Feel free to lean on me, okay?"
10028010-211 = "[s3] \"You've always been dependable. Thanks, Ichika.\"\n[s4] \"I'll be counting on you then, Ichika.\""
10028010-214 = "Heeheehee. If it means getting that kind of praise, I'll be your assistant whenever you need!"
10028010-215 = "If I'm going to be honest, I've been wanting the chance to work with you at least once."
10028010-216 = "Tsurugi, Hasumi, and Mashiro talk about you all the time, you know."
10028010-217 = "Don't look so worried! All three of them gave you rave reviews."
10028010-218 = "\"Sensei is very kind,\" and, \"They're weirdly comfy to be around.\" Things like that."
10028010-219 = "It's because they said such good things about you that I got a little curious."
10028010-220 = "But my line of work doesn't intersect with yours very often..."
10028010-221 = "...What?"
10028010-222 = "I don't need a reason to reach out?"
10028010-223 = "...Haha."
10028010-224 = "That's really nice of you, but I'd hate to be a bother."
10028010-225 = "I don't want you to say it's fine now and then end up resenting me later."
10028010-226 = "I'm a strong and independent student! Not a little kid you have to babysit."
10028010-227 = "In return, when we do cross paths like this..."
10028010-228 = "You can give me a little extra attention, okay?"
10028010-232 = "...Haha."
10028010-233 = "Don't mind me, just rambling. Let's get the rest of the luggage packed up!"
10028010-238 = "Nearly all the pieces of equipment here are cleaned up, so..."
10028010-239 = "Hm?"
10028010-240 = "The teacup set? It's in the white bag."
10028010-241 = "Don't worry! I secured it before we started clearing out the camp."
10028010-242 = "It's already loaded safely into the luggage car! We're the only missing pieces of the puzzle."
10028010-247 = "Huh?"
10028010-251 = "What do you mean? Why wouldn't it be in the luggage car?"
10028010-252 = "Aren't we...going back by train, together?"
10028010-253 = "Huh?"
10028010-254 = "The train isn't for another three hours...?"
10028010-255 = "What do you mean it leaves at 6:10..."
10028010-260 = "It's only 3:00!"
10028010-261 = "No, no. That can't be right."
10028010-262 = "Someone gave me a train schedule when I got here... Look, here..."
10028010-266 = "Wait, wait, wait. If I was wrong, then..."
10028010-267 = "What train did I just load my bag onto?!"
10028010-272 = "All passengers. Attention, all passengers."
10028010-273 = "The train to Gehenna is departing soon."
10028010-274 = "Make your way to your assigned seats. Please have your tickets ready to show to the conductor."
10028010-275 = "Again, all passengers. The train to Gehenna is departing soon. All aboard!"
10028010-280 = "Gehenn...?"
10028010-282 = "Did that announcer just say...Gehenna?"
