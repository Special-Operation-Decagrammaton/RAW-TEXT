[translation]
1001603-1 = "It's Field Training, Sensei"
1001603-2 = "Millennium Game Artwork Exhibition Entrance"
1001603-3 = "The sandwich I made this morning...check. "
1001603-4 = "I brought the oolong tea and snacks to share with Sensei..."
1001603-5 = "I have the notepad and sketchbook... Did I forget anything?"
1001603-6 = "Preparation is essential to clear a dungeon."
1001603-7 = "*inhale* *exhale* *inhale* *exhale*"
1001603-8 = "This artwork exhibition is an opportunity for me to show Sensei just how mature I am."
1001603-9 = "[s] \"What are you mumbling about?\""
1001603-10 = "Whoa! Y-You scared me!"
1001603-11 = "S-Sensei, when did you get here? How much did you hear?"
1001603-12 = "[s1] \"Since you were staring at the bento box...\"\n[s2] \"Until you took a deep breath like a hero about to assault a dungeon.\""
1001603-13 = "Y-You heard everything, then!"
1001603-14 = "Y-You heard everything, then!"
1001603-15 = "[s] \"You must be really excited about today's exhibition!\""
1001603-16 = "Th-That's because...it's a game artwork exhibition that only happens once a year."
1001603-17 = "I plan to take this opportunity to do a lot of research."
1001603-18 = "(Of course, that's not the only reason I was looking forward to today...)"
1001603-19 = "We shouldn't just stand around here. Let's go, Sensei!"
1001603-21 = "Millennium Game Artwork Exhibition 1F"
1001603-23 = "Um, it looks like the latest game booths are on the first floor of the exhibition, and each floor is divided by genre."
1001603-24 = "Oh, the classic game artwork exhibition starts on the third floor."
1001603-25 = "[s] \"It's jam-packed here.\""
1001603-26 = "Yeah, I think this is the biggest attraction in gaming."
1001603-27 = "Everyone here played different genres of games in different places at different times in their lives."
1001603-28 = "In the end, we can gather in a place like this and share memories."
1001603-29 = "Oh, actually, we should go up to the third floor, Sensei. There must be lots of cool artwork."
1001603-35 = "(I came here with Sensei alone, which is a success in itself. Now, to complete this mission...)"
1001603-38 = "We've been walking for a while, Sensei. Are you getting thirsty?"
1001603-39 = "I brought some oolong tea from home..."
1001603-40 = "(Now, let's approach Sensei with the tea!)"
1001603-41 = "[s] \"Midori, look at that.\""
1001603-42 = "Huh? What is it..."
1001603-46 = "Oh, it's a piece of art that conveys a strong sense of desolation, showing no signs of life..."
1001603-47 = "This desert painting... Could it be..."
1001603-48 = "Right! I knew it, Sensei! "
1001603-49 = "A run-and-gun shooting game considered a masterpiece among the classics!"
1001603-50 = "It's artwork of the wasteland map from Metal Snail 2! Awesome!"
1001603-51 = "Oh, that's not all. Look at the artwork over there!"
1001603-54 = "This one is the artwork of the infamous zombie city from Denizen Evil, Rodent City!"
1001603-55 = "All of them are classic game masterpieces!"
1001603-58 = "[ns3] \"Midori, calm down.\"\n[ns4] \"Midori, you're starting to drool.\""
1001603-59 = "How can I stay calm right now?! "
1001603-60 = "How can I stay calm right now?! "
1001603-61 = "Oh!"
1001603-62 = "That's the artwork from Stage 1-1 in the famous classic platforming game, Ultra Marine Sisters!"
1001603-63 = "Sensei, Sensei! Did you know?"
1001603-64 = "The bushes and clouds from Ultra Marine Sisters have the exact same pixel design!"
1001603-65 = "Ah! I'm too excited! Ideas are filling my head...it's overload!"
1001603-66 = "N-Notepad... Where did I put my notepad?! I have to sketch it..."
1001603-68 = "After that, Midori continued to draw with excitement for some time."
1001603-69 = "After the game artwork exhibition..."
1001603-71 = "I don't know what to say. I got too excited again..."
1001603-72 = "Sensei, I'm sorry. I dragged you around everywhere without thinking about how you might feel..."
1001603-73 = "(I got excited like a kid in a candy store. My plan to show Sensei my mature side went down the drain...)"
1001603-74 = "[s5] \"No, I enjoyed it.\"\n[s6] \"You really like retro games, Midori.\""
1001603-75 = "Oh, yes! At first, I didn't understand why so many people played retro games."
1001603-76 = "Oh, yes! At first, I didn't understand why so many people played retro games."
1001603-77 = "I got curious about them."
1001603-78 = "I started playing them when I got into the Game Development Department, and discovered I like them a lot."
1001603-79 = "Some games have rules that are difficult to understand."
1001603-80 = "Like that one game where you climb while breaking ice!"
1001603-81 = "Why do I die when I go off the screen?! Why doesn't it wait for me?!"
1001603-82 = "[s] \"It's nice to see you so happy.\""
1001603-83 = "Oh..."
1001603-84 = "Sensei, you always say that kind of stuff..."
1001603-85 = "Well, yes. I really enjoyed today."
1001603-86 = "Let's do this again sometime, Sensei."
