[translation]
90002260-1 = "Episode 26;Epilogue 2"
90002260-12 = "Wh-What did you think, Kei...? About our new game, \"Arctic Adventure Final\"...?"
90002260-13 = "Obviously, she's going to declare it to be a masterpiece! It's incredible and...inspired by true and recent events!"
90002260-14 = "Yeah. We also improved the art direction midway through."
90002260-16 = "I studied hard and helped with the coding process! I'm sure it'll be great!"
90002260-22 = "...Um."
90002260-23 = "What is this...?"
90002260-24 = "It's a video game. Duh. That's what we do here."
90002260-25 = "Momoi, if this is a video game, then a fly is also a bird."
90002260-26 = "Actually, no. That would be an insult to the fly."
90002260-27 = "What?!"
90002260-29 = "Why...?"
90002260-30 = "A-Augh..."
90002260-32 = "Waah!"
90002260-34 = "For starters, in what universe does a giant robot monster suddenly appear in a fantasy-snowfield world for no reason?"
90002260-35 = "Heehee... Our Kei here does not understand the \"romance\" of game development..."
90002260-36 = "No. Even \"romance\" requires basic reasoning."
90002260-37 = "Something that happens randomly like this shouldn't be called \"romantic,\" but \"drivel\" instead."
90002260-41 = "Even if I let the giant robot monster thing go... What is going on here?!"
90002260-43 = "Why am I suddenly entering an imaginary space?! And why are the controls such TRASH?! "
90002260-44 = "W-Well, you know, it wouldn't be easy to control a giant robot monster, right?! Even that clunkiness is part of the \"romance\"!"
90002260-45 = "You see, the anachronisms and whimsy are part of the...romantic charm!"
90002260-46 = "Then it's SELF-INDULGENT drivel!"
90002260-47 = "No way!"
90002260-48 = "And what's with these enemies? This is the seventh space shrimp thing I've run into since entering this imaginary zone!"
90002260-49 = "B-But they have different colors and...attack types."
90002260-50 = "They're all still shrimp! An all-you-can-beat shrimp buffet!"
90002260-51 = "I-It's a technique called using a \"palette swap,\" Kei! It helps reduce resources and optimize game assets..."
90002260-52 = "But seven colors? A whole rainbow of shrimp?"
90002260-53 = "I don't care about your techniques or optimization, or whatever! There has to be a point to making a...shrimp spectrum!"
90002260-54 = "I got a little overly invested in designing the penguins, so by the time we were done..."
90002260-55 = "You must agree that the penguins are cuter than the shrimp, right?"
90002260-60 = "So it's all just PERSONAL, SELF-INDULGENT BIAS?"
90002260-61 = "U-Ugh...!"
90002260-62 = "And then there's the ground battle before we get sucked into the imaginary zone, or whatever!"
90002260-63 = "Why are \"dash,\" \"roll,\" and \"jump\" all assigned the same button?!"
90002260-64 = "W-Well, it's rhythm-based. To \"roll,\" you press and immediately release. You can \"jump\" if you hold for about three frames."
90002260-65 = "And you \"dash\" by...holding down for another three frames."
90002260-66 = "See, they're all evasive actions. It's intuitive to map them all to a single button."
90002260-67 = "A-Also, it's a shame that you didn't notice this..."
90002260-68 = "But if you parry while rolling and get a frame-perfect parry..."
90002260-69 = "You instantly get behind the boss, so you can deal massive damage. You should try practicing it..."
90002260-70 = "Yuzu, why are you designing controls based on your impossible and nonsensical standards?! And who's counting frames? And that parry..."
90002260-71 = "If even I can't manage precise inputs like that, then I guarantee you that most other people can't either!"
90002260-72 = "Y-You can do it if you keep practicing, Kei! Sure! Probably..."
90002260-73 = "Please listen to me... Not everyone in this world is on your level, Yuzu..."
90002260-74 = "And wasn't that middle boss too unfair? I rolled and jumped and somehow defeated it despite your trash controls...and then it RESURRECTED?!"
90002260-75 = "Yeah, I guess it can revive once. But then again? And a third time?! I almost threw the controller!"
90002260-76 = "W-Wasn't it...fun, though?"
90002260-81 = "Save me from this torture!"
90002260-82 = "Waah..."
90002260-83 = "And about this part... Why does the screen stutter so much? "
90002260-84 = "I almost got hit by the meteor that the imaginary space shrimp—I mean, the special, YELLOW imaginary space shrimp—threw at me!"
90002260-85 = "I-I coded that part... I am sorry, Kei."
90002260-89 = "Aha. Then it's not your fault. It's expected. You've only started coding, after all."
90002260-95 = "In fact, we should all praise Aris for making it this far. You did amazing, Aris!"
90002260-97 = "Hey! Ugh! Seriously, you...!"
90002260-98 = "What? Why? What? If anything, you should be apologizing to ME for that giant robot monster and imaginary space, Momoi."
90002260-99 = "Eck..."
90002260-104 = "So, when can I play the official release?"
90002260-105 = "And what are you doing here, Toki...?"
90002260-106 = "Is there a problem?"
90002260-107 = "Aren't you affiliated with the Super Phenomenon Task Force AND the C&C? Don't you have things to do? Why are you here?"
90002260-108 = "At Millennium, if one is capable, they may join multiple clubs."
90002260-109 = "Also, this is my current playground."
90002260-111 = "\"Playground\"... But we are a game development club..."
90002260-112 = "Sis, you spend more time PLAYING video games than anyone else..."
90002260-113 = "T-To make a great game, you have to test a wide variety and...!"
90002260-114 = "Yeah, I got it. I've heard it from you a hundred or so times."
90002260-116 = "Toki, I thought you said you didn't have any hobbies..."
90002260-117 = "I never said that I didn't have a hobby. I said that I was looking into them."
90002260-118 = "Recently, I've gained a little interest in video games, manga, and internet live streams."
90002260-119 = "...\"A little\"? You say that with no shame? You're here all the time."
90002260-125 = "Toki tapped her own chest."
90002260-127 = "Hello, Kei. I am Asuma Toki's shame. \"V\" for victory."
90002260-128 = "Are you an idiot?!"
90002260-130 = "I am not an idiot. I am the embodiment of humility and shame."
90002260-131 = "Seriously, you're giving me a headache!"
90002260-133 = "K-Kei?! Please do not faint here, Kei!"
90002260-134 = "I'm gonna record this! Let's make it the next scenario!"
90002260-135 = "You BETTER NOT!!"
90002260-141 = "..."
90002260-142 = "I am so very happy to be having a fun time with everyone!"
90002260-149 = "It's been a while. Ah, I suppose this is your first visit, Rio?"
90002260-150 = "Yeah. So this...is where it all started."
90002260-151 = "Indeed it is. And here we are, come full circle, and back where everything began."
90002260-152 = "Thank you, Himari."
90002260-153 = "...Thank you, truly."
90002260-154 = "...My pleasure."
90002260-155 = "Ahem! Anyway, with that said, I believe it's clear that the Super Phenomenon Task Force has successfully completed its primary objective."
90002260-157 = "Yeah. I initially thought the two of you were just sending me on weird odd-jobs."
90002260-158 = "Of course not, Eimi! Unlike Rio over there, who is stubborn and hard-headed..."
90002260-159 = "...I am considerate, open-minded, thoughtful..."
90002260-160 = "...tolerant, street-smart, and sophisticated. I would never ask you all to do something unreasonable."
90002260-161 = "(...Is that so?)"
90002260-162 = "Did you leave your last shred of shame on the frozen sea?"
90002260-163 = "You've always been...quirky, President. I'm just relieved that things worked out."
90002260-164 = "I am also in concordance. In terms of quirkiness levels, you two only have a 2 to 3 point difference."
90002260-165 = "For diplomacy's sake, I will not disclose who scores higher. Peace, peace."
90002260-166 = "You're being utterly rude! There's a huge difference between an...eccentric WITH a plan and a weirdo randomly improvising! "
90002260-167 = "Even if we're both...\"weird,\" we are fundamentally different."
90002260-168 = "[s] \"...So you at least admit that you are a weirdo. I'm so proud of you.\""
90002260-169 = "You too, Sensei?!"
90002260-170 = "(It's nice to know I wasn't the only one thinking that.)"
90002260-171 = "And what are YOU smiling about?!"
90002260-172 = "[s] \"Now, now. Let's all be friends...\""
90002260-173 = "A-Ahem..."
90002260-174 = "While I am grateful that we were so successful...and absolutely astounding, truly..."
90002260-175 = "...It's a pity that we can't tell people about it."
90002260-176 = "Our feats at least deserve an entry in the Library of Lore, the collection of urban legends floating around Kivotos."
90002260-178 = "Hm? Isn't it enough that we fended off an existential threat? How could you ask for more?"
90002260-179 = "Please, Rio, all this sensible banality is making me uncomfortable..."
90002260-180 = "To make your wish come true, we'd have to disclose the existence of the Super Phenomenon Task Force first. "
90002260-181 = "...And then we'd have to explain why you disappeared..."
90002260-182 = "And before all that, we'd have to explain the super phenomenon...Decagrammaton. If that happened, your position would be—"
90002260-183 = "I know! Clearly! I was just saying! Am I not allowed even a flight of whimsy?"
90002260-185 = "I think Rio has the right idea..."
90002260-187 = "Thank you, Kei."
90002260-188 = "Well then...I must be off once more. It was nice to visit at Millennium again."
90002260-192 = "Hm?"
90002260-194 = "What?"
90002260-195 = "Ms. Rio?"
90002260-196 = "Wait, seriously... *sigh* ...Sensei?"
90002260-197 = "[s] \"I think you need to slow down, Rio!\""
90002260-198 = "H-Huh? Did I...say something wrong again? Because who knows when another threat will arise..."
90002260-199 = "And why's that? Because it's more effective, rational, and efficient to operate in secret again?"
90002260-200 = "...How did you know I was going to say that?"
90002260-202 = "Rio. Let's have a serious conversation about this."
90002260-203 = "For starters, you can lurk and hide in secret right here, at Millennium."
90002260-204 = "I can guarantee you that. After all, I've been doing it."
90002260-205 = "Isn't that only because your personality is a little...twisted?"
90002260-206 = "Pfft?!"
90002260-207 = "...Eimi? I fear I'm gradually losing my will to live."
90002260-208 = "Don't worry, President. You'll be fine. You're far too shameless—I mean, \"resilient\" to stay down."
90002260-209 = "That is true. The president Himari I know would never lose her elevated sense of self—even if it meant dragging the rest of the world into an ego vortex."
90002260-210 = "I'm starting to get concerned about everyone's impression of me..."
90002260-213 = "Anyway, Rio. From my perspective...it seems like the reason why you're trying to hide again is because..."
90002260-214 = "...You're uncomfortable with the prospect of facing the other Millennium students."
90002260-215 = "..."
90002260-216 = "Of course, while it's true that you are socially inept, you've recently made some progress in your attempts to understand others."
90002260-217 = "...And, that's why..."
90002260-218 = "...I don't think you're fundamentally a bad person."
90002260-219 = "So what exactly are you trying to say?"
90002260-220 = "...Seriously, I can't believe you're trying to force this out of me...!"
90002260-221 = "Listen carefully. I'm only going to say this once. So..."
90002260-222 = "...Regardless of what you did! Even if you did something harsh to our cute little Aris!"
90002260-223 = "Even if you've dealt irreparable and massive emotional damage to Toki...!"
90002260-224 = "Even if you're narrow-minded, paranoid, obsessive, and too stubborn to listen to anyone else...!"
90002260-225 = "You're not fundamentally a bad person at heart! You helped us all. You saved us in the end."
90002260-227 = "But... I'm..."
90002260-228 = "Is there something on your mind? What? Do you feel sorry, or even guilty? Come out and say it instead of retreating!"
90002260-229 = "Look, all I want to say is..."
90002260-230 = "You! Can! Stay! Here! RIO! Do you understand me?!"
90002260-231 = "In fact, you BETTER stay here! At least then we can keep your trouble contained!"
90002260-237 = "President..."
90002260-238 = "Indeed."
90002260-239 = "...Hmph."
90002260-243 = "...What's that about? What's wrong?"
90002260-245 = "I was moved to hear such a confession. I feel like I should shed a few tears, so let me go find some eye drops."
90002260-246 = "You may use mine, Eimi. As the perfect maid and agent, I have some on hand."
90002260-247 = "I recorded everything you just said. I'll share it with Aris after this."
90002260-248 = "...!"
90002260-249 = "This is why I shouldn't say things on the fly..."
90002260-250 = "[s1] \"But Himari's right.\"\n[s2] \"...Rio, didn't Yuuka already scold you...?\""
90002260-253 = "...!!"
90002260-254 = "R-Right... I need to change my ways."
90002260-255 = "Right..."
90002260-258 = "It's safe to say that we're no longer at risk of being hacked by Decagrammaton. But there's another reason we're all here."
90002260-259 = "We must hide Malkuth's existence from Millennium students..."
90002260-260 = "...and from all the students of Kivotos. Isn't that right, Malkuth?"
90002260-265 = "I had long accepted that my fate was to be forgotten."
90002260-266 = "And if such a destiny were to befall me, it would matter not in the grand scheme."
90002260-267 = "[s] \"Sorry...did we make you angry?\""
90002260-268 = "I do not understand the query. Perhaps there is another meaning to the word? \"Angry\"?"
90002260-269 = "I know not what you ask, Sensei. Kindly elaborate."
90002260-270 = "You say it is \"fine\" to not know? I suffer even greater confusion."
90002260-271 = "[s3] \"M-Most importantly!\"\n[s4] \"What do you want to do now, Malkuth?\""
90002260-274 = "Fufu. While this is merely a suggestion, and comes with NO pressure..."
90002260-275 = "If you were so inclined, we can find you a place in the Super Phenomenon Task Force."
90002260-276 = "Again, only if you want to. It would be of your own free will. What do you think?"
90002260-277 = "I..."
90002260-278 = "(Could it be that what Himari wants to say is...)"
90002260-280 = "She's saying that she wants you to stay so we can all be friends."
90002260-281 = "Correct. President Himari struggles with being direct. And honest."
90002260-282 = "...Surely it's NOT because she wants to study you, right?..."
90002260-284 = "(Great minds think alike.)"
90002260-285 = "Could you all please stop making wild accusations? Must you always assume the worst?"
90002260-290 = "The nuances of language prove difficult..."
90002260-291 = "..."
90002260-292 = "Thank you for your concern, as well as your generous offer."
90002260-293 = "But I would like to stay in hiding for a period...at an alternate location."
90002260-294 = "[s] \"Why?!\""
90002260-295 = "..."
90002260-296 = "Until now, I knew not what having \"my own life\" could entail..."
90002260-297 = "I was not required to consider it, nor did I need to."
90002260-302 = "Ein, Sof, and Ohr..."
90002260-303 = "My sisters asked me to live. Such a request compels me to try."
90002260-304 = "Nevertheless, I feel like I need time to define, organize, and structure what my \"life\" shall be."
90002260-305 = "I know not why nor how I arrived at this thought..."
90002260-306 = "...But to borrow one of your expressions, I have a \"gut feeling\" that this reflection must be done."
90002260-307 = "..."
90002260-308 = "If that's what you want, then I have no intention of stopping you."
90002260-309 = "But if you try to cause any trouble again..."
90002260-310 = "I'll use every resource I have to beat you down again...and enroll you at Millennium."
90002260-316 = "...Fufu."
90002260-317 = "Yes. I have indeed \"learned\" the appropriate level of discretion."
90002260-322 = "...I really do regret not trying to stop her at the end."
90002260-323 = "Mmm... But I think I somewhat understand how Malkuth feels."
90002260-324 = "We all know how much you like going into hiding."
90002260-325 = "Indeed. Ms. Rio is talented in the arts of laying low, going no contact, and scheming in secret."
90002260-326 = "...Toki, has anyone ever suggested that you think before you speak?"
90002260-327 = "How did you know, Kei? Have you been secretly spying on me this whole time?"
90002260-328 = "You know, some things are just kind of obvious!"
90002260-329 = "What's wrong, Kei? Toki was just stating the facts."
90002260-330 = "I think I see why you two get along..."
90002260-333 = "I wonder where she's headed...and for how long she will be gone."
90002260-334 = "[s] \"I think she just needs time.\""
90002260-335 = "You mean, \"time to reflect and learn more about herself\"?"
90002260-336 = "She could have done that here. We have facilities..."
90002260-337 = "So, you miss her."
90002260-338 = "...I don't."
90002260-340 = "Yeah, that means she does."
90002260-341 = "Can't you all just admit how you feel?"
90002260-343 = "..."
90002260-344 = "(I see...)"
90002260-347 = "There are some things you can only learn in solitude."
90002260-348 = "Perhaps, one day, she will branch out. She could decide her own path."
90002260-352 = "I'm surprised. Hearing you talk like that, Rio..."
90002260-353 = "Is it so strange?"
90002260-354 = "[s] \"Yeah. I'm impressed.\""
90002260-355 = "...Please don't tease me..."
90002260-356 = "It's rare to hear the President give such praise."
90002260-357 = "This is true. Even I have never received such a compliment, despite deserving it."
90002260-358 = "That is why I need Sensei. I didn't do anything recently, but please praise me."
90002260-359 = "[s] \"Um, wait...\""
90002260-360 = "Boing, boing?"
90002260-361 = "[s] \"Toki, please? Toki...\""
90002260-362 = "Toki, are you an actual CHILD?!"
90002260-365 = "But still, it's...nice, isn't it?"
90002260-366 = "What is?"
90002260-367 = "I wonder. Maybe it's like when someone feels envy when they see a bird flying freely in the sky."
90002260-368 = "The bird will eventually have to come down, yes."
90002260-369 = "To drink water, eat food, and rest its wings."
90002260-370 = "But even so, while in flight, the sky belongs to the bird."
90002260-371 = "Even if it has to fly alone through an empty sky."
90002260-372 = "...Yeah. But I don't think it's alone."
90002260-373 = "Oh, and why is that?"
90002260-377 = "Because there surely...must be...someone watching over it."
90002260-378 = "...You're right."
90002260-383 = "[ns] \"Great work, everyone.\""
90002260-386 = "Thank you."
90002260-387 = "And a job well done, Super Phenomenon Task Force."
