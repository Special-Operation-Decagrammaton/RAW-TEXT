90002260-43 = "3;케이 교복 비무장 소속;32;그게 왜 갑자기 허수 공간으로 들어가는 건데요!!! 거기에 조작감은 또 왜 이럽니까!!!  \n#3;closeup\n#bgshake\n#fontsize;80"
90002260-44 = "3;모모이;04;거, 거대 로봇 괴수라는 게 사실 조작감이 좋을 수는 없는 법이잖아! 그것까지도 포함해서 로망인 거지!\n#3;closeup\n#3;hophop"
