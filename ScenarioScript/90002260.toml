[translation]
90002260-1 = "ตอนที่ 26;บทส่งท้าย 2"
90002260-12 = "ปะ... เป็นยังไงบ้าง... เคย์จัง...? เกม <อาร์กติก แอดเวนเจอร์ ไฟนอล> ของพวกเรา...?"
90002260-13 = "ต้องเป็นเกมเทพอยู่แล้วละ! ก็เราสร้างจากไอเดียและความคิดสร้างสรรค์ที่บรรเจิดไปอีกขั้นจาก#nประสบการณ์ครั้งนี้ของเราเลยนี่นา"
90002260-14 = "ใช่แล้วละ แล้วพอเราเปลี่ยนทิศทางการทำงานกลางคัน ก็เลยได้ทรัพยากรทางศิลปะมาเพิ่มเติมด้วย"
90002260-16 = "อาริสึก็ตั้งใจเรียนรู้และเป็นผู้ช่วยในการเขียนโค้ดด้วยค่ะ! เกมนี้ต้องออกมาดีแน่นอนค่ะ!"
90002260-22 = "เอ่อ..."
90002260-23 = "นี่มัน... อะไรกันเหรอคะ?"
90002260-24 = "ถามมาได้ ก็เกมน่ะสิ?"
90002260-25 = "พูดอะไรอย่างนั้นคะ โมโมอิ ถ้านี่เป็นเกม แมลงวันก็เป็นนกแล้วละค่ะ"
90002260-26 = "ไม่สิ พูดแบบนั้นมันเป็นการเสียมารยาท ขอโทษแมลงวันเดี๋ยวนี้เลยค่ะ"
90002260-27 = "ว่าไงนะ?!"
90002260-29 = "ทำไมล่ะ...?"
90002260-30 = "อะ... อึก..."
90002260-32 = "แง!"
90002260-34 = "อย่างแรกเลยนะคะ ในโลกทุ่งหิมะแบบแฟนตาซี ทำไมถึงมีสัตว์ประหลาดหุ่นยนต์ยักษ์โผล่ออกมา#nได้ล่ะคะ?"
90002260-35 = "ฮุ ฮุ ฮุ... เคย์ของพวกเราเหมือนจะยังไม่รู้จักความเพ้อฝันสินะ..."
90002260-36 = "ไม่ค่ะ ต่อให้จะเป็นเรื่องเพ้อฝัน อย่างน้อยก็ต้องมีพื้นฐานรองรับบ้างค่ะ"
90002260-37 = "การให้โผล่มามั่วซั่วแบบนั้นน่ะไม่ได้เรียกว่าเพ้อฝันหรอกค่ะ เรียกว่าเพ้อเจ้อต่างหาก"
90002260-41 = "แล้วนี่มันอะไรกันคะ? ถึงจะพอหยวนๆ กับสัตว์ประหลาดหุ่นยนต์ยักษ์ได้"
90002260-43 = "แต่ทำไมจู่ๆ ถึงเข้าไปอยู่ในมิติจำลองได้ล่ะคะ!!! แล้วทำไมระบบบังคับมันถึงควบคุมยากแบบนั้นคะ!!!"
90002260-44 = "กะ... ก็สัตว์ประหลาดหุ่นยนต์มันไม่ควรจะควบคุมง่ายๆ อยู่แล้วนี่นา! ประเด็นนี้ก็เป็นเรื่องเพ้อฝัน#nเหมือนกันนั่นละ!"
90002260-45 = "นี่ละนิยามของความเพ้อฝัน! ก็มันขัดกับยุคสมัยแบบนี้ไง ก็เลยควรค่าต่อการใฝ่ฝันน่ะ!"
90002260-46 = "ฉันก็เพิ่งบอกไปนี่คะว่ามันไม่ใช่เพ้อฝัน แต่มันคือเพ้อเจ้อต่างหากค่ะ!"
90002260-47 = "ว้าก?!"
90002260-48 = "แล้วศัตรูนี่มันอะไรกันคะ? กุ้งในมิติจำลองก็ยังพอรับได้อยู่หรอก แต่นี่มีแต่กุ้งอย่างเดียวมาเจ็ดตัวแล้ว#nนะคะ!"
90002260-49 = "ตะ... แต่ทุกตัวก็มีสีและธาตุต่างกันนะ...?"
90002260-50 = "แต่สุดท้ายมันก็เป็นแค่กุ้งนี่คะ!"
90002260-51 = "มะ... มันคือเทคนิคการเปลี่ยนชุดสีน่ะ เคย์จัง! ถ้าทำแบบนั้นจะประหยัดทรัพยากร และได้เพิ่มประสิทธิภาพทรัพยากรที่ใช้ในเกมด้วย...!"
90002260-52 = "แต่มันมีเจ็ดสีเลยนะคะ! ไม่ได้ใส่แค่สองหรือสามสี แต่นี่มันเจ็ดไปเลย!"
90002260-53 = "ฉันไม่เข้าใจเทคนิคอะไรแบบนั้นหรอกค่ะ แต่อย่างน้อยก็ควรทำแต่พอดีไม่ใช่เหรอคะ!"
90002260-54 = "ก็ช่วงแรกฉันมัวแต่ตั้งใจวาดเพนกวิน ก็เลยมีเวลาไม่พอ..."
90002260-55 = "แต่เพนกวินก็น่ารักกว่ากุ้งนะ...?"
90002260-60 = "สรุปว่านี่ก็มาจากความชอบส่วนตัวอีกแล้วสินะคะ!"
90002260-61 = "อะ... อึก...!"
90002260-62 = "เรื่องการต่อสู้บนบกก่อนจะเข้าไปในมิติจำลองอะไรนั่นก็ด้วยค่ะ!"
90002260-63 = "ทำไมตอนวิ่ง ม้วนตัวหลบ กับกระโดดถึงใช้ปุ่มเดียวกันล่ะคะ?!"
90002260-64 = "กะ... ก็พอกดแล้วปล่อยจะเป็นการม้วนตัวหลบ แต่ถ้ากดต่ออีกสามเฟรม ก็จะเป็นการกระโดด"
90002260-65 = "แล้วถ้ากดค้างอีกสามเฟรม ก็จะเป็นการวิ่ง..."
90002260-66 = "การเคลื่อนไหวทั้งหมดนี้เป็นการหลบหลีก สำหรับฉันถ้ารวมกันไว้ในปุ่มเดียวจะสะดวกกว่าน่ะ แหะๆๆ..."
90002260-67 = "นะ... น่าเสียดายที่เคย์จังไม่รู้เคล็ดลับนี้ตอนเล่นนะ..."
90002260-68 = "ถ้ากดปุ่มแพร์รี่ในจังหวะที่เริ่มม้วนตัวหลบ จนแพร์รี่อย่างแม่นยำได้ภายในเฟรมเดียวละก็..."
90002260-69 = "ตอนนั้นเราจะไปอยู่ข้างหลังบอส และฟังก์ชั่นสร้างดาเมจจำนวนมากก็จะทำงานด้วย ไว้ต่อไปเคย์จังก็ลองฝึกดูนะ..."
90002260-70 = "ปรับการควบคุมเกมตามความถนัดของตัวเองได้ยังไงกันคะ ยูสึ! แล้วสามเฟรมต่อด้วยอีกสามเฟรม#nมันคืออะไรกันคะ! แล้วไหนจะต้องแพร์รี่ให้แม่นๆ อีก?"
90002260-71 = "อะไรยิบย่อยแบบนั้นฉันทำไม่เป็นหรอกค่ะ! คนส่วนใหญ่ก็เหมือนกันค่ะ!"
90002260-72 = "ถะ... ถ้าตั้งใจ เคย์จังก็ทำได้นะ! อื้อ! น่าจะ... นะ..."
90002260-73 = "ฟังที่ฉันพูดหน่อยสิคะ... ไม่ใช่ทุกคนบนโลกที่จะเป็นเกมเมอร์แบบยูสึได้นะคะ..."
90002260-74 = "แล้วบอสระดับกลางที่เจอเมื่อกี้มันเกินไปหรือเปล่าคะ? แค่ทนกดให้ทั้งกลิ้งทั้งกระโดดจนปราบบอสได้#nก็เหนื่อยแทบแย่แล้ว แต่มันก็ดันฟื้นคืนชีพขึ้นมาได้ซะงั้น?!"
90002260-75 = "ไม่สิ ให้ฟื้นคืนชีพได้สักครั้งคงรับได้อยู่ค่ะ แต่นี่มันตั้งสามครั้งเลยนะคะ ฉันเล่นจนเกือบจะถอดใจ#nแล้วเลยค่ะ!"
90002260-76 = "มะ... ไม่สนุก... หรอกเหรอ?"
90002260-81 = "ใครก็ได้ช่วยฉันด้วยค่ะ!"
90002260-82 = "ฮืออ..."
90002260-83 = "แล้วก็ตรงนี้น่ะค่ะ... ทำไมหน้าจอถึงกระตุกแบบนี้ล่ะคะ? "
90002260-84 = "ตอนเจอกุ้งในมิติจำลอง... เจ้ากุ้งสีเหลืองในมิติจำลองน่ะค่ะ... ฉันเกือบหลบอุกกาบาตที่กุ้งปามาไม่ได้แล้วนะคะ! "
90002260-85 = "ตะ... ตรงนั้นอาริสึเป็นคนเขียนโค้ดเองค่ะ... ขอโทษนะคะ เคย์..."
90002260-89 = "อ๋อ ถ้างั้นมันก็เป็นเรื่องที่ช่วยไม่ได้น่ะค่ะ ก็อาริสึยังไม่ชำนาญนี่คะ"
90002260-95 = "ฉันอยากให้คะแนนเพิ่มมากกว่าที่ทำได้ถึงขนาดนี้ค่ะ สมกับเป็นอาริสึเลยค่ะ"
90002260-97 = "นี่เธอ! จริงๆ เลย! นี่มันสองมาตรฐานนะ...!"
90002260-98 = "อะไรคะ ทำไมคะ แล้วไงคะ คุณต้องขอโทษฉันเรื่องสัตว์ประหลาดหุ่นยนต์ยักษ์กับมิติจำลองนั่นก่อน#nนะคะ โมโมอิ"
90002260-99 = "อึก..."
90002260-104 = "แล้วเกมนี้จะเปิดให้เล่นได้จริงจังเมื่อไรเหรอคะ?"
90002260-105 = "โทคิ คุณนี่ก็นะ จริงๆ เลย..."
90002260-106 = "แล้วมีปัญหาอะไรเหรอคะ?"
90002260-107 = "คุณสังกัดทั้งชมรมปรากฏการณ์ลี้ลับและ C&C ไม่ใช่เหรอคะ...? แต่ทำไมถึงมาอยู่ที่นี่ล่ะคะ..."
90002260-108 = "มิลเลเนียมเป็นโรงเรียนที่ทำกิจกรรมของหลายๆ ชมรมได้ถ้าเรามีความสามารถพอค่ะ"
90002260-109 = "และตอนนี้ที่นี่ก็เป็นเหมือนสนามเด็กเล่นของฉันด้วยค่ะ"
90002260-111 = "สนามเด็กเล่นงั้นเหรอ... นี่เป็นที่ที่เราพัฒนาเกมกันต่างหาก..."
90002260-112 = "พอพี่โมโมอิที่คลั่งไคล้เกมมากกว่าใครในหมู่พวกเราพูดแบบนี้ มันก็ฟังดูน่าเชื่อถือมากเลยนะ..."
90002260-113 = "มะ... มีคำกล่าวแต่โบราณว่าถ้าจะสร้างเกมที่ดี ก็ต้องเล่นเกมเยอะๆ แล้วก็...!"
90002260-114 = "ค่ะ ค่ะ พอแค่นั้นเถอะ ฉันฟังคำแบบนั้นมาเกือบร้อยรอบแล้ว"
90002260-116 = "โทคิ ไหนคุณบอกว่าไม่มีงานอดิเรกเลยตั้งแต่แรกไงคะ"
90002260-117 = "ไม่ใช่ว่าไม่มีหรอกค่ะ ฉันกำลังหาอยู่ต่างหาก"
90002260-118 = "และช่วงนี้ฉันก็เริ่มสนใจเกม หนังสือการ์ตูน และการดูรายการทางอินเทอร์เน็ตขึ้นมา 'นิดหน่อย' แล้วด้วยค่ะ"
90002260-119 = "นิดหน่อย... งั้นเหรอคะ? สติยังอยู่ดีมั้ยคะ?"
90002260-125 = "(โทคิเอามือทุบอกตัวเอง)"
90002260-127 = "สวัสดีค่ะ คุณเคย์ ฉันคือสติของอะซุมะ โทคิค่ะ ฉันยังอยู่ดีค่ะ ปิ้วๆ"
90002260-128 = "บ้องตื้นหรือเปล่าคะเนี่ย?!"
90002260-130 = "ไม่ใช่บ้องตื้นค่ะ ก็บอกอยู่ว่าชื่อสติค่ะ"
90002260-131 = "น่าเวียนหัวจริงๆ เลยค่ะ!"
90002260-133 = "คะ... เคย์?! อย่าเป็นลมไปนะคะ! เคย์!"
90002260-134 = "ฉันจดไดอะล็อกเมื่อกี้ไว้ดีกว่า! ไว้ฉันจะเอาไปใส่ในเนื้อเรื่องเกมด้วย!"
90002260-135 = "ก็ลองดูสิคะ!!!"
90002260-141 = "..."
90002260-142 = "อาริสึดีใจจังเลยค่ะที่ได้ใช้เวลาสนุกๆ ด้วยกันกับทุกคน!"
90002260-149 = "ไม่ได้มาที่นี่นานเลยนะคะ อ๊ะ ส่วนริโอะ นี่เป็นครั้งแรกหรือเปล่าคะ?"
90002260-150 = "นั่นสินะ ทำงานทั้งหมดกัน... ในที่แบบนี้สินะ"
90002260-151 = "ค่ะ เหมือนเราได้ออกไปผจญภัยมาหนึ่งวงโคจร แล้วกลับมาที่จุดเริ่มต้นอีกครั้งเลยนะคะ"
90002260-152 = "ขอบใจนะ ฮิมาริ"
90002260-153 = "ขอบใจจริงๆ..."
90002260-154 = "ค่ะ..."
90002260-155 = "อะแฮ่ม! และในแง่นี้ก็อาจกล่าวได้ว่า ชมรมปรากฏการณ์ลี้ลับของเราได้บรรลุเป้าหมายที่ตั้งไว้แล้วค่ะ"
90002260-157 = "อื้อ ถึงตอนแรกฉันจะคิดว่าประธานกับหัวหน้ามอบหมายงานแปลกๆ ให้ฉันก็เถอะ"
90002260-158 = "จะเป็นแบบนั้นได้ยังไงกันคะ เอมิ ฉันไม่เหมือนริโอะที่หัวแข็งและรู้จักอยู่แค่วิธีเดียวหรอกนะคะ"
90002260-159 = "ฉันรู้จักคำนึงถึงผู้อื่น แล้วก็มีความคิดยืดหยุ่นในเวลาและสถานที่ที่เหมาะสม"
90002260-160 = "คนที่ทั้งใจกว้าง มีสามัญสำนึกและเชี่ยวชาญอย่างฉันน่ะ ไม่มีทางขอให้พวกคุณทำภารกิจที่ไร้สาระ#nกันหรอกค่ะ"
90002260-161 = "(งั้นเหรอ...?)"
90002260-162 = "ไปทิ้งจิตสำนึกที่มีอยู่น้อยนิดไว้ที่ไหนสักแห่งในทะเลมาหรือเปล่าคะ..."
90002260-163 = "แต่ฉันคิดว่าหัวหน้าก็ชอบทำอะไรแผลงๆ อยู่นะ ยังดีนะที่ผลลัพธ์มันออกมาดี"
90002260-164 = "ใช่ค่ะ ตามความคิดของฉัน คะแนนความแผลงของทั้งสองคนน่ะต่างกันแค่ 2-3 คะแนนเองค่ะ"
90002260-165 = "แต่ฉันขอไม่เปิดเผยดีกว่าค่ะว่าใครที่มีคะแนนสูงกว่า พีซ พีซ"
90002260-166 = "แบบนั้นมันเสียมารยาทนะคะ?! เราต่างกันลิบลับเลยต่างหากค่ะ! คนประหลาดที่มีแผนการ กับคนไม่มีแผนการมันเหมือนกันเหรอคะ! "
90002260-167 = "ถึงมองเผินๆ แล้วผลลัพธ์จะดูคล้ายกัน แต่ก็มีส่วนที่แตกต่างกันไม่ใช่เหรอคะ??!!"
90002260-168 = "[s] \"แต่ก็ยอมรับแล้วสินะว่าเป็นคนประหลาด... เป็นเด็กดีจริงๆ\""
90002260-169 = "คุณครูก็เป็นอะไรไปอีกคนคะ?!?!"
90002260-170 = "(โล่งอกไปทีนะที่ฉันไม่ได้คิดผิดไป)"
90002260-171 = "แล้วทำไมคุณถึงยิ้มเหมือนโล่งใจอะไรเลยล่ะคะ!?!?"
90002260-172 = "[s] \"เอาละๆ เรามาอยู่ร่วมกันอย่างสันติเถอะ...\""
90002260-173 = "อะแฮ่ม..."
90002260-174 = "เอาเป็นว่าที่ผ่านมาเกิดเรื่องใหญ่ขนาดนั้น และเราก็ประสบความสำเร็จกลับมาถึงขนาดนี้"
90002260-175 = "แต่ก็น่าเสียดายนิดหน่อยนะคะที่เราบอกเรื่องนี้กับทุกคนไม่ได้"
90002260-176 = "อย่างน้อยก็น่าจะสร้างเรื่องเล่าที่พอจะกลายเป็นตำนานเมือง หรือถูกเขียนเพิ่มลงในคลังเก็บเรื่องเล่า#nของคิโวทอสได้บ้างแท้ๆ"
