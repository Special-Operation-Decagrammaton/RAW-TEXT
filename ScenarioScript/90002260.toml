90002260-48 = "3;케이 교복 비무장 소속;16;이 적은 또 뭔데요? 허수 공간 새우까지는 이제 그런가 보다 하겠는데, 그 허수 공간 새우만 지금 일곱 마리 째잖습니까!\n#3;stiff"
90002260-49 = "5;미도리;02;그, 그래도 그거 모두 색깔이랑 속성이 다른데……?\n#5;em;…\n#5;al\n#3;m1"
90002260-50 = "3;케이 교복 비무장 소속;32;결국 새우잖아요!\n#3;em;[!]"
90002260-51 = "5;미도리;07;파, 팔레트 스왑이라는 기교야, 케이 쨩! 리소스를 아끼고, 게임에 투입되는 자원을 최적화하기 위해서……!\n#5;stiff"
90002260-52 = "3;케이 교복 비무장 소속;24;그러니까 그게 일곱 가지 색깔이라고요! 둘도 셋도 넷도 아니고, 일곱!\n#3;hophop"
90002260-53 = "3;케이 교복 비무장 소속;25;기교고 뭐고 저는 모르겠고, 적당히 해야 할 것 아닙니까!"
