90002260-69 = "3;유즈;07;그 즉시, 보스의 뒤로 돌아가서 큰 대미지를 넣을 수 있는 기능도 있었으니까, 다음에 연습해 보면 좋을 거야……."
90002260-70 = "5;케이 교복 비무장 소속;25;게임 조작성을 당신 기준으로 맞추면 어떡합니까, 유즈! 3프레임 더하기 3프레임은 또 뭐예요! 거기에 저스트 패링이요?\n#5;hophop\n#5;al\n#3;m1"
