90002260-334 = "[s] \"คงต้องใช้เวลาสักหน่อยน่ะ\""
90002260-335 = "เวลาในการมองย้อนและเข้าใจตัวเองเหรอคะ?"
90002260-336 = "แต่ถึงจะทำแบบนั้น ก็ทำจากที่นี่ก็ได้นี่นา..."
90002260-337 = "เสียดายจริงๆ ด้วยสินะ"
90002260-338 = "เปล่าสักหน่อยค่ะ..."
90002260-340 = "อื้อ งั้นก็แปลว่าใช่"
90002260-341 = "พูดแบบนั้นมันล้าสมัยไปหน่อยมั้ยคะ...?"
90002260-343 = "..."
90002260-344 = "(เป็นอย่างนี้สินะ...)"
90002260-347 = "แต่บางครั้งก็มีบางสิ่งที่เราคิดได้ตอนที่อยู่คนเดียวเท่านั้นนะ"
90002260-348 = "และเมื่อถึงเวลา เด็กคนนั้นก็ควรได้รับโอกาสในการเลือกเส้นทางชีวิตของตัวเอง ใช่มั้ยล่ะ?"
90002260-352 = "น่าทึ่งเลยนะคะ คิดไม่ถึงเลยนะคะว่าริโอะจะเปลี่ยนไปมากจนพูดอะไรแบบนี้ได้"
90002260-353 = "งั้นเหรอ?"
90002260-354 = "[s] \"นั่นสินะ ริโอะพูดคำที่น่าภูมิใจขนาดนี้ได้แล้วนะเนี่ย\""
90002260-355 = "อย่าล้อกันขนาดนั้นสิ..."
90002260-356 = "สำหรับหัวหน้าแล้ว นั่นเป็นคำชมที่ล้นเหลือเลยละ นานปีทีหนถึงจะเห็นอะไรแบบนี้นะ"
90002260-357 = "ใช่ค่ะ ขอเสริมว่าฉันก็ไม่เคยได้คำชมขนาดนั้นมาก่อนเลยด้วยค่ะ"
90002260-358 = "เห็นทีฉันต้องให้คุณครูช่วยเติมเต็มแล้วละค่ะ ถึงฉันจะไม่ได้ทำอะไรเลย แต่ก็ช่วยชมฉันหน่อยสิคะ"
90002260-359 = "[s] \"เดี๋ยวสิ แบบนั้นมัน...\""
90002260-360 = "ดึ๋ง ดึ๋ง?"
90002260-361 = "[s] \"โทคิ? โทคิ...\""
90002260-362 = "โทคิ อายุสมองของคุณคือกี่ขวบกันแน่คะ...?"
90002260-365 = "แต่ถึงยังไง ฉันว่าแบบนั้นก็เท่ดีเหมือนกันนะคะ"
90002260-366 = "ยังไงเหรอ?"
90002260-367 = "อืม คงเหมือนเวลาที่เรารู้สึกอิจฉาตอนเห็นนกโบยบินอย่างอิสระน่ะค่ะ"
90002260-368 = "แต่ถึงจะเป็นนก ก็ต้องบินลงมายังพื้นดินอยู่ดี"
90002260-369 = "เพื่อดื่มน้ำ กินอาหาร และให้ปีกได้พักบ้าง"
90002260-370 = "แต่ตราบใดที่ปีกคู่นั้นยังไม่อ่อนล้า ท้องฟ้าก็จะยังเป็นของนกตัวนั้นค่ะ"
90002260-371 = "ต่อให้ต้องบินเพียงลำพังท่ามกลางท้องฟ้าที่ว่างเปล่าก็ตาม"
90002260-372 = "ใช่... แต่ก็คงจะไม่รู้สึกโดดเดี่ยวหรอก"
90002260-373 = "ตายจริง ทำไมถึงคิดอย่างนั้นล่ะคะ?"
90002260-377 = "เพราะจะมีผู้คนที่คอยเฝ้าดูนกตัวนั้นจากที่ไหนสักแห่งยังไงล่ะ"
90002260-378 = "ก็คงจะเป็นอย่างนั้นนะคะ..."
90002260-383 = "[ns] \"ทุกคน ทำได้ดีมากเลยละ\""
90002260-386 = "ค่ะ"
90002260-387 = "ชมรมปรากฏการณ์ลี้ลับ ทุกคนทำได้ดีมากเลยค่ะ"
