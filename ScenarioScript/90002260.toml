[translation]
90002260-1 = "第26話;尾聲（２）"
90002260-12 = "怎，怎麼樣呢……Kei醬……？#n我們這次的新作《[ruby=Arctic Adventure Final]極地冒險最終篇[/ruby]》……？"
90002260-13 = "當然是神作囉！#n我們這次可是活用了所有經驗，還結合了更厲害的點子和創意耶！"
90002260-14 = "沒錯。製作方向也有在中途進行修正，藉此確保了更多美術資源。"
90002260-16 = "愛麗絲也有努力學習，負責製作了輔助程式！一定會很棒的！"
90002260-22 = "……那個。"
90002260-23 = "這到底……是什麼東西啊？"
90002260-24 = "什麼什麼東西？這是遊戲啊？"
90002260-25 = "你在說什麼啊，桃井。#n如果這能算是遊戲的話，蒼蠅也能算是鳥了吧。"
90002260-26 = "不，這樣說對蒼蠅也太失禮了。快點向蒼蠅道歉。"
90002260-27 = "什麼！？"
90002260-29 = "為什麼……"
90002260-30 = "嗚，嗚嗚……"
90002260-32 = "嗚哇啊！"
90002260-34 = "首先，為什麼在奇幻風格的雪原世界裡，會有巨大機器人怪獸突然出現啊？"
90002260-35 = "哼，哼，哼……#n看來我們的Kei似乎還不明白什麼叫浪漫呢……"
90002260-36 = "不是，浪漫也需要有最低限度的鋪陳吧。"
90002260-37 = "像這樣亂七八糟地出現不叫浪漫，應該叫廢棄物才對。"
90002260-41 = "然後這又是什麼？#n就算先退一百萬步，勉強接受巨大機器人怪獸好了……"
90002260-43 = "為什麼它會突然進入虛數空間啊！！！#n還有這個操作手感又是怎麼回事！！！"
90002260-44 = "巨，巨大機器人怪獸本來就不可能多好操作啊！#n這也是浪漫的一部分！"
90002260-45 = "況且浪漫之所以叫浪漫，不就是因為不合時宜嗎！"
90002260-46 = "就說了這根本不是什麼浪漫，只是廢棄物而已！"
90002260-47 = "怎麼這樣！？"
90002260-48 = "這個敵人又是什麼？#n虛數空間有蝦子也就算了，但這已經是第七隻了耶！？"
90002260-49 = "可，可是每隻的顏色跟屬性都不一樣……？"
90002260-50 = "說白了不都是蝦子嗎！"
90002260-51 = "這，這是一種[ruby=Palette Swap]叫做換色的技[/ruby]術哦，Kei！#n為了節省資源，最佳化遊戲的投入……！"
90002260-52 = "但是分成七種顏色也太誇張了！#n不是兩種、三種、四種，而是七種耶！"
90002260-53 = "技術什麼的我不管，至少也該有個限度吧！"
90002260-54 = "因為前期太專注於畫企鵝了，結果時間不夠……"
90002260-55 = "畢竟跟蝦子相比，果然還是企鵝比較可愛吧……？"
90002260-60 = "所以終究是出於自己的私心嘛！"
90002260-61 = "嗚，嗚嗚……！"
90002260-62 = "進入虛數空間之前的地面戰鬥環節也有問題！"
90002260-63 = "為什麼衝刺、翻滾和跳躍都是用同一個按鈕控制啊！？"
90002260-64 = "那，那個，按下後馬上放開是翻滾，再按3幀左右就是跳躍……"
90002260-65 = "然後再多按3幀就會變成衝刺……"
90002260-66 = "因為全部都是迴避相關的動作，我覺得集中在同一個按鍵比較方便。嘿嘿……"
90002260-67 = "而，而且其實還有一個機制，可惜Kei醬好像沒發現的樣子。"
90002260-68 = "只要在翻滾發動的瞬間按下[ruby=Parry]招架[/ruby]鍵，成功觸發1幀的完美招架……"
90002260-69 = "就能馬上繞到BOSS背後造成大量傷害哦……下次可以練習看看……"
90002260-70 = "怎麼能用你的標準來設計遊戲的操作呢，柚子！#n3幀加3幀是什麼東西！還有完美招架！？"
90002260-71 = "我做不到那麼精細的操作！大部分的人應該也做不到！"
90002260-72 = "K，Kei醬只要努力也能做到的！嗯！#n大概……吧……"
90002260-73 = "你聽我說……世界上不是每個人都跟柚子一樣是遊戲高手的……"
90002260-74 = "還有剛才的中BOSS，不覺得太過分了嗎？#n好不容易扛著那種操作手感打倒BOSS，居然還會復活！？"
90002260-75 = "不，假如只有一次的話我還能接受──可是它整整給我復活了三次啊三次！#n我心態差點就炸裂了你知道嗎！？"
90002260-76 = "不，不好玩……嗎？"
90002260-81 = "拜託饒了我吧！"
90002260-82 = "嗚哇哇……"
90002260-83 = "然後還有這裡……為什麼畫面會一閃一閃的呢？"
90002260-84 = "害我差點就被虛數空間蝦……應該說黃色虛數空間蝦丟出來的隕石砸到了！"
90002260-85 = "那，那部分的程式是愛麗絲寫的……對不起，Kei……"
90002260-89 = "既然如此也沒辦法了。畢竟還不太熟練嘛。"
90002260-95 = "能做到這種程度，反而應該幫你加分才對。不愧是愛麗絲。"
90002260-97 = "喂！你這傢伙真的是……！"
90002260-98 = "怎樣，有什麼意見嗎？#n你應該先為巨大機器人怪獸和虛數空間向我道歉才對，桃井。"
90002260-99 = "唔呃……"
90002260-104 = "所以，這個什麼時候可以正式玩呢？"
90002260-105 = "季，你為什麼又……"
90002260-106 = "有什麼問題嗎？"
90002260-107 = "你本來就已經有特異現象搜查部和C&C的雙重身分了吧……？#n為什麼還會出現在這裡啊……"
90002260-108 = "因為千年只要能力許可，就可以參加多個社團活動。"
90002260-109 = "而且這裡現在也是我的遊樂場。"
90002260-111 = "遊樂場……我們這裡明明是開發遊戲的地方……"
90002260-112 = "最熱衷遊戲的姐姐說這種話，確實挺有說服力的呢……"
90002260-113 = "想，想要做出好遊戲，就必須玩過很多遊戲──！"
90002260-114 = "好好好，到此為止。#n那句話我已經聽超過100次了。"
90002260-116 = "話說回來，季你之前不是說過自己沒有興趣嗎？"
90002260-117 = "並不是沒有，只是還在尋找而已。"
90002260-118 = "最近我對遊戲、漫畫和網路直播產生了「一點」興趣。"
90002260-119 = "一點……？你的良心還好嗎？"
90002260-125 = "（季輕輕敲了敲自己的胸口）"
90002260-127 = "你好，Kei同學。#n我是飛鳥馬季的良心。[ruby=V]耶[/ruby]。"
90002260-128 = "你是笨蛋嗎！？"
90002260-130 = "我不是笨蛋，是良心。"
90002260-131 = "我的頭真的好暈！"
90002260-133 = "K，Kei！？#n不能倒下啊！Kei！"
90002260-134 = "這段對話我要寫下來！#n之後一定要放進遊戲的劇本裡！"
90002260-135 = "你敢寫試試看！！！"
90002260-141 = "……"
90002260-142 = "愛麗絲能和大家開心地相處，真的很高興！"
90002260-149 = "這裡也好久沒來了呢。#n啊，莉央應該是第一次來到這裡吧？"
90002260-150 = "是啊。原來是在這種地方……做了那些事情啊。"
90002260-151 = "是的。在繞了一大圈之後，又回到了這個地方。"
90002260-152 = "謝謝你，陽葵。"
90002260-153 = "……真的很謝謝你。"
90002260-154 = "……是啊。"
90002260-155 = "咳哼！總之，我們特異現象搜查部可說是充分達成了預期的目標呢。"
90002260-157 = "嗯。其實我一開始真的以為，這又是會長和部長在推卸奇怪的工作。"
90002260-158 = "怎麼會呢，英美。#n我和那個不知變通的莉央可不一樣。"
90002260-159 = "懂得體貼他人、能在適當的時候靈活思考……"
90002260-160 = "同時還兼具包容力、常識與素養的我，怎麼可能要求你們去做荒唐的事呢。"
90002260-161 = "（……是這樣嗎？）"
90002260-162 = "現在連最基本的良心都扔進海裡了嗎……"
90002260-163 = "沒關係，我覺得部長本來就夠古怪了……不過結果好就好。"
90002260-164 = "是的。兩位的古怪程度在我看來，差距大約只有2到3分左右。"
90002260-165 = "至於誰的分數比較高，就請恕我不特別說明了。#nPeace，Peace。"
90002260-166 = "這樣說很失禮耶！？#n有計畫的怪人跟沒計畫的怪人之間，可是存在天壤之別的好嗎！？"
90002260-167 = "就算結果看起來相似，出發點也是不同的知道嗎！？！？"
90002260-168 = "[s] 「……承認自己是怪人了呢。真棒真棒。」"
90002260-169 = "居然連老師也這麼說！？！？"
90002260-170 = "（太好了，看來我的認知並沒有錯）"
90002260-171 = "你那安心的笑容又是什麼意思！？！？"
90002260-172 = "[s] 「好了好了。大家都要好好相處哦……」"
90002260-173 = "唔，唔嗯……"
90002260-174 = "總之，雖然發生了這麼多事，也取得了不少成果……"
90002260-175 = "不過無法將其公諸於世，還是讓人有點遺憾呢。"
90002260-176 = "明明這至少也是能在奇普托斯流傳的怪談──[ruby=The Library of Lore]無盡怪談圖書館[/ruby]中加上一行的事件。"
90002260-178 = "嗯？有順利排除危險不就夠了嗎？#n我覺得已經沒什麼好奢求的了。"
90002260-179 = "在這種時候搬出正論，不就會讓我顯得很尷尬嗎……"
90002260-180 = "不過如果要按照你說的做，就得先公開特異現象搜查部的存在才行吧？"
90002260-181 = "這麼一來，就必須從陽葵你潛伏的原因開始說起。"
90002260-182 = "在那之前還要讓大家接受特異現象……也就是十字神名這樣的存在。#n那樣陽葵你的立場就──"
90002260-183 = "我知道！我都知道啦！#n剛才只是隨口說說而已！難道連說說都不行嗎！？！？"
90002260-185 = "這次我覺得莉央說得對……"
90002260-187 = "謝謝你，Kei。"
90002260-188 = "那麼……我要再次離開前往其他地方，之後就拜託你們了。#n很高興能久違地看看千年的樣子。"
90002260-192 = "咦？"
90002260-194 = "嗯？"
90002260-195 = "莉央大人？"
90002260-196 = "不是，我真的……唉……老師？"
90002260-197 = "[s] 「那樣不管怎麼說都不太對吧！」"
90002260-198 = "嗯？我又說錯什麼了嗎……？#n可是奇普托斯也許某天又會面臨危險……"
90002260-199 = "你的下一句話是「為了合理且有效率地守護，在暗中行動會更有效果」對吧！"
90002260-200 = "為了合理且有效率地守護，像之前一樣在暗中行動應該更有效果才對……哈！？"
90002260-202 = "莉央，我們來認真談談吧。"
90002260-203 = "首先──即使繼續留在千年，想要隱藏行蹤在暗中行動也不成問題。"
90002260-204 = "畢竟我本人就是這麼做的，所以可以向你保證。"
90002260-205 = "那只是因為你的性格有點扭曲吧……"
90002260-206 = "噗！？"
90002260-207 = "……英美？#n我……現在似乎有點失去了活下去的意志。"
90002260-208 = "不用擔心，部長。#n部長是那種總是能重新振作起來，厚著臉──不對，堂堂正正活下去的人。"
90002260-209 = "沒錯。我所認識的陽葵部長，#n是個就算把世界在認知領域裡拖進陰溝之中，也能守住自我意識的人。"
90002260-210 = "最近大家對我的評價開始讓我覺得有點奇怪了耶！？！？"
90002260-213 = "總之，莉央你之所以想再次躲藏起來……"
90002260-214 = "在我看來，只是因為面對千年的其他學生會感到不自在而已吧。"
90002260-215 = "……"
90002260-216 = "當然你在人際關係方面可說是一團糟，也是最近才開始努力試圖理解他人……#n在不專業的領域甚至跟小孩沒什麼兩樣。"
90002260-217 = "然而……"
90002260-218 = "即便如此，我也不認為你從根本上來說是個錯誤的人……"
90002260-219 = "所以你到底想說什麼？"
90002260-220 = "真是的，你就非得逼我親口說出來嗎……！"
90002260-221 = "這些話我只說一次，所以請你仔細聽好。#n我想說的是……"
90002260-222 = "無論你之前做了什麼！比如想對我們的可愛後輩做過分的事！"
90002260-223 = "或者在情感上對季造成了許多傷害！"
90002260-224 = "就算你是個偏執狹隘又聽不進別人意見的頑固鬼！"
90002260-225 = "你的本性也並不是扭曲的！#n而且從結果上來說，我們所有人都或多或少受到了你的幫助！"
90002260-227 = "可是……我……"
90002260-228 = "會感到過意不去嗎？還是覺得抱歉？#n是的話就不要躲躲藏藏的，好好面對面說清楚！"
90002260-229 = "總之我想說的是──！"
90002260-230 = "你！可以！待在這裡！聽懂了嗎！？"
90002260-231 = "不，就給我待在這裡！#n不要再跑出去偷偷惹麻煩了！"
90002260-237 = "部長……"
90002260-238 = "這麼說也有道理。"
90002260-239 = "……哼嗯。"
90002260-243 = "大家為什麼都是這種反應……？"
90002260-245 = "沒想到部長也能說出這種話，讓我有點感動。#n這種橋段應該滴幾滴眼淚比較應景，我馬上去點眼藥水。"
90002260-246 = "我的借你用吧，英美。#n畢竟我可是準備周全的完美女僕兼特務啊。"
90002260-247 = "剛才那番話我已經從頭到尾錄了下來，之後也會傳給愛麗絲的。"
90002260-248 = "……！"
90002260-249 = "果然不該說不習慣的話呢……"
90002260-250 = "[s1] 「不過陽葵說得對。」\n[s2] 「……你已經被優香罵過很多次了吧，莉央？」"
90002260-253 = "……！！！"
90002260-254 = "是，是啊……我不會再重蹈覆轍了……"
90002260-255 = "那就好……"
90002260-258 = "由十字神名引發的外部駭客攻擊，現在應該可以視為沒有風險了。"
90002260-259 = "即便如此還是回到這個部室的原因……#n嗯，是為了向千年的學生……"
90002260-260 = "或者進一步來說，是為了向奇普托斯的學生隱藏馬爾庫特的存在。#n對吧，馬爾庫特？"
90002260-265 = "我本來還以為，自己會就這樣被遺忘呢。"
90002260-266 = "雖然仔細想想，就算真是如此似乎也無所謂。"
90002260-267 = "[s] 「抱歉……你生氣了嗎？」"
90002260-268 = "這是個無法理解的問題。#n對於「生氣」這個詞彙，正在搜索是否有我尚未認知的含意……"
90002260-269 = "果然還是無法理解。#n老師，這是什麼意思呢？"
90002260-270 = "不知道也沒關係……？#n更加無法理解了……"
90002260-271 = "[s3] 「先，先不說這個了！」\n[s4] 「馬爾庫特接下來想做什麼呢？」"
90002260-274 = "呵呵。儘管這並不完全是我們的意願……"
90002260-275 = "如果你想要的話，我也可以在這個特異現象搜查部為你安排一個位置哦？"
90002260-276 = "當然，前提是你真的有這個意思……對吧對吧？"
90002260-277 = "那個……"
90002260-278 = "（難道說，陽葵這段話的意思是……）"
90002260-280 = "總之，他的意思是「以後想跟你好好相處，所以一起待在這裡吧」。"
90002260-281 = "沒錯。陽葵部長偶爾會有不太坦率的時候。"
90002260-282 = "只希望他沒有想把有趣的研究對象放在身邊的意思……"
90002260-284 = "（太好了。看來我沒有猜錯呢）"
90002260-285 = "不要擅自揣測別人的想法好嗎！？"
90002260-290 = "語言的含義，還真是困難啊……"
90002260-291 = "……"
90002260-292 = "感謝你們的關心。"
90002260-293 = "不過，我還是想暫時找個地方躲藏起來。"
90002260-294 = "[s] 「為什麼！？」"
90002260-295 = "……"
90002260-296 = "一直以來，我都不知道「自己的人生」究竟是什麼。"
90002260-297 = "不需要思考，也沒必要思考那種事情。"
90002260-302 = "Ain、Soph、Aur……"
90002260-303 = "妹妹們告訴我要活下去。#n所以我認為自己應該這麼做。"
90002260-304 = "然而我果然還需要時間來定義、整理和規定它。"
90002260-305 = "儘管我也不清楚為什麼要那麼做，又為何會產生那樣的想法……"
