[translation]
2005403-1 = "#title;규정과 개념"
2005403-2 = "3;히마리 결전 비무장;03\n#3;h\n#wait;2000"
2005403-3 = "3;히마리 결전 비무장;03\n#3;em;[반응]\n#wait;1000"
2005403-4 = "3;히마리 결전 비무장;02;낮잠은 푹 주무셨나요, 선생님?"
2005403-5 = "[s] \"깨워 줘서 고마워…….\""
2005403-6 = "3;히마리 결전 비무장;07;별말씀을요. 지금의 저는 선생님만의 초천재병약미소녀해커이자 라이프 스태프……"
2005403-7 = "3;히마리 결전 비무장;03;그야말로 생활 어시스턴트 그 자체니까요.\n#3;em;[반짝]"
2005403-8 = "3;히마리 결전 비무장;01;그러면, 선생님. 오후 업무도 힘내도록 하죠."
2005403-9 = "#all;hide"
2005403-10 = "#na;(그렇게 히마리와 같이, 하루치 업무의 오후 분량을 해결해 나갔다.)"
2005403-11 = "#st;[0,0];instant;1;"
2005403-12 = "#clearST"
2005403-13 = "#wait;5500"
2005403-14 = "3;히마리 결전 비무장;01\n#3;a"
2005403-15 = "[ns] \"흐아아암…….\""
2005403-16 = "3;히마리 결전 비무장;02;또 잠이 오시나요?\n#3;em;[?]"
2005403-17 = "3;히마리 결전 비무장;99;잠…… 까지는 아니고, 나른한 정도라고요? 후훗. 그렇군요."
2005403-18 = "3;히마리 결전 비무장;02;그러면 지금부터 휠체어를 정비하러 갈 건데, 같이 가시겠어요?\n#3;em;[재잘]"
2005403-19 = "[s] \"응? 그거 지금 타고 있지 않아?\""
2005403-20 = "3;히마리 결전 비무장;07;아뇨. 이 휠체어가 아니라……."
2005403-21 = "3;히마리 결전 비무장;01;제가 주로 고속 이동용으로 사용하는, 전투 및 상황 대응까지 가능한."
2005403-22 = "3;히마리 결전 비무장;03;외부 지형 사양의 만능 휠체어를 의미하는 거랍니다?\n#3;em;[반짝]"
2005403-23 = "[s] \"그거 바이크…….\""
2005403-24 = "3;히마리 결전 비무장;05;휠. 체. 어. 랍니다?\n#3;closeup"
2005403-25 = "[ns] \"그, 그래…….\""
2005403-26 = "#all;hide"
2005403-27 = "#all;hide"
2005403-28 = "3;히마리 결전 비무장;01\n#3;al\n#wait;2000"
2005403-29 = "3;히마리 결전 비무장;03\n#wait;1000\n#3;em;[음표]"
2005403-30 = "3;히마리 결전 비무장;07\n#3;dl\n#wait;1000"
2005403-31 = "#na;(히마리는 능숙하게 바이크…… 휠체어를 정비했다.)"
2005403-32 = "#na;(히마리가 즐거워 보여 다행이었지만…… 역시 그 명칭에는 아직도 위화감이 조금 들었다…….)"
2005403-33 = "#all;hide"
2005403-34 = "#wait;2000"
2005403-35 = "3;히마리 결전;07\n#3;h"
2005403-36 = "3;히마리 결전;07\n#3;em;[…]\n#wait;2500"
2005403-37 = "3;히마리 결전;02;부양 장치 출력 양호. 주행 및 제동장치, 과급기 이상 없음. 보조 에너지 셸 잔량 확인……."
2005403-38 = "3;히마리 결전;03;후후. 오늘도 제 휠체어는 완벽하네요.\n#3;em;[반짝]"
2005403-39 = "[s] \"휠체어란 뭘까…….\""
2005403-40 = "3;히마리 결전;02;어머나. 선생님 정도 되는 분이 그걸 모르시다니."
2005403-41 = "3;히마리 결전;03;어쩔 수 없군요. 여기에서는 제가 확실하게 말씀드릴 수밖에요."
2005403-42 = "3;히마리 결전;08;휠체어란 당연히, 사람이 의자에 앉아 이동하기 위해 만들어진 이동 보조 기구를 뜻하죠.\n#3;em;[재잘]"
2005403-43 = "3;히마리 결전;03;그중에서도 제 것은, 실내용과 실외용 모두 동력의 힘으로 작동하는 전동형에 해당하고요."
2005403-44 = "[s] \"그, 그렇구나……?\""
2005403-45 = "3;히마리 결전;03;어머나. 어째서인지 말끔하게 생각이 정리되지 않으신 것 같네요?\n#3;em;[?]"
2005403-46 = "3;히마리 결전;08;하지만 선생님. 동력으로 움직이고, 걷는 것을 보조하며, 생활에 편의성을 부여해 준다는 점에서는."
2005403-47 = "3;히마리 결전;02;이 '실외용 휠체어' 역시, 저에게 있어서는 무수한…… 보행 보조 기구 중 하나인 것이죠."
2005403-48 = "3;히마리 결전;07;저는 분명, 제 두 다리에 지금보다는 더 힘을 줄 수 있었을 때도."
2005403-49 = "3;히마리 결전;03;이런 휠체어를 구상하고 만들어내려 했을 테니까요."
2005403-50 = "3;히마리 결전;99;물론 그때에는 아주 흔한 공학적 변명……."
2005403-51 = "3;히마리 결전;00;시간과 예산의 제약 문제가 언제나 따라다녔지만, 지금이라면 다르죠."
2005403-52 = "3;히마리 결전;02;네? 여러 가지 의미로, 언제나 진취적이고 당당한 제가 좋으시다고요?"
2005403-53 = "3;히마리 결전;07;후, 후후후……. 당연하죠, 선생님. 저, 저를 뭐로 보시고요. \n#3;em;[///]"
2005403-54 = "3;히마리 결전;08;저는 겉으로 보기에는 난초와 같은 아름다움을 지녔지만, 그 안에는 백옥보다도 강인한 의지를 가진."
2005403-55 = "3;히마리 결전;03;웬만해서는 좌절하거나 체념하지 않는, 아케보시 히마리니까요.\n#3;closeup\n#3;em;[반짝]"
2005403-56 = "3;히마리 결전;08;생각해 보세요, 선생님. 생활 보조 기구라는 것은, 용도와 의도에 따라 다양하게 마련되어 있으면 좋은 것 아니겠어요?\n#3;closeup"
2005403-57 = "[ns] \"그건…… 그렇지. 드라이버 사이즈가 여러 개인 것처럼.\""
2005403-58 = "#st;[0,0];instant;1;"
2005403-59 = "#clearST"
2005403-60 = "3;히마리 결전;08\n#3;closeup\n#3;d\n#wait;1000"
2005403-61 = "3;히마리 결전;08\n#3;a\n#wait;1000"
2005403-62 = "3;히마리 결전;03;후후. 네. 그런 것이랍니다.\n#3;em;[반응]"
2005403-63 = "3;히마리 결전;08;네? 그러면 이 '실외용 휠체어'가, 보통의 다른 바이크와는 구체적으로 어떤 차이가 있냐고요?"
2005403-64 = "#st;[0,0];instant;1;"
2005403-65 = "#clearST"
2005403-66 = "3;히마리 결전;07\n#3;em;[…]\n#wait;2500"
2005403-67 = "3;히마리 결전;02;어쩔 수 없네요. 이런 제안은 드리려 하지 않았습니다만.\n#3;em;[한숨]"
2005403-68 = "3;히마리 결전;02;역시 이 기회에 선생님께, 저의 이 '휠체어'가."
2005403-69 = "3;히마리 결전;99;보통의 평범한 바이크와는, 기본 스펙의 측면에서부터."
2005403-70 = "3;히마리 결전;03;근본적으로 완전히 다르다는 것을, 확실하게 알려드려야 할 필요가 있겠어요."
2005403-71 = "[s] (뭔가 살짝 불길한데…….)"
2005403-72 = "3;히마리 결전;07;그러니, 선생님?"
2005403-73 = "3;히마리 결전;03;조금, 시간 괜찮으실까요?\n#3;closeup"
2005403-74 = "#all;hide"
