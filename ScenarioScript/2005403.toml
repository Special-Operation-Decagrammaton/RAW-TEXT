[translation]
2005403-1 = "規則與概念"
2005403-4 = "午覺睡得好嗎，老師？"
2005403-5 = "[s] 「謝謝你叫醒我……」"
2005403-6 = "不客氣。現在的我是老師專屬的超天才病弱美少女駭客……"
2005403-7 = "同時也兼任生活助理嘛。"
2005403-8 = "那麼老師，下午的工作也加油吧。"
2005403-10 = "（就這樣和陽葵一起搞定了下午的工作）"
2005403-15 = "[ns] 「呼啊啊……」"
2005403-16 = "又想睡了嗎？"
2005403-17 = "不是想睡……只是有點慵懶？#n呵呵，原來如此。"
2005403-18 = "我現在正好要去保養輪椅，您要一起來嗎？"
2005403-19 = "[s] 「嗯？你現在不就坐在輪椅上嗎？」"
2005403-20 = "不，我指的並不是這台輪椅。"
2005403-21 = "而是主要用於高速移動，可以應對戰鬥及各種狀況……"
2005403-22 = "針對外部地形規格設計的萬能輪椅哦？"
2005403-23 = "[s] 「那個是機車……」"
2005403-24 = "是．輪．椅．唷？"
2005403-25 = "[ns] 「好，好吧……」"
2005403-31 = "（陽葵熟練地保養著機車……不，是輪椅）"
2005403-32 = "（雖然能看到陽葵開心是好事……但是那個名稱還是讓人有股違和感……）"
2005403-37 = "懸浮裝置輸出良好。行駛及制動裝置、渦輪增壓器皆無異常。#n確認輔助能量護盾殘量……"
2005403-38 = "呵呵。今天我的輪椅也很完美呢。"
2005403-39 = "[s] 「輪椅到底是什麼呢……」"
2005403-40 = "哎呀，想不到老師這樣的人居然會不知道呢。"
2005403-41 = "真拿您沒辦法，就讓我清楚地告訴您吧。"
2005403-42 = "所謂的輪椅，指的當然是能讓人坐在椅子上移動的「移動輔助器具」。"
2005403-43 = "而我的無論是室內用還是室外用，都屬於運用動力驅動的電動型。"
2005403-44 = "[s]「這，這樣啊……」"
2005403-45 = "哎呀，看來您似乎還沒有完全理解呢？"
2005403-46 = "老師不妨試著這麼思考。#n從藉由動力移動、輔助行走、為生活提供便利這幾項因素來看……"
2005403-47 = "這台「室外用輪椅」對我來說……也是無數行走輔助器具的其中一種。"
2005403-48 = "我敢肯定，即便是在雙腿比現在更有力量的時候……"
2005403-49 = "我也會想要構思並製造出這樣的輪椅。"
2005403-50 = "當然，那時工程師常用的藉口……"
2005403-51 = "比如時間與預算受限之類的問題總是如影隨形，然而現在已經不同了。"
2005403-52 = "咦？您說從各種意義上來說，很欣賞始終積極進取且充滿自信的我？"
2005403-53 = "呵，呵呵呵……那當然囉，老師。#n您，您把我當成什麼人了。"
2005403-54 = "我可是外表如蘭花般美麗，內心卻比白玉還堅強──"
2005403-55 = "不會輕易受挫或放棄的明星陽葵呢。"
2005403-56 = "而且請想想看，老師。#n「生活輔助器具」如果能根據用途和目的準備許多款式，這樣不是很好嗎？"
2005403-57 = "[ns] 「這倒也是……就像螺絲起子有很多尺寸一樣。」"
2005403-62 = "呵呵。沒錯，正是如此。"
2005403-63 = "咦？那麼這台「室外用輪椅」和普通的機車具體有什麼不同？"
2005403-67 = "真是拿您沒辦法。#n我本來是不打算提出這種建議的……"
2005403-68 = "果然還是藉著這個機會，讓老師清楚明白這件事吧。"
2005403-69 = "我的這台「輪椅」，和那些平凡無奇的機車相比……"
2005403-70 = "打從基本規格就是完全不同的存在。"
2005403-71 = "[s] （總覺得有點不妙……）"
2005403-72 = "那麼，老師？"
2005403-73 = "方便耽誤您一些時間嗎？"
