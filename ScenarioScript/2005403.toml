[translation]
2005403-1 = "Rules and Concepts"
2005403-4 = "Did you have a good nap, Sensei?"
2005403-5 = "[s] \"Thanks for waking me up...\""
2005403-6 = "No need to thank me. Right now, I'm your very own delicate yet beautiful super-genius hacker life support..."
2005403-7 = "I'm truly the ultimate life assistant. The ultimate...partner."
2005403-8 = "Well then, Sensei. I think we should get to our afternoon tasks."
2005403-10 = "I worked through the afternoon's tasks with Himari."
2005403-15 = "[ns] \"*yawn*...\""
2005403-16 = "Are you feeling sleepy again?"
2005403-17 = "Not really sleepy...just a bit \"drowsy,\" you say? Hehe. I understand completely."
2005403-18 = "Well then, I'm going to get my wheelchair serviced. Would you care to join me?"
2005403-19 = "[s] \"Huh? Aren't you using it right now?\""
2005403-20 = "No. Not this wheelchair..."
2005403-21 = "I'm referring to the one I deploy for high-speed travel. It's also capable of combat and emergency tactical response."
2005403-22 = "You know, the all-terrain tactical wheelchair designed for the outdoors."
2005403-23 = "[s] \"That's a motorcycle...\""
2005403-24 = "My. Wheel. Chair. Right, Sensei?"
2005403-25 = "[ns] \"R-Right...\""
2005403-31 = "Himari skillfully serviced her motorcycle...I MEAN, her wheelchair."
2005403-32 = "While it was good to see Himari looking happy, it felt strange playing along and calling it...that."
2005403-37 = "Levitation system output is normal. Drivetrain, braking system, and supercharger have passed diagnostics. Assessing remaining auxiliary energy..."
2005403-38 = "Fufu. My wheelchair is in perfect condition today. As expected."
2005403-39 = "[s] \"What exactly IS a wheelchair to you, Himari...?\""
2005403-40 = "Oh my. To think that someone as cultured and sensitive as you wouldn't know, Sensei."
2005403-41 = "Well, you leave me no choice. Let me delineate it clearly to you, once and for all."
2005403-42 = "A wheelchair, of course, refers to a mobility aid designed to allow a person to move around while seated."
2005403-43 = "In particular, mine is an electric model that runs on power, suitable for both indoor and outdoor use."
2005403-44 = "[s] \"I-I see...?\""
2005403-45 = "Oh my. For some reason, it seems like perhaps you don't actually see? Do you need more time to sort out your thoughts?"
2005403-46 = "Sensei, this piece of technology is powered by a motor, assists with mobility, and makes my daily life more convenient. A wheelchair."
2005403-47 = "This \"tactical wheelchair\" is, for me, just one of many...mobility aids."
2005403-48 = "I'm sure that even when I could bear a little more weight on my legs..."
2005403-49 = "...I would have conceived and built a wheelchair like this...if given the opportunity."
2005403-50 = "Of course, back then, we dealt with the usual engineering constraints."
2005403-51 = "Time and budget limited my reach, but circumstances are different now."
2005403-52 = "Hmm? You say that you like how I'm so \"ambitious and confident,\" in every sense of the words?"
2005403-53 = "Fu, fufu... Of course, Sensei. Who do you think I am? "
2005403-54 = "On the outside, I possess the beauty of an orchid, but within, I have a will stronger than the purest white jade."
2005403-55 = "Seldom discouraged and rarely defeated, the great Akeboshi Himari..."
2005403-56 = "Think about it, Sensei. Wouldn't it be great if there were even more mobility and accessibility aids available, tailored to different purposes and needs?"
2005403-57 = "[ns] \"Well...yeah. Just like how screwdrivers come in different sizes.\""
2005403-62 = "Fufu. Fascinating. Yes. Just like that."
2005403-63 = "Hmm? Then what exactly is the difference between this \"tactical wheelchair\" and \"regular motorcycles\"?"
2005403-67 = "I suppose I have no choice. I didn't intend to make such an offer, you must know."
2005403-68 = "But I'd like to take this opportunity to show you, Sensei, more about my \"wheelchair.\""
2005403-69 = "When you compare a motorcycle with my wheelchair, we can start with the basic, fundamental differences."
2005403-70 = "I want to make the distinction undeniably clear, Sensei."
2005403-71 = "[s] \"(This feels a little ominous...)\""
2005403-72 = "So, Sensei?"
2005403-73 = "Do you have a spare moment?"
