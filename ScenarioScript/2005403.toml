[translation]
2005403-1 = "กฎระเบียบและแนวคิด"
2005403-4 = "นอนกลางวันสบายหรือเปล่าคะ คุณครู?"
2005403-5 = "[s] \"ขอบใจที่ปลุกนะ...\""
2005403-6 = "ไม่ต้องขอบใจกันหรอกค่ะ ก็ตอนนี้ฉันคือผู้ดูแลส่วนตัวและแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสฮีลใจ#nเหมือนยาวิเศษของคุณครูโดยเฉพาะ..."
2005403-7 = "เรียกว่าเป็นผู้ช่วยในชีวิตประจำวันอย่างแท้จริงได้เลยค่ะ"
2005403-8 = "เอาละค่ะ คุณครู งานในภาคบ่ายของวันนี้ก็สู้ๆ นะคะ"
2005403-10 = "(แล้วคุณครูกับฮิมาริก็ทำงานภาคบ่ายของวันนี้ด้วยกัน)"
2005403-15 = "[ns] \"ฮ้าวววว...\""
2005403-16 = "ง่วงนอนอีกแล้วเหรอคะ?"
2005403-17 = "ไม่ถึงกับอยากนอน... แต่แค่รู้สึกอ่อนเปลี้ยงั้นเหรอคะ? ฮุฮุ อย่างนั้นสินะคะ"
2005403-18 = "ฉันจะไปซ่อมบำรุงวีลแชร์อยู่พอดี ไปด้วยกันมั้ยล่ะคะ?"
2005403-19 = "[s] \"หืม? แต่ก็นั่งวีลแชร์อยู่ไม่ใช่เหรอ?\""
2005403-20 = "เปล่าค่ะ ฉันไม่ได้หมายถึงวีลแชร์คันนี้..."
2005403-21 = "แต่เป็นวีลแชร์อเนกประสงค์ที่เอาไว้ใช้กลางแจ้ง สำหรับการเคลื่อนที่ด้วยความเร็วสูง"
2005403-22 = "แถมยังต่อสู้และตอบสนองต่อสถานการณ์ต่างๆ ได้ต่างหากล่ะคะ"
2005403-23 = "[s] \"นั่นมันมอเตอร์ไซค์...\""
2005403-24 = "วีล แชร์ ค่ะ"
2005403-25 = "[ns] \"กะ... ก็ได้...\""
2005403-31 = "(ฮิมาริซ่อมบำรุงมอเตอร์ไซค์... ซ่อมบำรุงวีลแชร์ได้อย่างชำนาญ)"
2005403-32 = "(คุณครูโล่งใจที่เห็นว่าฮิมาริดูมีความสุข... แต่ก็ยังมีคำถามเกี่ยวกับชื่อเรียกวีลแชร์นั่นอยู่ดี...)"
2005403-37 = "กำลังขับของระบบโช้คปกติดี ระบบขับเคลื่อน ระบบเบรกและระบบอัดอากาศไม่พบความผิดปกติใดๆ ส่วนพลังงานที่เหลือในเซลล์สำรองก็..."
2005403-38 = "ฮุฮุ วันนี้วีลแชร์ของฉันก็สมบูรณ์แบบเลยค่ะ"
2005403-39 = "[s] \"วีลแชร์มันคืออะไรกันนะ...\""
2005403-40 = "ตายจริง คนที่มีความสามารถระดับคุณครูก็ยังไม่รู้เหรอคะ"
2005403-41 = "งั้นก็ช่วยไม่ได้นะคะ ฉันคงต้องบอกให้ชัดๆ ตรงนี้เลยค่ะ"
2005403-42 = "วีลแชร์ก็คืออุปกรณ์ช่วยเคลื่อนที่ โดยออกแบบให้คนนั่งลงได้เหมือนกับเก้าอี้แล้วเคลื่อนย้ายไปไหน#nมาไหนได้ค่ะ"
2005403-43 = "และในบรรดาวีลแชร์ทั้งหมด วีลแชร์ของฉันอยู่ในหมวดหมู่ที่ใช้พลังงานไฟฟ้า สำหรับใช้งานทั้งในร่ม และกลางแจ้งค่ะ"
2005403-44 = "[s] \"ยะ... อย่างนั้นสินะ...?\""
2005403-45 = "ตายจริง ดูเหมือนว่าคุณครูจะยังจัดการความคิดได้ไม่เรียบร้อยเลยนะคะ?"
2005403-46 = "แต่ว่าคุณครูคะ ในแง่ของการใช้พลังงาน การช่วยเหลือในการเคลื่อนที่ และการอำนวยความสะดวก#nในชีวิตประจำวันแล้วน่ะ"
2005403-47 = "'วีลแชร์กลางแจ้ง' คันนี้ก็เป็นแค่หนึ่งในอุปกรณ์ช่วยเคลื่อนที่... ที่มีหลายต่อหลายคันของฉันน่ะค่ะ"
2005403-48 = "ต่อให้เป็นแต่ก่อนที่ฉันยังยืนไหวด้วยขาของตัวเอง"
2005403-49 = "ฉันก็คงจะออกแบบและสร้างวีลแชร์แบบนี้ขึ้นมาอยู่ดีค่ะ"
2005403-50 = "แน่นอนว่าในตอนนั้น นี่อาจเป็นข้ออ้างทางวิศวกรรมที่พบได้ทั่วไป..."
2005403-51 = "ปัญหาด้านเวลาและงบประมาณมักเป็นสิ่งที่ตามมาด้วยเสมอ แต่ในปัจจุบันมันแตกต่างออกไปค่ะ"
2005403-52 = "คะ? คุณครูบอกว่าชอบที่ฉันมีความกระตือรือร้นและมั่นใจในหลายๆ ด้านงั้นเหรอคะ?"
2005403-53 = "ฮุ... ฮุฮุฮุ... แน่นอนอยู่แล้วค่ะคุณครู คะ... คิดว่าฉันเป็นคนยังไงกันคะ? "
2005403-54 = "ถึงภายนอกฉันจะสง่างามดั่งดอกกล้วยไม้ แต่ภายในฉันมีเจตจำนงที่แข็งแกร่งกว่าหยกขาวเสียอีกค่ะ"
2005403-55 = "ก็ฉันคืออาเกโบชิ ฮิมาริผู้ที่ไม่ท้อถอยนี่คะ"
2005403-56 = "ลองคิดดูนะคะคุณครู ถ้าอุปกรณ์ช่วยเหลือในชีวิตประจำวันมีให้เลือกใช้ได้หลากหลายรูปแบบตาม#nวัตถุประสงค์ ก็คงจะดีไม่น้อยเลยว่ามั้ยคะ?"
2005403-57 = "[ns] \"ก็จริงนะ... เหมือนที่ไขควงมีให้เลือกใช้หลายขนาดไง\""
2005403-62 = "ฮุฮุ ค่ะ นั่นละค่ะ"
2005403-63 = "คะ? ถ้างั้น 'วีลแชร์กลางแจ้ง' ของฉันแตกต่างกับมอเตอร์ไซค์ทั่วไปคันอื่นยังไงบ้างน่ะเหรอคะ?"
2005403-67 = "ช่วยไม่ได้นะคะ ถึงฉันจะไม่อยากเสนอแนะอะไรแบบนี้เลยก็ตาม"
2005403-68 = "งั้นฉันจะใช้โอกาสนี้อธิบายกับคุณครูให้ชัดเจนว่า 'วีลแชร์' คันนี้ของฉัน"
2005403-69 = "เมื่อเทียบกับมอเตอร์ไซค์ทั่วไปแล้ว มันต่างกันยังไงบ้าง"
2005403-70 = "ฉันจะเริ่มตั้งแต่เรื่องสเป็กพื้นฐานเลยค่ะ"
2005403-71 = "[s] (รู้สึกเหมือนมีลางร้ายเลยแฮะ...)"
2005403-72 = "ถ้างั้น คุณครูคะ?"
2005403-73 = "พอจะมีเวลาสักครู่บ้างมั้ยคะ?"
