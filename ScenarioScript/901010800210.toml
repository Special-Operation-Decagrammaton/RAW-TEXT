[translation]
901010800210-11 = "FOX2、何か発見したか？"
901010800210-12 = "構成員がパトロールに出る前に読むガイドマニュアルがあったよ。中身確認中。"
901010800210-13 = "「巡回エリアマップ」、「主要点検要素」、「緊急時の非常連絡網」……。"
901010800210-14 = "ただの業務マニュアルとか点検表のように見えるけど――"
901010800210-18 = "あ、このマニュアルの最後に手書きで追記されてる。"
901010800210-23 = "「毎週1回、宿直の者は午前0時にドラム缶を転がしながら港を一周すること」……？"
901010800210-24 = "どういう指示？"
901010800210-25 = "なんでそんなことしなきゃいけないのか、理由や目的とか書かれてないの？"
901010800210-26 = "うん。特に説明はないよ。指示だけ。"
901010800210-27 = "なんだか変な指示だね。#n怪談によくある「何かあっても絶対に302号室には入ってはいけない」みたいな。"
901010800210-28 = "なんで302号室に入っちゃダメなの？"
901010800210-29 = "分かんない。まあ、それを説明できたら怪談じゃなくなるじゃん？"
901010800210-31 = "作り話ならともかく、現実のあらゆるマニュアルには「意図」が存在する。"
901010800210-32 = "これの意図については、後で話し合おう。"
901010800210-33 = "FOX2、引き続き倉庫の内部を調べるように。"
