[translation]
1009503-1 = "ถึงเวลาฝึกงานแล้วค่ะคุณครู"
1009503-2 = "(คุณครูมาถึงก่อนเวลานัด 15 นาที)"
1009503-3 = "(ระหว่างที่รอมิโดริอยู่...)"
1009503-7 = "สวัสดีค่ะคุณครู!"
1009503-11 = "[ns] \"มิโดริ? ใส่ชุดเมดมาถึงที่นี่เลยเหรอ?!\""
1009503-12 = "ว้าว! ในที่สุดคุณครูก็ตกใจแล้วเหรอคะเนี่ย!"
1009503-13 = "[s] \"เรื่องนั้นมันสำคัญด้วยเหรอ!\""
1009503-14 = "แต่ว่าคุณครูคะ ฉันต้องแต่งแบบนี้มาอยู่แล้วค่ะ"
1009503-15 = "ก็ตอนนี้ฉันเป็นเมดของคุณครูนี่คะ?"
1009503-16 = "[s] \"ไม่ได้ทำเล่นๆ สินะเนี่ย...\""
1009503-17 = "แน่นอนค่ะ"
1009503-18 = "[s] \"ตอบแบบนี้ครูไปไม่เป็นเลย!\""
1009503-19 = "เอาเถอะค่ะ สรุปว่าฉันเป็นเมดของคุณครู"
1009503-20 = "และเมดก็ต้องปรนนิบัติผู้ว่าจ้างตอนออกไปข้างนอกด้วย"
1009503-21 = "เพราะงั้นการแต่งกายด้วยชุดที่เหมาะสมจึงเป็นเรื่องธรรมชาติมากค่ะ"
1009503-22 = "คุณครูไม่คิดอย่างนั้นเหรอคะ?"
1009503-23 = "[s] \"ตอนนี้ครูสมองดับไปแล้ว...\""
1009503-24 = "อ๊ะ แต่ยังไงก็ไม่ได้ปฏิเสธสินะคะ! งั้นฉันจะคิดว่าคุณครูเห็นด้วยนะคะ"
1009503-25 = "แล้วก็... มีอีกอย่างหนึ่ง..."
1009503-26 = "ฉันคิดว่าถ้าคุณครูแต่งตัวให้เข้ากันกับฉันก็น่าจะดีค่ะ!"
1009503-27 = "จะได้ดูเป็นการตระเตรียมจากเมดที่ยอดเยี่ยมยังไงล่ะคะ"
1009503-28 = "[s] \"เหมือนจะเริ่มจริงจังขึ้นเรื่อยๆ จนออกทะเลแล้วนะ!\""
1009503-29 = "ไม่หรอกค่ะ เชื่อฉันนะคะ!"
1009503-33 = "เอาเป็นว่า ฉันอยากให้คุณครูเปลี่ยนเสื้อผ้าค่ะ!"
1009503-34 = "นี่ค่ะ ฉันเอามาหลายอย่างเลยค่ะ ทั้งเสื้อโค้ต หมวกทรงสูง ไม้เท้า"
1009503-35 = "ชุดเดรสที่ด้านหลังพองๆ หมวกประดับขนนก แล้วก็ร่มกันแดดด้วยค่ะ!"
1009503-36 = "ถ้าเครื่องประดับไม่พอ ฉันก็มีทั้งแว่นตาข้างเดียว พัดที่เอาไว้ถือเก๋ๆ แล้วก็ของอย่างอื่นอีกเยอะแยะ#nเลยค่ะ"
1009503-37 = "ไม่ต้องกังวลไปนะคะ ให้ฉันจัดการทุกอย่างให้เองค่ะ!"
1009503-38 = "[s1] \"ก็ว่าอยู่ว่าทำไมลากกระเป๋าเดินทางใบใหญ่มาด้วย!\"\n[s2] \"หอบเสื้อผ้าและเครื่องประดับมาสินะ!\""
1009503-41 = "แน่นอนค่ะ แน่นอนอยู่แล้ว!"
1009503-42 = "เอาละ รีบเปลี่ยนเสื้อผ้าสิคะ ขอให้ฉันได้รับใช้คุณครูเถอะนะคะ!"
1009503-43 = "เหนือสิ่งอื่นใด การได้มีนายท่านที่คู่ควรต่อการปรนนิบัติรับใช้คือความภาคภูมิใจของเมดนะคะ"
1009503-44 = "ฉันอยากเห็นคุณครูในชุดเท่ๆ ค่ะ!"
1009503-45 = "นี่จะเป็นความภาคภูมิใจของทั้งเมดและนักวาดเลยค่ะ!"
1009503-46 = "[s3] \"แต่ว่า... ก่อนอื่นเลย\"\n[s4] \"ชุดพวกนี้มันจะพอดีตัวครูเหรอ?\""
1009503-49 = "เรื่องนั้นไม่ต้องเป็นห่วงเลยค่ะ"
1009503-50 = "ฉันได้รับความช่วยเหลือและคำแนะนำจากหลายๆ ที่ในมิลเลเนียมน่ะค่ะ"
1009503-51 = "แล้วทางนั้นก็ขอให้ช่วยถ่ายรูปแล้วส่งให้ดูด้วยค่ะ"
1009503-52 = "เพราะงั้น คุณครูคะ"
1009503-60 = "รีบเปลี่ยนสิคะ..."
1009503-62 = "(คุณครูห้ามมิโดริไว้ได้ แต่มิโดริก็เหมือนจะงอน คุณครูจึงต้องปลอบเธออยู่นาน)"
1009503-63 = "(หลังจากเอากระเป๋าเดินทางไปฝากไว้ ในที่สุดทั้งสองก็ได้ไปพิพิธภัณฑ์ศิลปะ...)"
1009503-73 = "วิเศษไปเลย... ห้องนิทรรศการกับโถงทางเดินก็เป็นคอนเซ็ปต์เดียวกันเลยนะคะ"
1009503-74 = "ที่นี่มีหลายๆ อย่างที่ยอดเยี่ยมเลยค่ะ"
1009503-75 = "ดูชุดนี้สิคะคุณครู ส่วนหน้าอกที่หลวมๆ ดูตัดกับส่วนเอวที่รัดแน่นจนคอดเลยค่ะ"
1009503-76 = "เห็นว่าถ้าจะทำให้เอวคอดได้ขนาดนั้น ต้องใส่เสื้ออะไรที่รัดแน่นๆ ไว้ข้างในด้วย..."
1009503-77 = "แค่คิดฉันก็เวียนหัวแล้วค่ะ..."
1009503-78 = "อีกอย่าง ลองคิดดูนะคะ ชุดแบบนั้นน่ะ ใส่คนเดียวไม่ไหวหรอกค่ะ"
1009503-79 = "เท่าที่ฉันรู้มา ถ้าจะใส่ชุดแบบนั้นให้ได้"
1009503-80 = "จะต้องมีคนช่วยใส่ 3-4 คนเลยนะคะ..."
1009503-81 = "[s] \"แฟชั่นมันคืออะไรกันนะ...\""
1009503-82 = "คือทุกอย่างเลยค่ะ!"
1009503-83 = "[s] \"ขนาดนั้นเลยเหรอ?!\""
1009503-84 = "ถ้าลองคิดดู ก็อาจจะไม่ถึงขนาดนั้นก็ได้ค่ะ..."
1009503-85 = "ตะ... แต่คนเราก็มีปัจจัยพื้นฐานในการดำรงชีวิตนี่คะ หนึ่งในนั้นก็คือเครื่องนุ่งห่มด้วย เพราะงั้นแฟชั่น#nอาจจะเป็นสิ่งสำคัญมากกว่าที่เราคิดก็ได้ค่ะ"
1009503-86 = "ใช่แล้วค่ะ! โดยเฉพาะอย่างยิ่งกับนักวาดอย่างฉันค่ะ"
1009503-87 = "การใส่เสื้อผ้าถือเป็นการแสดงตัวตนของเราออกมาด้วย"
1009503-88 = "เพราะงั้นฉันจึงคิดว่าคุณครูต้องใส่ใจในแฟชั่นอีกสักหน่อยค่ะ!"
1009503-89 = "[s] \"ครูจะเอาคำแนะนำนี้ไปคิดดูนะ...\""
1009503-90 = "ไม่ใช่แค่เอาไปคิดสิคะ คุณครู! นี่เป็นปัญหาสำคัญเลยนะคะ!"
1009503-91 = "ไม่ได้การแล้วค่ะ ฉันต้องกลับไปเอากระเป๋าเดินทางแล้วให้คุณครูเปลี่ยนเสื้อผ้าแล้วค่ะ"
1009503-92 = "[s] \"ใจเย็นๆ ก่อนนะมิโดริ\""
1009503-93 = "ไม่ได้เหรอคะ? ไม่ว่าฉันจะเกลี้ยกล่อมยังไงก็ไม่ได้เหรอคะ?"
1009503-94 = "ว่าไงนะคะ? ถ้าออกไปตอนนี้ ตอนกลับมาก็ต้องซื้อตั๋วเข้าชมอีกรอบเหรอคะ?"
1009503-95 = "ที่คุณครูพูดก็ถูกนะคะ..."
1009503-99 = "จะว่าไปแล้ว พวกเครื่องแต่งกายโบราณมีรูปแบบและดีไซน์ที่..."
1009503-100 = "จะว่าคล้ายกับชุดของเมดก็คล้าย แต่มันก็ต่างกันด้วยค่ะ"
1009503-101 = "อย่างเช่น หมวกผู้หญิง ชุดกระโปรง แล้วก็ริบบิ้นค่ะ"
1009503-102 = "[s] \"พอลองฟังแล้วก็จริงอย่างที่ว่านะ\""
1009503-103 = "เราไปเดินดูอีกหลายๆ ที่ดีกว่าค่ะ คุณครู"
1009503-104 = "ฉันคิดว่าน่าจะได้แรงบันดาลใจกลับไปจากที่นี่ค่ะ!"
1009503-113 = "(แล้วคุณครูก็โดนมิโดริลากไปทัวร์ทั่วนิทรรศการ)"
1009503-114 = "(กว่าจะชมเสร็จทุกส่วนก็ถึงเวลาเย็น)"
1009503-117 = "ขอบคุณที่แนะนำนิทรรศการแบบนี้ให้นะคะคุณครู ขอบคุณมากเลยค่ะ"
1009503-118 = "และที่สำคัญ..."
1009503-119 = "ฉันสนุกกับเดตวันนี้มากๆ เลยค่ะ"
1009503-120 = "[ns] \"หืม? ประโยคสุดท้ายว่าอะไรนะ? ครูได้ยินไม่ถนัดเลย\""
1009503-124 = "มะ... ไม่ได้ยินก็ดีแล้วค่ะ ไม่มีอะไรทั้งนั้นค่ะ!"
1009503-125 = "ระ... เรารีบกลับกันเถอะค่ะ! ฉันจะรับใช้อย่างดีจนหมดวันเลยค่ะ!"
1009503-126 = "[s] \"อื้ม ขอบใจนะ\""
1009503-130 = "ว่าแต่ คุณครูคะ"
1009503-137 = "คุณครูจะลองใส่ชุดที่ฉันเตรียมมาหน่อยไม่ได้เหรอคะ?"
1009503-138 = "[s] \"ครูขอละ...\""
1009503-139 = "คุณครู~!"
1009503-141 = "(แล้วคุณครูก็เดินกลับมาอย่างปลอดภัยโดยมีมิโดริตามประกบไม่ห่าง...)"
