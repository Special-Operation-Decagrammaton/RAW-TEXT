[translation]
10030070-1 = "Episode 7;The First Sight"
10030070-5 = "Mmm... *snore*"
10030070-9 = "Maki, it's time to wake up."
10030070-10 = "We're supposed to watch the first sunrise of the year together, remember?"
10030070-16 = "Mmm... Ten mo' mimutes... "
10030070-17 = "Sorry, if we don't leave soon we'll risk missing the sunrise."
10030070-18 = "Come on, get up and get your equipment ready for the climb. The morning air is chilly, so don't forget to dress warmly."
10030070-19 = "Yeah..."
10030070-25 = "[ns1] \"Good morning, Maki.\"\n[ns2] \"Happy New Year.\""
10030070-26 = "Morning, Sensei... *yawn*"
10030070-27 = "Happy New Year..."
10030070-28 = "...Today really is the first day of a new year, isn't it?"
10030070-29 = "I usually stay up all night on New Year's Eve and go to bed after the sun rises, so it's kinda weird to wake up now..."
10030070-30 = "Though, now that I think about it, I stay up almost every night..."
10030070-36 = "...You're awake too, Maki."
10030070-37 = "Good morning, Sensei."
10030070-38 = "[s] \"Good morning you two.\""
10030070-39 = "*yawn* ...Sleepy."
10030070-40 = "Times like these call for a high-caffeine energy drink..."
10030070-41 = "I'd enjoy having an energy drink myself right now..."
10030070-46 = "We don't have energy drinks, but here's some strong coffee for you."
10030070-50 = "Remember to bring a bar of chocolate or some trail mix with you, even if you aren't hungry right now. Energy is important for a morning hike."
10030070-51 = "And if you feel unwell, tell me or Sensei immediately. Okay?"
10030070-56 = "Yes, ma'am!"
10030070-58 = "After a quick gear change, we began our hike to the summit."
10030070-63 = "*pant* *pant*"
10030070-64 = "My stamina...is depleted...already..."
10030070-65 = "So tired..."
10030070-66 = "Hey...how far are we from the top?"
10030070-71 = "We're halfway up. Hang in there."
10030070-75 = "...The weather is a little concerning, though."
10030070-76 = "If these clouds don't clear, we may not be able to see the sunrise, even from the peak..."
10030070-83 = "Hm? Why is that bush shaking?"
10030070-84 = "It can't possibly be that bear from yesterday...right?"
10030070-85 = "Eeeek!"
10030070-101 = "Oh? Veritas again? And Trainer..."
10030070-108 = "Ah, Sumire. Hi!"
10030070-110 = "Hello, Maki. I didn't expect to run into you again."
10030070-111 = "Happy New Year, everyone!"
10030070-112 = "[s] \"Happy New Year, Sumire.\""
10030070-114 = "[ns] \"Did you sleep well last night?\""
10030070-118 = "No. Perhaps it's the excitement of having our first outdoor training trip in a long time, but I had a hard time falling asleep..."
10030070-119 = "That's why I decided to go on a hike to loosen up a bit."
10030070-120 = "Yesterday's light exercise left me with plenty of energy to burn!"
10030070-121 = "That wasn't light at all!"
10030070-122 = "As if the bear wasn't bad enough, we sprinted up a dry creek bed instead of a regular trail multiple times..."
10030070-123 = "Just how athletic are you, Sumire?!"
10030070-124 = "Heehee. The body is only as strong as the spirit allows it to be."
10030070-125 = "If you keep training with me, I wouldn't be surprised if you set a record for consecutive home runs!"
10030070-129 = "Back-to-back home runs... The roar of the crowd carrying me across home plate like a magnificent wave... Then it can't be helped."
10030070-130 = "But I'm glad to see you're all up and hiking so early."
10030070-131 = "...Could it be that you've made a New Year's resolution to make exercise a hobby too?"
10030070-133 = "Exercise ranks rather low on my hobby tier list..."
10030070-134 = "But the vice president's idea to watch the first sunrise of the year has been better than I expected."
10030070-136 = "That's right, you want to watch the sun rise from the mountaintop..."
10030070-140 = "Sorry, but you may want to head back this time."
10030070-144 = "Why?!"
10030070-145 = "It's hard to see this early, but that cloud cover is pretty thick."
10030070-146 = "It's unlikely that you'll be able to see much of the sunrise when it's overcast like this."
10030070-147 = "I'd hate for you to ascend all the way to the peak, only to have your hopes plummet off a cliff."
10030070-149 = "But the forecast said it's supposed to be sunny..."
10030070-150 = "[s] \"What should we do?\""
10030070-155 = "...What do you guys think?"
10030070-156 = "I know I pushed us to come out here, but there's no point in forcing our way to the top if the weather isn't cooperating."
10030070-165 = "I...want to continue."
10030070-166 = "Yeah. I thought you'd want to head back—"
10030070-170 = "...Huh? You actually want to keep going?"
10030070-171 = "Well, I'm outside for the first time in a while, after all. I might as well make the most of it."
10030070-173 = "We've come this far. It would be a shame to turn back in defeat before reaching the summit."
10030070-174 = "Grinding in real life is way worse than in a game, but..."
10030070-175 = "You can't throw your save file away before a boss fight!"
10030070-177 = "But we're still only halfway to the top..."
10030070-178 = "Don't you...hate hard work with no payoff?"
10030070-180 = "Well, yeah, it would be a shame to reach the top and miss the sunrise..."
10030070-181 = "But I can see plenty of sunrises from my monitors in the club room."
10030070-182 = "The only experience we can't replicate is climbing a mountain together."
10030070-188 = "...Am I dreaming? At this rate, we'll reach the top and see the New Year's sunrise coming up in the west."
10030070-189 = "That's a great attitude!"
10030070-190 = "It's often overlooked, but the true value of training isn't in sculpting a great body. It's the discipline instilled by the exercises themselves."
10030070-191 = "Similarly, the best part of climbing a mountain lies in what it teaches you about yourself, not the view from the summit!"
10030070-193 = "I'm inspired by your spirit, Veritas! The Athletics Training Club will accompany you on your journey to the top!"
10030070-194 = "Rei! It's time to sprint to the summit!"
10030070-198 = "W-Wait! You said we were only going to train partway up the mountain today, not all the way at the top!"
10030070-206 = "Hold on—!"
10030070-211 = "Off they go. Well, let's work hard and reach the peak together, shall we?"
10030070-212 = "Sunrise is just around the corner..."
10030070-228 = "...We made it."
10030070-229 = "This is the summit of Mt. Higashidake."
10030070-233 = "Wow, it's really windy!"
10030070-234 = "It feels even colder now that we're standing on an exposed peak..."
10030070-235 = "Have the clouds cleared at all? It's hard to tell in the dark..."
10030070-238 = "Well, I'm not sure, but..."
10030070-242 = "Ah, the sky is starting to lighten."
10030070-243 = "Is the sun finally rising?"
10030070-253 = "Ah..."
10030070-254 = "...It's beautiful."
10030070-255 = "It's painting the sky with the light of a million home run fireworks..."
10030070-256 = "I've seen recordings of sunrises, but it's completely different in person..."
10030070-257 = "It's much more vibrant, and brilliant, and..."
10030070-258 = "...So much warmer."
10030070-262 = "Having your hard work rewarded with a view like this is an inspiration like no other."
10030070-263 = "...Are you glad you came to see it in person?"
10030070-268 = "Yeah."
10030070-269 = "It was all worth it."
10030070-270 = "When you first suggested camping out to watch the sunrise, it seemed like a waste of time..."
10030070-271 = "But I understand now."
10030070-273 = "I'm grateful that you think so."
10030070-277 = "...There are so many things in life that you can't really understand until you experience them yourself."
10030070-283 = "That sound just now..."
10030070-288 = "Rei, are you perhaps hungry?"
10030070-289 = "Th-That's... Well..."
10030070-290 = "I can't help it! We've been doing cardio since the early hours of the morning, of course I'm hungry!"
10030070-292 = "Why don't we go back to our camp and eat breakfast together?"
10030070-293 = "I packed some bread for a quick meal."
10030070-298 = "[ns] \"There's plenty of jam and butter to go around too.\""
10030070-300 = "Oh, I'll make my bread a canvas for a jam and butter masterpiece!"
10030070-301 = "A slice of buttered bread is enough for me..."
10030070-302 = "I'd rather have another cup of coffee. Or two."
10030070-305 = "Add in a protein shake and we've got ourselves a pretty good breakfast."
10030070-306 = "Yeah, yeah. Everyone can make breakfast how they want when we get back to camp."
