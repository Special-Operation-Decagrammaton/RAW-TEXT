[translation]
90001120-1 = "ตอนที่ 12;ข้อเสนอ"
90001120-3 = "จากที่ได้ยินมา เห็นว่าตอนนั้นอาริสึแสดงฝีมือไว้เยอะเลยนี่คะ"
90001120-4 = "เท่าที่ฉันจำได้ หลังจากคลี่คลายทุกอย่างได้แล้ว ทุกคนในชมรมพัฒนาเกมก็มาที่ห้องของชมรม#nปรากฏการณ์ลี้ลับด้วยค่ะ"
90001120-5 = "ฉันจำได้แม้กระทั่งเรื่องการชวนเข้าปาร์ตี้ ข้อมูล 2kb กุญแจรูปหุ่นยนต์ บรรยากาศที่ลงตัว ดนตรีประกอบที่กินใจ และการปรากฏตัวของนางเอกในตอนสุดท้ายเลยค่ะ"
90001120-6 = "มีเรื่องเกิดขึ้นเยอะเลยละค่ะ"
90001120-7 = "ฮุ..."
90001120-8 = "ในส่วนแรกฉันพอเข้าใจอยู่หรอกนะคะ แต่ส่วนหลังที่พูดมาคืออะไรเหรอคะ..."
90001120-9 = "ฉันก็แค่พูดไปอย่างนั้นค่ะ"
90001120-16 = "(เหมือนว่าหมู่นี้โทคิจะมีความต้องการส่วนตัวอะไรแปลกๆ เลย...)"
90001120-17 = "เรือที่อาริสึสร้างใหม่ให้ในเรือของอุตนาพิชทิม... ถือเป็น <หลักฐานของผู้กล้า> ของอาริสึเลยละค่ะ"
90001120-18 = "ฮุฮุ ฉันยังจำชื่อ <ดาบแห่งแสง: ซูเปอร์โนวาแห่งอะทราฮาซิส> ที่ตั้งให้ได้อยู่เลยค่ะ"
90001120-19 = "จริงสิ ตอนนั้นฉันยังไม่ได้พูดไป... เซนส์การตั้งชื่อแบบนั้นน่ะมันไม่แปลกๆ ไปหน่อยเหรอ?"
90001120-20 = "นี่ฉันโดนคนอย่างคุณถามเรื่องเซนส์เหรอคะเนี่ย น่าอับอายขายหน้าเหลือเกินค่ะ!"
90001120-21 = "(ก็พอกันทั้งคู่ละน่า...)"
90001120-22 = "ฮึ่ม"
90001120-23 = "แต่ตอนนั้นเราไม่รู้แน่ชัดว่าอาริสึทำอะไรค่ะ นั่นละค่ะที่เป็นปัญหา"
90001120-24 = "เราไม่มีทางรู้เลยค่ะว่ามีการใช้กลไกหรือต้องผ่านกระบวนการอะไรถึงจะสร้างของแบบนั้นได้ค่ะ"
90001120-25 = "อืม... ไม่รู้เลยว่าพลังงานมาจากไหน และสร้างวัตถุใหม่ได้ยังไง"
90001120-26 = "แล้วก็ไม่รู้ด้วยว่ารวบรวมและปล่อยอะไรแบบนั้นออกมาได้ยังไง"
90001120-27 = "สำหรับพวกเราแล้ว... เรื่องแบบนั้นมันเกิดขึ้นใน 'ชั่วพริบตา'"
90001120-28 = "สำหรับสิ่งที่เรายังไม่รู้ เราแทบจะทำให้มันเกิดขึ้นอีกครั้งไม่ได้เลยค่ะ"
90001120-29 = "ปาฏิหาริย์ที่เกิดขึ้นแค่ครั้งเดียว มองบางมุมอาจจะเป็นเรื่องที่ชวนฝัน"
90001120-30 = "แต่ก็เพราะเหตุนั้น มันก็เลยเป็นศัตรูของทฤษฎีและวิชาการด้วยค่ะ"
90001120-31 = "อืม เรื่องวิชาการคือกระบวนการเชิงระบบ โดยพื้นฐานแล้วถ้าเราเชี่ยวชาญในกระบวนการนั้นๆ เป็นอย่างดี "
90001120-32 = "ไม่ว่าใครก็ได้มาซึ่งผลลัพธ์เดียวกันได้"
90001120-33 = "..."
90001120-34 = "ฉันคิดว่าเราต้องคุยเรื่องนี้กับอาริสึโดยตรง"
90001120-35 = "หมายความว่าเราต้องเรียกให้อาริสึมาหาเราที่นี่เหรอคะ?"
90001120-36 = "ใช่ เป็นอย่างนั้นละ แล้วเราก็ขอให้อาริสึช่วยวิเคราะห์เกี่ยวกับเรื่องในตอนนั้น..."
90001120-37 = "ริโอะ แต่ว่า... จะทำอย่างนั้นได้จริงๆ เหรอคะ?"
90001120-38 = "หืม? หมายความว่าอะไรเหรอ?"
90001120-43 = "ก็ถ้าทำแบบนั้น ก็ตีความได้เท่ากับว่าเราใช้อาริสึเป็น 'เครื่องมือ' ในการแก้ไขปัญหาไม่ใช่เหรอคะ?"
90001120-44 = "...!"
90001120-45 = "..."
90001120-46 = "ประธาน..."
90001120-51 = "ริโอะ ฉันจะไม่พูดซ้ำสองค่ะ เราเคยคุยเรื่องคล้ายๆ กันนี้ไปแล้วในเรือของอุตนาพิชทิมไม่ใช่เหรอคะ?"
90001120-52 = "ต่างกันแค่ตอนนั้นเป็นเรื่องของโทคิ แต่ตอนนี้เป็นอาริสึก็เท่านั้นค่ะ"
90001120-53 = "แน่นอนว่าดอกไม้ดอกเดียวบนหน้าผาอย่างฉันน่ะ ไม่สนหรอกค่ะว่าคุณจะสร้างเรื่องอะไรและจะเสียใจ#nอะไรหลังจากนั้น..."
90001120-54 = "คุณก็รู้นี่คะ? การทำผิดพลาดในเรื่องเดิมๆ ซ้ำๆ น่ะ ต่อให้ไม่ได้เป็นฝ่ายที่ทำ แต่ฝ่ายที่เห็นก็ไม่ได้สนุก#nขนาดนั้นหรอกค่ะ"
90001120-55 = "อะ... อื้อ... ใช่ จริงด้วยนะ... เธอพูด... ถูกแล้วละ..."
90001120-56 = "[s] \"...\""
90001120-60 = "[ns] \"นี่ ริโอะ\""
90001120-61 = "หืม...?"
90001120-78 = "[ns] \"สิ่งที่เราต้องการคืออาริสึจริงเหรอ?\""
90001120-79 = "อ่า... ขอโทษด้วยนะ ครู ช่วยลืมไปเถอะนะ ฉันเองก็ไม่มั่นใจ 100% หรอก มันเป็นเพียงแค่หนึ่งใน#nความเป็นไปได้น่ะ"
90001120-80 = "ฉันก็แค่เสนอความคิดเห็นไป แต่ก็ช่วยลืมๆ มันไปเถอะนะ บางทีฉันอาจจะคิดผิดไปเองก็ได้..."
90001120-81 = "[s] \"ครูจะไปคุยกับอาริสึและชมรมพัฒนาเกมให้เอง\""
90001120-82 = "คะ... ครู?! "
90001120-83 = "คุณครู!?"
90001120-84 = "ทำไมล่ะคุณครู? มีเรื่องอะไรเหรอ?"
90001120-85 = "จะไม่เป็นไรเหรอคะ คุณครู...? ถ้าทำอะไรผิดพลาดละก็..."
90001120-90 = "มองว่าสถานการณ์นี้... ไม่ใช่สถานการณ์ปกติอย่างนั้นเหรอ? มันก็... จะมองว่าอย่างนั้นก็ได้หรอกนะ..."
90001120-91 = "และถ้าจะมีใครต้องไปบอกเรื่องแบบนั้นกับอาริสึละก็ คนคนนั้นควรจะเป็นคุณครูอย่างนั้นเหรอคะ...?"
90001120-92 = "[s] \"แต่ครูมีเรื่องอยากเสนอริโอะอย่างหนึ่ง\""
90001120-93 = "หืม? ฉะ... ฉันเหรอ?"
90001120-94 = "[s] \"ครูอยากให้ริโอะมาที่ฐานที่ธารน้ำแข็งน่ะ\""
90001120-95 = "?!"
90001120-96 = "ให้ประธานมาเองเหรอ!?"
90001120-97 = "คุณครู แบบนั้นมัน...?"
90001120-99 = "..."
90001120-100 = "หมายความว่า... ให้มา 'รับผิดชอบร่วมกัน' น่ะเหรอ...?"
90001120-101 = "[s] \"เรื่องนั้นครูจะให้ริโอะเป็นคนตัดสินใจเอง\""
90001120-105 = "[ns] \"ครูก็แค่เสนอแนะบ้าง\""
90001120-109 = "[ns] \"เหมือนที่ริโอะเสนอความคิดเห็นน่ะ\""
90001120-110 = "..."
90001120-111 = "ไม่รู้... สิ... ครู ฉัน..."
90001120-112 = "ฉันไม่รู้ว่าตัวเองมีสิทธิ์ทำแบบนั้นหรือเปล่า และไม่รู้ว่าฉันจะตัดสินใจผิดพลาดอีกหรือเปล่า..."
90001120-116 = "แต่ครั้งนี้ท่านริโอะช่วยพวกเราไว้ได้นะคะ"
90001120-118 = "..."
90001120-123 = "ฉันไม่รู้เลยค่ะว่า 'ความถูกต้อง' ที่ท่านริโอะเคยพูดถึงอยู่ที่ไหน และไม่รู้ว่าเราจะเลือกในสิ่งที่ถูกต้อง#nได้ตลอดหรือเปล่า"
90001120-124 = "แต่ว่าฉันก็... อยากเจอกับท่านริโอะอีกครั้งค่ะ"
90001120-125 = "เหตุผลแบบนี้ พอจะทำให้ท่านริโอะกลับมาได้มั้ยคะ?"
90001120-126 = "โทคิ..."
90001120-132 = "ริโอะ เรื่องนี้คุณต้องเลือกเองแล้วละค่ะ"
90001120-133 = "ฉันรู้เกณฑ์ของคุณดีค่ะ คุณยึด 'เหตุผล' ใช่มั้ยล่ะคะ?"
90001120-134 = "คนที่พยายามจัดการทุกอย่างอย่างมีเหตุผลอย่างคุณจะตัดสินใจแบบไหนกันคะ?"
90001120-138 = "......"
90001120-139 = "การสื่อสารแบบนี้... มันก็มีขีดจำกัดอย่างชัดเจน ไหนจะปัญหาด้านความปลอดภัยด้วย"
90001120-140 = "ถ้าคลื่นวิทยุถูกรบกวน ทุกอย่างก็อาจเกิดปัญหาขึ้นได้ เหตุการณ์คราวนี้ก็เช่นเดียวกัน"
90001120-141 = "เพราะอย่างนั้น ฉันจะ..."
90001120-142 = "ดีค่ะ ตัดสินใจได้แล้วสินะคะ"
90001120-143 = "พวกฉันก็จะมุ่งหน้าไปยังธารน้ำแข็งค่ะ แล้วไปเจอกันที่นั่นนะคะ"
90001120-144 = "เข้าใจ... แล้ว"
90001120-146 = "เป็นอะไรไปน่ะ ประธานริโอะ? มีอะไรกังวลใจเหรอ?"
90001120-147 = "ก็ไม่ถึงกับกังวลใจหรอก..."
90001120-148 = "แต่ว่า... ฉันทำแบบนั้นได้จริงๆ เหรอ...?"
90001120-149 = "..."
90001120-150 = "ฉันจะส่งพิกัดของฐานในธารน้ำแข็งให้ค่ะ ส่วนเรื่องการเดินทางในระยะไกล ฉันคิดว่าคุณก็น่าจะเตรียม#nการไว้ล่วงหน้าแล้วใช่มั้ยคะ?"
90001120-151 = "ก็ใช่อยู่หรอก..."
90001120-152 = "อีกเดี๋ยวก็จะได้เจอกันแล้วสินะคะ ท่านริโอะ แล้วฉันจะรอค่ะ"
90001120-153 = "โทคิ"
90001120-154 = "ค่ะ มีเรื่องอะไรเหรอคะ?"
90001120-160 = "ที่ผ่านมาเธอทำได้ดีมาก แล้วก็... ขอบใจนะ"
90001120-161 = "ชมกันเกินไปแล้วค่ะ"
90001120-164 = "(ในขณะที่ทุกคนต่างก็ยุ่งอยู่กับธุระของตัวเอง คุณครูจึงพอจะมีเวลาอยู่ตามลำพังบ้าง)"
90001120-165 = "(ถ้าอย่างนั้นก็ใช้เวลานี้...)"
90001120-171 = "เอ๋? คุณครู?"
90001120-172 = "สวัสดีค่ะ คุณครู มีเรื่องอะไรเหรอคะ?"
90001120-173 = "คะ? แค่อยากเห็นหน้าพวกหนูอย่างนั้นเหรอคะ?"
90001120-174 = "ขอบคุณนะคะ และก็ดีใจจังเลยค่ะ... แหะๆๆ"
90001120-175 = "แต่ว่า... คุณครูคะ อย่าพูดเหมือนไม่มีเรื่องอะไรเลยค่ะ..."
90001120-176 = "เห็นด้วย ดูจากสีหน้าก็รู้แล้ว ฉันจะถามอีกครั้งนะคะ มีเรื่องอะไรเหรอคะ?"
90001120-177 = "[s] \"ดูออกขนาดนั้นเลยเหรอ...\""
90001120-178 = "พูดอะไรอย่างนั้นคะ! ต่อให้คุณครูไม่ต้องแสดงออก พวกหนูก็รู้ค่ะ!"
90001120-179 = "ลืมไปแล้วเหรอคะว่าเราอยู่ด้วยกันมาตั้งนานแล้วน่ะ เรื่องแบบนั้นแค่ดูจากสีหน้า หนูก็รู้แล้วค่ะ!"
90001120-180 = "เห็นด้วย ตอนนี้คุณครูอาจจะไม่รู้ก็ได้นะคะ"
90001120-181 = "แต่คุณครูที่ฉันรู้จักเป็นคนแบบนั้นค่ะ"
90001120-182 = "มีเรื่องกังวลใจอะไรเหรอคะ? หนูจะรับฟังให้ทุกเรื่องเลยค่ะ!"
90001120-183 = "ฉันก็ด้วยค่ะ"
90001120-184 = "อ่า ค่ะ พลาน่าจังก็ด้วยค่ะ!"
90001120-188 = "[ns1] \"ครูไม่อยากบังคับให้นักเรียนมาช่วยแก้ปัญหาน่ะ\"\n[ns2] \"ครูไม่อยากส่งนักเรียนไปในที่ที่อันตรายน่ะ\""
90001120-191 = "คุณครูคะ..."
90001120-192 = "..."
90001120-193 = "ละ... ลองมองในอีกมุมสิคะ คุณครู!"
90001120-194 = "ที่ผ่านมาคุณครูก็... แก้ไขปัญหาคล้ายๆ กันนี้มาตั้งหลายครั้งแล้ว และทุกครั้งก็ทำได้ดีไม่ใช่เหรอคะ? ถึงจะดูเป็นคนอย่างนี้ก็เถอะค่ะ... แหะๆๆ"
90001120-209 = "[ns] \"ครั้งนี้มันแตกต่างกับครั้งนั้นนิดหน่อยน่ะ\""
90001120-211 = "คะ? ครั้งนั้นเป็นการทำทุกอย่างเพื่อแก้ไขในสิ่งที่เกิดขึ้นแล้ว..."
90001120-212 = "แต่ครั้งนี้เหมือนกับว่าคุณครูเป็นคนส่งนักเรียนให้ตกไปอยู่ในอันตรายก่อนอย่างนั้นสินะคะ"
90001120-213 = "เข้าใจแล้ว แต่ถ้าไม่จัดการตอนนี้ ต่อไปจะไม่เกิดเรื่องใหญ่กว่านี้เหรอคะ?"
90001120-216 = "[ns3] \"นั่นมันก็จริง แต่ว่าทำไมถึงต้องเป็นนักเรียนด้วยล่ะ\"\n[ns4] \"ก็จริงอยู่หรอก แต่ถ้านักเรียนต้องตกอยู่ในอันตรายแล้วละก็\""
90001120-221 = "[ns] \"แบบนี้ครูจะแตกต่างอะไรไปจากคนพวกนั้นกันล่ะ\""
90001120-224 = "..."
90001120-225 = "..."
