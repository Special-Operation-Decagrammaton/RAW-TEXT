90001120-228 = "คะ... คุณครู?!"
90001120-229 = "ไม่เข้าใจเลย จู่ๆ มีเรื่องอะไรเหรอคะ คุณครู?"
90001120-230 = "[s5] \"ก็แบบ! บางทีครูก็อยากบินได้น่ะ\"\n[s6] \"ครูก็อยากเจาะบาเรียหรืออะไรพวกนั้นได้!\""
90001120-234 = "[ns7] \"แล้วจัดการเทพไร้นามกับเดคาแกรมมาทอนให้เละไปเลย!\"\n[ns8] \"แล้วจัดการเทพไร้นามกับเดคาแกรมมาทอนให้เรียบไปเลย!\""
90001120-238 = "ทะ... ทำไมถึงเป็นอย่างนั้นเหรอคะ...?"
90001120-239 = "สับสน ไม่เห็นเข้าใจเลยค่ะ ขอรายละเอียดมากกว่านี้ได้มั้ยคะ คุณครู?"
90001120-243 = "[ns] \"ไม่มีอะไรหรอก ครูแค่พูดอะไรไร้สาระน่ะ\""
90001120-253 = "[log]ฝากนักเรียน... ของฉันด้วยนะ[/log]"
90001120-259 = "[ns] \"นั่นสินะ ต้องเป็นครูที่ทำนั่นละ! อื้ม!\""
90001120-261 = "[ns9] \"ลองทำทุกอย่างที่ทำได้ก่อนแล้วกัน ถ้าไม่ได้ก็ค่อย...!\"\n[ns10] \"ทำทุกวิถีทางที่ทำได้ก่อนแล้วกัน ถ้าไม่ได้ก็ค่อย...!\""
90001120-264 = "กะ... ก็ค่อย...?"
90001120-268 = "[ns11] \"อื้ม! ค่อยคุยกันทีหลังนะ!\"\n[ns12] \"ค่อยคุยทีหลังนะ! ครูก็ไม่รู้เหมือนกันว่าจะเป็นยังไง! อะฮ่าฮ่าฮ่า!\""
90001120-271 = "คะ... คุณครู? คะ... คุณครูไม่เป็นอะไร... แน่นะคะ?"
90001120-272 = "ฉันมีคำถาม และความลำบากใจด้วย ฉันขอให้คุณครูไปตรวจเช็กสภาพจิตใจอย่างจริงจังค่ะ"
90001120-273 = "[s] \"ไม่เป็นไร! ครูไม่เป็นไร!\""
90001120-278 = "คะ... คุณครู?! ขอบคุณที่ลูบหัวปลอบนะคะ แต่ว่า... งื้อ..."
90001120-279 = "ยิ่งสับสนเข้าไปใหญ่ ฉันไม่อาจเข้าใจเจตนาของคุณครูได้เลยค่ะ"
90001120-281 = "(คุณครูลูบหัวทั้งคู่อยู่สักพัก)"
90001120-282 = "(หลังจากตรวจสอบจนแน่ชัดแล้วว่าทั้งสองหลับไปแล้ว คุณครูก็กลับมายังที่ที่ควรอยู่)"
90001120-284 = "ตอนต่อไป;ออกเดินทาง"
