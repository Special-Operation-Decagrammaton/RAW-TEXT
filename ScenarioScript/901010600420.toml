[translation]
901010600420-7 = "[ns] \"みんな、お疲れ様！\""
901010600420-9 = "いらっしゃいませ、先生！"
901010600420-10 = "今日もお忙しいところ、来てくださりありがとうございます。"
901010600420-11 = "[s1] \"FOX小隊の顧問だからね、当然だよ。\"\n[s2] \"本当に化け蟹がいるか気になってたんだ。\""
901010600420-12 = "……ありがとうございます。いつも頼りにしています。"
901010600420-13 = "はい。そんな生物が本当に存在するのなら、失踪事件以上の大事件ですから。"
901010600420-15 = "今日は有意義な結論にたどり着けるといいんだけど。"
901010600420-16 = "それは話してみないと分からないわね。"
901010600420-19 = "では、始めようか。"
901010600420-20 = "各自、本日の作戦内容を報告するように。"
