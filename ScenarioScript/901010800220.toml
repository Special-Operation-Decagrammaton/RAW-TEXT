[translation]
901010800220-6 = "うーん……。"
901010800220-10 = "FOX2、どうしたの？"
901010800220-11 = "ここは食料品を保管するエリアみたいなんだけど、一つ気になることがあってね。"
901010800220-15 = "……カニが多すぎるの。"
901010800220-16 = "カニ？"
901010800220-17 = "うん。他の食材はもちろん、海鮮は全然ないのに――カニの箱だけたくさん保管されてる。"
901010800220-18 = "どれくらいあるの？"
901010800220-19 = "カニが10匹入った箱が20箱くらいだから……200匹くらいじゃないかな？"
901010800220-20 = "すごい量ね。それだけのカニをどうするのかしら？"
901010800220-22 = "夕飯にするんじゃない？"
901010800220-23 = "いくらカニ好きでも、一回で食べる量じゃないでしょ。"
901010800220-24 = "弱くなったねぇ、FOX3。1年生の時は訓練後の夕飯にメガ盛りの牛丼食べたの、まだ鮮明に覚えてるのに……。"
901010800220-28 = "ただの大盛りだけど？#nというか、なんでその話をするのよ！？"
901010800220-29 = "別に私はフードファイターとかじゃないんだから！"
901010800220-31 = "FOX2、カニが入った箱の数と規模を詳細に把握してくれ。"
901010800220-32 = "作戦が終わったあと、カニの出所について調査しておきたい。"
901010800220-33 = "うん、分かった。"
