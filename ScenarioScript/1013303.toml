[translation]
1013303-1 = "พูดคนเดียว"
1013303-2 = "(คุณครูทำงานในห้องคนเดียวอยู่นาน จึงออกมาข้างนอกเพื่อผ่อนคลายสมอง)"
1013303-7 = "[ns1] \"เงียบจังเลย...\"\n[ns2] \"ริโอะทำอะไรอยู่นะ?\""
1013303-10 = "อ่า... ตรงนั้นไม่ได้นะ"
1013303-11 = "[ns] \"...?\""
1013303-12 = "ถ้าครูได้ยิน มันจะเป็นการรบกวนนะ"
1013303-13 = "ต้องทำให้เงียบที่สุด..."
1013303-14 = "[ns] \"...??\""
1013303-15 = "(คุณครูสงสัยว่าริโอะทำอะไรอยู่ จึงตัดสินใจเดินไปตามเสียง)"
1013303-22 = "[ns] \"ริโอะ? อยู่ตรงนี้หรือเปล่า?\""
1013303-23 = "อืม..."
1013303-24 = "[s] \"ริโอะ...?\""
1013303-25 = "..."
1013303-26 = "(ริโอะน่าจะไม่รู้ว่าคุณครูเข้ามาใกล้)"
1013303-27 = "(ดูเหมือนเธอกำลังมีสมาธิกับบางอย่างอยู่... คุณครูจึงได้แต่เฝ้าดู โดยไม่เข้าไปรบกวน)"
1013303-28 = "อื้อ ตรงนั้นละ ระวังให้มากที่สุดนะ..."
1013303-29 = "แบบนี้มัน... รุนแรงเกินไปแล้ว ขอช้าๆ กว่านี้หน่อย..."
1013303-30 = "ตอนนี้กำลังดีเลย... ทำแบบนี้ต่อเรื่อยๆ เลยนะ"
1013303-31 = "อ๊ะ... เดี๋ยวก่อน ตรงนั้นเป็นจุดที่อ่อนไหวมาก อย่าทำแรงนะ"
1013303-32 = "อื้อ... อย่างนั้นละ"
1013303-33 = "อืม..."
1013303-34 = "ฮู่ว... ดีมาก"
1013303-35 = "งั้นจากนี้ก็ทำต่อซ้ำๆ นะ จำความรู้สึกนี้เอาไว้ล่ะ"
1013303-36 = "[ns] \"...?\""
1013303-37 = "(แล้วริโอะก็พูดคนเดียวไม่หยุด...)"
1013303-38 = "(คุณครูกลัวว่าเด็กคนอื่นจะกลับมาแล้วเห็นเข้า... จึงคิดว่าควรปลุกริโอะให้ตื่น)"
1013303-39 = "[ns] \"เอ่อ... ริโอะ?\""
1013303-40 = "งั้นลองจากมุมนี้ด้วยมั้ย?"
1013303-41 = "ในเมื่อเริ่มชินแล้ว งั้นก็คงทำเก่งขึ้นละเนอะ?"
1013303-42 = "[s] \"ระ... ริโอะ?\""
1013303-43 = "...?"
1013303-47 = "...!!"
1013303-48 = "คะ... ครู? มาตั้งแต่เมื่อไร...?"
1013303-49 = "[s] \"ตั้งแต่ที่บอกว่าให้ทำอย่างระมัดระวัง...?\""
1013303-50 = "ยะ... แย่ละสิ..."
1013303-51 = "เห็นเข้าแล้วสินะ..."
1013303-52 = "ทำไมมาแล้วไม่ให้สุ้มให้เสียงล่ะ แบบนี้ฉันตกใจนะ"
1013303-53 = "[s] \"ทำอะไรอยู่คนเดียวงั้นเหรอ?\""
1013303-54 = "เรื่องนั้น... จะให้พูดมันก็น่าอายนิดหน่อยนะ"
1013303-55 = "[s] \"งะ... งั้นสินะ! งั้นครูไม่ถามแล้วกัน!\""
1013303-56 = "ไม่หรอก... ยังไงครูก็ได้ยินไปแล้ว"
1013303-57 = "ฉันกำลังอัปเกรดยานขนส่งอยู่น่ะ"
1013303-58 = "โดยใช้ AMAS นี้"
1013303-63 = "[ns] \"อ้อ...!\""
1013303-64 = "พอดีฉันเจอชิ้นส่วนที่พอใช้ได้มาจากปฏิบัติการครั้งล่าสุด"
1013303-65 = "ก็เลยอยากมีสมาธิทำงานตอนที่ไม่มีใครอยู่"
1013303-66 = "แล้วก็... เอ่อ..."
1013303-67 = "นอกจากนี้ฉันก็อยากแอบอัปเกรดให้ทุกคนเซอร์ไพรส์ด้วย..."
1013303-68 = "[s3] \"ยะ... อย่างนั้นสินะ ยอดเลย!\"\n[s4] \"ริโอะของครูเก่งที่สุดเลย!\""
1013303-71 = "อื้อ ขอบใจนะ..."
1013303-72 = "ว่าแต่... ทำไมครูถึงหน้าแดงแบบนั้นล่ะ? เป็นปฏิกิริยาที่ไม่สมเหตุสมผลเอาเสียเลยนะ"
1013303-73 = "หืม...? เมื่อกี้เหมือนฉันกำลังพูดคนเดียวในเรื่องที่แปลกๆ งั้นเหรอ?"
1013303-74 = "งั้นเหรอ? ฉันก็แค่พูดคำสั่งธรรมดาๆ เองนะ"
1013303-79 = "ทำอย่างระวังๆ"
1013303-80 = "ทำช้าๆ"
1013303-81 = "ดีมาก"
1013303-82 = "อย่าทำแรงนะ ตรงนั้นเป็นจุดที่อ่อนไหวมาก"
1013303-83 = "ฉันน่าจะพูดอะไรประมาณนี้ไปนะ..."
1013303-87 = "แต่ถึงยังไงคำสั่งพวกนั้นก็ไม่น่าเป็นปัญหาอะไรนี่นา...?"
1013303-92 = "[ns] \"นะ... นั่นสิเนอะ!!\""
1013303-93 = "ยังตอบรับด้วยปฏิกิริยาที่เข้าใจยากอยู่ดีสินะ..."
1013303-94 = "มีอะไรที่ครูรู้แต่ฉันไม่รู้หรือเปล่า?"
1013303-95 = "แต่ว่าในเรื่องแบบนี้ ฉันน่าจะเป็นผู้เชี่ยวชาญมากกว่าครูสิ"
1013303-96 = "หรือว่า... ครูคิดว่าการที่ฉันมาอัปเกรดยานขนส่งตอนที่ไม่มีใครอยู่มันเป็นปัญหางั้นเหรอ?"
1013303-97 = "เห็นแบบนี้ ฉันก็คิดว่าตัวเองมีวิจารณญาณพื้นฐานพอที่จะแยกแยะอะไรได้อยู่นะ"
1013303-98 = "ฉันก็ไม่ได้ทำอะไรล้ำเส้นคนอื่นสักหน่อย..."
1013303-99 = "[s] \"ไม่ใช่อย่างนั้นหรอกนะ!\""
1013303-100 = "ดูจากท่าทีของครูแล้ว... ฉันคงเข้าใจอะไรผิดอีกแล้วสินะ"
1013303-101 = "แต่ต่อให้พิจารณาถึงความเป็นไปได้อื่นๆ... ฉันก็คาดเดาอะไรไม่ออกอยู่ดี"
1013303-102 = "ครูกำลังปิดบังอะไรฉันอยู่กันแน่?"
1013303-103 = "ตอบฉันมาตามความจริงนะ ฉันจะได้คิดต่ออย่างสมเหตุสมผลไง"
1013303-104 = "[s] \"อ๊ะ นั่นสิ! ทำงานนานจนเหนื่อยเลยละสิ? ครูชงกาแฟให้ดีมั้ย?\""
1013303-105 = "ฉันดูออกนะว่าตอนนี้ครูกำลัง 'เปลี่ยนเรื่องคุย' อย่างโจ่งแจ้งเลยน่ะ"
1013303-106 = "ก็นะ... แต่ถ้าได้กาแฟจากครูละก็ ฉันจะหลับหูหลับตาให้แล้วกัน"
1013303-107 = "แต่ว่าฉันมีเงื่อนไขบางอย่าง"
1013303-108 = "ในเมื่อจะไปชงกาแฟมาให้แล้ว ฉันอยากให้ครูมาเป็นผู้ช่วยข้างๆ ฉันหน่อย"
1013303-109 = "ตอนทำงานฉันต้องใส่ HMD อยู่ตลอด พอมองไม่เห็นก็เลยมีหลายอย่างที่ไม่สะดวกน่ะ"
1013303-110 = "ครูก็น่าจะทำงานเร่งด่วนเสร็จหมดแล้วด้วย งั้นมาช่วยฉันได้ใช่มั้ย?"
1013303-111 = "[s] \"อื้อ! ได้แน่นอนอยู่แล้ว!\""
1013303-112 = "ถ้างั้นฉันรบกวนด้วยนะ"
1013303-113 = "ถ้าเป็นครูละก็... ฉันคงวางใจให้ช่วยงานได้"
1013303-115 = "(หลังจากนั้นคุณครูก็รีบชงกาแฟมาให้ แล้วมาเป็นลูกมือช่วยริโอะอัปเกรดยานขนส่ง)"
1013303-116 = "(คุณครูรู้สึกโล่งใจที่ผ่านเรื่องนั้นไปได้...)"
