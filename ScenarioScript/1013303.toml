[translation]
1013303-1 = "自言自語"
1013303-2 = "（在房間裡獨自處理工作後，決定出來換換心情）"
1013303-7 = "[ns1] 「好安靜……」\n[ns2] 「莉央在做什麼呢？」"
1013303-10 = "啊……那裡不行。"
1013303-11 = "[ns] 「……？」"
1013303-12 = "要是被老師聽到會打擾到他。"
1013303-13 = "所以要盡量安靜地……"
1013303-14 = "[ns] 「……？？」"
1013303-15 = "（帶著「是在做什麼呢」的疑問，往聲音傳來的方向走去）"
1013303-22 = "[ns] 「莉央？你在這嗎？」"
1013303-23 = "唔嗯……"
1013303-24 = "[s] 「莉央……？」"
1013303-25 = "……"
1013303-26 = "（看來他似乎沒有注意到）"
1013303-27 = "（好像很專心在做什麼的樣子……為了避免打擾到他，先在旁邊觀察一下吧）"
1013303-28 = "嗯，就是那裡。#n盡量小心一點……"
1013303-29 = "這樣……太用力了。#n再慢一點……"
1013303-30 = "……力道剛剛好。就這樣繼續吧。"
1013303-31 = "啊，等一下。#n那裡是很細緻的地方，所以要輕一點。"
1013303-32 = "嗯……就是那樣。"
1013303-33 = "嗯……"
1013303-34 = "……呼，做得很好。"
1013303-35 = "記住剛才的感覺，再重複一次吧。"
1013303-36 = "[ns] 「……？」"
1013303-37 = "（……之後莉央的自言自語依舊沒停過）"
1013303-38 = "（萬一其他孩子回來看到就不好了……還是叫醒他吧）"
1013303-39 = "[ns] 「那個……莉央？」"
1013303-40 = "那麼試試這邊吧？"
1013303-41 = "現在已經習慣了，可以做得更好對吧？"
1013303-42 = "[s] 「莉，莉央……？」"
1013303-43 = "……？"
1013303-47 = "……！！"
1013303-48 = "老，老師？你是什麼時候……？"
1013303-49 = "[s] 「從你說要小心做什麼事的時候……？」"
1013303-50 = "這，這樣啊……"
1013303-51 = "……被你看到了呢。"
1013303-52 = "在的話就早點跟我說一聲吧。#n這樣會嚇到我的。"
1013303-53 = "[s] 「你一個人在做什麼？」"
1013303-54 = "那個……說起來有點不好意思。"
1013303-55 = "[s] 「這，這樣啊！那我就不問了！」"
1013303-56 = "……沒關係。#n反正都被你看見了，說出來也無所謂。"
1013303-57 = "我正在升級運輸船。"
1013303-58 = "用這個AMAS。"
1013303-63 = "[ns] 「啊……！」"
1013303-64 = "我在最近的作戰中，找到了相當不錯的零件。"
1013303-65 = "所以想趁沒人的時候專心完成作業。"
1013303-66 = "而且，那個……"
1013303-67 = "我想偷偷完成升級，給大家一個驚喜……"
1013303-68 = "[s3] 「原，原來如此！」\n[s4] 「我們莉央真厲害呢！」"
1013303-71 = "嗯，謝謝你……"
1013303-72 = "話說……你的臉為什麼那麼紅呢？#n這個反應似乎不太合理呢。"
1013303-73 = "……嗯？因為我自言自語的內容聽起來有點奇怪？"
1013303-74 = "是嗎？我只是說了一些很普通的指令而已。"
1013303-79 = "小心地。"
1013303-80 = "慢慢地。"
1013303-81 = "很好。"
1013303-82 = "那裡需要細緻地處理，所以要輕一點。"
1013303-83 = "……我記得有說過這些話。"
1013303-87 = "……怎麼想都沒有問題吧？"
1013303-92 = "[ns] 「就，就是說啊！！」"
1013303-93 = "……我還是無法理解你的反應呢。"
1013303-94 = "老師知道什麼我不知道的事嗎？"
1013303-95 = "不過在這個方面，我應該比老師更專業才對。"
1013303-96 = "難道說……老師覺得我趁沒人的時候升級運輸船，這樣的行為是有問題的嗎？"
1013303-97 = "話雖如此，我自認還是有保持最基本的分寸的。"
1013303-98 = "也不會做出太踰矩的事……"
1013303-99 = "[s] 「絕對不是那樣的！」"
1013303-100 = "從你的反應來看……我好像又猜錯了呢。"
1013303-101 = "不過……我還是想不出其他的可能性。"
1013303-102 = "老師是在向我隱瞞什麼嗎？"
1013303-103 = "請坦白地告訴我吧。#n這樣我才能進行理性的思考。"
1013303-104 = "[s] 「啊，對了！專注那麼久應該很累吧？我去幫你泡杯咖啡怎麼樣？」"
1013303-105 = "做得這麼明顯的話，連我都看得出來是在「轉移話題」哦？"
1013303-106 = "……算了，既然是老師的咖啡，我就睜一隻眼閉一隻眼吧。"
1013303-107 = "不過有個條件。"
1013303-108 = "如果要泡咖啡的話，希望你能留在我身邊擔任助手。"
1013303-109 = "一直戴著HMD作業會遮擋視野，多少有點不太方便。"
1013303-110 = "老師似乎也處理完急事了，應該沒問題吧？"
1013303-111 = "[s] 「嗯！完全沒問題！」"
1013303-112 = "那就拜託你了。"
1013303-113 = "老師的話……我可以放心把輔助工作交給你。"
1013303-115 = "（於是快速泡好咖啡後，留在莉央身邊努力幫忙升級運輸船）"
1013303-116 = "（幸好總算是蒙混過去了……）"
