[translation]
1013303-1 = "Soliloquy"
1013303-2 = "I was working by myself in the room when I went outside for a breather."
1013303-7 = "[ns1] \"It's quiet...\" \n[ns2] \"I wonder what Rio is up to.\""
1013303-10 = "Ah... Not here."
1013303-11 = "[ns] \"...?\""
1013303-12 = "I don't want to bother Sensei..."
1013303-13 = "I have to be as quiet as possible."
1013303-14 = "[ns] \"...??\""
1013303-15 = "Curiosity piqued, I followed the sound of her voice."
1013303-22 = "[ns] \"Rio? You here?\""
1013303-23 = "Hmm..."
1013303-24 = "[s] \"Rio...?\""
1013303-25 = "..."
1013303-26 = "(She hasn't noticed that I'm here...)"
1013303-27 = "(She's so focused... I shouldn't bother her, so let's watch for now.)"
1013303-28 = "Yes. Right there. Be as careful as possible..."
1013303-29 = "This... Too hard. Need to go slower..."
1013303-30 = "...Perfect. Just like that."
1013303-31 = "Ah, wait. It's delicate there, so handle it gently."
1013303-32 = "Yes... Right there."
1013303-33 = "Hm..."
1013303-34 = "...Phew, good job."
1013303-35 = "Remember that feeling. Now, let's do it again."
1013303-36 = "[ns] \"...?\""
1013303-37 = "...Rio's soliloquy went on and on."
1013303-38 = "I was worried about other people seeing her when they returned, so I tried to get her attention again."
1013303-39 = "[ns] \"Um... Rio?\""
1013303-40 = "Let's try this area now."
1013303-41 = "You can do better now that you're used to it, right?"
1013303-42 = "[s] \"R-Rio...?\""
1013303-43 = "...?"
1013303-47 = "...!!"
1013303-48 = "S-Sensei? How long have you...?"
1013303-49 = "[s] \"When you said to be as careful as possible?\""
1013303-50 = "Th-That's..."
1013303-51 = "...So you saw."
1013303-52 = "You should've said you were here. You surprised me."
1013303-53 = "[s] \"What...exactly were you doing?\""
1013303-54 = "It's...a little embarrassing, to be honest."
1013303-55 = "[s] \"I-I see! I won't ask any further then!\""
1013303-56 = "...It's fine. It doesn't matter since you already saw me doing it."
1013303-57 = "I was upgrading the transport ship."
1013303-58 = "With this AMAS."
1013303-63 = "[ns] \"Ah...!\""
1013303-64 = "I've gotten some useful parts during our recent operations."
1013303-65 = "So I thought I would take advantage of the empty ship while I had the chance."
1013303-66 = "And, I..."
1013303-67 = "...also wanted to make upgrades in secret and surprise everyone..."
1013303-68 = "[s3] \"I-I see!\"\n[s4] \"I'm so proud of you, Rio!\""
1013303-71 = "Yes. Thank you..."
1013303-72 = "By the way... Why is your face red? That's not a rational response."
1013303-73 = "...Huh? The way I was talking to myself was a bit strange?"
1013303-74 = "Is that so? I only said fairly ordinary commands though."
1013303-79 = "Careful."
1013303-80 = "Slow."
1013303-81 = "Perfect."
1013303-82 = "That's delicate, so be gentle."
1013303-83 = "...That was more or less what I said, right?"
1013303-87 = "...None of that was \"strange,\" was it?"
1013303-92 = "[ns] \"R-Right!! Not weird at all!\""
1013303-93 = "...That only confuses me more."
1013303-94 = "There must be something you know that I don't."
1013303-95 = "But I believe myself to be the expert in this field."
1013303-96 = "Could it be that... Are you concerned about me choosing to work in secret?"
1013303-97 = "I truly just believed that was the most rational approach."
1013303-98 = "I wouldn't do anything to cross the line... I wouldn't..."
1013303-99 = "[s] \"That is absolutely not it!\""
1013303-100 = "Hm, your reaction seems sincere. That must not be the reason either."
1013303-101 = "But I can't think of any other rational possibilities."
1013303-102 = "What are you hiding from me, Sensei?"
1013303-103 = "Please be honest, so I can make sense of this situation."
1013303-104 = "[s] \"Ah, you must be tired from all that work! I can make you coffee, if you'd like!\""
1013303-105 = "Even I notice when you so blatantly try to change the subject, Sensei."
1013303-106 = "...For a cup of coffee made by you, however, I'll let it slide."
1013303-107 = "Under one condition."
1013303-108 = "Since you're making coffee anyways, can you stay and assist me?"
1013303-109 = "Wearing the HMD blocks my vision, so it inconveniences me while working."
1013303-110 = "You aren't busy, are you?"
1013303-111 = "[s] \"I can stay! I'm totally free!\""
1013303-112 = "I'll be counting on you, then."
1013303-113 = "If it's you... I know I can trust you as an assistant."
1013303-115 = "I quickly made coffee, then helped Rio with the transport ship upgrade."
1013303-116 = "I was glad I made it out of there without her realizing, somehow..."
