1000515-143 = "3;호시노;02;안 돼, 안 돼. 그건 말해줄 수 없어. 말해줬다가는 다음번에 지금이랑 같은 빌미로 선생을 부를 수 없게 돼 버리잖아."
1000515-144 = "3;호시노;01;사실 아비도스가 지금처럼 되기 전에, 예전에 근방에서 팔던 거라 이제는 못 구하는 거기도 하지만 말이지."
1000515-145 = "3;호시노;99;이제 알겠어? 세상에 단 하나밖에 없는 귀중한 아이템이라고. 아저씨의 <어디서든 입장권>은."
