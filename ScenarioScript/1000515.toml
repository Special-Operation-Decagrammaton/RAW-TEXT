[translation]
1000515-1 = "Universal Entry Ticket"
1000515-3 = "At Hoshino's \"request,\" I headed to the Foreclosure Task Force's club room."
1000515-10 = "Hmm? What's that sound...?"
1000515-11 = "Is it Sensei? At this time of day, it's probably Sensei."
1000515-17 = "Heh! Of course."
1000515-18 = "Thanks, Sensei. I wasn't sure if you'd show up for such a trivial request, but here you are."
1000515-19 = "...Huh? The others?"
1000515-20 = "All my underclassmen have plans today. That's why I had a chance to reach out to you."
1000515-21 = "They call on you a lot. Sometimes it's just to thank you, or to spend time with you when they have that time to spare, but..."
1000515-22 = "...they all rely on you too. They're always asking you for favors or advice."
1000515-23 = "If you ask me, I think they depend on you too much."
1000515-24 = "And I feel bad that they only call you when they want something. Even if you are an adult."
1000515-25 = "[s1] \"I'm totally okay with it.\"\n[s2] \"I'm just glad they feel so comfortable with me.\""
1000515-28 = "Heh, I knew you'd say that."
1000515-29 = "But still, it's important that they learn to be independent..."
1000515-30 = "...Never mind."
1000515-31 = "I mean, I'm not exactly one to talk. I need to work on that too."
1000515-35 = "I know, I know. Don't look at me like that."
1000515-36 = "Seriously, don't. When you give me that look, I feel the same way I do when Ayane's mad at me."
1000515-37 = "In any case, that's not what I brought you here to talk about."
1000515-38 = "I was just spending some time alone when I thought of you. That's why I asked you to come."
1000515-39 = "[s3] \"...Thought of me?\"\n[s4] \"Wow, you changed moods just like that!\""
1000515-42 = "Now, now, stop playing around."
1000515-43 = "Listen, Sensei..."
1000515-44 = "Could you take a look at this?"
1000515-50 = "[ns5] \"It's...your pillow.\"\n[ns6] \"Huh? Why all of a sudden?\""
1000515-53 = "Ah, right, you don't know yet. This is more than just a pillow."
1000515-54 = "This is my very own treasure, the \"Universal Entry Ticket.\" It has mysterious powers!"
1000515-58 = "Heh... You look like you have no idea what I'm talking about."
1000515-59 = "Well, no need to explain every little detail. Sensei, come sit over here."
1000515-64 = "Good, good, just like that."
1000515-65 = "Now, sit there and...put this between your arm and chest."
1000515-69 = "Right there."
1000515-70 = "And now, close your eyes..."
1000515-81 = "The Ticket allows you to fall asleep comfortably, no matter where you are."
1000515-85 = "Just as Hoshino said, the softness of the cushion made my consciousness drift away."
1000515-86 = "As I fell fast asleep, I kept hearing Hoshino's mumbling."
1000515-89 = "...Sensei."
1000515-90 = "I thought it might be good for you to forget about everything and take a nap."
1000515-91 = "But I know you're not the type of person who would do that, unless a student like me set it up for you."
1000515-92 = "That's why I'm letting you borrow it. Even as precious as it is to me."
1000515-96 = "...Sensei? Are you asleep already?"
1000515-97 = "Well..."
1000515-99 = "Sensei, you should know..."
1000515-103 = "You're a very...precious person to me."
1000515-112 = "I don't know how long I slept."
1000515-117 = "When I opened my eyes, the sun had already set."
1000515-118 = "[ns7] \"Is it already evening...?\"\n[ns8] \"Wow, I slept so soundly. I must have been really tired.\""
1000515-121 = "...Oh, you're up, Sensei?"
1000515-126 = "You looked so comfortable and peaceful, I ended up falling asleep right next to you, heh..."
1000515-127 = "...Huh?"
1000515-128 = "Well, that pillow IS my secret weapon, but I don't NEED it to fall asleep."
1000515-129 = "Let's just say I loaned it to you to put us on even footing, nap-wise."
1000515-130 = "Anyway..."
1000515-131 = "It's getting late. You should head back and rest up for tomorrow."
1000515-132 = "I'll walk you out front. It's only polite, since I invited you over."
1000515-133 = "Besides, I patrol this area a lot..."
1000515-134 = "...so I'm killing two birds with one stone. No need to feel bad about it."
1000515-135 = "...Huh?"
1000515-136 = "You like the pillow?"
1000515-137 = "You want to know where you can buy one?"
1000515-142 = "...Heh."
1000515-143 = "Nope, I can't tell you that. If I told you, I wouldn't be able to use it as an excuse to ask you to come here."
1000515-144 = "Truth is, it used to be sold locally, before Abydos became what it is now. Nowadays, you can't find it anywhere."
1000515-145 = "That's what makes it a one-of-a-kind treasure, my Universal Entry Ticket."
1000515-150 = "So, Sensei?"
1000515-151 = "If you need it again sometime, you'll have to come ask me."
1000515-152 = "Got it?"
1000515-154 = "Hoshino escorted me out of Abydos, after which I went back to the Schale lounge."
1000515-155 = "The cushions and pillows in the lounge did not compare at all."
