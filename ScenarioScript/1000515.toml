1000515-125 = "3;호시노;01\n#3;a\n#wait;1600"
1000515-126 = "3;호시노;02;너무 기분 좋게 잘 자길래, 나도 모르게 옆에서 같이 누워 자 버렸네. 으헤…….\n#3;em;[음표]"
1000515-127 = "3;호시노;00;……응??"
1000515-128 = "3;호시노;01;물론 그 베개가 아저씨가 가진 비장의 아이템이긴 하지만, 아저씨는 그거 없어도 이런 데에서는 잘 자거든."
1000515-129 = "3;호시노;99;여기서는 밸런스를 위한 거라고 해둘까. '낮잠 초심자'에게 빌려주는 느낌으로?"
1000515-130 = "3;호시노;01;그럼……."
1000515-131 = "3;호시노;02;슬슬 늦었네. 선생, 이제 돌아가서 푹 쉬고 내일부터 다시 일해야 하지?\n#3;m4"
1000515-132 = "3;호시노;01;요 앞까지는 바래다줄게. 아저씨가 불렀으니, 거기까진 책임져야 속이 편할 거 같거든."
1000515-133 = "3;호시노;14;뭐, 원래 요 주변 순찰도 자주 도는 편이고……."
1000515-134 = "3;호시노;15;그러니까 겸사겸사야, 겸사겸사. 괜히 부담스러워하지 않아도 된다고. 알았지?"
