1000515-16 = "3;호시노;01\n#3;a\n#wait;1500"
1000515-17 = "3;호시노;02;으헤~. 역시나로구만.\n#3;em;[음표]"
1000515-18 = "3;호시노;00;고마워, 선생. 내심 반신반의했는데, 이런 사소한 부탁도 다 들어주고 말이야."
1000515-19 = "3;호시노;01;……응? 다른 아이들?"
1000515-20 = "3;호시노;02;우리 귀여운 후배들은 오늘 모두 일정이 있어. 그렇기 때문에 이렇게 선생도 부를 수 있었던 것이기도 하고 말이지."
1000515-21 = "3;호시노;16;단순히 감사를 표하고 싶다거나, 그냥 시간이 남아서 놀고 싶다는 이유로 선생을 찾는 거라면 나도 말리지 않겠지만…….\n#3;em;…"
1000515-22 = "3;호시노;15;다들 선생에게 꽤 의지하고 있으니까 말이야. 상담이나 부탁하고 싶어 하는 일들이 한가득이더라고."
1000515-23 = "3;호시노;99;그래도 언제나 그렇게……. 너무 선생에게 의지만 하는 것도 곤란하잖아?"
1000515-24 = "3;호시노;01;일이 있을 때만 선생을 부른다는 느낌도 조금 미안하고 말이지. 아무리 어른이라고 해도 말이야."
1000515-25 = "[s1] \"나는 완전 괜찮은데?\"\n[s2] \"편하게 대해준다면 오히려 환영인걸.\""
1000515-26 = "#wait;10"
1000515-27 = "#wait;10"
1000515-28 = "3;호시노;02;으헤……. 그래, 그래. 정말 생각대로구만. 선생이라면 그렇게 말할 줄 알았어.\n#3;em;[음표]"
1000515-29 = "3;호시노;00;하지만 자립은 중요한 것이고……."
1000515-30 = "3;호시노;99;……아니."
1000515-31 = "3;호시노;01;이건 아저씨 입으로 말하기엔 조금 안 맞을지도 모르겠네. 아저씨는 오히려 그쪽으로 노력해야 할 타입이니까."
1000515-32 = "#st;[0,0];instant;1;"
1000515-33 = "#clearST"
1000515-34 = "3;호시노;10\n#3;em;…\n#wait;2500"
1000515-35 = "3;호시노;07;알고 있다고, 알고 있어. 그러니 그런 눈으로 보지 말아줘.\n#3;em;[땀]"
1000515-36 = "3;호시노;09;아저씨는 선생이 그런 눈으로 볼 때가 제일 힘들단 말이지. 아야네 쨩이 화낼 때만큼이나 곤란하거든."
1000515-37 = "3;호시노;99;아무튼 오늘의 본론은 그런 쪽의 이야기가 아니야."
1000515-38 = "3;호시노;14;문득 혼자 시간을 보내다가, 선생 생각이 났었거든. 그래서 불렀던 것뿐."
1000515-39 = "[s3] \"……내 생각?\"\n[s4] \"갑자기 그런 무드!?\""
