[translation]
10028030-1 = "Episode 3;To the Front"
10028030-5 = "Why're you all the way out here in the sticks?"
10028030-11 = "...With an adorable little Trinity student at that."
10028030-15 = "...?"
10028030-16 = "Did she just call me adorable...?"
10028030-17 = "[s] \"Kasumi, you need to mind your manners.\""
10028030-18 = "It's okay, Sensei. You don't have to defend me."
10028030-19 = "Members of the Justice Task Force aren't so easily phased."
10028030-25 = "...Hmmm?"
10028030-31 = "Hey, hey! I like what you're putting down."
10028030-32 = "That's the kind of attitude I can jive with! Wahaha!"
10028030-33 = "As she said, let's leave the past in the past and focus on the big picture here. Okay? Okay!"
10028030-34 = "Seeing as we've already jumped into boiling water together, we might as well work together to get out!"
10028030-35 = "Looks like we're in business, folks! I'll apply for an LLC!"
10028030-36 = "...Until we get off this train, at least. Heehee."
10028030-40 = "[ns1] \"Business...? Us...?\"\n[ns2] \"Until we get off this train?\""
10028030-43 = "Huh?"
10028030-44 = "What's with that dazed look on your face? I really don't know how I could've been more clear... Ah! Maybe you're still in shock!"
10028030-45 = "I'll try to dumb it down for you, don't worry! Your goal is find your bag and get off the train. Mine is to get off and not be arrested!"
10028030-46 = "So that means we have the shared goal of stopping the train so we can hop right on off! Enemy of my enemy is a friend."
10028030-50 = "You're...not wrong."
10028030-56 = "But I don't think our situation is quite as dire as yours, Kasumi."
10028030-57 = "We're innocent civilians trying to retrieve a lost bag. You, on the other hand, are a criminal on the run."
10028030-58 = "So, if you don't mind, Sensei and I will be on our way..."
10028030-59 = "Shush! It's only polite to listen to the end when someone's talking! No interrupting!"
10028030-60 = "I get it, I get it. Adorable, elegant Trinity ladies don't associate with Gehenna criminals from the other side of the tracks, huh?"
10028030-61 = "But out here, in the rough and wild, you gotta commit! You gotta do things you don't wanna when things don't come to you on a golden platter!"
10028030-62 = "Life isn't as simple when you're not sipping tea from your ivory towers. Wahaha!"
10028030-66 = "Aha...haha..."
10028030-67 = "I see. Thank you for your insight, Kasumi..."
10028030-68 = "Do you just mind if I ask...why in the world would we need your help to locate a bag? Hm?  "
10028030-69 = "Heehee. About that—"
10028030-73 = "What was that? Are they making an announcement?"
10028030-74 = "Aha."
10028030-75 = "Impeccable timing!"
10028030-79 = "...Ahem. Attention."
10028030-80 = "I have an announcement for all passengers and staff."
10028030-81 = "Unfortunately, some cargo in the back cars exploded in an unforeseen accident."
10028030-82 = "Our crew members are directing passengers to their new seats as we speak."
10028030-83 = "Please stay seated and follow all instructions for your own safety."
10028030-84 = "Because the cargo contains hazardous materials, we will bypass our usual stops to reach the nearest station equipped to handle its safe disposal."
10028030-85 = "Our next stop will be Gehenna District, Zone 32-1."
10028030-86 = "We thank you for your patience."
10028030-91 = "...Huh?"
10028030-92 = "They're changing the destination? But why?"
10028030-93 = "[s3] \"Half that announcement was untrue...\"\n[s4] \"Are we supposed to be the hazardous materials?\""
10028030-99 = "Also, passengers are to remain seated at all times. No movement or bathroom trips allowed from here on out."
10028030-100 = "We are in a state of emergency. Attempt to leave your seat, and guards will be immediately dispatched to arrest you. Conductor, signing off."
10028030-101 = "[s5] \"What if I need to go?!\"\n[s6] \"No bathroom access is tyrannical!\""
10028030-104 = "Wahahahaha!"
10028030-105 = "Just like clockwork! You better watch out, the train crew are already on the move."
10028030-106 = "In a few moments, they'll come bursting through that door! What a pickle! A pickle indeed!"
10028030-107 = "...You're wondering about the announcement?"
10028030-108 = "Duh! They made up all of that stuff about the cargo exploding! Get with the program!"
10028030-109 = "What're they gonna do? Get on the mic and say, \"Hey, folks, we're stepping on the gas because we were secretly paid to transport a known criminal, but she escaped! Whoops!\""
10028030-110 = "Pay attention, Sensei! The car I was in was a special transport car made by the gang that captured me in the first place."
10028030-111 = "They attached themselves to the very back of the train!"
10028030-112 = "You really think they lugged that big thing over here and latched on without anyone noticing? Use those brain cells!"
10028030-113 = "[s7] \"It's a train gang!\"\n[s8] \"They're all...working together?!\""
10028030-116 = "Wahaha! As sharp as ever, Sensei!"
10028030-117 = "So they all worked together to get the transport car, a.k.a. me, attached to the train!"
10028030-118 = "But you really think the train crew would risk it all for free?"
10028030-119 = "Sounds fishy to me. Money passed hands in secret backrooms, that's what I think!"
10028030-120 = "But then, disaster! The train explodes, and their precious target escapes."
10028030-121 = "Hm, hm. What a predicament for the train crew."
10028030-122 = "It's not about getting from point A to point B anymore. They've gotta finish what they've started!"
10028030-123 = "The job they were paid to do was to escort the infamous Hot Springs Department president to the gang's base in Gehenna."
10028030-124 = "And you best believe they're gonna get it done! Breaking rules and skipping stations? That's all child's play compared to what's to come!"
10028030-125 = "They know if they slow down the train, I'll hop right off, and they don't get their payday."
10028030-126 = "If I jump off right now, it's certain capture! I'd be knocked unconscious from the impact, and they'd cart me away."
10028030-127 = "So that's me. But for the two of you..."
10028030-128 = "Has life really always treated you that well? You think a bunch of Gehenna ruffians are going to help a ticketless Trinity student on their turf?"
10028030-129 = "You gotta get back to your little tea party with the bag by today, don't ya? You reaaally think you're gonna find it in time?"
10028030-133 = "And that's what I've been trying to tell you this whole time! You gotta strategize! Think one, two, three steps ahead! But you're blind as a bat!"
10028030-134 = "You gotta go out and touch grass every once in a while, Trinity girlie! Wahaha!"
10028030-135 = "Hah. Ahaha."
10028030-136 = "You've got this, Ichika. Deep breaths. Things don't always go according to plan..."
10028030-137 = "Some days, nothing goes your way. And that's okay. Ahahaha!"
10028030-138 = "Yeah... That's okay..."
10028030-143 = "Over there! I found her!"
10028030-144 = "Of course she has support! Call in reinforcements, immediately!"
10028030-148 = "...Support?"
10028030-149 = "[ns] \"I-Is that us?\""
10028030-150 = "We've been waiting for you! It's our dearest friends from the train crew!"
10028030-151 = "No, no. This is all a misunderstanding... We're not together, really."
10028030-152 = "I don't care who's with who! Everyone's guilty until proven otherwise!"
10028030-153 = "Move in! Arrest them!"
10028030-154 = "What a crowd! They sure do love putting respect on my name!"
10028030-155 = "I guess there's no choice now! I'm looking forward to working with you, Sensei."
10028030-156 = "And..."
10028030-161 = "...Miss Cutie Pie!"
10028030-165 = "...Sensei..."
10028030-166 = "[s9] \"We'll have to make the best of the situation, Ichika.\"\n[s10] \"We can worry about the rest later...\""
10028030-169 = "What an iconic moment! Enemies coming together under a common foe! I like it!"
10028030-170 = "I leave myself in your care then! Although..."
10028030-174 = "I hope you can keep up! Wahahaha!"
10028030-177 = "Come at me! I'm really getting fired up!"
