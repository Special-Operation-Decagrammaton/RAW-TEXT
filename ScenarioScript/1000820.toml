1000820-28 = "#wait;10"
1000820-29 = "#na;네루;……?"
1000820-30 = "#na;네루;……어, 선생! 와 있었어? 생각보다 금방 왔네?"
1000820-31 = "#st;[0,0];instant;1;"
1000820-32 = "#clearST"
1000820-33 = "#wait;2000"
1000820-34 = "3;네루;03\n#3;em;[음표]\n#3;a\n#wait;1500"
1000820-35 = "3;네루;03;뭐야, 와 있으면 와 있다고 말을 하지. 왜 멀뚱멀뚱 서서 보고만 있었어."
1000820-36 = "3;네루;02;응? 무슨 일 있어서 불렀냐고? 아니, 그냥? 딱히 일은 없는데? 말했잖아?"
1000820-37 = "3;네루;02;……설마 이유도 없는데 왜 불렀냐- 같은 말을 하려는 건 아니지? 선생이랑 나 사이에."
1000820-38 = "3;네루;04;……응? 뭐라고?"
1000820-39 = "3;네루;04;……스카잔? 갑자기 무슨……."
1000820-40 = "3;네루;07;아아~. 이거? 내가 입고 있는 거? 이게 왜?"
1000820-41 = "3;네루;05;……설마!!"
1000820-42 = "3;네루;10;설마 선생도 관심 있어? 하나 필요해!? 내가 구해줄까!?\n#3;em;[?!]\n#3;closeup\n#3;a\n#bgshake\n#fontsize;80"
1000820-43 = "3;네루;10;뭐, 구하기 쉬운 건 아니지만 선생이 필요하다면야 내가 어떻게든…….\n#3;closeup\n#fontsize;80"
1000820-44 = "3;네루;02;……어?\n#3;em;[반응]"
1000820-45 = "3;네루;04;그런 뜻이 아니라고? 그럼 왜 물어본 거야?"
1000820-46 = "3;네루;04;……스카잔을…… 입는 이유?\n#3;em;[?]"
1000820-47 = "3;네루;01;스카잔…….\n#3;stiff"
1000820-48 = "3;네루;01;………….\n#3;em;[...]"
1000820-49 = "[s3] \"……네루?\"\n[s4] \"갑자기 말이 없어졌다?\""
1000820-50 = "#wait;10"
1000820-51 = "#wait;10"
1000820-52 = "3;네루;05;……아."
1000820-53 = "3;네루;06;아아. 아. 아.\n#3;em;[땀]\n#3;stiff"
1000820-54 = "3;네루;07;아냐, 아냐아냐. 지금 건 진짜 실수. 미안-."
1000820-55 = "3;네루;07;다른 사람도 아니고 선생인데 그런 의도일 리가 없지. 순간 나도 모르게 움찔했잖아."
1000820-56 = "3;네루;04;이건 보통 '왜 입냐'라고 물어보는 사람의 대부분이 시비 걸려고 그러는 거였거든.\n#3;em;[반응]"
1000820-57 = "3;네루;06;그래서 나도 모르게 그런 반응을 보여버릴 뻔했네. 선생은 그럴 사람도 아닌데 말이지."
1000820-58 = "3;네루;01;흠. 그렇군. 그럼 다시 본론으로 돌아와서."
1000820-59 = "3;네루;99;스카잔이라……. 왜 입냐……. 왜 입냐…… 음……."
1000820-60 = "3;네루;05;근데 갑자기 그건 왜 궁금해진 거야? 그냥 보다 보니 떠오른 건가? 아니면…….\n#3;em;[?]"
1000820-61 = "[s5] \"혹시 뭔가의 사연이 있는 건가 해서\"\n[s6] \"혹시 뭔가의 의미가 있는 건가 해서\""
1000820-62 = "#wait;10"
1000820-63 = "#wait;10"
1000820-64 = "3;네루;06;……어……. 으음…….\n#3;stiff"
1000820-65 = "3;네루;05;음……. 그걸 그렇게 물어봐 버리면 어떻게 대답할지가 좀 곤란해지는데……."
1000820-66 = "3;네루;05;내가 여기서 '아무 이유 없어'라고 하면, 선생은 또 그대로 안 믿고 뭔가 숨기고 있다고 생각하겠지?"
1000820-67 = "3;네루;99;선생은 그런 사람이니까 말이야. 쓸 데 없이 상냥하고, 괜한 부분까지 배려하고.\n#3;em;[...]"
1000820-68 = "3;네루;99;……이걸 어떻게 설명해야 할지 고민이 되네."
1000820-69 = "3;네루;01;……응?\n#3;em;[?]"
1000820-70 = "3;네루;04;아니라고? 그냥 있는 사실대로 말해도 된다고? 흠……. 진짜?"
1000820-71 = "3;네루;06;아니, 정말로 뭐 대단한 게 아니라, 오히려 너무 별거 없이 단순한 이유라 안 믿어줄 거 같아서 그랬던 것뿐이긴 한데…….\n#3;em;[땀]"
1000820-72 = "3;네루;05;뭐, 선생이 그렇다면 그런 거겠지. 알겠어. 그럼 대답해 주지."
1000820-73 = "3;네루;05;입는 이유는……."
1000820-74 = "3;네루;03;……존나 멋있으니까.\n#3;em;[반짝]\n#3;closeup\n#3;a\n#fontsize;100"
1000820-75 = "#st;[0,0];instant;1;"
1000820-76 = "#clearST"
1000820-77 = "3;네루;03\n#3;closeup\n#wait;3000"
1000820-78 = "3;네루;03\n#3;closeup\n#wait;3000"
1000820-79 = "3;네루;02;……어때.\n#3;a"
1000820-80 = "3;네루;02;원하던 대답이었어?"
1000820-81 = "[s7] \"……화, 확실히 단순하네.\"\n[s8] \"다른 의미로 대단한 이유네…….\""
1000820-82 = "#wait;10"
1000820-83 = "#wait;10"
1000820-84 = "3;네루;07;하하하하! 뭐야, 그 표정. 역시 당황할 줄 알았지.\n#3;em;[재잘]\n#3;greeting"
1000820-85 = "3;네루;01;뭐, 선생이 어떤 생각을 하고 있을 지는 대충 상상이 가지만 말이야."
1000820-86 = "#zmc;instant;-500,0;2200\n#all;hide"
1000820-87 = "#zmc;instant;-500,0;2200\n#na;네루;평소에 보이는 키 작은 이미지를 타파하기 위해서라거나……."
1000820-88 = "#zmc;instant;-500,0;2200\n#na;네루;무섭게 보여서 사람들을 쫓아내고 싶다거나, 괜한 녀석들과 엮이기 싫어서 챙겨 입고 다닌다거나……."
1000820-89 = "#zmc;instant;-500,0;2200\n#na;네루;보통은 그런 식으로들 생각하고 있더라고. 상상하는 건 자기 맘이니 나도 그런 것까지 뭐라 할 생각은 없어."
1000820-90 = "#zmc;instant;-500,0;2200\n#na;네루;상상력이 풍부한 녀석들 중에선, 물려받은 것이라거나 선물 받은 것이라고 생각하는 녀석도 있던 것 같았는데……."
1000820-91 = "3;네루;01\n#3;a"
1000820-92 = "3;네루;01;……그치만 진짜 별다른 이유는 없어. 보는 순간 멋있다고 생각했고, 그 자리에서 바로 사 입었거든.\n#3;em;[반응]"
1000820-93 = "3;네루;06;흥미롭지 못한 대답이라 미안하게 됐네. 그치만 사실대로 말해 달라 했으니까 말이지."
1000820-94 = "3;네루;04;……뭐?"
1000820-95 = "3;네루;04;따로 누군가에게 설명해준 적이 있냐고? 아니? 애초에 그걸 진지하게 물어본 건 선생이 처음인데?"
1000820-96 = "3;네루;01;보통은 시비 걸려고 물어보거나, 아예 그냥 그러려니 묻지도 않고 받아들이는 경우가 대부분이거든."
1000820-97 = "3;네루;06;……역시 재미없는 이야기였나 보네. 실망시키게 된 것 같아 미안하구만.\n#3;em;[세로선]\n#3;greeting"
1000820-98 = "[s9] \"그렇지 않아. 기대만큼 재밌는 대답이기도 하고.\"\n[s10] \"오히려 네루라면 그런 이유가 좋겠다고 생각했어.\""
