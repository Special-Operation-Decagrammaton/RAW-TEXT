1000820-14 = "1;밀레니엄 모브 1 학생 A;04;저, 저기로 지나가야 되는데…….\n#1;stiff"
1000820-15 = "5;밀레니엄 모브 1 학생 B;07;큰일 날 소리 하지 마! 저 사람 안 보여!? 그냥 돌아서 가자.\n#5;em;[!]\n#5;hophop"
1000820-16 = "1;밀레니엄 모브 1 학생 A;04;C&C 부장……. 무섭다, 진짜. 눈에 확 띄네.\n#1;em;[땀]"
1000820-17 = "5;밀레니엄 모브 1 학생 B;06;차라리 눈에 띄어서 다행이야. 적어도 피하기 쉽잖아. 어쩌면 일부러 저렇게 입고 있는 걸지도……."
1000820-18 = "1;밀레니엄 모브 1 학생 A;04;아아……. 알겠다. '건드리지 마' 같은 거구나…….\n#1;greeting"
1000820-19 = "5;밀레니엄 모브 1 학생 B;06;그렇겠지. 알았으면 빨리 돌아가자. 저쪽으로…….\n#5;em;[세로선]\n#5;stiff"
1000820-20 = "#st;[0,0];instant;1;"
1000820-21 = "#clearST"
1000820-22 = "#wait;150"
1000820-23 = "1;밀레니엄 모브 1 학생 A;05\n5;밀레니엄 모브 1 학생 B;06\n#1;d\n#5;d\n#1;h\n#5;h\n#wait;2000"
