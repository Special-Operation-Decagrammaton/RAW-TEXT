[translation]
41010-1 = "Episode 1; An Uncontrollable Special Unit"
41010-5 = "Time passes too quickly, Sensei. This is Nanagami Rin."
41010-6 = "[s] \"Oh. Hi, Rinny.\""
41010-7 = "What...did you just call me? "
41010-8 = "Refrain from doing that again."
41010-9 = "Moving on."
41010-10 = "I am contacting you with urgent news."
41010-11 = "You've been absent from Schale for quite some time."
41010-12 = "To your credit, reports state you have been crucial in resolving conflicts throughout Kivotos."
41010-13 = "The General Student Council has benefited from your actions, and gratitude is in order."
41010-14 = "However, my issue is with Schale's conduct."
41010-15 = "In regard to your reports, as well as the General Student Council's guidelines..."
41010-19 = "Actually, perhaps such conversations are better in person."
41010-20 = "Sensei, from what I recall, your schedule is open today?"
41010-21 = "Let us discuss over some tea."
41010-22 = "Please meet me at the General Student Council reception room."
41010-28 = "Good job getting through that, Sensei."
41010-29 = "It looks like the scary Rin is gonna yell at you... Are you okay?"
41010-30 = "[s1] \"Well, I can't say I'm not a little scared.\"\n[s2] \"Well, if it's Rin who's punishing me...\""
41010-31 = "There's no way she's only calling you to yell at you though!"
41010-32 = "Wh-What?! What's that mean?"
41010-33 = "There's no way she's only calling you to yell at you though!"
41010-34 = "Like Rin said, you've been solving all kinds of problems in Kivotos."
41010-35 = "Maybe she just wants to give you lots of yummy treats as a reward for your hard work!"
41010-36 = "[s] \"Let's hope that's all it is.\""
41010-37 = "All right, Sensei! Time to get those snacks! Off to the General Student Council building!"
41010-44 = "Welcome, Sensei. Thank you for taking the time to meet with me."
41010-45 = "[s3] \"Long time no see, Rin.\"\n[s4] \"So, where are the treats?\""
41010-46 = "Time is a luxury, so let us begin."
41010-47 = "Huh? What do you mean by treats?"
41010-48 = "...You look rather disappointed."
41010-49 = "Please have a seat while I get some tea."
41010-50 = "Time is a luxury, so let us begin."
41010-51 = "As I said on the phone, I wanted to discuss my concerns regarding your handling of some Schale activities."
41010-52 = "[s] \"Did I do something wrong?\""
41010-53 = "It's not that I don't appreciate all that you have done since you've arrived. Students across Kivotos sing your praises."
41010-54 = "However, the issue lies in what happens after the conflict is over."
41010-55 = "I would like you to take a look at these post-operation reports you submitted."
41010-62 = "This expense report!"
41010-63 = "The billing statement is not only handwritten, but in Arabic numerals."
41010-64 = "[s] \"I get the feeling that's bad?\""
41010-65 = "Very much so."
41010-66 = "Any money amounts written in official documents must be written in Chinese to prevent forgery or other mishaps."
41010-67 = "And if you would observe here, the seal is stamped three centimeters away from the indicated blank."
41010-68 = "If you fail to follow official procedure and formatting in your reports, we in turn cannot help you with resolving them."
41010-69 = "So now that you're here, please revise all of these reports before you leave."
41010-70 = "[s5] \"I'm guessing that's not a suggestion...\"\n[s6] \"You're not gonna help me, Rin?\""
41010-71 = "It is not. You must resolve your business first, [USERNAME] Sensei."
41010-72 = "I cannot. This business is your own making, [USERNAME] Sensei."
41010-73 = "If you had followed proper procedure from the beginning, we wouldn't be here right now."
41010-77 = "Also, would you care to explain the informal tone of this report? "
41010-78 = "While these are confidential documents, they must still be written with the pomp and circumstance afforded to them."
41010-79 = "Refer here to Article 15 of the official guidelines of the General Student Council..."
41010-82 = "(Rin kept scolding me for a long, long time.)"
41010-89 = "Um, Rin..."
41010-90 = "I-I mean, Senior Administrator... I need to talk to you about something."
41010-92 = "Yes, Ayu—Chief of Staff?"
41010-93 = "Well, there's an urgent matter."
41010-98 = "*whisper* The demolition of SRT Academy was scheduled today. However, just as they were about to begin, students occupied the park to protest the school's closing."
41010-99 = "We didn't have the manpower to deal with the sit-in...so the demolition is being delayed."
41010-102 = "..."
41010-103 = "Contact the Security Bureau of Valkyrie Police School."
41010-104 = "The General Student Council's orders are absolute. The students must be apprehended."
41010-105 = "Th-That's what I thought you would say. I'm on it."
41010-109 = "[ns7] \"Hi. I'm still here. \"\n[ns8] \"Seems like there's something wrong.\""
41010-110 = "I'm aware. These types of issues have been par for the course since the General Student Council president disappeared."
41010-111 = "These types of issues have been par for the course since the General Student Council president disappeared."
41010-112 = "It's nothing to concern yourself over, Sensei."
41010-113 = "[s] \"What is SRT Academy?\""
41010-114 = "SRT stands for Special Response Team."
41010-115 = "It's an elite academy of specially-trained students."
41010-116 = "They were a highly effective force under the General Student Council president's command."
41010-120 = "With her gone, there's not much point to the organization."
41010-121 = "Now then, on to Article 21, Paragraph 3 of the guidelines."
41010-124 = "(Moments later.)"
41010-130 = "Um, Senior Administrator..."
41010-131 = "Yes, Chief of Staff?"
41010-132 = "Well, you see..."
41010-133 = "The Security Bureau was wiped out by the protesters."
41010-134 = "All of them?! I thought it was just a few students! "
41010-135 = "It is! It's just one squad. Believed to be just four students."
41010-136 = "But SRT students are way too well-trained and well-armed to be taken down by just the Security Bureau."
41010-140 = "I was hoping I wouldn't have to resort to this."
41010-141 = "Contact the Public Peace Bureau of Valkyrie Police School. The Defense Office will be able to help us coordinate with and dispatch their forces."
41010-142 = "They may be elites, but the Public Peace Bureau specializes in anti-terrorism. Suppress them."
41010-143 = "I-If you say so!"
41010-147 = "[ns] \"Are you sure everything's okay?\""
41010-148 = "I know what you're thinking. There's no need for you to get involved with General Student Council matters."
41010-149 = "Your only assignment right now is to finish correcting your reports."
41010-150 = "I'm only saying this to be sure, but..."
41010-151 = "I do hope you aren't offering to help to avoid your paperwork."
41010-152 = "[s9] \"I-I wouldn't ever think of that! Never, ever!\"\n[s10] \"I'm suddenly so excited to revise all these reports!\""
41010-153 = "...I'm relieved to hear that. For both our sakes."
41010-154 = "...I'm relieved to hear that. For both our sakes."
41010-155 = "Then, let's pick up where we left off. In order to revise incorrect seals..."
41010-157 = " (Moments later.)"
41010-164 = "Senior Administrator..."
41010-168 = "The Public Peace Bureau students...?"
41010-169 = "Every last one defeated."
41010-170 = "According to the report, they couldn't even get close to the park. They were taken out by snipers and booby traps almost immediately."
41010-171 = "To make matters worse, reporters from Kronos have picked up on the chaos and flocked to the scene."
41010-172 = "In other words, things are not going well!"
41010-173 = "..."
41010-174 = "Disaster can never choose a convenient time, can it?"
41010-178 = "W-Well, Rin... I was thinking... We already have the Schale Sensei here..."
41010-179 = "You've read the reports too. Sensei has great leadership skills and they have the influence and authority to ask for backup from really wherever they want."
41010-180 = "With the Valkyrie students taken out, I think Schale is our best hope..."
41010-181 = "..."
41010-182 = "...Tsk."
41010-186 = "Sensei. As you may have guessed, we've encountered a small issue."
41010-187 = "While the General Student Council should handle this..."
41010-188 = "It seems your assistance is, in fact, required."
41010-189 = "[s11] \"I've been waiting for you to say that.\"\n[s12] \"My moment to shine!\""
41010-190 = "As a thank you, I will handle your reports. Just this once."
41010-191 = "As a thank you, I will handle your reports. Just this once."
41010-192 = "Your job is to suppress the SRT Academy students' protest. And quickly."
41010-193 = "There may be only a few, but do not underestimate them. They're highly trained and armed with heavy artillery."
41010-194 = "Valkyrie Police School officers will explain the details once you've arrived at the scene."
41010-195 = "I'm counting on you, Sensei."
41010-197 = "Next Episode; Uninvited Guest in the Park"
