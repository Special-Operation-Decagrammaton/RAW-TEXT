[translation]
10028040-1 = "第4話;The good, The bad, The trinity"
10028040-12 = "……喂，列車現在到哪裡了？"
10028040-13 = "現在離我們約3km。目前時速300km……"
10028040-14 = "……不，310km……！315km……！速度正逐漸加快！"
10028040-15 = "嘖……得配合它提高車速！"
10028040-19 = "這麼做有意義嗎！？#n對方的時速超過300km耶？"
10028040-20 = "也太瘋狂了吧……預計將於2分鐘後會合！！"
10028040-21 = "別怕，打起精神來！！"
10028040-22 = "列車馬上就要追上我們了！各車輛保持當前的速度！！"
10028040-23 = "受不了，想不到居然真的跟聽說的一樣……不但過站不停還高速急駛。"
10028040-24 = "裡面到底發生了什麼？#n這樣下去，列車將失控衝進格黑娜自治區……"
10028040-28 = "……唉，算了。#n反正直接進去確認就知道了。"
10028040-29 = "將列車停下，並把所有涉案人員找出來！大家準備搭上列車！！"
10028040-30 = "是！！"
10028040-36 = "速度變得更快了……！？"
10028040-37 = "15秒後會合！！"
10028040-38 = "全員！！準備上車──！！"
10028040-39 = "準備好了！！"
10028040-43 = "……上吧！！"
10028040-53 = "還剩下幾節車廂……？"
10028040-55 = "嗯～我看看……還有四節？不，剩下三節！"
10028040-56 = "只要再往前一點就行了！哇哈哈哈！太好了，太好了～"
10028040-58 = "哈哈……事情怎麼會演變成這樣……"
10028040-59 = "不過多虧其他乘客也幫忙戰鬥，似乎值得一試呢。#n過站不停的影響力果然很大。"
10028040-63 = "但即便如此，能在短時間內煽動群眾和製造氣氛……"
10028040-64 = "……那個名叫佳澄的人確實不是普通的罪犯。"
10028040-65 = "和他扯上關係的話，感覺會讓自己更深入險境。"
10028040-66 = "公文包……要不是因為公文包……不，要是當初沒有惹上這種麻煩……"
10028040-67 = "唔唔……"
10028040-68 = "[ns1]「一花，你辛苦了……」\n[ns2]「快點找到公文包吧……」"
10028040-71 = "真是的，小姑娘從剛才開始就一直在自言自語呢。"
10028040-72 = "可是你知道嗎？#n在來這裡的路上，我感覺～我們之間有許多相似之處呢。"
10028040-74 = "……什麼？"
10028040-75 = "又，又在說什麼奇怪的話？我跟你哪裡像了？"
10028040-76 = "我們根本沒有共同點。#n我是「三一」的「實現正義部」，你是「格黑娜」的「恐怖份子」……"
10028040-77 = "真要說的話，應該是完全相反吧？#n到底哪裡像了……"
10028040-79 = "哼嗯～是嗎？我倒是有不同的想法。"
10028040-80 = "雖然內心假裝不是，但說實話，和三一的那群可愛朋友們相比……"
10028040-81 = "……小姑娘更接近「[ruby=  ・     ・     ・     ・  ]我們這邊[/ruby]」的人吧？哇哈哈哈哈！！"
10028040-83 = "……唉……還以為你會說什麼呢……"
10028040-84 = "別胡說八道了。我恨不得馬上跟你道別，從此不再見面。"
10028040-86 = "哈～哈哈哈哈！好吧，無所謂！就先這樣吧！"
10028040-87 = "但你可別因為想下車就太過躁進喔～那樣是會適得其反的。"
10028040-88 = "還剩下三節車廂，從距離上來看似乎很快就能抵達……"
10028040-101 = "……但換句話說，這也代表我們越來越靠近對方的「主力部隊」了。"
10028040-103 = "他們闖到這裡來了！！"
10028040-104 = "喂！就是現在！把「那個」拖過來！！"
10028040-105 = "……嗯？"
10028040-106 = "「那個」……？"
10028040-107 = "哦～看來對面的朋友們準備了什麼驚喜呢？"
10028040-108 = "這幫該死的暴民，以為我們會一直被壓著打嗎！？"
10028040-109 = "這是為了今天準備的！給我做好覺悟吧！！"
10028040-124 = "……哇嗚～"
10028040-125 = "不得了不得了。#n這些朋友……準備得也太周到了吧？"
10028040-126 = "再怎麼說，拖一門大砲過來也太……"
10028040-128 = "才不是大砲！這是壓制暴動用的加農砲！！！"
10028040-130 = "不，更準確地說……"
10028040-134 = "……算了，只要帥就沒問題了吧？"
10028040-135 = "[s3]「……確實是挺帥的。」\n[s4]「之前到底是經歷過多誇張的騷動……」"
10028040-142 = "居然把那種東西帶到列車上……"
10028040-143 = "這下不妙了呢，得先改變這裡的狀況才行……"
10028040-144 = "不試試看怎麼知道──！！"
10028040-145 = "來吧──！！全員突擊──！！#n給我摧毀那門奇怪的大砲──！！"
10028040-156 = "唉……"
10028040-161 = "……瞄準這裡了！"
10028040-162 = "我想也是。"
10028040-169 = "……來了！！"
10028040-171 = "所有人不准動──！！"
10028040-181 = "[ns]「……這個聲音是！！」"
10028040-182 = "立刻停止動作！！"
10028040-183 = "全部放下武器！雙手抱頭別動！！"
10028040-184 = "……嗯！？"
10028040-185 = "在這個節骨眼……？"
10028040-186 = "現在……從列車外面？"
10028040-187 = "這輛列車……還在行駛中耶？"
10028040-188 = "不，等等。比起那個，那套服裝是……"
10028040-197 = "……嗯？"
10028040-198 = "……哦！！"
10028040-199 = "哦哦哦～！！！我還想說是誰呢，這不是我們格黑娜的風紀委員會嗎！？"
10028040-200 = "剛才已經叫你們別動了！！全都給我停止動作，不准動！！"
10028040-205 = "……從現在起，這輛列車將由格黑娜風紀委員會接管！！"
10028040-206 = "列車內的所有行動都要聽我……"
10028040-207 = "……指揮？"
10028040-211 = "……老師？"
10028040-212 = "……搞什麼？為什麼老師會在這種地方？"
10028040-213 = "[s5]「嗨，伊織。」\n[s6]「今天見到你特別開心！」"
10028040-216 = "唉……這次又是什麼情況？八成又是些亂七八糟的事吧。"
10028040-217 = "還有，你旁邊的是……"
10028040-219 = "……你，你好。我叫一花。"
10028040-220 = "那個，我們只是……"
10028040-221 = "哎呀～看看是誰來了！#n這不是我們風紀委員會的伊織同學嗎～！？"
10028040-222 = "嗨～？最近過得好嗎～？"
10028040-226 = "如果你願意的話～既然來都來了，可以順便幫幫我們嗎？"
10028040-227 = "我們不是經常見面嗎？看在平時關係好的份上……可以吧？"
10028040-228 = "……那個，雖然由我來說好像也有點尷尬。"
10028040-233 = "……兩位不是敵對關係嗎？"
10028040-236 = "……唔……"
10028040-237 = "有沒有搞錯！？這組合是怎麼回事！？！？"
10028040-238 = "這不是開往格黑娜的列車嗎！？為什麼三一的實現正義部會在這裡？"
10028040-239 = "還有佳澄……！？"
10028040-240 = "佳澄……佳澄！？#n老師，你該不會一直都和這傢伙待在一起吧？快跟我說不是！！"
10028040-241 = "哈哈～不愧是伊織！真是心有靈犀一點通～"
10028040-242 = "你閉嘴！！"
10028040-243 = "老師！！這是真的嗎……！？你跟那傢伙不是一夥的吧！？"
10028040-244 = "我們為了抓住那傢伙吃了多少苦，老師不可能不知道吧！"
10028040-245 = "……什麼？"
10028040-246 = "「我們都在一起多久了，你居然不相信我」……？"
10028040-247 = "別開玩笑了，老師！！現在是我在問問題！懂嗎！！#n你要我怎麼搞懂現在的情況！！"
10028040-251 = "……嗯？"
10028040-252 = "什麼？現在不是說這個的時候……？什麼意思？"
10028040-253 = "……後面？"
10028040-254 = "要我看看後面？後面怎麼了……"
10028040-259 = "[ns7]「加農砲……」\n[ns8]「怎麼剛好出現在正前方……」"
10028040-263 = "……這又是什麼鬼東西？"
10028040-267 = "為什麼這裡會有──"
10028040-273 = "[ns9]「伊織被正面擊中了……！」\n[ns10]「沒，沒事吧！？伊織！！」"
10028040-280 = "唔唔……攻擊──！！全員攻擊──！！"
10028040-281 = "哇哈哈哈！！終於能溝通了！！"
