[translation]
901010400130-11 = "……こんにちは！"
901010400130-15 = "……っ！"
901010400130-16 = "驚かせやがって……手元が狂ったらどうするんだ。"
901010400130-17 = "すみません。ビッグニュースをお伝えしたくて、つい。"
901010400130-22 = "……ビッグニュース？"
901010400130-24 = "はい。夕方になったら小腹が空いてきますよね？#nそんな皆さんのために――"
901010400130-25 = "お得なプロモーションをご用意してきました！"
901010400130-26 = "今「FOX EATS」で開催中のアンケート調査にご協力いただくと――"
901010400130-30 = "有名いなり寿司店「吉野いなり」のお弁当を無料でプレゼントします！"
901010400130-31 = "この機会にいかがでしょう？"
901010400130-33 = "……怪しいな。"
901010400130-34 = "無料のお弁当……何か企んでいるのか？"
901010400130-36 = "もちろん食べて頂くためのアンケートには、条件がいくつかありまして……。"
901010400130-37 = "このアンケート調査は「FOX EATS」の製品およびサービス向上のため使用され、特定製品に関する調査および広報を目的として第3者に提供される可能性があります。調査結果は調査時点から36ヶ月間保存され、内容に異議がある場合は「FOX EATS」のお客様相談窓口へ――"
901010400130-39 = "……もういい、分かった"
901010400130-40 = "はぁ……またどこぞのマーケティング企業が余計なことにお金を使っているようだな。"
901010400130-41 = "まあ、食べ物に罪はないが。"
901010400130-42 = "ちょうどお腹も減ってたところだし。"
901010400130-43 = "どれ……。"
901010400130-49 = "おお、これは中々……。"
901010400130-50 = "旨い！米がふっくらしていて、油揚げも厚みがあって……気に入った。"
901010400130-51 = "一つ気になるのは……。"
901010400130-53 = "何かありましたか？"
901010400130-54 = "ご意見はいつでも大歓迎です！"
901010400130-55 = "……この具は、カニカマか？"
901010400130-56 = "こんなに美味いおいなりさんなのに、カニカマを使うなんて、勿体ないな。"
901010400130-60 = "ですが、「本物のカニ」はすごく高いので……。"
901010400130-61 = "カニのような高級食材を使っては、お弁当の利益が――"
901010400130-62 = "いつの話をしてるんだ？カニの値段が底値まで下がって数ヶ月経ってるんだぞ。"
901010400130-64 = "ああ……あまりにも安くなりすぎちまった。#n最近は漁に出る回数を減らすか悩んでるくらいでな。"
901010400130-66 = "そうなんですか？市場やスーパーでは、まだ高いみたいですが……。"
901010400130-67 = "信じられないなら、あっちの物流倉庫を見てみな。#n出荷されてないカニが山ほど残っとる。"
901010400130-68 = "なるほど……ありがとうございます。#nいただいたフィードバックは、お店に伝えておきますね。"
901010400130-69 = "あ、そうだ。もう一つお伺いしたいことがあるのですが。"
901010400130-70 = "――「ドラム缶ガニ」について、何かご存知ですか？"
901010400130-71 = "ドラム缶ガニ……？カニをドラム缶に入れて輸送する業者がいるのか？"
901010400130-73 = "他は知らんが、うちは木箱に入れて納品するんだ。#n物流倉庫に行けば分かると思うぞ。"
901010400130-74 = "はい！ご協力いただき、ありがとうございました。"
901010400130-75 = "よい一日を！"
