[translation]
2601302-1 = "สิ่งที่มองไม่เห็น แต่อยู่ในความทรงจำ"
2601302-2 = "อ๊ะ คุณครู [USERNAME]"
2601302-3 = "สวัสดี"
2601302-4 = "[s1] \"อาสึโกะ ดูสนุกจังเลยนะ\"\n[s2] \"อาสึโกะ ดูตื่นเต้นจังเลยนะ\""
2601302-7 = "ฉันดูเป็นอย่างนั้นเหรอ?"
2601302-8 = "แต่ฉันว่าก็ไม่ต่างไปจากปกตินะ..."
2601302-9 = "สงสัยจะเห็นได้จากสีหน้าสินะ"
2601302-10 = "ใช่แล้วละ ที่จริงแล้วฉันตื่นเต้นนิดหน่อย คงเป็นเพราะบรรยากาศของงานเทศกาลน่ะ"
2601302-11 = "การที่เราไม่ต้องหนีใครใน <ชายหาดนอกกฎหมาย> ก็ด้วย..."
2601302-12 = "อื้อ แล้วฉันก็มีกล้องมาด้วย"
2601302-13 = "การถ่ายรูปมันสนุกดีนะ"
2601302-14 = "มันทำให้เราเก็บช่วงเวลาที่มีค่าเอาไว้ได้น่ะ"
2601302-15 = "วันนี้ฉันก็เลยอยากหาจุดที่พอจะถ่ายรูปสวยๆ ได้"
2601302-16 = "ไปกับฉันได้มั้ย คุณครู?"
2601302-17 = "[s] \"แน่นอนอยู่แล้ว\""
2601302-18 = "อื้อ งั้นก็ไปกันเถอะ"
2601302-20 = "ฉันว่าจะลองถ่ายอะไรเรื่อยเปื่อยให้ได้เยอะๆ ก่อนน่ะ"
2601302-21 = "นี่เป็นกล้องดิจิทัลที่ฉันดวงดีได้มาจากตลาดมืดเลยนะ"
2601302-22 = "ถึงมันจะเป็นรุ่นเก่า แต่ก็ไม่ได้แย่อะไร"
2601302-23 = "อ๊ะ เดี๋ยวนะ คุณครู"
2601302-24 = "ป้ายโฆษณาอันนั้นสวยจังเลย"
2601302-25 = "[s] \"ป้ายโฆษณาเหรอ?\""
2601302-26 = "อื้อ ที่เขียนไว้ว่ายากิโซบะ น้ำแข็งไส ข้าวโพด..."
2601302-27 = "ถ้าถ่ายรูปไว้แล้วมาเปิดดูทีหลัง คงจะคิดถึงกลิ่นที่หอมหวาน เสียงฉ่าบนกระทะ แล้วก็รสชาติอร่อยๆ ด้วย"
2601302-28 = "น่าจะเป็นความทรงจำที่ดีเลยละ"
2601302-31 = "งั้นต่อไปก็ไปหาอย่างอื่นถ่ายกันเถอะ"
2601302-33 = "ได้มาเดินเล่นริมหาดแบบนี้... สดชื่นดีจัง"
2601302-34 = "อ๊ะ คุณครู ระวังเท้าด้วย เกือบเหยียบปูเสฉวนแล้วนะ"
2601302-35 = "[s] \"แย่ละ เกือบเป็นเรื่องซะแล้ว\""
2601302-36 = "ฮุฮุ ปูเสฉวนน่ารักจัง"
2601302-37 = "พี่ช่วยหนูไว้เลยนะ มาให้พี่ถ่ายรูปซะดีๆ"
2601302-41 = "อื้อ ได้รูปแล้วละ เดินไปดีๆ นะ เจ้าปูเสฉวน"
2601302-42 = "บนชายหาดมันอันตราย ลงไปในทะเลสิ"
2601302-43 = "ถ้ากลับมาดูรูป คงจำเรื่องนี้ได้แม่นเลยว่ามั้ยล่ะ? ก็ฉันถ่ายรูปเพราะอยากย้อนกลับมาคิดถึงนี่เนอะ"
2601302-44 = "ต่อไปจะไปถ่ายอะไรกันดีนะ?"
2601302-46 = "(หลังจากนั้นคุณครูกับอาสึโกะก็เดินถ่ายรูปรอบๆ ชายหาดด้วยกัน)"
2601302-48 = "เวลาล่วงเลยมาขนาดนี้แล้วเหรอ..."
2601302-49 = "[s3] \"พระอาทิตย์ตกสวยจังเลย ถ่ายรูปเก็บไว้ดีมั้ย?\"\n[s4] \"ถ่ายรูปพระอาทิตย์ตกเป็นรูปสุดท้ายของวันนี้ดีมั้ย?\""
2601302-52 = "อื้อ ได้สิ ไหนดูซิ... อืม..."
2601302-53 = "อ๊ะ!"
2601302-58 = "กล้องฉัน...?!"
2601302-59 = "อื้อ ดีนะตกลงไปบนทรายนุ่มๆ กล้องเลยไม่เป็นอะไร"
2601302-60 = "อ๊ะ แต่ฝาครอบแบตเตอรี่มันเปิดอยู่"
2601302-61 = "หวังว่าทรายจะไม่เข้าไปนะ..."
2601302-62 = "หืม...?"
2601302-63 = "[s] \"แต่ในช่องใส่แบตเตอรี่... ไม่มีแบตนะ?\""
2601302-67 = "อ๊ะ... จริงสิ ตอนเช้าฉันเตือนตัวเองว่าต้องใส่แบตเตอรี่กล้องมาด้วย แต่ก็ดันลืมซะได้"
2601302-68 = "ก็ว่าอยู่ว่าทำไมหน้าจอเปิดไม่ขึ้น คิดว่าเพราะเป็นกล้องรุ่นเก่า ก็เลยเป็นอย่างนี้เสียอีก..."
2601302-69 = "ถ้างั้นรูปทั้งหมดที่ถ่ายกับคุณครูวันนี้..."
2601302-70 = "[s] \"คงไม่มีสักรูปสินะ\""
2601302-74 = "วันนี้สนุกมากๆ แท้ๆ แต่ไม่มีประโยชน์เลยเหรอ..."
2601302-75 = "แค่ไม่ได้ใส่แบตเตอรี่กล้องมา กลายเป็นว่าฉันเก็บความทรงจำอะไรไม่ได้สักอย่าง"
2601302-76 = "ทั้งป้ายโฆษณา ปูเสฉวน ความทรงจำพวกนี้หายไปหมดเลย"
2601302-77 = "นี่คือความทรงจำที่มีร่วมกับคุณครูเลยนะ..."
2601302-78 = "[s] \"ไม่หายไปหรอก...\""
2601302-79 = "ไม่หายไป... งั้นเหรอ?"
2601302-80 = "แต่ว่า... ฉันไม่มีรูปถ่ายเหลือเลยนะ"
2601302-81 = "อุตส่าห์จะนึกถึงความทรงจำพวกนี้ตอนกลับมาดูรูปแล้วเชียว..."
2601302-82 = "[s] \"ถึงไม่มีรูป แต่มันก็มีอยู่จริงในความทรงจำนะ\""
2601302-85 = "[ns] \"ความจริงที่เรามางานเทศกาลด้วยกันไม่ได้เปลี่ยนแปลงไปนี่นา?\""
2601302-87 = "อย่างนั้นสินะ..."
2601302-88 = "ความทรงจำแห่งความสุขยังคงชัดเจนอยู่ในใจของคุณครูกับฉัน"
2601302-89 = "การได้มาคุยกับคุณครูแบบนี้ก็เป็นเรื่องที่ฉันจะไม่ลืมเลย"
2601302-90 = "ขอบคุณนะ คุณครู ฉันได้เรียนรู้กลับไปอีกแล้ว"
2601302-91 = "[s] \"ไว้ครั้งหน้าครูจะเอาแบตเตอรี่มาเผื่อด้วยนะ\""
2601302-92 = "ฮุฮุ"
2601302-93 = "อื้อ งั้นคราวหน้าไว้เราไปเที่ยวงานเทศกาลกันอีกนะคุณครู"
2601302-94 = "ตอนนั้นฉันจะไม่ทำพลาดอย่างวันนี้เลยละ"
