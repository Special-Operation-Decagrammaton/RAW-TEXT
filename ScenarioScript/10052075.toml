[translation]
10052075-9 = "อ๊าาา! เยอะเกินไปแล้ว! เมื่อไรจะหมดสักทีเนี่ย!"
10052075-13 = "มิโดริ! ยังมีกระสุนเหลืออยู่มั้ย?!"
10052075-28 = "ฉะ... ฉันก็ใช้จนเกือบหมดแล้วเหมือนกัน..."
10052075-29 = "เอ้า! นี่เป็นแม็กสุดท้ายแล้ว... ใช้ประหยัดๆ ล่ะ!"
10052075-31 = "แล้วจากนี้เธอจะทำยังไง?!"
10052075-32 = "ของฉันตอนนี้... น่าจะเหลืออยู่ครึ่งแม็กน่ะ!"
10052075-33 = "ฮึ่ย ต่อให้ใช้ประหยัดๆ ยิงพวกนั้นตัวละนัดก็ยังไม่พออยู่ดี"
10052075-34 = "ยะ... อย่างน้อยก็ยื้อเวลาไว้ก่อนเถอะ!"
10052075-38 = "[log]ลำแสงทำลายล้าง!!![/log]"
10052075-44 = "อาริสึ!!!"
10052075-45 = "เป็นยังไงบ้างคะ โมโมอิ? มิโดริ? อาริสึมาช้าเกินไปหรือเปล่าคะ?"
10052075-46 = "เปล่าเลย! มาได้ทันเวลาพอเลยดีละ!"
10052075-47 = "ฮุฮุ เป็นยังไงบ้างคะ? ฉันขับวีลแชร์ได้ไม่เลวเลยใช่มั้ยคะ?"
10052075-48 = "รุ่นพี่ฮิมาริ นั่นมันมอเตอร์ไซค์..."
10052075-49 = "วีลแชร์ค่ะ"
10052075-50 = "ค่ะ..."
10052075-54 = "คุณครู? ไหวหรือเปล่าคะ?! เห็นทำหน้าถอดสีมาเลย...!"
10052075-55 = "[s] \"ครู... ยังไหว...\""
10052075-56 = "ไว้คราวหน้าฉันจะเตรียมยาแก้เมารถไว้ให้ค่ะ..."
