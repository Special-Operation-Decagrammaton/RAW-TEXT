90101020-73 = "3;니코;09;……그러게. 무엇이든 좋은 것만 가져갈 수는 없으니까."
90101020-74 = "3;오토기;06;아아, 그나저나 새우를 잔뜩 선물 받았다니 부럽네~\n#3;em;[한숨]"
90101020-75 = "3;오토기;08;어디 게 공급에 문제가 생긴 곳은 없으려나? 그럼 이번에는 공짜 게를 선물 받을 수 있을지도 모르는데—"
90101020-76 = "5;쿠루미;10;그게 무슨 불순한 소리야? 먹을 것에 눈이 멀어 사건이 생기길 바란다니.\n#3;m2\n#5;al"
90101020-77 = "3;오토기;09;농담이야, 농담. 그렇게 도끼눈을 뜨고 볼 필요는 없잖아?\n#3;stiff\n#3;em;[땀]"
90101020-78 = "3;오토기;08;여하튼 게 먹고 싶다, 게. 통조림이나 소시지가 아닌 진짜 게—"
