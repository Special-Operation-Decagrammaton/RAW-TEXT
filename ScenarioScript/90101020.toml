90101020-13 = "3;오토기;03;오우, 수고.\n#3;em;[음표]"
90101020-14 = "3;오토기;02;그나저나 예정보다 꽤 늦었네."
90101020-15 = "3;오토기;01;오늘 잠입 예정이었던 발키리 기록 보관소에서 무슨 문제라도 있었던 거야?\n#3;em;[?]"
90101020-16 = "3;쿠루미;02;아니. 잠입 자체는 문제없이 진행되었어."
90101020-17 = "3;쿠루미;01;가져간 경비국 배지도, 학생증도 진짜와 동일한 것을 준비했었으니까."
90101020-18 = "3;쿠루미;04;그런데 돌아오는 길에 본관 정문 앞에서 생활안전국 소속으로 보이는 한 학생이 갑자기 우릴 의심하는 거야.\n#3;hophop"
90101020-19 = "3;쿠루미;12;눈썰미가 어찌나 좋은건지, 경비국에서는 전에 본 적이 없는 얼굴이라며 우릴 뚫어져라 쳐다보는 게 아니겠어.\n#3;em;[한숨]"
90101020-20 = "1;오토기;02;설마…… 그래서 경비국 녀석들에게 들킨 거야?\n#1;ar\n#3;m5"
90101020-21 = "3;쿠루미;06;아니. 니코가 도넛 이야기로 화제를 돌리니까 언제 그랬냐는 듯 의심을 풀더라고.\n#3;em;[땀]"
90101020-22 = "3;니코;12;다만 말을 맞추다 보니 마스터 도넛의 한정 도너츠를 사는 줄에 함께 서는 바람에……\n#1;hide"
90101020-23 = "3;니코;09;HQ로 돌아오는 데 시간이 좀 더 걸렸어. 미안."
90101020-24 = "5;쿠루미;01\n1;오토기;03;미안할 것 까지야. 고생 많았네.\n#3;hide"
90101020-25 = "5;쿠루미;02;그나저나 유키노는?\n#5;em;[?]"
90101020-26 = "1;오토기;02;총학생회장이 불러서 간 뒤로 아직 안 돌아왔어."
90101020-27 = "1;오토기;01;저녁도 총학생회 건물 근처에서 해결하고 온다던데."
90101020-28 = "3;니코;02;참, 그러고보니 오토기는 아직 저녁도 못 먹었지?\n#3;em;[반응]\n#1;hide\n#5;hide"
90101020-29 = "3;니코;01;배고프겠다. 금방 저녁을 준비해줄게."
90101020-30 = "3;오토기;03;괜찮아. 난 이미 이걸로 때웠으니까.\n#3;greeting"
90101020-31 = "3;니코;04;그건……"
90101020-32 = "3;쿠루미;02;<요코즈나>의 게살 어육 소시지잖아? 너, 그거 엄청 좋아하네.\n#5;hide"
90101020-33 = "3;오토기;03;뭐, 좋아한다기 보다도 먹기에 편리하잖아.\n#3;em;[음표]"
90101020-34 = "3;오토기;03;유통기한도 길고, 한 개 만으로도 충분히 포만감이 생기고. 무엇보다 먹을 때 냄새나 소리가 거의 나지 않는다는 게 마음에 들어."
90101020-35 = "3;오토기;13;언제나 기척을 숨기고 식사를 해결해야 하는 저격수— 아니, 암살자의 가장 좋은 선택이라고 할까. 후, 후, 후.\n#3;em;[반짝]"
90101020-36 = "3;쿠루미;06;……그건 또 누구 흉내를 내고 있는 거야?"
90101020-37 = "3;니코;05;안 돼. 아무리 편리하다고 해도 식사를 다른 걸로 때우는 건 용납할 수 없어. 성장기니까 제대로 밥을 먹어야지.\n#3;jump\n#3;em;[!]"
90101020-38 = "3;니코;09;잠시만 기다려 줘. 금방 밥을 지어 올 테니까."
90101020-39 = "3;오토기;09;네~\n#3;em;[땀]"
90101020-40 = "3;오토기;09\n5;쿠루미;02;그나저나 게살이 들어 간 어육 소시지면 엄청나게 비싼 거 아냐?\n#3;m1\n#5;em;[?]\n#5;al"
90101020-41 = "5;쿠루미;06;설마, 탄약값을 아껴 간식비로 쓰고 있는 건 아니겠지……?"
90101020-42 = "3;오토기;02;아냐. 이거 그렇게 안 비싸. 하나에 100엔도 안 한다고.\n#3;m2"
90101020-43 = "5;쿠루미;04;싸구려 게살 통조림도 1000엔은 하는데, 게살 소시지가 100엔도 안 한다고……?\n#5;stiff"
