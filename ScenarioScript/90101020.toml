90101020-47 = "5;쿠루미;02;아."
90101020-48 = "5;쿠루미;01;이거. 진짜 게살이 아니라, 게살 '맛' 어육 소시지야."
90101020-49 = "3;오토기;07;뭐……라고?\n#3;shake\n#3;em;[?!]"
90101020-50 = "5;쿠루미;02;여기 성분표를 봐. 게살은 1%도 들어가 있지 않잖아?\n#5;m4"
90101020-51 = "5;쿠루미;01;싸구려 어육에 게살 에센스를 넣어서 풍미를 비슷하게 만든 것 뿐이라고."
90101020-52 = "3;오토기;04;이럴 수가. 요코즈나 게살 소시지에 진짜 게가 들어가지 않는다니……\n#3;stiff"
90101020-53 = "3;오토기;06;……방금 내 세상이 무너졌어.\n#3;em;[세로선]"
90101020-54 = "5;쿠루미;12;호들갑 떨지 마. 처음부터 가격이 그렇게 저렴했을 때부터 의심을 했어야지.\n#5;em;[한숨]"
90101020-55 = "5;쿠루미;11;세상에 공짜 점심은 없는 법이라잖아?"
90101020-56 = "3;니코;02;아, 그러고보니 해산물이라고 하니 떠올랐는데.\n#5;hide\n#3;em;[반응]"
90101020-57 = "3;니코;01;전에 RABBIT 소대의 후배들이 어촌 마을에서 일어난 사건을 해결해 주고. 질 좋은 새우를 잔뜩 선물 받았다고……"
90101020-58 = "3;쿠루미;02;응? 그게 무슨 소리야?\n#3;em;[?]"
90101020-59 = "3;니코;02;아. 우리가 교정국에 있었을 때의 일인데, 한 때 D.U.에서 새우 공급이 끊긴 적이 있었다고—"
90101020-60 = "5;쿠루미;05;아니, 새우의 이야기가 아니라!\n#5;al\n#3;m2\n#5;hophop"
90101020-61 = "5;쿠루미;00;니코 너, 우리한테는 알리지도 않고 후배들과 혼자서 연락을 하고 있었던 거야?"
90101020-62 = "1;오토기;13;치사해~ 나도 후배들이랑 안부 주고받고 싶었는데.\n#1;ar\n#3;m3"
90101020-63 = "3;니코;04;트, 특별히 혼자만 연락을 하려고 한 건 아니었어.\n#3;stiff\n#3;em;[땀]"
90101020-64 = "3;니코;04;교정국에서는 휴대 전화를 쓸 수 없잖아? 그래서 미야코 쨩이 가끔 보내오는 편지에 답장을 하다 보니 자연스럽게 펜팔을 주고 받게 되어서."
90101020-65 = "5;쿠루미;02;아…… 그런 거 였나."
90101020-66 = "1;오토기;09;요즘 같은 시대에 종이 편지라니, 미야코 쨩도 성실하네."
90101020-67 = "1;오토기;09\n5;쿠루미;02\n3;니코;01;맞아. 어떤 상황에서든 성실한 게 장점인 아이잖아?"
90101020-68 = "5;쿠루미;01;너무 과해서 가끔 단점이 될 때도 있지만."
