[translation]
70013020-1 = "一人では咲かない雑草（2）"
70013020-2 = "[log]時は、ハルカが便利屋68のメンバーになる前――[/log]"
70013020-5 = "ふふ、今回の依頼も大成功だったわね。"
70013020-6 = "ん～、けどさーアルちゃん。"
70013020-7 = "「猫探し」と「ハードボイルド」って全然違うと思うけど？"
70013020-8 = "えっ……。"
70013020-9 = "ま、まさか！すごく密接なつながりがあるわ！"
70013020-10 = "自由を求めて家出した猫を、主人のもとに連れ戻したのよ？"
70013020-11 = "猫の自由を奪ってやったんだから、かなりの悪党でしょう？"
70013020-16 = "くふふっ、そうかな～？"
70013020-17 = "はあ……。社長がそう言うなら、そうなんでしょ。"
70013020-18 = "ねえ、カヨコちゃん。あの猫、どうして自分で下りられないトコに行ったんだろ？"
70013020-19 = "危ないってことぐらい、分かってるはずなのに。"
70013020-20 = "……どうして私に聞くの？"
70013020-21 = "ん～、カヨコちゃんだったら知ってそうだから？"
70013020-22 = "……。"
70013020-23 = "どうせ他の猫か犬に追いかけられて、気付かないうちに上っちゃったんじゃない？"
70013020-24 = "必死になりすぎて、まともな判断ができなかったんだよ。"
70013020-25 = "私たちにもあるでしょ？"
70013020-26 = "逃げるのに夢中で行ってはいけない方へ……。"
70013020-27 = "気付いたら戻れなくなってるってこと。"
70013020-28 = "そういう人たち、たくさん見てきたし。"
70013020-29 = "おお～、さすがカヨコちゃん。真面目に答えてくれちゃって～"
70013020-30 = "……そうだね。どうしたんだろ。"
70013020-32 = "ふふふっ。とにかく一稼ぎしたんだし、ラーメンでも食べにいきましょう。"
70013020-33 = "今日は、大盛りでもオッケーよ！"
70013020-34 = "わ～お！アルちゃんの奢り？じゃあ、チャーシュー追加もオッケー？"
70013020-35 = "も、もちろんよ！私が目指してるのは、福利厚生も手厚い会社なんだから！"
70013020-36 = "……それって、ハードボイルドとはかけ離れてるんじゃない？"
70013020-37 = "いいから、奢るって言った時は黙って食べなさい！"
70013020-48 = "あれ？「雑草ちゃん」じゃ～ん。"
70013020-49 = "雑草ちゃん？"
70013020-50 = "うん。いーっつも雑草の面倒みてるから、雑草ちゃん。"
70013020-51 = "本当の名前は？"
70013020-52 = "分かんない。#n話しかけても、答えてくれないし？"
70013020-53 = "ふぅん……変わった子ね。"
70013020-58 = "……えへ、えへへ。"
70013020-59 = "……えへ、えへへ。"
70013020-60 = "昨日よりちょっと大きくなりましたね。葉っぱも元気いっぱいで……。"
70013020-61 = "今日は水をあげに来ましたよ。そろそろ喉が渇くかと思って……。"
70013020-65 = "……えへ……えへへへ。"
70013020-73 = "一日中姿が見えないと思ったら、こんなとこに隠れてたんだ？"
70013020-75 = "ち、違います！隠れてなんかいません……！"
70013020-76 = "じゃあ、なんでこんな暗いとこにいんだ？"
70013020-77 = "そ、それはこの子のために……。"
70013020-78 = "ん？まさか今、雑草を「この子」って呼んだ？"
70013020-80 = "ウケる～この子って何だよ！"
70013020-81 = "ふざけてないで、さっさとお金持ってきなよ！"
70013020-82 = "あ、この雑草汚いからお掃除しておいて。"
70013020-83 = "あ、ああ……！"
70013020-84 = "す、すみません！どうか……！！"
70013020-95 = "や、やめてください！い、いっそ私を……！踏みつけてください……！"
70013020-96 = "そんなに言うなら、お望みどおりにしてやるよ！"
70013020-97 = "きゃはっははははは……！！"
70013020-103 = "これでよく分かったでしょう？#n逆らってもムダなのよ。"
70013020-104 = "分かったら早くお金を持ってきて。"
70013020-105 = "次はその顔ーー"
70013020-113 = "な、なんだ！どこのどいつが……！"
70013020-117 = "……。"
70013020-119 = "お前……！今、誰を撃ったか分かってんのか！？"
70013020-121 = "誰かしら。"
70013020-122 = "まあ、大した人じゃないんでしょうけど。"
70013020-123 = "こんな所で弱い者いじめをしているくらいだもの、ね。"
70013020-125 = "こ、こいつ……！！"
70013020-130 = "へぇ、やる気満々じゃん？頭数もこっちが多いのに。"
70013020-135 = "……。"
70013020-137 = "（あ、あいつの目……ヤバ……！）"
70013020-138 = "い、行くぞ！"
70013020-139 = "お、覚えとけよ……！"
70013020-146 = "ねぇ、大丈夫？"
70013020-147 = "……。"
70013020-153 = "この子の大事な草が……めちゃくちゃに……。"
70013020-155 = "……。"
70013020-156 = "も、もう大丈夫よ！あの連中は私たちが追っ払ってあげたから。"
70013020-157 = "大丈夫じゃ……ないです。"
70013020-158 = "きっと……また来るだろうから……。"
70013020-159 = "……ごめんなさい。本当にごめんなさい……。"
70013020-163 = "守って……あげられませんでしたね……。"
70013020-165 = "……。"
70013020-166 = "あの連中に付きまとわれてるんでしょう？"
70013020-167 = "私たちが解決してあげるわ。あなた、名前は？"
70013020-171 = "……すみません。言うことはできません。"
70013020-172 = "何も知ろうとしないでください。"
70013020-173 = "私なんかと関わったら……皆さんも無事では済まないでしょうから。"
70013020-175 = "どうしてそんなこと……。"
70013020-176 = "……いったん、戻ろう。"
70013020-177 = "あの子、今説得できる状態じゃない。"
70013020-178 = "下手に追っても……逃げていくだけだよ。"
70013020-179 = "……。"
70013020-180 = "分かったわ。とりあえず引き下がりましょう。"
70013020-182 = "……。"
70013020-183 = "じゃあ、あとでね～雑草ちゃん！"
70013020-184 = "雑草……ちゃん？"
70013020-185 = "あ……ご、ごめーん！つい……。"
70013020-186 = "面倒見てた草がこんなことになっちゃったのに……本当にごめんね！"
70013020-187 = "……。"
70013020-188 = "……いいえ、気にしないでください。"
70013020-189 = "どうせ私は雑草みたいなもんですから……。えへへ……。"
70013020-190 = "私にはぴったりのあだ名……。"
70013020-191 = "えへへへ……。"
70013020-195 = "う……やっちゃったぁ。"
70013020-197 = "……やっぱり放っておけないわ。"
70013020-198 = "タダ働きするの？"
70013020-199 = "た、タダ働きじゃないわよ！"
70013020-200 = "うちのテリトリーでスケバンが暴れてるのが気に入らないだけ。#nこんなの、仕事の内にも入らないわ。"
70013020-201 = "はいはい。そういうことにしとくよ。"
70013020-202 = "けどさーアルちゃん。名前も知らない子をどうやって助けるの？"
70013020-206 = "そ、それは……。"
70013020-207 = "……当てがある。ついてきて。"
70013020-214 = "しばらくの間、カヨコの情報収集が続いた。"
70013020-215 = "そして――"
70013020-217 = "二人とも、こっち。大体のことは分かったよ。"
70013020-221 = "おお～さすがカヨコちゃん。なになにー？早く教えて！"
70013020-222 = "あの子をいじめてた連中、やっぱりただのスケバンじゃない。"
70013020-223 = "マフィアとつながってた。"
70013020-224 = "スケバンが……マフィアと？"
70013020-225 = "うん。マフィアがスケバンを使って、生徒たちから金を巻き上げてたみたい。"
70013020-226 = "あの連中は下っ端の下っ端だから、倒しても意味がないの。"
70013020-227 = "マフィアの方をどうにかしないと。"
70013020-228 = "ふぅ～ん、思ったより深刻だね？"
70013020-229 = "それで、どこの組織なの？"
70013020-230 = "組織の名前は――"
70013020-232 = "リガトーニ・ファミリー。"
