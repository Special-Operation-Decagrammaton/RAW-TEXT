[translation]
10028035-5 = "วะฮ่าฮ่าฮ่า~!"
10028035-6 = "คนคนนี้ไม่ธรรมดาเลยนะเนี่ย~!!"
10028035-7 = "ฉันได้เห็นคุณครูเมื่อคราวก่อนแล้วก็คิดว่า 'คงจะเป็นคนแบบนั้นสินะ~'..."
10028035-12 = "แต่พอได้เห็นการสั่งการวันนี้ คุณครูเป็นผู้สั่งการที่เยี่ยมยอดกว่าที่คิดเยอะเลย! สงสัยต้องขอโทษคุณครูแล้วละ!!"
10028035-13 = "แล้วก็การที่ฉันไปเรียกเธอว่าคุณหนูน่ารักบ้างอะไรบ้าง เธอคงไม่ชอบใจใช่มั้ยล่ะ? ดูจากการต่อสู้แล้วมันไม่ใช่คุณหนูเลยนะ!"
10028035-14 = "...แต่..."
10028035-15 = "แต่ก็ยังเรียกเหมือนเดิมอยู่เลยนะคะ..."
10028035-16 = "เอาเถอะๆ! บอกแล้วไงว่าไม่ต้องไปคิดเรื่องหยุมหยิมหรอก! ใช่มั้ย?"
10028035-20 = "แต่ยังไงสองคนนี้ก็เหนื่อยเพื่อฉันขนาดนี้ ฉันคงต้องทำอะไรเป็นการตอบแทนแล้วละ"
10028035-23 = "ตอนนี้ตู้รถไฟที่ทั้งสองคน... ไม่สิ ตู้รถไฟที่ 'พวกเรา' โดยสารกันอยู่! เดิมทีแล้วเป็นตู้ที่อยู่ 'รองบ๊วย' ของขบวน"
10028035-24 = "แล้วก็ตู้... เรียกว่าตู้สินค้าหรือเปล่านะ? เอาเถอะ ตู้นั้นจะอยู่ข้างหน้าขบวน ถัดจากหัวรถจักรและที่นั่ง#nคนขับมา"
10028035-25 = "ฉันเก็บข้อมูลจากสถานการณ์ต่างๆ และจากที่คนพวกนั้นพูดกันแล้วก็เอามาประมวลผลดูน่ะ เรื่องแบบนี้ฉันหัวไวอย่าบอกใครเลย"
10028035-26 = "ไม่ว่าเราจะหยุดรถไฟหรือจะหากระเป๋า ไม่ว่าจะทำอะไรก็ตาม... ก่อนอื่นก็ต้อง!"
10028035-27 = "ไปที่ตู้รถไฟที่อยู่หัวขบวนด้วยกันก่อน!"
10028035-28 = "ถ้าเป็นตามแผนการเดิมแล้ว ตอนที่ฉันแยกตู้รถไฟคุ้มกันออกจากรถไฟไม่สำเร็จ ฉันจะต้องใช้แผน B ทันที..."
10028035-29 = "โดยการระเบิดรถไฟให้พลิกคว่ำในจุดที่กำหนดไว้ จากนั้นก็ใช้โอกาสตอนที่ทุกคนชุลมุนกัน แอบติดต่อกับสมาชิกคนอื่นแล้วก็หนีไป..."
10028035-30 = "[s] \"ทำให้... รถไฟพลิกคว่ำ...\""
10028035-34 = "[ns1] \"...เมื่อกี้เธอพูดว่าอะไรนะ?\"\n[ns2] \"นี่น่ะเหรอการ 'หยุด' รถไฟที่ว่า!?\""
10028035-37 = "วะฮ่าฮ่าฮ่าฮ่าฮ่า!! อย่ามองกันด้วยสีหน้าแบบนั้นสิ~"
10028035-38 = "ไม่ต้องกังวลหรอกน่า ตราบใดที่ฉันยังอยู่ดี เรื่องแบบนั้นไม่มีวันเกิดขึ้นแน่ ตราบใดที่ฉันยังอยู่ดีน่ะ!"
10028035-39 = "ถึงตอนนี้จะอยู่บนรถไฟก็เถอะ แต่ก็คงต้องบอกว่าเราลงเรือลำเดียวกันแล้ว คิดว่าฉันจะทรยศพันธมิตร#nได้ลงคองั้นเหรอ?"
10028035-40 = "พวกเธอต้องหาของให้เจอใช่มั้ยล่ะ? แล้วก็ห้ามให้มันแตกหรือพังด้วย?"
10028035-41 = "ถ้างั้นเราก็ทำให้รถไฟคว่ำไม่ได้น่ะสิ อีกอย่างคุณครูก็อยู่กับเราด้วย ยิ่งทำแบบนั้นไม่ได้เข้าไปใหญ่เลย"
10028035-42 = "ที่ฉันจะบอกก็คือ ถึงมันจะยุ่งยากนิดหน่อย แต่ตอนนี้เราก็ไม่มีทางเลือกอื่นนอกจากจะทำให้รถไฟ#n'หยุด' ด้วยตัวเอง~"
10028035-43 = "และยิ่งเป็นฉันที่มีคนหมายหัวกันตั้งมากมายแล้วด้วย..."
10028035-44 = "...เรื่อง 'การรักษาสัญญา' กับ 'เครดิต' ก็ยิ่งเป็นเรื่องสำคัญ "
10028035-45 = "ฉันจะได้ทำเรื่องนี้ต่อได้ไง ...หรือว่าไม่ใช่?"
10028035-46 = "แต่ก็... ต้องบอกว่ายังโชคดีละนะ..."
10028035-53 = "เพราะคุณหนูคนนี้... ถือว่าเป็นเด็กทรีนิตี้ที่ไม่ธรรมดาเลย"
10028035-58 = "[ns3] \"ระ... เราต้องไปหากระเป๋า!\"\n[ns4] \"ส่วนคำชมจากคาสุมิ! ก็ไม่ต้องคิดมากนะอิจิกะ!\""
10028035-61 = "แหะๆ... แหะๆๆๆๆ..."
10028035-62 = "...หืม? ฉันพูดอะไรผิดอีกแล้วเหรอ? ทำไมสีหน้าดูไม่ค่อยดีเลย?"
10028035-63 = "ว่าแต่มันเป็นเรื่องไม่ดีหรอกเหรอ? แต่เวลาพูดเธอก็เอาแต่ทำตาสระอิแบบนั้นตลอด ฉันจะไปรู้ได้ยังไง#nล่ะว่ารู้สึกยังไง ขอโทษนะ ขอโทษที! วะฮ่าฮ่าฮ่า!"
10028035-64 = "ไม่รู้หรอกนะว่าตัวเองทำอะไรผิดไป แต่ฉันขอโทษก็แล้วกัน! แค่นี้ก็จบเรื่องแล้วใช่มั้ย?"
10028035-65 = "........."
10028035-66 = ".................."
10028035-67 = "เย้~! ดีละ ดีมาก! กำลังอดทนให้กันอยู่สินะ!!"
10028035-68 = "ยอดเยี่ยมไปเลย! ต่อไปก็รบกวนด้วยนะ~"
10028035-69 = "...แหะ...แหะ..."
10028035-70 = "ก็ได้ค่ะ งั้นก่อนอื่น... เราต้องไปหากระเป๋าก่อน..."
10028035-71 = "แหะๆ..."
10028035-72 = "[s5] \"......\"\n[s6] \"ไว้ครูจะซื้อของอร่อยๆ ให้กินนะ...\""
10028035-75 = "เอาละ~ ไม่มีเวลาแล้ว!! ถ้างั้นก็ไปกันเลย!!"
10028035-76 = "ยังไงก็มีผู้โดยสารคนอื่นที่หัวร้อนเพราะรถไฟเปลี่ยนการเดินรถแบบไม่หยุดให้ลงทุกสถานีอยู่แล้ว! ถ้าเราไปด้วยกันก็ไม่น่าจะมีอะไรที่ทำไม่ได้หรอก!"
10028035-77 = "เอาละ! ลุยให้สุดเลย!! ถ้าไม่ไปให้สุด ก็ถือว่าที่ทำมาไร้ความหมาย!!"
10028035-78 = "จากท้ายขบวน~!"
10028035-79 = "ไปหัวขบวนกัน~!!"
