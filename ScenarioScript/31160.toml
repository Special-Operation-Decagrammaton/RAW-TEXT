[translation]
31160-1 = "ตอนที่ 16;โอกาสเล็กๆ"
31160-2 = "ฮื้มม สดชื่นจังเลยค่ะ!"
31160-3 = "อาบน้ำแต่เช้าเลยนะ ฮิฟุมิ"
31160-4 = "อุฮุฮุ ก็เพราะวันนี้ฮิฟุมิจังไม่ได้อาบน้ำมาทั้งวัน..."
31160-5 = "อะ... อ่า! อย่าพูดอะไรน่าอายแบบนั้นสิคะ... ฉันก็แค่นอนตื่นสาย... "
31160-6 = "เพราะเตรียมข้อสอบให้พวกเราถึงดึกดื่นไงล่ะ"
31160-7 = "น่าละอายจัง ถ้าพรุ่งนี้ตื่นเช้าไม่ไหวก็บอกนะฮิฟุมิ ฉันจะช่วยอาบน้ำให้เอง"
31160-8 = "คะ? คะ? มะ... ไม่เป็นไรค่ะอาซึสะจัง...!!"
31160-9 = "ปล่อยให้อาบคนเดียวเถอะ! ไม่ใช่เด็กน้อยสักหน่อย!"
31160-10 = "ฉันแค่หาวิธีเพิ่มประสิทธิภาพน่ะ การอาบน้ำด้วยกันหลายๆ คนก็มีข้อดีหลายอย่างด้วย#nแถมยังประหยัดน้ำได้อีก"
31160-11 = "อุ๊ย... จริงด้วยนะคะ พวกเราไม่มีอ่างอาบน้ำขนาดใหญ่ ก็เลยเหมือนไม่ได้มีโอกาส#nอาบน้ำด้วยกันเลย..."
31160-12 = "งั้นคราวหน้าเราลงสระว่ายน้ำด้วยกันแทนไหมคะ เอาแบบตัวเปล่าเลย?#nใช้สระว่ายน้ำแทนอ่างอาบน้ำยังไงล่ะคะ!"
31160-13 = "คิดจะทำบ้าอะไรน่ะ!? ห้ามเด็ดขาด! ห้ามเด็ดขาด!!!"
31160-14 = "ฉันไม่ติดอะไรหรอกนะ แต่ที่นั่นมีอะไรพิเศษงั้นเหรอ?#nเดิมทีการไปอาบน้ำในสระว่ายน้ำเป็นเรื่องต้องห้ามนี่นา?"
31160-15 = "หืม? ก็จะได้รู้สึกถึงความเป็นอิสระไงคะ แค่คิดก็สนุกแล้ว... ฮุฮุฮุ♡"
31160-16 = "อ่อ... เรื่องความสนุกสินะ... ไม่ได้คิดถึงเรื่องนี้เลย อืม... ความรู้สึกเป็นอิสระ..."
31160-21 = "มะ.. ไม่ใช่นะ! หยุดเลย! ห้ามแม้แต่จะคิดด้วย!! หยุดเลย! หยุดความคิดในหัวนะ!!"
31160-26 = "อย่าทำให้คนอื่นพลอยคิดอะไรแผลงๆ ไปด้วยสิ! ในทรีนิตี้น่ะให้มีโรคจิตแบบเธอคนเดียวก็พอแล้ว!!"
31160-27 = "โอ๊ะ? โคฮารุจังเป็นพวกว่ายน้ำโดยไม่ใส่อะไรเลยนี่นา น่าจะเข้าใจความรู้สึกดีนะคะ?"
31160-28 = "ไม่มีพวกอะไรแบบนั้นสักหน่อย!!  ลงสระว่ายน้ำก็ต้องใส่ชุดว่ายน้ำสิ! นี่คือกฎที่ยุติธรรม!#nถ้าไม่ทำตามก็ต้องถูกลงโทษ! ลงโทษสถานเดียว!"
31160-29 = "อืม... ถ้างั้น..."
31160-34 = "(กระซิบ) บิกินีที่ฉันใส่ที่สระว่ายน้ำเมื่อวานนี้... "
31160-35 = "หะ... หืม? ทำไมเหรอ?"
31160-41 = "ชุดนั้นมัน[wa:1800]คือ[wa:1830] [ruby=.]ชุด[/ruby][wa:660] [ruby=.]ว่าย[/ruby][wa:800] [ruby=.]น้ำ[/ruby][wa:1100] จริงๆ หรือเปล่าน้า? "
31160-42 = "?!"
31160-43 = "ถ้าไม่ใช่ชุดว่ายน้ำ… งั้นก็...?"
31160-45 = "ชุดชั้นในสมัยนี้มีหลายแบบเลย มีทั้งแบบที่แค่มองผ่านๆ ก็อาจจะเข้าใจผิดว่าเป็นชุดว่ายน้ำ#nได้ด้วยนะคะ♡"
31160-46 = "......?! ......?!!"
31160-47 = "มะ... มันคืออะไรกันน่ะ?!  ถ้าชุดนั้นไม่ใช่ชุดว่ายน้ำ?!  ยะ... อย่าบอกนะว่า..."
31160-48 = "โอ๊ะ ทำไมถึงกระสับกระส่ายแบบนั้นล่ะคะ?"
31160-49 = "ถึงจะบอกว่านั่นไม่ใช่ชุดว่ายน้ำ แต่ก็ไม่มีอะไรต่างจากเดิมนี่คะ? หืม? ใช่ไหมโคฮารุจัง? "
31160-50 = "หะ... หืม?"
31160-51 = "เดิมทีแล้ว... ความแตกต่างระหว่างชุดว่ายน้ำกับชุดชั้นในคืออะไรเหรอ? การกันน้ำ?#nปกป้องร่างกาย? ดีไซน์? หรือความมากน้อยในการปกปิดเนื้อหนัง?"
31160-52 = "ถ้าดูจากภายนอกก็ไม่เห็นจะมีความแตกต่างเลยว่าไหมคะ?#nตอนนั้นทุกคนก็เลยเชื่อฉันว่ามันคือ <ชุดว่ายน้ำ>"
31160-53 = "...?!"
31160-54 = "ถ้าฉันบอกว่าจริงๆ แล้วสิ่งที่ใส่ตอนนั้นคือกางเกงชั้นใน แล้วจะพิสูจน์ยังไงล่ะคะ?"
31160-55 = "ไม่มีอะไรไร้ประโยชน์ไปกว่าความจริงที่พิสูจน์ไม่ได้หรอกค่ะ ว่าไหม?"
31160-56 = "พูดอะไรไม่เห็นเข้าใจเลย... ตกลงมันคืออะไรกันแน่?! "
31160-57 = "ฮุฮุฮุ มันคือชุดว่ายน้ำค่ะ ขอโทษนะคะ พอแกล้งเล่นแล้วสนุกดีก็เลย..."
31160-58 = "กะ...แกล้งเล่นงั้นเหรอ?!!!"
31160-59 = "อืม ไม่หรอก สิ่งที่ฮานาโกะพูดคือกฎโบราณข้อที่ 5 น่ะ"
31160-60 = "...?!"
31160-61 = "กะ... กฎ? อะไรข้อที่ 5 นะคะอาซึสะจัง?"
31160-62 = "…"
31160-66 = "กฎโบราณทั้ง 7 ข้อในคิโวทอส ฉันได้ยินเรื่องนี้มาจากบางคนน่ะ และข้อที่ 5 ที่ว่า น่าจะเป็น..."
31160-67 = "\"เราจะพิสูจน์ความจริงของคนที่มาถึงสวรรค์ได้หรือไม่?\" ฉันจำได้ประมาณนี้ แต่ก็ไม่รู้ว่าข้ออื่นๆ#nที่เหลือคืออะไรหรอกนะ"
31160-68 = "สรุปแล้วมันก็แค่การพูดคุยกันน่ะว่า \"สวรรค์ที่ไม่มีใครสามารถพิสูจน์ได้มันจะมีอยู่จริงหรือเปล่า\""
31160-69 = "อาซึสะจัง... รู้เรื่องนี้ได้ยังไง... "
31160-70 = "ทำไมถึงรู้เรื่องนี้ล่ะ..."
31160-71 = "อาซึสะจัง...! เคยเจอกับเซอาจังเหรอคะ?"
31160-72 = "…"
31160-74 = "เซอา...?"
31160-75 = "หมายถึงคุณเซอาในสภาน้ำชาเหรอ...?"
31160-76 = "…"
31160-77 = "ไม่เคยหรอก ฉันไม่รู้ด้วยว่าคือใคร ก็แค่ไปได้ยินจากที่ไหนมาน่ะ"
31160-78 = "…"
31160-79 = "อะ... อ่า... ใช่ค่ะ ก็อาซึสะจังย้ายโรงเรียนมานี่นา... ถ้าไม่ใช่ทรีนิตี้ล่ะก็..."
31160-80 = "Vanitas Vanitatum... วิทยาเขตย่อยนั้น..."
31160-84 = "อื้ม... ไม่มีอะไรหรอกค่ะ มืดแล้วเหรอเนี่ย สงสัยต้องไปเข้านอนแล้วล่ะค่ะ"
31160-88 = "ขอบคุณทุกคนที่พยายามกันในวันนี้นะคะ!"
31160-91 = "ห้องส่วนตัวของคุณครู"
31160-93 = "(กลางดึกคืนนั้น)"
31160-94 = "ใช่ค่ะ... สิ่งนี้ทำให้ชัดเจนขึ้นแล้วค่ะคุณครู"
31160-95 = "... ฮานาโกะจังเค้า..."
31160-96 = "[s] \"........\""
31160-97 = "ฉันพบความจริงนี้ระหว่างที่เช็กคำตอบที่ถูกต้องของปีก่อนเพื่อเตรียมข้อสอบเสมือนจริง"
31160-98 = "คำตอบที่ถูกต้องทั้งหมดของชั้นปีที่ 1 ถึง 3 เป็นกระดาษคำตอบของคนคนเดียวกันค่ะ"
31160-99 = "[s] \"และคนคนนั้นก็คือ...\""
31160-102 = "ใช่ค่ะ... เป็นของฮานาโกะจังค่ะ"
31160-104 = "... ฉันเผลอไปดูคะแนนสอบของฮานาโกะจังโดยไม่ได้ตั้งใจ..."
31160-105 = "เมื่อปีก่อน ฮานาโกะจังเป็นหนึ่งในนักเรียนอัจฉริยะชั้นปีที่ 1 ที่ได้คะแนนเต็ม#nจากหลักสูตรเรียนรู้เชิงลึกที่เด็กปี 3 เองก็ยังผ่านได้ลำบากมากๆ..."
31160-106 = "และเมื่อขึ้นมาอยู่ชั้นปีที่ 2 ฮานาโกะจังก็คะแนนสอบลดฮวบ..."
31160-107 = "[s] \"ถ้างั้นฮานาโกะก็...\""
31160-108 = "ค่ะ ฮานาโกะจังตั้งใจทำข้อสอบให้ออกมาคะแนนไม่ดีค่ะ"
31160-109 = "ฮานาโกะจัง... ทำไมถึงได้..."
31160-111 = "ล็อบบี้กลาง อาคารย่อย"
31160-116 = "..."
31160-123 = "..."
31160-124 = "อาซึสะจัง... จะออกไปเฝ้ายามอีกเหรอคะ?"
31160-125 = "..."
31160-129 = "ฮ้าวววว..."
31160-130 = "อรุณสวัสดิ์ค่ะ"
31160-133 = "(แกรกๆ)"
31160-134 = "..."
31160-135 = "อื้มม..."
31160-136 = "(จะว่าไป... เราไม่เห็นคุณครูตั้งแต่เช้าเลย...)"
31160-137 = "(ไปไหนของเขานะ...)"
31160-139 = "สระว่ายน้ำอาคารย่อย"
31160-140 = "ว้าว น้ำเต็มสระเลย"
31160-141 = "ฮิฮิ ไม่ได้เห็นน้ำเต็มสระแบบนี้มานานแล้วนะ จะว่ายน้ำเหรอคุณครู? หรือว่าจัดปาร์ตี้ริมสระน่ะ?"
31160-142 = "[s] \"เรียกมามีอะไรเหรอ?\""
31160-143 = "แหะๆๆ... อื้ม"
31160-149 = "ก็แค่สงสัยน่ะว่าคุณครูสบายดีอยู่หรือเปล่าน่ะ"
31160-151 = "ตอนต่อไป;คนทรยศในทรีนิตี้"
