[translation]
90002090-1 = "Episode 9;Dress Up"
90002090-6 = "Did I make you wait long, Sensei?"
90002090-7 = "[s] \"Midori...?\""
90002090-8 = "What's wrong...?"
90002090-9 = "[s] \"You're incredibly cute...!\""
90002090-10 = "Eheehee. Thank you. I'm glad..."
90002090-15 = "We followed Aris's example and armed ourselves with new clothes and weapons."
90002090-16 = "And Midori...provided particularly inspired designs."
90002090-17 = "[s1] \"Everyone's ready?\"\n[s2] \"All 8 of us?\""
90002090-20 = "Yes."
90002090-21 = "It was no problem."
90002090-22 = "And clearly...Midori had an \"aesthetic\" in mind."
90002090-23 = "Toki and I reviewed the practicalities, naturally."
90002090-24 = "Yes. Thanks to Kei, it was quite easy."
90002090-25 = "Hold on, Midori...if I may add a thought?"
90002090-26 = "Why...do we look like astronauts?"
90002090-28 = "It's quite practical."
90002090-30 = "But appearances matter? Cuteness!"
90002090-31 = "I just tried to make it safe. You are well-protected."
90002090-32 = "I-I appreciate that, but..."
90002090-33 = "But still, you know? Maybe a little more style?"
90002090-34 = "[s] \"I think you two look cool!\""
90002090-35 = "Huh? Y-You think so? If Sensei says so... Eheehee..."
90002090-37 = "Anyway, you two are protected. That is what matters."
90002090-38 = "Statistically, you will survive over all of us. You can clean up the mess we leave."
90002090-39 = "K-Kei?! Can you PLEASE not say things like that?"
90002090-40 = "Midori, I was just kidding. Let it go."
90002090-41 = "And...next up..."
90002090-45 = "Hello, Sensei. Asuma Toki is reporting, as well. I am in a more optimized, lightweight form. See?"
90002090-46 = "...Seriously, can you PLEASE be normal?"
90002090-47 = "NO. I have a new outfit. It looks good. Observe."
90002090-48 = "But not everyone feels that way? You just heard?"
90002090-49 = "But I look good."
90002090-50 = "Okay, okay. I get it..."
90002090-51 = "[s] \"I see. You gave Abi-Eshuh to Aris...\""
90002090-52 = "Yes. So I have changed myself into a mobile recon unit."
90002090-53 = "Unlike my standard maid uniform, this one efficiently retains my body temperature."
90002090-57 = "[ns] \"...Were you cold all this time?\""
90002090-58 = "Yes."
90002090-59 = "[s] \"And you kept wearing that outfit?\""
90002090-60 = "Yes."
90002090-61 = "Why's that, you ask?"
90002090-62 = "..."
90002090-63 = "Sensei. There are times when one must endure. I will not allow myself to succumb to the cold."
90002090-64 = "Why's that again, you ask?"
90002090-66 = "Because I can't lose to Eimi."
90002090-67 = "[s] \"I don't understand your answer at all, Toki...\""
90002090-68 = "It's okay. I understand it. That is what matters."
90002090-73 = "T-Toki..."
90002090-74 = "*sigh*..."
90002090-75 = "Let us continue. Please observe that the primary weapons are a pair of energy pistols. When the battery cell depletes, it will eject backward. It is quite striking."
90002090-76 = "I thought it looked cool! I figured Toki's signature colors should be white and blue!"
90002090-77 = "And when I remove this white jacket, you will be able to observe my exceptional figure. Would you like to see it?"
90002090-78 = "What?!"
90002090-79 = "[s] \"No! I don't think this is the time.\""
90002090-80 = "I see. Then I will save it for later for our special time just between us."
90002090-81 = "Toki?!?!"
90002090-82 = "Midori, while I understand, stop giving her a reaction. We don't have time."
90002090-83 = "And you, Eimi. What? Is the heat getting to you?"
90002090-84 = "Try to hang on. One day, I would like to analyze you, from an engineering perspective. You are quite unique."
90002090-90 = "Phew..."
90002090-91 = "Eimi?! Weren't you wearing a cape?"
90002090-92 = "Oh, that? I...took it off. I was hot."
90002090-93 = "I mean, that's understandable...."
90002090-94 = "But Eimi, doesn't the cape help with camouflage? You're our rear support."
90002090-95 = "I felt like it would give me heatstroke, to be frank."
90002090-96 = "And...that wouldn't help. You don't want your marksman passing out, right?"
90002090-98 = "Oh... Well... I figured you could tie the cape around your waist? You don't have to wear it."
90002090-100 = "Thank you, Midori. Your thoughtfulness saved me."
90002090-101 = "..."
90002090-102 = "Yeah... That's my oversight... I should have considered."
90002090-103 = "And like Toki, we replaced your weapon, Eimi... It utilizes a battery cell."
90002090-104 = "Although...the battery size and output are drastically different."
90002090-105 = "The visor, furthermore, will help you target critical points. That consumes significant battery power..."
90002090-106 = "And your battery backpack is much larger than Toki's.."
90002090-108 = "What do you think, Sensei?"
90002090-109 = "It looks efficient? Mm..."
90002090-110 = "..."
90002090-111 = "[s] \"What's wrong, Eimi?\""
90002090-112 = "Don't mind me. I suppose it's strange. I would normally take the compliment."
90002090-113 = "But I wanted to hear something different."
90002090-114 = "What did I want to hear? I suppose..."
90002090-118 = "..."
90002090-119 = "That I look pretty...perhaps?"
90002090-121 = "?!"
90002090-122 = "?!"
90002090-127 = "[ns] \"Yeah. You look really pretty.\""
90002090-128 = "Yeah?"
90002090-129 = "Thank you, Sensei."
90002090-131 = "Midori. What was that about?"
90002090-132 = "Kei! Let it go!"
90002090-133 = "I know. I know. But..."
90002090-137 = "..."
90002090-138 = "Ugh. Look. Everyone, stop. And I can tell you're excited, so come out with it."
90002090-141 = "What do you think of my new suit, Sensei?"
90002090-142 = "[s] \"Um... Not to be rude, but...?\""
90002090-143 = "Hm?"
90002090-144 = "[s] \"Aren't you...cold?\""
90002090-145 = "Oh my. How curious. And here I was pondering what you'd say."
90002090-146 = "As you know, I'm a delicate, intelligent, elegant, super-genius hacker. I considered the environmental possibilities."
90002090-147 = "This suit resists the cold, the water, and is entirely adaptable in ways I suppose you can't fathom."
90002090-151 = "[ns3] \"Delicate...\"\n[ns4] \"Elegant...\""
90002090-157 = "...Look, I think we've all been thinking... Do you have no shame?!"
90002090-158 = "Kei... Isn't stating facts an essential part of the scientific method?"
90002090-159 = "Stating facts... All right. Good point."
90002090-160 = "Much like wearing pure white represents my absolute purity..."
90002090-161 = "*sob*"
90002090-162 = "[s] \"Himari? What's wrong...?\""
90002090-163 = "Oh... Sensei. I've been taken by my beauty and cuteness that I am driven to tears."
90002090-164 = "I'm sorry, Sensei. Let me take care of President Himari. She's forgotten herself."
90002090-169 = "Eimi? Eimi?! I have more to say!"
90002090-172 = "[ns] \"The moment has passed...\""
90002090-173 = "Quite literally..."
90002090-174 = "(I-I must change the topic! Um...!)"
90002090-178 = "Rio? Please come out! Hurry!"
90002090-185 = "[ns] \"Rio...?\""
90002090-186 = "What's wrong, Sensei?"
90002090-187 = "[s] \"I mean, well...\""
90002090-188 = "I don't know why you're reacting that way, but this is how it is."
90002090-189 = "On-site response, facility utilization, situation analysis... I am wearing a suit for the occasion."
90002090-190 = "It was a practical solution."
90002090-191 = "...I thought I should contrast with President Himari, though I lack an explanation..."
90002090-192 = "Midori... I think there's an issue with your design approach."
90002090-193 = "President. Please control yourself. I'd hate to push you back inside the ship."
90002090-194 = "Ugh..."
90002090-195 = "It was a moment of pride! As a designer!"
90002090-197 = "I have nothing to apologize for! She looks good!"
90002090-202 = "Very well. No comment."
90002090-203 = "Rio's suit was designed to provide exceptional defense and electronic counter measures."
90002090-204 = "She will provide technical support on-site, as opposed to Himari."
90002090-205 = "[s] \"Rio? Isn't that dangerous?\""
90002090-206 = "It was the most rational decision."
90002090-207 = "This is the Steel Continent, and we must prepare for on-the-fly tech warfare."
90002090-208 = "[s5] \"Okay. I see.\"\n[s6] \"Please take care, Rio.\""
90002090-211 = "Sure. "
90002090-212 = "Leave it to me, Sensei."
90002090-213 = "And next..."
90002090-219 = "Yuzu?"
90002090-220 = "...Come out, Yuzu. You've taken us all this way..."
90002090-221 = "Yuzu? Are you all right?"
90002090-229 = "Ugh..."
90002090-230 = "[s] \"Huh? Your outfit isn't like the twins'...\""
90002090-231 = "W-Well..."
90002090-232 = "I asked for it."
90002090-233 = "Yeah. Initially, I said we should wear the same..."
90002090-234 = "[s] \"But?\""
90002090-235 = "..."
90002090-236 = "Is it okay if I don't explain?"
90002090-237 = "We're in the Steel Continent... We could be wiretapped and must be careful."
90002090-238 = "I asked for Yuzu's suit to be like this for a reason. Please trust that."
90002090-239 = "[s] \"You're hiding your reasons from your allies?\""
90002090-240 = "...Sorry. I know I shouldn't."
90002090-241 = "I trust you all, truly.. But.."
90002090-242 = "[s] \"It's okay. I'll believe in you, Rio.\""
90002090-243 = "R-Really...?"
90002090-245 = "You mean that, Sensei?"
90002090-246 = "You're right. Rio had \"good intentions\"... the whole time."
90002090-247 = "Well...perhaps..."
90002090-248 = "Yes! Absolutely! I agree!"
90002090-249 = "Aris?!"
90002090-250 = "Aris?!"
90002090-251 = "Aris...???"
90002090-256 = "..."
90002090-257 = "You trust me, after all this time...?"
90002090-258 = "Yes. Because I saw how hard you worked on Abi-Eshuh and Kei's gun!"
90002090-259 = "I believe you meant well! I see it!"
90002090-260 = "I helped too, you know?!"
90002090-261 = "That is true! Himari helped too!"
90002090-262 = "*sigh*...Very well. I'll let it slide just this once because you're so cute, Aris."
90002090-263 = "I added many surprises. I think you'll like them."
90002090-268 = "[ns] \"Speaking of which, Kei's gun?\""
90002090-269 = "Hm?"
90002090-270 = "Ah, yes. Well... It is what it is."
90002090-271 = "To be unarmed in Kivotos...it would essentially be running around naked."
90002090-272 = "It's \"Earendel: Luminous Nova.\" It's an energy weapon, like the others."
90002090-273 = "Ugh... I appreciate that...but is this outfit...me?"
90002090-274 = "Like, what am I even doing?"
90002090-275 = "[s7] \"Yuzu, you look fine.\"\n[s8] \"We...need you, Yuzu!\""
90002090-278 = "Wh-What?!"
90002090-279 = "W-Well..."
90002090-280 = "If you say so..."
90002090-281 = "Okay. I'll...do my best."
90002090-282 = "[s] \"Okay then, let's do a final check!\""
90002090-294 = "Um, Kei?"
90002090-295 = "What's wrong, Rio?"
90002090-296 = "There's something I wanted to tell you."
90002090-297 = "Why me? There's Sensei too."
90002090-298 = "Well."
90002090-299 = "To check..."
90002090-300 = "You...can conceal information from the Steel Continent and those three children. Is that right?"
90002090-301 = "..."
90002090-302 = "That's very astute. How did you know?"
90002090-303 = "They didn't know about you and Aris until we reached Tiphareth."
90002090-304 = "And that's why you believe you can tell me about your \"hidden ace\"?"
90002090-305 = "Very well. I can put up a firewall, but we'll only have about thirty seconds."
90002090-306 = "Right. That should be enough."
90002090-309 = "..."
90002090-310 = "..."
90002090-311 = "..."
90002090-312 = "Wh-What's wrong?"
90002090-313 = "Rio. You..."
90002090-314 = "H-Hm?"
90002090-315 = "You're not sane, are you...?"
90002090-316 = "I-Is that so...? But...anyone would...?"
90002090-317 = "No. It's strange. Overprepared, even."
90002090-318 = "...Still, given the situation, this particular instance could be seen as justified."
90002090-319 = "Even so... Honestly. My god."
90002090-320 = "Is it so strange...?"
90002090-321 = "In any other event, I'd think so."
90002090-322 = "But in this case..."
90002090-323 = "..."
90002090-324 = "I'm grateful for you, Rio. Please know that."
90002090-325 = "I-Is that so...?"
90002090-326 = "But I'm curious about Yuzu's suit. She will be fine? Like...this will work?"
90002090-327 = "Yes."
90002090-328 = "And, about that second stage..."
90002090-329 = "It should work. I ran the simulations. It should be easy."
90002090-330 = "Of course...I don't want to do it to her."
90002090-331 = "Yeah. The hidden ace. You never want to use it."
90002090-332 = "[s] \"Hm? A hidden ace?\""
90002090-333 = "S-Sensei?!?!"
90002090-334 = "This is, um, it's...!"
90002090-335 = "..."
90002090-336 = "We were talking about a surprise party? A \"hidden ace\" dish?"
90002090-337 = "[s] \"Surprise party?\""
90002090-338 = "Well."
90002090-339 = "We'll win, right? You know this."
90002090-340 = "[s] \"Ah. So that's what you were talking about?\""
90002090-341 = "Yes."
90002090-342 = "Isn't that right, Rio?"
90002090-343 = "..."
90002090-344 = "Yes. Precisely."
90002090-345 = "What is happening with Rio and Kei? I think I heard of a surprise party?"
90002090-346 = "Oh... Did I ruin it? We will celebrate after all this is over?"
90002090-347 = "I think it will be so fun, Sensei!"
90002090-348 = "[s9] \"Yeah! Me too!\"\n[s10] \"And...we'll all be safe and happy, right?\""
90002090-351 = "...Well, I suppose."
90002090-352 = "And to guarantee that, we'll need a more detailed plan."
90002090-353 = "Detailed plan?"
90002090-354 = "Yes. While I am confident that Sensei will help us conquer each prophet and occupy their territory..."
90002090-355 = "I believe we should prioritize Binah."
90002090-356 = "[s] \"Binah? Why?\""
90002090-357 = "Because we know Binah's location."
90002090-358 = "[s] \"I knew you could do it, Kei-Kei!\""
90002090-359 = "Do not call me Kei-Kei!"
90002090-360 = "Ahem... And there's another reason."
90002090-361 = "As I said, the Steel Continent is an integrated network..."
90002090-362 = "Binah possesses...a firewall."
90002090-363 = "We can break the security of the Continent's system by disabling it."
90002090-364 = "I believe that breaching it will reveal the location of the other prophets."
90002090-365 = "And...as Aris informed me, if I do not address this firewall..."
90002090-366 = "I believe the Steel Continent will continue to expand."
90002090-367 = "[s] \"I...see?\""
90002090-368 = "Kei's right. We require greater authority."
90002090-369 = "Binah should give us the security authority to hack the Steel Continent."
90002090-370 = "[s] \"I guess that settles it.\""
90002090-371 = "Yes, Sensei. We have our first target."
90002090-372 = "The self-proclaimed \"Contemplator of Disparity.\""
90002090-374 = "The third prophet of Decagrammaton, Binah."
90002090-376 = "Next Episode;000, 00, 0"
