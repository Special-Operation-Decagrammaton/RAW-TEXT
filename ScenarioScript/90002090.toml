[translation]
90002090-1 = "ตอนที่ 9;Dress Up"
90002090-6 = "รอนานเลยใช่มั้ยคะ คุณครู?"
90002090-7 = "[s] \"มิโดริ...?\""
90002090-8 = "ทำไมเหรอคะ...?"
90002090-9 = "[s] \"อยู่ในชุดนี้แล้วน่ารักมากเลย...!\""
90002090-10 = "แหะๆๆ ขอบคุณค่ะ โล่งอกไปทีนะคะ..."
90002090-15 = "ถ้าจะพูดตามอย่างอาริสึละก็ ต้องบอกว่าพวกเราสร้างชุดเกราะกับอาวุธกันขึ้นมาใหม่ค่ะ"
90002090-16 = "ชุดเกราะที่มิโดริใส่อยู่ตอนนี้ก็เป็นหนึ่งในนั้นค่ะ"
90002090-17 = "[s1] \"ทุกคนเลยเหรอ?\"\n[s2] \"ทั้งแปดคนเลยเหรอ?\""
90002090-20 = "ใช่ค่ะ"
90002090-21 = "ตราบใดที่เราอยู่ที่นี่ งานแค่นี้ไม่ใช่เรื่องยากหรอกค่ะ"
90002090-22 = "สำหรับเรื่องการออกแบบ มิโดริมีดีไซน์ที่เตรียมไว้ล่วงหน้าแล้วค่ะ"
90002090-23 = "ส่วนเรื่องฟังก์ชันการใช้งาน ฉันกับโทคิก็รับหน้าที่ตรวจสอบด้วยกันค่ะ"
90002090-24 = "ต้องขอบคุณอุปกรณ์ของเคย์จังที่ติดตั้งใหม่บนยานขนส่ง งานของเราก็เลยง่ายขึ้นมากเลยค่ะ"
90002090-25 = "สต็อป พี่มีอะไรอยากพูดหน่อยน่ะ มิโดริ"
90002090-26 = "ทำไมชุดของเราสองคนถึงออกมาจืดชืดแบบนี้ล่ะ?!"
90002090-28 = "ถึงภายนอกจะดูจืดชืด แต่เรื่องการเคลื่อนไหวโดยทั่วไปก็ไม่น่ามีปัญหาอะไรนะคะ "
90002090-30 = "แต่เรื่องแบบนี้น่ะ รูปลักษณ์ภายนอกเป็นสิ่งสำคัญนะ!"
90002090-31 = "ไหนว่าไม่ชอบให้เจ็บตัวไงล่ะ พี่โมโมอิ ฉันก็ออกแบบให้มันปลอดภัยแล้วไง"
90002090-32 = "ฉะ... ฉันเคยพูดแบบนั้นไปก็จริง..."
90002090-33 = "แต่ยังไงก็เถอะ ฉันอยากได้แบบ... แบบที่มันเท่ๆ เหมือนตัวละครหลักหน่อยน่ะ เก็ตมั้ย?"
90002090-34 = "[s] \"ครูว่าเท่านี้ก็เท่แล้วนะ?\""
90002090-35 = "หืม? งะ... งั้นเหรอ? ก็นะ ถ้าคุณครูว่าอย่างนั้นละก็ แหะๆๆ..."
90002090-37 = "เอาเถอะค่ะ ในแง่ของพลังป้องกันแล้ว ชุดของโมโมอิกับมิโดริถือว่าดีที่สุดในบรรดาชุดต่อสู้แล้วค่ะ"
90002090-38 = "ถ้าเกิดว่า... มีเรื่องอะไรเกิดขึ้นละก็ โมโมอิกับมิโดริจะเป็นคนที่อยู่รอดจนถึงที่สุด และช่วยสานต่องาน#nของทุกคนได้ค่ะ"
90002090-39 = "คะ... เคย์จัง?! ตอนเราสร้างชุดพวกนี้ เคย์จังไม่ได้พูดอะไรที่เป็นลางไม่ดีแบบนั้นไม่ใช่เหรอ...?"
90002090-40 = "ฉันก็แค่พูดไปอย่างนั้นค่ะ มิโดริ งั้นก็ข้ามเรื่องนี้ไปเถอะค่ะ"
90002090-41 = "ต่อไปก็..."
90002090-45 = "สวัสดีค่ะ คุณครู ฉันคืออะซุมะ โทคิที่สลัดคราบอาวุธหนักในอดีต แล้วมาอยู่ในเวอร์ชันที่เบา คล่องแคล่ว และพร้อมใช้งานที่สุดค่ะ ดึ๋ง ดึ๋ง"
90002090-46 = "ในเวลาแบบนี้ละก็ จะต้องออกมาดึ๋งๆ ตลอดเลยนะคะ อยู่ไม่สุขจริงๆ..."
90002090-47 = "ไม่ว่าจะเป็นนักเรียนคนไหน เวลาได้ชุดใหม่ก็ต้องอยากใส่มาอวดคุณครูอยู่แล้วไม่ใช่เหรอคะ?"
90002090-48 = "ไม่ใช่ว่าทุกคนจะเป็นแบบนั้นหรอกนะคะ..."
90002090-49 = "แต่ว่าฉันเป็นค่ะ"
90002090-50 = "ค่ะ ค่ะ เข้าใจแล้วค่ะ..."
90002090-51 = "[s] \"พอส่งต่ออาบี เอชูห์ให้อาริสึไป ก็เลยมีชุดใหม่สินะ...\""
90002090-52 = "ใช่ค่ะ ฉันเลยใช้โอกาสนี้ปรับคอนเซ็ปต์กับบรรยากาศให้เป็นตัวเองค่ะ ครั้งนี้ฉันจะรับบทบาทเป็น#nทีมค้นหาเคลื่อนที่ที่ใช้ความเร็วในแนวหน้าค่ะ"
90002090-53 = "เหนือสิ่งอื่นใด ฉันอยากให้คะแนนชุดนี้ในเรื่องการรักษาความอบอุ่น ซึ่งต่างกับชุดเมดก่อนหน้าของฉัน#nที่มีปัญหาเวลาอุณหภูมิร่างกายลดลงค่ะ"
90002090-57 = "[ns] \"ที่ผ่านมาหนาวมาตลอดเลยเหรอ...?\""
90002090-58 = "ใช่ค่ะ"
90002090-59 = "[s] \"แล้วทำไมถึงทนใส่ชุดแบบนั้นอยู่ล่ะ?\""
90002090-60 = "ค่ะ"
90002090-61 = "ทำไมน่ะเหรอคะ?"
90002090-62 = "..."
90002090-63 = "คุณครู บางครั้งคนเราก็ต้องอดทนด้วยความตั้งใจอย่างแน่วแน่ค่ะ"
90002090-64 = "สงสัยว่าเพราะอะไรน่ะเหรอคะ?"
90002090-66 = "ก็เพราะฉันจะแพ้ให้เอมิไม่ได้ยังไงล่ะคะ"
90002090-67 = "[s] \"เป็นคำตอบที่ครูไม่เข้าใจเลยจริงๆ นะ โทคิ...\""
90002090-68 = "ไม่เป็นไรค่ะ แค่ฉันเข้าใจก็พอค่ะ"
90002090-73 = "คะ... คุณโทคิ..."
90002090-74 = "เฮ้อ..."
90002090-75 = "มาต่อกันเถอะค่ะ อาวุธหลักของโทคิคือปืนพลังงานคู่ค่ะ ทันทีที่แบตเตอรี่ถูกใช้จนหมด ตัวดีดจะดีดตลับแบตเตอรี่ไปทางด้านหลังค่ะ"
90002090-76 = "ส่วนเรื่องสี ฉันเป็นคนเลือกเองค่ะ! ฉันว่าสีประจำตัวของคุณโทคิน่าจะเป็นสีขาวกับสีน้ำเงินน่ะค่ะ!"
90002090-77 = "ถ้าฉันถอดแจ็กเกตสีขาวตัวนี้ออก ก็จะได้เห็นรูปร่างสวยงามที่ฉันซ่อนเอาไว้ด้วยค่ะ จะดูตอนนี้เลยมั้ยคะ?"
90002090-78 = "คะ?!"
90002090-79 = "[s] \"ไม่ได้นะ! ตอนนี้ไม่ใช่จังหวะที่ดีหรอก!\""
90002090-80 = "อย่างนั้นสินะคะ งั้นฉันจะให้ดูคราวหน้า ในช่วงเวลาพิเศษของเราสองคนแทนนะคะ"
90002090-81 = "คุณโทคิ?!?!"
90002090-82 = "ไม่ต้องไปโต้ตอบกับทุกเรื่องหรอกค่ะ ไม่งั้นคงได้ยาวทั้งคืนแน่ค่ะ มิโดริ..."
90002090-83 = "เอาละ คนต่อไปคือเอมิค่ะ ว่าไงนะคะ? ใส่ชุดได้ไม่นาน แต่ก็ร้อนแล้วเหรอคะ?"
90002090-84 = "อดทนหน่อยนะคะ... ขอบอกเลยละว่าตอนที่ฉันต้องวิเคราะห์สภาพร่างกายของคุณ บางครั้งฉันอยากวิเคราะห์เชิงวิศวกรรมมากกว่าเชิงชีววิทยาอีกค่ะ..."
90002090-90 = "ฮู่ว..."
90002090-91 = "เอมิ?! เสื้อคลุมหายไปไหนแล้วคะ!?"
90002090-92 = "เสื้อตัวนั้นน่ะเหรอ? ฉันร้อนก็เลยถอดไปแล้วละ"
90002090-93 = "ไม่สิ ฉันก็พอเดาได้อยู่หรอก..."
90002090-94 = "แต่เอมิคะ ครั้งนี้คุณรับผิดชอบการสนับสนุนจากแนวหลังเป็นหลักนี่คะ ถ้างั้นการใส่เสื้อคลุมไว้จะ#nเป็นการเพิ่ม 'ประสิทธิภาพ' ในการพรางตัวไม่ใช่เหรอคะ?"
90002090-95 = "แต่ถ้าให้ฉันใส่ตลอดเวลา ฉันน่าจะเป็นโรคลมแดดก่อนใครเพื่อนเลยละ"
90002090-96 = "ถ้าพลแม่นปืนรู้สึกร้อนจนยิงสนับสนุนไม่ตรงเป้า ก็น่าจะยิ่งเสียประสิทธิภาพมากกว่านะ?"
90002090-98 = "ค่ะ... ก็ได้ค่ะ... ที่จริงฉันรู้ว่าจะเป็นอย่างนี้ ก็เลยออกแบบให้เสื้อคลุมของคุณเอมิเอามาผูกไว้ที่เอวได้#nด้วยค่ะ"
90002090-100 = "ขอบใจนะ มิโดริ แบบนี้ค่อยให้ผิวได้หายใจหน่อย"
90002090-101 = "..."
90002090-102 = "ค่ะ... เป็นความผิดพลาดของฉันเองละค่ะ... ควรจะรู้ตั้งแต่แรกแล้วว่าคนนี้เป็นแบบนี้..."
90002090-103 = "ส่วนเรื่องอาวุธหลักของเอมิ ฉันก็เปลี่ยนให้เช่นเดียวกับของโทคิค่ะ อาวุธของทั้งสองคนเหมือนกัน#nตรงที่เป็นอาวุธพลังงานที่ใช้ตลับแบตเตอรี่แบบเปลี่ยนได้ค่ะ"
90002090-104 = "แต่จะต่างกันก็ที่ความแรงและความจุของแบตเตอรี่ค่ะ"
90002090-105 = "ส่วนอุปกรณ์ช่วยเล็งก็เป็น HUD ที่เพิ่มเข้ามาเพื่อให้เล็งเป้าได้รวดเร็วขึ้น ส่งผลให้โดยรวมแล้ว#nจะใช้พลังงานสูง..."
90002090-106 = "เป้สะพายหลังก็เลยมีขนาดใหญ่กว่าของโทคิมากค่ะ"
90002090-108 = "เป็นยังไงบ้าง คุณครู?"
90002090-109 = "ดูมีประสิทธิภาพดีงั้นเหรอ? อืม..."
90002090-110 = "..."
90002090-111 = "[s] \"ทำไมเหรอ เอมิ?\""
90002090-112 = "ไม่หรอก ฉันแค่รู้สึกแปลกๆ น่ะ ถ้าเป็นเมื่อก่อน ถ้าชมว่ามีประสิทธิภาพฉันคงดีใจสุดขีดไปแล้ว..."
90002090-113 = "แต่ตอนนี้ฉันอยากฟังคำที่แตกต่างออกไปน่ะ"
