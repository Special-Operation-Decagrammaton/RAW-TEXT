90002090-127 = "[ns] \"อื้อ เอมิสวยและเหมาะกับชุดนี้มากเลยละ\""
90002090-128 = "ต้องแบบนี้สิ"
90002090-129 = "ขอบคุณนะ คุณครู"
90002090-131 = "มิโดริ ฉันเหมือนได้เห็นฉากละครที่น่ากลัวเลยค่ะ..."
90002090-132 = "ยะ... อย่าพูดแบบนั้นสิ เคย์จัง!"
90002090-133 = "ฉันรู้ค่ะ ฉันก็รู้เหมือนกัน แต่ว่า..."
90002090-137 = "..."
90002090-138 = "เฮ้อ ช่างเถอะค่ะ ฉันขอลืมเรื่องที่ไม่อาจเข้าใจได้ดีกว่า ต่อไปก็... คนที่ตื่นเต้นรออยู่แล้ว เชิญออกมาได้เลยค่ะ"
90002090-141 = "ฮุฮุ ชุดใหม่ของฉันเป็นยังไงบ้างคะ คุณครู?"
90002090-142 = "[s] \"อืม... จะพูดแบบนี้ก็รู้สึกผิดอยู่นิดหน่อยนะ...\""
90002090-143 = "คะ?"
90002090-144 = "[s] \"ไม่... หนาวเหรอ?\""
90002090-145 = "ตายจริง ฉันก็สงสัยว่าจะพูดว่าอะไร"
90002090-146 = "ไม่ต้องเป็นห่วงนะคะ แฮ็กเกอร์ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษอย่างฉันน่ะ เตรียมตัวรับมือกับเรื่องแบบนั้นไว้แล้วค่ะ"
90002090-147 = "นี่คือบอดี้สูทสารพัดประโยชน์สำหรับการสนับสนุนภาคสนามที่ทั้งกันหนาว กันน้ำ ปรับใช้ได้กับทุกสถานการณ์ และมีดีไซน์ที่รับความอ้อนแอ้นและความสวยสดใสของฉันด้วยค่ะ"
90002090-151 = "[ns3] \"อ้อนแอ้น...\"\n[ns4] \"สวยสดใส...\""
90002090-157 = "ฉันอยากถามเรื่องนี้มาตั้งนานแล้วค่ะ... เราพูดชมตัวเองแบบนั้นจากปากตัวเองได้ด้วยเหรอคะ...?"
90002090-158 = "เคย์นี่ละก็ การระบุข้อเท็จจริงอย่างชัดเจนคือพื้นฐานของหลักการวิทยาศาสตร์ไม่ใช่เหรอคะ?"
90002090-159 = "การระบุข้อเท็จจริงอย่างชัดเจน... ก็ได้ค่ะ... เข้าใจแล้วค่ะ... ฉันยอมแพ้ค่ะ..."
90002090-160 = "แต่พอได้ใส่ชุดสีขาวที่เป็นสัญลักษณ์ของความบริสุทธิ์แบบนี้แล้ว..."
90002090-161 = "ฮืออ..."
