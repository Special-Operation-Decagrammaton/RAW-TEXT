[translation]
90002090-1 = "第9話;Dress Up"
90002090-6 = "讓你久等了，老師！"
90002090-7 = "[s]「綠……？」"
90002090-8 = "怎麼了嗎……？"
90002090-9 = "[s]「真是超級可愛……！」"
90002090-10 = "耶嘿嘿，謝謝老師。#n真是太好了……"
90002090-15 = "如果借用愛麗絲的說法，我們為大家打造了全新的裝甲和武具。"
90002090-16 = "現在綠身上穿的防護服也是其中之一。"
90002090-17 = "[s1]「大家？」\n[s2]「八個人全部都有？」"
90002090-20 = "是的。"
90002090-21 = "那種程度的事，在這裡只要想做就能做得到。"
90002090-22 = "至於設計方面誠如老師所知，綠早就都準備好了。"
90002090-23 = "在功能性上則由我和季負責審核。"
90002090-24 = "多虧Kei醬安裝在運輸船上的新設備，作業流程變得非常輕鬆。"
90002090-25 = "先等一下，妹妹啊。#n姐姐我還有話要說。"
90002090-26 = "為什麼只有我們兩個被做得這麼笨重啊！？"
90002090-28 = "實際行動起來應該沒什麼問題吧。#n只是外觀看起來是那樣而已。"
90002090-30 = "外觀也是很重要的啊！"
90002090-31 = "是因為姐姐說會怕痛，所以我才幫你做得安全一點的。"
90002090-32 = "我，我確實有這麼說過啦……"
90002090-33 = "但是總覺得好像能更有主角的感覺……再帥一點之類的？"
90002090-34 = "[s]「我覺得看起來還不錯啊？」"
90002090-35 = "咦？是，是嗎？#n好吧，既然老師都這麼說了……耶嘿嘿。"
90002090-37 = "桃井與綠的戰鬥服，在防禦力方面是所有套裝裡最高的。"
90002090-38 = "萬一發生什麼事的話……應該能撐到最後，替大家收拾殘局吧。"
90002090-39 = "K，Kei醬！？#n這麼不吉利的話，製作的時候可沒有說到啊……？"
90002090-40 = "我只不過是隨口說說而已，綠。#n你就別放在心上了。"
90002090-41 = "然後下一個是──"
90002090-45 = "您好，老師。#n我是卸下過去的重武裝，完成輕量化、極速化與最佳化的機動型飛鳥馬季。蹦蹦。"
90002090-46 = "真是連這種時候也安分不下來呢……"
90002090-47 = "無論哪位學生，收到新衣服的時候都會想讓老師第一個看見吧？"
90002090-48 = "也不是每個人都會這樣吧……"
90002090-49 = "但我就是啊。"
90002090-50 = "是是是，我知道了……"
90002090-51 = "[s]「原來如此。畢竟Abi-Eshuh已經交給愛麗絲了……」"
90002090-52 = "是的。我也正好藉著這個機會，將概念與氛圍徹底更新。#n這次預計將以速度取勝，在前線以機動偵察隊的身分活躍。"
90002090-53 = "尤其和過去那套有體溫流失問題的女僕裝不同──#n在保暖性方面，我給予相當高的評價。"
90002090-57 = "[ns]「難道說……你其實一直都覺得很冷？」"
90002090-58 = "是的。"
90002090-59 = "[s]「可是卻還是穿著那種衣服？」"
90002090-60 = "是的。"
90002090-61 = "問我為什麼？"
90002090-62 = "……"
90002090-63 = "老師，人總有必須靠意志力撐下去的時候。"
90002090-64 = "想知道原因是嗎？"
90002090-66 = "因為我不能輸給英美啊。"
90002090-67 = "[s]「老師有時候真搞不懂你啊，季……」"
90002090-68 = "沒關係。只要我自己懂就可以了。"
90002090-73 = "季，季同學……"
90002090-74 = "唉……"
90002090-75 = "我們繼續吧。雙手的兩把能量手槍是主要武裝。#n當電池容量全部耗盡時，彈匣會以噴射方式從後方排出。"
90002090-76 = "是我負責配色的！我覺得季的個人色應該是白色與青色！"
90002090-77 = "而且只要脫下這件白色外套，就能讓老師欣賞到我完美的身材。#n需要現在確認一下嗎？"
90002090-78 = "咦！？"
90002090-79 = "[s]「當然不行！至少現在絕對不行！」"
90002090-80 = "這樣啊。那麼就留到下次，在我們獨處的特別時光再讓您欣賞吧。"
90002090-81 = "季同學！？"
90002090-82 = "每句話都一一回應會沒完沒了的，綠……"
90002090-83 = "接著下一位是英美。#n……什麼？已經快熱死了？"
90002090-84 = "麻煩稍微忍耐一下吧……#n有時候我真想從工程學，而非生物學的角度分析你的體質……"
90002090-90 = "呼……"
90002090-91 = "英美！？你的披風呢！？"
90002090-92 = "那個？因為太熱就脫掉了啊？"
90002090-93 = "不是，這種事我也看得出來好不好……"
90002090-94 = "英美，你這次主要負責後方支援對吧？#n既然如此，你不覺得披著披風提高偽裝指數，才是更「有效率」的選擇嗎？"
90002090-95 = "但是如果一直穿著那個，我搞不好會先因為中暑而昏倒吧。"
90002090-96 = "指定射手因為太熱而無法準確支援，那才真的沒效率吧？"
90002090-98 = "嗯……也是因為這樣，我才把英美同學的披風設計成方便綁在腰間的款式。"
90002090-100 = "謝謝你，綠。#n多虧你才舒服多了。"
90002090-101 = "……"
90002090-102 = "好吧……確實是我考慮不周……這個人本來就是這樣的吧……"
90002090-103 = "英美的主武裝也和季一樣進行了更換。#n共通點在於都是使用電池彈匣的能量武器。"
90002090-104 = "不過輸出與容量是截然不同的。"
90002090-105 = "護目鏡是為了迅速鎖定支援點而追加的HUD，因此整體的能源消耗率相對較高……"
90002090-106 = "同時背包也比季的大上許多。"
90002090-108 = "覺得怎麼樣呢，老師？"
90002090-109 = "看起來很有效率……是嗎？#n唔嗯……"
90002090-110 = "……"
90002090-111 = "[s]「怎麼了嗎，英美？」"
90002090-112 = "沒有，我自己也覺得有點怪怪的。#n如果是以前的話，那應該是最好的稱讚才對……"
90002090-113 = "不過現在，我想聽一些不一樣的話。"
90002090-114 = "問我想聽什麼話？#n比如……"
90002090-118 = "……"
90002090-119 = "漂亮之類的？"
90002090-121 = "！？"
90002090-122 = "！？"
90002090-127 = "[ns]「嗯，很漂亮也很適合你哦。」"
90002090-128 = "嗯。"
90002090-129 = "……謝謝你，老師。"
90002090-131 = "綠。我現在好像看見了很可怕的畫面……"
90002090-132 = "不，不能說那種話啦，Kei醬！"
90002090-133 = "我也知道，可是……"
90002090-137 = "……"
90002090-138 = "唔啊啊。我決定把無法理解的事迅速忘掉！#n接下來換已經很興奮的那位。請出場吧。"
90002090-141 = "呵呵。我的新套裝如何呢，老師？"
90002090-142 = "[s]「唔嗯……雖然說這種話可能有點失禮……」"
90002090-143 = "咦？"
90002090-144 = "[s]「……你不冷嗎？」"
90002090-145 = "哎呀，我還以為您要說什麼呢。"
90002090-146 = "請不必擔心。#n像我這種超天才戰鬥系萬能病弱美少女駭客，是不可能會毫無準備的。"
90002090-147 = "這是具備防寒防水與各種環境的應對能力，#n同時還兼具纖細與清純感的現場支援萬能套裝。"
90002090-151 = "[ns3]「纖細……」\n[ns4]「清純……」"
90002090-157 = "我從以前就想問了……#n自己講這種話真的是可以的嗎……？"
90002090-158 = "Kei也真是的。#n明確地對事實進行敘述，不正是科學方法論的基礎嗎？"
90002090-159 = "明確地對事實進行敘述啊……#n好吧……我認輸了……"
90002090-160 = "話雖如此，一旦穿上這套象徵純淨的潔白套裝……"
90002090-161 = "嗚嗚……"
90002090-162 = "[s]「陽葵你怎麼了？發生什麼事了嗎……？」"
90002090-163 = "該怎麼辦才好，老師……我被自己的美麗與可愛感動到流淚了。"
90002090-164 = "對不起，老師。#n現在的陽葵部長就由我負責處理吧。"
90002090-169 = "英美？英美！？我還沒介紹完啊──！？"
90002090-172 = "[ns]「有種暴風雨過去了的感覺……」"
90002090-173 = "我也深有同感……"
90002090-174 = "（得，得轉換一下氣氛才行！否則要是再這樣下去……！)"
90002090-178 = "莉央會長？#n請趕快出來吧！"
90002090-185 = "[ns]「莉央……？」"
90002090-186 = "怎麼了嗎，老師？"
90002090-187 = "[s]「沒有啦，只是……」"
90002090-188 = "我不太清楚老師為何會是這種反應，總之就變成這樣了。"
90002090-189 = "這是現場應對、設施活用、狀況分析……能應付各種場合、重視泛用性的戰鬥套裝。"
90002090-190 = "可說是名符其實的合理呢。"
90002090-191 = "因為莫名有種必須這麼做的感覺，所以色調選擇了與陽葵前輩相反的方向……"
90002090-192 = "我怎麼想都覺得那個設計還是有點問題，綠──！！！"
90002090-193 = "部長，冷靜點。#n不然我要把你強行塞回運輸船裡面囉？"
90002090-194 = "嗚嗚嗚……"
90002090-195 = "就，就算陽葵部長一直堅持，我也不能妥協！#n因為這關係到身為設計師的自尊！"
90002090-197 = "我對於自己的選擇與決定……一點也不後悔！"
90002090-202 = "關於這件事，我就不發表過多評論了……"
90002090-203 = "總之莉央的套裝是特別強化了防禦性能，並且能應對電子戰的規格。"
90002090-204 = "因為他表示自己陽葵不同，會親自到現場進行技術支援。"
90002090-205 = "[s]「莉央要親自到場？不會有危險嗎……？」"
90002090-206 = "不過跟陽葵相比，還是我親自到現場更加合理吧？"
90002090-207 = "這裡畢竟是鋼鐵大陸，科技層面的戰鬥也應該納入考量才對。"
90002090-208 = "[s5]「這樣啊，我明白了。」\n[s6]「那就拜託你了，莉央。」"
90002090-211 = "嗯。"
90002090-212 = "交給我吧，老師。"
90002090-213 = "然後下一個是……"
90002090-219 = "柚子？"
90002090-220 = "……出來吧，柚子。#n都來到這裡了……"
90002090-221 = "柚子醬？沒事的，好嗎？"
90002090-229 = "嗚嗚嗚……"
90002090-230 = "[s]「咦？跟桃井和綠的設計……很不一樣呢？」"
90002090-231 = "那，那是因為……"
90002090-232 = "是我特別要求這麼做的。"
90002090-233 = "嗯。我本來也打算用跟我們類似的設計的……"
90002090-234 = "[s]「這是為什麼呢？」"
90002090-235 = "……"
90002090-236 = "我希望現在先不透露，可以嗎？"
90002090-237 = "這裡是鋼鐵大陸……我們現在的對話也可能被實時地監聽著。"
90002090-238 = "況且我之所以將柚子的套裝朝這個方向設計，也是為了應對幾乎不會發生的意外。"
90002090-239 = "[s]「意思是王牌必須連友方都隱瞞囉？」"
90002090-240 = "……對不起，老師。還有大家。#n我也知道不應該這樣。"
90002090-241 = "也明白必須相信大家，才得以超越自身的極限……"
90002090-242 = "[s]「沒關係，我相信莉央。」"
90002090-243 = "真，真的嗎……？"
90002090-245 = "真的可以嗎，老師？"
90002090-246 = "什麼？因為莉央到目前為止，從來沒有帶著惡意制訂過計劃？"
90002090-247 = "嗯，要這麼說也沒錯啦……"
90002090-248 = "是！愛麗絲也是這麼想的！"
90002090-249 = "愛麗絲！？"
90002090-250 = "愛麗絲醬！？"
90002090-251 = "愛麗絲醬……？？"
90002090-256 = "……"
90002090-257 = "你願意……相信我嗎？"
90002090-258 = "是的。因為莉央前輩直到最後一刻，#n都在努力幫忙調整愛麗絲的Abi-Eshuh和Kei的槍。"
90002090-259 = "如果莉央前輩有不好的念頭的話，是絕對不會幫忙到這種地步的。"
90002090-260 = "我也有幫忙哦！？"
90002090-261 = "沒錯！陽葵前輩也有幫忙！"
90002090-262 = "呵……好吧。#n這次就看在愛麗絲的面子上，不跟你多計較了。"
90002090-263 = "服裝還有很多隱藏技能，大家可以好好期待唷？"
90002090-268 = "[ns]「話說，剛才是不是提到了Kei的槍？」"
90002090-269 = "咦？"
90002090-270 = "啊，嗯……沒錯。"
90002090-271 = "畢竟現在的奇普托斯如果沒有帶著槍，感覺會比裸體走在路上還奇怪……"
90002090-272 = "名字是「Earendel：Luminous Nova」。#n同樣也是能量武器。"
90002090-273 = "嗚嗚嗚……我還是搞不清楚。#n這套衣服……真的適合我嗎……？"
90002090-274 = "或者說，我真的應該出現在這裡嗎……？"
90002090-275 = "[s7]「別擔心，柚子。衣服很適合你哦。」\n[s8]「我們……需要柚子！」"
90002090-278 = "咦，咦咦！？"
90002090-279 = "那個，就是……"
90002090-280 = "既然老師都這麼說了……"
90002090-281 = "我，我知道了。#n我……會全力以赴的。"
90002090-282 = "[s]「那麼，開始進行最終檢查吧！」"
90002090-294 = "Kei，能打擾一下嗎？"
90002090-295 = "怎麼了，莉央？"
90002090-296 = "我有些話想單獨對你說。"
90002090-297 = "為什麼是我？不是還有老師在嗎？"
90002090-298 = "那是因為……"
90002090-299 = "雖然這只是我根據經驗做出的推測……"
90002090-300 = "你……能對鋼鐵大陸和那三個孩子隱藏某些情報對吧？"
90002090-301 = "……"
90002090-302 = "還真敏銳呢。#n你是怎麼知道的？"
90002090-303 = "因為直到抵達提法瑞特的所在地之前，那三個孩子都不知道你和愛麗絲的存在。"
90002090-304 = "所以你才判斷可以把剛才的祕密……還有王牌告訴我嗎？"
90002090-305 = "好吧。不過無法維持太久。#n在這裡建立的防火牆，最多也只能維持30秒左右。"
90002090-306 = "沒問題。那樣應該足夠了。"
90002090-309 = "……"
90002090-310 = "…………"
90002090-311 = "………………"
90002090-312 = "怎，怎麼了嗎？"
90002090-313 = "莉央，你……"
90002090-314 = "嗯？"
90002090-315 = "精神真的正常嗎……？"
90002090-316 = "為，為什麼這麼說……？#n這種程度應該任何人都能……"
90002090-317 = "為了預防意外做到這種程度，已經超出常理的範圍了……"
90002090-318 = "……不。這裡可是鋼鐵大陸，那種假設也必須納入考量才對吧。"
90002090-319 = "但話雖如此，那也實在……"
90002090-320 = "有那麼奇怪嗎……？"
90002090-321 = "要是換作其他情況，我也許會這麼想吧。"
90002090-322 = "不過現在……"
90002090-323 = "……"
90002090-324 = "從某方面來說，真是慶幸有你在啊，莉央。"
90002090-325 = "是，是嗎……？"
90002090-326 = "總之……這就是你把柚子的套裝設計成那樣的原因嗎？"
90002090-327 = "沒錯。"
90002090-328 = "至於剛才說的第二階段……"
90002090-329 = "我想應該不會有問題。#n而且因為已經有過前例……搞不好會比想像中還容易。"
90002090-330 = "當然我也希望如你所說，不必動用那種手段。"
90002090-331 = "是啊。畢竟王牌最強的時候，就是沒有真正拿出來使用的時候啊。"
90002090-332 = "[s]「嗯？王牌？」"
90002090-333 = "老，老師！？！？"
90002090-334 = "那是，這個……！"
90002090-335 = "……"
90002090-336 = "我們在討論慶功宴的時候，要準備什麼節目才能成為王牌。"
90002090-337 = "[s]「慶功宴？」"
90002090-338 = "嗯。"
90002090-339 = "我們會贏的，不是嗎？"
90002090-340 = "[s]「哦哦，原來如此啊。」"
90002090-341 = "沒錯。"
90002090-342 = "對吧，莉央？"
90002090-343 = "……"
90002090-344 = "是啊，就是這樣。"
90002090-345 = "老師在做什麼呢？#n啊，莉央前輩和Kei也在呢！"
