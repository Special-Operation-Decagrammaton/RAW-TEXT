90002090-163 = "ทำยังไงดีล่ะคะ คุณครู... ฉันตื้นตันใจมากจนร้องไห้ออกมา เพราะฉันในชุดนี้สวยและน่ารักมากน่ะสิคะ"
90002090-164 = "ขอโทษนะ คุณครู ฉันจะดูแลและรับมือหัวหน้าฮิมาริในตอนนี้ให้เอง"
90002090-169 = "เอมิ? เอมิ!? ฉันยังพูดแนะนำตัวเองไม่เสร็จเลยนะคะ!"
90002090-172 = "[ns] \"พายุผ่านไปแล้วสินะ...\""
90002090-173 = "ก็อย่างที่ว่าเลยค่ะ..."
90002090-174 = "(จะ... จะให้เป็นแบบนี้ต่อไปไม่ได้ ต้องทำให้บรรยากาศผ่อนคลายกว่านี้หน่อยแล้วละ!)"
90002090-178 = "ประธานริโอะ? ออกมาได้แล้วค่ะ! เร็วเข้าค่ะ!"
90002090-185 = "[ns] \"ริโอะ...?\""
90002090-186 = "เป็นอะไรไปเหรอ ครู?"
90002090-187 = "[s] \"เปล่าหรอก ก็แค่...\""
90002090-188 = "ฉันไม่รู้ว่าทำไมครูถึงมีปฏิกิริยาแบบนั้น แต่ชุดของฉันก็เป็นแบบนี้ละ"
90002090-189 = "บอดี้สูทสำหรับต่อสู้ที่เน้นการใช้งานเป็นหลัก รับมือได้ทุกสถานการณ์... ทั้งเรื่องการใช้ประโยชน์#nจากสิ่งอำนวยความสะดวกและการวิเคราะห์สถานการณ์"
