[translation]
1013406-1 = "ช่วงเวลาที่เวทมนตร์เริ่มต้นขึ้น"
1013406-2 = "...ครู"
1013406-3 = "(...?)"
1013406-4 = "(คุณครูเหมือนจะได้ยินเสียงของอาริสึจากที่ไหนสักแห่ง)"
1013406-8 = "คุณครู..."
1013406-9 = "(แต่ก็ไม่รู้ว่าอาริสึอยู่ไหน)"
1013406-13 = "คุณครู! ทางนี้ค่ะ!"
1013406-14 = "[ns1] หันหน้าไปตามเสียง\n[ns2] มองออกไปนอกหน้าต่าง"
1013406-19 = "― [log=아리스 결전]แหะๆๆ คุณครู ตกใจเหรอคะ? [/log][wa:3330] "
1013406-21 = "― [log=아리스 결전]อาริสึแค่อยากดูท้องฟ้ายามค่ำคืนกับคุณครู ก็เลยลองเรียกดูค่ะ[/log][wa:2460] "
1013406-24 = "― [log=아리스 결전]สวยมากเลยใช่มั้ยล่ะคะ?[/log][wa:3420] "
1013406-27 = "― [log=아리스 결전]ในโลกของอาริสึ[/log]"
1013406-29 = "― [log=아리스 결전]และโลกที่ยังไม่เคยไป...[/log]"
1013406-32 = "― [log=아리스 결전]คงมีสิ่งสวยงามแบบนี้[/log][wa:700] "
1013406-34 = "― [log=아리스 결전]อยู่เยอะเลยใช่มั้ยคะ[/log]"
1013406-37 = "― [log=아리스 결전]แต่ก็แปลกนะคะ[/log][wa:4210] "
1013406-40 = "― [log=아리스 결전]โลกนี้สวยงามถึงเพียงนี้...[/log][wa:1390] "
1013406-42 = "― [log=아리스 결전]แต่ทำไมผู้คนถึงได้ทะเลาะกันล่ะคะ?[/log]"
1013406-45 = "― [log=아리스 결전]โลกใบนี้มีสิ่งสวยงาม[/log][wa:1380] "
1013406-47 = "― [log=아리스 결전]มากพอ[/log]"
1013406-50 = "― [log=아리스 결전]ให้เราทุกคนแบ่งกันได้[/log]"
1013406-52 = "― [log=아리스 결전]เหมือนกับดวงดาวในท้องฟ้านั้นแท้ๆ [/log][wa:2180] "
1013406-55 = "― [log=아리스 결전]อาริสึ... ยังไม่ค่อยเข้าใจเรื่องแบบนี้จริงๆ ด้วยค่ะ[/log][wa:3440] "
1013406-60 = "แหะๆๆ กลับมาแล้วค่ะ"
1013406-61 = "ฮัดชิ่ว...!"
1013406-62 = "[s3] \"อาริสึ เป็นยังไงบ้าง?! หนาวมั้ย?!\"\n[s4] \"เป็นหวัดกลับมาหรือเปล่าน่ะ?!\""
1013406-65 = "ไม่เป็นไรค่ะ! จนถึงตอนนี้ อาริสึยังไม่เคยเป็นหวัดเลยค่ะ!"
1013406-66 = "อ๊ะ มือของคุณครู"
1013406-71 = "อบอุ่นจนทำให้รู้สึกดีเลยนะคะ ฮุฮุ"
1013406-73 = "(คุณครูกอดอาริสึไว้สักพักจนตัวของเธออบอุ่นขึ้น)"
1013406-74 = "(แต่กลายเป็นว่าอาริสึหลับไปในอ้อมกอด คุณครูจึงพาเธอไปนอน...)"
