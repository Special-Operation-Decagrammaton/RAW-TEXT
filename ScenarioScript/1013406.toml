[translation]
1013406-1 = "魔法開始的時刻"
1013406-2 = "……師。"
1013406-3 = "（……？）"
1013406-4 = "（好像從某處傳來愛麗絲的聲音）"
1013406-8 = "……師。"
1013406-9 = "（不過卻完全沒看見愛麗絲的身影）"
1013406-13 = "老師！在這裡！"
1013406-14 = "[ns1] 看向往聲音傳來的方向\n[ns2] 看向窗戶"
1013406-19 = "― [log=아리스 결전]耶嘿嘿。老師，嚇到你了嗎？[/log][wa:3810] "
1013406-21 = "― [log=아리스 결전]因為想和老師一起欣賞這片夜空……所以才會呼喚你。[/log][wa:3860] "
1013406-24 = "― [log=아리스 결전]相當……美麗呢。[/log][wa:3980] "
1013406-27 = "― [log=아리스 결전]在愛麗絲的世界，[/log]"
1013406-29 = "― [log=아리스 결전]以及尚未去過的世界……[/log]"
1013406-32 = "― [log=아리스 결전]想必都有很多[/log][wa:1260] "
1013406-34 = "― [log=아리스 결전]這麼美麗的事物吧。[/log]"
1013406-37 = "― [log=아리스 결전]但是……很神奇。[/log][wa:4410] "
1013406-40 = "― [log=아리스 결전]世界明明這麼美麗……[/log][wa:2030] "
1013406-42 = "― [log=아리스 결전]為什麼人卻要爭鬥呢？[/log]"
1013406-45 = "― [log=아리스 결전]就像那片星空一樣，[/log][wa:1820] "
1013406-47 = "― [log=아리스 결전]這個世界，[/log]"
1013406-50 = "― [log=아리스 결전]明明充滿著大家一起分享[/log]"
1013406-52 = "― [log=아리스 결전]也足夠的美麗事物才對……[/log][wa:3020] "
1013406-55 = "― [log=아리스 결전]……果然，愛麗絲還是不太明白。[/log][wa:4880] "
1013406-60 = "耶嘿嘿，愛麗絲回來了。"
1013406-61 = "……哈啾！"
1013406-62 = "[s3] 「愛麗絲，你沒事吧！？有沒有著涼！？」\n[s4] 「是不是感冒了！？」"
1013406-65 = "沒事的！愛麗絲從來沒有感冒過！"
1013406-66 = "啊，老師的手……"
1013406-71 = "暖暖的真舒服呢……呵呵。"
1013406-73 = "（就這樣抱著愛麗絲，直到他的身體變暖為止）"
1013406-74 = "（……把在懷中睡著的愛麗絲放回了房間的床上）"
