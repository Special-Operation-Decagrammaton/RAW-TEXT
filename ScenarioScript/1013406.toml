[translation]
1013406-1 = "When Magic Begins"
1013406-2 = "...sei."
1013406-3 = "...?"
1013406-4 = "I thought I heard Aris' voice from somewhere."
1013406-8 = "...Sensei?"
1013406-9 = "But I didn't see her anywhere."
1013406-13 = "Sensei! Over here!"
1013406-14 = "[ns1] Look in the direction of the voice.\n[ns2] Look through the window."
1013406-19 = "― [log=아리스 결전]Eheehee. Sensei, were you surprised? [/log][wa:2850] "
1013406-21 = "― [log=아리스 결전]I called to you because I wanted you to see the night sky with me.[/log][wa:2180] "
1013406-24 = "― [log=아리스 결전]Is it not beautiful?[/log][wa:3500] "
1013406-27 = "― [log=아리스 결전]I am sure that in this world,[/log]"
1013406-29 = "― [log=아리스 결전]and even in all the worlds I have yet to visit,[/log]"
1013406-32 = "― [log=아리스 결전]there must be plenty of[/log][wa:580] "
1013406-34 = "― [log=아리스 결전]beautiful things, just like this.[/log]"
1013406-37 = "― [log=아리스 결전]That is why it is so strange.[/log][wa:3570] "
1013406-40 = "― [log=아리스 결전]When there is so much beauty in this world...[/log][wa:630] "
1013406-42 = "― [log=아리스 결전]Why do people choose to fight?[/log]"
1013406-45 = "― [log=아리스 결전]Just like the stars that speckle the night,[/log][wa:460] "
1013406-47 = "― [log=아리스 결전]I am sure the world[/log]"
1013406-50 = "― [log=아리스 결전]is full of more than enough[/log]"
1013406-52 = "― [log=아리스 결전]beautiful things for everyone to share.[/log][wa:1940] "
1013406-55 = "― [log=아리스 결전]...It really is difficult for me to understand.[/log][wa:3600] "
1013406-60 = "Heehee, aaand I have returned."
1013406-61 = "...Achoo!"
1013406-62 = "[s3] \"Aris, are you all right?! Are you cold?!\"\n[s4] \"Did you catch a cold?!\""
1013406-65 = "Do not worry! I have never gotten a cold before!"
1013406-66 = "Ah, Sensei's hand."
1013406-71 = "It is so nice and warm. Heehee."
1013406-73 = "I hugged Aris until I felt her warm up, and she slowly fell asleep."
1013406-74 = "...Then, I carried her, fast asleep, back to her bed."
