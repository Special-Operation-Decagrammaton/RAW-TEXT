[translation]
22020-1 = "ตอนที่ 2;วันธรรมดาๆ ของชมรมพัฒนาเกม"
22020-3 = "(นานๆ ทีจะถึงวันที่คุณครูไม่มีงานของชาเล่ต์สักเท่าไร เลยพอจะมีเวลาให้ได้หายใจหายคอกันบ้าง)"
22020-4 = "(ในวันนั้นเอง คุณครูได้รับการติดต่อจากชมรมพัฒนาเกมให้ไปเข้าร่วมกิจกรรมของชมรม)"
22020-5 = "(ถึงจะบอกว่าเป็นกิจกรรมของชมรม แต่คุณครูก็ไม่ได้ฟังคำอธิบายว่าเป็นกิจกรรมแบบไหนกันแน่)"
22020-9 = "ชมรมพัฒนาเกมมิลเลเนียม"
22020-15 = "อ๊ากก! เตรียมใจไว้ได้เลย! คุณครู!"
22020-16 = "จากนี้จะได้เจอท่าไม้ตายลับของฉัน...!"
22020-17 = "แล้วคุณครูจะได้เห็น โมโมอิ สแปลช...!!"
22020-18 = "(พอตั้งสติได้ คุณครูก็รู้สึกตัวว่ากำลังเล่นเกมต่อสู้อยู่กับโมโมอิ)"
22020-19 = "[s] \"ท่าไม้ตายลับของโมโมอิ...!!\""
22020-28 = "ฮุฮุฮุ! เจอการโจมตีคอมโบที่ไร้ความปรานีของฉันเข้าไป! ถ้า HP ของคุณครูยังไม่หมดหลอด ฉันก็ไม่เลิกโจมตีหรอก!"
22020-29 = "ย้าาา!"
22020-43 = "(ตึง! ฮวบ!)"
22020-47 = "「Player MOMORIA LOSE!」"
22020-51 = "「WINNER! Player [USERNAME]!」"
22020-57 = "แงงงง! ทำไมการโจมตีคอมโบของฉันมันถึงไม่โดนเลยล่ะ ทำไมออกนอกวิถีหมดเลย?!"
22020-58 = "[s1] \"ก็พอโมโมอิใจร้อนก็จะรีบกดปุ่มเกินไปไงล่ะ...\"\n[s2] \"คอมโบที่มีแต่ความโลภแบบนั้นทำอะไรครูไม่ได้หรอก! โมโมอิ!\""
22020-61 = "วะ... ว่าไงนะ?! คุณครูมองการโจมตีทั้งหมดของฉันออกอย่างทะลุปรุโปร่งเลยเหรอ?!"
22020-62 = "คุณครูบอกฉันว่าวันนี้เพิ่งได้ลองเล่นเกมนี้เป็นครั้งแรกด้วยนะ พี่โมโมอิ!"
22020-63 = "หา??! อย่าให้พี่ต้องเจอกับความจริงที่โหดร้ายสิ มิโดริ!"
22020-64 = "เมื่อกี้เป็นโมฆะ! โมฆะๆ!"
22020-65 = "เอาอีกตา! ขออีกตาเดียวคุณครู! ต่อไปฉันจะใช้คอมโบลับสุดยอด..."
22020-66 = "[s] \"พูดแบบนี้มา 8 รอบแล้วนะ โมโมอิ...\""
22020-67 = "หืม?! นี่เราเล่นมาขนาดนั้นแล้วเหรอ?!"
22020-68 = "ใช่สิพี่ เอาให้มันพอดีๆ เถอะ คุณครูลำบากใจแล้วนะ"
22020-69 = "แต่ถ้าจะปล่อยให้แพ้แบบนี้ กะ... เกมเมอร์อย่างฉันเสียศักดิ์ศรีนะ..."
22020-70 = "ดื้ออีกแล้ว..."
22020-71 = "แล้วที่พูดมาน่ะ หมายความว่าขอแค่คุณครูแพ้ก็พองั้นเหรอ?"
22020-72 = "เมี้ยววว?!  ทะ.. ทำไมตีความไปอย่างนั้นล่ะ...?"
22020-73 = "[s] \"แต่จะให้ครูแพ้ก็ได้นะ\""
22020-74 = "เฮ้อ... คุณครูคะ จะยอมให้พี่เขาดื้อใส่แบบนี้ไม่ได้สิคะ"
22020-75 = "อีกอย่าง ที่วันนี้พี่คิดแต่จะเล่นสนุกแบบนี้..."
22020-76 = "อย่าบอกนะคะว่าลืมจุดประสงค์ของการทำกิจกรรมชมรมในวันนี้ไปแล้ว?"
22020-78 = "เฮือก จริงสิ...!"
22020-79 = "จริงสิ...?"
22020-80 = "มะ... ไม่ใช่นะ มิโดริ! พี่ยังจำได้แม่น! อื้ม! จำขึ้นใจเลย!"
22020-81 = "[s] \"จะว่าไป ครูยังไม่ได้ฟังเลยว่าวันนี้จะมีกิจกรรมอะไร\""
22020-82 = "พี่โมโมอิ หรือว่าพี่ชวนคุณครูมาโดยที่ยังไม่ได้อธิบายรายละเอียดให้ฟังเลย..."
22020-83 = "พี่คะ~~?"
22020-84 = "อ้อ เรื่องรายละเอียด! อื้ม! ก็ตั้งใจจะอธิบายตอนนี้แหละ!"
22020-85 = "จุดประสงค์ของการทำกิจกรรมชมรมในวันนี้ ไม่ใช่อะไรอื่น..."
22020-89 = "แต่เป็นการเตรียมไอเดียสำหรับงานชิ้นต่อไป!"
22020-90 = "[s] \"งานชิ้นต่อไป...?\""
22020-91 = "ใช่ค่ะ ชมรมพัฒนาเกมของเราคุยกันว่าจะเตรียมผลงานชิ้นต่อไปอยู่ค่ะ"
22020-92 = "ใช่! แล้วพอรู้ว่าคุณครูที่แสนยุ่งเริ่มจะมีเวลาว่างกับเขาบ้าง ก็เลยชวนมาแบบนี้ไงล่ะ!"
22020-93 = "[s3] \"ขอโทษที่ไม่ได้มาหาบ่อยๆ นะ\"\n[s4] \"ช่วงนี้งานครูลดลงไปเยอะเลยละ\""
22020-96 = "ไม่เป็นไรหรอก ฉันรู้ดีว่าคุณครูก็งานรัดตัวอยู่ตลอด... พวกฉันมากกว่าที่ต้องขอบคุณที่คุณครูมา#nหากันแบบนี้~"
22020-97 = "เข้าเรื่องเลยละกัน! คุณครูช่วยเสนอความเห็นเกี่ยวกับไอเดียของผลงานชิ้นต่อไปให้หน่อยได้ไหม~?"
22020-98 = "พวกเราคุยกันในชมรมว่าคุณครูอาจจะมีไอเดียแจ่มๆ ก็ได้น่ะ~"
22020-99 = "ก็เลยชวนคุณครูมาในวันนี้ไง!"
22020-100 = "[s] \"อ่อ... อืม... รู้สึกกดดันอยู่นะเนี่ย...\""
22020-102 = "[ns] \"แต่เดี๋ยวนะ เมื่อกี้เอาแต่เล่นเกมต่อสู้อย่างเดียวเลยไม่ใช่เหรอ...?\""
22020-103 = "อ๊ะ นั่นเป็นไอเดียของพี่เขาน่ะค่ะ"
22020-104 = "อื้ม! เพื่อการวิเคราะห์ไง จะได้ศึกษาข้อดีข้อเสียของเกมอื่น!"
22020-105 = "เพราะถ้าเริ่มจากศูนย์ ต่อให้รวมหัวกันคิดแทบตายก็อาจจะไม่ได้ผลลัพธ์อะไรก็ได้"
22020-106 = "ฉันก็เลยเสนอให้ลองเล่นเกมฮิตหลายๆ เกม แล้วคิดหาไอเดียจากเกมพวกนั้น มันก็เป็นอย่างนี้แหละค่ะ"
22020-107 = "[s] \"ฟังดูมีเหตุผลนะ\""
22020-108 = "ฮิฮิ! ใช่ไหมล่ะ?! โดยเฉพาะเกมนี้ที่เพิ่งเล่นกับคุณครูไป"
22020-109 = "<คาซิโอเปีย~ วูฟารูฟาแบตเทิล~> เป็นหนึ่งในเกมต่อสู้ที่ได้รับความนิยมมากที่สุด เรียกได้ว่าเป็นเกมที่มี#nเอกลักษณ์ในหลายแง่มุมเลยละ!"
22020-110 = "ด้วยความที่มันเป็นเกมที่มีอะไรให้เอาเป็นแบบอย่างเยอะ ฉันเลยมองว่าถ้าเราสามารถเจาะลึก และวิเคราะห์#nมันได้ละก็!"
22020-111 = "เราก็จะออกไอเดียที่บรรเจิดสำหรับผลงานชิ้นใหม่ได้แน่นอน!"
22020-112 = "ผลงานชิ้นต่อไปของพวกเราคือ <เกม RPG ลงดันเจี้ยนที่ดีต่อใจ ที่ให้ตัวละครได้ทำเควส และสนุกสนานไปกับการปลูกผัก ตกปลา> ค่ะ"
22020-113 = "[s] \"หืม?! แต่จะใส่องค์ประกอบของเกมต่อสู้เข้าไปด้วยเหรอ?!\""
22020-114 = "พูดอะไรของคุณครูน่ะ!"
22020-115 = "แน่นอนว่าในสายตาของคนทั่วไป อาจมองว่าเกมดันเจี้ยน RPG กับเกมต่อสู้ไม่มีความเชื่อมโยงกันก็ได้ แต่ถึงยังไงก็เถอะ..."
22020-116 = "[s] \"แต่ถึงยังไงก็เถอะ...?\""
22020-117 = "ฮิฮิ! เราจะมองแค่ภายนอกแล้วตัดสินไม่ได้สิ!"
22020-118 = "ถ้าอยากได้รางวัลในมิลเลเนียมไพรซ์ครั้งต่อไป เราต้องทำในสิ่งที่ท้าทายที่ไม่มีใครคาดคิดมาก่อน!"
22020-119 = "โดยสรุปแล้ว เราต้องละทิ้งความยึดติด ขจัดความเห็นส่วนตัว และก้าวข้ามอคติ ถึงจะออกไปแตะขอบฟ้า#nได้...!"
22020-120 = "ถ้าเราเอาองค์ประกอบของ 2 สิ่งที่ดูไม่เกี่ยวข้องกันเลยมารวมกันได้ นี่อาจจะเป็นไอเดียเกมสนุกๆ ได้เลยนะคะ"
22020-121 = "อ๊ะ! มิโดริ! เอาบทของฉันไปพูดได้ยังไง!"
22020-122 = "ก็พี่ชอบพาออกทะเล ฉันก็เลยพูดแทนให้ไง"
22020-123 = "แง... เกินไปแล้วนะ~"
22020-124 = "[s] \"อืม ยังไงก็เถอะ ทุกคนดูจริงจังกับการทำกิจกรรมชมรมน่าดูเลยนะ\""
22020-125 = "หืม?"
22020-126 = "อ่า..."
22020-127 = "ฮิฮิฮิ!"
22020-128 = "มันก็แน่นอนอยู่แล้ว!"
22020-129 = "ไม่ใช่แค่ฉันกับพี่นะคะ ทั้งยูสึจังกับอาริสึจังก็ช่วยกันด้วย..."
22020-130 = "เราสัญญากันไว้แล้วว่าจะคว้ารางวัลจากมิลเลเนียมไพรซ์ครั้งหน้ามาให้ได้ค่ะ"
22020-131 = "อืม จะมองว่านั่นคือ <เควส> ที่พวกเราได้รับมาก็ได้!"
22020-137 = "โมโมอิ! มิโดริ! คุณครู! เกิดเรื่องด่วนแล้วละค่ะ!"
22020-138 = "[s] \"ว่าไงอาริสึ มีเรื่องอะไรเหรอ?\""
22020-139 = "หืม? จู่ๆ ก็เกิดอะไรขึ้นงั้นเหรออาริสึ?"
22020-140 = "ยูสึแข่งแบทเทิลออนไลน์ชนะ 10 ครั้งติดต่อกันแล้วค่ะ!"
22020-141 = "หืม? จริงเหรอ?"
22020-142 = "ว่าไงนะ? ชนะ 10 ตารวดในเกมที่บาลานซ์พังแบบนั้นเนี่ยนะ?!"
22020-160 = "「WINNER! Player UZQueen!」"
22020-165 = "เฮ้อออ..."
22020-166 = "เท่สุดๆ ไปเลย! ยูสึ!"
22020-167 = "สงสัยต้องเรียกว่าเทพยูสึจังแล้วรึเปล่าเนี่ย"
22020-169 = "อาริสึก็ประทับใจมากค่ะ สมแล้วที่เป็นผู้กล้าในตำนาน UZQueen!"
22020-170 = "หะ... หะ... หืม......?"
22020-171 = "[s] \"ยูสึ! เยี่ยมมาก! ชนะแบบเพอร์เฟกต์เลยนะเนี่ย!\""
22020-172 = "ใช่ไหมล่ะ? ถ้าอยู่ใน <โหมด UZQueen> ละก็ ยูสึคนขี้อายที่ชอบแอบในตู้ก็จะหายไปเลยละ!"
22020-173 = "[s] \"มะ... โหมด UZQueen?\""
22020-174 = "ฉันอธิบายให้! <โหมด UZQueen> ก็คือ! สกิลบัฟที่จะทำงาน เมื่อยูสึอยู่ในสถานการณ์พิเศษ!"
22020-175 = "ส่งผลให้มีความกล้ามากขึ้นและมีความมั่นใจมากกว่าปกติ... สมองไวขึ้นกว่าปกติ 150%! ประสิทธิภาพ#nของสายตาเพิ่มขึ้น 280%!"
22020-176 = "ไปมีบัฟแบบนั้นตั้งแต่เมื่อไรกันน่ะ?"
22020-177 = "อาริสึรู้ค่ะ! ตอนอยู่ในโหมด UZQueen ยูสึแข็งแกร่งมากค่ะ! อาริสึเองก็อยากได้สกิลแบบ โหมด UZQueen บ้างค่ะ! "
22020-178 = "[s] \"ยอดไปเลย! <โหมด UZQueen>!\""
22020-179 = "คะ... คุณครูก็เป็นไปกับเขาด้วยเหรอ?!"
22020-180 = "คะ... คะ... คือว่า...!  งืออออ!"
22020-181 = "ฉันก็แค่ทำเหมือนตอนปกติเองนะ..."
22020-182 = "พอเห็นผลงานของยูสึแล้ว อาริสึเองก็คงจะอยู่เฉยๆ ไม่ได้แล้วละค่ะ"
22020-183 = "ต่อไปเป็นตาของอาริสึแล้วค่ะ!"
22020-185 = "(จากนั้นอาริสึก็เริ่มเล่นเกมต่อสู้ โดยมีทุกคนคอยดูอยู่ข้างๆ)"
22020-187 = "อาริสึก็จะเป็นผู้กล้าในเกมต่อสู้เหมือนกับโมโมอิ มิโดริ ยูสึ และคุณครูด้วยค่ะ!"
22020-188 = "ฉันว่าพี่โมโมอิน่าจะเป็นมอนสเตอร์ไร้ประโยชน์มากกว่าผู้กล้านะ"
22020-189 = "น้องคนนี้นี่! บางครั้งความจริงมันก็เจ็บปวดนะ!"
22020-190 = "อะ... อาริสึจัง... พยายามเข้านะ!"
22020-191 = "ค่ะ! อาริสึ! จะพยายามค่ะ!"
22020-192 = "(Challengers Next Battle!!)"
22020-194 = "[ns] \"อ๊ะ มีผู้ท้าชิงแล้ว\""
22020-196 = "อาริสึจะโชว์ฝีมือที่ได้ฝึกฝนกับโมโมอิให้เห็นเองค่ะ!"
22020-197 = "ย้าก!"
22020-201 = "ฮึบ! ย้ากก! ย้าก"
22020-207 = "ฝ่ายตรงข้ามหลบหลีกได้ทั้งหมดเลย..."
22020-208 = "ไม่หรอกค่ะ! การโจมตีของอาริสึยังไม่จบแค่นี้ค่ะ!"
22020-209 = "ถ้าโจมตีให้เข้าเป้าแบบนี้ละก็...!"
22020-219 = "หืม?! เมื่อกี้นี้มัน..."
22020-220 = "ตัวละครของอาริสึโจมตีได้เมื่อกี้นี้ แต่ทำไม HP ไม่ลดลงเลยล่ะ?"
22020-221 = "ดะ... เดี๋ยวสิคะ! อาริสึยังสู้ได้อยู่..."
22020-227 = "[ns] \"เอ๋? ตัวละคร... หายไปแล้ว...?\""
22020-228 = "คะ... คะ?"
22020-234 = "การโจมตีกะทันหันจากข้างหลังอาริสึนี่มัน?!"
22020-235 = "อ๊ะ... อ๊ะ! ฮึ่ม! จะ... โจมตี!"
22020-241 = "การโจมตีของอาริสึผ่านฝ่ายตรงข้ามไปแล้วค่ะ!"
22020-243 = "หา??! คราวนี้ตัวละครโปร่งใสขึ้นมาเหรอ?!"
22020-244 = "และต่อไป... ก็ตัวใหญ่ขึ้นจนบังหน้าจอได้ทั้งหมด?!"
22020-245 = "แถมตอนนี้... ขะ... ขอบเขตการโจมตีก็... หายไปด้วย"
22020-254 = "แงงงงง! อาริสึเอาชนะผู้เล่นคนนี้ไม่ได้ค่ะ!"
22020-255 = "[s] \"ครูว่าดูยังไงก็...\""
22020-256 = "ให้ตายสิ! ไอ้เจ้าบ้านี่! แบบนี้มันโกงกันชัดๆ!"
