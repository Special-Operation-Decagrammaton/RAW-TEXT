22020-399 = "อืม... แต่ถ้าใช้วิธีนี้มากเกินไป ความสนุกของเกมก็จะลดลง... และก็จะพาลทะเลาะกันกับ... เพื่อนๆ ได้ ฉันเลยไม่ชอบวิธีนี้เท่าไรน่ะ..."
22020-400 = "แต่ฉันยอมให้อีกฝ่ายใช้สูตรโกงเล่นกับเราไม่ได้... และการหาวิธีโต้กลับก็เป็นส่วนหนึ่งของการเล่นเกม#nอยู่แล้วด้วย"
22020-401 = "อ้อ! การโกงกลับและเล่นนอกกติกาคือส่วนหนึ่งของการเล่นเกม! อาริสึเข้าใจแล้วค่ะ!"
22020-402 = "แน่นอนว่าถ้าเราได้สู้กับเขาอีกครั้ง และเขาหาสูตรโกงมาโต้กลับวิธีที่ใช้เมื่อกี้ได้... เราก็คงต้องลำบากกันอีก"
22020-403 = "แต่ถึงจะโดนตอกกลับมา... เราก็แค่ต้องสู้ใหม่ให้ชนะ"
22020-404 = "อืม ก็เราเป็นเกมเมอร์นี่นา"
22020-405 = "[s] \"สุดยอดไปเลย ยูสึ\""
22020-406 = "อ๊ะ... คะ... คุณครูก็ชมกับเขาด้วยเหรอคะ... ไม่ใช่เรื่องใหญ่อะไรเลยค่ะ"
22020-407 = "อื้อ! แต่ฉันดีใจมากเลยนะที่เราชนะในตอนท้าย!"
22020-408 = "ไหนๆ เราก็ได้ไอเดียจากสิ่งนี้แล้ว"
