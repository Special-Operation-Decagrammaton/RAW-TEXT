22020-395 = "สะ... สุดยอดเลย...! ไม่สิ คำว่าสุดยอดยังน้อยไปเลย! ยูสึ!"
22020-396 = "ใช่ค่ะ! อาริสึเห็นด้วย! ฉันเฝ้าดูการต่อสู้จนแทบจะลืมหายใจไปเลยละค่ะ!"
