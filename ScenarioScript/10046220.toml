[translation]
10046220-3 = "Ah, hahaha... Hello."
10046220-4 = "Hey! You're the tank thief!"
10046220-5 = "What?! Is that how you remember me?!"
10046220-6 = "Are you planning something? Maybe commandeering a speedboat this time?"
10046220-7 = "N-No! It's the opposite! The opposite of...being bad, that is!"
10046220-8 = "We're here to help!"
10046220-9 = "\"We\"... As in...?"
10046220-10 = "The Make-Up Work Club! We want to lend a hand with the beach patrol."
10046220-11 = "That's...very kind. Why?"
10046220-12 = "Why? Well, we voted on it. It was unanimous."
10046220-13 = "The Justice Task Force always steps up for Trinity...so we thought we should try to give you all a break. ...So you could rest a little!"
10046220-14 = "Ahaha... But I can't take all the credit. That's not fair."
10046220-15 = "It was actually Azusa and Koharu's idea."
10046220-16 = "Koharu?"
10046220-17 = "Yes. I think she feels guilty because she gets to relax while the rest of the Justice Task Force is so busy."
10046220-18 = "Haha. That sounds like Koharu."
10046220-19 = "But, even Azusa...?"
10046220-20 = "...Well, there's no use trying to figure THAT one out."
10046220-21 = "I'd greatly appreciate your help."
10046220-22 = "So, it's fine?"
10046220-23 = "I've been pretty swamped. I'm actually eager for the help."
10046220-24 = "But, where are the Make-Up Work Club members...?"
10046220-25 = "Um... I don't know. We decided to split up and look for you."
10046220-26 = "Aha. Then we'll have to keep an eye out while on patrol!"
10046220-27 = "Haha... It seems I only increased your workload..."
10046220-28 = "While I'm not that much help on my own..."
10046220-29 = "...you can count on me to do my best!"
