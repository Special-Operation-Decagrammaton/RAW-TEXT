[translation]
2902-1 = "เหล่าเด็กสาวจึงได้มารวมตัวกัน 2"
2902-2 = "ว้าวว!"
2902-10 = "ที่นี่คือห้องของชมรมวิจัยศาสตร์นินจาที่เขาเลื่องลือกันสินะคะ...!"
2902-12 = "สึคุโยะ มานี่หน่อยสิ"
2902-16 = "คะ...?"
2902-22 = "ทำยังไงดีล่ะสึคุโยะ! มีเด็กน่าสงสัยมาที่นี่จนได้! ถึงจะหน้าตาน่ารักก็เถอะ!"
2902-23 = "คะ...คะ...? น่าสงสัยเหรอคะ...?"
2902-24 = "ก็นะ... ชมรมวิจัยศาสตร์นินจาที่ไม่มีใครรู้จักแบบนี้"
2902-25 = "ไม่อยากเชื่อเลยว่าจะมีคนที่อยากจะเข้าชมรมนี้ด้วย ดูยังไงๆ มันก็น่าสงสัยอยู่นะ..."
2902-26 = "น่าสงสัยแบบโจ่งแจ้ง น่าสงสัยสุดๆ เลย!"
2902-27 = "คะ... คือ... ตะ... แต่ว่า ฉันเองก็สมัครเข้ามานะคะ..."
2902-28 = "นั่นข้าน้อยเป็นคนไปคัดเลือกสึคุโยะมาเองเลยนี่ แบบนั้นไม่นับนะ! ไม่นับ!"
2902-29 = "อ๊ะ คะ...ค่ะ!"
2902-30 = "เฮือก?! หรือว่าจะ... เป็นนักฆ่าที่เฮียกกะเรียวรันหรือชมรมหยินหยางส่งมา?!"
2902-34 = "อืม! แน่นอนว่า! ไม่มีทางเป็นแบบนั้นอยู่แล้ว...!"
2902-35 = "อะ... อาจจะเพราะเพิ่งเจอกันครั้งแรก ก็เลยอาจจะน่ากลัวไปหน่อย"
2902-39 = "แต่ถึงอย่างนั้นก็เถอะ อุตส่าห์มีคนมาหาทั้งที..."
2902-40 = "นะ... นี่อาจจะเป็นก้าวแรกของการทำให้ชมรมของเรากลายเป็นชมรมอย่างเป็นทางการก็ได้นะคะ...!"
2902-41 = "อืม... เรื่องที่ได้สมาชิกมาเพิ่มเป็นเรื่องดีก็จริง แต่จะให้รับใครก็ไม่รู้เข้ามานั่นมันก็..."
2902-45 = "เอาละ ข้าน้อยตัดสินใจแล้ว"
2902-49 = "เราจะทำการสัมภาษณ์พิเศษกัน!"
2902-51 = "สะ... สัมภาษณ์พิเศษหรอคะ...?"
2902-52 = "อืม! เราจะทดสอบว่าเด็กคนนั้นเหมาะที่จะมาเข้าร่วมชมรมวิจัยศาสตร์นินจากับพวกเราหรือเปล่า!"
2902-54 = "ก็เลยคิดว่าต้องสัมภาษณ์สักหน่อย โอเคหรือเปล่าล่ะคุณอิซุนะ?"
2902-55 = "กะไว้แล้วเชียว... ถ้าเป็นนินจาครึ่งๆ กลางๆ ก็อาจจะส่งผลเสียต่อภารกิจได้... อย่างนั้นสินะคะ!"
2902-56 = "อิซุนะไม่มีปัญหาค่ะ!"
2902-57 = "หืม? งั้นเหรอ? ถ้างั้นก็ดีแล้วละนะ"
2902-58 = "จะ...จริงด้วยสึคุโยะ ไหนๆ ก็มีแขกมาทั้งที ไปเอาเครื่องดื่มมาเสิร์ฟหน่อยสิ"
2902-59 = "คะ...ค่ะ!"
2902-67 = "ชะ... ชะ... ชะ... เชิญค่ะ..."
2902-73 = "ฉะ... ฉะ... ฉะ... ฉัน อะ... อะ... อะ... เอา... คะ... คะ... คะ... เครื่องดื่มมาให้ค่ะ..."
2902-75 = "อ๊ะ ค่ะ!"
2902-80 = "ถะ... ถึงจะเป็นแค่น้ำธรรมดา ตะ... แต่ก็เชิญดื่มได้เลยค่ะ..."
2902-82 = "อ๊ะ ขอบคุณนะคะ! นินนิน!"
2902-83 = "นิ... นินนิน...! พะ... เพิ่งจะเคยได้ยินเลยค่ะ!"
2902-84 = "อ๊ะ ต้องขออภัยด้วยค่ะ คือว่า... ที่นี่แม้แต่ชาก็ไม่มี น่าขายหน้าจริงๆ ค่ะ..."
2902-85 = "ขะ... ขอโทษด้วยนะคะ ทะ... ที่นี่มีแต่น้ำประปา..."
2902-86 = "หรือว่า นี่จะเป็นน้ำประปาสำหรับใช้ต้อนรับแขก..."
2902-87 = "ฮะ... เฮือก ขะ... ขอโทษค่ะ...! มีแขกมาทั้งที แต่กลับต้อนรับด้วยน้ำเปล่าแบบนี้...?!"
2902-88 = "มะ... ไม่ได้จะดูถูกนะคะ...! เพียงแต่ว่าแถวนี้ไม่มีร้านชา ก็เลย...!"
2902-89 = "แล้วพวกเราก็ไม่มีเงินสนับสนุนชมรมด้วยค่ะ... ฮึก...!"
2902-91 = "ไม่เป็นไรนะ! สึคุโยะ! ไม่เป็นไรหรอก!"
2902-92 = "น้ำประปาถ้าจะคิดในอีกแง่หนึ่งก็คือ <เครื่องดื่มของสังคม> ที่หน่วยการประปาจัดเตรียมให้ละนะ! ใช่แล้ว! เพราะงั้น! ไม่เป็นไรหรอก! มั้งนะ!"
2902-93 = "ฉะ... ฉันไม่รู้ความหมายหรอกค่ะ ทะ... ท่านหัวหน้า...!"
2902-95 = "สุดยอดไปเลยค่ะ!"
2902-96 = "หืม...?"
2902-97 = "...คะ...?"
2902-98 = "อิซุนะ เคยเห็นอะไรแบบนี้ในละครนินจาสมัยก่อนด้วยค่ะ!"
2902-99 = "ถ้าเป็นนินจาตัวจริงละก็ แค่น้ำเย็นก็เพียงพอแล้ว...! ถ้ามากไปกว่านั้นจะนับว่าเป็นความฟุ่มเฟือย!"
2902-100 = "แม้แต่เรื่องนั้นก็เอามาปรับใช้ในชีวิตประจำวันด้วยสินะคะ ยิ่งกว่าที่ได้ยินจากข่าวลืออีก... ชมรมวิจัยศาสตร์นินจาสุดยอด! อิซุนะ! ประทับใจมากเลยค่ะ!"
2902-101 = "อ่า งะ...งั้นเหรอ?"
2902-102 = "ฮึ่ม... เอาเป็นว่าเรามาเข้าเรื่องกันเลยเถอะ..."
2902-103 = "คุณอิซุนะ หาห้องชมรมของเราเจอได้ยังไงเหรอ?"
2902-104 = "ให้พูดเองมันก็ยังไงๆ อยู่น่ะ ก็ห้องชมรมวิจัยศาสตร์นินจาของเราอยู่ในพื้นที่ห่างไกลของเฮียกคิยาโค#nซะขนาดนั้นนี่นา"
2902-105 = "เดินทางก็ลำบาก แถมสิ่งอำนวยความสะดวกต่างๆ ก็ไม่ค่อยจะมี..."
2902-106 = "(แน่นอนว่าทั้งหมดก็เพื่อหลีกเลี่ยงพวกน่ารำคาญอย่างเฮียกกะเรียวรันกับชมรมหยินหยางหรอกนะ...)"
2902-108 = "ชะ... ใช่ค่ะ เป็นเพราะว่ารู้สึกลำบากใจ ก็เลยมาอยู่ในสถานที่ห่างไกลและเดินทางลำบาก ถ้าขึ้นรถ#nโดยสารไม่ทันก็อาจจะมาไม่ถึงโรงเรียนด้วยค่ะ..."
2902-109 = "อะ... อาคารเรียนเก่า บะ... บางครั้งน้ำก็ไม่ไหล ไฟฟ้าก็ดับด้วย ข้างๆ ก็ไม่มีร้านสะดวกซื้อสักร้านเดียว ถะ... ถึงจะลำบากขนาดนั้นก็ตาม..."
2902-110 = "สึคุโยะ นั่นไม่ได้ตั้งใจพูดเสียงดังให้ข้าน้อยได้ยินใช่มั้ยน่ะ?!"
2902-111 = "ตะ... แต่ก็เป็นสถานที่ที่ดีนะคะ!"
2902-112 = "พะ... พอตกกลางคืนก็เห็นดาวบนฟ้าได้ชัด แล้วก็เงียบสงบดีทำให้ ทะ... ท่านหัวหน้าสามารถถ่ายทำ#nวิดีโอวิชานินจาได้สะดวก...!"
2902-113 = "อ่า ใช่แล้ว... ไม่ว่าจะทำอะไรก็ไม่ถูกร้องเรียน นั่นละเยี่ยมที่สุด"
2902-114 = "โดยเฉพาะวิชานินจาที่ข้าน้อยคิดค้นขึ้นมาอันล่าสุด <เปลวอัคคีประกายแสง> ยังไงล่ะ~ เรียกว่าเป็น#nผลงานของตัวเองได้มั้ยนะ~"
2902-116 = "การฝึกฝนเพื่อสร้างวิถีนินจาของตัวเอง...!"
2902-117 = "หืม...?"
2902-118 = "อ๊ะ จริงด้วย! ที่อิซุนะหาที่นี่เจอก็เพราะว่าเจอเบาะแสนี้อยู่ตรงถนนค่ะ!"
2902-122 = "อ๊ะ นั่นมัน…"
2902-126 = "อ๊ะ! นึกออกแล้ว! ใบปลิวโปรโมตชมรมที่ข้าน้อยเอาไปติดไว้เมื่อครึ่งปีก่อนนี่!"
2902-127 = "รหัสลับที่อยู่บนใบปลิวนี้เป็นรหัสที่อยู่ในหนังของผู้กำกับชื่อดัง ราชาชิบะ เรื่อง <นินจากับสุนัขชิบะ> ใช่หรือเปล่าคะ?"
2902-128 = "เดี๋ยวนะ?! นี่ดูออกด้วยงั้นเหรอ?!"
2902-129 = "สะ...สุดยอดเลยค่ะ!"
2902-131 = "(ถ้าดูออกก็หมายความว่าชอบหนังเรื่องเดียวกัน... ถึงข้าน้อยจะตั้งใจทำขึ้นมาแบบนั้นก็เถอะ...)"
2902-132 = "(จนถึงตอนนี้ก็ไม่มีใครที่เห็นใบปลิวแล้วมาที่ชมรมเลยสักคน มีแต่พวกเฮียกกะเรียวรันกับชมรม#nหยินหยางที่มาโวยวายบอกว่ามันผิดกฎเท่านั้น นึกว่ามันจะล้มเหลวไปแล้วซะอีก...)"
2902-133 = "(ดูออกด้วยงั้นเหรอ...หรือว่าเด็กคนนี้...?)"
2902-135 = "อะแฮ่ม ไม่ธรรมดาจริงๆ...! ถ้าอย่างนั้นคำถามที่สอง"
2902-136 = "นี่เป็นคำถามที่สำคัญที่สุดเลยนะ..."
2902-137 = "อ๊ะ! เข้าใจแล้วค่ะ! เอื้อก! (กลืนน้ำลาย)"
2902-138 = "คือ... ข้าน้อยอยากรู้ว่าทำไมคุณอิซุนะถึงได้อยากเข้าชมรมวิจัยศาสตร์นินจาของพวกเราน่ะ"
2902-139 = "อ่า ถ้าเรื่องนั้น..."
2902-140 = "ก็เพราะว่าอิซุนะ...! อยากจะเป็นแบบทุกคนที่ชมรมวิจัยศาสตร์นินจายังไงล่ะคะ!"
2902-141 = "เอ๋? แบบพวกเราเหรอ...?"
2902-142 = "คะ...?"
2902-143 = "โดยเฉพาะในคลิปวิดีโออันหนึ่งที่ลงในช่อง <วิถีนินจาสาว มิจิรุจจี้> คลิปนั้น!"
2902-144 = "พอได้ดูคลิป <จงดูซะ! ศาสตร์นินจาทำลายหินในครั้งเดียว! กำเนิดขึ้นแล้ว!> อิซุนะก็ประทับใจมากค่ะ!"
2902-145 = "อ่า ถ้าเป็นอันนั้นก็..."
2902-146 = "นะ... นั่นมันคลิปที่มียอดวิวสูงสุดในช่องเราค่ะ! ทะ... ท่านหัวหน้า!"
2902-147 = "หืมมม~ ก็นะ คลิปนั้นพวกเราก็ทุ่มเทกันมากเลยล่ะ"
2902-149 = "(ที่จริงข้าน้อยเตรียมให้หินแตกออกง่ายๆ ไว้ก่อนแล้ว จากนั้นก็แค่กะจังหวะให้ถูกแล้วทำเป็นใช้แรงทุบ#nหินให้แตกเท่านั้นเอง... แต่ภาพดันออกมาสวยก็เลยมียอดวิวเยอะกว่าปกติ)"
2902-150 = "(อย่างนี้นี่เอง... ดูคลิปในช่องของเราด้วยสินะ)"
2902-151 = "(แล้วก็เลยมาเป็นแฟนคลับของเรา เพราะอยากเป็นแบบพวกเราก็เลยคิดจะมาสมัครเข้าชมรมวิจัย#nศาสตร์นินจาอย่างนั้นสินะ~ อะฮะฮ่า~)"
2902-153 = "อืม...? เดี๋ยวนะ แปลว่าคุณอิซุนะเป็นผู้ติดตามของช่องเรางั้นเหรอ?!"
2902-154 = "ใช่แล้วค่ะ!"
2902-155 = "ทะ... ท่านหัวหน้า...! ผะ... ผู้ติดตามละค่ะ...! พะ... พะ... เพิ่งเคยเจอครั้งแรกเลยค่ะ!"
2902-160 = "ตะ... ต้องบันทึกไว้ อย่างน้อยก็ ถะ... ถะ... ถ่ายรูปเก็บไว้มั้ยคะ!? ดะ... เดี๋ยวเค้าอาจจะหนีไปก็ได้นะคะ!"
2902-161 = "ไม่สิๆ จะพูดเหมือนสึจิโนโกะเหรอ~! มันก็ต้องมีอยู่แล้วสิผู้ติดตามน่ะ! ถึงข้าน้อยจะตกใจเหมือนกันก็เถอะ!"
2902-162 = "พอได้ดูคลิปนั้นแล้ว อิซุนะก็คิดว่าถ้าได้อยู่ด้วยกันกับทุกคนจะต้องเป็นนินจาที่ยอดเยี่ยมที่สุด#nในคิโวทอสได้แน่ๆ ค่ะ!"
2902-163 = "หืม...?"
2902-164 = "นะ... นินจาที่ ยะ... ยอดเยี่ยมที่สุดในคิโวทอส...เหรอคะ?"
2902-165 = "ถะ... ถึงฉันจะไม่แน่ใจเหมือนกัน แต่ว่าคุณอิซุนะ สะ... สุดยอดมากเลยค่ะ...!"
2902-166 = "นินจาที่ยอดเยี่ยมที่สุดในคิโวทอสเหรอ... อืม จะว่ายังไงดี..."
2902-167 = "อืม...! รสนิยมดีนะเนี่ย! ถ้าเป็นนินจาดั้งเดิมละก็ ต้องปณิธานแน่วแน่แบบนี้แหละ!"
2902-168 = "ทั้งความสามารถในการจำผลงานของผู้กำกับชิบะได้ตั้งแต่ครั้งแรกที่เห็น... และยังมีความมุ่งมั่นที่จะ#nเป็นเหมือนพวกเราอีก..."
2902-172 = "ไม่มีอะไรที่ต้องสงสัยอีกแล้ว...!"
2902-173 = "คุณอิซุนะก็เป็นพวกเดียวกันกับเราสินะ!"
2902-175 = "ใช่ค่ะ...! อิซุนะเองก็ดีใจมากๆ ที่เราได้พบกันนะคะ!"
2902-176 = "หรือว่าจะเป็น สะ... สมาชิกมากความสามารถที่ท่านหัวหน้าตามหา...!"
2902-178 = "แน่นอนว่าอิซุนะ อาจจะยังไม่ใช่นินจาที่เก่งกล้าเหมือนกับทุกคนในชมรมวิจัยศาสตร์นินจา!"
2902-179 = "เอ๋~ ก็ไม่ถึงขนาดนั้นหรอกน้า~"
2902-180 = "คุณอิซุนะกับพวกเราก็ไม่ได้แตกต่างกันหรอก~"
2902-181 = "คะ...? แต่ว่าอิซุนะยังมีอะไรต้องเรียนรู้อีกมาก..."
2902-182 = "ถึงขนาดที่เห็นใบปลิวของพวกเราแล้วมาถึงที่นี่ได้เลยนี่นา แบบนั้นก็หมายความว่าคุณอิซุนะเองก็#nชอบนินจามากเลยใช่มั้ยล่ะ?"
2902-183 = "...!!"
2902-184 = "ใช่ค่ะ...! อิซุนะชอบนินจามากๆ เลยละค่ะ!"
2902-185 = "ถึงแม้ว่าเมื่อก่อนจะไม่มีใครเข้าใจเลยสักคน มีแค่อิซุนะคนเดียวมาตลอด..."
2902-186 = "มีอยู่วันหนึ่งอิซุนะถูกคนร้ายที่พยายามจะทำลายงานเทศกาลหลอกใช้และบอกว่าเป็นคนโง่เง่า..."
2902-190 = "(คนร้ายที่พยายามจะทำลายงานเทศกาล? งานอดิเรกถูกมองว่าเป็นเรื่องโง่เง่า...?)"
2902-191 = "(อ่า หรือว่าหมายถึงคอมิเซ็นงั้นเหรอ?)"
2902-192 = "(ถ้าพูดถึงคนร้ายที่ไปที่คอมิเซ็นแล้วละก็...)"
2902-194 = "คุณอิซุนะ พวกคนร้ายที่ว่าน่ะ..."
2902-195 = "ใช่พวกที่ก่อให้เกิดความไม่สงบและสร้างความเสียหายที่งานเทศกาลเพื่อประโยชน์ส่วนตัวรึเปล่า?"
2902-196 = "ใช่แล้วค่ะ! อิซุนะอธิบายแค่นี้แต่ก็เข้าใจได้เลย...! ทำได้ยังไงคะ...?"
2902-197 = "ก็นะ ไม่ว่าที่ไหนๆ มันก็มีพวกแบบนั้นอยู่ยังไงล่ะ"
2902-198 = "พวกที่คิดว่าตัวเองเป็นวัฒนธรรมกระแสหลัก หรือวัฒนธรรมชั้นสูงแล้วมองว่าคนอื่นเป็นพวกโง่งมไป#nซะหมด!"
2902-199 = "เชื่อเขาเลย สนุกไปกับความชอบของตัวเองและเคารพความชอบของคนอื่นด้วยไม่ได้รึยังไง! สุดท้ายคนที่ต้องลำบากก็คือตัวเองและคนรอบข้างทั้งนั้น"
2902-200 = "ระ...หรือว่า...! บนโลกจะเต็มไปด้วยวายร้ายเหมือนกับเนียนเต็นมารุ...!"
2902-201 = "ไม่คิดเลยว่าโลกของนินจาจะโหดร้ายถึงขนาดนั้น... อิซุนะได้เรียนรู้เพิ่มอีกอย่างแล้วละค่ะ!"
2902-202 = "แต่ถึงจะต้องเจอเรื่องแบบนั้นอิซุนะก็ยังชอบนินจาอยู่ใช่ไหมล่ะ? เป็นอะไรที่สุดยอดมากเลยนะ"
2902-204 = "ถะ... ถ้าเป็นฉันละก็คงจะรู้สึกแย่มากเลยค่ะ! คะ... คงจะไม่อยากคิดถึงเรื่องนินจาอีกเลยในตอนนั้น!"
2902-205 = "แต่ว่าคุณอิซุนะ..."
2902-206 = "เรื่องนั้น..."
2902-207 = "พอดีว่าอิซุนะโชคดีที่ได้เจอนายท่านเข้าน่ะค่ะ!"
2902-208 = "เอ๋...?"
2902-210 = "(อยู่ระหว่างการอธิบายแบบนินจา)"
2902-212 = "...เพราะอย่างนั้น! อิซุนะก็เลย! ได้เป็นนินจาของนายท่านค่ะ!"
2902-213 = "อ่า อื้อ ก็ดีนะ อืม..."
2902-218 = "(เหมือนได้ฟังมหากาพย์การต่อสู้ครั้งยิ่งใหญ่ยังไงไม่รู้ ไม่สิ ยิ่งกว่านั้นอีก...)"
2902-219 = "(เชื่อใจกันถึงขนาดที่เรียกว่านายท่านเหรอ? เล่นบทบาทสมมติกันรึเปล่านะ?)"
2902-221 = "อืม คุณครูจากชาเล่ต์ เหมือนเคยได้ยินจากที่ไหนมาก่อนเลยนะ..."
2902-222 = "ทะ... ทะ... ท่านหัวหน้า... ฮึก ฮึก... ฮือ..."
2902-223 = "เอ๊ะ สึคุโยะ ร้องไห้เหรอ...?"
2902-224 = "คะ... คุณอิซุนะต้องผ่านความทุกข์ยากแบบนั้นมา... ฉัน... ปะ... ประทับใจมากเลยค่ะ..."
2902-225 = "คุณอิซุนะ...! ผะ... ผ่านเรื่องโหดร้ายอย่างนั้นมาสินะคะ!"
2902-226 = "ใช่แล้วค่ะ! ถึงจะเป็นเรื่องที่เจ็บปวด แต่ตอนนี้อิซุนะก็ไม่เป็นไรแล้วละค่ะ"
2902-227 = "เป็นเพราะเรื่องนั้น เลยทำให้ได้เจอกับนายท่านและได้เดินตามความฝันต่อไปค่ะ!"
2902-228 = "...!! ช่างเป็นเรื่องราวที่งดงามจริงๆ นะคะ! จริงมั้ยคะ! ท่านหัวหน้า?!"
2902-229 = "อืม ก็... ฟังแค่ครั้งเดียวอาจจะเข้าใจยากไปหน่อยน่ะนะ"
2902-230 = "แต่ก็รับรู้ได้ถึงความจริงใจของคุณอิซุนะเลยนะ! มันเป็นเรื่องราวที่ดีมากเลย! สุดยอดมาก!"
2902-231 = "นายท่านของคุณอิซุนะเป็นใครกันนะ ชักจะอยากเจอแล้วละสิ!"
2902-232 = "อ๊ะ ถ้ามีโอกาสละก็หวังว่าจะได้เจอกันนะคะ!"
2902-236 = "ก็นั่นละค่ะ เพราะเรื่องราวต่างๆ อย่างที่บอกไป สุดท้ายอิซุนะก็เลยมาที่ชมรมวิจัยศาสตร์นินจาค่ะ!"
2902-237 = "นี่พอจะเป็นคำตอบได้มั้ยคะ?"
2902-242 = "ทะ...ท่านหัวหน้า?"
2902-243 = "คุณอิซุนะ... ไม่สิ อิซุนะ! นี่มันไม่ใช่แค่พอจะเป็นคำตอบได้หรือเปล่าหรอกนะ!"
2902-244 = "เรื่องที่เธอเจอ! ชีวิตที่ผ่านมา! ความฝันของเธอทั้งหมดนั่นน่ะ!"
2902-245 = "ทั้งหมดนั่นคือวิถีนินจาเลยละ!"
2902-247 = "ตั้งแต่นี้เป็นต้นไป อิซุนะ เธอคือสมาชิกชมรมวิจัยศาสตร์นินจา! เป็นแบบนี้คงไม่ว่าอะไรสินะ สึคุโยะ?!"
2902-248 = "ใช่แล้วค่ะ! คุณอิซุนะ... ไม่สิ อิซุนะจัง! ยินดีต้อนรับสู่ชมรมวิจัยศาสตร์นินจานะคะ!"
2902-249 = "อ่า ฉะ... ฉัน... ได้เป็นสมาชิกชมรมวิจัยศาสตร์นินจา..."
2902-253 = "ค่ะ! อิซุนะ! ขอฝากตัวในฐานะสมาชิกของชมรมวิจัยศาสตร์นินจาด้วยนะคะ!"
2902-254 = "หัวหน้า...! ท่านสึคุโยะ...!"
2902-255 = "ทะ... ท่านหัวหน้าเหรอ? พอคนอื่นนอกจากสึคุโยะเรียกแบบนั้นแล้วมันไม่ชินยังไงก็ไม่รู้แฮะ..."
2902-256 = "อืม ดีล่ะ! ตามนั้นเลย!"
2902-257 = "ทะ... ท่านสึคุโยะเหรอคะ หะ... แหะๆๆ..."
2902-258 = "ฉะ... ฉันเองก็ขอฝากตัวด้วยนะคะ อิซุนะจัง..."
2902-259 = "ได้เลยค่ะ! อิซุนะก็จะอยู่ที่นี่กับทุกคน!"
2902-260 = "และจะเป็นสุดยอดนินจาแห่งคิโวทอสให้ได้เลยค่ะ! นินนิน!"
2902-261 = "แน่นอนอยู่แล้ว! มุ่งไปสู่การเป็นชมรมทางการ! และเพิ่มผู้ติดตามช่อง <วิถีนินจาสาว มิจิรุจจี้> ให้ถึงหนึ่งร้อยคน!"
2902-262 = "ค่ะ! มาพยายามไปด้วยกันนะคะ!"
2902-263 = "ค่ะ! นินนิน~!"
2902-270 = "(ด้วยเหตุนี้เหล่าเด็กสาวที่ต่างโอบอุ้มความฝันของตัวเองไว้จึงได้มารวมตัวกัน กว่าพวกเธอได้เจอกับ#nคนที่เรียกว่า <นายท่าน> ก็เป็นเรื่องราวหลังจากนั้น......)"
2902-271 = "เหล่าเด็กสาวจึงได้มารวมตัวกัน"
