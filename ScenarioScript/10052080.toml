10052080-142 = "อะไรกันคะเนี่ย ติดต่อเข้ามาพูดจาเรื่อยเปื่อยตามใจชอบ แล้วนึกจะไปก็ไปดื้อๆ..."
10052080-143 = "พอมาคิดดูดีๆ แล้ว คนที่บุ่มบ่ามติดต่อเข้ามาตามอำเภอใจ ก็คือเด็กพวกนั้นด้วยนี่คะ?!"
