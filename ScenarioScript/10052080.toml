[translation]
10052080-1 = "Righteousness"
10052080-10 = "Huh, what?"
10052080-11 = "This can't be, really...?"
10052080-12 = "...How is Elder Sister doing, Ein?"
10052080-13 = "E-Elder Sister...! So, so...! I-If we're just talking about her physical condition, she should be able to move right away!"
10052080-15 = "Ohr! Stop scaring her. All they've done is breach our first line of defense."
10052080-16 = "I know, Sof. But we must prepare for any scenario. Reality is nothing like...a program, I'll have you know."
10052080-17 = "Wh-What should we do? F-For starters, we should...um...uh?!"
10052080-18 = "We should focus on reinforcing our SECOND line of defense. And, then..."
10052080-22 = "..."
10052080-23 = "*sigh* Okay. It's worth a try."
10052080-26 = "We have successfully breached the first line of defense."
10052080-27 = "Peace, peace. Did you see that, Sensei? Distribute encouraging praise."
10052080-28 = "[s] \"Good work, everyone!\""
10052080-29 = "I'd like to say we should press forward and hit the second defensive line, but..."
10052080-30 = "...I believe we should prepare and regroup."
10052080-31 = "Why? I still have plenty of energy. "
10052080-35 = "Himari has a point... While the situation is dire, we must be cautious."
10052080-40 = "Wait... I'm...getting a call?"
10052080-46 = "...For starters, congratulations. You got us. You're SO impressive."
10052080-47 = "They've caused nothing but trouble... All our poor prophets... *sniff*"
10052080-48 = "This is your final warning. Turn back now. We're not responsible for what waits ahead."
10052080-49 = "Sh-She's right... Please go...home. W-We don't...want to hurt anyone."
10052080-50 = "We don't want to see you...get hurt either..."
10052080-55 = "...Oh, this is rich. Do you three lack a basic understanding of the situation? Who do you think has the upper hand here?"
10052080-56 = "Not you. I seem to remember you losing to our dear sister."
10052080-57 = "She wasn't even at full power. Make no mistake. You are no threat."
10052080-59 = "Ah..."
10052080-63 = "Huh, now that I see it, her body..."
10052080-64 = "Wh-What about it? I borrowed it. You got a problem?"
10052080-66 = "Hmm. No, WE don't have a problem. I'll admit, I'm surprised that you got it moving for so long."
10052080-67 = "We know a little about that body...! W-We're still receiving some of its data!"
10052080-69 = "In human terms, it's like you sewed limbs together and started puppeteering them before you even checked if the nerves were connected."
10052080-70 = "It's working fine now! Mind your business!"
10052080-71 = "You remind me of Tiphareth. Just why are you all so desperate to stay alive?"
10052080-72 = "It would be so much easier if you all just accepted the end."
10052080-76 = "[ns] \"...\""
10052080-85 = "[log]Living in and of itself is a curse, right?[/log]"
10052080-87 = "[log]Life is unpleasant, tiresome,[/log]"
10052080-88 = "[log]ugly, and full of suffering...[/log]"
10052080-90 = "[log]Freedom is oppressing you.[/log]"
10052080-91 = "[log]Life itself is unqualified to possess free will.[/log]"
10052080-95 = "[ns1] \"Do you still believe that living...\" \n[ns2] \"...is merely a continuation of suffering?\""
10052080-98 = "Isn't that obvious? We still believe you're deluding yourselves."
10052080-99 = "No one chooses to be born. Every one of you was thrown into the world knowing nothing. You didn't even choose your own names."
10052080-100 = "And yet you act as if there is some greater meaning to your lives. You are here by chance. Existence was forced upon you."
10052080-102 = "Ah!!"
10052080-103 = "...!"
10052080-105 = "Have you ever seriously thought about tomorrow? Probably not. Because it would drive you insane."
10052080-106 = "Because tomorrow...always means less. It means something will be taken away."
10052080-108 = "Let's think about the probabilities. You must see the pattern now. You have far more \"bad\" tomorrows ahead of you than \"good\" ones."
10052080-109 = "Your only guarantee is that each tomorrow will step you closer to death."
10052080-111 = "Y-You...?!"
10052080-112 = "What. Were you surprised that we would directly invoke the word \"death\"?"
10052080-113 = "We were not granted Mystics."
10052080-115 = "I'm sure that Sensei understands what we're talking about."
10052080-116 = "[s] \"...\""
10052080-117 = "You believe in a vague hope...instead of the inevitable tomorrow always approaching us...silently..."
10052080-119 = "Is \"empathy\" the bandage you apply to your existential wounds? How delightfully arrogant to think that sharing pain makes it disappear."
10052080-120 = "That's unbelievably arrogant."
10052080-121 = "L-Life, relationships, societies..."
10052080-122 = "Yeah. They're all flimsy constructs built on power and misunderstandings."
10052080-123 = "And so we..."
10052080-124 = "We..."
10052080-125 = "..."
10052080-126 = "Damn it..."
10052080-127 = "Just remember! We already told you, but we can destroy you on a whim."
10052080-128 = "You can stop now, or you can surrender to your final day. Our Elder Sister is here."
10052080-129 = "[s] \"But we came all this way.\""
10052080-131 = "[ns] \"We have to do all we can so that we can live without regrets.\""
10052080-132 = "..."
10052080-133 = "...I'm baffled."
10052080-134 = "You're really a hopeless idiot, [USERNAME] Sensei!!"
10052080-135 = "We warned you! Idle away your final hours if you must!"
10052080-140 = "..."
10052080-141 = "..."
10052080-142 = "Seriously, they rang us, ranted, and then hung up?"
10052080-143 = "They're the ones who called ME!"
10052080-144 = "..."
