10052080-149 = "นอกจากนี้เราก็ขยายการเคลื่อนไหวไปยังพื้นที่ภายในของดินแดนเหล็กกล้าได้มากขึ้น ถ้านั่นเป็นพื้นที่ที่เราโค่นผู้เลื่อมใสไปแล้ว"
10052080-150 = "หมายความว่าเรายึดครองดินแดนของศัตรูแล้วขยายฐานทัพของเราได้สินะ ถึงจะเป็นเรื่องพื้นฐาน แต่ก็เป็นกลยุทธ์ที่มีประสิทธิภาพเลยละ"
