10052080-98 = "มันก็แน่อยู่แล้วไม่ใช่เหรอคะ? พวกฉันยังคิดว่าพวกคุณกำลังหลอกตัวเองอยู่ค่ะ"
10052080-99 = "ไม่มีใครที่เกิดมาด้วยเจตจำนงของตัวเองหรอกค่ะ ทุกคนล้วนถูกโยนลงมาบนโลกทั้งที่ไม่รู้อะไรเลย แม้แต่ชื่อของตัวเองยังเลือกกันไม่ได้ด้วยซ้ำ"
10052080-100 = "แล้วฉันก็คิดว่าเรื่องนั้นมันพิสูจน์ได้จากความจริงที่ว่า... พวกคุณเองก็ทนรับความไร้ตัวตนของตัวเอง#nกันไม่ไหวอยู่เหมือนกันค่ะ"
10052080-102 = "!!!"
10052080-103 = "...!"
10052080-105 = "เคยคิดอย่างจริงจังเกี่ยวกับวันพรุ่งนี้กันหรือเปล่าล่ะ? ก็คงไม่เคยละนะ ถ้าอย่างนั้นก็คงไม่มีใครใช้ชีวิต#nอย่างปกติสุขได้แล้วละ"
10052080-106 = "นั่นก็เพราะพรุ่งนี้... คือวันที่จะสูญเสียบางอย่างไปยังไงล่ะคะ..."
10052080-108 = "ลองคิดง่ายๆ ในแง่ของความน่าจะเป็นดูนะคะ วันพรุ่งนี้น่ะ เป็นวันที่มีเรื่องร้ายเกิดขึ้นมากกว่าเรื่องดี"
10052080-109 = "และเป็นวันที่เข้าใกล้ความตายเข้าไปอีกก้าวด้วยค่ะ"
10052080-111 = "นะ... นี่พวกคุณ...?!"
10052080-112 = "ทำไมคะ? ตกใจที่ฉันพูดถึง 'ความตาย' ขึ้นมาโต้งๆ งั้นเหรอคะ? แต่นั่นคือคำที่พวกฉันคุ้นเคยดีเลยค่ะ"
10052080-113 = "นั่นก็เพราะว่าพวกฉันไม่เคยได้รับปาฏิหาริย์ใดมาตั้งแต่ต้นแล้วยังไงล่ะคะ"
