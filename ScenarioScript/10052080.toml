[translation]
10052080-1 = "ความยุติธรรม"
10052080-10 = "เอะ... เอ๋?!?!"
10052080-11 = "ได้ยังไงกัน จริงเหรอเนี่ย...?"
10052080-12 = "พี่มัลคูธสภาพเป็นยังไงบ้างคะ... ไอน์?"
10052080-13 = "พะ... พี่มัลคูธ...! คะ... คือว่า...! ตอนนี้แค่จะขยับร่างกายก็ยัง...!"
10052080-15 = "ออร์! ถะ... ถึงเราจะโดนเจาะแนวป้องกันที่ 1 เข้ามาได้ก็จริง แต่ว่าข้อสันนิษฐานนั่นน่ะ มันเกินไปมากแล้วนะ...!"
10052080-16 = "ฉันรู้ค่ะ ซอฟ แต่ยังไงพวกเราก็ต้องเตรียมพร้อมสำหรับสถานการณ์ที่เลวร้ายที่สุดเสมอค่ะ ก็ความเป็นจริง... ไม่ใช่การเขียนโปรแกรมนี่คะ"
10052080-17 = "ทะ... ทะ... ทะ... ทำยังไงดีล่ะคะ? ระ... หรือว่าต้องเสริมแนวป้องกันที่ 2 ก่อน...!"
10052080-18 = "อื้อ เราต้องทุ่มทรัพยากรไปที่แนวป้องกันที่ 2 จากนั้นก็..."
10052080-22 = "..."
10052080-23 = "ฮู่ว ก็ได้ค่ะ อย่างน้อยก็ควรลองดูสักครั้งสินะคะ"
10052080-26 = "ฝ่าแนวป้องกันที่ 1 สำเร็จ ถึงจะยาก แต่เราก็ทำได้สินะ"
10052080-27 = "พีซ พีซเลยค่ะ คุณครูเห็นผลงานของฉันมั้ยคะ?"
10052080-28 = "[s] \"ทุกคนเก่งมากเลยละ!\""
10052080-29 = "ฉันก็อยากเสนอให้เราใช้โอกาสนี้รุกคืบไปยังแนวป้องกันที่ 2 เลยอยู่หรอกนะคะ"
10052080-30 = "แต่ถ้าจะทำตอนนี้ก็คงเกินกำลัง... งั้นเรามาเตรียมกำลังให้พร้อมกันก่อนดีกว่าค่ะ"
10052080-31 = "ทำไมล่ะ? ฉันยังมีแรงสู้อยู่นะ? "
10052080-35 = "ไม่หรอก ฮิมาริพูดถูกแล้วละ จริงอยู่ที่สถานการณ์มันเร่งด่วน แต่พวกเราก็ต้องรอบคอบไว้ก่อน"
10052080-40 = "เดี๋ยวนะคะ... เหมือนมีสัญญาณอะไรเข้ามาเลยค่ะ?"
10052080-46 = "เอาเป็นว่า ขอแสดงความยินดีก่อนแล้วกันค่ะ... ทำผลงานได้น่าประทับใจเลยละค่ะ"
10052080-47 = "เอาแต่ทำให้... เหล่าผู้เลื่อมใสต้องเหน็ดเหนื่อยต่างหาก... (สะอื้น...)"
10052080-48 = "ท้ายที่สุดก็... ขอเตือนเลยนะ ล้มเลิกทุกอย่างตอนนี้แล้วกลับไปซะเถอะ พวกฉันไม่รับประกันหรอกนะ ว่าจะเกิดอะไรขึ้นต่อจากนี้"
10052080-49 = "ชะ... ใช่ค่ะ... ขอร้องละ ช่วยกลับไป... เถอะนะคะ พะ... พวกฉัน... ไม่อยากทำร้ายใครทั้งนั้นค่ะ"
10052080-50 = "แล้วก็ไม่อยากเห็นพวกคุณ... ต้องบาดเจ็บด้วยค่ะ..."
10052080-55 = "นี่พวกคุณอ่านสถานการณ์กันไม่ออกเหรอคะ...? ยังกล้ามาพูดแบบนี้กับพวกเราอีกเหรอ#nจริงๆ เลยเชียว"
10052080-56 = "แต่พวกคุณก็แพ้ให้พี่มัลคูธไม่ใช่เหรอคะ?"
10052080-57 = "ถึงจะเป็นสิ่งที่แน่นอนอยู่แล้ว แต่นั่นไม่ใช่กำลังทั้งหมดของเราหรอกนะคะ"
10052080-59 = "อึก..."
10052080-63 = "เอ๊ะ จะว่าไปแล้ว ร่างกายอันนั้นมัน...?"
10052080-64 = "ทะ... ทำไมคะ? ฉันก็แค่ยืมมาเท่านั้นค่ะ มีปัญหาตรงไหนงั้นเหรอคะ?"
10052080-66 = "จะว่ายังไงดีล่ะ ฉันแค่ประหลาดใจที่เห็นว่าร่างกายนั้นขยับได้น่ะค่ะ"
10052080-67 = "ถึงจะแค่เล็กน้อย... แต่พวกฉันก็ได้รับแชร์ข้อมูลของร่างกายนั้น... อยู่ด้วยค่ะ..."
10052080-69 = "ถ้าเปรียบเทียบกับมนุษย์อย่างพวกคุณแล้ว ก็คงเหมือนมนุษย์ที่ถูกเย็บแขนขาเข้าไปแล้วถูกบังคับ#nให้เคลื่อนไหวทั้งๆ ที่เส้นประสาทไม่ได้เชื่อมอย่างถูกต้องน่ะ..."
10052080-70 = "คะ... แค่ขยับได้ก็พอแล้วค่ะ! ไม่ต้องมายุ่งหรอก!"
10052080-71 = "ฉันยังไม่เข้าใจพวกคุณอยู่ดีนะ ไม่ว่าจะตอนเรื่องทิฟาเร็ธหรือตอนนี้ก็เถอะ... ทำไมพวกคุณถึงดิ้นรนที่จะมีชีวิตกันขนาดนี้ล่ะ?"
10052080-72 = "ถ้าต่างฝ่ายต่างยอมรับกันอีกนิด ก็น่าจะดีกว่านี้แท้ๆ"
