10052080-146 = "Ah, yes. Right. Toki...thank you for keeping us on track."
10052080-147 = "Here's our current status. The Steel Continent's expansion rate has dramatically reduced. This is good news."
10052080-148 = "Yeah. I believe this supports the theory that all the prophets are linked to each other."
10052080-149 = "In addition, we should be able to expand our actionable range further inland."
10052080-150 = "We'll capture enemy territory, while expanding our own. I like it."
10052080-151 = "For everyone on the field, please continue your exploration. Just be sure to be back on the base before sunset."
10052080-153 = "Sensei! Is there any way we can help?"
10052080-157 = "\"Protect the ship.\" Got it. Leave it to us."
10052080-159 = "I-I'll do my best..."
10052080-164 = "..."
10052080-165 = "(Aris...?)"
