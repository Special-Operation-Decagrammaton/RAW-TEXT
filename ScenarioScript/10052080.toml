10052080-221 = "ตอนนี้ 'ยัง'... งั้นเหรอคะ...?"
10052080-222 = "ค่ะ แต่ว่า..."
10052080-223 = "การที่อาริสึได้ยินเสียงบางอย่าง เป็นเรื่องที่ฉันพอเข้าใจได้ค่ะ"
10052080-224 = "รู้สึกอะไรได้งั้นเหรอคะ เคย์?!"
10052080-225 = "อาริสึ เมื่อกี้จำได้หรือเปล่าคะว่าได้ยินอะไรไปบ้าง?"
10052080-226 = "คะ... คือว่า...! ขอโทษค่ะ... อาริสึตกใจมากจนจำไม่ค่อยได้ค่ะ"
10052080-227 = "แต่ก็เหมือนจะได้ยินว่าการค้นหาตัวตนคือสิ่งสำคัญ... อะไรประมาณนั้นน่ะค่ะ"
10052080-228 = "..."
10052080-229 = "อย่างนั้นสินะคะ ถ้าเป็นอย่างนั้น... ฉันก็คงยังบอกอะไรแน่ชัดไม่ได้ค่ะ"
10052080-230 = "แต่ถ้าได้ยินอะไรแบบนั้นขึ้นมาอีก ช่วยจำเนื้อหาให้ขึ้นใจเลยนะคะ"
10052080-231 = "แล้วก็ไม่ว่าจะเกิดเรื่องอะไรขึ้นก็ห้ามลืมเด็ดขาดว่า"
10052080-232 = "ฉันอยู่ตรงนี้ค่ะ คุณครูก็อยู่ตรงนี้ คนอื่นๆ ก็ด้วยค่ะ"
10052080-237 = "พวกเราทุกคนจะอยู่เคียงข้างอาริสึเสมอค่ะ"
