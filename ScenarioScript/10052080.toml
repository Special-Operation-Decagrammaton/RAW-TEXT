10052080-228 = "..."
10052080-229 = "I see. In that case... I don't think I have any more information to share."
10052080-230 = "But if you hear anything else, please try to remember."
10052080-231 = "And no matter what happens, never forget this..."
10052080-232 = "I'm here to support you. Sensei is, as well. All of us are."
