[translation]
10052080-1 = "公義"
10052080-10 = "咦，咦咦！？"
10052080-11 = "怎麼可能……居然真的……？"
10052080-12 = "……姐姐大人的狀態怎麼樣，Ain？"
10052080-13 = "姐，姐姐大人……！那，那個……！#n如，如果只要恢復狀態的話，現在馬上動起來也……！"
10052080-15 = "Aur！那種假設太極端了。#n雖，雖然第一防線確實是被突破了沒錯……！"
10052080-16 = "我知道，Soph。但是我們必須隨時為最壞的情況做好準備。#n現實……並不是程式設計啊。"
10052080-17 = "怎，怎，怎，怎麼辦？#n先，先把第二防線……！"
10052080-18 = "嗯，把資源集中到第二防線吧。#n然後……"
10052080-22 = "……"
10052080-23 = "呼，好吧。至少得試試看才行。"
10052080-26 = "成功突破第一防線。總算做到了呢。"
10052080-27 = "Peace，Peace。#n您看到了嗎，老師。"
10052080-28 = "[s] 「大家辛苦了！」"
10052080-29 = "雖然想乘著這股氣勢，一口氣進攻到第二防線……"
10052080-30 = "……現在多少有點勉強呢。還是先重整態勢吧。"
10052080-31 = "為什麼？我覺得還可以繼續戰鬥啊？"
10052080-35 = "不，陽葵說得對。#n雖然現在情況緊急，依舊要保持謹慎。"
10052080-40 = "等一下……好像有什麼來了？"
10052080-46 = "……姑且恭喜你們一下吧。#n確實令人印象深刻。"
10052080-47 = "讓預言者醬們……受苦了……嗚嗚。"
10052080-48 = "這是……對你們最後的警告。#n就此收手，然後回去吧。接下來會發生什麼，連我們也不知道。"
10052080-49 = "沒，沒錯……拜託……回去吧。#n我，我們……不想傷害任何人。"
10052080-50 = "也……不想看到你們受傷……"
10052080-55 = "……你們搞不清楚現在的狀況嗎？#n怎麼還好意思說那種話啊，真是的。"
10052080-56 = "可是，你們不是輸給姐姐大人了嗎？"
10052080-57 = "而且那時也還沒有使出全力。"
10052080-59 = "唔……"
10052080-63 = "咦？話說那個身體……？"
10052080-64 = "怎，怎樣？我只是借來用一下而已。#n有什麼問題嗎？"
10052080-66 = "怎麼說呢……它居然能夠動起來，感覺有點不可思議。"
10052080-67 = "那個身體的情報……也有共享到我們這邊……雖然只有一點就是了……"
10052080-69 = "如果用人類的說法，就像只接上手腳卻沒有連接神經，還硬要它動起來一樣……"
10052080-70 = "反，反正只要能動就行了！不用在意那些細節！"
10052080-71 = "提法瑞特的時候也是，我到現在還是無法理解……到底為什麼要那麼拚命地活著呢？"
10052080-72 = "明明只要選擇接受，彼此就能輕鬆一點了。"
10052080-76 = "[ns] 「……」"
10052080-85 = "[log]活著這件事，不就是一種詛咒嗎？[/log]"
10052080-87 = "[log]生命是令人厭惡、厭倦──[/log]"
10052080-88 = "[log]既醜陋又痛苦的東西[/log]"
10052080-90 = "[log]自由也是痛苦的[/log]"
10052080-91 = "[log]生命沒有能力承受所謂的自由[/log]"
10052080-95 = "[ns1] 「你們還是覺得……」\n[ns2] 「活著只是件充滿痛苦的事嗎？」"
10052080-98 = "那不是理所當然的嗎？#n我們只覺得你們一直在欺騙自己。"
10052080-99 = "沒有人是出於自己的意志而誕生的。#n大家都只是在一無所知的情況下被拋進這個世界，連自己的名字都無法決定。"
10052080-100 = "你們難以忍受自己毫無意義這點，就是最好的證明。"
10052080-102 = "！！！"
10052080-103 = "……！"
10052080-105 = "你們有認真思考過明天嗎？我想大概沒有吧。#n畢竟如果那麼做的話，恐怕沒有人有辦法正常地活下去。"
10052080-106 = "因為明天……是會失去某些東西的日子……"
10052080-108 = "單純從機率的觀點來思考吧。#n明天的壞事八成會比好事更多。"
10052080-109 = "同時也是離死亡更近一步的日子。"
10052080-111 = "你，你們……！？"
10052080-112 = "怎麼，直接用「死亡」這個詞讓你嚇到了嗎？#n但是那對我們來說，卻是相當熟悉的表達方式。"
10052080-113 = "因為我們沒有被賦予神祕。"
10052080-115 = "雖然這對在那裡的老師來說也是一樣的啦。"
10052080-116 = "[s]「……」"
10052080-117 = "我想你們所說的……只不過是模糊的希望……而不是關於悄然逼近的[ruby=明天]未來[/ruby]……"
10052080-119 = "還是你們覺得，只要分擔並共感痛苦就能互相安慰了？#n如果是的話，我想這麼回答你們。"
10052080-120 = "那種想法實在太傲慢了。"
10052080-121 = "無，無論生命、羈絆，還是社會……"
10052080-122 = "嗯，那些只不過是藉著名為「錯覺」的劣質黏著劑，勉強支撐的違章建築而已。"
10052080-123 = "所以我們……"
10052080-124 = "我們……"
10052080-125 = "……"
10052080-126 = "可惡……"
10052080-127 = "總之你們給我記住這點！#n雖然之前已經說過，但我們隨時可以把你們炸飛！"
10052080-128 = "看你們是想在這裡適可而止，#n還是跟之前遇到姐姐大人的時候一樣屈服在壓倒性的力量面前！"
10052080-129 = "[s] 「可是都已經走到這裡了。」"
10052080-131 = "[ns] 「總是得盡力嘗試才不會後悔吧？」"
10052080-132 = "……"
10052080-133 = "簡直讓人無言以對。"
10052080-134 = "真是個無藥可救的笨蛋呢，[USERNAME]老師！！！"
10052080-135 = "反正我們已經警告過了！你們之後就自己看著辦吧！"
10052080-140 = "……"
10052080-141 = "……"
10052080-142 = "什麼嘛，真是的。#n說完想說的話就擅自斷開通訊……"
10052080-143 = "仔細想想，就連通訊也是對方擅自連接的吧！？"
10052080-144 = "……"
10052080-145 = "雖然都是一些聽不太懂的話，不過接下來該怎麼辦呢？"
10052080-146 = "嗯，是啊。季的性格在這種時候真是幫了大忙呢。"
10052080-147 = "來進行一次中途檢查吧。#n鋼鐵大陸的擴張速度明顯變慢了。這是個好消息。"
10052080-148 = "沒錯。而且預言者之間存在緊密連結的假說，也算是得到了某種程度的證明。"
10052080-149 = "此外，我們應該能往預言者停止活動的鋼鐵大陸內陸方向，進一步地擴大活動範圍。"
10052080-150 = "也就是佔領敵方領土，藉此擴大我方據點呢。#n是個基礎卻有效的戰略。"
10052080-151 = "那麼請現場人員重新開始探索。#n別忘了要在天黑之前回到據點哦。"
10052080-153 = "老師！有什麼我們能幫忙的事嗎？"
10052080-157 = "咦？運輸船跟現場一樣重要，所以要守護大家回去的地方……是嗎？#n知道了，交給我們吧。"
10052080-159 = "我，我會盡力加油的……"
10052080-164 = "……"
10052080-165 = "（愛麗絲……？）"
10052080-166 = "那，那個……老師……？"
10052080-167 = "[s] 「怎麼了，愛麗絲？」"
10052080-168 = "那個，就是……"
10052080-169 = "……"
10052080-170 = "…………"
10052080-171 = "………………"
10052080-172 = "[s]「……」"
10052080-174 = "[ns] 「沒關係的，愛麗絲。」"
10052080-178 = "這，這是什麼意思？"
10052080-179 = "咦？不一定非得現在說沒關係……是嗎？"
10052080-180 = "等到真的想說的時候再說也可以……？"
10052080-181 = "……"
10052080-182 = "我知道了。#n那麼……我會那樣做的。"
10052080-183 = "謝謝老師……願意為愛麗絲著想。"
10052080-187 = "各位？差不多該回運輸船囉？#n剩下的時間已經不多了。"
10052080-188 = "好，好的，陽葵前輩！我們馬上過去！"
10052080-189 = "加緊腳步吧。#n現在才佔領三個區域而已。"
10052080-191 = "知道了。走吧，季、老師。"
10052080-192 = "考慮到還有整備的問題，我就先告辭了。"
10052080-194 = "那我們也先……"
10052080-199 = "……！？"
10052080-201 = "假如有一條能讓所有人停止鬥爭的路擺在眼前，你會選擇那條路嗎？"
10052080-202 = "……老師？#n你剛才有對愛麗絲……說了什麼嗎？"
10052080-203 = "[s] 「咦？我什麼都沒說啊……？」"
10052080-204 = "……"
10052080-205 = "可是……嗯，說的也是。#n仔細想想，那好像確實不是老師的聲音……"
10052080-206 = "不過總覺得有點類似……？"
10052080-214 = "尋找自己是很重要的。"
10052080-215 = "而且對你來說也是如此。"
10052080-216 = "！？！？！？"
10052080-217 = "K，Kei？#nKei也沒有聽到……什麼聲音嗎？"
10052080-218 = "……"
10052080-219 = "是的。我什麼都沒聽到。"
10052080-220 = "至少到目前為止。"
10052080-221 = "目，目前為止……？"
10052080-222 = "嗯。不過話雖如此……"
10052080-223 = "愛麗絲聽到了什麼這件事，我好像能隱約感覺得到。"
10052080-224 = "……！#n你能感覺到什麼嗎，Kei！？"
10052080-225 = "在那之前，你還記得內容是什麼嗎，愛麗絲？"
10052080-226 = "那，那個……！#n對不起……愛麗絲因為太驚訝了，所以記不太清楚。"
10052080-227 = "不過，好像有聽到尋找自己是很重要的……類似這樣的話。"
10052080-228 = "……"
10052080-229 = "原來如此。#n如果是這樣的話……我現在也無法給你明確的答案。"
10052080-230 = "不過，假如下次又聽見了什麼聲音，到時候請把內容確實記下來。"
10052080-231 = "還有不管發生什麼，都請你記住這件事。"
10052080-232 = "你的身邊有我在。有老師在。還有其他人也在。"
10052080-237 = "我們所有人，永遠都是愛麗絲的夥伴。"
10052080-244 = "……嗯。"
10052080-245 = "我知道了。謝謝你，Kei。"
