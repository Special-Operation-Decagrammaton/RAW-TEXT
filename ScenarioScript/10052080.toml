10052080-117 = "สิ่งที่พวกคุณพูดถึง... มันก็แค่ความหวังที่เลือนราง... ฉันไม่คิดว่ามันคือ... [ruby=พรุ่งนี้]อนาคต[/ruby]ที่กำลังคืบคลาน#nเข้ามาเงียบๆ หรอกค่ะ..."
10052080-119 = "จะบอกว่าเราปลอบโยนกันได้ด้วยการแบ่งปันความเจ็บปวดและเห็นอกเห็นใจกันใช่มั้ยล่ะคะ? ถ้าอย่างนั้น ฉันก็อยากให้คำตอบแบบนี้ค่ะ"
10052080-120 = "นั่นคือความคิดที่อวดดีเกินไปค่ะ"
10052080-121 = "ทะ... ทั้งชีวิต ความสัมพันธ์ สังคม..."
