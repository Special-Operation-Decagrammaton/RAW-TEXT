10052080-145 = "ถึงทั้งหมดจะเป็นเรื่องที่ฟังไม่เข้าใจ แต่จากนี้ไปเราจะทำยังไงกันดีล่ะคะ?"
10052080-146 = "อ่า... อื้อ ค่ะ นั่นสินะคะ ในสถานการณ์แบบนี้ นิสัยของโทคิมีประโยชน์ขึ้นมาเลยนะคะ"
10052080-147 = "มาสรุปสถานการณ์กันก่อนเถอะค่ะ ตอนนี้เหมือนว่าการขยายขอบเขตของดินแดนเหล็กกล้าจะช้าลง#nอย่างเห็นได้ชัดเลย นี่เป็นข่าวดีเลยนะคะ"
