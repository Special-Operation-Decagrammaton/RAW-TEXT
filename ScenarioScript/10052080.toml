10052080-194 = "In that case, we should also..."
10052080-199 = "...?!"
10052080-201 = "If you were shown the path to stop the conflict, would you take it?"
10052080-202 = "...? Sensei? Did you...speak to me?"
10052080-203 = "[s] \"Huh? I didn't say anything...\""
10052080-204 = "..."
10052080-205 = "Yes. I was mistaken. That sounded nothing like you."
