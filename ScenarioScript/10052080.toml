10052080-217 = "คะ... เคย์? เคย์ก็ไม่ได้ยิน... เสียงอะไรเลยเหรอคะ?"
10052080-218 = "..."
10052080-219 = "ค่ะ ฉันไม่ได้ยินเสียงอะไรเลยค่ะ"
