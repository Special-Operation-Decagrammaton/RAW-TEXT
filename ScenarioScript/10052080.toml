10052080-153 = "คุณครู! มีอะไรที่พวกฉันพอช่วยได้บ้างหรือเปล่า?"
10052080-157 = "คะ? อย่างนั้นเองสินะ ยานขนส่งก็สำคัญไม่แพ้กัน ก็เลยอยากให้เราไปเฝ้าสถานที่ที่ทุกคนจะกลับกัน#nสินะคะ? เข้าใจแล้วค่ะ วางใจพวกฉันได้เลยค่ะ"
