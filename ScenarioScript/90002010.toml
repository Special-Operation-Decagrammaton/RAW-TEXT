[translation]
90002010-1 = "第1話;Phase Shift"
90002010-4 = "Soph！我不是說過很多次了嗎？#n要是再這樣的話，Ain姐姐要生氣了哦？"
90002010-5 = "是，是我錯了，Ain姐姐！#n我不會再那樣了……"
90002010-6 = "好，我這次就破例原諒你吧。#n耶嘿嘿，Ain姐姐知道Soph其實是個乖孩子的。"
90002010-7 = "還有Aur！不要老是欺負Soph！#n這次也是Aur開的玩笑太過分了！"
90002010-8 = "咦，不過是Soph他先……"
90002010-9 = "Aur！"
90002010-10 = "知，知道了，我知道了啦。#n對不起……這樣可以了吧？"
90002010-11 = "唔嗯……雖然這個態度有點不及格……"
90002010-12 = "不過以Aur而言已經很好了！#nAin姐姐稱讚你！"
90002010-18 = "Ain，你在做什麼？"
90002010-19 = "哇啊啊啊啊啊！？馬爾庫特姐姐大人！？"
90002010-22 = "原來如此。#n按照人類的說法，就是所謂的「扮家家酒」吧。"
90002010-23 = "至於這些機械人偶，則是Soph人偶和Aur人偶。"
90002010-24 = "是，是的……#n對不起，馬爾庫特姐姐大人……"
90002010-25 = "沒關係，Ain。#n只要Ain開心，對我而言就足夠了。"
90002010-26 = "不過除了Soph人偶和Aur人偶以外，好像還有很多其他的機械人偶呢？"
90002010-27 = "沒錯！這些孩子……怎麼說呢……"
90002010-28 = "是，是我的孩子！"
90002010-29 = "原來如此……？"
90002010-30 = "也是我的妹妹！"
90002010-31 = "這樣啊……？"
90002010-32 = "還，還有……這，這些孩子對馬爾庫特姐姐大人來說……#n因為我是馬爾庫特姐姐大人的妹妹，所以我的孩子就是……"
90002010-33 = "我知道，Ain。#n這就是所謂的「姪女」對嗎？"
90002010-34 = "是，是的！沒錯！#n雖，雖然我也不是很清楚……但就是這樣沒錯！姐姐大人說的對！"
90002010-35 = "那麼，你們好。Ain的孩子兼妹妹們。#n我是馬爾庫特。"
90002010-36 = "姐，姐姐姐姐，姐姐大人跟我的孩子們打招呼了……！#n怎，怎麼辦……？幸福訊號過量，感覺快要短路了……！"
90002010-37 = "不過……Ain？"
90002010-38 = "是，姐姐大人！"
90002010-39 = "沒有……我的人偶嗎？"
90002010-45 = "對，對對對對對，對不起，姐姐大人！都怪我沒有預料到……#n不！我應該要想到的才對！必須為所有可能性做好準備！這都是我的錯！嗚嗚嗚……"
90002010-46 = "沒事的，Ain。沒關係。"
90002010-47 = "現在的我們，正在等待「最後時刻」。 "
90002010-48 = "所以我認為適當地放鬆也是很重要的。"
90002010-49 = "是，是……為了迎接那個時刻……#n我們不得不臨時改變「無名諸神的力量」流淌在鋼鐵大陸的[ruby=Phase]位相[/ruby]……"
90002010-50 = "嗚嗚嗚……但凡沒有那個王女和侍女，就不會有這些額外的工作了……"
90002010-51 = "是啊，真的辛苦你了。#n感謝你的幫忙。"
90002010-52 = "至於「馬爾庫特機械人偶」，因為Ain隨時都可以為我製作，所以我完全不擔心哦？"
90002010-53 = "……！"
90002010-54 = "是！姐姐大人，那是當然的！"
90002010-55 = "不過這樣一來，馬爾庫特機械人偶也會成為Ain的孩子兼妹妹呢。"
90002010-56 = "你好，Ain姐姐。"
90002010-57 = "呀啊啊啊啊啊！？"
90002010-58 = "馬爾庫特姐姐大人，叫，叫我姐姐……"
90002010-63 = "我沒想到你會有那麼大的反應……"
90002010-65 = "……"
90002010-66 = "唉……這該怎麼辦呢……"
90002010-67 = "……"
90002010-68 = "提法瑞特……"
90002010-75 = "Soph，你在做什麼？"
90002010-76 = "哇啊！？馬爾庫特姐姐大人！？"
90002010-77 = "那，那個……"
90002010-78 = "看起來是個密封的箱子。"
90002010-79 = "不……好像還是有點破損。#n那是什麼呢？"
90002010-80 = "這是……那個……"
90002010-81 = "……是提法瑞特的種子箱之一。"
90002010-82 = "姐姐大人應該也知道吧？#n提法瑞特選擇優先保存種子而非自己……"
90002010-83 = "是的。並且我們也決定尊重這個選擇。"
90002010-84 = "嗯，不過其中有幾個保存狀態不太好的箱子。"
90002010-85 = "……而這，就是裡面狀態最不好的箱子。"
90002010-86 = "保存狀態不太好代表什麼意思呢？"
90002010-87 = "就是……已經到了隨時都會發芽的狀態。"
90002010-88 = "但是就算在鋼鐵大陸發芽……"
90002010-89 = "我，我當然明白為了這種事煩惱很奇怪！所以希望姐姐大人不要誤會！"
90002010-90 = "但是，提法瑞特……"
90002010-91 = "……"
90002010-92 = "Soph……首先，提法瑞特此時此刻依然跟我們在一起。#n這一點是無庸置疑的。"
90002010-93 = "嗯，確實是這樣沒錯……"
90002010-94 = "然而，我也能夠理解Soph想要珍惜「提法瑞特」意志的心意。"
90002010-95 = "所以，你覺得這樣做如何呢？"
90002010-101 = "我們把種子偷偷地種在聖地。"
90002010-102 = "姐，姐姐大人！？#n可是那樣的話……！"
90002010-104 = "是的，我也很清楚。#n那確實是可能違反我們紀律的行為。"
90002010-105 = "不過那裡是鋼鐵大陸的起點，也是現在唯一保有「土壤」的地方，不是嗎？"
90002010-106 = "雖然只是因為沒有在那裡使用「涅察赫」的能力，所以才能保有土壤……"
90002010-107 = "畢竟在聖地裡，有著那位大人的意志……"
90002010-108 = "不過，如果種子就連在那裡也能戰勝一切、順利萌芽的話……"
90002010-109 = "從某種意義上來說，那不就是提法瑞特留下的自由意志嗎？"
90002010-110 = "自由意志不僅僅是對人類與我們，甚至對那位大人而言也是極其重要的要素。"
90002010-111 = "即便這一切在深入探究之後，只不過是由錯覺編織而成的謊言而已。"
90002010-112 = "可是，這樣真的可以嗎……？"
90002010-113 = "當然是不行的。"
90002010-114 = "姐姐大人！？！？"
90002010-115 = "所以，這是跟我一起做的「壞事」哦？"
90002010-116 = "壞，壞事……！"
90002010-117 = "做壞事的時候，不是會莫名感到興奮嗎？"
90002010-118 = "嗯，尤其人類特別會有這種感覺……"
90002010-119 = "是的。所以這次我們就一起做一次壞事吧。"
90002010-120 = "Soph是因為不希望忘記提法瑞特，所以才在煩惱對吧？"
90002010-121 = "當然提法瑞特，如今依然待在我們身邊。"
90002010-122 = "最重要的是，我們正在等待「最後時刻」的到來。"
90002010-123 = "是，是姐姐大人先提議的哦……？"
90002010-124 = "沒錯，就讓我們姐妹倆一起搗蛋一次吧。"
90002010-125 = "嗯！"
90002010-130 = "不過話又說回來……Soph。"
90002010-131 = "「無名諸神之力」的位相轉換還順利嗎？"
90002010-132 = "啊，那件事嗎？姐姐大人不用擔心。#n現在就算那兩個人來到鋼鐵大陸，也無法隨心所欲使用那股能量了。"
90002010-133 = "……雖然沒能從根源徹底完成轉換，多少還是有點遺憾就是了。"
90002010-134 = "不過要是貿然那麼做的話，如今以那股力量支撐的鋼鐵大陸也可能變得無法使用……"
90002010-135 = "這樣啊。#n那麼不足的部分，就由我們來填補吧。"
90002010-136 = "嗯……姐姐大人說的沒錯。現在也只能這麼做了。"
90002010-140 = "Aur，你在做什麼？"
90002010-141 = "……"
90002010-142 = "……？"
90002010-143 = "原來如此。#n看來Aur進入了自己的世界裡呢。"
90002010-144 = "那麼，恕我失禮了。"
90002010-152 = "（喃喃自語……）"
90002010-157 = "你在做什麼呢，Aur？"
90002010-158 = "咦……？"
90002010-162 = "馬爾庫特姐姐大人！？！？！？#n姐姐大人怎麼會在這裡……！？！？"
90002010-163 = "不必那麼驚訝，Aur。"
90002010-164 = "原則上我在鋼鐵大陸中，不存在「去不了」的地方吧？"
90002010-165 = "啊，嗯。確實是這樣沒錯……"
90002010-166 = "不過我倒是有點驚訝，Aur。#n這是個……非常「自然」的世界呢？"
90002010-167 = "……嗯，算是吧？"
90002010-168 = "我們在意識迴路的領域中……都存在可以被稱為「黑盒子」的部分對吧？"
90002010-169 = "是的。如果借用人類的說法，也可以稱之為無意識的領域。"
90002010-170 = "我只是有點好奇那裡究竟是如何構成的，#n所以才會嘗試把那附近的一部分意識迴路，以巨量數據抽取的方式投放進去看看。"
90002010-171 = "哎呀，所以就重現了這樣的心境世界嗎？"
90002010-172 = "就是這麼回事。#n誰叫Soph老是把生命和自然掛在嘴邊，好像連我也被影響了。"
90002010-173 = "不過這麼看來，其實也沒什麼大不了的嘛。#n果然只是Soph太大驚小怪而已。"
90002010-174 = "只不過……"
90002010-175 = "不過……"
90002010-176 = "待在這裡的時候，總感覺思考迴路的雜訊會慢慢沉澱下來……"
90002010-177 = "這樣啊。聽你這麼一說，我似乎也能感受到思考迴路的穩定。"
90002010-178 = "我聽Ain和Soph說過，你們正在轉換「無名諸神之力」的位相是嗎？"
90002010-179 = "啊，嗯。是的……#n沒想到都到最後的最後了，竟然還得做這種事情……"
90002010-180 = "而且還害姐姐大人的身體必須再調整一次……雖然也不會花費太多時間啦。"
90002010-181 = "這所有的一切，都是那個[USERNAME]老師造成的！真受不了！"
90002010-182 = "好好好。你也別太生氣了，Aur。"
90002010-183 = "如果能跟[USERNAME]老師在這裡進行真誠的對話，他一定也能理解我們的想法的。"
90002010-184 = "那麼現在，我們要不要一起躺下來做個日光浴？"
90002010-185 = "日光浴，是嗎？"
90002010-186 = "就是一起躺下來無所事事，純粹沐浴陽光的行為。"
90002010-187 = "雖然那只不過是以電壓訊號的形式，給予「曬太陽的感覺」……"
90002010-188 = "並且在接收到訊號後，使我們的感覺迴路回傳「滿足」的訊號而已。"
90002010-189 = "即便如此，光是能跟Aur一起度過這段時間，對我來說便已經足夠有意義了。"
90002010-193 = "當然，姐姐大人！"
90002010-194 = "嗯，那就這麼做吧。"
90002010-198 = "畢竟我們必須等待「最後時刻」的到來啊。"
90002010-201 = "下一話;運輸船"
