90002010-73 = "#all;hide"
90002010-74 = "#wait;500"
90002010-75 = "3;말쿠트;02;뭐 하고 있나요, 소프?\n#3;em;[?]\n#3;a"
90002010-76 = "3;소프;02;으앗?! 말쿠트 언니!?!?\n#3;em;[?!]\n#3;shake"
90002010-77 = "3;소프;12;그, 그러니까…….\n#3;stiff"
90002010-78 = "3;말쿠트;02;잘 만들어진 밀폐 상자처럼 보이는군요."
90002010-79 = "3;말쿠트;01;아뇨……. 밀폐가 약간 깨어져 있기는 하네요. 그건 무엇인가요?"
90002010-80 = "3;소프;04;이건……. 그러니까…….\n#3;em;[땀]"
90002010-81 = "3;소프;10;……티페레트의, 씨앗 상자 중 하나야."
90002010-82 = "3;소프;02;그, 언니도 알잖아? 티페레트는 자기 대신 씨앗들을 보내기로 결정했고……."
90002010-83 = "3;말쿠트;01;네. 그리고 우리는 그 결정을 존중하기로 했죠."
90002010-84 = "3;소프;99;응. 그런데 보관 상태가 안 좋은 상자가 몇 개 있었어."
90002010-85 = "3;소프;06;……이건 그중에서도 가장 안 좋은 상자고.\n#3;greeting"
90002010-86 = "5;말쿠트;02;보관 상태가 좋지 않다는 것은 무엇을 의미하나요?\n#5;em;[?]\n#5;al\n#3;m1"
90002010-87 = "3;소프;19;그건…… 금방이라도 싹을 틔울 것 같은 상태가 되어 버렸다는 뜻이야."
90002010-88 = "3;소프;12;하지만 강철대륙에서는 싹을 틔워 봤자……."
90002010-89 = "3;소프;04;애, 애초에 이런 거 가지고 고민한다는 게, 어울리지 않는 일이라는 건 나도 알아! 그 부분은 오해하지 말아 줘!\n#3;em;[땀]"
90002010-90 = "3;소프;12;하지만, 티페레트는…….\n#3;stiff"
90002010-91 = "5;말쿠트;99;……."
90002010-92 = "5;말쿠트;00;소프. 우선 티페레트는 지금 이 순간에도 여기에 우리와 함께 있어요. 그 사실은 확실한 것이라고 보아도 괜찮아요.\n#5;em;[반응]"
90002010-93 = "3;소프;10;으, 응. 그렇지…….\n#3;em;…"
90002010-94 = "5;말쿠트;02;하지만 '티페레트'의 뜻을 소중히 여겨 주고 싶다는 소프의 마음도, 저는 이해한답니다."
90002010-95 = "5;말쿠트;01;그러니 이렇게 하는 것은 어떨까요?"
