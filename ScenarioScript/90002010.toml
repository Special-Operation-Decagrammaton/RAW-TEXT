[translation]
90002010-1 = "#title;제1화;Phase Shift"
90002010-2 = "#wait;1500"
90002010-3 = "5;아인;00\n#5;al\n#5;h\n#wait;1500"
90002010-4 = "5;아인;05;소프! 제가 언제나 말했죠? 자꾸 그러면 이 아인 언니가 혼내 줄 거예요?\n#5;em;[!]"
90002010-5 = "5;아인;04;자, 잘못했어. 아인 언니! 이제 다신 안 그럴게…….\n#5;hophop\n#5;m4"
90002010-6 = "5;아인;09;좋아요. 이번에는 특별히 봐줄게요. 에헤헤. 소프는 사실 착한 아이라는 걸, 아인 언니는 알고 있으니까요."
90002010-7 = "5;아인;11;그리고 오르! 너무 소프를 괴롭히면 안 돼요! 이번에도 결국 오르의 장난이 너무 심했어요!\n#5;stiff"
90002010-8 = "5;아인;04;으에, 하지만 소프가 먼저…….\n#5;em;[훌쩍]\n#5;m3"
90002010-9 = "5;아인;12;오르!\n#5;m2\n#5;hophop\n#fontsize;100"
90002010-10 = "5;아인;06;아, 알았어요. 알았다니까요. 사과할게요……. 이러면 됐죠?\n#5;em;[세로선]"
90002010-11 = "5;아인;02;으음……. 역시 아직 태도가 약간 마음에 걸리기는 하지만…….\n#5;m3"
90002010-12 = "5;아인;03;그래도 오르치고는 잘했네요! 아인 언니가 칭찬해 줄게요!\n#5;em;[반짝]\n#5;greeting"
90002010-13 = "#st;[0,0];instant;1;"
90002010-14 = "#clearST"
90002010-15 = "5;아인;03\n#5;d\n#wait;1200"
90002010-16 = "#all;hide"
90002010-17 = "3;말쿠트;00\n#3;a\n#3;em;[?]\n#wait;1000"
90002010-18 = "3;말쿠트;02;뭐 하고 있나요, 아인?"
90002010-19 = "3;아인;07;히야아아아악?!?! 말쿠트 언니!?!?\n#3;em;[?!]\n#3;shake"
90002010-20 = "#all;hide"
90002010-21 = "#wait;500"
90002010-22 = "3;말쿠트;99;그렇군요. 인간으로 치면 이른바 '소꿉놀이'라고 하는 것이었군요.\n#3;a"
90002010-23 = "3;말쿠트;01;이 기계인형들은 소프 인형과 오르 인형이고요."
90002010-24 = "1;아인;04;마, 맞아요……. 죄송해요, 말쿠트 언니…….\n#1;em;[훌쩍]\n#1;ar\n#3;m5"
90002010-25 = "3;말쿠트;02;괜찮아요. 아인. 아인이 즐거웠다면, 저 역시 그것으로 충분하답니다."
90002010-26 = "3;말쿠트;01;그런데 소프 인형과 오르 인형 말고도, 다른 기계인형들이 많이 있는 것 같은데요?\n#3;em;[?]"
90002010-27 = "1;아인;07;맞아요! 이 아이들은……. 그러니까…….\n#1;hophop"
90002010-28 = "1;아인;06;제, 제 아이들이에요!"
90002010-29 = "3;말쿠트;02;그렇군요……?"
90002010-30 = "1;아인;04;그러니까 제 동생들이기도 하고요!\n#1;em;[땀]"
90002010-31 = "3;말쿠트;01;그렇네요……?"
90002010-32 = "1;아인;07;그리고, 그리고, 그러니까……. 이 아이들은, 말쿠트 언니에게는……. 말쿠트 언니의 동생인, 저의 아이들이자 동생이니까……."
90002010-33 = "3;말쿠트;02;알고 있어요. 아인. 그건 이른바 '조카들'인 셈이네요?\n#3;em;[반응]"
90002010-34 = "1;아인;03;네, 네! 맞아요! 자, 잘 모르겠지만……. 맞을 거예요! 언니 말씀인걸요!\n#1;stiff"
90002010-35 = "3;말쿠트;01;그러면, 안녕하세요. 아인의 아이들이자 동생분들. 저는 말쿠트라고 한답니다.\n#3;m4"
90002010-36 = "1;아인;07;어, 어어어어, 언니가 제 아이들에게 인사해 주셨어요……! 어, 어떡하죠……? 행복 신호 과잉으로, 어딘가가 쇼트나 버릴 것 같아요……!\n#1;em;[?!]\n#1;shake"
90002010-37 = "3;말쿠트;02;그런데, 아인?"
90002010-38 = "1;아인;05;네, 언니!"
90002010-39 = "3;말쿠트;00;제 인형은, 혹시 없나요?\n#3;em;[?]"
90002010-40 = "#st;[0,0];instant;1;"
90002010-41 = "#clearST"
90002010-42 = "3;말쿠트;00\n1;아인;09\n#1;em;…\n#1;h\n#3;h\n#wait;2500"
90002010-43 = "#all;hide"
90002010-44 = "3;아인;07\n#3;em;[?!]\n#3;shake\n#3;closeup\n#wait;800"
90002010-45 = "3;아인;04;죄, 죄죄죄죄죄, 죄송해요, 언니! 이럴 줄 모르고…… 아뇨! 모르더라도 알아야 했어요! 모든 가능성에 대비해야 했어요! 모두 제 탓이에요! 히이잉…….\n#3;stiff\n#3;closeup"
90002010-46 = "3;말쿠트;02;괜찮아요. 아인. 괜찮아요.\n#3;em;[반응]\n#3;closeup"
90002010-47 = "3;말쿠트;99;우리는 이제 정말로 '최후의 때'를 기다리고 있는 것이니까요. \n#3;closeup"
90002010-48 = "3;말쿠트;03;긴장을 풀어 두는 것도, 저는 중요하다고 생각한답니다.\n#3;closeup"
90002010-49 = "3;아인;10;네, 네에……. 맞아요. 그리고 그때를 위해서…… 강철대륙에 흐르는 <이름 없는 신들의 힘>의 [ruby=Phase]위상[/ruby]도, 급히 변경해야 했죠…….\n#3;em;[땀]"
90002010-50 = "3;아인;06;우우우……. 그 왕녀와 시녀만 없었어도, 이런 추가 작업은 하지 않아도 되었을 텐데……."
90002010-51 = "3;말쿠트;03;네. 정말 수고가 많았어요. 고마워요."
90002010-52 = "3;말쿠트;08;그리고 '말쿠트 기계인형'은, 언제든 아인이 만들어 줄 테니, 저는 전혀 걱정되지 않는답니다?\n#3;em;[반짝]"
90002010-53 = "3;아인;02;……!\n#3;em;[!]"
90002010-54 = "3;아인;03;네! 물론이에요, 언니!\n#3;hophop"
90002010-55 = "5;말쿠트;02;그런데 그러면, 말쿠트 기계인형은 또 다른 아인의 아이이자 동생이 되겠네요.\n#5;al\n#3;m1"
90002010-56 = "5;말쿠트;03;안녕하세요. 아인 언니."
90002010-57 = "3;아인;10;꺄아아아아악?!?!\n#3;em;[?!]\n#3;shake"
90002010-58 = "3;아인;03;말쿠트, 언니가, 저에게, 저를, 언니라고…….\n#3;stiff"
