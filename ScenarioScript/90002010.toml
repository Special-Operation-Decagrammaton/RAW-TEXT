90002010-132 = "3;소프;00;아, 그거? 언니는 걱정 안 해도 돼. 이제 그 둘이 강철대륙에 온다고 해도, 자기들의 힘인 것처럼 자유롭게 그 에너지를 마음대로 사용할 수는 없을 거야.\n#3;em;[반응]"
90002010-133 = "3;소프;09;……그래도 뿌리부터 완전히 전환시킬 수 없었다는 건 아쉬운 부분이긴 했어."
90002010-134 = "3;소프;22;하지만 함부로 그랬다가는 그 힘으로 구축한, 지금의 강철대륙도 못 쓰게 되어 버릴 테니까……."
90002010-135 = "3;말쿠트;02;그렇군요. 그렇다면 그 모자란 부분은, 우리가 채워 나가면 되겠지요."
90002010-136 = "3;소프;07;응……. 언니 말이 맞아. 그래야지."
