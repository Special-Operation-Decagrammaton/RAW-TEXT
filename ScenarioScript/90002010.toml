[translation]
90002010-1 = "ตอนที่ 1;Phase Shift"
90002010-4 = "ซอฟ! ฉันบอกอยู่ตลอดไม่ใช่เหรอคะ? ถ้ายังทำแบบนี้อยู่อีก เดี๋ยวพี่ไอน์จะโกรธเอานะคะ"
90002010-5 = "ฉะ... ฉันผิดไปแล้ว พี่ไอน์! ฉันจะไม่ทำแบบนั้นอีกแล้ว..."
90002010-6 = "ก็ได้ค่ะ งั้นครั้งนี้ฉันจะยกโทษให้เป็นพิเศษค่ะ แหะๆๆ พี่ไอน์รู้ดีค่ะว่าที่จริงแล้วซอฟน่ะเป็นเด็กที่น่ารัก"
90002010-7 = "แล้วก็ ออร์! อย่าแกล้งซอฟให้มากนักสิคะ! แล้วครั้งนี้ออร์ก็เล่นแรงเกินไปด้วยค่ะ!"
90002010-8 = "อ่า... แต่ว่าซอฟเป็นคนเริ่มก่อน..."
90002010-9 = "ออร์!"
90002010-10 = "กะ... ก็ได้ค่ะ เข้าใจแล้วค่ะ ฉันขอโทษค่ะ... พอใจหรือยังคะ?"
90002010-11 = "อืม... ถึงจะยังดูไม่ค่อยเต็มใจขอโทษสักเท่าไร..."
90002010-12 = "แต่เท่านี้ก็ถือว่าออร์ทำได้ดีแล้วค่ะ! พี่ไอน์ขอชมเลยค่ะ!"
90002010-18 = "ทำอะไรอยู่เหรอคะ ไอน์?"
90002010-19 = "เฮือกกกก?!?! พี่มัลคูธ!?!?"
90002010-22 = "กำลังเล่นบทบาทสมมติเหมือนที่มนุษย์ 'เล่นขายของ' หรือ 'เล่นพ่อแม่ลูก' อยู่นี่เองสินะคะ"
90002010-23 = "แล้วตุ๊กตาจักรกลพวกนั้นก็คงเป็นตุ๊กตาซอฟกับตุ๊กตาออร์สินะ"
90002010-24 = "ชะ... ใช่ค่ะ... ขอโทษนะคะ พี่มัลคูธ..."
90002010-25 = "ไม่เป็นไรค่ะไอน์ ถ้าไอน์สนุก นั่นก็เพียงพอสำหรับฉันแล้วค่ะ"
90002010-26 = "แต่นอกจากตุ๊กตาซอฟกับออร์แล้ว เหมือนจะมีตุ๊กตาจักรกลอื่นๆ อีกเยอะเลยนะคะ"
90002010-27 = "ใช่ค่ะ! ตุ๊กตาพวกนี้... คือ..."
90002010-28 = "ละ... ลูกๆ ของฉันค่ะ!"
90002010-29 = "งั้นเหรอคะ...?"
90002010-30 = "แล้วบางทีก็เป็นน้องสาวของฉันด้วยค่ะ!"
90002010-31 = "อย่างนี้เองสินะคะ...?"
90002010-32 = "แล้วก็... แล้วก็... ในเมื่อฉันเป็นน้องสาวของพี่มัลคูธ... แล้วเด็กๆ พวกนี้ก็เป็นลูกของฉัน เพราะงั้นสำหรับพี่มัลคูธแล้ว เด็กๆ พวกนี้ก็คือ..."
90002010-33 = "ฉันรู้ค่ะ ไอน์ เด็กๆ พวกนี้ก็เป็นเหมือนกับ 'หลาน' ของฉันสินะคะ?"
90002010-34 = "ค่ะ ค่ะ! ใช่ค่ะ! ถะ... ถึงจะไม่แน่ใจเต็มร้อย... แต่ก็น่าจะถูกต้องค่ะ! พี่มัลคูธพูดถูกแน่นอนค่ะ!"
90002010-35 = "ถ้างั้นก็ สวัสดีค่ะ ลูกๆ และน้องสาวของไอน์ ฉันชื่อมัลคูธค่ะ"
90002010-36 = "พะ... พะพะพะพะ... พี่มัลคูธถึงกับเอ่ยทักทายลูกๆ ของฉันเลยเหรอคะ...! ทะ... ทำยังไงดีล่ะ...? ในตัวฉันมีการส่งสัญญาณความสุขมากเกินไปจนเหมือนมีตรงไหนช็อตเลยค่ะ...!"
90002010-37 = "ว่าแต่ ไอน์คะ?"
90002010-38 = "ค่ะ พี่มัลคูธ!"
90002010-39 = "ไม่มีตุ๊กตาของฉันเหรอคะ?"
90002010-45 = "ขะ... ขะขะขะขะขะ... ขอโทษค่ะ พี่มัลคูธ! ฉันไม่รู้ว่าจะเป็นแบบนี้... ไม่สิ! แต่ยังไงก็ควรรู้ไว้สิ! ฉันควรเตรียมพร้อมสำหรับทุกความเป็นไปได้แท้ๆ! ทุกอย่างเป็นความผิดของฉันเองค่ะ! ฮือออ..."
90002010-46 = "ไม่เป็นไรค่ะ ไอน์ ไม่เป็นไร"
90002010-47 = "ยังไงตอนนี้พวกเราก็กำลังรอ 'วาระสุดท้าย' กันอยู่จริงๆ นี่คะ "
90002010-48 = "ฉันคิดว่าการผ่อนคลายก็เป็นสิ่งสำคัญค่ะ"
90002010-49 = "ค่ะ... ค่ะ... ใช่ค่ะ แล้ว <พลังของทวยเทพไร้นาม> ที่ไหลเวียนอยู่ในดินแดนเหล็กกล้าก็ต้องมีการ#nเปลี่ยน[ruby=Phase]เฟส[/ruby]อย่างรวดเร็ว... เพื่อวาระนั้นด้วยค่ะ..."
90002010-50 = "อึก... ถ้าไม่มีท่านธิดากับหญิงรับใช้นั่น เราก็ไม่ต้องทำงานเพิ่มกันขนาดนี้..."
90002010-51 = "ค่ะ คงเหนื่อยน่าดูเลย ขอบคุณสำหรับความทุ่มเทนะคะ"
90002010-52 = "ส่วน 'ตุ๊กตาจักรกลมัลคูธ' น่ะ ฉันไม่กังวลเลยสักนิดค่ะ ก็ไอน์จะสร้างให้ฉันในสักวันอยู่แล้วนี่คะ?"
90002010-53 = "...!"
90002010-54 = "ค่ะ! แน่นอนที่สุดค่ะ พี่มัลคูธ!"
90002010-55 = "แต่ถ้าเป็นอย่างนั้น ตุ๊กตามัลคูธก็จะเป็นลูกกับน้องสาวอีกคนของไอน์สินะคะ"
90002010-56 = "สวัสดีค่ะ พี่ไอน์"
90002010-57 = "อ๊ายยยยย?!?!"
90002010-58 = "พี่มัลคูธ เรียก ฉัน ว่า พี่ ด้วย..."
90002010-63 = "ฉันไม่ได้ตั้งใจให้ถึงกับเป็นลมไปแบบนี้นะคะ..."
90002010-65 = "..."
90002010-66 = "เฮ้อ...  จะทำยังไงกับอันนี้ดีนะ..."
90002010-67 = "..."
90002010-68 = "ทิฟาเร็ธ..."
90002010-75 = "ทำอะไรอยู่เหรอคะ ซอฟ?"
90002010-76 = "อ๊ะ?! พี่มัลคูธ!?!?"
90002010-77 = "คะ... คือว่า..."
90002010-78 = "ดูเหมือนจะเป็นกล่องปิดสนิทที่ทำมาอย่างดีเลยนะคะ"
90002010-79 = "ไม่สิ... ถ้าดูดีๆ แล้วก็เหมือนแตกอยู่นิดหน่อยเลยค่ะ ว่าแต่มันคืออะไรเหรอคะ?"
90002010-80 = "อันนี้... คือ..."
90002010-81 = "หนึ่งในกล่องเมล็ดพันธุ์ของทิฟาเร็ธน่ะ..."
90002010-82 = "ก็... พี่มัลคูธก็รู้นี่ว่าทิฟาเร็ธตัดสินใจส่งเมล็ดพันธุ์มาเพราะเห็นว่ามันสำคัญมากกว่าตัวเองน่ะ..."
90002010-83 = "ค่ะ แล้วพวกเราก็ตกลงกันแล้วว่าจะเคารพการตัดสินใจนั้นด้วยค่ะ"
90002010-84 = "อื้อ แต่สภาพการจัดเก็บของบางกล่องก็ไม่ดีเท่าไร"
90002010-85 = "แล้วกล่องนี้ก็สภาพแย่ที่สุดในบรรดากล่องทั้งหมดเลยละ..."
90002010-86 = "สภาพการจัดเก็บไม่ดีงั้นเหรอคะ หมายความว่ายังไงคะ?"
90002010-87 = "ก็หมายความว่า... มันอยู่ในสภาพที่เมล็ดพันธุ์พร้อมจะงอกออกมาได้ทุกเมื่อน่ะสิ"
90002010-88 = "แต่ต่อให้งอกออกมาในดินแดนเหล็กกล้า..."
90002010-89 = "ฉะ... ฉันรู้หรอกน่าว่าไม่ควรจะมากังวลเรื่องแบบนี้ตั้งแต่แรกแล้ว! เรื่องนั้นอย่าเข้าใจกันผิดล่ะ!"
90002010-90 = "แต่ว่า ทิฟาเร็ธ..."
90002010-91 = "..."
90002010-92 = "ซอฟ ในตอนนี้ วินาทีนี้ ทิฟาเร็ธก็ยังอยู่กับเราที่นี่ค่ะ นั่นคือสิ่งที่จริงแท้แน่นอนค่ะ"
90002010-93 = "อะ... อื้อ ก็คงใช่นะ..."
90002010-94 = "แต่ฉันก็เข้าใจความรู้สึกของซอฟที่อยากรักษาเจตนารมณ์ของ 'ทิฟาเร็ธ' ค่ะ"
90002010-95 = "งั้นเราลองทำแบบนี้ดูมั้ยคะ?"
90002010-101 = "เราจะแอบเอาเมล็ดพันธุ์นี้ไปฝังไว้ใต้สถานที่ศักดิ์สิทธิ์กันค่ะ"
90002010-102 = "พะ... พี่มัลคูธ?!?! แต่แบบนั้นมัน...!"
90002010-104 = "ค่ะ ฉันก็รู้ค่ะ ในบางแง่แล้วนั่นอาจเป็นการกระทำที่ละเมิดกฎของเราก็ได้"
90002010-105 = "แต่สถานที่นั้นคือจุดเริ่มต้นของดินแดนเหล็กกล้า และเป็นจุดเดียวที่ยังมี 'ดิน' หลงเหลืออยู่ในตอนนี้ ไม่ใช่เหรอคะ?"
90002010-106 = "แต่สาเหตุที่ยังมีดินเหลืออยู่ตรงนั้น ก็เพราะมีการยกเว้นการใช้พลังของเน็ตซาชกับที่นั่น..."
90002010-107 = "ที่สถานที่ศักดิ์สิทธิ์แห่งนั้น... เจตนารมณ์ของท่านผู้นั้น..."
90002010-108 = "แต่ถ้าเมล็ดพันธุ์นี้เอาชนะทุกสิ่งและแตกหน่อขึ้นมาได้ในสถานที่นั้นละก็..."
90002010-109 = "ในบางแง่แล้ว สิ่งนั้นก็จะเป็นเจตจำนงเสรีที่เหลืออยู่ของทิฟาเร็ธไม่ใช่เหรอคะ?"
90002010-110 = "และเจตจำนงเสรีก็เป็นปัจจัยสำคัญไม่เพียงกับมนุษย์เท่านั้น แต่ยังสำคัญกับทั้งเราและท่านผู้นั้นด้วยค่ะ"
90002010-111 = "ถึงแม้ทั้งหมดนั้นจะเป็นเรื่องโกหกจากการคิดไปเองเมื่อเราได้คุยกันอย่างลึกซึ้งก็ตามทีค่ะ"
90002010-112 = "แต่ถึงยังไง... ยังไงก็น่าจะไม่เป็นไรหรือเปล่านะ...?"
90002010-113 = "ต้องเป็นอยู่แล้วละค่ะ"
90002010-114 = "พี่มัลคูธ?!?!"
90002010-115 = "นี่เป็นการ 'ทำเรื่องไม่ดี' กับฉันอย่างหนึ่งเลยนะคะ?"
90002010-116 = "เรื่องไม่ดี...!"
90002010-117 = "แล้วการทำเรื่องไม่ดี มันก็ดูเป็นเรื่องสนุกด้วยนี่คะ?"
90002010-118 = "อ่า อื้อ โดยเฉพาะกับพวกมนุษย์น่ะ ฉันได้ยินมาว่าพวกนั้นคิดแบบนั้นกัน..."
90002010-119 = "ค่ะ งั้นเรามาทำเรื่องไม่ดีด้วยกันเถอะค่ะ แค่ครั้งเดียวเท่านั้นค่ะ"
90002010-120 = "ซอฟเองก็กังวลใจอยู่เพราะไม่อยากลืมทิฟาเร็ธไม่ใช่เหรอคะ?"
90002010-121 = "แน่นอนว่าตอนนี้ทิฟาเร็ธก็ยังอยู่กับพวกเราอยู่ค่ะ"
90002010-122 = "แต่ที่สำคัญก็คือ พวกเรากำลังรอ 'วาระสุดท้าย' กันอยู่นี่คะ"
90002010-123 = "นะ... นี่เป็นไอเดียของพี่มัลคูธนะ พี่มัลคูธเป็นคนชวนก่อนนะ...?"
90002010-124 = "ค่ะ เราสองพี่น้องมาก่อเรื่องด้วยกันเถอะค่ะ"
90002010-125 = "อื้อ!"
90002010-130 = "ว่าแต่ ซอฟคะ"
90002010-131 = "การเปลี่ยนเฟสของ <พลังของทวยเทพไร้นาม> กำลังเป็นไปได้ด้วยดีหรือเปล่าคะ?"
90002010-132 = "อ้อ เรื่องนั้นน่ะเหรอ? พี่มัลคูธไม่ต้องกังวลหรอก ต่อให้สองคนนั้นจะเดินทางมาถึงดินแดนเหล็กกล้า แต่ก็ใช้พลังนั้นอย่างอิสระเหมือนเป็นพลังของตัวเองไม่ได้หรอก"
90002010-133 = "แต่ยังไงมันก็น่าเสียดายนะที่เราเปลี่ยนแปลงสิ่งต่างๆ อย่างสิ้นเชิงจากต้นตอไม่ได้..."
90002010-134 = "แต่ถ้าเราประมาททำเรื่องแบบนั้นละก็ ดินแดนเหล็กกล้าในปัจจุบันที่สร้างขึ้นจากพลังนั้นก็จะใช้การ#nไม่ได้น่ะ..."
90002010-135 = "อย่างนั้นสินะคะ งั้นเราก็แค่เติมเต็มส่วนที่ขาดหายไปก็พอค่ะ"
90002010-136 = "อื้อ... พี่มัลคูธพูดถูกแล้วละ ก็คงต้องเป็นอย่างนั้น"
90002010-140 = "ทำอะไรอยู่เหรอคะ ออร์?"
90002010-141 = "..."
90002010-142 = "...?"
90002010-143 = "เข้าไปอยู่ในโลกของตัวเองสินะคะ ออร์"
90002010-144 = "ถ้างั้น ฉันขอเสียมารยาทหน่อยนะคะ"
90002010-152 = "งืม งืม..."
90002010-157 = "ขอถามอีกครั้งนะคะ ทำอะไรอยู่เหรอคะ ออร์?"
90002010-158 = "เอ๋...?"
90002010-162 = "พี่มัลคูธ?!?!?! เข้ามาในนี้ได้ยังไง...??!!"
90002010-163 = "ไม่ต้องตกใจขนาดนั้นหรอกค่ะ ออร์"
90002010-164 = "ตามหลักการแล้ว ไม่มีที่ไหนในดินแดนเหล็กกล้าที่ฉัน 'ไปไม่ได้' ไม่ใช่เหรอคะ?"
90002010-165 = "อ่า... ค่ะ มันก็จริงอย่างนั้นนะคะ..."
90002010-166 = "แต่ก็น่าทึ่งเลยนะคะ ออร์ ที่นี่ดูเป็นโลกที่... 'เป็นธรรมชาติ' มากเลยนะคะ"
90002010-167 = "ก็... ทำนองนั้นค่ะ"
90002010-168 = "ก็เราทุกคนต่างมีสิ่งที่เรียกว่า... 'กล่องดำ' อยู่ในขอบเขตวงจรการรับรู้นี่คะ?"
90002010-169 = "ค่ะ ถ้าใช้คำที่มนุษย์เรียกกัน คงต้องเรียกว่าเป็นขอบเขตจิตใต้สำนึกค่ะ"
90002010-170 = "ฉันแค่สงสัยนิดหน่อยว่ามันเป็นยังไง ก็เลยใส่ส่วนหนึ่งของวงจรการรับรู้เข้าไปด้วยวิธีประมวลผลจาก#nบิ๊กดาต้าน่ะค่ะ"
90002010-171 = "ตายจริง พอทำแบบนั้นก็เลยได้โลกแห่งจินตนาการแบบนี้ขึ้นมาสินะคะ"
90002010-172 = "ใช่แล้วค่ะ ก็ซอฟชอบพูดถึงชีวิตและธรรมชาติ สงสัยฉันเลยได้รับอิทธิพลมาด้วยน่ะค่ะ"
90002010-173 = "แต่ก็ไม่ได้อลังการเท่าไรเลยนะคะ ฉันคงคิดไปเองว่าธรรมชาติจะตื่นตาตื่นใจกว่านี้น่ะค่ะ"
90002010-174 = "แต่ยังไงก็... นะ..."
90002010-175 = "มันก็..."
90002010-176 = "พอมาอยู่ตรงนี้ ฉันก็รู้สึกว่าคลื่นรบกวนในวงจรความคิดหรืออะไรทำนองนั้นมันสงบลงน่ะ..."
90002010-177 = "อย่างนั้นสินะคะ พอพูดเจาะจงว่าวงจรความคิดเสถียรขึ้น ฉันก็รู้สึกแบบเดียวกันขึ้นมาเลยค่ะ"
90002010-178 = "ว่าแต่ ฉันได้ยินมาจากไอน์กับซอฟว่าตอนนี้กำลังเปลี่ยนเฟสของ <พลังของทวยเทพไร้นาม> กันอยู่ใช่มั้ยคะ?"
90002010-179 = "อ้อ ค่ะ ใช่ค่ะ... เฮ้อ ไม่อยากเชื่อเลยว่าต้องมาทำเรื่องแบบนี้ในตอนสุดท้ายของสุดท้ายอีกที..."
90002010-180 = "เพราะงั้นเดี๋ยวจะต้องมีการปรับแต่งร่างกายของพี่มัลคูธอีกครั้งด้วยค่ะ ถึงจะใช้เวลาไม่นานก็เถอะ"
90002010-181 = "ทุกอย่างเป็นเพราะคนที่ชื่อว่าคุณครู [USERNAME] นั่นแท้ๆ เลยค่ะ จริงๆ เลยเชียว!"
90002010-182 = "ใจเย็นๆ ก่อน ไม่ต้องโมโหไปหรอกค่ะ ออร์"
90002010-183 = "ถ้าเราได้คุยกับคุณครู [USERNAME] อย่างตรงไปตรงมาที่นี่ คุณครูก็น่าจะเข้าใจเจตนารมณ์ของพวกเรานะคะ"
90002010-184 = "ฉันว่าตอนนี้น่ะ เรามานอนอาบแดดด้วยกันดีกว่าค่ะ"
90002010-185 = "อาบแดด... งั้นเหรอคะ?"
90002010-186 = "มันคือการนอนรับแสงแดดเฉยๆ ไม่ต้องทำอะไรค่ะ"
90002010-187 = "แต่แน่นอนว่ามันเป็นเพียง 'ความรู้สึกว่าเราได้รับแสง' ที่ถูกส่งออกมาในรูปของสัญญาณไฟฟ้า"
90002010-188 = "จากนั้นวงจรประสาทรับรู้ของเราที่ได้รับสัญญาณนั้นก็ส่งสัญญาณกลับมาบอกว่า 'พอใจแล้ว' ก็เท่านั้นค่ะ"
90002010-189 = "แต่ถึงยังไง แค่การได้ใช้เวลาร่วมกันกับออร์แบบนี้ มันก็มีความหมายสำหรับฉันแล้วค่ะ"
90002010-193 = "แน่นอนค่ะ พี่มัลคูธ!"
90002010-194 = "ค่ะ ถ้างั้นก็เอาตามนั้นกันดีกว่าค่ะ"
90002010-198 = "ก็พวกเราต่างเป็นผู้ที่ต้องรอคอย 'วาระสุดท้าย' กันนี่คะ"
90002010-201 = "ตอนต่อไป;ยานขนส่ง"
