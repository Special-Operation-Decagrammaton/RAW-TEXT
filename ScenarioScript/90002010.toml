90002010-63 = "5;말쿠트;05;그렇게까지 반응하기를 바란 건 아니었는데요…….\n#5;em;[땀]"
90002010-64 = "#all;hide"
90002010-65 = "3;소프;13;…….\n#3;em;…\n#3;a"
90002010-66 = "3;소프;99;하아……. 이걸 어쩌지…….\n#3;stiff"
90002010-67 = "3;소프;19;……."
90002010-68 = "3;소프;06;티페레트…….\n#3;em;[속상함]"
