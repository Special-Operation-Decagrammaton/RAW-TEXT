90002010-97 = "#clearST"
90002010-98 = "3;소프;02\n5;말쿠트;01\n#3;em;[?]\n#3;h\n#5;h\n#wait;1000"
90002010-99 = "3;소프;02\n5;말쿠트;01\n#5;m4\n#3;h\n#5;h\n#wait;1500"
90002010-100 = "#all;hide"
90002010-101 = "3;말쿠트;03;우리가 이 씨앗을, 몰래 성지 아래에 묻어 주고 오는 거예요.\n#3;em;[반짝]\n#3;closeup"
90002010-102 = "3;소프;02;어, 언니?!?! 하지만 그건……!\n#3;em;[?!]\n#3;shake\n#3;closeup"
90002010-103 = "#all;hide"
90002010-104 = "3;말쿠트;99;네. 저도 알고 있어요. 그건 어떻게 보면 우리의 규율을 위반할 수 있는 행위이기도 하죠."
90002010-105 = "3;말쿠트;00;하지만 그곳은 강철대륙의 시작점이었고, 지금도 유일하게 '토양'이 남아 있는 곳이기도 하잖아요?"
90002010-106 = "3;소프;04;하지만 그곳에 토양이 남아 있는 이유는, 거기에만 네차흐의 능력을 적용하지 않기로 했기 때문이었고…….\n#3;em;…"
90002010-107 = "3;소프;12;그건 그 성지에, 그분의 의지가…….\n#3;stiff"
90002010-108 = "3;말쿠트;07;하지만 그곳에서도 이 씨앗이 모든 것을 이겨내고 싹을 틔운다면."
90002010-109 = "3;말쿠트;02;그것이야말로 어떤 의미로, 티페레트의 남겨진 자유의지이지 않을까요?"
90002010-110 = "3;말쿠트;03;그리고 자유의지는 인간들뿐만 아니라 우리에게도, 나아가 그분에게도 중요한 요소니까요.\n#3;em;[반응]"
90002010-111 = "3;말쿠트;02;비록 그 모든 것이, 깊이 이야기해 들어가면 착각으로 이루어진 거짓이라고 할지라도요."
90002010-112 = "1;소프;10;그렇지만, 그래도, 괜찮은 걸까……?\n#1;em;[땀]\n#1;ar\n#3;m5"
90002010-113 = "3;말쿠트;99;물론 괜찮지 않지요."
90002010-114 = "1;소프;13;언니?!?!\n#1;em;[?!]\n#1;shake"
90002010-115 = "3;말쿠트;03;그러니까 이건, 저와 함께하는 일종의 '나쁜 짓'이랍니다?"
90002010-116 = "1;소프;08;나쁜, 짓……!\n#1;stiff"
90002010-117 = "3;말쿠트;07;그리고 나쁜 짓은 왠지 모르게, 즐거운 법이라잖아요?"
90002010-118 = "1;소프;02;어, 응. 인간들은 특히 그걸 그렇게 느낀다고 하지……."
90002010-119 = "3;말쿠트;08;네. 그러니까 이번 한 번만 함께, 나쁜 짓을 해 보도록 하죠.\n#3;em;[반짝]"
90002010-120 = "3;말쿠트;03;소프도 티페레트를 잊고 싶지 않아서, 고민하는 것이잖아요?\n#3;m3\n#1;dl"
90002010-121 = "3;말쿠트;07;물론 티페레트는 분명, 지금 이 순간 우리와 함께 있는 것이기도 하지만요."
90002010-122 = "#1;hide\n3;말쿠트;03;무엇보다 우리는, '최후의 때'를 기다리고 있으니 말이죠.\n#3;closeup"
90002010-123 = "3;소프;04;어, 언니가 먼저 하자고 한 거야, 이거……?\n#3;em;[땀]\n#3;closeup"
90002010-124 = "3;말쿠트;08;네. 우리 같이 자매끼리 사이좋게 말썽을 부려 봐요.\n#3;closeup"
90002010-125 = "3;소프;25;응!\n#3;em;[반짝]\n#3;closeup\n#fontsize;100"
