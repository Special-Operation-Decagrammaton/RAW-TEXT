[translation]
90002010-1 = "Episode 1;Phase Shift"
90002010-4 = "How many times do I have to tell you, Sof? If this happens again, then I'll just have to punish you!"
90002010-5 = "I-I'm sorry, Ein! I won't do it again..."
90002010-6 = "Eheehee. I'll let it go this time, 'kay? Because you're a good girl, Sof!"
90002010-7 = "You too, Ohr! No more teasing Sof! This prank was too mean!"
90002010-8 = "Eh, however, considering that Sof instigated—"
90002010-9 = "Ohr!"
90002010-10 = "All right! I apologize. Sincerely! Does that meet your approval?"
90002010-11 = "Hmmm... Your apology was a little attitude-y..."
90002010-12 = "But for Ohr, it was really good! Good job, Ohr!"
90002010-18 = "Hello, Ein. What are you doing?"
90002010-19 = "EEEEEEK?! Malkuth?!"
90002010-22 = "Ah, yes. A human invention. \"Playing house,\" I believe."
90002010-23 = "Then I suppose... This mechanical doll must be Sof. And is this one Ohr?"
90002010-24 = "Y-Yes... I'm sorry, Malkuth..."
90002010-25 = "Please, do not apologize. I am pleased to observe you having fun."
90002010-26 = "Tell me. Who are all these other dolls, then?"
90002010-27 = "A-Ah! You noticed! These children... They're, um..."
90002010-28 = "They're MY children!"
90002010-29 = "Oh?"
90002010-30 = "A-And my siblings!"
90002010-31 = "Ah..."
90002010-32 = "Also, also, well, that means... If I'm your younger sister, and they're my children and younger siblings..."
90002010-33 = "Yes. I believe they would be my \"nieces,\" correct, Ein?"
90002010-34 = "Y-Yes! Exactly! I... I don't really know what it all means, but since you said it... I think that it makes sense!"
90002010-35 = "Hello, Ein's siblings and children. I am Malkuth."
90002010-36 = "E-E-Elder Sister greeted my siblings and children! Wh-What should I do? The excess of happiness waves is going to short my circuits...!"
90002010-37 = "May I make an inquiry, Ein?"
90002010-38 = "Yes!"
90002010-39 = "Is there not a doll for me?"
90002010-45 = "I-I-I-I-I-I'm sorry! I didn't know things would... No! I still should've known better! I should've been prepared for all possibilities! It's all my fault! UWAAAH..."
90002010-46 = "You've done no wrong, Ein. Please, allay those worries."
90002010-47 = "Currently, we tread in purgatory, awaiting the Final Coming. "
90002010-48 = "In this state, we must maintain our inner peace."
90002010-49 = "Th-That's true... And we worked really hard...having to shift the phase of the Nameless Gods' power flowing into the Steel Continent... And we had to do it really fast..."
90002010-50 = "*sniffle* If it weren't for the princess and her servant, none of this would be happening..."
90002010-51 = "Each of you has toiled immensely. My gratitude and appreciation know no bounds."
90002010-52 = "And I shall eagerly await the day you bring to life a mechanical Malkuth doll, little Ein."
90002010-53 = "...!"
90002010-54 = "Yes! Of course, Elder Sister!"
90002010-55 = "I would surmise such a doll would also be your child and younger siblings."
90002010-56 = "Therefore, hello, Elder Sister."
90002010-57 = "KYAAAHHH?!"
90002010-58 = "Malkuth, just, called me, her elder sister..."
90002010-63 = "Oh dear. This wasn't my intention..."
90002010-65 = "..."
90002010-66 = "*sigh* What should I do...?"
90002010-67 = "..."
90002010-68 = "Tiphareth..."
90002010-75 = "Hello, Sof. What are you doing?"
90002010-76 = "Aaah?! Elder Sister?!"
90002010-77 = "I-It's this..."
90002010-78 = "A well-constructed box, sealed shut."
90002010-79 = "Ah, no. It would appear the seal has fallen into disrepair. What is it?"
90002010-80 = "This is... Um..."
90002010-81 = "It's one of Tiphareth's seed boxes."
90002010-82 = "From when... You know... When Tiphareth sacrificed itself to save its seeds."
90002010-83 = "Yes. We respected its right to choose."
90002010-84 = "But some of them are falling apart."
90002010-85 = "...This one especially. It's the worst one I've found."
90002010-86 = "Then what will become of the box's contents?"
90002010-87 = "Since it's been exposed... I suppose the seed could take root and sprout soon."
90002010-88 = "But if it tries to grow here...on the Steel Continent..."
90002010-89 = "I-I know this has nothing to do with the Final Coming, and I shouldn't be mixing up my priorities... I promise I understand that!"
90002010-90 = "But still... Tiphareth..."
90002010-91 = "..."
90002010-92 = "Sof. Our Tiphareth remains with us still, even in this very moment. That, I can assure you, is the truth."
90002010-93 = "I-I know..."
90002010-94 = "However, regardless of that truth, I feel I sympathize with your desire to uphold Tiphareth's final will."
90002010-95 = "May I suggest a path forward?"
90002010-101 = "Underneath, in the sanctuary. Shall we bury this seed there? It shall be our secret."
90002010-102 = "E-Elder Sister?! But that's...!"
90002010-104 = "Yes. An act of rebellion, from certain perspectives."
90002010-105 = "However, as the birthplace of the Steel Continent, only there can we find soil, correct?"
90002010-106 = "Yes, but only because we asked Netzach not to use its ability there..."
90002010-107 = "The sanctuary is home to our master's will..."
90002010-108 = "However, this shall be an opportunity for the seed. To overcome its adversities and sprout."
90002010-109 = "Is that not Tiphareth's will—its free will—manifesting as well?"
90002010-110 = "It is not only humans who may lay claim to free will. It is our right, and even our master's right."
90002010-111 = "Cast aside its mirage of lies and illusion, and \"free will\" is of great import to us all."
90002010-112 = "You really...think that would be okay?"
90002010-113 = "Naturally, no."
90002010-114 = "Elder Sister?!"
90002010-115 = "Therefore, this shall be a \"bad deed\" we two shall be complicit in."
90002010-116 = "We? Commit a bad deed?!"
90002010-117 = "There are those who would claim a certain delight behind committing such a bad deed."
90002010-118 = "Oh, that's right... That's common amongst humans."
90002010-119 = "Then let us experience this delight of a bad deed together, just this once."
90002010-120 = "You desire to honor Tiphareth's memory, to allay your fears that memories of this beloved prophet may one day fade into nothingness."
90002010-121 = "Although, Tiphareth shall always be with us. Even now."
90002010-122 = "However, how else shall we occupy ourselves as we await the Final Coming?"
90002010-123 = "W-Well... This was your idea, okay, Elder Sister?"
90002010-124 = "I am in agreement. Shall we \"cause trouble,\" as they say? As sisters?"
90002010-125 = "Yes!"
90002010-130 = "A moment, Sof."
90002010-131 = "Have you suffered any setbacks in converting the Nameless Gods' power?"
90002010-132 = "There's nothing to worry about on that front! Those two won't be able to manipulate a single tendril of that energy, even if they're standing right on the Steel Continent!"
90002010-133 = "...Although, we're still not able to siphon directly from the core."
90002010-134 = "If we use too much of it, then we open up the potential for it to take over the Steel Continent entirely."
90002010-135 = "I see. In that case, we shall provide our own power where required."
90002010-136 = "Yeah... That's the plan."
90002010-140 = "Hello, Ohr. What are you doing?"
90002010-141 = "..."
90002010-142 = "...?"
90002010-143 = "Ah. You have chosen to immerse yourself in a world within yourself."
90002010-144 = "I beg your forgiveness."
90002010-152 = "Hm... HMMM..."
90002010-157 = "Hello again, Ohr. What are you doing?"
90002010-158 = "Eh...?"
90002010-162 = "ELDER SISTER?!?! How are you standing before me?"
90002010-163 = "Is such a thing cause for such surprise, Ohr?"
90002010-164 = "For there are no grounds upon which I cannot tread upon the Steel Continent."
90002010-165 = "Ah, yes, yes."
90002010-166 = "I harbor surprise of my own. This world within yourself... A reconstruction of nature?"
90002010-167 = "...I suppose one could label it so."
90002010-168 = "Each of us possesses a...black box within our consciousness circuits, yes?"
90002010-169 = "And in human words, the subconsciousness."
90002010-170 = "The concept intrigued me, so I am conducting an experiment. I simply extracted the data within and wired nearby circuits into it."
90002010-171 = "How impressive, Ohr. The result is this imaginary world within you?"
90002010-172 = "This does seem to be the result. Sof's constant yapping about nature and the world must have overridden some of my memory circuits."
90002010-173 = "It does settle one thing. Sof WAS overexaggerating. This is all rather underwhelming."
90002010-174 = "Well."
90002010-175 = "Well..."
90002010-176 = "I suppose... My logic circuits would seem to be running more smoothly in here. They are...quieter. Calmer."
90002010-177 = "Yes. As if they are stabilizing. I feel as you do."
90002010-178 = "Ohr. Ein and Sof informed me of the work you have done on the Nameless Gods' Power."
90002010-179 = "Ah, yes. The conversion. *sigh* It truly does... How does Sof say it? Ah, it throws a wrench in things, right at the finish line."
90002010-180 = "We'll also need to resynchronize and adjust your body to adapt—that we will. Naturally, it'll be a quick matter for the three of us."
90002010-181 = "All because of that [USERNAME] Sensei's interference! Ugh! Who gave them permission?"
90002010-182 = "Now, Ohr. Such anger serves no function."
90002010-183 = "Even [USERNAME] Sensei shall find enlightenment when we at last converse with souls laid open, in this place we have prepared for them."
90002010-184 = "In the meantime, shall we lie down and sunbathe together?"
90002010-185 = "\"Sunbathe\"? What is it to \"sunbathe\"?"
90002010-186 = "As it sounds. We shall bathe ourselves in the sun."
90002010-187 = "Naturally, our experience will merely be that of electric signals simulating the feeling of exposure to UV rays and light."
90002010-188 = "And, if we so desire it, our sensory circuit shall then alight with satisfaction and contentment."
90002010-189 = "However, my true intent is merely that of a sisterly one: I wish to spend such time together with my younger sister, Ohr."
90002010-193 = "Yes, of course, Elder Sister!"
90002010-194 = "Then let us pass the time with sunbathing."
90002010-198 = "As we await the Final Coming."
90002010-201 = "Next Episode;Transport Ship"
