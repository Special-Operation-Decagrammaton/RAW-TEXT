[translation]
51100-1 = "ตอนที่ 10;แก้มแดง"
51100-6 = "[ns] \"ยูคาริ ถ้าเหนื่อยก็พักก่อนแล้วค่อยไปต่อมั้ย?\""
51100-10 = "อ่า..."
51100-11 = "ข้าดูเหนื่อยมากเลยเหรอเจ้าคะ...?"
51100-12 = "อ่า... คือว่า... ข้า..."
51100-13 = "...ก็แค่คิดมากกับเรื่องที่เกิดขึ้นในวันนี้..."
51100-14 = "..."
51100-15 = "...ในบรรดาเฮียกกะเรียวรัน รุ่นพี่เรนเกะเป็นคนที่มีความรับผิดชอบสูงกว่าใครเจ้าค่ะ"
51100-16 = "แต่คนที่มีความรับผิดชอบกลับบอกว่าเฮียกกะเรียวรันของเราจบลงไปแล้ว พอรุ่นพี่พูดอย่างนั้น..."
51100-17 = "ข้าก็เลยสับสนนิดหน่อยน่ะเจ้าค่ะ"
51100-21 = "...นี่แหนะ!"
51100-26 = "[ns] \"ดะ... เดี๋ยวสิ! ยูคาริ! ตบแก้มตัวเองทำไม...\""
51100-29 = "ไล่ความคิดฟุ้งซ่านออกไปได้แล้ว!"
51100-30 = "อื้ม! ข้า ยูคาริ! อิล~ลีทแห่งเฮียกกะเรียวรัน! ไม่ใช่คนที่จะหมดกำลังใจเพราะเรื่องแค่นี้หรอกเจ้าค่ะ!"
51100-31 = "ฮึ่ม... ที่รุ่นพี่เรนเกะเป็นแบบนั้น ก็เพราะว่ายังสับสนอยู่เจ้าค่ะ!"
51100-32 = "แทนที่จะมาคิดถึงเรื่องอดีตที่ผ่านไปแล้วและทำอะไรไม่ชัดเจน ข้าควรคิดถึงอนาคตที่จะมาถึง แล้วทำตัวให้สมกับเป็นอิล~ลีทที่สุขุม!"
51100-33 = "ถึงแผนการขอความช่วยเหลือจากรุ่นพี่เรนเกะจะไม่สำเร็จ..."
51100-34 = "แต่ข้าก็ยังรู้จักสมาชิกระดับสูงคนอื่นในเฮียกกะเรียวรันเจ้าค่ะ!"
51100-35 = "[s] \"คิเคียว... ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันใช่มั้ย?\""
51100-36 = "เจ้าค่ะ! รุ่นพี่คิเคียวต้องเข้าใจเกี่ยวกับ <ศึกชิงตำแหน่ง> แน่นอน แล้วก็ต้องยินดีช่วยข้าด้วยเจ้าค่ะ!"
51100-37 = "อีกอย่าง... รุ่นพี่คิเคียวก็เป็นเพื่อนกับรุ่นพี่เรนเกะมาตั้งแต่เด็กด้วย"
51100-38 = "รุ่นพี่ต้องช่วยพูดเกลี้ยกล่อมรุ่นพี่เรนเกะให้แน่นอนเจ้าค่ะ!"
51100-39 = "อื้ม! ถึงจะเป็นความคิดที่มาจากยูคาริผู้นี้... แต่ก็ต้องบอกว่าเป็นแผนการที่เพอร์~เฟกต์โตะ~ มาก!"
51100-40 = "เพราะงั้น ท่านอาจารย์ [USERNAME]! ได้โปรดช่วยข้าต่อได้ไหมเจ้าคะ?"
51100-41 = "[s] \"อื้ม ครูสัญญาว่าจะช่วยตั้งแต่แรกแล้วนี่\""
51100-42 = "...! "
51100-43 = "ฮุฮุฮุ! เจ้าค่ะ!"
51100-47 = "ถ้าอย่างนั้นก็...!"
51100-54 = "คุณหนู ข้ามารับตัวคุณหนูเจ้าค่ะ"
51100-60 = "อ่า..."
51100-61 = "วันนี้คุณหนูเหมือนจะมีธุระทั้งวัน ข้าก็เลยรออยู่จนถึงตอนนี้"
51100-62 = "ถึงเวลาต้องกลับบ้านแล้วเจ้าค่ะ"
51100-63 = "แต่ข้ายังมีเรื่องที่ต้องทำอยู่..."
51100-64 = "นี่มันกี่โมงกี่ยามแล้วเจ้าคะ?"
51100-65 = "ไม่ทราบว่า... เรื่องที่ว่าเป็นเรื่องที่เกี่ยวข้องกับท่านนี้หรือเปล่าเจ้าคะ?"
51100-66 = "คุณเป็นใครเหรอเจ้าคะ? เห็นอยู่กับคุณหนูมาตั้งแต่ตอนเช้าแล้ว "
51100-67 = "ถ้าคุณเข้าหาคุณหนูด้วยเล่ห์เหลี่ยมอะไรละก็ หญิงรับใช้ของคาเดโนะโคจิคนนี้จะไม่ยอมอยู่เฉยๆ แน่นอนเจ้าค่ะ!"
51100-68 = "[s] \"อ่า... เป็นครูจากชาเล่ต์น่ะ\""
51100-69 = "คุณครูจากชาเล่ต์... ที่ชื่อเสียงโด่งดังคนนั้นน่ะเหรอ...?"
51100-70 = "เจ้าค่ะ! ใช่แล้ว! เพราะงั้นก็ห้ามเข้าใจผิดนะเจ้าคะ!"
51100-71 = "ท่านอาจารย์อุตส่าห์เข้ามาสนับสนุนความตั้งใจของข้า... เพราะความดื้อดึงของข้าแท้ๆ เลย!"
51100-75 = "...ถ้าคุณหนูพูดแบบนั้น ข้าก็เข้าใจแล้วเจ้าค่ะ"
51100-76 = "ต้องขออภัยที่เสียมารยาทเจ้าค่ะ "
51100-80 = "แต่ว่า... คุณหนูเจ้าคะ พระอาทิตย์ตกดินแล้วเจ้าค่ะ"
51100-81 = "แต่ว่า... ข้ายังมีเรื่องที่ต้องทำ..."
51100-82 = "คุณหนู จะยังดื้ออยู่อีกเหรอเจ้าคะ? "
51100-83 = "......"
51100-84 = "[s1] \"นี่ก็ค่ำแล้ว กลับกันก่อนไหม?\"\n[s2] \"แล้วมาเจอกันใหม่พรุ่งนี้ ครูเกี่ยวก้อยสัญญาเลย\""
51100-89 = "คุณหนู อย่าบอกนะเจ้าคะว่ายัง..."
51100-90 = "อย่างนี้นี่เอง! นี่ไม่ใช่การจากลา... แต่เป็นการสัญญาเพื่อมาเจอกันใหม่ในวันหน้า!"
51100-91 = "เข้าใจแล้วเจ้าค่ะ!"
51100-92 = "ถ้างั้นมาเจอกันใหม่พรุ่งนี้...!"
51100-93 = "...ดีมากเจ้าค่ะ กลับกันนะเจ้าคะ"
51100-101 = "[ns] \"วันนี้นิยะเรียกไปเจอ... แล้วก็ได้เจอกับยูคาริ...\""
51100-103 = "(แล้วหลังจากนั้นก็เกิดเรื่องขึ้นมากมาย)"
51100-112 = "ภูมิใจแล้วมันยังไงล่ะ! พวกเราถูกทิ้งตั้งแต่แรกแล้วต่างหาก"
51100-114 = "(ทั้งคำที่เรนเกะพูด...)"
51100-117 = "ข้าขอบอกอะไรสักอย่างก่อนกลับนะเจ้าคะ"
51100-118 = "คุณหนูเป็นคนที่งานยุ่งกับงานของตระกูลคาเดโนะโคจิเจ้าค่ะ"
51100-119 = "ถ้าพรุ่งนี้ท่านให้ความร่วมมือและทำให้คุณหนูกลับมาอย่างรวดเร็วโดยไม่มีอะไรเกิดขึ้น ข้าจะขอบพระคุณมากเจ้าค่ะ งั้นข้าขอตัวละเจ้าค่ะ"
51100-124 = "(คุณครูตกอยู่ในห้วงความคิดที่เต็มไปด้วยเรื่องราวยุ่งเหยิง)"
51100-128 = "[log=???]<──── ทางนี้>[/log]"
51100-133 = "[ns] \".......?\""
51100-138 = "อะไรเนี่ย? นี่มันเรื่องอะไร? แล้วทำไมต้องมีเรื่องตอนกำลังยุ่งด้วยนะ"
51100-142 = "เจ้าพวกปีศาจกำลังทะเลาะกับใครบางคนอยู่ในเขตตะวันตกน่ะ!"
51100-144 = "อีกแล้วเหรอครับ?"
51100-145 = "ทำไมถึงก่อเรื่องได้ทุกงานเทศกาลเลยนะ! จริงๆ เลย! แล้วพวกนั้นทะเลาะอยู่กับใครเหรอครับ?"
51100-146 = "เรื่องนั้น... เห็นว่าเป็นเด็กที่ใส่เสื้อฮาโอริน่ะ... งั้นก็น่าจะเป็นเฮียกกะเรียวรัน!"
51100-150 = "[ns] \"...หืม?\""
51100-154 = "วันนี้ฉันตามหายัยนั่นมาทั้งวันเลยนะ!"
51100-156 = "ถึงตอนเช้าจะเข้าใจผิดไปหาเรื่องมาผิดคน แต่ตอนนี้ฉันไม่พลาดตัวจริงแน่นอน!"
51100-161 = "[ns] \"...นั่นมัน?\""
51100-164 = "ตอนต่อไป;สมาชิกเฮียกกะเรียวรัน"
