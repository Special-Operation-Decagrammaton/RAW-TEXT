10054080-74 = "3;슌 수영복;01;하지만 무섭다는 생각이 들 때는, 보통 이런 경우죠."
10054080-75 = "3;슌 수영복;15;지금 제가 하는 행동이, 아무것도 모르는 아이의 내일을…… 이상한 방향으로 어그러뜨려 버리는 것은 아닐까, 같을 때요."
10054080-76 = "3;슌 수영복;09;어쨌든 저는 매화원의 교관이니까요."
10054080-77 = "3;슌 수영복;07;선생님께서도 아시겠지만, 고등학생…… 중학생…… 열 살 근처만 되어도, 말을 정말로 안 듣곤 하잖아요?\n#3;em;[재잘]"
10054080-78 = "3;슌 수영복;01;그때쯤이면 자기 고집이라는 게 생기기 시작할 나이니까요."
10054080-79 = "3;슌 수영복;09;그건 사실 좋은 일이에요. 자아라는 것이 무럭무럭 자라나고 있다는 증거니까요."
10054080-80 = "3;슌 수영복;16;하지만 그 광경이 흐뭇하면서도, 안타까운 부분이 있기도 해요."
10054080-81 = "3;슌 수영복;15;아직 가르쳐 주고 싶은 것이 너무 많은데. 이끌어 줘야 할 것이…… 너무나도, 많은데.\n#3;em;[한숨]"
