10054080-87 = "#na;슌 수영복;그 진짜 이유를 이해하기에, 아이들은 아직 너무 어리거나, 자기중심적으로 생각하기 일쑤니까요."
10054080-88 = "#na;슌 수영복;그래서 일단 지금은 '그냥 안 돼'라 거나, '그냥 그렇게 해'라고, 가르친 다음. "
