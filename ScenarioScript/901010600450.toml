[translation]
901010600450-7 = "鐘崎港の正門で警備を担当しているカルパッチョ・ファミリーに関する情報をまとめると……。"
901010600450-8 = "カルパッチョ・ファミリーは、この辺では色んな事件を起こすことで有名な組織みたい。"
901010600450-9 = "私たちが前に一度相手したリボリータ・ファミリーみたいに、厳しい上下関係を背景に色んな汚れ仕事を引き受けているんだって。"
901010600450-10 = "まあ、規模の大きいスケバンと大差ないけどね。"
901010600450-11 = "この近くで活動する[ruby=ファミリー]構成員[/ruby]は真面目に警備の仕事をしてお金を稼いでいるみたいだよ。"
901010600450-12 = "え、でも金利高いんでしょう？あれって違法じゃないの？"
901010600450-16 = "確認したけど、連邦生徒会が設定した利率を超えてはないみたい。#n一応、合法ではあるよ。"
901010600450-17 = "問題は取り立て方なんだけど――"
901010600450-22 = "この近くでカルパッチョ・ファミリーからお金を借りた人の相当数が取り立てに追われて、失踪したっていう話があってね。"
901010600450-23 = "暴力行為があったという話はなかったが、プレッシャーをかけられていたのだろう。"
901010600450-24 = "ふーむ、なんとなく糸口が見えてきた気がするねぇ。"
901010600450-25 = "この一帯で失踪した人が多かった理由は……。"
901010600450-33 = "この一帯で失踪した人が多かった理由は……。\n[as1] 化け蟹に襲われたせいだ。\n[as2] 異世界と繋がっているゲートを発見したせいだ。\n[as3] 借金を返済できなかったせいだ。"
901010600450-37 = "化け蟹の話、一言もしてないんだけど。"
901010600450-38 = "先生、今の話ちゃんと聞いてた？"
901010600450-39 = "もう一度考えてみて。"
901010600450-47 = "あ、この前そういう設定のマンガを見たことがあるわ。"
901010600450-48 = "異世界に繋がっているゲートを通過したら転生するっていう――"
901010600450-52 = "って、今そういう話してる場合！？"
901010600450-62 = "……一理あります。"
901010600450-63 = "カルパッチョ・ファミリーは港の周辺でお金に困っている人たちに高い利率でお金を貸し――債務を督促していました。これに耐えきれず、逃げた人もいると思います。"
901010600450-64 = "実際、鐘崎港一帯で人が失踪し始めた時期と、カルパッチョ・ファミリーが本格的に金融業を始めた時期にも、大きなズレはありません。"
901010600450-65 = "やっぱりお化けより人間のほうが怖いんだねぇ。"
