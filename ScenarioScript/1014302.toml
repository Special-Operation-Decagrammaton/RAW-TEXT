1014302-6 = "3;슌 수영복;07;후우……. 정말 시원하고 맑은 물이네요."
1014302-7 = "[s] \"수영 정말 잘하는구나.\""
1014302-8 = "3;슌 수영복;09;후후. 과찬이세요. 가라앉지 않는 정도인걸요.\n#3;em;[재잘]"
1014302-9 = "3;슌 수영복;02;아이들을 가르치려면, 저도 물에 어느 정도 친숙할 필요가 있으니까요."
1014302-10 = "3;슌 수영복;01;물에 들어가는 걸 좋아하는 편이기도 하고요.\n#3;em;[음표]"
1014302-11 = "[s] \"수영을 좋아하는 이유라도 있어?\""
1014302-12 = "3;슌 수영복;02;음…… 뭔가, 몸이 가벼워지는 느낌이 들어서 좋죠?\n#3;em;[…]"
1014302-13 = "3;슌 수영복;00;실제로도 부력 때문에 무게감이 줄어드는 것도 있고요."
1014302-14 = "3;슌 수영복;99;그리고 수영은 관절에 무리를 덜 주고, 칼로리 소모량이 상당한 유산소 운동이다 보니……."
1014302-15 = "3;슌 수영복;00;꾸준히 해 두면, 여러모로 나쁠 것이 없답니다.\n#3;em;[반짝]"
