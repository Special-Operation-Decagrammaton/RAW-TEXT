1014302-24 = "3;슌 수영복;07;물 깊이도 가슴 근처 정도니까, 위험하지도 않을 것이고요."
1014302-25 = "3;슌 수영복;22;걱정하지 마세요. 여차하면 제가 도와드릴게요.\n#3;em;[반짝]"
