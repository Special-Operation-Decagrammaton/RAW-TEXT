1014302-17 = "3;슌 수영복;15;지나치게 장시간 이용하면, 피부에 좋지 않기도 하지만요.\n#3;em;[한숨]"
1014302-18 = "3;슌 수영복;00;하지만 그런 부분을 포함해서도, 수영은 좋은 운동이라고 생각해요."
1014302-19 = "3;슌 수영복;02;선생님은 수영을 잘하시나요?\n#3;em;[?]"
1014302-20 = "[s1] \"그럭저럭인 편이야.\"\n[s2] \"대단치는 않아.\""
1014302-21 = "#wait;100"
1014302-22 = "#wait;100"
