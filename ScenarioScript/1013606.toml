[translation]
1013606-1 = "與你一同品嘗的可可"
1013606-3 = "今天一整天辛苦你了，老師。"
1013606-4 = "[s1]「英美也辛苦了！」\n[s2]「話說你現在在哪裡？我好像找不太到……」"
1013606-7 = "我？"
1013606-8 = "我在上面。"
1013606-9 = "問我是不是在偵察？"
1013606-10 = "倒也不能這麼說吧……"
1013606-11 = "唔嗯……"
1013606-12 = "老師要不要也過來？"
1013606-13 = "這裡有種神奇的感覺哦。"
1013606-16 = "（按照英美說的往上方走去）"
1013606-21 = "― [log=에이미 결전]歡迎你，老師。[/log][wa:1707] "
1013606-23 = "― [log=에이미 결전]總覺得，這片天空很不可思議呢。[/log][wa:1500] "
1013606-26 = "[ns]「就是說啊……」"
1013606-27 = "― [log=에이미 결전]跟我們熟悉的夜空有點相似……[/log][wa:3940] "
1013606-30 = "― [log=에이미 결전]仔細一看，又完全不同。[/log][wa:2180] "
1013606-32 = "― [log=에이미 결전]就像現在的我一樣。[/log]"
1013606-35 = "― [log=에이미 결전]雖然以前 很少像這樣 [/log][wa:2480] "
1013606-37 = "― [log=에이미 결전]仰望天空……[/log]"
1013606-40 = "― [log=에이미 결전]最近，卻還挺喜歡的。[/log][wa:1720] "
1013606-43 = "― [log=에이미 결전]不過，不知道為什麼。[/log][wa:1560] "
1013606-45 = "― [log=에이미 결전]每次抬頭仰望的時候，總是會浮現老師的臉。[/log][wa:1940] "
1013606-48 = "[ns]「那是……為什麼呢？」"
1013606-49 = "― [log=에이미 결전]呵呵，究竟是為什麼呢。 [/log][wa:3330] "
1013606-51 = "― [log=에이미 결전]老師。[/log]"
1013606-54 = "― [log=에이미 결전]我能遇見老師，真是太好了。[/log][wa:4570] "
1013606-56 = "― [log=에이미 결전]嗯。我真的，是那麼想的哦。 [/log][wa:4723] "
1013606-60 = "嗯？有帶可可亞來以防萬一？"
1013606-61 = "老師的心意我很感謝，可是……"
1013606-62 = "[s]「我知道，所以英美的那份是冰可可亞哦！」"
1013606-63 = "哇～謝謝你，老師。"
1013606-64 = "我真的很喜歡老師的這種地方。"
1013606-67 = "（在英美身旁並排坐下）"
1013606-70 = "或許……"
1013606-71 = "遇見老師之前的我……"
1013606-72 = "曾經認真覺得就算孤身一人，也能好好生活下去。"
1013606-73 = "雖然沒有特別表達出來，也沒有具體地思考過。"
1013606-74 = "可能是在無意間產生了這種想法吧。"
1013606-75 = "對我來說，一個人處理事情往往更有效率。"
1013606-76 = "就連知識也能靠自學充分掌握。"
1013606-77 = "[s]「現在呢？」"
1013606-78 = "我也不是很確定。"
1013606-79 = "不過，如果是孤身一人的話──"
1013606-80 = "至少有人遞冰可可亞給我這種事情，應該就不會發生了吧。"
1013606-81 = "還有把自己的體溫分享給別人也是。"
1013606-87 = "（更加近距離地感受到了英美的體溫）"
1013606-88 = "溫暖嗎，老師？"
1013606-89 = "[s]「嗯，可可亞很溫暖呢。」"
1013606-90 = "吼唷……"
1013606-91 = "[s3]「抱歉抱歉。」\n[s4]「託英美的福，確實不冷了呢。」"
1013606-94 = "太好了。"
1013606-95 = "……"
1013606-96 = "這種感覺真不錯呢。"
1013606-97 = "嗯，真的很棒。"
1013606-98 = "咦？問我以後會不會跟更多人交流……"
1013606-99 = "……然後產生更多改變是嗎？"
1013606-100 = "……"
1013606-101 = "…………"
1013606-102 = "………………"
1013606-103 = "我考慮考慮。"
1013606-104 = "[s]「為什麼偏偏在這種時候變得那麼謹慎啦！」"
1013606-105 = "因為要是人太多會很麻煩嘛……"
1013606-106 = "[s]「就因為這種理由嗎……」"
1013606-107 = "怎麼能說是這種理由呢？#n這可是很重要的哦，老師。"
1013606-108 = "人們追求效率的一大主因，就是為了擺脫麻煩的事情啊。"
1013606-109 = "[s]「這點我倒是不否認啦……」"
1013606-110 = "而且我現在覺得，只要有老師在就夠了。"
1013606-111 = "[s]「咦，咦！？！？」"
1013606-112 = "裝作沒聽見也沒用哦，老師。"
1013606-113 = "因為這句話是故意說給你聽的。"
1013606-118 = "（就這樣和英美一起聊天，直到喝完可可亞才回去）"
