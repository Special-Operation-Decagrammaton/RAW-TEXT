[translation]
1013606-1 = "Cocoa with You"
1013606-3 = "Great work today, Sensei."
1013606-4 = "[s1] \"You did a great job, too, Eimi.\"\n[s2] \"Wait, where are you right now? I can't see...\""
1013606-7 = "Me?"
1013606-8 = "I'm up above."
1013606-9 = "Am I on a mission?"
1013606-10 = "No, but..."
1013606-11 = "Hm."
1013606-12 = "Do you want to come up here, Sensei?"
1013606-13 = "There's just...something about this place."
1013606-16 = "Following the sound of Eimi's voice, I climbed up to her."
1013606-21 = "― [log=에이미 결전]Welcome, Sensei.[/log][wa:1347] "
1013606-23 = "― [log=에이미 결전]This night sky... It's a bit strange, isn't it?[/log][wa:220] "
1013606-26 = "[ns] \"It really is...\""
1013606-27 = "― [log=에이미 결전]It's the same as the night sky we're familiar with... [/log][wa:2340] "
1013606-30 = "― [log=에이미 결전]But also completely different in many ways. [/log][wa:860] "
1013606-32 = "― [log=에이미 결전]Just like me, right now.[/log]"
1013606-35 = "― [log=에이미 결전]Until now, I've never [/log][wa:2040] "
1013606-37 = "― [log=에이미 결전]had a reason to look up at the sky.[/log]"
1013606-40 = "― [log=에이미 결전]Recently, I've started to enjoy it.[/log][wa:720] "
1013606-43 = "― [log=에이미 결전]But you know...[/log][wa:1360] "
1013606-45 = "― [log=에이미 결전]Whenever I look up, I'm reminded of Sensei's face.[/log][wa:740] "
1013606-48 = "[ns] \"Why is that?\""
1013606-49 = "― [log=에이미 결전]Fufu. I wonder why? [/log][wa:3010] "
1013606-51 = "― [log=에이미 결전]Sensei.[/log]"
1013606-54 = "― [log=에이미 결전]I'm really happy I met you.[/log][wa:4010] "
1013606-56 = "― [log=에이미 결전]Yeah. I really, really am. [/log][wa:4203] "
1013606-60 = "Huh? You brought some cocoa, just in case?"
1013606-61 = "I appreciate the thought, but—"
1013606-62 = "[s] \"Of course. I brought iced cocoa for you!\""
1013606-63 = "Wow. Thank you, Sensei."
1013606-64 = "I really like that part of you."
1013606-67 = "I made myself comfortable next to Eimi."
1013606-70 = "I've been thinking."
1013606-71 = "Before I met you, Sensei..."
1013606-72 = "I used to think people should figure life out by themselves."
1013606-73 = "It's not ever something I verbalized or even really acknowledged..."
1013606-74 = "I'm only now realizing that, somewhere in my subconscious, that's what I believed."
1013606-75 = "More than anything, I worked most efficiently by myself."
1013606-76 = "Studying and learning seemed like a solo venture too."
1013606-77 = "[s] \"What about now?\""
1013606-78 = "Hm..."
1013606-79 = "Well, if I was by myself today..."
1013606-80 = "I wouldn't have had someone to bring my iced cocoa."
1013606-81 = "And I wouldn't have had anyone to share my body heat with."
1013606-87 = "Eimi felt warmer than ever as she scooted closer."
1013606-88 = "Are you still cold, Sensei?"
1013606-89 = "[s] \"No. The cocoa is nice and hot.\""
1013606-90 = "Hmph."
1013606-91 = "[s3] \"I'm just teasing.\"\n[s4] \"You're warming me right up, Eimi.\""
1013606-94 = "Good. That's what I wanted to hear."
1013606-95 = " ..."
1013606-96 = "This is nice, isn't it?"
1013606-97 = "Yeah. I'm enjoying myself."
1013606-98 = "Huh? From now on, I'll be working with more people..."
1013606-99 = "So will I change even more?"
1013606-100 = "..."
1013606-101 = "..."
1013606-102 = "..."
1013606-103 = "I'll think about it."
1013606-104 = "[s] \"Why the hesitation?\""
1013606-105 = "I still think TOO many people make things tedious."
1013606-106 = "[s] \"That's your argument...?\""
1013606-107 = "Of course. It's important, Sensei."
1013606-108 = "One of the main reasons people seek efficiency is to avoid tedium."
1013606-109 = "[s] \"I can't deny that...\""
1013606-110 = "And right now, I feel like just having you is enough for me."
1013606-111 = "[s] \"H-Huh?!\""
1013606-112 = "You can't feign deafness here, Sensei."
1013606-113 = "After all, I said it specifically for your ears."
1013606-118 = "Eimi and I sipped our cocoas, chatting under the same, but different, night sky, until we finally turned in for the night."
