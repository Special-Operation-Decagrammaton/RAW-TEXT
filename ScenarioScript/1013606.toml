[translation]
1013606-1 = "โกโก้กับคุณ"
1013606-3 = "เหนื่อยหน่อยนะ คุณครู"
1013606-4 = "[s1] \"เอมิเองก็เหนื่อยหน่อยนะ!\"\n[s2] \"ว่าแต่ว่าตอนนี้อยู่ที่ไหนเหรอ? มองไม่ค่อยเห็นเลย...\""
1013606-7 = "ฉันเหรอ?"
1013606-8 = "ฉันอยู่ข้างบนน่ะ"
1013606-9 = "นี่เป็นการลาดตระเวนรึเปล่าน่ะเหรอ?"
1013606-10 = "ไม่ใช่หรอก..."
1013606-11 = "อืม"
1013606-12 = "คุณครูลองมานี่หน่อยสิ"
1013606-13 = "ตรงนี้... มันให้ความรู้สึกมหัศจรรย์นิดหน่อยน่ะ"
1013606-16 = "(คุณครูขึ้นไปตามคำชวนของเอมิ)"
1013606-21 = "― [log=에이미 결전]เชิญเลย คุณครู[/log][wa:1427] "
1013606-23 = "― [log=에이미 결전]เป็นท้องฟ้ากลางคืนที่แปลกใหม่ดีใช่มั้ย?[/log][wa:540] "
1013606-26 = "[ns] \"นั่นสินะ...\""
1013606-27 = "― [log=에이미 결전]ทั้งที่มันก็เหมือนกับท้องฟ้ายามค่ำคืนที่เรารู้จัก [/log][wa:2500] "
1013606-30 = "― [log=에이미 결전]แต่ถ้าดูดีๆ ก็จะเห็นว่ามันต่างกัน[/log][wa:1300] "
1013606-32 = "― [log=에이미 결전]เหมือนกับฉันในตอนนี้[/log]"
1013606-35 = "― [log=에이미 결전]ที่ผ่านมาฉันไม่เคย [/log][wa:2160] "
1013606-37 = "― [log=에이미 결전]เงยหน้ามองท้องฟ้ามาก่อนเลย[/log]"
1013606-40 = "― [log=에이미 결전]แต่ตอนนี้ฉันชอบทำบ่อยๆ เลยละ[/log][wa:1000] "
1013606-43 = "― [log=에이미 결전]แต่ว่าทำไมกันนะ[/log][wa:1360] "
1013606-45 = "― [log=에이미 결전]ทุกครั้งที่เงยหน้าขึ้นมองก็มักจะนึกถึงหน้าของคุณครู[/log][wa:700] "
1013606-48 = "[ns] \"ทำไมถึง... เป็นแบบนั้นล่ะ?\""
1013606-49 = "― [log=에이미 결전]ฮุฮุ เพราะอะไรกันนะ?[/log][wa:3010] "
1013606-51 = "― [log=에이미 결전]คุณครู[/log]"
1013606-54 = "― [log=에이미 결전]ฉันดีใจจริงๆ ที่ได้เจอกับคุณครูนะ[/log][wa:3770] "
1013606-56 = "― [log=에이미 결전]อื้อ ฉันคิดแบบนั้นจริงๆ  นะ [/log][wa:4163] "
1013606-60 = "หืม? เอาโกโก้มาด้วยงั้นเหรอ?"
1013606-61 = "ขอบคุณนะ แต่ฉันน่ะ..."
1013606-62 = "[s] \"ครูคิดไว้แล้วละ เลยเอาโกโก้เย็นมาให้เอมิด้วย!\""
1013606-63 = "ว้าว ขอบคุณนะ คุณครู"
1013606-64 = "ฉันชอบคุณครูตรงนี้จัง"
1013606-67 = "(นั่งลงข้างๆ เอมิ)"
1013606-70 = "บางที"
1013606-71 = "ตัวฉันก่อนที่จะได้เจอกับคุณครู"
1013606-72 = "ฉันคิดมาเสมอเลยว่ามนุษย์เราอยู่ได้ด้วยตัวคนเดียว"
1013606-73 = "ฉันแค่ไม่ได้พูดออกมาเป็นคำพูด หรือทำให้เห็นชัดเจนก็เท่านั้น"
1013606-74 = "แต่ลึกๆ แล้วฉันคงปักใจเชื่อแบบนั้นไปแล้วจริงๆ นั่นละ"
1013606-75 = "ในกรณีของฉัน การเข้ารับมือสถานการณ์ด้วยตัวคนเดียวมีประสิทธิภาพกว่ามาก"
1013606-76 = "เพราะถ้าเป็นเรื่องของความรู้ละก็... มันเป็นสิ่งที่สามารถเรียนรู้และเข้าใจได้ด้วยตัวคนเดียวเลยนี่นา"
1013606-77 = "[s] \"แล้วตอนนี้ล่ะ?\""
1013606-78 = "จะว่ายังไงดีนะ"
1013606-79 = "แต่อย่างน้อย ถ้าต้องอยู่ตัวคนเดียวในตอนนี้"
1013606-80 = "เวลาแบบนี้คงไม่มีใครเอาโกโก้เย็นมาให้หรอกจริงมั้ย"
1013606-81 = "และคงไม่มีโอกาสที่จะได้แบ่งปันความอบอุ่นของร่างกายกับคนคนนั้นด้วย"
1013606-87 = "(คุณครูสัมผัสได้ถึงอุณหภูมิร่างกายของเอมิที่เข้ามาใกล้มากขึ้น)"
1013606-88 = "อุ่นรึเปล่า คุณครู?"
1013606-89 = "[s] \"อื้อ โกโก้อุ่นดีเลยละ\""
1013606-90 = "โธ่"
1013606-91 = "[s3] \"โทษทีๆ\"\n[s4] \"เพราะมีเอมิอยู่ข้างๆ ครูเลยไม่หนาวแล้วละ\""
1013606-94 = "โล่งอกไปทีนะ"
1013606-95 = " ......"
1013606-96 = "รู้สึกดีจังเลยนะ ทำแบบนี้น่ะ"
1013606-97 = "อืม จริงๆ นะ"
1013606-98 = "หืม? หลังจากนี้ก็ให้ไปพบปะกับคนอื่นเยอะขึ้น..."
1013606-99 = "แล้วก็เปลี่ยนไปมากกว่านี้งั้นเหรอ?"
1013606-100 = "......"
1013606-101 = "........."
1013606-102 = "............"
1013606-103 = "ฉันขอคิดดูก่อนแล้วกัน"
1013606-104 = "[s] \"ทำไมถึงทำท่าระวังตัวกันขนาดนั้นล่ะ!\""
1013606-105 = "ถ้าคนเยอะเกินไปมันน่ารำคาญน่ะสิ..."
1013606-106 = "[s] \"เพราะแบบนั้นเองเหรอ...\""
1013606-107 = "เหตุผลแบบนั้นงั้นเหรอ? นี่เป็นเหตุผลสำคัญเลยนะ คุณครู"
1013606-108 = "หนึ่งในเหตุผลสำคัญที่ทำให้มนุษย์เรามองหาสิ่งที่มีประสิทธิภาพก็เพื่อที่จะพาตัวเองหนีไปให้พ้น#nจากเรื่องที่น่ารำคาญใจไงล่ะ"
1013606-109 = "[s] \"เรื่องนั้นครูไม่ปฏิเสธหรอก...\""
1013606-110 = "ตอนนี้ฉันคิดว่ามีแค่คุณครูก็พอแล้วละ"
1013606-111 = "[s] \"เอ๋? เอ๋?!?!\""
1013606-112 = "แกล้งทำเป็นไม่ได้ยินไปก็ไร้ประโยชน์น่า คุณครู"
1013606-113 = "ฉันว่าฉันพูดเสียงดังฟังชัดพอสมควรเลยนะ"
1013606-118 = "(หลังจากนั้นคุณครูกับเอมิก็นั่งดื่มโกโก้และคุยกันเรื่องต่างๆ นานา)"
