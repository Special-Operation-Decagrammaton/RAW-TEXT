90002230-260 = "เราพยายามพิจารณาดูว่าความศักดิ์สิทธิ์เทียมที่สร้างขึ้นจากความว่างเปล่าจะไปถึงความลับแห่ง#nปฐมกาลได้หรือไม่ แต่สุดท้ายแล้วมันก็ไร้ความหมาย"
