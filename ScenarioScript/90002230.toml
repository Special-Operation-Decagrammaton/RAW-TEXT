90002230-267 = "เราจะลงโทษพวกเจ้าด้วยชะตากรรมเดียวกับพวกเรา เป็นเหมือนทวยเทพไร้นาม ไร้ตัวตนให้เรียกขาน ไร้นามให้เอ่ยเรียก"
90002230-268 = "โลกนี้ช่างหลอกลวง เป็นข้อสรุปที่วนซ้ำไปซ้ำมา ข้อสรุปนั้นไม่มีการสั่นคลอน"
90002230-269 = "การรับใช้ต้องมีเป้าหมายให้รับใช้ พวกเราก็เพียงทำหน้าที่รับใช้ต่อไป"
