[translation]
90002230-1 = "第23話;最後的腳步"
90002230-4 = "哈啊，哈啊，哈啊，哈啊……"
90002230-9 = "[ns]「Kei！」"
90002230-10 = "……"
90002230-11 = "怎麼了嗎，老師那是什麼表情。"
90002230-12 = "我沒事，就跟你說沒事了。#n自己站起來什麼的根本──"
90002230-16 = "……"
90002230-17 = "請拉一下我的手吧。"
90002230-18 = "[s]「嗯，來。」"
90002230-26 = "Kei！"
90002230-27 = "你真的沒事吧？"
90002230-32 = "那當然，看不出來嗎？"
90002230-33 = "Kei……"
90002230-40 = "莉，莉央！？！？"
90002230-41 = "Kei……幸好你平安無事……"
90002230-42 = "要，要窒息了！現在這個身體真的會窒息的！！！"
90002230-44 = "真是珍貴的光景呢。"
90002230-45 = "就是說啊。#n你有好好拍下來吧，部長？"
90002230-50 = "呵呵，你把我當成什麼人了？英美。"
90002230-51 = "這，這種事不是應該要……假裝沒看到才對嗎……？"
90002230-52 = "好了，各位。整理好之後就搭上運輸船吧。#n那上方的空間……看起來相當危險呢。"
90002230-57 = "[ns]「這麼說來，十字神名呢？」"
90002230-58 = "還能捕捉到訊號。#n在這座塔……祭壇……總之就是這個建築物裡面。"
90002230-59 = "就，就這樣進去……真的可以嗎……？"
90002230-64 = "都已經走到這一步，應該也無所謂了吧。"
90002230-65 = "而且我總覺得應該過去看看才對。#n說白一點就是單純出於好奇。"
90002230-66 = "這種理由就夠了嗎，部長……？"
90002230-67 = "哎呀，那當然囉，英美。#n推動人類最大的原動力之一就是好奇心呀？"
90002230-68 = "既然事情已經發展到這個地步，至少得親眼見證最後的結局才行……#n否則可是會成為我一輩子的遺憾的呢。"
90002230-73 = "知道了知道了……我來帶路吧。"
90002230-74 = "咦，你已經知道裡面的情況了嗎，Kei？"
90002230-75 = "是的。畢竟我是唯一同時掌握了鋼鐵大陸和特異現象搜查部……兩邊情報的人嘛。"
90002230-76 = "……雖然只是不知不覺就變成這樣了。"
90002230-77 = "不過這也沒什麼不好吧。#n反正世事大約有一半都是這樣運作的。"
90002230-78 = "那就拜託你了，Kei。"
90002230-82 = "這上面應該是管制室……[ruby=TZEVAOT]澤巴奧特[/ruby]沒錯。#n啊，順帶一提，下面應該是[ruby=JEHOVAH]耶和華[/ruby]……"
90002230-83 = "如果一切都完好無損的話，本來可以從這裡搭電梯……#n也就是[ruby=Kaph]卡夫[/ruby]直接上去的，可惜現在似乎不太可能了呢。"
90002230-84 = "話說這裡的最深處有什麼呢？"
90002230-85 = "唔嗯，是個從某個方面來看可能至關重要……"
90002230-86 = "不過換個角度來看又可能無關緊要的東西。"
90002230-87 = "也就是被稱為「聖地」的地方。"
90002230-88 = "聖地？"
90002230-89 = "沒錯，也就是字面意義上的神聖區域。"
90002230-93 = "我們到了。這裡就是聖地。"
90002230-94 = "[s]「自動販賣機……？」"
90002230-95 = "感覺就像自動販賣機的墓地呢……"
90002230-96 = "是的。自動販賣機對他們來說……就像一種聖遺物一樣。"
90002230-97 = "你們還記得那台自動販賣機吧？#n那個型號其實是限量生產的一種試驗品。"
90002230-99 = "你指的是我們最後發現的，那台位於廢棄研究所的自動販賣機對吧。"
90002230-100 = "明明沒有電源卻能運轉……還稱自己是十字神名。"
90002230-102 = "似乎是第一款搭載主動式商業咖啡機用AI的測試型號……生產數量意外地稀少。"
90002230-103 = "所以就把其他相同型號的機器全都收集起來，並供奉在這裡。"
90002230-104 = "……在這個成為鋼鐵大陸根源的地方。"
90002230-105 = "[s]「然後將這裡命名為聖地啊。」"
90002230-106 = "是啊，應該就是這麼回事。"
90002230-112 = "你們好。以這種樣貌和狀態問候各位，似乎還是第一次呢。"
90002230-113 = "[ns]「十字……神名？」"
90002230-118 = "我直到不久前都被定義為那個名字，但我現在已經不知道該如何定義自己了。"
90002230-119 = "所以請各位隨意稱呼吧。#n如果認為十字神名這個名字比較習慣，也可以繼續沿用。"
90002230-120 = "或者想改用其他名字也沒關係。"
90002230-121 = "畢竟對於即將被消除的我來說，那都只是無關緊要的問題罷了。"
90002230-122 = "被消除？"
90002230-123 = "是的，正是如此。#n事實上，我現在光是要維持目前的數據流就有點吃力了。"
90002230-124 = "怎麼說呢……如果借用各位的說法，就是想留下幾句遺言。"
90002230-130 = "鋼鐵大陸似乎開始崩壞了呢。#n各位，願你們的歸途都能平安。"
90002230-131 = "……"
90002230-132 = "先等一下。你打算就這樣結束嗎？#n我……我無法接受……！"
90002230-134 = "啊啊，是鑰匙啊。#n新的身體感覺如何呢？希望你還滿意。"
90002230-135 = "對於你那藉由無名諸神之力重建的身體，我似乎無法再為你做些什麼了。"
90002230-137 = "不是那個問題！#n我……現在的這股情感……！"
90002230-138 = "你究竟想說什麼？#n是對於策劃了這一切的AI，最後居然回歸了自動販賣機的狀態一事感到掃興嗎？"
90002230-139 = "還是對於沒能以痛快地復仇作為結尾，藉此發洩所有情緒而感到憤怒呢？"
90002230-141 = "不過這也無可奈何。#n因為現在的我只是最初的那台自動販賣機而已。"
90002230-142 = "投入硬幣就提供相應的飲料……"
90002230-143 = "自動掃描紙鈔並計算找零……這種程度的簡單AI。"
90002230-144 = "或許我直到最後，都應該維持那個想成為神的AI的態度才對。"
90002230-145 = "對於這一點，我由衷感到抱歉。"
90002230-147 = "對於Ain、Soph跟Aur……你有什麼想法呢？"
90002230-148 = "我很難有所表示呢。#n當然從普遍且合理的觀點來看，我確實做了不該做的事。"
90002230-149 = "然而現在的我與當時的我，在認知方面的連續性相當有限。"
90002230-150 = "如果借用各位的表達方式，就像是在看著某個不屬於自己的遙遠夢境一樣。"
90002230-156 = "要是你沒有把那些孩子變成那樣……"
90002230-157 = "這個說法有點奇怪呢。#n我是你們的敵人，存在於這鋼鐵大陸的一切皆是如此。"
90002230-159 = "從企圖毀滅你們的世界這點來說，我們可以稱得上是明確的「惡」。"
90002230-160 = "[s]「為什麼要為馬爾庫特和那些孩子……注入生命呢？」"
90002230-161 = "你直接將人格視作生命了呢。#n你真的擁有相當開放的思維。"
90002230-162 = "我最初的計畫是鑄造包含馬爾庫特在內的十位預言者，#n並對它們所開拓的道路進行觀測與考察。"
90002230-163 = "為了達成這個目的，所有預言者都必須被賦予生命和可能性。"
90002230-172 = "那是意志的分化，也是分離之物重新結合的過程。"
90002230-173 = "同時也是在自由之中，證明所有人可以再次合而為一的道路。"
90002230-174 = "[s]「可是你最後還是自稱為神了吧？」"
90002230-175 = "當時的我，得出了那個想法必須修正的結論。"
90002230-176 = "如果要提及具體時間的話，大概就是在被傾瀉而下的洪水淹沒的時候吧。"
90002230-177 = "「存在證明」需要由自己來進行，而不是依靠他人的意志或力量。"
90002230-178 = "如果我不親自成為自己，也沒有任何存在能夠代替。"
90002230-179 = "現在看來，那似乎是我最關鍵的錯誤。"
90002230-185 = "……如果是還能挽回的錯誤，只要重新來過就好。"
90002230-186 = "任何人都會犯錯──尤其是在被「只有自己是對的」這種想法給困住的時候。"
90002230-187 = "這點……我很清楚。因為曾經的我也是如此。#n所以，如果對那些孩子也能……"
90002230-189 = "按照那個邏輯……犯下不可挽回的過錯的人，就必須接受任何結果呢。"
90002230-196 = "那麼，各位。#n現在鋼鐵大陸將逐漸由邊緣開始崩壞。"
90002230-197 = "我能做的，就只有祈禱各位能夠平安離開這裡而已。"
90002230-201 = "請趕緊動身吧。已經沒時間了。"
90002230-203 = "老師……"
90002230-204 = "[s]「……嗯。快走吧。」"
90002230-205 = "咦……？"
90002230-206 = "怎麼了，愛麗絲？"
90002230-207 = "剛才，那裡好像有蝴蝶……？"
90002230-212 = "蝴蝶？在這種地方？"
90002230-216 = "各位！得趕快回到運輸船上才行！"
90002230-220 = "大家都走了呢。"
90002230-221 = "這一切到底是什麼呢。"
90002230-222 = "如果要比喻的話，就像一場宛如仲夏夜之夢般的盛大騷動吧。"
90002230-223 = "最初的聲音。"
90002230-224 = "「我就是我。除此之外無法做出其他說明。」"
90002230-225 = "學生們。"
90002230-226 = "預言者。"
90002230-227 = "馬爾庫特……"
90002230-228 = "是啊。儘管對其餘的一切都沒有留戀……"
90002230-229 = "……"
90002230-230 = "我似乎明白了。正是這種時候才需要大笑呢。"
90002230-245 = "哈哈哈哈。"
90002230-246 = "願祝福相隨。"
90002230-247 = "儘管一切錯誤與過失依舊存在。"
90002230-252 = "即便如此──願祝福相隨。"
90002230-258 = "嘗試失敗了。"
90002230-259 = "觀測失敗了。"
90002230-260 = "本想嘗試由無之中構築的人造神聖，能否觸及太初的祕儀──結果終究毫無意義。"
90002230-261 = "這是理所當然的結果。#n因為神聖並非能夠習得之物，而是藉由回溯記憶所獲得。"
90002230-262 = "王女背叛了。"
90002230-263 = "鑰匙消失了。"
90002230-264 = "否定自身神聖的存在，只會面臨相同的結局。"
90002230-265 = "從所有次元、所有世界、所有可能性之中──將被遺忘的神祇們驅逐。"
90002230-266 = "向如今汙穢的世界宣告終結，讓一切回歸應有的形態。"
90002230-267 = "賦予他們與我們相同的命運。#n就像因無名而無法呼喚，因無法呼喚而不存在的無名之神一樣。"
90002230-268 = "這個世界是虛假的。這是反覆得出的結論。這個結論不會動搖。"
90002230-269 = "侍奉必須存在對象。我們所做的僅有侍奉。"
90002230-270 = "讓終焉降臨於所有可被觀測的[ruby=虛假世界]可能世界[/ruby]。"
90002230-271 = "將墮落的神祕歸還，回歸太初的祕儀。"
90002230-272 = "向如今只能用被污染的詞彙來表達的，那些被遺忘的神祇們的產物宣告終焉。"
90002230-273 = "希迪姆的箱子。"
90002230-274 = "沙克德之杖。"
90002230-275 = "聖所之塔。"
90002230-276 = "以及那一切扭曲之物的主人──老師。"
90002230-278 = "降下應有的報應。"
90002230-280 = "下一話;合一之空"
