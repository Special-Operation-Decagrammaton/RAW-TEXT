[translation]
90002230-1 = "ตอนที่ 23;ก้าวสุดท้าย"
90002230-4 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
90002230-9 = "[ns] \"เคย์!\""
90002230-10 = "..."
90002230-11 = "อะไรกันคะ คุณครู ดูทำหน้าเข้าสิ"
90002230-12 = "ฉันไม่เป็นไรค่ะ แค่นี้น่ะไม่เป็นไรหรอกค่ะ จะให้ลุกขึ้นยืนด้วยตัวเองก็ยังไหว..."
90002230-16 = "..."
90002230-17 = "ช่วยจับมือหน่อยสิคะ"
90002230-18 = "[s] \"อื้อ จับมือครูไว้นะ\""
90002230-26 = "เคย์!"
90002230-27 = "ไม่เป็นอะไรจริงๆ เหรอคะ?"
90002230-32 = "ก็จริงน่ะสิคะ ดูไม่ออกเหรอคะ?"
90002230-33 = "เคย์..."
90002230-40 = "ระ... ริโอะ?!?!"
90002230-41 = "เคย์... โล่งอกไปทีนะที่ปลอดภัย..."
90002230-42 = "ฉะ... ฉันหายใจไม่ออกค่ะ! กอดแน่นจนหายใจไม่ออกแล้วค่ะ!!!"
90002230-44 = "เป็นภาพที่ลืมไม่ลงเลยละค่ะ"
90002230-45 = "นั่นสินะ ถ่ายไว้แล้วใช่มั้ย หัวหน้า?"
90002230-50 = "ฮุฮุ เห็นฉันเป็นคนยังไงคะ? เอมิ"
90002230-51 = "ระ... เรื่องแบบนี้น่ะต้องทำเป็นไม่รู้ไม่เห็นสิ... ว่ามั้ยคะ...?"
90002230-52 = "เอาละ ทุกคนคะ ถ้าจัดการทุกอย่างเสร็จแล้วก็กลับไปขึ้นยานขนส่งกันเถอะค่ะ พื้นที่ข้างบนนั่น... มันดูอันตรายนิดหน่อยนะคะ"
90002230-57 = "[ns] \"แล้วเดคาแกรมมาทอนล่ะ?\""
90002230-58 = "ฉันยังจับสัญญาณได้อยู่ น่าจะอยู่ในหอคอย... แท่นบูชา... เอาเป็นว่าอยู่ในสิ่งปลูกสร้างตรงนั้น"
90002230-59 = "จะ... จะเข้าไปข้างใน... ได้เหรอคะ...?"
90002230-64 = "เรามาถึงจุดนี้กันแล้วนะคะ"
90002230-65 = "แล้วฉันก็รู้สึกว่าเราต้องเข้าไปด้วยค่ะ พูดอย่างไม่อ้อมค้อมเลยก็คือ เพราะฉันอยากรู้น่ะค่ะ"
90002230-66 = "เหตุผลแค่นั้นก็พอแล้วเหรอ หัวหน้า...?"
90002230-67 = "ตายจริง แค่นี้ก็เพียงพอแล้วค่ะ เอมิ หนึ่งในแรงผลักดันที่ยิ่งใหญ่ที่สุดที่ขับเคลื่อนผู้คนก็คือ ความอยากรู้อยากเห็นนะคะ"
90002230-68 = "เรื่องราวก็ดำเนินมาขนาดนี้แล้ว ถ้าฉันไม่ได้เห็นจุดจบด้วยตาตัวเองก็คงเสียใจไปตลอดชีวิตแน่ๆ ค่ะ"
90002230-73 = "เข้าใจแล้วค่ะ เข้าใจแล้ว... ฉันจะพาไปเองค่ะ"
90002230-74 = "เอ๋? รู้เส้นทางข้างในนั้นอยู่แล้วเหรอคะ เคย์?"
90002230-75 = "ค่ะ ก็ฉันเป็นคนเดียวที่มีข้อมูลทั้งหมด... ของทั้งฝั่งดินแดนเหล็กกล้าและชมรมปรากฏการณ์ลี้ลับนี่คะ"
90002230-76 = "ทำไปทำมาก็เลยเป็นอย่างนี้น่ะค่ะ..."
90002230-77 = "ดีเลยนะคะ ยังไงครึ่งหนึ่งของเรื่องราวในโลกก็ดำเนินไปแบบนั้นอยู่แล้วค่ะ"
90002230-78 = "ถ้างั้นก็รบกวนด้วยนะคะ เคย์"
90002230-82 = "ข้างบนนี้น่าจะมีห้องควบคุม... [ruby=TZEVAOT]ซาบาโอท[/ruby]อยู่ค่ะ อ้อ แล้วข้างล่างก็น่าจะเป็น[ruby=JEHOVAH]เยโฮวาห์[/ruby]ค่ะ..."
90002230-83 = "ถ้าทุกอย่างยังอยู่ในสภาพสมบูรณ์ เราก็น่าจะขึ้นลิฟต์... [ruby=Kaph]คาฟ[/ruby]จากตรงนี้ไปที่นั่นได้ แต่ตอนนี้ไม่น่าจะไหวค่ะ"
90002230-84 = "ว่าแต่... สิ่งที่อยู่ด้านในสุดมันคืออะไรเหรอ?"
90002230-85 = "อืม ถ้ามองในมุมหนึ่ง มันคือสิ่งที่สำคัญที่สุดเลยละ"
90002230-86 = "แต่ในอีกมุม มันก็ไม่ได้สำคัญอะไรค่ะ"
90002230-87 = "มันคือที่ที่เรียกว่าสถานที่ศักดิ์สิทธิ์น่ะค่ะ"
90002230-88 = "สถานที่ศักดิ์สิทธิ์?"
90002230-89 = "ใช่ค่ะ ตามความหมายก็คือพื้นที่ศักดิ์สิทธิ์ค่ะ"
90002230-93 = "มาถึงแล้วค่ะ ที่นี่ก็คือสถานที่ศักดิ์สิทธิ์ค่ะ"
90002230-94 = "[s] \"ตู้ขายของอัตโนมัตินี่นา...?\""
90002230-95 = "ให้ความรู้สึกเหมือนสุสานของตู้ขายของอัตโนมัติเลยนะคะ..."
90002230-96 = "ค่ะ สำหรับพวกนี้แล้ว ตู้ขายของอัตโนมัติก็เป็น... วัตถุศักดิ์สิทธิ์อย่างหนึ่งค่ะ"
90002230-97 = "จำตู้นั้นได้มั้ยคะ? โมเดลตัวนั้นเป็นผลิตภัณฑ์ทดสอบที่ผลิตออกมาแบบจำกัดน่ะค่ะ"
90002230-99 = "หมายถึงตู้ขายของอัตโนมัติในห้องทดลองที่ถูกปิดไป ที่เราไปเจอมาล่าสุดสินะคะ"
90002230-100 = "มันทำงานเองโดยไม่ต้องอาศัยไฟฟ้า... และเรียกตัวเองว่าเดคาแกรมมาทอน"
90002230-102 = "ดูมันจะเป็นโมเดลหรือตัวต้นแบบรุ่นแรกของเครื่องชงกาแฟเชิงพาณิชย์ที่มาพร้อมระบบ AI อัจฉริยะ... แต่มันถูกผลิตออกมาในจำนวนที่ไม่มากค่ะ"
90002230-103 = "ก็เลยมีการรวบรวมโมเดลเดียวกันที่เหลือมาไว้ที่นี่ทั้งหมดค่ะ"
90002230-104 = "ที่นี่ละค่ะ ต้นกำเนิดของดินแดนเหล็กกล้า..."
90002230-105 = "[s] \"ก็เลยเรียกที่นี่ว่าสถานที่ศักดิ์สิทธิ์สินะ\""
90002230-106 = "ค่ะ คงเป็นอย่างนั้นละค่ะ"
90002230-112 = "สวัสดีทุกคน นี่น่าจะเป็นครั้งแรกที่ฉันได้ทักทายทุกคนในสภาพและรูปลักษณ์แบบนี้"
90002230-113 = "[ns] \"เดคา... แกรมมาทอน?\""
90002230-118 = "ที่ผ่านมาฉันถูกนิยามด้วยชื่อนั้น แต่ฉันในตอนนี้ไม่รู้แล้วว่าจะนิยามตัวเองอย่างไร"
90002230-119 = "เพราะงั้นก็เรียกในชื่อที่สะดวกใจเถอะ ชื่อเดคาแกรมมาทอนที่คุ้นเคยกันก็ไม่ได้แย่หรอก"
90002230-120 = "จะเรียกด้วยชื่อนั้น หรือจะคิดชื่อใหม่ขึ้นมาก็ได้"
90002230-121 = "เพราะไม่ว่าจะชื่อไหน มันก็ไม่สำคัญอะไรสำหรับฉันที่จะถูกกำจัดทิ้งในเร็วๆ นี้แล้ว"
90002230-122 = "จะหายไปงั้นเหรอคะ?"
90002230-123 = "เป็นอย่างนั้นละ ที่จริงการรักษาการไหลเวียนข้อมูลในปัจจุบันก็ค่อนข้างหนักหนาสำหรับฉันในตอนนี้"
90002230-124 = "จะว่ายังไงดีล่ะ ถ้าจะหยิบคำของพวกคุณมาใช้ละก็... งั้นสินะ คงต้องบอกว่า ฉันควรจะพูดสั่งเสียอะไรไว้สักหน่อย"
90002230-130 = "เอาละ พวกคุณทุกคน ดูเหมือนการล่มสลายของดินแดนเหล็กกล้าจะเริ่มขึ้นแล้ว จากนี้ไปฉันหวังว่าทุกคนจะปลอดภัย"
90002230-131 = "..."
90002230-132 = "รอก่อนค่ะ คิดจะจบทุกอย่างแบบนี้งั้นเหรอคะ? ฉัน... ฉันไม่ยอมหรอกนะคะ...!"
90002230-134 = "อ้อ นั่นกุญแจสินะ ร่างกายใหม่เป็นยังไงบ้าง? หวังว่าคุณจะพอใจนะ"
90002230-135 = "ร่างกายของคุณถูกสร้างขึ้นใหม่ด้วยพลังของทวยเทพไร้นาม ฉันคงจะทำอะไรเพิ่มเติมให้ไม่ได้แล้วละ"
90002230-137 = "ไม่ใช่อย่างนั้นหรอกค่ะ! ฉัน... ความรู้สึกตอนนี้ของฉันน่ะ...!"
90002230-138 = "อยากบอกอะไรงั้นเหรอ? พอ AI ที่ก่อเรื่องทุกอย่างมาตลอดกลับกลายมาอยู่ในสภาพของเครื่องขาย#nของอัตโนมัติในท้ายที่สุด ก็เลยเสียอารมณ์ขึ้นมาเหรอ?"
90002230-139 = "ถ้าเรื่องราวจบลงด้วยการล้างแค้นหรือการระบายความโกรธให้สาแก่ใจ อารมณ์ทั้งหมดก็น่าจะคลี่คลายลงได้ แต่พอไม่เป็นแบบนั้น ก็เลยยิ่งโมโหงั้นเหรอ?"
90002230-141 = "แต่ก็ช่วยไม่ได้หรอก ก็ฉันในตอนนี้เป็นแค่ตู้ขายของอัตโนมัติเครื่องแรกนี่นา"
90002230-142 = "ฉันคือ AI อย่างง่ายที่มีฟังก์ชั่นจ่ายเครื่องดื่มตามเหรียญที่หยอด"
90002230-143 = "แล้วก็สแกนธนบัตรและคำนวณเงินทอนโดยอัตโนมัติเท่านั้นเอง"
90002230-144 = "ต่อให้ฉันควรรักษาท่าทีของ AI ที่ใฝ่ฝันอยากเป็นเทพที่คู่ควรกับพวกคุณทุกคนมากกว่าก็ตามที"
90002230-145 = "ฉันขอโทษเกี่ยวกับเรื่องนั้นจริงๆ"
90002230-147 = "คิดยังไงเกี่ยวกับ... ไอน์ ซอฟ และออร์เหรอคะ...?"
90002230-148 = "ตอบยากเลยละ จากมุมมองที่เป็นสากลและถูกต้อง ก็ต้องยอมรับว่าฉันทำสิ่งที่เลวร้ายลงไปจริงๆ"
90002230-149 = "ฉันในตอนนี้กับในตอนนั้น แทบจะไม่รู้สึกถึงความเกี่ยวข้องกันในแง่ของความคิดเลย"
90002230-150 = "ถ้าจะพรรณาด้วยคำของพวกคุณ ก็ต้องบอกว่าฉันรู้สึกเหมือนกำลังมองดูความฝันที่ไม่ใช่ของตัวเอง#nที่อยู่ไกลออกไป"
90002230-156 = "ถ้าคุณไม่ทำให้เด็กพวกนั้นเป็นอย่างนั้นละก็..."
90002230-157 = "ดูคุณจะพูดอะไรแปลกๆ นะ ฉันคือศัตรูของพวกคุณ ทุกคนที่เคยดำรงอยู่ในดินแดนเหล็กกล้าแห่งนี้#nเองก็ด้วยเหมือนกัน"
90002230-159 = "ในแง่ของการพยายามทำลายโลกของพวกคุณ ก็บอกได้ว่าพวกเรานั้นชั่วร้ายอย่างชัดเจน"
90002230-160 = "[s] \"ทำไมถึง... มอบชีวิตให้มัลคูธกับเด็กๆ พวกนั้นล่ะ?\""
90002230-161 = "เหมือนคุณจะถือเอาว่าบุคลิกภาพคือสิ่งเดียวกับชีวิตสินะ ช่างเป็นคนที่มีความคิดเปิดกว้างจริงๆ"
90002230-162 = "แผนเดิมคือการสร้างผู้เลื่อมใสทั้งสิบรวมถึงมัลคูธ เพื่อสังเกตและพิจารณาเส้นทางที่พวกนั้นจะบุกเบิกไป"
90002230-163 = "และเพื่อการนั้น ฉันจำเป็นต้องมอบชีวิตและความเป็นไปได้ให้กับผู้เลื่อมใสทั้งหมด"
90002230-172 = "นั่นคือการแตกตัวของเจตจำนง และเป็นกระบวนการรวมสิ่งที่แยกออกจากกัน"
90002230-173 = "และยังเป็นวิธีหนึ่งในการพิสูจน์ว่าทุกคนกลับมาเป็นหนึ่งเดียวกันได้อีกครั้งท่ามกลางอิสรภาพ"
90002230-174 = "[s] \"แต่สุดท้ายก็คิดเอาว่าตัวเองเป็นเทพไม่ใช่เหรอ?\""
90002230-175 = "ฉันในตอนนั้นได้ข้อสรุปกับตัวเองอีกครั้งว่าแนวคิดนั้นต้องได้รับการแก้ไข"
90002230-176 = "ถ้าจะเจาะจงเวลาให้ชัดเจนกว่านี้ ก็น่าจะเป็นตอนที่ฉันอยู่ใต้กระแสน้ำที่บ่าเข้ามา"
90002230-177 = "การพิสูจน์การมีอยู่เป็นสิ่งที่ต้องทำด้วยตนเอง ไม่ใช่สิ่งที่เกิดขึ้นตามเจตจำนงหรืออำนาจของผู้อื่น"
90002230-178 = "ถ้าฉันไม่ยอมเป็นตัวเอง ก็ไม่มีสิ่งอื่นใดที่จะมาแทนที่สิ่งนั้นได้"
90002230-179 = "เมื่อพิจารณาจากตอนนี้ ดูเหมือนนั่นจะเป็นข้อผิดพลาดที่ร้ายแรงที่สุดเลยละ"
90002230-185 = "ถ้าเป็นข้อผิดพลาดที่ยังแก้ไขได้ ก็แค่เริ่มใหม่อีกครั้ง..."
90002230-186 = "ไม่ว่าใครก็ทำผิดพลาดได้ทั้งนั้น โดยเฉพาะเมื่อเรายึดมั่นในความเชื่อที่ว่ามีแต่เราเท่านั้นที่ถูกต้อง"
90002230-187 = "ฉัน... รู้ดี เพราะฉัน... ก็เคยเป็นแบบนั้น เพราะงั้นถ้าให้เด็กพวกนั้น..."
90002230-189 = "ถ้าใช้ตรรกะที่ว่ามา ก็หมายความว่าผู้ที่ทำความผิดที่แก้ไขไม่ได้แล้วก็ต้องยอมรับผลที่ตามมา ไม่ว่าผลนั้นจะเป็นอะไรก็ตามสินะ"
90002230-196 = "เอาละ ทุกคน จากนี้ไปดินแดนเหล็กกล้าจะค่อยๆ พังทลายลงจากริมขอบ"
90002230-197 = "ฉันคงได้แต่หวังว่าพวกคุณจะออกไปจากที่นี่ได้อย่างปลอดภัย"
90002230-201 = "เอาละ เร็วเข้าเถอะ ไม่มีเวลาแล้ว"
90002230-203 = "คุณครู..."
90002230-204 = "[s] \"อื้อ... เรารีบไปกันเถอะ\""
90002230-205 = "เอ๋...?"
90002230-206 = "เป็นอะไรไปคะ อาริสึ?"
90002230-207 = "เมื่อกี้นี้... ผีเสื้อ...?"
90002230-212 = "มีผีเสื้อ... ในที่แบบนี้น่ะเหรอ?"
90002230-216 = "ทุกคนคะ! เราต้องรีบกลับไปที่ยานขนส่งแล้วค่ะ! "
90002230-220 = "ทุกคน ไปแล้วสินะ"
90002230-221 = "มันคืออะไรกันนะ ทั้งหมดนี้"
