90002230-272 = "แด่ผลลัพธ์ของทวยเทพผู้ถูกลืมเลือน ผู้ซึ่งบัดนี้ไม่อาจนิยามได้ด้วยสิ่งใด นอกเสียจากถ้อยคำอันแปดเปื้อนแห่งยุคสมัย จงรับเอากาลอวสานนี้ไป"
