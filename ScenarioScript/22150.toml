22150-134 = "...และฉันก็แค่จะทำหน้าที่นั้นด้วยความยินดีก็เท่านั้น"
22150-135 = "ฉันไม่ได้มีเจตนาร้ายอะไร แล้วก็ไม่ได้มีจิตใจปรปักษ์ด้วย ฉันก็เพียงแค่───"
