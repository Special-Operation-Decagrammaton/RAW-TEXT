22150-132 = "เราจะเลือกเสียสละคนคนเดียวเพื่อช่วยคนจำนวนมาก... หรือจะเลือกให้หลายๆ คนต้องสละชีวิต#nเพื่อคนเพียงคนเดียวกันล่ะ?"
