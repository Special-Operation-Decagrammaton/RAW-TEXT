[translation]
901010400450-6 = "そういえば港へ観光に来た市民にも会ったけど……。"
901010400450-7 = "なんか町の人は、怪談のことを信じているみたい。"
901010400450-8 = "カニのハサミや殻が苦手な人も多かったし、人を襲うカニがいるって思っている人もいて……。"
901010400450-9 = "いくらなんでも……こんな適当な怪談が広がるのってあり得るの？"
901010400450-10 = "ニュースとか……いや、ネットで検索すれば嘘だってすぐ分かるのに？"
901010400450-11 = "人は自分の生活と直接関係しない事柄にはさほど興味を示さないからな。"
901010400450-12 = "当事者にとっては深刻な問題でも、他者からすれば喜劇にすぎない。"
901010400450-13 = "それに……刺激的な噂って、興味をそそられるじゃん？"
901010400450-14 = "事実確認なんて二の次。面白そうって「いいね」を押したら、その情報は拡散したといっても過言じゃない。"
901010400450-15 = "……そうだね。"
901010400450-20 = "つまり、人を襲うカニを信じる理由は――"
901010400450-28 = "つまり、人を襲うカニを信じる理由は――\n[as1] 実際に起きたからだ。\n[as2] 誰かが強制的に信じるよう催眠をかけた。\n[as3] 噂が広まったからだ。"
901010400450-29 = "……私の説明不足かもしれませんが。"
901010400450-30 = "今までの情報をまとめても、実際にカニが人を襲う可能性は低いです。"
901010400450-40 = "そんなわけないでしょ！？"
901010400450-41 = "いや……一理あるよ。私も昔、ゲヘナ学園が催眠マシンを研究してるって噂を聞いたことがある。"
901010400450-42 = "NKウルトラ……なんとか言ってたような……。"
901010400450-43 = "その設計図が流出したなら、不可能な話じゃない。"
901010400450-45 = "でも今回の事件にゲヘナが関わっている証拠はないよ。もう一度考えてみよっか。"
901010400450-53 = "はい。噂は鐘崎港を舞台としていますが、これを広めているのは漁業と無関係な一般人でした。"
901010400450-54 = "だからこそ、怪談上のカニが実際と異なる姿をしていても、何も疑われることなく広まってしまったんです。"
901010400450-56 = "みんなもネットから得た情報は一度疑ったほうがいいよ。"
901010400450-57 = "こういう言葉もあるっていうし？#n「写真に添えられている引用句は信じるな。byクズノハ」"
901010400450-58 = "それ、今まで聞いた中で一番怪しいんだけど。"
