1009803-264 = "― [log=호시노 무장 모드 4]ลุงจะยอมเล่นด้วยก็แล้วกัน[/log][wa:790] "
1009803-267 = "― [log=호시노 무장 모드 4]ถ้างั้นเรามากินมื้อค่ำแบบง่ายๆ ของฮีโร่กับไซคิกกัน ...ถึงจะเป็นแค่อาหารฉุกเฉินก็เถอะ[/log][wa:1620] "
