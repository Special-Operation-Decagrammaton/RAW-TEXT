1009803-271 = "― [log=호시노 무장 모드 4]ก็นะ เรื่องนั้นมันก็ใช่อยู่หรอก...[/log][wa:1750] "
1009803-272 = "― [log=호시노 무장 모드 4]แต่ลุงน่ะชอบของพวกนี้นะ ยอมๆ ให้หน่อยเถอะน่า~[/log][wa:6790] "
1009803-276 = "แหะๆ ไม่รู้เลยว่ายังมีเยลลี่ปลาเหลืออยู่ด้วย"
1009803-277 = "ถึงสภาพจะเยินไปหน่อย เพราะฉันเก็บไว้ในกระเป๋าชุดต่อสู้ แต่ก็พอแก้หิวได้อยู่นะ?"
1009803-278 = "โชคดีจริงๆ ที่ไม่ได้กินหมดไปก่อน"
1009803-279 = "[s] \"โฮชิโนะดูชินกับสถานการณ์แบบนี้ดีนะ?\""
1009803-283 = "หืม ก็นี่ไม่ใช่ครั้งแรกที่ต้องมาค้างแรมข้างนอกกะทันหันนี่นา"
1009803-284 = "ตอนลุงยังเอ๊าะๆ ก็เคยนอนในที่ที่ไม่มีหลังคาด้วยเหมือนกัน~"
1009803-285 = "รถไฟร้างแบบนี้ถือเป็นโรงแรมชั้นดีเลยนะ"
1009803-286 = "[s] \"เมื่อกี้พูดเหมือนเป็นตาลุงจริงๆ เลยนะ\""
1009803-287 = "หะ... แหะๆ~ ได้ยินคำพูดแบบนั้นจากครู จู่ๆ ก็รู้สึกเขินเลยแฮะ..."
1009803-288 = "เอาละ เรามาเตรียมตัวค้างแรมกันเถอะ"
1009803-293 = "เอ้า รวบรวมเศษกิ่งไม้ที่อยู่รอบๆ มาก่อเป็นกองไฟ"
1009803-301 = "แหะๆ~ อุ่นดีจัง"
1009803-302 = "เอาละ ฉันจะปูผ้าห่มฉุกเฉินไว้ตรงที่อุ่นที่สุด ซึ่งก็คือตรงที่ครูนั่ง"
1009803-303 = "สิ่งสำคัญที่สุดเวลาอยู่กลางทะเลทรายตอนกลางคืนคือรักษาอุณหภูมิของร่างกาย"
1009803-304 = "ถ้านอนราบไปกับพื้นอาจทำให้รู้สึกอึดอัดได้ แต่ถ้าพิงกับผนังรถไฟแล้วใช้ผ้าห่มทับตัวเองแบบนี้ก็จะ#nสบายขึ้น"
1009803-305 = "หืม? นอนตะแคงก็ไม่เป็นไรเหรอ?"
1009803-306 = "นี่ ขอบคุณที่เสียสละให้นะ แต่อย่างที่บอกไปนั่นแหละ ลุงชินกับการนอนในที่แบบนี้แล้ว เพราะงั้น#nไม่ต้องเกรงใจหรอก"
1009803-307 = "ต้องรีบๆ นอนจะได้ตัวสูงขึ้นไง"
1009803-308 = "[s] \"ถ้างั้นโฮชิโนะก็มาห่มผ้าด้วยกันสิ\""
1009803-312 = "หะ... หืม? ไม่เอาอะ ผ้าห่มมันไม่ได้ใหญ่ขนาดนั้นสักหน่อย..."
1009803-313 = "[s3] \"โฮชิโนะบอกเองนี่ว่าการรักษาอุณหภูมิร่างกายสำคัญที่สุด\"\n[s4] \"ถ้าห่มด้วยกันก็น่าจะยิ่งอุ่นนะ\""
1009803-318 = "อะ... อืม เรื่องนั้นมันก็จริง..."
1009803-319 = "จริงๆ เลย... ครูพูดเรื่องแบบนี้ออกมาได้สบายๆ เชียวนะ"
1009803-320 = "ช่วยไม่ได้ละนะ..."
1009803-326 = "ถ้างั้น... ขยับเข้ามาใกล้ๆ หน่อยได้มั้ย?"
