[translation]
1009803-1 = "การลาดตระเวนของฮีโร่"
1009803-4 = "อ๊ะ ครู ทางนี้ๆ"
1009803-5 = "ทำไมดูมีความสุขจังล่ะ มีเรื่องอะไรดีๆ งั้นเหรอ?"
1009803-6 = "[s] \"ครูได้เจอโฮชิโนะในชุดฮีโร่อีกแล้วไงล่ะ!\""
1009803-7 = "แหะๆ... ชุดฮีโร่อะไรกัน ลุงแปลงร่างไม่ได้หรอกนะ"
1009803-8 = "ยังไงก็เถอะ เตรียมตัวไปลาดตระเวนเสร็จรึยัง?"
1009803-9 = "อย่างที่ครูรู้น่ะว่าเส้นทางลาดตระเวนที่เราจะไปวันนี้ค่อนข้างลำบาก แล้วก็ต้องผ่านสถานที่ที่ปกคลุม#nไปด้วยทราย"
1009803-10 = "ถ้าล่าช้าอาจกลับมาไม่ทันในวันนี้ก็ได้"
1009803-11 = "[s] \"แน่นอน ครูเตรียมพร้อมแล้ว\""
1009803-12 = "ดีละ ถ้างั้นก็ไปกันเลย"
1009803-18 = "ที่นี่ยังไม่ค่อยมีคนเหมือนเดิมเลยนะ~"
1009803-19 = "หืม? ทำไมต้องออกมาไกลขนาดนี้งั้นเหรอ? "
1009803-20 = "เรื่องนั้น เพราะถ้าทำให้ครูหมดแรงได้ก็คงจะไม่พูดอะไรที่ทำให้ลุงคนนี้อายได้ไงล่ะ"
1009803-21 = "[s] \"ว่าไงนะ...?!\""
1009803-22 = "ล้อเล่นน่า ล้อเล่น ปฏิกิริยาของครูนี่ดีจริงๆ แฮะ"
1009803-23 = "ที่จริงแล้วเป็นเพราะเรื่องเมื่อคราวก่อนน่ะ"
1009803-24 = "จำพวกที่จะมาขโมยป้ายประกาศของโรงเรียนไปได้มั้ย?"
1009803-25 = "[s] \"อื้อ โฮชิโนะ ฮีโร่แห่งอะบิดอสช่วยไล่ไปด้วยนี่นา\""
1009803-26 = "พวกแก๊งหมวกกันน็อกน่ะ ไม่รู้ว่าเจ้าพวกนั้นไปได้อุปกรณ์มาจากไหน แต่ก็เป็นของดีใช้ได้เลยทีเดียว"
1009803-27 = "ปกติเจ้าพวกนั้นไม่น่าจะมีเงินมากขนาดนั้นหรอก"
1009803-28 = "ครูไม่คิดว่ามันแปลกรึไง?"
1009803-29 = "เพราะงั้นวันนี้ก็เลยคิดว่าจะออกไปดูสักหน่อยน่ะ~"
1009803-30 = "[s] \"มีความคิดแบบนี้นี่เอง...\""
1009803-31 = "เอาละๆ เรายังต้องไปอีกไกล รีบๆ เดินเข้าเถอะ"
1009803-41 = "หืม? เอ๋ เมื่อคราวก่อนบ้านหลังนั้นยังดูดีอยู่เลยนี่นา"
1009803-42 = "[s] \"ตอนนี้โดนทรายถมหมดแล้วแฮะ...\""
1009803-43 = "เป็นเพราะพายุทรายเมื่อเร็วๆ นี้งั้นเหรอ..."
1009803-48 = "ฮู่ว ถ้าคนเดียวคงทำไม่ไหวแน่ๆ..."
1009803-55 = "หรือควรจะยอมแพ้ไปดีนะ..."
1009803-60 = "นี่~! ดูเหมือนกำลังลำบากอยู่เลย มีอะไรให้ช่วยรึเปล่า?"
1009803-61 = "หะ... หืม? เธอคือ...?"
1009803-62 = "ก็แค่คนที่ผ่าน..."
1009803-63 = "[s] \"ก็แค่ฮีโร่ที่ผ่านมาน่ะ\""
1009803-67 = "เอาอีกแล้วนะ ครู..."
1009803-68 = "ฮีโร่...?"
1009803-69 = "ไม่ค่อยเข้าใจเท่าไรหรอกนะ แต่ถ้าจะช่วยก็ขอบคุณมากเลย"
1009803-70 = "ที่นี่เป็นบ้านที่ฉันเคยอาศัยอยู่ พอดีมีของที่ต้องการอยู่ก็เลยแวะมาน่ะ"
1009803-71 = "แต่อาจเป็นเพราะพายุทรายก็เลยกลายเป็นแบบนี้ไป"
1009803-72 = "ฉันลองพยายามขุดทรายด้วยตัวเองแล้ว แต่ทรายมันก็ไหลเข้าไปใหม่อยู่เรื่อยเลย"
1009803-74 = "อืม คงขุดด้วยตัวคนเดียวไม่ได้ง่ายๆ แน่"
1009803-78 = "ฮึบ ถ้างั้นลุงคนนี้ก็ออกแรงสักหน่อยดีมั้ยนะ"
1009803-79 = "[s] \"เดี๋ยวครูช่วยอีกแรง\""
1009803-80 = "แฮร่~ ขอบคุณนะ ครู"
1009803-88 = "ฮู่ว แค่นี้ก็น่าจะพอแล้วละมั้ง"
1009803-89 = "นึกไม่ถึงเลยว่าจะขุดออกได้เร็วแบบนี้...!"
1009803-91 = "เป็นฮีโร่จริงๆ ด้วย! ขอบคุณนะ!"
1009803-95 = "โธ่เอ้ย ครูพูดอะไรไร้สาระจริงๆ..."
1009803-96 = "[s1] \"การที่ไม่เพิกเฉยต่อความเดือดร้อนของคนอื่นนี่แหละฮีโร่...\"\n[s2] \"สมกับเป็นฮีโร่จริงๆ!\""
1009803-99 = "หะ...แหะๆ~"
1009803-100 = "ครูเนี่ยพูดอะไรแบบนั้นได้โดยไม่ลังเลเลยนะ..."
1009803-102 = "(หลังจากนั้น คุณครูก็ออกลาดตระเวนเขตปกครองตนเองกับโฮชิโนะต่อ)"
1009803-106 = "อืม... ตอนที่ผ่านมาเมื่อคราวที่แล้ว ตรงนี้ยังเป็นทางเดินอยู่เลย"
1009803-107 = "ตอนนี้โดนทรายฝังไปซะแล้ว"
1009803-108 = "[s] \"อ้อมไปกันมั้ย?\""
1009803-109 = "......."
1009803-110 = "ไม่ละ แค่ทรายเอง กวาดออกไปก็ได้แล้วละ"
1009803-111 = "มาออกแรงกันหน่อยแล้วกัน"
1009803-117 = "เอ๋ ดูเหมือนไฟถนนตรงนี้จะดับหมดเลยแฮะ"
1009803-121 = "ครู ขอโทษนะ แต่ขอขี่คอสักหน่อยได้มั้ย?"
1009803-122 = "ลุงจะลองซ่อมดูว่ามันจะใช้ได้ชั่วคราวรึเปล่าน่ะ!"
1009803-137 = "เห... เรามาไกลขนาดนี้แล้วเหรอเนี่ย แสดงว่าใกล้ลาดตระเวนเสร็จแล้วน่ะสิ"
1009803-138 = "[s] \"นั่งพักก่อนแล้วค่อยไปต่อเถอะ\""
1009803-139 = "อืม เอางั้นก็ได้ วันนี้เหนื่อยหน่อยนะ ครู"
1009803-140 = "คงไม่เสียใจที่เลือกออกมากับลุงหรอกใช่มั้ย?"
1009803-141 = "[s] \"ไม่มีทางหรอก\""
1009803-143 = "[ns] \"ครูดีใจที่ได้เห็นมุมที่หวงแหนอะบิดอสของโฮชิโนะนะ\""
1009803-144 = "แหะๆ~ พูดให้เขินอีกละ"
1009803-145 = "แต่ว่า... อ่า~ ลุงดันติดหนี้ครูอีกซะแล้วสิ"
1009803-146 = "ถ้ามาคนเดียวโดยไม่มีครูมาด้วย ฉันคงหมดแรงไปตั้งนานแล้ว"
1009803-147 = "ขอบคุณนะ ครู"
1009803-148 = "หืม? รู้สึกเป็นเกียรติมากที่ได้ช่วยงานฮีโร่ของอะบิดอส... งั้นเหรอ?"
1009803-149 = "ยังไม่เลิกเล่นอะไรแบบนี้อีกนะ..."
1009803-150 = "ถ้างั้น..."
1009803-151 = "แหะๆ งั้นครูก็เป็นไซคิกสินะ?"
1009803-152 = "[s] \"ไซคิก?\""
1009803-153 = "คู่หูความยุติธรรมที่คอยออกปฏิบัติการกับฮีโร่ไง"
1009803-154 = "ปกติมักจะเป็นคนที่ถูกพวกวายร้ายจ้องจะโจมตี และเป็นแรงกระตุ้นสำคัญที่ทำให้พลังของฮีโร่เพิ่มขึ้น#nไปอีกน่ะ"
1009803-155 = "[s] \"?!\""
1009803-156 = "แฮร่~ ล้อเล่นน่ะ ล้อเล่นเฉยๆ"
1009803-160 = "แทนคำขอโทษ... กินนี่หน่อยมั้ย?"
1009803-161 = "มันแตกนิดๆ หน่อยๆ เพราะเอาใส่ไว้ในชุดต่อสู้..."
1009803-166 = "คะ... คือว่า..."
1009803-174 = "ฉันมาที่นี่เพราะได้ยินข่าวลือน่ะ พวกคุณใช้คนที่ตระเวนไปช่วยเหลือคนรึเปล่า?"
1009803-175 = "หะ... หืม?!"
1009803-176 = "[s] \"ข่าวลือแพร่ไปทั่วเลยเหรอ...\""
1009803-180 = "แต่ก็นะ... ที่พูดมาก็ไม่ผิดหรอก..."
1009803-181 = "มีเรื่องอะไรอยากให้ลุงคนนี้ช่วยเหรอ?"
1009803-182 = "ขอโทษนะแต่ว่า... ฉันอยากให้ช่วยหาของที่ทำหายไปให้หน่อยได้รึเปล่า"
1009803-183 = "เมื่อไม่กี่วันก่อนหน้านี้ ฉันออกไปเดินเล่นที่ชานเมืองแล้วก็เจอกับพายุทรายเข้าเลยหลงทาง จำได้ว่าตอนนั้นหนีไปหลบพายุทรายในรถไฟที่ถูกทิ้งร้างน่ะ"
1009803-184 = "หลังพายุสงบลงแล้ว ฉันก็กลับมาได้อย่างปลอดภัย แต่สงสัยว่าจะลืมกระเป๋าไว้ที่นั่นน่ะ"
1009803-185 = "ฉันพยายามจะกลับไปที่นั่น แต่เพราะที่นี่มีแต่ทะเลทราย ฉันก็เลยแยกไม่ออกเลยว่าทางไหนเป็นทาง#nไหน... "
1009803-187 = "ในกระเป๋ามีของที่สำคัญกับฉันมากๆ อยู่น่ะ ถ้าช่วยหาให้ ฉันจะตอบแทนให้อย่างแน่นอน!"
1009803-193 = "ช่วยไม่ได้นะ~"
1009803-194 = "อุตส่าห์ตั้งใจมาหาพวกเราถึงนี่ แล้วการลาดตระเวนก็ยังไม่เสร็จด้วย..."
1009803-195 = "แล้วครูล่ะว่ายังไง?"
1009803-196 = "[s] \"ไซคิกก็ต้องตามฮีโร่ไปอยู่แล้วสิ!\""
1009803-197 = "เฮ้อ... แรงดีไม่มีตกเลยนะ"
1009803-198 = "บอกทางคร่าวๆ มาก็แล้วกัน ถ้าเป็นรถไฟที่ถูกทิ้งร้างละก็... ฉันก็พอนึกออกอยู่ 2-3 ที่น่ะ"
1009803-199 = "ได้เลย!"
1009803-200 = "คือว่า... ตอนที่ฉันกลับมาก็เช้าแล้ว จำได้ว่าพระอาทิตย์อยู่ทางด้านหลังฉันน่ะ"
1009803-201 = "ทางทิศตะวันออกสินะ~"
1009803-205 = "งั้นก็ไปกันเลยมั้ย ครู?"
1009803-207 = "(คุณครูกับโฮชิโนะตัดสินใจไปที่ชานเมืองอะบิดอสเพื่อตามหาสิ่งของที่ชาวเมืองทำหาย)"
1009803-216 = "แหะๆ~ คงเป็นอันนี้สินะ"
1009803-220 = "หากระเป๋าเจอแล้ว ที่เหลือก็แค่เอากลับไปให้ก็เสร็จเรียบร้อย"
1009803-221 = "ขอบคุณมากนะ ครู~"
1009803-222 = "[s] \"โฮชิโนะต่างหากที่เหนื่อยน่ะ\""
1009803-226 = "แฮร่~"
1009803-227 = "แต่อาจยุ่งยากสักหน่อยนะ"
1009803-228 = "ทำไมน่ะเหรอ? คือว่า..."
1009803-237 = "[ns] \"เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย...\""
1009803-238 = "ลำบากเลยแฮะ"
1009803-239 = "เวลาอยู่ในทะเลทราย หากทัศนวิสัยแคบน่ะ ห้ามเคลื่อนไหวโดยเด็ดขาด เพราะอาจเดินไปผิดทิศทาง#nโดยไม่รู้ตัวได้"
1009803-240 = "ช่วยไม่ได้ละนะ..."
1009803-241 = "คงจะต้องพักค้างแรมที่นี่สักคืนแล้ว"
1009803-242 = "ไหนๆ ก็เป็นแบบนี้แล้ว มาพักกันหน่อยดีกว่า~"
1009803-249 = "― [log=호시노 무장 모드 4]อ่า... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย [/log][wa:1390] "
1009803-250 = "― [log=호시노 무장 모드 4]ถ้าแบบนี้ คงจะต้องรออยู่เฉยๆ จนกว่าพระอาทิตย์จะขึ้นแล้วสินะ[/log][wa:3020] "
1009803-253 = "[ns] \"อยู่กับโฮชิโนะแบบนี้ก็สนุกดีนะ?\""
1009803-254 = "― [log=호시노 무장 모드 4]หะ... หืม? [/log][wa:230] "
1009803-255 = "― [log=호시노 무장 모드 4]โธ่เอ๊ย... ต้องมาอยู่กับลุงแก่ๆ แบบนี้ มีอะไรน่าสนุกกันเล่า [/log][wa:3900] "
