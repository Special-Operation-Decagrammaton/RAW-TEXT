1009803-259 = "― [log=호시노 무장 모드 4]อะ... อะแหะๆ[/log][wa:730] "
1009803-260 = "― [log=호시노 무장 모드 4]ยังไม่เลิกพูดแบบนั้นอีกงั้นเหรอ... ตาลุงคนนี้ก็เขินอยู่หน่อยๆ นะ~[/log][wa:3840] "
