[translation]
1001508-1 = "เวทมนตร์ของอาริสึ"
1001508-2 = "ชมรมพัฒนาเกม มิลเลเนียม"
1001508-3 = "คุณครู สวัสดีตอนเย็นค่ะ"
1001508-4 = "อาริสึกำลังเล่นเกมอยู่คนเดียวค่ะ"
1001508-5 = "[s] \"เล่นเกมอะไรอยู่เหรอ?\""
1001508-6 = "เกม RPG คลาสสิกค่ะ"
1001508-7 = "ว่าแล้วว่าเกม RPG สนุกที่สุดเลยค่ะ เกมอื่นก็สนุก แต่เกม RPG เหมือนเป็นที่พักใจของอาริสึค่ะ"
1001508-8 = "[s] \"เกมซอว์ดแอนด์เมจิคเหรอ...\""
1001508-9 = "ใช่ค่ะ เกมนี้จัดอยู่ในเกม RPG ค่ะ"
1001508-10 = "[s] \"มีเรื่องโรแมนซ์ที่ไม่มีอยู่จริงด้วยนี่\""
1001508-11 = "คุณครูคิดว่าอย่างนั้นเหรอคะ?"
1001508-13 = "อาริสึไม่คิดอย่างนั้นนะคะ"
1001508-18 = "― อาริสึคิดว่าที่คิโวทอสนี้มีเวทมนตร์อยู่จริงค่ะ[wa:1860] "
1001508-21 = "― เวทมนตร์มีอยู่จริงนะคะ ตอนนี้คุณครูทำให้อาริสึมีความสุขมากๆ เลยค่ะ[wa:3190] "
1001508-24 = "― เหตุผลที่อาริสึชอบเล่นเกม นั่นก็เพราะ ในโลกของเกมมีความงดงามของโลกใบนี้อยู่[wa:2310] "
1001508-26 = "― ฉันได้เรียนรู้เรื่องนี้มาจากคุณครูค่ะ[wa:10] "
1001508-29 = "― ทั้งการเล่นเกม ทั้งเจ้าเหมียวน้อย พวกเพื่อนๆ... แล้วก็...ช่วงเวลานี้ค่ะ[wa:4380] "
1001508-31 = "― โลกใบนี้เต็มไปด้วยความงดงามค่ะ[wa:710] "
1001508-34 = "― อาริสึอยากจะเรียนรู้สิ่งต่างๆ ให้มากกว่านี้ ไปพร้อมๆ กับคุณครูค่ะ...[wa:1720] "
1001508-37 = "― อาริสึอยากเรียนรู้...โลกใบนี้ให้มากกว่านี้ค่ะ![wa:90] "
1001508-40 = "(คุณครูพูดคุยเรื่องเกม RPG ต่างๆ กับอาริสึจนดึก)"
