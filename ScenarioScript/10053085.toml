[translation]
10053085-3 = "...Huh?!"
10053085-4 = "What happened? I thought there was a fight?"
10053085-8 = "There was. You kind of tripped on your own shoes as soon as it started. You fainted instantly, so we figured we should leave you there."
10053085-9 = "During such a critical moment. How shameful..."
10053085-10 = "Does that mean... You beat up all those thugs on your own?"
10053085-11 = "Another WILD leap of logic... No. Konoka handled most of them."
10053085-12 = "Hm? They went pretty far for a prank."
10053085-18 = "Now..."
10053085-19 = "How about we have some REAL fun?"
10053085-24 = "W-Wait! We surrendered! You wouldn't hurt an innocent civilian, would you?"
10053085-25 = "Of course I would. Who told you otherwise?"
10053085-26 = "Valkyrie students can do that?!"
10053085-27 = "Yes, obviously. Why do you think I joined the force?"
10053085-28 = "That said, maybe we should call it even? Maybe you've learned that it's not smart to mess with an officer."
10053085-29 = "Wait! What are you talking about? We never messed with you! That's a false accusation! She's planting evidence!"
10053085-30 = "Didn't you cut the telephone line? And the bridge?"
10053085-31 = "Uh... Yeah, that was us."
10053085-32 = "You have some nerve sassing her back, considering YOU'RE the one who brought out the tank. Classic gaslighting."
10053085-33 = "Whose side are you on?"
10053085-34 = "Oh? We have a few comedians here. Trying out for the talent show, huh?"
10053085-35 = "Hey, Rena! You said you don't believe in magic? How about I show you some, right now?"
10053085-41 = "You see, I have this \"magical\" ability to make anyone tell the truth. Isn't that neat?"
10053085-51 = "N-No...! Honestly! I swear! That's it!"
10053085-52 = "Yeah, okay! We were the ones spreading the Tsuchinoko rumors. We knew it would lure you here."
10053085-53 = "But we didn't do any of that other stuff! Promise!"
10053085-55 = "...Wait, what did you say?"
10053085-56 = "All the Tsuchinoko evidence was...manufactured? A deliberate hoax?"
10053085-58 = "Hm? Who're you?"
10053085-60 = "There's no Tsuchinoko?"
10053085-62 = "...? Yeah. Obviously. There's no such thing as a Tsuchinoko."
10053085-63 = "We knew the Deputy Director was superstitious, so we blew up the rumor to trap her here."
10053085-64 = "You targeted me specifically. Why's that? You got a death wish?!"
10053085-65 = "Wait, come on! Be real now. It was a prank! Everyone knows the Tsuchinoko is a myth!"
10053085-66 = "But you deliberately tricked her. If you say it's her fault for falling for it, then you're engaging in toxic victim-blaming."
10053085-67 = "Hey, whose side are you on?!"
10053085-73 = "..."
10053085-74 = "...I see. The Tsuchinoko does not exist."
10053085-75 = "Tsubasa...?"
10053085-76 = "I thought that if I found the Tsuchinoko, and then the aliens, then Seminar would have to acknowledge my good work."
10053085-77 = "Then I'd be able to re-open my club..."
10053085-78 = "..."
10053085-82 = "...N-No! I knew this could happen! I predicted it, even!"
10053085-83 = "And it's not like I need to find the Tsuchinoko specifically to revive the club... Yeah!"
10053085-84 = "[s1] \"All right. Shall we resume our Tsuchinoko search?\"\n[s2] \"The sun will rise soon.\""
10053085-87 = "Huh? Didn't you hear, Sensei? There's no such thing as the Tsuchinoko."
10053085-92 = "Yeah. These thugs said they spread the rumors themselves."
10053085-93 = "But it's not like I believed in the Tsuchinoko to begin with."
10053085-94 = "So... I guess nothing's changed."
10053085-95 = "Rena..."
10053085-100 = "Aw... I do love a good plot twist."
10053085-101 = "Hey, you."
10053085-103 = "Yes?!"
10053085-104 = "I'll let today's incidents slide—provided you join us. Welcome to Expedition Team X. With those masks, you'll fit right in."
10053085-105 = "But, the Tsuchinoko doesn't—"
10053085-106 = "Which one of these fists was the magical one? The left or the right?"
10053085-107 = "N-No need to check! Everyone, let's find that Tsuchinoko! Leave no stone overturned! I'll start...near the lodge!"
10053085-108 = "Don't miss a single scale! Listen for any slithering!"
10053085-114 = "Hm..."
10053085-115 = "Something still seems off..."
10053085-116 = "[s3] \"What is it, Rena?\"\n[s4] \"Is something on your mind?\""
10053085-119 = "Yeah. Who was in that photo we took?"
10053085-120 = "Huh? Obviously, it was one of the girls we just caught."
10053085-121 = "I thought so too, at first..."
10053085-122 = "But none of them are wearing white."
10053085-123 = "Eh...?"
10053085-127 = "Wh-What are you—?!"
10053085-128 = "Who's this creep? Was she hiding here in the bushes during the whole fight?"
10053085-129 = "Suspicious."
10053085-131 = "[ns5] \"Wait, this voice...?\"\n[ns6] \"Could it be...?\""
10053085-135 = "President?!"
10053085-142 = "Ah, hahaha... Hello? Long time no see, dear Tsubasa."
10053085-143 = "[s7] \"Mirai...is your president...?\"\n[s8] \"Tsubasa's club is actually the...?\""
10053085-150 = "Huh? I thought I told you."
10053085-151 = "I'm a member of the Pseudoscience Club. Well, technically, I'm an ex-member..."
10053085-152 = "I see you already know President Mirai."
10053085-157 = "Uh, would I say they \"know\" me? Maybe it would have been better if we'd never met..."
10053085-158 = "...Pseudoscience Club? President Mirai? I think that sounds familiar."
10053085-159 = "Hey, let's not get it twisted."
10053085-160 = "I had no, absolutely NO, ill intentions this time!"
10053085-161 = "Of course, I-I never intend ill, or bad tidings. Never broke a law in my life..."
10053085-163 = "Ah, I remember now. I've seen your wanted poster. You're a con artist!"
10053085-165 = "A-A-A con artist?! I'm an inventor who utilizes SCIENCE to create products that help the people! I...just don't have time for all the red tape and regulations!"
10053085-166 = "...? Don't you sell things like germanium bracelets and jade mats?"
10053085-167 = "Those are a few of our best-selling products. Many, many happy customers..."
10053085-168 = "So you ARE a con artist."
10053085-169 = "Wait, what did I ever do to the Pseudoscience Club?"
10053085-170 = "Huh? Why do you ask?"
10053085-171 = "You're not here to seek revenge?"
10053085-172 = "\"Revenge?\" Why would I care about that? What a waste of time and money!"
10053085-173 = "Do you tend to visualize yourself as the center of the universe? That can lead to delusions of grandeur."
10053085-174 = "Okay. Then why are you here?"
10053085-175 = "Well... That's difficult to explain, you see..."
10053085-176 = "Abracadabra, Rena! It's \"Magic Time\"!"
10053085-180 = "Wait! Step back! I'll tell you, okay?!"
10053085-181 = "Resorting to physical threats? How utterly barbaric..."
10053085-182 = "First of all, I am the victim here! Keep that straight."
10053085-183 = "...? Very well. Go on."
10053085-184 = "You see... Please keep this from little Tsubasa..."
10053085-188 = "I heard she was going on a trip with a few \"online friends\"..."
10053085-189 = "Don't take this the wrong way, but Tsubasa is...unique. She's a true believer, and doesn't socialize very often..."
10053085-190 = "You stalked us because you were worried about her?"
10053085-191 = "Hey, I wasn't planning for a whole outing! I was just going to check in and head back!"
10053085-192 = "But there was no cellular service!"
10053085-193 = "And then the bridge went out?!"
10053085-194 = "On top of that, I find out she's with some Valkyrie bruiser?"
10053085-195 = "Do you have any idea how much I've SUFFERED?"
10053085-197 = "Wow, pro-level blame shifting..."
10053085-199 = "So you were outside the lodge. Why didn't you just knock, tell us the truth, and ask for help?"
10053085-200 = "How could I?! I am the president! I have a respected reputation!"
10053085-202 = "Yelling about it makes you even less respectable..."
10053085-203 = "Then you were the white blur in the photo?"
10053085-204 = "What photo? ...Ah, yes. I was so shocked when you opened the window that I ran."
10053085-205 = "What an anticlimactic ending..."
10053085-210 = "So, uh, boss, what should I do with her? Tie her up?"
10053085-211 = "What? For what?!"
10053085-212 = "You're a con artist, lady. You even got your own wanted poster."
10053085-213 = "But I bared my heart! I told you my tragic story! You...wouldn't!"
10053085-218 = "Hm... Yeah, leave her be."
10053085-219 = "You can't expect someone like me to remember every petty criminal on the wall. And I'm off-duty."
10053085-220 = "A paranoid president that cares for her junior? Uh, I don't know. Not sure I've heard of her."
10053085-221 = "[s] \"Is that really fine?\""
10053085-222 = "Honestly. Of course it isn't! If I were the type to follow protocol, she'd be in cuffs."
10053085-224 = "Ugh...!"
10053085-229 = "But."
10053085-230 = "I don't really follow protocol. Or play by the rules."
10053085-231 = "Just, ah, keep this a secret from the Bureau, all right?"
10053085-232 = "You'll let me off the hook?"
10053085-233 = "I'm not letting you \"off the hook,\" I'm just choosing to not see anything."
10053085-234 = "Listen, copper. If you go back on your word..."
10053085-235 = "...You'll do what, exactly? If you're so smart, why don't you act like it? I'm giving you a break."
10053085-236 = "Ah, yes... Sorry."
10053085-239 = "Hey, is everything all right? You've all been talking for a while..."
10053085-240 = "N-No! It's just! Uh, how should I say this?"
10053085-241 = "Ah, the Tsuchinoko! I'm also here, conducting an investigation. I was...considering staying at this lovely lodge, so I was inspecting the...walls, and whatnot."
10053085-242 = "Oh, really?! Like as a \"club activity\"? Like before?"
10053085-243 = "Ah, no, dear Tsubasa. Working together, officially, would be a bit difficult... Firstly, I'm a fugitive, and, secondly, the Pseudoscience Club is still blacklisted..."
10053085-247 = "Well, still..."
10053085-248 = "Maybe I'll drop in and visit you once in a while. Would you like that?"
10053085-253 = "...!"
10053085-254 = "...Perhaps."
10053085-255 = "Perhaps the true \"Tsuchinoko\" was the friends we found along the way."
10053085-260 = "...? What are you even talking about?"
