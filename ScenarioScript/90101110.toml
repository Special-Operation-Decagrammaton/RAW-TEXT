[translation]
90101110-1 = "第11話;エピローグ"
90101110-2 = "（カニの事件が片づいた頃。連邦生徒会を訪ねた）"
90101110-5 = "[ns] \"リンちゃん！\""
90101110-6 = "連邦生徒会レセプションルーム"
90101110-8 = "[USERNAME]先生。"
90101110-9 = "相変わらずお元気そうでなによりです。#n本日はどういったご用件で？"
90101110-10 = "……それより、誰が「リンちゃん」ですか。"
90101110-11 = "[s1] \"リンを応援しに来たよ！\"\n[s2] \"リンちゃんに会えてなかったから寂しくて……。\""
90101110-13 = "はぁ……。"
90101110-14 = "先生のことですから、本心は他にあるのでしょう？"
90101110-15 = "滞っている報告書の提出期限を延ばしてほしいとか。"
90101110-16 = "もしくは、行政委員会に提出する書類を代わりに作ってほしいとか――"
90101110-17 = "[s] \"うっ……。\""
90101110-21 = "あるいは……以前依頼された、ガラス片の分析の進捗を聞きに来られた、とか。"
90101110-22 = "[s3] \"会って早々に仕事の話だなんて、ひどいな～\"\n[s4] \"本当に忙しいリンが心配で来たんだよ。\""
90101110-25 = "そこまで心配される必要はありません。#n[ruby=・]最[/ruby][ruby=・]近[/ruby][ruby=・]の[/ruby][ruby=・]私[/ruby]は本当に大丈夫ですから。"
90101110-26 = "あの偽物――"
90101110-27 = "いえ、連邦生徒会長が復帰して以降、連邦生徒会の業務は概ね正常化しました。"
90101110-28 = "見た目も話し方もまるで別人ですが、業務処理能力だけは本物に比肩するほど優秀です。"
90101110-29 = "いえ、むしろ一部の領域に限っては、それ以上かも……。"
90101110-30 = "おかげで私も、週に1日は個人の時間を取れる程度に余裕ができました。"
90101110-31 = "[s5] \"週に1日って……。\"\n[s6] \"本当に大丈夫なの？\""
90101110-34 = "はい。これ以上休むと、むしろ生活リズムが崩れそうで心配になるくらいです。"
90101110-38 = "こちら――先生からお預かりしたガラス片を様々な方法で検証しました。"
90101110-39 = "欠片の向こう側の世界に変化があるかを1日中観察したり、光を当てて反応を調べたり。"
90101110-40 = "結果として、これはガラス片というより……[ruby=・]鏡[/ruby][ruby=・]の[/ruby][ruby=・]欠[/ruby][ruby=・]片[/ruby]なのではないかと思われるのです。"
90101110-41 = "[s] \"どう違うの？\""
90101110-42 = "ガラスは外を見るための素材です。"
90101110-43 = "観察する向きに関係なく、向こう側の景色を映します。"
90101110-44 = "一方で鏡は、片面が遮られているため光を透過せず、反射して観察者側を映します。"
90101110-46 = "この欠片に映る像は、暗所だからといって光らず、明所だからといって色が薄れることもありませんでした。"
90101110-47 = "まるで、こちら側の状況を投影して変化しているかのように。"
90101110-48 = "もし映っているものが、どこか別世界ではなく、このキヴォトスの現実を投影しているのだとすれば――"
90101110-49 = "これはガラス片ではなく、鏡の欠片と呼ぶ方が正しいのではないでしょうか。"
90101110-50 = "[s] \"じゃあこの草原や深淵はキヴォトスのどこかってこと？\""
90101110-51 = "現時点での私の判断では、そうなります。"
90101110-52 = "ただし、その風景は、私の知るキヴォトスのいかなる場所にも似ていませんでした。"
90101110-54 = "……[ruby=・]会[/ruby][ruby=・]長[/ruby]が残した写真に写っていた、あの湖のように。"
90101110-56 = "[ns] \"……鏡の中のキヴォトス、か。\""
90101110-57 = "トリニティの古典に、似たような話があります。"
90101110-58 = "ある少女が夢の中で鏡の中へ歩き出し、知っている世界と似ていながら、まったく異なる世界に触れるという話です。"
90101110-59 = "その世界は、チェス盤の女王が目覚めると消えてしまう、一瞬の夢のように描かれていましたが……。"
90101110-60 = "私も時折、この信じ難い現実が、いっそ誰かの夢だったらいいのに、と思ってしまうことがあります。"
90101110-61 = "[s] \"でも私は、リンとこうして過ごす時間は現実であってほしいな。\""
90101110-62 = "……他の生徒にも、そのような言葉を？"
90101110-63 = "いらぬ誤解が増えますから、先生はご自身の立場をもう少し考えて発言なさってください。"
90101110-64 = "[s] \"ひどい……。\""
90101110-65 = "ともあれ。"
90101110-66 = "私もキヴォトスの全ての場所を知っているわけではありません。#nこの欠片に映る風景が、キヴォトスに存在しないと断言することはできません。"
90101110-67 = "ですので、次の休日にはD.U.を離れて、もう少し遠くまで足を伸ばすつもりです。"
90101110-68 = "[s] \"私も付いてっていい？\""
90101110-69 = "ええ、同行される程度なら構いませんが。"
90101110-70 = "[s7] \"やったー！リンちゃんと2回目のおでかけだ！\"\n[s8] \"お弁当は期待しててね！\""
90101110-73 = "……やはり取り消しです。私ひとりで行きます。"
90101110-74 = "[s] \"ひどいよ～リンちゃん～\""
90101110-75 = "だから、誰がリンちゃんですか！"
90101110-80 = "FOX小隊HQ"
90101110-81 = "[ns9] \"みんなー！デリバリー取ろうと思ってさ！\"\n[ns10] \"よかったら一緒に――\""
90101110-86 = "[ns] \"……カニ？\""
90101110-87 = "あ、バレちゃった。"
90101110-88 = "バレたって何よ。別に隠れて食べてたわけじゃないのに。"
90101110-89 = "えっと……カニの状態を確認するために調理することになりまして――"
90101110-90 = "先生。釈明のお時間をいただけますでしょうか。"
90101110-91 = "順を追ってご説明しますので。"
90101110-92 = "[s11] \"いいっていいって。\"\n[s12] \"変なルートで手に入れたんじゃないならね。\""
90101110-95 = "あ、それは、その……。"
90101110-96 = "[s] \"え……本当に怪しい方法で……？\""
90101110-97 = "違うってば！"
90101110-99 = "[ns] \"……あの時のカニだったんだ。\""
90101110-100 = "そう。逃げたのをせっかく回収したのに、カルパッチョ・ファミリーが引き取りを拒否したのよ。"
90101110-101 = "嫌な記憶が蘇るとか、もうカニは勘弁だとか……。"
90101110-102 = "あの巨大カニを目撃した構成員なんて、#nハサミのカチカチ音を聞くだけで発作が起きちゃうレベルらしいわ。"
90101110-103 = "恐怖で他人を支配しようとした者が、逆に飲み込まれるなんて……#n皮肉な結末だねぇ。"
90101110-104 = "自業自得でしょ。"
90101110-105 = "それで結果的に、廃棄されそうになっていたものを私たちが引き取ったんです。#nカルパッチョ・ファミリーが怪しい用途に使っていたカニ……#nという噂が広まって、他に貰い手も現れなかったので。"
90101110-106 = "私たちにとっても、嫌な思い出しかないけどね。"
90101110-107 = "でもカニに罪はないし。"
90101110-108 = "カニをこーんなに食べられるなんて、夢みたいじゃん？"
90101110-109 = "この機会に、飽きるまで食べたいなぁ……むふふ。"
90101110-110 = "こほん。"
90101110-111 = "ともあれ、お誘いが遅れましたが……。"
90101110-112 = "よろしければ、先生もご一緒に召し上がりませんか？"
90101110-117 = "[ns] \"いいの……？\""
90101110-118 = "もちろんです。カニはたくさんありますから。"
90101110-122 = "そろそろ火が通ったようだな。"
90101110-123 = "どれ、一口……。"
90101110-127 = "なにこれ！？全然違う……？"
90101110-128 = "弾力があって、汁がじゅわっと出てくる……！#n「はみだしフーズ」のカニカマとはまるで別物だよ！"
90101110-129 = "そりゃそうよ。そもそも、安物のカニカマとかソーセージと比べる方がおかしいの。"
90101110-130 = "本物を知っちゃったら、もう戻れないかもね？"
90101110-135 = "そうかな？魚肉ソーセージの方が美味しいような……。"
90101110-136 = "はぁ！？味覚どうなってんの！？"
90101110-137 = "だって、魚肉ソーセージの甘くて脂っこい感じに比べたら、#nあっさりしすぎてるっていうか……。"
90101110-138 = "頑張って身をとってもこーんな量しかないじゃん？こんなに殻はでかいのにさぁ。"
90101110-139 = "文句ばっか言うならこっちに寄越しなさいよ。オトギの分も全部私が食べるから！"
90101110-144 = "でも、オトギの言うことも少し分かるかな。#nこのカニ、あんまり身が詰まってないかも。"
90101110-145 = "そもそも、ドラム缶の中で雑に保管されていたんだ。状態が悪くても不思議じゃない。"
90101110-148 = "本体が大きければ身も太くなるんだっけ？"
90101110-149 = "ってことは、あの時の怪物ガニの脚なら、でっかい身が取れたんじゃない？"
90101110-150 = "え……あれを食べる気！？"
90101110-151 = "錆びた鉄が刺さってる上に、気味の悪い泡を噴いてたのよ？#n私はタダでもお断り。"
90101110-152 = "いやいや、考えてもみてよ。#n手で持ちきれないくらいのカニ脚に、思いきりかぶりつくところを――"
90101110-153 = "…………。"
90101110-154 = "あ、悩んでる。"
90101110-155 = "悩んでないってば！"
90101110-159 = "これまでは缶詰や加工されたものを食べることが多かったですが……#n鍋も良いですね。"
90101110-160 = "カニの出汁がよくでていて……。"
90101110-161 = "はい、先生。殻が熱いのでお気をつけください。"
90101110-165 = "[ns13] \"甘じょっぱくて濃い旨味だね。\"\n[ns14] \"これはご飯が欲しくなる……。\""
90101110-168 = "よければお出ししましょうか？"
90101110-169 = "明日いなり寿司を作ろうと思っていたので、ちょうど炊いてあるんです。"
90101110-170 = "……私、思いついちゃった。"
90101110-171 = "いなり寿司の酢飯に、このカニ味噌を混ぜたら――"
90101110-172 = "絶対美味しいよね？"
90101110-173 = "それは――"
90101110-174 = "美味しいに決まってるじゃない！"
90101110-175 = "これまでたくさんいなり寿司を食べてきたのに、どうして思いつかなかったんだろ。"
90101110-176 = "いなり寿司は食べてても、カニには縁が無かったからねぇ。"
90101110-177 = "でも今日は、カニだけでお腹いっぱいになるくらい余ってるし……。"
90101110-178 = "炊いたご飯、全部持ってくるね。"
90101110-179 = "ねえ、軍用クラッカーも取ってきていい？"
90101110-180 = "カニにマヨネーズ塗って、クラッカーと一緒に食べたら美味しそう――"
90101110-181 = "天才！"
90101110-182 = "やろう！今すぐ！"
90101110-183 = "火の周りで騒ぐな、危険だ。"
90101110-184 = "ふふっ。お米、もう少しといで水に浸しておこうかな。"
90101110-186 = "（FOX小隊とカニを分け合って、楽しい時間を過ごした）"
90101110-193 = "トリニティ 古書館入口"
90101110-196 = "……ゲホ、ゲホッ。"
90101110-197 = "ウイ先輩、また窓を開けずに作業しましたね？"
90101110-198 = "うう……部屋中ホコリだらけ。#nよくここで本が読めますね。"
90101110-202 = "さ、最近は暑いですし……扉を開けたら熱気が入ってくるじゃないですか。"
90101110-203 = "それに、直射光は古書の敵――"
90101110-204 = "はいはい。換気しますね。"
90101110-215 = "ひ、ひえええぇ……。"
90101110-217 = "ふぅ、スッキリしました。"
90101110-218 = "……あれ、見慣れない本ですね。"
90101110-219 = "百鬼夜行の戦国時代の取引記録……商人のものですね。"
90101110-220 = "「恋よ鯉」先生の『スレッジハンマー』初版……#n製本不良で全て回収されていたはずでは……。"
90101110-221 = "こ、これは第一回トリニティ公会議の際にユスティナ聖徒会側が作成した議事録？"
90101110-225 = "どうしてこんなところに……？"
90101110-226 = "……先輩、また修復中に写しを作ったんですね？"
90101110-227 = "ま、またって何！？ 私だって、毎回写しを作ってるわけじゃ――"
90101110-228 = "ご、ゴホン、この子たちは、チエルちゃんが持ってきてくれたんですよ。"
90101110-229 = "チエルちゃん……副委員長が？"
90101110-230 = "古書を探しにいく、と言い残してカタコンベに行ったきり、#n行方不明になって早3ヶ月の？"
90101110-231 = "そうです。今朝[ruby=・]発[/ruby][ruby=・]掘[/ruby][ruby=・]し[/ruby][ruby=・]た[/ruby]子をたくさん連れて戻ってきました。"
90101110-232 = "今は寮にいますが……#nしばらくは読書をすると言っていたので、声をかけても出てこないと思います。"
90101110-233 = "一言くらいあっても良いのに……でも、無事に帰ってこられて良かったです。"
90101110-234 = "前回ヒノム火山に向かわれた時は、ゲヘナとの外交問題になったと聞きましたが……。"
90101110-235 = "あの時は……悪夢でした。図書委員長が来なければ解放しない、なんて言われてしまって……はぁ。"
90101110-239 = "ああ、そういえば……チエルちゃんからシミコに伝言です。"
90101110-240 = "――「ペロロジラの記事を覚えていますか」と。"
90101110-246 = "……「ペロロジラ」、ですか？"
90101110-248 = "ロア追跡編;To be Continued in Chapter 3"
