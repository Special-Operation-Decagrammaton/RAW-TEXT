90101110-36 = "#clearST"
90101110-37 = "3;린;01\n#3;greeting\n#wait;1000"
90101110-38 = "3;린;02;우선, 선생님께서 빌려주신 이 유리 조각은 여러가지 방법으로 확인을 해 보았습니다.\n#3;em;[반응]"
90101110-39 = "3;린;01;하루 종일 조각 너머의 세계가 변화 하는지 지켜보기도 했고, 빛을 쬐어가며 변화를 관찰하기도 하였습니다.\n#3;m2"
90101110-40 = "3;린;01;하지만 살펴보면 볼수록…… 이 반짝이는 물체는 '유리 조각'이라기 보다는 '거울 조각' 처럼 보이더군요."
90101110-41 = "[s] \"둘 사이에 어떤 차이가 있는데?\""
90101110-42 = "3;린;99;유리는 밖을 보는 창에 쓰이는 소재."
90101110-43 = "3;린;02;그렇기에 유리에 맺힌 상은 관찰하는 방향과 상관 없이 유리 너머의 모습을 비춥니다.\n#3;m3"
90101110-44 = "3;린;01;하지만 거울은 한쪽 면이 가려져 있기 때문에 빛을 투과하지 않고 반사하여, 역으로 관찰하는 쪽의 모습을 비추지요."
90101110-45 = "#all;hide"
90101110-46 = "#na;린;이 조각에 비친 상은 어두운 곳이라 하여 빛을 발하지도 않았고, 밝은 곳이라 하여 그 색이 희미해지지도 않았습니다."
90101110-47 = "#na;린;마치 이쪽의 상황을 투영하여 변화하는 것처럼."
90101110-48 = "#na;린;유리에 맺힌 상이 어딘가 다른 세계가 아닌 이 키보토스의 현실을 투영하고 있다면—"
90101110-49 = "#na;린;이 조각은 유리 조각이 아니라, 거울 조각이라고 부르는 편이 더 옳지 않을까요?"
90101110-50 = "[s] \"그럼 이 초원이나 심연은 키보토스의 세계라는건가?\""
90101110-51 = "#na;린;일단 제 판단은 그렇습니다."
90101110-52 = "#na;린;하지만 이 풍경은 제가 아는 키보토스의 그 어떠한 장소와도 닮지 않았습니다."
90101110-53 = "#all;hide"
90101110-54 = "#na;린;……회장이 남긴 사진에 찍혀 있는 그 호수 처럼."
