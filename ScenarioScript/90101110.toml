90101110-24 = "#wait;10"
90101110-25 = "3;린;01;그렇게 걱정 하실 필요는 없습니다. '최근의 저'는 정말로 괜찮으니까요."
90101110-26 = "3;린;17;그 가짜……"
90101110-27 = "3;린;05;아니, 총학생회장이 복귀한 이후로 총학생회 대부분의 업무는 모두 정상화되었습니다.\n#3;stiff"
90101110-28 = "3;린;42;외형과 말투는 조금도 닮지 않았지만, 그녀의 업무를 처리하는 능력만큼은 확실히 진짜에 비견될 만큼 우수했습니다."
90101110-29 = "3;린;43;아니, 오히려 일부 영역에 한해서는 더 뛰어날지도……\n#fontsize;50\n#3;em;[속상함]"
90101110-30 = "3;린;99;여하튼 덕분에 저도 한 주에 하루 정도는 개인 시간을 가질 수 있을 정도로 여유가 생겼답니다."
90101110-31 = "[s5] \"한 주에 하루라니……\"\n[s6] \"정말로 괜찮은 거야?\""
90101110-32 = "#wait;10"
90101110-33 = "#wait;10"
90101110-34 = "3;린;01;네. 오히려 이 이상 휴식을 취하면 생활 루틴이 깨질까 걱정이 될 정도니까요."
