90101110-21 = "3;린;01;그도 아니라면, 지난 번에 분석을 부탁하신 유리 조각에 대한 진척 사항을 물으러 오신 건가요."
90101110-22 = "[s3] \"만나자마자 일 이야기라니, 너무하네~\"\n[s4] \"나는 정말로 바쁜 린이 걱정되어서 찾아온건데.\""
