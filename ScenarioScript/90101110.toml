90101110-56 = "[ns] \"……거울 속의 키보토스라.\""
90101110-57 = "3;린;99;그러고보니 트리니티의 고전에 비슷한 이야기가 있었던 것 같네요.\n#3;em;…"
90101110-58 = "3;린;01;한 소녀가 꿈에서 거울 속으로 걸어가 자신이 알던 세계와 닮았지만, 전혀 다른 세계를 접하게 된다는 이야기가."
90101110-59 = "3;린;02;그 세계는 결국 체스판 위의 여왕이 깨어나면 사라지는 한 순간의 꿈처럼 묘사되는데……\n#3;stiff"
90101110-60 = "3;린;06;저도 가끔은 이 믿을 수 없는 현실이, 차라리 누군가의 꿈이었으면 좋겠다는 생각을 종종 하게 되네요.\n#3;em;[속상함]"
90101110-61 = "[s] \"나는 린과 보내는 이 시간이 현실이었으면 좋겠는데.\""
90101110-62 = "3;린;05;……다른 학생들에게도 그런 사탕발림을 하시는 겁니까?"
90101110-63 = "3;린;25;쓸데없는 오해가 늘어날테니, 선생님의 입장을 좀 더 확실히 생각하고 발언해 주셨으면 합니다."
