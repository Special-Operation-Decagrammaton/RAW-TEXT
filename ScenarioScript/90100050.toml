90100050-65 = "3;유키노;02;예. 지난 달— 총학생회장이 돌아온 지 얼마되지 않은 때부터, 이 일대에서 정신을 잃은 채 발견되는 학생들이 급격히 늘어났습니다.\n#3;em;[반응]"
