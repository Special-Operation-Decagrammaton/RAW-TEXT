[translation]
1002220-1 = "Something Still Precious"
1002220-2 = "I excitedly ran to the beach where Hina was waiting for me."
1002220-7 = "[ns] \"Hina! I'm here!\""
1002220-8 = "Oh, Sensei..."
1002220-9 = "I was worried, because I thought it might have been too sudden of a request..."
1002220-13 = "You came without any hesitation. Thank you, Sensei."
1002220-14 = "[s] \"Well, for you, I always will. I'm happy to be here.\""
1002220-15 = "Oh..."
1002220-16 = "...I see. You're happy to be here..."
1002220-17 = "...Heehee."
1002220-18 = "[s1] \"I'm a pretty strong swimmer! You can count on me!\" \n[s2] \"I don't really know how to swim, but I'll do my best!\""
1002220-19 = "It seems I'm in capable hands."
1002220-20 = "O-Oh... I see... "
1002220-21 = "[s3] \"I'll just learn with you, step by step!\""
1002220-22 = "If... If you say so..."
1002220-23 = "Sensei, I should be keeping up with your energy, right?"
1002220-24 = "I'll do my best, so I don't waste too much of your time with this lesson."
1002220-28 = "It's one of my few strengths. I'm a fast learner."
1002220-29 = "Then, let's not waste time and get to—"
1002220-33 = "[ns] \"Wait, that's no good.\""
1002220-34 = "Sorry? What do you mean?"
1002220-35 = "[s4] \"It's about learning slow and steady, not as fast as you can!\" \n[s5] \"You have to put in the time to master something!\""
1002220-38 = "No, I mean... I can't just goof around. It's one of your precious days off."
1002220-39 = "It would be a waste if you ended up spending it all with me..."
1002220-40 = "[s] \"Not at all! Even if we did nothing, I'm happy to spend the day off with you.\""
1002220-41 = "...Y-Y-You actually wanted to spend the day...j-j-just with me...?"
1002220-42 = "You mean it? Prove it to me, right now. "
1002220-43 = "W-W-Wait! I didn't mean it! Get up! You're going to cause a scene! Sensei!"
1002220-44 = "You really are just..."
1002220-45 = "..."
1002220-46 = "Pfft."
1002220-47 = "Well, it's definitely not out-of-character for you."
1002220-48 = "Okay, fine, Sensei."
1002220-49 = "[s] \"Okay, let's go!\""
1002220-50 = "So..."
1002220-57 = "W-What are you doing?"
1002220-58 = "Why are you shooting at us all of a sudden?!"
1002220-62 = "Why? It's obvious!"
1002220-63 = "We...passionately hate those people who go all lovely-dovey because it's a steamy summer!"
1002220-64 = "I'm going to sabotage everyone's happiness!"
1002220-65 = "And in particular, I'll sabotage the days of those who show off their happiness!"
1002220-66 = "What kind of nonsensical reason is that?!"
1002220-71 = "[ns] \"Hina, over there...!\""
1002220-73 = "...Sensei, please stay back."
1002220-74 = "I won't be long."
1002220-77 = "[ns] \"What? Hina!\""
1002220-81 = "Huh? Who are you?"
1002220-82 = "Small frame...that silver hair... Wait, she's...!"
1002220-86 = "W-Waaahh?!"
1002220-87 = "W-Why is the famously strong head prefect of Gehenna here?! Argh!!"
1002220-94 = "Hina mercilessly took care of the troublemakers."
1002220-97 = "Th-Thank you! You really saved us!"
1002220-98 = "I don't know how I could thank you!"
1002220-99 = "There's no need. I just did the right thing."
1002220-101 = "Right after she sent the people thanking her on their way..."
1002220-106 = "[ns] \"Good work, Hina.\""
1002220-108 = "It wasn't anything out of the ordinary."
1002220-109 = "I've seen several of those kind at Gehenna, students can't control themselves during the heat of summer."
1002220-110 = "Things like that are par for the course, I guess."
1002220-111 = "[s] \"As expected of the Gehenna head prefect!\""
1002220-112 = "I mean... It's not like that..."
1002220-117 = "[ns] \"Huh? Hina, what was that sound?\""
1002220-118 = "Oh. It looks like the tube was punctured."
1002220-119 = "[s] \"Isn't that the one you carry around all the time? How did it all of a sudden...?\""
1002220-120 = "It looks like...a bullet hit it while I was fighting."
1002220-121 = "That was my mistake."
1002220-122 = "Even if I was in a battle, I could have prevented this if I had been more alert."
1002220-123 = "It's the Prefect Team's equipment too... I've been using it for so long, I grew careless with it."
1002220-124 = "[s] \"It's old, then. It's not your fault.\""
1002220-125 = "No, Sensei..."
1002220-126 = "It was my own recklessness."
1002220-127 = "Well... I can't do much about something that's already broken."
1002220-128 = "..."
1002220-129 = "[s] \"Then, shall we go fix it?\""
1002220-130 = "Fix it? The tube?"
1002220-131 = "That may not be as simple as it sounds..."
1002220-132 = "It's the Prefect Team's equipment, so it's made out of special material."
1002220-133 = "I'd have to go back to the academy and submit a repair request..."
1002220-134 = "I suppose I should've expected something like this to happen... Sensei was going to teach me how to swim too..."
1002220-135 = "Hmph. This would happen to me..."
1002220-136 = "..."
1002220-137 = "...I could look at the bright side of it, I suppose."
1002220-138 = "[s] \"Hina?\""
1002220-139 = "I've used that tube for so long now, I never really considered that I'd have to let it go eventually."
1002220-140 = "But I do, at some point. I can hardly float around in the water with a tube forever, can I?"
1002220-141 = "Imagine the big, bad Head Prefect, being attached to a ducky tube. Haha."
1002220-142 = "I guess that's that."
1002220-143 = "It'll be better for our swimming lesson too, Sensei."
1002220-144 = "..."
1002220-145 = "Okay, Sensei. I'm ready to train, sans tube."
1002220-146 = "[s] \"Well, you're technically right. We can train without the tube.\""
1002220-147 = "...Huh?"
1002220-148 = "[s] \"And you'll have stop using it sooner or later, like you said.\""
1002220-149 = "S-Sensei?"
1002220-150 = "[s] \"But that day doesn't have to be today, does it?\""
1002220-151 = "...! That's..."
1002220-152 = "That's not wrong, but..."
1002220-153 = "[s6] \"And most of all, I was really looking forward to seeing \"that\" happen again!\" \n[s7] \"But I still haven't witnessed adorable Hina, not knowing what to do on her tube!\""
1002220-156 = "S-Sensei?! What are you saying all of a sudden...?!"
1002220-157 = "If you weren't joking... I really will be angry."
1002220-158 = "[ns] \"I-I mean, don't give up without even looking for a solution!\""
1002220-160 = "[ns] \"Doesn't your precious childhood tube have sentimental value to you?!\""
1002220-161 = "Sensei..."
1002220-162 = "...Geez."
1002220-163 = "You're always like this."
1002220-164 = "Fine. Okay."
1002220-165 = "[s8] \"Cool! Let's look around for a place!\" \n[s9] \"Let's give it our best to fix it!\""
1002220-169 = "After successfully convincing Hina, I started looking for a place we could get the tube repaired."
1002220-196 = "This...I should be able to fix it."
1002220-197 = "...Truly?"
1002220-198 = "A special material made of resources native to Gehenna... I can't make any promises, but I'd love to take on the challenge!"
1002220-199 = "We leave it in your care, then."
1002220-200 = "[s] \"You're our only hope!"
1002220-208 = "We were able to get the tube fixed, in the end."
1002220-213 = "This ducky is ready to float again!"
1002220-214 = "[s] \"Thank you!\""
1002220-215 = "Th-Thank you..."
1002220-216 = "Right back at you! It was a great learning experience! Glad you're satisfied."
1002220-222 = "[ns] \"Phew, Hina! What a relief!\""
1002220-223 = "Mhm. It really is. I'm still shocked."
1002220-224 = "I honestly thought it was too damaged for repair. I was trying to make myself feel better about it..."
1002220-225 = "Thank you, Sensei."
1002220-226 = "[s] \"Don't mention it.\""
1002220-230 = "But... we spent the whole day trying to find a place to fix the tube..."
1002220-231 = "...Thank you for humoring me today, Sensei."
1002220-232 = "I'm the one who called you out, I wouldn't want to keep you too late."
1002220-233 = "[s] \"No, Hina. The day isn't over yet.\""
1002220-234 = "...Hm?"
1002220-235 = "[s10] \"I think I made you a promise, didn't I?\" \n[s11] \"I promised you my best, always. That includes with swimming.\""
1002220-240 = "[ns12] \"Is it too late for you now?\"\n[ns13] \"How do you feel about a lesson?\""
1002220-241 = "Oh..."
1002220-242 = "Oh..."
1002220-243 = "You're still willing to—for me?"
1002220-249 = "In that case..."
1002220-250 = "With your permission, I'll be monopolizing the rest of your day off."
1002220-255 = "I promise to do my best too. I'll be your star pupil. "
1002220-260 = "And then we swam together at the beach late into the night, until the moon began to fall past the horizon."
