[translation]
901010400320-7 = "こんにちは、「FOX EATS」です！"
901010400320-8 = "おや、配達員さん。"
901010400320-9 = "今日はデリバリーの注文は入ってないけど……どうしたんだい？"
901010400320-10 = "本日から鐘崎港の配達サービスを開始したんです。それで……。"
901010400320-11 = "新しい飲食店を皆さんにご紹介しようと思っているのですが……。"
901010400320-12 = "ここのお店のチラシを少し持っていてもいいですか？"
901010400320-13 = "ああ、もちろんだよ！"
901010400320-14 = "チラシはいくらでもあるから、好きなだけ持っていってくれ。"
901010400320-15 = "ありがとうございます！"
