[translation]
10028005-1 = "บทเริ่มต้น;ตู้รถไฟคุ้มกัน"
10028005-64 = "เป้าหมายที่ต้องคุ้มกันมาถึงแล้ว! ผูกโซ่ได้!!"
10028005-72 = "รีบเข้าไปเร็วๆ! อย่าแม้แต่จะคิดทำอะไรไร้สาระ!"
10028005-77 = "...อย่าขยับ! นั่งนิ่งๆ ไปจนกว่าจะถึงสำนักงานใหญ่"
10028005-78 = "ล็อกโซ่!! ล็อกตรวน!!"
10028005-83 = "เราจะตัดสิน 'การลงโทษ' ของพวกเธอเมื่อกลับไปถึงสำนักงานใหญ่ บางทีแสงตะวันที่เห็นในวันนี้#nมันอาจจะเป็นแสงตะวันสุดท้ายของชีวิตนักเรียนของเธอก็ได้"
10028005-84 = "........."
10028005-85 = "ชิ... นึกว่าจะพูดอะไรออกมาบ้างซะอีก ที่แท้ก็ได้แต่นั่งนิ่งเป็นท่อนไม้เลยนะ"
10028005-86 = "จะว่าไป เป็นคนนี้จริงๆ เหรอ? ดูภายนอกเป็นแค่เด็กน้อยไร้พิษสงเอง เราต้องมาคอยเฝ้าดูขนาดนี้เลย#nเหรอ..."
10028005-87 = "เด็กคนนี้เป็นถึงหัวโจกของพวกที่มาก่อการร้ายในใจกลางที่ประชุมที่มีผู้นำของแฟมิลีมารวมตัวกันครบ#nเลยนะ คนแบบนี้ไม่มีทางไร้พิษสงหรอก"
10028005-88 = "ฉันก็รู้อยู่หรอกนะว่าเด็กคนนี้ได้ฉายาโด่งดังว่า 'คนไม่เต็มบาท' ..."
10028005-89 = "แต่ก็อย่างว่าแหละนะ ถ้าไม่ได้มีอะไรจริงๆ คณะกรรมการวินัยเกเฮนน่าคงไม่ตั้งให้เป็นคนที่ต้องเฝ้า#nระวังเป็นพิเศษหรอก"
10028005-90 = "แต่ยังไงเธอก็คงดวงกุดในวันนี้แหละ เพราะคนที่จะจัดการเธอคือสหพันธ์แฟมิลี..."
10028005-91 = "แถมยังเป็น <อารันชิโน แฟมิลี> ที่เป็นหัวเรือใหญ่ของสหพันธ์ด้วย"
10028005-92 = "........."
10028005-93 = "ปิดประตูหลัง! ทุกคนเข้ามาข้างในและนั่งลง!!"
10028005-94 = "ทุกคนนั่งลง!! ห้ามเปลี่ยนที่!! อยู่แบบนี้ไปจนกว่าจะถึงสำนักงานใหญ่!!"
10028005-100 = "ตรวจสอบการเชื่อมรถ!! ทุกอย่างเรียบร้อยดี!!"
10028005-101 = "...ออกเดินทางได้!"
10028005-107 = "......"
10028005-108 = "......♪"
