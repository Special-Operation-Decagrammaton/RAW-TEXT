80000129-83 = "B-But still! I was wondering...if that's okay... Here?"
80000129-84 = "What? Good engineers need to \"maintain their health as much as their trains\"? Uh..."
80000129-85 = "[s5] \"You seem a bit tired, Aoba.\"\n[s6] \"And I have a comfy sofa right here!\""
80000129-88 = "U-Ugh...!"
80000129-89 = "...I have been pushing myself a bit too much lately."
80000129-90 = "...Hmm..."
80000129-97 = "I-In that case... If you don't mind..."
