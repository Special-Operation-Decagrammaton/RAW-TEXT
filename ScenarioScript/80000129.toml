[translation]
80000129-1 = "I hate cheap chocolate"
80000129-7 = "……"
80000129-8 = "老師……不在嗎……"
80000129-9 = "或，或許這樣反而好……"
80000129-14 = "嗚嗚……這種東西真的可以嗎……"
80000129-15 = "……但是……老師的話……"
80000129-20 = "[ns] 「你好，青葉。」"
80000129-22 = "哇，哇啊！老，老師！？"
80000129-23 = "你，你從什麼時候開始在那裡的……！？"
80000129-24 = "在，在沙發上……？"
80000129-25 = "原，原來是躺在那裡啊……完全沒注意到……"
80000129-26 = "嗚，嗚……那我，我就，就先告，告辭了……"
80000129-27 = "[s1] 「這就要走了嗎？」\n[s2] 「嗯……？這是……」"
80000129-34 = "啊，啊啊……！！那，那個是……"
80000129-38 = "那，那個，那個是……"
80000129-39 = "平，平時受老師很多照顧嘛……！"
80000129-40 = "今，今天想要傳達那份感謝之情……！！"
80000129-41 = "可是，又覺得這種東西到底行不行……"
80000129-42 = "手工的什麼的！好想做更用心一點的東西……！"
80000129-43 = "每天每天都要加班……結束後店家也都關門了……就這樣不知不覺……"
80000129-44 = "對，對不起……就是那種隨處可買到的廉價零食……"
80000129-45 = "[ns] 「我很開心喔，青葉。」"
80000129-48 = "咦！？"
80000129-49 = "這，這種東西也可以嗎……？"
80000129-50 = "[s3] 「你花了很多心思準備的不是嗎。」\n[s4] 「而且你還特地跑來這裡了。」"
80000129-53 = "……"
80000129-54 = "你，你這樣說的話……"
80000129-55 = "……"
80000129-56 = "謝謝你……"
80000129-57 = "[ns] 「這張紙條是……」"
80000129-58 = "啊，啊啊啊啊！！！"
80000129-59 = "那，那個！等你之後一，一個人的時候再看！！！"
80000129-60 = "現，現在不行！！！"
80000129-61 = "[s] 「啊，我知道了……！」"
80000129-62 = "呼，呼……"
80000129-69 = "那，那麼……事情也辦完了……我就先回，回去了……"
80000129-70 = "下，下次再見了，老師……！"
80000129-75 = "[ns] 「等一下，青葉！」"
80000129-79 = "什，什麼事！？"
80000129-80 = "[s] 「難得來了，要不要稍微休息一下再走？」"
80000129-81 = "咦……咦，咦？"
80000129-82 = "啊……不，不是很忙的……！"
80000129-83 = "可，可是！不知道這樣做好不好……"
80000129-84 = "「維持好狀態也是工作者的美德」……？"
80000129-85 = "[s5] 「青葉，你看起來有點累。」\n[s6] 「正好這裡有舒適的沙發呢！」"
80000129-88 = "嗚，嗚……！"
80000129-89 = "……確實，最近好像有點太勉強了……"
80000129-90 = "唔嗯……"
80000129-97 = "那，那麼……打擾了……"
80000129-99 = "（就這樣讓青葉安心地休息到了很晚）"
80000129-100 = "一，一直以來謝謝你的關照……"
80000129-101 = "……多虧了你……"
80000129-102 = "明天，後天，也都能繼續加油的感覺。"
80000129-106 = "說不定……今後也是……"
