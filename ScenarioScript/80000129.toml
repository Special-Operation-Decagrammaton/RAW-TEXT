[translation]
80000129-1 = "I hate cheap chocolate"
80000129-7 = "……"
80000129-8 = "老師……不在嗎……？"
80000129-9 = "或，或許這樣反而比較好……"
80000129-14 = "唔……這種東西真的可以嗎……"
80000129-15 = "不過……如果是老師的話……"
80000129-20 = "[ns] 「你好，青葉。」"
80000129-22 = "哇，哇啊！老，老師！？"
80000129-23 = "您，您是從什麼時候……！？"
80000129-24 = "一，一直在沙發上……？"
80000129-25 = "原，原來躺在那裡啊……我完全沒注意到……"
80000129-26 = "唔，唔……那，那我就先，先告辭了……"
80000129-27 = "[s1] 「這麼快就要走了嗎？」\n[s2] 「嗯……？這是……」"
80000129-34 = "啊，啊啊……！！#n那，那是……"
80000129-38 = "那，那個，就是……"
80000129-39 = "因，因為平時受了老師很多照顧……！"
80000129-40 = "所，所以今天想向您表達謝意……！！"
80000129-41 = "可是，又擔心送這種東西到底好不好……"
80000129-42 = "要是能送自己做的……或者更能展現心意的就好了！#n本來想多花一點心思……做點手工製品之類的！"
80000129-43 = "可是我每天都要加班……下班之後店家也都關門了……結果就變成了這樣……"
80000129-44 = "對，對不起……只能送您這種隨處可見的廉價零食……"
80000129-45 = "[ns] 「我很開心哦，青葉。」"
80000129-48 = "咦！？"
80000129-49 = "這，這種東西也可以嗎……？"
80000129-50 = "[s3] 「這可是你花了很多心思準備的啊。」\n[s4] 「而且還特地跑來這裡。」"
80000129-53 = "……"
80000129-54 = "既，既然老師您這麼說的話……"
80000129-55 = "……"
80000129-56 = "謝謝您……"
80000129-57 = "[ns] 「這張紙條是……」"
80000129-58 = "啊，啊啊啊啊！！！"
80000129-59 = "那，那個！請等老師之後一，一個人的時候再看！！！"
80000129-60 = "現，現在不行！！！"
80000129-61 = "[s] 「我，我知道了……」"
80000129-62 = "呼，呼……"
80000129-69 = "那，那麼……既然事情都已經辦完……我，我就先回去了……"
80000129-70 = "下，下次再見，老師……！"
80000129-75 = "[ns] 「等一下，青葉！」"
80000129-79 = "怎，怎麼了嗎！？"
80000129-80 = "[s] 「難得過來一趟，要不要稍微休息一下再走？」"
80000129-81 = "咦……咦！？"
80000129-82 = "啊……雖，雖然我也沒有很忙……！"
80000129-83 = "可，可是！這樣真的好嗎……？"
80000129-84 = "「保持良好狀態也是工作的一部分」……？"
80000129-85 = "[s5] 「青葉，你看起來有點累。」\n[s6] 「正好這裡有舒適的沙發哦！」"
80000129-88 = "唔，唔唔……！"
80000129-89 = "確實，最近好像有點太勉強了……"
80000129-90 = "唔嗯……"
80000129-97 = "那，那我就……恭敬不如從命了……"
80000129-99 = "（就這樣讓青葉安心地休息到了很晚）"
80000129-100 = "謝，謝謝老師一直以來的關照……"
80000129-101 = "多虧了老師……"
80000129-102 = "感覺明天、後天都能繼續加油了。"
80000129-106 = "也許……就連之後也是……"
