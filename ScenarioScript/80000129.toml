80000129-43 = "But I work overtime every day... And the stores are closed when I get out... So..."
80000129-44 = "I-I'm sorry... I brought cheap snacks that you can get anywhere."
80000129-45 = "[ns] \"I'm so happy, Aoba.\""
80000129-48 = "What?!"
80000129-49 = "E-Even with something like this?"
80000129-50 = "[s3] \"You put a lot of thought and effort into this.\"\n[s4] \"And you came all the way out here.\""
80000129-53 = "..."
80000129-54 = "Th-Thank you..."
80000129-55 = "..."
80000129-56 = "...for saying that..."
80000129-57 = "[ns] \"Oh, a note...\""
80000129-58 = "Ah, aaaah!!"
80000129-59 = "N-N-No! Y-You should read that when y-you're alone later!!"
80000129-60 = "Not now! Put it away! Now!"
80000129-61 = "[s] \"G-Got it...!\""
80000129-62 = "*pant* *pant*"
80000129-69 = "W-Well then... That's all my business... I'll be h-heading out..."
80000129-70 = "I-I'll see you next time, Sensei...!"
80000129-75 = "[ns] \"Aoba, hold on!\""
80000129-79 = "Wh-What's wrong?"
80000129-80 = "[s] \"Since you're so rarely here, how about resting a little before you head back?\""
80000129-81 = "Eh... E-Eh?"
