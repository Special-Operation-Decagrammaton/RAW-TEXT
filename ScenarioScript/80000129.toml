80000129-27 = "[s1] \"You're heading out already?\"\n[s2] \"Hm? What's this?\""
80000129-34 = "A-Ah...! Th-That's..."
80000129-38 = "Um, that's, well..."
80000129-39 = "It's because you're always looking out for me...!"
80000129-40 = "A-And I wanted to say thanks for that! Today...!!"
80000129-41 = "I was wondering if you'd like it..."
