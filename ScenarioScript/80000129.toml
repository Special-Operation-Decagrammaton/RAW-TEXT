[translation]
80000129-1 = "I hate cheap chocolate"
80000129-7 = "......"
80000129-8 = "คุณครู... ไม่อยู่งั้นเหรอ..."
80000129-9 = "บะ... แบบนี้อาจจะโชคดีก็ได้..."
80000129-14 = "ฮืออ... ของแบบนี้มันจะไม่เป็นอะไรจริงๆ ใช่มั้ย..."
80000129-15 = "แต่ถึงยังไง... คุณครูก็..."
80000129-20 = "[ns] \"ว่าไง อาโอบะ\""
80000129-22 = "วะ... ว๊ากกก?! คะ... คุณครู?!"
80000129-23 = "มะ... มาตั้งแต่เมื่อไรคะ...?!"
80000129-24 = "ซะ... โซฟา...?"
80000129-25 = "นอนอยู่ตรงโซฟาสินะคะ... ฉันไม่ได้สังเกตเลยค่ะ..."
80000129-26 = "เอ่อ... คือว่าฉัน... ถ้างั้นฉัน... ขะ... ขอตัว... "
80000129-27 = "[s1] \"จะไปแล้วเหรอ?\"\n[s2] \"หืม...? นี่มัน...\""
80000129-34 = "อ๊ะ อ๊าย...!! นั่น... นั่นมัน..."
80000129-38 = "เอ่อ คือว่า... อันนั้นน่ะ..."
80000129-39 = "ทะ... ที่ผ่านมาฉันรบกวนคุณครูเอาไว้ตั้งหลายอย่างเลยค่ะ...!"
80000129-40 = "วะ... วันนี้ก็เลยอยากจะมาแสดงความขอบคุณ...!!"
80000129-41 = "แต่ว่าฉันไม่รู้ว่าของแบบนั้นจะดีพอรึเปล่า..."
80000129-42 = "พวกของโฮมเมดน่ะค่ะ! ฉันอยากเลือกให้อย่างพิถีพิถันมากกว่านี้แท้ๆ...!"
80000129-43 = "แต่ฉันต้องทำงานล่วงเวลาทุกวัน... พอเสร็จงาน ร้านค้าก็ปิดหมดแล้ว... เพราะงั้นก็เลย..."
80000129-44 = "ขะ... ขอโทษนะคะ... มันเป็นแค่ขนมราคาถูกที่มีขายอยู่ทั่วไปแท้ๆ..."
80000129-45 = "[ns] \"ครูดีใจมากเลยนะ อาโอบะ\""
80000129-48 = "คะ?!"
80000129-49 = "ถะ... ถึงจะเป็นแค่ของแบบนี้น่ะเหรอคะ...?"
80000129-50 = "[s3] \"ก็อาโอบะตั้งใจเตรียมให้อย่างดีเลยนี่นา\"\n[s4] \"ก็อาโอบะตั้งใจเอามาให้ครูเลยนี่นา\""
80000129-53 = "......"
80000129-54 = "ขะ... ขอบคุณที่..."
80000129-55 = "......"
80000129-56 = "พูดแบบนั้นนะคะ..."
80000129-57 = "[ns] \"จดหมายนี่...\""
80000129-58 = "อ๊ะ อ๊าาาาาา!!!"
80000129-59 = "จะ... จดหมายนั่น! เอาไว้ค่อยอ่านตอนอยู่คนเดียวนะคะ!!!"
80000129-60 = "หะ... ห้ามอ่านตอนนี้นะคะ!!!"
80000129-61 = "[s] \"ระ... รู้แล้ว...!\""
80000129-62 = "แฮ่ก... แฮ่ก..."
80000129-69 = "ถะ... ถ้างั้น... ตอนนี้ก็เสร็จธุระแล้ว... ฉะ... ฉันขอตัวกลับก่อนนะคะ..."
80000129-70 = "ละ... แล้วพบกันใหม่นะคะ คุณครู...!"
80000129-75 = "[ns] \"เดี๋ยวก่อนสิ อาโอบะ!\""
80000129-79 = "มะ... มีอะไรเหรอคะ?!"
80000129-80 = "[s] \"นานๆ จะมาที มานั่งพักก่อนแล้วค่อยกลับดีมั้ย?\""
80000129-81 = "คะ... คะ?"
80000129-82 = "อ่า... ฉะ... ฉันก็ไม่ได้มีงานยุ่งอะไรหรอกค่ะ...!"
80000129-83 = "ตะ... แต่ทำแบบนี้... ได้จริงๆ... เหรอคะ..."
80000129-84 = "'การดูแลสุขภาพร่างกายให้ดี เป็นคุณสมบัติที่ดีของคนทำงานเหมือนกัน' งั้นเหรอคะ...?"
80000129-85 = "[s5] \"ก็อาโอบะดูเหนื่อยๆ นี่นา\"\n[s6] \"ที่นี่มีโซฟานุ่มๆ นั่งสบายๆ ด้วยนะ!\""
80000129-88 = "อะ... อึก...!"
80000129-89 = "ช่วงนี้ฉันคงฝืนตัวเองเกินไปหน่อยจริงๆ..."
80000129-90 = "อืม..."
80000129-97 = "ถะ... ถ้างั้น... ขอเสียมารยาทหน่อยนะคะ..."
80000129-99 = "(คุณครูปล่อยให้อาโอบะพักผ่อนสบายๆ จนถึงดึก)"
80000129-100 = "ขะ... ขอบคุณที่ใส่ใจฉันเสมอเลยนะคะ..."
80000129-101 = "เพราะงั้น..."
80000129-102 = "ดูเหมือนว่าฉันจะมีแรงทำงานในวันพรุ่งนี้ และวันมะรืนนี้แล้วละค่ะ"
80000129-106 = "บางที... ในวันต่อๆ ไปด้วยค่ะ..."
