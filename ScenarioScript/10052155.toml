[translation]
10052155-7 = "มะ... มะมะ... มะมะมะมะ... ไม่นะ... แบบนี้ไม่ได้สิคะ...!"
10052155-8 = "ทำไมเป็นแบบนี้ล่ะ...? แล้วจากนี้... จากนี้เราต้องทำยังไง...? ขืนเป็นแบบนี้ต่อไปละก็ แผนการของพวกเราคง...!"
10052155-13 = "หืม...?"
10052155-15 = "สัญญาณนี้มัน?!"
10052155-20 = "ฉันไม่ได้มาช้าไปใช่มั้ยคะ? ตะ... ตอนนี้เราไม่เป็นไรแล้วค่ะ! ทุกอย่าง... จะไม่เป็นไรค่ะ!"
10052155-21 = "พี่มัลคูธพร้อมแล้วค่ะ!!!"
10052155-28 = "พี่มัลคูธ!!!!!"
10052155-29 = "ขอโทษนะคะ ไอน์ ซอฟ ออร์"
10052155-30 = "จากนี้ไปให้เป็นหน้าที่ของฉันเองค่ะ"
10052155-44 = "อ๊ายยยยยยย?!?!?!"
10052155-45 = "ยูสึ หนีออกมาก่อน!"
10052155-46 = "ยะ... ยะยะยะยะยะยะ... ยังไงเหรอคะ?!?!"
10052155-47 = "ฉันจะจัดการให้จากทางนี้เอง! บังคับดีดตัวฉุกเฉิน!"
10052155-49 = "อะ... เอ๋...?!"
10052155-54 = "ว้ายยยยยย?!"
10052155-61 = "หุ่นรบล้ำยุคนีโอถูกทำลายย่อยยับแล้ว! ยูสึล่ะ...!"
10052155-62 = "ไม่เป็นไร ยูสึหนีออกมาได้ทัน ร่มชูชีพก็กางออกอย่างปลอดภัยด้วย"
10052155-68 = "งือออออ..."
10052155-72 = "ยูสึ!"
10052155-73 = "ยูสึจัง!"
10052155-75 = "เป็นยังไงบ้างคะ ยูสึ?!"
10052155-81 = "ฮือออ..."
10052155-82 = "[s] \"ไม่เป็นไรแล้วนะ ยูสึ! ทำได้ดีแล้วละ เก่งมากๆ เลย!\"  "
10052155-86 = "คะ... คะ...?"
10052155-87 = "ยะ... อย่างนั้นสินะคะ โล่งอกไปทีนะคะที่ฉันช่วยคนอื่นได้ แหะๆๆ..."
10052155-91 = "ท่านริโอะ"
10052155-92 = "หะ... หืม? มีอะไรเหรอ โทคิ?"
10052155-93 = "ครั้งหน้าขอให้ฉันเป็นนักบินนะคะ ฉันอยากถูกลูบหัวและได้รับการปลอบโยนจากคุณครูแบบยูสึบ้างค่ะ"
10052155-94 = "อะ... อ่อ...?"
10052155-96 = "เอาละๆ พวกเรามีงานอื่นที่ต้องไปทำนะ โทคิ..."
10052155-102 = "พี่มัลคูธ..."
10052155-103 = "พี่มัลคูธ... ขอโทษนะ"
10052155-104 = "พวกฉันไม่เก่งพอ ก็เลย..."
10052155-106 = "ไม่เป็นไรค่ะ ไอน์ ซอฟ ออร์"
10052155-107 = "ยามที่น้องๆ เผชิญกับช่วงเวลาที่ยากลำบาก ฉันในฐานะพี่สาวก็ต้องเข้ามาช่วยเหลือค่ะ"
10052155-108 = "แต่ทางนั้นดูท่าจะไม่ใช่คู่ต่อสู้ที่รับมือกันได้ง่ายๆ เลยนะคะ ถึงแม้เราจะฟื้นคืนชีพผู้เลื่อมใสกลับมา#nอีกครั้งได้ก็เถอะ"
10052155-109 = "แต่ถ้าจะทำแบบนั้น ดูเหมือนเราต้องข้ามศพพวกนั้นไปก่อนนะคะ"
10052155-111 = "ค่ะ ใช่ค่ะ! พี่มัลคูธ! แน่นอนค่ะ!"
10052155-112 = "ถึงตอนนี้จะไม่ใช่เวลาที่พี่มัลคูธจะออกโรง... ไม่สิ ที่จริงฉันหวังว่าพี่มัลคูธจะไม่ต้องออกโรงด้วยซ้ำ..."
10052155-113 = "ไม่เป็นไรค่ะ เรายังย้อนกลับไปได้อยู่ค่ะ เรายัง... เรายัง...!"
10052155-115 = "สวัสดีค่ะ ทุกคน"
10052155-116 = "แล้วก็ขอสวัสดีอีกครั้งนะคะ ท่านธิดา แล้วก็กุญแจ"
10052155-117 = "นี่น่าจะเป็นครั้งแรกที่ฉันได้ทักทายอย่างเป็นทางการ ถ้างั้นฉันจะขอใช้โอกาสนี้แนะนำตัวอีกครั้ง"
10052155-118 = "ฉันคือเจตนารมณ์ที่ถูกสร้างขึ้นภายใต้จุดยืน ผู้แสวงบุญแห่งอาณาจักรที่เดินทางมาถึงที่สุดของโลก ชื่อว่ามัลคูธค่ะ"
10052155-119 = "ฉะ... ฉันเทนโด อาริสึค่ะ..."
10052155-120 = "ฉันเคย์ค่ะ... เรียกแบบนี้เถอะค่ะ"
10052155-121 = "...!"
10052155-122 = "ชื่อเต็มๆ ก็คือ! เทนโด เคย์ค่ะ!"
10052155-123 = "คะ?!?!"
10052155-125 = "...?"
10052155-127 = "ก็เคย์เป็นครอบครัวของอาริสึนี่คะ! อาริสึได้ยินมาว่าครอบครัวเดียวกันจะใช้นามสกุลเดียวกันค่ะ!"
10052155-128 = "ระ... เรื่องนั้น...! จะว่าอย่างนั้นก็ได้ค่ะ แต่ว่า...!"
10052155-129 = "ทำไมล่ะคะ เคย์? หรือว่า... สิ่งที่อาริสึรู้มามันผิดเหรอคะ?"
10052155-130 = "ปะ... เปล่านะคะ! ไม่ใช่อย่างนั้น... "
10052155-131 = "ฉะ... ฉันแค่... ไม่รู้ว่าตัวเองใช้ชื่อนั้นได้หรือเปล่า..."
10052155-132 = "เทนโด... เทนโด เคย์..."
10052155-133 = "แหะ... แหะๆ..."
10052155-138 = "..."
10052155-139 = "สุดท้ายก็เลือกชื่อนี้สินะคะ"
10052155-140 = "อาริสึ แล้วก็เคย์"
10052155-141 = "อะ... อะแฮ่ม"
10052155-142 = "ใช่ค่ะ แล้วมีปัญหาตรงไหนเหรอคะ?"
10052155-143 = "ไม่มีหรอกค่ะ เจตจำนงเสรีจะนำทางเราเสมอค่ะ"
10052155-144 = "ถึงมันจะเป็นเพียงภาพลวงตาที่ซับซ้อนก็ตามทีค่ะ"
10052155-146 = "ตะ... ตราบใดที่ที่นี่ยังมีพี่มัลคูธ... กับ[ruby=JEHOVAH]เยโฮวาห์[/ruby]ที่สร้างขึ้นจากคอร์ของเน็ตซาชจัง..."
10052155-147 = "และ[ruby=TZEVAOT]ซาบาโอท[/ruby] ณ ดินแดนสูงสุด!"
10052155-148 = "รวมถึงสถานที่ศักดิ์สิทธิ์ และดินแดนแห่งโซฮาร์!"
10052155-150 = "ใช่ค่ะ ไอน์ ซอฟ ออร์"
10052155-151 = "ตราบใดที่มีทั้งหมดนั่นเหลืออยู่ เราก็เริ่มทุกอย่างใหม่ได้ทุกเมื่อค่ะ"
10052155-152 = "และเราก็สร้างทุกอย่างใหม่ได้ทุกเวลาด้วยค่ะ"
10052155-153 = "เพราะงั้นจากนี้ไป พี่สาวอย่างฉันจะขอออกหน้าเองค่ะ"
10052155-157 = "ไอน์ ซอฟ แล้วก็ออร์ไปหาที่หลบเถอะค่ะ"
10052155-159 = "ค่ะ!!!"
