[translation]
10052155-7 = "啊，啊啊。啊啊啊啊……#n不行……這樣下去不行啊……！"
10052155-8 = "為什麼……？現在……現在該怎麼辦……？#n這樣下去計畫會……！"
10052155-13 = "咦……？"
10052155-15 = "難道，這個信號是！？"
10052155-20 = "我，我沒有來晚吧？現，現在沒事了！#n大家……都會沒事的！"
10052155-21 = "姐姐大人，一切都準備好了！！！"
10052155-28 = "姐姐大人！！！！！"
10052155-29 = "抱歉。Ain、Soph、Aur。"
10052155-30 = "接下來就交給我吧。"
10052155-44 = "呀啊啊啊啊啊啊啊啊！？！？！？"
10052155-45 = "柚子，快逃出來！"
10052155-46 = "要，要要要要要要，要怎麼逃啊！？！？"
10052155-47 = "交給我來處理！啟動強制彈射！"
10052155-49 = "咦，咦咦……！？"
10052155-54 = "呀啊啊啊啊啊──！？"
10052155-61 = "NEO前衛君全毀！柚子……！"
10052155-62 = "他沒事，已經成功逃出來了。#n降落傘也有順利展開。"
10052155-68 = "嗚嗚嗚嗚嗚……"
10052155-72 = "柚子！"
10052155-73 = "柚子醬！"
10052155-75 = "你還好嗎，柚子！？"
10052155-81 = "嗚嗚嗚……"
10052155-82 = "[s] 「已經沒事了，柚子！你真的做得很棒！」"
10052155-86 = "咦，咦……？"
10052155-87 = "這，這樣啊。#n能幫上大家的忙，真是太好了。嘿嘿……"
10052155-91 = "莉央大人。"
10052155-92 = "嗯？怎麼了嗎，季？"
10052155-93 = "下次請選我擔任駕駛員吧。#n這樣我就能跟柚子一樣，得到老師的撫摸和安慰了。"
10052155-94 = "咦，咦咦……？"
10052155-96 = "好好好。我們還有我們該做的事哦，季。"
10052155-102 = "姐姐大人……"
10052155-103 = "姐姐大人……對不起。"
10052155-104 = "都怪我們……做的不夠好……"
10052155-106 = "沒關係。Ain、Soph、Aur。"
10052155-107 = "妹妹們辛苦的時候，當姐姐的我就應該站出來。"
10052155-108 = "不過，他們看起來不是容易對付的對手呢。#n要是預言者們能夠重新啟動就好了。"
10052155-109 = "為了達成那個目的，似乎得先跨過他們才行。"
10052155-111 = "是，是的！姐姐大人！"
10052155-112 = "姐姐大人出場的時間，本來不該是現在的……#n不對，我們其實希望姐姐大人根本不需要出場……"
10052155-113 = "沒關係，還有辦法挽回。#n現在還來得及……所以……！"
10052155-115 = "初次見面，各位。"
10052155-116 = "再次向你們問好。王女，還有鑰匙。"
10052155-117 = "這應該是第一次正式向你們打招呼，所以請容我再做一次正式的自我介紹。"
10052155-118 = "我是在旗幟下被創造的一個意志，以及到達世界盡頭的王國巡禮者──馬爾庫特。"
10052155-119 = "我，我是天童愛麗絲……"
10052155-120 = "……我是Kei。#n這樣稱呼我就行了。畢竟也就只有這樣而已。"
10052155-121 = "……！"
10052155-122 = "對了！是天童Kei！"
10052155-123 = "什麼！？！？"
10052155-125 = "……？"
10052155-127 = "因為Kei是家人！愛麗絲聽說家人都會用同樣的姓氏！"
10052155-128 = "那，那個……！話是這麼說沒錯啦……！"
10052155-129 = "怎麼了，Kei？難道……愛麗絲搞錯了嗎？"
10052155-130 = "不，不是那樣的……"
10052155-131 = "我，我只是在想……這樣真的可以嗎……"
10052155-132 = "天童……天童，Kei……"
10052155-133 = "耶，耶嘿嘿……"
10052155-138 = "……"
10052155-139 = "最終還是選擇了那個名字呢。"
10052155-140 = "愛麗絲，還有Kei。"
10052155-141 = "咳，咳哼。"
10052155-142 = "是又怎樣。你有什麼不滿嗎？"
10052155-143 = "沒有。自由意志總是引導著我們。"
10052155-144 = "即使那只不過是高度化的錯覺而已。"
10052155-146 = "跟，跟姐姐大人……還有這裡，用涅察赫醬的核心製作的[ruby=JEHOVAH]耶和華[/ruby]……"
10052155-147 = "至高之處的[ruby=TZEVAOT]澤巴奧特[/ruby]！然後……"
10052155-148 = "只要聖地，以及佐哈爾的根基還在！"
10052155-150 = "是的。Ain、Soph、Aur。"
10052155-151 = "我們隨時可以讓一切重新開始。"
10052155-152 = "並且，隨時可以重新創造一切。"
10052155-153 = "所以，這裡就由當姐姐的我出面吧。"
10052155-157 = "請Ain、Soph和Aur暫時先躲起來。"
10052155-159 = "是！！！"
