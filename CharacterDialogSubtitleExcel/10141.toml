[translation]
10141-CVGroup_UITitle_Idle1-1 = "블루…… 아카이……브."
10141-CVGroup_CharacterGet_Idle1-1 = "뭔가 부끄러운 복장이지만……\n자, 잘 부탁드립니다……. "
10141-CVGroup_Cafe_Idle1-1 = "(이 옷…… 다들\n유난 떤다고\n생각하지는\n않을까요……?) "
10141-CVGroup_Cafe_Idle2-1 = "어디, \n가장 구석진\n자리가……. "
10141-CVGroup_Cafe_Idle3-1 = "커피 향이 좋네요……\n헤헤."
10141-CVGroup_Cafe_Idle4-1 = "이런 곳까지……\n적들이 쫓아오지는\n않겠죠?"
10141-CVGroup_Cafe_Idle5-1 = "기념품으로\n사가면……\n부, 분명 다들\n좋아하시겠죠?"
10141-CVGroup_WeaponGet_Idle1-1 = "제가 이런 걸 받을 자격이……\n아, 아뇨……\n선생님이 결정하신 것입니다. 감사합니다!"
10141-CVGroup_UIEventLobby_Enter1-1 = "어, 언제든 가능합니다!"
10141-CVGroup_UIEventLobby_Enter1-2 = "무, 무엇이든\n말씀해 주세요……!"
10141-CVGroup_UIEventLobby_Enter2-1 = "가, 감사합니다……!"
10141-CVGroup_UIEventLobby_Enter2-2 = "그, 그러니까,\n와 주신…… 거요."
10141-CVGroup_UIEventLobby_Idle1-1 = "죄송합니다! 죄송합니다!\n제, 제 탓, 이겠지요……?"
10141-CVGroup_UIEventLobby_Idle2-1 = "폭탄…… 탄환……\n필요하시면\n말씀 주세요……! "
10141-CVGroup_UIEventLobby_Idle3-1 = "어쩐지 큰 소동이\n벌어지고 있네요……."
10141-CVGroup_UIEventLobby_Idle3-2 = "……어쩐지 즐겁다면 저,\n이상한 걸까요? "
10141-CVGroup_UIEventLobby_Idle4-1 = "갑자기 궁금한 건데……\n오페라는……"
10141-CVGroup_UIEventLobby_Idle4-2 = "무슨 내용이었을까요?"
