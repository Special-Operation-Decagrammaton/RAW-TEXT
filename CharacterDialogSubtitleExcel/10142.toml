[translation]
10142-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브."
10142-CVGroup_CharacterGet_Idle1-1 = "시원한 바다에서, 모두와 잊지 못할 추억을 만들고 싶어.\n물론 선생님도 함께야. 같이 해줄 거지?"
10142-CVGroup_Cafe_Idle1-1 = "어디가 가장\n시원할까?"
10142-CVGroup_Cafe_Idle2-1 = "단합대회…… 기대돼."
10142-CVGroup_Cafe_Idle3-1 = "부장다운 모습……\n보여주고 싶어."
10142-CVGroup_Cafe_Idle4-1 = "눈에 띄는 건\n곤란한데……."
10142-CVGroup_Cafe_Idle5-1 = "오늘의 추억을,\n잊지 말자."
10142-CVGroup_WeaponGet_Idle1-1 = "나는 아직 부족한 것투성이.\n그럼에도, 이 백련을 쥐려고 해.\n그건…… 백화요란의 부장을 연기하려는 것이 아니야.\n스스로의 마음과 마주하기 위해서야."
10142-CVGroup_UIEventLobby_Enter1-1 = "선생님, 우리들의 활약을\n지켜봐 줄래?"
10142-CVGroup_UIEventLobby_Enter2-1 = "후후, 내 오른손의 힘을\n모두에게 보여줄게."
10142-CVGroup_UIEventLobby_Enter3-1 = "아직 여유 있어.\n마음을 가다듬고 가자."
10142-CVGroup_UIEventLobby_Enter4-1 = "마지막 스퍼트를 낼 때네."
10142-CVGroup_UIEventLobby_Enter4-2 = "모두, 힘을 내줘."
10142-CVGroup_UIEventLobby_Enter5-1 = "선생님,\n마지막까지 고마워."
10142-CVGroup_UIEventLobby_Enter5-2 = "다음에도 같이 즐기자."
10142-CVGroup_UIEventLobby_Idle1-1 = "축제의 열기 때문일까?"
10142-CVGroup_UIEventLobby_Idle1-2 = "마음이 달아오르는\n것이 느껴져."
10142-CVGroup_UIEventLobby_Idle2-1 = "햇볕이 강하니……\n자외선 대책을\n제대로 세워야 해."
10142-CVGroup_UIEventLobby_Idle2-2 = "피부가 타는 건 화상이래."
10142-CVGroup_UIEventLobby_Idle3-1 = "내가……\n신경 쓰이는 거야?"
10142-CVGroup_UIEventLobby_Idle3-2 = "미안해.\n눈에 잘 띄는 모습이라서."
10142-CVGroup_UIEventLobby_Idle4-1 = "축제에서 먹는\n닭꼬치는 각별해."
10142-CVGroup_UIEventLobby_Idle4-2 = "선생님도\n그렇게 생각하지?"
