[translation]
10110-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10110-CVGroup_CharacterGet_Idle1-1 = "It's been a while. I've been waiting for you, Sensei."
10110-CVGroup_Cafe_Idle1-1 = "This is certainly a well-organized place."
10110-CVGroup_Cafe_Idle2-1 = "This interior is...cute."
10110-CVGroup_Cafe_Idle3-1 = "Compared to my room...well, I suppose this is the norm."
10110-CVGroup_Cafe_Idle4-1 = "Do you always bring people here?"
10110-CVGroup_Cafe_Idle5-1 = "It's an interesting place. I'll have to visit more often."
10110-CVGroup_WeaponGet_Idle1-1 = "Sensei, to me...? My apologies, I'm...at a loss for what to do next. I can't predict any of it. Fufu, this is interesting."
10110-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei."
10110-CVGroup_UIEventLobby_Enter1-2 = "You look busy."
10110-CVGroup_UIEventLobby_Enter2-1 = "Oh, Sensei."
10110-CVGroup_UIEventLobby_Enter2-2 = "You got here just in time."
10110-CVGroup_UIEventLobby_Enter3-1 = "Our progress is..."
10110-CVGroup_UIEventLobby_Enter3-2 = "N-Never mind."
10110-CVGroup_UIEventLobby_Enter4-1 = "It's almost over."
10110-CVGroup_UIEventLobby_Enter4-2 = "...I'll tell you later."
10110-CVGroup_UIEventLobby_Enter5-1 = "So many things have happened."
10110-CVGroup_UIEventLobby_Enter5-2 = "Thank you for your help."
10110-CVGroup_UIEventLobby_Idle1-1 = "Did you call me?"
10110-CVGroup_UIEventLobby_Idle1-2 = "Did something happen?"
10110-CVGroup_UIEventLobby_Idle2-1 = "I'm not going anywhere."
10110-CVGroup_UIEventLobby_Idle3-1 = "It's fun doing something like this every once in a while."
10110-CVGroup_UIEventLobby_Idle3-2 = "Maybe it's because I'm away from Trinity?"
10110-CVGroup_UIEventLobby_Idle4-1 = "That tickles..."
10110-CVGroup_UIEventLobby_Idle4-2 = "But I don't hate it."
10110-CVGroup_UIEventShop_Enter1-1 = "I prepared some things."
10110-CVGroup_UIEventShop_Enter1-2 = "Please take a look around."
10110-CVGroup_UIEventShop_Enter2-1 = "Is there anything you need?"
10110-CVGroup_UIEventShop_Enter2-2 = "Let me know anytime."
10110-CVGroup_UIEventShop_Enter3-1 = "Just to be safe..."
10110-CVGroup_UIEventShop_Enter3-2 = "...try searching one more time. Sensei."
10110-CVGroup_UIEventShop_Idle1-1 = "...Me?"
10110-CVGroup_UIEventShop_Idle1-2 = "Heehee, I'm not for sale."
10110-CVGroup_UIEventShop_Idle2-1 = "That's funny."
10110-CVGroup_UIEventShop_Idle2-2 = "Is it my turn to poke you now?"
10110-CVGroup_UIEventShop_Buy1-1 = "That's good."
10110-CVGroup_UIEventShop_Buy2-1 = "Not a bad choice."
10110-CVGroup_UIEventShop_Buy3-1 = "Ah, so that's what you needed."
10110-CVGroup_UIEventShop_Buy4-1 = "Yes. Here you go."
10110-CVGroup_UIEventFieldMission_Enter1-1 = "Please check it over carefully."
10110-CVGroup_UIEventFieldMission_Enter2-1 = "I thought I'd see you here, Sensei."
10110-CVGroup_UIEventFieldMission_Enter2-2 = "Heehee, call it a hunch."
10110-CVGroup_UIEventFieldMission_Idle1-1 = "...Please don't make me rethink my opinion of you."
10110-CVGroup_UIEventFieldMission_Idle2-1 = "...Heehee, you're the same as always, Sensei."
10110-CVGroup_UIEventFieldMission_Buy1-1 = "Good work."
10110-CVGroup_UIEventFieldMission_Buy2-1 = "Great."
10110-CVGroup_UIEventFieldMission_Interaction1-1 = "That ended quickly."
