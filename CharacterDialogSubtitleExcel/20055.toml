[translation]
20055-CVGroup_UITitle_Idle1-1 = "蔚藍……呼……！檔案！"
20055-CVGroup_CharacterGet_Idle1-1 = "千年科學學園……遊戲開發部的花岡柚子……\n雖，雖然是這副打扮……還請，多多指教……"
20055-CVGroup_Cafe_Idle1-1 = "（和平的日常……現在已經非常了解它的珍貴了）"
20055-CVGroup_Cafe_Idle2-1 = "沙發……不會突然發射吧……？"
20055-CVGroup_Cafe_Idle3-1 = "暖暖又香香的……真不錯呢。耶嘿嘿。"
20055-CVGroup_Cafe_Idle4-1 = "櫃子……暫時不想進去了……嗚嗚。"
