[translation]
20055-CVGroup_UITitle_Idle1-1 = "블루…… 후우…… 아카이브……!"
20055-CVGroup_CharacterGet_Idle1-1 = "하나오카 유즈, 입니다……. 이, 이런 모습이지만, 잘 부탁드려요……."
20055-CVGroup_Cafe_Idle1-1 = "(평온한 일상…… 그 소중함을 이젠 알 것 같아요.)"
20055-CVGroup_Cafe_Idle2-1 = "소파가 사출되거나 하지는 않겠죠……?"
20055-CVGroup_Cafe_Idle3-1 = "따뜻하고 향긋하고 ……좋네요, 헤헤."
20055-CVGroup_Cafe_Idle4-1 = "캐비닛……으우, 당분간은 들어가고 싶지 않아요……."
20055-CVGroup_Cafe_Idle5-1 = "역시 이 복장, 너무 튀는 거 아닐까요…… 후으으……."
20055-CVGroup_WeaponGet_Idle1-1 = "연습은 실전처럼, 실전은 게임처럼……! 저, 최선을 다할게요……!"
20055-CVGroup_UICarrierLobby_Enter1-1 = "숨을 수 있는 장소는…… 없는 걸까……"
20055-CVGroup_UICarrierLobby_Enter2-1 = "여기에도 게임기가 있구나……"
20055-CVGroup_UICarrierLobby_Enter3-1 = "이제…… 강하는…… 싫어요……"
20055-CVGroup_UICarrierLobby_Enter4-1 = "선생님은 이런 적과 싸워 오셨던 거네요……"
20055-CVGroup_UICarrierLobby_Enter5-1 = "리오 회장도 히마리 선배도…… 역시, 대단하네요……"
20055-CVGroup_UICarrierLobby_Idle1-1 = "역시 캐비닛 밖은 위험해……"
20055-CVGroup_UICarrierLobby_Idle2-1 = "(어떤 게임이 설치되어 있을까……)"
20055-CVGroup_UICarrierLobby_Idle3-1 = "선생님…… 곁에 계셔 주실 거죠……?"
20055-CVGroup_UICarrierLobby_Idle4-1 = "왠지 선생님과 함께 있으면, 무섭지 않아요. 에헤헤……"
20055-CVGroup_UICarrierLobby_Idle5-1 = "여러모로, 배우고 있는데……"
20055-CVGroup_UICarrierLobby_Idle5-2 = "알 것 같기도, 아닌 것 같기도……"
20055-CVGroup_UIEventShop_Enter1-1 = "어, 어서 오세요. 선생님……."
20055-CVGroup_UIEventShop_Enter2-1 = "상점 같은 곳…… 이라지만, 조금 조촐하죠……?"
20055-CVGroup_UIEventShop_Idle1-1 = "우우……뭔가, 무서워요…… 우우우……."
20055-CVGroup_UIEventShop_Idle1-2 = "선생님…… 저 잊어버리시는 거, 아니죠……?"
20055-CVGroup_UIEventShop_Idle2-1 = "제가 할 수 있는 일을, 하려고 하는데……"
20055-CVGroup_UIEventShop_Idle2-2 = "다들, 저보다 너무 대단한 분들이어서……."
20055-CVGroup_UIEventShop_Buy1-1 = "아, 네……! 그거, 말씀이시군요……!"
20055-CVGroup_UIEventShop_Buy2-1 = "점원 같은 말…… 점원 같은 말……."
20055-CVGroup_UIEventShop_Buy2-2 = "항상 감사합니다!"
20055-CVGroup_UIEventShop_Buy3-1 = "여, 여기 있어요……."
20055-CVGroup_UIEventShop_Buy4-1 = "부, 부디 이 물건이……"
20055-CVGroup_UIEventShop_Buy4-2 = "모두의…… 도움이 되기를……."
20055-CVGroup_UIEventMission_Enter1-1 = "괜찮아요…… 저는, 괜찮으니까요……!"
20055-CVGroup_UIEventMission_Enter2-1 = "도망치면 안 돼…… 도망치면 안 돼……"
20055-CVGroup_UIEventMission_Enter2-2 = "도망치면 안 돼……!"
20055-CVGroup_UIEventMission_Idle1-1 = "어떤 경우에도, 미션은…… 중요, 하니까요……."
20055-CVGroup_UIEventMission_Idle2-1 = "왜…… 이런 일이……."
20055-CVGroup_UIEventMission_Idle3-1 = "조금 더, 대화를 나눌 수 있었으면…… 좋았을, 텐데……."
20055-CVGroup_UIEventMission_Idle4-1 = "제가 도울 수 있는 일이 있다면……"
20055-CVGroup_UIEventMission_Idle4-2 = "언제든, 말씀해 주세요……!"
20055-CVGroup_UIEventMission_Buy1-1 = "게임 시스템이라면, 이렇게 말하겠죠."
20055-CVGroup_UIEventMission_Buy1-2 = "미션 클리어!"
20055-CVGroup_UIEventMission_Buy1-3 = "에헤헤…… 이렇게 말하니까,"
20055-CVGroup_UIEventMission_Buy1-4 = "조금 긴장이 풀린 것 같아요."
20055-CVGroup_UIEventMission_Buy2-1 = "선생님은…… 무섭지 않으신가요?"
20055-CVGroup_UIEventMission_Buy2-2 = "……"
20055-CVGroup_UIEventMission_Buy2-3 = "저는, 선생님이 계시니까,"
20055-CVGroup_UIEventMission_Buy2-4 = "조금 더 힘내 볼래요."
20055-CVGroup_UIEventMission_Interaction1-1 = "수고, 많으셨습니다. 역시 선생님이세요……."
