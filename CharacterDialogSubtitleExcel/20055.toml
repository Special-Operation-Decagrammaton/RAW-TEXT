[translation]
20055-CVGroup_UITitle_Idle1-1 = "Blue... Phew... Archive...!"
20055-CVGroup_CharacterGet_Idle1-1 = "Hanaoka Yuzu here... E-Even though I look like this right now, please take care of me..."
20055-CVGroup_Cafe_Idle1-1 = "(I think I now know...how precious peaceful everyday life is.)"
20055-CVGroup_Cafe_Idle2-1 = "The sofa isn't going to suddenly deploy or anything, right...?"
20055-CVGroup_Cafe_Idle3-1 = "It's warm, it smells good... It's nice, heehee."
20055-CVGroup_Cafe_Idle4-1 = "A cabinet... Ugh, I don't want to go in one of those for a while..."
20055-CVGroup_Cafe_Idle5-1 = "I knew it. This outfit stands out too much... Augh..."
20055-CVGroup_WeaponGet_Idle1-1 = "Practice like it's real, treat it like it's a game...! I'll do my best...!"
20055-CVGroup_UICarrierLobby_Enter1-1 = "Is there anywhere...I can hide...?"
20055-CVGroup_UICarrierLobby_Enter2-1 = "There's an arcade machine here too..."
20055-CVGroup_UICarrierLobby_Enter3-1 = "I'm...sick of...descending..."
20055-CVGroup_UICarrierLobby_Enter4-1 = "So this is what Sensei's been fighting against, all this time..."
20055-CVGroup_UICarrierLobby_Enter5-1 = "President Rio and Himari... They're both incredible..."
20055-CVGroup_UICarrierLobby_Idle1-1 = "It's dangerous outside the cabinet..."
20055-CVGroup_UICarrierLobby_Idle2-1 = "(I wonder what games it has...)"
20055-CVGroup_UICarrierLobby_Idle3-1 = "Sensei... You'll fight by my side, right...?"
20055-CVGroup_UICarrierLobby_Idle4-1 = "For some reason, I'm not afraid when I'm with Sensei. Eheehee..."
20055-CVGroup_UICarrierLobby_Idle5-1 = "I'm learning a lot..."
20055-CVGroup_UICarrierLobby_Idle5-2 = "I feel like I understand, or maybe I don't..."
20055-CVGroup_UIEventShop_Enter1-1 = "W-Welcome, Sensei..."
20055-CVGroup_UIEventShop_Enter2-1 = "It's supposed to be...something like a shop, but it's a bit small, isn't it...?"
20055-CVGroup_UIEventShop_Idle1-1 = "Ugh... It's a bit scary... Auuugh..."
20055-CVGroup_UIEventShop_Idle1-2 = "Sensei... You're not going to forget about me, right...?"
20055-CVGroup_UIEventShop_Idle2-1 = "I'm trying to do what I can..."
20055-CVGroup_UIEventShop_Idle2-2 = "But everyone's so much more impressive than I am..."
20055-CVGroup_UIEventShop_Buy1-1 = "Ah... yes...! That one, you mean...!"
20055-CVGroup_UIEventShop_Buy2-1 = "Talk like a clerk... Talk like a clerk..."
20055-CVGroup_UIEventShop_Buy2-2 = "Thank you as always!"
20055-CVGroup_UIEventShop_Buy3-1 = "H-Here you go..."
20055-CVGroup_UIEventShop_Buy4-1 = "I-I hope this item..."
20055-CVGroup_UIEventShop_Buy4-2 = "...can help...everyone..."
20055-CVGroup_UIEventMission_Enter1-1 = "It's okay... I'm okay...!"
20055-CVGroup_UIEventMission_Enter2-1 = "I mustn't run away... I mustn't run away..."
20055-CVGroup_UIEventMission_Enter2-2 = "I mustn't run away...!"
20055-CVGroup_UIEventMission_Idle1-1 = "In any situation, the mission...is important..."
20055-CVGroup_UIEventMission_Idle2-1 = "Why...did this happen..."
20055-CVGroup_UIEventMission_Idle3-1 = "If only we could've talked a little more... That would've been nice..."
20055-CVGroup_UIEventMission_Idle4-1 = "If there's anything I can do to help..."
20055-CVGroup_UIEventMission_Idle4-2 = "Let me know anytime...!"
20055-CVGroup_UIEventMission_Buy1-1 = "Sounds like game system text."
20055-CVGroup_UIEventMission_Buy1-2 = "Mission Clear!"
20055-CVGroup_UIEventMission_Buy1-3 = "Heehee... Saying that..."
20055-CVGroup_UIEventMission_Buy1-4 = "...helped with my nerves a little."
20055-CVGroup_UIEventMission_Buy2-1 = "Sensei... Aren't you scared?"
20055-CVGroup_UIEventMission_Buy2-2 = "..."
20055-CVGroup_UIEventMission_Buy2-3 = "For me, since you're here..."
20055-CVGroup_UIEventMission_Buy2-4 = "It makes me want to try a little harder."
20055-CVGroup_UIEventMission_Interaction1-1 = "Good work. As expected of you..."
