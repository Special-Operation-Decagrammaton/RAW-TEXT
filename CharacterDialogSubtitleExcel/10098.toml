[translation]
10098-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10098-CVGroup_CharacterGet_Idle1-1 = "อ่า~ เรื่องลุกลามไปใหญ่โตซะแล้ว~\nลุงคนนี้คงต้องออกโรงแล้วละ"
10098-CVGroup_Cafe_Idle1-1 = "(วัตถุกำบัง... พร้อม\nทางเข้าออก... ตรวจเรียบร้อย)"
10098-CVGroup_Cafe_Idle2-1 = "ก่อนอื่นเริ่มจากตรวจสอบระเบิดก่อนดีมั้ยนะ"
10098-CVGroup_Cafe_Idle3-1 = "แหะๆ... ไม่ค่อยสบายใจเลยแฮะ\nเวลาแบบนี้คิดถึงคุณครูจัง..."
10098-CVGroup_Cafe_Idle4-1 = "ผมทรงนี้ก็สบายดีอยู่หรอก...\nแต่ไม่ดูแปลกตาเกินไปใช่มั้ยนะ?"
10098-CVGroup_Cafe_Idle5-1 = "วันนี้ฉันไม่รู้สึกอยากนอนกลางวันเลย"
10098-CVGroup_WeaponGet_Idle1-1 = "ถ้าต้องการความแข็งแกร่งของลุงคนนี้ก็บอกได้ตลอดเลยนะ\nเพราะครูสำคัญที่สุดเสมอๆ ยังไงล่ะ"
