[translation]
10138-CVGroup_UITitle_Idle1-1 = "흥, 블루 아카이브!"
10138-CVGroup_CharacterGet_Idle1-1 = "와일드헌트 예술학원의 키누이 레나야. 두고 보라고.\n오컬트 따위, 전부 사이비라는 걸 증명해 낼 테니까!"
10138-CVGroup_Cafe_Idle1-1 = "저 사람한텐 어떤 옷이 어울릴까?"
10138-CVGroup_Cafe_Idle2-1 = "여기라면 이상한 일은 일어나지 않겠지……? 아무래도……."
10138-CVGroup_Cafe_Idle3-1 = "이 배치…… 선생님도 나름 센스가 있네."
10138-CVGroup_Cafe_Idle4-1 = "저 디자인은 오컬트지……? 선생님도 영향을 받은걸까."
10138-CVGroup_Cafe_Idle5-1 = "저, 저쪽에서 뭔가 이상한 소리가 들렸는데……."
10138-CVGroup_WeaponGet_Idle1-1 = "작다고 바보 취급하면 큰코다칠 거야. 이렇게 보여도, 총은 잘 다룬다고!\n쏜 자국으로 그림을 그릴 수 있을 정도…… 진짜라구?!"
10138-CVGroup_UIEventLobby_Enter1-1 = "선생님, 이쪽."
10138-CVGroup_UIEventLobby_Enter1-2 = "같이 이곳의 엉터리 소문을 파헤쳐 보자고."
10138-CVGroup_UIEventLobby_Enter2-1 = "선배들이 부적을 줬는데 어디에 뒀더라……"
10138-CVGroup_UIEventLobby_Enter2-2 = "이, 일단 받은 거니까 찾는 것뿐이야!"
10138-CVGroup_UIEventLobby_Enter3-1 = "나, 나는 끝까지 포기하지 않아!"
10138-CVGroup_UIEventLobby_Enter3-2 = "다 거짓말이라고 증명 할 거야!"
10138-CVGroup_UIEventLobby_Enter4-1 = "샤아악! 사기꾼! 엉터리! 덤비라고!"
10138-CVGroup_UIEventLobby_Enter4-2 = "오늘 밤 안에 다 해치워 주겠어!"
10138-CVGroup_UIEventLobby_Enter5-1 = "수상한 일이 잔뜩 있었지만……."
10138-CVGroup_UIEventLobby_Enter5-2 = "뭐, 즐거웠으니까 됐어."
10138-CVGroup_UIEventLobby_Idle1-1 = "흥, 어차피 다 사기니까!"
10138-CVGroup_UIEventLobby_Idle1-2 = "……아, 아마도."
10138-CVGroup_UIEventLobby_Idle2-1 = "가, 갑자기 으스스한데……."
10138-CVGroup_UIEventLobby_Idle2-2 = "바, 바람 때문이지……? 그치?"
10138-CVGroup_UIEventLobby_Idle3-1 = "하아, 무슨 츠치노코야."
10138-CVGroup_UIEventLobby_Idle3-2 = "도마뱀을 잘못 본 거겠지!"
10138-CVGroup_UIEventLobby_Idle4-1 = "히, 히이익?!"
10138-CVGroup_UIEventLobby_Idle4-2 = "……뭐야, 선생님이네. 아니, 갑자기 찌르지 말라구!"
10138-CVGroup_UIEventShop_Enter1-1 = "수, 수상한 물건이 산처럼……."
10138-CVGroup_UIEventShop_Enter1-2 = "쓸만한 물건이 있을지도. 일단 볼래?"
10138-CVGroup_UIEventShop_Enter2-1 = "선생님, 이게 뭔지 알아?"
10138-CVGroup_UIEventShop_Enter2-2 = "뭔가 물건들이 다양하게 있어."
10138-CVGroup_UIEventShop_Enter3-1 = "뭐, 돌아보면…… 좋은 추억일지도. 후후."
10138-CVGroup_UIEventShop_Idle1-1 = "여, 여기는 안전하겠지?"
10138-CVGroup_UIEventShop_Idle1-2 = "갑자기 귀신이 나타나진 않겠지?"
10138-CVGroup_UIEventShop_Idle2-1 = "보, 보고 있지만 말고 좀 도와줘!"
10138-CVGroup_UIEventShop_Idle2-2 = "혼자 이걸 정리하는거, 무섭― 힘들어!"
10138-CVGroup_UIEventShop_Buy1-1 = "어? 그건 꽤 쓸만한데?"
10138-CVGroup_UIEventShop_Buy2-1 = "엇, 잡동사니 속에 있었다고? 그거."
10138-CVGroup_UIEventShop_Buy3-1 = "진짜 도움이 된다면 좋겠는데……."
10138-CVGroup_UIEventShop_Buy4-1 = "자 받아. 일단 가져온 건 나니까 고마워하라구?"
10138-CVGroup_UIEventMission_Enter1-1 = "으음, 그동안 모은 단서를 취합해 볼까?"
10138-CVGroup_UIEventMission_Enter2-1 = "같이 사건을 정리하자."
10138-CVGroup_UIEventMission_Buy1-1 = "흥, 역시 별거 아닌 소문이었네."
10138-CVGroup_UIEventMission_Buy2-1 = "이 기세로 다음 소문도 확인하는 거야!"
10138-CVGroup_UIEventMission_Idle1-1 = "소, 솔직히 귀신보다 저 흔들다리가 더 무서워……."
10138-CVGroup_UIEventMission_Idle2-1 = "샤아악! 놀지 말고 조사에 집중!"
10138-CVGroup_UIEventMission_Interaction1-1 = "오, 오늘 확인은 이걸로 끝! 무리하면 안 좋아!"
