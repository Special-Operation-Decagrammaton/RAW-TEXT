[translation]
20054-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20054-CVGroup_CharacterGet_Idle1-1 = "President, infiltrator, rear support. Akeboshi Himari, the beautiful, super-genius, and delicate omniscient hacker, making a flawless entrance. Thank you for waiting, Sensei."
20054-CVGroup_Cafe_Idle1-1 = "(The thermostat must be set too low in here.)"
20054-CVGroup_Cafe_Idle2-1 = "This is a nice place to relax."
20054-CVGroup_Cafe_Idle3-1 = "Caffeine, in moderation, can be helpful."
20054-CVGroup_Cafe_Idle4-1 = "Having somewhere you can rest is important."
20054-CVGroup_Cafe_Idle5-1 = "No thank you to any cold drinks."
20054-CVGroup_WeaponGet_Idle1-1 = "Thank you, Sensei. Ideally, we won't need to draw our weapons at all... But it's important to be prepared."
20054-CVGroup_UICarrierBridge_Enter1-1 = "Situation assessment and analysis should come first..."
20054-CVGroup_UICarrierBridge_Enter1-2 = "...but easier said than done."
20054-CVGroup_UICarrierBridge_Enter2-1 = "The Steel Continent... It's a super phenomenon in every sense."
20054-CVGroup_UICarrierBridge_Enter2-2 = "Although, this wasn't quite what I'd originally imagined."
20054-CVGroup_UICarrierBridge_Enter3-1 = "Sensei. Please deliver the final blow."
20054-CVGroup_UICarrierBridge_Enter4-1 = "I have to figure out what it is I can do here."
20054-CVGroup_UICarrierBridge_Enter5-1 = "(Sensei told me to return to the transport ship...)"
20054-CVGroup_UICarrierBridge_Enter5-2 = "(There must be a reason why.)"
20054-CVGroup_UICarrierBridge_Enter6-1 = "It's time to end this all."
20054-CVGroup_UICarrierBridge_Enter6-2 = "We'll do our best too."
20054-CVGroup_UICarrierBridge_Enter7-1 = "This long journey is finally reaching its apex."
20054-CVGroup_UICarrierBridge_Idle1-1 = "We've finally arrived."
20054-CVGroup_UICarrierBridge_Idle2-1 = "We'll find a way."
20054-CVGroup_UICarrierBridge_Idle3-1 = "(Sensei said... If things go wrong...)"
20054-CVGroup_UICarrierBridge_Idle3-2 = "(That means...)"
20054-CVGroup_UICarrierBridge_Idle4-1 = "Please... Let everyone be okay."
20054-CVGroup_UICarrierBridge_Idle5-1 = "Did you know, Sensei? There's no \"end\" in astrology."
20054-CVGroup_UICarrierBridge_Idle5-2 = "Everything is a cycle."
20054-CVGroup_UICarrierLobby_Enter1-1 = "It's important to stay calm before a big event."
20054-CVGroup_UICarrierLobby_Enter2-1 = "Sweets help reduce your stress."
20054-CVGroup_UICarrierLobby_Enter3-1 = "Should we take a small break..."
20054-CVGroup_UICarrierLobby_Enter3-2 = "...and make a warm drink?"
20054-CVGroup_UICarrierLobby_Enter4-1 = "I'm glad...everyone's safe."
20054-CVGroup_UICarrierLobby_Idle1-1 = "...Perhaps we can read our future in the stars."
20054-CVGroup_UICarrierLobby_Idle2-1 = "A drink that's the same as today's lucky color..."
20054-CVGroup_UICarrierLobby_Idle3-1 = "They say that you can see your future even with coffee grounds."
20054-CVGroup_UICarrierLobby_Idle4-1 = "Don't worry. I'm still okay."
