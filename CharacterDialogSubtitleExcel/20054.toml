[translation]
20054-CVGroup_UITitle_Idle1-1 = "Blue~ Archive~!"
20054-CVGroup_CharacterGet_Idle1-1 = "หัวหน้า แทรกซึม สนับสนุนส่วนหลัง อาเกโบชิ ฮิมาริ\nแฮ็กเกอร์ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ\nผู้ทำทุกอย่างนี้ได้ ปรากฏตัวอย่างสมบูรณ์แบบแล้วค่ะ\nคุณครูรอฉันนานเลยนะคะ"
20054-CVGroup_Cafe_Idle1-1 = "(อุณหภูมิในห้องเย็นเกินไปหรือเปล่าคะ?)"
20054-CVGroup_Cafe_Idle2-1 = "เป็นที่ที่เหมาะกับการพักหายใจเลยนะคะ"
20054-CVGroup_Cafe_Idle3-1 = "คาเฟอีนในปริมาณเหมาะสมช่วยได้มากเลยค่ะ"
20054-CVGroup_Cafe_Idle4-1 = "สถานที่ที่พักผ่อนได้ก็เป็นสิ่งสำคัญค่ะ"
20054-CVGroup_Cafe_Idle5-1 = "ฉันขอปฏิเสธเครื่องดื่มเย็นๆ ดีกว่าค่ะ"
20054-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณค่ะ คุณครู\nที่จริงการไม่หยิบอาวุธมาใช้ก็คงเป็นการดีกว่า...\nแต่การเตรียมตัวก็เป็นสิ่งสำคัญนี่คะ"
20054-CVGroup_UICarrierBridge_Enter1-1 = "ต้องเข้าใจและวิเคราะห์สถานการณ์ก่อน"
20054-CVGroup_UICarrierBridge_Enter1-2 = "แต่ก็ไม่ง่ายเลยนะคะ"
20054-CVGroup_UICarrierBridge_Enter2-1 = "ดินแดนเหล็กกล้า... คือ 'ปรากฏการณ์ลี้ลับ' เลยนะคะ"
20054-CVGroup_UICarrierBridge_Enter2-2 = "ถึงจะต่างจากปรากฏการณ์ลี้ลับที่ฉันคาดไว้นิดหน่อยก็เถอะค่ะ"
20054-CVGroup_UICarrierBridge_Enter3-1 = "คุณครู ฉันฝากการเผด็จศึกสุดท้ายด้วยนะคะ"
20054-CVGroup_UICarrierBridge_Enter4-1 = "ต้องหาสิ่งที่สามารถทำที่นี่ได้ค่ะ"
20054-CVGroup_UICarrierBridge_Enter5-1 = "(ที่คุณครูบอกให้กลับไปที่ยานขนส่ง)"
20054-CVGroup_UICarrierBridge_Enter5-2 = "(ก็คงมีเหตุผลน่ะค่ะ)"
20054-CVGroup_UICarrierBridge_Enter6-1 = "ถึงเวลาจบทุกอย่างแล้วสินะคะ"
20054-CVGroup_UICarrierBridge_Enter6-2 = "พวกฉันก็จะทำให้เต็มที่ค่ะ"
20054-CVGroup_UICarrierBridge_Enter7-1 = "การเดินทางอันยาวนานมาถึงจุดไคลแม็กซ์แล้วสินะคะ"
20054-CVGroup_UICarrierBridge_Idle1-1 = "ในที่สุดก็มาถึงตรงนี้ได้แล้วนะคะ"
20054-CVGroup_UICarrierBridge_Idle2-1 = "พวกเราจะหาทางออกได้แน่นอนค่ะ"
20054-CVGroup_UICarrierBridge_Idle3-1 = "(คุณครูบอกว่า ถ้าเกิดอะไรขึ้นมา...)"
20054-CVGroup_UICarrierBridge_Idle3-2 = "(คำพูดนั้นมัน...)"
20054-CVGroup_UICarrierBridge_Idle4-1 = "ขอให้ทุกคน... ปลอดภัยด้วยนะคะ"
20054-CVGroup_UICarrierBridge_Idle5-1 = "คุณครูรู้หรือเปล่าคะ? ในโหราศาสตร์น่ะ ไม่มีจุดจบหรอกค่ะ"
20054-CVGroup_UICarrierBridge_Idle5-2 = "ทุกอย่างล้วนเป็นวัฏจักรค่ะ"
20054-CVGroup_UICarrierLobby_Enter1-1 = "ในเวลาที่ต้องรับศึกหนัก ยิ่งต้องมีสติค่ะ"
20054-CVGroup_UICarrierLobby_Enter2-1 = "ของหวานช่วยคลายเครียดได้ค่ะ"
20054-CVGroup_UICarrierLobby_Enter3-1 = "ชงเครื่องดื่มอะไรอุ่นๆ..."
20054-CVGroup_UICarrierLobby_Enter3-2 = "เพื่อพักหายใจหน่อยดีมั้ยนะ?"
20054-CVGroup_UICarrierLobby_Enter4-1 = "โล่งอกไปทีนะคะ... ที่ทุกคนปลอดภัย"
20054-CVGroup_UICarrierLobby_Idle1-1 = "ให้โหราศาสตร์ช่วยบอกอนาคตมั้ยคะ..."
20054-CVGroup_UICarrierLobby_Idle2-1 = "เครื่องดื่มที่เป็นสีนำโชคของวันนี้ก็คือ..."
20054-CVGroup_UICarrierLobby_Idle3-1 = "ได้ยินมาว่าเราดูดวงจากผงกาแฟได้ด้วยค่ะ"
20054-CVGroup_UICarrierLobby_Idle4-1 = "ไม่ต้องเป็นห่วงนะคะ ฉันยังไหวค่ะ"
