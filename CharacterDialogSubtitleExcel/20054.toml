[translation]
20054-CVGroup_UITitle_Idle1-1 = "蔚藍～檔案～"
20054-CVGroup_CharacterGet_Idle1-1 = "部長、潛入、後方支援。\n全部能夠完成的超天才清楚系病弱萬能美少女駭客明星陽葵──以萬全的準備登場。\n老師，讓您久等了。"
20054-CVGroup_Cafe_Idle1-1 = "（冷氣的設定溫度是不是太低了呢）"
20054-CVGroup_Cafe_Idle2-1 = "是個相當適合喘口氣的地方呢。"
20054-CVGroup_Cafe_Idle3-1 = "適度的咖啡因攝取，有很多好處唷。"
20054-CVGroup_Cafe_Idle4-1 = "能夠放鬆的場所，是很重要的呢。"
20054-CVGroup_Cafe_Idle5-1 = "冰冷的飲料我就不用了。"
20054-CVGroup_WeaponGet_Idle1-1 = "謝謝您。\n其實，能不動用武器就解決才是最好的……\n不過做好準備，果然還是很重要的。"
20054-CVGroup_UICarrierBridge_Enter1-1 = "狀況的掌握和分析是首要任務。"
20054-CVGroup_UICarrierBridge_Enter1-2 = "雖然那也不容易就是了。"
20054-CVGroup_UICarrierBridge_Enter2-1 = "鋼鐵大陸……的確是「特異現象」呢。"
20054-CVGroup_UICarrierBridge_Enter2-2 = "雖然和我期待的相比，方向略有不同就是了。"
20054-CVGroup_UICarrierBridge_Enter3-1 = "老師。請給予最後的一擊。"
20054-CVGroup_UICarrierBridge_Enter4-1 = "在這裡能做的事，得找出來才行。"
20054-CVGroup_UICarrierBridge_Enter5-1 = "（老師之所以說要回到運輸船，）"
20054-CVGroup_UICarrierBridge_Enter5-2 = "（想必是有理由的才對）"
20054-CVGroup_UICarrierBridge_Enter6-1 = "是時候結束一切了。"
20054-CVGroup_UICarrierBridge_Enter6-2 = "我們也會全力以赴。"
20054-CVGroup_UICarrierBridge_Enter7-1 = "漫長的旅途，也終於迎來高潮了呢。"
20054-CVGroup_UICarrierBridge_Idle1-1 = "終於，走到這一步了呢。"
20054-CVGroup_UICarrierBridge_Idle2-1 = "我們……一定會找到出路的。"
20054-CVGroup_UICarrierBridge_Idle3-1 = "（有什麼萬一的時候……老師他曾經這麼說過）"
20054-CVGroup_UICarrierBridge_Idle3-2 = "（那也就是說……）"
20054-CVGroup_UICarrierBridge_Idle4-1 = "大家……請務必平安……"
20054-CVGroup_UICarrierBridge_Idle5-1 = "您知道嗎？\n占星術是沒有盡頭的。"
20054-CVGroup_UICarrierBridge_Idle5-2 = "一切都在不斷循環。"
20054-CVGroup_UICarrierLobby_Enter1-1 = "越在成就大事的時候，冷靜就越是關鍵。"
20054-CVGroup_UICarrierLobby_Enter2-1 = "甜食可以減輕壓力唷。"
20054-CVGroup_UICarrierLobby_Enter3-1 = "就當作是喘口氣……"
20054-CVGroup_UICarrierLobby_Enter3-2 = "來做點溫暖的飲料吧？"
20054-CVGroup_UICarrierLobby_Enter4-1 = "太好了……幸好大家都平安無事。"
20054-CVGroup_UICarrierLobby_Idle1-1 = "關於未來的事，要不要用占星術占卜一下呢……"
20054-CVGroup_UICarrierLobby_Idle2-1 = "和今天的幸運色相同顏色的飲料是……"
20054-CVGroup_UICarrierLobby_Idle3-1 = "用咖啡似乎也能占卜唷。"
20054-CVGroup_UICarrierLobby_Idle4-1 = "不必擔心。我還很有精神。"
