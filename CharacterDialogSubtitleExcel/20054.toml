[translation]
20054-CVGroup_UITitle_Idle1-1 = "블루~ 아카이브~"
20054-CVGroup_CharacterGet_Idle1-1 = "부장, 잠입, 후방 지원. 모든 것을 해내는 초천재병약만능미소녀해커, 아케보시 히마리.\n완벽하게 등장입니다. 선생님, 오래 기다리셨습니다."
20054-CVGroup_Cafe_Idle1-1 = "(냉방 설정 온도가, 너무 낮은 게 아닐까요.)"
20054-CVGroup_Cafe_Idle2-1 = "숨을 돌리기에 좋은 장소네요."
20054-CVGroup_Cafe_Idle3-1 = "적절한 카페인은 도움이 되죠."
20054-CVGroup_Cafe_Idle4-1 = "휴식할 수 있는 장소, 중요하죠."
20054-CVGroup_Cafe_Idle5-1 = "찬 음료는 사양하겠어요."
20054-CVGroup_WeaponGet_Idle1-1 = "감사합니다. 선생님. 사실 무기는 사용되지 않는 편이 좋겠지만…… 대비는, 중요하니까요."
20054-CVGroup_UICarrierBridge_Enter1-1 = "상황 파악과 분석이 먼저겠지만,"
20054-CVGroup_UICarrierBridge_Enter1-2 = "쉽지 않네요."
20054-CVGroup_UICarrierBridge_Enter2-1 = "강철대륙…… 그야말로, '초현상' 이네요."
20054-CVGroup_UICarrierBridge_Enter2-2 = "제가 기대했던 초현상과는, 조금 다르지만요."
20054-CVGroup_UICarrierBridge_Enter3-1 = "선생님. 마지막 일격을 부탁드리겠습니다."
20054-CVGroup_UICarrierBridge_Idle1-1 = "마침내, 여기까지 왔다는 느낌일까요."
20054-CVGroup_UICarrierBridge_Idle2-1 = "우리는, 방법을 찾아낼 거예요."
20054-CVGroup_UICarrierLobby_Enter1-1 = "큰일을 앞둘수록 침착해야 하는 법이죠."
20054-CVGroup_UICarrierLobby_Enter2-1 = "단 것은 스트레스를 경감시켜 준답니다."
20054-CVGroup_UICarrierLobby_Enter3-1 = "한숨 돌릴 겸……"
20054-CVGroup_UICarrierLobby_Enter3-2 = "뭔가 따뜻한 음료라도 만들까요?"
20054-CVGroup_UICarrierLobby_Enter4-1 = "다행이네요…… 다들 무사해서."
20054-CVGroup_UICarrierLobby_Idle1-1 = "……미래에 대해, 점성술이라도 쳐 볼까요……"
20054-CVGroup_UICarrierLobby_Idle2-1 = "오늘 행운의 색과 같은 색의 음료는……."
20054-CVGroup_UICarrierLobby_Idle3-1 = "커피 가루로도 점을 칠 수 있다고 하던데 말이죠."
20054-CVGroup_UICarrierLobby_Idle4-1 = "걱정하지 마세요. 저는 아직 괜찮습니다."
