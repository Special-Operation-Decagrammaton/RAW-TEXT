[translation]
10136-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
10136-CVGroup_CharacterGet_Idle1-1 = "這種狀況下……我也得換裝呢。\n怎麼樣，老師。適合嗎？"
10136-CVGroup_Cafe_Idle1-1 = "唔唔……\n咖啡因不夠了。"
10136-CVGroup_Cafe_Idle2-1 = "下次想和老師兩個人一起來呢。"
10136-CVGroup_Cafe_Idle3-1 = "在那邊休息一下……"
10136-CVGroup_Cafe_Idle4-1 = "這個背包，\n怎麼有點燙……"
10136-CVGroup_Cafe_Idle5-1 = "真和平啊……"
10136-CVGroup_WeaponGet_Idle1-1 = "這種形式的武器還是第一次，\n不過……為了作戰，我會盡快熟練的。\n……這也是為了老師。"
10136-CVGroup_UICarrierLobby_Enter1-1 = "雖然是個舒適\n又有效率的地方……"
10136-CVGroup_UICarrierLobby_Enter2-1 = "戰鬥口糧雖然效率高，可是……"
10136-CVGroup_UICarrierLobby_Enter3-1 = "總覺得，莫名有種想去廚房的心情。"
10136-CVGroup_UICarrierLobby_Enter4-1 = "老師也要喝點冰涼的東西嗎？"
10136-CVGroup_UICarrierLobby_Idle1-1 = "可以開冷氣嗎？部長會不會不高興呢？"
10136-CVGroup_UICarrierLobby_Idle2-1 = "吃飯這種事，大家一起吃比較有效率嗎？"
10136-CVGroup_UICarrierLobby_Idle3-1 = "不合理卻有效率的事，也是存在於世上的呢。"
10136-CVGroup_UICarrierLobby_Idle4-1 = "無法整理思緒……"
10136-CVGroup_UICarrierLobby_Idle4-2 = "不是身體，而是腦袋發熱的時候……"
10136-CVGroup_UICarrierLobby_Idle4-3 = "該怎麼辦才好呢……"
10136-CVGroup_UIEventMission_Enter1-1 = "呀齁～老師，聽得到嗎？"
10136-CVGroup_UIEventMission_Enter2-1 = "因為是緊急事態，所以用通訊連線。"
10136-CVGroup_UIEventMission_Enter2-2 = "就算隔著線路，能看到臉還是很開心。"
10136-CVGroup_UIEventMission_Idle1-1 = "雖然確保了透氣性……"
10136-CVGroup_UIEventMission_Idle1-2 = "還是好熱。再脫一件──"
10136-CVGroup_UIEventMission_Idle1-3 = "咦？停下來？這樣啊……"
10136-CVGroup_UIEventMission_Idle1-4 = "好吧，既然老師這麼說了……"
10136-CVGroup_UIEventMission_Idle2-1 = "現在的我比起狙擊手，更像是射手。"
10136-CVGroup_UIEventMission_Idle2-2 = "移動的時候，會和隊伍一起。"
10136-CVGroup_UIEventMission_Idle2-3 = "……能移動到涼快的地方，真是太好了。"
10136-CVGroup_UIEventMission_Buy1-1 = "果然和老師聊天很開心。"
10136-CVGroup_UIEventMission_Buy2-1 = "好的，辛苦了。"
10136-CVGroup_UIEventMission_Interaction1-1 = "任務完成。下次也請多指教。"
