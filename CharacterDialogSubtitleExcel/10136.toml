[translation]
10136-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10136-CVGroup_CharacterGet_Idle1-1 = "이런 상황에서는…… 나도 갈아입어야겠지. 어때, 선생님. 어울려?"
10136-CVGroup_Cafe_Idle1-1 = "우으…… 카페인이 부족해."
10136-CVGroup_Cafe_Idle2-1 = "다음에는 선생님과 둘이서만 오고 싶네."
10136-CVGroup_Cafe_Idle3-1 = "저기에 조금 앉을까……"
10136-CVGroup_Cafe_Idle4-1 = "이 백팩, 묘하게 뜨겁단 말이지."
10136-CVGroup_Cafe_Idle5-1 = "평화롭네……"
10136-CVGroup_WeaponGet_Idle1-1 = "이런 형태의 무기는 처음이지만…… 작전 수행에 필요하다면, 익숙해져야겠지.\n……선생님을 위해서라도."
10136-CVGroup_UICarrierLobby_Enter1-1 = "아늑하고 효율적인 장소이기는 한데……"
10136-CVGroup_UICarrierLobby_Enter2-1 = "전투식량은 효율적인 건데……"
10136-CVGroup_UICarrierLobby_Enter3-1 = "뭔가, 왠지 모르게 주방으로 가고 싶은 기분이네."
10136-CVGroup_UICarrierLobby_Enter4-1 = "선생님도 뭔가 시원한 거 마실래?"
10136-CVGroup_UICarrierLobby_Idle1-1 = "에어컨 틀어도 돼? 부장이 싫어하려나?"
10136-CVGroup_UICarrierLobby_Idle2-1 = "식사는, 모두 함께하는 편이 효율적이려나?"
10136-CVGroup_UICarrierLobby_Idle3-1 = "합리적이지는 않지만 효율적인 일도, 세상에는 있는 법이야."
10136-CVGroup_UICarrierLobby_Idle4-1 = "생각이 정리되지 않네……"
10136-CVGroup_UICarrierLobby_Idle4-2 = "몸이 아니라 머릿속이 뜨거우면,"
10136-CVGroup_UICarrierLobby_Idle4-3 = "어떻게 해야 할까……"
10136-CVGroup_UIEventMission_Enter1-1 = "얏호- 들려, 선생님?"
10136-CVGroup_UIEventMission_Enter2-1 = "긴급 상황이어서, 통신으로 연결 중이야."
10136-CVGroup_UIEventMission_Enter2-2 = "회선 너머라도 볼 수 있어서, 좋네."
10136-CVGroup_UIEventMission_Idle1-1 = "통기성을 확보했지만……"
10136-CVGroup_UIEventMission_Idle1-2 = "아직 더워. 조금만 더 벗어야 하나……?"
10136-CVGroup_UIEventMission_Idle1-3 = "응? 그만두라고? 그런가……."
10136-CVGroup_UIEventMission_Idle1-4 = "뭐, 선생님이 그렇게 말한다면……."
10136-CVGroup_UIEventMission_Idle2-1 = "지금 나는 저격수라기보다는 지정 사수니까."
10136-CVGroup_UIEventMission_Idle2-2 = "이동할 때는, 팀과 함께해야 해."
10136-CVGroup_UIEventMission_Idle2-3 = "……시원한 곳으로 이동해 줘서, 다행이야."
10136-CVGroup_UIEventMission_Buy1-1 = "역시 선생님과 이야기하는 거, 즐겁네."
10136-CVGroup_UIEventMission_Buy2-1 = "자, 수고했어."
10136-CVGroup_UIEventMission_Interaction1-1 = "미션 컴플리트. 다음 미션도 잘 부탁해."
