[translation]
10136-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10136-CVGroup_CharacterGet_Idle1-1 = "In these situations... I should change too. What do you think, Sensei. Do I look good?"
10136-CVGroup_Cafe_Idle1-1 = "Ugh... Need caffeine..."
10136-CVGroup_Cafe_Idle2-1 = "I want to come here again just us two."
10136-CVGroup_Cafe_Idle3-1 = "Maybe I'll sit there..."
10136-CVGroup_Cafe_Idle4-1 = "This backpack is oddly warm."
10136-CVGroup_Cafe_Idle5-1 = "It's peaceful here..."
10136-CVGroup_WeaponGet_Idle1-1 = "This is my first time using this type of weapon... But I'll get used to it for the mission's sake... And for Sensei's."
10136-CVGroup_UICarrierLobby_Enter1-1 = "It's a comfy and efficient space, but..."
10136-CVGroup_UICarrierLobby_Enter2-1 = "Combat rations are efficient..."
10136-CVGroup_UICarrierLobby_Enter3-1 = "I want to go to the kitchen for some reason."
10136-CVGroup_UICarrierLobby_Enter4-1 = "Would you also like something cool to drink, Sensei?"
10136-CVGroup_UICarrierLobby_Idle1-1 = "Can I turn on the AC? Would the president hate it?"
10136-CVGroup_UICarrierLobby_Idle2-1 = "Would it be more efficient if everyone ate together?"
10136-CVGroup_UICarrierLobby_Idle3-1 = "There are things in this world that are efficient, but not rational."
10136-CVGroup_UICarrierLobby_Idle4-1 = "I can't organize my thoughts..."
10136-CVGroup_UICarrierLobby_Idle4-2 = "If my body isn't hot, but my head is..."
10136-CVGroup_UICarrierLobby_Idle4-3 = "What should I do..."
10136-CVGroup_UIEventMission_Enter1-1 = "Ya-ho! Do you copy, Sensei?"
10136-CVGroup_UIEventMission_Enter2-1 = "Since we're in a state of emergency, we have to connect with comms."
10136-CVGroup_UIEventMission_Enter2-2 = "Even if it's through the lines, it's nice to see you."
10136-CVGroup_UIEventMission_Idle1-1 = "Fresh air secured..."
10136-CVGroup_UIEventMission_Idle1-2 = "But it's still hot. Maybe if I take off more clothes...?"
10136-CVGroup_UIEventMission_Idle1-3 = "Hm? I shouldn't do that? Is that so..."
10136-CVGroup_UIEventMission_Idle1-4 = "Well, if you say so, Sensei..."
10136-CVGroup_UIEventMission_Idle2-1 = "I'm more of a marksman than a sniper right now."
10136-CVGroup_UIEventMission_Idle2-2 = "That's why I need to move with the team."
10136-CVGroup_UIEventMission_Idle2-3 = "...I'm glad we've moved somewhere cooler."
10136-CVGroup_UIEventMission_Buy1-1 = "Sensei, chatting with you really is fun."
10136-CVGroup_UIEventMission_Buy2-1 = "Here, good work."
10136-CVGroup_UIEventMission_Interaction1-1 = "Mission complete. Let's do our best on the next one too."
