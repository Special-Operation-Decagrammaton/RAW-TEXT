[translation]
26014-CVGroup_UITitle_Idle1-1 = "Blue Archive."
26014-CVGroup_CharacterGet_Idle1-1 = "Kakudate Karin, from Millennium Science School, preparations complete. ...I-Is this outfit okay?"
26014-CVGroup_Cafe_Idle1-1 = "I wish there were a mirror somewhere."
26014-CVGroup_Cafe_Idle2-1 = "I'm free, more or less. How about you, Sensei...?"
26014-CVGroup_Cafe_Idle3-1 = "There's lots of cute furniture... I like it."
26014-CVGroup_Cafe_Idle4-1 = "I don't sense any enemies. I suppose I can let my guard down a bit."
26014-CVGroup_Cafe_Idle5-1 = "I should clean this place up... No, not while I'm in my school uniform."
26014-CVGroup_WeaponGet_Idle1-1 = "No matter the time or place, whether I'm in a maid uniform or a school uniform, I'm always prepared when it comes to protecting you."
26014-CVGroup_UIEventLobby_Enter1-1 = "Ah, hello, Sensei."
26014-CVGroup_UIEventLobby_Enter1-2 = "...It feels awkward to greet you differently from usual."
26014-CVGroup_UIEventLobby_Enter2-1 = "Maybe I should go with cuter greetings..."
26014-CVGroup_UIEventLobby_Enter2-2 = "I-I was just talking to myself!"
26014-CVGroup_UIEventLobby_Enter3-1 = "It's a quite hectic event..."
26014-CVGroup_UIEventLobby_Enter4-1 = "Just a bit more, and it'll be over. Let's do our best, Sensei."
26014-CVGroup_UIEventLobby_Enter5-1 = "To think it's already over..."
26014-CVGroup_UIEventLobby_Enter5-2 = "It feels...a bit disappointing."
26014-CVGroup_UIEventLobby_Idle1-1 = "H-Huh? Wh-What's wrong? Is there anything you need me to do?"
26014-CVGroup_UIEventLobby_Idle2-1 = "Th-This is just Millennium's designated, simple school uniform..."
26014-CVGroup_UIEventLobby_Idle2-2 = "Is there anything weird about it?"
26014-CVGroup_UIEventLobby_Idle3-1 = "Um... Sensei?"
26014-CVGroup_UIEventLobby_Idle3-2 = "Since we're here..."
26014-CVGroup_UIEventLobby_Idle3-3 = "...would you like to..."
26014-CVGroup_UIEventLobby_Idle4-1 = "...N-Never mind. It's nothing. Sorry."
