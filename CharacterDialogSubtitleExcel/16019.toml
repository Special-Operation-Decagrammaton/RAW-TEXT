[translation]
16019-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
16019-CVGroup_CharacterGet_Idle1-1 = "完美女僕、完美偵察員。我是飛鳥馬季。\n請當作乘上了大船，放心交給我吧。"
16019-CVGroup_Cafe_Idle1-1 = "休息是很重要的。\n我認為週休四日左右比較適當。"
16019-CVGroup_Cafe_Idle2-1 = "有能讓身體休息的地方嗎。"
16019-CVGroup_Cafe_Idle3-1 = "咖啡因和糖分是不可或缺的。"
16019-CVGroup_Cafe_Idle4-1 = "這間咖啡廳的配方……還算及格。"
16019-CVGroup_Cafe_Idle5-1 = "為了下次的任務，休息一下吧。"
16019-CVGroup_WeaponGet_Idle1-1 = "武器的變更，需要下定很大的決心。\n是跟把早餐的菜單，從吐司換成鬆餅同等的大事。\n不過，如果是老師給的東西……那就另當別論了。"
16019-CVGroup_UICarrierLobby_Enter1-1 = "請用洋甘菊茶。"
16019-CVGroup_UICarrierLobby_Enter1-2 = "據說有放鬆緊張的效果。"
16019-CVGroup_UICarrierLobby_Enter2-1 = "我的活躍，只要老師有看見就足夠了。"
16019-CVGroup_UICarrierLobby_Enter3-1 = "我正覺得無聊。請陪我玩吧。"
16019-CVGroup_UICarrierLobby_Enter4-1 = "最近，我有了新的興趣（暫定）。"
16019-CVGroup_UICarrierLobby_Enter5-1 = "偵察是嗎？請下達指示。"
16019-CVGroup_UICarrierLobby_Idle1-1 = "作為完美女僕兼最佳特務……"
16019-CVGroup_UICarrierLobby_Idle1-2 = "如果有能幫忙的事，請儘管告訴我。"
16019-CVGroup_UICarrierLobby_Idle2-1 = "託輕量戰鬥服的福，能做出更輕盈的動作了。"
16019-CVGroup_UICarrierLobby_Idle3-1 = "要是多帶一些漫畫來就好了。"
16019-CVGroup_UICarrierLobby_Idle4-1 = "我有直播的存檔。"
16019-CVGroup_UICarrierLobby_Idle4-2 = "要跟我一起看嗎？"
16019-CVGroup_UICarrierLobby_Idle5-1 = "我努力執行任務，是為了大家。"
16019-CVGroup_UICarrierLobby_Idle5-2 = "……在此同時，也是為了被稱讚。"
16019-CVGroup_UIEventShop_Enter1-1 = "歡迎光臨飛鳥馬季的商店。"
16019-CVGroup_UIEventShop_Enter1-2 = "……我說謊了。這是大家的商店。"
16019-CVGroup_UIEventShop_Enter2-1 = "雖然沒能準備太多商品……"
16019-CVGroup_UIEventShop_Enter2-2 = "希望能對老師有所幫助。"
16019-CVGroup_UIEventShop_Enter3-1 = "我是飛鳥馬季。透過螢幕向您問好。"
16019-CVGroup_UIEventShop_Enter3-2 = "本應親自拜訪，遺憾面臨緊急事態只能透過通訊，還請見諒。"
16019-CVGroup_UIEventShop_Enter4-1 = "即使面臨緊急事態，飛鳥馬季的商店依然在營業。"
16019-CVGroup_UIEventShop_Idle1-1 = "是的，老師。我在這裡。"
16019-CVGroup_UIEventShop_Idle1-2 = "不會逃也不會躲──"
16019-CVGroup_UIEventShop_Idle1-3 = "不……如果我消失的話，老師會拚命找我嗎？"
16019-CVGroup_UIEventShop_Idle2-1 = "您覺得呢？"
16019-CVGroup_UIEventShop_Idle2-2 = "這是具備保溫性與穩定性，還有身心放鬆效果的──"
16019-CVGroup_UIEventShop_Idle2-3 = "簡直跟我一樣優秀的戰鬥服。"
16019-CVGroup_UIEventShop_Idle2-4 = "老師，和我一起確認服裝的功能吧。"
16019-CVGroup_UIEventShop_Idle2-5 = "要盡情貼著我也無妨，請不必客氣。"
16019-CVGroup_UIEventShop_Idle3-1 = "請稍等。"
16019-CVGroup_UIEventShop_Idle3-2 = "我會憑藉完美女僕的記憶力，想起庫存的位置。"
16019-CVGroup_UIEventShop_Idle4-1 = "雖然被迫改用線上服務，不過營業不受影響。"
16019-CVGroup_UIEventShop_Idle4-2 = "因為最佳特務不會挑選活躍的場合。"
16019-CVGroup_UIEventShop_Buy1-1 = "感謝您的購買。"
16019-CVGroup_UIEventShop_Buy1-2 = "順帶一提，只要您說一聲，我也可以購買。"
16019-CVGroup_UIEventShop_Buy2-1 = "是那個商品對吧，我明白了。"
16019-CVGroup_UIEventShop_Buy2-2 = "在補貨完成之前，要不要和我邊玩邊等呢？"
16019-CVGroup_UIEventShop_Buy3-1 = "您喜歡這種東西呢，我明白了。"
16019-CVGroup_UIEventShop_Buy4-1 = "好的，請收下。期待您再次光臨。"
16019-CVGroup_UIEventShop_Buy4-2 = "幾次都行，請來見我吧。"
16019-CVGroup_UIEventShop_Buy5-1 = "好的，我覺得很不錯。"
16019-CVGroup_UIEventShop_Buy6-1 = "那個商品，請從後面的架子拿取。"
16019-CVGroup_UIEventShop_Buy7-1 = "如果買錯的話可以退貨。"
16019-CVGroup_UIEventShop_Buy7-2 = "……抱歉。是不行的。"
16019-CVGroup_UIEventShop_Buy8-1 = "如果想要的話，可以將與我的通話券作為贈品附上。"
16019-CVGroup_UIEventShop_Buy8-2 = "當然，您想要對吧？"
