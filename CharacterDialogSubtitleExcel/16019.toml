[translation]
16019-CVGroup_UITitle_Idle1-1 = "Blue Archive"
16019-CVGroup_CharacterGet_Idle1-1 = "เมดที่สมบูรณ์แบบจากหน่วยลาดตระเวนที่ 1 อะซุมะ โทคิเองค่ะ\nคิดเสียว่าเราลงเรือลำเดียวกันแล้ว และวางใจฉันได้เลยค่ะ"
16019-CVGroup_Cafe_Idle1-1 = "การพักผ่อนคือสิ่งสำคัญค่ะ\nระบบทำงานสัปดาห์ละ 3 วันคือสิ่งจำเป็นจริงๆ ด้วยค่ะ"
16019-CVGroup_Cafe_Idle2-1 = "มีตรงไหนให้นั่งหรือลงไปนอนได้บ้างมั้ยคะ?"
16019-CVGroup_Cafe_Idle3-1 = "คาเฟอีนกับน้ำตาลในปริมาณที่พอเพียง\nคือเชื้อเพลิงในการทำภารกิจค่ะ"
16019-CVGroup_Cafe_Idle4-1 = "สูตรของคาเฟ่นี้... ใช้ได้เลยนะคะ"
16019-CVGroup_Cafe_Idle5-1 = "ต้องพักผ่อน อย่างน้อยก็เพื่อภารกิจต่อไปค่ะ"
16019-CVGroup_WeaponGet_Idle1-1 = "การเปลี่ยนอาวุธเป็นเรื่องที่ต้องตัดสินใจมากกว่าที่คิดค่ะ\nเหมือนกับการเปลี่ยนมื้อเช้า จากโทสต์เป็นแพนเค้กเลยค่ะ\nแต่ถ้าเป็นสิ่งที่ได้รับจากคุณครู เรื่องราวก็คงต่างออกไปนิดหน่อยนะคะ"
16019-CVGroup_UICarrierLobby_Enter1-1 = "นี่คือชาคาโมมายล์ค่ะ"
16019-CVGroup_UICarrierLobby_Enter1-2 = "ว่ากันว่ามีฤทธิ์ช่วยให้ผ่อนคลายค่ะ"
16019-CVGroup_UICarrierLobby_Enter2-1 = "ฉันอยากให้คุณครูรับรู้ถึงผลงานของฉันค่ะ"
16019-CVGroup_UICarrierLobby_Enter3-1 = "ชักจะเบื่อแล้วค่ะ มาเล่นด้วยกันหน่อยสิคะ"
16019-CVGroup_UICarrierLobby_Enter4-1 = "ไม่นานมานี้ฉันมีงานอดิเรกทำแล้วค่ะ"
16019-CVGroup_UICarrierLobby_Enter5-1 = "ลาดตระเวนเหรอคะ? ออกคำสั่งมาได้เลยค่ะ"
16019-CVGroup_UICarrierLobby_Idle1-1 = "ในฐานะเมดที่เพอร์เฟกต์และสุดยอดสายลับ"
16019-CVGroup_UICarrierLobby_Idle1-2 = "ถ้ามีอะไรให้ฉันช่วยก็บอกได้เลยนะคะ"
16019-CVGroup_UICarrierLobby_Idle2-1 = "ชุดที่เบาขึ้นทำให้ฉันเคลื่อนไหวได้คล่องตัวขึ้นค่ะ"
16019-CVGroup_UICarrierLobby_Idle3-1 = "รู้งี้เอาหนังสือการ์ตูนมาเยอะกว่านี้ก็ดีค่ะ"
16019-CVGroup_UICarrierLobby_Idle4-1 = "มาดูรายการอินเทอร์เน็ต"
16019-CVGroup_UICarrierLobby_Idle4-2 = "ที่ฉันโหลดมาด้วยกันมั้ยคะ?"
16019-CVGroup_UICarrierLobby_Idle5-1 = "ที่ฉันยึดมั่นในภารกิจ ก็เพื่อทุกคนค่ะ"
16019-CVGroup_UICarrierLobby_Idle5-2 = "และก็เพื่อให้ได้รับคำชมด้วยค่ะ..."
16019-CVGroup_UIEventShop_Enter1-1 = "เชิญเข้าสู่ร้านของอะซุมะ โทคิค่ะ คุณครู"
16019-CVGroup_UIEventShop_Enter1-2 = "ฉันโกหกค่ะ... เป็นร้านของทุกคนน่ะค่ะ"
16019-CVGroup_UIEventShop_Enter2-1 = "ถึงจะเตรียมสินค้ามาไม่ได้มาก..."
16019-CVGroup_UIEventShop_Enter2-2 = "แต่ยังไงก็หวังว่าจะเป็นประโยชน์ต่อคุณครูนะคะ"
16019-CVGroup_UIEventShop_Enter3-1 = "อะซุมะ โทคิ ขอทักทายผ่านระบบสื่อสารค่ะ"
16019-CVGroup_UIEventShop_Enter3-2 = "ถ้าสถานการณ์ไม่เร่งด่วนแบบนี้ละก็\nฉันคงไปหาด้วยตัวเองแล้วค่ะ"
16019-CVGroup_UIEventShop_Enter4-1 = "ไม่ว่าสถานการณ์จะฉุกเฉินแค่ไหน\nแต่ร้านของโทคิก็เปิดให้บริการค่ะ"
16019-CVGroup_UIEventShop_Idle1-1 = "ค่ะ คุณครู ฉันอยู่ตรงนี้ค่ะ"
16019-CVGroup_UIEventShop_Idle1-2 = "ฉันไม่หนี แล้วก็ไม่ซ่อนตัวด้วยค่ะ"
16019-CVGroup_UIEventShop_Idle1-3 = "ไม่สิ... ถ้าเกิดฉันหายไป\nคุณครูจะร้อนรุ่มใจ แล้วมาตามหาฉันมั้ยคะ?!"
16019-CVGroup_UIEventShop_Idle2-1 = "เป็นยังไงบ้างคะ คุณครู"
16019-CVGroup_UIEventShop_Idle2-2 = "ทั้งรักษาความอบอุ่น ทั้งปลอดภัย\nและทำให้ร่างกายกับจิตใจมั่นคง"
16019-CVGroup_UIEventShop_Idle2-3 = "นี่เป็นชุดต่อสู้ที่ยอดเยี่ยม ไม่ต่างจากตัวฉันเลยนะคะ"
16019-CVGroup_UIEventShop_Idle2-4 = "คุณครูมาตรวจสอบฟังก์ชั่นของชุดนี้กับฉันสิคะ"
16019-CVGroup_UIEventShop_Idle2-5 = "อยู่ข้างๆ ฉันได้เท่าที่ต้องการเลยค่ะ\nไม่ต้องปฏิเสธนะคะ"
16019-CVGroup_UIEventShop_Idle3-1 = "ช่วยรอสักครู่นะคะ"
16019-CVGroup_UIEventShop_Idle3-2 = "เมดที่เพอร์เฟกต์ขอนึกก่อน\nว่าสินค้าชิ้นนั้นอยู่ตรงไหนค่ะ"
16019-CVGroup_UIEventShop_Idle4-1 = "ถึงจะต้องเปิดร้านออนไลน์อย่างช่วยไม่ได้\nแต่ก็ไม่เป็นอุปสรรคต่อการขายค่ะ"
16019-CVGroup_UIEventShop_Idle4-2 = "สุดยอดสายลับน่ะ ไม่เลือกสถานที่หรอกค่ะ"
16019-CVGroup_UIEventShop_Buy1-1 = "ขอบคุณที่ซื้อนะคะ"
16019-CVGroup_UIEventShop_Buy1-2 = "ถ้าอยากซื้อฉันไปด้วย ก็แค่บอกกันก็พอค่ะ"
16019-CVGroup_UIEventShop_Buy2-1 = "เอาเป็นอันนั้นสินะคะ เข้าใจแล้วค่ะ"
16019-CVGroup_UIEventShop_Buy2-2 = "มาใช้ช่วงเวลาดีๆ กับฉัน\nจนกว่าจะเติมสต๊อกสินค้าจนเสร็จมั้ยคะ? "
16019-CVGroup_UIEventShop_Buy3-1 = "ชอบของแบบนี้สินะคะ เข้าใจแล้วค่ะ"
16019-CVGroup_UIEventShop_Buy4-1 = "ค่ะ นี่ค่ะ โอกาสหน้าเชิญใหม่นะคะ"
16019-CVGroup_UIEventShop_Buy4-2 = "แวะมาดูหน้าฉันก็ยังดีค่ะ"
16019-CVGroup_UIEventShop_Buy5-1 = "นั่นเป็นของที่ดีเลยนะคะ"
16019-CVGroup_UIEventShop_Buy6-1 = "สินค้านั้น ช่วยหยิบจากชั้นวางด้านหลังนะคะ"
16019-CVGroup_UIEventShop_Buy7-1 = "ถ้าซื้อผิดไปก็เอามาคืนได้ค่ะ"
16019-CVGroup_UIEventShop_Buy7-2 = "ขอโทษด้วยค่ะ... มีคนบอกว่าไม่ได้ค่ะ"
16019-CVGroup_UIEventShop_Buy8-1 = "ถ้าอยากได้ละก็ ฉันจะแถมบัตรโทรศัพท์สำหรับโทรหาฉันให้ค่ะ"
16019-CVGroup_UIEventShop_Buy8-2 = "ต้องอยากได้ใช่มั้ยล่ะคะ?"
