[translation]
16019-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
16019-CVGroup_CharacterGet_Idle1-1 = "Perfect maid, perfect recon. Asuma Toki. Please regard us as \"in the same boat,\" and rely on me."
16019-CVGroup_Cafe_Idle1-1 = "Rest is important. That is why the 3-day work week is a necessity."
16019-CVGroup_Cafe_Idle2-1 = "I am looking for a place to sit or lie down."
16019-CVGroup_Cafe_Idle3-1 = "A sufficient amount of caffeine and sugar may serve as fuel for a mission."
16019-CVGroup_Cafe_Idle4-1 = "This cafe's recipe...is decent."
16019-CVGroup_Cafe_Idle5-1 = "Proper rest ensures the next mission's success."
16019-CVGroup_WeaponGet_Idle1-1 = "Changing your weapon requires a surprising amount of grit. Almost like changing your breakfast from toast to pancakes. But I guess this is different, since it's from Sensei."
16019-CVGroup_UICarrierLobby_Enter1-1 = "Here's some chamomile tea."
16019-CVGroup_UICarrierLobby_Enter1-2 = "It's said to help calm one down."
16019-CVGroup_UICarrierLobby_Enter2-1 = "I want to be recognized by Sensei, and Sensei alone."
16019-CVGroup_UICarrierLobby_Enter3-1 = "I am getting bored. Please play with me."
16019-CVGroup_UICarrierLobby_Enter4-1 = "I have recently picked up what one could call a hobby."
16019-CVGroup_UICarrierLobby_Enter5-1 = "A recon mission? Ready for my orders."
16019-CVGroup_UICarrierLobby_Idle1-1 = "As a perfect maid and best agent..."
16019-CVGroup_UICarrierLobby_Idle1-2 = "...I will help you with anything; just ask."
16019-CVGroup_UICarrierLobby_Idle2-1 = "Thanks to how lightweight this suit is, I'm more nimble now."
16019-CVGroup_UICarrierLobby_Idle3-1 = "I should have brought more manga."
16019-CVGroup_UICarrierLobby_Idle4-1 = "Would you like to join me in watching..."
16019-CVGroup_UICarrierLobby_Idle4-2 = "...the live stream I recorded?"
16019-CVGroup_UICarrierLobby_Idle5-1 = "I uphold my duty loyally for the sake of everyone else."
16019-CVGroup_UICarrierLobby_Idle5-2 = "...And for the sake of compliments."
16019-CVGroup_UIEventShop_Enter1-1 = "Welcome to Asuma Toki's shop, Sensei."
16019-CVGroup_UIEventShop_Enter1-2 = "...That was a lie. It's everyone's shop."
16019-CVGroup_UIEventShop_Enter2-1 = "We couldn't prepare a lot of stock..."
16019-CVGroup_UIEventShop_Enter2-2 = "But we still hope it will be of help to our teacher."
16019-CVGroup_UIEventShop_Enter3-1 = "Asuma Toki. Calling in remotely."
16019-CVGroup_UIEventShop_Enter3-2 = "I would be there with you in person if the situation wasn't so dire."
16019-CVGroup_UIEventShop_Enter4-1 = "Even during an emergency, Toki's shop is still open."
16019-CVGroup_UIEventShop_Idle1-1 = "Yes. Sensei. I'm here."
16019-CVGroup_UIEventShop_Idle1-2 = "I won't run away or hide."
16019-CVGroup_UIEventShop_Idle1-3 = "Wait, no... Could it be that, if I suddenly disappear, you'll earnestly search for me?!"
16019-CVGroup_UIEventShop_Idle2-1 = "What do you think, Sensei?"
16019-CVGroup_UIEventShop_Idle2-2 = "It comes with heat retention, stability, and even calming capabilities."
16019-CVGroup_UIEventShop_Idle2-3 = "This combat suit is excellent, just like me."
16019-CVGroup_UIEventShop_Idle2-4 = "Sensei, discover all of my suit's new features with me."
16019-CVGroup_UIEventShop_Idle2-5 = "There is no need to hold back. You can hold me as long as you desire."
16019-CVGroup_UIEventShop_Idle3-1 = "Please hold on."
16019-CVGroup_UIEventShop_Idle3-2 = "I'll recall the product's location with the memory of a perfect maid."
16019-CVGroup_UIEventShop_Idle4-1 = "Although we had no option but to handle this online, it is still business as usual."
16019-CVGroup_UIEventShop_Idle4-2 = "The best agent can operate anywhere, after all."
16019-CVGroup_UIEventShop_Buy1-1 = "Thank you for your purchase."
16019-CVGroup_UIEventShop_Buy1-2 = "Say the word, and I can make the purchase as well."
16019-CVGroup_UIEventShop_Buy2-1 = "That's what you want. Understood."
16019-CVGroup_UIEventShop_Buy2-2 = "Do you want to spend quality time together, until the item is back in stock?"
16019-CVGroup_UIEventShop_Buy3-1 = "That's the kind of thing you like. Noted."
16019-CVGroup_UIEventShop_Buy4-1 = "Yes. Here you go. Please come again."
16019-CVGroup_UIEventShop_Buy4-2 = "Please come see me again."
16019-CVGroup_UIEventShop_Buy5-1 = "That's a good item."
16019-CVGroup_UIEventShop_Buy6-1 = "Please grab that item from the back shelf."
16019-CVGroup_UIEventShop_Buy7-1 = "If you made an accidental transaction, you can have a full refund."
16019-CVGroup_UIEventShop_Buy7-2 = "...I am sorry. Apparently, you can't."
16019-CVGroup_UIEventShop_Buy8-1 = "If you'd like, I can add a chance for a phone call with me as a complimentary gift."
16019-CVGroup_UIEventShop_Buy8-2 = "Naturally, you want it, right?"
