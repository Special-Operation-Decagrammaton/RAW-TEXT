[translation]
10066-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10066-CVGroup_CharacterGet_Idle1-1 = "ถึงจะเปลี่ยนอาชีพเป็นเมด แต่อาริสึก็คืออาริสึคนเดิมค่ะ\nคอยเฝ้าดูอาริสึด้วยนะคะคุณครู!"
10066-CVGroup_Cafe_Idle1-1 = "...ให้เริ่มทำความสะอาดจากตรงไหนดีคะ?"
10066-CVGroup_Cafe_Idle2-1 = "ที่นี่เหมือนจะมีเควสรองให้เล่นเลยค่ะ...!"
10066-CVGroup_Cafe_Idle3-1 = "อาริสึรู้ดีค่ะว่าในโลกนี้ มีสิ่งที่เรียกว่าเมดคาเฟ่อยู่ด้วยค่ะ!"
10066-CVGroup_Cafe_Idle4-1 = "ถ้าเป็นเมดก็ต้องมีนายท่าน\nนายท่านของอาริสึ... แน่นอนว่าต้องเป็นคุณครูค่ะ!"
10066-CVGroup_Cafe_Idle5-1 = "เลเวลเมดเพิ่มขึ้นแล้วค่ะ!\nอาริสึกับชุดเมดเริ่มเหมาะกันขึ้นมานิดหน่อยแล้วค่ะ"
10066-CVGroup_WeaponGet_Idle1-1 = "นี่คือ... ดาบวิเศษในตำนานที่อัปเกรดจากพลังของอาริสึกับคุณครูค่ะ...!\nขอบคุณค่ะ คุณครู!\nอาริสึจะอัปเลเวลเมดให้มากขึ้น แล้วเป็นผู้กล้าเมดให้ได้ค่ะ!"
10066-CVGroup_UIEventLobby_Enter1-1 = "คุณครู เร็วเข้าเถอะค่ะ!\nกิจกรรมค่ะ กิจกรรม!"
10066-CVGroup_UIEventLobby_Enter2-1 = "ถ้าเป็นอาริสึละก็ ไม่ว่าตอนไหนก็โอเคค่ะ!\nคุณครู... พร้อมแล้วรึยังคะ?"
10066-CVGroup_UIEventLobby_Enter3-1 = "อาริสึตั้งใจทำความสะอาดและป้องกันมากเลยนะคะ\nชมอาริสึหน่อยสิคะ!"
10066-CVGroup_UIEventLobby_Enter4-1 = "ฮือ... กลายเป็น... เรื่องใหญ่ไปซะแล้วค่ะ"
10066-CVGroup_UIEventLobby_Enter4-2 = "แต่ว่าอาริสึไม่เป็นไรหรอกค่ะ ก็เป็นผู้กล้าเมดนี่คะ!"
10066-CVGroup_UIEventLobby_Enter5-1 = "เป็นการผจญภัยที่สุดยอดมากเลยค่ะ!"
10066-CVGroup_UIEventLobby_Enter5-2 = "ถ้าอยู่กับคุณครูละก็ ไม่ว่าจะเป็นอะไร อาริสึก็ไม่กลัวทั้งนั้นค่ะ!"
10066-CVGroup_UIEventLobby_Idle1-1 = "ถึงเลเวลยังไม่สูง... พอที่จะก้าวข้ามเมดได้..."
10066-CVGroup_UIEventLobby_Idle1-2 = "แต่อาริสึก็จะพยายามค่ะ!"
10066-CVGroup_UIEventLobby_Idle2-1 = "คุณครูคะ ถ้าเกิดว่าเจอรุ่นพี่เนรุแถวนี้ละก็\nติดต่ออาริสึทันทีเลยนะคะ"
10066-CVGroup_UIEventLobby_Idle2-2 = "ต้องติดต่อมานะคะ! สัญญากับอาริสึแล้วนะคะ!"
10066-CVGroup_UIEventLobby_Idle3-1 = "ทำอาหาร ทำความสะอาดและการซักผ้า คือพื้นฐานของเมดค่ะ!"
10066-CVGroup_UIEventLobby_Idle3-2 = "คุณครูเองก็จะเข้าร่วมเควสด้วยมั้ยคะ?"
10066-CVGroup_UIEventLobby_Idle4-1 = "ถะ... ถึงจะจิ้มแบบนั้นแต่ก็ไม่มีอะไรดร็อปออกมาหรอกนะคะ..."
10066-CVGroup_UIEventLobby_Idle4-2 = "อาริสึไม่ใช่มอนสเตอร์นะคะ!"
10066-CVGroup_UIEventShop_Enter1-1 = "ชะ...เชิญค่ะ คุณครู!"
10066-CVGroup_UIEventShop_Enter1-2 = "ผู้กล้าเมดก็สามารถดูร้านค้าให้ได้นะคะ!"
10066-CVGroup_UIEventShop_Enter2-1 = "มีเสบียงไอเทมให้แลกเหลือเฟือเลยค่ะ"
10066-CVGroup_UIEventShop_Enter2-2 = "แต่ถ้าเป็นคุณครูละก็ น่าจะเหมาไปทั้งหมดได้เลยนะคะ"
10066-CVGroup_UIEventShop_Enter3-1 = "ถึงกิจกรรมจะจบไปแล้ว แต่ร้านก็ยังเปิดอยู่นะคะ"
10066-CVGroup_UIEventShop_Enter3-2 = "มีเวลาจำกัดนะคะ อย่าลืมล่ะ สัญญากับอาริสึแล้วนะคะ"
10066-CVGroup_UIEventShop_Idle1-1 = "ยินดีต้อนรับสู่ร้านอุปกรณ์ของอาริสึค่ะ!"
10066-CVGroup_UIEventShop_Idle1-2 = "ซื้อไอเทมและโพชั่นที่เป็นประโยชน์ต่อการผจญภัยได้ที่นี่ค่ะ!"
10066-CVGroup_UIEventShop_Idle2-1 = "อืม... คุณครูจะซื้อรอยยิ้มเหรอคะ?"
10066-CVGroup_UIEventShop_Idle2-2 = "ก็ได้ค่ะ โมโมอิบอกไว้ว่ารอยยิ้มราคา 0 เครดิตค่ะ!"
10066-CVGroup_UIEventShop_Buy1-1 = "ปาปัม ปาปัม ป๊าม! คุณครู\nซื้อไอเทมเรียบร้อยแล้วค่า!"
10066-CVGroup_UIEventShop_Buy1-2 = "อาริสึจะให้รอยยิ้มพิมพ์ใจเป็นของแถมนะคะ!"
10066-CVGroup_UIEventShop_Buy2-1 = "โฮ โฮ... ตาถึงมากเลยค่ะคุณลูกค้า"
10066-CVGroup_UIEventShop_Buy2-2 = "เวลานี้ต้องพูดบทนี้ค่ะ! อาริสึเรียนมาค่ะ!"
10066-CVGroup_UIEventShop_Buy3-1 = "นักเดินทางเอ๋ย... นั่นคือสิ่งที่เจ้าเลือกงั้นหรือ...?"
10066-CVGroup_UIEventShop_Buy3-2 = "เป็นไงคะคุณครู? อาริสึอยากพูดบทนี้มานานแล้วค่ะ!"
10066-CVGroup_UIEventShop_Buy4-1 = "การดูแลคลังไอเทมก็เป็นงานของเมดค่ะ!"
10066-CVGroup_UIEventShop_Buy4-2 = "วันนี้อาริสึก็จะพยายามนะคะ!"
