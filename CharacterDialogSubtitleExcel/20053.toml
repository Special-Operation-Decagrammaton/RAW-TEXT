[translation]
20053-CVGroup_UITitle_Idle1-1 = "블루~ 흠흠, 아카이브?"
20053-CVGroup_CharacterGet_Idle1-1 = "안녕하신가, 선생 공! 이번 임무는 무려 잠입이라고! 그러니 잘 부탁해!"
20053-CVGroup_Cafe_Idle1-1 = "후후…… 나를 알아보는 사람이 있으면 어떡하지……?"
20053-CVGroup_Cafe_Idle2-1 = "이 드레스…… 역시 이런 곳에서 입기에는 과한가……?"
20053-CVGroup_Cafe_Idle3-1 = "(드레스…… 커피…… 떠오른다! 새로운 콘텐츠가!)"
20053-CVGroup_Cafe_Idle4-1 = "나중에는 꼭……! 이곳에서 구독자들과 팬 미팅을……!"
20053-CVGroup_Cafe_Idle5-1 = "(좋아, 일단! ……제일 구석진 자리가 어디지?)"
20053-CVGroup_WeaponGet_Idle1-1 = "나…… 나에게 이런……! 하지만 선생 공의 판단이라면! 응! 감사합니다!"
20053-CVGroup_UIEventLobby_Enter1-1 = "잠입 상황에서는 주먹밥인가, 병량환인가……."
20053-CVGroup_UIEventLobby_Enter1-2 = "응? 왔구나, 선생 공!"
20053-CVGroup_UIEventLobby_Enter2-1 = "좋은 복장이군, 선생 공."
20053-CVGroup_UIEventLobby_Enter2-2 = "이런 모습은 또 새롭네……."
20053-CVGroup_UIEventLobby_Enter3-1 = "우냐악……! 대체 왜 패션쇼장에서 전투를 벌이는 건데?!"
20053-CVGroup_UIEventLobby_Enter4-1 = "……응, 보고 싶네, 츠쿠요."
20053-CVGroup_UIEventLobby_Enter4-2 = "잘 지내고 있을까…… 라멘은 잘 챙겨 먹고 있겠지?"
20053-CVGroup_UIEventLobby_Enter5-1 = "좋아……! 이것으로 인법연구부, 부활!"
20053-CVGroup_UIEventLobby_Enter5-2 = "자! 선생 공도 어서 이쪽으로!"
20053-CVGroup_UIEventLobby_Idle1-1 = "뭔가 심심한데……."
20053-CVGroup_UIEventLobby_Idle1-2 = "응? 그런 말 하면 꼭 뭔가 일이 생긴다고?"
20053-CVGroup_UIEventLobby_Idle2-1 = "으으으…… 이 옷 뭔가 묘하게 끼는 것 같아……."
20053-CVGroup_UIEventLobby_Idle2-2 = "이런 걸 왜 좋다고 입는 거지……!"
20053-CVGroup_UIEventLobby_Idle3-1 = "닌자를 닌자로 만드는 것은 무엇인가……?"
20053-CVGroup_UIEventLobby_Idle3-2 = "복장……은 아닌 것 같고."
20053-CVGroup_UIEventLobby_Idle4-1 = "보여주지……! 닌자의 길에"
20053-CVGroup_UIEventLobby_Idle4-2 = "복장 같은 것은 아무런 방해물도 되지 않는다는 것을……!"
20053-CVGroup_UIEventShop_Enter1-1 = "오오 왔군, 선생 공! 마음 편히 둘러보라고."
20053-CVGroup_UIEventShop_Enter1-2 = "그런데 말이야, 이 상품은 말이지……."
20053-CVGroup_UIEventShop_Enter2-1 = "없는 것만 빼고 전부 다 준비해 뒀다고! 냐하하!"
20053-CVGroup_UIEventShop_Enter3-1 = "후후, 어서 문 닫고 같이 신 닌자 정식이나 먹으러 가자고, 선생 공!"
20053-CVGroup_UIEventShop_Idle1-1 = "선택은 신중하게, 구매는 과감하게……!"
20053-CVGroup_UIEventShop_Idle1-2 = "그것이 굿즈 구매의 인법……!"
20053-CVGroup_UIEventShop_Idle2-1 = "언젠가는 이곳에, 소녀인법첩 미치룻치의 굿즈도 진열을……!"
20053-CVGroup_UIEventShop_Buy1-1 = "좋군. 좋은 선택이야."
20053-CVGroup_UIEventShop_Buy2-1 = "그래, 닌자라면 당연히 그렇게 선택해야지!"
20053-CVGroup_UIEventShop_Buy3-1 = "포장하시겠습니까, 아니면 드시고 가시겠……"
20053-CVGroup_UIEventShop_Buy3-2 = "아, 이게 아닌가."
20053-CVGroup_UIEventShop_Buy4-1 = "오오……! 맞아! 그것이 바로 우리 상점의 추천 상품!"
20053-CVGroup_UIEventShop_Buy4-2 = "사실 전부 다 추천 상품이지만!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-1 = "후후, 어서 와 선생 공."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-2 = "나도 마침 라멘을 고르던 중이었다고."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-1 = "흠흠, 좋은 냄새……."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-2 = "……만 있는 건 아닌 것 같지만! 가보자고!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter3-1 = "잘 먹었습니다…… 이제 더는 안 들어가……."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle1-1 = "면과 수프…… 그것은 마치 닌자와 인법……."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle2-1 = "선생 공은 어떤 라멘이 좋아?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-1 = "떠오른다……!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-2 = "새로운 인법의 영감이 떠오르는 맛이야……!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck3-1 = "우냐아앗……?! 이, 이 맛은……!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck2-1 = "우읏, 이건 제법인데……?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck1-1 = "나쁘지는 않은데…… 정말 나쁘지만 않아……!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck0-1 = "윽, 이, 이게 라멘……?"
