[translation]
20039-CVGroup_UITitle_Idle1-1 = "It's Blue Archive."
20039-CVGroup_CharacterGet_Idle1-1 = "I'm Ryuuge Kisaki, president of Shanhaijing Academy's Genryumon. Fufu. Is it in my power to assist you?"
20039-CVGroup_Cafe_Idle1-1 = "Hm... Is there anywhere to put a censer?"
20039-CVGroup_Cafe_Idle2-1 = "(Outside of Shanhaijing, it's very...diverse.)"
20039-CVGroup_Cafe_Idle3-1 = "This looks like a good place to have a cup of tea..."
20039-CVGroup_Cafe_Idle4-1 = "(What... could that be...?)"
20039-CVGroup_Cafe_Idle5-1 = "I feel relaxed here."
20039-CVGroup_WeaponGet_Idle1-1 = "You've had it rough, Sensei. Fufu, perhaps that's not something I should say...but, genuinely, thank you. I swear that I'll treasure it above all else."
20039-CVGroup_UIEventLobby_Enter1-1 = "Welcome to Shanhaijing, Sensei."
20039-CVGroup_UIEventLobby_Enter1-2 = "I hope you enjoy the Moonlight Festival to the fullest."
20039-CVGroup_UIEventLobby_Enter2-1 = "Let me know if you don't know where to go."
20039-CVGroup_UIEventLobby_Enter2-2 = "I'll have someone help you right away."
20039-CVGroup_UIEventLobby_Enter3-1 = "I didn't know it would turn out like this..."
20039-CVGroup_UIEventLobby_Enter3-2 = "I'm causing trouble for you, Sensei."
20039-CVGroup_UIEventLobby_Enter3-3 = "You'll...stay by my side, won't you?"
20039-CVGroup_UIEventLobby_Enter4-1 = "Everything will come full circle and return to you..."
20039-CVGroup_UIEventLobby_Enter4-2 = "Now, let us go reclaim our Shanhaijing."
20039-CVGroup_UIEventLobby_Enter5-1 = "Great work, Sensei."
20039-CVGroup_UIEventLobby_Enter5-2 = "As president of the Genryumon, and also as a student..."
20039-CVGroup_UIEventLobby_Enter5-3 = "You have my genuine respect and gratitude."
20039-CVGroup_UIEventLobby_Idle1-1 = "Many stories cross paths during the Moonlight Festival."
20039-CVGroup_UIEventLobby_Idle1-2 = "Fufu. If you're interested, why don't you investigate?"
20039-CVGroup_UIEventLobby_Idle2-1 = "The Black Tortoise Promenade is using the Moonlight Festival as an opportunity to mingle with the outside world."
20039-CVGroup_UIEventLobby_Idle2-2 = "Although I made no particular statement as president..."
20039-CVGroup_UIEventLobby_Idle3-1 = "The Genryumon and Black Tortoise Promenade. Which side does the underlying problem lie on...?"
20039-CVGroup_UIEventLobby_Idle3-2 = "I'm sorry, Sensei. Even though I'm president, there are things I don't know."
20039-CVGroup_UIEventLobby_Idle4-1 = "As long as I'm president, I will guarantee the safety of Shanhaijing."
20039-CVGroup_UIEventLobby_Idle4-2 = "No matter who the opponent is."
20039-CVGroup_UIEventLobby_Idle4-3 = "That goes for you too, Sensei."
20039-CVGroup_UIEventTreasure_Enter1-1 = "You're here. Right now..."
20039-CVGroup_UIEventTreasure_Enter1-2 = "I see. Well, it's time to refresh yourself now. Fufu."
20039-CVGroup_UIEventTreasure_Enter2-1 = "We've prepared some entertainment for you."
20039-CVGroup_UIEventTreasure_Enter2-2 = "Please enjoy."
20039-CVGroup_UIEventTreasure_Enter2-3 = "...But please be careful not to overeat."
20039-CVGroup_UIEventTreasure_Enter3-1 = "There's still time remaining."
20039-CVGroup_UIEventTreasure_Enter3-2 = "Let's stay together until the very end."
20039-CVGroup_UIEventTreasure_Idle1-1 = "What is it, Sensei?"
20039-CVGroup_UIEventTreasure_Idle1-2 = "Huh? You want me to taste it first?"
20039-CVGroup_UIEventTreasure_Idle1-3 = "Do you know what that means? Fufu."
20039-CVGroup_UIEventTreasure_Idle1-4 = "What if that doesn't bother me?"
20039-CVGroup_UIEventTreasure_Idle2-1 = "Do you want a bite, Sensei?"
20039-CVGroup_UIEventTreasure_Idle2-2 = "I've already tried it. You don't have to worry. Heehee."
20039-CVGroup_UIEventTreasure_FindTreasure1-1 = "The snacks are one of the Moonlight Festival's specialties."
20039-CVGroup_UIEventTreasure_FindTreasure1-2 = "Should we look for them together?"
20039-CVGroup_UIEventTreasure_FindTreasure2-1 = "Learning something new is a good thing."
20039-CVGroup_UIEventTreasure_FindTreasure2-2 = "Don't you agree?"
20039-CVGroup_UIEventTreasure_GetTreasure1-1 = "Do you like sweets, Sensei?"
20039-CVGroup_UIEventTreasure_GetTreasure1-2 = "To me, they're...just so-so."
20039-CVGroup_UIEventTreasure_GetTreasure2-1 = "Oh... That's interesting."
20039-CVGroup_UIEventTreasure_GetTreasure2-2 = "Can I try it, too?"
20039-CVGroup_UIEventTreasure_RoundRenewal1-1 = "You did it, Sensei."
20039-CVGroup_UIEventTreasure_RoundRenewal1-2 = "But you won't rest on your laurels. Right?"
20039-CVGroup_UIEventMission_Enter1-1 = "Work, you say? ...You're wondering why I'm here?"
20039-CVGroup_UIEventMission_Enter1-2 = "It's because this is the president's duty, too."
20039-CVGroup_UIEventMission_Enter2-1 = "Each day is a new day."
20039-CVGroup_UIEventMission_Enter2-2 = "That means you have to better yourself every single day."
20039-CVGroup_UIEventMission_Enter2-3 = "If you ever need help, I'll always lend you a hand."
20039-CVGroup_UIEventMission_Idle1-1 = "What is it, Sensei? You want to tickle me?"
20039-CVGroup_UIEventMission_Idle1-2 = "Fufu. That's a bit rude."
20039-CVGroup_UIEventMission_Idle1-3 = "But I'll forgive even that."
20039-CVGroup_UIEventMission_Idle2-1 = "Are you playing a prank?"
20039-CVGroup_UIEventMission_Idle2-2 = "Okay. I'll allow it. Just between you and me, Sensei."
20039-CVGroup_UIEventMission_Idle2-3 = "...But please don't when other people are around."
20039-CVGroup_UIEventMission_Buy1-1 = "Yes. You made this happen. Don't refuse, just take it."
20039-CVGroup_UIEventMission_Buy2-1 = "You're very loyal, Sensei."
20039-CVGroup_UIEventMission_Buy2-2 = "If I can, I'd like to keep you by my side forever..."
20039-CVGroup_UIEventMission_Buy2-3 = "No, no. Forget it."
20039-CVGroup_UIEventMission_Interaction1-1 = "Good work. It's said that you should work to improve yourself every day and every night."
20039-CVGroup_UIEventMission_Interaction1-2 = "Let's keep bettering ourselves."
