[translation]
20057-CVGroup_UITitle_Idle1-1 = "블루, 아카이브. 우후후."
20057-CVGroup_CharacterGet_Idle1-1 = "밀레니엄 사이언스 스쿨, 콜 사인 03 무로카사 아카네.\n학생으로서 인사드립니다. 후훗, 원래 학생이지만요?"
20057-CVGroup_Cafe_Idle1-1 = "일단 케이크를 준비하고 싶네요."
20057-CVGroup_Cafe_Idle2-1 = "기분이 포근해지는 곳이네요."
20057-CVGroup_Cafe_Idle3-1 = "저 가구, 부실에도 두고 싶네요."
20057-CVGroup_Cafe_Idle4-1 = "(청소가 잘 되어 있지만…… 마무리가 아쉽네요.)"
20057-CVGroup_Cafe_Idle5-1 = "(이 넓이…… 필요한 폭약량은……)"
20057-CVGroup_WeaponGet_Idle1-1 = "키보토스에 있어서, 총은 필수품이죠. 메이드이든 학생이든, 마찬가지고요.\n선생님께 받은 이 '청소도구'와 함께, 앞으로도 정진하겠습니다."
20057-CVGroup_UIEventLobby_Enter1-1 = "기다리고 있었습니다, 선생님."
20057-CVGroup_UIEventLobby_Enter1-2 = "밀레니엄의 안내는 맡겨주세요."
20057-CVGroup_UIEventLobby_Enter2-1 = "가고 싶은 곳이 있으시다면 부담 없이 말씀 주세요."
20057-CVGroup_UIEventLobby_Enter3-1 = "평소에도 북적북적하지만……"
20057-CVGroup_UIEventLobby_Enter3-2 = "오늘 밀레니엄은 한층 더하네요."
20057-CVGroup_UIEventLobby_Enter3-3 = "활기가 있는 건, 좋은 일이지만요."
20057-CVGroup_UIEventLobby_Enter4-1 = "드디어 마무리네요."
20057-CVGroup_UIEventLobby_Enter4-2 = "EXPO도, 떠들썩한 사건도."
20057-CVGroup_UIEventLobby_Enter5-1 = "밀레니엄 EXPO, 즐겨주셨나요?"
20057-CVGroup_UIEventLobby_Enter5-2 = "저는 선생님과 함께할 수 있어 영광이었습니다."
20057-CVGroup_UIEventLobby_Enter5-3 = "……네, 정말로요."
20057-CVGroup_UIEventLobby_Idle1-1 = "이렇게 선생님과 시간을 보내는 것이……"
20057-CVGroup_UIEventLobby_Idle1-2 = "저는, 정말로 좋네요."
20057-CVGroup_UIEventLobby_Idle2-1 = "배가 고프면 말씀해 주세요."
20057-CVGroup_UIEventLobby_Idle2-2 = "좋은 학생 식당을 알고 있답니다."
20057-CVGroup_UIEventLobby_Idle2-3 = "메이드인 저라면 당연히 직접 요리해 드리겠지만……"
20057-CVGroup_UIEventLobby_Idle2-4 = "지금 저는, '학생'이니까요."
20057-CVGroup_UIEventLobby_Idle3-1 = "부르셨나요, 선생님?"
20057-CVGroup_UIEventLobby_Idle3-2 = "그냥 불러 보셨다고요?"
20057-CVGroup_UIEventLobby_Idle3-3 = "우후훗. 어머나."
20057-CVGroup_UIEventLobby_Idle4-1 = "후후."
20057-CVGroup_UIEventLobby_Idle4-2 = "저는 그렇게까지 간지러움을 잘 타지 않는답니다."
20057-CVGroup_UIEventLobby_Idle4-3 = "선생님께서는…… 어떠신지 알려주시겠어요?"
