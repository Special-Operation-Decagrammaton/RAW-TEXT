[translation]
10145-CVGroup_UITitle_Idle1-1 = "블루 아카이브, 로구나. 후우……"
10145-CVGroup_CharacterGet_Idle1-1 = "후우…… 햇볓이 강하구나.\n자, 선생. 이쪽으로……"
10145-CVGroup_Cafe_Idle1-1 = "흐음, 신기한\n기온이로구나……"
10145-CVGroup_Cafe_Idle2-1 = "호오, 저것은……?\n흥미롭구나."
10145-CVGroup_Cafe_Idle3-1 = "이 또한 휴식이겠지.\n좋구나."
10145-CVGroup_Cafe_Idle4-1 = "(잠시 몸을 눕힐\n곳이 있을까……?)"
10145-CVGroup_Cafe_Idle5-1 = "우유를 탄 커피……\n마음에 들었지만,\n사야가 주의하라 하였지……"
10145-CVGroup_WeaponGet_Idle1-1 = "선생은 여기에 깃든 것이\n무엇이라고 생각하는가?\n나는…… 우리 둘 사이의 \n변치 않는 인연이라고 생각하고 있다."
10145-CVGroup_UIEventLobby_Enter1-1 = "자아, 여름이다.\n그리고 피서다."
10145-CVGroup_UIEventLobby_Enter1-2 = "선생은 어떻게\n생각할지 모르겠으나……"
10145-CVGroup_UIEventLobby_Enter1-3 = "나는 지금, 제법\n들떠 있으니 말이다?"
10145-CVGroup_UIEventLobby_Enter2-1 = "좋은 계곡이구나."
10145-CVGroup_UIEventLobby_Enter2-2 = "특히\n저 풍경이 말이다."
10145-CVGroup_UIEventLobby_Enter2-3 = "인간이란,\n자연 앞에서는"
10145-CVGroup_UIEventLobby_Enter2-4 = "이렇게도 한없이\n작아지는 존재인 것을."
10145-CVGroup_UIEventLobby_Enter3-1 = "선생님! 키키는요!\n선생님과 함께라면\n어디든 좋아요!"
10145-CVGroup_UIEventLobby_Enter3-2 = "……지켜보고만\n있을 것이냐?"
10145-CVGroup_UIEventLobby_Enter4-1 = "누구에게나 미숙했던\n때는 있는 법."
10145-CVGroup_UIEventLobby_Enter4-2 = "그것과는 별개로,\n세상의 법도는"
10145-CVGroup_UIEventLobby_Enter4-3 = "언제나 공부해야 하는\n것이고 말이다."
10145-CVGroup_UIEventLobby_Enter5-1 = "무사히 끝이 났구나."
10145-CVGroup_UIEventLobby_Enter6-1 = "하지만 '우리'의\n피서는, "
10145-CVGroup_UIEventLobby_Enter6-2 = "아직 완전히\n끝나지 않은 것 같다만?"
10145-CVGroup_UIEventLobby_Idle1-1 = "음? 왜 그러는가, 선생?"
10145-CVGroup_UIEventLobby_Idle1-2 = "후훗, 자아.\n마음껏 만끽하도록 해라."
10145-CVGroup_UIEventLobby_Idle1-3 = "문주의 보드라운\n살결…… 이니라?"
10145-CVGroup_UIEventLobby_Idle2-1 = "정말로 꿈만 같구나.\n선생과 함께 이런 곳에,\n이렇게 올 수 있다니."
10145-CVGroup_UIEventLobby_Idle2-2 = "후후…… 특별한\n의미는 없다.\n"
10145-CVGroup_UIEventLobby_Idle2-3 = "몸 상태가 나쁜\n것도 아니지."
10145-CVGroup_UIEventLobby_Idle2-4 = "말 그대로\n받아들여\n주었으면 한다."
10145-CVGroup_UIEventLobby_Idle3-1 = "산해경에서\n푸른 나비는, 때로\n불멸을 뜻하기도 한다."
10145-CVGroup_UIEventLobby_Idle3-2 = "그 말은,\n푸른 나비는……"
10145-CVGroup_UIEventLobby_Idle3-3 = "웬만해서는\n포기를 모른다는\n의미이기도 하지."
10145-CVGroup_UIEventLobby_Idle3-4 = "후훗. 무얼,\n그저 농담이라\n생각해도 괜찮다."
10145-CVGroup_UIEventLobby_Idle4-1 = "내 어리광에\n어울려 줘서"
10145-CVGroup_UIEventLobby_Idle4-2 = "고맙구나, 선생."
10145-CVGroup_UIEventLobby_Idle4-3 = "그리고 미리\n사과하도록 하지."
10145-CVGroup_UIEventLobby_Idle4-4 = "지금부터,\n더 많이 어리광을\n부릴 테니 말이다."
10145-CVGroup_UIEventShop_Enter1-1 = "안녕하세요, 선생님!\n키키예요!\n"
10145-CVGroup_UIEventShop_Enter1-2 = "상점을 맡게 됐어요!"
10145-CVGroup_UIEventShop_Enter1-3 = "네? 키사키요?\n키키, 그런 거\n잘 몰라요!"
10145-CVGroup_UIEventShop_Enter2-1 = "어서 오세요, 선생님!"
10145-CVGroup_UIEventShop_Enter2-2 = "키키, 상점 잘 보고\n있었어요!\n칭찬해 주세요!"
10145-CVGroup_UIEventShop_Enter3-1 = "와아! 선생님이\n찾아와 주셨어요!\n"
10145-CVGroup_UIEventShop_Enter3-2 = "놓친 게 있으시면,\n얼마든지 보고 가세요!"
10145-CVGroup_UIEventShop_Idle1-1 = "선생님은 어떤 게\n좋으세요?\n키키는요……"
10145-CVGroup_UIEventShop_Idle1-2 = "선생님이 골라\n주시는 거라면\n뭐든 좋아요!"
10145-CVGroup_UIEventShop_Idle2-1 = "수영복,\n입어 봤는데요……"
10145-CVGroup_UIEventShop_Idle2-2 = "어때요?\n어울리나요?\n귀여운가요?"
10145-CVGroup_UIEventShop_Idle2-3 = "사실, 키키……\n수영 잘 못해요."
10145-CVGroup_UIEventShop_Buy1-1 = "아, 키키도\n그게 좋아 보였어요!"
10145-CVGroup_UIEventShop_Buy2-1 = "이럴 때는…… 그거죠?\n키키도 알아요!"
10145-CVGroup_UIEventShop_Buy2-2 = "매번 감사합니다!"
10145-CVGroup_UIEventShop_Buy3-1 = "와아! 키키도 볼래요!\n키키도요!"
10145-CVGroup_UIEventShop_Buy4-1 = "네! 여기 있어요!\n키키 잘했죠, 선생님?"
