[translation]
10077-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10077-CVGroup_CharacterGet_Idle1-1 = "เอ๋ มารับฉันเหรอคะ? ถ้าบอกก่อน ฉันก็ออกไปเองแล้ว~\nฉันคืออิจิกะจากชมรมทวงความยุติธรรม โรงเรียนสามัญทรีนิตี้ค่ะ\nรบกวนด้วยนะคะ!"
10077-CVGroup_Cafe_Idle1-1 = "โอ้ ที่นี่เหรอคะ? คาเฟ่ของคุณครู!"
10077-CVGroup_Cafe_Idle2-1 = "คุณครูชอบแนวนี้นี่เองสินะคะ..."
10077-CVGroup_Cafe_Idle3-1 = "ที่นี่สงบดีจังเลยนะคะ!"
10077-CVGroup_Cafe_Idle4-1 = "ผ่อนคลายดีจัง..."
10077-CVGroup_Cafe_Idle5-1 = "ให้ฉันช่วยจัดของมั้ยคะ..."
10077-CVGroup_WeaponGet_Idle1-1 = "จะว่ายังไงดีนะ... ขอบคุณนะคะที่ใจดีกับฉันแบบนี้\nฉันจะมีคุณค่าพอสมควรได้รับหรือเปล่านะ แต่ยังไงฉันก็...\nดีใจจริงๆ นะคะ"
10077-CVGroup_UIEventLobby_Enter1-1 = "ยินดีต้อนรับค่า~!\nทางนี้เตรียมพร้อมไว้อย่างเต็มที่แล้วค่ะ!"
10077-CVGroup_UIEventLobby_Enter2-1 = "เอาละ มาเริ่มกันเลยค่ะ!"
10077-CVGroup_UIEventLobby_Enter3-1 = "เหลืออีกครึ่งหนึ่งใช่มั้ยคะ?"
10077-CVGroup_UIEventLobby_Enter4-1 = "เราใกล้จะถึงแล้วค่ะ\nถ้ามีอะไรที่ฉันช่วยได้ บอกฉันได้ทุกอย่างเลยนะคะ!"
10077-CVGroup_UIEventLobby_Enter5-1 = "ถ้างั้นฉันจะไปดูรอบๆ นะคะ!"
10077-CVGroup_UIEventLobby_Idle1-1 = "ค่ะ ฉันอยู่ตรงนี้ค่ะ"
10077-CVGroup_UIEventLobby_Idle2-1 = "หืม...? เป็นอะไรไปตั้งแต่เมื่อกี้แล้วคะ?"
10077-CVGroup_UIEventLobby_Idle3-1 = "แกล้งกันแบบนั้นไม่ดีนะคะ~ ฮิฮิ"
10077-CVGroup_UIEventLobby_Idle4-1 = "ฮ่าฮ่า คุณครู ไม่ต้องเรียกหลายๆ ครั้งแบบนั้นก็ได้นะคะ\nยังไงฉันก็อยู่ตรงนี้ตลอดเวลาอยู่แล้ว"
10077-CVGroup_UIEventMission_Enter1-1 = "เฮือก! คุณครู! มาได้จังหวะพอดีเลย!"
10077-CVGroup_UIEventMission_Enter2-1 = "จะตรวจสอบรายการของใช่มั้ยคะ?\nฉันเตรียมไว้ทางนี้แล้วค่ะ!"
10077-CVGroup_UIEventMission_Idle1-1 = "อ๊ะ! ทำอะไรน่ะคุณครู!\nคิดจะทำซ้ำๆ งั้นเหรอคะ?"
10077-CVGroup_UIEventMission_Idle2-1 = "...ต่อไปก็เตรียมตัวโดนได้เลยค่ะ!"
10077-CVGroup_UIEventMission_Buy1-1 = "ค่ะ! ตรวจสอบเสร็จแล้วค่า~!"
10077-CVGroup_UIEventMission_Buy2-1 = "อันนั้นเหรอคะ? ฉันจะไปจัดการไว้ให้ค่ะ!"
10077-CVGroup_UIEventMission_Interaction1-1 = "เท่านี้งานของวันนี้ก็เสร็จแล้ว!\nฮิฮิ! คุณครู ทำอะไรต่อดีล่ะ?"
