[translation]
10100-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10100-CVGroup_CharacterGet_Idle1-1 = "สึนาโอกามิ ชิโรโกะจากอะบิดอส\nอื้อ ขอฝากตัวอีกครั้งนะคุณครู"
10100-CVGroup_Cafe_Idle1-1 = "ที่นี่... ก็ไม่แย่เท่าไรนะ..."
10100-CVGroup_Cafe_Idle2-1 = "ที่นี่... สงบสุขดีจัง"
10100-CVGroup_Cafe_Idle3-1 = "อื้อ ไหนๆ ก็มาที่นี่แล้ว\nก็ขอใช้เวลาพักผ่อนสักหน่อยแล้วกัน"
10100-CVGroup_Cafe_Idle4-1 = "นี่มัน... อะไรน่ะ?\nลองดึงดูได้มั้ยนะ...?"
10100-CVGroup_Cafe_Idle5-1 = "(เฟอร์นิเจอร์อันนี้เป็นแบบที่คุณครูชอบรึเปล่านะ...)"
10100-CVGroup_WeaponGet_Idle1-1 = "ทำให้ฉันถึงขนาดนี้เลยเหรอ\nปะ...เปล่าหรอก ไม่ได้ไม่พอใจอะไร\nแค่ตกใจนิดหน่อยน่ะ"
