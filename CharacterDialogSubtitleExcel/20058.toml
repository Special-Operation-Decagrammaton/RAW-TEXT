[translation]
20058-CVGroup_UITitle_Idle1-1 = "블루아카이브!"
20058-CVGroup_CharacterGet_Idle1-1 = "얏호~ 게헨나 학원 2학년, 하타미 에리카.\n잘 부탁해."
20058-CVGroup_Cafe_Idle1-1 = "우왓, \n사람이 꽤 있잖아.\n항상 이랬던가?"
20058-CVGroup_Cafe_Idle2-1 = "선생님이랑 같이하면 \n재밌겠다."
20058-CVGroup_Cafe_Idle3-1 = "이건\n선생님의 취향인가?"
20058-CVGroup_Cafe_Idle4-1 = "(이거, 누구 꺼지?)"
20058-CVGroup_Cafe_Idle5-1 = "응? ……누가 \n지켜보고 있는 건가?"
20058-CVGroup_WeaponGet_Idle1-1 = "어라, 내 취향 기억해 준 거야?\n하핫. 항상 고마워.\n나도 보답…… 해야겠지?"
20058-CVGroup_UIEventLobby_Enter1-1 = "와글와글하지?"
20058-CVGroup_UIEventLobby_Enter1-2 = "정신없겠지만\n잘 부탁해, 선생님."
20058-CVGroup_UIEventLobby_Enter2-1 = "얏호, 선생님.\n안 그래도\n찾고 있었는데."
20058-CVGroup_UIEventLobby_Idle1-1 = "알겠지만,\n우리 애들이 좀\n산만하거든."
20058-CVGroup_UIEventLobby_Idle1-2 = "도울 일이 있으면\n언제든지 말해줘."
20058-CVGroup_UIEventLobby_Idle2-1 = "이대로 괜찮으려나……"
20058-CVGroup_UIEventLobby_Idle2-2 = "조금 불안한데."
20058-CVGroup_UIEventLobby_Idle3-1 = "윽, 어떡하지, 저거."
20058-CVGroup_UIEventLobby_Idle3-2 = "저대로 두면\n안 되겠지?"
20058-CVGroup_UIEventLobby_Idle4-1 = "여러 일들이 있었지만,\n재밌었네."
20058-CVGroup_UIEventLobby_Idle4-2 = "선생님은 어땠어?"
