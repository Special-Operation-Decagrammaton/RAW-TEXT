10133-CVGroup_UICarrierHangar_Idle1-1 = "เพื่อแก้ไขสถานการณ์นี้..."
10133-CVGroup_UICarrierHangar_Idle2-1 = "ฉันจะวิเคราะห์คอร์ของผู้เลื่อมใสที่ได้มาที่นี่เอง"
10133-CVGroup_UICarrierLobby_Enter1-1 = "(การที่ฉันมาอยู่ที่นี่ในตอนนี้)"
10133-CVGroup_UICarrierLobby_Enter1-2 = "(เป็นสิ่งที่สมเหตุสมผลหรือเปล่า...)"
10133-CVGroup_UICarrierLobby_Enter2-1 = "(การเล่นเกมในเวลาแบบนี้...)"
10133-CVGroup_UICarrierLobby_Enter2-2 = "(มันสมเหตุสมผลมั้ยนะ?)"
10133-CVGroup_UICarrierLobby_Enter3-1 = "ต้องเตรียมรับมือกับทุกความเป็นไปได้ให้มากกว่านี้..."
10133-CVGroup_UICarrierLobby_Enter4-1 = "(ฉันทำห้องครัวเผื่อไว้ให้)"
