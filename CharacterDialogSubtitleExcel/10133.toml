[translation]
10133-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10133-CVGroup_CharacterGet_Idle1-1 = "คำตอบที่สมเหตุสมผลที่ก้าวถึงระดับอิเล็กทรอนิกส์\nฉันจะแสดงให้คุณเห็นเอง"
10133-CVGroup_Cafe_Idle1-1 = "ที่นี่ก็เป็นพื้นที่เชิงมโนทัศน์อย่างหนึ่ง...\nต้องวิเคราะห์แล้วละ"
10133-CVGroup_Cafe_Idle2-1 = "ถ้าฉันจัดข้าวของเป็นระเบียบแบบนี้บ้างละก็..."
10133-CVGroup_Cafe_Idle3-1 = "จะว่าไป... เซนส์ของคุณครู\nก็ดูจะคล้ายๆ กับของฉันนะ"
10133-CVGroup_Cafe_Idle4-1 = "ถ้าสร้างเมดในรูปแบบหุ่นรบล้ำยุคได้\nเอามาไว้ที่นี่ดีมั้ยนะ?"
10133-CVGroup_Cafe_Idle5-1 = "มาใช้งานให้... สะอาดสะอ้านที่สุดกันเถอะ"
10133-CVGroup_WeaponGet_Idle1-1 = "ต้องปกป้องทุกคนให้ได้...\nเจตจำนงอันแรงกล้านั้น ทำให้ฉันเหนี่ยวไกปืน"
10133-CVGroup_UICarrierHangar_Enter1-1 = "ต้องตีความผลลัพธ์นี้ยังไงนะ..."
10133-CVGroup_UICarrierHangar_Enter2-1 = "ที่นี่คือโรงเก็บยาน..."
10133-CVGroup_UICarrierHangar_Enter2-2 = "แต่รู้สึกเหมือนเป็นพื้นที่เทคโนโลยีที่ครอบคลุมมากขึ้นเรื่อยๆ เลย"
