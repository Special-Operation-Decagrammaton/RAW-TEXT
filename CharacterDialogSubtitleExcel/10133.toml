10133-CVGroup_UICarrierLobby_Idle4-1 = "อันที่จริง... บางครั้งฉันก็ล้มเหลวกับ"
10133-CVGroup_UICarrierLobby_Idle4-2 = "การทำอาหารด้วยไมโครเวฟ"
10133-CVGroup_UICarrierLobby_Idle5-1 = "(วิธีพูดคุยกับผู้คน...)"
10133-CVGroup_UICarrierLobby_Idle5-2 = "(ไปขอคำปรึกษาเรื่องนี้จากครูดีกว่า...)"
