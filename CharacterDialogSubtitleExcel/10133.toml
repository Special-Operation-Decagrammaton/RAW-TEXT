[translation]
10133-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10133-CVGroup_CharacterGet_Idle1-1 = "전자의 영역까지 도달한 합리적인 해답. 당신에게 보여줄게."
10133-CVGroup_Cafe_Idle1-1 = "이곳도 일종의 개념 공간…… 분석이 필요해."
10133-CVGroup_Cafe_Idle2-1 = "나도 이렇게 정리를 잘했으면……"
10133-CVGroup_Cafe_Idle3-1 = "……보아하니, 선생님의 감성은 나와 비슷한 것 같네."
10133-CVGroup_Cafe_Idle4-1 = "'아방가르드군 Type. 메이드'를 만들면, 이쪽에 놓을까."
10133-CVGroup_Cafe_Idle5-1 = "최대한…… 깨끗이 사용하자."
10133-CVGroup_WeaponGet_Idle1-1 = "모두를 지켜낸다……. 그 강한 의지가 방아쇠를 당기게 해."
10133-CVGroup_UICarrierHangar_Enter1-1 = "이 결과를 어떻게 해석해야 할까……"
10133-CVGroup_UICarrierHangar_Enter2-1 = "여기는 격납고…… 이지만,"
10133-CVGroup_UICarrierHangar_Enter2-2 = "종합 기술 공간이 되어 가고 있다는 느낌이네."
10133-CVGroup_UICarrierHangar_Enter3-1 = "업그레이드 준비가 완료되었어."
10133-CVGroup_UICarrierHangar_Idle1-1 = "이 상황을 개선하려면……"
10133-CVGroup_UICarrierHangar_Idle2-1 = "예언자의 코어는, 여기에서 분석하도록 할게."
10133-CVGroup_UICarrierLobby_Enter1-1 = "(내가 지금 여기에 있는 것이,)"
10133-CVGroup_UICarrierLobby_Enter1-2 = "(합리적인 행동일까……)"
10133-CVGroup_UICarrierLobby_Enter2-1 = "(혹시 이럴 때 게임을 하는 건……)"
10133-CVGroup_UICarrierLobby_Enter2-2 = "(합리적일까?)"
10133-CVGroup_UICarrierLobby_Enter3-1 = "조금 더 모든 확률에 대비하려면……"
10133-CVGroup_UICarrierLobby_Enter4-1 = "(혹시나 해서 주방을 만들어 두었지만,)"
10133-CVGroup_UICarrierLobby_Enter4-2 = "(역시 비합리적이었을까……)"
10133-CVGroup_UICarrierLobby_Enter5-1 = "(대화를 잘 시작하려면, 어떻게 해야 할까?)"
10133-CVGroup_UICarrierLobby_Idle1-1 = "일단 모니터링은 하고 있지만……"
10133-CVGroup_UICarrierLobby_Idle2-1 = "게임기…… 단순한 기계 장치이고, 프로그램일 뿐인데……"
10133-CVGroup_UICarrierLobby_Idle3-1 = "(그때도 느꼈지만, 게임개발부……)"
10133-CVGroup_UICarrierLobby_Idle3-2 = "(가능성을 예측할 수가 없구나……)"
10133-CVGroup_UICarrierLobby_Idle4-1 = "……난 사실,"
10133-CVGroup_UICarrierLobby_Idle4-2 = "전자레인지 요리도 실패할 때가 있어."
10133-CVGroup_UICarrierLobby_Idle5-1 = "(사람과 이야기하는 법……)"
10133-CVGroup_UICarrierLobby_Idle5-2 = "(역시 선생에게 상담을……)"
