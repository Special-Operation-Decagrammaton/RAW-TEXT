10133-CVGroup_UICarrierLobby_Idle2-1 = "เครื่องเล่นเกม... ก็แค่เครื่องจักรกับโปรแกรมง่ายๆ เท่านั้น..."
10133-CVGroup_UICarrierLobby_Idle3-1 = "(ถึงจะเคยรู้สึกแบบนี้มาแล้ว แต่ชมรมพัฒนาเกม...)"
