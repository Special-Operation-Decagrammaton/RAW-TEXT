[translation]
10133-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10133-CVGroup_CharacterGet_Idle1-1 = "A logical solution within the realm of electrons... Allow me to demonstrate."
10133-CVGroup_Cafe_Idle1-1 = "This place is a type of conceptual space as well... I'll need to do more analysis."
10133-CVGroup_Cafe_Idle2-1 = "I wish I had these kinds of organizational skills."
10133-CVGroup_Cafe_Idle3-1 = "...Looking at this, it would seem you and I share similar tastes."
10133-CVGroup_Cafe_Idle4-1 = "If I ever make the Avant Guard: Maid Type, perhaps I'll station it here."
10133-CVGroup_Cafe_Idle5-1 = "Let's...keep things as clean as we can."
10133-CVGroup_WeaponGet_Idle1-1 = "My determination to protect everyone... That gives me the strength to pull the trigger."
10133-CVGroup_UICarrierHangar_Enter1-1 = "How do I interpret this result...?"
10133-CVGroup_UICarrierHangar_Enter2-1 = "This place is the hangar, but..."
10133-CVGroup_UICarrierHangar_Enter2-2 = "It's started to become a general tech room..."
10133-CVGroup_UICarrierHangar_Enter3-1 = "Upgrade preparations are complete."
10133-CVGroup_UICarrierHangar_Idle1-1 = "To improve the current situation..."
10133-CVGroup_UICarrierHangar_Idle2-1 = "I'll start analyzing the Prophet's Cores we've collected so far here."
10133-CVGroup_UICarrierLobby_Enter1-1 = "(Is my being here...)"
10133-CVGroup_UICarrierLobby_Enter1-2 = "(...a rational move?)"
10133-CVGroup_UICarrierLobby_Enter2-1 = "(Is there any way that playing games at a time like this...)"
10133-CVGroup_UICarrierLobby_Enter2-2 = "(...could be rational?)"
10133-CVGroup_UICarrierLobby_Enter3-1 = "Just to be prepared against all possibilities..."
10133-CVGroup_UICarrierLobby_Enter4-1 = "(I made a kitchen just in case,)"
10133-CVGroup_UICarrierLobby_Enter4-2 = "(Perhaps that was irrational of me.)"
10133-CVGroup_UICarrierLobby_Enter5-1 = "(How does one naturally start a conversation?)"
10133-CVGroup_UICarrierLobby_Idle1-1 = "I'm monitoring it for now..."
10133-CVGroup_UICarrierLobby_Idle2-1 = "An arcade... It's just a simple machine and program, but..."
10133-CVGroup_UICarrierLobby_Idle3-1 = "(It was the same back then, but the Game Development Department...)"
10133-CVGroup_UICarrierLobby_Idle3-2 = "(...I really never know what they're going to do next.)"
10133-CVGroup_UICarrierLobby_Idle4-1 = "...To be honest..."
10133-CVGroup_UICarrierLobby_Idle4-2 = "Sometimes, I even mess up microwave meals."
10133-CVGroup_UICarrierLobby_Idle5-1 = "(How to talk to people...)"
10133-CVGroup_UICarrierLobby_Idle5-2 = "(I should consult Sensei about this...)"
