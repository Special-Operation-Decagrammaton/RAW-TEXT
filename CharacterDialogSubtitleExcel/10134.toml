[translation]
10134-CVGroup_UICarrierLobby_Enter1-1 = "愛麗絲……\n總覺得很興奮！"
10134-CVGroup_UICarrierLobby_Enter2-1 = "我帶了遊戲機過來！"
10134-CVGroup_UICarrierLobby_Enter2-2 = "老師要一起玩嗎？"
10134-CVGroup_UICarrierLobby_Enter3-1 = "大家都很厲害！"
10134-CVGroup_UICarrierLobby_Enter4-1 = "大家真的都很棒！我很敬佩！"
10134-CVGroup_UICarrierLobby_Enter5-1 = "愛麗絲還可以更加努力。老師！"
10134-CVGroup_UICarrierLobby_Enter6-1 = "桃井和綠都說要在房間休息……"
10134-CVGroup_UICarrierLobby_Idle1-1 = "……這就是拯救世界的第一步呢。"
10134-CVGroup_UICarrierLobby_Idle1-2 = "愛麗絲，會加油的！"
10134-CVGroup_UICarrierLobby_Idle2-1 = "就是在這種時候，休息才更重要！"
10134-CVGroup_UICarrierLobby_Idle3-1 = "能夠自由自在的，是件好事呢……！"
10134-CVGroup_UICarrierLobby_Idle4-1 = "勇氣……那才是真正的力量！"
10134-CVGroup_UICarrierLobby_Idle5-1 = "要打起精神，果然……"
10134-CVGroup_UICarrierLobby_Idle5-2 = "吃點或喝點什麼會比較好呢……"
10134-CVGroup_UICarrierLobby_Idle6-1 = "愛麗絲……只要大家都平安無事，"
10134-CVGroup_UICarrierLobby_Idle6-2 = "這樣就夠了。"
10134-CVGroup_UIEventMission_Enter1-1 = "老師！是任務，任務！"
10134-CVGroup_UIEventMission_Enter2-1 = "今天的任務，是什麼呢？"
10134-CVGroup_UIEventMission_Enter2-2 = "啊，整理是愛麗絲的工作呢……"
10134-CVGroup_UIEventMission_Enter3-1 = "抱歉是透過通訊！\n老師！我是愛麗絲！"
10134-CVGroup_UIEventMission_Enter4-1 = "雖然變成了\n艱難的狀況……"
10134-CVGroup_UIEventMission_Enter4-2 = "一起克服它吧！"
10134-CVGroup_UIEventMission_Idle1-1 = "哼，哼，哼……"
10134-CVGroup_UIEventMission_Idle1-2 = "覺得怎麼樣呀，老師。\n愛麗絲的新裝甲！"
10134-CVGroup_UIEventMission_Idle2-1 = "就算沒有裝甲……"
10134-CVGroup_UIEventMission_Idle2-2 = "即使失去了光之劍……"
10134-CVGroup_UIEventMission_Idle2-3 = "即便如此，愛麗絲還是愛麗絲。"
10134-CVGroup_UIEventMission_Idle2-4 = "只要大家都在……然後。"
10134-CVGroup_UIEventMission_Idle2-5 = "老師也在的話！"
10134-CVGroup_UIEventMission_Idle3-1 = "馬爾庫特……"
10134-CVGroup_UIEventMission_Idle3-2 = "非常有最終BOSS的感覺！"
10134-CVGroup_UIEventMission_Idle3-3 = "打倒之後……不會出現隱藏BOSS之類的吧……？"
10134-CVGroup_UIEventMission_Idle4-1 = "如果能平安回去的話……"
10134-CVGroup_UIEventMission_Idle4-2 = "想向大家介紹Kei！"
10134-CVGroup_UIEventMission_Buy1-1 = "乓啪喀乓──！"
10134-CVGroup_UIEventMission_Buy1-2 = "老師獲得了報酬！"
10134-CVGroup_UIEventMission_Buy2-1 = "真厲害，老師！"
10134-CVGroup_UIEventMission_Buy2-2 = "就這樣一步步繼續前進吧！"
10134-CVGroup_UIEventMission_Buy3-1 = "嗚嗚……愛麗絲也想在老師身邊一起慶祝！"
10134-CVGroup_UIEventMission_Buy4-1 = "是！愛麗絲最喜歡始終如一的老師了！"
10134-CVGroup_UIEventMission_Interaction1-1 = "哇！愛麗絲也很開心！"
10134-CVGroup_UIEventMission_Interaction2-1 = "這次也辛苦了，老師！"
