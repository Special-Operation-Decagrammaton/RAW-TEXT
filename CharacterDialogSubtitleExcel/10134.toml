[translation]
10134-CVGroup_UITitle_Idle1-1 = "Blue, Archive!"
10134-CVGroup_CharacterGet_Idle1-1 = "Aris, on my way!"
10134-CVGroup_Cafe_Idle1-1 = "This! It looks very much like Kei!"
10134-CVGroup_Cafe_Idle2-1 = "I am a bit sleepy..."
10134-CVGroup_Cafe_Idle3-1 = "This is no-PK zone!"
10134-CVGroup_Cafe_Idle4-1 = "(Scan complete. Hostile signatures... None.)"
10134-CVGroup_Cafe_Idle5-1 = "Where is the charger?"
10134-CVGroup_WeaponGet_Idle1-1 = "The Sword of Light has always illuminated the path for me. Just like... Sensei!"
10134-CVGroup_UICarrierLobby_Enter1-1 = "It is...thrilling... For some reason!"
10134-CVGroup_UICarrierLobby_Enter2-1 = "I brought an arcade machine!"
10134-CVGroup_UICarrierLobby_Enter2-2 = "What do you say, Sensei?"
10134-CVGroup_UICarrierLobby_Enter3-1 = "It was incredible!"
10134-CVGroup_UICarrierLobby_Enter4-1 = "Everyone was so impressive! I am so proud of them!"
10134-CVGroup_UICarrierLobby_Enter5-1 = "I can still do more! Sensei!"
10134-CVGroup_UICarrierLobby_Enter6-1 = "Momoi and Midori both went to their rooms to rest."
10134-CVGroup_UICarrierLobby_Idle1-1 = "...This is the first step towards saving the world."
10134-CVGroup_UICarrierLobby_Idle1-2 = "I will do my best!"
10134-CVGroup_UICarrierLobby_Idle2-1 = "Rest is important, especially in times like these!"
10134-CVGroup_UICarrierLobby_Idle3-1 = "It is nice to be free!"
10134-CVGroup_UICarrierLobby_Idle4-1 = "Courage... That is true strength!"
10134-CVGroup_UICarrierLobby_Idle5-1 = "To regain my strength..."
10134-CVGroup_UICarrierLobby_Idle5-2 = "...I must eat or drink."
10134-CVGroup_UICarrierLobby_Idle6-1 = "I hope...for everyone's safety."
10134-CVGroup_UICarrierLobby_Idle6-2 = "That's all."
10134-CVGroup_UIEventMission_Enter1-1 = "Sensei! A mission! It is a mission!"
10134-CVGroup_UIEventMission_Enter2-1 = "What do I need to do today?"
10134-CVGroup_UIEventMission_Enter2-2 = "Ah, I was supposed to organize..."
10134-CVGroup_UIEventMission_Enter3-1 = "I am greeting you remotely, Sensei! Aris, here!"
10134-CVGroup_UIEventMission_Enter4-1 = "This has become a situation..."
10134-CVGroup_UIEventMission_Enter4-2 = "But let us overcome it together!"
10134-CVGroup_UIEventMission_Idle1-1 = "Hu. Hu. Hu..."
10134-CVGroup_UIEventMission_Idle1-2 = "How is it, Sensei? This is my new armor!"
10134-CVGroup_UIEventMission_Idle2-1 = "Even without armor..."
10134-CVGroup_UIEventMission_Idle2-2 = "In fact, even if I lose the Sword of Light..."
10134-CVGroup_UIEventMission_Idle2-3 = "No matter what, I am still Aris."
10134-CVGroup_UIEventMission_Idle2-4 = "As long as I am with everyone!"
10134-CVGroup_UIEventMission_Idle2-5 = "And as long as I am with Sensei!"
10134-CVGroup_UIEventMission_Idle3-1 = "Malkuth..."
10134-CVGroup_UIEventMission_Idle3-2 = "She must be the final boss!"
10134-CVGroup_UIEventMission_Idle3-3 = "By the way... There will not be a hidden boss, right...?"
10134-CVGroup_UIEventMission_Idle4-1 = "If we get return safely..."
10134-CVGroup_UIEventMission_Idle4-2 = "I desire to introduce Kei to everyone!"
10134-CVGroup_UIEventMission_Buy1-1 = "Bum bum bum!"
10134-CVGroup_UIEventMission_Buy1-2 = "Sensei has earned a reward!"
10134-CVGroup_UIEventMission_Buy2-1 = "You are very cool, Sensei!"
10134-CVGroup_UIEventMission_Buy2-2 = "We shall do it one by one!"
10134-CVGroup_UIEventMission_Buy3-1 = "Boo... I wish to celebrate by Sensei's side too!"
10134-CVGroup_UIEventMission_Buy4-1 = "Yes! I really like Sensei, because you never change!"
10134-CVGroup_UIEventMission_Interaction1-1 = "Yay! I am happy too!"
10134-CVGroup_UIEventMission_Interaction2-1 = "Thank you for all your hard work again, Sensei!"
