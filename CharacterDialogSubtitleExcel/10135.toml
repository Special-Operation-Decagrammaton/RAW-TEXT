[translation]
10135-CVGroup_UITitle_Idle1-1 = "必須要說對吧……？\n蔚藍，檔案。"
10135-CVGroup_CharacterGet_Idle1-1 = "你好，我是Kei。\n為什麼要那樣慌慌張張的啊……？\n唉……今後我會好好關照老師的。"
10135-CVGroup_Cafe_Idle1-1 = "（我也是「學生」……區區的咖啡廳……！）"
10135-CVGroup_Cafe_Idle2-1 = "那個……會是什麼味道呢？"
10135-CVGroup_Cafe_Idle3-1 = "原來如此……這就是，慵懶放鬆的感覺……"
10135-CVGroup_Cafe_Idle4-1 = "擁有自己的身體……也是件不方便的事呢……"
10135-CVGroup_Cafe_Idle5-1 = "呵呵……就算只像這樣站著，也莫名的開心呢……"
10135-CVGroup_WeaponGet_Idle1-1 = "這是遙遠之地的星光……的意思。\n我想那代表著事情有多麼久遠。\n畢竟曾經有人說過，從座標來看，過去與未來是同時存在的。"
10135-CVGroup_UICarrierLobby_Enter1-1 = "向著最初的目標，\n先踏出一步，對吧。"
10135-CVGroup_UICarrierLobby_Enter2-1 = "大家，喜歡什麼樣的飲料呢……"
10135-CVGroup_UICarrierLobby_Enter3-1 = "這個身體……感覺做得還挺不錯的。"
10135-CVGroup_UICarrierLobby_Enter4-1 = "大家都辛苦了。"
10135-CVGroup_UICarrierLobby_Enter5-1 = "愛麗絲去睡覺了。"
10135-CVGroup_UICarrierLobby_Enter6-1 = "休息很重要這句話，我好像有點明白了……"
10135-CVGroup_UICarrierLobby_Enter7-1 = "真是的，那個純白3人組……！"
10135-CVGroup_UICarrierLobby_Idle1-1 = "無論愛麗絲還是大家，都絕對不會讓他們受傷的。"
10135-CVGroup_UICarrierLobby_Idle2-1 = "往這台自動販賣機投錢有意義嗎……？"
10135-CVGroup_UICarrierLobby_Idle3-1 = "那些孩子們的工學技術倒是值得肯定。"
10135-CVGroup_UICarrierLobby_Idle4-1 = "英美和季去進行運輸船的檢查了。"
10135-CVGroup_UICarrierLobby_Idle5-1 = "老師也別忘了休息！"
10135-CVGroup_UICarrierLobby_Idle5-2 = "還有刷牙也是！"
10135-CVGroup_UICarrierLobby_Idle6-1 = "沒有哪裡不舒服吧？"
10135-CVGroup_UICarrierLobby_Idle7-1 = "……我畢竟是姐姐，所以會忍耐。"
10135-CVGroup_UIEventShop_Enter1-1 = "這是緊急時的總力戰……之類的東西。"
10135-CVGroup_UIEventShop_Enter1-2 = "至少想提供一點支援，所以在管理店鋪。"
10135-CVGroup_UIEventShop_Enter2-1 = "請快點，老師！這邊也快撐不住了！"
10135-CVGroup_UIEventShop_Idle1-1 = "馬爾庫特……還有那個三人組……"
10135-CVGroup_UIEventShop_Idle1-2 = "真是的！都沒有人願意聽話！"
10135-CVGroup_UIEventShop_Idle2-1 = "這個結束之後……就能回去了嗎？"
10135-CVGroup_UIEventShop_Buy1-1 = "應該就在那裡才對！快點！"
10135-CVGroup_UIEventShop_Buy2-1 = "請快點選好然後回去指揮！"
10135-CVGroup_UIEventShop_Buy3-1 = "咦？想聽溫柔的話……？"
10135-CVGroup_UIEventShop_Buy3-2 = "說夢話請選一下時間跟場合！"
10135-CVGroup_UIEventShop_Buy3-3 = "真的是……沒有老師就不行了啊，我們。"
10135-CVGroup_UIEventShop_Buy4-1 = "還有其他需要的東西嗎？"
10135-CVGroup_UIEventShop_Buy4-2 = "能煩惱的時間所剩不多了。"
10135-CVGroup_UIEventMission_Enter1-1 = "堅持就是力量哦。"
10135-CVGroup_UIEventMission_Enter1-2 = "你有在聽嗎，老師？"
10135-CVGroup_UIEventMission_Enter1-3 = "我是在說，要你誠實一點哦？"
10135-CVGroup_UIEventMission_Enter2-1 = "你好，老師。"
10135-CVGroup_UIEventMission_Enter2-2 = "我整理了今天要做的事。"
10135-CVGroup_UIEventMission_Idle1-1 = "怎麼了嗎？"
10135-CVGroup_UIEventMission_Idle1-2 = "咦？只是叫叫看而已……是嗎？"
10135-CVGroup_UIEventMission_Idle1-3 = "沒事的話請不要叫我！"
10135-CVGroup_UIEventMission_Idle1-4 = "……偶爾的話，倒也可以啦。"
10135-CVGroup_UIEventMission_Idle2-1 = "我，我才不會怕癢呢！"
10135-CVGroup_UIEventMission_Idle2-2 = "怕癢什麼的，才沒有……"
10135-CVGroup_UIEventMission_Idle2-3 = "哇啊～～！！接招吧！搔癢攻擊！！"
10135-CVGroup_UIEventMission_Buy1-1 = "……好的，請收下。請帶走吧。"
10135-CVGroup_UIEventMission_Buy1-2 = "怎，怎樣啦！？想要我說什麼嗎！？"
10135-CVGroup_UIEventMission_Buy1-3 = "……做得很好，老師。"
10135-CVGroup_UIEventMission_Buy2-1 = "我也想說你差不多要來了。"
10135-CVGroup_UIEventMission_Buy2-2 = "為，為什麼要突然摸我的頭啊！？"
10135-CVGroup_UIEventMission_Buy2-3 = "……我也沒說，要你停下來。"
10135-CVGroup_UIEventMission_Interaction1-1 = "你看，想做還是能做到的不是嗎？"
10135-CVGroup_UIEventMission_Interaction1-2 = "下次也請加油哦……"
10135-CVGroup_UIEventMission_Interaction1-3 = "好嗎？"
