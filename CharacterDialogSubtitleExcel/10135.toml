[translation]
10135-CVGroup_UITitle_Idle1-1 = "해야 하는 거죠……? 블루, 아카이브."
10135-CVGroup_CharacterGet_Idle1-1 = "케이입니다.\n뭐가 기다릴 줄 알고 그렇게 서두르는지…… 뭐, 앞으로 선생님을 지켜봐 드릴 테니까요."
10135-CVGroup_Cafe_Idle1-1 = "(나도…… '학생'이야. 그러니까 카페 정도는……!)"
10135-CVGroup_Cafe_Idle2-1 = "저건…… 무슨 맛일까?"
10135-CVGroup_Cafe_Idle3-1 = "그렇구나…… 이게 나른하다는 감각……"
10135-CVGroup_Cafe_Idle4-1 = "자신의 몸을 갖는다는 건…… 조금, 불편하기도 하네요……"
10135-CVGroup_Cafe_Idle5-1 = "헤헤…… 그냥 서 있기만 해도, 좋네요……"
10135-CVGroup_WeaponGet_Idle1-1 = "먼 곳의 별빛…… 이라는 뜻이죠. 간단히 말하자면요. 그만큼 먼 과거의 시간을 의미하는 것이기도 하겠지만.\n좌표에 따라서, 과거와 미래는 동시에 존재한다고도 하니까요."
10135-CVGroup_UICarrierLobby_Enter1-1 = "첫 목표를 위한, 시작인 셈이군요."
10135-CVGroup_UICarrierLobby_Enter2-1 = "다들 어떤 걸 마시고 싶어 할까요……"
10135-CVGroup_UICarrierLobby_Enter3-1 = "이 몸, 생각보다는 제법 잘 만들었단 말이죠."
10135-CVGroup_UICarrierLobby_Enter4-1 = "다들 고생 많았어요."
10135-CVGroup_UICarrierLobby_Enter5-1 = "아리스는 잠시 자러 갔습니다."
10135-CVGroup_UICarrierLobby_Enter6-1 = "전투 휴식이라는 단어의 뜻, 알 것 같네요……"
10135-CVGroup_UICarrierLobby_Enter7-1 = "그 하얀 꼬맹이들, 진짜……!"
10135-CVGroup_UICarrierLobby_Idle1-1 = "아리스든 누구든, 다치게 내버려두지 않을 겁니다."
10135-CVGroup_UICarrierLobby_Idle2-1 = "여기 자판기, 동전을 넣는 게 의미가 있는 걸까……?"
10135-CVGroup_UICarrierLobby_Idle3-1 = "그 꼬맹이들, 공학적 결과물에 대한 것만은 인정해 주죠."
10135-CVGroup_UICarrierLobby_Idle4-1 = "에이미와 토키는, 수송선을 점검하러 갔습니다."
10135-CVGroup_UICarrierLobby_Idle5-1 = "선생님도 휴식, 잊지 마세요."
10135-CVGroup_UICarrierLobby_Idle5-2 = "양치질도요!"
10135-CVGroup_UICarrierLobby_Idle6-1 = "아픈 곳 없죠? 좋아요. 다행이네요."
10135-CVGroup_UICarrierLobby_Idle7-1 = "……더 언니인 제가 참아야죠. 네, 그럼요."
10135-CVGroup_UIEventShop_Enter1-1 = "비상 상황에서의 총력전…… 같은 것이니 말이죠."
10135-CVGroup_UIEventShop_Enter1-2 = "이렇게, 통신으로나마 상점 관리를 하는 중입니다."
10135-CVGroup_UIEventShop_Enter2-1 = "서둘러 주세요, 선생님. 여긴 급하다구요!"
10135-CVGroup_UIEventShop_Idle1-1 = "말쿠트…… 그리고 그 꼬맹이들……."
10135-CVGroup_UIEventShop_Idle1-2 = "진짜! 어느 쪽이든 사람 말을 안 듣는다니까요!"
10135-CVGroup_UIEventShop_Idle2-1 = "이것만 끝나면…… 돌아갈 수 있는 걸까요?"
10135-CVGroup_UIEventShop_Buy1-1 = "거기 있을 거예요! 어서요!"
10135-CVGroup_UIEventShop_Buy2-1 = "빨리 사고 나와서, 지휘하시라구요!"
10135-CVGroup_UIEventShop_Buy3-1 = "네? 친절한 구입 멘트 부탁한다고요?"
10135-CVGroup_UIEventShop_Buy3-2 = "좀! 때와 상황을 가려 주세요!"
10135-CVGroup_UIEventShop_Buy3-3 = "……선생님이 없으면, 우린 안 된다고요……."
10135-CVGroup_UIEventShop_Buy4-1 = "또 필요한 거 없어요?"
10135-CVGroup_UIEventShop_Buy4-2 = "아무래도 좋으니, 망설이지는 마세요."
10135-CVGroup_UIEventMission_Enter1-1 = "항상성은, 중요한 것입니다."
10135-CVGroup_UIEventMission_Enter1-2 = "듣고 계신가요, 선생님?"
10135-CVGroup_UIEventMission_Enter1-3 = "성실하셔야 한다구요!"
10135-CVGroup_UIEventMission_Enter2-1 = "잘 오셨어요. 선생님."
10135-CVGroup_UIEventMission_Enter2-2 = "그러면 오늘 할 일을 정리해 보죠."
10135-CVGroup_UIEventMission_Idle1-1 = "무슨 일이세요?"
10135-CVGroup_UIEventMission_Idle1-2 = "네? 그냥 불러 봤다고요?"
10135-CVGroup_UIEventMission_Idle1-3 = "용건 없으면 부르지 마시죠!"
10135-CVGroup_UIEventMission_Idle1-4 = "……가끔은, 뭐, 괜찮지만요."
10135-CVGroup_UIEventMission_Idle2-1 = "저, 저는 간지럼 같은 거 안 타니까요!"
10135-CVGroup_UIEventMission_Idle2-2 = "간지럼 같은 거……!"
10135-CVGroup_UIEventMission_Idle2-3 = "으아아아! 받으세요, 간지럼 어택!!!"
10135-CVGroup_UIEventMission_Buy1-1 = "……자요. 여기요. 가져가요."
10135-CVGroup_UIEventMission_Buy1-2 = "왜, 왜요?! 칭찬이라도 해 드려요!?"
10135-CVGroup_UIEventMission_Buy1-3 = "……잘하셨어요. 선생님."
10135-CVGroup_UIEventMission_Buy2-1 = "네. 지금쯤이면 해내실 줄 알았어요."
10135-CVGroup_UIEventMission_Buy2-2 = "왜 갑자기 머리를 쓰다듬는 건가요?!"
10135-CVGroup_UIEventMission_Buy2-3 = "……그만두라고는, 안 했는데요……?"
10135-CVGroup_UIEventMission_Interaction1-1 = "그것 봐요. 하면 할 수 있잖아요."
10135-CVGroup_UIEventMission_Interaction1-2 = "다음에도 힘내 주세요."
10135-CVGroup_UIEventMission_Interaction1-3 = "알겠죠?"
