[translation]
10135-CVGroup_UITitle_Idle1-1 = "I need to do this, right...? Blue Archive."
10135-CVGroup_CharacterGet_Idle1-1 = "It's Kei. I don't know why you're in such a rush, but... Fine. I'll keep looking after you, Sensei."
10135-CVGroup_Cafe_Idle1-1 = "(I'm...also a \"student.\" So I'm sure something like a Cafe would be...!)"
10135-CVGroup_Cafe_Idle2-1 = "I wonder...what that tastes like?"
10135-CVGroup_Cafe_Idle3-1 = "I see... So this is what it means to feel relaxed..."
10135-CVGroup_Cafe_Idle4-1 = "Getting my own body...has its drawbacks too..."
10135-CVGroup_Cafe_Idle5-1 = "Heehee... Just standing up feels nice..."
10135-CVGroup_WeaponGet_Idle1-1 = "It means...starlight from far away, to put it simply. Though, that may also signify time in the distant past. But they also say the past and future can coexist, depending on the coordinates."
10135-CVGroup_UICarrierLobby_Enter1-1 = "The first step to our first goal."
10135-CVGroup_UICarrierLobby_Enter2-1 = "What will everyone want to drink..."
10135-CVGroup_UICarrierLobby_Enter3-1 = "This body is better made than I expected it to be."
10135-CVGroup_UICarrierLobby_Enter4-1 = "Good work, everyone."
10135-CVGroup_UICarrierLobby_Enter5-1 = "Aris left to get some sleep."
10135-CVGroup_UICarrierLobby_Enter6-1 = "I think I can understand what respite means now..."
10135-CVGroup_UICarrierLobby_Enter7-1 = "Those pale brats, seriously...!"
10135-CVGroup_UICarrierLobby_Idle1-1 = "Whether it's Aris or the others, I won't let anyone get hurt."
10135-CVGroup_UICarrierLobby_Idle2-1 = "Is there any point in having to put coins into this vending machine?"
10135-CVGroup_UICarrierLobby_Idle3-1 = "Those brats. They have some skill in engineering, I'll relent on that much."
10135-CVGroup_UICarrierLobby_Idle4-1 = "Eimi and Toki are conducting regular maintenance on the ship."
10135-CVGroup_UICarrierLobby_Idle5-1 = "Don't forget to rest when you can, Sensei."
10135-CVGroup_UICarrierLobby_Idle5-2 = "And to brush your teeth!"
10135-CVGroup_UICarrierLobby_Idle6-1 = "You're not hurt anywhere, right? Great. That's a relief."
10135-CVGroup_UICarrierLobby_Idle7-1 = "...I should hold back since I'm older. Yes, that's right."
10135-CVGroup_UIEventShop_Enter1-1 = "It's something like...a Total Assault in a state of emergency."
10135-CVGroup_UIEventShop_Enter1-2 = "I'm managing the shop, even if it is remotely."
10135-CVGroup_UIEventShop_Enter2-1 = "Please hurry, Sensei. I have an emergency on this side!"
10135-CVGroup_UIEventShop_Idle1-1 = "Malkuth... And those brats..."
10135-CVGroup_UIEventShop_Idle1-2 = "Seriously! No one listens to anyone around here!"
10135-CVGroup_UIEventShop_Idle2-1 = "When it's all over... Do you think that we'll be able to get back?"
10135-CVGroup_UIEventShop_Buy1-1 = "It should be there! Hurry!"
10135-CVGroup_UIEventShop_Buy2-1 = "Hurry and make your purchase, then get back to command!"
10135-CVGroup_UIEventShop_Buy3-1 = "What? You want my sales greeting to be nicer?"
10135-CVGroup_UIEventShop_Buy3-2 = "Geez! There's a time and place for everything!"
10135-CVGroup_UIEventShop_Buy3-3 = "We can't do this without Sensei..."
10135-CVGroup_UIEventShop_Buy4-1 = "Is there anything else you need?"
10135-CVGroup_UIEventShop_Buy4-2 = "Whatever you need, don't hesitate to ask."
10135-CVGroup_UIEventMission_Enter1-1 = "It's important to stay consistent."
10135-CVGroup_UIEventMission_Enter1-2 = "Are you listening, Sensei?"
10135-CVGroup_UIEventMission_Enter1-3 = "You need to be diligent!"
10135-CVGroup_UIEventMission_Enter2-1 = "Welcome, Sensei."
10135-CVGroup_UIEventMission_Enter2-2 = "Let's organize what we need to do today."
10135-CVGroup_UIEventMission_Idle1-1 = "What's going on?"
10135-CVGroup_UIEventMission_Idle1-2 = "What? You called me for no reason?"
10135-CVGroup_UIEventMission_Idle1-3 = "Don't call me if you have nothing to talk about!"
10135-CVGroup_UIEventMission_Idle1-4 = "...Once in a while is fine, though, I guess."
10135-CVGroup_UIEventMission_Idle2-1 = "I-I'm not ticklish at all!"
10135-CVGroup_UIEventMission_Idle2-2 = "I'm not ticklish...!"
10135-CVGroup_UIEventMission_Idle2-3 = "AAAHHH! Take this! TICKLE ATTACK!!"
10135-CVGroup_UIEventMission_Buy1-1 = "...Here. Go ahead. Take it."
10135-CVGroup_UIEventMission_Buy1-2 = "Wh-What now?! You want a compliment or something?!"
10135-CVGroup_UIEventMission_Buy1-3 = "...Good job, Sensei."
10135-CVGroup_UIEventMission_Buy2-1 = "Yes. I knew you'd pull it off in no time."
10135-CVGroup_UIEventMission_Buy2-2 = "Why are you patting my head all of a sudden?!"
10135-CVGroup_UIEventMission_Buy2-3 = "...I didn't tell you to stop, though...?"
10135-CVGroup_UIEventMission_Interaction1-1 = "Look at that. I knew you could do it."
10135-CVGroup_UIEventMission_Interaction1-2 = "Do your best next time too."
10135-CVGroup_UIEventMission_Interaction1-3 = "Okay?"
