[translation]
10064-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10064-CVGroup_CharacterGet_Idle1-1 = "ปีใหม่ทั้งที... ฉันแค่ใส่ชุดใหม่เฉยๆ\nปีนี้ก็ฝากด้วยนะครู"
10064-CVGroup_Cafe_Idle1-1 = "ปีนี้ก็หวังว่า... จะไม่มีปัญหา... ในหลายๆ เรื่องนะ"
10064-CVGroup_Cafe_Idle2-1 = "เฮ้อ... มีเรื่องให้คิดเยอะเลย"
10064-CVGroup_Cafe_Idle3-1 = "ถ้าจะให้พูดตรงๆ เลยละก็\nขอให้สุขภาพดี มีความสงบสุข ขอแค่นั้นจริงๆ"
10064-CVGroup_Cafe_Idle4-1 = "ถ้ามีแต่เรื่องที่เราหาทางออกได้ก็คงดี"
10064-CVGroup_Cafe_Idle5-1 = "ฉันชอบชุดนี้อยู่นะ มันก็ไม่ได้ดูแย่อะไร"
10064-CVGroup_WeaponGet_Idle1-1 = "ครูโอเคแน่นะ...? ไม่สิ... ไม่ใช่สิ\nฉันจะพยายามไม่ทำให้ครูผิดหวังนะ"
10064-CVGroup_UIEventLobby_Enter1-1 = "เหนื่อยหน่อยนะ ครู\nดีจังที่ได้เจอครูที่งานเทศกาลแบบนี้ด้วย"
10064-CVGroup_UIEventLobby_Enter2-1 = "ขอพรเสร็จแล้วเหรอ?"
10064-CVGroup_UIEventLobby_Enter2-2 = "ถึงทุกสิ่งทุกอย่างที่เกิดขึ้นจะไม่เป็นไปตามที่คิดก็จริง"
10064-CVGroup_UIEventLobby_Enter2-3 = "แต่การขอพรก็เป็นสิ่งที่ทำได้ตามที่ต้องการนี่นะ"
10064-CVGroup_UIEventLobby_Idle1-1 = "ปีนี้ก็ขอให้มีแต่วันที่สงบสุขเหมือนเดิมนะ"
10064-CVGroup_UIEventLobby_Idle2-1 = "ใช้เงินที่เก็บไว้สำหรับซื้ออัลบั้มใหม่ขอพรไปหมดแล้ว\nจะไม่เป็นไรแน่งั้นเหรอ?"
10064-CVGroup_UIEventLobby_Idle2-2 = "ก็นะ... ถึงมันจะดูเป็นการทำเกินตัวไปหน่อยก็เถอะ"
10064-CVGroup_UIEventLobby_Idle2-3 = "แต่แลกกับรอยยิ้มของประธานแบบนั้นละก็\nถือว่าเป็นราคาที่ไม่ได้แพงอะไรเลยละ"
10064-CVGroup_UIEventLobby_Idle3-1 = "ช่วงนี้ฮารุกะ... ดูเหมือนจะฝืนเกินตัวไปอยู่สักหน่อย"
10064-CVGroup_UIEventLobby_Idle3-2 = "จะเป็นอะไรรึเปล่านะ..."
10064-CVGroup_UIEventLobby_Idle4-1 = "(...พวกแก๊งคุโระกาเมะ รู้สึกสังหรณ์ใจไม่ดีเลยแฮะ...)"
10064-CVGroup_UIEventLobby_Enter3-1 = "รู้สึกได้กลิ่น... อะไรไม่ดีเลย..."
10064-CVGroup_UIEventLobby_Enter4-1 = "ตู้บริจาคโดนขโมยไปงั้นเหรอ..."
10064-CVGroup_UIEventLobby_Enter4-2 = "ฉันไม่ได้อยากจะเข้าไปพัวพันกับเรื่องน่ารำคาญหรอก..."
10064-CVGroup_UIEventLobby_Enter4-3 = "แต่ถ้าเป็นคำสั่งของประธานก็คงช่วยไม่ได้ละนะ"
10064-CVGroup_UIEventLobby_Enter5-1 = "เฮ้อ... วุ่นวายกันจริงๆ เลยแฮะ"
10064-CVGroup_UIEventLobby_Enter5-2 = "แถมตอนท้ายก็ยังต้องปะทะ\nกับหุ่นยนต์ประหลาดพวกนั้นอีก..."
10064-CVGroup_UIEventLobby_Enter5-3 = "แต่ว่า... พอเกิดเรื่องแบบนั้น\nก็ไม่ได้รู้สึกเบื่อเลย"
10064-CVGroup_UIEventMission_Enter1-1 = "ครูมาพอดีเลยนะ\nฉันมีเรื่องที่อยากจะขอความช่วยเหลือจากครูน่ะ"
10064-CVGroup_UIEventMission_Enter2-1 = "ขอโทษที่มีเรื่องรบกวนตั้งแต่วันปีใหม่แบบนี้...\nแต่ขอเวลาหน่อยได้รึเปล่า?"
10064-CVGroup_UIEventMission_Idle1-1 = "หน่วยรับจ้างสารพัดมีเรื่องไหว้วานคุณครูแบบนี้..."
10064-CVGroup_UIEventMission_Idle1-2 = "พอบทบาทสลับกันแบบนี้...\nก็รู้สึกแปลกๆ เหมือนกันนะ"
10064-CVGroup_UIEventMission_Idle2-1 = "โทษที ฉันไม่เหมือนมุสึกิหรอก\nไม่ค่อยชินกับเรื่องแบบนี้เท่าไรน่ะ..."
10064-CVGroup_UIEventMission_Idle2-2 = "ในเวลาแบบนี้ คือว่า... ฉันไม่รู้เลย\nควรจะต้องทำหน้ายังไงดี..."
10064-CVGroup_UIEventMission_Buy1-1 = "ขอบคุณที่ช่วยนะ เอ้านี่ ถึงตาของหน่วยรับจ้างสารพัด 68 แล้ว"
10064-CVGroup_UIEventMission_Buy2-1 = "ขอบคุณนะ รอดมาได้เพราะได้ครูช่วยเอาไว้เลย"
10064-CVGroup_UIEventMission_Interaction1-1 = "วันนี้พอเท่านี้ดีมั้ยนะ ถ้าเป็นแบบนี้\nพวกคนงี่เง่าที่งานก็คงจะยอมแพ้ไปแล้วละมั้ง"
