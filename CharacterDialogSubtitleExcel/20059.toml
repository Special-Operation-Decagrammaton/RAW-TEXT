[translation]
20059-CVGroup_UITitle_Idle1-1 = "블루 아카이브! 쿠후훗!"
20059-CVGroup_CharacterGet_Idle1-1 = "쿠후훗, 무츠키 쨩 대변~신!\n자, 뭐가 필요해? 뭐든 말해보라구!"
20059-CVGroup_Cafe_Idle1-1 = "여기서 모두랑\n드레스 파티\n하고 싶다~"
20059-CVGroup_Cafe_Idle2-1 = "쿠후후,\n이게\n선생님 취향인 거지?"
20059-CVGroup_Cafe_Idle3-1 = "누가\n놀아주지 않으려나~?"
20059-CVGroup_Cafe_Idle4-1 = "어라, 살짝 만져주면\n재밌을 것 같아♪"
20059-CVGroup_Cafe_Idle5-1 = "역시 여긴 즐거워!\n이유는 모르겠지만!"
20059-CVGroup_WeaponGet_Idle1-1 = "응♪ 기다리고 있었어!\n나는 이 손맛이 좋거든!"
20059-CVGroup_UIEventLobby_Enter1-1 = "자아, 어떤 사건이\n우릴 기다리고 있을까?"
20059-CVGroup_UIEventLobby_Enter2-1 = "이번 일도 엄청\n재밌을 것 같아! 그치?"
20059-CVGroup_UIEventLobby_Idle1-1 = "장난은 실전처럼!\n실전은 장난처럼♪"
20059-CVGroup_UIEventLobby_Idle2-1 = "흐응~? 잠입 경로는\n저쪽일까나?"
20059-CVGroup_UIEventLobby_Idle3-1 = "왜에? 무츠키 쨩이랑\n놀고 싶어? 쿠후훗."
20059-CVGroup_UIEventLobby_Idle4-1 = "이번 일 끝나면,\n같이 오페라를 보러 가자!\n분명 즐거울 거야♪"
