2923636030-DescriptionTh = "ฉากกั้นสีเงินที่ช่วยเพิ่มบรรยากาศรอบข้างให้ดูเท่ๆ"
3347896372-NameTh = "ฉากกั้นสีทอง"
3347896372-DescriptionTh = "ฉากกั้นสีทองที่ช่วยเพิ่มบรรยากาศรอบข้างให้ดูหรูหรา"
93532265-NameTh = "โซฟาธรรมชาติ แสนสดชื่น"
93532265-DescriptionTh = "โซฟาดีไซน์เรียบๆ ทั่วไปสำหรับพักผ่อน โทนสีฟ้าช่วยให้ผู้ที่มานั่งพักผ่อนคลายมากขึ้น"
3655403000-NameTh = "สปอร์ตไลต์"
3655403000-DescriptionTh = "สปอร์ตไลต์ที่ช่วยทำให้สินค้าดูดีขึ้นได้ทันตา สินค้าที่นำไปวางแล้วฉายสปอร์ตไลต์ใส่มักจะขายหมด"
2506675602-NameTh = "โต๊ะขนาดใหญ่"
2506675602-DescriptionTh = "โต๊ะขนาดใหญ่ดีไซน์เรียบง่าย นำไปจัดวางเข้ากับเฟอร์นิเจอร์อื่นๆ ได้อย่างลงตัว"
3920217594-NameTh = "ของแต่งผนังนีออน MOMO FRIENDS"
3920217594-DescriptionTh = "ของแต่งผนังนีออน MOMO FRIENDS ที่ดูน่ารักและทันสมัยมาก เป็นอีกหนึ่งในของยอดฮิต!"
2425908298-NameTh = "เสาทั่วไป"
2425908298-DescriptionTh = "เสาทั่วไปโทนสีขาวดำที่แสดงถึงความเรียบหรู\nและดูมีภูมิฐาน"
411585928-NameTh = "ชั้นวางหนังสือรวมความรู้"
411585928-DescriptionTh = "ชั้นวางหนังสือสำหรับลูกค้าที่ต้องการข้อมูลระหว่าง\nหาซื้อสินค้า มีหนังสือหลากหลายประเภทตั้งแต่\nหนังสือแฟชั่น ไปจนถึงหนังสือเศรษฐศาสตร์"
3855951081-NameTh = "โซฟาเอเลแกนท์สุดน่ารัก"
3855951081-DescriptionTh = "ความหรูหรากับความน่ารักจะเข้ากันได้หรือไม่? หากคุณสงสัยละก็ โซฟาที่เป็นที่ต้องการของทุกคนอันนี้คือคำตอบ "
988814768-NameTh = "ราวแขวนเสื้อ MOMO FRIENDS"
988814768-DescriptionTh = "ราวแขวนเสื้อผ้า MOMO FRIENDS ที่มีทุกอย่างพร้อมสรรพตั้งแต่ เสื้อผ้า หมวก และรองเท้าสลิปเปอร์ของเหล่า MOMO FRIENDS"
3766457455-NameTh = "ห้องเปลี่ยนชุดสุดหรู"
3766457455-DescriptionTh = "จะเปลี่ยนอีกกี่ชุดก็ไม่หวั่น! ห้องเปลี่ยนชุดสุดหรู\nที่ให้คุณสามารถเปลี่ยนชุดได้ตามสบาย"
3091049367-NameTh = "แท่นวางผลไม้ตัวอย่าง"
3091049367-DescriptionTh = "แท่นวางผลไม้ที่อัดแน่นไปด้วยผลไม้ชนิดต่างๆ แค่อยู่ใกล้ๆ ก็จะได้กลิ่นหอมหวานของผลไม้"
3221041640-NameTh = "เนเจอร์ การ์เด้น"
3221041640-DescriptionTh = "เนเจอร์ การ์เด้นที่ช่วยให้สัมผัสถึงความงดงาม\nของธรรมชาติได้ ทำให้บรรยากาศรอบข้างดูสดชื่น"
3195263895-NameTh = "เครื่องคีออสสุดทันสมัย"
3195263895-DescriptionTh = "ถ้าเดินช้อปแล้วหลงทางละก็ มาที่เครื่องนี้สิ! เครื่องคีออสสุดทันสมัยจะช่วยพาคุณไปทุกที่ที่ต้องการ"
1303798775-NameTh = "ฉากกั้นลาย MOMO FRIENDS"
1303798775-DescriptionTh = "เหล่าผองเพื่อน MOMO FRIENDS ในรูปแบบฉากกั้น! นำไปกั้นพื้นที่และเสริมความน่ารักไปในตัว"
362684567-NameTh = "แท่นวางน้ำหอม เอเลแกนท์"
362684567-DescriptionTh = "แท่นวางน้ำหอมสุดเอเลแกนท์ที่จะทำให้คุณสัมผัส\nได้ถึงกลิ่นหอมเย้ายวนและแพ็กเกจจิ้งสุดหรู\nแค่เข้าไปใกล้ก็ได้กลิ่นหอมเย้ายวน"
1456098985-NameTh = "ชั้นวางรองเท้า เอเลแกนท์"
1456098985-DescriptionTh = "แท่นวางรองเท้าสุดเอเลแกนท์สำหรับนำไปวางโชว์\nตรงมุมห้องได้ โดดเด่นในเรื่องประโยชน์การใช้สอย\nและเรื่องความสวยงาม"
935678649-NameTh = "แท่นวางกระเป๋า เอเลแกนท์"
935678649-DescriptionTh = "แท่นวางกระเป๋าเอเลแกนท์ที่นำไปวางโชว์ที่มุมห้องได้ โดดเด่นในเรื่องประโยชน์การใช้สอย"
3624370282-NameTh = "ชั้นวางเสื้อผ้า เอเลแกนท์"
3624370282-DescriptionTh = "ชั้นวางเสื้อผ้าสุดเอเลแกนท์ที่ชั้นบนล่างเป็นพื้นที่\nสำหรับเก็บเสื้อผ้า และเก็บเครื่องประดับได้ที่ชั้นบน"
2104197048-NameTh = "ชั้นวางสินค้าแบรนด์เนม เอเลแกนท์"
