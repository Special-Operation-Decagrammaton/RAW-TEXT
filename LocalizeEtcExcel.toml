1844419868-NameTh = "กุญแจความปลอดภัย"
1844419868-DescriptionTh = "กุญแจความปลอดภัย ใช้ยืนยันเมื่อเปิดประตูรักษาความปลอดภัยหรือปลดล็อก นี่คือของสำคัญที่ห้ามทำหายเด็ดขาด ดังนั้นโปรดส่งคืนเจ้าของหลังใช้งาน แน่นอนว่าต้องแอบไม่ให้ถูกจับได้... ตอนนี้ก็เอามาใช้ก่อน"
3949011075-NameTh = "USB"
3949011075-DescriptionTh = "USB พิเศษที่สามารถใช้ได้ในหลายวัตถุประสงค์ ในสมัยก่อนจะใช้เป็นตราประทับที่ทำจากไม้หรือหยก แต่ได้ปรับเปลี่ยนไปตามยุคสมัย"
1153341951-NameTh = "OTP"
1153341951-DescriptionTh = "อุปกรณ์ตรวจสอบ ออกแบบมาสำหรับระบบรักษาความปลอดภัยที่แน่นหนา หากไม่มีสิ่งนี้ ก็จะปลดล็อกระบบรักษาความปลอดภัยไม่ได้ แม้จะรู้รหัสผ่านก็ตาม แน่นอนว่าถ้าแค่มีสิ่งนี้ก็จะ..."
3426576768-NameTh = "ยารักษา"
3426576768-DescriptionTh = "ยาที่ช่วยฟื้นฟูร่างกายที่อ่อนเพลียหรือบาดแผลเล็กน้อย ไม่สามารถใช้กับภาวะอ่อนเพลียเรื้อรังหรือบาดแผลใหญ่ได้ พยายามไม่ให้ได้รับบาดเจ็บแต่แรกดีกว่า"
282905937-NameTh = "คีมตัดลวด"
282905937-DescriptionTh = "คีมตัดที่ใช้แยกชิ้นส่วนต่างๆ เช่น กล้องวงจรปิด ระเบิดเคลย์มอร์ เป็นเครื่องมือที่คมกริบเพื่อการทำงานที่ความแม่นยำ แต่ก็สึกหรอได้เร็ว จึงใช้งานซ้ำได้ไม่กี่ครั้ง ดังนั้นเลือกใช้กับของที่ต้องการแยกชิ้นส่วนให้ดี"
2775830511-NameTh = "เครื่องส่งเสียงรบกวน"
2775830511-DescriptionTh = "เครื่องส่งเสียงรบกวน ออกแบบมาเพื่อใช้รับมือกับเหตุฉุกเฉินในระหว่างปฏิบัติการ เมื่อจนมุมหรือเสี่ยงที่จะถูกเจอตัว สามารถใช้ดึงความสนใจไปที่อื่นได้ เปิดเครื่องแล้วอย่าลืมรีบหลบไปด้านตรงข้าม"
1728300996-NameTh = "กระสุนเก็บเสียง"
1728300996-DescriptionTh = "กระสุนเก็บเสียงสำหรับใช้ในกรณีที่ไม่มีตัวเก็บเสียง หรือติดตั้งตัวเก็บเสียงไม่ได้ ตัวกระสุนเองนั้นแทบจะไร้เสียง ความร้อนที่เกิดขึ้นขณะที่ยิงและถูกยิงก็ลดลงอย่างรวดเร็วเช่นกัน แม้จะรุนแรงน้อยกว่ากระสุนปกติอยู่บ้าง แต่ก็ใช้งานได้ดีในภารกิจแฝงตัว"
3964788977-NameTh = "เครื่องสื่อสารไร้สาย"
3964788977-DescriptionTh = "เครื่องสื่อสารไร้สายประสิทธิภาพสูง เอาไว้ตัดสิ่งรบกวนส่วนใหญ่ได้ แม้ว่าถูกสร้างมาเพื่อปฏิบัติการแฝงตัว แต่มีขนาดค่อนข้างใหญ่และหนัก เพราะเน้นไปที่ประสิทธิภาพด้านสื่อสารมากกว่า ด้วยอินเทอร์เฟซที่ใหญ่และเรียบง่าย ทุกคนเลยใช้งานได้ แม้จะไม่ใช่นักเรียนมิลเลเนียมก็ตาม"
1383315036-NameTh = "กล่องอาร์จินีน"
1383315036-DescriptionTh = "กล่องใส่อาหารสำหรับผู้ออกกำลังกาย มีขนาดใหญ่พอที่คนตัวเล็กๆ จะเข้าไปได้ แถมยังมีช่องด้านในให้มองออกไปด้านนอกด้วย! เหมาะจะใช้ในการแฝงตัวที่สุด"
2125430007-NameTh = "เครื่องสแกนของริโอะ"
2125430007-DescriptionTh = "อุปกรณ์ไฮเทคที่ใช้สแกนบริเวณรอบๆ เพื่อตรวจหาวัตถุที่น่าสงสัย ใช้งานโดยการสวมหูฟัง และขยับเครื่องตรวจจับ กลไกการทำงานยังไม่ชัดเจน แต่มีประสิทธิภาพแน่นอน"
3106820832-NameTh = "แผ่นสำหรับตีโดยเฉพาะ"
3106820832-DescriptionTh = "แผ่นที่ใช้สำหรับตีโดยเฉพาะ ถูกออกแบบให้โดนตรงด้านหลังศีรษะ แทนที่จะเป็นไหล่ เมื่อต่อยใส่มัน มันจะส่งแรงกระแทกไปยังเป้าหมาย แบบเงียบกริบจนน่าประหลาดใจ"
4092727589-NameTh = "แผ่นรองเข่าเคลือบสีพิเศษ"
4092727589-DescriptionTh = "แผ่นรองเข่าชนิดพิเศษ ช่วยให้เคลื่อนที่\nโดยลากเข่าไปกับพื้นได้อย่างรวดเร็วและไร้เสียง เนื่องจากไม่ได้มีคุณสมบัติพิเศษ ประสิทธิภาพจึงแตกต่างไปตามทักษะ และความสามารถของผู้ใช้"
3328636483-NameTh = "ใช้กล่องเพื่อเข้าใกล้แก๊งหมวกกันน็อกโดยไม่ให้ถูกพบ"
3328636483-DescriptionTh = "เข้าใกล้แก๊งหมวกกันน็อกและแอบฟังบทสนทนา เมื่อใช้กล่องจะเข้าใกล้ได้โดยไม่ถูกตรวจพบ"
2007212476-NameTh = "หลบโดรนและผ่านประตูรักษาความปลอดภัย"
2007212476-DescriptionTh = "หลบโดรนที่ดูแลดาต้าเซ็นเตอร์ และผ่านประตูรักษาความปลอดภัย สามารถฟื้นฟู HP ได้โดยใช้ยารักษา"
14774070-NameTh = "หลบโดรนและแอบเข้าห้องบิ๊กซิสเตอร์"
14774070-DescriptionTh = "หลบโดรนที่คุ้มกันดาต้าเซ็นเตอร์ และแอบเข้าห้องบิ๊กซิสเตอร์ สามารถบันทึกความคืบหน้าได้ โดยใช้หุ่นยนต์ลูกสุนัขของริโอะ"
3457439688-NameTh = "ค้นหาและกู้คืนสิ่งของอันตราย"
3457439688-DescriptionTh = "ค้นหาและกู้คืนของอันตรายที่ถูกโชว์ไว้ในฮอลล์จัดแสดง ค้นหาสิ่งของที่ซ่อนอยู่ได้ โดยใช้เครื่องสแกนในมือเซอา"
1369763957-NameTh = "จับหัวหน้าแก๊งหมวกกันน็อก"
1369763957-DescriptionTh = "จับหัวหน้าแก๊งหมวกกันน็อกที่ขโมยของในฮอลล์จัดแสดง โดยใช้แผ่นยางพิเศษเพื่อซุ่มจับได้"
4069660877-NameTh = "ค้นหาผู้บุกรุกในบูธชมรมพัฒนาเกม"
4069660877-DescriptionTh = "ค้นหาผู้บุกรุกที่มาบุกรุกบูธชมรมพัฒนาเกม โดยเพิ่มการทำงานพร้อมๆ กัน เพื่อฝ่าระบบรักษาความปลอดภัย"
4201274762-NameTh = "ปิดอุปกรณ์ที่ทำงานผิดปกติ"
4201274762-DescriptionTh = "ปิดแหล่งพลังงงานของอุปกรณ์ที่เกิดการทำงานผิดปกติ ด้วยแผงสวิทช์ไฟฟ้า โดยใช้แผ่นรองเข่า เพื่อช่วยให้เคลื่อนไหวได้อย่างรวดเร็ว โดยไม่ถูกตรวจจับ"
2555313209-NameTh = "หลบหนีสึมิเระกับแก๊งหมวกกันน็อก"
2555313209-DescriptionTh = "หลบหนีจากสึมิเระและแก๊งหมวกกันน็อกใน\nฮอลล์จัดแสดง ซ่อนตัวอยู่ในตู้จะช่วยไม่ให้สึมิเระ และแก๊งหมวกกันน็อกตรวจพบได้"
3441326232-NameTh = "หลบหนีระบบรักษาความปลอดภัย"
3441326232-DescriptionTh = "หลบหนีจากระบบรักษาความปลอดภัยที่ทำงาน\nอยู่ในฮอลล์จัดแสดง ต้องหลบหนีอย่างรวดเร็ว เพื่อหลบก๊าซที่เป็นอันตราย"
2202660611-NameTh = "หลบหนีจากจระเข้จักรกล"
2202660611-DescriptionTh = "หลบหนีจากจระเข้จักรกลวิ่งเร็วในฮอลล์\nจัดแสดง ใช้ตู้ขายของอัตโนมัติเพื่อชะลอ\nความเร็วของจระเข้จักรกลได้"
