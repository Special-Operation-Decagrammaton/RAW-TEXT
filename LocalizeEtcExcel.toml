1585717654-DescriptionKr = "아비도스 학생에게 주어지는 학생 캐비닛. 내부를 꾸미는 것은 각자의 즐거운 자유."
1946673948-NameKr = "아비도스 교실 수납장"
1946673948-DescriptionKr = "교실에 필요한 물품들을 수납해둘 수 있는 교실 수납장, 색 배치가 귀엽다."
