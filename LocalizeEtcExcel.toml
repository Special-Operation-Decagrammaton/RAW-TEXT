446242235-NameTh = "กล่องปลาสดใหม่!"
446242235-DescriptionTh = "กล่องที่ใส่ปลาไว้แน่นเต็มกล่อง หากไม่ถือให้ดีๆ ปลาอาจโดดหนีออกมาได้!"
3436380027-NameTh = "ชั้นวางอุปกรณ์ดำน้ำ"
3436380027-DescriptionTh = "ชั้นที่ใช้เก็บอุปกรณ์ที่จำเป็นสำหรับการดำน้ำ ให้คุณพร้อมกระโดดลงน้ำได้ทุกเมื่อ!"
