120965197-DescriptionTh = "ข้อมูลบทวิเคราะห์เดคาแกรมมาทอน"
3308377822-NameTh = "แต้มเปิดรับ"
3308377822-DescriptionTh = "※ในช่วงระยะเวลาตู้เพิ่มเรท คุณจะได้รับแต้มเปิดรับทุกครั้งที่เปิด\nเมื่อรวบรวมแต้มเปิดรับได้ครบ คุณสามารถรับนักเรียนในตู้เพิ่มเรทได้\n※ถ้าหมดช่วงเวลาของตู้เพิ่มเรท สามารถแลกแต้มเป็นเศษคีย์สโตนได้"
196124168-NameTh = "เหรียญแกรนด์เรดบอสขั้นสูง"
196124168-DescriptionTh = "เหรียญขั้นสูงที่ใช้ซื้อไอเทมในร้านแกรนด์เรดบอส"
376882766-NameTh = "แต้มหวนคืน"
376882766-DescriptionTh = "※เมื่อเปิดรับจะได้รับแต้มหวนคืน และสามารถรวบรวมแต้มหวนคืนเพื่อแลกรับนักเรียนที่เลือกได้ หลังสิ้นสุดระยะเวลาเพิ่มเรทเปิดรับ แต้มที่มีจะถูกเปลี่ยนเป็นเศษคีย์สโตน\n[c][ff2d2c]แต้มหวนคืนจะไม่สะสมรวมกับแต้มที่ได้รับจากการเปิดรับประเภทอื่น ซึ่งแตกต่างจากแต้มการเปิดรับปกติและแต้มเปิดรับอาร์ไคฟ์[-][/c]"
2814968857-NameTh = "แต้มความทรงจำ"
2814968857-DescriptionTh = "※เมื่อเปิดรับจะได้รับแต้มความทรงจำ และสามารถรวบรวมแต้มความทรงจำเพื่อแลกรับนักเรียนที่เลือกได้ หลังสิ้นสุดระยะเวลาเพิ่มเรทเปิดรับ แต้มที่มีจะถูกเปลี่ยนเป็นเศษคีย์สโตน\n[c][ff2d2c]แต้มความทรงจำจะต่างจากแต้มเปิดรับกับแต้มอาร์ไคฟ์ ตรงที่ไม่สามารถสะสมรวมกับแต้มเปิดรับที่ได้รับจากการเปิดรับอื่นได้[-][/c]"
2803570054-NameTh = "แต้มอาร์ไคฟ์"
2803570054-DescriptionTh = "※ในช่วงระยะเวลาตู้เพิ่มเรท คุณจะได้รับแต้มอาร์ไคฟ์ทุกครั้งที่เปิด เมื่อรวบรวมแต้มอาร์ไคฟ์ได้ครบ คุณสามารถรับนักเรียนในตู้อาร์ไคฟ์ได้"
3125687171-NameTh = "เหรียญอารีน่า"
3125687171-DescriptionTh = "เหรียญที่ใช้ซื้อไอเทมในร้านอารีน่า"
471603600-NameTh = "คีย์สโตนเร่งการรวม\nขั้นต่ำ"
471603600-DescriptionTh = "คีย์สโตนเร่งปฏิกิริยาขั้นต่ำ ใช้รวมวัตถุในคราฟต์แชมเบอร์"
284088691-NameTh = "แต้มกิจกรรม"
284088691-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
3146510308-NameTh = "เซ็มเบจิ้งจอก"
3146510308-DescriptionTh = "สินค้าชื่อดังประจำงานเทศกาลเฮียกคิยาโค ถ้ากัดสักคำจะได้ลิ้มรสความกรอบ และรสชาติชั้นเยี่ยม!"
1959694325-NameTh = "โอโคโนมิยากิแร็กคูน"
1959694325-DescriptionTh = "อาหารที่ห้ามพลาดในงานเทศกาลเฮียกคิยาโค ราดมายองเนสรูปแร็กคูนที่น่ารักเกินต้านทาน"
2308340710-NameTh = "ไดฟุกุซากุระ"
2308340710-DescriptionTh = "ของหวานที่วางขายประจำร้านเฮียกคิยาโค ร้านน้ำชาดั้งเดิมของเฮียกคิยาโค ความหวานที่ทั้งละมุนและเข้มข้นนี้ เรียกได้ว่าสุดยอดเลยทีเดียว"
2902974760-NameTh = "ตุ๊กตาแม่ลูกดกเชริโน่"
2902974760-DescriptionTh = "ตุ๊กตาแม่ลูกดกที่สร้างตามท่าทางที่สง่างามของเชริโน่ ทุกครั้งที่เขย่าจะมีเสียงบางอย่างก็อกแก๊กอยู่ข้างใน"
904092714-NameTh = "ช็อกโกแลตเชริโน่"
904092714-DescriptionTh = "ช็อกโกแลตนมที่ผลิตในชมรมโภชนาการเรดวินเทอร์ มีรสสัมผัสที่หวานนุ่ม แต่นักเรียนคนอื่นๆ คิดว่ามันแข็งและกินยาก"
2871602548-NameTh = "เครปครีมหนวด"
2871602548-DescriptionTh = "เครปนุ่มรสหวาน มีวางขายอยู่ทั่วสหภาพเรดวินเทอร์ ในสหภาพนี้จะเรียกว่า 'บลิน' ครีมรูปหนวดที่ใช้ตกแต่งนี้ ต้องผ่านการตรวจสอบของเชริโน่ถึงใช้ได้"
3168602557-NameTh = "เหรียญตราหนวดขาว"
3168602557-DescriptionTh = "เหรียญตราที่สร้างจากอัญมณีและทองสุดหรูหรา มีเพียงนักเรียนที่เชริโน่ยอมรับเท่านั้นถึงจะได้รับเหรียญตรานี้ ส่วนใหญ่จะถูกเก็บไว้ลึกในโต๊ะเพราะถ้าถูกมุมขูดอาจบาดเจ็บได้"
532264540-NameTh = "แต้มกิจกรรม"
532264540-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
3071036351-NameTh = "ลูกวอลเลย์บอลชายหาด"
3071036351-DescriptionTh = "ลูกวอลเลย์บอลชายหาดสุดน่ารัก"
589252219-NameTh = "คูปองอาหารร้านริมทะเล"
589252219-DescriptionTh = "คูปองอาหารร้านริมทะเลเก่า ใช้แลกรับอาหารในร้านริมทะเลได้"
3265516866-NameTh = "ดอกไม้ไฟประหลาด"
3265516866-DescriptionTh = "รูปร่างคล้ายมิสไซล์สไตล์น่ารัก"
4230562605-NameTh = "กล่องแช่เย็น"
4230562605-DescriptionTh = "กล่องแช่เย็นที่ช่วยให้ผลไม้ และเครื่องดื่มคงความเย็นสดชื่นไว้ ใช้เก็บรักษาอาวุธที่ไวต่ออุณหภูมิ ได้เป็นอย่างดี"
182033757-NameTh = "เซ็ตเล่นทราย"
182033757-DescriptionTh = "เซ็ตเล่นทรายที่รวมอุปกรณ์สร้างปราสาททรายไว้ แต่ไม่มีคอนกรีตและเหล็กเส้นนะ"
3004794592-NameTh = "เก้าอี้ชายหาด"
3004794592-DescriptionTh = "เก้าอี้ชายหาดแบบโมเดิร์น ทำจากผ้าผืนนุ่มวางบนเก้าอี้ไม้ เป็นวัสดุกันน้ำ ใช้งานบนชายหาดได้อย่างไร้กังวล"
2064901758-NameTh = "โต๊ะร่มบังแดด"
2064901758-DescriptionTh = "โต๊ะไม้ที่มีร่มบังแดดไว้สำหรับกันแดด ใช้จิบชาริมหาด ห้ามพลาดสำหรับสาวสวย"
1274276475-NameTh = "อุปกรณ์เล่นน้ำ"
1274276475-DescriptionTh = "อุปกรณ์เล่นน้ำแบบจริงจัง มีสน็อร์กเกิลและเครื่องช่วยหายใจ ไม่แนะนำให้ใช้ในน้ำลึกต่ำกว่า 50 เมตร"
1644359218-NameTh = "บอร์ดวินเซิร์ฟ"
1644359218-DescriptionTh = "บอร์ดที่สามารถเร่งความเร็วได้โดยการติดใบเรือ ทรงตัวได้ง่าย แม้แต่มือใหม่ก็สามารถใช้งานได้ง่ายๆ"
886310733-NameTh = "กล่องเสบียง ตราเกเฮนน่า"
886310733-DescriptionTh = "กล่องเสบียงที่คณะกรรมการวินัยเตรียมไว้ ใช้สำหรับแคมป์ฤดูร้อน ข้างในมีของที่จะช่วยในการฝึกฝนอยู่ วางใจได้ว่ามีของพร้อมใช้แน่นอน"
2668075095-NameTh = "ข้าวโพดย่าง ชมรมชิมอาหาร"
2668075095-DescriptionTh = "ข้าวโพดย่างที่ชมรมชิมอาหารทำเอง\nรวมเอารสชาติต่างๆ ของสมาชิกชมรมชิมอาหารเอาไว้\nแต่ไม่รับประกันรสชาตินะ!"
1254096944-NameTh = "แว่นแยงกี้สาวฤดูร้อน"
1254096944-DescriptionTh = "แว่นกันแดดที่คณะกรรมการวินัยยึดมา จากแยงกี้สาวริมชายหาดที่สร้างความวุ่นวาย ริมชายหาดในฤดูร้อน มีร่องรอยจากการต่อสู้อยู่"
104149602-NameTh = "หมวกกันน็อกป๋อมแป๋ม"
104149602-DescriptionTh = "หมวกที่คณะกรรมการวินัยยึดจากแก๊งหมวกกันน็อกป๋อมแป๋ม\nที่สร้างความวุ่นวายที่ย่านแออัดในฤดูร้อน มีร่องรอยจากการต่อสู้อยู่"
2553698243-NameTh = "แต้มกิจกรรม"
2553698243-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
1847672830-NameTh = "เห็ดเต่า"
1847672830-DescriptionTh = "เห็ดที่ขึ้นเองในเขตปกครองตนเองซานไห่จิง มีเนื้อสัมผัสแข็ง และรสชาติดีต่างจากรูปลักษณ์ที่สวยงาม นิยมนำมากินเป็นอาหาร"
357098688-NameTh = "ต้นไผ่สีดำ"
357098688-DescriptionTh = "ต้นไผ่สีดำที่เติบโตในสวนของมังกรดำ หาไม่ได้ง่ายๆ เพราะเจ้าหน้าที่ของมังกรดำ ดูแลอย่างเคร่งครัด"
3708418519-NameTh = "โสมรูปคน"
3708418519-DescriptionTh = "รากสมุนไพรที่มีรูปร่างคล้ายคน ค้นพบได้ที่ภูเขาลึกในซานไห่จิง \nมีสรรพคุณช่วยเพิ่มอายุขัยหรือทำให้ดูเด็กลง"
3320765287-NameTh = "เหรียญช็อกโกแลต"
3320765287-DescriptionTh = "หนึ่งในของว่างสัญลักษณ์ของโกลเด้น ฟลีซ ถึงจะไม่ใช่เหรียญจริงๆ แต่ก็นิยมในหมู่นักเรียน มีรสชาติหวานอร่อย"
312190930-NameTh = "สติกเกอร์กระต่าย"
312190930-DescriptionTh = "สติกเกอร์รูปกระต่ายที่นักเรียนติด ไม่มีความหมายอะไรพิเศษ ส่วนใหญ่จะทำไว้ติดเองเนื่องจากทำง่าย"
3290352412-NameTh = "ตั๋วเรือ"
3290352412-DescriptionTh = "ตั๋วเรือของทะเลสาบโกลเด้น ฟลีซ ควรพกติดตัวไว้ตลอดหลังขึ้นเรือ เพราะอาจถูกตรวจสอบเมื่อมีกิจกรรม หรืองานภายใน"
812405886-NameTh = "ลูกเต๋า"
812405886-DescriptionTh = "ลูกเต๋าที่พบได้ทั่วไปในเรือ มันเป็นแค่ของเล่น แต่บางครั้งก็ถูกใช้แก้ปัญหาความขัดแย้ง ระหว่างนักเรียน"
3202962982-NameTh = "แต้มกิจกรรม"
3202962982-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
1102568152-NameTh = "ผ้าขนหนูออนเซ็น"
1102568152-DescriptionTh = "ผ้าขนหนูปกติที่ถูกเตรียมไว้ในออนเซ็นหมายเลข 227 เนื่องจากมีเนื้อผ้าค่อนข้างหยาบ ถ้าถูกับร่างกายแรงๆ อาจทำให้ผิวเสียหายได้"
4012080640-NameTh = "แชมพูหนวด"
4012080640-DescriptionTh = "แชมพูสูตรพิเศษของสหภาพเรดวินเทอร์ ที่ประธานเชริโน่ใช้เป็นประจำ ไม่เหมาะจะนำมาใช้กับหนวด ต่างจากชื่อของมัน"
2585452848-NameTh = "บาธบอมบ์แคพิบารา"
2585452848-DescriptionTh = "บาธบอมบ์ก้อนแข็งๆ ที่ทำเป็นรูปแคพิบารา เมื่อใส่ลงไปในน้ำจะละลายและมีกลิ่นส้มอ่อนๆ ออกมา"
1545493133-NameTh = "ถุงนำโชคปีใหม่"
1545493133-DescriptionTh = "ถุงนำโชคที่แก๊งคุโรคาเมะเตรียมไว้ใช้ในช่วงปีใหม่ เป็นไอเทมเซอร์ไพรส์\nที่ไม่มีใครรู้ว่าข้างในมีอะไรจนกว่าจะเปิด มีของอัดแน่นมากกว่าที่คิด"
1215702584-NameTh = "คางามิโมจิเพโรโร่"
1215702584-DescriptionTh = "คางามิโมจิที่แก๊งคุโรคาเมะผู้เห็นแก่เงิน ทำคอลแลบกับเพโรโร่เพื่อขายฉลองปีใหม่ มันเป็นของตกแต่งที่กินไม่ได้"
130031945-NameTh = "ป้ายขอพรแก๊งคุโรคาเมะ"
130031945-DescriptionTh = "ป้ายขอพรที่ขายในงานปีใหม่ของแก๊งคุโรคาเมะ ลือกันว่าประสิทธิภาพจะเพิ่มขึ้นถ้าใส่เงินพร้อมกับขอพร นั่นอาจเป็นเหตุผลว่าทำไมถึงมีราคา 5,000 เยนต่อชิ้น"
3586118070-NameTh = "ตั๋วเขย่าโอะมิกุจิปีใหม่"
3586118070-DescriptionTh = "ตั๋วที่ใช้เพื่อเขย่าโอะมิกุจิปีใหม่ มันไม่ใช่ของที่จะได้จริงๆ\nแต่เป็นของที่แก๊งคุโรคาเมะผลิตเพื่อขาย และของจะถูกจัดส่งไปตามดวง"
518432250-NameTh = "แต้มกิจกรรม"
518432250-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
1669990889-NameTh = "หนังสือสำนึกผิด"
1669990889-DescriptionTh = "หนังสือสำนึกผิดที่คุณครูประจำชาเล่ต์ ที่ทำหน้าที่ลาดตระเวนในวันวาเลนไทน์ ได้รับจากเด็กเจ้าปัญหาที่เที่ยวเล่น มีเนื้อหาจริงจังแบบที่คาดไม่ถึง"
2861703465-NameTh = "ขนมขบเคี้ยวที่ยึดได้"
2861703465-DescriptionTh = "ขนมขบเคี้ยวที่ยึดได้จากพวกเด็กเจ้าปัญหา\nระหว่างลาดตระเวนในวันวาเลนไทน์เป็น\nของที่ถูกสร้างขึ้นโดยไม่ได้รับอนุญาตรสชาติ\nไม่แย่แต่เป็นที่นี่นิยมในหมู่เด็กเจ้าปัญหา"
2887327615-NameTh = "ถุงงานดูแลสิ่งแวดล้อม"
2887327615-DescriptionTh = "ถุงใส่ขยะที่เก็บมาจากที่ต่างๆ ระหว่างที่ออกลาดตระเวนในวันวาเลนไทน์ งานดูแลสิ่งแวดล้อมอย่างจริงจัง เป็นสิ่งที่คุ้มค่าเสมอ"
3085567581-NameTh = "ตั๋วเที่ยววันวาเลนไทน์"
3085567581-DescriptionTh = "ตั๋วเที่ยวของคุณครูที่ยุ่งกับงานลาดตระเวนในวันวาเลนไทน์\nใช้เพื่อนัดพบกับนักเรียน\n※ ตั๋วที่หมดอายุ หลังสิ้นสุดกิจกรรมจะเปลี่ยนเป็นเครดิต x200,000"
1632581989-NameTh = "หมายจับวาคาโมะ"
1632581989-DescriptionTh = "หมายจับที่ออกโดยสถาบันฝึกตำรวจวัลคิรี่เพื่อจับกุมวาคาโมะ มีข้อกล่าวหาน่ากลัวที่วาคาโมะได้ทำเขียนเอาไว้"
3974882278-NameTh = "แต้มกิจกรรม"
3974882278-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
2114880617-NameTh = "ผ้าคลุมหน้า"
2114880617-DescriptionTh = "พับผ้าคลุมหน้านี้ไว้ในตอนที่สวดอ้อนวอน บางครั้งการปิดหน้าง่วงๆ ระหว่างที่สวดภาวนาก็มีประโยชน์เหมือนกัน"
4200143845-NameTh = "หนังสือเพลง"
4200143845-DescriptionTh = "หนังสือรวมบทเพลงสวดของทรีนิตี้ เนื้อเพลงที่มีเอกลักษณ์นี้ได้รับความนิยมเกินคาด บางครั้งก็ถูกใช้ในเพลงฮิตหรือข้อความโฆษณาด้วย"
2925208730-NameTh = "เชิงเทียนในวิหาร"
2925208730-DescriptionTh = "เชิงเทียนที่ใช้ในมหาวิหารของทรีนิตี้ มันค่อนข้างหนักและแข็งแรงต่างจากที่เห็น หากทำตกอาจทำให้พื้นเป็นรูได้"
315453169-NameTh = "แพ็กการ์ดมูชิควีน"
315453169-DescriptionTh = "แพ็กเสริม <รวมพลังเหล่าแมลง> ลำดับที่ 3 ของมูชิควีน เกมการ์ดที่ได้รับความนิยม คาเอเดะบอกว่าต้องลองลูบดูก่อน จะได้รู้ว่ามีการ์ดหายากข้างในหรือไม่"
2801049295-NameTh = "ใบปลิวทัวร์โรงเรียน"
2801049295-DescriptionTh = "ใบปลิวบอกข่าวงานแลกเปลี่ยนระหว่างสหพันธ์ เฮียกคิยาโคและสถาบันเกเฮนน่า ระบุคำกล่าวทักทายจากนิยะ ที่เป็นเจ้าภาพงาน และกำหนดการสำคัญๆ ของงาน"
3117990777-NameTh = "พัดองค์หญิงวาราคุ"
3117990777-DescriptionTh = "พัดที่มีรูปวาดหน้าของชิเซะ ไอดอลชื่อดังของสหพันธ์เฮียกคิยาโค แฟนๆ ที่เห็นต่างบอกว่าน่ารักเกินปุยมุ้ย! เห็นทีต้องมีสักอันแล้ว!"
1122375527-NameTh = "ตุ๊กตาคุณนินจานินเพโร่"
1122375527-DescriptionTh = "สินค้าตัวละครนินจาที่วางขายในสวนสนุก ภาพยนตร์ เริ่มจากการเป็นตัวละครไม่มีชื่อ ที่แยกตัวออกมาจากกลุ่มตัวละครหลัก แต่ก็ได้รับความนิยมอย่างซับซ้อนเกินบรรยาย"
2333680348-NameTh = "กล่องวัสดุ"
2333680348-DescriptionTh = "กล่องวัสดุที่ถูกทิ้งไปทั่วทุกแห่งบนรีสอร์ตร้าง\nมันเป็นกล่องที่ถูกละเลยมานาน จนไม่อาจรู้ได้ว่าข้างในมีอะไรอยู่"
923224583-NameTh = "สกุลเงินท้องถิ่น"
923224583-DescriptionTh = "สกุลเงินท้องถิ่นของ <ลอสต์ พาราไดซ์ รีสอร์ต> ที่สร้างขึ้นเพื่อฟื้นฟูการท่องเที่ยว ถึงจะไม่รู้ว่าใช้งานได้จริงหรือเปล่า แต่ชิซุโกะก็บอกไว้ว่า \"ถ้าอยากรู้ก็พิสูจน์เองเลยสิคะ!\""
1459837138-NameTh = "เหรียญวิบวับๆ ของร้านเฮียกคิยาโค"
1459837138-DescriptionTh = "เหรียญที่สามารถแลกเป็นของที่ระลึก ของร้านริมทะเลเฮียกคิยาโคได้ แต่ลูกค้าส่วนใหญ่เข้าใจผิด ว่าเหรียญนี้เองคือของที่ระลึก"
2503861371-NameTh = "หอยสังข์วาววับ"
2503861371-DescriptionTh = "หอยสังข์ที่มีพื้นผิวเรียบเนียนวาววับ ชิเซะบอกไว้ว่าหากยกมาแนบหูเพื่อฟังเสียง อารมณ์ศิลปินของกวีจะมาโดยธรรมชาติ"
3295998236-NameTh = "คำภีร์ศาสตร์นินจาฤดูร้อน"
3295998236-DescriptionTh = "คำภีร์ที่บันทึกศาสตร์นินจา (ฉบับปรับปรุง) หลายศาสตร์ที่นำมาใช้ได้ในฤดูร้อน ส่วนใหญ่เป็นข้อมูลอุบัติเหตุโดยประมาท ที่เกิดขึ้นได้ในฤดูร้อน เพราะนินจาก็ต้องปลอดภัยไว้ก่อน"
4253247347-NameTh = "ตั๋วใช้งานรีสอร์ต หมู่เกาะทะเลลึก"
4253247347-DescriptionTh = "หนังสือสัญญาตั๋วใช้งานรีสอร์ต ระบุสิทธิ์ในการเข้าใช้รีสอร์ตหมู่เกาะทะเลลึก"
2442357514-NameTh = "ตั๋วใช้งานรีสอร์ต มูชิควีนครูซ"
2442357514-DescriptionTh = "หนังสือสัญญาตั๋วใช้งานรีสอร์ต ระบุสิทธิในการเข้าใช้รีสอร์ตมูชิควีนครูซ"
4133487383-NameTh = "ตั๋วใช้งานรีสอร์ต ลักซ์ชัวรี่"
4133487383-DescriptionTh = "หนังสือสัญญาตั๋วใช้งานรีสอร์ต ระบุสิทธิในการเข้าใช้รีสอร์ตลักซ์ชัวรี่"
125540590-NameTh = "คูปองของหวาน"
125540590-DescriptionTh = "คูปองของหวาน ออกโดยร้านขนมหวานชื่อดัง รวบรวมเพื่อนำไปแลกรับของหวานได้ ของหวานที่ได้รับจะแตกต่างกัน ตามจำนวนของคูปองที่มี"
3387762043-NameTh = "พาร์เฟต์มินต์ช็อกโก"
3387762043-DescriptionTh = "พาร์เฟต์มินต์ช็อกโก มีรสชาติอันเป็นเอกลักษณ์ ลิ้มรสความสดชื่น และความหวานได้ในเมนูเดียวกัน"
806537948-NameTh = "มาการอง"
806537948-DescriptionTh = "มาการองขนาดพอดีมือ มีหลากประเภท และหลายรสชาติ"
336149210-NameTh = "เวเฟอร์แท่ง"
336149210-DescriptionTh = "ขนมรสช็อกโกแลตแท่งยาว ข้างในไม่มีไส้ เด็กๆ ที่อยากโชว์ฟอร์มชอบเอาไปคาบไว้ แล้วใช้ปากขยับขนม"
2418932586-NameTh = "แต้มกิจกรรม"
2418932586-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
1874282437-NameTh = "ถุงถั่วอัดระเบิด"
1874282437-DescriptionTh = "ถุงผ้าที่บรรจุเมล็ดถั่วหรือทรายไว้ข้างใน ด้วยความนุ่มนี้จึงถูกใช้ในการแข่งโยนบอล เพราะถึงปาโดนก็ไม่บาดเจ็บ ที่จริงแล้ว ถุงถั่วที่ระเบิดได้แบบนี้พบได้ไม่บ่อยนัก"
3048078452-NameTh = "ธงมิลเลเนียม"
3048078452-DescriptionTh = "ธงขนาดเล็กที่มีตราของมิลเลเนียม ใช้บอกจุดกลับตัวหรือสถานที่รวมตัว"
2524752608-NameTh = "นกหวีดสุดล้ำ"
2524752608-DescriptionTh = "นกหวีดชนิดพิเศษ ถูกสร้างโดยชมรมวิศวกรรม และเทคโนโลยีสุดล้ำยุค เมื่อเป่าลมเข้าไป ไดอะแฟรมจะสร้างกระแสไฟฟ้า และทำให้ลำโพงปล่อยเสียงออกมา"
2871055877-NameTh = "เครื่องดื่มเกลือแร่"
2871055877-DescriptionTh = "เครื่องดื่มเกลือแร่พิเศษ พัฒนาโดยมิลเลเนียม โดยอ้างอิงจากข้อมูลทางวิทยาศาสตร์ ของชมรมออกกำลังกาย ว่ามีส่วนช่วยให้ร่างกายดูดซึมน้ำได้เร็วขึ้น"
1469297879-NameTh = "ไม้คทาวิ่งผลัด"
1469297879-DescriptionTh = "ไม้คทาที่ใช้ในการแข่งขันวิ่งผลัด รูปร่างเหมือนระเบิดมือแบบเก่า แต่มันจะไม่ระเบิดเลย ถ้าหากส่งต่อให้กับนักวิ่งคนถัดไปได้ทันเวลา ด้วยเซ็นเซอร์อัจฉริยะแบบที่ใช้ในสินค้าล้ำยุค"
2043178916-NameTh = "ขนมปังไส้ถั่วแดง"
2043178916-DescriptionTh = "ขนมปังไส้ถั่วแดงผูกเชือกที่ใช้การแข่งกินขนมปัง ขนมปังธรรมดาที่สอดไส้ถั่วแดง เป็นที่ชื่นชอบในหมู่นักเรียนวัลคิรี่มากๆ"
3227336825-NameTh = "แผ่นพับแจ้งข่าว"
3227336825-DescriptionTh = "แผ่นพับแจ้งข่าวที่กองบัญชาการจัดการฮาโล เฟสติวัลจัดทำขึ้น มีตั้งแต่ข้อมูลกำหนดการแข่งขัน ไปจนถึงแผนที่ร้านอร่อยรอบๆ สถานที่แข่งขัน"
2905328212-NameTh = "ของขวัญคริสต์มาส"
2905328212-DescriptionTh = "สิ่งที่ทุกคนรอคอยในวันคริสต์มาส มีตำนานว่าเด็กที่ร้องไห้จะไม่ได้รับของขวัญนี้"
1128970523-NameTh = "ถุงเท้าคริสต์มาส"
1128970523-DescriptionTh = "ถุงเท้าที่แขวนไว้โดยหวังว่า จะได้รับของขวัญเซอร์ไพรส์ ถ้าใส่ก็ให้ความอบอุ่นด้วย"
4179360865-NameTh = "ลูกกวาดไม้เท้า"
4179360865-DescriptionTh = "ลูกกวาดคริสต์มาสที่ทำเป็นรูปไม้เท้า ส่วนใหญ่จะเป็นรสมินต์"
1459661267-NameTh = "เอ๊กน็อก"
1459661267-DescriptionTh = "เครื่องดื่มอุ่น ๆ ที่ทำจากนม ไข่และน้ำตาล ทำให้ร่างกายอบอุ่นได้ในวันที่หนาวเย็น "
1234657893-NameTh = "แต้มกิจกรรม"
1234657893-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
2264400688-NameTh = "คามาโบโกะ"
2264400688-DescriptionTh = "ลูกชิ้นปลาสองสี ด้านในเป็นสีขาว และด้านนอกย้อมเป็นสีแดง สีแดงสื่อถึงโชคลาภ และสีขาวสื่อถึงความบริสุทธิ์"
3707337679-NameTh = "ปลาไท"
3707337679-DescriptionTh = "ปลาที่ต้องอยู่คู่กับกุ้งในโอเซจิ มาฉลองปีใหม่ไปพร้อมปลามงคล รสชาติสุดล้ำเลิศกันเถอะ"
2091304235-NameTh = "บัตรสุ่มโอะมิกุจิ"
2091304235-DescriptionTh = "ถึงจะมีคำกล่าวว่าเขย่าโอะมิกุจินี้เพื่อความสนุก แต่ถ้าจับได้อันที่ไม่ดี ก็อาจกระทบกระเทือนจิตใจได้ "
2629342802-NameTh = "วงจรคำนวณพหุมิติ"
2629342802-DescriptionTh = "ชิ้นส่วนของอุปกรณ์คำนวณที่หลุดออกมา จากเรืออะทราฮาซิส ประกอบด้วยวงจรที่ซับซ้อน"
1015134010-NameTh = "อะไหล่เครื่องทะลุมิติ"
