2459684995-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1967270032-NameTw = "羊皮紙碎片"
1967270032-DescriptionTw = "老舊的羊皮紙碎片。集齊全部的話，似乎能拼湊出一個完整的形狀。"
549917402-NameTw = "檸檬"
549917402-DescriptionTw = "遍佈島上的檸檬果實。"
365419572-NameTw = "老舊鑰匙"
365419572-DescriptionTw = "在各個地方發現的老舊鑰匙。好像可以打開箱子或櫃子之類的東西。"
4133964558-NameTw = "月神塔羅牌"
4133964558-DescriptionTw = "喜歡特定題材的粉絲群體之間當作周邊商品製作的塔羅牌。聽說收集很多的話可以玩某款遊戲。"
3591040431-NameTw = "墨水匣"
3591040431-DescriptionTw = "用來供應墨水的消耗品。一旦沾到就很難擦乾淨，使用時要小心。"
392753185-NameTw = "平板電腦觸控筆"
392753185-DescriptionTw = "能夠帶給使用者如同真實紙筆的使用感，說明書上是這麼寫的……"
