360909443-DescriptionTh = "ธงใหญ่ที่โดดเด่นด้วยความสง่างามของเกเฮนน่า เป็นสิ่งที่ขาดไม่ได้ในที่ที่ต้องการความเป็นทางการ"
4130505278-NameTh = "ฉากกั้นไม้ สไตล์เกเฮนน่า"
4130505278-DescriptionTh = "ฉากกั้นไม้ที่โดดเด่นด้วยลายสลักที่ประณีต ใช้แบ่งพื้นที่ในงานปาร์ตี้หรูหราที่ขาดไม่ได้"
1126057941-NameTh = "กระถางหินสีขาว"
1126057941-DescriptionTh = "กระถางหินสีขาวที่มีต้นไม้จัดไว้อย่างสวยงาม ให้บรรยากาศที่สง่างาม และสดชื่นไปพร้อมกัน"
