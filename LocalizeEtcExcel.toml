3397039462-DescriptionKr = "시원한 색상이 매력적인 쿨링 매트. 바닥의 열기를 가라앉혀주는 부드럽고 시원한 매트"
2491732701-NameKr = "베이직 화이트 파티션"
2491732701-DescriptionKr = "화이트 배색이 인상적인 베이직 화이트 파티션. 어디서든 효율적으로 공간을 나눌 수 있다."
570546005-NameKr = "원목 화이트 파티션"
570546005-DescriptionKr = "원목 마무리가 돋보이는 원목 화이트 파티션. 공간을 나누어 사용하는 데 유용하다."
4082006081-NameKr = "쿨드링크 냉장고"
4082006081-DescriptionKr = "시원한 음료가 가득한 쿨드링크 냉장고. 여름의 열기를 잠시 식혀줄 수 있다."
3849908170-NameKr = "비치사이드 화이트 테이블"
3849908170-DescriptionKr = "비치사이드 화이트 테이블. 공간에 산뜻한 느낌을 더해준다."
2855869096-NameKr = "원목 테라스 테이블"
2855869096-DescriptionKr = "원목 테라스 테이블. 넓은 공간에 활용하는 데 유용하다."
892679216-NameKr = "상큼 후르츠바"
892679216-DescriptionKr = "상큼한 과일들이 준비된 원목 테이블. 과일의 맛으로 여름의 더위를 식혀보자."
295238722-NameKr = "상큼 후르츠 벽 장식"
295238722-DescriptionKr = "대담한 색 배치가 엿보이는 상큼 후르츠 포스터. 어느 벽에 배치해도 보는 이의 시선을 사로잡는다."
2570970628-NameKr = "넘실파도 현수막"
2570970628-DescriptionKr = "넘실대는 파도가 그려진 현수막. 바다의 시원함을 더해준다."
2575575829-NameKr = "비치사이드 쿨링 선풍기"
2575575829-DescriptionKr = "비치사이드 쿨링 선풍기. 어디서든 시원한 바람을 느끼게 해준다."
260275561-NameKr = "비치사이드 컬러풀 구명조끼"
260275561-DescriptionKr = "어디서든 눈에 띄는 컬러풀 구명조끼. 바다로 놀러간다면 챙겨야하는 필수 품목이다."
2956803246-NameKr = "레몬 파라솔 화이트 테이블"
2956803246-DescriptionKr = "레몬빛 파라솔이 인상적인 화이트 테이블. 따가운 여름 햇살을 아늑한 조명으로 바꿔준다."
2202760015-NameKr = "비치사이드 원목 바닥"
2202760015-DescriptionKr = "비치사이드 원목 바닥. 정갈하게 정렬된 원목의 무늬가 안정감을 선사해준다."
832214886-NameKr = "비치사이드 화이트 벽"
832214886-DescriptionKr = "원목 포인트가 돋보이는 화이트 벽. 밝은 색상이 공간에 활기를 불어넣어준다."
2378301844-NameKr = "비치사이드 오션뷰 창문"
2378301844-DescriptionKr = "바다가 펼쳐지는 오션뷰 창문. 좁아 보이는 공간을 확 트이게 만들어준다."
1707494079-NameKr = "비치사이드 배경"
1707494079-DescriptionKr = "바다의 시원함과 여름의 따사로움이 느껴지는 비치사이드 배경. 그 시원함에 뛰어들고 싶어진다."
428856018-NameKr = "칠&쿨 아이스크림 냉장고"
428856018-DescriptionKr = "상큼 달콤한 아이스크림이 가득한 아이스크림 냉장고. 한 번에 많이 먹으면 배탈이 날 수도…?"
2761713126-NameKr = "컬러풀 드링크바"
2761713126-DescriptionKr = "다양한 과일맛이 구비된 컬러풀 드링크바. 색상만큼 다양한 맛에 설레이게 된다."
3944148940-NameKr = "달콤시원 빙수바"
3944148940-DescriptionKr = "언제든지 맛있는 빙수를 만들 수 있는 빙수 테이블. 따가운 여름도 빙수 한 스푼이면 눈 녹듯 사라진다."
2324881054-NameKr = "비치사이드 오션뷰 테라스"
2324881054-DescriptionKr = "드넓게 바다가 펼쳐지는 오션뷰 여름 테라스. 한여름의 싱그러운 바다 향기를 가져다준다."
4139475234-NameKr = "비치사이드 둥실 튜브"
4139475234-DescriptionKr = "귀엽고 아기자기한 둥실 튜브. 망설이는 마음도 바다에 뛰어들게 해준다."
2633292506-NameKr = "모모프렌즈 카페 세트"
2633292506-DescriptionKr = "커피와 디저트를 즐길 수 있는 모모프렌즈 카페 세트. 느긋하게 기대 앉아 모모프렌즈와 휴식을 취해보세요."
2130797913-NameKr = "젤리즈 오락실 세트"
2130797913-DescriptionKr = "개성 있는 레트로풍의 젤리즈 오락실 세트. 고전 게임부터 최신 게임까지 마음껏 플레이하세요!"
2700178132-NameKr = "발렌타인 세트"
2700178132-DescriptionKr = "달콤한 스위츠로 가득한 발렌타인 초콜릿 가게 세트. 두근대는 설렘과 함께 로맨틱한 하루를 보내세요!"
1112765859-NameKr = "여름 리조트 풀파티 세트"
1112765859-DescriptionKr = "시원한 여름을 즐길 수 있는 여름 리조트 풀파티 세트. 친구들과 시원하고 달콤한 파티를 즐겨봐요!"
2295911688-NameKr = "할로윈 펌킨 카페 세트"
2295911688-DescriptionKr = "이상한 현상이 일어나는 할로윈 펌킨 카페! 무서운 호박들과 으스스한 할로윈을 만끽하세요!"
2218356853-NameKr = "전통 온천장 세트"
2218356853-DescriptionKr = "추운 겨울에도 따뜻한 전통 온천장. 온천에서 몸을 녹이고 따뜻한 휴식을 취하세요!"
1880396630-NameKr = "새해 하우스 세트"
1880396630-DescriptionKr = "즐거운 새해를 보낼 수 있는 새해 하우스 세트. 친구들과 함께 행복한 신년을 맞이하세요!"
660700768-NameKr = "밀리터리 캠핑장 세트"
660700768-DescriptionKr = "긴장감이 넘치는 밀리터리 캠핑장. 따뜻하고 안락한 타프 내부에서 물품을 정비하세요!"
1334657209-NameKr = "비치사이드 세트"
1334657209-DescriptionKr = "시원한 바다가 펼쳐져 있는 비치사이드. 상큼한 후르츠와 아이스크림으로 여름을 만끽하세요!"
3711274552-NameKr = "대운동회 세트"
3711274552-DescriptionKr = "경기의 열기와 활력이 느껴지는 대운동회. 친구들과 함께 즐거운 경기에 빠져보세요!"
4141233484-NameKr = "아비도스 교실 세트"
4141233484-DescriptionKr = "선생님과 학생들의 즐겁고 설레는 시간이 가득한 아비도스 교실 세트. 학생들과 추억을 만들어보세요!"
1464352390-NameKr = "게임개발부 세트"
1464352390-DescriptionKr = "열정과 노력의 시간이 가득한 게임개발부 부실 세트. 재밌는 게임을 같이 만들어봐요! "
1586097976-NameKr = "선샤인 리조트 세트"
1586097976-DescriptionKr = "햇살이 가득! 편안하고 싱그러운 선샤인 리조트 세트. 달콤한 디저트와 꽃향기를 만끽해보세요!"
3493255660-NameKr = "쇼핑몰 세트"
3493255660-DescriptionKr = "우아한 명품부터 아기자기한 소품과 아이들을 위한 놀이터까지! 모든 걸 즐길 수 있는 쇼핑몰로 오세요!"
2112684025-NameKr = "게헨나 파티 세트"
2112684025-DescriptionKr = "게헨나 학원의 위엄과 우아함을 한눈에 느껴볼 수 있는 로망이 가득한 파티에 당신을 초대합니다."
505605553-NameKr = "트리니티 교실 세트"
505605553-DescriptionKr = "우아함과 고급스러움, 실용성까지 추구하는 트리니티 교실의 모습을 소개합니다!"
2411322223-NameKr = "DJ 파티장 세트"
2411322223-DescriptionKr = "신나는 음악에 몸을 맡기자! 해변에서 펼쳐지는 화려한 파티에 어서오세요!"
1028564388-NameKr = "백귀야행 세트"
1028564388-DescriptionKr = "고상한 분위기의 백귀야행 세트. 향수가 느껴지는 그리운 방에서 쉬어보자."
810452553-NameKr = "밀레니엄 타워 라운지 세트"
810452553-DescriptionKr = "밀레니엄의 분위기를 고스란히 느낄 수 있는 라운지 세트. 첨단 과학의 학원에 어서 오세요!"
146666553-NameKr = "하이랜더 열차 세트"
146666553-DescriptionKr = "카페 가구를 생성할 수 있습니다. (하이랜더 열차 테마)"
2143457359-NameKr = "티파티 세트"
2143457359-DescriptionKr = "품위와 교양이 넘치는 티파티 세트. 차 한 잔 어떠신가요?"
421036472-NameKr = "와일드헌트 캠퍼스 세트"
421036472-DescriptionKr = "예술과 영감이 넘실대는 와일드헌트의 캠퍼스. 아름다움이란 무엇인지, 함께 고민해 볼까요?"
2456785767-NameKr = "수송선 세트"
2456785767-DescriptionKr = "밀레니엄의 기술이 담긴 수송선 세트. 그 첨단을 함께 감상하실까요?"
