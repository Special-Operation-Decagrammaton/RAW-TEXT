2122161357-NameKr = "블루 포인트 포세린 바닥"
2122161357-DescriptionKr = "다이아 문양 포인트의 포세린 바닥. 무광의 고급스러움에 블루 포인트가 추가되었다."
1856343868-NameKr = "썸머 디저트 테이블"
