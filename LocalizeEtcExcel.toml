1265950056-NameKr = "이벤트 챌린지 스테이지 4 힌트"
1265950056-DescriptionKr = "모든 적의 체력이 0이 되어야 처치됩니다.\n아방가르드군의 받는 EX 대미지량이 큰 폭으로 감소하지만, 받는 특효 대미지량이 크게 가산됩니다.\n메카 악어가 EX 스킬을 사용하여 불을 뿜은 후, 15초 동안 기절하고 받는 대미지량이 크게 증가합니다."
