2494422881-NameTw = "完整的彈簧"
2494422881-DescriptionTw = "推進槍械的槍栓時使用的彈簧。被完好無損地保存就跟新的一樣。用於強化固有武器。"
3351867875-NameTw = "鉻製彈簧"
3351867875-DescriptionTw = "推進槍械的槍栓時使用的彈簧。由鉻合金製成，堅固不會生鏽。用於強化固有武器。"
1382166670-NameTw = "鈦製彈簧"
1382166670-DescriptionTw = "推進槍械的槍栓時使用的彈簧。由鈦合金製成，變得更輕、更牢固。用於強化固有武器。"
1229651923-NameTw = "一般強化石"
1229651923-DescriptionTw = "可強化裝備的神祕強化石"
1503462181-NameTw = "生鏽的擊錘"
1503462181-DescriptionTw = "扣動板機時將力量傳至擊針的零件。由於管理不善處處生鏽。用於強化固有武器。"
250804865-NameTw = "運動手套"
250804865-DescriptionTw = "為防物品滑落，在內側附加凹凸不平的面料的運動手套。由於使用不易燃材質，即使觸碰到高溫的槍身也不必擔心。"
2642735370-NameTw = "針織連指手套"
2642735370-DescriptionTw = "戶外品牌「Manaslu」專門針對女高中生製作的針織連指手套。雖然保暖性稍微差一點，但因為可愛的設計而大受歡迎。"
1332059101-NameTw = "佩洛洛烤箱手套"
1332059101-DescriptionTw = "採用<Momo好友>的吉祥物角色佩洛洛，作為設計元素製成的白色烤箱手套。有傳聞說戴上這款烤箱手套，就會有一股想跳怪異舞蹈的慾望。"
1759502696-NameTw = "皮手套"
1759502696-DescriptionTw = "使用高級皮料製成的皮手套。由於耐用性不強，主要作為禮儀用途。"
2952456681-NameTw = "戰術手套"
2952456681-DescriptionTw = "使用防燃材質製成的扎實的戰術手套。即使緊握高溫的槍身也不會有被燙傷的風險。"
4188994934-NameTw = "蕾絲手套"
4188994934-DescriptionTw = "用緞面布料製作而成，設計風格高雅的手套。不耐熱，處理火器時要小心。"
1332723028-NameTw = "袖套"
1332723028-DescriptionTw = "專為同時追求手臂保護和時尚的學生設計的袖套。在換季時使用特別有效果。"
3739266178-NameTw = "珍珠毛線手套"
3739266178-DescriptionTw = "飾有珍珠的毛線手套。因為手指的部份有露出，所以做精巧的工作也沒問題。"
400831532-NameTw = "航海手套"
400831532-DescriptionTw = "手掌處加了內襯的露指手套。以通風良好的合成樹脂製成，適合航海等船舶工作。"
1423638540-NameTw = "超級手套"
1423638540-DescriptionTw = "搭載動作感應裝置的遊戲手套。性能雖然不太好，但為後來的遊戲開發者帶來了很大的靈感。"
489725691-NameTw = "完整的擊錘"
489725691-DescriptionTw = "扣動板機時將力量傳至擊針的零件。被完好無損地保存就跟新的一樣。用於強化固有武器。"
1275230444-NameTw = "鉻製擊錘"
1275230444-DescriptionTw = "扣動板機時將力量傳至擊針的零件。以鉻合金製作而成，堅固耐久不會生鏽。用於強化固有武器。"
563331103-NameTw = "鈦製擊錘"
563331103-DescriptionTw = "扣動板機時將力量傳至擊針的零件。以鈦合金製作而成，更加輕盈堅固。用於強化固有武器。"
596368071-NameTw = "高級強化石"
596368071-DescriptionTw = "可強化裝備的神祕強化石。"
3590797977-NameTw = "生鏽的槍管"
3590797977-DescriptionTw = "槍枝上用於輸送彈丸的鐵管零件。未經保養，到處都生鏽了。用於強化固有武器。"
528434676-NameTw = "粉紅色休閒鞋"
528434676-DescriptionTw = "運動服品牌「Serval」推出的粉紅色休閒鞋。由於鞋底採用柔軟素材，很適合跑步。"
4067164356-NameTw = "雪靴"
4067164356-DescriptionTw = "戶外品牌「Manaslu」的防寒長靴。由於設計可愛且保暖性優異，大受寒冷地帶女高中生喜愛。"
3223551422-NameTw = "粉紅波卡拖鞋"
3223551422-DescriptionTw = "以<Momo好友>的粉紅色羊駝、粉紅波卡為主題設計的拖鞋。既柔軟且具隔熱效果"
2109585756-NameTw = "古典琺瑯樂福鞋"
2109585756-DescriptionTw = "三一學園的學生穿的高級短靴。最後加上一層漆皮塗料，在光線照耀下鞋尖會閃閃發亮。"
997278570-NameTw = "戰術長靴"
997278570-DescriptionTw = "為了保護足部，製作得非常厚實的戰術長靴。由於鞋跟很高，具有讓身高顯得高挑的效果，是身材嬌小的學生們的最愛。"
1477837784-NameTw = "高跟鞋"
1477837784-DescriptionTw = "有著可愛腳踝繫繩的高跟鞋。能夠使穿戴者擁有優雅的步伐。"
134212594-NameTw = "休閒運動鞋"
134212594-DescriptionTw = "設計簡潔的運動鞋。重量輕巧，是活動量多的學生的最愛。"
2721346391-NameTw = "防水登山靴"
2721346391-DescriptionTw = "天然橡膠加上防水塗層，透氣性和耐久性卓越的登山靴。就算掉進水中，表面也不會濕。"
1621774808-NameTw = "水上運動專用鞋"
1621774808-DescriptionTw = "以排水性良好的防水材質製成的一體成型式涼鞋。底面附有襯墊，即使在有水的地方也不會輕易滑倒。"
129848510-NameTw = "電競拖鞋"
129848510-DescriptionTw = "閃爍著紅色、綠色和藍色的拖鞋。即使在黑暗中也不怕找不到。但沒人知道它與遊戲有什麼關聯。"
2753922894-NameTw = "完整的槍管"
2753922894-DescriptionTw = "槍枝上用於輸送彈丸的鐵管零件。保存狀態完好，就像新的一樣。用於強化固有武器。"
3047737247-NameTw = "鉻製槍管"
3047737247-DescriptionTw = "槍枝上用於輸送彈丸的鐵管零件。以鉻合金製作而成，堅固耐久不會生鏽。用於強化固有武器。"
3465834983-NameTw = "鈦製槍管"
3465834983-DescriptionTw = "槍枝上用於輸送彈丸的鐵管零件。以鈦合金製作而成，更加輕盈堅固。用於強化固有武器。"
2336304110-NameTw = "最高級強化石"
2336304110-DescriptionTw = "可強化裝備的神祕強化石。"
1498728523-NameTw = "生鏽的擊針"
1498728523-DescriptionTw = "用來撞擊並引燃彈丸雷管的金屬棒。未經保養，到處都生鏽了。用於強化固有武器。"
1750123462-NameTw = "防水運動包"
1750123462-DescriptionTw = "「Serval」製作的防水運動包。由於是用防水原料製作，帶到河邊或海邊也能放心使用。"
2248449388-NameTw = "防寒斜背包"
2248449388-DescriptionTw = "「Manaslu」製作的防寒斜背包。使用加厚內襯，可為便當或飲料保溫使其不容易涼掉。"
4159521152-NameTw = "佩洛洛背包"
4159521152-DescriptionTw = "印刷著大大的佩洛洛的背包。由於收納空間大，因此也很受非佩洛洛迷族群的喜愛。"
940066526-NameTw = "海軍藍書包"
940066526-DescriptionTw = "配合三一學園的校規製作的黑色書包。由於設計簡單且具高級感，也很受其他學校的學生喜愛。"
3539400576-NameTw = "戰術後背式皮革書包"
3539400576-DescriptionTw = "強化功能性與收納性的「Kazeyama」特製的後背式皮革書包。很受隨身攜帶許多副武裝的學生好評。"
4276374506-NameTw = "惡魔翅膀托特包"
4276374506-DescriptionTw = "繪有巨大魔鬼翅膀的托特包。設計風格簡約，搭配休閒服裝也很合適。"
1637503010-NameTw = "街頭包"
1637503010-DescriptionTw = "休閒的設計，更加強實用性的街頭包。特有的寬敞收納空間，很受學生們歡迎。"
3101552643-NameTw = "蝴蝶圖案單肩包"
3101552643-DescriptionTw = "畫有巨大蝴蝶的單肩包。因為材質輕盈，所以帶去旅行也不會有負擔。"
3572602524-NameTw = "斜揹式防水袋"
3572602524-DescriptionTw = "可掛在單邊肩膀的吊帶包。因為是用防水材質製成，適合存放容易受潮的電子產品。"
1597212943-NameTw = "金屬箱"
1597212943-DescriptionTw = "內建電池，防彈合金材質的背包。能夠輕鬆抵擋步槍的連發射擊，適合用於存放電子設備。"
1441450061-NameTw = "完整的擊針"
1441450061-DescriptionTw = "用來撞擊並引燃彈丸雷管的金屬棒。保存狀態完好，就像新的一樣。用於強化固有武器。"
1068433115-NameTw = "鉻製擊針"
1068433115-DescriptionTw = "用來撞擊並引燃彈丸雷管的金屬棒。以鉻合金製作而成，堅固耐久不會生鏽。用於強化固有武器。"
1300399581-NameTw = "鈦製擊針"
1300399581-DescriptionTw = "用來撞擊並引燃彈丸雷管的金屬棒。以鈦合金製作而成，更加輕盈堅固。用於強化固有武器。"
2140743564-NameTw = "Serval金屬徽章"
2140743564-DescriptionTw = "印有著名運動品牌「Serval」商標的金屬徽章。用堅硬的金屬製成，不必擔心被刮傷。"
1505921304-NameTw = "Manaslu毛氈徽章"
1505921304-DescriptionTw = "印有戶外專業品牌「Manaslu」商標的毛氈徽章。用柔軟的毛氈製成，和防寒用品也很搭調。"
3033340240-NameTw = "憤怒阿德利圓形徽章"
3033340240-DescriptionTw = "畫著<Momo好友>憤怒阿德利的圓形徽章。如果長時間盯著看，總覺得心情會變差......"
344772093-NameTw = "Veronica刺繡徽章"
344772093-DescriptionTw = "繡著著名品牌「Veronica」商標的布章。不管把布章貼在任何成品上，看起來都很高級。"
2127407973-NameTw = "Kazeyama魔鬼氈臂章"
2127407973-DescriptionTw = "印有軍事專業品牌「Kazeyama」商標的魔鬼氈臂章。可利用背面的魔鬼氈輕鬆貼在衣服上。"
3784559011-NameTw = "Coco Devil銀勳章"
3784559011-DescriptionTw = "印有哥德蘿莉塔專業品牌「Coco Devil」商標的銀勳章。可以使用後面的別針當作胸針佩戴。"
589220143-NameTw = "街頭勳章"
589220143-DescriptionTw = "由街頭時尚品牌<三步>推出的勳章。從把自己公司的名號大大印在正中央的這點，可以看出製作公司對品牌的自豪。"
49559053-NameTw = "Lorelei勳章"
49559053-DescriptionTw = "現代時尚品牌「Lorelei」發售的徽章。因為木材經過精巧的加工，所以表面光滑且散發香氣。"
786809132-NameTw = "Harpyia彈性徽章"
786809132-DescriptionTw = "印有海洋運動品牌「Harpyia」商標的徽章。採用柔軟的橡膠材料製成，耐髒汙，可以輕鬆黏貼在任何想裝飾的地方。"
2966784212-NameTw = "硬幣勳章"
2966784212-DescriptionTw = "以電子遊戲廳使用的代幣為靈感製作的金屬徽章。因為尺寸相當大，所以無法放入遊戲機中。"
1494732916-NameTw = "網球頭帶"
1494732916-DescriptionTw = "運動服品牌「Serval」的網球頭帶。用吸汗力強的原料製成，可防止汗水在運動時流落。"
3940891435-NameTw = "髮圈"
3940891435-DescriptionTw = "綢緞材質，彈性很好的髮圈。吃熱湯料理時，最好用這種髮圈把頭髮綁起來。"
3392023658-NameTw = "水蜜桃髮夾"
3392023658-DescriptionTw = "附有<MomoTalk>的水蜜桃造型飾針的髮夾。觸摸飾針時會散發出淡淡的水蜜桃香。"
2520092463-NameTw = "翅膀髮夾"
2520092463-DescriptionTw = "著名品牌「Veronica」以天使的翅膀為主題製作的髮夾。實際上不太受三一學生們的歡迎。"
765040081-NameTw = "多功能髮夾"
765040081-DescriptionTw = "把其中一端打磨得很銳利，必要時可用作開瓶器、口袋刀等用途的多功能髮夾。梳頭髮時可能會在無意間傷到手，使用時要小心。"
277995823-NameTw = "蝙蝠髮夾"
277995823-DescriptionTw = "形似黑色緞帶的蝙蝠造型髮夾。能為穿戴者增添小惡魔般的魅力。"
1353993108-NameTw = "藝術字髮夾"
1353993108-DescriptionTw = "用文字做成的髮夾。雖然單字本身並沒有什麼太大的意義，卻充分可以刺激時尚人的感性。"
3000997093-NameTw = "樹葉髮夾"
3000997093-DescriptionTw = "葉子形狀的髮夾。平時要配戴的話有點困難，但適合在需要打扮的日子使用。"
1668620571-NameTw = "船錨髮夾"
1668620571-DescriptionTw = "帶有兩個鉤子的船錨狀髮夾。雖然設計得十分漂亮，但據說實際用起來有點不方便，綁頭髮時經常將頭髮纏在鉤子上。"
3421013348-NameTw = "電磁波阻斷髮夾"
3421013348-DescriptionTw = "能夠阻擋電磁波，有助於促進頭腦健康的髮夾。不過沒有人知道這項功能是否是真的。"
3948898300-NameTw = "交通安全符"
3948898300-DescriptionTw = "充滿祈求交通安全心意的護身符。搖晃時，裡面的某種金屬製品就會哐啷作響。"
2028861040-NameTw = "暖暖貼"
2028861040-DescriptionTw = "搓揉幾下然後搖一搖，就會散發熱氣的手掌大小的暖暖貼。在嚴寒環境下，沒有比這更有用的護身符了。"
1207585231-NameTw = "佩洛洛的羽毛"
1207585231-DescriptionTw = "加上巨大白色羽毛製成的護身符。羽毛的來源是Momo好友的重大商業機密。"
3129277640-NameTw = "十字架"
3129277640-DescriptionTw = "三一學生愛用的十字架造型護身符。也很適合吊在背包上當飾品。"
1991164124-NameTw = "迷彩達摩"
1991164124-DescriptionTw = "畫有迷彩圖樣的達摩人偶。不管放在何處都能自然融入背景。"
237084781-NameTw = "詛咒娃娃"
237084781-DescriptionTw = "想著怨恨的人並把怨念注入進去的詛咒娃娃。因為可以當作針線包，所以深受手藝部成員的喜愛。"
3113501019-NameTw = "便攜式除臭劑"
3113501019-DescriptionTw = "與功能性化妝品製造商「Seaside」聯名生產的便攜式除臭劑。因為設計時尚，很多學生會把它掛在鑰匙圈上，當成裝飾品。"
3888622253-NameTw = "捕夢網"
3888622253-DescriptionTw = "具有消除惡夢的咒術意義。聞起來有一股樹木獨特的香氣。"
4137284716-NameTw = "鯊魚牙齒護身符"
4137284716-DescriptionTw = "用鋒利的鯊魚牙齒製成的護身符。據說配戴此護身符能避免海上事故發生。"
3088246464-NameTw = "鍵帽玩具"
3088246464-DescriptionTw = "由鍵盤鍵帽製成的紓壓玩具。雖然按下也不會發生任何事，但發出的喀噠聲能讓人放鬆心情。"
727987239-NameTw = "防水電子錶"
727987239-DescriptionTw = "運動服品牌「Serval」製作的電子錶。具有防水設計，就算游泳時配戴也不用擔心會故障。"
111602846-NameTw = "皮革手錶"
111602846-DescriptionTw = "戶外品牌「Manaslu」製作的皮質手錶。最後加上皮製內襯，可防止手腕冰冷。"
2073706703-NameTw = "波浪貓手錶"
2073706703-DescriptionTw = "畫有<Momo好友>的貓咪角色波浪貓的手錶。扮演錶針角色的波浪貓的雙手，會詭異地扭曲起來指出時間。"
1058159756-NameTw = "骨董懷錶"
1058159756-DescriptionTw = "刻有「Veronica」商標的古董懷錶。雖然沒有手錶那麼容易看時間，但卻是很受歡迎的時尚商品。"
3773560632-NameTw = "防震手錶"
3773560632-DescriptionTw = "軍事專業品牌「Kazeyama」製作的防震手錶。加強防震功能，在惡劣環境下依然可不必擔心故障放心使用。"
2415212758-NameTw = "哥德風手錶"
2415212758-DescriptionTw = "帶著複雜紋樣的哥德風手錶穿上古典風格的衣服會很適合，但缺點是很難看懂時間。"
3475264813-NameTw = "街頭時尚手錶"
3475264813-DescriptionTw = "同時有現代和可愛的設計而大受好評的街頭時尚手錶。<三步>在此使用和手環組合成套組一起販賣的策略。"
2321708498-NameTw = "Lorelei手錶"
2321708498-DescriptionTw = "現代時尚品牌「Lorelei」發售的手錶。使用木頭和皮革的精緻設計，營造出獨特的氛圍。"
333016136-NameTw = "潛水錶"
333016136-DescriptionTw = "海洋運動品牌「Harpyia」推出的潛水用智慧手錶。除了防水之外，即使在深水中也能確認水下環境，不必擔心水壓。"
556604040-NameTw = "觸控手錶"
556604040-DescriptionTw = "搭載觸控螢幕的手錶。雖然可以移植並運行各種遊戲，但性能也只能達到勉強運行的水平。"
1506609692-NameTw = "藍牙項鍊"
1506609692-DescriptionTw = "可測量佩戴者體溫和心跳次數的藍牙項鍊。因為可以輕鬆掌握運動量，是深得想嘗試減肥的使用者青睞的必需品。"
3750431669-NameTw = "雪花墜飾"
3750431669-DescriptionTw = "附帶雪花造型裝飾的銀色墜飾。長時間盯著雪花裝飾看就會感覺到涼意。"
4279598505-NameTw = "尼科萊盒式鍊墜"
4279598505-DescriptionTw = "附帶<Momo好友>的角色Mr.尼科萊的臉的盒式鍊墜。按壓鼻子即可打開能放入相片的小收納空間。"
2508370757-NameTw = "十字架項鍊"
2508370757-DescriptionTw = "著名品牌「Veronica」推出的附帶十字架裝飾的項鍊。雖然簡單卻不失時尚感，是很受歡迎的商品。"
1517613390-NameTw = "識別牌"
1517613390-DescriptionTw = "刻有學號和姓名的識別牌。能展現自我的身分配飾，大受女高中生歡迎。"
1964406377-NameTw = "龐克頸圈"
1964406377-DescriptionTw = "帶著尖刺的龐克風頸圈。因尾端很尖銳，只要戴上去就很難點頭。"
2501983868-NameTw = "鍊式項鍊"
2501983868-DescriptionTw = "用鎖鏈打造的項鍊。叮叮噹噹的聲音聽起來很悅耳，不過也有人認為觸感太過冰冷。"
3300639114-NameTw = "綠葉項鍊"
3300639114-DescriptionTw = "現代時尚品牌「Lorelei」推出的項鍊。據說被光芒照射的話，葉子會散發隱約的光澤。"
3366268717-NameTw = "調節器保護套"
3366268717-DescriptionTw = "潛水員用來固定呼吸調節器的項鍊形保護套。「Harpyia」的保護套因其沉穩的色調與設計，也經常用於時尚搭配。"
1125967041-NameTw = "記憶體項鍊"
1125967041-DescriptionTw = "偽裝成裝飾品的儲存裝置項鍊。外表看起來華麗，但內部可能藏有某些機密的東西。"
