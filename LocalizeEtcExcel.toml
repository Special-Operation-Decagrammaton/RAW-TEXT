3433802547-NameTw = "下級強化石"
3433802547-DescriptionTw = "可強化裝備的神祕強化石。"
2008504557-NameTw = "生鏽的彈簧"
2008504557-DescriptionTw = "推進槍械的槍栓時使用的彈簧。由於管理不善處處生鏽。用於強化固有武器。"
2576602750-NameTw = "素色鴨舌帽"
2576602750-DescriptionTw = "運動服品牌「Serval」推出的深藍素色鴨舌帽。別著各式各樣的徽章可以強化個性，因此經常被用作時尚配件。"
675971185-NameTw = "針織毛線帽"
675971185-DescriptionTw = "戶外品牌「Manaslu」專門針對女高中生製作的針織毛線帽。雖然保暖性稍微差一點，但因為可愛的設計而大受歡迎。"
2237745495-NameTw = "老大哥軟呢帽"
2237745495-DescriptionTw = "附有「Momo好友」角色老大哥娃娃的小軟呢帽。據說戴上這款帽子就會突然感受到老大哥的視線。"
1699247498-NameTw = "蝴蝶結貝雷帽"
1699247498-DescriptionTw = "也被用作三一學園學生帽的白色蝴蝶結貝雷帽。根據佩戴者的說法，要讓貝雷帽的圓弧曲線完美呈現超乎想像的難。"
2090555875-NameTw = "防彈頭盔"
2090555875-DescriptionTw = "可以抵禦朝頭部飛來的所有物品的堅固防彈頭盔。表面是用柔軟的棉材質製作，可以貼上拼布作裝飾。"
1300177111-NameTw = "荷葉邊迷你帽"
1300177111-DescriptionTw = "用華麗的荷葉邊作裝飾的迷你帽子。帽簷下藏有可以把帽子固定在頭上的小髮夾。"
835357934-NameTw = "遮陽帽"
835357934-DescriptionTw = "遮蓋住臉部上半部的遮陽帽和口罩組合在一起，可以盡量減少臉部暴露的範圍，所以也可以拿來當成防曬的對策。"
2831939832-NameTw = "附有葉子的緞帶費多拉帽"
2831939832-DescriptionTw = "將樹葉插入緞帶當作裝飾的編織費多拉帽。非常適合渡假的穿搭。"
2978527733-NameTw = "水手帽"
2978527733-DescriptionTw = "以條紋稍加點綴的白色水手帽。這款設計簡約的帽子也被用作為奧德賽海洋學園的校帽。"
4017761813-NameTw = "電競頭盔"
4017761813-DescriptionTw = "可配戴飲料的帽子。上面插著吸管。即使在遊戲中，也可以不用手喝到飲料。"
