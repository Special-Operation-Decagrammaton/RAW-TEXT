2662227242-DescriptionTw = "請，請加油……\n我會為你應援的！"
170702207-NameTw = "參加獎"
170702207-DescriptionTw = "「志在參加」這句話，\n我當然也很喜歡。\n可是我果然還是想贏……"
4162217022-NameTw = "參加獎"
4162217022-DescriptionTw = "無論運動還是訓練，\n只要開始行動就離成功不遠了。"
2680245513-NameTw = "參加獎"
2680245513-DescriptionTw = "終於要開始了！\n不要洩氣，堅持到最後！"
1958845128-NameTw = "鼓勵獎"
1958845128-DescriptionTw = "這個獎的用意在於鼓勵奮發向上。\n沒錯……想要擊出打全壘打的話，就要先從安打開始！"
2791568111-NameTw = "鼓勵獎"
2791568111-DescriptionTw = "這個，就是那個吧。\n結束一局之後\n也不要鬆懈，再接再厲！"
461611471-NameTw = "鼓勵獎"
461611471-DescriptionTw = "快要撐不下去的時候，\n最需要加油打氣！"
1428247863-NameTw = "幸運獎"
1428247863-DescriptionTw = "據說安打有不小的比例取決於運氣。\n如果不想錯過偶然降臨的幸運，就要勤加練習。"
752868706-NameTw = "幸運獎"
752868706-DescriptionTw = "訓練方面不太講究運氣，\n不過說到競技體育就另當別論了。"
2640635459-NameTw = "幸運獎"
2640635459-DescriptionTw = "要做好心理準備……\n否則幸運降臨時，可能會無法開心享受！"
2984517236-NameTw = "二等獎"
2984517236-DescriptionTw = "唔哇……！真可惜！\n雖然第二名也很不錯！\n如果用棒球比喻的話，就是「場地規則二壘安打」吧！"
1431221238-NameTw = "二等獎"
1431221238-DescriptionTw = "成果很令人驚豔！\n繼續保持，不要鬆懈，\n朝著頂峰前進吧！"
1980863458-NameTw = "二等獎"
1980863458-DescriptionTw = "加油！\n做得好！\n不要中斷，再繼續！"
1686581353-NameTw = "一等獎"
1686581353-DescriptionTw = "這個結果……！\n真的是……全壘打呢！\n總有一天，我也要再一次……！"
4080298096-NameTw = "一等獎"
4080298096-DescriptionTw = "終於達成這個結果了。\n不過，結束也同時是新的開始。\n明天也請繼續加油，會員。"
4164991921-NameTw = "一等獎"
4164991921-DescriptionTw = "哇，哇啊！\n我也高興得快哭出來了！\n應援之所以美好，就是因為有這樣的瞬間吧！"
2670560256-NameTw = "嘻嘻嘻……準備好了唷"
2670560256-DescriptionTw = "艾拉的忠實僕從，惡之商人Silver Plate！\n是個會利用次元裂縫現身，販賣讓人陷入不幸的物品的壞傢伙！\n在衍生作品《強尼．奇普托斯與大口徑魔法》甚至成為主要反派，\n實力大幅增強！核心粉絲不算少，意外地有人氣！\n以前在《魔法liber》Only展上也有超多攤位！\n雖然看起來很好對付，不過一旦他使用「Pyramid Power」\n就能讓一般攻擊幾乎無效，非常棘手！\n在第2季第11集之中，會出現Silver Plate利用\n偽裝道具隱藏身份轉學的場景，然後──"
2818922347-NameTw = "用魔法力量完全恢復──！"
2818922347-DescriptionTw = "《魔法liber》系列的可愛吉祥物「Stanag醬」！\n他與White和Pink簽訂「Magical National Guard」契約，\n讓兩人成為了魔法少女！由於是個善良又天真的孩子，\n因此被艾拉的「惡之騎士團」綁架和欺負幾乎已經是家常便飯……\n不過他身體強健又恢復得很快，是個笑容滿面且堅強不屈的孩子！\n當兩人陷入絕境的時候，他還會成為提供魔彈支援的重要角色！\n擁有包含Green Tip和Black Tip在內的多種魔彈！\nStanag醬覺醒的劇情真的超級感人……\n記得是在第2季第7集，他恢復原本的模樣之後──"
3074909671-NameTw = "惡之騎士團啊，黑暗時刻已經降臨了！"
3074909671-DescriptionTw = "艾拉！小時候第一次看到簡直嚇壞了，每次出現都只敢瞇著眼看！\n雖然超級漂亮卻非常非常恐怖，是「Heavy Calibers」的宿敵！\n當艾拉在他居住的暗黑星球聽到我們世界充滿愛與幸福的聲音時，\n就決定帶著一群壞蛋過來襲擊，說是要讓世界永遠沉默！\n明明艾拉自己笑起來超吵的還敢說！\n雖然每次都被Heavy Calibers的活躍阻止，\n但他是個鍥而不捨的可怕反派！  \n在劇場版《魔法少女Heavy Calibers : Daisy Cutter》中，\n失去記憶的艾拉過著在普通書店打工的生活，並且──"
907100893-NameTw = "蒙羅-諾伊曼-魔法噴射！"
907100893-DescriptionTw = "Thermite Pink！是White可靠的好搭檔！\n為什麼名字叫「Pink」卻穿著紫色的衣服呢──\n啊！接下來可能會劇透，建議直接收看本篇哦！\nPink原本是個有點孤僻又不太合群的學生，\n不過因為在遭遇艾拉襲擊時被強大又帥氣的White救下\n而對他十分憧憬，便與「Magical National Guard」簽訂了契約！\n就這樣成為了魔法少女史上最棒的閨蜜組合！\n在與White並肩作戰的過程中，Pink透過友情、愛和適度的火力\n找回自信，成為了一名開朗的角色！\n在第3季第6集中，述說了Pink成為當紅的樂團偶像的故事──"
3133177365-NameTw = "和平的使者！交給White吧！"
3133177365-DescriptionTw = "Thermite White是《魔法liber》系列永遠的主角！\n原本只是個有點冒失的普通女孩，不過在某天遭遇艾拉的襲擊\n而陷入絕境時，遇見了來自魔法國度的吉祥物Stanag！\n雖然因恐懼而顫抖，但正義感十足的White為了獲得魔法少女的\n力量，與「Magical National Guard」簽訂契約成為了魔法少女！\n之後White救下的Pink也成為了魔法少女，兩人攜手守護世界，\n化身為正義的魔法少女──「魔法少女Heavy Calibers」！\n在第2季第2集中，White遇到壞人手下「Dragon Skin」的故事──"
3560225627-NameTw = "第44號配方拉麵"
3560225627-DescriptionTw = "聲稱以貝類為基底的拉麵。味道之強烈，甚至會讓人對手中的筷子感到抱歉。將可食用的材料組合到不可思議的領域，其獨創性令人印象深刻。"
1070674443-NameTw = "極度清澈的醬油拉麵"
1070674443-DescriptionTw = "以醬油調味為基底的清爽拉麵。其極致乾淨的風味為特色，但也因為太過清淡，不專心品嘗就容易錯過味道。"
2956567346-NameTw = "香味四溢黑蒜香油拉麵"
2956567346-DescriptionTw = "以黑蒜油點綴的芳香拉麵。吃上一口，濃厚的蒜香旨味便會柔和地在口中覆上一層。別被外觀嚇到，先動動筷子吧。"
2787024907-NameTw = "全配料豚骨拉麵"
2787024907-DescriptionTw = "放上所有配料的豚骨拉麵。濃厚湯頭與豐富食材的協調在一碗中奏出如同管弦樂般的和聲。幾乎不可能讓人失望，堪稱人人都愛的拉麵。"
4270783877-NameTw = "富貴榮華黃金拉麵"
4270783877-DescriptionTw = "以壓倒性的份量與熱量武裝的拉麵。只有毫不猶豫地把材料全都倒進去才能形成的過度魅力充斥碗中。金箔花是可食用的，吃掉也沒問題。"
