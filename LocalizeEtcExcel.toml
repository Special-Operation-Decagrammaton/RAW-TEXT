3679010773-NameTh = "ลูกกลิ้งบริหารท้อง\nเพโรโร่"
3679010773-DescriptionTh = "สินค้าที่ทำร่วมกับ MOMO FRIENDS ชิ้นที่ 9!\nเครื่องออกกำลังกายรูปเพโรโร่ที่ติดอันดับ 1 ยอดนิยมในปีนี้"
3417345669-NameTh = "แอร์พอดส์โปร"
3417345669-DescriptionTh = "หูฟังไร้สายที่นิยมในหมู่นักเรียนคิโวทอสช่วงนี้\nราคาค่อนข้างแพงไปสำหรับเงินเก็บ ประมาณค่าจ้างงานพาร์ทไทม์ 3 เดือน"
1575353856-NameTh = "นิยายความรักต้องห้าม [รักนี้มิอาจกั้น]"
1575353856-DescriptionTh = "ผลงานล่าสุดของ 'ความรักคือปลาคาร์ฟ' ยอดนักเขียนนิยายความรัก\nเรื่องราวปมปัญหารักต้องห้ามที่ไม่มีวันเป็นจริงได้!"
3531188161-NameTh = "นิตยสารเกม [ฮิตเกิร์ล]"
3531188161-DescriptionTh = "ไม่พลาดทุกข่าวสาร นิตยสารเกมที่รวมตั้งแต่ข่าววางขายเกมใหม่ล่าสุด\nในคิโวทอส สูตรเกมเก่าแก่ จนถึงข่าววางขายสินค้าของเกม"
812933091-NameTh = "ลิปกลอสเชอรี่โรส"
812933091-DescriptionTh = "ลิปกลอสเนื้อนุ่ม ทำให้ริมฝีปากเรียบเนียน และให้สีชัด\nไอเทมฮิตยอดนิยมในหมู่หญิงสาว ผู้ชื่นชอบในการแต่งหน้า"
2902292788-NameTh = "BB ครีมผิวเด้ง"
2902292788-DescriptionTh = "สินค้าเครื่องสำอางหรูยอดฮิตจาก 'ซามูเอล'\nBB ครีมที่ช่วยปรับให้ผิวขาวใสขึ้น\nให้ผิวดูเปล่งปลั่ง มีความเป็นธรรมชาติ"
618503547-NameTh = "ครีมพรางตัวทหาร\nรุ่น 3 สี"
618503547-DescriptionTh = "สินค้ายอดฮิตจาก 'ซามูเอล' ผู้ผลิตเครื่องสำอางหรู\nเกลี่ยลงผิวได้ง่าย! ใช้พรางตัวเข้าได้กับทุกที่เมื่อจำเป็น มาลองประสบการณ์พรางตัวเองได้ทุกที่ดูสิ!"
1773086852-NameTh = "กล่องคุกกี้หรู"
1773086852-DescriptionTh = "กล่องคุกกี้หรูของชเรอดิงเงอร์\nมีรสชาติที่กลมกล่อมหอมหวาน และมีโอกาส 50%\nที่ในกล่องจะเป็นของอย่างอื่นแทนคุกกี้"
2238627204-NameTh = "หนังสือ [ปืน ความน่ารักและวัยรุ่น]"
2238627204-DescriptionTh = "เรื่องราวเกี่ยวกับปืน ความน่ารักและวัยรุ่น\nผลงานขายดีแห่งปีที่ถูกวิเคราะห์ว่าเป็นต้นกำเนิด\nของยุควัฒนธรรมร่วมสมัยในคิโวทอส"
346808410-NameTh = "กล้องส่องดูดาว"
346808410-DescriptionTh = "กล้องส่องดูดาว อุปกรณ์สังเกตการณ์มาตรฐาน ของสมาคมดาราศาสตร์แห่งคิโวทอส"
3391000326-NameTh = "เครื่องเกมเกิร์ลสี\nรุ่นผลิตใหม่"
3391000326-DescriptionTh = "<สร้างช่วงเวลาผ่อนคลาย ไปกับเกมอาร์เคด!> เครื่องเกมเกิร์ลสี ได้รับความนิยมเมื่อสมัยก่อนนี้ ได้ถูกผลิตขึ้นมาใหม่อีกครั้ง"
2936755317-NameTh = "แป้งทำขนมแบบ C MX-เรชั่น"
2936755317-DescriptionTh = "พลังต่อสู้มาจากแคลอรี่!"
1249782817-NameTh = "น้ำรามูเนะรสชาเขียว"
1249782817-DescriptionTh = "เครื่องดื่มโซดาที่มีรสอร่อยเฉพาะตัว\nลิ้มรสความสดชื่นของสีเขียวดูสิ!"
2902432180-NameTh = "หมอนเจลลี่"
2902432180-DescriptionTh = "สินค้าชิ้นสุดท้ายของตัวเอก เกม 'ฟูรุเจลลี่' มีกิมมิกที่มีเจลลี่ จับเจลลี่สีเดียวกันกิน และกินแบบนั้นไปเรื่อยๆ!"
1148052880-NameTh = "หนังสือกระต่ายยอดนักสืบ\n[คดีในหมอกน้ำพุร้อน]"
1148052880-DescriptionTh = "แค่มีเค้าลางของคดี รับรองว่าหูกระต่ายสีขาวนี้จะไม่พลาดเด็ดขาด!\nหนังสือกระต่ายยอดนักสืบเล่มที่ 3! สถานที่เกิดเหตุคือบ่อน้ำพุร้อน!"
1561623078-NameTh = "O-ริงฟิต"
1561623078-DescriptionTh = "<ออกกำลังกายด้วยเกมกันเถอะ!> มาใช้ O-ริงฟิต อุปกรณ์สำหรับออกกำลังกายได้ง่ายๆ และสนุกเองที่บ้านของคุณ ไม่ว่าจะออกกำลัง ไดเอตหรือแบบไหนก็ใช้ได้หมด!"
293569137-NameTh = "แผนที่ขุมทรัพย์"
293569137-DescriptionTh = "ขุมสมบัติอยู่นี่แน่นอน!\nแผนที่นี้ได้บอกตำแหน่งขุมทรัพย์ทั้ง 3 ตำแหน่งไว้แล้ว"
3310161849-NameTh = "แว่นแฟนซีลายวน"
3310161849-DescriptionTh = "เพียงใส่แว่นนี้คุณเองก็เป็นอัจฉริยะได้! แว่นตาที่ทำให้ดูเป็นอัจฉริยะได้\nเพียงแค่ใส่มัน ※ คำเตือน : ใส่แล้วไม่ได้เพิ่ม IQ"
1301636205-NameTh = "เครื่องที่ไร้ประโยชน์\nที่สุดในโลก"
1301636205-DescriptionTh = "ไร้ประโยชน์แต่น่ารัก! ถึงจะไร้ประโยชน์!\nแต่น่ารักก็ไม่เป็นไร! ของเล่นที่เหมาะจะให้เป็น\nของขวัญ เป็นของขวัญที่ติด 5 อันดับแรก"
535298119-NameTh = "ตุ๊กตาหมีผูกโบว์"
535298119-DescriptionTh = "ตุ๊กตาหมีที่ดูธรรมดาแต่ก็น่ารัก\nสินค้ายอดนิยมในหมู่นักเรียนที่ชอบของน่ารัก"
3961391528-NameTh = "ตั๋วหนังแบบ\nจองล่วงหน้า"
3961391528-DescriptionTh = "<หนังเรื่องสำคัญก็ต้องไปดูกับคนที่รัก>\nตั๋วหนังแบบจองล่วงหน้าที่สามารถใช้ได้ทุกโรงหนัง ตั๋วสำหรับสองที่นั่ง!"
2944986556-NameTh = "เซ็ตสีน้ำ 30 สี"
2944986556-DescriptionTh = "เซ็ตสีน้ำสำหรับมืออาชีพ มีสีน้ำหลากสีถึง 30 สี มาแต่งแต้มสีให้ทั้งโลก ด้วยสีน้ำเซ็ตนี้กันเถอะ!"
4077917950-NameTh = "บทกวีคลาสสิก"
4077917950-DescriptionTh = "บทกวีคลาสสิก ให้ความรู้สึกถึงความเก่าแก่ วรรณกรรมคลาสสิก แห่งยุคโบราณอยู่ในมือคุณ"
3946342470-NameTh = "เซ็ตจานชามลายน่ารัก"
3946342470-DescriptionTh = "เซ็ตภาชนะใส่อาหาร ลายตัวการ์ตูนสัตว์น่ารัก เซ็ตนี้ติด 10 อันดับ ภาชนะใส่อาหารในคิโวทอสทุกปี"
762300502-NameTh = "รูบิคลับสมอง"
762300502-DescriptionTh = "<ถ้าแก้รูบิคนี้ได้ คุณคือมิลเลเนียม!> รูบิคระดับยากที่ผ่านการรับรอง ของโรงเรียนวิทย์มิลเลเนียม"
3238447321-NameTh = "เค้กก้อนใหญ่"
3238447321-DescriptionTh = "เค้กก้อนใหญ่ ที่แค่มองก็ทำให้ใจฟูได้ มีบอกแคลอรี่ไว้ด้านหลัง"
1648390167-NameTh = "บัตรบุฟเฟ่ต์หรู"
1648390167-DescriptionTh = "บัตรเชิญเข้ารับประทานบุฟเฟ่ต์หรูในภัตตาคาร\nที่มีเชฟที่เก่งที่สุดในคิโวทอส ราคาแพงสุดๆ"
1143324025-NameTh = "กระถางต้นไม้กินแมลง"
1143324025-DescriptionTh = "กระถางต้นไม้กินแมลง ที่กลุ่มคนที่มีรสนิยม\nเฉพาะตามหา เป็นที่นิยมเพราะมันจับแมลงกินได้\nผิดจากหน้าตาที่ดูน่ารัก"
1569225040-NameTh = "ไหทองคำที่ดูแพง"
1569225040-DescriptionTh = "ถ้าดูผ่านๆ ไหทองคำนี้ดูแพงมาก\nแต่ระวังจะเป็นของปลอม!"
2112008978-NameTh = "กล่องดนตรีไขลาน"
2112008978-DescriptionTh = "กล่องดนตรีไขลานหรูหราที่ทำมาจากไม้\nให้ความรู้สึกวินเทจ เป็นที่นิยมในหมู่นักสะสม"
2651867463-NameTh = "ผ้าเช็ดหน้าปักลาย"
2651867463-DescriptionTh = "ผ้าเช็ดหน้าที่ดูสวยงามจากลายปักที่เรียบง่าย"
3408710330-NameTh = "สารานุกรม"
3408710330-DescriptionTh = "สิ่งนี้จะตอบคำถามทุกข้อสงสัยให้คุณได้\nตั้งแต่ไม้จิ้มฟันยันเรือรบ"
2665872474-NameTh = "อาหารเสริมเพื่อสุขภาพ"
2665872474-DescriptionTh = "กินแค่คำเดียวก็ให้พลังงานเพียงพอ!\nอาหารเสริมที่เหมาะจะให้เป็นของขวัญแก่คนที่คุณรัก"
922488053-NameTh = "ห่วงยางฤดูร้อน"
922488053-DescriptionTh = "ฤดูร้อน! ทะเล! นี่คือของจำเป็น ในการเล่นน้ำอย่างปลอดภัย ไม่ว่าจะว่ายน้ำเก่งหรือไม่ ดีไซน์แฟนซีๆ พร้อมความน่ารักขั้นสุด!"
1777637643-NameTh = "หมอนลูกไม้"
1777637643-DescriptionTh = "หมอนลูกไม้ที่ทำจากวัสดุคุณภาพสูง\nถึงจะเป็นหมอนที่มีดีไซน์เรียบง่าย แต่ในนั้นบรรจุความฝันของเด็กผู้หญิงไว้"
2122048137-NameTh = "เส้นทางสายนักเลง เล่ม 1"
2122048137-DescriptionTh = "หนังสือชุด 'เส้นทางสายนักเลง' เล่ม 1 ผลงานทอล์ค ออฟ เดอะ ทาวน์ ที่โด่งดังจากประโยคที่ว่า <เราต้องการแค่ความซื่อสัตย์ และความกล้าหาญ!> กำลังวางขาย และได้รับคำวิจารณ์ในทางที่ดี ว่าตัวเอกน่ารักกว่าที่คิด"
3996150169-NameTh = "ซามูเอล <เดอะ บียอนด์>"
3996150169-DescriptionTh = "น้ำหอมสุดหรูจากผู้ผลิตเครื่องสำอางหรู 'ซามูเอล' น้ำหอม 12 กลิ่นจากซามูเอลที่พัฒนาโดย <เดอะ บียอนด์> ผู้เชี่ยวชาญด้านผสมผสานกลิ่นในเครื่องสำอาง และเป็นที่รู้จักอย่างกว้างขวางจากประโยคฮิต \"ลองฉีดแล้วสวมใส่ความน่ารักดูสิคะ\""
493877113-NameTh = "งานฝีมือไข่โบราณ"
493877113-DescriptionTh = "งานฝีมือที่มีอัญมณีที่สวยงาม และลวดลายเรขาคณิตบนตัวเรือนรูปไข่\nถึงแม้จะอบอุ่นแต่ก็ไม่เกิดลูกเจี๊ยบนะ"
2812198344-NameTh = "มิลเฟยพาร์เฟต์"
2812198344-DescriptionTh = "พาร์เฟต์ที่ขายอยู่ในคาเฟ่มิลเฟย ร้านขนมชื่อดังของทรีนิตี้\nขนมที่ซ้อนเป็นชั้นๆ ราดด้วยน้ำเชื่อม ครีมสด ผลไม้ เสิร์ฟพร้อมไอศกรีมเนื้อเนียนๆ ที่เข้ากันอย่างลงตัว"
610304186-NameTh = "แอร์บุ๊ก แรร์"
610304186-DescriptionTh = "ผลิตภัณฑ์โน้ตบุ๊กชื่อดังติดอันดับ TOP 3 อุปกรณ์อิเล็กทรอนิกส์ ที่นักเรียนคิโวทอสอยากได้มากที่สุด ถึงจะอยากได้! แต่ราคาน้องก็ไม่เป็นมิตรต่อกระเป๋าสตางค์เลย!"
991149378-NameTh = "หวีที่มีสไตล์"
991149378-DescriptionTh = "หวีพกพาดีไซน์ทันสมัย ให้ความรู้สึกหรูหรา\nนิยมมอบให้กันเป็นของขวัญ"
18654891-NameTh = "เยลลี่วิตามินรวม"
18654891-DescriptionTh = "ผลิตภัณฑ์เยลลี่ มีส่วนผสมของวิตามินรวม\nเพลิดเพลินไปกับการกินวิตามิน\nรสชาติของผลไม้หลากชนิด\nคำเตือน ระวังกินเพลินจนหมดกระปุก (เตือนแล้วนะ)"
442885187-NameTh = "บอนไซต้นเมเปิลฟอร์มดี"
442885187-DescriptionTh = "บอนไซต้นเมเปิลฟอร์มดี แค่มองก็ทำให้ใจเย็นขึ้น ใบไม้ที่เปลี่ยนสีตามฤดูกาล เหมือนคนเปลี่ยนการใส่เสื้อผ้า ทำให้เกิดบรรยากาศที่เงียบสงบ"
897935320-NameTh = "ชุดกล่องอุปกรณ์เย็บผ้า"
897935320-DescriptionTh = "ชุดรวมอุปกรณ์การเย็บผ้า ใช้สำหรับในสถานการณ์ต่างๆ มีติดบ้านไว้ก็อุ่นใจได้แม้ในวันที่เสื้อผ้าขาด หรือถุงเท้าเป็นรู"
175940735-NameTh = "ตั๋วเข้าชมการแสดงดนตรี"
175940735-DescriptionTh = "ตั๋วเข้าชมการแสดงดนตรีที่จัดขึ้นในคิโวทอส เริ่มตั้งแต่คลาสสิก ไปจนถึงเพลงฮิตติดหู เป็นของขวัญที่ดีที่สุด สำหรับคนที่ชอบดนตรีหลากหลายแนว"
794340686-NameTh = "เซ็ตดัมเบล เช้า กลางวัน เย็น"
794340686-DescriptionTh = "เซ็ตสินค้า ประกอบด้วยดัมเบลขนาดน้ำหนักต่างๆ เวทเทรนนิ่งวันละ 3 ครั้ง เช้า กลางวัน เย็น เพื่อสร้างกล้ามเนื้อของคุณดูสิ!"
1058688122-NameTh = "บอร์ดเกม <นี่แหละชีวิต>"
1058688122-DescriptionTh = "บอร์ดเกมสนุกๆ ที่ผู้เล่นอาจได้งานทำ ถูกลอตเตอรี่ หรือออกไปท่องอวกาศ ผลของวงล้อและลูกเต๋าในแต่ละเกม คือตัวกำหนดอนาคตที่คาดเดาไม่ได้"
368202622-NameTh = "ช่อดอกไม้สดชื่น"
368202622-DescriptionTh = "ช่อดอกไม้ที่ทำจากแอเมทิสต์ สำหรับมอบเป็นของที่ระลึกให้คนสำคัญ\nดอกไม้หรูหราที่ส่องประกายงดงาม"
1404874799-NameTh = "ช่อดอกไม้แสนสวย"
1404874799-DescriptionTh = "ช่อดอกไม้ที่ทำจากทับทิม สำหรับมอบให้คนที่รัก\nกลีบดอกไม้สีแดงแสนสวยจับใจของคนที่ได้รับ"
2205211310-NameTh = "โฟโต้การ์ดของฮัตสึเนะ มิกุ"
2205211310-DescriptionTh = "โฟโต้การ์ดรุ่นพิเศษที่แจกใน <คิโวทอสไลฟ์คอนเสิร์ต> ของมิกุ เพราะคอนเสิร์ตที่จบไปอย่างยิ่งใหญ่ มันกลายเป็นสินค้าหายากที่แฟนๆ ของมิกุทุกคนต้องการ"
3401454433-NameTh = "ช่อดอกไม้แวววาว"
3401454433-DescriptionTh = "ช่อดอกไม้ที่ทำจากคริสตัล สำหรับให้เป็นของขวัญครบรอบแก่คนที่คุณรัก\nเมื่อส่องไฟจะส่องประกายแวววาว เหมือนกล้องสลับลาย"
