2494422881-DescriptionTh = "สปริงที่ใช้เลื่อนโบลต์ปืน ได้รับการเก็บรักษาและดูแลจนมีสภาพเหมือนใหม่ ใช้สำหรับอัปเกรดอาวุธบางชนิด"
3351867875-NameTh = "สปริงโครเมียม"
3351867875-DescriptionTh = "สปริงที่ใช้เลื่อนโบลต์ปืน ผลิตจากวัสดุโครเมียมอัลลอยด์ จึงแข็งแรงทนทาน และไม่เป็นสนิม ใช้สำหรับอัปเกรดอาวุธบางชนิด"
1382166670-NameTh = "สปริงไทเทเนียม"
1382166670-DescriptionTh = "สปริงที่ใช้เลื่อนโบลต์ปืน ผลิตจากวัสดุไทเทเนียมอัลลอยด์ จึงมีน้ำหนักเบาและแข็งแรง ใช้สำหรับอัปเกรดอาวุธบางชนิด"
1229651923-NameTh = "หินอัปเกรดขั้นกลาง"
1229651923-DescriptionTh = "หินอัปเกรดลึกลับที่ใช้อัปเกรดอุปกรณ์"
1503462181-NameTh = "แฮมเมอร์ปืนขึ้นสนิม"
1503462181-DescriptionTh = "ชิ้นส่วนอุปกรณ์ที่ช่วยส่งแรงไปยังกระสุนปืน เมื่อเหนี่ยวไก เนื่องจากถูกปล่องทิ้งไว้ และไม่ได้รับการดูแล จึงมีสนิมเกาะ ใช้สำหรับอัปเกรดอาวุธบางชนิด"
250804865-NameTh = "ถุงมือกีฬา"
250804865-DescriptionTh = "ถุงมือกีฬาที่มีด้านฝ่ามือเป็นผิวขรุขระ เพื่อไม่ให้ลื่นหลุดมือได้ง่าย และทำจากวัสดุกันไฟ ดังนั้นมั่นใจได้เลยว่าจะไม่ร้อนมือ เมื่อจับลำปืนร้อนๆ"
2642735370-NameTh = "ถุงมือไหมพรม"
2642735370-DescriptionTh = "ถุงมือไหมพรมสำหรับนักเรียนหญิงม.ปลาย แบรนด์อุปกรณ์กลางแจ้ง <มานาซึรุ> แม้จะไม่ค่อยช่วยให้อุ่นนัก แต่ด้วยดีไซน์ที่น่ารักเลยที่เป็นที่นิยม"
1332059101-NameTh = "ถุงมือเพโรโร่"
1332059101-DescriptionTh = "ถุงมือกันร้อนสีขาว มาพร้อมดีไซน์เพโรโร่ ตัวการ์ตูนจาก <MOMO FRIENDS> ว่ากันว่าเมื่อใส่ถุงมือนี้จะอยากเต้นท่าแปลกๆ ขึ้นมาทันที"
1759502696-NameTh = "ถุงมือหนัง"
1759502696-DescriptionTh = "ถุงมือหนังที่ทำจากหนังคุณภาพสูง ใช้ในงานปาร์ตี้เป็นหลักเพราะไม่ทนทานนัก"
2952456681-NameTh = "ถุงมือทหาร"
2952456681-DescriptionTh = "ถุงมือทหารที่ทำจากวัสดุกันไฟ ทำให้มีความ\nทนทาน สามารถจับลำปืนร้อนๆ ได้อย่าง\nไม่เป็นอันตราย"
4188994934-NameTh = "ถุงมือลูกไม้"
4188994934-DescriptionTh = "ถุงมือดีไซน์หรูหราที่ทำจากซาติน ควรระวังตอนจับปืน เพราะไวต่อความร้อน"
1332723028-NameTh = "ปลอกแขนอบอุ่น"
1332723028-DescriptionTh = "ปลอกแขนเพิ่มความอบอุ่น สำหรับนักเรียนที่อยากปกป้องแขน แต่ก็อยากนำแฟชั่น ใช้ได้ผลมากเมื่อเปลี่ยนฤดูกาล"
3739266178-NameTh = "ถุงมือไหมพรมไข่มุก"
3739266178-DescriptionTh = "ถุงมือไหมพรมที่ตกแต่งด้วยไข่มุก ส่วนนิ้วมือแยกจากกัน จึงไม่มีปัญหากับงานที่ต้องใช้ความละเอียด"
400831532-NameTh = "ถุงมือเดินเรือ"
400831532-DescriptionTh = "ถุงมือแบบเปิดนิ้วที่เสริมซับในตรงฝ่ามือ ผลิตจากใยสังเคราะห์ ระบายอากาศได้ดี เหมาะสำหรับงานบนเรือ อย่างเช่นการเดินเรือ"
1423638540-NameTh = "ถุงมือซูเปอร์เกมมิ่ง"
1423638540-DescriptionTh = "ถุงมือสำหรับเล่นเกมที่ติดอุปกรณ์จดจำ\nการเคลื่อนไหว แม้ประสิทธิภาพจะไม่ดีนัก\nแต่ก็เป็นแรงบันดาลใจที่ยิ่งใหญ่\nให้นักพัฒนาเกมรุ่นหลังได้"
489725691-NameTh = "แฮมเมอร์ปืนสมบูรณ์"
489725691-DescriptionTh = "ชิ้นส่วนอุปกรณ์ที่ช่วยส่งแรงไปยังกระสุนปืน เมื่อเหนี่ยวไก ได้รับการเก็บรักษา และดูแลจนมีสภาพเหมือนใหม่ ใช้สำหรับอัปเกรดอาวุธบางชนิด"
1275230444-NameTh = "แฮมเมอร์ปืนโครเมียม"
1275230444-DescriptionTh = "อะไหล่ที่ส่งพลังให้เข็มชนวนเมื่อลั่นไกปืน ผลิตจากโลหะผสมโครเมียม ทำให้แข็งแรงและไม่เป็นสนิม ใช้อัปเกรดอาวุธ"
563331103-NameTh = "แฮมเมอร์ปืนไทเทเนียม"
563331103-DescriptionTh = "อะไหล่ที่ส่งพลังให้เข็มชนวนเมื่อลั่นไกปืน ผลิตจากโลหะผสมไทเทเนียม ทำให้เบาและแข็งแรงขึ้น ใช้อัปเกรดอาวุธ"
596368071-NameTh = "หินอัปเกรดขั้นสูง"
596368071-DescriptionTh = "หินอัปเกรดลึกลับที่ใช้อัปเกรดอุปกรณ์"
3590797977-NameTh = "ลำปืนขึ้นสนิม"
3590797977-DescriptionTh = "อะไหล่ลำปืนที่ยิงกระสุนออกจากปืน มีสนิมขึ้นทุกที่เพราะไม่ได้รับการดูแล ใช้อัปเกรดอาวุธ"
528434676-NameTh = "รองเท้าผ้าใบสีชมพู"
528434676-DescriptionTh = "รองเท้าผ้าใบสีชมพูจากแบรนด์ชุดกีฬา <เซอร์วัล> พื้นรองเท้าเป็นวัสดุแบบมุม เหมาะจะใช้ใส่วิ่งเป็นที่สุด"
4067164356-NameTh = "บูทกันหนาว"
4067164356-DescriptionTh = "รองเท้าบูทกันหนาวแบรนด์อุปกรณ์กลางแจ้ง\n<มานาซึรุ> เป็นที่นิยมในหมู่นักเรียนหญิงม.ปลาย\nด้วยดีไซน์ที่น่ารักและกันหนาวได้ดีด้วย"
3223551422-NameTh = "สลิปเปอร์พิงค์กี้พาก้า"
3223551422-DescriptionTh = "สลิปเปอร์ที่ได้แรงบันดาลใจจากพิงค์กี้พาก้า อัลปาก้าสีชมพูใน <MOMO FRIENDS> ทั้งนุ่มและอุ่นสุดๆ"
2109585756-NameTh = "รองเท้าโลฟเฟอร์"
2109585756-DescriptionTh = "รองเท้าหนังคุณภาพสูงที่นักเรียนสถาบัน\nทรีนิตี้ใช้ ผิวเคลือบด้วยสารเคลือบเงา ทำให้\nหัวรองเท้ามีประกายมันวาวเมื่อโดนแสง"
997278570-NameTh = "รองเท้าทหาร"
997278570-DescriptionTh = "รองเท้าทหารที่ทำให้หนา และทนทาน\nเพื่อป้องกันเท้าได้ดี ด้วยความหนานี้เอง\nพวกนักเรียนที่ตัวเล็กจึงเลือกใช้\nเพื่อทำให้ดูสูงขึ้น"
1477837784-NameTh = "รองเท้าส้นสูงพันข้อ"
1477837784-DescriptionTh = "รองเท้าส้นสูงที่มีสายรัดข้อเท้าดูน่ารัก ทำให้ท่าเดินของผู้ใส่ดูสง่างาม"
134212594-NameTh = "รองเท้าผ้าใบธรรมดา"
134212594-DescriptionTh = "รองเท้าผ้าใบที่เรียบง่าย ใส่แล้วเบาเท้า เป็นที่นิยมในหมู่นักเรียน ที่ต้องเคลื่อนไหวมากๆ"
2721346391-NameTh = "รองเท้าปีนเขาแบบกันน้ำ"
2721346391-DescriptionTh = "รองเท้าปีนเขาเคลือบสารกันน้ำบนยางธรรมชาติ มีความทนทานสูงและระบายอากาศได้ดี ผิวรองเท้าก็ไม่เปียกถึงจะตกน้ำ"
1621774808-NameTh = "รองเท้าลุยน้ำ"
1621774808-DescriptionTh = "รองเท้านี้ผลิตจากวัสดุกันน้ำที่ตกน้ำก็\nไม่เป็นไร มีแผ่นยางติดไว้ที่พื้นรองเท้า\nเพื่อทำให้ไม่ลื่นในพื้นที่ชุ่มน้ำ"
129848510-NameTh = "สลิปเปอร์เกมมิ่ง"
129848510-DescriptionTh = "สลิปเปอร์ที่มีไฟกระพริบสีแดง เขียว และน้ำเงิน หาพบง่ายแม้ในที่มืด แต่ไม่มีใครรู้ว่ามันเกี่ยวข้องยังไงกับเกม"
2753922894-NameTh = "ลำปืนสมบูรณ์"
2753922894-DescriptionTh = "อะไหล่ลำปืนที่ยิงกระสุนออกจากปืน ถูกเก็บไว้ในสภาพสมบูรณ์เหมือนใหม่ ใช้อัปเกรดอาวุธ"
3047737247-NameTh = "ลำปืนโครเนียม"
3047737247-DescriptionTh = "อะไหล่ลำปืนที่ยิงกระสุนออกจากปืน ผลิตจากโลหะผสมโครเมียม ทำให้แข็งแรงและไม่เป็นสนิม ใช้อัปเกรดอาวุธ"
3465834983-NameTh = "ลำปืนไทเทเนียม"
3465834983-DescriptionTh = "อะไหล่ลำปืนที่ยิงกระสุนออกจากปืน ผลิตจากโลหะผสมไทเทเนียม ทำให้เบาและแข็งแรงขึ้น ใช้อัปเกรดอาวุธ"
2336304110-NameTh = "หินอัปเกรดขั้นสูงสุด"
2336304110-DescriptionTh = "หินอัปเกรดลึกลับที่ใช้อัปเกรดอุปกรณ์"
1498728523-NameTh = "เข็มชนวนขึ้นสนิม"
1498728523-DescriptionTh = "แท่งโลหะที่กระทบท่อจุดชนวนของกระสุนปืนเพื่อยิงปืน มีสนิมขึ้นทุกที่เพราะไม่ได้รับการดูแล ใช้อัปเกรดอาวุธ"
1750123462-NameTh = "กระเป๋ากีฬา"
1750123462-DescriptionTh = "กระเป๋ากีฬาของแบรนด์ <เซอร์วัล> ใช้ใส่ของไปแม่น้ำหรือทะเลได้อย่างไร้กังวล เพราะทำจากวัสดุกันน้ำ"
2248449388-NameTh = "กระเป๋าสะพายข้าง"
2248449388-DescriptionTh = "กระเป๋าสะพายข้างสำหรับใช้ในพื้นที่หนาว แบรนด์ <มานาซึรุ> ใช้วัสดุซับในที่แน่นหนาช่วยกันความร้อน ให้กล่องข้าวหรือเครื่องดื่ม"
4159521152-NameTh = "กระเป๋าเป้เพโรโร่"
4159521152-DescriptionTh = "กระเป๋าเป้ใบใหญ่ที่ถอดแบบมาจากเพโรโร่ มีพื้นที่เก็บของขนาดใหญ่ จึงเป็นที่นิยมแม้แต่คนที่ไม่ใช่เพโรโร่เลิฟเวอร์"
940066526-NameTh = "กระเป๋านักเรียน"
940066526-DescriptionTh = "กระเป๋านักเรียนสีกรมท่าที่สร้างมาตามกฎ ของสถาบันทรีนิตี้ ด้วยดีไซน์ที่เรียบง่ายและมีคุณภาพ เลยเป็นที่นิยมให้นักเรียนโรงเรียนอื่นด้วย"
3539400576-NameTh = "กระเป๋าเป้ทหาร"
3539400576-DescriptionTh = "กระเป๋าเป้พิเศษของคาเซยาม่าที่ปรับปรุงทั้งการใช้งานและความจุ เป็นที่ยอมรับในหมู่นักเรียนว่าเก็บอาวุธขนาดเล็กได้จำนวนมาก"
4276374506-NameTh = "กระเป๋าเดวิลวิงส์"
4276374506-DescriptionTh = "กระเป๋าที่มีปีกปีศาจขนาดใหญ่ติดอยู่ ด้วยดีไซน์ที่เรียบง่ายนี้ จึงเหมาะกับชุดลำลองเป็นอย่างดี"
1637503010-NameTh = "กระเป๋าสตรีท"
1637503010-DescriptionTh = "กระเป๋าสะพายที่ให้ความรู้สึกสบายๆ และใช้งานได้จริง เป็นที่นิยมในหมู่นักเรียน เพราะมีพื้นที่เก็บของเหลือเฟือ"
3101552643-NameTh = "กระเป๋าสะพายผีเสื้อ"
3101552643-DescriptionTh = "กระเป๋าสะพายรูปผีเสื้อใบใหญ่ ทำจากวัสดุน้ำหนักเบา จึงพกไปเดินทางท่องเที่ยวได้สะดวก"
3572602524-NameTh = "กระเป๋ากันน้ำ"
3572602524-DescriptionTh = "กระเป๋าสะพายข้างที่สะพายได้สะดวกบนไหล่\nเดียว ผลิตจากวัสดุกันน้ำจึงเหมาะสำหรับ\nใช้เก็บอุปกรณ์ไฟฟ้าที่ต้องเลี่ยงน้ำ"
1597212943-NameTh = "กระเป๋าเป้โลหะ"
1597212943-DescriptionTh = "กระเป๋าเป้ที่ทำจากโลหะกันกระสุน\nพร้อมแบตเตอรี่ในตัว สามารถป้องกัน\nการยิงจากปืนไรเฟิลได้อย่างง่ายดาย\nเหมาะใช้จัดเก็บอุปกรณ์อิเล็กทรอนิกส์"
1441450061-NameTh = "เข็มชนวนสมบูรณ์"
1441450061-DescriptionTh = "แท่งโลหะที่กระทบท่อจุดชนวนของกระสุนปืนเพื่อยิงปืน ถูกเก็บไว้ในสภาพสมบูรณ์เหมือนใหม่ ใช้อัปเกรดอาวุธ"
1068433115-NameTh = "เข็มชนวนโครเมียม"
1068433115-DescriptionTh = "แท่งโลหะที่กระทบท่อจุดชนวนของกระสุนปืนเพื่อยิงปืน ผลิตจากโลหะผสมโครเมียม ทำให้แข็งแรงและไม่เป็นสนิม ใช้อัปเกรดอาวุธ"
1300399581-NameTh = "เข็มชนวนไทเทเนียม"
1300399581-DescriptionTh = "แท่งโลหะที่กระทบท่อจุดชนวนของกระสุนปืนเพื่อยิงปืน ผลิตจากโลหะผสมไทเทเนียม ทำให้เบาและแข็งแรงขึ้น ใช้อัปเกรดอาวุธ"
2140743564-NameTh = "เครื่องหมายเหล็กเซอร์วัล"
2140743564-DescriptionTh = "เครื่องหมายเหล็กที่ถอดแบบมาจากโลโก้ <เซอร์วัล> แบรนด์อุปกรณ์กีฬาชื่อดัง ทำจากเหล็กที่ทนทาน จึงไม่ต้องกังวลเรื่องรอยขูดขีด"
1505921304-NameTh = "เครื่องหมายผ้ามานาซึรุ"
1505921304-DescriptionTh = "เครื่องหมายผ้าที่ถอดแบบมาจากโลโก้ <มานาซึรุ> แบรนด์อุปกรณ์กลางแจ้ง สร้างจากผ้าเนื้อนุ่ม ใช้ได้ดีแม้ในหน้าหนาว"
3033340240-NameTh = "เครื่องหมายแองกี้ อาเดลี"
3033340240-DescriptionTh = "เครื่องหมายทรงกลมรูปแองกี้อาเดลีใน <MOMO FRIENDS> ถ้าจ้องมองนานๆ อาจรู้สึกแย่ได้..."
344772093-NameTh = "เครื่องหมายปักลายเวโรนิก้า"
344772093-DescriptionTh = "เครื่องหมายปักลายโลโก้ <เวโรนิก้า> แบรนด์ชื่อดัง ไม่ว่าจะติดไว้บนผลิตภัณฑ์อะไรก็ดูหรูหรา"
2127407973-NameTh = "เครื่องหมายคาเซยาม่า"
2127407973-DescriptionTh = "เครื่องหมายที่ถอดแบบมาจากโลโก้ <คาเซยาม่า> แบรนด์สินค้าทหาร ด้านหลังติดด้วยตีนตุ๊กแก ทำให้แกะออกจากเสื้อผ้าได้ง่าย"
3784559011-NameTh = "เครื่องหมายโคโค่ เดวิลเงิน"
3784559011-DescriptionTh = "เครื่องหมายเงินที่มีโลโก้ของ <โคโค่เดวิล> แบรนด์สินค้าโกธิคโลลิ สามารถใช้เป็นเข็มกลัดโดยใช้ติดที่ด้านหลังเสื้อ"
589220143-NameTh = "เครื่องหมายสตรีท"
589220143-DescriptionTh = "เครื่องหมายจากแบรนด์สตรีทแฟชั่น <ทริปเปิล สเต็ป> มีชื่อแบรนด์ถูกพิมพ์ไว้ตรงกลาง แสดงให้เห็นความภาคภูมิใจ ของบริษัทผู้ผลิตที่มีต่อแบรนด์"
49559053-NameTh = "เครื่องหมายโลเรไล"
49559053-DescriptionTh = "เครื่องหมายของแบรนด์แฟชั่นสมัยใหม่ <โลเรไล> ทำจากไม้เนื้อแข็งที่แกะสลักอย่างประณีต พื้นผิวลื่นและมีกลิ่นหอม"
786809132-NameTh = "เครื่องหมายยางฮาร์เพีย"
786809132-DescriptionTh = "เครื่องหมายที่เป็นโลโก้ของแบรนด์อุปกรณ์\nกีฬาทางน้ำ <ฮาร์เพีย> ผลิตจากวัสดุยางที่\nอ่อนนุ่มและเปื้อนยาก ใช้ตกแต่งได้ทุกที่"
2966784212-NameTh = "เครื่องหมายเหรียญ"
2966784212-DescriptionTh = "เครื่องหมายโลหะที่ได้รับแรงบันดาลใจ\nมาจากเหรียญที่ใช้ในเกมตู้ ด้วยขนาดที่\nค่อนข้างใหญ่ จึงใส่ในเครื่องเกมไม่ได้ "
1494732916-NameTh = "ผ้าคาดหัวนักเทนนิส"
1494732916-DescriptionTh = "ผ้าคาดหัวนักเทนนิสของ <เซอร์วัล> แบรนด์ชุดกีฬา ทำจากวัสดุที่ดูดซับน้ำได้ดี ช่วยกันเหงื่อที่ไหลระหว่างออกกำลังกายได้"
3940891435-NameTh = "ยางมัดผม"
3940891435-DescriptionTh = "ยางมัดผมจากผ้าที่ยืดได้ดี เหมาะจะใช้มัดผมตอนที่กินน้ำซุปร้อนๆ ได้ดี"
3392023658-NameTh = "กิ๊บติดผมลูกพีช"
3392023658-DescriptionTh = "กิ๊บติดผมที่ติดรูปลูกพีชจากไอค่อน <MOMOTALK> เมื่อถูที่ลูกพีชจะมีกลิ่นลูกพีชอ่อนๆ ออกมา"
2520092463-NameTh = "กิ๊บติดผมปีก"
2520092463-DescriptionTh = "กิ๊บติดผมที่มีแรงบันดาลใจจากปีกนางฟ้า แบรนด์ชื่อดัง <เวโรนิก้า> แต่กลับไม่ค่อยเป็นที่นิยมในหมู่นักเรียนทรีนิตี้"
765040081-NameTh = "กิ๊บอเนกประสงค์"
765040081-DescriptionTh = "กิ๊บอเนกประสงค์ ที่ถูกลับให้ปลายด้านหนึ่งมีความแหลมคม ใช้เป็นที่เปิดขวดหรือมีดพกได้ ควรใช้อย่างระวัง มันอาจทำให้มือคุณบาดเจ็บตอนเสยผมได้"
277995823-NameTh = "กิ๊บติดผมปีกค้างคาว"
277995823-DescriptionTh = "กิ๊บติดผมรูปปีกค้างคาวที่ดูคล้ายริบบิ้นสีดำ และทำให้ผู้ใส่มีเสน่ห์เหมือนปีศาจน้อย"
1353993108-NameTh = "กิ๊บติดผมอักษรศิลป์"
1353993108-DescriptionTh = "กิ๊บติดผมที่ทำจากตัวอักษร ตัวคำศัพท์ไม่ได้มีความหมายอะไรเป็นพิเศษ แต่ก็เพียงพอที่จะกระตุ้นต่อมแฟชั่นได้"
3000997093-NameTh = "กิ๊บติดผมใบไม้"
3000997093-DescriptionTh = "กิ๊บติดผมรูปใบไม้ มันอาจจะดูโดดเด่นไปหากใช้ในชีวิตประจำวัน แต่เหมาะจะใช้ในวันที่ระลึกมากกว่าที่คิด"
1668620571-NameTh = "กิ๊บติดผมสมอเรือ"
1668620571-DescriptionTh = "กิ๊บติดผมรูปสมอเรือแบบสองเงี่ยง แม้ว่าจะ\nมีดีไซน์สวยน่ารัก แต่ตอนที่มัดผมมักจะ\nเกี่ยวกับส่วนเงี่ยง เลยใช้งานจริงไม่สะดวก"
3421013348-NameTh = "กิ๊บติดผม แบบกันคลื่นแม่เหล็กไฟฟ้า"
3421013348-DescriptionTh = "กิ๊บติดผมที่ช่วยเสริมสุขภาพสมอง ด้วยวิธีการบล็อกคลื่นแม่เหล็กไฟฟ้า แน่นอนว่าไม่มีใครรู้ว่าใช้ได้ผลจริงหรือไม่"
3948898300-NameTh = "เครื่องรางเดินทางปลอดภัย"
3948898300-DescriptionTh = "เครื่องรางที่ใส่ความตั้งใจให้เดินทาง โดยสวัสดิภาพไว้เต็มเปี่ยม ถ้าเขย่าจะได้ยินเสียงกรุ๊งกริ๊งๆ จากโลหะด้านที่กระทบกัน"
2028861040-NameTh = "ถุงร้อนอุ่นมือ"
2028861040-DescriptionTh = "ถุงร้อนอุ่นมือขนาดเท่าฝ่ามือ เมื่อขยำหลายครั้งจะปล่อยความร้อนออกมา ไม่มีเครื่องรางไหนจะเหมาะอากาศหนาวจัด เท่านี้อีกแล้ว"
1207585231-NameTh = "ขนนกของเพโรโร่"
1207585231-DescriptionTh = "เครื่องรางที่ห้อยขนนกสีขาวขนาดใหญ่\nที่มาของขนนกนี้เป็นความลับทางธุรกิจสำคัญ\nของ MOMO FRIENDS"
3129277640-NameTh = "จี้กางเขน"
3129277640-DescriptionTh = "เครื่องรางรูปทรงไม้กางเขน ที่นักเรียนทรีนิตี้ใช้ เหมาะจะใช้ห้อยประดับกระเป๋า"
1991164124-NameTh = "ดารุมะลายพราง"
1991164124-DescriptionTh = "ตุ๊กตาดารุมะที่ทาสีเป็นลายพราง ไม่ว่าจะวางไว้ที่ไหนก็กลืนกับพื้นหลังได้อย่างเป็นธรรมชาติ"
237084781-NameTh = "ตุ๊กตาวูดู"
237084781-DescriptionTh = "ตุ๊กตาวูดูที่สร้างขึ้นจากความโกรธแค้นขณะที่นึกถึงคนที่เกลียด เป็นที่นิยมในหมู่ผู้ทำงานเย็บปักถักร้อย ไว้สำหรับเก็บเข็มแหลมๆ"
3113501019-NameTh = "เครื่องหอมแบบพกพา"
3113501019-DescriptionTh = "เครื่องหอมแบบพกพาที่มาจากการคอลแลบ กับผู้ผลิตเวชสำอาง <ซีไซด์> นักเรียนจำนวนมากนำมาแขวนเป็นพวงกุญแจ เพราะมีดีไซน์นำแฟชั่น"
3888622253-NameTh = "ดรีมแคชเชอร์"
3888622253-DescriptionTh = "สิ่งลึกลับที่มีความเชื่อว่าใช้ดักจับฝันร้ายได้ ถ้าลองดมดูจะได้กลิ่นหอมเฉพาะตัวของไม้"
4137284716-NameTh = "เครื่องรางฟันปลา"
4137284716-DescriptionTh = "เครื่องรางที่ทำจากฟันของปลาที่แหลมคม มีเรื่องเล่าว่าถ้ามีเครื่องรางนี้จะช่วยป้องกัน\nอุบัติเหตุทางทะเลได้"
3088246464-NameTh = "คีย์แคปของเล่น"
3088246464-DescriptionTh = "ของเล่นที่ทำจากแป้นคีย์บอร์ด เมื่อกดแล้วจะไม่มีอะไรเกิดขึ้น แต่เสียงคลิกจะช่วยปลอบประโลมจิตใจ"
727987239-NameTh = "นาฬิกาดิจิทัลกันน้ำ"
727987239-DescriptionTh = "นาฬิกาดิจิทัลจากแบรนด์ชุดกีฬา <เซอร์วัล> แบบกันน้ำ ดังนั้นไม่ต้องกลัวพังเมื่อใส่ว่ายน้ำ"
111602846-NameTh = "นาฬิกาข้อมือหนัง"
111602846-DescriptionTh = "นาฬิกาข้อมือหนัง แบรนด์อุปกรณ์กลางแจ้ง <มานาซึรุ> สายนาฬิกาหนังช่วยป้องกันไม่ให้ข้อมือเย็น"
2073706703-NameTh = "นาฬิกาเวฟแคท"
2073706703-DescriptionTh = "นาฬิกาข้อมือรูปเวฟแคท ตัวการ์ตูนแมวใน <MOMO FRIENDS> บอกเวลาได้ตรงด้วยเข็มนาฬิการูปแขนแมว ที่บิดแบบแปลกๆ"
1058159756-NameTh = "นาฬิกาพกโบราณ"
1058159756-DescriptionTh = "นาฬิกาพกโบราณที่แกะสลักโลโก้ <เวโรนิก้า>\nมีข้อเสียที่ดูเวลาลำบากเมื่อเทียบกับนาฬิกา\nข้อมือ นิยมใช้เป็นของใช้แฟชั่น"
3773560632-NameTh = "นาฬิกาลายพราง"
3773560632-DescriptionTh = "นาฬิกาลายพรางจากแบรนด์สินค้าทหาร <คาเซยาม่า> ใช้งานได้ดีแม้อยู่ในสภาพแวดล้อมแย่ เพราะเสริมความสามารถกันฝุ่นมาแล้ว"
2415212758-NameTh = "นาฬิกาข้อมือโกธิก"
2415212758-DescriptionTh = "นาฬิกาข้อมือแบบโกธิกที่มีลายซับซ้อน เหมาะจะใส่กับชุดแบบคลาสสิก แต่มีข้อเสียที่ดูเวลายาก"
3475264813-NameTh = "นาฬิกาสตรีทแฟชั่น"
3475264813-DescriptionTh = "นาฬิกาสตรีทแฟชั่นที่ได้รับการประเมินว่า มีดีไซน์ที่ทั้งโมเดิร์นและน่ารัก <ทริปเปิล สเต็ป> ใช้กลยุทธ์ทางตลาดขายนาฬิกานี้ เป็นเซ็ตกับสร้อยข้อมือด้วย"
2321708498-NameTh = "นาฬิกาข้อมือโลเรไล"
2321708498-DescriptionTh = "นาฬิกาข้อมือแบรนด์แฟชั่นสมัยใหม่ <โลเรไล> ที่ผสานความสวยงามเฉพาะตัวของไม้และหนัง"
333016136-NameTh = "นาฬิกาดำน้ำ"
333016136-DescriptionTh = "สมาร์ทวอทช์สำหรับดำน้ำของแบรนด์อุปกรณ์\nกีฬาทางน้ำ <ฮาร์เพีย> ที่ทั้งกันน้ำและใช้ตรวจ\nสภาพแวดล้อมใต้น้ำได้โดยไม่ต้องห่วงแรงดันน้ำ"
556604040-NameTh = "นาฬิกาจอสัมผัส"
556604040-DescriptionTh = "นาฬิกาที่มีหน้าจอสัมผัส สามารถติดตั้งและเปิดเกมได้ทุกประเภท แต่ประสิทธิภาพนั้นทำได้ถึงแค่การเปิดเกมเท่านั้น"
1506609692-NameTh = "สร้อยคอบลูธูท"
1506609692-DescriptionTh = "สร้อยคอบลูธูทที่ใช้วัดอุณหภูมิ และอัตราการเต้นหัวใจของผู้ใช้ได้ เป็นของใช้สำหรับผู้ที่กำลังควบคุมน้ำหนัก ช่วยติดตามปริมาณการออกกำลังกายได้ง่าย"
3750431669-NameTh = "สร้อยคอเกล็ดหิมะ"
3750431669-DescriptionTh = "สร้อยคอสีเงินห้อยจี้ตกแต่งรูปเกล็ดหิมะ ถ้าจ้องจี้เกล็ดหิมะนานๆ จะรู้สึกเย็นได้"
4279598505-NameTh = "สร้อยคอนิโคไล"
4279598505-DescriptionTh = "ล็อกเก็ตรูปหน้า Mr.นิโคไล ตัวการ์ตูนจาก <MOMO FRIENDS> เมื่อกดที่จมูกจะเปิดให้เห็นที่เก็บรูปขนาดเล็ก"
2508370757-NameTh = "โชคเกอร์จี้กางเขน"
2508370757-DescriptionTh = "โชคเกอร์จี้กางเขนจากแบรนด์ชื่อดัง <เวโรนิก้า> ด้วยรูปแบบที่เรียบง่ายแต่ดูเก๋เลยเป็นที่นิยม"
1517613390-NameTh = "ป้ายชื่อทหาร"
1517613390-DescriptionTh = "ป้ายชื่อทหารที่มีสลักชื่อ และเลขประจำตัว\nนักเรียน เป็นเครื่องประดับใหม่ที่นิยมมาก ในหมู่\nนักเรียนหญิงมัธยมปลาย ช่วยเพิ่มเสน่ห์ได้"
1964406377-NameTh = "โชคเกอร์พังก์"
1964406377-DescriptionTh = "โชคเกอร์ที่ให้อารมณ์แบบพังก์ และประดับด้วยหนามแหลม หนามแหลมนี้ทำให้พยักหน้าลำบาก เพราะมันจะทิ่มคอได้"
2501983868-NameTh = "สร้อยคอโซ่"
2501983868-DescriptionTh = "สร้อยคอที่ทำจากโซ่ เสียงตอบรับจากผู้สวมใส่บอกว่า เสียงกรุ๊งกริ๊งจากโซ่อาจทำให้อารมณ์ดี แต่ใส่แล้วเย็นคอมาก "
3300639114-NameTh = "สร้อยคอใบไม้"
3300639114-DescriptionTh = "สร้อยคอของแบรนด์แฟชั่นสมัยใหม่ <โลเรไล> ว่ากันว่าเมื่อใบไม้ถูกแสง จะส่องประกายแวววาว"
3366268717-NameTh = "ตัวล็อกออคโตปุส"
3366268717-DescriptionTh = "ตัวล็อกอุปกรณ์ช่วยหายใจของนักดำน้ำ ด้วยสีสันและดีไซน์ของแบรนด์ <ฮาร์เพีย> ที่ดูลุ่มลึกนี้ จึงถูกใช้เป็นสินค้าแฟชั่นด้วย"
1125967041-NameTh = "สร้อยคอหน่วยความจำ"
1125967041-DescriptionTh = "สร้อยคอที่ติดตั้งอุปกรณ์บันทึกข้อมูล ออกแบบมาให้ดูเหมือนเครื่องประดับ ภายนอกอาจดูฉูดฉาด แต่อาจมีความลับบางอย่างซ่อนอยู่ภายในก็เป็นได้"
