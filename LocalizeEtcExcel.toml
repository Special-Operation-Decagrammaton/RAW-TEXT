1844419868-NameKr = "보안키"
1844419868-DescriptionKr = "보안문을 열거나 잠금장치를 해제할 수 있는 인증 보안키. 잃어버리면 안되는 중요한 물건이니 나중에 주인에게 돌려주자. …물론 들키지 않게 몰래. 그리고 지금은 사용이 먼저다."
3949011075-NameKr = "USB"
3949011075-DescriptionKr = "여러가지 작용을 할 수 있는 특수 USB. 옛날에는 나무나 옥으로 판 도장을 사용하였지만, 지금은 시대가 달라졌다."
1153341951-NameKr = "OTP"
1153341951-DescriptionKr = "견고한 보안 시스템을 위해 만들어진 특별 인증 장치. 이것이 없으면, 아무리 비밀번호를 알고 있어도 보안을 해제할 수 없다. 물론 반대로 이것만 있으면…."
3426576768-NameKr = "회복약"
3426576768-DescriptionKr = "지친 몸이나 가벼운 상처를 회복시켜주는 약. 만성 피로나 큰 상처에는 사용할 수 없다. 애초에 가능한 다치지 않도록 하자."
282905937-NameKr = "와이어커터"
282905937-DescriptionKr = "감시카메라, 클레이모어 등을 해체할 수 있는 절단기. 확실한 성능의 예리한 도구이지만, 예리한 만큼 금새 마모돼 여러 번 쓸 수는 없다. 해제할 대상을 신중하게 고르자."
2775830511-NameKr = "소음 발생기"
2775830511-DescriptionKr = "작전 중 유사시를 대비하기 위해 만들어진 소음 발생기. 수세에 몰렸거나 발각될 위기에 처했을 때, 다른 곳으로 주위를 돌릴 수 있다. 켠 뒤에는 반드시 반대쪽으로 몸을 피하자."
1728300996-NameKr = "저소음 탄환"
1728300996-DescriptionKr = "소음기만으로는 부족한 상황, 혹은 소음기를 장착할 수 없는 상황에 사용되는 저소음 탄환. 총알 자체가 소리를 거의 내지 않는다. 발사와 피격 시 발생하는 열도 빠르게 사라진다. 때문에 일반 탄환보다는 다소 약한 위력을 가지고 있으나, 잠입 임무에는 효과적이다."
3964788977-NameKr = "통신용 무전기"
3964788977-DescriptionKr = "웬만한 재밍은 뚫을 수 있다는 고성능 무전기. 잠입 작전을 목적으로 만들어져 있으나, 통신 성능에 치중하여 본체는 다소 크고 무겁다. 밀레니엄의 학생이 아니더라도 사용할 수 있게 크고 단순한 인터페이스를 가지고 있다."
1383315036-NameKr = "아르기닌 박스"
1383315036-DescriptionKr = "트레이닝 식품이 들어 있던 상자. 작은 몸집이라면 안에 쏙 들어갈 수 있을 정도로 커다랗다. 거기다 안에서 밖을 살필 수 있는 구멍까지! 최고의 잠입 아이템."
2125430007-NameKr = "리오가 만들어준 스캐너"
2125430007-DescriptionKr = "주변을 스캔하여 수상한 것들을 찾아 주는 첨단기기. 헤드폰을 쓴 채로 탐지기를 움직여 사용할 수 있다. 어떤 원리인지는 알 수 없지만, 성능만큼은 확실하다."
3106820832-NameKr = "타격용 특수 패드"
3106820832-DescriptionKr = "어깨가 아니라 뒤통수에 닿을 용도로 만들어진, 타격용 특수 패드. 충격은 그대로 전달되지만 동시에 놀랍도록 조용하게끔 설계돼 있다."
4092727589-NameKr = "특수 도료가 발라진 무릎보호대"
4092727589-DescriptionKr = "무릎을 바닥에 쓸며 조용히, 순식간에 이동할 수 있게 만든 특수 보호대. 특별한 추가기능은 없기에 사용자의 기술과 역량에 따라 효율이 천차만별이다."
3328636483-NameKr = "박스를 사용해 헬멧단에게 들키지 않고 접근하기"
3328636483-DescriptionKr = "헬멧단에게 접근해 이야기를 엿듣자. 박스를 사용하면 들키지 않고 접근할 수 있다."
2007212476-NameKr = "드론을 피해 보안문 넘어가기"
2007212476-DescriptionKr = "데이터센터를 지키는 드론들을 피해 보안문을 넘어가자. 회복약을 사용하면 체력을 회복할 수 있다."
14774070-NameKr = "드론을 피해 빅 시스터 룸으로 잠입하기"
14774070-DescriptionKr = "데이터센터의 보안 드론을 피해 빅 시스터 룸으로 잠입하자. 리오의 로봇 강아지를 이용해 진행 상황을 저장할 수 있다."
3457439688-NameKr = "위험한 출품물을 찾아 회수하기"
3457439688-DescriptionKr = "시연장에 출품된 위험한 물건을 찾아 회수하자. 세이아가 들고 있는 스캐너를 사용하면 숨겨진 물품을 찾을 수 있다."
1369763957-NameKr = "헬멧단 리더 체포하기"
1369763957-DescriptionKr = "시연장의 출품물을 훔치는 헬멧단의 리더를 체포하자. 타격용 특수 패드를 사용하면 은밀하게 제압할 수 있다."
4069660877-NameKr = "게임개발부 부스의 침입자 색출하기"
4069660877-DescriptionKr = "게임개발부 부스에 침입한 침입자를 색출하자. 서로의 행동을 보완하여 보안 시스템을 돌파할 수 있다."
4201274762-NameKr = "오작동 설비의 전원 끄기"
4201274762-DescriptionKr = "배전반을 조작해 오작동을 일으키는 설비들의 전원을 끄자. 무릎 보호대를 사용해 들키지 않고 신속히 이동할 수 있다."
2555313209-NameKr = "스미레와 헬멧단을 피해 탈출하기"
2555313209-DescriptionKr = "스미레와 헬멧단을 피해 시연장을 탈출하자. 캐비닛에 숨으면 스미레와 헬멧단에게 들키지 않을 수 있다."
3441326232-NameKr = "보안 시스템을 피해 탈출하기"
3441326232-DescriptionKr = "작동된 보안 시스템을 피해 시연장을 탈출하자. 위험해 보이는 가스를 피해 신속히 탈출해야 한다."
2202660611-NameKr = "메카 악어를 피해 탈출하기"
2202660611-DescriptionKr = "폭주하는 메카 악어를 피해 시연장을 탈출하자. 자판기를 활용하면 쫓아오는 메카 악어의 속도를 늦출 수 있다."
