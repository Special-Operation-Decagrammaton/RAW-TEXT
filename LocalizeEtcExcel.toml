404292254-NameTh = "ภาพพนักงานต้อนรับที่ทางเข้าออนเซ็น"
404292254-DescriptionTh = "ออนเซ็นของเรายินดีต้อนรับลูกค้าด้วยรอยยิ้มที่เป็นมิตร\n(หากพบพนักงานเสิร์ฟเครื่องดื่มที่น่าสงสัย กรุณาแจ้งนายหญิงทันที!)"
4035745238-NameTh = "ภาพนายหญิงที่แนะนำสวนภายในออนเซ็น"
4035745238-DescriptionTh = "ออนเซ็นของเรามีสวนหินที่ประกอบด้วยหินและทราย\nมาผ่อนคลายจิตใจในสวนแสนเรียบง่ายที่เน้นความสงบดูสิคะ"
1774361412-NameTh = "ภาพนายหญิงที่ทำความสะอาดห้องพัก"
1774361412-DescriptionTh = "ออนเซ็นของเราทำการฆ่าเชื้อเครื่องนอนวันละ 2 ครั้งค่ะ \nเชิญพักผ่อนโดยไม่ต้องกังวลเรื่องสุขอนามัยอย่างสบายได้เลยค่ะ!"
3950044430-NameTh = "ภาพแขกที่ผ่อนคลายอยู่ในบ่อน้ำกลางแจ้ง"
3950044430-DescriptionTh = "น้ำพุร้อนในออนเซ็นของเรามีผลช่วยให้ผิวกระจ่างใส เพิ่มกำลังวังชาและความสามารถในการยิง \nมาพบตัวคุณคนใหม่ที่ออนเซ็นของเราสิคะ!"
999560012-NameTh = "ภาพแขกที่เอร็ดอร่อยกับอาหารในห้องจัดเลี้ยง"
999560012-DescriptionTh = "ออนเซ็นของเราจะทำให้คุณเพลิดเพลินกับอาหารที่ปรุงจากวัตถุดิบที่มีคุณภาพที่ดีที่สุด\nเชิญรับประทานอาหารไคเซกิที่มีมันจูออนเซ็นและโออิชิบงได้เลยค่ะ!"
1094144720-NameTh = "ฝึก"
1094144720-DescriptionTh = "สนามแข่งขันกีฬาที่เปิดให้เข้าใช้ได้ในวันที่ไม่มีการแข่ง\nนักเรียนที่ต้องการใช้สนาม สามารถติดต่อและกรอกคำขอใช้สนามที่ฝ่ายดูแลสนามกีฬาได้"
2809976808-NameTh = "เชียร์"
2809976808-DescriptionTh = "ส่งเสียงเชียร์เป็นกำลังใจให้เหล่านักกีฬาทุกคน!\nมาส่งเสียงเชียร์ดังๆ เป็นกำลังใจให้เหล่านักกีฬาที่เข้าร่วมการแข่งอย่างสุดฝีมือกันเถอะ!"
374407097-NameTh = "ทำงาน"
374407097-DescriptionTh = "คณะกรรมการจัดงานแข่งขันกีฬางานฮาโลเฟสติวัลครั้งนี้ กำลังพยายามทำงานอย่างหนัก\nเพื่อเตรียมงานที่ดีที่สุดสำหรับทุกคน หากพบปัญหาใดๆ ระหว่างแข่งขัน โปรดติดต่อผู้ดูแลภายในสถานที่จัดงาน"
1521840386-NameTh = "สร้าง"
1521840386-DescriptionTh = "เตรียมเครื่องมือสำหรับซ่อมแซมเบื้องต้นต่างๆ ไว้ที่คลังเก็บของของสนามกีฬาแล้ว\n(เข้ามาใช้งานได้อย่างอิสระ แต่ถ้าเป็นการปรับปรุงอุปกรณ์ที่อันตราย ห้ามเข้ามาใช้พื้นที่เด็ดขาด)"
3558610679-NameTh = "พักผ่อน"
3558610679-DescriptionTh = "หลังออกกำลังกายเสร็จ อย่าลืมพักผ่อนนะคะ! ภายในห้องพักผ่อนของสนามกีฬา\nมีเครื่องกดเครื่องดื่มที่สามารถกดเครื่องดื่มฟรีได้ค่ะ โปรดเข้ามาใช้งานกันเยอะๆ นะคะ"
317946005-NameTh = "เมนูบรันช์แสนอร่อยในสนาม"
317946005-DescriptionTh = "ฮารุนะ: \"แม้แต่การรับประทานขนมปังก็สง่างามค่ะ เพราะว่าอาหารว่างถือเป็นพื้นฐานของการชิมไงคะ\"\nจุนโกะ: \"เดี๋ยวนะ อิซุมิ! เธอจะกินส่วนของฉันไม่ได้นะ!\""
543266597-NameTh = "ข้อความในโน้ต"
543266597-DescriptionTh = "อาโกะ: \"...แป่ว?\"\nอาริสึ: \"อาริสึเคลียร์เงื่อนไขเควสผ่านแล้วค่ะ!\""
860818406-NameTh = "แฮ็กเกอร์กับเกมขี่คอ"
860818406-DescriptionTh = "มากิ: \"ขะ...ขาฉันสั่นไปหมดแล้ว...\" / โคทามะ: \"อีกเดี๋ยวก็น่าจะหายค่ะ...\" / จิฮิโระ: \"พวกเธอนี่ เพราะอย่างงี้ฉันถึงได้บอกให้ออกกำลังกายเป็นประจำไงล่ะ\""
3205226752-NameTh = "สัมผัสของระเบิดมือ"
3205226752-DescriptionTh = "โมเอะ: \"ซากิ รับไปเร็วเข้า\"\n ซากิ: \"ดะ... เดี๋ยวก่อนสิ! แล้วสลักระเบิดอยู่ไหนล่ะ?!\""
2479371781-NameTh = "ผู้นำตัวอย่าง"
2479371781-DescriptionTh = "ริน: \"การฟื้นฟูพื้นที่อยู่อาศัยต้องมาเป็นอันดับแรก มาเร่งดำเนินการฟื้นฟูเพื่อความปลอดภัยของพลเมืองกันเถอะค่ะ\""
2720792911-NameTh = "ในการประชุมขององค์การนักเรียน"
2720792911-DescriptionTh = "ริน: \"อายูมุ… ไม่สิ หัวหน้าฝ่ายไกล่เกลี่ยช่วยวิเคราะห์ระดับความคืบหน้าของการฟื้นฟูพื้นที่นี้ให้ด้วยค่ะ\"\nอายูมุ: \"ค่ะ! พูดถึงรายงานสถานการณ์การฟื้นฟูสินะคะ! จะไปเอามาให้เดี๋ยวนี้ค่ะ!"
1248524252-NameTh = "ความสามารถที่คาดไม่ถึง"
1248524252-DescriptionTh = "อายูมุ: \"ใส่ได้เยอะกว่าที่คิดหรือเปล่านะ... มันจะล้มอีกแล้วค่ะ...\"\nโมโมกะ: \"โอ้ มหัศจรรย์มากเลย... ไม่รู้เลยว่ารุ่นพี่อายูมุมีความสามารถพิเศษแบบนี้ด้วย\""
2076555680-NameTh = "วินาศกรรมรสมันฝรั่งทอดรสไข่ปลา"
2076555680-DescriptionTh = "โมโมกะ: \"มันฝรั่งทอดรสไข่ปลานี่เป็นรสชาติที่กินได้ทุกที่ทุกเวลาจริง ๆ ~ (ง่ำๆ)\"\n ริน: \"......โมโมกะ?\""
2282918223-NameTh = "เคลียร์เขาวงกตผาหิน!"
2282918223-DescriptionTh = "ฮินาตะ: \"ทุกคนออกไปได้อย่างปลอดภัยใช่ไหมคะ? โล่งอกไปทีค่ะ!\"\nโคฮารุ: \"...เกมเขาวงกตงั้นเหรอ...?\""
2182173966-NameTh = "เคลียร์อาคารใต้ดิน!"
2182173966-DescriptionTh = "อุย: \"อะ... โอ้... นี่มัน...!\"\nฮานาโกะ: \"ไม่ได้เห็นคุณอุยตื่นเต้นมานานแล้วนะคะ ฮุฮุฮุ\""
742766755-NameTh = "เคลียร์สวนเลมอนที่ถูกทิ้งร้าง!"
742766755-DescriptionTh = "ฮินาตะ: \"เยอะไปหมดเลย แบ่งคนอื่นด้วยดีไหมคะ?\"\nโคฮารุ: \"หา? ฉะ... ฉันด้วยเหรอ...?\""
2756625307-NameTh = "เคลียร์ประภาคารที่ถูกลืม!"
2756625307-DescriptionTh = "ฮานาโกะ: \"คุณอุยดูสิคะ ลมพัดผ่านผิวส่วนนอกร่มผ้าด้วย...\"\nอุย: \"อ๊ายยยย~ ฉันไม่ได้ยินอะไรทั้งนั้น~!"
1354203676-NameTh = "เคลียร์กองบัญชาการหลังน้ำตก!"
1354203676-DescriptionTh = "ฮานาโกะ: \"■■! ■■! ■■■■~! ■■~♡!!\"\nโคฮารุ: \"พูดเรื่องลามกแบบนั้นได้ไง! ลงโทษ! ต้องลงโทษ!!\""
3510482019-NameTh = "เคลียร์ส่วนลึกที่สุดของเกาะ!"
3510482019-DescriptionTh = "อุย: \"...ที่นี่เคยเป็นสถานที่แห่งความทรงจำอันล้ำค่าของทุกคนสินะคะ\"\nฮินาตะ: \"และตอนนี้ก็เป็นของเราด้วยค่ะ!\""
1430929184-NameTh = "กำลังเคลื่อนย้าย..."
1430929184-DescriptionTh = "ฮานาโกะ: \"เหมือนได้มาปิกนิกเลย ดีจังนะคะ~♡\"\nอุย: \"แฮ่กๆ... ไม่ไหวแล้ว... ช้าๆ หน่อย...\""
1612527987-NameTh = "ปิ๊กของโยชิมิ"
1612527987-DescriptionTh = "ปิ๊กของว่าที่คนดัง(?) โยชิมิ เธอออกแบบและผลิตขึ้นมาเอง ว่าแต่นี่ไม่ได้สั่งผลิตมากไปใช่ไหม...?"
405568906-NameTh = "จนกว่าจะหมดแรง"
405568906-DescriptionTh = "\"อะฮ่าฮ่า... ทุกคนดูเต็มที่กันจังเลยนะ...\""
494840872-NameTh = "โน้ตดนตรีของไอริ"
494840872-DescriptionTh = "โน้ตดนตรีลับที่ไอริทำมาให้ทุกคน มันคือความจริงที่ว่าไม่มีใครหนีจากการเรียนพ้น"
1618456696-NameTh = "ดูตรงทางขวาล่างสิ!"
1618456696-DescriptionTh = "\"อ๊ากกกก! รีบลบเดี๋ยวนี้เลยนะ!!\""
2983071558-NameTh = "วิทยุของนัตสึ"
2983071558-DescriptionTh = "วิทยุเครื่องเล็กที่นัตสึยอดนักกลยุทธ์เตรียมไว้ มันทำให้ทุกคนประสานเป็นหนึ่งเดียวกันได้จริงๆ"
1033649487-NameTh = "รวมกายใจเป็นหนึ่ง"
1033649487-DescriptionTh = "\"นี่มันหมายความว่าอะไรกันแน่...\""
3761469925-NameTh = "บิงโกของหวานของคาซึสะ"
3761469925-DescriptionTh = "คาซึสะ หัวหน้าหน่วยจู่โจมมือหนึ่งได้ใช้ทุกทักษะที่มีทำขึ้น... ย่าห์! ไม่เอาความรุนแรง!"
1161323409-NameTh = "ปลุกไฟวัยรุ่น"
1161323409-DescriptionTh = "\"ดูสิ นี่คือชมรมของหวานหลังเลิกเรียนที่กล้าหาญ\""
128049250-NameTh = "ไฮเวย์ตามใจฉัน"
128049250-DescriptionTh = "\"สงสัยในความสามารถของฉันที่เป็นสุดยอดนักแข่งแห่งสภาน้ำชางั้นเหรอ?\"\n\"คนที่ขับรถได้ในสภาน้ำชามีแค่คุณเซอาคนเดียวนี่คะ!\""
3186763206-NameTh = "เชียร์สุดพิเศษ"
3186763206-DescriptionTh = "\"พอเห็นอันนี้แล้ว สู้อีกสัก 10 ปีก็ยังไหว\"\n- นิรนามจากชมรมสอบสวน ชาเล่ต์"
3588818690-NameTh = "ช่วงเวลาล้างแค้น"
3588818690-DescriptionTh = "\"เซอาจัง ต้องทาให้ทั่วเลยเหรอ?\"\n\"ทาให้... ทั่วเลย\""
3450293592-NameTh = "แผนรับมือรังสี UV ที่สมบูรณ์แบบ"
3450293592-DescriptionTh = "\"ฉันว่าฉันได้ยินชัดแจ๋วเลยละค่ะ...\""
1026138108-NameTh = "เหยียบหางเสือ"
1026138108-DescriptionTh = "\"นี่ เจ้าโง่...! ถ้าแตะต้องคนนั้นละก็...! อ๊ะ...\"\n- คำพูดสุดท้ายก่อนถูกส่งตัวของแก๊งหมวกกันน็อกนิรนาม"
2174565429-NameTh = "ชาเพิ่มช็อต"
2174565429-DescriptionTh = "เติมช็อตเอสเปรสโซเพิ่มในชามะนาวรสหวานก็สมบูรณ์แบบ☆"
2712962423-NameTh = "ความต่างทางวัฒนธรรม"
2712962423-DescriptionTh = "\"ตะ... เติมน้ำเชื่อมลงในชา แล้วยังผสมกาแฟเข้าไปด้วยเหรอ?!\"\n\"ป่าเถื่อน...! โลกภายนอกช่างป่าเถื่อนจริงๆ...!\""
2618526928-NameTh = "ชั่วโมงโยคะ"
2618526928-DescriptionTh = "\"ทั้งสองคนกำลังสนุกกันอยู่สินะ~ อิจฉาจัง~ เมื่อไหร่จะได้ทำแบบนี้อีกนะ?\"\n\"ไม่ทำอีกแล้วค่ะ\""
4127946330-NameTh = "วิเคราะห์อย่างเลือดเย็น"
4127946330-DescriptionTh = "'ไม่อายที่แต่งตัวแบบนั้นบ้างเหรอคะ?'"
2977465568-NameTh = "รอยยิ้ม 100 คะแนนเต็ม"
2977465568-DescriptionTh = "\"พิเศษเฉพาะคุณครูคนเดียวเท่านั้นนะ เข้าใจมั้ย?\""
2827413561-NameTh = "เดินเล่นใต้น้ำ"
2827413561-DescriptionTh = "\"ข่าวลือที่ว่ามีการทรมานด้วยน้ำในชมรมซิสเตอร์เป็นเรื่องจริง...!\"\n- โคเซกิ อุย หัวหน้าชมรมอ่านหนังสือ ผู้หลงใหลในทฤษฎีสมคบคิด"
1879850544-NameTh = "ดีวาผู้ซ่อนตัว"
1879850544-DescriptionTh = "\"เซอาจัง รสนิยมเธอนี่เชยจริงๆ ★\""
2117597489-NameTh = "ผู้ชมบนอัฒจันทร์ที่เร่าร้อน"
2117597489-DescriptionTh = "\"นางิจัง... สนุกมั้ย? / \"...? ค่ะ\" / \"...ดีแล้วละนะ\""
194393215-NameTh = "ปลดปล่อยขีดจำกัด"
194393215-DescriptionTh = "ฮ่าฮ่า นี่มัน 'เรื่องใหญ่' จริงๆ นะ..."
1849099105-NameTh = "ความทรงจำในการชดใช้"
1849099105-DescriptionTh = "\"แอบถ่ายนี่~ ยังเรียกว่าเป็นสื่อสารมวลชนได้ยังไง?\"\n- คาซามากิ มาอิ บรรณาธิการชมรมนักข่าวของโรงเรียนโครโนส "
1543640472-NameTh = "รายการสิ่งที่อยากได้"
1543640472-DescriptionTh = "ความทรงจำเล็กๆ อันล้ำค่าเป็นพลังขับเคลื่อนสู่วันพรุ่งนี้"
1233193158-NameTh = "ทำความสะอาดหน่อยค่ะ!"
1233193158-DescriptionTh = "เคย์: \"มาทำความสะอาดกันก่อนดีกว่าค่ะ ที่นี่ใช่ที่ที่มีคนอยู่จริงเหรอคะ?\"\nโมโมอิ: \"คะ... แค่ทำเกมให้ดีก็พอแล้วไม่ใช่เหรอ?\"\nเคย์: \"ห้องก็ต้องสะอาดเพื่อให้มีสมาธิได้สิคะ!\""
3392696487-NameTh = "ช่วยกินผักด้วยเถอะค่ะ"
3392696487-DescriptionTh = "เคย์: \"โปรตีน ไฟเบอร์ และวิตามินมีความสำคัญเสมอนะคะ อาริสึ\"\nอาริสึ: \"ขอบคุณค่ะ เคย์!\"\nเคย์: \"ค่ะ ดีมากค่ะ\""
4227291809-NameTh = "วางแผนการพัฒนา!"
4227291809-DescriptionTh = "เคย์: \"ทำไมตารางถึงเป็นแบบนี้คะ? ใครเป็นคนทำตารางนี้คะ?!\"\nมิโดริ: \"ทุกคนก็แค่เขียนส่วนที่ตัวเองต้องการลงไปน่ะ...?\"\nเคย์: \"ถึงจะวางแผนมาดีแค่ไหน การพัฒนาก็อาจผิดพลาดได้อยู่ดีค่ะ!\""
2951021449-NameTh = "เคารพความคิดเห็นของผู้เชี่ยวชาญค่ะ"
2951021449-DescriptionTh = "ยูสึ: \"เอ่อ ถ้าฉันตรวจทานโค้ดนี้ละก็...\"\nเคย์: \"เอ่อ...ค่ะ ได้เลยค่ะ...\"\nเคย์: (ไม่ค่อยรู้เรื่องด้านนี้เท่าไหร่...แต่ยูสึคงทำได้ดีแน่ค่ะ)"
647268474-NameTh = "ลางร้าย"
647268474-DescriptionTh = "รายการจ่ายตลาดวันนี้ : เนื้อหมู 250 กรัม, มันฝรั่ง 2 หัว, หอมใหญ่ 3 หัว, แคร์รอต 1 หัว, ต้นหอม 1 ต้น..."
1555725293-NameTh = "ลางร้าย"
1555725293-DescriptionTh = "การเงิน - กระเป๋าแบน\nการตื่นเช้า - ยากทีเดียว\nตัวปัญหา - ระวังหน้ากาก "
909638122-NameTh = "ลางร้าย"
909638122-DescriptionTh = "ข้อที่ 1 เตรียมอุปกรณ์ ข้อที่ 2 เข้ายึดทางหลบหนี\nข้อที่ 3 บุกเข้าไปสถานที่เกิดเหตุ และเอาของใส่กระเป๋า\nแล้วพวกเขาจะถอนตัวโดยไม่มองย้อนกลับไป จำไว้ให้ดี"
1661297162-NameTh = "ลางร้าย"
1661297162-DescriptionTh = "รางรถไฟที่หมุนได้ไม่สิ้นสุดนี้จะพาไปสู่อนาคตของความยุติธรรมในที่สุด! ถ้าอยากได้สินค้าซูชิสุดเท่ ไม่ว่าใครก็ต้องนึกถึงไคเทนเจอร์! - เปิดระดมทุนสินค้าทางการของไคเทนเจอร์ -"
2317250528-NameTh = "โชคดีนิดนึง"
2317250528-DescriptionTh = "ความปรารถนา - อาจกลายเป็นจริงหรือไม่ก็ได้\nการเงิน - ได้รับเงินหายไปกลับคืน\nการลงทุน - ฝากเงินไว้กับ <สถาบันการเงินแก๊งคุโรคาเมะ> "
4179075589-NameTh = "โชคดีนิดนึง"
4179075589-DescriptionTh = "อยากดวงดีกว่าโชคดีนิดนึงไหมล่ะคะ? ตอนนี้ถ้าใส่เงินเพิ่มอีก จะมีดวงได้รางวัลชนะเพิ่มเป็นสองเท่า!\n※ ผลอาจแตกต่างกันไปในแต่ละคน - <ที่จัดงานฉลองปีใหม่แก๊งคุโรคาเมะ>"
1883262314-NameTh = "โชคดีนิดนึง"
1883262314-DescriptionTh = "อย่าผิดหวังแม้จะเป็นโชคดีนิดนึงเลยนะคะ ไม่ว่าจะมีเรื่องน่าผิดหวังอะไรก็ตาม\nฉันจะเอาใจช่วยคุณเสมอค่ะ <ประกันภัยแก๊งคุโรคาเมะ> จะคอยคุ้มครองอยู่เคียงข้างคุณ"
4030255031-NameTh = "โชคดีนิดนึง"
4030255031-DescriptionTh = "อย่างน้อยก็ได้โชคดีนิดนึง! โชคชะตาคือสิ่งเราต้องบุกเบิกเอง\nแล้วตอนนี้คุณจะเข้าแก๊งคุโรคาเมะ องค์กรที่เตรียมไว้นี้นี่เอง!\n<แก๊งคุโรคาเมะกรุ๊ป> เชื่อมั่นในศักยภาพของคุณ"
3228513232-NameTh = "โชคดีเล็ก"
3228513232-DescriptionTh = "การเดินทาง - การไปร้านสะดวกซื้อหน้าบ้านก็เป็นหนึ่งในการเดินทาง\nการพบกัน - หัวมุมซอยเป็นสถานที่พิเศษของคุณ\nอาหาร - ขนมปังที่หัวมุมซอย!"
1134549000-NameTh = "โชคดีเล็ก"
1134549000-DescriptionTh = "ได้โชคดีเล็ก ยินดีด้วยค่ะ! หวังว่าวันนี้จะเป็นวันที่มีสัญญาณไฟสีเขียวทุกครั้งที่ยืนอยู่บนทางม้าลาย!"
3267689061-NameTh = "โชคดีเล็ก"
3267689061-DescriptionTh = "ดวงในครั้งนี้คือโชคดีเล็ก! แม้ว่าชื่อจะเป็นโชคดีเล็ก แต่หัวใจที่อยู่ในนั้นมโหฬารเลย! มาลุยกันตอนนี้เลยค่ะ!"
499121846-NameTh = "โชคดีเล็ก"
499121846-DescriptionTh = "เราอยากทำให้คุณมีความสุขในปีนี้แม้จะเป็นแค่โชคดีเล็กๆ ก็ตาม!\nเราสัญญาว่าจะทำให้คุณมีความสุขด้วยการลงทุน ที่มีผลตอบแทนสูงอย่างแน่นอนค่ะ\n- <สถาบันการเงินแก๊งคุโรคาเมะ>"
609900746-NameTh = "โชคดีกลาง"
609900746-DescriptionTh = "ความรัก - ได้สบตากับคนที่อยู่ในใจ\nการพบกัน - ได้พบกับคนนั้นที่ห้างสรรพสินค้าช่วงสุดสัปดาห์\nสัญญา - ไปจุดชมดอกไม้ด้วยกัน"
2928203362-NameTh = "โชคดีกลาง"
2928203362-DescriptionTh = "ดวงในครั้งนี้คือโชคดีกลาง! ยินดีด้วยค่ะ! เมื่อจับได้โชคดีกลางแล้ว ที่เหลือก็แค่จับให้ได้ดวงที่ดียิ่งขึ้น!"
2307433907-NameTh = "โชคดีกลาง"
2307433907-DescriptionTh = "ปีนี้ก็จะเป็นปีที่ไม่แย่ค่ะ! แต่ในฤดูหนาวที่หนาวเย็น ระวังสุขภาพด้วยนะคะ! เมื่อกลับมาจากข้างนอก อย่าลืมล้างมือและแปรงฟันด้วยนะคะ!"
3879409653-NameTh = "โชคดีกลาง"
3879409653-DescriptionTh = "ขอเอาใจช่วยคุณที่พยายามอย่างเต็มที่เลยค่ะ หวังว่าปีนี้จะเป็นปีที่ดีนะคะ~♪"
2475099392-NameTh = "โชคดีมาก"
2475099392-DescriptionTh = "มิตรภาพ - มีเพื่อนเพิ่มขึ้น\nของหาย - หาเจอได้จากที่ใกล้ตัว\nการศึกษา - สำเร็จลุล่วงตามที่ต้องการ"
1939176149-NameTh = "โชคดีมาก"
1939176149-DescriptionTh = "ท้าด๊า! ดวงในครั้งนี้คือโชคดีมากนั่นเอง! วันนี้จะโชคดีทั้งวันเลยค่ะ!"
226724583-NameTh = "โชคดีมาก"
226724583-DescriptionTh = "ถึงจะไม่ใช่โชคดีครั้งใหญ่ แต่ไม่มีโชคดีไหนจะใกล้กับโชคดีครั้งใหญ่ขนาดนี้แล้วค่ะ! วันนี้ก็ขอให้มีแต่รอยยิ้มนะคะ!"
422101479-NameTh = "โชคดีมาก"
422101479-DescriptionTh = "กระสุน - ไม่โดน\nตัวปัญหา - ไม่มี\nวันนี้ - วันนี้จะเป็นวันที่มีความสุข"
2677997047-NameTh = "โชคดีครั้งใหญ่"
2677997047-DescriptionTh = "ความปรารถนา - สมหวังแน่นอน\nการเงิน - เงินเต็มกระเป๋า\nการพบกัน - ในที่สุดจะได้เจอคนที่เฝ้ารอ"
2043188119-NameTh = "โชคดีครั้งใหญ่"
2043188119-DescriptionTh = "จับได้โชคดีครั้งใหญ่ค่ะ! ซูเปอร์สตาร์ประจำปีนี้คือคุณนี่เอง! ยินดีด้วยค่ะ!"
266718355-NameTh = "โชคดีครั้งใหญ่"
266718355-DescriptionTh = "โชคดีมีชัย! ขอให้โชคดีและกิจการเจริญรุ่งเรืองนะคะ! สีนำโชคในวันนี้ของคุณคือสีฟ้าที่สวยงามค่ะ!"
1124846343-NameTh = "โชคดีครั้งใหญ่"
1124846343-DescriptionTh = "ดวงของคุณคือโชคดีครั้งใหญ่! ยินดีด้วยค่ะ! การท้าทายที่กล้าหาญจะประสบความสำเร็จ และสิ่งที่ทำจะคลี่คลายไปในทางที่ดีค่ะ! เชื่อในตัวเองและออกไปลุยได้เลยค่ะ! สู้ๆ นะคะ!"
964504315-NameTh = "ลางร้าย"
964504315-DescriptionTh = "รายการจ่ายตลาดวันนี้ : ก้อนครีมสตู 1 แพ็ก, เนื้อไก่ 250 กรัม, มันฝรั่ง 2 หัว, หอมใหญ่ 3 หัว, แคร์รอต 1 หัว, น้ำส้มสายชูส้ม 1 ถัง..."
199728885-NameTh = "ลางร้าย"
199728885-DescriptionTh = "ควรระวังอาหารเป็นพิษอยู่เสมอ! แม้ว่าตัวเองจะยังไม่เคยเป็นก็ตาม! น้ำปลิงทะเลช็อกโกแลตดีกว่าไหม?"
1759134687-NameTh = "ลางร้าย"
1759134687-DescriptionTh = "โดยหลักการแล้ว ไม่มีทางที่จะฟื้นฟูวัตถุดิบทำอาหารที่ถูกบดไปแล้วได้ การต้มและปั่นแล้วนำมาทำซุปน่าจะเป็นวิธีที่ดีที่สุด"
4232612005-NameTh = "ลางร้าย"
4232612005-DescriptionTh = "ตอนที่กำลังถืออาหารมาก็ล้มเทกระจาดลงมา... แม้ว่าจะเก็บเหรียญจากตรงที่ล้มมาได้ก็ตาม"
2722903738-NameTh = "โชคดีนิดนึง"
2722903738-DescriptionTh = "ใบนี้คือโชคดีนิดนึง! ถึงแม้จะขาดทุนในทีแรกแต่จะได้กำไรในภายหลัง... เขาว่าอย่างนั้นน่ะ? จะโมจิก็ดี ตอนนี้อยากกินอะไรสักอย่าง..."
2264344015-NameTh = "โชคดีนิดนึง"
2264344015-DescriptionTh = "ไหนดูซิ... ได้โชคดีนิดนึงนี่นา! เดี๋ยวให้พุดดิ้งปลาหมึกมินต์ที่ฉันทำเป็นรางวัลนะ!"
3089424248-NameTh = "โชคดีนิดนึง"
3089424248-DescriptionTh = "อาหารที่ไม่ค่อยสุกก็พอใช้ได้ ค่อยทำให้สุกอีกก็ได้ใช่มั้ย? อาหารที่สุกไปหรือไหม้สิถึงเป็นปัญหา"
1618617468-NameTh = "โชคดีนิดนึง"
1618617468-DescriptionTh = "คนที่ได้ใบนี้จะลำบากเหมือนขุดภูเขาเพื่อหาทอง แต่ก็โชคดีนะ... ฮุฮุฮุ เส้นทางแห่งอาหารรสเลิศย่อมมาพร้อมกับความลำบากแบบนี้แหละ"
839518806-NameTh = "โชคดีนิดนึง"
839518806-DescriptionTh = "โชคดีนิดนึงเป็นลางว่าเส้นทางในอนาคตจะเปลี่ยนไป แต่ใครจะรู้ล่ะ ในอนาคตอาจจะเกิดอะไรขึ้นก็ได้"
239549900-NameTh = "โชคดีนิดนึง"
239549900-DescriptionTh = "เรื่องที่น่ายินดีอยู่ในฤดูใบไม้ร่วงและฤดูหนาว ฤดูใบไม้ผลิและฤดูร้อนอาจจะไม่ดี... ตอนนี้เป็นฤดูใบไม้ร่วงและฤดูหนาวสินะคะ"
3417604566-NameTh = "โชคดีเล็ก"
3417604566-DescriptionTh = "ได้โชคดีเล็กนี่นา! วิกฤตครั้งใหญ่จะเบาลง จะปลอดภัยตราบใดที่อยู่ในทางเรียบ... ถือว่ามีความหมายในทางที่ดีค่ะ!"
3872470199-NameTh = "โชคดีเล็ก"
3872470199-DescriptionTh = "ความโชคดีมาจากสิ่งเล็กๆ นั่นคือโชคดีเล็กค่ะ ขอให้โชคดีที่ฝนหยุดตกทันทีที่ออกไปข้างนอก!"
4154538605-NameTh = "โชคดีเล็ก"
4154538605-DescriptionTh = "ใบนี้คือโชคดีเล็ก! ไม่ว่าจะรีบขึ้นรถไฟใต้ดินแค่ไหนก็ไม่ผิดทิศค่ะ!"
1652241604-NameTh = "โชคดีเล็ก"
1652241604-DescriptionTh = "เราต้องดูดาวและเลือกเส้นทางของตัวเอง ไม่ใช่ไปตามไฟทุกดวงที่ผ่านมานะคะ"
2851981489-NameTh = "โชคดีเล็ก"
2851981489-DescriptionTh = "จะมีโชคดีกับการพบกันที่ซ่อนอยู่ จงรอคอยเหตุการณ์ที่จะเกิดขึ้น... เขาบอกไว้แบบนี้น่ะ หมายความว่าความสามารถในการทำอาหารของฉันจะดีขึ้นเหรอคะ?"
228389323-NameTh = "โชคดีเล็ก"
228389323-DescriptionTh = "ค่อยๆ เก็บวัตถุดิบทำอาหารทีละอย่าง จนทำอาหารได้สำเร็จนะคะ!"
3038779302-NameTh = "โชคดีกลาง"
3038779302-DescriptionTh = "ความรัก - การได้สบตากับคนนั้นที่อยู่ในใจ\nการพบกัน - ถนนในงานเทศกาลช่วงสุดสัปดาห์\nสัญญา - ชมดอกไม้ไฟด้วยกัน"
284642160-NameTh = "โชคดีกลาง"
284642160-DescriptionTh = "ใบนี้คือโชคดีกลาง ยินดีด้วยนะคะ เรียกได้ว่าบางทีจะได้กินจนกว่าจะอิ่มตามที่ต้องการเลยละค่ะ"
2426075748-NameTh = "โชคดีกลาง"
2426075748-DescriptionTh = "ดวงจันทร์สว่างสดใสและไม่มีเมฆดำแม้แต่น้อย... ข้าวกล่องที่กินใต้แสงจันทร์จะยิ่งอร่อยขึ้นไปอีกค่ะ ฮุฮุฮุ"
1325967005-NameTh = "โชคดีกลาง"
1325967005-DescriptionTh = "ถ้าอาหารเป็นสิ่งจำเป็นอันดับที่ 1 ในชีวิต โชคก็เทียบเป็นอันดับที่ 2 ยินดีกับโชคดีกลางด้วยนะคะ"
4022503532-NameTh = "โชคดีกลาง"
4022503532-DescriptionTh = "มันจะแปรเปลี่ยนเป็นความสุขโดยไม่รู้ตัว ยิงธนูดอกเดียวได้ห่านสองตัว... ทำห่านย่างจะอร่อยมั้ยนะ?"
2197323664-NameTh = "โชคดีกลาง"
2197323664-DescriptionTh = "ใช้ชีวิตอยู่บนทางแยกระหว่างความเป็นและความตาย ระหว่างทางจะยากลำบาก แต่ปลายทางเป็นไปด้วยดี วันปีใหม่ก็จะได้กินอาหารอร่อย ดีใจที่ได้ยินแบบนั้นนะ!"
294425413-NameTh = "โชคดีมาก"
294425413-DescriptionTh = "คนที่รอ - ได้พบกัน\nความสุข - มาหา\nช่วยเหลือคนจิตใจอ่อนแอที่เข้ามา"
2086697042-NameTh = "โชคดีมาก"
2086697042-DescriptionTh = "คนที่จับได้ใบนี้จะเดินหน้าไปได้หากมีใจที่เที่ยงตรง และจะบิดเบี้ยวหากมีจิตใจชั่วร้าย"
657860840-NameTh = "โชคดีมาก"
657860840-DescriptionTh = "ไม่มีอะไรจะดีไปกว่าการที่ให้ทุกคนได้กินอาหารที่บรรจงเตรียมมาอย่างเอร็ดอร่อย ขอให้มีโชคดีมากๆ ตลอดปีนี้เลยนะ!"
128516439-NameTh = "โชคดีมาก"
128516439-DescriptionTh = "ครั้งนี้คุณครูได้โชคดีมาก ลูกศรพุ่งผ่านในวันฟ้าคราม มีกวางเดินอยู่ข้างนอกเพียงลำพัง... เจ้ากวางนี่คงจะไม่อดอยากหรอกนะ?"
2382060588-NameTh = "โชคดีมาก"
2382060588-DescriptionTh = "ผู้ที่จับได้ใบนี้นั้นอยู่ในสถานการณ์ที่ดอกไม้เบ่งบานมาเนิ่นนาน นับจากนี้จะได้พบกับความสุขหลายรูปแบบ... แต่ละวันจะผ่านไปอย่างสงบสุขหรือมีสิ่งที่เป็นความสุขต่างๆ"
370799142-NameTh = "โชคดีมาก"
370799142-DescriptionTh = "สำหรับผู้ที่โชคดีมาก เราได้เตรียมโอเซจิมงคลเพื่อต้อนรับปีใหม่ไว้ให้ด้วย เชิญลิ้มรสได้เลยค่า!"
1512780410-NameTh = "โชคดีครั้งใหญ่"
1512780410-DescriptionTh = "การพบกัน - ใต้ต้นไม้ในตำนาน\nการโยกย้าย - ดีกว่าตอนนี้\nอาหาร - ปล่อยใจไปในย่านพลุกพล่าน"
997253011-NameTh = "โชคดีครั้งใหญ่"
997253011-DescriptionTh = "ตายจริง ได้โชคดีครั้งใหญ่นี่คะ ฮุฮุฮุ ปีใหม่นี้จะมีอาหารรสเลิศแบบไหนรอพวกเราอยู่นะ?"
940731399-NameTh = "โชคดีครั้งใหญ่"
940731399-DescriptionTh = "ต้นหลิวในฤดูใบไม้ผลิ มีดอกไม้ผลิบานขึ้นบนกิ่งก้าน\nเปล่งประกายสีทองอร่าม ภายในหิมะและน้ำค้างแข็ง"
555506678-NameTh = "โชคดีครั้งใหญ่"
555506678-DescriptionTh = "เหมือนกับคลื่นโชคดีที่ถาโถมเข้ามา เบนโตะโอเซจิแบบเต็มสำรับกับปลากระพงที่สุกกำลังดี... โดยเฉพาะปลากระพงที่สุกกำลังดีนี่ ถูกใจที่สุดเลยละค่ะ"
3840660582-NameTh = "โชคดีครั้งใหญ่"
3840660582-DescriptionTh = "จับได้โชคดีครั้งใหญ่นี่คะ ยินดีด้วยค่ะ จะมีวันที่พิเศษเกิดขึ้นแน่นอน\n※โปรดระวังของปลอม"
1744408890-NameTh = "โชคดีครั้งใหญ่"
1744408890-DescriptionTh = "อัญมณีที่ไม่มีตำหนิ นับแต่นี้ก็อยากจะขัดเกลาให้ดียิ่งขึ้น... ฉันเองก็จะพยายามพัฒนาฝีมือในการทำอาหารให้มากขึ้นค่ะ!"
1664341587-NameTh = "แกงกะหรี่สีแปลก"
1664341587-DescriptionTh = "แกงกะหรี่ที่มีสีแปลกๆ จนแยกไม่ออกว่าใส่อะไรไว้\nมีกลิ่นฉุนแสบจมูกเหมือนสารเคมี\nเมื่อกินกับข้าวไหม้ๆ จะมีรสชาติอันน่าขมขื่น"
408873372-NameTh = "แกงกะหรี่หัวปลา"
408873372-DescriptionTh = "แกงกะหรี่ 'ที่เคย' อร่อยจากหัวปลาที่กินเหลือ\nตอนแรกคิดว่าดี แต่กลับมีกลิ่นคาวปลาเหม็นคลุ้ง\nแบบที่ทำให้คนกินหน้านิ่วคิ้วขมวดโดยอัตโนมัติ"
3557467288-NameTh = "แกงกะหรี่ผักธรรมดา"
3557467288-DescriptionTh = "แกงกะหรี่ผักธรรมดาที่ใส่ฟักทอง มันฝรั่งและแคร์รอต\nแม้จะไม่มีรสชาติหรูหรา แต่เข้ากันได้ดีกับรสหวานจากผัก\nเมื่อกินกับข้าวสวยก็ยิ่งเข้ากัน"
817877395-NameTh = "แกงกะหรี่ครีมกุ้ง"
817877395-DescriptionTh = "แกงกะหรี่ครีมที่โรยหน้าด้วยกุ้งตัวโต\nรสละมุนของกุ้งเข้ากับแกงกะหรี่ครีมอย่างดี\nเครื่องเทศช่วยตัดเลี่ยนพร้อมรสแปลกใหม่"
2465534331-NameTh = "แกงกะหรี่สเต็กเนื้อสันนอก"
2465534331-DescriptionTh = "แกงกะหรี่ราดข้าวสุดหรูที่เสิร์ฟพร้อมกับสเต็กเนื้อสันนอก\nรสสัมผัสของเห็ดย่างกับต้นหอมยิ่งช่วยขับรสชาติ\nเสิร์ฟคู่กับข้าวผัดเนยกระเทียมก็คืออาหารเลิศรสนี่เอง"
3616003768-NameTh = "รางวัลบ้ง"
3616003768-DescriptionTh = "สวิงพลาด...\nฉันชินแล้วละค่ะ...\nแต่ว่าในครั้งหน้าน่ะ...!"
3854794868-NameTh = "รางวัลบ้ง"
3854794868-DescriptionTh = "ดูเหมือนท่าทางจะแย่ลงสินะคะ\nระวังอย่าให้ได้รับบาดเจ็บล่ะ"
2662227242-NameTh = "รางวัลบ้ง"
2662227242-DescriptionTh = "ฮึดสู้หน่อยสิ...?\nฉันจะคอยเชียร์เอง!"
170702207-NameTh = "รางวัลเข้าร่วม"
170702207-DescriptionTh = "ฉันชอบนะที่ว่า\nการเข้าร่วมก็มีความหมาย\nแต่ฉันอยากชนะน่ะ..."
4162217022-NameTh = "รางวัลเข้าร่วม"
4162217022-DescriptionTh = "ไม่ว่าจะกีฬาหรือเทรนนิ่ง\nแค่เริ่มต้นก็ถือว่ามาได้ครึ่งทางแล้ว"
2680245513-NameTh = "รางวัลเข้าร่วม"
2680245513-DescriptionTh = "ในที่สุดก็เริ่มแล้วค่ะ!\nอย่าเสียกำลังใจและเดินหน้าต่อไป!"
1958845128-NameTh = "รางวัลชมเชย"
1958845128-DescriptionTh = "นี่คือรางวัลที่ให้ฮึดสู้\nและพยายามมากขึ้นสินะ ใช่แล้ว...\nจะตีโฮมรันได้ก็ต้องตีให้โดนก่อน!"
2791568111-NameTh = "รางวัลชมเชย"
2791568111-DescriptionTh = "นี่แหละๆ ถึงจะจบเซ็ตหนึ่งแล้ว\nก็อย่าประมาท แล้วไปต่ออีกเซ็ตเลยค่ะ!"
461611471-NameTh = "รางวัลชมเชย"
461611471-DescriptionTh = "พอถึงตอนที่รู้สึกว่ากำลังจะพังทลาย\nนั่นละคือตอนที่กำลังใจสำคัญ!"
1428247863-NameTh = "รางวัลผู้โชคดี"
1428247863-DescriptionTh = "ว่ากันว่าการตีลูกนั้นอาศัยโชคช่วยไม่น้อยเลย\nเพื่อไม่ให้พลาดโชคดีที่เข้ามาหา\nก็ต้องฝึกฝนเตรียมไว้ค่ะ"
752868706-NameTh = "รางวัลผู้โชคดี"
752868706-DescriptionTh = "เทรนนิ่งกับโชคนั้นไม่ได้เกี่ยวกันมากนัก\nแต่กีฬานั้นต่างออกไปสินะคะ"
2640635459-NameTh = "รางวัลผู้โชคดี"
2640635459-DescriptionTh = "จะต้องเตรียมใจไว้ให้ดี...\nไม่อย่างนั้นจะยิ้มรับโชคไม่ได้ค่ะ!"
2984517236-NameTh = "รางวัลที่ 2"
2984517236-DescriptionTh = "อ๊าาา...! น่าเสียดายจัง!\nแน่นอนว่าได้ที่ 2 ก็นับว่าเยี่ยมมากแล้ว!\nถ้าเปรียบกับเบสบอล จะเป็นฐานที่ 2 หรือเปล่าน้า!"
1431221238-NameTh = "รางวัลที่ 2"
1431221238-DescriptionTh = "นี่เป็นความสำเร็จที่น่าทึ่ง!\nแต่อย่าเพิ่งปล่อยใจ\nและมุ่งหน้าสู่จุดสูงสุดกันเถอะ!"
1980863458-NameTh = "รางวัลที่ 2"
1980863458-DescriptionTh = "สู้ๆ!\nเก่งมาก!\nอย่าหยุด อีกแค่นิดเดียวเท่านั้น!"
1686581353-NameTh = "รางวัลที่ 1"
1686581353-DescriptionTh = "ผลก็คือ...!\nโฮมรันจริงๆ!\nฉันก็ขอทำให้ได้อีกสักครั้งในสักวันหนึ่ง!"
4080298096-NameTh = "รางวัลที่ 1"
4080298096-DescriptionTh = "ในที่สุดก็ได้ผลแบบนี้มา\nแต่จุดสิ้นสุดหนึ่งคือการเริ่มต้นของสิ่งใหม่\nอย่าลืมนึกถึงวันพรุ่งนี้นะคะ คุณสมาชิก"
4164991921-NameTh = "รางวัลที่ 1"
4164991921-DescriptionTh = "ว้าว ว้าว!\nฉันมีความสุขมากจนแทบจะร้องไห้เลย!\nการเชียร์เป็นสิ่งที่ดีก็เพราะว่ามีช่วงเวลาแบบนี้อยู่!"
2670560256-NameTh = "กี้กี้กี้... ข้าพร้อมแล้ว"
2670560256-DescriptionTh = "ซิลเวอร์เพลต พ่อค้าปีศาจและผู้รับใช้ที่ซื่อสัตย์ของเอร่า! เขาเป็นวายร้ายที่ผ่านรอยแยกมิติออกมาขายของที่ทำให้ผู้คนไม่พอใจ! ปรากฏตัวในฐานะตัวร้ายหลักในภาคแยก <จอห์นนี่ คิโวทอสกับเวทมนตร์กระสุนปืนใหญ่> และแข็งแกร่งขึ้นอย่างเหลือเชื่อ! ถึงอย่างนั้นเขาก็มีแฟนคลับอยู่ไม่น้อย ถือว่าโด่งดังมากทีเดียว! เมื่อก่อนมีบูธปรากฏตัวในงานของสาวน้อยเวทมนตร์เยอะมาก! มันอาจดูง่ายดาย แต่เมื่อใช้พีระมิดพาวเวอร์ การโจมตีส่วนใหญ่มักไร้ผล! ในตอนที่ 11 ของซีซั่น 2 มีฉากที่ซิลเวอร์เพลตปกปิดตัวตนด้วยการปลอมตัว และย้ายไปโรงเรียนใหม่ จากนั้น..."
2818922347-NameTh = "ฟื้นคืนทุกสิ่งด้วยเมจิคัลพาวเวอร์!"
2818922347-DescriptionTh = "สตาแนกจัง! มาสคอตสุดน่ารักจากซีรีย์สาวน้อยเวทมนตร์! ทำสัญญาเมจิคัลเนชันนอลการ์ดกับไวต์และพิงค์ เพื่อให้พวกเธอกลายเป็นสาวน้อยเวทมนตร์! ด้วยความเป็นเด็กใจดีไร้เดียงสาของเขา จึงถูกกลุ่มอัศวินปีศาจของเอร่ากลั่นแกล้ง และลักพาตัวไปอยู่เป็นประจำ แต่ถึงอย่างนั้นเขาก็ยังสดใสร่าเริงและเข้มแข็งเสมอ! และยังมีบทบาทสำคัญในการมอบกระสุนเวทมนตร์ให้ทั้งสองคนในยามคับขันอีกด้วย! กระสุนมีด้วยกันหลายแบบ ทั้งหัวกระสุนเขียวและหัวกระสุนดำ! ตอนที่สตาแนกจังตื่นขึ้นมานั้นซาบซึ้งมาก จำได้ว่าเป็นตอนที่ 7 ในซีซั่น 2 และตอนที่สตาแนกจังกลับมาร่างเดิม..."
3074909671-NameTh = "กลุ่มอัศวินปีศาจ เวลาแห่งความมืดมิดมาถึงแล้ว!"
3074909671-DescriptionTh = "เอร่า! ตอนที่เอร่าปรากฏตัวครั้งแรกในตอนเด็กๆ นั้นน่ากลัวมากจนไม่กล้าลืมตา! เอร่าสวยมากแต่ก็น่ากลัวอย่างเหลือเชื่อ และเป็นศัตรูตัวฉกาจของเฮฟวี่ แคลิเบอร์! พอได้ยินเสียงในโลกของเราที่เต็มไปด้วยความรัก และความสุขจากดาวเคราะห์แห่งความมืดที่เอร่าอาศัยอยู่ เลยลากตัวเหล่าวายร้ายทั้งหลายมาโจมตี และจะทำให้เงียบไปตลอดกาล! เอร่ามีเสียงหัวเราะที่ดังจนน่ารำคาญ! ช่างเป็นกลุ่มวายร้ายที่น่ากลัวและไม่ยอมแพ้ แม้ว่าจะไม่เคยชนะเฮฟวี่แคลิเบอร์เลยสักครั้ง! ใน <สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์ - ระเบิดเดซี่คัตเตอร์> เดอะมูฟวี่ มีฉากที่เอร่าสูญเสียความทรงจำ และใช้ชีวิตเป็นพนักงานพาร์ทไทม์ธรรมดาในร้านหนังสือ เล่าถึงอดีตของเอร่า..."
907100893-NameTh = "มอนโร นอยมันน์ เมจิคัล เจ็ต! "
907100893-DescriptionTh = "เทอร์ไมต์ พิงค์! คู่หูคู่ใจของไวต์! ถึงชื่อ 'พิงค์' แต่สงสัยมั้ยว่าทำไมถึงเป็นสีม่วง... อ๊ะ! ถ้าพูดมากกว่านี้เดี๋ยวจะสปอยล์ แนะนำให้ดูเนื้อเรื่องหลัก! เดิมทีพิงค์เป็นนักเรียนที่ค่อนข้างปลีกตัวอยู่คนเดียว แต่เธอชื่นชมไวต์ที่เท่และแข็งแกร่ง ผู้ที่ช่วยเธอไว้ในการโจมตีของเอร่า เลยได้ทำสัญญากับเมจิคัลเนชันนอลการ์ด แล้วพวกเธอก็กลายมาเป็นคู่หูที่ดีที่สุดในประวัติศาสตร์สาวน้อยเวทมนตร์! ระหว่างที่ทำงานร่วมกับไวต์ พิงค์ได้ค้นพบความมั่นใจในตัวเองผ่านมิตรภาพ ความรัก และพลังต่อสู้ที่เหมาะสม จนกลายมาเป็นตัวละครที่สดใส! ในตอนที่ 6 ของซีซั่น 3 เธอได้กลายเป็นไอดอลวงดนตรีระดับซูเปอร์สตาร์..."
3133177365-NameTh = "ทูตแห่งสันติภาพ! ให้เป็นหน้าที่ของเทอร์ไมต์ ไวต์ได้เลย!"
3133177365-DescriptionTh = "เทอร์ไมต์ ไวต์ ตัวเอกตลอดกาลของซีรีส์สาวน้อยเวทมนตร์! เดิมทีเธอเป็นเด็กผู้หญิงธรรมดาที่ซุ่มซ่ามนิดหน่อย แต่แล้ววันหนึ่งเธอก็ตกอยู่ในวิกฤตจากการโจมตีของเอร่า! พบกับสตาแนก มาสคอตจากอาณาจักรเวทมนตร์! แม้จะหวาดกลัวจนตัวสั่น แต่ไวต์ผู้รักความยุติธรรมก็ทำสัญญากับเมจิคัลเนชันนอลการ์ด เพื่อรับพลังและกลายเป็นสาวน้อยเวทมนตร์! และเมื่อพิงค์ผู้ได้รับการช่วยเหลือจากไวต์ มาเป็นสาวน้อยเวทมนตร์ ทั้งสองก็กลายเป็นสาวน้อยเวทมนตร์แห่งความยุติธรรมผู้ปกป้องโลก 'สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์'! ในตอนที่ 2 ของซีซั่น 2 มีเรื่องราวตอนที่ไวต์ได้พบกับ 'ดราก้อนสกิน' สมุนตัวร้าย..."
3560225627-NameTh = "ราเม็งรวมพิเศษ เบอร์ 44"
3560225627-DescriptionTh = "ราเม็งที่อ้างว่าใช้เบสน้ำซุปจากอาหารทะเล มีเอกลักษณ์คือรสชาติที่ทรงพลังจนอยากขอโทษต่อตะเกียบที่ใช้ โดดเด่นด้วยความคิดสร้างสรรค์อันเหนือชั้น โดยนำวัตถุดิบที่กินได้มาปรุงจนก้าวข้ามไปสู่ระดับอาหารที่ไม่อาจเรียกว่าอาหารได้อีกต่อไป "
1070674443-NameTh = "โชยุราเม็งซุปใสพิเศษ"
1070674443-DescriptionTh = "ราเม็งโชยุซุปใสที่ให้รสสัมผัสเรียบง่าย โดดเด่นเฉพาะตัวด้วยรสชาติคลีนจนน่าตกใจ ทว่าด้วยความที่รสชาติที่คลีนเกินไป หากเผลอหลุดโฟกัสอาจพลาดรสสัมผัสไปได้ง่ายๆ"
2956567346-NameTh = "ราเม็งน้ำมันกระเทียมดำ รสเข้มข้นหอมกรุ่น"
2956567346-DescriptionTh = "ราเม็งกลิ่นหอมกรุ่นที่เพิ่มความพิเศษด้วยน้ำมันกระเทียมดำ สัมผัสรสกลมกล่อมเข้มข้นจากกระเทียมที่แผ่ซ่านไปทั่วลิ้นตั้งแต่วินาทีแรกที่ทาน อย่าให้รูปลักษณ์ภายนอกมาหลอกตา ลองเปิดใจหยิบตะเกียบขึ้นมาลองชิมดูแล้วจะติดใจ"
2787024907-NameTh = "ราเม็งทงคตสึเครื่องจัดเต็ม"
2787024907-DescriptionTh = "ทงคตสึราเม็ง ราดด้วยท็อปปิ้งหลากหลายชนิด ความลงตัวของรสชาติน้ำซุปเข้มข้น และส่วนผสมที่ลงตัวในชามเดียว ดั่งวงดนตรีออร์เคสตราที่ผสมผสานลงตัว ราเม็งที่อร่อยเด็ดเจ็ดย่านน้ำ ได้ลิ้มลองไม่มีผิดหวัง นับเป็นราเม็งที่ทุกคนชื่นชอบอย่างแท้จริง"
4270783877-NameTh = "ราเม็งสีทองแห่งความมั่งคั่ง"
4270783877-DescriptionTh = "ราเม็งที่เสิร์ฟปริมาณจัดเต็มจุใจล้นด้วยแคลอรี่แน่นๆ ราเม็งชามนี้คือที่สุดของความจัดเต็ม ใส่เครื่องแน่นแบบไม่มีกั๊ก เป็นเสน่ห์ของความ 'เยอะ' ที่ลงตัว ดอกไม้ทองคำเปลวที่ใช้เป็นแบบฟู้ดเกรด รับประทานได้หายห่วง"
2677521194-NameTh = "แคมเปญ EXP บัญชี x{0}!"
2677521194-DescriptionTh = "อยู่ระหว่างแคมเปญ EXP บัญชีที่ได้รับจะเพิ่ม x{0}\nได้รับโบนัส EXP บัญชีเมื่อคอนเทนต์ที่ใช้ AP จบสมบูรณ์\n(ภารกิจ, คำขอพิเศษ, ทัวร์โรงเรียน, กิจกรรม)"
4065088019-NameTh = "ศึกทลายพันธะเปิดแล้ว!"
4065088019-DescriptionTh = "กำลังเปิดศึกทลายพันธะ"
