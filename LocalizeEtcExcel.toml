3091509634-DescriptionTh = "ค่าโจมตีและความเร็วในการฟื้นฟู Cost จะเปลี่ยนไปตามจำนวนของนักเรียนในทีม ยิ่งนักเรียนในทีมมีน้อย ค่าจะยิ่งเพิ่มขึ้นมาก (สูงสุด 4 คน)"
