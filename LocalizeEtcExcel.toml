2319299758-NameKr = "아루의 엄청 귀중한 지갑"
2319299758-DescriptionKr = "아루가 애용하는 고급 지갑.\n질 좋은 소재로 만들어진 고급품이지만 오래 사용한 탓에 곳곳에 색이 바래고 흠집이 생겼다. 처음 흥신소를 차린 뒤 하루카, 카요코, 무츠키가 함께 돈을 모아 선물해 준 물건으로, 아루에게는 그 무엇과도 바꿀 수 없는 소중한 물건이다."
3741719919-NameKr = "초냉각 선풍기"
3741719919-DescriptionKr = "덥거나 뜨거운 지역에서 활동하기 위해 마련한 에이미의 비밀병기.\n귀여운 생김새와 달리 위험할 수준의 강풍을 만들어 낼 수 있다. 강한 출력과 달리 바람을 내뿜는 범위는 제한적이기에, 여러 사람이 쐬기 위해선 몸을 밀착시켜야 한다."
375503055-NameKr = "히나의 선도부 완장"
375503055-DescriptionKr = "히나가 평소 착용하고 있는 선도부의 완장. 누군가에겐 단순히 선도부 소속임을 보여주는 물건일지도 모르지만, 히나에게 있어서만큼은 선도부장으로서 책임감을 일깨워주는 물건. 그 완장에 담긴 무게는 결코 가볍지 않다."
4285150101-NameKr = "어디서든 입장권"
4285150101-DescriptionKr = "호시노가 \"어디서든 꿈나라로 입장할 수 있다\"고 주장하는 베개. 호시노의 말 대로 굉장히 부드럽고 푹신하지만, 지금은 같은 제품을 구할 수 없다고 한다."
49207748-NameKr = "네루의 스카잔"
49207748-DescriptionKr = "네루가 한 시도 몸에서 떼어 놓으려 하지 않는 스카잔. 고집하는 이유에 관해 물으면, 아주 단순명쾌한 대답이 돌아온다."
3203934447-NameKr = "행운의 모형 핫도그"
3203934447-DescriptionKr = "냄새와 질감이 실제 핫도그와 거의 비슷할 정도로 잘 만들어진 플라스틱 핫도그 모형.\n3D 프린터로 제작. 한 입 베어 문 자국도 있다. 이즈미는 이 모형을 가지고 다니면, 냄새도 좋고, 무언가 맛있는 것을 먹을 수 있게 되는 행운이 자주 발생하여 소지 중이라고 주장한다."
1865059509-NameKr = "시로코의 드론"
1865059509-DescriptionKr = "시로코가 늘 휴대하고 다니는 드론. 시로코 본인은 운동할 때 쓰는 촬영용 드론이라고 주장하지만, 촬영과 상관없는 여러 '부가 장치'가 장착되어 있다."
1017510971-NameKr = "모래주머니"
1017510971-DescriptionKr = "팔이나 다리에 두를 수 있도록 각반 형태로 만들어진 모래주머니. 모래 이외에도 쇳가루가 포함되어 있어 들어보면 생각보다 훨씬 무겁다."
1197583309-NameKr = "츠루기의 특별한 상자"
1197583309-DescriptionKr = "츠루기의 방 깊숙한 곳에 숨어 있는 굿즈 박스.\n브로마이드나 책, 영화표 등 장르를 가리지 않고 다양한 종류의 굿즈가 쌓여 있다. 먼지 하나 없이 깔끔하게 정리된 굿즈의 상태만으로도 츠루기의 세심함을 엿볼 수 있다."
4034964291-NameKr = "아리스의 칭찬 스티커"
4034964291-DescriptionKr = "모든 것이 잘 되고, 행운 스탯이 오르는! 것은 아니지만…\n아리스의 마음이 가득 담겨 있다."
2870052181-NameKr = "휴대용 게임기"
2870052181-DescriptionKr = "미도리가 언니와 처음으로 구입한 휴대용 게임기.\n싸웠던 기억, 화해했던 기억, 아이스크림 승부를 했던 기억 등, 모든 것이 담긴 추억의 게임기다. "
3484495552-NameKr = "빛 바랜 CD"
3484495552-DescriptionKr = "유즈의 이름이 적혀있는 낡은 CD 한 장.\n테일즈 사가 크로니클 프로토타입의 최종본이 담긴 마스터 디스크로, 유즈는 한때 이 CD를 지켜보는 것조차도 힘들어했었다."
2992891006-NameKr = "선도부 비품용 튜브"
2992891006-DescriptionKr = "게헨나 선도부에서 정식으로 채택하고 있는 비품용 튜브.\n선도부 물건답게 평범한 튜브와는 다른 재질, 기능을 갖추고 있다. 아직 수영에 익숙하지 않은 히나가 언제나 의지하고 있는 고마운 물건이기도 하다."
1279061846-NameKr = "보들보들 담요"
1279061846-DescriptionKr = "게헨나 학원 마크가 새겨진 담요. 평소 다목적으로 활용하고 있다. 조금쯤은 이오리의 온기가 남아있을지도……."
1059841421-NameKr = "슌의 어린시절 추억"
1059841421-DescriptionKr = "슌이 아끼는 한 쌍의 자개 머리핀.\n나이가 든 이후에는 양 갈래 머리를 하는 일이 적어지며 거의 사용하지 않게 되었지만, 슌에게는 시간이 지나도 변하지 않는 소중한 기억의 일부이다."
242283010-NameKr = "토끼꼬리 수류탄"
242283010-DescriptionKr = "아스나가 바니걸 복장을 할 때 패용하는 토끼 꼬리 모양의 수류탄.\n복슬복슬한 털로 덮여 있어 일견 무해해 보이지만, 다른 수류탄과 마찬가지로 위협적인 파괴력을 갖고 있다."
2635859011-NameKr = "비밀을 감추는 여우 가면"
2635859011-DescriptionKr = "와카모가 평소에도 애용하고 있는 여우 가면. 와카모가 마음에 꼭 들어 하는 물건으로, 본래 그 용도는 쓸데없는 일에 휘말리지 않도록 자신의 정체를 숨기기 위한 것이었지만, 지금에 이르러 가면 너머로 감춘 비밀은 그뿐만이 아니다. 흘러넘치는 소녀의 순정을 감추기에도 안성맞춤인 패셔너블한 아이템."
2119169468-NameKr = "꿈이 담긴 벚꽃색 앞치마"
2119169468-DescriptionKr = "미모리의 벚꽃색 앞치마. 청소할 때도, 요리할 때도. 가사 전반의 친구라고 할 수 있는 앞치마다."
1916503017-NameKr = "물품 관리대장"
1916503017-DescriptionKr = "히나타가 직접 만든 트리니티 대성당의 물품 관리대장.\n대성당의 모든 비품이 어디에 얼마나 수납되어 있는지 꼼꼼하게 정리되어 있다. 필요한 비품은 대부분 히나타가 직접 찾아주기 때문에, 외부인은 이 관리대장의 존재를 모르는 경우가 많다."
2698379035-NameKr = "해진 명찰"
2698379035-DescriptionKr = "미야코가 훈련생 때 사용하던 낡고 해진 명찰. 일견 낡은 천 조각처럼 보이기도 하지만, 미야코에게는 과거의 꿈이 담겨 있는 소중한 물건이다."
578130730-NameKr = "새드 버니 보온병"
578130730-DescriptionKr = "미유가 언제나 챙겨 다니는 컴팩트한 사이즈의 보온병. 슬픈 표정의 토끼가 그려진 파우치에 소중하게 담겨 있다."
3853159441-NameKr = "나무 조각상"
3853159441-DescriptionKr = "어린 시절 사오리가 칼로 조각해서 만들어준 조잡한 조각상. 사오리 본인도 까맣게 잊고 있을 정도로 오래된 물건이다."
3465934622-NameKr = "화려한 꽃무늬 양산"
3465934622-DescriptionKr = "와카모가 쓰고 다니는 화려한 양산.\n선생님을 향한 애정을 영원히 기억하고 싶은, 와카모의 청순한 마음이 담겼다."
2513809664-NameKr = "보물 가득 파우치"
2513809664-DescriptionKr = "바닷가에 찾아오며 치세가 가져온 귀엽고 팬시한 디자인의 파우치. 겉에는 혹시 잃어버리진 않을까, 걱정한 카호가 직접 달아준 이름표가 달려 있다. 치세는 바닷가에서 찾은 수많은 추억들을 이 파우치에 담았다. 그중엔 미처 담지 못한 것도 있었지만, 그래도 그 추억은 영원히 사라지지 않는다."
23410748-NameKr = "사오리의 마스크"
23410748-DescriptionKr = "사오리가 항상 착용하는 마스크. 연식이 느껴지며, 수많은 싸움을 함께한 주인의 애착을 엿볼 수 있다."
526288530-NameKr = "고성능 헤드셋"
526288530-DescriptionKr = "방음도 철저하고,  특수 음향 처리도 되어 있으며, 해킹 대비까지 완벽한 고성능의 메이드 및 에이전트용 헤드셋.\n소중한 사람과의 연결을 상징하는 물건이라고, 토키는 주장한다."
2538736248-NameKr = "승부 동전"
2538736248-DescriptionKr = "코유키가 손수 구멍을 뚫은 동전.\n오락기를 공짜로 쓰기 위한 용도였지만, 보안 기술의 발전으로 인해 현재는 무용지물이 되었다."
3979908227-NameKr = "학생들의 감사장"
3979908227-DescriptionKr = "백귀야행의 학생들이 카호에게 증정한 감사장. 액자에 넣어 소중하게 보관하고 있다."
1620828120-NameKr = "메이드 머리띠"
1620828120-DescriptionKr = "대걸레, 메이드복, 메이드 머리띠라는 메이드 용사의 3대 징표 중 하나… 라는 것 같다. 그 중에서도 아리스가 가장 중요하게 생각하는 장비."
223298101-NameKr = "청춘의 하얀 리본"
223298101-DescriptionKr = "렌게가 좋아하는 청춘 소설 주인공의 리본.\n자신에게도 비슷한 청춘이 다가왔으면 하는 렌게의 바람이 깃들어 있다."
2108207432-NameKr = "오래된 축제 인형"
2108207432-DescriptionKr = "우미카가 처음으로 갔던 축제에서 산 인형.\n한 쌍으로 되어 있다."
1234369671-NameKr = "슈가러시 커스텀 LP 음반"
1234369671-DescriptionKr = "합주 연습 중 처음으로 완곡에 성공한 순간을 담은 LP 음반. 서툴지만 청량한 음악이 가득 담겨있다. 거기에, 생각지도 못한 목소리까지도……."
602681022-NameKr = "꽉 찬 연습장"
602681022-DescriptionKr = "키라라가 사용한 연습장. 모든 페이지가 공부의 흔적으로 가득 차 있다. 다만 공부의 흔적만 있는 것은 아닌 듯 한데……. "
172883371-NameKr = "바람이 오는 소리"
172883371-DescriptionKr = "치세가 매달아둔 풍령. 치세가 기다리는 맑고 청량한 소리는 시원한 바람이 오는 신호라고 한다."
945811089-NameKr = "낡은 정의실현부 명부"
945811089-DescriptionKr = "오랫동안 사용해 낡고 손때 묻은 수첩.\n부원들의 기호와 특기 등이 상세히 기록되어 있다. 꾸준한 관심과 관찰은 그녀 나름의 애정 표현인지 모른다."
351540743-NameKr = "비밀 버킷리스트"
351540743-DescriptionKr = "노노미가 남몰래 작성 중인 노트. 언젠가 대책위원회의 멤버들과 함께하고 싶은 일들이 적혀 있다."
2878555129-NameKr = "맛집 순방 수첩"
2878555129-DescriptionKr = "준코가 애용하는 수첩. 준코가 다녔던 맛집을 구역별로 평점을 매겨 기록해둔 특별한 수첩이다."
3704183677-NameKr = "세리카의 스포츠백"
3704183677-DescriptionKr = "세리카의 검은색 스포츠백. 공부용, 아르바이트용, 운동용, 정비용…… 뭐든 집어넣고 꺼낼 수 있는 만능 가방이다."
163861415-NameKr = "유우카의 함수 계산기"
163861415-DescriptionKr = "유우카가 늘 몸에서 떼놓지 않는 함수 계산기.\n뛰어난 암산 실력을 보유하고 있음에도 불구하고, 유우카는 언제나 완벽을 추구하기 위해 검산용으로 계산기를 사용하고 있다."
1286967671-NameKr = "케이스에 담긴 낡은 게임기"
1286967671-DescriptionKr = "모모이가 동생과 같이 처음으로 구입한 휴대용 게임기.\n모모이의 '게임 물들이기 작전'은, 그렇게 성공적으로 완수된 것 같다……"
2856730141-NameKr = "복각 한정판 콜렉션"
2856730141-DescriptionKr = "한정 복각된 만화책 콜렉션. 다른 모두는 아니라고 해도, 자신에게 소중하다면 그것은 소중한 것이다."
3397298241-NameKr = "아스나 스타일 헤어타이"
3397298241-DescriptionKr = "청소할 때도, '청소'할 때도 아스나가 항상 착용하고 있는 푸른색 리본 모양 헤어타이."
1977526069-NameKr = "눈물 안경"
1977526069-DescriptionKr = "코토리가 항상 쓰고 다니는 특별한 안경.\n얼핏 특이하다고 생각되기 쉬운 모습이지만, 사실은 설명을 듣는 사람들을 위한 코토리의 배려가 담겨 있다."
1261922711-NameKr = "패트롤 헤드폰"
1261922711-DescriptionKr = "스즈미가 순찰할 때 지참하고 다니는 헤드폰. <패트롤 헤드폰>이라는 건 스스로 붙인 이름일 뿐, 평범한 공산품이다."
3176499349-NameKr = "한여름의 아이스박스"
3176499349-DescriptionKr = "한여름의 아이스박스. 여름의 과일과 음료수와…… 이즈미가 손수 만든 특제 비법 향신료가 가득 들어있다고 한다. "
3783629365-NameKr = "오래된 닌자 비디오=테이프"
3783629365-DescriptionKr = "낡고 오래된, 평범한 비디오테이프.\n하지만 그 안에는 미치루를 닌자의 길로 이끈 무엇인가가 담겨 있다고 전해지는데……. "
2740802403-NameKr = "마이스터의 고글"
2740802403-DescriptionKr = "수많은 개조가 더해진 히비키 전용 고글. 기능뿐 아니라 외형적으로도 매우 마음에 든다고."
3126054698-NameKr = "이야기로 배우는 속담과 사자성어"
3126054698-DescriptionKr = "옛 이야기를 통해 각종 속담과 사자성어를 쉽게 풀이해주는 책.\n마시로의 취향에 꼭 맞는다."
4237292601-NameKr = "모모프렌즈 스페셜 티포트"
4237292601-DescriptionKr = "탱크를 타고 온 바다의 필수품이라며 히후미가 챙겨온 티포트.\n전차용 사양으로 제작된 특수 티포트이다. 전차용이지만, 어디까지나 히후미의 사비로 구입한 개인용품이다."
794937786-NameKr = "사야의 스케이트보드"
794937786-DescriptionKr = "사야 전용으로 꾸며진 스케이트보드. 자전거나 스쿠터와 달리 양손을 자유롭게 쓸 수 있지만, 그만큼 숙련도도 요구한다."
2694523503-NameKr = "목욕 보좌관"
2694523503-DescriptionKr = "대량 발주된 러버덕에 수염을 붙여 만든 붉은겨울 학원의 새로운 기념품.\n체리노는 어린아이나 쓸 법한 물건이라며 이 러버덕을 탐탁지 않게 여기는 듯하지만, 목욕하러 갈 때마다 꼭 대동한다고 한다."
664556707-NameKr = "SRT 기초교범"
664556707-DescriptionKr = "사키가 항상 휴대하는 SRT 특수학원 표준지급교범. 많이 읽고 공부해서 낡았지만 소중하게 간직하고 있다."
2395802552-NameKr = "무시퀸 카드 프로텍터"
2395802552-DescriptionKr = "카드의 손상을 막기 위해 만들어진 프로텍터. 그중에서도 카에데가 처음으로 구매한 무시퀸 프로텍터의 일반판. 정식 대회에서는 프로텍터를 사용해야 출전이 가능한 경우가 많다고 한다."
3145236472-NameKr = "클레이모어 악력기"
3145236472-DescriptionKr = "모에가 애용하는 대인 지뢰…… 의 격발기를 개조해서 만든 악력기. 뇌관을 제거해서 폭발하진 않지만, 두꺼운 용수철이 손에 가하는 압력만큼은 폭탄만큼이나 파멸적이라고."
3530712502-NameKr = "하나에의 선물 주머니"
3530712502-DescriptionKr = "하나에의 선물이 가득 담긴 주머니. 하나에가 사람들에게 필요할 거로 생각한 것들이 잔뜩 담겨 있다."
2177848562-NameKr = "나비 모양 날개 장식"
2177848562-DescriptionKr = "하루나의 날개 장식.\n상황과 기분, 의미에 따라 그때그때 다른 날개 장식을 착용한다는 것 같다."
2059299965-NameKr = "아테나 3호"
2059299965-DescriptionKr = "언제나 하레의 주변을 따라다니고 있는 구체형 드론.\n지혜의 여신에게서 따온 그 이름처럼 스스로 경험하고 학습할 수 있는 인공지능이 탑재되어 있지만, 종종 주인인 하레의 의도와는 정반대로 작동하여 그녀의 기대를 배신하곤 한다."
1544503704-NameKr = "마이스터의 공구 세트"
1544503704-DescriptionKr = "우타하의 취향이 듬뿍 담긴 그녀만의 커스텀 공구 세트.\n마이스터의 자존심을 담아 직접 만든 이 공구 세트는 어떤 의미에서 키보토스에서 단 하나밖에 존재하지 않는 물건이라고 불러도 무방할 것이다."
3580703064-NameKr = "손때 묻은 다구 세트"
3580703064-DescriptionKr = "시즈코가 처음으로 사용했던 다구 세트. 낡았지만, 첫 차를 우려냈던 추억도 함께 묻어 있다."
3706177967-NameKr = "수상한 고전문학"
3706177967-DescriptionKr = "여러 가지로 의미심장한 하나코의 애장서. 자주 압수당하지만, 하나코는 그때마다 이런저런 방법으로 되찾는다."
4052244851-NameKr = "단정한 흰색 코사지"
4052244851-DescriptionKr = "시들지 않는 하얀 꽃처럼, 처음의 마음을 잊지 말자는 마음으로 구매했다는 코사지. 하지만 진실은……?"
925075194-NameKr = "치나츠의 의학가방"
925075194-DescriptionKr = "치나츠가 응급의학부 시절 때부터 지니고 있던 커다란 가방. 한가득 담겨 있는 의료 용품들만큼, 주변을 살피는 치나츠의 배려심도 느낄 수 있다."
3030262627-NameKr = "디저트 약탈자"
3030262627-DescriptionKr = "요시미 전용의 포크 숟가락. 유사 시 즉각 대처할 수 있도록 늘 품에 담아 두고 있다. 오랜 시간 사용했어도 명품이라고 한다."
