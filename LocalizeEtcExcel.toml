3169167042-DescriptionTh = "อยู่ระหว่างแคมเปญรางวัลคำขอพิเศษ x{0}"
358559959-NameTh = "อาคารออนเซ็น"
358559959-DescriptionTh = "สถานที่แรกที่แขกผู้มาเยือนออนเซ็นแห่งนี้จะได้พบ มีเคาน์เตอร์สำหรับบริการแขกที่มาเช็กอิน และสิ่งอำนวยความสะดวกในล็อบบี้ที่ให้แขกได้พักผ่อนสบายๆ"
2825548492-NameTh = "โรงอาบน้ำ"
2825548492-DescriptionTh = "โรงอาบน้ำที่มีบ่อสำหรับแช่พร้อมกันได้หลายคน บ่ออาบน้ำตามรสนิยมต่างๆ ทั้งอุณหภูมิและส่วนประกอบ"
2481788820-NameTh = "ที่พัก"
2481788820-DescriptionTh = "ห้องพักธรรมดาที่มีเสื่อทาทามิและโต๊ะนั่งพื้นวางไว้ โนโดกะทำความสะอาดเครื่องนอนทั้งหมด รวมถึงผ้าห่มทุกวัน"
3141924738-NameTh = "ห้องพักผ่อน"
3141924738-DescriptionTh = "ห้องพักผ่อนสำหรับแขกที่เบื่อการแช่น้ำ มีโต๊ะปิงปองและเก้าอี้นวดที่ลูกค้าสามารถใช้ได้ตามสบาย"
384904434-NameTh = "ห้องจัดเลี้ยง"
384904434-DescriptionTh = "ห้องจัดเลี้ยงขนาดใหญ่สำหรับทานอาหารพร้อมกันได้หลายคน เมนูอาหารมีแต่อาหารขยะราคาถูก ขัดกับขนาดและความหรูหราของสถานที่"
1433250290-NameTh = "บ่อน้ำกลางแจ้ง"
1433250290-DescriptionTh = "บ่อน้ำกลางแจ้งที่จะเพลิดเพลินกับการแช่น้ำพร้อมกับชมวิวหิมะ บางทีคุณอาจได้พบกับสัตว์ป่าที่ลงมาจากภูเขาเพื่อเล่นน้ำก็เป็นได้"
4060632693-NameTh = "อาคารย่อย"
4060632693-DescriptionTh = "อาคารย่อยที่เตรียมไว้สำหรับแขก VIP เนื่องจากอยู่ไกลจากอาคารหลัก คุณสามารถผ่อนคลายได้โดยไม่มีแขกคนอื่นรบกวน"
4194626497-NameTh = "สวน"
4194626497-DescriptionTh = "สวนหินที่ตกแต่งด้วยทรายและกรวด โนโดกะคอยกวาดกองหิมะทุกวัน เพื่อรักษาให้สวนสวยงามอยู่เสมอ"
3675272134-NameTh = "กองบัญชาการจัดการ"
3675272134-DescriptionTh = "กองบัญชาการจัดการที่รับผิดชอบดูแลการจัดงานมหกรรมกีฬาครึ่งแรก\nทั้งเรื่องการดูแลตารางการแข่งขันกีฬา การลงทะเบียนร้านแผงลอย\nและการจัดการ ต่างก็เป็นงานที่กองบัญชาการรับผิดชอบอยู่"
1884871261-NameTh = "สนาม"
1884871261-DescriptionTh = "ลู่วิ่งขนาดใหญ่ที่สร้างขึ้นตามเขตด้านนอกของสนามกีฬา สร้างขึ้นโดย\nวัสดุที่แข็งแรงทนทานเพื่อป้องกันความเสียหายที่จะเกิดขึ้นในเวลาแข่ง\nวิ่งข้ามสิ่งกีดขวางที่ใช้วัตถุระเบิด"
2410805514-NameTh = "คลังพร็อพ"
2410805514-DescriptionTh = "คลังเก็บของขนาดใหญ่ที่ใช้สำหรับจัดเก็บอุปกรณ์กีฬาที่ใช้ในงาน\nมหกรรมกีฬา ประตูเปิดจากภายในไม่ได้ โปรดระมัดระวังขณะเข้าออก"
2074635724-NameTh = "อัฒจันทร์"
2074635724-DescriptionTh = "อัฒจันทร์สองชั้นสำหรับนั่งชมการแข่งกีฬาแบบชนิดติดขอบสนาม\nแบ่งโซนที่นั่งตามโรงเรียน เพื่อป้องกันไม่ให้เกิดการเขม่นกันระหว่าง\nโรงเรียนขณะที่เชียร์"
830995934-NameTh = "สนามกีฬาหญ้า"
830995934-DescriptionTh = "สนามหญ้ากว้างใจกลางสนามกีฬา ถึงจะใช้หญ้าเทียมปูพื้นสนาม\nแต่ด้วยเทคโนโลยีสุดล้ำของโรงเรียนมิลเลเนียม ทำให้เวลาสัมผัส\nจะรู้สึกนุ่มมือกว่าหญ้าจริงเสียอีก"
2054928448-NameTh = "คลังอาวุธหนัก"
2054928448-DescriptionTh = "คลังสำหรับเก็บอุปกรณ์หนักที่ใช้ในงานแข่งมหกรรมกีฬา ที่นี่มีอุปกรณ์\nพื้นฐานติดตั้งอยู่ สามารถใช้ซ่อมแซมอุปกรณ์เบื้องต้นได้"
1757505051-NameTh = "ห้องควบคุมการกระจายเสียง"
1757505051-DescriptionTh = "ห้องโสตทัศนูปกรณ์สำหรับถ่ายทอดสดการแข่งขันงานมหกรรมกีฬา\nมีฟังก์ชันสำหรับรีเพลย์วิดีโอเพื่อป้องกันการถ่ายทอดสดผิดพลาด"
1079056613-NameTh = "ห้องพักผ่อน"
1079056613-DescriptionTh = "ห้องพักผ่อนสำหรับนักกีฬาที่เหน็ดเหนื่อยกับการแข่งขัน หรือผู้ชมที่มา\nชมงานแข่งกีฬา มีตู้กดเครื่องดื่มอัตโนมัติ และเครื่องชงกาแฟฟรี"
3239184876-NameTh = "สถาบันฝึกตำรวจวัลคิรี่ สาขาชิราโทริ"
3239184876-DescriptionTh = "สาขาย่อยของสถาบันฝึกตำรวจวัลคิรี่ ว่ากันว่าล้อมรอบด้วยพื้นที่สีเขียวชอุ่ม เลยมีอากาศดีเป็นพิเศษ"
2322223304-NameTh = "โคกิทาวน์"
2322223304-DescriptionTh = "ถนนย่านการค้าเครื่องใช้ไฟฟ้าชื่อดัง มีข่าวลือว่าทุกอย่างสามารถหาได้\nจากที่นี่ เว้นแต่ว่าสินค้านั้นจะเลิกผลิตไปแล้ว"
1462360932-NameTh = "ไตรสแควร์"
1462360932-DescriptionTh = "จัตุรัสที่ใช้เป็นพื้นที่พักผ่อนและจุดนัดพบ เป็นสถานที่เหมาะสำหรับเดินเล่นเป็นที่สุด"
4293010634-NameTh = "เขตธุรกิจที่ 3"
4293010634-DescriptionTh = "เขตธุรกิจที่อยู่ตั้งอยู่ข้างไตรสแควร์ เป็นพื้นที่ที่สวยงามและทันสมัย มีถนนและอาคารที่ซับซ้อน"
1977010791-NameTh = "พราโดอเวนิว"
1977010791-DescriptionTh = "ถนนที่เป็นที่ตั้งของพิพิธภัณฑ์ศิลปะ นอกจากพิพิธภัณฑ์ศิลปะขนาดใหญ่ ยังมีถนนสายศิลปะอยู่ในพื้นที่โดยรอบเป็นแหล่งท่องเที่ยวด้วย"
1729072075-NameTh = "สวนในท้องถิ่น ชิราโทริ"
1729072075-DescriptionTh = "แม้ว่าจะมีคนมาเยี่ยมชมไม่มากเมื่อเทียบกับขนาดของสวน แต่ก็เป็นสถานที่ที่ขาดไปไม่ได้"
2590301450-NameTh = "ท่าเรือคาเนะซากิ"
2590301450-DescriptionTh = "ถ้าอยากเห็นทะเล การมาที่นี่เป็นวิธีหนึ่งที่แนะนำ อาจจะเห็นทัศนียภาพเหนือจินตนาการเลยก็ได้"
4121383175-NameTh = "รามินิทาวน์"
4121383175-DescriptionTh = "หากพูดถึงแหล่งท่องเที่ยวด้านอาหารของแต่ละโรงเรียน ห้ามพลาดถนน\nสายอาหารนี้เด็ดขาด มีตรอกแคบสองฝั่งแม่น้ำที่มีร้านอาหารและร้านริมทาง\nรายล้อมอยู่นับไม่ถ้วนเสมอ"
2853338239-NameTh = "ทางเข้าออก"
2853338239-DescriptionTh = "สถานที่แรกสุดที่จะต้อนรับแขก เมื่อเข้ามาในห้องชมรมพัฒนาเกม จำนวนรองเท้าที่วางไว้จะแตกต่างกันไปตามเวลาและสถานการณ์"
2194359054-NameTh = "พื้นที่พักผ่อน"
2194359054-DescriptionTh = "โซฟาที่มีเบาะรองนั่งเก่าและชำรุดจากการใช้งานมานาน ภายนอกอาจดูซอมซ่อ แต่เป็นเฟอร์นิเจอร์ชิ้นสำคัญที่ช่วยให้\nชมรมพัฒนาเกมได้พักผ่อนอย่างสบาย"
2190051001-NameTh = "พื้นที่วางของ"
2190051001-DescriptionTh = "ชั้นวางของอเนกประสงค์ที่เต็มไปด้วยของหลากชนิด ตั้งแต่โน้ตบุ๊คที่\nจำเป็นในการพัฒนาเกม ไปจนถึงคู่มือที่ต้องอ่านบ่อยๆ และแม้กระทั่ง\nกระป๋องเครื่องดื่มชูกำลังที่เหลือครึ่งกระป๋อง ถึงจะทำความสะอาดเป็น\nประจำ แต่ก็กลับมารกอีกอย่างรวดเร็ว"
2420465823-NameTh = "พื้นที่เล่นเกม"
2420465823-DescriptionTh = "พื้นที่จัดแสดงเครื่องเล่นเกมย้อนยุค ที่เรียกได้ว่าเป็นขุมทรัพย์ และแหล่งความคิดสร้างสรรค์ของชมรมพัฒนาเกม ตลับเกมเก่าๆ นั้นไวต่อฝุ่นและแรงกระแทก จึงต้องคอยดูแลให้สะอาดกว่าที่อื่น"
4038677162-NameTh = "บริเวณพรมหนา"
4038677162-DescriptionTh = "พรมหนาที่ติดตั้งไว้ตรงกลางชมรมพัฒนาเกมเพื่อคอยกันเสียงรบกวน\nระหว่างชั้น ช่วยซับแรงกระแทกได้อย่างดี แม้ในขณะเล่นเกมเต้น หรือเกมแอกชันอย่างดุเดือด"
2856573316-NameTh = "พื้นที่ตู้ของยูสึ"
2856573316-DescriptionTh = "ตู้ที่หัวหน้าชมรมพัฒนาเกมยูสึใช้เป็นที่พักผ่อนและที่หลบภัยทางใจ ถึงภายนอกจะดูคับแคบ แต่ก็มีของเล่นและขนมเพียงพอให้อยู่ได้\nมากกว่าหนึ่งวัน"
4243041319-NameTh = "พื้นที่ตู้หนังสือเหล็ก"
4243041319-DescriptionTh = "ตู้หนังสือเหล็กที่เก็บเครื่องเล่นเกมและหนังสือเฉพาะทางที่ไม่ได้ใช้\nบ่อยๆ ไว้ ท่ามกลางกล่องมากมายที่วางเรียงอยู่เต็มตู้ ยังมีกล่องหนึ่ง\nที่บรรจุสินค้าลิมิเต็ดของเกม <เทลส์ ซาก้า โครนิเคิล> ที่แม้แต่แฟนๆ เองก็ยังไม่รู้มาก่อน"
598899268-NameTh = "กระถางไม้อวบน้ำ"
598899268-DescriptionTh = "พื้นที่สำหรับวางกระถางดอกไม้ที่ได้รับการดูแลด้วยความรักเอาใจใส่"
