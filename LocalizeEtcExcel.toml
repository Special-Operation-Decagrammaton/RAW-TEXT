763312064-NameTh = "แก้วค็อกเทลพิเศษ"
763312064-DescriptionTh = "แก้วกระจกใส่ค็อกเทลน้ำองุ่น มีรสชาติหวาน แก้วนี้จะสร้างความคลาสสิกได้ เพียงแค่สั่นแก้วเบาๆ"
1635418688-NameTh = "ผ้าเช็ดปากประดับโต๊ะ"
1635418688-DescriptionTh = "ผ้าเช็ดปากประดับดอกไม้สีม่วงแสนสวย เพลิดเพลินกับมื้อเย็นได้ โดยไม่ต้องห่วงว่าอาหารจะตก เพียงวางผ้าผืนนี้ไว้บนตัก"
1461877186-NameTh = "นาฬิกาพก"
1461877186-DescriptionTh = "เวลาของประธานคณะกรรมการวินัยฮินะ\nนั้นมีค่า มาจัดตารางเวลาเพื่อฝึกเปียโน\nกันเถอะ"
1549901025-NameTh = "เบาะแสเป้าหมาย"
1549901025-DescriptionTh = "เบาะแสที่ใช้ระบุเป้าหมาย ถือเป็นสิ่งสำคัญที่สุดในการทำงาน"
3633823236-NameTh = "สูจิบัตรการแสดง"
3633823236-DescriptionTh = "สูจิบัตรที่บอกรายละเอียดของการแสดง ถ้าเปิดสูจิบัตรความทรงจำในตอนนั้น จะหวนกลับมาอีกครั้ง"
3045934720-NameTh = "หูกระต่าย"
3045934720-DescriptionTh = "หูกระต่ายขนาดเล็กที่พบได้บ่อยในสถานที่\nหรูหรา เป็นแบบที่ไม่ว่าใครก็ใส่ได้สบาย"
1268221723-NameTh = "แว่นตาโอเปร่า"
1268221723-DescriptionTh = "กล้องโทรทรรศน์ที่ทำให้มองเห็นเวทีจากระยะ\nไกล มาชมการแสดงและศิลปะ\nที่ยอดเยี่ยมให้เต็มตากันเถอะ"
1224308689-NameTh = "ตั๋วเที่ยววันวาเลนไทน์"
1224308689-DescriptionTh = "ตั๋วเที่ยวของคุณครูที่ยุ่งกับงานลาดตระเวนในวันวาเลนไทน์\nใช้เพื่อนัดพบกับนักเรียน\n※ ตั๋วที่หมดอายุ หลังสิ้นสุดกิจกรรมจะเปลี่ยนเป็นเครดิต x400,000"
172046152-NameTh = "บัตรที่ระลึกเฮียกคิยาโค"
172046152-DescriptionTh = "บัตรที่ระลึกที่เห็นตามสถานที่ท่องเที่ยว ถ้าเก็บสะสมได้เยอะๆ จะใช้เล่นเกมได้"
2693887233-NameTh = "ตารางทัศนศึกษา"
2693887233-DescriptionTh = "เอกสารสรุปตารางข้อมูลการทัศนศึกษา การวางแผนจะเป็นสิ่งสำคัญ แม้ว่าจะมีหลุดไปบ้างก็ตาม"
2435927187-NameTh = "ธงนำเที่ยว"
2435927187-DescriptionTh = "ธงนำเที่ยวที่ใช้นำทางนักท่องเที่ยว ช่วยบอกทางให้นักเรียนที่หลงทิศได้ดีมาก"
1190740558-NameTh = "สมุดสะสมคูปองพิเศษ"
1190740558-DescriptionTh = "สมุดสะสมคูปองที่ใช้แลกรับสินค้าต่างๆ ในสถานที่ท่องเที่ยวได้ เวลาใช้ต้องคิดให้ดีนะ"
3549417253-NameTh = "ปฏิทิน D-Day"
3549417253-DescriptionTh = "ปฏิทินที่ใช้นับถอยหลังไปแต่ละวัน จนกว่าจะถึงวันแสดง เร็วเข้า เวลาไม่คอยท่า! "
1553303194-NameTh = "คุกกี้เติมพลัง"
1553303194-DescriptionTh = "คุกกี้สำหรับฟื้นฟูพลังกายที่หมดไป มันไม่ได้ทำให้อิ่มเลยจริงๆ"
4287453305-NameTh = "แคนดี้เติมแรงใจ"
4287453305-DescriptionTh = "แคนดี้สำหรับเพิ่มแรงใจที่หดหาย เป็นแบบสุ่มรสชาติ"
3117022162-NameTh = "แต้มกิจกรรม"
3117022162-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
1867361376-NameTh = "ริสต์แบนด์เข้าสวนน้ำ"
1867361376-DescriptionTh = "ริสต์แบนด์ที่มอบให้กับนักท่องเที่ยวสวนน้ำ ใช้กับตู้ฝากของหรือซื้อของต่างๆ ได้"
1797048856-NameTh = "นกหวีดการ์ด"
1797048856-DescriptionTh = "นกหวีดที่ใช้เป่าเมื่อเกิดเหตุฉุกเฉิน ถ้าเป่าเต็มแรงจะมีเสียงแหลมสูงออกมา"
1789692618-NameTh = "ห่วงยางช่วยชีวิต"
1789692618-DescriptionTh = "ห่วงยางใช้สำหรับช่วยชีวิตคนที่จมน้ำ อย่าลืมคล้องเชือกไว้ก่อนขว้างออกไป"
1024700311-NameTh = "เสื้อชูชีพ"
1024700311-DescriptionTh = "เสื้อชูชีพที่ใส่แล้วจะลอยในน้ำได้ ควรเลือกขนาดที่ใส่ได้พอดีตัว"
457021552-NameTh = "บัตรบูธเกม"
457021552-DescriptionTh = "บัตรสำหรับเข้าบูธเกม แค่ดีไซน์ก็กระตุ้นความปรารถนาออกท้าทายได้"
2007696799-NameTh = "เหรียญแก๊งหมวกกันน็อก"
2007696799-DescriptionTh = "เหรียญที่ระลึก สำหรับรำลึกถึงสหพันธ์แก๊งหมวกกันน็อก ชวนให้ระลึกถึงความทรงจำที่ริมชายหาด"
2667732249-NameTh = "เมนูร้านแผงลอย"
2667732249-DescriptionTh = "เมนูที่ร้านแผงลอยริมชายหาดเตรียมไว้ เต็มไปด้วยอาหารรสเลิศ แต่ระวังราคาและเงินในกระเป๋าไว้ด้วย"
3842896816-NameTh = "ปืนฉีดน้ำสำหรับแข่ง"
3842896816-DescriptionTh = "ปืนฉีดน้ำที่ใช้ในการแข่งขันปืนฉีดน้ำ ของแก๊งหมวกกันน็อก ถึงยิงออกมาเป็นกระสุน ไม่ใช่น้ำ แต่ชื่อก็คือปืนฉีดน้ำอยู่ดี"
3549805305-NameTh = "ตุ๊กตาที่ระลึก"
3549805305-DescriptionTh = "ตุ๊กตาที่ทำขึ้นตามลักษณะของ... ผู้สูงศักดิ์บางคน ทำขึ้นมาเฉพาะสำหรับงานแลกเปลี่ยน มีอัตราการคืนต่ำอย่างคาดไม่ถึง เพราะนักเรียนจำนวนมากต้องการครอบครอง"
4291250831-NameTh = "เซ็ตชาของขวัญเล็ก"
4291250831-DescriptionTh = "เซ็ตชาของขวัญ หนึ่งในของที่ระลึกเฉพาะซานไห่จิง แม้ว่าจะเพลิดเพลินกับการดื่มชาได้หลายวิธี แต่น่าจะมีกลุ่มเฉพาะในซานไห่จิง..."
2196042750-NameTh = "โมเดลลิ่วเหอเก๋อ"
2196042750-DescriptionTh = "มังกรดำกล่าวว่านี่เป็นของที่ระลึก ที่รวมแก่นแท้ของซานไห่จิงเอาไว้ หากนำไปวางตกแต่งถูกที่ ก็อาจจะสร้างเสน่ห์เฉพาะตัวได้"
3379690606-NameTh = "พวงกุญแจนำโชค"
3379690606-DescriptionTh = "พวงกุญแจที่ทำเป็นรูปโคมไฟ มีคำอธิษฐานขอให้โชคดีเขียนไว้"
1441156605-NameTh = "บัตรเทศกาลเงาจันทร์"
1441156605-DescriptionTh = "บัตรของขวัญจำกัดเวลา มีแจกให้ในเทศกาลเงาจันทร์เท่านั้น หากสะสมไว้ได้จำนวนมาก จะใช้เข้าท้าทาย 'เกมบางอย่าง' ที่จัดเฉพาะในเทศกาลเงาจันทร์"
2588141576-NameTh = "ขนมเทศกาลเงาจันทร์"
2588141576-DescriptionTh = "ขนมเทศกาลเงาจันทร์ ใช้อธิษฐานขอให้เทศกาลสำเร็จรุ่งเรือง มีขนาดเล็กกว่าขนมเทศกาลเงาจันทร์ทั่วๆ ไป และรับประทานได้ในคำเดียว"
2506282920-NameTh = "อาหารเสริมสูตรชมรมปรุงยา"
2506282920-DescriptionTh = "อาหารเสริมสูตรพิเศษ ที่ชมรมวิจัยศาสตร์การปรุงยาผสมขึ้นมา เพื่อให้งานเทศกาลสำเร็จลุล่วง ว่ากันว่าจะช่วยเติมพลังและฟื้นฟูพลังงาน"
647708360-NameTh = "ประทัดเทศกาลเงาจันทร์"
647708360-DescriptionTh = "ประทัดที่ขาดไม่ได้ในงานเทศกาล ถึงจะมีมาตรการความปลอดภัยดีแล้ว แต่ก็ยังควรระมัดระวังจะเกิดอุบัติเหตุ"
494149653-NameTh = "แต้มกิจกรรม"
494149653-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
2045066777-NameTh = "บัตรชมไลฟ์"
2045066777-DescriptionTh = "บัตรสำหรับเข้าชมไลฟ์การแสดงสดของยูนิตที่เข้าร่วม\nหลังจบไลฟ์ก็ยังเก็บไว้เป็นของที่ระลึกได้ด้วย"
4126770671-NameTh = "แท่งไฟหลากสี"
4126770671-DescriptionTh = "แท่งไฟที่จะส่องแสงตรงกับศิลปินในไลฟ์ ถือเป็นอุปกรณ์ชั้นดีที่ช่วยให้ไอดอลกับแฟนๆ เป็นหนึ่งเดียวกันในคอนเสิร์ตฮอลล์ขนาดใหญ่"
1870900489-NameTh = "เค้กก้อนจิ๋ว"
1870900489-DescriptionTh = "เค้กชิ้นที่แจกจ่ายไปทั่วงานเทศกาลโรงเรียน มีรสชาติดีจนกลายเป็นเหตุให้ผู้คนต้องมาเยี่ยมชม งานเทศกาลโรงเรียน"
2062917839-NameTh = "สารลึกลับ"
2062917839-DescriptionTh = "สารลึกลับที่เก็บได้ในพื้นที่ คาดว่าหาก 'วิเคราะห์ซ้ำ' แบบลงลึก จะได้ผลลัพธ์ที่ต่างจากเดิมอย่างสิ้นเชิง"
734398872-NameTh = "มอนสเตอร์แม็กซ์ รสอุเมะโบชิ"
734398872-DescriptionTh = "มอนสเตอร์แม็กซ์รสที่ 'น่าทึ่ง' ในหลายๆ ด้าน แต่บางคนคิดว่ารสนี้คือตัวเลือกที่ดีที่สุด"
3651067564-NameTh = "หมอนนุ่มฟู"
3651067564-DescriptionTh = "หมอนสีขาวที่ดูนุ่มนิ่มฟูฟ่อง นุ่มจนแค่วางหัวลง ก็เหมือนเข้าสู่ดินแดนความฝันแล้ว"
4161777769-NameTh = "แพ็กการ์ดใหม่"
4161777769-DescriptionTh = "แพ็กการ์ดที่โคยูกิใช้ล่อลวงคุณครู และอัดแน่นด้วยการ์ดใหม่"
3803620130-NameTh = "<BOOM> เวอร์ชันคลาสสิก"
3803620130-DescriptionTh = "ตลับเกมที่มากิเตรียมไว้ให้ทุกคน เล่นสนุกได้ทุกที่เพียงแค่มี CPU และจอมอนิเตอร์"
3308634141-NameTh = "แต้มกิจกรรม"
3308634141-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
3294588725-NameTh = "ของที่ระลึกงานเอ็กซ์โป"
3294588725-DescriptionTh = "ของที่ระลึกจากงานมิลเลเนียม เอ็กซ์โป มีจำหน่ายทั่วบริเวณสถานที่จัดงาน\nถึงจะพบได้ทั่วไปในงาน แต่สุดท้ายมันจะกลายเป็นของลิมิเต็ด!"
123964663-NameTh = "ของที่ใครสักคนทำหาย"
123964663-DescriptionTh = "ของหายที่นักเรียนหลายคนทำตกไว้\nหากรวบรวมไปให้ผู้จัดงาน ใครสักคนจะได้มีความสุขอีกครั้ง"
2401109475-NameTh = "แสตมป์วาเลนไทน์"
2401109475-DescriptionTh = "แสตมป์ที่นำไปแลกรับตั๋วเที่ยววันวาเลนไทน์ได้ ถือเป็นสิ่งพิสูจน์ว่าได้ดำเนินการอย่างจริงจังแล้ว"
2621462400-NameTh = "ตั๋วเที่ยววันวาเลนไทน์"
2621462400-DescriptionTh = "ตั๋วเที่ยวของคุณครูที่ยุ่งกับงานลาดตระเวนในวันวาเลนไทน์\nใช้เพื่อนัดพบกับนักเรียน\n※ ตั๋วที่หมดอายุ หลังสิ้นสุดกิจกรรมจะเปลี่ยนเป็นเครดิต x400,000"
4188493704-NameTh = "คูปองพาร์เฟต์"
4188493704-DescriptionTh = "ว่ากันว่าพาร์เฟต์นี้แหละคือคำว่า 'สมบูรณ์แบบ' ในวันที่เหนื่อยล้าทั้งกายใจ ลองให้รางวัลตัวเอง ด้วยการกินพาร์เฟต์ดูสิ"
2761979326-NameTh = "แพนเค้กสำหรับชิม"
2761979326-DescriptionTh = "แพนเค้กสำหรับชิม ทำขึ้นมาเพื่อโปรโมตคาเฟ่ มีขนาดเล็กมากจนกินหมดได้ในคำเดียว"
2082083823-NameTh = "ยาทันใจหน่วยแพทย์ฉุกเฉิน"
2082083823-DescriptionTh = "ยารักษาฉุกเฉินนี้ให้ผลดีเยี่ยม ใช้ได้ทุกที่ทุกเวลา ห้ามใช้ในทางที่ผิด"
3706064000-NameTh = "ผงซักฟอกแบบใช้แล้วทิ้ง"
3706064000-DescriptionTh = "ผงซักฟอกแบบใช้แล้วทิ้งในซองขนาดเล็ก แต่ว่ากันว่ามีประสิทธิภาพสูง และยังล้างเมือกเหนียวได้ดีอีกด้วย"
994443535-NameTh = "แต้มกิจกรรม"
994443535-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
3257979311-NameTh = "กระบองลมเชียร์"
3257979311-DescriptionTh = "กระบองลมเชียร์ เหมาะแก่การเชียร์ โดยถือในมือซ้ายขวาแล้วตี มีข้อดีที่ไม่ต้องเจ็บฝ่ามืออีกด้วย"
2973850098-NameTh = "เครื่องดื่มโปรตีน"
2973850098-DescriptionTh = "ถ้าคอแห้งก็จะส่งเสียงเชียร์ไม่ได้ และถ้าสถานที่นั้นอากาศร้อนเกินไป ลองดับกระหายด้วยเครื่องดื่มสักแก้วดูสิ"
2226979744-NameTh = "ตั๋วหมุนรางวัล"
2226979744-DescriptionTh = "ตั๋วหมุนรางวัลตามที่เขียนไว้ มาสะสมให้ได้มากที่สุด แล้วคว้ารางวัลที่ 1 กันเถอะ"
2663393436-NameTh = "สติกเกอร์ไฮแลนเดอร์"
2663393436-DescriptionTh = "ของที่ระลึกที่มอบให้เมื่อโดยสารรถไฟไฮแลนเดอร์ เป็นรูปวาดมาสคอตสุดน่ารัก"
2161564079-NameTh = "แผนที่เส้นทางรถไฟ"
2161564079-DescriptionTh = "แผนที่ที่แสดงเส้นทางของรถไฟบรรทุกสินค้า ใน 'กรณีปกติ' รถไฟจะวิ่งไปตามเส้นนี้"
926350146-NameTh = "พัสดุปริศนา"
926350146-DescriptionTh = "กล่องไม้บรรจุสินค้า ถึงจะอยากรู้ว่ามีอะไรข้างใน แต่ก็ไม่ควรเปิดตามอำเภอใจ "
3050818841-NameTh = "ประแจขันท่อ"
3050818841-DescriptionTh = "ประแจขันท่อสำหรับซ่อมบำรุง เครื่องจักรส่วนใหญ่จะใช้สิ่งนี้ซ่อมได้ มาลองซ่อมดูกันสักครั้งเถอะ"
2430538849-NameTh = "ตุ๊กตาไม้ยูคาริ"
2430538849-DescriptionTh = "ตุ๊กตาไม้ของยูคาริที่คิเคียวทำขึ้น ให้ความรู้สึกถึงความอิสระ "
2660460932-NameTh = "ตุ๊กตาไม้นางุสะ"
2660460932-DescriptionTh = "ตุ๊กตาไม้ของนางุสะที่คิเคียวทำขึ้น ให้ความรู้สึกผ่อนคลาย"
687787590-NameTh = "ตุ๊กตาไม้คิเคียว"
