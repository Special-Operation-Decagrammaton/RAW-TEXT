3591040431-DescriptionTh = "ของสำหรับจ่ายน้ำหมึก ตอนใช้ให้ระวังให้ดี เพราะถ้าเลอะแล้ว มันไม่ได้ลบออกกันได้ง่ายๆ"
392753185-NameTh = "ปากกาแท็บเล็ต"
392753185-DescriptionTh = "มีคำอธิบายเขียนไว้ว่า ให้ความรู้สึกเหมือนตอนที่ใช้ปากกา เขียนลงไปบนกระดาษจริงๆ..."
