3946342470-DescriptionKr = "귀여운 마스코트 동물 캐릭터가 그려진 식기 세트. 매년 키보토스 식기 판매 순위 10위권을 놓치지 않는 전통의 강자."
762300502-NameKr = "두뇌개발용 퍼즐 큐브"
762300502-DescriptionKr = "<이것을 풀 수 있는 당신이야말로 밀레니엄!> 밀레니엄 사이언스 스쿨 공인 상급자용 퍼즐 큐브."
3238447321-NameKr = "대형 홀 케이크"
3238447321-DescriptionKr = "보기만 해도 만족감이 차오르는 대형 홀 케이크. 칼로리 표기는 뒷면에 있습니다."
1648390167-NameKr = "고급 뷔페 초대권"
1648390167-DescriptionKr = "키보토스 제일의 셰프가 있는 식당의 고급 뷔페를 즐길 수 있는 초대권. 상당히 비싸다."
1143324025-NameKr = "식충식물 화분"
1143324025-DescriptionKr = "소수의 특이한 취향을 가진 사람들이 찾는 식충식물 화분. 곤충을 잡아먹는 모습이 의외로 귀엽다며 인기가 많다."
1569225040-NameKr = "비싸보이는 금박 욕망의 항아리"
1569225040-DescriptionKr = "한 눈에 보기에도 제법 비싸보이는 금박 항아리. 유사품에 주의!"
2112008978-NameKr = "태엽장치 오르골"
2112008978-DescriptionKr = "원목으로 연출된 빈티지한 느낌이 제법 고급스러운 태엽 오르골. 수집가들 사이에선 유명하다."
2651867463-NameKr = "자수가 놓인 손수건"
2651867463-DescriptionKr = "소박한 자수가 단아한 아름다움을 풍기는 손수건."
3408710330-NameKr = "백과사전"
3408710330-DescriptionKr = "식빵 봉투를 묶는 '그거'부터, 도시락에 들어가는 그 '풀'의 이름까지. 당신이 궁금해하는 모든 것이 여기에."
2665872474-NameKr = "건강보조식품"
2665872474-DescriptionKr = "한 입만 먹어도 힘이 샘솟는다! 소중한 사람에게 선물하기 좋은 건강식품!"
922488053-NameKr = "여름용 튜브"
922488053-DescriptionKr = " 여름이다! 바다다! 수영에 서툴러도, 수영에 능숙해도, 안전을 위해서라면 반드시 챙겨야 하는 물놀이의 필수품. 팬시한 디자인으로 귀여움도 완비!"
1777637643-NameKr = "레이스 베개"
1777637643-DescriptionKr = "고급스러운 재질로 만들어진 레이스 베개. 얼핏 심플해 보이는 디자인의 베개지만, 거기엔 문자 그대로 소녀들의 꿈이 담겨있다."
2122048137-NameKr = "스트리트 오브 불량배 1권"
2122048137-DescriptionKr = "<우리에겐 의리와 배짱 뿐이야!>의 대사로 유명한 문제의 화제작, 스트리트 오브 불량배 시리즈 제1권.겉보기와 달리 주인공이 의외로 귀엽다는 감상과 함께 시리즈 호평 발매 중."
3996150169-NameKr = "사무엘라 <더 비욘드>"
3996150169-DescriptionKr = "고급 화장품 메이커 '사무엘라'에서 발매한 최고급 향수. \"한 번 뿌려 사랑스러움을 입어 보세요\" 라는 캐치프레이즈로 유명한 초초히트작으로, 희대의 천재 조향사 <더 비욘드>가 만든 사무엘라 12걸작 중의 하나이다."
493877113-NameKr = "고풍스러운 달걀 공예품"
493877113-DescriptionKr = "달걀 모양의 몸체 위로 아름다운 보석과 기하학적인 무늬가 세공되어 있는 공예품. 물론 따듯하게 품어준다고 병아리가 태어나진 않는다."
2812198344-NameKr = "밀피유의 정통 파르페"
2812198344-DescriptionKr = "트리니티의 유명 과자점 카페 밀피유에서 팔고 있는 파르페. 부드러운 아이스크림 위로 층층이 쌓아올린 과자와 시럽, 생크림, 그리고 과일의 하모니는 그야말로 정통파!"
610304186-NameKr = "에이~북 레어"
610304186-DescriptionKr = "키보토스 학생들이 가장 갖고 싶어 하는 전자기기 TOP 3에 들어가는 유명 노트북 제품. 제법 비싸다. 하지만 갖고 싶다! 그래도 역시 비싸다!"
991149378-NameKr = "세련된 머리빗"
991149378-DescriptionKr = "고급스러운 느낌이 드는 세련된 디자인의 휴대용 머리빗. 선물용으로 인기가 많다."
18654891-NameKr = "영양가득 종합 비타민 젤리"
18654891-DescriptionKr = "종합 비타민이 들어 있는 영양 젤리 상품. 다양한 과일 맛의 젤리가 들어 있어 먹는 재미가 있다. 먹다 보면 나도 모르게 한 통을 다 비우게 되니 조심!"
442885187-NameKr = "최고급 단풍나무 분재"
442885187-DescriptionKr = "보고 있기만 해도 마음이 차분해지는 최고급 단풍나무 분재. 사계절에 따라 옷을 갈아입듯 변화무쌍한 나뭇잎의 모습이 그야말로 그윽한 정취를 풍긴다."
897935320-NameKr = "반짇고리 키트"
897935320-DescriptionKr = "각종 다양한 상황에 필요할 법한 도구들을 선별해 넣어둔 상급자용 반짇고리 키트. 이것만 있다면 옷이 해지거나, 양말에 구멍이 나더라도 얼마든지 OK!"
175940735-NameKr = "음악 연주회 입장권"
175940735-DescriptionKr = "키보토스에서 정기적으로 개최되는 음악 연주회의 입장권. 클래식부터 시작해 요즘 유행을 타고 있는 유행가까지. 종류 불문 다양한 음악을 좋아하는 사람에게 최적인 선물."
794340686-NameKr = "하루 세 번 덤벨 세트"
794340686-DescriptionKr = "다양한 무게의 덤벨이 여러 개 들어 있는 세트 상품. 하루 세 번. 아침, 점심, 저녁 근력 운동을 반복해 멋진 근육을 만들어보자!"
1058688122-NameKr = "보드 게임 <더 인생>"
1058688122-DescriptionKr = "취직을 하거나, 복권에 당첨되거나, 우주여행을 할 수도 있는 재미있는 보드게임. 매 게임마다 한 치 앞을 알 수 없는 룰렛과 주사위의 결과가 마치 인생과도 같다는 모양이다."
368202622-NameKr = "싱그러운 꽃다발"
368202622-DescriptionKr = "소중한 사람에게 기념으로 선물하는 자수정으로 만들어진 꽃다발. 고급스러운 꽃잎이 우아하게 빛난다."
1404874799-NameKr = "아름다운 꽃다발"
1404874799-DescriptionKr = "소중한 사람에게 기념으로 선물하는 루비로 만들어진 꽃다발. 아름다운 붉은 꽃잎이 상대의 마음을 사로잡는다. "
2205211310-NameKr = "하츠네 미쿠의 포토 카드"
2205211310-DescriptionKr = "미쿠의 <키보토스 라이브 콘서트>에서 배부된 특제 포토 카드. 성황리에 끝난 콘서트 덕분에 미쿠의 팬이라면 누구나 갖고 싶어하는 희귀 굿즈가 되었다."
3401454433-NameKr = "반짝이는 꽃다발"
3401454433-DescriptionKr = "특별한 사람에게 기념으로 선물하는 크리스탈로 만들어진 꽃다발. 빛을 비추면 만화경처럼 반짝인다."
