2008504557-DescriptionTh = "สปริงที่ใช้เลื่อนโบลต์ปืน เนื่องจากถูกปล่องทิ้งไว้และไม่ได้รับการดูแล จึงมีสนิมเกาะ ใช้สำหรับเพิ่มประสิทธิภาพอาวุธบางชนิด"
2576602750-NameTh = "หมวกแก๊ป"
2576602750-DescriptionTh = "หมวกแก๊ปสีอ่อนจากแบรนด์ชุดกีฬา <เซอร์วัล> หมวกนี้เป็นที่ชื่นชอบเหล่าคนรักแฟชั่น เพราะใช้แสดงเอกลักษณ์เฉพาะตัวได้ เพียงติดเข็มกลัดแบบต่างๆ"
675971185-NameTh = "หมวกไหมพรม"
675971185-DescriptionTh = "หมวกไหมพรมสำหรับนักเรียนหญิงม.ปลาย แบรนด์อุปกรณ์กลางแจ้ง <มานาซึรุ> แม้จะไม่ค่อยช่วยให้อุ่นนัก แต่ด้วยดีไซน์ที่น่ารักเลยที่เป็นที่นิยม"
2237745495-NameTh = "หมวกบิ๊กบราเธอร์"
2237745495-DescriptionTh = "หมวกใบเล็กที่ประดับด้วยตุ๊กตาบิ๊กบราเธอร์ ตัวการ์ตูนจาก <MOMO FRIENDS> ว่ากันว่าทันทีที่ใส่หมวกนี้ จะรู้สึกถึงสายตาของบิ๊กบราเธอร์ได้"
1699247498-NameTh = "หมวกเบเร่ต์โบว์"
1699247498-DescriptionTh = "หมวกเบเร่ต์โบว์สีขาว หมวกในเครื่องแบบของสถาบันทรีนิตี้ การใช้งานจะยากกว่าที่คิด เพราะจัดทรงหมวกให้พองสวยได้ยาก"
2090555875-NameTh = "หมวกกันกระสุน"
2090555875-DescriptionTh = "หมวกกันกระสุนนี้สามารถกันสิ่งต่างๆ ที่จะพุ่งใส่หัวของเราได้ ปิดผิวภายนอกด้วยวัสดุผ้านุ่ม ทำให้ติดป้ายตกแต่งไว้ได้"
1300177111-NameTh = "หมวกปีกจีบมินิ"
1300177111-DescriptionTh = "หมวกมินิที่ประดับผ้าจีบดูหรูหรา มีกิ๊บติดผมอันเล็กซ่อนอยู่ใต้ปีกหมวก เพื่อช่วยยึดหมวกไว้"
835357934-NameTh = "หมวกบักเก็ต"
835357934-DescriptionTh = "หมวกบักเก็ตที่ใส่แล้วบังใบหน้าครึ่งบน ถ้าใส่มาสก์ด้วยก็สามารถบังใบหน้าได้เกือบหมด จะใส่เพื่อป้องกันรังสี UV ก็ได้นะ"
2831939832-NameTh = "หมวกริบบิ้นใบไม้"
