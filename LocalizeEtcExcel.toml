2182634555-DescriptionTh = "พรมรูปวงกลมสีฟ้าลาย ใช้มันเพิ่มความน่าสนใจ\nให้พื้นที่ที่น่าเบื่อนี้กันเถอะ"
709421533-NameTh = "เก้าอี้พับชายหาด"
709421533-DescriptionTh = "เก้าอี้พับชายหาดสำหรับใช้ในหน้าร้อน กางใช้งานได้ง่ายในทุกที่ที่ต้องการ"
1382111889-NameTh = "อุปกรณ์เซ็ตปิกนิกฤดูร้อน"
1382111889-DescriptionTh = "เซ็ตอุปกรณ์จำเป็นในการปิกนิกฤดูร้อน เที่ยวทะเลไปกับอุปกรณ์เซ็ตนี้กันเถอะ!"
3719220744-NameTh = "ฉากกั้นไม้สีฟ้า"
3719220744-DescriptionTh = "ฉากกั้นทำจากไม้สีฟ้าสวย ใช้แบ่งพื้นที่ได้ตามใจต้องการ!"
3988305191-NameTh = "กระถางต้นไม้สี่เหลี่ยมเรียบ"
3988305191-DescriptionTh = "กระถางต้นไม้สี่เหลี่ยมสีขาวดูเรียบง่าย ใช้มันเพิ่มความน่าสนใจให้พื้นที่น่าเบื่อนี้กันเถอะ"
876499000-NameTh = "กระถางมอนสเตอร่า สีขาว"
876499000-DescriptionTh = "กระถางต้นไม้สีขาว มีต้นมอนสเตอร่าปลูกเอาไว้ มาผ่อนคลายไปกับต้นมอนสเตอร่าใบใหญ่กันเถอะ"
2563132388-NameTh = "กระถางต้นไม้เขตร้อน"
2563132388-DescriptionTh = "กระถางต้นไม้ที่ปลูกต้นไม้เขดร้อนเอาไว้ ตัวช่วยสร้างบรรยากาศแบบรีสอร์ตได้ง่ายๆ"
651287116-NameTh = "โต๊ะพับสไตล์รีสอร์ต"
651287116-DescriptionTh = "โต๊ะพับได้ เหมาะกับการนั่งจิบน้ำมะนาวเย็นๆ ยิ่งได้นั่งเม้าท์กับเพื่อนจะยิ่งออกรส"
3128815143-NameTh = "กรอปรูปต้นไม้เขตร้อน"
3128815143-DescriptionTh = "กรอบรูปภาพต้นไม้เขตร้อน แค่มองรูปนี้ ก็ให้ความรู้สึกผ่อนคลายแบบรีสอร์ต"
3351167430-NameTh = "หน้าต่างตารางทรงสูง"
3351167430-DescriptionTh = "หน้าต่างแบบตารางทรงสูง ลายตารางสีขาวช่วยให้พื้นที่ดูหรูหรายิ่งขึ้น"
1205170109-NameTh = "ร่มเซ็ตปิกนิกชายหาด"
1205170109-DescriptionTh = "ร่มที่ให้คุณผ่อนคลายในฤดูร้อน มาพักผ่อนใต้ร่มนี้กันเถอะ"
2475275466-NameTh = "แอมป์สไตล์เรโทร"
2475275466-DescriptionTh = "แอมป์ขยายเสียงสไตล์เรโทร แอมป์แบบสามชั้น เหมาะสำหรับงานเลี้ยง"
695480964-NameTh = "ประดับผนังต้นไม้เขตร้อน"
695480964-DescriptionTh = "ของตกแต่งผนัง รูปภาพต้นไม้เขตร้อน เพียงตกแต่งด้วยความสดใส\nก็เพิ่มความเก๋ได้เป็นกอง"
2074251803-NameTh = "ป้ายนีออนซัมเมอร์"
2074251803-DescriptionTh = "ป้ายนีออนที่ใช้ตกแต่งในฤดูร้อน ทำให้ดูเก๋ยิ่งขึ้น มาจัดปาร์ตี้กับเพื่อนๆ ด้วยของตกแต่งนี้กันเถอะ!"
2778144709-NameTh = "หน้าต่างกระจก สไตล์รีสอร์ต"
2778144709-DescriptionTh = "หน้าต่างกระจก มาพร้อมวิวรีสอร์ต อิ่มเอมไปกับบรรยากาศหน้าร้อนแสนสดใสกันเถอะ!"
2122161357-NameTh = "พื้นกระเบื้องจุดฟ้า"
2122161357-DescriptionTh = "พื้นกระเบื้องลายจุดรูปเพชร เพิ่มความหรูหราด้วยจุดสีฟ้าบนพื้นเรียบ"
1856343868-NameTh = "โต๊ะของหวานซัมเมอร์"
1856343868-DescriptionTh = "โต๊ะที่มีของหวานๆ วางตกแต่งอย่างสวยงาม มาสนุกกับวันหยุดสุดหรรษากันเถอะ!"
4032042015-NameTh = "สระเซ็ตเล็ก"
4032042015-DescriptionTh = "สระน้ำขนาดเล็ก พร้อมเซ็ตห่วงยาง MOMO FRIENDS มาเล่นน้ำให้สุดเหวี่ยงกับเพื่อนๆ ใน MOMO FRIENDS กันเถอะ!"
3194820480-NameTh = "สระหลากสีขนาดใหญ่"
3194820480-DescriptionTh = "สระน้ำขนาดใหญ่ พร้อมเซ็ตเครื่องเล่น MOMO FRIENDS มาเล่นสนุกสุดเหวี่ยงในฤดูร้อนกันเถอะ!"
2410063963-NameTh = "โซฟาซุ้มสไตล์รีสอร์ต"
2410063963-DescriptionTh = "โซฟาที่ดูนั่งสบาย ตกแต่งด้วยซุ้มสีขาว มานั่งพักผ่อนรับลมเย็นใต้ซุ่มให้สบายกันเถอะ"
3864467629-NameTh = "พื้นหลังลายจุดฤดูร้อนสีฟ้า"
3864467629-DescriptionTh = "พื้นหลังลายจุดสีฟ้า สีฟ้าที่ดูเย็นสบายนี้ จะทำให้ลืมความร้อนในฤดูร้อนไปเลย"
2132874344-NameTh = "ผนังลายคลื่นฤดูร้อน"
2132874344-DescriptionTh = "ผนังตกแต่งลายคลื่น เหมาะกับฤดูร้อนสุดๆ ดูแล้วจะรู้สึกเหมือนอยู่ริมทะเลเย็นสบาย"
1916164563-NameTh = "ชั้นวางของไม้"
1916164563-DescriptionTh = "ชั้นวางของไม้ที่ดี มีพื้นที่ขนาดใหญ่ ใช้วางของที่อยาก\nเอาไว้อวด หรือใช้แอบของที่อยากซ่อนได้"
2266964317-NameTh = "บาร์วางของฟักทอง ฮาโลวีน"
2266964317-DescriptionTh = "บาร์วางของธีมฟักทองฮาโลวีน ใช้สำหรับวางขนม เก็บขนมหวานได้แน่นเอี๊ยด!"
1484358997-NameTh = "พรมใยแมงมุมฮาโลวีน"
1484358997-DescriptionTh = "พรมลายใยแมงมุม ดีไซน์ที่มีเอกลักษณ์นี้ จะทำให้พื้นที่โดดเด่นขึ้น"
2674687968-NameTh = "เก้าอี้เดี่ยวกุ๊กกู๋"
2674687968-DescriptionTh = "เก้าอี้เดี่ยว มีความโดดเด่นด้วยรูปทรงผีกุ๊กกู๋ ดูสะอาดและน่ารัก"
2411796807-NameTh = "เก้าอี้เรียบสีฟักทอง"
2411796807-DescriptionTh = "เก้าอี้ที่มีสีคล้ายฟักทอง เหมาะสำหรับทำให้พื้นที่นั้นโดดเด่น"
885973407-NameTh = "ป้ายโฆษณาผีฮาโลวีน"
885973407-DescriptionTh = "ป้ายโฆษณาแนะนำคาเฟ่ ฟักทองฮาโลวีน มีข้อความว่า ยินดีต้อนรับสู่สถานที่ที่เต็มไปด้วยของหวาน!"
266251822-NameTh = "ฉากกั้นสีผสมฮาโลวีน"
266251822-DescriptionTh = "ฉากกั้นสีผสม ตกแต่งแบบคลื่นไหลเยิ้ม ช่วยทำให้พื้นที่เป็นส่วนตัวมากขึ้น"
3257782787-NameTh = "ชั้นวางฟักทอง ฮาโลวีนสองชั้น"
3257782787-DescriptionTh = "ชั้นวางของ 2 ชั้น ตกแต่งด้วยสินค้าฮาโลวีนต่างๆ ทำให้รู้สึกทั้งน่ารัก และน่ากลัว"
1047918259-NameTh = "โซฟาสองที่นั่งฟักทอง ฮาโลวีน"
1047918259-DescriptionTh = "โซฟาสองที่นั่งที่มีตุ๊กตาฟักทองวางอยู่ ตุ๊กตาบนโซฟาสีขาวยิ่งเพิ่มความน่ากลัว"
3139617157-NameTh = "โต๊ะสีผสมฮาโลวีน"
3139617157-DescriptionTh = "โต๊ะสีผสมที่ตกแต่งแบบคลื่นที่ไหลเยิ้ม ลายคลื่นสร้างเอกลักษณ์ให้กับพื้นที่"
2896513924-NameTh = "ป้ายนีออนฮาโลวีน"
2896513924-DescriptionTh = "ป้ายฮาโลวีนที่มีจุดเด่นที่ใยแมงมุม เหมาะสำหรับใช้สร้างบรรยากาศที่น่ากลัว"
2760823507-NameTh = "ของตกแต่งแท่งเทียน"
2760823507-DescriptionTh = "แท่งเทียนที่มีไฟให้แสงนวลๆ เมื่อติดตั้งที่ผนังจะช่วยสร้างบรรยากาศคลาสสิก"
3362450005-NameTh = "กรอบรูปฮาโลวีนกุ๊กกู๋"
3362450005-DescriptionTh = "กรอบรูปฮาโลวีนที่ให้ความรู้สึกลึกลับ และหลงเข้าใจผิดว่าสบตากับแมวได้"
3490595155-NameTh = "ของตกแต่งฟักทอง ฮาโลวีนซ้อนสาม"
3490595155-DescriptionTh = "ของตกแต่งฟักทองซ้อนกัน 3 ชั้นสุดน่ารัก ฟักทองแต่ละชั้นมีหน้าตาต่างกัน"
2835458887-NameTh = "เตาผิงติดผนังฟักทอง ฮาโลวีน"
2835458887-DescriptionTh = "เตาผิงติดผนัง ตกแต่งด้วยสินค้าฮาโลวีน เห็นอะไรในไฟที่ลุกโชนอยู่นั่นไหม?"
1093179152-NameTh = "พื้นลายเพชรฮาโลวีน"
1093179152-DescriptionTh = "พื้นลายเพชรนี้ เหมาะสำหรับใช้สร้างบรรยากาศฮาโลวีน"
2494992221-NameTh = "โต๊ะของหวานฟักทอง ฮาโลวีน"
2494992221-DescriptionTh = "โต๊ะที่เต็มไปด้วยของหวานจากฟักทอง ถึงหน้าตาจะดูน่ากลัว แต่ที่จริงมันหวานมาก!"
2274493728-NameTh = "หน้าต่างโค้งลายใยแมงมุม"
2274493728-DescriptionTh = "หน้าต่างโค้งที่มีจุดเด่นที่ลายใยแมงมุม อาจมีแขกน่ากลัวมาหาตอนกลางคืนก็ได้"
3112061724-NameTh = "เคาน์เตอร์บาร์ฟักทอง ฮาโลวีน"
3112061724-DescriptionTh = "เคาน์เตอร์บาร์ สำหรับจัดแสดงของหวานฮาโลวีน ของหวานที่ทำจากฟักทองดูหวานมาก"
3160658079-NameTh = "โซนถ่ายภาพฟักทอง ฮาโลวีน"
3160658079-DescriptionTh = "โซนถ่ายภาพที่ให้บรรยากาศฮาโลวีนสุดคูล มาแต่งหน้าถ่ายรูปฮาโลวีนกันเถอะ!"
2012402834-NameTh = "ตุ๊กตาผีทริกออร์ทรีต"
2012402834-DescriptionTh = "ตุ๊กตาผีที่เป็นมาสคอตของคาเฟ่ ฟักทองฮาโลวีน มาสคอตใจดีที่จะแจกลูกโป่ง และลูกกวาด!"
3121682605-NameTh = "ของตกแต่งผนังแฮปปี้ฮาโลวีน"
3121682605-DescriptionTh = "ของตกแต่งผนังขนาดใหญ่ ประดับด้วยตัวละครฮาโลวีน และแสงไฟ มาปาร์ตี้ฮาโลวีน ให้สนุกสุดเหวี่ยงกันเถอะ!"
3727844322-NameTh = "ผนังคลื่นใยแมงมุมฮาโลวีน"
3727844322-DescriptionTh = "ผนังที่มีจุดเด่นตรงคลื่นที่ไหลเยิ้ม ให้บรรยากาศของคืนฮาโลวีนมากยิ่งขึ้น"
2825070418-NameTh = "พื้นหลังคืนฮาโลวีน"
2825070418-DescriptionTh = "พื้นหลังที่ให้บรรยากาศฮาโลวีนลึกลับ มาสนุกกับคืนฮาโลวีนกันเถอะ!"
261974710-NameTh = "พรมเรียบสีน้ำเงิน"
261974710-DescriptionTh = "พรมเรียบสีน้ำเงิน ทั้งสีและรูปร่าง\nเข้ากับทุกพื้นที่ได้เป็นอย่างดี"
1063080956-NameTh = "เก้าอี้นั่งพื้นลายคลื่น"
1063080956-DescriptionTh = "เก้าอี้นั่งพื้นที่มีเบาะนุ่มๆ ลายคลื่น มันนุ่มมาก แม้จะนั่งมาเป็นเวลานานแต่ขาก็จะไม่เจ็บ"
2401185643-NameTh = "ชั้นวางของแคพิบารา ออนเซ็น"
2401185643-DescriptionTh = "ชั้นวางของ ตกแต่งด้วยตุ๊กตาแคพิบารา ออนเซ็น เพลิดเพลินไปกับความน่ารัก\nของแคพิบาราออนเซ็นได้เลย!"
2027732261-NameTh = "กาชาแคพิบารา ออนเซ็น"
2027732261-DescriptionTh = "กาชาที่สุ่มรับสินค้าแคพิบารา ออนเซ็นแบบต่างๆ ลองหมุนสักทีจะติดใจจนหยุดไม่ได้!"
322190320-NameTh = "โคมไฟไม้ลายออนเซ็น"
322190320-DescriptionTh = "โคมไฟไม้ที่มีรูปวาดออนเซ็น ทำให้พื้นที่เรียบๆ ให้ความรู้สึกแบบดั้งเดิมได้เต็มเปี่ยม!"
905741361-NameTh = "โคมไฟไม้ลายพัด"
905741361-DescriptionTh = "โคมไฟไม้ทรงสี่เหลี่ยมที่มีจุดเด่นที่ลายพัด ส่องแสงให้พื้นที่มืดสว่างขึ้น"
2880342603-NameTh = "ที่ตั้งนิตยสารเหล็ก"
2880342603-DescriptionTh = "ที่ตั้งนิตยสารเหล็ก มีนิตยสารหลากหลายประเภท แวะมาดูกันได้ในตอนที่ว่าง หรือเบื่อหน่าย"
2996234640-NameTh = "ฉากกั้นไม้ดั้งเดิม"
2996234640-DescriptionTh = "ฉากกั้นที่ทำจากไม้ สำหรับใช้แยกพื้นที่กว้าง"
3961267217-NameTh = "ฉากประตูไม้ดั้งเดิม"
3961267217-DescriptionTh = "ฉากประตูที่ทำจากไม้ สามารถย้ายไปมาระหว่างพื้นที่\nที่กั้นไว้อย่างง่ายดาย"
18051444-NameTh = "กระถางต้นไผ่สี่เหลี่ยม"
18051444-DescriptionTh = "กระถางทรงสี่เหลี่ยม มีต้นไผ่ปลูกเอาไว้ ความตั้งตรงของต้นไผ่นี้ทำให้พื้นที่ดูน่าสนใจยิ่งขึ้น"
3537832744-NameTh = "ป้ายผ้าแคพิบารา ออนเซ็น"
3537832744-DescriptionTh = "ป้ายผ้าพิมพ์ลายกราฟิกแคพิบารา ออนเซ็น แคพิบาราลายหัวใจน่ารักสุดๆ เลย"
2721565610-NameTh = "ชั้นวางของอุปกรณ์ออนเซ็น"
2721565610-DescriptionTh = "ชั้นวางของจัดเก็บอุปกรณ์ออนเซ็น สิ่งที่ต้องนำติดตัวก่อนเข้าไปออนเซ็น!"
582850008-NameTh = "โต๊ะแจกันดอกซากุระ"
582850008-DescriptionTh = "โต๊ะขนาดเล็กสำหรับวางแจกันดอกซากุระ เพิ่มความสดใสให้พื้นที่เรียบๆ ด้วยสีชมพู"
3973510283-NameTh = "หน้าต่างลายตารางไม้ดั้งเดิม"
3973510283-DescriptionTh = "หน้าต่างลายตาราง สร้างด้วยวิธีดั้งเดิม ใช้ในพื้นที่บรรยากาศดั้งเดิม"
334079646-NameTh = "เก้าอี้นวดรักษาขั้นสูง"
334079646-DescriptionTh = "เก้าอี้นวดขั้นสูง ช่วยคลายความเหนื่อยล้า มีตำนานว่าเมื่อได้นั่งสักครั้งจะไม่สามารถลุกขึ้นได้"
3798603167-NameTh = "โต๊ะนั่งพื้นเซ็ตชงชา"
3798603167-DescriptionTh = "โต๊ะนั่งพื้นที่ให้คุณได้อร่อยกับชา และของหวาน ใช้จัดระเบียบจิตใจไปพร้อมๆ กับจิบชาอย่างเงียบสงบ"
3459590836-NameTh = "พื้นเสื่อทาทามิดั้งเดิม"
3459590836-DescriptionTh = "พื้นเสื่อทาทามิ สร้างด้วยวิธีดั้งเดิม ช่วยเปลี่ยนอากาศที่ร้อนอบอ้าวให้เย็นสดชื่นขึ้น"
2718427248-NameTh = "ตู้อุ่นเครื่องดื่มไฟฟ้า"
2718427248-DescriptionTh = "ตู้ทำความร้อนไฟฟ้า ช่วยอุ่นเครื่องดื่มให้ร้อนอยู่เสมอ\nแค่มีตู้นี้ ไม่ว่าจะหนาวแค่ไหนก็ไม่กลัว!"
4134416493-NameTh = "ผนังลายตาราง พร้อมหลังคาดั้งเดิม"
4134416493-DescriptionTh = "ผนังลายตารางที่ประดับหลังคา และทำจากไม้ ช่วยสร้างความสงบให้พื้นที่ได้"
2955856831-NameTh = "อ่างอาบน้ำรักษาไม้ฮิโนกิ"
2955856831-DescriptionTh = "อ่างอาบน้ำที่สร้างจากไม้ฮิโนกิ แช่ในออนเซ็นที่มีน้ำร้อนๆ กลิ่นหอมไม้ฮิโนกิกันเถอะ!"
2890230456-NameTh = "พื้นหลังไล่สีลายเกล็ดหิมะ"
2890230456-DescriptionTh = "พื้นหลังไล่สีลายเกล็ดหิมะ ให้บรรยากาศฤดูหนาว แม้ว่าจะดูหนาว แต่ก็ให้ความรู้สึกอบอุ่น"
2725409580-NameTh = "เก้าอี้ไม้"
2725409580-DescriptionTh = "เก้าอี้ไม้ที่ขัดผิวมาอย่างดี มีความทนทานต่อความชื้น\nและมลภาวะ สามารถใช้งานได้นาน"
2672820625-NameTh = "เบาะรองนั่งลายดั้งเดิม"
2672820625-DescriptionTh = "เบาะรองนั่งพื้นแบบลายดั้งเดิม เนื้อผ้าที่ดูหรูหรา ยิ่งขับความงดงามของปีใหม่"
559929639-NameTh = "ร่มตกแต่งลายดั้งเดิม"
559929639-DescriptionTh = "ร่มตกแต่งที่มีภาพวาดลายดั้งเดิม ทำให้ที่เรียบๆ มีจุดเด่นด้วยสีสันสดใสนี้"
4169048233-NameTh = "โคมไฟไม้ทรงกลมปีใหม่"
4169048233-DescriptionTh = "โคมไฟไม้ทรงกลม มีโครงสร้างแบบดั้งเดิม ให้แสงคล้ายจันทร์เพ็ญคืนเดือนมืด"
4132019214-NameTh = "โอบิกิโมโนแขวนผนัง"
4132019214-DescriptionTh = "โอบิกิโมโนแขวนผนังที่ดึงดูดสายตา ด้วยสีสันที่สวยงาม เพิ่มบรรยากาศหรูหรา และสง่างามให้กับพื้นที่"
865507405-NameTh = "ฉากกั้นปีใหม่หลากสี"
865507405-DescriptionTh = "ฉากกั้นหลากสีสันใช้ในปีใหม่ มาสร้างพื้นที่ในแบบที่ต้องการด้วยฉากกั้นนี้กันเถอะ!"
912542863-NameTh = "หน้าต่างบาน ลายตารางดั้งเดิม"
912542863-DescriptionTh = "หน้าต่างบานเปิดปิด สร้างด้วยวิธีดั้งเดิม เพียงมีหน้าต่างลายตารางนี้ ก็สร้างบรรยากาศแบบดั้งเดิมได้!"
3281141254-NameTh = "เตาน้ำมันกับโมจิ"
3281141254-DescriptionTh = "โมจิกับเตาน้ำมัน ช่วยให้ความอบอุ่นในพื้นที่ ย่างโมจิอุ่นๆ ให้ขึ้นฟู แล้วมาแบ่งกันกินเถอะ!"
3619410636-NameTh = "โต๊ะเคนดามะปีใหม่"
3619410636-DescriptionTh = "โต๊ะสำหรับใช้วางชุดเคนดามะ มาเล่นเคนดามะในช่วงปีใหม่กันเถอะ!"
4257359360-NameTh = "ที่แขวนกิโมโนผ้าไหม ลายดอกไม้"
4257359360-DescriptionTh = "ที่แขวนกิโมโน สร้างจากไม้คุณภาพสูง\nมีกิโมโนจากผ้าไหมลายดอกไม้แขวนอยู่"
2014277693-NameTh = "โต๊ะชุดอาหารปีใหม่"
2014277693-DescriptionTh = "โต๊ะที่มีอาหารปีใหม่วางไว้เต็มโต๊ะ ต้อนรับปีใหม่ด้วยอาหารอร่อยๆ กันเถอะ!"
2021964788-NameTh = "พื้นเสื่อทาทามิเรียงสลับ"
2021964788-DescriptionTh = "พื้นเสื่อทาทามิที่ถูกเรียงแบบสลับ จัดวางเสื่อทาทามิแบบสลับเพื่อเพิ่มลูกเล่นให้กับพื้นที่"
1058759786-NameTh = "โต๊ะชุดวาดเขียนปีใหม่"
1058759786-DescriptionTh = "โต๊ะสำหรับใช้วางชุดวาดเขียน มาเขียนปณิธานในปีนี้กันเถอะ!"
2750168500-NameTh = "ผนังตกแต่งแผ่นทองคำ ปีใหม่"
2750168500-DescriptionTh = "ผนังแบบดั้งเดิม ตกแต่งด้วยแผ่นทองคำ ของตกแต่งสีทองหรูหรา และสีที่เลือกมาอย่างลงตัว ทำให้พื้นที่ดูสง่างามยิ่งขึ้น"
809156626-NameTh = "โต๊ะโคทัตสึพักผ่อนปีใหม่"
809156626-DescriptionTh = "โต๊ะโคทัตสึอุ่นๆ นี้จะทำให้คุณได้พักผ่อนสบายๆ ถ้าได้เข้าไปในโต๊ะโคทัตสึอาจผล็อยหลับได้เลย!"
3475231401-NameTh = "พื้นหลังลายดั้งเดิมปีใหม่"
3475231401-DescriptionTh = "พื้นหลังลายดั้งเดิม มีสีสันสำหรับใช้ในปีใหม่ คลื่นหลากสีบนพื้นหลังให้ความรู้สึกหรูหรา"
1135136904-NameTh = "เก้าอี้เสริมไม้"
1135136904-DescriptionTh = "เก้าอี้เสริมแบบเรียบ หากขันสกรูให้แน่น\nจะยิ่งใช้ได้อย่างปลอดภัยขึ้น"
131630372-NameTh = "กล่องเก็บกระสุนทหาร"
131630372-DescriptionTh = "กล่องเก็บกระสุนและอาวุธหลายชนิด เป็นไอเทมจำเป็นต่อการฝึกทหาร"
2428867451-NameTh = "พรมสี่เหลี่ยมจัตุรัส ลายพิเศษ"
2428867451-DescriptionTh = "พรมสี่เหลี่ยมจัตุรัสพิมพ์ลายพิเศษ มีผิวสัมผัสนุ่มสบาย"
956313554-NameTh = "พรมสี่เหลี่ยมผืนผ้า ลายพิเศษ"
956313554-DescriptionTh = "พรมสี่เหลี่ยมผืนผ้าพิมพ์ลายพิเศษ ทำให้พื้นที่นั้นเด่นขึ้นมาได้"
883245586-NameTh = "เก้าอี้แคมป์พับได้ สีเขียว"
883245586-DescriptionTh = "เก้าอี้แคมป์พับได้สีเขียวที่มีใบไม้เป็นจุดเด่น มีความทนทาน เหมาะกับการใช้กลางแจ้งเป็นเวลานาน"
4054292983-NameTh = "เก้าอี้แคมป์พับได้ สีเหลือง"
4054292983-DescriptionTh = "เก้าอี้แคมป์พับได้สีเหลืองสะดุดตา ผลิตจากอลูมิเนียมที่มีความแข็งแรงสูง ทั้งน้ำหนักเบาและมีความทนทานมาก"
3114421539-NameTh = "เก้าอี้แคมป์พับได้ สีชมพู"
3114421539-DescriptionTh = "เก้าอี้แคมป์พับได้สีชมพูดึงสะดุดตา พับเก็บได้ง่าย สะดวกต่อการพกพา และจัดเก็บ"
1357702247-NameTh = "เก้าอี้แคมป์พับได้ สีฟ้า"
1357702247-DescriptionTh = "เก้าอี้แคมป์พับได้สีฟ้าสะดุดตา ผลิตจากวัสดุที่ทนต่อมลภาวะ เหมาะกับการใช้งานกลางแจ้ง"
3188287550-NameTh = "ฉากกั้นทหาร"
3188287550-DescriptionTh = "ฉากกั้นที่ทำจากวัสดุทนทานต่อมลภาวะ ใช้แบ่งพื้นที่กว้างได้ในรูปแบบที่ต้องการ"
817437883-NameTh = "โต๊ะอาหารเรียบง่ายแบบพับได้"
817437883-DescriptionTh = "โต๊ะอาหารเรียบง่ายแบบพับได้สีฟ้า ใช้งานสะดวก สามารถจัดวางอย่างง่ายดาย ได้ในสถานที่ที่ต้องการ"
3854437007-NameTh = "โต๊ะเซ็ตอาหารมื้อสาย"
3854437007-DescriptionTh = "โต๊ะเซ็ตอาหารมื้อสาย มีแซนด์วิชและของตกแต่งอบอุ่น พร้อมให้คุณอร่อยไปกับมื้อที่ชวนฝัน"
849759719-NameTh = "เก้าอี้พับได้ลายพิเศษ"
849759719-DescriptionTh = "เก้าอี้พับได้ลายพิเศษขนาดกะทัดรัด สามารถวางเพื่อทำให้พื้นที่เรียบๆ สะดุดตาขึ้นมาได้"
1263032379-NameTh = "ตู้เก็บอาหารฉุกเฉินของทหาร"
1263032379-DescriptionTh = "ตู้เก็บอาหารฉุกเฉิน ทำมาจากวัสดุที่แข็งแรง ไอเทมสำหรับการทำกิจกรรมกลางแจ้ง"
950494687-NameTh = "เตียงสนามทหาร 2 ชั้น"
950494687-DescriptionTh = "เตียงสนาม 2 ชั้น ทำมาจากวัสดุที่ทนต่อมลภาวะ ให้คุณนอนหลับเต็มตื่น แม้อยู่กลางแจ้งที่ไม่สะดวกสบาย"
3786466012-NameTh = "พื้นไม้แคมป์สำเร็จรูป"
3786466012-DescriptionTh = "พื้นสำเร็จรูปที่ทำจากไม้ ให้คุณเพลิดเพลินไปกับการตั้งแคมป์บนพื้นหญ้า"
52695003-NameTh = "ผนังเต็นท์ค่ายทหาร"
52695003-DescriptionTh = "ผนังด้านในเต็นท์ค่ายทหาร ผลิตจากวัสดุที่กันความหนาว ทำให้ด้านในของเต็นท์อบอุ่น"
401193572-NameTh = "พื้นหลังลายต้นไม้ค่ายทหาร"
401193572-DescriptionTh = "พื้นหลังลายต้นไม้สีเขียว สื่ออารมณ์ถึงผืนป่า ให้ความรู้สึกสดชื่นของป่าทึบ"
525384229-NameTh = "เตาปิ้งย่างออกค่าย "
525384229-DescriptionTh = "เตาฟืนที่เต็มไปด้วยอาหารปิ้งๆ ย่างๆ แสนอร่อย เสริมบรรยากาศชวนฝันในการออกค่าย"
114581457-NameTh = "ทางเข้าเต็นท์ค่ายทหาร"
114581457-DescriptionTh = "ทางเข้าเต็นท์ขนาดใหญ่ ให้คุณเพลิดเพลินกับทิวทัศน์\nของป่าทึบได้จากในเต็นท์"
2528694280-NameTh = "โต๊ะทำอาหารแบบประกอบ"
2528694280-DescriptionTh = "โต๊ะทำอาหารแบบประกอบ มีพื้นที่เก็บของอเนกประสงค์ ให้คุณใช้พื้นที่ในการออกค่าย ได้อย่างมีประสิทธิภาพ"
3464440835-NameTh = "ที่ตั้งปืนไม้ทหาร"
3464440835-DescriptionTh = "ที่ตั้งปืนที่ทำจากไม้ ทำจากวัสดุที่แข็งแรง และทนทาน"
1200678821-NameTh = "โต๊ะข้างไม้"
1200678821-DescriptionTh = "โต๊ะข้างที่ใช้เก็บของขนาดเล็กได้เป็นอย่างดี\nลิ้นชักทำให้โต๊ะนี้มีระเบียบยิ่งขึ้น"
3588838649-NameTh = "เก้าอี้สีขาวริมหาด"
3588838649-DescriptionTh = "เก้าอี้สีขาวที่จะทำให้ฤดูร้อนเย็นขึ้น มานั่งพักสักครู่ แล้วเพลิดเพลินไปกับทิวทัศน์ของทะเล"
3397039462-NameTh = "เบาะปูพื้นคูลลิ่งริมหาด"
3397039462-DescriptionTh = "เบาะปูพื้นนุ่นๆ ที่มากับสีสันเย็นสบาย ช่วยคลายความร้อนของทะเลได้"
2491732701-NameTh = "ฉากกั้นเบสิกสีขาว"
2491732701-DescriptionTh = "ฉากกั้นเบสิกสีขาว มีการไล่สีได้อย่างน่าประทับใจ ใช้แบ่งพื้นที่ได้อย่างมีประสิทธิภาพ"
570546005-NameTh = "ฉากกั้นไม้สีขาว"
570546005-DescriptionTh = "ฉากกั้นสีขาวที่ไม้ดูดีกว่าของจริง มีประโยชน์ในการแบ่งพื้นที่ใช้สอย"
4082006081-NameTh = "ตู้เครื่องดื่มเย็นฉ่ำ"
4082006081-DescriptionTh = "ตู้กดน้ำที่เต็มไปด้วยเครื่องดื่มเย็นฉ่ำ ช่วยเพิ่มความเย็นให้ฤดูร้อนได้ชั่วคราว"
3849908170-NameTh = "โต๊ะสีขาวริมหาด"
3849908170-DescriptionTh = "โต๊ะริมหาดสีขาวสะอาดตา วางเพิ่มความสดชื่นให้กับพื้นที่ได้"
2855869096-NameTh = "โต๊ะสนามไม้"
2855869096-DescriptionTh = "โต๊ะสนามที่ทำมาจากไม้ เหมาะกับใช้งานในพื้นที่กว้าง"
892679216-NameTh = "บาร์ผลไม้เย็นใจ"
892679216-DescriptionTh = "โต๊ะไม้ที่เต็มไปด้วยเครื่องดื่มเย็นๆ มาคลายความร้อน ด้วยผลไม้เย็นชื่นใจกันเถอะ"
295238722-NameTh = "ของแต่งผนังผลไม้เย็นใจ"
295238722-DescriptionTh = "โปสเตอร์ผลไม้เย็นใจ มีการจัดวางสีได้แตกต่างอย่างลงตัว จะแขวนไว้ที่ไหนก็ดึงดูดสายตาได้"
2570970628-NameTh = "ป้ายระลอกคลื่น"
2570970628-DescriptionTh = "ป้ายที่วาดระลอกคลื่นไว้อย่างสวยงาม ช่วยเพิ่มความสดชื่นของทะเล"
2575575829-NameTh = "พัดลมริมหาด"
2575575829-DescriptionTh = "พัดลมเรียกลมเย็นริมหาด แค่พกไว้ ก็เย็นใจไปทุกที่"
260275561-NameTh = "เสื้อชูชีพหลากสีริมหาด"
260275561-DescriptionTh = "เสื้อชูชีพหลากสีที่เด่นสะดุดตา หนึ่งในไอเทมจำเป็นเมื่อไปเที่ยวทะเล"
2956803246-NameTh = "โต๊ะริมหาดขาว ร่มสีเลมอน"
2956803246-DescriptionTh = "โต๊ะสีขาวที่มาพร้อมกับร่มบังแดดมะนาว ช่วยเปลี่ยนแดดจ้าในฤดูร้อน ให้เป็นแสงที่อบอุ่น"
2202760015-NameTh = "พื้นไม้ริมหาด"
2202760015-DescriptionTh = "พื้นไม้ในธีมริมหาด ลายไม้ที่เรียงอย่างประณีต ช่วยให้ความรู้สึกมั่นคง"
832214886-NameTh = "ผนังสีขาวริมหาด"
832214886-DescriptionTh = "ผนังสีขาว มีความโดดเด่นที่ไม้ สีสันสดใสนี้จะช่วยให้พื้นที่มีชีวิตชีวาขึ้น"
2378301844-NameTh = "หน้าต่างโอเชียนวิว ริมหาด"
2378301844-DescriptionTh = "หน้าต่างโอเชียนวิว มองเห็นทะเลทอดยาวได้ ทำให้พื้นที่ที่แคบๆ ดูโล่งและกว้างขึ้น"
1707494079-NameTh = "พื้นหลังริมหาด"
1707494079-DescriptionTh = "พื้นหลังริมหาดที่ทำให้รู้สึกถึงความเย็น และความอบอุ่นของทะเล ใครเห็นก็อยากกระโดดลงไปในความเย็นนั้น"
428856018-NameTh = "ตู้ไอศกรีมชิล & คูล  "
428856018-DescriptionTh = "ตู้ไอศกรีมที่อัดแน่นไปด้วยไอศกรีมหวานๆ สดชื่น ถ้ากินครั้งเดียวหมดตู้ก็อาจจะท้องเสียได้...?"
2761713126-NameTh = "บาร์เครื่องดื่มหลากสี"
2761713126-DescriptionTh = "บาร์เครื่องดื่มผลไม้รสชาติดีสีสันโดนใจ มีเครื่องดื่มหลากสี และมีหลายรสชาติให้ได้ลิ้มลอง"
3944148940-NameTh = "บิงซูบาร์หวานชื่นใจ"
3944148940-DescriptionTh = "โต๊ะบิงซูที่ทำบิงซูกินได้ทุกที่ทุกเวลา ความอบอ้าวของฤดูร้อนจะหายไป เพียงแค่ได้กินบิงซู!"
2324881054-NameTh = "ระเบียงโอเชียนวิว ริมหาด"
2324881054-DescriptionTh = "ระเบียงโอเชียนวิวที่เห็นทะเลทอดยาว มาพร้อมกับกลิ่นหอมของทะเล ได้ความสดชื่นในช่วงกลางฤดูร้อน "
4139475234-NameTh = "ห่วงยางริมหาด"
4139475234-DescriptionTh = "ห่วงยางสูบลมที่น่ารักน่าเอ็นดู ถ้าไม่กล้าลงทะเล ก็แค่ใส่ห่วงยางนี้ไว้!"
2633292506-NameTh = "เซ็ตคาเฟ่ MOMO FRIENDS"
2633292506-DescriptionTh = "เซ็ตคาเฟ่ MOMO FRIENDS ที่ให้คุณได้อร่อยกับกาแฟและของหวานรสเลิศ มานั่งพักผ่อนไปกับ MOMO FRIENDS กันสิ"
2130797913-NameTh = "เซ็ตเกมเจลลี่"
2130797913-DescriptionTh = "เซ็ตเกมเจลลี่แบบเรโทรที่มีเอกลักษณ์เฉพาะตัว มีตั้งแต่เกมเก่าแก่จนถึงเกมใหม่ล่าสุด เล่นเกมจุกๆ ไปเลย!"
2700178132-NameTh = "เซ็ตวาเลนไทน์"
2700178132-DescriptionTh = "เซ็ตร้านช็อกโกแลตในวาเลนไทน์ที่อัดแน่นด้วยขนมแสนหวาน ขอให้เป็นวันสุดโรแมนติกที่พาใจเต้นแรงดูสิ!"
1112765859-NameTh = "เซ็ตปาร์ตี้ริมสระรีสอร์ตฤดูร้อน"
1112765859-DescriptionTh = "เซ็ตปาร์ตี้ริมสระสไตล์รีสอร์ต ที่จะทำให้คุณพักผ่อนในฤดูร้อนได้อย่างเต็มที่ มาสนุกกับปาร์ตี้แสนหวาน และสดชื่นกับเพื่อนๆ ได้ที่นี่เลย!"
2295911688-NameTh = "เซ็ตคาเฟ่ฟักทอง ฮาโลวีน"
2295911688-DescriptionTh = "คาเฟ่ฟักทองฮาโลวีน สถานที่เกิดเหตุการณ์ลึกลับ! สนุกไปกับฟักทองน่ากลัว และฮาโลวีนสยองได้เลย!"
2218356853-NameTh = "เซ็ตออนเซ็นดั้งเดิม"
2218356853-DescriptionTh = "ออนเซ็นแบบดั้งเดิมที่อบอุ่นแม้ในฤดูหนาว เชิญปล่อยตัวปล่อยใจพักผ่อนกับน้ำอุ่นๆ ในออนเซ็นได้เลยค่ะ!"
1880396630-NameTh = "เซ็ตแต่งบ้านปีใหม่"
1880396630-DescriptionTh = "โต๊ะแต่งบ้านปีใหม่ที่พาคุณผ่านปีใหม่นี้ไปอย่างมีความสุข ต้อนรับปีใหม่แสนสุขกับเพื่อนของคุณได้เลย!"
660700768-NameTh = "เซ็ตค่ายทหาร"
660700768-DescriptionTh = "ค่ายทหารที่เต็มไปด้วยความตื่นเต้นและวุ่นวายใจ ไปจัดวางเฟอร์นิเจอร์ในเต็นท์ที่อบอุ่นและสบายกันเลย!"
1334657209-NameTh = "เซ็ตริมหาด"
1334657209-DescriptionTh = "เซ็ตริมหาดที่ทำให้คุณสัมผัสกับทะเลที่เย็นสบาย ถึงเวลาเพลิดเพลินกับฤดูร้อนด้วยไอศกรีม และผลไม้สดชื่นๆ แล้ว!"
3711274552-NameTh = "เซ็ตงานแข่งขันกีฬา"
3711274552-DescriptionTh = "เฟอร์นิเจอร์ในงานแข่งขันกีฬา ให้บรรยากาศของการแข่งขัน มาเข้าร่วมการแข่งขันแสนสนุกไปกับเพื่อนๆ สิ!"
4141233484-NameTh = "เซ็ตห้องเรียนอะบิดอส"
4141233484-DescriptionTh = "เซ็ตห้องเรียนอะบิดอสที่เต็มไปด้วยช่วงเวลาแห่งความสุข สุดตื่นเต้นระหว่างคุณครูกับนักเรียน มาสร้างความทรงจำกับนักเรียนด้วยกันเถอะ!"
1464352390-NameTh = "เซ็ตชมรมพัฒนาเกม"
1464352390-DescriptionTh = "เซ็ตห้องชมรมพัฒนาเกมที่เต็มไปด้วยช่วงเวลาแห่งความพยายามและมุ่งมั่น มาสร้างเกมที่สนุกไปด้วยกันเถอะ! "
1586097976-NameTh = "เซ็ตรีสอร์ตซันไชน์"
1586097976-DescriptionTh = "เปิดรับแสงแดด! เซ็ตรีสอร์ตซันไชน์ที่ให้ความรู้สึกสบายสดชื่น เชิญดื่มด่ำกับของหวานและกลิ่นดอกไม้แสนหวานได้เลย!"
3493255660-NameTh = "เซ็ตช็อปปิ้งมอลล์"
3493255660-DescriptionTh = "พบกับสินค้าต่างๆ มากมาย ตั้งแต่สินค้าแบรนด์สุดหรู ของตกแต่งต่างๆ และสนามเด็กเล่นสำหรับเด็ก ที่คัดสรรไว้ให้พร้อมสรรพที่ช็อปปิ้งมอลล์แล้ว!"
2112684025-NameTh = "เซ็ตปาร์ตี้เกเฮนน่า"
2112684025-DescriptionTh = "ขอเชิญคุณเข้าสู่งานปาร์ตี้ที่เต็มไปด้วยความโรแมนติกแบบหรูหราและสง่างามของสถาบันเกเฮนน่า"
505605553-NameTh = "เซ็ตห้องเรียนทรีนิตี้"
505605553-DescriptionTh = "เชิญพบกับห้องเรียนในสถาบันทรีนิตี้ที่หรูหรา สง่างามและใช้งานได้จริง!"
2411322223-NameTh = "เซ็ตปาร์ตี้ DJ"
2411322223-DescriptionTh = "ปล่อยกายใจไปกับเพลงสุดเร้าใจ! ยินดีต้อนรับสู่ปาร์ตี้สุดหรูบนชายหาด!"
1028564388-NameTh = "เซ็ตเฮียกคิยาโค"
1028564388-DescriptionTh = "เซ็ตเฮียกคิยาโคที่ให้บรรยากาศที่มีระดับ มาพักผ่อนในห้องที่มีกลิ่นอายของความหลังกันเถอะ"
810452553-NameTh = "เซ็ตเลานจ์ หอคอยมิลเลเนียม"
810452553-DescriptionTh = "เซ็ตเลานจ์ที่ให้บรรยากาศแบบมิลเลเนียมอย่างครบถ้วน ยินดีต้อนรับสู่โรงเรียนวิทยาศาสตร์ล้ำสมัย!"
146666553-NameTh = "เซ็ตรถไฟไฮแลนเดอร์"
146666553-DescriptionTh = "สร้างเฟอร์นิเจอร์ในคาเฟ่ (ธีมรถไฟไฮแลนเดอร์)"
2143457359-NameTh = "เซ็ตสภาน้ำชา"
2143457359-DescriptionTh = "เซ็ตสภาน้ำชาที่ทั้งความสง่างามมีอารยะ รับชาสักแก้วมั้ยคะ?"
421036472-NameTh = "เซ็ตสถาบันไวลด์ฮันต์"
421036472-DescriptionTh = "สถาบันไวลด์ฮันต์เต็มไปด้วยงานศิลปะและแรงบันดาลใจ มาพิจารณาถึงคำจำกัดความของความงามร่วมกันมั้ย?"
2456785767-NameTh = "เซ็ตยานขนส่ง"
2456785767-DescriptionTh = "เซ็ตยานขนส่งที่รวมเทคโนโลยีของมิลเลเนียมเอาไว้ มาชื่นชมนวัตกรรมล้ำสมัยด้วยกันมั้ย?"
