1872991591-NameTh = "อุปกรณ์แอนเทราที่สึก"
1872991591-DescriptionTh = "อุปกรณ์แอนเทราที่เสียหรือใช้งานไม่ได้ ใช้สำหรับอัปเกรดและสร้างไอเทมต่างๆ"
