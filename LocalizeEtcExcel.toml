905741361-DescriptionKr = "부채 문양 나무 장식이 포인트인 사각 무드등. 어두운 공간을 환하게 밝혀준다."
2880342603-NameKr = "철제 잡지 거치대"
2880342603-DescriptionKr = "다양한 장르의 잡지가 거치된 철제 잡지 거치대. 시간이 남거나 심심할 때 구경해보자."
2996234640-NameKr = "전통 목재 파티션"
2996234640-DescriptionKr = "목재로 제작된 파티션. 넓은 공간을 분리하는 용도로 사용할 수 있다."
3961267217-NameKr = "전통 목재 파티션 입구"
3961267217-DescriptionKr = "목재로 제작된 파티션 입구. 분리된 공간 사이를 편하게 이동할 수 있다."
