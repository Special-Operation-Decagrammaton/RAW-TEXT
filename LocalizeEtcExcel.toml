2266964317-NameKr = "할로윈 펌킨 수납 바"
2266964317-DescriptionKr = "사탕이 올려진 할로윈 펌킨 수납 바. 달콤한 사탕을 잔뜩 챙길 수 있다!"
1484358997-NameKr = "할로윈 거미줄 카펫"
1484358997-DescriptionKr = "거미줄 포인트의 카펫. 개성있는 디자인이 공간에 포인트를 준다."
