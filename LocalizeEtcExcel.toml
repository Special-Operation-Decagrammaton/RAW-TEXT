1844419868-NameTw = "保全鑰匙"
1844419868-DescriptionTw = "可開啟保全門或解除鎖定裝置的保全鑰匙。這是不能輕易弄丟的重要物品，之後必須物歸原主才行……當然還得確保不會被發現。不過現在必須先使用它。"
3949011075-NameTw = "USB隨身碟"
3949011075-DescriptionTw = "擁有各種作用的USB隨身碟。過去人們會使用木頭或玉石刻的印章，但現在時代已經變了。"
1153341951-NameTw = "OTP"
1153341951-DescriptionTw = "為堅固的安全系統所製作的特別認證裝置。只要沒有它，即使知道密碼也無法解除安全鎖。當然反過來說，只要有這個的話……"
3426576768-NameTw = "恢復藥"
3426576768-DescriptionTw = "能恢復身體疲勞或輕傷的藥物。無法用於慢性疲勞或重傷。還是以不要受傷為目標吧。"
282905937-NameTw = "剪線鉗"
282905937-DescriptionTw = "可以拆除監視攝影機或地雷等等物品的切割工具。雖然是性能可靠且鋒利的工具，然而過於鋒利造成的快速磨損也導致無法多次使用。請謹慎選擇要拆除的目標。"
2775830511-NameTw = "噪音產生器"
2775830511-DescriptionTw = "為應對作戰中的特殊情況而製作的噪音產生器。當處於劣勢或面臨被發現的危機時，可以將注意力引向其他地方。啟動後務必要往反方向躲避。"
1728300996-NameTw = "低噪音彈"
1728300996-DescriptionTw = "可在無法裝備消音器或效果不足時使用的低噪音彈藥。子彈本身幾乎不會發出聲音，發射與命中產生的熱量也會迅速消失。雖然威力略低於普通彈藥，不過在潛入任務中相當實用。"
3964788977-NameTw = "通訊對講機"
3964788977-DescriptionTw = "據說能突破大多數干擾的高性能對講機。雖然是為潛入作戰而設計，不過由於側重於通訊性能而導致機身稍嫌大而笨重。具備大而簡潔的操作介面，即使不是千年的學生也能輕鬆上手。"
1383315036-NameTw = "精胺酸箱"
1383315036-DescriptionTw = "裝有健康食品的箱子。大小足以讓身材嬌小的人完全躲進去。具備能從裡面觀察外面的小孔，簡直是最佳的潛入道具。"
2125430007-NameTw = "莉央製作的掃描器"
2125430007-DescriptionTw = "可對周圍進行掃描，並找出可疑物品的尖端設備。戴上耳機並移動探測器即可使用。雖然不清楚原理，但性能確實可靠。"
3106820832-NameTw = "打擊用特殊墊片"
3106820832-DescriptionTw = "設計來打擊後腦而非肩膀的特殊墊片。能夠安靜且完整地傳遞衝擊力。"
4092727589-NameTw = "塗有特殊塗料的護膝"
4092727589-DescriptionTw = "能讓使用者以膝蓋在地面滑行，安靜而迅速地移動的特殊護膝。因為沒有特別的附加功能，效果完全取決於使用者的技術和力量。"
3328636483-NameTw = "使用箱子悄悄接近頭盔團"
3328636483-DescriptionTw = "接近頭盔團並偷聽他們的談話吧。\n運用箱子就能在不被發現的情況下靠近。"
2007212476-NameTw = "躲避無人機並穿越保全門"
2007212476-DescriptionTw = "避開守護資料中心的無人機，通過保全門吧。使用恢復藥可恢復體力。"
14774070-NameTw = "躲避無人機並潛入大姐頭房間"
14774070-DescriptionTw = "避開資料中心的保全無人機，潛入大姐頭房間。可藉由莉央的機器狗來保存進度。"
3457439688-NameTw = "尋找並回收危險展品"
3457439688-DescriptionTw = "尋找並回收展示場裡的危險物品吧。使用聖亞攜帶的掃描器就能找到隱藏的物品。"
1369763957-NameTw = "逮捕頭盔團隊長"
1369763957-DescriptionTw = "逮捕在展示場偷竊展品的頭盔團隊長吧。運用特殊橡膠墊便能悄悄將其制伏。"
4069660877-NameTw = "找出遊戲開發部攤位的入侵者"
4069660877-DescriptionTw = "找出入侵遊戲開發部攤位的入侵者吧。相互協助便能突破保全系統。"
4201274762-NameTw = "關閉故障設備的電源"
4201274762-DescriptionTw = "操作配電盤，將出問題的設備電源關閉吧。使用護膝就能在不被發現的情形下迅速移動。"
2555313209-NameTw = "避開堇和頭盔團並逃脫"
2555313209-DescriptionTw = "避開堇和頭盔團，逃出展示場吧。躲在櫃子中可以避免被堇和頭盔團發現。"
3441326232-NameTw = "避開保全系統並逃脫"
3441326232-DescriptionTw = "避開啟動的保全系統，逃出展示場吧。必須迴避危險氣體並迅速逃離。"
2202660611-NameTw = "避開機械鱷魚並逃脫"
2202660611-DescriptionTw = "避開失控的機械鱷魚，逃出展示場吧。可利用自動販賣機降低機械鱷魚的追趕速度。"
