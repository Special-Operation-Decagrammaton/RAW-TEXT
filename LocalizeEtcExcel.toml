3351867875-NameKr = "크로뮴 스프링"
3351867875-DescriptionKr = "총기의 노리쇠를 전진시킬 때 사용되는 스프링. 크로뮴 합금으로 제작되어 튼튼하고 녹이 슬지 않는다. 고유무기 강화에 사용된다."
1382166670-NameKr = "티타늄 스프링"
1382166670-DescriptionKr = "총기의 노리쇠를 전진시킬 때 사용되는 스프링. 티타늄 합금으로 제작되어 더욱 가볍고 견고해졌다. 고유무기 강화에 사용된다."
1229651923-NameKr = "일반 강화석"
1229651923-DescriptionKr = "장비를 강화할 수 있는 신비한 강화석."
1503462181-NameKr = "녹슨 해머"
1503462181-DescriptionKr = "방아쇠를 당겼을 때 공이에 힘을 전달하는 부품. 관리되지 않아 곳곳에 녹이 슬어 있다. 고유무기 강화에 사용된다."
250804865-NameKr = "스포츠용 장갑"
250804865-DescriptionKr = "쉽게 미끄러지지 않도록 울퉁불퉁한 겉감을 안쪽에 덧댄 스포츠용 장갑. 재질에 난연소재가 섞여있어 뜨거운 총신을 만질 때도 안심할 수 있다."
2642735370-NameKr = "니트 벙어리 장갑"
2642735370-DescriptionKr = "아웃도어 브랜드, <마나슬루>에서 여고생들을 겨냥하여 만든 니트 벙어리 장갑. 보온성은 다소 떨어지지만 귀여운 디자인 덕분에 인기가 높다."
1332059101-NameKr = "페로로 오븐 장갑"
1332059101-DescriptionKr = "<모모프렌즈>의 마스코트 캐릭터, 페로로의 디자인을 따 만들어진 흰색의 오븐 장갑. 이 오븐 장갑을 끼면 갑자기 괴상한 댄스를 추고 싶은 욕망에 휩싸이게 된다는 소문이 있다."
1759502696-NameKr = "가죽 글러브"
1759502696-DescriptionKr = "고급 가죽 원단을 사용하여 만들어진 가죽 글러브. 내구도가 그리 높지 않기 때문에 주로 예식용으로 사용된다."
2952456681-NameKr = "택티컬 글러브"
2952456681-DescriptionKr = "방염 소재를 사용하여 튼튼하게 만들어진 택티컬 글러브. 뜨겁게 가열된 총신을 붙잡아도 데일 위험이 없다."
4188994934-NameKr = "레이스 글러브"
4188994934-DescriptionKr = "새틴 소재로 만들어진 고급스러운 디자인의 글러브. 열에는 취약하기 때문에 화기를 취급할 때는 주의."
1332723028-NameKr = "팔 토시"
1332723028-DescriptionKr = "팔 보호와 패션을 동시에 추구하는 학생들을 위한 토시 워머. 계절이 바뀔 때 사용하면 특히 효과적이다."
3739266178-NameKr = "진주 털실 장갑"
3739266178-DescriptionKr = "진주 장식이 달린 털장갑. 손가락 부분은 노출되어 있어서 정교한 작업을 하는 데도 문제없다."
400831532-NameKr = "세일링 글러브"
400831532-DescriptionKr = "손바닥에 안감이 더해진 오픈핑거 글러브 형태의 글러브. 통풍이 잘되는 합성수지로 제작된 이 글러브는 세일링과 같은 선박 작업에 적합하다."
1423638540-NameKr = "슈퍼 글러브"
1423638540-DescriptionKr = "모션 인식 장치가 탑재된 게임용 글러브. 성능은 좋지 않았지만 후대의 게임 개발자들에게 큰 영감을 주었다."
489725691-NameKr = "온전한 해머"
489725691-DescriptionKr = "방아쇠를 당겼을 때 공이에 힘을 전달하는 부품. 온전한 상태로 새것처럼 보존되어 있다. 고유무기 강화에 사용된다."
1275230444-NameKr = "크로뮴 해머"
1275230444-DescriptionKr = "방아쇠를 당겼을 때 공이에 힘을 전달하는 부품. 크로뮴 합금으로 제작되어 튼튼하고 녹이 슬지 않는다. 고유무기 강화에 사용된다."
563331103-NameKr = "티타늄 해머"
563331103-DescriptionKr = "방아쇠를 당겼을 때 공이에 힘을 전달하는 부품. 티타늄 합금으로 제작되어 더욱 가볍고 견고해졌다. 고유무기 강화에 사용된다."
596368071-NameKr = "상급 강화석"
596368071-DescriptionKr = "장비를 강화할 수 있는 신비한 강화석."
3590797977-NameKr = "녹슨 총열"
3590797977-DescriptionKr = "총기에서 탄환을 내보내는 철관 부품. 관리되지 않아 곳곳에 녹이 슬어 있다. 고유무기 강화에 사용된다."
528434676-NameKr = "핑크 스니커즈"
528434676-DescriptionKr = "스포츠웨어 브랜드 <서벌>에서 출시된 핑크색 스니커즈. 푹신한 소재의 밑창을 사용하여 달리기에 적합하다."
4067164356-NameKr = "어그 부츠"
4067164356-DescriptionKr = "아웃도어 브랜드 <마나슬루>의 방한용 장화. 귀여운 디자인에 보온성도 우수해 추운 지방의 여고생들에게 인기가 높다."
3223551422-NameKr = "핑키파카 슬리퍼"
3223551422-DescriptionKr = "<모모프렌즈>의 핑크색 알파카, 핑키파카를 모티브로 만들어진 슬리퍼. 푹신하고 단열성이 뛰어나다."
2109585756-NameKr = "앤티크 에나멜 로퍼"
2109585756-DescriptionKr = "트리니티 학원의 학생들이 착용하는 고급 단화. 에나멜 도료로 마감되어 빛을 받으면 구두코가 반짝거린다."
997278570-NameKr = "전술 부츠"
997278570-DescriptionKr = "발을 보호하기 위해 두껍고 튼튼하게 만들어진 전술 부츠. 굽이 높아 키를 커보이게 하는 효과가 있기 때문에 키가 작은 학생들이 애용한다."
1477837784-NameKr = "펌프스 힐"
1477837784-DescriptionKr = "귀여운 발목 끈이 달린 하이힐. 착용자의 걸음걸이를 우아하게 만들어준다."
134212594-NameKr = "캐주얼 스니커즈"
134212594-DescriptionKr = "깔끔하게 만들어진 스니커즈. 착용감이 가벼워 활동량이 많은 학생에게 선호된다."
2721346391-NameKr = "방수 등산 부츠"
2721346391-DescriptionKr = "천연고무에 방수 코팅을 해서 통기성이 좋고 내구성이 좋은 등산용 부츠. 물에 빠져도 겉면은 젖지 않는다."
1621774808-NameKr = "아쿠아 샌들"
1621774808-DescriptionKr = "물 빠짐이 쉽도록 방수 재질로 만들어진 일체형 샌들. 물기가 많은 곳에서도 쉽게 미끄러지지 않도록 바닥에는 패드가 부착되어 있다."
129848510-NameKr = "게이밍 슬리퍼"
129848510-DescriptionKr = "빨간색, 녹색, 파란색으로 번쩍이는 슬리퍼. 어둠 속에서도 쉽게 찾을 수 있지만, 그것이 게임과 어떤 연관이 있는지는 아무도 모른다."
2753922894-NameKr = "온전한 총열"
2753922894-DescriptionKr = "총기에서 탄환을 내보내는 철관 부품. 온전한 상태로 새것처럼 보존되어 있다. 고유무기 강화에 사용된다."
3047737247-NameKr = "크로뮴 총열"
3047737247-DescriptionKr = "총기에서 탄환을 내보내는 철관 부품. 크로뮴 합금으로 제작되어 튼튼하고 녹이 슬지 않는다. 고유무기 강화에 사용된다."
3465834983-NameKr = "티타늄 총열"
3465834983-DescriptionKr = "총기에서 탄환을 내보내는 철관 부품. 티타늄 합금으로 제작되어 더욱 가볍고 견고해졌다. 고유무기 강화에 사용된다."
2336304110-NameKr = "최상급 강화석"
2336304110-DescriptionKr = "장비를 강화할 수 있는 신비한 강화석."
1498728523-NameKr = "녹슨 공이"
1498728523-DescriptionKr = "탄환의 뇌관을 때려 격발시키는 금속 막대. 관리되지 않아 곳곳에 녹이 슬어 있다. 고유무기 강화에 사용된다."
1750123462-NameKr = "방수 스포츠백"
1750123462-DescriptionKr = "<서벌>에서 제작된 방수 스포츠백. 물에 젖지 않는 소재로 만들어졌기 때문에 강이나 바다에 가져가도 안심할 수 있다."
2248449388-NameKr = "방한용 크로스백"
2248449388-DescriptionKr = "<마나슬루>에서 제작된 방한용 크로스백. 두터운 안감이 덧대어져 있어 도시락이나 음료 등을 식지않게 보온해준다."
4159521152-NameKr = "페로로 백팩"
4159521152-DescriptionKr = "거대한 페로로가 인쇄된 백팩. 수납공간이 넓어 페로로 매니아가 아닌 사람들에게도 큰 인기를 끌고 있다."
940066526-NameKr = "감색 스쿨백"
940066526-DescriptionKr = "트리니티 학원의 교칙에 맞춰 제작된 감색의 스쿨백. 심플하고 고급스러운 디자인 덕분에 다른 학교의 학생들에게도 인기가 높다."
3539400576-NameKr = "전술 란도셀"
3539400576-DescriptionKr = "기능성과 수납성을 강화한 카제야마 사의 특제 란도셀. 부무장을 많이 들고 다니는 학생들에게 호평받고 있다."
4276374506-NameKr = "데빌 윙 토트백"
4276374506-DescriptionKr = "커다란 악마의 날개가 그려진 토트백. 심플한 디자인 덕분에 캐주얼한 복장에도 잘 어울린다."
1637503010-NameKr = "스트릿 백"
1637503010-DescriptionKr = "캐주얼한 분위기에 실용성을 더한 스트릿 백. 특유의 넉넉한 수납공간으로, 선호하는 학생들이 제법 있다."
3101552643-NameKr = "버터플라이 숄더백"
3101552643-DescriptionKr = "커다란 나비가 그려진 숄더백. 가벼운 소재라서 여행을 다닐 때 메고 다녀도 부담이 없다."
3572602524-NameKr = "슬링 드라이 백"
3572602524-DescriptionKr = "한쪽 어깨에 걸어 휴대할 수 있는 슬링백 형태의 가방. 방수 소재로 만들어졌기에 물기에 취약한 전자제품 등을 보관하기에 좋다."
1597212943-NameKr = "메탈 케이스"
1597212943-DescriptionKr = "배터리가 내장된 방탄 합금 재질의 백팩. 소총의 연사 정도는 너끈하게 막아낼 수 있어 전자기기의 보관에 적합하다."
1441450061-NameKr = "온전한 공이"
1441450061-DescriptionKr = "탄환의 뇌관을 때려 격발시키는 금속 막대. 온전한 상태로 새것처럼 보존되어 있다. 고유무기 강화에 사용된다."
1068433115-NameKr = "크로뮴 공이"
1068433115-DescriptionKr = "탄환의 뇌관을 때려 격발시키는 금속 막대. 크로뮴 합금으로 제작되어 튼튼하고 녹이 슬지 않는다. 고유무기 강화에 사용된다."
1300399581-NameKr = "티타늄 공이"
1300399581-DescriptionKr = "탄환의 뇌관을 때려 격발시키는 금속 막대. 티타늄 합금으로 제작되어 더욱 가볍고 견고해졌다. 고유무기 강화에 사용된다."
2140743564-NameKr = "서벌 금속 배지"
2140743564-DescriptionKr = "유명 스포츠 브랜드 <서벌>의 로고가 인쇄된 금속 배지. 튼튼한 금속으로 제작되어 긁힐 걱정이 없다."
1505921304-NameKr = "마나슬루 펠트 배지"
1505921304-DescriptionKr = "아웃도어 전문 브랜드 <마나슬루>의 로고가 인쇄된 펠트 배지. 부드러운 펠트로 제작되어 방한용품과도 안성맞춤."
3033340240-NameKr = "앵그리 아델리 원형 배지"
3033340240-DescriptionKr = "<모모프렌즈>의 앵그리 아델리가 그려진 원형 배지. 오랫동안 쳐다보고 있노라면 어쩐지 기분이 나빠진다……."
344772093-NameKr = "베로니카 자수 배지"
344772093-DescriptionKr = "명품 브랜드 <베로니카>의 로고가 자수로 수놓아진 와펜 배지. 어느 기성품 위에 올려놓더라도 고급스러워 보인다."
2127407973-NameKr = "카제야마 벨크로 패치"
2127407973-DescriptionKr = "밀리터리 전문 브랜드 <카제야마>의 로고가 인쇄된 벨크로 패치. 뒷면의 벨크로를 이용하여 옷에 쉽게 탈부착시킬 수 있다."
3784559011-NameKr = "코코데빌 실버 배지"
3784559011-DescriptionKr = "고스로리 전문 브랜드 <코코데빌>의 로고가 인쇄된 실버 배지. 뒤편의 옷핀을 사용하여 브로치처럼 착용할 수 있다."
589220143-NameKr = "스트릿 배지"
589220143-DescriptionKr = "스트릿 패션 브랜드, <트리플 스텝>에서 출시한 배지. 자사의 이름을 중앙에 크게 인쇄했다는 점에서, 브랜드를 향한 제작사의 자부심을 엿볼 수 있다."
49559053-NameKr = "로렐라이 배지"
49559053-DescriptionKr = "모던 패션 브랜드 <로렐라이>에서 내놓은 드러나는 배지. 단단한 나무에 정교한 수제 가공을 거쳐, 표면이 매끄럽고 좋은 향기가 난다고 한다."
786809132-NameKr = "하르피아 플렉시블 배지"
786809132-DescriptionKr = "해양 스포츠 브랜드 <하르피아>의 로고가 인쇄된 와펜 배지. 부드러운 고무 소재로 제작되어 오염에 강하기 때문에 어느 곳에나 부담 없이 붙여 장식할 수 있다."
2966784212-NameKr = "코인 배지"
2966784212-DescriptionKr = "오락실에서 쓰이던 코인을 모티브로 만들어진 금속 배지. 크기가 제법 크기 때문에 게임기에 넣을 수는 없다. "
1494732916-NameKr = "테니스 헤어밴드"
1494732916-DescriptionKr = "스포츠웨어 브랜드, <서벌>의 테니스 헤어밴드. 운동 중 땀이 흘러내리는 것을 방지할 수 있도록 흡습력이 높은 소재로 만들어졌다."
3940891435-NameKr = "헤어 슈슈"
3940891435-DescriptionKr = "새틴 재질의 탄력성이 좋은 슈슈. 따듯한 국물 음식을 먹을 때는 이 슈슈로 머리를 묶어두는 게 좋다."
3392023658-NameKr = "모모 헤어핀"
3392023658-DescriptionKr = "<모모톡>의 아이콘인 복숭아 모양의 브로치가 달린 헤어핀. 브로치를 문지르면 은은한 복숭아 향이 난다."
2520092463-NameKr = "날개 헤어핀"
2520092463-DescriptionKr = "명품 브랜드 <베로니카>에서 천사의 날개를 모티브로 삼아 제작한 헤어핀. 정작 트리니티의 학생들에게는 인기가 없는 편이다."
765040081-NameKr = "다목적 헤어핀"
765040081-DescriptionKr = "한쪽 끝을 날카롭게 연마하여 유사시에 병따개, 주머니칼 등으로도 활용할 수 있는 다목적 헤어핀. 무심코 머리를 빗다 손을 다칠 수 있으므로 취급에 주의."
277995823-NameKr = "박쥐 헤어핀"
277995823-DescriptionKr = "검은 리본을 닮은 박쥐 모양의 헤어핀. 착용자에게 소악마와 같은 매력을 부여한다."
1353993108-NameKr = "캘리그라피 헤어핀"
1353993108-DescriptionKr = "글자로 만들어진 헤어핀. 단어 자체에 큰 의미가 담겨 있지는 않지만, 패션 피플들의 감성을 자극하기에는 충분하다."
3000997093-NameKr = "나뭇잎 헤어핀"
3000997093-DescriptionKr = "나뭇잎 형태의 헤어핀. 일상생활에서 쓰기에는 조금 튀어 보일 수 있어도, 기념일에 착용하는 것은 생각보다 잘 어울린다고 한다."
1668620571-NameKr = "앵커 헤어핀"
1668620571-DescriptionKr = "두 개의 갈고리가 달린 닻 모양의 헤어핀. 디자인은 예쁘지만, 머리를 묶을 때 갈고리에 머리가 자주 엉켜 실제로 쓰기에는 조금 불편하다고 한다."
3421013348-NameKr = "전자파 차단 헤어핀"
3421013348-DescriptionKr = "전자파를 차단해 주어 뇌 건강 증진에 도움을 주는 헤어핀. 물론 이 효능이 정말일지는 아무도 모른다."
3948898300-NameKr = "교통안전 부적"
3948898300-DescriptionKr = "교통안전을 기원하는 마음을 담아 만든 부적. 흔들어보면 금속제의 무언가가 안에서 짤랑거리는 소리가 난다."
2028861040-NameKr = "발열팩"
2028861040-DescriptionKr = "몇 번 주무르고 흔들면 따듯한 온기를 발산하는 손바닥 크기의 발열팩. 혹한의 환경에서 이보다 더 쓸모있는 부적은 없다."
1207585231-NameKr = "페로로의 깃털"
1207585231-DescriptionKr = "커다랗고 하얀 깃털을 달아 만든 부적. 깃털의 출처는 모모프렌즈의 중대한 영업 기밀이다."
3129277640-NameKr = "십자가"
3129277640-DescriptionKr = "트리니티 학생들이 애용하는 십자가 형태의 부적. 가방에 매다는 액세서리로도 잘 어울린다."
1991164124-NameKr = "카모 달마"
1991164124-DescriptionKr = "위장패턴이 그려진 달마 인형. 어떤 장소에 올려놓아도 자연스럽게 배경에 녹아든다."
237084781-NameKr = "저주 인형"
237084781-DescriptionKr = "미워하는 사람을 생각하며 원념을 담아 만든 저주 인형. 날카로운 바늘을 수납할 수 있어 수예부원들에게 인기가 많다."
3113501019-NameKr = "휴대용 탈취제"
3113501019-DescriptionKr = "기능성 화장품 제조사, <씨사이드>와의 콜라보레이션으로 제작된 휴대용 탈취제. 디자인이 패셔너블하기 때문에 키링에 걸어 액세서리처럼 달고 다니는 학생들도 많다."
3888622253-NameKr = "드림캐쳐"
3888622253-DescriptionKr = "악몽을 잡아준다는 주술적인 의미를 가진 물건이다. 냄새를 맡으면 나무 특유의 좋은 향기가 난다."
4137284716-NameKr = "상어 이빨 부적"
4137284716-DescriptionKr = "날카로운 상어의 이빨을 엮어 만든 부적. 이 부적을 지니고 있으면 해난 사고를 막아준다는 이야기가 있다."
3088246464-NameKr = "키캡 토이"
3088246464-DescriptionKr = "키보드 키캡으로 만든 피젯 토이. 눌러도 아무 일도 벌어지지 않지만, 찰칵거리는 소리가 심신에 안정을 준다."
727987239-NameKr = "방수 디지털 시계"
727987239-DescriptionKr = "스포츠웨어 브랜드 <서벌>에서 제작된 디지털 시계. 방수 사양이기 때문에 수영을 하는 동안 착용하고 있어도 고장날 염려가 없다."
111602846-NameKr = "가죽 손목 시계"
111602846-DescriptionKr = "아웃도어 브랜드 <마나슬루>에서 제작된 가죽 재질의 손목 시계. 가죽으로 마감된 안감이 손목이 차가워지는 것을 방지한다."
2073706703-NameKr = "웨이브캣 손목 시계"
2073706703-DescriptionKr = "<모모프렌즈>의 고양이 캐릭터 웨이브캣이 그려진 손목 시계. 시간에 맞추어 시계 바늘 역할을 하는 웨이브캣의 양팔이 기괴하게 뒤틀린다."
1058159756-NameKr = "앤티크 회중 시계"
1058159756-DescriptionKr = "<베로니카>의 로고가 새겨진 앤티크 풍의 회중 시계. 손목 시계에 비해 시간을 확인하기 불편하다는 단점이 있지만, 패션 아이템으로 인기가 높다."
3773560632-NameKr = "방진 손목 시계"
3773560632-DescriptionKr = "밀리터리 전문 브랜드 <카제야마>에서 제작된 방진 손목 시계. 방진 기능을 강화하여 거친 환경에서도 고장 걱정 없이 사용할 수 있다."
2415212758-NameKr = "고딕풍 손목 시계"
2415212758-DescriptionKr = "복잡한 패턴이 그려진 고딕풍의 손목 시계. 고전적인 옷에도 잘 어울리지만, 시간을 읽기 어렵다는 단점이 있다."
3475264813-NameKr = "스트릿 패션 시계"
3475264813-DescriptionKr = "모던하면서도 귀여운 디자인이 호평인 스트릿 패션 시계. <트리플 스탭>은 여기에 팔찌까지 세트로 묶어 판매하는 전략을 사용하고 있다."
2321708498-NameKr = "로렐라이 손목 시계"
2321708498-DescriptionKr = "모던 패션 브랜드 <로렐라이>에서 내놓은 손목 시계. 나무와 가죽의 조합이 독특한 세련미를 풍긴다."
333016136-NameKr = "다이버 워치"
333016136-DescriptionKr = "해양 스포츠 브랜드 <하르피아>에서 선보인 다이버용 스마트 워치. 방수 기능은 물론이고 깊은 수심에서도 수압 걱정 없이 수중 환경을 체크할 수 있다."
556604040-NameKr = "스크린 워치"
556604040-DescriptionKr = "터치 스크린이 탑재된 시계. 온갖 게임을 포팅해 구동시킬 수 있지만, 성능은 구동에 의의를 둬야 할 수준이다."
1506609692-NameKr = "블루투스 목걸이"
1506609692-DescriptionKr = "착용자의 체온이나 심박수 등을 측정할 수 있는 블루투스 목걸이. 운동량을 쉽게 파악할 수 있기 때문에 다이어트를 시도하는 사람들에게는 필수품처럼 애용된다."
3750431669-NameKr = "눈꽃 펜던트"
3750431669-DescriptionKr = "눈꽃 모양의 장식이 달린 은색의 펜던트. 눈꽃 장식을 오래 쳐다보고 있으면 어쩐지 서늘한 느낌이 든다."
4279598505-NameKr = "니콜라이 로켓"
4279598505-DescriptionKr = "<모모프렌즈>의 캐릭터 Mr.니콜라이의 얼굴이 매달린 로켓. 코 부분을 누르면 사진을 넣을 수 있는 작은 수납 공간이 열린다."
2508370757-NameKr = "십자가 초커"
2508370757-DescriptionKr = "명품 브랜드 <베로니카>에서 출시된 십자가 장식이 달린 초커. 심플하지만 세련된 멋이 담긴 아이템으로 인기가 높다."
1517613390-NameKr = "도그택"
1517613390-DescriptionKr = "학번과 이름이 새겨진 도그택. 자신을 어필할 수 있는 신상 악세사리로 여고생들 사이에서 큰 인기를 끌고 있다."
1964406377-NameKr = "펑크 초커"
1964406377-DescriptionKr = "날카로운 스파이크가 박힌 펑크한 느낌의 초커. 끝이 날카롭기 때문에 목에 차고 나면 고개를 끄덕이기 어렵다."
2501983868-NameKr = "체인 목걸이"
2501983868-DescriptionKr = "사슬로 만들어진 목걸이. 찰랑거리는 소리가 기분 좋게 들리기도 하지만, 감촉이 지나치게 차갑다는 의견도 있다. "
3300639114-NameKr = "그린리프 목걸이"
3300639114-DescriptionKr = "모던 패션 브랜드 <로렐라이>에서 내놓은 목걸이. 이파리가 빛을 받으면 은은한 광택이 난다고 한다."
3366268717-NameKr = "옥토퍼스 홀더"
3366268717-DescriptionKr = "다이버들이 호흡기를 고정하기 위해 사용하는 목걸이 형태의 홀더. <하르피아>의 홀더는 차분한 색과 디자인 덕분에 패션 용도로도 종종 사용되곤 한다."
1125967041-NameKr = "메모리 네클리스"
1125967041-DescriptionKr = "장식물로 위장된 저장장치를 달고 있는 목걸이. 겉보기엔 화려하지만 안에는 어떤 은밀한 것이 담겨 있을지 모른다."
