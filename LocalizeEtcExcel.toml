1967270032-DescriptionKr = "오래된 양피지 조각. 모두 모으면 무언가 하나의 형태로 완성시킬 수 있을 것 같다."
549917402-NameKr = "레몬 열매"
549917402-DescriptionKr = "섬 곳곳에서 자라고 있는 레몬 나무의 열매."
365419572-NameKr = "오래된 열쇠"
365419572-DescriptionKr = "여기저기서 발견되는 낡고 간단한 열쇠. 상자나 캐비닛 등을 열 수 있을 것만 같다."
4133964558-NameKr = "타로 델 루나"
4133964558-DescriptionKr = "특정 장르를 향유하는 팬덤에서 굿즈 목적으로 제작된 타로. 많이 모으면 어떤 게임을 할 수 있다고 한다."
3591040431-NameKr = "잉크 카트리지"
3591040431-DescriptionKr = "잉크를 공급할 때 쓰는 소모품. 묻으면 잘 지워지지 않으므로 조심하도록 하자."
392753185-NameKr = "타블렛 펜"
392753185-DescriptionKr = "진짜 펜과 종이를 사용할 때와 똑같은 사용감을 제공한다고, 설명서에는 쓰여 있다……"
2879419049-NameKr = "온리전 티켓"
2879419049-DescriptionKr = "전시회에 들어가고자 할 때 제시해야 하는 티켓이다. 분실 및 위조에 주의하자."
1382263986-NameKr = "이벤트 포인트"
1382263986-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
56435730-NameKr = "열차 티켓"
56435730-DescriptionKr = "열차에 타기 위해 꼭 필요한 티켓. 그렇다고 여러 장 가지고 있을 필요는 없다."
4181614095-NameKr = "서류 가방"
4181614095-DescriptionKr = "내용물을 튼튼하게 지키고 있는 서류 가방. 안에 든 것이 꼭 서류라는 보장은 없다."
342544352-NameKr = "승무원 호루라기"
342544352-DescriptionKr = "승무원 학생들이 가지고 다니는 호루라기. 소리가 나지 않을 때가 평화로울 때다."
2860754489-NameKr = "설비 부품"
2860754489-DescriptionKr = "밀레니엄 폐허의 설비들을 고치기 위한 부품. 폐허 곳곳에서 구할 수 있으며 모아서 설비를 작동시킬 수 있다."
3572927324-NameKr = "특이한 나사"
3572927324-DescriptionKr = "다소 특이한 형태를 가진 나사. 밀레니엄 폐허의 기기들이 사용하고 있다."
3819866792-NameKr = "이상한 전선"
3819866792-DescriptionKr = "밀레니엄 폐허에서만 발견할 수 있는 특이한 전선. 상태는 양호하다."
374437121-NameKr = "미확인 데이터칩"
374437121-DescriptionKr = "밀레니엄 폐허의 설비들을 해석하기 위한 데이터. 다양한 정보들이 담겨 있다."
2295857575-NameKr = "재무용 계산기"
2295857575-DescriptionKr = "총학생회에서 재무실 한정으로 지원하는 재무용 계산기. 복잡한 수식들을 계산하기 위한 다양한 기능과 함수가 탑재되어 있다."
1808606287-NameKr = "이벤트 포인트"
1808606287-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
3805212638-NameKr = "초합금 캠핑 팩"
3805212638-DescriptionKr = "타프나 텐트를 고정할 때 사용하는 튼튼한 쇠막대. 밀레니엄 학원에서 특수하게 고안된 초합금으로 제작되었기에 쉽게 녹슬거나 파손되지 않는다."
743230010-NameKr = "다용도 로프"
743230010-DescriptionKr = "야외에서 다용한 용도로 사용할 수 있는 고탄성 로프. 밀레니엄 학원에서 개발한 신소재가 포함되었기에 전차도 묶어 버릴 수 있을 만큼 튼튼하다."
2873068026-NameKr = "S&D 카레 파우더"
2873068026-DescriptionKr = "향신료 유통으로 유명한 S&D 사에서 판매 중인 카레 파우더. 특유의 매콤한 감칠맛은 카레 이외의 다른 요리와도 잘 어우러진다. "
3056694695-NameKr = "이벤트 포인트"
3056694695-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
763312064-NameKr = "고급 칵테일 잔"
763312064-DescriptionKr = "달콤한 포도 주스가 담긴 유리 재질의 칵테일 잔. 한 손에 잔을 들고 살짝 흔들어주면 고풍스러운 분위기를 연출할 수 있다."
1635418688-NameKr = "테이블 냅킨"
1635418688-DescriptionKr = "보라색 꽃으로 예쁘게 장식한 테이블 냅킨. 만찬을 즐기기 전 무릎 위에 살포시 덮어두면 음식을 흘려도 문제없다."
1461877186-NameKr = "회중시계"
1461877186-DescriptionKr = "히나 선도부장의 시간은 소중하다. 피아노 연습을 위한 여유 시간을 틈틈이 체크하자."
1549901025-NameKr = "타깃 단서"
1549901025-DescriptionKr = "목표한 타깃에 대한 단서. 일을 진행하는 데에 가장 중요한 것들이다."
3633823236-NameKr = "공연 팸플릿"
3633823236-DescriptionKr = "공연 내용이 간략하게 적혀 있는 팸플릿. 안내 책자는 안내 책자일 뿐, 감동은 직접 체험해야 한다."
3045934720-NameKr = "나비넥타이"
3045934720-DescriptionKr = "고급스러운 장소에서 자주 볼 수 있는 작은 넥타이. 누구나 편하게 쓸 수 있는 구조로 돼 있다."
1268221723-NameKr = "오페라 글라스"
1268221723-DescriptionKr = "멀리서도 공연을 볼 수 있게 해주는 망원경. 쓰지 않아도 될 만큼 가까운 자리라면 더 좋을 것이다."
1224308689-NameKr = "발렌타인 데이 외출권"
1224308689-DescriptionKr = "발렌타인 데이를 맞이하여 순찰 업무로 바쁜 선생님이 학생들과 만나기 위해 필요한 외출권. \n※ 사용하지 않은 외출권은 이벤트 종료 후 400,000 크레딧으로 변환됩니다."
172046152-NameKr = "백귀야행 기념 카드"
172046152-DescriptionKr = "관광지에서 볼 수 있는 기념 플레잉 카드. 많이 모으면 어떤 게임을 플레이할 수 있다는 것 같다."
2693887233-NameKr = "수학여행 안내 계획표"
2693887233-DescriptionKr = "수학여행의 안내 계획을 정리한 서류. 비록 계획이 어그러질지라도, 계획을 세우는 것은 매우 중요하다."
2435927187-NameKr = "가이드 깃발"
2435927187-DescriptionKr = "관광객을 인솔하는 가이드 깃발. 길치인 학생들을 안내하는 데 큰 도움을 준다."
1190740558-NameKr = "특별 쿠폰북"
1190740558-DescriptionKr = "관광지에서 여러 물품으로 교환할 수 있는 쿠폰북. 합리적인 소비는 언제나 중요하다."
3549417253-NameKr = "D-Day 달력"
3549417253-DescriptionKr = "결전의 날까지, 하루하루 넘어가는 달력. 시간은 기다려주지 않는다! "
1553303194-NameKr = "충전용 쿠키"
1553303194-DescriptionKr = "바닥난 체력을 회복시키기 위한 쿠키. 실제로 배가 차지는 않는다."
4287453305-NameKr = "의욕 증진 캔디"
4287453305-DescriptionKr = "떨어진 의욕을 올려주는 캔디. 맛은 랜덤이다."
3117022162-NameKr = "이벤트 포인트"
3117022162-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
1867361376-NameKr = "워터파크 이용권"
1867361376-DescriptionKr = "워터파크 이용객들에게 나눠주는 팔찌. 사물함을 이용하거나 물건을 구매할 수 있다."
1797048856-NameKr = "안전 호루라기"
1797048856-DescriptionKr = "긴급한 상황을 알릴 때 부는 호루라기. 힘껏 불면 날카로운 소리가 난다."
1789692618-NameKr = "투척용 구명환"
1789692618-DescriptionKr = "물에 빠진 사람을 구조할 때 쓰는 구명환. 던지기 전에 로프에 연결하는 것을 잊지 말자."
1024700311-NameKr = "안전 구명조끼"
1024700311-DescriptionKr = "입으면 물에 뜰 수 있는 구명조끼. 몸에 꼭 맞는 것으로 입도록 하자."
457021552-NameKr = "게임 부스 이용권"
457021552-DescriptionKr = "게임 부스에 입장할 수 있는 입장 티켓. 디자인만으로도 도전욕구를 자극한다."
2007696799-NameKr = "헬멧단 총연합회 기념주화"
2007696799-DescriptionKr = "헬멧단 총연합회를 기념하여 발행된 기념주화. 해변에서의 추억을 되새길 수 있다."
2667732249-NameKr = "포장마차 메뉴판"
2667732249-DescriptionKr = "바닷가 포장마차에 구비된 메뉴판. 맛있는 음식이 가득하지만, 가격과 주머니 사정에 주의하자."
3842896816-NameKr = "대회용 물총"
3842896816-DescriptionKr = "헬멧단 물총 대회를 위해 준비된 물총. 물 대신 총알이 나가지만 어쨌든 이름은 물총이다."
3549805305-NameKr = "기념품 인형"
3549805305-DescriptionKr = "어떤 높은 분……의 형상을 따서 만든, 교류회 한정 인형. 소장하고 싶어 하는 학생이 많아, 회수율이 의외로 낮은 모양이다……"
4291250831-NameKr = "소형 차 선물 세트"
4291250831-DescriptionKr = "산해경의 특산 기념품 중 하나인 차 선물 세트. 차를 즐기는 방법은 자유라고 하지만, 산해경에서는 나름의 파벌이 있다는 것 같다……"
2196042750-NameKr = "육화각 모형"
2196042750-DescriptionKr = "현룡문이 말하길, 산해경의 진수를 이미지화한 기념품. 적당한 곳에 장식하면, 나름의 멋이 있을지도 모른다."
3379690606-NameKr = "행운의 열쇠고리"
3379690606-DescriptionKr = "초롱 모양으로 만들어진 열쇠고리. 행운을 바라는 마음이 담겨 있다."
1441156605-NameKr = "월영제 상품권"
1441156605-DescriptionKr = "월영제에서만 유통되는 기간 한정 상품권. 많이 모아 가면, 월영제 특유의 '어떤 게임'에 도전할 수 있다는 듯 하다."
2588141576-NameKr = "월영제 월병"
2588141576-DescriptionKr = "축제의 성공과 풍요를 기원하는 월영제 월병. 보통 월병보다 작게 만들어져, 한 입에 먹을 수 있는 것이 특징이다."
2506282920-NameKr = "연단방 특제 활력 보충제"
2506282920-DescriptionKr = "축제의 성공을 위해, 연단방에서 특별히 조제했다는 보충제. 활력을 불어넣고 기운을 되찾아준다고 한다."
647708360-NameKr = "월영제 폭죽"
647708360-DescriptionKr = "축제하면 빠질 수 없는 폭죽. 충분히 안전 처리가 되어 있지만, 그래도 사고에는 늘 주의하도록 하자."
494149653-NameKr = "이벤트 포인트"
494149653-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
2045066777-NameKr = "라이브 티켓"
2045066777-DescriptionKr = "참가한 유닛들의 라이브를 볼 수 있는 티켓.라이브 후에는, 기념용 굿즈로서도 훌륭하다."
4126770671-NameKr = "색색 팬라이트"
4126770671-DescriptionKr = "라이브의 주인공들과 함께 빛나는 팬라이트.넓은 공연장에서 아이돌과 팬, 모두가 하나되도록 도와주는 훌륭한 도구이다."
1870900489-NameKr = "릴렉스 케이크"
1870900489-DescriptionKr = "학원제 곳곳에서 나눠 주는 조각 케이크.어떤 이들에겐 학원제 방문의 이유가 될 정도로 맛이 일품이다."
2062917839-NameKr = "수수께끼의 물질"
2062917839-DescriptionKr = "현장에서 수집한 수수께끼의 물질. 특정한 '재분석'을 통해, 전혀 다른 결과물을 얻을 수 있다는 것 같다."
734398872-NameKr = "요괴 MAX 우메보시"
734398872-DescriptionKr = "여러 의미로 '굉장한' 요괴MAX의 바리에이션. 하지만 누군가에게는 최선의 선택이다."
3651067564-NameKr = "푹신한 베개"
3651067564-DescriptionKr = "새하얗고 부드러운 베개. 머리를 대는 것만으로도 꿈나라에 보내 버릴 것 같은 푹신함이다."
4161777769-NameKr = "신규 카드팩"
4161777769-DescriptionKr = "코유키가 선생님을 꾀어내기 위해 사용한 카드팩. 새로운 카드가 한가득이다."
3803620130-NameKr = "<BOOM> 클래식 버전"
3803620130-DescriptionKr = "마키가 모두를 위해 가져온 게임팩. CPU와 모니터만 있다면 어디서든 즐길 수 있다."
3308634141-NameKr = "이벤트 포인트"
3308634141-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
3294588725-NameKr = "엑스포 기념품"
3294588725-DescriptionKr = "엑스포 회장 곳곳에서 구할 수 있는 밀레니엄 엑스포의 기념품.행사 중엔 흔하지만, 이것도 결국 한정판이 된다!"
123964663-NameKr = "누군가의 분실물"
123964663-DescriptionKr = "많은 학생들이 오가며 흘린 누군가의 분실물.잘 모아서 주최 측에 가져다주면, 누군가가 다시 행복해진다."
2401109475-NameKr = "발렌타인 스탬프"
2401109475-DescriptionKr = "발렌타인 데이 외출권으로 교환할 수 있는 스탬프. 활발하게 행동했음을 증명한다."
2621462400-NameKr = "발렌타인 데이 외출권"
2621462400-DescriptionKr = "발렌타인 데이를 맞이하여 순찰 업무로 바쁜 선생님이 학생들과 만나기 위해 필요한 외출권. \n※ 사용하지 않은 외출권은 이벤트 종료 후 400,000 크레딧으로 변환됩니다."
4188493704-NameKr = "파르페 교환권"
