[translation]
3194776850-NameTh = "สำนักงาน"
3194776850-DescriptionTh = "ที่นี่คือสำนักงานที่มีเครื่องใช้สำนักงานที่จำเป็นในการทำงานครบครัน\nคุณครูจะอยู่ที่นี่เป็นหลักเพื่อจัดการงานในชาเล่ต์"
1907901108-NameTh = "ห้องโสต"
1907901108-DescriptionTh = "ที่นี่คือห้องโสตที่ติดตั้งหน้าจอขนาดใหญ่ ให้คุณได้เพลิดเพลินกับการชมวีดีโอ\nสามารถรับชมละคร ภาพยนตร์และแอนิเมชันชื่อดังต่างๆ ได้ที่นี่"
358080736-NameTh = "โรงยิม"
358080736-DescriptionTh = "ที่นี่คือโรงยิมขนาดใหญ่ที่มีทั้งคอร์ทและอัฒจันทร์\nและยังมีอุปกรณ์กีฬาครบครัน"
4294611526-NameTh = "อาคารเรียน 1 เกเฮนน่า"
4294611526-DescriptionTh = "ที่นี่คืออาคารเรียนที่ใหญ่ที่สุดในเขตกลางเกเฮนน่า\nแม้ว่ามีห้องเรียนจำนวนมาก แต่ไม่ค่อยมีที่ให้จัดการเรียนอย่างเหมาะสมนัก"
1274324253-NameTh = "อาคารชมรมเกเฮนน่า"
1274324253-DescriptionTh = "อาคารนี้เป็นที่รวบรวมของห้องชมรมในเกเฮนน่า\nแต่ส่วนใหญ่ถูกใช้เป็นพื้นที่อิสระให้กับเหล่านักเรียน"
358653965-NameTh = "สวนกลางเกเฮนน่า"
358653965-DescriptionTh = "ที่นี่คือสนามกลางที่มีที่ดินขนาดใหญ่\nถ้าเข้ามาอาจจะเดินหลงทาง เพราะมันถูกจัดการไว้ไม่ดี ต้องระวังด้วยนะ"
2196189972-NameTh = "สนามกีฬากลางเกเฮนน่า"
2196189972-DescriptionTh = "ที่นี่คือสนามกีฬากลางเกเฮนน่า\nสามารถเล่นกีฬาและกิจกรรมกลางแจ้งต่างๆ ได้"
1866984703-NameTh = "อาคารเรียน 2 เกเฮนน่า"
1866984703-DescriptionTh = "ที่นี่คืออาคารเรียน 2 เขตกลางเกเฮนน่า มีนักเรียนบางส่วนที่\nตั้งใจและหมกมุ่นกับการเรียนอยู่ด้วย ต่างจากอาคารเรียน 1"
3032755222-NameTh = "โคลอสเซียมเกเฮนน่า"
3032755222-DescriptionTh = "โคลอสเซียมที่เปิดให้นักเรียนใช้งานได้อย่างอิสระ\nให้เหล่านักเรียนเข้ามาต่อสู้กันที่นี่ได้อย่างเต็มที่"
970571410-NameTh = "สำนักงานกรรมการวินัยเกเฮนน่า"
970571410-DescriptionTh = "ที่นี่คือสำนักงานกรรมการวินัยเกเฮนน่า\nสถานที่นี้เกือบเป็นที่เดียวในเขตกลางที่จัดการได้อย่างเหมาะสม"
1533671597-NameTh = "อาคารร้างเกเฮนน่า"
1533671597-DescriptionTh = "อาคารแห่งนี้เป็นอาคารที่ตอนนี้ไม่ได้ถูกใช้งาน แม้ว่าไม่ได้ใช้งานแล้ว\nแต่ก็เปิดให้เข้าไปได้ ซึ่งอาจจะเกิดปัญหาขึ้นได้ นี่เป็นพื้นที่ที่อันตรายมาก\nต้องคอยระมัดระวังตัวด้วย"
261901867-NameTh = "ห้องสมุด"
261901867-DescriptionTh = "ที่นี่คือห้องสมุดที่มีหนังสือต่างๆ ที่ต้องใช้ในการทำงานของคุณครูและการเรียนของนักเรียน \nยังมีหนังสือการ์ตูนกับไลท์โนเวลที่อ่านเพื่อความบันเทิงด้วย"
1983840990-NameTh = "อาคาร 1 อะบิดอส"
1983840990-DescriptionTh = "ที่นี่คืออาคารหลักที่นักเรียนของอะบิดอสใช้ทำกิจกรรมต่างๆ \nมีนักเรียนที่เป็นสมาชิกคณะกรรมการแผนงานดูแลอยู่ จึงยังคงความสะอาดให้สถานที่วุ่นวายนี้ได้อยู่ทุกวัน"
3073680445-NameTh = "อาคารย่อยอะบิดอส"
3073680445-DescriptionTh = "ที่นี่คืออาคารย่อยในอะบิดอส เป็นทางเชื่อมจากอาคารหลักไประเบียงได้โดยตรง\nมีห้องทำกิจกรรมเฉพาะต่างๆ เช่นห้องวิทยาศาตร์หรือห้องดนตรีที่ตอนนี้ไม่ได้ถูกใช้งานแล้ว"
3030528899-NameTh = "สนามกีฬาอะบิดอส"
3030528899-DescriptionTh = "สนามกีฬาสำหรับจัดกิจกรรมกีฬาต่างๆ เช่นคาบเรียนพละหรือกีฬาสี\nซึ่งตอนนี้ถูกฝังอยู่ใต้ทรายจนจัดการได้ยากแล้ว"
4060200853-NameTh = "ห้องสมุดอะบิดอส"
4060200853-DescriptionTh = "ห้องสมุดที่เปิดให้ใช้เป็นพื้นที่เรียนและอ่านหนังสือได้\nและยังมีหนังสือเรียนหลายสาขา ไปจนถึงการ์ตูนและนิตยสารที่อ่านเพื่อความบันเทิง พบหนังสือยอดนิยมต่างๆ ในอะบิดอสได้ที่นี่"
4149434655-NameTh = "สระว่ายน้ำอะบิดอส"
4149434655-DescriptionTh = "สระว่ายน้ำในอะบิดอสที่ปกติจะไม่ได้ถูกใช้งาน\nเพราะน้ำแห้ง พื้นสระแตกและมีทรายกองที่พื้น"
2812564490-NameTh = "โรงยิมอะบิดอส"
2812564490-DescriptionTh = "โรงยิมที่ใช้เป็นห้องประชุมและทำกิจกรรมกีฬาในร่มได้\nซึ่งตอนนี้ใช้เก็บอุปกรณ์ออกกำลังกายต่างๆ ที่ไม่ได้ใช้อยู่"
3019364332-NameTh = "ร้านค้าอะบิดอส"
3019364332-DescriptionTh = "ร้านค้าที่นักเรียนทุกคนชื่นชอบ\nแม้ว่าสินค้าจะน้อยกว่าโรงเรียนอื่น แต่ก็มีขนมปังและขนมยอดฮิตในคิโวทอสให้เลือกซื้อได้"
2602511445-NameTh = "อาคารเก่าอะบิดอส"
2602511445-DescriptionTh = "อาคารที่เดิมเคยถูกใช้เป็นห้องชมรมต่างๆ\nตอนนี้ถูกปิดไม่ให้ใช้งานเนื่องจากสภาพอาคารที่เก่าและอันตราย แต่บางครั้งก็มีนักเรียนเข้าไปทดสอบความกล้า"
774508018-NameTh = "ห้องเรียน"
774508018-DescriptionTh = "ห้องเรียนที่เปิดให้นักเรียนเลือกเข้าคลาสหรือเรียนได้\nและยังเปิดให้นักเรียนใช้เรียนด้วยตัวเองหรือใช้บรรยายภารกิจวิจัยส่วนตัวได้"
1925286931-NameTh = "หอคอยมิลเลเนียม"
1925286931-DescriptionTh = "หอคอยขนาดใหญ่ ที่ตั้งของชมรมหลักในมิลเลเนียม รวมถึงชมรมเซมิน่า\nมีติดตั้งระบบรักษาความปลอดภัยที่มีเทคโนโลยีชั้นสูงไว้โดยทั่ว ป้องกันไม่ให้บุคคลภายนอกเข้ามาได้"
698860447-NameTh = "สถานีรถไฟ"
698860447-DescriptionTh = "สถานีรถไฟแห่งนี้สามารถพาไปได้ทั่วทั้งโรงเรียนอย่างรวดเร็ว\nแม้ว่ารถไฟนี้จะขับเคลื่อนอย่างรวดเร็ว แต่ก็แทบจะไม่ส่งเสียงรบกวนเลย"
2688045816-NameTh = "ห้องสมุด"
2688045816-DescriptionTh = "ห้องสมุดที่มีหนังสือหลากหลายประเภทที่ใช้ในการวิจัยของนักเรียนมิลเลเนียม\nสื่อวีดีโอแบบสารคดีก็สามารถหาดูได้ที่นี่เช่นกัน"
1022652590-NameTh = "ร้านค้าในโรงเรียน"
1022652590-DescriptionTh = "ร้านค้าในโรงเรียนนี้จำหน่ายเครื่องดื่มและขนมปังในช่วงพัก\nยังมีเมนูยอดนิยมแบบเครื่องดื่มชูกำลังและกาแฟเอสเปรสโซดับเบิ้ลช็อตด้วย"
2885237148-NameTh = "ห้องปฏิบัติงานวิศวกรรม"
2885237148-DescriptionTh = "ห้องปฏิบัติงานวิศวกรรมที่ใช้ทำการทดลองทางวิศวกรรมต่างๆ\nมีอุปกรณ์เทคโนโลยีชั้นสูง รวมถึงเครื่องพิมพ์ 3D ขนาดใหญ่ด้วย"
3070757653-NameTh = "ศูนย์ข้อมูล"
3070757653-DescriptionTh = "ศูนย์ข้อมูลที่ประกอบด้วยเครือข่ายและเซิร์ฟเวอร์ขนาดใหญ่\nที่ใช้เก็บบันทึกข้อมูลการวิจัยที่สำคัญของมิลเลเนียม"
1295016811-NameTh = "โรงไฟฟ้า"
1295016811-DescriptionTh = "โรงไฟฟ้าที่ผลิตไฟฟ้าสำหรับใช้ในโรงเรียนมิลเลเนียม\nใช้เครื่องกำเนิดไฟฟ้าที่เป็นมิตรกับสิ่งแวดล้อม จึงแทบจะไม่สร้างมลพิษ"
895510277-NameTh = "ฟิตเนสเซ็นเตอร์"
895510277-DescriptionTh = "ฟิตเนสเซ็นเตอร์ที่ใช้ฝึกฝนร่างกายที่เหนื่อยล้าจากการวิจัย\nยังมีอุปกรณ์เทคโนโลยีชั้นสูงเพื่อปรับการเทรนให้เหมาะสมกับนักเรียน"
3140661513-NameTh = "ห้องปฏิบัติงาน"
3140661513-DescriptionTh = "ห้องปฏิบัติงานที่ใช้ทำการทดลองทางวิทยาศาสตร์พื้นฐาน\nที่นี่มียาอันตรายและอุปกรณ์ทดลองมีคมหลายอย่าง โปรดระวังเกิดอุบัติเหตุ"
2871272188-NameTh = "มหาวิหารทรีนิตี้"
2871272188-DescriptionTh = "อาคารขนาดใหญ่ที่สุดในทรีนิตี้ที่เป็นเหมือนสัญลักษณ์ของทรีนิตี้ และยังเป็นสำนักงานใหญ่ของชมรมซิสเตอร์"
3137866576-NameTh = "จัตุรัสทรีนิตี้"
3137866576-DescriptionTh = "จัตุรัสขนาดใหญ่ในสถาบันทรีนิตี้ ถือเป็นสถานที่สัญลักษณ์ของพื้นที่นี้ และมีน้ำพุที่สวยงามอันโด่งดัง"
3915788217-NameTh = "ห้องสมุดกลาง"
3915788217-DescriptionTh = "ห้องสมุดที่ใหญ่ที่สุดในทรีนิตี้และในคิโวทอส มีข่าวลือว่ามีนักเรียนประสบอุบัติเหตุในห้องสมุดนี้อยู่บ่อยๆ"
1205798181-NameTh = "หอประชุมชมรม"
1205798181-DescriptionTh = "หนึ่งในหอประชุมที่รวมชมรมทั้งหลายในสถาบันทรีนิตี้เอาไว้ กิจกรรมต่างๆ ของชมรมจะจัดขึ้นที่นี่"
1291519405-NameTh = "บาบิส สกอลาร์"
1291519405-DescriptionTh = "ชื่อนี้มีความหมายว่า <ฐานทัพของนักเรียน> เป็นอาคารเก่าที่ปัจจุบันไม่ได้ใช้งาน ในอดีตเคยถูกใช้เป็นกองบัญชาการของชมรมอัศวินบรรเทาทุกข์"
2678735093-NameTh = "พิพิธภัณฑ์ศิลปะ"
2678735093-DescriptionTh = "พิพิธภัณฑ์ศิลปะที่รวบรวมผลงานศิลปะต่างๆ เอาไว้ ปัจจุบันยังใช้เป็นสถานที่จัดชั้นเรียนศิลปะของนักเรียน"
1148047130-NameTh = "โรงแสดงดนตรี"
1148047130-DescriptionTh = "ห้องดนตรีที่เพิ่งสร้างเมื่อไม่นานมานี้ ถูกใช้เป็นเวทีจัดคอนเสิร์ตและละครเวที"
2413575071-NameTh = "อาคารฝั่งตะวันตกเก่า"
2413575071-DescriptionTh = "ห้องสมุดที่ทั้งเก่าและสกปรกเลยไม่ค่อยมีคนมาเยี่ยมชม  และยังเป็นที่ตั้งของชมรมอ่านหนังสือในสถาบันทรีนิตี้"
1107627875-NameTh = "ห้องซ้อมยิงเป้า"
1107627875-DescriptionTh = "ห้องซ้อมยิงเป้าที่มีหลายช่องยิงให้เลือกฝึกยิงเป้าได้\nมีลูกกระสุนปืนหลากหลายประเภทให้นักเรียนทุกโรงเรียนได้เลือกใช้"
2340126097-NameTh = "อาคารหลักสำนักเลขาธิการเรดวินเทอร์"
2340126097-DescriptionTh = "อาคารหลักที่ตั้งของสำนักเลขาธิการเรดวินเทอร์ มีประติมากรรมหนวด ที่เป็นสัญลักษณ์แห่งอำนาจของประธานเชริโน่อยู่ในทุกที่"
683355499-NameTh = "จัตุรัสการปฏิวัติหนวดแดง"
683355499-DescriptionTh = "จัตุรัสขนาดใหญ่ที่อยู่ใกล้กับอาคารหลักสำนักเลขาธิการเรดวินเทอร์ กลางจัตุรัสมีรูปปั้นเชริโน่ขนาดใหญ่ที่มีไฟส่องสว่างตลอด 24 ชั่วโมง"
414654122-NameTh = "หอพักรวมที่ 1"
414654122-DescriptionTh = "อาคารหอพักรวมที่สร้างขึ้นเพื่ออำนวยความสะดวกสบายและที่พักให้กับนักเรียน แม้ว่าค่าใช้จ่ายจะต่ำ แต่สิ่งอำนวยความสะดวกค่อนข้างเก่าและน้ำร้อนไม่ไหลอยู่บ่อยๆ"
2066711573-NameTh = "สถานีโทรทัศน์เรดแบร์"
2066711573-DescriptionTh = "สถานีโทรทัศน์สำหรับออกอากาศของ <เรดแบร์> บริษัทสื่อแห่งเดียวของสหภาพ\nเรดวินเทอร์ เนื้อหาที่ออกอากาศส่วนใหญ่เป็นการสรรเสริญเชริโน่"
3364708890-NameTh = "โรงอาหารรวมที่ 3"
3364708890-DescriptionTh = "โรงอาหารที่นักเรียนของเรดวินเทอร์ใช้สำหรับรับประทานอาหาร นักเรียนทุกคนจะได้รับอาหารเท่าเทียมกัน แต่อาหารของประธานเชริโน่มีความเท่าเทียมกว่า"
2715934839-NameTh = "ตลาดโลมาขาว"
2715934839-DescriptionTh = "ตลาดกลางแจ้งเก่าแก่ที่นักเรียนของเรดวินเทอร์ใช้ซื้อขายสินค้าทำมือ บางครั้งก็เป็นที่หมุนเวียนของเก่าที่ไม่เป็นที่นิยมในสำนักเลขาธิการ"
264515151-NameTh = "โรงเก็บของใช้ในป่า"
264515151-DescriptionTh = "โรงเก็บของที่ใช้เก็บไม้และอุปกรณ์ที่จำเป็นสำหรับใช้ในป่าเมื่อไปตัดไม้ เนื่องจากมีอุปกรณ์อันตรายหลายชิ้น ตอนที่เข้าไปต้องใช้อุปกรณ์รักษาความปลอดภัยด้วย"
328579908-NameTh = "สำนักงานแรงงานชมรมผู้รับจ้าง"
328579908-DescriptionTh = "สำนักงานแรงงานที่นักเรียนของชมรมผู้รับจ้างใช้พักเป็นประจำ ถ้าต้องการบริการด่วน เมื่อมาหาจะได้รับความช่วยเหลือทันที"
3657567135-NameTh = "โรงเก็บเครื่องบิน"
3657567135-DescriptionTh = "โรงเก็บเครื่องบินที่ใช้เก็บยุทโธปกรณ์อย่าง รถถัง รถยนต์ และเฮลิคอปเตอร์\nและยังมีเครื่องมือที่ใช้ในการซ่อมแซมและอุปกรณ์เครื่องยนต์อยู่ด้วย"
1933676415-NameTh = "อาคารกลาง ชมรมหยินหยาง"
1933676415-DescriptionTh = "อาคารส่วนกลางของชมรมหยินหยางที่ปฏิบัติหน้าที่สภานักเรียนของสหพันธ์\nเฮียกคิยาโค มีข่าวลือในหมู่นักเรียนว่ามีอุปกรณ์ป้องกันและกับดักหลายรูปแบบ\nเหมือนกับที่ติดตั้งอยู่ในอาคารของชมรมหยินหยาง"
4168293052-NameTh = "จัตุรัสกลาง"
4168293052-DescriptionTh = "จัตุรัสขนาดใหญ่ที่มองเห็นได้จากอาคารกลางของชมรมหยินหยาง เป็นจุดนัดพบ\nของนักท่องเที่ยว และยังมีรูปปั้นอยู่กลางจัตุรัสที่เป็นจุดถ่ายรูปยอดนิยมอีกด้วย"
2953329321-NameTh = "โรงละครชมรมหยินหยาง"
2953329321-DescriptionTh = "โรงละครจัดการแสดงสัญจรของชมรมหยินหยาง ขึ้นชื่อว่าทุกครั้งที่ชมรมหยินหยาง\nเปิดทำการแสดงจะมีแฟนคลับต่อแถวกันมาอย่างคับคั่ง เช่น การดวลกลอนไฮกุ\nการแข่งเล่าเรื่องราคุโกะและการแสดงความสามารถพิเศษที่น่าตื่นตาของชิเซะ"
990108595-NameTh = "สนามหญ้าใหญ่"
990108595-DescriptionTh = "สนามหญ้าชื่อดังที่นักท่องเที่ยวที่มาเยือนสหพันธ์เฮียกคิยาโคต้องมาชม มีข่าวลือว่า\nมีปลาคาร์ปยักษ์ที่เรียกกันว่า 'เจ้าบ้าน' อาศัยอยู่ในบ่อนี้และมีการขายสินค้ายอดฮิตด้วย"
1694812288-NameTh = "ย่านการค้าเฮียกคิยาโค"
1694812288-DescriptionTh = "ถนนในย่านการค้าของสหพันธ์เฮียกคิยาโค ร้านน้ำชาชื่อดัง <เฮียกคิยาโค> ก็ตั้งอยู่\nที่นี่ด้วย และยังมีข่าวลือว่าหากมีกลุ่มเด็กเจ้าปัญหามาก่อความวุ่นวาย จะมีสาวน้อย\nคนดังแห่งร้านเฮียกคิยาโคมาปรากฏตัวเพื่อแก้ไขปัญหา"
2072243193-NameTh = "เคเบิลคาร์นำเที่ยว"
2072243193-DescriptionTh = "เคเบิลคาร์ของสหพันธ์เฮียกคิยาโค ว่ากันว่าทัศนียภาพของเฮียกคิยาโคที่มอง\nจากเคเบิลคาร์นี้จะตราตรึงใจจนไม่รู้ลืม ค่าบริการไป-กลับ 500 เยน"
2050672265-NameTh = "พิพิธภัณฑ์ศิลปะดั้งเดิม"
2050672265-DescriptionTh = "พิพิธภัณฑ์ขนาดใหญ่ที่ผู้เข้าชมจะได้สัมผัสถึงประวัติศาสตร์และวัฒนธรรมดั้งเดิมของ\nสหพันธ์เฮียกคิยาโค แน่นอนว่านักเรียนที่มาส่วนใหญ่ประเมินว่ามันไม่ได้ดีขนาดนั้น"
4134542221-NameTh = "จุดชมวิวต้นไม้"
4134542221-DescriptionTh = "จุดชมวิวที่มองเห็นทัศนียภาพของทั่วทั้งเฮียกคิยาโค ขึ้นชื่อว่าเป็นสถานที่ศักดิ์สิทธิ์ รวมถึงเป็นฉากในภาพยนตร์และละครหลายเรื่อง เนื่องจากทัศนียภาพที่งดงามนี้"
2941784831-NameTh = "สถาบันฝึกตำรวจวัลคิรี่ สาขาชิราโทริ"
2941784831-DescriptionTh = "สาขาย่อยของสถาบันฝึกตำรวจวัลคิรี่ ว่ากันว่าล้อมรอบด้วยพื้นที่สีเขียวชอุ่ม เลยมีอากาศดีเป็นพิเศษ"
1693953940-NameTh = "โคกิทาวน์"
1693953940-DescriptionTh = "ถนนย่านการค้าเครื่องใช้ไฟฟ้าชื่อดัง มีข่าวลือว่าทุกอย่างสามารถหาได้ที่นี่ เว้นแต่สินค้านั้นเลิกผลิตไปแล้ว"
4116376335-NameTh = "ไตรสแควร์"
4116376335-DescriptionTh = "จัตุรัสที่ใช้เป็นพื้นที่พักผ่อนและจุดนัดพบ เป็นสถานที่เหมาะสำหรับเดินเล่นเป็นที่สุด "
3884396288-NameTh = "เขตธุรกิจที่ 3"
3884396288-DescriptionTh = "เขตธุรกิจที่อยู่ตั้งอยู่ข้างไตรสแควร์ เป็นพื้นที่ที่สวยงามและทันสมัย มีถนนและอาคารที่ซับซ้อน"
880697741-NameTh = "พราโดอเวนิว"
880697741-DescriptionTh = "ถนนที่เป็นที่ตั้งของพิพิธภัณฑ์ศิลปะ นอกจากพิพิธภัณฑ์ศิลปะขนาดใหญ่ ยังมีถนนสายศิลปะอยู่ในพื้นที่รอบๆ เป็นแหล่งท่องเที่ยวด้วย "
3130494169-NameTh = "สวนในท้องถิ่น ชิราโทริ"
3130494169-DescriptionTh = "แม้ว่าจะมีคนมาเยี่ยมชมไม่มากเมื่อเทียบกับขนาดของสวน แต่ก็เป็นสถานที่ที่ขาดไปไม่ได้"
3543706609-NameTh = "ท่าเรือคาเนะซากิ"
3543706609-DescriptionTh = "ถ้าอยากเห็นทะเล การมาที่นี่เป็นวิธีหนึ่งที่แนะนำ อาจจะเห็นทัศนียภาพเหนือจินตนาการเลยก็ได้"
3251299115-NameTh = "รามินิทาวน์"
3251299115-DescriptionTh = "ถ้าพูดถึงแหล่งท่องเที่ยวด้านอาหารของแต่ละโรงเรียน ห้ามพลาดถนนสายอาหารนี้เด็ดขาด ตรอกแคบสองฝั่งแม่น้ำที่มีร้านอาหารและร้านริมทางเรียงรายอยู่นับไม่ถ้วนเสมอ"
2292815693-NameTh = "อาคารหกเหลี่ยม"
2292815693-DescriptionTh = "อาคารพักอาศัยของนักเรียนในมังกรดำ สภานักเรียนของโรงเรียนมัธยมซานไห่จิง ทางเข้าอาคารหกเหลี่ยมนี้ได้รับการคุ้มกันอย่างแน่นหนาจากสมาชิกมังกรดำ เลยไม่มีทางที่จะเข้าไปโดยไม่ได้รับอนุญาตจากประมุข"
2632751166-NameTh = "สวนพยัคฆ์ขาว"
2632751166-DescriptionTh = "สวนขนาดใหญ่สำหรับให้นักเรียนซานไห่จิงใช้พักผ่อน ทุกเช้าจะมีนักเรียนที่รักสุขภาพ\nมารวมตัวกันทำกายบริหารที่จัตุรัสกลางสวน"
4045851205-NameTh = "ร้านน้ำชานิทานดอกท้อ"
4045851205-DescriptionTh = "ร้านน้ำชาเก่าแก่ที่นักเรียนซานไห่จิงเข้ามาพักผ่อนแทนการไปคาเฟ่ สำหรับนักเรียนซานไห่จิง การดื่มน้ำชาเป็นเรื่องที่พบได้ทั่วไปในที่แห่งนี้ พอๆ กับการดวลปืน"
3798845638-NameTh = "ย่านการค้าเทพเต่าดำ"
3798845638-DescriptionTh = "ย่านที่รวมร้านอาหารรสเลิศด้านนอกซานไห่จิง และยังเป็นตรอกที่นักเรียนในย่านการค้า\nมาทำการค้าขายอย่างคึกครื้น แม้ว่าคนส่วนใหญ่จะถืออาหารจีนที่ใส่เครื่องเทศจัดจ้าน แต่มีคนที่ถือของลึกลับๆ อยู่ไม่น้อย"
2595612555-NameTh = "อาคารสวนต้นบ๊วย"
2595612555-DescriptionTh = "อาคารส่วนกลางของสวนต้นบ๊วย เป็นสถานที่เรียนของเหล่านักเรียนตัวน้อยของซานไห่จิง ด้วยเอกลักษณ์ของซานไห่จิงที่ให้ความสำคัญด้านการศึกษา แม้แต่เจ้าหน้าที่ของมังกรดำ\nก็ไม่สามารถแทรกแซงสวนต้นบ๊วยได้"
2905240932-NameTh = "ห้องวิจัย ชมรมวิจัยศาสตร์การปรุงยา"
2905240932-DescriptionTh = "ห้องวิจัยเก่าทรุดโทรมที่สมาชิกชมรมวิจัยศาสตร์การปรุงยาใช้ทำวิจัย\nหากเข้ามาใกล้ที่นี่จะได้กลิ่นอับประหลาดๆ นักเรียนของซานไห่จิง\nจึงมักจะหลีกเลี่ยงการเข้ามาใกล้ที่นี่"
656802880-NameTh = "ไร่ชา"
656802880-DescriptionTh = "ไร่ชาแปลงใหญ่ที่ปลูกใบชา สินค้าขึ้นชื่อของซานไห่จิง ใบชาของที่นี่วางขายทั่วคิโวทอส รวมถึงโรงเรียนสามัญทรีนิตี้ด้วย"
2398246336-NameTh = "ป่าต้นไผ่"
2398246336-DescriptionTh = "ป่าต้นไผ่ที่ขึ้นแน่นขนัดตรงปากทางเข้าเขาคุนหลุน ถึงจะไม่มีนักเรียนเข้ามาที่นี่เพราะจะ\nหลงทางได้ง่ายๆ แต่มีนักเรียนบางกลุ่มเข้ามาที่นี่เพื่อซุบซิบเรื่องความลับที่ยากจะเปิดเผย หรือเคลียร์จิตใจที่ว้าวุ่น"
95106171-NameTh = "สถานีฮารุฮาบาระ"
95106171-DescriptionTh = "สถานีนี้เป็นเหมือนทางเข้าสู่ฮารุฮาบาระ มีคาแรกเตอร์อันเป็นเอกลักษณ์ตรง\nทางออกกลางอยู่ตลอด และมีป้ายไฟแสดงโฆษณาที่ให้กลิ่นอายคาแรกเตอร์นั้น\nอยู่เกือบทั้งหมด ชวนให้รู้สึกถึงบรรยากาศเฉพาะตัว"
3931861101-NameTh = "Kinds!"
3931861101-DescriptionTh = "ในย่านฮารุฮาบาระมีร้านอาหารอยู่มากมาย แต่นี่คือร้านสเต็กที่มีชื่อเสียงที่สุด มีเนื้อหลากหลายประเภทให้เลือกกิน"
1008014939-NameTh = "ฮารุฮาบาระ มัลติมีเดีย เซ็นเตอร์"
1008014939-DescriptionTh = "ร้านแฟรนไชส์อุปกรณ์อิเล็กทรอนิกส์ขนาดใหญ่ เรียกย่อๆ อีกอย่างว่ามัลติมีเดียฮารุบะ มีสินค้าหลักๆ เป็นอุปกรณ์อิเล็กทรอนิกส์ แต่ก็ยังมีผลิตภัณฑ์อื่นเช่น เครื่องเล่นเกม ของเล่น และฟิกเกอร์อีกด้วย"
981882419-NameTh = "ถนนอิเล็กทรอนิกส์ฮารุฮาบาระ"
981882419-DescriptionTh = "ถนนสายที่แสดงทิวทัศน์ของฮารุฮาบาระ ไม่ว่ามองไปทางไหนก็สัมผัสได้ถึง\nบรรยากาศที่เป็นเอกลักษณ์ของฮารุฮาบาระ"
3346155995-NameTh = "เรดิโอไคคัน"
3346155995-DescriptionTh = "แลนด์มาร์กที่เป็นสัญลักษณ์ของฮารุฮาบาระ ตั้งอยู่ทางตะวันตกเฉียงใต้ของ\nสถานีฮารุฮาบาระ ว่ากันว่าเรดิโอไคคันปัจจุบันได้เปิดอีกครั้งในอาคารใหม่"
1706322617-NameTh = "ฮารุฮาบาระ ครอสฟิลด์"
1706322617-DescriptionTh = "ศูนย์รวมสิ่งอำนวยความสะดวก ตั้งอยู่ทางตะวันตกเฉียงเหนือของสถานีฮารุฮาบาระ ประกอบด้วย 2 อาคารขนาดใหญ่ 1 อาคารพักอาศัย และสถานีดับเพลิง"
1644926853-NameTh = "มันดารากะ คอมเพล็กซ์"
1644926853-DescriptionTh = "ร้านเครือข่ายจำหน่ายสินค้ามือสองโดยเฉพาะ ถือเป็นแหล่งส่งต่อของสะสมหลาก\nประเภท ทั้งของเล่นยุคเก่าและสินค้าที่เกี่ยวกับงานอดิเรกต่างๆ โดยเฉพาะการ์ตูน มีข่าวลือว่าถ้าจะตามหา 'ของที่หาจากที่อื่นไม่ได้' ต้องมา 'ที่นี่'"
434019223-NameTh = "เมดคาเฟ่ แคนดี้แคนดี้"
434019223-DescriptionTh = "คาเฟ่แห่งนี้เรียกว่าเป็นร้านขึ้นชื่อของฮารุฮาบาระ ว่ากันว่าเป็นที่นิยม\nของผู้ที่กำลังมองหาประสบการณ์ที่พิเศษและแปลกใหม่"
3019432404-NameTh = "อาคารหลัก ไวลด์ฮันต์"
3019432404-DescriptionTh = "อาคารที่ใหญ่ที่สุดในไวลด์ฮันต์ เนื่องจากเป็นที่ตั้งของสภานักเรียน และฝ่ายดูแลหอพัก จึงไม่อนุญาตให้นักเรียนทั่วๆ ไปเข้าใกล้"
3730667014-NameTh = "จัตุรัสเอพิฟานี"
3730667014-DescriptionTh = "จัตุรัสด้านหน้าอาคารหลัก มักจะแสดงดนตรีเปิดหมวกกับศิลปะตลอด หากสภาพอากาศเอื้ออำนวย"
1558103051-NameTh = "อาคารหอพัก 3"
1558103051-DescriptionTh = "หนึ่งในหอพักที่นักเรียนใช้พักอาศัยโดยเฉพาะ แม้อยู่ภายใต้การดูแลที่เข้มงวดของฝ่ายดูแลหอพัก แต่ยังมีช่องโหว่อยู่บางแห่ง"
1365945908-NameTh = "ศูนย์ข้อมูลศิลปะ"
1365945908-DescriptionTh = "อาคารห้องสมุดของไวลด์ฮันต์ นอกจากหนังสือแล้ว ยังมีงานศิลปะอีกหลายประเภท เช่น แผ่นเสียง โน้ตเพลง ภาพยนตร์ และสิ่งพิมพ์"
2951155655-NameTh = "อาย ออฟ อาร์ต"
2951155655-DescriptionTh = "สถานที่จัดการแสดงคอนเสิร์ต ละคร เต้นรำ ฯลฯ มีข่าวลือว่าใช้เทคโนโลยีการก่อสร้าง แบบใหม่ล่าสุดของมิลเลเนียม"
3688839210-NameTh = "แกลเลอรีนีโม"
