2764760079-NameTh = "ชั้นวางสินค้า MOMO FRIENDS"
2764760079-DescriptionTh = "ชั้นวางสินค้าที่เต็มไปด้วยสินค้า MOMO FRIENDS แสนน่ารักตะมุตะมิ ไม่ว่าใครก็ต้องหลงเดินเข้ามาดู"
3954747188-NameTh = "โต๊ะนั่งทานอาหาร เฟรช ช็อป"
3954747188-DescriptionTh = "โต๊ะที่ผสมผสานความสะอาดตากับความเป็นธรรมชาติ\nได้อย่างลงตัว! สนใจทานผลไม้สดสักหน่อยไหม?"
1783190384-NameTh = "โต๊ะดูดวงไพ่ทาโร่"
1783190384-DescriptionTh = "ทำนายโชคชะตาที่นี่ ในตอนนี้! โต๊ะดูดวงไพ่ทาโร่\nที่ไม่ว่าจะหยิบได้ไพ่อะไรขึ้นมาก็อยากทำนายต่อไปเรื่อยๆ"
1718145891-NameTh = "โต๊ะทำอาหารโบราณ"
1718145891-DescriptionTh = "โต๊ะโบราณที่ใช้ทำอาหารได้สารพัดเมนู ตั้งแต่ซุปร้อนๆ ได้จนถึงเมนูปิ้งย่าง!"
3668516638-NameTh = "เก้าอี้พักผ่อน"
3668516638-DescriptionTh = "เก้าอี้พักผ่อน สำหรับสร้างพื้นที่พักผ่อนเฉพาะของคุณได้ เหมาะกับผู้ที่ชื่นชอบการอยู่ภายในอาคาร"
3490025398-NameTh = "สระน้ำแข็ง"
3490025398-DescriptionTh = "สระน้ำแข็งที่ให้คุณได้ใช้เวลาผ่อนคลายในน้ำเย็นสบาย"
2461433472-NameTh = "ฉากกั้นสำหรับแคมป์"
2461433472-DescriptionTh = "ฉากกั้นแข็งแรงในดีไซน์สะอาดสะอ้าน มาพร้อมกับเก้าอี้พับได้ลายน่ารัก!"
3342398749-NameTh = "โต๊ะกาแฟในแคมป์"
3342398749-DescriptionTh = "โต๊ะที่ให้คุณลิ้มรสกาแฟหอมกรุ่นได้ แม้จะอยู่ท่ามกลางธรรมชาติ!"
2781307923-NameTh = "เซ็ตโต๊ะเรียนหนังสือ"
2781307923-DescriptionTh = "เซ็ตโต๊ะเรียนที่จะได้เรียนรู้ในสิ่งต่างๆ ไปทีละขั้นกับผองเพื่อนสุดน่ารัก! มาค่อยๆ เรียนรู้ไปด้วยกันนะ!"
2882359462-NameTh = "โต๊ะผู้บริหารผู้ทรงเกียรติ"
2882359462-DescriptionTh = "โต๊ะผู้บริหารที่ดูมีเกียรติ เหมาะสำหรับผู้ที่มีเสน่ห์อยู่เสมอ!"
3017609503-NameTh = "เวทีบรรเลงดนตรีดั้งเดิม"
3017609503-DescriptionTh = "เวทีที่มีเครื่องดนตรีดั้งเดิมจัดเตรียมไว้ชวนมอง มาอธิษฐานไปพร้อมกับชมการแสดงดนตรีสนุกๆ เลย!"
471153362-NameTh = "โต๊ะผู้บริหารสูงสุด"
471153362-DescriptionTh = "โต๊ะผู้บริหารที่ให้ความรู้สึกน่าเกรงขาม มีดีไซน์ที่ทันสมัย รู้สึกถึงพลังและอำนาจ!"
1604931288-NameTh = "ครกตำโมจิ"
1604931288-DescriptionTh = "ครกกับสากสำหรับตำโมจิแสนอร่อย ถือเป็นวิธีต้อนรับปีใหม่ที่ยอดเยี่ยม!"
2830564916-NameTh = "แท่นโชว์หน้ากากเทศกาล"
