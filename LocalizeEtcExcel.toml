1688668283-DescriptionTw = "內含學生社團活動記錄的報告書。內含眾多學生的經驗。"
3541905306-NameTw = "內布拉星象盤碎片"
3541905306-DescriptionTw = "內布拉星象盤的碎塊。可用來進行各種製造及強化。"
1623415300-NameTw = "亞瑠的神名文字"
1623415300-DescriptionTw = "蘊含著亞瑠的神祕的神名文字。"
