963662747-DescriptionKr = "게임개발부 부원들의 물건을 수납할 수 있는 수납장. 개인의 개성이 드러난다."
3480001248-NameKr = "게임기 세트 우드 모니터"
3480001248-DescriptionKr = "게임을 즐길 수 있는 우드 재질의 모니터. 게임에 집중할 수 있는 환경이 조성되어 있다."
3689665216-NameKr = "게임개발부 카펫"
3689665216-DescriptionKr = "게임용품들이 놓인 귀여운 카펫. 곰 모양의 카펫이 귀여운 느낌을 연출해준다."
1330646520-NameKr = "게임개발부 인형"
1330646520-DescriptionKr = "게임개발부 부원들을 참고해서 만든 인형. 작은 사이즈지만 섬세한 디테일이 돋보인다."
4215649351-NameKr = "게임개발부 화이트보드"
4215649351-DescriptionKr = "중요한 내용이 작성된 화이트보드. 모든 부원의 낙서를 구경할 수 있다."
3493757956-NameKr = "게임개발부 커튼 창문"
3493757956-DescriptionKr = "귀여운 캐릭터 패턴의 커튼이 달린 창문. 햇빛으로부터 모니터 화면을 지켜준다!"
3320026552-NameKr = "파란색 폴리싱 벽"
3320026552-DescriptionKr = "문양 포인트가 있는 폴리싱 벽. 심플하면서도 고급스러운 느낌을 준다."
1611728920-NameKr = "우드 키친 바"
1611728920-DescriptionKr = "내구성이 뛰어난 키친바. 넓은 수납공간은 나만의 레시피를 만들기에 매우 적합하다."
1883652491-NameKr = "모모프렌즈 수납장"
1883652491-DescriptionKr = "모모프렌즈 시그니처 굿즈가 전시된 수납장. 인형, 커피, 문구 등 없는 것이 없다."
4227118403-NameKr = "바리스타 페로로 인형"
4227118403-DescriptionKr = "거대한 페로로 인형. 팬케이크를 들고 있는 바리스타 페로로가 의아한 느낌을 준다."
1241224346-NameKr = "선샤인 앙상블 화분"
1241224346-DescriptionKr = "싱그러운 향기가 가득한 앙상블 화분. 밝은 색조가 기분을 들뜨게 한다."
1822135647-NameKr = "선샤인 표지판"
1822135647-DescriptionKr = "플라워 장식이 눈길을 끄는 표지판. 어디로 갈지는 이제부터 정하면 된다."
519693909-NameKr = "선샤인 화분 진열대"
519693909-DescriptionKr = "다채로운 꽃장식이 우아한 느낌을 주는 화분 진열대. 장식하는 순간 공간이 밝아진다."
703992589-NameKr = "선샤인 알로하 화분"
703992589-DescriptionKr = "아담하고 귀여운 알로하 화분. 눈에 띄는 사람들에게 기분 좋은 인사를 건넨다."
3404111810-NameKr = "선샤인 라탄 조명 세트"
3404111810-DescriptionKr = "은은한 분위기를 선사하는 라탄 조명. 어두운 공간을 아늑하게 밝혀준다."
3154914473-NameKr = "선샤인 트로피컬 바스켓"
3154914473-DescriptionKr = "열대 과일이 가득 들어 있는 트로피컬 바스켓. 달콤한 향기가 풍겨온다."
263458747-NameKr = "선샤인 파티션"
263458747-DescriptionKr = "산뜻한 화이트 목재로 마무리한 파티션. 안정적인 구조로 주변의 공간을 분리해준다."
2136491683-NameKr = "선샤인 트로피컬 화분"
2136491683-DescriptionKr = "시원하게 뻗은 열대 잎이 인상적인 트로피컬 화분. 청정한 공기가 느껴진다."
1726224862-NameKr = "선샤인 미니 윈도우"
1726224862-DescriptionKr = "아기자기한 꽃장식으로 꾸며진 미니 윈도우. 작은 틈에서 새어 나오는 빛이 공간을 밝혀준다."
3934548801-NameKr = "선샤인 트로피컬 페인팅"
3934548801-DescriptionKr = "시원한 느낌을 전해주는 트로피컬 페인팅. 어디에든 걸어두면 자연스럽게 어울린다."
792618258-NameKr = "선샤인 알로하 벽걸이"
792618258-DescriptionKr = "핑크빛 화려한 꽃이 흘러내리듯 피어있는 알로하 벽걸이. 달콤한 향기가 난다."
957016821-NameKr = "선샤인 알로하 조명"
957016821-DescriptionKr = "금속 장식과 우아한 조형을 지닌 알로하 조명. 벽에 걸어두면 주변이 환해진다."
2586521896-NameKr = "선샤인 알로하 벽걸이 조명"
2586521896-DescriptionKr = "우아한 조형을 자랑하는 알로하 벽걸이 조명. 주변에 은은한 빛을 선사한다."
3717368859-NameKr = "선샤인 패턴 매트"
3717368859-DescriptionKr = "균일한 패턴이 반복되는 패턴 매트. 보는 사람에게 미묘한 안정감을 준다."
1538168673-NameKr = "선샤인 다이아몬드 패턴 매트"
1538168673-DescriptionKr = "핑크 다이아몬드 패턴이 반복되는 다이아몬드 패턴 매트. 귀엽고 아기자기한 느낌을 준다."
207142551-NameKr = "선샤인 내추럴 매트"
207142551-DescriptionKr = "자연 소재가 많이 사용된 내추럴 매트. 통기성이 좋고 가벼워서 어디든 들고 다니게 된다."
1592124213-NameKr = "선샤인 라탄 매트"
1592124213-DescriptionKr = "라탄 소재를 사용해 둥글게 말아 마무리한 매트. 어느 가구와 배치해도 잘 어울린다."
2881491135-NameKr = "선샤인 브런치 소파"
2881491135-DescriptionKr = "과일과 주스가 함께 놓인 브런치 소파. 아늑함과 달콤함이 휴식을 선사한다."
2664169208-NameKr = "선샤인 소파"
2664169208-DescriptionKr = "다양한 모양의 쿠션이 매력적인 소파. 산뜻한 색상과 포근함이 안정감을 준다."
554721548-NameKr = "선샤인 트로피컬 테이블"
554721548-DescriptionKr = "열대 과일과 식사가 준비된 트로피컬 테이블. 보는 것만으로 마음이 풍요로워지는 기분."
2262440972-NameKr = "선샤인 주스 테이블"
2262440972-DescriptionKr = "달콤한 과일과 상큼한 주스가 함께 자리한 주스 테이블. 더위가 물러가는 기분이다."
4126741064-NameKr = "선샤인 플라워 분수"
4126741064-DescriptionKr = "핑크빛 꽃이 가득 피어있는 플라워 분수. 시원한 느낌과 달콤한 향기를 동시에."
232967354-NameKr = "선샤인 줄무늬 소파"
232967354-DescriptionKr = "아늑한 차양이 마련되어 있는 줄무늬 소파. 아늑함을 가지고 싶은 이에게는 안성맞춤."
4082949419-NameKr = "선샤인 선베드 화이트"
4082949419-DescriptionKr = "따사로운 햇살을 받을 수 있는 선베드. 산뜻한 화이트 컬러가 인상적이다."
3361327025-NameKr = "선샤인 선베드 레몬"
3361327025-DescriptionKr = "따사로운 햇살을 받을 수 있는 선베드. 귀여운 레몬 컬러가 눈길을 끈다."
1416177935-NameKr = "선샤인 진열장"
1416177935-DescriptionKr = "고급 목재를 소재로 만들어진 진열장. 화이트 플라워를 곁들여 우아한 느낌을 더했다."
3596365973-NameKr = "선샤인 야자나무"
3596365973-DescriptionKr = "화이트 플라워가 가득 피어 있는 야자나무. 놓아두면 싱그러운 공기가 느껴진다."
1169747405-NameKr = "선샤인 화이트 플라워 화분"
1169747405-DescriptionKr = "화이트 플라워가 활짝 피어 있는 화분. 놓아두는 곳마다 활기를 불어넣어 준다."
4022204357-NameKr = "선샤인 오션뷰 윈도우"
4022204357-DescriptionKr = "바깥 바다가 보이는 선샤인 오션뷰 윈도우. 양 옆의 화이트 플라워의 포인트는 상쾌함을 더해준다."
3105102853-NameKr = "선샤인 비치 매트"
3105102853-DescriptionKr = "바다의 시원함을 느껴볼 수 있는 비치 매트. 공간에 산뜻함을 더한다."
3364171698-NameKr = "선샤인 러블리 벽지"
3364171698-DescriptionKr = "베이지 톤의 배색이 인상적인 러블리 벽지. 은은한 패턴이 안정감을 준다."
1361351300-NameKr = "선샤인 내추럴 바닥"
1361351300-DescriptionKr = "다양한 고급 목재가 패턴으로 조각되어 만들어진 내추럴 바닥. 매우 매끄럽다."
2727117241-NameKr = "선샤인 리조트 배경"
2727117241-DescriptionKr = "활기찬 기분과 여름의 설렘을 그대로 간직한 리조트 배경. 두근거림이 전해져 온다."
4045901954-NameKr = "선샤인 캐노피 소파"
4045901954-DescriptionKr = "우아한 레이스와 아기자기한 장식이 엿보이는 캐노피 소파. 포근한 느낌에 일어나기 싫어진다."
1674376645-NameKr = "선샤인 드링크바"
1674376645-DescriptionKr = "다양한 맛의 음료가 갖춰진 드링크바. 주변을 장식한 다채로운 꽃들이 음료의 입맛을 돋아준다."
120234292-NameKr = "선샤인 플라워 풀"
120234292-DescriptionKr = "화려한 꽃장식이 있는 플라워 풀. 바람이 불면 꽃잎이 물결 사이로 떨어진다."
2513190942-NameKr = "선샤인 트로피컬 풀"
2513190942-DescriptionKr = "열대과일 트레이가 있는 트로피컬 풀. 시원함과 달콤함을 동시에 즐길 수 있다."
4183959593-NameKr = "선샤인 레이스 테이블"
4183959593-DescriptionKr = "레이스 파라솔이 있는 레이스 테이블. 베이지 톤의 목제 테이블과 의자가 놓여 있다."
2854672646-NameKr = "선샤인 알로하 윈도우"
2854672646-DescriptionKr = "바깥의 경치를 한눈에 볼 수 있는 알로하 윈도우. 시원한 공기가 전해져 온다."
3948852357-NameKr = "쇼핑몰 모던 부티크 진열대"
3948852357-DescriptionKr = "세련된 물건과 모던한 절제가 돋보이는 모던 부티크 진열대. 깔끔한 구성이 눈길을 끈다."
2843447104-NameKr = "쇼핑몰 모던 가방 진열대"
2843447104-DescriptionKr = "오직 하나의 제품을 돋보이게 해주는 모던 가방 진열대."
1029383789-NameKr = "쇼핑몰 디자이너 소파"
1029383789-DescriptionKr = "심미성과 실용성이 돋보이는 디자이너 소파. 오랜 쇼핑을 잠시 쉬고 싶을 때 필수 가구."
3298716052-NameKr = "쇼핑몰 디자이너 다인용 의자"
3298716052-DescriptionKr = "양쪽으로 기대 쉴 수 있도록 고안된 디자이너 다인용 의자. 쉴 때도 느낌 있게."
3000301457-NameKr = "쇼핑몰 장바구니 진열대"
3000301457-DescriptionKr = "깔끔하게 장바구니가 진열된 장바구니 진열대. 아무리 많이 사들여도 안심."
3517538403-NameKr = "쇼핑몰 최신 잡지 진열대"
3517538403-DescriptionKr = "최신 잡지가 즐비한 선반. 최신 유행을 체크하자."
422081260-NameKr = "쇼핑몰 그림책 진열대"
422081260-DescriptionKr = "아이들의 키에 맞춘 앙증맞은 그림책 진열대. 아래에는 수납도 가능하다."
2058089340-NameKr = "쇼핑몰 모던 대리석 무늬 카펫"
2058089340-DescriptionKr = "모던한 대리석 무늬 카펫. 고급스러운 분위기를 자아내는 데에는 이만한 것이 없다."
966592390-NameKr = "쇼핑몰 롱 모던 대리석 무늬 카펫"
966592390-DescriptionKr = "모던한 대리석 무늬 카펫. 까는 것만으로도 고급스럽다."
1110368262-NameKr = "쇼핑몰 컴포트 베이지 카펫"
1110368262-DescriptionKr = "눈이 편안한 컴포트 베이지 카펫. 편안한 기분을 느낄 수 있다."
996442753-NameKr = "쇼핑몰 키디 체크무늬 카펫"
996442753-DescriptionKr = "체크무늬로 귀여운 느낌을 주는 키디 체크무늬 카펫. 쿠션이 있어 아이들에게 인기가 있다."
2253191261-NameKr = "화이트 레더 쿠션 체어"
2253191261-DescriptionKr = "부드러운 가죽으로 마감된 화이트 가죽 쿠션 의자. 앉는 순간부터 당신이 주역이다."
303399993-NameKr = "모모프렌즈 입간판"
303399993-DescriptionKr = "귀여운 모모프렌즈를 만날 수 있는 입간판. 쇼핑몰을 찾은 고객에게는 필수 포토스팟이다."
11622143-NameKr = "쇼핑몰 펜스"
11622143-DescriptionKr = "깔끔한 디자인과 절제가 돋보이는 쇼핑몰 펜스."
3928902562-NameKr = "쇼핑몰 무드 라이트"
3928902562-DescriptionKr = "우아한 디자인의 무드 라이트. 분위기를 바꿔준다."
2923636030-NameKr = "쇼핑몰 실버 파티션"
2923636030-DescriptionKr = "쿨하고 퓨어한 분위기의 실버 파티션."
3347896372-NameKr = "쇼핑몰 골드 파티션"
3347896372-DescriptionKr = "열정적이고 화려한 분위기의 골드 파티션."
93532265-NameKr = "쇼핑몰 싱그러운 자연 소파"
93532265-DescriptionKr = "진정한 휴식을 취할 수 있는 싱그러운 소파. 푸른빛이 편안함을 준다."
3655403000-NameKr = "쇼핑몰 스팟 라이트"
3655403000-DescriptionKr = "상품의 최상을 끌어내는 스팟 라이트. 아래에 놓아둔 제품들은 반드시 품절된다."
2506675602-NameKr = "쇼핑몰 와이드 테이블"
2506675602-DescriptionKr = "간단한 디자인으로 격조가 느껴지는 와이드 테이블. 어디에 두어도 잘 어울린다."
3920217594-NameKr = "쇼핑몰 모모프렌즈 네온 벽 장식"
3920217594-DescriptionKr = "귀여움과 세련된 감각이 공존하는 모모프렌즈 네온 벽 장식. 모두에게 인기 만점!"
2425908298-NameKr = "쇼핑몰 베이직 기둥"
2425908298-DescriptionKr = "순백의 화이트, 위엄을 나타내는 블랙 언더바, 그 사이를 교차하는 골드가 돋보이는 베이직 기둥."
411585928-NameKr = "쇼핑몰 교양 서가"
411585928-DescriptionKr = "제품과 함께 교양을 원하는 소비자들을 위한 서가. 패션부터 최신 경제 서적까지 다양하다."
3855951081-NameKr = "쇼핑몰 큐티 엘레강트 소파"
3855951081-DescriptionKr = "귀여움과 우아함은 공존할 수 있는가? 이 소파가 그 답을 제시해줄 것이다. 모두가 앉고 싶어 하는 소파."
988814768-NameKr = "쇼핑몰 모모프렌즈 의류 거치대"
988814768-DescriptionKr = "귀여운 모모프렌즈 모자와 옷, 슬리퍼가 갖춰진 모모프렌즈 의류 거치대."
3766457455-NameKr = "쇼핑몰 고급 탈의실"
3766457455-DescriptionKr = "여러 벌의 옷도 얼마든지 OK! 마음껏 옷을 입어볼 수 있는 쇼핑몰 고급 탈의실."
3091049367-NameKr = "쇼핑몰 심플 과일 진열대"
3091049367-DescriptionKr = "제철 과일이 차곡차곡 들어 있는 과일 진열대. 근처에 다가가면 달콤한 향이 난다."
3221041640-NameKr = "쇼핑몰 네이처 가든"
3221041640-DescriptionKr = "자연에서 나오는 아름다움을 느껴볼 수 있는 네이처 가든. 공간에 싱그러움을 더해준다."
3195263895-NameKr = "쇼핑몰 모던 키오스크"
3195263895-DescriptionKr = "쇼핑몰에서 길을 잃었다면 바로 이곳으로! 어디든지 알려주는 모던 키오스크."
1303798775-NameKr = "쇼핑몰 모모프렌즈 파티션"
1303798775-DescriptionKr = "모모프렌즈가 파티션으로 나왔다! 귀여운데다 공간도 나눠주는 기특한 파티션."
362684567-NameKr = "쇼핑몰 엘레강트 향수 진열대"
362684567-DescriptionKr = "시향부터 포장까지 함께 할 수 있는 엘레강트 향수 진열대. 근처만 가도 향기가 전해져 온다."
1456098985-NameKr = "쇼핑몰 엘레강트 구두 진열대"
1456098985-DescriptionKr = "코너 공간을 활용한 우아한 구성의 쇼핑몰 구두 진열대. 실용성과 미학을 동시에."
935678649-NameKr = "쇼핑몰 엘레강트 가방 진열대"
935678649-DescriptionKr = "코너에도 진열할 수 있도록 만들어진 엘레강트 가방 진열대. 영리한 공간 분할이 눈에 띈다."
3624370282-NameKr = "쇼핑몰 엘레강트 의류 진열대"
3624370282-DescriptionKr = "아래에는 의류를 진열하고 위에는 액세서리를 진열하는 엘레강트 의류 진열대."
2104197048-NameKr = "쇼핑몰 엘레강트 명품 진열대"
2104197048-DescriptionKr = "공간 활용보다는 보여주는 아름다움을 중시한 엘레강트 명품 진열대. 상품 하나하나가 눈에 띈다."
2327997342-NameKr = "쇼핑몰 모모프렌즈 장난감 진열대"
2327997342-DescriptionKr = "아이들의 눈길을 사로잡는 모모프렌즈 장난감 진열대. 아기자기한 구성이 귀엽다."
84164281-NameKr = "쇼핑몰 고급 대리석 타일"
84164281-DescriptionKr = "쇼핑몰의 분위기를 담당하는 고급 대리석 타일. 우아함과 깔끔함을 동시에 전해준다."
3072281616-NameKr = "쇼핑몰 럭셔리 벽지"
3072281616-DescriptionKr = "대담한 구성과 골드 라인이 돋보이는 럭셔리 벽지. 함께 놓인 상품들을 돋보이게 한다."
3758863591-NameKr = "쇼핑몰 럭셔리 배경"
3758863591-DescriptionKr = "럭셔리 패턴이 아름답게 수 놓인 럭셔리 배경. 우아한 분위기가 감돈다."
2538482771-NameKr = "쇼핑몰 모모프렌즈 풀장"
2538482771-DescriptionKr = "쇼핑몰을 찾은 아이들에게는 영원한 꿈의 공간, 모모프렌즈 풀장."
421326092-NameKr = "쇼핑몰 모모프렌즈 가판대"
421326092-DescriptionKr = "귀여운 모모프렌즈 상품을 구매할 수 있는 모모프렌즈 가판대."
792048723-NameKr = "쇼핑몰 모모프렌즈 쿠션 진열대"
792048723-DescriptionKr = "푹신푹신한 모모프렌즈 친구들이 가득! 하나만 고르기에는 너무 어려워! 모모프렌즈 쿠션 진열대."
2859769149-NameKr = "쇼핑몰 럭셔리 스페셜 진열대"
2859769149-DescriptionKr = "상품을 아름답게 돋보이게 하는 럭셔리한 스페셜 쇼케이스."
1158553897-NameKr = "쇼핑몰 대형 진열대"
1158553897-DescriptionKr = "과일과 상품을 많이 진열할 수 있는 깔끔한 진열장."
657013837-NameKr = "쇼핑몰 웨이브캣 자판기"
657013837-DescriptionKr = "웨이브캣이 그려진 자판기. 손님들에게 인기가 많다!"
659331947-NameKr = "쇼핑몰 와이드 윈도우"
659331947-DescriptionKr = "그래도 가끔은 하늘을 보자. 높은 쇼핑몰의 바깥 풍경을 구경할 수 있는 와이드 윈도우."
3457990485-NameKr = "브론즈 트로피 진열장"
3457990485-DescriptionKr = "브론즈 트로피 진열장"
240520085-NameKr = "실버 트로피 진열장"
240520085-DescriptionKr = "실버 트로피 진열장"
222189268-NameKr = "골드 트로피 진열장"
222189268-DescriptionKr = "골드 트로피 진열장"
3148790710-NameKr = "플래티넘 트로피 진열장"
3148790710-DescriptionKr = "플래티넘 트로피 진열장"
858151919-NameKr = "엘레강트 캔들 세트"
858151919-DescriptionKr = "화려한 촛대는 마치 빛으로 이루어진 꽃다발과 같다! 찬란함이 아름다운 캔들 세트."
839017025-NameKr = "웅장한 고급 카펫"
839017025-DescriptionKr = "웅장하고 과감한 딥블루 컬러와 부드럽고 유연한 패턴이 돋보이는 카펫."
2127860063-NameKr = "우아한 고급 카펫"
2127860063-DescriptionKr = "화이트 배경에 촘촘히 들어간 금장 장식이 아름다움을 뽐내는 카펫."
1812215032-NameKr = "명필가 데스크"
1812215032-DescriptionKr = "이 아름다운 책상에 앉으면 당신도 멋진 명필을 써낼 수 있다!"
877023354-NameKr = "게헨나식 석조 펜스"
877023354-DescriptionKr = "과감한 마감, 섬세한 부조가 돋보이는 석조 펜스. 놓는 순간 웅장한 분위기가 느껴진다."
3545716340-NameKr = "게헨나식 플래그"
3545716340-DescriptionKr = "게헨나의 위엄이 느껴지는 플래그. 모두의 자리를 더욱 빛내준다."
360909443-NameKr = "게헨나식 그랜드 플래그"
360909443-DescriptionKr = "게헨나의 웅장함이 돋보이는 그랜드 플래그. 격식이 필요한 자리에는 꼭 필요하다."
4130505278-NameKr = "게헨나식 목조 파티션"
4130505278-DescriptionKr = "섬세한 조각이 돋보이는 목조 파티션. 화려한 파티장에서 공간을 나누기 위한 필수 가구!"
1126057941-NameKr = "화이트 석조 화분"
1126057941-DescriptionKr = "신선한 식물이 아름답게 자리한 화이트 석조 화분. 우아한 분위기와 싱그러움을 동시에 느낄 수 있다."
2236454775-NameKr = "클래식 라이트 테이블"
2236454775-DescriptionKr = "은은한 라이트가 인상적인 테이블. 놓아두는 공간마다 산뜻함을 가져다준다."
458694634-NameKr = "그랜드 벽 장식"
458694634-DescriptionKr = "클래식한 디자인이 돋보이는 벽 장식. 밋밋한 벽에 위엄을 불어넣는 앨범이 포인트!"
4061847588-NameKr = "게헨나식 앨범"
4061847588-DescriptionKr = "화려한 프레임에 장식된 앨범. 우아한 파티에도 빠지지 않는 중요한 아이템이다."
1001007068-NameKr = "명작 책꽂이"
1001007068-DescriptionKr = "우아한 파티장을 장식하는 책꽂이. 게헨나 학생들의 추천 명작들로 이루어져 있다."
1250369711-NameKr = "바로크 양식 카펫"
1250369711-DescriptionKr = "화려한 장식이 돋보이는 바로크 양식 카펫. 바닥을 아름답게 장식해 준다."
268835141-NameKr = "클래식 2단 카트"
268835141-DescriptionKr = "오찬의 티타임과 저녁의 파티 모두에 어울리는 클래식 2단 카트. 항상 깨끗한 상태로 귀빈들을 기다린다."
4265579804-NameKr = "그랜드 샹들리에"
4265579804-DescriptionKr = "걸어두는 곳이 곧 연회장. 아름다운 디자인을 뽐내는 그랜드 샹들리에."
3772367627-NameKr = "플로라 분수대"
3772367627-DescriptionKr = "화려한 꽃향기가 어우러진 분수대. 시원한 향기가 공기 중에 흩어진다."
2266941929-NameKr = "클래식 소파"
2266941929-DescriptionKr = "위엄과 우아함이 동시에 느껴지는 소파. 부드러운 쿠션에 기대면 파티의 긴장을 풀 수 있다."
293775718-NameKr = "바이올렛 다인 소파"
293775718-DescriptionKr = "화려한 꽃과 금장 장식이 돋보이는 다인 소파. 앉아 있으면 파티의 새로운 얼굴들을 만나볼 수 있다."
1676310944-NameKr = "플로라 오찬 세트"
1676310944-DescriptionKr = "보라색 화병과 우아한 디자인의 의자가 돋보이는 오찬 세트. 귀빈들과 즐거운 대화를 나눌 수 있다."
2629185716-NameKr = "바이올렛 가든 화병"
2629185716-DescriptionKr = "하단의 부조가 눈길을 끄는 가든 화병. 파티의 분위기를 더욱 풍부하게 만들어준다."
991925900-NameKr = "화이트 가든 화병"
991925900-DescriptionKr = "높게 솟은 모습이 인상적인 가든 화병. 공간을 나누는 기둥으로도 적격이다."
163371450-NameKr = "벽걸이 클래식 캔들"
163371450-DescriptionKr = "은은한 조명을 원하는 공간에 잘 어울리는 벽걸이 클래식 캔들. 아늑한 분위기를 원할 때 좋다."
68751525-NameKr = "클래식 윈도우"
68751525-DescriptionKr = "파티장의 한 공간을 장식하는 윈도우. 장식된 커튼을 거두면 아름다운 전경이 펼쳐진다."
2293067181-NameKr = "그랜드 타일"
2293067181-DescriptionKr = "파티장의 아름다운 바닥을 장식할 타일."
1491893469-NameKr = "그랜드 벽지"
1491893469-DescriptionKr = "파티장에 산뜻함을 더해주는 벽지."
3358347867-NameKr = "클래식 배경"
3358347867-DescriptionKr = "파티장의 분위기를 더욱 풍성하게 해줄 클래식한 배경."
870330457-NameKr = "그랜드 발코니"
870330457-DescriptionKr = "조용한 파티를 즐기는 데 좋은 발코니. 야외의 전경을 바라보며 즐기는 음료는 각별하다."
3765659014-NameKr = "그랜드 데스크"
3765659014-DescriptionKr = "위엄과 아름다움이 돋보이는 데스크."
1871628685-NameKr = "그랜드 분수대"
1871628685-DescriptionKr = "화려한 연회를 장식하는 분수대. 퍼지는 파장을 보고 있으면 마음이 차분해진다."
1685405800-NameKr = "바이올렛 파티 테이블 세트"
1685405800-DescriptionKr = "올려둔 촛불의 화려함과 어울리는 달콤한 디저트를 즐길 수 있는 파티 테이블 세트."
1156027092-NameKr = "그랜드 파티 테이블"
1156027092-DescriptionKr = "먹음직스러운 음식과 달콤한 과일들이 가득 올려져 있는 파티 테이블."
552473441-NameKr = "그랜드 피아노"
552473441-DescriptionKr = "고급스러움이 느껴지는 그랜드 피아노. 화려한 파티의 끝을 장식해 줄 아름다운 선율을 선사한다."
1770195774-NameKr = "클래식 소파 테이블 세트"
1770195774-DescriptionKr = "차분하게 담소를 이어갈 수 있는 소파 테이블 세트. 우아한 분위기 속에 이야기가 무르익는다."
1597029036-NameKr = "트리니티 원목 수납장"
1597029036-DescriptionKr = "고급스러운 원목 재질이 돋보이는 수납장."
2943766715-NameKr = "장식된 트리니티 원목 수납장"
2943766715-DescriptionKr = "꽃병과 책이 놓인 수납장. 향기와 독서와 영리한 수납은 트리니티의 기본."
705548867-NameKr = "베이직 패턴 카펫"
705548867-DescriptionKr = "심플함이 돋보이는 카펫. 어디에나 잘 어울린다."
2353346596-NameKr = "클래식 패턴 카펫"
2353346596-DescriptionKr = "독특한 모양을 가진 클래식 패턴 카펫. 격식을 갖춰야 하는 자리에 안성맞춤이다."
3884395110-NameKr = "트리니티 육각 카펫"
3884395110-DescriptionKr = "푹신함이 느껴지는 육각형 카펫."
4261680652-NameKr = "블루 라인 카펫"
4261680652-DescriptionKr = "은은한 블루 라인이 수놓아진 블루 라인 카펫. 공간에 포인트를 줄 수 있는 아이템이다."
1641849722-NameKr = "트리니티 교실 책상"
1641849722-DescriptionKr = "트리니티 교실의 클래식한 책상 세트. 트리니티에서 흔히 볼 수 있지만 재료부터 마감까지 고급이다."
1907064674-NameKr = "트리니티 교실 기둥"
1907064674-DescriptionKr = "고급스러운 수직 무늬로 세련된 느낌을 주는 기둥."
1193459121-NameKr = "트리니티 교실 패턴 기둥"
1193459121-DescriptionKr = "섬세한 무늬가 눈길을 끄는 기둥. 고급스러움이 느껴진다."
2843641596-NameKr = "트리니티 교실 램프 기둥"
2843641596-DescriptionKr = "작은 램프가 설치되어 있는 기둥. 따듯한 빛이 교실을 밝힌다."
1104421410-NameKr = "트리니티 교실 칠판"
1104421410-DescriptionKr = "학생들의 낙서가 가득한 칠판. 분필도 마커도 원하는 대로 골라 사용할 수 있다!"
2720605122-NameKr = "트리니티 교실 교탁"
