1671798706-DescriptionTh = "อยู่ระหว่างแคมเปญรางวัลเข้าคลาส x{0}"
1252278296-NameTh = "แคมเปญรางวัลทัวร์โรงเรียน x{0}!"
1252278296-DescriptionTh = "อยู่ระหว่างแคมเปญรางวัลทัวร์โรงเรียน x{0}"
