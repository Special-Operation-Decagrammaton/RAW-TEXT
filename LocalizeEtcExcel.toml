358559959-NameKr = "온천장 본관"
358559959-DescriptionKr = "온천장에 처음 방문한 손님들이 마주하게 되는 장소입니다. 손님들의 체크인을 돕는 카운터와 가벼운 휴식을 즐길 수 있는 로비 시설이 위치하고 있습니다."
2825548492-NameKr = "대욕탕"
2825548492-DescriptionKr = "여러 사람이 동시에 목욕을 즐길 수 있는 대욕탕입니다. 온도와 성분을 조정한 다양한 기호의 욕탕이 준비되어 있습니다."
2481788820-NameKr = "숙소"
2481788820-DescriptionKr = "다다미와 좌식 탁자를 배치한 평범한 숙소입니다. 이불을 비롯한 침구 일체는 노도카가 매일 깨끗이 세탁하고 있습니다."
3141924738-NameKr = "휴게실"
3141924738-DescriptionKr = "목욕에 질린 손님들을 위한 휴게실입니다. 손님들이 자유로이 사용할 수 있는 탁구대와 안마의자 등이 구비되어 있습니다."
384904434-NameKr = "연회장"
384904434-DescriptionKr = "여러 사람이 동시에 식사를 즐길 수 있는 대규모의 연회장입니다. 그 규모와 화려함에 걸맞지 않게 메뉴로는 싸구려 불량식품만 제공되고 있습니다."
1433250290-NameKr = "노천탕"
1433250290-DescriptionKr = "눈이 내린 풍경을 감상하며 목욕을 즐길 수 있는 노천탕입니다. 간혹 목욕을 즐기러 산에서 내려 온 야생동물과 마주칠 수도 있습니다."
4060632693-NameKr = "별관"
4060632693-DescriptionKr = "VIP 손님을 위해 마련된 별관입니다. 본관에서 멀리 떨어져 있기 때문에 다른 손님들의 방해를 받지 않고 여유롭게 휴식을 즐길 수 있습니다."
4194626497-NameKr = "정원"
4194626497-DescriptionKr = "모래와 자갈로 꾸며진 고산수식 정원입니다. 아름다운 모습을 유지할 수 있도록 노도카가 매일 쌓인 눈을 치우고 있습니다."
3675272134-NameKr = "운영 본부"
3675272134-DescriptionKr = "대운동회의 운영 전반을 담당하는 운영 본부입니다. 경기의 운영은 물론이고 노점상의 등록과 관리도 이곳에서 이루어지고 있습니다."
1884871261-NameKr = "트랙"
1884871261-DescriptionKr = "경기장의 외곽을 따라 조성된 긴 경주로입니다. 장애물 경기 때 사용되는 폭발물에도 손상되지 않도록 튼튼한 소재로 포장되어 있습니다."
2410805514-NameKr = "소도구 창고"
2410805514-DescriptionKr = "대운동회에 사용되는 간단한 체육용 소도구를 보관하는 창고입니다. 안에서는 열 수 없도록 밖에서 잠기는 일이 잦아 출입할 때는 주의가 필요합니다."
2074635724-NameKr = "관중석"
2074635724-DescriptionKr = "경기를 관람할 수 있도록 경기장 2층에 조성된 관중석입니다. 학생 간의 응원전이 과열되지 않도록 좌석은 학교별로 구분되어 있습니다."
830995934-NameKr = "잔디구장"
830995934-DescriptionKr = "경기장의 중심부에 있는 넓은 필드입니다. 필드에 깔린 잔디는 인조 잔디이지만, 밀레니엄의 기술 덕분에 천연 잔디 이상으로 푹신하고 부드럽게 느껴진다고 합니다."
2054928448-NameKr = "중장비 창고"
2054928448-DescriptionKr = "대운동회에 사용되는 무거운 자재나 중장비를 보관하는 창고입니다. 기본적인 공구도 갖추어져 있어 가벼운 수리는 이곳에서 진행할 수 있습니다. "
1757505051-NameKr = "방송조정실"
1757505051-DescriptionKr = "대운동회의 경기 장면을 생생하게 중계할 수 있는 방송 중계실입니다. 심판의 오심을 막기 위한 비디오 리플레이 기능도 제공하고 있습니다."
1079056613-NameKr = "휴게실"
1079056613-DescriptionKr = "경기에 지친 선수와 방문객들이 자유로이 사용할 수 있는 휴게실입니다. 간단한 커피 머신과 음료수 디스펜서가 구비되어 있습니다."
3239184876-NameKr = "발키리 경찰학교 시라토리 지소"
3239184876-DescriptionKr = "발키리 경찰학교의 지소입니다. 울창한 녹지에 둘러싸여, 특히나 공기가 매우 좋다고 합니다."
2322223304-NameKr = "코기타운"
2322223304-DescriptionKr = "유명한 전자 상가 거리입니다. 구할 수 없는 물건을 제외하면 뭐든지 구할 수 있다는 소문이 돌기도 합니다."
1462360932-NameKr = "트라이 스퀘어"
1462360932-DescriptionKr = "휴식 공간으로도 사용되고, 만남의 장소로 사용되는 광장입니다. 산책하기에도 딱 좋은 장소입니다."
4293010634-NameKr = "제3 업무지구"
4293010634-DescriptionKr = "트라이 스퀘어 옆에 자리한 업무지구입니다. 현대적이고 세련된 공간으로, 도로와 건물이 복잡하게 어우러져 있습니다."
1977010791-NameKr = "플라도 애비뉴"
1977010791-DescriptionKr = "미술관이 자리하고 있는 거리입니다. 미술관 그 자체만으로도 방대하지만, 그 주위에 펼쳐져 있는 예술의 거리 역시 하나의 볼거리입니다."
1729072075-NameKr = "시라토리 근린 공원"
1729072075-DescriptionKr = "공원의 규모에 비해 방문하는 사람들이 수가 많지 않은 편이지만, 그래도 없어서는 안 되는 곳입니다."
2590301450-NameKr = "카네사키 항구"
2590301450-DescriptionKr = "바다를 보고 싶다면 이곳으로 찾아가는 것도 좋은 방법입니다. 어쩌면 상상하던 그 풍경은 아닐지도 모르겠지만요."
4121383175-NameKr = "라미니 타운"
4121383175-DescriptionKr = "각 학교의 음식 명소에도 절대 밀리지 않는 음식 거리입니다. 좁은 폭의 강 양옆으로 무수한 노점과 음식점들이 늘어서 있습니다."
2853338239-NameKr = "출입구 구역"
2853338239-DescriptionKr = "게임개발부실에 들어오면, 가장 먼저 손님들을 맞이해 주는 장소입니다. 놓인 신발의 개수는 때와 상황에 따라 달라집니다."
2194359054-NameKr = "휴식 공간"
2194359054-DescriptionKr = "오래 사용하여 방석이 낡고 해진 소파입니다. 겉모습은 볼품없어도 게임개발부의 안락한 휴식을 도와주는, 없어서는 안 될 가구입니다."
2190051001-NameKr = "장식 선반 구역"
2190051001-DescriptionKr = "게임 개발에 필요한 노트북을 비롯하여 자주 읽는 매뉴얼, 먹다 만 에너지 드링크 캔까지 온갖 물건이 올려져 있는 다용도 선반입니다. 정기적으로 청소를 해도 금세 어질러지고 맙니다."
2420465823-NameKr = "게임 공간"
2420465823-DescriptionKr = "게임개발부의 보물이자 창의력의 근원이라고 할 수 있는 레트로 게임기가 모여 있는 거치대입니다. 오래된 게임 카트리지는 먼지와 충격에 취약하므로 그 어느 곳보다 깨끗하게 관리되고 있습니다."
4038677162-NameKr = "두툼한 러그 지역"
4038677162-DescriptionKr = "층간 소음을 방지하기 위해 게임개발부 부실 한 가운데 설치된 두툼한 러그입니다. 격렬한 댄스 게임이나 액션 게임을 진행해도 포근히 충격을 흡수해 줍니다."
2856573316-NameKr = "유즈의 캐비닛 공간"
2856573316-DescriptionKr = "게임개발부 부장, 유즈의 안락한 쉼터이자 도피처로 사용되는 캐비닛입니다. 밖에서 보기에는 좁아 보여도 하루 이상 버틸 수 있을 만한 오락 거리나 간식 등이 충분히 갖춰져 있습니다."
4243041319-NameKr = "인벤토리 철제 책장 공간"
