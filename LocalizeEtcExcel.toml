2814968857-DescriptionTw = "※每次進行招募都會獲得回憶點數。可收集回憶點數來獲得陣容中的學生。特選期間結束後，點數將轉換為啟動石碎片。\n[c][ff2d2c]回憶點數與招募點數、檔案點數不同，無法與其他招募所獲得的點數累計。[-][/c]"
2803570054-NameTw = "檔案點數"
2803570054-DescriptionTw = "※ 進行招募時可獲得檔案點數。可藉由累積檔案點數獲得列表中的學生。"
3125687171-NameTw = "戰術硬幣"
3125687171-DescriptionTw = "可在戰術大賽商店中使用的硬幣。"
471603600-NameTw = "下級合成用啟動石"
471603600-DescriptionTw = "啟動工藝室的合成物質功能時所需的楔石。"
284088691-NameTw = "活動點數"
284088691-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
3146510308-NameTw = "狐狸仙貝"
3146510308-DescriptionTw = "是百鬼夜行舉辦慶典時的商店街名產。鬆脆的口感及香味堪稱極品。 "
1959694325-NameTw = "狸貓大阪燒"
1959694325-DescriptionTw = "是百鬼夜行慶典不可或缺的食物。用美乃滋畫的狸貓真的是可愛到不行。"
2308340710-NameTw = "櫻花大福"
2308340710-DescriptionTw = "百鬼夜行的傳統喫茶店「百夜堂」的經典甜點。濃厚但不過分甜味只能用「無敵」來形容。"
2902974760-NameTw = "潔莉諾俄羅斯娃娃"
2902974760-DescriptionTw = "仿照潔莉諾的威容製成的俄羅斯娃娃。搖晃時，會意外發現裡面塞了很多東西。"
904092714-NameTw = "印有潔莉諾畫像的巧克力"
904092714-DescriptionTw = "赤冬生產的知名巧克力。雖然口感香甜柔順，但因為氣候嚴寒，赤冬的學生認為它是堅硬而難以食用的巧克力。"
2871602548-NameTw = "鬍子可麗餅"
2871602548-DescriptionTw = "在赤冬各處販售的香甜可口可麗餅。在學園內也被稱為「Blini」。鬍子造型的奶油裝飾必須通過潔莉諾的審查。"
3168602557-NameTw = "勇猛鬍鬚勳章"
3168602557-DescriptionTw = "只有得到潔莉諾認可的學生才能獲得，一枚用黃金精心打造的特別勳章。因為有很多稜角，碰到的話很痛，所以通常都把它收進書桌的深處。"
532264540-NameTw = "活動點數"
532264540-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
3071036351-NameTw = "沙灘排球"
3071036351-DescriptionTw = "看起來很可愛的沙灘排球。"
589252219-NameTw = "海之家餐券"
589252219-DescriptionTw = "可以在海之家使用，經常因為淋濕而難以辨識文字的餐券。"
3265516866-NameTw = "沖天炮"
3265516866-DescriptionTw = "尺寸可愛的火箭型煙火。"
4230562605-NameTw = "冰桶"
4230562605-DescriptionTw = "可以幫助水果和飲料等物品保持冰涼的冰桶。用來保管對溫度敏感的軍火也很有用。"
182033757-NameTw = "玩沙工具組"
182033757-DescriptionTw = "玩沙工具組，包含可以堆出簡單沙堡的工具。不包含水泥和鋼筋。"
3004794592-NameTw = "沙灘椅"
3004794592-DescriptionTw = "將原木椅子鋪上柔軟的布料，打造出充滿現代感的沙灘椅。經防水處理，即使在海邊也可安心使用。"
2064901758-NameTw = "遮陽傘桌"
2064901758-DescriptionTw = "原木桌，包含能遮擋陽光的遮陽傘。優雅的淑女即使在海邊也不能錯過午茶時間。"
1274276475-NameTw = "水中活動裝備"
1274276475-DescriptionTw = "包含潛水面鏡及呼吸器等的正式水中活動裝備。不建議用於水深50m以下。"
1644359218-NameTw = "風帆船"
1644359218-DescriptionTw = "利用風流在海面上滑行的交通工具。設計上容易掌握平衡，初學者也可以輕鬆上手。"
886310733-NameTw = "印有格黑娜校徽的補給箱"
886310733-DescriptionTw = "風紀委員會為了迎接夏季合宿訓練親自準備的補給箱。\n裡面裝著有助於訓練的物品。沒有空箱，可以放心使用。"
2668075095-NameTw = "美食研究會的烤玉米"
2668075095-DescriptionTw = "美食研究會親製作的烤玉米。\n雖然是常見的食材，但添加了美食研究會每位成員個自喜好的味道！……也就說，無法保障口味。"
1254096944-NameTw = "夏季的太妹太陽眼鏡"
1254096944-DescriptionTw = "風紀委員會從在夏季海灘滋事的「罪ｉ搗亂」泳裝太妹集團手中沒收的太陽眼鏡。\n上面一些刮痕，但他們說絕對不是因抵抗而留下的痕跡。"
104149602-NameTw = "溼答答的頭盔"
104149602-DescriptionTw = "風紀委員會從在夏日的貧民窟鬧事的「溼答答頭盔團」手中沒收的頭盔。\n雖然有點傷痕，但聽說是和平扣押的。確實有點濕濕的。"
2553698243-NameTw = "活動點數"
2553698243-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1847672830-NameTw = "烏龜菇"
1847672830-DescriptionTw = "自然分佈於山海經自治區全域，外觀華麗的蘑菇。\n和華麗的外觀不同，口感紮實，味道也不錯，是受歡迎的食物。"
357098688-NameTw = "烏竹筍"
357098688-DescriptionTw = "生長於玄龍門庭園的黑色竹筍。\n受到玄龍門的幹部嚴加管理，因此難以取得。"
3708418519-NameTw = "人形蔘"
3708418519-DescriptionTw = "被發現於山海經的深山中，根部貌似人類的藥草。\n據說具有延長壽命或減齡的效果。"
3320765287-NameTw = "巧克力硬幣"
3320765287-DescriptionTw = "黃金芙利號的代表性零食之一。雖然不是真正的硬幣，但因為滋味可口，在學生之間很受歡迎。"
312190930-NameTw = "兔子貼紙"
312190930-DescriptionTw = "學生們到處亂貼的兔子貼紙。沒什麼特別的意義。因為容易製作，大部分的學生都自己做出來貼。"
3290352412-NameTw = "乘船券"
3290352412-DescriptionTw = "黃金芙利號郵輪的乘船券上船後參加內部典禮或活動時經常需要出示，最好隨身攜帶。"
812405886-NameTw = "骰子"
812405886-DescriptionTw = "老是在船上發現的骰子。雖然只是單純的玩具，不過也會用於解決學生之間的紛爭。"
3202962982-NameTw = "活動點數"
3202962982-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1102568152-NameTw = "溫泉毛巾"
1102568152-DescriptionTw = "溫泉浴場227號所提供的基本毛巾。材質多少有點粗糙，用力擦身體的話皮膚可能會受傷。"
4012080640-NameTw = "鬍子洗髮精"
4012080640-DescriptionTw = "潔莉諾會長愛用的赤冬學園特製洗髮精。和名稱不符，實際上不適合拿來洗鬍子。"
2585452848-NameTw = "水豚入浴劑"
2585452848-DescriptionTw = "水豚造型的固體入浴劑。放到水中會漸漸融化並散發柑橘香。"
1545493133-NameTw = "特製新年福袋"
1545493133-DescriptionTw = "正月期間黑龜組所準備的正月用福袋。開封前完全猜不到裡面有什麼的驚喜道具。內容物出乎意料地充實。"
1215702584-NameTw = "佩洛洛鏡餅"
1215702584-DescriptionTw = "被金錢蒙蔽雙眼的黑龜組為紀念正月而和超人氣吉祥物佩洛洛聯名推出的鏡餅。說到底只是裝飾用的擺設，不能食用。"
130031945-NameTw = "黑龜組繪馬"
130031945-DescriptionTw = "黑龜組在新春活動會場販售的繪馬。據傳繪馬搭配賽錢許願即可提升效力。或許正是因為這個傳言，一個繪馬居然要價五千日圓，價格十分離譜。"
3586118070-NameTw = "正月御神籤\n抽籤券"
3586118070-DescriptionTw = "正月抽御神籤所需的抽籤券。其實本來並不需要這個東西，只是黑龜組為了賺錢而製造出來的產品，卜卦完會依據結果給予不同商品。"
518432250-NameTw = "活動點數"
518432250-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1669990889-NameTw = "問題兒童悔過書"
1669990889-DescriptionTw = "負責情人節巡邏工作的老師制服問題兒童後收到的悔過書。內容出乎意料地紮實。   "
2861703465-NameTw = "沒收的不良便宜點心"
2861703465-DescriptionTw = "在情人節巡邏工作途中從問題兒童手中沒收的便宜點心。據說是未經許可便在地下社會製造流通的商品。因為不健康的口味在問題兒童間非常有人氣。"
2887327615-NameTw = "環境美化活動用制式袋子"
2887327615-DescriptionTw = "裝有透過情人節巡邏工作，在四處回收的垃圾的袋子。確實的環境美化活動很有意義。 "
3085567581-NameTw = "情人節外出券"
3085567581-DescriptionTw = "情人節來臨之際，忙於巡邏工作的老師為了與學生見面而需要的外出券。\n※ 未使用的外出券將在活動結束後轉換成200,000信用貨幣。"
1632581989-NameTw = "若藻逮捕令"
1632581989-DescriptionTw = "為了逮補若藻，而從女武神警察學園取得的逮捕令。上面寫著若藻一直以來犯下的可怕罪行。"
3974882278-NameTw = "活動點數"
3974882278-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
2114880617-NameTw = "修女會的頭巾"
2114880617-DescriptionTw = "修女會使用的頭巾。使用得當的話，就算在祈禱中打瞌睡也不會被發現，但恐怕是沒有學生敢這麼做。"
4200143845-NameTw = "三一的聖歌集"
4200143845-DescriptionTw = "將三一的聖歌以書的形式整理成冊。因為經常在各種情況下被引用而廣為人知，但主要原因還是它廣受好評的美麗辭藻。"
2925208730-NameTw = "三一的燭台"
2925208730-DescriptionTw = "三一的教堂等地方會使用的燭台。構造相當重又結實，掉到地板上的話會砸出個洞來。"
315453169-NameTw = "甲蟲皇后卡牌包"
315453169-DescriptionTw = "人氣交易卡片遊戲甲蟲皇后的第3個擴張組合包<究級昆蟲合集>系列。據楓所說，如果摸摸看，似乎可以根據觸感知道裡面是不是有稀有卡片。"
2801049295-NameTw = "學園交流會傳單"
2801049295-DescriptionTw = "公告百鬼夜行和格黑娜學園間的交流會將要舉辦的傳單。上面除了有主辦人仁耶的問候，也有這次交流會的主要行程。"
3117990777-NameTw = "和樂公主的扇子"
3117990777-DescriptionTw = "繪有百鬼夜行聯合學園人氣偶像知世的臉的扇子。好可愛！好酷！我想要！以這些評價，在粉絲之間非常有人氣。"
1122375527-NameTw = "忍佩洛玩偶商品"
1122375527-DescriptionTw = "在漩渦電影村販賣的忍者角色商品。一開始是以某個角色的衍生角色開始，卻莫名大受歡迎而成為獨立角色的案例，在業界經常出現。"
2333680348-NameTw = "材料箱"
2333680348-DescriptionTw = "被拋棄在廢棄渡假勝地各處的材料箱。\n因為被棄置多時，無法得知裡面有什麼東西。"
923224583-NameTw = "地區貨幣"
923224583-DescriptionTw = "為了復興觀光業而製成的「失樂園渡假勝地」的地區貨幣。雖然無法得知是否有效，但是靜子似乎說過「那種事只要親自證明不就行了！」。"
1459837138-NameTw = "百夜堂閃亮亮硬幣"
1459837138-DescriptionTw = "可於百夜堂大海之家兌換紀念品的硬幣。不過大部分的客人都把硬幣當作是紀念品。"
2503861371-NameTw = "平滑光亮海螺"
2503861371-DescriptionTw = "外殼感覺平滑光亮的海螺。按照知世所述，只要拿到耳邊聆聽海螺傳來的聲音，就能自然地獲得靈感。"
3295998236-NameTw = "夏日用忍法圖鑑卷軸"
3295998236-DescriptionTw = "寫有許多能在夏日使用的各種忍法（創作）的卷軸。大多都與會在夏天發生的安全事故有關。對忍者來說，也是安全第一！"
4253247347-NameTw = "海洋深層水溫泉島渡假勝地使用券"
4253247347-DescriptionTw = "記載著海洋深層水溫泉島渡假勝地使用權限的渡假勝地使用券合約"
2442357514-NameTw = "甲蟲皇后郵輪渡假勝地使用券"
2442357514-DescriptionTw = "記載著甲蟲皇后郵輪渡假勝地使用權限的渡假勝地使用券合約"
4133487383-NameTw = "超豪華渡假勝地使用券"
4133487383-DescriptionTw = "記載著超豪華渡假勝地使用權限的渡假勝地使用券合約"
125540590-NameTw = "甜點優惠券"
125540590-DescriptionTw = "著名甜點店發放的甜點優惠券。根據收集的數量，可兌換不同的甜點。"
3387762043-NameTw = "薄荷巧克力聖代"
3387762043-DescriptionTw = "擁有獨特口味的薄荷巧克力聖代。是能同時享受沁涼與香甜的甜點。"
806537948-NameTw = "馬卡龍"
806537948-DescriptionTw = "手心大小的馬卡龍。種類繁多，存在各種口味。"
336149210-NameTw = "威化卷心酥"
336149210-DescriptionTw = "空心且長條的巧克力味餅乾。有時候孩子們想要裝腔作勢的時候就會咬在嘴裡晃著。"
2418932586-NameTw = "活動點數"
2418932586-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1874282437-NameTw = "沙包"
1874282437-DescriptionTw = "用豆子和沙子裝滿軟布製成的袋子。軟軟的，就算被打到也沒有受傷之虞，適合用於投球等比賽。偶爾會發現真的會爆炸的沙包。"
3048078452-NameTw = "千年旗幟"
3048078452-DescriptionTw = "畫著千年校徽的小旗幟。標示折返點或告知集合地點時使用。"
2524752608-NameTw = "哨子"
2524752608-DescriptionTw = "用工程師部的尖端技術製成的特製哨子。吹氣時震動膜會產生電子信號，啟動會發出鳥鳴聲的揚聲器，是由複雜的結構組成。"
2871055877-NameTw = "運動飲料"
2871055877-DescriptionTw = "千年開發的特製運動飲料。以訓練部的科學數據為基礎進行開發，據說補充水分的速度比其他飲料更快。"
1469297879-NameTw = "接力棒"
1469297879-DescriptionTw = "進行接力賽時使用的棒子。雖然長得像舊式柄狀手榴彈，但此為裝有電子感測器的尖端產品，在一定時間內交給下一棒跑者就絕對不會爆炸。"
2043178916-NameTw = "紅豆麵包"
2043178916-DescriptionTw = "進行吃麵包競走時使用的包著塑膠袋的紅豆麵包。雖是只有包著豆沙餡的簡單麵包，但卻大受部分女武神警察學園學生好評。"
3227336825-NameTw = "指南手冊"
3227336825-DescriptionTw = "晄輪大祭實行委員本部發的指南手冊。除了賽程之外，還詳細記載著場地附近的美食地圖。"
2905328212-NameTw = "聖誕禮物"
2905328212-DescriptionTw = "在聖誕節當天，大家所等的就是這個。根據流傳的傳說，愛哭的孩子是得不到禮物的。"
1128970523-NameTw = "聖誕襪"
1128970523-DescriptionTw = "抱著等待意外之禮的心情掛上的襪子。穿上時會很溫暖。"
4179360865-NameTw = "拐杖糖"
4179360865-DescriptionTw = "做成拐杖造型的聖誕節糖果。通常是薄荷口味。"
1459661267-NameTw = "蛋奶酒"
1459661267-DescriptionTw = "用牛奶、雞蛋和砂糖製作的熱飲。在寒冷的天氣喝，身體就會暖起來。"
1234657893-NameTw = "活動點數"
1234657893-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
2264400688-NameTw = "紅白魚板"
2264400688-DescriptionTw = "紅白兩色的魚板。紅色代表福氣，白色代表淨化。"
3707337679-NameTw = "真鯛"
3707337679-DescriptionTw = "御節料理中和蝦子一樣都是無法或缺的海鮮。和美味的鯛魚一起祝賀新的一年吧。"
2091304235-NameTw = "御神籤交換券"
2091304235-DescriptionTw = "大家都說是好玩才抽的，但如果出現不好的結果，心情就會變得很微妙。"
2629342802-NameTw = "多次元演算迴路"
2629342802-DescriptionTw = "阿特拉哈西斯的方舟中掉落的演算裝置的碎片。由複雜的迴路組成。"
1015134010-NameTw = "次元引擎零件"
1015134010-DescriptionTw = "次元引擎中掉落的零件。現在只是廢棄的機器零件，似乎沒有可派用場的部分。"
3353425290-NameTw = "太空巧克力漢堡"
3353425290-DescriptionTw = "有人說要當作太空糧食使用而密封處理的巧克力漢堡。巧克力漢堡為何會密封處理至今還是一個謎。"
3142506941-NameTw = "大門解鎖密碼 - 外圍2區"
3142506941-DescriptionTw = "附有可開啟外圍2區大門的解鎖密碼的辨識晶片。"
2995130259-NameTw = "大門解鎖密碼 - 外圍3區"
2995130259-DescriptionTw = "附有可開啟外圍3區大門的解鎖密碼的辨識晶片。"
1012273839-NameTw = "大門解鎖密碼 - 中央區"
1012273839-DescriptionTw = "附有可開啟中央區大門的解鎖密碼的辨識晶片。"
344128946-NameTw = "活動點數"
344128946-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1355249104-NameTw = "聯邦學生會的安全帽"
1355249104-DescriptionTw = "刻印有聯邦學生會標誌的安全帽。是為了本次的修復作業特別製作的。"
2999413236-NameTw = "財務報告書"
2999413236-DescriptionTw = "聯邦學生會行政委員會底下的財務室使用的財務報告書。詳細整理了奇普托斯的財務狀態相關內容。"
636205895-NameTw = "明太子餅乾"
636205895-DescriptionTw = "桃香喜歡吃的明太子餅乾。鹹鹹的風味堪稱一絕。"
832973929-NameTw = "乾淨的喀秋莎"
832973929-DescriptionTw = "髮帶的一種。乾淨整齊的髮箍似乎是展現女僕力量的必備品。"
3488365730-NameTw = "化妝套組"
3488365730-DescriptionTw = "塞滿了整理儀容用的工具組。化妝本來的目的自不必說，如果能熟練使用的話，也可以做為變裝工具使用。"
1069023790-NameTw = "宅邸的邀請函"
1069023790-DescriptionTw = "從歷史悠久的宅邸寄來的邀請函。據說那裡同時發生了多起不可思議的事件。"
611002646-NameTw = "卡片牌組"
611002646-DescriptionTw = "在山海經內相當受歡迎的卡片遊戲牌組。收集得越多，能玩的遊戲就越多。"
1712890776-NameTw = "玄武商會餐券"
1712890776-DescriptionTw = "玄武商會發行的餐券。帶著的話就會受到玄武商會的盛情款待。"
1093209845-NameTw = "玄龍門徽章"
1093209845-DescriptionTw = "畫有玄龍門紋樣的徽章。雖然是作為周邊商品販賣，但不是很有人氣……"
133960514-NameTw = "溶劑提取套組"
133960514-DescriptionTw = "任何人都能上手的溶劑提取套組。有傳聞說梅花園不願意添購。"
4287098248-NameTw = "高級鋼筆"
4287098248-DescriptionTw = "聯邦學生會審批用的高級鋼筆。因為筆尖的墨水很順暢，使手部不容易疲勞。"
3217702690-NameTw = "冷凍蝦"
3217702690-DescriptionTw = "捕獲後馬上冷凍，新鮮保存的蝦子。是夜戶浦村的特產，交付給D.U.的蝦子幾乎都是在夜戶浦村捕獲的。"
4278574452-NameTw = "小石頭"
4278574452-DescriptionTw = "海岸上常見的小石子。乍看很普通，但由於長時間被海浪及砂土打磨，沾水後的色澤令人深深著迷。"
4062911234-NameTw = "貝殼"
4062911234-DescriptionTw = "海岸上常見的小貝殼。乍看很平凡，但每一個的花紋及形狀都是獨一無二的。"
759180874-NameTw = "曬乾的海星"
759180874-DescriptionTw = "放在碼頭上的乾燥海星。因為不能吃，又不容易腐爛，所以被村民們對它們感到很頭痛，但美優似乎對這些海星有著莫名的親近感。"
1788699589-NameTw = "骰子確認券"
1788699589-DescriptionTw = "可查看骰子賽跑結果的優惠券。沒有人知道究竟會出現什麼數字的優惠券。"
862021401-NameTw = "骰子1確認券"
862021401-DescriptionTw = "可查看骰子賽跑結果的優惠券。若在查看結果骰子時選擇1之面，將消耗優惠券。"
3530266131-NameTw = "骰子2確認券"
