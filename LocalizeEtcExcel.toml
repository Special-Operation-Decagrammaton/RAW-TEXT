[translation]
3194776850-NameKr = "업무관 집무실"
3194776850-DescriptionKr = "사무 업무에 필요한 다양한 사무 집기들이 놓여있는 집무실입니다.\n선생님은 주로 이곳에서 머무르며 샬레의 업무를 처리합니다."
1907901108-NameKr = "시청각실"
1907901108-DescriptionKr = "영상매체를 감상할 수 있는 대형 스크린이 설치된 시청각실입니다.\n각종 드라마나 영화, 유행하는 애니메이션 등을 이곳에서 감상할 수 있습니다."
358080736-NameKr = "체육관"
358080736-DescriptionKr = "코트와 관객석이 설치된 대형 체육관입니다.\n다양한 스포츠 용품들도 완비되어 있습니다."
4294611526-NameKr = "게헨나 제1교사"
4294611526-DescriptionKr = "게헨나 중앙구의 가장 큰 교사입니다.\n많은 수의 교실이 있지만, 제대로 수업이 진행되는 곳은 별로 없습니다."
1274324253-NameKr = "게헨나 동아리 본관"
1274324253-DescriptionKr = "게헨나 동아리실이 모여 있는 건물입니다.\n하지만 대부분 학생들의 자유 공간으로 이용되고 있습니다."
358653965-NameKr = "게헨나 중앙교정"
358653965-DescriptionKr = "넓은 부지를 자랑하는 중앙 교정입니다.\n제대로 관리되고 있지 않아서 길을 잃을 수도 있으니 주의가 필요합니다."
2196189972-NameKr = "게헨나 중앙운동장"
2196189972-DescriptionKr = "게헨나 중앙 운동장입니다.\n다양한 체육 활동이나 실외 활동을 할 수 있습니다."
1866984703-NameKr = "게헨나 제2교사"
1866984703-DescriptionKr = "게헨나 중앙구의 2교사입니다.\n1교사와는 달리, 공부에 뜻이 있는 일부 학생들이 학업에 열중하고 있는 곳입니다."
3032755222-NameKr = "게헨나 학생광장"
3032755222-DescriptionKr = "학생들이 자유롭게 이용 가능한 광장입니다.\n많은 학생들이 오가는 곳이기에 싸움이 끊이질 않습니다."
970571410-NameKr = "게헨나 선도부 본부"
970571410-DescriptionKr = "게헨나 선도부 본부입니다.\n중앙구에서 거의 유일하게 제대로 관리되고 있는 곳입니다."
1533671597-NameKr = "게헨나 폐교사"
1533671597-DescriptionKr = "지금은 사용하지 않는 건물입니다.\n시설은 폐쇄되었지만 자유롭게 출입이 가능해서 문제의 온상이 되고 있습니다. 굉장히 위험한 지역이니 주의가 필요합니다."
261901867-NameKr = "도서관"
261901867-DescriptionKr = "학생들의 학습과 선생님의 업무에 필요한 다양한 책들이 구비된 도서실입니다. \n흥미 위주의 만화책과 라이트노벨 등도 구비되어 있습니다."
1983840990-NameKr = "아비도스 제1본관"
1983840990-DescriptionKr = "아비도스 학생들이 주로 활동하는 아비도스 제1본관입니다.\n평소 대책위원회 학생들이 열심히 관리하고 있기 때문에, 매일 같이 부는 모래바람 속에서도 청결을 유지하고 있습니다."
3073680445-NameKr = "아비도스 별관"
3073680445-DescriptionKr = "본관에서 바로 복도로 이어져 있는 아비도스의 별관입니다.\n이제는 쓰이지 않는 과학실이나 음악실 등 특별활동실이 모여있습니다."
3030528899-NameKr = "아비도스 운동장"
3030528899-DescriptionKr = "체육수업이나 운동회 등, 각종 체육활동이 이루어지는 운동장입니다.\n지금은 관리가 힘들어 모래에 파묻혀 있습니다."
4060200853-NameKr = "아비도스 도서관"
4060200853-DescriptionKr = "공부하거나, 책을 읽기 위해 방문할 수 있는 도서관입니다.\n공부를 위한 각종 도서부터, 흥미본위의 잡지나 만화책까지. 아비도스에서 인기 있었던 다양한 책을 만나볼 수 있습니다."
4149434655-NameKr = "아비도스 수영장"
4149434655-DescriptionKr = "평소엔 잘 쓰이지 않는 아비도스의 수영장입니다.\n덕분에 물은 메마르고, 바닥은 갈라진 채로 모래가 쌓여있습니다."
2812564490-NameKr = "아비도스 체육관"
2812564490-DescriptionKr = "실내 체육 활동은 물론 강당의 역할도 겸하고 있는 체육관입니다.\n지금은 쓰이지 않는 자재나 운동 도구 등이 보관되어있습니다."
3019364332-NameKr = "아비도스 매점"
3019364332-DescriptionKr = "어떤 학생이라도 좋아하는 매점입니다.\n물품의 가짓수는 다른 학교에 비해 부족하지만, 키보토스에서 인기 있는 빵이나 과자 등은 지금도 구매 가능합니다."
2602511445-NameKr = "아비도스 구교사"
2602511445-DescriptionKr = "본래 각종 동아리실의 쉼터로 쓰이던 교사였습니다.\n지금은 시설이 낡고 위험해져 폐쇄된 상태로 있지만, 가끔 학생들이 담력시험 삼아 방문하고는 합니다."
774508018-NameKr = "교실"
774508018-DescriptionKr = "여러 학생들이 동시에 수업을 듣고 공부를 할 수 있는 교실입니다.\n학생들이 자습을 하거나 개인 연구 과제를 발표할 때 사용합니다."
1925286931-NameKr = "밀레니엄 타워"
1925286931-DescriptionKr = "세미나를 포함한 밀레니엄의 주요 동아리들이 위치한 거대한 타워입니다.\n곳곳에 최첨단 보안 시스템이 설치되어 외부인의 출입을 제한하고 있습니다."
698860447-NameKr = "모노레일 스테이션"
698860447-DescriptionKr = "학원 곳곳으로 빠르게 이동할 수 있는 모노레일 스테이션입니다.\n밀레니엄의 모노레일은 빠르지만, 소음과 흔들림이 거의 없습니다."
2688045816-NameKr = "도서관"
2688045816-DescriptionKr = "밀레니엄 학생들의 연구에 필요한 다양한 도서가 구비된 도서관입니다.\n다큐멘터리와 같은 영상 매체도 이곳에서 열람할 수 있습니다."
1022652590-NameKr = "교내 매점"
1022652590-DescriptionKr = "휴식을 위한 빵과 음료수를 판매하는 교내 매점입니다.\n가장 인기 있는 메뉴는 더블샷 에스프레소와 에너지 드링크입니다."
2885237148-NameKr = "공업 실습실"
2885237148-DescriptionKr = "다양한 공학 실험을 진행할 수 있는 공업 실습실입니다.\n대형 3D 프린터를 포함한 최첨단 장비들이 갖춰져 있습니다."
3070757653-NameKr = "데이터 센터"
3070757653-DescriptionKr = "대형 서버와 네트워크 회선이 설치된 데이터 센터입니다.\n밀레니엄의 귀중한 연구 자료들이 저장되어 있습니다."
1295016811-NameKr = "발전소"
1295016811-DescriptionKr = "밀레니엄 학원에 필요한 전기를 생산하는 발전소입니다.\n친환경 발전 시설을 채택하여 공해가 거의 발생하지 않습니다."
895510277-NameKr = "피트니스 센터"
895510277-DescriptionKr = "연구로 지친 몸을 단련할 수 있는 피트니스 센터입니다.\n최첨단 분석 장비가 학생들에게 최적화된 트레이닝을 제공합니다."
3140661513-NameKr = "실습실"
3140661513-DescriptionKr = "간단한 과학 실험을 진행할 수 있는 실습실입니다.\n위험한 약품과 날카로운 기구가 많은 만큼 안전사고에 유의합시다."
2871272188-NameKr = "트리니티 대성당"
2871272188-DescriptionKr = "트리니티에서 가장 거대한 건물이며 트리니티의 상징과도 같은 곳입니다.\n시스터후드의 본부이기도 합니다."
3137866576-NameKr = "트리니티 광장"
3137866576-DescriptionKr = "넓고 광활한 학원 광장입니다.\n이 지역의 대표적인 장소이며, 광장의 아름다운 분수가 특히 유명합니다."
3915788217-NameKr = "중앙 도서관"
3915788217-DescriptionKr = "트리니티는 물론 키보토스 전체에서 가장 거대한 도서관입니다.\n가끔씩 도서관에서 학생들이 조난당하기도 한다는 소문이 있습니다."
1205798181-NameKr = "동아리 회관"
1205798181-DescriptionKr = "트리니티의 동아리들이 모여 있는 회관 중 하나입니다.\n다양한 동아리 활동들이 여기서 이루어지고 있습니다."
1291519405-NameKr = "바시스 스콜라"
1291519405-DescriptionKr = "<학생들의 거점>이라는 뜻의, 현재는 사용되고 있지 않은 오래된 건물입니다.\n과거에는 구호기사단의 본부로 사용되었다고 합니다."
2678735093-NameKr = "미술관"
2678735093-DescriptionKr = "다양한 미술품들이 모여 있는 미술관입니다.\n현재는 학생들의 미술 수업을 진행하는 곳으로도 활용되고 있습니다."
1148047130-NameKr = "음악관"
1148047130-DescriptionKr = "비교적 최근에 지어진 음악관입니다.\n음악회나 연극 등을 위한 무대로도 사용되고 있습니다."
2413575071-NameKr = "고서관"
2413575071-DescriptionKr = "낡고 지저분해서 사람들이 잘 찾지 않는 오래된 도서관입니다.\n 트리니티 도서부의 본거지이기도 합니다."
1107627875-NameKr = "사격장"
1107627875-DescriptionKr = "사격 연습을 할 수 있는 여러 개의 사로가 설치된 사격장입니다.\n어느 학원의 학생도 이용할 수 있도록 다양한 탄종의 탄환이 구비되어 있습니다."
2340126097-NameKr = "붉은겨울 사무국 본관"
2340126097-DescriptionKr = "붉은겨울 사무국이 위치한 본관 건물입니다.\n곳곳에 체리노 회장의 권위를 상징하는 수염 조형물이 설치되어 있습니다."
683355499-NameKr = "붉은 수염 혁명광장"
683355499-DescriptionKr = "붉은겨울 사무국 본관 가까이에 있는 거대한 광장입니다.\n광장의 한 가운데에는 24시간 조명을 받는 거대한 체리노 동상이 세워져 있습니다."
414654122-NameKr = "제 1 공용 기숙사"
414654122-DescriptionKr = "학생들의 거주와 편의를 위해 건설된 공용 기숙사 단지입니다.\n비용은 저렴하지만, 시설이 노후되어 온수가 나오지 않을 때가 많습니다."
2066711573-NameKr = "붉은 곰 방송국"
2066711573-DescriptionKr = "붉은겨울 학원 유일의 언론사, <붉은 곰>의 방송이 송출되는 방송국입니다.\n방송 내용의 대부분은 체리노에 대한 찬양으로 구성되어 있습니다."
3364708890-NameKr = "제 3 공용 급식소"
3364708890-DescriptionKr = "붉은겨울의 학생들이 식사를 하는 학생 식당입니다.\n모든 학생에게 평등한 급식이 제공되지만, 체리노 회장의 식사는 더 평등합니다."
2715934839-NameKr = "흰돌고래 시장"
2715934839-DescriptionKr = "붉은겨울 학생들이 손수 만든 물건을 거래하는 오래된 노천시장입니다.\n가끔 사무국의 인가를 받지 않은 불건전한 물건이 유통되기도 합니다."
264515151-NameKr = "임업용 창고"
264515151-DescriptionKr = "숲을 채벌하는 데 필요한 임업용 장비와 목재를 보관하는 창고입니다.\n위험한 장비가 많으므로 방문할 때는 꼭 안전 장비를 착용해야 합니다."
328579908-NameKr = "용역부 인력 사무소"
328579908-DescriptionKr = "용역부의 학생들이 평소에 머무르고 있는 인력 사무소입니다.\n급한 용역이 필요할 때 찾아가면 도움을 받을 수 있습니다."
3657567135-NameKr = "격납고"
3657567135-DescriptionKr = "탱크, 차량과 헬리콥터 같은 전술 지원 장비들을 수납할 수 있는 격납고입니다.\n차량의 정비와 수리에 필요한 각종 도구도 갖추어져 있습니다."
1933676415-NameKr = "백귀야행 음양부 본관"
1933676415-DescriptionKr = "백귀야행 연합학원의 학생회 역할을 맡고 있는 음양부가 있는 본관 건물입니다. 학생들 사이에선 음양부의 건물답게 각종 함정과 방어 설비가 갖춰져 있을 거라는 소문이 돌고 있습니다."
4168293052-NameKr = "중앙 광장"
4168293052-DescriptionKr = "음양부 본관에서 바로 내려다보이는 거대한 광장입니다. 수많은 관광객에겐 약속의 장소가 되는 곳으로, 광장 중앙에 있는 동상은 포토존으로도 인기 만점입니다."
2953329321-NameKr = "음양부 공연장"
2953329321-DescriptionKr = "음양부의 비정기 공연이 이루어지는 공연장입니다. 하이쿠 배틀로얄, 니야 님의 라쿠고 대회, 치세 님의 깜짝 장기자랑 등등. 음양부가 공연을 열 때마다 매진 행렬이 이어지기로 유명합니다."
990108595-NameKr = "대정원"
990108595-DescriptionKr = "백귀야행 연합학원에 놀러 온 관광객들이 꼭 방문한다는 유명한 정원입니다. 특히 연못에는 '주인'이라고 부르는 거대 잉어가 살고 있다는 소문이 있으며, 인기 굿즈 상품도 판매 중입니다."
1694812288-NameKr = "백귀야행 상점가"
1694812288-DescriptionKr = "백귀야행 연합학원의 상점가 거리입니다. 백귀야행에서도 특히 유명한 찻집 <백야당>이 입점해 있으며, 가끔 문제아들이 소란을 일으킬 때면 백야당의 간판 아가씨가 해결한다는 소문이 있습니다."
2072243193-NameKr = "관광용 케이블카"
2072243193-DescriptionKr = "백귀야행 연합학원의 케이블카입니다. 케이블카에서 바라보는 백귀야행의 전경은 무엇과도 바꿀 수 없는 추억이 된다고 합니다. 요금은 왕복 500엔입니다."
2050672265-NameKr = "전통 박물관"
2050672265-DescriptionKr = "백귀야행 연합학원의 고유한 전통문화와 역사를 체험해볼 수 있는 거대 박물관입니다. 물론 방문한 학생 대부분에게는 평가가 그리 좋지 못합니다."
4134542221-NameKr = "신목 전망대"
4134542221-DescriptionKr = "백귀야행의 전경을 한눈에 볼 수 있는 전망대입니다. 멋진 풍경 덕에 수많은 영화나 드라마의 무대가 되어 성지로 유명합니다."
2941784831-NameKr = "발키리 경찰학교 시라토리 지소"
2941784831-DescriptionKr = "발키리 경찰학교의 지소입니다. 울창한 녹지에 둘러싸여, 특히나 공기가 매우 좋다고 합니다."
1693953940-NameKr = "코기타운"
1693953940-DescriptionKr = "유명한 전자 상가 거리입니다. 구할 수 없는 물건을 제외하면 뭐든지 구할 수 있다는 소문이 돌기도 합니다."
4116376335-NameKr = "트라이 스퀘어"
4116376335-DescriptionKr = "휴식 공간으로도 사용되고, 만남의 장소로 사용되는 광장입니다. 산책하기에도 딱 좋은 장소입니다. "
3884396288-NameKr = "제 3 업무지구"
3884396288-DescriptionKr = "트라이 스퀘어 옆에 자리한 업무지구입니다. 현대적이고 세련된 공간으로, 도로와 건물이 복잡하게 어우러져 있습니다."
880697741-NameKr = "플라도 애비뉴"
880697741-DescriptionKr = "미술관이 자리하고 있는 거리입니다. 미술관 그 자체만으로도 방대하지만, 그 주위에 펼쳐져 있는 예술의 거리 역시 하나의 볼거리입니다. "
3130494169-NameKr = "시라토리 근린 공원"
3130494169-DescriptionKr = "공원의 규모에 비해 방문하는 사람들이 수가 많지 않은 편이지만, 그래도 없어서는 안 되는 곳입니다."
3543706609-NameKr = "카네사키 항구"
3543706609-DescriptionKr = "바다를 보고 싶다면 이곳으로 찾아가는 것도 좋은 방법입니다. 어쩌면 상상하던 그 풍경은 아닐 지도 모르겠지만요."
3251299115-NameKr = "라미니 타운"
3251299115-DescriptionKr = "각 학교들의 음식 명소에도 결코 밀리지 않는 음식 거리입니다. 좁은 폭의 강 양 옆으로 무수한 노점과 음식점들이 늘어서 있습니다."
2292815693-NameKr = "육화각"
2292815693-DescriptionKr = "산해경 고급중학교의 학생회, 현룡문의 학생들이 머무르는 건물입니다. 육화각으로 이어지는 길은 현룡문 부원들이 엄격하게 지키고 있어 문주의 허가 없이는 출입할 수 없습니다."
2632751166-NameKr = "백호 공원"
2632751166-DescriptionKr = "산해경의 학생들이 여가를 보내는 넓은 공원입니다. 공원 중앙에 있는 광장에서는 아침마다 건강을 신경 쓰는 학생들이 모여서 체조를 하기도 합니다."
4045851205-NameKr = "도원향"
4045851205-DescriptionKr = "산해경 학생들이 카페 대신 즐겨 찾는 고풍스러운 찻집입니다. 산해경 학생들에게 차를 마시는 일은 총격전만큼이나 흔한 일로 여겨지고 있습니다."
3798845638-NameKr = "현무상회"
3798845638-DescriptionKr = "산해경 밖에서도 이름이 널려 알려진 미식 명소이자 상회의 학생들이 장사하는 번화한 골목입니다. 주로 취급하는 것은 향신료를 듬뿍 넣은 중화요리이지만, 그 외에 여러 가지 비밀스러운 물건 또한 취급하고 있습니다."
2595612555-NameKr = "매화원 본관"
2595612555-DescriptionKr = "산해경의 어린 원생들이 교육받는 매화원의 본관입니다. 교육을 중시하는 산해경의 특성상 현룡문의 간부들조차도 매화원의 일에는 함부로 간섭할 수 없습니다."
2905240932-NameKr = "연단방 연구소"
2905240932-DescriptionKr = "연단방의 부원들이 연단술을 연마하는 낡고 허름한 연구소입니다. 건물 앞을 지나갈 때마다 매캐하고 묘한 향기가 나기 때문에 산해경의 학생들은 이곳에 가까이 가는 것을 꺼립니다."
656802880-NameKr = "다원"
656802880-DescriptionKr = "산해경의 특산품인 찻잎을 수확할 수 있는 거대한 차밭입니다. 이곳에서 수확된 찻잎은 트리니티 종합학원을 포함한 키보토스 곳곳에 판매됩니다."
2398246336-NameKr = "대나무 숲"
2398246336-DescriptionKr = "곤륜산 어귀에 빽빽하게 조성된 대나무 숲입니다. 길을 잃기 쉬워 학생 대부분은 발을 들이지 않지만, 털어놓기 어려운 비밀을 속삭이거나 어지러운 마음을 가다듬기 위해 찾는 학생들이 있는 모양입니다."
95106171-NameKr = "하루하바라역"
95106171-DescriptionKr = "하루하바라의 현관과도 같은 역입니다. 역 중앙 출구에 항상 캐릭터가 붙어 있거나, 전광판은 거의 캐릭터와 관련된 광고로 채워지는 등, 어딘가 독특한 분위기가 느껴진다고 합니다."
3931861101-NameKr = "Kinds!"
3931861101-DescriptionKr = "하루하바라에는 수많은 식당이 있습니다만, 그중에서도 유명한 스테이크 식당입니다. 다양한 종류의 고기를 먹을 수 있다고 합니다."
1008014939-NameKr = "하루하바라 멀티미디어 센터"
1008014939-DescriptionKr = "대형 전자제품 프렌차이즈 매장입니다. 멀티미디어 하루바라는 약칭으로도 불린다고 합니다. 전자제품이 메인이지만, 게임기, 장난감, 피규어 같은 제품들도 물론 찾아볼 수 있습니다."
981882419-NameKr = "하루하바라 전자거리"
981882419-DescriptionKr = "하루하바라의 풍경 그 자체를 보여준다고도 할 수 있는 거리입니다. 어디를 바라보든 하루하바라 특유의 분위기를 한껏 느낄 수 있다고 합니다."
3346155995-NameKr = "비디오회관"
3346155995-DescriptionKr = "하루하바라역 남서쪽에 자리한, 하루하바라의 상징과도 같은 랜드마크입니다. 지금의 비디오회관은 새 건물로 재개장한 것이라고 합니다."
1706322617-NameKr = "하루하바라 크로스필드"
1706322617-DescriptionKr = "하루하바라역 북서쪽에 위치한 복합 시설입니다. 큰 빌딩 2개와 주거 시설 1개, 그리고 소방서로 이루어져 있습니다."
1644926853-NameKr = "맨드레이크 콤플렉스"
1644926853-DescriptionKr = "중고품 전문 체인점으로, 만화를 중심으로 취미 관련 분야와 고전 장난감 등 각종 수집품을 집중적으로 취급하는 것이 특징입니다. '어디에서도 구할 수 없는 물건'을 구하려면 '이곳' 뿐이라는 소문이 돌고 있기도 합니다."
434019223-NameKr = "메이드카페 캔디캔디"
434019223-DescriptionKr = "어떤 의미로는 하루하바라의 명물이라고도 볼 수 있는 카페입니다. 특별하고 신선한 경험을 찾는 사람들에게 인기가 많다고 합니다."
3019432404-NameKr = "와일드헌트 본관"
3019432404-DescriptionKr = "와일드헌트에서 가장 큰 건물입니다. 학생회와 사감대의 사무실이 자리하고 있어서 일반 학생들은 잘 접근하지 않습니다."
3730667014-NameKr = "에피파니 광장"
3730667014-DescriptionKr = "본관 앞에 펼쳐진 광장입니다. 날씨가 좋건 나쁘건 늘 버스킹과 행위예술이 공연되고 있습니다."
1558103051-NameKr = "제 3기숙사동"
1558103051-DescriptionKr = "학생들이 거주하는 기숙사 단지 중 하나입니다. 사감대의 엄중한 감시 속에 놓여 있지만, 늘 그렇듯 어딘가에는 구멍이 있습니다."
1365945908-NameKr = "예술정보관"
1365945908-DescriptionKr = "와일드헌트의 도서관입니다. 도서뿐만 아니라 음반, 악보, 필름, 판화 원판 등의 다양한 예술품들이 소장되어 있습니다."
2951155655-NameKr = "아이 오브 아트"
2951155655-DescriptionKr = "음악회, 연극, 무용 등이 공연되는 장소입니다. 밀레니엄의 최신 건축 기술이 활용되었다는 루머가 있습니다."
3688839210-NameKr = "네모 갤러리"
3688839210-DescriptionKr = "익명의 후원자에 의해 건립된 예술품 전시관입니다. 강도 높은 검문검색을 통과해야 하긴 하지만, 일반인들도 관람이 가능합니다."
3604017483-NameKr = "아피케레 종탑"
3604017483-DescriptionKr = "와일드헌트의 종탑들 중 가장 높은 종탑입니다. 그 울림은 듣는 이에게 종종 거대한 감동 혹은 두통을 선사합니다."
375386759-NameKr = "오클루스 스튜디오"
375386759-DescriptionKr = "영화 촬영, 영상 편집, 성우 녹음 등 각종 영상 예술 활동이 이루어지는 종합 스튜디오입니다. 종종 자체 영화제가 개최되기도 합니다."
1833374923-NameKr = "스터디룸"
1833374923-DescriptionKr = "개인 과외나 그룹 스터디 용도로 사용되는 스터디룸입니다.\n인기가 많기 때문에 사용 전에는 예약이 필요합니다."
3691365347-NameKr = "체력단련실"
3691365347-DescriptionKr = "러닝머신과 바벨, 스쿼트랙 등이 포함된 본격적인 체력단련실입니다.\n바쁜 업무 중에도 건강을 잃지 않도록 부지런히 체력을 단련합시다."
2987442229-NameKr = "휴게실"
2987442229-DescriptionKr = "휴식에 필요한 안락 의자, 스낵바, 침대 등이 설치된 휴게실입니다.\n야근이 잦은 선생님을 위한 침대와 세면시설도 갖추어져 있습니다."
174166180-NameKr = "편의점"
174166180-DescriptionKr = "샬레 생활관 건물 내에 입점한 <엔젤 24> 편의점입니다.\n간단한 먹을 거리나 음료수, 폭발물 등을 구입할 수 있습니다."
3217933897-NameKr = "오락실"
3217933897-DescriptionKr = "각종 아케이드 게임기가 설치된 생활관 내 오락실입니다.\n대부분이 오래된 고전 게임이라 소수의 매니아들에게 큰 인기를 끌고 있습니다."
1142275086-NameKr = "식당"
1142275086-DescriptionKr = "샬레 생활관의 식사를 책임지는 식당 시설입니다.\n다양한 조리 시설도 갖추어져 이곳에서 요리 실습을 할 수도 있습니다."
2776103305-NameKr = "텃밭"
2776103305-DescriptionKr = "식물을 기를 수 있도록 야외 발코니에 조성된 작은 규모의 텃밭입니다.\n식사에 사용되는 채소와 과일 등을 기를 수 있습니다."
110094030-NameKr = "아비도스 본관"
110094030-DescriptionKr = "아비도스 학교의 본관입니다.\n과거엔 작은 분관 건물이었으나, 지금은 본관으로 사용되고 있습니다."
