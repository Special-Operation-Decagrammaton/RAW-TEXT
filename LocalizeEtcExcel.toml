[translation]
3194776850-NameTw = "辦公室"
3194776850-DescriptionTw = "擺放著各種辦公所需備品的辦公室。\n老師主要待在此處處理夏萊的工作。"
1907901108-NameTw = "視聽室"
1907901108-DescriptionTw = "設有可觀看影像媒體的大螢幕的視聽室。\n可在此處觀看各種連續劇或電影、流行動畫等。"
358080736-NameTw = "體育館"
358080736-DescriptionTw = "設有觀眾席的大型體育館。\n各式體育用品也幾乎一應俱全。"
4294611526-NameTw = "格黑娜第一校舍"
4294611526-DescriptionTw = "格黑娜學園中央區最大的校舍。\n雖然有很多教室，但能好好上課的幾乎沒幾間。"
1274324253-NameTw = "格黑娜學園．社團大樓本館"
1274324253-DescriptionTw = "是聚集了格黑娜各社團辦公室的大樓。\n但是對大部分的學生來說，是個可以自由使用的空間。"
358653965-NameTw = "格黑娜學園．校園"
358653965-DescriptionTw = "佔地面積很大的校園。\n因為疏於管理，不小心可能會迷路，必須多加留意。"
2196189972-NameTw = "格黑娜學園．中央運動場"
2196189972-DescriptionTw = "是格黑娜學園的中央運動場。\n可以進行體育課和各種室外活動。"
1866984703-NameTw = "格黑娜第二校舍"
1866984703-DescriptionTw = "是格黑娜中央區的第二校舍。\n有別於第一校舍，這裡集中了部分熱衷於課業學習的學生。"
3032755222-NameTw = "格黑娜學生廣場"
3032755222-DescriptionTw = "是學生們可自由使用的廣場。\n由於有眾多學生往來，所以日夜鬥爭不斷。"
970571410-NameTw = "格黑娜風紀委員會本部"
970571410-DescriptionTw = "是格黑娜風紀委員會所在總部。\n是中央區唯一管理良好的地方。"
1533671597-NameTw = "格黑娜廢校舍"
1533671597-DescriptionTw = "是目前未使用的建築物。\n雖然設施已關閉，但由於可以自由進出，成為了各種事件的溫床。因為這地區極其危險，所以進去時必須多加注意。"
261901867-NameTw = "圖書館"
261901867-DescriptionTw = "從學生們學習用的參考書到老師工作用的書籍，是所收藏了各種書籍的圖書室。\n不只是正經的書，也存放了漫畫書和輕小說等。"
1983840990-NameTw = "阿拜多斯本館"
1983840990-DescriptionTw = "阿拜多斯的學生們主要使用的阿拜多斯本館。\n多虧了對策委員會的學生們平時認真管理，所以就算每日刮沙塵暴也能保持美麗的狀態。"
3073680445-NameTw = "阿拜多斯別館"
3073680445-DescriptionTw = "透過走廊與本館相連的阿拜多斯別館。\n現在聚集了沒有在使用的科學室和音樂室等教室。"
3030528899-NameTw = "阿拜多斯運動場"
3030528899-DescriptionTw = "是進行體育課和運動會的運動場。\n現在被沙子淹沒，所以變得難以管理。"
4060200853-NameTw = "阿拜多斯圖書館"
4060200853-DescriptionTw = "是可以認真學習、讀書的圖書館。\n從學習用的各種參考書到雜誌及漫畫，存放著各種在阿拜多斯大受歡迎的書籍。"
4149434655-NameTw = "阿拜多斯游泳池"
4149434655-DescriptionTw = "是平時不常使用的阿拜多斯游泳池。\n池中的水已乾枯，地板的裂縫中堆積著沙子。"
2812564490-NameTw = "阿拜多斯體育館"
2812564490-DescriptionTw = "除了室內的體育課，也兼具講堂功能的體育館。\n目前保管著沒有使用的物資及運動器材。"
3019364332-NameTw = "阿拜多斯小賣店"
3019364332-DescriptionTw = "大家都很喜歡的小賣店。\n雖然和其他學校相比商品種類不足，但現在也能買到在奇普托斯大受歡迎的麵包和點心。"
2602511445-NameTw = "阿拜多斯舊校舍"
2602511445-DescriptionTw = "原本是當作社團辦公室和休息空間使用的校舍。\n目前因為耐久性等危險因素而關閉，但時不時有學生來這裡測試膽量。"
774508018-NameTw = "教室"
774508018-DescriptionTw = "是學生們平時上課的教室。\n學生自習或發表個人研究課題時也能使用。"
1925286931-NameTw = "千年巨塔"
1925286931-DescriptionTw = "是以研討會為首，包含了千年主要社團及委員會的巨塔。\n搭載了很多最先進的安全系統，外部人員出入受到嚴格管制。"
698860447-NameTw = "單軌車站"
698860447-DescriptionTw = "是可以往學園各處移動的單軌車站。\n千年的單軌列車雖快，但幾乎沒有噪音和震動。"
2688045816-NameTw = "圖書館"
2688045816-DescriptionTw = "是千年的學生們為了研究和調查而使用的圖書館。\n也可以閱覽紀錄片等影像媒體。"
1022652590-NameTw = "小賣店"
1022652590-DescriptionTw = "是一家販售麵包與飲料，非常適合休息的小賣店。\n即使商品的種類豐富，最受歡迎的仍是雙份濃縮咖啡和能量飲料。"
2885237148-NameTw = "實習中心"
2885237148-DescriptionTw = "是可以進行各種工學實驗的實習中心。\n擁有大型3D列印機等最尖端裝置與設備。"
3070757653-NameTw = "資料中心"
3070757653-DescriptionTw = "是設有大量伺服器和資料通信裝置的數據中心。\n保存了千年的貴重研究資料。"
1295016811-NameTw = "發電站"
1295016811-DescriptionTw = "是生產和供給千年科學學園校內所需電力的發電站。\n採用了幾乎不會發生公害，對環境友善的系統。"
895510277-NameTw = "健身中心"
895510277-DescriptionTw = "是可以放鬆和鍛鍊因研究而疲憊的身體的健身中心。\n設有最先進的設備，提供學生們量身打造的訓練。"
3140661513-NameTw = "實驗室"
3140661513-DescriptionTw = "是可以進行簡單科學實驗的教室。\n有很多危險的藥品和銳利器具，必須充分注意。"
2871272188-NameTw = "三一大教堂"
2871272188-DescriptionTw = "是三一中最為大的建築，被視為三一的象徵。\n同時也是「修女會」的本部。"
3137866576-NameTw = "三一廣場"
3137866576-DescriptionTw = "同時也是這個區域的名字，是位於中心的廣場。\n是三一的學生們經常聚集的人氣場所，尤其是中央的美麗噴水池，是連不熟悉三一的人都知道的知名景點。"
3915788217-NameTw = "中央圖書館"
3915788217-DescriptionTw = "不只是三一，也是整個奇普托斯當中最大的圖書館。\n因為其規模與複雜度，不時會聽說有學生在裡面遇難。"
1205798181-NameTw = "社團會館"
1205798181-DescriptionTw = "是三一的社團辦公室和委員會聚集的建築物之一。\n每天在這裡舉辦各種活動和會議。"
1291519405-NameTw = "Basis Schola"
1291519405-DescriptionTw = "是一座名為「學生們的據點」，目前已經沒在使用的古老建築。\n過去好像有段時間被當作「救護騎士團」的本部使用。"
2678735093-NameTw = "美術館"
2678735093-DescriptionTw = "是收藏了很多作品的校園美術館。\n偶爾也會當作上美術課的地方使用。"
1148047130-NameTw = "音樂廳"
1148047130-DescriptionTw = "是近期才蓋好的音樂廳。\n除了音樂課外，也會用於舉辦演唱會或戲劇等的舞台使用。"
2413575071-NameTw = "古書館"
2413575071-DescriptionTw = "與中央圖書館不同，是保管著舊書籍的建築物。\n因為歲月的痕跡而說不上很乾淨，所以學生們不怎麼來拜訪。也當作三一的「圖書委員會」本部使用。"
1107627875-NameTw = "射擊場"
1107627875-DescriptionTw = "是可以讓很多人同時射擊，進行射擊練習的地方。\n為了讓任何學園的學生皆可使用，具備各式彈種的子彈。"
2340126097-NameTw = "赤冬事務局"
2340126097-DescriptionTw = "赤冬事務局所在的校舍本館。\n四處都設有象徵潔莉諾會長權威的鬍子造型物。"
683355499-NameTw = "紅鬍子革命廣場"
683355499-DescriptionTw = "鄰近赤冬事務局的寬闊廣場。\n每週末會舉行一次讚揚潔莉諾會長的集會。"
414654122-NameTw = "第1共用宿舍"
414654122-DescriptionTw = "是在事務局領導下建設的公共宿舍。\n雖然能有效地收容人口，但很多房間因為設備老舊而沒有熱水。"
2066711573-NameTw = "赤熊電台"
2066711573-DescriptionTw = "是赤冬聯邦學園的唯一媒體「赤熊」的廣播電台。\n節目內容大多都是在讚美潔莉諾會長。"
3364708890-NameTw = "第3公共供給所"
3364708890-DescriptionTw = "是赤冬學生們吃飯的學生餐廳。\n除了偉大的潔莉諾會長，所有學生的餐點都是平等的。"
2715934839-NameTw = "白鯨市場"
2715934839-DescriptionTw = "是赤冬學生交易手工製品，歷史悠久的露天市場。\n偶爾也會有未被事務局認可的不健全物品在此流通。"
264515151-NameTw = "林業用倉庫"
264515151-DescriptionTw = "放置砍伐森林所需的林業機械及木材的倉庫。\n因為有許多危險的機器，所以造訪的時候一定要穿戴安全裝備。"
328579908-NameTw = "工務部事務所"
328579908-DescriptionTw = "是工務部學生們平時待命的事務所。\n造訪時經常能獲得完美且迅速的協助。"
3657567135-NameTw = "載具庫"
3657567135-DescriptionTw = "是可以容納戰車、車輛、直升機等戰術支援武器的庫房。\n車輛保養與維修所需的各種工具也一應俱全。"
1933676415-NameTw = "百鬼夜行陰陽部主樓"
1933676415-DescriptionTw = "百鬼夜行聯合學園的實際學生會「陰陽部」所在的主樓。學生們之間流傳著其內部設置了各式各樣的陷阱與防禦設備的傳聞。"
4168293052-NameTw = "中央廣場"
4168293052-DescriptionTw = "從陰陽部主樓能見到的巨大廣場。經常被觀光客們當作會面的場地，廣場中央的銅像是相當熱門的拍照景點。"
2953329321-NameTw = "陰陽部公演會場"
2953329321-DescriptionTw = "陰陽部不定期舉辦公演的場地。俳句大逃殺、仁耶的落語大賽、知世的驚喜特技表演等──以每次公演都能完售門票著稱。"
990108595-NameTw = "大庭園"
990108595-DescriptionTw = "來百鬼夜行聯合學園的觀光客一定會造訪的知名庭園。特別是有傳聞說池塘裡住著名字叫做「主」的巨大鯉魚。相關商品也在販售當中。"
1694812288-NameTw = "百鬼夜行商店街"
1694812288-DescriptionTw = "百鬼夜行聯合學園的商店街。百鬼夜行的知名喫茶店「百夜堂」也位在這兒。據說只要有問題兒童引起騷動，百夜堂的看板娘就會出面解決。"
2072243193-NameTw = "觀光纜車"
2072243193-DescriptionTw = "百鬼夜行聯合學園的纜車。從纜車上眺望百鬼夜行的全景會成為無可取代的回憶。往返的費用是500元。"
2050672265-NameTw = "傳統博物館"
2050672265-DescriptionTw = "能體驗百鬼夜行聯合學園的獨特傳統與歷史的巨大博物館。但造訪的學生給予的評價都不太好。"
4134542221-NameTw = "神木觀景台"
4134542221-DescriptionTw = "能一眼眺望百鬼夜行全景的觀景台。因為美麗的風景，使它成為了無數電影和電視劇的舞台，是知名的聖地。"
2941784831-NameTw = "女武神警察學園白鳥分校"
2941784831-DescriptionTw = "女武神警察學園的分校。四周都環繞著茂盛的綠地，所以據說空氣特別好。"
1693953940-NameTw = "柯基町"
1693953940-DescriptionTw = "有名的電器街。據說除了絕版品外，什麼東西都能買到。"
4116376335-NameTw = "三角廣場"
4116376335-DescriptionTw = "作為休息空間及見面場所使用的廣場。是適合散步的地方。"
3884396288-NameTw = "第3商業區"
3884396288-DescriptionTw = "位於三角廣場旁的商業區。道路與建築物共同構築了一個現代、洗鍊且美麗的和諧空間。"
880697741-NameTw = "普拉多大道"
880697741-DescriptionTw = "美術館所在的街道。除了美術館本身很棒之外，整個街道都充滿藝術氣息。"
3130494169-NameTw = "白鳥鄰里公園"
3130494169-DescriptionTw = "雖然和公園的規模相比，造訪的人並不多，但仍是個必去的景點。"
3543706609-NameTw = "鐘崎港"
3543706609-DescriptionTw = "如果想看海，來這裡也是個不錯的選擇。或許不是想像中的那種景色。"
3251299115-NameTw = "駱馬町"
3251299115-DescriptionTw = "不亞於各學園美食景點的美食街。狹窄的河流兩側有許多攤位與餐廳櫛比鱗次。"
2292815693-NameTw = "六和閣"
2292815693-DescriptionTw = "山海經高級中學的學生會──玄龍門的學生們聚集的建築物。通往六和閣的道路由玄龍門成員嚴密看管，未經門主的許可皆不得出入。"
2632751166-NameTw = "白虎公園"
2632751166-DescriptionTw = "山海經學生們度過閒暇時間的廣闊公園。公園中央的廣場裡每天早上都有注重健康的學生聚集做體操。"
4045851205-NameTw = "桃源鄉"
4045851205-DescriptionTw = "山海經學生們經常當成咖啡廳光顧的茶館。對山海經的學生來說，喝茶就和槍戰一樣稀鬆平常。"
3798845638-NameTw = "玄武商會"
3798845638-DescriptionTw = "在山海經外也遠近馳名的美食勝地，是商會的學生們做生意的繁華巷弄。主要販售中華料理中大量使用的香料，同時也經手各式珍藏品。"
2595612555-NameTw = "梅花園本館"
2595612555-DescriptionTw = "梅花園的本館，山海經的幼童們在這裡接受教育。由於山海經重視教育的特性，連玄龍門的幹部都無法任意干涉梅花園的事務。"
2905240932-NameTw = "鍊丹術研究會"
2905240932-DescriptionTw = "鍊丹術研究會的成員們研究煉丹術的老舊研究所。每次經過建築物門口都會聞到煙霧帶來的刺鼻氣味，所以很多學生都不願靠近。"
656802880-NameTw = "茶園"
656802880-DescriptionTw = "能採收山海經特產茶葉的遼闊茶園。這裡採收的茶葉在奇普托斯各地都有販售，其中以三一綜合學園會為大宗。"
2398246336-NameTw = "竹林"
2398246336-DescriptionTw = "是位於崑崙山入口處的茂密竹林。因為容易迷路，大多數的學生都不會踏足此處，但似乎有學生會因為難以啟齒的祕密，來這裡平靜混亂的心情。"
95106171-NameTw = "春葉原車站"
95106171-DescriptionTw = "如同春葉原玄關的車站。車站中央出口無論何時都能看到角色的身影，周圍的電子螢幕也總是播放著與角色相關的廣告，形成了一股獨特的氛圍。"
3931861101-NameTw = "Kinds!"
3931861101-DescriptionTw = "春葉原內雖然有無數的餐廳，但它們的名氣卻都不及這家牛排店。據說可在這家牛排店中品嚐到各式種類的肉品。"
1008014939-NameTw = "春葉原多媒體中心"
1008014939-DescriptionTw = "大型3C產品連鎖店賣場。又被稱作多媒體春葉原。雖然主要是販賣3C產品，但是在該賣場內也找得到遊戲機、玩具、模型等等商品。"
981882419-NameTw = "春葉原電器街"
981882419-DescriptionTw = "經常被視為是春葉原一帶縮影的街道。不管從什麼角度，都能從這條街上感受到滿滿春葉原獨特的氛圍。"
3346155995-NameTw = "多媒體會館"
3346155995-DescriptionTw = "如同春葉原象徵物的地標。坐落於春葉原車站西南邊，據說現在的多媒體會館是搬遷至新大樓後才重新開張的。"
1706322617-NameTw = "春葉原複合空間"
1706322617-DescriptionTw = "坐落於春葉原車站西北邊的複合設施。內部包含了兩棟大樓、一棟宿舍和消防局。"
1644926853-NameTw = "曼德雷綜合商場"
1644926853-DescriptionTw = "二手物品專賣連鎖店。其最大的特徵就是以漫畫為中心，專門販售娛樂相關商品和舊玩具等等各式收藏品。坊間甚至還流傳著「如果想找『別的地方都找不到的東西』，來『這裡』就對了」的說法。"
434019223-NameTw = "女僕咖啡廳．糖果糖果"
434019223-DescriptionTw = "從某個角度來說，這家咖啡廳稱得上是春葉原的特產。對於想尋找特殊又新鮮的體驗的人們來說，這裡是他們的首選。"
3019432404-NameTw = "狂獵本館"
3019432404-DescriptionTw = "狂獵中最大的建築物。學生會與舍監隊的辦公室皆設立於此，一般學生鮮少接近。"
3730667014-NameTw = "頓悟廣場"
3730667014-DescriptionTw = "本館前方延展的廣場。無論天氣好壞，總有街頭表演與行為藝術在此上演。"
1558103051-NameTw = "第3宿舍棟"
1558103051-DescriptionTw = "學生居住的宿舍區之一。雖然處於舍監隊的嚴密監視下，但一如往常，總有某處存在漏洞。"
1365945908-NameTw = "藝術情報館"
1365945908-DescriptionTw = "狂獵的圖書館。不僅收藏書籍，還有唱片、樂譜、膠片、版畫原版等各類藝術品。"
2951155655-NameTw = "Eye of Art"
2951155655-DescriptionTw = "舉辦音樂會、戲劇、舞蹈等演出的場所。據傳採用了千年學園的最新建築技術。"
3688839210-NameTw = "無名氏畫廊"
3688839210-DescriptionTw = "由匿名贊助者建造的藝術品展覽館。雖需通過嚴格檢查，但一般人也能入場參觀。"
3604017483-NameTw = "頂端鐘樓"
3604017483-DescriptionTw = "狂獵的鐘樓中最高的一座。其迴響時常帶給聽者巨大的感動，或是頭痛。"
375386759-NameTw = "Oculus Studio"
375386759-DescriptionTw = "進行電影拍攝、影像剪輯、聲優錄音等各類影像藝術活動的綜合工作室，偶爾還會舉辦自家影展。"
1833374923-NameTw = "自習室"
1833374923-DescriptionTw = "是個人自習和小組學習用的房間。\n因為很受歡迎，所以使用前需要預約。"
3691365347-NameTw = "訓練室"
3691365347-DescriptionTw = "是設有跑步機、槓鈴、深蹲架等器材的正規訓練室。\n為了在業務繁忙時也能保持健康，勤勞運動鍛鍊身體吧。"
2987442229-NameTw = "休息室"
2987442229-DescriptionTw = "設有躺椅和床，甚至是吧檯的休息室。\n為了常加班的老師，也準備了盥洗設備。"
174166180-NameTw = "便利商店"
174166180-DescriptionTw = "居住區的便利商店「天使24」。\n可以買到諸如食物、飲料、炸藥之類的物品。"
3217933897-NameTw = "遊戲中心"
3217933897-DescriptionTw = "是設有各種街機的居住區遊戲中心。\n因為大部分都是有年代的復古遊戲，所以在各地的少數狂熱者中很受歡迎。"
1142275086-NameTw = "餐廳"
1142275086-DescriptionTw = "是負責夏萊飲食的居住區餐廳。\n因為具備各種烹飪設備，所以也可以在此進行烹飪實習。"
2776103305-NameTw = "菜園"
2776103305-DescriptionTw = "為了培育植物，在戶外的陽台上設置了小規模的家庭菜園。\n可以栽培用於料理的蔬菜和水果。"
110094030-NameTw = "阿拜多斯高中"
110094030-DescriptionTw = "阿拜多斯學校的本館。\n過去是小型分館大樓，現在被當作本館使用。"
