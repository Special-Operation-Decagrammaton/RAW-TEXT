1841568450-NameKr = "램프가 놓여진 원형 테이블"
1841568450-DescriptionKr = "자그마한 조명이 놓인 원형 테이블. 왠지 밤이 될수록 무드가 살아날 것 같은 기분이 든다."
1418371049-NameKr = "밀레니엄 A형 돌출형 기둥"
1418371049-DescriptionKr = "밀레니엄의 분위기가 살아있는 기둥. 상단부의 조명이 포인트."
2916391596-NameKr = "밀레니엄 B형 돌출형 기둥"
2916391596-DescriptionKr = "밀레니엄의 분위기가 살아있는 기둥. 깔끔한 느낌이 인상적이다."
1495795501-NameKr = "밀레니엄 C형 돌출형 기둥"
1495795501-DescriptionKr = "밀레니엄의 분위기가 살아있는 기둥. 세로로 길게 이어진 조명이 포인트."
