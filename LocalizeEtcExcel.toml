537637411-NameTw = "BINAH"
537637411-DescriptionTw = "十字神名的第3名預言者。是混合了蛇和鯨魚外貌的巨大機械AI。\n\n名字的起源推測是生命之樹的第三個質點「BINAH」。目前尚未掌握其材料、起源和運轉的原理，推測可能是現代奇普托斯無法再現的超科學技術。\n\n薇娜擁有往返地底與地表的能力。當它躲在地底時，就難以用現有的技術探知到它。從目擊報告集中在阿拜多斯自治區來判斷，沙漠是有利於薇娜藏身的環境。\n\n首次目睹薇娜的紀錄發生在數十年前的阿拜多斯沙漠，此後便時有所聞。阿拜多斯的在地企業「聖奈芙蒂斯」公司在建設橫跨沙漠的鐵路時，每隔幾天就會目擊薇娜出沒於工地，至今仍持續目擊並與其交戰。\n\n近期的交戰對手是駐屯於阿拜多斯沙漠的凱薩PMC，導致凱薩集團的挖掘作業延宕許多。\n\n薇娜相關的研究資料是由2年前的阿拜多斯學生會收集並整理而成，但據說已在學校本館搬遷過程中遺失。\n\n目前，還無法查明薇娜是以什麼為目的來行動。"
1367499131-NameTw = "CHESED"
1367499131-DescriptionTw = "十字神名的第4名預言者。其本體是放置在廢墟各處，被十字神名駭入的軍需工廠的自動化生產系統AI。\n\n名字的起源推測是生命之樹的第四個質點「CHESED」。\n\n因為本體被巨大的外骨骼裝甲保護著，所以用一般的方法是無法與之抗衡的。而且，還會被軍需工廠生產的大量機器人阻擋。\n\n只要赫賽德存在，十字神名就有源源不絕的兵力，可以推測十字神名投入在奇普托斯各處的兵力與它之間有密不可分的關係。"
1769839732-NameTw = "CHOKMAH"
1769839732-DescriptionTw = "十字神名的第2名預言者。原本是某艘漂流船隻的巡航系統AI，後來遭到了十字神名的駭入。\n\n名字的起源推測是生命之樹的第二個質點「CHOKMAH」。\n\n由於能夠大幅改變自身的形態和構造，再加上行動的目的不明，因此在預言者中也算是異類。根據目前的推測，它似乎能夠自行設定或變更行動目的。\n\n雖然基本的船隻型態也不容小覷，但其第二型態才是霍刻瑪真正的威脅。"
3284843262-NameTw = "GEBURAH"
3284843262-DescriptionTw = "十字神名的第5名預言者。雖然真實身份仍未查明，但在被十字神名駭入前，它很可能是極地研究基地的無人探測機中所搭載的AI。\n\n名字的起源推測是生命之樹的第五個質點「GEBURAH」。\n\n除了可在水中自由移動之外，似乎依舊保有無人探測機時期的搜索功能。其另一個特徵為擁有多變的武裝型態。根據推測，這同樣是由原先型態的自我防衛功能演變而成的。\n\n雖然該預言者的原型難以辨認，但可以確定的是，它似乎並沒有打算改變自己需在低溫中才能活動的環境條件。"
3359469350-NameTw = "HOD"
3359469350-DescriptionTw = "十字神名的第8名預言者。其真實身分是被十字神名駭入的千年自治區網路設置單元AI。\n\n名字的起源推測是生命之樹的第八個質點「HOD」。\n\n原本的身分是千年科學學園的通訊網路架設通訊元件「hub」，負責在學園地下設置並維修連結各設施的電纜。\n\n由於千年的通訊網有如蜘蛛網般錯綜複雜，維護起來相當困難、棘手，所以便在「hub」的頭部搭載了高性能的演算裝置，在機身上安裝了無數隻連接終端的手臂（arm）。當它展露出全貌時，看起來就像是一隻巨大的章魚。\n\n「hub」是從千年科學學園創校之初就存在，歷史悠久的元件。不過因為平時都埋首於地下的維修作業，所以就連千年的學生也不知道它的存在。\n\n不過在進行大規模工程時，「hub」也會出現在地面，執行架設工作。據說它「立柱」、快速擴張電纜、控制設施的工作速度，是目前千年的任何技術人員都無法企及的。\n\n若要說它和其他預言者有什麼不同，便是與它的最初接觸是與千年的學生有關。搭載了EMP增幅機構，透過地下核心滲透到地面，在地下3km處定樁並建設改造過的「入侵之柱」來執行入侵功能，擴張自己的領域。\n\n現在的它，是宛如人工智慧雷達般的危險存在，試圖將整個奇普托斯變成自己的領域。"
2539375741-NameTw = "KETHER"
2539375741-DescriptionTw = "十字神名的第1名預言者。在廢墟淹沒地區首次觀測到他的存在，看似在守護淹沒地區的特定領域。\n\n因為是第1名預言者，推測其技術發展度及A.I複雜度較其他預言者低。和其他預言者不同的是，它可進行四足步行，並且更換本體上的各式兵器，而此工程構造也是它的特徵。\n\n根據推測，為了在每場戰鬥準備能佔據戰略優勢的兵器，某處應該有能夠進行管理及更換凱瑟零件的基地。目前觀察，凱瑟的攻擊模式有三種，考慮到其構造特徵，也許存在更多種模式。"
1251359687-NameTw = "MALKUTH"
1251359687-DescriptionTw = "十字神名的第10名預言者，也是最後的預言者。名字的起源推測是生命之樹的第十個質點「MALKUTH」。\n\n在生命之樹中，馬爾庫特象徵著炎之劍路徑的最終流向。據說正是藉由這條路徑，在物質世界的創造才得以完成。\n\n與其他看似有人格卻無法溝通的預言者不同，擁有完整的人類女性外貌，也能自然地進行對話。然而其言行舉止在某種意義上，似乎極度傾向於某種存在。"
439214304-NameTw = "NETZACH"
439214304-DescriptionTw = "十字神名的第7名預言者。名字的起源推測是生命之樹的第七個質點「NETZACH」。\n\n如今在透過某種方法進化後，已經成為鋼鐵大陸本身，因此其原型已不得而知。\n\n能將周圍所有無機物轉化為與鋼鐵大陸相同的成分，藉由使其成為自身的一部分來擴展自己。其擴展極限目前仍無法估計。"
2166637992-NameTw = "TIPHARETH"
2166637992-DescriptionTw = "十字神名的第6名預言者。推測是由建於極地地區的種子保管庫AI被十字神名駭入後誕生的存在。\n\n名字的起源推測是生命之樹的第六個質點「TIPHARETH」。\n\n根據推測，提法瑞特最終掌控並進化了整個種子保管庫的主系統。特別的是，它似乎依然忠於原本保護種子保管庫的使命。\n\n雖然該設施已確認是由赤冬聯邦學園所建造，但現今的赤冬似乎並未察覺與種子保管庫之間的關聯。"
1862639856-NameTw = "YESOD"
1862639856-DescriptionTw = "十字神名的第9名預言者。名字的起源推測是生命之樹的第九個質點「YESOD」。\n\n最初在鋼鐵大陸被觀測到，且似乎不存在作為原型的結構體。因此可以推測，耶索德是在鋼鐵大陸構築到一定程度後，基於該基礎而首次形成的預言者。\n\n基於上述討論，可以認為耶索德與其他預言者不同，不需要覆寫於某種結構體或擁有原型，而是純粹基於目的性製造出來的「最佳化」預言者。"
