3942981484-DescriptionKr = "디저트가 놓인 로우 테이블. 함께 즐겁게 이야기하기 좋은 테이블이다."
2108508784-NameKr = "배색 더블 의자"
2108508784-DescriptionKr = "2명까지 사용 가능한 더블 의자. 오래 앉아도 계속 편안한 것이 큰 장점이다."
696868990-NameKr = "배색 2단 화분"
696868990-DescriptionKr = "2단으로 분리된 화분. 배치하는 것만으로 잘 꾸며진 나만의 정원을 만들 수 있다."
529277183-NameKr = "모모프렌즈 메뉴 벽 장식"
529277183-DescriptionKr = "카페 메뉴 벽 장식. 모모프렌즈 메뉴판과 환한 조명은 귀여운 분위기를 연출해준다."
3122346673-NameKr = "모모프렌즈 액자 기둥"
3122346673-DescriptionKr = "모모프렌즈 카페와 관련된 사진들이 전시된 기둥. 시즌 한정 시그니처 컷을 볼 수 있다."
2845270565-NameKr = "통유리 창문"
2845270565-DescriptionKr = "개방된 느낌을 주는 통유리 창문. 커피를 마시며 카페 앞 전경을 여유롭게 즐기자!"
3224998488-NameKr = "페로로 세트 선반"
3224998488-DescriptionKr = "페로로 인형이 놓인 선반. 페로로 인형과 작은 화분이 아기자기함을 더해준다."
