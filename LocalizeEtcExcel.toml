4008661080-NameJp = "味方生徒、かかしのHPが継続的に減少、与えるダメージ量増加"
4008661080-DescriptionJp = "味方生徒とかかしは1秒毎に現在のHPが減少します。\n味方生徒の現在のHPが高いほど、その生徒の与えるダメージ量が増加します。"
