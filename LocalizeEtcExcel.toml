996442753-NameTh = "พรมลายตารางหมากรุก สุดหวานแหวว"
996442753-DescriptionTh = "พรมลายตารางหมากรุกหวานแหววให้ความรู้สึกน่ารัก\nน่าใช้ ด้วยความที่เป็นพรมหนานุ่มจึงนิยมในหมู่เด็กๆ"
2253191261-NameTh = "เก้าอี้เบาะหนังสีขาว"
2253191261-DescriptionTh = "เก้าอี้เบาะหนังสีขาวสุดนุ่ม ให้ความรู้สึกเป็นเจ้าของตั้งแต่วินาทีที่นั่งลง"
303399993-NameTh = "ป้ายโฆษณา MOMO FRIENDS"
