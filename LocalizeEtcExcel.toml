2022344463-DescriptionKr = "밀레니엄 타워 라운지로 출입할 수 있는 게이트. 가끔 해킹당해서 사람이 지나갈 때마다 요란한 노래가 나오곤 한다."
389601628-NameKr = "휴식용 마사지 의자"
389601628-DescriptionKr = "온몸을 편안하게 풀어주는 마사지 의자. 피곤할 때 누우면 극락을 체험할 수 있다고 한다."
917686991-NameKr = "세로 기둥 파티션"
917686991-DescriptionKr = "세로형 기둥으로 이어진 곡선형 파티션. 모던하면서 예술적인 느낌으로 공간을 분리할 수 있다."
826937419-NameKr = "직사각형 관상식물 화분"
826937419-DescriptionKr = "관상용 식물이 심어진 직사각형 화분. 실내에 푸릇함을 더해준다."
