3627212448-DescriptionKr = "넓게 펼쳐진 업무용 책상. 다양한 물품을 올려놓아도 공간이 넉넉하게 남는다."
3880204055-NameKr = "라운지 맵 디스플레이"
3880204055-DescriptionKr = "밀레니엄 타워 라운지의 지도가 표기된 디스플레이. 가고 싶은 곳이 있다면 참고하자!"
