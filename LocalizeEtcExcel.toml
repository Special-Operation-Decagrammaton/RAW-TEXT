404292254-NameKr = "온천장의 입구에서 접객을 하는 종업원들의 모습"
404292254-DescriptionKr = "저희 온천장은 언제나 친절한 미소로 손님들을 맞이하고 있습니다. \n(수상한 음료를 건네는 종업원을 보시면 여주인에게 즉시 신고해주세요!)"
4035745238-NameKr = "온천장 내부의 정원을 안내하는 여주인의 모습"
4035745238-DescriptionKr = "저희 온천장에는 돌과 모래로 구성된 고산수식 정원이 조성되어 있습니다. \n절제미가 강조된 소박한 정원에서 마음의 여유를 찾아보세요."
1774361412-NameKr = "숙소를 청소하는 여주인의 모습"
1774361412-DescriptionKr = "저희 온천장에서는 1일 2회 침구의 살균 소독을 실시하고 있습니다. \n위생 걱정 없이 편안한 휴식을 즐기세요!"
3950044430-NameKr = "노천탕에서 느긋하게 탕을 즐기는 손님들의 모습"
3950044430-DescriptionKr = "저희 온천장의 온천수는 피부 미백, 활력 증가, 사격 능력 향상 등의 효과가 있습니다. \n온천욕을 통해 새로운 자신을 발견해 보세요!"
999560012-NameKr = "연회장에서 식사를 즐기는 손님들의 모습"
999560012-DescriptionKr = "저희 온천장에서는 최고 품질의 식자재로 조리된 정찬을 즐기실 수 있습니다. \n온천 만쥬와 운메에봉이 포함된 가이세키 정식을 즐겨보세요!"
1094144720-NameKr = "연습"
1094144720-DescriptionKr = "애슬레틱 스타디움의 육상 트랙은 경기가 없는 날에는 항시 개방되어 있습니다. \n사용을 희망하시는 학생들은 애슬레틱 관리 위원회에 사용 허가서를 제출 부탁드립니다."
2809976808-NameKr = "응원"
2809976808-DescriptionKr = "모든 스포츠의 꽃은 바로 응원! \n경기에 참여하는 선수들이 최선을 다할 수 있도록 열렬한 응원을 보여주세요! "
374407097-NameKr = "작업"
