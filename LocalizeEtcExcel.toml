3308377822-DescriptionKr = "※ 픽업 모집 기간에 모집을 진행할 때마다 모집 포인트를 획득합니다. 모집 포인트를 모아서 픽업 학생을 얻을 수 있습니다. 픽업 기간이 지나면 포인트는 기동석 조각으로 변환됩니다."
