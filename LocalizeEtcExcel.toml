376882766-NameKr = "앙코르 포인트"
376882766-DescriptionKr = "※ 모집을 진행할 때마다 앙코르 포인트를 획득합니다. 앙코르 포인트를 모아서 라인업 내의 학생을 얻을 수 있습니다. 픽업 기간이 지나면 포인트는 기동석 조각으로 변환됩니다.\n[c][ff2d2c] 앙코르 포인트는, 모집 포인트, 아카이브 포인트와는 다르며, 다른 모집으로 획득한 포인트는 누적되지 않습니다.[-][/c]"
2814968857-NameKr = "리콜렉트 포인트"
2814968857-DescriptionKr = "※ 모집을 진행할 때마다 리콜렉트 포인트를 획득합니다. 리콜렉트 포인트를 모아서 라인업 내의 학생을 얻을 수 있습니다. 픽업 기간이 지나면 포인트는 기동석 조각으로 변환됩니다.\n[c][ff2d2c] 리콜렉트 포인트는, 모집 포인트, 아카이브 포인트와는 다르며, 다른 모집으로 획득한 포인트는 누적되지 않습니다.[-][/c]"
2803570054-NameKr = "아카이브 포인트"
2803570054-DescriptionKr = "※ 모집을 진행할 때마다 아카이브 포인트를 획득합니다. 아카이브 포인트를 모아서 라인업 내의 학생을 얻을 수 있습니다."
3125687171-NameKr = "전술 대회 코인"
3125687171-DescriptionKr = "전술 대회 상점에서 사용 가능한 코인."
471603600-NameKr = "하급 합성용 기동석"
471603600-DescriptionKr = "크래프트 챔버의 물질 합성 기능을 기동시킬 때 필요한 키스톤."
284088691-NameKr = "이벤트 포인트"
284088691-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
3146510308-NameKr = "여우여우 센베이"
3146510308-DescriptionKr = "백귀야행 축제 거리의 대표 명물. 한 입 베어물면 느껴지는 바삭하고 고소한 맛이 일품! "
1959694325-NameKr = "너구리 오코노미야키"
1959694325-DescriptionKr = "백귀야행의 축제에서 빠질 수 없는 음식. 마요네즈로 그려진 너구리가 참을 수 없이 귀엽다."
2308340710-NameKr = "벚꽃 찹쌀떡"
2308340710-DescriptionKr = "백귀야행의 전통찻집 백야당의 스테디셀러 디저트. 부드러우며 농후한 달콤함이 그야말로 최강."
2902974760-NameKr = "체리노 마트료시카"
2902974760-DescriptionKr = "체리노의 위엄있는 모습을 본 따 만들어진 마트료시카. 흔들 때마다 무언가가 안쪽에서 달각거린다."
904092714-NameKr = "체룐카 초콜릿"
904092714-DescriptionKr = "붉은겨울 급양부에서 생산하는 보급형 밀크 초콜릿. 달고 부드러운 식감이지만, 붉은겨울의 학생들은 혹한의 기후 때문에 딱딱하고 먹기 어려운 초콜릿이라고 생각하고 있다."
2871602548-NameKr = "수염 크레이프"
2871602548-DescriptionKr = "붉은겨울 학원 곳곳에서 판매되는 달콤하고 부드러운 크레이프. 학원 내에서는 '블린'이라고도 불린다. 수염 모양의 크림 장식을 달기 위해서는 체리노의 심사가 필요하다."
3168602557-NameKr = "붉은 수염 훈장"
3168602557-DescriptionKr = "체리노에게 인정받은 학생만이 받을 수 있는, 금과 보석으로 호화롭게 만들어진 훈장. 모서리에 긁히면 아프기 때문에 대부분 책상 깊숙이 넣어 수납하고 있다."
532264540-NameKr = "이벤트 포인트"
532264540-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
3071036351-NameKr = "비치발리볼"
3071036351-DescriptionKr = "귀엽게 생긴 비치발리볼입니다."
589252219-NameKr = "바다의 집 식권"
589252219-DescriptionKr = "바다의 집에서 사용할 법한 허름한 식권입니다."
3265516866-NameKr = "이상한 폭죽"
3265516866-DescriptionKr = "귀여운 미사일의 형태를 하고 있습니다."
4230562605-NameKr = "아이스박스"
4230562605-DescriptionKr = "과일과 음료수 등을 시원하게 보관할 수 있는 아이스박스. 온도에 민감한 화기를 보관하는 데에도 효과적입니다."
182033757-NameKr = "모래놀이 세트"
182033757-DescriptionKr = "간단한 모래성을 쌓을 수 있는 도구가 포함된 모래놀이 세트. 시멘트와 철근은 포함되어 있지 않습니다. "
3004794592-NameKr = "비치 체어"
3004794592-DescriptionKr = "원목 의자 위에 부드러운 천을 깔아 만든 모던한 느낌의 비치 체어. 방수 처리가 되어 해변에서도 안심하고 사용할 수 있습니다."
2064901758-NameKr = "파라솔 테이블"
2064901758-DescriptionKr = "볕을 가릴 수 있는 파라솔이 포함된 원목 테이블. 우아한 숙녀라면 해변에서도 티타임은 놓칠 수 없죠."
1274276475-NameKr = "물놀이 장비"
1274276475-DescriptionKr = "스노클과 산소호흡기 등이 포함된 본격적인 물놀이 장비. 수심 50m 이하에서의 사용은 권장하지 않습니다."
1644359218-NameKr = "세일링 보드"
1644359218-DescriptionKr = "선체에 돛을 달아 가속력을 높인 보드. 균형을 잡기 쉬워 초보자도 쉽게 배울 수 있습니다."
886310733-NameKr = "게헨나의 교표가 찍힌 보급상자"
886310733-DescriptionKr = "하계 합숙 훈련을 맞이하여 선도부가 직접 준비한 보급상자. 안에는 훈련에 도움이 되는 물건들이 들어있다. 꽝은 없으니 안심."
2668075095-NameKr = "미식연구회의 군옥수수"
2668075095-DescriptionKr = " 미식연구회가 직접 만든 군옥수수. 미식연구회 멤버들의 취향이 듬뿍 들어가 있어, 맛은 보장할 수 없다."
1254096944-NameKr = "여름용 불량배 선글라스"
1254096944-DescriptionKr = "여름 해변에서 소란을 일으키는 문제아, 해변의 불량배로부터 선도부가 압수한 선글라스. 무의미한 저항의 흔적이 남아있다."
104149602-NameKr = "첨벙첨벙 헬멧"
104149602-DescriptionKr = "여름 슬럼가에서 소란을 일으키는 문제아, 첨벙첨벙 헬멧단으로부터 선도부가 압수한 헬멧. 쓸데없는 저항의 흔적이 남아있다."
2553698243-NameKr = "이벤트 포인트"
2553698243-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
1847672830-NameKr = "거북 버섯"
1847672830-DescriptionKr = "산해경 자치구 전역에서 자생하는 화려한 모양의 버섯. \n화려한 외관과는 달리 식감이 단단하고 맛도 좋아 식용으로 인기가 높다. "
357098688-NameKr = "오죽순"
357098688-DescriptionKr = "현룡문의 정원에서 자라는 검은 대나무의 순. \n현룡문의 간부들에 의해 엄중히 관리되고 있기 때문에 구하기가 쉽지 않다."
3708418519-NameKr = "인형삼"
3708418519-DescriptionKr = "산해경의 깊은 산속에서 발견되는 사람을 닮은 모양의 뿌리 약초. \n수명을 늘려주거나 나이를 어려지게 만들어주는 효과가 있다고 한다."
3320765287-NameKr = "초콜릿 코인"
3320765287-DescriptionKr = "골든 플리스 호의 대표적인 간식거리 중 하나. 진짜 코인은 아니지만, 달콤한 맛 때문에 학생들 사이에서 인기가 높다."
312190930-NameKr = "토끼 스티커"
312190930-DescriptionKr = "학생들이 붙이고 다니는 토끼 모양의 스티커. 딱히 큰 의미는 없다. 만들기도 쉽기 때문에 대부분 직접 만들어서 붙이고 다닌다."
3290352412-NameKr = "승선권"
3290352412-DescriptionKr = "골든 플리스 호의 승선권. 승선 이후에도 내부 행사나 이벤트 때 종종 확인하기 때문에 항시 지니고 있는 편이 좋다."
812405886-NameKr = "주사위"
812405886-DescriptionKr = "배 안에서 자주 발견되는 주사위. 단순한 장난감이지만, 가끔 학생들 간의 갈등을 해결하는 데에 사용되기도 한다."
3202962982-NameKr = "이벤트 포인트"
3202962982-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
1102568152-NameKr = "온천 타월"
1102568152-DescriptionKr = "온천장 227호에서 제공하는 기본 타월. 소재가 다소 거칠기 때문에 몸에 대고 세게 문지르면 피부가 상할 수도 있다."
4012080640-NameKr = "수염 샴푸"
4012080640-DescriptionKr = "체리노 회장이 애용하는 붉은겨울 학원 특제 샴푸. 이름과는 달리 수염을 씻는 데에는 적합하지 않다고 한다."
2585452848-NameKr = "카피바라 입욕제"
2585452848-DescriptionKr = "카피바라의 모양을 한 고체형 입욕제. 물에 넣으면 은은한 감귤 향기를 풍기며 녹아 내린다."
1545493133-NameKr = "특제 신년 복주머니"
1545493133-DescriptionKr = "새해 시즌이 되어 검은거북파가 준비한 새해용 복주머니. 개봉하기 전까지 안에 무엇이 들어있는지 아무도 알 수 없는 서프라이즈 아이템. 생각 외로 내용물은 알차다."
1215702584-NameKr = "페로로 거울떡"
1215702584-DescriptionKr = "새해를 기념하여 돈에 눈이 먼 검은거북파가 초인기 마스코트 페로로와 콜라보하여 발매한 거울떡. 어디까지나 장식용이고 먹을 수는 없다."
130031945-NameKr = "검은거북파 에마"
130031945-DescriptionKr = "검은거북파의 새해맞이 행사장에서 판매하는 에마. 새전을 넣고 소원을 비는 것과 함께 하면 효과가 상승한다는 소문이 있다. 그래서인지 가격은 개당 5천 엔이라는 말도 안 되는 가격."
3586118070-NameKr = "새해 오미쿠지 뽑기권"
3586118070-DescriptionKr = "새해 오미쿠지 뽑기를 하기 위해 필요한 뽑기권. 실은 제대로 된 물건이 아니라 검은거북파가 판매를 목적으로 만든 제품으로, 점괘 결과에 따라 상품이 지급된다."
518432250-NameKr = "이벤트 포인트"
518432250-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
1669990889-NameKr = "문제아의 반성문"
1669990889-DescriptionKr = "발렌타인 데이 순찰 업무를 맡은 샬레의 선생님이 날뛰는 문제아들을 제압하고 받아낸 반성문. 의외로 내용은 건실하다.   "
2861703465-NameKr = "압수한 불량 막과자"
2861703465-DescriptionKr = "발렌타인 데이 순찰 업무 중 문제아들로부터 압수한 막과자. 정식으로 허가받지 않은 뒷세계에서 만들어진 물건이라고 한다. 불량한 맛이 문제아들 사이에서 인기 만점."
2887327615-NameKr = "환경미화활동용 규격 봉투"
2887327615-DescriptionKr = "발렌타인 데이 순찰 업무를 하며 이곳저곳에서 수거한 쓰레기가 담겨 있는 봉투. 착실한 미화 활동은 언제나 보람차다. "
3085567581-NameKr = "발렌타인 데이 외출권"
3085567581-DescriptionKr = "발렌타인 데이를 맞이하여 순찰 업무로 바쁜 선생님이 학생들과 만나기 위해 필요한 외출권. \n※ 사용하지 않은 외출권은 이벤트 종료 후 200,000 크레딧으로 변환됩니다."
1632581989-NameKr = "와카모 체포 영장"
1632581989-DescriptionKr = "와카모를 체포하기 위해 발키리 경찰학교에서 발부된 체포 영장. 와카모가 그간 저질러온 무시무시한 죄목들이 적혀 있다."
3974882278-NameKr = "이벤트 포인트"
3974882278-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
2114880617-NameKr = "미사보"
2114880617-DescriptionKr = "예배할 때 쓰는 베일을 접어둔 것. 가끔 기도하다 조는 얼굴을 가릴 때에도 유용하다."
4200143845-NameKr = "성가책"
4200143845-DescriptionKr = "트리니티의 찬송가들을 모아둔 책. 의외로 특유의 노랫말이 인기를 얻어, 유행가나 광고 문구로도 인용될 때가 있다."
2925208730-NameKr = "성당 촛대"
2925208730-DescriptionKr = "트리니티 대성당에서 사용하는 촛대. 생긴 것과 달리 상당히 무겁고 튼튼하기 때문에, 떨어뜨리면 바닥에 구멍이 나기도 한다."
315453169-NameKr = "무시퀸 카드팩"
315453169-DescriptionKr = "인기 트레이딩 카드 게임 무시퀸의 세 번째 확장팩 <궁극의 곤충 집결> 시리즈. 카에데의 말에 따르면 만져 보면 촉감으로 레어 카드가 들어있는지 아닌지 알 수 있다는 모양."
2801049295-NameKr = "학원교류회 전단지"
2801049295-DescriptionKr = "백귀야행과 게헨나 학원 간의 교류회가 열린 걸 알리는 전단지. 주최자인 니야의 인사말과 함께 이번 교류회의 주요 일정이 적혀 있다."
3117990777-NameKr = "와라쿠 공주님 부채"
3117990777-DescriptionKr = "백귀야행 연합학원의 인기 아이돌 치세 님의 얼굴이 그려진 부채. 귀엽다! 멋지다! 갖고 싶다! 라는 평가로 팬들에겐 인기 만점."
1122375527-NameKr = "닌페로 씨 인형 굿즈"
1122375527-DescriptionKr = "소용돌이 영화촌에서 판매하고 있는 닌자 캐릭터 굿즈. 처음엔 모 캐릭터의 스핀 오프 캐릭터로 시작되었지만, 미묘하게 인기를 얻어 독립한 케이스로, 업계엔 자주 있는 이야기다."
2333680348-NameKr = "자재 상자"
2333680348-DescriptionKr = "버려진 리조트 여기저기에 버려진 자재 상자들.\n오랫동안 방치돼 있던 물건으로, 안에 무엇이 들었는지 알 수 없습니다."
923224583-NameKr = "지역화폐"
923224583-DescriptionKr = "관광을 부흥시킬 목적으로 만들어진 <로스트 파라다이스 리조트>의 지역화폐. 정말 효과가 있는지는 알 수 없지만, 그래도 시즈코 왈 <그런 건 직접 증명하면 된다구요!> 라는 모양이다."
1459837138-NameKr = "백야당 번쩍번쩍 코인"
1459837138-DescriptionKr = "백야당 바다의 집에서 기념품으로 교환 가능한 코인. 다만 손님들 대부분은 코인 자체를 기념품으로 생각하고 있는 듯하다."
2503861371-NameKr = "반들반들 소라고둥"
2503861371-DescriptionKr = "겉이 매끄럽고 반들반들한 느낌이 드는 소라고둥. 치세가 말하길, 귀에 가져다 대고 소리를 듣고 있다 보면 자연스레 시상이 떠오른다고 한다."
3295998236-NameKr = "여름용 인법도감 두루마리"
3295998236-DescriptionKr = "여름에 맞춰 쓸 수 있는 여러 인법(창작)이 적혀 있는 두루마리. 주로 여름에 일어날 수 있는 안전사고와 관련된 내용이 많다. 닌자에게도 안전이 제일!"
4253247347-NameKr = "해양심층수온천섬 리조트 사용권"
4253247347-DescriptionKr = "해양심층수온천섬 리조트의 사용 권한이 명시되어 있는 리조트 사용권 계약서"
2442357514-NameKr = "무시퀸 크루즈 리조트 사용권"
2442357514-DescriptionKr = "무시퀸 크루즈 리조트의 사용 권한이 명시되어 있는 리조트 사용권 계약서"
4133487383-NameKr = "초호화 리조트 사용권"
4133487383-DescriptionKr = "초호화 리조트의 사용 권한이 명시되어 있는 리조트 사용권 계약서"
125540590-NameKr = "디저트 쿠폰"
125540590-DescriptionKr = "유명한 디저트 가게에서 발급하는 디저트 쿠폰. 모아서 가져가면 일정 수마다 교환해 주는 디저트들이 정해져 있다."
3387762043-NameKr = "민트초코 파르페"
3387762043-DescriptionKr = "독특한 맛의 민트초코 파르페. 상큼함과 달콤함을 동시에 맛볼 수 있는 메뉴이다."
806537948-NameKr = "마카롱"
806537948-DescriptionKr = "한 손에 쏙 들어오는 크기의 마카롱. 다양한 종류만큼이나 다양한 맛이 있다."
336149210-NameKr = "롤웨하스"
336149210-DescriptionKr = "속이 빈 채로 기다랗게 말려 있는 초콜릿 맛 과자. 괜히 폼 잡고 싶은 아이들이 입에 문 채 흔들기도 한다."
2418932586-NameKr = "이벤트 포인트"
2418932586-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
1874282437-NameKr = "오자미"
1874282437-DescriptionKr = "부드러운 천에 콩과 모래 등을 채워 만든 주머니. 푹신하고 맞아도 다칠 염려가 없기에 공던지기 등의 대회에서 사용된다. 드물게 정말로 폭발하는 오자미가 발견되기도 한다."
3048078452-NameKr = "밀레니엄 깃발"
3048078452-DescriptionKr = "밀레니엄의 교표가 그려져 있는 작은 깃발. 반환점을 표시하거나 집합 장소를 알릴 때 사용된다."
2524752608-NameKr = "호루라기"
2524752608-DescriptionKr = "엔지니어부의 첨단 기술로 만들어진 특제 호루라기. 입김을 불면 진동판이 전자 신호를 발생시켜 새 소리를 내는 스피커를 작동시키는 복잡한 구조로 되어 있다."
2871055877-NameKr = "스포츠 드링크"
2871055877-DescriptionKr = "밀레니엄에서 개발한 특제 스포츠 드링크. 트레이닝부의 과학적 데이터를 기반으로 개발되어 타 음료 대비 더 빠르게 수분을 보충할 수 있다고 한다."
1469297879-NameKr = "계주용 배턴"
1469297879-DescriptionKr = "계주 경기에 사용되는 배턴. 구식 막대 수류탄처럼 생겼지만, 전자식 센서가 부착된 첨단제품으로 일정 시간 내에 다음 주자에게 인계되면 절대로 터지지 않는다."
2043178916-NameKr = "단팥빵"
2043178916-DescriptionKr = "빵 먹기 경주에 사용되는 비닐에 싸인 단팥빵. 팥앙금만 들어간 심플한 구성의 빵이지만 일부 발키리 경찰학교 학생들로부터 큰 호평을 받았다고 한다."
3227336825-NameKr = "안내 팸플릿"
3227336825-DescriptionKr = "황륜대제 운영 본부에서 나누어주는 안내 팸플릿. 경기 일정은 물론이고 경기장 근처의 맛집 지도까지 상세히 적혀 있다."
2905328212-NameKr = "크리스마스 선물"
2905328212-DescriptionKr = "크리스마스 날, 모두가 기다리는 바로 그것. 우는 아이에게는 선물을 주지 않는다는 전설이 전해진다."
1128970523-NameKr = "크리스마스 양말"
1128970523-DescriptionKr = "뜻밖의 선물을 기다리는 마음으로 걸어 두는 양말. 신으면 따뜻하기까지 하다."
4179360865-NameKr = "캔디 케인"
4179360865-DescriptionKr = "지팡이 모양으로 만든 크리스마스 사탕. 보통은 박하 맛이다. "
1459661267-NameKr = "에그노그"
1459661267-DescriptionKr = "우유와 달걀, 설탕으로 만드는 따뜻한 음료. 추운 날 마시면 몸이 따스해진다. "
1234657893-NameKr = "이벤트 포인트"
1234657893-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
2264400688-NameKr = "홍백 어묵"
2264400688-DescriptionKr = "흰색의 어묵과 홍색의 염료로 겉을 염색한 두 가지 색의 어묵. 홍색은 경사와 기쁨을, 흰색은 신성함을 나타낸다고 한다."
3707337679-NameKr = "참돔"
3707337679-DescriptionKr = "오세치에서 새우와 함께 빼놓을 수 없다는 생선. 맛있는 도미와 함께 새로운 한 해를 축하하자."
2091304235-NameKr = "오미쿠지 교환권"
2091304235-DescriptionKr = "다들 재미로 뽑는 것이라고 이야기하지만, 좋지 않은 결과가 나오면 왠지 기분이 미묘해진다. "
2629342802-NameKr = "다차원 연산 회로"
2629342802-DescriptionKr = "아트라하시스의 방주에서 떨어져 나간 연산 장치의 조각. 복잡한 회로로 구성되어 있다."
1015134010-NameKr = "차원엔진 부속품"
1015134010-DescriptionKr = "차원엔진에서 떨어져 나간 부속품. 지금은 기계 뭉치에 불과해 특별히 사용할 수 있는 곳이 없을 것 같다."
3353425290-NameKr = "우주 초코버거"
3353425290-DescriptionKr = "누군가 우주식량으로 사용하기 위해 밀봉 처리된 초코버거. 어째서 이곳에 초코버거가 밀봉 처리가 되었는지 지금도 의문에 싸여있다."
3142506941-NameKr = "게이트 언락 코드 - 외곽 2지구"
3142506941-DescriptionKr = "외곽 2지구의 게이트를 개방할 수 있는 언락 코드가 인식된 칩이다."
2995130259-NameKr = "게이트 언락 코드 - 외곽 3지구"
2995130259-DescriptionKr = "외곽 3지구의 게이트를 개방할 수 있는 언락 코드가 인식된 칩이다."
1012273839-NameKr = "게이트 언락 코드 - 중앙 지구"
1012273839-DescriptionKr = "중앙 지구의 게이트를 개방할 수 있는 언락 코드가 인식된 칩이다."
344128946-NameKr = "이벤트 포인트"
344128946-DescriptionKr = "이벤트를 진행할 때마다 획득할 수 있는 포인트. 많이 얻을수록 다양한 보상을 얻을 수 있다."
1355249104-NameKr = "총학생회의 안전모"
1355249104-DescriptionKr = "총학생회의 로고가 새겨진 안전모. 이번 복구작업을 위해 특별히 제작되었다."
2999413236-NameKr = "재무보고서"
2999413236-DescriptionKr = "총학생회 행정위원회 산하인 재무실에서 사용하는 재무보고서. 키보토스의 재무 상태에 관한 내용이 상세히 정리되어 있다."
636205895-NameKr = "명란 과자"
636205895-DescriptionKr = "모모카가 즐겨 먹는 명란 과자. 입 안을 짭짤하게 만드는 그 풍미가 일품이다."
832973929-NameKr = "깨끗한 카츄샤"
832973929-DescriptionKr = "헤어 밴드를 이르는 또 다른 명칭. 깨끗하게 관리된 카츄샤는 사용인의 역량을 보여주는 필수품이라는 말이 있는 것도 같다. "
3488365730-NameKr = "화장 도구"
3488365730-DescriptionKr = "얼굴을 꾸미는 화장 도구. 화장 본연의 목적에도 부합하지만, 정말 능숙하게 쓸 줄 안다면 변장 도구처럼 사용할 수 있다고도 한다."
1069023790-NameKr = "고저택의 초대장"
1069023790-DescriptionKr = "유서 깊은 듯이 보이는 고저택으로부터 도착한 초대장. 그곳에서는 알기 쉬운 일과 알기 어려운 일이 동시에 일어난다는 소문이 전해진다."
611002646-NameKr = "카드 묶음"
611002646-DescriptionKr = "산해경에서 인기 있는 카드 게임 묶음. 많이 모을수록 더 많은 게임을 할 수 있다."
1712890776-NameKr = "현무상회 식권"
1712890776-DescriptionKr = "현무상회가 발행하는 식권. 가지고 가면 현무상회의 환대를 받을 수 있다."
1093209845-NameKr = "현룡문 배지"
1093209845-DescriptionKr = "현룡문의 문양이 그려진 배지. 일종의 굿즈로서 판매되고 있으나, 인기는 그다지 높지 않다고 한다……"
133960514-NameKr = "용매 추출 세트"
133960514-DescriptionKr = "누구나 사용할 수 있다며 판매되는 용매 추출 세트. 특히 매화원에서 구입을 꺼린다는 소문이 있다."
4287098248-NameKr = "고급 만년필"
4287098248-DescriptionKr = "총학생회에서 결재용으로 사용하는 고급 만년필. 펜촉에서 부드럽게 잉크가 흘러나와 손과 손목의 피로감이 덜하다."
3217702690-NameKr = "냉동 새우"
3217702690-DescriptionKr = "잡은 즉시 냉동되어 신선하게 보존된 새우. 이 냉동 새우는 야토우라 마을의 특산품으로 D.U.에 납품되는 대부분의 새우는 야토우라 마을에서 잡혀 들어온다."
4278574452-NameKr = "조약돌"
4278574452-DescriptionKr = "해변에서 흔히 발견할 수 있는 작은 조약돌. 평범해 보이지만 특유의 매끄럽고 빛나는 표면은 오랫동안 파도에 노출되어 완성된 세월의 결과물이다."
4062911234-NameKr = "조개 껍데기"
4062911234-DescriptionKr = "해변에서 흔히 발견할 수 있는 작은 조개의 껍데기. 얼핏 보기에는 모든 조개 껍데기가 개성 없이 똑같아 보이지만, 자세히 살펴보면 무늬에서 발생하는 미세한 차이점이 눈에 들어온다."
759180874-NameKr = "마른 불가사리"
759180874-DescriptionKr = "부둣가 위에 방치되어 딱딱하게 말라붙은 불가사리. 먹을 수도 없고, 잘 썩지도 않아 마을 주민들에게는 골칫거리로 여겨지지만, 미유는 이 불가사리에 묘한 동질감을 느끼는 모양이다."
1788699589-NameKr = "주사위 확정권"
1788699589-DescriptionKr = "주사위 달리기의 결과를 확정해주는 쿠폰. 어떤 숫자의 티켓이 나올지는 아무도 모른다."
862021401-NameKr = "주사위 1 확정권"
862021401-DescriptionKr = "주사위 달리기의 결과를 확정해주는 쿠폰. 결과 확정 주사위에서 1의 눈을 선택하면 쿠폰이 소모됩니다."
