266718355-DescriptionKr = "운수대통! 행운이 붙고 가업이 번창할 예정입니다! 오늘 하루 당신에게 있어 행운의 컬러는 아름다운 파란색!"
1124846343-NameKr = "대길"
1124846343-DescriptionKr = "당신의 운세는 대길! 축하드립니다! 과감한 도전은 성공하고, 하는 일은 전부 잘 풀릴 겁니다! 자신을 믿고 앞으로 나아갑시다! 아자아자아자!"
964504315-NameKr = "흉"
964504315-DescriptionKr = "오늘의 장보기 메뉴 : 크림 스튜 1팩, 닭고기 250g, 감자 2개, 양파 3개, 당근 1개, 브로콜리 1단, 유자 식초 1통……."
199728885-NameKr = "흉"
199728885-DescriptionKr = "식중독에는 언제나 주의하는 게 좋대! 나는 걸려 본 적 없지만! 그런 것보다, 초코 해삼 주스 어때?"
1759134687-NameKr = "흉"
1759134687-DescriptionKr = "뭉개진 식자재를 되살리는 방법은 원칙적으로 없다. 삶은 다음 블렌더로 갈아 수프를 만드는 것이 그나마 최선."
4232612005-NameKr = "흉"
4232612005-DescriptionKr = "음식을 들고 오는데, 넘어져서 쏟아져 버렸어…… 그 대신 넘어진 자리에서 동전을 줍긴 했지만."
2722903738-NameKr = "말길"
2722903738-DescriptionKr = "운세는 말길! 손해를 보아도 나중에 이익 있다…… 그렇다는데? 경단이라도 좋으니, 뭔가 먹고 싶네……"
2264344015-NameKr = "말길"
2264344015-DescriptionKr = "어디 보자…… 말길이래! 상으로 내가 만든 민트 문어 푸딩 줄게!"
3089424248-NameKr = "말길"
3089424248-DescriptionKr = "덜 익은 음식은 그나마 괜찮아. 다시 익히면 되잖아? 너무 익거나 탄 음식이 문제지."
1618617468-NameKr = "말길"
1618617468-DescriptionKr = "이 운세를 뽑은 사람은, 산을 파내 금을 얻듯이 고생하겠지만 운수 좋다…… 후후후. 미식의 길에는 고난이 따르기 마련이죠."
839518806-NameKr = "말길"
839518806-DescriptionKr = "말길이란, 후일 길로 돌아설 조짐을 나타내는 것이라고 합니다. 혹시 누가 아나요. 미래에 무슨 일이 일어날지."
239549900-NameKr = "말길"
239549900-DescriptionKr = "기뻐할 일, 가을겨울에 있다. 봄여름에는 좋지 않을 터…… 가을겨울이라니, 지금이네요."
3417604566-NameKr = "소길"
3417604566-DescriptionKr = "소길이네요! 높은 위기 따위 가벼이 넘을 터. 평탄한 길을 유지하면 평안하다…… 응, 뭔가 좋은 뜻 같아요!"
3872470199-NameKr = "소길"
3872470199-DescriptionKr = "복은 작은 것에서 온다고 하죠. 소길입니다. 외출하자마자 소나기가 그치는 행운이 따르기를!"
4154538605-NameKr = "소길"
4154538605-DescriptionKr = "이번 운세는 소길! 아무리 급하게 지하철을 타도 방향이 틀리지 않을 거예요!"
1652241604-NameKr = "소길"
1652241604-DescriptionKr = "별을 보고 항로를 정해야 한다고 하죠. 지나가는 배의 모든 등불이 아니라요."
2851981489-NameKr = "소길"
2851981489-DescriptionKr = "숨은 만남으로부터 행운이 오기를. 눈 뜰 일을 기대하라…… 라고 하네요. 제 요리 실력이 나아진다는 뜻일까요?"
228389323-NameKr = "소길"
228389323-DescriptionKr = "하나씩 식자재를 모아 가죠. 요리를 완성할 때까지요!"
3038779302-NameKr = "중길"
3038779302-DescriptionKr = "연애 - 마음속의 그 아이와 눈이 마주침\n만남 - 주말, 축제 거리에서\n약속 - 불꽃놀이 구경을 함께"
284642160-NameKr = "중길"
284642160-DescriptionKr = "이번 운세는 중길이네요. 축하드려요. 가끔은 정말로 배부를 때까지 먹고 싶은데 말이에요."
2426075748-NameKr = "중길"
2426075748-DescriptionKr = "달은 밝고 깨끗하고, 검은 구름 있을 자리를 모른다…… 군요. 달빛 아래에서 먹는 도시락은, 한층 맛있기 마련이죠. 후후후."
1325967005-NameKr = "중길"
1325967005-DescriptionKr = "인생을 위해 가장 중요한 필수품이 음식이라면, 행운은 그에 근접한 2위이겠지요. 중길, 축하해요."
4022503532-NameKr = "중길"
4022503532-DescriptionKr = "모름지기 행복으로 변할 일 있을 터. 화살 한 대 두 마리 기러기 맞춘다…… 기러기 구이는 맛있을까?"
2197323664-NameKr = "중길"
2197323664-DescriptionKr = "생사의 갈림길에서는 살 터. 여행은 고생 있겠지만 목적지는 길하다. 새해에는 맛있는 음식을 먹을 것. 반가운 소리네!"
294425413-NameKr = "길"
294425413-DescriptionKr = "기다리는 사람 - 만남\n행복 - 찾아옴\n오는 사람의 마음이 약하다면 도울 것."
2086697042-NameKr = "길"
2086697042-DescriptionKr = "이 운세를 뽑은 사람은, 올바른 마음을 가진다면 나아갈 것이다. 마음가짐이 악하다면 되려 꼬일 것이다."
657860840-NameKr = "길"
657860840-DescriptionKr = "열심히 준비한 음식을, 모두가 맛있게 먹어 준다면 그보다 기쁜 일은 없을 거예요. 올해는 항상 길한 일만 있으시기를!"
128516439-NameKr = "길"
128516439-DescriptionKr = "선생님. 이번 운세는 길이래. 화살 한 줄기 푸른 하늘을 날아가며, 사슴은 홀로 천 리 밖을 간다…… 이 사슴, 배고프지는 않을까? "
2382060588-NameKr = "길"
2382060588-DescriptionKr = "이 운세를 뽑은 사람은, 오래된 나무에 꽃이 피는 형국이니, 지금부터 여러 가지 기쁨이 겹치겠다…… 여러 가지 기쁨만큼이나, 하루라도 평온한 나날이 주어지기를……"
370799142-NameKr = "길"
370799142-DescriptionKr = "운세가 길한 분들을 위해, 새해를 맞아 복이 가득하다는 오세치를 만들었답니다. 맛보고 가세요!"
1512780410-NameKr = "대길"
1512780410-DescriptionKr = "만남 - 전설의 나무 아래에서\n이사 - 지금보다 좋다.\n음식 - 번화가에서 마음껏"
997253011-NameKr = "대길"
997253011-DescriptionKr = "어머나. 대길이군요. 우후후. 올해에는 어떤 미식이 우리를 기다리고 있을까요?"
940731399-NameKr = "대길"
940731399-DescriptionKr = "버드나무 봄을 맞아\n오래된 가지에 꽃이 피도다.\n무거운 서리와 눈 속에서\n황금색이 더더욱 빛나도다."
555506678-NameKr = "대길"
555506678-DescriptionKr = "운세가 때를 넘음이 파도와 같아, 가득 찬 오세치 찬합과 잘 익은 도미살이 될지니…… 잘 익은 도미살이라는 부분이 특히 마음에 드네요."
3840660582-NameKr = "대길"
3840660582-DescriptionKr = "대길을 뽑으셨군요. 축하드려요. 꼭 특별한 일이 생길 거예요. \n※유사품에 주의하세요."
1744408890-NameKr = "대길"
1744408890-DescriptionKr = "한 점 상처 없는 보석. 지금부터 더욱 갈고 닦으면 좋다…… 네, 저도 좀 더 요리에 정진하겠어요!"
1664341587-NameKr = "수상한 색의 카레"
1664341587-DescriptionKr = "수상쩍은 색깔을 띠고 있는 정체불명의 카레.\n화학약품처럼 코를 찌르는 따가운 냄새가 난다.\n곁들인 밥조차도 타고 그을려 씁쓸한 맛이 난다."
408873372-NameKr = "생선 대가리 카레"
408873372-DescriptionKr = "먹다 남은 생선 머리로 감칠맛을 내려 '했던' 카레.\n발상은 좋았지만, 카레에 오묘한 비린내가 배고 말았다.\n먹은 사람의 얼굴이 절로 찌푸려지는 카레."
3557467288-NameKr = "심플 야채 카레"
3557467288-DescriptionKr = "호박과 감자, 당근만 넣어 만든 심플한 야채 카레.\n호화롭진 않지만, 채소의 단맛이 카레와 잘 어울린다.\n곁들인 흰밥도 고슬고슬하게 잘 지어졌다."
817877395-NameKr = "새우 크림 카레"
817877395-DescriptionKr = "커다란 새우가 고명으로 올려져 있는 크림 카레.\n담백한 새우의 맛이 크림 카레와 부드럽게 어우러진다.\n향신료가 느끼함을 잡아주어 쉽게 질리지 않는다."
2465534331-NameKr = "설로인 스테이크 카레"
2465534331-DescriptionKr = "최상급 설로인 스테이크를 밥 위에 올린 호화로운 카레.\n구운 버섯과 파의 식감이 풍미를 다채롭게 한다.\n버터를 넣어 볶은 갈릭 라이스는 그 자체로도 별미."
3616003768-NameKr = "꽝"
3616003768-DescriptionKr = "헛스윙……\n익숙해요……\n그렇지만 다음에는……!"
3854794868-NameKr = "꽝"
3854794868-DescriptionKr = "자세가 무너진 모양이군요.\n부상에 주의하도록 하죠."
2662227242-NameKr = "꽝"
2662227242-DescriptionKr = "히, 힘 내세요……?\n제가 응원해 드릴게요!"
170702207-NameKr = "참가상"
170702207-DescriptionKr = "참가하는 데 의의가 있다는 말,\n물론 좋아해요.\n하지만 역시 이기고 싶네요……"
4162217022-NameKr = "참가상"
4162217022-DescriptionKr = "스포츠도 트레이닝도,\n일단 시작하는 것이 절반입니다."
2680245513-NameKr = "참가상"
2680245513-DescriptionKr = "드디어 시작이네요!\n기운 잃지 마시고, 끝까지!"
1958845128-NameKr = "장려상"
1958845128-DescriptionKr = "힘을 내자고, 더 해 보자고 주는 상이군요.\n네…… 홈런을 치려면, 우선 안타부터!"
2791568111-NameKr = "장려상"
2791568111-DescriptionKr = "이건, 그것이군요.\n한 세트를 끝낸 뒤에,\n방심하지 말고 한 번만 더!"
461611471-NameKr = "장려상"
461611471-DescriptionKr = "꺾일 것 같을 때야말로\n응원이 필요한 법이에요!"
1428247863-NameKr = "행운상"
1428247863-DescriptionKr = "사실 안타 중 적지 않은 비율이,\n행운에서 비롯된다고 해요.\n찾아온 행운을 놓치지 않으려면, 연습이 필요하고요."
752868706-NameKr = "행운상"
752868706-DescriptionKr = "트레이닝에는 운이 개입할 요소가\n그다지 많지 않지만,\n스포츠는 다른 것 같더군요."
2640635459-NameKr = "행운상"
2640635459-DescriptionKr = "마음의 준비를 하고 있어야 해요……\n그렇지 않으면 행운에 기뻐할 수 없거든요!"
2984517236-NameKr = "2등상"
2984517236-DescriptionKr = "으아아……! 아깝네요!\n물론 2등이 어딘가 싶지만!\n야구로 비유하자면 인정 2루타인 걸까요!"
1431221238-NameKr = "2등상"
1431221238-DescriptionKr = "놀라운 성과입니다!\n이대로 마음을 놓지 말고,\n정상의 그 자리를 향해 가도록 하죠!"
1980863458-NameKr = "2등상"
1980863458-DescriptionKr = "힘내라!\n잘했다!\n끊기지 말고, 조금만 더!"
1686581353-NameKr = "1등상"
1686581353-DescriptionKr = "이 결과는……!\n그야말로…… 홈런이네요!\n저도 언젠가, 다시 한번만 더!"
4080298096-NameKr = "1등상"
4080298096-DescriptionKr = "마침내 이 결과에 도달했군요.\n하지만 끝은 또 다른 시작입니다.\n내일도 잊지 말아 주세요, 회원님."
4164991921-NameKr = "1등상"
4164991921-DescriptionKr = "와아, 와아!\n저도 기뻐서 눈물까지 나려고 하는 거 있죠!\n응원이 좋은 것은, 이런 순간이 있기 때문일 거예요!"
2670560256-NameKr = "킬킬킬…… 준비되었습니다요."
2670560256-DescriptionKr = "에라의 충실한 종, 악마의 상인 실버플레이트입니다! 차원의 틈새를 타고 나타나서 사람들을 불행하게 만드는 물건을 파는 아주 나쁜 녀석이에요! 스핀오프인 <죠니 키보토스와 대구경의 마법>에서는 메인 빌런까지 되는데, 엄청 강해집니다! 그래도 코어팬들이 꽤 많아서 나름 인기도 있습니다! 예전에 마법리버 온리전에서 부스도 엄청 많이 나왔었습니다! 만만해 보이지만 피라미드 파워를 쓰면 어지간한 공격은 통하지 않아서 무지 까다로워요! 2기 11화에서는 실버플레이트가 변장 도구로 정체를 숨기고 전학 오는 장면이 나오는데요, 거기서-"
2818922347-NameKr = "매지컬 파워로 전부 회복-!"
2818922347-DescriptionKr = "마법리버 시리즈의 귀염둥이 마스코트! 스타낙 쨩 입니다! 화이트와 핑크에게 매지컬내셔널가드 계약을 해서요, 두 사람을 마법소녀로 만들어줍니다! 착하고 순진한 아이여서 에라의 악의 기사단에 납치당하고 괴롭힘당하는게 일상이지만요, 회복이 빠르고 튼튼해서 항상 해맑고 끄떡없는 강인한 아이에요! 두 사람이 절체절명의 위기에 처하면 마탄을 공급해주는 중요한 역할도 합니다! 그린팁, 블랙팁 등등, 여러가지 마탄을 품고 있습니다! 스타낙 쨩이 각성하는 에피소드는 정말 감동이었어요, 2기 7화로 기억하는데요, 스타낙 쨩이 원래의 모습인-"
3074909671-NameKr = "악의 기사단이여, 암흑의 때가 왔도다!"
3074909671-DescriptionKr = "에라! 어렸을 때 처음 보고 무서워서 에라가 나타날 때는 실눈 뜨고 봤었습니다! 엄청 예쁘지만 무지무지 무서운, 헤비캘리버즈의 숙적입니다! 에라가 사는 암흑의 행성에 사랑과 행복이 넘치는 우리 세계의 소리가 들리자 영원히 침묵하게 해주겠다면서 못된 악당들을 잔뜩 끌고서 습격해 왔습니다! 정작 에라도 웃을 때 엄청 시끄러운데 말이에요! 헤비캘리버즈의 활약에 매번 실패하긴 하지만, 절대로 포기하지 않는 무서운 악당입니다! 극장판 <마법소녀 헤비캘리버즈-데이지 커터>에서 에라가 기억을 잃고 평범한 서점 아르바이트로 사는 내용이 나오는데요, 거기서 에라가 과거에-"
907100893-NameKr = "먼로-노이만-매지컬 제트!"
907100893-DescriptionKr = "테르밋 핑크! 화이트의 든든한 사이드킥입니다! 이름이 '핑크'지만 보라색인 이유가 궁금하시다면- 앗! 스포일러가 될 수 있으니 본편을 보시는걸 추천드립니다! 원래의 핑크는 약간은 외톨이에 겉도는 학생이었는데요, 에라의 습격 때 자신을 구해준 강하고 멋진 화이트를 동경해서 매지컬내셔널가드와 계약하게 됩니다! 그리고 마법소녀 역사상 최고의 절친 콤비가 되었죠! 화이트와 함께 활약하면서 핑크는 우정과 사랑, 그리고 적절한 화력의 힘으로 자신감을 찾아가며 밝은 캐릭터로 거듭납니다! 3기 6화에서 밴드 아이돌이 되어서 인기스타가 되는 에피소드에선요-"
3133177365-NameKr = "평화의 사도! 화이트에게 맡겨줘!"
3133177365-DescriptionKr = "테르밋 화이트는 마법리버 시리즈의 영원한 주인공입니다! 원래는 조금 덜렁거리는 평범한 여자아이였지만, 어느 날 못된 에라의 습격으로 절체절명의 위기에 처했을 때! 마법나라에서 온 마스코트, 스타낙을 만납니다! 무섭고 떨렸지만 정의로운 화이트는 마법소녀의 힘을 얻기 위해 매지컬내셔널가드 계약을 맺고 마법소녀가 되었습니다! 그리고 화이트가 구해준 핑크도 마법소녀가 되면서 두 사람은 세계를 지키는 정의의 마법 미소녀, '마법소녀 헤비캘리버즈'가 됩니다! 2기 2화에서 화이트가 악당 졸개 '드래곤 스킨'을 만났을 때의 이야기인데요-"
3560225627-NameKr = "제44번 조합식 라멘"
3560225627-DescriptionKr = "어패류 베이스라 주장되는 라멘. 젓가락에게 미안해질 정도로 압도적인 맛이 특징이다. 먹을 수 있는 재료들을 조합하여 먹을 수 없는 영역에 다다른 창발성이 돋보인다. "
1070674443-NameKr = "극도로 맑은 쇼유 라멘"
1070674443-DescriptionKr = "간장 양념 베이스의 맑은 라멘. 극도로 깔끔한 맛이 특징이다. 하지만 너무나 깔끔한 나머지 집중하지 않으면 맛을 놓치기 쉽다."
2956567346-NameKr = "향미 가득 쿠로마유 라멘"
2956567346-DescriptionKr = "흑마늘 기름을 띄운 향긋한 라멘. 한 입 먹으면 마늘의 진한 감칠맛이 입안을 부드럽게 코팅한다. 비주얼에 겁먹지 말고 일단 젓가락을 들어 보자."
2787024907-NameKr = "풀토핑 돈코츠 라멘"
2787024907-DescriptionKr = "모든 종류의 토핑을 올린 돈코츠 라멘. 깊은 국물 맛과 풍성한 재료들의 조화가 한 그릇의 오케스트라를 만들어낸다. 누구도 실망하기 어려운, 그야말로 모두의 라멘."
4270783877-NameKr = "부귀영화 골든 라멘"
4270783877-DescriptionKr = "압도적인 양과 칼로리로 무장한 라멘. 망설임 없이 들이부은 재료들로만 만들 수 있는 과잉의 매력이 그릇 가득 담겨 있다. 금박 꽃은 식용이라 먹어도 되긴 한다."
2677521194-NameKr = "계정 경험치 {0}배 캠페인!"
2677521194-DescriptionKr = "계정 경험치 {0}배 캠페인이 적용 중입니다.\n계정 경험치 보너스는 AP 소모 컨텐츠 완수 시 적용됩니다.\n(임무, 특별의뢰, 학원교류회, 이벤트)"
