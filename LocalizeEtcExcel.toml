1975676702-DescriptionTw = "放著演講所需的扇子和麥克風等等道具的小桌子。由於設計風格高雅，因此也有很多人拿來佈置房屋。"
162329831-NameTw = "玄龍門龍椅"
162329831-DescriptionTw = "玄龍門代代相傳的門主專用龍椅。雖然看起來相當華麗，但據說設計上有許多不便之處。"
515353759-NameTw = "現場表演舞台"
515353759-DescriptionTw = "專為三一的偶像團體「Antique Seraphim」打造的特別舞台。這個舞台的珍貴之處在於能讓粉絲見到他們三人不同的一面。"
2823428745-NameTw = "萬魔殿書桌"
2823428745-DescriptionTw = "萬魔殿幹部皐月的專用書桌。偉大的NK-ULTRA計畫就是從這裡開始的。"
951778631-NameTw = "萬魔殿公告板"
951778631-DescriptionTw = "可了解萬魔殿活動的公告板。由書記千秋管理。"
1761559320-NameTw = "白色懶人沙發"
1761559320-DescriptionTw = "用白色棉布製成的蓬鬆懶人沙發。\n全身都將被柔軟的觸感包圍，一旦躺下就很難再起來。"
1831334057-NameTw = "藍色懶人沙發"
1831334057-DescriptionTw = "用藍色棉布製成的蓬鬆懶人沙發。\n全身都將被柔軟的觸感包圍，一旦躺下就很難再起來。"
4286106492-NameTw = "軍事露營展板裝置"
4286106492-DescriptionTw = "為表演藝術設置的巨大展板。目前上面繪有率性的塗鴉。"
3819813867-NameTw = "最初的前衛"
3819813867-DescriptionTw = "莉央為創作出自己的傑作而製作的初版模型。裡頭融入了莉央獨特的哲學。"
2386173176-NameTw = "御節料理組合桌子"
2386173176-DescriptionTw = "為迎接新年而準備的特別餐桌，上面擺滿了各式年節料理，充滿心意。"
1212778271-NameTw = "鬆餅茶桌"
1212778271-DescriptionTw = "茱莉的下午茶專用桌。雖然是優雅的下午茶組，但偶爾會發生意想不到的事……"
2483597825-NameTw = "急救箱白色桌子"
2483597825-DescriptionTw = "瀬奈的桌子，可在海灘或任何地方使用，非常實用。隨時留意緊急狀況。"
1389480680-NameTw = "千年製投球機"
1389480680-DescriptionTw = "可投出直球與8種變化球的投球機。雖然性能不錯，但和千年學園棒球部的實力似乎不太成正比……"
2327874813-NameTw = "輔助引體向上機"
2327874813-DescriptionTw = "可輔助進行引體向上的健身器材。當然，不使用輔助也是一種選擇。"
82703931-NameTw = "白色窗簾鏡子"
82703931-DescriptionTw = "可照出全身的大型鏡子。平時會用窗簾遮蓋以防灰塵。"
3344352954-NameTw = "划船用人工池塘"
3344352954-DescriptionTw = "可放小船遊玩的室內人工池塘。望著平靜水面，心情也會不自覺地平靜下來。"
582370447-NameTw = "復古電視機"
582370447-DescriptionTw = "適合觀看老電影的復古電視。雖然無法收看節目，但錄影帶還能勉強播放。"
4119717887-NameTw = "陰陽部室的矮桌"
4119717887-DescriptionTw = "總是有堆積如山的公務。長時間被擱置的文件，據說最後總會有人嘆著氣拿走。"
103026725-NameTw = "節奏的引導者"
103026725-DescriptionTw = "鼓面上殘留的無數痕跡，完整展現了某人的練習量。"
2989224265-NameTw = "夏日色彩水槍架"
2989224265-DescriptionTw = "充滿夏日氣息的水槍架。用水槍讓對手濕透吧。"
2026387541-NameTw = "戲水充氣泳池"
2026387541-DescriptionTw = "即使不去海邊也能享受夏天的充氣泳池。標籤上寫著「兒童用」。"
987535338-NameTw = "聖亞的敞篷車"
987535338-DescriptionTw = "聖亞擁有的敞篷車。光看就知道不是隨便誰都能搭乘的規格。"
180297253-NameTw = "搖椅"
180297253-DescriptionTw = "渚愛用的搖椅。自然的搖晃帶來獨特的舒適感。"
2017199336-NameTw = "海灘鞦韆"
2017199336-DescriptionTw = "設置在海灘的鞦韆。當需要整理思緒時，坐上鞦韆或許是個好選擇？"
1666961861-NameTw = "打西瓜組合"
1666961861-DescriptionTw = "看起來像普通的西瓜，實際上也確實如此。看起來像簡單的遊戲，實際上也確實如此。"
3298242563-NameTw = "豪華海灘床"
3298242563-DescriptionTw = "設置在海灘的豪華床。柔軟、舒適且奢華。"
272875268-NameTw = "茶會相簿收納櫃"
272875268-DescriptionTw = "可收納相簿等物品的書櫃。每個層架上不僅有相簿，還滿載著私人海灘的回憶。"
2325711709-NameTw = "可疑鍋釜"
2325711709-DescriptionTw = "沸騰著可疑液體的鍋釜。意外地，或許嚐起來還不錯？"
2818960363-NameTw = "魔法地毯循環扇"
2818960363-DescriptionTw = "華麗的魔法地毯與循環扇組合。即使靜止不動，也能感受到魔法的效果。"
3334773599-NameTw = "打字機專用桌"
3334773599-DescriptionTw = "為了方便使用打字機而製作的專用桌子。雖然難以用於其他用途，但似乎沒人介意。"
578477992-NameTw = "海灘躺椅與迷你桌"
578477992-DescriptionTw = "據說海灘上的躺椅與飲料，能施展讓任何人都懶散下來的魔法。"
3798522794-NameTw = "藝術家的早期作品"
3798522794-DescriptionTw = "某位媒體藝術家的早期作品。雖然本人覺得害羞，但其中蘊含的熱情無法估量。"
935541676-NameTw = "雕刻工作檯"
935541676-DescriptionTw = "放置雕刻石材的工作檯。外觀粗獷，但足以孕育精緻的藝術。"
3167056314-NameTw = "點唱機"
3167056314-DescriptionTw = "原本是投幣播放音樂的機器，也就是販賣音樂的自動販賣機……如今似乎只作為營造氛圍的巨型音響使用。"
3421618515-NameTw = "交換箱"
3421618515-DescriptionTw = "供夏萊來訪學生交換不需要物品的箱子。懷著不貪心的心態，感謝地使用吧。"
1467761258-NameTw = "頭盔清潔組"
1467761258-DescriptionTw = "乾淨的頭盔是淑女的驕傲。裡面放有頭盔保養所需的工具。"
2118635362-NameTw = "販售用桌子"
2118635362-DescriptionTw = "販售或交換各式各樣「書籍」的桌子……乍看平凡，實際上卻不一定如此。若看見穿著Cosplay的販賣員，請彼此保持禮節。"
2534689747-NameTw = "拉麵桌"
2534689747-DescriptionTw = "淡淡滲著拉麵湯頭香氣的原木桌。擺放著胡椒與蒜末等香辛料，請自由調整喜好享用吧"
872812875-NameTw = "簡易更衣室"
872812875-DescriptionTw = "設置在時裝展會場舞台後方的簡易更衣室。是華麗綻放前最隱密的場所。"
2196376303-NameTw = "維護工作站"
2196376303-DescriptionTw = "機體修理、武器整備、彈藥補給等，能應對所有狀況的萬能工作站。"
3626758680-NameTw = "遊戲開發部的空間"
3626758680-DescriptionTw = "最終還是打造出屬於自己空間的遊戲開發部場所。大家也可以聚在一起玩。"
2736494103-NameTw = "簡易廚房"
2736494103-DescriptionTw = "可以做簡單的料理或泡茶。"
1601800461-NameTw = "逝去的回憶"
1601800461-DescriptionTw = "承載著某人回憶（？）的人工身體（？）……"
3653637069-NameTw = "開閉式窗戶"
3653637069-DescriptionTw = "運輸船的窗戶。是落地窗大小，映照著從內部眺望的夜空景色。"
3157185061-NameTw = "春之人偶"
3157185061-DescriptionTw = "據說是在赤冬的春季祭典中使用的巨型人偶。據說是為了慶祝初春時節，雖然還有殘雪但萬物甦醒的季節。"
4209113555-NameTw = "遊戲開發部的日常"
4209113555-DescriptionTw = "記錄遊戲開發部日常的裝飾品。某人的日常，對另一個人來說是耀眼的非日常。"
3750481687-NameTw = "餐桌兼會議桌"
3750481687-DescriptionTw = "可作為餐桌、會議空間或任何用途使用的桌子。"
25273343-NameTw = "深夜的遊樂場"
25273343-DescriptionTw = "擺滿玩樂和美食的地毯。漫漫長夜在這上面也不過是主題樂園罷了。"
2961287885-NameTw = "紅色街機"
2961287885-DescriptionTw = "經典街機。看到「FIGHT」這個字就會燃起一決勝負的慾望。"
1693374788-NameTw = "紫色街機"
1693374788-DescriptionTw = "經典街機。幫助貓咪躲避小行星吧，喵！喵喵！"
755788283-NameTw = "藍色街機"
755788283-DescriptionTw = "經典街機。用憤怒的力量！和憤怒阿德利一起朝硬幣衝！"
3649240306-NameTw = "經典霓虹電子板"
3649240306-DescriptionTw = "經典霓虹電子板。可以用華麗的霓虹燈把牆面裝飾得很華麗。"
2738585975-NameTw = "果凍霓虹電子板"
2738585975-DescriptionTw = "果凍電子板。可以盡情觀賞果凍的可愛。"
2356428364-NameTw = "鮮豔的格紋地毯"
2356428364-DescriptionTw = "色彩鮮豔的格紋地毯。出自匠人之手的織造地毯展現了優美的獨創性。"
3862637757-NameTw = "方形紋章圖案地毯"
3862637757-DescriptionTw = "刻有複雜圖案的地毯。或許具有歷史上的重要價值……？"
958075206-NameTw = "方形幾何圖案地毯"
958075206-DescriptionTw = "幾何圖案反覆對稱排列的地毯。散發古典與復古氛圍。"
1954169509-NameTw = "雕刻白大理石紋地毯"
1954169509-DescriptionTw = "仿製高級大理石紋路的地毯。精緻到幾乎難以與真品區分。"
1260208394-NameTw = "白玫瑰多邊形花盆"
1260208394-DescriptionTw = "精心栽培的玫瑰花盆。儘管管理困難，茶會仍堅持種植鮮花。"
1350455159-NameTw = "白玫瑰長方形花壇"
1350455159-DescriptionTw = "白玫瑰盛開的花壇。其花語為純潔、純真。"
2467071271-NameTw = "覆白桌布的方桌"
2467071271-DescriptionTw = "鋪上潔白桌布的餐桌。雖然因此不怕弄髒，但反而因為太顯眼而讓人小心翼翼。"
1829879645-NameTw = "小型茶桌"
1829879645-DescriptionTw = "為一人準備的小巧茶桌。有時獨自悠閒度過時光也不錯。"
3761215951-NameTw = "下午茶茶車"
3761215951-DescriptionTw = "備齊茶具與茶點的茶車。隨時隨地都能優雅享受下午茶。"
2783808256-NameTw = "立式落地燈"
2783808256-DescriptionTw = "散發溫暖光芒的古典立燈。最大限度減輕眼睛疲勞，非常適合閱讀。"
1681173970-NameTw = "書記用講台"
1681173970-DescriptionTw = "附有書架的講台。多用於正式場合，而非私人用途。"
344479674-NameTw = "古典書籍推車"
344479674-DescriptionTw = "用於搬運書籍的推車。在仍偏好紙本書籍的三一校園，圖書管理員們忙碌地推著它穿梭各處。"
766960606-NameTw = "百合造型掛鐘"
766960606-DescriptionTw = "以百合花為造型的掛鐘。需要定期上發條。"
1994333090-NameTw = "三一式木製柵欄"
1994333090-DescriptionTw = "整潔且優雅的木製柵欄。克制的造型反而散發出華麗的美感。"
1889524945-NameTw = "茶會大型掛畫"
1889524945-DescriptionTw = "裝裱印象派畫作的掛畫。難以輕易推測原作者的意圖。"
746719294-NameTw = "茶會小型掛畫"
746719294-DescriptionTw = "收錄審美藝術作品的掛畫。大膽的構思與粗獷的筆觸格外引人注目。"
2670847271-NameTw = "超現實主義石膏像"
2670847271-DescriptionTw = "超越常識的物件。其大膽的創意彷彿在向現代藝術提出質疑。"
1363506225-NameTw = "黃銅花紋燈"
1363506225-DescriptionTw = "雕刻花卉圖案的古典黃銅燈。即使是簡單的燈具，三一也從不馬虎。"
2071964902-NameTw = "三一多人沙發"
2071964902-DescriptionTw = "以高級布料製成的多人沙發。因優先追求造型完整度，實際坐起來略顯不適。"
408630369-NameTw = "迎賓茶桌"
408630369-DescriptionTw = "簡約卻高雅的桌子。紅茶的香氣讓談話更加愉快。"
1519664668-NameTw = "西洋棋桌"
1519664668-DescriptionTw = "擺放棋盤的桌子。光是坐下就讓人看起來更聰明。"
949584604-NameTw = "翻倒的西洋棋桌"
949584604-DescriptionTw = "翻倒的桌子。棋盤與棋子散落一地，總得有人撿起來。"
3520494384-NameTw = "擺有整模蛋糕的宴會桌"
3520494384-DescriptionTw = "擺放華麗整模蛋糕的餐桌。適合特別的日子，或想讓日子變特別的時候。"
650862141-NameTw = "金色午後茶桌"
650862141-DescriptionTw = "準備了各式茶點與紅茶的茶桌。稍作休息，享受愉快的談笑吧。"
2194319883-NameTw = "晚間茶桌"
2194319883-DescriptionTw = "擺滿甜點的茶桌。結束疲憊的一天，沒有什麼比糖分與紅茶更棒。"
2290878817-NameTw = "簡約早晨茶桌"
2290878817-DescriptionTw = "擺有三明治與輕食的茶桌。再忙的早晨，也不能少了一杯茶的悠閒。"
3645596728-NameTw = "留聲機"
3645596728-DescriptionTw = "播放黑膠唱片的留聲機。擁有最新音響設備無法呈現的情感。"
1321590477-NameTw = "三一式圍牆"
1321590477-DescriptionTw = "以古代建築風格為靈感設計的優雅圍牆。拱形結構增添穩定感。"
3967034572-NameTw = "三一式拱形門"
3967034572-DescriptionTw = "以古代建築風格為靈感設計的優雅拱門。每次通過都能感受到莊嚴氣氛。"
151202876-NameTw = "三一式曲線柱"
151202876-DescriptionTw = "矗立於三一校園各處的柱子。白色基底搭配金箔裝飾，簡潔又優雅。"
3368418938-NameTw = "紅木玻璃收納櫃"
3368418938-DescriptionTw = "古典氛圍的高級收納櫃。上鎖設計，非隨意可開。"
1297438922-NameTw = "紅木三層書架"
1297438922-DescriptionTw = "工匠打造的高級書架。書架本身已屬珍貴，每本書的內容更是無價。"
1775678266-NameTw = "茶會陳列架"
1775678266-DescriptionTw = "搭配茶飲的糖、牛奶、果醬與奶油，總是備得充足。"
2663523493-NameTw = "茶會貴賓室牆面"
2663523493-DescriptionTw = "以金箔花紋裝飾的古典壁紙。散發品格與權威感。"
2590292756-NameTw = "凡爾賽圖案瓷磚"
2590292756-DescriptionTw = "造型複雜的瓷磚。不同大小的碎片交錯拼接，形成美麗的幾何圖案。"
522474381-NameTw = "三一茶會背景"
522474381-DescriptionTw = "多種色彩和諧融合的背景。那絕妙的平衡造就了極致的美感。"
1741842915-NameTw = "茶會對談包廂"
1741842915-DescriptionTw = "半封閉的雙人座。厚重的窗簾吸收大部分聲音，非常適合進行秘密談話。"
213262815-NameTw = "三一式推拉壁爐"
213262815-DescriptionTw = "採用推拉結構的壁爐。雖然實用性不高，但因設計與氛圍而備受憧憬。"
2182437926-NameTw = "茶會庭園噴泉"
2182437926-DescriptionTw = "以各種植物裝飾的石造噴泉。偶爾能看到山雀飛來啜飲。"
228833108-NameTw = "三一式水晶迴廊"
228833108-DescriptionTw = "以玻璃裝飾的優雅迴廊。僅僅走在其中，視覺也不會感到無聊。"
2386486699-NameTw = "茶會茶葉陳列架"
2386486699-DescriptionTw = "展示從奇普托斯各地收集的名茶的陳列架。為防止茶葉變質，採用嚴密密封保存。"
1659229955-NameTw = "茶會夾層"
1659229955-DescriptionTw = "適合環視室內全景的夾層結構。克制的裝潢與前衛藝術品形成鮮明對比，帶來強烈印象。"
3450502975-NameTw = "三一式高窗"
3450502975-DescriptionTw = "重視美感勝於功能性的窗戶。因結構容易積塵，需要每日細心清潔。"
649074038-NameTw = "茶會大型畫廊"
649074038-DescriptionTw = "能欣賞三一全景的畫廊。能看到這風景，本身就是一種特權。"
2836643506-NameTw = "茶會小型畫廊"
2836643506-DescriptionTw = "能欣賞三一景色的畫廊。開闊的視野令人心曠神怡。"
2271310627-NameTw = "方格磁磚地板"
2271310627-DescriptionTw = "配色方格磁磚地板。為整體空間增添時尚感。"
3412859118-NameTw = "卡式錄音帶桌子"
