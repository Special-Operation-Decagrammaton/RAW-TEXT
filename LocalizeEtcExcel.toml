2521181138-NameKr = "통유리 펜스"
2521181138-DescriptionKr = "통유리로 이루어진 펜스. 시야가 확보되어 심미적으로 좋다. 손자국이 남지 않도록 조심!"
4008069522-NameKr = "벽걸이형 램프"
4008069522-DescriptionKr = "벽에 설치할 수 있는 램프. 밀레니엄 특유의 청록색 조명이 깔끔한 느낌을 준다."
282620578-NameKr = "스탠드 램프"
282620578-DescriptionKr = "세워둘 수 있는 원통형 조명. 사방을 밝히는 청록색 조명이 깔끔한 무드를 선사한다."
4092787851-NameKr = "사각형 라운지 파티션"
4092787851-DescriptionKr = "창틀과 유리로 구성된 사각형의 파티션. 깔끔한 느낌으로 공간을 나눌 수 있다."
2481019026-NameKr = "삼각형 라운지 파티션"
2481019026-DescriptionKr = "창틀과 유리로 구성된 삼각형의 파티션. 공간 분리에 특색을 주고 싶을 때 효과 만점!"
2174794892-NameKr = "관상식물 화분 A형"
2174794892-DescriptionKr = "중간 사이즈의 관상식물이 심어진 화분. 실내에 싱그러움을 더한다."
5077418-NameKr = "관상식물 화분 B형"
5077418-DescriptionKr = "동그란 관상식물로 포인트를 줄 수 있는 화분. 포슬포슬 귀여운 느낌을 준다."
533203456-NameKr = "관상식물 화분 C형"
533203456-DescriptionKr = "큰 사이즈의 관상식물이 심어진 화분. 실내에서도 가로수 느낌을 낼 수 있다."
3136345532-NameKr = "화분이 놓여진 육각형 테이블"
3136345532-DescriptionKr = "작은 화분이 놓여진 실용적인 육각형 테이블. 왠지 공기가 맑아지는 기분이 든다."
1840858735-NameKr = "태블릿이 놓여진 원형 테이블"
