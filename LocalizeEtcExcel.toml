3153525398-NameTh = "เปลี่ยนสถานะหุ่น"
3153525398-DescriptionTh = "หุ่นจะเปลี่ยนสถานะในทุกเวลาที่กำหนด\nสถานะดีบัฟ: เมื่อมอบเอฟเฟกต์ฟื้นฟูให้หุ่น จะสร้างความเสียหายกับนักเรียนฝ่ายเรา เอฟเฟกต์ฟื้นฟูต่อหุ่นจะคงที่ที่ 1\nสถานะปกติ: มอบเอฟเฟกต์ฟื้นฟู"
1300743634-NameTh = "ลดค่าป้องกันและเพิ่มความเสียหายที่ได้รับ เมื่อกำจัดศัตรู"
1300743634-DescriptionTh = "เพิ่มค่าป้องกันของศัตรูขึ้นอย่างมาก\nเมื่อกำจัดศัตรูได้ ค่าป้องกันของศัตรูจะลดลงและความเสียหายที่ได้รับจะเพิ่มขึ้น"
866787253-NameTh = "ฟื้นฟู HP ของศัตรูคนอื่น เมื่อ HP ของศัตรูลดลง"
866787253-DescriptionTh = "เมื่อ HP ของศัตรูลดลงต่ำกว่า 75%, 50% หรือ 25% จะฟื้นฟู HP ของศัตรูทั้งหมด ยกเว้นศัตรูคนนั้น\nเมื่อกำจัดศัตรูได้ จะฟื้นฟู HP ของฝ่ายเราทั้งหมดและเพิ่มการฟื้นฟูค่าใช้สกิล"
728198119-NameTh = "เพิ่มประสิทธิภาพลึกลับ"
728198119-DescriptionTh = "เพิ่มค่าประสิทธิภาพลึกลับให้กับฝ่ายเราที่ใช้อาวุธ AR และ RG\nเพิ่ม HP สูงสุดของศัตรู"
1003414517-NameTh = "ความเสียหายเมื่อกำจัดศัตรู"
1003414517-DescriptionTh = "เมื่อกำจัดศัตรู จะสร้างความเสียหายกับศัตรูในรัศมีใกล้กับตำแหน่งนี้"
2349011676-NameTh = "เพิ่มความเสียหายที่ศัตรูได้รับ และเพิ่ม HP ของบ็อกซ์แคทสุดท้าย"
2349011676-DescriptionTh = "เพิ่มความเสียหายที่ได้รับจากศัตรู\nเพิ่ม HP ของบ็อกซ์แคทสุดท้าย"
3488597961-NameTh = "เพิ่มความสามารถพื้นฐาน"
3488597961-DescriptionTh = "เพิ่มความสามารถพื้นฐานของนักเรียนฝ่ายเราที่ใช้อาวุธ AR หรือ SR"
1388660830-NameTh = "ลดความเสียหายเพิ่มเติมและค่าความแม่นยำ"
1388660830-DescriptionTh = "สร้างความเสียหายเพิ่มเติมเมื่อศัตรูโจมตี\nลดค่าความแม่นยำของศัตรู"
3559310313-NameTh = "ลดค่าฟื้นฟูที่หุ่นได้รับ และเพิ่มการฟื้นฟูค่าใช้สกิลเมื่อยกเลิกเอฟเฟกต์อันตราย"
3559310313-DescriptionTh = "มอบเอฟเฟกต์ลดค่าฟื้นฟูที่ได้รับเมื่อยกเลิกเอฟเฟกต์จากหุ่น\nเมื่อยกเลิกแล้ว จะเพิ่มการฟื้นฟูค่าใช้สกิลของฝ่ายเรา"
