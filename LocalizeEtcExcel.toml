1066886482-NameTh = "แผ่นสำเนาวอยนิช"
1066886482-DescriptionTh = "แผ่นสำเนาวอยนิชที่ถูกฉีกมาจากหนังสือ ใช้สำหรับอัปเกรดและสร้างไอเทมต่างๆ"
4122424050-NameTh = "มันฝรั่งรสช็อกโกแลต"
4122424050-DescriptionTh = "ขนมมันฝรั่งเคลือบช็อกโกแลตด้านเดียว มีเนื้อสัมผัสที่กรอบ\nและเคลือบด้วยความหวานของช็อกโกแลต แต่ดูเหมือน\nจะไม่ถูกปากโมโมกะสักเท่าไหร่"
2341679944-NameTh = "ช็อกโกแลตเอ็นเจล"
2341679944-DescriptionTh = "ช็อกโกแลต PB ของร้าน <เอ็นเจล 24> แฟรนไชส์ร้านสะดวกซื้อ โซระกดสั่งซื้อมันมาเกินจำนวน แต่โชคดีที่คุณครูมาช่วยทำให้ขายได้หมด"
2435557875-NameTh = "ช็อกโกแลตมินิห่อใหญ่"
2435557875-DescriptionTh = "ช็อกโกแลตมินิห่อใหญ่ที่รินวางไว้ในห้องรับรอง\nสำหรับกินระหว่างทำงาน ช็อกโกแลตมินิธรรมดา\nที่ไม่มีรสชาติพิเศษอะไร"
2724075845-NameTh = "คุกกี้ขนมปังขิงรสช็อกโกแลต\nของอะโรน่า"
2724075845-DescriptionTh = "คุกกี้ขนมปังขิงช็อกโกแลตที่อะโรน่าตั้งใจทำมาก มีรูปคุณครูกับอะโรน่าที่ใช้ไวท์ช็อกโกแลตวาดด้านบน"
1567224539-NameTh = "เพโรโร่วาเลนไทน์"
1567224539-DescriptionTh = "ช็อกโกแลตรูปเพโรโร่ที่วางจำหน่ายฉลองวันวาเลนไทน์ เป็นกระแสมากในหมู่แฟนๆ เพราะเป็นสินค้าลิมิเต็ดเอดิชั่น"
984677767-NameTh = "เรชั่นแบบ D"
984677767-DescriptionTh = "ช็อกโกแลตทหารที่ทำจากข้าวโอ๊ตผสมกับผงโกโก้ เหมาะสำหรับภารกิจระยะยาวเนื่องจากให้แคลอรี่สูง"
1666908815-NameTh = "ช็อกโกแลตร้อนแฮปปี้"
1666908815-DescriptionTh = "ช็อกโกแลตร้อนอุ่นๆ ที่ฮานาเอะเตรียมไว้ให้\nดื่มเพียงหนึ่งจิบจะช่วยบรรเทาความเมื่อยล้า\nและทำให้มีความสุขไปพร้อมกัน"
3922278991-NameTh = "ช็อกโกแลตลาเต้ สูตรเกเฮนน่า"
3922278991-DescriptionTh = "ดาร์กช็อกโกแลตของเกเฮนน่าที่ให้แคลอรี่และคาเฟอีนสูง\nเนื่องจากอยู่ในกระป๋องกลม จึงมักจะมีคนที่เข้าใจผิด\nว่าเป็นยาขัดรองเท้าอยู่บ่อยๆ"
342988654-NameTh = "ช็อกโกแลตบาร์กองโต"
342988654-DescriptionTh = "ช็อกโกแลตบาร์กองโตที่อาคาริซื้อมาไว้ สำหรับเตรียมเข้าแข่งกินจุช็อกโกแลต คนธรรมดาแค่เห็นก็ปวดท้องแล้ว"
741491105-NameTh = "ดังโงะช็อกโกแลต"
741491105-DescriptionTh = "ดังโงะราดช็อกโกแลตที่ขายอยู่ในร้านขนมชื่อดัง ว่ากันว่ามันมีรสชาติเข้ากันมากกว่าที่คาดไว้"
2503165795-NameTh = "เดธเลิฟ"
2503165795-DescriptionTh = "ของแถมที่ได้รับเมื่อซื้ออัลบั้มวาเลนไทน์ลิมิเต็ดอิดิชั่น\nของแบล็ก เดธ พอยซั่น <ความรักคือการไขว่คว้าพิชิตใจ>\nรสชาตินุ่มและหวาน ต่างจากรูปลักษณ์ที่ดูน่ากลัว"
3659929614-NameTh = "ของว่างของนักปั่น"
3659929614-DescriptionTh = "เอเนอร์จีบาร์ที่ชิโรโกะเตรียมไว้กินตอนปั่นจักรยาน เอเนอร์จีบาร์ที่ทำจากถั่วเคลือบด้วยช็อกโกแลต ช่วยฟื้นฟูพลังงานได้ทันทีที่กิน"
3042768744-NameTh = "สหายแห่งทะเลช็อกโกแลต"
3042768744-DescriptionTh = "ช็อกโกแลตรูปปลาวาฬที่ขายเป็นของที่ระลึกในพิพิธภัณฑ์ทางทะเล มันมีขนาดใหญ่กว่าช็อกโกแลตปลาแบบอื่น"
1510394578-NameTh = "กุหลาบทะเลทราย"
1510394578-DescriptionTh = "ช็อกโกแลตรูปดอกกุหลาบที่ขายอยู่ในสถานีอะบิดอส\nช็อกโกแลตที่ได้แรงบันดาลใจจากกุหลาบทะเลทราย\nนิยมใช้มอบเป็นของขวัญ"
2394567841-NameTh = "ช็อกโกแลตวีนัส"
2394567841-DescriptionTh = "ช็อกโกแลตชิ้นหนาที่ทำมาสำหรับผู้ใหญ่\nดูเหมือนจะไม่เป็นที่นิยมมากนัก เพราะรูปร่างดูล่อแหลมเกินไป"
367299249-NameTh = "อุปกรณ์ดักฟัง No.14"
367299249-DescriptionTh = "อุปกรณ์ดักฟังรูปช็อกโกแลตที่โคทามะประดิษฐ์ขึ้น\nดูแล้วไม่รู้เลยว่าตั้งใจทำมาเพื่อซ่อนอุปกรณ์"
919440775-NameTh = "โกโก้ร้อนกระป๋อง"
919440775-DescriptionTh = "โกโก้กระป๋องที่วางขายในตู้กดน้ำเป็นหลัก ความอุ่นจากกระป๋องนี้จะทำให้ร่างกายอบอุ่นได้"
3490934017-NameTh = "เซ็ตนามะช็อกโกแลต\n(พร้อมใบเสร็จ)"
3490934017-DescriptionTh = "เซ็ตช็อกโกแลตที่ยูกะซื้อให้คุณครูเป็นของขวัญ\nแม้ว่าจะเป็นช็อกโกแลตหรูที่มีมูลค่ากว่า 10,000 เยน\nแต่ก็มีใบเสร็จ 5,000 เยนแนบมาด้วย"
419901229-NameTh = "ช็อกโกแลตฮีโร่ (ไอเทม)"
419901229-DescriptionTh = "ไอเทมช็อกโกแลตแบบลิมิเต็ดเอดิชั่น ยูสึมอบให้คุณครูเป็นของขวัญในเกม RPG กินแล้วจะช่วยฟื้นฟู HP ของผู้เล่นได้เล็กน้อย"
3659962553-NameTh = "สเนลช็อกโกแลตโฮมเมด"
3659962553-DescriptionTh = "ไอเทมช็อกโกแลตโฮมเมดที่อาริสึทำเอง โดยได้แรงบันดาลใจมาจาก 'สเนล' มอนสเตอร์ในเกม แต่ไม่ว่าจะมองยังไงก็ดูไม่เหมือนสเนลเท่าไหร่"
941224173-NameTh = "มอนสเตอร์แม็กซ์ รสช็อกโกแลต"
941224173-DescriptionTh = "มอนสเตอร์แม็กซ์รสช็อกโกแลตที่ทำมาฉลองเทศกาลวาเลนไทน์ รสชาติมันแย่มาก แต่ให้ผลกระปรี้กระเปร่าเป็นเลิศ"
1781832965-NameTh = "สเปรย์รสช็อกโกแลต"
1781832965-DescriptionTh = "สเปรย์ที่พ่นออกมาเป็นช็อกโกแลตแทนหมึก มากิบอกว่ามันใช้ทำให้โลกอ่อนละมุนได้"
4075915701-NameTh = "ช็อกโกแลต ลูกปืนใหญ่ Mk.2 "
4075915701-DescriptionTh = "ลูกปืนใหญ่ช็อกโกแลตที่ฮิบิกิพัฒนาขึ้นสำหรับ\nวันวาเลนไทน์ เมื่อยิงจะสร้างบ่อช็อกโกแลตขนาดใหญ่\nตรงจุดที่ระเบิด"
2579538323-NameTh = "สกรูช็อกโกแลต"
2579538323-DescriptionTh = "ช็อกโกแลตที่ทำเป็นรูปสกรูและห่อด้วยฟอยล์ ถึงรูปลักษณ์ภายนอกจะเหมือนสกรูของจริง แต่ใช้เป็นเครื่องมือไม่ได้"
3469911388-NameTh = "ช็อกเชริโน่"
3469911388-DescriptionTh = "ช็อกโกแลตนมสูตรพิเศษของสหภาพเรดวินเทอร์ ผลิตโดยชมรมโภชนาการเรดวินเทอร์ เชริโน่ได้ชิมแล้วหนึ่งคำ"
1188251464-NameTh = "ช็อกเชริโน่รุ่นใหม่"
1188251464-DescriptionTh = "ช็อกเชริโน่รุ่นใหม่ที่มีภาพวาดสุดน่ารักฝีมือโทโมเอะ รสชาติแทบไม่ต่างกับช็อกเชริโน่รุ่นเดิม"
3845682331-NameTh = "ผลโกโก้"
3845682331-DescriptionTh = "ผลโกโก้ที่โนโดกะหามาได้อย่างยากลำบาก เพราะอยากให้ช็อกโกแลตเป็นของขวัญกับคุณครู มีรสไม่หวาน แต่ถ้าต้มดื่มจะเหมือนชารสชาติดี"
410737829-NameTh = "ยาอายุวัฒนะ (ล้มเหลว)"
410737829-DescriptionTh = "ยาอายุวัฒนะรุ่นใหม่ที่ซายะผลิตขึ้นมาใหม่ โดยมีช็อกโกแลตเป็นฐาน\nด้วยความผิดพลาดในระหว่างพัฒนา ทำให้มันกลายเป็นเครื่องดื่ม\nรสช็อกโกแลตธรรมดา ไม่ใช่ยาอายุวัฒนะ"
1298182383-NameTh = "บอนบอน เหล้ารัมสำหรับผู้ใหญ่"
1298182383-DescriptionTh = "ช็อกโกแลตบอนบอนที่มีกลิ่นเหล้ารัมรุนแรง เป็นรสชาติที่ยังไม่เหมาะสำหรับนักเรียนที่จะกิน"
125955518-NameTh = "กุญแจมือช็อกโกแลต"
125955518-DescriptionTh = "ช็อกโกแลตที่ทำเป็นรูปร่างกุญแจมือ ห่อฟอยล์ไว้ด้านบน\nและมีรูปลักษณ์เหมือนของจริง แต่ว่าใช้เป็นกุญแจมือไม่ได้"
1951960570-NameTh = "โดนัทเกลียวช็อกโกแลต\nสูตรพิเศษ"
1951960570-DescriptionTh = "โดนัทเกลียวช็อกโกแลตสูตรพิเศษของมาสเตอร์โดนัท\nมีวางขายในเทศกาลวาเลนไทน์เท่านั้น เพิ่มความหวาน\nด้วยการโรยน้ำตาลตกแต่งแบบพิเศษ"
711391590-NameTh = "ฮานิวาช็อกโกแลต"
711391590-DescriptionTh = "ช็อกโกแลตรูปทรงฮานิวาที่ฮานาโกะเตรียมไว้ ดูไม่น่ามองเท่าไหร่"
4101876-NameTh = "ลูกกระสุนจิ๋ว"
4101876-DescriptionTh = "ช็อกโกแลตรูปทรงกระสุนปืนไรเฟิลที่ฮาสุมิมอบให้\nเป็นช็อกโกแลตชิ้นเล็กๆ แต่มีรสหวานรุนแรง"
2407160249-NameTh = "ช็อกโกแลตโฮมเมดของฮินะ"
2407160249-DescriptionTh = "ช็อกโกแลตโฮมเมดที่ฮินะรวบรวมความกล้า\nและทำขึ้นด้วยตัวเอง แม้รูปร่างจะไม่สวยมาก แต่ความตั้งใจที่อยู่ในนั้นสวยงามกว่าสิ่งอื่นใด"
1422578612-NameTh = "คำแห่งการพักผ่อนเพื่อเธอ"
1422578612-DescriptionTh = "ช็อกโกแลตที่อาโกะทำขึ้นเอง โดยใช้วัตถุดิบที่คัดสรรมาอย่างดี\nเช่นเดียวกับงานของเลขานุการ เธอได้ทำช็อกโกแลตที่ดี\nต่อการกินได้อย่างสบายๆ และเผลอกินโดยไม่รู้ตัว"
87498756-NameTh = "ช็อกโกแลต! อร่อย! ว้าว!"
87498756-DescriptionTh = "ช็อกโกแลตจากวัตถุดิบที่อิซุมิคิดว่าเข้ากับช็อกโกแลตที่ดีที่สุด อิซุมิบอกว่านี่เป็นช็อกโกแลตรสชาติอร่อยว้าวสุดๆ มีจุดเด่นที่เค็มนิดๆ แต่อร่อยมาก"
1899678676-NameTh = "ช็อกโกแลตที่ดีที่สุด\nของท่านประธาน"
1899678676-DescriptionTh = "ช็อกโกแลตที่ดีที่สุดที่อารุซื้อจากอินเทอร์เน็ต เพื่อขอบคุณคุณครูที่เป็นพาร์ทเนอร์ ความจริงคือเป็นสินค้าที่ถูกขายเลหลัง แต่ความรู้สึกที่อัดแน่นในนั้นก็ยังไม่เปลี่ยนแปลง และเปล่งประกาย"
171489856-NameTh = "รัสเซียนรูเล็ตนรก"
171489856-DescriptionTh = "ช็อกโกแลตรัสเซียนรูเล็ต ที่มุสึกิเจอในอินเทอร์เน็ต\nและให้ความสนใจอย่างมาก ถ้าสุ่มเจอจะได้เห็นนรก\nสินค้าที่เหมาะจะใช้แกล้งเพื่อน"
2099851060-NameTh = "แก้วมัคโกโก้"
2099851060-DescriptionTh = "โกโก้ที่ฟูกะชงไว้ให้คุณครู รู้สึกได้ถึงน้ำใจของฟูกะที่อบอุ่นและอ่อนหวาน"
1852286999-NameTh = "ช็อกโกแลตที่จูริทำสุดฝีมือ"
1852286999-DescriptionTh = "ช็อกโกแลตโฮมเมดที่จูริตั้งใจทำอย่างสุดฝีมืด\nเพื่อจะมอบให้คุณครู แค่มองก็รู้สึกได้ถึงความจริงใจของจูริ แม้จะยังไม่ได้ลองกินดูก็ตาม"
1269992298-NameTh = "เค้กชั่วโมงที่อยู่ด้วยกัน"
1269992298-DescriptionTh = "เค้กช็อกโกแลตที่ดีที่สุด เซริกะได้รับมาจากที่ที่ทำงานพาร์ทไทม์กับคุณครู รสชาติของเค้กหวานละมุนนี้มีหยาดเหงื่ออยู่ด้วย"
265930468-NameTh = "เซ็ตของขวัญช็อกโกแลตรวม"
265930468-DescriptionTh = "เซ็ตของขวัญขนมช็อกโกแลตรวม ซื้อมาจากห้างสรรพสินค้าที่พบพร้อมกับคุณครู เป็นของขวัญที่ดีที่สุดในวันวาเลนไทน์\nที่รวมขนมหลากหลายแบบที่กินได้ไม่เบื่อ"
689413464-NameTh = "หนึ่งเดียวที่ดีที่สุด"
689413464-DescriptionTh = "ของกินที่สึมิเระถือว่าดีที่สุดสำหรับคุณครู\nหลังจากได้ลองกินอาหารทดแทน\nการออกกำลังกายนับ 100 ชนิด กินแค่นิดเดียวก็รู้สึกอิ่มแล้ว"
3328209817-NameTh = "ช็อกโกแลตวูฟารูฟาบุก!"
3328209817-DescriptionTh = "ช็อกโกแลตที่โมโมอิหยิบได้มาจากตู้คีบ มีของเล่นมาสคอตตัวละครจากเกมต่อสู้ชื่อดัง <คาซิโอเปีย~ วูฟารูฟาแบตเทิล~> รวม 7 แบบ"
3385816833-NameTh = "ช็อกโกแลตโฮมเมดของมิโดริ"
3385816833-DescriptionTh = "ช็อกโกแลตที่มิโดริตื่นขึ้นมาทำแต่เช้าตรู่ ด้วยความตั้งใจแรงกล้าที่อยากให้ช็อกโกแลต\nกับคุณครูก่อนใคร"
3589704604-NameTh = "ช็อกโกแลตเสี่ยงทายของชิเซะ"
3589704604-DescriptionTh = "ขนมช็อกโกแลตรูปแบบใหม่ มีเศษกระดาษเขียนข้อความเล็กๆ ที่ชิเซะเตรียมไว้ ส่วนใหญ่เป็นข้อความที่สมบูรณ์ แต่นานๆ ทีก็จะมีเขียนประโยคที่ไม่ถูกต้องอยู่ด้วย"
3842989732-NameTh = "ขนมลิมิเต็ด\nของร้านเฮียกคิยาโค"
3842989732-DescriptionTh = "ของหวานรุ่นวาเลนไทน์ มีวางขายในร้านเฮียกคิยาโคในช่วงวาเลนไทน์ เป็นสินค้าพิเศษที่ทำตามความชอบของลูกค้าโดยเฉพาะ ซึ่งส่วนใหญ่ก็คือความชอบของคุณครูนั่นเอง"
3251730635-NameTh = "เซ็ตนินจาช็อกโกแลต No.49!"
3251730635-DescriptionTh = "เซ็ตช็อกโกแลตนินจาในฝัน สินค้าพิเศษที่อิซุนะไปต่อแถวซื้อตั้งแต่เช้าตรู่ เพราะอยากเอาไว้ชิมกับนายท่าน บอกไว้ก่อนว่าไม่ใช่ของที่ใช้ได้จริง ดังนั้นระวังไว้ด้วย"
4247091559-NameTh = "ชุดเตรียมนอน\nกับช็อกโกแลตชวนนอน"
4247091559-DescriptionTh = "ชุดเตรียมนอนสำหรับวันวาเลนไทน์ สึบากิเตรียมไว้ให้คุณครูที่เหนื่อยล้า จากการทำงานหักโหม และล่วงเวลาโดยเฉพาะ ราคารวม 3,980 เยน"
2771361458-NameTh = "ช็อกโกแลตแห่งรักของวาคาโมะ"
2771361458-DescriptionTh = "ช็อกโกแลตโฮมเมดที่วาคาโมะทำขึ้นมา\nด้วยจิตใจที่ร้อนแรงและอัดแน่นด้วยความรัก\nจนเธอควบคุมไม่ได้ แต่ไม่สามารถรู้ได้เลยว่า\nที่ใส่ลงไปมีแต่ความรักจริงหรือเปล่า"
1572630441-NameTh = "ช็อกโกแลตพิสูจน์รสชาติ (รสชาเขียว)"
1572630441-DescriptionTh = "ช็อกโกแลตรสชาเขียวที่ฮารุนะทำกับคุณครู\nเพื่อพิสูจน์สมมุติฐานของรสชาติที่เธอได้เรียนรู้\nด้วยตัวเอง มีรสขมลึกและรสหวานที่เปี่ยมด้วย\nคำขอบคุณออกมาเมื่อกิน"
3743008500-NameTh = "ทูตวาเลนไทน์ สกัลแมน"
3743008500-DescriptionTh = "ช็อกโกแลตของ <ทูตแห่งความตายสกัลแมน> ที่อาซึสะเตรียมไว้\nและเป็นสินค้าลิมิเต็ดที่หาได้ในเทศกาลวาเลนไทน์เท่านั้น"
1084418779-NameTh = "เลิฟลี่ ครอสไลน์"
1084418779-DescriptionTh = "ช็อกโกแลตชื่อดังที่โคฮารุนำมา สินค้าคุณภาพสูงที่ผสมไวท์\nและดาร์กช็อกโกแลต มีจุดเด่นที่เส้นกากบาทตรงกลาง"
2742248602-NameTh = "ทวิงเคิล สตาร์"
2742248602-DescriptionTh = "ช็อกโกแลตรูปดาวที่สึซึมิซื้อมาจากร้านสะดวกซื้อ ห่อด้วยฟอยล์สีทองที่เปล่งประกายระยิบระยับ"
663608497-NameTh = "รางวัลซิสเตอร์ช็อกโกแลต"
663608497-DescriptionTh = "รางวัลซิสเตอร์ที่มารีให้เป็นของขวัญ ทำจากช็อกโกแลต มันอาจถูกทำมาเพื่อจัดแสดงมากกว่าจะเป็นอาหารตั้งแต่แรก"
848260985-NameTh = "ลูกแก้วช็อกโกแลต"
848260985-DescriptionTh = "ช็อกโกแลตทรงลูกแก้วที่ไม่ละลายในมือหรือแหลกเป็นชิ้นๆ โด่งดังในหมู่นักอ่านรวมถึงชิมิโกะ"
1900401189-NameTh = "บี วิธ ยู"
1900401189-DescriptionTh = "ช็อกโกแลตโฮมเมดที่เซรินะทำให้ รสชาติหวานนี้จะทำให้จิตใจผ่อนคลาย"
4183660781-NameTh = "ช็อกโกแลตสเปียร์มินต์"
4183660781-DescriptionTh = "ช็อกโกแลตมินต์สูตรพิเศษที่ไอริเตรียมไว้ ด้วยมูลค่าและความหายากของมัน จึงใช้เป็นของขวัญมอบให้คนที่รักได้"
1868703267-NameTh = "ช็อกโกแลตโยชิมิ รุ่นลิมิเต็ด"
1868703267-DescriptionTh = "ช็อกโกแลตโฮมเมดที่โยชิมิทำขึ้นด้วยตัวเอง อาจคิดว่าเป็นสินค้า\nที่มีจำนวนจำกัดที่ไม่สามารถพบที่ไหนได้อีกก็ได้"
355355427-NameTh = "ช็อกโกแลตแทนคำพูด"
355355427-DescriptionTh = "ช็อกโกแลตที่คาดว่านัตสึทำเองกับมือ มีดีไซน์ที่ค่อนข้างเรียบง่าย เหมาะจะใช้แทนคำพูดมากมายของนัตสึ"
2098665142-NameTh = "ช็อกโกแลตนำโชค (ทำมือ)"
2098665142-DescriptionTh = "ช็อกโกแลตนำโชคที่ชินัตสึเตรียมไว้ให้ ว่ากันว่ามีข้อความต่างๆ ถูกเขียนไว้ข้างใน"
3487183095-NameTh = "ช็อกโกแลตผ้าพันแผล"
3487183095-DescriptionTh = "ช็อกโกแลตโฮมเมดที่เซนะทำเล่นระหว่างรอเหตุฉุกเฉิน เนื่องจากไม่สามารถหากระดาษห่อได้ จึงพันด้วยผ้าพันแผลที่สะอาดแทน"
3066393242-NameTh = "โกโก้ 99.99%"
3066393242-DescriptionTh = "ช็อกโกแลตราคาแพงมากที่ฮารุกะเอามาให้คุณครู ระดับความเข้มข้นที่ 99.99% นี้อาจไม่ใช่แค่ระดับน้ำตาลของช็อกโกแลต"
3579363383-NameTh = "วาเลนไทน์หักมุม"
3579363383-DescriptionTh = "ช็อกโกแลตที่อาสึนะเตรียมไว้ให้นายท่านในวาเลนไทน์\nมีการปรับเปลี่ยนเล็กน้อยในกระบวนการเตรียมการ"
304962670-NameTh = "เมด บาย เมด"
304962670-DescriptionTh = "ช็อกโกแลตโฮมเมดที่อาคาเนะลงมือทำเอง เป็นผลงานชั้นยอดที่แสดงความสามารถของเมดอย่างเต็มที่"
1933815846-NameTh = "ข้าวห่อไข่ช็อกโกแลต"
1933815846-DescriptionTh = "ข้าวห่อไข่ที่คารินเตรียมไว้สำหรับวันวาเลนไทน์ ใช้ช็อกโกแลตวาดเป็นรูปหัวใจแทนซอสมะเขือเทศ"
1957428602-NameTh = "ภาพพิมพ์ช็อกโกแลต : มังกร"
1957428602-DescriptionTh = "ภาพพิมพ์มังกรที่เนรุนำมา ทำจากช็อกโกแลต ไม่มีทางที่จะรู้ได้ว่ามันมาจากไหนและอย่างไร"
1255509912-NameTh = "จุดเริ่มต้นวาเลนไทน์"
1255509912-DescriptionTh = "ช็อกโกแลตที่โคโทริทำขึ้นเอง เพื่ออธิบายต้นกำเนิดและความสำคัญ\nของวาเลนไทน์ ถึงหน้าตาจะดูไม่ดีแต่รสชาติดีเยี่ยม"
1303875154-NameTh = "แก้วแสนหวาน"
1303875154-DescriptionTh = "ช็อกโกแลตรูปแก้วเหล้าที่พีน่านำมา เนื่องจากเป็นของที่ระลึกวาเลนไทน์ จึงไม่ใช่แก้วเหล้าจริงๆ และข้างในก็ไม่ใช่เหล้าเช่นกัน"
1082089594-NameTh = "อัลมอนด์คริมสัน"
1082089594-DescriptionTh = "ช็อกโกแลตอัลมอนด์ที่ซึรุกิทิ้งไว้\nที่ตรงคอขวดแก้วมีริบบิ้นสีแดงน่ารักผูกไว้อยู่"
3411154794-NameTh = "ช็อกโกแลตห่อแบบลวกๆ"
3411154794-DescriptionTh = "ช็อกโกแลตโฮมเมดที่โคโคน่าตั้งใจทำแม้ว่าจะไม่ชำนาญ เจ้าตัวยืนกรานเด็ดขาดว่าเธอไม่ได้ห่อเอง เอาไว้ไปลองชิมคนเดียวในที่ปลอดคนได้"
421170184-NameTh = "ช็อกบอลสำหรับหนูน้อย"
421170184-DescriptionTh = "ช็อกบอลที่เตรียมไว้ให้เด็กๆ ที่เข้ามาในวิหาร ฮินาตะบอกว่า เธอรู้รสชาติของช็อกบอลทุกชิ้นดี"
412848971-NameTh = "คุกกี้ช็อกโกแลตเนื้อหนึบ"
412848971-DescriptionTh = "คุกกี้ใส่ช็อกโกแลตชิปที่อุยเตรียมไว้ ว่ากันว่าเธอเลือกทำแบบเนื้อหนึบ เพื่อจะได้ไม่มีเศษคุกกี้หล่น"
1622643101-NameTh = "ชิ้นเค้กช็อกโกแลต สตรอว์เบอร์รี"
1622643101-DescriptionTh = "เค้กช็อกโกแลตสตรอว์เบอร์รีชิ้นที่คาซึสะเตรียมไว้ เนื่องจากเป็นชิ้นที่เลือกไว้อย่างพิถีพิถัน โปรดถืออย่างระมัดระวัง"
2747826200-NameTh = "ช็อกโกแลตห่อเล็ก"
2747826200-DescriptionTh = "ช็อกโกแลตวาเลนไทน์ ถึงจะเล็กจิ๋วแต่ก็ถูกห่อมาอย่างดี สำหรับฮิโยริแล้ว นี่เป็นช็อกโกแลตที่เธอรู้สึกว่ายอมแลกได้กับทุกอย่าง"
2837160480-NameTh = "ช็อกโกแลตห่อบรรจง"
2837160480-DescriptionTh = "ช็อกโกแลตวาเลนไทน์ที่ห่อมาอย่างพิถีพิถัน ห่อที่ประณีตนี้ สะท้อนให้เห็นถึงนิสัยอีกด้านหนึ่งของมิซากิ"
4062180493-NameTh = "ดอกไม้กับช็อกโกแลต"
4062180493-DescriptionTh = "ช็อกโกแลตที่อาสึโกะทำเอง และใช้ดอกไม้ที่อาสึโกะปลูกเอง มีคำโบราณบอกไว้ว่าเจ้าหญิงกุมความลับไว้มากมาย"
3932209420-NameTh = "ช็อกโกแลตกิดีวา"
3932209420-DescriptionTh = "ช็อกโกแลตที่ดีที่สุดที่ซาโอริเตรียมไว้ ว่ากันมันต้องผ่านการเตรียมการหลายขั้นตอน"
2263489181-NameTh = "ซากุระช็อกโกแลต"
2263489181-DescriptionTh = "ซากุระช็อกโกแลตของมิโมริ เป็นช็อกโกแลตที่มิโมริทำเองด้วยใจ ไม่เกี่ยวอะไรกับการอ่านใจ คิดว่างั้นนะ"
170445747-NameTh = "ช็อกโกซอรัสสุดแกร่ง"
170445747-DescriptionTh = "ช็อกโกซอรัสสุดแกร่งที่คาเอเดะทำขึ้น เมื่อช็อกโกแลตฟอสซิล\nไดโนเสาร์ที่ตอนแรกตั้งใจจะให้เป็นของขวัญพังไม่เป็นท่า\nคาเอเดะเลยทำเป็นแบบนี้แทน โดยรวบรวมเศษช็อกโกแลตที่ยัง\nไม่แตกมารวมๆ กับช็อกโกแลตที่ทำขึ้นใหม่ คาเอเดะบอกว่า\n'นี่คือไดโนเสาร์สุดแกร่ง!'"
566203770-NameTh = "ช็อกโกแลต รูปกระต่ายละลาย"
566203770-DescriptionTh = "ช็อกโกแลตรูปกระต่ายฮอลแลนด์ลอปสุดน่ารัก สึคุโยะอาจกอดแนนเกินไป จนทำให้รูปร่างเปลี่ยนไปเล็กน้อย..."
2104744538-NameTh = "ช็อกโกแลตของแฮ็กเกอร์ ผู้มีรอยยิ้มฮีลใจ"
2104744538-DescriptionTh = "ช็อกโกแลตที่ฮิมาริทำขึ้นตามรูปลักษณ์ของตัวเอง เธอใช้ความคิดเชิงตรรกะ จนได้ข้อสรุปว่าควรให้นำกลับไปกินที่ชาเล่ต์"
3304317128-NameTh = "ช็อกโกแลตสติ๊กโฮมเมด ของอิโรฮะ"
3304317128-DescriptionTh = "ขนมช็อกโกแลตแท่งที่อิโรฮะทำเองกับมือ หนึ่งในนั้น\nมีขนมหนึ่งแท่งที่มี \"รอยกัด\" อยู่ด้วย..."
902334212-NameTh = "ช็อกโกแลตเซ็ตเครื่องหมาย ของชมรมวิจัยศาสตร์นินจา"
902334212-DescriptionTh = "ช็อกโกแลตพิเศษที่มิจิรุทำขึ้นมาเป็นพิเศษ พอถึงตอนให้ของขวัญจริง ๆ มิจิรุกลับลนลานไปหมด แต่ถึงยังไงความรักที่เธอมีต่อพวกพ้อง และความเคารพที่ต่อคุณครู ยังคงเปล่งประกายอย่างสวยงามไม่เปลี่ยน"
813659355-NameTh = "เค้กแคร์รอตช็อกโกแลต"
813659355-DescriptionTh = "เค้กแคร์รอตผสมช็อกโกแลตที่มิยาโกะทำเอง ว่ากันว่าความหวานที่มากเกินไปนั้น จะเป็นอันตรายต่อกระต่าย"
490342082-NameTh = "สมอร์ช็อกโกแลต"
490342082-DescriptionTh = "สมอร์ช็อกโกแลตที่โมเอะทำมาให้ แต่ทว่าแคลลอรีจากสมอร์ผสมช็อกโกแลต และมาร์ชเมลโลรสหวาน เป็นการทำลายล้างอย่างแท้จริง"
1288390774-NameTh = "เสบียงช็อกโกแลต คาราเมล"
1288390774-DescriptionTh = "เสบียงคาราเมลช็อกโกแลตที่ซากิมอบให้ หนึ่งในของกินเล่น\nที่ทหารยามที่อยู่เวรตอนกลางคืนกินเพื่อแก้ง่วง ซากิเองยืนยัน\nอย่างหนักแน่นว่านี่เป็นของขวัญ ที่ไม่เกี่ยวกับวันวาเลนไทน์เลย"
1222376462-NameTh = "ช็อกโกแลตบาร์ค"
1222376462-DescriptionTh = "ช็อกโกแลตบาร์คโฮมเมดที่มิยุทำเอง ว่ากันว่าทำจากช็อกโกแลตเสบียงผสมกับผลไม้บนภูเขา แล้วทำไมต้องเป็นชิ้นช็อกโกแลตแตก ๆ รูปใบไม้นะ..."
4196510691-NameTh = "หมึกช็อกโกแลต"
4196510691-DescriptionTh = "หมึกช็อกโกแลตที่โนอาเตรียมไว้เล่นๆ หมึกนี้ไม่เหมาะจะใช้เขียนเท่าไร เพราะมันไม่ค่อยติดปากกาขนนก และเลอะเทอะง่าย แต่ไม่มีหมึกใดจะใช้ถ่ายทอดความรู้สึกได้ดีเท่านี้"
70201916-NameTh = "เหรียญตราผลงานช็อกโกแลต แบบพิเศษ"
70201916-DescriptionTh = "เหรียญตราช็อกโกแลต มารินะได้รับมาจากผลงานการผลิตช็อกเชริโน่ เป็นสิ่งพิสูจน์ถึงปณิธานและความพยายามของมารินะ"
967689799-NameTh = "บิทเทอร์สูตรพิเศษ ของชิกุเระ"
967689799-DescriptionTh = "ค็อกเทลช็อกโกแลตไร้แอลกอฮอล์ที่ชิกุเระทำขึ้น เพื่อให้รสหวานละมุน เธอจึงใส่เศษดาร์กช็อกโกแลตลงไปเพื่อรสชาติปิดท้ายที่หวานอร่อย"
3442222452-NameTh = "ช็อกโกแลตรูปลูกเจี๊ยบ"
3442222452-DescriptionTh = "ช็อกโกแลตของมิเนะ เธอยืนยันว่าเป็นเวชภัณฑ์ ถึงอย่างนั้นก็มีคุณภาพสูง และมีห่อน่ารัก"
18239407-NameTh = "ช็อกโกแลตเกรปฟรุตแผ่น"
18239407-DescriptionTh = "ของกินเล่นที่ทำจากเกรปฟรุต ชุบช็อกโกแลตของอายูมุ ในหนึ่งคำจะมีทั้งคาเฟอีน ทีโอโบรมีน และวิตามิน ว่ากันว่าเมื่อกินจะรู้สึกเหมือนได้ฟื้นฟูความเหนื่อยล้า"
390594649-NameTh = "ช็อกโกแลตแท่งโฮมเมด"
390594649-DescriptionTh = "ช็อกโกแลตที่อิจิกะทำให้คุณครู รูปร่างเป็นแท่งช่วยให้ถือกินง่าย แม้ว่าจะเป็นของทำมือ แต่ก็มีของตกแต่งขั้นสุดท้ายได้น่าทึ่ง เทียบเท่าของสำเร็จรูปเลย"
3418867182-NameTh = "สลิปเปอร์ช็อกโกแลต"
3418867182-DescriptionTh = "ช็อกโกแลตชิ้นใหญ่ ทำขนาดเท่าสลิปเปอร์ของจริง มันแข็งแรงมากจนใส่ไปไหนมาไหนได้จริง ต่างจากรูปลักษณ์ที่เห็น"
3006306790-NameTh = "ช็อกโกแลตข้อความลับ"
3006306790-DescriptionTh = "ช็อกโกแลตที่โคยูกิทำให้กับคุณครู ภายนอกอาจดูเหมือนช็อกโกแลต ของขวัญธรรมดา แต่มันมีความหมายซ่อนอยู่ ตามแบบฉบับของโคยูกิ"
291186913-NameTh = "ทางเลือกของตัวเอง"
291186913-DescriptionTh = "ช็อกโกแลตคุณภาพสูง ซากุระโกะเตรียมเอาไว้ให้คุณครู เป็นของขวัญล้ำค่าที่ซากุระโกะคิดแล้วคิดอีก และเลือกมาด้วยตัวเองต่างจากปกติ"
498190404-NameTh = "หนังสือคำท้า วันวาเลนไทน์"
498190404-DescriptionTh = "ช็อกโกแลตของเรอิสะ ทำออกมาในรูปแบบหนังสือคำท้า ที่จริงแล้วมันเป็นเพียงถุงใส่หนังสือคำท้า ที่วางไว้บนช็อกโกแลตชิ้นใหญ่ ข้างในมีจดหมายของเรอิสะใส่ไว้อยู่"
2827551265-NameTh = "ช็อกโกแลต ไข่ออนเซ็น"
2827551265-DescriptionTh = "ช็อกโกแลตโฮมเมดสูตรพิเศษของเมกุ มองเผินๆ ดูเหมือนไข่ออนเซ็น จึงอาจเข้าใจผิดได้ง่าย เนื่องจากผลิตมาในปริมาณมาก เลยสามารถมารับได้มากเท่าที่ต้องการ"
2152153824-NameTh = "ขนมไหว้พระจันทร์ รสช็อกโกแลต"
2152153824-DescriptionTh = "ขนมไหว้พระจันทร์ช็อกโกแลตที่รูมิทำขึ้นมา เพราะอยากให้คุณครูชิม โดยใช้วิธีการต่างๆ ตามแบบเชฟ อัดแน่นไปด้วยความรู้สึกที่อยากให้คุณครูได้ชิม"
219184488-NameTh = "ช็อกโกแลต ตรามังกรดำ"
219184488-DescriptionTh = "ช็อกโกแลตที่มินะทำขึ้นมา โดยนึกถึงสิ่งที่สำคัญที่สุดสำหรับตัวเอง แน่นอนว่าเธอรู้สึกพอใจกับมันมาก แต่ก็ยังรู้สึกว่ามีบางอย่างผิดปกติ..."
717036626-NameTh = "พวงกุญแจช็อกโกแลต"
717036626-DescriptionTh = "พวงกุญแจกับช็อกโกแลต โมมิจิอ้างว่าได้รับเป็นรางวัล เป็นเรื่องบังเอิญที่ได้มาจับคู่กับโมมิจิ"
2219659309-NameTh = "ช็อกโกแลตธรรมดาๆ ของนางิสะ"
2219659309-DescriptionTh = "ช็อกโกแลตที่นางิสะทำขึ้นด้วยความรู้สึกขอบคุณ เธอไม่อยากให้มีเจตนาอื่น หรือประเด็นทางการเมือง จึงตั้งใจให้เป็นแบบเรียบง่าย แต่รสชาติและคุณภาพกลับเหนือชั้น กว่าช็อกโกแลตสำเร็จรูปมาก"
2751216385-NameTh = "ช็อกโกบาร์แคลอรี่สูง"
2751216385-DescriptionTh = "วิธีการแก้ปัญหาของมิโนริที่นึกอยากสนุก ไปกับวันวาเลนไทน์แต่ทำไม่ได้ มิโนริพูดเหมือนกับว่าเธอให้ไปแล้ว แต่ที่จริงใช้เวลาเลือกนานมาก จากบรรดาผู้ผลิตหลายๆ ราย"
2983078984-NameTh = "ความเข้าใจที่แตกต่าง"
2983078984-DescriptionTh = "ช็อกโกแลตที่อาโออิเตรียมไว้ให้คุณครู แม้ว่ามันจะมีขนาดเล็ก แต่ทุกชิ้นมีความพยายามอัดแน่น เพราะไม่รู้ว่าคุณครูจะชอบช็อกโกแลตแบบไหน เลยทำออกมาหลายแบบ"
3666669973-NameTh = "ช็อกโกแลตรสเข้ม ของพลาน่า"
3666669973-DescriptionTh = "ช็อกโกแลตที่พลาน่าแอบอะโรน่าทำ มีรสชาติตามแบบที่คุณครูชอบ"
967746156-NameTh = "ช็อกโกแลตรูปตัวเอง"
967746156-DescriptionTh = "ช็อกโกแลตรูปหน้าเมรุ เจ้าตัววาดไว้บนแผ่นช็อกโกแลตสีขาว เมรุดูเหมือนจะไม่ถูกใจในความสมบูรณ์ แต่ปัญหาของจริงคือจะเริ่มกินจากตรงไหนดี"
3706730641-NameTh = "สุดยอดเค้กช็อกโกแลต ที่สุดของที่สุด"
3706730641-DescriptionTh = "ช็อกโกแลตโฮมเมดที่อ้างว่า ไม่มีร้านขนมใดในคิโวทอสไหนเทียบได้ มีคำติดปากว่าสุดยอดที่สุดของที่สุด"
2168519091-NameTh = "ช็อกโกแลตของหัวหน้า ประชาสัมพันธ์เชิงกลยุทธ์"
2168519091-DescriptionTh = "ช็อกโกแลตที่คาโฮะทำขึ้นมาด้วยตัวเอง มองแวบแรกอาจดูเหมือนสื่อโฆษณาเรียบๆ แต่ตัวอักษรแต่ละตัว ถูกแกะสลักอย่างพิถีพิถัน"
3486261893-NameTh = "กาแฟธรรมดา"
3486261893-DescriptionTh = "กาแฟยี่ห้อธรรมดาๆ ที่คันนะชงให้คุณครู มีกลิ่นหอมหวานแบบช็อกโกแลต อาจเป็นเพราะความรู้สึกส่วนตัว ของคันนะที่ต่างจากปกติ"
1766939933-NameTh = "ช็อกโกแลต ที่ทำด้วยกันสองคน"
1766939933-DescriptionTh = "ช็อกโกแลตที่เรนเกะทำได้เสร็จสมบูรณ์ ด้วยความช่วยเหลือของคุณครู แม้ว่ามันจะไม่ได้สมบูรณ์แบบนัก แต่ก็ไม่มีใครปฏิเสธความทรงจำ ที่ละลายอยู่ในนั้นได้"
2005226182-NameTh = "ช็อกโกแลต ที่ปรึกษายุทธศาสตร์"
2005226182-DescriptionTh = "ช็อกโกแลตที่คิเคียวเตรียมไว้ให้คุณครู ช็อกโกแลตที่วาดเป็นตัวการ์ตูนแมวน่ารัก ต่างจากชื่อที่ดูทื่อๆ ความหมายที่แท้จริงของชื่อคือ ปฏิบัติการลับเพื่อส่งมอบช็อกโกแลต หรืออะไรก็ตาม"
3801373544-NameTh = "เครื่องรางคาเดโนะโคจิ กับขนมรสช็อกโกแลต"
3801373544-DescriptionTh = "เครื่องรางที่ยูคาริทำให้กับขนมข้าวโพดกรอบ ได้มาจากการเดินในย่านการค้าช่วงเช้าตรู่ เป็นของขวัญแสนอบอุ่น ที่เกิดจากจิตใจที่อยากส่งถึงสมาชิกกองกำลัง เฮียกกะเรียวรันในฐานะคาเดโนะโคจิ"
3081511179-NameTh = "พุดดิ้งช็อกโกแลต ของอิบูกิ"
3081511179-DescriptionTh = "พุดดิ้งช็อกโกแลตที่อิบูกิทำไว้ให้คุณครู ผลจากการเพิ่มวัตถุดิบอย่างระมัดระวัง ทำให้มีรสหวานมาก ถ้ากินมากเกินไปในคราวเดียว ลิ้่นอาจจะชาได้"
1270452267-NameTh = "แยมโรลช็อกโกแลต สูตรพิเศษของมิกะ☆"
1270452267-DescriptionTh = "แยมโรลช็อกโกแลตที่มิกะอบให้คุณครูด้วยตัวเอง อาจมีส่วนที่เลอะเทอะบ้าง แต่ก็เห็นถึงความพยายาม ของมิกะที่มีอยู่เต็มเปี่ยม"
3269210663-NameTh = "เครื่องทำน้ำพุ ช็อกโกแลต"
3269210663-DescriptionTh = "เครื่องทำน้ำพุช็อกโกแลตที่ดีที่สุด มาโคโตะเตรียมไว้ใช้กับคุณครูในงานปาร์ตี้ แม้ว่าเดิมทีจะเป็นเครื่องที่ดีมากแล้ว แต่มาโคโตะอยากจะทำให้มันสมบูรณ์แบบยิ่งขึ้น จึงปรับแต่งเพิ่มเติม ตอนใช้งานต้องระวัง เพราะบางครั้งมอเตอร์จะระเบิด และพ่นช็อกโกแลตไปทุกทิศทาง"
1875831713-NameTh = "เกี้ยวช็อกโกแลต"
1875831713-DescriptionTh = "ช็อกโกแลตรูปเกี้ยวที่อุมิกะทำขึ้นด้วยความรัก ว่ากันว่ามีของที่ล้ำค่ายิ่งกว่าสิ่งใดอยู่ด้านในสุด"
2689554198-NameTh = "เครปช็อกโกแลต S+"
2689554198-DescriptionTh = "เครปที่คิราระทำเองหลังจากที่ล้มเหลวมานับครั้งไม่ถ้วน ความจริงใจที่ใส่ในนั้นไม่อาจประเมินค่าได้"
960286300-NameTh = "‘ช็อกโกแลต’ แน่นเต็มกล่อง"
960286300-DescriptionTh = "ช็อกโกแลตที่ชิโรโกะอีกคนเคยให้ไว้ แต่ครั้งนี้ยกมาทั้งกล่อง มีทั้งความกังวลมากมายที่ผ่านมาด้วยรอยยิ้ม รวมถึงจิตใจที่อัดแน่นด้วยความรู้สึกนั้น"
3431574551-NameTh = "ชาเมล็ดโกโก้"
3431574551-DescriptionTh = "ชาจากเมล็ดโกโก้ที่คิซากิชงเอง ตามพิธีชงชาที่เป็นงานอดิเรกของเธอ รสขมที่พอดีและรสชาติที่เข้มข้น พอตัดกับกลิ่นช็อกโกแลตเข้มๆ ยิ่งชวนประทับใจ"
2259933796-NameTh = "ช็อกโกแลตหมัดเหล็ก"
2259933796-DescriptionTh = "ช็อกโกแลตที่เรย์โจวทำขึ้นด้วย 'วิธีพิเศษ' บางอย่าง รูปหมัดที่มองเห็นได้ชัดเจนนั้นก็เป็นของเธอเช่นกัน"
3142750909-NameTh = "ช็อกโกแลตสูตรลับของซัตสึกิ"
3142750909-DescriptionTh = "กล่องหรูหราที่เต็มไปด้วยช็อกโกแลตโฮมเมดรูปเหรียญ ซัตสึกิทำขึ้นโดยใช้สูตรลับเพื่อเพิ่มความใกล้ชิดกับครู"
1486627927-NameTh = "แพนเดโมเนียม โซไซตี้รายสัปดาห์ ฉบับวาเลนไทน์ของจิอากิ"
1486627927-DescriptionTh = "รูปโพลารอยด์ช็อกโกแลตที่ติดไว้นั้นดูหรูหรางดงาม แต่ช็อกโกแลตที่อยู่ข้างในกลับดูบุบบิบบู้บี้"
491306207-NameTh = "ช็อกโกแลตกับดักของเซอา"
491306207-DescriptionTh = "ช็อกโกแลตของเซอา แนบมาพร้อมกับใบเสร็จที่ส่องแสงสีทอง ไม่รับประกันว่าจะเกิดอะไรถ้าเซ็นชื่อลงไปโดยไม่ระวัง"
782661412-NameTh = "ช็อกโกแลตตรามิลเลเนียม"
782661412-DescriptionTh = "ช็อกโกแลตของริโอะ มีตราของโรงเรียนวิทย์มิลเลเนียม เจ้าตัวอ้างว่าทำขึ้นด้วยขั้นตอนที่มีวิจารณญาณ และสมเหตุสมผลที่สุด"
1094002594-NameTh = "ช็อกโกแลต 3 สิ่งสำคัญของเบสบอล"
1094002594-DescriptionTh = "ถุงมือ ไม้เบสบอลและลูกเบสบอล เพียงมี 3 อย่างนี้ ก็สามารถเล่นเบสบอลกับใครก็ได้ การทำของเหล่านี้จากช็อกโกแลตล้วน แสดงให้เห็นความใส่ใจนั้นได้ "
506164489-NameTh = "ช็อกโกบอลใหม่ไฟลุก!!"
506164489-DescriptionTh = "ของว่างใหม่สดๆ ร้อนๆ จากฮิคาริ แม้ว่าเธอจะไม่รู้ว่ารสชาติเป็นยังไง... แต่ก็ภูมิใจมากที่อดใจไว้ และนำมาเป็นของขวัญ แม้ว่าจะอยากกินมากก็ตาม"
1272169695-NameTh = "กัมมี่ฟื้นฟูความเหนื่อยล้า"
1272169695-DescriptionTh = "กัมมี่ที่อุดมไปด้วยสารอาหารที่จำเป็น นี่อาจเป็นของขวัญที่จำเป็นสำหรับครูที่เหนื่อยล้า จากการทำงานหนัก"
1649572559-NameTh = "ถุงกระดาษยับย่นพร้อมโน้ต"
1649572559-DescriptionTh = "ถุงกระดาษยับยู่ยี่เล็กน้อยที่บรรจุช็อกโกแลตที่หาซื้อ\nได้ทั่วไปเอาไว้ ข้อความในโน้ตยับยู่ยี่นั้นคืออะไร...?"
3907944625-NameTh = "ขนมคนรักสีขาว"
3907944625-DescriptionTh = "คุกกี้ช็อกโกแลตจากเอบิสุ ที่วางจำหน่ายทั่วเขต\nปกครองตนเองเฮียกคิยาโค แม้ว่าเนื้อสัมผัสกรุบกรอบ\nจากไวท์ช็อกโกแลตที่เคลือบไว้บางๆ นั้นยอดเยี่ยม แต่มีข้อเสียตรงช็อกโกแลตที่ละลายง่าย ทำให้มือเลอะ"
950107355-NameTh = "ช็อกโกแลตในกล่อง"
950107355-DescriptionTh = "กล่องช็อกโกแลตสุดหรู ข้างในมีช็อกโกแลตโฮมเมด\nแค่เพียงชิ้นเดียว ถึงจำนวนจะน้อย แต่ก็เป็นผลงานชิ้นเอกที่เต็มไปด้วยความขี้เล่นของนิยะ"
2522956263-NameTh = "ช็อกโกแลตผสมพลังเวท(?)"
2522956263-DescriptionTh = "ช็อกโกแลตที่เอริอ้างว่ามีพลังเวทของเธออยู่ข้างใน เมื่อกินจะรู้สึกถึงพลังงานที่ไหลเวียน"
3646064924-NameTh = "มัฟฟินช็อกโกแลตผี"
3646064924-DescriptionTh = "มัฟฟินที่ตกแต่งด้วยผีจากไวท์ช็อกโกแลตสุดน่ารัก มองแล้วจะรู้สึกเหมือนได้ยินเสียงของคาโนเอะมา\nจากที่ไหนสักแห่ง"
1600461265-NameTh = "ทีรามิสุทางวรรณกรรม"
1600461265-DescriptionTh = "ทีรามิสุที่อร่อยยิ่งขึ้นเมื่อแช่เย็น แต่ทว่าบทสนทนา\nที่เกิดขึ้นระหว่างการรอคอยนั้นอาจจะหวานชื่นกว่า"
788496083-NameTh = "ลูกอมช็อกโกแลตขนาดใหญ่พิเศษ"
788496083-DescriptionTh = "ลูกอมขนาดใหญ่และแข็ง ที่ต้องหักก่อนกิน ลองอมและลิ้มรสความหวานนั้นอย่างช้าๆ ดูสิ"
2100977290-NameTh = "รูปปั้นช็อกโกแลต"
2100977290-DescriptionTh = "มันมีขนาดใหญ่ ไม่ละลาย และมีคุณค่าทางสุนทรียภาพ\nอันโดดเด่น นอกจากส่วนที่กินไม่ได้แล้ว นี่คือช็อกโกแลตที่สมบูรณ์แบบ"
2647895027-NameTh = "ช็อกโกแลตเจาะรู"
2647895027-DescriptionTh = "เป็นสินค้าที่วางขายทั่วไป แต่หาได้ยาก มีมูลค่าในการสะสมสูง"
1217736606-NameTh = "คุกกี้เมอแร็งก์ช็อกโกแลต"
1217736606-DescriptionTh = "คุกกี้เมอแร็งก์อบที่ทำจากไข่ขาวผสมน้ำตาล แล้วตีอย่างรวดเร็ว ผสมผงช็อกโกแลต\nวัตถุดิบเป็นสิ่งสำคัญ"
165942245-NameTh = "คาร์ทอชก้า"
165942245-DescriptionTh = "เค้กช็อกโกแลตที่ทำจากเศษขนมผสมนมข้นหวาน น้ำตาล ผงโกโก้ และผงอบเชย\nทุกคนล้วนมีศักยภาพของตัวเอง"
1366975366-NameTh = "เค้กน้ำผึ้งช็อกโกแลต"
1366975366-DescriptionTh = "เค้กที่ทำจากแผ่นแป้งเค้กช็อกโกแลต ที่วางสลับชั้นกับน้ำผึ้งและครีมช็อกโกแลต\nการเจรจาและสัญญาเป็นเรื่องสำคัญ"
