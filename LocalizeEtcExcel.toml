2341679944-DescriptionTw = "「天使24」自有品牌的巧克力。因為空的失誤大量進的貨之中，剩下的最後一個。"
2435557875-NameTw = "巧克力經濟包"
2435557875-DescriptionTw = "放在聯邦學生會的經濟包迷你巧克力。琳工作時似乎偶爾會吃。"
2724075845-NameTw = "彩奈的巧克力薑餅"
2724075845-DescriptionTw = "彩奈用心製作的巧克力薑餅。餅乾上用白巧克力描繪著老師和彩奈的肖像。"
1567224539-NameTw = "情人節佩洛洛"
1567224539-DescriptionTw = "為慶祝情人節而推出的佩洛洛造型巧克力。畢竟是在粉絲間引起話題的限定商品，日步美自然不可能錯過。"
984677767-NameTw = "口糧D型"
984677767-DescriptionTw = "混合燕麥及可可粉製成的軍用巧克力。如果是為了正義，麻白並不害怕那驚人的高熱量。"
1666908815-NameTw = "Happy Hot Chocolate"
1666908815-DescriptionTw = "花繪泡的熱巧克力。喝下一口就能緩解疲勞，幸福感湧上心頭。"
3922278991-NameTw = "Chocola de Gehenna"
3922278991-DescriptionTw = "高熱量、高咖啡因的格黑娜製黑巧克力。其實伊織也把它跟鞋油搞錯過。"
342988654-NameTw = "大量的板巧克力"
342988654-DescriptionTw = "亞伽里為了備戰巧克力大胃王比賽而大量購入的板巧克力。一般人光是用看的肚子就飽了。"
741491105-NameTw = "巧克力糰子"
741491105-DescriptionTw = "和菓子店販售的巧克力糰子。雖然是個意外的組合，卻非常符合淳子的喜好。"
2503165795-NameTw = "Death Love"
2503165795-DescriptionTw = "購買佳世子喜歡的樂團「黑色．死亡．毒藥」的情人節限定單曲可獲得的贈品。外表雖然可怕，味道卻十分柔和香甜。"
3659929614-NameTw = "騎士的零食"
3659929614-DescriptionTw = "白子騎車時常備在身上的能量棒。巧克力包裹著堅果，只需一口即可讓能量滲透身體每個角落。"
3042768744-NameTw = "海裡的朋友"
3042768744-DescriptionTw = "於海洋博物館當作紀念品販售的鯨魚造型巧克力。星野雖然喜歡巨大的鯨魚，不過這個鯨魚巧克力僅有手掌大小。"
1510394578-NameTw = "沙漠的玫瑰"
1510394578-DescriptionTw = "於阿拜多斯車站販售的玫瑰花造型巧克力。以沙漠的玫瑰為主題製作的巧克力，是很受歡迎的禮物。"
2394567841-NameTw = "維納斯的巧克力"
2394567841-DescriptionTw = "造型大膽到不像是以學生為客群的巧克力。會買的學生或許只有英美吧。"
367299249-NameTw = "竊聽裝置14號"
367299249-DescriptionTw = "小玉所製作的裝有竊聽器的巧克力。完全感覺不出有想隱藏的意思。"
919440775-NameTw = "罐裝熱可可亞"
919440775-DescriptionTw = "主要於自動販賣機販售的罐裝巧克力飲料。其甜味已治癒了工作到深夜的千尋無數次。"
3490934017-NameTw = "生巧克力組合（附收據）"
3490934017-DescriptionTw = "優香為老師購入的送禮用巧克力組合。既然上面貼著5000元的收據就肯定是5000元的巧克力沒錯。"
419901229-NameTw = "勇者的巧克力（道具）"
419901229-DescriptionTw = "柚子和老師一起玩的RPG遊戲中贈送的期間限定巧克力道具。使用後可以稍微恢復角色的體力和玩家的心。"
3659962553-NameTw = "手工巧克力史萊魯"
3659962553-DescriptionTw = "愛麗絲以遊戲內的怪獸「史萊魯」為靈感製作而成的手工巧克力道具，但不管怎麼看都看不出史萊魯的影子。"
941224173-NameTw = "巧克力口味妖怪MAX"
941224173-DescriptionTw = "為紀念情人節推出的巧克力口味妖怪MAX。雖然讓人清醒的效果卓越，但是否普通的妖怪MAX比更加好喝還需要與晴討論。"
1781832965-NameTw = "巧克力口味噴漆罐"
1781832965-DescriptionTw = "用巧克力代替顏料的噴漆罐。據真紀說，這可以用來把全世界變得一片香甜。"
4075915701-NameTw = "巧克力砲彈Mk.2"
4075915701-DescriptionTw = "響為情人節活動開發的巧克力砲彈。因為威力過高而沒有在活動中使用。"
2579538323-NameTw = "巧克力螺絲"
2579538323-DescriptionTw = "以銀紙包裝的螺絲造型巧克力。雖然造型完美到連詠葉都無法一眼分辨出來，卻不能拿來當成工具使用。"
3469911388-NameTw = "潔蓮卡"
3469911388-DescriptionTw = "赤冬供給部生產的赤冬聯邦學園特製牛奶巧克力。已經被潔莉諾吃過一口。"
1188251464-NameTw = "改良型潔蓮卡"
1188251464-DescriptionTw = "加入智惠繪製的可愛插畫的改良型潔蓮卡。味道跟原本的潔蓮卡幾乎沒有改變。"
3845682331-NameTw = "可可果"
3845682331-DescriptionTw = "想送巧克力給老師的和香費盡千辛萬苦才得到的可可果。雖然不甜，不過在加工後像茶一樣泡來喝的話別有一番風味。"
410737829-NameTw = "長生不老的靈藥（失敗作）"
410737829-DescriptionTw = "沙耶以巧克力為基底做成的新款靈藥。因為味道和普通的巧克力並無二致，或許也能算是普通的巧克力。"
1298182383-NameTw = "大人的蘭姆夾心巧克力"
1298182383-DescriptionTw = "添加蘭姆酒，香氣濃郁的夾心巧克力。對學生來說這個味道或許還太早了。當然，對旬來說也一樣。"
125955518-NameTw = "巧克力手銬"
125955518-DescriptionTw = "手銬造型的巧克力。桐乃想當成真正手銬來用的想法連製作者自己都沒有想過。"
1951960570-NameTw = "特製巧克力炸甜甜圈"
1951960570-DescriptionTw = "MasterDonut只在情人節推出，撒上巧克力米的特製巧克力炸甜甜圈。對吹雪來說，情人節就是能吃到它的一天。"
711391590-NameTw = "巧克力埴輪"
711391590-DescriptionTw = "花子準備的埴輪型巧克力。彷彿永遠盯著你看。"
4101876-NameTw = "Little Bullet"
4101876-DescriptionTw = "來自蓮實的狙擊步槍子彈造型巧克力。尺寸雖小，其甜味卻能穿透人心。"
2407160249-NameTw = "陽奈的手工巧克力"
2407160249-DescriptionTw = "陽奈親手製作的巧克力。外觀雖然不完美，其中蘊含的勇氣卻比什麼都美麗。"
1422578612-NameTw = "獻給你一口的休息時間"
1422578612-DescriptionTw = "使用亞子嚴選的食材親手製作而成的巧克力。精緻程度高到不像是手工製作，從方便在工作時食用的口味和尺寸可以看出亞子的優秀和貼心。"
87498756-NameTw = "超級！美味的！巧克力！！！"
87498756-DescriptionTw = "用盡泉認為的最棒材料製作而成的手工巧克力。稍鹹的香醇口味是其特點。"
1899678676-NameTw = "社長的頂級巧克力"
1899678676-DescriptionTw = "亞瑠為了感謝平日的協助而送的巧克力。重要的不是購入時的價格而是送禮者的心意。"
171489856-NameTw = "地獄的俄羅斯輪盤"
171489856-DescriptionTw = "中獎的話說不定會看見地獄，用於惡作劇的俄羅斯輪盤巧克力。無月的瀏覽器書籤裡保存著大量這類商品。"
2099851060-NameTw = "裝著可可亞的馬克杯"
2099851060-DescriptionTw = "風華為老師泡的可可亞。因為有著為老師的健康著想的心，味道比實際上更香甜溫暖。"
1852286999-NameTw = "茱莉的手工巧克力"
1852286999-DescriptionTw = "茱莉傾盡全力製作的手工巧克力。雖然吃過卻無從得知其味道。或許不知道也沒關係，畢竟其心意已確實傳達。"
1269992298-NameTw = "共度的時間"
1269992298-DescriptionTw = "茜香從和老師一起打工的地方獲得的頂級巧克力蛋糕。工作的辛勞與喜悅比什麼都還提味。"
265930468-NameTw = "零食負責人的工作"
265930468-DescriptionTw = "阿拜多斯的零食負責人野乃美準備的巧克力組合。為了讓老師和個性鮮明的對策委員會成員都能開心享用，聚集了各式種類的巧克力。"
689413464-NameTw = "精挑細選的巧克力"
689413464-DescriptionTw = "堇為了老師親自嚐遍100種運動營養食品後所選出的最佳產品。雖然能快速獲得能活動一整天的大量熱量，但在那之後相應的運動也是必要的。"
3328209817-NameTw = "仙后神拳～六角恐龍大列傳～"
3328209817-DescriptionTw = "桃井在夾娃娃機夾到的食玩巧克力。裝有人氣格鬥遊戲《仙后神拳～六角恐龍大列傳～》的吉祥物角色玩具。種類共有7種。"
3385816833-NameTw = "綠的手工巧克力"
3385816833-DescriptionTw = "大量的練習、手工製作的試錯、失敗與再次挑戰、以及早起。她為了遊戲和繪畫以外的事這麼努力，或許還是第一次。"
3589704604-NameTw = "成語巧克力幸運餅乾"
3589704604-DescriptionTw = "裝有各種四字成語的巧克力點心。雖然在正經的四字成語中偶爾會混入某些奇怪的詞語，不過知世似乎相當喜歡。"
3842989732-NameTw = "百夜堂限定甜點"
3842989732-DescriptionTw = "百夜堂為迎接情人節所販售的特別甜點。沒有公告也沒有出現在菜單上，至於實際上想賣給誰，靜子不願透露。"
3251730635-NameTw = "特製忍具49號「巧克力組合」"
3251730635-DescriptionTw = "裝滿各種忍具的夢幻忍者巧克力組合。因為想和主公一起品嚐，伊樹菜從一大早就開始排隊才買到的產品。實際上不能當作忍具使用這點需要注意。"
4247091559-NameTw = "安眠巧克力及安眠用具組合"
4247091559-DescriptionTw = "椿為了因為總是過勞的老師所準備的安眠用具一式。想要更好睡的枕頭就和椿說一聲吧。平時購買的話合計3980元。"
2771361458-NameTw = "充滿若藻愛情的巧克力"
2771361458-DescriptionTw = "飽含若藻滿溢而出的熱切愛意的巧克力。不過裡面裝的是否真的只有愛意就不得而知了。"
1572630441-NameTw = "美食的證明（抹茶口味）"
1572630441-DescriptionTw = "羽留奈作為美食研究的一環而製作的抹茶巧克力。咬下後便能在深奧的苦味中感受到滲出的甜味。"
3743008500-NameTw = "情人節的神聖骷髏人"
3743008500-DescriptionTw = "梓所準備的巧克力版本「死之死神骷髏人」。雖然吃下後會屍骨無存，但蘊含其中的心意肯定會留下。"
1084418779-NameTw = "Lovely Crossline"
1084418779-DescriptionTw = "小春帶來的知名巧克力。混用白巧克力與黑巧克力，中間的黑色十字線條非常有魅力。"
2742248602-NameTw = "Twinkle Star"
2742248602-DescriptionTw = "鈴美在便利商店買的星形巧克力。打開包裝後便能看見上頭撒著的金箔靜靜閃爍著耀眼的光芒。"
663608497-NameTw = "Holy Chocolate"
663608497-DescriptionTw = "瑪麗贈送的巧克力。是修女會著名的名產，或許一開始就不是用來食用而是展示用吧。"
848260985-NameTw = "書本之友"
848260985-DescriptionTw = "加上了不會弄髒手的特殊塗層的巧克力。在以志美子為首的讀書人之間很受歡迎。"
1900401189-NameTw = "Be With You"
1900401189-DescriptionTw = "芹奈製作的手工巧克力。甜滋滋的口感讓心也跟著融化了。"
4183660781-NameTw = "唇萼薄荷巧克力"
4183660781-DescriptionTw = "愛莉準備的特別的巧克力。在粉絲之間也是非常有人氣且特別的產品，至於要理解有多麼特別似乎需要愛莉的說明。"
1868703267-NameTw = "喜美的限定巧克力"
1868703267-DescriptionTw = "喜美親手製作的手工巧克力。從各方面看來，都是其他地方找不到的限定版中的限定版。"
355355427-NameTw = "無須多言巧克力"
355355427-DescriptionTw = "推測是夏親手製作的巧克力。跟夏善於雄辯的口才相比之下顯得簡約，也因此能從設計中感受到其美妙之處。"
2098665142-NameTw = "幸運巧克力（自製）"
2098665142-DescriptionTw = "千夏所準備的巧克力。既然選哪個都一樣的話，那或許也能稱為一種命運吧。"
3487183095-NameTw = "繃帶巧克力"
3487183095-DescriptionTw = "瀬奈在緊急待命時間抽空製作出來的手工巧克力。因為買不到包裝紙，只好用乾淨的繃帶包裝。"
3066393242-NameTw = "可可99.99%"
3066393242-DescriptionTw = "遙香為了老師準備的巧克力。如果一看到99.99%就覺得「總之好像很厲害」的話，說不定很適合便利屋68。"
3579363383-NameTw = "Twisted Valentine"
3579363383-DescriptionTw = "明日奈為主人準備的巧克力。在保管和運送過程中發生了一點小小的變形。"
304962670-NameTw = "Made by Maid"
304962670-DescriptionTw = "朱音親手製作的手工巧克力。沒什麼特別的地方，單純只是學生送給老師的禮物……雖然看似如此，但身為女僕的好手藝嶄露無遺。"
1933815846-NameTw = "巧克力蛋包飯"
1933815846-DescriptionTw = "花凛為了迎接情人節所準備的蛋包飯。用巧克力代替番茄醬畫上了愛心，調和了蛋包飯本身風味和巧克力香甜的一道優秀料理。"
1957428602-NameTw = "巧克力版畫：龍"
1957428602-DescriptionTw = "寧瑠不知從哪帶來的，上面畫著龍的巧克力版畫。看起來很強的話味道也會很棒才對，寧瑠是這麼想的。"
1255509912-NameTw = "Valentine Beginning"
1255509912-DescriptionTw = "亞都梨為了說明情人節的起源及含義而製作的巧克力。一口咬下後，連綿交織的歷史將充滿整個口腔。"
1303875154-NameTw = "香甜酒杯"
1303875154-DescriptionTw = "菲娜帶來的酒杯造型巧克力。由於拿著太久會融化，盡快享用才是正確用法。"
1082089594-NameTw = "Almond Crimson"
1082089594-DescriptionTw = "弦生留下的杏仁巧克力。上頭綁著可愛的紅色蝴蝶結，或許不是店家綁上的。"
3411154794-NameTw = "包裝粗糙的手工巧克力"
3411154794-DescriptionTw = "心菜使用不熟練的動作認真包裝的手工巧克力。本人堅決主張是市售品。被叮嚀過「請絕對要一個人吃！」。"
421170184-NameTw = "小尺寸巧克力球"
421170184-DescriptionTw = "日向為了來教堂的孩童們準備的巧克力球。為了配合所有人的喜好，似乎有試吃比較過所有口味。"
412848971-NameTw = "濕潤的巧克力餅乾"
412848971-DescriptionTw = "憂準備的巧克力餅乾。據說是為了減少碎屑的掉落而選擇了濕潤的餅乾。"
1622643101-NameTw = "草莓巧克力蛋糕"
1622643101-DescriptionTw = "千紗買來的草莓巧克力蛋糕。看來似乎在展櫃前煩惱了好一段時間。"
2747826200-NameTw = "All to You"
2747826200-DescriptionTw = "日和用某種意義上的「一切」交換而來的巧克力。在小巧的袋子中蘊含了她滿滿的心意。"
2837160480-NameTw = "細心包裝的巧克力"
2837160480-DescriptionTw = "美咲準備的巧克力。從使用雙色緞帶細心製成的包裝中，似乎能看見美咲隱藏的另一面。"
4062180493-NameTw = "青薔薇與巧克力"
4062180493-DescriptionTw = "從有著許多祕密的公主手中獲得的手工巧克力。附上的一束花是敦子努力的證明。"
3932209420-NameTw = "奇帝梵巧克力"
3932209420-DescriptionTw = "沙織準備的最高級巧克力。據說準備過程十分複雜且困難，不過應該存在著許多價值。"
2263489181-NameTw = "櫻花巧克力"
2263489181-DescriptionTw = "三森親手製作的櫻花型巧克力。即使無法使用讀心術，也只要吃一口就能感受到她的心意。"
170445747-NameTw = "最強的巧克力恐龍"
170445747-DescriptionTw = "楓製作的最強巧克力恐龍。在「將失敗的恐龍挖掘巧克力的碎片組合起來」此一顛覆性的想法下完成。這個看起來、吃起來都開心的巧克力，強烈地表現了她的風格。"
566203770-NameTw = "融化的垂耳兔巧克力"
566203770-DescriptionTw = "月夜親手做的垂耳兔巧克力。或許是過度珍藏的關係，稍微有點融化了。"
2104744538-NameTw = "超天才清楚系病弱美少女駭客's巧克力"
2104744538-DescriptionTw = "陽葵以自己的模樣為原型製成的手工巧克力。依照突然卻合乎邏輯的判斷與非常合理的結論，得等回到夏萊後才能品嚐。"
3304317128-NameTw = "伊呂波的手工巧克力棒"
3304317128-DescriptionTw = "在與伊呂波購物的回程時收到的手工巧克力棒。僅有一隻留下了「痕跡」。"
902334212-NameTw = "忍術研究部的勳章型巧克力"
902334212-DescriptionTw = "三千留準備的客製巧克力。蘊含著非常重視忍術研究部夥伴們的心意。匆忙慌張的過程或許也是其韻味之一。"
813659355-NameTw = "添加巧克力的紅蘿蔔蛋糕"
813659355-DescriptionTw = "都子加入巧克力製成的紅蘿蔔蛋糕。雖然甜食或許對兔子有害，不過對夥伴和老師來說卻很值得高興。"
490342082-NameTw = "巧克力夾心餅"
490342082-DescriptionTw = "萌製作的巧克力夾心餅。在香甜的棉花糖上還加入了巧克力，的確能稱得上是毀滅性的熱量。"
1288390774-NameTw = "補給品巧克力焦糖"
1288390774-DescriptionTw = "咲希準備的補給巧克力焦糖。為了讓守夜的哨兵保持清醒的一種零食。據咲希本人所說，這是和情人節完全無關的禮物。"
1222376462-NameTw = "巧克力脆片"
1222376462-DescriptionTw = "美優親手製作的巧克力脆片。似乎是用補給品中的巧克力和摘來的水果製成。一片一片小心地吃吧。"
4196510691-NameTw = "巧克力墨水"
4196510691-DescriptionTw = "蘊含乃愛甜蜜惡作劇之心的巧克力。由於不易沾上筆尖而不適合用來寫字，卻是最適合用來傳達真心的墨水。"
70201916-NameTw = "特殊功勞勳章巧克力"
70201916-DescriptionTw = "瑪麗娜因達成潔蓮卡的目標產量，作為獎勵從潔莉諾手上獲得的勳章。由於原料為巧克力，所以只要吃掉就會消失，但其努力和名譽將會永遠留在記憶之中。"
967689799-NameTw = "時雨．苦味特調"
967689799-DescriptionTw = "時雨製作的無酒精巧克力雞尾酒。其恰到好處的甜味與清爽餘韻的祕密據說是些許的苦巧克力。"
3442222452-NameTw = "小雞造型巧克力"
3442222452-DescriptionTw = "美禰在情人節贈送的可愛巧克力。雖然似乎只是醫療用品，包裝卻十分高級而美麗。"
18239407-NameTw = "乾葡萄柚巧克力"
18239407-DescriptionTw = "步平時就會吃的，似乎對身體有益的點心。在乾燥的葡萄柚外面裹上了一層巧克力，能否回復疲勞姑且不論，味道十分美味。"
390594649-NameTw = "手工巧克力棒"
390594649-DescriptionTw = "一花親手為老師準備的巧克力。做成方便拿著吃的棒狀。雖然是手工製作，但完成度極高，不亞於市售的成品。"
3418867182-NameTw = "巧克力拖鞋"
3418867182-DescriptionTw = "尺寸和實際的拖鞋一樣大的巨大巧克力。與外觀相反，非常結實，甚至可以真的穿著走。"
3006306790-NameTw = "祕密訊息"
3006306790-DescriptionTw = "小雪送給老師的手工巧克力。表面上是普通的送禮用巧克力，但其實隱藏著富有小雪風格的另一層含意。"
291186913-NameTw = "自己做的決定"
291186913-DescriptionTw = "櫻子為老師準備的高級巧克力。和平時不同，是櫻子自己深思熟慮後做的決定，是一份難得的珍貴禮物。"
498190404-NameTw = "情人節挑戰書"
498190404-DescriptionTw = "澪紗的挑戰書樣式巧克力。其實只是放了一大塊巧克力的挑戰書信封。裡面裝有澪紗的信。"
2827551265-NameTw = "溫泉蛋巧克力"
2827551265-DescriptionTw = "惠手工特製的巧克力。乍看與溫泉蛋十分相似，很容易搞混。因為製作了非常多，所以想拿多少都行。"
2152153824-NameTw = "巧克力月餅"
2152153824-DescriptionTw = "瑠美以拜託老師「試吃」為由製作的巧克力月餅。不負他廚師的身分，運用了多種製作方法，每個都蘊含了希望老師品嚐的心意。"
219184488-NameTw = "玄龍門紋樣巧克力"
219184488-DescriptionTw = "美奈將對自己「最重要的東西」形象化製作而成的巧克力。這份心意雖然讓人開心，但總覺得有哪裡不對勁……"
717036626-NameTw = "巧克力鑰匙圈周邊"
717036626-DescriptionTw = "紅葉聲稱是抽獎獎品的鑰匙圈和巧克力。或許是巧合，剛好能和紅葉配成一對。"
2219659309-NameTw = "渚的平凡巧克力"
2219659309-DescriptionTw = "渚為了答謝老師而親自製作的巧克力。刻意裝飾得簡單樸素，反映出渚不希望其帶有別的意圖或政治含意的想法。不過它的味道和品質，遠遠超過一般市售的巧克力成品。"
2751216385-NameTw = "高熱量巧克力"
2751216385-DescriptionTw = "這是「想享受情人節但辦不到」的實里想出來的對策。儘管實里嘴裡說是順便送的，但事實上是花了相當多時間在眾多製造商中挑選的。"
2983078984-NameTw = "認知差異"
2983078984-DescriptionTw = "碧為老師準備的巧克力組合。尺寸雖小，但每一個都投入了許多的心血。因為不知道對方喜歡什麼，所以看起來是故意囊括了各種不同種類。"
3666669973-NameTw = "星奈的「心愛」滿滿巧克力"
3666669973-DescriptionTw = "星奈瞞著彩奈精心製作的巧克力。味道完全正中老師的口味。"
967746156-NameTw = "自畫像巧克力"
967746156-DescriptionTw = "愛瑠在白巧克力板上繪製了自己的肖像畫的巧克力。愛瑠似乎對於完成度不太滿意，但真正的問題是從哪裡下口。"
3706730641-NameTw = "最好、最棒、最終極的手工巧克力蛋糕"
3706730641-DescriptionTw = "號稱可以和奇普托斯知名糕點店媲美的手工巧克力。標語是「最好、最棒、最終極」。"
2168519091-NameTw = "戰略領袖的手工巧克力"
2168519091-DescriptionTw = "佳穗親自為老師製作的巧克力。乍看之下只是單純的宣傳品，但每一個細心雕琢的字都飽含著真心。"
3486261893-NameTw = "「平常喝的」咖啡"
3486261893-DescriptionTw = "環奈為老師沖泡的普通配方咖啡。不過和平時不同的是，可能是因為摻雜了環奈的「主觀情感」，散發著宛如巧克力般的甜美香氣。"
1766939933-NameTw = "兩人一起做的生巧克力"
1766939933-DescriptionTw = "蓮華在老師的幫助下順利完成的手工生巧克力。儘管完成度不高，但融入其中的回憶是任何人都無可否認的。"
2005226182-NameTw = "作戰參謀的巧克力"
2005226182-DescriptionTw = "桔梗為老師準備的巧克力。和它生硬的名字不同，上頭繪有可愛的貓咪圖案。顯然，這名字的真正含意是指為了送出巧克力而制定的一系列祕密大作戰吧。"
3801373544-NameTw = "勘解由小路護身符和巧克力零食"
3801373544-DescriptionTw = "紫為老師親手製作的護身符，以及一大早在商店街四處尋找，好不容易才買到的限量版好粗棒。紫想將自己身為勘解由小路及百花繚亂一員的種種心意完全傳達出來，是一份能溫暖人心的禮物。"
3081511179-NameTw = "伊吹製作的巧克力布丁"
3081511179-DescriptionTw = "伊吹親自準備的巧克力布丁。因為想盡善盡美，使得加入的材料越放越多，結果變成了過度甜蜜的模樣。一次吃太多的話，舌頭可能會麻痺。"
1270452267-NameTw = "彌香特製☆巧克力蛋糕捲"
1270452267-DescriptionTw = "彌香親自為老師烤的巧克力蛋糕捲。雖然不夠完美卻飽含真心，可以感受到彌香的努力及誠意。"
3269210663-NameTw = "議長準備的頂級巧克力噴泉機"
3269210663-DescriptionTw = "真琴連同派對一起為老師特別準備的頂級巧克力噴泉機。雖然原本就已經很酷，但真琴想要更臻完美而加以改造，結果導致馬達會間歇性失控，造成巧克力四處噴濺，使用時要多加注意。"
1875831713-NameTw = "神轎巧克力"
1875831713-DescriptionTw = "海花精心製作的轎子形狀巧克力。聽說最裡面放入了比什麼都還珍貴的東西。"
2689554198-NameTw = "S+巧克力可麗餅"
2689554198-DescriptionTw = "綺羅羅經歷無數次失敗後親手製作的可麗餅。其中蘊含的用心，無法用分數來衡量。"
960286300-NameTw = "「那種巧克力」滿滿一盒"
960286300-DescriptionTw = "另一個白子曾經送過的巧克力。但這次數量很多。雖然將許多煩惱笑著帶過，卻也因此展現出了背後單純的心意。"
3431574551-NameTw = "可可豆茶"
3431574551-DescriptionTw = "妃姬在對茶道的愛好下，親手沖泡的可可豆茶。適度的苦味和香氣與濃郁的巧克力香形成對比，令人留下深刻印象。"
2259933796-NameTw = "鐵砂掌巧克力"
2259933796-DescriptionTw = "據說是令女用某種「特別的方法」製作的鐵砂掌巧克力。上面清晰印著的拳頭形狀正是出自他本人。"
3142750909-NameTw = "皐月的祕密巧克力"
3142750909-DescriptionTw = "裝在高級盒子裡的硬幣型手工巧克力。據說是皐月為了加深與老師的親密感，以特殊祕方製作而成。"
1486627927-NameTw = "千秋的週刊萬魔殿情人節號外篇"
1486627927-DescriptionTw = "拍攝了高級華麗巧克力的拍立得相片。但附上的巧克力卻不知為何顯得乾癟凹陷。"
491306207-NameTw = "聖亞的陷阱巧克力"
491306207-DescriptionTw = "聖亞的巧克力。巧克力旁附帶著金光閃閃的收據。若不小心簽名，無法保證會導致什麼後果。"
782661412-NameTw = "千年校徽巧克力"
782661412-DescriptionTw = "印有千年科學學園校徽的莉央的巧克力。本人表示這枚巧克力是用最合理且理性的程序製作而成。"
1094002594-NameTw = "棒球用品三神器巧克力"
1094002594-DescriptionTw = "手套、球棒、棒球。據說只要有這三樣就能和任何人打棒球。把這些全部用巧克力製作出來，或許本身就代表著真心吧。"
506164489-NameTw = "超～新款巧克力球！！"
506164489-DescriptionTw = "光帶來的熱騰騰新零食。雖然完全猜不出是什麼味道……但明明超級想吃卻還是忍住帶來當禮物，真是值得稱讚。"
1272169695-NameTw = "恢復疲勞營養果凍"
1272169695-DescriptionTw = "充滿必需營養素的果凍。或許正是過度勞累的老師所需要的禮物。"
1649572559-NameTw = "皺巴巴的袋子和紙條"
1649572559-DescriptionTw = "微微皺摺的袋子裡裝著普通的市售巧克力。摺得皺巴巴的紙條上寫著什麼呢……？"
3907944625-NameTw = "白色女人"
3907944625-DescriptionTw = "在百鬼夜行自治區各處販售的惠比壽產巧克力餅乾。薄薄的白巧克力塗層讓餅乾口感酥脆絕妙，但缺點是巧克力容易融化弄髒手。"
950107355-NameTw = "盒中巧克力"
950107355-DescriptionTw = "包裝華麗的巧克力盒。裡面只裝著一顆手工巧克力。數量雖少，卻是充滿仁耶惡作劇心思的傑作。"
2522956263-NameTw = "注入魔力（？）的巧克力"
2522956263-DescriptionTw = "繪梨聲稱注入了自己魔力的巧克力。吃了之後會感覺充滿力量。"
3646064924-NameTw = "幽靈巧克力瑪芬"
3646064924-DescriptionTw = "裝飾著可愛白巧克力幽靈的瑪芬。看著它，彷彿能聽到鹿江的聲音。"
1600461265-NameTw = "文學的提拉米蘇"
1600461265-DescriptionTw = "冷藏後會更加美味的提拉米蘇。不過，等待期間的對話或許會更加甜蜜。"
788496083-NameTw = "特大巧克力硬糖"
788496083-DescriptionTw = "又大又硬需要敲碎才能吃的糖果。放在嘴裡慢慢含著，長久享受那份甜蜜吧。"
2100977290-NameTw = "巧克力雕像"
2100977290-DescriptionTw = "巨大又不會融化，還具有極高的美學價值。除了不能吃這點之外堪稱完美的巧克力。"
2647895027-NameTw = "虛線巧克力"
2647895027-DescriptionTw = "雖然是常見的市售品，但卻並不平凡。具有很高的收藏價值。"
1217736606-NameTw = "巧克力蛋白霜餅乾"
1217736606-DescriptionTw = "將蛋白和糖混合快速攪拌製成的蛋白霜，加入可可粉等配料烘烤而成的餅乾。\n食材，是很重要的。"
165942245-NameTw = "馬鈴薯巧克力蛋糕球"
165942245-DescriptionTw = "將糖蜜餅乾粉與煉乳、糖、可可和肉桂粉等混合製成的巧克力蛋糕。\n每個人都有各自的可能性。"
1366975366-NameTw = "巧克力蜂蜜蛋糕"
1366975366-DescriptionTw = "將巧克力蛋糕片、蜂蜜和巧克力奶油層層堆疊製成的蛋糕。\n談判和契約，無論如何都很重要。"
