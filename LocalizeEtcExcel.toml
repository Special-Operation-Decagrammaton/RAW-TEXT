2319299758-NameTh = "กระเป๋าสตางค์สุดล้ำค่าของอารุ"
2319299758-DescriptionTh = "กระเป๋าสตางค์ชั้นนำที่อารุใช้\nแม้จะเป็นสินค้าชั้นนำที่ผลิตจากวัสดุคุณภาพดี แต่สีก็จางลงมาก และมีรอยขีดข่วนอยู่ทุกที่เพราะใช้งานมาเป็นเวลานาน กระเป๋าสตางค์นี้เป็นของขวัญที่ฮารุกะ คาโยโกะและมุสึกิ ลงขันกันซื้อให้อารุหลังจากก่อตั้งหน่วยรับจ้างสารพัด สำหรับอารุแล้ว นี่เป็นของมีค่าที่ไม่อาจแลกด้วยสิ่งอื่นใดได้"
3741719919-NameTh = "พัดลมเย็นสุดขั้ว"
3741719919-DescriptionTh = "อาวุธลับของเอมิที่เตรียมไว้ในพื้นที่ร้อนอบอ้าว\nสร้างลมพัดรุนแรงถึงขั้นอันตรายต่างจากรูปลักษณ์ที่น่ารัก แต่มีระยะลมพัดจำกัดแทนที่พลังลมรุนแรง จึงต้องเอาไปจ่อใกล้ๆ ถึงจะพัดโดนหลายคน"
375503055-NameTh = "ปลอกแขนคณะกรรมการวินัย ของฮินะ"
375503055-DescriptionTh = "ปลอกแขนคณะกรรมการวินัยที่ฮินะใส่เป็นประจำ สำหรับคนอื่น มันอาจเป็นแค่สิ่งที่บอกสถานะคณะกรรมการวินัย แต่สำหรับฮินะ มันเป็นสิ่งย้ำเตือนถึงความรับผิดชอบในฐานะคณะกรรมการวินัย ภาระที่มากับปลอกแขนนี้ไม่ใช่เบาๆ เลย"
4285150101-NameTh = "บัตรผ่านไปได้ทุกที่"
4285150101-DescriptionTh = "หมอนที่โฮชิโนะอ้างว่า \"พาไปสู่ดินแดนความฝันได้ทุกที่\" และบอกว่ามันนุ่มนิ่มน่าหนุน แต่ตอนนี้หาซื้อไม่ได้แล้ว"
49207748-NameTh = "ซูคาจันของเนรุ"
49207748-DescriptionTh = "ซูคาจันที่แทบจะไม่อยู่ห่างจากตัวเนรุเลย ถ้าถามเนรุเรื่องซูคาจัน ก็ได้คำตอบแสนจะเรียบง่ายกลับมา"
3203934447-NameTh = "โมเดลฮอตดอกนำโชค"
3203934447-DescriptionTh = "โมเดลพลาสติกจำลองรูปฮอตดอกที่ทำให้มีกลิ่น และผิวสัมผัสถอดแบบฮอตด็อกของจริง\nสร้างจากเครื่องพรินต์ 3D ให้มีรอยกัดหนึ่งคำด้วย อิซุมิอ้างว่าการพกโมเดลนี้ มักจะทำให้มีโชค ในการได้กินของอร่อยกลิ่นหอมๆ ทุกอย่าง"
1865059509-NameTh = "โดรนของชิโรโกะ"
1865059509-DescriptionTh = "โดรนที่ชิโรโกะพกติดตัวไปด้วยเป็นประจำ\nถึงแม้ตัวชิโรโกะเองยืนกรานว่าเป็นโดรนที่ใช้ถ่ายภาพ ตอนออกกำลังกาย แต่มีการติดตั้งฟังก์ชันที่ไม่เกี่ยวกับ การถ่ายภาพอยู่หลายอย่าง"
1017510971-NameTh = "สายรัดถ่วงน้ำหนัก"
1017510971-DescriptionTh = "สายรัดถ่วงน้ำหนักที่ใช้พันรอบข้อเท้าและข้อมือ ในนี้นอกจากมีทรายแล้วยังมีผงโลหะรวมอยู่ด้วย จึงมีน้ำหนักกว่าที่คิด"
1197583309-NameTh = "กล่องแสนพิเศษของซึรุกิ"
1197583309-DescriptionTh = "กล่องเก็บของสะสมที่ซ่อนอยู่ลึกๆ ในห้องของซึรุกิ\nในนั้นมีของสะสมจุกจิกมากมาย ทั้งภาพถ่ายโบรไมด์ หนังสือ\nและตั๋วภาพยนตร์หลายๆ ประเภท ดูจากการจัดเรียงของ\nอย่างเป็นระเบียบและไม่มีฝุ่นให้เห็นแม้แต่นิด ก็รู้ได้ว่า\nซึรุกิเป็นคนละเอียดลออขนาดไหน"
4034964291-NameTh = "สติกเกอร์คำชมของอาริสึ"
4034964291-DescriptionTh = "ถึงอาจไม่ได้ช่วยให้ทุกอย่างดีขึ้น! หรือเพิ่มค่าสถานะโชคดีได้จริงๆ...\nแต่ไอเทมนี้มีหัวใจของอาริสึอัดแน่นอยู่เต็มเปี่ยม"
2870052181-NameTh = "เครื่องเล่นเกมพกพา"
2870052181-DescriptionTh = "เครื่องเล่นเกมพกพาเครื่องแรกที่มิโดริกับพี่สาวของเธอซื้อ\nมันคือเครื่องเล่นเกมที่เต็มไปด้วยความทรงจำที่มีร่วมกัน ทั้งการต่อสู้ คืนดี และช่วงชิงไอศกรีม"
3484495552-NameTh = "แผ่น CD สีซีดจาง"
3484495552-DescriptionTh = "ซีดีเก่าหนึ่งแผ่นที่มีชื่อของยูสึเขียนเอาไว้\nมันคือแผ่นมาสเตอร์ที่บรรจุตัวเกมเทลส์ ซาก้า โครนิเคิล เวอร์ชันต้นแบบฉบับสมบูรณ์ไว้ บางครั้งยูสึก็รู้สึกเศร้าเวลามองซีดีแผ่นนี้"
2992891006-NameTh = "ห่วงยางของคณะกรรมการวินัย"
2992891006-DescriptionTh = "ห่วงยางที่ผ่านการคัดเลือกจากคณะกรรมการวินัยของเกเฮนน่า\nมีวัสดุและฟังก์ชันต่างจากห่วงยางทั่วไป แบบเดียวกับของใช้อื่นๆ ของคณะกรรมการวินัย เป็นสิ่งที่ฮินะที่ยังไม่คุ้นเคยกับการว่ายน้ำ มักจะพึ่งพาอยู่เสมอ"
1279061846-NameTh = "ผ้าห่มเนื้อนุ่ม"
1279061846-DescriptionTh = "ผ้าห่มปักเครื่องหมายสถาบันเกเฮนน่า ใช้ได้ในชีวิตประจำวันในหลายวัตถุประสงค์ อาจยังมีไออุ่นของอิโอริเหลืออยู่เล็กน้อย..."
1059841421-NameTh = "ความทรงจำวัยเด็กของชุน"
1059841421-DescriptionTh = "กิ๊บติดผมเปลือกหอยมุกที่ชุนหวงแหน\nหลังจากอายุมากขึ้น ชุนก็ไม่ค่อยได้ทำผมแกละ\nและไม่ได้ติดกิ๊บนี้ แต่สำหรับชุนแล้ว แม้เวลาจะผ่านไป\nกิ๊บติดผมนี้ก็ยังเป็นส่วนหนึ่งของความทรงจำอันล้ำค่า\nที่ไม่เคยแปรเปลี่ยน"
242283010-NameTh = "ระเบิดมือหางกระต่าย"
242283010-DescriptionTh = "ระเบิดมือรูปหางกระต่ายที่อาสึนะใช้เวลาแต่งชุดบันนี่เกิร์ล\nถึงจะดูไม่อันตรายเพราะปกคลุมด้วยขนนุ่มฟู แต่ก็มีพลังทำลายล้างสูงไม่ต่างจากระเบิดมือทั่วไป"
2635859011-NameTh = "หน้ากากจิ้งจอกในความลับ"
2635859011-DescriptionTh = "หน้ากากจิ้งจอกที่วาคาโมะชอบใส่ในชีวิตประจำวัน ของโปรด\nของวาคาโมะ เดิมทีใช้ปกปิดตัวตนเพื่อให้ไม่ต้องพัวพันโดย\nไม่จำเป็น แต่ตอนนี้เป็นเพียงหน้ากากที่เก็บซ่อนความลับไว้ ไอเทมแฟชั่นที่ใช้เก็บซ่อนความไร้เดียงสาของเด็กสาวที่\nล้นออกมาได้เป็นอย่างดี"
2119169468-NameTh = "ผ้ากันเปื้อน ลายซากุระในห้วงความฝัน"
2119169468-DescriptionTh = "ผ้ากันเปื้อนลายซากุระของมิโมริ เรียกว่าเป็นของคู่ใจงานบ้าน ไม่ว่าจะทำความสะอาดหรือทำงาน"
1916503017-NameTh = "สมุดบัญชีคัดแยกอุปกรณ์"
1916503017-DescriptionTh = "สมุดบัญชีคัดแยกอุปกรณ์ในวิหารทรีนิตี้ที่ฮินาตะเขียนขึ้นเอง\nเป็นรายการบันทึกจำนวนและที่ตั้งของอุปกรณ์ทั้งหมดใน\nมหาวิหารที่จดไว้อย่างเป็นระเบียบ ไม่ค่อยมีคนอื่นรู้ว่ามีบัญชีนี้อยู่ เพราะถ้ามีของจำเป็นต้องใช้ ฮินาตะจะเป็นคนไปหยิบเอง\nซะส่วนใหญ่"
2698379035-NameTh = "ป้ายชื่อขาด"
2698379035-DescriptionTh = "ป้ายชื่อขาดรุ่งริ่งที่มิยาโกะใช้ตอนที่เธอเป็นเด็กฝึก มองแว็บแรกอาจเหมือนเศษผ้าเก่าๆ แต่สำหรับมิยาโกะ มันคือของสำคัญที่เต็มไปด้วยความฝันในอดีต"
578130730-NameTh = "กระบอกน้ำกระต่าย"
578130730-DescriptionTh = "กระบอกน้ำเก็บความร้อนขนาดกะทัดรัดที่มิยุพกติดตัว เก็บไว้ในถุงลายกระต่ายหน้าเศร้าอย่างทะนุถนอม"
3853159441-NameTh = "งานไม้แกะสลัก"
3853159441-DescriptionTh = "งานไม้แกะสลักแบบหยาบที่ซาโอริใช้มีดทำให้\nเมื่อตอนเด็ก มันเก่ามากจนแม้แต่ตัวเจ้าของ\nเองอย่างซาโอริก็ลืมไปแล้ว"
3465934622-NameTh = "ร่มลายดอกไม้หรูหรา"
3465934622-DescriptionTh = "ร่มกันแดดหรูหราที่วาคาโมะพกติดตัวไปทุกที่\nมีหัวใจอันบริสุทธิ์ของวาคาโมะ ที่ปรารถนาจะจดจำความรักที่มีต่อครูไว้ตลอดไป"
2513809664-NameTh = "กระเป๋าที่เต็มไปด้วยของมีค่า"
2513809664-DescriptionTh = "กระเป๋าในดีไซน์สดใสน่ารักที่ชิเซะนำติดตัวมาที่ชายหาดด้วย มีป้ายชื่อที่คาโฮะห้อยไว้ให้ เพราะเป็นห่วงว่าจะทำหาย ชิเซะมีความทรงจำมากมายที่เธอได้พบในชายทะเล มีบ้างที่เธอลืมโดยไม่ได้ตั้งใจ แต่ความทรงจำไม่มีวันจางหาย"
23410748-NameTh = "หน้ากากของซาโอริ"
23410748-DescriptionTh = "หน้ากากที่ซาโอริสวมอยู่เสมอ สัมผัสได้ว่ามันผ่านการใช้งานมาอย่างยาวนาน และความผูกพันของเจ้าของที่ต่อสู้ร่วมกันมามากมาย"
526288530-NameTh = "หูฟังประสิทธิภาพสูง"
526288530-DescriptionTh = "หูฟังสำหรับเมดและสายลับที่มีประสิทธิภาพสูง และยังเหมาะสำหรับการแฮ็ก ด้วยคุณสมบัติในการเก็บเสียงที่ยอดเยี่ยม\nโทคิอ้างว่ามันเป็นของที่สื่อถึงความสัมพันธ์กับคนสำคัญ"
2538736248-NameTh = "เหรียญเกม"
2538736248-DescriptionTh = "เหรียญที่โคยูกิเจาะรูด้วยตัวเอง\nเดิมทีตั้งใจจะไว้ใช้เล่นเกมอาร์เคดฟรี แต่ตอนนี้ไม่มีประโยชน์แล้ว เพราะความก้าวหน้าทางเทคโนโลยีความปลอดภัย"
3979908227-NameTh = "หนังสือขอบคุณจาก เหล่านักเรียน"
3979908227-DescriptionTh = "หนังสือขอบคุณที่นักเรียนเฮียกคิยาโคมอบให้กับคาโฮะ เธอเก็บรักษาไว้ในกรอบเป็นอย่างดี"
1620828120-NameTh = "ที่คาดผมเมด"
1620828120-DescriptionTh = "ดูเหมือนว่าไม้ถูพื้น ชุดเมด และที่คาดผมเมด จะเป็น 3 สัญลักษณ์ของผู้กล้าเมด ที่คาดผมนี้เป็นอุปกรณ์ที่อาริสึคิดว่าสำคัญ"
223298101-NameTh = "ริบบิ้นสีขาวของวัยรุ่น"
223298101-DescriptionTh = "ริบบิ้นของตัวเอกในนิยายวัยรุ่นที่เรนเกะชอบ\nมีคำอธิษฐานของเรนเกะที่อยากมีชีวิตวัยรุ่นในแบบเดียวกัน"
2108207432-NameTh = "ตุ๊กตางานเทศกาลเก่า"
2108207432-DescriptionTh = "ตุ๊กตาที่ซื้อมาจากงานเทศกาลแรกที่อุมิกะไป\nพวกมันมาเป็นคู่"
172883371-NameTh = "กระดิ่งลม"
172883371-DescriptionTh = "กระดิ่งลมที่ชิเซะห้อยเอาไว้ เสียงที่ใสกังวานแบบที่ชิเซะตามหานี้ ถือเป็นสัญญาณบอกถึงการมาของสายลมเย็นสบาย"
945811089-NameTh = "สมุดรายชื่อชมรมทวงความยุติธรรมเก่า"
945811089-DescriptionTh = "สมุดโน้ตที่เก่าและชำรุดจากการใช้งานมายาวนาน\nบันทึกความชอบและคุณสมบัติพิเศษของสมาชิกโดยละเอียดเอาไว้ ความสนใจและเอาใจใส่อยู่เสมออาจเป็นวิธีแสดงความรักของเธอ"
351540743-NameTh = "สมุดโน้ตลับ"
351540743-DescriptionTh = "สมุดโน้ตที่โนโนมิแอบจดบันทึกเอาไว้ เธอจะจดสิ่งที่อยากทำร่วมกับสมาชิก\nคณะกรรมการแผนงานไว้เสมอ"
2878555129-NameTh = "สมุดตระเวนกินร้านเด็ด"
2878555129-DescriptionTh = "สมุดบันทึกพิเศษที่จุนโกะใช้เป็นประจำ เพื่อจดบันทึก ร้านอาหารที่จุนโกะเคยไป โดยจัดอันดับตามพื้นที่"
3704183677-NameTh = "กระเป๋ากีฬาของเซริกะ"
3704183677-DescriptionTh = "กระเป๋ากีฬาสีดำของเซริกะ กระเป๋าสารพัดประโยชน์ที่ใส่ของได้ ทุกอย่าง ทั้งใช้เรียน งานพาร์ทไทม์ ออกกำลังกาย หรืออุปกรณ์\nต่างๆ"
163861415-NameTh = "เครื่องคิดเลขวิทยาศาสตร์ของยูกะ"
163861415-DescriptionTh = "เครื่องคิดเลขวิทยาศาสตร์ที่ยูกะพกติดตัวไปด้วยทุกที่\nแม้จะมีทักษะคิดเลขในใจที่ดีเยี่ยม แต่ยูกะก็มักใช้เครื่องคิดเลข\nทางวิทยาศาสตร์นี้คำนวณเสมอเพื่อความสมบูรณ์แบบ"
1286967671-NameTh = "เครื่องเล่นเกมเก่าในเคส"
1286967671-DescriptionTh = "เครื่องเล่นเกมพกพาเครื่องแรกที่โมโมอิกับน้องสาวของเธอซื้อ\nดูเหมือนว่า 'ปฏิบัติการย้อมเกม' ของโมโมอิจะเสร็จสมบูรณ์แล้ว..."
2856730141-NameTh = "คอลเลกชันลิมิเต็ด ฉบับพิมพ์ซ้ำ"
2856730141-DescriptionTh = "คอลเลกชันหนังสือการ์ตูนที่พิมพ์ซ้ำในจำนวนจำกัด แม้ว่ามันจะไม่มีค่าสำหรับคนอื่น แต่ถ้ามีค่าสำหรับตัวเอง ก็ถือเป็นของล้ำค่าแล้ว"
1977526069-NameTh = "แว่นตาหยดน้ำตา"
1977526069-DescriptionTh = "แว่นตาพิเศษที่โคโทริใส่ติดตัวตลอดเวลา\nถึงจะมีรูปร่างที่ดูแปลกหากมองเผินๆ แต่ที่จริงแล้ว มีความเอาใจใส่ของโคโทริต่อผู้คนที่ฟังคำอธิบายอยู่"
1261922711-NameTh = "หูฟังพาโทรล"
1261922711-DescriptionTh = "หูฟังที่สึซึมิพกติดตัวในตอนลาดตระเวน คำว่า <หูฟังพาโทรล> นี้เป็นเพียงชื่อที่เธอตั้งเอง ที่จริงแล้วเป็นหูฟังที่หาซื้อได้ทั่วไป"
3176499349-NameTh = "กล่องแช่เย็นสำหรับฤดูร้อน"
3176499349-DescriptionTh = "กล่องแช่เย็นสำหรับฤดูร้อน ใช้เก็บเครื่องดื่มและผลไม้ฤดูร้อน และว่ากันว่ามีส่วนผสมลับพิเศษของอิซุมิเก็บไว้ด้วย "
3783629365-NameTh = "ม้วนเทปนินจาเก่า"
3783629365-DescriptionTh = "ม้วนวิดีโอเทปเก่าคร่ำครึที่ดูธรรมดาๆ\nว่ากันว่ามี 'บางสิ่ง' ที่ชักนำให้มิจิรุก้าวเข้าสู่ หนทางแห่งนินจาบรรจุอยู่..."
2740802403-NameTh = "แว่นตาของไมสเตอร์"
2740802403-DescriptionTh = "แว่นตาของฮิบิกิที่ผ่านการดัดแปลงมากมาย นอกจากฟังก์ชันที่ดี รูปลักษณ์ก็ยังถูกใจเธอด้วย"
3126054698-NameTh = "หนังสือสำนวน และสุภาษิตเรื่องราวต่างๆ"
3126054698-DescriptionTh = "หนังสือที่อธิบายสำนวนและสุภาษิตต่างๆ ให้เข้าใจง่ายผ่านเรื่องราวในอดีต\nเป็นหนังสือที่ตรงกับรสนิยมของมาชิโระพอดี"
4237292601-NameTh = "กาน้ำชา MOMO FRIENDS รุ่นพิเศษ"
4237292601-DescriptionTh = "กาน้ำชาที่ฮิฟุมิเอามาด้วยโดยบอกว่าเป็นของจำเป็น\nในการนั่งรถถังมาทะเล เป็นกาน้ำชารุ่นพิเศษที่สร้างขึ้นมา สำหรับใช้ในรถถังโดยเฉพาะ ถึงจะบอกใช้ในรถถัง แต่ก็เป็นของส่วนตัวที่ฮิฟุมิซื้อด้วยเงินของตัวเอง"
794937786-NameTh = "สเกตบอร์ดของซายะ"
794937786-DescriptionTh = "สเกตบอร์ดที่ตกแต่งในแบบเฉพาะตัวของซายะ วิ่งได้แบบจักรยาน หรือสกู๊ตเตอร์โดยที่มือเป็นอิสระ ขอเพียงฝึกฝนมากพอ"
2694523503-NameTh = "เป็ดผู้ช่วยอาบน้ำ"
2694523503-DescriptionTh = "ของที่ระลึกชิ้นใหม่ของสหภาพเรดวินเทอร์ที่ทำจากเป็ดยาง\nติดหนวดที่ผลิตมาเป็นจำนวนมาก\nเชริโน่ดูจะไม่ถูกใจเป็ดยางนี้ และบอกว่าเป็นของสำหรับเด็ก\nแต่เธอก็บอกให้เอามันไปด้วยทุกครั้งที่อาบน้ำ"
664556707-NameTh = "คู่มือ SRT เบื้องต้น"
664556707-DescriptionTh = "คู่มือมาตรฐานของสถาบันพิเศษ SRT ที่ซากิพกติดตัวตลอดเวลา เธออ่านและศึกษาเยอะมาก ถึงมันจะเก่าแต่เธอยังเก็บรักษาไว้อย่างดี"
2395802552-NameTh = "เฟรมการ์ดมูชิควีน"
2395802552-DescriptionTh = "เฟรมการ์ดที่สร้างขึ้นมาเพื่อป้องกันไม่ให้การ์ดชำรุด ในอัลบั้มรวมเฟรมการ์ดมูชิควีนนี้ มีการ์ดใบหนึ่งที่คาเอเดะซื้อมาเป็นใบแรก ในการแข่งขันอย่างเป็นทางการส่วนใหญ่ ผู้เล่นจะต้องใช้เฟรมการ์ดนี้ถึงจะลงแข่งได้"
3530712502-NameTh = "ถุงของขวัญจากฮานาเอะ"
3530712502-DescriptionTh = "ถุงที่ใส่ของขวัญจากฮานาเอะไว้เต็ม มีของที่ฮานาเอะคิดว่าจำเป็นสำหรับทุกคน\nเอาไว้อยู่เต็มถุง"
2177848562-NameTh = "เครื่องประดับรูปปีกผีเสื้อ"
2177848562-DescriptionTh = "เครื่องประดับรูปปีกของฮารุนะ\nเธอจะประดับปีกแตกต่างกันออกไปตามสถานการณ์ อารมณ์ และความหมาย"
2059299965-NameTh = "อาเธน่า 3"
2059299965-DescriptionTh = "โดรนทรงกลมที่ลอยวนอยู่รอบๆ ฮาเระไม่เคยขาด\nเป็น AI ที่สามารถสั่งสมประสบการณ์และเรียนรู้ได้ด้วยตนเอง\nสมกับชื่อที่เหมือนกับเทพธิดาแห่งปัญญา บ่อยครั้งที่มัน\nทรยศต่อความคาดหวังของฮาเระเพราะมันเป็น AI ที่ทำงาน\nตรงกันข้ามกับความตั้งใจของเจ้าของ"
1544503704-NameTh = "เซ็ตเครื่องมือของไมสเตอร์"
1544503704-DescriptionTh = "เซ็ตเครื่องมือที่อุทาฮะปรับแต่งเองตามความชอบของเธอ\nเซ็ตเครื่องมือนี้คือความภูมิใจของไมสเตอร์ ถือเป็นเครื่องมือ\nชั้นยอดหนึ่งเดียวในคิโวทอสก็ว่าได้"
3580703064-NameTh = "ชุดน้ำชาที่คุ้นเคย"
3580703064-DescriptionTh = "ชุดน้ำชาที่ชิซุโกะใช้ครั้งแรก แม้ว่าจะเก่าแล้ว แต่ความทรงจำตอนชงชาถ้วยแรกยังอยู่ในนั้น"
3706177967-NameTh = "วรรณกรรมที่น่าสงสัย"
3706177967-DescriptionTh = "หนังสือเล่มโปรดของฮานาโกะที่มีความหมายลึกซึ้งในหลายด้าน มักจะถูกยึดอยู่บ่อยๆ แต่ฮานาโกะก็ใช้วิธีต่างๆ เอากลับมาได้ทุกครั้ง"
4052244851-NameTh = "ดอกไม้กลัดสีขาวบริสุทธิ์"
4052244851-DescriptionTh = "ช่อดอกไม้กลัดสีขาวที่เหมือนจะไม่เหี่ยวเฉาที่มารีซื้อไว้ เพื่อไม่ให้ลืมความรู้สึกแรก แต่ว่าในความเป็นจริงนั้น...?"
925075194-NameTh = "กระเป๋ายาของชินัตสึ"
925075194-DescriptionTh = "กระเป๋าใบใหญ่ยักษ์ที่ชินัตสึใช้มาตั้งแต่สมัยทำงาน\nในหน่วยแพทย์ฉุกเฉิน สัมผัสได้ถึงความเอาใจใส่ของ\nชินัตสึที่คอยดูแลคนรอบข้าง พอๆ กับอุปกรณ์ทาง\nการแพทย์ที่อัดแน่นอยู่ข้างใน"
3030262627-NameTh = "สปอร์กล่าของหวาน"
3030262627-DescriptionTh = "ช้อนปลายส้อมสำหรับโยชิมิโดยเฉพาะ เธอเก็บไว้ติดตัวเสมอเผื่อใช้ในยามฉุกเฉินได้ทันที ใช้งานมานานจนเรียกว่าเป็นของติดตัว"
