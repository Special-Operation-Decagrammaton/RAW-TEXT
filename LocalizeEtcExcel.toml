2398625876-NameKr = "대운동회 심판석"
2398625876-DescriptionKr = "높은 곳에서 경기를 지켜볼 수 있게 해주는 대운동회 심판석. 누구보다 빠르게 상황을 파악할 수 있다."
4051838828-NameKr = "대운동회 네트"
4051838828-DescriptionKr = "튼튼한 소재로 만들어진 대운동회 네트. 경기의 긴장감 넘치는 랠리는 이 네트에서 이루어진다."
3620318852-NameKr = "대운동회 나무 바닥"
3620318852-DescriptionKr = "단단하게 만들어진 대운동회 나무 바닥. 마찰력이 높아 미끄러지는 일은 적다."
1998183698-NameKr = "대운동회 페로로 플래그 장식"
1998183698-DescriptionKr = "귀여운 페로로가 치어리딩을 하는 플래그 장식. 귀여움과 승리의 기원을 한 번에!"
2904276420-NameKr = "대운동회 응원 장식"
2904276420-DescriptionKr = "보기만 해도 힘이 솟구치는 대운동회 플래그 장식. 선명한 색상이 승리욕을 불태운다."
114040411-NameKr = "대운동회 벽지"
114040411-DescriptionKr = "라이트 베이지 컬러의 대운동회 벽지. 대운동회를 빛내는 기구들과 잘 어울린다."
832633492-NameKr = "대운동회 배경"
832633492-DescriptionKr = "활기찬 대운동회를 돋보이게 해주는 대운동회 배경. 대운동회의 활기와 발랄함이 돋보인다."
3818682926-NameKr = "대운동회 입간판"
3818682926-DescriptionKr = "보는 사람들의 눈길을 끄는 대운동회 입간판. 관심이 없던 학생도 어느새 끌어들인다."
