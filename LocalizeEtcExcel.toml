4174179093-DescriptionTh = "ช็อกโกแลตที่อ้างว่าเป็นของที่ซื้อมาจากร้านค้าไว้พอดี\nบางครั้งก็ต้องแสร้งทำเป็นไม่รู้ความจริง แม้ว่าความจริงจะชัดเจนก็ตาม"
