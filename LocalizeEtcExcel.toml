1448270761-NameTw = "活動Challenge關卡5提示"
1448270761-DescriptionTw = "請使用可消除減益效果的技能攻略葛夫拉的導彈。\n為了避免結冰，請使用修復材料保管裝置。"
2396453793-NameTw = "活動Challenge關卡6提示"
2396453793-DescriptionTw = "特異現象搜查部會支援我方。\n\n當敵人被消滅時，特異現象搜查部會收集資料並進行分析。\n一旦資料分析完成，會同時削弱葛夫拉並強化我方。"
3833784038-NameTw = "活動挑戰關卡1提示"
3833784038-DescriptionTw = "為了躲避佳澄安裝在列車上的炸彈，必須向前方的車廂逃跑。\n請在炸彈爆炸之前撤離至前方的車廂。"
3483475612-NameTw = "活動挑戰關卡2提示"
3483475612-DescriptionTw = "請留意範圍攻擊。\n\n防備來自後方的襲擊吧。"
4029303020-NameTw = "活動挑戰關卡3提示"
4029303020-DescriptionTw = "我方前鋒學生的COST恢復速度會大幅降低。\n\n擊倒敵人或破壞販賣機，可獲得一定量的COST。"
28119784-NameTw = "活動挑戰關卡4提示"
28119784-DescriptionTw = "敵方的攻擊類型變更為神祕屬性。\n\n擊倒高地人列車乘務員學生，可獲得一定量的COST。\n\n高地人哨兵槍的攻擊有低機率重複給予目標防禦力及迴避率減少的減益效果。"
3754973665-NameTw = "活動挑戰關卡1提示"
3754973665-DescriptionTw = "頭盔團成員搬出了被遺棄的黑市自動機，準備攻擊御坂美琴。\n\n請編輯能夠保護御坂美琴的學生，並抵禦敵方的攻勢。"
981107711-NameTw = "活動挑戰關卡2提示"
981107711-DescriptionTw = "食蜂操祈持續運用能力操控著頭盔團成員們。\n\n請先擊敗食蜂操祈，阻止被控制的頭盔團成員。"
247331126-NameTw = "活動挑戰關卡3提示"
247331126-DescriptionTw = "前方的PMC士兵遭受傷害時，PMC雙足步行機甲也會連帶受到波及。\n\n後方也有許多敵人出沒，請編輯可施展範圍攻擊的學生。"
3717534249-NameTw = "活動挑戰關卡4提示"
3717534249-DescriptionTw = "只要被遺棄的堅固的黑市自動機還在，便難以擊倒其他敵人。\n\n請善用治癒型學生，利用會不斷移動的自動機與稻草人提高擊倒敵人的效率。"
2028021589-NameTw = "活動挑戰關卡1提示"
2028021589-DescriptionTw = "請活用群控效果攻略敵人。"
2080523366-NameTw = "活動挑戰關卡2提示"
2080523366-DescriptionTw = "打倒敵人時，可在短時間內獲得增益效果。\n請在增益效果時間結束前擊倒下一個敵人。"
11412844-NameTw = "活動挑戰關卡3提示"
11412844-DescriptionTw = "非常強大且凶猛的熊與兔子擋住了前方。\n請讓熊陷入混亂或支援堇來對付敵人。"
1768013184-NameTw = "活動挑戰關卡4提示"
1768013184-DescriptionTw = "請設置遮蔽物，彈開敵人的攻擊。"
2920989374-NameTw = "活動挑戰關卡1提示"
2920989374-DescriptionTw = "護送沙織並迅速打倒從兩個方向出現的敵人。"
389255540-NameTw = "活動挑戰關卡2提示"
389255540-DescriptionTw = "亞瑠(禮服)和佳世子(禮服)能協力使用EX技能。盡量阻止亞瑠(禮服)對佳世子(禮服)使用EX技能。"
2681487799-NameTw = "活動挑戰關卡3提示"
2681487799-DescriptionTw = "我方的佳世子(禮服)只要沒有受到攻擊，EX技能就會變得更強大。盡量避免被頭目的大範圍攻擊擊中。"
3119514688-NameTw = "活動挑戰關卡4提示"
3119514688-DescriptionTw = "請先打倒從後方造成強大傷害的敵人。"
1154240687-NameTw = "活動挑戰關卡1提示"
1154240687-DescriptionTw = "打倒正在爭吵中的風紀委員和妖怪劇團，避免慶典的評價量表歸零。部分風紀委員受到攻擊會反擊。"
826504021-NameTw = "活動挑戰關卡2提示"
826504021-DescriptionTw = "敵方召喚物的強度會逐漸增強。請迅速消滅召喚物。"
228867329-NameTw = "活動挑戰關卡3提示"
228867329-DescriptionTw = "清除器每次被EX技能擊中都會被擊退，死亡時會對周圍會造成傷害和減益效果。\n\n請使用EX技能讓清除器在敵人附近死亡。"
3692835812-NameTw = "活動挑戰關卡4提示"
3692835812-DescriptionTw = "請一邊支援海花的煙火發射裝置，一邊打倒擾亂慶典的妖怪劇團。\n\n每次慶典準備達成25%時，都會給予敵人和我方各種增益及減益效果。\n\n敵人頭目「般若面的妖怪劇團」會受到與砲塔相同的傷害。"
937127281-NameTw = "活動挑戰關卡1提示"
937127281-DescriptionTw = "敵方戰車將朝空地移動，抵達空地時將展開猛烈的攻擊。\n\n敵方戰車對EX技能有強大的抵抗力，但受到的攻擊次數越多，其性能會降得越低。\n\n利用這項特性，在敵方戰車抵達空地前將其擊破。"
120747478-NameTw = "活動挑戰關卡2提示"
120747478-DescriptionTw = "阻止放學後的甜點部學生使用技能。"
3642446434-NameTw = "活動挑戰關卡3提示"
3642446434-DescriptionTw = "澪紗獲得增益效果後將施展EX技能。請幫助澪紗擊敗太妹。"
284862043-NameTw = "活動挑戰關卡4提示"
284862043-DescriptionTw = "先用群控效果削弱嬉皮機器人再進行攻擊。"
3412917378-NameTw = "活動挑戰關卡1提示"
3412917378-DescriptionTw = "遭受太妹的EX技能2次時會受重創。\n\n稻草人的HP恢復至100%時，我方所有學生會陷入凍結狀態，可藉此阻擋太妹的技能。"
110115972-NameTw = "活動挑戰關卡2提示"
110115972-DescriptionTw = "女武神學生們為了幫助環奈，每隔一段時間就會前來支援。\n\n為了避免聚集過多女武神學生，請盡速打倒他們吧。"
2111941898-NameTw = "活動挑戰關卡3提示"
2111941898-DescriptionTw = "請使用群控技能暫時阻止環奈，\n\n同時盡速打倒前方的敵人以逃離環奈。"
184971332-NameTw = "活動挑戰關卡4提示"
184971332-DescriptionTw = "請攻擊電漿磁場產生裝置，並以治癒型學生幫助AMAS機體。\n\n只能以EX技能消滅改造型清除器。"
2842109547-NameTw = "活動挑戰關卡1提示"
2842109547-DescriptionTw = "日和將一邊沿著海邊奔跑，一邊展示海邊的景象。\n\n之後日和將連續跑向海邊數次，如果海邊的景象跟一開始有所不同的話，請攻擊「X」稻草人，反之則攻擊「O」稻草人。"
2522165937-NameTw = "活動挑戰關卡2提示"
2522165937-DescriptionTw = "請運用坦克職責的學生，以防禦敵人造成的傷害。"
388529582-NameTw = "活動挑戰關卡3提示"
388529582-DescriptionTw = "請透過恢復技能和增益技能，協助機械鱷魚擊敗明美。"
472021647-NameTw = "活動挑戰關卡4提示"
472021647-DescriptionTw = "對明美造成減益效果時，該減益效果將轉移至明美周圍的敵人身上。\n\n而對明美周圍的敵人造成傷害時，該傷害將轉移至明美身上。\n\n當明美擺出健美動作時，將在一定期間內增加所有我方和敵人的攻擊力，並加快COST恢復速度。"
2507742254-NameTw = "活動迷你遊戲Challenge關卡01提示"
2507742254-DescriptionTw = "請消滅沿著道路衝過來的敵人。\n請編輯可在短時間內發動多次攻擊的打手，\n以抵禦將發動快速襲擊的紅色清除器。"
2091083376-NameTw = "活動迷你遊戲Challenge關卡02提示"
2091083376-DescriptionTw = "請抵禦將隨路線發動不同攻勢的敵人。\n請使用稻草人抵禦下方路線的敵人攻擊，\n並以長射程的打手消滅將沿路前進的上方路線敵人。"
3327008846-NameTw = "活動迷你遊戲Challenge關卡03提示"
3327008846-DescriptionTw = "請抵禦將隨路線發動不同攻勢的敵人。\n請編輯可在短時間內發動多次攻擊的打手，\n抵禦將發動快速襲擊的紅色清除器。"
1319806235-NameTw = "活動迷你遊戲Challenge關卡04提示"
1319806235-DescriptionTw = "請抵禦將隨路線發動不同攻勢的敵人。\n請使用坦克抵禦上方路線的敵人攻擊，\n並以長射程的打手消滅將沿路前進的敵人。"
3745893259-NameTw = "活動迷你遊戲Normal關卡01提示"
3745893259-DescriptionTw = "請留意會集體行動的敵人，\n當敵人開始聚集時，請一舉將他們擊敗。"
3544666202-NameTw = "活動迷你遊戲Normal關卡02提示"
3544666202-DescriptionTw = "請抵禦將隨路線變換不同型態的敵人。\n請迅速消滅清除器，並阻擋明美的攻擊。"
2852164857-NameTw = "活動迷你遊戲Normal關卡03提示"
2852164857-DescriptionTw = "請使用稻草人和坦克抵禦從上、下方路線發動攻擊的敵人。\n請抵禦中間路線敵人發動的襲擊。"
3825563284-NameTw = "活動迷你遊戲Normal關卡04提示"
3825563284-DescriptionTw = "請使用治癒師復活稻草人，並抵禦敵人們的攻勢。"
467833032-NameTw = "活動挑戰關卡1提示"
467833032-DescriptionTw = "地圖上會有真假炸彈，玄龍門成員們只會被真的炸彈嚇跑。\n\n請引爆真的炸彈以擊退敵人。"
2000030305-NameTw = "活動挑戰關卡2提示"
2000030305-DescriptionTw = "請使用坦克和減益效果解除技能抵禦敵人的攻擊。"
3888748298-NameTw = "活動挑戰關卡3提示"
3888748298-DescriptionTw = "請在長得一樣的敵人中找到頭目。\n\n消滅頭目後，所有敵人皆將投降。\n\n頭目造成暴擊的機率極高，而頭目以外的敵人造成暴擊的機率則極低。"
1179303176-NameTw = "活動挑戰關卡4提示"
1179303176-DescriptionTw = "請移動學生們，以使京劇部成員們的攻擊命中敵人。\n京劇部成員的技能亦會對同為京劇部的成員造成傷害。"
3297442664-NameTw = "活動挑戰關卡1提示"
3297442664-DescriptionTw = "當所有敵人的體力皆低於1%時，將生成群控量表並優先攻擊我方。\n群控量表全滿時，即可消滅敵人。"
2684865569-NameTw = "活動挑戰關卡2提示"
2684865569-DescriptionTw = "請編輯坦克，以抵禦敵人的攻擊。"
3519883613-NameTw = "活動挑戰關卡3提示"
3519883613-DescriptionTw = "誡可透過使用技能，對敵人賦予中毒效果。\n當玄龍門幹部們被賦予中毒效果時，將陷入混亂狀態。\n請使用減益效果解除技能，解除玄龍門幹部們身上的中毒效果。"
313921055-NameTw = "活動挑戰關卡4提示"
313921055-DescriptionTw = "每次消滅敵人時，誡的力量都會減弱。\n誡擁有可持續恢復的護盾，\n以強力的攻擊一口氣攻略他吧。"
3486077912-NameTw = "活動挑戰關卡1提示"
3486077912-DescriptionTw = "請阻止櫻子和美禰擊敗對方。"
3001581470-NameTw = "活動挑戰關卡2提示"
3001581470-DescriptionTw = "請編輯坦克學生，以抵禦敵人的攻擊。"
2610005946-NameTw = "活動挑戰關卡3提示"
2610005946-DescriptionTw = "頭盔團成員遭受傷害時，良舞也會一併承受傷害。\n\n每次我方使用EX技能時，皆將提升敵人的迴避數值。當稻草人的體力完全恢復後，敵人的迴避數值將還原。\n\n所有我方若在一定時間未移動，將被賦予減益效果。"
3941724285-NameTw = "活動挑戰關卡4提示"
3941724285-DescriptionTw = "只要成功在4分鐘內擋下太妹的攻勢，即可獲得勝利。\n\n太妹活得越久，力量就越強大，但他們也同樣會被明美的攻擊波及。"
2055343512-NameTw = "活動挑戰關卡1提示"
2055343512-DescriptionTw = "請為小雪進行恢復。\n\n若小雪的體力未達50%，敵人將會攻擊除小雪外的其他我方學生。"
3473872843-NameTw = "活動挑戰關卡2提示"
3473872843-DescriptionTw = "請盡快擊倒會發動威脅性攻擊的乃愛(睡衣)。"
105670687-NameTw = "活動挑戰關卡3提示"
105670687-DescriptionTw = "只要比對方快消滅清除器即可獲得勝利。\n\n每個清除器都有不同的效果，請加以運用來應對戰鬥。"
4025598380-NameTw = "活動挑戰關卡4提示"
4025598380-DescriptionTw = "當優香(睡衣)的體力在50%以上時，將給予我方增益效果。\n\n前衛君使用技能時，每受到一定次數的傷害，將減少防禦力。"
525037525-NameTw = "活動挑戰關卡1提示"
525037525-DescriptionTw = "超巨大餅醬每次遭受減益效果的持續傷害時，都會受到額外傷害。如種類為惡寒，則會承受更大的額外傷害。\n\n格黑娜風紀委員（SG）越攻擊超巨大餅醬，超巨大餅醬受到的傷害在一定時間內增加越多。"
3162907200-NameTw = "活動挑戰關卡2提示"
3162907200-DescriptionTw = "請注意瀬奈(私服)的範圍攻擊。"
2027711820-NameTw = "活動挑戰關卡3提示"
2027711820-DescriptionTw = "超巨大餅醬遭受傷害時，都會受到額外傷害。\n\n請將打擊次數較多的學生編入陣容。"
113373470-NameTw = "活動挑戰關卡4提示"
113373470-DescriptionTw = "所有敵方的暴擊抵抗和暴擊傷害抵抗大幅增加。\n我方SPECIAL學生造成的傷害增加。\n\n擊敗各部長會對所屬社團造成額外傷害。\n請妥善利用這些特性，平息各個社團的騷動吧。"
3202949901-NameTw = "活動挑戰關卡1提示"
3202949901-DescriptionTw = "擊敗紅色清除器時，周圍的清除器也會一同被擊敗。\n由於紅色清除器會受到的傷害量極少，請活用攻擊次數較多的學生。"
1916385838-NameTw = "活動挑戰關卡2提示"
1916385838-DescriptionTw = "被堇(打工)的弱點把握效果影響到的學生每次受到傷害時，會受到額外傷害。\n請利用減益效果移除技能來解除弱點把握效果。"
1058897212-NameTw = "活動挑戰關卡3提示"
1058897212-DescriptionTw = "清除器會持續對自己周圍造成傷害。\n清除器每次被EX技能命中時會被擊退，請使用EX技能讓其停留在莉附近。\n但清除器帶有護盾時將不會被擊退。"
1095949636-NameTw = "活動挑戰關卡4提示"
1095949636-DescriptionTw = "明美做出側胸健美動作時，周圍所有對象的暴擊率和暴擊數值將大幅增加。\n\n明美每受到一定次數的攻擊，所受的傷害量會在一定時間內增加。\n\n明美擁有緩慢減少的群控量表，量表集滿時會在一定時間內昏厥且大幅減少防禦力。\n之後，我方會在一定時間內獲得護盾，但攻擊力將會減少。\n請利用此護盾擋下明美的爆炸攻擊。"
3274122658-NameTw = "活動挑戰關卡1提示"
3274122658-DescriptionTw = "暴走族頭目受到的傷害量大幅減少。\n但在暴走族頭目使用技能的過程中使群控效果命中時，暴走族頭目所受傷害量增加，且將獲得一定量的COST。"
190394474-NameTw = "活動挑戰關卡2提示"
190394474-DescriptionTw = "青葉的防禦力非常高。\n請試著活用防禦力減少效果。"
384582627-NameTw = "活動挑戰關卡3提示"
384582627-DescriptionTw = "所有敵方只會受到EX技能傷害。\n\n擊敗太妹（SMG）和太妹（MG）時，所有敵方的攻擊力和攻擊速度會大幅增加。\n請先擊敗太妹（SR）和太妹突擊隊長。"
4256279682-NameTw = "活動挑戰關卡4提示"
4256279682-DescriptionTw = "我方學生與突進的暴走族發生碰撞時，將受到大量傷害。\n但突進的暴走族與掩體碰撞時，暴走族將受到大量傷害。\n請設置掩體並活用移動技能，引導敵方撞擊掩體。"
1196420166-NameTw = "活動挑戰關卡1提示"
1196420166-DescriptionTw = "敵人會衝向正在睡覺的桔梗並造成傷害。\n請在敵人接近前全部擊退，守護桔梗的睡眠吧。\n擊敗黑色清除器可獲得COST，並大幅降低周圍敵人的移動速度與防禦力。\n黑色清除器受到的傷害極低，請活用攻擊次數多的學生。"
956182265-NameTw = "活動挑戰關卡2提示"
956182265-DescriptionTw = "請活用坦克與治療學生，確保能承受蓮華(泳裝)與紫(泳裝)的攻擊。"
1158136851-NameTw = "活動挑戰關卡3提示"
1158136851-DescriptionTw = "當所有等離子場發生裝置的HP大於0時，敵人的護盾才會消失。\n等離子場發生裝置每7秒會減少25%HP，因此必須持續回復。"
2288671928-NameTw = "活動挑戰關卡4提示"
2288671928-DescriptionTw = "敵方戰車會開始朝空地移動，並在抵達後發動強力攻擊。\n敵方戰車對EX技能傷害有極高抗性，但受到攻擊次數越多，性能會逐漸下降。\n請利用這個特性，在戰車抵達空地前將其擊破。"
2701404947-NameTw = "活動挑戰關卡1提示"
2701404947-DescriptionTw = "舍監隊員們正盯上繪梨並蜂擁而來。請保護繪梨，並擊退湧來的舍監隊員。"
2506986276-NameTw = "活動挑戰關卡2提示"
2506986276-DescriptionTw = "鹿江擁有極高的防禦力，並會使用能解除自身減益效果的EX技能。\n請把握時機，善用防禦力減少效果吧。"
4114458166-NameTw = "活動挑戰關卡3提示"
4114458166-DescriptionTw = "請仔細確認敵人的防禦類型，並針對相性為Weak的敵人進行攻擊。"
444658513-NameTw = "活動挑戰關卡4提示"
444658513-DescriptionTw = "敵人會對學生施加強力的減益效果。\n請活用能解除減益效果的技能，擊敗敵人吧。"
1268479381-NameTw = "活動挑戰關卡1提示"
1268479381-DescriptionTw = "冬奔跑時會展示各種顏色的清除器。\n當冬抵達美代面前後，請攻擊出現次數最多顏色的清除器。"
4163494881-NameTw = "活動挑戰關卡2提示"
4163494881-DescriptionTw = "請針對敵人的防禦類型進行戰鬥。"
1154737800-NameTw = "活動挑戰關卡3提示"
1154737800-DescriptionTw = "在維持AMAS體力25%以上的同時，透過賦予AMAS增益效果來強化，並讓他們與敵人戰鬥。\n\n炸彈被破壞時，會對周圍敵人造成大量傷害。請善用集中攻擊。"
184757931-NameTw = "活動挑戰關卡4提示"
184757931-DescriptionTw = "晶的體力會每秒下降，但當晶的體力維持在50%以上時，會給予我方強力的增益效果。\n被晶的技能擊中的敵人，所受傷害會增加。\n\n敵方盾兵在舉盾時會恢復體力，請使用群控效果加以阻止。"
2290871345-NameTw = "活動挑戰關卡1提示"
2290871345-DescriptionTw = "請依序攻擊帶有攻擊標記的敵人，將敵人全部擊退。\n若昏倒的學生遭到攻擊，會發動極強的反擊，請務必注意。 "
3231040624-NameTw = "活動挑戰關卡2提示"
3231040624-DescriptionTw = "瞄準敵人的防禦類型來進行戰鬥吧。"
1473203563-NameTw = "活動挑戰關卡3提示"
1473203563-DescriptionTw = "套用於前鋒學生的有利效果，會同樣套用在我方頭盔團身上。\n我方頭盔團能對敵人造成巨大傷害。\n請支援我方頭盔團並展開戰鬥吧。"
1944049600-NameTw = "活動挑戰關卡4提示"
1944049600-DescriptionTw = "我方頭盔團的攻擊會提高敵人所受的傷害。\n請盡量讓我方頭盔團不被擊倒，並在支援下取得戰鬥優勢吧。"
3270373715-NameTw = "活動挑戰關卡1提示"
3270373715-DescriptionTw = "可燃油桶的HP變為100%以上時，1秒後會爆炸並對周圍敵人造成大量傷害。\n請在適當的時機引爆可燃油桶，擊倒清除器。"
3881373360-NameTw = "活動挑戰關卡2提示"
3881373360-DescriptionTw = "瞄準敵方治癒師的防禦類型來進行戰鬥。"
2657352138-NameTw = "活動挑戰關卡3提示"
2657352138-DescriptionTw = "八雲會定期出現。\n獲得八雲之書的我方或敵方，會在一定時間內大幅降低攻擊力並陷入昏厥。\n但小春則相反，會大幅提升攻擊力、COST恢復速度，同時承受的傷害量也會顯著提高。"
1246590478-NameTw = "活動挑戰關卡4提示"
1246590478-DescriptionTw = "敵方的受到傷害大幅減少。\n可燃油桶的HP變為100%以上時，1秒後會爆炸，對周圍敵人造成傷害，並大幅提升我方的費用回復速度。\n受到可燃油桶爆炸傷害的敵人，會在一定時間內受到傷害大幅增加。"
944485355-NameTw = "活動挑戰關卡1提示"
944485355-DescriptionTw = "敵方的EX技能會造成極高的傷害，但擊中掩蔽物時會往反方向彈開。\n請用月夜(禮服)的EX技能彈開敵方技能，保護我方妖怪劇團。"
225733024-NameTw = "活動挑戰關卡2提示"
225733024-DescriptionTw = "若月夜(禮服)倒下，伊樹菜的受傷害量會增加。\n請優先攻擊月夜(禮服)。"
450982130-NameTw = "活動挑戰關卡3提示"
450982130-DescriptionTw = "稻草人的體力越高，敵方受到的傷害量越高。"
3754788721-NameTw = "活動挑戰關卡4提示"
3754788721-DescriptionTw = "學生EX技能帶來的增益效果也會套用至敵方頭目上。\n\n敵方頭目不會受群控效果影響，但時間依然會累計，累積10秒時敵方頭目受到的傷害量會增加。(最多疊加10次) (群控強化力越高，累積時間越多。)\n\n當稻草人的體力達到99%以上時，COST恢復速度會大幅增加。\n\n請注意，敵方頭目的防禦力和暴擊傷害抵抗力極高。"
3884845621-NameTw = "活動挑戰關卡1提示"
3884845621-DescriptionTw = "炸彈爆炸時會對學生造成大量燒傷持續傷害。\n請活用回復技能和範圍攻擊技能，避免炸彈爆炸。"
86017968-NameTw = "活動挑戰關卡2提示"
86017968-DescriptionTw = "請根據敵方防禦類型搭配攻擊類型進行戰鬥。"
3706206590-NameTw = "活動挑戰關卡3提示"
3706206590-DescriptionTw = "AMAS的攻擊力會隨時間增加。請迅速擊敗AMAS。"
1265950056-NameTw = "活動挑戰關卡4提示"
1265950056-DescriptionTw = "所有敵人的血量歸零才會被擊敗。\n前衛君受到的EX傷害大幅減少，但受到的特效傷害會大幅增加。\n機械鱷魚使用EX技能噴火後，會暈眩15秒且受到的傷害大幅增加。"
