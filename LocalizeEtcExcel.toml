1093179152-DescriptionKr = "다이아 패턴 포인트 바닥. 할로윈 분위기를 연출하기에 적절하다."
2494992221-NameKr = "할로윈 펌킨 디저트 테이블"
2494992221-DescriptionKr = "호박으로 만든 디저트들이 가득한 테이블. 겉으로 보기에는 무섭지만 매우 달콤하다!"
2274493728-NameKr = "거미줄 무늬 아치형 창문"
2274493728-DescriptionKr = "거미줄 무늬가 포인트인 아치형 창문. 밤에 무서운 손님이 찾아올지도?"
