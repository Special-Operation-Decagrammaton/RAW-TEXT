1794535042-NameTh = "กีตาร์เบสสีน้ำเงินเข้ม"
1794535042-DescriptionTh = "กีตาร์เบสสีน้ำเงินเข้ม แม้ว่าเบสเป็นดนตรีที่สนับสนุนวง แต่ถ้าเพื่อเพื่อนร่วมวง ก็พร้อมออกมาเป็นดนตรีนำ"
3965567884-NameTh = "กีตาร์ไฟฟ้าสีชมพู"
3965567884-DescriptionTh = "กีตาร์ไฟฟ้าสีชมพูแสนน่ารัก ให้เสียงที่แข็งแกร่งต่างจากที่เห็น"
757557126-NameTh = "คีย์บอร์ดไฟฟ้าพื้นฐาน"
757557126-DescriptionTh = "คีย์บอร์ดไฟฟ้าที่มีพื้นฐานครบครัน เมื่อการแสดงเริ่มขึ้น มันจะมอบการแสดงที่ยอดเยี่ยม ยิ่งกว่าพื้นฐาน"
4027488153-NameTh = "ตู้ถ่ายรูปเซลฟี่"
4027488153-DescriptionTh = "ตู้ถ่ายรูปเซลฟี่ที่ดึงดูดความสนใจของกลุ่มนักเรียนวัยรุ่น มีของตกแต่งให้เลือกใช้มากมาย"
419270322-NameTh = "กระดานในตำนาน"
419270322-DescriptionTh = "กระดานไวท์บอร์ดที่บันทึกข้อมูลของ\nวงดนตรีในตำนานเอาไว้ สิ่งสำคัญยิ่งกว่าชื่อเสียงหรือขนมหวาน คือความทรงจำที่มีร่วมกัน"
1813932227-NameTh = "เตียงคาเฟ่"
1813932227-DescriptionTh = "เตียงเป็นสิ่งสำคัญของทั้งเมดและเกมเมอร์ ไม่สิ เป็นเฟอร์นิเจอร์ที่ถูกนำมา โดยอ้างว่าเป็นสิ่งจำเป็นมากกว่านั้น แบบที่ค่อยคิดถึงความเหมาะสมทีหลัง"
57327189-NameTh = "เตาย่างบาร์บีคิว"
57327189-DescriptionTh = "ชุดเตาบาร์บีคิวที่ย่างวัตถุดิบได้หลายชนิด เนื่องจากเป็นอุปกรณ์ที่ใช้ไฟ จึงต้องระวังในการใช้งาน"
1463557035-NameTh = "อุปกรณ์ช่วยชีวิตทางน้ำ"
1463557035-DescriptionTh = "อุปกรณ์ช่วยชีวิตในเหตุฉุกเฉิน มีการบำรุงรักษาอย่างสม่ำเสมอ เพื่อให้พร้อมใช้งานได้ทุกเมื่อ"
2175347168-NameTh = "ห่วงยางขนาดใหญ่"
2175347168-DescriptionTh = "ห่วงยางอันใหญ่ขนาดที่นอนข้างบนได้ ควรเลี่ยงการใช้ในสถานที่ที่มีคนหนาแน่น"
905489728-NameTh = "เก้าอี้ไลฟ์การ์ด"
905489728-DescriptionTh = "เก้าอี้ที่ทำให้มองเห็นได้ไกล มีร่มติดมาด้วยจึงไม่มีปัญหาเรื่องแสงแดด"
3115231087-NameTh = "เปลตาข่าย"
3115231087-DescriptionTh = "เปลจากวัสดุที่หาได้ง่ายในหมู่บ้านประมง อย่างตาข่ายและโครงเหล็ก ถึงภายนอกจะดูซอมซ่อ แต่ความสบายเทียบได้กับเตียงคุณภาพสูง"
4008049746-NameTh = "เป้ายิงอัตโนมัติ สำหรับผู้เชี่ยวชาญ"
4008049746-DescriptionTh = "เป้าอัตโนมัติสำหรับวัดทักษะการยิง ยิ่งอัตราการเข้าเป้าสูง รูปแบบจะยิ่งซับซ้อนมากขึ้น"
1603079414-NameTh = "แท่นซ่อมบำรุงจักรยาน อะบิดอส"
1603079414-DescriptionTh = "ชุดแท่นและเครื่องมือสำหรับซ่อมบำรุง และตรวจสภาพจักรยาน อุปกรณ์ของแต่ละคนอาจต่างกันเล็กน้อย แต่ทุกคนตั้งใจจะดูแลสิ่งล้ำค่านี้เหมือนกัน"
572734953-NameTh = "เก้าอี้เทศกาลริมหาด"
572734953-DescriptionTh = "เก้าอี้พับที่ใช้สำหรับงานเทศกาลริมหาด ควรนั่งในท่าที่ถูกต้องเพื่อสุขภาพที่ดี"
3606019028-NameTh = "โต๊ะแคมป์ไฟในร่ม"
3606019028-DescriptionTh = "โต๊ะที่ทำให้เพลิดเพลินกับการตั้งแคมป์ในร่ม มีของใช้ส่วนตัวสุดโรแมนติกวางไว้เต็มพื้นที่"
220830642-NameTh = "หุ่นไม้มวย"
220830642-DescriptionTh = "เสาไม้ที่มีกิ่งก้านสำหรับฝึกศิลปะการต่อสู้ ถ้าไม่ระวังลำดับการดีดของไม้ให้ดี อาจถูกตีกลับได้"
1975676702-NameTh = "โต๊ะสุนทรพจน์"
1975676702-DescriptionTh = "โต๊ะตัวเล็กมาพร้อมพัด และไมโครโฟนที่ใช้เล่าเรื่องตลก ด้วยดีไซน์ที่ดูหรูหรา จึงนิยมนำมาใช้ตกแต่งภายในด้วย"
162329831-NameTh = "บัลลังก์มังกรดำ"
162329831-DescriptionTh = "บัลลังก์ที่ประมุขใช้งานสืบทอดกัน ตามประเพณีของมังกรดำ รูปลักษณ์อาจดูสวยงาม แต่ยังมีส่วนที่นั่งไม่สบายนัก"
515353759-NameTh = "เวทีการแสดงสด"
515353759-DescriptionTh = "เวทีพิเศษที่สร้างขึ้นสำหรับยูนิตไอดอล ของทรีนิตี้ <แอนทีก เซราฟิม>\nพื้นที่อันมีค่าที่จะได้เห็นภาพของทั้ง 3 คน ที่พบเห็นไม่ได้ในชีวิตประจำวัน"
2823428745-NameTh = "โต๊ะแพนเดโมเนียม "
2823428745-DescriptionTh = "โต๊ะทำงานส่วนตัวของซัตสึกิ เจ้าหน้าที่ระดับสูงของแพนเดโมเนียม โซไซตี้ โปรเจกต์อัลตร้า NK อันยิ่งใหญ่เริ่มขึ้นจากที่นี่นั่นเอง"
951778631-NameTh = "กระดานข่าวแพนเดโมเนียม โซไซตี้"
951778631-DescriptionTh = "กระดานที่ใช้แจ้งข่าวกิจกรรมของแพนเดโมเนียม โซไซตี้ โดยมีเลขานุการจิอากิเป็นผู้ดูแล"
1761559320-NameTh = "โซฟาบีนแบ็กสีขาว"
1761559320-DescriptionTh = "โซฟาบีนแบ็กที่ดูนุ่มฟูจากวัสดุผ้าฝ้ายสีขาว\nด้วยสัมผัสนุ่มนวลที่โอบกอดทั้งตัว ทำให้เมื่อนอนแล้วก็ยากที่จะถอนตัว"
1831334057-NameTh = "โซฟาบีนแบ็กสีฟ้า"
1831334057-DescriptionTh = "โซฟาบีนแบ็กที่ดูนุ่มฟูจากวัสดุผ้าฝ้ายสีฟ้า\nด้วยสัมผัสนุ่มนวลที่โอบกอดทั้งตัว ทำให้เมื่อนอนแล้วก็ยากที่จะถอนตัว"
4286106492-NameTh = "บอร์ดแคมป์แบบทหาร"
4286106492-DescriptionTh = "บอร์ดยักษ์ที่ติดตั้งไว้สำหรับผลงานศิลปะ ตอนนี้มีกราฟิตี้ที่เต็มไปด้วยความรู้สึกวาดไว้อยู่ "
3819813867-NameTh = "หุ่นรบล้ำยุครุ่นแรก"
3819813867-DescriptionTh = "โมเดลที่เต็มไปด้วยปรัชญาเฉพาะของริโอะ เป็นโมเดลรุ่นแรกที่ริโอะสร้างขึ้น เพื่อทำผลงานชิ้นเอกของตัวเอง "
2386173176-NameTh = "โต๊ะชุดอาหารปีใหม่"
2386173176-DescriptionTh = "โต๊ะพิเศษที่เต็มไปด้วยอาหารปีใหม่ ใช้สำหรับต้อนรับปีใหม่ อัดแน่นไปด้วยความใส่ใจของใครบางคน"
1212778271-NameTh = "โต๊ะจิบชาแพนเค้ก"
1212778271-DescriptionTh = "โต๊ะจิบชายามบ่ายของจูริ ถึงจะเป็นชุดน้ำชายามบ่ายชั้นยอด แต่บางครั้งก็มีสิ่งที่ไม่คาดฝันเกิดขึ้น..."
2483597825-NameTh = "โต๊ะสีขาว พร้อมกล่องยา"
2483597825-DescriptionTh = "โต๊ะของเซนะที่ใช้งานได้สะดวกในทุกที่ ทุกเวลา แม้กระทั่งบนชายหาด ระวังอย่าให้ตกอยู่ในเหตุฉุกเฉินอยู่เสมอ"
1389480680-NameTh = "เครื่องยิงลูกเบสบอส จากมิลเลเนียม"
1389480680-DescriptionTh = "เครื่องยิงลูกเบสบอลจากมิลเลเนียมที่ยิงลูกตรง และลูกโค้งมากกว่า 8 แบบได้อย่างสมบูรณ์แบบ แม้ว่าประสิทธิภาพของเครื่อง และทักษะของชมรมเบสบอลมิลเลเนียมดูจะไม่สัมพันธ์กัน..."
2327874813-NameTh = "เครื่องช่วยดึงข้อ"
2327874813-DescriptionTh = "อุปกรณ์ออกกำลังกาย ใช้ฝึกร่างกายที่มีตัวช่วยโหนบาร์เดี่ยว แน่นอนว่าการไม่ใช้ตัวช่วย ก็ถือเป็นอีกหนึ่งวิธีที่จะใช้มัน"
82703931-NameTh = "กระจกพร้อมม่านสีขาว"
82703931-DescriptionTh = "กระจกขนาดใหญ่ที่ส่องได้ทั้งตัว ปกติจะคลุมผ้าม่านไว้เพื่อป้องกันฝุ่นเกาะ"
3344352954-NameTh = "สระน้ำเทียมสำหรับพายเรือ"
3344352954-DescriptionTh = "สระน้ำเทียมในร่มที่ล่องเรือลำเล็ก และเพลิดเพลินกับการชมผิวน้ำที่สงบนิ่ง ช่วยให้จิตใจสงบได้อย่างเป็นธรรมชาติ"
582370447-NameTh = "ทีวีพร้อมเครื่องเล่นวิดีโอ"
582370447-DescriptionTh = "ทีวีย้อนยุคที่เหมาะกับการชมหนังเก่า แม้ว่าจะใช้ชมการถ่ายทอดสดไม่ได้ แต่ก็ใช้ชมวิดีโอเทปได้"
4119717887-NameTh = "โต๊ะนั่งพื้น ห้องชมรมหยินหยาง"
4119717887-DescriptionTh = "โต๊ะทำงานที่มีแต่งานกองพะเนิน กับเอกสารที่ถูกปล่อยไว้จนฝุ่นจับ สุดท้ายแล้วก็จะมีใครบางคนถอนหายใจ แล้วก็ต้องมาจัดการ..."
103026725-NameTh = "กลองบอกจังหวะ"
103026725-DescriptionTh = "รอยนับไม่ถ้วนที่ทิ้งไว้บนหน้ากลองบ่งบอกถึง การฝึกอย่างพากเพียรของใครบางคน"
2989224265-NameTh = "ที่ตั้งปืนฉีดน้ำ สีสันซัมเมอร์"
2989224265-DescriptionTh = "ที่ตั้งปืนฉีดน้ำที่ให้ความรู้สึกแบบฤดูร้อน มาทำให้คู่ต่อสู้ชุ่มฉ่ำด้วยปืนฉีดน้ำกันเถอะ"
2026387541-NameTh = "สระเป่าลมเล่นน้ำ"
2026387541-DescriptionTh = "สระน้ำเป่าลมที่สนุกกับฤดูร้อนได้ โดยไม่ต้องไปชายหาด มีป้ายที่เขียนว่า 'สำหรับเด็ก' ติดอยู่"
987535338-NameTh = "รถเปิดประทุนของเซอา"
987535338-DescriptionTh = "รถเปิดประทุนที่เซอาครอบครอง ดูเผินๆ อาจไม่ใช่รถยนต์ที่ใครๆ ก็ขับได้"
180297253-NameTh = "เก้าอี้แขวน"
180297253-DescriptionTh = "เก้าอี้แขวนตัวโปรดของนางิสะ พอกวัดแกว่งอย่างเป็นธรรมชาติ จะช่วยให้ความรู้สึกสบายที่เป็นเอกลักษณ์"
2017199336-NameTh = "ชิงช้าชายหาด"
2017199336-DescriptionTh = "ชิงช้าที่ติดตั้งไว้ริมชายหาด เมื่อต้องการผ่อนคลายจิตใจ การนั่งชิงช้าอาจเป็นทางเลือกที่ดี?"
1666961861-NameTh = "เซ็ตเกมปิดตาตีแตงโม"
1666961861-DescriptionTh = "อาจดูเหมือนแตงโมธรรมดา แต่ที่จริงก็อย่างนั้นละ อาจดูเหมือนเกมง่ายๆ แต่ที่จริงก็อย่างนั้นละ"
3298242563-NameTh = "เตียงชายหาดสุดหรู"
3298242563-DescriptionTh = "เตียงสุดหรูหราที่ติดตั้งไว้ริมชายหาด ทั้งนุ่มฟูและหรูหรา"
272875268-NameTh = "ชั้นวางอัลบั้ม ทรีนิตี้"
272875268-DescriptionTh = "ชั้นวางหนังสือสำหรับเก็บอัลบั้มต่างๆ แต่ละชั้นมีทั้งอัลบั้ม และความทรงจำที่ชายหาดวางอยู่เต็ม"
2325711709-NameTh = "หม้อต้มที่น่าสงสัย"
2325711709-DescriptionTh = "หม้อต้มที่มีของเหลวน่าสงสัยเดือดปุดๆ อยู่ ถ้าได้ลองกินอาจจะอร่อยก็ได้มั้ง?"
2818960363-NameTh = "พัดลมหมุนเวียนอากาศ - พรมวิเศษ"
2818960363-DescriptionTh = "เซ็ตพัดลมหมุนเวียนอากาศ กับพรมวิเศษ สัมผัสได้ถึงเวทมนตร์แม้จะยืนนิ่งๆ"
3334773599-NameTh = "โต๊ะเครื่องพิมพ์ดีด"
3334773599-DescriptionTh = "โต๊ะทำงานที่ออกแบบมาให้ใช้เครื่องพิมพ์ดีดได้สะดวก แม้ยากที่จะใช้เพื่อวัตถุประสงค์อื่น แต่ดูจะเป็นความคิดที่ดี"
578477992-NameTh = "เตียงอาบแดดชายหาด พร้อมโต๊ะเล็ก"
578477992-DescriptionTh = "เตียงอาบแดดกับเครื่องดื่มบนชายหาด มีมนต์ขลังที่ทำให้ใครๆ ก็ผ่อนคลายได้"
3798522794-NameTh = "ผลงานยุคแรกของศิลปิน"
3798522794-DescriptionTh = "ผลงานยุคแรกของศิลปินสื่อผสมคนหนึ่ง ถึงตัวศิลปินจะรู้สึกอับอาย แต่ความหลงใหลที่ใส่ลงไปนั้นประเมินค่าไม่ได้"
935541676-NameTh = "โต๊ะทำงานแกะสลัก"
935541676-DescriptionTh = "โต๊ะทำงานสำหรับงานหินแกะสลัก แม้ภายนอกจะดูหยาบ แต่เหมาะอย่างยิ่งสำหรับการสร้างสรรค์งานศิลปะอันประณีต"
3167056314-NameTh = "เครื่องเล่นเพลง"
3167056314-DescriptionTh = "เดิมทีเครื่องนี้จะเล่นเพลงเมื่อหยอดเหรียญ พูดอีกอย่างคือตู้จำหน่ายเพลงอัตโนมัติ... แต่ตอนนี้เหมือนจะถูกใช้เป็นลำโพงขนาดใหญ่ เพื่อสำหรับสร้างบรรยากาศ"
3421618515-NameTh = "กล่องอานาบาดา"
3421618515-DescriptionTh = "กล่องสำหรับให้นักเรียนที่มาเยี่ยมชมชาเล่ต์ แบ่งปันสิ่งของที่ไม่ต้องการแต่ยังใช้ได้ โปรดใช้ด้วยใจขอบคุณและไม่โลภมาก"
1467761258-NameTh = "ชุดทำความสะอาดหมวกกันน็อก"
1467761258-DescriptionTh = "หมวกกันน็อกที่สะอาดคือความภาคภูมิใจของสุภาพสตรี มีเครื่องมือที่จำเป็นสำหรับการดูแลรักษาหมวกกันน็อก"
2118635362-NameTh = "เคาน์เตอร์ขายสินค้า"
2118635362-DescriptionTh = "เคาน์เตอร์สำหรับจำหน่ายหรือแลกเปลี่ยน 'หนังสือ' หลากหลายประเภท... แม้จะดูเหมือนโต๊ะธรรมดาทั่วไป แต่ความจริงแล้วอาจไม่ได้เป็นอย่างนั้น หากพบพนักงานขายที่แต่งตัวด้วยชุดคอสเพลย์ โปรดปฏิบัติต่อกันด้วยความสุภาพ"
2534689747-NameTh = "โต๊ะราเม็ง"
2534689747-DescriptionTh = "โต๊ะไม้ที่มีกลิ่นอายของน้ำซุปราเม็งอยู่จางๆ ที่โต๊ะมีเครื่องปรุงอย่างพริกไทยและกระเทียมบด เตรียมไว้ให้สำหรับเลือกปรุงรสชาติได้ตามใจชอบ"
872812875-NameTh = "ห้องเปลี่ยนชุดชั่วคราว"
872812875-DescriptionTh = "ห้องเปลี่ยนเสื้อผ้าชั่วคราวที่ตั้งขึ้นด้านหลังเวทีในฮอลล์ แฟชั่นโชว์ สถานที่ที่ลับสุดยอด และเต็มไปด้วยความหรูหรา"
2196376303-NameTh = "สถานีซ่อมบำรุง"
2196376303-DescriptionTh = "สถานีอเนกประสงค์ที่ใช้รับมือได้ทุกสถานการณ์ ทั้งการซ่อมแซมยาน ซ่อมบำรุงอาวุธ และเติมกระสุน"
3626758680-NameTh = "พื้นที่ชมรมพัฒนาเกม"
3626758680-DescriptionTh = "พื้นที่ที่ชมรมพัฒนาเกมสร้างขึ้นให้เป็นพื้นที่ของตัวเอง\nได้ในที่สุด ทุกคนสามารถมารวมตัวและเล่นด้วยกันได้"
2736494103-NameTh = "ครัวขนาดเล็ก"
2736494103-DescriptionTh = "สามารถปรุงอาหารง่ายๆ หรือชงชาได้"
1601800461-NameTh = "เครื่องความทรงจำในอดีต"
1601800461-DescriptionTh = "ความทรงจำของใครบางคน (?) บรรจุไว้ในสิ่งประดิษฐ์นี้ (?)..."
3653637069-NameTh = "หน้าต่างเปิดปิด"
3653637069-DescriptionTh = "หน้าต่างในยานขนส่ง มีกระจกบานใหญ่ มองเห็นท้องฟ้ายามค่ำคืนจากภายในได้"
3157185061-NameTh = "ตุ๊กตาฤดูใบไม้ผลิ"
3157185061-DescriptionTh = "ตุ๊กตายักษ์ที่ใช้ในเทศกาลฤดูใบไม้ผลิของเรดวินเทอร์\nเป็นสัญลักษณ์ของการเฉลิมฉลองฤดูใบไม้ผลิที่\nกำลังจะมา แม้ว่าหิมะจะยังอยู่แต่ทุกสิ่งกำลังเริ่มตื่นขึ้น"
4209113555-NameTh = "ชีวิตประจำวัน ของชมรมพัฒนาเกม"
4209113555-DescriptionTh = "ของตกแต่งที่แสดงถึงชีวิตประจำวันของชมรมพัฒนาเกม\nชีวิตประจำวันของคนหนึ่งอาจน่าตื่นตาตื่นใจ และพิเศษสุดสำหรับอีกคนหนึ่ง"
3750481687-NameTh = "โต๊ะทานอาหารและประชุม"
3750481687-DescriptionTh = "โต๊ะที่ใช้งานได้หลายวัตถุประสงค์ ทั้งโต๊ะสำหรับทานอาหาร หรือประชุม"
25273343-NameTh = "พื้นที่เล่นในเวลากลางคืน"
25273343-DescriptionTh = "พรมที่มีของเล่นและของกินวางอยู่เกลื่อนกลาด แม้ในค่ำคืนที่ยาวนาน ที่สูงแบบนี้ก็เป็นสวนสนุกได้"
2961287885-NameTh = "ตู้เกมอาร์เคดสีแดง"
2961287885-DescriptionTh = "ตู้เกมอาร์เคดแบบดั้งเดิม เพียงเห็นข้อความ 'FIGHT' ไฟอยากเอาชนะของคุณจะลุกโชน"
1693374788-NameTh = "ตู้เกมอาร์เคดสีม่วง"
1693374788-DescriptionTh = "ตู้เกมอาร์เคดแบบดั้งเดิม\nมาช่วยแมวน้อยหลบดาวเคราะห์น้อย\nกันเถอะเหมียว! เหมียว!"
755788283-NameTh = "ตู้เกมอาร์เคดสีน้ำเงิน"
755788283-DescriptionTh = "ตู้เกมอาร์เคดแบบดั้งเดิม ปลดปล่อยพลังความโกรธ! วิ่งหาเหรียญไปกับแองกี้อาเดลีกันเลย!"
3649240306-NameTh = "ป้ายนีออนอาร์เคด"
3649240306-DescriptionTh = "ป้ายนีออนลายอาร์เคด ตกแต่งผนังให้ดูดีได้ด้วยนีออนสุดเท่นี้"
2738585975-NameTh = "ป้ายนีออนเจลลี่"
2738585975-DescriptionTh = "ป้ายเจลลี่ที่ให้คุณได้เพลิดเพลิน\nกับความน่ารักของเจลลี่ "
2356428364-NameTh = "พรมลายตารางหลากสี"
2356428364-DescriptionTh = "พรมลายตารางหลากสีสัน\nพรมทำมือจากช่างฝีมือที่แสดงความคิด\nสร้างสรรค์อันงดงาม"
3862637757-NameTh = "พรมสี่เหลี่ยม ลายหรูหรา"
3862637757-DescriptionTh = "พรมที่มีลวดลายสวยประณีต มันอาจมีคุณค่าสำคัญทางประวัติศาสตร์...?"
958075206-NameTh = "พรมสี่เหลี่ยม ลายเรขาคณิต"
958075206-DescriptionTh = "พรมที่มีลวดลายเรขาคณิตแบบสมมาตรซ้ำๆ กัน ให้ความรู้สึกคลาสสิกและเก่าแก่"
1954169509-NameTh = "พรมลายหินอ่อน สตาตูอาริโอ"
1954169509-DescriptionTh = "พรมที่มีลวดลายหินอ่อนดูคลาสสิกหรูหรา มันประณีตมากจนแทบแยกจากของจริงไม่ออก"
1260208394-NameTh = "กระถางกุหลาบขาว แบบหลายเหลี่ยม"
1260208394-DescriptionTh = "กระถางกุหลาบที่ได้รับการดูแลอย่างดี แม้ว่าจะดูแลยาก แต่ยังบานสดใสในสภาน้ำชาอยู่เสมอ"
1350455159-NameTh = "กระถางกุหลาบขาว แบบสี่เหลี่ยมผืนผ้า"
1350455159-DescriptionTh = "กระถางที่มีดอกกุหลาบสีขาวบานสะพรั่ง ในภาษาดอกไม้คือความบริสุทธิ์ไร้เดียงสา"
2467071271-NameTh = "โต๊ะสี่เหลี่ยม พร้อมผ้าปูโต๊ะสีขาว"
2467071271-DescriptionTh = "โต๊ะที่ปูด้วยผ้าปูสะอาดสะอ้าน ไม่ว่าจะมีอะไรหกใส่ก็ปลอดภัย แต่ในทางกลับกันก็จะสังเกตเห็นได้ทันที ดังนั้นต้องระวัง"
1829879645-NameTh = "โต๊ะน้ำชาชุดเล็ก"
1829879645-DescriptionTh = "โต๊ะน้ำชาเรียบๆ ขนาดเล็กสำหรับหนึ่งคน มาลองใช้เวลาผ่อนคลายคนเดียวบ้างก็ดีนะ"
3761215951-NameTh = "รถเข็นดื่มชายามบ่าย"
3761215951-DescriptionTh = "รถเข็นชาพร้อมอุปกรณ์ชงชาและของว่าง รื่มรมย์กับเวลาจิบชายามบ่ายที่ผ่อนคลายได้ทุกเมื่อ"
2783808256-NameTh = "โคมไฟตั้งพื้น"
2783808256-DescriptionTh = "โคมไฟแบบโบราณที่มอบแสงอบอุ่น ช่วยลดอาการตาล้า เหมาะกับการอ่านหนังสือ"
1681173970-NameTh = "โพเดียมเลขานุการ"
1681173970-DescriptionTh = "โต๊ะยืนทำงานที่มีแผ่นรองเขียน ส่วนใหญ่ใช้ในที่สาธารณะมากกว่าที่ส่วนตัว"
344479674-NameTh = "รถเข็นหนังสือโบราณ"
344479674-DescriptionTh = "รถเข็นสำหรับส่งหนังสือ บรรณารักษ์ใช้เข็นไปทั่วทรีนิตี้ ที่ที่ยังชื่นชอบหนังสือเป็นเล่มๆ มากกว่าอีบุ๊ก"
766960606-NameTh = "นาฬิกาติดผนัง ลายดอกลิลลี่"
766960606-DescriptionTh = "นาฬิกาติดผนังรูปเฟลอร์-เดอ-ลิสหรือลิลลี่ ต้องคอยไขลานเป็นระยะๆ"
1994333090-NameTh = "รั้วไม้สไตล์ทรีนิตี้"
1994333090-DescriptionTh = "รั้วไม้ที่ดูเรียบร้อยและสง่างาม สุนทรียศาสตร์จากประติมากรรม ที่สมบูรณ์แบบนี้มีความงดงามเกินคาด"
1889524945-NameTh = "กรอบรูปแขวนผนังใหญ่ สภาน้ำชา"
1889524945-DescriptionTh = "กรอบรูปวาดแบบอิมเพรสชันนิสม์ ถือเป็นงานศิลปะที่ยากจะคาดเดา ในเจตนาของศิลปิน"
746719294-NameTh = "กรอบรูปแขวนผนังเล็ก สภาน้ำชา"
746719294-DescriptionTh = "กรอบรูปแขวนผนังพร้อมงานศิลปะที่สวยงาม แนวคิดที่เด็ดเดี่ยว และฝีแปรงที่เฉียบคมก็โดดเด่นไม่แพ้กัน"
2670847271-NameTh = "รูปปั้นเซอร์เรียลลิสม์"
2670847271-DescriptionTh = "วัตถุที่ก้าวข้ามแนวคิดทั่วไป ความคิดสร้างสรรค์ข้ามกรอบนี้ จะตั้งคำถามต่อศิลปะร่วมสมัย"
1363506225-NameTh = "โคมไฟดอกไม้ทองเหลือง"
1363506225-DescriptionTh = "โคมไฟลายดอกไม้แบบโบราณ ที่ทรินิตี้ แม้แต่โคมไฟธรรมดาๆ ก็ไม่ได้ผลิตมาแบบส่งๆ"
2071964902-NameTh = "โซฟาหลายที่นั่ง ทรีนิตี้"
2071964902-DescriptionTh = "โซฟาหลายที่นั่งที่ผลิตจากผ้าคุณภาพสูง เพราะเน้นการออกแบบที่สมบูรณ์แบบเป็นหลัก จึงนั่งไม่สบายเล็กน้อย"
408630369-NameTh = "ชุดโต๊ะน้ำชาต้อนรับแขก"
408630369-DescriptionTh = "ชุดโต๊ะที่เรียบง่ายแต่หรูหรา กลิ่นหอมของชาแดง จะช่วยทำให้การสนทนานั้นสนุกยิ่งขึ้น"
1519664668-NameTh = "ชุดโต๊ะหมากรุก"
1519664668-DescriptionTh = "ชุดโต๊ะพร้อมกระดานหมากรุก แค่นั่งเฉยๆ ก็ทำให้ดูฉลาดได้"
949584604-NameTh = "ชุดโต๊ะหมากรุกคว่ำ"
949584604-DescriptionTh = "โต๊ะที่ล้มคว่ำ กระดานหมากรุก และตัวหมากกระจายอยู่บนพื้น ต้องมีคนเก็บตัวหมากรุกที่หล่นขึ้นมา"
3520494384-NameTh = "ชุดโต๊ะจัดเลี้ยงพร้อมเค้กก้อน"
3520494384-DescriptionTh = "ชุดโต๊ะที่มีเค้กทั้งก้อนสวยงามวางไว้ นี่คือสถานที่สำหรับวันพิเศษ หรือวันที่ต้องการให้พิเศษ"
650862141-NameTh = "โต๊ะน้ำชายามบ่าย ประกายทอง"
650862141-DescriptionTh = "โต๊ะน้ำชาพร้อมชาแดงและของว่างหลากชนิด มาพักจิบชาและพูดคุยออกรสกันสักครู่ดีกว่า"
2194319883-NameTh = "โต๊ะน้ำชายามเย็น"
2194319883-DescriptionTh = "โต๊ะน้ำชาที่เต็มไปด้วยขนมหวานมากมาย ไม่มีอะไรจะดีไปกว่าการจิบชาแดง กับของหวานปิดท้ายวันที่เหนื่อยล้า"
2290878817-NameTh = "โต๊ะน้ำชายามเช้าเรียบง่าย"
2290878817-DescriptionTh = "โต๊ะน้ำชาพร้อมแซนวิชและของว่างรองท้อง ไม่ว่าตอนเช้าจะยุ่งแค่ไหนก็ไม่ควรพลาดชาสักถ้วย"
3645596728-NameTh = "เครื่องเล่นแผ่นเสียง"
3645596728-DescriptionTh = "เครื่องเล่นที่มอบชีวิตชีวาให้แผ่นเสียงไวนิล ให้ความรู้สึกที่เครื่องเสียงสมัยใหม่ถ่ายทอดไม่ได้"
1321590477-NameTh = "กำแพงสไตล์ทรีนิตี้"
1321590477-DescriptionTh = "กำแพงประณีตที่ได้รับแรงบันดาลใจ มาจากสถาปัตยกรรมโบราณ มีทรงโค้งที่ให้ความรู้สึกมั่นคง"
3967034572-NameTh = "ซุ้มประตูโค้งสไตล์ทรีนิตี้"
3967034572-DescriptionTh = "ประตูประณีตที่ได้รับแรงบันดาลใจ มาจากสถาปัตยกรรมโบราณ รู้สึกถึงความโอ่อ่าในทุกครั้งที่เข้าออก"
151202876-NameTh = "เสาโค้งสไตล์ทรีนิตี้"
151202876-DescriptionTh = "เสาที่มีอยู่ทั่วทั้งทรีนิตี้ ตกแต่งด้วยสีทองบนพื้นสีขาว ทำให้ดูเรียบร้อยและสง่างาม"
3368418938-NameTh = "ชั้นวางของบานกระจก ไม้มะฮอกกานี"
3368418938-DescriptionTh = "ชั้นวางของหรูหราที่ให้ความรู้สึกเก่าแก่ ถูกลงล็อกด้วยกุญแจเพื่อไม่ให้ใครเปิดได้"
1297438922-NameTh = "ชั้นหนังสือสามชั้น ไม้มะฮอกกานี"
1297438922-DescriptionTh = "ชั้นหรูหราที่สร้างโดยช่างฝีมือ ตัวชั้นหนังสือเองก็มีค่า แต่เนื้อหาในหนังสือแต่ละเล่มนั้นมีค่ายิ่งกว่า"
1775678266-NameTh = "ชั้นวางของโชว์ สภาน้ำชา"
1775678266-DescriptionTh = "มีน้ำตาล นม แยม และครีมมากมาย เหมาะไว้ทานคู่กับชาอยู่เสมอ"
2663523493-NameTh = "กำแพงห้องรับแขก สภาน้ำชา"
2663523493-DescriptionTh = "วอลเปเปอร์ลายโบราณ ตกแต่งด้วยเส้นสีทอง รู้สึกได้ถึงความสง่างามและอำนาจ"
2590292756-NameTh = "กระเบื้องลายแวร์ซายส์"
2590292756-DescriptionTh = "กระเบื้องที่มีลวดลายซับซ้อน แต่ละส่วนในขนาดต่างกัน สอดประสานเป็นลวดลายเรขาคณิตอันสวยงาม"
522474381-NameTh = "พื้นหลังสภาน้ำชาทรีนิตี้"
522474381-DescriptionTh = "พื้นหลังที่ผสมผสานสีสันต่างๆ ได้อย่างลงตัว สีสันจากความสมดุลที่น่าอัศจรรย์นี้ช่างงดงาม"
1741842915-NameTh = "บูธเจรจาสภาน้ำชา"
1741842915-DescriptionTh = "บูธกึ่งส่วนตัว 2 ที่นั่ง พร้อมม่านหนาที่ดูดซับเสียงได้เกือบหมด เหมาะกับการสนทนาลับ"
213262815-NameTh = "เตาผิงบานพับ สไตล์ทรีนิตี้"
213262815-DescriptionTh = "เตาผิงที่สามารถพับเตาเก็บได้ แม้ว่าจะใช้งานจริงไม่ได้ แต่หลายคนก็ชื่นชมในดีไซน์ที่สวยงาม และความละเอียดอ่อนของมัน"
2182437926-NameTh = "น้ำพุประดับ สภาน้ำชา"
2182437926-DescriptionTh = "น้ำพุหินที่ตกแต่งด้วยต้นไม้นานาชนิด ในบางช่วงเวลาอาจได้เห็น นกติ๊ดหางยาวบินลงมากินน้ำ"
228833108-NameTh = "โถงทางเดินคริสตัลทรีนิตี้"
228833108-DescriptionTh = "โถงทางเดินแสนสวยที่ตกแต่งด้วยกระจก แค่เดินผ่านก็ชวนตื่นตาตื่นใจ"
2386486699-NameTh = "ตู้โชว์ใบชา สภาน้ำชา"
2386486699-DescriptionTh = "ชั้นวางแสดงชาชื่อดังจากทั้งคิโวทอส ต้องเก็บใบชาไว้ในภาชนะปิดสนิท เพื่อไม่ให้เสียหาย"
1659229955-NameTh = "ชั้นลอยสภาน้ำชา"
1659229955-DescriptionTh = "ชั้นลอยที่เหมาะกับการชมทัศนียภาพในอาคาร การขัดกันอย่างลงตัวของการตกแต่งภายในที่หรูหรา กับงานศิลปะล้ำสมัยนั้นชวนประทับใจ"
3450502975-NameTh = "หน้าต่างสูงสไตล์ทรีนิตี้"
3450502975-DescriptionTh = "หน้าต่างที่เน้นสวยแต่ไม่เน้นใช้งาน ด้วยโครงสร้างที่กักเก็บฝุ่นได้ง่าย ต้องหมั่นทำความสะอาดทุกวัน"
649074038-NameTh = "แกลเลอรีขนาดใหญ่ สภาน้ำชา"
649074038-DescriptionTh = "แกลเลอรีที่แสดงวิวทิวทัศน์ของทรีนิตี้ การได้ชื่นชมทัศนียภาพนี้ ถือว่าเป็นสิทธิพิเศษอย่างหนึ่ง"
2836643506-NameTh = "แกลเลอรี่ขนาดเล็ก สภาน้ำชา"
2836643506-DescriptionTh = "แกลเลอรีที่แสดงทัศนียภาพของทรินิตี้ ทัศนียภาพเปิดโล่งนี้ชวนให้ใจสงบ"
2271310627-NameTh = "พื้นกระเบื้องตาราง"
2271310627-DescriptionTh = "พื้นกระเบื้องตารางสีผสม\nช่วยเติมเต็มพื้นที่ทั้งหมดได้อย่างลงตัว"
3412859118-NameTh = "โต๊ะเทปคาสเซท"
3412859118-DescriptionTh = "โต๊ะรูปตลับเทปคาสเซท สร้างความโรแมนติก แบบวันวานได้อีกครั้ง"
1513726045-NameTh = "ตู้ขายสินค้าหลากสี"
1513726045-DescriptionTh = "ตู้ที่ขายขนมทานเล่นสารพัดแบบ\nคุณจะเผลอหยอดเหรียญลงไปก่อนรู้ตัวซะอีก"
2821092055-NameTh = "มัลติทีวีสีผสม"
2821092055-DescriptionTh = "มัลติทีวีสไตล์ย้อนยุค\nให้คุณได้เพลิดเพลินทั้งกับการดูทีวี และการเล่นเกม"
1785208903-NameTh = "ที่คีบตุ๊กตาเจลลี่"
1785208903-DescriptionTh = "คีบสำเร็จจะได้รับตุ๊กตาเจลลี่ มีชื่อเสียงที่ไม่ดีว่ามันยากเกินจริง"
2421885010-NameTh = "ชั้นวรรณกรรม"
2421885010-DescriptionTh = "ชั้นวางหนังสือที่เต็มไปด้วยวรรณกรรม มีหนังสือหลายเล่มที่ต้องใช้ความกล้าในการหยิบออกมา"
3112497970-NameTh = "ชั้นทฤษฎีศิลปะ"
3112497970-DescriptionTh = "ชั้นวางหนังสือที่เต็มไปด้วยทฤษฎีศิลปะ แต่สีหน้าของนักเรียนที่มาเก็บนี่ดูไม่สดใสเลย"
301797795-NameTh = "พรมลายแอบสแตรกต์"
301797795-DescriptionTh = "พรมที่มีลวดลายแอบสแตรกต์ รูปแบบและความซับซ้อนของลวดลาย ผ่านการปรับแต่งให้สมดุลอย่างลงตัว"
3001079672-NameTh = "พรมลายไม้"
3001079672-DescriptionTh = "พรมที่มองจากระยะไกลแล้วดูเหมือนทำจากไม้ แต่ให้สัมผัสที่นุ่มนวลมาก"
1888234954-NameTh = "พรมลายโมเสก"
1888234954-DescriptionTh = "พรมที่มีลวดลายโบราณโดดเด่น เป็นการตีความใหม่ๆ ของลวดลายกระเบื้องโมเสกโบราณ"
837929111-NameTh = "รถเข็นผ้าใบ"
837929111-DescriptionTh = "รถเข็นที่ใช้ขนย้ายอุปกรณ์ศิลปะรวมถึงผ้าใบ พอลับสายตาของฝ่ายดูแลหอพัก มักจะมีนักเรียนแอบขึ้นไปนั่ง"
1277060067-NameTh = "เก้าอี้บุกำมะหยี่"
1277060067-DescriptionTh = "เก้าอี้ไม้เบาะกำมะหยี่ แค่นั่งลงก็ทำให้รู้สึกเหมือนมีอำนาจแล้ว"
3983877079-NameTh = "แท่นจัดแสดงผลงาน"
3983877079-DescriptionTh = "แท่นแสดงผลงานจากปีที่แล้วที่ได้รับรางวัลใหญ่ๆ จากนิทรรศการศิลปะ ได้รับคำชมเชยและโอกาสมากมาย"
1713694610-NameTh = "แท่นจัดแสดง ชิ้นงานแอบสแตรกต์"
1713694610-DescriptionTh = "ประติมากรรมของศิลปินนิรนาม ด้วยการยอมรับด้านศิลปะ จึงครองตำแหน่งนี้มาได้ยาวนาน"
2472213385-NameTh = "แท่นจัดแสดง หนังสือโบราณลึกลับ"
2472213385-DescriptionTh = "แท่นจัดแสดงหนังสือโบราณ ช่วยสร้างบรรยากาศที่แปลกประหลาด ยังไม่เคยถูกให้ใครยืมมาก่อน"
1815109606-NameTh = "แท่นจัดแสดง หนังสือต้องห้าม"
1815109606-DescriptionTh = "แท่นจัดแสดงที่มีหนังสือต้องห้ามวางอยู่ การห้ามจัดแสดงต่อสาธารณะถือเป็นการเสียดสี และศิลปะอย่างหนึ่ง"
2101259221-NameTh = "รั้วไม้ไวลด์ฮันต์"
2101259221-DescriptionTh = "รั้วไม้เก่าแก่ของไวลด์ฮันต์ สัมผัสได้ถึงร่องรอยแห่งกาลเวลา"
2452935603-NameTh = "โคมไฟแบบมินิมอล"
2452935603-DescriptionTh = "โคมไฟที่มีดีไซน์เรียบง่าย ออกแบบมาเพื่อใช้งานเพียงอย่างเดียว"
