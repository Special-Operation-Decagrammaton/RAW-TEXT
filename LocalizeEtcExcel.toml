2781993275-DescriptionTw = "前衛君恢復時，依照恢復的數值比例對敵方造成傷害。"
4272345904-NameTw = "前衛君超負荷"
4272345904-DescriptionTw = "前衛君每隔一段時間將進入感電狀態。處於感電狀態時將週期性造成傷害且傷害可疊加。"
