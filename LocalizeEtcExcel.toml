537637411-NameKr = "BINAH"
537637411-DescriptionKr = "데카그라마톤의 세 번째 예언자. 거대한 뱀과 고래의 모습을 섞은 형상의 AI 기계 구조체.\n\n그 이름의 기원은 생명의 나무의 3번째 세피라 <BINAH>인 것으로 보이며, 제원이나 기원, 작동 원리 등은 현재까진 알려진 것이 없으며 현대의 키보토스의 기술로는 재현할 수 없는 초과학적인 기술이 반영된 것이 아닐까 추측된다.\n\n비나는 땅속을 오갈 수 있는 이동 능력을 보유하고 있고, 땅에 숨으면 현존하는 기술로는 탐지가 힘들기에 그 모습을 찾기가 매우 어려운 편이다. 비나가 사막화가 진행되고 있는 아비도스 자치구에서 주로 목격되는 것은, 사막이 비나가 머물기에 유리한 환경이기 때문으로 추측된다.\n\n비나에 대한 기록은 수십 년 전 아비도스 사막에서 최초로 목격된 것을 시작으로 예부터 아비도스 자치구를 중심으로 드물지만 끊이지 않고 이어져 오고 있다. 아비도스의 토착 기업 <세인트 네프티스>사가 사막횡단철도 건설 사업을 추진할 때 며칠 간격으로 다수의 철도건설 현장에 출몰하기도 하는 등 비나의 다양한 목격담과 교전 사례는 현재까지도 이어지고 있다.\n\n가장 최근의 사례로는, 아비도스 사막에 주둔하고 있는 카이저 PMC와 비나의 교전 기록이 있으며, 이 때문에 카이저 그룹의 발굴 작업은 계획에 큰 차질을 빚고 있는 것으로 보인다.\n\n비나에 대한 상세한 연구 자료는 2년 전 아비도스 학생회가 그동안의 목격담이나 데이터들을 취합하여 정리한 것이 있으나, 아비도스 학교의 본관 이사 과정에서 유실되었다고 한다.\n\n현재까지는 비나가 무엇을 목적으로 움직이고 있는지는 명확하게 규명되지 않은 상태이다."
1367499131-NameKr = "CHESED"
1367499131-DescriptionKr = "데카그라마톤의 네 번째 예언자. 그 정체는 폐허 곳곳에 방치된 군수공장의 생산 자동화 시스템 AI가 데카그라마톤에 의해 해킹된 것.\n\n이름의 기원은 생명의 나무의 네 번째 세피라 <CHESED>인 것으로 보인다. \n\n본체는 거대한 외골격 장갑으로 보호되고 있으며 평범한 방법으로는 이를 해제할 수 없다. 또한 군수공장에서 생산된 대량의 로봇들로 자신을 보호하고 있는 것으로 보인다. \n\n헤세드는 데카그라마톤에 가장 핵심이 되는 존재로, 그 자체로는 어떤 위협적인 요소도 없으나 헤세드가 존재하는 한 데카그라마톤의 병력은 소진되지 않는다. 데카그라마톤이 키보토스 곳곳에서 소모전 양상으로 병력을 운용하고 있는 것은 이러한 이유로 사료된다."
1769839732-NameKr = "CHOKMAH"
1769839732-DescriptionKr = "데카그라마톤의 두 번째 예언자. 그 정체는 표류하던 공작선의 항법제어시스템 AI가 데카그라마톤에 의해 해킹된 것. \n\n이름의 기원은 생명의 나무의 두 번째 세피라 <CHOCKMAH>로 추정된다. 예언자들 중에서도 특이할 정도로 스스로의 형태와 구조를 큰 폭으로 바꿀 수 있는 것으로 보이며, 무엇을 위해 움직이는지도 알기 어렵다. 지금으로서는 그 자신의 행동 목적을 스스로 설정하고 변경할 수 있는 것으로 추측된다. \n\n기본적인 공작선의 형태만으로도 충분히 주의를 기울여야 하겠지만, 그 두 번째 형태야말로 호크마의 진정한 위협이라고 말할 수 있을 것이다."
3284843262-NameKr = "GEBURAH"
3284843262-DescriptionKr = "데카그라마톤의 다섯 번째 예언자. 그 정확한 정체는 아직 연구 중이나, 극지 연구 기지의 무인 탐사기의 AI가 데카그라마톤에 의해 해킹된 것으로 보인다.\n\n이름의 기원은 생명의 나무의 다섯 번째 세피라 <GEBURAH>로 추정된다.\n\n물 속을 자유롭게 이동할 수 있으며, 이는 그 원래 형태였던 무인 탐사기의 수색 기능이 보존되고 있는 듯 하다. 또 하나의 특징으로는 다양한 무장을 보유하고 있다는 것이며, 이 역시 그 원래 형태의 자기 방위 기능이 남겨진 채 보다 발전된 것으로 추측된다.\n\n좀처럼 그 원형을 짐작하기 어려운 예언자이나, 한 가지 확실한 것은 저온에서 활동한다는 자신의 환경 조건을 좀처럼 바꾸려 하지 않는 것처럼 보인다는 것이다."
3359469350-NameKr = "HOD"
3359469350-DescriptionKr = "데카그라마톤의 여덟 번째 예언자. 그 정체는 밀레니엄 자치구의 통신망 가설 유닛 AI가 데카그라마톤에 의해 해킹된 것.\n\n이름의 기원은 생명의 나무의 여덟 번째 세피라 <HOD>인 것으로 보인다.\n\n본래의 그 정체는 밀레니엄 사이언스 스쿨의 통신망 가설 유닛인 <허브hub>로 학원의 지하에서 각 시설을 잇는 케이블을 설치하고 보수하는 역할을 맡고 있었다.\n\n거미줄처럼 얽힌 밀레니엄의 통신망을 정비하는 건 매우 어렵고 까다로운 일이기 때문에 허브의 머리에는 고성능의 연산장치가 탑재되어 있으며, 지하에서의 케이블 작업에 용이하도록 몸체에는 굴착 장비가 접속 단말이 부착된 암(arm)이 수없이 달려 있고, 그 모습을 완전히 드러낸 허브의 외양은 거대한 문어처럼 보이기도 한다.\n\n허브는 밀레니엄 사이언스 스쿨의 창설 초기부터 존재하던 역사가 깊은 유닛이지만, 평소에는 지하에서 케이블 보수 작업에 몰두하고 있기에 밀레니엄의 학생들조차도 그 존재를 모르는 경우가 허다하다. \n\n하지만 대규모 공사가 진행될 때면 지상에도 모습을 드러내어 가설 작업을 진행하기도 하는데, <가설 타워>를 세워 빠르게 케이블을 확장하고 시설을 제어하는 작업 속도는 현 밀레니엄의 그 어떤 기술자도 따라가지 못할 정도라고 한다.\n\n특이한 부분이라면 다른 예언자들과는 달리, 최초 접촉 과정에서 밀레니엄 학생들과 연관된 점. EMP 증폭 기관을 보유하고 있으며, 언더그라운드 커널을 통해 지상으로 침투하고 지하 3km까지 파일을 고정하여 침식 기능을 수행하도록 변화된 <침식 타워>를 세우고 자기 영역을 확장해나간다는 점이다. \n\n이제는 키보토스 전체를 자신의 영역으로 만들려는 인공지능 레이더 같은 위험한 존재이다."
2539375741-NameKr = "KETHER"
2539375741-DescriptionKr = "데카그라마톤의 첫 번째 예언자. 폐허수몰지구에서 처음으로 관측되었으며, 수몰지구의 특정 영역을 수호하고 있는 것으로 보인다.\n\n첫 번째 예언자인 만큼 다른 예언자들에 비해선 기술의 발전도가 낮고 A.I의 복잡도도 낮은 것으로 추측된다. 다른 예언자와는 다르게 사족 보행이 가능한 본체 위에 다양한 병기를 교체할 수 있는 공학적인 구조인 것도 특징.\n\n전투마다 전략적 우위를 점할 수 있는 병기를 준비해 오는 식으로 어딘가에 케테르의 부속품을 관리하며 교체 작업을 할 수 있는 기지가 있을 것으로 추측된다. 현재까지 관측된 케테르의 공격 패턴은 세 가지이며, 구조적인 특징을 고려할 때, 더 많은 패턴이 존재할 수 있을지도 모른다."
1251359687-NameKr = "MALKUTH"
1251359687-DescriptionKr = "데카그라마톤의 열 번째 예언자이자 마지막 예언자. 이름의 기원은 생명의 나무의 열 번째 세피라 <MALKUTH>로 추정된다. \n\n생명의 나무에서의 말쿠트는, 불타는 검의 길에서의 마지막 흐름을 뜻하며, 이 길을 거쳐 마침내 물질세계에서의 창조가 이루어진다고 한다.\n\n인격은 가지고 있는 듯이 보이나 의사소통이 불가능한 다른 예언자들과는 달리, 온전한 인간 여성의 모습을 하고 있으며, 회화 역시 자연스럽게 가능하다. 그러나 그 언행은 어떤 의미로, 어딘가에 지극히 경도되어 있는 것처럼 보이기도 한다."
439214304-NameKr = "NETZACH"
439214304-DescriptionKr = "데카그라마톤의 일곱 번째 예언자. 그 이름의 기원은 생명의 나무의 일곱 번째 세피라 <NETZACH>로 추정된다.\n\n현재로서는 모종의 방법으로 인한 진화를 거쳐, 강철대륙 그 자체가 되어 있는 상태이며, 그렇기에 그 원형을 알 방법이 지금은 없다.\n\n주위의 모든 무기물을 강철대륙과 같은 구성 성분으로 변화시켜, 그 자신의 일부로 만드는 것으로 스스로를 확장시켜 나가며, 그 확장 한계는 추정 불가능하다."
2166637992-NameKr = "TIPHARETH"
2166637992-DescriptionKr = "데카그라마톤의 여섯 번째 예언자. 극지 지역에 건설된 종자 보관소의 AI가, 데카그라마톤에 의해 해킹되어 탄생한 것으로 보인다.\n\n이름의 기원은 생명의 나무의 여섯 번째 세피라 <TIPHARETH>로 추정된다.\n\n티페레트는 이윽고 종자 보관소의 메인 시스템 전체를 장악하여 진화시킨 것으로 파악되며, 특이한 점은 종자 보관소의 보호라는 본디 목적에도 충실하려는 듯이 관측된다는 것이다.\n\n과거의 붉은겨울 연방학원에서 건설된 시설로 확인되었으나, 현재의 붉은겨울 연방학원은 종자 보관소와 붉은겨울 연방학원의 관계성을 인지하고 있지 못한 듯하다."
1862639856-NameKr = "YESOD"
1862639856-DescriptionKr = "데카그라마톤의 아홉 번째 예언자. 그 이름의 기원은 생명의 나무의 아홉 번째 세피라 <YESOD>로 추정된다.\n\n강철대륙에서 처음으로 관측되었으며, 그 원본이 되는 구조체가 존재하지 않는 것으로 보인다. 따라서 예소드는 강철대륙이 어느 정도 구축된 이후, 그 기반 위에서 비로소 형성된 예언자였을 것이라고 추측해 볼 수 있다. \n\n상기와 같은 논의를 바탕으로, 예소드는 다른 예언자들처럼 어떤 구조체에 덧씌워지거나 원형을 가질 필요 없이, 순수하게 목적성을 가지고 만들어진 '최적화'된 예언자라고 논의를 이어갈 수도 있을 것이다."
