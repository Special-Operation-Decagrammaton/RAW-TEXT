1866427125-DescriptionTh = "แพ็กเกจที่จะได้รับตั๋วเลือกนักเรียน ★3 (อาร์ไคฟ์) 1 ใบ\n* หากเลือกรับนักเรียนที่มีอยู่ จะได้รับเป็นเอลลิกมาและเอลเลฟของนักเรียนคนดังกล่าวแทน\n* ตรวจสอบรายชื่อนักเรียนที่เลือกรับได้จากแถบเมนูนักเรียน\n* ตั๋วเลือกนักเรียนสามารถใช้เปิดรับได้จนถึงวันสิ้นสุดระยะเวลาใช้งานตั๋ว\n* แพ็กเกจนี้สามารถซื้อได้ 1 ครั้งต่อบัญชี\n* โปรดตรวจสอบรายละเอียดแพ็กเกจจากรายการด้านล่าง"
