582850008-DescriptionKr = "벚꽃 화병이 놓인 미니 테이블. 밋밋한 공간에 분홍빛의 화사함을 더해준다."
3973510283-NameKr = "전통 목재 격자무늬 창문"
3973510283-DescriptionKr = "전통 방식으로 제작된 격자무늬 창문. 전통적인 공간을 연출하기에 좋다."
