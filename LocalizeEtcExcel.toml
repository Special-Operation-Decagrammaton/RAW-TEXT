4062393487-NameJp = "敵を一定数倒した時に与えるダメージ減少、与えるダメージ量減少効果解除時、攻撃力増加"
4062393487-DescriptionJp = "敵を一定数倒すと、味方の与えるダメージ量が減少します。\n与えるダメージ量が減少した状態で、さらに敵を一定数倒すたびに、与えるダメージ量の減少効果が強化されます。（最大3段階）\n与えるダメージ量減少効果を解除した時、味方の攻撃力が増加します。"
