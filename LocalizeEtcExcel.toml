1090148821-DescriptionKr = "어디서나 알아볼 수 있는 밀레니엄 마크. 눈에 잘 띄는 벽에 걸어두면, 나도 모르는 사이 애교심이 생길지도?"
4832055-NameKr = "밀레니엄 타워 라운지 자판기"
4832055-DescriptionKr = "라운지에 설치하는 대형 자판기. 냉장 및 온장 시스템도 구비 완료!"
3656122902-NameKr = "밀레니엄 격자형 창문"
3656122902-DescriptionKr = "격자 모양으로 만들어진 창문. 가끔은 밖을 내다보며 운치를 즐겨보자."
4277704352-NameKr = "밀레니엄 타워 라운지 벽"
4277704352-DescriptionKr = "깔끔한 소재로 이루어진 벽. 밀레니엄의 상징과도 같은 배색이 포인트."
2148927862-NameKr = "밀레니엄 타워 라운지 바닥"
2148927862-DescriptionKr = "매끈한 소재로 제작된 바닥. 미래적인 디자인과 분위기가 눈에 띈다."
3462475894-NameKr = "밀레니엄 타워 라운지 배경"
3462475894-DescriptionKr = "미래지향적인 블루톤으로 이루어진 배경. 밀레니엄의 상징과도 같은 배색이다."
400761702-NameKr = "삼면 개방형 벤치"
400761702-DescriptionKr = "개방형 벤치의 세 면을 맞댄 구조. 가운데 빈 공간에서는 종종 분실물이 발견된다고 한다."
1946045865-NameKr = "밀레니엄 홀로그램 맵"
1946045865-DescriptionKr = "밀레니엄 학원의 전경이 홀로그램으로 출력되는 장치. 실시간이라 교통 상황을 파악하는 데에도 유용!"
3778870744-NameKr = "밀레니엄 타워 라운지 에스컬레이터"
3778870744-DescriptionKr = "다른 층으로 이동할 수 있는 에스컬레이터. 걷거나 뛰면 위험할 수 있으니 조심!"
2296647309-NameKr = "라운지 인포메이션 데스크"
2296647309-DescriptionKr = "궁금한 것을 문의할 수 있는 인포메이션 데스크. 사람이 없어도 당황하지 말고, 무인 태블릿을 이용하자!"
2518968126-NameKr = "라운지 안내용 드론"
2518968126-DescriptionKr = "라운지 곳곳을 안내하는 드론. 평소에는 날아다니지만, 배터리가 부족하면 아장아장 걷는다."
180301164-NameKr = "라운지 안내용 로봇"
180301164-DescriptionKr = "라운지 곳곳을 안내하는 로봇. 부지런한 모습과 다양한 표정으로 학생들의 귀여움을 받는다."
142655698-NameKr = "밀레니엄 와이드 윈도우"
142655698-DescriptionKr = "창밖을 내다보면 밀레니엄의 전경이 시원하게 펼쳐진다."
2073445367-NameKr = "2인용 밀레니엄 책상"
2073445367-DescriptionKr = "두 명이 함께 앉을 수 있는 책상. 수업의 집중도도 두 배… 일지는 잘 모르겠다."
3576295131-NameKr = "내츄럴 나무 벽"
3576295131-DescriptionKr = "내츄럴한 나무 벽. 포인트 컬러가 지루함 없이 단정한 공간을 만들어준다."
2789783968-NameKr = "트리니티 양식 분수대"
2789783968-DescriptionKr = "트리니티 양식의 하얀 분수대. 반짝이는 물줄기를 바라보면 아름다운 추억이 떠오른다."
1101184924-NameKr = "하이랜더 열차 안내판"
1101184924-DescriptionKr = "다음 행선지를 안내하는 열차 내 안내판. 자주 고장 나기 때문에 정기 점검이 필수다."
2402806743-NameKr = "하이랜더 대합실 장의자"
2402806743-DescriptionKr = "여러 명이 앉아 있을 수 있는 긴 의자. 가끔 눕는 사람들이 있지만, 공공 예절에는 어긋나니 주의!"
2446637545-NameKr = "하이랜더 점자 블록"
2446637545-DescriptionKr = "교통 약자를 위한 편의 시설. 하이랜더 규정상 반드시 설치하게끔 되어 있다."
2723986660-NameKr = "하이랜더 일반 물품보관소"
2723986660-DescriptionKr = "크레딧을 지불하고 일정 시간 물품을 맡길 수 있는 로커. 간편하게 이용할 수 있다."
3016816235-NameKr = "하이랜더 고급 물품보관소"
3016816235-DescriptionKr = "일반 물품보관소보다 비싸지만, 다른 점은 도색뿐. 하지만 기묘하게도 이용률은 일반보관소보다 높다고."
82937386-NameKr = "하이랜더 보급형 카펫"
82937386-DescriptionKr = "갈색의 은은한 컬러감을 가진 카펫. 일반 객차에 많이 활용된다."
1621584904-NameKr = "하이랜더 고급형 카펫"
1621584904-DescriptionKr = "고급스러운 자수가 놓인 청색 카펫. 고급 객차에 활용된다."
1211451554-NameKr = "하이랜더 통제용 안전바"
1211451554-DescriptionKr = "승객이 한 번에 몰리는 것을 방지하기 위한 안전바. 하지만 가끔 신경 쓰지 않고 뛰어넘는 사람들도 많다……"
4054782965-NameKr = "하이랜더 통유리 펜스"
4054782965-DescriptionKr = "통유리로 이루어져 시각성이 좋은 펜스. 주로 높은 층에 설치한다."
2166577929-NameKr = "하이랜더 역사 안내도"
2166577929-DescriptionKr = "승객들에게 위치를 안내하기 위한 설치물로, 특히 자주 고장 나는 물품 중 하나."
2003936843-NameKr = "하이랜더 벽걸이 램프"
2003936843-DescriptionKr = "역사 내에 걸어두는 벽걸이형 램프. 은은한 조명이 꽤 분위기 있다."
2129593156-NameKr = "하이랜더 열차 벽면 파티션 A"
2129593156-DescriptionKr = "열차 차체를 테마로 만들어진 파티션. 창문을 여닫지는 못하지만, 나름의 정취가 있다."
3713563036-NameKr = "하이랜더 승객용 의자"
3713563036-DescriptionKr = "고속 열차의 승객용 의자. 보급형이라 오래 앉으면 허리가 아프다."
3344648141-NameKr = "하이랜더 광고 패널"
3344648141-DescriptionKr = "역사 내에 세워두는 외부 광고용 패널. 광고를 신청할 수 있는 방법은 각 역마다 다르다고 한다."
1018455193-NameKr = "하이랜더 철도학원 심볼"
1018455193-DescriptionKr = "하이랜더의 심볼 모양 벽면 장식물. 하이랜더가 관할하는 역사에만 붙어 있다."
2160829444-NameKr = "하이랜더 식당칸 테이블"
2160829444-DescriptionKr = "열차 식당칸에 놓인 테이블. 도시락 등 맛있는 음식을 일행과 함께 즐길 수 있다."
1451156222-NameKr = "하이랜더 철도학원 문자 심볼"
1451156222-DescriptionKr = "하이랜더를 문자로 표기한 심볼 벽 장식. 종종 불량 학생들에 의해 특정 글자가 사라지거나 재배치되곤 한다."
1441268350-NameKr = "여름 컨셉 포토 보드"
1441268350-DescriptionKr = "여름날 사진이 붙어 있는 화이트보드. 아름다운 추억이 기록되어 있다."
3953802004-NameKr = "하이랜더 식당칸 주문 테이블"
3953802004-DescriptionKr = "식당칸에서 도시락과 음료 등을 주문할 수 있는 곳. 항상 인기 만점이다."
858464171-NameKr = "하이랜더 통제용 고급 안전바"
858464171-DescriptionKr = "승객이 가까이 접근하는 것을 방지하기 위한 안전바. 높이뛰기나 림보 놀이의 대상이 되는 경우가 많다."
2296043966-NameKr = "하이랜더 열차 벽면 파티션 B"
2296043966-DescriptionKr = "열차 차체를 테마로 만들어진 파티션. A 모델보다 창문이 두껍다."
2607458300-NameKr = "하이랜더 역사 기둥"
2607458300-DescriptionKr = "하이랜더 역사에서 주로 볼 수 있는 기둥. 아치형 구조가 멋스럽다."
450441785-NameKr = "하이랜더 일등석 의자"
450441785-DescriptionKr = "고속 열차의 일등석 승객용 의자. 편안하고 안락하다는 평이 많다."
1848819484-NameKr = "하이랜더 방향 표지판"
1848819484-DescriptionKr = "역사 등에서 각 방향을 안내하는 표지판. 클래식한 느낌이 살아있는 디자인으로 호평 일색."
3940121157-NameKr = "하이랜더 여행 가방 견본품"
3940121157-DescriptionKr = "하이랜더에서 자체적으로 제작 및 판매하는 여행용 가방들. 가볍고 튼튼하다는데, 과연?"
1236463890-NameKr = "하이랜더 고급 식당칸 테이블"
1236463890-DescriptionKr = "일등석 승객들을 위한 전용 식당칸 테이블. 코스 요리 주문도 가능하다!"
2056533270-NameKr = "하이랜더 열차 스낵카"
2056533270-DescriptionKr = "열차 내부를 순회하며 각종 간식을 판매하는 스낵카. 언제나 환영받는 존재."
743274696-NameKr = "하이랜더 열차 자판기"
743274696-DescriptionKr = "열차 내에서 간편하게 음료수를 뽑아 마실 수 있는 자판기. 가격은 조금 비쌀지도?"
1035288750-NameKr = "하이랜더 테마 창문"
1035288750-DescriptionKr = "창밖으로 빠르게 스쳐 지나가는 풍경을 감상해 보자. 열차에 탑승한 기분을 느낄 수 있다."
4079752905-NameKr = "하이랜더 역사 벽면 기둥"
4079752905-DescriptionKr = "하이랜더 특유의 컬러감이 돋보이는 벽면 기둥. 고풍스러움과 산뜻함이 동시에 느껴진다."
2646105362-NameKr = "하이랜더 역사 바닥 타일"
2646105362-DescriptionKr = "정갈한 형태의 모눈형 바닥 타일. 규격 맞추기 편할 것 같다."
699507019-NameKr = "하이랜더 스타일 배경"
699507019-DescriptionKr = "안정적인 느낌이 드는 배경. 열차에 탑승한 것처럼 안락한 기분이 든다."
2442155214-NameKr = "반짝이는 크리스마스 트리"
2442155214-DescriptionKr = "추운 겨울을 환하게 밝혀주는 크리스마스 트리. 반짝이는 불빛에 마음이 따뜻해진다."
1959952291-NameKr = "227호 온천장 가이드 보드"
1959952291-DescriptionKr = "227호 온천장 가이드 내용이 작성된 보드. 온천의 구조와 정보를 알 수 있다."
3993853034-NameKr = "하이랜더 시계탑"
3993853034-DescriptionKr = "하이랜더 중앙역의 상징인 시계탑. 약속 장소로도 널리 사용된다."
261810295-NameKr = "비장의 마스코트 등신대 슈포(역무원)"
261810295-DescriptionKr = "하이랜더 역무원 복장의 슈포 인형. 슈포 옆은 나름의 포토존일지도……"
3345963333-NameKr = "비장의 마스코트 등신대 슈포(CCC)"
3345963333-DescriptionKr = "하이랜더 CCC 복장의 슈포 인형. 가끔 불량 학생들의 표적이 되기도 한다. 힘내라, 슈포!"
725627559-NameKr = "하이랜더 인포메이션 데스크"
725627559-DescriptionKr = "이런저런 안내를 해준다는데, 태반은 무인으로 운영되고 있다. 비치된 팸플릿에서 의미를 찾아보자."
2619099202-NameKr = "하이랜더 역사 편의점"
2619099202-DescriptionKr = "하이랜더 역사 내에서 운영되는 편의점. 각종 간식거리는 항상 인기 있는 품목이다."
3684229011-NameKr = "하이랜더 차량 기지"
3684229011-DescriptionKr = "열차가 수용되는 차량기지. 위험하니 안에 들어가지 않도록 하자."
2977861947-NameKr = "칙칙폭폭 미니열차"
2977861947-DescriptionKr = "정교하게 구현된 미니어처 레일과 열차. 공간만 충분하다면 실내 놀이기구로도 활용할 수 있다."
2059347702-NameKr = "하이랜더 열차 개표구"
2059347702-DescriptionKr = "자동 개표기. 무임승차자들은 이 기기를 뛰어넘기 때문에 차내 추가 검표가 필수다. 가끔 불량 학생들이 발로 차대서 고장이 잦다."
4189201938-NameKr = "블루 뉴트로 턴테이블"
4189201938-DescriptionKr = "LP와 앰프 세트로 구성된 뉴트로 감성의 블루 턴테이블. 음악을 크게 틀어보자!"
1606806838-NameKr = "백야당 이동식 점포"
1606806838-DescriptionKr = "벚꽃으로 장식된 백야당의 이동식 점포. 백야당의 인기 메뉴를 어디서나 즐겨보세요!"
1293987789-NameKr = "확장형 전통 목재 창문"
1293987789-DescriptionKr = "전통 방식으로 제작된 확장형 격자무늬 창문. 넓어진 창문으로 원하는 공간을 연출해보자!"
1589090514-NameKr = "앤티크 수납형 원목 책상"
1589090514-DescriptionKr = "넓은 수납 공간을 가진 오래된 원목 책상. 책상에 놓인 다양한 고서들을 연구해보자!"
1673564872-NameKr = "로얄 다이아 쿠션 체어"
1673564872-DescriptionKr = "고풍스러운 다이아 패턴의 쿠션 체어. 절제된 곡선형의 디자인이 멋스러움을 준다."
81420889-NameKr = "홀로그램 큐브 턴테이블"
81420889-DescriptionKr = "최첨단 기술이 집약된 턴테이블. 음악에 맞춰 움직이는 홀로그램을 통해 리듬을 느껴보자!"
451299855-NameKr = "대운동회 가이드 보드"
451299855-DescriptionKr = "대운동회 구성과 일정이 작성된 대운동회 가이드 보드. 대운동회의 구성과 정보를 알 수 있다."
3514482999-NameKr = "골드 블랙 스툴"
3514482999-DescriptionKr = "호화로운 골드 마감이 돋보이는 골드 블랙 스툴. 어디에 두어도 고급스러운 분위기를 풍긴다."
2693388642-NameKr = "골드 레드와인 스툴"
2693388642-DescriptionKr = "기품이 느껴지는 골드 레드와인 스툴. 화려한 레드 벨벳이 무척 부드럽다."
627414305-NameKr = "실버 네온블루 스툴"
627414305-DescriptionKr = "은은한 실버 마감으로 이루어진 실버 네온블루 스툴. 산뜻한 분위기를 즐기고 싶다면 추천한다."
3510817666-NameKr = "다크 바이올렛 스툴"
3510817666-DescriptionKr = "고혹한 매력이 돋보이는 다크 바이올렛 스툴. 주변으로 요염한 매력을 퍼트린다."
280657879-NameKr = "대운동회 컨셉 보드"
280657879-DescriptionKr = "대운동회의 추억을 모아둔 대운동회 컨셉 보드. 즐거웠던 기억 속으로 빠져든다."
3405450747-NameKr = "대전격투 게임기"
3405450747-DescriptionKr = "치열한 대전격투 게임을 즐길 수 있는 2인용 게임기. 당장이라도 플레이하고 싶다."
2177596534-NameKr = "따뜻한 크리스마스 벽난로"
2177596534-DescriptionKr = "풍성한 선물과 함께 화로의 따뜻함이 몸을 녹여주는 크리스마스 벽난로. 보기만 해도 흐뭇하다."
2802345422-NameKr = "경쾌한 멜로디 악보 스탠드"
2802345422-DescriptionKr = "금방이라도 경쾌한 멜로디를 연주하고 싶어지는 악보 스탠드. 흥겨운 음악이 들려온다."
107127761-NameKr = "우아한 플라워 티 테이블"
107127761-DescriptionKr = "아름다운 플라워 장식이 인상적인 우아한 티 테이블. 향긋한 차가 마음을 안정시켜 준다."
449531113-NameKr = "트리니티 오르간"
449531113-DescriptionKr = "아름다운 트리니티의 미적 감각이 돋보이는 오르간. 바라보고만 있어도 성스러운 느낌이 든다."
557842591-NameKr = "티파티 테이블"
557842591-DescriptionKr = "가녀린 디자인이 돋보이는 티파티 테이블. 아름다운 외관과는 달리 심각한 이야기가 오가기도 한다."
1616329815-NameKr = "심문실 테이블"
1616329815-DescriptionKr = "진실을 말하게 만드는 신비한 테이블. 앉는 순간 감추고 있던 비밀을 털어놓게 된다."
1827809008-NameKr = "기도 의자"
1827809008-DescriptionKr = "경건한 마음을 가지고 앉게 되는 기도 의자. 정갈한 마음을 가지게 된다."
1653605105-NameKr = "D.U. 시라토리구 디오라마 테이블"
1653605105-DescriptionKr = "D.U. 시라토리구의 복구 현황을 알 수 있는 테이블. 뿌듯함을 느껴보자."
3858724331-NameKr = "식물 선반"
3858724331-DescriptionKr = "정성스레 관리된 식물 선반. 잡초뿐이지만 정성스레 관리되어 있다."
3001859952-NameKr = "백귀야행 굿즈 장식장"
3001859952-DescriptionKr = "백귀야행의 인기 굿즈를 모아둔 장식장. 많은 이들이 탐낼 법하다."
3619669716-NameKr = "핑크색 심플 스툴"
3619669716-DescriptionKr = "심플한 핑크색 스툴. 한정된 공간에 많이 배치할 수 있어 공간 절약에 도움이 된다."
3258047487-NameKr = "관엽식물"
3258047487-DescriptionKr = "잘 자란 관엽식물. 눈도 몸도 즐거운 공기정화 효과를 느껴보세요!"
4203928170-NameKr = "작은 창문"
4203928170-DescriptionKr = "환기를 위한 작은 창문. 작은 크기여도 엄청난 효과를 보여준다."
71838943-NameKr = "흰색 심플 소파"
71838943-DescriptionKr = "쿠션이 놓인 심플한 소파. 고탄성의 충전재가 학생들의 몸을 편안하게 해준다."
464779761-NameKr = "게임개발부 락커"
464779761-DescriptionKr = "게임개발부 부실을 지키고 있는 락커. 아늑한 내부가 돋보인다. "
1473923628-NameKr = "실버 딥 블루 스툴"
1473923628-DescriptionKr = "차가운 색감이 돋보이는 실버 딥 블루 스툴. 도회적인 분위기가 든다."
154679730-NameKr = "하늘색 싱글 소파"
154679730-DescriptionKr = "혼자 앉을 수 있는 하늘색 소파. 푹신한 촉감에 빠져든다."
1363142416-NameKr = "철제 미닫이 캐비닛"
1363142416-DescriptionKr = "많은 물건을 담을 수 있는 커다란 캐비닛. 고양이들도 좋아한다."
4074976012-NameKr = "중화풍 온열 진열장"
4074976012-DescriptionKr = "먹음직스러운 음식들과 달큰한 간장병이 올려진 중화풍 온열 진열장. 보는 이로 하여금 군침을 돌게 한다."
1367889524-NameKr = "중화풍 의자"
1367889524-DescriptionKr = "고풍스러운 느낌이 물씬 풍기는 중화풍 의자. 원목의 고급스러움과 풍성한 색감의 쿠션이 완벽한 조화를 이룬다."
827068541-NameKr = "목공 작업대"
827068541-DescriptionKr = "무엇이든 뚝딱 만들어낼 수 있는 목공 작업대. 새로운 작업을 시작하고 나면 시간 가는 줄 모른다."
446242235-NameKr = "신선! 생선 상자"
446242235-DescriptionKr = "생선이 가득 담긴 생선 상자. 무심코 들어 올렸다가는 생선이 도망갈지도 모른다!"
3436380027-NameKr = "스쿠버 다이빙 기어 보관 랙"
3436380027-DescriptionKr = "스쿠버 다이빙에 필요한 기억를 보관하고 있는 랙. 언제라도 뛰어들 준비가 되어 있다!"
2439356853-NameKr = "샤워 부스"
2439356853-DescriptionKr = "시원한 냉수와 따뜻한 온수를 모두 지원하는 샤워 부스. 상쾌함을 가져다준다!"
2423731359-NameKr = "파닥파닥 청새치 전시대"
2423731359-DescriptionKr = "바다의 내음이 느껴지는 파닥파닥 청새치 전시대. 금방이라도 튀어 오를 것만 같다!"
2932512474-NameKr = "흥신소68 밴드 스테이지"
2932512474-DescriptionKr = "하루도 빠짐없이 Rock & Bad! 흥신소68 무법자들의 흥겨움이 돋보이는 흥신소68 밴드 스테이지."
2867363316-NameKr = "클래식 패턴 여행용 가방"
2867363316-DescriptionKr = "클래식 패턴의 우아함과 실용성을 갖춘 여행용 가방. 우아한 여행객에게 안성맞춤."
2884023970-NameKr = "미니 스툴과 선베드"
2884023970-DescriptionKr = "상큼한 주스가 놓인 미니 스툴과 선베드. 체크무늬의 쿠션으로 아늑함을 더했다."
2252585741-NameKr = "아이스크림 테이블"
2252585741-DescriptionKr = "달콤한 아이스크림이 놓인 아이스크림 테이블. 한입에 여름이 녹아내린다."
406850184-NameKr = "선샤인 레몬 트리"
406850184-DescriptionKr = "상큼한 레몬이 가득 열린 선샤인 레몬 트리. 수도꼭지를 틀어서 상쾌함 On!"
2773697566-NameKr = "보드게임 테이블"
2773697566-DescriptionKr = "오래된 지도와 말들과 주사위가 늘어서 있는 보드게임 테이블. 즐거운 게임이 시작될 것만 같다."
4076782432-NameKr = "클래식 도서관 의자"
4076782432-DescriptionKr = "아늑함과 레트로함이 가득한 클래식 도서관 의자. 독서가들이라면 꿈꾸게 되는 의자."
1063381236-NameKr = "원고 작업 책상"
1063381236-DescriptionKr = "훌륭한 작가인 당신의 마감을 책임져 줄 최고의 친구! 열정을 불태워라!"
3981895212-NameKr = "휴식 벤치 테이블"
3981895212-DescriptionKr = "가볍고 탄탄한 소재로 어디에 놓아도 손색없는 휴식 벤치 테이블."
1445269164-NameKr = "종이접기 테이블"
1445269164-DescriptionKr = "마음에 정화를 가져다주는 고풍스러운 종이접기 전용 테이블. 아가씨를 위한 고고한 취미의 장."
2764760079-NameKr = "모모프렌즈 굿즈 가판대"
2764760079-DescriptionKr = "귀여운 모모프렌즈가 한가득 배치된 굿즈 가판대. 누구라도 귀여움에 반해서 살펴보게 된다."
3954747188-NameKr = "프레시 샵 테이블"
3954747188-DescriptionKr = "깔끔함과 자연의 융합! 프레시 샵 테이블. 신선한 과일로 한 끼 어때?"
1783190384-NameKr = "타로 테이블"
1783190384-DescriptionKr = "운명은 바로 지금, 바로 이 자리! 어떤 카드가 나오더라도 한번 뽑아보고 싶은 타로 테이블."
1718145891-NameKr = "고풍스러운 조리대"
1718145891-DescriptionKr = "따뜻한 국부터 굽는 요리까지! 만능 요리가 가능한 고풍스러운 조리대!"
3668516638-NameKr = "휴식용 의자"
3668516638-DescriptionKr = "혼자만의 공간을 만들어주는 휴식용 의자. 실내를 선호하는 이들에게 안성맞춤이다."
3490025398-NameKr = "아이스풀"
3490025398-DescriptionKr = "시원한 물속에서 여유로운 시간을 보낼 수 있는 아이스풀."
2461433472-NameKr = "캠핑 파티션"
2461433472-DescriptionKr = "깔끔한 디자인과 귀여운 패턴의 접이식 의자가 인상적인 캠핑 파티션!"
3342398749-NameKr = "캠핑 커피 테이블"
3342398749-DescriptionKr = "자연 속에서도 포기할 수 없는 향기로운 커피의 맛을 느낄 수 있는 테이블!"
2781307923-NameKr = "하나둘셋 책상 세트"
2781307923-DescriptionKr = "귀여운 친구들과 함께 차근차근 배워보는 하나둘셋 책상 세트! 천천히 조금씩 알아보자!"
2882359462-NameKr = "위엄의 중역 책상"
2882359462-DescriptionKr = "위엄이 느껴지는 중역 책상. 늘 카리스마를 잃지 않는 자에게 추천한다!"
3017609503-NameKr = "전통 연주 무대"
3017609503-DescriptionKr = "전통 악기들이 아기자기하게 놓여 있는 무대. 즐거운 연주와 함께 소원을 빌어보자!"
471153362-NameKr = "최고급 중역 책상"
471153362-DescriptionKr = "모던한 디자인에서 위압감을 느낄 수 있는 중역 책상. 힘과 권위가 느껴진다!"
1604931288-NameKr = "절구와 떡메"
1604931288-DescriptionKr = "맛있는 떡을 만들 수 있는 절구와 떡메. 새해를 준비하는 하나의 멋진 방법!"
2830564916-NameKr = "축제 가면 전시대"
2830564916-DescriptionKr = "흥겨운 축제에 즐거움을 더해주는 가면 전시대. 다양한 가면들을 써볼 수 있다."
1794535042-NameKr = "짙푸른 베이스 기타"
1794535042-DescriptionKr = "짙푸른색의 베이스 기타. 밴드를 든든하게 받쳐주는 베이스지만 동료를 위해서라면 앞에 나설 수도 있다."
3965567884-NameKr = "핑크색 일렉트릭 기타"
3965567884-DescriptionKr = "귀여운 핑크색 일렉트릭 기타. 보기와는 다르게 강렬한 기타음을 낸다."
757557126-NameKr = "베이직 일렉트릭 키보드"
757557126-DescriptionKr = "기본에 충실한 일렉트릭 키보드. 연주가 시작되면 탄탄한 기본기에 더해 화려함도 보여준다."
4027488153-NameKr = "셀피 부스"
4027488153-DescriptionKr = "한창때의 학생들의 눈길을 끄는 셀피 부스. 많은 데코레이션이 준비되어 있다."
419270322-NameKr = "전설의 기록판"
419270322-DescriptionKr = "어떤 전설적인 밴드의 기록이 담긴 화이트보드. 명성이나 디저트보다 소중한 것은 함께 했다는 추억이다."
1813932227-NameKr = "카페용 침대"
1813932227-DescriptionKr = "메이드에게도, 게이머에게도 침대는 중요하다. 아니, 그것을 넘어 필수적이다… 라고 주장하며 반입한 가구. 장소와 상황이 과연 어울리는지는, 조금 나중에 생각하기로 한 모양이다."
57327189-NameKr = "바비큐 그릴 스탠드"
57327189-DescriptionKr = "다양한 재료들을 구울 수 있는 바비큐 세트. 불을 사용하는 물건이니만큼, 취급에 주의가 요구된다."
1463557035-NameKr = "수상인명구조함"
1463557035-DescriptionKr = "만일을 대비한 인명구조함. 언제라도 쓸 수 있게 주기적으로 정비하고 있다."
2175347168-NameKr = "자이언트 풀 플로트"
2175347168-DescriptionKr = "위에 누울 수 있을 정도로 커다란 튜브. 사람이 많은 곳에선 이용을 자제하자."
905489728-NameKr = "라이프가드용 의자"
905489728-DescriptionKr = "먼 곳까지 볼 수 있는 의자. 파라솔이 있어 햇볕 아래서도 문제없다."
3115231087-NameKr = "그물 해먹"
3115231087-DescriptionKr = "그물과 철골 등 어촌에서 쉽게 구할 수 있는 재료로 만든 간이 해먹. 외견은 다소 볼품없지만 안락함 만큼은 최고급 침대에 견줄만하다."
4008049746-NameKr = "숙련자용 자동 표적판"
4008049746-DescriptionKr = "사격 실력 점검을 위한 자동 표적판. 명중률이 높을수록 다소 불친절한 패턴으로 움직인다."
1603079414-NameKr = "아비도스 자전거 정비 거치대"
1603079414-DescriptionKr = "자전거를 수리하거나, 점검하기 위해 사용하는 정비 거치대와 점검 도구 세트. 각자 조금은 다를지 몰라도 소중한 물건을 아끼고자 하는 마음은 똑같은 법이다."
572734953-NameKr = "해변 축제용 의자"
572734953-DescriptionKr = "해변가 축제를 위한 간편한 의자. 건강을 위해 바른 자세로 앉도록 하자."
3606019028-NameKr = "실내 캠프파이어 테이블"
3606019028-DescriptionKr = "실내에서도 캠핑을 즐길 수 있는 특제 테이블. 낭만 가득한 여러 가지 개인 용품들도 배치되어 있다."
220830642-NameKr = "목인장"
220830642-DescriptionKr = "권법의 훈련 용도로 만들어진 가지가 달린 나무 말뚝. 가지를 걷어내는 순서에 주의하지 않으면 반격을 당할 수도 있기 때문에 주의가 필요하다."
1975676702-NameKr = "연설용 탁자"
1975676702-DescriptionKr = "만담에 필요한 부채와 마이크 등이 올려진 작은 탁자. 디자인이 고급스러워 인테리어 용도로도 인기가 있다. "
162329831-NameKr = "현룡문 옥좌"
162329831-DescriptionKr = "현룡문에서 전통적으로 사용해 왔던 문주 전용 옥좌. 화려한 외관과는 달리, 불편한 부분이 있다고 한다."
515353759-NameKr = "라이브 스테이지"
515353759-DescriptionKr = "트리니티의 아이돌 그룹 <앤틱 세라핌>만을 위해 만들어진 특별 스테이지.평소에는 볼 수 없던 세 사람의 모습을 볼 수 있는 귀중한 곳이다."
2823428745-NameKr = "판데모니움 데스크"
2823428745-DescriptionKr = "만마전 임원인 사츠키의 전용 책상. 위대한 NK 울트라 프로젝트는 바로 이곳에서 시작된다."
951778631-NameKr = "만마전 알림판"
951778631-DescriptionKr = "만마전의 활동을 알 수 있는 알림판. 서기인 치아키가 관리하고 있다."
1761559320-NameKr = "흰색 빈 백"
1761559320-DescriptionKr = "흰색의 코튼 패브릭으로 만들어진 푹신한 빈 백.\n온몸을 감싸는 부드러운 감촉 탓에 한 번 누우면 좀처럼 헤어 나오기가 어렵다."
1831334057-NameKr = "푸른색 빈 백"
1831334057-DescriptionKr = "푸른색의 코튼 패브릭으로 만들어진 푹신한 빈 백.\n온몸을 감싸는 부드러운 감촉 탓에 한 번 누우면 좀처럼 헤어 나오기가 어렵다."
4286106492-NameKr = "밀리터리 캠핑 보드 설치물"
4286106492-DescriptionKr = "공연 예술을 위해 설치한 거대 보드판. 현재는 감각적인 그래피티가 그려져 있다. "
3819813867-NameKr = "첫 번째 아방가르드"
3819813867-DescriptionKr = "리오가 자신의 걸작을 만들기 위해 제작된 초기 모형.리오만의 특별한 철학이 담겨 있다."
2386173176-NameKr = "오세치 요리 세트 테이블"
2386173176-DescriptionKr = "신년을 맞아 새해 음식들이 가득 차려진 특별한 테이블. 누군가의 마음이 가득 담겨 있다."
1212778271-NameKr = "팬케이크 티 테이블"
1212778271-DescriptionKr = "주리의 애프터눈 티 테이블. 멋진 애프터눈 티 세트이지만, 가끔 상상하지 못한 일이 일어난다고 한다……."
2483597825-NameKr = "약품 정리함 화이트 테이블"
2483597825-DescriptionKr = "해변에서도, 어디에서도 때와 장소를 가리지 않고 편하게 사용할 수 있는 세나의 테이블. 응급 상황에는 언제나 주의하자."
1389480680-NameKr = "밀레니엄제 배팅 머신"
1389480680-DescriptionKr = "직구는 물론, 8종 이상의 변화구도 완벽하게 구사할 수 있는 밀레니엄제 배팅 머신. 머신의 성능과 밀레니엄 야구부의 실력은, 그다지 비례하지 않는 듯하다…"
2327874813-NameKr = "어시스트 풀업 머신"
2327874813-DescriptionKr = "턱걸이를 보조해 주는 체력 단련용 운동 기구. 물론 보조를 받지 않는 것도, 하나의 사용 방법이기는 하다."
82703931-NameKr = "화이트 커튼 거울"
82703931-DescriptionKr = "전신을 비출 수 있는 커다란 거울. 평소엔 먼지를 막기 위해 커튼으로 덮어놓는다."
3344352954-NameKr = "뱃놀이용 인공 연못"
3344352954-DescriptionKr = "작은 배를 띄워서 놀 수 있는 실내용 인공 연못. 잔잔한 수면을 바라보고 있으면, 나도 모르게 마음이 여유로워질 것 같다."
582370447-NameKr = "비디오비전 TV"
582370447-DescriptionKr = "오래된 영화를 보기에 제격인 레트로 TV. 이제는 방송을 볼 수 없지만 비디오테이프는 어찌저찌 돌아간다고 한다."
4119717887-NameKr = "음양부실의 좌상"
4119717887-DescriptionKr = "언제나 업무가 산더미처럼 쌓여 있다. 오랫동안 방치된 서류는 누군가 한숨 쉬며 가져간다고 한다."
103026725-NameKr = "박자의 인도자"
103026725-DescriptionKr = "드럼 헤드에 남은 무수한 흔적이 누군가의 연습량을 고스란히 보여주고 있다."
2989224265-NameKr = "여름색 물총 거치대"
2989224265-DescriptionKr = "여름이 흠뻑 느껴지는 물총 거치대. 물총으로 상대를 촉촉하게 만들어 주자."
2026387541-NameKr = "물놀이 튜브 풀장"
2026387541-DescriptionKr = "바다에 가지 않아도 여름을 즐길 수 있는 공기 주입식 풀장. '어린이용'이라는 태그가 적혀있다."
987535338-NameKr = "세이아의 오픈카"
987535338-DescriptionKr = "세이아 소유의 오픈카. 척 보기에도 아무나 탈 수 있는 사양의 차량은 아니다."
180297253-NameKr = "스윙 체어"
180297253-DescriptionKr = "나기사가 애용하는 스윙 체어. 자연스러운 흔들림이 독특한 편안함을 선사한다."
2017199336-NameKr = "해변의 그네"
2017199336-DescriptionKr = "해변에 설치된 그네. 생각 정리가 필요할 때 그네를 타는 것도 어쩌면 좋은 선택?"
1666961861-NameKr = "수박 깨기 세트"
1666961861-DescriptionKr = "평범한 수박처럼 보이지만, 실제로도 그렇다. 간단한 놀이처럼 보이지만, 실제로도 그렇다."
3298242563-NameKr = "럭셔리 비치 배드"
3298242563-DescriptionKr = "해변에 설치된 럭셔리 침대. 부드럽고 푹신하며 호사스럽다."
272875268-NameKr = "티파티 앨범 수납장"
272875268-DescriptionKr = "앨범 등을 수납할 수 있는 책장. 각 선반에는 앨범 뿐만 아니라 프라이빗 비치에서의 추억이 가득 담겨있다."
2325711709-NameKr = "수상한 가마솥"
2325711709-DescriptionKr = "수상한 액체가 끓는 가마솥. 의외로 먹어보면 맛있을지도?"
2818960363-NameKr = "매직 카펫 서큘레이터"
2818960363-DescriptionKr = "멋진 매직 카펫과 서큘레이터 세트. 가만히 서 있어도 마법 효과를 느낄 수 있다."
3334773599-NameKr = "타자기 책상"
3334773599-DescriptionKr = "타자기를 편하게 사용할 수 있도록 만들어진 전용 책상. 다른 용도로 쓰긴 어렵지만, 그건 아무래도 좋은 모양이다."
578477992-NameKr = "비치 선베드와 미니 테이블"
578477992-DescriptionKr = "해변의 선베드와 음료는, 어떤 사람이라도 축 늘어지게 하는 마법을 부린다고 한다."
3798522794-NameKr = "예술가의 초기작"
3798522794-DescriptionKr = "어느 미디어아티스트의 초기작. 본인은 부끄럽게 여기지만, 담겨있는 열정은 환산할 수 없다."
935541676-NameKr = "조각 작업대"
935541676-DescriptionKr = "조각할 석재를 올려두는 작업대. 외양은 투박하지만, 섬세한 예술을 피워내기에는 부족함이 없다."
3167056314-NameKr = "주크박스"
3167056314-DescriptionKr = "원래는 동전을 넣으면 음악을 들려주는 기계. 즉 음악을 파는 자동판매기… 였으나, 지금은 분위기를 내기 위한 거대 스피커의 역할로 사용되고 있는 듯하다."
3421618515-NameKr = "아나바다상자"
3421618515-DescriptionKr = "샬레 방문 학생들이 쓸 수 있지만 필요 없는 물건들을 나누는 상자. 욕심부리지 않는 마음으로 감사히 사용하자."
1467761258-NameKr = "헬멧청소키트"
1467761258-DescriptionKr = "청결한 헬멧은 숙녀의 자랑. 헬멧 손질에 필요한 도구들이 들어있다."
2118635362-NameKr = "판매용 데스크"
2118635362-DescriptionKr = "여러 가지… '책'을 판매하거나 교환하곤 하는… 언뜻 보기에는 평범할 수 있지만, 꼭 그렇지만도 않은 데스크. 만일 코스프레를 한 판매원이 보인다면, 서로 예의를 지키도록 하자."
2534689747-NameKr = "라멘 테이블"
2534689747-DescriptionKr = "라멘 육수의 향이 은은히 배어 있는 원목 테이블.후추와 다진 마늘 등의 향신료가 비치되어 있으니 자유롭게 커스텀하여 즐겨 보자."
872812875-NameKr = "간이 탈의실"
872812875-DescriptionKr = "패션쇼장 무대 뒤에 마련된 간이 탈의실. 화려함이 피어나는 가장 은밀한 장소다."
2196376303-NameKr = "메인터넌스 스테이션"
2196376303-DescriptionKr = "기체 수리, 무기 정비, 탄약 보급 등, 모든 상황에 대처할 수 있는 만능 스테이션."
3626758680-NameKr = "게임개발부의 공간"
3626758680-DescriptionKr = "끝내 자기들만의 공간을 만들어 버린, 게임개발부의 장소입니다. 모두 모여 놀 수도 있습니다."
2736494103-NameKr = "간이 주방"
2736494103-DescriptionKr = "간단한 요리를 하거나, 차를 끓일 수 있습니다."
1601800461-NameKr = "지나간 추억"
1601800461-DescriptionKr = "누군가의 추억(?)이 담긴, 인공 신체(?)입니다……"
3653637069-NameKr = "개폐식 창문"
3653637069-DescriptionKr = "수송선의 창문입니다.\n통창 크기이며, 내부에서 바라보는 밤하늘의 모습이 담겨 있습니다."
3157185061-NameKr = "봄 인형"
3157185061-DescriptionKr = "붉은겨울의 봄 축제에 사용된다는 거대 인형.\n이른 봄, 아직 눈은 남아 있지만 모든 것이 깨어나는 계절을 축하하는 의미라고 한다."
4209113555-NameKr = "게임개발부의 일상"
4209113555-DescriptionKr = "게임개발부의 일상을 담은 장식물.\n누군가의 일상은, 다른 누군가에게는 눈부신 비일상이다."
3750481687-NameKr = "식탁 겸 회의 테이블"
3750481687-DescriptionKr = "식탁으로도, 회의를 하기 위한 공간으로도, 어떤 용도로도 사용할 수 있는 테이블."
25273343-NameKr = "야밤의 놀이판"
25273343-DescriptionKr = "놀거리와 먹거리가 즐비한 카펫. 긴긴 밤도 이 위에서라면 테마파크에 불과하다."
2961287885-NameKr = "빨간색 아케이드 게임기"
2961287885-DescriptionKr = "고전 아케이드 게임기. 'FIGHT' 글자를 보면 승부욕이 불타오른다."
1693374788-NameKr = "보라색 아케이드 게임기"
1693374788-DescriptionKr = "고전 아케이드 게임기. 고양이를 도와 소행성을 피해 보자냥! 냥냥!"
755788283-NameKr = "파랑색 아케이드 게임기"
755788283-DescriptionKr = "고전 아케이드 게임기. 분노의 힘으로! 앵그리 아델리와 함께 코인을 향해 달리자!"
3649240306-NameKr = "아케이드 네온 전광판"
3649240306-DescriptionKr = "아케이드 네온 전광판. 화려한 네온으로 벽을 멋지게 장식할 수 있다."
2738585975-NameKr = "젤리즈 네온 전광판"
2738585975-DescriptionKr = "젤리즈 전광판. 젤리즈의 귀여움을 마음껏 감상할 수 있다."
2356428364-NameKr = "컬러풀 격자무늬 카펫"
2356428364-DescriptionKr = "컬러풀한 격자무늬 카펫. 장인의 손길로 직조된 러그는 아름다운 독창성을 잘 보여준다."
3862637757-NameKr = "사각형 문장 무늬 카펫"
3862637757-DescriptionKr = "복잡한 형상이 새겨진 카펫. 역사적으로 중요한 가치를 가지고 있을지도……?"
958075206-NameKr = "사각형 기하학적 문양 카펫"
958075206-DescriptionKr = "기하학적 문양이 반복되어 대칭을 이루고 있는 카펫. 고풍스럽고 예스러운 느낌을 준다."
1954169509-NameKr = "스타투아리오 대리석 무늬 카펫"
1954169509-DescriptionKr = "고급 대리석 무늬를 본뜬 카펫. 실제와 구분하기 어려울 정도로 정교하다."
1260208394-NameKr = "백장미 다각형 화분"
1260208394-DescriptionKr = "잘 가꿔진 장미 화분. 어려운 관리법에도 불구하고, 티파티에서는 언제나 생화를 심는다."
1350455159-NameKr = "백장미 직사각형 화단"
1350455159-DescriptionKr = "백장미가 화사하게 피어난 화단. 그 꽃말은 순결, 순수이다."
2467071271-NameKr = "하얀 식탁보를 깐 사각 테이블"
2467071271-DescriptionKr = "청결한 식탁보를 깐 테이블. 덕분에 뭘 흘려도 괜찮지만, 역설적이게도 무엇을 흘려도 눈에 띄어 조심하게 된다."
1829879645-NameKr = "소형 티 테이블"
1829879645-DescriptionKr = "한 사람을 위한 작고 소박한 티 테이블. 때로는 홀로 여유롭게 시간을 보내보는 것은 어떨까."
3761215951-NameKr = "티타임용 티 카트"
3761215951-DescriptionKr = "다기류와 다과가 완비되어 있는 티 카트. 언제 어디서나 우아하게 티타임을 즐길 수 있다."
2783808256-NameKr = "플로어 스탠드"
2783808256-DescriptionKr = "따뜻한 빛이 감도는 고풍스러운 램프. 눈에 피로를 최소화하여, 독서하기 딱 알맞다."
1681173970-NameKr = "서기용 포디움"
1681173970-DescriptionKr = "책받침이 있는 입석 책상. 사석보다는 공적인 자리에서 주로 사용된다."
344479674-NameKr = "고풍스러운 책 수레"
344479674-DescriptionKr = "책을 나르기 위한 카트. 여전히 E북보다는 서적을 선호하는 트리니티 곳곳에서 사서들이 분주히 밀고 다닌다."
766960606-NameKr = "백합 조형 벽걸이 시계"
766960606-DescriptionKr = "플뢰르 드 리스를 형상화한 벽걸이 시계. 주기적으로 태엽을 감아줘야 한다."
1994333090-NameKr = "트리니티식 목조 펜스"
1994333090-DescriptionKr = "정갈하면서도 우아한 목조 펜스. 절제된 조형에서 풍기는 미학은 외려 화려할 정도이다."
1889524945-NameKr = "티파티 대형 벽걸이 액자"
1889524945-DescriptionKr = "인상주의 기법으로 그려진 그림을 담은 액자. 원작자의 의도를 쉬이 추정하기 어려운 예술 작품이다."
746719294-NameKr = "티파티 소형 벽걸이 액자"
746719294-DescriptionKr = "심미적인 예술화를 담은 벽걸이 액자. 과감한 발상과, 그에 못지않게 거친 붓 터치가 돋보인다."
2670847271-NameKr = "초현실주의 석고상"
2670847271-DescriptionKr = "상식을 뛰어넘는 오브젝트. 그 파격적인 창의성은 현대 예술을 향해 질문을 던지는 듯하다."
1363506225-NameKr = "황동 꽃무늬 램프"
1363506225-DescriptionKr = "고풍스러운 꽃무늬가 새겨진 램프. 트리니티에서는 단순한 램프조차 허투루 만들지 않는다."
3010141145-NameKr = "어지럽혀진 책상"
3010141145-DescriptionKr = "발키리 경찰학교 표준 지급 사무용 책상.\n의자도, 책상위의 사물도 성한 것이 없다."
3927526577-NameKr = "밀레니엄제 전자 게이트"
3927526577-DescriptionKr = "방문객을 환영하는 게이트… 이지만, 의도대로 작동하지 않는다면 '특별한 조치'가 필요할 수도 있을 것이다."
2071964902-NameKr = "트리니티 다인용 소파"
2071964902-DescriptionKr = "고급 원단으로 만든 다인용 소파. 조형의 완성도를 우선시하여, 실제로 앉아보면 살짝 불편하다."
408630369-NameKr = "손님 맞이용 티 테이블"
408630369-DescriptionKr = "간소하지만 고급스러운 테이블. 홍차의 향기가 담소를 더욱 즐겁게 만들어준다."
1519664668-NameKr = "체스 테이블"
1519664668-DescriptionKr = "체스판이 준비된 테이블. 앉기만 해도 똑똑해 보이는 효능이 있다."
949584604-NameKr = "엎어진 체스 테이블"
949584604-DescriptionKr = "쓰러진 테이블. 체스판과 말들이 바닥에 흩어져 있다. 누군가는 떨어진 체스말을 주워야 한다."
3520494384-NameKr = "홀 케이크가 놓인 만찬 테이블"
3520494384-DescriptionKr = "화려한 홀 케이크가 놓인 테이블. 특별한 날, 또는 특별하게 만들고 싶은 날을 위한 자리이다."
650862141-NameKr = "황금빛 오후의 티 테이블"
650862141-DescriptionKr = "다양한 다과와 홍차가 준비된 티 테이블. 잠시 숨 돌리며 즐거운 담소를 나눠보자."
2194319883-NameKr = "저녁의 티 테이블"
2194319883-DescriptionKr = "달콤한 과자가 잔뜩 차려진 티 테이블. 지친 하루를 마무리하는 데에는, 당분과 홍차만 한 것이 없다."
2290878817-NameKr = "간소한 오전의 티 테이블"
2290878817-DescriptionKr = "샌드위치와 가벼운 다과가 차려진 티 테이블. 아무리 바쁜 아침이라도 차 한 잔의 여유는 빼먹을 수 없다."
3645596728-NameKr = "그라모폰"
3645596728-DescriptionKr = "LP 음반을 재생하는 그라모폰. 최신 음향 기기로는 담아낼 수 없는 감성이 있다."
1321590477-NameKr = "트리니티식 담장"
1321590477-DescriptionKr = "고대 건축 양식에서 모티브를 얻어 조형한 세련된 담장. 아치형 구조가 안정감을 더해준다."
3967034572-NameKr = "트리니티식 아치형 포털"
3967034572-DescriptionKr = "고대 건축 양식에서 모티브를 얻어 조형한 세련된 아치형 문. 드나들 때마다 웅장한 기분이 든다."
151202876-NameKr = "트리니티식 곡선형 기둥"
151202876-DescriptionKr = "트리니티 교정 곳곳에 세워진 기둥. 백색 바탕에, 금박 조형으로 깔끔하면서도 우아하다."
3368418938-NameKr = "마호가니 유리 수납장"
3368418938-DescriptionKr = "예스러운 분위기의 고급 수납장. 열쇠로 잠겨 있어 아무나 열 수 없다."
1297438922-NameKr = "마호가니 삼단 책장"
1297438922-DescriptionKr = "장인이 가공한 고급 선반. 책장 자체로도 귀중하지만, 각각의 책에 담긴 내용은 더욱 값지다."
1775678266-NameKr = "티파티 진열 선반"
1775678266-DescriptionKr = "차와 어울리는 설탕과 우유, 잼과 크림이 언제나 넉넉히 담겨 있다."
2663523493-NameKr = "티파티 내빈실 벽"
2663523493-DescriptionKr = "금박 무늬로 치장된 고풍스러운 벽지. 품격과 권위가 느껴진다."
2590292756-NameKr = "베르사유 패턴 타일"
2590292756-DescriptionKr = "복잡한 형태의 타일. 서로 다른 크기의 조각이 맞물려 아름다운 기하학적 패턴을 이루고 있다."
522474381-NameKr = "트리니티 티파티 배경"
522474381-DescriptionKr = "여러 색상이 조화롭게 어우러진 배경. 그 절묘한 균형이 만들어낸 색조는 무척 아름답다."
1741842915-NameKr = "티파티 대담 부스"
1741842915-DescriptionKr = "반쯤 밀폐되어 있는 2인석. 두꺼운 커튼이 대부분 소리를 흡수해, 비밀 이야기를 하기에 적격이다."
213262815-NameKr = "트리니티식 여닫이 벽난로"
213262815-DescriptionKr = "화실을 여닫는 구조로 된 벽난로. 실용성은 없지만, 수려한 디자인과 감성 때문에 많은 사람들이 동경한다."
2182437926-NameKr = "티파티 조경 분수대"
2182437926-DescriptionKr = "다양한 식물로 장식한 석조 분수대. 때때로 오목눈이가 날아와 물을 마시고 가는 모습을 볼 수 있다."
228833108-NameKr = "트리니티식 수정 회랑"
228833108-DescriptionKr = "유리로 치장된 수려한 통로. 그 아래서 걷고 있기만 해도 눈이 심심할 틈이 없다."
2386486699-NameKr = "티파티 찻잎 진열장"
2386486699-DescriptionKr = "키보토스 각지에서 공수한 명차를 진열한 선반. 찻잎이 상하지 않게, 철저하게 밀봉, 밀폐 보관되어 있다."
1659229955-NameKr = "티파티 메자닌"
1659229955-DescriptionKr = "실내 전경을 둘러보기 좋은 복층 구조. 절제된 멋을 지닌 인테리어와 상반되는 전위적 예술품이 만들어내는 부조화가 인상적이다."
3450502975-NameKr = "트리니티 톨 윈도우"
3450502975-DescriptionKr = "기능성보다는 미학에 충실한 창문. 먼지가 쌓이기 쉬운 구조라, 매일 꼼꼼히 청소해 줘야 한다."
649074038-NameKr = "티파티 대형 갤러리"
649074038-DescriptionKr = "트리니티의 전경이 비쳐 보이는 갤러리. 이 풍경을 감상할 수 있는 것도, 일종의 특권이다."
2836643506-NameKr = "티파티 소형 갤러리"
2836643506-DescriptionKr = "트리니티 풍경이 비치는 갤러리. 탁 트인 풍경에 가슴이 시원해진다."
2271310627-NameKr = "모눈 타일 바닥"
2271310627-DescriptionKr = "배색 모눈 타일 바닥. 공간 전체에 세련된 느낌을 더해준다."
3412859118-NameKr = "카세트테이프 테이블"
3412859118-DescriptionKr = "카세트테이프 모양의 테이블. 그때의 낭만을 완벽하게 재현할 수 있다."
1513726045-NameKr = "컬러풀 자판기"
1513726045-DescriptionKr = "다양한 간식을 판매하는 자판기. 어느새 동전을 넣고 있는 자신을 볼 수 있다."
2821092055-NameKr = "배색 멀티 티비"
2821092055-DescriptionKr = "레트로풍의 멀티 티비. 티비 시청과 게임 플레이 둘 다 즐길 수 있다!"
1785208903-NameKr = "젤리즈 인형뽑기"
1785208903-DescriptionKr = "젤리즈 인형을 얻을 수 있는 인형 뽑기. 난이도가 매우 높아 악명을 떨치고 있다."
2421885010-NameKr = "문예 서가"
2421885010-DescriptionKr = "문학 서적들이 꽂혀 있는 책장. 뽑는 데에 큰 용기를 요하는 책들도 다수 꽂혀 있다."
3112497970-NameKr = "미학 서가"
3112497970-DescriptionKr = "미학 학술서들이 꽂혀 있는 책장. 하지만 이것을 뽑으러 오는 학생들의 표정은 밝지 않다."
301797795-NameKr = "추상 패턴 카펫"
301797795-DescriptionKr = "추상적인 문양이 돋보이는 카펫. 난해함과 규칙성이 패턴 안에서 절묘한 균형을 이루고 있다."
3001079672-NameKr = "목재 패턴 카펫"
3001079672-DescriptionKr = "멀리서 보면 마치 나무로 만든 것 같은 외양의 카펫. 하지만 만져보면 매우 부드럽다."
1888234954-NameKr = "모자이크 패턴 카펫"
1888234954-DescriptionKr = "고풍스러운 문양이 돋보이는 카펫. 고대 모자이크 타일 유적의 무늬를 재해석했다."
837929111-NameKr = "캔버스 운반용 끌차"
837929111-DescriptionKr = "캔버스를 비롯한 화구를 옮기는 데에 쓰이는 끌차. 사감대가 없는 곳에서는 사람도 자주 올라탄다."
1277060067-NameKr = "벨벳 의자"
1277060067-DescriptionKr = "벨벳 쿠션이 덧대어진 목재 의자. 앉기만 해도 권위가 생기는 것 같은 착각이 든다."
3983877079-NameKr = "수상작 전시대"
3983877079-DescriptionKr = "작년 모 미술전람회에서 대상을 수상한 작품. 무수한 찬사와 시기가 늘 이 위에서 교차한다."
1713694610-NameKr = "추상 조각 전시대"
1713694610-DescriptionKr = "작자 미상의 조각상. 그 예술성을 인정받아 오랜 시간 자리를 지키고 있다."
2472213385-NameKr = "수상한 고서 전시대"
2472213385-DescriptionKr = "기이한 분위기를 풍기는 고서가 얹혀 있는 전시대. 아직 대출된 적은 없다."
1815109606-NameKr = "불온서적 전시대"
1815109606-DescriptionKr = "금서가 얹혀 있는 전시대. 금지된 것이 공공연히 공개되어 있다는 아이러니 또한 그 자체로 예술이다."
2101259221-NameKr = "와일드헌트풍 목조 펜스"
2101259221-DescriptionKr = "와일드헌트의 오래된 목조 펜스. 세월의 흔적이 묵직하게 내려앉아 있다."
2452935603-NameKr = "미니멀리즘 조명"
2452935603-DescriptionKr = "심플한 디자인의 조명. 그 형태는 오직 기능을 따른다."
865351516-NameKr = "감시자의 벽등"
865351516-DescriptionKr = "건물 벽면에 설치된 벽등. 심야 순찰을 도는 사감대 학생들의 반가운 이정표이다."
2695482073-NameKr = "대형 그린라이트 데스크"
2695482073-DescriptionKr = "녹색 등이 놓인 대형 책상. 서로 모르는 사람들끼리 함께 앉는 경우도 다반사다."
504418052-NameKr = "중형 그린라이트 데스크"
504418052-DescriptionKr = "녹색 등이 놓인 중형 책상. 이런 절제된 장소에서도 종종 파괴적인 예술이 발아한다."
3172216333-NameKr = "탈출 방지용 대형창"
3172216333-DescriptionKr = "창살이 덧대어진 대형 창문. 창살의 용도가 단순히 방범만을 위한 것 같지는 않다."
486717077-NameKr = "탈출 방지용 중형창"
486717077-DescriptionKr = "창살이 덧대어진 중형 창문. 탈출과 침입을 모두 효과적으로 방지힌다."
947632910-NameKr = "와일드헌트 게시판"
947632910-DescriptionKr = "각종 공지와 홍보가 붙는 게시판. 비인가 게시물도 많으니 한 번 찾아보자. "
2660814915-NameKr = "불면의 탑"
2660814915-DescriptionKr = "불면의 증거품들. 피로회복제를 마시고 남은 빈 캔들이 마구잡이로 쌓여 있다."
1446702624-NameKr = "은하의 지속"
1446702624-DescriptionKr = "작자 미상의 조각상. 작품의 이름만이 구전되어 오나, 그 의미에 대한 해석은 분분하다."
3190754330-NameKr = "박제된 음률"
3190754330-DescriptionKr = "모 유명 조각가의 작품. 걸작이라는 의견과 망작이라는 의견이 늘 첨예한 대립을 이룬다."
1146153010-NameKr = "회화 작업대"
1146153010-DescriptionKr = "캔버스, 이젤, 화구, 의자. 그림을 그리기에는 차고 넘치게 충분한 구성이다."
2919564883-NameKr = "와일드헌트풍 목조 칸막이"
2919564883-DescriptionKr = "와일드헌트의 오래된 목조 칸막이. 큰 공간을 분할하는 데에 사용한다."
1281426105-NameKr = "와일드헌트풍 목조 기둥"
1281426105-DescriptionKr = "와일드헌트의 오래된 목조 기둥. 천장의 무게가 단단한 목재 안에 가득 들어차 있다."
1692593705-NameKr = "와일드헌트풍 목조 게이트"
1692593705-DescriptionKr = "와일드헌트의 오래된 목조 게이트. 밑을 지나는 사람으로 하여금 스스로의 옷매무새를 돌아보게 한다. "
3076282914-NameKr = "와일드헌트풍 유리 칸막이"
3076282914-DescriptionKr = "와일드헌트의 오래된 유리 칸막이. 오래된 유리라 표면이 거칠지만, 그것이 특유의 분위기를 만든다."
4055705513-NameKr = "간이 화구 선반"
4055705513-DescriptionKr = "온갖 화구가 올라가 있는 선반. 주인을 알 수 없는 물건들도 다수 섞여 있다."
1538604811-NameKr = "회화용 선반"
1538604811-DescriptionKr = "온갖 화구가 올라가 있는 잘 정돈된 선반. 하지만 그 깔끔함은 오래 가지 못한다."
3295668707-NameKr = "예술가의 침실"
3295668707-DescriptionKr = "작업실 구석에 놓인 소파. 숙면에는 부적합한 구조지만 밤을 새다보면 그런 건 문제가 아니다."
1553171869-NameKr = "계단식 단상"
1553171869-DescriptionKr = "연설이나 강론을 하는 데에 사용되는 계단식 단상. 잠깐 동안 사람들을 발아래에 둘 수 있다. "
2800446403-NameKr = "혼돈의 대형 그린라이트 데스크"
2800446403-DescriptionKr = "어질러진 대형 책상. 면학의 결과일까, 난장의 흔적일까."
4066808432-NameKr = "혼돈의 중형 그린라이트 데스크"
4066808432-DescriptionKr = "어질러진 중형 책상. 사감대가 도착했을 시점에는 이미 사태가 끝난 뒤였다."
4137013604-NameKr = "장식용 목조 벽체"
4137013604-DescriptionKr = "와일드헌트의 분위기와 잘 어울리는 장식용 벽체. 파란 벽지가 좋은 포인트가 되어 준다."
2042621021-NameKr = "체크무늬 석조 바닥"
2042621021-DescriptionKr = "체크 무늬 패턴의 석조 바닥. 무수한 사람들이 걸어 다녔지만 그 빛을 잃지 않았다."
461885748-NameKr = "수묵 배경"
461885748-DescriptionKr = "흑과 백이 조화를 이루고 있는 배경. 마치 수묵화와 같은 절제된 미가 돋보인다."
885678970-NameKr = "초대형 책장"
885678970-DescriptionKr = "온갖 종류의 책이 꽂힌 초대형 책장. 사다리 없이 꼭대기의 책을 뽑는 것은 어렵다."
388379301-NameKr = "서가용 사다리"
388379301-DescriptionKr = "책장을 오르내리는 데에 쓰이는 사다리. 올라보고 싶은 욕구를 불러일으킨다는 문제가 있다."
2107674786-NameKr = "전시용 책장"
2107674786-DescriptionKr = "골동품이나 장식물을 올려두기 위한 책장. 많은 학생들이 이 앞에서 서성이곤 한다."
1976657339-NameKr = "광란의 회화 작업대"
1976657339-DescriptionKr = "작업 중인 화가의 자리. 영감 혹은 광기가 휩쓸고 지나간 듯 하다."
51435562-NameKr = "예술가의 머릿속"
51435562-DescriptionKr = "학생들의 잡동사니가 쌓여 있는 탁자. 혼란스럽지만, 누군가는 이곳에서도 예술을 채굴해낸다."
3731052108-NameKr = "와일드헌트 휘장"
3731052108-DescriptionKr = "와일드헌트의 엠블럼이 직조되어 있는 휘장.  "
2911873771-NameKr = "테라스 음악당"
2911873771-DescriptionKr = "언제든 연주회가 가능하도록 악기들이 비치되어 있는 테라스. "
2229322849-NameKr = "예술정보관 내부 출입로"
2229322849-DescriptionKr = "와일드헌트의 도서관인 예술정보관으로 통하는 내부 출입로. 드나드는 사람들로 늘 북적인다."
3162765576-NameKr = "와일드헌트 나선 계단"
3162765576-DescriptionKr = "건물 위층으로 올라갈 수 있는 나선 계단. 발판 너비가 좁으니 뛰지는 말자."
449383509-NameKr = "모눈 타일 벽"
449383509-DescriptionKr = "네온 벽 조명이 포인트인 타일 벽. 공간 전체를 감싸는 세련된 멋을 느낄 수 있다."
317185934-NameKr = "에어하키 게임기"
317185934-DescriptionKr = "에어하키를 즐길 수 있는 게임기. 생각보다 운동 효과가 매우 뛰어나다!"
4174563702-NameKr = "스피드레이스 게임기"
4174563702-DescriptionKr = "홀로그램으로 즐기는 스피드레이스 게임기. 현실감 넘치는 레이싱을 즐길 수 있다."
3525024437-NameKr = "댄싱스타 게임기"
3525024437-DescriptionKr = "댄스 리듬 게임을 즐길 수 있는 댄싱스타. 오늘 밤 주인공을 가릴 수 있다."
3899342975-NameKr = "예비 공구 상자"
3899342975-DescriptionKr = "예비 공구를 담아 둔 상자다. 작은 공구부터 잃어버리기 쉬운 법이다."
1319411039-NameKr = "예비 물자 컨테이너"
1319411039-DescriptionKr = "예비 물자를 모아 둔 컨테이너다. 개인 물건을 담는 곳이 아니다."
3374132052-NameKr = "정비 상자"
3374132052-DescriptionKr = "정비 부품을 모아 둔 상자다. 예비 부품은 언제나 중요하다."
961513063-NameKr = "에너지 셸 박스(소)"
961513063-DescriptionKr = "예비 에너지 셸을 담은 박스다. 취급에는 주의할 필요가 있다."
3267432957-NameKr = "에너지 셸 박스(대)"
3267432957-DescriptionKr = "예비 에너지 셸을 담은 박스다. 사용 후에는 폐기 절차를 확실히 지키도록 하자."
612545809-NameKr = "다용도 상자 패턴 1"
612545809-DescriptionKr = "여러 용도로 사용할 수 있는 상자다. 방에 가지고 돌아가는 것은 그만두자."
1096463814-NameKr = "정비 섹션 타일(중)"
1096463814-DescriptionKr = "상대적으로 중간 크기의 장비를 정비할 수 있는 섹션이다."
