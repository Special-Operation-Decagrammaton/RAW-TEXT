537637411-NameTh = "BINAH"
537637411-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 3 ของเดคาแกรมมาทอน องค์ประกอบจากเครื่องกล AI ที่มี\nรูปร่างผสมระหว่างงูยักษ์กับปลาวาฬ\n\nคาดว่าต้นกำเนิดของชื่อมาจาก <BINAH> เซฟิร่าลำดับที่ 3 ของต้นไม้แห่งชีวิต\nปัจจุบันยังไม่มีใครรู้แหล่งกำเนิดและหลักการทำงาน แต่มีการสันนิษฐานว่า\nร่างกายประกอบไปด้วยเทคโนโลยีล้ำขีดจำกัด ที่แม้แต่เทคโนโลยีคิโวทอสก็ไม่\nอาจทำตามได้\n\nบีนาห์มีความสามารถในการเคลื่อนไหวไปมาใต้ดิน และหากซ่อนตัวอยู่ใต้พื้นดิน\nจะไม่สามารถหาตัวได้ง่ายๆ ด้วยเทคโนโลยีที่มีในปัจจุบัน\nบีนาห์ปรากฏตัวในเขตปกครองตนเองของอะบิดอสเป็นหลัก\nจึงสันนิษฐานว่าพื้นทะเลทรายนั้นเป็นสภาพแวดล้อมที่เหมาะสมในการอยู่\nอาศัยของบีนาห์\n\nบันทึกเกี่ยวกับบีนาห์มีน้อยมากแต่ก็ถูกกล่าวถึงมาเรื่อยๆ ตั้งแต่สมัยอดีต\nในบันทึกกล่าวไว้ว่า บีนาห์ถูกพบในทะเลทรายอะบิดอสเป็นครั้งแรก\nเมื่อหลายสิบปีก่อน การพบเห็นและการปะทะกับบีนาห์ยังคงมีให้เห็นจนถึง\nปัจจุบัน ว่ากันว่าในตอนที่ <เซนต์ เนฟธิส> บริษัทท้องที่ในอะบิดอสเริ่มก่อสร้าง\nทางรถไฟข้ามทะเลทราย บีนาห์ก็มาปรากฏตัวในไซต์ก่อสร้างอยู่หลายครั้ง\n\nข้อมูลจากบันทึกล่าสุดกล่าวถึงการปะทะระหว่างบีนาห์กับไคเซอร์ PMC ที่ตั้ง\nฐานอยู่ในทะเลทรายของอะบิดอส และด้วยเหตุนี้การขุดค้นของไคเซอร์กรุ๊ป\nจึงช้ากว่ากำหนดไปอยู่มาก\n\nเมื่อ 2 ปีก่อนสภานักเรียนอะบิดอส ได้รวบรวมข้อมูลและเรื่องเล่าจากผู้พบเห็น\nเพื่อจัดทำข้อมูลการค้นคว้าอย่างละเอียดเกี่ยวกับบีนาห์ แต่ข้อมูลนี้ก็หายไปใน\nระหว่างย้ายอาคารส่วนกลางของโรงเรียนอะบิดอส\n\nปัจจุบันยังไม่อาจระบุได้อย่างแน่ชัดว่าบีนาห์ออกมาปรากฏตัวด้วยจุดประสงค์ใด"
1367499131-NameTh = "CHESED"
1367499131-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 4 ของเดคาแกรมมาทอน AI ระบบการผลิตอัตโนมัติของ\nโรงงานอาวุธที่ถูกทิ้งไว้ในพื้นที่รกร้างและถูกแฮ็กโดยเดคาแกรมมาทอน\n\nสันนิษฐานว่าชื่อมีที่มาจาก <CHESED> ที่เป็นเซฟิร่าลำดับที่ 4 ในต้นไม้แห่งชีวิต \n\nร่างกายของเชเซ็ดได้รับการปกป้องด้วยโครงร่างขนาดมหึมา\nจึงไม่สามารถทำลายได้ด้วยวิธีทั่วไป นอกจากนี้ยังมีหุ่นยนต์จำนวนมากที่สร้าง\nจากโรงงานอาวุธมาปกป้องมันด้วย\n\nเชเซ็ดคือใจกลางที่สำคัญที่สุดของเดคาแกรมมาทอน ไม่มีสิ่งใดที่เป็นภัยคุกคาม\nมันได้ และตราบใดที่เชเซ็ดยังอยู่ กองกำลังของเดคาแกรมมาทอนก็จะไม่หมดไป\nการที่ปฏิบัติการทางทหารของเดคาแกรมมาทอนในคิโวทอสยังคงเป็นสงคราม\nยืดเยื้อจึงคาดว่ามาจากเหตุผลนี้"
1769839732-NameTh = "CHOKMAH"
1769839732-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 2 แห่งเดคาแกรมมาทอน\nAI ระบบควบคุมการนำทางของเรือสอดแนมที่ถูกเดคาแกรมมาทอนแฮ็ก\n\nสันนิษฐานว่าชื่อมีที่มาจาก <CHOKMAH> เซฟิร่าลำดับที่ 2 ของต้นไม้แห่งชีวิต สามารถเปลี่ยนรูปร่างและโครงสร้างได้ยืดหยุ่นกว่าผู้เลื่อมใสอื่น และยากที่จะรู้จุดประสงค์ในการเคลื่อนไหวของมัน ในตอนนี้สันนิษฐานได้ว่า สามารถกำหนดและเปลี่ยนแปลงจุดประสงค์ในการกระทำของตนเองได้\n\nแม้ว่ารูปแบบพื้นฐานจะดูน่าสนใจมากพอแล้ว แต่รูปแบบที่สองก็เรียกได้ว่าเป็นภัยคุกคามที่แท้จริงของชอกมาห์"
3284843262-NameTh = "GEBURAH"
3284843262-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 5 แห่งเดคาแกรมมาทอน ตัวตนที่แท้จริงยังคงอยู่ในขั้นตอนการวิจัย แต่คาดว่าคือ AI ของยานสำรวจไร้คนขับ\nที่ฐานการวิจัยขั้วโลกที่ถูกเดคาแกรมมาทอนแฮ็ก\n\nสันนิษฐานว่าชื่อมีที่มาจาก <GEBURAH> เซฟิร่าลำดับที่ 5 ของต้นไม้แห่งชีวิต\n\nสามารถเคลื่อนที่ได้อย่างอิสระในน้ำ และดูเหมือนว่าจะรักษาฟังก์ชันการค้นหาของ\nยานสำรวจไร้คนขับในรูปแบบดั้งเดิมเอาไว้ คุณลักษณะอีกประการหนึ่งคือมีอาวุธ\nหลากหลายชนิด สันนิษฐานว่าถูกพัฒนาเพิ่มเติมโดยยังคงฟังก์ชันการป้องกัน\nตัวเองแบบเดิมไว้\n\nถือเป็นผู้เลื่อมใสที่คาดเดารูปแบบดั้งเดิมได้ยาก แต่มีสิ่งหนึ่งที่แน่นอนคือ จะไม่เปลี่ยนแปลงสภาพแวดล้อมในอุณหภูมิต่ำที่ตนอยู่แม้สักนิดเดียว"
3359469350-NameTh = "HOD"
3359469350-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 8 ของเดคาแกรมมาทอน AI หน่วยเครือข่ายสื่อสารในเขต\nปกครองตนเองมิลเลเนียมที่ถูกแฮ็กโดยเดคาแกรมมาทอน\n\nสันนิษฐานว่าชื่อมีที่มาจาก <HOD> ที่เป็นเซฟิร่าลำดับที่ 8 ในต้นไม้แห่งชีวิต\n\nตัวตนที่แท้จริงคือ <HUB> หน่วยเครือข่ายสื่อสารในโรงเรียนวิทย์มิลเลเนียม ซึ่งมี\nหน้าที่ในการติดตั้งและซ่อมแซมสายสื่อสารที่อาคารชั้นใต้ดินของโรงเรียน\n\nการดูแลเครือข่ายสื่อสารในมิลเลเนียมที่โยงใยกันเหมือนใยแมงมุม ถือเป็นงานที่\nซับซ้อนมาก ดังนั้นส่วนหัวของ HUB จึงติดตั้งอุปกรณ์ประมวลผลประสิทธิภาพสูง\nส่วนลำตัวติดตั้งอุปกรณ์ขุดเจาะสำหรับงานสายสื่อสารใต้ดิน และมีแขนติดพอร์ต\nเชื่อมต่อจำนวนมาก รูปร่างของ HUB เลยดูเหมือนปลาหมึกยักษ์\n\nHUB เป็นหน่วยที่มีประวัติศาสตร์ยาวนานมาตั้งแต่ช่วงก่อตั้งโรงเรียนวิทย์มิลเลเนียม แต่ปกติมักจะหมกมุ่นกับการซ่อมแซมสายสื่อสารใต้ดิน ทำให้นักเรียนมิลเลเนียม\nเองก็ไม่รู้ว่ามันมีอยู่จริง \n\nแต่เมื่อมีการก่อสร้างขนาดใหญ่ มันจะปรากฏตัวบนพื้นดินเพื่อทำงานชั่วคราว สร้าง <เสาชั่วคราว> และมีความเร็วในการควบคุมอาคารและขยายสายสื่อสารได้อย่าง\nรวดเร็ว แบบที่ไม่มีวิศวกรของมิลเลเนียมคนไหนเทียบได้\n\nหากพูดถึงความพิเศษที่แตกต่างจากผู้เลื่อมใสตนอื่นก็คือ ความเกี่ยวข้องกับ\nนักเรียนมิลเลเนียมในกระบวนการปฏิสัมพันธ์แรกเริ่ม มีเครื่องขยายสัญญาณ EMP แทรกซึมลงสู่พื้นดินผ่านเคอร์เนลใต้ดินไปลึกถึง 3 กม. และสร้าง <เสากัดกร่อน> ที่เปลี่ยนไปกัดกร่อนเพื่อขยายอาณาเขตของตน \n\nตอนนี้มันเป็นสิ่งอันตรายเหมือนกับเรดาร์ AI ที่พยายามทำให้ทั้งคิโวทอสเป็นของตน"
2539375741-NameTh = "KETHER"
2539375741-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 1 ของเดคาแกรมมาทอน ถูกพบเป็นครั้งแรกในพื้นที่จมน้ำรกร้าง ขณะที่ป้องกันอาณาเขตพิเศษในพื้นที่จมน้ำอยู่\n\nเนื่องจากเขาเป็นผู้เลื่อมใสลำดับที่ 1 จึงคาดว่าเขามีความก้าวหน้าทางเทคโนโลยีและความซับซ้อนของ A.I ด้อยกว่าผู้เลื่อมใสตนอื่น เขามีลักษณะพิเศษที่โครงสร้างทางวิศวกรรม ซึ่งสามารถเปลี่ยนอาวุธบนลำตัวได้หลากหลายและเดินสี่ขาได้ ต่างจากผู้เลื่อมใสตนอื่น\n\nสันนิษฐานว่ามีฐานที่ใช้จัดการและเปลี่ยนส่วนประกอบของเคเทอร์อยู่ที่ไหนสักแห่ง จึงสามารถเตรียมอาวุธที่ได้เปรียบเชิงกลยุทธ์ในทุกการต่อสู้ จากที่สังเกตรูปแบบการต่อสู้ของเคเทอร์จนถึงปัจจุบัน จะแบ่งได้เป็น 3 แบบ ซึ่งอาจจะมีรูปแบบการต่อสู้มากกว่านี้ให้เลือกใช้ได้ตามลักษณะเฉพาะก็เป็นได้"
1251359687-NameTh = "MALKUTH"
1251359687-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 10 ของเดคาแกรมมาทอน สันนิษฐานได้ว่านามนั้นมีที่มาจาก <MALKUTH> เซฟิร่าลำดับที่สิบของต้นไม้แห่งชีวิต\n\nในต้นไม้แห่งชีวิต มัลคูธหมายถึงกระแสสุดท้ายของทางแห่งดาบเพลิง และกล่าวกันว่าการเดินในเส้นทางนี้จะนำไปสู่การสร้างสรรค์ในโลกแห่งวัตถุ\n\nมัลคูธต่างจากผู้เลื่อมใสตนอื่นๆ ที่ไม่สามารถพูดคุยได้ ทั้งยังมีร่างกายคล้าย\nมนุษย์ผู้หญิงโดยสมบูรณ์ และสามารถสื่อสารได้อย่างเป็นธรรมชาติ แต่ในอีกแง่หนึ่ง คำพูดและการกระทำของมัลคูธก็ดูจะเอนเอียงไปทางใดทางหนึ่งอย่างมากทีเดียว"
439214304-NameTh = "NETZACH"
439214304-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 7 แห่งเดคาแกรมมาทอน สันนิษฐานได้ว่านามนั้นมีที่มาจาก <NETZACH> เซฟิร่าลำดับที่เจ็ดของต้นไม้แห่งชีวิต\n\nปัจจุบันได้วิวัฒนาการกลายเป็นดินแดนเหล็กกล้าด้วยวิธีการบางอย่าง ดังนั้นจึงไม่มีทางที่จะล่วงรู้รูปร่างดั้งเดิมได้ในขณะนี้\n\nมันเปลี่ยนสารอนินทรีย์โดยรอบทั้งหมดให้กลายเป็นส่วนประกอบที่คล้ายกับ\nดินแดนเหล็กกล้า แล้วขยายขอบเขตไปจนทำให้ส่วนประกอบเหล่านั้นกลายเป็น\nส่วนหนึ่งของตัวเอง ซึ่งขีดจำกัดของการขยายตัวนี้เป็นสิ่งที่ไม่สามารถประเมินได้"
2166637992-NameTh = "TIPHARETH"
2166637992-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 6 แห่งเดคาแกรมมาทอน คาดว่าเกิดจาก AI ของคลังเก็บเมล็ดพันธุ์ ในเขตขั้วโลกที่ถูกเดคาแกรมมาทอนแฮ็ก\n\nสันนิษฐานว่าชื่อมีที่มาจาก <TIPHARETH> เซฟิร่าลำดับที่ 6 ของต้นไม้แห่งชีวิต\n\nคาดการณ์ว่าทิฟาเร็ธเข้ายึดครองทั้งระบบหลักของคลังเก็บเมล็ดพันธุ์ และวิวัฒนาการต่อมา แต่มีจุดหนึ่งที่น่าสงสัยคือยังพยายามรักษาเป้าหมายเดิม ในการปกป้องคลังเก็บเมล็ดพันธุ์เอาไว้\n\nมีการยืนยันแล้วว่าสิ่งอำนวยความสะดวกนี้สร้างโดยสถาบันสหภาพเรดวินเทอร์ แต่ดูเหมือนว่าสถาบันสหภาพเรดวินเทอร์ในปัจจุบันจะไม่รู้ถึงความเกี่ยวข้อง\nของตนกับคลังเก็บเมล็ดพันธุ์นี้"
1862639856-NameTh = "YESOD"
1862639856-DescriptionTh = "ผู้เลื่อมใสลำดับที่ 9 แห่งเดคาแกรมมาทอน สันนิษฐานได้ว่านามนั้นมีที่มาจาก <YESOD> เซฟิร่าลำดับที่เก้าของต้นไม้แห่งชีวิต\n\nปรากฏตัวขึ้นครั้งแรกที่ดินแดนเหล็กกล้า แต่ดูเหมือนว่าตัวตนนี้จะไม่มีโครงสร้างต้นแบบที่มีอยู่จริง ดังนั้นจึงสันนิษฐานได้ว่า เยซ็อดน่าจะเป็นผู้เลื่อมใสที่ถูกสร้างขึ้นบนรากฐานของดินแดนเหล็กกล้า หลังจากที่ดินแดนแห่งนั้นถูกสร้างขึ้นจนเป็นรูปเป็นร่างแล้วในระดับหนึ่ง\n\nจากที่กล่าวมาข้างต้นจึงมีความเป็นไปได้ว่า เยซ็อดคือผู้เลื่อมใสที่ถูกออกแบบมาให้ 'สมบูรณ์แบบที่สุด' เพื่อทำภารกิจหนึ่งให้สำเร็จ โดยไม่จำเป็นต้องมีร่างต้น หรือการครอบงำสิ่งใดเหมือนผู้เลื่อมใสตนอื่น"
