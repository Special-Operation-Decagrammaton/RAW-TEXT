2319299758-NameTw = "亞瑠十分珍貴的錢包"
2319299758-DescriptionTw = "亞瑠愛用的高級錢包。\n雖然是用優質原料製作的高級品，但因為用了很久的時間，所以各處都有些褪色或瑕疵。首次創立便利屋後，遙香、佳世子、無月一起合資送給亞瑠的禮物，對亞瑠來說是用任何東西都無法交換的珍貴物品。"
3741719919-NameTw = "超冷卻電風扇"
3741719919-DescriptionTw = "英美為了在炎熱的地區活動而準備的祕密兵器。\n外觀雖然可愛，卻能製造出危險等級的強風。與強大的風力相比，能吹到風的範圍相對有限，因此想讓多個對象同時吹到風必須緊貼彼此的身體。"
375503055-NameTw = "陽奈的風紀委員會臂章"
375503055-DescriptionTw = "陽奈平常穿戴的風紀委員會的臂章。對某些人來說，臂章或許單純表示著風紀委員會成員的身分。不過對陽奈來說，這是能喚醒自己身為風紀委員長責任的物品。乘載在這個臂章上的重量絕對不輕。"
4285150101-NameTw = "暢通無阻入場券"
4285150101-DescriptionTw = "星野主張「無論在哪裡都能進入夢鄉」的枕頭。雖然就像星野所說的一樣非常柔軟，但現在已經買不到相同的產品了。"
49207748-NameTw = "寧瑠的絲卡將"
49207748-DescriptionTw = "從不曾看過寧瑠脫下的絲卡將。詢問執著的理由後，得到的答覆相當簡單明瞭。"
3203934447-NameTw = "幸運的熱狗模型"
3203934447-DescriptionTw = "精緻到味道與質感幾乎都和真正的熱狗相同的塑膠製熱狗模型。\n使用3D列印機製作。連咬過一口的痕跡都有重現。泉認為這個模型不僅味道很棒，還可能讓能吃到美食的幸運頻繁降臨，因此隨身攜帶著。"
1865059509-NameTw = "白子的無人機"
1865059509-DescriptionTw = "白子平常都帶在身邊的無人機。白子本人雖然主張那是運動時使用的拍攝用無人機，但卻設置了許多和拍攝沒有關係的「附加裝置」。"
1017510971-NameTw = "訓練用沙袋"
1017510971-DescriptionTw = "形狀像護腿的沙袋，可以綁在手臂或腿上。除了沙子之外，還含有鐵粉，所以比想像中還要重。"
1197583309-NameTw = "弦生的特別箱子"
1197583309-DescriptionTw = "藏在弦生房間深處的週邊箱子。\n堆有海報、書籍、電影票等不論類型的各種週邊商品。光看那上面沒有灰塵還整理得有條有理，就可以看出弦生細心的一面。"
4034964291-NameTw = "愛麗絲的花丸貼紙"
4034964291-DescriptionTw = "讓每件事都順心如意，幸運值上升……是辦不到的，\n不過充滿了愛麗絲的心意。"
2870052181-NameTw = "掌上型遊戲機"
2870052181-DescriptionTw = "綠與姐姐第一次購買的掌上型遊戲機。\n是部蘊含著吵架、和好、為了冰淇淋展開對決等等諸多回憶的遊戲機。"
3484495552-NameTw = "褪色的CD"
3484495552-DescriptionTw = "寫著柚子名字的舊CD。\n存有《故事．傳說．編年史》原型最終版的母片，柚子一度光是看到這張CD就會勾起痛苦的回憶。"
2992891006-NameTw = "風紀委員會的備用泳圈"
2992891006-DescriptionTw = "格黑娜風紀委員會正式採用的備用泳圈。\n有著與普通泳圈不同的材質與功能，很有風紀委員會的風格。是還不擅長游泳的陽奈一直很依賴且重視的物品。"
1279061846-NameTw = "鬆軟毛毯"
1279061846-DescriptionTw = "繡著格黑娜學園標誌的毛毯。用途多樣，而且上面似乎還殘留著伊織的體溫……"
1059841421-NameTw = "旬小時候的回憶"
1059841421-DescriptionTw = "旬珍惜的一對貝殼製髮夾。\n長大後很少會綁雙馬尾，所以就很少使用，但對旬來說是即使歲月流逝也不會遺忘的珍貴回憶的一部分。"
242283010-NameTw = "兔尾手榴彈"
242283010-DescriptionTw = "明日奈穿著兔女郎服裝時配戴的兔尾巴模樣的手榴彈。\n因為有柔軟的毛覆蓋著，所以乍看之下可能覺得無害，卻有著跟其他手榴彈一樣大的破壞力。"
2635859011-NameTw = "隱藏祕密的狐狸面具"
2635859011-DescriptionTw = "若藻平時愛用的狐狸面具。令若藻十分滿意的物品，本來的用途是為了隱藏自己的真實身分，避免被捲入無謂的事件之中，但如今隱藏在面具底下的祕密早已遠遠不止如此。是一款非常適合用來掩藏滿溢少女純情的時尚單品。"
2119169468-NameTw = "充滿夢想的櫻花色圍裙"
2119169468-DescriptionTw = "三森的櫻花色圍裙。無論是打掃還是煮飯的時候，都可說是最得力的好夥伴。"
1916503017-NameTw = "物品管理帳簿"
1916503017-DescriptionTw = "日向親手製作的三一大教堂物品管理帳簿。\n大教堂所有常備品的放置處及數量都整理得相當仔細。由於需要的常備品大多是由日向親自幫忙找，所以外人通常不知道這本管理帳簿的存在。"
2698379035-NameTw = "破舊的名牌"
2698379035-DescriptionTw = "都子在訓練生時期使用的破舊名牌。乍看之下像是一塊破布，但對都子來說，是寄託了往日夢想的珍貴物品。"
578130730-NameTw = "傷心兔兔保溫瓶"
578130730-DescriptionTw = "美優隨身攜帶的小型保溫瓶。珍藏在畫有悲傷兔子的包包中。"
3853159441-NameTw = "木雕像"
3853159441-DescriptionTw = "沙織小時候用刀雕刻出來的粗糙雕像。非常老舊，連沙織本人也忘得一乾二凈。"
3465934622-NameTw = "華麗花紋陽傘"
3465934622-DescriptionTw = "若藻所使用的華麗陽傘。\n蘊含著若藻想永遠記住對老師的愛的純真心意。"
2513809664-NameTw = "裝滿寶物的包包"
2513809664-DescriptionTw = "去海邊時，知世帶來的可愛時尚小包包。外面掛著佳穗因為擔心會弄丟而親手掛上的名牌。知世把在海邊獲得的無數回憶裝進了這個包包裡。雖然也有些東西沒能裝進去，但那份回憶永遠不會消失。"
23410748-NameTw = "沙織的面罩"
23410748-DescriptionTw = "沙織總是佩戴的面罩。雖然看得出年代久遠，但也能感受到它陪伴主人歷經無數戰鬥的深厚情感。"
526288530-NameTw = "高性能耳機"
526288530-DescriptionTw = "能徹底隔音、支援特殊聲音處理，甚至完美防駭的高性能女僕兼特務專用耳機。\n根據季的主張，這是象徵與重要之人連結的物品。"
2538736248-NameTw = "勝負硬幣"
2538736248-DescriptionTw = "小雪親手鑽孔的硬幣。\n原本是為了免費使用遊戲機，但隨著安全技術的進步，如今已成為無用之物。"
3979908227-NameTw = "學生們的感謝狀"
3979908227-DescriptionTw = "百鬼夜行的學生送給佳穗的感謝狀。放在相框中珍藏著。"
1620828120-NameTw = "女僕的喀秋莎"
1620828120-DescriptionTw = "為拖把、女僕裝、女僕喀秋莎這三大女僕勇者證明之一……是愛麗絲認為三者之中最重要的裝備。"
223298101-NameTw = "青春的白色緞帶"
223298101-DescriptionTw = "蓮華喜愛的青春小說主角所佩戴的緞帶。\n寄託著蓮華希望自己也能迎來類似青春的心願。"
2108207432-NameTw = "舊祭典人偶"
2108207432-DescriptionTw = "海花第一次參加祭典時買下的人偶。\n是一對成雙的造型。"
172883371-NameTw = "風吹來的聲音"
172883371-DescriptionTw = "知世繫上的風鈴。據說知世等待的清澈爽朗的聲音是涼風吹來的信號。"
945811089-NameTw = "陳舊的實現正義部名冊"
945811089-DescriptionTw = "因長時間的使用而變得陳舊、沾染了手痕的筆記本。\n詳細記錄了部員們的喜好與特長。或許持續的關注與觀察，是他表達愛意的獨特方式也說不定。"
351540743-NameTw = "祕密願望清單"
351540743-DescriptionTw = "野乃美偷偷寫下的筆記。上面寫著將來想和對策委員會的成員們一起做的事。"
2878555129-NameTw = "美食筆記"
2878555129-DescriptionTw = "淳子愛用的筆記本。淳子把去過的美食餐廳都分區評分記錄下來，是一本特別的記事本。"
3704183677-NameTw = "茜香的運動包"
3704183677-DescriptionTw = "茜香的黑色運動包。唸書用、打工用、運動用、整備用……不管什麼都裝得下的萬能包包。"
163861415-NameTw = "優香的函數計算機"
163861415-DescriptionTw = "優香總是隨身攜帶的函數計算機。\n即使擁有傑出的心算實力，優香仍會使用計算機進行驗算，以追求完美。"
1286967671-NameTw = "裝在收納盒裡的舊遊戲機"
1286967671-DescriptionTw = "桃井與妹妹第一次一起購買的掌上型遊戲機。\n桃井的「遊戲推坑作戰」似乎就這樣圓滿成功了……"
2856730141-NameTw = "復刻限定版收藏"
2856730141-DescriptionTw = "復刻限定的漫畫書收藏。即使不是所有人都認同，但只要對自己而言是珍貴的，那它就是值得珍惜的。"
1977526069-NameTw = "淚珠眼鏡"
1977526069-DescriptionTw = "亞都梨總是戴著的特殊眼鏡。\n雖然外觀乍看之下有點奇特，但這副眼鏡是為了幫助人們聆聽說明而製作的。展現著亞都梨的貼心。"
1261922711-NameTw = "巡邏者耳機"
1261922711-DescriptionTw = "鈴美每次巡邏時攜帶的耳機。她把它取名為「巡邏者耳機」，但其實只是普通的泛用品。"
3176499349-NameTw = "盛夏冰桶"
3176499349-DescriptionTw = "盛夏的冰桶。聽說裡面裝滿了夏季的水果、飲料……以及泉親手調配的祕製香料。"
3783629365-NameTw = "老舊的忍者錄影帶"
3783629365-DescriptionTw = "老舊的普通錄影帶。\n不過據說裡面存著引導三千留走上忍者之路的影像…… "
2740802403-NameTw = "巨匠的護目鏡"
2740802403-DescriptionTw = "經過多次改造的響專用護目鏡。除了功能性之外，響對它的外型也相當滿意。"
3126054698-NameTw = "看故事學成語"
3126054698-DescriptionTw = "通過古老的故事，幫助人們輕鬆理解各種諺語和成語的書。\n非常符合麻白的品味。"
4237292601-NameTw = "Momo好友特別茶壺"
4237292601-DescriptionTw = "日步美表示這是搭乘坦克來到海邊的必需品而帶來的茶壺。\n是為了在戰車上使用而製造的特殊茶壺。雖然是戰車用品，但實際上是日步美自費購買的個人用品。"
794937786-NameTw = "沙耶的滑板"
794937786-DescriptionTw = "專為沙耶裝飾設計的滑板。和自行車或滑板車不同，可以自由地使用雙手，相對地也十分講求熟練度。"
2694523503-NameTw = "洗澡輔佐官"
2694523503-DescriptionTw = "把鬍鬚貼在大量訂購的橡膠小鴨上製作而成的赤冬聯邦學園的新紀念品。\n潔莉諾說這玩意兒是小孩子用的，似乎不太喜歡這種橡膠小鴨。但聽說他每次去洗澡的時候一定會帶去。"
664556707-NameTw = "SRT基礎教範"
664556707-DescriptionTw = "咲希隨身攜帶的SRT特殊學園標準配發教範。雖然因為反覆閱讀與學習而顯得老舊，但他仍細心保存著。"
2395802552-NameTw = "甲蟲皇后卡片保護套"
2395802552-DescriptionTw = "防止卡片受損的保護套。包含楓第一次購買的甲蟲皇后保護套的普通版。據說在正式大賽中，必須使用保護套才能參賽的情況很多。"
3530712502-NameTw = "花繪的禮物袋"
3530712502-DescriptionTw = "裝滿花繪的禮物的袋子。裡面滿滿都是花繪認為人們會需要的東西。"
2177848562-NameTw = "蝴蝶造型翅膀裝飾"
2177848562-DescriptionTw = "羽留奈的翅膀裝飾。\n據說會依情況、心情與意義，隨時更換不同的翅膀飾品。"
2059299965-NameTw = "雅典娜3號"
2059299965-DescriptionTw = "總是在晴附近徘徊的球體無人機。\n如同它的名字是以智慧女神來取名一樣，雖然裝載著會自己學習經驗的人工智慧，偶爾卻會採取與主人晴的意圖背道而馳的行動，違背她的期待。"
1544503704-NameTw = "巨匠的工具組"
1544503704-DescriptionTw = "集詠葉的愛好於一身，專屬於他的客製工具組。\n這個以巨匠的自豪親手製作的工具組，在某種意義上說是奇普托斯獨一無二的存在也不為過吧。"
3580703064-NameTw = "充滿回憶的茶具套組"
3580703064-DescriptionTw = "靜子使用的第一組茶具。雖已飽經風霜，卻保有靜子泡第一杯茶時的回憶。"
3706177967-NameTw = "可疑的古典文學"
3706177967-DescriptionTw = "從各種方面來說都十分耐人尋味的花子珍藏書籍。雖然經常被沒收，但是花子總會千方百計找回來。"
4052244851-NameTw = "端莊的白色花飾"
4052244851-DescriptionTw = "因為象徵著不會凋謝的白花，買家為使自己銘記莫忘初心而買下的花飾。但究竟買主有沒有做到呢……？"
925075194-NameTw = "千夏的醫療包"
925075194-DescriptionTw = "千夏從急救醫學部時期就一直使用的大型醫療包。裡面裝滿了各式醫療用品，能感受到他對周遭的細膩關懷。"
3030262627-NameTw = "甜點掠奪者"
3030262627-DescriptionTw = "喜美專用的叉匙。為了在需要時能立刻用上而一直放在懷裡。即使用了很久依然是精品。"
