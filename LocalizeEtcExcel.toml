401193572-DescriptionKr = "숲을 표현한 녹색의 나무 무늬 배경. 울창한 숲의 싱그러운 느낌을 준다."
525384229-NameKr = "캠핑 그릴 세트 화로 "
525384229-DescriptionKr = "맛있는 그릴 요리가 가득한 장작불 화로. 캠핑에 낭만적인 분위기를 더해준다."
