3048997368-NameTh = "ใช้เอฟเฟกต์ที่มีประโยชน์กับหุ่นรบล้ำยุคเพื่อลดค่าป้องกันของศัตรู"
3048997368-DescriptionTh = "ค่า DEF ศัตรูจะเพิ่มขึ้น แต่ค่า DEF จะลดลงเมื่อหุ่นรบล้ำยุคได้รับบัฟที่มีประโยชน์ (ใช้ได้สูงสุด 5 อัน)"
