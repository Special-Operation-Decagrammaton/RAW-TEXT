3617828029-NameKr = "행사 홍보 디스플레이"
3617828029-DescriptionKr = "밀레니엄 내 행사를 홍보하는 디스플레이. 동아리 행사 신청은 세미나로!"
2047348994-NameKr = "방문객 체험형 디스플레이"
