2396453793-DescriptionKr = "초현상특무부가 아군을 지원합니다.\n\n적을 처치하면 초현상특무부가 데이터를 수집하여 해석을 진행합니다.\n데이터의 해석이 완료되면 게부라가 약화하고 동시에 아군을 강화시킵니다."
3833784038-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3833784038-DescriptionKr = "카스미가 열차에 미리 설치해둔 폭탄을 피하기 위해 앞쪽 칸으로 도망칩니다.\n폭탄이 터지기 전 앞쪽 칸으로 대피하세요."
3483475612-NameKr = "이벤트 챌린지 스테이지 2 힌트"
3483475612-DescriptionKr = "범위 공격에 주의하세요.\n\n후방에서의 습격에 대비합시다."
4029303020-NameKr = "이벤트 챌린지 스테이지 3 힌트"
4029303020-DescriptionKr = "아군 스트라이커 학생의 코스트 회복 속도가 대폭 감소합니다.\n\n적을 쓰러트리거나, 자판기를 파괴하면 코스트를 일정량 획득합니다."
28119784-NameKr = "이벤트 챌린지 스테이지 4 힌트"
28119784-DescriptionKr = "적의 공격 타입이 신비 속성으로 변경됩니다.\n\n하이랜더 열차 승무원 학생을 처치하면 일정량 코스트를 획득합니다.\n\n하이랜더 센트리건의 일반 공격은 낮은 확률로 대상에게 방어력 및 회피율을 감소시키는 해로운 효과를 중첩시키며 입힙니다."
3754973665-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3754973665-DescriptionKr = "적군의 헬멧단원들이 버려진 블랙마켓 오토마타를 앞세워 미사카 미코토를 공격합니다.\n\n미사카 미코토를 보호할 학생들을 편성해 적들의 공세에 대비하세요."
981107711-NameKr = "이벤트 챌린지 스테이지 2 힌트"
981107711-DescriptionKr = "쇼쿠호 미사키가 헬멧단원을 지속해서 조종합니다.\n\n쇼쿠호 미사키를 먼저 공략하여 조종당하는 헬멧단원을 막으세요."
247331126-NameKr = "이벤트 챌린지 스테이지 3 힌트"
247331126-DescriptionKr = "전방의 PMC 병사들이 피해를 입으면 PMC 파워로더도 함께 피해를 입습니다.\n\n후방에도 많은 적들이 출몰하니 광역 공격이 가능한 학생을 편성해보세요."
3717534249-NameKr = "이벤트 챌린지 스테이지 4 힌트"
3717534249-DescriptionKr = "버려진 튼튼한 블랙마켓 오토마타가 있는 동안에는 다른 적들을 처치하기 어렵습니다.\n\n힐러를 활용하여 돌아다니는 스위퍼와 허수아비로 적들을 수월하게 처치해보세요."
2028021589-NameKr = "이벤트 챌린지 스테이지 1 힌트"
2028021589-DescriptionKr = "군중제어 효과를 활용하여 적을 공략해보세요."
2080523366-NameKr = "이벤트 챌린지 스테이지 2 힌트"
2080523366-DescriptionKr = "적을 쓰러트리면 짧은 시간 동안 이로운 효과를 얻습니다.\n이로운 효과의 시간이 끝나기 전에 다음 적을 쓰러트리세요."
11412844-NameKr = "이벤트 챌린지 스테이지 3 힌트"
11412844-DescriptionKr = "매우 강력하고 흉포한 곰과 토끼들이 앞을 막아섭니다.\n곰을 혼란스럽게 하거나, 스미레를 지원하여 적들을 상대해 보세요. "
1768013184-NameKr = "이벤트 챌린지 스테이지 4 힌트"
1768013184-DescriptionKr = "엄폐물을 설치하여 적의 공격을 튕겨내보세요."
2920989374-NameKr = "이벤트 챌린지 스테이지 1 힌트"
2920989374-DescriptionKr = "사오리를 호위하며 양방향에서 나타나는 적들을 빠르게 처치하세요."
389255540-NameKr = "이벤트 챌린지 스테이지 2 힌트"
389255540-DescriptionKr = "아루(드레스)와 카요코(드레스)는 연계하여 EX 스킬을 사용합니다. 아루(드레스)가 카요코(드레스)에게 EX 스킬을 사용하지 못하도록 상대해 보세요."
2681487799-NameKr = "이벤트 챌린지 스테이지 3 힌트"
2681487799-DescriptionKr = "아군인 카요코(드레스)는 공격받지 않으면 EX 스킬이 더욱 강력해집니다. 보스의 광범위한 공격에 맞지 않도록 상대해 보세요."
3119514688-NameKr = "이벤트 챌린지 스테이지 4 힌트"
3119514688-DescriptionKr = "후방에서 강력한 피해를 주는 적을 먼저 처치하세요."
1154240687-NameKr = "이벤트 챌린지 스테이지 1 힌트"
1154240687-DescriptionKr = "다툼 중인 선도부원과 망량즈를 쓰러뜨리며, 축제의 평가 게이지를 0이 되지 않도록 유지해 봅시다. 일부 선도부원은 공격하면 반격해 옵니다."
826504021-NameKr = "이벤트 챌린지 스테이지 2 힌트"
826504021-DescriptionKr = "적들의 소환물은 점점 더 강해집니다. 소환물을 빠르게 처치하세요."
228867329-NameKr = "이벤트 챌린지 스테이지 3 힌트"
228867329-DescriptionKr = "스위퍼는 EX 스킬에 피격될 때마다 넉백되고 사망 시 주변에 피해와 디버프를 적용하는 특성이 있습니다.\n\n스위퍼가 적 근처에서 사망하도록 EX 스킬을 사용해 보세요."
3692835812-NameKr = "이벤트 챌린지 스테이지 4 힌트"
3692835812-DescriptionKr = "우미카의 폭죽 발사 장치를 지원하면서 축제를 방해하는 망량즈를 처치하세요.\n\n축제 준비가 25%씩 달성할 때마다 적과 아군에게 이로운 효과와 해로운 효과를 다양하게 부여합니다.\n\n적 보스 한냐 가면의 망량즈는 포탑이 입는 피해를 같이 입습니다. "
937127281-NameKr = "이벤트 챌린지 스테이지 1 힌트"
937127281-DescriptionKr = "적 전차는 공터를 향해 움직이기 시작하여 공터에 도착하면 강력한 공격을 합니다. \n\n적 전차는 EX 스킬 대미지에 강한 저항력이 있지만, 피격될수록 전차의 성능이 떨어집니다. \n\n이런 특성을 이용하여 적 전차가 공터에 도착하기 전에 처치하세요."
120747478-NameKr = "이벤트 챌린지 스테이지 2 힌트"
120747478-DescriptionKr = "방과후 디저트부 학생들이 스킬을 사용하지 못하도록 방해하세요."
3642446434-NameKr = "이벤트 챌린지 스테이지 3 힌트"
3642446434-DescriptionKr = "레이사에게 이로운 효과를 주면, EX 스킬을 사용합니다. 레이사를 도와 스케반을 무찌르세요."
284862043-NameKr = "이벤트 챌린지 스테이지 4 힌트"
284862043-DescriptionKr = "군중제어로 히피 오토마타를 약화시킨 후 먼저 공격하세요."
3412917378-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3412917378-DescriptionKr = "불량배의 EX스킬은 2번 맞을 경우 큰 대미지를 받습니다.\n\n허수아비의 HP를 100% 회복시키면 모든 아군 학생들이 빙결 상태가되며 불량배의 스킬을 막을 수 있습니다."
110115972-NameKr = "이벤트 챌린지 스테이지 2 힌트"
110115972-DescriptionKr = "발키리 학생들이 칸나를 돕기 위해 일정 시간마다 보충됩니다.\n\n발키리 학생들이 너무 많이 모이지 않도록 빠르게 쓰러트리세요."
2111941898-NameKr = "이벤트 챌린지 스테이지 3 힌트"
2111941898-DescriptionKr = "군중제어 스킬을 활용하여 칸나를 잠시 저지하고,\n앞의 적들을 빠르게 쓰러트려서 칸나로부터 벗어나세요."
184971332-NameKr = "이벤트 챌린지 스테이지 4 힌트"
184971332-DescriptionKr = "플라즈마장 발생 장치를 공격하고 힐러 학생으로 AMAS기체들을 도우세요.\n\n 개조 스위퍼는 EX스킬로만 처치가 가능합니다."
2842109547-NameKr = "이벤트 챌린지 스테이지 1 힌트"
2842109547-DescriptionKr = "히요리가 해안가를 달려가면서, 해안가의 모습을 보여줍니다.\n\n이후 히요리가 여러 차례 해안가를 달려가는데, 해안가의 모습이 처음과 다르다면 X 허수아비를, 동일하다면 O 허수아비를 타격하세요."
2522165937-NameKr = "이벤트 챌린지 스테이지 2 힌트"
2522165937-DescriptionKr = "탱커를 사용해 적들의 대미지를 견디세요."
388529582-NameKr = "이벤트 챌린지 스테이지 3 힌트"
388529582-DescriptionKr = "회복 스킬과 버프 스킬을 이용해 메카 악어를 도와 아케미를 쓰러뜨리세요."
472021647-NameKr = "이벤트 챌린지 스테이지 4 힌트"
472021647-DescriptionKr = "아케미에게 해로운 효과를 입히면 아케미 주위 적에게 해로운 효과가 전이됩니다. \n\n아케미 주위 적에게 피해를 입히면 아케미에게 피해가 전이됩니다.\n\n아케미가 사이드 체스트 자세를 취하면 일정 시간 동안 모든 아군과 적의 공격력이 증가하고 코스트 회복 속도가 증가합니다."
2507742254-NameKr = "이벤트 미니게임 Challenge 스테이지 01 힌트"
2507742254-DescriptionKr = "길을 따라 몰려오는 적들을 처치합시다.\n단시간 내 많은 타수로 공격하는 딜러를 편성하여\n빠른 속도로 습격해오는 붉은 스위퍼를 대비하세요."
2091083376-NameKr = "이벤트 미니게임 Challenge 스테이지 02 힌트"
2091083376-DescriptionKr = "길에 따라 다르게 대응하여 공격해 오는 적들을 대비합시다.\n허수아비로 아래 길의 적들의 공격을 막고,\n긴 사거리의 딜러로 길을 따라 몰려오는 윗길의 적들을 처치하세요."
3327008846-NameKr = "이벤트 미니게임 Challenge 스테이지 03 힌트"
3327008846-DescriptionKr = "길에 따라 다르게 대응하여 공격해 오는 적들을 대비합시다.\n단시간 내 많은 타수로 공격하는 딜러를 편성하여\n빠른 속도로 습격해 오는 붉은 스위퍼를 대비하세요."
1319806235-NameKr = "이벤트 미니게임 Challenge 스테이지 04 힌트"
1319806235-DescriptionKr = "길에 따라 다르게 대응하며 공격해오는 적들을 대비합시다.\n탱커로 윗길의 적들의 공격을 막고,\n긴 사거리의 딜러로 길을 따라 몰려오는 적들을 처치하세요."
3745893259-NameKr = "이벤트 미니게임 Normal 스테이지 01 힌트"
3745893259-DescriptionKr = "그룹을 지어 출현하는 적들을 주의하세요.\n적들이 모이면 한 번에 처치합시다."
3544666202-NameKr = "이벤트 미니게임 Normal 스테이지 02 힌트"
3544666202-DescriptionKr = "길에 따라 다른 형태로 공격해 오는 적들을 대비합시다.\n스위퍼들을 빠르게 처치한 후 아케미의 공격을 막으세요."
2852164857-NameKr = "이벤트 미니게임 Normal 스테이지 03 힌트"
2852164857-DescriptionKr = "위, 아래 길에서 출현하는 적들의 공격을 허수아비와 탱커로 막으세요.\n중간 길에서 출현하는 적들의 습격을 대비합시다."
3825563284-NameKr = "이벤트 미니게임 Normal 스테이지 04 힌트"
3825563284-DescriptionKr = "힐러로 허수아비를 부활시켜 몰려오는 적들의 공격을 대비합시다."
467833032-NameKr = "이벤트 챌린지 스테이지 1 힌트"
467833032-DescriptionKr = "진짜 폭탄과 가짜 폭탄이 배치되어 있습니다. 진짜 폭탄에만 현룡문 부원들이 반응하고 도망칩니다.\n\n진짜 폭탄을 폭발시켜 적을 쓰러뜨리세요."
2000030305-NameKr = "이벤트 챌린지 스테이지 2 힌트"
2000030305-DescriptionKr = "탱커와 해로운 효과 제거 스킬을 통해 적의 공격을 견디세요."
3888748298-NameKr = "이벤트 챌린지 스테이지 3 힌트"
3888748298-DescriptionKr = "동일한 모습의 적들 중 보스를 찾아보세요. \n\n보스를 처치하면 모든 적들이 쓰러집니다.\n\n보스는 치명타가 발생할 확률이 매우 높으며 보스 이외의 적들은 치명타가 발생할 확률이 매우 낮습니다."
1179303176-NameKr = "이벤트 챌린지 스테이지 4 힌트"
1179303176-DescriptionKr = "학생들을 이동시켜 경극부원의 공격을 적에게 유도하세요.\n경극부원의 스킬은 같은 경극부원에게도 피해를 입힙니다."
3297442664-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3297442664-DescriptionKr = "모든 적은 체력이 1% 미만이 되면 군중제어 게이지 생성 및 아군을 우선 공격합니다.\n군중제어 게이지를 가득 채우면 적이 처치됩니다."
2684865569-NameKr = "이벤트 챌린지 스테이지 2 힌트"
2684865569-DescriptionKr = "탱커를 편성하여 적의 공격을 견디세요."
3519883613-NameKr = "이벤트 챌린지 스테이지 3 힌트"
3519883613-DescriptionKr = "카이는 스킬을 사용해 적에게 중독 효과를 부여합니다.\n현룡문 임원들은 중독 효과가 있을 때 혼란 상태가 됩니다.\n해로운 효과 제거 스킬을 사용해 현룡문 임원들의 중독 효과를 해제하세요."
313921055-NameKr = "이벤트 챌린지 스테이지 4 힌트"
313921055-DescriptionKr = "적을 처치할 때마다 카이가 약해집니다.\n카이에게는 지속적으로 회복되는 보호막이 적용됩니다.\n한 방이 강한 공격으로 카이를 공격하세요."
3486077912-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3486077912-DescriptionKr = "사쿠라코와 미네가 서로를 쓰러트리지 못하도록 방해하세요."
3001581470-NameKr = "이벤트 챌린지 스테이지 2 힌트"
3001581470-DescriptionKr = "탱커 학생을 편성하여 적의 공격을 견디세요."
2610005946-NameKr = "이벤트 챌린지 스테이지 3 힌트"
2610005946-DescriptionKr = "헬멧단원들이 피해를 받으면 라브도 피해를 받습니다.\n\n아군이 EX스킬을 사용할 때마다 적의 회피 수치가 증가하며 허수아비의 체력을 모두 회복 시키면 초기화됩니다. \n\n모든 아군은 일정 시간 동안 이동하지 않으면 해로운 효과를 받습니다."
3941724285-NameKr = "이벤트 챌린지 스테이지 4 힌트"
3941724285-DescriptionKr = "4분 동안 스케반의 공격을 버티면 승리합니다.\n\n스케반은 오래 생존할수록 강해지며,\n아케미의 공격에 같이 피해를 입습니다."
2055343512-NameKr = "이벤트 챌린지 스테이지 1 힌트"
2055343512-DescriptionKr = "코유키를 회복시키세요.\n\n코유키의 체력이 50% 미만이면, 적은 코유키 대신 다른 아군 학생을 공격합니다."
3473872843-NameKr = "이벤트 챌린지 스테이지 2 힌트"
3473872843-DescriptionKr = "위협적인 공격을 하는 노아(파자마)를 서둘러 쓰러트리세요."
105670687-NameKr = "이벤트 챌린지 스테이지 3 힌트"
105670687-DescriptionKr = "상대방보다 먼저 스위퍼를 처치하면 승리합니다.\n\n스위퍼마다 다른 효과를 보유하고 있으니 이를 활용하여 전투에 임해주세요."
4025598380-NameKr = "이벤트 챌린지 스테이지 4 힌트"
4025598380-DescriptionKr = "유우카(파자마)는 체력이 50% 이상일 때, 아군에게 이로운 효과를 줍니다.\n\n아방가르드군이 스킬을 사용 중, 피해를 일정 횟수 받을 때 마다 방어력이 감소됩니다."
525037525-NameKr = "이벤트 챌린지 스테이지 1 힌트"
525037525-DescriptionKr = "초거대 팬쨩은 해로운 효과로 인한 지속 대미지를 입을 때마다 추가적으로 피해를 입습니다. 오한의 경우, 더 큰 추가 피해를 입습니다.\n\n게헨나 선도부원 (SG)이 초거대 팬쨩을 타격할수록 초거대 팬쨩의 받는 대미지가 일정 시간 동안 증가합니다."
3162907200-NameKr = "이벤트 챌린지 스테이지 2 힌트"
3162907200-DescriptionKr = "세나(사복)의 범위 공격을 주의하세요."
2027711820-NameKr = "이벤트 챌린지 스테이지 3 힌트"
2027711820-DescriptionKr = "초거대 팬쨩은 피해를 받을 때마다 추가 피해를 받습니다.\n\n타격 횟수가 많은 학생을 편성하세요."
113373470-NameKr = "이벤트 챌린지 스테이지 4 힌트"
113373470-DescriptionKr = "모든 적의 치명 저항과 치명 대미지 저항이 크게 증가합니다.\n아군 스페셜 학생이 적에게 주는 피해가 증가합니다.\n\n각 부장을 쓰러뜨리면 소속 동아리에 추가로 대미지를 줍니다.\n이를 활용해 각 동아리의 소동을 잠재웁시다."
3202949901-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3202949901-DescriptionKr = "붉은 스위퍼를 처치하면 주위의 스위퍼가 함께 처치됩니다.\n붉은 스위퍼는 대미지를 매우 적게 받으므로 공격 횟수가 많은 학생들을 활용하세요."
1916385838-NameKr = "이벤트 챌린지 스테이지 2 힌트"
1916385838-DescriptionKr = "스미레(아르바이트)의 약점 파악 효과가 적용된 학생은 피해를 받을 때마다 추가 피해를 입습니다.\n해로운 효과 제거 스킬을 활용하여 약점 파악 효과를 해제하세요."
1058897212-NameKr = "이벤트 챌린지 스테이지 3 힌트"
1058897212-DescriptionKr = "스위퍼는 지속적으로 자신의 주위에 피해를 입힙니다.\n스위퍼는 EX 스킬에 피격될 때마다 넉백되므로 레이 근처에 머물도록 EX 스킬을 사용해 보세요. \n단, 스위퍼가 쉴드 상태일 때는 넉백되지 않습니다."
1095949636-NameKr = "이벤트 챌린지 스테이지 4 힌트"
1095949636-DescriptionKr = "아케미가 사이드 체스트 자세를 취하면 주위 모든 대상의 치명률과 치명 수치가 크게 증가합니다.\n\n아케미가 일정 횟수 공격 받을 때 마다 받는 대미지량이 일정 시간 동안 증가합니다.\n\n아케미는 천천히 감소하는 군중제어 게이지를 보유하며, 누적 시 일정 시간 동안 기절하며 방어력이 크게 감소합니다.\n그 후, 아군은 일정 시간 실드를 얻는 대신 공격력이 감소합니다.\n이 실드를 활용해 아케미의 큰 폭발 공격을 막아내세요."
3274122658-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3274122658-DescriptionKr = "폭주족 보스들의 받는 피해량이 대폭 감소합니다.\n단, 폭주족 보스가 스킬 사용 중일 때 군중제어 효과를 적중시킨 경우, 폭주족 보스의 받는 피해량이 증가하고 코스트를 일정량 획득합니다."
190394474-NameKr = "이벤트 챌린지 스테이지 2 힌트"
190394474-DescriptionKr = "아오바의 방어력이 매우 높습니다.\n방어력 감소 효과를 활용해 보세요."
384582627-NameKr = "이벤트 챌린지 스테이지 3 힌트"
384582627-DescriptionKr = "모든 적은 EX 스킬 피해만 받습니다.\n\n불량배 (SMG)와 불량배 (MG)를 처치하면 모든 적의 공격력과 공격 속도가 크게 증가합니다. \n먼저 불량배 (SR)과 불량배 돌격대장을 처치하세요."
4256279682-NameKr = "이벤트 챌린지 스테이지 4 힌트"
4256279682-DescriptionKr = "아군 학생이 돌진하는 폭주족과 부딪히면 아군 학생이 큰 대미지를 받습니다.\n대신 돌진하는 폭주족이 엄폐물과 부딪히면 폭주족이 큰 대미지를 받습니다.\n엄폐물을 설치하고 이동 스킬을 활용해 적의 돌진을 엄폐물로 유도하세요."
1196420166-NameKr = "이벤트 챌린지 스테이지 1 힌트"
1196420166-DescriptionKr = "자고 있는 키쿄에게 적들이 돌진하여 피해를 입힙니다.\n접근하기 전에 적을 모두 처치하여 키쿄의 낮잠을 지켜주세요.\n검정 스위퍼를 처치하면 코스트를 획득하고, 주변 적들의 이동속도와 방어력을 크게 감소시킵니다.\n검정 스위퍼는 대미지를 매우 적게 받으므로 공격 횟수가 많은 학생들을 활용하세요."
956182265-NameKr = "이벤트 챌린지 스테이지 2 힌트"
956182265-DescriptionKr = "렌게(수영복)과 유카리(수영복)의 공격에 버틸 수 있도록 탱커와 힐러 학생을 활용하세요."
1158136851-NameKr = "이벤트 챌린지 스테이지 3 힌트"
1158136851-DescriptionKr = "모든 플라즈마장 발생 장치의 체력이 0보다 많을 때 적의 보호막이 사라집니다.\n플라즈마장 발생 장치는 7초마다 체력이 25% 씩 감소하므로 지속적으로 회복시켜야 합니다."
2288671928-NameKr = "이벤트 챌린지 스테이지 4 힌트"
2288671928-DescriptionKr = "적 전차는 공터를 향해 움직이기 시작하여 공터에 도착하면 강력한 공격을 합니다. \n적 전차는 EX 스킬 대미지에 강한 저항력이 있지만, 피격될수록 전차의 성능이 떨어집니다. \n이런 특성을 이용하여 적 전차가 공터에 도착하기 전에 처치하세요."
2701404947-NameKr = "이벤트 챌린지 스테이지 1 힌트"
2701404947-DescriptionKr = "사감대원들이 에리를 노리고 몰려옵니다. 에리를 지키고, 몰려오는 사감대원들을 쓰러트리세요."
2506986276-NameKr = "이벤트 챌린지 스테이지 2 힌트"
2506986276-DescriptionKr = "카노에는 방어력이 매우 높고, 자신의 해로운 효과를 제거하는 Ex 스킬을 사용합니다.\n타이밍에 맞춰 방어력 감소 효과를 활용해 보세요."
4114458166-NameKr = "이벤트 챌린지 스테이지 3 힌트"
4114458166-DescriptionKr = "적들의 방어 타입을 잘 확인하고, 상성이 Weak인 적들을 노려보세요."
444658513-NameKr = "이벤트 챌린지 스테이지 4 힌트"
444658513-DescriptionKr = "적들은 학생들에게 강력한 해로운 효과를 부여합니다.\n해로운 효과 제거 스킬을 활용하여 적들을 쓰러트리세요."
1268479381-NameKr = "이벤트 챌린지 스테이지 1 힌트"
1268479381-DescriptionKr = "후유가 달려가면서 다양한 색의 스위퍼들을 보여줍니다.\n후유가 미요 앞에 도착한 후 가장 많이 등장한 색의 스위퍼를 공격하세요."
4163494881-NameKr = "이벤트 챌린지 스테이지 2 힌트"
4163494881-DescriptionKr = "적의 방어 타입을 노려서 전투를 진행해보세요"
1154737800-NameKr = "이벤트 챌린지 스테이지 3 힌트"
1154737800-DescriptionKr = "AMAS의 체력을 25% 이상 유지하면서, AMAS들에게 이로운 효과를 통해 강화시켜 적과 전투를 진행시키세요.\n\n폭탄이 파괴되면, 주변 적에게 대미지를 크게 입힙니다. 집중 공격을 활용해보세요."
184757931-NameKr = "이벤트 챌린지 스테이지 4 힌트"
184757931-DescriptionKr = "아키라의 체력은 매 초마다 감소하지만, 아키라의 체력이 50% 이상일 경우 아군에게 강력한 이로운 효과가 부여됩니다.\n아키라의 스킬에 피격된 적은 받는 대미지가 증가합니다.\n\n적 방패병은 방패를 들었을 때 체력을 회복합니다. 군중 제어 효과를 통해 이를 방해하세요."
2290871345-NameKr = "이벤트 챌린지 스테이지 1 힌트"
2290871345-DescriptionKr = "공격 표식이 있는 적을 순서대로 공격하여 적을 모두 해치우세요.\n기절한 학생이 공격받으면 매우 강하게 반격하니 주의하세요."
3231040624-NameKr = "이벤트 챌린지 스테이지 2 힌트"
3231040624-DescriptionKr = "적의 방어 타입을 노려서 전투를 진행해보세요."
1473203563-NameKr = "이벤트 챌린지 스테이지 3 힌트"
1473203563-DescriptionKr = "스트라이커 학생에게 적용되는 이로운 효과가 아군 헬멧단에게도 동일하게 적용됩니다.\n아군 헬멧단은 적에게 큰 피해를 줄 수 있습니다.\n아군 헬멧단을 지원하여 전투를 진행해보세요."
1944049600-NameKr = "이벤트 챌린지 스테이지 4 힌트"
1944049600-DescriptionKr = "아군 헬멧단의 공격은 적들의 받는 피해를 증가시킵니다.\n아군 헬멧단이 최대한 쓰러지지 않게 지원하며 전투를 유리하게 진행해 보세요."
3270373715-NameKr = "이벤트 챌린지 스테이지 1 힌트"
3270373715-DescriptionKr = "인화성 드럼통의 HP가 100% 이상이 되면 1초 후 폭발하여 주변의 적들에게 큰 피해를 줍니다.\n적절한 타이밍에 인화성 드럼통을 폭발시켜 스위퍼들을 처치하세요."
3881373360-NameKr = "이벤트 챌린지 스테이지 2 힌트"
3881373360-DescriptionKr = "적 힐러의 방어 타입을 노려서 전투를 진행해 보세요."
2657352138-NameKr = "이벤트 챌린지 스테이지 3 힌트"
2657352138-DescriptionKr = "주기적으로 야쿠모가 등장합니다.\n야쿠모의 책을 획득한 아군, 적군은 일정 시간 동안 공격력이 크게 감소하고, 기절합니다.\n단, 코하루는 대신 공격력과 코스트 회복력이 크게 증가하고, 받는 대미지량도 크게 증가합니다."
1246590478-NameKr = "이벤트 챌린지 스테이지 4 힌트"
1246590478-DescriptionKr = "적의 받는 대미지가 크게 감소합니다.\n인화성 드럼통의 HP가 100% 이상이 되면 1초 후 폭발하여 주변의 적들에게 피해를 주고 아군의 코스트 회복력이 크게 증가합니다.\n인화성 드럼통의 폭발 피해를 받은 적은 일정 시간 동안 받는 대미지가 매우 큰 폭으로 증가합니다."
944485355-NameKr = "이벤트 챌린지 스테이지 1 힌트"
944485355-DescriptionKr = "적의 Ex 스킬은 매우 높은 피해를 주지만, 엄폐물에 적중하면 반대 방향으로 튕겨져 나갑니다.\n츠쿠요(드레스)의 Ex 스킬로 적의 스킬을 튕겨내 아군 망량즈를 보호하세요."
225733024-NameKr = "이벤트 챌린지 스테이지 2 힌트"
225733024-DescriptionKr = "츠쿠요(드레스)가 쓰러지면 이즈나의 받는 대미지량이 증가합니다.\n츠쿠요(드레스)를 먼저 노려보세요."
450982130-NameKr = "이벤트 챌린지 스테이지 3 힌트"
450982130-DescriptionKr = "허수아비의 체력이 높을 수록 적의 받는 대미지량이 증가합니다."
3754788721-NameKr = "이벤트 챌린지 스테이지 4 힌트"
3754788721-DescriptionKr = "학생의 Ex 스킬로 인한 이로운 효과들이 적 보스에게도 적용됩니다.\n\n적 보스는 군중제어 효과는 받지 않지만 시간은 누적되며, 10초 누적 시 적 보스의 받는 대미지 량이 증가합니다. (최대 10회 중첩) (시간은 군중제어 강화력이 높을수록 더 많이 적용됩니다.)\n\n허수아비의 체력이 99%이상이 되면 코스트 회복 속도가 대폭 증가합니다.\n\n적 보스의 방어력과 치명대미지 저항력이 매우 높으니 주의하세요."
3884845621-NameKr = "이벤트 챌린지 스테이지 1 힌트"
