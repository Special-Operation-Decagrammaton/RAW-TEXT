3727844322-DescriptionKr = "시럽을 뿌린 느낌의 웨이브가 포인트를 주는 벽. 할로윈 밤의 분위기를 더해준다."
2825070418-NameKr = "할로윈 나이트 배경"
2825070418-DescriptionKr = "신비로운 할로윈 분위기를 연출해주는 배경. 할로윈 나이트를 즐겨보자!"
