1063080956-DescriptionKr = "파도 무늬로 제작된 푹신한 좌식 의자. 매우 푹신하여 오래 앉아있어도 다리가 아프지 않다."
2401185643-NameKr = "온천 카피바라 수납장"
2401185643-DescriptionKr = "온천 카피바라 인형들로 장식된 온천 컨셉의 수납장. 온천 카피바라의 귀여움을 만끽하세요!"
2027732261-NameKr = "온천 카피바라 뽑기 기계"
2027732261-DescriptionKr = "다양한 온천 카피바라 제품이 담긴 뽑기 기계. 멈출 수 없는 중독성을 가지고 있다!"
322190320-NameKr = "온천 문양 원목 무드등"
322190320-DescriptionKr = "온천 문양이 그려진 원목 무드등. 밋밋한 공간을 전통적인 느낌으로 채울 수 있다."
