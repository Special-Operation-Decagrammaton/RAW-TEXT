2932512474-NameTh = "เวทีวงหน่วยรับจ้างสารพัด 68"
2932512474-DescriptionTh = "มา Rock & Bad กันทั้งวัน! บนเวทีที่วงหน่วยรับจ้างสารพัด 68 ได้แสดงความสนุกสนานแบบหน่วยรับจ้างสารพัด 68"
2867363316-NameTh = "กระเป๋าเดินทาง ลายคลาสสิก"
2867363316-DescriptionTh = "กระเป๋าเดินทางในลายคลาสสิกที่ทั้งสวยงาม และใช้งานได้จริง เหมาะกับนักเดินทางผู้สง่างาม"
2884023970-NameTh = "เตียงนอนอาบแดด"
2884023970-DescriptionTh = "เตียงนอนอาบแดดพร้อมกับสตูตัวเล็ก สำหรับวางน้ำผลไม้สดใหม่ และเพิ่มความสบายด้วยหมอนลายตาราง"
2252585741-NameTh = "ชุดโต๊ะไอศกรีม"
2252585741-DescriptionTh = "ชุดโต๊ะไอศกรีมที่มีไอศกรีมรสหวานวางอยู่ หากเข้าสู่ช่วงฤดูร้อน ไอศกรีมอาจจะละลายได้ในพริบตา"
406850184-NameTh = "ต้นเลมอนซันไชน์"
406850184-DescriptionTh = "ต้นเลมอนซันไชน์ที่จะทำให้รอบตัวสดชื่นด้วยเลมอน ถ้าเปิดก็อกน้ำละก็ ยิ่งระเบิดความสดชื่นเลย!"
2773697566-NameTh = "โต๊ะบอร์ดเกม"
2773697566-DescriptionTh = "โต๊ะบอร์ดเกมที่มีลูกเต๋า ตัวเดินและแผนที่เก่าแก่ สนุกง่ายๆ ได้แค่เริ่มเกม"
4076782432-NameTh = "เก้าอี้ห้องสมุด รุ่นคลาสสิก"
4076782432-DescriptionTh = "เก้าอี้ห้องสมุดรุ่นคลาสสิก มีทั้งความเรโทรและน่านั่ง เป็นเก้าอี้ที่เหล่าหนอนหนังสือฝันถึง"
1063381236-NameTh = "โต๊ะเขียนต้นฉบับ"
