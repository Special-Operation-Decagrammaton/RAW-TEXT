3353425290-NameTh = "เบอร์เกอร์อวกาศ"
3353425290-DescriptionTh = "เบอร์เกอร์ช็อกโกแลตที่ใส่ในถุงสูญญากาศ ใช้เป็นอาหารอวกาศ ตอนนี้ก็ยังคงมีคำถามว่า ทำไมถึงถูกใส่ถุงสูญญากาศไว้ที่นี่"
3142506941-NameTh = "โค้ดปลดล็อก - ชานเมืองเขต 2"
3142506941-DescriptionTh = "ชิปที่บันทึกโค้ดสำหรับใช้ปลดล็อกประตูของชานเมืองเขต 2"
2995130259-NameTh = "โค้ดปลดล็อก - ชานเมืองเขต 3"
2995130259-DescriptionTh = "ชิปที่บันทึกโค้ดสำหรับใช้ปลดล็อกประตูของชานเมืองเขต 3"
1012273839-NameTh = "โค้ดปลดล็อก - เขตกลาง"
1012273839-DescriptionTh = "ชิปที่บันทึกโค้ดสำหรับใช้ปลดล็อกประตูของเขตกลาง"
344128946-NameTh = "แต้มกิจกรรม"
344128946-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
1355249104-NameTh = "หมวกนิรภัย องค์การนักเรียน"
1355249104-DescriptionTh = "หมวกนิรภัยที่มีโลโก้ขององค์การนักเรียน ได้ถูกสร้างขึ้นมาสำหรับงานฟื้นฟูครั้งนี้โดยเฉพาะ"
2999413236-NameTh = "รายงานทางการเงิน"
2999413236-DescriptionTh = "รายงานทางการเงินที่ฝ่ายการเงินในสังกัด คณะกรรมการบริหารขององค์การนักเรียนใช้งาน มีข้อมูลสถานะทางการเงินของคิโวทอสโดยละเอียด"
636205895-NameTh = "มันฝรั่งทอด รสไข่ปลา"
636205895-DescriptionTh = "มันฝรั่งทอดรสไข่ปลา ของโปรดของโมโมกะ มีรสเค็มพอดีที่ชวนน้ำลายสอ"
832973929-NameTh = "ที่คาดผมแสนสวย"
832973929-DescriptionTh = "ที่คาดผมแบบหนึ่งที่ถูกดูแลให้สะอาดเสมอ น่าจะเรียกได้ว่าเป็นของจำเป็นสำหรับผู้ใช้ "
3488365730-NameTh = "อุปกรณ์แต่งหน้า"
3488365730-DescriptionTh = "อุปกรณ์แต่งหน้าสำหรับใช้แต่งหน้า ที่ใช้ได้ดีตามจุดประสงค์หลักของมัน ถ้าฝึกใช้จนชำนาญ อาจใช้เป็นอุปกรณ์ในการพรางตัวได้"
1069023790-NameTh = "บัตรเชิญคฤหาสน์เก่า"
1069023790-DescriptionTh = "บัตรเชิญจากคฤหาสน์เก่าที่ดูจะมีประวัติยาวนาน มีข่าวลือว่าจะมีทั้งเรื่องเข้าใจง่าย และยากเกิดขึ้นพร้อมกันที่นี่"
611002646-NameTh = "เซ็ตการ์ด"
611002646-DescriptionTh = "เซ็ตการ์ดเกมยอดนิยมในซานไห่จิง สะสมการ์ดเพิ่มเพื่อเล่นได้มากขึ้น"
1712890776-NameTh = "คูปองย่านการค้า"
1712890776-DescriptionTh = "คูปองที่ออกโดยย่านการค้าเทพเต่าดำ\nเพียงมีคูปองนี้ก็จะได้รับการต้อนรับอย่างดี\nจากย่านการค้าเทพเต่าดำ"
1093209845-NameTh = "เครื่องหมายมังกรดำ"
1093209845-DescriptionTh = "เครื่องหมายที่ถูกขายเป็นสินค้าประเภทหนึ่ง มีการสลักลายมังกรดำเอาไว้ แต่ว่ากันว่าไม่ค่อยได้รับความนิยมนัก"
133960514-NameTh = "เซ็ตตัวทำละลาย"
133960514-DescriptionTh = "เซ็ตการสกัดด้วยตัวทำละลายที่วางขายให้ทุกคนใช้ได้ มีข่าวลือว่าจะหาซื้อได้ที่สวนต้นบ๊วยเท่านั้น"
4287098248-NameTh = "ปากกาหมึกซึมขั้นสูง"
4287098248-DescriptionTh = "ปากกาหมึกซึมขั้นสูง ได้รับอนุมัติให้ใช้ในองค์การนักเรียน ด้วยหมึกจากหัวปากกาที่ไหลออกมาอย่างไหลลื่น ช่วยลดอาการเมื่อยของมือและข้อมือได้ดี"
3217702690-NameTh = "กุ้งแช่แข็ง"
3217702690-DescriptionTh = "กุ้งที่แช่แข็งทันทีที่จับได้เพื่อคงความสดใหม่ไว้ กุ้งแช่แข็งนี้เป็นกุ้งที่จับได้จากหมู่บ้านยาโตอูระ ส่วนใหญ่จะจัดส่งให้เขต D.U. ในฐานะผลิตภัณฑ์พิเศษของหมู่บ้านยาโตอูระ"
4278574452-NameTh = "ก้อนกรวด"
4278574452-DescriptionTh = "ก้อนกรวดขนาดเล็กที่พบได้บ่อยตามชายหาด แม้ผิวสัมผัสจะดูธรรมดาแต่มีความเรียบลื่น และส่องประกายเฉพาะตัว เป็นผลมาจากการถูกคลื่นซัดมาเป็นเวลานาน"
4062911234-NameTh = "เปลือกหอย"
4062911234-DescriptionTh = "เปลือกหอยขนาดเล็กที่พบได้บ่อยตามชายหาด ดูผ่านๆ อาจดูไม่ต่างจากเปลือกหอยทั่วไป แต่ถ้าดูดีๆ แล้วละก็ จะเห็นลวดลายที่ต่างกันอย่างเห็นได้ชัด"
759180874-NameTh = "ปลาดาวแห้ง"
759180874-DescriptionTh = "ปลาดาวที่ถูกทิ้งไว้ตรงท่าเรือจนแห้ง แม้ว่ามันจะกินไม่ได้ ไม่เน่าเปื่อย และเป็นเหมือนสิ่งกวนใจของชาวบ้านที่นี่ แต่มิยุรู้สึกถึงสายสัมพันธ์แปลกๆ บางอย่างกับปลาดาวนี้"
1788699589-NameTh = "ตั๋วทอยเต๋าการันตี"
