3798603167-NameKr = "말차 세트 좌식 테이블"
3798603167-DescriptionKr = "말차와 디저트를 즐길 수 있는 좌식 테이블. 고요한 찻물을 보며 마음을 정리하기 좋다."
3459590836-NameKr = "전통 다다미 바닥"
3459590836-DescriptionKr = "전통 방식으로 제작된 다다미 바닥. 후덥지근한 공기를 시원하고 청량하게 바꿔준다."
2718427248-NameKr = "전기 음료 온장고"
2718427248-DescriptionKr = "음료를 따뜻하게 보관할 수 있는 전기 온장고. 온장고만 있다면 추운 겨울이 두렵지 않다!"
4134416493-NameKr = "전통 기와 격자무늬 벽"
