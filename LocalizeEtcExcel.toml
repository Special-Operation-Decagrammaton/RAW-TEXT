3517538403-DescriptionTh = "นิตยสารฉบับใหม่ล่าสุดต่างๆ มาอ่านนิตยสารยอดฮิตฉบับใหม่กันเถอะ"
422081260-NameTh = "แท่นวางหนังสือภาพ"
422081260-DescriptionTh = "แท่นวางหนังสือภาพที่ปรับให้มีขนาดเหมาะกับ\nความสูงของเด็กๆ เก็บหนังสือคืนที่ช่องด้านล่างได้"
