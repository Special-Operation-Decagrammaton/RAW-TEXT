3572927324-NameTw = "奇特的螺絲"
3572927324-DescriptionTw = "形狀有點奇特的螺絲。被用於千年廢墟的機器。"
3819866792-NameTw = "奇怪的電線"
3819866792-DescriptionTw = "只能在千年廢墟發現的奇特電線。狀態良好。"
374437121-NameTw = "不明資料晶片"
374437121-DescriptionTw = "解析千年廢墟的設備所需的資料。晶片中包含各種資訊。"
2295857575-NameTw = "財務計算機"
2295857575-DescriptionTw = "聯邦學生會限定提供給財務室的財務計算機。搭載了能計算複雜公式的各種功能及函數。"
1808606287-NameTw = "活動點數"
1808606287-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
3805212638-NameTw = "超合金露營釘"
3805212638-DescriptionTw = "用來固定棚布或帳篷的堅固營釘。以千年學園特別研發的超合金製成，因此不易生鏽或損壞。"
743230010-NameTw = "多功能繩索"
743230010-DescriptionTw = "可在野外廣泛運用的高彈性繩索。因為含有千年學園開發的新材料，堅固到連戰車都綁得住。"
2873068026-NameTw = "S&D咖哩粉"
2873068026-DescriptionTw = "以流通香料聞名的S&D公司推出的咖哩粉。獨特的辣味用於咖哩之外的料理也很適合。"
3056694695-NameTw = "活動點數"
3056694695-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
763312064-NameTw = "高級雞尾酒杯"
763312064-DescriptionTw = "裝有鮮美葡萄汁的玻璃製雞尾酒杯。一手拿著雞尾酒杯並輕輕晃動，能夠營造出古典高雅的氛圍。"
1635418688-NameTw = "餐巾"
1635418688-DescriptionTw = "以紫色花朵裝飾得很好看的餐巾。只要在享用晚餐前輕輕鋪在雙膝上，即使食物灑出來也不會有問題。"
1461877186-NameTw = "懷錶"
1461877186-DescriptionTw = "陽奈風紀委員長的時間非常寶貴。要抽空確認一下能用於練習鋼琴的空檔。"
1549901025-NameTw = "目標線索"
1549901025-DescriptionTw = "關於目標的線索。是執行工作時最重要的東西。"
3633823236-NameTw = "演出小冊子"
3633823236-DescriptionTw = "簡述了演出內容的小冊子。宣傳手冊就只是手冊，感動需要親身體驗。"
3045934720-NameTw = "蝴蝶領結"
3045934720-DescriptionTw = "經常能在高檔場所見到的小領結。是任何人都能方便使用的結構。"
1268221723-NameTw = "觀劇鏡"
1268221723-DescriptionTw = "可從遠處觀賞演出的望遠鏡。如果位置夠近，近到用不到它，那就再好不過了。"
1224308689-NameTw = "情人節外出券"
1224308689-DescriptionTw = "情人節之際，忙於巡邏工作的老師和學生見面時需要的外出券。\n※未使用的外出券在活動結束後會轉換成400,000信用貨幣。"
172046152-NameTw = "百鬼夜行紀念卡"
172046152-DescriptionTw = "可以在旅遊景點找到的紀念套卡。收集很多的話，就能玩某款遊戲。"
2693887233-NameTw = "修學旅行導覽計畫表"
2693887233-DescriptionTw = "統整了修學旅行導覽計畫的文件。即使計畫未必趕得上變化，制定計畫還是非常重要。"
2435927187-NameTw = "領隊旗"
2435927187-DescriptionTw = "引導遊客的領隊旗。對引導路癡的學生有很大的幫助。"
1190740558-NameTw = "特別優惠券"
1190740558-DescriptionTw = "可以在旅遊景點兌換各種物品的優惠券。無論何時何地，都不能忘了要理性消費唷。"
3549417253-NameTw = "倒數日曆"
3549417253-DescriptionTw = "直到決戰之日前，計算日子用的日曆。時間是不等人的！"
1553303194-NameTw = "充飢餅乾"
1553303194-DescriptionTw = "為了恢復耗盡的體力而準備的餅乾。實際上是吃不飽的。"
4287453305-NameTw = "增強幹勁糖果"
4287453305-DescriptionTw = "提升消沉意志的糖果。口味隨機。"
3117022162-NameTw = "活動點數"
3117022162-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
1867361376-NameTw = "水上樂園手環"
1867361376-DescriptionTw = "發給水上樂園顧客的手環。可用於保管箱或購物。"
1797048856-NameTw = "安全哨子"
1797048856-DescriptionTw = "告知緊急狀況時使用的哨子。用力吹時會發出尖銳的聲音。"
1789692618-NameTw = "拋投式救生圈"
1789692618-DescriptionTw = "用來救掉進水裡的人的救生圈。投擲前別忘了接上繩子。"
1024700311-NameTw = "安全救生衣"
1024700311-DescriptionTw = "穿了就能浮在水上的救生衣。記得要穿合身的。"
457021552-NameTw = "遊戲攤位使用券"
457021552-DescriptionTw = "可進入遊戲攤位的入場券。光看這張入場券的設計，就能刺激人們的挑戰欲望。"
2007696799-NameTw = "頭盔團聯歡會紀念貨幣"
2007696799-DescriptionTw = "為紀念頭盔團聯歡會而發行的紀念貨幣。能讓人回想起在海邊留下的回憶。"
2667732249-NameTw = "小吃攤菜單"
2667732249-DescriptionTw = "海邊小吃攤的菜單。雖然小吃攤裡有各式各樣的美食，但記得仔細確認價格和錢包深度。"
3842896816-NameTw = "大賽專用水槍"
3842896816-DescriptionTw = "為頭盔團水槍大賽而準備的水槍。雖然射出的不是水，而是貨真價實的子彈，但它的名字的確就叫做水槍。"
3549805305-NameTw = "紀念品玩偶"
3549805305-DescriptionTw = "模仿某位高人……的外貌打造而成的交流會限定玩偶。因為想要收藏的學生太多，回收率似乎相當低……"
4291250831-NameTw = "小盒茶葉禮物套組"
4291250831-DescriptionTw = "山海經特產紀念品之一的茶葉禮物套組。雖然要怎麼品茶是每個人的自由，但是據說山海經甚至為此分成了許多派系……"
2196042750-NameTw = "六和閣模型"
2196042750-DescriptionTw = "根據玄龍門所述，這個紀念品是仿造山海經的精隨製作而成。如果擺在適當的地方，說不定會別有一番風情。"
3379690606-NameTw = "幸運鑰匙圈"
3379690606-DescriptionTw = "燈籠造型的鑰匙圈。用以祈求好運常在。"
1441156605-NameTw = "月影祭商品券"
1441156605-DescriptionTw = "僅在月影祭期間流通的限定商品券。據說只要收集足夠的商品券，便能挑戰月影祭才有的「那個遊戲」。"
2588141576-NameTw = "月影祭月餅"
2588141576-DescriptionTw = "祈求豐饒和慶典圓滿順利的月影祭月餅。較一般月餅略小故能一口吃下是它最大的特徵。"
2506282920-NameTw = "鍊丹術研究會特製精力丸"
2506282920-DescriptionTw = "為祈求慶典圓滿順利，鍊丹術研究會特別煉製的精力丸。據說吃了它就能補充體力，並恢復精神。"
647708360-NameTw = "月影祭鞭炮"
647708360-DescriptionTw = "慶典上絕對少不了的鞭炮。雖然經過妥善處理而安全無虞，但使用時仍要記得留意意外發生。"
494149653-NameTw = "活動點數"
494149653-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
2045066777-NameTw = "現場表演入場券"
2045066777-DescriptionTw = "可觀賞參與團體的現場表演的入場券。即使在表演結束之後，依然能當成紀念周邊收藏。"
4126770671-NameTw = "各色應援棒"
4126770671-DescriptionTw = "和現場表演的主角一同閃耀的應援棒。能讓偶像和粉絲在偌大的表演場地中合而為一的最佳道具。"
1870900489-NameTw = "放鬆蛋糕"
1870900489-DescriptionTw = "在學園祭四處分發的切片蛋糕。味道十分美味，甚至是某些人來參加學園祭的最大目的。"
2062917839-NameTw = "神祕物質"
2062917839-DescriptionTw = "可在現場收集到的神祕物質。只要透過特定的「重新分析」手續，即可獲得截然不同的物品。"
734398872-NameTw = "妖怪MAX梅子口味"
734398872-DescriptionTw = "從各種意義來說，都相當「厲害」的妖怪MAX。對某些人來說，這是最好的選擇。"
3651067564-NameTw = "蓬鬆的枕頭"
3651067564-DescriptionTw = "雪白柔軟的枕頭。極佳的舒適感讓人光是把頭靠上去，就彷彿會立刻被送進夢鄉。"
4161777769-NameTw = "新一彈卡包"
4161777769-DescriptionTw = "小雪為了引誘老師而準備的卡牌包。裡面裝滿了新卡。"
3803620130-NameTw = "《毀滅狂戰士》經典版"
3803620130-DescriptionTw = "真紀為大家帶來的遊戲。只要有CPU和顯示器，就能在任何地方享受遊戲。"
3308634141-NameTw = "活動點數"
3308634141-DescriptionTw = "每當進行活動時可獲得的點數。獲得越多即可得到多樣獎勵。"
3294588725-NameTw = "博覽會紀念品"
3294588725-DescriptionTw = "在博覽會場各處都能找到的千年博覽會紀念品。雖然在活動期間很常見，但最終也會成為限量版！"
123964663-NameTw = "某人的遺失物"
123964663-DescriptionTw = "學生們在來往時遺失的物品。只要好好收集起來交給主辦方，就能讓失主重獲幸福。"
2401109475-NameTw = "情人節圖章"
2401109475-DescriptionTw = "可以兌換情人節外出券的圖章。能證明您曾有過活躍的行動。"
2621462400-NameTw = "情人節外出券"
2621462400-DescriptionTw = "情人節之際，忙於巡邏工作的老師和學生見面時需要的外出券。\n※未使用的外出券在活動結束後會轉換成400,000信用貨幣。"
4188493704-NameTw = "百匯兌換券"
