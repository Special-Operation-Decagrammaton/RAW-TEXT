3981895212-NameTh = "ชุดโต๊ะสำหรับพักผ่อน"
3981895212-DescriptionTh = "ชุดโต๊ะน้ำหนักเบาและทนทาน เหมาะจะใช้กางพักผ่อนได้ทุกที่"
1445269164-NameTh = "โต๊ะพับกระดาษโอริกามิ"
