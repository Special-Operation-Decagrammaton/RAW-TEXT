1001007068-NameTh = "ชั้นวางหนังสือผลงาน"
1001007068-DescriptionTh = "ชั้นวางหนังสือในงานปาร์ตี้หรูหรา มีผลงานชิ้นเอกที่แนะนำโดยนักเรียน เกเฮนน่าวางไว้"
1250369711-NameTh = "พรมสไตล์บาโรก"
1250369711-DescriptionTh = "พรมสไตล์บาโรก มีจุดเด่นด้วยการตกแต่งอันวิจิตร ช่วยตกแต่งพื้นให้ดูสวยงามยิ่งขึ้น"
268835141-NameTh = "รถเข็นคลาสสิก 2 ชั้น"
268835141-DescriptionTh = "รถเข็น 2 ชั้นในสไตล์คลาสสิก เหมาะสำหรับน้ำชายามเที่ยง และปาร์ตี้ยามเย็น สะอาดพร้อมต้อนรับแขกผู้มีเกียรติอยู่เสมอ"
4265579804-NameTh = "โคมไฟระย้าหรูหรา"
4265579804-DescriptionTh = "สิ่งที่ขาดไม่ได้ในห้องจัดเลี้ยง โคมไฟระย้าที่มีดีไซน์สวยสดงดงาม"
