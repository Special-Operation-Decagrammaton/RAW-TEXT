2649485585-NameKr = "온전한 안티키테라 장치"
2649485585-DescriptionKr = "온전한 상태의 안티키테라 장치. 각종 제조 및 강화에 사용된다."
1066886482-NameKr = "보이니치 사본 페이지"
1066886482-DescriptionKr = "책에서 찢겨 나온 보이니치 사본의 페이지. 각종 제조 및 강화에 사용된다."
4122424050-NameKr = "스위트 초코 감자칩"
4122424050-DescriptionKr = "한쪽 면에 초콜릿을 코팅한 감자칩. 바삭한 식감에 초콜릿의 달콤함이 더해졌지만 모모카의 취향은 아닌 듯하다."
2341679944-NameKr = "엔젤 초콜릿"
2341679944-DescriptionKr = "편의점 체인 <엔젤 24>의 PB 초콜릿. 소라가 실수로 대량 발주해 버렸지만 선생님의 도움으로 완매하는 데 성공했다."
2435557875-NameKr = "대용량 미니 초콜릿"
2435557875-DescriptionKr = "린이 업무 중 먹기 위해 리셉션 룸에 비치해 둔 대용량 미니 초콜릿. 특별한 풍미가 느껴지지 않는 평범한 미니 초콜릿이다."
2724075845-NameKr = "아로나의 초코 진저 쿠키"
2724075845-DescriptionKr = "아로나가 열심히 만든 초코 진저 쿠키. 쿠키 위에 화이트 초콜릿으로 선생님과 아로나의 모습이 묘사되어 있다."
1567224539-NameKr = "발렌타인 페로로"
1567224539-DescriptionKr = "발렌타인 데이를 기념하여 출시된 페로로 모양의 초콜릿. 시즌 한정 상품이기 때문에 매니아들 사이에서 큰 인기를 끌고 있다."
984677767-NameKr = "레이션 D형"
984677767-DescriptionKr = "귀리와 코코아 파우더를 섞어 만든 군용 초콜릿. 열량이 높기 때문에 장기간의 임무에 적합하다."
1666908815-NameKr = "해피 핫 초콜릿"
1666908815-DescriptionKr = "하나에가 타 준 따듯한 핫 초콜릿. 한 모금 마시면 피로가 가시는 것과 동시에 행복한 기분이 밀려온다."
3922278991-NameKr = "쇼콜라데 게헨나"
3922278991-DescriptionKr = "고열량, 고카페인의 게헨나제 다크 초콜릿. 원형의 캔에 들어있는 탓에 구두약과 종종 착각하는 사람이 발생하는 듯 하다."
342988654-NameKr = "대량의 판 초콜릿"
342988654-DescriptionKr = "아카리가 초콜릿 많이 먹기 대회를 대비하기 위해 사온 대량의 판 초콜릿. 평범한 사람은 보는 것 만으로도 위장이 아파온다."
741491105-NameKr = "초코 당고"
741491105-DescriptionKr = "유명 화과자집에서 파는 초콜릿을 묻힌 당고. 의외로 보기보다 조화로운 맛이 난다고 한다."
2503165795-NameKr = "데스 러브"
2503165795-DescriptionKr = "블랙 데스 포이즌의 발렌타인 한정판 앨범, <사랑은 심장을 뽑아 쟁취하는 거야>을 구입하면 제공되는 사은품. 으시시한 모양과는 달리 맛은 부드럽고 달다."
3659929614-NameKr = "라이더의 간식"
3659929614-DescriptionKr = "시로코가 라이딩용으로 상비하고 다니는 에너지 바. 견과가 담긴 에너지바를 초콜릿으로 코팅하여 섭취 즉시 기력을 차릴 수 있다."
3042768744-NameKr = "초콜릿 바다의 친구들"
3042768744-DescriptionKr = "해양 박물관에서 기념품으로 팔고 있는 고래 모양의 초콜릿. 다른 물고기 초콜릿에 비해 압도적인 크기를 자랑한다."
1510394578-NameKr = "사막의 장미"
1510394578-DescriptionKr = "아비도스 역에서 팔고 있는 장미꽃 모양의 초콜릿. 사막의 장미를 모티브로 만든 초콜릿으로 선물용으로 인기가 높다."
2394567841-NameKr = "비너스의 초콜릿"
2394567841-DescriptionKr = "어른들을 위해 만들어진 대담한 모양의 초콜릿. 노골적인 모양 때문에 그다지 인기는 없는 듯 하다."
367299249-NameKr = "도청장치 14호"
367299249-DescriptionKr = "코타마가 만든 초콜릿 모양의 도청장치. 숨길 생각이 느껴지지 않는다."
919440775-NameKr = "핫 코코아 캔"
919440775-DescriptionKr = "자판기에서 주로 판매되는 초콜릿 음료 캔. 캔을 타고 전해지는 따듯한 온기가 몸을 녹여준다."
3490934017-NameKr = "파베 초콜릿 세트 (영수증 첨부)"
3490934017-DescriptionKr = "유우카가 선생님을 위해 구입한 선물용 초콜릿 세트. 1만엔이 넘는 고급 초콜릿임에도 불구하고 어째서인지 5000엔 짜리 영수증이 첨부되어 있다."
419901229-NameKr = "용사의 초콜릿 (아이템)"
419901229-DescriptionKr = "유즈가 선생님과 함께 하는 RPG 게임에서 선물해 준 기간 한정 초콜릿 아이템. 먹으면 플레이어의 체력을 조금 회복시켜 준다."
3659962553-NameKr = "수제 초코 스네일"
3659962553-DescriptionKr = "아리스가 게임 내의 몬스터 '스네일'을 모티브로 만든 수제 초코 아이템. 하지만 어떻게 보아도 스네일처럼 보이지는 않는다."
941224173-NameKr = "초코맛 요괴 MAX"
941224173-DescriptionKr = "발렌타인 시즌을 기념하여 출시된 초코맛의 요괴 MAX. 맛은 끔찍하지만 각성 효과 만큼은 탁월하다."
1781832965-NameKr = "초코맛 스프레이"
1781832965-DescriptionKr = "잉크 대신 초콜릿을 분사하는 스프레이. 마키의 말에 따르면 세상을 달콤하게 만드는 데 사용할 수 있다고 한다."
4075915701-NameKr = "초콜릿 포탄 Mk.2"
4075915701-DescriptionKr = "히비키가 발렌타인 데이 이벤트의 행사용으로 개발한 초콜릿 포탄. 장전하고 발사하면 착탄한 곳에 거대한 초콜릿 늪을 만든다."
2579538323-NameKr = "초콜릿 나사"
2579538323-DescriptionKr = "나사 모양으로 조각되어 은박을 씌운 초콜릿. 겉모습은 진짜 나사와 구분할 수 없을 정도로 똑같지만, 공구로는 사용할 수 없다."
3469911388-NameKr = "체룐카"
3469911388-DescriptionKr = "붉은겨울 급양부에서 생산하는 붉은겨울 학원 특제 밀크 초콜릿. 체리노가 이미 한 입 맛보았다."
1188251464-NameKr = "개량형 체룐카"
1188251464-DescriptionKr = "토모에가 새로 그린 귀여운 일러스트가 들어간 개량형 체룐카. 맛은 기존의 체룐카와 거의 다르지 않다."
3845682331-NameKr = "카카오 열매"
3845682331-DescriptionKr = "선생님께 초콜릿을 선물하고 싶었던 노도카가 간신히 구한 카카오 열매. 달지는 않지만 차처럼 끓여 마시면 좋은 풍미가 난다."
410737829-NameKr = "불로불사의 영약 (실패작)"
410737829-DescriptionKr = "사야가 초콜릿을 베이스로 만든 새로운 영약. 개발 중의 실수로 영약이 아닌 단순한 초콜릿 맛이 나는 음료가 되었다."
1298182383-NameKr = "어른의 럼 봉봉"
1298182383-DescriptionKr = "럼이 들어간 중후한 향기의 봉봉 초콜릿. 학생이 먹기에는 조금 이른 맛이다."
125955518-NameKr = "초콜릿 수갑"
125955518-DescriptionKr = "수갑 모양으로 만들어진 초콜릿. 위에 은박이 씌워져 그럴싸한 모양새를 갖추고 있지만, 당연히 수갑으로서의 기능은 갖추고 있지 않다."
1951960570-NameKr = "특제 초코 트롤러"
1951960570-DescriptionKr = "발렌타인 시즌에만 출시되는 마스터 도너츠의 특제 초코 트롤러. 특제 스프링클을 뿌려 달콤함을 더했다."
711391590-NameKr = "초코 하니와"
711391590-DescriptionKr = "하나코가 준비한 하니와 모양의 초콜릿. 시선이 부담스럽다."
4101876-NameKr = "리틀 불렛"
4101876-DescriptionKr = "하스미가 건네준 저격소총 탄환 모양의 초콜릿. 크기가 작은 초콜릿이지만, 달콤함의 위력은 확실하다."
2407160249-NameKr = "히나의 수제 풍기 초콜릿"
2407160249-DescriptionKr = "히나가 용기를 내어 부끄러움을 무릅쓰고 직접 만든 수제 초콜릿. 모양새는 이쁘지 않지만, 담겨 있는 마음은 그 무엇보다 아름답다."
1422578612-NameKr = "당신을 위한 한 입의 휴식"
1422578612-DescriptionKr = "아코가 엄선한 재료를 사용해 직접 만든 초콜릿. 비서의 업무가 그러하듯, 의식하지 않고 자연스레 먹기에 좋은 초콜릿을 의식하고 만들었다."
87498756-NameKr = "엄청! 맛있는! 초콜릿!"
87498756-DescriptionKr = "이즈미가 생각하기에 최고의 초콜릿에 어울리는 재료들을 잔뜩 써서 만든, 이즈미가 말하기로는 엄청 맛있는 초콜릿. 짭짤하면서 고소한 맛이 포인트."
1899678676-NameKr = "사장님의 최고급 초콜릿"
1899678676-DescriptionKr = "동업자인 선생님의 공을 치하하고자 아루가 인터넷에서 구매한 최고급 초콜릿…이지만, 현실은 덤핑 판매되고 있는 상품. 그래도 담긴 마음만큼은 변치 않고 반짝인다."
171489856-NameKr = "지옥의 러시안룰렛"
171489856-DescriptionKr = "무츠키가 인터넷에서 발견하고 눈을 반짝였던 장난치기용 러시안룰렛 초콜릿. 당첨되면 지옥을 볼 수 있다. 친구를 골려줄 때 딱 좋은 아이디어 상품."
2099851060-NameKr = "코코아가 담긴 머그잔"
2099851060-DescriptionKr = "후우카가 선생님의 위해 타준 코코아. 따듯하고 아련하며, 새콤달콤한 후우카의 다정함이 느껴진다."
1852286999-NameKr = "주리의 전력을 다한 초콜릿"
1852286999-DescriptionKr = "주리가 선생님에게 드리고자 전력을 다해 만든 수제 초콜릿. 설사 맛을 보지 않더라도, 보기만 해도 주리의 진심이 느껴져온다."
1269992298-NameKr = "함께 한 시간의 결과"
1269992298-DescriptionKr = "세리카가 선생님과 함께 아르바이트한 곳에서 받은 최고급 초콜릿 케이크. 달콤 폭신한 케이크의 맛에, 함께 하며 흘린 땀방울의 맛이 배어 있다."
265930468-NameKr = "종합 초콜릿 과자 선물 세트"
265930468-DescriptionKr = "선생님과 함께 찾은 백화점에서 구매한 종합 초콜릿 과자 선물 세트. 정말로 다양한 제품이 들어 있어 먹어도 먹어도 질리지 않는 발렌타인 데이 최고의 선물."
689413464-NameKr = "고르고 고른 하나"
689413464-DescriptionKr = "스미레가 선생님을 위해 100개나 되는 운동 대체 식품을 직접 먹어보고 테스트한 끝에 결정한 최고의 제품. 한 개만 먹어도 그날 하루가 든든하다."
3328209817-NameKr = "진격! 우파루파 초콜릿"
3328209817-DescriptionKr = "모모이가 크레인 게임기에서 뽑은 식완 초콜릿. 인기 격투 게임 <카시오페이아의 권 ~우파루파 대열전~>의 마스코트 캐릭터 장난감이 들어있다. 종류는 총 7개."
3385816833-NameKr = "미도리의 수제 초콜릿"
3385816833-DescriptionKr = "미도리가 선생님을 위해 이른 새벽부터 일어나 직접 만든 수제 초콜릿. 누구보다 가장 먼저, 처음으로 초콜릿을 주고 싶다는 두둥실 하면서 조금은 뜨거운 마음으로 만들었다."
3589704604-NameKr = "치세표 초콜릿 츠지우라센베이"
3589704604-DescriptionKr = "치세가 준비한 각종 사자성어가 담겨 있는 조금은 신기한 형태의 초콜릿 과자. 그 내용물은 멀쩡한 것도 있지만, 가끔 희귀한 확률로 영 엉뚱한 문구가 적혀 있는 것도 있다."
3842989732-NameKr = "백야당 한정 디저트"
3842989732-DescriptionKr = "발렌타인 데이를 맞이하여, 백야당에서 판매하는 발렌타인 한정판 디저트. 특별한 단골손님의 취향을 최대한 반영한 특제품이다. 즉 대부분 선생님의 취향이 들어가 있다는 뜻."
3251730635-NameKr = "닌자 초콜릿 제49번 세트!"
3251730635-DescriptionKr = "각종 닌자 도구들로 한가득 채워져 있는 꿈의 닌자 초콜릿 세트. 주군과 함께 맛보고 싶어 한 이즈나가 이른 아침부터 줄을 서서 간신히 구한 특제품이다. 참고로 실제로 사용할 수는 없으니 그 부분에 주의."
4247091559-NameKr = "숙면 초콜릿과 숙면 도구 키트"
4247091559-DescriptionKr = "언제나 야근과 과로로 지쳐 있는 선생님을 위해 츠바키가 특별히 준비한 발렌타인 데이용 수면 키트. 합쳐서 3980엔."
2771361458-NameKr = "와카모의 애정 초콜릿"
2771361458-DescriptionKr = "와카모가 흘러넘치다 못해 주체할 수 없는 뜨거운 마음을 한가득 담아 만든 수제 초콜릿. 다만 담겨 있는 것이 정말 애정뿐인지는, 확신할 수 없다."
1572630441-NameKr = "미식의 증명(말차맛)"
1572630441-DescriptionKr = "하루나가 개인적으로 깨달은 미식의 가설을 증명하고자 선생님과 함께 만든 말차 초콜릿. 깊은 쓴맛과 함께 감사를 담은 달콤한 맛이 진하게 배어 나온다."
3743008500-NameKr = "발렌타인 성자 스컬맨"
3743008500-DescriptionKr = "아즈사가 준비한 <죽음의 사신 스컬맨>의 초콜릿 버전. 발렌타인 시즌에만 구할 수 있는 한정품이다."
1084418779-NameKr = "러블리 크로스라인"
1084418779-DescriptionKr = "코하루가 가져온 유명 초콜릿. 화이트 초코와 다크초코가 섞여 있는 고급 제품으로, 중앙의 십자 선이 제품의 매력 포인트다."
2742248602-NameKr = "트윙클 스타"
2742248602-DescriptionKr = "스즈미가 편의점에서 사 준 별 모양 초콜릿. 금박으로 싸져 있어 반짝반짝 빛난다."
663608497-NameKr = "초코 시스터 상"
663608497-DescriptionKr = "마리가 선물해준 시스터 상. 초콜릿으로 돼 있다. 처음부터 식용이 아니라 전시용이었을 지도 모른다."
848260985-NameKr = "구슬 초콜릿"
848260985-DescriptionKr = "손에 묻거나 부스러기가 떨어지지 않도록 구슬 모양의 특제 초콜릿. 시미코를 비롯한 독서가들에게 인기가 많다."
1900401189-NameKr = "비 위드 유"
1900401189-DescriptionKr = "세리나가 만들어준 수제 초콜릿. 달콤한 맛은 마음까지도 편하게 만든다."
4183660781-NameKr = "페니로열 초코민트"
4183660781-DescriptionKr = "아이리가 준비한 특별 공정의 민트 초콜릿. 귀한 만큼 애호가들 사이에선 선물용으로 이용되기도 한다."
1868703267-NameKr = "리미티드 요시미 에디션"
1868703267-DescriptionKr = "요시미가 직접 만든 수제 초콜릿. 여러 의미로 다른 곳에선 볼 수 없는 한정판이다."
355355427-NameKr = "말보다 초콜릿"
355355427-DescriptionKr = "나츠가 손수 만든 것으로 예상되는 초콜릿. 나츠의 많은 말을 대신하기에는 다소 심플한 디자인이다."
2098665142-NameKr = "포춘 초콜릿(자작)"
2098665142-DescriptionKr = "치나츠가 준비해 온 운명의 초콜릿. 안에는 다양한 문구들이 적혀있다고 한다."
3487183095-NameKr = "밴디지 초코"
3487183095-DescriptionKr = "세나가 비상대기 시간동안 짬짬이 만든 수제 초콜릿. 포장지를 구하지는 못해서 대신 깨끗한 붕대로 감아 두었다."
3066393242-NameKr = "카카오 99.99%"
3066393242-DescriptionKr = "선생님을 위해 하루카가 구해 온 매우 비싼 초콜릿. 순도 99.99%라는 수치가 단순히 초콜릿의 당도만은 아닐 지도 모른다."
3579363383-NameKr = "트위스티드 발렌타인"
3579363383-DescriptionKr = "발렌타인의 주인님을 위해 아스나가 준비해 온 초콜릿. 준비 과정에서 아주 사소한 변형이 일어났다."
304962670-NameKr = "메이드 바이 메이드"
304962670-DescriptionKr = "아카네가 직접 만들어 온 수제 초콜릿. 메이드로서의 실력을 한껏 발휘한, 훌륭한 작품이다."
1933815846-NameKr = "초코 오므라이스"
1933815846-DescriptionKr = "발렌타인 데이를 맞아 카린이 준비한 오므라이스. 케첩 대신 초콜릿으로 하트가 그려져 있다."
1957428602-NameKr = "초콜릿 판화 : 용"
1957428602-DescriptionKr = "네루가 가져온 용 문양의 판화. 초콜릿으로 돼 있다. 어디서 어떻게 구해 왔는지는 도무지 알 길이 없다."
1255509912-NameKr = "발렌타인 비기닝"
1255509912-DescriptionKr = "발렌타인의 기원과 의의를 설명하기 위해 코토리가 직접 만든 초콜릿. 모양은 허름해도 맛은 훌륭하다."
1303875154-NameKr = "달콤한 잔"
1303875154-DescriptionKr = "피나가 가져온 술잔 형태의 초콜릿. 발렌타인 기념품이므로 실제로 술잔인 것은 아니며, 담는 것 또한 술이 아니다."
1082089594-NameKr = "아망드 크림슨"
1082089594-DescriptionKr = "츠루기가 남겨두고 간 아망드 초콜릿. 유리병은 귀여운 빨간 리본으로 묶여 있다."
3411154794-NameKr = "서투르게 포장된 초콜릿"
3411154794-DescriptionKr = "코코나가 서투른 솜씨로 애써 포장한 수제 초콜릿. 본인은 절대 자신이 포장한 게 아니라고 주장하고 있다. 아무도 없는 곳에서 혼자 먹도록 하자."
421170184-NameKr = "꼬마 아이들용 초코볼"
421170184-DescriptionKr = "히나타가 성당에 찾아오는 아이들을 위해 구비해 놓은 초코볼. 히나타는 모든 초코볼의 맛을 알고 있다고 한다."
412848971-NameKr = "촉촉한 초코쿠키"
412848971-DescriptionKr = "우이가 준비한 초코칩이 들어간 쿠키. 그나마 부스러기가 덜 튀는 것으로 골랐다고 한다."
1622643101-NameKr = "딸기가 올라간 초코 조각케이크"
1622643101-DescriptionKr = "카즈사가 준비한 딸기 초코 조각 케이크. 나름대로 고심해서 고른 물건이므로, 그 마음의 취급에는 주의하도록 하자."
2747826200-NameKr = "포장된 작은 초콜릿"
2747826200-DescriptionKr = "자그마하지만 잘 포장된 발렌타인 초콜릿. 히요리에게 있어서는, 어떤 의미로 그녀의 '전부'와 맞바꾼 초콜릿이기도 하다."
2837160480-NameKr = "꼼꼼하게 포장된 초콜릿"
2837160480-DescriptionKr = "꼼꼼하게 포장된 발렌타인 초콜릿. 섬세하게 만들어진 포장이, 미사키의 성격의 일면을 나타내는 것 같기도 하다."
4062180493-NameKr = "꽃과 초콜릿"
4062180493-DescriptionKr = "아츠코가 직접 만든 초콜릿과 직접 재배한 꽃 한 송이. 예로부터 공주님에게는 비밀이 많다고 한다."
3932209420-NameKr = "키디바 초콜릿"
3932209420-DescriptionKr = "사오리가 준비한 최고급 초콜릿. 그 준비 과정에는 여러 가지 사정이 얽혀 있었다고 한다."
2263489181-NameKr = "벚꽃 빛 초콜릿"
2263489181-DescriptionKr = "미모리의 벚꽃 빛 초콜릿. 미모리가 직접 마음을 담아 만들었다고 한다. 독심술과는 관계가 없다. 아마도."
170445747-NameKr = "최강의 초코사우루스"
170445747-DescriptionKr = "카에데가 만든 최강의 초코사우루스. 원래 선물하려던 공룡 발굴 초콜릿은 전부 실패해버렸지만, 오히려 거기에서 발상을 역전. 부서지지 않은 초콜릿 조각을 합쳐 새로운 초콜릿을 만들어냈다. 카에데 왈 '이것이야말로 최강의 공룡이야!' 라는 모양이다. "
566203770-NameKr = "반쯤 녹은 롭이어 초콜릿"
566203770-DescriptionKr = "츠쿠요가 준비한, 귀여운 롭이어 토끼 캐릭터 초콜릿. 지나치게 소중히 보관하고 있었던 것인지, 모양이 조금 변해버리고 만 것 같다……"
2104744538-NameKr = "초천재청초계병약미소녀해커's 초콜릿"
2104744538-DescriptionKr = "히마리가 자기 모습을 본떠 만든 초콜릿. 왠지 모를 논리적인 과정에 따른 합리적 결정으로 인해, 샬레로 돌아가서 맛보아야 할 것 같다."
3304317128-NameKr = "이로하의 수제 막대 초콜릿"
3304317128-DescriptionKr = "이로하가 만든 수제 막대 초콜릿 과자. 안에 들어있는 과자 중에 딱 하나, \"자국\"이 남아있는 물건이 있다."
902334212-NameKr = "인법연구부 배지 세트 초콜릿"
902334212-DescriptionKr = "미치루가 주문 제작한 스페셜 초콜릿. 막상 이것을 선물하는 과정에서 여러모로 허둥지둥하고 좌충우돌하기도 한 미치루지만. 그래도 그 안에 담긴 부원을 향한 친애, 선생님을 향한 존경의 마음은 변함없이 아름답게 반짝이고 있다."
813659355-NameKr = "초콜릿을 넣은 당근 케이크"
813659355-DescriptionKr = "미야코가 초콜릿을 넣어 만든 당근 케이크. 지나친 달콤함은 토끼에게 해롭다고 한다."
490342082-NameKr = "초콜릿 스모어"
490342082-DescriptionKr = "모에가 만들어 준 초콜릿 스모어. 안 그래도 달콤한 마시멜로에, 초콜릿까지 얹은 스모어의 칼로리는 그야말로 파멸적이다."
1288390774-NameKr = "보급품 초콜릿 캐러멜"
1288390774-DescriptionKr = "사키가 준 보급용 초콜릿 캐러멜. 야간 근무를 서는 초병들이 잠을 쫓기 위해 먹는 간식 중 하나라고 한다. 사키 본인은 발렌타인 데이와는 관계가 없는 선물이라고 강력하게 주장하고 있다."
1222376462-NameKr = "바크 초콜릿"
1222376462-DescriptionKr = "미유가 직접 만든 수제 바크 초콜릿. 보급받은 초콜릿과 산에서 따온 과일들을 섞어서 만들었다고 한다. 바스라진 초콜릿 조각들이 낙엽 모양인 것은 어째서일까……"
4196510691-NameKr = "초콜릿 잉크"
4196510691-DescriptionKr = "노아가 장난처럼 준비한 초콜릿 잉크. 깃펜에도 잘 묻지 않고, 상하기도 쉬워 글을 적는 데에는 적합하지 않지만, 마음을 전하고자 할 때는 이만한 잉크도 따로 없을 것이다."
70201916-NameKr = "특별 초콜릿 공로 훈장"
70201916-DescriptionKr = "체룐카의 생산에 기여한 공로로, 마리나가 받은 초콜릿 훈장. 마리나의 노력과 긍지를 증명하는 수단이기도 하다."
967689799-NameKr = "시구레 비터 스페셜"
967689799-DescriptionKr = "시구레가 만든 무알코올 초콜릿 칵테일. 깔끔한 단맛을 내기 위해, 마지막에 쓰디쓴 비터 초콜릿을 한 조각 넣는 것이 포인트라고 한다. "
3442222452-NameKr = "병아리 모양 초콜릿"
3442222452-DescriptionKr = "어디까지나 의료 용품이라고 주장하는 미네의 초콜릿. 그런 것 치고는 묘하게 고급인 데다 귀여운 포장으로 감싸여 있다."
18239407-NameKr = "자몽 칩 초콜릿"
18239407-DescriptionKr = "말린 자몽에 초콜릿을 묻혀 만든 아유무의 간식. 카페인과 테오브로민, 비타민까지 한 번에 섭취할 수 있어, 피로가 회복되는 것 같은…… 느낌적인 느낌이 든다고 한다."
390594649-NameKr = "수제 초코스틱"
390594649-DescriptionKr = "이치카가 선생님을 위해 직접 만든 초콜릿. 들고 먹기 편하게 막대의 형태를 하고 있다. 수제임에도 기성품 못지않은, 빼어난 마감 처리가 이루어져 있다."
3418867182-NameKr = "초코 슬리퍼"
3418867182-DescriptionKr = "실제 슬리퍼 사이즈와 똑같은 상당히 커다란 초콜릿. 보기와 달리 굉장히 튼튼해, 실제로 신고 다녀도 될 정도라고 한다."
3006306790-NameKr = "시크릿 메시지"
3006306790-DescriptionKr = "코유키가 선생님에게 발송한 수제 초콜릿 세트. 겉으로 보기에는 평범한 선물용 초콜릿이지만, 코유키답게 또 다른 의미가 함께 숨어 있다."
291186913-NameKr = "스스로 내린 선택"
291186913-DescriptionKr = "사쿠라코가 선생님을 위해 구한 고급 초콜릿 세트. 평소와 달리 사쿠라코 스스로 고민하고 생각해 결정을 내린, 좀처럼 얻기 힘든 귀한 선물이다."
498190404-NameKr = "발렌타인 도전장"
498190404-DescriptionKr = "도전장의 형태를 한 레이사의 초콜릿. 사실 넓적한 초콜릿 위에 도전장 봉투를 씌워 두었을 뿐이다. 안에는 레이사의 편지가 담겨 있다."
2827551265-NameKr = "온천 달걀 초콜릿"
2827551265-DescriptionKr = "메구의 특제 수제 초콜릿. 얼핏 온천 달걀과 비슷하게 생겨 헷갈리기 쉽다. 한 번에 대량으로 만들기 때문에, 필요하면 얼마든지 받아 갈 수 있다고 한다."
2152153824-NameKr = "초콜릿 월병"
2152153824-DescriptionKr = "루미가 선생님에게 '시식'을 부탁하고 싶다는 이유로 만든 초콜릿 월병. 요리사답게 다양한 방법으로 만들어져, 모두 선생님이 맛보아 주었으면 하는 마음을 담았다."
219184488-NameKr = "현룡문 문양 초콜릿"
219184488-DescriptionKr = "미나가 자신에게 있어 '가장 중요한 것'을 형상화하여 만든 초콜릿. 그 마음은 분명히 기쁘지만, 어딘가 엇나가고 있는 것 같다는 느낌도 들기는 한다……."
717036626-NameKr = "초콜릿 열쇠고리 굿즈"
717036626-DescriptionKr = "모미지가 당첨 상품이라고 주장하는 열쇠고리와 초콜릿. 우연의 일치인지, 모미지와 함께 한 쌍으로 되어 있다."
2219659309-NameKr = "나기사의 평범한 초콜릿"
2219659309-DescriptionKr = "나기사가 선생님께 감사하는 마음을 담아 직접 만든 초콜릿. 다른 의도나 정치적 해석이 담기지 않길 바라는 나기사의 희망을 담아, 의도적으로 심플하고 소박하게 꾸며져 있다. 하지만 초콜릿의 맛과 퀄리티는 웬만한 가게의 기성품을 아득히 뛰어넘는다."
2751216385-NameKr = "고열량 초콜릿"
2751216385-DescriptionKr = "발렌타인 데이라는 날을 즐기고 싶지만 그러지 못하는 미노리가 고안해낸 해결법. 미노리는 겸사겸사 준 것처럼 이야기했지만, 사실 수많은 메이커 중 이것을 고르는 데에 꽤 많은 시간을 소비했다."
2983078984-NameKr = "인식의 차이"
2983078984-DescriptionKr = "아오이가 선생님을 위해 준비한 초콜릿 세트. 크기는 작지만 하나하나 상당한 수고가 들어가 있다. 상대가 어떤 것을 좋아할지 몰라, 일부러 크게 다른 종류들로 구성한 것처럼 보인다."
3666669973-NameKr = "프라나의 프라나 듬뿍 초콜릿"
3666669973-DescriptionKr = "프라나가 아로나 몰래 공들여 만든 초콜릿. 선생님의 취향에 딱 맞는 맛이 난다."
967746156-NameKr = "자화상 초콜릿"
967746156-DescriptionKr = "메루가 화이트 초콜릿 판 위에 직접 그린, 메루의 얼굴 드로잉 초콜릿. 메루는 완성도라는 측면에서 마음에 들지 않는 것 같지만, 진정한 문제는 그것을 어디에서부터 먹어야 하느냐는 것이었다."
3706730641-NameKr = "최고, 최선, 궁극의 수제 초콜릿 케이크"
3706730641-DescriptionKr = "키보토스의 유명 과자점과 비교해도 절대로 밀리지 않을 거라 주장하는 수제 초콜릿. 캐치프레이즈는 최고, 최선, 궁극이라고 한다."
2168519091-NameKr = "전략홍보팀장의 수제 초콜릿"
2168519091-DescriptionKr = "카호가 선생님을 위해 만든 수제 초콜릿. 언뜻 보면 단순한 홍보물로 보이지만, 세심하게 조각한 한 글자 한 글자에 정성이 깃들어 있다."
3486261893-NameKr = "늘 마시던 커피"
3486261893-DescriptionKr = "칸나가 선생님에게 타 준 평범한 블렌딩 커피. 다만 평소와는 달리 칸나의 '주관적인 감정'이 가미된 탓인지 초콜릿과 같은 달콤한 향이 나고 있다."
1766939933-NameKr = "둘이서 함께 만든 생초콜릿"
1766939933-DescriptionKr = "렌게가 선생님의 도움을 받아 무사히 완성한 수제 생초콜릿, 비록 어설프고 완성도가 높진 않지만. 그 안에 녹아 있는 추억만큼은 누구도 부정할 수 없다."
2005226182-NameKr = "작전참모의 초콜릿"
2005226182-DescriptionKr = "키쿄가 선생님을 위해 준비한 초콜릿. 딱딱한 이름과 달리 귀여운 고양이 캐릭터가 그려져 있는 초콜릿이다. 아무래도 이름의 진정한 의미는 이 초콜릿을 전달하기 위한 일련의 비밀 대작전에 있다던가, 뭐라던가."
3801373544-NameKr = "카데노코지 부적과 초콜릿 막과자"
3801373544-DescriptionKr = "선생님을 위해 유카리가 직접 자기 손으로 만든 부적과 아침 일찍 상점가를 돌아다니며 가까스로 손에 넣은 운메에봉 한정판 세트. 카데노코지로서의 자신, 백화요란 부원으로서의 자신을 전부 전해드리고 싶다는 유카리의 여러 마음에서 비롯된 정말 따스한 선물이다."
3081511179-NameKr = "이부키가 만든 초콜릿 푸딩"
3081511179-DescriptionKr = "이부키가 직접 준비한 초콜릿 푸딩. 정성을 더 할수록 재료도 더해진 결과, 엄청나게 달콤한 모습이 되었다. 한꺼번에 많은 양을 먹으면 혀가 저릴지도."
1270452267-NameKr = "미카 특제☆ 초코 롤케이크"
1270452267-DescriptionKr = "선생님을 위해 미카가 직접 구운 초코 롤케이크. 다소 어설프지만 미카의 노력을 엿볼 수 있는 정성이 가득하다."
3269210663-NameKr = "의장님이 준비한 최고급 초콜릿 분수 기계"
3269210663-DescriptionKr = "마코토가 특별히 선생님을 위해 파티와 함께 준비한 최고급 초콜릿 분수 기계. 이대로도 무척 멋진 물건이지만 보다 완벽한 물건을 만들겠다는 마코토의 욕심으로 개조가 이루어진 탓에, 가끔 모터가 폭주하여 사방으로 초콜릿을 뿌릴 때가 있으므로 사용에 주의할 필요가 있다."
1875831713-NameKr = "가마 초콜릿"
1875831713-DescriptionKr = "우미카가 정성스럽게 만든 가마 모양 초콜릿. 가장 안쪽에는 무엇보다 소중한 것이 들어 있다고 한다."
2689554198-NameKr = "S+ 초콜릿 크레이프"
2689554198-DescriptionKr = "키라라가 수많은 실패를 거쳐 가며 직접 만들어준 크레이프. 이것에 배어 있는 정성만큼은 점수로 환산할 수 없다."
960286300-NameKr = "'그 초콜릿' 한가득"
960286300-DescriptionKr = "또 하나의 시로코가 일찍이 건네준 적 있던 초콜릿. 이번에는 대량이다. 농담으로 웃어넘긴 많은 고민 너머로, 오히려 그렇기에 한가득 담은 단순한 마음이 있다."
3431574551-NameKr = "카카오닙스 차"
3431574551-DescriptionKr = "취미인 다도를 살려, 키사키가 직접 내린 카카오닙스 차. 짙은 초콜릿 향과 대비되는, 적절한 쓴맛과 고소한 맛이 인상적이다."
2259933796-NameKr = "철사장 초콜릿"
2259933796-DescriptionKr = "레이죠가 무언가 '특별한 방법'으로 만들었다는 철사장 초콜릿. 선명하게 찍혀 있는 주먹 모양은, 그녀의 것이기도 하다."
3142750909-NameKr = "사츠키의 시크릿 레시피 초콜릿"
3142750909-DescriptionKr = "코인 모양의 수제 초콜릿이 담긴 고급 상자. 선생과의 친밀감을 강화하고자 사츠키가 비밀 레시피를 사용해 만들었다."
1486627927-NameKr = "치아키의 주간만마전 발렌타인 호외편"
1486627927-DescriptionKr = "고급스럽고 화려한 초콜릿을 찍은 폴라로이드 사진. 그러나 동봉된 초콜릿은 어째서인지 찌그러지고 엉성하다."
491306207-NameKr = "세이아의 함정 초콜릿"
491306207-DescriptionKr = "세이아의 초콜릿. 초콜릿과 함께 금빛으로 빛나는 영수증이 동봉돼 있다. 부주의하게 서명했다간 어떤 일로 이어질지 장담할 수 없다."
782661412-NameKr = "밀레니엄 교표 초콜릿"
782661412-DescriptionKr = "밀레니엄 사이언스 스쿨의 교표가 새겨진 리오의 초콜릿. 가장 합리적이고 이성적인 공정으로 만들었다고, 본인은 주장한다."
1094002594-NameKr = "야구 용품 3신기 초콜릿"
1094002594-DescriptionKr = "글러브, 배트, 야구공. 세 가지만 있으면 누구와도 야구를 할 수 있다고 한다. 그것을 모두 초콜릿으로 만들었다는 것은, 그 자체로 진심일지도 모르는 일이다. "
506164489-NameKr = "초- 신상 초코볼!!"
506164489-DescriptionKr = "히카리가 가져온 따끈따끈한 신상 간식. 어떤 맛일지 짐작도 안 가지만…… 엄청나게 먹고 싶은데도 꾹 참고 선물로 가져온 점이 기특하다."
1272169695-NameKr = "피로회복 영양젤리"
1272169695-DescriptionKr = "필수 영양소가 가득 담긴 젤리. 과로에 시달리는 선생님에게 꼭 필요한 선물일지도."
1649572559-NameKr = "구겨진 봉투와 쪽지"
1649572559-DescriptionKr = "살짝 구겨진 봉투 안에 평범한 시판 초콜릿이 담겨 있다. 꼬깃꼬깃 접힌 쪽지의 내용은……?"
3907944625-NameKr = "하얀 여인"
3907944625-DescriptionKr = "백귀야행 자치구 곳곳에서 판매되고 있는 에비스산 초콜릿 쿠키. 얇은 화이트 초콜릿 코팅 덕분에 바삭한 맛이 일품이지만, 초콜릿이 녹아 손이 더러워지기 쉬운 점이 단점이다. "
950107355-NameKr = "상자 속에 든 초콜릿"
950107355-DescriptionKr = "거창하게 포장된 초콜릿 상자. 안에는 수제 초콜릿 단 하나가 들어 있다. 개수는 적지만, 니야의 장난기가 가득 담긴 일품."
2522956263-NameKr = "마력(?)이 담긴 초콜릿"
2522956263-DescriptionKr = "에리가 자신의 마력을 담았다고 주장하는 초콜릿. 먹으면 힘이 솟는 느낌이 든다."
3646064924-NameKr = "유령 초콜릿 머핀"
3646064924-DescriptionKr = "귀여운 화이트 초콜릿 유령이 장식된 머핀. 보고 있으면 어디선가 카노에의 목소리가 들리는 것 같다."
1600461265-NameKr = "문학적인 티라미수"
1600461265-DescriptionKr = "냉장시키면 한층 더 맛있게 먹을 수 있는 티라미수. 하지만 그 기다림 동안 나누는 대화가 더 달콤할지도 모를 일이다."
788496083-NameKr = "특대형 초콜릿 곱스토퍼"
788496083-DescriptionKr = "크고 단단해서 부숴 먹어야 하는 사탕. 입안에서 굴리며 오랫동안 그 달콤함을 즐겨 보자."
2100977290-NameKr = "초코 스태츄"
2100977290-DescriptionKr = "거대한 데다 녹지도 않고 미적인 가치도 뛰어나다. 먹을 수 없다는 사실만 제외하면 완벽한 초콜릿."
2647895027-NameKr = "절취선 초콜릿"
2647895027-DescriptionKr = "흔한 시판품이지만, 흔하지는 않다. 소장 가치가 높다."
1217736606-NameKr = "초코 머랭 쿠키"
1217736606-DescriptionKr = "흰자에 설탕을 섞어 가며 빠르게 휘저어 만든 머랭에, 초코 파우더 같은 부재료를 넣어서 구운 쿠키.\n식재료는, 소중한 것이다."
165942245-NameKr = "카르토슈카"
165942245-DescriptionKr = "당밀 과자 가루에 연유, 설탕, 카카오와 계피 분말 등을 섞어서 만든 초콜릿케이크.\n모두에게는 각자의 가능성이 있는 법이다."
1366975366-NameKr = "초콜릿 미다비크"
1366975366-DescriptionKr = "초콜릿케이크 시트와 꿀, 초코 크림을 켜켜이 쌓아 올려 만든 케이크. \n협상과 계약은, 어쨌든 중요하다."
4174179093-NameKr = "시판(?) 초콜릿"
4174179093-DescriptionKr = "적당히 가게에서 파는 것을 사 왔다고 주장하는 초콜릿.\n이따금 진실에 다가갔으면서도, 다가가지 않은 척을 해야 할 때가 있다."
