1699247498-DescriptionKr = "트리니티 학원의 교모로도 사용되는 흰색의 리본 베레모. 착용자의 말에 의하면 베레모의 볼륨감을 예쁘게 살리는 것이 생각보다 어렵다고 한다."
2090555875-NameKr = "방탄 헬멧"
2090555875-DescriptionKr = "머리를 향해 날아오는 온갖 물건을 막아낼 수 있는 튼튼한 방탄 헬멧. 외피는 부드러운 면 소재로 제작되어 패치 등을 붙여 꾸밀 수 있다."
1300177111-NameKr = "프릴 미니 햇"
1300177111-DescriptionKr = "화려한 프릴로 장식된 미니 햇. 챙 아래에 모자를 고정시키기 위한 작은 헤어핀이 숨겨져 있다."
835357934-NameKr = "버킷 햇"
835357934-DescriptionKr = "얼굴 윗부분을 내리덮는 버킷 햇. 마스크와 조합하면 얼굴의 노출을 최소한으로 할 수 있기 때문에 자외선 대책에도 OK."
2831939832-NameKr = "리프 리본 페도라"
2831939832-DescriptionKr = "나뭇잎 장식이 리본 모양으로 꽂혀 있는 패브릭 페도라. 휴양지 패션에 잘 어울린다."
2978527733-NameKr = "세일러 햇"
2978527733-DescriptionKr = "줄무늬로 가볍게 포인트를 준 흰색 세일러 햇. 심플한 디자인의 이 모자는 오디세이아 해양학원의 교모로도 사용되고 있다."
4017761813-NameKr = "게이밍 헬멧"
