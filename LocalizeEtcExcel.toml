2380075408-DescriptionTh = "พลังค่าโจมตีของฝ่ายเราตามสัดส่วน HP ของหุ่นรบล้ำยุค"
3988062708-NameTh = "เพิ่มหรือลดความเสียหายที่ทำได้"
3988062708-DescriptionTh = "เมื่อหุ่นมี HP มากกว่า 99% ความเสียหายจากฝ่ายเราจะเพิ่มขึ้น\nเมื่อหุ่นมี HP น้อยกว่า 99% ความเสียหายจากฝ่ายเราจะลดลง"
1947863360-NameTh = "เพิ่มประสิทธิภาพเจาะเกราะ"
1947863360-DescriptionTh = "ยิ่ง HP ปัจจุบันของหุ่นรบล้ำยุคสูงเท่าไหร่ ประสิทธิภาพพิเศษเจาะเกราะของฝ่ายเราจะยิ่งเพิ่มขึ้นเท่านั้น (สะสมได้สูงสุด 4 ครั้ง)\nHP สูงสุดและค่าโจมตีของศัตรูจะเพิ่มขึ้น"
3506418518-NameTh = "เพิ่มความเสียหายจากประเภทป้องกันแบบเกราะเบา"
3506418518-DescriptionTh = "เพิ่มความเสียหายจากนักเรียนฝ่ายเราที่เป็นประเภทป้องกันแบบเกราะเบา"
2605783397-NameTh = "นักเรียนประเภทระเบิดรักษาหุ่นเพิ่มเติม เพิ่ม HP สูงสุดของหุ่น"
2605783397-DescriptionTh = "เมื่อนักเรียนประเภทระเบิดรักษาหุ่น หุ่นจะฟื้นฟู HP เพิ่มเติม\nเพิ่ม HP สูงสุดของหุ่น"
2963837983-NameTh = "รักษาหุ่นไล่กาเพิ่มเติม และเพิ่ม HP สูงสุดของหุ่นไล่กา"
2963837983-DescriptionTh = "เมื่อนักเรียนประเภทลึกลับรักษาหุ่นไล่กา จะฟื้นฟู HP ของหุ่นเพิ่มเติม\nเพิ่ม HP สูงสุดของหุ่น"
1700139755-NameTh = "เพิ่มค่าโจมตีอาวุธ AR, SR"
1700139755-DescriptionTh = "เพิ่มค่าโจมตีของนักเรียนฝ่ายเราที่ใช้อาวุธ AR หรือ SR"
1978816286-NameTh = "เพิ่มความเสียหายที่อาวุธ SG ทำได้ ลดความเสียหายที่ศัตรูได้รับ"
1978816286-DescriptionTh = "เพิ่มความเสียหายของนักเรียนฝ่ายเราที่ใช้อาวุธ SG ทำได้\nและลดค่าความเสียหายที่ศัตรูได้รับลง"
91276670-NameTh = "เพิ่มความเสียหายเผาไหม้ หนาวสั่น พิษ เสียงเชียร์เร่าร้อนและไฟช็อต"
91276670-DescriptionTh = "เมื่อนักเรียนประเภทสั่นสะเทือนโจมตีศัตรูที่ติดเอฟเฟกต์เผาไหม้ หนาวสั่น พิษ เสียงเชียร์เร่าร้อนและไฟช็อต จะสร้างความเสียหายเพิ่มเติม"
1918590817-NameTh = "ความเสียหายเพิ่มเติม"
