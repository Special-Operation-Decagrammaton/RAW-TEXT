2335488326-NameKr = "파손된 안티키테라 장치"
2335488326-DescriptionKr = "형체를 알아보기 힘들 정도로 파손된 안티키테라 장치. 각종 제조 및 강화에 사용된다."
1872991591-NameKr = "마모된 안티키테라 장치"
