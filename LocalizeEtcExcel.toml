404292254-NameTw = "在溫泉浴場入口接待客人的員工身影"
404292254-DescriptionTw = "我們溫泉浴場一向以最親切的笑容迎接客人。\n（如遇到送上可疑飲料的員工，請立即向女將通報！）"
4035745238-NameTw = "導覽溫泉浴場內部庭園的女將身影"
4035745238-DescriptionTw = "我們溫泉浴場是以由岩石與細沙打造出的枯山水庭園所組成的。\n請在洋溢節制之美的質樸庭園中找回內心中的禪意吧。"
1774361412-NameTw = "清潔住房的女將身影"
1774361412-DescriptionTw = "我們溫泉浴場採取一天消毒兩次的方針，\n不需要擔心衛生問題，可以盡情放鬆休息！"
3950044430-NameTw = "在露天溫泉慵懶地享受泡湯的客人身影"
3950044430-DescriptionTw = "我們溫泉浴場的泉水有美白、增強活力、提升射擊能力等效果，\n透過泡湯發掘出全新的自我吧！"
999560012-NameTw = "在宴會場享用餐點的客人身影"
999560012-DescriptionTw = "我們溫泉浴場的料理使用的是最高級的食材。\n放入了大量的溫泉饅頭及好粗棒，請一定要品嘗看看！"
1094144720-NameTw = "練習"
1094144720-DescriptionTw = "在沒有比賽的日子也可以使用的田徑運動場田徑跑道。 \n有意願的學生請向田徑管理委員會提交使用許可書。"
2809976808-NameTw = "應援"
2809976808-DescriptionTw = "為體育增添光彩的應援！\n為參加比賽的選手們吶喊助威吧！"
374407097-NameTw = "作業"
374407097-DescriptionTw = "晄輪大祭實行委員們都在盡最大的努力讓全體參加者都能享受大運動會。 \n比賽中發生問題的話，請到運動場內的營運本部。"
1521840386-NameTw = "製造"
1521840386-DescriptionTw = "田徑運動場的倉庫裡準備了可以簡單修理的工具。 \n（任何人都可以自由使用，但請不要進行危險的改造！）"
3558610679-NameTw = "休息"
3558610679-DescriptionTw = "運動後攝取水分吧！ \n田徑運動場的休息室裡有免費的飲料設備，請不要忘記補充水分！"
317946005-NameTw = "在跑道上享受早午餐"
317946005-DescriptionTw = "羽留奈：「就算是一片麵包也要吃得優雅。從容地用餐才是美食的基本。」\n淳子：「等一下，泉！你怎麼連我的份都吃了！」"
543266597-NameTw = "紙條上寫的內容"
543266597-DescriptionTw = "亞子：「…………沒中？」\n愛麗絲：「愛麗絲已達成完成任務的條件！」"
860818406-NameTw = "騎馬與駭客"
860818406-DescriptionTw = "真紀：「腳，腳沒有力氣了……」 / 小玉：「快，快暈倒了……」\n千尋：「所以我才說平常要運動嘛。」"
3205226752-NameTw = "手榴彈交棒"
3205226752-DescriptionTw = "萌：「咲希，快收下！」\n咲希：「等，等一下！拉環去哪兒了？」"
2479371781-NameTw = "修復作業"
2479371781-DescriptionTw = "琳：「為了確保市民的安全，盡快進行居住區的修復吧。」"
2720792911-NameTw = "聯邦學生會開會中"
2720792911-DescriptionTw = "琳：「步……更正，調停室長。請報告這個地區的修復狀況。」\n步：「好，好的！是修復狀況的報告書對吧！我現在立刻拿來！」"
1248524252-NameTw = "意外的才能"
1248524252-DescriptionTw = "步：「啊，啊哇哇……這，這樣又要跌倒了……」\n桃香：「哦哦～沒想到步前輩還會這種特技啊。雖然有點擔心他會不會跌倒……」"
2076555680-NameTw = "明太子口味怠忽職守"
2076555680-DescriptionTw = "桃香：「果然，明太子口味的點心不管什麼時候吃都很美味呢～（喀滋）」\n琳：「…………桃香？」"
2282918223-NameTw = "通過石牆迷宮！"
2282918223-DescriptionTw = "日向「大家都平安無事地出來了嗎？真是太好了！」\n小春「……密室逃脫遊戲……？」"
2182173966-NameTw = "通過地下遺跡！"
2182173966-DescriptionTw = "憂「哦哦……這是……！」\n花子「難得看見憂同學這麼有活力的樣子呢。呵呵。」"
742766755-NameTw = "通過廢棄的檸檬農場！"
742766755-DescriptionTw = "日向「要帶幾個分給其他人嗎？」\n小春「嗯？我，我也要拿嗎？」"
2756625307-NameTw = "通過被遺忘的燈塔！"
