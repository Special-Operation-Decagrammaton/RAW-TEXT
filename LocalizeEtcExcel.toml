2955856831-NameKr = "편백나무 힐링 세트 욕조"
2955856831-DescriptionKr = "편백나무로 제작된 욕조. 편백나무 향이 느껴지는 따뜻한 온천물에 몸을 담궈보자!"
2890230456-NameKr = "눈꽃 무늬 그라데이션 배경"
2890230456-DescriptionKr = "겨울을 표현한 눈꽃 무늬 그라데이션 배경. 차갑지만 따뜻한 느낌을 준다."
2725409580-NameKr = "원목 의자"
2725409580-DescriptionKr = "마감이 우수한 원목 의자. 습기와 오염에 강하여 오래 사용할 수 있다."
2672820625-NameKr = "전통 무늬 비단 방석"
2672820625-DescriptionKr = "전통 무늬로 제작된 비단 방석. 고급스러운 느낌의 원단이 우아함을 더해준다."
559929639-NameKr = "전통 무늬 우산 장식"
559929639-DescriptionKr = "전통 무늬가 그려진 우산 장식. 선명한 색으로 단조로운 곳에 포인트를 준다."
4169048233-NameKr = "새해 원형 무드등"
4169048233-DescriptionKr = "전통적인 실루엣으로 제작된 원형 무드등. 어두운 밤 은은한 달빛을 닮은 조명이다."
4132019214-NameKr = "새해 기모노 허리띠 걸이"
4132019214-DescriptionKr = "아름다운 색 조합이 눈에 띄는 기모노 허리띠 걸이.  공간에 우아하면서도 화려한 무드를 더해준다."
865507405-NameKr = "새해 컬러 파티션"
865507405-DescriptionKr = "새해의 다양한 색을 담은 파티션. 파티션으로 원하는 공간을 만들어보자!"
912542863-NameKr = "전통 격자무늬 여닫이 창문"
912542863-DescriptionKr = "전통 방식으로 제작된 여닫이 창문. 격자무늬 창문으로 전통적인 분위기를 연출할 수 있다!"
3281141254-NameKr = "등유 난로와 찹쌀떡"
3281141254-DescriptionKr = "공간을 데워주는 등유 난로와 찹쌀떡. 따뜻하게 부풀어 오른 찹쌀떡을 다 같이 나눠 먹자!"
3619410636-NameKr = "새해 켄다마 세트 테이블"
3619410636-DescriptionKr = "켄다마 세트가 놓인 테이블. 새해에는 켄다마 세트를 가지고 놀아보자!"
4257359360-NameKr = "꽃무늬 비단 기모노 걸이"
4257359360-DescriptionKr = "최고급 원목으로 제작된 기모노 걸이. 꽃무늬 비단으로 만들어진 기모노가 걸려 있다."
2014277693-NameKr = "새해 음식 세트 테이블"
2014277693-DescriptionKr = "새해 음식이 가득 차려진 테이블. 맛있는 음식과 함께 신년을 맞이하자!"
2021964788-NameKr = "벽돌식 배치 다다미 바닥"
2021964788-DescriptionKr = "벽돌식으로 배치된 다다미 바닥. 다다미가 빗겨나게 배치되어 공간의 즐거움을 더해준다."
1058759786-NameKr = "새해 신춘휘호 세트 테이블"
1058759786-DescriptionKr = "신춘휘호를 위한 세트가 놓인 테이블. 올해의 다짐을 작성해보자!"
2750168500-NameKr = "새해 금장 장식 벽"
2750168500-DescriptionKr = "금장 장식으로 꾸며진 전통 벽. 화려한 금장 장식과 절제된 배색이 우아한 공간을 만들어준다."
809156626-NameKr = "새해 릴렉스 코타츠"
809156626-DescriptionKr = "휴식을 취할 수 있는 따뜻한 코타츠. 코타츠 안에서 방심하면 어느새 잠들어 버릴 거야!"
3475231401-NameKr = "새해 전통 무늬 배경"
3475231401-DescriptionKr = "새해에 어울리는 색채의 전통 무늬 배경. 다양한 색으로 그려진 파도가 배경이 우아한 느낌을 준다."
1135136904-NameKr = "원목 보조의자"
1135136904-DescriptionKr = "단단한 보조 의자. 나사를 강하게 조일수록 더 안전하게 사용할 수 있다."
131630372-NameKr = "밀리터리 탄약 수납 상자"
131630372-DescriptionKr = "각종 탄약과 무기들이 수납된 상자. 군사 훈련 시 필수로 챙겨야 하는 아이템이다."
2428867451-NameKr = "정사각형 특수 문양 카펫"
2428867451-DescriptionKr = "특수 문양이 새겨진 정사각형 카펫. 부드럽고 편안한 질감으로 제작되었다."
956313554-NameKr = "직사각형 특수 문양 카펫"
956313554-DescriptionKr = "특수 문양이 새겨진 직사각형 카펫. 감각적인 디자인으로 공간에 포인트를 줄 수 있다."
883245586-NameKr = "녹색 접이식 캠핑 체어"
883245586-DescriptionKr = "나뭇잎 포인트의 녹색 접이식 캠핑 체어. 내구성이 좋아 장시간 야외 사용에 적합하다."
4054292983-NameKr = "노란색 접이식 캠핑 체어"
4054292983-DescriptionKr = "노란색 포인트의 접이식 캠핑 체어. 고강도 알루미늄으로 제작되어 가볍고 견고하다."
3114421539-NameKr = "분홍색 접이식 캠핑 체어"
3114421539-DescriptionKr = "분홍색 포인트의 접이식 캠핑 체어. 간단하게 접을 수 있어 이동과 보관이 편리하다."
1357702247-NameKr = "파란색 접이식 캠핑 체어"
1357702247-DescriptionKr = "파란색 포인트의 접이식 캠핑 체어. 오염에 강한 원단으로 제작되어 야외 사용에 적합하다."
3188287550-NameKr = "밀리터리 파티션"
3188287550-DescriptionKr = "오염에 강한 원단으로 제작된 파티션. 넓은 공간을 원하는 형태로 분리할 수 있다."
817437883-NameKr = "접이식 간편 테이블"
817437883-DescriptionKr = "파란색 접이식 간편 테이블. 원하는 곳에 간단하게 설치할 수 있어 매우 편리하다."
3854437007-NameKr = "캠핑 브런치 세트 테이블"
3854437007-DescriptionKr = "포근한 소품들과 샌드위치가 놓인 브런치 테이블 세트. 낭만적인 브런치 타임을 즐길 수 있다."
849759719-NameKr = "접이식 특수 문양 체어"
849759719-DescriptionKr = "컴팩트한 사이즈의 접이식 특수 문양 체어. 밋밋한 공간에 포인트를 줄 수 있다."
1263032379-NameKr = "밀리터리 비상식량 수납장"
1263032379-DescriptionKr = "튼튼한 소재로 제작된 비상식량 수납장. 야외 활동 시 필수로 챙겨야 하는 아이템이다."
950494687-NameKr = "밀리터리 2단 야전 침대"
950494687-DescriptionKr = "오염에 강한 원단으로 제작된 2단 야전 침대. 불편한 야외에서도 포근하게 잠들 수 있다."
3786466012-NameKr = "캠핑 목재 데크 바닥"
3786466012-DescriptionKr = "목재로 제작된 데크 바닥. 풀숲에 설치된 데크 위에서 안정적인 캠핑을 즐길 수 있다."
52695003-NameKr = "밀리터리 캠핑 타프 벽"
52695003-DescriptionKr = "대형 타프의 내부 벽. 방한 원단으로 제작된 타프의 내부 공간은 포근한 느낌을 준다."
