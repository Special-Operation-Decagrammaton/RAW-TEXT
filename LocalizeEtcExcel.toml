1448270761-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 5"
1448270761-DescriptionTh = "ใช้สกิลทำลายเอฟเฟกต์อันตรายเพื่อทำลายมิสไซล์ของเกวูราห์\nและใช้อุปกรณ์เก็บฟื้นฟูเพื่อป้องกันการแช่แข็งได้"
2396453793-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 6"
2396453793-DescriptionTh = "ชมรมปรากฏการณ์ลี้ลับจะคอยช่วยเหลือฝ่ายเรา\n\nหลังจากกำจัดศัตรู ชมรมปรากฏการณ์ลี้ลับจะรวบรวมข้อมูล และนำไปวิเคราะห์ แล้วนำข้อมูลวิเคราะห์แล้ว มาใช้ทำให้เกวูราห์อ่อนแอ และทำให้ฝ่ายเราแข็งแกร่งขึ้นได้"
3833784038-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 1"
3833784038-DescriptionTh = "คาสุมิวิ่งหนีไปที่รถไฟขบวนด้านหน้าเพื่อหลบระเบิดที่ถูกวางไว้ก่อนแล้ว\nรีบหลบไปที่ขบวนด้านหน้าก่อนจะระเบิดเร็ว"
3483475612-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 2"
3483475612-DescriptionTh = "ระวังการโจมตีโดยรอบไว้ให้ดี\n\nเตรียมบุกเข้าจากด้านหลังได้"
4029303020-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 3"
4029303020-DescriptionTh = "ลดความเร็วการฟื้นฟูค่าใช้สกิลของนักเรียนประเภท Striker ฝ่ายเราอย่างมาก\n\nล้มศัตรูหรือทำลายตู้ขายของอัตโนมัติเพื่อรับค่าใช้สกิลจำนวนหนึ่ง"
28119784-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 4"
28119784-DescriptionTh = "ประเภทโจมตีของศัตรูถูกเปลี่ยนเป็นประเภทลึกลับ\n\nกำจัดนักเรียนฝ่ายบริการบนรถไฟไฮแลนเดอร์เพื่อรับค่าใช้สกิลจำนวนหนึ่ง\n\nเมื่อถูกการโจมตีทั่วไปจากป้อมปืนไฮแลนเดอร์ จะมีโอกาสต่ำที่จะซ้อนทับเอฟเฟกต์อันตรายที่ลดค่าป้องกัน และอัตราหลบหลีกของเป้าหมาย"
3754973665-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 1"
3754973665-DescriptionTh = "สมาชิกแก๊งหมวกกันน็อก 'หุ่นจักรกลตลาดมืดที่ถูกทิ้ง' จะบุกเข้ามาโจมตีมิซากะ มิโคโตะ\n\nช่วยจัดทีมนักเรียนเพื่อป้องกันมิซากะ มิโคโตะจากเหล่าศัตรูด้วยค่ะ"
981107711-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 2"
981107711-DescriptionTh = "โชคุโฮว มิซากิคือผู้ที่ควบคุมเหล่าสมาชิกแก๊งหมวกกันน็อก\n\nโจมตีโชคุโฮว มิซากิที่เป็นผู้บงการก่อน และขัดขวางสมาชิกแก๊งหมวกกันน็อกที่ถูกควบคุม"
247331126-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 3"
247331126-DescriptionTh = "เมื่อทหาร PMC ได้รับความเสียหาย เหล่า PMC พาวเวอร์โลดเดอร์\nก็จะได้รับความเสียหายด้วยเช่นกัน\n\nในครึ่งหลังจะมีศัตรูจำนวนมากปรากฏตัวออกมา โปรดจัดทีมด้วยนักเรียนที่โจมตีในรัศมีวงกว้าง"
3717534249-NameTh = "ทิปส์ด่านกิจกรรม ด่าน CHALLENGE 4"
3717534249-DescriptionTh = "เมื่อมีหุ่นจักรกลตลาดมืดทนทานที่ถูกทิ้งอยู่ในพื้นที่ จะกำจัดศัตรูอื่นๆ ได้ลำบาก\n\nใช้นักเรียนประเภท Healer จำกัดศัตรูด้วยหุ่นหุ่นที่วนไปมาอยู่รอบๆ และหุ่นไล่กา"
2028021589-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
2028021589-DescriptionTh = "ใช้ประโยชน์จากเอฟเฟกต์กดขี่เพื่อเอาชนะศัตรู"
2080523366-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
2080523366-DescriptionTh = "เมื่อล้มศัตรูลงได้ จะได้รับเอฟเฟกต์ที่เป็นประโยชน์ในช่วงเวลาสั้นๆ\nรีบกำจัดศัตรูตัวถัดไปให้ได้ก่อนที่เอฟเฟกต์นั้นจะหมดเวลา"
11412844-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
11412844-DescriptionTh = "หมีและกระต่ายที่ดุร้ายและแข็งแกร่งจะมาขวางทางคุณ\nทำให้หมีสับสนหรือสนับสนุนสึมิเระให้เอาชนะศัตรูได้"
1768013184-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
1768013184-DescriptionTh = "ติดตั้งวัตถุกำบังเพื่อสะท้อนการโจมตีของศัตรู"
2920989374-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
2920989374-DescriptionTh = "คุ้มกันซาโอริและจัดการศัตรูจากทั้งสองทิศทางอย่างรวดเร็ว"
389255540-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
389255540-DescriptionTh = "อารุ (เดรส) กับคาโยโกะ (เดรส) ใช้สกิล EX ประสานกัน พยายามอย่าให้อารุ (เดรส) ใช้สกิล EX กับคาโยโกะ (เดรส) ได้"
2681487799-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
2681487799-DescriptionTh = "ถ้าคาโยโกะ (เดรส) ในทีมเราไม่ถูกโจมตี สกิล EX จะให้ผลรุนแรงขึ้น เผชิญหน้ากับบอสโดยไม่ให้ถูกการโจมตีในวงกว้างของบอส"
3119514688-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
3119514688-DescriptionTh = "กำจัดศัตรูที่สร้างความเสียหายรุนแรงในแนวหลังก่อน"
1154240687-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
1154240687-DescriptionTh = "พยายามโค่นปีศาจกับกรรมการวินัยที่ต่อสู้กันอยู่ และรักษาให้เกจประเมินเทศกาลไม่กลายเป็น 0 กรรมการวินัยบางคนจะโต้ตอบกลับหากถูกโจมตี"
826504021-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
826504021-DescriptionTh = "มีการอัญเชิญศัตรูที่แข็งแกร่งขึ้นเรื่อยๆ ให้รีบกำจัดสิ่งอัญเชิญก่อน"
228867329-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
228867329-DescriptionTh = "หุ่นดูดฝุ่นมีลักษณะเฉพาะที่จะใช้ดีบัฟและสร้างความเสียหายกับพื้นที่รอบๆ ในทุกครั้งที่ถูกสกิล EX โจมตีให้ถอยหลังและล้มลง\n\nใช้สกิล EX โจมตีใส่หุ่นดูดฝุ่นให้ล้มลงใกล้ศัตรู"
3692835812-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
3692835812-DescriptionTh = "สนับสนุนเครื่องยิงพลุของอุมิกะพร้อมกับกำจัดปีศาจที่เข้ามาขัดขวาง\nงานเทศกาล\n\nทุกครั้งที่ค่าเตรียมเทศกาลถึง 25% จะเปิดใช้เอฟเฟกต์ที่มีประโยชน์ และเอฟเฟกต์อันตรายกับศัตรูและฝ่ายเรา\n\nปีศาจหน้ากากฮันยาที่เป็นบอสของศัตรูจะได้รับความเสียหายระเบิด"
937127281-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
937127281-DescriptionTh = "รถถังศัตรูเริ่มเคลื่อนที่ไปยังพื้นที่ว่าง และเข้าโจมตีอย่างรุนแรงเมื่อถึง\n\nรถถังศัตรูมีค่าต้านทานความเสียหายจากสกิล EX แต่ประสิทธิภาพของรถถังจะลดลงตามที่ถูกโจมตี\n\nใช้ลักษณะเฉพาะเหล่านี้เพื่อกำจัดรถถังศัตรูก่อนที่จะถึงพื้นที่ว่าง"
120747478-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
120747478-DescriptionTh = "ขัดขวางไม่ให้นักเรียนชมรมของหวานหลังเลิกเรียนใช้สกิล"
3642446434-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
3642446434-DescriptionTh = "มอบเอฟเฟกต์ที่เป็นประโยชน์ให้กับเรอิสะเพื่อให้เธอใช้สกิล EX ช่วยเรอิสะกำจัดแยงกี้สาว"
284862043-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
284862043-DescriptionTh = "ทำให้หุ่นจักรกลฮิปปี้อ่อนแอด้วยเอฟเฟกต์กดขี่แล้วเปิดการโจมตี"
3412917378-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3412917378-DescriptionTh = "ถ้าโดนสกิล EX ของแยงกี้สาว 2 ครั้งจะได้รับความเสียหายรุนแรง\n\nถ้าฟื้นฟู HP ของหุ่นไล่กาถึง 100% นักเรียนฝ่ายเราทุกคนจะมี\nสถานะแช่แข็ง และป้องกันสกิลของแยงกี้สาวได้"
110115972-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
110115972-DescriptionTh = "นักเรียนวัลคิรี่จะมาเป็นกำลังเสริมตามเวลาที่กำหนดเพื่อช่วยคันนะ\n\nรีบกำจัดนักเรียนวัลคิรี่ก่อนที่จะมารวมกันเยอะเกินไป"
2111941898-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
2111941898-DescriptionTh = "ใช้สกิลกดขี่เพื่อขัดขวางคันนะไว้ชั่วคราว\nแล้วรีบกำจัดศัตรูที่อยู่ด้านหน้าเพื่อหนีจากคันนะ"
184971332-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
184971332-DescriptionTh = "โจมตีเครื่องสร้างสนามพลาสม่า และสนับสนุนเหล่าหุ่น AMAS ด้วยนักเรียนประเภท Healer\n\nสามารถกำจัดหุ่นดูดฝุ่นดัดแปลงได้ด้วยสกิล EX เท่านั้น"
2842109547-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
2842109547-DescriptionTh = "ให้ดูลักษณะของชายหาดในขณะที่ฮิโยริวิ่งไปตามชายหาด\n\nเมื่อฮิโยริวิ่งไปมาตามชายหาดหลายครั้ง หากลักษณะของชายหาดเปลี่ยน\nไปจากครั้งแรก ให้โจมตีใส่หุ่น X ถ้าชายหาดเป็นแบบเดิมให้โจมตีใส่หุ่น O"
2522165937-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
2522165937-DescriptionTh = "ใช้รถถังเพื่อต้านทานความเสียหายจากศัตรู"
388529582-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
388529582-DescriptionTh = "ใช้สกิลฟื้นฟูและสกิลบัฟเพื่อช่วยจระเข้จักรกลเอาชนะอาเคมิ"
472021647-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
472021647-DescriptionTh = "หากทำให้อาเคมิได้รับเอฟเฟกต์อันตราย เอฟเฟกต์อันตรายจะถูกถ่ายโอน\nไปยังศัตรูที่อยู่รอบอาเคมิ\n\nความเสียหายที่ศัตรูรอบอาเคมิได้รับจะถูกถ่ายโอนไปถึงอาเคมิ\n\nเมื่ออาเคมิโพสต์ท่าทาง ความเร็วในการฟื้นฟูค่าใช้สกิลกับค่าโจมตี\nของฝ่ายเรา และศัตรูทั้งหมดจะเพิ่มขึ้นตามเวลาที่กำหนด"
2507742254-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน CHALLENGE 1"
2507742254-DescriptionTh = "กำจัดศัตรูที่ยกขบวนเข้ามาตามทาง\nจัดทีมโดยมี Dealer ที่โจมตีได้หลายครั้งในเวลาอันสั้น\nเตรียมรับมือกับหุ่นดูดฝุ่นแดงที่จะโจมตีด้วยความเร็วสูง"
2091083376-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน CHALLENGE 2"
2091083376-DescriptionTh = "เตรียมรับการโจมตีในรูปแบบต่างๆ จากศัตรูตามทาง\nใช้หุ่นขัดขวางการโจมตีของศัตรูจากทางด้านล่าง\nและใช้ Dealer ที่โจมตีได้ระยะไกลกำจัดศัตรูที่เข้ามาจากทางด้านบน"
3327008846-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน CHALLENGE 3"
3327008846-DescriptionTh = "เตรียมรับการโจมตีในรูปแบบต่างๆ จากศัตรูตามทาง\nจัดทีมโดยมี Dealer ที่โจมตีได้หลายครั้งในเวลาอันสั้น\nเตรียมรับมือกับหุ่นดูดฝุ่นแดงที่จะโจมตีด้วยความเร็วสูง"
1319806235-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน CHALLENGE 4"
1319806235-DescriptionTh = "เตรียมรับการโจมตีในรูปแบบต่างๆ จากศัตรูตามทาง\nใช้ Tanker ขัดขวางการโจมตีของศัตรูจากทางด้านบน\nและใช้ Dealer ที่โจมตีได้ระยะไกลกำจัดศัตรูที่เข้ามาตามทาง"
3745893259-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน NORMAL 1"
3745893259-DescriptionTh = "ระวังศัตรูที่ออกมาเป็นกลุ่ม\nกำจัดศัตรูที่มารวมตัวกันให้หมดในครั้งเดียว"
3544666202-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน NORMAL 2"
3544666202-DescriptionTh = "เตรียมรับการโจมตีในรูปแบบต่างๆ จากศัตรูตามทาง\nรีบกำจัดหุ่นดูดฝุ่นเพื่อขัดขวางการโจมตีของอาเคมิ"
2852164857-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน NORMAL 3"
2852164857-DescriptionTh = "ป้องกันการโจมตีจากศัตรูบนทางด้านบนและล่างด้วยหุ่นและ Tanker\nเตรียมรับการจู่โจมจากศัตรูบนทางตรงกลาง"
3825563284-NameTh = "ทิปส์กิจกรรมมินิเกมด่าน NORMAL 4"
3825563284-DescriptionTh = "ให้ Healer รักษาหุ่นและเตรียมรับการโจมตีจากศัตรูที่เข้ามา"
467833032-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
467833032-DescriptionTh = "ในด่านมีทั้งระเบิดจริงและระเบิดปลอมวางไว้ สมาชิกมังกรดำจะตอบสนอง และวิ่งหนีระเบิดจริงเท่านั้น\n\nระเบิดจริงจะระเบิดและล้มศัตรูได้"
2000030305-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
2000030305-DescriptionTh = "ต้านทานการโจมตีของศัตรูได้ด้วย Tanker และสกิลลบเอฟเฟกต์อันตราย"
3888748298-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
3888748298-DescriptionTh = "ตามหาบอสที่ซ่อนตัวอยู่ท่ามกลางศัตรูที่มีรูปลักษณ์เหมือนกัน\n\nเมื่อเอาชนะบอสได้สำเร็จ ศัตรูทั้งหมดจะถูกกำจัด\n\nบอสมีโอกาสสูงมากที่จะสร้างความเสียหายคริติคอล ในขณะที่ศัตรูอื่นๆ จะมีโอกาสต่ำมาก"
1179303176-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
1179303176-DescriptionTh = "ย้ายนักเรียนให้สมาชิกชมรมการแสดงงิ้วโจมตีไปทางศัตรู\nสกิลของสมาชิกชมรมการแสดงงิ้วสร้างความเสียหายกับสมาชิกชมรมการ\nแสดงงิ้วคนเดียวกัน"
3297442664-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3297442664-DescriptionTh = "เมื่อศัตรูทั้งหมดมี HP น้อยกว่า 1% จะสร้างเกจกดขี่และโจมตีฝ่ายเราก่อน\nเมื่อเกจกดขี่เต็มจะกำจัดศัตรู"
2684865569-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
2684865569-DescriptionTh = "จัดทีมที่มี Tanker เพื่อต้านทานการโจมตีของศัตรู"
3519883613-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
3519883613-DescriptionTh = "ไคใช้สกิลทำให้ศัตรูติดเอฟเฟกต์พิษ\nเมื่อผู้บริหารมังกรดำติดเอฟเฟกต์พิษ จะเข้าสู่สถานะสับสน\nสามารถลบเอฟเฟกต์พิษของผู้บริหารมังกรดำได้โดยใช้สกิลลบเอฟเฟกต์\nอันตราย"
313921055-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
313921055-DescriptionTh = "ไคจะอ่อนแอลงในทุกครั้งที่กำจัดศัตรูได้\nไคจะใช้บาเรียที่ฟื้นฟูอย่างต่อเนื่อง\nเอาชนะไคด้วยการโจมตีที่รุนแรงในครั้งเดียว"
3486077912-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3486077912-DescriptionTh = "ขัดขวางอย่าให้ซากุระโกะกับมิเนะต่อสู้กัน"
3001581470-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
3001581470-DescriptionTh = "จัดทีมที่มี Tanker เพื่อต้านทานการโจมตีของศัตรู"
2610005946-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
2610005946-DescriptionTh = "เมื่อสมาชิกแก๊งหมวกกันน็อกได้รับความเสียหาย ราบุจะได้รับความเสียหายด้วย\n\nทุกครั้งที่ฝ่ายเราใช้สกิล EX ค่าหลบหลีกของศัตรูจะเพิ่มขึ้น และถูกรีเซ็ตเมื่อ HP ของหุ่นฟื้นฟูจนเต็ม\n\nถ้าฝ่ายเราทุกคนไม่เคลื่อนที่ตามเวลาที่กำหนด จะได้รับเอฟเฟกต์อันตราย"
3941724285-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
3941724285-DescriptionTh = "ถ้าตั้งรับการโจมตีของแยงกี้สาวได้ครบ 4 นาทีจะชนะ\n\nแยงกี้สาวจะแข็งแกร่งขึ้นตามเวลาที่อยู่รอดได้\nและจะถูกการโจมตีของอาเคมิไปด้วย"
2055343512-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
2055343512-DescriptionTh = "รักษาโคยูกิ\n\nถ้าโคยูกิมี HP เหลือน้อยกว่า 50% ศัตรูจะโจมตีนักเรียนฝ่ายเราคนอื่นแทนโคยูกิ"
3473872843-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
3473872843-DescriptionTh = "รีบจัดการโนอา (ชุดนอน) ที่เข้าโจมตีคุกคาม"
105670687-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
105670687-DescriptionTh = "ชนะได้โดยกำจัดหุ่นดูดฝุ่นก่อนฝ่ายตรงข้าม\n\nหุ่นดูดฝุ่นแต่ละตัวมีเอฟเฟกต์ต่างกัน ใช้ประโยชน์จากสิ่งนี้ในการต่อสู้"
4025598380-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
4025598380-DescriptionTh = "เมื่อยูกะ (ชุดนอน) มี HP มากกว่า 50% จะมอบบัฟที่มีประโยชน์ให้กับฝ่ายเรา\n\nขณะที่หุ่นรบล้ำยุคใช้สกิล ค่าป้องกันจะลดลงตามจำนวนถูกโจมตีที่กำหนด"
525037525-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
525037525-DescriptionTh = "แพนจังยักษ์จะได้รับความเสียหายเพิ่มเติมทุกครั้งที่ได้รับความเสียหาย\nต่อเนื่องจากเอฟเฟกต์อันตราย ถ้าติดเอฟเฟกต์หนาวสั่นจะยิ่งได้รับ\nความเสียหายมากขึ้น\n\nยิ่งคณะกรรมการวินัยเกเฮนน่า (SG) โจมตีโดนแพนจังยักษ์\nระยะเวลาความเสียหายที่แพนจังยักษ์ได้รับจะยิ่งเพิ่มขึ้น"
3162907200-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
3162907200-DescriptionTh = "ระวังการโจมตีพื้นที่ของเซนะ (ชุดลำลอง)"
2027711820-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
2027711820-DescriptionTh = "แพนจังยักษ์จะได้รับความเสียหายเพิ่มเติมทุกครั้งที่ได้รับความเสียหาย\n\nจัดทีมนักเรียนที่มีจำนวนครั้งโจมตีสูง"
113373470-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
113373470-DescriptionTh = "ค่าต้านทานคริและค่าต้านทานความเสียหายคริของศัตรูทั้งหมดจะเพิ่มขึ้น\nอย่างมาก\nดังนั้นสามารถเพิ่มความเสียหายต่อศัตรูได้ด้วยนักเรียน SPECIAL ฝ่ายเรา\n\nเมื่อเอาชนะหัวหน้าชมรมแต่ละคนได้ จะสร้างความเสียหายเพิ่มเติมให้กับชมรมนั้นๆ\nใช้ประโยชน์จากสิ่งนี้เพื่อบรรเทาความวุ่นวายจากแต่ละชมรมกันเถอะ"
3202949901-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3202949901-DescriptionTh = "หากกำจัดหุ่นดูดฝุ่นแดงได้จะกำจัดหุ่นดูดฝุ่นรอบตัวได้ด้วย\nหุ่นดูดฝุ่นแดงจะได้รับความเสียหายเพียงเล็กน้อย ให้ใช้นักเรียนที่มีจำนวนครั้งโจมตีมาก"
1916385838-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
1916385838-DescriptionTh = "นักเรียนที่ติดเอฟเฟกต์โจมตีจุดอ่อนของสึมิเระ (พาร์ทไทม์) จะได้รับความ\nเสียหายเพิ่มเติมทุกครั้งที่ได้รับความเสียหาย\nสามารถลบเอฟเฟกต์โจมตีจุดอ่อนได้โดยใช้สกิลลบเอฟเฟกต์อันตราย"
1058897212-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
1058897212-DescriptionTh = "หุ่นดูดฝุ่นจะสร้างความเสียหายต่อเนื่องรอบตัว\nหุ่นดูดฝุ่นจะกระเด็นถอยหลังทุกครั้งที่ถูกสกิล EX โจมตี\nให้ใช้สกิล EX เมื่ออยู่ใกล้เรย์\nหุ่นดูดฝุ่นจะไม่กระเด็นถอยหลังเมื่ออยู่ในสถานะโล่"
1095949636-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
1095949636-DescriptionTh = "เมื่ออาเคมิโพสท่าโชว์กล้ามหน้าอก ค่าคริและอัตราคริของเป้าหมายทั้งหมด\nรอบตัวจะเพิ่มขึ้นอย่างมาก\n\nเมื่ออาเคมิถูกโจมตีครบตามจำนวนครั้งที่กำหนด ความเสียหายที่ได้รับจะ\nเพิ่มขึ้นตามเวลาที่กำหนด\n\nอาเคมิมีเกจมึนงงที่จะค่อยๆ ลดลง และเมื่อสะสมเกจมากขึ้น อาเคมิจะหมดสติและค่าป้องกันลดลงอย่างมากตามเวลาที่กำหนด\nหลังจากนั้นฝ่ายเราจะได้รับโล่ตามเวลาที่กำหนด แต่มีค่าโจมตีลดลงแทน\nใช้โล่นี้ป้องกันระเบิดโจมตีขนาดใหญ่จากอาเคมิได้"
3274122658-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3274122658-DescriptionTh = "ความเสียหายที่บอสนักซิ่งได้รับจะลดลงอย่างมาก\nแต่ถ้าถูกเอฟเฟกต์กดขี่ในระหว่างที่บอสนักซิ่งใช้สกิล ความเสียหายที่บอสนักซิ่งได้รับจะเพิ่มขึ้น และได้รับค่าใช้สกิลจำนวนหนึ่ง"
190394474-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
190394474-DescriptionTh = "อาโอบะมีค่าป้องกันสูงมาก ให้ลองใช้ประโยชน์จากเอฟเฟกต์ลดค่าป้องกัน"
384582627-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
384582627-DescriptionTh = "ศัตรูทั้งหมดจะได้รับความเสียหายจากสกิล EX เท่านั้น\n\nถ้ากำจัดแยงกี้สาว (SMG) และแยงกี้สาว (MG) ได้ จะเพิ่มค่าโจมตี และความเร็วโจมตีของศัตรูทั้งหมดขึ้นอย่างมาก\nกำจัดแยงกี้สาว (SR) และหัวหน้าหน่วยจู่โจมแยงกี้สาวให้ได้ก่อน"
4256279682-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
4256279682-DescriptionTh = "นักเรียนฝ่ายเราที่ชนกับนักซิ่งที่พุ่งเข้ามา จะได้รับความเสียหายรุนแรง\nในทางกลับกัน ถ้านักซิ่งที่พุ่งเข้ามาชนกับวัตถุกำบัง นักซิ่งที่พุ่งเข้ามา\nจะได้รับความเสียหายรุนแรง\nลองติดตั้งวัตถุกำบังและใช้สกิลเคลื่อนย้ายเพื่อให้วัตถุกำบังอยู่ในแนว\nการพุ่งของศัตรู"
1196420166-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
1196420166-DescriptionTh = "ศัตรูจะพุ่งเข้าหาคิเคียวที่กำลังหลับอยู่และสร้างความเสียหาย\nกำจัดศัตรูทั้งหมดให้ได้ก่อนที่พวกมันจะเข้ามาเพื่อปกป้องการนอนกลางวัน\nของคิเคียว\n\nกำจัดหุ่นดูดฝุ่นดำเพื่อรับค่าคอส และทำให้ความเร็วเคลื่อนที่กับค่าป้องกัน\nของศัตรูโดยรอบลดลงอย่างมาก\nหุ่นดูดฝุ่นดำได้รับความเสียหายต่อครั้งน้อยมาก ให้ใช้นักเรียนที่มีจำนวน\nครั้งโจมตีสูง"
956182265-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
956182265-DescriptionTh = "ใช้นักเรียน Tanker และ Healer เพื่อตั้งรับการโจมตีของเรนเกะ (ชุดว่ายน้ำ) และยูคาริ (ชุดว่ายน้ำ)"
1158136851-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
1158136851-DescriptionTh = "เมื่อ HP ของเครื่องสร้างสนามพลาสม่าทั้งหมดมากกว่า 0 บาเรียของศัตรูจะหายไป\nHP ของเครื่องสร้างสนามพลาสม่าจะลดลง 25% ทุก 7 วินาที ต้องคอยฟื้นฟูอยู่ตลอดเวลา"
2288671928-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
2288671928-DescriptionTh = "รถถังศัตรูเริ่มเคลื่อนที่ไปยังพื้นที่ว่าง และเข้าโจมตีอย่างรุนแรงเมื่อถึง\nรถถังศัตรูมีค่าต้านทานความเสียหายจากสกิล EX แต่ประสิทธิภาพของ\nรถถังจะลดลงตามที่ถูกโจมตี\nใช้ลักษณะเฉพาะเหล่านี้เพื่อกำจัดรถถังศัตรูก่อนที่จะถึงพื้นที่ว่าง"
2701404947-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
2701404947-DescriptionTh = "กลุ่มสมาชิกฝ่ายดูแลหอพักกำลังมาหาเอริ ปกป้องเอริและเอาชนะกลุ่ม\nสมาชิกฝ่ายดูแลหอพักที่เข้ามาไว้ให้ได้"
2506986276-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
2506986276-DescriptionTh = "คาโนเอะมีค่าป้องกันที่สูงมากและใช้สกิล EX ที่จะลบเอฟเฟกต์อันตราย\nของตัวเองได้ ลองใช้ประโยชน์จากเอฟเฟกต์ลดค่าป้องกันให้ถูกจังหวะ"
4114458166-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
4114458166-DescriptionTh = "ดูประเภทป้องกันของศัตรู และเล็งไปที่ศัตรูที่มีความได้เปรียบเป็น Weak"
444658513-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
444658513-DescriptionTh = "ศัตรูจะสร้างเอฟเฟกต์อันตรายที่รุนแรงต่อนักเรียน\nกำจัดศัตรูได้โดยใช้สกิลลบเอฟเฟกต์อันตราย"
1268479381-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
1268479381-DescriptionTh = "ในระหว่างที่ฟุยุวิ่ง จะมีหุ่นดูดฝุ่นหลากสีปรากฏออกมา\nเมื่อฟุยุมาถึงด้านหน้ามิโยะ ให้โจมตีหุ่นดูดฝุ่นหลากสีที่ปรากฏมากที่สุด"
4163494881-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
4163494881-DescriptionTh = "ต่อสู้โดยเล็งเป้าศัตรูตามประเภทป้องกัน"
1154737800-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
1154737800-DescriptionTh = "ต่อสู้กับศัตรูโดยคง HP ของ AMAS ให้มีมากกว่า 25% และเสริมความแข็งแกร่งให้ AMAS ได้ด้วยเอฟเฟกต์ที่เป็นประโยชน์\n\nเมื่อระเบิดถูกทำลายแล้ว จะสร้างความเสียหายรุนแรงกับศัตรูโดยรอบ ใช้การระดมโจมตีดูสิ"
184757931-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
184757931-DescriptionTh = "HP ของอากิระจะลดลงทุกวินาที แต่ถ้า HP ของอากิระมากกว่า 50% จะมอบเอฟเฟกต์ที่เป็นประโยชน์อย่างมากให้ฝ่ายเรา\nศัตรูที่โดนสกิลของอากิระโจมตีจะได้รับความเสียหายเพิ่มขึ้น\n\nศัตรูจะฟื้นฟู HP เมื่อถือโล่ ขัดขวางได้โดยใช้เอฟเฟกต์กดขี่"
2290871345-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
2290871345-DescriptionTh = "ไล่โจมตีศัตรูที่มีสัญลักษณ์โจมตีตามลำดับและเอาชนะศัตรูทั้งหมด\nระวังอย่าโจมตีนักเรียนที่หมดสติ ไม่งั้นพวกเขาจะตอบโต้อย่างรุนแรงมาก"
3231040624-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
3231040624-DescriptionTh = "ต่อสู้โดยเล็งเป้าศัตรูตามประเภทป้องกัน"
1473203563-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
1473203563-DescriptionTh = "เอฟเฟกต์ที่เป็นประโยชน์ที่มีผลกับนักเรียน Striker จะมีผลกับแก๊งหมวกกันน็อกฝ่ายเราเช่นเดียวกัน แก๊งหมวกกันน็อกฝ่ายเราสามารถสร้างความเสียหายรุนแรงกับศัตรูได้ สนับสนุนแก๊งหมวกกันน็อกฝ่ายเราและต่อสู้ต่อไป"
1944049600-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
1944049600-DescriptionTh = "เมื่อแก๊งหมวกกันน็อกฝ่ายเราโจมตี จะเพิ่มความเสียหายที่ศัตรูได้รับ\nสนับสนุนแก๊งหมวกกันน็อกฝ่ายเราไม่ให้ล้มลงให้ได้มากที่สุด จะเป็นผลดีต่อการต่อสู้"
3270373715-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3270373715-DescriptionTh = "เมื่อ HP ของถังวัตถุไวไฟถึง 100% หรือมากกว่า จะระเบิดหลังจากผ่าน\nไป 1 วินาที และสร้างความเสียหายอย่างรุนแรงแก่ศัตรูในรัศมี\nกำจัดหุ่นดูดฝุ่นด้วยการจุดระเบิดวัตถุไวไฟในจังหวะที่เหมาะสม"
3881373360-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
3881373360-DescriptionTh = "ต่อสู้โดยจัดทีมต่อสู้โดยเล็งที่ประเภทป้องกันของ Healer"
2657352138-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
2657352138-DescriptionTh = "ยาคุโมะจะปรากฏตัวออกมาเป็นระยะ\nเมื่อฝ่ายเราหรือศัตรูได้รับหนังสือของยาคุโมะ ค่าโจมตีจะลดลงอย่างมาก และตกอยู่ในสภาวะมึนงงเป็นระยะเวลาหนึ่งยกเว้นโคฮารุที่จะได้รับ\nเอฟเฟกต์เพิ่มค่าโจมตีและฟื้นฟูค่าใช้สกิลจำนวนมากแทน แต่ความเสียหายที่ได้รับก็จะเพิ่มขึ้นอย่างมากเช่นกัน"
1246590478-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
1246590478-DescriptionTh = "ความเสียหายที่ศัตรูได้รับจะลดลงอย่างมากเมื่อ HP ของถังวัตถุไวไฟถึง 100% หรือมากกว่า จะระเบิดหลังจากผ่านไป 1 วินาที เพื่อสร้างความ\nเสียหายแก่ศัตรูในรัศมี และเพิ่มความเร็วในการฟื้นฟูค่าใช้สกิลของฝ่าย\nพันธมิตรอย่างมาก\nศัตรูที่ได้รับความเสียหายจากการระเบิดของถังวัตถุไวไฟ จะได้รับความ\nเสียหายเพิ่มขึ้นอย่างมากเป็นระยะเวลาหนึ่ง"
944485355-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
944485355-DescriptionTh = "EX สกิลของศัตรูจะสร้างความเสียหายรุนแรงมาก แต่หากโจมตีถูกที่กำบัง สกิลจะสะท้อนกลับไปในทิศทางตรงกันข้าม\nใช้ EX สกิลของสึคุโยะ (เดรส) ป้องกันการโจมตีของศัตรูเพื่อคุ้มกันปีศาจฝ่ายเรา"
225733024-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
225733024-DescriptionTh = "เมื่อสึคุโยะ (เดรส) หมดสติ ค่าความเสียหายที่อิซุนะได้รับจะเพิ่มขึ้น\nลองวางแผนจัดการสึคุโยะ (เดรส) ก่อนดูสิ"
450982130-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
450982130-DescriptionTh = "ยิ่งหุ่นไล่กามี HP สูงเท่าไร ปริมาณความเสียหายที่ศัตรูได้รับก็จะยิ่ง\nเพิ่มขึ้นเท่านั้น"
3754788721-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
3754788721-DescriptionTh = "เอฟเฟกต์ที่เป็นประโยชน์จากสกิล EX ของนักเรียน จะส่งผลถึงบอสของ\nศัตรูด้วย\n\nบอสของศัตรูจะไม่ได้รับผลจากเอฟเฟกต์กดขี่ แต่ระยะเวลา\nจะถูกสะสมไว้แทน เมื่อสะสมครบ 10 วินาที ค่าความเสียหายที่บอสได้รับ\nจะเพิ่มขึ้น (สะสมสูงสุด 10 ครั้ง) (ระยะเวลาที่สะสมจะเพิ่มมากขึ้น ตามค่าเพิ่มประสิทธิภาพกดขี่ที่สูงขึ้น)\n\nเมื่อ HP ของหุ่นไล่กาถึง 99% หรือมากกว่า ความเร็วในการฟื้นฟูค่าใช้สกิลจะเพิ่มขึ้นอย่างมาก\n\nบอสศัตรูมีพลังป้องกันและค่าต้านทานความเสียหายคริสูงมาก โปรดระมัดระวัง"
3884845621-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 1"
3884845621-DescriptionTh = "เมื่อระเบิดทำงาน จะสร้างความเสียหายเผาไหม้ต่อเนื่องอย่างรุนแรงให้\nกับนักเรียน ใช้สกิลฟื้นฟูและสกิลโจมตีวงกว้างเพื่อป้องกันไม่ให้ระเบิด\nทำงานดูสิ"
86017968-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 2"
86017968-DescriptionTh = "ลงต่อสู้โดยปรับประเภทโจมตีให้เหมาะกับประเภทป้องกันของศัตรูดูสิ"
3706206590-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 3"
3706206590-DescriptionTh = "ค่าโจมตีของ AMAS จะเพิ่มขึ้นตามเวลา รีบกำจัด AMAS โดยเร็วที่สุด"
1265950056-NameTh = "ทิปส์กิจกรรมด่าน CHALLENGE 4"
1265950056-DescriptionTh = "ศัตรูจะหมดสภาพ เมื่อ HP ของศัตรูทั้งหมดเป็น 0\nความเสียหาย EX ที่หุ่นรบล้ำยุคได้รับลดลงอย่างมาก แต่ความเสียหาย\nจากประสิทธิภาพเสริมที่ได้รับจะเพิ่มขึ้นอย่างมาก\nหลังจากที่จระเข้จักรกลใช้สกิล EX พ่นไฟ มันจะติดสถานะมึนงง\nเป็นเวลา 15 วินาที และความเสียหายที่ได้รับจะเพิ่มขึ้นอย่างมาก"
