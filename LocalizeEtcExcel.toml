56435730-DescriptionTh = "ตั๋วที่ต้องใช้เพื่อขึ้นรถไฟ ไม่ต้องมีเก็บไว้หลายใบก็ได้"
4181614095-NameTh = "กระเป๋าเอกสาร"
4181614095-DescriptionTh = "กระเป๋าเอกสารที่ปกป้องของข้างในได้ดี ไม่มีการรับรองว่าของข้างในนั้น จะใช่เอกสารหรือไม่"
342544352-NameTh = "นกหวีดฝ่ายบริการ"
342544352-DescriptionTh = "นกหวีดที่นักเรียนฝ่ายบริการพกติดตัว ตอนที่สงบคือตอนที่ไม่มีเสียงนกหวีด"
2860754489-NameTh = "ชิ้นส่วนอุปกรณ์"
2860754489-DescriptionTh = "ชิ้นส่วนสำหรับใช้ซ่อมแซมอุปกรณ์ที่พบใน\nพื้นที่รกร้างมิลเลเนียม พบได้ทั่วไปในพื้นที่รกร้าง สามารถรวบรวมมาใช้กับอุปกรณ์ต่างๆ ได้"
3572927324-NameTh = "สกรูพิศวง"
3572927324-DescriptionTh = "สกรูที่มีรูปร่างแปลกตาน่าพิศวง ใช้ได้กับอุปกรณ์ที่พบในพื้นที่รกร้างมิลเลเนียม"
3819866792-NameTh = "สายไฟประหลาด"
3819866792-DescriptionTh = "สายไฟรูปร่างประหลาด พบได้ในบริเวณพื้นที่รกร้างมิลเลเนียม มีสภาพสมบูรณ์ดี"
374437121-NameTh = "ชิปข้อมูลปริศนา"
374437121-DescriptionTh = "ข้อมูลสำหรับวิเคราะห์อุปกรณ์ต่างๆ ที่พบในพื้นที่รกร้างของมิลเลเนียม บรรจุข้อมูลต่างๆ ไว้มากมาย"
2295857575-NameTh = "เครื่องคิดเลขทางการเงิน"
2295857575-DescriptionTh = "เครื่องคิดเลขทางการเงินที่องค์การนักเรียน มอบให้ฝ่ายการเงินใช้โดยเฉพาะ มีฟังก์ชันต่างๆ ที่ใช้คำนวณสูตรคณิตศาสตร์ที่ซับซ้อนได้"
1808606287-NameTh = "แต้มกิจกรรม"
1808606287-DescriptionTh = "แต้มที่ได้รับทุกครั้งที่ทำกิจกรรม\nยิ่งมีแต้มมากขึ้น จะสามารถแลกรับ\nรางวัลได้หลากหลายขึ้น"
3805212638-NameTh = "สมอบกซูเปอร์อัลลอย"
3805212638-DescriptionTh = "สมอบกทนทานที่ใช้ยึดผ้าใบและเต็นท์ วัสดุทำจากซูเปอร์อัลลอย ที่โรงเรียนมิลเลเนียมประดิษฐ์ขึ้นมาโดยเฉพาะ ไม่เป็นสนิมหรือแตกหักง่าย"
743230010-NameTh = "เชือกอเนกประสงค์"
743230010-DescriptionTh = "เชือกที่มีความยืดหยุ่นสูง สามารถใช้กลางแจ้งได้หลายวัตถุประสงค์ ทำจากวัสดุใหม่ที่โรงเรียนมิลเลเนียมพัฒนาขึ้น ให้แข็งแรงถึงขนาดที่จะมัดรถถังได้"
2873068026-NameTh = "ผงแกงกะหรี่ S&D"
2873068026-DescriptionTh = "ผงแกงกะหรี่ของบริษัท S&D ที่มีชื่อเสียงด้านการผลิตเครื่องเทศ รสเผ็ดที่เป็นเอกลักษณ์เข้ากันได้ดี กับอาหารอื่นนอกจากแกงกะหรี่ด้วย "
