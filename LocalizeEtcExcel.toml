2838352374-DescriptionKr = "동일한 모습의 츠치노코 중 진짜 츠치노코를 찾아보세요.\n가짜 츠치노코의 해로운 효과는 해로운 효과 제거 스킬로 제거되지 않지만, 진짜 츠치노코의 해로운 효과를 제거하면 함께 제거됩니다.\n가짜 츠치노코는 조금 이상하게 행동합니다.\n진짜 츠치노코를 찾고 해로운 효과를 제거해서 적을 처치하세요,"
