358559959-NameTw = "溫泉浴場本館"
358559959-DescriptionTw = "初次造訪溫泉浴場的客人第一個見到的場所。協助客人入住的櫃檯及可以稍事休息的大廳就位於此處。"
2825548492-NameTw = "大澡堂"
2825548492-DescriptionTw = "可以多人一起享受溫泉浴的大澡堂。溫度與成份經過調整，配合不同的喜好準備了各種浴湯。"
2481788820-NameTw = "住房"
2481788820-DescriptionTw = "配有榻榻米與矮桌的普通住房。被子等所有寢具和香每天都會清洗得乾乾淨淨。"
3141924738-NameTw = "休息室"
3141924738-DescriptionTw = "提供給泡湯泡膩了的客人的休息室。備有桌球台與按摩椅，供客人自由使用。"
384904434-NameTw = "宴會場"
384904434-DescriptionTw = "可以多人一起享用餐點的大規模宴會場。提供的餐點卻是廉價的垃圾食物，和會場的規模與華麗程度形成鮮明對比。"
1433250290-NameTw = "露天溫泉"
1433250290-DescriptionTw = "可以一邊賞雪一邊泡湯的露天溫泉。有時可能會碰上從山上跑來泡湯的野生動物。"
4060632693-NameTw = "別館"
4060632693-DescriptionTw = "專為VIP客人準備的別館。與本館有一段距離，所以能夠徹底好好休息，不會受到其他客人干擾。"
4194626497-NameTw = "庭園"
4194626497-DescriptionTw = "用細沙碎石打造出來的枯山水庭園。為了維持庭園最美麗的風貌，和香每天都認真清掃積雪。"
3675272134-NameTw = "營運本部"
3675272134-DescriptionTw = "這是負責大運動會營運工作的營運本部。除了安排比賽以外，攤商的登記與管理也是由這裡負責。"
1884871261-NameTw = "跑道"
1884871261-DescriptionTw = "這是沿著運動場外圍建造的跑道。使用了堅固的材料，即使遇上了障礙賽跑的炸彈也不會損壞。"
2410805514-NameTw = "體育倉庫"
2410805514-DescriptionTw = "這是保管了要使用在大運動會上的簡易體育用品的倉庫。上鎖的話無法從裡面打開，出入時請注意不要被關起來。"
2074635724-NameTw = "觀眾席"
2074635724-DescriptionTw = "建造在運動場2樓的觀眾席。為了避免學生之間的應援合戰過於激烈，座位以學校為單位來劃分。"
830995934-NameTw = "操場"
830995934-DescriptionTw = "位於運動場中央的寬廣操場。雖然上面鋪的是人工草皮，但多虧了千年的技術，感覺比天然草皮還加舒適柔軟。"
2054928448-NameTw = "大型倉庫"
2054928448-DescriptionTw = "這是保管了要在大運動會上使用的大型器材或重裝備的倉庫。因為備有基本工具，所以可以在這裡進行簡單的修理。"
1757505051-NameTw = "轉播室"
1757505051-DescriptionTw = "這是可以生動地轉播大運動會的比賽畫面的轉播室。還提供了防止裁判誤判的影像重播功能。"
1079056613-NameTw = "休息室"
1079056613-DescriptionTw = "這是選手和觀眾們皆可自由使用的休息室。設置了簡單的咖啡機與飲料機。"
3239184876-NameTw = "女武神警察學園白鳥分校"
3239184876-DescriptionTw = "女武神警察學園的分校。四周都環繞著茂盛的綠地，所以據說空氣特別好。"
2322223304-NameTw = "柯基町"
2322223304-DescriptionTw = "有名的電器街。據說除了絕版品外，什麼東西都能買到。"
1462360932-NameTw = "三角廣場"
1462360932-DescriptionTw = "被當作休息與見面地點使用的廣場。是適合散步的好地方。"
4293010634-NameTw = "第3商業區"
4293010634-DescriptionTw = "位於三角廣場旁的商業區。道路與建築物共同構築了一個現代、洗鍊且美麗的和諧空間。"
1977010791-NameTw = "普拉多大道"
1977010791-DescriptionTw = "如字面上的意思，是普拉多美術館所在的地方。除了美術館本身很棒之外，整個街區都充滿了藝術氣息。"
1729072075-NameTw = "白鳥鄰里公園"
1729072075-DescriptionTw = "雖然和公園的規模相比，造訪的人並不多，但仍是個必去的景點。"
2590301450-NameTw = "鐘崎港"
2590301450-DescriptionTw = "如果想看海的話，來這裡也是個不錯的選擇。雖然可能和想像中的景色有落差。"
4121383175-NameTw = "駱馬町"
4121383175-DescriptionTw = "不亞於各學園美食景點的美食街。狹窄的河道兩旁有著無數的攤販與餐廳。"
2853338239-NameTw = "出入口區域"
2853338239-DescriptionTw = "進入遊戲開發部室後，最先迎接客人的地方。擺放的鞋子數量會隨著時間和情況而變化。"
2194359054-NameTw = "休息空間"
2194359054-DescriptionTw = "使用已久，坐墊已經破舊磨損的沙發。雖然外表不起眼，但卻是幫助遊戲開發部獲得舒適休息、不可或缺的家具。"
2190051001-NameTw = "裝飾架區域"
2190051001-DescriptionTw = "放著遊戲開發所需的筆記型電腦、常讀的手冊、喝到一半的能量飲料罐等各種物品的多用途置物架。即使定期打掃也很快就會變亂。"
2420465823-NameTw = "遊戲空間"
2420465823-DescriptionTw = "擺放著堪稱遊戲開發部寶物及創意泉源的復古遊戲機支架。由於舊遊戲卡帶容易受灰塵和撞擊影響，因此這裡比任何地方都保持得更加乾淨。"
4038677162-NameTw = "厚地毯區域"
4038677162-DescriptionTw = "為了防止樓層間噪音而在遊戲開發部室正中央鋪設的厚地毯。即使進行激烈的跳舞遊戲或動作遊戲，也能柔軟地吸收衝擊。"
2856573316-NameTw = "柚子的儲物櫃空間"
2856573316-DescriptionTw = "遊戲開發部部長柚子的舒適休憩處兼避難所的儲物櫃。從外面看起來雖然很窄，但裡面備有足夠撐過一天以上的娛樂用品和零食等。"
4243041319-NameTw = "物品欄鐵製書架空間"
4243041319-DescriptionTw = "收納不常使用的遊戲機和專業書籍等的鐵製書架。裝滿書架的箱子中，也有連粉絲都不知道其存在、裝有《故事．傳說．編年史》限定周邊的箱子。"
598899268-NameTw = "多肉植物盆栽成長區"
598899268-DescriptionTw = "放置盆栽的空間。以滿滿的用心和愛護進行管理。"
