4084185733-DescriptionKr = "튼튼한 철제 구조를 가진 대운동회 접이식 의자. 평소에는 접어 보관할 수 있어 수납성도 좋다."
3719677986-NameKr = "대운동회 액티브 뜀틀"
3719677986-DescriptionKr = "누구라도 뛰어넘고 싶어지는 대운동회 액티브 뜀틀. 튼튼한 소재에 산뜻한 색상은 대운동회에 활기를 더한다."
2320061101-NameKr = "대운동회 도넛 경기 구조물"
2320061101-DescriptionKr = "맛있는 도넛이 한가득 늘어서 있는 대운동회 도넛 경기 구조물. 미식가 학생이라면 경기에 참여하고 싶을지도?"
523248880-NameKr = "대운동회 휴식 텐트"
523248880-DescriptionKr = "아늑한 휴식을 제공하는 대운동회 휴식 텐트. 경기에 지친 몸을 잠시 쉬기에는 이만한 곳이 없다."
2216160600-NameKr = "대운동회 응원 스탠드"
2216160600-DescriptionKr = "응원하는 곳으로 안성맞춤인 대운동회 응원 스탠드. 열심히 경기중인 학생을 응원하는 열기로 가득찼다."
2711187349-NameKr = "대운동회 기구 보관함"
2711187349-DescriptionKr = "다양한 운동 경기 소품이 보관된 대운동회 기구 보관함. 인기가 많은 종목이라면 빠르게 접근해야 한다!"
4186446994-NameKr = "대운동회 런치 테이블"
4186446994-DescriptionKr = "대운동회의 꽃, 대운동회 런치 테이블. 힘들었던 전반을 뒤로 하고 역전을 노리는 반전을 위한 휴식타임!"
3249630751-NameKr = "대운동회 트로피 진열대"
3249630751-DescriptionKr = "영광의 트로피들이 진열된 대운동회 트로피 진열대. 대운동회에 참가하는 학생들의 목표이자 꿈이다."
1270765820-NameKr = "대운동회 환영 게이트"
1270765820-DescriptionKr = "화려한 대운동회 개막을 알리는 대운동회 환영 게이트. 들어서는 순간부터 대운동회의 열기가 느껴진다."
2400305011-NameKr = "커튼 창문"
2400305011-DescriptionKr = "커튼이 달린 창문. 창밖에서 바람이 들어오면 평화로움이 느껴진다."
540301307-NameKr = "흰색 커피 테이블"
540301307-DescriptionKr = "커피가 놓인 테이블. 느긋한 오후의 티타임을 즐길 수 있다."
2738215609-NameKr = "배색 싱글 의자"
2738215609-DescriptionKr = "배색 감각이 돋보이는 싱글 의자. 단단하고 푹신하여 안락하게 앉을 수 있다."
4156726588-NameKr = "화분 세트 선반"
4156726588-DescriptionKr = "화분이 올려진 벽 선반. 벽에 시각적인 재미를 연출할 수 있다."
