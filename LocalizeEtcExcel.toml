2472575638-NameKr = "우트나피쉬팀의 배"
2472575638-DescriptionKr = "메인 스토리 1부 최종편 클리어를 기념하는 ID 카드이다."
3940130735-NameKr = "에어크래프트 콕핏 내부"
3940130735-DescriptionKr = "메인 스토리 EX. 데카그라마톤 편 2장 클리어를 기념하는 ID 카드이다."
3785927063-NameKr = "운명과 선택의 교차점"
3785927063-DescriptionKr = "메인 스토리 백화요란 편 1장 클리어를 기념하는 ID 카드이다."
1684631727-NameKr = "기동석 조각"
1684631727-DescriptionKr = "크래프트 챔버를 기동시킬 때 필요한 키스톤의 조각."
1688668283-NameKr = "초급 활동 보고서"
1688668283-DescriptionKr = "학생들의 동아리 활동 기록이 담겨 있는 보고서. 수많은 학생들의 경험이 녹아들어 있다."
3541905306-NameKr = "네브라 디스크 조각"
3541905306-DescriptionKr = "네브라 디스크의 부서진 조각. 각종 제조 및 강화에 사용된다."
1623415300-NameKr = "아루의 엘레프"
