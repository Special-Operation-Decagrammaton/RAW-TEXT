114581457-DescriptionKr = "대형 타프의 입구. 타프 내부에서 울창한 숲의 풍경을 감상할 수 있다."
2528694280-NameKr = "밀리터리 조립식 키친 테이블"
2528694280-DescriptionKr = "다용도 수납 공간이 존재하는 조립식 쿠킹 테이블. 캠핑 공간을 효율적으로 사용할 수 있다."
3464440835-NameKr = "밀리터리 목재 총 거치대"
3464440835-DescriptionKr = "목재로 제작된 총 거치대. 단단한 목재로 제작되어 내구성이 좋다."
1200678821-NameKr = "원목 수납 테이블"
1200678821-DescriptionKr = "작은 물건을 보관하기 좋은 수납 테이블. 서랍이 있어 테이블 위가 깔끔해진다."
3588838649-NameKr = "비치사이드 화이트 체어"
3588838649-DescriptionKr = "여름 더위를 식혀줄 화이트 체어. 잠시 앉아서 바다의 경관을 감상해보자."
