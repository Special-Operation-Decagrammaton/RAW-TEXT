301582033-NameTh = "แพ็กสมบัติลึกลับ เลือกนักเรียน ★3"
301582033-DescriptionTh = "แพ็กเกจที่จะได้รับตั๋วเลือกนักเรียน ★3 1 ใบ และตั๋วเปิดรับ 10 ครั้ง 1 ใบ\n*หากเลือกรับนักเรียนที่มีอยู่ จะได้รับเป็นเอลลิกมาและเอลเลฟของนักเรียนคนดังกล่าวแทน\n*ตรวจสอบรายชื่อนักเรียนที่เลือกรับได้จากแถบเมนูนักเรียน\n*แพ็กเกจนี้ซื้อได้ 1 ครั้งต่อบัญชี\n*โปรดตรวจสอบรายละเอียดแพ็กเกจจากรายการด้านล่าง"
2603152817-NameTh = "แพ็กเกจตั๋วเลือก ★3 aLIVE!"
2603152817-DescriptionTh = "แพ็กเกจที่จะได้รับตั๋วเลือกนักเรียน ★3 1 ใบ และตั๋วเปิดรับ 10 ครั้ง 1 ใบ\n* หากเลือกรับนักเรียนที่มีอยู่ จะได้รับเป็นเอลลิกมาและเอลเลฟของนักเรียนคนดังกล่าวแทน\n* ตรวจสอบรายชื่อนักเรียนที่เลือกรับได้จากแถบเมนูนักเรียน\n* ตั๋วเลือกนักเรียนสามารถใช้เปิดรับได้จนถึงวันสิ้นสุดระยะเวลาใช้งานตั๋ว\n* แพ็กเกจนี้ซื้อได้ 1 ครั้งต่อบัญชี\n* โปรดตรวจสอบรายละเอียดแพ็กเกจจากรายการด้านล่าง"
