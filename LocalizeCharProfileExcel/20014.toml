20014-WeaponDescKr = "사키가 SRT 특수학원에서 지급받은 제식 기관총.\n\n\r정비가 어려운 것이 단점이지만, 관리만 잘한다면 강력한 화력을 보장해 준다."
20014-ProfileIntroductionKr = "SRT 특수학원 RABBIT 소대의 포인트맨. 콜사인은 <RABBIT 2>.\n\n\rSRT 특수학원의 엄격한 규칙과 생활을 동경하여 입학하였으나, 갑작스럽게 학원이 폐쇄되며 현재는 공원에서 소대원들과 함께 노숙을 하고 있다. SRT 학원의 전술 교리가 적힌 교범을 언제나 소지하고 다니며, 원칙대로 행동하는 것을 중시한다. 산나물을 채집하거나 폐품을 모으는 취미가 있어 언제나 자원이 부족한 RABBIT 소대의 노숙 생활에 여러모로 도움을 주기도 한다."
20014-CharacterSSRNewKr = "콜 사인 RABBIT 2. 감도 양호."
