20014-WeaponDescTw = "咲希被SRT特殊學園配給的制式機關槍。\n\n雖然有因為構造上的問題而難以整備的缺點，但是只要有好好整備就能發揮強大的火力。"
20014-ProfileIntroductionTw = "SRT特殊學園所屬，RABBIT小隊的先鋒。\n\n為了追求規矩嚴格的生活而進入SRT特殊學園就讀，然而學園卻突然被關閉。現在過著和小隊成員們一起在公園露宿的生活。隨身攜帶寫著SRT學園戰術的教科書，是重視原則行動的類型。因為有採集山菜和收集廢棄品的興趣，似乎對現在總是資源不足的公園生活能有各種幫助。\n代號為「RABBIT2」。"
20014-CharacterSSRNewTw = "這裡是RABBIT2，感度良好"
