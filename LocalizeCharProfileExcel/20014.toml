20014-WeaponDescTh = "ปืนกลมาตรฐานที่ซากิได้รับจากสถาบันพิเศษ SRT\n\nถึงจะมีข้อเสียคือการดูแลรักษายาก แต่ถ้าคอยบำรุงรักษา\nอย่างสม่ำเสมอก็จะเป็นอาวุธที่มีพลังโจมตีที่แข็งแกร่ง"
20014-ProfileIntroductionTh = "พลชี้เป้าของกองทหาร RABBIT แห่งสถาบันพิเศษ SRT รหัสประจำตัว <RABBIT 2>\n\nซากิสมัครเข้าเรียนที่สถาบันพิเศษ SRT เพราะชื่นชมการใช้ชีวิต และกฎเกณฑ์ที่เข้มงวดของสถาบันพิเศษ SRT แต่สถาบันกลับปิดตัวลงกะทันหัน ทำให้ตอนนี้เธอไร้ที่อยู่ และไปอาศัยอยู่ที่สวนสาธารณะกับสมาชิกคนอื่นๆ เธอมักจะพกหนังสือคู่มือการปฏิบัติของสถาบัน SRT ติดตัว และจะปฏิบัติตามอย่างเคร่งครัด ซากิมีงานอดิเรกคือการเก็บผักป่า และเก็บขยะต่างๆ เธอจึงมีส่วนช่วยกองทหาร RABBIT ที่ขาดทรัพยากรต่างๆ เพราะไร้ที่อยู่อาศัยอยู่เสมอๆ"
20014-CharacterSSRNewTh = "รหัสประจำตัว RABBIT 2 ผู้ว่องไว"
