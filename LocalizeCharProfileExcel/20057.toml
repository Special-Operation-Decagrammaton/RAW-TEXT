20057-WeaponDescKr = "아카네의 조용한 권총.\n\n그녀의 '조용함'을 유지하게 하고 싶다면, 허튼 행동은 자제하는 편이 좋을 것이다."
20057-ProfileIntroductionKr = "밀레니엄 엑스포의 진행을 위해 '학생답게' 위장한 C&C의 에이전트.\n\n어째서 교복이 위장용 복장인지는 묻지 않는 것이 좋다. 메이드나 요원이 아닌, 일반 학생으로 행동할 수 있게 되어, 그렇지 않아도 온화한 성격이 한층 더 차분해진 상태.\n\n……그렇다고 해서, 평소의 '말끔한' 해결법을 잊은 것은 아니다."
20057-CharacterSSRNewKr = "저와 함께, 밀레니엄을 산책해 보시겠어요?"
