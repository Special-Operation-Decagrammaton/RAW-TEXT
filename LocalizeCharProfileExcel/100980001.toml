100980001-WeaponDescTh = "ปืนลูกซองดีไซน์เรียบง่ายที่โฮชิโนะใช้\n\nเป็นผู้รับผิดชอบหลักของระบบอาวุธที่โฮชิโนะใช้งานอยู่"
100980001-ProfileIntroductionTh = "เด็กสาวจอมขี้เกียจ มีตำแหน่งเป็นรองประธานนักเรียน และหัวหน้าคณะกรรมการแผนงานของโรงเรียนมัธยมอะบิดอส\n\nโฮชิโนะในรูปลักษณ์ปัจจุบันมาพร้อมกับอาวุธที่เธอเก็บรักษาไว้ต่างหาก เธอในตอนนี้ดูพร้อมกับการต่อสู้มากขึ้น ถึงจะเป็นโฮชิโนะคนเดิม แต่เมื่อติดอาวุธแล้วเธอก็ดูจริงจังกว่าปกติเล็กน้อย"
100980001-CharacterSSRNewTh = "ลุงจะขอเอาจริงหน่อยละนะ\nแหะๆ~ แต่ก็เขินอยู่นิดหนึ่งแฮะ"
