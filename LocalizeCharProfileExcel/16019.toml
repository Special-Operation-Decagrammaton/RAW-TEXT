16019-WeaponDescTh = "ปืนพลังงานคู่ที่สร้างขึ้นเพื่อโทคิโดยเฉพาะ\n\nเจ้าตัวกล่าวไว้ว่าไหนๆ ก็ได้เปลี่ยนคอนเซ็ปต์ และบรรยากาศแล้ว ก็เลยสร้างอาวุธที่เลือกเอง ให้เหมาะสมด้วยเสียเลย..."
16019-ProfileIntroductionTh = "สายลับของ C&C และสมาชิกภาคสนามของชมรมปรากฏการณ์ลี้ลับ\nที่เปลี่ยนมาใส่ชุดใหม่เพื่อทำภารกิจของหน่วยลาดตระเวนแทนที่จะเป็น\nหน่วยแทรกซึม\n\nเจ้าตัวกล่าวไว้ว่า... นี่คืออะซุมะ โทคิที่สลัดคราบอาวุธหนักในอดีต แล้วมาอยู่ในเวอร์ชันที่เบา คล่องแคล่วและพร้อมใช้งานที่สุด เหมือนว่าเธอจะเจองานอดิเรกแล้ว แม้จะเป็นการชั่วคราว แต่ก็ถือเป็นเรื่องที่ดี"
