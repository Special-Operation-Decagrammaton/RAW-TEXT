16019-WeaponDescKr = "토키 전용으로 제작된 두 정의 에너지 피스톨.\n\n본인의 표현에 따르자면, 컨셉과 분위기를 완전히 일신한 김에 스스로 고른, 최적화된 무장 구성이라는 모양이다……."
16019-ProfileIntroductionKr = "잠입 임무가 아닌, 정찰대로서의 임무를 수행하기 위해 갈아입은 C&C의 에이전트이자 초현상특무부의 현장 요원.\n\n본인의 표현에 따르면 과거의 중무장으로부터 탈피하여, 경량화, 쾌속화, 최적화를 거친 기동형 아스마 토키…… 라는 듯하다. 임시라고는 하지만 취미 역시 찾은 모양. 경사스러운 일이다."
