20056-WeaponDescKr = "코유키와 함께 각종 수난을 헤쳐 온 기관총.\n\n온갖 말썽을 터뜨리는 주인과 달리, 묵묵히 옆자리를 보좌하는 듬직함을 자랑한다. ……그냥 단순히 별생각이 없는 것일 수도 있지만. "
20056-ProfileIntroductionKr = "밀레니엄 세미나의 골칫덩이인 천재 소녀.\n\n이번에는 유우카가 선물해 준 파자마로 갈아입었다. 하지만 옷을 갈아입었더라도 코유키는 여전히 코유키. 자유분방한 행동거지는 여전하다."
20056-CharacterSSRNewKr = "행동이 우선, 처신은 나중!"
