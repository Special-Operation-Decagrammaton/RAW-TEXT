101350001-ProfileIntroductionTw = "終於將自己定義為自己的Kei。\n\n從人工智能到AMAS，從有缺陷的祭品到現在的身體。經歷許多波折後才走到這一步。\n\n由於千年科學學園是個只要能力允許就能參加多個社團活動的學園，即使主要的所屬社團為特異現象搜查部，待在遊戲開發部的時間反而更長。\n\n事實上還兼任遊戲開發部的新任製作人……不過本人對此則是極力否認。"
