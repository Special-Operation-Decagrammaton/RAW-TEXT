101350001-WeaponDescTh = "ปืนเรลกันประจำตัวที่เคย์ได้รับมา\n\nเป็นอาวุธที่เหมาะสมกับเคย์ที่ได้เริ่มใช้ชีวิตใหม่"
101350001-ProfileIntroductionTh = "เคย์ที่นิยามตัวตนของตัวเองได้อย่างแท้จริง\n\nจากปัญญาประดิษฐ์สู่ AMAS และจากของมีตำหนิสู่ร่างปัจจุบันในที่สุด เคย์มาถึงจุดนี้ได้หลังจากผ่านเรื่องราวพลิกผันมากมาย\n\nถึงชมรมหลักที่สังกัดจะเป็นชมรมปรากฏการณ์ลี้ลับ แต่เคย์ก็มาใช้เวลาอยู่\nกับชมรมพัฒนาเกมมากที่สุด นั่นก็เพราะโรงเรียนวิทย์มิลเลเนียมเปิดโอกาส\nให้ทำกิจกรรมได้หลายชมรมหากความสามารถถึง\n\nตอนนี้เคย์ทำหน้าที่เป็นโปรดิวเซอร์คนใหม่ของชมรมพัฒนาเกมอยู่... แต่เจ้าตัวก็ปฏิเสธอย่างหัวชนฝา"
101350001-CharacterSSRNewTh = "ทะ... ทำไมคะ...? เพิ่งเคยเห็น 'คน' เป็นครั้งแรกเหรอคะ?!"
