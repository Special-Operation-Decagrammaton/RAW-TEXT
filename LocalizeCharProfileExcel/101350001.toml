101350001-WeaponDescKr = "케이에게 주어진 전용 레일건.\n\n새롭게 나아갈 그녀에게, 그 무엇보다도 어울리는 무기다."
101350001-ProfileIntroductionKr = "마침내 자신을 자신으로서 정의한 케이.\n\n인공지능에서 AMAS로, 흠 있는 제물에서 마침내 지금의 몸으로. 정말 많은 우여곡절을 겪은 끝에 이 자리에 도달했다.\n\n주 동아리 소속은 일단 초현상특무부이지만, 정작 게임개발부에서 가장 많은 시간을 보내는 중. 밀레니엄 사이언스 스쿨은, 능력만 된다면 다수의 동아리 활동 역시 가능한 학원이므로.\n\n사실상 게임개발부의 신임 프로듀서 역할까지 하고 있지만… 본인은 극구 부정 중."
101350001-CharacterSSRNewKr = "왜, 왜 그래요……? '사람' 처음 봐요?!"
