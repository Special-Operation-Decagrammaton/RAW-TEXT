20058-WeaponDescKr = "에리카가 항시 휴대하고 다니는 산탄총.\n\n깔끔하게 관리되고 있으며, 화려한 레오파드 패턴으로 꾸며져 있어 어디서나 알아보기 쉽다."
20058-ProfileIntroductionKr = "게헨나 학원에 다니는 친절한 성격의 여고생.\n\n이지적이고 쿨한 이미지를 풍기지만, 누구와도 친해질 수 있는 사교적이고 다정한 성격의 소유자이다. 둘도 없는 단짝인 키라라와 함께 즐거운 일을 찾아다니곤 한다."
20058-CharacterSSRNewKr = "많이 기다렸지? 미안, 미안."
