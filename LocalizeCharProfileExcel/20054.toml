20054-ProfileIntroductionTw = "千年科學學園所屬，駭客集團「貝里塔斯」的前部長，現任特異現象搜查部的部長。\n\n為了應對前所未有的危機而換上特殊戰鬥服的狀態。此外多虧了新的「輪椅」，他似乎能夠自由自在地奔馳了。\n\n即便本人堅稱那是輪椅，但怎麼看都是機車。"
