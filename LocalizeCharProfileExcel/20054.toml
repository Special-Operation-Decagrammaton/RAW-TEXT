20054-ProfileIntroductionEn = "The former president of Veritas, and current president of the Super Phenomenon Task Force.\n\nHimari has donned a special suit to aid her in the fight on the Steel Continent. While her suit is fitting, she also arms herself with what she insists is a...\"tactical wheelchair.\" It's designed for the frontlines, and equipped with impressive firepower and mobility.\n\nBut no matter how you look at it, it's a motorcycle."
20054-CharacterSSRNewEn = "Circumstances may have escalated, but our job remains the same. Shall we handle it with elegance?"
