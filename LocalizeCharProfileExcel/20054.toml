[translation]
20054-StatusMessageTh = "ยิ่งในเวลาแบบนี้ แฮ็กเกอร์สาว\nผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ ยิ่งต้องออกโรง"
20054-FullNameTh = "อาเกโบชิ ฮิมาริ"
20054-FamilyNameTh = "อาเกโบชิ"
20054-PersonalNameTh = "ฮิมาริ"
20054-SchoolYearTh = "ชั้นปีที่ 3"
20054-CharacterAgeTh = "17 ปี"
20054-BirthdayTh = "10 ธ.ค."
20054-HobbyTh = "ดูดวงรายวัน, เรื่องลึกลับ"
20054-WeaponNameTh = "Clifftop Bloom"
20054-WeaponDescTh = "ปืนพกที่เรียบง่ายและสวยงามของฮิมาริ\n\nเมื่อเจ้าของปืนได้นั่งบนมอเตอร์ไซค์... บนวีลแชร์ ครั้งนี้อาจจะได้เห็นว่าถูกหยิบออกมาใช้งานบ่อยขึ้นก็ได้"
20054-ProfileIntroductionTh = "อดีตหัวหน้าเวอริทัสและหัวหน้าชมรมปรากฏการณ์ลี้ลับคนปัจจุบัน\n\nครั้งนี้ฮิมาริได้เปลี่ยนมาใส่ชุดบอดี้สูทพิเศษเพื่อรับมือกับสถานการณ์\nดินแดนเหล็กกล้าที่ไม่เคยเกิดขึ้นมาก่อน ชุดบอดี้สูทก็เรื่องหนึ่ง แต่มอเตอร์ไซค์ที่เจ้าตัวยืนยันว่าเป็น 'วีลแชร์' ก็เป็นอาวุธสำคัญอีกชิ้นเช่นกัน เธอบอกว่า... นี่คือวีลแชร์ยุทธศาสตร์สำหรับแนวหน้าที่ทั้งเคลื่อนที่เร็ว มีกำลังอาวุธ และมีความสามารถในการตอบสนอง\n\nแต่ไม่ว่าจะมองมุมไหนก็เป็นมอเตอร์ไซค์อยู่ดี"
20054-CharacterSSRNewTh = "ถึงงานจะหนักหนาแค่ไหน แต่เรื่องที่ต้องทำก็เหมือนเดิมค่ะ\nมาจัดการอย่างใจเย็นและสง่างามกันเลยมั้ยคะ?"
