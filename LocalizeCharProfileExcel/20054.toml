[translation]
20054-StatusMessageKr = "이럴 때일수록, 천재병약미소녀의 활약이 필요한 법."
20054-FullNameKr = "아케보시 히마리"
20054-FamilyNameKr = "아케보시"
20054-PersonalNameKr = "히마리"
20054-SchoolYearKr = "3학년"
