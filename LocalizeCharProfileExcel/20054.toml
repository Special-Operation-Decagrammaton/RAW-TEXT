20054-BirthdayKr = "12월 10일"
20054-HobbyKr = "오늘의 운세 보기, 오컬트 전반"
20054-WeaponNameKr = "절벽 위의 꽃"
20054-WeaponDescKr = "히마리의 심플하고 아름다운 권총.\n\n바이크… 휠체어가 개량된 덕분에, 조금 더 자주 사용하는 모습을 볼 수 있을지도 모른다."
20054-ProfileIntroductionKr = "베리타스의 전 부장이자 현 초현상특무부의 부장.\n\n미증유의 강철대륙 사태에 대처하기 위해 특수 슈트로 갈아입었다. 슈트도 슈트지만, 본인이 끝끝내 '휠체어'라고 주장하는 바이크 역시 중요한 무장 중 하나. 기동성과 화력, 대응성까지 갖춘 최전선 사양의 전술 휠체어…라는 모양이다.\n\n역시 어떻게 보아도 바이크다."
20054-CharacterSSRNewKr = "엄청난 일이 되었지만, 할 일은 마찬가지죠.\n냉정하고 우아하게 대처할까요?"
