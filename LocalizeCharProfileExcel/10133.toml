10133-WeaponDescTh = "ปืนป้องกันตัวของริโอะ\n\nการสนับสนุนของชุดที่สมเหตุสมผล ทำให้ยิงได้แม่นยำยิ่งขึ้น"
10133-ProfileIntroductionTh = "ประธานของเซมิน่าซึ่งเป็นสภานักเรียนของมิลเลเนียม\n\nครั้งนี้ริโอะได้เปลี่ยนมาใส่ชุดบอดี้สูทพิเศษเพื่อรับมือกับสถานการณ์ที่ไม่เคย\nเกิดขึ้นมาก่อน เธอกล่าวไว้ว่าชุดนี้เน้นการใช้งานเป็นหลัก เพื่อให้รับมือได้\nทุกสถานการณ์ ไม่ว่าจะเป็นการใช้ประโยชน์จากสิ่งอำนวยความสะดวก การวิเคราะห์สถานการณ์ และการต่อสู้ทางอิเล็กทรอนิกส์"
10133-CharacterSSRNewTh = "ถ้าเป็นการต่อสู้ทางอิเล็กทรอนิกส์ก็วางใจฉันได้เลย\nฉันจะรับมืออย่างสมเหตุสมผลที่สุดเลยละ"
