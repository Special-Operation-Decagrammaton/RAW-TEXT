23006-ProfileIntroductionEn = "President of the Festival Operations Department at Hyakkiyako Academy.\n\nThe mascot of Momoyodou, the Hyakkiyako's traditional tea house. Acts clumsy, but only because it helps sell her image as an idol. In truth, she's an expert flirt who's willing to do anything for the success of the festivals and Momoyodou. Wears her heart on her sleeve, making her an easy read for her friends as well as Sensei."
