16020-WeaponDescKr = "오토기가 SRT 특수학원에서 지급받은 제식 저격총.\n\n강력한 화력으로 엄폐물 뒤에 숨은 상대를 저격할 수 있는 것은 물론이고, 빠른 탄속 덕분에 초장거리 저격도 가능하다. 다만 무게가 매우 무거운 것이 단점으로, 이 때문에 오토기는 만성적인 어깨 결림에 시달리고 있다……"
16020-ProfileIntroductionKr = "SRT 특수학원 FOX 소대의 저격수. 콜사인은 <FOX 4>.\n\n론리울프 타입이 많은 대다수의 저격수와는 달리, 처음보는 사람과도 쉽게 말을 트며 장난 치기를 좋아하는 성격의 학생이다. 덕분에 소대에서는 분위기를 환기시켜주는 분위기 메이커 역할을 맡고 있으며, 전장에서는 타고난 존재감으로 적군의 사기를 저하시키는 역할도 담당하고 있다.\n\n전자 장비를 다루는 일에도 능숙하여 어지간한 기계 장비의 고장에는 대응할 수 있다."
