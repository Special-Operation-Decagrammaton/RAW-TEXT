10142-WeaponDescKr = "곳곳이 닳아 떨어져 덧대 보수한 흔적이 남아 있지만, 형용할 수 없는 신비한 기운을 발산하는 낡은 소총.\n\n대예언자 쿠즈노하로부터 계승되어 온 자격의 증거는, 푸르른 바다에서도 이어진다."
10142-ProfileIntroductionKr = "여름을 맞아 수영복을 입은 백화요란 분쟁조정위원회의 부장.\n\n부원들과의 단합을 위해 백야수상제에 참가한다. 아름답게 피어난 꽃처럼, 모든 경기에서 화려한 리더십을 선보이며 백화요란의 부활을 알린다."
