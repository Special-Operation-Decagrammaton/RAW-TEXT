10137-ProfileIntroductionKr = "발키리 경찰학교, 공안국의 부국장 업무를 맡고 있는 경찰 학생.\n\n자주 용의자로 의심받기는 하지만, 의외로 유능한 경찰이다. 범죄자들의 심리와 행동을 공안국의 그 누구보다도 잘 따라 하는데, 의식하는 행동은 아닌 듯하다.\n\n공안국 내에서 승진을 가장 많이 한 학생인 동시에, 강등도 가장 많이 당했다."
10137-CharacterSSRNewKr = "아, 저 부르신 검까? 진짜로?"
