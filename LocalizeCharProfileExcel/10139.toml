10139-WeaponDescKr = "니코가 SRT 특수학원에서 지급받은 제식 산탄총.\n\n신뢰성이 높은 펌프액션식 산탄총으로 근접전 뿐만 아니라, 도어 브리칭에서도 훌륭한 성능을 발휘한다."
10139-ProfileIntroductionKr = "SRT 특수학원 FOX 소대의 부소대장. 콜사인은 <FOX 2>.\n\n상냥하고 수더분한 성품의 소유자로 누구와도 쉽게 친해지며, 그 덕분에 SRT학원에는 소대를 불문하고 그녀를 의지하는 후배가 많다. 이런 성격 덕분에 잠입이나 위장 업무에서 우수한 성과를 거두었으며, 소대의 행정 및 오퍼레이팅 업무도 겸임하고 있다.\n\n특기는 유부초밥 만들기로, 소대원에게 도시락으로 유부초밥을 종종 싸 주는데, 이 유부초밥은 맛이 좋아 SRT 학원 내에서도 큰 호평을 받고 있다."
10139-CharacterSSRNewKr = "FOX 2, 보급 준비를 마쳤습니다."
