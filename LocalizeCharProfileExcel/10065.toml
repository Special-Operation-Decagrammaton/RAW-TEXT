10065-WeaponDescEn = "Kaho is never seen without her rifle.\n\nThis rifle was custom designed with one purpose in mind: promoting Hyakkiyako's unique style and culture. Although it's made for publicity, it still packs a punch when putting troublemakers back in line."
10065-ProfileIntroductionEn = "Vice President of the Hyakkiyako Academy and the Lead Strategist for the Tourism and Culture Public Relations Support Team.\n\nA member of the Yin-Yang Club, she is in charge of Hyakkiyako's public relations and marketing. So, naturally, she's an avid fan of all things Hyakkiyako and cares deeply about the students who work together to build the culture she loves. Some students even whisper that Kaho feels more like the president than their actual president. In a pool of eccentric Yin-Yang Club members, she's the only one with a healthy amount of common sense, and that alone makes her an invaluable part of the team."
10065-CharacterSSRNewEn = "Allow me to show you Hyakkiyako's impeccable charm, Sensei."
