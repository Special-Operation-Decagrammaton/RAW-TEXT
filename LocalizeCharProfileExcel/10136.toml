10136-WeaponDescKr = "새로 제작된 에이미의 에너지 웨폰.\n\n평소와는 다른 임무를 수행하기 위해 장비한, 스페셜리스트의 무기다."
10136-ProfileIntroductionKr = "평소와는 달리, 현장 지정 사수로서의 임무를 수행하기 위해 갈아입은 초현상특무부의 스페셜리스트.\n\n후방 지원 담당 역할을 수행해야 하기에, 최대한 신체 면적의 노출도를 낮추는 편이 유리했겠지만… 결국 너무 더운 나머지 케이프를 벗어 허리에 둘렀다는 모양이다.\n\n토키와 같이 주 무장을 에너지 무기로 교체했다. 저격 보조용의 바이저까지 구동해야 하다 보니 전체적인 에너지 소모율이 급격히 상승했고, 그 결과 백팩 역시 토키의 그것보다 훨씬 대형화되었다."
10136-CharacterSSRNewKr = "이즈미모토 에이미, 현장으로부터 보고."
