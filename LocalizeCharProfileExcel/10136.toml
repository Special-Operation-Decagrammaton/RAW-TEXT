10136-WeaponDescTw = "新製作的英美的能量武器。\n\n為了執行與平常不同的任務而裝備的專家用武器。"
10136-ProfileIntroductionTw = "千年科學學園所屬，為了執行與平時不同的現場指定射手任務，因而更換裝備的特異現象搜查部的專家。\n\n由於負責後方支援，減少身體面積的暴露會比較有利……結果還是因為太熱而把披風脫下來繫在腰上。\n\n與季同樣將主武器換成了能量武器。為了驅動狙擊輔助用的護目鏡，整體能量消耗率急劇上升，因此背包也比季的大得多。"
