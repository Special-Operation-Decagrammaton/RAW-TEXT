10136-ProfileIntroductionEn = "A tactical specialist for the Super Phenomenon Task Force, armed and ready to support the mission in a new role: designated field sniper.\n\nWhile her suit was designed with her role as rear support in mind, Eimi couldn't stand the heat from her camouflage cape, and it's now tied around her waist.\n\nJust like Toki, she's taken up an energy weapon as her main firepower. However, her sniper's visor requires a lot of energy to power, so her pack ended up being much larger and heavier than Toki's."
