10136-WeaponDescTh = "อาวุธพลังงานชิ้นใหม่ของเอมิ\n\nอาวุธเฉพาะทางที่ออกแบบมาสำหรับปฏิบัติภารกิจ\nที่ต่างจากภารกิจทั่วไป"
10136-ProfileIntroductionTh = "ผู้เชี่ยวชาญพิเศษจากชมรมปรากฎการณ์ลี้ลับที่ได้เปลี่ยนชุดใหม่มา เพื่อปฏิบัติภารกิจของพลแม่นปืนประจำพื้นที่\n\nเนื่องจากรับหน้าที่เป็นกำลังสนับสนุนในแนวหลัง จึงจำเป็นที่จะต้องลดการ\nเปิดเผยร่างกายให้มากที่สุดเท่าที่จะเป็นไปได้... แต่ดูเหมือนว่าสุดท้ายแล้ว เธอก็ถอดเสื้อคลุมออกมาพันรอบเอวเพราะอากาศร้อนเกินไป\n\nอาวุธหลักของเธอก็ถูกเปลี่ยนมาเป็นอาวุธพลังงานเช่นเดียวกันกับโทคิ เนื่องจากต้องจ่ายพลังงานให้กับกระจกนิรภัยที่เป็นอุปกรณ์เสริมในการซุ่มยิง ทำให้อัตราการใช้พลังงานโดยรวมเพิ่มขึ้นอย่างมาก จึงทำให้กระเป๋าเป้\nของเธอมีขนาดที่ใหญ่กว่าของโทคิ"
10136-CharacterSSRNewTh = "อิซุมิโมโตะ เอมิ รายงานจากภาคสนาม"
