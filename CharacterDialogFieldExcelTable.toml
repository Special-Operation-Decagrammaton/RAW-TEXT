83301100150-0-Talk-1 = "เฮ้อ นี่มันเรื่องอะไรกันอีกนะคะ..."
83301100160-0-Music-1 = "[음표]"
83301100160-0-Talk-1 = "ว้าว~ แคมป์ปิ้ง~! อิบูกิตื่นเต้นจัง!"
