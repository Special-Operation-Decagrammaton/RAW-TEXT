[translation]
10142-10 = "블루…… 아카이브."
10142-20 = "시원한 바다에서, 모두와 잊지 못할 추억을 만들고 싶어.\n물론 선생님도 함께야. 같이 해줄 거지?"
10142-30 = "어디가 가장\n시원할까?"
10142-40 = "단합대회…… 기대돼."
10142-50 = "부장다운 모습……\n보여주고 싶어."
10142-60 = "눈에 띄는 건\n곤란한데……."
10142-70 = "오늘의 추억을,\n잊지 말자."
10142-80 = "어서 와, 선생님.\n오늘도 내가 도움이\n됐으면 좋겠어."
10142-90 = "아…… 기다렸어.\n바다에 가는거지?\n이미 갈아입어 뒀어."
10142-100 = "이거…… 어, 때?"
10142-110 = "나는 생각보다\n어울리는 수영복이 없어서……."
10142-120 = "흰색을 고른 이유……?"
10142-130 = "이게 낫다고,\n다들 그렇게 말해줘서……"
10142-140 = "피부관리의 비결?"
10142-150 = "으음, 글쎄?\n특별히 뭔가를 하진 않는데."
10142-160 = "아! 어쩌면 닭꼬치의\n숨은 효능일지도?"
10142-170 = "소중한 건 잃고 나서\n깨닫는 말이 있어."
10142-180 = "나도 그랬지. 그러니까……"
10142-190 = "이제는 잃지 않아. 절대로."
10142-200 = "오른손이 황혼에 잠긴 이후,\n나는 손을 내미는 법을 잊었어."
10142-210 = "뭐든 혼자 고민하고,\n혼자 해결하려 했지."
10142-220 = "하지만 이제 아니야.\n선생님과 모두가 있으니까."
10142-230 = "앞으로도, 지금처럼 잘 부탁해."
10142-240 = "곁에만 있어도\n마음이 편안해지는 사람이 있어."
10142-250 = "오늘 그 사람의 생일이래."
10142-260 = "그래서 기억에 남을 만한\n복장으로 축하해 주려고."
10142-270 = "그러니까……\n생일 축하해, 선생님."
10142-280 = "난 내가 겨울에 태어난\n의미가 있다고 생각해."
10142-290 = "겨울의 혹독함을 이겨내고\n피어나는 꽃처럼……"
10142-300 = "나도 언젠가,\n예쁜 꽃을 피우고 싶어."
10142-310 = "새해 복 많이 받아, 선생님."
10142-320 = "새해니까\n밝은 이야기를 하는 게 좋겠지."
10142-330 = "그래서 형식만\n흉내 내본 거긴 한데……"
10142-340 = "밝은 기분이 될 수 있는\n옷차림을 해봤어."
10142-350 = "어때?"
10142-360 = "난 추위에 잘 버티는 편이야.\n봐봐. 지금도 수영복 차림인데\n괜찮잖아?"
10142-370 = "아…… 오늘은 빨간색으로\n입어볼 걸…… 그랬나……?"
10142-380 = "오늘 같은 날\n수영복을 입으면……"
10142-390 = "나는 그냥 수영복을 입은 걸까?"
10142-400 = "코스프레한 것 같지 않아?"
10142-410 = "어, 아니야?"
10142-420 = "코스프레의 세계란 심오하네……."
10142-440 = "처음에는 이 작전으로 가자."
10142-450 = "상대는 초반부터\n전력을 다할 테니까."
10142-460 = "……선생님? "
10142-470 = "내 신호, 잘 보고 있어?"
10142-480 = "시작부터 한눈을 팔다니, \n선생님답지 않네."
10142-490 = "대체 뭘 보고 있었던……."
10142-500 = "아……. 그렇구나. "
10142-510 = "미안해."
10142-520 = "반대로 집중이 안되겠네. "
10142-530 = " 내가…… \n미스테리어스한 미소녀이니까."
10142-540 = "비치발리볼은 보통 이렇게\n사인을 보내는데……."
10142-550 = "지금이라도\n방식을 바꾸는 게 좋을까?"
10142-560 = "……아니야. \n지금 바꾸기엔 늦어."
10142-570 = "이대로 가는 거야, 선생님."
10142-580 = "우리라면…… 괜찮아."
10142-2600 = "나는 아직 부족한 것투성이.\n그럼에도, 이 백련을 쥐려고 해.\n그건…… 백화요란의 부장을 연기하려는 것이 아니야.\n스스로의 마음과 마주하기 위해서야."
