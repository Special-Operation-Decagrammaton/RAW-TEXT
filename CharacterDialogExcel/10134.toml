[translation]
10134-10 = "블루, 아카이브!"
10134-20 = "아리스, 갑니다!"
10134-30 = "이거, 케이랑\n꼭 닮았습니다!"
10134-40 = "아리스,\n조금 졸립니다……."
10134-50 = "여기는 PK\n금지 구역입니다!"
10134-60 = "(스캔 완료.\n적성 반응…… 없음.)"
10134-70 = "충전기는\n어디에 있을까요?"
10134-80 = "후후, 선생님이 지금 올 줄\n알았습니다!"
10134-90 = "아리스의 자동 요격 기능이\n반응했거든요."
10134-100 = "선생님, 기다리고\n있었습니다!"
10134-110 = "괜찮습니다!"
10134-120 = "아리스는 언제까지나\n기다릴 수 있으니까요!"
10134-130 = "이 슈트의 비행 방식,\n전에 아리스가 했던 게임과\n비슷한 느낌입니다."
10134-140 = "하지만 그 게임이랑 달리,\n현실은 1인칭이라\n엄청나게 헷갈리는 겁니다!"
10134-150 = "아리스도 TPS 시점으로\n보고 싶습니다!"
10134-160 = "선생님?\n왜 그러시나요?"
10134-170 = "아하! 보셨군요!"
10134-180 = "맞습니다,\n방금 아리스는 창문으로\n들어왔습니다!"
10134-190 = "이 모드의 아리스는\n빛 속성뿐만 아니라,\n비행 속성까지 겸하고\n있는 겁니다!"
10134-200 = "네? 위험하니까 평범하게\n문으로 다니라고요?"
10134-210 = "이 장비는 불안정해서\n주기적인 정비가 필요합니다."
10134-220 = "하지만 안심하십시오!"
10134-230 = "히마리 선배와 리오 선배,\n그리고 우타하 선배까지……"
10134-240 = "아무 때나 맡기러\n와달라고 말했습니다!"
10134-250 = "그런데…… 어째선지\n한 사람에게 맡기면,\n다른 두 사람의 기분이\n나빠 보입니다……."
10134-260 = "아리스는 도대체\n어떻게 해야……."
10134-270 = "끄앙……!"
10134-280 = "우으으……\n날개가 커서\n자꾸 여기저기 부딪힙니다."
10134-290 = "날개가 있는 다른 사람들은\n평소에 어떻게 하고\n있는 걸까요?"
10134-300 = "아리스가 아는 사람 중에\n가장 날개가 큰 사람은……."
10134-310 = "아! 나중에 선도부장님한테\n물어봐야겠습니다!"
10134-320 = "케이가 자꾸 그렇게\n게임만 하면, \n나중에 모모이처럼\n된다고 하는데……"
10134-330 = "무슨 뜻일까요?"
10134-340 = "아리스는 모모이를\n좋아하니까,\n모모이처럼 되고 싶습니다!"
10134-350 = "……선생님까지 왜 그럽니까?\n케이랑 똑같은 반응입니다!"
10134-360 = "선생님,\n생일 축하합니다!"
10134-370 = "선생님의 생일이라는 것은,\n선생님이 태어난\n날이라는 거네요."
10134-380 = "선생님이 없던 때도\n있었다는 건,\n어쩐지 신기하게 느껴집니다."
10134-390 = "후후. 선생님,\n기억하시나요?"
10134-400 = "오늘은 아리스와 선생님이,\n아리스가 모두와\n만난 날입니다!"
10134-410 = "비록 아리스는\n언제 태어났는지\n기억나지 않지만……."
10134-420 = "오늘은 틀림없이\n아리스의 생일입니다!"
10134-430 = "선생님,\n새해 복 많이 받으세요!"
10134-440 = "아쉽지만……\n아리스는 이다음 여정을\n함께할 수 없습니다."
10134-450 = "올해는 온라인 게임에서\n동료들과 함께 해돋이를\n보기로 약속했기 때문입니다."
10134-460 = "그러니 오늘은\n밤새도록 게임을……."
10134-470 = "네……?\n지금부터 외출이요?"
10134-480 = "끄앙!\n그럴 수가……!"
10134-490 = "뽜밤뽜밤-!"
10134-500 = "오늘 하루,\n아리스는 산타 씨로\n전직합니다!"
10134-510 = "바쁜 산타 씨 대신에\n하늘을 날아다니면서\n사람들에게 선물을\n나눠줄 겁니다!"
10134-520 = "앗, 그렇지만 선생님의\n역할을 깜빡했습니다.\n으으음……."
10134-530 = "……아!\n선생님은\n루돌프 씨입니다!"
10134-540 = "끄앙!\n선생님, 도와주십시오!"
10134-550 = "사람들이 자꾸 쫓아와서,\n사진을 찍어달라고 합니다!"
10134-560 = "아리스는 딱히 분장하고\n있는 게 아닌걸요!"
10134-580 = "에헤헤.\n선생님, 놀랐습니까?"
10134-590 = "그저 선생님과 함께,\n이 밤하늘을 보고 싶어서\n불러 봤습니다."
10134-600 = "정말로,\n아름답네요."
10134-610 = "아리스의 세계에는, 그리고 아직\n가보지 못한 세계에도……"
10134-620 = "분명, 이런 아름다운 것들이\n잔뜩 있을 테지요."
10134-630 = "하지만 이상합니다."
10134-640 = "세상은 이토록\n아름다운데……\n사람들은 어째서\n싸우는 걸까요?"
10134-650 = "저 밤하늘의 별처럼,\n이 세상에는 모두가\n나눠 가져도 괜찮을 만큼\n아름다운 것들로 넘쳐날 텐데."
10134-660 = "……역시, 아리스는\n아직 잘 모르겠습니다."
10134-2600 = "빛의 검은, 언제나\n아리스에게 나아갈 길을\n비춰 줬습니다.\n마치…… 선생님 같습니다!"
