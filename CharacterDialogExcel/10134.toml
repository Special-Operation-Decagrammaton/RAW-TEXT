[translation]
10134-10 = "Blue, Archive!"
10134-20 = "Aris, on my way!"
10134-30 = "This! It looks very much like Kei!"
10134-40 = "I am a bit sleepy..."
10134-50 = "This is a no-PK zone!"
10134-60 = "(Scan complete. Hostile signatures... None.)"
10134-70 = "Where is the charger?"
10134-80 = "Fufu, I knew you would arrive at this very moment!"
10134-90 = "My auto-detection system told me!"
10134-100 = "Sensei, I was waiting for you!"
10134-110 = "It is okay!"
10134-120 = "I would wait for you forever!"
10134-130 = "This suit's flight mechanics are very similar to a game I played before."
10134-140 = "However, unlike in that game, it is first-person in real life!"
10134-150 = "I wish to see from a third-person perspective!"
10134-160 = "Sensei? What is wrong?"
10134-170 = "Ah! So you saw!"
10134-180 = "Yes! I DID come in from the window!"
10134-190 = "In this mode, I have both light and flying attributes!"
10134-200 = "...Eh? It is dangerous, and I should still use the door like normal?"
10134-210 = "This equipment is still unstable, so it requires regular maintenance!"
10134-220 = "However, there is no cause for concern!"
10134-230 = "Himari, Rio, and even Utaha..."
10134-240 = "They all said I could bring it to them anytime!"
10134-250 = "However... If I ask one person, the other two will be upset..."
10134-260 = "What should I do...?"
10134-270 = "Eek...!"
10134-280 = "Uwaaah... These wings are so big that they bump into everything."
10134-290 = "How does one with wings usually move?"
10134-300 = "The person I know with biggest wingspan..."
10134-310 = "Ah! I will ask the head prefect later!"
10134-320 = "Kei said I will turn out like Momoi if I keep playing video games..."
10134-330 = "What does she mean by that?"
10134-340 = "I like Momoi, so I wish to be like Momoi!"
10134-350 = "...What is wrong, Sensei? Your reaction was identical to Kei's!"
10134-360 = "Happy birthday, Sensei!"
10134-370 = "Since it is your birthday, that means that you were born today!"
10134-380 = "It is a bit interesting to think of a time when Sensei did not exist."
10134-390 = "Fufu. Sensei, do you remember?"
10134-400 = "Today is the day when Sensei and I—the day when everyone and I, met!"
10134-410 = "Although I do not remember when I was born..."
10134-420 = "...there is no doubt that today is my birthday!"
10134-430 = "Happy New Year, Sensei!"
10134-440 = "It is unfortunate...but I cannot join you in this next journey."
10134-450 = "For I have a pact with my online friends to see the sunrise in-game together this year."
10134-460 = "Therefore, I must stay up all night playing..."
10134-470 = "Eh...? We are going to go outside RIGHT NOW??"
10134-480 = "Waah! How could this happen to me...?"
10134-490 = "Bum bum bum!"
10134-500 = "I will be operating as Santa for the day!"
10134-510 = "I will be flying in the sky and giving people gifts in place of Santa, who is too busy today!"
10134-520 = "Ah, I forgot to give Sensei a role. Um..."
10134-530 = "...Ah! Sensei, you are Rudolph!"
10134-540 = "Wah! Sensei, help me!"
10134-550 = "There are people chasing me asking for photos!"
10134-560 = "But this is not a costume!"
10134-580 = "Eheehee. Sensei, were you surprised?"
10134-590 = "I called to you because I wanted you to see the night sky with me."
10134-600 = "Is it not beautiful?"
10134-610 = "and even in all the worlds I have yet to visit..."
10134-620 = "...there must be plenty of beautiful things, just like this."
10134-630 = "That is why it is so strange."
10134-640 = "When there is so much beauty in this world... Why do people choose to fight?"
10134-650 = "Just like the stars that speckle the night, I am sure the world is full of more than enough beautiful things for everyone to share."
10134-660 = "...It really is difficult for me to understand."
10134-2600 = "Sword of Light has always illuminated the path for me. Just like... Sensei!"
