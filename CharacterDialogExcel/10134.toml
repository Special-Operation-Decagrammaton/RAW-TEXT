[translation]
10134-10 = "Blue Archive!"
10134-20 = "อาริสึ ออกโรงค่ะ!"
10134-30 = "อันนี้เหมือนกับเคย์\nเปี๊ยบเลยค่ะ!"
10134-40 = "อาริสึ\nง่วงนิดหน่อยค่ะ..."
10134-50 = "ที่นี่เป็นเขต\nห้าม PK ค่ะ!"
10134-60 = "(สแกนสำเร็จ\nไม่พบสัญญาณ...\nของศัตรู)"
10134-70 = "ที่ชาร์จแบตอยู่ไหนคะ?"
10134-80 = "ฮุฮุ ว่าแล้วเชียวค่ะ\nว่าคุณครูจะมาตอนนี้!"
10134-90 = "ฟังก์ชันสกัดกั้นอัตโนมัติ\nของอาริสึทำงานน่ะค่ะ"
10134-100 = "คุณครู กำลังรอ\nอยู่เลยค่ะ!"
10134-110 = "ไม่เป็นไรค่ะ!"
10134-120 = "อาริสึรอได้เสมอ\nอยู่แล้วค่ะ!"
10134-130 = "วิธีบินในชุดนี้\nคล้ายๆ กับที่อาริสึ\nเจอในเกมก่อนหน้านี้เลยค่ะ"
10134-140 = "แต่ที่ต่างกับเกมนั้นคือ\nของจริงเป็นมุมมองบุคคลที่ 1\nก็เลยสับสนมากเลยค่ะ!"
10134-150 = "อาริสึก็อยากเห็น\nในมุมมองบุคคลที่ 3 บ้างค่ะ!"
10134-160 = "คุณครู?\nทำไมถึงเป็นอย่างนั้นล่ะคะ?"
10134-170 = "อ้อ! เห็นสินะคะ!"
10134-180 = "ใช่ค่ะ เมื่อกี้อาริสึ\nเข้ามาทางหน้าต่างค่ะ!"
10134-190 = "อาริสในโหมดนี้\nไม่ได้มีแค่คุณสมบัติของแสง\nแต่ยังบินได้ด้วยค่ะ!"
10134-200 = "คะ? มันอันตราย ก็เลยให้เข้าออก\nทางประตูตามปกติเหรอคะ?"
10134-210 = "อุปกรณ์นี้ไม่เสถียร\nก็เลยต้องซ่อมบำรุงเรื่อยๆ ค่ะ"
10134-220 = "แต่ก็วางใจเถอะค่ะ!"
10134-230 = "รุ่นพี่ฮิมาริกับรุ่นพี่ริโอะ\nแล้วก็รุ่นพี่อุทาฮะ..."
10134-240 = "บอกว่าให้เอาไปให้ดู\nได้ตลอดเลยค่ะ!"
10134-250 = "แต่ว่า... รู้สึกว่า\nถ้าเอาไปฝากไว้กับใครคนเดียว\nอีกสองคนที่เหลือก็\nเหมือนจะอารมณ์ไม่ดีเลยค่ะ..."
10134-260 = "อาริสึต้อง\nทำยังไงดีนะ..."
10134-270 = "แงงง...!"
10134-280 = "อึกก... ปีกมันใหญ่\nก็เลยไปชนนู่นนี่อยู่เรื่อยค่ะ"
10134-290 = "คนอื่นที่มีปีก\nปกติเขาใช้ชีวิต\nกันยังไงเหรอคะ?"
10134-300 = "คนที่ปีกใหญ่ที่สุด\nที่อาริสึรู้จัก..."
10134-310 = "อ๊ะ! ไว้ต้องไปถามจากประธาน\nคณะกรรมการวินัยแล้วละค่ะ!"
10134-320 = "เคย์บอกว่าถ้าเอาแต่\nเล่นเกมอยู่อย่างนั้น\nต่อไปจะเป็นเหมือนโมโมอิ..."
10134-330 = "มันหมายความว่ายังไงเหรอคะ?"
10134-340 = "อาริสึชอบโมโมอิ\nก็เลยอยากเป็นแบบโมโมอิค่ะ!"
10134-350 = "ทำไมคุณครูก็เป็นไปด้วยอีกคนล่ะคะ...?\nเคย์ก็เป็นแบบนี้เหมือนกันเลยค่ะ!"
10134-360 = "คุณครู\nสุขสันต์วันเกิดค่ะ!"
10134-370 = "วันเกิดของคุณครู\nหมายถึงวันที่คุณครู\nได้เกิดมาสินะคะ"
10134-380 = "โลกนี้ก็เคยมีตอนที่\nไม่มีคุณครูอยู่ด้วย\nน่าประหลาดใจจังเลยนะคะ"
10134-390 = "ฮุฮุ คุณครู\nจำได้หรือเปล่าคะ?"
10134-400 = "วันนี้เป็นวันที่\nอาริสึได้เจอกับคุณครู\nและทุกคนค่ะ!"
10134-410 = "ถึงอาริสึจะ\nจำไม่ได้ว่า\nตัวเองเกิดมาเมื่อไร..."
10134-420 = "แต่วันนี้คือวันเกิดของอาริสึ\nอย่างไม่ต้องสงสัยค่ะ!"
10134-430 = "คุณครู\nสวัสดีปีใหม่นะคะ!"
10134-440 = "ถึงจะน่าเสียดาย...\nแต่อาริสึไม่อาจ\nร่วมทางต่อไปด้วยได้ค่ะ"
10134-450 = "เพราะปีนี้สัญญาไว้ว่า\nจะดูอาทิตย์ขึ้นกับสหาย\nในเกมออนไลน์น่ะค่ะ"
10134-460 = "เพราะงั้นวันนี้\nจะเล่นเกมโต้รุ่ง..."
10134-470 = "คะ...?\nจะออกไปข้างนอกตอนนี้เลยเหรอคะ?"
10134-480 = "แง!\nเป็นแบบนี้ได้ไง...!"
10134-490 = "ปาปัม ปาปัม ป๊าม!"
10134-500 = "วันนี้อาริสึ\nเปลี่ยนอาชีพเป็น\nคุณซานต้าค่ะ!"
10134-510 = "อาริสึจะบินไปบนฟ้า\nแทนคุณซานต้าที่งานยุ่ง\nแล้วจะแจกของขวัญ\nให้คนอื่นค่ะ!"
10134-520 = "อ๊ะ ลืมหน้าที่\nของคุณครูไปเลยค่ะ\nอืมม..."
10134-530 = "อ๊ะ...! ให้คุณครู\nเป็นคุณรูดอล์ฟค่ะ!"
10134-540 = "แง!\nคุณครู ช่วยด้วยค่ะ!"
10134-550 = "มีคนไล่ตามมา\nขอถ่ายรูปไม่หยุดเลยค่ะ!"
10134-560 = "อาริสึไม่ได้แต่ง\nคอสเพลย์สักหน่อยนะคะ!"
10134-580 = "แหะๆๆ\nคุณครู ตกใจเหรอคะ?"
10134-590 = "อาริสึแค่อยากดู\nท้องฟ้ายามค่ำคืนกับคุณครู\nก็เลยลองเรียกดูค่ะ"
10134-600 = "สวยมากๆ เลย\nใช่มั้ยคะ?"
10134-610 = "ในโลกของอาริสึ\nและโลกที่ยังไม่เคยไป..."
10134-620 = "คงมีสิ่งสวยงามแบบนี้\nอยู่เยอะเลยใช่มั้ยคะ"
10134-630 = "แต่ก็แปลกนะคะ"
10134-640 = "โลกนี้สวยงามถึงเพียงนี้...\nแต่ทำไมผู้คน\nถึงได้ทะเลาะกันล่ะคะ?"
10134-650 = "โลกใบนี้มีสิ่งสวยงาม\nมากพอให้เราทุกคนแบ่งกันได้\nเหมือนกับดวงดาวในท้องฟ้านั้นแท้ๆ"
10134-660 = "อาริสึ... ยังไม่ค่อยเข้าใจ\nเรื่องแบบนี้จริงๆ ด้วยค่ะ"
10134-2600 = "ดาบแห่งแสง\nช่วยส่องเส้นทางให้กับ\nอาริสึเสมอเลยค่ะ\nเหมือนกับ... คุณครูเลยนะคะ!"
