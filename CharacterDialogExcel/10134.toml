[translation]
10134-10 = "蔚藍，檔案！"
10134-20 = "愛麗絲，出擊！"
10134-30 = "這個……跟Kei很像呢！"
10134-40 = "愛麗絲，\n有點想睡了……"
10134-50 = "這裡是PK\n禁止區域唷！"
10134-60 = "（掃描完成。\n敵性反應……無）"
10134-70 = "充電器在哪裡呢？"
10134-80 = "耶嘿嘿，老師會來這件事，\n愛麗絲已經知道了。"
10134-90 = "因為愛麗絲的自動迎擊系統\n出現了反應。"
10134-100 = "老師，我在等你哦！"
10134-110 = "沒問題的！"
10134-120 = "愛麗絲要等多久都沒關係！"
10134-130 = "這個套裝的飛行方式，\n跟之前愛麗絲玩過的遊戲\n感覺有點類似。"
10134-140 = "不過，現實跟遊戲不同，\n因為是第一人稱視角，\n所以超複雜的……！"
10134-150 = "愛麗絲也想用TPS視角來看！"
10134-160 = "老師？\n怎麼了嗎？"
10134-170 = "啊！你看到了對吧？"
10134-180 = "沒錯，剛才愛麗絲\n是從窗戶進來的！"
10134-190 = "這個模式的愛麗絲，\n擁有光屬性和飛行屬性！"
10134-200 = "……咦？\n因為危險所以希望\n能正常從門進來？"
10134-210 = "這套裝備不太穩定，\n所以需要定期的保養。"
10134-220 = "不過請放心！"
10134-230 = "陽葵前輩和莉央前輩，\n還有詠葉前輩……"
10134-240 = "都說隨時都可以拿去維修！"
10134-250 = "只是……交給\n其中一個人之後，\n另外兩個人的心情\n就會變差……"
10134-260 = "愛麗絲該怎麼辦……"
10134-270 = "嗚嗚嗚……！"
10134-280 = "嗚嗚……翅膀太大了，\n一直會撞來撞去的。"
10134-290 = "有翅膀的人，\n平常是怎麼做的呢？"
10134-300 = "愛麗絲認識的人之中，\n翅膀最大的是……"
10134-310 = "啊！之後去問問風紀委員長吧！"
10134-320 = "Kei說「一直玩遊戲的話，\n遲早會變得跟桃井一樣」……"
10134-330 = "這是什麼意思呢？"
10134-340 = "愛麗絲很喜歡桃井……\n所以想變得跟桃井一樣！"
10134-350 = "……為，為什麼連\n老師也是這種反應？\n就跟Kei的一樣！"
10134-360 = "老師，祝你生日快樂！"
10134-370 = "老師的生日，\n就是老師出生的日子呢。"
10134-380 = "居然曾有老師不存在的時候……\n總覺得很不可思議。"
10134-390 = "耶嘿嘿，老師，\n你記得嗎？"
10134-400 = "今天，是愛麗絲和老師……\n愛麗絲和大家相遇的日子！"
10134-410 = "雖然愛麗絲不記得自己\n是什麼時候出生的……"
10134-420 = "不過今天，\n肯定是愛麗絲的生日！"
10134-430 = "老師，祝你新年快樂！"
10134-440 = "雖然很可惜……\n不過愛麗絲無法\n參加之後的旅程。"
10134-450 = "因為今年約好要在線上遊戲\n和夥伴們一起看日出……"
10134-460 = "所以今天要通宵玩遊戲……"
10134-470 = "咦……？\n現在要出門，是嗎？"
10134-480 = "嗚嗚！\n怎，怎麼這樣……！"
10134-490 = "乓啪喀乓──！"
10134-500 = "今天的愛麗絲\n要轉職成聖誕老人！"
10134-510 = "代替忙碌的聖誕老人，\n在天上飛來飛去，\n一邊把禮物送給大家！"
10134-520 = "啊，可是這樣就得跟\n老師分開了……唔嗯。"
10134-530 = "……啊！老師就當\n馴鹿魯道夫吧！"
10134-540 = "嗚哇！\n老師，請幫幫忙！"
10134-550 = "有好多人過來\n說想要拍照！"
10134-560 = "愛麗絲，明明\n沒有在扮裝呀！"
10134-580 = "耶嘿嘿。\n老師，嚇到你了嗎？"
10134-590 = "因為想和老師一起\n欣賞這片夜空……\n所以才會呼喚你。"
10134-600 = "相當……美麗呢。"
10134-610 = "在愛麗絲的世界，\n以及尚未去過的世界……"
10134-620 = "想必都有很多\n這麼美麗的事物吧。"
10134-630 = "但是……很神奇。"
10134-640 = "世界明明這麼美麗……\n為什麼人卻要爭鬥呢？"
10134-650 = "就像那片星空一樣，\n這個世界，\n明明充滿著大家一起分享\n也足夠的美麗事物才對……"
10134-660 = "……果然，愛麗絲\n還是不太明白。"
10134-2600 = "光之劍，總是會為\n愛麗絲指引前進的道路。\n沒錯……簡直就像老師一樣！"
