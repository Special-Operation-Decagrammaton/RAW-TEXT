[translation]
10141-10 = "블루…… 아카이……브."
10141-20 = "뭔가 부끄러운 복장이지만……\n자, 잘 부탁드립니다……. "
10141-30 = "(이 옷…… 다들\n유난 떤다고\n생각하지는\n않을까요……?) "
10141-40 = "어디, \n가장 구석진\n자리가……. "
10141-50 = "커피 향이 좋네요……\n헤헤."
10141-60 = "이런 곳까지……\n적들이 쫓아오지는\n않겠죠?"
10141-70 = "기념품으로\n사가면……\n부, 분명 다들\n좋아하시겠죠?"
10141-80 = "아, 안녕하세요 선생님!"
10141-90 = "이 옷, "
10141-100 = "여, 역시 이상할까요……?"
10141-110 = "어, 어서 오세요, 선생님! "
10141-120 = "그러니까, 이 복장은,\n좀 더 본격적인\n마음가짐이라는 느낌으로……!"
10141-130 = "명령만 내려주세요……!\n폭탄은 충분하니까요!"
10141-140 = "호, 혹시 시키실 게 있으신가요?"
10141-150 = "편히 쉬어도 된다고요?"
10141-160 = "그, 그렇지만,\n이것도 엄연한 임무인데……. "
10141-170 = "그, 그렇게 계속 쳐다보시면,"
10141-180 = "조금, 부끄러워요……."
10141-190 = "최선을 다 해서……\n온 힘을 다 해……\n수단 방법 가리지 않고……. "
10141-200 = "생신 축하드립니다, 선생님. "
10141-210 = "이, 이런 저의 축하라도\n괜찮으시다면……\n바, 받아주세요."
10141-220 = "제 생일이요?!"
10141-230 = "어, 어쩌죠?! "
10141-240 = "생일파티 같은 건\n준비도 못 했는데……\n으우우……."
10141-250 = "새해 복 많이 받으세요……"
10141-260 = "저…… 새해의\n첫날이라구요……?"
10141-270 = "저따위와 함께해도\n정말 괜찮으신가요……?"
10141-280 = "메리 크리스마스에요,\n선생님……!"
10141-290 = "혹시 필요하시면,\n산타라도 잡아 오겠습니다……!"
10141-300 = "트릭 오어 트릿!"
10141-310 = "아, 사탕……\n이 아니라면 탄환을……!"
10141-320 = "……이, 이거 맞나요? "
10141-340 = "……잡초를 좋아하는 건,\n아름다워서가 아니에요."
10141-350 = "저는, 잡초의 꿋꿋함이 좋아요."
10141-360 = "어떤 척박한 곳이라도\n강하게 뿌리내리는,\n끈질김이……."
10141-370 = "그것이야말로, 저의 이상."
10141-380 = "아름다운 모습일 필요는 없어요."
10141-390 = "빛나지 않아도 괜찮아요."
10141-400 = "소중한 사람들과,\n그저 함께할 수 있다면……."
10141-410 = "서, 선생님과\n함께 할 수 있다면……"
10141-420 = "저는, 그걸로……."
10141-430 = "……좋아, 해요. "
10141-2600 = "제가 이런 걸 받을 자격이……\n아, 아뇨……\n선생님이 결정하신 것입니다. 감사합니다!"
