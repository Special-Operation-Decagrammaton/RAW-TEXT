[translation]
20057-10 = "블루, 아카이브. 우후후."
20057-20 = "밀레니엄 사이언스 스쿨, 콜 사인 03 무로카사 아카네.\n학생으로서 인사드립니다. 후훗, 원래 학생이지만요?"
20057-30 = "일단 케이크를\n준비하고 싶네요."
20057-40 = "기분이\n포근해지는\n곳이네요."
20057-50 = "저 가구, 부실에도\n두고 싶네요."
20057-60 = "(청소가\n잘 되어 있지만……\n마무리가 아쉽네요.)"
20057-70 = "(이 넓이……\n필요한 폭약량은……)"
20057-80 = "어서 오세요,\n'수업 준비'는,\n끝내 두었답니다?"
20057-90 = "오늘의 '수업'은,\n어디까지인가요?"
20057-100 = "재미있는 이야기도\n부탁드릴게요."
20057-110 = "선생님과 주인님,\n어느 쪽으로 불러 드릴까요?"
20057-120 = "그렇군요……\n선생님 쪽이시군요."
20057-130 = "알겠습니다. '선생님'."
20057-140 = "'학생'으로서\n선생님을 대한다니……\n뭔가 신기한 느낌이네요."
20057-150 = "물론 평소에도 저는\n선생님의 학생이지만요."
20057-160 = "청소에는 여러 가지\n방법이 있지만,"
20057-170 = "저는 선호하는 쪽이\n약간 정해져 있어서요."
20057-180 = "후후. 어느 쪽\n청소라도, 말이죠.\n저, 고집이 조금 있거든요."
20057-190 = "선생님께서 밀레니엄의\n교원이 되어 주시지\n않으시겠어요?"
20057-200 = "그러면 매일\n선생님의 수업을\n들을 수 있을 텐데……"
20057-210 = "'밀레니엄의 선생님'.\n어감이 좋다고\n생각하는데……"
20057-220 = "다들 저 보고 모범생같이\n보인다고 하지만……"
20057-230 = "내면까지 그렇다고는\n할 수 없지 않을까요."
20057-240 = "사람은 누구든지 안에\n숨겨둔 것이 있기\n마련이니까요."
20057-250 = "그러니까……"
20057-260 = "사제지간의\n짧은 일탈, 어떠세요?"
20057-270 = "농담이에요."
20057-280 = "오늘은 선생님의 생일이죠?\n물론 기억하고 있답니다."
20057-290 = "그런데, 어느 쪽의\n축하를 바라시나요?"
20057-300 = "제자로서?\n아니면 메이드로서?"
20057-310 = "선생님.\n오늘이 무슨 날인지\n알고 계신가요?"
20057-320 = "네. 제 생일이에요."
20057-330 = "그리고 사실, '학생'으로서\n여쭤본 것이기도 해요."
20057-340 = "'메이드'라면\n안될 일이겠지만,\n학생이라면 조금 당돌해져도\n좋지 않을까, 해서……"
20057-350 = "그러니 선물은……\n선생님의 시간이, 좋겠어요."
20057-360 = "새해 복 많이 받으세요.\n선생님. 올해도\n잘 부탁드리겠습니다."
20057-370 = "오늘의 저는 '메이드'가\n아니기 때문에."
20057-380 = "딱딱한 인사는 멀리하고……\n함께 산책이라도\n나가지 않으시겠어요?"
20057-390 = "크리스마스네요. 혹시……\n선물, 기대해도 될까요?"
20057-400 = "후후. 준비하지\n않으셨다고 해도\n괜찮아요."
20057-410 = "저는, 선생님만\n있으면 되니까요."
20057-420 = "할로윈……\n사탕과 장난이\n가득한 날……"
20057-430 = "그래서 저는 거꾸로,\n과자를 구워 왔답니다."
20057-440 = "함께 드셔 주실 거죠?"
20057-460 = "후후."
20057-470 = "생각했던 것보다……\n부끄러운 일이네요."
20057-480 = "자신에게,\n솔직해진다는 것……"
20057-490 = "도저히 익숙해지지\n않는 느낌이에요."
20057-500 = "네.\n말씀하신 대로네요."
20057-510 = "저에게는, 정말로\n필요한 일이었나 봐요."
20057-520 = "여러모로 실례가\n많았습니다. 선생님."
20057-530 = "그렇지만 저는 역시,\n선생님을 만나서"
20057-540 = "정말로, 행운이었다고\n생각해요."
20057-550 = "모든 것은 흘러가고,\n어떤 것은 잊히겠죠."
20057-560 = "지금 여기에서\n있었던 일도, 어쩌면……."
20057-570 = "하지만, 저는 기억하겠어요."
20057-580 = "만에 하나 선생님께서\n잊으신다고 해도,\n저는요."
20057-590 = "정말로 소중한 것들은,\n사라지지 않을 테니까요."
20057-2600 = "키보토스에 있어서, 총은 필수품이죠.\n메이드이든 학생이든, 마찬가지고요.\n선생님께 받은 이 '청소도구'와 함께,\n앞으로도 정진하겠습니다."
