[translation]
10064-10 = "Blue Archive"
10064-20 = "ปีใหม่ทั้งที...\nฉันแค่ใส่ชุดใหม่เฉยๆ\nปีนี้ก็ฝากด้วยนะครู"
10064-30 = "ปีนี้ก็หวังว่า...\nจะไม่มีปัญหา\n...ในหลายๆ เรื่องนะ"
10064-40 = "เฮ้อ...\nมีเรื่องให้คิดเยอะเลย"
10064-50 = "ถ้าจะให้พูดตรงๆ เลยละก็\nขอให้สุขภาพดี มีความสงบสุข\nขอแค่นั้นจริงๆ"
10064-60 = "ถ้ามีแต่เรื่องที่เรา\nหาทางออกได้ก็คงดี"
10064-70 = "ฉันชอบชุดนี้อยู่นะ\nมันก็ไม่ได้ดูแย่อะไร"
10064-80 = "เข้ามาสิครู\nสวัสดีปีใหม่นะ"
10064-90 = "มีงานตั้งแต่ปีใหม่เลยเหรอ...\nครูเองก็งานเข้าเหมือนกันสินะ"
10064-100 = "เดี๋ยวนะ เหมือนไม่ใช่เรื่องคนอื่นเลย"
10064-110 = "พอใส่กิโมโนแล้ว...\nยิ่งดูน่ารักขึ้นอีกเลยงั้นเหรอ?"
10064-120 = "เฮ้อ... อย่ามาทำปากไม่ตรงกับใจ\nไปหน่อยเลย"
10064-130 = "ฮู่ว... เรื่องแซวกันนี่เบาได้เบานะครู"
10064-140 = "พูดจริงเหรอ...?\nตะ... ตอนนี้โอเคแล้ว!"
10064-150 = "ก็ไม่เชิงว่ากังวล... \nเกี่ยวกับหน่วยรับจ้างสารพัดหรอก\nแค่เป็นห่วงเฉยๆ"
10064-160 = "ขอให้ปีนี้ไม่มีเหตุสุดวิสัยอะไรนะ"
10064-170 = "เป็นอะไรไปล่ะครู?\nอยากให้ช่วยอะไร\nบอกได้ทุกเรื่องเลยนะ"
10064-180 = "ถ้ามันเป็นเรื่องของครู\nต่อให้ไม่ว่าจ้าง ฉันก็จะช่วย\nอย่างสุดความสามารถเลยละ..."
10064-190 = "เดี๋ยวนะ ว่าแล้วเชียว ถือซะว่า\nไม่ได้ยินที่พูดเมื่อกี้แล้วกันนะ\nลืมมันไปซะเถอะ"
10064-200 = "สุขสันต์วันเกิดนะครู\nอยากได้ของขวัญอะไรมั้ย?"
10064-210 = "ถ้าเป็นซีดีเพลงละก็\nฉันพอจะมีอยู่นะ แต่ว่า..."
10064-220 = "วันเกิด... ฉันเหรอ?"
10064-230 = "ครูจำได้สินะ\nได้รับคำอวยพรจากครู\nก็ไม่เลวเลยแฮะ"
10064-240 = "ดีใจจัง ขอบคุณนะ"
10064-250 = "ขึ้นปีใหม่แล้ว\nสวัสดีปีใหม่นะครู\nขอให้ปีนี้เป็นปีที่ดีเช่นเคย"
10064-260 = "...ถึงกับให้แต๊ะเอีย?\nฉันเลยเหรอ...?"
10064-270 = "คริสต์มาส... งั้นเหรอ\nอีกไม่นานก็จะปีใหม่แล้วสินะ"
10064-280 = "ปีนี้เป็นยังไงบ้างล่ะ?"
10064-290 = "ฮาโลวีน... \nครึกครื้นดีแฮะ"
10064-300 = "ก็ไม่ได้เกลียด\nบรรยากาศแบบนี้เท่าไรหรอก"
10064-320 = "อีกเดี๋ยวก็ถึงเวลารถเที่ยวแรกแล้วสินะ"
10064-330 = "ถึงจะไม่ใช่เสียงที่คาดหวัง...\nแต่ก็ไม่ได้แย่อะไรหรอก"
10064-340 = "ถึงจะเป็นเสียงธรรมดา\nที่ดังทุกเช้า…"
10064-350 = "ต่างจากเสียงระฆังส่งท้ายปี\nที่หนึ่งปีมีครั้งเดียว..."
10064-360 = "แต่วันแรกของปีใหม่\nก็ไม่ได้มีทุกวัน"
10064-370 = "เสียงที่ได้ฟังในวันนี้\nอาจจะเป็นเรื่องที่ดีสุดๆ เลยก็ได้"
10064-380 = "ขอให้ปีนี้เป็นปีที่ดี\nเหมือนเช่นเคยนะ"
10064-390 = "สวัสดีปีใหม่นะครู"
10064-2600 = "ครูโอเคแน่นะ...?\nไม่สิ... ไม่ใช่สิ\nฉันจะพยายามไม่ทำให้ครูผิดหวังนะ"
