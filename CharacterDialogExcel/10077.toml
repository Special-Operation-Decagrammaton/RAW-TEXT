[translation]
10077-10 = "Blue Archive~"
10077-20 = "เอ๋ มารับฉันเหรอคะ? ถ้าบอกก่อน ฉันก็ออกไปเองแล้ว~\nฉันคืออิจิกะจากชมรมทวงความยุติธรรม โรงเรียนสามัญทรีนิตี้ค่ะ\nรบกวนด้วยนะคะ!"
10077-30 = "โอ้ ที่นี่เหรอคะ?\nคาเฟ่ของคุณครู!"
10077-40 = "คุณครูชอบ\nแนวนี้นี่เองสินะคะ..."
10077-50 = "ที่นี่\nสงบดีจังเลยนะคะ!"
10077-60 = "ผ่อนคลายดีจัง..."
10077-70 = "ให้ฉันช่วย\nจัดของมั้ยคะ..."
10077-80 = "เชิญค่ะ~ คุณครู!\nวันนี้ฉันก็จะเต็มที่นะคะ!"
10077-90 = "ทาด๊า!\nอิจิกะมาแล้วค่ะ!"
10077-100 = "...ไม่สิ\nคุณครูมาแล้วต่างหาก!"
10077-110 = "โอ้โห~\nงานที่นี่สบายจังเลยค่ะ!"
10077-120 = "อ่า ไม่ใช่ว่ามันง่ายหรอกนะคะ\nแค่หมายถึงแนวทางการทำงานน่ะค่ะ"
10077-130 = "งานที่ยากที่สุด...\nน่าจะเป็นการห้ามการต่อสู้ค่ะ"
10077-140 = "โอ้ว คุณครูด้วยเหรอคะ?\nเราเหมือนกันเลยนะคะ"
10077-150 = "อยากให้ทุกคนทำอะไรพอดีๆ\nและไม่ใช้ความรุนแรงจัง"
10077-160 = "ถ้าฉันแบกรับหน้าที่\nได้เหมือนคุณครู...\nฉันจะไปขลุกอยู่กับอะไรนะ?"
10077-170 = "มีเรื่องให้ช่วยเหรอคะ?\nฉันยินดีช่วยทุกอย่างเลยค่ะ!"
10077-180 = "ฉันมั่นใจเรื่องการทำตามคำสั่ง\nอยู่แล้วค่ะ!"
10077-190 = "สุขสันต์วันเกิดค่ะ\nคุณครู!!"
10077-200 = "เจอเรื่องอะไรดีๆ มารึเปล่าคะ?\nถ้ายังไม่เจอเรื่องอะไรดีๆ ละก็\nมาทำเรื่องดีๆ ให้เกิดขึ้นตอนนี้\nเลยเถอะค่ะ!"
10077-210 = "...อืม เหตุผลที่มาถึงที่นี่\nในวันเกิดงั้นเหรอคะ?"
10077-220 = "นั่นสิคะ... วันเกิดทั้งที\nก็เลยมา... ได้มั้ย? ฮิฮิ"
10077-230 = "สวัสดีปีใหม่ค่ะ!\nคุณครู!"
10077-240 = "ถ้าปีนี้\nได้พักผ่อนอย่างชิลๆ\nก็น่าจะดีนะคะ!"
10077-250 = "วันนี้ฉันยุ่งๆ\nตั้งแต่เช้าเลยค่ะ\nขอโทษนะคะ!"
10077-260 = "ชมรมทวงความยุติธรรม\nชอบถูกเรียกตัวไปนู่นไปนี่\nบ่อยๆ น่ะค่ะ..."
10077-270 = "ตาลายหมดแล้วค่ะ~!"
10077-280 = "รู้สึก...สังหรณ์ใจไม่ค่อยดีเลย"
10077-290 = "แต่ว่ามันก็...\nน่าจะไม่เป็นอะไรหรอกเนอะ?\nฮะฮ่า!"
10077-310 = "ฮะฮ่า! คุณครู\nตรงนี้ค่ะ! ตรงนี้!\nเห็นฉันมั้ยคะ?"
10077-320 = "อ๊ะ! นี่ก็แค่\nลูกโป่งน่ะค่ะ..."
10077-330 = "ฉันรู้สึกว่าพอถือเจ้านี่อยู่\nก็รู้สึกเหมือนเด็กร่าเริง\nที่อยู่ในสวนสนุกเลยค่ะ... ฮ่าๆ"
10077-340 = "อ๊ะ! ไม่ใช่ของฉันหรอกค่ะ!\nคือว่า อยู่ๆ ฉันก็อยากเล่นดูบ้าง"
10077-350 = "อ่า... เอ่อ...\nมันก็จริงค่ะ...\nรู้ได้ยังไงเหรอคะ?"
10077-360 = "อะไรกัน...?\nสีหน้าฉันมันฟ้องเหรอคะ...?"
10077-370 = "แต่ก็ไม่เป็นไรหรอก...\nนี่เป็นครั้งแรกเลยนะคะ\nที่ฉันได้เห็นคุณครูจากมุมนี้"
10077-380 = "ถ้ามุมมองต่างออกไป\nวิธีที่จะเห็นก็แตกต่างกันไป\nด้วยเนอะ..."
10077-390 = "...สนุกดีนะคะเนี่ย"
10077-400 = "ฉันชอบความรู้สึกนี้จังเลยค่ะ!\nฮะฮ่า!"
10077-2600 = "จะว่ายังไงดีนะ...\nขอบคุณนะคะที่ใจดีกับฉัน\nแบบนี้ ฉันจะมีคุณค่าพอสมควร\nได้รับหรือเปล่านะ แต่ยังไงฉันก็...\nดีใจจริงๆ นะคะ"
