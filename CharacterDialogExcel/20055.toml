[translation]
20055-10 = "Blue Archive...!"
20055-20 = "ฮานาโอกะ ยูสึค่ะ...\nถะ... ถึงจะใส่ชุดแบบนี้ แต่ก็ขอฝากตัวด้วยนะคะ..."
20055-30 = "(ชีวิตประจำวันที่แสนสงบสุข\nตอนนี้ฉันรู้ถึงความสำคัญ\nของมันแล้วละค่ะ)"
20055-40 = "โซฟาคงจะ\nไม่ดีดตัวออกไปใช่มั้ยคะ...?"
20055-50 = "อบอุ่น แถมยังมีกลิ่นหอม\nดีจังเลยนะคะ ฮิฮิ"
20055-60 = "ตู้เก็บของ... ฮือ\nฉันคงจะไม่อยากเข้าไป\nในนั้นอีกพักใหญ่ค่ะ..."
20055-70 = "คิดแล้วเชียวว่าชุดนี้\nมันเตะตาเกินไป\nใช่มั้ยล่ะคะ... ฮือ..."
20055-80 = "เอ๋...!\nชะ... ชุดนี้ คือว่า..."
20055-90 = "ยะ... ยินดีต้อนรับค่ะ\nคุณครู"
20055-100 = "กะ... กำลังรออยู่เลยค่ะ\nคุณครู...!"
20055-110 = "ออกปฎิบัติการ..."
20055-120 = "ไม่สิ ไม่ใช่\nมาเริ่มงานเข้าเวรตัวแทน\nกันเลยมั้ยคะ...?!"
20055-130 = "ชุดนี้สบายกว่าที่เห็น..."
20055-140 = "ถึงมันจะใส่สบาย\nแต่ฉันก็เขินอยู่ดีค่ะ..."
20055-150 = "สัมผัสของชุดสูท มันน่าทึ่งมากเลยค่ะ\nเหมือนว่ากระสุนปืนจะลื่นผ่านไปเลยค่ะ"
20055-160 = "ถึงชุดมันจะปกปิดมิดชิด...\nตะ... แต่รู้สึกเหมือนมันเปิดเผย\nทุกส่วนเลยค่ะ... ฮือ..."
20055-170 = "ชุดนี้... ดูเหมือนว่ามันจะเชื่อมต่อ\nกับคอมพิวเตอร์ด้วยค่ะ..."
20055-180 = "มันพอจะช่วยเรื่อง\nงานเข้าเวรตัวแทน...\nได้มั้ยคะ"
20055-190 = "ระ... ร้อนเหรอคะ?"
20055-200 = "คือว่า ถ้าลองจับ\nด้านนอกของชุดดู\nจะรู้สึกเย็นสบายมากเลยค่ะ..."
20055-210 = "สุขสันต์วันเกิดค่ะ...!"
20055-220 = "ฉันเตรียมซอฟต์แวร์"
20055-230 = "วิดีโอเกมเอาไว้\nเป็นของขวัญ... ให้…"
20055-240 = "คะ... คุณครูรับไว้ได้ใช่มั้ยคะ...?"
20055-250 = "ขะ... ขอบคุณค่ะ คุณครู"
20055-260 = "ขอบคุณที่ไม่ลืมฉัน..."
20055-270 = "ถึงจะเกิดเรื่องมากมาย\nแต่ก็ผ่านไปอีกหนึ่งปีแล้วนะคะ"
20055-280 = "สวัสดีปีใหม่ค่ะ...\nคุณครู"
20055-290 = "ถึงฉันจะไม่มีชุดซานตาคลอส\nแต่ชุดนี้ก็ดูคล้ายๆ กันอยู่นะคะ..."
20055-300 = "มะ... เมอร์รีคริสต์มาสค่ะ\nคุณครู!"
20055-310 = "มะ... มีคนใส่ชุดเจ๋งๆ\nยิ่งกว่าฉันอยู่บนท้องถนน..."
20055-320 = "นะ... แน่นอนว่า\nฉันไม่ได้อยากใส่ชุด\nอะไรแบบนั้นหรอกนะคะ...!"
20055-340 = "ดูตรงนี้สิคะ คุณครู"
20055-350 = "โลกที่ฉันปกป้องไว้ค่ะ"
20055-360 = "ฉันรู้อยู่แล้วค่ะ..."
20055-370 = "ว่าคนที่เห็นทิวทัศน์ในตอนนี้\nไม่ได้มีแค่ฉันคนเดียว"
20055-380 = "ตอนแข่งเกมเมื่อครั้งที่แล้ว\nคุณครูก็เคยบอกเอาไว้นี่คะ"
20055-390 = "ว่าช่วงเวลานี้ ว่าเกมเกมนี้\nคือความจริงของพวกเรา"
20055-400 = "เพราะงั้น แม้ว่าจะเป็นโลก\nที่ถูกกำหนดตอนจบเอาไว้แล้วก็ตาม"
20055-410 = "แม้ทุกคนในโลกนี้"
20055-420 = "จะเดินไปตามเรื่องราวเดียวกันก็ตาม"
20055-430 = "แต่สิ่งที่ฉันเลือกมาตลอด...\nกับความรู้สึกนี้..."
20055-440 = "คือเรื่องจริงไม่ผิดอย่างแน่นอนค่ะ"
20055-2600 = "ซ้อมให้เหมือนปฏิบัติจริง\nปฏิบัติจริงให้เหมือนซ้อม...!\nฉะ... ฉันจะทำให้เต็มที่เลยค่ะ...!"
