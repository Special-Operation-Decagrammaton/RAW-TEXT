[translation]
20055-10 = "블루…… 후우…… 아카이브……!"
20055-20 = "하나오카 유즈, 입니다……. \n이, 이런 모습이지만, 잘 부탁드려요……."
20055-30 = "(평온한 일상……\n그 소중함을 이젠\n알 것 같아요.)"
20055-40 = "소파가 사출되거나\n하지는 않겠죠……?"
20055-50 = "따뜻하고\n향긋하고\n……좋네요, 헤헤."
20055-60 = "캐비닛……으우,\n당분간은\n들어가고 싶지\n않아요……."
20055-70 = "역시 이 복장,\n너무 튀는 거\n아닐까요……\n후으으……."
20055-80 = "흐에에……!\n이, 이 옷은 그러니까……."
20055-90 = "……어, 어서 오세요,\n선생님."
20055-100 = "기, 기다리고 있었습니다,\n선생님……!"
20055-110 = "어서 출격……"
20055-120 = "아니 아니,\n당번 업무 시작하실래요……?!"
20055-130 = "이 옷, 보기보다는 편한데……"
20055-140 = "편한 것 이상으로\n부끄러워요……."
20055-150 = "슈트의 촉감, 신기하죠?\n총알도 미끄러질 것 같아요."
20055-160 = "분명 다 가리고 있는데,\n다 드러낸 기분이에요……\n후으으……."
20055-170 = "이 슈트……\n왜인지 컴퓨터랑\n연동도 되는 것 같아요……."
20055-180 = "당번 업무에\n도움이……될까요?"
20055-190 = "더, 더우신가요?"
20055-200 = "그, 이 슈트,\n겉면을 만져보면\n꽤 시원한데요……."
20055-210 = "생일, 축하드려요……!"
20055-220 = "저, 선물로"
20055-230 = "게임 소프트를\n준비했는……데……."
20055-240 = "괘…… 괜찮으신가요……?"
20055-250 = "가, 감사합니다, 선생님."
20055-260 = "저를, 잊지 않아 주셔서……."
20055-270 = "많은 일이 있었지만,\n결국 한 해는 가네요."
20055-280 = "……새해 복, 많이 받으세요,\n선생님."
20055-290 = "산타복, 은 없지만,\n그, 비슷한 거니까……."
20055-300 = "메, 메리 크리스마스예요,\n선생님!"
20055-310 = "저, 저보다도\n과감한 복장들이 거리에……!"
20055-320 = "……그, 물론\n제가 과감하고 싶었던 건\n절대 아니고요……!"
20055-340 = "이곳을 보세요, 선생님."
20055-350 = "제가 지켜낸 세계예요."
20055-360 = "……물론 알고 있어요."
20055-370 = "지금 이 풍경을 본 사람이,\n저만은 아니라는 걸."
20055-380 = "저번 게임 대회 때\n이런 말씀을 해주셨었죠."
20055-390 = "지금 이 순간이,\n이 게임이,\n우리들의 현실이라고."
20055-400 = "그러니, 설령 엔딩이\n정해진 세계라고 하더라도"
20055-410 = "이 세계의 모두가,"
20055-420 = "같은 시나리오를\n걷는다 하더라도"
20055-430 = "제가 내렸던 선택들은,\n이 감정은……."
20055-440 = "틀림없이, 진짜일 거예요."
20055-2600 = "연습은 실전처럼, 실전은 게임처럼……!\n저, 최선을 다할게요……!"
