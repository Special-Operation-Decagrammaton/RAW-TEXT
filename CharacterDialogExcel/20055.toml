[translation]
20055-10 = "Blue... Phew... Archive...!"
20055-20 = "Hanaoka Yuzu here... E-Even though I look like this right now, please take care of me..."
20055-30 = "(I think I now know...how precious peaceful everyday life is.)"
20055-40 = "The sofa isn't going to suddenly deploy or anything, right...?"
20055-50 = "It's warm, it smells good... It's nice, heehee."
20055-60 = "A cabinet... Ugh, I don't want to go in one of those for a while..."
20055-70 = "I knew it. This outfit stands out too much... Augh..."
20055-80 = "Eek...! Th-This outfit is, um..."
20055-90 = "...W-Welcome, Sensei..."
20055-100 = "I-I was waiting for you, Sensei...!"
20055-110 = "Let's move out..."
20055-120 = "No, no. Shall we get started with Student Rep duty...?!"
20055-130 = "This outfit is more comfortable than it looks..."
20055-140 = "But it's more embarrassing than how comfortable it is..."
20055-150 = "Doesn't the texture of this suit seem strange? I feel like even a bullet would slide off."
20055-160 = "I'm certain that everything is covered, but I feel naked... Augh..."
20055-170 = "This suit... For some reason, it seems like it can be linked with a computer..."
20055-180 = "Will this...help with Student Rep duties?"
20055-190 = "A-Are you feeling hot?"
20055-200 = "Um, this suit feels quite cool on the surface..."
20055-210 = "Happy birthday...!"
20055-220 = "Um, as your gift,"
20055-230 = "I prepared a game...package..."
20055-240 = "A-Are you okay with it...?"
20055-250 = "Th-Thank you, Sensei."
20055-260 = "For not forgetting about me..."
20055-270 = "Many things happened, but the year passes by in the end."
20055-280 = "...Happy New Year, Sensei."
20055-290 = "I don't have a Santa outfit, but this is similar, so..."
20055-300 = "M-Merry Christmas, Sensei!"
20055-310 = "Th-There are people in the streets with outfits even more daring than mine...!"
20055-320 = "...Um, of course, it's not like I wanted to be daring...!"
20055-340 = "Look around, Sensei."
20055-350 = "This is the world I protected."
20055-360 = "...I understand, of course."
20055-370 = "I know that I'm not the only one to have seen this view."
20055-380 = "Back at that gaming tournament, you said something like this, didn't you?"
20055-390 = "That this moment, this game, is our reality."
20055-400 = "So, even if this world has a predetermined ending,"
20055-410 = "even if everyone in this world"
20055-420 = "follows the same scenario,"
20055-430 = "The choices I make, these emotions..."
20055-440 = "Without a doubt, they are all real."
20055-2600 = "Practice like it's real, treat it like it's a game...! I'll do my best...!"
