[translation]
26004-20 = "เรื่องของเราสองคนกำลังจะเริ่มต้น\nเหมือนเรื่องราวในหนังสือแล้วนะคะ!"
26004-30 = "ดูเหมือนหนังสือจะน้อยเกิน\nไปค่ะ ต้องหาหนังสือมา\nเติมให้เต็มแล้วละค่ะ"
26004-40 = "ว้าว ห้องนี้เหมาะกับการ\nอ่านหนังสือมากเลย"
26004-50 = "อ๊ะ เล่มนี้ยังไม่เคยอ่านเลย!"
26004-60 = "ฮุฮุฮุฮุฮุ\nปักธงเรียบร้อยแล้วค่ะ~"
26004-70 = "ฮิฮิ! ฮิฮิฮิ!\nฉันมีความคิดดีๆ\nแล้วละค่ะ!"
26004-80 = "เชิญเลยค่ะ คุณครู!\nได้อ่านหนังสือที่ฉันให้ไปรึยังคะ?"
26004-90 = "วันนี้อยากให้แนะนำ\nหนังสือเกี่ยวกับอะไรดีคะ?"
26004-100 = "ถ้าได้ค่าขนมมาก็จะต้องเอาไป\nซื้อหนังสือก่อนค่ะ ส่วนเสื้อผ้า\nกับขนมค่อยเอาไว้ทีหลัง"
26004-110 = "ฉันชอบหนังสือแบบไหนน่ะเหรอคะ?\nอืม... ฉันก็อ่านได้หมดเลย..."
26004-120 = "คุณครูคะ ฉันไม่แนะนำหนังสือเล่ม\nนั้นหรอกนะคะ หนังสือเล่มนั้น\nหลังจากหน้าที่ 4 ไป ตัวละครเอกของ\nเรื่องตายอย่างน่าทรมานมากเลยค่ะ"
26004-130 = "อ่า... ฉันเผลอสปอยล์เนื้อเรื่องไปรึเปล่านะ?"
26004-140 = "ฉันอยากให้ที่นี่มีหนังสือเยอะ\nกว่านี้ค่ะ... ฉันแนะนำหนังสือ\nให้สักสองสามเล่มดีมั้ยคะ?"
26004-150 = "ฉันอยากให้คนอื่นๆ\nอ่านหนังสือให้เยอะๆ กว่านี้ค่ะ..."
26004-160 = "สุขสันต์วันเกิดค่ะ คุณครู!\nถ้ามีหนังสือที่อยากได้\nไม่ว่าเรื่องไหนก็บอกฉันได้เลยนะคะ!"
26004-170 = "ฮุฮุ ถึงฉันจะชอบหนังสือก็จริง...\nแต่วันเกิดทุกครั้งจะได้หนังสือ\nเป็นของขวัญตลอด ก็รู้สึก\nเสียดายนิดหน่อยค่ะ"
26004-180 = "วันนี้ฉันอยากได้ของขวัญพิเศษ\nจากคุณครูนะคะ!"
26004-190 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ\nปีนี้ก็ฝากตัวด้วยค่ะ"
26004-200 = "เมอร์รี คริสต์มาสค่ะ~\nคุณครู วันนี้เป็นวันที่พิเศษมากเลยนะคะ!"
26004-210 = "การได้อยู่กับคุณครูในวันแบบนี้...\nมีความสุขจังเลยค่ะ... ฮิฮิ!"
26004-220 = "ฮาโลวีนเริ่มแล้วล่ะค่ะ ฮุฮุ!\nฉันจะต้องเตรียมตอนพิเศษ\nของนิยายสยองขวัญกับเรื่องเล่า\nสยองขวัญแล้วค่ะ"
26004-240 = "เอ่อ... บะ...บังเอิญจังเลยนะคะ\nไม่คิดว่าสุดท้ายจะเป็นแบบนี้..."
26004-250 = "ฉันแค่อยากหาให้เจอก่อน...\nแล้วไปบอกคุณครูก็เท่านั้นเองค่ะ..."
26004-260 = "ไม่ใช่นะคะ\nฉันเป็นคนหยิบก่อนนี่คะ..."
26004-270 = "อืม เอายังไงดีนะ~\nถ้าคุณครูอยากได้จริงๆ ละก็\nฉันจะยอมให้ก็ได้นะคะ..."
26004-280 = "ล้อเล่นน่ะค่ะ..."
26004-290 = "เดี๋ยวฉันจะเอาไปประทับตรายืมก่อน\nแล้วจะเอามาให้ค่ะ\nโชคดีที่หาหนังสือเจอนะคะ"
26004-300 = "เป็นยังไงบ้างคะ?\nการได้ใช้เวลาแบบนี้ในห้องสมุด...\nมันน่าสนุกดีใช่มั้ยล่ะคะ?"
26004-310 = "ก็ความสนุกแบบนี้สัมผัสจากที่อื่น\nไม่ได้นี่นา... เราจะเล่นสนุกแบบนี้\nได้ที่ห้องสมุดเท่านั้นนี่คะ"
26004-320 = "เพราะงั้นหลังจากนี้\nถ้าคุณครูต้องการละก็\nมาที่นี่ได้ตลอดเลยนะคะ"
26004-330 = "ฉัน...จะรอนะคะ!"
26004-2600 = "ฮุฮุ คราวนี้คนที่มาคืนหนังสือช้า\nคงเจอปัญหาใหญ่แล้วละค่ะ"
