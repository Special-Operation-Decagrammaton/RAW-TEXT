[translation]
20054-10 = "Blue~ Archive~!"
20054-20 = "หัวหน้า แทรกซึม สนับสนุนส่วนหลัง อาเกโบชิ ฮิมาริ\nแฮ็กเกอร์ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ ผู้ทำทุกอย่างนี้ได้\nปรากฏตัวอย่างสมบูรณ์แบบแล้วค่ะ คุณครูรอฉันนานเลยนะคะ"
20054-30 = "(อุณหภูมิในห้อง\nเย็นเกินไปหรือเปล่าคะ?)"
20054-40 = "เป็นที่ที่เหมาะกับ\nการพักหายใจเลยนะคะ"
20054-50 = "คาเฟอีนใน\nปริมาณเหมาะสม\nช่วยได้มากเลยค่ะ"
20054-60 = "สถานที่ที่พักผ่อนได้\nก็เป็นสิ่งสำคัญค่ะ"
20054-70 = "ฉันขอปฏิเสธ\nเครื่องดื่มเย็นๆ ดีกว่าค่ะ"
20054-80 = "ฉันรู้อยู่แล้วละค่ะว่า\nตอนนี้คุณครูมาถึงแล้ว"
20054-90 = "รู้ได้ยังไงน่ะเหรอคะ?"
20054-100 = "ฮุฮุ เป็นความลับค่ะ\nความลับกับสาวน้อยน่ารัก\nเป็นของคู่กันอยู่แล้วค่ะ"
20054-110 = "คุณครู เหนื่อยแย่เลยนะคะ"
20054-120 = "เอ๋...? ทำไมถึงทำหน้า\nประหลาดใจล่ะคะ?"
20054-130 = "ฉันมาชาเล่ต์ด้วยวิธีไหนน่ะเหรอคะ?\nก็ต้องมาด้วย..."
20054-140 = "'วีลแชร์' อยู่แล้วสิคะ"
20054-150 = "ไม่อยากรู้สีนำโชค\nของวันนี้เหรอคะ?"
20054-160 = "คะ? ทำไมจู่ๆ ถึงคุยเรื่องนี้\nน่ะเหรอคะ?"
20054-170 = "ฉันว่าจะเปลี่ยนรูปพื้นหลังหน้าจอ\nของคุณครูให้เป็นสีนั้นน่ะค่ะ"
20054-180 = "ไม่ต้องปฏิเสธกัน\nขนาดนั้นก็ได้ค่ะ..."
20054-190 = "ตอนนี้ปัญญาประดิษฐ์\nก้าวหน้าไปมาก"
20054-200 = "แต่ก็ยังแทนที่มนุษย์\nโดยสมบูรณ์ไม่ได้หรอกค่ะ"
20054-210 = "ก็งานบางอย่าง\nมีแต่มนุษย์เท่านั้นที่ทำได้นี่คะ"
20054-220 = "อย่างเช่น..."
20054-230 = "อะไรแบบนี้น่ะค่ะ..."
20054-240 = "ถ้ามีเรื่องยาก\nหรือเรื่องหนักใจอะไร"
20054-250 = "ก็บอกฉันได้ตลอดเลยนะคะ"
20054-260 = "ก็ฉันในตอนนี้"
20054-270 = "'บินมาหา' ได้เลยนี่คะ "
20054-280 = "อืม... งืม... เอ๋?"
20054-290 = "ค่ะ คุณครู\nฉันกำลังงีบอยู่ค่ะ"
20054-300 = "พูดอีกอย่างก็คือกำลังวิเคราะห์\nความสัมพันธ์ระหว่างการนอน\nแบบ REM กับ Non-REM อยู่ค่ะ"
20054-310 = "คุณครูก็มาทำด้วยกันมั้ยคะ...?"
20054-320 = "ก็ตอนนี้ฉันเป็นทั้ง\nผู้ดูแลส่วนตัวของคุณครู..."
20054-330 = "และแฮ็กเกอร์ผู้มีรอยยิ้มสดใส\nฮีลใจเหมือนยาวิเศษนี่คะ"
20054-340 = "ฮุฮุ คุณครูนี่โชคดีจริงๆ เลยค่ะ\nว่ามั้ยคะ?"
20054-350 = "ฉันเองก็... เหมือนกันค่ะ"
20054-360 = "คุณครู สุขสันต์วันเกิดค่ะ"
20054-370 = "หรือว่า คิดว่าฉันจะไม่รู้คะ?"
20054-380 = "นั่นสินะคะ\nให้ของขวัญเป็นการ\nออกทริปด้วยกันดีมั้ยคะ?"
20054-390 = "สวัสดีค่ะ คุณครู\nจำได้หรือเปล่าคะ\nว่าวันนี้คือวันอะไร?"
20054-400 = "ค่ะ วันเกิดของฉันเองค่ะ\nเพราะงั้นฉันก็เลย\nมาขอของขวัญวันเกิดค่ะ"
20054-410 = "นั่นสินะคะ ให้ของขวัญเป็น...\nการรับคำเชิญมานั่งซ้อนท้าย\nจะดีมั้ยนะ?"
20054-420 = "คะ? สงสัยว่าแค่นั้นก็พอแล้วเหรอ?"
20054-430 = "แน่นอนอยู่แล้วค่ะ\nแบบนั้นสิคะยิ่งดี"
20054-440 = "การได้ใช้เวลาร่วมกับคุณครู\nคือของขวัญที่ดีที่สุด\nสำหรับฉันค่ะ"
20054-450 = "สวัสดีปีใหม่ค่ะ"
20054-460 = "ปีนี้ก็คงมีเรื่องราว\nเกิดขึ้นอีกมากมายนะคะ"
20054-470 = "แต่ก็มีบางอย่างที่\nไม่แปรเปลี่ยนไปค่ะ"
20054-480 = "เหมือนกับเสน่ห์ของฉันยังไงล่ะคะ"
20054-490 = "ก็ในอนาคต ฉันก็จะ...\nพยายามแสดงเสน่ห์ของฉัน\nให้คุณครูได้เห็นด้วยนี่คะ"
20054-500 = "การตื่นเต้นเพราะเป็นวันคริสต์มาส\nมันไม่สมเหตุสมผลเอาเสียเลย..."
20054-510 = "มีคนที่พูดอะไรแบบนั้นด้วยละค่ะ"
20054-520 = "บางครั้งความจริงก็\nซ่อนอยู่ในส่วนที่\nไม่สมเหตุสมผลนั้นค่ะ"
20054-530 = "เอาละ คุณครู?\nรบกวนคุ้มกันฉันหน่อยได้มั้ยคะ?"
20054-540 = "ไม่ว่าจะที่ไหน เรื่องอะไร\nฉันก็ชอบทุกอย่างเลยค่ะ"
20054-550 = "วันฮาโลวีนยุคนี้\nให้ความรู้สึกเหมือนเป็น\nอีเวนต์มากเกินไปนะคะ"
20054-560 = "แต่ถึงอย่างนั้น ถ้ามันเป็นเหตุผล\nที่ทำให้สนุกกับทุกวันได้\nนั่นก็อาจจะมีความหมายก็ได้ค่ะ"
20054-570 = "ก็นะ นอกเหนือจากนั้นแล้ว\nวันนี้ฉันก็รู้สึกอยาก\nแกล้งใครเล่นอยู่พอดี..."
20054-580 = "ถ้าเป็นขนม\nฉันขอปฏิเสธดีกว่าค่ะ♪"
20054-600 = "น่าประหลาดใจนะคะ"
20054-610 = "ตอนอยู่มิลเลเนียมก็เคยทำแบบนี้\nพอมาอยู่ที่นี่ ก็แหงนหน้า\nมองท้องฟ้ายามค่ำคืนได้อีก"
20054-620 = "ดาวที่ส่องแสงอยู่ที่นี่\nดูมีบางอย่างแตกต่าง\nจากดาวที่เรารู้จักกันนะคะ"
20054-630 = "คงต้องบอกว่า\nเป็นความรู้สึกลึกลับ...\nที่ยากจะถ่ายทอดเป็นคำพูดได้ค่ะ"
20054-640 = "คะ...?!"
20054-650 = "ขะ... ขอบคุณค่ะ\nฉะ... ฉันจะเข้าใจว่า\nนี่เป็นการชมนะคะ"
20054-660 = "ต่อให้บอกว่าอยู่ภายใต้\nท้องฟ้ายามค่ำคืนผืนเดียวกัน"
20054-670 = "แต่ก็ใช่ว่าเราทั้งหมด\nจะเข้าใจทุกคนได้หรอกค่ะ"
20054-680 = "แต่อย่างน้อย\nก็เป็นเรื่องแน่แท้ว่า\nเราอยู่ใต้ท้องฟ้าเดียวกัน"
20054-690 = "อย่างน้อยนี่น่าจะเป็นโอกาส\nที่เราจะเข้าใจกันและกันได้นะคะ"
20054-700 = "ฉันคิดอย่างนั้นค่ะ"
20054-710 = "แล้วคุณครูล่ะ คิดยังไงบ้างคะ?"
20054-2600 = "ขอบคุณค่ะ คุณครู\nที่จริงการไม่หยิบอาวุธมาใช้\nก็คงเป็นการดีกว่า...\nแต่การเตรียมตัวก็เป็นสิ่งสำคัญนี่คะ"
