[translation]
20054-10 = "블루~ 아카이브~"
20054-20 = "부장, 잠입, 후방 지원.\n모든 것을 해내는 초천재병약만능미소녀해커, 아케보시 히마리.\n완벽하게 등장입니다. 선생님, 오래 기다리셨습니다."
20054-30 = "(냉방 설정 온도가,\n너무 낮은 게 아닐까요.)"
20054-40 = "숨을 돌리기에\n좋은 장소네요."
20054-50 = "적절한 카페인은\n도움이 되죠."
20054-60 = "휴식할 수 있는 장소,\n중요하죠."
20054-70 = "찬 음료는 사양하겠어요."
20054-80 = "선생님이 지금 도착하신다는 건,\n이미 알고 있었답니다."
20054-90 = "어떻게 알았냐고요?"
20054-100 = "후훗, 비밀입니다.\n미소녀에게는 비밀이 따라오는\n법이니까요."
20054-110 = "선생님, 수고하십니다."
20054-120 = "……어라?\n왜 신기하다는 얼굴을\n하고 계신 거죠?"
20054-130 = "샬레까지의 이동 수단요?\n그거야 당연히 이–"
20054-140 = "'휠체어로', 왔답니다."
20054-150 = "오늘의 행운 색이 무엇인지\n알고 싶지 않으세요?"
20054-160 = "네? 갑자기 그건 어째서냐고요?"
20054-170 = "선생님의 모니터 배경을,\n그 색으로 변경해 놓을까 해서요."
20054-180 = "……그렇게 사양하지 않으셔도\n되는데."
20054-190 = "인공지능은 엄청난 발전을\n이룩하는 중이지만."
20054-200 = "아직은, 사람을 완전히\n대체하지 못한다는 의견입니다."
20054-210 = "어떤 일은,\n오직 사람만이 가능하니까요."
20054-220 = "예를 들면……"
20054-230 = "……이런 거라든가, 말이죠."
20054-240 = "어려운 일이나\n곤란한 일이 있으시다면"
20054-250 = "언제든 제게 말씀 주세요."
20054-260 = "지금의 저는 말 그대로–"
20054-270 = "'날아올' 수 있으니까요."
20054-280 = "으음…… 후웅…… 어라?"
20054-290 = "네. 선생님.\n조금 자고 있었어요."
20054-300 = "말씀드리자면\n렘수면과 논렘수면의 관계를\n고찰하는 것이었죠."
20054-310 = "……선생님도 함께, 어떠신가요?"
20054-320 = "지금의 저는 선생님만의\n라이프 스태프이자……"
20054-330 = "초천재병약만능미소녀해커\n이니까요."
20054-340 = "후훗.\n선생님은 정말 운이 좋으시네요.\n그렇지 않으신가요?"
20054-350 = "……저 역시, 마찬가지고요."
20054-360 = "선생님, 생일 축하드립니다."
20054-370 = "설마,\n제가 모를 거라고 생각하셨나요?"
20054-380 = "그렇네요. \n선물로, 함께 투어링을\n가는 것은 어떨까요?"
20054-390 = "안녕하세요, 선생님.\n오늘이 무슨 날인지\n기억하시나요?"
20054-400 = "네, 제 생일입니다.\n그러니,\n생일 선물을 받으러 왔어요."
20054-410 = "그렇네요, 선물로……\n뒷좌석에 초대해드릴까\n하는데요."
20054-420 = "네? 그걸로 됐느냐고요?"
20054-430 = "그럼요.\n오히려 그게 좋은 겁니다."
20054-440 = "선생님과 함께하는 시간 자체가,\n저에게는 최고의 선물이랍니다."
20054-450 = "새해 복 많이 받으세요."
20054-460 = "올해에도 분명\n많은 일이 일어나겠죠."
20054-470 = "하지만 어떤 것들은\n변하지 않을 거예요."
20054-480 = "마치 제 매력처럼 말이죠."
20054-490 = "……앞으로도 선생님께\n제 매력을 보여드릴 수 있도록,\n노력할 테니까요?"
20054-500 = "크리스마스라고 해서 들뜨는 것은\n이성적이지 못하다……"
20054-510 = "그런 말을 하는 분도 계십니다."
20054-520 = "때로 진실은,\n그 이성적이지 못한 부분에\n숨어 있기도 하죠."
20054-530 = "자, 선생님?\n에스코트 부탁드려도 될까요?"
20054-540 = "어디든, 무엇이든\n저는 모두 좋으니까요."
20054-550 = "요즘 할로윈은\n이벤트 같은 느낌이\n너무 강한 것 같단 말이죠."
20054-560 = "그렇다고는 해도, 매일을 즐겁게\n보낼 이유가 된다면, \n그것도 의미가 있는 걸지도\n모릅니다."
20054-570 = "뭐, 그건 그렇다 치고,\n오늘은 장난을 치고 싶은\n기분이니……."
20054-580 = "과자는 사양하도록 할게요♪"
20054-600 = "신기한 일이죠."
20054-610 = "밀레니엄에서 그랬던 것처럼,\n여기에서도 밤하늘을 올려다볼\n수 있는데도."
20054-620 = "이곳에서 빛나는 별은,\n우리가 아는 것과는\n어딘가 다르네요."
20054-630 = "좀처럼\n말로 표현하기 어려운……\n신비한 감각이라고나 할까요."
20054-640 = "네……?!"
20054-650 = "가, 감사합니다.\n치, 칭찬해 주신 것으로\n이해하겠어요."
20054-660 = "……같은 밤하늘 아래에\n있다고 하더라도."
20054-670 = "모두가 모두를\n이해할 수 있는 것은 아니겠죠."
20054-680 = "하지만 적어도\n같은 하늘 아래에 있다는 것은\n확실하니."
20054-690 = "서로를 이해할 계기 정도는,\n되지 않을까요."
20054-700 = "저는 그렇게 생각해요."
20054-710 = "선생님은, 어떻게 생각하시나요?"
20054-2600 = "감사합니다. 선생님.\n사실 무기는 사용되지 않는 편이 좋겠지만……\n대비는, 중요하니까요."
