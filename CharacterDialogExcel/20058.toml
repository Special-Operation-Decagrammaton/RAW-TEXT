[translation]
20058-10 = "블루아카이브!"
20058-20 = "얏호~ 게헨나 학원 2학년, 하타미 에리카.\n잘 부탁해."
20058-30 = "우왓, \n사람이 꽤 있잖아.\n항상 이랬던가?"
20058-40 = "선생님이랑 같이하면 \n재밌겠다."
20058-50 = "이건\n선생님의 취향인가?"
20058-60 = "(이거, 누구 꺼지?)"
20058-70 = "응? ……누가 \n지켜보고 있는 건가?"
20058-80 = "얏호, 선생님♪\n기다리고 있었어."
20058-90 = "어서 와! 보고 싶었다고."
20058-100 = "(나, 방금 무슨 말 했지……?)"
20058-110 = "오늘 당번은 나야.\n시킬 일이 있으면 뭐든 말해줘!"
20058-120 = "선생님, 은근 열심히 일하네. \n별로 그럴 것 같지 않으면서."
20058-130 = "후후…… \n집중하는 어른은 멋있네~"
20058-140 = " 라고 생각한 것뿐이야."
20058-150 = "선생님은 어째서 \n'선생님'을 하고 있는 거야?"
20058-160 = "뭔가, 궁금해서……"
20058-170 = "지킬 게 있으니까……"
20058-180 = "인가."
20058-190 = "그럼 나도…… 지켜줄 거야?"
20058-200 = "아, 이쪽 서류는 다 끝냈어."
20058-210 = "은근 빡세네."
20058-220 = "뭐, 선생님에게 \n도움이 된다면 괜찮지만."
20058-230 = "응? 레오파드 패턴? 좋아하지."
20058-240 = "총 외에도 이것저것 \n레오파드 패턴으로 \n맞추고 있거든♪"
20058-250 = "갖고 있는 \n다른 레오파드 무늬의 물건?"
20058-260 = "후후…… 안 알려줄래♪"
20058-270 = "선생님, 생일 축하해!"
20058-280 = "오늘만큼은 세상 누구보다 \n행복한 사람이 되기를!"
20058-290 = "엑…… 내 생일, \n기억해 준 거야?"
20058-300 = "선생님은 정말\n죄가 무거운 사람이야."
20058-310 = "……기대하게 해놓고\n어쩌려고?"
20058-320 = "새해 복 많이 받아, 선생님!\n올해는 작년보다 \n더 많은 추억이 \n생겼으면 좋겠네!"
20058-330 = "크리스마스는 좋은 날이야."
20058-340 = "뭔가\n기분이 둥둥~ 뜬다고 할까. \n살짝 설렌다고 할까."
20058-350 = "특별한 날이라는 느낌……\n같이 있는 것만으로도 말이야."
20058-360 = "크앙~! 간식을 안 주면, \n잡아먹는다!"
20058-370 = "자아, 잡아먹히지 않게 힘내."
20058-390 = "어서 와, 선생님."
20058-400 = "여기가, 나만의 비밀 기지-"
20058-410 = "혼자만의 시간이 \n필요할 때 오는 장소야."
20058-420 = "후훗, \n그런데 비밀 기지라고 하기에는,\n좀 넓을지도."
20058-430 = "……그냥, \n선생님이랑 공유하고 싶었어."
20058-440 = "내가 보는 풍경과……\n내가 느끼는 분위기를."
20058-450 = "왜냐고 물어보면, \n딱히 할 말은 없지만……"
20058-460 = "그렇네…… \n비밀 장소를 알려주는 건,"
20058-470 = "특별하다는 증거니까."
20058-480 = "선생님은, \n나의 특별한 사람이라서."
20058-490 = "……후후."
20058-500 = "여기, 조용하지?"
20058-510 = "그렇지만…… 내 마음은, \n조금 시끄러울지도."
20058-2600 = "어라, 내 취향 기억해 준 거야?\n하핫. 항상 고마워.\n나도 보답…… 해야겠지?"
