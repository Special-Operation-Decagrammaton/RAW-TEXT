[translation]
20023-10 = "Blue Archive."
20023-20 = "I'm Ogata Kanna of the Valkyrie Police School Public Peace Bureau. Leave criminal interrogations to me."
20023-30 = "The coffee here...smells pretty nice."
20023-40 = "I'm tired..."
20023-50 = "The new Cottontail Detective series is at a place like this...?"
20023-60 = "Ugh, I got a message from the Defense Office."
20023-70 = "I'm hoping for a peaceful day in Kivotos!"
20023-80 = "I've been waiting, Sensei."
20023-90 = "Let me know if you ever need the power of the Public Peace Bureau."
20023-100 = "...Was there an incident?"
20023-110 = "Please wait a moment. I'll request a warrant."
20023-120 = "A lot of documentation is needed for a Public Peace Bureau dispatch."
20023-130 = "I sometimes envy Schale's ability to execute quick responses."
20023-140 = "I don't have the ability or authority to take care of this, but..."
20023-150 = "I'm going to make some coffee. Would you like a cup?"
20023-160 = "The students at the Public Safety Bureau make for good police, but..."
20023-170 = "They're too inexperienced to deal with the heavier crimes..."
20023-180 = "I don't like donuts very much. They make my hands too messy."
20023-190 = "About the Feral Hound nickname..."
20023-200 = "Umm... I'd prefer it if you didn't call me that in front of others... It's embarrassing."
20023-210 = "Today's your birthday. Happy birthday."
20023-220 = "As a public official of Valkyrie Police School,"
20023-230 = "I'm not in a position to give you gifts. However..."
20023-240 = "If it's okay with you, I'd like to take you to lunch at my favorite restaurant."
20023-250 = "Oh... Today's my birthday."
20023-260 = "The staff's been talking about it since this morning."
20023-270 = "I thought they were discussing the criminal we arrested yesterday."
20023-280 = "I hope you have a happy New Year."
20023-290 = "I hope we get to meet for occasions other than investigations this year."
20023-300 = "...Are you working overtime again?"
20023-310 = "As it happens, I'm on duty today as well."
20023-320 = "...It's Christmas, so..."
20023-330 = "How about a sweet latte, instead of just black coffee?"
20023-340 = "I'll bring it right away."
20023-350 = "Halloween..."
20023-360 = "It's a troublesome time that can hamper our investigations."
20023-370 = "If a criminal hides in a group of people wearing costumes,"
20023-380 = "it becomes difficult to locate them. Masks ruin facial sketches."
20023-390 = "It is troublesome."
20023-410 = "I didn't expect to run into you here..."
20023-420 = "I lost my composure. Sorry."
20023-430 = "Is that so?"
20023-440 = "I feel most at ease here."
20023-450 = "I can't ever take a day off from being the intimidating Public Peace Bureau Director, but..."
20023-460 = "...I need a place where I can lower my guard for a moment."
20023-470 = "So, today..."
20023-480 = "Please pretend that you never saw me here."
20023-2600 = "Come to think of it, there was a time I couldn't handle this gun very well. Now that I'm used to it, it's a shame there's not much of a chance to use it these days..."
