[translation]
16019-10 = "블루, 아카이브."
16019-20 = "퍼펙트 메이드, 퍼펙트 리콘.\n아스마 토키입니다.\n같은 배에 탔다고 생각하고, 맡겨만 주십시오."
16019-30 = "휴식은 중요합니다.\n역시 주 3일제가\n필요합니다."
16019-40 = "어디 앉거나\n누울 곳은\n없을까요."
16019-50 = "충분한\n카페인과 당분은,\n임무의 연료입니다."
16019-60 = "이 카페의\n레시피……\n괜찮네요."
16019-70 = "다음 임무를\n위해서라도,\n휴식해야 합니다."
16019-80 = "후웅……"
16019-90 = "으음……"
16019-100 = "핫?!"
16019-110 = "선생님, 오셨군요."
16019-120 = "……아닙니다.\n심심한 나머지\n졸고 있던 게 아닙니다."
16019-130 = "저를 깨우려 선생님이\n가까이 와주실지도……"
16019-140 = "같은 흑심 따위,\n없으니까요."
16019-150 = "선생님,\n기다리고 있었습니다."
16019-160 = "그러면 오늘 업무를\n시작하도록 하죠."
16019-170 = "정리 완료,\n업무 리스트 완료,\n커피 완료, 간식 완료."
16019-180 = "준비는 모두\n끝내 두었습니다."
16019-190 = "네, 신속하게\n칭찬해 주세요."
16019-200 = "취미에 대해\n진지하게 생각한 결과."
16019-210 = "재밌다고 생각하는 걸\n하면 된다, 는\n결론을 내렸습니다."
16019-220 = "그러니, 선생님."
16019-230 = "이 만화,\n같이 보시겠습니까?\n아니면 게임?"
16019-240 = "제가 즐겨 보는 인터넷\n방송 채널도 있습니다."
16019-250 = "무기와 복장을 일신해서,\n경량화와 고속화를\n추구했습니다."
16019-260 = "하지만……\n이전의 중량감과 화력이\n그리워질 때도 있습니다."
16019-270 = "왜 사람은\n양자 중첩 상태 같은 것이\n되지 못하는 걸까요."
16019-280 = "진실로, 슬픈 일입니다."
16019-290 = "저번에 본 방송인의\n생방송에서,"
16019-300 = "무한 탄창과 쌍권총에 대해\n댓글을 달았더니"
16019-310 = "산해경 고급중학교의\n현룡문에서 '좋아요'를\n눌렀습니다."
16019-320 = "어째서일까요……?"
16019-330 = "가끔,\n세상의 마지막 같은 것에\n대해 생각해 보곤 합니다."
16019-340 = "큰 의미는 없습니다."
16019-350 = "그저, 그런 날이 찾아온다면\n뭘 하려나, 하는\n생각이 들었습니다."
16019-360 = "선생님이라면\n어떻게 하실 건가요?"
16019-370 = "저는…… 무엇을 할지\n정해놨습니다."
16019-380 = "……그래도,\n알려드리지 않을 겁니다."
16019-390 = "비밀 한두 개 정도는,\n있는 편이 좋다고\n생각하니까요."
16019-400 = "정찰에 있어서 중요한 것은,\n여러 가지가 있겠습니다만."
16019-410 = "무엇보다 상대를 알고\n자신을 알아야,"
16019-420 = "작전의 성공을\n보장할 수 있습니다."
16019-430 = "즉 저희는,\n서로에 대해 깊게\n이해할 필요가 있는 겁니다."
16019-440 = "……의미를\n모르시겠다고요?"
16019-450 = "제가 아니까, 문제없습니다."
16019-460 = "알고 있습니다."
16019-470 = "오늘은 선생님이 처음으로\n이 세상의 정찰에 성공한,\n기념비적인 날."
16019-480 = "정찰 기록이 남아있다면,\n저에게도\n꼭 보여주셨으면 합니다."
16019-490 = "오늘의\n메인 히로인으로서."
16019-500 = "이날에 합당한 선물을,\n요구하겠습니다."
16019-510 = "그것은……"
16019-520 = "사랑과, 관심입니다."
16019-530 = "새해 복 많이 받으세요."
16019-540 = "제 인생의 새로운 1년이,\n여기서부터 시작합니다."
16019-550 = "그러면, 선생님."
16019-560 = "함께 인생 계획을\n세우도록 하죠."
16019-570 = "선생님이 학생에게\n크리스마스 선물을 보낸다……\n일방적인 것은\n좋지 않습니다."
16019-580 = "그래서 제가\n선물을 준비해 보았습니다."
16019-590 = "네, 바로 저입니다."
16019-600 = "……농담이 아닙니다.\n네."
16019-610 = "사탕이나 과자는\n좋은 전투식량이 된다고\n들었습니다."
16019-620 = "즉, 할로윈에는 가장\n걸맞은 식품이라고\n할 수 있습니다."
16019-630 = "할로윈이\n그런 상황에 해당하냐고요?"
16019-640 = "그건……"
16019-650 = "제가 그렇다면 그런 겁니다."
16019-670 = "예쁜 아침노을이네요."
16019-680 = "이곳에서는 매일,\n이 경치가 관측됩니다."
16019-690 = "그렇다고 해도,\n여기에 온 며칠분의\n기록밖에 없기에."
16019-700 = "매일은 아닐지도\n모르겠지만요."
16019-710 = "네."
16019-720 = "그래도, 이곳에서는 전혀\n다른 색으로 느껴집니다."
16019-730 = "하늘도……\n주황색으로 빛나는 대지도……"
16019-740 = "저는, 선생님과 이렇게\n풍경을 공유하는 시간이\n좋습니다."
16019-750 = "선생님께,\n제가 느낀 것을 전할 수\n있다는 게 좋습니다."
16019-760 = "이 순간은,\n지금 이 시간에만\n존재합니다."
16019-770 = "그리고,\n다시는 돌아오지 않겠지요."
16019-780 = "선생님."
16019-790 = "만일 지금 '최후'의 순간이\n다가온다면."
16019-800 = "저는, 선생님 곁에서\n그 순간을 함께 하는,"
16019-810 = "'최후'의 한 사람이,\n될 수 있을까요?"
16019-2600 = "무기를 바꾼다는 것은, 의외로 결심이\n필요한 일입니다. 아침 메뉴를 토스트\n에서 팬케이크로 바꾸는 정도로요.\n하지만 선생님께 받은 것이라면,\n조금, 이야기가 다르겠지요."
