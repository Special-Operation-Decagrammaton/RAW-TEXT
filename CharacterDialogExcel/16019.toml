[translation]
16019-10 = "蔚藍，檔案。"
16019-20 = "完美女僕、完美偵察員。\n我是飛鳥馬季。\n請當作乘上了大船，放心交給我吧。"
16019-30 = "休息是很重要的。\n我認為週休四日\n左右比較適當。"
16019-40 = "有能讓身體\n休息的地方嗎。"
16019-50 = "咖啡因和糖分\n是不可或缺的。"
16019-60 = "這間咖啡廳的\n配方……還算及格。"
16019-70 = "為了下次的任務，\n休息一下吧。"
16019-80 = "唔……"
16019-90 = "嗯……"
16019-100 = "哈！？"
16019-110 = "老師，您來了啊。"
16019-120 = "……不是的。\n我並不是因為\n太無聊而打瞌睡。"
16019-130 = "為了叫醒我，\n老師說不定會靠過來……"
16019-140 = "這種小心思之類的，\n我完全沒有。"
16019-150 = "老師，恭候多時了。"
16019-160 = "那麼，開始今天的工作吧。"
16019-170 = "整理完畢、\n任務清單完畢、\n咖啡完畢、點心完畢。"
16019-180 = "一切都準備好了。"
16019-190 = "是的，請迅速誇獎我。"
16019-200 = "在認真思考了有關\n興趣的事情之後──"
16019-210 = "得出了只要做\n覺得開心的事就好，\n這樣的結論。"
16019-220 = "所以，老師。"
16019-230 = "要不要一起看漫畫呢？\n還是要玩遊戲？"
16019-240 = "看直播也不錯呢。"
16019-250 = "裝備煥然一新後，\n實現了輕量化和高速化。"
16019-260 = "但是……我有時也會懷念\n以前的重量感和火力。"
16019-270 = "為什麼人類無法\n處於疊加的狀態呢。"
16019-280 = "……實在很遺憾。"
16019-290 = "我在前幾天看到的\n那位實況主的直播中，"
16019-300 = "對無限彈匣和雙槍\n發表了評論──"
16019-310 = "結果被山海經高級中學的\n玄龍門按了「讚」。"
16019-320 = "這是為什麼呢……？"
16019-330 = "有時，我會思考\n關於世界末日的事情。"
16019-340 = "沒有什麼特別的意思。"
16019-350 = "只是在想，如果那天來臨的話，\n我會做什麼呢？之類的。"
16019-360 = "老師會怎麼做呢？"
16019-370 = "我……已經決定好要做什麼了。"
16019-380 = "……但是，我不會告訴您。"
16019-390 = "因為我覺得有一兩個\n祕密會比較好。"
16019-400 = "雖然偵察時重要的\n事情有很多……"
16019-410 = "必須了解敵人、\n了解自己……"
16019-420 = "才能確保作戰成功。"
16019-430 = "因此我們有必要\n深入地互相了解。"
16019-440 = "……聽不懂我的意思？"
16019-450 = "只要我懂就好，\n所以沒關係。"
16019-460 = "我知道。"
16019-470 = "今天，是老師第一次\n成功偵察這個世界的、\n值得紀念的日子。"
16019-480 = "偵察記錄如果還留著的話，\n請務必也讓我看看。"
16019-490 = "作為今天的主角──"
16019-500 = "我要求與這一天\n相稱的禮物。"
16019-510 = "那就是……"
16019-520 = "愛與獎勵。"
16019-530 = "您的一年，\n祝您新年快樂。"
16019-540 = "我人生嶄新的一年，\n就從這裡開始。"
16019-550 = "那麼，老師。"
16019-560 = "一起來規劃人生吧。"
16019-570 = "老師會送學生\n聖誕禮物……"
16019-580 = "所以，我這邊\n也準備了禮物。"
16019-590 = "是的，禮物就是我。"
16019-600 = "……這不是在開玩笑哦。嗯。"
16019-610 = "聽說糖果和零食\n是很優秀的戰鬥糧食。"
16019-620 = "因此，在萬聖節\n可說是最合理的食品。"
16019-630 = "萬聖節是否符合\n那種情況，是嗎？"
16019-640 = "這個嘛……"
16019-650 = "至少我是這麼認為的。"
16019-670 = "真是美麗的朝霞呢。"
16019-680 = "在這裡的每一天，\n都能觀測到這樣的景色。"
16019-690 = "話雖如此，由於\n只有來到這裡之後\n幾天份的記錄……"
16019-700 = "或許不是每天\n都有也說不定。"
16019-710 = "是的。"
16019-720 = "不過，從這裡看的話\n感覺顏色完全不同。"
16019-730 = "無論是天空……\n還是閃耀著橙色的大地……"
16019-740 = "我，喜歡像這樣和老師\n共享景色的時光。"
16019-750 = "將令人心動的事物\n傳達出去的這個時刻……"
16019-760 = "這個瞬間，\n只存在於此時此刻。"
16019-770 = "並且，再也不會重現。"
16019-780 = "老師。"
16019-790 = "如果現在，\n「最後」的時刻\n到來的話──"
16019-800 = "我，能成為在老師身邊\n共度那個瞬間的……"
16019-810 = "「最後」的那個人嗎？"
16019-2600 = "武器的變更，需要下定很大的決心。\n是跟把早餐的菜單，\n從吐司換成鬆餅同等的大事。\n不過，如果是老師給的東西……\n那就另當別論了。"
