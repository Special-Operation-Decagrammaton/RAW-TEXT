[translation]
16019-10 = "Blue Archive"
16019-20 = "เมดที่เพอร์เฟกต์ หน่วยลาดตระเวนที่เพอร์เฟกต์\nอะซุมะ โทคิเองค่ะ\nคิดเสียว่าเราลงเรือลำเดียวกันแล้ว และวางใจฉันได้เลยค่ะ"
16019-30 = "การพักผ่อนคือสิ่งสำคัญค่ะ\nระบบทำงานสัปดาห์ละ 3 วัน\nคือสิ่งจำเป็นจริงๆ ด้วยค่ะ"
16019-40 = "มีตรงไหนให้นั่ง\nหรือลงไปนอน\nได้บ้างมั้ยคะ?"
16019-50 = "คาเฟอีนกับน้ำตาล\nในปริมาณที่พอเพียง\nคือเชื้อเพลิงในการ\nทำภารกิจค่ะ"
16019-60 = "สูตรของคาเฟ่นี้...\nใช้ได้เลยนะคะ"
16019-70 = "ต้องพักผ่อน\nอย่างน้อยก็เพื่อ\nภารกิจต่อไปค่ะ"
16019-80 = "ฮืม..."
16019-90 = "อืม..."
16019-100 = "เฮือก?!"
16019-110 = "คุณครู มาแล้วสินะคะ"
16019-120 = "เปล่าค่ะ...\nฉันไม่ได้กำลังง่วง\nเพราะเบื่อหรอกนะคะ"
16019-130 = "ฉันไม่ได้มีเจตนาแฝง\nว่าคุณครูอาจเข้ามา..."
16019-140 = "ปลุกฉันใกล้ๆ ก็ได้\nไม่ได้คิดแบบนั้นเลยนะคะ"
16019-150 = "คุณครู\nฉันกำลังรออยู่เลยค่ะ"
16019-160 = "งั้นก็มาเริ่มงาน\nของวันนี้กันเลยค่ะ"
16019-170 = "จัดของเรียบร้อย\nจัดลิสต์งานเรียบร้อย\nกาแฟเรียบร้อย ของว่างเรียบร้อย"
16019-180 = "ฉันเตรียมตัวทุกอย่าง\nไว้หมดแล้วค่ะ"
16019-190 = "ค่ะ รีบชมฉัน\nเร็วเข้าสิคะ"
16019-200 = "จากการไปคิดเรื่อง\nงานอดิเรกอย่างจริงจัง"
16019-210 = "ฉันได้ข้อสรุปว่า\nแค่ทำในสิ่งที่\nคิดว่าสนุกก็พอค่ะ"
16019-220 = "เพราะงั้น คุณครูคะ"
16019-230 = "มาดูการ์ตูนเรื่องนี้\nด้วยกันมั้ยคะ?\nหรือว่าจะเล่นเกมดี?"
16019-240 = "มีแชนแนลในอินเทอร์เน็ต\nที่ฉันชอบดูด้วยนะคะ"
16019-250 = "ฉันปรับปรุงอาวุธและชุดใหม่\nให้เบาและเคลื่อนไหว\nได้เร็วขึ้นค่ะ"
16019-260 = "แต่ก็มีบางครั้ง\nที่คิดถึงความหนักแน่น\nและพลังในการยิงก่อนหน้านี้ค่ะ"
16019-270 = "ทำไมคนเราถึง\nอยู่ในสภาวะซ้อนทับ\nแบบควอนตัมไม่ได้คะ?"
16019-280 = "เป็นเรื่องที่น่าเศร้าจริงๆ เลยค่ะ"
16019-290 = "ในรายการสด\nที่ฉันดูครั้งก่อน"
16019-300 = "ฉันไปคอมเมนต์เกี่ยวกับ\nกระสุนไม่จำกัดกับปืนพกคู่ไว้"
16019-310 = "แล้วมังกรดำจาก\nโรงเรียนมัธยมซานไห่จิง\nก็มากด 'ไลก์' ด้วยค่ะ"
16019-320 = "เพราะอะไรกันนะคะ...?"
16019-330 = "บางครั้งฉันก็จะคิดเรื่อง\nวันสิ้นโลกค่ะ"
16019-340 = "ไม่มีความหมายอะไรมากหรอกค่ะ"
16019-350 = "ก็แค่ ถ้าวันแบบนั้นมาถึง\nฉันจะทำอะไรนะ\nเป็นความคิดแบบนั้นน่ะค่ะ"
16019-360 = "ถ้าเป็นคุณครู\nจะทำยังไงเหรอคะ?"
16019-370 = "ฉัน... ตัดสินใจไว้แล้วค่ะ\nว่าจะทำอะไร"
16019-380 = "แต่ถึงยังไง...\nฉันก็จะไม่บอกหรอกค่ะ"
16019-390 = "ก็ฉันคิดว่าการมี\nความลับสักอย่างสองอย่าง\nมันก็ดีเหมือนกันนี่คะ"
16019-400 = "ในการลาดตระเวน\nมีสิ่งสำคัญอยู่หลายอย่าง"
16019-410 = "แต่เหนือสิ่งอื่นใดคือ\nต้องรู้จักฝ่ายตรงข้ามและตัวเอง"
16019-420 = "แบบนั้นเป็นการรับประกัน\nความสำเร็จของงานได้ค่ะ"
16019-430 = "นั่นแปลว่าพวกฉัน\nต้องเข้าใจกันและกัน\nอย่างลึกซึ้งค่ะ"
16019-440 = "ไม่รู้ว่าหมายความ\nว่ายังไงงั้นเหรอคะ...?"
16019-450 = "แต่ฉันรู้ งั้นก็ไม่มีปัญหาหรอกค่ะ"
16019-460 = "ฉันรู้ค่ะ"
16019-470 = "วันนี้คือวันแห่งประวัติศาสตร์\nที่คุณครูลาดตระเวนโลกนี้\nสำเร็จเป็นครั้งแรก"
16019-480 = "ถ้ามีบันทึกการลาดตระเวน\nฉันอยากให้เอามาให้\nฉันดูด้วยคนนะคะ"
16019-490 = "ในฐานะ\nตัวเอกของวันนี้"
16019-500 = "ฉันจะขอของขวัญที่\nคู่ควรกับวันนี้ค่ะ"
16019-510 = "นั่นก็คือ..."
16019-520 = "ความรักและความสนใจค่ะ"
16019-530 = "สวัสดีปีใหม่ค่ะ"
16019-540 = "อีกหนึ่งปีใหม่ของชีวิตฉัน\nเริ่มต้นที่ตรงนี้ค่ะ"
16019-550 = "ถ้างั้น คุณครูคะ"
16019-560 = "เรามาวางแผนชีวิต\nด้วยกันเถอะค่ะ"
16019-570 = "คุณครูให้ของขวัญ\nคริสต์มาสกับนักเรียน...\nการทำอยู่ฝ่ายเดียว\nไม่ใช่สิ่งที่ดีหรอกค่ะ"
16019-580 = "เพราะงั้นฉันก็เลย\nเตรียมของขวัญไว้ให้ค่ะ"
16019-590 = "ค่ะ เป็นฉันเองค่ะ"
16019-600 = "ไม่ได้ล้อเล่นนะคะ...\nค่ะ"
16019-610 = "ฉันได้ยินมาว่า\nลูกอมหรือขนมคือ\nเสบียงที่ดีในการรบค่ะ"
16019-620 = "ก็เลยบอกได้ว่า\nมันคืออาหารที่คู่ควรกับ\nฮาโลวีนที่สุดค่ะ"
16019-630 = "ฮาโลวีนถือเป็นกรณีแบบนั้น\nด้วยหรือเปล่าน่ะเหรอคะ?"
16019-640 = "เรื่องนั้นน่ะ..."
16019-650 = "ถ้าฉันบอกว่าเป็น ก็ถือว่าเป็นค่ะ"
16019-670 = "เป็นแสงรุ่งอรุณที่สวยจังเลยนะคะ"
16019-680 = "ฉันเห็นวิวทิวทัศน์แบบนี้\nจากที่นี่ทุกวันเลยค่ะ"
16019-690 = "แต่ถึงยังไง\nก็มีบันทึกของที่นี่\nแค่สองสามวันเท่านั้น"
16019-700 = "งั้นก็อาจจะไม่ใช่\nทุกวันก็ได้ค่ะ"
16019-710 = "ค่ะ"
16019-720 = "แต่ถึงยังไง ฉันก็รู้สึกว่า\nสีสันของที่นี่มันต่างออกไปค่ะ"
16019-730 = "ทั้งสีท้องฟ้า...\nและผืนดินที่เป็นประกายสีส้ม..."
16019-740 = "ฉันชอบช่วงเวลา\nที่ได้ชมวิวทิวทัศน์\nกับคุณครูแบบนี้ค่ะ"
16019-750 = "ฉันชอบการที่\nฉันส่งต่อความรู้สึก\nที่มีต่อคุณครูได้ค่ะ"
16019-760 = "ช่วงเวลานี้\nมีอยู่จริงแค่ใน\nปัจจุบันขณะเท่านั้นค่ะ"
16019-770 = "อีกอย่าง\nมันก็คงไม่กลับมาอีกแล้วค่ะ"
16019-780 = "คุณครู"
16019-790 = "ถ้า 'ช่วงเวลาสุดท้าย'\nมาถึงในตอนนี้"
16019-800 = "ฉันขอเป็น 'คนสุดท้าย'\nที่จะอยู่ในช่วงเวลานี้"
16019-810 = "ข้างๆ กับคุณครู\nได้มั้ยคะ?"
16019-2600 = "การเปลี่ยนอาวุธเป็นเรื่องที่ต้องตัดสินใจ\nมากกว่าที่คิดค่ะ เหมือนกับการเปลี่ยน\nมื้อเช้าจากโทสต์เป็นแพนเค้กเลยค่ะ\nแต่ถ้าเป็นสิ่งที่ได้รับจากคุณครู\nเรื่องราวก็คงต่างออกไปนิดหน่อยนะคะ"
