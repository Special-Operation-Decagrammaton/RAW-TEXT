[translation]
20059-10 = "블루 아카이브! 쿠후훗!"
20059-20 = "쿠후훗, 무츠키 쨩 대변~신!\n자, 뭐가 필요해? 뭐든 말해보라구!"
20059-30 = "여기서 모두랑\n드레스 파티\n하고 싶다~"
20059-40 = "쿠후후,\n이게\n선생님 취향인 거지?"
20059-50 = "누가\n놀아주지 않으려나~?"
20059-60 = "어라, 살짝 만져주면\n재밌을 것 같아♪"
20059-70 = "역시 여긴 즐거워!\n이유는 모르겠지만!"
20059-80 = "어서 와, 선생님!"
20059-90 = "드레스 차림의 귀여운\n무츠키 쨩을 기다리게 하다니,"
20059-100 = "팔자가 좋으시군요?"
20059-110 = "이쪽이야 이쪽!\n오늘은 뭐 하고 놀까?"
20059-120 = "어때? 이렇게 입으니까\n성숙한 느낌이 들어?"
20059-130 = "쿠후후, 솔직히 말해도 돼."
20059-140 = "오늘의 난\n평소보다 어른스러우니까."
20059-150 = "문제입니다~!\n왜 무츠키 쨩은\n드레스를 입고 있을까요!"
20059-160 = "알아맞히면\n특별한 선물을 줄게♪"
20059-170 = "틀리면,"
20059-180 = "벌칙으로\n내 의자가 되는 거야♪"
20059-190 = "오늘은 평소보다\n어른스럽게 놀아볼까?"
20059-200 = "놀이 선택은 선생님한테 맡길게."
20059-210 = "이렇게 입고 다니니까,\n누가 나한테 아가씨라 하더라."
20059-220 = "쿠후후, 선생님도\n아가씨 불러봐. 듣고 싶어."
20059-230 = "이 옷, 흥신소의\n모두랑 같이 고른 거야."
20059-240 = "아껴 입어야지.\n특별한 추억이 담겨 있으니까."
20059-250 = "선생님. 오늘 생일이지?"
20059-260 = "그럼 파티하자! 파티♪"
20059-270 = "아하핫!\n생일 축하 고마워, 선생님♪"
20059-280 = "그 보답으로 드레스를 입어봤어.\n어때? 좋아?"
20059-290 = "선생님, 복 많이 받아~\n올해는\n즐거운 한 해가 됐으면 좋겠네♪"
20059-300 = "선생님도 그렇게 생각하지?\n그렇지?"
20059-310 = "크리스마스에 입는 드레스는\n어떤 의미일까?"
20059-320 = "궁금하면 같이 알아볼래?\n쿠후후."
20059-330 = "선생님.\n이 드레스가 붉은 이유……\n알고 있어?"
20059-340 = "그건 바로\n피가 튀어도\n티가 나지 않으니까……"
20059-350 = "……는 장난이야!\n아하핫! 속았지?"
20059-370 = "있지? 나 이래 봬도"
20059-380 = "꽤 신뢰하고 있다고?\n선생님 말야."
20059-390 = "에, 의외?"
20059-400 = "언제나\n장난만 치고 있으니까?"
20059-410 = "쿠후후.\n나라고 아무한테나\n이러는 건 아니라고."
20059-420 = "뭐, 그러니까……\n그 돈을 어떻게 할 건지는\n맡길게."
20059-430 = "선생님이라면\n분명 의미 있는 곳에\n잘 써줄 테니까."
20059-440 = "어딘가 기부를 해도 좋고,"
20059-450 = "선생님 활동 자금으로\n써도 좋아."
20059-460 = "그것도 싫다면,\n선생님이\n계속 갖고 있는 걸로 하자."
20059-470 = "우리의 미래를 위해\n아껴두는 것도, \n괜찮잖아?"
20059-480 = "응? 그게 무슨 뜻이냐고?"
20059-490 = "쿠후훗! 글쎄?"
20059-500 = "무슨 의미일까나♪"
20059-2600 = "응♪ 기다리고 있었어!\n나는 이 손맛이 좋거든!"
