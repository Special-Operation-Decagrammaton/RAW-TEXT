[translation]
10054-10 = "Blue Archive!"
10054-20 = "ฝึกฝนร่างกายให้สดใส\nเพื่อฝึกฝนจิตใจให้บริสุทธิ์...\nขอให้พรคุ้มครองคุณค่ะ..."
10054-30 = "ว้าว... ที่นี่\nสวยจังเลยค่ะ"
10054-40 = "มีใครที่ต้องการ...\nความช่วยเหลือมั้ยคะ?"
10054-50 = "มาพักกันสักหน่อย\nแล้วค่อยไปกันดีมั้ยคะ?"
10054-60 = "รู้สึกเหมือนร่างกาย\nเบากว่าปกติเลยค่ะ\n..."
10054-70 = "ฮิฮิ..."
10054-80 = "มาแล้วเหรอคะคุณครู!"
10054-90 = "ฉันจะสวดภาวนา\nให้วันนี้เป็นวันที่ดีของคุณครูค่ะ"
10054-100 = "เชิญเลยค่ะคุณครู"
10054-110 = "ฉันเตรียมน้ำดื่มเย็นๆ ไว้ให้แล้วค่ะ"
10054-120 = "ถ้าคุณครูสะดวก\nสนใจดื่มสักหน่อยมั้ยคะ?"
10054-130 = "วันนี้ฉันมาทำหน้าที่นี้"
10054-140 = "ไม่ใช่ในฐานะซิสเตอร์\nแต่ในฐานะนักกีฬาคนหนึ่งค่ะ"
10054-150 = "หรือเป็นเพราะไม่ได้\nใส่ชุดซิสเตอร์กันนะ..."
10054-160 = "เลยรู้สึกกระวนกระวายใจนิดหน่อยค่ะ"
10054-170 = "คุณครู..."
10054-180 = "ถ้าคุณครูสะดวกละก็...\nช่วยอยู่ข้างๆ ฉันหน่อยได้มั้ยคะ?"
10054-190 = "ขอให้พรคุ้มครอง...\nคุณครูด้วยเถอะ"
10054-200 = "การสวดอธิษฐาน\nไม่เกี่ยวกับชุดที่ใส่หรอกค่ะ"
10054-210 = "ชุดนี้มันเผยสัดส่วน\nมากกว่าชุดที่ใส่ปกติ..."
10054-220 = "ก็เลยค่อนข้าง\nเขินๆ นิดหน่อยน่ะค่ะ..."
10054-230 = "สุขสันต์วันเกิดค่ะคุณครู!"
10054-240 = "คุณครูมีของขวัญที่อยากได้\nอยู่รึเปล่าคะ?"
10054-250 = "ฮะ... แฮปปี้เบิร์ธเดย์...?\nวันเกิดฉัน... งั้นเหรอคะ?"
10054-260 = "ว้าว...\nขะ... ขอบคุณมากค่ะ...!"
10054-270 = "ขอให้มีความสุขในวันปีใหม่ค่ะ\nคุณครู!"
10054-280 = "ปีนี้เราก็มาออกกำลังกาย\nด้วยกันดีมั้ยคะ?"
10054-290 = "คืนนี้เป็นคืนศักดิ์สิทธิ์ค่ะ"
10054-300 = "ถ้าคุณครูสะดวกละก็\nมาสวดอธิษฐานด้วยกันมั้ยคะ?"
10054-310 = "วันแห่งความวุ่นวายสินะคะ"
10054-320 = "แต่ไม่รู้ทำไมฉันถึง\nรู้สึกสนุกไปด้วยค่ะ"
10054-340 = "แฮ่ก... แฮ่ก...\nขอโทษค่ะคุณครู..."
10054-350 = "ฉันไม่ได้... ฮู่ว..."
10054-360 = "อยากให้คุณครูเห็นสภาพแบบนี้เลย..."
10054-370 = "ขอโทษนะคะ...\nก่อนอื่นต้องทำให้ใจเย็นๆ ก่อน..."
10054-380 = "ฮู่ว... ฮู่ว..."
10054-390 = "คะ...!? คือว่าที่จริง\nฉันไม่ได้หมายถึงแบบนั้น...!"
10054-400 = "คะ... แค่คุณครูอยากช่วย\nฉันก็รู้สึกขอบคุณมากแล้วค่ะ..."
10054-410 = "ค่ะ..."
10054-420 = "(คุณครู...\nเป็นห่วงฉันงั้นเหรอ...)"
10054-430 = "(ฉันไม่เคยคิด\nเรื่องแบบนี้มาก่อนเลย)"
10054-440 = "คือ..."
10054-450 = "เรื่องพวกนี้ ฉันไม่รู้\nว่าควรบอกคุณครูดีรึเปล่า.."
10054-460 = "มันเหมือน...\nฉันยึดคุณครูเอาไว้คนเดียว..."
10054-470 = "แบบนี้อาจถูกพระเจ้าลงโทษ\nก็ได้นะคะ แต่ว่า..."
10054-480 = "ตอนนี้ ฉันน่ะ...\nมีความสุขมากๆ เลยค่ะ!"
10054-2600 = "ขอให้อาวุธเล็กๆ อันนี้\nนำมาซึ่งความสงบสุข\nเหมือนกับปืนที่ให้สัญญาณออกวิ่ง..."
