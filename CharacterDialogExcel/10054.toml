[translation]
10054-10 = "Blue Archive!"
10054-20 = "The path to a sound mind begins with a sound body... May that path be lined with blessings."
10054-30 = "Wow... What a fantastic place."
10054-40 = "Do you think there might be...someone in need?"
10054-50 = "Shall we take a quick rest?"
10054-60 = "My body feels lighter than usual..."
10054-70 = "Heehee."
10054-80 = "You came, Sensei!"
10054-90 = "I hope your day will be a wonderful one."
10054-100 = "Welcome, Sensei."
10054-110 = "I've prepared some cool, refreshing water for you."
10054-120 = "Would you like some?"
10054-130 = "Today, I won't be acting as a Sister..."
10054-140 = "Rather, I will be acting as an athlete."
10054-150 = "Maybe it's because I'm not wearing my Sister's habit..."
10054-160 = "But I can't help but feel a bit awkward."
10054-170 = "Sensei..."
10054-180 = "If it's okay with you, could I stay with you a while?"
10054-190 = "Blessings be upon you, Sensei..."
10054-200 = "You can always pray regardless of your outfit!"
10054-210 = "This outfit is a little more revealing than I'm used to..."
10054-220 = "I admit, I'm a little embarrassed..."
10054-230 = "Happy birthday, Sensei!"
10054-240 = "Is there anything you desire today?"
10054-250 = "B-Birthday...? You remembered...?"
10054-260 = "I-I'm... Th-Thank you...!"
10054-270 = "Happy New Year, Sensei!"
10054-280 = "Should working out more together be our shared resolution?"
10054-290 = "A truly holy night."
10054-300 = "If you're comfortable with it, would you like to join me in prayer?"
10054-310 = "What a busy, boisterous day."
10054-320 = "I can't help but be in good spirits."
10054-340 = "*huff* *puff* I'm so sorry, Sensei..."
10054-350 = "I-I didn't want...you to..."
10054-360 = "...see me...like this..."
10054-370 = "Sorry. First... I just need to catch my breath."
10054-380 = "*inhale* *exhale*"
10054-390 = "Pardon? Oh dear, you don't need to worry about me...!"
10054-400 = "Th-Thank you so much. I appreciate your concern..."
10054-410 = "Right..."
10054-420 = "(To see that Sensei would get so worried about me...)"
10054-430 = "(I... I never would have even dreamed of this...)"
10054-440 = "I... Uh..."
10054-450 = "I hope you'll forgive me for saying this, but..."
10054-460 = "I feel like I've had you all to myself lately, Sensei..."
10054-470 = "I'm not sure if it's a sin, but..."
10054-480 = "Spending time with you...makes me so happy!"
10054-2600 = "Like a starting pistol going off at the beginning of an event, I pray this weapon will be used to bring about joy..."
