[translation]
10145-10 = "블루 아카이브, 로구나. 후우……"
10145-20 = "후우…… 햇볓이 강하구나.\n자, 선생. 이쪽으로……"
10145-30 = "흐음, 신기한\n기온이로구나……"
10145-40 = "호오, 저것은……?\n흥미롭구나."
10145-50 = "이 또한 휴식이겠지.\n좋구나."
10145-60 = "(잠시 몸을 눕힐\n곳이 있을까……?)"
10145-70 = "우유를 탄 커피……\n마음에 들었지만,\n사야가 주의하라 하였지……"
10145-80 = "어서 오거라, 선생."
10145-90 = "왜 그러는가? 이 수영복 말인가?"
10145-100 = "선생을 위한 서비스,\n같은 것이다. 후후."
10145-110 = "아, 선생이구나."
10145-120 = "이곳은 언제나 쾌적하구나.\n이것도 업무 효율을\n올리기 위함인가?"
10145-130 = "이렇게 수영복을 입고 있어도"
10145-140 = "크게 문제는 없다는 뜻이다.\n후후."
10145-150 = "지금 바라는 것 말인가?"
10145-160 = "흐음……"
10145-170 = "……둘이서 이대로,\n어디론가 떠나는 건 어떤가?"
10145-180 = "그대와 나 단둘이서, 말이다.\n물론, 피서로."
10145-190 = "혹시 내가 오늘 이 복장 그대로\n하룻밤 신세를 진다고 한다면"
10145-200 = "그대는…… 어떻게 하겠는가?"
10145-210 = "후후. 그렇게 놀라지 말거라.\n농담이다."
10145-220 = "아직은, 말이지."
10145-230 = "아~아. 무언가,\n현기증이 올라오는 것 같구나."
10145-240 = "선생이 나를 무릎에 앉히고\n쓰다듬어 준다면,"
10145-250 = "심신이 안정되어 훨씬\n나아질 것 같은데."
10145-260 = "……못 들은 척하지 말거라."
10145-270 = "항상 긴장하는 것은,\n몸에 좋지 않은 법."
10145-280 = "사람은 쉬지 않으면\n고장 나는 법이고. 그렇다면……"
10145-290 = "선생님! 키키는 이제\n선생님과 쉬고 싶어요!"
10145-300 = "……그렇다는 것이다."
10145-310 = "여름의 열기는\n생명을 불어넣어 주지만."
10145-320 = "그것이 과하면 그 나름대로\n문제가 되는 법이지."
10145-330 = "그러니 선생이 나의 열기를 \n식혀 주었으면 하는 것이다."
10145-340 = "……무슨 생각을 하였느냐? \n나는 부채질을 뜻한 것이었지만?"
10145-350 = "무엇이든, 이라는 표현에는\n주의하라는 말이 있지."
10145-360 = "하지만 나는 오늘 하루만큼은 \n그대에게 '무엇이든'\n해 주고 싶은 심정이다."
10145-370 = "그도 그럴 것이,\n선생의 생일이지 않은가."
10145-380 = "자아, 무엇을 원하느냐?"
10145-390 = "선생의 배려에는\n언제나 고마움을 느낄 뿐이다."
10145-400 = "일반적으로 사제 관계의\n축하라는 것은"
10145-410 = "나름의 선과 법도를\n지켜야 하는 법이겠으나……"
10145-420 = "허나, 나는 까다로운\n편은 아니니.\n좋을 대로 하거라."
10145-430 = "새해로구나."
10145-440 = "가까운 사이일수록 오히려 \n예의를 잊지\n말아야 한다고 하지."
10145-450 = "새해의 복이 언제나\n넘쳐나기를 바란다."
10145-460 = "그래. 크리스마스로구나."
10145-470 = "착한 아이에게 선물을,\n그렇지 못한 아이에게\n석탄을…… 이었던가."
10145-480 = "키키는 올해 착한 아이였죠?\n선생님은 어떻게 생각하세요?"
10145-490 = "……착한 아이, 였단 말이다."
10145-500 = "할로윈…… 어떤 의미로는\n괴력난신의 날인가."
10145-510 = "수영복 때문인지\n다른 이유 때문인지,\n조금 으슬으슬한 것 같구나."
10145-520 = "오늘은 나를 옆에 두고 \n일하는 것도, 좋아 보인다만?"
10145-540 = "어떤가, 선생."
10145-550 = "그토록 다채로웠던 풍경이,\n이렇게."
10145-560 = "으음, 정갈해졌구나."
10145-570 = "강과 물, 안개와 산봉우리……"
10145-580 = "그리고 선생만이,\n내 눈에는 들어올 뿐이다."
10145-590 = "그대의 눈에는\n무엇이 비치고 있는가?"
10145-600 = "나와 같이, 이 풍경 중에서."
10145-610 = "오롯이 나만이,\n그대의 눈에 새겨지고 있는가?"
10145-620 = "후훗…… 이러한 일화를\n들어본 적 있느냐?\n"
10145-630 = "선녀는 바람을 타고……\n깃털처럼,\n하늘을 춤춘다고 하지."
10145-640 = "자,\n숨을 들이쉬어 보거라, 선생."
10145-650 = "어쩌면 그 안에, 조금이라도."
10145-660 = "나를 느낄 수 있을지\n모르는 일이니까."
10145-2600 = "선생은 여기에 깃든 것이\n무엇이라고 생각하는가?\n나는…… 우리 둘 사이의 \n변치 않는 인연이라고 생각하고 있다."
