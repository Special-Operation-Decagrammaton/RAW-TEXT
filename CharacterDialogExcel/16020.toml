[translation]
16020-10 = "블루 아카이브!"
16020-20 = "오우, 잘 지냈어?\n제대로 인사하는 건 처음이려나.\nFOX 소대의 저격수, 텐진야마 오토기야.\n앞으로 잘 부탁할게, 선생님."
16020-30 = "(졸려… 커피 한잔\n마시고 싶네…)"
16020-40 = "……좋아!\n막간을 이용해서\n근력 운동이나 할까?"
16020-50 = "오우, 다들 \n기합이 넘치는걸?"
16020-60 = "(교정국에서\n본 녀석이 있는 것 \n같은데…)"
16020-70 = "오, 후루젤리의 \n신상 굿즈.\n일단 찍어둘까."
16020-80 = "오우, 어서 와. 선생님.\n그래서, 오늘은 무슨 일을\n 하면 되는 거야?"
16020-90 = "쉿, 선생님. 조용히 들어와.\n저기, 나비가 앉아 있어."
16020-100 = "스나이퍼인 만큼, \n관찰력은 누구보다 뛰어나다고 \n자부하고 있거든.\n"
16020-110 = "그래, 예를 들자면……"
16020-120 = "그, 선생님……\n말하기 좀 그렇긴 한데……"
16020-130 = "아래, 지퍼 열린 것 같아."
16020-140 = "으으, 어깨 결려……\n선생님, 어깨 좀 주물러 줄래?"
16020-150 = "정말로 아파서 \n부탁하는 거니까~"
16020-160 = "부탁할게!"
16020-170 = "SRT에 들어오기 전에는 \n다니고 있던 자치구의 \n학원에 진학해서 선도부원이라도\n 할까, 생각했었는데……"
16020-180 = "특이한 학원이었지……"
16020-190 = "거기서는 결투로 부장을 정하는 \n이상한 로컬 룰이 \n있었던 것 같아."
16020-200 = "FOX 3…… \n쿠루미는 포인트맨이면서\n 너무 걱정이 많다니까."
16020-210 = "……쿠루미의 뒤는 \n내가 언제나 똑똑히 \n지켜보고 있는데."
16020-220 = "가끔…… 교정국에서 주던 \n슴슴한 쿠페빵이 \n그리울 때가 있단 말이지."
16020-230 = "그거, 따로 주문할 수 있나?"
16020-240 = "생일 축하해, 선생님."
16020-250 = "선생님의 오늘 하루가 평화로울 \n수 있도록 노력할 테니까.\n우리에게 맡겨줘."
16020-260 = "생일? 이렇게 챙겨주지 \n않아도 괜찮은데……"
16020-270 = "그래도…… 말해줘서 고마워."
16020-280 = "새해 복 많이 받아, 선생님."
16020-290 = "올해는…… SRT 학원으로 \n돌아갈 수 있으려나."
16020-300 = "크리스마스에는 \n좋은 기억이 없어……"
16020-310 = "지난 크리스마스 이브에는 누가 \n수면제를 넣은 쿠키를 식탁에 \n올려놔서…… "
16020-320 = "연휴 내내 꾸벅꾸벅\n 조는 바람에 기억이 거의 없어."
16020-330 = "그런 연휴는 더는 싫어~"
16020-340 = "할로윈인가…… \n코스프레한 사람이 잔뜩 있네."
16020-350 = "나는 평소에도 \n잠입 임무 때문에 \n자주 의상을 갈아입지만."
16020-360 = "그래도, 선생님의 요청이라면 \n갈아입어 줄 순 있는데."
16020-370 = "희망이라도 있어?"
16020-390 = "윽…… 쓰고 텁텁해……"
16020-400 = "오래 방치한 원두라 그런지 맛이 별로네."
16020-410 = "로망이라…… 그렇네."
16020-420 = "그 로망이 없었더라면, 여기까지 오지 못했을테니까."
16020-430 = "어릴 때, 비밀 기지가 갖고 싶었던 적은 없었어?"
16020-440 = "하지만 막상 실제로 만들어 보니 생각과 많이 다르더라고."
16020-450 = "좁고, 불편하고, 할 수 있는 것도 그다지 없고……"
16020-460 = "꿈꿔왔던 현실은 언제나 그런 모습이었던 것 같아."
16020-470 = "이상적인 어른의 모습도, SRT의 생활도."
16020-480 = "하지만 그 로망 덕분이었을까."
16020-490 = "현실의 불편함도 이제는 기묘한 풍미로 느껴져."
16020-500 = "선생님. 로망을 잔뜩 탄 싸구려 커피의 맛은 어때?"
16020-510 = "후훗.\n다시 한번, 나의 세계에 온 걸 환영해."
16020-2600 = "FOX 82식 대물저격총, 수령 완료.\n초장거리 저격이나 장애물을 격파할 때는 이만한 물건이 없지만……\n연달아 쏘다보면 어깨가 뻐근해진단 말이지."
