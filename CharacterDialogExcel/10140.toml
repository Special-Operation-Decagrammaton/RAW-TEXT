[translation]
10140-10 = "블루 아카이브."
10140-20 = "SRT 특수학원, FOX 소대의 포인트맨\n타카쿠라 쿠루미야. 선생님의 호위는 내게 맡겨줘.\n전력으로 지킬 테니까. 그럼…… 잘 부탁해!"
10140-30 = "(저 총기 악세서리,\n귀엽네……\n어디서 산 걸까?)"
10140-40 = "(어쩐지…… 여기선 내가\n제일 어른스러울지도!)"
10140-50 = "깨끗이 닦인 창문이\n반짝거리는 게…\n마치 내 방패 같네."
10140-60 = "으윽, 근육통이……\n어제 훈련을\n너무 격하게 했나?"
10140-70 = "당당하게……\n가슴을 펴고……\n나는 베테랑이니까!"
10140-80 = "어라? 어서 와, 선생님.\n오늘은 기분이 좋아 보이네.\n무슨 일이라도 있어?"
10140-90 = "기다리고 있었어, 선생님."
10140-100 = "오늘은 무슨 작전을\n수행하면 될까?"
10140-110 = "후후, 좀 더 나를\n의지해 줘도 괜찮아."
10140-120 = "SRT의 엘리트니까,\n뭐든지 해낼 수 있거든!"
10140-130 = "으음………."
10140-140 = "응?! 아, 아무것도 아니야!"
10140-150 = "아니, 딱히 문제가\n있는 건 아니고……"
10140-160 = "그냥…… 일에 열중하는\n어른은 멋있구나, 싶어서."
10140-170 = "……웃지 마! 부끄러우니까!"
10140-180 = "오늘은 날씨가 좋네……"
10140-190 = "끝나고 공원에\n후배들이나 보러 갈까."
10140-200 = "FOX 4— 오토기는 뭔가에\n몰두하면 주위는 조금도\n신경 쓰지 않는 것 같아."
10140-210 = "주변에서 폭탄이 터져도\n눈치채지 못할 정도거든."
10140-220 = "……뭐, 무슨 일이 생기면\n내가 먼저 달려갈 테지만."
10140-230 = "저기… 샬레에는 총학생회의\n임원들도 오는 거야?"
10140-240 = "그, 그게……\n아니, 별건 아닌데."
10140-250 = "이전에 습격했을 때 싸웠던\n임원이랑 마주치면,\n어색하니까……"
10140-260 = "생일 축하해, 선생님."
10140-270 = "그, 오늘은\n선물 준비를 못했는데……"
10140-280 = "……혹시 귀, 만질래?"
10140-290 = "내 생일……? "
10140-300 = "어, 어떻게 선생님이\n그걸 알고 있는 거야?"
10140-310 = "전에 다른 사람에게 들었다고?\n그렇구나……"
10140-320 = "제, 제법이잖아. 고, 고마워!"
10140-330 = "새해 복 많이 받아, 선생님."
10140-340 = "조금 있다가 다른 소대원들이랑\n하네츠키 내기를 할 건데.\n선생님도 같이 참가할래?"
10140-350 = "크리스마스 시즌은 참 좋지~\n온 동네가 반짝반짝거려서~"
10140-360 = "……훈련만 없었으면\n더 좋았을 텐데."
10140-370 = "다들 축제라고\n너무 들뜬 거 아냐?"
10140-380 = "이런 날일수록 범죄가 일어나기\n쉬우니까 더 주의해야지."
10140-390 = "……응? 입가에?"
10140-400 = "시, 시식 때문에 호박 스프를\n맛본 것 뿐이거든?"
10140-420 = "뭐, 뭐야? 선생님, 언제 왔어?"
10140-430 = "따, 딱히 긴장 같은 거\n하지 않았거든!"
10140-440 = "나는 그저……\n타이밍을 재는 게\n조금 어려워서……"
10140-450 = "<여기 보세요—>"
10140-460 = "<하나, 둘, 셋.>"
10140-470 = "아, 아핫."
10140-480 = "으윽…… 또 눈을 감아 버렸어."
10140-490 = "누가 숫자를 세면\n이상하게 긴장이 되어서—"
10140-500 = "아, 아니. 긴장한 게 아니라!\n자꾸 무의식적으로\n눈을 감아서—"
10140-510 = "<여기 보세요—>"
10140-520 = "온다……!"
10140-530 = "<하나, 둘, 셋.>"
10140-540 = "아핫."
10140-550 = "그러니까! 왜 자꾸\n눈을 감아버리는 거냐고!"
10140-2600 = "FOX 45식 기관단총 수령 완료.\n조금 더 화력이 강했으면 좋겠지만……\n뭐, 내 역할은 소대를 지키는 거지\n적을 쳐부수는 게 아니니까."
