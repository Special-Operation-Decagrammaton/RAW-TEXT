[translation]
10133-10 = "蔚藍檔案。"
10133-20 = "掌控電子領域最為合理的解答，\n我會展示給你看。"
10133-30 = "這裡也是概念空間的\n一種……需要分析呢。"
10133-40 = "希望能變得\n擅長整理……"
10133-50 = "……看來，老師的感性\n和我很接近呢。"
10133-60 = "如果做了「前衛君\nType.女僕」的話，\n就放在這裡吧。"
10133-70 = "盡可能……\n愛惜地使用吧。"
10133-80 = "我正在等你，老師。"
10133-90 = "我會為你提供\n高效率的業務支援。\n很合理吧？"
10133-100 = "要開始工作了呢。\n有什麼事儘管說。"
10133-110 = "有一種說法是……\n時間並沒有在流動。"
10133-120 = "也就是過去、現在、未來\n全都存在於同一個瞬間。"
10133-130 = "如果按照那個理論……"
10133-140 = "現在也依然處於那場\n大事件的漩渦之中呢。"
10133-150 = "老實說，我對你\nPC的內容很感興趣。"
10133-160 = "有了這套戰鬥服，\n老師的裝置這種程度，\n輕易就能駭入。"
10133-170 = "……放心吧。\n那種做法……\n我並不喜歡。"
10133-180 = "在可觀測世界的彼端，\n究竟有什麼呢。"
10133-190 = "我想知道那個答案。"
10133-200 = "……和你一起。"
10133-210 = "要是也有為老師準備\n戰鬥服就好了呢。"
10133-220 = "那樣的話，就能一起\n享受概念空間了。"
10133-230 = "……在現實中\n像這樣出門就好？"
10133-240 = "這副打扮是不行的。"
10133-250 = "重力是無處不在的。"
10133-260 = "……沒錯，在你和我之間也是。"
10133-270 = "我們都正在無意識地，\n朝著彼此的方向墜落。"
10133-280 = "生日快樂，老師。"
10133-290 = "作為禮物，\n我準備了業務支援\n特化型的前衛君。"
10133-300 = "……咦？支援的話\n想從我這裡直接得到……？"
10133-310 = "那，那樣……有點困擾……"
10133-320 = "啊啊，今天……\n是我的生日呢。"
10133-330 = "因為專注於任務，\n所以忘記了。"
10133-340 = "一旦專注於某件事……\n就會無暇顧及其他事情。"
10133-350 = "託老師的福，\n留下了美好的回憶。\n謝謝。"
10133-360 = "老師，新年快樂。"
10133-370 = "新年應該有適合的服裝吧？"
10133-380 = "……這樣沒問題嗎。"
10133-390 = "非常歡迎……？\n那……那就好。"
10133-400 = "今天，似乎是慶祝\n某個人誕生的日子呢。"
10133-410 = "雖然我不太理解\n那類的事情……"
10133-420 = "不過對於創造了\n這段時光這點……\n我要表示感謝。"
10133-430 = "幽靈？我並不相信。"
10133-440 = "無法與重力或電磁力\n產生相互作用的存在，"
10133-450 = "是無法被我們的眼睛\n給捕捉到的。"
10133-460 = "……不太明白？為什麼？"
10133-480 = "呼……涼快多了。"
10133-490 = "我沒有考慮到\n室內溫度。"
10133-500 = "我也真是的……\n似乎是被眼前的結果\n分散了注意力……"
10133-510 = "……讓我稍微，休息一下吧。"
10133-520 = "因為太熱，思考不是很……"
10133-530 = "……老師？\n為什麼露出\n那種表情……"
10133-540 = "……啊！！"
10133-550 = "（我，我……做了\n　什麼……！？)"
10133-560 = "這，這不是故意的……！\n對不起……！"
10133-570 = "我，我已經，沒事了……！"
10133-2600 = "要守護所有人……\n這股強烈的意志，\n能促使我扣下扳機。"
