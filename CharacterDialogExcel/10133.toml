[translation]
10133-10 = "Blue Archive"
10133-20 = "คำตอบที่สมเหตุสมผลที่ก้าวถึงระดับอิเล็กทรอนิกส์\nฉันจะแสดงให้คุณเห็นเอง"
10133-30 = "ที่นี่ก็เป็นพื้นที่เชิง\nมโนทัศน์อย่างหนึ่ง...\nต้องวิเคราะห์แล้วละ"
10133-40 = "ถ้าฉันจัดข้าวของ\nเป็นระเบียบแบบนี้\nบ้างละก็..."
10133-50 = "จะว่าไป...\nเซนส์ของคุณครูก็ดูจะ\nคล้ายๆ กับของฉันนะ"
10133-60 = "ถ้าสร้างเมดในรูปแบบ\nหุ่นรบล้ำยุคได้\nเอามาไว้ที่นี่ดีมั้ยนะ?"
10133-70 = "มาใช้งานให้...\nสะอาดสะอ้าน\nที่สุดกันเถอะ"
10133-80 = "กำลังรออยู่เลย ครู"
10133-90 = "ฉันจะช่วยซัพพอร์ตงาน\nอย่างมีประสิทธิภาพเลยละ\nสมเหตุสมผลดีใช่มั้ย?"
10133-100 = "เริ่มงานแล้วสินะ\nสั่งมาได้ทุกเรื่องเลย"
10133-110 = "มีเรื่องเล่าที่ว่า...\nเวลาไม่ได้ไหลผ่านไป"
10133-120 = "ทั้งอดีต ปัจจุบัน อนาคต\nทั้งหมดล้วนมีตัวตนในเวลาเดียวกัน"
10133-130 = "ตามทฤษฎีนั้นแล้ว ก็แปลว่า..."
10133-140 = "เวลาตอนนี้ก็อยู่ท่ามกลาง\nเหตุการณ์ใหญ่นั้นด้วยสินะ"
10133-150 = "ฉันละสงสัยจริงๆ\nใน PC ของคุณจะมีอะไรอยู่บ้างนะ"
10133-160 = "ถ้าอยู่ในชุดบอดี้สูทนี้\nก็น่าจะแฮ็ก PC ของครู\nได้ง่ายๆ เลยนะ"
10133-170 = "วางใจเถอะ...\nฉันไม่ชอบ...\nการใช้วิธีแบบนั้นหรอก"
10133-180 = "เลยโลกที่สังเกตได้ออกไป\nจะมีอะไรอยู่บ้างนะ?"
10133-190 = "ฉันอยากรู้คำตอบนั้น"
10133-200 = "พร้อมกันกับคุณด้วย..."
10133-210 = "ถ้าเตรียมชุดไว้ให้ครูด้วย\nก็คงจะดีนะ"
10133-220 = "แบบนั้นก็คงสนุกกับพื้นที่\nเชิงมโนทัศน์ด้วยกันได้"
10133-230 = "จะออกไปทั้งอย่างนี้...\nในโลกแห่งความจริงก็ได้งั้นเหรอ?"
10133-240 = "ถ้าอยู่ในชุดนี้ ไม่ได้หรอก"
10133-250 = "แรงโน้มถ่วงมีอยู่ทุกที่เลยละ"
10133-260 = "ระหว่างคุณกับฉันก็มีเหมือนกัน"
10133-270 = "เรากำลังร่วงหล่นไปหากัน...\nโดยที่ไม่รู้ตัวน่ะ"
10133-280 = "สุขสันต์วันเกิดนะครู"
10133-290 = "ฉันเตรียมของขวัญมาให้\nเป็นหุ่นรบล้ำยุคช่วยงานน่ะ"
10133-300 = "หืม...? อยากให้ฉันมาช่วยงาน\nโดยตรงมากกว่างั้นเหรอ...?"
10133-310 = "บะ... แบบนั้น... ไม่ได้หรอก..."
10133-320 = "วันนี้... เป็นวันเกิดของฉันสินะ"
10133-330 = "ฉันง่วนอยู่กับงาน\nจนลืมไปเลย"
10133-340 = "ฉันเป็นพวกที่ถ้าจดจ่อกับอะไร...\nก็จะไม่สนใจสิ่งอื่นเลยละ"
10133-350 = "ครูทำให้ฉันมีความทรงจำ\nที่ดีเลยละ ขอบคุณนะ"
10133-360 = "ครู สวัสดีปีใหม่นะ"
10133-370 = "วันปีใหม่จะมีชุดที่\nเข้ากันอยู่ใช่มั้ยล่ะ?"
10133-380 = "แบบนี้จะได้มั้ยนะ..."
10133-390 = "ต้อนรับอย่างอบอุ่นเลย...?\nถ้างั้นก็... โล่งอกไปทีนะ"
10133-400 = "เห็นว่าวันนี้คือวันเฉลิมฉลอง\nการเกิดของใครบางคนน่ะ"
10133-410 = "ฉันไม่ค่อยเข้าใจเรื่องแบบนั้นเท่าไร"
10133-420 = "แต่ก็อยากขอบคุณที่...\nช่วยสร้างช่วงเวลานี้ขึ้นมานะ"
10133-430 = "วิญญาณเหรอ? ฉันไม่เชื่อหรอก"
10133-440 = "วิญญาณไม่แสดงปฏิกิริยาต่อ\nแรงโน้มถ่วงและแรงแม่เหล็กไฟฟ้า"
10133-450 = "การที่เรามองเห็นมันได้ด้วยตา\nเป็นเรื่องเหลวไหลชัดๆ"
10133-460 = "หืม...? ไม่เข้าใจงั้นเหรอ?\nทำไมล่ะ?"
10133-480 = "ฮู่ว... ตอนนี้ค่อยยังชั่วแล้วละ"
10133-490 = "ฉันลืมนึกถึงอุณหภูมิห้องไปน่ะสิ"
10133-500 = "สงสัยฉันคง... เผลอใจลอย\nไปกับผลลัพธ์ตรงหน้าน่ะ..."
10133-510 = "ขอฉันพักหน่อยนะ..."
10133-520 = "ฉันร้อนจนคิดอะไรไม่ค่อยออกเลย..."
10133-530 = "ครู...? ทำไมถึงทำหน้าแบบนั้นล่ะ..."
10133-540 = "อ๊ะ...!!"
10133-550 = "(นะ... นี่ฉัน... ทำอะไรลงไป...!?)"
10133-560 = "ฉะ... ฉันไม่ได้ตั้งใจนะ...!\nขอโทษ...!"
10133-570 = "ฉัน... ตอนนี้ฉัน... ไม่เป็นไรแล้วละ...!"
10133-2600 = "ต้องปกป้องทุกคนให้ได้...\nเจตจำนงอันแรงกล้านั้น\nทำให้ฉันเหนี่ยวไกปืน"
