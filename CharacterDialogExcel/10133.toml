[translation]
10133-10 = "Blue Archive."
10133-20 = "A logical solution within the realm of electrons... Allow me to demonstrate."
10133-30 = "This place is a type of conceptual space as well... I'll need to do more analysis."
10133-40 = "I wish I had these kinds of organizational skills."
10133-50 = "...Looking at this, it would seem you and I share similar tastes."
10133-60 = "If I ever make the Avant Guard: Maid Type, perhaps I'll station it here."
10133-70 = "Let's...keep things as clean as we can."
10133-80 = "I've been waiting, Sensei."
10133-90 = "I'll provide support in whatever task necessary. Quite rational, yes?"
10133-100 = "Let's begin working. Whatever you need, just name it."
10133-110 = "There's a story that says...that time does not flow around us."
10133-120 = "Rather, the past, present, and future all exist as one, within the same moment."
10133-130 = "Based on that theory..."
10133-140 = "Even now, we're still experiencing the day of that incident."
10133-150 = "I'm honestly curious. What's on your PC?"
10133-160 = "I'm sure I could easily hack into it with this suit."
10133-170 = "...Rest assured. I prefer not to employ...such methods."
10133-180 = "I wonder what lies beyond the observable realm."
10133-190 = "I wish to find that answer..."
10133-200 = "...Together with you."
10133-210 = "I wish we had made a suit for you as well, Sensei."
10133-220 = "Then you and I could've enjoyed conceptual space, together."
10133-230 = "...We can just escape reality?"
10133-240 = "Not like this."
10133-250 = "Gravity exists everywhere."
10133-260 = "Even between you and I."
10133-270 = "We're unconsciously...falling towards each other."
10133-280 = "Happy birthday, Sensei."
10133-290 = "Your gift is this Avant Guard: Task Support."
10133-300 = "...Hm? You'd rather receive my direct support?"
10133-310 = "Th-That's...troublesome..."
10133-320 = "Today...was my birthday."
10133-330 = "I was so carried away with my work that I forgot."
10133-340 = "I tend to get tunnel vision when I'm too focused on something."
10133-350 = "You've helped me make a good memory, Sensei. Thank you."
10133-360 = "Happy New Year, Sensei."
10133-370 = "What is the appropriate attire for the New Year?"
10133-380 = "...I hope this is okay."
10133-390 = "It's more than okay...? That's...good to hear."
10133-400 = "The say today is a day to celebrate someone's birth."
10133-410 = "I don't quite understand it..."
10133-420 = "However, I'm grateful...that I'm able to experience this moment."
10133-430 = "Ghosts? I don't believe in such things."
10133-440 = "Ghosts can't interact with gravity nor electromagnetic forces..."
10133-450 = "...so it's impossible for us to perceive them with our own eyes."
10133-460 = "...Hm? You don't understand? How so?"
10133-480 = "*sigh*... That feels much better."
10133-490 = "I forgot to consider the indoor temperature."
10133-500 = "I must have— I got too distracted chasing the results before me..."
10133-510 = "...Let me rest a little."
10133-520 = "I can't think properly because it's so hot..."
10133-530 = "...Sensei? Why are you looking at me like..."
10133-540 = "*gasp*!"
10133-550 = "(Wh-What was I...thinking...?!)"
10133-560 = "Th-This wasn't intentional...! I'm sorry...!"
10133-570 = "I-I'm okay now, so...!"
10133-2600 = "My determination to protect everyone... That gives me the strength to pull the trigger."
