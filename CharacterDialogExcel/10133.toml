[translation]
10133-10 = "블루 아카이브."
10133-20 = "전자의 영역까지 도달한 합리적인 해답.\n당신에게 보여줄게."
10133-30 = "이곳도 일종의\n개념 공간……\n분석이 필요해."
10133-40 = "나도 이렇게\n정리를 잘했으면……"
10133-50 = "……보아하니, 선생님의\n감성은 나와\n비슷한 것 같네."
10133-60 = "'아방가르드군 Type.\n메이드'를 만들면,\n이쪽에 놓을까."
10133-70 = "최대한……\n깨끗이 사용하자."
10133-80 = "기다리고 있었어, 선생."
10133-90 = "효율적인 업무 서포트를\n제공해 줄게. 합리적이지?"
10133-100 = "업무 시작이네.\n뭐든지 말만 해줘."
10133-110 = "시간은 흐르지 않는다……라는\n이야기가 있어."
10133-120 = "과거, 현재, 미래가 모두\n같은 순간에 존재한다는 거야."
10133-130 = "그 이론대로라면……"
10133-140 = "지금도, 그 큰 사건의\n가운데에 있다는 게 되네."
10133-150 = "솔직히 궁금해.\n당신의 PC엔 뭐가 있을까."
10133-160 = "이 슈트라면,\n선생의 PC 정도는\n쉽게 해킹할 수 있겠지."
10133-170 = "……안심해 줘.\n그런 방법은……\n선호하지 않으니까."
10133-180 = "관측 가능한 세계\n너머엔 무엇이 존재할까."
10133-190 = "나는 그 해답을 알고 싶어."
10133-200 = "……당신과 함께, 말이야."
10133-210 = "선생의 슈트도\n준비했으면 좋았을 텐데."
10133-220 = "그러면, 같이 개념 공간을\n즐길 수 있었을 거야."
10133-230 = "……현실에서 이대로\n나가면 된다고?"
10133-240 = "이 모습으로는 안 돼."
10133-250 = "중력은 어디에나 존재해."
10133-260 = "당신과 나 사이에서도."
10133-270 = "우리는 무의식적으로……\n서로에게 떨어지고 있는 거야."
10133-280 = "생일 축하해, 선생."
10133-290 = "선물로, 업무 보조용\n아방가르드 군을 준비했어."
10133-300 = "……응? 보조는 나한테서\n직접, 받고 싶다고……?"
10133-310 = "그, 그건…… 곤란해……."
10133-320 = "오늘이…… 내 생일이었구나."
10133-330 = "임무에 정신이\n팔려서 깜빡 잊었어."
10133-340 = "하나에 집중하면……\n다른 건 신경 못 쓰는 타입이라."
10133-350 = "선생 덕분에\n좋은 추억이 생겼어. 고마워."
10133-360 = "선생, 새해 복 많이 받아."
10133-370 = "설날에는 그에 맞는\n복장이 있지?"
10133-380 = "……이걸로 괜찮을까."
10133-390 = "대환영……?\n그렇다면…… 다행이고."
10133-400 = "오늘은 어떤 사람의\n탄생을 축하하는 날이라고 해."
10133-410 = "그런 건 잘 이해하지 못하지만,"
10133-420 = "이 시간을 만들어준 것에\n대해서는…… 감사해야겠네."
10133-430 = "유령? 난 믿지 않아."
10133-440 = "중력과 전자기력으로\n상호작용이 불가능한 유령이,"
10133-450 = "우리 눈에 보인다는 건\n말이 안 되니까."
10133-460 = "……응? 이해 못 하겠다고?\n어째서?"
10133-480 = "후우…… 이제 좀 살 것 같아."
10133-490 = "실내 온도를 고려하지 않았거든."
10133-500 = "나도 정말…… 눈앞의 결과에,\n정신이 팔렸던 모양이야……."
10133-510 = "……조금,\n쉬게 해줬으면 해."
10133-520 = "더위에, 사고가 제대로……."
10133-530 = "……선생? 왜 그런 얼굴로……."
10133-540 = "……아!!"
10133-550 = "(나, 나는…… 무엇을……!?)"
10133-560 = "이, 이건 고의가 아니야……!\n미안해……!"
10133-570 = "나, 나는 이제, 괜찮으니까……!"
10133-2600 = "모두를 지켜낸다…….\n그 강한 의지가\n방아쇠를 당기게 해."
