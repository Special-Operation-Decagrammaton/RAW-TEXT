[translation]
20051-10 = "Blue! Archive!!"
20051-20 = "มาแล้วค่ะ ฉันมาอีกแล้วค่ะ!\nครั้งนี้มาเป็นสาวน้อยเวทมนตร์อุซาวะ เรอิสะค่ะ!"
20051-30 = "วะ... วันนี้ก็...\nคนเยอะจังเลย..."
20051-40 = "ตะ... ต้องทำตัวเป็นปกติ\nให้มากที่สุด..."
20051-50 = "(อ๊ะ อันนั้นฉันก็รู้จักนะ!)"
20051-60 = "ทุกคนดูสนุกกันจังนะคะ!"
20051-70 = "(อ๊ะ... ที่นั่งของฉัน...)"
20051-80 = "ฮุฮุ มาสายนะคะ คุณครู\nไม่ค่ะ อย่าเสียใจไปสิคะ!"
20051-90 = "คนอยู่ข้างความยุติธรรม\nย่อมมาถึงเร็วกว่าใครอยู่แล้วค่ะ!"
20051-100 = "ช่วยลืมอุซาวะ เรอิสะ\nแห่งกลุ่มรักษาความสงบไปเถอะค่ะ..."
20051-110 = "ก็ฉันในวันนี้...\nคืออุซาวะ เรอิสะจากกลุ่ม\nรักษาความสงบซูพรีม เมจิคัลนี่คะ"
20051-120 = "ขอตอบรับการเรียกหาของคุณครู...!"
20051-130 = "เทอร์ไมต์ พิงค์\nมาปรากฏตัวที่นี่! แล้วค่ะ!"
20051-140 = "ถ้ากลุ่มรักษาความสงบมี\nยูนิฟอร์ม จะเป็นยังไงนะคะ!"
20051-150 = "ถ้าจะมี ก็อยากให้เป็น\nชุดเท่ๆ แบบนี้จังเลยค่ะ!"
20051-160 = "โบลต์ ฟอร์เวิร์ด!\nเทอร์ไมต์ พิงค์...!"
20051-170 = "อ๊ะ! คุณครู สวัสดีค่ะ!\nฉันกำลังฝึกท่องบทน่ะค่ะ..."
20051-180 = "คุณครูรู้จักประโยคดัง\nจาก 'สาวน้อยเวทมนตร์'\nภาค 3 ตอนที่ 4 มั้ยคะ?"
20051-190 = "'มิตรภาพและพลังเพลิง\nยิ่งร้อนแรงก็ยิ่งดี' ไงคะ!\nเป็นประโยคกินใจเลยละค่ะ!"
20051-200 = "รู้สึกอยากกินอะไรจังเลยค่ะ...\nจริงสิ!"
20051-210 = "ให้ฉันไปซื้อขนมปังมาให้มั้ยคะ?\nคุณครู!"
20051-220 = "คุณครู สุขสันต์วันเกิดค่ะ!"
20051-230 = "ถ้าฉันมีเวทมนตร์จริงๆ\nฉันก็อยากเสกมนตร์\nแห่งโชคดีให้นะคะ! แหะๆๆ"
20051-240 = "วันเกิดเหรอคะ? ของใครคะ?\nอ๊ะ! วันเกิดฉันเองสินะคะ!"
20051-250 = "ขอบคุณที่มาอวยพรให้ค่ะ!\nแหะๆ"
20051-260 = "คุณครู สวัสดีปีใหม่ค่ะ!\nขอให้ปีนี้เต็มไปด้วยความยุติธรรม!"
20051-270 = "เมจิคัล คริสต์มาส!"
20051-280 = "อ๊ะ! ไม่ใช่เมจิคัล แต่ต้องเป็นเมอร์รีค่ะ!"
20051-290 = "ทริก ออร์ เมจิค!\nแฮปปี้ฮาโลวีนค่ะ!"
20051-300 = "คอสเพลย์แม่มดงั้นเหรอคะ?\nไม่ใช่ค่ะ! สาวน้อยเวทมนตร์ต่างหากค่ะ!"
20051-310 = "แม่มดกับสาวน้อยเวทมนตร์\nต่างกันโดยสิ้นเชิงไม่ใช่เหรอคะ?"
20051-330 = "เซฟ!!"
20051-340 = "ฮุฮุ... สันติสุขของว่าว\nได้รับการปกป้องแล้วค่ะ!"
20051-350 = "ก็ฉันรับเอาไว้ได้!\nก่อนจะร่วงลงไปในแม่น้ำนี่คะ!"
20051-360 = "ถ้าเป็นการทำเพื่อทุกคนละก็\nกลุ่มรักษาความสงบจะไม่รีรอเลยค่ะ!"
20051-370 = "ไม่ว่าจะในกองไฟหรือในน้ำ\nไม่ว่าที่ไหน เราก็จะพุ่งเข้าใส่ค่ะ!"
20051-380 = "แหะๆๆ"
20051-390 = "นับแต่ยุคโบราณ ชุดของฮีโร่"
20051-400 = "ย่อมเปล่งประกาย\nในภารกิจของฮีโร่!"
20051-410 = "และชุดนี้ก็\nซักเครื่องได้ด้วยค่ะ!"
20051-420 = "นอกจากนี้... ฉันก็ได้\nเรียนรู้มาจากคุณครูว่า"
20051-430 = "ผู้ที่ไม่รีรอ\nจะปกป้องทุกคนได้ค่ะ!\nแหะๆๆ!"
20051-440 = "แหะๆ ฮะ... ฮะ...\nฮัดชิ้ว!!"
20051-450 = "ซื้ดด..."
20051-2600 = "คุณครูใจดีกับฉันตลอดเลยนะคะ...\nถ้าอยู่ด้วยกันแบบนี้ละก็...\nฉันรู้สึกว่าตัวเองจะแข็งแกร่งที่สุดเลยค่ะ...!"
