9009000-970 = "앗?!"
9009000-980 = "…히익?"
9009000-990 = "음냐. 딸기 우유는… 우히히."
9009000-1000 = "딸기 우유…?"
9009000-1010 = "이렇게 많이는 못먹어요…."
9009000-1020 = "선배. 슬슬 일어나야\n할 것 같습니다…."
9009000-1030 = "…우히히히히."
9009000-1040 = "음냐."
