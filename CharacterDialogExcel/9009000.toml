9009000-10 = "คุณครู [USERNAME] คะ!\nหนูกำลังรออยู่เลยค่ะ!"
9009000-20 = "มาเริ่มงานกันเถอะค่ะ!"
9009000-30 = "จะเริ่มจากงานไหนก่อนดีคะ\nคุณครูคะ?"
