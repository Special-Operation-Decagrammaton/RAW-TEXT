9009000-1060 = "진짜요…?"
9009000-1070 = "우, 우햣?"
9009000-1080 = "앗?!"
9009000-1090 = "…히익?"
9009000-1100 = "안녕하세요. 선생님.\n이곳에서는 과거의 추억을\n되돌아보실 수 있답니다."
9009000-1110 = "어서 오세요. 선생님.\n함께 지금까지의 추억을\n되짚어 보시겠어요?"
9009000-1120 = "생각해 보면,\n여러 가지 일이 있었네요……"
9009000-1130 = "선생님은 어떤 추억이\n가장 인상 깊으셨나요?"
9009000-1140 = "후후. 이렇게 되짚어보니\n즐거운 일뿐이네요."
9009000-1150 = "멋진 봄나들이가 될 수 있도록\n선생님을 위해 준비했어요!"
9009000-1160 = "봄나들이를 맞이해 특별히\n아로나가 준비한 선물이에요!"
9009000-1170 = "2.5 주년이네요!\n여기, 선생님을 위한 선물이에요!"
9009000-1180 = "2.5주년을 맞이해,\n아로나가 특별한 선물을 준비했습니다!"
9009000-1190 = "특별한 날을 기념하여\n아로나가 깜짝 선물을 준비했어요!"
9009000-1200 = "마음에 드셨으면 좋겠네요!"
9009000-1210 = "3rd 애니버서리를 기념하여\n특별한 선물을 준비했어요!"
9009000-1220 = "이쪽이에요!\n앞으로도 쭉 함께해요, 선생님!"
9009000-1230 = "3.5주년이에요!\n특별한 날을 위해\n특별한 선물을 준비했어요!"
9009000-1240 = "여기 있습니다, 선생님,\n앞으로도 쭉 함께 해주세요!"
9009000-1250 = "1, 2, 3, 4!\n벌써 케이크에 초가 네 개나!"
9009000-1260 = "4th 애니버서리를 기념하여\n특별한 선물도 준비했어요!\n여기 받아주세요!\n앞으로도 잘 부탁드립니다! 선생님!"
9009000-1270 = "4.5주년이에요! 앞으로도\n빛나는 순간들을 함께 만들어가요!"
9009000-1280 = "특별한 날, 특별한 선물!\n받아주세요, 선생님!"
9009000-1290 = "5주년이에요!\n지금까지의 추억보다 더 많은\n추억을 쌓을 때까지!"
9009000-1300 = "앞으로도 모두 함께예요!"
9009000-1310 = "어서 오세요, 선생님!\n출장 수고하셨습니다!"
9009000-1320 = "오랜만에\n샬레에서의 업무네요.\n아로나가 서포트 할게요!"
