9009000-1170 = "ครบรอบ 2 ปีครึ่งแล้วค่ะ!\nนี่คือของขวัญให้คุณครูค่ะ!"
9009000-1180 = "ครบรอบ 2 ปีครึ่งนี้\nหนูเตรียมของขวัญพิเศษไว้ให้ค่ะ!"
