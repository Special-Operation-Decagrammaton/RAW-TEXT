9009000-370 = "คุณครู [USERNAME] เชิญเลยค่ะ\nหนูกำลังรออยู่เลยค่ะ"
9009000-380 = " คุณครู [USERNAME] คะ!\nวันนี้ก็รบกวนด้วยนะคะ"
9009000-390 = "คุณครู [USERNAME]! กลับมาแล้วเหรอคะ\nรบกวนด้วยนะคะ!"
9009000-400 = "คุณครู [USERNAME]!\nยินดีต้อนรับกลับมาค่าาา♪"
9009000-410 = "อ๊ะ ส่วนอันนี้\nหนูเตรียมไว้ให้แล้วค่ะ"
9009000-420 = "อ๊ะ ส่วนอันนี้\nกำลังดำเนินการค่ะ!"
9009000-430 = "มีโบนัสพิเศษฉลองเปิด\nชมรมชั้นเรียนเสริมอยู่นะคะ!"
9009000-440 = "กิจกรรมฉลองเปิดชมรมชั้นเรียนเสริมค่า!"
9009000-450 = "ที่นี่คุณครูจะสามารถจัดการ\nคลาสต่างๆ ของโรงเรียนได้ค่ะ!"
9009000-460 = "คุณครู [USERNAME] คะ!\nตอนนี้มีคลาสและกิจกรรมต่างๆ เตรียมไว้แล้ว\nกรุณาเลือกคลาสที่ต้องการเข้าได้เลยค่ะ!"
9009000-470 = "วันนี้จะเริ่มจากคลาสอะไรดีคะ?"
9009000-480 = "คุณครู [USERNAME]!\nกรุณาเลือกคลาสได้เลยค่ะ!"
9009000-490 = "เข้าคลาส! คลาสพิเศษ! เวลาอิสระ!\nจะเลือกตารางเรียนไหนดีคะ?"
9009000-500 = "คุณครู [USERNAME] คะ!\nพยายามเข้านะคะ!"
9009000-510 = "งานของคุณครูคงจะเป็น\nเรื่องที่ยากมากเลยสินะคะ..."
9009000-590 = "วันนี้ร้อนสุดๆ เลย หนูมีโบนัส\nสุดพิเศษ มาให้คุณครูที่พยายาม\nอย่างหนักในการเข้าค่ายฤดูร้อนนะคะ!"
9009000-600 = "เรากำลังจัดกิจกรรมพิเศษ\nเพื่อระลึกถึงการเข้าค่ายฝึกฤดูร้อน\nของคณะกรรมการวินัยทุกคนอยู่ค่ะ!"
9009000-650 = "หนูเตรียมของขวัญ\nครบรอบ 1 ปีไว้ให้แล้วค่ะ!"
9009000-660 = "ครบรอบ 1 ปีแล้วนะคะคุณครู!\nของขวัญฉลองวันครบรอบของเราค่ะ!"
9009000-670 = "อ๊ะ ยังมีอีกค่ะ! หนูเตรียมเสบียงพิเศษ\nไว้ให้คุณครูแล้วด้วยค่ะ!"
9009000-680 = "ยังมีอีกอย่างหนึ่งนะคะ!\nนี่ค่ะ เสบียงพิเศษสำหรับคุณครูค่ะ!"
9009000-690 = "คุณครูสามารถรับวัตถุดิบสำหรับพัฒนา\nชนิดต่างๆ ผ่านทัวร์โรงเรียนได้นะคะ"
9009000-700 = "ลองเข้าร่วมทัวร์โรงเรียนต่างๆ\nแล้วรวบรวมวัตถุดิบสำหรับพัฒนาดูนะคะ"
9009000-710 = "คุณครู [USERNAME] คะ!\nพยายามเข้านะคะ!"
9009000-720 = "งานของคุณครูหนักมากขนาดนี้เลยเหรอคะ..."
9009000-730 = "หนูจะช่วยงานคุณครูเองค่ะ!"
9009000-740 = "ขอบคุณมากเลยนะคะ คุณครู! หนูเตรียม\nของขวัญพิเศษตอบแทนคุณครูไว้แล้วค่ะ!"
9009000-750 = "หนูคอยเป็นกำลังใจให้คุณครูอยู่นะคะ!\nนี่คือของขวัญพิเศษจากใจหนูค่ะ!"
9009000-760 = "ฉลองครบรอบ 1.5 ปี!!\nหนูมีของขวัญให้คุณครูด้วยค่ะ!"
9009000-770 = "คุณครูคะ! ของขวัญ\nฉลองครบรอบ 1.5 ปีค่ะ!"
9009000-780 = "หนูมีของที่เตรียมไว้เพื่อขอบคุณคุณครู\nที่ตั้งใจเตรียมงานฮาโลเฟสติวัลด้วยค่ะ!"
9009000-790 = "กิจกรรมพิเศษเพื่อฉลองเปิด\nงานฮาโลเฟสติวัลเปิดแล้วนะคะ!"
9009000-800 = "สู้เค้านะคะ สู้ๆ!\nหนูเตรียมโบนัสพิเศษไว้เพื่อสนับสนุน\nนักกีฬาในเทศกาลฮาโลเฟสติวัลแล้วค่ะ! "
9009000-810 = "อะโรน่าเตรียมของขวัญสุดพิศษไว้\nสำหรับนักเรียนที่เข้าร่วมเชียร์ด้วยค่ะ!"
9009000-820 = "เมอร์รีคริสต์มาสค่ะ คุณครู!\nหนูเตรียมของขวัญคริสมาสต์ไว้แล้วค่ะ!"
9009000-830 = "หนูมีของขวัญให้คุณครูด้วยนะคะ!\nขอให้มีความสุขในวันคริสต์มาสค่ะ!"
9009000-840 = "หนูเตรียมของขวัญ\nฉลองครบรอบ 2 ปีไว้ให้แล้วค่ะ"
9009000-850 = "เราใช้เวลาอยู่ด้วยกัน\nมา 2 ปีแล้วนะคะ!\nนี่เป็นของขวัญจากหนูค่ะ!"
