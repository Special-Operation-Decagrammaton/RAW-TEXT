[translation]
9009000-10 = "[USERNAME] 선생님!\n기다리고 있었습니다!"
9009000-20 = "자아, 업무를 시작할 시간이에요!"
9009000-30 = "어떤 업무를 하실 건가요,\n선생님?"
9009000-40 = "제가 선생님의 업무를 돕겠습니다!"
9009000-50 = "여기서는 선생님의 다양한 업무를\n진행할 수 있어요!"
9009000-60 = "[USERNAME] 선생님!\n원하시는 업무를 선택해 주세요.\n제가 옆에서 돕겠습니다!"
9009000-70 = "해결해 주셔야 할 업무들이에요.\n어른이란 힘들겠네요."
9009000-80 = "해결해야 할 일들이 잔뜩!\n그치만 힘내는 거예요!"
9009000-90 = "가끔씩은 몸 생각도 해야죠.\n선생님의 건강이 걱정된다구요!"
9009000-100 = "우와….\n일이 엄청나게 많이 있네요."
9009000-110 = "자, 힘내는 거예요!\n선생님!"
9009000-120 = "으응~♬"
9009000-130 = "라랄라랄라♪"
9009000-140 = "음음음~♩"
9009000-150 = "오늘은 또 무슨 일이♬\n기다리고 있을까~♪"
9009000-160 = "앗?"
9009000-170 = "어라?"
9009000-180 = "앗!"
9009000-190 = "음냐. 딸기 우유는… 우히히."
9009000-200 = "이렇게 많이는 못먹어요…."
9009000-210 = "선생님은 참…"
9009000-220 = "…우히히히히."
9009000-230 = "음냐."
9009000-240 = "졸고 있는 게\n아니거든요… 음냐."
9009000-250 = "우힛, 냐암…."
9009000-260 = "선생님. 체통을 지키셔야죠…."
9009000-270 = "우, 우햣?"
9009000-280 = "앗?!"
9009000-290 = "…히익?"
9009000-300 = "음! 좋아.\n오늘도 날씨는 쾌청하네요."
9009000-310 = "으음… 비가 오려나."
9009000-320 = "저 멀리에는 뭐가 있는 걸까…."
9009000-330 = "…."
9009000-340 = "…음."
9009000-350 = "앗!"
9009000-360 = "어라?"
9009000-370 = "[USERNAME] 선생님, 어서 오세요.\n기다리고 있었습니다."
9009000-380 = "[USERNAME] 선생님!\n오늘도 잘 부탁드립니다."
9009000-390 = "[USERNAME] 선생님. 돌아오셨군요.\n잘 부탁드립니다!"
9009000-400 = "[USERNAME] 선생님.\n돌아오신 걸 환영합니다♪"
9009000-410 = "아, 그리고 이런 것도\n준비되어 있어요."
9009000-420 = "아, 그리고 이런 것도\n진행 중입니다!"
9009000-430 = "보충수업부 오픈을 기념하는\n특별 보너스를 진행 중입니다!"
9009000-440 = "보충수업부 오픈 기념 이벤트예요!"
9009000-450 = "여기서는 선생님의\n학원 스케쥴을 정할 수 있어요!"
9009000-460 = "[USERNAME] 선생님!\n다양한 수업과 일정이 준비되어 있으니,\n원하시는 스케쥴을 선택해주세요!"
9009000-470 = "오늘은 어떤 수업을 시작하실 건가요?"
9009000-480 = "[USERNAME] 선생님.\n스케쥴을 선택해주세요!"
9009000-490 = "수업! 과외! 자유시간!\n무슨 일정을 선택하실 건가요?"
9009000-500 = "[USERNAME] 선생님!\n조금만 힘내주세요!"
9009000-510 = "선생님의 업무란 이렇게 하드한 걸까요…."
9009000-590 = "무더운 여름!\n하계합숙훈련으로 고생하는\n선생님을 위한 특별 보너스예요!"
9009000-600 = "선도부 여러분의\n하계합숙훈련을 기념해\n특별 이벤트를 진행중이에요!"
9009000-650 = "1st 애니버서리를 기념해서\n선물을 준비했어요!"
9009000-660 = "선생님! 벌써 1년이에요!\n1st 애니버서리 기념 선물이에요!"
9009000-670 = "아, 그리고!\n선생님을 지원하는 보급품도\n이렇게 준비되어 있습니다!"
9009000-680 = "한가지가 더 있어요!\n여기, 선생님을 위한 보급품입니다!"
9009000-690 = "학원간의 교류회를 통해 다양한\n성장 재료들을 수집할 수 있습니다."
9009000-700 = "여러 학원과의 교류회를 가지며 성장재료들을\n수집해보세요."
9009000-710 = "[USERNAME] 선생님!\n조금만 힘내주세요!"
9009000-720 = "선생님의 업무란 이렇게 하드한 걸까요…."
9009000-730 = "제가 선생님의 업무를 돕겠습니다!"
9009000-740 = "선생님! 수고 많으세요!\n그 동안의 노고에 보답하는 특별 선물을 준비했습니다!"
9009000-750 = "선생님을 응원합니다!\n이건 제가 드리는 특별한 선물이에요!"
9009000-760 = "1.5주년 애니버서리!!\n제가 기념 선물을 준비했습니다!"
9009000-770 = "선생님! 1.5주년 애니버서리\n기념 선물이에요!"
9009000-780 = "황륜대제의 준비를 위해\n고생하시는 선생님을 위해\n준비했습니다!"
9009000-790 = "황륜대제의 개최를\n기념하는 특별 이벤트가\n진행되고 있어요!"
9009000-800 = "힘내라! 힘내라!\n황륜대제의 선수들을 위해\n특별 보너스를 준비했어요!"
9009000-810 = "열심히 응원전을 준비하는 학생들을 위해\n아로나가 특별한 선물을 준비했답니다!"
9009000-820 = "메리 크리스마스예요, 선생님!\n크리스마스를 맞아 선물을 준비했어요!"
9009000-830 = "선생님을 위해 준비했답니다!\n행복한 크리스마스 되세요!"
9009000-840 = "2nd 애니버서리를 기념하여\n특별한 선물을 준비했어요!"
9009000-850 = "선생님과 함께 한지\n벌써 2년이나 되었네요!\n아로나가 준비한 기념 선물이랍니다!"
