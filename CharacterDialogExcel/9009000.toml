9009000-1240 = "ของขวัญค่ะ คุณครู\nอยู่ด้วยกันไปนานๆ เลยนะคะ!"
9009000-1250 = "1, 2, 3, 4!\nบนเค้กมีเทียนตั้ง 4 เล่มแน่ะ!"
9009000-1260 = "หนูเตรียมของขวัญพิเศษ\nฉลองครบรอบ 4 ปีไว้แล้วค่ะ!\nนี่ค่ะ ช่วยรับไว้ด้วยนะคะ!\nต่อไปก็ขอรบกวนด้วยนะคะ คุณครู!"
9009000-1270 = "ครบรอบ 4.5 ปีแล้วค่ะ! ต่อไปก็\nมาสร้างช่วงเวลาที่สดใสไปด้วยกันนะคะ!"
9009000-1280 = "วันพิเศษ! งั้นก็เชิญรับ\nของขวัญพิเศษไปเลยค่ะ คุณครู!"
9009000-1290 = "ครบรอบ 5 ปีแล้วค่ะ! มาสร้าง\nความทรงจำให้มากกว่าที่เคยมีมา!"
9009000-1300 = "ต่อไปก็มาอยู่ด้วยกันนะคะ!"
9009000-1310 = "เชิญค่ะ คุณครู!\nขอบคุณที่ทำงานอย่างเต็มที่นะคะ!"
9009000-1320 = "เราทำงานด้วยกัน\nมานานแล้วนะคะ\nอะโรน่าจะคอยสนับสนุน\nคุณครูเองค่ะ!"
