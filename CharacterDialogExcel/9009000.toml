9009000-50 = "คุณครูสามารถเลือกงานต่างๆ \nได้จากตรงนี้ค่ะ!"
9009000-60 = "คุณครู [USERNAME] คะ!\nเลือกงานที่ต้องการทำได้เลยค่ะ\nหนูจะคอยช่วยคุณครูเองค่ะ!"
9009000-70 = "นี่คืองานที่จะต้องจัดการทั้งหมดค่ะ\nการเป็นผู้ใหญ่นี่ยากจริงๆ เลยนะคะ"
9009000-80 = "มีงานที่ต้องทำเยอะไปหมดเลย!\nคุณครูพยายามเข้านะคะ!"
9009000-90 = "บางครั้งคุณครูต้องคิดถึงสุขภาพด้วยค่ะ\nหนูเป็นห่วงสุขภาพของคุณครูไงล่ะคะ!"
9009000-100 = "ว้าว...\nมีสิ่งที่ต้องทำอยู่เยอะมากเลยนะคะ"
