[translation]
10139-10 = "블루 아카이브."
10139-20 = "SRT 특수학원, FOX 소대의 요시노 니코입니다.\n미숙한 몸이지만 앞으로 잘 부탁드립니다."
10139-30 = "(유부의…… \n좋은 향기가……)"
10139-40 = "괜찮으시면 방금 만든\n유부초밥 하나,\n드시고 가지\n않겠어요?"
10139-50 = "오늘은 빨래하기\n좋은 날이네.\n모포가 잘 마르겠어."
10139-60 = "……요새는 이런 게\n유행인 건가?"
10139-70 = "이렇게 휴일을\n보내는 것도……\n나쁘지 않을지도."
10139-80 = "부르셨나요?"
10139-90 = "부탁할 일이 있으시다면\n부담 없이 말씀해 주세요."
10139-100 = "어서 오세요, 선생님.\n작전 준비라면\n이미 완료했습니다."
10139-110 = "어머나, 오늘은 어리광을\n부리고 싶으신 기분인가요?"
10139-120 = "괜찮아요. 이리로 오세요."
10139-130 = "네, 니코랍니다?"
10139-140 = "도시락을 준비하기 위해서,\n작전이 있는 날은\n조금 더 일찍 일어나곤 해요."
10139-150 = "배가 고프면 어떤 일도\n제대로 할 수 없는 법이니까요."
10139-160 = "도시락…… \n"
10139-170 = "다음번에는 선생님의 것도\n준비할까요?"
10139-180 = "저희의 과오를\n씻기 위해서라도……"
10139-190 = "앞으로는 선생님의\n힘이 되고 싶습니다."
10139-200 = "생일 축하드려요, 선생님!"
10139-210 = "축하의 의미로, \n팥밥 유부초밥을 만들었어요."
10139-220 = "부디 맛있게 드셔주세요!"
10139-230 = "생일……\n축하해 주셔서 감사합니다,\n선생님."
10139-240 = "매년 생일은\n소대원들이 챙겨주어서\n늘 떠들썩하게 보냈었는데……"
10139-250 = "올해는 한 사람 더,\n추가되었네요."
10139-260 = "새해 복 많이 받으세요, 선생님."
10139-270 = "새해 소원은 무엇으로 비셨나요?"
10139-280 = "저는 모두의\n건강을 기원했답니다."
10139-290 = "소대원들 모두 물론이고……\n선생님도요."
10139-300 = "SRT 학원에서는\n매년 FOX 소대가 돌아가면서\n산타 역을 맡았는데……"
10139-310 = "매번 항상 중간부터는\n공성전처럼 되어버려서……"
10139-320 = "다들 지쳐 잠든\n기억밖에 없네요. 후후."
10139-330 = "원망스러워라~"
10139-340 = "후후, 깜짝 놀라셨나요?\n선생님도 무서워하는 게\n있으셨군요.\n하나 배웠습니다."
10139-350 = "……네? 제일 무서운 건\n바니걸 차림이라고요……?"
10139-360 = "그게 무슨…… 만쥬가\n무섭다는 이야기인가요?"
10139-380 = "후후, 잘 익었네요."
10139-390 = "잘 부풀어 오른 것이,\n좋은 유부가 될 것 같아요."
10139-400 = "아, 아직은 안 돼요."
10139-410 = "이 뒤에 한 번 더\n튀겨야 하거든요."
10139-420 = "처음에는 낮은 온도에서,\n그리고 높은 온도에서\n한 번 더 튀겨야만"
10139-430 = "수분이 모두 빠져서,\n맛있는 유부가 된답니다."
10139-440 = "네. 유부는 정말 시간과\n손이 많이 드는 요리예요."
10139-450 = "그래서 옛날에는 한 해의\n풍작과 안녕을 빌기 위한 공물로\n유부를 만들었다고 해요."
10139-460 = "제가 바라는 것은 주변 사람들의\n행복과 안녕뿐이지만."
10139-470 = "이 유부에 눌러 담은\n제 마음이 전해진다면……\n기쁘겠네요."
10139-2600 = "FOX 870식 산탄총,\n수령 확인했습니다.\n근접 지원이라면 제게 맡겨주세요."
