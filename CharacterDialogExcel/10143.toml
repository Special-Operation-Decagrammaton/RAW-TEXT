[translation]
10143-10 = "블루, 아카이브."
10143-20 = "블루 아카이브! 에헤헤."
10143-30 = "준비 운동은 하셨나요?\n제대로 안 하시면 떽, 이랍니다?"
10143-40 = "와아, 멋진 곳이네요."
10143-50 = "혹시 저 차, \n피부에 좋으려나요?"
10143-60 = "(이런 곳에서\n수영복, \n괜찮을까요……)"
10143-70 = "우으…… \n또 어깨가\n결리네요……"
10143-80 = "여기가\n너무 시원해서,\n나가기 싫네요……"
10143-90 = "어서 오세요, 선생님.\n물놀이로 하실래요?\n식사부터 하실래요? "
10143-100 = "아니면……"
10143-110 = "말씀만 해 주시면 된답니다."
10143-120 = "안녕하세요, 선생님!"
10143-130 = "슈에링은\n선생님이랑 놀고 싶어요!"
10143-140 = "안녕하세요, 선생님."
10143-150 = "후훗. 네.\n오늘은 수영복이랍니다?"
10143-160 = "네! 슈에링이랍니다!\n수영복으로 갈아입고 왔어요!"
10143-170 = "어떠세요, 선생님? 귀엽나요?"
10143-180 = "너무 더우면\n아무래도 힘이 들죠."
10143-190 = "혹시 여름휴가……\n생각하고 계신가요?"
10143-200 = "선생님만 괜찮으시다면…… \n저에게 살짝 알려 주셔도\n좋을 텐데……"
10143-210 = "지금 저는, 교관이 아니니까요!"
10143-220 = "그러니까…\n평소에 못 해 본 걸 \n신나게 할 거예요!"
10143-230 = "새삼 느끼는 것이지만,\n지금 저는 교관이 아니네요."
10143-240 = "거기에……\n수영복 차림이기도 하고요."
10143-250 = "네? 그게 무슨 뜻이냐고요?\n그러니까, 그게……"
10143-260 = "지금이라면, "
10143-270 = "선생님과 평소보다 더욱\n가까운 관계가 된 것이\n아닐까 해서,"
10143-280 = " 요……?"
10143-290 = "자라게 되면, 체감하는 시간이\n짧게 느껴진다고 들었어요."
10143-300 = "어렸을 때는, 모든 게 전부\n새로운 경험이다 보니…"
10143-305 = "시간이 느리게\n흐르는 것 같다고요."
10143-310 = "…지금 제 몸은\n어린아이이지만, \n이것저것 알고 있는 것이\n있으니까…"
10143-320 = "어쩌면 또래 아이들보다도, \n체감 시간이 짧게\n느껴질지도 모르겠네요."
10143-330 = "좋은 시간은\n정말 순식간에 지나가죠."
10143-340 = "그래서 매 순간을\n소중히 해야 하는 것이고요."
10143-350 = "그런 의미에서\n저의 소중한 시간은……"
10143-360 = "지금, 이랍니다?"
10143-370 = "선생님, 선생님!"
10143-380 = "수영복을 입은 슈에링과, \n같이 가고 싶은 곳, 있으세요?"
10143-390 = "저는 선생님과 함께라면,\n어디든 좋아요!"
10143-400 = "왠지, 그런 생각을 해 봤답니다?"
10143-410 = "선생님과 수영복을 입고\n갈 수 있는 곳이라면\n어디든 가고 싶다고요."
10143-420 = "수영장이라든가, 계곡이라든가,\n바다라든가……"
10143-430 = "선생님은, 어떠세요?"
10143-440 = "물놀이하는 거, 좋아요!"
10143-450 = "그래도 사실은,\n선생님과 놀 수 있다면\n뭐든 즐거워요!"
10143-460 = "물놀이는 제법 체력을\n소모하죠……"
10143-470 = "그래도 물에 들어가는 건\n좋아한답니다."
10143-480 = "몸이 가벼워지는\n느낌이 들거든요."
10143-490 = "선생님도 언젠가 함께……\n어떠세요?"
10143-500 = "만일 제가 물에 빠졌는데…"
10143-510 = "그게 물에 빠진 '척'이었다면, \n그래도 선생님은 구하러\n와 주실 건가요?"
10143-520 = "그런 거 조금…\n동경하고 있거든요.\n그렇게 생각할 뿐이고,\n정말로 하지는 않는답니다?"
10143-530 = "생일 축하드립니다,\n선생님. 우후후."
10143-540 = "오늘을 열심히 보내고 있는\n선생님을 착하다, 착하다,\n칭찬해 드릴게요."
10143-550 = "어, 어어어?!"
10143-560 = "서, 선생님!?"
10143-570 = "생일 축하드려요, 선생님!"
10143-580 = "나중에 제 생일도,\n축하해 주셔야 해요?"
10143-590 = "사야 양이,\n살짝 불안정해질 수도\n있다고 한 게, 혹시……?"
10143-600 = "아와와……?!\n왜 선생님이\n사과하시는 건가요?!"
10143-610 = "그보다……!"
10143-620 = "저, 저는 어떻게 해야……!"
10143-630 = "오늘은 제 생일이에요!"
10143-640 = "선생님의 생일 선물은\n어떤 건가요?"
10143-645 = "후훗…\n어린아이는 선물이 있을 거라고\n믿는 법이니까요?"
10143-650 = "그러니까 오늘은…\n잔뜩 어리광 부리게 해 주세요?"
10143-660 = "숨을 테니까……"
10143-670 = "저는…… 괜찮, 으니까요."
10143-680 = "선생님이라면…… "
10143-690 = "새해가 되었네요, 선생님."
10143-700 = "슈에링은 또 한 살,\n언니가 되었어요!"
10143-705 = "…이 모습으로 말하는 건,\n조금 신기한 느낌이네요."
10143-710 = "크리스마스네요……"
10143-720 = "이 시기가 되면 매화원은……"
10143-730 = "모두 자기가 착한 아이였다고,\n서로 자랑한답니다."
10143-740 = "모두 착한 아이들인데 말이죠."
10143-750 = "크리스마스가 되었어요!"
10143-760 = "올해의 저는\n'착한 아이'였을까요?"
10143-765 = "선생님이\n산타가 되어 주신다면…\n기쁠 거예요♪"
10143-770 = "산해경에서도 매화원에서도,\n이날이 무슨 날인지\n알아가기 시작했답니다."
10143-780 = "그래서 모두들 분장하고\n사탕을 달라고 하는 거예요."
10143-790 = "자, 선생님도."
10143-800 = "트릭 오어 트릿, 이에요."
10143-810 = "사탕 주세요, 선생님!\n사탕이요!"
10143-820 = "트릭 오어 트릿으로\n누군가에게 빼앗기기 전에,\n얼른 먹어 두고 싶어서요!"
10143-2600 = "여름, 피서…… 무심코 마음이 풀어지기 쉬운 시기네요.\n저도 조심할 테니, 선생님도 조심해 주세요.\n안전 수칙을 지키지 않으면, '훈육'이니까요?"
