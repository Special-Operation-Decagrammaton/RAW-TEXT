[translation]
10135-10 = "必須要說對吧……？\n蔚藍，檔案。"
10135-20 = "你好，我是Kei。\n為什麼要那樣慌慌張張的啊……？\n唉……今後我會好好關照老師的。"
10135-30 = "（我也是「學生」……\n區區的咖啡廳……！）"
10135-40 = "那個……\n會是什麼味道呢？"
10135-50 = "原來如此……這就是，\n慵懶放鬆的感覺……"
10135-60 = "擁有自己的身體……\n也是件不方便的事呢……"
10135-70 = "呵呵……\n就算只像這樣站著，\n也莫名的開心呢……"
10135-80 = "真是的，你在做什麼啊？\n已經遲到了唷！"
10135-90 = "準備都做好了……\n來，請坐吧。"
10135-100 = "啊，你來啦。\n那就開始吧。"
10135-110 = "……為什麼笑嘻嘻的啦！"
10135-120 = "不要說可愛了！"
10135-130 = "問，問我是不是討厭……？\n與，與其這麼說……！"
10135-140 = "…………"
10135-150 = "是也請說可愛以外的話，\n這樣的意思……"
10135-160 = "為什麼總是看起來\n像在生氣……？"
10135-170 = "……真失禮呢。\n我又沒有一直在生氣。"
10135-180 = "不過嘛……\n要是知道世界的道理，"
10135-190 = "我覺得要不生氣是很困難的。"
10135-200 = "就讓我趁這個機會\n跟你說一下吧。"
10135-210 = "你有好好吃飯嗎？\n適度的運動也是必要的。"
10135-220 = "早睡早起有益這點，\n對大人也適用的唷。"
10135-230 = "工作要適可而止。\n不過偷懶也要適可而止。"
10135-240 = "……真是的，\n就會讓人操心。"
10135-250 = "啊，真是的！\n就說不要那樣把我\n當小孩子看了！"
10135-260 = "……我又沒有那麼幼稚。"
10135-270 = "你笑了嗎！？\n剛才笑了對吧！？\n我看得很清楚！"
10135-280 = "給我記住哦！？\n總有一天會讓你\n好好用身體明白的！！"
10135-290 = "有什麼事嗎？\n沒事的話請不要叫我。"
10135-300 = "咦？確認我有沒有\n好好待著是你的工作？"
10135-310 = "這個人真的是……！\n老是說一些亂七八糟的話！"
10135-320 = "不過嘛……\n這樣的交流，\n我也不討厭。"
10135-330 = "你好，老師。"
10135-340 = "咦？\n有什麼想說的嗎？"
10135-350 = "…………"
10135-360 = "沒有。"
10135-370 = "就是沒有才說沒有啊！"
10135-380 = "…………"
10135-390 = "生日快樂，老師。"
10135-400 = "咦！？我的生日嗎？\n與，與其這樣，不如\n為愛麗絲的生日……！"
10135-410 = "咦，因為是同一天\n所以沒關係……\n是，是這樣沒錯啦……！"
10135-420 = "……謝謝你。"
10135-430 = "新年快樂。\n正月……\n是新年的第一天……"
10135-440 = "不，我也差不多\n該習慣了呢。"
10135-450 = "畢竟我已經是個\n十足的「學生」了。"
10135-460 = "我並沒有在要求\n禮物之類的東西。"
10135-470 = "當然，\n如果要給的話\n我會好好收下。"
10135-480 = "…………"
10135-490 = "真，真的什麼都沒有嗎……？"
10135-500 = "……！！\n謝，謝謝你……！"
10135-510 = "說什麼亡靈回來的日子……\n真是迷信的節日呢……"
10135-520 = "…………"
10135-530 = "沒有要給我糖果嗎？"
10135-550 = "請不要擔心。"
10135-560 = "我不會消失的。"
10135-570 = "反而，正好相反。"
10135-580 = "我，無論用什麼方法\n都打算活下去。"
10135-590 = "既然老師不放棄這個世界，"
10135-600 = "我也直到最後\n都絕對不會放棄。"
10135-610 = "所以沒事的……\n絕對，沒事的。"
10135-620 = "我會一直待在這裡。"
10135-630 = "偷偷告訴你……\n我呢──"
10135-640 = "對於老師，\n並不覺得討厭。"
10135-2600 = "這是遙遠之地的星光……的意思。\n我想那代表著事情有多麼久遠。\n畢竟曾經有人說過，\n從座標來看，過去與未來是同時存在的。"
