[translation]
10135-10 = "해야 하는 거죠……?\n블루, 아카이브."
10135-20 = "케이입니다.\n뭐가 기다릴 줄 알고 그렇게 서두르는지……\n뭐, 앞으로 선생님을 지켜봐 드릴 테니까요."
10135-30 = "(나도……\n'학생'이야.\n그러니까\n카페 정도는……!)"
10135-40 = "저건……\n무슨 맛일까?"
10135-50 = "그렇구나……\n이게 나른하다는\n감각……"
10135-60 = "자신의 몸을\n갖는다는 건……\n조금, 불편하기도\n하네요……"
10135-70 = "헤헤…… 그냥\n서 있기만 해도,\n좋네요……"
10135-80 = "뭐 하다 이제 오신 건가요.\n늦었잖아요!"
10135-90 = "……준비는 전부 해 뒀으니까,\n앉으세요."
10135-100 = "아, 오셨군요.\n그러면 시작하도록 하죠."
10135-110 = "……뭘 그렇게 히죽거리면서\n지켜보는 건가요!"
10135-120 = "귀엽다고\n좀 하지 말아요!"
10135-130 = "시, 싫으냐고요?\n그, 그런 것보다……!"
10135-140 = "…………"
10135-150 = "귀엽다고만,\n하지 말라는 뜻이에요……"
10135-160 = "어째서 그렇게\n항상 화가 나 있냐고요?"
10135-170 = "실례네요.\n저 그렇게까지\n화내고 있지는 않다고요."
10135-180 = "하지만 뭐……\n세상 돌아가는 모습을 보면."
10135-190 = "화를 안 내기도 이상할 만큼,\n엉망이기도 하잖아요?"
10135-200 = "기회가 되었으니까\n말씀드릴게요."
10135-210 = "식사는 제때 하시는 거죠?\n운동도 놓치면 안 돼요."
10135-220 = "일찍 자고 일찍 일어나는 건,\n어른도 하면 좋은 일이에요."
10135-230 = "과로는 적당히.\n그렇다고 해서\n늘어지는 것도 적당히."
10135-240 = "……정말, 못미덥다니까요."
10135-250 = "아, 진짜! 그렇게 착한 애\n취급하지 말라고요!"
10135-260 = "……저, 그렇게까지\n애 아니니까요."
10135-270 = "웃었겠다?!\n선생님 지금 웃었죠!?\n똑똑히 봤어요!"
10135-280 = "두고 봐요!\n언젠가 그 몸에 뼈저리게\n새겨 줄 테니까!!!"
10135-290 = "왜요.\n아무 일 없으면\n부르지 마세요."
10135-300 = "네?\n제가 무사히 잘 있는 걸\n보는 게 일이라고요?"
10135-310 = "진짜, 이 어른\n못하는 말이 없네요!"
10135-320 = "뭐, 그래도……\n이렇게 있을 수 있다는 건,\n확실히 좋네요."
10135-330 = "안녕하세요. 선생님."
10135-340 = "네? 뭐 할 말 없냐고요?"
10135-350 = "…………"
10135-360 = "없어요."
10135-370 = "진짜 없으니까 그런 줄 아세요!"
10135-380 = "…………"
10135-390 = "생일, 축하드립니다. 선생님."
10135-400 = "네?! 제 생일이요?\n그, 그런 것보다\n아리스 생일을……!"
10135-410 = "예? 어차피 같은 날\n아니냐고요?!\n그건! 그렇긴 한데……!"
10135-420 = "……감사합니다."
10135-430 = "새해 복 많이 받으세요.\n설날…… 새해의 첫날인가요."
10135-440 = "아뇨. 저도 이제는\n이런 날에 익숙해져야 하겠죠."
10135-450 = "어엿한, '학생'인걸요."
10135-460 = "딱히 선물 같은 거,\n바라는 건 아니니까 말이죠."
10135-470 = "물론 주신다면,\n거절은 하지 않겠지만요."
10135-480 = "…………"
10135-490 = "저, 정말로\n안 주시는 건가요……?"
10135-500 = "……!\n가, 감사합니다……"
10135-510 = "유령이 돌아오는 날이라니.\n무슨 미신 같은 축제인지……"
10135-520 = "…………"
10135-530 = "저도 사탕 달라고요!"
10135-550 = "걱정하지 말아요."
10135-560 = "전 사라지지 않아요."
10135-570 = "오히려 그 반대죠."
10135-580 = "무슨 수를 써서라도 아득바득\n살아남아 줄 생각이니까요."
10135-590 = "선생님이 이 세계를\n포기하지 않는다면."
10135-600 = "저 역시,\n언제까지나 포기하지\n않을 생각이고요."
10135-610 = "그러니까…… 괜찮아요.\n전부 괜찮아요."
10135-620 = "저는, 쭉 여기에 있을 거예요."
10135-630 = "여기에서만 하는 말이지만……\n저는……"
10135-640 = "선생님을,\n그렇게 싫어하지\n않으니까요."
10135-2600 = "먼 곳의 별빛…… 이라는 뜻이죠. 간단히 말하자면요.\n그만큼 먼 과거의 시간을 의미하는 것이기도\n하겠지만. 좌표에 따라서, 과거와 미래는\n동시에 존재한다고도 하니까요."
