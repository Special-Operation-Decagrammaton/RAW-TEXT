[translation]
10135-10 = "ต้องพูดใช่มั้ยคะ...?\nBlue... Archive"
10135-20 = "ฉันเคย์ค่ะ\nรู้เหรอว่ามีอะไรรออยู่ ทำไมถึงดูรีบร้อนนักนะ...\nเอาเถอะ จากนี้ไปฉันจะคอยจับตาดูคุณครูค่ะ"
10135-30 = "(ฉันก็... เป็น 'นักเรียน'\nเหมือนกัน งั้นก็น่าจะ\nไปคาเฟ่ได้นะ...!)"
10135-40 = "อันนั้น...\nจะรสชาติยังไงนะ?"
10135-50 = "อย่างนั้นสินะ...\nนี่คือความรู้สึกอ่อนแรง..."
10135-60 = "การได้มีร่างกาย\nเป็นของตัวเอง...\nก็อึดอัดอยู่บ้างนะคะ..."
10135-70 = "แหะๆ... แค่ได้ยืนอยู่เฉยๆ\nก็ดีแล้วละค่ะ..."
10135-80 = "มัวทำอะไรอยู่ ทำไมเพิ่งกลับมาคะ?\nสายแล้วนะคะ!"
10135-90 = "ฉันเตรียมทุกอย่างไว้ให้แล้ว...\nเชิญนั่งเลยค่ะ"
10135-100 = "อ๊ะ มาแล้วสินะคะ\nงั้นก็มาเริ่มกันเลยค่ะ"
10135-110 = "มัวยิ้มน้อยยิ้มใหญ่...\nแล้วจ้องอะไรอยู่คะ!"
10135-120 = "อย่าพูดว่า\nน่ารักสิคะ!"
10135-130 = "มะ... ไม่ชอบหรือเปล่าน่ะเหรอคะ?\nกะ... ก็ไม่ใช่อย่างนั้น...!"
10135-140 = "..."
10135-150 = "ฉันหมายถึง อย่าเอาแต่พูด\nแต่คำว่าน่ารักน่ะค่ะ..."
10135-160 = "ทำไมฉันถึงโมโห\nอยู่ตลอดน่ะเหรอคะ?"
10135-170 = "เสียมารยาทนะคะ\nฉันไม่ได้โมโหอยู่ตลอด\nสักหน่อยค่ะ"
10135-180 = "แต่ก็นะ...\nถ้าดูสิ่งที่เป็นไปในโลกแล้ว"
10135-190 = "มันก็เละเทะเสียจน\nถ้าไม่โมโหก็แปลกไม่ใช่เหรอคะ?"
10135-200 = "ในเมื่อได้โอกาสทั้งที\nงั้นฉันจะพูดละนะคะ"
10135-210 = "ทานอาหารตรงเวลาใช่มั้ยคะ?\nห้ามขี้เกียจออกกำลังกายด้วยค่ะ"
10135-220 = "การเข้านอนเร็วและตื่นแต่เช้า\nก็เป็นสิ่งที่ผู้ใหญ่ควรทำเหมือนกันค่ะ"
10135-230 = "ทำงานก็อย่าหักโหม\nแต่ถึงยังไง\nถ้าจะขี้เกียจก็เอาแต่พอดี"
10135-240 = "ไว้ใจไม่ได้เลยจริงๆ นะคะ..."
10135-250 = "ฮึ่ย จริงๆ เลย! อย่าทำเหมือนฉัน\nเป็นเด็กดีขนาดนั้นสิคะ!"
10135-260 = "ฉันไม่ได้เป็น...\nเด็กน้อยขนาดนั้นนะคะ"
10135-270 = "ยิ้มเหรอ?!\nคุณครูยิ้มอยู่ใช่มั้ยคะ!?\nฉันเห็นเต็มสองตาเลยนะคะ!"
10135-280 = "คอยดูนะคะ!\nไว้ฉันจะจัดหนัก\nให้เจ็บถึงกระดูกเลยค่ะ!!!"
10135-290 = "ทำไมคะ?\nถ้าไม่มีเรื่องอะไร\nก็อย่าเรียกกันสิคะ"
10135-300 = "คะ?\nการสังเกตดูว่าฉันสบายดีอยู่\nคืองานของคุณครูงั้นเหรอคะ?"
10135-310 = "จริงๆ เลย ผู้ใหญ่คนนี้\nพูดอะไรก็ถูกไปหมดเลยนะคะ!"
10135-320 = "แต่ก็นะ...\nการมาใช้ชีวิตอยู่แบบนี้ได้\nก็เป็นเรื่องดีจริงๆ นะคะ"
10135-330 = "สวัสดีค่ะ คุณครู"
10135-340 = "คะ? ฉันมีอะไรจะพูดหรือเปล่า\nน่ะเหรอคะ?"
10135-350 = "..."
10135-360 = "ไม่มีค่ะ"
10135-370 = "ก็บอกว่าไม่มียังไงล่ะคะ!"
10135-380 = "..."
10135-390 = "สุขสันต์... วันเกิดค่ะ คุณครู"
10135-400 = "คะ?! วันเกิดฉันเหรอคะ?\nตะ... แต่ว่าวันนี้\nวันเกิดอาริสึ...!"
10135-410 = "คะ? ยังไงก็\nเกิดวันเดียวกันงั้นเหรอคะ?!\nเรื่องนั้นมัน! มันก็จริงอยู่...!"
10135-420 = "ขอบคุณค่ะ..."
10135-430 = "สวัสดีปีใหม่ค่ะ\nปีใหม่... คือวันแรกของปีใช่มั้ยคะ?"
10135-440 = "เปล่าค่ะ จากนี้ไปฉันต้อง\nทำตัวให้ชินกับวันแบบนี้แล้วละค่ะ"
10135-450 = "ฉันเป็น 'นักเรียน' ที่สง่างามค่ะ"
10135-460 = "ฉันไม่ได้หวังว่าจะได้\nของขวัญอะไรหรอกค่ะ"
10135-470 = "แต่ถ้าจะให้ละก็\nฉันก็จะไม่ปฏิเสธค่ะ"
10135-480 = "..."
10135-490 = "จะ... จะไม่ให้\nจริงๆ เหรอคะ...?"
10135-500 = "...!\nขะ... ขอบคุณค่ะ..."
10135-510 = "วันที่วิญญาณกลับมางั้นเหรอ\nนี่มันเทศกาลงมงายอะไรกัน..."
10135-520 = "..."
10135-530 = "ขอลูกอมให้ฉันบ้างสิคะ!"
10135-550 = "ไม่ต้องกังวลนะคะ"
10135-560 = "ฉันไม่หายไปไหนหรอกค่ะ"
10135-570 = "จะตรงกันข้ามด้วยซ้ำค่ะ"
10135-580 = "ไม่ว่าจะต้องใช้วิธีไหน\nฉันก็จะดิ้นรนมีชีวิตต่อให้ได้ค่ะ"
10135-590 = "ถ้าคุณครูไม่ยอมแพ้\nต่อโลกใบนี้"
10135-600 = "ฉันก็จะ\nไม่มีวันยอมแพ้ค่ะ"
10135-610 = "เพราะงั้น... ไม่เป็นไรหรอกค่ะ\nทุกอย่างจะไม่เป็นไรค่ะ"
10135-620 = "ฉันจะอยู่ที่นี่ไปตลอดค่ะ"
10135-630 = "ถึงฉันจะพูดแค่ที่นี่เท่านั้น...\nแต่ฉัน..."
10135-640 = "ก็ไม่ได้ไม่ชอบคุณครู\nขนาดนั้นหรอกค่ะ"
10135-2600 = "มันหมายถึง... แสงดาวจากที่ไกลๆ ค่ะ\nถ้าจะพูดง่ายๆ น่ะนะคะ แล้วก็หมายถึง\nช่วงเวลาในอดีตอันไกลโพ้นด้วย\nก็อดีตและอนาคตดำรงอยู่พร้อมกันตามพิกัดนี่คะ"
