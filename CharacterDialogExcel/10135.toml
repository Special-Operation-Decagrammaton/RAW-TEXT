[translation]
10135-10 = "I need to do this, right...? Blue Archive."
10135-20 = "It's Kei. I don't know why you're in such a rush, but... Fine. I'll keep looking after you, Sensei."
10135-30 = "(I'm...also a \"student.\" So I'm sure something like a Cafe would be...!)"
10135-40 = "I wonder...what that tastes like?"
10135-50 = "I see... So this is what it means to feel relaxed..."
10135-60 = "Getting my own body...has its drawbacks too..."
10135-70 = "Heehee... Just standing up feels nice..."
10135-80 = "What have you been getting up to? You're late!"
10135-90 = "...I've already prepped everything, so come sit."
10135-100 = "Ah, you're here. Let's get started then."
10135-110 = "...What's with that smug look on your face?!"
10135-120 = "Stop calling me cute!"
10135-130 = "D-Do I hate it? I-It's more of...!"
10135-140 = "..."
10135-150 = "...Don't JUST call me cute..."
10135-160 = "Why am I always mad?"
10135-170 = "That's rude. I'm not even that bad."
10135-180 = "But well... Look at the world around us."
10135-190 = "Things are such a mess, isn't it almost stranger to NOT be furious?"
10135-200 = "I'll say this while I have the chance."
10135-210 = "You're eating properly, right? And you'd best be exercising well."
10135-220 = "It's beneficial for adults to go to bed and wake up early too!"
10135-230 = "Work hard, but in moderation. And relax in moderation."
10135-240 = "...Geez, you really are a handful."
10135-250 = "Ugh, seriously! Stop treating me like I'm some obedient child!"
10135-260 = "...I'm not a child."
10135-270 = "You laughed?! Sensei, you just laughed, right?! I saw you!"
10135-280 = "Just you wait! I'll make you rue the day you were born!"
10135-290 = "What. Don't call me for me if it's not important."
10135-300 = "What? Making sure I'm safe and sound is your job?"
10135-310 = "Seriously, this adult just says anything!"
10135-320 = "But, you know... I suppose even being able to be like this is nice."
10135-330 = "Hello, Sensei."
10135-340 = "What? Don't I have anything to say?"
10135-350 = "..."
10135-360 = "I don't."
10135-370 = "I really don't, so just leave it at that!"
10135-380 = "..."
10135-390 = "Happy...birthday. Sensei."
10135-400 = "What?! My birthday? M-More importantly, it's Aris' birthday...!"
10135-410 = "What? ...They're on the same day anyways?! Well! That's true, but...!"
10135-420 = "...Thank you."
10135-430 = "Happy New Year. New Year's Day... The first day of the year, I guess."
10135-440 = "No. I should get used to this way of life now."
10135-450 = "I'm a full fledged \"student\" now, after all."
10135-460 = "It's not like I'm expecting a gift or anything."
10135-470 = "I wouldn't refuse one, however. Naturally."
10135-480 = "..."
10135-490 = "D-Do you really not have one for me?"
10135-500 = "...! Th-Thank you..."
10135-510 = "A day when ghosts return. What a superstitious festival..."
10135-520 = "..."
10135-530 = "Gimme candy!!"
10135-550 = "Don't worry."
10135-560 = "I won't disappear."
10135-570 = "It'll be the opposite, in fact."
10135-580 = "I will struggle to survive no matter what it takes."
10135-590 = "If Sensei does not\ngive up on this world..."
10135-600 = "I too, will never give up."
10135-610 = "So... It's okay. Everything is okay."
10135-620 = "I'll continue to be here."
10135-630 = "I'm just saying this here... But I..."
10135-640 = "...don't hate you that much."
10135-2600 = "It means...starlight from far away, to put it simply. Though, that may also signify time in the distant past. But they also say the past and future can coexist, depending on the coordinates."
