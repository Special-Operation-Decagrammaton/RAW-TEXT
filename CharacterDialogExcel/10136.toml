[translation]
10136-10 = "Blue, Archive."
10136-20 = "In these situations... I should change, too. What do you think, Sensei. Do I look good?"
10136-30 = "Ugh... Need caffeine..."
10136-40 = "I want to come here again, just us two."
10136-50 = "Maybe I'll sit there..."
10136-60 = "This backpack is oddly warm."
10136-70 = "It's peaceful here..."
10136-80 = "I watched you approach through the scope. I'm looking forward to working with you again today."
10136-90 = "Do you want a warm cup of coffee? Mine is iced, so be careful not to mix them up."
10136-100 = "Am I feeling hot? Hm, I wonder. I'm fine, for now..."
10136-110 = "But even if it's hot, as long as I can stay with Sensei..."
10136-120 = "I might be able to endure forever."
10136-130 = "I hope you call me for Student Rep duty more often,"
10136-140 = "if only for the sake of my own efficiency."
10136-150 = "Mm, my studying isn't progressing just by being at Schale..."
10136-160 = "I just want to stay next to Sensei."
10136-170 = "Here, Sensei. All done."
10136-180 = "Heehee. I finished pretty early, right?"
10136-190 = "You won't find an excellent student like me anywhere else... Right? What do you think, Sensei?"
10136-200 = "You know how people say I should speak with other people's feelings in mind?"
10136-210 = "I thought that sounded inefficient."
10136-220 = "But now... I think I understand a little."
10136-230 = "Because I'm curious to know...how Sensei feels and what Sensei thinks."
10136-240 = "Sensei often tells me to"
10136-250 = "get along with others..."
10136-260 = "...But yeah, it's really a hassle."
10136-270 = "As long as I have Sensei, that's more than enough for me."
10136-280 = "I didn't forget. Today is Sensei's birthday."
10136-290 = "I've safely secured the surrounding perimeter, so..."
10136-300 = "If you don't mind, why don't we go out together?"
10136-310 = "...Just us two."
10136-320 = "My birthday... Thank you for celebrating it."
10136-330 = "Hm? What do I want as my gift?"
10136-340 = "It's fine. I already have it."
10136-350 = "A gift called Sensei."
10136-360 = "It's already New Year's..."
10136-370 = "Before, it was just one out of 365 days out there."
10136-380 = "But it might be a bit different now."
10136-390 = "Heehee, Happy New Year, Sensei."
10136-400 = "You know, I enjoy Christmas."
10136-410 = "Because it's chilly."
10136-420 = "Hm? There are Christmases that aren't chilly...? I don't think I like that."
10136-430 = "Halloween... I used to simply think of it as a day when I can replenish calories."
10136-440 = "But I plan on truly enjoying the festivities this time."
10136-450 = "Of course, I'm going to play tricks and get treats too. I don't plan on holding back."
10136-470 = "Welcome, Sensei."
10136-480 = "This night sky... It's a bit strange, isn't it?"
10136-490 = "It's the same as the night sky we're familiar with..."
10136-500 = "But also completely different in many ways."
10136-510 = "Just like me, right now."
10136-520 = "Until now, I've never..."
10136-530 = "...had a reason to look up at the sky."
10136-540 = "Recently, I've started to enjoy it."
10136-550 = "But you know... Whenever I look up, I'm reminded of Sensei's face."
10136-560 = "Fufu. I wonder why?"
10136-570 = "Sensei."
10136-580 = "I'm really happy I met you."
10136-590 = "Yeah. I really, really am."
10136-2600 = "This is my first time using this type of weapon... But I'll get used to it for the mission's sake... And for Sensei's."
