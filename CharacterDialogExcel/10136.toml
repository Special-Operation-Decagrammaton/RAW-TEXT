[translation]
10136-10 = "Blue... Archive"
10136-20 = "สถานการณ์แบบนี้... ฉันเองก็ต้องเปลี่ยนชุดด้วยสินะ\nเป็นไงบ้าง คุณครู เหมาะกับฉันมั้ย?"
10136-30 = "ฮือ...\nคาเฟอีนไม่พอ"
10136-40 = "คราวหน้าอยากมาที่นี่\nกับคุณครูสองคนจัง"
10136-50 = "ไปนั่งตรงนั้นหน่อย\nดีมั้ยนะ..."
10136-60 = "กระเป๋าเป้ใบนี้\nมันร้อนแปลกๆ น่ะ"
10136-70 = "เงียบสงบดีจัง..."
10136-80 = "ฉันใช้กล้องส่องทางไกล\nสังเกตการณ์ตอนคุณครูมาน่ะ\nวันนี้ก็รบกวนด้วยนะ"
10136-90 = "ดื่มกาแฟร้อนหน่อยมั้ย?\nของฉันเป็นกาแฟเย็น\nระวังอย่าให้สลับกันล่ะ"
10136-100 = "ร้อนรึเปล่าน่ะเหรอ?\nอืม... จะว่ายังไงดีล่ะ\nตอนนี้ยังไม่เป็นไรหรอก..."
10136-110 = "ถึงจะร้อน\nแต่ถ้าได้อยู่กับคุณครูละก็"
10136-120 = "จะร้อนแค่ไหนฉันก็ทนได้เสมอ"
10136-130 = "อยากให้เรียกฉัน\nไปเข้าเวรตัวแทนบ่อยๆ น่ะ"
10136-140 = "อย่างน้อยก็เพื่อประสิทธิภาพ\nของตัวฉันเอง"
10136-150 = "อืม ถึงจะอยู่ที่ชาเล่ต์\nก็ไม่ใช่ว่าจะเรียนดีขึ้นสักหน่อย..."
10136-160 = "แต่ฉันแค่อยากอยู่ข้างๆ คุณครูน่ะ"
10136-170 = "เอ้า คุณครู เสร็จแล้วละ"
10136-180 = "ฮุฮุ ทำเสร็จค่อนข้างเร็วเลยใช่มั้ย?"
10136-190 = "นักเรียนที่มีความสามารถขนาดนี้...\nคงไม่มีอีกแล้วละมั้ง?\nคุณครูคิดว่ายังไงล่ะ?"
10136-200 = "มีคนพูดอยู่บ่อยๆ นี่\nว่าให้เข้าอกเข้าใจคนอื่นบ้างน่ะ?"
10136-210 = "ฉันเคยคิดว่าเรื่องแบบนั้น\nมันไร้ประสิทธิภาพน่ะ"
10136-220 = "แต่ว่าตอนนี้...\nฉันเข้าใจเหตุผล\nขึ้นมานิดหน่อยแล้วละ"
10136-230 = "ฉันสงสัยว่าคุณครู\nกำลังรู้สึกอะไร\nและคิดอะไรอยู่น่ะ..."
10136-240 = "คุณครูชอบบอกบ่อยๆ"
10136-250 = "ว่าให้ฉันสนิท\nกับคนอื่นๆ เอาไว้..."
10136-260 = "บางทีมันอาจยุ่งยากเกินไปก็ได้..."
10136-270 = "ฉันน่ะ\nแค่มีคุณครูก็พอแล้ว"
10136-280 = "ฉันไม่ได้ลืมหรอกนะ\nว่าวันนี้เป็นวันเกิดของคุณครูน่ะ"
10136-290 = "ตรวจสอบความปลอดภัย\nแถวๆ นี้เอาไว้แล้วละ..."
10136-300 = "ถ้าไม่ติดอะไรละก็\nออกไปด้วยกันมั้ย?"
10136-310 = "ไปกันแค่สองคนน่ะ"
10136-320 = "วันเกิดของฉัน...\nขอบคุณสำหรับคำอวยพรนะ"
10136-330 = "หืม? อยากได้อะไร\nเป็นของขวัญงั้นเหรอ?"
10136-340 = "ไม่เป็นไรหรอก ฉันได้รับมาแล้วละ"
10136-350 = "ของขวัญที่เรียกว่าคุณครูน่ะ"
10136-360 = "ปีใหม่เหรอ..."
10136-370 = "เมื่อก่อนนี้ฉันคิดว่า\nมันเป็นแค่ 1 วัน\nใน 365 วันเท่านั้น"
10136-380 = "ตอนนี้อาจต่างไปสักหน่อยก็ได้"
10136-390 = "ฮุฮุ\nสวัสดีปีใหม่นะ คุณครู"
10136-400 = "ฉันชอบคริสต์มาสนะ"
10136-410 = "เพราะมันเย็นสบายดี"
10136-420 = "หืม? มีวันคริสต์มาส\nที่ไม่เย็นสบายด้วยเหรอ...?\nแบบนั้นไม่เอาด้วยหรอก"
10136-430 = "ฮาโลวีน... ฉันคิดมาตลอด\nว่ามันเป็นแค่วันธรรมดา\nที่เอาไว้เติมแคลอรี่เข้าร่างกาย"
10136-440 = "แต่ว่าครั้งนี้\nฉันว่าจะลองสนุกกับ\nเทศกาลดูบ้างน่ะ"
10136-450 = "แน่นอนว่าออกไปหยอกคนเล่น\nแล้วก็รับลูกกวาดมาด้วย\nฉันไม่คิดจะปฎิเสธขนมหรอกนะ"
10136-470 = "เชิญเลย คุณครู"
10136-480 = "เป็นท้องฟ้ากลางคืน\nที่แปลกใหม่ดีใช่มั้ย?"
10136-490 = "ทั้งที่มันก็เหมือนกับ\nท้องฟ้ายามค่ำคืนที่เรารู้จัก"
10136-500 = "แต่ถ้ามองดีๆ ก็จะเห็นว่ามันต่างกัน"
10136-510 = "เหมือนกับฉันในตอนนี้"
10136-520 = "ที่ผ่านมา ฉันไม่เคย\nเงยหน้ามองฟ้ามาก่อนเลย..."
10136-530 = "แต่ตอนนี้ฉันชอบทำบ่อยๆ เลยละ"
10136-540 = "แต่ว่าทำไมกันนะ..."
10136-550 = "ทุกครั้งที่เงยหน้าขึ้นมอง\nก็มักจะนึกถึงหน้าของคุณครู"
10136-560 = "ฮุฮุ เพราะอะไรกันนะ?"
10136-570 = "คุณครู"
10136-580 = "ฉันดีใจจริงๆ\nที่ได้เจอกับคุณครูนะ"
10136-590 = "อื้อ ฉันคิดแบบนั้นจริงๆ นะ"
10136-2600 = "เพิ่งเคยเห็นอาวุธแบบนี้ครั้งแรกเลย...\nแต่ถ้าจำเป็นสำหรับภารกิจละก็\nคงต้องทำความคุ้นเคยกับมันไว้\nอย่างน้อยก็เพื่อคุณครูน่ะ"
