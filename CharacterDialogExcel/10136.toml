[translation]
10136-10 = "蔚藍，檔案。"
10136-20 = "這種狀況下……我也得換裝呢。\n怎麼樣，老師。適合嗎？"
10136-30 = "唔唔……\n咖啡因不夠了。"
10136-40 = "下次想和老師\n兩個人一起來呢。"
10136-50 = "在那邊休息一下……"
10136-60 = "這個背包，\n怎麼有點燙……"
10136-70 = "真和平啊……"
10136-80 = "用瞄準鏡看到你過來了。\n今天也請多指教。"
10136-90 = "要熱咖啡嗎？\n我的是冰的，\n別拿錯了哦。"
10136-100 = "問我不熱嗎？\n嗯……怎麼說呢。\n目前還好吧。"
10136-110 = "不過就算熱，\n能和老師在一起的話……"
10136-120 = "不管多熱，\n也許都能忍受。"
10136-130 = "希望能更常叫我來值班呢。"
10136-140 = "也是為了我的效率。"
10136-150 = "嗯……雖然待在夏萊\n不見得能更專心唸書……"
10136-160 = "但是我想，\n待在老師身邊。"
10136-170 = "好了老師，完成了。"
10136-180 = "呵呵，\n算是很快完成的吧？"
10136-190 = "這麼有能力的學生……\n應該沒有其他人了吧？\n老師覺得呢？"
10136-200 = "不是常說\n要考慮別人的感受\n來說話嗎？"
10136-210 = "那種事，\n我以前覺得很沒效率。"
10136-220 = "現在……好像有點\n明白原因了。"
10136-230 = "因為在意\n老師的感受、\n老師在想什麼……"
10136-240 = "要和大家好好相處"
10136-250 = "老師雖然經常這樣對我說……"
10136-260 = "……果然還是很麻煩呢。"
10136-270 = "畢竟只要有老師就夠了嘛。"
10136-280 = "沒忘記哦。\n今天是老師的生日吧。"
10136-290 = "周圍的安全已經確保了──"
10136-300 = "方便的話，要不要出去走走？"
10136-310 = "只有我們兩個哦。"
10136-320 = "我的生日……\n謝謝你的祝福。"
10136-330 = "嗯？想要什麼禮物？"
10136-340 = "沒關係，已經收到了。"
10136-350 = "就是老師這份禮物呢。"
10136-360 = "新年……"
10136-370 = "以前的話，\n只覺得是365天中\n的一天而已。"
10136-380 = "現在，或許有點不同了。"
10136-390 = "呵呵，\n新年快樂，老師。"
10136-400 = "我喜歡聖誕節。"
10136-410 = "因為很涼爽呢。"
10136-420 = "咦？也有不涼爽的\n聖誕節……？\n那我不喜歡。"
10136-430 = "萬聖節這件事，\n我一直以為只是能快速\n攝取熱量的日子。"
10136-440 = "這次想好好\n享受活動呢。"
10136-450 = "當然，也會搗蛋\n也會拿糖果哦。\n我不打算客氣。"
10136-470 = "歡迎你，老師。"
10136-480 = "總覺得，這片天空\n很不可思議呢。"
10136-490 = "跟我們熟悉的夜空\n有點相似……"
10136-500 = "仔細一看，又完全不同。"
10136-510 = "就像現在的我一樣。"
10136-520 = "雖然以前很少像這樣\n仰望天空……"
10136-530 = "最近，卻還挺喜歡的。"
10136-540 = "不過，不知道為什麼。"
10136-550 = "每次抬頭仰望的時候，\n總是會浮現老師的臉。"
10136-560 = "呵呵，究竟是為什麼呢。"
10136-570 = "老師。"
10136-580 = "我能遇見老師，\n真是太好了。"
10136-590 = "嗯。我真的，\n是那麼想的哦。"
10136-2600 = "這種形式的武器還是第一次，\n不過……為了作戰，\n我會盡快熟練的。\n……這也是為了老師。"
