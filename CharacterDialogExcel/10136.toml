[translation]
10136-10 = "블루, 아카이브."
10136-20 = "이런 상황에서는…… 나도 갈아입어야겠지.\n어때, 선생님. 어울려?"
10136-30 = "우으…… \n카페인이 부족해."
10136-40 = "다음에는 선생님과\n둘이서만 오고 싶네."
10136-50 = "저기에 조금\n앉을까……"
10136-60 = "이 백팩, 묘하게\n뜨겁단 말이지."
10136-70 = "평화롭네……"
10136-80 = "선생님이 오는 거, \n스코프로 관찰하고 있었어.\n오늘도 잘 부탁해."
10136-90 = "따듯한 커피, 어때?\n내 건 아이스니까,\n바뀌지 않게 조심해."
10136-100 = "덥지 않으냐고? 으음, 어떠려나.\n아직 괜찮은 편이지만……"
10136-110 = "덥다고 해도,\n선생님과 같이 있을 수 있다면."
10136-120 = "얼마든지 참을 수 있을지도."
10136-130 = "조금 더 자주\n당번으로 불러 주면 좋겠어,"
10136-140 = "내 효율을 위해서라도."
10136-150 = "으음, 샬레에 있다고\n공부가 잘 되는 건 아니지만……"
10136-160 = "선생님 옆에, 있고 싶거든."
10136-170 = "자 선생님, 다 했어."
10136-180 = "후후. 빨리 끝난 편이지?"
10136-190 = "이렇게 유능한 학생……\n또 없지 않을까?\n선생님은 어떻게 생각해?"
10136-200 = "다른 사람의 기분을 생각해서\n말하라고들 하잖아?"
10136-210 = "그런 거,\n비효율적이라고 생각했었어."
10136-220 = "지금은……\n조금 이유를 알 것 같아."
10136-230 = "선생님이 어떻게 느끼고,\n뭘 생각하고 있는지……\n궁금하거든."
10136-240 = "다른 아이들과 잘 지내라고"
10136-250 = "선생님은 나한테\n자주 말하지만……"
10136-260 = "……역시, 귀찮을지도."
10136-270 = "나는,\n선생님만 있으면 충분한데."
10136-280 = "잊지 않았어.\n오늘, 선생님의 생일인걸."
10136-290 = "주위의 안전 확보는\n해 뒀으니까……"
10136-300 = "괜찮다면,\n같이 나가지 않을래?"
10136-310 = "둘이서만, 말이야."
10136-320 = "내 생일……\n축하해 줘서 고마워,"
10136-330 = "응? 선물로는 뭐가 좋냐고?"
10136-340 = "괜찮아. 이미 받았어."
10136-350 = "선생님이라는 선물."
10136-360 = "새해인가……"
10136-370 = "예전이라면 그냥,\n365일 중 하루일\n뿐이었을 텐데."
10136-380 = "지금은, 조금 다를지도."
10136-390 = "후훗,\n새해 복 많이 받아, 선생님."
10136-400 = "나, 크리스마스 좋아해."
10136-410 = "시원하거든."
10136-420 = "어? 시원하지 않은\n크리스마스도 있다고……? \n그건 싫네."
10136-430 = "할로윈…… 간단하게 칼로리를\n보충할 수 있는 날, \n정도로 생각해 왔는데."
10136-440 = "이번에는\n제대로 행사를 즐겨볼까 해."
10136-450 = "물론, 장난도 치고\n사탕도 받을 거야.\n사양은 하지 않을 생각이니까."
10136-470 = "어서 와. 선생님"
10136-480 = "뭔가, 신비한 밤하늘이지?"
10136-490 = "우리가 아는\n밤하늘과 비슷하면서도."
10136-500 = "잘 보면, 전혀 달라."
10136-510 = "마치, 지금의 나처럼."
10136-520 = "지금까지는 이렇게\n하늘을 올려다 볼일이 없었는데."
10136-530 = "최근에는, 좋아졌어."
10136-540 = "그런데 어째서일까."
10136-550 = "올려다볼 때마다,\n선생님의 얼굴이 떠올라."
10136-560 = "후훗. 어째서일까?"
10136-570 = "선생님."
10136-580 = "나, 선생님과 만나서,\n정말로 좋았던 것 같아."
10136-590 = "응. 진심으로 그렇게 생각해."
10136-2600 = "이런 형태의 무기는 처음이지만……\n작전 수행에 필요하다면, 익숙해져야겠지.\n……선생님을 위해서라도."
