[translation]
10145-101450010 = "모처럼 계곡까지 온 참인데"
10145-101450020 = "평소와는 다른 시간을 보내야 하지 않겠는가?"
10145-101450030 = "그건 확실히 그래야 할 것 같네."
10145-101450040 = "음."
10145-101450050 = "그렇게 선생도 동의하였으니."
10145-101450060 = "지금부터 내가 이야기하는 곳으로 와 주었으면 한다."
10145-101450070 = "전개가 엄청나게 빠르지 않아?!"
10145-101450080 = "덧붙여서"
10145-101450090 = "지각은 용서하지 않을 것이야."
10145-101450100 = "문득"
10145-101450110 = "어제 있었던 일이 기억나는구나."
10145-101450120 = "어리광…… 말이야?"
10145-101450130 = "후후."
10145-101450140 = "선생에게서 그 말을 들으니."
10145-101450150 = "조금 마음에 찔리는 부분이 있는 것 같군."
10145-101450160 = "그러면 오늘도 잘 부탁하겠다."
10145-101450170 = "왜냐하면 선생님은 언제나 최고니까요!"
10145-101450180 = "키사키……?"
10145-101450190 = "일어났는가, 선생."
10145-101450200 = "어……?"
10145-101450210 = "지금, 조금 이르지 않아……?"
10145-101450220 = "그렇게 생각할 수도 있겠지."
10145-101450230 = "하지만 여름은 영원하지 않다."
10145-101450240 = "촌음을 아껴 써야만"
10145-101450250 = "비로소 후회 없는 휴가를 보냈다고 할 수 있을 것이야."
10145-101450260 = "계곡에서 돌아왔지만"
10145-101450270 = "아직 밖은 여름이구나."
10145-101450280 = "하여."
10145-101450290 = "보다 수영복이 어울리는 장소를 "
10145-101450300 = "더 찾아가고 싶다는 생각이 든 것이다."
10145-101450310 = "뭐……?"
10145-101450320 = "이번 여름을 함께 해 주어 고마웠다, 선생."
10145-101450330 = "잊지 못할 추억들뿐이었구나."
10145-101450340 = "아직 아니야, 키사키."
10145-101450350 = "그것은 무슨 뜻인가?"
10145-101450360 = "키사키가 처음에 이야기했잖아?"
10145-101450370 = "밖은 아직 여름이라고."
10145-101450380 = "그렇게 이야기하기는 했다만……"
10145-101450390 = "그런가."
10145-101450400 = "그렇다면 아직, 나와 여름을 더 함께해 준다는 뜻인가?"
10145-101450410 = "키사키가 바란다면 얼마든지!"
10145-101450420 = "그렇구나."
10145-101450430 = "후후."
10145-101450440 = "물론 선생은 그럴 만한 사람이 아니겠지만."
10145-101450450 = "너무 가벼이 이야기하지 않는 편이 좋을 것이야."
10145-101450460 = "어떤 나비는, 약속을 영원히 기억한다고 하니 말이다."
