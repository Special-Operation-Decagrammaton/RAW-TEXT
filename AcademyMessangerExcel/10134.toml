[translation]
10134-101340010 = "คุณครู"
10134-101340020 = "อุปกรณ์ป้องกันจะไร้ผล ถ้าไม่สวมใส่\nให้ถูกวิธีค่ะ"
10134-101340030 = "ทำไมจู่ๆ ถึง...?"
10134-101340040 = "นี่มันเรื่องอะไรเหรอ?"
10134-101340050 = "ความรู้ในเกม RPG ค่ะ!"
10134-101340060 = "แต่ว่าอาริสึได้รู้มาว่า!"
10134-101340070 = "บางครั้งแค่การสวมใส่อย่างเดียวก็\nไม่พอค่ะ!"
10134-101340080 = "คุณครู"
10134-101340090 = "อาริสึตัวโยกตลอดทางที่กลับมาเลย\nละค่ะ"
10134-101340100 = "ขอโทษนะ พอดีชุดมันหนักน่ะ..."
10134-101340110 = "ครูก็พยายามประคองแล้ว..."
10134-101340120 = "แต่อาริสึก็สนุกมากเลยค่ะ!"
10134-101340130 = "เหมือนได้ขึ้นเครื่องเล่นในสวนสนุก\nเลยค่ะ!"
10134-101340140 = "ถ้างั้นก็ค่อยยังชั่วหน่อย..."
10134-101340150 = "อาริสึขอเชิญคุณครูเข้าร่วมปาร์ตี้ค่ะ"
10134-101340160 = "วันนี้ก็มีฝึกผู้กล้าค่ะ!"
10134-101340170 = "ผู้กล้าเอ๋ย ฝึกฝนแค่นั้นจะพอเหรอ?"
10134-101340180 = "คุณครู?"
10134-101340190 = "ครูเตรียมการฝึกพิเศษไว้ให้อาริสึแล้ว!"
10134-101340200 = "การฝึกพิเศษ อัปเวลไวในเวลาอันสั้น!"
10134-101340210 = "มีวิธีแบบนั้นด้วยเหรอคะ?!"
10134-101340220 = "อาริสึอยากรู้ค่ะ!"
10134-101340230 = "คุณครู!"
10134-101340240 = "น่าทึ่งมากเลยค่ะ!"
10134-101340250 = "ตอนนี้ต่อให้สวมเกราะของผู้กล้า\nอาริสึก็ไม่หวั่นแล้วค่ะ!"
10134-101340260 = "การฝึกพิเศษได้ผลสินะ!"
10134-101340270 = "ต้องชื่นชมความพยายามของ\nอาริสึเลยละ"
10134-101340280 = "แค่อาริสึคนเดียวคงคิดวิธีฝึกแบบนั้น\nไม่ได้หรอกค่ะ!"
10134-101340290 = "คนที่ยอดเยี่ยมคือคุณครูต่างหากค่ะ!"
10134-101340300 = "งือออ..."
10134-101340310 = "อาริสึอาจจะขาดคุณสมบัติของผู้กล้า\nก็ได้ค่ะ..."
10134-101340320 = "อาริสึ?"
10134-101340330 = "เกิดเรื่องอะไรเหรอ?"
10134-101340340 = "อาริสึต้องกลับไปเป็นผู้กล้าฝึกหัด\nน่ะค่ะ..."
10134-101340350 = "ตอนนี้อยู่ไหนน่ะ?"
10134-101340360 = "ครูจะรีบไปหา รออยู่ตรงนั้นก่อนนะ"
10134-101340370 = "คุณครู!"
10134-101340380 = "ยังไม่เข้านอนสินะคะ!"
10134-101340390 = "หืม? ก็จริงอยู่หรอกนะ..."
10134-101340400 = "ว่าแต่รู้ได้ยังไง?"
10134-101340410 = "ฮุฮุ!"
10134-101340420 = "มองออกมานอกหน้าต่างสิคะ!"
10134-101340430 = "นอกหน้าต่างเหรอ?"
10134-101340440 = "คุณครู!"
10134-101340450 = "ช่วยด้วย!"
10134-101340460 = "เกิดอะไรขึ้น?"
10134-101340470 = "วันนี้ก็ออกมาผจญภัยอีกเหรอ?"
10134-101340480 = "ตอนนี้ไม่ใช่เวลาอย่างนั้นค่ะ!"
10134-101340490 = "นี่เป็นสถานการณ์ด่วน!"
10134-101340500 = "คุณครู!"
10134-101340510 = "ครั้งหน้าก็มาผจญภัยกับอาริสึอีกนะคะ!"
10134-101340520 = "ได้อยู่แล้ว!"
10134-101340530 = "เราเพิ่งจะเริ่มผจญภัยกันเองนี่นา?"
10134-101340540 = "ค่ะ การผจญภัยของอาริสึยังไม่จบแค่นี้\nหรอกค่ะ!"
10134-101340550 = "สหายคนใหม่ก็ด้วยค่ะ!"
