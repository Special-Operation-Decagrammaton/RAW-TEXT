[translation]
10134-101340010 = "Sensei."
10134-101340020 = "There is no point to armor if you do not properly equip it."
10134-101340030 = "What...?"
10134-101340040 = "What do you mean?"
10134-101340050 = "It is basic RPG knowledge!"
10134-101340060 = "However, I have learned something else!"
10134-101340070 = "Sometimes, simply equipping it is not enough!"
10134-101340080 = "Sensei."
10134-101340090 = "Our way back was very bumpy."
10134-101340100 = "Sorry, it was just so heavy..."
10134-101340110 = "I did my best to hold out..."
10134-101340120 = "It was still very fun!"
10134-101340130 = "Like I was on a roller coaster at an amusement park!"
10134-101340140 = "I'm happy to hear that..."
10134-101340150 = "Aris has sent you a party request."
10134-101340160 = "We are doing Hero Training today as well!"
10134-101340170 = "Hero, are you satisfied with such training?"
10134-101340180 = "Sensei?"
10134-101340190 = "I've prepared a special training course for you, Aris!"
10134-101340200 = "It's a fast-leveling super course!"
10134-101340210 = "There is such a thing?!"
10134-101340220 = "Yes, I wish to try it!"
10134-101340230 = "Sensei!"
10134-101340240 = "This is amazing!"
10134-101340250 = "I no longer struggle when wearing the hero's armor!"
10134-101340260 = "The results of the special training!"
10134-101340270 = "It's all because you worked hard, Aris."
10134-101340280 = "I would never have thought of such a training method on my own!"
10134-101340290 = "You are amazing, Sensei!"
10134-101340300 = "Boo..."
10134-101340310 = "Perhaps I am not meant to be a hero."
10134-101340320 = "...Aris?"
10134-101340330 = "What's going on?"
10134-101340340 = "I have been demoted to newbie adventurer."
10134-101340350 = "Where are you right now?"
10134-101340360 = "Hold on, I'm coming."
10134-101340370 = "Sensei!"
10134-101340380 = "You are still awake!"
10134-101340390 = "Hm? Yeah, but..."
10134-101340400 = "How did you know?"
10134-101340410 = "Fufu!"
10134-101340420 = "Look outside the window!"
10134-101340430 = "Window?"
10134-101340440 = "Sensei!"
10134-101340450 = "Help me!"
10134-101340460 = "What's going on?"
10134-101340470 = "Are you on an adventure today too?"
10134-101340480 = "No! Not an adventure at all!"
10134-101340490 = "It is an emergency!"
10134-101340500 = "Sensei!"
10134-101340510 = "Please go on an adventure with me again!"
10134-101340520 = "Of course!"
10134-101340530 = "The adventure has just begun, right?"
10134-101340540 = "Yes, my journey is not over yet!"
10134-101340550 = "And it will be with new allies as well!"
