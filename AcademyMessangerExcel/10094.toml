[translation]
10094-100940010 = "คุณครู คุณครู!"
10094-100940020 = "โมโมอิ โมโมอิ!"
10094-100940030 = "มีเรื่องจะบอกน่ะ!"
10094-100940040 = "ฉันได้ชุดเมดมาละ!"
10094-100940050 = "ได้ยินแล้วครูใจไม่ดีเลย!"
10094-100940060 = "เพราะอย่างนี้ ฉันเลยคิดแผนการที่\nยิ่งใหญ่เอาไว้..."
10094-100940070 = "พอได้ใส่ชุดเมด!"
10094-100940080 = "จู่ๆ ฉันก็คิดว่าต้องทำตัวให้เหมือนเมด\nขึ้นมาน่ะ!"
10094-100940090 = "ชุดมีผลกับคนใส่จริงๆ ด้วยแฮะ"
10094-100940100 = "เอาเถอะ! เอาเป็นว่า!"
10094-100940110 = "ถ้าอยากเข้าถึงอารมณ์ของเมด\nฉันก็น่าจะต้องทำงานของเมดดู"
10094-100940120 = "เพราะงั้นฉันจะไปทำความสะอาดห้อง\nพักผ่อนของชาเล่ต์ให้เอง!"
10094-100940130 = "งั้นเจอกันที่นั่นนะคุณครู!"
10094-100940140 = "โมโมอิ? โมโมอิ?! "
10094-100940150 = "คุณครู คุณครู!"
10094-100940160 = "อื้ม! โมโมอิ โมโมอิ!"
10094-100940170 = "มีเรื่องจะบอกน่ะ!"
10094-100940180 = "พอดีว่าฉันไปค้นคว้าเรื่องงานของเมด\nมานิดหน่อย..."
10094-100940190 = "เห็นว่าการทำอาหารก็เป็นสิ่งสำคัญ\nเหมือนกัน!"
10094-100940200 = "อืม... ก็คนเราต้องกินเพื่ออยู่นี่เนอะ?"
10094-100940210 = "เพราะอย่างนี้ ฉันก็เลยคิดแผนการที่\nยิ่งใหญ่เอาไว้..."
10094-100940220 = "ครั้งนี้ฉันจะเสิร์ฟอาหารอร่อยๆ"
10094-100940230 = "ให้คุณครูเอง!"
10094-100940240 = "งั้นเจอกันที่ชมรมพัฒนาเกมนะคุณครู!"
10094-100940250 = "โมโมอิ? โมโมอิ?!"
10094-100940260 = "คุณครู!"
10094-100940270 = "โมโมอิ!"
10094-100940280 = "มีเรื่องจะบอกน่ะ!"
10094-100940290 = "เรื่องหน้าที่ประจำของเมด"
10094-100940300 = "ฉันมีเรื่องที่ลืมไปซะสนิทเลยอยู่อย่าง\nหนึ่งน่ะ..."
10094-100940310 = "จู่ๆ ก็รู้สึกกังวลขึ้นมาเลยแฮะ"
10094-100940320 = "ไม่ใช่อะไรที่น่ากังวลสักหน่อย!"
10094-100940330 = "คุณครูจะต้องชอบแน่ๆ เชื่อฉันสิ!"
10094-100940340 = "อาจจะนะ..."
10094-100940350 = "แล้วตกลงว่าลืมอะไรเหรอ?"
10094-100940360 = "เรื่องที่ฉันลืมไปก็คือ...!"
10094-100940370 = "พักผ่อนทั้งกายและใจยังไงล่ะ!"
10094-100940380 = "คาดไม่ถึงเลยจริงๆ..."
10094-100940390 = "ไม่หรอกน่า!"
10094-100940400 = "ถ้าคนเราไม่พักผ่อนบ้าง ร่างกายจะรับ\nไม่ไหวเอานะ"
10094-100940410 = "เพราะงั้น อย่างน้อยเพื่อการทำงาน\nหนักในวันพรุ่งนี้"
10094-100940420 = "วันนี้เราก็ต้องพักผ่อนให้เพียงพอนะ!"
10094-100940430 = "อืม การพักผ่อนเป็นเรื่องสำคัญก็จริง"
10094-100940440 = "ใช่มั้ยล่ะ?"
10094-100940450 = "ถ้าคุณครูมามิลเลเนียมครั้งนี้"
10094-100940460 = "ฉันจะให้คุณครูพักผ่อนให้เต็มที่เลย!"
10094-100940470 = "แงงง..."
10094-100940480 = "ฉันยังปวดตัวอยู่เลย..."
10094-100940490 = "ครูก็ด้วย..."
10094-100940500 = "การพักผ่อนคือเรื่องยากขนาดนี้เลย\nเหรอเนี่ย!"
10094-100940510 = "พักผ่อนแบบธรรมดาๆ\nน่าจะดีกว่านะ..."
10094-100940520 = "แต่ถึงอย่างนั้นก็เถอะ!"
10094-100940530 = "ฉันว่ามันน่าเสียดายนะ!"
10094-100940540 = "จะมีการพักผ่อนที่มันซูเปอร์ อัลตร้า"
10094-100940550 = "คาดไม่ถึง แหวกแนว มีประสิทธิภาพ"
10094-100940560 = "และเป็นที่จดจำมากกว่านี้มั้ยนะ?"
10094-100940570 = "ไว้หายปวดเอวแล้วค่อยมาคิด\nด้วยกันนะ..."
10094-100940580 = "..."
10094-100940590 = "ก็ได้..."
10094-100940600 = "จริงเหรอ? สัญญานะคุณครู?"
