[translation]
20055-200550010 = "คุณครู"
20055-200550020 = "คือว่า... ฉันเข้าไปในตู้ไม่ได้อีกแล้ว\nละค่ะ..."
20055-200550030 = "ใจหนึ่งฉันก็อยากเข้าไป"
20055-200550040 = "แต่อีกใจก็ไม่อยากเข้าไปค่ะ..."
20055-200550050 = "ยูสึ... กำลังต่อต้านการเข้าตู้\nเหรอเนี่ย...?"
20055-200550060 = "ครูจะไปหาเดี๋ยวนี้เลย"
20055-200550070 = "คะ?"
20055-200550080 = "เดี๋ยวสิคะ ไม่ต้องทำถึงขนาดนั้น..."
20055-200550090 = "ไม่สิ คุณครูไม่ต้องมาก็ได้ แต่ว่า..."
20055-200550100 = "ขอรบกวนด้วยนะคะ..."
20055-200550110 = "คุณครู"
20055-200550120 = "ฉันไม่รู้มาก่อนเลยว่าเกมจะยาก\nขนาดนี้ค่ะ..."
20055-200550130 = "ยูสึ... บอกว่าเกมยากเหรอ...?"
20055-200550140 = "เดี๋ยวครูไปหานะ"
20055-200550150 = "คะ?"
20055-200550160 = "เดี๋ยวๆๆๆ เดี๋ยวก่อน"
20055-200550170 = "คะ... คราวนี้ฉันไม่เป็นไรค่ะ!\nจริงๆ นะคะ"
20055-200550180 = "คุณครู"
20055-200550190 = "เครื่องเล่นเกม VR <เวอร์ชวล บอส\n4.0> ที่เพิ่งเปิดตัวใหม่..."
20055-200550200 = "คุณครูซื้อทันรึเปล่าคะ...?"
20055-200550210 = "ซื้อไม่ทันเลย..."
20055-200550220 = "กดเข้าหน้าเพจซื้อไม่ได้เลยด้วยซ้ำ..."
20055-200550230 = "ฮือออ..."
20055-200550240 = "ฉันก็ซื้อไม่ทันเหมือนกันค่ะ"
20055-200550250 = "แถมรุ่นนี้ก็ดูเหมือนจะฮิตเหมือน\nรุ่นก่อนๆ ด้วยค่ะ..."
20055-200550260 = "ใช่ว่าจะไม่มีวิธีเลยสักหน่อยนี่นา"
20055-200550270 = "คะ?"
20055-200550280 = "มีวิธีที่จะซื้อได้ด้วยเหรอคะ?!"
20055-200550290 = "อาจจะหาซื้อไม่ได้ แต่มีวิธี 'หา'\nได้อยู่แล้ว..."
20055-200550300 = "กลายเป็นเรื่องใหญ่ไปซะแล้วค่ะ..."
20055-200550310 = "หวังว่าจะไม่มีใครได้ยินเสียงตะโกน\nเชียร์นั่นแล้วเข้าใจผิด..."
20055-200550320 = "ถ้าเป็นแบบนั้นก็แสดงว่าทุกคนประทับใจ\nในความสามารถของยูสึไม่ใช่เหรอ?"
20055-200550330 = "อย่าพูดแบบนั้นสิคะ! ถ้ามีคนเข้าใจผิด\nอีกจะทำยังไง..."
20055-200550340 = "ยังไงก็เถอะค่ะ ผู้จัดได้ส่งเครื่องเล่น\nเกม <เวอร์ชวล บอส 4.0> มาที่ห้อง\nชมรมพัฒนาเกมแล้วค่ะ"
20055-200550350 = "วันนั้นฉันตื่นเต้นมากจนลืมหยิบ\nมาด้วย..."
20055-200550360 = "ถ้าคุณครูสะดวกละก็..."
20055-200550370 = "เอาไว้แวะมาเล่น <เวอร์ชวล บอส>\nได้นะคะ คุณครู"
20055-200550380 = "ฉันจะซื้อเกมเอ็กส์คลูซีฟของเครื่อง\nรุ่นนี้เอาไว้หลายๆ เกมเลยค่ะ!"
20055-200550390 = "ครูจะไปให้ได้เลย"
20055-200550400 = "ค่ะ ฉันจะรอนะคะ!"
20055-200550410 = "ฉันรู้สึกคุ้นเคยกับเกม VR ขึ้นเยอะ\nแล้วละค่ะ คุณครู"
20055-200550420 = "เคลื่อนไหวร่างกายได้คล่องกว่าเดิม\nแล้วด้วย..."
20055-200550430 = "ตอนนี้ไม่มีเกมอะไรที่ UZQueen\nพิชิตไม่ได้แล้วสินะ..."
20055-200550440 = "คือ..."
20055-200550450 = "อ๊าาา"
20055-200550460 = "อย่าพูดล้อเล่นกันสิคะ...!"
