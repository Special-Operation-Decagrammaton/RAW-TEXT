[translation]
10133-101330010 = "선생. 수송선에서 생활은 어때?"
10133-101330020 = "불편한 점이 있다면 말해."
10133-101330030 = "최대한 개선해 볼 테니까."
10133-101330040 = "너무 편해!"
10133-101330050 = "덕분에 잘 지내고 있어!"
10133-101330060 = "그렇다면 다행이네."
10133-101330070 = "혹시라도 부탁하고 싶은 게 있다면"
10133-101330080 = "언제든 말해줘."
10133-101330090 = "리오는 불편한 곳 없지?"
10133-101330100 = "응? 나야…… 당연히 그런데."
10133-101330110 = "갑자기 왜?"
10133-101330120 = "메이드 로봇 건이야"
10133-101330130 = "선생. 보고할게."
10133-101330140 = "결론만 말해서"
10133-101330150 = "메이드 복 빌리는 건은"
10133-101330160 = "실패야."
10133-101330170 = "하지만 논리적으로"
10133-101330180 = "가사도우미 아방가르드 군을"
10133-101330190 = "메이드 로봇 '이 아니다' 라고"
10133-101330200 = "정의하는 것은 어렵지 않을까?"
10133-101330210 = "가사를 직업으로 하는 것이 메이드이다"
10133-101330220 = "아방가르드 군은 가사를 하는 로봇이다"
10133-101330230 = "즉 아방가르드 군은"
10133-101330240 = "메이드 역할을 담당하는 로봇이다"
10133-101330250 = "3단 논법으로 비추어 봐도"
10133-101330260 = "많은 요소가 공통하고 있다고 생각해."
10133-101330270 = "내가 졌어, 리오야……."
10133-101330280 = "아마 오늘은"
10133-101330290 = "수송선에 우리 둘만 있을 거야."
10133-101330300 = "다들 개인 용무로 자리를 비웠거든."
10133-101330310 = "조용하겠네."
10133-101330320 = "응. 난 이참에"
10133-101330330 = "미뤄뒀던 일을 해보려 해."
10133-101330340 = "조용히 집중해서 처리할 일이 있거든."
10133-101330350 = "수송선의 시스템 재부팅이 있을지도 몰라."
10133-101330360 = "에러는 아니니까 놀라지 말았으면 해."
10133-101330370 = "응? 무슨 일을 하려는 건데?"
10133-101330380 = "그건 비밀."
10133-101330390 = "아무튼 전달했으니까."
10133-101330400 = "오늘도 수고해."
10133-101330410 = "고마워, 선생."
10133-101330420 = "덕분에 수송선의 업그레이드가 끝났어."
10133-101330430 = "예상보다 성능 상승이 크진 않았지만……."
10133-101330440 = "이런 게 이어지면 큰 성과가 되는 거니까."
10133-101330450 = "정말 수고 많았어."
10133-101330460 = "그리고 아까 선생이 말 돌렸던 건에 대해"
10133-101330470 = "혼자서 생각해 봤는데."
10133-101330480 = "그거 혹시……."
10133-101330490 = "가상공간에서 누군가와 커뮤니케이션하고 있다, 고"
10133-101330500 = "선생은 오해하고 있는 거야?"
10133-101330510 = "마, 맞아! 그런 쪽이야!"
10133-101330520 = "그렇구나."
10133-101330530 = "아쉽게도 난 VR 채팅은 하지 않아."
10133-101330540 = "호기심에 아바타는 만들어 뒀지만."
10133-101330550 = "오? 어떻게 생겼어? 궁금해!"
10133-101330560 = "그래?"
10133-101330570 = "기대할 만해."
10133-101330580 = "메이드 복을 입고 있는……."
10133-101330590 = "와……!"
10133-101330600 = "아방가르드 군이니까."
10133-101330610 = "기대된다……."
10133-101330620 = "오늘은 격납고가 복잡할 거야."
10133-101330630 = "AMAS들의 대규모 정비가 있거든."
10133-101330640 = "시설 이용에 참고해 줘."
10133-101330650 = "오, 견학해도 돼?"
10133-101330660 = "견학?"
10133-101330670 = "그렇게 재미있는 작업은 아닌데……"
10133-101330680 = "그래도 보고 싶다면 와도 좋아."
10133-101330690 = "단순 반복 작업이라"
10133-101330700 = "나도 대화 상대가 있으면 좋으니까."
10133-101330710 = "으음, 아무리 생각해도 부족해."
10133-101330720 = "좀 더 완벽하게 만들고 싶어."
10133-101330730 = "아방가르드 군 이야기?"
10133-101330740 = "아방가르드 군의 개조도 좋지만……"
10133-101330750 = "이번엔 내 슈트 이야기야."
10133-101330760 = "지금 슈트에 발열 기능을 넣는다면……."
10133-101330770 = "좀 더 여러 변수에 대응할 수 있겠지."
10133-101330780 = "그래."
10133-101330790 = "역시 그쪽이 합리적이야."
10133-101330800 = "지금 당장 해야겠어."
10133-101330810 = "선생. 그……"
10133-101330820 = "본의 아니게 추태를 보였어."
10133-101330830 = "일단 사과할게."
10133-101330840 = "난 괜찮아! 정말로!"
10133-101330850 = "……정말?"
10133-101330860 = "……."
10133-101330870 = "……다행이네."
10133-101330880 = "사실 그런 모습은……"
10133-101330890 = "누구에게도 보여준 적 없어서……"
10133-101330900 = "아무튼 오늘 도와줘서 고마웠어."
10133-101330910 = "푹 쉬고, 다음에 봐."
