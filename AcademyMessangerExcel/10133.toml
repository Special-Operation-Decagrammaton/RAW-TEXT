[translation]
10133-101330010 = "老師，在運輸船上的生活還好嗎？"
10133-101330020 = "如果覺得哪裡不方便就告訴我吧"
10133-101330030 = "我會盡可能改善的"
10133-101330040 = "超級舒適！"
10133-101330050 = "託你的福過得很好！"
10133-101330060 = "那就好"
10133-101330070 = "假如有什麼需求"
10133-101330080 = "隨時可以告訴我"
10133-101330090 = "莉央有沒有不方便的地方？"
10133-101330100 = "嗯？我嗎……當然沒問題"
10133-101330110 = "怎麼突然這麼問？"
10133-101330120 = "老師，關於女僕機器人的事"
10133-101330130 = "向你報告一下結果"
10133-101330140 = "從結論來說"
10133-101330150 = "借女僕裝這件事"
10133-101330160 = "失敗了"
10133-101330170 = "但是從邏輯上來說"
10133-101330180 = "家事幫手前衛君"
10133-101330190 = "要將其定義為「不是」女僕機器人"
10133-101330200 = "不是很困難嗎？"
10133-101330210 = "以家事為職業的就是女僕"
10133-101330220 = "而前衛君是做家事的機器人"
10133-101330230 = "所以前衛君它"
10133-101330240 = "是擔任女僕角色的機器人"
10133-101330250 = "即使用三段論法來看"
10133-101330260 = "我認為也存在很多共通的要素"
10133-101330270 = "是我輸了，莉央……"
10133-101330280 = "或許今天"
10133-101330290 = "運輸船上只有我們兩個人"
10133-101330300 = "大家都因為私事外出了"
10133-101330310 = "看來會很安靜呢"
10133-101330320 = "嗯，所以趁著這個機會"
10133-101330330 = "我想把之前拖延的工作處理一下"
10133-101330340 = "有些需要專注處理的事情"
10133-101330350 = "運輸船的系統有可能會重新啟動"
10133-101330360 = "那並不是錯誤，所以請不要驚慌"
10133-101330370 = "嗯？你要做什麼？"
10133-101330380 = "這是祕密"
10133-101330390 = "總之事情就是這樣"
10133-101330400 = "今天也辛苦了"
10133-101330410 = "謝謝你，老師"
10133-101330420 = "託你的福，運輸船的升級完成了"
10133-101330430 = "雖然性能提升不如預期……"
10133-101330440 = "不過累積起來就會發揮很大的效果"
10133-101330450 = "真的辛苦你了"
10133-101330460 = "還有，關於剛才老師轉移話題的事"
10133-101330470 = "我自己也思考了一下"
10133-101330480 = "你該不會……"
10133-101330490 = "誤以為我正在虛擬空間和某人交流"
10133-101330500 = "是我想的這樣嗎？"
10133-101330510 = "嗯，嗯！就是那樣沒錯！"
10133-101330520 = "原來如此"
10133-101330530 = "可惜我並沒有在用VR聊天"
10133-101330540 = "雖然出於好奇而製作了虛擬角色就是了"
10133-101330550 = "哦？長什麼樣子？好好奇！"
10133-101330560 = "是嗎？"
10133-101330570 = "還挺值得期待的哦"
10133-101330580 = "是個穿著女僕裝的……"
10133-101330590 = "哇……！"
10133-101330600 = "前衛君哦"
10133-101330610 = "好期待……"
10133-101330620 = "今天機庫會比較混亂"
10133-101330630 = "因為要進行AMAS的大規模維修"
10133-101330640 = "使用設施的時候麻煩注意一下"
10133-101330650 = "哦，可以參觀嗎？"
10133-101330660 = "參觀？"
10133-101330670 = "那並不是什麼有趣的作業……"
10133-101330680 = "不過要是想看的話可以來"
10133-101330690 = "因為是單純的重複作業"
10133-101330700 = "我也希望有人可以聊聊天"
10133-101330710 = "唔嗯，無論怎麼想都覺得不夠"
10133-101330720 = "真希望能做得更完美"
10133-101330730 = "是在說前衛君嗎？"
10133-101330740 = "雖然改造前衛君也不錯……"
10133-101330750 = "但這次指的是我的戰鬥服"
10133-101330760 = "如果能再加入發熱功能的話……"
10133-101330770 = "應該可以應對更多變數才對"
10133-101330780 = "是啊"
10133-101330790 = "果然那樣比較合理"
10133-101330800 = "我馬上開始作業"
10133-101330810 = "老師，那個……"
10133-101330820 = "抱歉讓你看到難堪的樣子"
10133-101330830 = "我向你道歉"
10133-101330840 = "我不介意的！真的！"
10133-101330850 = "……真的嗎？"
10133-101330860 = "……"
10133-101330870 = "……那就好"
10133-101330880 = "其實那種樣子……"
10133-101330890 = "我從來沒有讓任何人見過……"
10133-101330900 = "總之，謝謝你今天的幫忙"
10133-101330910 = "好好休息吧。下次見"
