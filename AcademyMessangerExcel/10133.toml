[translation]
10133-101330010 = "ครู ชีวิตบนยานขนส่งเป็นยังไงบ้าง?"
10133-101330020 = "ถ้าไม่สะดวกตรงไหนก็บอกฉันนะ"
10133-101330030 = "ฉันจะพยายามปรับปรุงให้เต็มที่เลย"
10133-101330040 = "ไม่มีตรงไหนไม่สะดวกเลย!"
10133-101330050 = "ต้องขอบใจริโอะเลยนะ!"
10133-101330060 = "ถ้างั้นก็ค่อยยังชั่วหน่อย"
10133-101330070 = "แต่ถ้ามีเรื่องอะไรอยากให้ช่วย"
10133-101330080 = "ก็บอกฉันได้ตลอดนะ"
10133-101330090 = "แล้วริโอะล่ะ ไม่สะดวกตรงไหน\nบ้างหรือเปล่า?"
10133-101330100 = "หืม? ฉันเหรอ... ฉันไม่เป็นไรอยู่แล้ว"
10133-101330110 = "ว่าแต่มีอะไรเหรอ?"
10133-101330120 = "เรื่องหุ่นยนต์เมดน่ะ"
10133-101330130 = "ครู ฉันจะขอรายงานเรื่องนี้"
10133-101330140 = "สรุปเลยก็คือ"
10133-101330150 = "เรื่องการยืมชุดเมด"
10133-101330160 = "มันล้มเหลวน่ะ"
10133-101330170 = "แต่ในเชิงตรรกะแล้ว"
10133-101330180 = "มันได้เหรอที่จะนิยามว่า"
10133-101330190 = "หุ่นรบล้ำยุคที่มาช่วยงานที่นี่"
10133-101330200 = "'ไม่ใช่' หุ่นยนต์เมดน่ะ?"
10133-101330210 = "เมดคือผู้ที่หาเลี้ยงชีพด้วยการทำ\nงานบ้าน"
10133-101330220 = "หุ่นรบล้ำยุคเป็นหุ่นยนต์ที่ทำงานบ้าน"
10133-101330230 = "เพราะงั้นหุ่นรบล้ำยุคก็เป็น"
10133-101330240 = "หุ่นยนต์ที่ทำหน้าที่ของเมด"
10133-101330250 = "ถ้ามองตามการให้เหตุผลแบบนิรนัย"
10133-101330260 = "ฉันว่ามันก็นำไปสู่ข้อสรุปได้นะ"
10133-101330270 = "ครูยอมแพ้แล้วละ ริโอะ..."
10133-101330280 = "วันนี้ฉันว่า"
10133-101330290 = "ในยานขนส่งน่าจะมีแค่เราสองคนนะ"
10133-101330300 = "คนอื่นออกไปทำธุระส่วนตัวกัน\nหมดเลยน่ะ"
10133-101330310 = "น่าจะเงียบสงบเลยนะ"
10133-101330320 = "อื้อ ฉันก็เลยจะใช้โอกาสนี้"
10133-101330330 = "ทำงานที่คั่งค้างต่อให้เสร็จ"
10133-101330340 = "ฉันมีงานที่ต้องใช้สมาธิทำเงียบๆ น่ะ"
10133-101330350 = "อาจจะต้องรีบูตระบบยานขนส่งใหม่\nก็ได้"
10133-101330360 = "ไม่ได้มีข้อผิดพลาดอะไรหรอก\nไม่ต้องตกใจนะ"
10133-101330370 = "หืม? งานที่จะทำคืออะไรเหรอ?"
10133-101330380 = "เป็นความลับ"
10133-101330390 = "เอาละ ในเมื่อฉันมาบอกแล้ว"
10133-101330400 = "งั้นวันนี้ก็เต็มที่ล่ะ"
10133-101330410 = "ขอบคุณนะ ครู"
10133-101330420 = "ฉันอัปเกรดยานขนส่งเสร็จแล้วละ"
10133-101330430 = "ถึงสมรรถนะจะไม่ได้เพิ่มขึ้นมาก\nเท่าที่คาดไว้..."
10133-101330440 = "แต่ถ้าทำแบบนี้เรื่อยๆ ก็จะได้ผลลัพธ์\nที่ยอดเยี่ยมเอง"
10133-101330450 = "ทำได้ดีมากเลยละ"
10133-101330460 = "ส่วนที่ครูเปลี่ยนเรื่องคุยไปก่อนหน้านี้"
10133-101330470 = "ฉันเก็บไปคิดมาแล้วละ"
10133-101330480 = "คือว่า หรือว่า..."
10133-101330490 = "ครูเข้าใจผิดว่าฉันกำลังคุยกับ\nใครบางคน"
10133-101330500 = "ในโลกเสมือนจริงอยู่หรือเปล่า?"
10133-101330510 = "ชะ... ใช่! ต้องเป็นอย่างนั้นแน่ๆ!"
10133-101330520 = "อย่างนี้นี่เอง"
10133-101330530 = "แต่ฉันไม่เล่น VR Chat หรอกนะ"
10133-101330540 = "ที่สร้างอวาตาร์ขึ้นมาเพราะอยากรู้\nเฉยๆ น่ะ"
10133-101330550 = "โอ๊ะ? หน้าตาเป็นยังไงเหรอ?\nครูอยากเห็นจัง!"
10133-101330560 = "งั้นเหรอ?"
10133-101330570 = "ตั้งตารอได้เลยละ"
10133-101330580 = "เพราะอวาตาร์นั้นอยู่ในชุดเมด..."
10133-101330590 = "ว้าว...!"
10133-101330600 = "เป็นหุ่นรบล้ำยุคในชุดเมดน่ะ"
10133-101330610 = "อยากเห็นจัง..."
10133-101330620 = "วันนี้โรงเก็บยานน่าจะแน่นเลยละ"
10133-101330630 = "เราจะมีการซ่อมบำรุง AMAS\nครั้งใหญ่น่ะ"
10133-101330640 = "รู้เอาไว้ล่วงหน้าก่อนแล้วกัน"
10133-101330650 = "โอ๊ะ ขอไปทัศนศึกษาได้มั้ย?"
10133-101330660 = "ทัศนศึกษา?"
10133-101330670 = "มันไม่ใช่งานน่าสนุกขนาดนั้น\nหรอกนะ..."
10133-101330680 = "แต่ถ้าอยากดูก็แวะมาได้"
10133-101330690 = "มันเป็นงานง่ายๆ ที่ต้องทำซ้ำไปซ้ำมา"
10133-101330700 = "ถ้าได้มีเพื่อนคุยระหว่างทำงานก็ดี\nเหมือนกัน"
10133-101330710 = "อืม ยังไงก็ยังไม่พออยู่ดี"
10133-101330720 = "ฉันอยากให้สมบูรณ์แบบกว่านี้หน่อย"
10133-101330730 = "หมายถึงหุ่นรบล้ำยุคเหรอ?"
10133-101330740 = "ถ้าได้ปรับปรุงหุ่นรบล้ำยุคด้วย\nก็ดีหรอก..."
10133-101330750 = "แต่ครั้งนี้ฉันหมายถึงชุดบอดี้สูท\nของฉันน่ะ"
10133-101330760 = "ถ้าใส่ฟังก์ชันทำความร้อนในชุดตอนนี้"
10133-101330770 = "ก็น่าจะรับมือกับตัวแปรต่างๆ ได้\nมากขึ้นนะ"
10133-101330780 = "อื้อ"
10133-101330790 = "นั่นคือสิ่งที่สมเหตุสมผล"
10133-101330800 = "งั้นฉันต้องไปทำตอนนี้เลย"
10133-101330810 = "ครู เอ่อ..."
10133-101330820 = "ฉันทำเรื่องแย่ๆ โดยไม่ได้ตั้งใจน่ะ"
10133-101330830 = "ฉันขอโทษนะ"
10133-101330840 = "ครูไม่เป็นไรเลย! จริงๆ นะ!"
10133-101330850 = "จริงเหรอ...?"
10133-101330860 = "..."
10133-101330870 = "โล่งอกไปทีนะ..."
10133-101330880 = "ที่จริงแล้วฉัน..."
10133-101330890 = "ไม่เคยให้ใครเห็นมุมนั้นของตัวเอง\nเลย..."
10133-101330900 = "ยังไงก็ วันนี้ขอบคุณที่ช่วยนะ"
10133-101330910 = "พักผ่อนให้เต็มที่ล่ะ ไว้เจอกันใหม่"
