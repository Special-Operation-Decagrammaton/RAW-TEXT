[translation]
16019-160190010 = "อรุณสวัสดิ์ค่ะ คุณครู"
16019-160190020 = "อรุณสวัสดิ์... ถึงตอนนี้จะยังไม่เช้า\nก็เถอะ..."
16019-160190030 = "แต่สถานการณ์มันเป็นแบบนี้นี่คะ"
16019-160190040 = "ก็จริงอย่างที่ว่านะ..."
16019-160190050 = "งั้นฉันจะรออยู่นะคะ"
16019-160190060 = "อะซุมะ โทคิ กลับมาจากการ\nลาดตระเวนแล้วค่ะ"
16019-160190070 = "ฉันจะไปหาคุณครูเพื่อรายงานผลลัพธ์\nให้ทราบนะคะ"
16019-160190080 = "ไม่ได้บาดเจ็บกลับมาใช่มั้ย?"
16019-160190090 = "ขอบคุณที่เป็นห่วงค่ะ"
16019-160190100 = "แต่วันนี้ฉันก็กลับมาโดยไร้รอย\nขีดข่วนค่ะ"
16019-160190110 = "คุณครู"
16019-160190120 = "คิดยังไงเกี่ยวกับการอัปเกรดเหรอคะ?"
16019-160190130 = "ถ้ามีทรัพยากรเหลือ ก็น่าสนนะ?"
16019-160190140 = "ต่อให้ต้องเสียสละบางอย่าง\nก็เป็นสิ่งที่ควรทำนะ?"
16019-160190150 = "อย่างนั้นสินะคะ"
16019-160190160 = "ถึงจะคิดว่านี่อาจเป็นเรื่องราวในเกม\nก็ได้"
16019-160190170 = "แต่คุณครูก็ให้ความสำคัญกับการ\nจัดสรรทรัพยากรสินะคะ"
16019-160190180 = "อย่างนั้นสินะคะ"
16019-160190190 = "ถึงจะคิดว่านี่ต้องเป็นเรื่องราวใน\nเกมแน่ๆ"
16019-160190200 = "แต่ฉันก็มีความคิดคล้ายๆ กันเลยค่ะ"
16019-160190210 = "พอดีว่า"
16019-160190220 = "ฉันมีเรื่องอยากบอกเกี่ยวกับการ\nอัปเกรดที่ว่าน่ะค่ะ"
16019-160190230 = "ถ้าตื่นแล้วก็มาอ่านข้อความด้วยนะคะ"
16019-160190240 = "ฉันกลับมาจากการลาดตระเวนยาม\nรุ่งสางแล้วค่ะ"
16019-160190250 = "...?"
16019-160190260 = "ทำไมรีบออกไปจัง ยังมืดอยู่เลยนะ..."
16019-160190270 = "ก็เพราะอย่างนั้นละค่ะ"
16019-160190280 = "วันนี้ก็เป็นอีกวันที่งานยุ่งเลยนะคะ"
16019-160190290 = "ถึงตอนนี้จะเพิ่งเลยเที่ยงไปนิดเดียว\nก็เถอะ"
16019-160190300 = "นั่นสิเนอะ..."
16019-160190310 = "เรื่องนั้นเอาไว้ก่อน นี่เป็นเรื่องเกี่ยวกับ\nช่วงเวลาสุดท้ายของโลกค่ะ"
16019-160190320 = "ฉันยังไม่ถอดใจหรอกค่ะ"
16019-160190330 = "หืม...?"
16019-160190340 = "ห้ามลืมเด็ดขาดนะคะ"
16019-160190350 = "ว่าคุณครูมีอะซุมะ โทคิจัง"
16019-160190360 = "เมดที่สมบูรณ์แบบจากหน่วย\nลาดตระเวน"
16019-160190370 = "อยู่ข้างกายเสมอค่ะ"
