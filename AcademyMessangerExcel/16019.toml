[translation]
16019-160190010 = "좋은 아침입니다. 선생님."
16019-160190020 = "좋은 아침…… 치고는 조금 이른 것 같지만……"
16019-160190030 = "하지만 이런 상황이니까요."
16019-160190040 = "그건 그렇지……"
16019-160190050 = "그러면 기다리고 있겠습니다."
16019-160190060 = "아스마 토키, 지금 막 정찰로부터 복귀했습니다."
16019-160190070 = "결과 보고를 위해, 선생님을 찾아뵙도록 하겠습니다."
16019-160190080 = "다치거나 그러지는 않았지?"
16019-160190090 = "걱정해 주셔서 감사합니다."
16019-160190100 = "하지만 저는 오늘도 끄떡없었습니다."
16019-160190110 = "선생님은"
16019-160190120 = "업그레이드라는 개념에 대해 어떻게 생각하십니까."
16019-160190130 = "자원이 남게 되면 눌러두는 거?"
16019-160190140 = "다른 걸 조금 포기하더라도 진행시켜야 하는 거?"
16019-160190150 = "그렇군요."
16019-160190160 = "아마도 게임의 이야기라고 생각합니다만."
16019-160190170 = "선생님께서는 자원 분배에 중점을 두시는군요."
16019-160190180 = "그렇군요."
16019-160190190 = "분명 게임의 이야기라고 생각합니다만."
16019-160190200 = "저도 비슷한 생각을 하고 있습니다."
16019-160190210 = "다름이 아니오라"
16019-160190220 = "그 업그레이드에 대해 드리고 싶은 말씀이 있습니다."
16019-160190230 = "일어나시면 확인 부탁드리겠습니다."
16019-160190240 = "현 시간부로 새벽 정찰에서 복귀했습니다."
16019-160190250 = "……?"
16019-160190260 = "너무 빠르지 않아? 아직 어두운데……"
16019-160190270 = "바로 그래서입니다."
16019-160190280 = "오늘도 정신없는 하루였네요."
16019-160190290 = "이제 겨우 정오가 지난 참입니다만."
16019-160190300 = "그러게……"
16019-160190310 = "그건 그렇고 세상의 마지막 순간에 대한 것입니다만."
16019-160190320 = "저는 아직 포기하지 않았습니다."
16019-160190330 = "……어?"
16019-160190340 = "기억하십시오."
16019-160190350 = "선생님의 곁에는 언제나."
16019-160190360 = "퍼펙트 메이드 퍼펙트 리콘"
16019-160190370 = "아스마 토키 쨩이 있다는 것을요."
