[translation]
16019-160190010 = "早安，老師"
16019-160190020 = "早安……雖然這麼說，似乎有點太早了呢……"
16019-160190030 = "畢竟現在情況如此"
16019-160190040 = "說的也是……"
16019-160190050 = "那麼，我會在這裡等您"
16019-160190060 = "飛鳥馬季，已結束偵察任務歸來"
16019-160190070 = "為了報告結果，我會去拜訪老師"
16019-160190080 = "有沒有受傷之類的？"
16019-160190090 = "感謝您的擔心"
16019-160190100 = "不過我今天也平安無事"
16019-160190110 = "老師"
16019-160190120 = "您對升級這個概念有什麼看法呢"
16019-160190130 = "資源充裕的話就強化？"
16019-160190140 = "即使必須取捨也要強化？"
16019-160190150 = "原來如此"
16019-160190160 = "您指的是遊戲的事吧"
16019-160190170 = "老師很重視資源分配呢"
16019-160190180 = "原來如此"
16019-160190190 = "您指的是遊戲的事吧"
16019-160190200 = "我也在思考類似的事情"
16019-160190210 = "總之"
16019-160190220 = "我想跟您商量有關升級的事"
16019-160190230 = "麻煩您起床後進行確認"
16019-160190240 = "我已結束清晨的偵察任務歸來"
16019-160190250 = "……？"
16019-160190260 = "不會太早嗎？天還很黑呢……"
16019-160190270 = "正是因為這樣"
16019-160190280 = "今天也是忙碌的一天呢"
16019-160190290 = "現在才剛過中午而已"
16019-160190300 = "就是說啊……"
16019-160190310 = "話說回來，關於世界的最後時刻"
16019-160190320 = "我還沒有放棄"
16019-160190330 = "……嗯？"
16019-160190340 = "請您記住"
16019-160190350 = "在老師的身邊"
16019-160190360 = "永遠有著完美女僕、完美偵察員"
16019-160190370 = "飛鳥馬季醬這件事"
