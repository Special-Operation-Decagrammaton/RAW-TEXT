16019-160190090 = "Thank you for your concern."
16019-160190100 = "But, as usual, I was both perfect and fine. Perfectly fine."
16019-160190110 = "Sensei"
16019-160190120 = "What are your thoughts on the concept of an \"upgrade\"?"
16019-160190130 = "Something you click when you farm free resources?"
