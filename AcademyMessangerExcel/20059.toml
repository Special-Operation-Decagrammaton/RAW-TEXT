[translation]
20059-200590010 = "쿠후후~"
20059-200590020 = "아하핫~"
20059-200590030 = "오늘도 즐거운 하루네~"
20059-200590040 = "선생님."
20059-200590050 = "선생님은 내 웃음소리 어떻게 생각해?"
20059-200590060 = "귀여워?"
20059-200590070 = "재미있어?"
20059-200590080 = "귀여워!"
20059-200590090 = "재미있어!"
20059-200590100 = "헤에~? 그렇구나?"
20059-200590110 = "만약 내가 다르게 웃으면 어떨 것 같아?"
20059-200590120 = "오호호홋~ 이라거나."
20059-200590130 = "꺄하하핫~ 이라거나."
20059-200590140 = "갑자기 왜?"
20059-200590150 = "쿠후후. 별거 아냐."
20059-200590160 = "시험해 보고 싶은 게 있어서."
20059-200590170 = "직접 만나서 이야기할까?"
20059-200590180 = "선생님! 오늘 잘 놀다가!"
20059-200590190 = "연습은 잘 된 거지?"
20059-200590200 = "연습?"
20059-200590210 = "아!"
20059-200590220 = "쿠후후, 물론이지!"
20059-200590230 = "언젠가 유용하게 써먹을 수 있겠어."
20059-200590240 = "언젠가? 일 때문에 연습했던 거 아니었어?"
20059-200590250 = "아하하핫!"
20059-200590260 = "설마 믿었던 거야?"
20059-200590270 = "난 그냥 선생님이랑 놀고 싶었던 거라구."
20059-200590280 = "역시 선생님은 순진하네~"
20059-200590290 = "아, 알고 있었거든!"
20059-200590300 = "쿠후후, 그래."
20059-200590310 = "뭐, 서로 즐거웠잖아?"
20059-200590320 = "그걸로 OK걸로 가자구~"
20059-200590330 = "그럼 다음에 또 봐, 선생님!"
20059-200590340 = "선생님. 오늘 뭐해?"
20059-200590350 = "한가하면 저녁에 쇼핑이나 하자."
20059-200590360 = "이번 물건은 선생님도 마음에 들 거야."
20059-200590370 = "그게 뭔데?"
20059-200590380 = "쿠후후, 그건 비밀."
20059-200590390 = "아무튼 시간 괜찮지?"
20059-200590400 = "그럼 나중에 봐!"
20059-200590410 = "선생님. 나 며칠 동안 잠적할 예정이야."
20059-200590420 = "그러니까 흥신소에 내가 없더라도 놀라지 마."
20059-200590430 = "무슨 일 있었어?"
20059-200590440 = "저번에 그 폭탄 되팔이들 있잖아."
20059-200590450 = "그거랑 관련된 사건이 조금 더 있었거든."
20059-200590460 = "뭐, 큰 일은 아니고."
20059-200590470 = "나만 며칠 잠적하면 돼."
20059-200590480 = "동료들한테도 말해뒀어."
20059-200590490 = "잠적이라면 어디로?"
20059-200590500 = "으음…… 아직 안 정했는데."
20059-200590510 = "이왕 이렇게 된 거"
20059-200590520 = "호텔에서 호캉스나 즐겨볼까?"
20059-200590530 = "선생님! 좋은 소식이야!"
20059-200590540 = "폭탄 편의점에서 다시 폭탄을 팔기 시작했어."
20059-200590550 = "이제 완전히 일상으로 돌아온 느낌이랄까?."
20059-200590560 = "되팔이가 사라져서 다행이네."
20059-200590570 = "응! 되팔이는 박멸해야지!"
20059-200590580 = "아, 참. 돈은 어디다 쓸지는 정했어?"
20059-200590590 = "역시 나와의 미래를 위해 저금하는 쪽?"
20059-200590600 = "기, 기부를 할 겁니다!"
20059-200590610 = "아하핫!"
20059-200590620 = "응! 기부도 좋아!"
20059-200590630 = "어울리지 않게 착한 일을 한 것 같지만"
20059-200590640 = "이건 이것대로 재미있었어."
20059-200590650 = "다음에 또 재미있는 일 있었으면 좋겠다."
20059-200590660 = "그치?"
20059-200590670 = "응. 그랬으면 좋겠다."
20059-200590680 = "쿠후후."
20059-200590690 = "그럼 다음에 또 연락할게!"
20059-200590700 = "선생님. 오늘 바빠?"
20059-200590710 = "별일 없으면 나랑 놀러 가지 않을래?"
20059-200590720 = "나, 가보고 싶은 곳이 있거든!"
20059-200590730 = "그럼 가야지!"
20059-200590740 = "쿠후후, 그렇게 대답할 줄 알았어."
20059-200590750 = "그럼 얼른 준비해."
20059-200590760 = "지금부터……"
20059-200590770 = "오페라 하우스에 갈 거야!"
