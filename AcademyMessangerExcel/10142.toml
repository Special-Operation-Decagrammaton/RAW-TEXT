[translation]
10142-101420010 = "안녕, 선생님."
10142-101420020 = "연락했었네. 무슨 일이야?"
10142-101420030 = "요즘 더운데 잘 지내나 해서"
10142-101420040 = "아…… 응."
10142-101420050 = "신경 써줘서 고마워."
10142-101420060 = "난 괜찮아. 틈틈이 피서를 즐기고 있거든."
10142-101420070 = "바다에서 놀기?"
10142-101420080 = "워터파크에서 놀기?"
10142-101420090 = "그게……"
10142-101420100 = "평소와 같은 사격 연습이야."
10142-101420110 = "물총으로 하는 게 좀 다르긴 하지만."
10142-101420120 = "즉…… 물총놀이를 한다?"
10142-101420130 = "그렇게 부른다면…… 그럴지도."
10142-101420140 = "선생님. 그게 말인데……."
10142-101420150 = "아무래도 내가 너무 걱정했던 것 같아."
10142-101420160 = "우리 부원들도 선생님과 똑같은 이야기를 하더라."
10142-101420170 = "내가 수영복을 입어도 사람들이 불편해하진 않을 거라고."
10142-101420180 = "그래! 괜한 걱정이라니까."
10142-101420190 = "응."
10142-101420200 = "그래서 다음엔……."
10142-101420210 = "부원 모두와 바다에 가보려고 해."
10142-101420220 = "분명…… 즐거운 시간이 될 거야."
10142-101420230 = "그래! 선크림 꼭 바르고!"
10142-101420240 = "응. 고마워, 선생님."
10142-101420250 = "부원들과 바다에 다녀온 뒤로……"
10142-101420260 = "요즘 시간이 날 때마다 해변을 찾고 있어."
10142-101420270 = "바다는 즐겁지?"
10142-101420280 = "응. 즐거워."
10142-101420290 = "수영은 신체 단련에 도움도 되고"
10142-101420300 = "잡생각을 떨치기에도 좋아."
10142-101420310 = "바다만이 가지는 고유의 운치도 있고."
10142-101420320 = "나는 왜 좀 더 일찍 바다에 가지 않았을까?"
10142-101420330 = "지금부터라도 더 자주 가면 되지!"
10142-101420340 = "……응. 그러게."
10142-101420350 = "좀 더 자주 바다에 가야겠어."
10142-101420360 = "으음……."
10142-101420370 = "여전히 해변에 설녀가 나타난다는 소문이 도는 것 같아."
10142-101420380 = "일일이 해명하면 오해만 키울 텐데."
10142-101420390 = "어떻게 해야 좋을까?"
10142-101420400 = "계속 같이 바다에 가는 거야!"
10142-101420410 = "설녀가 아닌 내 모습을 계속 보여주면"
10142-101420420 = "이상한 소문도 곧 사라질 거라는 거지?"
10142-101420430 = "응……. 알았어."
10142-101420440 = "모두 나구사를 위한 거니까."
10142-101420450 = "……."
10142-101420460 = "역시 선생님은 엉큼해."
10142-101420470 = "어째서?!"
10142-101420480 = "오늘 돌아가는 길에 우연히 이런 이야기를 들었어."
10142-101420490 = "해변에 설녀가 나타났다는 소문은……"
10142-101420500 = "전부 헛소문인 것 같다고."
10142-101420510 = "오오, 계획 성공이네!"
10142-101420520 = "응. 성공이야."
10142-101420530 = "이제 안심하고 바다에 갈 수 있어."
10142-101420540 = "또 나랑 같이 가주는 거지?"
10142-101420550 = "……."
10142-101420560 = "응."
10142-101420570 = "그럼 다음에 또 보자."
10142-101420580 = "선생님. 이번 주는 야외 활동하기 좋은 날씨가 이어진대."
10142-101420590 = "그래서 말인데……"
10142-101420600 = "주말에 시간 괜찮아?"
10142-101420610 = "물론이지!"
10142-101420620 = "내가 먼저 물어보려던 참이었어!"
10142-101420630 = "그럼 또 바다에 가자."
10142-101420640 = "이번에도 왠지 즐거운 일이 있을 것 같아."
