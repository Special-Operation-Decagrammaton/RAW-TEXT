[translation]
10143-101430010 = "계곡은 어떠세요, 선생님?"
10143-101430020 = "자연이란 좋구나……."
10143-101430030 = "다행이에요."
10143-101430040 = "그런데 말이에요."
10143-101430050 = "오늘은 선생님과 함께 계곡을 보고 싶은데"
10143-101430060 = "괜찮으실까요?"
10143-101430070 = "여름이라는 계절은 신기하죠."
10143-101430080 = "어떤 의미에서?"
10143-101430090 = "이유도 의미도 여러 가지 있겠지만"
10143-101430100 = "역시 새로운 모습으로 "
10143-101430110 = "누군가에게 다가갈 수 있다는 점이 아닐까요?"
10143-101430120 = "말씀드린 김에"
10143-101430130 = "새로운 모습을 선생님께 조금 보여드리고 싶은데"
10143-101430140 = "괜찮으실까요?"
10143-101430150 = "어제는"
10143-101430160 = "여러모로, 죄송했습니다."
10143-101430170 = "드디어 오늘 처음 슌이 말을 걸어 줬어……"
10143-101430180 = "네?"
10143-101430190 = "생각해 보니, 그렇네요……"
10143-101430200 = "하지만, 저도……"
10143-101430210 = "아니야! 역시 아무것도 못 봤어! 잊었어!"
10143-101430220 = "……"
10143-101430230 = "그건 조금"
10143-101430240 = "서운할지도, 모르겠는데요……?"
10143-101430250 = "나는…… 어떻게 해야 하는 걸까……."
10143-101430260 = "그러, 게요?"
10143-101430270 = "……"
10143-101430280 = "선생님께서"
10143-101430290 = "리벤지에 참여해 주신다면……"
10143-101430300 = "조금, 괜찮을…… 지도요?"
10143-101430310 = "안녕하세요. 선생님."
10143-101430320 = "정말, 송구스럽지만……"
10143-101430330 = "한가지, 의사를 여쭈어보아도 괜찮으실까요……?"
10143-101430340 = "얼마든지!"
10143-101430350 = "오늘, 매화원 아이들과 워터 파크에 방문하기로 했는데요."
10143-101430360 = "혹시 괜찮으시다면"
10143-101430370 = "저와 함께…… 아이들을 인솔해 주실 수 있을까, 해서요."
10143-101430380 = "문제 없어!"
10143-101430390 = "후후."
10143-101430400 = "감사합니다. 선생님."
10143-101430410 = "잘 들어가셨나요, 선생님?"
10143-101430420 = "으어어…… 근육통과 피로가……"
10143-101430430 = "후후"
10143-101430440 = "물놀이는, 체력을 상당히 소모하니까요."
10143-101430450 = "오늘 정말 감사했습니다."
10143-101430460 = "선생님만 괜찮으시다면, 이지만……"
10143-101430470 = "다음에도, 이런 시간이 또 있었으면 하네요."
10143-101430480 = "언제든지 불러 줘."
10143-101430490 = "후후. 그렇게 말씀하실 것 같았지만."
10143-101430500 = "역시 감사합니다."
10143-101430510 = "그러면 다음에는……"
10143-101430520 = "저희 둘만의 시간으로, 한번 자리를 만들어 볼게요."
