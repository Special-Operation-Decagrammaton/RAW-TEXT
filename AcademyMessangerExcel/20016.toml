[translation]
20016-200160010 = "선생님, 샬레에 계신가요?"
20016-200160020 = "아, 이로하. 일단은 그런데. 왜?"
20016-200160030 = "그럼 됐습니다."
20016-200160040 = "…이로하? 응?"
20016-200160050 = "오늘도 그럼 땡땡이치러…."
20016-200160060 = "가 아니라, 업무차 찾아뵙도록 하겠습니다."
20016-200160070 = "…땡땡이? 응?"
20016-200160080 = "선생님, 오늘 일정은 어떠신가요?"
20016-200160090 = "오늘도 말도 못 하게 바빠…."
20016-200160100 = "아, 그 마음, 절절히 이해해요. "
20016-200160110 = "해치웠다고 생각하면 다시 기어 나오고, 남이 할 거라고 생각한 순간."
20016-200160120 = "내게 부메랑처럼 돌아오는 것. 중간관리자가 하는 일이 다 그렇죠. 뭐."
20016-200160130 = "그런데…."
20016-200160140 = "뭐, 그럼 오늘 커피는 진한 아메리카노로 부탁드릴게요."
20016-200160150 = "오늘은 어쩐지 쓰디쓴 게 땡기더라구요."
20016-200160160 = "이로하, 위에서 내가 한 메시지 본 거 맞지?"
20016-200160170 = "네? 그야 물론이죠."
20016-200160180 = "그럼 이따가 뵙겠습니다."
20016-200160190 = "답변이 산뜻해서 이젠 태클 걸 생각도 들지 않아…."
20016-200160200 = "하아… 귀찮아."
20016-200160210 = "왜, 이로하. 무슨 일 있어?"
20016-200160220 = "아뇨, 별 건 아니에요…. 그냥…."
20016-200160230 = "사람은 어째서 일을 해야만 살아갈 수 있는가. 하고 잠깐 생각해봤을 뿐이에요."
20016-200160240 = "선생님. 우리가 이렇게까지 하며 살아가는 데에 과연 의미가 있을까요?"
20016-200160250 = "갑자기 대화 주제가 무거워졌어! 물론 의미는 있다고 생각하지만!"
20016-200160260 = "정말 정말 하기 싫지만. 그래도 해야만 하겠지요."
20016-200160270 = "네, 정말 정말 귀찮지만."
20016-200160280 = "어, 음. 힘내…."
20016-200160290 = "선생님, 바쁘신가요?"
20016-200160300 = "한가해."
20016-200160310 = "오늘도 오게?"
20016-200160320 = "아, 저는 좀 바빠서요."
20016-200160330 = "샬레에 들르기 힘들 거 같아서……"
20016-200160340 = "올 때 아메리카노 한잔 부탁할게요."
20016-200160350 = "네……?"
20016-200160360 = "커피 고마웠어요."
20016-200160370 = "엄청 새삼스럽네?!"
20016-200160380 = "오랜만에 그 책을 읽다 보니까."
20016-200160390 = "갑자기 생각나더라고요."
20016-200160400 = "오늘 커피맛."
