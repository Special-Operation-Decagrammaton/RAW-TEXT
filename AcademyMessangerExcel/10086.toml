[translation]
10086-100860010 = "Sensei. I have something work-related I wanted your input on."
10086-100860020 = "All right. Schale, let's roll out."
10086-100860030 = "Wh-What? Roll out?"
10086-100860040 = "Where should we meet, Hina?"
10086-100860050 = "Ah, I see. By \"roll out,\" you meant you wanted to meet right away."
10086-100860060 = "Heehee. As expected of you, Sensei."
10086-100860070 = "I'll head over to Schale today."
10086-100860080 = "I'll see you soon, Sensei."
10086-100860090 = "Sensei, about that promise you made me..."
10086-100860100 = "It's finally time to take you DRESS SHOPPING!"
10086-100860110 = "I've been waiting for my chance to go shopping with you!"
10086-100860120 = "Heehee. What passion. I appreciate it."
10086-100860130 = "So, regarding where we're going dress shopping."
10086-100860140 = "Gehenna leadership has a lot of troublemakers like the Pandemonium Society. Or even just outright delinquents."
10086-100860150 = "Visiting a Gehenna shopping mall could cause trouble. In more ways than one."
10086-100860160 = "So..."
10086-100860170 = "You want to meet outside of the Gehenna district? Understood."
10086-100860180 = "I'll send you the address."
10086-100860190 = "See you there, Sensei."
10086-100860200 = "Sensei. Are you available tomorrow?"
10086-100860210 = "Now that I'm done with my performance for the Gehenna Party, I've got a little more time on my hands..."
10086-100860220 = "If you don't mind, I'd like to meet with you."
10086-100860230 = "YOU have free time? This is a once-in-a-blue-moon event!"
10086-100860240 = "I can't let this opportunity pass me by! I'm heading over right now!"
10086-100860250 = "Oh, Sensei. You're always making a fuss. Heehee."
10086-100860260 = "I'll see you tomorrow. I'll be waiting in the party hall."
