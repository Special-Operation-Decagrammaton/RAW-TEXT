10135-101350510 = "หะ... หืม? แต่ว่าครู..."
10135-101350520 = "รู้หรอกน่าว่าไม่มีอะไรทำ"
10135-101350530 = "เรื่องแค่นี้น่ะสืบได้อยู่แล้ว"
