10135-101350330 = "คุณค"
10135-101350340 = "คร"
10135-101350350 = "ช่วย"
10135-101350360 = "เกิดเรื่องอะไรเหรอ?!"
10135-101350370 = "ฉันเจ อ"
10135-101350380 = "เรื่อ งยา ก"
10135-101350390 = "เฮ้อ"
