[translation]
10135-101350010 = "선생님."
10135-101350020 = "왜 그러니. 케이 쨩."
10135-101350030 = "케이 쨩 아닙니다."
10135-101350040 = "어쨌든."
10135-101350050 = "비탄소 기반의 의식체는"
10135-101350060 = "어떻게 스트레스를 해소해야 할까요."
10135-101350070 = "시작부터 너무 난이도가 높은 질문이구나……"
10135-101350080 = "그렇겠죠."
10135-101350090 = "선생님에게 뭘 기대한 제가 바보였어요."
10135-101350100 = "너무해……."
10135-101350110 = "선생님."
10135-101350120 = "왜 그러니. 케이 쨩."
10135-101350130 = "케이 쨩 아닙니다."
10135-101350140 = "어쨌든."
10135-101350150 = "진짜 오실 건가요?"
10135-101350160 = "약속했잖니. 케이 쨩."
10135-101350170 = "했긴 했는데!"
10135-101350180 = "꼭 그렇게까지 제 수업 참관을 오셔야겠냐는 거예요!"
10135-101350190 = "학생의 학업 성취도를 지켜보는 것은."
10135-101350200 = "교사로서 해야 할 의무 중 하나란다."
10135-101350210 = "꼭 이럴 때만 정론 가지고 오죠, 진짜!"
10135-101350220 = "뭔가"
10135-101350230 = "결과적으로"
10135-101350240 = "사방에서…… 온갖 초대를 받게 되었는데요……"
10135-101350250 = "이 선생님은 기쁘단다."
10135-101350260 = "아오"
10135-101350270 = "그렇게 싫고 부담스러워……?"
10135-101350280 = "으"
10135-101350290 = "그"
10135-101350300 = "저"
10135-101350310 = "……"
10135-101350320 = "싫은 건, 아니에요."
10135-101350330 = "선ㅅㅐ"
10135-101350340 = "니ㅁ"
10135-101350350 = "도와"
10135-101350360 = "무슨 일이야?!"
10135-101350370 = "ㅈㅣ금"
10135-101350380 = "좀 곤ㄹㅏㄴ"
10135-101350390 = "아니"
10135-101350400 = "진짜"
10135-101350410 = "정말이지"
10135-101350420 = "뭔 버그가"
10135-101350430 = "버그라니?"
10135-101350440 = "그런 게 있습니다."
10135-101350450 = "어라"
10135-101350460 = "잠깐만"
10135-101350470 = "흠"
10135-101350480 = "선생님."
10135-101350490 = "어차피 지금 시간 남죠?"
10135-101350500 = "오십쇼."
10135-101350510 = "어, 어? 난 지금 일정이……"
10135-101350520 = "없는 거 압니다."
10135-101350530 = "그 정도는 조사 가능하니까요."
10135-101350540 = "내 사생활은!"
10135-101350550 = "학생 먼저 아니었습니까."
10135-101350560 = "크윽!"
10135-101350570 = "하아아아."
10135-101350580 = "왜 그래?"
10135-101350590 = "아뇨."
10135-101350600 = "청소한 지 3일 만에 또 어질러진 부실을 청소하려니."
10135-101350610 = "맥이 좀 빠져서요."
10135-101350620 = "부실 청소?"
10135-101350630 = "그런 게 있어요."
10135-101350640 = "샬레 앞에 다 왔는데, 올라갈게요."
10135-101350650 = "케이 쨩의 당번!!!"
10135-101350660 = "아 진짜 좀."
10135-101350670 = "기숙사, 도착했습니다……."
10135-101350680 = "잘 들어갔구나."
10135-101350690 = "네."
10135-101350700 = "아!"
10135-101350710 = "왜 그래?"
10135-101350720 = "일퀘 안 했어요!"
10135-101350730 = "아, 응. 그래. 그거 중요하지."
