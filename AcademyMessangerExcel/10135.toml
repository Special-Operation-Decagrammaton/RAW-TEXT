10135-101350600 = "ฉันว่าจะทำความสะอาดห้องชมรม\nที่ผ่านมาแค่ 3 วันก็เละเทะอีกแล้ว"
10135-101350610 = "แต่ก็เหนื่อยตั้งแต่ยังไม่ทันเริ่มเลยค่ะ"
10135-101350620 = "ทำความสะอาดห้องชมรมเหรอ?"
10135-101350630 = "ใช่ค่ะ"
10135-101350640 = "ฉันมาถึงหน้าชาเล่ต์แล้ว จะขึ้นไปเลย\nนะคะ"
10135-101350650 = "วันนี้เวรของเคย์จัง!!!"
