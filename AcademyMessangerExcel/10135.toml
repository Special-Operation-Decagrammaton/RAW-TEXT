10135-101350060 = "ต้องหาวิธีคลายเครียดยังไงเหรอคะ?"
10135-101350070 = "เป็นคำถามที่เข้าใจยากตั้งแต่\nเริ่มประโยคเลยนะ..."
10135-101350080 = "ก็คงงั้นละค่ะ"
10135-101350090 = "ฉันผิดเองค่ะที่มาคาดหวังอะไรจาก\nคุณครู"
10135-101350100 = "แรงจัง..."
10135-101350110 = "คุณครู"
10135-101350120 = "มีอะไรเหรอ เคย์จัง?"
10135-101350130 = "ไม่ใช่เคย์จังค่ะ"
10135-101350140 = "เอาเถอะ"
10135-101350150 = "จะมาจริงๆ หรือเปล่าคะ?"
10135-101350160 = "ก็สัญญาไว้แล้วนี่นา เคย์จัง"
10135-101350170 = "มันก็จริงอยู่หรอก!"
10135-101350180 = "แต่คุณครูถึงกับต้องมาสังเกตการณ์\nคลาสเรียนของฉันเลยเหรอคะ!"
10135-101350190 = "การติดตามผลการเรียนของนักเรียน"
10135-101350200 = "คือหนึ่งในหน้าที่ของคนเป็นครูนะ"
10135-101350210 = "ทีอย่างนี้ละ ชอบยกเหตุผลที่ฟังขึ้น\nมาตลอดเลยนะคะ!"
10135-101350220 = "เหมือนกับว่า"
10135-101350230 = "สุดท้ายแล้ว"
10135-101350240 = "ฉันได้รับ... คำเชิญจากทั่วสารทิศเลย\nละค่ะ"
10135-101350250 = "ครูคนนี้ดีใจมากเลย"
10135-101350260 = "ฮึ่ย"
10135-101350270 = "ไม่ชอบขนาดนั้นเลยเหรอ...?"
