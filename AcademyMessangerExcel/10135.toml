10135-101350440 = "ฉันกำลังเจออะไรแบบนั้นน่ะค่ะ"
10135-101350450 = "เอ๋?"
10135-101350460 = "เดี๋ยวนะ"
10135-101350470 = "ฮืม"
10135-101350480 = "คุณครู"
10135-101350490 = "ตอนนี้พอมีเวลาใช่มั้ยคะ?"
