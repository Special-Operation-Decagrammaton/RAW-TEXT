[translation]
10027-100270010 = "선생님. 혹시 지금 괜찮을까? 한 가지 부탁이 있는데……."
10027-100270020 = "응. 무슨 일이야?"
10027-100270030 = "물론이지. 무슨 일이야?"
10027-100270040 = "별 건 아니고, 작전 수행에 필요한 물건들이 생겼는데 선생님이 좀 가져다줬으면 해."
10027-100270050 = "여기까지 와줄 필요는 없고 지정한 장소로 가져가면 아스나 선배가 기다리고 있을 거야."
10027-100270060 = "웬만하면 우리들 선에서 해결하겠지만, 상황이 좀 여의치가 않게 됐네."
10027-100270070 = "그런 거라면야 얼마든지."
10027-100270080 = "걱정 마. 금방 출발할 테니."
10027-100270090 = "아아."
10027-100270100 = "고마워, 선생님. 직접 만나진 않겠지만 미리 감사를 표하지."
10027-100270110 = "그럼 기다리고 있을게."
10027-100270120 = "선생님"
10027-100270130 = "어쨌거나 오늘 일은 크게 도움을 받았어."
10027-100270140 = "언젠가는 꼭 은혜를 갚도록 하지."
10027-100270150 = "은혜라……. 기대가 됩니다."
10027-100270160 = "앞으로도 종종 이런 일로 불러주는 건 어때?"
10027-100270170 = "……."
10027-100270180 = "으음……."
10027-100270190 = "선생님. 지금 혹시 한가한가?"
10027-100270200 = "별 건 아니고, 역시 입으로만 감사하긴 좀 그래서."
10027-100270210 = "그간 받았던 도움들에 대한 답례를 좀 하고자 하는데."
10027-100270220 = "마침 잠입 수사 중인데, 잠입한 일이 접객과 관련된 일이라서 말이지."
10027-100270230 = "바쁘지 않다면 대접할 겸 초대하려고 하는데……. 괜찮겠어?"
10027-100270240 = "나야 좋지. 불러줘서 고마워."
10027-100270250 = "좋아, 이날만을 기다리고 있었다!"
10027-100270260 = "음."
10027-100270270 = "……."
10027-100270280 = "확인했다."
10027-100270290 = "아무튼 그럼 그때 보도록 하지."
10027-100270300 = "……."
10027-100270310 = "음"
10027-100270320 = "선생님. 오늘 일 말인데……."
10027-100270330 = "……."
10027-100270340 = "음."
10027-100270350 = "역시 아무것도 아니야. 다음에 다시 이야기하지."
10027-100270360 = "선생님. 혹시 다음에 시간 괜찮을까."
10027-100270370 = "선생님만 괜찮다면, 조금 진지한 이야기를 해볼까 해서 말이지."
10027-100270380 = "……혹시 바니걸 복장에 관한 거야?"
10027-100270390 = "드디어 올 것이 온 건가."
10027-100270400 = "음"
10027-100270410 = "역시 아직은 무리인가"
10027-100270420 = "미안. 이 이야기는 없던 것으로"
10027-100270430 = "아마 내가 너무 서둘렀던 거 같아."
10027-100270440 = "아니. 차라리 잘 됐어."
10027-100270450 = "이 기회에 확실하게 하자."
10027-100270460 = "정말이야?"
10027-100270470 = "아니."
10027-100270480 = "알겠어. 선생님."
10027-100270490 = "그럼 비밀 유지를 위해 가장 안전한 곳으로 장소를 잡을게."
10027-100270500 = "조금 이따가 봐."
10027-100270510 = "선생님."
10027-100270520 = "음"
10027-100270530 = "오늘 입은 옷의 경우에는 아무래도 잘 질리지는 않을 것 같다."
10027-100270540 = "어쨌든 오늘 일 덕분에, 이 옷은 개인적으로 꽤 특별한 옷이 됐으니까 말이야."
10027-100270550 = "나에게 중요한 것을 알게 해 준……"
10027-100270560 = "이것도 다 선생님 덕이지만 말이지"
10027-100270570 = "그럼 다음에 다시 연락하지."
10027-100270580 = "연락 고마워, 선생님. 저격수가 필요하다고?"
10027-100270590 = "그렇다면 상세히 알려줘."
10027-100270600 = "응! 바니걸 저격수가 필요해!"
10027-100270610 = "특수한 임무인가 보네."
10027-100270620 = "좋아. 맡겨줘."
10027-100270630 = "랑데부 포인트는 어디지?"
