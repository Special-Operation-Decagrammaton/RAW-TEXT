[translation]
20054-200540010 = "ตอนนี้คุณครูอาจจะ"
20054-200540020 = "นอนหลับปุ๋ยอยู่ใช่มั้ยคะ?"
20054-200540030 = "ที่จริง MOMOTALK นี้ของฉัน"
20054-200540040 = "ก็ส่งแบบตั้งเวลาไว้ค่ะ"
20054-200540050 = "ถ้างั้นก็ คุณครูคะ"
20054-200540060 = "ถ้าถึงเวลาตื่น ฉันจะช่วยปลุกให้"
20054-200540070 = "เพราะงั้นก็ไม่ต้องตกใจมากนะคะ"
20054-200540080 = "ก๊อกๆๆ"
20054-200540090 = "ตื่นได้แล้วค่ะ คุณครู"
20054-200540100 = "คุณครูน่าจะทานมื้อกลางวันไปแล้ว"
20054-200540110 = "เวลาพักกลางวันก็ใกล้จะสิ้นสุดลง\nแล้วด้วยค่ะ"
20054-200540120 = "งืมมม..."
20054-200540130 = "ตื่นแล้ว... ตื่นแล้วก็ได้..."
20054-200540140 = "ค่ะ"
20054-200540150 = "ขอบคุณค่ะ"
20054-200540160 = "ถ้างั้นงานช่วงบ่ายนี้"
20054-200540170 = "ก็มาพยายามไปด้วยกันนะคะ"
20054-200540180 = "ตกเย็นแล้วสินะคะ"
20054-200540190 = "นั่นสินะ จะหมดไปอีกวันแล้ว"
20054-200540200 = "ฮุฮุ"
20054-200540210 = "ที่ฉันจะบอกก็คือ ถึงเวลาที่จะ"
20054-200540220 = "แสดงตัวตนที่แท้จริงของวีลแชร์\nกลางแจ้ง"
20054-200540230 = "ของฉันให้คุณครูดูแล้วค่ะ"
20054-200540240 = "เข้ามาเลย... ครูพร้อมทุกเมื่ออยู่แล้ว!"
20054-200540250 = "ตอบอย่างกระตือรือร้นเลย"
20054-200540260 = "ขอบคุณนะคะ"
20054-200540270 = "ฉันจะให้ของขวัญเป็นความทรงจำ\nที่ลืมไม่ลงเลยค่ะ"
20054-200540280 = "วันนี้"
20054-200540290 = "ทำได้ดีมากเลยค่ะ"
20054-200540300 = "จะว่าชั่วครู่แต่ก็แสนนาน จะว่า\nแสนนานแต่ก็ชั่วครู่..."
20054-200540310 = "ฮุฮุ"
20054-200540320 = "ฉันก็รู้สึกแบบนั้นเหมือนกันค่ะ"
20054-200540330 = "พรุ่งนี้ก็คงเป็นการเริ่มต้นของอีกวัน\nนะคะ"
20054-200540340 = "ดวงอาทิตย์ดวงต่อไปก็จะโผล่ขึ้น\nมาด้วย"
20054-200540350 = "พักผ่อนให้เต็มที่นะคะ คุณครู"
20054-200540360 = "ฮิมาริก็ฝันดีนะ"
20054-200540370 = "แล้วก็ช่วยตั้งตารอ"
20054-200540380 = "ผู้ดูแลส่วนตัวที่มีรอยยิ้มฮีลใจเหมือน\nยาวิเศษ"
20054-200540390 = "ในวันพรุ่งนี้ด้วยนะคะ"
20054-200540400 = "ยังไม่ยอมแพ้เรื่องนี้สินะ..."
20054-200540410 = "...?"
20054-200540420 = "คุณครู ตอนนี้กี่โมงแล้วคะ?!"
20054-200540430 = "โอ๊ะ ตื่นแล้วสินะ ฮิมาริ"
20054-200540440 = "ฮิมาริตื่นสายทั้งที~ เสียดายที่\nไม่ได้ถ่ายรูปไว้นะเนี่ย~"
20054-200540450 = "...!"
20054-200540460 = "ไหงเป็นงี้ล่ะ..."
20054-200540470 = "แฮ็กเกอร์ผู้มีรอยยิ้มฮีลใจเหมือน\nยาวิเศษที่สมบูรณ์แบบทำพลาด\nแบบนี้ได้ยังไง..."
20054-200540480 = "ครูจะเอาข้าวไปให้ รอครูก่อนล่ะ~"
20054-200540490 = "ก๊อกๆๆ"
20054-200540500 = "นอนหลับสบายมั้ยคะ?"
20054-200540510 = "ครูกลับเข้ามาที่นี่ตั้งแต่ตอนไหนน่ะ..."
20054-200540520 = "อืม คือว่า"
20054-200540530 = "แบบว่า"
20054-200540540 = "พอดีเอมิเข้ามาปลุกฉัน"
20054-200540550 = "ก็เลยพาคุณครูกลับไปที่ห้องของ\nคุณครูน่ะสิคะ"
20054-200540560 = "อย่างนี้นี่เอง..."
20054-200540570 = "เอาละๆ!"
20054-200540580 = "วันนี้มาเริ่มกันใหม่ค่ะ คุณครู!"
20054-200540590 = "ฉันจะกลับมากระฉับกระเฉงอีกครั้ง"
20054-200540600 = "และจะมาเป็นผู้ดูแลส่วนตัวของคุณครู\nให้อีกค่ะ"
