[translation]
26013-260130010 = "คุณครู สวัสดี"
26013-260130020 = "ว่าไง อาสึโกะ"
26013-260130030 = "การมาทะเลนี่มันคุ้มค่ากับที่คาดหวัง\nเอาไว้เลยนะ"
26013-260130040 = "ฉันละสายตาจากที่นี่ไม่ได้เลย"
26013-260130050 = "ทั้งทะเล ทั้งงานเทศกาล ทุกอย่างเป็น\nสิ่งที่ฉันเพิ่งเคยเห็นเป็นครั้งแรกเลย"
26013-260130060 = "ถ้าอาสึโกะสนุกครูก็ดีใจนะ"
26013-260130070 = "อื้อ ในเมื่อได้มาแล้ว ฉันเลยจะถ่ายรูป\nเก็บไว้น่ะ"
26013-260130080 = "ฉันว่าจะไปหาจุดที่ถ่ายรูปสวยๆ\nในชายหาด"
26013-260130090 = "คุณครูไปด้วยกันมั้ย?"
26013-260130100 = "คุณครู"
26013-260130110 = "ยุ่งอยู่หรือเปล่า?"
26013-260130120 = "ไม่หรอก ตอนนี้กำลังว่างเลย"
26013-260130130 = "งั้นช่วยมาหาฉันหน่อยสิ"
26013-260130140 = "ฉันมี 2 อย่างที่อยากถ่ายเก็บไว้น่ะ"
26013-260130150 = "อ่า"
26013-260130160 = "ครั้งนี้ฉันใส่แบตเตอรี่กล้องแล้ว"
26013-260130170 = "คุณครู"
26013-260130180 = "ฉันมีข่าวร้ายมาบอก"
26013-260130190 = "มีเรื่องอะไรเหรอ?"
26013-260130200 = "แบตเตอรี่กล้องดิจิทัลเหลืออีกไม่เยอะ\nแล้วน่ะ"
26013-260130210 = "ถึงจะยังใช้งานได้อยู่ แต่ก็ต้องถ่าย\nแต่สิ่งที่จำเป็นเท่านั้น"
26013-260130220 = "ตอนนี้จะถ่ายอะไร ฉันต้องคิดให้\nรอบคอบเลยละ"
