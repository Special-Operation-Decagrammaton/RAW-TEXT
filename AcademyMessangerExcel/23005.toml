[translation]
23005-2194 = "안녕하세요, 선생님. 아야네입니다."
23005-2195 = "혹시 잠깐 시간 괜찮으세요?"
23005-2196 = "괜찮아. 무슨 일이야?"
23005-2197 = "매우 바쁘지만, 아야네를 위해서라면 괜찮습니다."
23005-2198 = "네. 다름이 아니라……"
23005-2199 = "아, 아하하……. 가, 감사해요."
23005-2200 = "다름이 아니라……."
23005-2201 = "상담이랄까, 의논이랄까……."
23005-2202 = "잠깐 얘기를 했으면 해서요."
23005-2203 = "귀찮게 해서 죄송합니다!"
23005-2204 = "알았어."
23005-2205 = "응. 문제없지."
23005-2206 = "네! 감사합니다! 그럼 휴일에 아비도스 학교에서 뵙겠습니다!"
23005-2207 = "선생님. 그 책 있잖아요."
23005-2208 = "상점가의 앤티크 샵에 의뢰해봤는데……"
23005-2209 = "큰 가치가 없는 오래된 통속 소설이라고 하더라구요……."
23005-2210 = "저런."
23005-2211 = "역시 그렇구나."
23005-2212 = "아하하…… 그치만 그래도 1200엔이나 받았어요."
23005-2213 = "가치가 없다고는 해도 그 정도는 되나 봐요."
23005-2214 = "시간 낭비는 아니었네."
23005-2215 = "그래도 다행이네."
23005-2216 = "아하하…… 그러게요."
23005-2217 = "그럼 선생님, 다음에도 쓸데없는 상담 부탁드리겠습니다."
23005-2218 = "선생님. 좋은 소식이에요."
23005-2219 = "새로운 물건들을 발견했는데요."
23005-2220 = "어쩐지 돈이 될 것 같은 물건들이 잔뜩 있어서……."
23005-2221 = "후후……. 횡재한 느낌이네요."
23005-2222 = "무슨 물건인데?"
23005-2223 = "음……. 고철 더미인데,"
23005-2224 = "고철값을 받을 수 있지 않을까 싶어서……."
23005-2225 = "내가 가볼게."
23005-2226 = "네?"
23005-2227 = "아, 아뇨. 굳이 귀찮으실 텐데 굳이……."
23005-2228 = "고생 많으셨습니다. 선생님."
23005-2229 = "괜찮아……?"
23005-2230 = "네. 괜찮아요."
23005-2231 = "교복이 다 찢어졌고 안경도 한쪽 다리가 흔들리지만……."
23005-2232 = "2배나 더 비싸게 팔 수 있었으니까요!"
23005-2233 = "…… 수고 많았어……."
23005-2234 = "최근 학교 시설이 자주 고장 나서 걱정이에요."
23005-2235 = "어제는 정전이 2시간이나 계속되기도 했고……."
23005-2236 = "그저께는 수도가 끊기기도 했었어요."
23005-2237 = "지하에 있는 시설들 중에 뭔가 문제가 생긴 걸까요……."
23005-2238 = "기술자를 불러보는 건 어때?"
23005-2239 = "사람을 불러서 봐달라고 해."
23005-2240 = "아하하…… 고장 난 곳을 모두 봐달라고 하면 돈이 남아나지 않을 거예요."
23005-2241 = "이런 건 짬짬이 쉬는 날 제가 고치거나 해야 해서……."
23005-2242 = "내가 도울까?"
23005-2243 = "같이 고쳐보자."
23005-2244 = "아…… 정말요?"
23005-2245 = "그러면 기꺼이 신세를 지겠습니다, 선생님."
23005-2246 = "오늘 고생하셨습니다. 선생님."
23005-2247 = "다행히 별일 없이 학교 수리를 끝마칠 수 있었어요."
23005-2248 = "응. 수고 많았어."
23005-2249 = "아야네도 고생했어."
23005-2250 = "음…… 저기……"
23005-2251 = "그러니까……"
23005-2252 = "응?"
23005-2253 = "왜 그래?"
23005-2254 = "다음에 또…… 불러도 되죠? 그러니까……."
23005-2255 = "제가 오늘 민폐를……. 끼쳤지만…… 그래도……."
23005-2256 = "물론이야."
23005-2257 = "당연하지. 언제든지 불러줘."
23005-2258 = "아하하…… 고맙습니다, 선생님."
23005-2259 = "그럼 다음에 또."
23005-230050010 = "안녕하세요. 선생님."
23005-230050020 = "당번에 앞서, 오늘 샬레의 업무 상황을 여쭤보고 싶은데요."
23005-230050030 = "살려줘 아야네……."
23005-230050040 = "오늘은 특히 서류 지옥이야……."
23005-230050050 = "그, 그런가요?"
23005-230050060 = "최대한 빠르게 가겠습니다!"
