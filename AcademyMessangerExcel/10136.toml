[translation]
10136-101360010 = "หลับฝันดีหรือเปล่า คุณครู?"
10136-101360020 = "คุณครู?"
10136-101360030 = "ฮัลโหล?"
10136-101360040 = "หืม?"
10136-101360050 = "ขอบใจที่ปลุกนะ เอมิ..."
10136-101360060 = "แค่ตื่นก็โอเคแล้วละ"
10136-101360070 = "เดี๋ยวเจอกันนะ"
10136-101360080 = "มื้อเย็นอร่อยมั้ย?"
10136-101360090 = "จะว่าอร่อยก็อร่อย จะว่าเฉยๆ... ก็ได้..."
10136-101360100 = "ตรงไปตรงมาจังเลยนะ"
10136-101360110 = "ฉันคิดว่าเป็นมื้อที่ดีเพราะมีสารอาหาร\nเพียงพอน่ะ"
10136-101360120 = "ตอนนี้เอมิกำลังจะทำอะไรเหรอ?"
10136-101360130 = "คิดว่า"
10136-101360140 = "จะออกไปลาดตระเวนตอนกลางคืน\nหน่อยน่ะ"
10136-101360150 = "ไปทำอะไรนะ...?"
10136-101360160 = "คุณ!#@$%!^ครู?"
10136-101360170 = "เอมิ?"
10136-101360180 = "ค่อย@^#*&ยังชั่วหน่อย"
10136-101360190 = "อาจเป็นเพราะ"
10136-101360200 = "แบตเตอรี่*&#SA~จะหมด"
10136-101360210 = "ส่ง&@ad*&พิกัด"
10136-101360220 = "วันนี้ก็เหนื่อยหน่อยนะ คุณครู"
10136-101360230 = "ใกล้เลิกงานแล้วสินะ..."
10136-101360240 = "ใช่เลย"
10136-101360250 = "บางครั้งก็ชอบคิดเรื่องเวลาตามใจ\nไปหน่อยน่ะ"
10136-101360260 = "วันนี้ส่วนใหญ่ทำแต่งานออฟฟิศ\nใช่มั้ย?"
10136-101360270 = "อื้อ"
10136-101360280 = "เพราะงั้นเลยว่าจะไปเปลี่ยน\nบรรยากาศสักหน่อย"
10136-101360290 = "คุณครู?"
10136-101360300 = "ไม่เป็นไรใช่มั้ย?"
10136-101360310 = "ครูสบายดีนะ ทำไมเหรอ?"
10136-101360320 = "แค่สงสัยว่าจะเป็นหวัดรึเปล่าน่ะ"
10136-101360330 = "เลยเป็นห่วงนิดหน่อย"
10136-101360340 = "ครูไม่ได้อ่อนแอขนาดนั้นสักหน่อย..."
10136-101360350 = "นั่นสินะ"
10136-101360360 = "น่าเสียดาย"
10136-101360370 = "ไม่ใช่สิ"
10136-101360380 = "ดีแล้วละ"
10136-101360390 = "เมื่อกี้คิดจะพิมพ์อะไรกันแน่...!"
10136-101360400 = "บอกมาเลยนะ นักเรียนเอมิ!"
10136-101360410 = "เปล่าซะหน่อย"
10136-101360420 = "ก็แค่"
10136-101360430 = "ได้ยินมาว่าการใช้อุณหภูมิร่างกาย\nของมนุษย์"
10136-101360440 = "ทำให้ร่างกายอบอุ่นน่ะ เป็นวิธีที่มี\nประสิทธิภาพที่สุดแล้ว"
10136-101360450 = "เอมิ...?"
10136-101360460 = "คุณเอมิ?!?!"
