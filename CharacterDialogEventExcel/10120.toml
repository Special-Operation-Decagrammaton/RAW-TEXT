[translation]
10120-260 = "후후, 어서 오라고,\n선생님."
10120-270 = "편한 곳에 앉아."
10120-280 = "곧 연주가\n시작될 테니."
10120-290 = "응? 무슨 일이야, 선생님?"
10120-300 = "찌를 거라면\n어깨를 찔러 줘……"
