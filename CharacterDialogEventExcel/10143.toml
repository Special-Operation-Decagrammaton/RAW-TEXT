[translation]
10143-310 = "비경에 도착했네요……\n후훗, 어떠세요,\n선생님?"
10143-320 = "저요?\n왠지 신선하고,\n즐겁네요."
10143-330 = "혹시 나중에 시간\n괜찮으실까요?"
10143-340 = "후후.\n대단한 건 아니고요."
10143-350 = "그냥……\n선생님과 같이,"
10143-360 = "이곳을 둘러보고\n싶어서요."
10143-370 = "선생님과 다른 분들과\n함께 이런 여행……\n정말로, 좋네요."
10143-380 = "저는 잊지 않을\n거예요."
10143-390 = "아이란, 참으로\n순수하죠."
10143-400 = "우리가 생각하는 것\n이상으로, 다양한 것을\n받아들이고 있으니까요."
10143-410 = "그러니, 이끌어주어야\n하는 거예요."
10143-420 = "선생님께서 저희를\n보실 때……"
10143-430 = "그렇게 생각하시는\n것처럼요."
10143-440 = "고생 많으셨어요,\n선생님.\n네…… 정말로요."
10143-450 = "그러면 지금부터라도\n즐기지 못한 피서……"
10143-460 = "함께, 어떠세요?"
10143-470 = "부르셨나요, 선생님?\n준비운동은\n확실히 하셨죠?"
10143-480 = "물에 들어가실 때는,"
10143-490 = "다리부터 천천히\n물을 적셔야 해요."
10143-500 = "네. 저는\n여기 있답니다."
10143-510 = "혹시 춥거나 그러시면……\n제가, 따듯하게\n해 드릴게요."
10143-520 = "왓, 거긴 안돼요,\n선생님……!"
10143-530 = "읏…..."
10143-540 = "조금만이라면, 허락해\n드리겠지만요……?"
10143-550 = "정말! 선생님도……\n떽, 이에요!"
10143-560 = "나중에 저희 둘만\n있을 때,\n아셨죠……?"
10143-570 = "안녕하세요, 선생님!\n어서 오세요!"
10143-580 = "선생님의\n슈에링이랍니다!"
10143-590 = "와아!\n선생님이 오셨어요!"
10143-600 = "지금, 이 모습으로\n괜찮냐고요?"
10143-610 = "후훗, 저는 언제나\n괜찮은데요?"
10143-611 = "앗, 선생님! 에헤헤.\n이렇게\n기다리고 있었답니다?"
10143-612 = "할 일이 전~부\n끝나셨다면……\n놀러 가지 않으실래요?"
10143-613 = "물론……\n단둘이서, 요."
10143-620 = "어때요, 선생님?\n새로우신가요?"
10143-630 = "어라? 왜 그러세요?"
10143-640 = "혹시 '슈에링'과는……"
10143-650 = "놀고 싶지\n않으신 건가요?"
10143-660 = "저는요."
10143-670 = "선생님과\n같이 있을 때가\n가장 좋아요!"
10143-680 = "왜냐하면……\n지금만큼은"
10143-690 = "정말로\n솔직해질 수 있거든요."
10143-700 = "어린아이의 몸, 최고!"
10143-710 = "대단해요, 선생님!\n당첨이에요!"
10143-720 = "상점가 분들이\n상품을 준비했대요!"
10143-730 = "와아! 멋져요!\n선생님. 저도 그 상품\n보고 싶은데요……?"
10143-740 = "뭔가요? 뭔가요?\n분명\n대단한 걸 거예요!"
10143-750 = "뭔가요? 뭔가요?\n분명\n대단한 걸 거예요!"
10143-960 = "피서라고는 했지만……\n사실 명목은\n감찰이었죠."
10143-970 = "오늘 일과를\n확인해 볼까요?"
10143-980 = "이번 피서……\n감사 활동이"
10143-990 = "계곡이라니……\n뜻깊은 일일지도요."
10143-1000 = "선생님, 괜찮으시다면\n과일 어떠신가요?"
10143-1010 = "쉬실 겸……\n자, 여기요."
10143-1020 = "수고하셨어요."
10143-1030 = "저쪽에서 여러 가지로\n준비해 주신\n모양이에요."
10143-1040 = "선생님의 시간은\n물론 선생님\n것이겠지만……"
10143-1050 = "그 일부를,\n아주 조금……"
10143-1060 = "공유하고 싶다는\n생각이 들 때가\n있답니다."
10143-1070 = "그거 아시나요, 선생님?\n저는 가끔 주책맞다는\n말을 듣곤 하지만……"
10143-1080 = "그게 효과적일\n때가 있답니다."
10143-1090 = "가령 이렇게……\n선생님과 같이\n있을 시간을"
10143-1100 = "만들기도 편하고\n말이죠……?"
