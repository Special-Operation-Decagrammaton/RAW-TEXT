[translation]
10138-120 = "Sensei, this way."
10138-130 = "Let's expose these baseless rumors together."
10138-140 = "My seniors gave me an amulet. Where did I put it...?"
10138-150 = " The ONLY reason I'm looking for it is because it was a GIFT!"
10138-160 = "I-I will never, ever give up!"
10138-170 = "I'll prove that it's all a lie!"
10138-180 = "Shyaaah! Con artist! Fake! Bring it on!"
10138-190 = "I'll bust them all by tonight!"
10138-200 = "Lots of incredibly suspicious things happened..."
10138-210 = "Eh, I had fun, so I think it's fine!"
10138-220 = "Hmph! It's all a big sham anyway!"
10138-230 = "...P-Probably."
10138-240 = "E-Everything feels so spooky all of a sudden..."
10138-250 = "M-Must've been the wind... Right?"
10138-260 = "*sigh* What do you mean, \"a Tsuchinoko\"?"
10138-270 = "It was probably just a lizard!"
10138-280 = "E-EEEEK?!"
10138-290 = "...Oh, it's just Sensei—wait, but don't poke me out of nowhere like that!"
10138-300 = "Th-There's a whole pile of suspicious things..."
10138-310 = "There might be something useful in there. Want to check it out first?"
10138-320 = "Sensei, do you know what this is?"
10138-330 = "There's so much stuff here..."
10138-340 = "Well, looking back... Maybe I made some good memories. Heehee."
10138-350 = "Th-This place is safe, right?"
10138-360 = "A-A ghost isn't going to jump out at us, right?"
10138-370 = "D-Don't just stare at me! HELP ME!"
10138-380 = "Sorting all this out by myself is scary—I mean, TIRING!"
10138-390 = "Huh? Isn't that kinda useful?"
10138-400 = "Wait, it was in that pile of junk? That one?"
10138-410 = "I hope you find some use for it..."
10138-420 = "Here, take it. I'm the one who brought it, so you should be thankful, okay?"
10138-520 = "Hmm, should we try to put together the clues we've found so far?"
10138-530 = "Let's organize this case together."
10138-540 = "Hmph, I knew it'd be a baseless rumor."
10138-550 = "Let's keep up the pace and move on to the next rumor!"
10138-560 = "H-Honestly, I'm more scared of that shaky bridge than ghosts..."
10138-570 = "Shyaaah! Stop fooling around! Focus on the investigation!"
