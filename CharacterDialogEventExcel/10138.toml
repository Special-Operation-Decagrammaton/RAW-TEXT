[translation]
10138-120 = "선생님, 이쪽."
10138-130 = "같이 이곳의\n엉터리 소문을\n파헤쳐 보자고."
10138-140 = "선배들이 부적을 줬는데\n어디에 뒀더라……"
10138-150 = "이, 일단 받은 거니까\n찾는 것뿐이야!"
10138-160 = "나, 나는 끝까지\n포기하지 않아!"
10138-170 = "다 거짓말이라고\n증명할 거야!"
10138-180 = "샤아악! 사기꾼!\n엉터리! 덤비라고!"
10138-190 = "오늘 밤 안에\n다 해치워 주겠어!"
10138-200 = "수상한 일이\n잔뜩 있었지만……."
10138-210 = "뭐, 즐거웠으니까 됐어."
10138-220 = "흥, 어차피 다 사기니까!"
10138-230 = "……아, 아마도."
10138-240 = "가, 갑자기\n으스스한데……."
10138-250 = "바, 바람 때문이지……?\n그치?"
10138-260 = "하아, 무슨 츠치노코야."
10138-270 = "도마뱀을 잘못 본 거겠지!"
10138-280 = "히, 히이익?!"
10138-290 = "……뭐야, 선생님이네.\n아니, 갑자기 찌르지\n말라구!"
10138-300 = "수, 수상한 물건이 산처럼……."
10138-310 = "쓸만한 물건이 있을지도.\n일단 볼래?"
10138-320 = "선생님, 이게 뭔지 알아?"
10138-330 = "뭔가 물건들이 다양하게 있어."
10138-340 = "뭐, 돌아보면……\n좋은 추억일지도. 후후."
10138-350 = "여, 여기는 안전하겠지?"
10138-360 = "갑자기 귀신이 나타나진 않겠지?"
10138-370 = "보, 보고 있지만 말고\n좀 도와줘!"
10138-380 = "혼자 이걸 정리하는 거,\n무섭― 힘들어!"
10138-390 = "어? 그건 꽤 쓸만한데?"
10138-400 = "엇, 잡동사니 속에 있었다고?\n그거."
10138-410 = "진짜 도움이 된다면\n좋겠는데……."
10138-420 = "자 받아. 일단 가져온 건 나니까\n고마워하라구?"
10138-520 = "으음, 그동안 모은 단서를\n취합해 볼까?"
10138-530 = "같이 사건을 정리하자."
10138-540 = "흥, 역시 별거 아닌 소문이었네."
10138-550 = "이 기세로 다음 소문도\n확인하는 거야!"
10138-560 = "소, 솔직히 귀신보다\n저 흔들다리가 더 무서워……."
10138-570 = "샤아악! 놀지 말고 조사에 집중!"
