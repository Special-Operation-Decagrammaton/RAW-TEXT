[translation]
20059-240 = "자아, 어떤 사건이\n우릴 기다리고 있을까?"
20059-250 = "이번 일도 엄청\n재밌을 것 같아! 그치?"
20059-260 = "장난은 실전처럼!\n실전은 장난처럼♪"
20059-270 = "흐응~? 잠입 경로는\n저쪽일까나?"
20059-280 = "왜에? 무츠키 쨩이랑\n놀고 싶어? 쿠후훗."
20059-290 = "이번 일 끝나면,\n같이 오페라를 보러 가자!\n분명 즐거울 거야♪"
