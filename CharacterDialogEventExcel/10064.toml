[translation]
10064-560 = "เหนื่อยหน่อยนะ ครู\nดีจังที่ได้เจอครูที่\nงานเทศกาลแบบนี้ด้วย"
10064-570 = "ขอพรเสร็จแล้วเหรอ?"
10064-580 = "ถึงทุกสิ่งทุกอย่างที่เกิดขึ้น\nจะไม่เป็นไปตามที่คิดก็จริง"
10064-590 = "แต่การขอพรก็เป็นสิ่ง\nที่ทำได้ตามที่ต้องการนี่นะ"
10064-670 = "ปีนี้ก็ขอให้มีแต่วันที่\nสงบสุขเหมือนเดิมนะ"
10064-680 = "ใช้เงินที่เก็บไว้สำหรับซื้อ\nอัลบั้มใหม่ขอพรไปหมดแล้ว\nจะไม่เป็นไรแน่งั้นเหรอ?"
10064-690 = "ก็นะ... ถึงมันจะดูเป็นการ\nทำเกินตัวไปหน่อยก็เถอะ"
10064-700 = "แต่แลกกับรอยยิ้มของประธาน\nแบบนั้นละก็ ถือว่าเป็นราคา\nที่ไม่ได้แพงอะไรเลยละ"
10064-710 = "ช่วงนี้ฮารุกะ...\nดูเหมือนจะฝืน\nเกินตัวไปอยู่สักหน่อย"
10064-720 = "จะเป็นอะไรรึเปล่านะ..."
10064-730 = "(พวกแก๊งคุโระกาเมะ\nรู้สึกสังหรณ์ใจ\nไม่ดีเลยแฮะ...)"
10064-1070 = "เหนื่อยหน่อยนะ ครู\nดีจังที่ได้เจอครูที่\nงานเทศกาลแบบนี้ด้วย"
10064-1080 = "ขอพรเสร็จแล้วเหรอ?"
10064-1090 = "ถึงทุกสิ่งทุกอย่างที่เกิดขึ้น\nจะไม่เป็นไปตามที่คิดก็จริง"
10064-1100 = "แต่การขอพรก็เป็นสิ่ง\nที่ทำได้ตามที่ต้องการนี่นะ"
10064-1110 = "รู้สึกได้กลิ่น...\nอะไรไม่ดีเลย..."
10064-1120 = "ตู้บริจาคโดนขโมยไปงั้นเหรอ..."
10064-1130 = "ฉันไม่ได้อยากจะเข้าไป\nพัวพันกับเรื่องน่ารำคาญหรอก..."
10064-1140 = "แต่ถ้าเป็นคำสั่งของประธาน\nก็คงช่วยไม่ได้ละนะ"
10064-1150 = "เฮ้อ... วุ่นวายกัน\nจริงๆ เลยแฮะ"
10064-1160 = "แถมตอนท้ายก็ยังต้อง\nปะทะกับหุ่นยนต์ประหลาด\nพวกนั้นอีก..."
10064-1170 = "แต่ว่า...\nพอเกิดเรื่องแบบนั้น\nก็ไม่ได้รู้สึกเบื่อเลย"
10064-1180 = "ปีนี้ก็ขอให้มีแต่วันที่\nสงบสุขเหมือนเดิมนะ"
10064-1190 = "ใช้เงินที่เก็บไว้สำหรับซื้อ\nอัลบั้มใหม่ขอพรไปหมดแล้ว\nจะไม่เป็นไรแน่งั้นเหรอ?"
10064-1200 = "ก็นะ... ถึงมันจะดูเป็นการ\nทำเกินตัวไปหน่อยก็เถอะ"
10064-1210 = "แต่แลกกับรอยยิ้มของประธาน\nแบบนั้นละก็ ถือว่าเป็นราคา\nที่ไม่ได้แพงอะไรเลยละ"
10064-1220 = "ช่วงนี้ฮารุกะ...\nดูเหมือนจะฝืน\nเกินตัวไปอยู่สักหน่อย"
10064-1230 = "จะเป็นอะไรรึเปล่านะ..."
10064-1240 = "(...พวกแก๊งคุโระกาเมะ\nรู้สึกสังหรณ์ใจ\nไม่ดีเลยแฮะ...)"
10064-1420 = "คุณครูมาพอดีเลยนะ\nมีเรื่องสำคัญบางอย่างน่ะ"
10064-1430 = "ขอโทษที่มีเรื่องรบกวน\nตั้งแต่วันปีใหม่แบบนี้...แต่ขอเวลาหน่อยได้รึเปล่า?"
10064-1440 = "หน่วยรับจ้างสารพัดมีเรื่อง\nไหว้วานคุณครูแบบนี้..."
10064-1450 = "พอบทบาทสลับกันแบบนี้\nมันก็รู้แปลกๆ แฮะ..."
10064-1460 = "โทษที ฉันไม่เหมือนมุสึกิหรอก\nไม่ค่อยชินกับเรื่องแบบนี้เท่าไรน่ะ..."
10064-1470 = "ในเวลาแบบนี้ คือว่า... ฉันไม่รู้เลย\nควรจะต้องทำหน้ายังไงดี..."
10064-1480 = "ขอบคุณที่ช่วยนะ เอ้านี่ ถึงตาของ\nหน่วยรับจ้างสารพัด 68 แล้ว"
10064-1490 = "ขอบคุณนะ รอดมาได้\nเพราะได้ครูช่วยเอาไว้เลย"
