[translation]
20039-240 = "Welcome to Shanhaijing, Sensei."
20039-250 = "I hope you enjoy the Moonlight Festival to the fullest."
20039-260 = "Let me know if you don't know where to go."
20039-270 = "I'll have someone help you right away."
20039-280 = "I didn't know it would turn out like this..."
20039-290 = "I'm causing trouble for you, Sensei."
20039-300 = "You'll...stay by my side, won't you?"
20039-310 = "Everything will come full circle and return to you..."
20039-320 = "Now, let us go reclaim our Shanhaijing."
20039-330 = "Great work, Sensei."
20039-340 = "As president of the Genryumon, and also as a student..."
20039-350 = "You have my genuine respect and gratitude."
20039-360 = "Many stories cross paths during the Moonlight Festival."
20039-370 = "Fufu. If you're interested, why don't you investigate?"
20039-380 = "Black Tortoise Promenade is using the Moonlight Festival as an opportunity to mingle with the outside world."
20039-390 = "Although I made no particular statement as president..."
20039-400 = "The Genryumon and Black Tortoise Promenade. Which side does the underlying problem lie on...?"
20039-410 = "I'm sorry, Sensei. Even though I'm president, there are things I don't know."
20039-420 = "As long as I'm president, I will guarantee the safety of Shanhaijing."
20039-430 = "No matter who the opponent is."
20039-440 = "That goes for you too, Sensei."
20039-640 = "You're here. Right now..."
20039-650 = "I see. Well, it's time to refresh yourself now. Fufu."
20039-660 = "We've prepared some entertainment for you."
20039-670 = "Please enjoy."
20039-680 = "...But please be careful not to overeat."
20039-690 = "There's still time remaining."
20039-700 = "Let's stay together until the very end."
20039-710 = "What is it, Sensei?"
20039-720 = "Huh? You want me to taste it first?"
20039-730 = "Do you know what that means? Fufu."
20039-740 = "What if that doesn't bother me?"
20039-750 = "Do you want a bite, Sensei?"
20039-760 = "I've already tried it. You don't have to worry. Heehee."
20039-770 = "The snacks are one of the Moonlight Festival's specialties."
20039-780 = "Should we look for them together?"
20039-790 = "Learning something new is a good thing."
20039-800 = "Don't you agree?"
20039-810 = "Do you like sweets, Sensei?"
20039-820 = "To me, they're...just so-so."
20039-830 = "Oh... That's interesting."
20039-840 = "Can I try it, too?"
20039-850 = "You did it, Sensei. "
20039-860 = "But you won't rest on your laurels. Right?"
20039-870 = "Work, you say? ...You're wondering why I'm here?"
20039-880 = "It's because this is the president's duty, too."
20039-890 = "Each day is a new day."
20039-900 = "That means you have to better yourself every single day."
20039-910 = "If you ever need help, I'll always lend you a hand."
20039-920 = "What is it, Sensei? You want to tickle me?"
20039-930 = "Fufu. That's a bit rude."
20039-940 = "But I'll forgive even that."
20039-950 = "Are you playing a prank?"
20039-960 = "Okay. I'll allow it. Just between you and me, Sensei."
20039-970 = "...But please don't when other people are around."
20039-980 = "Yes. You made this happen. Don't refuse, just take it."
20039-990 = "You're very loyal, Sensei."
20039-1000 = "If I can, I'd like to keep you by my side forever..."
20039-1010 = "No, no. Forget it."
