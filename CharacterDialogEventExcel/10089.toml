[translation]
10089-10 = "자, 일할 시간이야.\n선생님."
10089-20 = "마침 잘 왔어.\n선생님에게 보여줄 게 있거든."
10089-30 = "음…? 선생님?\n무슨 일이야?"
10089-40 = "쉬, 쉿! 조용히!"
10089-50 = "잠입이 들켜 버리잖아…!"
10089-60 = "히익…!?"
10089-70 = "아…. 선생님이잖아."
10089-80 = "여, 여기는 위험해…\n밖에서 이야기하자."
10089-90 = "히익…!?"
10089-100 = "아…. 선생님이잖아."
10089-110 = "여, 여기는 위험해…\n밖에서 이야기하자."
10089-310 = "그럼, 단서를 모아볼까."
10089-320 = "선생님, 자료를 정리하고 싶어."
10089-330 = "어울려 줄 수 있을까?"
10089-340 = "타깃에 대해,\n좀 더 알아보고 싶어."
10089-350 = "지, 집중해.\n아니, 나 말고, 자료에!"
10089-360 = "으, 으응?\n뭔가 할 말이라도 있어……?"
10089-370 = "아아, 그런 거였구나."
10089-380 = "완전히, 이해했어."
10089-390 = "역시, 내가 눈여겨본 파트너야."
10089-400 = "정보는 갖추어졌지만…\n만약을 위해, 조금 더 살펴보자."
