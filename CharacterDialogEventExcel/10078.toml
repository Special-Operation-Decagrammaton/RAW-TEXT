[translation]
10078-10 = "哈～哈哈哈哈！\n又見面了啊，老師！"
10078-20 = "老師！這邊這邊！\n等你很久囉～！"
10078-30 = "嗯？有什麼事嗎？"
10078-40 = "如果以為\n我不會反擊\n就為所欲為……\n要做好覺悟哦！"
10078-50 = "那是在催我嗎？"
10078-60 = "……之後會好～好\n負起責任的吧？"
10078-70 = "哈～哈哈哈哈！\n別搔我癢啦！\n很癢耶！"
10078-80 = "嗯？有什麼事嗎？"
10078-90 = "如果以為\n我不會反擊\n就為所欲為……\n要做好覺悟哦！"
10078-100 = "那是在催我嗎？"
10078-110 = "……之後會好～好\n負起責任的吧？"
10078-120 = "哈～哈哈哈哈！\n別搔我癢啦！\n很癢耶！"
10078-220 = "那麼，要找什麼呢？"
10078-230 = "來！這裡什麼都有哦！\n除了沒有的東西之外！\n哈～哈哈哈！"
10078-240 = "店馬上就要打烊了！\n有多少就拿多少吧～！"
10078-250 = "嗯？怎麼了？"
10078-260 = "一不留神就會賣光的！"
10078-270 = "嗯，果然選了那個。\n老師很有眼光呢。"
10078-280 = "太棒了！"
10078-290 = "原來如此！這個也不錯呢！"
10078-300 = "原來是想要那個啊！"
