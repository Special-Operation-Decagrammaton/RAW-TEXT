[translation]
10078-10 = "와핫핫하-!\n또 보는구만, 선생님!"
10078-20 = "선생님! 여기다, 여기!\n기다리고 있었다고~?"
10078-30 = "음? 뭐 할 말 있어?"
10078-40 = "내가 반격하지 않을 거라고\n생각하고 마음대로\n하다니…… 각오하라고!"
10078-50 = "그건 재촉하는 건가?"
10078-60 = "……나중에 제~대로 책임,\n질 수 있겠지?"
10078-70 = "와핫핫핫하!\n간지럼피우지 말라고!\n간지러워!"
10078-80 = "음? 뭐 할 말 있어?"
10078-90 = "내가 반격하지 않을 거라고\n생각하고 마음대로\n하다니…… 각오하라고!"
10078-100 = "그건 재촉하는 건가?"
10078-110 = "……나중에 제~대로 책임,\n질 수 있겠지?"
10078-120 = "와핫핫핫하!\n간지럼피우지 말라고!\n간지러워!"
10078-220 = "자. 뭘 찾으시나?"
10078-230 = "자! 여기는 뭐든지 있어!\n없는 것 말고는!\n와핫핫핫!"
10078-240 = "곧 가게 마감이니까!\n있는 만큼 가져가~!"
10078-250 = "응? 왜 그러지?"
10078-260 = "한눈팔면 다 팔려버린다!"
10078-270 = "음, 역시 그걸로 했구나.\n선생님은 좋은 심미안을\n가지고 있군."
10078-280 = "훌륭하구만!"
10078-290 = "과연! 그것도 나쁘지 않아!"
10078-300 = "그걸 갖고 싶었구나!"
