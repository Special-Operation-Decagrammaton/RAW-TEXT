[translation]
10078-10 = "วะฮ่าฮ่าฮ่า!\nได้เจอกันอีกแล้วนะคุณครู!"
10078-20 = "คุณครู! ทางนี้ๆ!\nฉันกำลังรออยู่เลยนะ~"
10078-30 = "หืม? มีอะไรจะบอกเหรอ?"
10078-40 = "คิดว่าฉันจะไม่ตอบโต้\nแล้วทำอะไรตามใจงั้นเหรอ\nเตรียมตัวโดนไว้เลยนะ!"
10078-50 = "จะรบเร้ากันงั้นเหรอ?"
10078-60 = "...ต่อไปจะรับผิดชอบไหว~\nใช่มั้ย?"
10078-70 = "วะฮะฮะฮะฮ่า!\nอย่ามาจั๊กจี้กันสิ!\nจั๊กจี้นะ!"
10078-80 = "หืม? มีอะไรจะบอกเหรอ?"
10078-90 = "คิดว่าฉันจะไม่ตอบโต้\nแล้วทำอะไรตามใจงั้นเหรอ\nเตรียมตัวโดนไว้เลยนะ!"
10078-100 = "จะรบเร้ากันงั้นเหรอ?"
10078-110 = "...ต่อไปจะ\nรับผิดชอบไหว~ ใช่มั้ย?"
10078-120 = "วะฮะฮะฮะฮ่า!\nอย่ามาจั๊กจี้กันสิ!\nจั๊กจี้นะ!"
10078-220 = "อืม หาอะไรอยู่เหรอ?"
10078-230 = "เอาละ! ตรงนี้มีทุกอย่างเลย!\nถ้าไม่นับของที่ไม่มีน่ะนะ! วะฮะฮะฮ่า!"
10078-240 = "ใกล้จะปิดร้านแล้วนะ!\nเหมาไปให้หมดเลย~!"
10078-250 = "หืม? เป็นอะไรเหรอ?"
10078-260 = "ถ้าวอกแวกละก็ เดี๋ยวของจะขายหมดซะก่อนนะ!"
10078-270 = "อืม เอาชิ้นนั้นไปนี่เอง\nคุณครูตาถึงอยู่นะเนี่ย"
10078-280 = "ยอดเยี่ยมเลย!"
10078-290 = "ชิ้นนั้นก็ไม่เลวเลยนะ!"
10078-300 = "อยากได้ชิ้นนั้นเองสินะ!"
