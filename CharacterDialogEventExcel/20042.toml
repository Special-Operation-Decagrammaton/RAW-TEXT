20042-770 = "특히 저녁에 먹은\n미즈타키는 정말\n최고였어…"
20042-780 = "핸드폰만 있다면\n한 번쯤은 다시 와도\n괜찮을 것 같아."
20042-790 = "무, 물론 캠핑이\n좋아졌다는\n뜻은 아니지만……!"
