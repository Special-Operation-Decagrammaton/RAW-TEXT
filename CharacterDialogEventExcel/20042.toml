[translation]
20042-200 = "심심해……"
20042-210 = "단순한 게임기라도\n가져왔으면\n좋았을 텐데……"
20042-220 = "전자파를\n느끼고 싶어……"
20042-230 = "으으… 연말에는 재미있는\n방송이 잔뜩 있는데,\n그 실황을 볼 수 없다니…"
20042-240 = "치히로 선배도 너무해!"
20042-250 = "아, 저 구름… 뭔가\n서버 컴퓨터랑 생긴 게\n닮은 것 같기도."
20042-260 = "으으, 오랜만에\n키보드에서 손을 떼고\n가만히 있으려니\n손이 심심해서 못 견디겠어."
20042-270 = "선생님, 뭔가 손으로\n가지고 놀만한 장난감\n같은 거 안 갖고 있어?\n고무줄이라도 괜찮으니까!"
20042-280 = "선생님은 즐기고\n있구나, 캠핑."
20042-290 = "그럼, 나도 조금은\n기분을 내볼까!"
20042-700 = "심심해……"
