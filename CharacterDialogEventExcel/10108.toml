[translation]
10108-10 = "你來啦，老師！"
10108-20 = "沒想到老師會過來。"
10108-30 = "你好，老師。"
10108-40 = "難得有機會就來\n開個睡衣派對，\n本來是這麼想的……"
10108-50 = "結果卻變得\n有點傷腦筋……"
10108-60 = "小～雪～！！"
10108-70 = "這次我絕對\n不會放過你的！"
10108-80 = "老師也請不要\n阻止我哦！？"
10108-90 = "總算是解決了呢……"
10108-100 = "這次也受老師照顧了。"
10108-110 = "小雪，是嗎？"
10108-120 = "……這次，\n我打算放過他。"
10108-130 = "啊，你來啦，老師。\n如果不介意的話……\n要不要稍微休息一下？"
10108-140 = "咦？\n這樣的我也很新鮮？"
10108-150 = "謝，謝謝。"
10108-160 = "能聽到老師\n這麼說……"
10108-170 = "真讓人開心，非常開心。"
10108-180 = "再次認知到了\n我是個女高中生……？"
10108-190 = "所以你平常都是\n怎麼看待我的！？"
10108-200 = "桌遊的真實感雖然\n有趣，但棋子的管理\n也很不容易呢。"
10108-210 = "而且在千年，\n不擅長整理整頓的孩子，\n還挺多的……"
10108-220 = "那個，老師？\n能請你不要再戳我的\n肚子附近了嗎……？"
10108-230 = "……要是敢說我胖了，\n我真的會生氣的哦。"
10108-410 = "有需要什麼東西嗎？"
10108-420 = "我正在整理迎接年末的備品，\n有需要的話請儘管拿吧。"
10108-430 = "為了睡衣派對，\n我正在整理備品。"
10108-440 = "老師如果需要什麼的話，\n請跟我說一聲吧。"
10108-450 = "貴安，老師！"
10108-460 = "有沒有遺漏什麼事情，\n還請在結束之前確認一下哦！"
10108-470 = "明明是在做派對的準備，\n總覺得像是在做\n會計的工作一樣……"
10108-480 = "話說夏萊的便利商店，"
10108-490 = "也是由一個女孩子單獨\n在管理賣場對吧……？"
10108-500 = "他幾乎不曾離開崗位，\n真的有好好休息嗎？"
10108-510 = "你要這個嗎？"
10108-520 = "真是合理的消費呢。"
10108-530 = "收據就……\n啊，我先幫你收著吧。"
10108-540 = "之後再幫你記到\n夏萊的記帳本裡。"
10108-550 = "呵呵，好像能分析出\n老師的消費習慣呢。"
