[translation]
10108-10 = "เชิญค่ะ คุณครู!"
10108-20 = "ฉันไม่รู้เลยค่ะ\nว่าคุณครูจะมาน่ะ"
10108-30 = "สวัสดีค่ะ คุณครู"
10108-40 = "ฉันจะจัดปาร์ตี้ชุดนอน\nส่งท้ายปีน่ะค่ะ..."
10108-50 = "แต่ก็มีปัญหาน่าปวดหัว..."
10108-60 = "โค~ ยู~ กิ~!!!"
10108-70 = "ครั้งนี้ฉันจะ\nไม่ยอมให้จริงๆ แล้วนะคะ!"
10108-80 = "อย่าห้ามฉันนะคะ!!!"
10108-90 = "คลี่คลาย\nจนได้นะคะ..."
10108-100 = "เรื่องนี้ก็ต้อง\nขอบคุณคุณครูเลยนะคะ"
10108-110 = "โคยูกิน่ะเหรอคะ?"
10108-120 = "ฉันว่าจะหยวนๆ ให้...\nแค่ครั้งนี้ครั้งเดียวค่ะ"
10108-130 = "อ๊ะ มาแล้วสินะคะ คุณครู\nถ้ามีเวลาละก็...\nพักสักหน่อยแล้วค่อยไปมั้ยคะ?"
10108-140 = "คะ? ฉันในชุดนี้\nก็แปลกตาดีงั้นเหรอคะ?"
10108-150 = "ขะ... ขอบคุณค่ะ "
10108-160 = "ฉันได้ฟัง\nคำพูดแบบนี้จากคุณครูด้วย..."
10108-170 = "ดีใจจังเลยค่ะ"
10108-180 = "ฉันยังไม่รู้สึกเลยค่ะ\nว่าตัวเองเป็น\nเด็กนักเรียนม.ปลาย..."
10108-190 = "ถ้างั้นปกติแล้ว\nเห็นฉันเป็นยังไงเหรอคะ?!"
10108-200 = "บอร์ดเกมสนุกเพราะสมจริง\nแต่การควบคุมการพูด\nก็เป็นเรื่องที่ยุ่งยากอยู่นะคะ"
10108-210 = "นักเรียนมิลเลเนียมหลายคน\nก็บกพร่องในเรื่อง\nการจัดระเบียบนะคะ"
10108-220 = "นี่ คุณครู\nหยุดจิ้มเอว\nของฉันได้มั้ยคะ...?"
10108-230 = "ถ้าพูดว่าฉันน้ำหนักขึ้น\nหรืออะไรทำนองนั้น\nฉันจะโกรธจริงๆ ด้วยค่ะ"
10108-410 = "มีของที่ต้องการหรือเปล่าคะ?"
10108-420 = "ฉันกำลังเคลียร์ของสิ้นปีอยู่\nถ้าต้องการอะไรก็\nเอาไปได้เลยค่ะ"
10108-430 = "ฉันกำลังจัดของสำหรับ\nปาร์ตี้ชุดนอนอยู่ค่ะ"
10108-440 = "ถ้าคุณครูก็มีของที่อยากได้\nก็บอกฉันนะคะ"
10108-450 = "สวัสดีค่ะ คุณครู"
10108-460 = "ถ้าลืมอะไรตรงไหน\nก็ตรวจสอบให้รอบคอบ\nจนเสร็จเลยนะคะ!"
10108-470 = "แค่เตรียมปาร์ตี้เอง\nแต่รู้สึกเหมือนทำให้\nงานบัญชีเลื่อนออกไปเลยนะคะ..."
10108-480 = "จะว่าไป\nที่ร้านสะดวกซื้อชาเล่ต์"
10108-490 = "ก็มีเด็กน่ารักๆ คนหนึ่ง\nที่ดูแลร้านอยู่นี่คะ..."
10108-500 = "เห็นเฝ้าอยู่หน้าเคาน์เตอร์ตลอดเลย\nไม่รู้ว่าจะได้พักผ่อนบ้างหรือเปล่านะคะ?"
10108-510 = "จะเอาชิ้นนั้นเหรอคะ?"
10108-520 = "เป็นการใช้จ่ายที่\nสมเหตุสมผลเลยค่ะ"
10108-530 = "ส่วนใบเสร็จ...\nอ้อ ฉันจะเก็บไว้เองค่ะ"
10108-540 = "ไว้ฉันจะใส่เพิ่มใน\nบัญชีของชาเล่ต์ให้ค่ะ"
10108-550 = "ฮุฮุ ฉันน่าจะวิเคราะห์รูปแบบการ\nใช้จ่ายของคุณครูได้เลยนะคะ"
