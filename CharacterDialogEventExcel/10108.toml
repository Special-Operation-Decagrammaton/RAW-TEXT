[translation]
10108-10 = "Welcome, Sensei."
10108-20 = "I didn't think you would come."
10108-30 = "Hello, Sensei."
10108-40 = "We were going to have a pajama party to celebrate the end of the year, but..."
10108-50 = "...there's been a slight problem."
10108-60 = "KO! YU! KI!!!"
10108-70 = "I'm not letting her off easy this time! For real!"
10108-80 = "So please don't try to stop me!"
10108-90 = "Somehow, everything was resolved..."
10108-100 = "In a way, it's also thanks to you, Sensei."
10108-110 = "Are you talking about Koyuki?"
10108-120 = "...I'm going to let it go. Just this once."
10108-130 = "Ah, you're here, Sensei. Would you like to rest a little before you go? Only if you want to..."
10108-140 = "What? You find this side of me refreshing?"
10108-150 = "Th-Thank you. "
10108-160 = "Hearing that from you, Sensei..."
10108-170 = "It makes me really happy."
10108-180 = "Did you just realize that I'm a high school girl?"
10108-190 = "What was I to you before?!"
10108-200 = "Board games are realistic in that they are fun, but managing the pieces seems a bit tricky."
10108-210 = "This rings even more true when you consider certain Millennium students who are terrible at organizing and tidying up."
10108-220 = "Um, Sensei? Would you please stop poking my waist...?"
10108-230 = "...I'm going to genuinely get mad if you try to point out that I've gained weight."
10108-410 = "Do you need something?"
10108-420 = "With the end of the year approaching, I've been organizing supplies. Feel free to take anything you need."
10108-430 = "I'm collecting supplies for the pajama party."
10108-440 = "If there's anything you need, just let me know."
10108-450 = "Hello, Sensei."
10108-460 = "Make sure you didn't miss anything! Please check carefully!"
10108-470 = "Preparing for this party just feels like an extension of my accounting work..."
10108-480 = "Come to think of it, at the convenience store in Schale..."
10108-490 = "...there's a cute kid there who manages it."
10108-500 = "She's always there. I wonder if she gets to take proper breaks."
10108-510 = "Is that what you'd like to go with?"
10108-520 = "It seems like a reasonable choice."
10108-530 = "I'll hang onto the receipt..."
10108-540 = "I'll put it down in Schale's ledger later."
10108-550 = "Heehee. I'll be able to analyze your shopping habits this way, Sensei."
