[translation]
10116-160 = "특별 임무의 시간이군."
10116-170 = "그럼 시작하지."
10116-180 = "선생과 함께라면\n이번 일도 문제없어."
10116-190 = "음?\n지시 사항이 있나?"
10116-200 = "그냥…… 불러본\n거였다고? 어째서?"
10116-210 = "내가, 예쁘다고…?"
10116-220 = "선생은…\n이상한 농담을 하는군."
10116-230 = "읏, 그런 말을 그렇게\n쉽게 하지 말아줘."
10116-480 = "특별 임무의 시간이군."
10116-490 = "그럼 시작하지."
10116-500 = "선생과 함께라면\n이번 일도 문제없어."
10116-510 = "아직까진 여유롭군.\n이후의 지휘도 잘 부탁하지."
10116-520 = "이제 마무리 단계인가."
10116-530 = "시간 분배에\n주의해 주길 바란다."
10116-540 = "임무는 끝났지만,\n이 드레스는 계속\n입어봤으면 좋겠군."
10116-550 = "음?\n지시 사항이 있나?"
10116-560 = "그냥…… 불러본\n거였다고? 어째서?"
10116-570 = "내가, 예쁘다고…?"
10116-580 = "선생은…\n이상한 농담을 하는군."
10116-590 = "읏, 그런 말을 그렇게\n쉽게 하지 말아줘."
