[translation]
16020-200 = "드디어 작전 시작인가……"
16020-210 = "텐션 오르는걸~"
16020-220 = "기다리고 있었어.\n선생님이 없으면 작전을\n시작할 수 없으니까."
16020-230 = "<로어 추적 작전>\n이라니……"
16020-240 = "로어라는 게\n실제로 추적이\n가능한 존재이긴 한가?"
16020-250 = "응? 나, 불렀어?"
16020-260 = "니코가 만들어 준\n유부초밥은 언제\n먹어도 별미란 말이지."
16020-270 = "유키노가\n신경 쓰이는걸……"
16020-280 = "아직도 전의 일을\n신경 쓰고 있는 걸까."
16020-400 = "아, 선생님.\n마침 잘 왔어."
16020-410 = "안 그래도 물어보고 싶은\n사건 리스트가 있었거든."
16020-420 = "아, 잠깐 괜찮을까?"
16020-430 = "부탁하고 싶은 일이\n몇 가지 있어서."
16020-440 = "응? 머리카락을 왜\n빤히 쳐다보는 거야?"
16020-450 = "뭔가\n신경 쓰이는 거라도 있어?"
16020-460 = "아아, 협소한 장소에서는\n머리가 걸릴 수도 있으니까."
16020-470 = "매일 직접 땋고 있거든."
16020-480 = "귀찮아서 잘라버릴까\n생각도 했지만……"
16020-490 = "이만큼 기르고 나니\n어쩐지 아까워져서."
16020-500 = "우, 우왓?!\n찌르지 말아줄래?"
16020-510 = "……갑자기\n뒤에서 습격당하는 건\n별로 좋아하지 않거든."
16020-520 = "호오… 과연."
16020-530 = "역시 소문이 자자한 데에는\n이유가 있었네."
16020-540 = "벌써 끝난 거야?\n……빠르네."
16020-550 = "이런 실력이라면\n'지휘관'이라고 부르는 게\n더 어울리려나?"
16020-560 = "매일 직접 땋고 있거든."
