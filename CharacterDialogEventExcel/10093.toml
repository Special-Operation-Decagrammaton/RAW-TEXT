[translation]
10093-280 = "즐거운 수학여행이네!\n쌤도 준비됐어?"
10093-290 = "요자쿠라 키라라,\n즐길 준비 완료!"
10093-300 = "기대되는 것?"
10093-310 = "새로운 장소,\n새로운 먹거리,\n그리고 무엇보다……\n새로운 친구들이지!"
10093-320 = "사진 잘 나올 만한 곳을\n찾았는데, 선생님도 어때?"
10093-330 = "저기에 있는\n엄청 큰 나무인데……!"
10093-340 = "응? 무슨 일?\n뭐 재밌는 거라도 찾았어?"
10093-350 = "아하핫! 우연이네!\n나도 쌤을 보고 있었거든!"
10093-400 = "즐거운 수학여행이네!\n쌤도 준비됐어?"
10093-410 = "요자쿠라 키라라,\n즐길 준비 완료!"
10093-420 = "쌤도 여행을 즐기는 중이야?"
10093-430 = "좋네!\n나도 완전 만끽하는 중이거든!"
10093-440 = "여행이 끝나가는 건\n아쉽지만……"
10093-450 = "괜찮아, 즐거운 일은\n또 있으니까!"
10093-460 = "후아!\n마지막까지 쉴 틈 없었네!\n완전 즐거웠어!"
10093-470 = "기대되는 것?"
10093-480 = "새로운 장소,\n새로운 먹거리,\n그리고 무엇보다……\n새로운 친구들이지!"
10093-490 = "사진 잘 나올 만한 곳을\n찾았는데, 선생님도 어때?"
10093-500 = "저기에 있는\n엄청 큰 나무인데……!"
10093-510 = "응? 무슨 일?\n뭐 재밌는 거라도 찾았어?"
10093-520 = "아하핫! 우연이네!\n나도 쌤을 보고 있었거든!"
10093-700 = "어서 와, 쌤!\n준비는 됐어?"
10093-710 = "뭐가 나올까~\n설레지 않아?"
10093-720 = "마지막까지 힘내자, 쌤!"
10093-730 = "어떤 게 당첨일까~"
10093-740 = "뽑아보지 않으면 모르니까,\n거침없이 뽑자!"
10093-750 = "우와!\n완전 레어 카드잖아!\n쌤, 대단해!"
10093-760 = "좋은 카드인걸!\n축하해!"
10093-770 = "자주 보는 거지만……\n그림이 귀여우니 좋잖아?"
10093-780 = "앗, 이, 이건 예상 못 했는데……."
10093-790 = "실망하지 마, 쌤!\n다음이 있잖아!"
