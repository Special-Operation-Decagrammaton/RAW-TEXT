[translation]
20041-280 = "알맞은 타이밍에\n도착했네."
20041-290 = "그래. 지금쯤\n올 거라 생각했어."
20041-300 = "순조롭게 진행\n중이지만, 아직 안심할\n정도는 아니야."
20041-310 = "이제 거의 다 왔어."
20041-320 = "곧 말해줄 수 있겠네."
20041-330 = "잘 해결돼서 다행이네."
20041-340 = "……이건 진심이야."
20041-350 = "응? 무슨 일이야?\n갑자기 건드리고."
20041-360 = "말로 표현해\n주지 않으면,\n이해하기 힘들어."
20041-370 = "아니, 그러니까……\n으음……."
20041-380 = "뭔가 필요한 거라도\n있는 거야?"
20041-800 = "해야 할 일들을\n정리해 봤어."
20041-810 = "잘 왔어, 선생님.\n오늘의 할 일들이야."
20041-820 = "말없이\n건드리기만 하면……"
20041-830 = "이해할 수 없어."
20041-840 = "혹시 나도 똑같이"
20041-850 = "해주길 바라는 거야?"
20041-860 = "확인했어. 체크할게."
20041-870 = "완료된 리스트로 바꿔둘게."
20041-880 = "오늘은 이걸로 끝이야."
20041-890 = "……훌륭한 마무리였어."
20041-11460 = "도중에 합류하게\n된 셈이지만……"
20041-11470 = "잘 부탁할게. 선생."
20041-11480 = "딱 좋을 때에\n와 주었네, 선생."
20041-11490 = "그야말로\n합리적인 행동이야."
20041-11500 = "여기가 히마리의……"
20041-11510 = "아니,\n우리들의 기지구나."
20041-11520 = "아직도 조금\n실감이 안 나."
20041-11530 = "선생과 이렇게……\n같은 작전을\n수행한다는 것이."
20041-11540 = "내가 이야기하기에도\n조금 이상하겠지만."
20041-11550 = "다들 너무 나를\n스스럼없이 대해 줘서……"
20041-11560 = "싫다는 건,\n아니긴 한데……"
20041-11570 = "공학 부분 말고는……"
20041-11580 = "미안. 아직 그런 분야는\n잘 모르겠어."
20041-11590 = "불렀어, 선생?\n그냥 뭐 하나\n궁금했다고?"
20041-11600 = "그런 합리적이지 못한\n행동, 자제하는 게\n좋을 거야."
20041-11610 = "그…… 싫은 건,\n아닌데 말야……"
20041-11620 = "나는 내가 모든 걸\n알아야 한다고\n생각했어."
20041-11630 = "지금은…… 아직 배울\n것이 남아 있다고\n생각 중이고."
20041-11640 = "신기하네. 이것도\n어떻게 보면\n선생 덕분인 걸까."
20041-11650 = "히마리에게서\n인수인계는 받았어."
20041-11660 = "말하자면…… 여기저기에\n이름없는 신들의 힘에 의한,"
20041-11670 = "수수께끼의 물질들이\n발견되는 상황인 거네."
20041-11680 = "우리에겐 샘플이 필요한\n상황이지. 그것으로 재보급\n역시 가능할 것 같고."
20041-11690 = "왔구나, 선생.\n샘플의 양은 어느 정도야?"
20041-11700 = "협력, 고마워."
20041-11710 = "수수께끼의 물질들을 분석\n중이야. 거기에서 결과물을\n생산하고 있지."
20041-11720 = "그건 그렇고 이 장치,\n열기가 엄청나네……"
20041-11730 = "에이미는 조금\n힘들어할 것 같아."
20041-11740 = "이 장치의 작동 구조에\n대해서는 불만 없어."
20041-11750 = "의외라고? 후후.\n나라고 해도 인정할 것은\n인정할 줄 알아."
20041-11760 = "단지, 디자인만\n조금 더, 어떻게……"
20041-11770 = "나에게 말을 걸어도\n바뀌는 것은 없을 거야."
20041-11780 = "응? 내 표정이 바뀌는 걸\n볼 수 있다고?"
20041-11790 = "……이해했어. 이래서 선생을\n가끔 심술궃다고 하는구나……"
20041-11800 = "그게 이번\n분석의 결과물이야."
20041-11810 = "어서 오세요,\n어떤 걸로 하시겠습니까?"
20041-11820 = "……흉내 내본 것뿐이야.\n지금 건 잊어줘."
20041-11830 = "아주 오래전에는\n이렇게, 물건과 물건을\n교환했다고 하지."
20041-11840 = "어떤 의미로는,\n과거로 돌아간 느낌이네."
20041-11850 = "합리적으로\n보이는 결과물이네.\n좋은 선택이야."
20041-11860 = "결과가 나왔어.\n무엇을 선택할지는,\n선생에게 맡길게."
20041-11870 = "여기에서는 조금 다른\n분석 방법을\n사용하고 있어."
20041-11880 = "아주 간단하게\n이야기하자면, 우연성에\n기반한 추출이지."
20041-11890 = "복권 같은 것은\n확률적으로\n손해일 가능성이 커."
20041-11900 = "……여기에서는 어쩔 수\n없는 것 같지만."
20041-11910 = "여전히 히마리는 이런\n걸 좋아하는 모양이야."
20041-11920 = "뭐…… 시도는\n다양한 편이 좋겠지."
20041-11930 = "분석 결과를\n정확히 예측할 수\n없다는 것은……"
20041-11940 = "세미나 소속으로서,\n조금 유감이네."
20041-11950 = "만일 결과가\n좋지 않다면……"
20041-11960 = "미안해, 선생.\n그 부분은 나도 어떻게\n해 줄 수가 없어."
20041-11970 = "결과적으로는\n틀린 이야기였지만."
20041-11980 = "신은 주사위 놀이를\n하지 않는다는 말."
20041-11990 = "나는 이해가\n가는 측면이 있어."
20041-12000 = "양자역학이란\n학문은, 사실\n이해하는 게 아니야."
20041-12010 = "일단…… 외운 다음에\n시작하는 거지."
20041-12020 = "세계는 인간의 인지\n바깥에 자리하지."
20041-12030 = "……그래. 이 운에\n맡긴 분석처럼."
20041-12040 = "정말로……\n나온 거야?"
20041-12050 = "큰 수의\n법칙이라는 것이겠네."
20041-12060 = "당첨되지 않으면\n될 때까지 시행한다…"
20041-12070 = "틀린 말은, 아니긴 한데…"
20041-12080 = "세상의 대부분은\n정규분포 안에\n존재한다고 하지."
20041-12090 = "축하해, 선생.\n수고 많았어."
