[translation]
10109-240 = "Hello, Sensei. I didn't expect to run into you so late at night."
10109-250 = "It's been too long since I've seen you at Millennium."
10109-260 = "Good evening, Sensei. Fufu, this outfit?"
10109-270 = "I was preparing for a pajama party with the other members of Seminar."
10109-280 = "Are you hiding something, Sensei?"
10109-290 = "(staaare)"
10109-300 = "Heehee, things are going more enjoyably than I expected."
10109-310 = "Great job, Sensei."
10109-320 = "If you aren't too tired yet, would you mind spending a little more time with us?"
10109-330 = "...Winter nights can be very long."
10109-340 = "Wandering around the campus in our pajamas in the late hours of the night..."
10109-350 = "...makes my heart pound, like I'm doing something bad."
10109-360 = "I know most of the rules for the board games, but... "
10109-370 = "...I don't have much actual experience playing them."
10109-380 = "Despite what she says, Yuuka seems quite excited."
10109-390 = "I haven't seen Yuuka this enthusiastic in a long while."
10109-400 = "(It would have been nice if President Rio had also attended the party...)"
10109-560 = "Ah, Sensei. I was just organizing the board games we're going to play at the party."
10109-570 = "Could you help me organize the board games?"
10109-580 = "...It's a bigger mess than I expected."
10109-590 = "The party is over, but..."
10109-600 = "...please let me know if there's a board game you're interested in."
10109-610 = "It's a bit late, but..."
10109-620 = "...if you'd like, I can stay and play a little more."
10109-630 = "There's quite a variety of board games."
10109-640 = "Seriously... I told everyone to tidy up after themselves."
10109-650 = "Ah, so it was over there."
10109-660 = "Could this design be...?"
10109-670 = "Oh my, what an interesting-looking board game."
10109-680 = "I wonder how you play this."
10109-690 = "Yes, let's keep on cleaning."
10109-700 = "Oh, Sensei. If you don't mind..."
10109-710 = "...could you lend a hand with the party preparations?"
10109-720 = "We were delegating which roles we would each take on at the pajama party."
10109-730 = "Yes, please tell me."
10109-740 = "It's more comfortable tying my hair up, but the back of my neck feels a little cool..."
10109-750 = "...That was three times. You were watching, right?"
10109-760 = "Heehee, that's a good idea."
10109-770 = "Just what I'd expect you to say. I'll make note of it."
