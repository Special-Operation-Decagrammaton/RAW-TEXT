[translation]
10109-240 = "สวัสดีค่ะ คุณครู\nนี่ก็นานแล้วนะคะ"
10109-250 = "ที่ฉันไม่ได้เจอคุณครู\nในค่ำคืนที่มิลเลเนียมแบบนี้"
10109-260 = "เป็นค่ำคืนที่ดีจังเลยค่ะ คุณครู\nฮุฮุ ชุดนี้น่ะเหรอคะ?"
10109-270 = "พอดีฉันกำลังเตรียม\nปาร์ตี้ชุดนอนกับ\nสมาชิกเซมิน่าอยู่น่ะค่ะ"
10109-280 = "คุณครูมีอะไรปิดบัง\nอยู่หรือเปล่าคะ?"
10109-290 = "(จ้อง~)"
10109-300 = "ฮุฮุ งานสนุกกว่าที่คิด\nเยอะเลยนะคะ"
10109-310 = "ขอบคุณที่ทำงานอย่างหนักนะคะ คุณครู"
10109-320 = "ถ้ายังไม่เหนื่อยละก็\nมาอยู่กับฉัน\nต่ออีกหน่อยมั้ยคะ?"
10109-330 = "ค่ำคืนในฤดูหนาว\nยาวนานจังเลยนะคะ..."
10109-340 = "เราใส่ชุดนอนวิ่งวุ่น\nไปรอบโรงเรียน\nจนถึงดึกดื่นเลย"
10109-350 = "รู้สึกตื่นเต้นเหมือน\nทำเรื่องอะไรไม่ดีเลยนะคะ"
10109-360 = "ฉันรู้กฎส่วนใหญ่\nของบอร์ดเกมดี  "
10109-370 = "แต่ก็ไม่ค่อยได้\nเล่นจริงๆ บ่อยนักค่ะ"
10109-380 = "ยูกะจังน่ะ ต่อให้จะพูด\nไปอย่างนั้น แต่ก็ดู\nค่อนข้างตื่นเต้นนะคะ"
10109-390 = "ฉันไม่ได้เห็นยูกะจัง\nที่มีความปรารถนาอย่างแรงกล้า\nแบบนั้นนานแล้วค่ะ"
10109-400 = "(ถ้าประธานริโอะ\nมาเข้าร่วมปาร์ตี้ด้วย\nก็น่าจะดีนะ...)"
10109-560 = "อ๊ะ คุณครู ฉันกำลังจัดบอร์ดเกม\nที่จะใช้เล่นในปาร์ตี้อยู่เลยค่ะ"
10109-570 = "มาช่วยจัด\nบอร์ดเกมหน่อยได้มั้ยคะ?"
10109-580 = "มันปนกันยุ่ง\nกว่าที่คิดเยอะเลยค่ะ..."
10109-590 = "ถึงปาร์ตี้จะจบไปแล้ว"
10109-600 = "แต่ถ้ามีบอร์ดเกม\nที่สนใจก็บอกฉันนะคะ"
10109-610 = "ถึงมันจะดึกแล้ว..."
10109-620 = "แต่ถ้าเป็นคำขอร้องของคุณครูละก็\nฉันเล่นต่อด้วยอีกหน่อยดีมั้ยคะ?"
10109-630 = "บอร์ดเกมก็มี\nหลายประเภทเลยนะคะ"
10109-640 = "จริงๆ เลย ฉันบอกให้ทุกคน\nเก็บกวาดให้เรียบร้อยแล้วนี่นา..."
10109-650 = "อ๊ะ อยู่ทางนั้น\nสินะคะ"
10109-660 = "หรือว่า ดีไซน์นี้มัน..."
10109-670 = "อุ๊ย เป็นบอร์ดเกม\nที่น่าสนุกเลยนะคะ"
10109-680 = "อันนี้เล่นยังไง\nเหรอคะ?"
10109-690 = "ค่ะ มาเก็บกวาด\nกันต่อเลยค่ะ"
10109-700 = "อ๊ะ คุณครู ถ้าไม่ติดอะไร"
10109-710 = "มาช่วยเตรียมปาร์ตี้\nสักเดี๋ยวได้มั้ยคะ?"
10109-720 = "ฉันกำลังแบ่งงาน\nของแต่ละคน\nในปาร์ตี้ชุดนอนอยู่ค่ะ"
10109-730 = "ค่ะ บอกฉันได้เลยค่ะ"
10109-740 = "ถ้ามัดผมก็สะดวกอยู่หรอกค่ะ แต่ว่า\nมันเย็นๆ ตรงท้ายทอยจังเลยนะคะ..."
10109-750 = "นี่ก็สามครั้งแล้ว...\nคุณครูมองอยู่ตลอดเลยใช่มั้ยคะ?"
10109-760 = "ฮุฮุ เป็นไอเดียที่ดีเลยค่ะ"
10109-770 = "สมกับที่เป็นคุณครูเลยนะคะ\nฉันจะจดจำเอาไว้ค่ะ"
