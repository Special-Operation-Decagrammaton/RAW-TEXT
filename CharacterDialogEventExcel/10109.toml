[translation]
10109-240 = "呵呵，居然能像這樣\n在半夜的千年與老師"
10109-250 = "見面……\n有種久違了的感覺呢。"
10109-260 = "晚安，老師。\n呵呵，這個嗎？"
10109-270 = "我和研討會的各位\n正在舉辦睡衣派對。"
10109-280 = "……老師，你\n是不是隱瞞了什麼？"
10109-290 = "盯……"
10109-300 = "呵呵，雖然在意料之外，\n不過越來越有趣了呢。"
10109-310 = "老師，你要休息了嗎？"
10109-320 = "如果還沒的話能請你……\n再多陪陪我們嗎？"
10109-330 = "畢竟冬天的夜晚……\n是很漫長的。"
10109-340 = "穿著睡衣在深夜的\n校園裡走動……"
10109-350 = "有種在做壞事的感覺，\n真讓人興奮呢。"
10109-360 = "雖然對桌遊的規則\n有所了解……"
10109-370 = "但實際遊玩的經驗……\n卻屈指可數……"
10109-380 = "優香醬……\n雖然嘴上那麼說，\n但我認為他還挺開心的。"
10109-390 = "好久沒看見他\n那麼充滿幹勁\n的表情了。"
10109-400 = "（雖然很想讓\n莉央會長也\n參加派對……）"
10109-560 = "現在，我正在整理\n派對用的桌遊……"
10109-570 = "比想像中還雜亂……"
10109-580 = "老師，能請你\n助我一臂之力嗎？"
10109-590 = "派對雖然結束了，"
10109-600 = "但如果有感興趣的\n桌遊，還請不必客氣。"
10109-610 = "已經很晚了唷？"
10109-620 = "……但如果是\n老師的請求，\n我願意陪同。"
10109-630 = "桌遊也有很多種類呢。"
10109-640 = "用過的東西要放回原位，\n明明已經再三提過了……"
10109-650 = "啊啊，在那邊啊。"
10109-660 = "這個形狀，難道說……"
10109-670 = "哎呀，似乎挺有趣的呢。"
10109-680 = "這個……該怎麼玩呢？"
10109-690 = "好的，下一個。\n整理整頓，還會繼續唷。"
10109-700 = "啊，老師，\n如果有空的話，"
10109-710 = "能請你協助\n派對的準備嗎？"
10109-720 = "我正在決定睡衣派對\n的職責分配。"
10109-730 = "是，請儘管說。"
10109-740 = "綁起頭髮雖然方便……\n但脖子後面有點涼涼的……"
10109-750 = "3次……我指的是\n老師看向這裡的次數。"
10109-760 = "呵呵，真是個好主意，老師。"
10109-770 = "原來如此，剛才的\n我會列入參考的。"
