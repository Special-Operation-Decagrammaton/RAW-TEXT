[translation]
10136-3070 = "呀齁～老師，\n聽得到嗎？"
10136-3080 = "因為是緊急事態，\n所以用通訊連線。"
10136-3090 = "就算隔著線路，\n能看到臉還是很開心。"
10136-3100 = "雖然確保了透氣性……"
10136-3110 = "還是好熱。\n再脫一件──"
10136-3120 = "咦？停下來？這樣啊……"
10136-3130 = "好吧，既然老師\n這麼說了……"
10136-3140 = "現在的我比起狙擊手，\n更像是射手。"
10136-3150 = "移動的時候，\n會和隊伍一起。"
10136-3160 = "……能移動到涼快的地方，\n真是太好了。"
10136-3170 = "果然和老師聊天\n很開心。"
10136-3180 = "好的，辛苦了。"
