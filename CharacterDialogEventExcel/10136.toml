[translation]
10136-3070 = "얏호- 들려, 선생님?"
10136-3080 = "긴급 상황이어서,\n통신으로 연결 중이야."
10136-3090 = "회선 너머라도\n볼 수 있어서, 좋네."
10136-3100 = "통기성을 확보했지만……"
10136-3110 = "아직 더워.\n조금만 더 벗어야 하나……?"
10136-3120 = "응? 그만두라고?\n그런가……."
10136-3130 = "뭐, 선생님이\n그렇게 말한다면……."
10136-3140 = "지금 나는 저격수라기보다는\n지정 사수니까."
10136-3150 = "이동할 때는,\n팀과 함께해야 해."
10136-3160 = "……시원한 곳으로\n이동해 줘서, 다행이야."
10136-3170 = "역시 선생님과\n이야기하는 거, 즐겁네."
10136-3180 = "자, 수고했어."
