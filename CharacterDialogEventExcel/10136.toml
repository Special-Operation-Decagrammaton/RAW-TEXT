[translation]
10136-3070 = "ยะโฮ่ ได้ยินหรือเปล่า คุณครู?"
10136-3080 = "นี่เป็นสถานการณ์เร่งด่วน\nฉันก็เลยต้องโทรมาแทนน่ะ"
10136-3090 = "ดีจังเลยนะที่ได้เจอ\nผ่านการสื่อสารแบบนี้"
10136-3100 = "ชุดนี้ระบายอากาศได้แล้ว..."
10136-3110 = "แต่ก็ยังร้อนอยู่ดี\nต้องถอดมากกว่านี้หรือเปล่านะ...?"
10136-3120 = "หืม? ให้หยุดเหรอ?\nเอางั้นเหรอ..."
10136-3130 = "ก็นะ ถ้าคุณครู\nว่าอย่างนั้นละก็..."
10136-3140 = "ก็ตอนนี้ฉันเป็นพลแม่นปืน\nมากกว่าสไนเปอร์นี่เนอะ"
10136-3150 = "ตอนเคลื่อนไหว\nต้องไปพร้อมกับทีม"
10136-3160 = "พอมาในที่ที่เย็นสบาย\nก็ค่อยยังชั่วหน่อยนะ..."
10136-3170 = "การพูดคุยกับคุณครู\nเป็นเรื่องที่สนุกจริงๆ เลยนะ"
10136-3180 = "อื้อ ทำได้ดีมาก"
