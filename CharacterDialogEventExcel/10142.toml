[translation]
10142-810 = "선생님, 우리들의 활약을\n지켜봐 줄래?"
10142-820 = "후후, 내 오른손의 힘을\n모두에게 보여줄게."
10142-830 = "아직 여유 있어.\n마음을 가다듬고 가자."
10142-840 = "마지막 스퍼트를 낼 때네."
10142-850 = "모두, 힘을 내줘."
10142-860 = "선생님,\n마지막까지 고마워."
10142-870 = "다음에도 같이 즐기자."
10142-880 = "축제의 열기 때문일까?"
10142-890 = "마음이 달아오르는\n것이 느껴져."
10142-900 = "햇볕이 강하니……\n자외선 대책을\n제대로 세워야 해."
10142-910 = "피부가 타는 건 화상이래."
10142-920 = "내가……\n신경 쓰이는 거야?"
10142-930 = "미안해.\n눈에 잘 띄는 모습이라서."
10142-940 = "축제에서 먹는\n닭꼬치는 각별해."
10142-950 = "선생님도\n그렇게 생각하지?"
