10077-140 = "來，一步步開始吧！"
10077-150 = "這樣一來，\n只剩下一半了吧？"
10077-160 = "沒剩多久了呢。\n如果有我能幫忙的地方，\n希望你儘管說！"
10077-170 = "那麼，大致瀏覽一下吧！"
10077-180 = "是，我在這裡唷 。"
10077-190 = "嗯……？\n從剛才開始\n怎麼了嗎？"
10077-200 = "那種惡作劇，\n不太好唷～嘻嘻。"
10077-210 = "哈哈，老師，\n不用叫那麼多次。\n我會一直\n在這裡待命唷。"
10077-310 = "啊！老師！\n來得正好！"
10077-320 = "是來確認清單的吧？\n已經準備在這裡囉！"
10077-330 = "哎呀！怎麼這樣呢，老師。\n我也可以用同樣的方式回擊嗎？"
