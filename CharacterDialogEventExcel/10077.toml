[translation]
10077-80 = "ยินดีต้อนรับค่า~!\nทางนี้เตรียมพร้อมไว้อย่างเต็มที่แล้วค่ะ!"
10077-90 = "เอาละ มาเริ่มกันเลยค่ะ!"
10077-100 = "ค่ะ ฉันอยู่ตรงนี้ค่ะ"
10077-110 = "หืม...?\nเป็นอะไรไปตั้งแต่เมื่อกี้แล้วคะ?"
10077-120 = "แกล้งกันแบบนั้นไม่ดีนะคะ~\nฮิฮิ"
10077-130 = "ฮ่าฮ่า คุณครู\nไม่ต้องเรียกหลายๆ ครั้งแบบนั้น\nก็ได้นะคะ ยังไงฉันก็อยู่ตรงนี้\nตลอดเวลาอยู่แล้ว"
10077-140 = "เอาละ มาเริ่มกันเลยค่ะ!"
10077-150 = "เหลืออีกครึ่งหนึ่งใช่มั้ยคะ?"
10077-160 = "เราใกล้จะถึงแล้วค่ะ\nถ้ามีอะไรที่ฉันช่วยได้\nบอกฉันได้ทุกอย่างเลยนะคะ!"
10077-170 = "ถ้างั้นฉันจะไปดูรอบๆ นะคะ!"
10077-180 = "ค่ะ ฉันอยู่ตรงนี้ค่ะ"
10077-190 = "หืม...?\nเป็นอะไรไปตั้งแต่เมื่อกี้แล้วคะ?"
10077-200 = "แกล้งกันแบบนั้นไม่ดีนะคะ~\nฮิฮิ"
10077-210 = "ฮ่าฮ่า คุณครู\nไม่ต้องเรียกหลายๆ ครั้งแบบนั้น\nก็ได้นะคะ ยังไงฉัน\nก็อยู่ตรงนี้ตลอดเวลาอยู่แล้ว"
10077-310 = "เฮือก! คุณครู!\nมาได้จังหวะพอดีเลย!"
10077-320 = "จะตรวจสอบรายการของใช่มั้ยคะ?\nฉันเตรียมไว้ทางนี้แล้วค่ะ!"
10077-330 = "อ๊ะ! ทำอะไรน่ะคุณครู!\nคิดจะทำซ้ำๆ งั้นเหรอคะ?"
10077-340 = "...ต่อไปก็เตรียมตัวโดนได้เลยค่ะ!"
10077-350 = "ค่ะ! ตรวจสอบเสร็จแล้วค่า~!"
10077-360 = "อันนั้นเหรอคะ? ฉันจะไปจัดการไว้ให้ค่ะ!"
10077-370 = "เท่านี้งานของวันนี้ก็เสร็จแล้ว!\nฮิฮิ! คุณครู ทำอะไรต่อดีล่ะ?"
