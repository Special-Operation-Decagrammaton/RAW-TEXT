[translation]
10088-90 = "기다리고 있었어,\n선생. 뭘 하면 될까?"
10088-100 = "…아. 마침\n찾고 있었어, 선생."
10088-110 = "…응? 불렀어?"
10088-120 = "선생…. 장난칠\n때가 아니야."
10088-130 = "하아…. 노는 건\n일 끝나고 나서."
10088-140 = "놀리는 것 자체는\n상관없지만…"
10088-150 = "지금은 그만해 줬으면 해."
10088-160 = "뒷정리 시작할게."
10088-170 = "…응? 불렀어?"
10088-180 = "선생…. 장난칠\n때가 아니야."
10088-190 = "하아…. 노는 건\n일 끝나고 나서."
10088-200 = "놀리는 것 자체는\n상관없지만…"
10088-210 = "지금은 그만해 줬으면 해."
10088-220 = "보급이 필요한 거지?\n여기 있어."
10088-230 = "필요한 거 있으면 말해.\n가져올게."
10088-240 = "일은 끝났지만… 잊은 건 없어?"
10088-250 = "제대로 알려주면 찾아오도록 할게."
10088-260 = "선생. 그거…. 조금 간지러운데."
10088-270 = "그게 필요했구나."
10088-280 = "여기 있었구나.\n도움이 될 거야, 분명."
10088-290 = "마침 좋은 게 있어서 다행이다."
10088-300 = "좋은 선택이네."
10088-410 = "진행하고 있는 태스크를\n정리했어. 같이 보자, 선생."
10088-420 = "진행 상황 확인하러 온 거야?"
10088-430 = "선생님…… 좀……!"
10088-440 = "……선생님과 함께 일하는 거, 좋네."
10088-450 = "응. 해결됐네."
10088-460 = "나쁘지 않네."
