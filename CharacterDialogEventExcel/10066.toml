[translation]
10066-10 = "คุณครู เร็วเข้าเถอะค่ะ!\nกิจกรรมค่ะ กิจกรรม!"
10066-20 = "ถ้าเป็นอาริสึละก็\nไม่ว่าตอนไหนก็โอเคค่ะ!\nคุณครู... พร้อมแล้วรึยังคะ?"
10066-30 = "ถึงเลเวลยังไม่สูง\nพอที่จะก้าวข้ามเมดได้..."
10066-40 = "แต่อาริสึก็จะพยายามค่ะ!"
10066-50 = "คุณครูคะ ถ้าเกิดว่า\nเจอรุ่นพี่เนรุแถวนี้ละก็\nติดต่ออาริสึทันทีเลยนะคะ"
10066-60 = "ต้องติดต่อมานะคะ!\nสัญญากับอาริสึแล้วนะคะ!"
10066-70 = "ทำอาหาร ทำความสะอาด\nและการซักผ้า คือพื้นฐานของเมดค่ะ! "
10066-80 = "คุณครูเองก็จะ\nเข้าร่วมเควสด้วยมั้ยคะ?"
10066-90 = "ถะ... ถึงจะจิ้มแบบนั้นแต่ก็ไม่มี\nอะไรดร็อปออกมาหรอกนะคะ..."
10066-100 = "อาริสึไม่ใช่\nมอนสเตอร์นะคะ!"
10066-110 = "ต้องติดต่อมานะคะ!\nสัญญากับอาริสึแล้วนะคะ!"
10066-120 = "ทำอาหาร ทำความสะอาด\nและการซักผ้า\nคือพื้นฐานของเมดค่ะ!"
10066-130 = "คุณครูเองก็จะ\nเข้าร่วมเควสด้วยมั้ยคะ?"
10066-140 = "ถะ... ถึงจะจิ้มแบบนั้นแต่ก็ไม่มี\nอะไรดร็อปออกมาหรอกนะคะ..."
10066-150 = "อาริสึไม่ใช่\nมอนสเตอร์นะคะ!"
10066-500 = "เชิญค่ะคุณครู!"
10066-510 = "ผู้กล้าเมดก็สามารถ\nดูร้านค้าให้ได้นะคะ!"
10066-520 = "มีเสบียงไอเทม\nให้แลกเหลือเฟือเลยค่ะ"
10066-530 = "แต่ถ้าเป็นคุณครูละก็น่าจะเหมา\nไปทั้งหมดได้เลยนะคะ"
10066-540 = "ถึงกิจกรรมจะจบไปแล้ว\nแต่ร้านก็ยังเปิดอยู่นะคะ"
10066-550 = "มีเวลาจำกัดนะคะ อย่าลืมล่ะ\nสัญญากับอาริสึแล้วนะคะ"
10066-560 = "ยินดีต้อนรับสู่\nร้านอุปกรณ์ของอาริสึค่ะ!"
10066-570 = "ซื้อไอเทมและโพชั่นที่เป็น\nประโยชน์ต่อการผจญภัยได้ที่นี่ค่ะ!"
10066-580 = "อืม... คุณครูจะซื้อรอยยิ้มเหรอคะ?"
10066-590 = "ก็ได้ค่ะ โมโมอิบอกไว้ว่า\nรอยยิ้มราคา 0 เครดิตค่ะ!"
10066-600 = "ปาปัม ปาปัม ป๊าม! คุณครู\nซื้อไอเทมเรียบร้อยแล้วค่า!"
10066-610 = "อาริสึจะให้รอยยิ้มพิมพ์ใจ\nเป็นของแถมนะคะ!"
10066-620 = "โฮ โฮ...\nตาถึงมากเลยค่ะคุณลูกค้า"
10066-630 = "เวลานี้ต้องพูดบทนี้ค่ะ!\nอาริสึเรียนมาค่ะ!"
10066-640 = "นักเดินทางเอ๋ย...\nนั่นคือสิ่งที่เจ้าเลือกงั้นหรือ...?"
10066-650 = "เป็นไงคะคุณครู?\nอาริสึอยากพูดบทนี้มานานแล้วค่ะ!"
10066-660 = "การดูแลคลังไอเทม\nก็เป็นงานของเมดค่ะ!"
10066-670 = "ค่ะ! อาริสึพร้อม\nออกผจญภัยแล้วค่ะ!"
