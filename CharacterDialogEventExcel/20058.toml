[translation]
20058-420 = "와글와글하지?"
20058-430 = "정신없겠지만\n잘 부탁해, 선생님."
20058-440 = "얏호, 선생님.\n안 그래도\n찾고 있었는데."
20058-450 = "알겠지만,\n우리 애들이 좀\n산만하거든."
20058-460 = "도울 일이 있으면\n언제든지 말해줘."
20058-470 = "이대로 괜찮으려나……"
20058-480 = "조금 불안한데."
20058-490 = "윽, 어떡하지, 저거."
20058-500 = "저대로 두면\n안 되겠지?"
20058-510 = "여러 일들이 있었지만,\n재밌었네."
20058-520 = "선생님은 어땠어?"
