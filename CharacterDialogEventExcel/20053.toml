[translation]
20053-10 = "잠입 상황에서는\n주먹밥인가,\n병량환인가……."
20053-20 = "응? 왔구나,\n선생 공!"
20053-30 = "좋은 복장이군,\n선생 공."
20053-40 = "이런 모습은\n또 새롭네……."
20053-50 = "우냐악……!\n대체 왜 패션쇼장에서\n전투를 벌이는 건데?!"
20053-60 = "……응, 보고 싶네,\n츠쿠요."
20053-70 = "잘 지내고 있을까……\n라멘은 잘 챙겨 먹고\n있겠지?"
20053-80 = "좋아……! 이것으로\n인법연구부, 부활!"
20053-90 = "자! 선생 공도\n어서 이쪽으로!"
20053-100 = "뭔가 심심한데……."
20053-110 = "응?\n그런 말 하면 꼭 뭔가\n일이 생긴다고?"
20053-120 = "으으으……\n이 옷 뭔가 묘하게\n끼는 것 같아……."
20053-130 = "이런 걸 왜 좋다고\n입는 거지……!"
20053-140 = "닌자를 닌자로\n만드는 것은\n무엇인가……?"
20053-150 = "복장……은\n아닌 것 같고."
20053-160 = "보여주지……!\n닌자의 길에"
20053-170 = "복장 같은 것은\n아무런 방해물도 되지\n않는다는 것을……!"
20053-330 = "오오 왔군, 선생 공!\n마음 편히 둘러보라고."
20053-340 = "그런데 말이야,\n이 상품은 말이지……."
20053-350 = "없는 것만 빼고 전부 다\n준비해 뒀다고! 냐하하!"
20053-360 = "후후, 어서 문 닫고 같이\n신 닌자 정식이나 먹으러\n가자고, 선생 공!"
20053-370 = "선택은 신중하게,\n구매는 과감하게……!"
20053-380 = "그것이\n굿즈 구매의 인법……!"
20053-390 = "언젠가는 이곳에,\n소녀인법첩 미치룻치의 굿즈도\n진열을……! "
20053-400 = "좋군.\n좋은 선택이야."
20053-410 = "그래, 닌자라면\n당연히 그렇게 선택해야지!"
20053-420 = "포장하시겠습니까,\n아니면 드시고 가시겠……"
20053-430 = "아, 이게 아닌가."
20053-440 = "오오……! 맞아!\n그것이 바로 우리 상점의\n추천 상품!"
20053-450 = "사실 전부 다\n추천 상품이지만!"
20053-460 = "후후, 어서 와 선생 공."
20053-470 = "나도 마침\n라멘을 고르던 중이었다고."
20053-480 = "흠흠, 좋은 냄새……."
20053-490 = "……만 있는 건\n아닌 것 같지만! 가보자고!"
20053-500 = "잘 먹었습니다……\n이제 더는 안 들어가……."
20053-510 = "면과 수프…… 그것은\n마치 닌자와 인법……."
20053-520 = "선생 공은\n어떤 라멘이 좋아?"
20053-530 = "떠오른다……!"
20053-540 = "새로운 인법의 영감이\n떠오르는 맛이야……!"
20053-550 = "우냐아앗……?!\n이, 이 맛은……! "
20053-560 = "우읏, 이건 제법인데……?"
20053-570 = "나쁘지는 않은데……\n정말 나쁘지만 않아……!"
20053-580 = "윽, 이, 이게\n라멘……?"
