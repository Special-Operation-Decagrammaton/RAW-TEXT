[translation]
20056-790 = "누, 누구야?!"
20056-800 = "……아,\n선생님이셨군요!!"
20056-810 = "오셨군요, 선생님!"
20056-820 = "판 깔아놨으니,"
20056-830 = "일단 앉으시죠!"
20056-840 = "와버리셨군요!"
20056-850 = "역시 못 참겠죠?\n그렇죠?!"
20056-860 = "후후,\n저만 믿으시라고요."
20056-870 = "탈출은,\n이 쿠로사키 코유키의\n전문 영역이니까!"
20056-880 = "뭔가 많은 일이\n있었던 것 같은데……"
20056-890 = "뭐, 일단은"
20056-900 = "밤새 놀아보자……!"
20056-910 = "……고……요……"
20056-920 = "피휴우우……."
20056-930 = "촉감 좋죠?\n이 옷, 제법\n보들보들 하다고요!"
20056-940 = "구해주러 오셨군요,\n선생님!"
20056-950 = "에, 선생님도\n잡힌 거라고요?!"
20056-960 = "이 보드게임 이상해요!"
20056-970 = "제 차례만 되면\n터진다니까요!!"
20056-980 = "북적북적한\n반성실이라니……"
20056-990 = "뭐, 이것도\n나쁘진 않다랄까……요?"
