[translation]
20056-790 = "是，是誰！？"
20056-800 = "……啊，原來\n是老師啊！！"
20056-810 = "你來啦，老師！"
20056-820 = "準備都已經完成了，"
20056-830 = "總之請先坐下吧！"
20056-840 = "你來了呢！"
20056-850 = "果然還是忍不住了吧？\n對吧！？"
20056-860 = "呵呵，\n請交給我吧。"
20056-870 = "逃脫可是\n我的拿手好戲呢！"
20056-880 = "總覺得發生了很多事……"
20056-890 = "嗯，總之今晚就"
20056-900 = "玩到天亮吧……！"
20056-910 = "本來是想……\n這麼說的……"
20056-920 = "……尼哈。"
20056-930 = "怎麼樣啊？\n這個觸感……\n軟綿綿的對吧？"
20056-940 = "你來救我了啊，老師！"
20056-950 = "咦，老師也\n被抓住了嗎！？"
20056-960 = "這個桌遊很奇怪！"
20056-970 = "每次輪到我的時候\n就會爆炸！！"
20056-980 = "嗚嗚……\n人擠人的反省室……"
20056-990 = "算了，這樣好像\n也不差吧……？"
