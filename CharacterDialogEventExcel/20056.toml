[translation]
20056-790 = "คะ... ใครน่ะ?!"
20056-800 = "อ๊ะ...\nคุณครูเองเหรอคะ!!"
20056-810 = "มาแล้วสินะคะ คุณครู!"
20056-820 = "ฉันปูพื้นไว้ให้แล้ว"
20056-830 = "มานั่งก่อนสิคะ!"
20056-840 = "มาแล้วสินะคะ!"
20056-850 = "คงทนไม่ไหวสินะคะ?\nใช่มั้ยล่ะคะ?!"
20056-860 = "ฮุฮุ\nเชื่อมือฉันสิคะ"
20056-870 = "คุโรซากิ โคยูกิคนนี้น่ะ\nเชี่ยวชาญเรื่อง\nการหลบหนีนะคะ!"
20056-880 = "เหมือนจะมีเรื่องอะไร\nเยอะเลยแฮะ..."
20056-890 = "แต่เอาเป็นว่า"
20056-900 = "มาสนุกกันทั้งคืนก่อนดีกว่า...!"
20056-910 = "นะ... คะ..."
20056-920 = "เฮือก..."
20056-930 = "สัมผัสดีใช่มั้ยล่ะคะ?\nชุดนี้น่ะ\nนุ่มมากเลยนะคะ!"
20056-940 = "มาช่วยฉันแล้วสินะคะ\nคุณครู!"
20056-950 = "เอ๋ คุณครูก็\nถูกจับงั้นเหรอคะ?!!"
20056-960 = "บอร์ดเกมอันนี้มันแปลกๆ นะคะ!"
20056-970 = "พอถึงตาฉันทีไร\nมันก็ระเบิดทุกทีเลยค่ะ!!"
20056-980 = "ห้องสำนึกผิด\nวุ่นวายขนาดนี้เลย..."
20056-990 = "เอาเถอะ แบบนี้ก็คง\nไม่แย่เท่าไร... สินะคะ?"
