[translation]
10015-10 = "งานของวันนี้\nคืออะไรเหรอคะ?"
10015-20 = "อ๊ะ อาริสึต้องเป็น\nคนจัดการให้นี่คะ..."
10015-30 = "ถึงจะไม่มีชุดเกราะ..."
10015-40 = "และต่อให้จะไม่มี\nดาบแห่งแสง..."
10015-50 = "แต่ยังไง\nอาริสึก็ยังเป็นอาริสึค่ะ"
10015-60 = "ตราบใดที่ได้อยู่กับทุกคน\nและก็"
10015-70 = "มีคุณครูอยู่ด้วยน่ะค่ะ!"
10015-220 = "คุณครู!\nภารกิจมาแล้วค่ะ ภารกิจ!"
10015-230 = "ค่ะ! อาริสึชอบคุณครูที่เสมอต้น\nเสมอปลายมากๆ เลยละค่ะ!"
10015-240 = "ปาปัม ปาปัม ป๊าม!"
10015-250 = "คุณครู\nได้รับรางวัลแล้วค่ะ!"
10015-260 = "เยี่ยมมากเลยค่ะ คุณครู!"
10015-270 = "ค่อยๆ ทำไป\nทีละอย่างนะคะ!"
