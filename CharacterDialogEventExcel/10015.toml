[translation]
10015-10 = "오늘 할 일은\n무엇일까요?"
10015-20 = "앗, 아리스가 정리해야\n하는 것이었죠……."
10015-30 = "갑옷이 없어도……"
10015-40 = "그리고 만일,\n빛의 검마저\n없어져도……"
10015-50 = "그래도,\n아리스는 아리스입니다."
10015-60 = "모두와 함께라면,\n그리고."
10015-70 = "선생님이 계신다면요!"
10015-220 = "선생님!\n미션입니다, 미션!"
10015-230 = "네! 아리스는 언제나\n한결같은 선생님이,\n정말 좋습니다!"
10015-240 = "뽜밤뽜밤-!"
10015-250 = "선생님이\n보상을 획득했습니다!"
10015-260 = "멋집니다, 선생님!"
10015-270 = "하나하나\n해 나가는 겁니다!"
