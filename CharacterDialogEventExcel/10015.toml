[translation]
10015-10 = "今天的任務，\n是什麼呢？"
10015-20 = "啊，整理是愛麗絲\n的工作呢……"
10015-30 = "就算沒有鎧甲……"
10015-40 = "即使失去了\n光之劍……"
10015-50 = "即便如此，\n愛麗絲還是愛麗絲。"
10015-60 = "只要大家都在……\n然後。"
10015-70 = "老師也在的話！"
10015-220 = "老師！\n是任務，任務！"
10015-230 = "是！愛麗絲最喜歡\n始終如一的老師了！"
10015-240 = "乓啪喀乓──！"
10015-250 = "老師獲得了報酬！"
10015-260 = "真厲害，老師！"
10015-270 = "就這樣一步步\n繼續前進吧！"
