[translation]
10145-10 = "자아, 여름이다.\n그리고 피서다."
10145-20 = "선생은 어떻게\n생각할지 모르겠으나……"
10145-30 = "나는 지금, 제법\n들떠 있으니 말이다?"
10145-40 = "좋은 계곡이구나."
10145-50 = "특히\n저 풍경이 말이다."
10145-60 = "인간이란,\n자연 앞에서는"
10145-70 = "이렇게도 한없이\n작아지는 존재인 것을."
10145-80 = "선생님! 키키는요!\n선생님과 함께라면\n어디든 좋아요!"
10145-90 = "……지켜보고만\n있을 것이냐?"
10145-100 = "누구에게나 미숙했던\n때는 있는 법."
10145-110 = "그것과는 별개로,\n세상의 법도는"
10145-120 = "언제나 공부해야 하는\n것이고 말이다."
10145-130 = "무사히 끝이 났구나."
10145-140 = "하지만 '우리'의\n피서는, "
10145-150 = "아직 완전히\n끝나지 않은 것 같다만?"
10145-160 = "음? 왜 그러는가, 선생?"
10145-170 = "후훗, 자아.\n마음껏 만끽하도록 해라."
10145-180 = "문주의 보드라운\n살결…… 이니라?"
10145-190 = "정말로 꿈만 같구나.\n선생과 함께 이런 곳에,\n이렇게 올 수 있다니."
10145-200 = "후후…… 특별한\n의미는 없다."
10145-210 = "몸 상태가 나쁜\n것도 아니지."
10145-220 = "말 그대로\n받아들여\n주었으면 한다."
10145-230 = "산해경에서\n푸른 나비는, 때로\n불멸을 뜻하기도 한다."
10145-240 = "그 말은,\n푸른 나비는……"
10145-250 = "웬만해서는\n포기를 모른다는\n의미이기도 하지."
10145-260 = "후훗. 무얼,\n그저 농담이라\n생각해도 괜찮다."
10145-270 = "내 어리광에\n어울려 줘서"
10145-280 = "고맙구나, 선생."
10145-290 = "그리고 미리\n사과하도록 하지."
10145-300 = "지금부터,\n더 많이 어리광을\n부릴 테니 말이다."
10145-790 = "안녕하세요, 선생님!\n키키예요!"
10145-800 = "상점을 맡게 됐어요!"
10145-810 = "네? 키사키요?\n키키, 그런 거\n잘 몰라요!"
10145-820 = "어서 오세요, 선생님!"
10145-830 = "키키, 상점 잘 보고\n있었어요!\n칭찬해 주세요!"
10145-840 = "와아! 선생님이\n찾아와 주셨어요!"
10145-850 = "놓친 게 있으시면,\n얼마든지 보고 가세요!"
10145-860 = "선생님은 어떤 게\n좋으세요?\n키키는요……"
10145-870 = "선생님이 골라\n주시는 거라면\n뭐든 좋아요!"
10145-880 = "수영복,\n입어 봤는데요……"
10145-890 = "어때요?\n어울리나요?\n귀여운가요?"
10145-900 = "사실, 키키……\n수영 잘 못해요."
10145-910 = "아, 키키도\n그게 좋아 보였어요!"
10145-920 = "이럴 때는…… 그거죠?\n키키도 알아요!"
10145-930 = "매번 감사합니다!"
10145-940 = "와아! 키키도 볼래요!\n키키도요!"
10145-950 = "네! 여기 있어요!\n키키 잘했죠, 선생님?"
