[translation]
20057-980 = "I've been waiting, Sensei."
20057-990 = "Let me be your guide in Millennium."
20057-1000 = "If there's any place you wish to go, please ask me."
20057-1010 = "While it is always bustling in Millennium..."
20057-1020 = "...it's reached a new level entirely today."
20057-1030 = "Though, it is good that things are so lively."
20057-1040 = "It's finally over."
20057-1050 = "Both the Expo and the commotion."
20057-1060 = "Did you enjoy the Millennium Expo?"
20057-1070 = "I was honored to be able to spend time with you, Sensei."
20057-1080 = "...Yes, truly."
20057-1090 = "Being able to spend time with you like this..."
20057-1100 = "I quite like it."
20057-1110 = "Please let me know if you begin feeling hungry."
20057-1120 = "I know of a good dining hall."
20057-1130 = "If I were a maid, of course, I would simply cook for you..."
20057-1140 = "However, I'm just a student right now."
20057-1150 = "Did you say my name, Sensei?"
20057-1160 = "You called for me without a particular reason?"
20057-1170 = "Fufu. Oh my."
20057-1180 = "Fufu."
20057-1190 = "I am not very ticklish."
20057-1200 = "Sensei... How about you?"
