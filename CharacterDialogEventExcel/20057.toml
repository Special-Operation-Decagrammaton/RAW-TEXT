[translation]
20057-980 = "기다리고 있었습니다,\n선생님."
20057-990 = "밀레니엄의 안내는\n맡겨주세요."
20057-1000 = "가고 싶은 곳이\n있으시다면 부담 없이\n말씀 주세요."
20057-1010 = "평소에도\n북적북적하지만……"
20057-1020 = "오늘 밀레니엄은\n한층 더하네요."
20057-1030 = "활기가 있는 건,\n좋은 일이지만요."
20057-1040 = "드디어 마무리네요."
20057-1050 = "EXPO도,\n떠들썩한 사건도."
20057-1060 = "밀레니엄 EXPO,\n즐겨주셨나요?"
20057-1070 = "저는 선생님과\n함께할 수 있어\n영광이었습니다."
20057-1080 = "……네, 정말로요."
20057-1090 = "이렇게 선생님과\n시간을 보내는 것이……"
20057-1100 = "저는,\n정말로 좋네요."
20057-1110 = "배가 고프면\n말씀해 주세요."
20057-1120 = "좋은 학생 식당을\n알고 있답니다."
20057-1130 = "메이드인 저라면\n당연히 직접\n요리해 드리겠지만……"
20057-1140 = "지금 저는,\n'학생'이니까요."
20057-1150 = "부르셨나요, 선생님?"
20057-1160 = "그냥 불러 보셨다고요?"
20057-1170 = "우후훗.\n어머나."
20057-1180 = "후후."
20057-1190 = "저는 그렇게까지\n간지러움을\n잘 타지 않는답니다."
20057-1200 = "선생님께서는……\n어떠신지\n알려주시겠어요?"
