[translation]
10137-10 = "츠치노-코야아-!\n어딨-니-!"
10137-20 = "하아, 넌 잡히면 죽…… "
10137-30 = "으으……. 무서운데……."
10137-40 = "누가 해코지라도\n하는 건-- 히익?!\n누, 누구우……?"
10137-50 = "귀신이건 뭐건,\n수갑 채우면 땡이지……!"
10137-60 = "무사히 넘어갔슴다!\n운명아, 덤벼라!!\n핫핫하!!"
10137-70 = "아, 아니!! 취, 취소!!\n미안합니다, 운명님!!!"
10137-80 = "히, 히얏?!\n……아이, 깜짝이야!!"
10137-90 = "휴…… 그래도 공기는\n무지 좋슴다."
10137-100 = "츠치노코-! 잡으면 평생\n안 놔줄 검다!"
10137-110 = "펴, 평정심……\n평정심……."
10137-430 = "가자!! 팍팍 가보는 검다!!"
10137-440 = "오늘 운세 좋으셨슴까?!\n선생님만 믿겠슴다!"
10137-450 = "뒷정리 타임!\n끝까지 힘내는 검다!"
10137-460 = "운 나눠주시는 검까?\n좋아쓰!!"
10137-470 = "뭐라도 될 검다!\n선생님하고 함께니까!"
10137-480 = "크으! 이거거든!"
10137-490 = "엄청 운 좋네요?!\n선생님, 장난 아니심다!"
10137-500 = "맨날 이러면 좋겠슴다~"
10137-510 = "일단, 끝까지 찾아보는 검다!"
