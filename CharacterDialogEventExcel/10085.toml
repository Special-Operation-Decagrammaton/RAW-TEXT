[translation]
10085-100 = "We've gotta get back indoors. It's freezing."
10085-110 = "Camping, at a time like this..."
10085-120 = "I just can't with the vice president sometimes."
10085-130 = "The closest convenience store...is beyond that mountain..."
10085-140 = "(The wi-fi signal is...gone?)"
10085-150 = "This energy drink is...warm."
10085-160 = "I wouldn't normally say yes, but I'm doing a lot of things I wouldn't normally do."
10085-170 = "The hard work never ends, huh, Sensei? Even after such a tough year, you're still letting us drag you around..."
10085-180 = "...Huh? What do you mean, you're enjoying yourself?"
10085-190 = "...I guess you're popular for a reason."
10085-200 = "Th-There was a bear nearby...?"
10085-210 = "Is it okay for us to stay here?"
10085-220 = "It was a little rough, but I guess these kinds of experiences can be nice sometimes..."
10085-230 = "O-Only...if it's from time to time...!"
10085-240 = "The closest convenience store...is beyond that mountain..."
10085-250 = "(The wi-fi signal is...gone?)"
10085-260 = "This energy drink is...warm."
10085-270 = "I wouldn't normally say yes, but I'm doing a lot of things I wouldn't normally do."
10085-280 = "The hard work never ends, huh, Sensei? Even after such a tough year, you're still letting us drag you around..."
10085-290 = "...Huh? What do you mean, you're enjoying yourself?"
10085-300 = "...I guess you're popular for a reason."
10085-310 = "Did the vice president force you to come along too, Sensei? "
10085-320 = "If you don't mind, could you lend me a hand?"
10085-330 = "A-ACK! O-Oh... It's just you, Sensei."
10085-340 = "I'm sorry. I thought you were a bear."
10085-350 = "We've got to make sure we clean up everything."
10085-360 = "I don't even wanna imagine the vice president's reaction if we're not thorough..."
10085-370 = "You know, if this were a game, we could've collected all of this with just one click."
10085-380 = "Huh? What? Did I get something on my clothes?"
10085-390 = "Yeah, I think we'll manage with this."
10085-400 = "This is...for me?"
10085-410 = "Thanks. I'll give you everything I gathered in return."
10085-420 = "You gathered all this yourself?"
10085-430 = "Wow... You're made for the outdoors, Sensei."
10085-440 = "Hey, Sensei. Look, I'm making curry."
10085-450 = "I like watching it boil in the pot."
10085-460 = "It makes me feel all warm and fuzzy."
10085-470 = "So, the curry is technically ready..."
10085-480 = "But if you want to add more ingredients, let me know."
10085-490 = "Uh, is this thing working?"
10085-500 = "Can you taste test it please, Sensei?"
10085-510 = "I read once that chocolate is a good secret ingredient for curry."
10085-520 = "...So, maybe an energy drink could also work?"
10085-530 = "...! Whoa. It's actually good."
10085-540 = "I didn't know curry could BE this good."
10085-550 = "Seriously! It's delicious."
10085-560 = "It's definitely better than instant curry."
10085-570 = "Wh-What a...taste...!"
10085-580 = "Ugh. I really tried. I'm sorry."
