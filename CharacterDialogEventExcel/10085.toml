[translation]
10085-100 = "춥다…\n빨리 따듯한 실내로\n돌아가고 싶어…"
10085-110 = "이런 시기에 캠핑이라니."
10085-120 = "부부장도 너무해…"
10085-130 = "가장 가까운 편의점이…\n저 산 너머인가…"
10085-140 = "(와이파이의 신호가…\n사라졌어?)"
10085-150 = "따듯한 에너지 드링크라…"
10085-160 = "평소라면 논외겠지만,\n오늘만큼은 괜찮을지도."
10085-170 = "선생님도 고생이 많네.\n연말인데, 이런 곳까지\n끌려오다니…"
10085-180 = "응? 이런 상황도\n나름 즐겁다고?"
10085-190 = "…역시 선생님은\n인싸였나."
10085-200 = "그, 근처에서\n곰이 나왔다고…?"
10085-210 = "여기 있어도\n괜찮은 거야?"
10085-220 = "다소 고생하긴 했지만,\n가끔씩은 이런 경험도\n나쁘진 않을 지도…"
10085-230 = "가, 가끔… 정말로\n가끔씩이라면…!"
10085-240 = "가장 가까운 편의점이…\n저 산 너머인가…"
10085-250 = "(와이파이의 신호가…\n사라졌어?)"
10085-260 = "따듯한 에너지 드링크라…"
10085-270 = "평소라면 논외겠지만,\n오늘만큼은 괜찮을지도."
10085-280 = "선생님도 고생이 많네.\n연말인데, 이런 곳까지\n끌려오다니…"
10085-290 = "응? 이런 상황도\n나름 즐겁다고?"
10085-300 = "…역시 선생님은\n인싸였나."
10085-310 = "…선생님도 부부장에게\n부탁을 받고 왔어? "
10085-320 = "혹시 괜찮다면,\n좀 도와줄 수 있을까…?"
10085-330 = "으, 으앗…?\n…아, 선생님이구나…"
10085-340 = "미안, 곰이 나타난 줄 알았어."
10085-350 = "뒷정리는 확실하게 하고 가야지."
10085-360 = "나중에 부부장에게\n한 소리 들을지도 모르니까."
10085-370 = "채집이라… 이게 게임이었다면\n클릭 한 번으로 끝났을 텐데…"
10085-380 = "응? 왜 그래?\n옷에 뭐라도 묻었어?"
10085-390 = "응, 이거라면 괜찮을 것 같아."
10085-400 = "이거, 나한테 주는 거야?"
10085-410 = "고마워. 내가 모은 것도 줄게."
10085-420 = "벌써 이렇게 모아 온 거야?"
10085-430 = "…선생님은 캠핑에\n재능이 있구나…"
10085-440 = "아, 선생님.\n지금 카레를\n끓이던 중이었어."
10085-450 = "보글보글 끓고 있는\n냄비를 보고 있노라면…"
10085-460 = "왠지 따듯한 기분이 들어…"
10085-470 = "카레의 준비는 끝났지만…"
10085-480 = "혹시 더 넣고 싶은\n재료가 있다면 지금 말해줘."
10085-490 = "음… 이거 제대로\n되고 있는 건가?"
10085-500 = "선생님, 맛 좀 봐줄래?"
10085-510 = "카레에 숨김맛으로\n초콜릿을 넣기도\n한다던데."
10085-520 = "…그럼\n에너지 드링크를\n넣어봐도…"
10085-530 = "아…!\n엄청나게 맛있어."
10085-540 = "카레로 이런 맛을\n낼 수 있었다니…"
10085-550 = "음, 맛있게 잘 됐네."
10085-560 = "레토르트 카레에\n비하면 그럭저럭\n괜찮은 편이려나."
10085-570 = "이, 인상적인 맛이네…"
10085-580 = "욱… 미안,\n이건 먹을 수 없겠어…"
