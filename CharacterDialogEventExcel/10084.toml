10084-150 = "...Huh. Nothing."
10084-590 = "S-Sensei! Are you busy?"
10084-600 = "Would you help me with setting up the camp, please?"
10084-610 = "Hello, Sensei. The vice president gave me very specific orders on how to set up the camping equipment. I really am doing my best..."
10084-620 = "I was told that this camping equipment was easy to use..."
10084-630 = "But setting it up isn't easy at all."
10084-640 = "Were you trying to say something...?"
10084-650 = "Wait right there. I'm going to bring my recording devices."
10084-660 = "I see. I'll remember that."
10084-670 = "Can you show me how you did that again?"
10084-680 = "I would like a verbal, step-by-step explanation, please."
10084-690 = "Sleeping will be a lot more comfortable tonight with this."
