[translation]
10084-10 = "찬 바람이 옷 사이로\n스며들어서…"
10084-20 = "저도 모르게 몸을\n움츠리게 됩니다."
10084-30 = "일부러 밖에까지 나와서\n해를 넘겨야 한다니…\n비효율적입니다."
10084-40 = "침묵과 정적… 제가\n제일 껄끄러워하는\n환경이군요…"
10084-50 = "유일한 이점이라면,"
10084-60 = "선생님의 목소리를\n잡음 없이 또렷하게\n들을 수 있다는 것.\n정도이려나요."
10084-70 = "이 바람…\n조금 울고 있군요."
10084-80 = "주파수 검색 중…\n반경 3km 내에서의\n통신 기록은…"
10084-90 = "0건."
10084-100 = "침묵과 정적… 제가\n제일 껄끄러워하는\n환경이군요…"
10084-110 = "유일한 이점이라면,"
10084-120 = "선생님의 목소리를\n잡음 없이 또렷하게\n들을 수 있다는 것.\n정도이려나요."
10084-130 = "이 바람…\n조금 울고 있군요."
10084-140 = "주파수 검색 중…\n반경 3km 내에서의\n통신 기록은…"
10084-150 = "0건."
10084-590 = "서, 선생님…\n혹시 괜찮으시다면…"
10084-600 = "캠프 설치에 협력해\n주실 수 있으실까요…"
10084-610 = "아, 선생님. 부부장의 지시로\n캠프에 필요한 장비를\n설치하던 중이었습니다."
10084-620 = "분명 간편한 캠핑을 위한\n야영 장비라고 들었었는데…"
10084-630 = "설치는 조금도\n간편하지가 않군요."
10084-640 = "뭔가 하실 말씀이라도…?"
10084-650 = "잠시만 기다려주십시오.\n곧 녹음기를 가져오겠습니다."
10084-660 = "그렇군요. 참고하겠습니다."
10084-670 = "방금 하신 작업,\n다시 한번 보여주시지 않겠습니까?"
10084-680 = "가능하시다면 구두로\n해설도 곁들여서 부탁드립니다."
10084-690 = "이만하면 오늘 밤은\n안락하게 날 수 있겠군요."
