[translation]
16019-2150 = "아스마 토키의 상점에\n어서 오십시오. 선생님."
16019-2160 = "……거짓말이었습니다.\n모두의 상점입니다."
16019-2170 = "물품 수량은 많이\n준비하지 못했습니다만……."
16019-2180 = "그래도, 선생님께\n도움이 되었으면 합니다."
16019-2190 = "아스마 토키의 상점에\n어서 오십시오. 선생님."
16019-2200 = "……거짓말이었습니다.\n모두의 상점입니다."
16019-2210 = "물품 수량은 많이\n준비하지 못했습니다만……."
16019-2220 = "그래도, 선생님께\n도움이 되었으면 합니다."
16019-2230 = "아스마 토키.\n통신상으로나마 인사드립니다."
16019-2240 = "상황이 이렇게\n다급하지 않았다면,\n직접 뵈었을 텐데요."
16019-2250 = "아무리 비상 상황이라도,\n토키 표 상점은 영업합니다."
16019-2260 = "네. 선생님.\n저는 여기에 있습니다."
16019-2270 = "도망가지도,\n숨지도 않습니다."
16019-2280 = "아뇨…… 혹시 사라진다면,\n선생님이 저를 애타게\n찾아 주시는 걸까요?!"
16019-2290 = "어떠신가요, 선생님."
16019-2300 = "보온성과 안정성, 그리고\n심신 안정 효과도 있는."
16019-2310 = "마치 저와도 같은,\n우수한 전투복입니다."
16019-2320 = "선생님, 저와 함께\n슈트의 기능을 확인하시죠."
16019-2330 = "원하시는 만큼 제게 붙어 있어도\n좋으니, 사양 마시기를."
16019-2340 = "네. 선생님.\n저는 여기에 있습니다."
16019-2350 = "도망가지도,\n숨지도 않습니다."
16019-2360 = "아뇨…… 혹시 사라진다면,\n선생님이 저를 애타게\n찾아 주시는 걸까요?!"
16019-2370 = "어떠신가요, 선생님."
16019-2380 = "보온성과 안정성, 그리고\n심신 안정 효과도 있는."
16019-2390 = "마치 저와도 같은,\n우수한 전투복입니다."
16019-2400 = "선생님, 저와 함께\n슈트의 기능을 확인하시죠."
16019-2410 = "원하시는 만큼 제게 붙어 있어도\n좋으니, 사양 마시기를."
16019-2420 = "잠시 기다려 주십시오."
16019-2430 = "퍼펙트 메이드의 기억력으로,\n상품 위치를 떠올리겠습니다."
16019-2440 = "어쩔 수 없이\n온라인 대응 중이지만,\n영업에 지장은 없습니다."
16019-2450 = "베스트 에이전트는\n장소를 가리지 않으니까요."
16019-2460 = "구매, 감사합니다."
16019-2470 = "말씀만 하시면\n저도 구매 가능합니다."
16019-2480 = "그것이군요.\n알겠습니다."
16019-2490 = "재입고가 완료될 때까지,\n저와 좋은 시간이라도\n보내시겠습니까?"
16019-2500 = "이런 걸 좋아하시는 거군요.\n알겠습니다."
16019-2510 = "네. 여기 있습니다.\n다음에 또 찾아 주십시오."
16019-2520 = "제 얼굴을 봐서라도요."
16019-2530 = "구매, 감사합니다."
16019-2540 = "말씀만 하시면\n저도 구매 가능합니다."
16019-2550 = "그것이군요.\n알겠습니다."
16019-2560 = "재입고가 완료될 때까지,\n저와 좋은 시간이라도\n보내시겠습니까?"
16019-2570 = "이런 걸 좋아하시는 거군요.\n알겠습니다."
16019-2580 = "네. 여기 있습니다.\n다음에 또 찾아 주십시오."
16019-2590 = "제 얼굴을 봐서라도요."
16019-2600 = "그것은, 좋은 물건입니다."
16019-2610 = "그 상품은,\n뒤쪽의 선반에서 꺼내주세요."
16019-2620 = "잘못 구매한 경우에는\n반품이 가능합니다."
16019-2630 = "……죄송합니다.\n아니라고 합니다."
16019-2640 = "원하신다면 저와의 통화권을\n서비스로 넣어놓겠습니다."
16019-2650 = "당연히\n원하시겠지요?"
