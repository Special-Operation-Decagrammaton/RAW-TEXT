[translation]
16019-2150 = "歡迎光臨\n飛鳥馬季的商店。"
16019-2160 = "……我說謊了。\n這是大家的商店。"
16019-2170 = "雖然沒能準備\n太多商品……"
16019-2180 = "希望能對老師\n有所幫助。"
16019-2190 = "歡迎光臨\n飛鳥馬季的商店。"
16019-2200 = "……我說謊了。\n這是大家的商店。"
16019-2210 = "雖然沒能準備\n太多商品……"
16019-2220 = "希望能對老師\n有所幫助。"
16019-2230 = "我是飛鳥馬季。\n透過螢幕向您問好。"
16019-2240 = "本應親自拜訪，遺憾面臨\n緊急事態只能透過通訊，\n還請見諒。"
16019-2250 = "即使面臨緊急事態，\n飛鳥馬季的商店\n依然在營業。"
16019-2260 = "是的，老師。\n我在這裡。"
16019-2270 = "不會逃也不會躲──"
16019-2280 = "不……如果我消失的話，\n老師會拚命找我嗎？"
16019-2290 = "您覺得呢？"
16019-2300 = "這是具備保溫性與穩定性，\n還有身心放鬆效果的──"
16019-2310 = "簡直跟我一樣\n優秀的戰鬥服。"
16019-2320 = "老師，和我一起\n確認服裝的功能吧。"
16019-2330 = "要盡情貼著我也無妨，\n請不必客氣。"
16019-2340 = "是的，老師。\n我在這裡。"
16019-2350 = "不會逃也不會躲──"
16019-2360 = "不……如果我消失的話，\n老師會拚命找我嗎？"
16019-2370 = "您覺得呢？"
16019-2380 = "這是具備保溫性與穩定性，\n還有身心放鬆效果的──"
16019-2390 = "簡直跟我一樣\n優秀的戰鬥服。"
16019-2400 = "老師，和我一起\n確認服裝的功能吧。"
16019-2410 = "要盡情貼著我也無妨，\n請不必客氣。"
16019-2420 = "請稍等。"
16019-2430 = "我會憑藉完美女僕的記憶力，\n想起庫存的位置。"
16019-2440 = "雖然被迫改用線上服務，\n不過營業不受影響。"
16019-2450 = "因為最佳特務\n不會挑選活躍的場合。"
16019-2460 = "感謝您的購買。"
16019-2470 = "順帶一提，只要您說一聲，\n我也可以購買。"
16019-2480 = "是那個商品對吧，\n我明白了。"
16019-2490 = "在補貨完成之前，\n要不要和我邊玩邊等呢？"
16019-2500 = "您喜歡這種東西呢，\n我明白了。"
16019-2510 = "好的，請收下。\n期待您再次光臨。"
16019-2520 = "幾次都行，請來見我吧。"
16019-2530 = "感謝您的購買。"
16019-2540 = "順帶一提，只要您說一聲，\n我也可以購買。"
16019-2550 = "是那個商品對吧，\n我明白了。"
16019-2560 = "在補貨完成之前，\n要不要和我邊玩邊等呢？"
16019-2570 = "您喜歡這種東西呢，\n我明白了。"
16019-2580 = "好的，請收下。\n期待您再次光臨。"
16019-2590 = "幾次都行，請來見我吧。"
16019-2600 = "好的，我覺得很不錯。"
16019-2610 = "那個商品，\n請從後面的架子拿取。"
16019-2620 = "如果買錯的話可以退貨。"
16019-2630 = "……抱歉。\n是不行的。"
16019-2640 = "如果想要的話，\n可以將與我的通話券\n作為贈品附上。"
16019-2650 = "當然，您想要對吧？"
