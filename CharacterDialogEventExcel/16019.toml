[translation]
16019-2150 = "เชิญเข้าสู่ร้านของ\nอะซุมะ โทคิค่ะ คุณครู"
16019-2160 = "ฉันโกหกค่ะ...\nเป็นร้านของทุกคนน่ะค่ะ"
16019-2170 = "ถึงจะเตรียมสินค้ามา\nไม่ได้มาก..."
16019-2180 = "แต่ยังไงก็หวังว่า\nจะเป็นประโยชน์ต่อคุณครูนะคะ"
16019-2190 = "เชิญเข้าสู่ร้านของ\nอะซุมะ โทคิค่ะ คุณครู"
16019-2200 = "ฉันโกหกค่ะ...\nเป็นร้านของทุกคนน่ะค่ะ"
16019-2210 = "ถึงจะเตรียมสินค้ามา\nไม่ได้มาก..."
16019-2220 = "แต่ยังไงก็หวังว่า\nจะเป็นประโยชน์ต่อคุณครูนะคะ"
16019-2230 = "อะซุมะ โทคิ\nขอทักทายผ่านระบบสื่อสารค่ะ"
16019-2240 = "ถ้าสถานการณ์ไม่เร่งด่วนแบบนี้ละก็\nฉันคงไปหาด้วยตัวเองแล้วค่ะ"
16019-2250 = "ไม่ว่าสถานการณ์จะฉุกเฉินแค่ไหน\nแต่ร้านของโทคิก็เปิดให้บริการค่ะ"
16019-2260 = "ค่ะ คุณครู\nฉันอยู่ตรงนี้ค่ะ"
16019-2270 = "ฉันไม่หนี\nแล้วก็ไม่ซ่อนตัวด้วยค่ะ"
16019-2280 = "ไม่สิ... ถ้าเกิดฉันหายไป\nคุณครูจะร้อนรุ่มใจ\nแล้วมาตามหาฉันมั้ยคะ?!"
16019-2290 = "เป็นยังไงบ้างคะ คุณครู"
16019-2300 = "ทั้งรักษาความอบอุ่น ทั้งปลอดภัย\nและทำให้ร่างกายและจิตใจมั่นคง"
16019-2310 = "นี่เป็นชุดต่อสู้ที่ยอดเยี่ยม\nไม่ต่างจากตัวฉันเลยนะคะ"
16019-2320 = "คุณครูมาตรวจสอบ\nฟังก์ชันของชุดนี้กับฉันสิคะ"
16019-2330 = "อยู่ข้างๆ ฉันได้\nเท่าที่ต้องการเลยค่ะ\nไม่ต้องปฏิเสธนะคะ"
16019-2340 = "ค่ะ คุณครู\nฉันอยู่ตรงนี้ค่ะ"
16019-2350 = "ฉันไม่หนี\nแล้วก็ไม่ซ่อนตัวด้วยค่ะ"
16019-2360 = "ไม่สิ... ถ้าเกิดฉันหายไป\nคุณครูจะร้อนรุ่มใจ\nแล้วมาตามหาฉันมั้ยคะ?!"
16019-2370 = "เป็นยังไงบ้างคะ คุณครู"
16019-2380 = "ทั้งรักษาความอบอุ่น ทั้งปลอดภัย\nและทำให้ร่างกายและจิตใจมั่นคง"
16019-2390 = "นี่เป็นชุดต่อสู้ที่ยอดเยี่ยม\nไม่ต่างจากตัวฉันเลยนะคะ"
16019-2400 = "คุณครูมาตรวจสอบ\nฟังก์ชันของชุดนี้กับฉันสิคะ"
16019-2410 = "อยู่ข้างๆ ฉันได้\nเท่าที่ต้องการเลยค่ะ\nไม่ต้องปฏิเสธนะคะ"
16019-2420 = "ช่วยรอสักครู่นะคะ"
16019-2430 = "เมดที่เพอร์เฟกต์ขอนึกก่อน\nว่าสินค้าชิ้นนั้นอยู่ตรงไหนค่ะ"
16019-2440 = "ถึงจะต้องเปิดร้านออนไลน์อย่างช่วยไม่ได้\nแต่ก็ไม่เป็นอุปสรรคต่อการขายค่ะ"
16019-2450 = "สุดยอดสายลับน่ะ\nไม่เลือกสถานที่หรอกค่ะ"
16019-2460 = "ขอบคุณที่ซื้อนะคะ"
16019-2470 = "ถ้าอยากซื้อฉันไปด้วย\nก็แค่บอกกันก็พอค่ะ"
16019-2480 = "เอาเป็นอันนั้นสินะคะ\nเข้าใจแล้วค่ะ"
16019-2490 = "มาใช้ช่วงเวลาดีๆ กับฉันจนกว่าจะ\nเติมสต๊อกสินค้าจนเสร็จมั้ยคะ?"
16019-2500 = "ชอบของแบบนี้สินะคะ\nเข้าใจแล้วค่ะ"
16019-2510 = "ค่ะ นี่ค่ะ\nโอกาสหน้าเชิญใหม่นะคะ"
16019-2520 = "แวะมาดูหน้าฉันก็ยังดีค่ะ"
16019-2530 = "ขอบคุณที่ซื้อนะคะ"
16019-2540 = "ถ้าอยากซื้อฉันไปด้วย\nก็แค่บอกกันก็พอค่ะ"
16019-2550 = "เอาเป็นอันนั้นสินะคะ\nเข้าใจแล้วค่ะ"
16019-2560 = "มาใช้ช่วงเวลาดีๆ กับฉันจนกว่าจะ\nเติมสต๊อกสินค้าจนเสร็จมั้ยคะ?"
16019-2570 = "ชอบของแบบนี้สินะคะ\nเข้าใจแล้วค่ะ"
16019-2580 = "ค่ะ นี่ค่ะ\nโอกาสหน้าเชิญใหม่นะคะ"
16019-2590 = "แวะมาดูหน้าฉันก็ยังดีค่ะ"
16019-2600 = "นั่นเป็นของที่ดีเลยนะคะ"
16019-2610 = "สินค้านั้น ช่วยหยิบจาก\nชั้นวางด้านหลังนะคะ"
16019-2620 = "ถ้าซื้อผิดไป\nก็เอามาคืนได้ค่ะ"
16019-2630 = "ขอโทษด้วยค่ะ...\nมีคนบอกว่าไม่ได้ค่ะ"
16019-2640 = "ถ้าอยากได้ละก็ ฉันจะแถม\nบัตรโทรศัพท์สำหรับโทรหาฉันให้ค่ะ"
16019-2650 = "ต้องอยากได้\nใช่มั้ยล่ะคะ?"
