[translation]
10134-1550 = "คุณครู!\nภารกิจมาแล้วค่ะ ภารกิจ!"
10134-1560 = "งานของวันนี้\nคืออะไรเหรอคะ?"
10134-1570 = "อ๊ะ อาริสึต้องเป็น\nคนจัดการให้นี่คะ..."
10134-1580 = "ขอทักทายทางออนไลน์ค่ะ\nคุณครู! อาริสึเองค่ะ!"
10134-1590 = "กลายเป็นเรื่องใหญ่\nเข้าให้แล้วนะคะ..."
10134-1600 = "แต่เราจะชนะไปด้วยกันค่ะ!"
10134-1610 = "ฮุ ฮุ ฮุ..."
10134-1620 = "ชุดเกราะใหม่ของอาริสึ\nเป็นยังไงบ้างคะ คุณครู?"
10134-1630 = "ถึงจะไม่มีชุดเกราะ..."
10134-1640 = "และต่อให้\nจะไม่มีดาบแห่งแสง..."
10134-1650 = "แต่ยังไง\nอาริสึก็ยังเป็นอาริสึค่ะ"
10134-1660 = "ตราบใดที่ได้อยู่กับทุกคน"
10134-1670 = "และมีคุณครูอยู่ด้วยน่ะค่ะ!"
10134-1680 = "มัลคูธ..."
10134-1690 = "เป็นเหมือนกับ\nบอสตัวสุดท้ายสินะคะ!"
10134-1700 = "ว่าแต่... คงไม่มีบอสลับตัวอื่น\nโผล่มาหรอกใช่มั้ยคะ...?"
10134-1710 = "ถ้าได้กลับไปอย่างปลอดภัย..."
10134-1720 = "อาริสึอยากแนะนำเคย์\nให้ทุกคนรู้จักค่ะ!"
10134-1730 = "ปาปัม ปาปัม ป๊าม!"
10134-1740 = "คุณครู\nได้รับรางวัลแล้วค่ะ!"
10134-1750 = "เยี่ยมมากเลยค่ะ คุณครู!"
10134-1760 = "ค่อยๆ ทำไป\nทีละอย่างนะคะ!"
10134-1770 = "งือ... อาริสึก็อยากไปยินดี\nกับคุณครูตรงนั้นนะคะ!"
10134-1780 = "ค่ะ! อาริสึชอบคุณครูที่เสมอต้น\nเสมอปลายมากๆ เลยละค่ะ!"
