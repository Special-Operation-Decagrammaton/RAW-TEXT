[translation]
10134-1550 = "老師！\n是任務，任務！"
10134-1560 = "今天的任務，\n是什麼呢？"
10134-1570 = "啊，整理是愛麗絲\n的工作呢……"
10134-1580 = "抱歉是透過通訊！\n老師！我是愛麗絲！"
10134-1590 = "雖然變成了\n艱難的狀況……"
10134-1600 = "一起克服它吧！"
10134-1610 = "哼，哼，哼……"
10134-1620 = "覺得怎麼樣呀，老師。\n愛麗絲的新裝甲！"
10134-1630 = "就算沒有裝甲……"
10134-1640 = "即使失去了\n光之劍……"
10134-1650 = "即便如此，\n愛麗絲還是愛麗絲。"
10134-1660 = "只要大家都在……\n然後。"
10134-1670 = "老師也在的話！"
10134-1680 = "馬爾庫特……"
10134-1690 = "非常有最終BOSS的感覺！"
10134-1700 = "打倒之後……\n不會出現隱藏BOSS\n之類的吧……？"
10134-1710 = "如果能平安回去的話……"
10134-1720 = "想向大家介紹Kei！"
10134-1730 = "乓啪喀乓──！"
10134-1740 = "老師獲得了報酬！"
10134-1750 = "真厲害，老師！"
10134-1760 = "就這樣一步步\n繼續前進吧！"
10134-1770 = "嗚嗚……愛麗絲也想\n在老師身邊一起慶祝！"
10134-1780 = "是！愛麗絲最喜歡\n始終如一的老師了！"
