[translation]
10134-1550 = "선생님!\n미션입니다, 미션!"
10134-1560 = "오늘 할 일은\n무엇일까요?"
10134-1570 = "앗, 아리스가\n정리해야 하는 것이었죠……."
10134-1580 = "온라인으로 인사드립니다,\n선생님! 아리스입니다!"
10134-1590 = "엄청난 상황이\n되었습니다만……"
10134-1600 = "함께 이겨내는 겁니다!"
10134-1610 = "후. 후. 후……"
10134-1620 = "어떠신가요, 선생님.\n아리스의 새 갑옷은요!"
10134-1630 = "갑옷이 없어도……"
10134-1640 = "그리고 만일,\n빛의 검마저 없어져도……"
10134-1650 = "그래도,\n아리스는 아리스입니다."
10134-1660 = "모두와 함께라면, 그리고."
10134-1670 = "선생님이 계신다면요!"
10134-1680 = "말쿠트……"
10134-1690 = "그야말로\n최종 보스로군요!"
10134-1700 = "그런데 혹시……\n히든 보스가 등장하는 것은\n아니겠지요……?"
10134-1710 = "무사히 돌아가면……"
10134-1720 = "모두에게\n케이를 소개하고 싶습니다!"
10134-1730 = "뽜밤뽜밤-!"
10134-1740 = "선생님이\n보상을 획득했습니다!"
10134-1750 = "멋집니다, 선생님!"
10134-1760 = "하나하나\n해 나가는 겁니다!"
10134-1770 = "우우……\n아리스도 선생님 옆에서\n축하하고 싶습니다!"
10134-1780 = "네! 아리스는 언제나\n한결같은 선생님이,\n정말 좋습니다!"
