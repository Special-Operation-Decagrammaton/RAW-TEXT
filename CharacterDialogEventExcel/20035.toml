[translation]
20035-10 = "어서 와, 선생님……\n백귀야행에 잘 오셨어요……"
20035-20 = "오늘은 내가 선생님을\n안내해 줄게."
20035-30 = "가이드 카스가 츠바키,\n힘내겠습니다. 후암……"
20035-40 = "후에……\n왜 그래, 선생님?"
20035-50 = "졸고 있는 것 같아서,\n깨워 봤다고?"
20035-60 = "우웅…… 간지러워……"
20035-70 = "하지만 그 정도로,\n나의 수행을\n막을 수는 없을 거야……"
20035-80 = "자꾸 그렇게 장난치면……"
20035-90 = "침대에 같이\n누워 버릴 거야……?"
20035-100 = "응……? 오히려\n그러고 싶다고……?"
20035-110 = "혹시 신경 써 주기를\n바라는 거야……?"
20035-120 = "……그렇게 하지 않아도,\n나는 충분히 선생님을\n신경 쓰고 있는데……"
20035-130 = "자꾸 그렇게 장난치면……"
20035-140 = "침대에 같이\n누워 버릴 거야……?"
20035-150 = "응……? 오히려\n그러고 싶다고……?"
20035-160 = "혹시 신경 써 주기를\n바라는 거야……?"
20035-170 = "……그렇게 하지 않아도,\n나는 충분히 선생님을\n신경 쓰고 있는데……"
20035-800 = "매일의 일과를 제대로 하지 않으면……"
20035-810 = "좋은 꿈은 꿀 수 없대……"
20035-820 = "일정표는 확인했어……?\n그러면 내가 가이드를 해 줄게."
20035-830 = "우웅…… 그렇게 깨우지\n말아 줘, 선생님……"
20035-840 = "웅……? 아니야.\n안 잤어. 안 잤다니까……"
20035-850 = "다음 목적지로\n안내해 줄게, 선생님……"
20035-860 = "그 전에, 조금만 자고 나서……"
20035-870 = "자, 여기…… 받아가세요.\n고생 많았어, 선생님. 후훗."
20035-880 = "선생님도 수행에 열심이구나……"
20035-890 = "나도 질 수 없지. 코오……"
