[translation]
8431999016-0-Think-1 = "（收集的資料已儲存完畢）"
8431999017-0-Think-1 = "（收集的資料儲存好了）"
8431999018-0-Think-1 = "（寧瑠也得把資料帶來才行）"
8431999019-0-Think-1 = "（聖亞也得把資料拿來才行）"
8430001000-0-Think-1 = "（戴上箱子的話，只要靜止不動就不會被發現了）"
8430001000-0-Think-2 = "（抓準時機…行動吧！）"
8430001010-1-Talk-1 = "…是…"
8430001010-2-Talk-1 = "…我…"
8430001010-0-Think-1 = "（還有點距離…）"
8430001030-1-Talk-1 = "交接時間快到了。"
8430001030-2-Talk-1 = "趕快完成交易回去吧！"
8430001030-0-Think-1 = "（……到這裡應該可以了）"
8430001040-0-Think-1 = "（還有需要完成的事情）"
8430001050-0-Think-1 = "（先等等看吧）"
8430003000-0-Think-1 = "（剛剛是說…過去就會有個數據裝置是吧？）"
8430003000-0-Think-2 = "（真想一鼓作氣衝過去…）"
8430003000-0-Think-3 = "（…果然我還是不喜歡潛入行動）"
8430003000-0-Think-4 = "（體力下降的話…好像可以喝恢復藥）"
8430003010-0-Think-1 = "（還有事情得做）"
8430006000-0-Think-1 = "（無人機…不愧是千年，跟三一截然不同呢）"
8430006000-0-Think-2 = "（沿著這條通道走到底…就會有扇門吧）"
8430006010-0-Think-1 = "（機器狗…）"
8430006010-1-Talk-1 = "聖亞，這邊。"
8430006010-0-Talk-1 = "莉央。"
8430006010-1-Talk-2 = "我在機器狗上裝了通訊器。"
8430006010-1-Talk-3 = "現在可以隨時儲存收集到的資料。"
8430006020-0-Think-1 = "（…這邊無法自行通過）"
8430006020-0-Think-2 = "（看來得聯絡莉央了）"
8430006030-1-Talk-1 = "我也正在準備祕密通道。"
8430006030-1-Talk-2 = "操作配電盤關閉排風扇之後，就能通過排風口了。"
8430006040-0-Think-1 = "（這是…配電盤…？）"
8430006050-0-Think-1 = "（現在應該可以進入排風口了）"
8430006050-0-Think-2 = "（趕緊移動吧）"
8431001000-0-Think-1 = "（那是……？）"
8431001000-0-Think-2 = "（原來這裡也有啊。應該能派上用場）"
8431001010-0-Think-1 = "（現在可以用用看了嗎……）"
8431001011-0-Think-1 = "（原來是那個啊。性能真是不錯）"
8431002000-0-Think-1 = "（成功抵達了……）"
8431002000-0-Think-2 = "（再前進一點吧）"
8431002010-0-Think-1 = "（要在不被發現的情況下接近有點困難）"
8431002010-0-Think-2 = "（…話說莉央有給我一對護膝）"
8431002010-0-Think-3 = "（正好能派上用場）"
8431002020-1-Talk-1 = "只要這次可以成功，我們就終於能吃上一次慶功宴了！"
8431002020-2-Talk-1 = "就算要續攤也可以吧！？畢竟那麼難得！"
8431002020-3-Talk-1 = "我想吃鐵板料理！"
8431002030-0-Think-1 = "（要是發出聲音的話，可能會被他們逃跑…）"
8431002030-0-Bulb-1 = "[전구]"
8431002030-0-Think-2 = "（…對了，墊子）"
8431002030-0-Think-3 = "（那傢伙準備得還真徹底）"
8431003000-0-Think-1 = "（唔嗯…這下麻煩了）"
8431003000-0-Think-2 = "（…是說可以用無線電連絡寧瑠對吧）"
8431003000-0-Think-3 = "（來試試看吧）"
8431003010-0-Talk-1 = "嗯，大致了解了。我從這邊想想辦法。"
8431003010-0-Talk-2 = "…配電盤？好，我找找看。"
8431004000-0-Think-1 = "（聖亞那邊…）"
8431004000-0-Think-2 = "（…他也不是小孩子了，應該能處理好吧）"
8431004010-0-Think-1 = "（…看來需要那邊的幫忙）"
8431005000-0-Think-1 = "（……雖然不是很懂，但一定要逃出去才行）"
8431005000-0-Think-2 = "（我的直覺告訴我，要是被抓到就完蛋了！）"
8431006000-0-Think-1 = "……好像有點奇怪。"
8431006000-0-Think-2 = "（照理來說，警備應該逐漸增強才對）"
8431006000-0-Dot-1 = "[…]"
8431006000-0-Exclaim-1 = "[!]"
8431006000-0-Talk-1 = "是陷阱！對方的目的從一開始就是這個！"
8431006000-0-Talk-2 = "需要寧瑠的幫忙！"
8431006010-0-Exclaim-1 = "[!]"
8431006010-0-Think-1 = "這次換寧瑠有危險了！"
8431006020-0-Think-1 = "看來需要由聖亞打開才行。"
8431007000-0-Think-1 = "（這樣下去會被抓到的…）"
8431007000-0-Think-2 = "（有沒有什麼…能阻擋它前進路線的東西…！)"
85413320101-0-Talk-1 = "狀況的掌握和分析\n是首要任務。"
85413320101-0-Talk-2 = "雖然那也\n不容易就是了。"
85413320102-0-Talk-1 = "鋼鐵大陸……的確\n是「特異現象」呢。"
85413320102-0-Talk-2 = "雖然和我期待的相比，\n方向略有不同就是了。"
85413320103-0-Talk-1 = "終於，走到\n這一步了呢。"
85413320104-0-Talk-1 = "我們……一定會\n找到出路的。"
85433320105-0-Talk-1 = "老師。請給予\n最後的一擊。"
85412670111-0-Talk-1 = "有一件事我明白了！"
85412670111-0-Talk-2 = "就是我什～麼\n都不明白！"
85412670112-0-Talk-1 = "老師也要試試看嗎？\n咦，不要？\n這樣啊……"
85412670113-0-Talk-1 = "雖然按照前輩們\n說的去做了……！"
85412670114-0-Talk-1 = "哇啊……\n按鈕之類看不懂的\n東西好多……"
85412670115-0-Talk-1 = "最後衝刺了，\n老師！走吧！"
85412680121-0-Talk-1 = "這是，什麼呢……"
85412680122-0-Talk-1 = "歡迎回來，老師。"
85412680122-0-Talk-2 = "這裡是……機庫？\n似乎是呢。"
85412680123-0-Talk-1 = "好像要用預言者的核心\n來做些什麼的樣子……\n究竟……"
85412680124-0-Talk-1 = "明明Kei醬和會長有\n仔細說明過了……\n不好意思。"
85442680125-0-Talk-1 = "可以升級了呢！"
85413310130-0-Talk-1 = "這個結果，\n該如何解釋……"
85413310131-0-Talk-1 = "這裡是機庫……\n雖然本來是這樣，"
85413310131-0-Talk-2 = "似乎變得像是\n多功能空間了呢。"
85413310133-0-Talk-1 = "得想出能突破\n僵局的計策……"
85413310134-0-Talk-1 = "預言者的核心，\n就在這裡分析吧。"
85413310135-0-Talk-1 = "升級的準備完成了。"
85413350201-0-Talk-1 = "向著最初的目標，\n先踏出一步，對吧。"
85413340202-0-Talk-1 = "愛麗絲……\n總覺得很興奮！"
85413360203-0-Talk-1 = "能躲藏的地方……\n沒有嗎……？"
85412670204-0-Talk-1 = "哦哦……明明是\n第一次來的地方\n卻有種懷念的感覺！"
85412670204-0-Talk-2 = "有種不可思議\n的感覺呢！"
85412680205-0-Talk-1 = "姐姐……希望你能\n多拿出一點緊張感。"
85413360212-0-Talk-1 = "果，果然，\n櫃子的外面很危險……"
85413330207-0-Talk-1 = "請用洋甘菊茶。"
85413330207-0-Talk-2 = "據說有放鬆\n緊張的效果。"
85413310208-0-Think-1 = "（我現在\n待在這裡……）"
85413310208-0-Think-2 = "（這是合理的\n行動嗎……？）"
85413320209-0-Talk-1 = "越在成就大事的時候，\n冷靜就越是關鍵。"
85413350210-0-Talk-1 = "無論愛麗絲還是大家，\n都絕對不會讓他們受傷的。"
85413340211-0-Talk-1 = "……這就是拯救\n世界的第一步呢。"
85413340211-0-Talk-2 = "愛麗絲，會加油的！"
85413360303-0-Talk-1 = "這裡也有遊戲機……"
85412670213-0-Talk-1 = "早知道會這樣的話\n就多帶一些遊戲來了～！"
85412680214-0-Talk-1 = "能，能平安回去嗎……"
85413360312-0-Think-1 = "（下載了什麼樣的\n遊戲呢……？)"
85413330216-0-Talk-1 = "作為完美女僕\n兼最佳特務……"
85413330216-0-Talk-2 = "如果有能幫忙的事，\n請儘管告訴我。"
85413310217-0-Talk-1 = "為了以防萬一，\n監控會持續進行。"
85413320218-0-Talk-1 = "關於未來的事，\n要不要用占星術\n占卜一下呢……"
85413350301-0-Talk-1 = "大家，喜歡什麼\n樣的飲料呢……"
85413340302-0-Talk-1 = "我帶了遊戲機過來！"
85413340302-0-Talk-2 = "老師要一起玩嗎？"
85413360403-0-Talk-1 = "已經……\n不想再空降了……"
85412670304-0-Talk-1 = "果然這裡\n很厲害呢……！"
85412680305-0-Talk-1 = "好，好厲害……"
85413360412-0-Talk-1 = "老師……\n會陪我的對吧……？"
85413330307-0-Talk-1 = "我的活躍，只要\n老師有看見就足夠了。"
85413350310-0-Talk-1 = "往這台自動販賣機\n投錢有意義嗎……？"
85413340311-0-Talk-1 = "就是在這種時候，\n休息才更重要！"
85412670313-0-Talk-1 = "不過嘛，規模好像\n比之前小了一點？"
85412680314-0-Talk-1 = "我們，明明是\n遊戲開發部……"
85413330316-0-Talk-1 = "託輕量戰鬥服的福，\n能做出更輕盈的動作了。"
85413350401-0-Talk-1 = "這個身體……\n感覺做得還挺不錯的。"
85413340402-0-Talk-1 = "大家都很厲害！"
85413360603-0-Talk-1 = "老師……是和這樣的\n敵人戰鬥過來的呢……"
85413360612-0-Talk-1 = "總覺得只要\n和老師在一起……\n就不害怕了……\n耶嘿嘿……"
85413330407-0-Talk-1 = "我正覺得無聊。\n請陪我玩吧。"
85413310408-0-Think-1 = "（畢竟身處\n這種情況……）"
85413310408-0-Think-2 = "（玩遊戲或許是\n合理的呢……）"
85413320409-0-Talk-1 = "甜食可以\n減輕壓力唷。"
85413350410-0-Talk-1 = "那些孩子們的工學技術\n倒是值得肯定。"
85413340411-0-Talk-1 = "能夠自由自在的，\n是件好事呢……！"
85413330416-0-Talk-1 = "要是多帶一些\n漫畫來就好了。"
85413310417-0-Talk-1 = "遊戲機……明明\n只是單純的裝置\n和程式而已……"
85413320418-0-Talk-1 = "和今天的幸運色\n相同顏色的飲料是……"
85413350501-0-Talk-1 = "大家都辛苦了。"
85413340502-0-Talk-1 = "大家真的都很棒！\n我很敬佩！"
85413360803-0-Talk-1 = "莉央會長，還有\n陽葵前輩……\n真厲害……"
85412670504-0-Talk-1 = "真的，一度還在想\n會變成怎樣呢……"
85412680505-0-Talk-1 = "還以為一切都\n結束了……"
85413360812-0-Talk-1 = "雖然被教導了\n很多東西……"
85413360812-0-Talk-2 = "感覺好像懂了，\n又好像不懂……"
85413310508-0-Talk-1 = "這裡，是為了應對\n所有可能性……"
85413320509-0-Talk-1 = "就當作是喘口氣……"
85413320509-0-Talk-2 = "來做點溫暖的飲料吧？"
85413350510-0-Talk-1 = "英美和季去進行\n運輸船的檢查了。"
85413340511-0-Talk-1 = "勇氣……那才是\n真正的力量！"
85413370206-0-Talk-1 = "雖然是個舒適\n又有效率的地方……"
85412670513-0-Talk-1 = "不過還是好好\n努力了唷！哼哼！"
85412680514-0-Talk-1 = "但是，如果能對大家\n有所幫助的話……"
85413370215-0-Talk-1 = "可以開冷氣嗎？\n部長會不會不高興呢？"
85413310517-0-Think-1 = "（遊戲開發部……\n雖然我一直是這麼\n認為的……）"
85413310517-0-Think-2 = "（真是難以預測\n的孩子們呢……）"
85413320518-0-Talk-1 = "用咖啡似乎也能占卜唷。"
85413350601-0-Talk-1 = "愛麗絲去睡覺了。"
85413370306-0-Talk-1 = "戰鬥口糧雖然效率高，\n可是……"
85412670604-0-Talk-1 = "帶來的遊戲，\n全部都破關了……"
85412680605-0-Talk-1 = "英美同學是嗎？\n他說了好熱～之後\n就跑出去了。"
85413370315-0-Talk-1 = "吃飯這種事，\n大家一起吃\n比較有效率嗎？"
85413330607-0-Talk-1 = "最近，我有了新的\n興趣（暫定）。"
85413310608-0-Think-1 = "（雖然做了廚房……）"
85413310608-0-Think-2 = "（果然是\n不合理的嗎……）"
85413350610-0-Talk-1 = "老師也別忘了休息！"
85413350610-0-Talk-2 = "還有刷牙也是！"
85412670613-0-Talk-1 = "老師，你有帶\n卡帶盒之類的嗎？"
85412680614-0-Talk-1 = "剛才的遊戲，\n難度好像怪怪的……"
85413330616-0-Talk-1 = "我有直播的存檔。"
85413330616-0-Talk-2 = "要跟我一起看嗎？"
85413310617-0-Talk-1 = "其實我……"
85413310617-0-Talk-2 = "有時候連即食食品\n的調理也會失敗……"
85413350701-0-Talk-1 = "休息很重要這句話，\n我好像有點明白了……"
85413340702-0-Talk-1 = "愛麗絲還可以\n更加努力。老師！"
85412670704-0-Talk-1 = "這一切，會不會\n都是場夢？"
85412670704-0-Talk-2 = "醒來後就在部室裡了～\n之類的！"
85412680705-0-Talk-1 = "沒想到會來到\n這種地方……"
85412680705-0-Talk-2 = "我們，明明只是個\n遊戲開發部而已。"
85413350710-0-Talk-1 = "沒有哪裡不舒服吧？"
85413340711-0-Talk-1 = "要打起精神，\n果然……"
85413340711-0-Talk-2 = "吃點或喝點什麼\n會比較好呢……"
85412670713-0-Talk-1 = "現實就是\n死局遊戲啊……"
85412680714-0-Talk-1 = "……會沒事的吧。\n畢竟，有老師在。"
85413350801-0-Talk-1 = "真是的，那個\n純白3人組……！"
85413340802-0-Talk-1 = "桃井和綠都說\n要在房間休息……"
85413370706-0-Talk-1 = "總覺得，莫名有種\n想去廚房的心情。"
85413370715-0-Talk-1 = "不合理卻有效率的事，\n世上也是存在的呢。"
85413330807-0-Talk-1 = "偵察是嗎？\n請下達指示。"
85413310808-0-Think-1 = "（要順利開啟對話，\n應該怎麼做呢……）"
85413320809-0-Talk-1 = "太好了……幸好\n大家都平安無事。"
85413350810-0-Talk-1 = "……我畢竟是\n姐姐，所以會忍耐。"
85413340811-0-Talk-1 = "愛麗絲……只要\n大家都平安無事，"
85413340811-0-Talk-2 = "這樣就夠了。"
85413370806-0-Talk-1 = "老師也要喝點\n冰涼的東西嗎？"
85413370815-0-Talk-1 = "無法整理思緒……"
85413370815-0-Talk-2 = "不是身體，而是腦袋\n發熱的時候……"
85413370815-0-Talk-3 = "該怎麼辦才好呢……"
85413330816-0-Talk-1 = "我努力執行任務，\n是為了大家。"
85413330816-0-Talk-2 = "……在此同時，\n也是為了被稱讚。"
85413310817-0-Think-1 = "（和別人說話\n的方法……）"
85413310817-0-Think-2 = "（果然，還是\n向老師諮詢……）"
85413320818-0-Talk-1 = "不必擔心。\n我還很有精神。"
