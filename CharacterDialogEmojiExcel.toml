5-0-Think-1 = "여기가 비밀 입구군요."
5-0-Think-2 = "환풍기를 꺼야 들어갈 수 있겠어요"
5-0-Think-3 = "배전반을 찾아야겠네요."
6-0-Think-1 = "드디어 도착했어요."
8431999016-0-Think-1 = "(수집한 데이터를 저장했어요.)"
8431999017-0-Think-1 = "(수집한 데이터를 저장했어.)"
8431999018-0-Think-1 = "(네루도 데이터를 가져와야 해요.)"
8431999019-0-Think-1 = "(세이아도 데이터를 가져와야 해.)"
8430001000-0-Think-1 = "(박스를 쓰면 움직이지 않을 땐 들키지 않을 거예요.)"
8430001000-0-Think-2 = "(타이밍을 잘 봐가며… 움직이죠.)"
8430001010-1-Talk-1 = "…는 …"
8430001010-2-Talk-1 = "…가…"
8430001010-0-Think-1 = "(조금 더…)"
8430001030-1-Talk-1 = "곧 있으면 접선 시간이야."
8430001030-2-Talk-1 = "빨리 거래 끝내고 돌아가자."
8430001030-0-Think-1 = "(……이쯤이면 되겠죠.)"
8430001040-0-Think-1 = "(아직 할 일이 있어요.)"
8430001050-0-Think-1 = "(잠시 기다려보죠.)"
8430003000-0-Think-1 = "(가다 보면 데이터 장치가 있다고 했지?)"
8430003000-0-Think-2 = "(마음 같아선 다 때려 부수며 가고 싶지만…)"
8430003000-0-Think-3 = "(…하여간 잠입은 취향이 아니라니까.)"
8430003000-0-Think-4 = "(체력이 떨어지면... 회복약을 먹으면 된다고 했었지.)"
8430003010-0-Think-1 = "(아직 할 일이 있어.)"
8430006000-0-Think-1 = "(드론… 밀레니엄답네요. 트리니티와는 많이 달라요.)"
8430006000-0-Think-2 = "(이 통로 끝까지 가면… 문이 나오겠군요.)"
8430006010-0-Think-1 = "(강아지 로봇…)"
8430006010-1-Talk-1 = "세이아, 이쪽이야."
8430006010-0-Talk-1 = "리오."
8430006010-1-Talk-2 = "강아지 로봇에 통신기를 달았어."
8430006010-1-Talk-3 = "중간중간 수집한 데이터를 저장할 수 있어."
8430006020-0-Think-1 = "(…이건 혼자서 지나갈 수 없겠어요.)"
8430006020-0-Think-2 = "(리오에게 연락해야겠군요.)"
8430006030-1-Talk-1 = "그러잖아도 이쪽에서 비밀 통로를 만들고 있었어."
8430006030-1-Talk-2 = "배전반을 조작해서 환풍기를 끄고 환풍구로 가면 돼."
8430006040-0-Think-1 = "(이건… 배전반…?)"
8430006050-0-Think-1 = "(이제 환풍구로 들어갈 수 있겠어요.)"
8430006050-0-Think-2 = "(서둘러서 이동해야겠네요.)"
8431001000-0-Think-1 = "(저건……?)"
8431001000-0-Think-2 = "(이곳에도 있었네요. 요긴하겠어요.)"
8431001010-0-Think-1 = "(이쯤에서 써 보면 되려나요……)"
8431001011-0-Think-1 = "(저거로군요. 성능 확실하네요.)"
8431002000-0-Think-1 = "(일단 오기는 했는데……)"
8431002000-0-Think-2 = "(조금 더 들어가 볼까.)"
8431002010-0-Think-1 = "(들키지 않고 접근하긴 어렵겠는데.)"
8431002010-0-Think-2 = "(…리오가 준 무릎 보호대가 있었지.)"
8431002010-0-Think-3 = "(마침 좋은 타이밍이네.)"
8431002020-1-Talk-1 = "이번 건만 성공하면 드디어 우리도 회식 한 번 하자고!"
8431002020-2-Talk-1 = "2차도 갈 수 있겠지!? 모처럼이니까!"
8431002020-3-Talk-1 = "저는 철판요리가 먹고 싶어요!"
8431002030-0-Think-1 = "(소리를 내면 도망갈 수도 있는데….)"
8431002030-0-Bulb-1 = "[전구]"
8431002030-0-Think-2 = "(…맞다, 패드.)"
8431002030-0-Think-3 = "(하여간 철두철미한 녀석이라니까.)"
8431003000-0-Think-1 = "(으음… 곤란해졌군요.)"
8431003000-0-Think-2 = "(…무전기로 네루에게 연락할 수 있다 했었죠.)"
8431003000-0-Think-3 = "(어디 한 번 해볼까요.)"
8431003010-0-Talk-1 = "어. 대충 상황은 알았어. 이쪽에서 뭔가 해볼게."
8431003010-0-Talk-2 = "…배전반? 오케이. 내가 찾아볼게."
8431004000-0-Think-1 = "(세이아 쪽은…)"
8431004000-0-Think-2 = "(…애도 아니고, 알아서 잘 하겠지.)"
8431004010-0-Think-1 = "(…저쪽에서 뭔가 해줘야겠는걸.)"
8431005000-0-Think-1 = "(……잘은 모르지만 반드시 빠져 나가야 해요.)"
8431005000-0-Think-2 = "(저의 직감이 말하고 있어요. 잡히면 끝이라고!)"
8431006000-0-Think-1 = "……뭔가 이상한데요."
8431006000-0-Think-2 = "(보통은 점점 경비가 강화될 텐데 말이죠.)"
8431006000-0-Dot-1 = "[…]"
8431006000-0-Exclaim-1 = "[!]"
8431006000-0-Talk-1 = "함정이에요, 처음부터 이걸 노린 거군요!"
8431006000-0-Talk-2 = "네루의 도움이 필요해요!"
8431006010-0-Exclaim-1 = "[!]"
8431006010-0-Think-1 = "이번엔 네루가 위험해요!"
8431006020-0-Think-1 = "세이아가 열어줘야겠는걸."
8431007000-0-Think-1 = "(이대로는 따라잡히고 말아요…)"
8431007000-0-Think-2 = "(뭔가… 진로를 방해할 수 있는 게…!)"
7-0-Talk-1 = "리조트 호텔을 예약했습니다."
7-0-Talk-2 = "오늘만큼은 방해받지 않는\n하루를 보내시는 게 어떨까요?"
8-0-Talk-1 = "뭐 재밌는 거 없나요~?\n쿠로사키 코유키, 와버렸어요!!\n니 · 하 · 하 · 하!!"
9-0-Talk-1 = "우와, 여긴 뭐\n신기한 게 많네요?"
10-0-Talk-1 = "여, 여기는 안전지대죠!?\n누군가에게 끌려가거나\n하진 않죠!?"
11-0-Talk-1 = "혹시 여기…\n시끄러운 사람은\n쫓겨나는 시스템인가요!?"
12-0-Talk-1 = "헉……!!\n……배고프다."
13-0-Talk-1 = "오셨군요, 선생님!"
13-0-Talk-2 = "기다리느라 목 빠지는 줄\n알았다고요~!"
14-0-Talk-1 = "니하하, 선생님!"
14-0-Talk-2 = "……네? 아뇨? 아무 것도\n안 건드렸는데요?"
14-0-Talk-3 = "아마……?"
15-0-Talk-1 = "앞으로 무슨 일이\n생겨도 걱정 마세요!"
15-0-Talk-2 = "선생님 곁에는 저,\n우자와 레이사가 있으니까요!"
16-0-Talk-1 = "뭐야, 이제 오는 거야?"
16-0-Talk-2 = "기다렸다구! 파햐햐~"
17-0-Talk-1 = "간지-러워-"
17-0-Talk-2 = "우우, 복수할 거야-"
85413320101-0-Talk-1 = "상황 파악과 분석이\n먼저겠지만,"
85413320101-0-Talk-2 = "쉽지 않네요."
85413320102-0-Talk-1 = "강철대륙……\n그야말로,\n'초현상' 이네요."
85413320102-0-Talk-2 = "제가 기대했던\n초현상과는,\n조금 다르지만요."
85413320103-0-Talk-1 = "마침내, 여기까지\n왔다는 느낌일까요."
85413320104-0-Talk-1 = "우리는, 방법을\n찾아낼 거예요."
85433320105-0-Talk-1 = "선생님.\n마지막 일격을\n부탁드리겠습니다."
85412670111-0-Talk-1 = "한 가지는 알았어!"
85412670111-0-Talk-2 = "내가 아무것도\n모르겠다는 거!"
85412670112-0-Talk-1 = "선생님도 해 볼래?\n어, 안 해?\n그런가……"
85412670113-0-Talk-1 = "일단 선배들이\n가르쳐 주는 대로\n하는 중이야!"
85412670114-0-Talk-1 = "와아…… 잘 모르는\n버튼 같은 게\n잔뜩……"
85412670115-0-Talk-1 = "라스트 스퍼트야,\n선생님! 가자!"
85412680121-0-Talk-1 = "이건……\n도대체……"
85412680122-0-Talk-1 = "어서 오세요,\n선생님."
85412680122-0-Talk-2 = "여기는…… 격납고?\n인 것 같아요."
85412680123-0-Talk-1 = "예언자의 코어를\n뭔가에 쓴다는 것\n같은데…… 도대체……."
85412680124-0-Talk-1 = "케이 쨩과 회장이\n제대로 설명해 줬는데……\n죄송합니다."
85442680125-0-Talk-1 = "이제 업그레이드가\n가능해요!"
85413310130-0-Talk-1 = "이 결과를 어떻게\n해석해야 할까……"
85413310131-0-Talk-1 = "여기는\n격납고…… 이지만,"
85413310131-0-Talk-2 = "종합 기술 공간이\n되어 가고 있다는\n느낌이네."
85413310133-0-Talk-1 = "이 상황을\n개선하려면……"
85413310134-0-Talk-1 = "예언자의 코어는,\n여기에서\n분석하도록 할게."
85413310135-0-Talk-1 = "업그레이드 준비가\n완료되었어."
85413350201-0-Talk-1 = "첫 목표를 위한,\n시작인 셈이군요."
85413340202-0-Talk-1 = "아리스…… 뭔가……\n두근거립니다!"
85413360203-0-Talk-1 = "숨을 수 있는\n장소는……\n없는 걸까……"
85412670204-0-Talk-1 = "오오……\n처음 오는 곳인데 뭔가\n오랜만이라는 느낌이네!"
85412670204-0-Talk-2 = "신기한 기분이야!"
85412680205-0-Talk-1 = "언니……\n긴장 좀 해."
85413360212-0-Talk-1 = "역시 캐비닛 밖은\n위험해……"
85413330207-0-Talk-1 = "여기\n캐모마일 차입니다."
85413330207-0-Talk-2 = "긴장을 풀어주는\n효과가 있다고 하죠."
85413310208-0-Think-1 = "(내가 지금\n여기에 있는 것이,)"
85413310208-0-Think-2 = "(합리적인\n행동일까……)"
85413320209-0-Talk-1 = "큰일을 앞둘수록\n침착해야 하는\n법이죠."
85413350210-0-Talk-1 = "아리스든 누구든,\n다치게 내버려두지\n않을 겁니다."
85413340211-0-Talk-1 = "……세상을 구하는\n첫걸음인 거군요."
85413340211-0-Talk-2 = "힘내겠습니다!"
85413360303-0-Talk-1 = "여기에도\n게임기가 있구나……"
85412670213-0-Talk-1 = "이럴 줄 알았으면\n게임 좀 더 가져올걸!"
85412680214-0-Talk-1 = "무, 무사히 돌아갈 수\n있을까요……."
85413360312-0-Think-1 = "(어떤 게임이\n설치되어 있을까……)"
85413330216-0-Talk-1 = "퍼펙트 메이드이자\n베스트 요원으로서,"
85413330216-0-Talk-2 = "도와드릴 것이 있다면,\n말씀 주십시오."
85413310217-0-Talk-1 = "일단 모니터링은\n하고 있지만……"
85413320218-0-Talk-1 = "……미래에 대해,\n점성술이라도\n쳐 볼까요……"
85413350301-0-Talk-1 = "다들 어떤 걸\n마시고 싶어\n할까요……"
85413340302-0-Talk-1 = "게임기를\n가져왔습니다!"
85413340302-0-Talk-2 = "선생님도\n어떠신가요?"
85413360403-0-Talk-1 = "이제……\n강하는……\n싫어요……"
85412670304-0-Talk-1 = "역시 여긴 대단해……!"
85412680305-0-Talk-1 = "어, 엄청난 일이었어……"
85413360412-0-Talk-1 = "선생님……곁에 계셔\n주실 거죠……?"
85413330307-0-Talk-1 = "저의 활약, 선생님만\n알아주셨으면 합니다."
85413350310-0-Talk-1 = "여기 자판기, 동전을\n넣는 게 의미가\n있는 걸까……?"
85413340311-0-Talk-1 = "이런 때일수록,\n휴식도 중요합니다!"
85412670313-0-Talk-1 = "그때보단 조금\n스케일이 작은가……?"
85412680314-0-Talk-1 = "우리는\n게임개발부인데……"
85413330316-0-Talk-1 = "경량 슈트 덕분에,\n더 가벼운 동작이\n가능해졌습니다."
85413350401-0-Talk-1 = "이 몸,\n생각보다는 제법 잘\n만들었단 말이죠."
85413340402-0-Talk-1 = "모두 엄청났습니다!"
85413360603-0-Talk-1 = "선생님은 이런 적과\n싸워 오셨던\n거네요……"
85413360612-0-Talk-1 = "왠지 선생님과\n함께 있으면,\n무섭지 않아요.\n에헤헤……"
85413330407-0-Talk-1 = "심심해지기\n시작했습니다.\n놀아 주세요."
85413310408-0-Think-1 = "(혹시 이럴 때\n게임을 하는 건……)"
85413310408-0-Think-2 = "(합리적일까?)"
85413320409-0-Talk-1 = "단 것은 스트레스를\n경감시켜 준답니다."
85413350410-0-Talk-1 = "그 꼬맹이들, 공학적\n결과물에 대한 것만은\n인정해 주죠."
85413340411-0-Talk-1 = "자유로울 수 있다는 건,\n좋은 것 같습니다!"
85413330416-0-Talk-1 = "만화책을 좀 더\n가져올 걸 그랬네요."
85413310417-0-Talk-1 = "게임기……\n단순한 기계 장치이고,\n프로그램일 뿐인데……"
85413320418-0-Talk-1 = "오늘 행운의 색과\n같은 색의 음료는……."
85413350501-0-Talk-1 = "다들 고생 많았어요."
85413340502-0-Talk-1 = "모두 대단했습니다!\n존경스럽습니다!"
85413360803-0-Talk-1 = "리오 회장도\n히마리 선배도……\n역시, 대단하네요……"
85412670504-0-Talk-1 = "진짜……\n여러 가지로……\n어떻게 되나 했네."
85412680505-0-Talk-1 = "다 끝인 줄\n알았어……"
85413360812-0-Talk-1 = "여러모로,\n배우고 있는데……"
85413360812-0-Talk-2 = "알 것 같기도,\n아닌 것 같기도……"
85413310508-0-Talk-1 = "조금 더 모든 확률에\n대비하려면……"
85413320509-0-Talk-1 = "한숨 돌릴 겸……"
85413320509-0-Talk-2 = "뭔가 따뜻한 음료라도\n만들까요?"
85413350510-0-Talk-1 = "에이미와 토키는,\n수송선을 점검하러\n갔습니다."
85413340511-0-Talk-1 = "용기…… 그것이야말로\n진정한 힘입니다!"
85413370206-0-Talk-1 = "아늑하고 효율적인\n장소이기는 한데……"
85412670513-0-Talk-1 = "그래도 열심히 했어!\n에헴!"
85412680514-0-Talk-1 = "하지만 모두에게\n도움이 되었다면……"
85413370215-0-Talk-1 = "에어컨 틀어도 돼?\n부장이 싫어하려나?"
85413310517-0-Think-1 = "(그때도 느꼈지만,\n게임개발부……)"
85413310517-0-Think-2 = "(가능성을 예측할 수가\n없구나……)"
85413320518-0-Talk-1 = "커피 가루로도\n점을 칠 수 있다고\n하던데 말이죠."
85413350601-0-Talk-1 = "아리스는 잠시\n자러 갔습니다."
85413370306-0-Talk-1 = "전투식량은\n효율적인 건데……"
85412670604-0-Talk-1 = "가져온 게임, 전부\n클리어해 버렸어……"
85412680605-0-Talk-1 = "에이미 씨요?\n덥다고 하면서\n밖에 나갔어요."
85413370315-0-Talk-1 = "식사는,\n모두 함께하는 편이\n효율적이려나?"
85413330607-0-Talk-1 = "최근, 취미라고 할 것이\n생겼습니다."
85413310608-0-Think-1 = "(혹시나 해서 주방을\n만들어 두었지만,)"
85413310608-0-Think-2 = "(역시\n비합리적이었을까……)"
85413350610-0-Talk-1 = "선생님도 휴식,\n잊지 마세요."
85413350610-0-Talk-2 = "양치질도요!"
85412670613-0-Talk-1 = "선생님.\n혹시 외장 하드\n남는 거 있어?"
85412680614-0-Talk-1 = "조금 전 게임,\n난이도 조정이 잘못된 것\n같은데……?"
85413330616-0-Talk-1 = "저장해 둔 인터넷 방송,"
85413330616-0-Talk-2 = "같이 보시겠습니까?"
85413310617-0-Talk-1 = "……난 사실,"
85413310617-0-Talk-2 = "전자레인지 요리도\n실패할 때가 있어."
85413350701-0-Talk-1 = "전투 휴식이라는\n단어의 뜻,\n알 것 같네요……"
85413340702-0-Talk-1 = "아리스는 아직,\n더 힘낼 수 있습니다.\n선생님!"
85412670704-0-Talk-1 = "이게 다 꿈이 아닐까?"
85412670704-0-Talk-2 = "일어나면 부실에서\n눈을 뜨는 거지!"
85412680705-0-Talk-1 = "이런 곳까지\n오게 되다니……"
85412680705-0-Talk-2 = "우리는 그냥\n게임개발부인데."
85413350710-0-Talk-1 = "아픈 곳 없죠?\n좋아요. 다행이네요."
85413340711-0-Talk-1 = "힘을 내려면 역시,"
85413340711-0-Talk-2 = "뭔가 마시거나\n먹어야 할 텐데요……"
85412670713-0-Talk-1 = "현실이란 건,\n망겜이라니까……"
85412680714-0-Talk-1 = "……괜찮아요.\n선생님이, 계시니까요."
85413350801-0-Talk-1 = "그 하얀 꼬맹이들,\n진짜……!"
85413340802-0-Talk-1 = "모모이도 미도리도,\n개인실에서\n쉬겠다고 합니다……"
85413370706-0-Talk-1 = "뭔가, 왠지 모르게\n주방으로 가고 싶은\n기분이네."
85413370715-0-Talk-1 = "합리적이지는 않지만\n효율적인 일도,\n세상에는 있는 법이야."
85413330807-0-Talk-1 = "정찰인가요? 지시를\n부탁드리겠습니다."
85413310808-0-Think-1 = "(대화를 잘 시작하려면,\n어떻게 해야 할까?)"
85413320809-0-Talk-1 = "다행이네요……\n다들 무사해서."
85413350810-0-Talk-1 = "……더 언니인 제가\n참아야죠. 네, 그럼요."
85413340811-0-Talk-1 = "아리스는……\n모두가 무사했으면\n좋겠습니다."
85413340811-0-Talk-2 = "그것이 전부입니다."
85413370806-0-Talk-1 = "선생님도 뭔가\n시원한 거 마실래?"
85413370815-0-Talk-1 = "생각이\n정리되지 않네……"
85413370815-0-Talk-2 = "몸이 아니라 머릿속이\n뜨거우면,"
85413370815-0-Talk-3 = "어떻게 해야 할까……"
85413330816-0-Talk-1 = "제가 임무에 충실한 것은,\n모두를 위해서입니다."
85413330816-0-Talk-2 = "……그리고 동시에,\n칭찬받기 위해서입니다."
85413310817-0-Think-1 = "(사람과\n이야기하는 법……)"
85413310817-0-Think-2 = "(역시 선생에게\n상담을……)"
85413320818-0-Talk-1 = "걱정하지 마세요.\n저는 아직 괜찮습니다."
