[translation]
1-0-Talk-1 = "周りが騒がしいですね…。"
1-1-Think-1 = "（ゲヘナのパーティーか…）"
3-0-Think-1 = "이제 환풍구로 진입할 수 있겠어"
3-0-Think-2 = "이런 서둘러서 이동해야겠어요"
7-0-Talk-1 = "1"
7-0-Talk-2 = "2"
8-0-Talk-1 = "2"
9-0-Talk-1 = "2"
10-0-Talk-1 = "2"
11-0-Talk-1 = "2"
12-0-Talk-1 = "2"
13-0-Talk-1 = "2"
13-0-Talk-2 = "2"
14-0-Talk-1 = "2"
14-0-Talk-2 = "2"
14-0-Talk-3 = "2"
15-0-Talk-1 = "2"
15-0-Talk-2 = "2"
16-0-Talk-1 = "2"
16-0-Talk-2 = "2"
17-0-Talk-1 = "2"
17-0-Talk-2 = "2"
85433320106-0-Talk-1 = "ここでできることを、\n探さなくては。"
85433320107-0-Think-1 = "（先生が\n輸送船に戻るよう\n言ったのは、)"
85433320107-0-Think-2 = "(理由が\nあるはずです。）"
85433320108-0-Think-1 = "（いざという\n時には……と、\n先生はおっしゃってい\nました。)"
85433320108-0-Think-2 = "(それはつまり……）"
85433320109-0-Talk-1 = "皆さん……どうか\nご無事で……。"
85433320110-0-Talk-1 = "全てを終わらせる\n時です。"
85433320110-0-Talk-2 = "私たちも全力を\n尽くします。"
85432670116-0-Talk-1 = "ヒマリ先輩に\n連れられて\n戻ってきたのは\nいいけど……。"
85432670117-0-Think-1 = "（先生は\n無事なんだよね？\n大丈夫だよね……？）"
85432670118-0-Talk-1 = "アリス……ケイ……\nエイミ……トキ……\n会長……先生……。"
85432670119-0-Talk-1 = "せめて……\nせめて私が\n笑顔でいないとだよね！"
85432670120-0-Talk-1 = "これで全部\n終わらせよう！\n３人のためにも！"
85432680126-0-Talk-1 = "先生……みんな……！"
85432680127-0-Think-1 = "（私がちゃんと\nしっかりしないと……！\nしっかり！）"
85432680128-0-Talk-1 = "会長……どこに\n行ってしまったん\nですか……。"
85432680129-0-Talk-1 = "どうか、みんな\n無事でいてくれます\nように……！"
85412670904-0-Talk-1 = "今回は\n言えるかな……！\n来た、見た！"
85412670904-0-Talk-2 = "勝っ……！\nてはないか……\nまだね。"
85412670913-0-Talk-1 = "私たち\n勝てるよね先生？\n信じてるからねっ！"
85412689905-0-Talk-1 = "まだ全然\n信じられないです……"
85412689905-0-Talk-2 = "どうして\nこんなことに。"
85412689914-0-Talk-1 = "最後まで最善を\n尽くします。"
85412689914-0-Talk-2 = "あ、最後って\n言うとなんだか不吉な\n感じがしますね……。"
85413329909-0-Talk-1 = "長い旅路も、いよいよ\nクライマックス\nですね。"
85413329918-0-Talk-1 = "ご存じですか？\n占星術に\n終わりはありません。"
85413329918-0-Talk-2 = "すべては\n循環しているのです。"
