16019-CVGroup_CommonSkill-1 = "어라? 문제 해결입니다."
16019-CVGroup_ExSkill_1-1 = "퍼펙트 리콘 아스마 토키. 갑니다."
16019-CVGroup_ExSkill_2-1 = "모든 것은 이 손에서 시작될 겁니다."
16019-CVGroup_ExSkill_3-1 = "지원도 제압도. 간단합니다."
16019-CVGroup_ExSkill_Level_1-1 = "총의 사용법도, 완벽합니다."
16019-CVGroup_ExSkill_Level_2-1 = "쌍권총은 만능입니다."
16019-CVGroup_ExSkill_Level_3-1 = "총과 도구는, 쓰기 나름입니다."
16019-CVGroup_Formation_In_1-1 = "부르셨습니까."
16019-CVGroup_Formation_In_2-1 = "5분 안에 출동 가능합니다."
16019-CVGroup_Formation_Select-1 = "웨폰 체인지. 완벽합니다."
16019-CVGroup_Growup_1-1 = "아스마 토키, 레벨 업입니다. 선생님을 향한 마음도 레벨 업입니다.\n그러니 저에 대한 선생님의 마음도 레벨 업입니다."
16019-CVGroup_Growup_2-1 = "이걸로 더 강해졌습니다. ……잘 생각해 보니, 아직인 것 같습니다.\n그러니, 좀 더 함께 있어 주세요."
16019-CVGroup_Growup_3-1 = "사람은 강해지는 것만으로는 성장할 수 없습니다.\n그러니, 서로 의지해야 하는 겁니다. ……저는 언제나 준비되어 있습니다. 선생님."
16019-CVGroup_Growup_4-1 = "성장한 저는, 퍼펙트 토키입니다. ……아니요, 정정하겠습니다.\n선생님이 곁에 계실 때 한정으로, 그렇습니다."
16019-CVGroup_Relationship_Up_1-1 = "그렇군요. 이걸로 선생님 안의 제 존재감이, 한층 커진 거군요.\n……반대라고요? 그럴 리 없습니다."
16019-CVGroup_Relationship_Up_2-1 = "걱정하지 마세요. 선생님. 행운의 메이드 에이전트 정찰대인 제가 있는 한.\n우리의 앞길에는 어떤 방해물도 없을 겁니다."
16019-CVGroup_Relationship_Up_3-1 = "호감도라는 것이 있다면, 이럴 때 오르는 거겠죠.\n체감상 방금 걸로 1만 포인트 정도 상승했습니다."
16019-CVGroup_Relationship_Up_4-1 = "선생님, 춥지 않으신가요? 저는 조금…… 아뇨, 정말 춥습니다.\n그러니 더 가까이 와주세요."
16019-CVGroup_Tactic_In_1-1 = "정찰, 시작합니다."
16019-CVGroup_Tactic_In_2-1 = "미션 내용, 숙지했습니다."
16019-CVGroup_Tactic_Victory_1-1 = "목표 달성. 신속하게 칭찬해 주세요."
16019-CVGroup_Tactic_Victory_2-1 = "에어리어, 클리어."
