[translation]
16019-CVGroup_Battle_Buffed_1-1 = "ขอบคุณที่สนับสนุนค่ะ"
16019-CVGroup_Battle_Covered_1-1 = "รับประกันความปลอดภัย"
16019-CVGroup_Battle_Defense_1-1 = "แค่นั้นไม่พอหรอกค่ะ"
16019-CVGroup_Battle_In_1-1 = "ฉันจะยืนแนวหน้าเองค่ะ"
16019-CVGroup_Battle_In_2-1 = "ปืนพกคู่ไม่ได้มีไว้แค่โชว์หรอกค่ะ"
16019-CVGroup_Battle_Move_1-1 = "เซคชั่น เคลียร์"
16019-CVGroup_Battle_Move_2-1 = "เริ่มลาดตระเวนอีกครั้งค่ะ"
16019-CVGroup_Battle_Recovery_1-1 = "ขอบคุณสำหรับเสบียงค่ะ"
16019-CVGroup_Battle_TacticalAction_1-1 = "ย้ายตำแหน่ง"
16019-CVGroup_Battle_Victory_1-1 = "ความล้มเหลวไม่ใช่ตัวเลือกค่ะ ยะฮู้ว"
16019-CVGroup_Battle_Victory_2-1 = "ฉันก็แค่ทำหน้าที่ของตัวเองค่ะ ปิ้วๆ"
16019-CVGroup_CommonSkill-1 = "เอ๋? ไปแก้ปัญหาค่ะ"
16019-CVGroup_ExSkill_1-1 = "หน่วยลาดตระเวนที่เพอร์เฟกต์ อะซุมะ โทคิ ออกโรงค่ะ"
16019-CVGroup_ExSkill_2-1 = "ทุกอย่างจะเริ่มจากมือของฉันค่ะ"
16019-CVGroup_ExSkill_3-1 = "จะสนับสนุนหรือบุกเอง ก็เป็นเรื่องง่ายๆ ค่ะ"
16019-CVGroup_ExSkill_Level_1-1 = "การใช้ปืนก็สมบูรณ์แบบค่ะ"
16019-CVGroup_ExSkill_Level_2-1 = "ปืนพกคู่คืออาวุธสารพัดประโยชน์ค่ะ"
16019-CVGroup_ExSkill_Level_3-1 = "ปืนและอุปกรณ์ต่างๆ อยู่ที่ว่าเราจะใช้ยังไงค่ะ"
16019-CVGroup_Formation_In_1-1 = "เรียกฉันเหรอคะ?"
16019-CVGroup_Formation_In_2-1 = "ฉันพร้อมออกปฏิบัติการใน 5 นาทีค่ะ"
16019-CVGroup_Formation_Select-1 = "เปลี่ยนอาวุธ สมบูรณ์แบบเลยค่ะ"
16019-CVGroup_Growup_1-1 = "อะซุมะ โทคิ เลเวลอัปค่ะ\nความรู้สึกที่มีต่อคุณครูก็เลเวลอัปด้วยค่ะ\nเพราะงั้นความรู้สึกของคุณครูที่มีต่อฉันก็เลเวลอัปด้วยค่ะ"
16019-CVGroup_Growup_2-1 = "สิ่งนี้ทำให้ฉันแข็งแกร่งขึ้นค่ะ\nพอมาคิดให้ดีแล้ว... ก็น่าจะยังค่ะ\nเพราะงั้นช่วยอยู่ด้วยกันอีกหน่อยนะคะ"
16019-CVGroup_Growup_3-1 = "คนเราจะเติบโตจากการแข็งแกร่งอย่างเดียวไม่ได้ค่ะ\nเพราะงั้นเราต้องพึ่งพากันและกันค่ะ\nฉันเตรียมพร้อมอยู่เสมอค่ะ... คุณครู"
16019-CVGroup_Growup_4-1 = "ฉันที่เติบโตขึ้น ก็คือโทคิที่เพอร์เฟกต์ค่ะ\nไม่สิ ขอแก้ไขใหม่ค่ะ...\nฉันเป็นแบบนั้นเฉพาะตอนที่มีคุณครูอยู่ข้างๆ ค่ะ"
16019-CVGroup_Relationship_Up_1-1 = "อย่างนั้นสินะคะ\nสิ่งนี้ทำให้ตัวตนของฉันในใจคุณครูยิ่งใหญ่ขึ้นอีกขั้นสินะคะ\nตรงกันข้ามงั้นเหรอคะ...? ไม่มีทางหรอกค่ะ"
16019-CVGroup_Relationship_Up_2-1 = "ไม่ต้องเป็นห่วงนะคะ คุณครู\nตราบใดที่มีเมด สายลับ และหน่วยลาดตระเวนนำโชคอยู่\nก็จะไม่มีอุปสรรคใดๆ ขวางทางเราได้ค่ะ"
16019-CVGroup_Relationship_Up_3-1 = "ถ้ามีสิ่งที่เรียกว่าค่าความประทับใจ ในเวลานี้มันต้องเพิ่มขึ้นแน่เลยค่ะ\nจากที่รู้สึกได้เมื่อกี้ มันเพิ่มขึ้นมาประมาณหมื่นแต้มเลยค่ะ"
16019-CVGroup_Relationship_Up_4-1 = "คุณครู ไม่หนาวเหรอคะ?\nฉันหนาวนิดหน่อย... ไม่สิ หนาวมากเลยค่ะ\nเพราะงั้นช่วยมาใกล้ๆ อีกหน่อยสิคะ"
16019-CVGroup_Tactic_In_1-1 = "เริ่มลาดตระเวนค่ะ"
16019-CVGroup_Tactic_In_2-1 = "ฉันศึกษาภารกิจมาแล้วค่ะ"
16019-CVGroup_Tactic_Victory_1-1 = "บรรลุเป้าหมาย รีบชมฉันสิคะ"
16019-CVGroup_Tactic_Victory_2-1 = "แอเรีย เคลียร์"
