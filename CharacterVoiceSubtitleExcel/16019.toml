[translation]
16019-CVGroup_Battle_Buffed_1-1 = "支援，非常感謝。"
16019-CVGroup_Battle_Covered_1-1 = "安全，確保。"
16019-CVGroup_Battle_Defense_1-1 = "這種程度是沒有用的。"
16019-CVGroup_Battle_In_1-1 = "先鋒就交給我吧。"
16019-CVGroup_Battle_In_2-1 = "雙槍並不只是帥氣而已。"
16019-CVGroup_Battle_Move_1-1 = "Section, Clear."
16019-CVGroup_Battle_Move_2-1 = "重新開始偵察。"
16019-CVGroup_Battle_Recovery_1-1 = "感謝補給。"
16019-CVGroup_Battle_TacticalAction_1-1 = "位置，移動。"
16019-CVGroup_Battle_Victory_1-1 = "並沒有失敗這個選項。呀齁～"
16019-CVGroup_Battle_Victory_2-1 = "只是執行了任務而已。V～"
16019-CVGroup_CommonSkill-1 = "哎呀。這樣就沒問題了。"
16019-CVGroup_ExSkill_1-1 = "完美偵察員，飛鳥馬季。\n出動。"
16019-CVGroup_ExSkill_2-1 = "一切，都從這雙手開始。"
16019-CVGroup_ExSkill_3-1 = "支援和壓制，都是我的拿手好戲。"
16019-CVGroup_ExSkill_Level_1-1 = "槍隻的使用也很完美。"
16019-CVGroup_ExSkill_Level_2-1 = "雙槍是萬能的。"
16019-CVGroup_ExSkill_Level_3-1 = "槍和裝備要看怎麼使用。"
16019-CVGroup_Formation_In_1-1 = "您叫我嗎。"
16019-CVGroup_Formation_In_2-1 = "隨時都可以出動。"
16019-CVGroup_Formation_Select-1 = "武器切換。\n完美。"
16019-CVGroup_Growup_1-1 = "飛鳥馬季升級了。\n對老師的心意也升級了。\n反過來說，老師對我的心意也升級了。"
16019-CVGroup_Growup_2-1 = "這樣就變得更強了。\n……仔細想想，感覺還差得遠呢。\n所以，請再多陪我一會吧。"
16019-CVGroup_Growup_3-1 = "人如果只有變強是無法成長的。\n正因如此，才應該互相依靠。\n……我隨時都準備好了唷，老師。"
16019-CVGroup_Growup_4-1 = "成長後的我，是完美季。\n……不，我要更正一下。\n僅限於老師在身邊的時候。"
16019-CVGroup_Relationship_Up_1-1 = "原來如此。\n這樣一來，我在老師心中的存在感又提升了呢。\n……相反？沒有那種可能性。"
16019-CVGroup_Relationship_Up_2-1 = "請放心。\n只要有幸運的女僕．特務．偵察員在，\n我們前進的道路就不會有阻礙。"
16019-CVGroup_Relationship_Up_3-1 = "如果有所謂的好感度的話，應該就是在這種時候提升的吧。\n體感上，剛才那下大約提升了一萬點左右。"
16019-CVGroup_Relationship_Up_4-1 = "老師，您不冷嗎？\n我有點……不，非常冷。\n所以，請再靠近一點。"
16019-CVGroup_Tactic_In_1-1 = "開始偵察。"
16019-CVGroup_Tactic_In_2-1 = "任務內容已經記在腦海裡了。"
16019-CVGroup_Tactic_Victory_1-1 = "目標達成。請迅速誇獎我。"
16019-CVGroup_Tactic_Victory_2-1 = "Area Clear."
