[translation]
10142-CVGroup_Battle_Buffed_1-1 = "선행에 감사를."
10142-CVGroup_Battle_Defense_1-1 = "예상했어."
10142-CVGroup_Battle_In_1-1 = "더위엔 약하지만, 힘낼게."
10142-CVGroup_Battle_In_2-1 = "눈부신 활약을 보여줄게."
10142-CVGroup_Battle_Move_1-1 = "신중하게 가자."
10142-CVGroup_Battle_Move_2-1 = "다들, 따라오고 있어?"
10142-CVGroup_Battle_Recovery_1-1 = "이것이…… 우정."
10142-CVGroup_Battle_TacticalAction_1-1 = "가겠어."
10142-CVGroup_Battle_Victory_1-1 = "응, 우리들의 승리."
10142-CVGroup_Battle_Victory_2-1 = "이것이, 백화요란의 힘."
10142-CVGroup_CommonSkill-1 = "진검승부."
10142-CVGroup_ExSkill_1-1 = "이것이 여름의 바다……."
10142-CVGroup_ExSkill_2-1 = "바람이 시원해……."
10142-CVGroup_ExSkill_3-1 = "새하얀 파도…… 좋다."
10142-CVGroup_ExSkill_Level_1-1 = "눈부시게 했구나."
10142-CVGroup_ExSkill_Level_2-1 = "너무 빛나버렸을까."
10142-CVGroup_ExSkill_Level_3-1 = "의도한 건 아니었는데."
10142-CVGroup_Formation_In_1-1 = "가겠어. 백련과 함께."
10142-CVGroup_Formation_In_2-1 = "오른손, 지금이라면 괜찮아. 맡겨줘."
10142-CVGroup_Formation_Select-1 = "선생님의 선택을…… 따를게."
10142-CVGroup_Growup_1-1 = "이것으로…… 오른팔의 봉인이 하나 풀렸어."
10142-CVGroup_Growup_2-1 = "그래. 나에게도 성장의 가능성이 남아 있었던 거야."
10142-CVGroup_Growup_3-1 = "황혼에서 되찾은, 내 힘…… 보여줄게."
10142-CVGroup_Growup_4-1 = "고마워, 선생님. 덕분에 내 안의 꽃망울이 피어났어."
10142-CVGroup_Relationship_Up_1-1 = "눈이 녹아 사라지면 봄이 찾아오듯…….\n황량했던 내 마음에도 봄이 온 모양이야."
10142-CVGroup_Relationship_Up_2-1 = "역시 선생님은 상냥하구나.\n나도, 그 상냥함을 닮고 싶어."
10142-CVGroup_Relationship_Up_3-1 = "언제나 날 믿어줘서 고마워.\n나도 항상…… 선생님을 믿어."
10142-CVGroup_Relationship_Up_4-1 = "외모 외엔 장점이 별로 없는 나지만……\n선생님의 곁에 있어도 괜찮겠지?"
10142-CVGroup_Tactic_In_1-1 = "내가 누구인지, 모두에게 알리겠어."
10142-CVGroup_Tactic_In_2-1 = "승리로 이끌게."
10142-CVGroup_Tactic_Victory_1-1 = "선생님의 믿음에 보답해서 다행이야."
10142-CVGroup_Tactic_Victory_2-1 = "나는 더 이상…… 누군가의 '대신'이 아니야."
