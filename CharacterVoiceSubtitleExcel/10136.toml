[translation]
10136-CVGroup_Battle_Buffed_1-1 = "고마워. 계속 지원 부탁해."
10136-CVGroup_Battle_Defense_1-1 = "공격 무효화 확인."
10136-CVGroup_Battle_In_1-1 = "후방은 맡겨 줘."
10136-CVGroup_Battle_In_2-1 = "이상 신호 확인."
10136-CVGroup_Battle_Move_1-1 = "다음 구역으로 이동."
10136-CVGroup_Battle_Move_2-1 = "지역 장악에 성공했어."
10136-CVGroup_Battle_Recovery_1-1 = "전술 지원 확인."
10136-CVGroup_Battle_TacticalAction_1-1 = "전술 이동 실시."
10136-CVGroup_Battle_Victory_1-1 = "봤지, 선생님? 나, 해냈어."
10136-CVGroup_Battle_Victory_2-1 = "이제 괜찮아, 선생님. 적은 없어."
10136-CVGroup_CommonSkill-1 = "이건 좀 뜨거울 거야."
10136-CVGroup_ExSkill_1-1 = "대상, 소거."
10136-CVGroup_ExSkill_2-1 = "다음 목표로 이동."
10136-CVGroup_ExSkill_3-1 = "역시 조금 덥네."
10136-CVGroup_ExSkill_Level_1-1 = "응. 힘내 볼게."
10136-CVGroup_ExSkill_Level_2-1 = "표적 지정 개시"
10136-CVGroup_ExSkill_Level_3-1 = "저기야."
10136-CVGroup_Formation_In_1-1 = "목표를 알려 줘."
10136-CVGroup_Formation_In_2-1 = "오늘은, 지정 사수야."
10136-CVGroup_Formation_Select-1 = "선생님의 하트에 록 온. ……역시, 익숙하지 않네."
10136-CVGroup_Growup_1-1 = "조금 발전한 걸까, 나."
10136-CVGroup_Growup_2-1 = "적절한 성장은 중요해. 작전상의 효율을 위해서라도."
10136-CVGroup_Growup_3-1 = "고마워, 선생님. 덕분에, 강해질 수 있었어."
10136-CVGroup_Growup_4-1 = "나도 조금은 변한 걸까? 사람은 결국, 서로를 바라보며 변해 가는 것이니까."
10136-CVGroup_Relationship_Up_1-1 = "요즘 드는 생각인데. 나는 조금, 멋대로인 부분이 있는 것 같아.\n그러니까…… 선생님이 나를 쭉 지켜봐 주는 게 보다 효율적인 일이 아닐까?"
10136-CVGroup_Relationship_Up_2-1 = "조금 더 이쪽으로 와. 봐, 붙으니까 딱 좋아졌어. 서로의 체온을 나누는 거, 효율적이지?"
10136-CVGroup_Relationship_Up_3-1 = "다시 돌아보면, 세계에는 신비한 것들이 참 많지.\n하지만 나에게 가장 신비했던 것은…… 선생님, 이려나. 후후. 선생님은 정말로, 재미있으니까."
10136-CVGroup_Relationship_Up_4-1 = "무슨 일이 있으면, 나를 찾아 줘.\n무조건, 내가 지킬 테니까. 어떤 대가를 치르더라도, 상관없어."
10136-CVGroup_Tactic_In_1-1 = "위력 정찰 개시."
10136-CVGroup_Tactic_In_2-1 = "탐색, 그리고 격멸."
10136-CVGroup_Tactic_Victory_1-1 = "어때, 선생님? 잘했지?"
10136-CVGroup_Tactic_Victory_2-1 = "이 지역은 안전해."
