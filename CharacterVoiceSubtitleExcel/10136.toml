[translation]
10136-CVGroup_Battle_Buffed_1-1 = "謝謝，之後也拜託了。"
10136-CVGroup_Battle_Defense_1-1 = "攻擊，無效化。"
10136-CVGroup_Battle_In_1-1 = "後方交給我。"
10136-CVGroup_Battle_In_2-1 = "確認異常信號。"
10136-CVGroup_Battle_Move_1-1 = "前往下一個區域。"
10136-CVGroup_Battle_Move_2-1 = "區域佔領，成功。"
10136-CVGroup_Battle_Recovery_1-1 = "確認戰術支援。"
10136-CVGroup_Battle_TacticalAction_1-1 = "戰術移動，開始。"
10136-CVGroup_Battle_Victory_1-1 = "有看到嗎？老師。我做到了。"
10136-CVGroup_Battle_Victory_2-1 = "已經沒事了，老師。沒有敵人了。"
10136-CVGroup_CommonSkill-1 = "這個可能會有點燙哦。"
10136-CVGroup_ExSkill_1-1 = "將對象消除。"
10136-CVGroup_ExSkill_2-1 = "下一個目標。"
10136-CVGroup_ExSkill_3-1 = "果然有點熱呢。"
10136-CVGroup_ExSkill_Level_1-1 = "嗯，我會努力的。"
10136-CVGroup_ExSkill_Level_2-1 = "指定目標。"
10136-CVGroup_ExSkill_Level_3-1 = "在那裡。"
10136-CVGroup_Formation_In_1-1 = "告訴我目標。"
10136-CVGroup_Formation_In_2-1 = "今天的我是射手哦。"
10136-CVGroup_Formation_Select-1 = "鎖定老師的心。\n……果然，還是不太習慣呢。"
10136-CVGroup_Growup_1-1 = "我有稍微成長了嗎？"
10136-CVGroup_Growup_2-1 = "如果有成長的話就太好了。在作戰效率上也是。"
10136-CVGroup_Growup_3-1 = "謝謝你，老師。\n託你的福，我變強了。"
10136-CVGroup_Growup_4-1 = "我改變了嗎？\n雖然說人會因為接觸而改變。"
10136-CVGroup_Relationship_Up_1-1 = "那個……雖然事到如今，可能有點晚了。\n我也有自己太過我行我素的自覺。\n所以，為了避免做得太過頭，希望老師能夠守望著我。"
10136-CVGroup_Relationship_Up_2-1 = "再靠近這邊一點。\n你看，靠在一起剛剛好。\n互相分享彼此的體溫，很有效率吧？"
10136-CVGroup_Relationship_Up_3-1 = "重新回顧的話，會發現充滿了不可思議呢。\n其中對我來說最不可思議的存在是……老師吧。\n呵呵，因為老師真的很有趣。"
10136-CVGroup_Relationship_Up_4-1 = "有什麼事的話馬上叫我。\n我一定會保護你的。\n為了那個目的……不管要付出什麼代價都無所謂。"
10136-CVGroup_Tactic_In_1-1 = "威力偵察，開始。"
10136-CVGroup_Tactic_In_2-1 = "目標是，搜索與殲滅。"
10136-CVGroup_Tactic_Victory_1-1 = "怎麼樣，老師？表現得不錯吧？"
10136-CVGroup_Tactic_Victory_2-1 = "這裡已經安全了。"
