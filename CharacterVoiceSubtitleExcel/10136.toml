10136-CVGroup_Battle_In_1-1 = "Leave the rear to me."
10136-CVGroup_Battle_In_2-1 = "Abnormal signals confirmed."
10136-CVGroup_Battle_Move_1-1 = "Moving to the next area."
10136-CVGroup_Battle_Move_2-1 = "Successfully secured the area."
10136-CVGroup_Battle_Recovery_1-1 = "Tactical support confirmed."
10136-CVGroup_Battle_TacticalAction_1-1 = "Initiating tactical movement."
10136-CVGroup_Battle_Victory_1-1 = "Did you see that, Sensei? I did it."
10136-CVGroup_Battle_Victory_2-1 = "It's okay now, Sensei. There are no more threats."
10136-CVGroup_CommonSkill-1 = "This will be a little hot."
10136-CVGroup_ExSkill_1-1 = "Target eliminated."
10136-CVGroup_ExSkill_2-1 = "Moving to next target."
10136-CVGroup_ExSkill_3-1 = "It's a bit hot here."
10136-CVGroup_ExSkill_Level_1-1 = "Yeah. I'll do my best."
10136-CVGroup_ExSkill_Level_2-1 = "Target designation initiated."
10136-CVGroup_ExSkill_Level_3-1 = "Over there."
10136-CVGroup_Formation_In_1-1 = "Tell me the target."
10136-CVGroup_Formation_In_2-1 = "I am the designated shooter today."
10136-CVGroup_Formation_Select-1 = "Locking on Sensei's heart... I'm really not used to this."
10136-CVGroup_Growup_1-1 = "Maybe I've grown a little."
10136-CVGroup_Growup_2-1 = "Proper growth is essential. Even if it's for the sake of operational efficiency."
10136-CVGroup_Growup_3-1 = "Thank you, Sensei. You helped me get a little stronger."
10136-CVGroup_Growup_4-1 = "Did I change a little? In the end, people eventually change right in front of each other."
10136-CVGroup_Relationship_Up_1-1 = "I've been having this thought. I might be a little self-indulgent. Which is why...wouldn't it be more efficient for Sensei to look after me all the time?"
10136-CVGroup_Relationship_Up_2-1 = "Come a little closer. See? It's perfect, now that we're right next to each other. Isn't it efficient to share body heat?"
10136-CVGroup_Relationship_Up_3-1 = "Looking back, there are lots of mysterious things in the world. But the most mysterious of them all...is you. Fufu. Sensei, you're really interesting."
10136-CVGroup_Relationship_Up_4-1 = "If something happens, come find me. I'll protect you. No matter the cost."
10136-CVGroup_Tactic_In_1-1 = "Initiating reconnaissance-in-force."
10136-CVGroup_Tactic_In_2-1 = "Search and destroy."
10136-CVGroup_Tactic_Victory_1-1 = "What do you think, Sensei? Did I do well?"
10136-CVGroup_Tactic_Victory_2-1 = "This area is safe."
