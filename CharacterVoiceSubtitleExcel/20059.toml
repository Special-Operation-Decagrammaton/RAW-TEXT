20059-CVGroup_Relationship_Up_3-1 = "이 감정, 나도 뭔지 알아.\n원한다면…… 구체적으로 들려줄까?"
20059-CVGroup_Relationship_Up_4-1 = "흐응~ 그렇구나?\n선생님은 나랑 더 가까워지고 싶구나?"
