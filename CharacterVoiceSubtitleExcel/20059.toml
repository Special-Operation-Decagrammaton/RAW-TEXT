[translation]
20059-CVGroup_CommonSkill-1 = "좀 뜨거울 거야!"
20059-CVGroup_ExSkill_1-1 = "쿠후후, 속았구나?"
20059-CVGroup_ExSkill_2-1 = "서프라~이즈!"
20059-CVGroup_ExSkill_3-1 = "짜잔, 이게 뭐게?"
20059-CVGroup_ExSkill_Level_1-1 = "예쁜 솜사탕이야!"
20059-CVGroup_ExSkill_Level_2-1 = "꺄하핫! 먹어라!"
20059-CVGroup_ExSkill_Level_3-1 = "예상 못 했지롱?"
20059-CVGroup_Formation_In_1-1 = "여기서 놀 거야? 좋아! 뭐할까?"
20059-CVGroup_Formation_In_2-1 = "쿠후후, 맡겨 줘!"
20059-CVGroup_Formation_Select-1 = "흐응~? 이건 무슨 놀이야?"
20059-CVGroup_Growup_1-1 = "선생님! 나 성장했어!\n어디가 성장했을까~요?"
