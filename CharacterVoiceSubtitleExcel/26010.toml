[translation]
26010-CVGroup_CommonSkill-1 = "โดนแล้วค่ะ..."
26010-CVGroup_ExSkill_1-1 = "อะ... อื้อ!? ว้าววว!?"
26010-CVGroup_ExSkill_2-1 = "ยะ... หยุดนะ...!"
26010-CVGroup_ExSkill_3-1 = "นก... นก!? มาได้ยังไง!?"
26010-CVGroup_ExSkill_Level_1-1 = "ปะ... ไปทางโน้นนะ...!"
26010-CVGroup_ExSkill_Level_2-1 = "อ๊าาาา!!"
26010-CVGroup_ExSkill_Level_3-1 = "ฉะ... ฉันจะให้ค่ะ!"
26010-CVGroup_Formation_In_1-1 = "ฮ่า... ฮู่ว..."
26010-CVGroup_Formation_In_2-1 = "ระ... เริ่มตั้งแต่ตอนนี้ใช่มั้ยคะ?"
26010-CVGroup_Formation_Select-1 = "อ๊ะ? มะ... หมวก~"
26010-CVGroup_Growup_1-1 = "ระ... รับไว้ได้เหรอคะ... ฉะ... ฉันว่าก็ทำไว้ไม่ดีเท่าไรนะ..."
26010-CVGroup_Growup_2-1 = "เอาของแบบนี้มาให้ฉันมันน่าเสียดายนะ...\nไม่สิ... ฉะ... ฉันจะตั้งใจให้มากกว่านี้ค่ะ...!"
26010-CVGroup_Growup_3-1 = "เป็นของที่ดีเลยนะคะ\nแต่มันอาจจะมากเกินไปสำหรับคนอย่างฉันก็ได้..."
26010-CVGroup_Growup_4-1 = "ฉะ... ฉันจะตอบแทนให้เท่ากับ... ที่คุณครูคาดหวังได้หรือเปล่าคะ...?"
26010-CVGroup_Relationship_Up_1-1 = "ถ้าเป็นการทำเพื่อคุณครูแล้วละก็... ไม่ว่าอะไรฉันก็ทำได้ค่ะ"
26010-CVGroup_Relationship_Up_2-1 = "ถ้าได้อยู่กับคุณครู... ฉันก็คิดว่าถึงต้องอยู่ตรงนี้ก็ไม่เป็นไรค่ะ..."
26010-CVGroup_Relationship_Up_3-1 = "คุณครู... คืนนี้มาลาดตระเวนด้วยกันมั้ยคะ...?"
26010-CVGroup_Relationship_Up_4-1 = "คนเป็นสไนเปอร์ไม่ควรทำอะไรแบบนี้...\nแต่ไม่รู้ทำไมสายตาฉันถึงมองไปที่คุณครูอยู่เรื่อยเลยค่ะ"
