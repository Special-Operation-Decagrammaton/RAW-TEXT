[translation]
20034-CVGroup_CommonSkill-1 = "스페셜한 한 발, 갑니다~?"
20034-CVGroup_ExSkill_1-1 = "우후후. 운전은 익숙하답니다?"
20034-CVGroup_ExSkill_2-1 = "후훗. 즐겁네요~"
20034-CVGroup_ExSkill_3-1 = "으음~ 달려 볼까요~?"
20034-CVGroup_ExSkill_Level_1-1 = "어머나? 아깝네요……."
20034-CVGroup_ExSkill_Level_2-1 = "안전 제일, 이랍니다~?"
20034-CVGroup_ExSkill_Level_3-1 = "긴급 정지! 아무 일도 없었다구요?"
20034-CVGroup_Formation_In_1-1 = "설레고, 계시나요~?"
20034-CVGroup_Formation_In_2-1 = "기대해 주세요. 우후후."
20034-CVGroup_Formation_Select-1 = "세상에는…… 참 먹고 싶은 게 많단 말이죠?"
20034-CVGroup_Growup_1-1 = "제가 어디까지 먹을 수 있을지…… 아뇨.\n어디까지 성장할 수 있을지, 지켜봐주세요★"
20034-CVGroup_Growup_2-1 = "아직 먹을 수 있다구요~?\n신년에는 맛있는 게 많으니까요! 맛보지 않으면 아깝답니다★"
20034-CVGroup_Growup_3-1 = "후후…… 올해의 스페셜 메뉴는 무엇일까요? 기대해도 될까요, 선생님?"
20034-CVGroup_Growup_4-1 = "선생님과 있으면, 많~은 신선한 체험을 할 수 있어요.\n하지만, 좀 더 새로운 체험도…… 해 보고 싶을지도요?"
20034-CVGroup_Relationship_Up_1-1 = "선생님, 어디 가고 싶은 곳이 있으세요~?\n운전이라면, 저한테 맡겨주세요."
20034-CVGroup_Relationship_Up_2-1 = "식사는 살아가는데 가장 중요한 것이라고 해도 과언이 아니죠.\n하지만 그것보다 중요한 것도 세상에는……\n……있을까요? 없을까요? 후훗."
20034-CVGroup_Relationship_Up_3-1 = "모처럼 입은 새 옷이니까,\n선생님이 봐주셨으면 하는 마음이…… 있는 듯…… 없는 듯? 후훗."
20034-CVGroup_Relationship_Up_4-1 = "알아요. 선생님이 학생을 소중히 생각하는 것은, 당연한 것……\n하지만 선생님,\n사실 저는 '평범함'을 별로 좋아하지 않는답니다★"
