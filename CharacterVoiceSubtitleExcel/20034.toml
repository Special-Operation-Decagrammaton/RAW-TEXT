[translation]
20034-CVGroup_CommonSkill-1 = "特別的一發，要上囉～？"
20034-CVGroup_ExSkill_1-1 = "呵呵。我已經很熟悉駕駛了唷～？"
20034-CVGroup_ExSkill_2-1 = "呵呵。真開心呢～"
20034-CVGroup_ExSkill_3-1 = "唔嗯……開跑吧？"
20034-CVGroup_ExSkill_Level_1-1 = "哎呀？真可惜呢……"
20034-CVGroup_ExSkill_Level_2-1 = "安全第一唷～？"
20034-CVGroup_ExSkill_Level_3-1 = "緊急停止！\n什麼都沒有唷～？"
20034-CVGroup_Formation_In_1-1 = "心動了嗎～？"
20034-CVGroup_Formation_In_2-1 = "敬請期待，呵呵。"
20034-CVGroup_Formation_Select-1 = "新年真是充滿了美食呢，各方面都是★"
20034-CVGroup_Growup_1-1 = "我能吃到什麼時候……\n不，我能成長到什麼程度，還請在一旁看著哦★"
20034-CVGroup_Growup_2-1 = "我還能吃唷～？\n畢竟新年好吃的東西有很～多！不品嘗就太可惜了★"
20034-CVGroup_Growup_3-1 = "呵呵……之後將會遇見什麼樣特別的菜單呢～？\n真令人期待呢，老師！"
20034-CVGroup_Growup_4-1 = "只要跟老師在一起，就能獲得很～多新鮮的體驗。\n不過，更～嶄新的體驗……好像也想嘗試看看？"
20034-CVGroup_Relationship_Up_1-1 = "老師，你有想去的地方嗎～？\n駕駛的話就請交給我吧。"
20034-CVGroup_Relationship_Up_2-1 = "要說進食是生存最重要的事情也不為過。\n不過比那更重要的事物，在這個世上也是……\n……有的嗎？還是沒有呢？呵呵。"
20034-CVGroup_Relationship_Up_3-1 = "難得有盛裝打扮，想給老師看的心情……\n好像有……又好像沒有？呵呵。"
20034-CVGroup_Relationship_Up_4-1 = "我明白。老師珍惜學生是理所當然的事……\n不過……老師。其實我不怎麼喜歡「普通」哦★"
