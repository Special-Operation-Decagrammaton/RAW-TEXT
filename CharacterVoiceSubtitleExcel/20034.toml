[translation]
20034-CVGroup_CommonSkill-1 = "นัดพิเศษ ไปละนะคะ~"
20034-CVGroup_ExSkill_1-1 = "ฮุฮุฮุ ฉันคุ้นเคยกับการขับรถค่ะ"
20034-CVGroup_ExSkill_2-1 = "ฮุฮุ สนุกจังเลยค่ะ~"
20034-CVGroup_ExSkill_3-1 = "อืม~ ซิ่งเลยดีมั้ยคะ?"
20034-CVGroup_ExSkill_Level_1-1 = "ตายจริง? น่าเสียดายนะคะ..."
20034-CVGroup_ExSkill_Level_2-1 = "ปลอดภัยไว้ก่อนนะคะ~"
20034-CVGroup_ExSkill_Level_3-1 = "หยุดฉุกเฉิน! ไม่มีเรื่องอะไรเกิดขึ้นงั้นเหรอคะ?"
20034-CVGroup_Formation_In_1-1 = "ตื่นเต้นอยู่เหรอคะ~?"
20034-CVGroup_Formation_In_2-1 = "ตั้งตารอได้เลยค่ะ ฮุฮุฮุ"
20034-CVGroup_Formation_Select-1 = "ในโลกนี้... มีของที่อยากกินอยู่เยอะเลยใช่มั้ยคะ?"
20034-CVGroup_Growup_1-1 = "ฉันจะกินได้ถึงไหนนะ... ไม่ใช่สิ\nช่วยตั้งตาดูด้วยนะคะว่าฉันจะพัฒนาได้ถึงไหน★"
20034-CVGroup_Growup_2-1 = "ฉันยังกินได้อีกค่ะ~ ปีใหม่มีของอร่อยๆ เยอะเลยค่ะ!\nถ้าไม่ได้ชิมก็เสียดายแย่นะคะ★"
20034-CVGroup_Growup_3-1 = "ฮุฮุ... เมนูพิเศษของปีนี้คืออะไรนะคะ?\nฉันขอตั้งตารอจะได้มั้ยคะคุณครู?"
20034-CVGroup_Growup_4-1 = "ถ้าได้อยู่กับคุณครู จะได้ลองทำอะไรใหม่ๆ เยอะเลยค่ะ\nแต่ฉันอาจจะ... อยากทำอะไรใหม่ๆ กว่านี้หน่อยก็ได้ค่ะ"
20034-CVGroup_Relationship_Up_1-1 = "คุณครู มีที่ไหนที่อยากไปมั้ยคะ?\nเรื่องขับรถ วางใจฉันได้เลยค่ะ"
20034-CVGroup_Relationship_Up_2-1 = "การกินอาหารเป็นสิ่งสำคัญที่สุดของการใช้ชีวิตเลยค่ะ\nแต่สิ่งที่สำคัญกว่านั้น ในโลกนี้...\nจะมีมั้ยคะ? หรือว่าไม่มี? ฮุฮุ"
20034-CVGroup_Relationship_Up_3-1 = "นี่เป็นชุดใหม่ที่ฉันใส่\nก็เลยอยากให้คุณครูช่วยมองฉันค่ะ... หรือว่าไม่อยากนะ? ฮุฮุ"
20034-CVGroup_Relationship_Up_4-1 = "ฉันรู้ค่ะ ว่าเป็นเรื่องปกติที่คุณครูจะเห็นคุณค่าของนักเรียน...\nแต่ว่า คุณครูคะ ที่จริงฉันไม่ชอบคำว่า 'ธรรมดา' เท่าไรค่ะ★"
