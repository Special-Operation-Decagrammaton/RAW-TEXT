[translation]
20034-CVGroup_CommonSkill-1 = "Special shot. Let's go!"
20034-CVGroup_ExSkill_1-1 = "Heehee. I'm well-practiced at driving."
20034-CVGroup_ExSkill_2-1 = "Heehee. How fun."
20034-CVGroup_ExSkill_3-1 = "Hm. Let's get this show on the road."
20034-CVGroup_ExSkill_Level_1-1 = "Oh? What a shame..."
20034-CVGroup_ExSkill_Level_2-1 = "Safety first!"
20034-CVGroup_ExSkill_Level_3-1 = "Emergency stop! Nothing happened!"
20034-CVGroup_Formation_In_1-1 = "Are you excited?"
20034-CVGroup_Formation_In_2-1 = "I look forward to it. Heehee."
20034-CVGroup_Formation_Select-1 = "There are lots of things I want to eat in this world, you know?"
20034-CVGroup_Growup_1-1 = "Watch how much I can eat—no.... Watch how much I can grow! ★"
20034-CVGroup_Growup_2-1 = "Full or not, I can still eat! There are so many tasty dishes on New Year! It would be a shame not to taste them all! ★"
20034-CVGroup_Growup_3-1 = "Heehee... What will the special menu be this year? What should I expect, Sensei?"
20034-CVGroup_Growup_4-1 = "I have so many new experiences when I'm with you, Sensei. But, I'm ready for something even more novel..."
20034-CVGroup_Relationship_Up_1-1 = "Wanna go somewhere, Sensei? Leave the driving to me."
20034-CVGroup_Relationship_Up_2-1 = "I'm not exaggerating when I say food is life. But I wonder if there's something even more important... Do you think something like that exists? Heehee."
20034-CVGroup_Relationship_Up_3-1 = "I have a new outfit that I may or may not want you to see, Sensei. Heehee!"
20034-CVGroup_Relationship_Up_4-1 = "As a sensei, I know it's typical for you to cherish all of your students. But... I don't really like \"typical\". ★"
