[translation]
20057-CVGroup_CommonSkill-1 = "청소, 시작하겠습니다."
20057-CVGroup_ExSkill_1-1 = "어머나. 안녕하세요?"
20057-CVGroup_ExSkill_2-1 = "여기 계셨네요?"
20057-CVGroup_ExSkill_3-1 = "다 숨으셨나요?"
20057-CVGroup_ExSkill_Level_1-1 = "그러면, 마무리하겠습니다."
20057-CVGroup_ExSkill_Level_2-1 = "이번 업무는, 여기까지."
20057-CVGroup_ExSkill_Level_3-1 = "깨끗하게 청소하도록 하죠."
20057-CVGroup_Formation_In_1-1 = "어디를 안내해 드릴까요?"
20057-CVGroup_Formation_In_2-1 = "밀레니엄의 일상, 함께 어떠세요?"
20057-CVGroup_Formation_Select-1 = "새삼스럽지만 이렇게 부르는 것도 신선하네요. ……선생님?"
20057-CVGroup_Growup_1-1 = "메이드로서, 모든 일에 능숙해야 하겠지요. 학생으로서도 마찬가지고요."
20057-CVGroup_Growup_2-1 = "언제나 지켜봐 주셔서 감사합니다. 스승의 은혜는, 갚아야 하는 것일 텐데요."
20057-CVGroup_Growup_3-1 = "모든 것은 매일의 노력이겠지요.\n만약, 그 일상을 선생님이 함께 해주신다면…… 어쩌면면, 다른 미래가 기다리고 있을지도 모르겠네요."
20057-CVGroup_Growup_4-1 = "여유가 생겨서, 새로운 청소법을 생각하고 있었어요.\n요즘 철거용 폭발물 카트리지에 대해 알아보고 있는데요……"
20057-CVGroup_Relationship_Up_1-1 = "가끔, 그런 생각을 해요. 선생님과 조금, 다른 방식으로 만났더라면 어땠을까…… 가령 '동급생'이라던가…… 후후.\n그래도 선생님은, '선생님'이었을 것 같지만요."
20057-CVGroup_Relationship_Up_2-1 = "학생이 교복을 입는건 당연한 일이겠지요. 그래도, 어울린다는 말은 언제 들어도 기쁘니까요?"
20057-CVGroup_Relationship_Up_3-1 = "늘 감사드립니다. 선생님. 그리고…… 그리고…… 제법 결심했는데, 의외로 말하기 어렵네요.\n그렇지만…… 언제나, 저기, 네. 경애하고, 있답니다."
20057-CVGroup_Relationship_Up_4-1 = "방과 후, 빈 교실이 있는데…… 그곳으로 와 주실 수 있으실까요?\n후훗. 농담이에요. ……지금은요."
