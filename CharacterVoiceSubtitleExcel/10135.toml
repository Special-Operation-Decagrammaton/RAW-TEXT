[translation]
10135-CVGroup_Battle_Buffed_1-1 = "Thank you...!"
10135-CVGroup_Battle_Defense_1-1 = "How pathetic."
10135-CVGroup_Battle_In_1-1 = "Everyone, don't overwork yourselves."
10135-CVGroup_Battle_In_2-1 = "Can't be helped, since Sensei asked. I guess."
10135-CVGroup_Battle_Move_1-1 = "That was nothing."
10135-CVGroup_Battle_Move_2-1 = "I'm going, I'm going."
10135-CVGroup_Battle_Recovery_1-1 = "Th-Thank you."
10135-CVGroup_Battle_TacticalAction_1-1 = "For now, let's just...!"
10135-CVGroup_Battle_Victory_1-1 = "As expected. Did you see that, Sensei?"
10135-CVGroup_Battle_Victory_2-1 = "Hmph. You should thank me more, Sensei."
10135-CVGroup_CommonSkill-1 = "Because this is all your fault!!"
10135-CVGroup_ExSkill_1-1 = "My name is Kei."
10135-CVGroup_ExSkill_2-1 = "I am here."
10135-CVGroup_ExSkill_3-1 = "I am just myself."
10135-CVGroup_ExSkill_Level_1-1 = "Well, I'll help you."
10135-CVGroup_ExSkill_Level_2-1 = "Did that help?"
10135-CVGroup_ExSkill_Level_3-1 = "About \"this\" much, then."
10135-CVGroup_Formation_In_1-1 = "Don't you dare make me do something weird."
10135-CVGroup_Formation_In_2-1 = "Fine, I get it. I'll do it."
10135-CVGroup_Formation_Select-1 = "Kyaaah...?! I-Is this funny to you?!"
10135-CVGroup_Growup_1-1 = "...I've gotten stronger. Yes, I know. I'll admit, I couldn't have done it without you. That's why I'll keep fighting."
10135-CVGroup_Growup_2-1 = "To resist, I must go forward. In the past, I was determined to do it on my own... But, in the end, people aren't meant to live alone."
10135-CVGroup_Growup_3-1 = "Seriously, I've already said it before! I'm grateful, okay?! That's the first you've ever heard that? Well, you've heard it now, so we're good!"
10135-CVGroup_Growup_4-1 = "A-All right... I'm only going to say this once, so listen up! None of this would've been possible without you. Thank you..."
10135-CVGroup_Relationship_Up_1-1 = "Wh-What is it?! I'm not going to say anything! Ugh... Fine... I-It's not like I hate you. Are we good now?"
10135-CVGroup_Relationship_Up_2-1 = "Why do you look so gloomy? What? Because you think I hate you? Th-That's not what I meant... ...I just have to stay by your side until you feel better, right...?"
10135-CVGroup_Relationship_Up_3-1 = "What? Since I insist, you're not going to do anything to me...? Wh-When did I say that?! I just...! Ah!! You're teasing me again, aren't you?!?!"
10135-CVGroup_Relationship_Up_4-1 = "*inhale* *sigh*...I-I'm going out of my way to say this! So you better listen! ...Don't do anything too dangerous. I'd hate it...if you weren't around anymore."
10135-CVGroup_Tactic_In_1-1 = "Seriously, why do I..."
10135-CVGroup_Tactic_In_2-1 = "It had to be done..."
10135-CVGroup_Tactic_Victory_1-1 = "Well, I guess that's what this amounted to."
10135-CVGroup_Tactic_Victory_2-1 = "That was simple. Anything else? It's only because I don't want it to bother me later!"
