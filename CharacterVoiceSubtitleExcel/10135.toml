[translation]
10135-CVGroup_Battle_Buffed_1-1 = "謝，謝謝……！"
10135-CVGroup_Battle_Defense_1-1 = "真無聊呢。"
10135-CVGroup_Battle_In_1-1 = "請不要太勉強自己哦。"
10135-CVGroup_Battle_In_2-1 = "既然是老師的請求……也沒辦法了呢。"
10135-CVGroup_Battle_Move_1-1 = "沒什麼大不了的呢。"
10135-CVGroup_Battle_Move_2-1 = "去就行了吧，去就是了。"
10135-CVGroup_Battle_Recovery_1-1 = "謝，謝謝。"
10135-CVGroup_Battle_TacticalAction_1-1 = "首先，往那邊……！"
10135-CVGroup_Battle_Victory_1-1 = "這是理所當然的結果。你有看到吧，老師？"
10135-CVGroup_Battle_Victory_2-1 = "哼。請再多感謝我一點。"
10135-CVGroup_CommonSkill-1 = "這也全都是你們的錯！"
10135-CVGroup_ExSkill_1-1 = "我的名字是Kei。"
10135-CVGroup_ExSkill_2-1 = "我就在這裡。"
10135-CVGroup_ExSkill_3-1 = "我就是我。"
10135-CVGroup_ExSkill_Level_1-1 = "我來幫你。"
10135-CVGroup_ExSkill_Level_2-1 = "我有幫上忙嗎？"
10135-CVGroup_ExSkill_Level_3-1 = "大概是這樣吧。"
10135-CVGroup_Formation_In_1-1 = "唉……請不要讓我做麻煩事哦。"
10135-CVGroup_Formation_In_2-1 = "知道了，做就行了吧？"
10135-CVGroup_Formation_Select-1 = "呀啊……！？\n這有什麼好玩的！？"
10135-CVGroup_Growup_1-1 = "……變強了呢。\n是的，我知道。\n我不否認這是託老師的福。\n所以，我會繼續戰鬥下去。"
10135-CVGroup_Growup_2-1 = "要抵抗的話就必須前進。\n之前我以為，這是必須一個人做的事情……\n最終，我明白了人是無法獨自生存的。"
10135-CVGroup_Growup_3-1 = "真是的，我不是已經說過了嗎？謝謝你之類的。\n咦？現在才第一次聽到……？\n反正現在說了不就行了嗎！？"
10135-CVGroup_Growup_4-1 = "所，所以……\n我只說一次，所以請仔細聽哦！\n這也全部是託老師的福……非常謝謝你。"
10135-CVGroup_Relationship_Up_1-1 = "怎，怎麼了嗎？我沒什麼要說的啊……？\n唔……我知道了……\n我，我對老師，並不討厭……這樣可以了嗎！？"
10135-CVGroup_Relationship_Up_2-1 = "怎麼一臉陰沉的樣子？\n咦？被我討厭了……？\n我，我又不是那個意思……\n……真是的。在你振作起來之前，我就陪著你吧。"
10135-CVGroup_Relationship_Up_3-1 = "咦？如果這樣說的話\n就什麼都不幫你了……？\n我，我什麼時候……！我只是……！\n啊！？你又在捉弄我了對吧！？"
10135-CVGroup_Relationship_Up_4-1 = "嘶……呼……\n這，這種話我很少說，所以請仔細聽哦！？\n……請不要做太危險的事。\n老師要是不在了……我也會很討厭的。"
10135-CVGroup_Tactic_In_1-1 = "唉……為什麼是我……"
10135-CVGroup_Tactic_In_2-1 = "因為，似乎是不得不做的事……"
10135-CVGroup_Tactic_Victory_1-1 = "嗯，大概就這樣吧。"
10135-CVGroup_Tactic_Victory_2-1 = "很簡單呢。還有其他要做的嗎？\n不，只是之後再做很麻煩而已。\n並不是因為有幹勁了。"
