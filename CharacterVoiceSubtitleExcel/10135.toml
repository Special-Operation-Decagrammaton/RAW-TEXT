[translation]
10135-CVGroup_Battle_Buffed_1-1 = "고맙, 습니다……!"
10135-CVGroup_Battle_Defense_1-1 = "하찮기는."
10135-CVGroup_Battle_In_1-1 = "모두, 너무 무리하지 마세요."
10135-CVGroup_Battle_In_2-1 = "어쩔 수 없네요. 선생님이 부탁했으니, 뭐."
10135-CVGroup_Battle_Move_1-1 = "별거 아니었네요."
10135-CVGroup_Battle_Move_2-1 = "가면 되잖아요, 가면."
10135-CVGroup_Battle_Recovery_1-1 = "가, 감사합니다."
10135-CVGroup_Battle_TacticalAction_1-1 = "일단, 저곳으로……!"
10135-CVGroup_Battle_Victory_1-1 = "당연한 결과네요. 보셨죠, 선생님?"
10135-CVGroup_Battle_Victory_2-1 = "흥. 좀 더 저에게 감사하시라구요, 선생님?"
10135-CVGroup_CommonSkill-1 = "이거, 당신들 탓이니까요?!"
10135-CVGroup_ExSkill_1-1 = "제 이름은, 케이입니다."
10135-CVGroup_ExSkill_2-1 = "저는, 여기에 있어요."
10135-CVGroup_ExSkill_3-1 = "저는 그저, 저 자신일 뿐이에요."
10135-CVGroup_ExSkill_Level_1-1 = "뭐, 도와 드리도록 할게요."
10135-CVGroup_ExSkill_Level_2-1 = "도움이 되셨나요?"
10135-CVGroup_ExSkill_Level_3-1 = "이 정도로군요."
10135-CVGroup_Formation_In_1-1 = "이상한 거 시키기만 해 봐요."
10135-CVGroup_Formation_In_2-1 = "알겠어요, 알겠어요. 하면 되잖습니까."
10135-CVGroup_Formation_Select-1 = "꺄앗……?! 이, 이러면 재미있나요?!"
10135-CVGroup_Growup_1-1 = "……강해졌네요. 네. 알고 있습니다.\n선생님 덕분이라는 걸, 부정하지는 않겠어요. 그러니까 저는 계속 싸울 거예요."
10135-CVGroup_Growup_2-1 = "저항하려면, 나아가야겠죠.\n예전에는 그것까지도 혼자서 해야 한다고 생각했지만…… 결국 사람은, 혼자서는 살아갈 수 없는 법이니까요."
10135-CVGroup_Growup_3-1 = "정말, 말씀드렸잖아요. 감사한다고요. 네?\n그 말 지금 막 들었다고요? 어쨌든 들었으니까 됐잖아요!"
10135-CVGroup_Growup_4-1 = "그, 그러니까…… 딱 한 번만 말할 테니까, 잘 들어요!\n이것도 모두, 선생님 덕분이에요. 감사, 합니다……"
10135-CVGroup_Relationship_Up_1-1 = "뭐…… 뭔가요! 저는 아무것도 말 안 할 테니까요!\n으윽…… 알았어요…… 서, 선생님이 싫은 건 아니에요. 이제 됐나요?"
10135-CVGroup_Relationship_Up_2-1 = "왜 또 풀 죽어 있고 그래요? 네? 저한테 미움받는 것 같아서 그렇다고요?\n저, 저는 그런 뜻이 아니라…… ……기운 차리실 때까지, 같이 있어 드리면 되죠……?"
10135-CVGroup_Relationship_Up_3-1 = "예? 그렇게까지 말한다면 이제부터 저에게 아무것도 안 하겠다고요……?\n제, 제가 언제 그랬는데요! 저는 그냥……! 아!!! 또 놀리는 거죠?!?!"
10135-CVGroup_Relationship_Up_4-1 = "스읍- 하아…… 크, 큰맘 먹고 말해 드리는 거니까 말이죠! 잘 들어요!\n……너무 위험한 일은, 하지 마세요. 선생님이 없어지는 건…… 저도, 싫으니까요……"
10135-CVGroup_Tactic_In_1-1 = "정말이지, 왜 내가……"
10135-CVGroup_Tactic_In_2-1 = "일단은 해야 할 일이니까 말이죠……"
10135-CVGroup_Tactic_Victory_1-1 = "뭐, 이 정도였네요."
10135-CVGroup_Tactic_Victory_2-1 = "간단했네요. 뭐 또 없어요? 나중에 귀찮아지기 싫을 뿐이니까 말이죠!"
