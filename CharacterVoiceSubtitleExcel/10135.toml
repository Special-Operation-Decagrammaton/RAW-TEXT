[translation]
10135-CVGroup_Battle_Buffed_1-1 = "ขอบคุณ... ค่ะ...!"
10135-CVGroup_Battle_Defense_1-1 = "เรื่องเล็กน้อยน่ะ"
10135-CVGroup_Battle_In_1-1 = "ทุกคน อย่าฝืนมากเกินไปนะคะ"
10135-CVGroup_Battle_In_2-1 = "ช่วยไม่ได้นะคะ คุณครูอุตส่าห์ขอร้องทั้งที..."
10135-CVGroup_Battle_Move_1-1 = "ไม่ใช่อะไรใหญ่โตนี่คะ"
10135-CVGroup_Battle_Move_2-1 = "ก็แค่ต้องไปนี่คะ ก็แค่ต้องไปเอง"
10135-CVGroup_Battle_Recovery_1-1 = "ขะ... ขอบคุณค่ะ"
10135-CVGroup_Battle_TacticalAction_1-1 = "ก่อนอื่นก็ ตรงโน้น...!"
10135-CVGroup_Battle_Victory_1-1 = "เป็นผลลัพธ์ที่แน่นอนอยู่แล้วค่ะ เห็นใช่มั้ยคะคุณครู?"
10135-CVGroup_Battle_Victory_2-1 = "ฮึ่ม ควรจะขอบคุณฉันให้มากกว่านี้นะคะ คุณครู"
10135-CVGroup_CommonSkill-1 = "นี่คือความผิดของพวกคุณนะคะ!"
10135-CVGroup_ExSkill_1-1 = "ฉันคือเคย์ค่ะ"
10135-CVGroup_ExSkill_2-1 = "ฉันอยู่ที่นี่ค่ะ"
10135-CVGroup_ExSkill_3-1 = "ฉันเป็นแค่ตัวของฉันเองค่ะ"
10135-CVGroup_ExSkill_Level_1-1 = "ก็ได้ ฉันจะช่วยเองค่ะ"
10135-CVGroup_ExSkill_Level_2-1 = "ฉันเป็นประโยชน์หรือเปล่าคะ?"
10135-CVGroup_ExSkill_Level_3-1 = "ประมาณนี้สินะคะ"
10135-CVGroup_Formation_In_1-1 = "อย่าสั่งให้ทำอะไรแปลกๆ นะคะ"
10135-CVGroup_Formation_In_2-1 = "เข้าใจแล้วค่ะ เข้าใจแล้ว ก็แค่ต้องไปทำนี่คะ"
10135-CVGroup_Formation_Select-1 = "ว้ายย...?!\nทะ... ทำแบบนี้มันสนุกเหรอคะ?!"
10135-CVGroup_Growup_1-1 = "แข็งแกร่งขึ้นแล้วนะคะ... ค่ะ\nฉันรู้ว่าเป็นเพราะคุณครูค่ะ ฉันจะไม่ปฏิเสธค่ะ\nเพราะงั้นฉันจะสู้ต่อไปค่ะ"
10135-CVGroup_Growup_2-1 = "ถ้าจะต้านไว้ ก็ต้องไปข้างหน้าค่ะ\nเมื่อก่อนฉันคิดว่าต้องทำแม้กระทั่งเรื่องนั้นคนเดียว...\nแต่ท้ายที่สุดแล้วคนเราก็อยู่ตามลำพังไม่ได้ค่ะ"
10135-CVGroup_Growup_3-1 = "จริงๆ เลย ฉันก็บอกไปแล้วนี่คะ ขอบคุณค่ะ\nคะ? เพิ่งจะได้ยินคำนั้นเอาตอนนี้งั้นเหรอคะ?\nถ้าได้ยินแล้วก็ให้เรื่องมันจบไปเถอะค่ะ!"
10135-CVGroup_Growup_4-1 = "คะ... คือว่า... ฉันจะบอกแค่ครั้งเดียว ตั้งใจฟังให้ดีนะคะ!\nทั้งหมดนี้ก็ต้องขอบคุณคุณครูนะคะ ขอบคุณ... ค่ะ..."
10135-CVGroup_Relationship_Up_1-1 = "อะ... อะไรกันคะ! ฉันจะไม่พูดอะไรทั้งนั้นค่ะ!\nอึก... เข้าใจแล้วค่ะ...\nฉะ... ฉันไม่ได้ไม่ชอบคุณครูหรอกค่ะ พอใจหรือยังคะ?"
10135-CVGroup_Relationship_Up_2-1 = "ทำไมถึงหงอยอีกแล้วล่ะคะ?\nคะ? เพราะรู้สึกเหมือนโดนฉันเกลียดงั้นเหรอคะ?\nฉะ... ฉันไม่ได้มีเจตนาแบบนั้น... แค่อยู่ด้วยกันจนกว่าจะรู้สึกดีใช่มั้ยคะ...?"
10135-CVGroup_Relationship_Up_3-1 = "คะ? ถ้าจะพูดถึงขนาดนั้น จากนี้จะไม่ทำอะไรให้ฉันแล้วงั้นเหรอคะ...?\nฉะ... ฉันไปทำแบบนั้นตั้งแต่เมื่อไรคะ! ฉันก็แค่...!\nอ๊ะ!!! แกล้งกันอีกแล้วใช่มั้ยคะ?!?!"
10135-CVGroup_Relationship_Up_4-1 = "ฮึ่ม... เฮ้อ... นะ... นี่ฉันรวบรวมความกล้ามาพูดเลยนะคะ!\nฟังให้ดีนะคะ! อย่าทำเรื่องอะไรที่อันตรายเกินไปสิคะ...\nฉันไม่อยากให้... คุณครูหายไปค่ะ..."
10135-CVGroup_Tactic_In_1-1 = "จริงๆ เลยเชียว ทำไมฉันต้อง..."
10135-CVGroup_Tactic_In_2-1 = "ก็มันเป็นงานที่ต้องทำนี่คะ..."
10135-CVGroup_Tactic_Victory_1-1 = "ก็แค่ประมาณนี้สินะคะ"
10135-CVGroup_Tactic_Victory_2-1 = "ง่ายดีจังเลยค่ะ ไม่มีงานอื่นแล้วเหรอคะ?\nฉันแค่กลัวว่าต่อไปตัวเองจะเบื่อต่างหากค่ะ!"
