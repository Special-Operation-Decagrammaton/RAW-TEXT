[translation]
20013-CVGroup_CommonSkill-1 = "I'll beef up some of the weaker points in our security."
20013-CVGroup_ExSkill_1-1 = "I don't like cracking like this, but..."
20013-CVGroup_ExSkill_2-1 = "I guess if it's for my adorable underclassmen..."
20013-CVGroup_ExSkill_3-1 = "*sigh* Just this once."
20013-CVGroup_ExSkill_Level_1-1 = "It's not a bad idea to be more conscious of security."
20013-CVGroup_ExSkill_Level_2-1 = "...Yep. I saw everything."
20013-CVGroup_ExSkill_Level_3-1 = "...BOOM!"
20013-CVGroup_Formation_In_1-1 = "...Hm? Is there a new security vulnerability?"
20013-CVGroup_Formation_In_2-1 = "Got it. I'll be there right away."
20013-CVGroup_Formation_Select-1 = "*yawn* Uh! ...Can you get me a cup of coffee?"
20013-CVGroup_Growup_1-1 = "Yep. There is no end to how much one can learn."
20013-CVGroup_Growup_2-1 = "You always bring me new knowledge..."
20013-CVGroup_Growup_3-1 = "Thanks, Sensei. My understanding is improved."
20013-CVGroup_Growup_4-1 = "Hm... That's some good data."
20013-CVGroup_Relationship_Up_1-1 = "Be honest with me, Sensei. I don't want to hack you for the info."
20013-CVGroup_Relationship_Up_2-1 = "I'll always be here to support you."
20013-CVGroup_Relationship_Up_3-1 = "I'm not comfortable leaving naive people like you unprotected, Sensei... Ehem, you know, it's bad for security."
20013-CVGroup_Relationship_Up_4-1 = "Sensei, um... Would it be all right if I came by for a late-night security sweep?"
