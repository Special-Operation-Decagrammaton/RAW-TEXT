[translation]
20013-CVGroup_CommonSkill-1 = "安全方面的弱點，我會修復的。"
20013-CVGroup_ExSkill_1-1 = "雖然這種破解實在不是我的愛好……"
20013-CVGroup_ExSkill_2-1 = "如果是為了可愛的後輩們的話，這也沒辦法。"
20013-CVGroup_ExSkill_3-1 = "……唉。這種事下不為例哦。"
20013-CVGroup_ExSkill_Level_1-1 = "還是多保持安全意識會比較好。"
20013-CVGroup_ExSkill_Level_2-1 = "……嗯，全都能看見了。"
20013-CVGroup_ExSkill_Level_3-1 = "……BOOM！"
20013-CVGroup_Formation_In_1-1 = "……嗯？發現了新的安全漏洞嗎？"
20013-CVGroup_Formation_In_2-1 = "了解，我馬上過去。"
20013-CVGroup_Formation_Select-1 = "呼啊……老師，要來杯咖啡嗎？"
20013-CVGroup_Growup_1-1 = "嗯，果然學習是不存在極限的啊。"
20013-CVGroup_Growup_2-1 = "老師教導我的知識，總是能讓我耳目一新呢。"
20013-CVGroup_Growup_3-1 = "謝謝你，老師。我又變聰明了一點。"
20013-CVGroup_Growup_4-1 = "嘿……是不錯的資料呢。"
20013-CVGroup_Relationship_Up_1-1 = "因為我不想對老師進行駭入之類的行為……\n所以心裡的事，希望您能坦率地告訴我。"
20013-CVGroup_Relationship_Up_2-1 = "我隨時都會從這裡支援老師。"
20013-CVGroup_Relationship_Up_3-1 = "像老師這種天真的人，實在讓人放心不下……\n……單純是指安全方面的事。"
20013-CVGroup_Relationship_Up_4-1 = "老師，那個……今晚能去進行深夜的安全檢查嗎？"
