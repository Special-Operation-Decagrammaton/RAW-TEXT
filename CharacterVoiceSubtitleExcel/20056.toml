20056-CVGroup_ExSkill_2-1 = "놀아볼까나! ……우와아악?!"
20056-CVGroup_ExSkill_3-1 = "코유키, 컴백! ……우와아악?!"
20056-CVGroup_ExSkill_Level_1-1 = "쌓, 쌓였다! 쌓여 버렸어!"
20056-CVGroup_ExSkill_Level_2-1 = "이, 이 정도면 럭키, 겠죠……?!"
20056-CVGroup_ExSkill_Level_3-1 = "제, 제 잘못은 아닌 것 같은데!"
20056-CVGroup_Formation_In_1-1 = "역시! 저밖에 없죠?!"
20056-CVGroup_Formation_In_2-1 = "갑시다!!!"
20056-CVGroup_Formation_Select-1 = "우왁! 아니 근데 이번에는 내가 한 거 아니라고요!"
20056-CVGroup_Growup_1-1 = "니하하하! 고맙습니다, 선생님!"
20056-CVGroup_Growup_2-1 = "주신 것은! 거절하지 않는 것이 예의! 고맙습니다!"
