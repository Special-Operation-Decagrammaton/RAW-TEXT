20056-CVGroup_Growup_4-1 = "이, 이렇게 다 주신다고요……? 이, 이러면 선생님한테 대체 뭐가 남죠……?"
20056-CVGroup_Relationship_Up_1-1 = "선물이라니……! ……오늘 무슨 날인가요?"
