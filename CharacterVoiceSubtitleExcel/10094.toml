[translation]
10094-CVGroup_Battle_Buffed_1-1 = "อื้อ! ขอบคุณนะ!"
10094-CVGroup_Battle_Covered_1-1 = "ซ่อนตัว!"
10094-CVGroup_Battle_Defense_1-1 = "ไม่โดนหรอกน่า!"
10094-CVGroup_Battle_In_1-1 = "ทำงานให้เหมือนเล่นเกม เล่นเกมให้เหมือนทำงาน!"
10094-CVGroup_Battle_In_2-1 = "ถ้าจะให้รู้สึกเหมือนเมดจริงๆ ก็ต้องทำงานแบบนี้ใช่มั้ยละ?"
10094-CVGroup_Battle_Move_1-1 = "เอาละ เสร็จงานแล้ว~!"
10094-CVGroup_Battle_Move_2-1 = "ทำความสะอาดเรียบร้อย! เหนื่อยจัง"
10094-CVGroup_Battle_Recovery_1-1 = "ขอบคุณนะ!"
10094-CVGroup_Battle_TacticalAction_1-1 = "ต่อไปคือที่ไหนล่ะ!"
10094-CVGroup_Battle_Victory_1-1 = "ฮืมฮุฮุ~ เห็นรึเปล่า คุณครู?\nวันนี้น้องเมดโมโมอิสุดยอดเลยใช่มั้ย?"
10094-CVGroup_Battle_Victory_2-1 = "วะฮ่ะฮ่า! นี่มัน... อ๊าย!?"
10094-CVGroup_CommonSkill-1 = "ไม่ชอบทำความสะอาดอะ~ แอ่ก?!"
10094-CVGroup_ExSkill_1-1 = "ผิดทางอีกแล้วเรอะ!\nเอะ... เอ๋?"
10094-CVGroup_ExSkill_2-1 = "โมโหแล้วนะ!\nเอ๋? ลักกี้!"
10094-CVGroup_ExSkill_3-1 = "จริงๆ เลย... เจอนี่ซะ!\nเอ๋ นี่มันอะไรน่ะ?"
10094-CVGroup_ExSkill_Level_1-1 = "เจอแล้ว แรร์ไอเทม!"
10094-CVGroup_ExSkill_Level_2-1 = "โอ้ววว พลังนี่มัน...!"
10094-CVGroup_ExSkill_Level_3-1 = "ตอนนี้ฉันน่ะ! ไม่เกรงกลัวใครอีกแล้ว!"
10094-CVGroup_Formation_In_1-1 = "มาเป็นเมดกันเลยมั้ย!"
10094-CVGroup_Formation_In_2-1 = "ฉันจะแก้ปัญหาทุกอย่างให้สมกับเป็นน้องเมดเอง!"
10094-CVGroup_Formation_Select-1 = "เฮ้~! ดูอยู่รึเปล่า คุณครู?\nฉันจะคลี่คลายทุกเรื่องให้เอง!"
10094-CVGroup_Growup_1-1 = "เลเวลอัป! เมดก็เลเวลอัป!\nเอ๋? เลเวลของเมดไม่เพิ่มงั้นเหรอ? คุณครู! หมายความว่าไงน่ะ?"
10094-CVGroup_Growup_2-1 = "คุณครู! ฮิฮิ ฉันแข็งแกร่งขึ้นแล้วละ\nเอ๋? งั้นมาทำความสะอาดด้วยกันเหรอ? เรื่องนั้น..."
10094-CVGroup_Growup_3-1 = "คอยดูการเติบโตของเมดโมโมอิให้ดีๆ ล่ะ!\nเป็นไง คุณครู?"
10094-CVGroup_Growup_4-1 = "อ่า~อ่า ช่วยไม่ได้นะ\nโมโมอิ ท่านเมดสุดแกร่งจะจัดการทุกเรื่องให้เอง!"
10094-CVGroup_Relationship_Up_1-1 = "ถะ... ถ้าอยู่กับคุณครู มันสนุกมากเลยละ\nคือ... ฉันพูดจริงๆ นะ"
10094-CVGroup_Relationship_Up_2-1 = "ฟังให้ดีนะคุณครู! ค่าตอบแทนเป็นสิ่งสำคัญสำหรับเมดนะ!\nเพราะงั้นจะต้องให้รางวัลฉันโดย... มาเล่นกับฉันนะ!"
10094-CVGroup_Relationship_Up_3-1 = "เมดก็เป็นคนเหมือนกัน! และถ้าคนเราไม่พักผ่อนบ้างก็จะผุพังเอาได้นะ...\nเพราะงั้นตอนนี้คุณครูจะต้องมาพักผ่อนกับฉันล่ะ! แหะๆๆ"
10094-CVGroup_Relationship_Up_4-1 = "เวลาเมดปรากฏตัวในเกม... จะมีโอกาสสูงที่จะตกเป็นเป้าหมายนะ\nเพราะงั้นคุณครู ลองโจมตีฉัน... ดูมั้ย?"
10094-CVGroup_Tactic_In_1-1 = "รีบๆ เก็บกวาดแล้วไปเล่นเกมกันเถอะ!"
10094-CVGroup_Tactic_In_2-1 = "ไม่มีปัญหา! เพราะมีฉันอยู่ด้วยทั้งคน!"
10094-CVGroup_Tactic_Victory_1-1 = "ทำความสะอาดเรียบร้อย! เอาเถอะ ก็ประมาณนั้นนั่นแหละ!"
10094-CVGroup_Tactic_Victory_2-1 = "ฉันเป็นพวกจะทำก็ทำได้นะ!"
