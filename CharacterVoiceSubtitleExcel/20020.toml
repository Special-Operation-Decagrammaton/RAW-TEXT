[translation]
20020-CVGroup_CommonSkill-1 = "후후…. 깜짝 놀라셨나요?"
20020-CVGroup_ExSkill_1-1 = "천재 미소녀 해커의 진수, 보여드리지요."
20020-CVGroup_ExSkill_2-1 = "후훗…. 간단한 일이네요."
20020-CVGroup_ExSkill_3-1 = "이걸 이렇게 하면- 얍~"
20020-CVGroup_ExSkill_Level_1-1 = "네, 결과랍니다."
20020-CVGroup_ExSkill_Level_2-1 = "여기를 살짝 보강해두도록 하죠."
20020-CVGroup_ExSkill_Level_3-1 = "흥미로운 결과네요."
20020-CVGroup_Formation_In_1-1 = "어머나, 제 도움이 필요하신 거네요?"
20020-CVGroup_Formation_In_2-1 = "선생님의 요청이라면…… 네. 얼마든지."
20020-CVGroup_Formation_Select-1 = "어머, 이 초천재병약미소녀에게……\n반해버리셨나요?"
20020-CVGroup_Growup_1-1 = "이게… 성장, 했다는 걸까요? 제법 흥미롭네요. 후훗."
20020-CVGroup_Growup_2-1 = "기대를 받은 만큼, 보답하겠어요. 저에겐 간단한 일이랍니다. 후훗."
20020-CVGroup_Growup_3-1 = "선생님과 함께라면….\n밀레니엄의 초천재 미소녀인 저라도, 또 새로운 것을 배울 수 있구나. 하고 놀랐답니다. 후훗."
20020-CVGroup_Growup_4-1 = "감사해요. 선생님. 조금 즐거워졌어요."
20020-CVGroup_Relationship_Up_1-1 = "후훗……. 조금 가깝네요. 선생님. 그…. 거리감… 이라고 할지."
20020-CVGroup_Relationship_Up_2-1 = "선생님과 함께 있다 보면 느껴지는, 이 감각은 대체….\n<전지>의 학위를 가진 제가, 파악하지 못한 것이 있으리라고는…."
20020-CVGroup_Relationship_Up_3-1 = "이 가슴에 퍼지는 뜨거운 감정….\n그다지 열기엔 익숙하지 않지만….\n네, 나쁘지 않은 느낌이네요."
20020-CVGroup_Relationship_Up_4-1 = "왠지 평소보다 덥네요….\n하지만, 외투를 벗진 않을 거예요.\n…그랬다간, 얼굴이 화끈거리는 이유를 기온 탓으로 돌릴 수 없으니까요."
