[translation]
20020-CVGroup_CommonSkill-1 = "呵呵……嚇到了嗎？"
20020-CVGroup_ExSkill_1-1 = "天才美少女駭客的真本事，就讓你們見識見識吧。"
20020-CVGroup_ExSkill_2-1 = "呵呵……簡直易如反掌。"
20020-CVGroup_ExSkill_3-1 = "把這個像這樣……嘿。"
20020-CVGroup_ExSkill_Level_1-1 = "是的，就像這樣。"
20020-CVGroup_ExSkill_Level_2-1 = "稍微補強一下這裡吧。"
20020-CVGroup_ExSkill_Level_3-1 = "真是有趣的結果呢。"
20020-CVGroup_Formation_In_1-1 = "哎呀，您需要我的幫助呢？"
20020-CVGroup_Formation_In_2-1 = "如果是老師的請求……沒問題，請儘管說。"
20020-CVGroup_Formation_Select-1 = "哎呀，超天才病弱美少女……讓您看到著迷了嗎？"
20020-CVGroup_Growup_1-1 = "這就是……成長嗎？\n真是相當有趣呢，呵呵。"
20020-CVGroup_Growup_2-1 = "您對我抱持的期待，我會好好回應的。\n因為這對我而言只是小事一樁。呵呵。"
20020-CVGroup_Growup_3-1 = "只要跟老師待在一起……\n就連身為千年超天才美少女的我也能學到新東西，真令人驚訝呢。呵呵。"
20020-CVGroup_Growup_4-1 = "謝謝您，老師。\n稍微變得更有趣了。"
20020-CVGroup_Relationship_Up_1-1 = "呵呵……稍微有點近唷，老師。\n那個，距離感……該這麼說嗎。"
20020-CVGroup_Relationship_Up_2-1 = "跟老師在一起就能感受到的這股感覺，究竟是……\n擁有「全知」學位的我，居然也存在無法掌握的事情呢……"
20020-CVGroup_Relationship_Up_3-1 = "這股在胸口蔓延的熾熱感情……\n雖然我不是很耐熱……\n嗯，感覺還不錯呢。"
20020-CVGroup_Relationship_Up_4-1 = "總覺得比平時還熱呢……\n不過，我是不會脫掉上衣的。\n……否則就無法將臉部發熱的理由歸咎於氣溫了。"
