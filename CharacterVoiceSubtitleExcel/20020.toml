[translation]
20020-CVGroup_CommonSkill-1 = "ฮุฮุ... ตกใจเลยเหรอคะ?"
20020-CVGroup_ExSkill_1-1 = "ฉันจะแสดงให้เห็นแก่นแท้ของสาวน้อยแฮ็กเกอร์อัจฉริยะค่ะ"
20020-CVGroup_ExSkill_2-1 = "ฮุฮุ... งานง่ายๆ นะคะเนี่ย "
20020-CVGroup_ExSkill_3-1 = "ถ้าทำแบบนี้ละก็ ย้าก~"
20020-CVGroup_ExSkill_Level_1-1 = "ค่ะ นี่คือผลลัพธ์ค่ะ"
20020-CVGroup_ExSkill_Level_2-1 = "มาเสริมตรงนี้กันหน่อยค่ะ"
20020-CVGroup_ExSkill_Level_3-1 = "เป็นผลลัพธ์ที่น่าสนใจนะคะ"
20020-CVGroup_Formation_In_1-1 = "ตายจริง ต้องการความช่วยเหลือจากฉันเหรอคะ?"
20020-CVGroup_Formation_In_2-1 = "ถ้าเป็นคำขอจากคุณครู... ค่ะ ฉันพร้อมเสมอค่ะ"
20020-CVGroup_Formation_Select-1 = "อุ๊ยตาย ตกหลุมรัก...\nแฮ็กเกอร์ผู้มีรอยยิ้มฮีลใจเหมือนยาวิเศษคนนี้แล้วเหรอคะ?"
20020-CVGroup_Growup_1-1 = "นี่แปลว่า... เติบโตขึ้นแล้วเหรอคะ?\nน่าสนใจทีเดียวนะคะ ฮุฮุ "
20020-CVGroup_Growup_2-1 = "ฉันจะตอบแทนให้เท่ากับที่คาดหวังเลยค่ะ\nเป็นง่ายงานๆ สำหรับฉันค่ะ ฮุฮุ"
20020-CVGroup_Growup_3-1 = "ถ้าได้อยู่กับคุณครูละก็...\nแฮ็กเกอร์สาวแสนสวยแห่งมิลเลเนียมอย่างฉัน\nก็ได้เรียนรู้อะไรใหม่ๆ อีกแล้วสินะ น่าตกใจจังเลยค่ะ ฮุฮุ "
20020-CVGroup_Growup_4-1 = "ขอบคุณค่ะ คุณครู\nสนุกขึ้นมาอีกหน่อยนะคะ"
20020-CVGroup_Relationship_Up_1-1 = "ฮุฮุ... ใกล้กันจังเลยนะคะ คุณครู\nเอ่อ... ระยะห่าง... นี้มัน"
20020-CVGroup_Relationship_Up_2-1 = "ความรู้สึกเวลาอยู่กับคุณครูนี้มัน...\nไม่คิดเลยว่าจะมีเรื่องที่เจ้าของใบปริญญารอบรู้อย่างฉัน\nจะวิเคราะห์ไม่ได้..."
20020-CVGroup_Relationship_Up_3-1 = "ความรู้สึกร้อนผ่าวที่แผ่ซ่านในใจนี้...\nฉันไม่ชินกับความร้อนเท่าไร...\nค่ะ แต่ก็ไม่รู้สึกแย่นะคะ "
20020-CVGroup_Relationship_Up_4-1 = "เหมือนจะร้อนกว่าปกตินะคะ... แต่ฉันก็จะไม่ถอดเสื้อคลุมค่ะ\nเพราะถ้าไม่อย่างนั้น ฉันจะโบ้ยว่าอุณหภูมิคือ\nสาเหตุที่ทำให้หน้าร้อนผ่าวไม่ได้ค่ะ"
