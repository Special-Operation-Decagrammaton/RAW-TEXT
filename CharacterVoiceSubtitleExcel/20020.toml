[translation]
20020-CVGroup_CommonSkill-1 = "Heehee... Were you surprised?"
20020-CVGroup_ExSkill_1-1 = "I'll show you exactly what a genius hacker is capable of."
20020-CVGroup_ExSkill_2-1 = "Heehee! That was easy. "
20020-CVGroup_ExSkill_3-1 = "If I do this, then... Yes."
20020-CVGroup_ExSkill_Level_1-1 = "Yes. So it would seem."
20020-CVGroup_ExSkill_Level_2-1 = "We should reinforce this area."
20020-CVGroup_ExSkill_Level_3-1 = "What an intriguing result."
20020-CVGroup_Formation_In_1-1 = "Oh my, you need my help?"
20020-CVGroup_Formation_In_2-1 = "If it's Sensei's request... Yes. Anytime."
20020-CVGroup_Formation_Select-1 = "Oh my, did you...fall for this super genius delicate beauty?"
20020-CVGroup_Growup_1-1 = "Does this mean...I've grown? How interesting! Heehee! "
20020-CVGroup_Growup_2-1 = "The greater the expectation, the more I rise to the occasion. After all, it's a simple matter for a genius like me. Heehee!"
20020-CVGroup_Growup_3-1 = "When I'm with you... I'm surprised by the number of new things I can learn, despite being Millennium's resident genius. "
20020-CVGroup_Growup_4-1 = "Thank you, Sensei. I'm having fun."
20020-CVGroup_Relationship_Up_1-1 = "Heehee! Sensei, we're a bit too close... Physically, I mean."
