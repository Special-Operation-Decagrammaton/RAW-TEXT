20020-CVGroup_Relationship_Up_3-1 = "There's a warm feeling spreading throughout my chest. I'm not accustomed to it, but... I must admit it's not bad... "
20020-CVGroup_Relationship_Up_4-1 = "It feels hotter than usual, yes. But I can't take off my jacket. Otherwise you'd know all my blushing is from more than just the heat!"
