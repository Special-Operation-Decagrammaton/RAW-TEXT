[translation]
20040-CVGroup_CommonSkill-1 = "จุดอ่อน... คือตรงนี้สินะ"
20040-CVGroup_ExSkill_1-1 = "เธอจะค่อยๆ แข็งแกร่งขึ้น... แข็งแกร่งขึ้น..."
20040-CVGroup_ExSkill_2-1 = "เอาละ จงสู้เต็มที่เพื่อฉันซะ"
20040-CVGroup_ExSkill_3-1 = "เป็นไงล่ะ? รู้สึกแข็งแกร่งขึ้นใช่มั้ย?"
20040-CVGroup_ExSkill_Level_1-1 = "เป็นไงล่ะ? ได้ผลใช่มั้ย?"
20040-CVGroup_ExSkill_Level_2-1 = "แพนเดโมเนียม โซไซตี้ เปิดฉากระดมยิงได้!"
20040-CVGroup_ExSkill_Level_3-1 = "ฮุฮุ นี่แหละพลังของฉัน"
20040-CVGroup_Formation_In_1-1 = "ถึงเวลาใช้พลังสะกดจิตของฉันแล้วสินะ~"
20040-CVGroup_Formation_In_2-1 = "จะให้ฉันช่วยเหรอ?"
20040-CVGroup_Formation_Select-1 = "ฮุฮุ ไม่ต้องถือแบบนั้นก็ได้"
20040-CVGroup_Growup_1-1 = "ฮุฮุ... รู้สึกดีจริงๆ ไปได้สวยเลยสินะ?"
20040-CVGroup_Growup_2-1 = "รู้สึกเหมือนแข็งแกร่งขึ้นแล้วละ"
20040-CVGroup_Growup_3-1 = "ฮุฮุ ต่อไปก็ขอรบกวนแบบนี้อีกนะ ครู?"
20040-CVGroup_Growup_4-1 = "ฮุ... เท่านี้ก็เหมือนสำเร็จเป้าหมายที่ตั้งใจไว้แล้วละ\nขอแสดงความขอบคุณแล้วกันนะ ครู"
20040-CVGroup_Relationship_Up_1-1 = "เป็นกระบวนการสร้างความไว้วางใจน่ะ~"
20040-CVGroup_Relationship_Up_2-1 = "ไว้ใจฉันใช่มั้ย ครู?"
20040-CVGroup_Relationship_Up_3-1 = "ฮุฮุ รู้สึกเหมือนระยะห่างระหว่างฉันกับครูจะลดลงบ้างแล้วนะ\nสัก... นิดหนึ่งน่ะ?"
20040-CVGroup_Relationship_Up_4-1 = "หลังจากนี้ครูก็ต้องคอยอยู่เคียงข้างฉันนะ\nสิทธิ์ปฏิเสธ...? คิดว่ามีสิทธิ์ทำแบบนั้นด้วยเหรอ? ฮุฮุ"
