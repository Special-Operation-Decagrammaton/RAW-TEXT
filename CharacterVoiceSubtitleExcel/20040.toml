[translation]
20040-CVGroup_CommonSkill-1 = "약점은…여기군."
20040-CVGroup_ExSkill_1-1 = "당신은 점점 강해진다… 강해진다…"
20040-CVGroup_ExSkill_2-1 = "자아, 나를 위해 힘내주렴."
20040-CVGroup_ExSkill_3-1 = "어때? 강해진 것 같지?"
20040-CVGroup_ExSkill_Level_1-1 = "어때? 효과 있지?"
20040-CVGroup_ExSkill_Level_2-1 = "만마전, 총공격이야!"
20040-CVGroup_ExSkill_Level_3-1 = "후후, 이것이 나의 힘이야."
20040-CVGroup_Formation_In_1-1 = "내 최면술이 활약할 차례네~"
20040-CVGroup_Formation_In_2-1 = "내가 필요하구나?"
20040-CVGroup_Formation_Select-1 = "후후, 그렇게 잡지 않아도 된다고?"
20040-CVGroup_Growup_1-1 = "후후… 좋은 느낌이야. 순조롭군?"
20040-CVGroup_Growup_2-1 = "조금 강해진 느낌이 들어."
20040-CVGroup_Growup_3-1 = "후훗, 앞으로도 이렇게 부탁해, 선생?"
20040-CVGroup_Growup_4-1 = "후… 이로써 목표는 달성한 것이나 마찬가지. 감사를 표할게, 선생."
20040-CVGroup_Relationship_Up_1-1 = "신뢰를 쌓아가는 과정이지~"
20040-CVGroup_Relationship_Up_2-1 = "나를 믿고 있는 거지, 선생?"
20040-CVGroup_Relationship_Up_3-1 = "후후, 선생과의 거리감이 점점 좁혀지는 느낌인걸. 조금…… 많이?"
20040-CVGroup_Relationship_Up_4-1 = "선생은 앞으로도 항상 내 곁에 있어 줘야겠어.\n…거부권? 있을 거라 생각해? 후훗."
