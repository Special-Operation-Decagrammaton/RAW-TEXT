[translation]
20040-CVGroup_CommonSkill-1 = "弱點在……這裡吧。"
20040-CVGroup_ExSkill_1-1 = "你會漸漸變強……變得更強……"
20040-CVGroup_ExSkill_2-1 = "來，好好為我努力吧。"
20040-CVGroup_ExSkill_3-1 = "怎麼樣？已經變強了哦，能感覺出來嗎？"
20040-CVGroup_ExSkill_Level_1-1 = "看，有效果了吧？"
20040-CVGroup_ExSkill_Level_2-1 = "萬魔殿，發動總攻擊！"
20040-CVGroup_ExSkill_Level_3-1 = "呵呵，這就是我的力量。"
20040-CVGroup_Formation_In_1-1 = "到了展現那個的時候了呢。"
20040-CVGroup_Formation_In_2-1 = "哎呀，需要我的催眠術嗎？"
20040-CVGroup_Formation_Select-1 = "呵呵，明明沒必要那樣拉著的。"
20040-CVGroup_Growup_1-1 = "呵呵……感覺不錯呢。挺順利的嘛？"
20040-CVGroup_Growup_2-1 = "感覺，稍微變強了。"
20040-CVGroup_Growup_3-1 = "呵呵，要繼續麻煩你囉，老師？"
20040-CVGroup_Growup_4-1 = "呼……這樣目標基本等同於達成了。\n感謝你，老師。"
20040-CVGroup_Relationship_Up_1-1 = "這也是建立信任的過程，對吧？"
20040-CVGroup_Relationship_Up_2-1 = "你是相信著我的對吧？老師？"
20040-CVGroup_Relationship_Up_3-1 = "感覺和老師的距離縮短了。\n而且……還不少。呵呵。"
20040-CVGroup_Relationship_Up_4-1 = "就讓老師今後也一直待在我身邊吧。\n……拒絕權？你覺得有嗎？呵呵。"
