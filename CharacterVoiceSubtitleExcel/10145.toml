[translation]
10145-CVGroup_Battle_Buffed_1-1 = "다음에도 잘 부탁하마."
10145-CVGroup_Battle_Covered_1-1 = "잠시 몸을 피하겠다."
10145-CVGroup_Battle_Defense_1-1 = "더 정진하거라."
10145-CVGroup_Battle_In_1-1 = "여름이니 말이지.\n내 모습, 잘 봐 두도록 하거라."
10145-CVGroup_Battle_In_2-1 = "놀 때는 전력으로. 당연하지 않은가."
10145-CVGroup_Battle_Move_1-1 = "자리를 옮겨 볼까."
10145-CVGroup_Battle_Move_2-1 = "다음은 무엇이냐?"
10145-CVGroup_Battle_Recovery_1-1 = "감사를 표하마."
10145-CVGroup_Battle_TacticalAction_1-1 = "저기가 좋겠구나."
10145-CVGroup_Battle_Victory_1-1 = "잘 보았는가, 선생?\n그러면 이제, 포상을 요구하고 싶다만?"
10145-CVGroup_Battle_Victory_2-1 = "피서지의 여름 공기도 나쁘지 않구나.\n이제 선생도 함께, 어떠한가?"
10145-CVGroup_CommonSkill-1 = "무엄하구나."
10145-CVGroup_ExSkill_1-1 = "어라……?\n읏……!\n하아……"
10145-CVGroup_ExSkill_2-1 = "호오……\n꺄앗?!\n사고로다……"
10145-CVGroup_ExSkill_3-1 = "후후……\n뭣이?!\n여름, 인가……"
10145-CVGroup_ExSkill_Level_1-1 = "시원해지기는 했구나……"
10145-CVGroup_ExSkill_Level_2-1 = "못된 자가 있었던 모양이구나."
10145-CVGroup_ExSkill_Level_3-1 = "이 정도는 기분 나쁘지 않다."
10145-CVGroup_Formation_In_1-1 = "여름, 피서……\n그렇다 해도, 소홀히 할 수 없는 것이 있다."
10145-CVGroup_Formation_In_2-1 = "흐음, 나와 시간을 보내고 싶은가?\n나는 선생과 그리하고 싶은데 말이다."
10145-CVGroup_Formation_Select-1 = "어떤가. 잘 어울리는가?\n후훗. 천천히 보아도 좋다."
10145-CVGroup_Growup_1-1 = "내일이라는 것은 좋은 것이지.\n음. 휴가만큼이나 말이다."
10145-CVGroup_Growup_2-1 = "여백이 있기에 사람은 성장할 수 있는 법.\n좋은 일이다."
10145-CVGroup_Growup_3-1 = "알고 있는가, 선생?\n이것도 모두, 선생이 지켜보아 준 덕분이다.\n선생에게는, 어떤 감사를 표해도 항상 모자라구나."
10145-CVGroup_Growup_4-1 = "선생님! 키키, 성장했어요!\n후후. 놀랐는가, 선생?\n방금 것은 둘만의 비밀로 하자꾸나."
10145-CVGroup_Relationship_Up_1-1 = "잎새에 가린 꽃은 봄 갔어도 남아 있고,\n엷은 구름 스민 햇살 빗속에도 환하구나.\n뻔한 비유이겠다만, 꽃과 햇살이 누구를 뜻할지……\n그대는 알 수 있겠는가? 후후."
10145-CVGroup_Relationship_Up_2-1 = "외모는 내면의 가장 바깥 부분이라고도 하지 않는가?\n옷차림이란 시간과 장소에 어울려야 하는 법.\n후훗…… 그렇다. 그러니 이것을 \n그대 앞에서 입고 있는 것이지."
10145-CVGroup_Relationship_Up_3-1 = "일생의 벗과 함께라면, \n천 겁의 불도 두렵지 않다고 하던가……\n그러니 쭉 같이 있어 주었으면 한다, 선생."
10145-CVGroup_Relationship_Up_4-1 = "있잖아요, 선생님. 키키는요……\n선생님이 세상에서 제일 좋아요!\n후후. 그런 표정 짓지 말거라.\n슬슬 익숙해질 때가 되지 않았는가."
10145-CVGroup_Tactic_In_1-1 = "어디, 길을 찾아보도록 하자."
10145-CVGroup_Tactic_In_2-1 = "나무 그늘은 없는가?"
10145-CVGroup_Tactic_Victory_1-1 = "오늘은 휴가라고 하지 않았느냐."
10145-CVGroup_Tactic_Victory_2-1 = "나름의 여흥이었다."
