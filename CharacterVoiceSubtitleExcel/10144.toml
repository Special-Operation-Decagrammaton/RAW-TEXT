[translation]
10144-CVGroup_Formchange_ShunSmall_Battle_Buffed_1-1 = "감사합니다!"
10144-CVGroup_Formchange_ShunSmall_Battle_Covered_1-1 = "숨을 테니까요!"
10144-CVGroup_Formchange_ShunSmall_Battle_Defense_1-1 = "끄떡없어요!"
10144-CVGroup_Formchange_ShunSmall_Battle_In_1-1 = "그러면, 여러분! 잘 부탁드리겠습니다!"
10144-CVGroup_Formchange_ShunSmall_Battle_In_2-1 = "제가 앞장서 볼게요!"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_1-1 = "다음은 뭘까요?"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_2-1 = "저기군요!"
10144-CVGroup_Formchange_ShunSmall_Battle_Recovery_1-1 = "덕분에 괜찮아졌어요!"
10144-CVGroup_Formchange_ShunSmall_Battle_TacticalAction_1-1 = "저쪽으로 갈게요!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_1-1 = "이겼어요! 보고 계셨나요, 선생님?"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_2-1 = "에헤헤. 해냈답니다! 칭찬해 주세요!"
10144-CVGroup_Formchange_ShunSmall_CommonSkill-1 = "자아…… 어떠세요?"
10144-CVGroup_Formchange_ShunSmall_ExSkill_1-1 = "아우우우……\n선생님~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_2-1 = "아야야……\n도와주세요~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_3-1 = "우우웅……\n안아 주세요~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_1-1 = "힘낼게요!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_2-1 = "영~차!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_3-1 = "갈게요!"
10144-CVGroup_Formchange_ShunSmall_Formation_In_1-1 = "선생님과 놀러 가는 거네요♪"
10144-CVGroup_Formchange_ShunSmall_Formation_In_2-1 = "에헤헤. 정말 기대돼요♪"
10144-CVGroup_Formchange_ShunSmall_Formation_Select-1 = "와와와?!\n떨어질 뻔했네요…… 에헤헤."
10144-CVGroup_Formchange_ShunSmall_Formchange-1 = "짜잔! 슈에링이에요!"
10144-CVGroup_Formchange_ShunSmall_Growup_1-1 = "저, 자랐어요!\n어…… 그런데 그건 좋은 걸까요……?"
10144-CVGroup_Formchange_ShunSmall_Growup_2-1 = "이 모습이 되면, 여러 생각이 들어요. \n몸은 커졌는데, 정말 성장한 것일까요……\n앗, 너무 감상적으로 되어버렸네요!\n방금 건 못 들은 걸로 해주세요……"
10144-CVGroup_Formchange_ShunSmall_Growup_3-1 = "지금의 저는, 기간 한정 비눗방울 같은 존재……\n그래서 더욱, 이 시간을 소중히 하고 싶어요.\n선생님과 이렇게 지내는 시간은, \n무엇과도 바꿀 수 없는 보물이니까요."
10144-CVGroup_Formchange_ShunSmall_Growup_4-1 = "우…… 뭔가, 또 커져 버린 느낌이에요……\n어라? 저 뭔가, 이상한 말을 한 걸까요?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_1-1 = "과일이 먹고 싶어졌어요……\n선생님은 어떤 과일이 좋으세요?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_2-1 = "선생님은 뭘 하면서 놀고 싶으세요?\n저는요…… 어부바를 해주시면 좋을 것 같아요!\n그리고…… 에헤헷. 비밀이에요!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_3-1 = "어렸을 때, 물놀이에 너무 열중하다가 \n여름 감기에 걸린 적이 있었어요.\n……지금도 작은 상태이긴 하네요.\n어쨌든! 선생님도 감기, 조심하세요!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_4-1 = "지금 제가 경험하고 있는 것은, \n옛날에 있던 일을 덮어씌우고 있는 것일까요?\n하지만 분명, 다르다고 생각해요.\n지금 이 모든 시간이, 새로운 추억이 되고 있으니까요!"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_1-1 = "작아도, 할 수 있어요!"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_2-1 = "맡겨만 주세요!"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_1-1 = "에헤헤. 보셨죠? 선생님?"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_2-1 = "그러면, 다녀오겠습니다!"
