10064-CVGroup_Formation_Select-1 = "ทำไมเหรอ...?"
10064-CVGroup_Growup_1-1 = "ขะ... ขอบคุณนะ\nปีใหม่นี้ก็ได้อยู่กับครูสินะ"
10064-CVGroup_Growup_2-1 = "ฉันไม่รู้ว่าจะตอบแทนความคาดหวังได้รึเปล่า...\nแต่จะพยายามนะ"
10064-CVGroup_Growup_3-1 = "ในเวลาแบบนี้ ควรทำหน้ายังไงดีนะ\nโทษที ฉันไม่ค่อยชิน... กับสถานการณ์แบบนี้เท่าไร"
10064-CVGroup_Growup_4-1 = "ฉันติดหนี้บุญคุณครูตลอดเลยนะ...\nไม่รู้ว่าจะตอบแทนได้รึเปล่า แต่ฉันจะพยายามนะ"
10064-CVGroup_Relationship_Up_1-1 = "เรื่องสายสัมพันธ์เนี่ย... น่าทึ่งดีนะ\nยิ่งผูกพันกันเท่าไร ก็ยิ่งคิดถึงกันมากเท่านั้น"
10064-CVGroup_Relationship_Up_2-1 = "นี่ ปกติฉันไม่ค่อยพูดแบบนี้หรอกนะ...\nแต่ฉันคิดว่า... โชคดีที่มีครูนะ"
10064-CVGroup_Relationship_Up_3-1 = "ฉันสงสัยมาตลอดเลย...\nว่าถ้าได้ใช้เวลารับปีใหม่กับครูจะเป็นยังไง\nตอนนี้ค่อยหายสงสัยขึ้นมานิดนึงแล้วละ"
10064-CVGroup_Relationship_Up_4-1 = "ขอบคุณที่บอกว่ามันเหมาะกับฉันนะ ถึงจะพูดตามมารยาทก็เถอะ\nไม่ได้พูดตามมารยาท... งั้นเหรอ?\nดะ... เดี๋ยวก่อน ครู แบบนั้นมันแปลกๆ นะ..."
10064-CVGroup_Tactic_In_1-1 = "ไปกันเถอะ"
10064-CVGroup_Tactic_In_2-1 = "ทำภารกิจอย่างรวดเร็ว"
10064-CVGroup_Tactic_Victory_1-1 = "เหนื่อยหน่อยนะ ครู\nชุดไม่เปื้อนเลยแฮะ... โชคดีจัง"
10064-CVGroup_Tactic_Victory_2-1 = "จะให้มีความทรงจำไม่ดีตั้งแต่เริ่มต้นปีไม่ได้สิ"
