[translation]
10064-CVGroup_Battle_Buffed_1-1 = "Support confirmed."
10064-CVGroup_Battle_Covered_1-1 = "Nice..."
10064-CVGroup_Battle_Defense_1-1 = "Simple."
10064-CVGroup_Battle_In_1-1 = "There's no end to the requests this year either."
10064-CVGroup_Battle_In_2-1 = "A fresh start... Let's begin."
10064-CVGroup_Battle_Move_1-1 = "Commencing search."
10064-CVGroup_Battle_Move_2-1 = "Changing target."
10064-CVGroup_Battle_Recovery_1-1 = "I'll take it with gratitude."
10064-CVGroup_Battle_TacticalAction_1-1 = "Changing position."
10064-CVGroup_Battle_Victory_1-1 = "That was unlucky."
10064-CVGroup_Battle_Victory_2-1 = "I think that was a good start to a new year."
10064-CVGroup_CommonSkill-1 = "Heehee, how cute."
10064-CVGroup_ExSkill_1-1 = "Ahem... Here, an Omamori."
10064-CVGroup_ExSkill_2-1 = "Ahem. Can you take this?"
10064-CVGroup_ExSkill_3-1 = "Um... How was it?"
10064-CVGroup_ExSkill_Level_1-1 = "I hope this works."
10064-CVGroup_ExSkill_Level_2-1 = "An exorcism... Something like that."
10064-CVGroup_ExSkill_Level_3-1 = "Here's to another great year."
10064-CVGroup_Formation_In_1-1 = "It's my turn? ...Okay."
10064-CVGroup_Formation_In_2-1 = "It suits me? ...I'm glad."
10064-CVGroup_Formation_Select-1 = "...What's wrong?"
10064-CVGroup_Growup_1-1 = "Um... Thank you. Please take care of me this year too, would you?"
10064-CVGroup_Growup_2-1 = "I don't know if I can meet your expectations...but I'll try."
10064-CVGroup_Growup_3-1 = "I wonder what face I should be making right now. ...Sorry. I'm not used to...these kind of situations."
10064-CVGroup_Growup_4-1 = "I'm always in your debt, Sensei... I don't know if I can repay you for it, but I'll do my best."
10064-CVGroup_Relationship_Up_1-1 = "Relationships...are interesting. The more they grow, the more you think about each other."
10064-CVGroup_Relationship_Up_2-1 = "Um, I don't say this sort of thing often...but I think...I'm glad to have you in my life, Sensei."
10064-CVGroup_Relationship_Up_3-1 = "I always wondered...how it would feel to ring in the new year with you, Sensei. And now, I think I'm starting to understand that feeling."
10064-CVGroup_Relationship_Up_4-1 = "Thank you for saying it looks good on me. Although you were probably just being polite. Wait, you meant it? W-Wait, Sensei, that's not fair..."
10064-CVGroup_Tactic_In_1-1 = "Let's go."
10064-CVGroup_Tactic_In_2-1 = "Let's get the job done quickly."
10064-CVGroup_Tactic_Victory_1-1 = "Good work, Sensei. And your clothes didn't get dirty. I'm glad."
10064-CVGroup_Tactic_Victory_2-1 = "I shouldn't start the year off by making bad memories."
