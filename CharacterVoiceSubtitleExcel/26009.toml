[translation]
26009-CVGroup_CommonSkill-1 = "P-Please accept this...!"
26009-CVGroup_ExSkill_1-1 = "When it comes to hiding...I'm pretty confident!"
26009-CVGroup_ExSkill_2-1 = "Make sure they don't notice...!"
26009-CVGroup_ExSkill_3-1 = "Over there...!"
26009-CVGroup_ExSkill_Level_1-1 = "Target confirmed!"
26009-CVGroup_ExSkill_Level_2-1 = "Come on... Hit!"
26009-CVGroup_ExSkill_Level_3-1 = "D-Don't move!"
26009-CVGroup_Formation_In_1-1 = "M-Me...? Really...?"
26009-CVGroup_Formation_In_2-1 = "If Sensei stays with me... I will!"
26009-CVGroup_Formation_Select-1 = "P-Please put me back inside the box..."
26009-CVGroup_Growup_1-1 = "S-Sensei?! Oh, u-um...! Aaah!"
26009-CVGroup_Growup_2-1 = "I'm always so...grateful. I'm very glad that... you're here..."
26009-CVGroup_Growup_3-1 = "I was able to...take a big step like this...so I want to keep on changing."
26009-CVGroup_Growup_4-1 = "Right now I'm...a maid...so I want to be able to help you, Sensei."
26009-CVGroup_Relationship_Up_1-1 = "Um, Sensei... N-No! It's nothing..."
26009-CVGroup_Relationship_Up_2-1 = "I've been able to do my best because you were with me the whole way, Sensei. I can't possibly deliver what I feel with words, but...um...thank you."
26009-CVGroup_Relationship_Up_3-1 = "Um, Sensei? What do you think of maids? And... What do you think of my look?"
26009-CVGroup_Relationship_Up_4-1 = "Um... If I were more optimistic, then...there's something I need to tell you, Sensei. Wait—Now?! Uh, w-well I...!"
