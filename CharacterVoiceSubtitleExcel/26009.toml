[translation]
26009-CVGroup_CommonSkill-1 = "바, 받아 주세요……!"
26009-CVGroup_ExSkill_1-1 = "숨는 일에는…… 조금, 자신이 있으니까……!"
26009-CVGroup_ExSkill_2-1 = "눈치채이지 않도록……!"
26009-CVGroup_ExSkill_3-1 = "거기……!"
26009-CVGroup_ExSkill_Level_1-1 = "타겟, 확인했습니다!"
26009-CVGroup_ExSkill_Level_2-1 = "맞아 줘……!"
26009-CVGroup_ExSkill_Level_3-1 = "우, 움직이지 마세요!"
26009-CVGroup_Formation_In_1-1 = "저…… 저를요……?\n정말, 이신가요……?"
26009-CVGroup_Formation_In_2-1 = "선생님께서 같이 있어주신다면……\n저도……!"
26009-CVGroup_Formation_Select-1 = "사…… 상자 안에 내려놔 주세요……."
26009-CVGroup_Growup_1-1 = "서, 선생님?! 아, 그, 그게……! 아으으!"
26009-CVGroup_Growup_2-1 = "언제나…… 감사, 합니다. 선생님이 계셔서…… 정말, 다행이에요……"
26009-CVGroup_Growup_3-1 = "이렇게, 한발짝…… 내딛을 수 있었으니까…… 저 자신도, 변하고 싶어요."
26009-CVGroup_Growup_4-1 = "지금의 저는, 메이드…… 이니까요…… 선생님의, 도움이 되고 싶어요."
26009-CVGroup_Relationship_Up_1-1 = "저, 선생님…… 아, 아니요! 역시 아무것도 아니예요……"
26009-CVGroup_Relationship_Up_2-1 = "선생님이 계셔 주셨기에, 열심히 할 수 있었어요.\n말만으로는, 모두 전할 수 없지만…… 그…… 감사합니다."
26009-CVGroup_Relationship_Up_3-1 = "선생님은…… 저기, 메이드에 대해 어떻게 생각하세요?\n……그럼, 이 모습은요?"
26009-CVGroup_Relationship_Up_4-1 = "저기…… 조금 더 긍정적인 제가 될 수 있다면,\n선생님께 하고 싶은 말이 있어요.\n네?, 지금요!? 그, 그건……!"
