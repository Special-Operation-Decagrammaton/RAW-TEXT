[translation]
26009-CVGroup_CommonSkill-1 = "請，請收下吧！"
26009-CVGroup_ExSkill_1-1 = "我對躲藏……\n還……有點自信！"
26009-CVGroup_ExSkill_2-1 = "小心別被發現……！"
26009-CVGroup_ExSkill_3-1 = "那邊……！"
26009-CVGroup_ExSkill_Level_1-1 = "目標已確認！"
26009-CVGroup_ExSkill_Level_2-1 = "命中吧……！"
26009-CVGroup_ExSkill_Level_3-1 = "請，請不要動！"
26009-CVGroup_Formation_In_1-1 = "我……我嗎？\n真的……？"
26009-CVGroup_Formation_In_2-1 = "如果老師能陪我一起的話……我也……！"
26009-CVGroup_Formation_Select-1 = "嗚嗚……好想回去……"
26009-CVGroup_Growup_1-1 = "老，老師！？那個，就是……啊嗚嗚……"
26009-CVGroup_Growup_2-1 = "我一直……都很感謝你。\n有老師在……真是太好了。"
26009-CVGroup_Growup_3-1 = "已經像這樣……邁出了一步……\n我自己，也想有所改變。"
26009-CVGroup_Growup_4-1 = "現在的我，是女僕……所以……\n想幫上，老師的忙。"
26009-CVGroup_Relationship_Up_1-1 = "那個，老師……\n沒，沒事！果然還是沒什麼……"
26009-CVGroup_Relationship_Up_2-1 = "因為有老師在，我才有辦法努力嘗試。\n雖然光用言語無法完全傳達……那個……非常謝謝你。"
26009-CVGroup_Relationship_Up_3-1 = "老師你……那個，對女僕有什麼看法？\n……那，對這副打扮呢？"
26009-CVGroup_Relationship_Up_4-1 = "那個……要是我能變得更積極一點的話，\n有些話想告訴老師。\n咦，現在嗎！？那，那有點……！"
