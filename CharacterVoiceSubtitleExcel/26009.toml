[translation]
26009-CVGroup_CommonSkill-1 = "ชะ... ช่วยรับไว้ด้วยค่ะ...!"
26009-CVGroup_ExSkill_1-1 = "เรื่องการซ่อน... ฉันค่อนข้างมั่นใจค่ะ...!"
26009-CVGroup_ExSkill_2-1 = "ต้องไม่ให้ถูกสังเกตเห็น...!"
26009-CVGroup_ExSkill_3-1 = "ตรงนั้น...!"
26009-CVGroup_ExSkill_Level_1-1 = "ตรวจสอบเป้าหมายแล้วค่ะ!"
26009-CVGroup_ExSkill_Level_2-1 = "ขอให้โดนเถอะ...!"
26009-CVGroup_ExSkill_Level_3-1 = "ยะ... อย่าขยับนะคะ!"
26009-CVGroup_Formation_In_1-1 = "ฉัน... ฉันเหรอคะ...?\nพูดจริงๆ เหรอคะ...?"
26009-CVGroup_Formation_In_2-1 = "ถ้าคุณครูอยู่ด้วยละก็...\nฉันเองก็จะ...!"
26009-CVGroup_Formation_Select-1 = "ช่วย... ช่วยเอาใส่ลงในกล่องด้วยค่ะ..."
26009-CVGroup_Growup_1-1 = "คะ... คุณครู?! อ่า... คะ... คือว่า...! อ่าา!"
26009-CVGroup_Growup_2-1 = "ขอบคุณ... เสมอเลยนะคะ\nโชคดีจริงๆ เลยค่ะ... ที่มีคุณครูอยู่ด้วย..."
26009-CVGroup_Growup_3-1 = "เพราะสามารถ... ก้าวไปข้างหน้าได้...\nฉันเองก็เลยอยากเปลี่ยนแปลงเหมือนกันค่ะ"
26009-CVGroup_Growup_4-1 = "ตอนนี้ฉันเป็นเมด... นี่คะ... ฉันเลยอยากช่วยเหลือคุณครูค่ะ"
26009-CVGroup_Relationship_Up_1-1 = "เอ่อ คุณครูคะ... มะ... ไม่มีอะไรค่ะ! ไม่มีอะไรจริงๆ ค่ะ..."
26009-CVGroup_Relationship_Up_2-1 = "เพราะมีคุณครูอยู่ ฉันถึงทำได้เต็มที่ค่ะ\nถึงจะถ่ายทอดด้วยคำพูดไม่ได้ทั้งหมด... แต่ก็... ขอบคุณนะคะ"
26009-CVGroup_Relationship_Up_3-1 = "คุณครู... เอ่อ... คิดยังไงเกี่ยวกับเมดเหรอคะ?\nแล้วฉันในแบบนี้ล่ะคะ...?"
26009-CVGroup_Relationship_Up_4-1 = "เอ่อ... ถ้าฉันมองโลกในแง่บวกมากกว่านี้ได้อีกหน่อย\nฉันก็มีคำที่อยากบอกคุณครูค่ะ\nคะ? ตอนนี้เหรอคะ!? ระ... เรื่องนั้น...!"
