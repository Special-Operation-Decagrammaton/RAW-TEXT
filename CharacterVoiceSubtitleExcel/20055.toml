[translation]
20055-CVGroup_CommonSkill-1 = "ให้ตรงจังหวะ...!"
20055-CVGroup_ExSkill_1-1 = "ไม่เป็นไรหรอกค่ะ ฉันเคยทำมาแล้วครั้งหนึ่ง...!"
20055-CVGroup_ExSkill_2-1 = "ครั้งนี้ฉันก็จะช่วยทุกคนให้ได้...!"
20055-CVGroup_ExSkill_3-1 = "ใส่คำสั่งตามที่คุ้นเคย...!"
20055-CVGroup_ExSkill_Level_1-1 = "ฉะ... ฉันจะช่วยเองค่ะ!"
20055-CVGroup_ExSkill_Level_2-1 = "ฮือ... ฮือออออ...!"
20055-CVGroup_ExSkill_Level_3-1 = "ถะ... ถึงฉันจะกลัว แต่ถึงอย่างนั้น...!"
20055-CVGroup_Formation_In_1-1 = "คือ... ทำไมฉันถึงมาอยู่ที่นี่ได้นะคะ...?!"
20055-CVGroup_Formation_In_2-1 = "ฉันเหรอคะ?! ฉันไม่เคยตกลงที่จะเข้าร่วมภารกิจเลยนะคะ?!?!?!"
20055-CVGroup_Formation_Select-1 = "ยะ... อย่าทำตกนะคะ...!"
20055-CVGroup_Growup_1-1 = "ตอนนี้... ฉันเริ่มเข้าใจแล้วละค่ะ...!"
20055-CVGroup_Growup_2-1 = "ฉะ... ฉันจะต้องแข็งแกร่งขึ้นอีกค่ะ...!\nพะ... เพราะไม่รู้ว่าจะถูกยิงเมื่อไร ฮือออ"
20055-CVGroup_Growup_3-1 = "ฉันกลัวก็จริง แต่ไม่ได้ตัวสั่นสักหน่อยค่ะ\nนี่คือ... ความกล้าหาญรึเปล่าคะ...?"
20055-CVGroup_Growup_4-1 = "ถึงจะก้าวต่อไปข้างหน้าไม่ได้\nแต่ฉันก็จะไม่ยอมถอยเด็ดขาดค่ะ...!"
20055-CVGroup_Relationship_Up_1-1 = "เพราะ... ฉันไม่อยากขายหน้าต่อหน้าคุณครูค่ะ..."
20055-CVGroup_Relationship_Up_2-1 = "คุณครูคะ เอ่อ... ไปเล่นเกมด้วยกันมั้ยคะ?"
20055-CVGroup_Relationship_Up_3-1 = "คือว่า เอ่อ... คุณครูช่วยจับมือฉันหน่อยได้มั้ยคะ?"
20055-CVGroup_Relationship_Up_4-1 = "ฉันยังกลัวโลกภายนอกอยู่\nแต่ถ้าที่นั่นมีคุณครูอยู่ด้วย... ฉันก็คง..."
