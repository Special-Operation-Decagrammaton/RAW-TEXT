[translation]
20055-CVGroup_CommonSkill-1 = "박자에 맞춰서……!"
20055-CVGroup_ExSkill_1-1 = "괜찮아요, 이전에 한 번 해봤으니까……!"
20055-CVGroup_ExSkill_2-1 = "이번에는, 제가 모두를……!"
20055-CVGroup_ExSkill_3-1 = "손에 익은 대로, 커맨드를……!"
20055-CVGroup_ExSkill_Level_1-1 = "도, 도와드릴게요!"
20055-CVGroup_ExSkill_Level_2-1 = "우, 우으으으으으……!"
20055-CVGroup_ExSkill_Level_3-1 = "무, 무섭지만, 그래도……!"
20055-CVGroup_Formation_In_1-1 = "저…… 왜 여기 있는 거죠……?!"
20055-CVGroup_Formation_In_2-1 = "저요?! 출격에 동의한 적 없는데요?!?!?!"
20055-CVGroup_Formation_Select-1 = "떠, 떠, 떨어트리지는 말아주세요……!"
20055-CVGroup_Growup_1-1 = "이제…… 점점 손에 익기 시작했어요……!"
20055-CVGroup_Growup_2-1 = "더, 더 강해져야 해요……! 어, 언제 사출될지 모르니까, 흐우우……."
20055-CVGroup_Growup_3-1 = "두렵지만, 떨리지는 않아요. 이게…… 용기일까요……?"
20055-CVGroup_Growup_4-1 = "나아갈 수 없다 해도, 물러나지는 않을 거예요……!"
20055-CVGroup_Relationship_Up_1-1 = "그…… 선생님 앞에서만큼은 부끄럽지 않으니까요……."
20055-CVGroup_Relationship_Up_2-1 = "선생님, 그, 같이…… 게임하러 가지 않으실래요?"
20055-CVGroup_Relationship_Up_3-1 = "저기, 그…… 손, 다시 한번 잡아주실 수 있으신가요?"
20055-CVGroup_Relationship_Up_4-1 = "바깥은 여전히 조금 두렵지만, 그래도, 그곳에 선생님이 계신다면…… 저는……."
