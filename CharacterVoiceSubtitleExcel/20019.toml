[translation]
20019-CVGroup_CommonSkill-1 = "我放在這裡囉。"
20019-CVGroup_ExSkill_1-1 = "這就是今天的掃除對象嗎？"
20019-CVGroup_ExSkill_2-1 = "居然弄得這麼亂……"
20019-CVGroup_ExSkill_3-1 = "好好清理乾淨吧。"
20019-CVGroup_ExSkill_Level_1-1 = "來，請收下。"
20019-CVGroup_ExSkill_Level_2-1 = "請收下我的心意。"
20019-CVGroup_ExSkill_Level_3-1 = "請好好享用。"
20019-CVGroup_Formation_In_1-1 = "好的，那麼就開始清掃吧？"
20019-CVGroup_Formation_In_2-1 = "心情比平時更加雀躍……\n這也是因為跟主人在一起的關係嗎？"
20019-CVGroup_Formation_Select-1 = "呵呵，看來很值得清掃呢。"
20019-CVGroup_Growup_1-1 = "有多少幫上您的忙嗎？"
20019-CVGroup_Growup_2-1 = "無論作為女僕還是兔子，都希望能幫上主人的忙。"
20019-CVGroup_Growup_3-1 = "成長了唷，蹦蹦！"
20019-CVGroup_Growup_4-1 = "為了能夠回應主人的期待……\n變得更加洗練了。"
20019-CVGroup_Relationship_Up_1-1 = "對兔子來說，愛是必要的唷。蹦蹦！"
20019-CVGroup_Relationship_Up_2-1 = "謝謝您，主人。\n今後也敬請期待。"
20019-CVGroup_Relationship_Up_3-1 = "這全部都多虧了主人。\n呵呵……真的是全部。"
20019-CVGroup_Relationship_Up_4-1 = "兔子型態的朱音，還請您不要錯過哦？"
