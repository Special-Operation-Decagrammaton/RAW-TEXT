[translation]
20019-CVGroup_CommonSkill-1 = "여기에 두겠습니다."
20019-CVGroup_ExSkill_1-1 = "이것이 오늘 청소 대상인가요?"
20019-CVGroup_ExSkill_2-1 = "이렇게 어질러놓다니……."
20019-CVGroup_ExSkill_3-1 = "깨끗이 정리하도록 하죠."
20019-CVGroup_ExSkill_Level_1-1 = "자, 받으시죠."
20019-CVGroup_ExSkill_Level_2-1 = "제 마음을 받아주세요."
20019-CVGroup_ExSkill_Level_3-1 = "자, 마음껏 즐겨주세요."
20019-CVGroup_Formation_In_1-1 = "자아, 그럼 청소를 시작해 볼까요?"
20019-CVGroup_Formation_In_2-1 = "평소보다 가슴이 두근거려서……\n이것도 주인님과 함께 있기 때문일까요?"
20019-CVGroup_Formation_Select-1 = "후훗, 터트릴 것들이 많이 보이네요."
20019-CVGroup_Growup_1-1 = "조금은, 도움이 되고 있을까요?"
20019-CVGroup_Growup_2-1 = "메이드로서도 토끼로서도, 주인님의 도움이 될 수 있기를."
20019-CVGroup_Growup_3-1 = "성장했답니다, 뿅뿅!"
20019-CVGroup_Growup_4-1 = "주인님의 기대에 부응할 수 있도록……. 단련해 왔습니다."
20019-CVGroup_Relationship_Up_1-1 = "토끼에게는 사랑이 필요하거든요. 뿅뿅!"
20019-CVGroup_Relationship_Up_2-1 = "감사합니다. 주인님. 앞으로도 기대해 주세요."
20019-CVGroup_Relationship_Up_3-1 = "모든 게 주인님 덕분이에요. 후훗……. 정말로, 모든 것이."
20019-CVGroup_Relationship_Up_4-1 = "토끼 아카네를, 놓치지 말아주세요?"
