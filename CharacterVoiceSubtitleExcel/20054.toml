[translation]
20054-CVGroup_CommonSkill-1 = "Fufu. Did I make you wait?"
20054-CVGroup_ExSkill_1-1 = "Did you fall for me?"
20054-CVGroup_ExSkill_2-1 = "When it comes to speed, I'll never lose."
20054-CVGroup_ExSkill_3-1 = "Do you want one? Would you like me to make you one?"
20054-CVGroup_ExSkill_Level_1-1 = "This is a wheelchair."
20054-CVGroup_ExSkill_Level_2-1 = "Shall we get started?"
20054-CVGroup_ExSkill_Level_3-1 = "Do you need my help?"
20054-CVGroup_Formation_In_1-1 = "Do you need my help? Of course you do."
20054-CVGroup_Formation_In_2-1 = "Great. Where should we start?"
20054-CVGroup_Formation_Select-1 = "Yes. Sensei. I'm here."
20054-CVGroup_Growup_1-1 = "\"Anyone can grow at any time\"... I'm sure Sensei would say something like that."
20054-CVGroup_Growup_2-1 = "Growing by yourself is a difficult thing... It'd seem I'm who I am today thanks to you, Sensei."
20054-CVGroup_Growup_3-1 = "I know, Sensei. I should never let my guard down, but I must be flexible as well."
20054-CVGroup_Growup_4-1 = "Growth is something to celebrate... Yes, I know that well. However, it makes me think of how much you've done for me, Sensei. Please don't push yourself too hard."
20054-CVGroup_Relationship_Up_1-1 = "What do you think of my new suit? Isn't it flattering on me? Of course it is!"
20054-CVGroup_Relationship_Up_2-1 = "They say people aren't meant to live alone. Lately, I've really come to understand what that means. ...Surely, you would never leave me all alone, would you, Sensei?"
20054-CVGroup_Relationship_Up_3-1 = "Ever since I met you, everything has been unpredictable, even for an omniscient like me. And... I'm sure it will continue to be so moving forward."
20054-CVGroup_Relationship_Up_4-1 = "For a moment, could I be vulnerable with you...? Stay with me. Even if it just for now. Thank you, Sensei. I'm happy. Truly."
