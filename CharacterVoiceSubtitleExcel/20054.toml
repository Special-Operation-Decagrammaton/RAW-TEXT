[translation]
20054-CVGroup_CommonSkill-1 = "후후. 기다리셨나요?"
20054-CVGroup_ExSkill_1-1 = "반해버리셨나요?"
20054-CVGroup_ExSkill_2-1 = "속도로는, 지지 않아요."
20054-CVGroup_ExSkill_3-1 = "갖고 싶으세요? 만들어 드릴까요?"
20054-CVGroup_ExSkill_Level_1-1 = "이건, 휠체어랍니다."
20054-CVGroup_ExSkill_Level_2-1 = "어디, 시작해 볼까요?"
20054-CVGroup_ExSkill_Level_3-1 = "제 도움이 필요한가요?"
20054-CVGroup_Formation_In_1-1 = "제 도움이 필요하신가요? 물론 그러셨겠죠."
20054-CVGroup_Formation_In_2-1 = "좋아요. 어디부터 시작하도록 할까요?"
20054-CVGroup_Formation_Select-1 = "네. 선생님. 저는 여기에 있어요."
20054-CVGroup_Growup_1-1 = "어떤 상황이라도 성장할 수 있다고…… 선생님이시라면, 그렇게 말씀하실 것 같네요."
20054-CVGroup_Growup_2-1 = "홀로 성장하기란 정말로 어려운 것이죠.\n지금의 제가 있는 것은, 선생님이 있어주신 덕분일지도요."
20054-CVGroup_Growup_3-1 = "알고 있습니다. 선생님. 긴장을 풀어서는 안 되겠지요.\n그렇다고 너무 얼어붙어도 곤란하겠지만요."
20054-CVGroup_Growup_4-1 = "성장이란, 기뻐할 일이라는 것…… 네, 이해는 하고 있어요.\n동시에, 선생님이 저를 위해 얼마나 노력해 주셨을까, 하는 생각이 들기도 해요. 너무, 무리는 하지 말아주세요."
20054-CVGroup_Relationship_Up_1-1 = "제 새로운 슈트는 어떠신가요~? 어울리나요~? 물론 그렇겠죠!"
20054-CVGroup_Relationship_Up_2-1 = "사람은 혼자서 살아갈 수 없다는 말이 있죠. 최근, 그 말의 의미를 저도 실감하고 있답니다.\n……선생님은 설마 저를 혼자 두시지 않겠죠?"
20054-CVGroup_Relationship_Up_3-1 = "선생님과 만나서 일어난 일들은, <전지>인 저에게도 예측할 수 없는 것들뿐이었어요.\n그리고…… 분명, 앞으로도요."
20054-CVGroup_Relationship_Up_4-1 = "조금만, 약한 소리를 해도 될까요……? 곁에 있어 주세요.\n지금뿐이라도 좋으니까요. 감사합니다. 선생님. 기쁘네요. 진심으로."
