[translation]
20054-CVGroup_CommonSkill-1 = "ฮุฮุ รอฉันอยู่หรือเปล่าคะ?"
20054-CVGroup_ExSkill_1-1 = "ตกหลุมรักแล้วหรือยังคะ?"
20054-CVGroup_ExSkill_2-1 = "เรื่องความไว ฉันไม่แพ้หรอกค่ะ"
20054-CVGroup_ExSkill_3-1 = "อยากได้เหรอคะ? ฉันทำให้เอามั้ยคะ?"
20054-CVGroup_ExSkill_Level_1-1 = "นี่คือวีลแชร์ค่ะ"
20054-CVGroup_ExSkill_Level_2-1 = "มาเริ่มกันเลยมั้ยคะ?"
20054-CVGroup_ExSkill_Level_3-1 = "อยากให้ฉันช่วยอะไรเหรอคะ?"
20054-CVGroup_Formation_In_1-1 = "อยากให้ฉันช่วยงั้นเหรอคะ? ต้องเป็นอย่างนั้นอยู่แล้วค่ะ"
20054-CVGroup_Formation_In_2-1 = "ได้ค่ะ จะเริ่มจากตรงไหนดีคะ?"
20054-CVGroup_Formation_Select-1 = "ค่ะ คุณครู ฉันอยู่ที่นี่ค่ะ"
20054-CVGroup_Growup_1-1 = "ไม่ว่าจะสถานการณ์ไหนก็เติบโตได้...\nถ้าเป็นคุณครู ก็คงพูดแบบนั้นนะคะ"
20054-CVGroup_Growup_2-1 = "การเติบโตโดยลำพังเป็นเรื่องที่ลำบากจริงๆ ค่ะ\nการที่ฉันอยู่ได้จนถึงตอนนี้ ก็เพราะมีคุณครูอยู่ค่ะ"
20054-CVGroup_Growup_3-1 = "ฉันรู้ค่ะ คุณครู เราจะประมาทไม่ได้ค่ะ\nแต่ถ้าตึงเครียดเกินไปก็ไม่ดีค่ะ"
20054-CVGroup_Growup_4-1 = "การเติบโตเป็นเรื่องที่น่ายินดี... ค่ะ ฉันเข้าใจค่ะ\nแล้วฉันก็คิดด้วยว่าคุณครูคงต้องพยายามอย่างหนักเพื่อฉันแน่เลย\nอย่าหักโหมให้มากเกินไปนะคะ"
20054-CVGroup_Relationship_Up_1-1 = "ชุดสูทใหม่ของฉันเป็นยังไงบ้างคะ~? เข้ากับฉันมั้ยคะ~?\nต้องเป็นอย่างนั้นอยู่แล้วค่ะ!"
20054-CVGroup_Relationship_Up_2-1 = "มีคำกล่าวว่าคนเราใช้ชีวิตลำพังไม่ได้ค่ะ\nหมู่นี้ฉันตระหนักถึงความหมายของคำนั้นได้ค่ะ\nคุณครูจะไม่ปล่อยให้ฉันอยู่คนเดียวใช่มั้ยคะ...?"
20054-CVGroup_Relationship_Up_3-1 = "เรื่องราวที่เกิดขึ้นหลังจากได้เจอคุณครู\nแม้แต่ <ผู้รอบรู้> อย่างฉันก็คาดเดาไม่ได้ค่ะ\nแล้วก็... เรื่องในอนาคตด้วยค่ะ"
20054-CVGroup_Relationship_Up_4-1 = "ฉันขอพูดอะไรที่ฟังดูอ่อนแอได้มั้ยคะ...?\nช่วยอยู่ข้างๆ ฉันด้วยนะคะ แค่ตอนนี้ก็ได้ค่ะ\nขอบคุณค่ะ คุณครู น่าดีใจจังเลยนะคะ"
