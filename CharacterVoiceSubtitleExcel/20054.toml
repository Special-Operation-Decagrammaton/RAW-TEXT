[translation]
20054-CVGroup_CommonSkill-1 = "呵呵，讓您久等了。"
20054-CVGroup_ExSkill_1-1 = "看得入迷了嗎？"
20054-CVGroup_ExSkill_2-1 = "論速度的話，我可不會輸唷。"
20054-CVGroup_ExSkill_3-1 = "要幫您也做一台嗎？"
20054-CVGroup_ExSkill_Level_1-1 = "這是輪椅。"
20054-CVGroup_ExSkill_Level_2-1 = "來，開始吧？"
20054-CVGroup_ExSkill_Level_3-1 = "需要我的幫助對吧？"
20054-CVGroup_Formation_In_1-1 = "需要我的幫助？\n沒錯，我也是這麼認為的。"
20054-CVGroup_Formation_In_2-1 = "那麼，該從哪裡開始好呢。"
20054-CVGroup_Formation_Select-1 = "是的，老師。我在這裡。"
20054-CVGroup_Growup_1-1 = "無論在什麼情況下都能成長……\n老師您，一定會這麼說的吧。"
20054-CVGroup_Growup_2-1 = "靠自學成長是非常困難的事。\n之所以會有現在的我，或許是因為有老師在也說不定呢。"
20054-CVGroup_Growup_3-1 = "我明白的，老師。\n雖然不能掉以輕心，\n但是太過緊張也不好呢。"
20054-CVGroup_Growup_4-1 = "成長是件值得高興的事……是的，我理解這一點。\n同時，我也在想老師為了我投入了多少資源。\n還請不要太勉強自己哦。"
20054-CVGroup_Relationship_Up_1-1 = "我的新服裝，您覺得如何呢？\n……很適合？是啊，那是當然的。"
20054-CVGroup_Relationship_Up_2-1 = "人，是無法獨自生存的……經常有人會這麼說。\n最近，我也開始深刻體會這句話的含義了。\n……老師您應該，不會讓我孤身一人的吧？"
20054-CVGroup_Relationship_Up_3-1 = "在與老師相遇之後發生的，\n都是連擁有「全知」學位的我也無法預測的事。\n並且……今後想必也是如此。"
20054-CVGroup_Relationship_Up_4-1 = "可以讓我，稍微說一點喪氣話嗎……？\n請陪在我身邊吧，哪怕只有現在也好。\n謝謝您，老師。\n……我真的，非常開心。"
