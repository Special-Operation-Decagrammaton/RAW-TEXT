[translation]
10134-CVGroup_Battle_Buffed_1-1 = "보급, 감사합니다!"
10134-CVGroup_Battle_Defense_1-1 = "회피 기동!"
10134-CVGroup_Battle_In_1-1 = "전속력으로 갑니다!"
10134-CVGroup_Battle_In_2-1 = "라저! 출격 준비 완료입니다!"
10134-CVGroup_Battle_Move_1-1 = "스테이지 클리어! 이동합니다!"
10134-CVGroup_Battle_Move_2-1 = "미션 컴플리트! 다음 레벨로 진행합니다!"
10134-CVGroup_Battle_Recovery_1-1 = "장비 내구도가 회복되었습니다!"
10134-CVGroup_Battle_TacticalAction_1-1 = "좌표 확인!"
10134-CVGroup_Battle_Victory_1-1 = "상황 종료……. 선생님! 아리스 어땠습니까?"
10134-CVGroup_Battle_Victory_2-1 = "착륙 승인 확인…… 다녀왔습니다!"
10134-CVGroup_CommonSkill-1 = "전탄 발사!"
10134-CVGroup_ExSkill_1-1 = "이것이 아리스의 전력……! 빛이여!"
10134-CVGroup_ExSkill_2-1 = "보입니다……! 이것이, 마하의 세계……!"
10134-CVGroup_ExSkill_3-1 = "갑시다, 아비 에슈흐! ……빛이여!"
10134-CVGroup_ExSkill_4-1 = "아리스의 마력은…… 100%입니다!"
10134-CVGroup_ExSkill_5-1 = "아비 에슈흐…… 시스템 올 그린!"
10134-CVGroup_ExSkill_6-1 = "리미터 해제…… 아리스, 출격합니다!"
10134-CVGroup_ExSkill_Level_1-1 = "지금부터 아리스의 턴입니다!"
10134-CVGroup_ExSkill_Level_2-1 = "어두운 천공을 꿰뚫는, 빛의 일격을!"
10134-CVGroup_ExSkill_Level_3-1 = "최대 화력 전개! 목표, 제압합니다!"
10134-CVGroup_ExSkill_Level_4-1 = "오버드라이브!"
10134-CVGroup_ExSkill_Level_5-1 = "에너지 부스트!"
10134-CVGroup_ExSkill_Level_6-1 = "모두의 용기를 하나로 모아……."
10134-CVGroup_Formation_In_1-1 = "네, 아리스는 준비됐습니다!"
10134-CVGroup_Formation_In_2-1 = "시스템, 온라인."
10134-CVGroup_Formation_Select-1 = "선생님도 함께 나시겠어요?"
10134-CVGroup_Growup_1-1 = "선생님은 언제나 아리스를 지켜줬습니다. 이제는 아리스가 선생님을 지키겠습니다."
10134-CVGroup_Growup_2-1 = "아리스는 더 많이 배우고 싶습니다! 더 많이 알고 싶습니다!"
10134-CVGroup_Growup_3-1 = "이 세상에는 아리스보다 강한 모험가가 잔뜩 있습니다! 아리스는 더 강해지고 싶습니다!"
10134-CVGroup_Growup_4-1 = "어떤 세계에서도 용사는 마왕과 싸웁니다. 그렇지만, 싸우지 않는 방법은 없는 걸까요?"
10134-CVGroup_Relationship_Up_1-1 = "선생님, 앞으로도 쭉 아리스와 함께 있어 주세요!"
10134-CVGroup_Relationship_Up_2-1 = "역시, 아리스는 선생님이 좋습니다!"
10134-CVGroup_Relationship_Up_3-1 = "아리스는 다양한 세상을 모험하고 싶습니다. 선생님과 함께요!"
10134-CVGroup_Relationship_Up_4-1 = "지금 이 순간, 아리스는 선생님과 함께 있어 행복한 감정이 느껴집니다.\n선생님도 그렇습니까?"
10134-CVGroup_Tactic_In_1-1 = "스캔 완료. 이 구역은 이제 아리스의 통제권에 있습니다."
10134-CVGroup_Tactic_In_2-1 = "새로운 스테이지에 진입했습니다."
10134-CVGroup_Tactic_Victory_1-1 = "작전 성공! 아리스, 기지로 복귀합니다."
10134-CVGroup_Tactic_Victory_2-1 = "미션 클리어! 더는 적성 반응이 감지되지 않습니다."
