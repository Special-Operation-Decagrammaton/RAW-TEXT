[translation]
20008-CVGroup_CommonSkill-1 = "เสบียงของคณะกรรมการวินัยค่ะ!"
20008-CVGroup_ExSkill_1-1 = "ฉันจะส่งข้อมูลการต่อสู้ที่แน่ชัดให้ค่ะ"
20008-CVGroup_ExSkill_2-1 = "ข้อมูลมีอันนี้กับอันนี้..."
20008-CVGroup_ExSkill_3-1 = "ฉันจะโชว์ฝีมือการรวบรวมข้อมูลของคณะกรรมการวินัยให้ดูค่ะ"
20008-CVGroup_ExSkill_Level_1-1 = "วิเคราะห์เสร็จสิ้น รู้จุดอ่อนแล้วค่ะ"
20008-CVGroup_ExSkill_Level_2-1 = "จากนี้ไปก็รบกวนด้วยนะคะ"
20008-CVGroup_ExSkill_Level_3-1 = "ฮุฮุ ก็เราเตรียมการอย่างสมบูรณ์แบบนี่คะ"
20008-CVGroup_Formation_In_1-1 = "ภารกิจสินะคะ ค่ะ ไว้ใจฉันได้เลยค่ะ"
20008-CVGroup_Formation_In_2-1 = "หมายถึงสั่งงานในจากทางชาเล่ต์ใช่มั้ยคะ?\nถ้างั้นก็ช่วยไม่ได้นะคะ"
20008-CVGroup_Formation_Select-1 = "ไหนๆ ก็เป็นแบบนี้แล้ว คงต้องลงมือแล้วค่ะ"
20008-CVGroup_Growup_1-1 = "การสนับสนุนของคุณครู ฉันจะรับไว้อย่างซาบซึ้งค่ะ"
20008-CVGroup_Growup_2-1 = "ฉันพัฒนา... จนได้นะคะ\nต่อให้เป็นฉัน ก็ตกใจอยู่นะคะเนี่ย"
20008-CVGroup_Growup_3-1 = "นี่ไม่น่าจะใช่เรื่องที่จะทำให้ง่ายๆ นะ...\nจุดประสงค์คืออะไรเหรอคะ? คาดหวังอะไรหรือเปล่าคะ?"
20008-CVGroup_Growup_4-1 = "อ่า... ขอบคุณนะคะ คุณครู\nอะไรกันคะ ทำหน้าแบบนี้\nฉันก็พูดขอบคุณเป็นนะคะ จริงๆ เลย..."
20008-CVGroup_Relationship_Up_1-1 = "เอ่อ อยู่ใกล้กันไปหน่อยหรือเปล่าคะ...?\nมะ... ไม่ค่ะ ฉันไม่ได้สนใจอยู่หรอก..."
20008-CVGroup_Relationship_Up_2-1 = "ต้องการความสัมพันธ์นอกเหนือจากงานเหรอคะ?\nฉันคิดว่ามันเร็วไปนะคะ... ยังเร็วไปค่ะ"
20008-CVGroup_Relationship_Up_3-1 = "นี่มันความรู้สึกอะไรกัน...\nขอเวลาให้ทบทวนอีกหน่อยนะคะ\nฉันขอแค่แป๊บเดียวจริงๆ ค่ะ"
20008-CVGroup_Relationship_Up_4-1 = "เฮ้อ... ค่ะ ฉันยอมรับค่ะ\nฉันไม่ได้คิดว่าตัวเองไม่ชอบคุณครูหรอกค่ะ\nละ... แล้วยังไงเหรอคะ? แล้วจะเอายังไงคะ?"
