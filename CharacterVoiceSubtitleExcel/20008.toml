[translation]
20008-CVGroup_CommonSkill-1 = "선도부의 보급입니다!"
20008-CVGroup_ExSkill_1-1 = "판명된 전투 데이터를 보내겠어요."
20008-CVGroup_ExSkill_2-1 = "데이터는 이거랑 이것……."
20008-CVGroup_ExSkill_3-1 = "선도부의 정보 수집 능력, 보여드리지요."
20008-CVGroup_ExSkill_Level_1-1 = "분석 완료. 약점은 파악했습니다."
20008-CVGroup_ExSkill_Level_2-1 = "이후는 부탁드리겠습니다."
20008-CVGroup_ExSkill_Level_3-1 = "후후, 준비는 완벽하니까요."
20008-CVGroup_Formation_In_1-1 = "업무로군요. 네, 맡겨주세요."
20008-CVGroup_Formation_In_2-1 = "샬레로서 업무상의 지시…라는 말씀이신가요?\n그렇다면 어쩔 수 없네요."
20008-CVGroup_Formation_Select-1 = "이렇게 된 이상, 한 판 붙어볼 수밖에 없겠네요?"
20008-CVGroup_Growup_1-1 = "선생님의 지원. 감사히 받겠습니다."
20008-CVGroup_Growup_2-1 = "성장…해버렸군요. 아무리 저라도 조금 놀랐어요."
20008-CVGroup_Growup_3-1 = "이런 일은, 선뜻 해줄 일이 아닐텐데….\n…무엇이 목적인가요? 뭔가 바라시는 것이라도?"
20008-CVGroup_Growup_4-1 = "그…… 감사합니다. 선생님.\n…뭔가요, 그 얼굴. \n저도 감사인사 정도는 한다고요. 정말……"
20008-CVGroup_Relationship_Up_1-1 = "저기, 좀 거리가 가깝지 않나요……?\n아, 아뇨. 의식하고 있는 게 아니라……."
20008-CVGroup_Relationship_Up_2-1 = "……업무 외의 관계라도 바라시는 건가요?\n그런 건 이르다고 생각하는데요. …아직은."
20008-CVGroup_Relationship_Up_3-1 = "이것이 어떤 감정인지….\n조금 더, 검토할 시간을 주세요.\n정말로, 조금이면 되니까."
20008-CVGroup_Relationship_Up_4-1 = "하아…. 네에, 인정할게요.\n선생님을 싫어한다고 생각하진 않습니다.\n…그, 그래서요? 그게 어쨌다는 건가요?"
