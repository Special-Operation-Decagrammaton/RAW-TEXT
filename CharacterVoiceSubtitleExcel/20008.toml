[translation]
20008-CVGroup_CommonSkill-1 = "這是風紀委員會的補給品！"
20008-CVGroup_ExSkill_1-1 = "傳送已判明的戰鬥資料。"
20008-CVGroup_ExSkill_2-1 = "資料有這個跟這個……"
20008-CVGroup_ExSkill_3-1 = "風紀委員的情報收集能力，就由我來展現。"
20008-CVGroup_ExSkill_Level_1-1 = "分析完畢，弱點已經掌握。"
20008-CVGroup_ExSkill_Level_2-1 = "之後就拜託了哦？"
20008-CVGroup_ExSkill_Level_3-1 = "呵呵，畢竟準備相當萬全。"
20008-CVGroup_Formation_In_1-1 = "是工作對吧。好的，請交給我吧。"
20008-CVGroup_Formation_In_2-1 = "是夏萊的工作指示……對吧？\n既然如此也沒辦法了。"
20008-CVGroup_Formation_Select-1 = "其實我本來打算息事寧人的……看來只能動手了呢。"
20008-CVGroup_Growup_1-1 = "老師的支援，我就感激地收下囉。"
20008-CVGroup_Growup_2-1 = "正在……成長呢。\n連我自己也那個……有點吃驚。"
20008-CVGroup_Growup_3-1 = "這種事情，明明不是能輕鬆做到的……\n……您的企圖是什麼？希望我為您做些什麼嗎？"
20008-CVGroup_Growup_4-1 = "那個……謝謝您，老師。\n……您那是什麼表情。\n就算是我，受到別人幫助也是會感謝一下的啊。真是的……"
20008-CVGroup_Relationship_Up_1-1 = "那個，距離是不是有點太近了……？\n沒，沒有，我並沒有很在意之類的……"
20008-CVGroup_Relationship_Up_2-1 = "……連工作以外的關係也想要嗎？\n那種事還太早了……目前。"
20008-CVGroup_Relationship_Up_3-1 = "這究竟是什麼樣的感情……\n請再給我一點探討的時間。\n真的，只要一點就行了。"
20008-CVGroup_Relationship_Up_4-1 = "唉……沒錯，我承認。\n我並不討厭老師。\n所，所以呢？那又如何？"
