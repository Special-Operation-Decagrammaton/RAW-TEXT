[translation]
20008-CVGroup_CommonSkill-1 = "The Prefect Team's supplies!"
20008-CVGroup_ExSkill_1-1 = "I've just sent over the combat data."
20008-CVGroup_ExSkill_2-1 = "So this is the data... and that..."
20008-CVGroup_ExSkill_3-1 = "I'll show you how the Prefect Team collects data."
20008-CVGroup_ExSkill_Level_1-1 = "Analysis complete. Weak points identified."
20008-CVGroup_ExSkill_Level_2-1 = "I'll be counting on you to handle the rest."
20008-CVGroup_ExSkill_Level_3-1 = "Heehee! I'm ready."
20008-CVGroup_Formation_In_1-1 = "It's work. Okay, leave it to me."
20008-CVGroup_Formation_In_2-1 = "Are you saying it's a...work-related order from Schale?\nThen, there's no helping it."
20008-CVGroup_Formation_Select-1 = "Very well. I guess we're in for a fight."
20008-CVGroup_Growup_1-1 = "I will gratefully accept support from Sensei."
20008-CVGroup_Growup_2-1 = "I've...grown. This is surprising, even for me!"
20008-CVGroup_Growup_3-1 = "Something like this isn't done on a whim... What is it you're trying to gain?"
20008-CVGroup_Growup_4-1 = "Um... Thank you, Sensei. ...Oh, don't look so surprised! I know how to say thank you."
20008-CVGroup_Relationship_Up_1-1 = "Um, don't you think we're a bit too close...? I'm not being sensitive. I just..."
20008-CVGroup_Relationship_Up_2-1 = "Our relationship is strictly business. Were you expecting more? Well, it's far too early for that...for now."
20008-CVGroup_Relationship_Up_3-1 = "I need more time to analyze these feelings. That's all... Just a little more time."
20008-CVGroup_Relationship_Up_4-1 = "*sigh* Fine, I'll admit I... I don't dislike you, Sensei. There. I said it... S-So what?"
