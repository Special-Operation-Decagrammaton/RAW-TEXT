[translation]
10143-CVGroup_Formchange_Shun_Battle_Buffed_1-1 = "고마워요~"
10143-CVGroup_Formchange_Shun_Battle_Covered_1-1 = "잠시, 숨을게요."
10143-CVGroup_Formchange_Shun_Battle_Defense_1-1 = "조금 더 노력하세요."
10143-CVGroup_Formchange_Shun_Battle_In_1-1 = "발밑을 조심해 주세요"
10143-CVGroup_Formchange_Shun_Battle_In_2-1 = "천천히 따라오세요~"
10143-CVGroup_Formchange_Shun_Battle_Move_1-1 = "다음에는 무엇이 있을까요?"
10143-CVGroup_Formchange_Shun_Battle_Move_2-1 = "저기랍니다."
10143-CVGroup_Formchange_Shun_Battle_Recovery_1-1 = "휴우. 감사합니다."
10143-CVGroup_Formchange_Shun_Battle_TacticalAction_1-1 = "저쪽으로 갈까요?"
10143-CVGroup_Formchange_Shun_Battle_Victory_1-1 = "오늘은 정말 좋은 날이네요."
10143-CVGroup_Formchange_Shun_Battle_Victory_2-1 = "여러분과 놀 수 있어서…... 즐거웠어요."
10143-CVGroup_Formchange_Shun_CommonSkill-1 = "어머나. 우후후."
10143-CVGroup_Formchange_Shun_ExSkill_1-1 = "후훗.\n어머?\n문제 해결, 이네요."
10143-CVGroup_Formchange_Shun_ExSkill_2-1 = "좋네요~\n어?\n계속 갈까요?"
10143-CVGroup_Formchange_Shun_ExSkill_3-1 = "히얏!\n저건……?\n우후후."
10143-CVGroup_Formchange_Shun_ExSkill_Level_1-1 = "어머나, 어머나."
10143-CVGroup_Formchange_Shun_ExSkill_Level_2-1 = "조심해야겠네요~"
10143-CVGroup_Formchange_Shun_ExSkill_Level_3-1 = "아무 일도 없었죠?"
10143-CVGroup_Formchange_Shun_Formation_In_1-1 = "안전사고에는 조심해야 해요."
10143-CVGroup_Formchange_Shun_Formation_In_2-1 = "무슨 일이 있으면, 꼭 이야기해 주세요?"
10143-CVGroup_Formchange_Shun_Formation_Select-1 = "어머나, 높이높이…… 인가요? 후훗."
10143-CVGroup_Formchange_Shun_Formchange-1 = "어머나, 잠시만 기다려 주세요."
10143-CVGroup_Formchange_Shun_Growup_1-1 = "성장이란 뜻깊은 일이죠.\n특히 아이들의 성장을 지켜보는 일은요.\n네? 선생님도 저를 똑같은 마음으로……?\n아, 아이참…… 선생님도……"
10143-CVGroup_Formchange_Shun_Growup_2-1 = "더 나은 사람이 되는 것……\n그건 정말 중요한 일이라고 생각해요.\n그러니까 저도…… \n선생님이 지켜봐 주시는 것이, 정말 기쁘답니다."
10143-CVGroup_Formchange_Shun_Growup_3-1 = "저도 아직…… 자랄 수 있을까요?\n그런 의미에서 저는, 선생님 앞에서라면.\n여전히…… 아이일지도 모르겠네요."
10143-CVGroup_Formchange_Shun_Growup_4-1 = "매화원의 교관은…… 아이들을 지켜보는 입장이에요.\n그래서…… 이렇게 제가 학생 입장이 되는 건, \n왠지 쑥스럽네요."
10143-CVGroup_Formchange_Shun_Relationship_Up_1-1 = "여름 과일을 여러 가지 준비해 보았답니다.\n특별히 드시고 싶은 게 있으신가요?\n모두…… 선생님을 위한 것이니까요."
10143-CVGroup_Formchange_Shun_Relationship_Up_2-1 = "혹시, 선생님? \n아무도 없는 곳에서 우리 둘만 있을 수 있다면……\n선생님은 뭘 하고 싶으신가요?\n사실 저는…… 생각해 둔 것이 있거든요……?"
10143-CVGroup_Formchange_Shun_Relationship_Up_3-1 = "의외로 여름 물가에서 감기에 걸리는 경우가 있답니다.\n그래도 걱정하지 마세요.\n제가 돌보아 드릴 테니까요."
10143-CVGroup_Formchange_Shun_Relationship_Up_4-1 = "추억이란 즐겁고, 아름답고……\n때로는, 쓸쓸하게 느껴지는 것이기도 하죠.\n아름다운 채로 있어 주길 바라지만요."
10143-CVGroup_Formchange_Shun_Tactic_In_1-1 = "걱정하지 마세요. 제가 있으니까요."
10143-CVGroup_Formchange_Shun_Tactic_In_2-1 = "저를 믿어 주세요, 선생님."
10143-CVGroup_Formchange_Shun_Tactic_Victory_1-1 = "자, 여러분. 잘 따라오셔야 해요?"
10143-CVGroup_Formchange_Shun_Tactic_Victory_2-1 = "다들, 너무 서두르지 말고요."
