[translation]
20058-CVGroup_CommonSkill-1 = "한 모금, 어때?"
20058-CVGroup_ExSkill_1-1 = "예쁜 거 없으려나~\n……오?\n이걸로 결정!"
20058-CVGroup_ExSkill_2-1 = "흐음~\n저건……?\n이거 귀여워!"
20058-CVGroup_ExSkill_3-1 = "구경, 구경~\n어?\n사야지, 이건!"
20058-CVGroup_ExSkill_Level_1-1 = "어때, 귀엽지?"
20058-CVGroup_ExSkill_Level_2-1 = "괜찮다면 받아줘."
20058-CVGroup_ExSkill_Level_3-1 = "선물!"
20058-CVGroup_Formation_In_1-1 = "아, 오늘 컨디션 괜찮을지도."
20058-CVGroup_Formation_In_2-1 = "같이 가는 거야? 오케이~"
20058-CVGroup_Formation_Select-1 = "우왓?!\n잠깐, 선생님……\n하아, 먼저 말해달라구."
20058-CVGroup_Growup_1-1 = "어…… 뭔가 충족감이 드는데. 좋은 기분이네."
20058-CVGroup_Growup_2-1 = "나 좀 건강해지는 느낌이야."
20058-CVGroup_Growup_3-1 = "저기, 선생님. 혹시 방금 그거, 또 해줄 수 있을까?"
20058-CVGroup_Growup_4-1 = "이거 위험하네…… 중독될 것 같아."
20058-CVGroup_Relationship_Up_1-1 = "최근 선생님이랑 자주 만날지도? 왤까나."
20058-CVGroup_Relationship_Up_2-1 = "뭔가 엄청 주잖아.\n기쁘지만…… 받기만 하는 것도 조금……\n선생님은 바라는 거, 있어?"
20058-CVGroup_Relationship_Up_3-1 = "음…… 버릇될 것 같아.\n너무 오냐오냐해주지 말라구. 곤란해지니까."
20058-CVGroup_Relationship_Up_4-1 = "정말이지, 아무렇지도 않은 얼굴로 말이야.\n나만 설레는 것 같잖아. 안 그래요?"
