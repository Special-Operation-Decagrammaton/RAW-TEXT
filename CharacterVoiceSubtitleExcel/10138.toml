[translation]
10138-CVGroup_Battle_Buffed_1-1 = "시, 신기한 효과네?"
10138-CVGroup_Battle_Covered_1-1 = "자, 잠깐 휴식!"
10138-CVGroup_Battle_Defense_1-1 = "안 통해!"
10138-CVGroup_Battle_In_1-1 = "흥, 날 속이는 건 쉽지 않을 거야."
10138-CVGroup_Battle_In_2-1 = "유령이든 뭐든 나오라고! 없다고 증명해 줄 테니까!"
10138-CVGroup_Battle_Move_1-1 = "이 앞은, 뭔가 이상한 일이 일어나진……않겠지?"
10138-CVGroup_Battle_Move_2-1 = "저기 뭔가 보이는데……? 뭐지?"
10138-CVGroup_Battle_Recovery_1-1 = "아! 고마워!"
10138-CVGroup_Battle_TacticalAction_1-1 = "얍……!"
10138-CVGroup_Battle_Victory_1-1 = "내 논리적 사고에 빈틈은 없어!"
10138-CVGroup_Battle_Victory_2-1 = "뭐가 오컬트라는 거야. 어이가 없네."
10138-CVGroup_CommonSkill-1 = "하나밖에 없는 거니까, 소중히 해!"
10138-CVGroup_ExSkill_1-1 = "누, 누구야?!"
10138-CVGroup_ExSkill_2-1 = "뭐, 뭐가 움직였는데?!"
10138-CVGroup_ExSkill_3-1 = "수, 숨지 말고 나와!"
10138-CVGroup_ExSkill_Level_1-1 = "안 속으니까!!"
10138-CVGroup_ExSkill_Level_2-1 = "내 눈은 못 속여!"
10138-CVGroup_ExSkill_Level_3-1 = "전부 밝혀주겠어!!"
10138-CVGroup_Formation_In_1-1 = "어, 어디로 데려가려는 거야……?"
10138-CVGroup_Formation_In_2-1 = "자, 앞장서. 따라가 줄 테니까."
10138-CVGroup_Formation_Select-1 = "샤악!! 내, 내려놔 바보 선생!"
10138-CVGroup_Growup_1-1 = "이런 곳에서 만족하지 않아. 계속 성장하는 거야.\n키보토스 최고의 패션 디자이너가 되는 그날까지!"
10138-CVGroup_Growup_2-1 = "앗! 좋은 디자인이 떠올랐어! 나중에 선생님한테도 보여줄게."
10138-CVGroup_Growup_3-1 = "이렇게 한 걸음씩 나아가다 보면……. 언젠가 나도……!"
10138-CVGroup_Growup_4-1 = "왜, 왜지……? 뭔가 머릿속이 상쾌해졌어……. 설마 이것도 오컬트……?"
10138-CVGroup_Relationship_Up_1-1 = "나, 난 운명 같은 거 안 믿어! 진짜라니까!"
10138-CVGroup_Relationship_Up_2-1 = "어, 어떻게 내가 좋아하는 걸 아는 거야? 텔레파시……같은 건, 아니지?"
10138-CVGroup_Relationship_Up_3-1 = "뭔가…… 이상한 주문에 걸린 느낌이야. 난 오컬트 같은 거 안 믿는데……."
10138-CVGroup_Relationship_Up_4-1 = "이런 식으로 대해지는 거, 싫진, 않지만……. 으으~~~!"
10138-CVGroup_Tactic_In_1-1 = "이, 이상한 건…… 없겠지?"
10138-CVGroup_Tactic_In_2-1 = "흥, 미신 따윈 무섭지 않으니까!"
10138-CVGroup_Tactic_Victory_1-1 = "뭐야? 별거 아니었잖아?"
10138-CVGroup_Tactic_Victory_2-1 = "역시 그냥 소문일 뿐이었어."
