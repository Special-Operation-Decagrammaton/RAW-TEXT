[translation]
10133-CVGroup_Battle_Buffed_1-1 = "很合理呢。"
10133-CVGroup_Battle_Covered_1-1 = "沒用的。"
10133-CVGroup_Battle_Defense_1-1 = "不會讓你得逞的。"
10133-CVGroup_Battle_In_1-1 = "現場應對也沒問題。"
10133-CVGroup_Battle_In_2-1 = "將資源進行總動員吧。"
10133-CVGroup_Battle_Move_1-1 = "我會繼續進行戰況預測。"
10133-CVGroup_Battle_Move_2-1 = "前往下一個概念空間。"
10133-CVGroup_Battle_Recovery_1-1 = "負擔減輕了。"
10133-CVGroup_Battle_TacticalAction_1-1 = "確保戰術優勢。"
10133-CVGroup_Battle_Victory_1-1 = "是場藝術性的勝利呢。"
10133-CVGroup_Battle_Victory_2-1 = "這是與你一起找到的，無限的可能性。"
10133-CVGroup_CommonSkill-1 = "最佳化，完成。"
10133-CVGroup_ExSkill_1-1 = "敗北──是既定事項。"
10133-CVGroup_ExSkill_2-1 = "開始掃描。\n一切盡在掌握。"
10133-CVGroup_ExSkill_3-1 = "將假設的未來──化為合理的現實。"
10133-CVGroup_ExSkill_Level_1-1 = "作為目標再適合不過了呢。"
10133-CVGroup_ExSkill_Level_2-1 = "我會進行壓制。"
10133-CVGroup_ExSkill_Level_3-1 = "這就是電子的力量。"
10133-CVGroup_Formation_In_1-1 = "需要電子戰對吧？"
10133-CVGroup_Formation_In_2-1 = "這套戰鬥服的力量，讓你見識見識。"
10133-CVGroup_Formation_Select-1 = "雖然……被勒得有點難受……"
10133-CVGroup_Growup_1-1 = "裝備的升級成功了。\n這都多虧了老師。"
10133-CVGroup_Growup_2-1 = "我們是相互補足的關係。\n這樣解釋可以嗎？"
10133-CVGroup_Growup_3-1 = "居然為我投入這麼多資源……\n嗯，我明白這代表的意義。"
10133-CVGroup_Growup_4-1 = "託老師的福……我發現了名為「感謝」的情感。\n……我想說的，就只有這些。"
10133-CVGroup_Relationship_Up_1-1 = "突然覺得身體發熱……\n是因為戰鬥服的保溫功能嗎。"
10133-CVGroup_Relationship_Up_2-1 = "這就是……不確定的事物獲得輪廓的瞬間呢。"
10133-CVGroup_Relationship_Up_3-1 = "在這段交流中感受到的既視感是……\n或許是因為在概念空間中……模擬過了呢。"
10133-CVGroup_Relationship_Up_4-1 = "老師比較喜歡身穿戰鬥服的樣子嗎？\n……不，這個問題沒有什麼……深層的意義。"
10133-CVGroup_Tactic_In_1-1 = "你的指揮與我的分析。是個合理的組合呢。"
10133-CVGroup_Tactic_In_2-1 = "觀測對象的分析已經完成了。接下來就剩實戰而已。"
10133-CVGroup_Tactic_Victory_1-1 = "是合理的指揮呢。"
10133-CVGroup_Tactic_Victory_2-1 = "概念空間的合理性得到了驗證呢。"
