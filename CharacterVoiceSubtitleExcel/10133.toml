[translation]
10133-CVGroup_Battle_Buffed_1-1 = "สมเหตุสมผลเลยละ"
10133-CVGroup_Battle_Covered_1-1 = "ทำอะไรไร้สาระน่า"
10133-CVGroup_Battle_Defense_1-1 = "ไม่หลงกลให้หรอก"
10133-CVGroup_Battle_In_1-1 = "การต่อสู้ภาคสนามก็ไร้ปัญหา"
10133-CVGroup_Battle_In_2-1 = "ฉันจะระดมทรัพยากรทั้งหมดของฉันเอง"
10133-CVGroup_Battle_Move_1-1 = "ฉันจะคาดการณ์สถานการณ์ต่อนะ"
10133-CVGroup_Battle_Move_2-1 = "ไปยังพื้นที่เชิงมโนทัศน์ต่อไป"
10133-CVGroup_Battle_Recovery_1-1 = "ที่หน้างานมีตัวแปรมากเกินไป..."
10133-CVGroup_Battle_TacticalAction_1-1 = "ต้องได้เปรียบทางกลยุทธ์"
10133-CVGroup_Battle_Victory_1-1 = "เป็นชัยชนะที่ก้าวหน้าเลย"
10133-CVGroup_Battle_Victory_2-1 = "นี่คือความเป็นไปได้ไร้ขีดจำกัดที่ฉันค้นพบกับคุณ"
10133-CVGroup_CommonSkill-1 = "ปรับให้ลงตัวสำเร็จ"
10133-CVGroup_ExSkill_1-1 = "ความพ่ายแพ้... ถูกกำหนดเอาไว้แล้ว"
10133-CVGroup_ExSkill_2-1 = "เริ่มสแกน เห็นชัดเจนเลยละ"
10133-CVGroup_ExSkill_3-1 = "ให้อนาคตของสมมติฐานเป็นความจริงที่สมเหตุสมผล"
10133-CVGroup_ExSkill_Level_1-1 = "เป็นเป้าหมายที่ดีเลย"
10133-CVGroup_ExSkill_Level_2-1 = "ฉันจะจัดการเอง"
10133-CVGroup_ExSkill_Level_3-1 = "นี่ละพลังของอิเล็กตรอน"
10133-CVGroup_Formation_In_1-1 = "ต้องมีสงครามอิเล็กทรอนิกส์เหรอ?"
10133-CVGroup_Formation_In_2-1 = "ฉันจะแสดงพลังของชุดนี้ให้ดูเอง"
10133-CVGroup_Formation_Select-1 = "มันรัดจน... อึดอัดนิดหน่อยนะ..."
10133-CVGroup_Growup_1-1 = "อัปเกรดอุปกรณ์เสร็จแล้ว\nต้องขอบคุณคุณครูเลยนะ"
10133-CVGroup_Growup_2-1 = "เรามีความสัมพันธ์ที่สนับสนุนกันและกัน\nให้ฉันมองแบบนี้ได้หรือเปล่า?"
10133-CVGroup_Growup_3-1 = "การทุ่มเททรัพยากรเหล่านี้กับฉัน...\nอื้อ อย่างนี้สินะ"
10133-CVGroup_Growup_4-1 = "คุณครูทำให้ฉัน... เข้าใจความรู้สึก 'ขอบคุณ'\nที่ฉันจะพูดก็มีเท่านี้ละ..."
10133-CVGroup_Relationship_Up_1-1 = "จู่ๆ ร่างกายก็ร้อนผ่าวขึ้นมา...\nเพราะฟังก์ชันรักษาความร้อนของชุดหรือเปล่านะ"
10133-CVGroup_Relationship_Up_2-1 = "นี่คือ... ช่วงเวลาที่ความไม่แน่นอนถูกเปิดเผยออกมาสินะ"
10133-CVGroup_Relationship_Up_3-1 = "ความรู้สึกเดจาวูจากบทสนทนานี้...\nอาจมาจากการจำลองในพื้นที่เชิงมโนทัศน์... ก็ได้"
10133-CVGroup_Relationship_Up_4-1 = "คุณครูชอบชุดบอดี้สูทมากกว่าหรือเปล่า?\nเปล่า... คำถามไม่มีความหมายอะไรลึกซึ้งหรอก..."
10133-CVGroup_Tactic_In_1-1 = "การสั่งการของคุณกับการวิเคราะห์ของฉัน\nเป็นการจับคู่ที่สมเหตุสมผลเลยละ"
10133-CVGroup_Tactic_In_2-1 = "วิเคราะห์เป้าหมายเรียบร้อย ที่เหลือก็แค่การต่อสู้จริง"
10133-CVGroup_Tactic_Victory_1-1 = "เป็นการสั่งการที่สมเหตุสมผลเลยละ"
10133-CVGroup_Tactic_Victory_2-1 = "ความสมเหตุสมผลของพื้นที่เชิงมโนทัศน์ได้รับการพิสูจน์แล้ว"
