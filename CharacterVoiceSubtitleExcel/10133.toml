[translation]
10133-CVGroup_Battle_Buffed_1-1 = "합리적이네."
10133-CVGroup_Battle_Covered_1-1 = "쓸모없는 짓이야."
10133-CVGroup_Battle_Defense_1-1 = "안 통해."
10133-CVGroup_Battle_In_1-1 = "현장 전투도 문제없어."
10133-CVGroup_Battle_In_2-1 = "내 재원을 총동원할게."
10133-CVGroup_Battle_Move_1-1 = "전황 예측을 계속할게."
10133-CVGroup_Battle_Move_2-1 = "다음 개념 공간으로."
10133-CVGroup_Battle_Recovery_1-1 = "현장에는 변수가 너무 많아……."
10133-CVGroup_Battle_TacticalAction_1-1 = "전술적 우위성 확보를."
10133-CVGroup_Battle_Victory_1-1 = "전위적인 승리네."
10133-CVGroup_Battle_Victory_2-1 = "이것은, 당신과 찾은 무한의 가능성."
10133-CVGroup_CommonSkill-1 = "최적화, 완료."
10133-CVGroup_ExSkill_1-1 = "패배는―― 결정 사항이야."
10133-CVGroup_ExSkill_2-1 = "스캔 시작. 훤히 보이네."
10133-CVGroup_ExSkill_3-1 = "가설의 미래를. 합리적 현실로."
10133-CVGroup_ExSkill_Level_1-1 = "좋은 과녁이네."
10133-CVGroup_ExSkill_Level_2-1 = "제압하겠어."
10133-CVGroup_ExSkill_Level_3-1 = "전자의 힘이야."
10133-CVGroup_Formation_In_1-1 = "전자전이 필요한 거야?"
10133-CVGroup_Formation_In_2-1 = "이 슈트의 힘, 보여줄게."
10133-CVGroup_Formation_Select-1 = "조금……끼어서 힘든데……."
10133-CVGroup_Growup_1-1 = "장비 업그레이드에 성공했어. 선생님 덕분이야."
10133-CVGroup_Growup_2-1 = "우리는 상호 보완적 관계. 그렇게 해석해도 괜찮을까?"
10133-CVGroup_Growup_3-1 = "나에게 이런 리소스를 투자했다는 건……. 그래. 그렇구나."
10133-CVGroup_Growup_4-1 = "선생님 덕분에…… '감사'라는 감정을 깨달았어. ……할 말은 그것뿐이야."
10133-CVGroup_Relationship_Up_1-1 = "갑자기 몸이 뜨거워졌는데……. 슈트의 보온 기능탓, 이려나."
10133-CVGroup_Relationship_Up_2-1 = "이것이……불확실했던 것이 윤곽을 드러내는 순간, 인 거네."
10133-CVGroup_Relationship_Up_3-1 = "이 대화에서 느껴지는 기시감은…… 개념 공간에서 시뮬레이션해서……인 걸지도 모르겠네."
10133-CVGroup_Relationship_Up_4-1 = "선생님은 슈트 쪽이 좋은, 거야? ……아니, 질문에 깊은 뜻은…… 없어."
10133-CVGroup_Tactic_In_1-1 = "당신의 지휘와 나의 분석. 합리적인 조합이야."
10133-CVGroup_Tactic_In_2-1 = "관측 대상의 분석은 끝났어. 남은 건 실전뿐."
10133-CVGroup_Tactic_Victory_1-1 = "합리적인 지휘였어."
10133-CVGroup_Tactic_Victory_2-1 = "개념 공간의 합리성이 입증되었어."
