[translation]
20033-CVGroup_CommonSkill-1 = "傾聽我的演說吧！"
20033-CVGroup_ExSkill_1-1 = "嘰嘻嘻！發射！\n……咦？反，反了？"
20033-CVGroup_ExSkill_2-1 = "嘻嘻嘻！全彈發射！\n……嗯？反，反邊？"
20033-CVGroup_ExSkill_3-1 = "上吧！上吧！上吧！嘰哈哈哈哈！\n……咦，不，不是這邊！？"
20033-CVGroup_ExSkill_Level_1-1 = "唔，唔啊啊啊！？"
20033-CVGroup_ExSkill_Level_2-1 = "怎，怎麼會～～～！！！"
20033-CVGroup_ExSkill_Level_3-1 = "唔，唔啊啊，搞，搞錯了啊～～～！！"
20033-CVGroup_Formation_In_1-1 = "是在向我乞求協助嗎？嘻嘻嘻。"
20033-CVGroup_Formation_In_2-1 = "嘻嘻，就來見識見識老師的本事吧。"
20033-CVGroup_Formation_Select-1 = "對真琴大人的不敬，就饒過你吧。"
20033-CVGroup_Growup_1-1 = "原來如此，就連已君臨領導者巔峰的我，也依然還有成長的餘地啊……\n嘰嘻嘻！"
20033-CVGroup_Growup_2-1 = "沒想到能獲得老師的支援啊……\n那我就不客氣了。嘻嘻嘻。"
20033-CVGroup_Growup_3-1 = "哦……老師對我抱有不少期待嘛。\n很好，我就回應你吧，嘻嘻嘻！"
20033-CVGroup_Growup_4-1 = "優秀的人才，理應獲得相應的報酬。\n嘻嘻嘻，這是當然的。"
20033-CVGroup_Relationship_Up_1-1 = "最近，感覺與老師的對話越來越愉快了哦。\n嘻嘻，老師不也這麼覺得嗎？"
20033-CVGroup_Relationship_Up_2-1 = "啊啊，老師。原來你在那裡啊。\n我正好有點閒暇時間，就讓我們短暫暢聊一會吧。"
20033-CVGroup_Relationship_Up_3-1 = "擺脫繁忙的日常，享受悠閒的時光也不錯呢。\n……嘻嘻嘻，我喜歡。"
20033-CVGroup_Relationship_Up_4-1 = "嘻嘻嘻，更依賴我也沒關係哦，老師。\n畢竟我可是萬魔殿的領袖──\n天下無敵的羽沼真琴大人啊。"
