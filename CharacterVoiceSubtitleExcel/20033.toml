[translation]
20033-CVGroup_CommonSkill-1 = "ฟังคำปราศรัยจากเราให้ดีล่ะ!"
20033-CVGroup_ExSkill_1-1 = "คิกๆๆๆ! ยิงเลย! หืม...? กะ... กลับด้านเหรอ?"
20033-CVGroup_ExSkill_2-1 = "คิกๆๆๆ! ยิงระเบิด! หืม...? อะ... อีกฝั่งเหรอ?"
20033-CVGroup_ExSkill_3-1 = "ไปเลย! ไปเลย! ไปเลย! ฮะฮ่าฮ่าฮ่าฮ่า!\nอ๊ะ... มะ... ไม่ใช่ตรงนี้เหรอ?!"
20033-CVGroup_ExSkill_Level_1-1 = "วะ... ว้ากกกกก?!"
20033-CVGroup_ExSkill_Level_2-1 = "ปะ... เป็นไปได้ไง!!!"
20033-CVGroup_ExSkill_Level_3-1 = "อะ... อ๊าก! พะ... พลาดแล้ว!!"
20033-CVGroup_Formation_In_1-1 = "ขอร้องให้เราช่วยงั้นเหรอ? คิกคิกคิก"
20033-CVGroup_Formation_In_2-1 = "คิกคิก ขอดูฝีมือของครูหน่อยก็แล้วกัน"
20033-CVGroup_Formation_Select-1 = "อยากมาดูเราใกล้ๆ งั้นเหรอ?\nคิกคิกคิก เราอนุญาตตลอดนั่นละ"
20033-CVGroup_Growup_1-1 = "ผู้นำสูงสุดอย่างเราก็ยังเติบโตได้อีกเหรอเนี่ย คิกๆๆ!"
20033-CVGroup_Growup_2-1 = "ไม่คิดเลยว่าจะได้รับการสนับสนุนจากครู...\nงั้นเราก็จะไม่ปฏิเสธละนะ คิกๆๆ"
20033-CVGroup_Growup_3-1 = "โอ้... ครูคาดหวังอยู่ไม่น้อยเลยสินะ\nดีละ เราจะทำให้ตามที่คาด คิกๆๆ!"
20033-CVGroup_Growup_4-1 = "ผู้ที่เป็นเลิศย่อมต้องได้รับการตอบแทนที่เหมาะสม\nคิกๆๆ มันก็แน่นอนอยู่แล้ว"
20033-CVGroup_Relationship_Up_1-1 = "หมู่นี้เราสนุกกับการคุยกับครูมากขึ้นนะ\nคิกๆ ครูไม่รู้สึกอย่างนั้นเหรอ?"
20033-CVGroup_Relationship_Up_2-1 = "อ้อ ครู อยู่ตรงนั้นเหรอ?\nเรากำลังว่างอยู่พอดี มาคุยเล่นกันสักหน่อยมั้ยล่ะ?"
20033-CVGroup_Relationship_Up_3-1 = "การหลีกหนีชีวิตประจำวันที่วุ่นวาย แล้วมาใช้เวลาแบบสบายๆ\nก็ไม่เลวนะเนี่ย คิกๆๆ ถูกใจเราที่สุด"
20033-CVGroup_Relationship_Up_4-1 = "คิกๆๆ พึ่งพาเราอีกหน่อยก็ได้นะครู\nเพราะเราคือผู้นำของแพนเดโมเนียม โซไซตี้\nท่านฮานุมะ มาโคโตะผู้ยิ่งใหญ่ยังไงล่ะ"
