[translation]
20033-CVGroup_CommonSkill-1 = "이 몸의 연설을 똑똑히 듣도록!"
20033-CVGroup_ExSkill_1-1 = "키히히힛! 쏴라! ……어? 거, 거꾸로라고?"
20033-CVGroup_ExSkill_2-1 = "키키키킷! 전탄 발사! ……응? 바, 반대?"
20033-CVGroup_ExSkill_3-1 = "가라! 가라! 가라! 캬하하하하! ……엇, 여, 여기가 아니야?!"
20033-CVGroup_ExSkill_Level_1-1 = "우, 우와아아앗?!"
20033-CVGroup_ExSkill_Level_2-1 = "이, 이럴 수가아아아앗!!!"
20033-CVGroup_ExSkill_Level_3-1 = "으, 으악! 시, 실수했다아앗!!"
20033-CVGroup_Formation_In_1-1 = "이 몸에게 도움을 요청하는 건가? 키키킥."
20033-CVGroup_Formation_In_2-1 = "킥킥. 선생의 솜씨를 보도록 할까."
20033-CVGroup_Formation_Select-1 = "이 몸을 더 가까이서 보고 싶다고?\n키히힛, 얼마든지 허락하지."
20033-CVGroup_Growup_1-1 = "과연, 지도자의 극치에 이른 나에게도, 아직 성장의 여지가 있었다니. 키시싯!"
20033-CVGroup_Growup_2-1 = "선생으로부터 지원을 받을 줄이야……. 그럼 사양하지 않겠다. 킥킥킥."
20033-CVGroup_Growup_3-1 = "호오… 선생은 꽤나 기대해 주고 있구나.\n좋다. 응해주도록 하지. 키키킷!"
20033-CVGroup_Growup_4-1 = "우수한 인재에겐, 그에 상응하는 보수가 있어야 하는 법.\n킥킥킥, 당연한 일이다."
20033-CVGroup_Relationship_Up_1-1 = "최근, 선생과 대화하는 게 즐거워진 것 같군.\n키킥, 선생도 그리 느끼고 있지 않나?"
20033-CVGroup_Relationship_Up_2-1 = "아아, 선생. 거기 있었나.\n마침 한가한 참이다. 잠시, 담소라도 나누지 않겠나?"
20033-CVGroup_Relationship_Up_3-1 = "바쁜 일상에서 벗어나, 느긋하게 보내는 시간도 나쁘지 않군.\n…키시싯, 마음에 들었다."
20033-CVGroup_Relationship_Up_4-1 = "킥킥킥, 이 몸을 좀 더 의지해도 좋다고, 선생.\n나는 판데모니움 소사이어티의 리더.\n천하의 하누마 마코토 님이니까"
