1580334319 = "Trinity students arrive at Millennium Campus for the Expo. Seia attends the event, guarded by C&C, and finds herself chasing after some suspicious students."
1485885318 = "Seia's chase of the suspicious students leads her to an underpass. To eavesdrop on their conversation without getting caught, she disguises herself as a box and approaches them. And what she finds there is..."
3524856260 = "Seia heads to Rio's hideout with Neru. After listening to the situation from the two, she confirms that what she saw and heard was all true. Despite the two's best efforts to protect their guest, Seia suggests a deal in return for providing information."
3055035619 = "Rio, Seia's new ally, comes up with a detailed operation to actively investigate the situation."
1087244281 = "Following Rio's instruction, Seia investigates the campus. She searches for clues in \"places in Millennium where things feel uneasy,\" beginning with a classroom packed with students."
3603561 = "Seia meets the After-School Sweets Club members in the classroom and they tell her about the Robot Pet. Intrigued by the topic, Seia decides to help everyone in their search for the lost Robot Pet."
3962754328 = "While Seia is shocked to discover that the Robot Pet was actually a Robot Gator, Karin and Asuna tell her that this is a \"common occurrence in Millennium.\" When Seia hears that the Engineering Department made the Robot Gator, she decides to visit them."
1344822250 = "After having a hard time subduing the rampaging Avant Guard, Yuuka questions the Engineering Department. The Engineering Department claims that they're innocent, and Seia discovers a suspicious chip inside the broken Avant Guard."
2239397365 = "Rio, who received the suspicious chip, senses a certain \"intent\" from it. On the other hand, Seia, who was talking to Rio, notices that Rio seems a bit different from before."
1398523524 = "Neru prepares to infiltrate the Data Center. Rio gives Neru the USB and Security Key for the mission."
1813766078 = "After infiltrating the Data Center, Neru runs into another problem when she arrives at her destination. But then, she hears a familiar, yet loud, voice."
1717919827 = "Rio gets a grasp of the situation with information from the Data Center. The incident was a bigger problem than the three of them expected, and Rio, who refused to let things fall apart even more, prepares a plan to ambush the scene."
2988794607 = "Rio quickly investigates the data flow for Seia. In appreciation for Rio's kindness, Seia heads to Game Development Department to help her in return."
58980428 = "Seia arrives at the Game Development Department and meets Aris and Yuzu. Aris calls Seia the \"Thief King\" and heads over to see the Game Development Department's game at the exhibition hall with her."
3905697355 = "Everyone in Game Development Department worked hard to make the game now displayed at the exhibition hall. However, they find that the game was altered and is currently provoking outrage in the audience. The exhibition hall falls into chaos."
1699322212 = "After looking into the bug that ruined the game, Rio discovers that this was an intended sabotage, just like what happened with the Engineering Department. But aside from that, she tries not to make comments on the game's difficulty and quality..."
1906942469 = "Neru heads to the Fitness Center without prior notice. Things seem to go without a problem, at first, but Hasumi and Sumire find themselves distressed when a machine begins to malfunction. Neru finds the students who caused it and chases after them."
2940778481 = "Neru finally catches up to the suspicious students and subdues them. But the mastermind contacts her through a phone call and causes an explosion, allowing the troublemakers to escape. "
2077988676 = "When the ambush operation fails, Rio believes they have no other choice but to find and confront the suspicious students directly. Rio comes to the conclusion that their current methods wouldn't be enough and finally reveals the Big Sister Algorithm she'd kept confidential all this time."
4128574415 = "Rio heads to the Data Center to once again use the Big Sister Algorithm. Seia and Neru scold Rio for trying to shoulder all the responsibility herself. They insist on tackling the operation together."
559738736 = "They finally arrive at the room housing the Big Sister Algorithm. However, this was all according to Mirai's plan, and the group nearly loses the Big Sister Algorithm. Unlike the panicked Rio and Seia, Neru was unphased, patiently waiting for something."
3964034247 = "With Sensei's help, the group manages to avert the crisis. Mirai and her followers, dazed and confused, all end up being arrested."
2454044807 = "Rio claims that the problem has been solved and tries to leave, but Seia and Neru find it a shame that Rio won't get to enjoy the Expo. Seia uses all her wit to come up with a reasonable excuse and proposes a deal with Rio."
4226564748 = "Rio comes up with a plan to retrieve the \"dangerous exhibition items\" in the Expo venue. Seia receives additional equipment with cutting edge technology from Rio for her infiltration."
3409180479 = "Rio finds remnants of Mirai's followers at the Expo venue. They hadn't given up on making profit yet and were trying to steal submission items, but Neru quickly wipes them out."
3753568740 = "Suspicious activity is detected in the exhibition hall, which has even tighter security now. In fact, it's too strict for just one person to infiltrate, so Rio sends both Neru and Seia to find out what's happening."
2190721227 = "The enhanced security drones at the Expo venue malfunction, so much so that they could threaten visitor safety. Rio comes up with a plan to subdue them, and Seia and Neru skillfully infiltrate the venue and stop the drones."
1147821016 = "Sensei advises Neru to also enjoy the Expo, instead of just undertaking all these secret missions. Seia, after hearing the advice, also decides to take a break to explore the Expo. However, as she tours the venue as a simple visitor, she faces an unexpected crisis..."
2551732620 = "Due to the two's frequent infiltrations the past few days, Seminar decides to take extreme measures. The two fall for Seminar's trap and attempt a dramatic escape."
4087116818 = "On the last day of the Expo, Seia exchanges good-byes with everyone she's met. However, the wholesome farewell turns into chaos with the appearance of the Robot Pet, which was still running loose."
