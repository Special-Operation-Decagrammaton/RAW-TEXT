504218798 = "리오의 계획"
648350015 = "캠퍼스에서 수상한 학생들의 움직임을 파악했습니다. 입장상 평소라면 무시하고 넘어가거나, 적당히 세미나 측에 알리고 말았겠지만…. 상황이 상황이었던 지라, 저도 모르게 그만 쫓고 말았네요. - 세이아"
2965673131 = "그 수상한 사람들… 대체 누구일까요? 엑스포를 망쳐서 수익을 얻는다니…. 터무니없는 일을 꾸미고 있어요. 그대로 두면 분명 사건이 발생할 거예요. - 세이아"
334310010 = "일…. 특히 이런 '작전'들의 경우, 끝날 때마다 얻은 정보를 정리하는 편이 좋아. 나는 항상 이곳에 기다리고 있을 테니, 잊어버렸다거나 다시 듣고 싶다면 언제든 찾아와서 말해줘. - 리오"
2204937774 = "단서를 얻기 위해서는 사람이 많은 곳으로 가는 게 유리하겠지요. 트리니티라면 광장의 분수대 앞이겠지만…. 우선 교실부터 살펴볼까요? - 세이아"
4174324411 = "로봇 펫…? 로봇인데…. 펫인가요? 강아지나 고양이를 본뜬 로봇일까요? 그럼 밥은 뭘 먹는 걸까요. 전기…? 단서 이전에 개인적으로도 궁금해 지네요. - 세이아"
565085471 = "정체불명의 칩을 발견했어요. 정체불명…이라고는 해도, 리오에게 전달하면 금방 밝혀지겠지요. …하지만 적어도 좋은 의도로 만든 게 아니라는 건 알겠어요. - 세이아"
2223345760 = "로봇 강아지라…. …강아지였군요, 저거. …리오의 센스일까요? 아니면 밀레니엄 분들은 대체로 저 정도면 강아지라고 인식할 수 있는 것일까요? - 세이아"
95517514 = "엔지니어부의 작품에, 엔지니어부가 모르는 칩이 들어 있었어. 심지어 그 칩의 기능으로 행사가 위기에 빠질 뻔했고, 엔지니어부는 곤란해졌어. 이건 명백한 사보타주지. 문제는 누가 이런 짓을 했냐는 건데…. - 리오"
1245778966 = "리오 녀석은 늘 희한한 걸 만든단 말이야. 곧잘 괴상한 디자인의 물건을 가져오곤 했지만, 성능 자체는 확실했지. …하. 옛날 생각 나네. 감상에 젖는 타입은 아닌데. - 네루"
365206562 = "데이터 센터 잠입이라…. 나쁘지 않아. 오랜만에 몸 좀 풀리는 일이었어. 그러잖아도 요새는 간단한 일들만 맡았으니 말이야. 예전에는…. …아니, 왜 또 옛날 생각을 하는 거냐, 나는. - 네루"
3686271168 = "충분한 데이터가 갖춰지면, 많은 걸 예측할 수 있지. 더 이상 발생한 사건을 추적하는 데에서 그치지는 않을 거야. 분석하고 결과를 낸 건 나지만…. …결국 두 사람의 덕이라고 생각하고 있어. - 리오"
1277669418 = "게임개발부…. 게임을 만드는 곳이겠지요. 취미를 공유하며 뭔가를 만들어내기 위해 협동하는 곳. 그야말로 <동아리>의 취지에 부합하는 곳이네요. 트리니티에도, 저런 곳이 더 많아졌으면…. - 세이아"
4126678237 = "특이한 분들이셨네요, 게임개발부분들. 힘이 넘치고… 매사가 즐거워 보입니다. 이런 분들이 만든 게임이라면, 분명 그 게임도 즐겁고 신나는 내용이겠지요. 조금 기대가 되기 시작했어요. - 세이아"
2590850258 = "다 같이 공들여 만든 게임을 망가뜨리다니, 누군지는 모르지만 상상 이상으로 심한 짓을 하셨군요. …반드시 사실을 밝혀내고, 게임개발부분들의 누명을 벗겨드려야 해요. 그게 <왕도적>이 해야 할 일이니까요. - 세이아"
744738424 = "엔지니어부에 이어 게임개발부까지…. 피해가 더 커지기 전에, 서둘러 녀석들을 잡지 않으면 안 되겠어. …네루. 꼭 성공해줘. - 리오"
2253968242 = "문제…생긴 거겠지, 저거? 맞겠지? 아니, 저 운동 광인들의 트레이닝을 본 건 어제오늘의 일이 아니니…. 저게 진짜 문제인지, 그저 평소 같은 폭주인지 구분할 수가 없잖아. 뭐…. 당사자가 곤란해 보이니 일단 도와줄까. - 네루"
74454459 = "좋아, 좋아. 거의 다 왔어. 딱 걸렸다고. 그동안은 줄곧 뒤처리만 해왔지만, 눈에 직접 걸린 이상은 그냥 가게 놔줄 수 없지. 이쪽도 덕분에 고생 꽤나 했다고! - 네루"
3102902340 = "현장에서 붙잡는 데에 실패했으니, 이제는 추적이 아니라 수색과 습격으로 진행하는 방법밖에 없어. …다른 방법이 없어. 내키지는 않지만…. 그걸 쓰는 수밖에. - 리오"
1980715747 = "빅 시스터 알고리즘…. 굉장히 오랜만에 말해보는 이름이네. 예전이었다면, 그리고 이걸 쓰는 걸 네루가 알았다면 나를 막아섰겠지. …어쩌면. 차라리 그래 버렸다면…. 지금과는 달랐을지도…. - 리오"
541035342 = "터무니없는 계획을 짜고 있었군요, 리오. 아직도 그 독선적이고 자기희생적인 행동으로 모든 것을 해결하려는 태도. …사실은 누구도 바라지 않는 그 방식. 유감스럽지만 당신의 그 계획은 놔둘 수 없어요. 여기선 네루와 제가 움직이도록 하겠습니다. - 세이아"
