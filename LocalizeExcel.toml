659308929 = "なんか昨日の深夜にヤバいの見たんだけど……\n黒服の連中が、夜中にドラム缶転がしながら港うろついててさ……。\nこれ、もしかして「例のアレ」なのか？"
474002169 = "え、マジ？某ファミリーがドラム缶に化け蟹を詰めてるってあの噂、本当なの？\n普通に怖いんだけど。"
212319164 = "なんで大食い大会って毎回ホットドッグとかハンバーガーとか脂っこいのばっかなんだろ？\n茹でガニだったら普通に優勝できる自信あるんだが。"
1623024344 = "コストの問題じゃない？\nまあ、カニをたくさん食べれる大会なら、私も参加したいな。"
2319544021 = "やばい……組織から預かった金をセキュリティ系ファンドに突っ込んだんだけど、最近の強盗事件のせいで一気に暴落して……\n今月中に戻せなかったら、マジでカニの餌にされるかも……。"
937886249 = "だから分散投資しろって言ったのに。\n投資は失ってもいい金でやれって言葉、知らないの？"
