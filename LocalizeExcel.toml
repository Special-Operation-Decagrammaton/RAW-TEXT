4199579873 = "「開封済みの妖怪MAX」とか言ってる時点で、釣りだろそれ。\nまあでも、カニ漁船が地獄なのはガチっぽいけど。\n知り合いも乗りに行くって言ってから連絡とれなくなったし。"
