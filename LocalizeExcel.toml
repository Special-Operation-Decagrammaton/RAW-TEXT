1606103230 = "An old piano that used to be in the Former Institute. Someone must have been maintaining it, since it still plays quite well."
74387565 = "The biggest club in Gehenna. Driven by their passion for hot springs development, they are frequently the perpetrators of disturbances throughout the district."
3868968517 = "The Hot Springs Department's chaotic operation... It's such an intricate, absurd plan, it's difficult to understand even after attentively listening to every detail."
848014088 = "The charismatic president of the Hot Springs Department. This supposedly magnanimous and perfect leader can't be cowed by anyone...unless the Head Prefect comes around, that is."
1351474076 = "Kasumi seemed grave and incredibly serious as she told her story, but it's hard to believe her. Gehenna has always been made up of unbelievable secrets though."
2177842261 = "An actual monster (unidentified). There are some things in this world that are simply unbelievable, even when you witness them with your own two eyes."
1914035094 = "A diligent student, devoted to learning the culinary arts from Fuuka in the School Lunch Club. She may or may not have secret admirers impressed by her dedication."
3208368410 = "A notorious club even within Gehenna. They're a skilled group of villains equipped with all the necessary expertise to carry out their violent schemes."
3042483397 = "An unidentified giant pancake that suddenly appeared in Gehenna territory. While a rather rare occurrence, none of the students seem to be particularly surprised either."
1792078009 = "The Pandemonium Society ordered food from the School Lunch Club during Gehenna Party planning. Unfortunately, it seems the president isn't the chef handling their food order..."
654318302 = "It seems whoever made this object only asked if they could, not if they should. One may even venture to say this is the very embodiment of wasteful spending."
1931459361 = "Even troublemakers will find a certain sort of loyalty forged in dark alliances and underground dealings. But going against the chairman of the Pandemonium Society will surely push anyone to the edge..."
1421764132 = "The Medical Emergency Club's ointment is said to be so effective it can stimulate the cells to regrow skin. A must for any first-aid kit."
2017029991 = "From the front to the back to the side, this flyer is incredibly suspicious from every angle. Something about it is just not quite right."
4052776956 = "Apparently, Chairman Makoto has been causing mayhem within the district. The rumor is rather reliable, considering how often she tends to instigate conflict."
2835023066 = "Hypnosis may be able to completely change someone's personality, but bothersome things will never not be bothersome. Human nature is more set in stone than it appears."
