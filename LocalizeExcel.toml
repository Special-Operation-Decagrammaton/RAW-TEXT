742146611 = "끝도 없이 이어지는 추격. 그리고 도주 끝에 한계에 다다른 아리우스 스쿼드. 아츠코는 다른 세 명을 살리기 위해 스스로의 신변을 포기하고 투항한다. 그러나 세 명을 기다리고 있는 것은……"
