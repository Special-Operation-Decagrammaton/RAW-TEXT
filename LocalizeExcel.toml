1883127960 = "학원제의 테마에 대해 고민하던 아이리는 거리에서 우연히 기타 연주를 듣고 영감을 얻는다."
185156526 = "밴드를 하자!!"
1646859781 = "요시미, 나츠, 카즈사는 밴드를 하자는 아이리의 갑작스러운 제안을 꺼려하지만, 학원제 오프닝 축하 공연의 참가 보상으로 디저트의 여왕, <프레데리카 셈라>를 얻을 수 있다는 말을 듣고 제안을 받아들인다."
1617050729 = "밴드에서 제일 중요한 것?"
749480935 = "아이리, 요시미, 나츠, 카즈사는 밴드에서 각자 중요하다고 여기는 역할인 작곡, 의상 디자인, 록, 보컬을 각각 맡게 된다. 열정에 불타는 멤버들 사이에서 웃음을 잃은 아이리는, 그날 밤 선생님께 자신의 작곡에 대한 고민을 털어놓으며 조언을 구한다."
188886584 = "와일드헌트의 귀인"
2265387020 = "선생님과 아이리는 아이리의 작곡 고민을 해결하기 위해, 아이리가 이전에 거리에서 목격한 와일드헌트 학생을 찾아 밤새도록 골목골목을 헤맨다. 새벽녘까지 아무런 단서도 찾지 못하고 지쳐갈 때쯤, 그들이 찾던 와일드헌트 학생이 갑자기 그들 앞에 나타난다."
2422729638 = "이전과는 다른 나"
2553404339 = "늦은 저녁, 연습실에서 홀로 연습에 몰두하는 아이리를 발견한 선생님에게, 아이리는 미소를 지으며 이전과는 전혀 다른, 새로운 자신을 선보이겠다고 선생님에게 말한다. 그러나 다음 날, 선생님은 요시미를 통해 아이리가 갑자기 사라졌다는 소식을 접하게 된다."
3689885592 = "아이리를 위해"
670625935 = "선생님이 아이리를 찾기 위해 밖으로 나간 동안, 요시미, 나츠, 카즈사는 고심 끝에 아이리가 학원제 오프닝 축하 공연에 참여하지 못해 <프레데리카 셈라>를 맛볼 기회를 잃을까 봐 실망하여 사라졌을지도 모른다는 생각에 이른다. 아이리를 찾기 위한 결의를 다진 그들은 금기시되는 길로의 첫걸음을 내딛는다."
1244213426 = "자리에 어울리는 사람"
2533353309 = "선생님은 아이리를 찾아내고, 아이리가 느끼는 좌절감의 진짜 이유가 <프레데리카 셈라> 때문이 아니라, 자신이 평범하고 자리에 어울리지 않는다고 생각해서라는 것을 알게 된다. 선생님이 아이리에게 위로와 조언을 건네려는 순간, 티파티로부터 학생 세 명이 유치장에 갇혀있다는 소식을 듣게 된다."
