3330937226 = "燃燒的開幕式"
2584298955 = "以花子和綾音的宣示為始，奇普托斯晄輪大祭開幕。"
1333557687 = "燃燒的實行委員會"
309572292 = "代表各校的晄輪大祭實行委員們齊聚一堂。在比賽正式開始之前，實行委員間就展開了互不相讓的心理戰。"
3733926134 = "攤販的誘惑"
3416522998 = "慶典的氣氛在不知不覺間熱絡了起來，田徑運動場附近的攤販街道也開始變得擁擠。蓮實在進行實行委員的工作時，偶然遇見了美食研究會。羽留奈挑釁（？）說自己不會變胖，所以不用特別管理體重，這句話惹得蓮實火冒三丈，燃起了求勝慾望。"
1059932753 = "波瀾的借物競賽（１）"
121038983 = "在美食研究會的活躍下，格黑娜的排名上升到了第一。優香看到轉播後，決定親自參賽為千年爭取總冠軍。"
3445498865 = "波瀾的借物競賽（２）"
1473177672 = "優香代替柚子參加「借物」競賽。看了紙條的優香帶著老師通過終點，拿下第1名。被懷疑自己要借的東西是不是「喜歡的人」，優香尷尬地否認。"
357458073 = "遲來的午餐"
815055312 = "老師看到瑪麗忙著幫助他人而勸他吃午餐。瑪麗和老師前往玄武商會的攤販享用遲來的午餐。過程中店員不小心燙傷了，老師便帶店員去聯合醫療本部。不知道為什麼，治療患者的芹奈和瀬奈阻止老師進去醫護站。"
44282278 = "周邊巡邏"
2955793294 = "隨著大運動會的氣氛高漲，越來越多的學生被吸引過來。在競賽場地巡邏的蓮實和老師從桐乃和吹雪那邊收到了可疑學生的相關舉報。"
801109073 = "合作（１）"
156824262 = "蓮實一行人為了追蹤可疑的學生而吃了不少苦頭，後來一行人遇見了實行委員會。實行委員會的學生也一起合作展開追蹤，很快地就在田徑運動場的地下找到了嫌犯。他們是主張一週只要工作3天，計畫要示威抗議的工程部學生。"
3318312354 = "合作（２）"
