2042584363 = "경전 이송 작전!"
2114734858 = "시스터후드에서 중요한 경전을 발굴해 내고, 그것을 공표하기 전 히나타에게 관리를 맡긴다. 하지만 히나타는 실수로 경전을 분해해버린다."
885221606 = "비밀 작전으로 변경합니다……."
2609673615 = "분해된 책을 복구하기 위해 도서부를 찾아간 히나타와 선생님. 시미코는 그런 두 사람에게 고서 복원의 전문가인 도서부장 우이를 소개해 준다."
2635340070 = "마술사의 탑으로"
3848520474 = "우이는 분해된 경전을 보자 격분하나, 곧 선생님과 히나타의 설득으로 복원 작업을 도와주겠다고 말한다. 이에 선생님과 히나타는 우이가 말한 세 가지 복원 재료를 구하러 나선다."
1290804638 = "슬럼성의 전투 1"
693914347 = "미라클 5000 케이크를 구하기 위해 강변으로 나온 선생님과 히나타. 하지만 헬멧단이 제빵사를 납치해 케이크를 구할 수 없는 상황이었다. 두 사람은 마침 강변에서 곤란해 하고 있던 방과후 디저트부와 함께 제빵사를 구하러 간다."
4074869668 = "슬럼성의 전투 2"
4079910234 = "헬멧단으로부터 제빵사를 구해낸 일행. 방과후 디저트부 학생들은 히나타에게 남은 케이크를 양보하려 하지만, 제빵사가 그럴 필요 없다며 모두에게 케이크를 만들어준다."
1658580150 = "트리니티의 달리는 섬광탄 1"
231136931 = "물이끼 아교를 구하기 위해 트리니티를 배회하던 선생님과 히나타는 불량배들과 대치하고 있던 스즈미를 발견한다. 두 사람은 스즈미를 도와 불량배들을 물리친다."
2012597133 = "트리니티의 달리는 섬광탄 2"
2151675688 = "쓰러진 불량배들은 자신들의 입장을 변호하며 서러움을 토해내기 시작한다. 히나타는 그런 그들에게 성당 수녀로서 도와줄 수 있는 길을 제시하고, 불량배들은 히나타에게 감사하며 아교를 구하도록 도와준다."
496082561 = "조금 닮은 사람들 1"
565077451 = "마지막 재료인 정성약을 얻기 위해 구호기사단으로 향한 히나타와 선생님. 세리나는 그런 두 사람을 기다리고 있었다며 건물 안으로 안내한다."
881020918 = "조금 닮은 사람들 2"
3596757663 = "세리나는 두 사람을 도우려 했지만 본인 스스로도 많은 업무를 떠안고 있었다. 히나타는 그런 세리나를 내버려두지 못하고 업무를 도와준다. 그리고 선생님은 그 동안 정성약을 찾아낸다."
3108835754 = "끝내지 못한 이야기 1"
707461921 = "재료를 모두 모아 온 두 사람을 보며 우이는 약간이지만 마음을 연다. 책 복원 작업이 시작되고, 고된 하루를 보냈던 두 사람은 우이 옆에서 잠이 든다."
3464872233 = "끝내지 못한 이야기 2"
1190546149 = "우이가 책을 복원하는 동안 어느덧 시간은 밤이 된다. 우이는 굉장히 빠르게 복원하고 있었지만, 경전의 공개 행사 일정이 바뀌며 제 시간에 책을 가져다 놓을 수 없게 돼버린다."
1936542723 = "뿌린 대로 거두리라 1"
789625242 = "히나타는 모두에게 도움만 받은 주제에 임무를 실패했다며 스스로를 자책한다. 선생님과 우이가 위로해 줄 새도 없이 스스로 잘못을 자백하겠다며 고서관을 나가버린다."
1115309119 = "뿌린 대로 거두리라 2"
2876222975 = "히나타가 나간 사이 경전의 복원 작업이 끝난다. 우이는 히나타를 걱정하고, 선생님은 우이에게 받은 경전을 들고 어딘가 전화를 걸기 시작한다."
867066557 = "뿌린 대로 거두리라 3"
1143461639 = "경전의 공개 장소였던 유적지에 도착한 히나타. 자신의 잘못을 자백하려는 순간, 갑자기 불량배와 방과후 디저트부 학생들이 쳐들어와 주변을 혼란스럽게 만든다. 그리고 그렇게 시간을 끄는 사이, 선생님이 경전을 제 자리에 돌려놓는다."
3261598258 = "뿌린 대로 거두리라 4"
1763744091 = "모든 일이 잘 마무리된 후의 고서관. 우이에게 감사 인사를 전하러 온 선생님에게 우이는 전보다 조금은 더 솔직해진 태도로 대한다."
2477586931 = "불인의 마음"
