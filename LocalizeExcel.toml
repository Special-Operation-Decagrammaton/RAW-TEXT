1205256794 = "賽季準備中。"
3920080884 = "十字神名是主張自己為神聖求道者的人工智慧系統。目前追隨十字神名的10名預言者正在奇普托斯各地出沒。\n\n薇娜為十字神名的第3名預言者，\n最初是在阿拜多斯的沙漠地區觀測到它的存在。\n雖然無法得知薇娜為何在此出現，但若是放任不管，\n勢必將成為極其危險的存在。"
3639039230 = "十字神名是主張自己為神聖求道者的人工智慧系統。目前追隨十字神名的10名預言者正在奇普托斯各地出沒。\n\n赫賽德是十字神名的第4名預言者，已確定它正掌控著位於千年郊外軍需工廠的生產系統。\n若赫賽德成功生產無限的兵力，奇普托斯想必會面臨前所未有的災禍吧。"
3682198469 = "在奇普托斯某處的廢棄地下神殿，觀測到了因扭曲的神祕而顯現的人造天使。\n\n葛利果是被稱為「諸聖相通」的人造天使系列的完成型，也是在蓋瑪特利亞的實驗中誕生的神祕怪物。即使是現在，那個怪物仍然在地下神殿中演奏著管風琴。在旋律的結尾等待的會是什麼……沒有人知道。"
1904549173 = "百鬼夜行聯合學園內自古流傳的怪談──幻魎百物語──現身了。\n\n在所有人都該盡情歡笑的慶典現場鬧事的「貓鬼黑影」是真實存在的嗎？還是其實是某人惡意製造的恐怖怪談？儘管真相尚未明朗，但得在為時已晚前，為未完的怪談畫下句點。"
1142087454 = "十字神名是主張自己為神聖求道者的人工智慧系統。目前，追隨他的10名預言者正在奇普托斯各處出沒。\n\n葛夫拉是十字神名的第5名預言者。極地研究基地的無人探測機在遭到不明AI駭入並不斷自我進化之後，以如今的樣貌出現。雖然不清楚葛夫拉的目的，但如果坐視不管，包含極地航線在內，所有奇普托斯航線的安全都將受到威脅。"
3983422512 = "十字神名是自稱神聖求道者的人工智慧系統。目前追隨它的10名預言者已在奇普托斯各處現身。\n\n耶索德是十字神名的第9名預言者，目前看來並不存在其原始結構體。無法得知其原型結構或製造目的，但唯一確定的是，不能就這樣放任耶索德不管。"
276060001 = "報告指出，在很久以前就因財政困難而停業的遊樂園「史林皮亞」發生了不明的怪異現象。根據傳聞，已停止運作的遊樂園人偶和各種遊樂設施會在半夜開始運轉並襲擊人們。\n\n遊樂園人偶「高茲」在空蕩蕩的史林皮亞繼續唱著只屬於自己的獨角戲。隱藏在那奇異微笑下的本性究竟是善還是惡？我們難以推測。"
3550217605 = "在三一古教堂的地下發現了來歷不明的存在。\n耶羅尼姆斯是被稱為「諸聖相通」的人造天使系列的完成型。也有一說是其為蓋瑪特利亞基於古代教義創造出來的實驗體。\n不能放任擁有強大力量的耶羅尼姆斯不管。為了奇普托斯的和平，挺身而戰吧！"
2223988532 = "十字神名是主張自己為神聖求道者的人工智慧系統。目前追隨十字神名的10名預言者正在奇普托斯各地出沒。\n\n霍德原本是千年自治區通訊網臨時架設的通訊AI，然而在受到不明AI駭入後開始主張自己是十字神名的第8名預言者。\n若不阻止這個集結千年技術精華的演算機關的暴走，勢必將使千年自治區的安全受到威脅。"
2092560489 = "從矯正局傳來了「七罪人」之一的「災禍之狐」越獄並奪走了氣墊船，正在大鬧特鬧的消息。\n\n雖然不知道身穿泳裝的他為何要無差別地恣意破壞，但若放任不管的話，奇普托斯的海邊將陷入一片火海吧。"
491740630 = "就像是要阻止他人抵達大本營一般，凱坦澤們的祕密武器登場了。\n凱坦澤們似乎運用一直以來所掠奪的資金和技術在這裡打造了巨大的合體機器人「KAITEN FX Mk.0」。\n儘管成品一定非常壯觀迷人，但考量到這具機器人可能引發的各種問題，不得不就地扼殺這個美夢。"
1866624346 = "在D.U.鄰近海域發現了來歷不明的巨大怪獸。這隻怪獸的外型和以前沉入海中的Momo好友玩具造型一樣。\n雖然完全不知道為什麼會發生這種事，但阻止這隻怪獸的進擊是勢在必行！ "
3601545918 = "報告指出，在很久以前就因財政困難而停業的遊樂園「史林皮亞」發生了不明的怪異現象。根據傳聞，已停止運作的遊樂園人偶和各種遊樂設施會在半夜開始運轉並襲擊人們。\n\n雖然不清楚玩偶白和黑再次動起來的原因，但看起來明顯是在重現過去遊樂園的華麗遊行。"
