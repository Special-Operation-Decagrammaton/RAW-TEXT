1425951884 = "감옥 안의 프린세스"
1398756343 = "선생님은 미카를 만나기 위해 학원 감옥으로 향하고, 미카는 세이아가 아직 자신을 용서하지 않았다며 모든 것은 자신의 탓이라고 말한다. 미카로부터 세이아의 상태가 좋지 않다는 사실을 알게 된 선생님은 세이아의 방으로 향하고, 세이아로부터 키보토스가 멸망할 것이라는 말을 듣는다."
1644694189 = "꿈과 신기루 사이에서"
2642024392 = "세이아는 선생님에게 자신이 자각몽을 과도하게 꾸게 된 나머지, 현실과 꿈이 잘 구분되지 않는 지경이 되었다고 고백한다. 세이아는 <게마트리아>가 키보토스의 파멸의 원인이 될 것이라고 경고하나, 선생님은 미카와의 화해를 우선시하라고 조언한다. 세이아는 미카를 호출하지만, 어느새 잠이 들고 꿈속에서 <게마트리아>와 접촉하고 만다."
175200160 = "불가해한 탐구자들"
4076845186 = "세이아가 목격한 것은 <게마트리아>의 구성원들이 논쟁하는 광경이었다. <게마트리아>의 구성원 중 '베아트리체'는 아리우스 스쿼드를 이용해 선생님을 처리할 것이라고 선언하는데, 그 순간 무언가 낌새를 채고 회의를 해산시킨다. 세이아는 정신적으로 큰 충격을 받은 채 현실로 돌아오고, 그 순간 미카가 세이아를 찾아온다."
4242006093 = "부러져버린 것들"
3096862869 = "정신적으로 충격을 받은 세이아는 미카에게 큰 소리를 지르고 만다. 다시 꿈속으로 끌려들어 간 세이아는 꿈속에서 베아트리체에게 붙잡히고, 베아트리체가 준비한 제단에 아츠코가 매달려 있는 광경을 보게 된다. 한편 선생님은 뒷골목에서 사오리와 마주친다."
