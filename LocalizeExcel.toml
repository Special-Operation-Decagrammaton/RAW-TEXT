1182512530 = "符合氣氛的服裝"
2124358865 = "佳世子迎接抵達辦公室的老師。老師在辦公室的角落發現一件堆滿灰塵的禮服。隨後，老師邀請佳世子一起吃晚餐，佳世子勉強答應了。"
1671331120 = "孩子般的好勝心"
2297857782 = "老師在辦公室遇見穿著禮服的佳世子。佳世子說想答謝老師之前對自己說了那些話，老師正想拒絕，佳世子便用老師自己說過的話回答他。"
2029319155 = "高掛的禮服"
3430969351 = "老師擔心說話無疾而終的亞瑠而來到便利屋辦公室。亞瑠很快從老師突然來訪的驚嚇中回過神來，對於要如何處理禮服尋求老師的建議，他已經為這個問題煩惱很久了。"
3483710198 = "稍微接近了嗎"
2862818090 = "受亞瑠之託，老師來到事業說明會。沒想到期待已久的事業說明會竟然一塌糊塗，亞瑠對此失望不已，垂頭喪氣。老師為了安慰亞瑠，邀請他去一個特別的地方。"
3809174998 = "又被凍結的帳戶"
3868290257 = "到了約好的時間，亞瑠卻沒有出現。在當老師感到擔心的時候，耳邊傳來了亞瑠的聲音。老師看到亞瑠身陷困境的樣子便伸出援手，亞瑠對於老師的出手相助表達了深深的謝意。"
761424835 = "達成目的的方法"
