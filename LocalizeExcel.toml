3289919768 = "มารยาทในมื้ออาหารเลิศรส!"
2496100826 = "สำรวจพื้นที่รอบๆ เพื่อวิเคราะห์สถานการณ์กันเถอะ!\n\nอืม... บรรยากาศมันค่อนข้างวุ่นวาย ต้องไปถามสมาชิกว่าเกิดอะไรขึ้น"
318399169 = "ไปหาฟูกะที่ตกที่นั่งลำบากอยู่กันเถอะ!\n\nวัตถุดิบทำอาหารที่สั่งไว้ในปริมาณมากสำหรับวาเลนไทน์ ปาร์ตี้เกเฮนน่า และชมรมโภชนาการ… ชัดเจนว่าผู้ร้ายในทุกคดีคือ…!"
3141934736 = "ไปกวาดล้างกลุ่มนักเลงที่สร้างความวุ่นวาย\nในอาคารเรียนเก่ากันเถอะ!\n\nดูเหมือนว่าพวกเด็กเกเรจะเริ่มทำตามกลยุทธ์ อย่างที่ชินัตสึพูดไว้ เหมือนจะไม่ได้แค่ก่อความวุ่นวายธรรมดาด้วย มาหาเบาะแสกันว่าใครเป็นผู้ว่าจ้างกันเถอะ"
2569897263 = "มาสำรวจรอบๆ ห้องเปียโนกันเถอะ!\n\nไม่คิดมาก่อนเลยว่าจะมีที่แบบนี้อยู่ด้านหลัง\nสถาบันเกเฮนน่า ตอนนี้มีเวลาว่างนิดหน่อย มาดูรอบๆ กันดีกว่า..."
2403732486 = "มาย้อนดูวันนี้กันเถอะ!\n\nเฮ้อ วันนี้วุ่นวายหัวหมุนทั้งวัน อีก 5 วัน ปาร์ตี้เกเฮนน่าจะเปิดแล้ว แล้วแผนร้ายของแพนเดโมเนียม โซไซตี้ก็ยังตีกันอยู่ในหัว..."
2995459567 = "มาตรวจสอบสถานที่เกิดเหตุและหาเบาะแสกันเถอะ!\n\nไม่มีทางที่จู่ๆ คาสุมิจะพัฒนาพื้นที่ด้านหน้าหอประชุม\nของแพนเดโมเนียม โซไซตี้โดยไร้เหตุผล\nการซ้อมเปียโนก็จำเป็น แต่ตอนนี้มาแก้ปัญหากันก่อนเถอะ"
1627627988 = "ไปสอบถามนักเรียนและรวบรวมข้อมูลกันเถอะ!\n\nตามที่อาโกะบอกไว้ มีตั๋วเข้าออนเซ็นกระจายในหมู่นักเรียนโรงเรียนเกเฮนน่า ชมรมพัฒนาออนเซ็นวางแผนทำเรื่องที่น่าสงสัยอยู่"
3086472127 = "มาไล่ตามชมรมพัฒนาออนเซ็นที่วางแผนทำ\nเรื่องที่น่าสงสัยกันเถอะ!\n\nกลยุทธ์ปลุกปั่นเกเฮนน่างั้นเหรอ\nถึงชื่อจะฟังดูตลก แต่ก็ไม่ใช่เรื่องที่ปล่อยผ่าน\nไปได้ง่ายๆ ต้องรวบรวมข้อมูลเพิ่มอีกหน่อยแล้ว"
1626969013 = "ไปพบกับคาสุมิที่ถูกจับเข้าห้องขังกันเถอะ!\n\nจะมอบออนเซ็นให้นักเรียนเกเฮนน่า\n1 คน 1 บ่องั้นเหรอ\nตอนนี้ไม่รู้ว่าจะทำปฏิกิริยายังไงดีเลย"
3158540525 = "ทำใจให้เย็นลง แล้วมาฝึกเปียโนกันเถอะ!\n\nเพื่อคุณครูที่กำลังรอคอยการแสดงดนตรี และปาร์ตี้ที่กำลังจะมาถึง อย่าใจร้อนและค่อยๆ ทำไป..."
3801704183 = "มาย้อนดูวันนี้กันเถอะ!\n\nถึงจะยังไม่คุ้นเคยกับการแสดงเปียโน แต่ถ้าเดินหน้าต่อไปในระดับนี้ ก็น่าจะทำได้สำเร็จ "
1957882148 = "มาเริ่มกิจวัตรประจำวันที่ห้องประธานกันเถอะ!\n\nการติดต่อจากคุณครูที่น่าสนใจ และรายงานจากชินัตสึที่เข้าใจยาก ก็เป็นเกเฮนน่าที่ไม่ต่างจากปกติ แต่รู้สึกไม่สบายใจนิดหน่อย"
1304712371 = "มาจับแพนจังที่กำลังเดินไปมาในโรงอาหาร\nนักเรียนกันเถอะ!\n\nแพนเค้กเดินได้... ตอนที่ได้รับรายงานจาก\nชินัตสึก็สงสัยอยู่ว่าพูดอะไรไร้สาระ\nแต่พอได้เห็นด้วยตาตัวเองถึงเข้าใจ\nแต่ว่าที่มาของพวกมันคืออะไร..."
610392988 = "มาหยุดแพนจังยักษ์ที่ปรากฏตัวในสวนกันเถอะ!\n\nเพิ่งจับตัวชมรมชิมอาหารไปเมื่อกี้เอง คราวนี้เป็นแพนเค้กยักษ์เหรอ... เฮ้อ..."
2177230518 = "ไปพบกับฮารุนะที่ถูกจับเข้าห้องขังกันเถอะ!\n\nลักพาตัวฟูกะไปเพื่อชิมอาหารในปาร์ตี้ ชมรมชิมอาหารนี่ไม่เปลี่ยนไปเลยจริงๆ"
2187336480 = "จดจ่อกับโน้ตเพลง แล้วมาฝึกเปียโนกันเถอะ!\n\nเตรียมพร้อมเสร็จแล้ว...! ถึงมีเวลาเหลือไม่มาก แต่ก็จะจดจ่อกับโน้ตเพลงและฝึกซ้อมกันต่อ"
1136050044 = "มาย้อนดูวันนี้กันเถอะ!\n\nวันนี้ก็เป็นอีกวันที่ผ่านไปด้วยดี... เหลือเวลาอีก 4 วัน... พยายามต่อไปอีกนิด อีกแค่นิดเดียว"
3855672209 = "มาจัดเรียงโน้ตเพลงที่เตรียมมากันเถอะ!\n\nไม่ต้องรีบร้อน ตอนนี้มาทำให้สุดความสามารถ...\nแต่ว่ากำลังใจและการติดต่อจากคุณครู...\nถึงจะยุ่งมาก แต่มันก็มีบางอย่างรบกวนใจฉันอยู่"
3729000631 = "เก็บรูปปั้นของมาโคโตะที่ติดตั้งอยู่ตามที่ต่างๆ คืนกันเถอะ!\n\nแค่แพนเดโมเนียม โซไซตี้\nอย่างเดียวก็ปวดหัวแล้ว แต่นี่ยังมีเด็กเกเร\nคนอื่นๆ เคลื่อนไหวด้วยอีก... มาจัดการกับรูปปั้นที่นี่กันก่อนกันเถอะ"
107297234 = "ค้นหาที่ซ่อนของพวกเด็กเกเร แล้วจัดการให้เกลี้ยงกันเถอะ!\n\nเฮ้อ ถึงจะไม่รู้ว่าถูกคำบงการแบบไหนจากมาโคโตะ แต่ถ้าจะก่อเรื่องต่อไปละก็ ฉันจะขวางให้ถึงที่สุดเลย"
1776716070 = "ไปหายาที่เซนะเตรียมไว้ให้กันเถอะ!\n\nถึงจัดการเรียบร้อยแล้ว แต่ฉันคงใส่อารมณ์เยอะไปหน่อย ขออย่าให้มีใครได้รับบาดเจ็บสาหัสเลย..."
3732203121 = "มาฝึกเปียโนไปด้วยสัมผัสที่ปลายนิ้วกันเถอะ!\n\nสัมผัสได้ถึงคีย์บอร์ดที่ติดอยู่\nกับมือนิดๆ ด้วย ฮุฮุ\nการเล่นดนตรีมันสนุกขนาดนี้เลยสินะ ไม่ได้รู้สึกแบบนี้มานานแล้วเลย"
990824040 = "มาย้อนดูวันนี้กันเถอะ!\n\nวันนี้ก็เป็นวันที่วุ่นวายเหมือนเดิม แม้ว่าจะเป็นเพียงช่วงเวลาสั้นๆ แต่หวังว่าพรุ่งนี้จะได้เห็นผลการฝึกซ้อมนะ..."
2068928161 = "ทำภารกิจให้เสร็จแล้วมาเตรียมฝึกซ้อมตามปกติกันเถอะ!\n\nเฮ้อ ถึงการฝึกต่อต้านการก่อการร้ายก่อนงานปาร์ตี้... ไม่ใช่การฝึกที่ยากเป็นพิเศษ... แต่ฉันจะต้องทำให้สมบูรณ์แบบ... "
3900612289 = "เรียกสมาชิกที่จะเข้าฝึกซ้อมมารวมตัวกันเถอะ!\n\nใบปลิวน่าสงสัยที่โปรยอยู่ในเขตปกครองตนเองเกเฮนน่า\nเห็นได้ชัดว่าแพนเดโมเนียม โซไซตี้กำลังวางแผน\nทำเรื่องที่น่าสงสัยอยู่ แต่ตอนนี้ไม่มีเวลามาใส่ใจ\nกับเรื่องแบบนี้แล้ว"
2796525508 = "มาช่วยอิโอริเก็บใบปลิวที่น่าสงสัยกันเถอะ!\n\nอิโอริประสบปัญหากับเรื่องที่แพนเดโมเนียม โซไซตี้ก่อไว้ ฉันที่เป็นประธานจะทำเป็นไม่สนใจไม่ได้ แต่ว่า... คุณครูจะสบายดีไหมนะ..."
1797291382 = "มาค้นหาความจริงของเบื้องหลังเหตุวุ่นวายที่เกิดขึ้น\nในแพนเดโมเนียม โซไซตี้กันเถอะ!\n\nเฮ้อ ดูเหมือนว่าอิบูกิจะติดอยู่ในเหตุวุ่นวายที่ดู\nน่าเหลือเชื่อนี้ โล่งอกไปทีที่ไม่มีใครบาดเจ็บสาหัส ก่อนอื่นก็ต้องรู้ความจริงให้ได้"
4023772365 = "มาเข้าฝึกซ้อมกับสมาชิกที่มารวมตัวกันเถอะ!\n\nสมาชิกทุกคนมารวมตัวกันและเตรียมการฝึกพร้อมแล้ว แม้ว่าการฝึกนี้เป็นการฝึกปกติ แต่ก็ไม่ควรละเลย"
1542042713 = "มาเข้าฝึกซ้อมกันอีกครั้งเถอะ!\n\nปกติแล้วฉันคงจะแย้งคำขอของมาโคโตะ แต่ตอนนี้ไม่อยากเสียเวลากับการโต้เถียง\nที่ไร้ความหมายแล้วละ"
2778212802 = "ทำจิตใจให้สงบแล้วมาฝึกเปียโนกันเถอะ!\n\nฉันใช้เวลาฝึกส่วนใหญ่ไปกับการฝึกซ้อมเพิ่มเติมก็จริง แต่ฉันก็มั่นใจ ฉันทำได้ ต้องทำได้ดีแน่ๆ"
2808151776 = "มาย้อนดูวันนี้กันเถอะ!\n\nพรุ่งนี้ก็เป็นวันปาร์ตี้แล้ว แน่นอนว่าปลายนิ้วของฉันยังสั่นอยู่ แต่ถ้าเป็นแบบนี้ต่อไป..."
556520415 = "มาบอกความในใจต่อการแสดงดนตรีกับอาโกะกันเถอะ!\n\nวันนี้ฉันอยากจะทุ่มเทกับการแสดงดนตรีให้ออกมาดีที่สุด ถ้าดื้อรั้นสักหน่อยก็คงจะไม่เป็นไรใช่ไหมนะ...?"
424240925 = "มาตั้งใจฝึกเปียโนกันเถอะ!\n\nบางทีฉันก็ประหม่าจนมือตามไม่ทัน แต่ฉันไม่อยากทำพลาดบนเวที ฉันจะพุ่งสมาธิทั้งหมดไปกับคีย์บอร์ด เพื่อการแสดงดนตรีที่สมบูรณ์แบบ"
1211557641 = "มาจัดการกับความวุ่นวายทั้งหมดที่เกิดขึ้นใน\nเกเฮนน่ากันเถอะ!\n\nตอนนี้ฉันซ้อมเปียโนเสร็จแล้ว เรารีบมาจัดการเด็กเกเรในเกเฮนน่า ก่อนที่การแสดงจะเริ่มกันเถอะ"
2047835697 = "มาเปิดการแสดงเปียโนที่เวทีปาร์ตี้กันเถอะ!\n\nเพื่อสมาชิกและเพื่อนๆ ในเกเฮนน่าที่มาช่วยฉัน...\nเพื่อคุณครู... ฉันจะตอบแทนทุกคน\nด้วยการแสดงดนตรีที่ยอดเยี่ยมนี้"
1233708660 = "มาทำความสะอาดห้องรกๆ กันเถอะ!\n\nของเล่นที่ได้รับเป็นของขวัญจากคุณครู เป็นสมบัติล้ำค่าที่ไม่มีอะไรมาทดแทนได้"
3329307650 = "ไม่ต้องสนใจรอบข้างแล้วก้าวออกไปข้างหน้ากัน!\n\nบางครั้งก็มีเรื่องที่เข้าใจยากเกิดขึ้นในเกเฮนน่า ช่วงนี้เหนื่อยเกินไปหรือเปล่านะ...? "
3107481871 = "มาดุนักเรียนที่โทรศัพท์แกล้งกันเถอะ!\n\nถึงจะไม่ได้มาสร้างความรบกวนให้ฉันก็เถอะ\nแต่คนที่ไปขัดขวางการทำงานของสมาชิก\nคนอื่นแบบนี้จะต้องถูกดุอย่างหนัก"
3306064596 = "มาหาหนังสือเล่มที่หายไปกันเถอะ!\n\nฉันก็ไม่แน่ใจว่าแปลกไหม แต่ถ้าชั้นหนังสือว่าง ฉันจะกังวลนิดหน่อย..."
2012136030 = "ไปตรวจดูที่เกิดเหตุหลบหนีจากห้องขัง\nกันเถอะ!\n\nคาสุมิ หัวหน้าชมรมพัฒนาออนเซ็น… เป็นคนที่ประมาทไม่ได้เลย คราวหน้าถ้าจับได้ละก็ จะทำให้รู้ซึ้งถึงความน่ากลัวของ\nคณะกรรมการวินัยให้ดู"
2319967817 = "มาหาสมุดบันทึกเก่าที่ซ่อนอยู่ในห้องเปียโนกันเถอะ!\n\nคุณบุคคลนิรนามที่สร้างความฝันอันล้ำค่าไว้ที่นี่ ไม่ต้องห่วงนะ ความพยายามของคุณจะไม่สูญเปล่า ยังไงก็มีฉันที่จดจำมันได้"
9172985 = "ไปสำรวจโรงอาหารนักเรียนที่เกิดเหตุ\nวุ่นวายกันเถอะ!\n\nอาหารประเภทไหนกันนะที่ทำให้ทุกคนที่นี่\nหมดสติได้? ดูจะยังเป็นเรื่องที่คลุมเครืออยู่"
2934280817 = "มาหาร่องรอยของแมวจรจัดที่มาป้วนเปี้ยนอยู่ใน\nโรงอาหารกันเถอะ!\n\nมันคงดมตามกลิ่นอาหารของชมรมโภชนาการ\nแล้วตามมาถึงที่นี่สินะ ขอให้ได้พบกับเจ้าของที่ดีนะ"
2003080857 = "มาดูแลคนเจ็บที่นอนอยู่บนเตียงกันเถอะ!\n\nดูจากปฏิกิริยาของสมาชิกแล้ว ดูเหมือนว่าการใช้มือเยียวยาจะได้ผลดีมาก ต่อไปก็เป็นคุณครู... ไม่สิ ไม่นะ นี่ฉันคิดอะไรอยู่เนี่ย!"
3684066488 = "มาหาแมลงที่หลุดเข้ามาในห้องชมรม\nหน่วยแพทย์ฉุกเฉินกันเถอะ!\n\nทุกคนวุ่นวายเพราะแมลงตัวเดียว... มันออกจะเข้าใจยากอยู่สักหน่อย มีฉันที่แปลกอยู่คนเดียวงั้นเหรอ?"
2904112170 = "มาจับแพนจังกันอีกครั้ง!\n\nอาหารฝีมือจูริน่ะ... ไม่สิ อย่าไปคิดมาก ตอนนี้ต้องมีสมาธิกับสิ่งที่อยู่ตรงหน้า"
487185434 = "มาค้นกองสัมภาระเพื่อหาพุดดิ้งที่หายไปกันเถอะ!\n\nฉันไม่อยากทำตามคำขอของมาโคโตะหรอก แต่ถ้าเกิดอาชญากรรมในโรงเรียนขึ้นจริงๆ มันก็ไม่ใช่เรื่องที่คณะกรรมการวินัยจะเมินเฉยได้"
4196165701 = "มาช่วยเอริกะทำความสะอาดห้องเรียนรกๆ กันเถอะ!\n\nการช่วยเหลือนักเรียนที่กำลังลำบาก ก็เป็นงานของคณะกรรมการวินัยเหมือนกัน การทำความสะอาดห้องเรียนไม่ใช่เรื่องยาก มาลองช่วยกันดีกว่า"
552395824 = "มาจัดการโปสเตอร์กับรอยขีดเขียนทั่วห้องเรียน\nกันเถอะ!\n\nโปสเตอร์กับรอยขีดเขียนที่ใส่ร้ายมาโคโตะ คงเป็นผลกรรมที่เกิดขึ้นปกติ แต่ถ้าเป็นอุปสรรคต่อตารางเรียนของ\nนักเรียนละก็ แบบนั้นคงได้เป็นเรื่องแน่"
3034885123 = "มาหาตัวนักเรียนที่ซ่อนอยู่กันเถอะ!\n\nเล่นซ่อนหาเหรอ... จำได้ว่าเคยเล่นตอนเด็กๆ ถ้าฉันเป็นคนหา ฉันจะหาทุกคนเจอเร็วมากจนทุกคนเดือดร้อนเลย..."
690950655 = "หาคูปองอาหารที่จุนโกะทำหายไปกันเถอะ!\n\nชมรมชิมอาหารนี่... เป็นชมรมที่สร้างอุบัติเหตุอย่างไร้เหตุผล แต่ความรู้สึกต่ออาหารและเพื่อนๆ นั้นเป็นของจริง"
