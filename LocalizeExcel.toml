2369259268 = "[c]내 Phase 종료 시:[/c] 모든 아군 스트라이커에게 보호막을 [c]{param;BasePower}[/c] 부여한다."
3836785110 = "카드를 [c]{param;DrawCardNum}[/c]장 뽑는다.\n\n\n[c][75b4c0][i]\"우물쭈물 거릴 시간이 없어, 선생님! 어서 가자!\"[/i][-][/c]"
51114751 = "모든 아군 스트라이커에게 보호막을 [c]{param;BasePower}[/c] 부여한다.\n\n\n[c][75b4c0][i]경고: 훼손 시 안전을 보장할 수 없음[/i][-][/c]"
