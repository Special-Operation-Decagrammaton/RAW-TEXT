1862786830 = "[c]At the start of user's Phase:[/c] If there is only 1 ally Striker, summons [c]{char;848058}[/c] card(s) until there are an equal number of allies and enemies. [c](1 time per game)[/c]\n\n※ The battle is lost when all ally Strikers retreat and there are only support Strikers left."
4086389314 = "[c]Cooldown: 2 turns[/c]\n\nDamages the Front enemy.\n\n\n[c][75b4c0][i]\"Crimes include playing hooky, littering, and running in the hallway...\"\n- Valkyrie Police School Public Peace Bureau Director, Ogata Kanna[/i][-][/c]"
