648350015 = "ฉันรับรู้ถึงการเคลื่อนไหวที่น่าสงสัยของ\nกลุ่มนักเรียนลึกลับภายในโรงเรียน\nตามปกติฉันคงไม่สนใจและมองข้ามไป\nหรือแจ้งให้ทางเซมิน่าทราบตามสมควรค่ะ\nแต่ในสถานการณ์นี้ ฉันกลับวิ่งตามไป\nโดยไม่รู้ตัว... - เซอา"
2965673131 = "บุคคลที่น่าสงสัยเหล่านั้น... คือใครกันนะคะ? ทำลายงานเอ็กซ์โปเพื่อหาผลประโยชน์... และยังกำลังวางแผนทำเรื่องไร้สาระ ถ้าปล่อยไว้แบบนั้นคงจะเกิดเรื่องขึ้นแน่นอนค่ะ - เซอา"
334310010 = "งาน... โดยเฉพาะใน 'ปฏิบัติการ' พวกนี้\nฉันควรจะจัดการข้อมูลที่ได้รับมาเมื่อจบวัน\nฉันจะรออยู่ที่นี่เสมอ ถ้าหากว่าลืม\nหรืออยากฟังอีกครั้ง ก็บอกฉันได้\nตลอดเวลาเลยนะ - ริโอะ"
2204937774 = "ในการหาเบาะแส ถ้าไปตรงที่ที่มีผู้คน\nอยู่เยอะๆ ก็จะมีประโยชน์มากกว่าค่ะ\nสำหรับทรีนิตี้ก็น่าจะเป็นหน้าน้ำพุจัตุรัส...\nก่อนอื่นไปดูที่ห้องเรียนกันมั้ยคะ? - เซอา"
4174324411 = "หุ่นยนต์สัตว์เลี้ยง...? หุ่นยนต์...\nที่เป็นสัตว์เลี้ยงเหรอ? นี่คือหุ่นยนต์ที่\nจำลองมาจากลูกสุนัขหรือลูกแมวใช่มั้ยคะ?\nแล้วมันกินอะไรเป็นอาหารนะ\nไฟฟ้าเหรอ...? ฉันเองก็ชักอยากรู้เรื่องนี้\nมากกว่าเบาะแสซะแล้วสิคะ - เซอา"
565085471 = "ฉันพบชิปที่น่าสงสัยค่ะ ถึงจะบอกว่า\nน่าสงสัย... แต่ถ้าบอกริโอะ เธอคงจะ\nคลี่คลายได้โดยเร็วสินะคะ แต่ว่า...\nฉันพอจะรู้ว่ามันไม่ได้ทำขึ้นมาด้วยเจตนาที่ดีค่ะ - เซอา"
2223345760 = "หุ่นยนต์ลูกสุนัขนี่... เหมือนลูกสุนัขเลยนะคะ นั่นน่ะ เป็นตามรสนิยมของริโอะหรือเปล่านะ? หรือว่าชาวมิลเลเนียมปกติก็เข้าใจว่า นี่คือลูกสุนัขกันหรือเปล่าคะ? - เซอา"
95517514 = "ในกลุ่มผลงานของชมรมวิศวกรรมก็มีชิป\nที่ชมรมวิศวกรรมไม่รู้จักอยู่ด้วย แม้ว่าเกือบ\nจะตกอยู่ในวิกฤตเพราะฟังก์ชันของชิปนั้น\nและชมรมวิศวกรรมก็เจอปัญหา นี่มันเป็นการ\nก่อวินาศกรรมอย่างแน่นอน คำถามคือ\nใครทำเรื่องแบบนี้ได้... - ริโอะ"
1245778966 = "ยัยริโอะนั่นชอบทำอะไรแปลกๆ ตลอด ถึงจะชอบเอาของที่ออกแบบแปลกๆ เข้ามาบ่อยๆ แต่ประสิทธิภาพของมันก็ไว้ใจได้ เฮ้อ... นึกถึงเรื่องเมื่อก่อนเลย อ๊ะ ฉันไม่ใช่คนอ่อนไหวหรอกนะ - เนรุ"
365206562 = "การแฝงตัวในศูนย์ข้อมูล... ก็ไม่เลวนะ\nนานๆ ทีถือว่าได้ผ่อนคลายร่างกายซะหน่อย\nถึงอย่างนั้นช่วงนี้ฉันก็ได้รับมอบหมายแต่\nงานง่ายๆ ทั้งนั้น เมื่อก่อนน่ะ... ไม่สิ...\nทำไมฉันถึงคิดถึงวันเก่าๆ อีกแล้วเนี่ย - เนรุ"
3686271168 = "ในเมื่อมีข้อมูลเพียงพอแล้วก็คาดการณ์ได้\nมากมาย ฉันจะไม่หยุดอยู่แค่การติดตาม\nเหตุการณ์ที่เกิดขึ้นอีกต่อไป ถึงฉันจะเป็นคน\nวิเคราะห์และหาข้อสรุปได้... แต่ฉันคิดว่า\nเพราะมีทั้งสองคนอยู่ด้วยถึงทำได้สำเร็จ - ริโอะ"
1277669418 = "ชมรมพัฒนาเกม... คือที่ที่สร้างเกมสินะคะ\nเป็นพื้นที่แบ่งปันงานอดิเรก และร่วมกัน\nสร้างสรรค์บางสิ่งบางอย่าง นี่คือสถานที่ที่\nตรงกับวัตถุประสงค์ของ <ชมรม> อย่างแท้จริงค่ะ\nถ้าในทรีนิตี้มีที่แบบนั้นมากขึ้นก็คง... - เซอา"
4126678237 = "พวกเธอเป็นคนพิเศษจริงๆ ค่ะ โดยเฉพาะ\nชมรมพัฒนาเกม มีพลังล้นเหลือ...\nและดูสนุกไปหมดทุกอย่าง เกมที่พวกเธอสร้าง\nจะต้องสนุกและน่าตื่นเต้นแน่นอนค่ะ\nฉันเริ่มจะตื่นเต้นหน่อยๆ แล้วค่ะ - เซอา"
2590850258 = "การทำลายเกมที่พวกเธอทุ่มเทสร้างขึ้นมา\nด้วยกันแบบนี้ ถึงจะไม่รู้ว่าเป็นใคร แต่มันก็\nเลวร้ายเกินกว่าจะจินตนาการได้ค่ะ\nฉันจะต้องเปิดเผยความจริง และล้างมลทิน\nให้กับชาวชมรมพัฒนาเกมให้ได้ค่ะ\nเพราะนั่นคือสิ่งที่ <ราชาจอมโจร> ควรทำ - เซอา"
744738424 = "ทั้งชมรมวิศวกรรม ทั้งชมรมพัฒนาเกม...\nต้องรีบจับพวกนั้นให้ได้ก่อนที่จะเกิดความ\nเสียหายมากกว่านี้ เนรุ... ขอให้ทำสำเร็จ\nด้วยเถอะ - ริโอะ"
2253968242 = "ตรงนั้นน่ะ... เป็นอะไรหรือเปล่า? เป็นใช่มั้ย?\nไม่สิ ไม่ใช่ว่าฉันเพิ่งเห็นการฝึกร่างกาย\nของพวกที่คลั่งการออกกำลังกายเป็นครั้งแรก\nหรอกนะ... ก็ไม่รู้ว่านั่นมีปัญหาจริงๆ หรือแค่\nการวิ่งเร็วแบบระห่ำตามปกติ อืม... ดูท่าจะ\nมีคนที่ลำบากอยู่ ต้องรีบไปช่วยแล้วละ - เนรุ"
74454459 = "เอาละ เกือบเสร็จแล้ว จับได้ครบหมดแล้ว\nที่ผ่านมาฉันตามเก็บกวาดมาตลอด\nแต่พอได้เห็นกับตาตัวเอง ก็เลยปล่อย\nผ่านไปไม่ได้ ทางนี้ก็ทำงานหนักมาก\nเหมือนกันนะ! - เนรุ"
3102902340 = "เพราะการจับกุมในที่เกิดเหตุล้มเหลวไป วิธีเดียวในตอนนี้คือการค้นหาและจู่โจม ไม่ใช่การติดตาม ไม่มีวิธีอื่นแล้ว... ถึงไม่อยากทำ... แค่ใช้มันก็พอ - ริโอะ"
1980715747 = "บิ๊กซิสเตอร์ อัลกอริทึม... ฉันเคยได้ยิน\nชื่อนี้เมื่อนานมาแล้ว ถ้าเป็นก่อนหน้านี้ และถ้าเนรุรู้เรื่องการใช้สิ่งนี้เข้า คงจะมา\nขัดขวางฉันแล้ว บางทีนะ...\nถ้าปล่อยทิ้งไว้แบบนั้น... มันอาจต่างไป\nจากตอนนี้ก็ได้... - ริโอะ"
541035342 = "มีแผนการไร้สาระไว้อยู่สินะคะ คุณริโอะ คุณยังตั้งใจจะแก้ไขทุกอย่างด้วยวิธีการ\nเสียสละตนเองที่ดื้อรั้น แม้ว่าที่จริงแล้ว\nวิธีการนั้นเป็นวิธีที่ไม่มีใครต้องการเลยก็ตาม\nถึงมันจะน่าเสียใจ แต่ฉันก็ไม่อาจปล่อยผ่าน\nแผนการของคุณไปได้ค่ะ ที่นี่ เนรุกับฉัน\nจะเคลื่อนไหวเองค่ะ - เซอา"
