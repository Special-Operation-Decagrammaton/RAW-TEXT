3365586462 = "在釣客的拜託下，美優決定教他怎麼釣魚。在RABBIT小隊成員們釣魚的時候，村民們帶著海鮮到來，大家一起享受著BBQ度過愉快的時光。"
2519986036 = "深夜的烤肉大會（２）"
2505877297 = "另一方面，RABBIT小隊和村民們和樂融融的樣子讓海面上的可疑團伙感到很不順眼。"
1139930313 = "可疑的黑影"
1328182877 = "次日，釣客在鬼怪暗礁附近發現不可思議的船舶。雖然村民們認為那艘船是傳說中的「老式船隻」因而感到害怕，但RABBIT小隊成員們立刻就察覺到弔詭之處。"
1869164534 = "水中的兔子"
2573209587 = "為了掌握「老式船隻」的實情，RABBIT小隊成員們航向大海。"
4044326055 = "清理甲板（１）"
893178531 = "在大海上航行的不是傳說中的船，而是海運業者的駁船。隨著海運業者參與走私蝦子的事情曝光，RABBIT小隊以SRT之名制服了對方。"
3149322458 = "清理甲板（２）"
3604726031 = "面對SRT的力量，區區的傭兵毫無還擊之力，隨後RABBIT小隊將他們交給村民處分。"
