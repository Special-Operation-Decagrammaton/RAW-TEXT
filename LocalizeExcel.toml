1869512390 = "의장님의 결단"
381782239 = "평소와는 다르게 마코토가 아닌 이로하의 연락을 받게 된 선생님. 만마전의 집무실에 도착하자마자 발견한 것은 평소와 완전히 다른 모습의 마코토였다. 선생님과 만마전의 부원들은 갑작스럽게 선도부의 해체를 선언하며 집무실을 뛰쳐나가는 마코토를 뒤쫓고, 가까스로 마코토를 원래의 모습으로 되돌려놓는다."
189252809 = "그리고 찾아온 파티 당일"
2057531649 = "<게헨나 특별 파티>의 개최가 얼마 남지 않았음에도 히나가 도착하지 않자, 마코토는 히나가 악기 연주를 하지 못한다는 것을 노리고 의도적으로 피아노 연주를 맡겼음을 밝힌다. 자신의 계획이 성공하였음에 들뜬 마코토는 이 사실을 게헨나 전역에 공표하고, 이 소식이 퍼지자마자 게헨나 곳곳에 잠들고 있던 사건 사고들이 한꺼번에 발생하기 시작한다."
