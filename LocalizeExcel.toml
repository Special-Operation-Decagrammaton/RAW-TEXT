2198939886 = "最初，也是最後"
3468668910 = "在逛祭典準備時稍微遲到的海花。與老師聊起祭典的回憶，並害羞地拿出自己珍藏已久的舊祭典玩偶。"
3045026029 = "另一個修行（？）"
