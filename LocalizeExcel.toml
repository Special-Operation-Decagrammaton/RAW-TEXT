2310867314 = "กองเชียร์แห่งมิลเลเนียม? 1"
3921454463 = "โนอากับคุณครูกลับมายังห้องปฏิบัติงานวิศวกรรมเพื่อดูหุ่นยนต์เชียร์ตัวใหม่\nที่ถูกสร้างขึ้น แต่ที่ทั้งสองได้เจอคือชมรมวิศวกรรมในชุดกองเชียร์ เหตุการณ์\nที่เกิดขึ้นคือ ชมรมวิศวกรรมประดิษฐ์หุ่นยนต์เชียร์ได้สำเร็จ แต่จู่ๆ หุ่นยนต์\nเชียร์ที่เสร็จสมบูรณ์ก็อาละวาดและหนีไป โนอาเข้าไปตรวจสอบพิมพ์เขียว\nของหุ่นยนต์เชียร์ และสงสัยว่ามีใครบางคนแฮ็กหุ่นยนต์"
