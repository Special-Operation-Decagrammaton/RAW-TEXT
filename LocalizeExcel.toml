4253304983 = "밀레니엄의 해커"
3276166777 = "밀레니엄의 트레이너 1"
3544225624 = "밀레니엄의 트레이너 2"
4231625923 = "밀레니엄의 응원단? 1"
1551337824 = "밀레니엄의 응원단? 2"
990654860 = "황륜대제에 반대하는 모임"
1480833506 = "응원이라는 이름의 전차"
143433522 = "모두를 위한 대운동회"
1757313669 = "대운동회의 아침"
2470008028 = "대운동회의 전야"
2617062401 = "선생님은 세미나의 유우카와 노아로부터 대운동회를 앞두고 예기치 못한 사고가 생겼다는 소식을 전해 듣는다. 축제를 앞두고 무리를 하던 유우카가 걱정된 노아는 유우카 몰래 선생님에게 체육제 준비를 도와달라는 부탁을 한다."
845225262 = "밀레니엄의 마이스터"
1370627587 = "망가진 응원 로봇을 수리하러 엔지니어부를 방문한 노아와 선생님. 사정을 전해 들은 엔지니어부는 로봇의 수리 대신 새 응원 로봇을 만들어주겠다며 호언장담한다."
4262322769 = "밀레니엄의 해커"
2239879700 = "밀레니엄의 해커 집단, 베리타스를 방문한 노아와 선생님. 처음에는 노아의 방문을 경계하던 베리타스도 노아의 진심이 담긴 부탁에 마음을 열고 그녀를 돕기로 한다. 한편, 치히로는 밀레니엄 서버에 누군가가 해킹 시도를 했다는 사실을 알게 된다."
3776835865 = "밀레니엄의 트레이너 1"
2305382535 = "출전 선수들의 컨디션을 확인하고자 트레이닝부를 방문한 노아와 선생님. 스미레는 황륜대제를 앞두고 투지를 불태우지만, 함께 운동하던 학생들은 스미레의 열정에 질려 모두 도망쳐버린다. 대운동회를 앞두고 들뜬 마음을 숨기지 않던 스미레는 선생님에게 '가벼운' 운동을 권한다."
1674288483 = "밀레니엄의 트레이너 2"
3186889323 = "밀레니엄의 어딘가에서 한 무리의 밀레니엄 학생들이 모여 무언가 수상한 계획을 세운다."
2310867314 = "밀레니엄의 응원단? 1"
3921454463 = "새로 제작된 응원 로봇을 보러 공업실습실로 돌아온 노아와 선생님. 하지만 그들을 기다리고 있는 건 응원단 차림의 엔지니어부였다. 정황인즉, 응원 로봇을 만드는 데에는 성공했지만, 완성된 응원 로봇이 갑자기 폭주하며 도망쳐버렸다는 것. 응원 로봇의 청사진을 확인한 노아는 누군가가 로봇을 해킹했을 거라 의심한다."
3125605064 = "밀레니엄의 응원단? 2"
2812405180 = "노아와 선생님은 응원단 복장의 엔지니어부와 함께 베리타스를 다시 찾아간다. 이야기를 전해 들은 베리타스는 밀레니엄 학원 내의 수상한 움직임을 추적한다."
3491008751 = "황륜대제에 반대하는 모임"
3227473772 = "세미나 일행은 베리타스의 도움으로 응원 로봇을 훔쳐 간 밀레니엄 학생들을 찾아내는 데 성공한다. 그들은 체육 활동이 싫어 황륜대제의 개최에 반대하는 학생들의 모임으로, 대운동회의 저지를 위해 그동안 방해 공작을 하고 있었던 것. <황반모> 학생들은 엔지니어부로부터 훔쳐 온 로봇으로 세미나 일행을 상대한다."
1811732470 = "응원이라는 이름의 전차"
1826342970 = "강력한 전투 능력을 갖춘 '트랙 크래셔' 앞에서 좌절하는 엔지니어부와 베리타스. 그때 노아가 낸 아이디어 덕분에 트랙 크래셔는 무력화되고, 전황은 뒤집히게 된다. 그리고 숨어 있던 <황반모>의 학생들이 스미레에게 붙잡히며 소동은 끝이 난다."
2110629097 = "모두를 위한 대운동회"
158795387 = "선생님은 <황반모>의 학생들에게 어째서 대운동회를 방해하려고 했는지 이유를 묻고, 그들의 고충에 대해 들어준다. 그리고 노아와 선생님은 모두가 즐길 수 있는 대운동회를 만들기 위해 계획을 일부 수정하기로 한다. 이후 밀레니엄의 학생들은 모두 마음을 모아 대운동회를 열심히 준비한다."
3915786569 = "대운동회의 아침"
2806214484 = "뒤늦게 단잠에서 깨어난 유우카는 당황하며 현장으로 찾아오지만, 자신이 자는 사이에 다른 밀레니엄 학생들이 대운동회 준비를 대신 해 준 것을 알게 된다. 유우카는 자신을 도와준 노아와 선생님에게 감사의 인사를 전하고…… <황륜대제>는 무사히 막을 올린다."
3198922083 = "Get Set, Go! ~키보토스 황륜대제~"
2064697458 = "드디어 시작된 키보토스 대운동회, 황륜대제.\n모두가 각자의 목표를 위해 열심히 달려 나간다.\n어김없이 트러블이 난무하는 가운데, 최종 우승의 향방은?!"
