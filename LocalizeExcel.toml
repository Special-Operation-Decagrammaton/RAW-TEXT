1868823029 = "放學後的甜點團？（２）"
3555228002 = "想要忘記的過去（１）"
2179022057 = "想要忘記的過去（２）"
2366776294 = "我討厭熱血又吵鬧的笨蛋（１）"
3456435934 = "我討厭熱血又吵鬧的笨蛋（２）"
3459245515 = "我們是「放學後的甜點團」（１）"
3447933575 = "我們是「放學後的甜點團」（２）"
3088286703 = "被封印的魔獸……（１）"
3139702118 = "被封印的魔獸……（２）"
374936049 = "想和老師商量的事"
266683838 = "某天，一通電話打到了夏萊。打電話來的人正是放學後的甜點部的千紗。千紗說自己被跟蹤，並向老師請求諮詢。"
3673151056 = "向我衝過來的傢伙（１）"
1587917542 = "與千紗見面並與她諮詢的老師。正遭受跟蹤狂騷擾的千紗似乎不想向實現正義部舉報。正當千紗要說出有關跟蹤狂的情報的時候，犯人自己出現並撲向了千紗。"
1489650353 = "向我衝過來的傢伙（２）"
2956197676 = "跟蹤狂的真面目就是自衛隊的宇沢澪紗。千紗在甩開澪紗後，向老師傳了一張照片，並表示自己國中時曾是個太妹。"
2953979966 = "每個人都有一兩個（１）"
1227345914 = "老師詢問千紗講出以前是太妹的事有沒有關係，但千紗說那只是想要遺忘的過去罷了。老師在和千紗分開後，聯絡同樣是自衛隊的鈴美聆聽有關澪紗的事。"
3880511578 = "每個人都有一兩個（２）"
379247669 = "收到澪紗的支援請求後抵達現場的鈴美和老師。但是狀況都已經結束了。老師向澪紗轉達千紗不再當太妹並且平凡過著日子的事實，但澪紗對此感到半信半疑並回去了。"
1945166588 = "就算材料各不相同（１）"
259113567 = "老師為了確認大家的情況而造訪了放學後的甜點部的部室。夏和愛莉說雖然不知道千紗和澪紗之間發生過什麼事，但是說和大家的關係並沒有因此而改變。感到安心的老師因為失誤而將一張照片傳給了所有放學後的甜點部。"
4050058228 = "就算材料各不相同（２）"
3821896350 = "老師再次找千紗進行諮詢。老師將至今發生的事告訴千紗，千紗得知自己過去不好的歷史被大家知道後，感到十分絕望。"
697992102 = "放學後的甜點團？（１）"
25590586 = "放學後的甜點部的所有人得知了千紗曾經是太妹的事實。將名稱改成「放學後的甜點團」後裝成太妹（？）的樣子出現在千紗的面前。看見這模樣的澪紗說「凱茜．帕魯格」想策劃並復活新的組織，並和放學後的甜點團展開激烈的戰鬥。"
3920525389 = "放學後的甜點團？（２）"
3506014961 = "敗給放學後的甜點團後昏厥的澪紗。千紗向大家說太妹是想要遺忘的記憶，並希望大家以後都可以裝作不知道這件事。澪紗在聽到所有故事後，便默默地離場了。"
2905518164 = "想要忘記的過去（１）"
3687706864 = "老師找來了澪紗。澪紗說理解了千紗的狀況，並表示不會再煩擾千紗了。那時太妹們來找澪紗，要她說出凱茜．帕魯格的真面目。"
3914779207 = "想要忘記的過去（２）"
3963225956 = "澪紗和老師一起擊退了太妹。關於太妹們聽到千紗要建立新組織的傳聞一事，澪紗覺得自己有很大的責任。澪紗決心要守護「平凡的」千紗，並將挑戰書交給老師，並和衝上來的太妹展開戰鬥。"
2675913389 = "我討厭熱血又吵鬧的笨蛋（１）"
4274647011 = "老師將澪紗的挑戰書轉交給千紗。千紗一方面覺得鬆了口氣，但又覺得有點不放心，就向老師詢問了澪紗的行蹤。"
4266006947 = "我討厭熱血又吵鬧的笨蛋（２）"
1092601913 = "千紗和老師為了尋找澪紗而到了太妹們所在的地方。老師找來的放學後的甜點團也在那裡會合，一起衝進去救出澪紗。"
3566887939 = "我們是「放學後的甜點團」（１）"
3175463900 = "陷入絕境的澪紗。在危機的瞬間，凱茜．帕魯格和放學後的甜點團的四天王救出了澪紗。"
854792900 = "我們是「放學後的甜點團」（２）"
1330585549 = "救出澪紗後逃跑的放學後的甜點團。千紗將挑戰書還給了昏厥的澪紗。等一切狀況都整理好之後，老師決定請所有辛苦熬夜的人吃甜點。"
544026336 = "被封印的魔獸……（１）"
8928475 = "事情解決後，變得輕鬆許多的千紗告訴老師自己為什麼不再當太妹的理由。講出一切的千紗似乎領悟了什麼就結束了諮詢。"
3396719460 = "被封印的魔獸……（２）"
3260678421 = "放學後的甜點部的部室跟以前沒有什麼兩樣。比較晚到的老師和千紗發現了待在部室的澪紗。從放學後的甜點團那裡聽說凱茜．帕魯格的英雄事蹟後，燃起鬥志的澪紗又再次向千紗提出挑戰。"
1330006888 = "ON YOUR MARK @ MILLENNIUM"
3761109965 = "距離奇普托斯大運動會「晄輪大祭」的開幕儀式只剩一天。千年的學生們能克服意料之外的事故，順利完成大運動會的準備嗎？"
