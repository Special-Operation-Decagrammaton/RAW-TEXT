1541422275 = "Head Prefect Hina, when the Pandemonium Society made the ridiculous request, I was so concerned about what would happen...\n\nBut seeing you work so hard made me realize that now was not the time for me to worry.\n\nI will cheer you on as the senior administrator of the Prefect Team. So please give your best performance, Head Prefect!"
1570765118 = "We've heard the rumors!\n\nThe ghostly head prefect has donned a beautiful dress for a once-in-a-lifetime piano performance. Who would've thought? It's a gourmet feast for the senses!\n\nWe'll be waiting with eager anticipation for the big day. Hahahaha! Best of luck!"
2407965685 = "I've heard the news. You'll be performing a piano piece for the Gehenna Party, yes?\n\nIt must be such a bother, having to accommodate the Pandemonium Society's whims like this. Juri and I are rooting for you and an excellent performance.\n\nYou can do it, Head Prefect!"
2286376939 = "Hey, hey, Head Prefect!\n\nI heard you're putting on a huge performance or something, right? That sounds almost as important as some good old hot springs development!\n\nWe're all gonna come cheer you on, so hang in there!"
978447002 = "Head Prefect Hina!\n\nWe know you've taught us to uphold unbiased justice as Prefect Team members who represent Gehenna's traditions, but we're all here for you!\n\nThe Prefect Team will always be on your side! We hope you hear us cheering on your performance!"
659199751 = "Are you suffering from any maladies ahead of your performance, Head Prefect?\n\nI am at your service if you feel even the slightest symptom. It is my duty to provide the highest care for not only you, but our Prefect Team members as well.\n\nAnd...know that I'm rooting for you. Stay strong."
981979352 = "Hina, Hina!\n\nIbuki is so super excited for your piano performance! And nervous!\n\nIbuki is gonna scream her head off for you! Heeheehee!"
1958821606 = "Mizz Hina! I'll be cheering extra loud for you!\n\nOmigosh, we're all just so psyched to see your debut! It's gonna be sooo mind-blowing.\n\nOh, I know! I'll record the whole thing for you, okay? You've got this!"
4025554739 = "It sounds like a drag dealing with the Pandemonium Society's orders, Head Prefect!\n\nI wish there was something I could do to help, but... Wait, wait! I've got it!\n\nIf anyone tries any funny business related to your performance, I'll handle it for you! That way, you can just focus on playing, Head Prefect!"
2710967621 = "The Gehenna Party may be a bigger event than we're used to, but it's still business as usual.\n\nWe'll ensure no one gets hurt in the flurry of activity and triage even the smallest of injuries.\n\nAs long as that's under control, our only other task will be cheering you on. Don't lose heart, Head Prefect!"
