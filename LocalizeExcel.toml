3109022376 = "為了少女們的垂憐經（２）"
1925570620 = "貝雅特里榭對響徹巴西利卡聖所的慈悲頌感到很驚慌。聽到了慈悲頌，甚至連白芭蕾那些屬於自己的兵力都不過來，讓貝雅特里榭十分憤怒，並打算將沙織作為祭物獻上。"
294127303 = "為了少女們的垂憐經（２）"
1887669411 = "貝雅特里榭最後輸給了奧利斯小隊和老師並倒下。奧利斯小隊則是救出了從貝雅特里榭的儀式中被解放的敦子。那時，身為蓋瑪特利亞一員的戈爾孔特出現，將貝雅特里榭帶走後就消失了。"
1335977955 = "重要之人"
3404775232 = "成功救出敦子的沙織跟老師說，自己會付出所有的代價。但是老師卻說自己沒有審判學生的權利就離開了。另外，彌香對抗著白芭蕾和聖徒會，但終究還是到了極限，並打算繼續戰鬥下去。但那時老師突然地現身，讓彌香嚇了一跳。老師對白芭蕾和聖徒會十分憤怒，並拿出了大人的卡片。"
960412593 = "重要之人"
2369141067 = "在奧利斯學生因為聯絡不上貝雅特里榭而感到慌張的時候，三一學生突然從地下墓穴出現了。"
3408302799 = "今後的我們"
2937481946 = "在老師和彌香去奧利斯戰鬥的時候，三一的其他學生都合力在尋找他們兩人。"
1220533937 = "尾聲"
448684912 = "離開奧利斯自治區的奧利斯小隊得知沙織突然消失的事情。但他們沒有為此動搖，而是各自堅定決心並繼續向前。另外，在結束一連串事件的三一，則是開了彌香的聽證會。"
2575418392 = "不受控的特殊部隊"
22033557 = "收到琳的召喚而來到聯邦學生會的老師，聽到本應被封鎖的SRT學園的學生占據公園發動示威的消息。由於女武神警察學園的學生也敗下陣來，只好由夏萊的老師幫忙解決。"
3594487595 = "不速之客"
3574761045 = "老師接受琳的請求抵達公園，而率先抵達的女武神警察學園公安局長環奈則向老師說明情況。佔據公園的是SRT特殊學園的「RABBIT小隊」。老師與生活安全局的吹雪和桐乃一起出面處理。"
269659944 = "不速之客"
3399601485 = "沉浸在勝利的喜悅而放鬆戒心的RABBIT小隊隊員們，被老師的作戰攻擊而戰敗，並全數被逮捕。"
3925139788 = "各自的情況"
