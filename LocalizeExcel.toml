3065827640 = "새해가 코앞으로 다가온 어느 날 밤. 흥신소 멤버들은 새해를 맞이하여, 새해 첫 소원을 빌기 위해 다 같이 새해맞이 행사장을 찾기로 결심한다."
2222583121 = "새해맞이 행사장에서"
349816101 = "새해맞이 행사장을 찾은 흥신소 멤버들은 선생님과 만나 함께 소원을 빌기 위해 행사장 내부로 향한다. 새전함 앞에서 모두 다 같이 소원을 빌던 그때 카이텐져가 습격해온다."
1548857717 = "혼란은 언제나 느닷없이"
78140412 = "갑작스러운 카이텐져의 등장에 당황한 흥신소 멤버들. 아차 하던 사이, 카이텐져는 느닷없이 새전함을 탈취하여 도주하기 시작한다. 이대로 빼앗길 수 없다고 판단한 흥신소 멤버들과 선생님은 카이텐져를 쫓기 시작한다."
2724683777 = "엉망진창 추격전 개시! 1"
136523753 = "카이텐져 멤버를 쫓아 추격을 개시한 흥신소 멤버들. 하지만 어째선지 난데없이 헬멧단이 나타나 자기들도 새전함을 노리고 있다며 흥신소를 습격해온다."
3903699213 = "엉망진창 추격전 개시! 2"
2859412133 = "헬멧단을 쓰러트려 야욕을 꺾는 데 성공한 흥신소 멤버들, 어째서 갑자기 헬멧단이 새전함을 노린 건지 의아해하며, 다시금 카이텐져의 추격을 재개한다."
729440909 = "몰려드는 방해꾼들 1"
350982557 = "추격 도중, 이제는 불량배에 헬멧단, 용역 아르바이트생까지 합심해서 새전함을 쫓고 있던 흥신소 멤버들에게 달려든다."
2755401990 = "몰려드는 방해꾼들 2"
3528072125 = "무언가 상황이 이상하게 돌아간다고 느낀 흥신소 멤버들과 세리카. 뒤늦게 새전함을 되찾은 자가 내용물을 모두 갖는 탐욕의 레이스가 시작되었다는 걸 알게 된다. 더더욱 새전함을 빼앗길 수 없다는 의지를 불태우며 흥신소 멤버들은 추격을 재개한다."
2205291367 = "선도부까지?! 1"
1888035674 = "카이텐져를 추격하던 도중, 이번엔 선도부와 이오리가 흥신소의 앞을 가로막는다. 이오리는 새전함을 노리는 자들을 모두 문제아로 규정하고, 선도부의 업무 집행을 방해하는 녀석들은 용서할 수 없다며 흥신소 멤버들과 전투를 벌인다."
2183154251 = "선도부까지?! 2"
2198410486 = "접전 끝에, 선생님은 이오리가 오해하는 거라며 새전함을 되찾는 이유를 설명한다. 아코가 이오리를 질책하는 한편, 이번 사태의 흑막은 검은거북파라는 조직이며, 이번 일은 선도부가 알아서 해결할 테니 선생님과 흥신소에겐 물러나라고 말한다."
4010527531 = "되찾아야 하는 이유"
3968629623 = "선도부의 경고에도 불구하고 아루는 흥신소 멤버들의 꿈과 소원과 돈이 걸려 있는 새전함을 포기할 수 없다고 선언한다. 그 말에 흥신소 멤버와 세리카는 아루를 끝까지 돕기로 하고, 마침내 블랙마켓에서 카이텐져를 따라잡는 데 성공한다."
3598038673 = "위기일발! 1"
409425870 = "마침내 카이텐져를 쓰러트리는 데 성공한 흥신소 멤버들과 세리카. 이제 모두 끝났다고 생각하던 그때, 대길전의 관리인 카메지마 고로가 나타나 이 모든 일의 흑막이 자신임을 밝히며 흥신소에게 덤벼든다."
569618432 = "위기일발! 2"
653310391 = "검은거북파 조원들의 압도적인 물량 앞에 점점 밀리기 시작하는 흥신소 멤버들과 세리카. 결국 흥신소 멤버들이 쓰러지고 새전함마저 빼앗기며 위기에 처한 바로 순간 대책위원회의 멤버들이 등장해 도와준다."
3680934526 = "대책위원회 집결!"
4177381587 = "대책위원회의 합류로 전황을 역전시키는 데 성공한 흥신소 멤버들. 모두가 힘을 합쳐 검은거북파에게 되갚아주기 위해 다시금 새해맞이 행사장으로 향한다."
3434302330 = "반격 개시!"
1459348410 = "새전함이 가짜라는 소식을 퍼뜨리는 것을 시작으로, 흥신소 멤버들과 대책위원회는 검은거북파에게 반격을 개시한다."
685949528 = "대길전 공방전 1"
2152576060 = "다시 카메지마 고로와 마주한 흥신소 멤버들. 선도부와 대책위원회의 도움을 받아 검은거북파의 보스, 카메지마 고로와 마지막 결전을 벌인다."
121004998 = "대길전 공방전 2"
2286166571 = "마침내 검은거북파를 쓰러트리고 새전함까지 되찾은 흥신소 멤버들. 소동이 정리되자 대책위원회는 먼저 돌아가고, 흥신소 멤버들도 새전함을 원래대로 되돌려놓으려고 한다. 그런데 정작 새전함의 내용물이 텅 비어있다는 걸 알고 당황하던 사이, 카이텐져가 나타난다."
3697449286 = "최후의 결전이다! 카이텐져! 1"
151256718 = "탈취한 새전함의 내용물로 KAITEN FX MK.1를 만드는 데 성공했다고 말하는 카이텐져. 각자의 마음이 담긴 소중한 돈이 엉뚱한 데 들어간 것을 알고 분노한 아루를 필두로 카이텐져와 최후의 결전이 벌어진다."
1278198911 = "최후의 결전이다! 카이텐져! 2"
755111408 = "전투해서 패배하긴 했지만 카이텐져는 여전히 투지를 불태우며 퇴장한다. 결국 새전이 몽땅 날아가 버렸다는 사실에 아루가 망연자실해 하며, 그렇게 새해 대소동은 마무리가 된다."
801389629 = "다 함께 새해 소원을 1"
4014731644 = "검은거북파의 악행이 드러나고 조직원은 뿔뿔이 흩어졌지만, 여전히 새전함에 미련을 가진 문제아들이 난동을 피워 어쩔 수 없이 뒷정리를 시작한다."
2841804487 = "다 함께 새해 소원을 2"
3280902185 = "세리카는 아르바이트비를 받지 못했고, 흥신소 멤버들에게는 빈 새전함만 남게 되었지만. 후련한 마음으로 흥신소 멤버들은 새롭게 소원을 빌고, 가벼운 발걸음으로 다 같이 선생님과 함께 밥을 먹으러 간다."
