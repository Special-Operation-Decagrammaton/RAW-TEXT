3961742797 = "委員會的苦衷"
2472112227 = "老師聽說阿拜多斯高中欠下的債務超過9億元，僅靠學生的力量，光是償還利息就喘不過氣。老師雖想幫忙學生，但是茜香卻生氣地表示自己信不過大人。"
3061964608 = "茜香平凡的一天"
