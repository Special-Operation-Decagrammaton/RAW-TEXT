2188950162 = "以物易物"
1844122045 = "RABBIT小隊的補給負責人萌雖然想要販賣泡了水的裝備給「凱薩工業」，卻得知了武器全都銷售一空的消息。"
1905614692 = "小而確實的敗北"
3583459890 = "透過匿名的買家賣出所有的生鏽裝備，並購入新裝備的RABBIT小隊。那時候，笛卡爾現身傳達消息說，女武神公安局正以新武器武裝，驅逐附近的遊民。話都還沒說完，環奈就出現在公園裡。"
3162953850 = "回扣"
251338756 = "環奈說現在公安局正以比SRT更強的武器進行武裝，如果遊民不在月底前離開公園就會強行驅逐。老師察覺公安局的武器是由「凱薩工業」提供，並說公安局和凱薩集團之間應該有非法回扣。RABBIT小隊的學生為了調查公安局的違法行為，決定潛入女武神警察學校。"
