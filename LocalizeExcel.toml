2200941612 = "RABBIT小隊成員們未能在探訪調查中得到什麼特別的線索。就在小隊成員們討論村子裡流傳的不祥傳聞的時候，出現了某個出乎意料的情報提供者。"
2989058466 = "徬徨於黑暗之人"
723669717 = "RABBIT小隊成員們為了親眼確認夜戶浦村的不可思議祕密，展開夜間作戰。"
1997896967 = "未知的恐懼"
284854068 = "在老師的介入之下，RABBIT小隊成員們和夜戶浦村村民們間的交戰才勉強打住。小隊成員們後知後覺地發現，自己因為偏見和恐懼而對村民們有所誤解。"
4197412946 = "迷霧消散的天空"
4182046529 = "在一夜的騷動過後，RABBIT小隊成員們運用各自的方式幫助村民們，逐漸消除村民們的戒心。"
