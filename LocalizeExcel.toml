1008442379 = "새해를 앞두고 평소처럼 게임에 몰두하고 있는 마키, 코타마, 하레. 부원들이 연락을 받지 않자 부실에 직접 찾아온 치히로는 부원들이 나태한 생활을 보내고 있는 것을 보고 화를 내며, 이번 연말에는 해돋이를 보러 가자며 일정을 잡는다."
2288954300 = "뜻밖의 캠핑"
1822713070 = "내키지 않는 발을 이끌고 밀레니엄 학원 앞에 모인 마키 일행. 그곳에서 치히로가 야외에서 캠핑을 할 예정이라고 말하자 일행은 당황해한다. 치히로는 부원들의 소지품 검사를 시작하는데…… 캠핑과는 상관없는 뜻밖의 물건들이 소지품에서 나오기 시작한다."
459676073 = "텐트 설치"
3757493316 = "캠핑장에 도착한 베리타스 멤버들. 의욕적인 치히로와는 달리 베리타스 멤버들은 간만의 야외 활동에 힘들어한다. 텐트를 설치한 후, 멤버들은 자유 시간을 즐기러 모두 흩어지고, 치히로는 선생님과 함께 독서를 시작한다."
2908823739 = "지루함은 해커를 죽인다"
1350246685 = "시간이 흘러도 부원들이 돌아오지 않자 치히로와 선생님은 부원들을 찾기 위해 나선다. 근처를 살펴보던 중 선생님과 치히로는 카페인 금단 증상에 시달리던 하레와 마주친다. 하레에게 커피를 나누어준 뒤, 마키의 행방을 들은 선생님과 치히로는 그녀의 뒤를 쫓아 동굴로 향한다. 마키는 그곳에서 거대한 예술 작품을 그리고 있었는데……"
3004230193 = "곰과 함께 춤을"
296992172 = "한편, 숲속 깊은 곳에서 환경음을 녹음하던 코타마는 겨울 특훈을 온 트레이닝부 부원들과 마주친다. 트레이닝부 부원들과 야외에서 즐기는 체험의 가치에 대해 이야기하던 중, 치히로는 동면 직전의 곰과 마주칠지도 모른다고 주의를 주고…… 그때, 진짜 야생 곰이 나타난다."
2436736275 = "저녁 준비"
4265253392 = "캠핑장에 돌아온 베리타스 멤버들은 조금 이른 저녁 준비를 시작한다. 치히로가 불을 피우는 동안 마키와 코타마, 하레는 서투른 솜씨로 식재료를 다듬는다."
3998368874 = "영혼을 위한 닭고기 전골"
1256703657 = "부원들을 위해 닭고기 전골을 준비한 치히로. 베리타스 멤버들은 손질한 식재료를 더해가며 즐겁게 전골을 나누어 먹는다. 식사를 마친 뒤, 모닥불 앞에서 시간을 보내던 선생님은 하레와 코타마로부터 캠핑에 대한 솔직한 감상을 듣는다."
2460462864 = "첫 풍경 1"
452463543 = "다음 날 새벽, 해돋이를 보기 위해 일찍 일어난 선생님과 베리타스 부원들은 어둠을 헤치며 등산을 시작한다. 등산을 하던 도중 마주친 스미레는 날이 흐려서 오늘은 일출을 보기 어려울지도 모른다고 말하지만, 부원들은 평소와는 달리 의욕을 내며 정상까지 오르겠다고 말한다. 정상에 도착한 일행은 마침내 아름다운 해돋이를 보게 된다."
60697301 = "첫 풍경 2"
1996295661 = "해돋이를 보고 돌아온 베리타스 부원들은 캠프 주위에 모인 다수의 기자들을 발견한다. 알고 보니 마키가 동굴에 그린 벽화가 새로운 고대 벽화로 오인되어 기자들이 몰려든 것. 선생님과 치히로는 이 소동을 정리하느라 한동안 애를 먹는다."
1007585985 = "작심삼일"
