2278831421 = "달콤하게"
205941879 = "논 알코올 칵테일을 만드는 취미가 생겼다며 선생님을 찾아온 시구레. 시구레는 선생님에게 평소의 감사를 담아 <시구레 비터 스페셜>을 대접한다."
367149864 = "조금 특별한 구호용품"
