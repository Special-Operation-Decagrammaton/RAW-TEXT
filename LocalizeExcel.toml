301716970 = "유치장에 갇힌 요시미, 나츠, 카즈사는 아이리와 선생님이 도착하자, 고생 끝에 마련한 셈라 조각을 아이리에게 선물한다. 이 장면을 목격한 츠무기는 청춘의 모습에 감명받아 선생님께 자신이 작곡한 곡을 전달한다."
