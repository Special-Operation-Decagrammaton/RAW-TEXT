1342885926 = "테르마이 아카이 2"
3701930055 = "노도카와 시구레는 적합한 목욕 시설을 찾기 위해, 게헨나와 트리니티, 백귀야행 학원을 돌아다닌다."
3227194453 = "테르마이 아카이 3"
1818357385 = "어느곳에서도 마음에 드는 시설을 발견하지 못한 노도카와 시구레는, 마지막으로 밀레니엄 학원의 목욕 시설을 구경한다."
1746358612 = "키라라와 에리카의 반짝반짝한 하루 1"
