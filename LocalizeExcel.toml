208502467 = "닌자, 습격해오다!"
752075220 = "어느 날 갑자기 인법연구부 멤버들이 샬레의 선생님을 찾아온다. 인법연구부가 정식 동아리가 될 수 있도록 선생님이 협력해 주었으면 한다면서, 미치루가 미인계 등으로 선생님을 곤혹스럽게 만드는 그때. 마침 음양부의 카호가 샬레를 찾아온다."
3066356973 = "교류회의 시작"
2027758856 = "백귀야행과 게헨나 학원 사이에 교류회가 열리게 되었다. 만약을 위해 그 교류회를 도와줬으면 한다는 음양부 부장 니야의 말에, 선생님은 인법연구부를 정식 동아리로 인정해 줄 것을 조건으로 내걸고는, 미치루, 츠쿠요, 이즈나와 함께 교류회를 돕기로 한다."
2113642855 = "커다란 소녀 1"
1841957901 = "교류회를 돕기 위해 <와라쿠 공주님>의 공연 준비를 시작한 인법연구부 멤버들. 그러던 도중 불량배에게 붙들리게 된 츠쿠요를 선생님이 도와준다."
2793185007 = "커다란 소녀 2"
4010253238 = "불량배를 쓰러트린 뒤 조금은 마음을 열게 된 츠쿠요는 선생님에게 품고 있던 자신의 속마음을 이야기해 준다. 그렇게 여러 이야기를 나누는 사이 <와라쿠 공주님>의 공연이 코앞으로 다가왔다."
3738792413 = "닌자라고 하면 공주님? 1"
1915451082 = "이번 교류회의 꽃인 <와라쿠 공주님>의 공연 시작 전, 현장에 나타난 건 원래 공연의 주역인 치세가 아니라 만마전의 이부키였다. 교류회를 위해 바뀌었다는 말에 모두가 어쩔 수 없이 납득한 그때. 갑작스럽게 망량즈가 습격해온다."
341953329 = "닌자라고 하면 공주님? 2"
2863619002 = "공연의 주역인 이부키가 망량즈에게 납치당하며 교류회는 파탄이 날 위기에 봉착한다. 그걸 막기 위해 선생님과 인법연구부, 그리고 이로하는 이부키를 되찾기 위해 움직이기 시작한다."
1421697779 = "첫 번째 관문: 간판 아가씨와 경호원 1"
2447682703 = "이부키를 되찾기 위해 망량즈를 쫓는 선생님과 인법연구부, 그리고 이로하. 하지만 그때 자신들을 공연의 첫 번째 수문장이라고 주장하는 마츠리운영관리부가 모두의 앞을 막아선다."
91366382 = "첫 번째 관문: 간판 아가씨와 경호원 2"
3098904965 = "무사히 마츠리운영관리부를 쓰러트리면서 시련을 통과하는 데 성공한 선생님, 인법연구부, 이로하는 또다시 망량즈를 쫓기 시작한다."
1264601568 = "두 번째 관문: 잠자는 공주 1"
3751057018 = "여전히 선생님과 인법연구부, 이로하가 망량즈를 쫓던 중에 이번엔 두 번째 수문장인 잠자는 공주 츠바키가 모두의 앞을 막아선다."
3802744135 = "두 번째 관문: 잠자는 공주 2"
3871679676 = "츠바키의 시련까지 무사히 통과하는 데 성공한 모두는 뒤이어 다시금 망량즈를 쫓기 시작한다."
1483782816 = "세 번째 관문: 독심술사 1"
1022129588 = "계속해서 망량즈를 쫓는 선생님과 인법연구부, 이로하의 앞을 이번엔 세 번째 수문장이자, 자신을 자칭 독심술사라고 소개하는 미모리가 막아선다."
2959155984 = "세 번째 관문: 독심술사 2"
2380076631 = "기상천외한 방법으로 미모리의 시련도 통과하는 데 성공해낸 인법연구부. 그때 조급해하는 미치루를 위해 미모리는 한 마디의 말을 건네지만, 그 진의를 곱씹기도 전에 멤버들은 다시금 망량즈를 쫓기 시작한다."
96021509 = "네 번째 관문: 트릭 하우스 1"
1037879827 = "인법연구부를 마지막으로 가로막은 건, 카에데가 수문장으로 있는 트릭 하우스의 시련이었다. 모두가 합심하여 시련에 임하려는 그때. 다급한 마음에 먼저 움직여 버린 미치루는 선생님과 함께 트릭 하우스의 함정에 휘말리게 된다."
2449070470 = "네 번째 관문: 트릭 하우스 2"
1750066922 = "선생님과 협력하여 트릭 하우스를 빠져나오는 데 성공한 미치루는 그렇게 인법연구부 멤버들과 함께 시련을 통과하지만, 바로 그때 모든 상태를 파악한 카호가 등장한다."
1535946624 = "정말로 우리 앞을 가로막는 것은 1"
939985143 = "상황이 이렇게 되어버린 것에 카호는 음양부가 사건을 맡겠다 선언하고, 거기에 미치루가 납득하려는 순간. 츠쿠요와 이즈나는 이부키를 구하겠다고 약속한 건 인법연구부라며 싸울 것을 결의한다."
1915078740 = "정말로 우리 앞을 가로막는 것은 2"
4144075858 = "선생님의 도움으로 인법연구부는 가로막는 카호를 쓰러트리는 데 성공하지만, 여전히 망설이는 미치루에게 츠쿠요는 함께 이부키를 구하자고 외친다. 그리고 바로 그때 이로하와 카에데가 탱크를 끌고 나타난다."
349304540 = "닌자의 철칙 1"
713270559 = "인법연구부의 추격을 따돌리기 위해 망량즈는 다리를 무너트리는 초강수를 쓰고야 만다. 모두가 당황한 그때 이로하는 다리를 뛰어넘기 위해, 탱크를 이끌고 모두와 함께 무너진 다리 위로 돌격한다."
3316953760 = "닌자의 철칙 2"
3896826306 = "마침내 미치루는 망량즈를 궁지에 모는 데 성공하지만, 이제까지 등을 떠밀리듯 왔을 뿐인 자신이 무얼 할 수 있겠냐며 망설인다. 하지만 이부키가 줄곧 인법연구부를 기다리고 있었단 사실을 알게 된 미치루는 과감하게 달려들어 이부키를 구해낸다."
457811177 = "축제가 끝난 뒤에"
1596447159 = "교류회를 무사히 끝마친 뒤, 모든 것은 원래 자리로 돌아갔다. 마지막으로 선생님 앞에 나타난 니야가 이번 일은 전부 선생님의 실력을 보고 싶어 꾸민 일이라며 흑막임을 고백하자, 선생님은 주저 없이 니야를 호되게 야단친다."
784454923 = "아비도스 리조트 복구 대책위원회"
1941527097 = "생각지도 않게 무인도 리조트로 휴가를 떠나게 된 대책위원회.\n그렇지만 그들을 기다리고 있던 건 폐허가 된 리조트와 헬멧단의 습격, 그리고 와카모였다! 과연 대책위원회는 제대로 된 여름휴가를 보낼 수 있을 것인가!"
