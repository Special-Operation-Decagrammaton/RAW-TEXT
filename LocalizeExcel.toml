258414054 = "友達から聞いた話なんだけど……マジだったらヤバすぎる都市伝説。\n港の近くにある消費者金融が、借金を返さないヤツにヤバい拷問をするんだって――「ドラム缶ガニ」っていう拷問らしいんだけど。"
2946576035 = "ドラム缶の中に人を入れて、後からカニをたくさん入れるんだって……お腹が空いたカニは中の人をたべちゃうんだとか。一部の業者が使ってる方法らしいんだけど……怖くない？"
620464260 = "え、怖……てか、どうやってその話聞いたの？関係者とか？幽霊に聞いたなんて言わないよね？"
3927824555 = "似たような話聞いたことある。多重債務に悩んでた人が港で行方不明になったって記事……最近多くない？気のせい？"
4092725241 = "信じるか信じないかはご自由に。後から後悔するのはそっちだし。"
2791299244 = "カニ味の魚肉ソーセージのこと「スナイパーのおやつ」とか言ってるやつ誰だよ？\n魚肉ソーセージとかどう考えてもハードボイルドとは真逆だろ。冷酷に淡々と任務を遂行するスナイパーなら生魚の方がそれっぽくない？"
3212941527 = "あの、ハードボイルドは「完熟」という意味ですが。"
3967235797 = "ドラム缶ガニの話、なんか妙にリアルだよね。私も昔カニ食べる時に手切っちゃったことあるけど、あれが全身にって思うと……想像しただけでゾワゾワする。"
2155647036 = "カニのハサミって固くて食べづらいよね。関節に切れ目を入れるといいよ。"
1432595114 = "分かる。蒸したあとに冷水にくぐらせとくと、剥きやすくなるよ。ゆで卵と同じ原理！"
