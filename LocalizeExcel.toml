3133093112 = "為了和紫一起在百鬼夜行商店街共度時光，老師前往約定的地點，與已經在那裡等候老師的紫碰面。"
1618618962 = "青春的師父"
2730442199 = "老師應蓮華的委託前去拜訪百花繚亂。老師在那裡接受了蓮華想進行「青春活動」的諮詢。在經過一番交談後，老師和蓮華成為了「青春師徒關係」。"
2356886607 = "青春的定番：轉學生"
3406357501 = "蓮華向老師提議進行轉學生活動作為「青春活動」的一環。然而，事情並未如他所願。就在蓮華好不容易準備的活動要變得一團糟時，老師請蓮華將他當成是轉學生，向老師介紹周邊的環境。"
1544493195 = "青春的定番：青梅竹馬"
3623899194 = "某天早晨，蓮華突襲了老師，提議進行青梅竹馬活動作為「青春活動」的一環。就在「青春活動」要圓滿落幕之際，老師說這一系列的活動就像在約會一樣，蓮華聽了後不知所措，落荒而逃。"
3348684246 = "懷著對青春的感謝"
1912112273 = "忙著處理工作，連飯都忘了吃的老師，在配合蓮華的「青春活動」時昏倒了。蓮華認為這都是自己導致的，隔天親手製作便當送給為自己付出心力的老師。"
645991912 = "青春的白色緞帶"
1111293954 = "蓮華收到了老師贈送的白色緞帶，就像青春小說的主角一樣。兩人共享屬於彼此的青春時光"
4231253403 = "守護宅邸的貓"
3314480634 = "老師在桔梗的呼喚下前去拜訪百花繚亂，發現建築物的四處非常的破舊。儘管桔梗表示不用操心，老師仍表示要親自修理。桔梗雖然嘴上說不會幫忙，但看到老師依然故我地著手修理，最終還是出手幫忙，並請老師吃晚餐作為回報。"
2471480039 = "果斷"
3763484608 = "桔梗拜訪了夏萊，表示想要報答上次幫忙修復百花繚亂建築物一事。當桔梗說願意做任何事來償還上次的人情時，老師說希望桔梗可以好好休息。桔梗聽完後感到不知所措，但為了遵守自己的承諾，最終決定休息一下。"
3365191938 = "不想顯露的模樣"
4099866023 = "為了夏萊的工作，老師帶著受過桔梗幫助的人的謝禮前去拜訪百鬼夜行的百花繚亂。在那裡，老師發現了昏倒在地的桔梗。儘管桔梗說不想向他人展露自己脆弱的一面，老師仍悉心照顧他，叮囑說適時的休息是必須的，並將居民們送的禮物交給了桔梗。"
375291297 = "敞開心扉"
810913540 = "老師接到了桔梗的聯繫，表示想報答上次的事，於是來到了百花繚亂的倉庫。一進倉庫內，就看到桔梗在那裡迎接自己。"
2188741523 = "時尚特訓"
2709052074 = "英美前來拜訪老師，說要進行時尚特訓。在確認了英美與眾不同的時尚品味後，答應與他一起去挑泳裝。"
3737979995 = "時尚實戰"
2681531124 = "到了和英美約好一起去挑選泳裝的當天，才知道英美想穿泳裝去的地方是冰海。老師為英美準備了防寒用品，英美便因此創造出了非比尋常的時尚造型：將夾克穿在泳裝外。"
3806087283 = "作戰準備"
4246151599 = "老師來到特異現象搜查部。英美身穿泳裝和夾克，正在製作自己專屬的風扇。"
2234223693 = "冷水浴"
3146169999 = "收到英美的聯絡後，老師出於好奇前往現場。在那裡，老師看到英美在冰面上鑽了個洞，享受著冷水浴。"
228855696 = "隱密的健行"
2565918406 = "老師在登山口遇見了帶著錄音機的小玉。小玉為自己為何帶著錄音機辯解了一番，老師於是向小玉提議一起登山。才剛開始登山沒多久，小玉就累了，老師便伸手拉他一把。當兩人的手觸碰在一起時，小玉驀然想起自己以前說過的話，感到害羞不已。"
3369167674 = "天籟之音（１）"
2380232793 = "老師為了登山再度來到山裡，又遇見了拿著錄音機的小玉。小玉一邊說自己是為了錄營火聲而來，一邊千方百計想點燃營火。但最終還是以失敗告終，只好向老師尋求協助。"
3281512578 = "天籟之音（２）"
2625303492 = "小玉反省著上次的失敗，陷入了苦惱之中。小玉毫無準備就上山，打算錄製最純粹的自然之音。不久後，小玉發現了一棵高聳的古樹，側耳傾聽古樹內傳來的聲音。"
2980225488 = "回音"
1001482326 = "小玉試著和老師一起登上山頂。歷經千辛萬苦，兩人終於攀上頂峰，老師向對面的山頭大聲呼喊。當小玉聽到回音時，說出了自己對回音的感想。"
2146835391 = "數位遊牧民"
886315080 = "收到晴的聯絡後，老師前往近郊的公園。在那裡，晴正在架設各種設備，便於像數位遊牧民一樣在戶外工作。做好萬全準備後，晴便開始工作，但很快就顯露出在戶外工作的不便之處。"
3941496298 = "Glamping"
1758508230 = "為了夏萊的工作，老師久違地拜訪了貝里塔斯的部室。不知為何，貝里塔斯部室的冷氣開得很強，冷得讓人直打哆嗦。晴表示是為了測試伺服器才把冷氣開這麼強。為了躲避冷氣的寒風，只好躲進露營設備裡，開始慵懶的豪華露營。"
3942846821 = "世界最大的伺服器"
2015698466 = "晴在維護系統時收到了來自匿名駭客的挑戰書。當得知挑戰書上記載的座標是「世界最大的伺服器」時，晴與老師開始向該座標攀登。抵達目的地後，晴發覺那裡是一座關閉的天文台，兩人一邊眺望天上的星星，一邊送出親切的問候。"
3682214390 = "無咖啡因"
1655277294 = "為了戒掉咖啡因，晴決定到沒有便利商店跟冰箱的戶外工作。然而，晴很快就出現咖啡戒斷症狀，老師於是親自沖咖啡給晴喝。在喝完咖啡鎮定下來後，晴這才得知剛剛喝的其實是無咖啡因咖啡，感到非常震驚。"
850398333 = "萬魔殿的偉大議長！"
3031741265 = "老師因為收到真琴的邀請而來到萬魔殿。真琴勸誘老師和萬魔殿攜手合作，老師拒絕了真琴的提案。"
4070412729 = "偉大議長的事業"
1791984264 = "為了展現萬魔殿的真正價值，真琴來到了夏萊。老師被真琴拖去參觀印刷廠、渡假村等，一起完成了一趟萬魔殿旗下產業巡禮。雖然在商店街發生短暫衝突，但真琴以出色的手段化解問題，展現了議長的風範。"
3478178877 = "偉大議長的休閒"
4007523766 = "老師在購物中心遇見來買給獅子丸吃的點心的真琴。老師帶著突然倒下的真琴前往醫院後，醫師診斷真琴對貓過敏。但是真琴還是宣示會繼續照顧獅子丸到最後。"
1780717963 = "偉大議長的日常"
1041879085 = "與此同時，真琴也展示了萬魔殿推動的事業成果。不過，所有的營業場所都發生了問題，面臨蒙受巨大損失的危機。真琴因為席捲而來的衝擊陷入短暫的動搖，但並未屈服於困境，隨後一一解決了困難。"
1474073232 = "總之不能輸！"
3557545465 = "老師在接到亞子的聯絡後到來，聽亞子抱怨關於萬魔殿的事。最後亞子表示自己絕對不能輸，拜託老師跟自己一起挑選禮服。亞子看到老師挑選的禮服之後顯得驚慌失措，丟下「老師果然是穢亂風紀的人」這句話之後便匆匆離去。"
3679592377 = "總之要退貨！"
2522776615 = "兩人一起挑選禮服的過程中，亞子聽到老師對自己禮服造型的讚美，害羞得不知如何是好。隨後亞子接到萬魔殿引發騷動的消息後便連忙離開了，老師只好代為挑選禮服，並在店員的推薦下，連搭配的內衣也一起買了。"
2124286988 = "總之就這樣做吧！"
2646682580 = "面對即將到來的派對，亞子為了做好事前準備，和老師一起參加聯誼會。老師親自護送不習慣穿禮服的亞子，但很快就發生了禮服破裂的不幸事件。"
2761186677 = "跟伊吹一起玩遊戲！"
2632442291 = "伊吹為了值日生活動而來到夏萊。雖然想要專心協助老師的工作，但注意力還是被遊戲機和玩具拉走了。最後老師決定和伊吹一起玩。"
1254725189 = "跟伊吹一起去郊遊！"
3516138625 = "伊吹和老師約定好一起去公園。為了郊遊精心準備了便當，可惜翌日下起了雨。老師為了安慰垂頭喪氣的伊吹，宣布夏萊就是遊樂園，和伊吹度過了開心的一天。"
2360081099 = "跟伊吹一起體驗工作！"
685531614 = "伊吹在學校收到了「將來志願調查書」。聽到伊吹說不知道自己長大後要做什麼，老師便帶伊吹走訪各地，體驗各種職業。"
2071765566 = "跟伊吹一起學算術！"
2159313193 = "自從上次體驗過各種職業之後，伊吹開始認真思考自己最喜歡的工作是什麼。那就是「老師」。伊吹邀請老師到自己專屬的小教室，開始上快樂的算術課。"
2194837532 = "陽奈和禮服（１）"
58131079 = "陽奈將要出席格黑娜的社交派對。陽奈不清楚參加社交派對要做什麼準備，於是向老師尋求建議。老師與陽奈決定先從衣服著手，陽奈翻遍倉庫，找到了小時候穿過的禮服。不出所料，陽奈試穿時把禮服撐破了，於是兩人約好一起去挑禮服。"
324299341 = "陽奈和禮服（２）"
2948041859 = "說好要和陽奈一起挑選禮服的當天。陽奈因為風紀委員會的工作來不及趕到，於是請老師幫忙購買禮服。"
1999678653 = "陽奈和鋼琴"
1434829550 = "老師收到了陽奈的邀請。在只有兩人的空間內，陽奈開始了獻給老師的演奏。"
2011469792 = "平靜的時間"
