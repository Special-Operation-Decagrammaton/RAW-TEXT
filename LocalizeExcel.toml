1881991320 = "227호 특별반의 어느 평범한 하루"
3129722182 = "어느 추운 겨울날, 땔감을 구하기 위해 나무 기둥을 뽑던 노도카와 시구레는 우연히 온천원을 발견한다. 이 사실을 알게 된 게헨나 학원의 온천개발부는 구교사를 찾아와 거대한 온천장을 짓고 사라진다."
124314717 = "무허가 온천"
590648767 = "반복되는 지진으로 인해 수면 부족에 시달리던 체리노는 구교사에 새로운 온천장이 지어졌다는 이야기를 듣고 분개하며 전차를 끌고 구교사로 향한다."
1823415428 = "227호 온천장에 어서 오세요!"
2338205529 = "체리노 일행은 구교사에 도착하여 227호 온천장의 거대한 규모를 보고 당황한다. 온천장의 여주인이 된 노도카는 체리노에게 뇌물을 바쳐 그녀의 환심을 사고, 선생님을 특별 온천으로 안내한다."
488046043 = "수상한 시선"
1111671300 = "선생님은 목욕을 하던 중 수상한 시선을 느낀다. 선생님을 관음하던 불청객의 정체는 지식해방전선의 메루로, 그녀는 동인지의 소재를 찾기 위해 온천장을 방문했다고 말한다. 노도카는 이런 메루를 불쾌히 여기며 쫓아내려 한다."
2551825690 = "수상한 거래"
2970020116 = "전투 후, 메루는 노도카에게 비밀스러운 거래를 시도하고 노도카가 이를 받아들이며 두 사람의 싸움이 극적으로 종료된다. 이후 선생님은 노도카의 안내를 받아 정원을 구경하러 간다."
2115498113 = "용역부에게 일감을!"
299148182 = "시끄러운 소리에 이끌려 온천장 입구로 향한 선생님과 노도카는 그곳에서 시위를 하고 있는 용역부 학생들을 마주한다. 용역부는 온천개발부가 지은 227호 온천장을 못마땅하게 여겨 철거하려 하고, 노도카가 이를 저지하자 싸움이 벌어진다."
2575633767 = "용역부에게 모르스를!"
27949908 = "전투가 끝나고 시구레는 용역부에게 직접 담근 모르스를 건네며 대화를 시도한다. 모르스의 맛과 감언이설에 넘어간 용역부는 시구레의 안내를 받아 온천욕을 즐기러 간다."
3696228207 = "선도부원에게도 완벽한 휴가를!"
4153367937 = "휴게실에서 우연히 안마의자에 앉아 쉬고 있던 치나츠를 보게 된 선생님. 치나츠는 선생님에게 온천개발부의 음모에 대해 말해주며 주의를 준다."
1351623494 = "온천개발부의 음모"
1967122534 = "산책로에서 체리노와 다시 만난 선생님. 체리노는 227호 온천장의 서비스에 만족하며 온천개발부에게 훈장을 수여하려 하지만, 온천개발부가 붉은겨울 자치구 전역을 폭파하려는 계획을 밝히자 곧 싸움이 벌어진다."
3915830261 = "철거다, 철거!"
242528877 = "무사히 온천개발부의 음모를 저지했지만, 노도카는 227호 온천장이 폐쇄된다는 사실을 받아들이지 못하고 저항한다. 노도카에게 고용된 용역부가 합세하며 사무국 학생들과 특별반 학생들 사이에 싸움이 벌어진다."
2923230343 = "변치 않는 우정"
3703937299 = "전투가 끝나고 노도카는 다시 구교사 생활로 돌아가기는 싫다며 울먹인다. 그런 노도카를 시구레가 위로하며 훈훈하게 이야기가 마무리되려던 찰나…… 다시 나타난 온천개발부가 227호 온천장을 완전히 폭파한다."
4161771854 = "붉은겨울 학원의 어느 평범한 하루"
2833699108 = "온천장의 폐허 속에서 시구레가 파괴되지 않고 남은 온전한 탕 하나를 발견한다. 붉은겨울 학생들은 좁은 탕에서 함께 몸을 씻으며 각자의 포부를 털어놓는다."
