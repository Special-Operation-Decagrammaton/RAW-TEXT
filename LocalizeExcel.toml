2374839960 = "伊吹從喜歡的姐姐們手中收到的禮物玩偶。雖然外觀有點獨特，但這好像反而是伊吹最滿意的部分。"
938424299 = "伊吹平時愛惜使用的蠟筆。伊吹用它畫出了無窮無盡的世界。"
1063147996 = "伊吹最喜歡的甜點之一。雖然是每天只能吃一個的珍貴點心，不過好像偶爾會莫名從冰箱消失。"
1559446809 = "用來收納伊吹個人物品的手提包。裡面有手機、哨子、槍枝、前輩們準備的紙巾，以及漂亮的花瓣等等東西。"
917196592 = "伊吹為自己喜歡的前輩們畫的圖畫。依真琴的特別命令，被指定為格黑娜的寶物。"
1246509466 = "為了宣揚萬魔殿的威嚴而發行的定期新聞。不過大部分的內容都聚焦在伊吹身上，作為伊吹的周邊商品而有更高的價值。"
1636079057 = "記錄定期執行的供給部衛生評鑑結果的檢查表。大部分都得到滿分，但三不五時也會因為不得已的原因而被判為不及格。"
1783365279 = "遺落在舊校舍的老舊的鋼琴調音器。外觀看起來很舊，不過可能是因為原本的主人很愛惜它，使用起來沒有問題。"
561939847 = "某人來不及收拾的書包。一般來說，書包裡面會裝著教科書、零食、漫畫書等等物品，不過有時也會發現炸彈之類的武器，很有格黑娜學園的風格。"
1142909824 = "到處都是焦痕的萬魔殿定期新聞。幸運的是上面內容與伊吹無關，而是關於真琴熱情演講的報導，所以才沒有人拿走它。"
4224932345 = "由風紀委員會管理的監獄進出人員紀錄表。原本是重要的維安用品，不過目前也被監獄常客當成留言簿使用。"
186189428 = "亞子為了陽奈準備的手沖咖啡器具。精緻的質感透露著秘書的關懷之情，但是持有者本人沖的咖啡似乎不太好喝。"
2653748522 = "茱莉平時在供給部為了鑽研料理而詳細記錄下來的食譜。只要使用這份食譜就能製作出美味的料理。"
2932450416 = "潔莉諾親自寫給真琴的信函。信中寫下了他的期許，包括身為領袖應該具備的正確態度，以及各學園不可限量的未來。"
1955500566 = "在監獄發現的湯匙。主要用來吃東西，也可以用來逃獄或變身為超級英雄。"
652268410 = "記錄著風紀委員會工作的文件堆。寫滿了光看就讓人頭痛的文字和數字。小心別把它碰倒了！"
3128527829 = "瀬奈整理好的患者名單。從需要優先治療的對象到裝病的病患都冷靜地記錄著，很有瀬奈的風格。"
4077140834 = "似乎是某人遺失的餐券。雖然不知道主人是誰，但餐券上寫的「好期待！」這句話還是令人感覺到微微的遺憾。"
3849298482 = "被亂丟的皺巴巴的萬魔殿通知書。大部分的內容都在記錄真琴的偉業，沒什麼用處。"
88965538 = "沒有使用過的急救醫學部注射器。注射針的部分很危險，要避免不小心碰到！"
