3571189559 = "เมื่อได้อ่าน MOMOTALK ที่อาคาเนะส่งมา คุณครูก็มาที่ห้องที่อาคาเนะอยู่ ระหว่างที่กำลังเคาะประตู อาคาเนะก็ปรากฏตัวจนคุณครูตกใจ ตกใจถึงขนาดที่ต้องบอกว่ามีธุระด่วนและรีบออกมาจากตรงนั้น"
4078232729 = "Case 2. พักให้สบายนะคะ"
4204404808 = "ครูเหน็ดเหนื่อยกับงานที่ทำค้างอยู่ จึงพักการทำงานไว้และออกไปพักผ่อน อาคาเนะมารอคุณครูอยู่ในห้องพักผ่อนพอดี เมื่อเจอคุณครู เธอจึงเสนอตัวช่วยงาน และได้ช่วยทำความสะอาดตามคำขอของคุณครู อาคาเนะถามคุณครูอีกว่าให้ช่วยอะไรต่อ แต่คุณครูก็เหนื่อยกับงาน จนผล็อยหลับไป อาคาเนะจึงออกมาจากห้องทำงานคุณครูอย่างเงียบๆ"
1635582478 = "Case 3. เวลาเรียนเหรอคะเนี่ย?"
4058993158 = "คุณครูพักงานที่ทำค้างอยู่ไว้แล้วออกมาเดินเล่นในเมือง และระหว่างนั้น ก็ได้เจอกับอาคาเนะในชุดบันนี่เกิร์ลที่ดึงดูดความสนใจของคนรอบข้าง เห็นดังนั้นคุณครูจึงพาอาคาเนะออกมาจากที่นั่นอย่างเร่งรีบ แต่ที่ที่ไปถึง คือคาเฟ่ในธีมบันนี่เกิร์ล ซึ่งทำให้คุณครูต้องตกใจกว่าเดิม"
482869814 = "Case 4. เลขาฯ ประจำวัน รอรับคำสั่งค่ะ"
607709933 = "คุณครูง่วนอยู่กับการจัดการงานที่คั่งค้างในชาเล่ต์และเผลอพูดออกมา\nคนเดียวว่าให้ใครชงกาแฟให้หน่อย อาคาเนะได้ยินเข้าจึงยื่นกาแฟให้\nจนคุณครูรู้สึกงงงัน ระหว่างที่ทั้งสองได้คุยกัน คุณครูก็ได้เห็นความจริงใจ\nของอาคาเนะ เธอจึงได้ความมั่นใจกลับคืนมาอีกครั้ง"
3585267607 = "จ๊อกกิ้งตอนเช้า"
1396278568 = "คุณครูพบยูกะที่ออกมาวิ่งจ๊อกกิ้งบนทางเดินในสวนสาธารณะตั้งแต่เช้าตรู่\nยูกะบอกคุณครูว่าเธอกำลังฝึกพิเศษเพื่อเตรียมพร้อมสำหรับงานมหกรรม\nแข่งขันกีฬาที่มิลเลเนียมจะจัดขึ้น เธอบอกว่ามั่นใจเรื่องความทนทานของ\nตัวเอง แต่ความเป็นจริงแล้วกลับต่างจากที่คุยโวเอาไว้ เพราะแค่แป๊บเดียว\nเธอก็หมดพลังไปก่อน"
737635945 = "สูตรอาหารลับฉบับวิทยาศาสตร์"
2573899798 = "คุณครูได้ข่าวว่ายูกะกำลังฝึกทำอาหารอยู่ จึงแวะเข้าไปหาที่ห้องคหกรรม\nยูกะเริ่มทำอาหารด้วยท่าทางที่มั่นใจ แต่เธอก็ทำผิดพลาดอย่างต่อเนื่อง\nเพราะไม่ค่อยคุ้นเคย หลังจากความยุ่งยากมากมายที่เจอ ข้าวกล่องของเธอ\nก็เสร็จสมบูรณ์"
2174568177 = "วัฒนธรรมการเชียร์ที่มีวิจารณญาณ"
1860377927 = "ยูกะแวะไปที่ชาเล่ต์เพื่อจัดการงานส่วนรวมและได้ดูการแข่งขันของชมรม\nเบสบอลมิลเลเนียมที่กำลังถ่ายทอดสดในทีวี ยูกะบอกว่ากองเชียร์ที่ดีจะ\nต้องควบคุมสติให้ได้ไม่ว่าจะในสถานการณ์ใดก็ตาม แต่ระหว่างที่ดูถ่ายทอด\nสดการแข่งขันเบสบอลของมิลเลเนียม เธอก็หุนหันพลันแล่นจนเสียสติ"
670142544 = "การ์ดกีฬา"
3586706266 = "ยูกะแวะไปทำงานของเธอที่ชาเล่ต์ ระหว่างช่วยจัดโต๊ะของคุณครูที่ไม่อยู่ใน\nห้อง เธอก็ได้เห็นการ์ดใบหนึ่งที่เป็นรูปของเธอ ที่จริงแล้วมันเป็นการ์ดกีฬา\nที่โครโนสจัดทำขึ้น แต่ยูกะไม่ทันรู้เรื่องนี้ก็เลยเกิดความเข้าใจผิดขึ้นเล็กน้อย"
4024156221 = "ชุดที่ไม่คุ้นเคย"
3987667853 = "คุณครูแวะไปที่ห้องเตรียมการในวิหารทรีนิตี้ เพราะมารีมีเรื่องอยากปรึกษา\nเมื่อไปถึง คุณครูก็ได้พบกับมารีที่ใส่ชุดกีฬาอยู่ มารีรู้สึกกังวลและเคอะเขิน\nเมื่อต้องใส่ชุดกีฬาแทนที่จะเป็นชุดซิสเตอร์ คุณครูจึงรับฟังความกลุ้มใจ\nและให้คำแนะนำ"
1051695137 = "ซิสเตอร์บนม้านั่ง"
343809718 = "ในวันงานมหกรรมแข่งขันกีฬา คุณครูช่วยให้กำลังใจมารีที่ยุ่งวุ่นวายอยู่\nท่ามกลางฝูงชนมากมาย มารีรู้สึกซาบซึ้งในความเอาใจใส่ของคุณครู\nและได้เปิดอกบอกคุณครูถึงความสนุกและความรู้สึกที่มีต่องานมหกรรม\nแข่งขันกีฬา"
2123351407 = "การตอบแทนของมารี"
720252404 = "คุณครูเดินเล่นอยู่ในสวนสาธารณะส่วนบุคคลของวิหารทรีนิตี้ และได้พบกับ\nมารีที่กำลังออกกำลังกายอยู่ มารีเล่าถึงความตั้งใจแน่วแน่ของตนที่ได้แรง\nบันดาลใจมาจากงานมหกรรมแข่งขันกีฬา คุณครูได้ฟังดังนั้นก็รู้สึกชื่นใจ\nคุณครูรอจนกว่ามารีจะออกกำลังกายเสร็จและกลับชาเล่ต์โดยมีมารีเดินมาส่ง"
1478340410 = "เติบโตอย่างไม่หยุดยั้ง"
2793860415 = "คุณครูได้รับการติดต่อจากฮาสุมิและออกไปหา ภาพที่เห็นเมื่อไปถึงคือ\nฮาสุมิที่พยายามรูดซิปเสื้อกีฬาอยู่ ฮาสุมิยอมแพ้กับการรูดซิป และหันมา\nมุ่งมั่นกับงานเอกสารเพื่อเตรียมงานแข่งขันกีฬา แต่ชุดของฮาสุมิทำให้\nคุณครูจดจ่ออยู่กับงานไม่ได้"
1830803246 = "มะนาวดองน้ำผึ้ง"
3363601715 = "คุณครูได้รับการติดต่อจากฮาสุมิและออกไปหาที่ห้องคหกรรม เมื่อไปถึงก็\nเห็นว่าฮาสุมิกำลังทำ <มะนาวดองน้ำผึ้ง> อยู่ คุณครูจึงช่วยฮาสุมิทำ\nมะนาวดองน้ำผึ้งที่เหลือ"
2317643333 = "การดูแลตนเอง"
3356412026 = "ในวันเปิดงานมหกรรมแข่งขันกีฬา ในขณะที่ฮาสุมิกำลังกินอาหารคลีนลด\nน้ำหนัก เธอได้ยินนักเรียนคนอื่นคุยเรื่องอาหารกันจนเริ่มหวั่นไหว คุณครู\nแนะนำให้ฮาสุมิกินมะนาวดองน้ำผึ้ง ฮาสุมิตัดสินใจว่าจะกินแค่นิดเดียว แต่สุดท้ายความอยากอาหารก็ทำให้เธอกินจนหมดเกลี้ยง"
1424445415 = "ช่วยวางท่า"
2368675001 = "คุณครูไปที่โรงยิมเพราะนัดออกกำลังกายกับฮาสุมิไว้ ทั้งสองช่วยกันจัดท่า\nออกกำลังกายให้กัน"
2829913152 = "รสนิยมของแฮ็กเกอร์อัจฉริยะ"
2128267029 = "ฮิมาริรู้ว่าวันนี้เป็นวันหยุดของคุณครู จึงเชิญคุณครูไปยังที่ซ่อนของตัวเอง\nทั้งสองได้ใช้เวลาพักผ่อนอย่างสบายใจด้วยกัน ต่อมาฮิมาริได้แฮ็กวิทยุ\nของโรงเรียนเพื่อจะเปิดเพลงที่ตัวเองขอ สุดท้ายทั้งโรงเรียนก็ได้ฟังเพลง\nแนวเอ็นกะที่ฮิมาริชอบ"
1584830152 = "การทดลองของแฮ็กเกอร์อัจฉริยะ"
1591221981 = "คุณครูรีบออกมาล่วงหน้าเพื่อมาให้ทันเวลานัดกับฮิมาริ แต่ไม่รู้ด้วย\nเหตุใดถึงได้เข้าไปพัวพันกับเหตุการณ์ต่างๆ อยู่เรื่อย เมื่อเคลียร์ทุก\nอย่างจนมาถึงสถานที่นัด ก็ได้รู้ว่าทุกอย่างที่เจอเป็นฝีมือของฮิมาริที่\nทดสอบสิ่งที่ตัวเองได้อ่านมาจากนิตยสารดูดวงกับคุณครู เมื่อได้รู้\nความจริงดังนั้น คุณครูจึงอบรมสั่งสอนฮิมาริไปชุดใหญ่"
829552681 = "การโต้แย้งของแฮ็กเกอร์อัจฉริยะ"
711052487 = "คุณครูได้รับการติดต่อจากฮิมาริว่ามีเรื่องใหญ่เกิดขึ้น จึงรีบไปหาเธอ\nที่มิลเลเนียม แต่สิ่งที่ฮิมาริให้คุณครูดูคือข่าวซุบซิบเรื่องเธอ\nฮิมาริกับคุณครูถ่ายคลิปชี้แจงส่งไปที่ชมรมข่าว เพราะต้องการแก้ไข\nเนื้อหาของข่าว แต่วิดีโอของทั้งสองกลับทำให้เกิดความวุ่นวายมาก\nขึ้นแบบไม่ได้ตั้งใจ"
2037364016 = "เครื่องหมายเซมิโคลอนของแฮ็กเกอร์อัจฉริยะ"
2533708593 = "ฮิมาริบอกคุณครูว่าได้สมบัติพิเศษมา และโชว์มอนสเตอร์แม็กซ์ลิมิเต็ด\nเอดิชั่นให้คุณครูดู เธอเล่าว่าได้เรียนรู้วิธีดื่มเครื่องดื่มนี้ให้อร่อยยิ่งขึ้น\nมาจากสมาชิกเวอริทัส และจะทดลองใช้วิธีนั้นดู แต่ในตอนนั้นกระป๋อง\nก็ระเบิดออกมาจนฮิมาริเปียกไปทั้งตัว คุณครูจึงเอาผ้าขนหนูมาช่วย\nเช็ดตัวฮิมาริอย่างเอาใจใส่"
4205919598 = "อย่างเนียนๆ"
785035510 = "คุณครูเสร็จงานที่สหภาพเรดวินเทอร์และมุ่งหน้ามาที่อาคารเรียนเก่า\nเมื่อมาถึงเลยได้เจอกับชิกุเระที่เฝ้าอาคารอยู่คนเดียว เธอบอกว่า เครื่องดื่มทั้งหมดกลายเป็นน้ำแข็งเพราะอากาศที่หนาวจัด จากนั้น ก็หยิบวอดก้าออกมาอย่างเนียนๆ จนคุณครูตกใจ"
2971103393 = "อย่างมีเล่ห์เหลี่ยม"
3404545130 = "คุณครูแวะเข้ามาที่สหภาพเรดวินเทอร์ ระหว่างเดินเตร็ดเตร่ผ่านภูเขาหิมะ\nก็ได้เกิดอุบัติเหตุขึ้น โชคดีที่ชิกุเระกำลังเดินผ่านแถวนั้นพอดี เธอจึงเข้ามา\nช่วยคุณครูไว้ และตำหนิคุณครูว่าทำไมไม่ฟังคำแนะนำที่เธอบอกคราวก่อน\nหลังจากนั้นเธอก็แบกคุณครูขึ้นหลังและพาไปส่งที่ชาเล่ต์"
720127695 = "อย่างกลมเกลียว"
1882526035 = "คุณครูเชิญชิกุเระออกมาที่เขตย่านชุมชนเพื่อตอบแทนที่เธอช่วยไว้ครั้งก่อน\nชิกุเระได้ใช้ช่วงเวลาดีๆ ในการรับประทานอาหารในร้านอาหาร และก็บอก\nความในใจกับคุณครูอย่างสุขุมว่ามีสถานที่อื่นที่เข้ากับเธอ"
4186219493 = "อย่างตรงไปตรงมา"
273193773 = "ชิกุเระมาที่ห้องคหกรรมของชาเล่ต์เพื่อทำอาหารให้คุณครู แต่คุณครูก็\nต้องตกใจเมื่อได้เห็นส่วนผสมอาหารที่ถูกเตรียมมา เธอใส่วอดก้าลงไป ในอาหารและทำเป็นเล่นไปเรื่อยๆ สุดท้ายจึงเป็นคุณครูที่ต้องช่วยชิกุเระ ทำอาหารให้สำเร็จ"
3572546902 = "เซรินะในคืนศักดิ์สิทธิ์"
3496257221 = "คุณครูได้เจอกับเซรินะที่กำลังแจกของขวัญให้เด็กๆ ในค่ำคืนศักดิ์สิทธิ์\nแต่จู่ๆ หิมะก็เริ่มโปรยปราย คุณครูจึงให้ผ้าพันคอเป็นของขวัญกับเซรินะ\nที่หนาวเหน็บ"
2512788767 = "ของขวัญที่เตรียมมาจริงๆ"
2923297793 = "เซรินะแอบมาหาคุณครูที่กำลังพักผ่อนอยู่ แต่ไม่นานคุณครูก็รู้ว่าเธอเข้ามา เซรินะให้ของขวัญชุดดูแลสุขภาพเพื่อตอบแทนคุณครูที่ให้ผ้าพันคอเธอ\nในคราวก่อน และใช้เวลาที่แสนสุขด้วยการนวดกดจุดให้คุณครู"
