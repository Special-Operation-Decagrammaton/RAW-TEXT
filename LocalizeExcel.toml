4283874219 = "悄悄接近的影子"
2057607723 = "老師在公園附近的市場買東西，從桐乃那裡聽說「有重武裝的可疑遊民」的傳聞。雖然老師認為RABBIT小隊的傳聞是誤傳，但是不久之後老師就被來路不明的遊民們綁架了。"
2671061263 = "無所有和燒肉便當"
