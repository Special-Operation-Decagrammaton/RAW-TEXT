1368837064 = "폐허를 수색하던 일행은 폐허의 오토마타들과 조우하여 전투에 돌입한다."
1548581704 = "토키와다이의 레일건 2"
4263679817 = "평소보다 더 많은 물량이 몰려드는 폐허, 미사카 미코토는 엔지니어부가 만들어 준 전용 총을 사용하지만 기대했던 위력이 나오지 않는다. 위기의 상황에서 미사카 미코토는 동전을 꺼내 맨손으로 레일건을 쏜다."
