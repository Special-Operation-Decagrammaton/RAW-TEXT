3507167664 = "[c]Base Durability: 3[/c]\n"
633274597 = "[c]After another Tea Party Striker's EX Skill is activated:[/c] Gives [c]{param;BasePower}[/c] Barrier and increases EX Skill Power by [c]1[/c] to the equipped Striker.\n\n\n[c][75b4c0][i]Being without a teapot is like being without a gun.\n- An old saying from Trinity[/i][-][/c]"
1687452173 = "[c]Base Durability: 3[/c]\n"
691707837 = "[c]When the equipped Striker swaps to the Front:[/c] Gives [c]{param;BasePower}[/c] Barrier.\n\n\n[c][75b4c0][i]\"There are many speculations as to what Pinky-Paca is. Platypus, penguin, gator... But Pinky-Paca never gives anyone answers. Because it does not talk.\"[/i][-][/c]"
542885129 = "[c]Base Durability: 1[/c]\n"
2722924470 = "[c]At the start of user's Phase:[/c] The EX Skill Cost of any Striker deployed this Phase becomes [c]0[/c].\n\n\n[c][75b4c0][i]Should you go to a mountain or the sea for the summer? Surely we can compromise![/i][-][/c]"
