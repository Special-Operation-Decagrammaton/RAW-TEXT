2305382535 = "โนอากับคุณครูไปที่ชมรมออกกำลังกายเพื่อตรวจสอบสภาพร่างกายของ\nผู้เข้าแข่งขัน สึมิเระมีความตั้งใจแน่วแน่นในการแข่งขันในฮาโลเฟสติวัลที่จะ\nมาถึง แต่ความมุ่งมั่นของเธอทำให้นักเรียนที่ออกกำลังกายอยู่ตกตะลึงและ\nวิ่งหนีไป สึมิเระจิตใจรุ่มร้อนเพราะงานมหกรรมแข่งขันกีฬาใกล้จะมาถึง เธอจึงชวนคุณครูออกกำลังกาย 'เบาๆ'"
