1851183371 = "프롤로그"
89706152 = "오페라 하우스에서 의뢰를 수행 중이던 흥신소68은, 우연히 선생님이 같은 의뢰 장소에 와 있다는 사실을 알게 된다."
993139401 = "일 때문에 왔지 1"
498565445 = "선생님은 오페라 하우스를 방문한 것이었다. 아루는 선생님에게 접근하여 선생님의 일을 돕겠다는 말과 함께 오페라 하우스 견학을 시켜준다. 선생님은 아루가 오페라 하우스의 구조와 내부 인원을 모두 알고 있는 이유를 묻지만, 아루는 '일 때문에 왔다'라며 쉽사리 입을 열지 않는다."
904765692 = "일 때문에 왔지 2"
2182709110 = "갑작스러운 폭발과 함께 나타난 하루카와 무츠키, 카요코와 함께 현장을 수습한 선생님은 흥신소68 일행에게 오페라 하우스에 온 이유를 듣는다."
4116259171 = "더 하드보일드하게"
2413738832 = "흥신소68의 의뢰는 갱단 연합의 우두머리인 돈 아란치노를 납치하는 것이었다. 흥신소68이 의뢰를 수주하게 된 전후 사정을 들은 선생님은 흥신소68의 의뢰를 방해하지 않기로 한다."
4217288089 = "사냥감 독식 1"
2431873477 = "아루도 모르던 사이 하루카와 무츠키, 카요코는 오페라하우스 내에 숨어있던 정체불명의 공작원들을 발견해, 공작원들이 심어놓은 폭탄과 함께 묶어놓은 상태였다. 오페라 하우스 내에 더 많은 잔당이 있다는 진술을 확보한 흥신소68은 선생님과 함께 오페라 하우스를 수색해 보기로 한다."
402480360 = "사냥감 독식 2"
2947210386 = "오페라 하우스 수색을 마치고, 흥신소68은 타겟인 돈 아란치노가 도착한다는 정보를 입수한다."
1538647403 = "거기까진 예상 못 했는데 1"
1448168568 = "돈 아란치노의 도착을 지켜보던 흥신소68은, 오페라 하우스의 관객 모두가 심상치 않은 분위기를 풍기기 시작하는 것을 느낀다."
3746301441 = "거기까진 예상 못 했는데 2"
2834066436 = "오페라 하우스의 모든 관객과 방문객은 사실 돈 아란치노를 노리던 다른 공작원들이었다. 돈 아란치노는 공작원들을 피해 자신의 '대비책'을 접선하고, 도망치던 타겟을 쫓던 흥신소68은 그 '대비책'과 조우한다."
3486916526 = "능숙한 듯 서투르게 1"
