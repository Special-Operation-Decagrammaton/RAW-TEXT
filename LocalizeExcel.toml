2553404339 = "ไอริทุ่มเทให้กับการฝึกซ้อมจนถึงมืดค่ำ เมื่อคุณครูมาเห็นว่าเธอยังฝึกซ้อม\nอยู่คนเดียวในห้องซ้อม เธอก็ยิ้มให้คุณครูแล้วบอกว่าจะทำให้เห็นไอริ\nคนใหม่ที่ต่างไปจากเดิมอย่างสิ้นเชิง แต่วันถัดมาคุณครูก็ได้ข่าวจากโยชิมิ\nว่าจู่ๆ ไอริก็หายตัวไป"
3689885592 = "เพื่อไอริ"
670625935 = "ในขณะที่คุณครูออกไปข้างนอกเพื่อตามหาไอริ โยชิมิ นัตสึ และคาซึสะก็\nคิดว่าที่ไอริหายตัวไปอาจเป็นเพราะกลัวว่าจะเสียโอกาสในการลิ้มรสขนม <เฟรเดริก้า เซมล่า> เพราะเข้าร่วมการแสดงเปิดงานเทศกาลโรงเรียนไม่ได้ ทุกคนตัดสินใจแน่วแน่ว่าต้องหาไอริให้เจอ และเริ่มทำในสิ่งที่ไม่ควร"
1244213426 = "คนที่มีคุณสมบัติ"
