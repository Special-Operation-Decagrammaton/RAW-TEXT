2299886396 = "漁師の話によると、ここ数ヶ月カニの水揚げ量が増えたことで価格が暴落したようだ。\n倉庫に山積みとなっている箱が、その主張を裏付けている。"
2761775914 = "港の作業員がカニを運ぶ際、おがくずが入った箱を使うようだ。\nカニをドラム缶に入れると死んでしまう可能性があるため、おすすめできないという。噂の真相は……。"
3514356211 = "港の人々とは異なり、一般市民はカニに対して漠然とした恐怖を抱いているようだ。\nそのため、カニ料理を扱う店は売上が低迷しているらしい。"
2379706199 = "鐘崎港で突然姿を消した漁師について、年配の漁師は仕事が大変で逃げたのだと確信を持っているが、周りの他の漁師は、カルパッチョ・ファミリーに多額の借金をしていたことが原因だと言っている。"
3923987583 = "鐘崎港の貨物駅は旅客列車の運行はしていないが、早朝のみ港湾労働者向けの通勤列車を運行しているという。\nこれは漁師が姿を消した時刻と一致している。"
3535269966 = "カルパッチョ・ファミリーは港内外で、金銭を必要とする人々に高金利で金銭を貸し出していた。\n返済できない債務者がひどい目に遭うという噂がSNSなどで広まっている。"
4086592800 = "カルパッチョ・ファミリーの「警備マニュアル」には、一般的な業務ガイドに加えて「午前0時にドラム缶を転がしながら港を一周すること」という意味不明な指示が記されていた。"
518587471 = "カルパッチョ・ファミリーの食料品保管エリアで、大量のカニが入った箱が見つかった。\n箱に入っていたカニは、ファミリー全員でも食べきれないほどの量だった。"
162033439 = "カルパッチョ・ファミリーの倉庫で見つかった物流データから、彼らの資金記録を確認することができた。\n最近のカルパッチョ・ファミリーは、固定費を削減しつつ、キャッシュを増やそうとしているようだ。"
557718016 = "行方不明となった漁師の周辺状況を調査しよう。\n\n情報によると、行方不明になった漁師はカニ漁船の船員だったみたいだけど……。\n同じ船で働く他の船員なら、何か知っているかもしれない。"
735844159 = "作業員を手伝って、おがくず袋を探そう。\n\nカニを保存する際には、おがくずが必要不可欠らしい。誰かがゴミだと思って捨てた可能性もあるので、処分場を確認してみよう。"
3570144724 = "困っている商人を助けよう。\n\n商業エリアで食べ物を売る商人たちは、最近広まった噂のせいで客足が減って困っているらしい。店の宣伝など、何か手伝えないかな。"
1284006630 = "調査した手がかりを整理しよう。\n\nみんなで集めた手がかりを整理すれば、糸口が見えてくるはず。ただ、今日調査した内容だけでは……少し足りないかもしれない。"
1631138589 = "行方不明の漁師について尋ねてみよう。\n\n前回の訪問で、ある程度会話してくれるようになったので、姿を消した漁師について慎重に尋ねてみよう。おおごとにならなければいいけど……。"
2072783996 = "港と接続された鉄道の行き先を調査しよう。\n\n鐘崎港には外とつながる貨物駅がある。行方不明の漁師もこの駅を利用したのかもしれない。"
319418750 = "カルパッチョ・ファミリーについて調べてみよう。\n\n港の警備を担当しているカルパッチョ・ファミリーは、港周辺でお金が必要な人々に高金利で貸し出しているみたい。もしかしてこの人たちが……？"
3887413056 = "調査した手がかりを整理しよう。\n\nそろそろ事件の糸口が見えてきたね。でも、この事件を単なる債務問題として片付けてもいいのかな……？"
1679105561 = "倉庫に潜入しよう。\n\nカルパッチョ・ファミリーの倉庫に潜入し、より確かな証拠を探してみよう。その前に、入口に立っている警備の目を逸らす方法を探す必要がある……。"
590934296 = "倉庫で怪しい痕跡を探してみよう。\n倉庫は想定よりずっと広い……構成員にバレないように注意しながら、怪しい痕跡がないか探してみよう。"
2618096481 = "調査した手がかりを整理しよう。\n\n倉庫を調べてから、疑念が確信に変わった。この失踪事件と怪談は……更に大きな目的を隠すための隠れ蓑なんだね。"
