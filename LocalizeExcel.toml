3093070589 = "阿拜多斯攻防戰（１）"
310065573 = "抵達凱薩PMC的星野，聽到阿拜多斯高中正遭受攻擊的消息後表示抗議，但卻反而被黑色西裝人拘禁。在千鈞一髮之際，先前離開的便利屋68一行人出現在阿拜多斯，幫了對策委員會一把。"
3717760490 = "阿拜多斯攻防戰（２）"
91688092 = "凱薩董事對這意想不到的狀況非常氣憤。而老師則指揮對策委員會和便利屋學生對抗PMC士兵。"
