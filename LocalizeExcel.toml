4187141271 = "出動！泳裝蒙面團（１）"
847788836 = "巡視黑市的對策委員會一行人看到，自己所償還的債款流入暗黑銀行。當學生們得知自己努力還的錢被用來做違法勾當，便在一怒之下決定搶銀行。"
2540582765 = "出動！泳裝蒙面團（２）"
2791958937 = "亞瑠在暗黑銀行等著貸款審查，此時蒙面的對策委員會學生們出現在她面前把現金偷走。黑市保鑣緊追在對策委員會一行人身後。亞瑠對對策委員會學生讓自己看見的壞蛋的真面目投以充滿憧憬的目光。"
2605391019 = "朝著夕陽出發吧！"
1843801151 = "躲過黑市保鑣追擊，順利逃脫的對策委員會一行人。他們看到額數驚人的現金，頓時陷入苦惱。但是很快就被星野說服，決定只帶著部分需要文件逃跑。而他們留下的一捆捆現金，則被亞瑠和便利屋職員撿走。"
