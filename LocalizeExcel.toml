2149506593 = "ยกเลิก"
3205108257 = "ยืนยัน"
1541422275 = "ตอนที่ได้รับคำขอที่ไม่สมเหตุสมผลจาก\nแพนเดโมเนียม โซไซตี้ ท่านประธานฮินะ\nคงกังวลว่าจะต้องทำอะไรต่อ...\n\nแต่พออาโกะคนนี้ได้เห็นความพยายามของท่าน\nประธานแล้ว ถึงได้รู้ว่านี่ไม่ใช่เวลาที่จะมากังวล\n\nในฐานะเจ้าหน้าที่อาวุโสของคณะกรรมการวินัย\nฉันขอเป็นกำลังใจให้ท่านประธานฮินะ ท่านประธาน สู้ๆ กับการแสดงดนตรีนะคะ!"
1570765118 = "ฮุฮุ พวกเราก็ได้ยินเหมือนกันค่ะ\n\nไม่ใช่สิ่งอื่นใด มันคือการแสดงเปียโนครั้งแรกของ\nประธานกรรมการวินัยที่มาในชุดเดรสแสนสวยนั่นเอง...\nมันเหมือนกับอาหารเลิศรส\n\nฉันตั้งตารอชมรอการแสดงในวันนี้อยู่นะคะ ฮุฮุฮุ! แสดงดนตรีให้เต็มที่เลยนะ"
2407965685 = "ได้ยินข่าวมาว่ามีการแสดงเปียโนในปาร์ตี้\nของเกเฮนน่า\n\nดูจากความดื้อรั้นของแพนเดโมเนียม โซไซตี้ ทางนั้นเองก็ลำบากมากเหมือนกันสินะ ฉันกับจูริเองก็จะส่งกำลังใจให้การแสดง\nปิดฉากลงอย่างสวยงาม ไม่มีปัญหานะ\n\nพยายามเข้าละ ท่านประธานกรรมการวินัยเกเฮนน่า"
2286376939 = "คือว่า~ ประธานกรรมการน่ะ\n\nได้ยินว่าปาร์ตี้ครั้งนี้มีการแสดงชั้นยอดด้วย~! นั่นยิ่งใหญ่พอๆ กับการพัฒนาออนเซ็นเลยมั้ย?!\n\nฉันจะไปฟังกับพวกเด็กๆ ด้วยคน! พยายามเข้านะ!"
978447002 = "ท่านประธานกรรมการวินัยฮินะ!\n\nจากที่ท่านประธานได้สั่งสมาชิกกรรมการวินัยให้\nผดุงความยุติธรรมอยู่เสมอ โดยไม่เลือกข้างว่า\nเป็นนักเรียนที่รักษากฎระเบียบของเกเฮนน่าหรือไม่\nแต่ในครั้งนี้พวกเราขออยู่ข้างคณะกรรมการวินัย!\n\nพวกเราขออยู่เคียงข้างท่านประธาน ขอส่งกำลังใจ\nให้การแสดงประสบความสำเร็จนะคะ!"
659199751 = "ท่านประธาน มีอาการร่างกายหรือจิตใจเหนื่อยล้า\nก่อนการแสดงครั้งสำคัญหรือเปล่าคะ?\n\nถ้ารู้สึกแปลกๆ แม้สักนิดเดียว กรุณาบอกฉันทันที\nเลยนะคะ เพราะมันเป็นหน้าที่ของฉันที่จะตรวจสอบ\nสุขภาพของคณะกรรมการวินัย รวมถึงท่านประธาน\nให้เหมาะสมค่ะ\n\nและก็... ถึงจะเป็นเรื่องใหม่ แต่ฉันเป็นกำลังใจให้นะคะ สู้ๆ ค่ะ!"
981979352 = "รุ่นพี่ฮินะ!\n\nอิบูกิเองก็รอคอยการแสดงเปียโนของรุ่นพี่อยู่นะ ตื่นเต้นจังเลย!\n\nอิบูกิจะคอยเอาใจช่วยนะ~! แหะๆๆ!"
1958821606 = "ฮินัตจิ! ฉันจะคอยเชียร์นะ!\n\nพวกเราตั้งตารอการแสดงของฮินัตจิอยู่นะ! ตั้งตารอสุดๆ เลย~! จะต้องเป็นการแสดงที่สุดยอดมากแน่ๆ!\n\nไว้ฉันจะถ่ายคลิปวิดีโอเท่ๆ แล้วส่งให้ฮินัตจิด้วยนะ! พยายามเข้าล่ะ!"
4025554739 = "ต้องมาจัดการกับความดื้อรั้นของแพนเดโมเนียม โซไซตี้ ประธานเองก็ลำบากเหมือนกันนะ\n\nถึงฉันจะช่วยอะไรไม่ค่อยได้ แต่ถ้ามีเป็นเรื่อง\nที่มีแค่ฉันที่ทำได้ละก็... ได้เลย! ฉันตัดสินใจแล้ว!\n\nถ้ามีเจ้าบ้าหน้าไหนพยายามจะขัดขวางการแสดง\nของประธาน ฉันจะยิงมันให้หมดเลย! ประธาน! มาตั้งใจ! ฝึกซ้อมเข้าล่ะ!"
2710967621 = "แม้ว่าจะมีกิจกรรมใหญ่อย่างปาร์ตี้เกเฮนน่า\nแต่สิ่งที่ต้องทำก็ไม่เปลี่ยนแปลงค่ะ\n\nเฝ้าตรวจสอบให้ดี เพื่อไม่ให้ใครได้รับบาดเจ็บ\nจากความร้อนในเทศกาลด้วย\n\nถ้าทำงานที่ควรทำเสร็จแล้ว เราจะสนับสนุน\nผู้ที่พยายามต่อไปค่ะ พยายามเข้านะคะ ประธานกรรมการวินัย"
