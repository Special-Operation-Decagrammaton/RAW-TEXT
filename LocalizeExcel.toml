2841436091 = "사오리는 아란치노 갱단원들과의 전투 중, 길가에 놓여있는 쓰레기통을 발견해 엄폐물로 사용한다. 하지만 엄폐물로 사용된 쓰레기통에는 누군가가 버려둔 위험한 무언가가 가득 담겨있었다. 그리고 그 쓰레기통을 향해, 유탄 한 발이 날아온다."
