1593486785 = "甕中之鱉"
707855630 = "慶典的最後"
1580334319 = "三一學生們為參觀博覽會而抵達了千年校園。\n聖亞本想在C&C的歡迎下進行活動，卻突然發現了可疑學生的動向而前去追他們。"
1485885318 = "聖亞為追蹤可疑學生的動向而進入了地下通道。\n為了不被發現並偷聽他們的談話，聖亞決定假扮成箱子靠近。然而他在那裡遇到的是……"
3524856260 = "聖亞與寧瑠一起前往了莉央的藏身處。\n在聽兩人說明情況之後，確認了自己的所見所聞並非誤會。面對打算將自己視為客人保護的兩人，聖亞以提供情報作為交換，提出了一個請求。"
3055035619 = "莉央在獲得聖亞這個新戰力後，更加積極地展開調查。"
1087244281 = "在莉央的指示下，聖亞出發調查校園。\n為了在「處處皆不安的千年」尋找線索，他首先前往了學生眾多的教室。"
3603561 = "在教室遇見放學後甜點部成員的聖亞，聽說了關於「機器寵物」的事。\n在聽到這個既新奇又有趣的話題後，聖亞決定幫助大家尋找遺失的機器寵物。"
3962754328 = "聖亞在知道機器寵物竟然是機器鱷魚後感到很驚訝，但花凛和明日奈卻說「這是千年的日常」。\n得知機器鱷魚是由工程師部製作的聖亞，決定親自前往工程師部。"
1344822250 = "在艱難地制服了失控的前衛君後，優香前來質問工程師部。\n在工程師部大聲喊冤的同時，聖亞在損壞的前衛君內發現了可疑的晶片。"
2239397365 = "莉央在收到可疑的晶片後，察覺到了某種「意圖」。\n另一方面，聖亞也在與莉央的交談中，注意到了他與之前略有不同。"
1398523524 = "莉央將作戰用的USB和保全鑰匙交給了準備潛入資料中心的寧瑠。"
1813766078 = "潛入資料中心的寧瑠雖然順利到達目標地點，卻面臨了另一個問題。\n然而正當寧瑠對此感到棘手時，突然聽見了某人熟悉的吵鬧聲。"
1717919827 = "莉央透過資料中心的情報掌握了狀況。\n這整起事件比三人想像中還要嚴重許多。無法繼續坐視不管的莉央，開始準備向現場突襲的作戰。"
2988794607 = "莉央為聖亞快速調查了數據的流向。\n察覺到莉央體貼的聖亞為了加以回報而前往了遊戲開發部。"
58980428 = "抵達遊戲開發部的聖亞遇見了愛麗絲和柚子。\n愛麗絲稱呼聖亞為「盜賊王」，並與他一起前往遊戲開發部的遊戲展示場。"
3905697355 = "展示場的遊戲是由遊戲開發部全體成員費盡心血做出來的。\n然而遊戲卻莫名發生了變化，導致人們在玩過之後都感到異常憤怒，展示場因此陷入一片混亂。"
1699322212 = "在調查完破壞遊戲的晶片後，莉央確認這次事件與工程師部一樣都是遭人蓄意破壞。\n不過除此之外，他對遊戲原本的難度和品質則選擇避而不談……"
1906942469 = "寧瑠為了突襲現場而前往了健身中心。\n原本以為沒什麼問題，可惜很快就發生了機器故障，導致蓮實和堇陷入困境。寧瑠發現了製造問題的學生，並前去追趕他們。"
2940778481 = "寧瑠成功追上了可疑的學生並將其制服。\n然而幕後黑手卻撥來電話並引發了爆炸，讓他們得以逃脫。"
2077988676 = "現場突襲行動失敗後，莉央決定親自找出他們的蹤跡。\n判斷至今為止的方案都已經不管用的莉央，提及了一直以來都對外保密的「大姐頭演算法」。"
4128574415 = "為了使用大姐頭演算法，莉央再次前往了資料中心。\n聖亞和寧瑠責備了試圖獨自承擔一切責任的莉央，並決定要一起參加作戰。"
559738736 = "一行人終於抵達了搭載大姐頭演算法的房間。\n原來一切都是未來的計謀。眾人陷入了危機，大姐頭演算法也面臨被奪走的危險。不同於慌張的莉央和聖亞，寧瑠似乎因為早有計畫而顯得泰然自若。"
3964034247 = "眾人在老師的協助下度過了最大的危機。\n錯愕的未來與同夥們最終全都遭到了逮捕。"
2454044807 = "面對表示問題已經解決而打算離開的莉央，聖亞和寧瑠都對莉央沒能享受到博覽會感到遺憾。\n此時聖亞靈機一動，想到了不錯的理由，並向莉央提出了一個建議。"
4226564748 = "莉央為了回收存在於博覽會會場的「危險展品」而設計了作戰計劃。\n從莉央手中獲得了最先進裝備的聖亞，再次開始進行潛入任務。"
3409180479 = "莉央查獲了仍留在博覽會會場的未來殘黨。\n最終寧瑠將仍不放棄獲利，並試圖偷竊參展作品的他們一網打盡。"
3753568740 = "在警備變得更強的展示場裡，捕捉到了不明的動靜。\n因為保全級別已提高到無法單人潛入的程度，莉央打算同時派遣寧瑠和聖亞兩人一起調查情況。"
2190721227 = "博覽會會場裡的強化警備無人機發生了故障。這樣下去可能會傷及第二天早上的參觀者。\n莉央擬定了制服它們的作戰計劃，並派遣兩人潛入會場停止無人機。"
1147821016 = "老師提醒寧瑠除了潛入之外，也應該好好享受這次的博覽會。收到建議的聖亞決定參觀博覽會場。\n然而就在他純粹以觀眾的身分參觀時，一場完全意想不到的危機卻向他襲來……"
2551732620 = "研討會為因應兩人的頻繁潛入而採取了特別措施。\n不幸落入研討會陷阱的兩人，從危機之中展開了戲劇性的逃脫。"
4087116818 = "到了博覽會的最後一天，聖亞向之前遇見過的人們道別。\n可惜本該溫馨的告別場面，卻因為先前尚未抓到的「機器寵物」而再次陷入混亂。"
