1231517689 = "무작위 장비 카드를 일회용으로 [c]{param;SpawnCardNum}[/c]장 생성한다.\n\n\n[c][75b4c0][i]\"좋아, 강중유까지 전부 닦아냈어.\"[/i][-][/c]"
