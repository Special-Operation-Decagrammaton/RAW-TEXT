789625242 = "日向對於得到大家的幫助，任務卻失敗而感到自責。老師和憂還來不及安慰，日向就說要去承認自己的錯，然後奔出古書館。"
1115309119 = "It Serves You Right（２）"
2876222975 = "日向跑出去時，經典的修復作業結束了。憂擔心著日向，老師從憂手中收下經典，並開始往某處打電話。"
867066557 = "It Serves You Right（３）"
1143461639 = "出現在會場的是「七跌八撞團」和放學後的甜點部的學生們，憑藉著她們爭取時間，成功更換了經典。"
3261598258 = "It Serves You Right（４）"
1763744091 = "所有事情都結束後的古書館。老師前來感謝憂的幫忙，憂比起以前的態度，稍微能更直率了些。"
2477586931 = "不忍之心"
2232967509 = "為了成為正式的社團，忍術研究部決定協助百鬼夜行和格黑娜的交流會。\n然而這兩所學園的交流會想必無法風平浪靜地結束……\n面對眼前各式各樣的問題，少女們得出的答案究竟會是什麼呢！？"
3240499071 = "忍者襲來！"
3223702264 = "交流會START！"
