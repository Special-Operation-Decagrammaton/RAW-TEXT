1908728470 = "세이아는 변화한 자신들의 관계에 관해 이야기 한다. 자신들에는 티파티뿐만 아니라 선생님도 함께 포함되어 있는 듯하다."
2635062949 = "소녀에게는 시간이 필요해"
2438056735 = "업무 출장이니 괜찮다는 하스미를 설득하여, 함께 수영복을 맞추러 가자는 약속을 받아낸다. 어째선지 하스미는 일주일의 시간을 달라고 약속을 미룬다."
2114293561 = "결전의 날"
1066108086 = "약속 당일, 옷 가게에서 여러 수영복을 시착해 보는 하스미. 어째선지 하나같이 사이즈가 맞지 않는데……."
2390402921 = "해변에서"
604123590 = "선생님은 하스미를 데리고, 해변의 여러 장소를 돌아다니며 다양한 체험을 한다. 당황하면서도 일정을 즐기던 하스미는 다이어트의 여파로 쓰러지고 만다. 선생님은 그런 하스미에게 쓴소리하며 함께 식사한다."
4193449856 = "여름 하늘의 검은 새"
1701157930 = "저녁 늦게 하스미를 불러내어 불꽃놀이를 즐기는 선생님. 하스미는 오늘 있던 일정과, 불꽃놀이로 끝나는 것이 언젠가 자신이 적었던 위시리스트임을 눈치챈다."
771755189 = "비즈니스 서핑"
3687845316 = "우연히 이치카와 만난 선생님은 즉흥적으로 서핑 교실을 권해본다. 어쩌다 강사의 눈에 띄어 대회에도 출전하게 되지만, 당연하게 낙선한다. 이치카는 연습 하루 만에 우승할 리도, 해도 안 된다고 말하며 담담히 받아들인다."
3124259672 = "어노니머스 걸"
4085102234 = "밤바다에서, 이치카는 여러 생각을 듣게 된다. 은연중, 이치카는 다른 정의실현부원들과 다른 자신에 대한 고민을 드러낸다."
682336343 = "딥 앤 딥 페이크"
459649916 = "이전 대화를 잊어달라는 이치카를 향해, 선생님은 어떤 이치카라도 받아들이겠다고 선언한다. 그러자 이치카의 기색이 바뀌는데……."
2854468149 = "이미 본 거야"
2261893853 = "이치카와 만난 선생님은 저번과 완전히 동일한 대화를 이어 나간다. 당황하는 이치카에게, 선생님은 자신을 대할 때는 더 솔직해도 된다고 말한다."
1190427539 = "은밀한 부름"
630241773 = "자신의 텐트로 은밀히 선생님을 호출한 나기사. 누구에게도 들키지 말고 오라는 나기사의 요청에, 선생님은 긴장한 채로 텐트 안으로 들어선다."
3463352267 = "물 위의 나기사님"
507788461 = "우연한 계기로 서핑에 입문하게 된 선생님. 하지만 보드 위에 올라서는 것도 쉽지 않아 수없이 바닷속에 빠진다. 그때, 예상치 못한 마주침을 맞이하게 되는데……."
615810610 = "석양에 물드는 날개"
1648534831 = "갑자기 사라진 나기사. 선생은 노을 진 해변가를 가로지르며 나기사를 찾아 나선다."
4117624418 = "어로의 정취"
913912189 = "티파티 전용 수영장으로 선생님을 부른 나기사. 그곳의 수영장에는, 예상치 못한 광경이 펼쳐져 있었다."
2646804362 = "나도 알지 못한 내 모습"
3097604370 = "선생님과 미카는 이번 기회에 알게 된 티파티 멤버들의 새로운 면모에 대한 이야기를 나눈다. 자신은 한결같이 문제아라서, 뜻밖의 면모는 없을 거라 말하는 미카. 이에 선생님은 다른 의견을 제시한다."
2695761252 = "그때를 이어서"
4096458443 = "바닷가에서 만난 미카와 이야기를 나누던 선생님은 이전에 했던 둘만의 수영 수업을 떠올린다."
3789006869 = "해변에서 반짝이는 무언가"
3563536444 = "선생님은 해변에서 뭔가 줍고 있던 미카를 만난다. 예전에 모으던 주얼리와는 다르지만 조개껍데기도 나름 예쁘다며 웃는 미카에게, 여유가 생긴 것 같다는 이야기를 건네는 선생님."
178386077 = "걸음을 내딛기 시작한 나로부터……"
1675488441 = "어딘가 이상한 모모톡을 보고 해변으로 향한 선생님. 그곳에서 발견한 미카의 상태는……?"
3158159065 = "언젠가의 나에게"
2427872078 = "멋진 곳을 발견했다며 선생님에게 보여주고 싶다는 미카. 그림처럼 펼쳐진 풍경 속에서, 미카는 진심 어린 이야기를 꺼낸다."
1060031334 = "그래도 괜찮아"
1396743755 = "특제 샌드위치 도시락을 만들어 온 미카. 상당히 개성적인(?) 비주얼과 맛이지만…… 그래도 괜찮다."
873198059 = "마법의 그림"
2832478109 = "타로로 점을 쳐서 그림을 그리는 에리. 꽤 훌륭한 작품이 나온다."
580036155 = "마법의 모자"
4207047849 = "곧 실기 시험이 있다는 에리. 하지만 시험장엔 타로 카드는 물론 마법 모자도 소지할 수 없다. 결국 마법의 힘이 부족해 시험을 망친다."
269259800 = "마나 충전"
1093511634 = "침울해진 에리의 기분 전환을 위해 함께 거리로 나선 선생님. 에리는 그것을 계기로 자신이 회화를 시작한 계기를 떠올린다."
2775257787 = "마법의 화가"
1616638842 = "에리는 자신감을 키우기 위해, 사람이 많은 야외에서 선생님의 초상화를 그린다. 그렇게 자신만의 세계 창조를 이룬다."
2923077435 = "특별한 묘약"
3141729267 = "자신과 선생님은 전생부터 이어져 있었다고 주장하는 카노에. 특별한 묘약으로 기억을 되살려 주려 하지만 실패한다."
2137805982 = "소녀의 목소리"
3484255803 = "어느 날 걸려 온 귀여운 목소리의 전화. 알고 보니 카노에였다. 카노에의 전공은 성우였던 것."
3504361213 = "갑작스러운 초대"
569922205 = "카노에의 부탁으로 녹음을 도와주게 된 선생님. 다양한 목소리를 내는 카노에와 즐거운 시간을 보낸다."
3140711198 = "그건…… 내가 아니야"
692979208 = "어딜 가도 카노에가 보인다. 그것이 자신과 닮은 악령이라 말하는 카노에. 과연 진실은 무엇일까. 카노에의 진짜 정체는……?"
893011042 = "바다는 재미없어"
2775898959 = "모래, 바닷물, 파라솔…… 바다의 모든 것이 재미없다고 일부러 투덜거리는 미사키. 선생님은 그런 미사키에게 수영을 가르쳐 주기로 한다."
2316153298 = "모래성은 재미없어"
3214330542 = "이번에는 수영은 안 할 거라고 일부러 투덜거리는 미사키. 선생님은 그런 미사키를 잘 구슬려, 모래성 쌓기를 한다."
3725758721 = "일광욕은 재미없어"
371852196 = "다른 건 익숙해졌는데 햇빛만큼은 그렇지 않다고 투덜거리는 미사키. 선생님은 그런 미사키와 함께 일광욕을 하기로 하는데, 그만 소나기가 내리고 만다……."
2816193451 = "다이나믹 라이팅"
1264857227 = "당번으로 샬레에 방문하게 된 미요. 선생님의 배려로 간식을 먹으며 로맨스 소설을 쓰게 된다. 그런데 집필에 너무 심취한 나머지 자신이 쓴 대사를 하나하나 낭독해 버린 미요. 그리고 그 광경을 선생에게 들켜 버리는데……."
68793642 = "작가의 문턱"
2671887121 = "한 출판사로부터 자신이 쓴 로맨스 소설의 출간 제의를 받게 된 미요. 선생은 그 계약 현장에 따라간다. 그런데 알고 보니 그곳은 출간을 구실로 작가에게 사기를 치는 악덕 업체였다. "
2557024663 = "안 되나요?"
3519156172 = "선생을 빈티지샵 상점가로 불러낸 미요. 구해야 할 밀수품이 있으니 함께 찾아달라는 이유였다. 그런데 그 엄격한 와일드헌트에서 어떻게 외출 허가를 받은 것인지 선생은 궁금해한다."
2786778582 = "꿈의 끝에서"
1676221675 = "업무를 위해 와일드헌트를 방문한 선생. 도서관에서 남은 업무들을 해 나가던 선생은 문득 잠에 들고 만다. 그리고 눈을 떴을 때, 눈앞에는 미요가 서 있었는데……."
3343832747 = "잔해와 상상력"
2179798071 = "길거리에서 우연히 후유와 마주친 선생. 후유는 마침 미디어아트 행위 예술 공연을 막 마무리한 직후였다. 선생은 후유로부터 예술에 대한 후유의 생각을 전해 듣는다."
2022325598 = "달콤한 대가"
2395350468 = "무언가를 사기 위해 시장으로 외출한 선생은 또 우연히 후유와 마주친다. 후유와 달리 시장에서 원하는 물건을 찾지 못한 선생. 이에 후유는 은밀히 거래를 제안한다."
2248687503 = "영입 시도"
676795709 = "당번 근무일도 아닌데 샬레에 방문한 후유. 후유는 선생을 특수교역부의 고문으로 영입하기 위한 프레젠테이션을 진행한다. 그리고 선생은 결정을 내린다."
1930836459 = "후유의 공간"
2809147120 = "후유의 미디어아트 개인전을 방문한 선생. 후유는 선생을 직접 에스코트하며 작품에 대한 설명을 해준다. 그리고 마지막엔 전시실의 뒤편으로 조용히 선생을 불러들이는데……."
1502347368 = "돌이 말했어!"
4128293753 = "오늘은 리츠가 당번으로 방문하는 날. 그런데 시간이 지나도 리츠가 오지 않는다. 그렇게 리츠를 기다리다가 우연히 창밖을 내다본 선생은 조경석에 조각을 하고 있는 리츠를 발견한다."
796096285 = "이게 더 빨라!"
522223915 = "어느 날 갑자기 샬레 건물 외벽을 기어 올라와 샬레에 방문한 리츠. 리츠는 일전에 자신의 조각을 도와주다 옷을 더럽힌 선생을 위한 새 셔츠를 선물로 가져왔다."
2906320075 = "혼자는 안 돼요!"
4216584449 = "리츠와 옷 쇼핑을 하기 위해 상점가로 나온 선생. 그런데 길을 잘못 드는 바람에 사장이 손님을 협박하는 어둠의 상점에 발을 들이게 된다. 그렇게 꼼짝 없이 강매를 당할 위기에 처한 그때, 리츠가 나타나는데……."
3991968548 = "지하의 단둘"
1266463055 = "와일드헌트 지하에서 신기한 것을 발견했다고 말하는 리츠. 그곳에는 오래된 지하 저수조 유적이 자리하고 있었다. 선생과 리츠는 그곳에서 함께 놀다가 올라온다."
1176354905 = "또 만났네 레이사"
434693070 = "갖고 싶었던 마법소녀 의상을 구한 레이사. 하지만 그 옷에는 큰 결함이 있었는데……."
3111312789 = "씩씩해 레이사"
4144458315 = "마법소녀 관련 행사에 순찰을 가려는 레이사. 선생님도 함께 동행하기로 한다."
28470914 = "잘 어울려 레이사"
812871968 = "선생님은 레이사와 함께 옷을 쇼핑하러 간다."
2150011728 = "기특해 레이사"
773207179 = "다시 마법소녀 옷에 갇힌 레이사. 그럼에도 선생님과 함께 마을의 평화를 지킨다."
1588313903 = "트리니티의 마법 자경단"
4130055309 = "한밤중의 샬레를 돌아보던 선생님은 불이 켜진 탈의실을 보고 소등을 위해 들어가 보는데……."
3941215133 = "눈이 멀 정도로 당당하게"
4143536593 = "마법소녀 의상을 수선하러 가는 길에 불량배들의 기습으로 궁지에 몰린 스즈미. 마침 마주친 선생님과 함께 위기를 돌파한다."
1439493213 = "섬광불발행동"
276851656 = "자경단 활동의 일환으로 동인 행사에 선생님과 함께 참여하게 된 스즈미. 예상치 못한 인기 속에서 불량배들을 마주친다."
3995005634 = "소녀가 쫓아온 반짝임"
3528511121 = "선생님은 스즈미와 함께 유원지에 방문한다. "
2609778606 = "대장의 방문"
1761341386 = "선생님은 라브의 연락을 받고 환영하기 위해 뛰쳐나간다. "
2738523287 = "대장의 무게"
1476327715 = "선생님은 라브의 연락을 받고 뛰쳐나가서, 함께 쇼핑을 간다."
2583374591 = "대장의 강함"
2742294773 = "선생님은 라브의 연락을 받고 블랙마켓으로 뛰쳐나간다."
3932714589 = "대장의 손길"
3081987240 = "선생님은 샬레 근처로 찾아온 라브와 함께 여유롭게 산책한다."
2205914050 = "모두의 선배"
2952764417 = "스바루의 초청으로 아리우스 분교로 향한 선생님. 스바루는 선생님과 함께 아리우스를 둘러보다가, 학생들의 열띤 '아리우스식 토론'을 목격한다."
1122650249 = "첫걸음"
1189264743 = "스바루의 샬레 당번일. 스바루는 선생님과 정말로 아무렇지도 않은 대화를 나누다, 자신의 심정을 털어놓기 시작한다."
3342179099 = "사회 경험"
1014525569 = "스바루는 학교 방침으로 아르바이트를 하게 되고, 선생님이 그 현장을 방문한다. 그리고 '돌발 상황'과 마주하게 된다."
3576703723 = "저녁 강가의 하모니카"
1199266629 = "스바루는 아르바이트로 번 돈으로 하모니카 악보를 사서 선생님과 쇼핑을 하고, 강변에서 선생님을 위해 하모니카를 연주한다."
1525996144 = "아낌없이 주는 언니"
2647108977 = "스바루는 순찰 도중 후배들에게 간식을 나눠주다 자신의 몫까지 전부 줘 버린다. 선생님이 스바루를 챙겨 주려고 쇼핑을 나간 순간, 스바루는 '무언가'에 눈을 뜨고 만다……."
1280647772 = "평론의 대상"
2333773019 = "샬레의 당번으로 오게 된 타카네는, 선생님에 대해 평론하고자 한다……."
961567717 = "아이스하키"
3723581648 = "선생님과 함께 아이스하키 경기를 시청하는 타카네. 그런데 놀랍게도 아이스하키 경기의 결과만으로도, 붉은겨울에는 쿠데타가 일어나고야 마는 것이었다……."
1904269452 = "콩나물 축제"
3282413106 = "선생님에게 비장의 요리를 해 주는 타카네. 선생님은 오랜만에 마음 따듯해지는 식사를 하게 된다."
2937698410 = "밤하늘 아래의 공녀님"
4139348446 = "선생님은 타카네와 함께 오로라 사진 촬영 길을 떠난다."
2067127778 = "인프라스트럭처"
3737878541 = "대뜸 통신선 설치 현장으로 선생님을 초대한 야쿠모. 선생님은 그곳에서 야쿠모의 진면목을 보게 된다…"
1618303281 = "사업 계획서"
3547873849 = "샬레의 당번으로 오게 된 야쿠모. 선생님은 새삼 야쿠모가 말 상대로서는 최적이라는 사실을 알게 된다."
638150931 = "타임 테이블"
3324191113 = "선생님은 야쿠모와 함께 키보토스 열차 여행을 떠난다."
425263812 = "경영의 심리학 "
172823425 = "야쿠모는 출판물 판매 개선을 위해 선생님과 상담하던 도중, 선생님의 아이디어로 스노우 엔젤 사진을 찍게 된다."
3182648846 = "다시, 모델이에요!"
2967078244 = "어쩌다 보니 다시 한번 더 패션쇼에 모델로 서게 된 츠쿠요. 그런데 어쩐지 수상한 기운이 감돈다."
3929201993 = "또다시, 모델이에요……?!"
957721389 = "어쩌다 보니 미술 학원의 그림 모델을 서게 된 츠쿠요. 그리고 평소 나무 분장을 자주 해왔던 일의 덕을 톡톡히 보게 되는데……."
525821709 = "이, 이번에는 제 차례예요!"
348274659 = "그간 선생에게 받은 도움의 보답을 하기 위해, 츠쿠요는 선생을 불러 식사를 대접한다. 그러면서 모델로서의 자신에 대한 생각을 선생에게 풀어 놓는다."
2323781364 = "구, 구해주세요……!"
955441230 = "정말 마지막으로 패션쇼에 나가게 된 츠쿠요. 그런데 지각의 위험에 처하게 되고, 츠쿠요는 제시간에 도착하기 위해 전력으로 질주하기 시작하는데……."
1551348262 = "닌자 소녀는 치료가 필요해"
1127575116 = "영상 촬영 중 드레스가 찢어진 미치루. 수선을 위해 선생과 함께 수선집으로 향한다."
1001116658 = "닌자 소녀는 부끄러워!"
1730880438 = "수선이 끝난 드레스를 찾으러 다시 시장으로 간 선생과 미치루. 미치루는 동행해 준 것의 보답으로 선생에게 닌자 굿즈를 선물하는데……."
180243508 = "닌자 소녀는 비책이 필요해!"
4193845144 = "자신의 동영상 채널을 급성장시킬 비책을 듣기 위해 설명회에 참석한 미치루. 그런데 어딘가 수상하다."
1544401811 = "닌자 소녀는 트렌드에 뒤처지지 않아!"
3344102574 = "'패션'을 주제로 한 영상을 업로드한 미치루. 그런데 어쩐지 시청자들의 반응이 좋지 않다."
2037166503 = "미식연구회의 기묘한 하루 1"
2983636062 = "게헨나의 학원 식당을 폭파한 후 도망치던 미식연구회는 공원에서 트뤼플 버섯을 발견하지만, 뒤쫓아 온 선도부에 의해 체포되고 만다."
2083342772 = "미식연구회의 기묘한 하루 2"
1334832385 = "미식연구회 학생들은 선도부에게 트뤼플 버섯을 빼앗기고 유치장에 갇힌다. 그곳에 다른 이유로 갇혀있던 선생님은 미식연구회로부터 트뤼플을 감쌌던 속옷 천을 받아 들었다가 히나로부터 오해를 받는다."
729409175 = "편견 없는 맛"
3942326675 = "밀레니엄의 베리타스 연구실에 방문한 미식연구회 학생들은 하레로부터 각자의 미각이 어떤 상태인지 듣게 된다. 그리고 이즈미의 입맛이 예상했던 것보다 더 이상하다는 것을 알게 된다."
2115387183 = "급양부 습격 사건"
2992609245 = "미식연구회 학생들은 맛없는 급식에 대해 항의하러 급양부를 방문했다가 열악한 급양부의 실태에 대해 알게 된다. 미식연구회 학생들은 급양부를 돕기 위해 여러모로 노력하지만 오히려 결과적으로는 후우카를 방해하고 만다."
197817924 = "Cleaning&Clearing"
352914431 = "임무 완수와 상관 없이 늘 주변을 쑥대밭으로 만들어버리는 C&C에게 유우카가 찾아와 영수증을 내밀며 주의를 주는데…"
2026257102 = "Maid&Made 1"
3467705269 = "상가 축제를 부흥시키기 위해 에이전트가 아닌 메이드로서의 활동을 부탁받은 C&C. 부장인 네루는 거절하려 했지만 아스나가 먼저 임무를 수락해버리고, 어쩔 수 없이 메이드 카페에서의 활동을 시작한다."
4112079221 = "Maid&Made 2"
2175543816 = "에이전트가 아닌 메이드 카페의 메이드로서 활동을 시작한 C&C. 하지만 예상했던 것과 달리 카페는 대박이 나버리고, 급기야 전업 메이드 카페 제안까지 받게 된다."
3585549647 = "회장 동지는 언제나 옳다 1"
1295817962 = "어느 날 체리노는 모모프렌즈의 캐릭터- 페로로의 유명세에 대한 소문을 듣고, 마리나에게 페로로를 붉은겨울 학원에 편입시키라는 명령을 내린다."
3552803815 = "회장 동지는 언제나 옳다 2"
360090070 = "현실에 존재하지 않는 캐릭터를 편입시킬 수 없었던 마리나는 노도카를 납치하여 페로로 흉내를 내라고 강요한다. 마리나의 가혹한 고문(?) 끝에 노도카는 페로로 흉내를 내기로 한다."
1279819101 = "회장 동지는 언제나 옳다 3"
1812920356 = "약속 당일. 페로로 탈을 쓴 노도카를 본 체리노는 페로로의 모습을 보고 크게 실망하며 숙청 명령을 내린다. 이에 분노한 노도카와 마리나는 또다시 혁명을 일으킨다."
4232821938 = "GUNS N' PEPPERS 1"
3961351848 = "엔지니어부 학생들이 총기에 차바스코 소스 분사 장치를 달자는 엉뚱한 아이디어를 떠올리고, 바로 제작에 돌입한다."
2227297923 = "GUNS N' PEPPERS 2"
306427386 = "엔지니어부는 총기의 개조를 성공적으로 끝마치지만, 곧 자신들이 개조한 총기가 네루가 맡겨놓은 SMG라는 사실을 깨닫게 된다. 네루가 총기의 이변을 알아차리지 못하도록 코토리와 히비키가 네루에게 따라붙는다."
3947244639 = "GUNS N' PEPPERS 3"
323660726 = "코토리와 히비키는 기지를 발휘하여 네루가 방아쇠에 손을 대지 못하도록 저지하지만, 네루에게 원한을 가진 헬멧단 단원이 난입하며 총에 설치한 차바스코 분사 장치가 들통나고 만다."
295379881 = "Trouble & Trackers 1"
3812652621 = "신체검사 결과가 마음에 들지 않게 나온 마키는 하레와 코타마를 설득하여 학생기록부의 서버를 해킹하기로 한다."
1511095324 = "Trouble & Trackers 2"
3761143871 = "코타마의 도청장치와 하레의 드론을 사용하여 성공적으로 학생기록부를 해킹한 마키는 자신의 입맛대로 신체검사 기록을 조작하기 시작한다. 그러나 그때, 누군가가 마키의 컴퓨터에 역해킹을 시도하고 마키는 엉겁결에 실수로 신체검사 기록을 SNS에 업로드하게 된다."
34701853 = "Trouble & Trackers 3"
476829342 = "베리타스의 부원들은 의문의 해커에 맞서 분투하지만, 끝내 해킹 싸움에서 이겨내지 못하고 도망친다. 그날 저녁, 베리타스 멤버들은 세미나에서 돌아온 치히로와 이야기를 나누다 자신들이 싸웠던 상대가 다름 아닌 베리타스의 부부장이었음을 깨닫는다."
120203470 = "좌충우돌 급양부의 위생관리평가 1"
1383531332 = "게헨나 학생 식당의 위생평가 날. 식중독에 걸린 평가관을 대신하여 선도부의 이오리가 게헨나의 학생 식당을 방문하고, 미식연구회의 이즈미도 난입하며 식당에는 전운이 감돌게 된다."
516387156 = "좌충우돌 급양부의 위생관리평가 2"
2522148702 = "이오리의 엄격한 평가에도 불구하고 급양부는 위생평가에서 만점을 받지만, 주리가 만든 오렌지 주스를 마신 이오리는 어째서인지 식중독으로 쓰러진다."
93471046 = "무인 병동의 유령 씨 1"
1430687847 = "봉사 활동을 위해 종합병원을 찾은 하나에와 세리나는 4층의 무인 병동에서 귀신이 나온다는 소문을 듣게 된다. 하나에는 환자들의 불안을 덜기 위해 귀신의 정체를 밝혀내자고 권하고, 두 사람은 심야의 무인 병동으로 향하게 된다."
2642060983 = "무인 병동의 유령 씨 2"
2770525320 = "4층의 무인 병동에 나온다던 유령의 정체는 사실 혼란을 틈타 병원에 잠입한 도둑이었다. 하지만 이 사실을 알 리 없는 하나에와 세리나는 유령에게 총을 난사하고, 소동이 벌어진다."
2650108855 = "무인 병동의 유령 씨 3"
3402866614 = "마침내 유령의 정체를 알아낸 하나에와 세리나. 가짜 유령은 두 사람이 방심한 틈을 타 금고를 훔쳐 달아나려 하지만, 멸균기를 잘못 건드려 폭발에 휘말리게 된다."
1957853520 = "정의실현부의 휴무일 1"
2774156226 = "정의실현부는 납치당한 트리니티의 학생을 구출하던 중, 츠루기의 폭주로 인해 범인에게 과도한 부상을 입히고 만다. 티파티의 멤버, 나기사는 이 같은 일이 재발하지 않도록 정의실현부 멤버들에게 다른 동아리의 부활동에 참여할 것을 지시한다."
1514304045 = "정의실현부의 휴무일 2"
2293307933 = "티파티의 지시로 다른 동아리의 활동에 강제로 참가하게 된 마시로와 하스미는 트리니티 학원 특유의 고상한 분위기에 쉽게 녹아들지 못하고 불편해한다. 하지만 정작 괴짜인 츠루기는 다른 학생들의 불편한 기색을 알아차리지 못하는 바람에 혼자서 좋은 시간을 보낸다."
2902345591 = "선도부 정기 주간 회의"
3509381799 = "평소처럼 선도부 주간 회의를 진행하는 히나와 아코. 화수분처럼 늘어나는 게헨나 학원의 크고 작은 사건들에 히나는 금세 지쳐버리고 만다."
1347893224 = "선도부 비정기 회계감사"
111000390 = "만마전의 마코토는 트집을 잡아 기습적으로 선도부의 회계감사를 실시한다. 말도 안 되는 이유로 선도부의 예산을 전부 깎아버린 만마전. 그렇게 마코토는 더는 까불지 말라며 선도부에게 승리를 선언하지만. 뒤늦게 사정을 알게 된 히나가 만마전을 박살낸다."
1561190591 = "여자 고교생의 일상"
1753763599 = "디저트 카페 앞에서 모이기로 한 방과후 디저트부의 부원들. 먼저 도착한 요시미와 카즈사, 아이리는 나츠를 기다리며 잡담을 나눈다."
175952112 = "늘 이런 식입니다"
1512342827 = "연휴를 맞아 각자의 계획을 이야기하는 방과후 디저트부 부원들. 나츠는 또 엉뚱한 계획을 늘어놓지만 아무도 들어주지 않고, 결국 홀로 계획을 실행하다 모두를 끌어들인다."
2034339829 = "호명하는 사람들만 남는다 1"
2749895310 = "아야네가 구해온 아르바이트로 체육관 청소를 하러 가는 대책위원회 위원들. 하지만 체육관의 상황은 예상과 달랐고 교전으로 이어진다."
857397530 = "호명하는 사람들만 남는다 2"
204891356 = "동아리실에서 다른 부원들을 기다리던 아야네는 체육관 측으로부터 의외의 결과를 듣는다. 돌아온 부원들은 변명할 시간도 없이 아야네에게 혼이 난다."
888295171 = "건전하지 못한 사업계획"
635564897 = "지인에게서 좋은 사업 기회가 있다는 말을 들은 아루는 흥신소 멤버를 이끌고 트리니티 학원의 사업설명회를 찾는다. 하지만 알고 보니 그 사업설명회는 다단계 사기였고, 분노를 참지 못한 아루는 사업설명회를 박살낸다."
651331101 = "일단은! 마츠리부 정례회의!"
3714223389 = "다음 마을 축제 준비를 위해 회의를 시작한 시즈코와 피나. 하지만 수행부의 부원들이 난입하며 회의는 엉망진창이 되고야 만다."
1192778156 = "다시 한번! 마츠리부 정례회의!"
4080246389 = "휴일 정례회의에 모인 마츠리부 학생들. 시즈코는 여러 엉뚱한 의견들을 기각시킨다. 그때 우미카가 버드나무 축제라는 것을 제시하고, 시즈코는 우미카의 아이디어에 감탄하며 즉시 축제 준비를 지시한다."
2314201138 = "수행부의 홍보 영상을 찍자! 1"
2969367150 = "공모전 참가를 위해 수행부의 홍보 영상을 찍기로 한 카에데. [USERNAME] 선생님의 조언을 따라, 카에데는 직접 자기가 동아리에서 활동하는 영상을 찍기로 한다."
117197848 = "수행부의 홍보 영상을 찍자! 2"
