3042426557 = "각자의 사정"
1949613221 = "각자의 위치에서, 서로의 입장을 지키기 위해 최선을 다하기로 다짐하는 사람들. 과연 게헨나 학생들의 수학여행은 성공적으로 마무리될 수 있을까?"
