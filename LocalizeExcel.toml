2738269747 = "เมื่อสถานการณ์คลี่คลายลง สมาชิกคณะกรรมการจัดงานก็แยกกันไปทำ\nธุระส่วนตัวของแต่ละคน ฮาสุมิออกไปลาดตระเวนอีกครั้งและบังเอิญเจอ\nกับกลุ่มนักเรียนสหพันธ์เฮียกคิยาโคที่กำลังตกที่นั่งลำบาก เธอจึงตัดสินใจ\nเข้าไปช่วย"
