3002018408 = "Moe visits Schale for work. Sensei asks Moe not to touch anything and leaves. However, she finds a big red button near the desk and presses it. The button is for the emergency shower, and Moe gets soaked in the pouring water."
1642348824 = "Phase Line"
1120991900 = "Sensei visits Kousagi Park to help organize supplies at Moe's request. Unlike usual, Moe keeps her cool even in the presence of explosives. When Sensei asks why Moe is acting different from her usual self, she reveals what she's been thinking."
1230115544 = "Make-Up Work and Dessert"
3289098080 = "At Kazusa's request, Sensei heads to a cafe. Kazusa asks Sensei to help her study for her make-up exam, and then they share desserts and drinks as a reward."
446030069 = "This Is the After-School Sweets Club"
4084141263 = "Sensei runs into Kazusa waiting at a bus stop. Kazusa shares her drink and macarons with Sensei while chatting."
2391083433 = "Bad Timing"
3086413285 = "Sensei visits a convenience store to buy lunch and finds Kazusa there, but she avoids Sensei. Finally, she explains she avoided Sensei because she wasn't wearing makeup. Sensei assures her that she has nothing to worry about, and Kazusa is taken aback."
2135718946 = "The Cat's Tongue"
2285653641 = "Kazusa suddenly visits Schale. She had bought some fondant au chocolat, but she has a hard time eating hot food, so she offers it to Sensei instead. Sensei tells her that someone who can't eat hot food is said to have a \"cat's tongue,\" but Kazusa doesn't understand what that means."
432381563 = "It's not Kokona. It's Instructor Kokona!"
3385540554 = "Sensei visits the Plum Blossom Garden, and Kokona promises to show off how good of an instructor she is. However, Kokona can't maintain her dignity as an instructor in front of other students."
377170606 = "Not a Girl, but a Lady!"
1059419902 = "On the way back to Schale after finishing work at Shanhaijing, Sensei runs into Kokona. She says to Sensei that she will give Sensei a chance to escort her. Kokona shows interest in the coffee Sensei bought and tastes it with enthusiasm, but hates the strong taste."
3736806188 = "I Said I Hate Them!"
661652410 = "Sensei meets Kokona in the city. She's thinking about what she has to do to make others call her an instructor. Sensei advises her that if she can eat carrots, others will call her an instructor."
1888100604 = "...Just This Once, Really!"
3679415033 = "Kokona visits a restaurant that specializes in carrots with Sensei. Although Kokona is repulsed by the carrots she sees everywhere, she succeeds in eating them and they tasted better than she expected."
2090247752 = "A Captain's Fashion Passion"
3930023682 = "Sensei stops by the Engineering Department's workshop to return Utaha's lab coat she left at Schale, only to discover her working in a sailor-style uniform instead. Utaha delightedly remarks that donning the sailor-style uniform she wore during field day fills her with a renewed passion for her work."
492464550 = "A Captain's Moving Performance"
3765296963 = "Sensei pays a visit to Millennium to view a demonstration of Utaha's new cheer bot. Utaha showcases a deployment of bots used in a large-scale mass game."
4280790550 = "A Captain's Heaven-Piercing Cheer"
2043768612 = "Unable to complete the commissioned cheer bot within the promised time frame, Utaha decides to meet with her clients and cheer them on in person."
2208070431 = "A Captain's Soul of Flaming...Passion?"
1265896640 = "Concerned by the Engineering Department members' lack of energy, Utaha invites Sensei to karaoke and performs a cheer song that she claims to have composed herself. Sensei is flabbergasted by the song's unexpected lyrics."
3318658421 = "The Secretary is in the Details"
436248350 = "Noa reports to Schale on duty. Sensei says there aren't any particular tasks that need to be done and tells her to sit back and relax, so Noa decides to do what she does best and faithfully record Sensei's daily routine instead."
465908990 = "The Secretary Becomes the Teacher"
2289102291 = "To try and break Noa's composure, Sensei suggests spending their time on duty observing each other's behavior instead. But observing and recording each other proves to be more difficult than expected, and Sensei is surprised by an unexpected question."
773232047 = "The Daily Life of Secretary Noa"
604699670 = "Sensei stops at a cafe after completing duties at Millennium and finds Noa there. She is surrounded by stacks of paperwork, and says she is appraising newly filed patents. The two of them discuss patents while going through the paperwork when Noa discovers one that looks particularly interesting."
3466815831 = "The Daily Life of Ushio Noa"
706439484 = "After their meeting is canceled on account of rain, Sensei heads to the Seminar meeting room to see Noa. Noa is visibly surprised by Sensei's visit. But Noa and Sensei have a splendid time together chatting about this and that and tracing words on a large glass window."
3426454651 = "A Meister's Hidden Habits"
4103016827 = "Sensei runs into Hibiki, who is choosing fabrics at the market. Hibiki says that she's selecting fabrics to put together a cosplay, and begins talking about her cosplaying hobby in great detail."
4119985251 = "A Meister's Moving Cheer"
1355940963 = "While Sensei is working a late night at Schale, Hibiki visits wearing a cheerleader costume to provide Sensei a little extra motivation. Hibiki cheers Sensei on enthusiastically, but soon realizes that something is wrong."
2694245452 = "High-Pressure Meister"
3127541435 = "Hibiki introduces a new invention in an attempt to motivate Sensei. The invention, which resembles a word processor, is equipped with a self-destruct feature that is activated if tasks remain idle for a certain period of time. Upon learning this, Sensei is extremely motivated to complete their work."
162351076 = "Sweet Dreams (Are Made of Pom-Poms)"
484928347 = "Hibiki presents an overworked Sensei with a new invention. Though it resembles an ordinary cheer tool, it also has the ability to play lullabies, and Sensei drifts off to sleep while listening to the lulling melodies playing from Hibiki's invention."
2702026288 = "Case 1. Sensei Does not Dream of Bunny Akane"
3571189559 = "Upon seeing Akane's MomoTalk, Sensei arrives at the room Akane is staying in and knocks. Akane appears at that moment, apparently not expecting to see them. Bewildered, Sensei makes an urgent departure."
4078232729 = "Case 2. Best to Rest"
4204404808 = "Tired and exhausted from trying to catch up on work, Sensei heads to the lounge. There they run into Akane, who asks if there's anything she can do to help, and she ends up lending a hand with cleaning. Afterwards, Akane asks if there's anything else she can do, but Sensei ends up falling asleep from exhaustion and Akane leaves quietly."
1635582478 = "Case 3. Bunny Study"
4058993158 = "Sensei sets aside his backlog of work to take a walk downtown and runs into Akane. Akane is wearing an eye-catching bunny girl outfit, and a speechless Sensei urgently leaves the area with Akane in tow. To Sensei's shock, they end up taking refuge in a bunny girl cafe."
482869814 = "Case 4. Secretary Service Straight to You"
607709933 = "While handling some overdue tasks at Schale, Sensei wishes aloud for some coffee and Akane suddenly appears, granting their wish. Sensei and Akane have a heart-to-heart, which helps Akane feel confident in herself again."
3585267607 = "Morning Jog"
1396278568 = "Sensei runs into Yuuka jogging on the park trail early in the morning. Yuuka is hard at work preparing for the field day being organized by Millennium. She says she prides herself on her endurance, but contrary to her claims, she gets out of breath rather quickly."
737635945 = "The Secrets of Scientific Cooking"
2573899798 = "Sensei hears that Yuuka is practicing her cooking and pays her a visit in the kitchen. Yuuka begins cooking with aplomb, but her confidence eventually gives way to multiple mistakes. After many twists and turns, she finally manages to make a bento."
2174568177 = "Rational Cheer Culture"
1860377927 = "Yuuka comes to Schale to handle official business and watches a live broadcast of Millennium's baseball club on TV. Yuuka claims that a proper fan should never lose their composure no matter the situation, but promptly fails to follow her own advice."
670142544 = "Sports Card"
3586706266 = "Yuuka visits Schale for work. She is tidying the absent Sensei's desk when she discovers a card printed with her likeness. It turns out to be a sports card produced by the Kronos School, but Yuuka is unaware of this fact and ends up having a small misunderstanding."
4024156221 = "An Unfamiliar Uniform"
3987667853 = "Mari requests a counseling session and Sensei goes to the Trinity Cathedral's vestry. Mari is waiting there in her tracksuit, and Sensei listens to Mari describe her anxiety over having to wear it instead of her Sister uniform."
1051695137 = "Sister on the Bench"
343809718 = "During the field day, Sensei cheers Mari on as she moves busily through the bustling crowd. Mari is thankful for Sensei's thoughtfulness and describes her never-before-felt feelings of joy."
2123351407 = "Mari's Repayment"
720252404 = "Sensei runs into Mari while walking through the Trinity Cathedral's private park. When Mari describes how the field day helped her shape a new perspective, Sensei is pleased. Sensei waits until Mari finishes her training, and then she sees them off to Schale."
1478340410 = "Well-Developed"
2793860415 = "Sensei responds to Hasumi's call. Hasumi is struggling to do up the zipper on her tracksuit. Hasumi gives up on her zipper and tries to focus on the paperwork for the field day with Sensei instead, but Sensei is the one who ends up getting distracted by Hasumi's outfit."
1830803246 = "Honeyed Lemons"
3363601715 = "Sensei heads to the kitchen at Hasumi's request, where she is making honeyed lemon jam. Sensei helps Hasumi to preserve the rest of the lemons in honey."
2317643333 = "Self-Care"
3356412026 = "Hasumi is on a diet during the field day, but her resolve wavers when she sees other students snacking. Sensei proposes to Hasumi that they eat the honeyed lemons instead. Hasumi tells herself she will only have a little bit, but eventually loses control and eats every last lemon."
1424445415 = "Proper Form"
2368675001 = "Sensei makes plans to exercise with Hasumi and heads to the gym. Hasumi and Sensei work out together while helping each other with their forms."
2829913152 = "The Tastes of a Genius Hacker"
2128267029 = "Knowing that it's Sensei's day off, Himari invites Sensei to her secret hiding place. There, the two of them relax and enjoy their free time together. Himari subsequently hacks into the school broadcasting system to play her song request, and the classroom starts to fill with Himari's favorite enka music."
1584830152 = "The Test of a Genius Hacker"
1591221981 = "Despite their best effort to meet up with Himari on time, Sensei ends up getting roped into all sorts of accidents. After just barely overcoming these setbacks, Sensei realizes that it was all planned by Himari in an attempt to test Sensei based on something she saw in a horoscope magazine. Upon learning the truth, Sensei reads Himari the riot act."
829552681 = "The Argument of a Genius Hacker"
711052487 = "Upon receiving a call from Himari about an emergency, Sensei hurries over to Millennium. Himari presents a gossip rag slandering Sensei, and Himari and Sensei put together a video in an attempt to clear the record. This video only ends up making things worse."
2037364016 = "The Delicate Semicolon of a Genius Hacker"
2533708593 = "Himari says she acquired a special treasure and presents Sensei with a limited-edition Frenzy MAX drink. She says she learned an even more delicious way to enjoy the beverage from Veritas members and attempts to demonstrate, but the can explodes and Himari ends up soaking wet. Sensei helps clean Himari up with a towel."
4205919598 = "Discreetly"
785035510 = "Sensei heads to the Former Institute after completing their duties at Red Winter Academy and runs into Shigure alone. Shigure explains that all of the drinks have frozen over due to the bitter cold and casually hands some vodka to a very shocked Sensei."
2971103393 = "Slyly"
3404545130 = "At Red Winter Academy, Sensei gets stranded while traversing the snowy mountains. Thankfully, Sensei is rescued by Shigure who happens to be passing through the area, and she thoroughly scolds Sensei for not listening to her advice. Afterwards, Sensei is safely brought back to Schale by Shigure on piggyback."
720127695 = "Intimately"
1882526035 = "Sensei invites Shigure downtown to repay her for their rescue. Though Shigure has a great time at the restaurant, she quietly mentions that there's another place where she feels more at home."
4186219493 = "Frankly"
273193773 = "Shigure visits the Schale kitchen to prepare a meal for Sensei, but the raw ingredients she brings leave Sensei speechless. Shigure continues cooking as she playfully insists on adding vodka to the meal, and Sensei eventually ends up taking over the cooking."
3572546902 = "Serina on a Holy Night"
3496257221 = "Sensei runs into Serina, who is giving out gifts to children in celebration of the Holy Night. Snow starts to fall and the night grows colder, so Sensei gives Serina a gift of her own."
2512788767 = "A Gift Prepared in Earnest"
2923297793 = "Serina secretly pays a visit to Sensei, who's on break, but they notice her before long. As thanks for the scarf, Serina presents Sensei with a comprehensive health kit and an acupressure session, and the two have a splendid time together."
2326049757 = "The Remedial Knights Experience"
1971996326 = "Sensei tags along on Serina's one-day Remedial Knights experience. Dressed in a Santa outfit for Christmas, Serina makes rounds through the hospital rooms while skillfully interacting with patients. When the day is done, Serina wants to know why Sensei decided to shadow her for the day, and Sensei answers that it was because of their interest in Serina and the Remedial Knights."
720184857 = "Naughty or Nice?"
1669203285 = "Hanae decides that one must become one with the spirit of Santa when donning a Santa outfit. While contemplating the true spirit of Santa, Hanae decides to start with a lie detector game for distinguishing the good little children from the bad."
69967909 = "Special Training! The Target? Santa!"
3605114321 = "Hanae continues her training to become a true Santa. Hanae and Sensei make rounds through Kivotos while practicing parkour."
2582704447 = "Waiting for Santa"
2787292054 = "Sensei is invited to Hanae's room, where Hanae has prepared stockings and snacks for Santa."
503073630 = "Important Things, Important Stuff"
675453541 = "Hanae and Sensei visit a shopping mall together to purchase gifts to hand out to everyone. However, all of Hanae's presents are health products. Worse, she gets involved in a conflict with some black market thugs. However, Hanae isn't afraid to turn some naughty children nice."
3867179911 = "Off the Rails. But Only Sometimes."
1185714622 = "Sensei meets up with Haruna to sample a variety of street foods for New Year's. Unfortunately, the dishes don't meet Haruna's high standards, causing Sensei to worry that she might start demolishing food stalls. However, Haruna decides that while the food was not gourmet, she had a good time anyway. They continue to spend time together."
1122975317 = "The Means and the Ends"
1611910214 = "Haruna asks Sensei to go to the market for gastronomy research purposes. Many merchants are abuzz about the upcoming Snapper auction. Haruna joins the auction and wins the Snapper, and enjoys it at an omakase. Unfortunately, Haruna laments, it's not easy to find the ultimate flavor."
1306876513 = "The Four Elements of Gastronomy"
2915697252 = "Haruna asks Sensei to meet her for the ultimate gourmet meal. She explains that gastronomy isn't defined solely by the food. Haruna partakes in a meal with Sensei involving all the elements of gastronomy that she believes are important."
799816248 = "New Year, New Clothes! New Me?"
3455411055 = "Sensei visits L'Oiseau Bleu, where Junko has a part-time job. After seeing Junko dressed up in a kimono, they order every single item on the menu. Although Junko scolds them for having so many leftovers, she doesn't say no when they asks her to eat with them."
934247381 = "More Food, More Fun! More Me?"
527805565 = "After receiving her paycheck, Junko calls Sensei to the festival. The two enjoy new year's dishes together, but Junko turns blue from overeating."
4015908374 = "Gimme Warmth"
1228012568 = "Before the holiday ends, Junko comes to find Sensei in Schale. They go to see the Christmas tree and wander about the shopping complex together. When Junko's stomach growls, the two share dango and wish for a happy new year."
2198382498 = "What's Your Wish?"
41944175 = "Sensei visits the Gehenna Student Dining Hall to see Fuuka, who's hard at work even during the holidays. Although initially surprised by Sensei's unexpected visit and request to spend time together, Fuuka accepts Sensei's offer and enjoys herself."
735524095 = "Even If It's a Little Off"
751489679 = "Sensei arrives at the Student Dining Hall after being invited by Fuuka, who is waiting in her kimono for New Year's. To thank Sensei for their hard work, Fuuka treats them to New Year's Eve noodles and they wish each other a happy new year."
3464653551 = "Keep It Slow Like So"
1290967402 = "On the last day of the holidays, Fuuka is still busy with School Lunch Club business. Sensei arrives to whisk her away and takes her to all sorts of places. When she understands that Sensei is trying to create a special holiday memory for her, Fuuka gives them her most heartfelt thanks."
2747740649 = "Far and Wide"
4046348442 = "Sensei goes on patrol with Mine. They're faced with a host of troubles. Mine is determined that she must be more decisive in order to save lives. After the patrol, Mine asks Sensei to join the Remedial Knights."
155199846 = "The Realm of Hobbies"
1992573947 = "Mine invites Sensei to her place to show them her collections. Mine attempts to explain what her various medical supplies are for, but Sensei still seems confused. One thing leads to another until Mine is insisting that Sensei should wound her to help demonstrate her point, and they just barely talk her out of it."
4103404645 = "Afternoon Tea"
381585519 = "Mine invites Sensei to enjoy tea time with the Remedial Knights. She ends up venting to them about her many worries."
1869515898 = "Where Aid Is Needed"
1542046764 = "Mine gets a call while she's working with Sensei. It's a request for aid, coming from a civilian in the Forest of Kivotos. She and Sensei head directly to the Forest of Kivotos, and spend the whole day looking, but with no luck. Sensei and Mine end up spending the whole night in the forest."
3733720402 = "Back to Daily Life"
4075198640 = "Sensei goes to Trinity in response to a call from Mika. They go shopping together, but Mika's card goes over its limit. Mika panics when her card is declined, until Sensei pays for her."
1824494665 = "Volunteer Activities "
3962654178 = "Mika is weeding a field as part of her community service. Sensei visits and offers to help. Despite her embarrassment, Mika finds herself enjoying spending time with Sensei."
2847450936 = "The Princess of the Attic"
2413528587 = "Mika invites Sensei to her dorm. Unfortunately, it's time for the nightly roll call, and Sensei has no way to sneak out. Instead, they must hide in Mika's room, and Mika and Sensei share a moment together."
1481077183 = "Wounds and Scars"
120262361 = "Sensei gets a call from Mika and rushes to Trinity. They find her holding a swimsuit that bullies have ripped up. Sensei comforts Mika, and suggests that they hold private swimming lessons for Mika."
2390792070 = "Morimori Stack"
238376327 = "Sensei visits Megu and finds her looking at Morimori, a quickly melting ice cream treat. It turns out that Megu was using her flamethrower to thaw it, and Sensei suggests that she wait a bit instead."
997833605 = "How to Relax"
3179826887 = "Megu is on standby, and getting ever more anxious about it. She wishes for something to do. Sensei distracts Megu with her Kendama toy."
70172580 = "The Business of the Hot Springs Department"
4184469458 = "Sensei treks out to a mountain range at Megu's behest. They find Megu digging a hot spring for Sensei."
3903491499 = "Ramen and Hot Springs"
297876452 = "Late one evening, Megu shares ramen and stories with Sensei. Once the ramen is done, Megu runs off to develop hot springs, as always."
1551137325 = "The Director's Rumors"
3048088134 = "Kanna visits Schale for an assignment and helps Sensei take care of some work. Due to her strict reputation among students at Valkyrie, Sensei is a bit nervous about not offending Kanna. Sensei makes a series of mistakes despite their effort."
3236770699 = "The Director's Duties"
1619463056 = "Sensei joins Kanna during a stakeout to offer help. When they realize that Kanna has been skipping meals until late at night, they try to offer her all sorts of food, but Kanna declines all of Sensei's suggestions."
1028219097 = "The Director's Rest"
1512296132 = "Other students propose a celebration for a successful operation, but Kanna politely declines. Later that evening, Sensei stops by a food stall for a late-night snack and runs into Kanna, who is enjoying a meal by herself."
692249735 = "The Director's Dream"
4271209454 = "The quiet of an ordinary afternoon is interrupted when Kanna calls Sensei. Sensei steps in to help Kanna, who is struggling to comfort a lost child. After a chaotic day, before they part ways, Kanna confides in Sensei about something she hasn't told anyone else."
3258439759 = "Easily Misunderstood"
3227620313 = "Sensei worries over an ambiguous MomoTalk that Sakurako sent them. They go to check in, but there wasn't anything to worry about. Sensei realizes that Sakurako is easy to misunderstand."
2902921354 = "Catching Up on the Trends"
4239335081 = "Sensei finds Sakurako deep in thought in front of an accessory store in the shopping district. Suddenly, the store's door opens and the owner whisks a flustered Sakurako inside. Sensei follows her to help."
2853082550 = "Walking the Halls "
1413282267 = "In response to a call from Sakurako, Sensei finds themself in an obscure hallway in the cathedral. They walk the halls with Sakurako and have a heart-to-heart."
2382324779 = "An Unexpected Hobby"
4092134933 = "Sensei goes to see Sakurako after she requests counseling. Sakurako asks Sensei what their hobbies are."
399214349 = "Proof of Good Intent"
3113818934 = "Sensei goes looking for Sakurako after she asks them for help. It turns out, though, what she wanted was Sensei to put in a good word for her with the other Sisters and allay their suspicions. Unfortunately, misunderstandings continue to pile up around Sakurako."
2003923680 = "Daily Chores"
1607965188 = "Early one morning, Toki arrives at Schale. Due to a complicated series of events, Toki has a free day and has decided to spend it with Sensei. After a chaotic day following Toki's requests, Sensei feels a growing concern for their future, now that Toki is firmly a part of it."
4288888721 = "Academy Life"
322319486 = "Toki receives a warning that she could flunk due to her poor attendance record. Sensei does their best to help Toki settle into a normal academy life, but everything still feels alien to her."
1375907566 = "Concerning Hobbies"
3410652719 = "Sensei finds out that Toki spends her weekends doing nothing and wandering aimlessly. They do their best to find Toki a hobby of her own, testing out various activities with her, but nothing seems to stick."
284991053 = "A Day's Tardiness"
3181693318 = "Toki tells Sensei that she's running late. Sensei, concerned about her uncharacteristic behavior, visits her workshop to look for her. She's surprised by the visit, and explains to Sensei her attempts to become the most powerful maid with the most thorough equipment maintenance."
62419462 = "Token of Connection"
2598613321 = "In a manner very like her, Toki enters the scene unexpectedly and gives Sensei something, calling it a \"Token of Connection.\""
3221453657 = "Afternoon Tea Time"
1575926616 = "Sensei attends a tea party with Nagisa, and brings along a bottle of black tea. Nagisa tries it, intrigued by the unfamiliar brand, but she can't stand it and runs away."
3617335172 = "Proper Speech"
3261002897 = "Nagisa is concerned about reports of inappropriate language used by Trinity students. She is confident that she has always practiced proper speech, and can remain dignified in any situation. However, a series of reports about Trinity students being outrageously out of line causes her to explode."
578805062 = "The Rich Flavor of Black Tea"
2073459542 = "Nagisa invites Sensei over to try a new batch of tea leaves, but what arrives is not the kombucha she wanted, but kelp tea. After much deliberation, Nagisa serves the kelp tea and pretends everything is fine."
1365827293 = "Let Them Eat..."
1448253096 = "Sensei stops by a store to buy bread, only to find them sold out. They run into Nagisa, who offers to share a custom-ordered cake she picked up from another shop instead."
2105366932 = "The Occupant of the Self-Reflection Room"
214951891 = "Sensei runs into Koyuki in Millennium's Self-Reflection Room. Despite the room's disciplinary purpose, Koyuki seems to be enjoying herself, decorating the room to her liking."
2113534752 = "Pandora's Box 1"
4241439597 = "Koyuki visits Schale for an assignment. After chatting for a while with Sensei, Koyuki's interest in Schale grows. Sensei, noticing this, is worried. Koyuki goes back to Millennium, but with a secret plan in mind."
4083323257 = "Pandora's Box 2"
2414226696 = "Koyuki infiltrates Schale in order to uncover its secrets, but Sensei catches her. Koyuki escapes into Schale's residence hall, and finds some \"weird books.\""
2351755493 = "Expected Behavior"
2882100059 = "Sensei finds Koyuki in the arcade, in a rage after repeated losses. Koyuki explains why she enjoys luck-based games so much, and when Sensei teases her for it, she challenges them to a wager."
1850258284 = "Because It's More Fun"
3499702459 = "Sensei finds Koyuki hunched over in the grass. Hoping to improve her luck, Koyuki is looking for a four-leaf clover. Sensei stops to help and, after a while, the two manage to find one."
505934790 = "Rights to Deceive"
619630983 = "Koyuki asks Sensei to find her lost coin. The coin that they find reveals insights into Koyuki's secret past."
168056968 = "A New Misunderstanding"
2953254523 = "Sensei spots Kayoko buying a kimono in a store. The shop clerk mistakes her for someone high up in the underworld. Sensei clears up the clerk's misunderstanding and recommends a kimono fits her well."
3556812176 = "Bells Ringing in the New Year"
1261302160 = "On the last day of the year, Sensei and Kayoko visit the temple to participate in an end of year bell ringing ceremony. Unfortunately, the event had been canceled due to the bell tower's poor condition. They miss the last train that would take them back but greet the New Year with the sound of a bell as the first train of the morning pulls into the station."
1594158572 = "Gamju and the Cat"
585940394 = "Sensei and Kayoko visit a temple to buy an amulet. They drink warm gamju to warm their cold bodies. The sound of a cat crying in the distance causes Kayoko to leave the room for a moment, and when Sensei belatedly follows her, they find her happily playing with the cat."
1021018790 = "How to Reduce Stress"
1831690994 = "Sensei has been busy since the beginning of the New Year. Kayoko suggests going to see a wagakki concert to help them relax. Sensei expects a peaceful performance, but instead, Kayoko introduces them to an intense, heavy metal-tinged wagakki performance."
1676776936 = "Making Kadomatsu"
2926389252 = "Sensei visits Haruka for New Year's, but runs into her on the way, searching for materials to make kadomatsu. Sensei tells her that it's the intentions that matter most, and Haruka makes them out of weeds that she's grown herself."
4150553585 = "Seasonal Dressing"
882190145 = "Sensei is worried about Haruka wearing a short yukata even though it's winter. Although she won't accept a warmer one, they buy her dessert and get her to promise to be careful."
1010615852 = "Cold Wind, Warm Sun"
902806983 = "Sensei visits Haruka, worried about her and her weeds in the cold weather. They talk about resilience and care, and Sensei buys Haruka a warm meal."
1362773471 = "Hyakkiyako's Ambassador Kaho"
3015917284 = "Kaho gives Sensei a presentation on the tourism industry, but their reaction is not what she expected. Kaho realizes that her email didn't get sent properly. Sensei comforts an apologetic Kaho, and she picks herself up and starts the presentation anew."
813536488 = "Even More Presidential Than the President, Kaho"
1268253443 = "Sensei meets Kaho, who is finishing some work in the Yin-Yang Club's club room. Just as Kaho is about to leave to show Sensei around Hyakkiyako Academy, the students of Hyakkiyako Academy begin to arrive. It's evening when they finish helping the Hyakkiyako Academy students with their business, and so they decide that the tour will have to wait until next time."
3589056262 = "Kaho's Perfect Escort"
1155603011 = "Kaho wants to make amends for last time's failure, so she invites Sensei to Hyakkiyako once again. Kaho introduces Sensei to the charms of Hyakkiyako, but is swayed by various temptations. It turns into evening time before they realize, and Sensei enjoys a date with Kaho."
1779236823 = "Kaho's True Business Plan"
44237873 = "In response to Kaho's call, Sensei visits the Yin-Yang Club's lounge, where they see Kaho organizing some specially released promotional merch."
2501910877 = "Love Decoration"
1244005463 = "While cleaning the Yin-Yang Club lounge with Sensei, Kaho carefully wipes the certificate of appreciation from the Hyakkiyako students. She then tells Sensei why the certificate is important."
4137176117 = "Maid vs Pinch!"
