550001274 = "남은 것"
3997939746 = "아리우스 스쿼드는 미카를 간신히 제압하지만, 미카는 아리우스 스쿼드와 사오리에 대한 분노를 내보이고 사라진다. 스쿼드는 다시 바실리카로 향한다."
2688011438 = "지하 회랑"
2182299148 = "회랑의 통로에서 갑자기 기둥이 무너져, 사오리와 선생님을 비롯한 나머지 아리우스 스쿼드 멤버들이 떨어지게 된다. 혼자가 된 사오리 앞에 나타난 것은 다름 아닌 미소노 미카. 사오리는 미카와 1대1로 맞서게 된다……"
3611644228 = "대결"
