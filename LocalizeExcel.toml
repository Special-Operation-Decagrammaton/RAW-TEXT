1051527092 = "눈 내리는 온천"
2252517002 = "외딴곳에서 온천을 개발하는 온천개발부. 메구와 카스미는 처음 만났을 때를 회상한다."
3690331433 = "선물과 선물"
3902471118 = "선도부장 히나를 만난 메구. 메구는 카스미가 알려준 대로 히나에게 무언가 '선물'을 건네주려는데……"
2448188854 = "단맛과 노스탤지어 1"
667882399 = "과로로 인해 쓰러지게 된 나기사. 이런 나기사를 위해 세이아와 미카는 휴식 여행을 기획한다. 홍차를 좋아하는 나기사를 위해, 목적지는 산해경에 위치한 고급 홍차 공방으로 정해진다. "
3407756720 = "단맛과 노스탤지어 2"
