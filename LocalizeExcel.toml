2046334446 = "平凡的事"
1314809181 = "老師的反駁讓棕櫚惱羞成怒，打算出手攻擊阻礙自己的老師，此時紫挺身阻止了他。少女選擇成為百花繚亂的紫，而非勘解由小路家的紫，並與隨後抵達的蓮華、桔梗一起投入和「無貌的形代」之間的戰鬥。"
3026137772 = "平凡的事"
2364647164 = "就在蓮華、桔梗、紫被幻魎百物語逼得身陷險境的時候，名草站了出來。面對棕櫚的責難，名草說自己不想重蹈當時的覆轍，再次失去重要的人。具備百花繚亂「象徵」的名草出手打倒棕櫚，讓他陷入了絕境。"
1918408273 = "現在，向你"
3492807103 = "最終棕櫚落荒而逃，紫對能再次見到大家一事表示感謝，旋即又提起最初的目的，向名草申請「繼承戰」。雖然紫在轉眼間落敗，但他依然神情開朗，說要和大家一起回到百花繚亂。"
2816211461 = "帶著願望"
3813773295 = "一連串的事件結束後，百鬼夜行重新找回了平靜。儘管各地還有事情尚未了結，但大家仍團結一心，將飽含心願的燈籠隨水漂洋。另一方面，藏身於黑暗之中的花鳥風月部部長──雛罌粟露出了耐人尋味的微笑。"
1478099875 = "觸碰不到的衣角 "
2417637268 = "回想起在雪原中錯失菖蒲的事，名草夜夜被惡夢糾纏。或許因為惡夢，手臂的疼痛也日益加劇。"
2900210047 = "新的怪談 "
1286307520 = "正當雛罌粟獨自享受風雅時，花鳥風月部迎來了一位新成員。另一方面，懷抱對名草復仇之心的棕櫚，想出了能對百花繚亂報復的新方法。"
2234435405 = "新的祭典（１）"
2388749549 = "在「和樂祭」即將到來之際，眾人正全力準備祭典，卻被新率領的妖怪劇團打亂了節奏。"
1536773814 = "新的祭典（２）"
1088037523 = "擊退新後，百花繚亂部員們協助祭典準備。此時，紫察覺名草的傷勢異常，決定將他帶往勘解由小路家。"
1501948804 = "勘解由小路家的貴人 "
