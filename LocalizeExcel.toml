1063147996 = "หนึ่งในของหวานที่อิบูกิชอบที่สุด\nแม้ว่าจะเป็นของว่างล้ำค่าที่กินได้แค่\nวันละชิ้นเท่านั้น แต่ดูเหมือนว่า\nบางครั้งมันก็หายไปจากตู้เย็น"
1559446809 = "กระเป๋าถือที่เอาไว้เก็บของส่วนตัวของอิบูกิ มีของใส่ไว้หลายอย่าง ตั้งแต่โทรศัพท์มือถือ นกหวีด ปืน ทิชชู่ที่รุ่นพี่ให้ไว้ ไปจนถึงกลีบดอกไม้สวยๆ"
917196592 = "รูปวาดพวกรุ่นพี่อันโปรดที่อิบูกิวาดด้วยตัวเอง จัดว่าเป็นสมบัติของเกเฮนน่าตามคำสั่งพิเศษ\nของมาโคโตะ"
1246509466 = "หนังสือพิมพ์ที่จัดทำเพื่อประกาศความสง่างาม ของแพนเดโมเนียม โซไซตี้ มีเนื้อหาเกี่ยวกับอิบูกิ มีมูลค่าสูงในฐานะสินค้าอิบูกิ"
1636079057 = "รายการตรวจสอบที่บันทึกการประเมิน\nสุขอนามัย ของชมรมโภชนาการเป็นประจำ\nส่วนใหญ่ได้รับคะแนนเต็ม แต่บางครั้ง\nก็ดูเหมือนจะไม่ผ่านเกณฑ์\nเนื่องจากสถานการณ์ที่หลีกเลี่ยงไม่ได้"
1783365279 = "เครื่องตั้งสายเปียโนเก่าที่ถูกทิ้งไว้ใน\nอาคารเรียนเก่า ถึงภายนอกจะดูเก่า\nและทรุดโทรมมาก แต่เพราะได้รับ\nการดูแลจากเจ้าของเดิมเป็นอย่างดี\nจึงยังใช้งานได้ดีไม่มีปัญหา"
561939847 = "กระเป๋าหนังสือที่ใครสักคนลืมไว้ ในนั้นมีหนังสือเรียน ขนมกับหนังสือการ์ตูนตามปกติ แต่มักจะมีระเบิดใส่ไว้อยู่ด้วยตามแบบเกเฮนน่า"
1142909824 = "หนังสือพิมพ์แพนเดโมเนียม โซไซตี้ไหม้ๆ มีรอยไหม้ตามจุดต่างๆ โชคดีที่ไม่มีเนื้อหาที่เกี่ยวกับอิบูกิ เป็นเพียงสุนทรพจน์ของมาโคโตะ เลยไม่มีใครเสียหายเรื่องอะไร"
4224932345 = "สมุดบันทึกผู้เข้าออกที่กรรมการวินัยดูแลอยู่\nแม้เดิมทีจะเป็นของสำคัญในการรักษาความ\nปลอดภัย แต่ตอนนี้ถูกใช้เป็นสมุดเยี่ยม\nนักเรียนที่ถูกคุมขังบ่อยๆ"
186189428 = "เครื่องดริปกาแฟที่อาโกะเตรียมไว้ให้ฮินะ\nเป็นของชั้นยอดที่แสดงถึงความเอาใจใส่\nจากเลขา แต่ดูเหมือนว่ากาแฟที่อาโกะทำ\nออกมาจะไม่อร่อย"
