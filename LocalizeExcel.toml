3920080884 = "Decagrammaton is an artificial intelligence system claiming to be a divine seeker of truth. It is followed by ten prophets who make appearances all over Kivotos.\n\nBinah, the third prophet of Decagrammaton, was first seen in the desert district of Abydos.\nWhy Binah came here is unknown, but it's too dangerous to be left to do as it pleases."
3639039230 = "Decagrammaton is an artificial intelligence system claiming to be a divine seeker of truth. It is followed by ten prophets who make appearances all over Kivotos.\n\nChesed, the fourth prophet of Decagrammaton, has control of an abandoned munitions factory on the outskirts of Millennium.\nKivotos will face unprecedented disaster if Chesed produces an unlimited supply of troops."
3682198469 = "An artificial angel manifested by a twisted mystery that has been spotted in an abandoned underground temple somewhere in Kivotos.\n\nGregorius is a mysterious monster created through Gematria's experiments, as final product in a series of artificial angels called the Communio Sanctorum. Even now, the creature plays the organ in an underground temple. What awaits at the end of its performance, no one knows."
1904549173 = "The Phantom Fables, guarded and passed down by Allied Hyakkiyako Academy since ancient times, have been exposed to the public.\n\nCould Myouki Kurokage, said to bring about chaos and ruin festivals, be real? Or is it simply a terrible ghost story created by someone with malicious motives? The truth is unknown, but it's time to put an end to this urban legend before it's too late."
1142087454 = "Decagrammaton is an artificial intelligence system, claiming to be a divine seeker of truth. The ten prophets, scattered throughout Kivotos, follow it faithfully.\n\nGeburah, the fifth prophet of Decagrammaton, took on its current form after hacking an unmanned exploration probe in the glacial region. From there, it evolved into what it is today. Geburah's mission is still unknown. But what is clear is that its existence threatens the safety of the Glacial Sea, and perhaps even all sea ways in Kivotos."
3983422512 = "Decagrammaton is an artificial intelligence system claiming to be a divine seeker of truth. It is served by ten prophets who appear all over Kivotos.\n\nYesod is the ninth prophet of Decagrammaton and appears to have abandoned its original form. While Yesod's purpose remains unknown, it is clear that intervention is now necessary."
276060001 = "A mysterious phenomenon has been reported in Slumpia, a now-desolate theme park that went bankrupt long ago. Rumor has it that the park's decaying animatronics and other attractions are coming to life in the middle of the night, and they have a violent streak.\n\nIn the midst of this mystery, Goz seems intent on keeping the show running. What intentions are hidden behind that bizarre smile? It will be a challenge to find out."
3550217605 = "An unknown entity was discovered beneath the old cathedral ruins in Trinity, supposedly a test subject created by Gematria based on ancient doctrines.\nIt is Hieronymus, the final form of the artificial angel Communio Sanctorum. We can't leave its incredible power unchecked. For the safety of Kivotos!"
2223988532 = "Decagrammaton is an AI claiming to be a divine seeker of truth. It is followed by ten prophets who make appearances all over Kivotos.\nHod was originally a built-in network unit at Millennium, but now claims to be the eighth prophet of Decagrammaton since being hacked by an unidentified AI.\nThe district's safety is in jeopardy until this computing unit powered by Millennium technology is stopped."
2092560489 = "The Fox of Calamity, one of the Seven Prisoners who escaped from the Corrections Bureau, has hijacked a hovercraft and is now on a rampage.\n\nWe don't know what sparked this swimsuit-clad girl's frenzy, but she must be stopped before Kivotos' sparkling beach is turned into a sea of fire."
491740630 = "The Kaitengers' secret weapon has appeared to block the road to their base. The Kaitengers plan to use the stolen funds and technologies to build a giant combination mecha: KAITEN FX Mk.0. It may look cool, but no good can come of letting them have something like that. Time to put a stop to it."
1866624346 = "An unidentified giant monster has been sighted in the waters near D.U. The monster looks like a Momo Friends toy that once sank into the sea.\nWe don't know why this happened, but we have to stop this giant monster from advancing!"
3601545918 = "A mysterious phenomenon has been reported in Slumpia, a theme park that went bankrupt long ago. Rumor has it that the animatronics and other attractions have now come back to life in the middle of the night to attack people.\n\nIt is unknown why the animatronics, Shiro and Kuro, are active again, but it seems clear that they are trying to recreate the wonderful festivals of the theme park's past."
