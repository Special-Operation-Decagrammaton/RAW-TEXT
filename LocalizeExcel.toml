2288954300 = "意料之外的露營"
1822713070 = "真紀一行人拖著不情願的腳步到千年學園的門口集合。聽到千尋說要在野外露營，一行人驚慌失措。千尋開始檢查成員們的隨身物品……紛紛搜出與露營無關、意料之外的物品。"
459676073 = "搭帳篷"
3757493316 = "貝里塔斯成員們抵達了露營地。與幹勁十足的千尋不同，面對久違的戶外活動，貝里塔斯成員們感覺十分吃力。搭好帳棚之後，所有成員們分頭享受自由時間，千尋則和老師在一起閱讀。"
2908823739 = "無聊會殺死駭客"
1350246685 = "隨著時間一分一秒地流逝，卻不見成員們歸來，千尋和老師便出發尋找大家。老師與千尋在附近尋找的過程中，遇見了苦於咖啡因戒斷症狀的晴。將咖啡分給晴喝下後，老師及千尋打聽到了真紀的下落，於是便循著他的去向前往洞穴。真紀正在那裡繪製巨大的藝術作品……"
3004230193 = "與熊共舞"
296992172 = "另一方面，正在森林深處錄製環境音的小玉遇見了前來冬季特訓的訓練部成員。在與訓練部成員談論在戶外能體驗到的價值時，千尋提醒大家要小心遇見冬眠的熊……就在這時，真正的野熊出現了。"
2436736275 = "準備晚餐"
4265253392 = "回到露營地的貝里塔斯成員們早早就開始準備晚餐。在千尋生火的期間，真紀與小玉、晴用生疏的手法處理食材。"
3998368874 = "靈魂雞肉火鍋"
1256703657 = "千尋為成員們準備了雞肉火鍋。貝里塔斯的成員們加入了處理好的食材，開心地分食著火鍋。用完餐後，在營火前打發時間的老師從晴和小玉那裡聽到對露營的真實感受。"
2460462864 = "第一道風景（１）"
452463543 = "次日凌晨，老師及貝里塔斯成員們為了看日出起了個大早，開始在黑暗中登山。在登山途中遇見了堇，他說因為今天是陰天，可能很難看到日出，但沒想到成員們卻一反常態，充滿幹勁地表示一定要登上山頂。抵達山頂的一行人最終看到了美麗的日出。"
60697301 = "第一道風景（２）"
1996295661 = "看完日出回來後，貝里塔斯的成員們發現營地周圍聚集了許多記者。打聽之下，才知道是因為真紀繪製的壁畫被誤認為是新發現的古代壁畫，所以吸引了大批記者前來。老師與千尋花了不少心力才平息這場騷動。"
1007585985 = "三天打魚，兩天曬網"
