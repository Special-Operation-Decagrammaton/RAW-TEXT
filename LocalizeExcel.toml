1780167426 = "모든 후열의 적에게 피해를 준다. 이후 무작위 아군 스트라이커와 교대한다.\n\n\n[c][75b4c0][i]베일에 싸인 트리니티 사교계의 정점, 티파티의 호스트. 그 정체는 과로에 고생하는 한 사람의 소녀이다.[/i][-][/c]"
1320965963 = "[c]다른 {tag;TeaParty} 스트라이커의 EX스킬 발동 후:[/c] 무작위 적에게 피해를 [c]{param;BasePower}[/c] 준다. [c](자신을 포함한 아군 {tag;TeaParty} 학생의 수만큼 반복)[/c]\n[c]{char;848004}[/c] 또는 [c]{char;848005}[/c]가 아군으로 있다면, 한 명 당 이 스킬로 주는 피해가 [c]{param;BonusNum}[/c] 씩 증가한다."
3576040056 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]트리니티 종합학원의 순수한 공주님. 순수는 무엇보다 쉽게 상처 입히고, 상처받는다.[/i][-][/c]"
312404380 = "[c]전열로 교대 시:[/c] 무작위 후열의 적에게 [c]{param;BasePower}[/c] 피해를 준다."
3291019510 = "다른 아군 스트라이커의 EX스킬 위력이 [c]1[/c] 증가하고, 그 스트라이커와 교대한다.\n\n\n[c][75b4c0][i]자유라는 단어를 체현한 듯한 존재. 티파티 호스트를 맡았을 모습은 그다지 상상되지 않는다.[/i][-][/c]"
1066641449 = "[c]다른 {tag;TeaParty} 스트라이커의 EX스킬 발동 후:[/c] 아군 전열 스트라이커의 EX스킬 위력이 [c]1[/c] 증가한다."
3210250803 = "전열의 적에게 피해를 준다. 이후 카드를 [c]{param;DrawCardNum}[/c]장 뽑는다.\n\n\n[c][75b4c0][i]\"그 아이, 친구들과는 잘 어울리고 있나? 자주 웃고 있나? 그런가… 다행이다.\"\n- 블랙마켓의 용병, 익명[/i][-][/c]"
3848622176 = "[c]다른 {tag;MakeUpWork} 학생의 EX스킬 또는 SP스킬 발동 후:[/c] 카드를 [c]{param;DrawCardNum}[/c]장 뽑는다."
231076403 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]무엇이든 될 수 있었기에, 아무것도 되지 않기로 한 소녀.[/i][-][/c]"
351059869 = "[c]내 Phase 시작 시:[/c] 손패의 무작위 카드 [c]{param;CardNum}[/c]장의 코스트가 [c]1[/c] 감소한다."
2651504191 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]츠루기를 상대로 승산을 논하는 사람은 바보밖에 없다. 피할 수 있다 생각하는 사람은 그보다 더한 바보다.[/i][-][/c]"
2237998232 = "[c]전열에 있을 때, 적이 피해를 받은 후 퇴각할 시:[/c] 체력을 [c]{param;BasePower}[/c] 회복한다."
2674858929 = "전열의 적에게 피해를 준다. 이후 무작위 적에게 [c]{param;BonusAttackPower}[/c] 고정피해를 준다. [c]({param;AttackCount}회 반복)[/c]\n\n\n[c][75b4c0][i]선도부의 에이스 저격수. 불평불만을 말하면서도 누구보다 앞서가는 그 행동력은, 어쩌면 부장과 가장 닮았는지도.[/i][-][/c]"
3746791027 = "[c]피해를 받은 후:[/c] EX스킬 위력이 [c]1[/c] 증가한다."
2135599211 = "모든 적에게 피해를 준다. [c]({param;AttackCount}회 반복)[/c]\n\n\n[c][75b4c0][i]히나 없는 게헨나를 상상하기 어렵듯이, 게헨나 아닌 히나 역시 상상하기 어렵다.[/i][-][/c]"
3485857018 = "[c]전열에 있을 때, 적이 피해를 받은 후 퇴각할 시:[/c] 모든 적에게 [c]{param;BasePower}[/c] 피해를 준다."
1997750136 = "무작위 아군 스트라이커의 체력을 회복한다.\n\n\n[c][75b4c0][i]트리니티 종합학원에서는 항상 누군가 일을 만들고, 수습한다. 주로 후자 담당.[/i][-][/c]"
3069105627 = "[c]다른 아군 스트라이커의 EX스킬 발동 후:[/c] 후열의 무작위 적에게 [c]{param;BasePower}[/c] 피해를 준다."
1184747526 = "무작위 아군 스트라이커와 교대한다. 이후 체력이 가장 높은 적에게 [c]{param;SubPower}[/c] 고정피해를 준다.\n\n\n[c][75b4c0][i]인상이 무섭다는 소리를 들은 이후로, 밤마다 거울을 보며 웃는 연습을 하고 있다.[/i][-][/c]"
1931885401 = "[c]내 Phase 시작 시:[/c] 무작위 아군 스트라이커의 체력을 [c]{param;BasePower}[/c] 회복한다."
3182341508 = "무작위 적에게 피해를 준다.\n\n\n[c][75b4c0][i]쉬고 싶을 때도, 놀고 싶을 때도 있지만, 의젓하게 순찰을 나서는 소녀.[/i][-][/c]"
2216886365 = "[c]적이 피해를 받은 후 퇴각할 시:[/c] 아군 전열 스트라이커의 체력을 [c]{param;BasePower}[/c] 회복한다."
1621612816 = "[c][75b4c0][i]위기의 순간! 닌페로의 등장이외다![/i][-][/c]"
2965092129 = "[c][75b4c0][i]이게 중독성 있다는 평가도 있지만….[/i][-][/c]"
1962256730 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]찌는 듯한 더위에도, 헬멧은 벗지 않는다! 그런 자신에 살짝 취해 있다.[/i][-][/c]"
1544184084 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]헬멧 사이에 냉팩을 넣어두었다. 이것이 간부의 요령.[/i][-][/c]"
3706527418 = "[c]다른 아군 스트라이커의 EX스킬 발동 후:[/c] 무작위 적에게 [c]{param;BasePower}[/c] 피해를 준다."
3384273229 = "전열의 적에게 피해를 준다. 이후, 후열의 모든 아군에게 보호막을 [c]{param;ShieldPower}[/c] 부여한다.\n\n\n[c][75b4c0][i]\"과연… 이 녀석의 처우는 정의실현부에 넘겨야겠네.\"\n- 게헨나의 선도부장, 소라사키 히나[/i][-][/c]"
3606491034 = "[c]내 Phase 시작 시:[/c] 자신이 혼자 남았다면, 새로운 [c]{char;848015}[/c]이 합류한다."
4174554070 = "빈 스트라이커 공간에 체력이 [c]1[/c]인 무작위 오토마타를 [c]{param;SpawnNum}[/c]개 소환하고, 보호막을 [c]{param;SubPower}[/c] 부여한다. 이후 다른 아군 스트라이커와 교대한다.\n\n\n[c][75b4c0][i]\"요즘 애들은 헝그리 정신이 없어. 일하게 해주면 고마운 줄 알아야지. 나 때는 1시간 일찍 출근해서 화분에 물을 주고….\"[/i][-][/c]"
2742386328 = "[c]내 Phase 종료 시:[/c] 다른 모든 아군 스트라이커에게 [c]{param;BasePower}[/c] 피해를 준다."
4174554610 = "무작위 적에게 피해를 준다.\n\n\n[c][75b4c0][i]야심 차게 시작한 용병 일이지만, 사회의 쓴맛을 보고 좌절 중인 신참 용병.[/i][-][/c]"
3631717719 = "[c]피해를 받은 후:[/c] 무작위 적에게 [c]{param;BasePower}[/c] 피해를 준다."
1175820112 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]여러 블랙을 경험한 끝에, 여기 정도면 나쁘지 않다는 결론을 내린 고참 용병.[/i][-][/c]"
4195242012 = "[c]피해를 받은 후:[/c] [c]{char;848018}[/c]에게 보호막을 [c]{param;BasePower}[/c] 부여한다."
3578644684 = "[c]{skill;8480219}[/c]의 효과가 발동되어야 EX스킬을 사용할 수 있다.\n\n모든 적에게 피해를 준다.\n\n\n[c][75b4c0][i]무한히 회전하는 레일은 이윽고 정의의 미래로 이어진다![/i][-][/c]"
1408075034 = "[c]게임 시작 시:[/c] 이 스트라이커는 EX스킬을 사용할 수 없다. 자신이 혼자 남게 되었다면, 이후 EX스킬을 사용할 수 있다."
1025653715 = "다른 모든 아군의 체력을 회복하고, 다른 모든 아군의 EX스킬 위력이 [c]3[/c] 증가한다. 이후 자신은 퇴각한다.\n\n\n[c][75b4c0][i]과묵하고 미스테리한 팀의 정신적 지주, 라는 프로필과 달리 생각보다 말이 많다.[/i][-][/c]"
3669633875 = "다른 모든 아군의 체력을 회복하고, 다른 모든 아군의 EX스킬 위력이 [c]3[/c] 증가한다. 이후 자신은 퇴각한다.\n\n\n[c][75b4c0][i](이슈 발생 시 노티 주시면 익일 확인하겠습니다.)[/i][-][/c]"
1126956015 = "다른 모든 아군의 체력을 회복하고, 다른 모든 아군의 EX스킬 위력이 [c]3[/c] 증가한다. 이후 자신은 퇴각한다.\n\n\n[c][75b4c0][i]친구들을 내버려둘 수 없어서 함께 하고 있지만, 정작 본인만 진지한 듯하여 좀 섭섭하다.[/i][-][/c]"
4158848476 = "다른 모든 아군의 체력을 회복하고, 다른 모든 아군의 EX스킬 위력이 [c]3[/c] 증가한다. 이후 자신은 퇴각한다.\n\n\n[c][75b4c0][i]오늘도 키보토스의 정의를 위해, 악과 싸운다! …라고 주장하는 현상수배범. 그 마음에 거짓은 없다, 아마도.[/i][-][/c]"
2396972796 = "다른 모든 아군의 체력을 회복하고, 다른 모든 아군의 EX스킬 위력이 [c]3[/c] 증가한다. 이후 자신은 퇴각한다.\n\n\n[c][75b4c0][i]즐거운 여가 생활을 구가하는 중. 의외로 평소에는 착실한 모범생.[/i][-][/c]"
2332449769 = "[c][75b4c0][i]안에는 아무것도 없다.[/i][-][/c]"
359109910 = "[c]내 Phase 시작 시:[/c] [c]{char;848027}[/c]을 제외한 모든 아군이 퇴각했다면, 자신도 퇴각한다."
1129966233 = "자신에게 피해를 준다. 이후 자신이 잃은 체력만큼 보호막을 얻는다.\n\n\n[c][75b4c0][i]바보.[/i][-][/c]"
