2744900070 = "一般人A的意見"
1729423655 = "櫻子發現了憂擅自製作了第四屆公會議的經典複本。櫻子為了提醒憂而把憂叫來，但卻用了多少有點容易讓人誤會的方法。就在誤會不斷累積的時候，花子跳出來提出仲裁方案。"
1096816524 = "好事就是好事"
3742480354 = "花子提出的仲裁方案是，讓憂到修女會發現的三一近海島嶼上，活用他傑出的古文字解讀能力和考古學知識調查遺跡。"
3187959349 = "調查點A「石牆迷宮」（１）"
617928650 = "憂一行人正式展開調查。小春以監視老師的名目跟著老師行動。就這樣，正在探查迷宮的小春和老師最終碰上了「複製」。"
811018523 = "調查點A「石牆迷宮」（２）"
994270627 = "老師背著雙腿發軟無法移動的小春落荒而逃。幸好最後老師和小春安然無恙地和調查團會合了。"
3219351181 = "調查點B「地下遺跡」（１）"
2491485373 = "調查團進入下一個探索地區地下遺跡。老師和憂結伴同行。在一起探訪遺跡的過程中，老師和憂展開真摯的談話。此時有一陣奇怪的聲音傳來，兩人遇上了「複製」。"
29917006 = "調查點B「地下遺跡」（２）"
1927635005 = "從地下遺跡中脫身的憂和老師。日向對緊追在兩人身後的「複製」發出砲擊，地下遺跡就此完全崩毀。"
3429673932 = "調查點C「廢棄的檸檬農場」"
630214868 = "老師在調查檸檬農場時遇見了花子。花子吐露心聲，說自己是為了幫助憂，為了小春，還有為了彌補自己之前未能一起去海邊的遺憾，而籌備了這次的行動。"
259971216 = "調查點D「被遺忘的燈塔」（１）"
963289912 = "憂一行人決定接下來要調查燈塔。老師到外面幫忙獨自搬運行李的日向。就在兩人短暫閒聊之際，「複製」包圍了燈塔，日向為了避免其他人受到妨礙，出面展開戰鬥。"
2305782904 = "調查點D「被遺忘的燈塔」（２）"
904241480 = "日向靠自己一個人獨自擊退了所有敵人。面對因為聽到流彈聲響而趕到外面的調查隊一行人，日向和老師含糊其辭地表示沒有發生什麼事。花子明白了是怎麼一回事，便帶著其他人回到了燈塔里。"
942293947 = "正確的使用方法"
3925545059 = "憂正在統整目前為止的調查過程，他利用自己在檸檬農場得到的靈感，將檸檬汁灑在地圖上。隨後，先前沒看過的標記在地圖上浮現。"
3449666276 = "調查點E「瀑布後的基地」"
6041660 = "調查團一行人抵達新的調查點。調查團在瀑布後的洞穴裡發現了一個貌似棺材的木箱。就在憂打開箱子的瞬間，「複製」出現了。"
1858743142 = "島嶼最深處（１）"
479171161 = "調查團突破「複製」的阻擋，逃出生天。憂正想說出島上的祕密以及自己在木箱中看到的內容物，日向又在自己掉進的坑洞中發現了新的箱子。日向一碰到箱子，「複製」大軍便突然來襲。"
2777555982 = "島嶼最深處（２）"
3252455481 = "雖然調查團順利守住了箱子，但裡面什麼都沒有。憂根據目前的調查結果說出真相。箱子是古代聖徒會的學生們製作的紀念時光膠囊。接著憂向大家提出了一個請求。"
368837813 = "小小的變化"
3409394003 = "憂的請求是，不要向外人公開紀念時光膠囊的存在，並把地圖做成卷軸一起保留下來。花子和老師只交給櫻子調查結果的一部分。所有事情結束後，憂表示自己要親切以待的人變多了，流露出複雜又微妙的情緒。"
