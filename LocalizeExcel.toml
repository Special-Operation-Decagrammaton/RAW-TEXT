2785523736 = "在凱薩PMC的攻勢下，一行人面臨了攸關生死的危機，RABBIT小隊在收到彩奈的聯絡後，在緊要關頭終於登場了，老師和一行人順利被救出。"
2819309745 = "夏萊奪還作戰（１）"
2601430695 = "凱薩占領了聯邦學生會，D.U.全區已經宣布緊急事態。為了平息眼前的混亂和救出被囚禁在夏萊的琳，以RABBIT小隊和生活安全局為首展開了夏萊奪還作戰。"
3120994840 = "夏萊奪還作戰（１）"
4019116888 = "在公安局學生的協助下，老師和學生們抵達了夏萊建築物的入口。桃香和步協助掌握了琳的所在位置。"
444446759 = "夏萊奪還作戰（２）"
3034106234 = "蓋瑪特利亞遭到謎樣的少女攻擊。將軍召集凱薩SOF，在夏萊的建築物內部做好迎接老師的準備。"
4088358757 = "夏萊奪還作戰（２）"
429781151 = "因為RABBIT小隊的活躍表現，一行人順利奪回夏萊，也順利救出了琳。"
3501090871 = "沉沒的故事"
2392777866 = "通訊網終於恢復，老師的手機同時出現了數百封的未讀取訊息。連片刻的喘息時間都沒有，突然響起了令人不舒服的警告聲，從一個名為法蘭西斯的人口中聽見了最後的宣告。"
4283014959 = "色彩的嚮導者"
2829819827 = "奇普托斯因為突如其來的異常現象而陷入混亂。老師使用大人的卡片企圖收拾眼前的混亂狀況。來歷不明的存在出現在老師面前，並且留下了耐人尋味的忠告。"
2680676029 = "作戰會議"
25032020 = "學生們收到老師的聯絡後一一前往聯邦學生會。為了解決眼前的狀況，以琳為首收集情報與建立作戰計畫。為了拯救暴露在聖所的人，老師和聖亞開始尋找葛葉。聽到消息後，仁耶表示搜索葛葉的任務交給自己。"
2666731161 = "作戰準備（１）"
1645668012 = "攻略聖所的作戰開始了。對策委員會與便利屋68分配在阿拜多斯沙漠；C&C、英美、弦生和一花分配在千年廢墟地區；遊戲開發部、陽奈和RABBIT小隊分配在史林皮亞等待命令。"
420504687 = "作戰準備（２）"
2800486956 = "沙織的加入讓聚集在一起的奧利斯小隊也回應了老師的召集。修女會和救護騎士團在第4聖所待機。儘管攻略第5聖所的過程中遇到了困境，但後來溫泉開發部和被釋放的小雪伸出了援手。接著第6聖所也完成了居民的避難處理。仁耶向忍術研究部轉達前往雪原搜索百花繚亂部長的任務。"
2772818858 = "作戰準備（３）"
2990932553 = "一切都準備就緒了。老師告知聖所攻略戰與自治區防禦戰已經開始了。"
3423693341 = "第1聖所「阿拜多斯沙漠」"
2046452490 = "便利屋68和對策委員會在阿拜多斯沙漠區開始攻略第1聖所。"
1927454599 = "「山海經」自治區防衛"
4210922202 = "為了防禦山海經，梅花園、鍊丹術研究會和玄武商會全都出動了。開始行動的玄龍門的門主妃姬會長為了給予協助，於是便派遣美奈前往。"
3817181433 = "「赤冬」自治區防衛"
4286816204 = "瑪麗娜負責率領親衛隊，實里則和工務部一起防禦赤冬聯邦學園。227號特別班雖然負責避難所，但在那邊卻沒看見潔莉諾。"
3231049307 = "第2聖所「千年郊外的封鎖地區」"
1633487982 = "C&C降落後滲透軍工廠中心，弦生從正面阻擋住敵軍兵力的進攻。大家都約好要在赫賽德前面碰面，然後就這樣展開了第2聖所的攻略作戰。"
3392176268 = "「百鬼夜行」自治區防衛"
2047690688 = "百鬼夜行聯合學園的大家齊心協力防禦自治區。"
1895070652 = "「格黑娜」自治區防衛"
2484586467 = "為了防禦格黑娜學園四周而聚集在一起的風紀委員會。除了攻略第3聖所的陽奈之外，所有成員都聚在一起了。風紀委員會雖然期待萬魔殿能給予支援，但出現在眼前的皐月卻未能給予風紀委員會太大的幫助。"
874433887 = "第3聖所「廢墟化的遊樂園」"
440838892 = "在第3聖所廢棄遊樂園前集合的RABBIT小隊、遊戲開發部、以及陽奈。遊戲開發部準備了UZQueen專用機體，一起參加了聖所的攻略作戰。"
3984911413 = "「三一」自治區防衛（１）"
2457016360 = "為了防禦三一學園周圍，三一也配合實現正義部、圖書委員會和自衛隊等各自的角色分別去讓一般民眾避難，以及狙擊敵人等。出乎意外的是，連茶會也參加了，戰況變得有些激烈。"
1058019105 = "「三一」自治區防衛（２）"
660632900 = "主要成員集合的學園附近大致上已經整頓好了，但小春在遺跡地帶附近陷入苦戰當中。茶會的彌香突然登場，讓戰況開始出現了逆轉。"
3990749649 = "「三一」自治區防衛（２）"
3821969501 = "小春等實現正義部的成員都向彌香道謝。"
3708980353 = "第4聖所「地下墓穴內部宗座聖殿」"
2859655258 = "為了攻略第4聖所，花子和修女會聚集在地下墓穴內部的宗座聖殿前。連奧利斯小隊也一起參戰了。後來穿著聖徒會服裝的櫻子也加入，並且開始攻略第4聖所。"
2432640477 = "「千年」自治區防衛"
2053587049 = "工程師部為了防禦千年自治區而聚集在一起。未知的AMAS出現在他們的面前，但卻沒有展現任何的敵意，後來雙方就一起展開防禦作戰。"
3508513666 = "第5聖所「要塞都市埃里都近郊」"
1997816141 = "研討會的成員為了攻略第5聖所而聚集在要塞都市埃里都近郊。溫泉開發部一方面支援攻略聖所，同時也為了尋找新的溫泉而四處奔波。"
2129916519 = "在大雪原之中"
277931373 = "忍術研究部為了執行特殊任務來到了大雪原。但出現在眼前的無名守護者比想像中還要多，一行人因此陷入了危機當中…出乎意料的援軍突然從天而降。"
1644926925 = "在大雪原之中"
1124497200 = "萬魔殿的加入讓忍術研究部得以脫離險境。一行人再次踏上旅程去執行特殊任務。基於認為任務已經完成，萬魔殿便回去了。"
4129642388 = "「D.U.白鳥區」防衛"
1310011068 = "第六個聖所的守護者還沒現身，本部決定要先加強D.U.白鳥區周圍地區的防禦。美食研究會自願參加防禦作戰…但後來發現凱坦澤在周圍活動。"
581030933 = "「D.U.白鳥區」防衛"
1263686991 = "或許是達成目的了，所以凱坦澤撤退了。季依照陽葵的指示前往下一個目標地點。"
3816433260 = "最終防衛戰「夏萊」"
3712581761 = "除了第六個聖所之外，其他聖所的守護者攻略都已經準備好，所有自治區也完成了防禦準備，就在此時，夏萊附近出現了大量的無名守護者。就在千鈞一髮之際，意外的幫手出現協助防禦夏萊。"
3792371391 = "最終防衛戰「夏萊」"
4154633485 = "所有自治區的防禦作戰、以及聖所守護者的攻略都準備就緒了，作戰即將開始。"
1690517337 = "意料之外的相遇"
1535882269 = "奇普托斯的天空終於變晴朗了。連片刻喘息的時間都沒有，出乎意料之外的人物出現在老師面前。"
762919617 = "職責"
411556707 = "忍術研究部在百鬼夜行的大雪原遇見了百花繚亂的副部長名草。突然現身的白子警告老師說未來早已決定好，是無法改變的。"
1367106300 = "異變"
2890072437 = "奇普托斯的天空再次出現了超高濃度的能量體，不久後虛假的聖所再次出現，整個氣氛瀰漫著危機。對策委員會的所有人目標都一致，大家都認為要把白子帶回來。發現色彩的嚮導者誘騙者的所在地了。"
3531850351 = "方法"
2437317342 = "雖然嘗試攻擊推測是誘騙者所在的地方，但利用目前的攻擊方式根本就無法造成傷害。老師遇見了黑色西裝人，從對方口中得知可以觸及誘騙者的方法。"
267855655 = "位於阿拜多斯的某物（１）"
1729905057 = "誘騙者的居住處、可前往阿特拉哈西斯的方舟的方法全都在阿拜多斯。"
1811510733 = "位於阿拜多斯的某物（２）"
2105960912 = "為了從凱薩PMC手中奪下「超古代兵器」，對策委員會前往凱薩的挖掘地。"
4076541312 = "位於阿拜多斯的某物（２）"
1035243973 = "終於在挖掘地發現了「超古代兵器」。"
3561957851 = "生命守護者主艦（１）"
2790127767 = "在外觀如同宇宙戰艦的「生命守護者主艦」上聚集著各個學園的學生。而且Kei警告愛麗絲遠離那艘船。"
1997883390 = "生命守護者主艦（２）"
1562900906 = "在工程師部的協助下，得知利用生命守護者主艦就能攻略在天空的阿特拉哈西斯的方舟。攻略阿特拉哈西斯的方舟的作戰計劃書終於完成了。"
947511423 = "作戰簡報"
1309794530 = "作戰名稱決定是「阿特拉哈西斯的方舟占領戰」。老師是戰艦的總負責人，包含聯邦學生會在內的九名支援者則擔任操作員。"
1095169701 = "陸上的最後一夜"
3567564752 = "搭乘生命守護者主艦的學生、以及留在陸地上的學生一起共度最後的晚上，為了迎接美好的未來而做好覺悟。"
1605244826 = "前往天上遙遠的彼方"
743266950 = "為了九名操作員準備的特殊服裝也完成了，生命守護者主艦開始朝著方舟前進了。"
1510466922 = "最初的故事"
206962437 = "老師的腦海中如同跑馬燈一般，短暫浮現了另一個可能發生的故事。啟航的生命守護者瞬間陷入危機當中。"
440319067 = "「勇者」的資格（１）"
2333920900 = "為了突破阿特拉哈西斯的方舟設立的新軸，一行人緊急進行了討論，為了克服眼前的危機，愛麗絲想到了一個點子。"
3249116561 = "「勇者」的資格（２）"
4072004648 = "在獲得Kei的力量後進行了重建，「阿特拉哈西斯：Supernova」粉碎了方舟的多次元屏障。生命守護者就這樣全速向前進，成功進入了方舟的內部。"
535154781 = "突入"
2875406175 = "雖然成功進入了，但生命守護者在瞬間被方舟內部的敵人團團包圍住了。船內的學生立刻衝出來，展開保護船隻的防禦戰。"
37805264 = "阿特拉哈西斯的方舟占領戰"
3286452789 = "成功擊退包圍船的敵人後，白子隨著爆炸出現在老師的面前。同一時間，對策委員會的所有人都出現在白子的面前，白子有些驚訝且立刻逃走了。在防禦生命守護者主艦的同時，也展開了阿特拉哈西斯方舟的占領戰。"
2495904841 = "逆襲"
2599365756 = "貝里塔斯在阿特拉哈西斯方舟中準備了自爆程式。但生命守護者早已被敵人駭入了。奇普托斯的天空再次染紅且陷入絕望當中，白子和老師抵達了駭入生命守護者的位置，在那邊遇見了誘騙者和另一個白子。"
1490470304 = "既定的命運"
1765923020 = "生命守護者主艦被駭客入侵，走向破滅的奇普托斯。白子、老師和彩奈與另一個白子、誘騙者、另一個彩奈在對峙當中。"
3647243136 = "抵抗（１）"
2615819851 = "雖然阻止了眼前的破滅，但依舊是岌岌可危的狀況。為了防止生命守護者自爆，大家齊心協力共同合作。"
3257700775 = "抵抗（２）"
3695169812 = "隱藏在地上的聖所出現了，邁向破滅的倒數速度也加快了。季在搜索過程中發現了聖所，單槍匹馬去進行攻略。美食研究會與風華甩掉了窮追不捨的敵人，往阿特拉哈西斯的方舟的最下層移動。"
3387237276 = "抵抗（３）"
2048912704 = "季因為無名守護者的攻擊而陷入危機當中。阿特拉哈西斯方舟的解除裝置一一被破壞，最終總算是切斷了與方舟的連結。"
828369729 = "簡單的解法"
4054721821 = "莉央和陽葵成功奪回生命守護者主艦的操控權，但季已經到極限了。救世主在危機的一刻出現了。"
2057330540 = "同等的條件"
1214415501 = "方舟的自爆程式再次開始了。大家在準備逃脫的過程中，學生們為了協助老師而聚集在一起。為了讓世界走向滅亡，另一個白子與老師展開了決戰。"
2106964121 = "相同的情況，相同的選擇"
248567209 = "老師利用最後的逃脫程式拯救了另一個白子。彩奈為了從墜落的方舟中救出老師而孤軍奮戰，但光憑自己的力量根本就不夠。老師拜託彩奈去救另一個彩奈。被傳送至彩奈的教室的另一個彩奈，兩人創造了奇蹟且伸出援手。"
301154037 = "所有奇蹟的起點"
3245849038 = "老師順利地回到學生們的身邊。白子把面罩送給另一個白子，彩奈則幫另一個彩奈取名為「星奈」。"
3096659346 = "尾聲（１）"
2589530285 = "D.U.白鳥區正在進行修復作業中，\n遊戲開發部一行人發現了名為<Kei>的存檔，並且交給了陽葵。香耶和曾背叛自己的凱薩將軍合作。"
1378875601 = "尾聲（２）"
1401260434 = "混亂結束後，奇普托斯終於恢復平靜。老師從仁耶手中收到了葛葉的信。琳則收到了一封沒有寫寄件人的信。"
2819824296 = "後日談（１）"
3130167285 = "在希迪姆的箱子中一起相處的彩奈和星奈。老師和兩人見面後互相寒暄說多多指教，並且為了未來做準備。"
1389029183 = "後日談（２）"
2385825589 = "法蘭西斯在廢墟的某處敘述著這個故事的結尾。另一方面──星奈對彩奈為何是與自己相似卻不同的存在的證明結束了。"
1141893095 = "沉睡的鯨魚"
1071953312 = "星野以整理器材為由，把老師叫來在倉庫裡打造午睡專用的祕密基地。"
3096054116 = "懶惰蟲的早晨"
2514639115 = "在教室大睡一覺的星野，和老師一起到運動場尋寶。"
3534890387 = "雖然隱約，但是耀眼"
687709314 = "大半夜在學校尋寶時，老師發現小魚造型的夜光貼紙。收到禮物的星野非常開心。"
3392633652 = "深夜的巡邏"
1781335004 = "老師偶然在夜晚的街上遇到星野，得知她每晚都暗中為了街道的安全進行巡邏的事。"
3089484350 = "抓住幸運的方法"
748794093 = "星野從在書店購買的圖鑑中發現水族館入場券的抽獎券。很可惜星野沒抽中。但是老師買了50本一樣的書，不斷重新挑戰直到抽中為止。"
1287455689 = "海生館！"
1182596744 = "帶著抽中的入場券來水族館玩的老師和星野。四處觀賞水族館的魚度過愉快的一天。"
1659730423 = "暢通無阻入場券"
823938156 = "把老師叫出來的星野將自己愛用的枕頭借給老師。枕頭的觸感實在太鬆軟，老師馬上就睡著了，於是星野趁機說出平常說不出口的話。"
772933003 = "幫忙打工"
306418223 = "茜香正在打工發傳單，老師為了幫她而來到街上。老師看到茜香辛苦打工的樣子，於是暗中幫她發傳單。"
1065594543 = "辛苦的通宵打工"
2879956728 = "茜香和老師正在打工，當徹夜看守大樓入口的夜間警衛。兩人完成工作後回到宿舍。"
2794306484 = "公園除草"
2993178327 = "茜香和老師一起在公園打工除草。"
3688572742 = "遲來的醒悟"
57915122 = "在公園清掃的時候，茜香再次發現自己很喜歡和老師一起打工。"
2323863848 = "意想不到的幸運"
2376289702 = "比預期中早完成打工的老師和茜香，在夜市逛攤販度過歡樂時光。"
1234311581 = "極其短暫的休息"
