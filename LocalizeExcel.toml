2304976140 = "[c]At the end of the user's Phase:[/c] Deals damage equal to the user's HP lost to the Front enemy."
4015010782 = "Deal damage to all enemies, then the user retreats.\n\n\n[c][75b4c0][i]\"There's never 'too much' when it comes to dynamite, you know?\"\n- Hot Springs Department President, Kinugawa Kasumi[/i][-][/c]"
2518778292 = "[c]At the start of user's Phase:[/c] Increases EX Skill Power by [c]1[/c].\n\n[c]When the user retreats after taking damage:[/c] Deal damage equal to EX Skill Power to other ally Strikers."
