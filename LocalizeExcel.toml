2164760396 = "在被人看到之前"
328580852 = "和伊吹捉迷藏"
3289919768 = "對待美食的禮儀"
2496100826 = "在周圍到處看看，掌握情況吧！\n\n唔嗯，總覺得氣氛相當混亂，得問問部員們發生了什麼事。"
318399169 = "去找處境艱難的風華吧！\n\n情人節、格黑娜派對、供給部大量訂購的食材……所有事件的犯人肯定是……！"
3141934736 = "掃蕩在舊校舍製造動亂的太妹們吧！\n\n問題學生的行動是有計畫的，事情並不像千夏說得那麼簡單，這不只是普通的騷動。找找有沒有關於雇主身分的線索吧。"
2569897263 = "在琴房周邊到處看看吧！\n\n沒想到格黑娜學園後面有這種廢棄的地方。稍微有一點時間，要不要在周圍看看……"
2403732486 = "為今天劃下句點吧！\n\n呼，真是混亂的一天。話說回來，5天後就要舉行格黑娜派對了。萬魔殿的陰謀……腦袋還是一片混亂……"
2995459567 = "調查事發現場，尋找線索吧！\n\n佳澄會突然在萬魔殿議事堂門口開挖肯定是有理由的。練琴固然重要，但現在先解決眼前的問題吧。"
1627627988 = "向學生們詢問，收集情報吧！\n\n像亞子說的一樣，有溫泉入浴券在格黑娜學生之間流通。溫泉開發部肯定在策劃可疑的詭計。"
3086472127 = "追擊正策劃可疑陰謀的溫泉開發部吧！\n\n什麼格黑娜咕嘟咕嘟大作戰，雖然名字聽起來像在開玩笑，可不能就這麼置之不理。得再收集更多情報才行。"
1626969013 = "去見見被關進監獄的佳澄吧！\n\n說什麼要送格黑娜所有學生每人一個溫泉，都不知道該怎麼反應才好了。"
3158540525 = "別心急，好好練習鋼琴吧！\n\n為了即將到來的派對，也為了期待演奏的老師，不疾不徐、心態平穩地慢慢來……"
3801704183 = "為今天劃下句點吧！\n\n雖然鋼琴還沒練熟，不過只要繼續維持這個步調，之後應該能想辦法練好。"
1957882148 = "在委員長室開始一天的工作吧！\n\n老師那令人在意的聯絡，還有千夏難以理解的報告……雖然格黑娜和平常沒什麼不同，總覺得有股不安的感覺。"
1304712371 = "抓住在學生餐廳大搖大擺的鬆餅醬吧！\n\n會走路的鬆餅……接到千夏報告的時候還以為在開玩笑，親眼看到之後才不得不相信。不過這些東西的來歷是……"
610392988 = "阻止在公園出沒的超巨大餅醬吧！\n\n剛剛才抓住美食研究會，這次又有巨大鬆餅出沒嗎……唉……"
2177230518 = "去見見被關進監獄的羽留奈吧！\n\n居然為了品嚐派對的餐點而綁架風華，美食研究會真是依然故我。"
2187336480 = "專注於樂譜，好好練琴吧！\n\n準備好了……！雖然空閒的時間不多，還是要把精力集中在樂譜上進行練習。"
1136050044 = "為今天劃下句點吧！\n\n總算是想辦法度過今天了……還有4天……再稍微，稍微加把勁吧。"
3855672209 = "整理一下帶來的樂譜吧！\n\n嗯，不要著急，做自己現在能做的就好……不過老師的聯絡和應援……雖然真的很開心，還是覺得有點耿耿於懷。"
3729000631 = "回收設置在各地的真琴銅像吧！\n\n光是萬魔殿就夠頭痛了，連其他問題學生都結黨行動了嗎……先從這裡的銅像開始回收吧。"
107297234 = "找出問題學生的藏身處，好好整頓一番吧！\n\n呼，雖然不知道真琴到底唆使問題學生做什麼事，但只要他們繼續搗亂，我就會全力進行鎮壓。"
1776716070 = "找找瀬奈準備的藥膏吧！\n\n雖然整頓很順利，但我也覺得好像做得有點過火了。希望不要有人受太嚴重的傷……"
3732203121 = "一邊感受指尖的旋律，一邊演奏鋼琴吧！\n\n感覺越來越能隨心所欲地控制琴鍵了。呵呵，原來演奏是這麼開心的事啊，好久沒有這種感覺了。"
990824040 = "為今天劃下句點吧！\n\n今天依舊是波瀾壯闊的一天。時間雖然短，希望明天可以收穫練習的成果……"
2068928161 = "結束工作，開始準備定期訓練吧！\n\n呼，派對前的定期反恐訓練嗎。雖然這項訓練不算特別辛苦，但要是不能完美達成的話……"
3900612289 = "召集要參加定期訓練的成員吧！\n\n在格黑娜自治區各地傳播的可疑傳單。萬魔殿分明在策劃什麼可疑的陰謀，不過現在已經無法顧及這種事了。"
2796525508 = "幫助伊織，回收可疑的傳單吧！\n\n伊織因為萬魔殿的麻煩很辛苦。身為委員長可不能袖手旁觀。不過……老師你沒事吧……"
1797291382 = "調查萬魔殿騷動的真相吧！\n\n呼，伊吹該不會捲入了什麼荒唐的騷動吧。不過幸好傷勢不嚴重。先打聽一下真相吧。"
4023772365 = "和召集的成員們一起參加定期訓練吧！\n\n所有成員都做好訓練準備了。就算只是定期訓練也不能馬虎。"
1542042713 = "再參加一次定期訓練吧！\n\n如果是平常的話，我一定會反駁真琴的要求，不過現在我不想浪費時間在無謂的口舌之爭上。"
2778212802 = "收心練習鋼琴吧！\n\n雖然被追加訓練占用了大部分的時間，也不要心生動搖。做得到，我一定做得到。"
2808151776 = "為今天劃下句點吧！\n\n明天就是舉行派對的日子了。指尖會抖也是理所當然的事吧。不過這樣下去……"
556520415 = "把對演奏的心聲告訴亞子吧！\n\n我希望今天可以讓身心完全投入於演出之中。稍微……就稍微任性一下也沒關係吧……？"
424240925 = "全力以赴練習鋼琴吧！\n\n手老是因為緊張跟不上速度，但我無論如何都不想在舞台上發生失誤。為了達成完美的演出，要完全專注在琴鍵上才行。"
1211557641 = "整頓格黑娜發生的所有亂象吧！\n\n能進行的鋼琴練習都已經做完了。在開始演奏之前，先快速處理一下格黑娜的問題兒童們吧。"
2047835697 = "在派對舞台上演奏鋼琴吧！\n\n為了幫助我的成員、學園的好友……還有老師……嗯，我會用精彩的演奏報答大家。"
1233708660 = "把亂七八糟的房間整理一下吧！\n\n老師送的這個玩具，現在對我來說已經是無可取代的寶物了。"
3329307650 = "不要在意周圍的視線，向前進吧！\n\n格黑娜偶爾會發生一些令人難以理解的事件。是因為最近太累了嗎……？"
3107481871 = "教訓一下打惡作劇電話的學生吧！\n\n必須狠狠教訓妨礙我……不對，妨礙其他成員工作的人才行。"
3306064596 = "找找一本消失的書吧！\n\n雖然不知道有什麼特別，不過書架上空了一格，實在讓人有點在意……"
2012136030 = "調查越獄事件的現場吧！\n\n溫泉開發部部長佳澄……真是個不能掉以輕心的人物。下次抓到他的時候，一定要讓他知道風紀委員會的恐怖。"
2319967817 = "找找藏在琴房的舊日誌吧！\n\n曾在此追求可貴夢想的無名之人啊。別擔心，你的努力沒有白費。我會記得你的。"
9172985 = "調查發生騷動的學生餐廳吧！\n\n大家到底吃了什麼料理，為什麼全都失去意識倒地不起？真的完全摸不著頭緒。"
2934280817 = "找找跑進學生餐廳的野貓的痕跡吧！\n\n應該是被供給部餐點的香味吸引到這裡的吧。希望能找到一個好主人。"
2003080857 = "看護臥床的傷患吧！\n\n從成員們的反應看來，治癒之手的治療效果相當顯著。下次也幫老師……不對，我剛才在想什麼！"
3684066488 = "找出跑進急救醫學部室的蟲子吧！\n\n大家居然因為一隻蟲子而大呼小叫……有點難理解。奇怪的人是我嗎？"
2904112170 = "再次出發捕捉鬆餅醬吧！\n\n茱莉製作的料理到底是……算了，還是別想太多吧。現在應該把注意力放在眼前的那個東西才對。"
487185434 = "搜尋行李堆，找出消失的布丁吧！\n\n雖然不怎麼想答應真琴的要求，但要是校內真的有犯罪發生，風紀委員會不能袖手旁觀。"
4196165701 = "幫助繪里香打掃亂七八糟的教室吧！\n\n嗯，對陷入困境的學生伸出援手也是風紀委員會的職責。打掃教室不是什麼難事，稍微幫點忙吧。"
552395824 = "把教室裡貼得到處都是的塗鴉和海報整理乾淨吧！\n\n到處都是中傷真琴的塗鴉和海報。雖然覺得這是他平時所作所為應得的報應，但要是影響到學生的課程，那就另當別論了。"
3034885123 = "在捉迷藏中當鬼，把躲起來的學生們找出來吧！\n\n捉迷藏……記得小時候有玩過。不過我當鬼的時候總是太快就找到所有人，讓大家覺得很為難……"
690950655 = "找找淳子弄丟的餐券吧！\n\n美食研究會……雖然這個社團是不可理喻的麻煩製造者，不過對待食物和夥伴的真心是不容置疑的。"
