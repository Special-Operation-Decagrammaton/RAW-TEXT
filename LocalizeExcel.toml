1541422275 = "陽奈委員長。萬魔殿提出荒謬要求的時候，我還很擔心事情會如何發展……\n\n不過看到委員長努力的樣子，亞子我也領悟到現在不是擔心的時候。\n\n我身為風紀委員會的行政官，會在這裡為陽奈委員長應援。委員長，演奏請一定要加油！"
1570765118 = "呵呵，我們也聽說了。\n\n不是別人，而是那位鬼神般的風紀委員長將身穿美麗的禮服演奏鋼琴……真令人意外……簡直就像美食一樣呢。\n\n那麼，我們就對當天的演奏拭目以待囉？呵呵呵！演奏還請加油。"
2407965685 = "我聽說了哦。你要在格黑娜派對上演奏鋼琴對吧。\n\n答應萬魔殿強人所難的要求想必很辛苦吧。我和茱莉都會為你加油，祝你圓滿完成表演。\n\n加油，格黑娜風紀委員長。"
2286376939 = "那個那個～風紀委員長啊。\n\n我聽說你這次會帶來一場非常厲害的表演～！厲害程度應該不會輸給開發溫泉吧！？\n\n我會帶大家一起去聽的！加油！"
978447002 = "陽奈風紀委員長！\n\n雖然委員長總是告訴我們，身為守護格黑娜風紀委員要堅持公平公正，不偏袒任何人，但是這次我們風紀委員會所有人！\n\n都會站在委員長這邊，祝您演出順利成功！我們都真心為委員長加油！"
659199751 = "在這重要的演出即將到來之際，委員長是否會感到身心疲憊呢？\n\n如果有察覺到任何異常，請立刻告訴我。因為確保以委員長為首的風紀委員會全體健康，採取適當措施就是我的職責。\n\n還有……雖然有點突然，但我會為委員長聲援。請一定要加油。"
981979352 = "陽奈前輩！\n\n前輩的鋼琴演奏！伊吹也心臟砰砰跳，期待得不得了！\n\n伊吹會用力為前輩加油的唷～！耶嘿嘿！"
1958821606 = "陽奈親！加油！\n\n我們！都對陽奈親的演奏非常期待！一～定會精彩萬分！\n\n之後我會拍下影片傳給陽奈親的！加油！"
4025554739 = "竟然要配合萬魔殿的無理取鬧，委員長也真不好當啊。\n\n雖然我也不能為你做什麼，不過要說只有我能做到的事……好！我決定了！\n\n只要妨礙你演奏的傢伙出現，我就把他們全部打飛！委員長！練習請好好努力吧！"
2710967621 = "該做的工作不會因為舉辦格黑娜派對這樣盛大的活動而有所改變。\n\n要確認有沒有人因為慶典太熱鬧而受傷。\n\n完成這些既定工作後，接下來要做的就只有鼓勵努力的人了。請加油，風紀委員長。"
