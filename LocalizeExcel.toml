3139702118 = "봉인된 마수 카스팔루그 2"
374936049 = "상담하고 싶은 것"
266683838 = "어느 날 샬레에 한 통의 전화가 걸려 온다. 전화를 건 주인공은 방과후 디저트부의 카즈사였다. 카즈사는 자신이 스토킹을 당하고 있다며 선생님에게 상담을 요청한다."
3673151056 = "덤벼드는 녀석 1"
1587917542 = "카즈사를 만나 상담을 시작한 선생님. 스토킹을 당하고 있다는 카즈사는 정의실현부에 신고하는 것이 내키지 않는 모양이었다. 카즈사가 스토커에 대한 정보를 말하려 하는 그 순간 범인이 제 발로 나타나 카즈사에게 덤벼든다."
1489650353 = "덤벼드는 녀석 2"
2956197676 = "스토커의 정체는 자경단의 우자와 레이사였다. 카즈사는 레이사를 따돌린 후 선생님에게 한 장의 사진을 보여주며 중학생 시절 자신이 스케반이었음을 밝힌다."
2953979966 = "누구나 한두 개쯤은 1"
1227345914 = "늦지 않게 등교하는 카즈사. 선생님은 자신에게 스케반이었음을 밝혀도 괜찮냐 묻고 카즈사는 잊고 싶은 과거일 뿐이라고 답한다. 선생님은 카즈사와 헤어진 후 같은 자경단인 스즈미에게 연락하여 레이사에 대한 이야기를 듣는다."
3880511578 = "누구나 한두 개쯤은 2"
379247669 = "레이사의 지원 요청을 받고 현장에 도착한 스즈미와 선생님. 하지만 이미 상황은 모두 종료된 상태였다. 선생님은 레이사에게 카즈사가 더 이상 스케반 활동을 하지 않으며 평범하게 살아가고 있다는 사실을 전하고 레이사는 반신반의하며 돌아간다."
1945166588 = "재료는 모두 제각각이라도 1"
259113567 = "분위기를 살피기 위해 방과후 디저트부 부실을 방문한 선생님. 나츠와 아이리는 카즈사와 레이사 사이에 어떤 일이 있었는지는 모르지만 그것으로 모두와의 관계가 달라질 건 없다고 말한다. 안심한 선생님은 실수로 사진 한 장을 방과후 디저트부 모두에게 보이고 만다."
4050058228 = "재료는 모두 제각각이라도 2"
3821896350 = "다시 카즈사를 불러 상담에 나선 선생님. 선생님은 지금까지 있었던 일을 카즈사에게 전하고 카즈사는 자신의 흑역사가 모두에게 들켰다는 사실에 절망한다."
697992102 = "방과후 디저트단? 1"
25590586 = "카즈사가 스케반 출신이었음을 알게 된 방과후 디저트부 일동. 방과후 디저트'단'으로 이름을 바꾸고 불량한(?) 코스프레를 한 채 카즈사 앞에 나타난다. 이 모습을 본 레이사는 <카스팔루그>가 새로운 조직을 꾸려 부활하려 한다며 방과후 디저트단과 한바탕 싸움을 시작한다."
3920525389 = "방과후 디저트단? 2"
3506014961 = "방과후 디저트단과의 싸움에서 패배하여 기절한 레이사. 카즈사는 모두에게 스케반 시절은 잊고 싶은 기억이며 앞으로는 모르는 것처럼 지내 달라 말한다. 모든 이야기를 들은 레이사는 쓸쓸하게 그 자리를 뜬다."
2905518164 = "잊고 싶은 기억 속의 사람 1"
3687706864 = "레이사를 불러낸 선생님. 레이사는 카즈사의 상황을 이해했으며 카즈사를 더 이상 귀찮게 하지 않겠다고 말한다. 그때 스케반들이 카스팔루그의 정체에 대해 말하라며 레이사를 찾아온다."
3914779207 = "잊고 싶은 기억 속의 사람 2"
3963225956 = "선생님과 함께 스케반을 격퇴한 레이사. 레이사는 스케반들이 카즈사가 새로운 조직을 만들려 한다는 소문을 들은 데 책임을 느낀다. 레이사는 '평범한' 카즈사를 지키기로 결심하고 선생님에게 도전장을 맡긴채 몰려오는 스케반과의 전투에 나선다."
2675913389 = "말 많고 시끄러운 녀석은 싫어 1"
4274647011 = "선생님은 카즈사에게 레이사의 도전장을 전달한다. 시원해하면서도 어딘가 석연치 않은 카즈사는 선생님에게 레이사의 행방을 묻는다."
4266006947 = "말 많고 시끄러운 녀석은 싫어 2"
1092601913 = "레이사를 찾아 스케반들이 있는 곳을 찾아간 카즈사와 선생님. 그곳에서 선생님이 부른 방과후 디저트단과 합류하고 레이사를 구하기 위해 돌입한다."
3566887939 = "우리 '방과후 디저트단' 1"
3175463900 = "궁지에 몰린 레이사. 위기의 순간에 카스팔루그와 방과후 디저트단의 사천왕이 레이사를 구출한다."
854792900 = "우리 '방과후 디저트단' 2"
1330585549 = "레이사를 구출하여 도망친 방과후 디저트단. 카즈사는 기절한 레이사에게 도전장을 돌려준다. 상황이 모두 정리되고 선생님은 밤새 고생한 모두에게 스위츠를 쏘기로 한다."
544026336 = "봉인된 마수 카스팔루그 1"
8928475 = "사건이 해결되고 한결 여유로워진 카즈사는 선생님에게 자신이 왜 스케반을 그만두었는지에 대한 이유를 들려준다. 모든 것을 털어놓은 카즈사는 무언가를 깨닫고 상담이 종료된다."
3396719460 = "봉인된 마수 카스팔루그 2"
3260678421 = "언제나와 다를 바 없는 일상이 이어지는 방과후 디저트부의 부실. 뒤늦게 도착한 선생님과 카즈사는 부실에 있던 레이사를 발견한다. 방과후 디저트단에게 카스팔루그의 무용담을 전해 들어 불이 붙은 레이사는 또다시 카즈사에게 도전한다."
1330006888 = "ON YOUR MARK ＠ MILLENNIUM"
3761109965 = "키보토스 대운동회, <황륜대제>의 개막식이 하루 앞으로 다가왔습니다. 밀레니엄의 학생들은 예기치 못한 사고를 극복하고 무사히 대운동회 준비를 마칠 수 있을까요?"
