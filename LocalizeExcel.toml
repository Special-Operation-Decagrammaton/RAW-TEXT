3051470549 = "วาคาโมะบุกเข้ามาอย่างกะทันหันในขณะที่คุณครูกำลังทำภารกิจลาดตระเวน\nคุณครูหยุดวาคาโมะไว้ได้ด้วยความช่วยเหลือจากเซนะ และนักเรียนสถาบัน\nฝึกตำรวจวัลคิรี่ หลังจากนั้นก็ออกไปลาดตระเวนกับเซนะอีกครั้งโดยที่ยังมี\nความเคลือบแคลงใจอยู่"
4125302622 = "วันรุ่งขึ้นหลังจากวาเลนไทน์"
2631208014 = "งานเทศกาลจบลงด้วยดี ฟุบุกิกับคิริโนะโกรธที่วาคาโมะหนีไปได้ ส่วนเซนะ\nบอกว่ารอวันที่จะได้ลาดตระเวนด้วยกันอีกครั้ง ส่วนจิฮิโระก็ทิ้งคำขอโทษไว้\nเพราะช่วยเหลืออะไรไม่ได้แล้วจากไป ความวุ่นวายดูเหมือนจะสิ้นสุดลงแล้ว\nแต่ในตอนนั้นเองวาคาโมะก็ผลุนผลันเข้าในชาเล่ต์"
1047327753 = "แฮปปี้ วาเลนไทน์...?"
410407804 = "ชมรมอัศวินบรรเทาทุกข์มอบช็อกโกแลตให้กับชาวเมืองเนื่องในวัน\nวาเลนไทน์ ขณะที่บรรยากาศอบอวลอยู่นั้น ก็เริ่มเกิดระเบิดและมีนักเลง\nปรากฏตัวขึ้น ทุกอย่างจึงตกอยู่ในความโกลาหล ชมรมอัศวินบรรเทาทุกข์\nที่นำโดยมิเนะเริ่ม 'ปฏิบัติการบรรเทาทุกข์'"
