3330937226 = "불타는 개회식"
2584298955 = "하나코와 아야네의 선서를 시작으로 키보토스 황륜대제의 막이 오른다."
1333557687 = "불타는 실행위원회"
309572292 = "각 학교를 대표하여 황륜대제 실행위원으로 뽑힌 유우카, 아코, 하스미, 마리. 본격적인 시합이 시작되기 전, 실행위원들은 서로 티격태격 신경전을 벌인다."
3733926134 = "노점상의 유혹"
3416522998 = "어느덧 축제 분위기가 무르익고, 스타디움 근처의 노점상 거리도 붐비기 시작한다. 실행위원 업무를 수행 중이던 하스미는 우연히 미식연구회의 부장, 하루나와 마주치고 특별히 관리하지 않아도 살이 찌지 않는다는 하루나의 도발(?)에 하스미는 격분하며 승부욕을 불태운다."
1059932753 = "파란의 물건 빌려오기 1"
121038983 = "미식연구회의 활약으로 중간 순위 1위에 올라선 게헨나. 중계를 보고 있던 유우카는 밀레니엄의 우승을 위해 자신이 직접 경기에 나서기로 한다."
3445498865 = "파란의 물건 빌려오기 2"
1473177672 = "유즈 대신 <물건 빌려오기> 경주에 나가게 된 유우카. 쪽지를 확인한 유우카는 선생님을 데리고 1위로 결승선을 통과한다. 빌려와야 할 물건의 내용이 '좋아하는 사람'이 아닌지 의심받자, 유우카는 부끄러워하며 부정한다."
357458073 = "늦은 점심"
815055312 = "사람들을 도우며 바쁜 시간을 보내고 있는 마리를 위해 점심 권유를 한 선생님. 마리와 선생님은 현무상회의 출장 노점을 방문해 늦은 점심을 즐긴다. 그러던 중 점원이 실수로 화상을 입게 되고, 선생님은 점원을 합동의료본부에 데려다 준다. 환자를 치료하던 세리나와 세나는 어째서인지 선생님이 구호소 내부로 들어가지 못하도록 저지한다."
44282278 = "순찰 활동"
2955793294 = "대운동회의 분위기가 무르익으며 곳곳에서 사건이 계속해서 발생한다. 경기장을 순찰하던 하스미와 선생님은 키리노와 후부키로부터 수상한 학생에 대한 제보를 받는다."
801109073 = "협력 1"
156824262 = "수상한 학생의 추적에 애를 먹고 있던 하스미 일행 앞에 실행위원회 학생들이 나타난다. 실행위원회 학생들은 다 함께 힘을 합쳐 추적에 나서고, 곧 애슬레틱 스타디움의 지하에서 용의자를 발견한다. 그들은 주 3일 근무를 위해 시위를 계획하고 있던 용역 학생들이었다."
3318312354 = "협력 2"
3358539827 = "한창 <장애물 이어달리기>가 진행 중이던 트랙 위로 지하에서 도망쳐 온 용역 학생과 응원 로봇이 난입한다. 이윽고 시로코가 쏜 대전차 로켓에 맞은 응원 로봇은 폭주를 시작하고, 실행위원회가 수습에 나선다."
2375781008 = "우연한 인연 1"
2738269747 = "사건이 일단락되고 실행위원회의 멤버들은 각자의 일정을 위해 우선 헤어진다. 다시 한번 순찰에 나선 하스미는 우연히 곤경에 빠진 백귀야행 학원의 학생들을 발견하고 도움을 주기로 한다."
3141961980 = "우연한 인연 2"
2552643930 = "하스미의 책략 덕분에 백귀야행의 기마는 밀레니엄의 기마를 꺾고 승리를 거둔다. 백귀야행의 학생들은 하스미에게 감사 인사를 전하고 다시 만날 것을 기원한다."
3493720274 = "황륜대제의 주인공"
66281853 = "밀레니엄과 게헨나, 트리니티가 동점을 이룬 상황에서 남은 경기는 <학원 대항 계주>뿐. 주변의 권유를 받아 마지막 주자로 출전하게 된 하스미와 유우카는 우승을 위해 열심히 달린다."
1506422008 = "모두를 위한 홍차"
674303561 = "노아의 폐회사와 함께 대운동회는 막을 내린다. 선생님은 후야제를 준비하고 있던 하스미에게 다가가 대회의 감상을 묻는다. 하스미는 우승을 놓친 것은 아쉽긴 하지만, 나름대로 즐거웠다며 소회를 밝힌다."
1088523469 = "미식연구회 편"
842670294 = "폐회식이 끝난 뒤, 미식연구회의 학생들은 상으로 받은 <만능 식권>으로 음식을 먹으며 담소를 나눈다. 하루나는 준코에게 대운동회가 즐거웠는지 묻고, 준코는 여러 가지 소동에 휘말렸지만 평소처럼 즐거웠다고 답변한다. 이후, 미식연구회 학생들은 후야제를 즐기기 위해 각자의 준비물을 든 채 길을 나선다."
601597532 = "RABBIT 소대 편"
3756768664 = "대운동회에서 발생한 소동을 정리 중인 RABBIT 소대. 사키는 경기에서 좋은 성적을 거두지 못해 아쉬워하지만, 미유는 시민들의 안전을 지킬 수 있어서 보람찼다고 답하고 다들 이 말에 공감한다. 그리고 후야제가 시작되자 RABBIT 소대는 학생들의 안전을 위해 작전을 조금 더 이어가기로 한다."
2149728944 = "게헨나 선도부 편"
2439454168 = "모든 경기가 끝나고 마침내 사라진 히나를 발견한 아코. 히나는 걱정하는 아코를 안심시킨 뒤, 자신이 자리를 비웠던 이유에 대해 설명한다. 그리고 히나는 자신이 없는 동안 아코가 여러 사건을 다른 학생들과 협력하여 해결한 것에 대해 칭찬하며 함께 캠프파이어를 보러 가자고 권한다."
3249747138 = "엔지니어부 & 베리타스 편"
2302245089 = "세미나가 부탁한 일을 처리하던 치히로의 앞에 우타하가 찾아온다. 치히로와 우타하는 대운동회 중에 있었던 일들을 가볍게 회고한다. 그리고 우타하는 장난스럽게 치히로에게도 치어리딩을 권유해 보지만, 치히로는 즉답으로 거절한다."
3783295464 = "구호기사단 & 응급의학부 편"
3449950515 = "합동의료본부에서 환자를 돌보던 세리나와 세나. 마지막 환자가 돌아간 뒤 세리나는 세나에게 간호 일을 도와준 것에 대해 진심 어린 감사를 표한다. 한편, 세나는 세간에 퍼져 있는 <구호기사단>의 소문에 대해 물어보지만, 세리나는 당황해하며 황급히 말을 돌린다."
1795578867 = "실행위원회 편"
2611143306 = "폐회식이 끝난 뒤 실행위원회 학생들은 사무실에서 차를 나누어 마시며 가벼운 휴식을 취한다. 하스미는 노아에게 차를 권하며 오늘의 일이 잘 마무리되어 다행이라며 너스레를 놓지만, 노아는 끝까지 방심할 수 없다며 진지하게 답한다. 그때, 후야제에서 또 다른 말썽이 일어났다는 소식이 전해져온다."
1610223773 = "상으로 받은 <만능 식권>으로 미식을 즐기던 미식연구회 앞에 새로운 미식의 기회가 찾아오는데…"
2189723464 = "대운동회 중에도 키보토스의 평화를 지키기 위해 암약한 RABBIT 소대. 작전의 성과는 과연…"
864400319 = "경기가 모두 끝나고 나서야 히나를 발견한 아코. 열심히 노력한 아코에게 히나가 한 가지 제안을 건넨다."
1656654718 = "대운동회가 끝난 뒤, 축제의 뒷정리를 하던 치히로에게 누군가가 찾아오는데…"
2150761988 = "합동의료본부에서 환자를 돌보던 세나와 세리나. 세나는 막간을 이용하여 평소에 궁금했던 점을 묻는다."
2425727335 = "폐회식을 마치고 막간의 티타임을 즐기는 실행위원회. 과연 대운동회는 무사히 마무리될 수 있을까?"
2558784607 = "성당의 메리 크리스마스 ~구호기사단의 선물~"
2278050079 = "하얀 눈이 만개한 키보토스에 크리스마스가 찾아왔습니다. 모두가 기쁨을 만끽하는 성스러운 날에도 '구호'를 위해서라면 동분서주를 마다하지 않는 구호기사단의 특별한 하루를 한번 살펴볼까요?"
