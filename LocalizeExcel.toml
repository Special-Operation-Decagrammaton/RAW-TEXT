4281580888 = "非常適合午睡的"
797442044 = "因為吃飽而感到睡意的潔莉諾，為了午睡而前往赤冬聯邦學園的圖書館。然而，當他要用書本當作枕頭的時候，被「知識解放戰線」的圖書館管理員紅葉阻攔，兩人起了爭執。"
4124993500 = "第二次勝利"
