2792903995 = "貨物運送"
2134538426 = "小隊成功擊敗提法瑞特，並發現了地底的另一設施。"
1690242507 = "出發準備"
1325603657 = "小隊準備前往鋼鐵大陸，迎戰第7名預言者「涅察赫」。"
184373574 = "等待黎明"
3023142440 = "十字神名的預言者們，已準備好迎接老師一行人。"
1248976768 = "Phase Shift"
3619955884 = "即使馬爾庫特正準備發動「戰爭」，Ain、Soph、Aur仍過著各自的日常，而老師一行人前去拜訪他們。"
1168753793 = "運輸船（１）"
336968138 = "老師一行人搭乘運輸艦抵達鋼鐵大陸上空。然而，他們遭到耶索德的襲擊。"
