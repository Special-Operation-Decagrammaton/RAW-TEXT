4016126250 = "가치의 증명 3"
3435047914 = "히마리가 설계한 '예언의 기록'을 완성한 유우카와 노아. 유우카는 기대에 차 장치를 움직여 보지만… 예상과는 달리 예언의 기록은 평범한 별자리 점을 치는 기계에 불과했고, 유우카는 크게 분노한다."
1319446577 = "와라쿠 공주님의 특별한 공연 1"
2779163313 = "축제에서 <백귀야행 감사제> 공연을 하기로 한 음양부. 치세는 이번 공연은 자신이 준비하겠다며 의욕을 낸다. 카호는 치세가 걱정되어 니야와 함께 치세의 뒤를 밟고 치세는 평소 카호가 준비하던 것과 다른 소품들을 하나하나 구매한다."
264656570 = "와라쿠 공주님의 특별한 공연 2"
3433984452 = "시간이 흘러 공연 당일, 치세는 그 누구도 예상하지 못한 공연을 펼친다. 이에 당황하는 카호와 니야였지만 공연은 성황리에 마무리된다. 공연이 끝나고 치세는 지금까지 준비한 것들이 카호와 니야에게 특별한 감사를 전하기 위함이었음을 밝힌다."
4197282877 = "멀리 휘두르며 1"
