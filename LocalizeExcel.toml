815055312 = "Mari is hard at work providing assistance to festival-goers when Sensei invites her to lunch. They enjoy a late lunch at the Black Tortoise's mobile stall when an employee accidentally suffers burns. Sensei quickly takes the employee to Joint Medical Headquarters. Serina and Sena are treating patients, but they try to keep Sensei from entering the infirmary for some reason."
