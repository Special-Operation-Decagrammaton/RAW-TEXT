3001940845 = "ギブアップしますか？"
2015601494 = "ゴズとの戦闘中、すべての味方の被回復率が減少します。\nシールドを保有している味方は、ゴズからのすべての被ダメージ量が減少します。\n味方にシールド効果を付与する生徒を編成してみましょう。"
1713093913 = "ゴズの一部スキルは範囲内の味方に大きなダメージを与えます。\n該当範囲外に移動するとゴズのスキルを回避することができます。\n味方を移動させるスキルを持つ生徒を編成して、ゴズのスキルを回避してみましょう。"
113078633 = "フェーズ2からはゴズが自分と同じ動きをする分身と一緒に登場します。\n移動スキルでゴズ本体の前へ移動するか、集中砲火状態を付与するスキルを活用して、\nゴズ本体を攻略してみましょう。"
802824913 = "カイテンジャーはHPを共有します。\n広範囲スキルを持つ生徒を編成し、カイテンジャーを攻撃してみましょう。\n\nカイテンジャーのスキルはCC状態を活用することで妨害できます。\nCC状態を持つ生徒を編成してみましょう。"
3530239216 = "無限回転・ULTRAお皿シールドが使用された場合、被ダメージ量が減少します。\nKAITEN FX Mk.0をEXスキルで一定回数攻撃することで、該当効果は解除されます。\nEXスキルで敵を数回攻撃できる生徒を編成してみましょう。"
184225747 = "KAITEN FX Mk.0は一定時間毎に特定のパーツが活性化します。\n活性化されたパーツによって、特定の効果が適用されます。\nパーツが活性化されている間、KAITEN FX Mk.0の被ダメージは該当パーツにも累積されます。"
2040549983 = "ダメージが累積されてパーツのHPが0になったら、該当パーツは破壊されます。\n破壊されたパーツのスキルはこれ以上使用されません。\nパーツを破壊した時、グロッキー状態になり、ATGが減少します。"
577718197 = "ドラム缶ガニは各パーツごとに異なる防御タイプを持っています。\nそれぞれ防御タイプに対応した生徒を編成し、該当パーツを攻撃しましょう。"
4270946096 = "ハサミ攻撃時、反対方向の操作盤の弱体状態を解除すれば、足場を移動して攻撃を回避できます。\n回避した後は、ハサミを攻撃できます。\nハサミの防御タイプに対応する生徒で攻撃しましょう。"
4165932791 = "ドラム缶ガニの特定のパーツは破壊可能です。\nパーツを破壊すると、そのパーツにさらに大きなダメージを与えられます。\nすべてのパーツを破壊すると、戦闘で有利な効果を獲得できます。"
3950991928 = "ドラム缶ガニのフンドシを攻撃すると、クレーンのエネルギーをチャージできます。\nエネルギーが満タンになると、クレーンを使用してドラム缶ガニをグロッキー状態にできます。\nドラム缶ガニが防御態勢を取っている時、グロッキー状態にすると、\nドラム缶ガニの攻撃を防ぎ、より大きなダメージを与えることができます。"
723529624 = "ドラム缶は一定時間毎に味方にダメージを与えます。\nドラム缶には弱体状態が継続的に蓄積され、効果の数に比例してダメージ量が増加します。\n弱体状態を解除するスキルを持つ生徒を編成しましょう。\n弱体状態を解除する度に、ドラム缶ガニの被ダメージ量が増加します。"
