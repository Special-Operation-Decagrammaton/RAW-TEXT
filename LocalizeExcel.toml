2683514966 = "의장님의 요구"
3216219097 = "온천개발부가 소동을 일으켰다는 소식을 듣고 선도부가 등장해 현장을 정리하자, 온천개발부는 뿔뿔이 흩어진다. 만마전은 전투 중에 부서진 신 의사당의 책임을 히나에게 물으며, <게헨나 특별 파티>의 메인이벤트가 될 피아노 연주를 히나가 맡아줄 것을 요구한다."
2188512396 = "의장님의 철학적 사유"
3111060133 = "파티용 특제 요리의 프로토타입을 시식하기 위해 게헨나 파티장에 도착한 선생님. 그곳에서 무언가 평소와 다른 말들을 하고 있는 마코토를 발견한 선생님은, 다른 만마전 부원들에게 마코토가 이상한 상태가 되어버린 원인에 대해 듣는다."
