206294631 = "債權團體前來是為了詢問是否要針對阿拜多斯學生會名下的附屬設施使用權簽訂合約。老師暫時攔住了他們，債權團體要求最晚要在合約效力解除的兩天後之前決定便回去了。為了制定日後的方針，星野終於開口說出過去發生的事，並發現合約簽訂的日期和夢失蹤的日期不謀而合。"
3326988594 = "肉體的極限"
2464018339 = "星野前往第一次遇見夢的廢棄村莊。白子跟著星野，但最後還是跟丟了。野乃美為了查明事情的來龍去脈聯絡管家，管家表示這是為了克服奈芙蒂斯的危機而採取的措施，詳細情形明天會告訴大家。綾音有股莫名的違和感，但大家都把疲憊的一天拋在腦後，宣告解散。另一方面，地下深處的地下生活者正式展開了活動……"
3791222139 = "阿拜多斯學生會（１）"
4172510105 = "老師由於地下生活者的計謀而倒下。另一方面，星野在回去學校的路上，路過被遺棄的村莊時，他回想起與夢的初次相遇。"
2618425109 = "阿拜多斯學生會（２）"
4214382824 = "綾音與茜香對夢的死亡展開調查。在尋找與夢的死亡有關的線索途中，星野查到了一些端倪。"
2384190148 = "那一天"
3030051441 = "過去，星野在為了夢提議的慶典起爭執後，撕毀海報便逕自離去。那天夢消失了，星野找不到他。就在星野繼續講下去的時候，突然一陣鈴響，讓大家嚇了一跳。"
3708666348 = "揭露的祕密"
3744933892 = "來到阿拜多斯的訪客是蘇芳和奈芙蒂斯幹部。他們動員兵力，想要佔據隱藏在沙漠橫貫鐵路的祕密。另一方面，對於正在尋求解決方法的野乃美，奈芙蒂斯幹部提議重新入學高地人學院。"
3567623092 = "對策委員會的起點"
508127969 = "星野回想起白子的第一次見面、茜香與綾音申請入學等等往事。就在大家決定前往區政廳的時候，老師捲入了一場事故。"
2830502693 = "人質"
3676288734 = "野乃美和奈芙蒂斯雙方會面，打算說服對方，沒想到反而被綁為人質。奈芙蒂斯利用野乃美，威脅阿拜多斯學生要使契約無效。就在星野打算獨自出面的那瞬間，白子擋在了前面。"
303369912 = "你們，以及我們"
2939285746 = "星野以壓倒性的實力差距制伏白子。隨後綾音及茜香也帶領雲雨號，加入阻止星野的行列。"
76556335 = "副學生會長的命令"
3023125627 = "茜香與綾音宣告敗北。星野以副學生會長的身分命令大家不要阻止自己，要繼續向未來邁進後離開現場，孤身前往拯救野乃美。"
3787477164 = "反擊"
2641772784 = "蘇芳把奈芙蒂斯背叛的消息告知私募股權基金。同時，老師恢復了意識，動身前往阿拜多斯。老師利用學生會長從缺的情況，使綾音獲選為學生會長。綾音運用學生會長的權限，宣布星野的一切行為皆為無效，並與老師攜手展開反擊。"
2386655349 = "追擊"
325048971 = "為了救出野乃美，老師跟對策委員會的學生們前往區政廳。星野也以武裝狀態壓制住區政廳的軍隊，朝區政廳前進。"
1133678474 = "追擊"
3426514234 = "對策委員會的學生們和老師再度錯過星野，但仍繼續追趕。"
2385018294 = "混亂與混亂"
410768358 = "原先與奈芙蒂斯合作的凱薩PMC背叛奈芙蒂斯，意圖奪取列車砲。星野為了前往區政廳，和PMC展開戰鬥。"
2238279328 = "混亂與混亂"
2445287877 = "星野制伏凱薩將軍，動身前去區政廳。同時，老師及對策委員會的學生們救出高地人學生後，也在向區政廳邁進。"
3612354256 = "債權團大會"
276803654 = "得知奈芙蒂斯與攜手合作的事實後，野乃美怒火中燒。星野前來解救野乃美，然而野乃美卻反而宣布要從阿拜多斯學校退學。阿拜多斯學生們也隨後趕到，凱薩總裁在將契約作廢後揚長而去。"
3243553383 = "債權團大會"
160618110 = "星野與阿拜多斯的學生們成功救出了野乃美。確認野乃美平安無事後，星野立即轉身離去，阿拜多斯的學生們追在星野身後。"
1860528585 = "尋寶"
3956099477 = "蘇芳與凱薩總裁一同搭上直升機。就在凱薩總裁慶祝自己的勝利的剎那間，蘇芳把總裁從直升機上推了下去。蘇芳告訴星野，如果想阻止列車砲的話，就到學生會之谷來。另一方面，從高空墜落的總裁怒不可遏，下令集結凱薩公司的所有兵力。"
1239708147 = "第二次追擊"
984232866 = "阿拜多斯的學生們及老師解救私募基金的人員後，開始摸索前往學生會之谷的方法。此時，奈芙蒂斯幹部及高地人CCC提供了協助。另一方面，星野抵達過去和夢一起尋寶時去過的交匯站，登上開向學生會之谷的列車。"
3256145921 = "第二次追擊"
2322627376 = "阿拜多斯學生及老師搭上希望與光所駕駛的列車後，遭遇凱薩PMC的追擊。"
517692600 = "暴走列車"
598179026 = "面對凱薩PMC的追擊，希望和光最終撞毀了列車。"
2087719702 = "暴走列車"
754525061 = "列車衝撞後，希望與光立刻被凱薩PMC團團包圍。阿拜多斯學生和老師避開凱薩PMC的耳目到達交匯站，開動列車。星野來到學生會之谷，發現隱藏在沙漠橫貫鐵路的祕密。"
3408172578 = "學生會之谷"
638321793 = "星野發現列車砲後，蘇芳露面攔住他。蘇芳對星野宣戰，拿出野乃美的卡片，告訴星野想阻止列車砲進發的話要先過自己這關。"
768493918 = "列車砲"
2040799108 = "星野成功制伏了蘇芳。然而蘇芳並不認輸，再度向星野挑戰。阿拜多斯學生和老師在學生會之谷發現了列車砲。一陣槍聲傳來，阿拜多斯學生及老師循著聲音的來源移動。"
1210234653 = "最後的戰鬥（１）"
1002703607 = "蘇芳再次落敗。就在星野為了破壞列車砲打算再次動手的剎那，阿拜多斯學生和老師現身擋在他面前，加入了戰鬥。"
3797362856 = "最後的戰鬥（２）"
3271869069 = "除了白子以外，其餘的阿拜多斯學生都在戰鬥中耗盡力氣。白子再度與星野交戰。"
1886723209 = "毫釐之差"
2759992648 = "星野終於敗下陣來，阿拜多斯學生和老師說服星野。沒想到蘇芳趁機發動列車砲，前去破壞阿拜多斯。星野為了阻止列車砲，復而攻擊阿拜多斯學生後轉身離去。老師表示必須阻止星野才行，於是向值得信賴的人尋求協助。"
3121219489 = "激戰（１）"
2950950386 = "老師口中值得信任的人正是陽奈。星野來到交匯站，與先一步在那裡等待的陽奈對峙。"
3427914090 = "激戰（２）"
2436668033 = "星野和陽奈雙方都拚盡全力與對方交戰，戰鬥的影響波及到開往綠洲站的火車。"
3101230762 = "未知的事物"
3803574396 = "變成破銅爛鐵的火車好不容易開到目的地，星野在燃燒的列車上回想著與夢之間的過去。"
3874918946 = "唯一的真相（１）"
132408451 = "陽奈把關於夢的真相告訴倒下的星野，老師和對策委員會在雙胞胎的幫助下抵達，撞上了列車砲。"
1382356128 = "唯一的真相（２）"
1456203716 = "星野茫然自失，繼續思考著夢的過世，最終地下生活者的計謀得逞，星野轉化為完全不同的存在。"
3864663142 = "顯現"
2262723767 = "對策委員會和老師奔向存在反轉的星野，試圖阻止他，然而卻不敵強大的力量，全員潰不成軍。更雪上加霜的是「賽特的憤怒」對星野產生反應，開始顯現，彩奈與星奈說兩者的衝突將招致世界滅亡。在絕望之中，白子為了解救大家嘗試與色彩接觸。"
938761530 = "道歉"
1220924498 = "老師在未知的空間裡遇見了夢，縱使無法扭轉過去，他仍下定決心要救出此時此刻自己伸手可及的孩子。"
675540194 = "TERROR vs TERROR"
3143101973 = "為了反過來利用色彩的力量，星奈在戰場上召喚出了白子＊TERROR。白子＊TERROR與容貌發生變化的星野展開了對峙。"
2218727448 = "TERROR vs TERROR"
37327455 = "見到白子＊TERROR的模樣，地下生活者為同一神聖本不該同時存在的現象而發狂，並且開始準備最後的反擊。"
1657311791 = "手冊"
3366159078 = "對策委員會和老師努力地思考該如何讓星野恢復原狀。雖然神祕一旦反轉為恐怖就無法復原，但是他們發現星野現在還沒有完全反轉，因此便決定賭上這一絲絲的可能性。"
3926366854 = "手冊"
926354967 = "總算抵達星野的身邊後，老師和對策委員會開始向他訴說自己的真心。"
319388679 = "必須說出口的事"
1570618741 = "就在對策委員會向星野傳達心意的同時，地下生活者的最終計畫奏效，「賽特的憤怒」就此完全顯現。"
2188327975 = "約定"
1072185142 = "就在一行人面臨空前的危機時，星野終於在不知是現實還是夢境的空間裡，見到了自己一直想見的人。"
3773443473 = "制約解除"
2340870041 = "奇蹟終於降臨，星野成功再次反轉。於是，全員到齊的一行人投入最終決戰，誓言要打倒「賽特的憤怒」和其背後的地下生活者。"
1985827982 = "夢留下的痕跡"
1022838518 = "戰鬥結束後，美麗的藍色火焰在綠洲之上灑落。那一道道火焰正是埋藏在沙漠的昂貴礦物，也是星野和夢一直在尋找的東西。星野終於見到了夢留下來的痕跡。"
2405249657 = "其後留下的事物"
4258312221 = "日常生活再次回歸，剩下來的人還在繼續書寫著故事。"
990172089 = "尾聲（１）"
2169764773 = "星野同意接下阿拜多斯學生會會長一職，而陽奈和真琴則負責處理「雷帝的遺產」列車砲。野乃美和蘇芳也各自把手邊的事情處理好，阿拜多斯自治區難得地恢復了活力。"
1959390195 = "尾聲（２）"
832014371 = "雖然白子＊TERROR在事件後就消失得無影無蹤，但老師還是找到了他，並告訴他自己想對他說的話。於是他們兩人決定接受所有的痛苦和幸福，並且帶著它們繼續向前邁進。"
237598723 = "冒險的開始"
1029808550 = "老師收到一封怪信，於是便前往千年學園的遊戲開發部，在該處見到開發遊戲中的雙胞胎學生，綠和桃井。"
3338381113 = "研討會的會計．優香"
4264874819 = "研討會的會計優香，打算以遊戲開發部實績不佳為由關閉社團。綠和桃井為了打破困境，決定前往「廢墟」尋找祕密武器。"
3931386898 = "前往廢墟"
4072922310 = "綠和桃井想在廢墟找到，記載著製作出最佳遊戲的祕訣的聖經「G.Bible」，不料卻被一群敵對機器人追趕，因而逃往廢棄工廠。"
3321101212 = "那天，我們與少女相遇了"
2114828100 = "遊戲開發部一行人，在廢棄工廠遇到長得像人類的機器人少女，愛麗絲。桃井為了阻止遊戲開發部被廢社，於是便把愛麗絲帶到社團活動室，打算讓她成為社團成員。"
707980707 = "我叫愛麗絲"
3869084317 = "愛麗絲開心地玩著遊戲開發部的前作《故事．傳說．編年史》。遊戲開發部全員看她玩得這麼開心都大受感動。"
2096151113 = "學習說話的方式"
910040027 = "愛麗絲玩遊戲開發部學生推薦的遊戲玩了一整晚，已經學會人類說話的口吻了。桃井遞給愛麗絲各種能偽裝成千年學園學生的物品。"
3197846671 = "稱之為槍也太大了"
6265887 = "遊戲開發部學生為了取得能讓愛麗絲使用的槍支，便前往千年學園的「工程師部」。愛麗絲在那裡選擇了宇宙戰艦用的軌道砲。工程師部為了測試她的能力而向她挑戰。"
2828361379 = "稱之為槍也太大了"
295717469 = "愛麗絲熟練地使用從沒碰過的軌道砲，壓制了工程師部。工程師部的部長詠葉見狀，便害怕起愛麗絲卓越的身體素質。"
252928965 = "資格審查"
222860507 = "優香為了審查新成員的資格而來到遊戲開發部，於是愛麗絲便與綠及桃井一起練習自我介紹。"
3447447898 = "優香的質問"
2666100393 = "經過幾輪問答後，優香同意讓愛麗絲成為正式成員。但她威脅說，如果還是做不出好遊戲就會關閉遊戲開發部。遊戲開發部全員再次前往廢墟尋找「G.Bible」。"
980942246 = "再次，前往廢墟"
2685240113 = "這次和上次不同，由於愛麗絲的大展身手，遊戲開發部輕鬆打倒了廢墟的機器人後，朝向目的地前進。"
771027366 = "位於那裡的存在"
2820527577 = "遊戲開發部一行人抵達目的地──位於廢墟的工廠。愛麗絲在那裡靠直覺找到儲存「G.Bible」的電腦，並且成功把資料下載到遊戲機裡。"
2728548615 = "尋找「鏡子」"
3103417958 = "遊戲開發部為了解開密碼閱覽「G.Bible」而向「貝里塔斯」求助。真紀回答說，如果想解開密碼，需要有被學生會扣押的駭客工具「鏡子」。一行人為了拿回「鏡子」，便前往由女僕部看守的學生會扣押品保管所。"
2899726708 = "Nerd VS Maid"
317160579 = "在愛麗絲和貝里塔斯成員進行佯攻作戰的時候，綠、桃井和老師一起嘗試正面突破研討會。"
413920948 = "Nerd VS Maid"
3365649643 = "由於貝里塔斯暗中進行駭入行動，朱音被困在密室裡。"
2494926665 = "Maid VS Meisters"
14296212 = "遊戲開發部一行人在詠葉部長的幫助下，成功甩開女僕部狙擊手花凛，但另一名女僕部成員明日奈卻出現在一行人面前。"
2780791509 = "潛藏的危機"
3362919123 = "因為耽誤到時間的關係，朱音和花凛也從封鎖中解放出來。就這樣，遊戲開發部又再次陷入危機。這時，愛麗絲及時現身解救遊戲開發部，讓一行人成功進入學生會扣押品保管所。"
4228188430 = "還差一步！"
1685329725 = "遊戲開發部一行人順利取得「鏡子」之後，卻在扣押品保管所遭遇女僕部的部長寧瑠。多虧柚子急中生智成功騙過寧瑠，遊戲開發部才得以順利返回社團活動室。"
2238903513 = "無止境的戰鬥"
1829805873 = "戰鬥後，朱音對任務失敗一事向寧瑠道歉，但寧瑠卻反而表示，對和女僕部打得不相上下的愛麗絲感興趣。另一方面，回到社團活動室的遊戲開發部一行人試著使用「鏡子」解讀「G.Bible」。"
1086770631 = "G.Bible"
2087231337 = "結果事與願違，「G.Bible」的內容只是「請熱愛遊戲吧」這句單純的句子。這讓遊戲開發部的學生們跌入失落的深淵。在愛麗絲的打氣下，遊戲開發部重新振作起來，著手開發《故事．傳說．編年史２》。"
376917210 = "Double O"
2914628993 = "遊戲開發部一行人勉強趕上截止期限，完成了《故事．傳說．編年史２》的開發。上傳遊戲後，遊戲開發部社團活動室遭到來歷不明的槍擊。"
178004961 = "Double O"
1644909910 = "對社團活動室發動槍擊的，是女僕部的部長寧瑠。寧瑠說對上次的戰鬥大感興趣，並對愛麗絲提出挑戰。經過好一陣混戰才滿足地回去。"
3999000705 = "千年大賞"
1100406605 = "遊戲開發部開發的《故事．傳說．編年史２》，在選拔千年學園優秀發明的「千年大賞」中獲得特別獎，因而免於遊戲開發部的廢社危機。在所有人都很開心的時候，安裝了「G.Bible」的遊戲機自己動了起來。"
854019333 = "祕密會談"
350519276 = "陽葵去見研討會的部長莉央。兩人在談論先前遊戲開發部與C&C發生的事，並且針對愛麗絲的真實身分交換彼此的意見。但兩人卻沒能縮小對於愛麗絲立場的差異，兩人的會面最後宣告破局，後來陽葵遭到某人的襲擊。"
2171223093 = "遊戲開發部的平凡日常"
950515874 = "老師久違地前往遊戲開發部部室。成員們為了研發下一部作品而集思廣益，但不知不覺卻變成了觀看愛麗絲玩遊戲。愛麗絲在遊戲過程中遇見作弊玩家並陷入苦戰，但因為柚子活躍的表現而獲得戲劇般的勝利。但下一部作品的企劃沒有任何進展，生活就和平常沒有兩樣。"
258618862 = "～愛麗絲，冒險開始！～ "
1634979540 = "遊戲開發部和老師正在苦思要加入遊戲新作的創意。桃井和綠的意見發生分歧，兩人為了做出最後的結論，於是決定使用遊戲開發部代代相傳的方式決勝負。另一方面，柚子為了讓愛麗絲能獲得特別的靈感，於是給了她任務。苦思該如何執行任務的愛麗絲決定先和老師一起去學園冒險。"
1695437540 = "～愛麗絲和被引導的人們～（１）"
3535563597 = "愛麗絲在校園移動的過程中，遇見了正在慢跑的堇。兩人互相認為對方是同伴和運動夥伴，而後愛麗絲為了繼續進行冒險而離開。愛麗絲在校外遇見了穿著校服的明日奈和花凛，她向兩人提議下次一起去冒險，並且邀請兩人加入隊伍。聽到寧瑠在找愛麗絲的消息後，愛麗絲立刻前往其他地方。"
4226009798 = "～愛麗絲和被引導的人們～（２）"
331927291 = "愛麗絲和千年的學生們見面後，學生們給予了加油，和工程師部見面後則聊了「光之劍」，度過了愉快的時光。後來愛麗絲遇見寧瑠，兩人一起去遊戲中心開心地玩遊戲。雖然兩人曾經是兵戎相見的關係，但現在愛麗絲也能笑著說寧瑠是自己的同伴。"
3180610485 = "不可思議的機器（１）"
249138221 = "有一天，老師從貝里塔斯接獲發現可疑機器的消息。前往貝里塔斯部室的途中，老師和遊戲開發部相遇，便一起調查機器的來歷。但大家都無法對機器的來歷做出結論…突然間，愛麗絲就像是被吸引般伸出手觸碰機器，機器啟動的同時，愛麗絲也發生了異變。"
2273243370 = "不可思議的機器（２）"
3057433435 = "暴走的愛麗絲失去理智，破壞了部室且攻擊了在場的所有人。情況岌岌可危，沒有人能阻止愛麗絲。C&C突然現身讓愛麗絲昏厥，並且解決了可疑的機器人。正當覺得鬆一口氣時，老師從綠的口中得知出乎意料之外的消息。"
888978219 = "崩壞的日常"
1905976681 = "老師原本在照顧失去意識的桃井，接獲綠的聯絡後，便去找窩在遊戲開發部的愛麗絲。儘管老師給予了安慰，但愛麗絲依舊因為自己傷害了桃井而很自責。就在那個時候，出乎預料的人物現身告知了「真相」。"
2526248209 = "殘酷的真相（１）"
342541954 = "來到遊戲開發部的是研討會部長莉央。莉央說愛麗絲是「無名諸神的王女」，並說愛麗絲是魔王。雖然在場的所有人都很憤怒，但莉央很平靜地在談論愛麗絲可能會造成的未來。正當要爆發衝突時，C&C的第五個成員登場了。"
4280260261 = "殘酷的真相（２）"
2268486821 = "擊倒AMAS，寧瑠和季展開了追逐戰。但最後寧瑠卻因為遭到季襲擊而倒下，綠和柚子也因為突如其來的狀況而措手不及。看見這一切情景後，愛麗絲做出重大的決定，並且向在場的所有人宣言。"
2301390180 = "那種事怎樣都無所謂！"
3091811119 = "送走愛麗絲後，千年的學生們都不知該如何是好，原本受傷的桃井突然現身說不能坐以待斃，而且提議要一起去拯救愛麗絲。"
1928599175 = "作戰會議"
3537725688 = "遊戲開發部正在尋找愛麗絲的行蹤。藉由乃愛和優香的協助後，調查出愛麗絲已經前往莉央創造的要塞都市「埃里都」了。在潛入埃里都之前，寧瑠提出一項作戰方案。"
2759004737 = "Big Sister（１）"
4182520481 = "被莉央監禁的陽葵。兩人依舊走在平行線上。另一方面，潛入埃里都拯救愛麗絲的遊戲開發部和工程師部遇見了莉央創造的AMAS。"
37376914 = "Big Sister（２）"
2462813750 = "C&C的成員們依照作戰華麗地擊倒了AMAS。C&C的第五個成員季阻止了勢如破竹的他們。"
229839680 = "要塞都市埃里都"
918387984 = "季原以為寧瑠會獨自去拯救愛麗絲，包含寧瑠在內的所有C&C成員都開始和季交戰。遊戲開發部一一擊敗了AMAS的成員，並且前往埃里都的中心。"
235382079 = "陷阱（１）"
1349201345 = "C&C強大的夾攻成功讓季處於劣勢。季變更了埃里都的結構，藉此孤立了寧瑠。另一方面，原本都很順利的遊戲開發部遇見了莉央的強大兵器前衛君。"
4284078290 = "陷阱（２）"
1075771830 = "在C&C和季對峙的時候，莉央早已察覺到老師和遊戲開發部前來拯救愛麗絲，於是派遣強大的機器人前衛君去阻止遊戲開發部一行人。"
1472787878 = "Checkmate"
1932470324 = "就在莉央篤定自己能獲勝時，陽葵在英美的協助下成功脫逃了。另一方面，少了貝里塔斯支援的遊戲開發部面臨空前的危機，貝里塔斯的副部長千尋在緊要關頭戲劇性地出現了。"
2949478604 = "逆轉的踏板（１）"
2087519716 = "千尋在堇的協助下，取得了位於扣押品保管所的「鏡子」，成功掌握了埃里都的網路。遊戲開發部將此當作契機展開了反擊。"
2570893963 = "逆轉的踏板（２）"
4071798167 = "因為工程師部的活躍表現，遊戲開發部成功擊倒了前衛君。但工程師部也因此必須退場了。遊戲開發部在倒下的工程師部的應援下繼續向前邁進。"
2900133993 = "無法跨越的壁壘"
1637045112 = "C&C的成員以超乎預期的活躍表現擊退了季，遊戲開發部終於聚集在埃里都的中央之塔前。但季再次現身，他在莉央的許可下啟動了決戰兵器「Abi-Eshuh」。"
3331557940 = "作弊玩家"
706464142 = "「Abi-Eshuh」的威力讓大家都相當驚訝。在朱音的建議下，老師和寧瑠找出了弱點，企圖把戰鬥引導為空中戰。但季似乎早已預料到這一點，活躍的表現讓寧瑠受到重傷，一行人逼不得已只好先撤退。"
859505773 = "作為玩家，作為好友"
3991456034 = "情況陷入絕望。正當大家灰心喪氣之際，仔細觀察寧瑠與季戰鬥的柚子挺身而出，提出能讓「Abi-Eshuh」失去作用的方法。"
1152423272 = "那個名字代表的是"
4250229177 = "因為大家齊心協力的關係，千年的學生成功擊敗了季，代號Double O的寧瑠的活躍表現也爭取到了最後的勝利。"
2879188167 = "為王女準備的帕凡舞（１）"
3410221265 = "遊戲開發部抵達莉央所在的地方，在準備救出愛麗絲的瞬間，未來的存在「Key」出現且掌控了埃里都，局勢因此開始步向危機。就在莉央準備犧牲自己來挽回一切時，乃愛和優香出現了。"
324915488 = "為王女準備的帕凡舞（２）"
1522532631 = "在優香和乃愛的協助下，遊戲開發部成功抓住了「Key」。另外，正當工程師部和貝里塔斯等抵禦來自各地的敵人之際。桃井、綠、柚子、老師企圖在陽葵的協助下喚醒愛麗絲，於是便進入了愛麗絲的精神世界。"
2176908388 = "自己想成為的人"
1285561733 = "遊戲開發部和老師終於遇見愛麗絲了。愛麗絲說自己是魔王，自己會害大家受傷，因此猶豫是否該回去。但大家都說自己才是自己真正的主人，於是愛麗絲終於拔出了勇者的證明「光之劍：Supernova」。"
3880903334 = "千年科學學園"
544345914 = "事情告一段落。莉央消失不見，C&C則迎接新成員，遊戲開發部再次開始研發下一部作品。千年再次恢復和平的日常生活。"
108666912 = "序幕"
3860334718 = "聖亞談論伊甸園條約具有的意義與七個古則以及和樂園。她對老師說，從現在開始要說的話是老師的義務，拜託老師千萬別逃避，一定要聽到最後。"
3383571419 = "補課部"
1483887365 = "小春、花子、梓，以及日步美。老師和四名少女聚集在教室裡。小春鬧著說自己處於退學危機。在日步美讓她冷靜下來的時候，這到底是怎麼回事？老師回想幾週前發生的事。"
4127233795 = "茶會"
2556827456 = "老師受三一學生會長-渚和彌香之邀出席茶會。渚提出自己想負責面臨留級危機的補課部學生後，得到老師的同意。老師在茶會和補課部的部長日步美再會。"
2736401965 = "補課部的學生們（１）"
2320947204 = "老師決定跟著日步美，先去見補課部的學生，並在此時遇到因違背良俗而被實現正義部拘禁的花子，以及與實現正義部交戰後被抓來的梓。"
4288766681 = "補課部的學生們（２）"
1080677386 = "小春對著想把花子和梓接出來的老師奚落說，補課部既丟臉又可憐。但其實小春也因為留級危機而被轉入補課部了。加上挫折的小春，所有補課部學生都齊聚一堂。"
1381682562 = "來自我介紹吧！"
3807799700 = "聚集在補課部的學生，各自訴說自己來到這裡的原因，以及未來的目標。當小春聽到「為了不讓因為考試不及格而留級的情況發生，請大家合作」這句話，便說反正這段關係很快就會結束，自己才不需要合作。說完就先離開了。"
3720628732 = "準備考試"
968959922 = "在老師的監督下，準備第一輪考試的補課部的學生們。多虧花子淵博的知識，準備考試的氣氛很融洽。但是日步美說，只要第一輪考試有一個學生不及格就必須合宿。就在她為將來的事擔心時，第一場考試就這麼開始了。"
42497510 = "第1次特別學力測驗"
2338283664 = "在考試途中，日步美發現考題出的是之前準備考試時學過的內容，於是便放下心來。然而第一輪評鑑考試的結果，除了日步美以外，其他三名補課部成員全部不及格。因此補課部合宿的事就這麼定了。"
604324422 = "水面下搖曳的影子"
3378221237 = "老師問渚，如果補課部的學生考試不及格會怎樣。然而渚的回答卻讓人大為震驚。她說，這麼一來就會採取退學措施，而且補課部本來就是以此為目的的社團。這全都是為了找出三一學園的背叛者而設計的，渚還警告說補課部應該有背叛者。"
3020153020 = "合宿，START！"
2563693133 = "為了執行考前合宿計畫，補課部特地前往位於三一學園外圍的別館。雖然在正式開始合宿之前，補課部就已經鬧出了許多令人啼笑皆非的插曲，但是在諸多因素的考量之下，她們決定先一起把別館打掃乾淨。"
660461531 = "大掃除！"
198950639 = "在大掃除的時候，花子表示在正式開始讀書之前應該先去玩水，於是便提議順便連戶外游泳池也一起打掃。就這樣，補課部的成員們一邊打掃，一邊打起了水仗。"
4233186689 = "合宿初日的夜晚"
2960849454 = "為了商量一些事，日步美和老師在夜裡見了一面。日步美向老師表示渚吩咐她想辦法揪出三一的叛徒，但此事卻令她相當苦惱。老師一邊安撫日步美，一邊告訴她自己會想辦法解決這件事。與此同時，自願站夜哨的梓和花子有一搭沒一搭地聊著天，而合宿的第一夜也就在她們的聊天聲中匆匆地結束了。"
3382766713 = "補課部的模擬測驗"
848842177 = "雖然除了日步美以外，補課部的所有成員都沒通過第一次模擬考，但日步美卻沒有因此而洩氣。日步美不但發誓要讓所有人通過考試，甚至還承諾要買Momo好友周邊商品送給在考試中取得好成績的成員。與面露不屑的花子和小春相反，梓不僅覺得那些周邊商品很可愛，眼神中還透露著滿滿的渴望。"
3534072072 = "實現正義部的副部長（１）"
17674601 = "補課部的成員發現小春的包包裡有色情書刊，而小春則急忙推說那本色情書刊只是不小心帶來的沒收品。為了將那本書物歸原主，小春和老師一同前往實現正義部部室。"
3592313078 = "實現正義部的副部長（２）"
2059845093 = "雖然小春不停為自己辯解，但老師卻對此事相當不以為意，甚至還鼓勵她勇敢地做自己。為了報答老師的體貼，小春將自己是實現正義部的間諜一事告訴了老師。和蓮實在實現正義部內交頭接耳了一會後，小春便跟著老師一起回到了別館。"
773890837 = "小小的閒隙"
1756837627 = "聽到花子說自己無法分辨泳裝和內衣的區別時，梓便立刻跳出來宣布這件事將成為第五個古則，並且擺出一副萬事通的高傲姿態。聽完梓說的話，花子在震驚之餘也開始有點動搖。得知花子明明天資聰穎，卻總是故意搞砸考試的事情後，日步美的腦袋頓時陷入了混亂。隔天，彌香突然出現在老師面前。"
135674395 = "三一的叛徒"
892831890 = "彌香表示自己知道渚和老師私底下聊了些什麼，而且只要老師願意和她做交易，她就告訴老師三一的叛徒究竟是誰。彌香告訴老師，叛徒不是別人，就是梓。但作為交易的條件她要求老師好好保護梓。"
3021188189 = "巨大的怪物"
3984423781 = "彌香認為渚想利用伊甸園條約來換取一些好處，倘若想要阻止渚，他們就必須想辦法保護好梓。說完，彌香要老師自己選擇到底要相信她說的話，還是渚說的話。"
1502378419 = "修女會"
1398806955 = "為了替一名碰巧被梓救下的一名學生道謝，瑪麗特地前往別館尋找補課部。當天深夜，為了討論日後的計畫，老師和日步美約好私下見面，然而最後出現在老師眼前的卻是花子，未來的走向似乎越來越令人無法捉摸。"
3715954097 = "深夜密會"
1999585029 = "花子來找老師本來是想討論梓的事，然而她卻意外從日步美口中得知只要有人沒通過考試，他們所有人都會被退學的殘酷事實。花子認為這一切都是渚的計謀，並且誓言要幫助補課部度過難關。對於自己身為三人祕密小團體一員的事，花子顯得有些雀躍。"
3916469784 = "泳裝派對"
3001743394 = "因為一場突如其來的大雨，補課部的成員紛紛被淋成了落湯雞。在迫不得已的情況下，補課部決定以泳裝座談會代替原本的課程。度過了一段平凡無奇卻令人懷念的悠閒時光後，補課部的成員們決定一起去散步。"
1861044050 = "深夜的大騷動（１）"
3288144026 = "在夜裡出外散步的補課部，偶然在甜點店遇見了蓮實。由於雙方都有各自的苦衷，因此蓮實便提議大家將今天在甜點店裡相遇的事當成是祕密。就在此時，一行人收到美食研究會引起騷動的消息。"
391890716 = "深夜的大騷動（２）"
749962361 = "由於伊甸園條約簽訂儀式的日子就快到了，蓮實認為格黑娜學園和三一學園之間的衝突可能會引發喧然大波，於是蓮實只好拜託補課部和夏萊的老師幫忙。於是，他們一行人便立刻動身前往平息騷動。"
2432925314 = "深夜的大騷動（２）"
4237665195 = "由於老師和補課部的活躍，美食研究會的騷動很快就被平息。為了追捕分頭逃跑的美食研究會，實現正義部鍥而不捨地追趕著她們。"
781465669 = "嶄新的觀點"
1190877624 = "為了不讓美食研究會落入三一學園的手中，風紀委員會的陽奈和急救醫學部的瀬奈也隨後趕到了現場。見到陽奈也來了，老師便問問她對於伊甸園條約的看法，而陽奈也欣然告訴老師她對目前局勢的見解。"
3667360070 = "浮現的希望"
3554655960 = "由於補課部的成員們總算順利通過模擬考，日步美便依約買了許多Momo好友周邊商品送給她們。儘管花子和小春極力婉拒，梓卻向日步美保證自己一定會好好珍惜她送的禮物。第二次學期考試前夕，渚決定找老師好好談談關於他和彌香見面的事。"
3715486889 = "黑手"
1616621734 = "即使面對渚的質問，老師依舊表示自己不願懷疑任何人，更不想去追究叛徒到底是誰。老師不僅拒絕了渚的請求，還直接了當地告訴對方自己會阻止她的計畫，並且讓補課部全員通過學期考試。"
194293672 = "第2次特別學力測驗（１）"
2202623311 = "茶會公布了第二次評鑑考試的修正事項。除了考試範圍增加及調高及格分數外，就連考試地點也改為格黑娜學園。儘管這個突如其來的消息令補課部愕然不已，但梓卻認為他們不能就此放棄，於是補課部一行人還是按照原定計畫前往了考場。"
1942601069 = "第2次特別學力測驗（１）"
1391275365 = "擊敗了礙事的格黑娜混混們後，補課部繼續朝著考場邁進。"
644321687 = "第2次特別學力測驗（２）"
3226156325 = "抵達格黑娜學園後，風紀委員們將補課部誤認成實現正義部，並且擋住她們的去路。幸好美食研究會及時伸出援手，補課部才能成功脫離危機並順利抵達考場。然而，在渚的妨礙之下，補課部的成員們還是沒能通過考試。"
4130588728 = "再次回到原點"
1896656556 = "得知茶會的幹部打算讓她們通通退學的消息，補課部的成員們大受打擊。儘管距離最後一次學期考試只剩一週的時間，補課部仍舊想不出任何能幫助她們突破困境的好方法。決定暫時先好好休息的成員們，默默回到了各自的房間去。當天深夜，見到梓獨自離開房間，花子偷偷地跟上了她的腳步。"
2549930740 = "即使如此"
2270700848 = "儘管被逼至死路，補課部依舊努力地準備著最後一次學期考試。最後一次學期考試的前一天深夜，花子躲在暗處默默地注視著和沙織偷偷見面的梓。"
1916659997 = "坦承"
4166289180 = "凌晨時分，補課部的成員們聚在一起討論明天的事。就在眾人得知渚連最後一次學期考試也想耍詐時，梓終於忍不住告訴成員們自己就是「三一的叛徒」。雖然梓認為一切都是自己的錯，但老師卻不認同她的想法。花子也站出來鼓勵大家，她要大家努力通過考試，不讓渚的花招得逞。"
742150805 = "全面開戰"
1216430353 = "就在奧利斯正準備襲擊渚的時候，梓和花子搶先一步綁走了渚。因為甩不掉緊咬不放的奧利斯學生們，梓只好與對方開戰。"
492008709 = "激戰"
3128498563 = "奧利斯的學生們對補課部發動了襲擊。即使被梓放置的詭雷炸傷，奧利斯學生們還是將補課部逼得無處可逃。就在此時，補課部的學生們和老師合力發動反擊。"
707844123 = "就算是這樣的世界（１）"
4054359883 = "雖然補課部成功和老師打倒了一批奧利斯的學生，但很快便又有多的奧利斯的學生朝他們撲了過來。就在眾人訝異為何奧利斯能夠如此輕易地潛入三一自治區時，不知從何處現身的彌香表明自己才是真正的「三一的叛徒」，並且命令奧利斯制服補課部。"
28576329 = "就算是這樣的世界（１）"
2791097982 = "見到老師在連天的烽火中咬牙苦撐的模樣，彌香不禁對老師刮目相看。隨後便提到梓以前曾經襲擊聖亞的事，就在彌香試圖想要動搖補課部時，修女會也加入了這場戰鬥當中。"
3198842828 = "就算是這樣的世界（２）"
141133620 = "將修女會叫來的人正是花子，突然現身的櫻子為了平息事件，並開始與彌香戰鬥。"
2850369990 = "就算是這樣的世界（２）"
3969728237 = "在眾人的齊心協力之下，補課部和修女會成功將彌香逼至死路。最後，彌香終於承認自己輸了，並且向眾人投降。然而老師卻告訴彌香只要她有需要，自己隨時都會為她撐腰，感動不已的彌香向眾人道別。"
1709755666 = "第3次特別學力測驗"
1682079203 = "雖然歷經了無數風波，但補課部最終還是繼續前往考場，準備接受第三次評鑑考試。最終，補課部的所有人都成功通過了測驗。"
3889889279 = "尾聲"
1853472011 = "聖亞雖然相當讚賞成功克服危機的老師，但是她仍舊警告老師他們最後只會落得不好的下場。與此同時，奧利斯小隊也終於開始行動了。"
1023493496 = "事後分析（１）"
2817792322 = "安靜地對襲擊自己的對方搭話的聖亞。看着她跟對方搭話的同時，老師從睡夢中醒來。在這之後老師從櫻子那裡聽說了聖亞遭遇襲擊的事情和始末。"
2940097782 = "事後分析（２）"
3560240457 = "老師從花子口中聽說了這段期間發生的事。此外，他也聽說渚向補課部的大家道歉，並且特地去找彌香見面的消息。"
3451183696 = "事後分析（３）"
1609767318 = "雖然彌香和渚聊了許多，但她們最終還是無法完全理解對方。儘管花子想嘗試了解彌香的動機，但最終因為彌香冷淡的態度而轉身離去。"
3155433875 = "在那之後"
1648638504 = "三一學園持續了一段安靜、和平的日常。老師拜訪格黑娜學園見了真琴後，接著也遇見陽奈，並和她約定在伊甸園條約的簽約儀式上見面後就與對方分開了。"
4236130409 = "伊甸園條約簽約儀式（１）"
1627449016 = "克洛盧斯學校的詩音負責轉播伊甸園條約簽約儀式以及說明伊甸園條約對兩個學園的影響。另一邊，日步美和補課部的部員們在家庭式餐廳一邊享用茶點，一邊紀念補課部解散。"
1969944314 = "伊甸園條約簽約儀式（２）"
646905301 = "在弦生的幫助之下，拜訪「諸聖相通的古教堂」的老師從日向的口中得知三一的歷史。另一邊，奧利斯小隊點燃了戰火，在三一的上空發射飛彈。"
1269971397 = "染上火與灰燼之日（１）"
774689524 = "趁著場外因砲擊而陷入混亂的時候，奧利斯小隊溜進了古教堂的地底下。實現正義部的學生們現身阻擋擅自闖入的奧利斯學生們。"
4175188383 = "染上火與灰燼之日（１）"
1651414121 = "在戰鬥的過程中，日向和實現正義部的學生們目睹了優斯提娜聖徒會的復活場景。"
499449077 = "染上火與灰燼之日（２）"
2565238774 = "為了保護老師，實現正義部和陽奈努力與優斯提娜聖徒會奮戰。"
878733393 = "憎惡的見證"
361954059 = "然而，聖徒會的攻擊卻沒有因此停下。"
288823100 = "憎惡的見證"
3006327975 = "沙織一邊解釋奧利斯長久以來的憎恨，一邊攻擊老師。幸好在陽奈和瀬奈的幫助下，老師才得以勉強脫身。後來，失去意識的老師在夢中見到了聖亞。"
3724307009 = "甜蜜的謊言"
272157938 = "老師在夢中再次見到聖亞，並從她那裏得知伊甸園條約和蓋瑪特利亞之間的關聯。被奧利斯抓住的梓使盡渾身解數逃出他們的控制後，格黑娜和茶會預備兵力展開了正面對決。"
1624201610 = "加速的混亂（１）"
2195551207 = "而晚了一步才抵達現場的前補課部成員們則決定分頭行動。前往大教堂的花子代替櫻子平息了修女會的混亂。被緊急召集到實現正義部部室的小春不知道自己究竟該做些什麼。另一邊，載著受傷的老師的格黑娜學園救護車，抵達了剛發布戒嚴令沒多久的三一學園正門。"
1377799660 = "加速的混亂（２）"
3800416342 = "根據拋體分析結果，眾人得知拋體的發射位置不在格黑娜自治區，而是在三一學園。花子得知<優斯提娜聖徒會>一事後，她警告大家在最糟糕的情況下，三一和格黑娜有可能會消失在奇普托斯之中。"
3662530531 = "遙不可及的另一側"
3512207568 = "日步美花了許多功夫才找到刻意不在他們面前現身的梓。但是梓卻推開了日步美，並且表示自己因為讓大家受傷的事感到相當自責。梓以堅定的眼神發誓自己一定要破壞沙織頭上的光環。在對日步美道完謝後，梓最終還是選擇離去，不停呼喊著梓的日步美獨自一人被孤零零地留下原地。"
2485053728 = "於黑暗之中"
1374661261 = "奧利斯小隊準備好戰術兵器，打算和聖徒會一起進攻三一學園，然而由於梓的游擊戰術，來勢洶洶的他們意外地受到了嚴重的打擊。雖然梓最終還是被抓住了，但是多虧日步美送她的<友情>信物，她最終還是成功脫身。然而她對於自己將日步美送她的珍貴禮物當作砲彈投射的事情，仍舊感到相當自責。"
3252357257 = "對第五項古則的回答"
1561913819 = "聖亞告訴老師，伊甸園條約簽訂一事最終以悲傷又令人鬱悶的結局收尾，對於此事繼續抱有期待只會徒增自己的痛苦。另外她也表示第五個議題依舊是一個無法證明的難題，她對於它以伊甸園條約這個諷刺的名字落幕的事，不禁露出了一抹苦笑。然而老師認為比起為了不確定的難題和未知的未來而感到挫折，不如繼續努力為了學生們而努力，因此老師便離開了聖亞的身邊。"
3162520452 = "數個碎片"
3183955174 = "或許是不經意，也或許是刻意為之，總之聖亞開始檢視與伊甸園條約有關的片段。沙織在敦子的幫助之下撿回了一命，而風紀委員長陽奈則消失得無影無蹤。茶會逮捕了她們懷疑與修女會有來往的花子，而彌香則被從監獄裡放了出來。為了阻止沙織，梓再次重新振作起來，而日步美則帶著堅定的覺悟走進了三一學園的校門內。在病房內清醒過來後，為了拯救自己的學生們，老師再次撐起了身體。"
3179867525 = "憎恨的真相"
2955441922 = "因為拒絕了指揮茶會的命令，彌香遭人殘酷毆打，然而小春則想辦法保護她。就在情況漸漸變得危險的時候，由於老師及時現身保護小春和彌香，茶會的鷹派紛紛四散。在監獄裡的時候，彌香相當後悔自己當初為何想要傷害聖亞，並且還為此留下了眼淚，在得知了彌香的真心後，聖亞決定要原諒她。"
3510190250 = "毫無迷惘"
3395723629 = "老師與受傷的學生們碰面，由於學生們的請求，老師便離開保健室去救其他的學生。日步美、小春和花子三人碰頭，並再次組成目標為拯救梓的補課部，他們一同前往奧利斯和梓所在的古教堂廢墟。"
9241096 = "我們的故事"
1769802021 = "陽奈一邊表示自己要退位，一邊將自己脆弱的一面展現在老師面前，但是在得到了老師的認可後，她便再次回到了格黑娜風紀委員會。終於找到梓的身影後，日步美成為浮士德隊長，並且下定決心和泳裝蒙面團一起與奧利斯小隊對抗。隨著新的伊甸園條約戒律簽訂，以夏萊的老師為首的另一支伊甸園條約祈禱軍正式成立。"
4250678679 = "樂園之名為（１）"
1990540744 = "格黑娜的風紀委員會、三一的實現正義部和阿拜多斯聯手對抗奧利斯小隊。"
4084884875 = "樂園之名為（２）"
872832779 = "隨著戰鬥不斷延長，原以為無法融洽相處的三所學校開始成為一體。"
275424097 = "樂園之名為（２）"
3278894928 = "聖亞注視著這場ETO和ETO之間的對決，她終於承認以前一直想證明樂園存在的自己錯了。"
3228962781 = "樂園之名為（３）"
3156389352 = "隨著戒律失去力量，奧利斯小隊也漸漸失去先前的優勢。即使成員們要她承認戰敗，沙織依舊堅信他們所做的一切都只是徒勞無功，並且堅持繼續戰鬥下去。"
3992775096 = "於古教堂的地下"
4215258149 = "沙織拋下了投降的成員們，並且逕自前往古教堂地底下。老師和梓為了了結這場戰鬥，並追隨著沙織的腳步前往古教堂。"
3039086335 = "誰的憎恨"
1305007844 = "隨著沙織戰敗，疲憊不堪的梓也就此倒地不起。就在此時，敦子忽然現身，並且親口承認他們在這場戰鬥中戰敗了。就像是一直在等待這一刻，瑪艾斯托洛忽然現身，並且宣揚隱藏在三一地底下的教義。為了招待瑪艾斯托洛，老師只好拿出大人的卡片。"
696231722 = "誰的憎恨"
859196225 = "戰鬥結束後，奧利斯小隊神不知鬼不覺地消失在了眾人的眼前。"
1057886975 = "尾聲"
3548500175 = "萬魔殿在格黑娜學園的病房內休養，而以渚為首的茶會則努力重新恢復世界秩序。和伊甸園條約相關得眾人努力找回原本平靜的日常，聖亞回到茶會後，再次與三人來了一場戲劇性的重逢。一張張熟悉的臉孔齊聚在新的補課部辦公室內，平靜的日常也就此再度重新展開。另一邊，一個神祕的人物開始蠢蠢欲動，而他的目標正是戰敗後就消失蹤影的奧利斯小隊。"
2388883385 = "序幕"
742146611 = "經過不斷追擊和逃跑，終於到達極限的奧利斯小隊。敦子為了解救另外3人，不顧自己的人身安全而遭到逮捕。然而等待著3個人的是……"
523418069 = "殘缺不全的茶會"
503633399 = "以幫助茶會的名義，修女會的櫻子與救護騎士團的美禰陪同渚一起出席。令人不自在的茶會正繼續進行，渚告訴老師隔天將舉行彌香的聽證會，而彌香最終將會被退學。"
1425951884 = "監牢中的公主"
1398756343 = "老師為了見彌香一面而前往學院監獄。彌香說聖亞還沒有原諒自己，還有這一切都是自己的錯。老師從彌香口中得知聖亞的狀態不好後，便前往聖亞的房間。然後從聖亞口中聽到「奇普托斯將會滅亡」的話。"
1644694189 = "於夢與海市蜃樓之間"
2642024392 = "聖亞向老師坦白說自己做了太多清醒夢，已經到了分不清現實和夢境的地步。聖亞提出警告，導致奇普托斯滅亡的原因可能在於<蓋瑪特利亞>，但老師建議首先要和彌香和解才行。聖亞呼叫了彌香，卻不知不覺地睡著了，並與<蓋瑪特利亞>再次於夢中進行接觸。"
175200160 = "無法理解的探究者"
4076845186 = "聖亞目睹的是<蓋瑪特利亞>成員們爭論的情景。<蓋瑪特利亞>的成員中，「貝雅特里榭」放話將利用奧利斯小隊把老師處理掉，接著在那一瞬間察覺到什麼，所以解散了會議。聖亞在精神上受到巨大衝擊的狀態下回到現實。並在那個瞬間，彌香來找聖亞了。"
4242006093 = "被折斷的羽翼"
3096862869 = "受到精神打擊的聖亞對彌香大叫著。再次進入夢鄉的聖亞被貝雅特里榭發現，並看到了敦子被掛在貝雅特里榭準備的祭壇上。另一方面，老師在後巷裡碰到了沙織。"
3473989469 = "選擇與決定"
137391815 = "聖亞的狀態越來越嚴重，而彌香則被指控為傷害聖亞的罪人。另外，沙織向老師下跪，請求他幫助敦子。沙織交出了可以粉碎光環的炸彈，老師將其摧毀，並決定幫助沙織。與此同時，彌香得出了結論，認為現在發生的一切該由沙織負起全責，因此強行越了獄。"
3718525211 = "「奧利斯小隊」"
1431856600 = "老師和沙織開始尋找走散的奧利斯小隊成員。與躲在貧民區的日和見面，並成功說服危險地站在橋梁欄杆上的美咲，就這樣大家決定一起前往奧利斯自治區拯救敦子。"
895577034 = "前往奧利斯自治區（１）"
466017759 = "為了進入奧利斯自治區，老師和小隊成員前往成為入口的三一地下墓穴。但是受貝雅特里榭命令的奧利斯學生們，擋住了他們的去路。"
4233624493 = "前往奧利斯自治區（１）"
2841961890 = "多虧老師的指揮讓戰鬥變得更加輕鬆，美咲和日和暫時發出讚嘆後，便伴隨著沙織的催促聲走向三一地下墓穴。"
2385460060 = "前往奧利斯自治區（２）"
519064440 = "抵達三一地下墓室入口的奧利斯小隊成員們，直接打倒阻擋他們去路的敵人，試圖強行突破。"
2048900569 = "前往奧利斯自治區（２）"
2969109627 = "就在打倒擋住去路的奧利斯學生的之後，緊接著隨爆炸聲登場的新追擊者。聖園彌香在奧利斯小隊和老師面前現身。"
767465142 = "追擊者"
1734735203 = "彌香攻擊奧利斯小隊，並抓住了美咲。但是彌香看到了晚來一步的老師就放了美咲。奧利斯小隊趁機進入墓穴，而彌香則開始與阻礙自己的奧利斯追兵交戰。"
308921891 = "奧利斯自治區"
1726588307 = "彌香殲滅奧利斯追兵取得情報。另一方面，沙織因為受傷、睡眠不足與疲勞的關係，當場失去意識暈了過去。於是老師讓沙織服用退燒藥。在奧利斯小隊和老師小睡片刻時，聖亞出現在老師的意識中，警告老師遠離奧利斯自治區。"
2189783169 = "我們的往事"
1121429929 = "在沙織睡著的期間，美咲和日和把奧利斯小隊的往事告訴老師。此時沙織醒來，即使身負重傷，沙織也決定要為了抵達敦子所在的奧利斯巴西利卡前往分校的舊校舍。"
137688653 = "邂逅"
3389099 = "在舊校舍的迴廊上和貝雅特里榭進行通訊時，貝雅特里榭表示自己一直在利用整個奧利斯自治區，只要讓敦子犧牲，「大人」就會有好事發生，藉此籠絡老師。老師拒絕貝雅特里榭的提議，於是奧利斯小隊和優斯提娜聖徒會便開戰了。"
1792504161 = "邂逅"
3516525510 = "突然出現的彌香打倒聖徒會的頭目後，便開始向奧利斯小隊宣戰。"
4151121714 = "殘留之物"
3307885360 = "老師想阻止彌香，但彌香不聽勸。因此老師和奧利斯小隊決定先壓制彌香。"
550001274 = "殘留之物"
3997939746 = "奧利斯小隊好不容易才壓制彌香，但彌香卻對奧利斯小隊和沙織發怒，之後便消失無蹤。小隊再次前往巴西利卡。"
2688011438 = "地下迴廊"
2182299148 = "迴廊通道上的柱子突然崩塌，隔開了沙織、老師和其他奧利斯小隊隊員。出現在沙織面前的，不是別人，正是聖園彌香。形成了沙織和彌香一對一交手的局面……"
3611644228 = "對決"
3307253189 = "在倒下的柱子的兩側，彌香和沙織兩人就這樣看到了對方。彼此都不打算撤退，便展開了戰鬥。貝雅特里榭看著那狀況，便向聖亞說明「那東西」的概念。另一方面，聖亞則是不斷地尋找能脫離白日夢的方法。"
478233283 = "另一個我們"
2294972915 = "在與彌香的戰鬥中敗下陣腳的沙織，回想著和小隊的過往。最後沙織倒下了，彌香雖然走到沙織的身旁舉起了槍，但聽到沙織的話之後，就突然落下了眼淚。"
3895665603 = "無限的可能性"
977567459 = "出現在彌香和沙織面前的老師。老師雖然向彌香道歉，到彌香卻對老師的道歉感到很混亂。在老師持續說教的過程中，偷聽到老師說的話而感到憤怒的貝雅特里榭最後還是進行了儀式。"
3335292298 = "無限的可能性"
1991311275 = "在貝雅特里榭開始儀式的時候，聖亞又進入了另一個夢中的空間。聖亞在那裡遇見了某個人物。"
3974900296 = "聖女白芭蕾"
3127069218 = "奧利斯小隊和老師與貝雅特里榭製造出的優斯提娜聖徒會的聖女白芭蕾展開艱辛的戰鬥。"
382639264 = "前往至聖所"
2623773402 = "彌香下定決心要保護老師和奧利斯小隊不受到聖徒會的傷害。老師和奧利斯小隊為了拯救敦子而決定繼續前進。"
3665603744 = "前往至聖所"
