275424097 = "낙원의 이름 2"
3278894928 = "세이아는 ETO 대 ETO의 싸움을 지켜보며, 낙원의 존재를 증명하고자 했던 자신의 생각이 틀렸음을 인정한다."
3228962781 = "낙원의 이름 3"
3156389352 = "계율이 힘을 잃자 점점 패색이 짙어가는 아리우스 스쿼드. 패배를 인정하자는 멤버들의 이야기에도, 사오리는 여전히 모든 것이 헛되다는 믿음을 버리지 않으며 싸움을 지속한다."
3992775096 = "고성당의 지하"
4215258149 = "항복한 멤버들을 뒤로하고 고성당 지하로 향하는 사오리. 아즈사와 선생님은 이 싸움의 매듭을 짓기 위해 사오리의 뒤를 쫓는다."
3039086335 = "우리의 것이 아닌 증오"
1305007844 = "사오리의 패배, 그러나 지친 아즈사마저 결국 쓰러진다. 그때 아츠코가 나타나 본인의 입으로 자신들이 졌다고 인정한다. 기다렸다는 듯이 마에스트로가 나타나 트리니티의 지하에 숨겨둔 교의를 현현하게 하고, 선생님은 그에 대적하기 위해 어른의 카드를 꺼내 든다."
696231722 = "우리의 것이 아닌 증오"
859196225 = "전투가 끝나자 아리우스 스쿼드는 모두의 앞에서 자취를 감추고 쓸쓸히 어둠 속으로 사라진다."
1057886975 = "에필로그"
3548500175 = "만마전은 게헨나의 병실에서 회복하고 있고, 티파티도 나기사를 중심으로 다시 질서가 회복되어 간다. 에덴조약에 얽혀 있던 많은 사람들이 다시 일상을 되찾고, 티파티에 세이아가 돌아와 다시 세 명이 극적인 재회를 한다. 새 보충수업부에는 익숙한 얼굴들이 모여 있고, 평화로운 일상이 다시 시작된다. 한편, 어딘가에서 패배하고 자취를 감춘 아리우스 스쿼드를 노리는 어떤 존재가 움직이기 시작한다."
