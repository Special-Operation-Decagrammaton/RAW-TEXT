3493058217 = "오늘의 날씨는 맑음"
3443088179 = "장난 전화?"
3852209298 = "사라진 책 한 권"
1899695077 = "게헨나 탈출"
2560054237 = "과거의 편린"
438657240 = "정체불명의 습격 사건"
1258358006 = "낯선 손님"
522611198 = "게헨나의 임시 수호천사"
1786522524 = "벌레는 너네가 더 무서워"
2797142945 = "만마세끼"
1226109342 = "팬케이크 포획 작전"
2622589879 = "누가 푸딩을 가져간 거야?"
1376968473 = "당번을 부탁해!"
2164760396 = "누가 보기 전에"
328580852 = "이부키와 숨바꼭질"
3289919768 = "미식을 대하는 예의"
2496100826 = "주변을 둘러보며 상황을 파악하자!\n\n흐음, 어쩐지 분위기가 꽤 어수선한 느낌인데, 무슨 일이 있는지 부원들에게 물어봐야겠어."
318399169 = "곤란에 처한 후우카를 만나보자!\n\n발렌타인, 게헨나 파티, 급양부에 대량으로 발주된 식자재… 분명 모든 사건의 주범은…!"
3141934736 = "구교사에서 난동을 피우는 불량배들을 소탕하자!\n\n문제아들이 전략을 가지고 움직인다라, 치나츠 말대로 평범한 난동은 아닌 것 같아. 고용주가 누구인지 단서를 찾아보자."
2569897263 = "피아노실 주변을 둘러보자!\n\n게헨나 학원 뒤편에 이런 방치된 장소가 있었을 줄이야. 시간이 조금 비는데 조금만 주변을 둘러볼까…"
2403732486 = "하루의 끝을 마무리하자!\n\n휴우, 정신없는 하루였지. 그나저나 5일 뒤에 열린다는 게헨나 파티. 그리고 만마전의 음모… 아직까진 머릿속이 복잡해…"
2995459567 = "사건 현장을 조사하며 단서를 찾아보자!\n\n난데없이 만마전 의사당 앞을 개발한다니, 카스미가 아무런 이유 없이 벌인 해프닝은 아닐 거야. 피아노 연습도 연습이지만, 지금은 눈앞의 문제부터 해결하자."
1627627988 = "학생들을 탐문하여 정보를 수집하자!\n\n아코의 말대로 게헨나 학생들 사이에서 온천 입욕권이 떠돌고 있어. 온천개발부가 수상한 일을 꾸미고 있는 건 기정사실이야."
3086472127 = "수상한 일을 꾸미는 온천개발부를 추격하자!\n\n게헨나 부글부글 대작전이라니, 농담처럼 들리는 이름이지만, 가볍게 넘길만한 일은 아니야. 조금 더 정보를 수집해야 해."
1626969013 = "감옥에 연행된 카스미를 만나보자!\n\n게헨나 전체에 1인 1온천을 선물하겠다니, 이제는 어떻게 반응하면 좋을지 감조차 잡히지 않아."
3158540525 = "조급해하지 말고 피아노 연습을 하자!\n\n다가오는 파티와 연주를 기대할 선생님을 위해, 조급해하지 말고 여유를 갖고 차근차근…"
3801704183 = "하루의 끝을 마무리하자!\n\n피아노 연주는 아직 익숙하진 않지만, 앞으로 이 페이스라면 어떻게든 해낼 수 있을 것 같아. "
1957882148 = "부장실에서 일과를 시작하자!\n\n신경이 쓰이는 선생님의 연락, 그리고 이해하기 어려운 치나츠의 보고. 평소와 다를 바 없는 게헨나지만, 조금은 불안한 느낌이 들어."
1304712371 = "학생 식당을 활보하는 팬쨩을 붙잡자!\n\n움직이는 팬케이크… 치나츠에게 보고받았을 땐 무슨 엉뚱한 소리인가 싶었는데, 두 눈으로 직접 보니 이해가 돼. 그런데 이것들의 출처는…"
610392988 = "공원에 출몰한 초거대 팬쨩을 저지하자!\n\n방금 미식연구회를 붙잡은 참인데, 이번엔 거대한 팬케이크의 출몰인가… 하아…"
2177230518 = "감옥에 연행된 하루나를 만나보자!\n\n파티 음식을 맛보기 위해 후우카를 납치했다니, 정말이지 미식연구회는 변함이 없네."
2187336480 = "악보에 집중하며 피아노 연습을 하자!\n\n준비는 끝났어…! 여유 시간이 많진 않지만, 악보에 집중하고 연습을 하는 거야."
1136050044 = "하루의 끝을 마무리하자!\n\n오늘 하루도 어떻게든 지나갔나… 내게 남은 시간은 4일… 조금만, 조금만 더 힘내는 거야."
3855672209 = "챙겨온 악보를 정리하자!\n\n그래, 조급해하지 말고 지금 내가 할 수 있는 만큼만… 그런데 선생님의 연락과 응원… 매우 기쁘지만, 뭔가 신경이 쓰여."
3729000631 = "이곳저곳에 설치된 마코토 동상을 회수하자!\n\n만마전 하나로도 골치가 아픈데, 다른 문제아들까지 한패로 움직이는 건가… 일단은 여기 있는 동상들부터 처리하자."
107297234 = "문제아들의 은신처를 찾아 정리하자!\n\n하아, 대체 마코토에게 어떤 사주를 받았는지 모르겠지만 계속해서 난동을 피우겠다면 끝까지 제압해 주겠어."
1776716070 = "세나가 준비한 연고를 찾아보자!\n\n정리는 마무리했지만, 나도 조금 지나친 감이 있었던 것 같아. 부디 큰 부상자가 없었으면 좋겠는데…"
3732203121 = "손끝의 선율을 느끼며 피아노 연습을 하자!\n\n조금은 건반이 손에 붙은 느낌이야. 후훗, 연주라는 게 이렇게나 즐거운 일이었구나. 오랜만에 느끼는 감각이야."
990824040 = "하루의 끝을 마무리하자!\n\n오늘도 여전히 파란만장한 하루였어. 짧은 시간이었지만, 내일은 연습한 성과가 나왔으면 좋겠는데…"
2068928161 = "업무를 마무리하고 정기 훈련을 준비하자!\n\n휴우, 파티를 앞두고 정기 대테러 훈련인가. 특별히 힘든 훈련은 아니지만… 응, 내가 완벽하게 해내지 않으면… "
3900612289 = "정기 훈련에 참가할 부원들을 소집하자!\n\n게헨나 자치구에 뿌려진 수상한 전단지. 분명 만마전에서 수상한 일을 꾸미고 있는 거겠지. 하지만 지금은 이런 거에 신경 쓸 겨를은 없어."
2796525508 = "이오리를 도와 수상한 전단지를 회수하자!\n\n만마전의 말썽으로 이오리가 고생이 많네. 부장인 내가 손 놓고 있을 수는 없지. 그런데… 선생님은 괜찮으려나…"
1797291382 = "만마전에 벌어진 소동의 진상을 알아보자!\n\n하아, 얼토당토않은 소동에 이부키가 휘말린 건가. 그래도 크게 다치지 않아 다행이야. 일단 진상 정도는 알아볼까."
4023772365 = "소집한 부원들과 함께 정기 훈련에 참가하자!\n\n모든 부원이 모였고 훈련 준비는 전부 끝났어. 정기적으로 하는 훈련이지만, 소홀히 해서는 안 되겠지. "
1542042713 = "다시 한번 정기 훈련에 참가하자!\n\n평소였다면 마코토의 요구에 반박하겠지만, 의미 없는 말씨름으로 시간을 낭비하고 싶지 않아."
2778212802 = "마음을 가다듬고 피아노 연습을 하자!\n\n추가 훈련으로 연습 시간을 대부분 빼앗겼지만, 동요하지 말자. 해낼 수 있어, 잘 해낼 수 있을 거야."
2808151776 = "하루의 끝을 마무리하자!\n\n내일이면 파티 당일. 손끝이 떨리는 건 당연한 일이겠지. 하지만 이대로는…"
556520415 = "아코에게 연주에 대한 속마음을 전하자!\n\n오늘만큼은 내가 가진 모든 최선을 연주에 쏟고 싶어. 조금만, 아주 조그만 고집을 부려도 괜찮겠지…?"
424240925 = "만전을 기울이며 피아노 연습을 하자!\n\n긴장 때문에 좀처럼 손이 따라주지 않아. 그래도 무대에서 실수만큼은 하고 싶지 않아. 완벽한 연주를 위해 건반에 모든 집중을 하는 거야."
1211557641 = "게헨나에 벌어지는 모든 혼란을 정리하자!\n\n지금 내가 할 수 있는 피아노 연습은 끝났어. 연주를 시작하기 전, 게헨나의 말썽꾸러기들부터 빠르게 정리하자."
2047835697 = "파티 무대에서 피아노 연주를 하자!\n\n나를 도와준 부원들과 학원 친구들… 그리고 선생님을 위해… 응, 멋진 연주로 보답하는 거야."
1233708660 = "어질러진 방을 정리하자!\n\n선생님에게 선물 받은 이 장난감, 지금은 무엇과도 바꿀 수 없는 소중한 보물이야."
3329307650 = "주변을 의식하지 말고 앞으로 나아가자!\n\n가끔 게헨나에는 이해하기 힘든 일들이 일어나는 것 같아. 요즘 많이 피곤해서 그런가…? "
3107481871 = "장난 전화를 하는 학생을 혼내주자!\n\n내가 아닌, 다른 부원들의 업무를 방해하는 사람은 단단히 혼을 낼 필요가 있어."
3306064596 = "사라진 책 한 권을 찾아보자!\n\n유난일지 모르겠지만, 책장의 한 군데가 비어 있으면, 조금 신경이 쓰인단 말이지…"
2012136030 = "탈옥 사건이 발생한 현장을 조사하자!\n\n온천개발부 부장 카스미… 정말 방심할 수 없는 인물이야. 다음에 잡히면 선도부의 무서움을 똑똑히 알려줘야겠어."
2319967817 = "피아노실에 숨겨진 낡은 수첩을 찾아보자!\n\n이곳에서 소중한 꿈을 키웠던 이름 모를 당신. 걱정하지 마, 당신의 노력은 헛되지 않았어. 이렇게 내가 기억하고 있으니까."
9172985 = "소란이 벌어진 학생 식당을 조사하자!\n\n대체 어떤 요리를 먹었기에 이곳 모두가 정신을 잃고 쓰러진 거지? 정말로 알다가도 모를 일이야."
2934280817 = "학생 식당에 찾아온 길고양이의 흔적을 찾아보자!\n\n급양부의 음식 냄새를 맡고 여기까지 찾아왔던 거구나. 부디 좋은 주인을 만나길 기도할게."
2003080857 = "침대에 누운 부상자를 간호하자!\n\n부원들의 반응을 보니 약손 치료의 효과가 굉장한가 보네. 다음에는 선생님께도… 아니, 아니 지금 무슨 생각을!"
3684066488 = "응급의학부실에 들어온 벌레를 찾아보자!\n\n모두를 벌레 하나로 호들갑이라니… 조금 이해가 가질 않아. 내가 이상한 건가?"
2904112170 = "다시 한번 팬쨩을 붙잡자!\n\n대체 주리가 만든 요리는… 아니야, 깊게 생각하지 말자. 지금은 눈앞에 있는 저것에 집중해야 해."
487185434 = "사라진 푸딩을 찾아 짐 더미를 수색하자!\n\n마코토의 요구 따윈 들어주고 싶진 않지만, 정말로 교내에 범죄가 발생한 거라면 선도부로서 방관할 문제는 아니니까."
4196165701 = "에리카를 도와 어질러진 교실을 청소하자!\n\n응, 곤경에 처한 학생을 돕는 것도 선도부의 일. 교실 청소야 어렵지 않으니, 조금 거들어 볼까."
552395824 = "교실 곳곳에 그려진 낙서와 포스터를 정리하자!\n\n마코토를 음해하는 낙서와 포스터. 평소 행실의 업보라고 생각하지만, 학생들의 수업 일정에 지장을 주는 거라면 다른 곤란한 문제야."
3034885123 = "술래가 되어 숨을 학생들을 찾아보자!\n\n숨바꼭질이라, 어렸을 때 해봤던 기억이 있어. 물론 내가 술래가 되면 너무 빨리 찾아 모두가 곤란해했지만…"
690950655 = "준코가 잃어버린 식권을 찾아보자!\n\n미식연구회… 어쩔 도리가 없는 사고뭉치인 동아리지만, 음식과 동료들을 위하는 마음은 진심이구나."
