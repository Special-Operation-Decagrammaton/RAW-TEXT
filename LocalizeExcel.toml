3643696836 = "3點10分，往格黑娜"
342073680 = "一花的任務是找回帶三一的貴重文物，並協助參與挖掘工作的老師。一花很高興有機會和老師一起工作，欣然接受任務。但載著文物的列車，卻駛向了其他目的地……？"
