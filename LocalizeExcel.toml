842670294 = "After the closing ceremony, the students of the Gourmet Research Society share a meal purchased with the General Meal Ticket they won. Haruna asks Junko if she enjoyed field day, and Junko replies that it was fun despite all the trouble. Later, the Gourmet Research Society heads out to enjoy the after-party, each with a special something in tow."
601597532 = "RABBIT Squad Episode"
3756768664 = "The RABBIT Squad is on clean-up duty after field day. Saki is disappointed that they didn't do well in the competition, but Miyu reminds her that protecting the citizens of Kivotos was its own reward, and everyone agrees. As the after-party begins, the RABBIT Squad decides to continue their operation a little longer to keep the students safe."
2149728944 = "Gehenna Prefect Team Episode"
