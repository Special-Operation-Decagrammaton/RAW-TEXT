1458542543 = "為了迎接幸運"
2394074920 = "日落十分，亞伽里和老師為了吃烏龍麵展開了烏龍麵巡禮。亞伽里聽說只要征服各地知名烏龍麵店，就能獲頒證書，於是在各地奔走直到日落，最後贏得了烏龍麵制霸證書。"
1588234287 = "慶典很精彩。真的，真的，真的！"
