504218798 = "莉央的計畫"
648350015 = "我發現校園中有些學生的動向很可疑。依照我的立場，如果是平時的話，我可能會選擇忽略過去，或是稍微告知一下研討會就算了……但因為情況特殊，我不自覺地就跟蹤他們了。- 聖亞"
2965673131 = "那些可疑的人……會是誰呢？說什麼要破壞博覽會來獲益……他們八成在策劃著某些荒謬的事。如果放任不管肯定會出事的吧。- 聖亞"
334310010 = "在工作……尤其是在「作戰」時，最好每到一個段落就將情報進行整理。我會一直在這裡等著。如果忘了什麼或想再聽一遍的話，隨時可以過來。- 莉央"
2204937774 = "要尋找線索的話，去人多的地方會比較順利。比如三一廣場的噴泉前那樣的地方……那就先從教室開始調查吧？- 聖亞"
4174324411 = "機器寵物……？把機器人……當寵物？是仿照狗或貓製作的機器人嗎？那它們吃什麼呢？是電嗎……？對我個人而言，這跟線索同樣讓人感到好奇呢。- 聖亞"
565085471 = "發現了來歷不明的晶片。不過……只要交給莉央應該很快就能查明。但我很清楚，這一定是出於不好的意圖而製作的。- 聖亞"
2223345760 = "原來那是……機器狗嗎。這究竟是莉央個人的品味，還是千年的人普遍認為那種程度就算是狗了呢？- 聖亞"
95517514 = "在工程師部的作品裡，出現了連他們自己不知道的晶片。活動因為晶片而差點陷入危機，工程師部也遭人誤會。這顯然是有人蓄意破壞。問題是誰會做這種事呢……- 莉央"
1245778966 = "莉央那傢伙總是會製作一些奇怪的東西。雖然設計常常有點古怪，但性能確實挺可靠的。……唉，讓我想起過去了。我明明不是那種會沉浸在感傷中的類型。- 寧瑠"
365206562 = "要潛入資料中心啊……感覺還不賴。最近總是在接一些簡單的工作，難得有機會能活動一下身體。以前明明……不對，為什麼又在想過去的事啊。- 寧瑠"
3686271168 = "只要有足夠的數據，就能對許多情況加以預測。今後將不再只對已發生的事件進行追蹤。雖然藉由分析得出結論的是我……但我認為這是兩人一起達成的成果。- 莉央"
1277669418 = "遊戲開發部……應該是製作遊戲的地方吧。互相分享興趣並一同創造……恰好符合了「社團」的宗旨呢。希望三一也能有更多這樣的地方……- 聖亞"
4126678237 = "遊戲開發部的人還真特別呢。不僅充滿活力……看起來隨時都很快樂。這些人製作的遊戲，一定也充滿了有趣和刺激的內容吧。開始有點期待了。- 聖亞"
2590850258 = "竟然破壞了大家一起精心製作的遊戲……雖然不知道是誰，但犯人實在太過分了。我一定要查明真相，為遊戲開發部的人們洗清冤屈。這就是「盜賊王」應該做的事。- 聖亞"
744738424 = "繼工程師部之後，連遊戲開發部也……必須盡快抓住犯人，以免造成更大的損害才行……寧瑠，務必要成功啊。- 莉央"
2253968242 = "那邊……應該是出問題了吧？不過那些運動狂這樣訓練也不是一兩天的事了……真讓人搞不清楚到底是真出事了，還是只是正常發揮而已。算了……既然當事人看起來很困擾，就先幫幫忙吧。- 寧瑠"
74454459 = "很好很好，總算被我逮到了。之前一直都在收拾善後，現在既然被我親眼撞見，可不能輕易放過他們。畢竟我們也因此受了不少累啊！- 寧瑠"
3102902340 = "既然現場逮捕沒能成功，現在只能進行搜索和突襲了……雖然不太情願，不過也只好使用那個了。- 莉央"
1980715747 = "大姐頭演算法……好久沒提到這個名字了啊。如果是以前，寧瑠知道我打算使用它的話，或許會前來阻止我吧。如果當時那麼做了……也許現在的情況就不一樣了吧……- 莉央"
541035342 = "竟然制定了這麼荒謬的作戰啊，莉央。你仍然想用那種獨斷且自我犧牲的行為，試圖解決一切啊……明明沒有任何人希望看見這樣的結局的。很遺憾，我無法對你的這個計畫置之不理。這裡就交給寧瑠跟我吧。- 聖亞"
