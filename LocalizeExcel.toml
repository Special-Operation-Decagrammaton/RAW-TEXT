1517194776 = "用重裝對付重裝"
1914874609 = "渡假勝地使用券的真相（１）"
3115624347 = "渡假勝地使用券的真相（２）"
4105665590 = "人生，世事難料"
1877741647 = "某天，綾音召集了對策委員會的成員，並宣布有「重大告知」。在告訴大家自己用每個月一點一滴存下來的錢買了一架直升機的同時，在賓果大會抽中頭獎的茜香興沖沖地衝了進來……"
1346643999 = "真的是，人生世事難料（１）"
2189810503 = "因為意外抽中的頭獎而來到渡假勝地的對策委員會和老師，在嬉鬧中說著「人生世事難料」的時候，移動中的直升機突然開始墜落──"
2683639091 = "真的是，人生世事難料（２）"
1868167028 = "雖然直升機墜落了，所幸大家都平安無事。抱著去渡假勝地總會有辦法修好直升機的想法來到的卻是個像廢墟一樣的地方……對知道自己被騙了而難過的茜香，大家以「只要從這裡開始就好」來安慰他。重新振作起來的茜香，決定要在這裡度過「最棒的假期」。"
1755482596 = "再合適一點的藉口（１）"
3178234890 = "對策委員會的大家決定分組進行渡假勝地的復原行動。茜香和星野負責渡假勝地的清理。老師在和星野一起打掃時，受到了良舞率領的頭盔團的襲擊──"
2119647362 = "再合適一點的藉口（２）"
2685399187 = "星野和茜香總算是成功擊退了良舞以及頭盔團。然而，因為戰鬥使原本已經打掃乾淨的房間又變得亂糟糟的……不巧，這時白子和野乃美正好回來，看見了這副髒亂的模樣，便以為他們都在偷懶。"
1541851928 = "先發制人（１）"
1621492409 = "屋子的整理告一段落後，白子和老師為了取得食物而一起去釣魚。綾音後來也加入了他們。就在三人準備要開始釣魚時，良舞率領的頭盔團與若藻再次發動了攻擊──"
3445130317 = "先發制人（２）"
1174669819 = "接受良舞的要求作為支援部隊的若藻，因為老師也在而陷入混亂無法戰鬥，與頭盔團一同逃走了。另一方面，白子因為釣魚道具在戰鬥中受到破壞而非常失落。"
806822330 = "我來幫忙老師了（１）"
4019663412 = "知道老師也在這個渡假勝地的若藻，誤以為老師被壞人給抓走，便和良舞與頭盔團一起發起進攻。綾音雖然試圖和平解決，若藻卻不由分說地發動了總攻擊。"
2351574080 = "我來幫忙老師了（２）"
2322437162 = "一行人成功擊退了若藻，此時先前獨自去釣魚的白子看到了滿身瘡痍的大家吃了一驚。另一方面，敗下陣來的若藻強迫良舞和頭盔團使出殺手鐧──"
1269668176 = "不請自來的客人（１）"
3542746869 = "為了復原渡假勝地而來到控制室的對策委員會，在那裡發現了名為渡假勝地防禦系統的陌生裝置。認為這樣一來就能不用再害怕頭盔團和若藻而啟動防衛系統的對策委員會，卻因為自己同樣沒有登錄在防衛系統中也受到了攻擊──"
2399187411 = "不請自來的客人（２）"
2351619502 = "好不容易讓系統穩定下來的對策委員會再次回到了渡假勝地。但是不知道為什麼渡假勝地周遭的頭盔團也全部都受到警衛機器人鎮壓，而倒成一片。"
3081295153 = "仲夏夜之夢"
78535287 = "幾經波折後終於將渡假勝地的復原告一段落的對策委員會一行人，在夏季的海灘上享用了烤肉。在這段時間裡，他們才真正享受到了能夠忘卻現實的快樂假期。"
3720861641 = "飛來的救生圈"
3009396054 = "睡過頭的老師與星野度過了一段悠閒的時光。就在其他對策委員會的成員們都在修理直升機，老師與星野打算繼續悠哉下去的時候，渡假勝地防衛系統突然發出了警報。乘坐著巨大氣墊船的若藻為了奪回老師再度攻了過來。"
1077182490 = "用重裝對付重裝"
2820779354 = "僅憑星野和老師無法抵擋若藻，又因為壓倒性的戰力差距而漸漸陷入困境。但是，星野的眼神裡卻絲毫沒有放棄。對詢問自己為何如此游刃有餘的老師，星野笑著說因為自己相信對策委員會的大家一定會來。正如星野所說，結束直升機維修的一行人果真前來救援了。"
2364370372 = "渡假勝地使用券的真相（１）"
848028279 = "大家成功擊退了若藻以及頭盔團。向他們詢問為何如此堅持要襲擊這裡時，他們表明了自己也有相同的渡假勝地使用券，並而他們也只不過是圍繞著這個失樂園渡假勝地使用券展開渡假勝地戰鬥的集團之一而已。大家決定在事態失控之前盡早離開這裡。"
1316559450 = "渡假勝地使用券的真相（２）"
184087796 = "短暫而精彩的假期宣告結束，老師必須早點回到夏萊。雖然假期和預想中完全不一樣，大家卻依然很開心。在老師離開之後準備離開的大家卻發現了「渡假勝地使用權」最終持有者的名字──"
2778041043 = "出差！百夜堂大海之家加盟計畫"
172671033 = "為了開啟新的事業「海之家」，百夜堂一行人來到了渡假勝地。\n然而等待著他們的卻是渡假勝地之間的權利爭奪「Resort・Battle Royal」。\n究竟靜子能否順利守護「海之家」呢──！？百夜堂嶄新的戰鬥，即刻開始。"
1940212607 = "夏天尚未結束"
3019187095 = "要做的事只有一個！"
985681819 = "總之先整理狀況吧"
3149087222 = "硫磺礦工們（１）"
633836269 = "硫磺礦工們（２）"
3599319087 = "向著下一個目的地"
248228498 = "白耳怪物們（１）"
602045043 = "白耳怪物們（２）"
2996925887 = "玄武的使者們（１）"
1574118782 = "玄武的使者們（２）"
1023075678 = "在最後的戰鬥之前"
2234049552 = "頭盔團！最後的決戰！"
2135228425 = "於是夏天的尾聲到來"
2224315914 = "夏天尚未結束"
2571315120 = "等待老師回到夏萊的是，百鬼夜行聯合學院的仁耶和三森，以及菲娜。據說，有百夜堂的事需要商量，還有，靜子正位於剛才的「失樂園渡假勝地」……。再次回到渡假勝地一行人的面前「泳裝蒙面團」襲擊了過來。"
3339314761 = "要做的事只有一個！"
2566461510 = "知曉「渡假勝地使用權」的總負責人變為「節慶營運管理部」的一行人，從靜子聽說和章魚銀行締結的契約內容。然而，判明了章魚銀行並不是實際存在的企業……。得知被欺騙的靜子，即使受到打擊也在此情況將計就計，宣言了要從佔領了其他島嶼的人們回收契約書。"
866798122 = "總之先整理狀況吧"
3677973191 = "於準備前往其他島嶼的途中，確認了仁耶蒐集的目前勢力圖的一行人。因分成了幾座群島，阿拜多斯及百鬼夜行便兵分兩路前往回收契約書。"
244971942 = "硫磺礦工們（１）"
992183906 = "靜子們最初前往的是，「尋找夢幻溫泉的硫磺礦工們」所佔領的島嶼。那裡有著，打算挖掘海洋深層水以打造深海溫泉渡假勝地的格黑娜溫泉開發部的身影──"
945809083 = "硫磺礦工們（２）"
4177740208 = "靜子們，因知世的活躍成功發現了溫泉。認輸的溫泉開發部，雖然將契約書交出……反而，靜子提出了新的契約詢問是否要和百夜堂締結加盟契約進而營運溫泉渡假勝地。"
2437669702 = "向著下一個目的地"
9719984 = "結束了和溫泉開發部的加盟契約，姑且和阿拜多斯成員共享互相狀況的一行人，前往了下一個目的地。"
4025448392 = "白耳怪物們（１）"
1455533879 = "一行人下一個前往的是由「將敗者引向破滅的白耳怪物們」營運的渡假勝地。跟著就像是被什麼附身一樣搭上船的人後，那裡卻是「祕密．甲蟲皇后大會」的會場。聽說於大會優勝的話，就能回收契約書的一行人，借助菲娜和楓的力量挑戰了甲蟲皇后大會。"
1990939403 = "白耳怪物們（２）"
2476002705 = "因知世的活躍於甲蟲皇后大會優勝的一行人。順利回收了契約書後，聽說了她們對於甲蟲皇后大會的靜子，提案了是否締結加盟契約繼續開催甲蟲皇后大會。"
1596206066 = "玄武的使者們（１）"
4125761811 = "靜子們下一個前往的是「對一切要求代價的玄武使者們」的島嶼。那裡似乎是，由山海經的玄武商會營運的渡假勝地。然而卻因投訴而炎上，前往觀看情況卻發現，進行了不當費用的要求，也沒有像樣服務等等的悽慘狀況。憤於惡質渡假勝地的靜子，老師在旁告知了他們並非玄武商會而是黑龜組的事實。"
3480568884 = "玄武的使者們（２）"
1288353414 = "打倒了黑龜組和喵天丸的一行人，受到了喵天丸提案是否和其他島嶼同樣締結加盟契約。將其提案以一句「夢話就留到夢裡說吧」一腳踢開的靜子，前往了下一個島嶼。"
3867903048 = "在最後的戰鬥之前"
3483691157 = "面對最後之戰前，和阿拜多斯成員召開作戰會議的靜子們。聽說了頭盔團和凱薩PMC有關聯的事實。於喵天丸也向凱薩PMC雇用了兵力感覺到，在這前方等待著的，並不是單純的頭盔團同時，一行人堅定了前往最後之戰的決意。"
3161074241 = "頭盔團！最後的決戰！"
3255147536 = "等待著前往和頭盔團進行最後之戰的一行人是，過去將阿拜多斯逼近絕境的凱薩董事本人。目前負責章魚銀行營業職員的凱薩董事，即使向靜子提案了新投資也被拒絕。就這樣向著靜子襲來的頭盔團以及新人的泳裝蒙面團……！百鬼夜行和阿拜多斯漫長的夏天，最後之戰即刻開始！"
2912056471 = "於是夏天的尾聲到來"
3801914199 = "判斷形勢不利的凱薩董事，即使計劃綁架老師逃走，也因若藻而被阻止。就這樣漫長夏天的騷動落下帷幕，事情告一段落────沒能那麼順利。被告知「失樂園渡假勝地」，原是聯邦學生會持有的土地，凱薩擅自販賣了權利。就這樣即使解決了渡假勝地的所有問題，卻變為請求琳讓其舉辦慶功宴。不過一行人在最後的宴會享受了一番。"
3000475038 = "放學後的甜點故事～甜祕密和槍擊戰～"
952532459 = "老師從放學後的甜點部的千紗那裡收到了諮詢的請求。\n似乎和她的過去有關──\n突然闖入平凡少女的日常生活，\n這無法預測的故事，將會走向什麼樣的結局……！？"
1976722127 = "想和老師商量的事"
