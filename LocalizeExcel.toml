3028720699 = "另一面的苦衷"
2352385492 = "聯邦學生會的防衛室長「香耶」，出現在查看訊問記錄的環奈和老師面前。香耶說明聯邦學生會簡略的組織圖和SRT特殊學園解散的經過，並拜託老師幫忙說服RABBIT小隊的隊員們。"
2002976807 = "揮之不散的疑心"
343907048 = "突然負責起管理RABBIT小隊職責的老師雖然建議RABBIT小隊隊員們留在舒適的夏萊辦公室，不過隊員們懷疑老師的用意，於是繼續露宿在公園裡。"
1691499850 = "開始籌措糧食吧"
1706575867 = "隔天，來到公園的老師見到餓著肚子什麼都沒吃的小隊成員。小隊成員不斷拒絕老師的好意，於是老師告訴他們能免費得到食物的地方。抵達該處的小隊成員得知那並不是免費食物，而是「便利商店報廢的便當」。"
3423941325 = "胡蘿蔔作戰（１）"
3800690627 = "多虧便利商店報廢的便當，而得以解決三餐問題的RABBIT小隊隊員們。但因為沒有地方能梳洗，小隊成員都很擔心洗澡的問題。老師提出用汽油桶代替泡澡桶的點子，於是小隊成員為了取得廢汽油桶而展開作戰。"
1346916350 = "胡蘿蔔作戰（２）"
2689011259 = "RABBIT小隊隊員們在附近的碼頭開始廢汽油桶回收作戰。但咲希對前小隊長都子的命令有所不滿。之後，暫時成為了小隊長的咲希開始指揮作戰，然而卻遭遇了意料之外的狀況……"
1989812613 = "胡蘿蔔作戰（２）"
