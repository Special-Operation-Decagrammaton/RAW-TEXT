1057886975 = "บทส่งท้าย"
3548500175 = "แพนเดโมเนียม โซไซตี้พักฟื้นอยู่ในห้องพยาบาลของเกเฮนน่า\nส่วนสภาน้ำชาก็ฟื้นฟูระเบียบอีกครั้งโดยมีนางิสะเป็นศูนย์กลาง\nเซอากลับมายังสภาน้ำชา ทำให้เกิดการรวมตัวของทั้งสามคนอีกครั้ง\nทุกคนได้เริ่มใช้ชีวิตประจำวันที่สงบสุข ส่วนสควอดของอาเรียสที่พ่ายแพ้\nและหลบซ่อนอยู่ก็กำลังถูกเพ่งเล็งจากบางคน"
2388883385 = "บทเริ่มต้น"
742146611 = "สควอดของอาเรียสทนไม่ไหวกับการไล่ล่าและหลบหนีที่ไม่มีที่สิ้นสุด\nอาสึโกะยอมให้ตัวเองถูกจับกุมเพื่อช่วยสมาชิกอีก 3 คนที่เหลือ แต่สิ่งที่ทั้ง\n3 คนต้องเจอนั้น......"
523418069 = "พิธีชงชาที่น่าอึดอัดใจ"
503633399 = "ซากุระโกะจากชมรมซิสเตอร์มาอยู่ด้วยกันกับนางิสะและมิเนะจากชมรม\nอัศวินบรรเทาทุกข์ด้วยข้ออ้างบังหน้าว่ามาช่วยสภาน้ำชา ระหว่างพิธีชงชา\nที่มีบรรยากาศน่าอึดอัด นางิสะก็บอกคุณครูว่าจะเปิดการสืบพยานเรื่อง\nของมิกะในวันรุ่งขึ้น และบอกความจริงว่าสุดท้ายแล้วมิกะจะถูกไล่ออก"
1425951884 = "เจ้าหญิงในคุก"
1398756343 = "คุณครูไปที่คุกของโรงเรียนเพื่อพบมิกะ มิกะบอกกับคุณครูว่าเซอายังไม่ยก\nโทษให้ตัวเองและทุกอย่างที่เกิดขึ้นเป็นความผิดของตัวเอง คุณครูทราบ\nจากมิกะว่าสภาพร่างกายของเซอาไม่สู้ดีนัก จึงตรงไปที่ห้องของเซอา\nเซอาบอกกับคุณครูว่าคิโวทอสจะล่มสลาย"
1644694189 = "ระหว่างความฝันกับภาพลวงตา"
2642024392 = "เซอาเล่าให้คุณครูฟังว่าเธอรู้สึกตัวขณะที่ฝันอยู่ และข้ามเส้นไป\nจนไม่สามารถแยกแยะความจริงกับความฝันได้ เซอาบอกว่าสาเหตุที่ทำให้\nคิโวทอสพินาศก็คือ <เกมาเทรีย> และเรียกมิกะมาพบเพื่อคุยเรื่องนี้ซึ่งๆ\n หน้า แต่แล้วเธอก็ได้ติดต่อกับ <เกมาเทรีย> ในความฝันที่ทับซ้อนใน\nความฝันของเธออีกครั้ง"
175200160 = "ผู้ค้นคว้าที่ไม่อาจเข้าใจได้"
4076845186 = "สิ่งที่เซอาได้เห็นคือภาพของสมาชิก <เกมาเทรีย> ที่กำลังโต้เถียงกันขณะที่สมาชิก <เกมาเทรีย> ที่ชื่อ 'เบียทริซ' เสนอให้ใช้ประโยชน์จากสควอด\nของอาเรียสเพื่อกำจัดคุณครู และในตอนนั้นเองเบียทริซก็สังเกตเห็นเซอา\nเมื่อเซอากลับมาสู่โลกแห่งความเป็นจริงก็รู้สึกสะเทือนใจอย่างรุนแรง\nและมิกะก็มาหาเซอาพอดี"
4242006093 = "สิ่งที่แตกหัก"
3096862869 = "เซอาที่ได้รับความกระทบกระเทือนทางจิตใจอย่างรุนแรงตะโกนใส่มิกะ\nเสียงดัง เธอกลับเข้าไปในความฝันและได้เจอกับเบียทริซอีกครั้งและถูกไว้\nในความฝันเซอาได้เห็นภาพของอาสึโกะที่ถูกแขวนไว้กับแท่นพิธีที่เบียทริซ\nเตรียมไว้ ในระหว่างนั้น ทางคุณครูก็ได้เจอกับซาโอริในซอยแคบๆ"
3473989469 = "การเลือกและการตัดสินใจ"
