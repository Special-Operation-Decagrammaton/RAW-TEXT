3228962781 = "นามแห่งสวรรค์ (3)"
3156389352 = "เมื่อสูญเสียพลังแห่งบรรทัดฐาน สควอดของอาเรียสก็ค่อยๆ พ่ายแพ้\nถึงสมาชิกคนอื่นจะยอมรับความพ่ายแพ้ แต่ซาโอริก็ยังเชื่อมั่นว่าทุกอย่าง\nจะเปล่าประโยชน์เหมือนเคยและตั้งหน้าสู้ต่อ"
3992775096 = "ชั้นใต้ดินของวิหารโบราณ"
4215258149 = "ซาโอริทิ้งสมาชิกสควอดที่ยอมจำนนแล้วมุ่งหน้าไปยังชั้นใต้ดินของวิหารโบราณ อาซึสะและคุณครูไล่ตามซาโอริไปเพื่อยุติการต่อสู้ครั้งนี้"
3039086335 = "ความเกลียดชังที่เราไม่ได้เป็นเจ้าของ"
1305007844 = "ซาโอริพ่ายแพ้ในการต่อสู้ ส่วนอาซึสะก็เหนื่อยล้าจนล้มพับไป อาสึโกะ\nปรากฏตัวออกมาตอนนั้นพอดีแล้วบอกว่ายอมรับในความพ่ายแพ้ของ\nพวกตน เมสโตรโผล่ออกมาเหมือนรอจังหวะอยู่ และทำให้หลักคำสอนที่\nซ่อนอยู่ชั้นใต้ดินของทรีนิตี้เป็นที่ประจักษ์ คุณครูจึงหยิบบัตรประจำตัว\nผู้ใหญ่ออกมาสู้"
