955896544 = "참새정에서 식사 중인 미식연구회는 여주인에게 마지막 손님이라는 말을 듣는다. 식사를 마친 후 미식연구회는 참새정이 사라지는 것에 아쉬움을 표하지만 하루나는 도움이 될 사람을 알고 있다고 말한다."
1617718142 = "도움이 필요해요! 1"
2315750929 = "하루나는 후우카와 주리, 선생님을 납치해 참새정 부활에 도움을 달라고 부탁한다. 선생님은 모두와 함께 참새정으로 향하지만, 참새정 입구에서는 불량배들이 난동을 피우고 있었고, 미식연구회가 이를 막아선다."
1371253993 = "도움이 필요해요! 2"
1803161784 = "미식연구회에 패배한 불량배들은 자신들을 구르메 헬멧단이라 칭하며 도망친다. 참새정 여주인은 거리가 프랜차이즈 상회로 가득 차 폐업을 결심했다고 이야기하지만, 후우카는 참새정을 돕기로 결심한다."
1402169835 = "후우카의 골목식당"
1367178329 = "후우카는 참새정의 상태를 점검하고, 문제를 해결하기 위해  삐약슈퍼에 도움을 청하지만, 이를 구르메 헬멧단에게 목격당한다. 참새정으로 돌아온 후우카는 여주인과 함께 음식을 만들고 하루나에게 평가를 요청한다. 그때 구르메 헬멧단이 참새정에 쳐들어온다."
3044075053 = "이걸로 끝이라고 생각하지 마라!"
3641325415 = "참새정에 패배한 구르메 헬멧단은 하루나 일행의 정체에 대해 묻는다. 하루나는 자신들을 미식연구회라고 소개하고, 구르메 헬멧단은 동료들에게 지원요청을 하며, 미식연구회는 응전한다."
503504063 = "우민들은 구분하지 못할 것이다!"
2331290713 = "프랜차이즈 체인점, 냐오푸드의 회장인 냐오모토 캔은 참새정의 처우에 대해 고민한다. 한편. 일련의 소동으로 참새정 여주인은 대기업과 싸우는 것에 두려움을 느끼고 포기하려 한다. 하지만 주리는 포기하면 안 된다고 여주인을 설득한다."
279525189 = "계산 부탁합니다."
220690413 = "상가 거리에서 후우카와 주리는 참새정에서 만든 음식으로 시식회를 열고, 사람들의 반응을 살핀다. 지적된 문제는 가격대가 조금 맞지 않는다는 것. 이에 선생님은 양과 질을 모두 갖추기 위해 중저가 메뉴를 제안한다."
2062962546 = "매진이라고요? 그럴 리가…… 1"
1711061225 = "식자재를 사기 위해 상가로 나온 주리는 물건들이 매진된 것에 당황한다. 한편. 이를 지켜보고 있던 구르메 헬멧단은 주리와 미식연구회에게 경고한다."
929096310 = "매진이라고요? 그럴 리가…… 2"
3987649773 = "주리와 미식연구회에 패배한 구르메 헬멧단은, 참새정이 하나의 구심점이 되어, 냐오푸드 밑으로 들어가고 싶지 않은 사람들을 모으고 있다며, 자신들은 참새정을 없애야 한다고 이야기한다. 하지만 주리와 미식연구회는 이를 거부한다."
1175748688 = "그렇다면 대결이다! 1"
1142871206 = "하루나는 냐오푸드 본사로 찾아가고, 냐오푸드에서는 미식연구회가 찾아온다는 소식을 듣고 당황한다."
1909478340 = "그렇다면 대결이다! 2"
3240831599 = "냐오모토 캔은 손해를 막기 위해 미식연구회를 회장실로 들인다. 하루나와 미식연구회는 냐오모토 캔과 대화를 나누지만 좀처럼 해결될 기미는 보이지 않고, 냐오모토 캔은 하루나에게 오세치 요리 대결을 제안한다."
3591620024 = "혹을 떼라고 보냈더니……"
