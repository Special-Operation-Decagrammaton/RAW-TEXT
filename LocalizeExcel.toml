798421210 = "[c]At the start of user's Phase:[/c] Decreases the EX Skill Cost of an ally Striker by [c]1[/c] during this Phase.\n\n\n[c][75b4c0][i]\"Why did you move my bed to the beach? Hm? Nagi? Seia?\"[/i][-][/c]"
