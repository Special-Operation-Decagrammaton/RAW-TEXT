1548581704 = "常盤台的超電磁砲（２）"
4263679817 = "湧入廢墟的機器數量比平常更多，雖然御坂美琴使用工程師部製造的專用槍械，但威力卻不如預期。在千鈞一髮之際，御坂美琴拿出硬幣，徒手發射了超電磁砲。"
