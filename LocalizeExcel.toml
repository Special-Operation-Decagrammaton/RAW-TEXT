4015010782 = "모든 적에게 피해를 준다. 자신은 퇴각한다.\n\n\n[c][75b4c0][i]\"다이너마이트에 '너무 많이'라는 말은 붙지 않는다고?\"\n- 온천개발부의 부장, 키누가와 카스미[/i][-][/c]"
2518778292 = "[c]내 Phase 시작 시:[/c] EX스킬 위력이 [c]1[/c] 증가한다.\n\n[c]자신이 피해를 입어 퇴각 시:[/c] EX스킬 위력만큼 다른 아군 스트라이커에게 피해를 준다."
214409855 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"뭐야, 저 녀석들, 약해 보이는데?\"[/i][-][/c]"
