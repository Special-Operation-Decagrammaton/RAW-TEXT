3932457485 = "某天，因為突然來襲的暴雨，RABBIT小隊停留的公園淹了水。小隊成員為了擋雨而做了各種努力，但是當指揮帳棚倒塌時，所有人都失去幹勁自暴自棄。老師率先幫助在暴雨中獨自奮鬥到底的都子……小隊成員看到這一幕，決定放下自尊聽從老師的指示。"
3138235130 = "被雨淋濕的申請書"
1105239486 = "為了整頓淹水的公園，[USERNAME]老師拿著提案書前往聯邦學生會。但是以琳行政官為首的主管卻不想要幫助SRT學園的學生們。香耶看到這一幕，說了有關FOX小隊過去所犯下的事件，並表示自己會繼續幫助老師。另一方面，香耶遇見環奈後表現出和剛才截然不同的面貌，表示「為了重建兔寶寶鎮，必須盡快驅逐遊民」。"
346541298 = "豆皮壽司"
