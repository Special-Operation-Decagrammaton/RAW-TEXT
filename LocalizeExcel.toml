1460650320 = "제대로 된 사용법"
3779604569 = "조사 포인트 E. 폭포 뒤의 아지트"
4038659296 = "섬의 가장 깊은 곳 1"
3618921997 = "섬의 가장 깊은 곳 2"
72390938 = "사소한 변화들"
2135885884 = "납치"
2225204274 = "우이는 심상치 않은 분위기의 사쿠라코와 대면한다."
2744900070 = "일반인 A의 의견"
1729423655 = "우이가 무단으로 4차 공의회 경전의 사본을 만든 것을 눈치챈 사쿠라코. 사쿠라코는 우이에게 주의를 주기 위해 다소 오해의 소지가 있는 방식으로 우이를 불러온 것이었다. 오해가 쌓여만 가는 가운데 돌연 하나코가 나타나 중재안을 제시한다."
1096816524 = "좋은 게 좋은 것"
3742480354 = "하나코의 중재안이란 우이의 뛰어난 고문자 해독 능력과 고고학 지식을 바탕으로, 시스터후드가 발견한 트리니티 근해의 섬에 있는 유적지를 조사하는 것이었다."
3187959349 = "조사 포인트 A. 석벽 미로 1"
617928650 = "본격적인 조사를 시작한 우이 일행. 코하루는 선생님을 감시한다는 명목으로 선생님의 뒤를 따라다닌다. 그렇게 미로를 탐사하던 코하루와 선생님은, 결국 미메시스와 조우한다."
811018523 = "조사 포인트 A. 석벽 미로 2"
994270627 = "다리가 풀려 움직일 수 없는 코하루를 업은 채 도망친 선생님. 선생님과 코하루는 다행히 조사단과 무사 합류한다."
3219351181 = "조사 포인트 B. 지하 건축물 1"
2491485373 = "다음 탐색 지역인 지하 유적으로 들어간 조사단 일행. 선생님은 우이와 동행한다. 함께 유적을 돌며 진솔한 대화를 나누는 선생님과 우이. 그때 이상한 소리가 들려오고 둘은 미메시스와 마주친다."
29917006 = "조사 포인트 B. 지하 건축물 2"
1927635005 = "지하 유적을 빠져나온 우이와 선생님. 히나타는 둘을 뒤쫓던 미메시스를 향해 포격을 날리고, 지하 유적은 완전히 부서지고 만다."
3429673932 = "조사 포인트 C. 버려진 레몬 농장"
630214868 = "레몬농장을 조사하다가 하나코와 마주친 선생님. 하나코는 우이를 돕기 위해, 코하루를 위해, 그리고 자신이 이전 바다에 함께 가지 못하여 아쉬웠기에 이 자리를 마련했다고 털어놓는다."
259971216 = "조사 포인트 D. 잊힌 등대 1"
963289912 = "다음은 등대를 조사하기로 한 우이 일행. 선생님은 혼자서 짐을 나르던 히나타를 도와주고자 밖으로 나온다. 잠시 대화를 나누던 사이, 미메시스가 등대를 포위하고 히나타는 다른 사람들이 방해받지 않도록 전투에 나선다."
2305782904 = "조사 포인트 D. 잊힌 등대 2"
904241480 = "단독으로 적을 전부 처리하는 데 성공한 히나타. 유탄 소리에 밖으로 나온 조사대 일행에게, 히나타와 선생님은 아무 일도 없었다며 얼버무린다. 상황을 이해한 하나코가 다른 사람들을 데리고 등대로 돌아간다."
942293947 = "제대로 된 사용법"
3925545059 = "지금까지의 조사 과정을 정리하던 우이는 레몬 농장에서 아이디어를 얻어 레몬즙을 지도 위에 뿌린다. 그러자 그동안 보이지 않았던 새로운 포인트가 드러난다."
3449666276 = "조사 포인트 E. 폭포 뒤의 아지트"
6041660 = "새로운 조사 포인트에 도착한 조사단 일행. 조사단은 폭포 뒤의 동굴에서 관처럼 생긴 나무 상자를 발견한다. 우이가 나무 상자를 여는 순간 미메시스가 나타난다."
1858743142 = "섬의 가장 깊은 곳 1"
479171161 = "미메시스를 뚫고 도망친 조사단. 우이가 섬의 비밀과 나무상자에서 본 내용을 말하려는 순간, 히나타가 빠진 구덩이에서 새로운 상자를 발견한다. 히나타가 상자에 손을 대자 미메시스 대군이 나타난다."
2777555982 = "섬의 가장 깊은 곳 2"
3252455481 = "무사히 상자를 지켜낸 조사단이었지만 안에는 아무것도 들어있지 않았다. 지금까지의 조사 결과로 진실을 전하는 우이. 상자는 고대 성도회의 학생들이 만든 메모리얼 캡슐이었다. 이어 우이는 모두에게 한 가지 부탁을 한다."
368837813 = "사소한 변화들"
3409394003 = "우이의 부탁이란 메모리얼 캡슐의 존재를 공개하지 않고 그곳에 지도를 롤링 페이퍼로 만들어 함께 담아 두자는 것이었다. 하나코와 선생님은 조사 결과의 일부만을 사쿠라코에게 전달한다. 모든 일이 끝나고 우이는 친절하게 대해야 할 사람이 늘어났다며 복잡 미묘한 감정을 보인다."
2707730920 = "학원 동인 이야기 ~두 명이 도달한 최종회~"
