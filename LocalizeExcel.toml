2831782328 = "คุณครูจับกุมวาคาโมะได้สำเร็จอีกครั้ง ฟุบุกิและคิริโนะตัวสั่นด้วยความกลัว\nและบอกว่าวาคาโมะคืออาชญากรที่น่ากลัวเหมือนกับในข่าวลือเพราะเธอใช้\nโอยาโกะด้งในการแหกคุก จากนั้นก็ออกไปคุมตัววาคาโมะอีกครั้งพร้อมบอก\nว่าไม่ต้องกังวลไปเพราะเมนูมื้อเย็นจะเป็นโซบะแทน"
