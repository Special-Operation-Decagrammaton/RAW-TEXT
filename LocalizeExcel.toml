59980314 = "The Melancholy of Kanbara Misuzu"
1190451628 = "Prologue"
1058709048 = "Sensei wakes from a bizarre dream and learns from Nanagami Rin that the General Student Council president is missing. The Academy City, Kivotos, is in chaos. Sensei heads to Schale to try to resolve the situation."
2669596529 = "Prologue"
1471825002 = "Under Sensei's direction, the students breeze through combat and advance toward the Schale club room."
89362963 = "Prologue"
1661247484 = "Rin discovers the incident was instigated by someone named Wakamo from Hyakkiyako. She warns Sensei that the student in question is a dangerous convict that escaped from the Corrections Bureau."
737161669 = "Prologue"
1938490976 = "The group finally arrives at the Schale club room, when suddenly, they are confronted by a Crusader Tank."
2421559898 = "Prologue"
516426802 = "While the students and Sensei are busy with the tank, Wakamo infiltrates the building the Schale club room is in."
369258066 = "Prologue"
1897585705 = "Upon encountering Sensei in the basement, Wakamo turns beet-red and flees. Arriving late, Rin hands the Shittim Chest, left behind by the General Student Council president, to Sensei."
3240627074 = "Prologue"
3773339621 = "Sensei and the students come face-to-face with Wakamo, who incited the entire incident."
1964993858 = "Prologue"
4155740391 = "Wakamo suddenly runs away mid-battle, but rather than giving chase, Sensei and the students push to retake the Schale club room."
2720876549 = "Prologue"
536907202 = "After activating the Shittim Chest, Sensei meets secretary Arona and regains control of Sanctum Tower. Rin then presents the Schale club room, and Sensei puts the first mission of the Schale Federal Investigation Club into action."
4199086753 = "Welcome to the Foreclosure Task Force!"
3167291451 = "Sensei receives a letter from Abydos High School and learns the students there are being bullied by a criminal organization. In a hurry, Sensei heads toward the Abydos district, but gets hopelessly lost in the process."
3987177942 = "First Day at Abydos"
3646064857 = "Shiroko rescues Sensei and eventually the two arrive at Abydos' Foreclosure Task Force club room. Soon after, the school is attacked by the Kata-Kata Helmet Gang, and Sensei teams up with the students to fight back."
4043312483 = "First Day at Abydos"
1202784751 = "Under Sensei's command, the students of Abydos repel the Helmet Gang and return safely to the school."
3989313715 = "Being an Adult is Amazing!"
1608590402 = "After defeating the Helmet Gang, the Foreclosure Task Force introduce themselves to Sensei at Abydos High School. Having solved some supply issues with Sensei's help, the students want to use their momentum to crush the Helmet Gang's outpost."
3407235728 = "Being an Adult is Amazing!"
1856373448 = "Together, Sensei and the students destroy the Kata-Kata Helmet Gang's outpost without much trouble and return to the school."
3961742797 = "The Task Force's Predicament"
2472112227 = "The students explain to Sensei that their school's over 900 million yen in debt and how difficult it is for them to even keep up with interest payments. When Sensei offers to help, Serika goes off on a tirade about how grown-ups can't be trusted."
3061964608 = "A Day in the Life of Serika"
3427145251 = "Sensei and the Foreclosure Task Force trail Serika to her part-time job at a ramen shop. They end up sharing a nice meal with her, but Serika is still quite sullen. On her way back from work, Serika is kidnapped by the Helmet Gang."
36405547 = "Rescue Mission!"
426352076 = "When Serika goes incommunicado after parting at the ramen shop, Sensei uses Schale's authority to triangulate the position of Serika's cell phone and sets out to rescue her."
2287819315 = "A New Threat?"
2766662048 = "Sensei and the task force manage to rescue Serika from the Helmet Gang. Ayane finds signs of contraband among the tank's wreckage. Meanwhile, the Kaiser PMC that controlled the Helmet Gang decides to enlist the help of Problem Solver 68."
3902676392 = "The Might of Problem Solver 68"
4083213547 = "The Foreclosure Task Force struggles to come up with ideas on how to pay off the school's debt. Sensei and the students run into the impoverished employees of Problem Solver 68 while grabbing some ramen after the meeting."
2584215733 = "Unrelenting Blood Feud"
766257118 = "Aru grapples with her feelings after realizing that the ones who treated her to a bowl of ramen were actually Abydos students. She resolves anew to attack Abydos High School with her hired guns."
1534182665 = "Unrelenting Blood Feud"
1089217150 = "Thanks to the work of the Foreclosure Task Force, Aru and Problem Solver are forced to withdraw."
2309291572 = "In Search of a Clue"
3874145345 = "The Foreclosure Task Force learn that Problem Solver 68 is a group of delinquents from Gehenna Academy and that the Helmet Gang's weapons came from the Black Market. Sensei and the students head there to investigate."
1625249857 = "To the Black Market! Part 1"
3011986499 = "The Foreclosure Task Force bumps into Trinity student Hifumi at the Black Market. She came to buy a limited-edition Peroro plush, but was chased by a group of bullies. The task force steps in, and a fight ensues."
2005605206 = "To the Black Market! Part 1"
2107918611 = "Having beat back the bullies, Hifumi and the Foreclosure Task Force leave the scene before an even bigger mess happens."
67492089 = "To the Black Market! Part 2"
2585148003 = "Hifumi agrees to guide The Foreclosure Task Force around the market in return for helping her earlier. Meanwhile, the boss of Problem Solver 68, Aru, struggles to get a loan so she can pay off her earlier mistake."
4187141271 = "The Masked Swimsuit Gang! Part 1"
847788836 = "At the Black Market, the Foreclosure Task Force see their debt money being funneled into the Stygian Bank. Outraged that their hard-earned money is being used for illicit activities, the students plan a bank heist."
2540582765 = "The Masked Swimsuit Gang! Part 2"
2791958937 = "Aru is waiting for a loan interview at the Stygian Bank when the masked members of the Foreclosure Task Force burst in and steal all the bank's money. The Black Market Guard gives chase, and Aru admires the students' act of pure villainy."
2605391019 = "Riding off Into the Sunset!"
1843801151 = "After outrunning the Black Market Guard, the group begins to question their resolve. Hoshino persuades them to take only the documents they need. Later, Problem Solver discovers the piles of money that were left behind."
2080293366 = "The Truth Revealed"
2873970964 = "The documents reveal the true mastermind: a mega-syndicate known as the Kaiser Corporation. Confronted with such a seemingly insurmountable societal evil, the dejected students of the Foreclosure Task Force call it a day."
1849712170 = "The Gathering Storm"
2479276074 = "Aru grapples with the thought of using funds acquired by the Foreclosure Task Force to attack Abydos High School. To lift her spirits, Problem Solver takes her to get Shiba Seki ramen. Meanwhile, a man in a black suit appears before Hoshino with a clandestine proposal."
3652595243 = "We're Not Their Friends!"
3597989428 = "Upon entering Shiba Seki, Master Shiba's warm welcome sends Aru into a screaming fit, unable to bear her guilty conscience any longer. Before anyone can stop her, Haruka plants a bomb and blows the shop to smithereens."
1822218538 = "You'll Pay for This!"
2950249706 = "Unaware of Aru's true feelings, the Foreclosure Task Force blame Aru for the heinous atrocity she accidentally caused. Eventually, Aru ends up confronting the team, pretending to be the villain they believe she is."
2392026169 = "You'll Pay for This!"
647272427 = "During the climax of the battle between Problem Solver and Foreclosure Task Force, the combatants are suddenly shelled from afar. Ayane announces that the cannons were fired by Gehenna Academy's Prefect Team."
4008077676 = "The Prefect Team Goes to War!"
1530869328 = "Gehenna's Prefect Team declares their intent to arrest the members of Problem Solver 68. The Foreclosure Task Force prepares for battle, rebutting that Gehenna Academy has no authority to make such an arrest on Abydos territory."
906157151 = "The Prefect Team Goes to War!"
684749186 = "Despite being outnumbered, the Foreclosure Task Force is victorious with Sensei's guidance. After the battle, the senior administrator of Gehenna's Prefect Team, Ako, steps in to mediate. Meanwhile, Haruka hatches a conspiracy."
4085844327 = "An Unexpected Alliance"
2776982583 = "Talks with Ako are unfruitful, leaving the situation as hostile as ever. The Foreclosure Task Force decides to team up with Problem Solver to take on the Prefect Team and their sizable forces."
1339565549 = "An Unexpected Alliance"
1377434222 = "The hard-fought battle was seemingly over until yet more members of the Prefect Team appeared. Just then, the head prefect, Hina, arrives and questions Ako about the entire series of events thus far."
1471802853 = "The Gehenna Head Prefect"
2688547338 = "Having heard Ako's story, Hina promptly apologizes for the Prefect Team overstepping their bounds. While commanding her forces to pull out, Hina subtly informs Sensei that the Kaiser Corporation is up to something in the Abydos Desert."
4195603251 = "Farewell, Problem Solver 68"
1030591484 = "Sensei sees Problem Solver out of Abydos. In the mean time, Ayane and Serika pay Master Shiba a visit in the hospital. He tells the girls that the ramen shop's building has been taken over by the Kaiser Corporation."
3139483916 = "Everyone Has a Story Part 1"
839043873 = "Back at the club room, everyone goes over what had happened. Ayane and Serika do some digging into administrative documents and tell the group that the majority of the Abydos district's land has been transfered to the Kaiser Corporation."
2927878713 = "Everyone Has a Story Part 2"
409405033 = "Hoshino recounts history to the Foreclosure Task Force. It's likely the now-defunct Abydos Student Council tried to repay its debts until the land was eventually repossessed by the Kaiser Corporation. Sensei suggests following Hina's hint and to go to the Abydos Desert."
442327204 = "Into the Abydos Desert Part 1"
2058754230 = "The Foreclosure Task Force cautiously heads toward the Abydos Desert."
3802560582 = "Into the Abydos Desert Part 2"
2697565317 = "Arriving at the desert, Hoshino sees the remains of Abydos and reminisces about what once was."
573312762 = "Into the Abydos Desert Part 3"
198870950 = "The Foreclosure Task Force finds that a giant facility has been built in the desert and an unknown force shows up to defend it."
1399589399 = "Kaiser PMC Part 1"
884616625 = "The forces are Kaiser PMC and they surround the Foreclosure Task Force."
852645695 = "Kaiser PMC Part 2"
2382351824 = "A supposed Kaiser board member appears before the Foreclosure Task Force and introduces themselves as the creditor of Abydos."
3249776532 = "A Losing Battle"
2043848879 = "The Kaiser board member reveals their ambitions to find a massive treasure buried somewhere in Abydos. Then, using the Foreclosure Task Force's debt as leverage, the creditor forces them to back down. Hoshino calls for a retreat to the chagrin of the other task force members."
1186755748 = "Secrets"
1335785770 = "After sending her enraged underclassmen home, Hoshino reveals to Sensei the secret deal she was offered by the man in the black suit. Sensei tries to console her, but the next day finds no trace of Hoshino, save for her resignation letter."
3736543421 = "What Slipped Through the Cracks"
283862884 = "In her letter, Hoshino reveals that she joined Kaiser PMC in exchange for Abydos High School's debt being forgiven. Now, without Hoshino, the remaining members of the Foreclosure Task Force scramble when PMC forces close in on Abydos High School."
3093070589 = "The Abydos Siege Part 1"
310065573 = "After joining up with Kaiser PMC, Hoshino defects when she learns that Abydos High School is under attack, but is then arrested by Black Suit. When all hope seems lost, Problem Solver 68 returns to Abydos to lend their aid to the Foreclosure Task Force."
3717760490 = "The Abydos Siege Part 2"
91688092 = "Despite the Kaiser director's outrage, Sensei, the Foreclosure Task Force, and Problem Solver make use of the sudden turn of events to launch a counteroffensive against the PMC forces."
1667111875 = "The Abydos Siege Part 2"
2023302413 = "The PMC forces finally retreat following an arduous battle. Later, Sensei seeks out Black Suit personally to negotiate Hoshino's return."
4255678286 = "Battle Between Adults"
477790762 = "Black Suit attempts to coerce [USERNAME] Sensei into giving Hoshino up for his experiments, but Sensei makes it perfectly clear that Hoshino will be rescued—no matter what."
3792141633 = "That Which One Must Protect"
2496658941 = "[USERNAME] Sensei goes to Gehenna Academy and Trinity General School to enlist their help. Meanwhile, Problem Solver 68 are treated to ramen at Master Shiba Seki's newly opened stall and make up their minds to help the Foreclosure Task Force."
488859086 = "That Which One Must Protect"
4228298238 = "At [USERNAME] Sensei's behest, Hina and the Prefect Team come to the Foreclosure Task Force's defense against the PMC forces."
1752199803 = "Never Letting Go Part 1"
2389071401 = "The Foreclosure Task Force is fighting on multiple fronts when Hifumi arrives with reinforcements from Trinity in tow. Using the unexpected arrival as a distraction, the Foreclosure Task Force breaks through the enemy lines."
2315302090 = "Never Letting Go Part 1"
2958239043 = "When the Foreclosure Task Force arrives at Abydos High's old main building, a Kaiser board member bars their way. However, Aru and Problem Solver 68 arrive in the nick of time."
465533926 = "Never Letting Go Part 2"
3049385587 = "The Foreclosure Task Force pushes toward the bunker where Hoshino is being held captive."
3889357593 = "Never Letting Go Part 2"
4091157200 = "After a long hard-fought battle, the Foreclosure Task Force finally brings Hoshino back to safety."
460663098 = "Epilogue"
1819455677 = "After the fact, Sensei receives a letter from Ayane. Though the Foreclosure Task Force wasn't able to pay off its debt in full, she thanks [USERNAME] Sensei for preserving the group's usual way of life."
451759275 = "Prologue"
1467700440 = "The OB of Gematria, awakened by Francis, makes the opening moves of a new game. Meanwhile, the Kaiser Group puts bonds for Abydos High School's debt on the market. The Foreclosure Task Force attempts to purchase them, but before they can react the bonds are sold out. The organization behind the aggressive purchases and the new owners of Abydos's debt is called the Nephthys Group."
2836028392 = "Uninvited Guests"
2468775960 = "The Foreclosure Task Force finds out that Nephthys bought out Kaiser's bonds to claim all rights to the Abydos trans-desert railway. As the task force muses on what prompted Nephthys to act, they are interrupted by intruders."
2578507434 = "Highlander Railroad Academy 1"
792808784 = "The intruders turn out to be Nozomi and Hikari, officers from Highlander Railroad Academy CCC. The Foreclosure Task Force steps up to stop the duo, who seek to repair the Trans-Desert Railway."
2748777627 = "Highlander Railroad Academy 2"
171315427 = "Sensei and the Foreclosure Task Force successfully stop the intruders from Highlander Railroad Academy. Suou, the overseer of the Highlander Railroad Academy, enters the scene. Suou promises the task force an explanation later, then leaves with the twins."
809304558 = "Things Now Gone"
2228531499 = "Years ago, Nonomi enrolled in Abydos High School instead of Highlander Railroad Academy. Ayane provides intel about the Highlander Railroad Academy. Not long after, the students from Highlander Railroad Academy return."
2066588167 = "The Trans-Desert Railway"
3245151085 = "The Highlander Railroad Academy students arrive at the Foreclosure Task Force room alongside Abydos' creditors. The spokesperson of the group reveals a contract with Yume's signature on it, and explains their goal."
4109224623 = "Sales Contract"
206294631 = "Creditors arrive at the Foreclosure Task Force to determine if the contract rights to Abydos Student Council's facilities were being upheld. Sensei confronts the creditors, who depart, but not before demanding the task force make their decision within two days, the contract's expiration date. To decide on their next course of action, Hoshino reveals more about her past and realizes that the signing date of the contract overlaps with the day Yume went missing."
3326988594 = "The Body's Limits"
2464018339 = "Hoshino visits the abandoned town where she first met Yume. Shiroko follows Hoshino but ends up losing her. Nonomi contacts her butler to find out what's going on. Her butler explains that it's all to overcome Nephthys' dilemma, vowing to explain more the next day. Ayane senses something is very wrong, but everyone else would rather go home for the day. Meanwhile, deep beneath the ground, the Underground Dweller makes their move..."
3791222139 = "Abydos Student Council 1"
4172510105 = "Sensei is caught in the Underground Dweller's scheme. Meanwhile, as Hoshino passes through an abandoned village on her way back to school, she recalls her first meeting with Yume."
2618425109 = "Abydos Student Council 2"
4214382824 = "Ayane and Serika begin to investigate Yume's death. As they search for clues, Hoshino discovers something significant."
2384190148 = "That Day"
3030051441 = "Hoshino remembers how she once argued with Yume over a festival proposal, tearing up Yume's poster and storming out. Later that day, Yume vanished, and Hoshino was unable to find her. As Hoshino recounts the events, a sudden bell rings, startling everyone."
3708666348 = "Secret Revealed"
3744933892 = "Suou and a Nephthys officer pay Abydos a visit. They then deploy troops, aiming to unearth the secrets of the Trans-Desert Railway. Meanwhile, as Nonomi searches for a solution, the Nephthys officer offers her the opportunity to re-enroll at Highlander."
3567623092 = "The Foreclosure Task Force's Beginning"
508127969 = "Hoshino reminisces about the first time she met Shiroko, about how Serika and Ayane first applied for admission to the school, and other memories. Just as everyone decides to head to the District Office, Sensei gets caught up in an accident."
2830502693 = "Hostage"
3676288734 = "Nonomi attempts to negotiate with Nephthys, but instead, she is taken hostage. They threaten the Abydos students, using Nonomi as leverage to void their contract. As Hoshino tries to handle it alone, Shiroko steps in her way."
303369912 = "You, and Us"
2939285746 = "Hoshino defeats Shiroko with a dominant display of her skills, and Ayane and Serika join the fight with the Water Clouds."
76556335 = "The Student Council Vice President's Orders"
3023125627 = "Following Serika and Ayane's defeat, Hoshino, in her role as vice president of the student council, commands them to not stand in her way, but to instead focus on their future. Hoshino leaves to rescue Nonomi."
3787477164 = "Counterattack"
2641772784 = "Suou informs the Private Equity Fund of Nephthys's betrayal. Meanwhile, Sensei regains consciousness and heads to Abydos. Recognizing the opportunity presented by the vacant student council president role, Sensei appoints Ayane as the new president. With her newfound authority, Ayane overturns Hoshino's actions and joins Sensei in launching a counterattack."
2386655349 = "Pursuit"
325048971 = "Sensei and the Foreclosure Task Force students set out for the District Office to rescue Nonomi. Hoshino, armed and ready, heads to the District Office, suppressing the Private Equity Fund's forces along the way."
1133678474 = "Pursuit"
3426514234 = "Sensei and the Foreclosure Task Force students lose track of Hoshino again, but they continue to follow her trail."
2385018294 = "Confusion and More Confusion"
410768358 = "Kaiser PMC, previously allied with Nephthys, turns against them and tries to seize the Train Cannon. Hoshino battles the PMC as she makes her way toward the District Office."
2238279328 = "Confusion and More Confusion"
2445287877 = "After subduing the Kaiser General, Hoshino proceeds to the District Office. Meanwhile, Sensei and the Foreclosure Task Force students rescue the Highlander students and head to the District Office as well."
3612354256 = "General Creditors' Meeting"
276803654 = "Nonomi becomes furious when she learns that Nephthys has collaborated with the PMC. Hoshino arrives to free Nonomi, but instead, Nonomi announces her decision to drop out of Abydos School. Other Abydos students also arrive, and the Kaiser President voids the contract before leaving the scene."
3243553383 = "General Creditors' Meeting"
160618110 = "Hoshino and the Abydos students successfully rescue Nonomi. After ensuring Nonomi's safety, Hoshino quickly departs, and the Abydos students follow close behind."
1860528585 = "Treasure Hunt"
3956099477 = "Suou and the Kaiser President board a helicopter. Just as the Kaiser President begins celebrating the victory, Suou shoves him out. Suou then sends a message to Hoshino, instructing her to come to the Valley of the Student Council Presidents if she wants to stop the Train Cannon. Meanwhile, the enraged Kaiser President orders the mobilization of all Kaiser Corporation troops."
1239708147 = "Second Pursuit"
984232866 = "After saving the Private Equity Fund, Sensei and the Abydos students search for a route to the Valley of the Student Council Presidents. Just then, a Nephthys officer and Highlander's CCC come to their aid. Meanwhile, Hoshino arrives at Junction Station, where she and Yume had gone on a treasure hunt in the past, and starts a train to head to the Valley of the Student Council Presidents."
3256145921 = "Second Pursuit"
2322627376 = "Nozomi and Hikari operate the train for Sensei and the Abydos students, with Kaiser PMC in pursuit."
517692600 = "Runaway Train"
598179026 = "Facing the relentless pursuit of Kaiser PMC, Nozomi and Hikari ultimately cause the trains to collide."
2087719702 = "Runaway Train"
754525061 = "Following the train collision, Kaiser PMC surrounds Hikari and Nozomi. Meanwhile, Sensei and the Abydos students manage to evade Kaiser PMC and reach Junction Station, where they hop onto a new train. Arriving at the Valley of Student Council Presidents, Hoshino discovers a secret hidden in the Trans-Desert Railway."
3408172578 = "Valley of Student Council Presidents"
638321793 = "Hoshino locates the Train Cannon, but Suou intervenes. Suou declares that if Hoshino wants to stop the Cannon, she must first defeat Suou. She then reveals Nonomi's card."
768493918 = "Train Cannon"
2040799108 = "Hoshino successfully subdues Suou, but Suou refuses to acknowledge her defeat and charges at her again. Meanwhile, Sensei and the Abydos students locate the Train Cannon in the Valley of the Student Council Presidents. Hearing gunshots, they head towards the source of the noise."
1210234653 = "The Final Battle 1"
1002703607 = "Suou, after being defeated once more, collapses. Hoshino proceeds to attempt to destroy the Train Cannon. However, Sensei and the Abydos students show up at that moment. A fight ensues."
3797362856 = "The Final Battle 2"
3271869069 = "With the remaining Abydos students worn out from the battle, Shiroko prepares to fight Hoshino again."
1886723209 = "A Fine Line"
2759992648 = "Hoshino eventually collapses, and Sensei and the Abydos students try to talk her down. However, Suou activates the Train Cannon, aiming it at Abydos School. To prevent the Train Cannon from firing, Hoshino attacks the Abydos students before leaving. Recognizing the urgency, Sensei asserts that Hoshino must be stopped and seeks help from a trusted ally."
3121219489 = "A Fearsome Clash 1"
2950950386 = "The trusted ally Sensei mentioned turns out to be Hina. Hoshino finds and confronts her at Junction Station."
3427914090 = "A Fearsome Clash 2"
2436668033 = "Hoshino and Hina engage in a fierce battle, dealing heavy collateral damage to the train en route to the Great Oasis Station."
3101230762 = "Things Unknown"
3803574396 = "The battered train barely arrives at its destination. Amid the flames, Hoshino thinks back to her past with Yume."
3874918946 = "One Truth 1"
132408451 = "Hina reveals the truth about Yume to the fallen Hoshino, while Sensei and the Foreclosure Task Force, with the twins' help, arrive to stop the Train Cannon."
1382356128 = "One Truth 2"
1456203716 = "Hoshino, lost in her thoughts of Yume's death, ultimately falls prey to the Underground Dweller's scheme, transforming into a completely new entity."
3864663142 = "Epiphany"
2262723767 = "Sensei and the Foreclosure Task Force charge the transformed Hoshino, only to be overpowered by her immense strength. To make matters worse, Hoshino's presence begins to manifest The Fury of Set, and Arona and Plana warn that any further battle could lead to global annihilation. Amid the dire crisis, Shiroko desperately tries to reach out to Chroma."
938761530 = "Apology"
1220924498 = "Sensei meets Yume in an unknown realm. Though unable to change the past, Sensei vows to save any child within reach in the present."
675540194 = "Terror vs. Terror"
3143101973 = "Plana summons Shiroko*Terror onto the battlefield, using the power of the Chroma to her advantage. Shiroko*Terror faces off against a transformed Hoshino."
2218727448 = "Terror vs. Terror"
37327455 = "The Underground Dweller, who witnesses Shiroko*Terror, becomes frenzied over the sight of two of the singular divinity existing simultaneously, and reaches for a last resort."
1657311791 = "Notebook"
3366159078 = "Sensei and the Foreclosure Task Force look for ways to turn Hoshino back to normal. They learn that a Mystic that's manifested its Terror can no longer be restored, but they discover that Hoshino hasn't been converted completely. They try risking it for the slim possibility that she can be saved."
3926366854 = "Notebook"
926354967 = "Sensei and the Foreclosure Task Force, who barely manage to make contact with Hoshino, each express their feelings."
319388679 = "What Must be Said"
1570618741 = "While the Foreclosure Task Force opens their hearts to Hoshino, the Fury of Set manifests itself through the Underground Dweller's final plan."
2188327975 = "Promise"
1072185142 = "Just as the party faces deadly danger, Hoshino ends up meeting the person she desperately wanted to see, in the space where dreams and reality come together."
3773443473 = "Final Restriction Release"
2340870041 = "Like a miracle, Hoshino reverts back. At last, the party gathers together again—for the final battle with the Fury of Set and the mastermind, Underground Dweller."
1985827982 = "Traces of a Dream"
1022838518 = "Beautiful blue flames scatter on the oasis where the battle ends. So burns the desert's priceless mineral treasure, which Hoshino and Yume had searched all over to find. Hoshino gazes at the traces Yume left."
2405249657 = "What Remains Afterwards"
4258312221 = "Life returns to normal. The story of the ones who remain continues."
990172089 = "Epilogue 1"
2169764773 = "Hoshino accepts the position of Abydos Student Council President, while Hina and Makoto destroy the Train Cannon, the inheritance of the Tyrant Emperor. Nonomi and Suou wrap up their respective tasks, and Abydos District is finally filled with vitality once more."
1959390195 = "Epilogue 2"
832014371 = "Sensei meets Shiroko*Terror, who disappeared quietly, and relays to her what Sensei had wanted to say. She says she will accept everything, including pain and happiness, and will keep moving forward."
237598723 = "The Adventure Begins"
1029808550 = "After receiving a bizarre letter, Sensei heads over to the Game Development Department and meets Midori and Momoi, two twins hard at work developing video games."
3338381113 = "Seminar Treasurer Yuuka"
4264874819 = "Seminar's treasurer, Yuuka, intends to shut down the Game Development Department due to its lackluster performance. And so, Midori and Momoi head to the ruins in search of a secret weapon to prevent their club's closure."
3931386898 = "To the Ruins"
4072922310 = "Midori and Momoi are searching the ruins for G.BIBLE, the holy grail of game development. Unfortunately, hostile robots force them to retreat to the abandoned factory."
3321101212 = "On That Day, We Met a Girl"
2114828100 = "In the abandoned factory, the Game Development Department finds a humanoid robot by the name of Aris. For the sake of the club, Momoi brings Aris back to their club room to induct her as a new member."
707980707 = "I, Aris..."
3869084317 = "Aris plays and thoroughly enjoys the Game Development Department's previous title, Tales Saga Chronicle. The club members are touched by her glowing response."
2096151113 = "How to Learn a Language"
910040027 = "Aris stays up all night playing through all of the Game Development Department's recommended video games, and by the end of it, has learned to speak more like a regular person. Momoi gives Aris what she'll need to blend in as a student at the Millennium School."
3197846671 = "Much Too Big to Be Called a Gun"
6265887 = "The Game Development Department heads to the Engineering Department to get Aris a firearm. Aris ends up picking a railgun meant to be attached to an intergalactic battleship. The Engineering Department challenges Aris to a fight to test her abilities."
2828361379 = "Much Too Big to Be Called a Gun"
295717469 = "Aris skillfully uses the railgun to fend off the Engineering Department members, despite never having held such a weapon before. Utaha, the president of the Engineering Department, begins to become suspicious of Aris' unusual physical prowess."
252928965 = "Eligibility Screening"
222860507 = "Yuuka visits the Game Development Department to screen their new member's eligibility. Aris practices the art of self-introduction with Midori and Momoi."
3447447898 = "Yuuka's Questions"
2666100393 = "Satisfied with Aris' answers, Yuuka admits Aris as an official member of the club, but remains adamant about shutting down the Game Development Department if their next game doesn't come together. Once again, the club members head to the ruins in search of G.BIBLE."
980942246 = "Back To the Ruins"
2685240113 = "Thanks to Aris, the Game Development Department easily defeats the hostile robots in the ruins this time."
771027366 = "Right There, In That Place"
2820527577 = "The Game Development Department makes it to a rundown factory. As if by instinct, Aris is drawn to the computer which contains G.BIBLE. She's able to download the data onto her gaming device.."
2728548615 = "In Search of the Mirror"
3103417958 = "In order to read the G.BIBLE, the Game Development Department needs to decrypt the password. To do so, they reach out to Veritas. Maki tells them they'll need the Mirror that was confiscated by the Student Council. To retrieve it, they'll need to get into the contraband storage guarded by the Maid Club."
2899726708 = "Nerds vs. Maids"
317160579 = "While Aris and Veritas create a distraction, Midori, Momoi, and Sensei attempt a frontal assault on Seminar."
413920948 = "Nerds vs. Maids"
3365649643 = "Veritas' hacking ends up trapping Akane in a sealed room."
2494926665 = "Maids vs. Meisters"
14296212 = "The Game Development Department shakes off the Maid Club's sniper, Karin, with President Utaha's help. There's no time to celebrate, however, as they quickly run into Asuna, another member of the Maid Club."
2780791509 = "A Spreading Danger"
3362919123 = "Having taken too long, Akane and Karin escape their bonds, an event spelling disaster for the Game Development Department's mission. Just then, Aris comes to the rescue and succeeds in infiltrating the Student Council's contraband storage room."
4228188430 = "Just One Step Forward!"
1685329725 = "The Game Development Department is able retrieve the Mirror, but comes face-to-face with the Maid Club's president Neru in the contraband storage room. Thanks to Yuzu's quick thinking, the group is able to trick Neru and safely return to their club room."
2238903513 = "Just Getting Warmed Up"
1829805873 = "Akane apologizes to Neru for her failures, but Neru is more interested in how Aris managed to go toe-to-toe with the Maid Club. Back at the club room, the Game Development Department tries to use the Mirror to decrypt G.BIBLE."
1086770631 = "G.BIBLE"
2087231337 = "As it turns out, G.BIBLE only contains a simple maxim: \"Love video games.\" Their sky-high expectations dashed, the Game Development Department, with the help of Aris, begin development on Tales Saga Chronicle 2."
376917210 = "Double O"
2914628993 = "The Game Development Department submits Tales Saga Chronicle 2 just before their deadline. Right after it uploads, the club room suddenly becomes the target of a shootout."
178004961 = "Double O"
1644909910 = "The shooter was Neru, the president of the Maid Club. Claiming that her last battle with Aris had piqued her interest, Neru challenges Aris to a fight. One destructive battle later, and Neru, satisfied, goes on her way."
3999000705 = "The Millennium Prize"
1100406605 = "The Millennium Prize, which gives recognition to the Millennium School's best inventions, awards the Game Development Department a special prize for the development of Tales Saga Chronicle 2. Thanks to this, the club is saved from getting shut down. In the midst of everyone's celebrations, the gaming device installed with the G.BIBLE starts to operate on its own."
854019333 = "A Secret Meeting"
350519276 = "Himari visits Rio, the Seminar president. The two discuss the incident that happened between the Game Development Department and C&C and begin to discuss Aris' identity. The meeting turns into a disaster when the two are unable to bridge the gap between their opinions on Aris. However, things take a turn for the worse when Himari is suddenly attacked."
2171223093 = "A Day at the Game Dev Department"
950515874 = "Sensei pays the Game Development Department a visit for the first time in a while. The members are fielding ideas for the development of their next project, but get distracted watching Aris playing a video game. Aris struggles mid-game upon encountering a cheating player, but gains a dramatic victory thanks to Yuzu's exhilarating performance. However, they fail to make any progress on plans for their next project, and decide to try again tomorrow."
258618862 = "Aris Goes on an Adventure!"
1634979540 = "The Game Development Department and Sensei put their heads together to come up with ideas for their new game. When Momoi and Midori fail to find common ground, they decide to settle things once and for all using a method passed down in the Game Development Department through generations. Meanwhile, Yuzu gives Aris a quest to help her find inspiration. Aris ponders how to proceed with the quest when she decides to go on an adventure at the school with Sensei."
1695437540 = "Guided by Aris 1"
3535563597 = "While wandering around campus, Aris runs into Sumire, who is out on a jog. The two of them bond over being both comrades in arms as well as sports. As Aris continues her adventure, she runs into Asuna and Karin in their school uniforms off campus, and she invites them to join her party. That moment, Aris learns that Neru is looking for her and quickly takes off to another location."
4226009798 = "Guided by Aris 2"
331927291 = "Aris meets with Millennium students who cheer her on, and discusses the Sword of Light with members of the Engineering Department. She enjoys every moment of it. Afterwards, Aris runs into Neru and they visit an arcade to enjoy some video games together. Though they were once enemies against each other, Aris is now proud to declare Neru as her party member."
3180610485 = "A Strange Machine 1"
249138221 = "One day, Veritas reaches out to Sensei about the discovery of a suspicious machine. On the way to their club room, Sensei joins up with the Game Development Department to investigate the machine, but none of them are able to get to the bottom of its true nature... As if suddenly drawn by an inexplicable force, Aris touches the machine and activates it."
2273243370 = "A Strange Machine 2"
3057433435 = "Aris goes into a frenzy and loses consciousness, destroying the clubroom and attacking everyone in her wake. No one is able to stop Aris and the situation grows critical. At that moment, the C&C appears and knocks her out, then proceeds to defeat the suspicious machine. Everyone breathes a sigh of relief, but then Sensei receives an unexpected piece of news from Midori."
888978219 = "Daily Life Destroyed"
1905976681 = "While tending to an unconscious Momoi, Sensei is contacted by Midori and heads to the Game Development Department where Aris has shut herself in. In spite of Sensei's placating words, Aris reproaches herself for putting Momoi in danger. At that moment, an unexpected visitor arrives with an unsettling revelation."
2526248209 = "The Harsh Truth 1"
342541954 = "The visitor at the Game Development Department is none other than Rio, the president of Seminar. Rio explains that Aris is actually a \"princess of the Nameless Gods,\" and refers to her as a demon lord. Everyone in the room is outraged, and Rio dispassionately describes what kind of future Aris will bring about. Tensions are about to explode, when the fifth member of C&C arrives."
4280260261 = "The Harsh Truth 2"
2268486821 = "After defeating the AMAS, Neru engages in a fearsome game of cat and mouse with Toki. Neru is eventually pinned down by Toki's ambush, and neither Midori or Yuzu are able to deal with the unexpected situation. Aris, who had been watching this all take place, makes an important decision."
2301390180 = "Be That as It May! "
3091811119 = "After Aris' departure, the students of Millennium are at a loss as to what to do. At that moment, the enfeebled Momoi rouses herself up and declares that they cannot stand idly by, and insists that everyone go to save Aris."
1928599175 = "Strategy Meeting"
3537725688 = "The Game Development Department and others search for Aris' whereabouts. With the help of Noa and Yuuka, they learn that Aris is headed to Eridu, a fortified city that Rio built. Before infiltrating Eridu, Neru proposes a plan."
2759004737 = "Big Sis 1"
4182520481 = "Himari is imprisoned by Rio, and the two are still unable to find common ground. Meanwhile, after infiltrating Eridu to rescue Aris, the Game Development Department and the Engineering Department encounter an AMAS built by Rio."
37376914 = "Big Sis 2"
2462813750 = "The C&C members blast their way through the AMAS as planned, but their relentless determination is stopped by none other than the C&C's fifth member, Toki."
229839680 = "The Fortress City of Eridu"
918387984 = "Contrary to Toki's prediction that Neru would try to rescue Aris on her own, she is faced with the whole of C&C in a ferocious battle. Meanwhile, the Game Development Department blasts their way through every AMAS one by one while making their way to the tower where Aris is located."
235382079 = "Trap 1"
1349201345 = "The C&C succeed in pinning down Toki with a powerful pincer attack. Toki retaliates by changing the structure of Eridu to isolate Neru. Meanwhile, the Game Development Department's uninterrupted progress is cut off with the appearance of Rio's powerful weapon, the Avant Guard."
4284078290 = "Trap 2"
1075771830 = "While the members of the C&C stand off against Toki, Rio (having already predicted that Sensei and the Game Development Department would come to Aris' rescue) attempts to stop the party in their path with the use of a powerful robot called the Avant Guard."
1472787878 = "Checkmate"
1932470324 = "Rio's victory is seemingly sealed, but Himari succeeds in escaping with Eimi's help. Meanwhile, cut off from Veritas' support, the Game Development Department find themselves with their backs against the wall until they are dramatically rescued by Chihiro, the vice president of Veritas."
2949478604 = "Turning the Tides 1"
2087519716 = "With Sumire's help, Chihiro secures the Mirror from the contraband storage and succeeds in taking control of Eridu's network, and the Game Development Department seizes this moment to launch a counterattack."
2570893963 = "Turning the Tides 2"
4071798167 = "The Game Development Department succeed in defeating the Avant Guard with the help of the Engineering Department, but the aftermath causes the Engineering Department to retire from combat. However, they continue cheering on the Game Development Department's forward charge."
2900133993 = "An Insurmountable Wall"
1637045112 = "After finally managing to drive off Toki, the C&C and the Game Development Department gather together in front of the Tower of Eridu. However, Toki reappears before them and summons the decisive weapon, Abi-Eshuh, at Rio's behest."
3331557940 = "Cheater!"
706464142 = "The combat capabilities of Abi-Eshuh leave everyone stunned. Identifying the weapon's weaknesses based on Akane's advice, Sensei and Neru attempt to draw the battle to aerial warfare. Toki, anticipating such a move, takes this in stride and Neru ends up seriously injured. The group quickly retreats."
859505773 = "Gamers and Friends"
3991456034 = "The situation seems hopeless and everyone's morale has hit rock bottom. Yuzu, who had been carefully observing the battle between Neru and Toki, proposes a way to neutralize Abi-Eshuh."
1152423272 = "What's in a Name?"
4250229177 = "Thanks to everyone's collaborative efforts, the students of Millennium successfully back Toki into a corner, and victory is secured due to \"Double O\" Neru's performance."
2879188167 = "Pavane for a Princess 1"
3410221265 = "The Game Development Department arrives at Rio's location and are about to rescue Aris when an unknown being, Key, appears and takes control of Eridu. The results are catastrophic. Rio belatedly tries to sacrifice herself in an attempt to rectify the situation when Noa and Yuuka arrive."
324915488 = "Pavane for a Princess 2"
1522532631 = "The Game Development Department successfully restrain Key with Yuuka and Noa's assistance. As the Game Development Department and Veritas fend off the enemies that are crawling out of the woodwork, Himari helps Momoi, Midori, Yuzu, and Sensei enter Aris' headspace to try to wake her."
2176908388 = "What You Want to Be"
1285561733 = "The Game Development Department and Sensei finally find Aris. Calling herself a demon lord, Aris is hesitant to return for fear of hurting others. Encouraged by everyone's supportive words that it's up to her to decide who she wants to be, Aris finally draws the proof of a hero: Supernova, the Sword of Light."
3880903334 = "Millennium Science School"
544345914 = "The situation is finally resolved. Rio vanishes, the C&C welcomes a new member, and the Game Development Department resumes development of their new project. Peace returns to Millennium."
108666912 = "Prologue"
3860334718 = "Seia talks about the meaning of the Eden Treaty, the seven koans, and paradise. She asks Sensei to see the story through to the end, as Sensei is responsible for guiding the story that's about to begin."
3383571419 = "Make-Up Work Club"
1483887365 = "Sensei and four girls—Koharu, Hanako, Azusa, and Hifumi—gather in the classroom. While Hifumi calms Koharu, who's freaking out over being on the verge of expulsion, Sensei has a peculiar recollection of an event a few weeks ago."
4127233795 = "Tea Party"
2556827456 = "Sensei attends a tea party at the invitation of Nagisa and Mika, the Student Council presidents of Trinity. Nagisa proposes Sensei handle the Make-Up Work Club students who are at risk of failing and Sensei agrees. At the club, Sensei is reunited with Hifumi, the president of the Make-Up Work Club."
2736401965 = "Failing Students Part 1"
2320947204 = "Sensei follows Hifumi to meet the students of the Make-Up Work Club. Sensei meets Hanako, who is detained by the Justice Task Force due to disorderly conduct, and Azusa, who was caught after a fight with the Justice Task Force."
4288766681 = "Failing Students Part 2"
1080677386 = "Koharu expresses pity for Hanako and Azusa when Sensei takes them to the Make-Up Work Club. However it turns out Koharu has also been transferred to the Make-Up Work Club because of her failing grades. Finally, all of the students of the Make-Up Work Club gather, including a frustrated Koharu."
1381682562 = "Breaking the Ice"
3807799700 = "The Make-Up Work Club members each share their reasons for being there and their goals for the future. When asked to cooperate with the others so they don't fail the exam, Koharu leaves, she won't be in the club for long so there's no point cooperating."
3720628732 = "Exam Prep"
968959922 = "Under Sensei's supervision, Make-Up Work Club members prepare for the first exam. Thanks to Hanako's extensive knowledge, the preparation goes smoothly, but Hifumi is worried that if even one student fails the first exam, they will all forced into a study boot camp. And, at last, the first exam begins."
42497510 = "The First Evaluation Exam"
2338283664 = "Hifumi is relieved to see the questions she studied are on the exam. However, the other three students of the Make-Up Work Club all fail the exam, and the Make-Up Work Club has to join the boot camp."
604324422 = "What Lurks in the Depths"
3378221237 = "Sensei asks Nagisa what will happen if the Make-Up Work Club members flunk. Nagisa reveals that the intended function of the Make-Up Work Club is guide students to expulsion. This has all been part of a plan designed to find Trinity's traitor, and Nagisa warns that she must be in the Make-Up Work Club."
3020153020 = "Boot Camp, Here We Come!"
2563693133 = "The Make-Up Work Club goes to an annex located on the outskirts of Trinity for boot camp and high jinks ensue. After much discussion, they decide to clean the annex first."
660461531 = "Spring Cleaning!"
198950639 = "Hanako wants to have fun in the water with everyone before officially beginning their studies and suggests cleaning the outdoor swimming pool. Everyone gets soaked in water as they start cleaning."
4233186689 = "First Night of Boot Camp"
2960849454 = "Hifumi, troubled by Nagisa's request to find Trinity's traitor, visits Sensei late at night for advice. Sensei tells her not to worry and focus on helping in her own way. Meanwhile, Azusa and Hanako chat for a while during Azusa's night watch."
3382766713 = "First Mock Exam"
848842177 = "The first camp mock exam scores are tallied. Everyone failed except Hifumi again. Instead of being discouraged, Hifumi declares that she will help everyone, promising Momo Friends prizes for good grades. Azusa is the only one excited by the prospect."
3534072072 = "Justice Task Force Vice President Part 1"
17674601 = "The other students find Koharu with an inappropriate book during study time. Flustered, Koharu makes an excuse, saying it's a confiscated item that she brought by mistake. Koharu heads to the Justice Task Force club room with Sensei."
3592313078 = "Justice Task Force Vice President Part 2"
2059845093 = "Sensei tells Koharu that it's okay for her to be herself. To return Sensei's kindness, Koharu reveals that she is a spy for the Justice Task Force. Koharu returns to camp with Sensei after a secret conversation with Hasumi."
773890837 = "Crack in the Surface"
1756837627 = "Hanako pontificates the difference between underwear and swimsuits, and Azusa connects it to the fifth koan. Hifumi learns that Hanako is a brilliant student deliberately tanking her exams. Mika pays Sensei an unexpected visit."
135674395 = "Trinity's Traitor"
892831890 = "Claiming to already know what kind of talk went on between Nagisa and Sensei, Mika offers Sensei a deal to reveal the identity of Trinity's traitor. The traitor is none other than Azusa, and in exchange, Mika asks that Sensei protect Azusa at all costs."
3021188189 = "The Great Leviathan"
3984423781 = "Mika says that Nagisa is after something using the Eden Treaty. Claiming that Azusa must be protected in order to stop Nagisa, Mika asks Sensei to choose whether to trust her or to trust Nagisa."
1502378419 = "The Sisterhood"
1398806955 = "Mari makes her way to the Make-Up Work Club to offer thanks on behalf of the student that Azusa recently saved. Later, Sensei is waiting to discuss the future with Hifumi when Hanako arrives and the situation takes an unexpected turn."
3715954097 = "Secret Society"
1999585029 = "Hanako learns from Hifumi that failing will result in all of them getting expelled from school. Deducing that this was Nagisa's aim all along, Hanako declares that she will try harder going forward and is delighted that the three of them have formed a secret society."
3916469784 = "Swimsuit Symposium"
3001743394 = "Rain drenches the Make-Up Work Club's laundry and they have no choice but to take a day off from studying and hold a swimsuit symposium instead. After experiencing their first enjoyable day in a while, they all decide to go out together on a nighttime walk."
1861044050 = "Midnight Commotion Part 1"
3288144026 = "The Make-Up Work Club runs into Hasumi at a dessert shop during their nighttime walk. Hasumi suggests keeping the encounter a secret due to each other's circumstances, but then receives a call that the Gourmet Research Society is causing a disturbance."
391890716 = "Midnight Commotion Part 2"
749962361 = "Hasumi asks the Make-Up Work Club and Sensei for help, fearing conflict between Gehenna and Trinity might pose a problem for the Eden Treaty. The entire group heads out together to prevent the worst from happening."
2432925314 = "Midnight Commotion Part 2"
4237665195 = "Sensei and the Make-Up Work Club succeed in stopping the Gourmet Research Society's mischief, but each of their members flee, leaving the Justice Task Force hot on their heels in pursuit."
781465669 = "A New Perspective"
1190877624 = "The Prefect Team's Hina and the Medical Emergency Club's Sena arrive to handle the Gourmet Research Society's new recruits.Sensei asks Hina about her thoughts on the Eden Treaty and listens to her point of view on the situation."
3667360070 = "A Glimmer of Hope"
3554655960 = "The Make-Up Work Club finally earn a passing score on their practice test, and Hifumi presents them all with Momo Friends merch. Azusa tells Hifumi that she'll cherish it. Nagisa calls upon Sensei and questions them about their meeting with Mika."
3715486889 = "A Shadowy Reach"
1616621734 = "Sensei refuses to place doubt on anyone or do anything to root out the traitor. Sensei declines Nagisa's request and declares their intention to block Nagisa's flurry of doubt and ensure that the entire Make-Up Work Club passes."
194293672 = "The Second Exam Part 1"
2202623311 = "Sudden changes to the second exam are announced. Everyone is shocked and stunned by the test's newly expanded scope, higher bar to pass, and relocation of the testing site to Gehenna Academy. Azusa insists it's too soon to give up, and the club heads to the test site."
1942601069 = "The Second Exam Part 1"
1391275365 = "The Make-Up Work Club heads to the test site while laying waste to Gehenna delinquents standing in their way."
644321687 = "The Second Exam Part 2"
3226156325 = "The Prefect Team stop the Make-Up Work Club upon their arrival, mistaking them for the Justice Task Force. The Gourmet Research Society arrives just in time and helps clear the way for the Make-Up Work Club. However, everyone still flunks the exam due to Nagisa's interference."
4130588728 = "Back to Square One"
1896656556 = "The students are shocked to learn someone in the Tea Party is conspiring to have them expelled. The students decide to return to their respective rooms to decompress. Later that night, Azusa slips out alone with Hanako quietly tailing behind."
2549930740 = "In Spite of Everything"
2270700848 = "The Make-Up Work Club prepares for the final exam despite being backed up against the wall. Hanako quietly watches as Azusa has a secret meeting with Saori the day before the exam."
1916659997 = "A Confession"
4166289180 = "The students gather together at night. Azusa confesses that she is the traitor once the full scope of Nagisa's interference is revealed. Azusa blames herself, but Sensei says it isn't her fault. Hanako declares they will find a way to pass no matter what."
742150805 = "Lighting the Fuse"
1216430353 = "Arius forces come to ambush Nagisa, but Azusa and Hanako beat them to the punch and kidnap Nagisa themselves. Afterwards, Azusa engages in combat with the subsequent rush of Arius students."
492008709 = "A Fearsome Clash"
3128498563 = "Arius students launch an attack and succeed in backing the Make-Up Work Club into a corner. The Make-Up Work Club and Sensei begin their counterattack."
707844123 = "The Way of the World Part 1"
4054359883 = "The Make-Up Work Club and Sensei defeat the Arius forces but are met with reinforcements. Mika arrives and reveals herself to be the true traitor of Trinity before ordering the Arius students to subdue the Make-Up Work Club."
28576329 = "The Way of the World Part 1"
2791097982 = "Mika marvels at Sensei's refusal to surrender during the ensuing battle. She brings up how Azusa ambushed Seia in the past while preparing to crack down on the Make-Up Work Club, just in time for the Sisterhood to join the fray."
3198842828 = "The Way of the World Part 2"
141133620 = "The Sisterhood was called in by none other than Hanako. Now on the scene, Sakurako begins to battle Mika to rectify the situation."
2850369990 = "The Way of the World Part 2"
3969728237 = "Together, the Make-Up Work Club and the Sisterhood succeed in cornering Mika, who finally surrenders. Sensei lets Mika know that they'll be there for her if she ever needs someone on her side. Mika is delighted to hear this and says farewell."
1709755666 = "The Third Exam"
1682079203 = "Having overcome numerous incidents and happenings, the Make-Up Work Club heads to the test site to sit for the third and final evaluation exam."
3889889279 = "Epilogue"
1853472011 = "Seia praises Sensei for overcoming the dangers, but warns that everything will eventually end in catastrophe. Finally, the Arius Squad goes on the move."
1023493496 = "Postmortem Part 1"
2817792322 = "In Sensei's dream, Seia poses a question about the truth of the world to her assailant. After waking from a short nap, Sensei hears the full story of the attack on Seia from Sakurako."
2940097782 = "Postmortem Part 2"
3560240457 = "Sensei hears about everything that's happened so far from Hanako. They also hear how Nagisa apologized to the entire Make-Up Work Club and went to meet with Mika."
3451183696 = "Postmortem Part 3"
1609767318 = "Mika and Nagisa have a discussion but ultimately fail to understand one another. Hanako tries to understand Mika's motivations as well, but Mika rejects her."
3155433875 = "What Comes Next"
1648638504 = "A quiet peace follows in Trinity. Sensei goes to Gehenna to meet with Makoto and then Hina. They agree to meet again at the signing of the Eden Treaty and part ways."
4236130409 = "Eden Treaty Signing Ceremony Part 1"
1627449016 = "Kronos' Shinon comments on the Eden Treaty signing ceremony. Meanwhile, Hifumi and the Make-Up Work Club gather at a diner to celebrate the club's dissolution."
1969944314 = "Eden Treaty Signing Ceremony Part 2"
646905301 = "With Tsurugi's help, Sensei visits the Cathedral of Communion and Hinata explains Trinity's history. Meanwhile, the Arius Squad launches missiles at the Pandemonium Society and Prefect Team as they set forth from Gehenna."
1269971397 = "Day of Fire and Ash Part 1"
774689524 = "The Arius Squad takes advantage of the chaos and infiltrates the basement of the old cathedral. The Justice Task Force heads out to face the invading Arius students."
4175188383 = "Day of Fire and Ash Part 1"
1651414121 = "During the battle, Hinata and the Justice Task Force witness the resurrection of the Saint Justina Council."
499449077 = "Day of Fire and Ash Part 2"
2565238774 = "The Justice Task Force and Hina battle against the Saint Justina Council to protect Sensei."
878733393 = "Bearing Witness to Hatred"
361954059 = "The Council's relentless attacks persist."
288823100 = "Bearing Witness to Hatred"
3006327975 = "Saori attacks Sensei while explaining Arius' long-standing hatred from the past, but Sensei manages to narrowly escape thanks to Hina and Sena. Afterwards, Sensei loses consciousness and dreams of Seia."
3724307009 = "Sweet Lies"
272157938 = "Sensei again meets Seia in their dreams and hears about the connection between the Eden Treaty and Gematria. Azusa is captured by Arius but makes a miraculous escape, and an all-out battle between Gehenna and the Tea Party's reserve forces unfolds."
1624201610 = "Aggravated Confusion Part 1"
2195551207 = "The former Make-Up Work Club are scattered after arriving late. Hanako heads to the cathedral. Koharu is summoned to the Justice Task Force and grapples with what to do. A Gehenna ambulance with an injured Sensei arrives at Trinity's main gate as martial law is declared."
1377799660 = "Aggravated Confusion Part 2"
3800416342 = "Analysis reveals the projectiles were launched from Trinity, not Gehenna. Knowing the Saint Justina Council was present at the time of the explosion, Hanako warns that if worst comes to worst, both Trinity and Gehenna may be wiped from the face of Kivotos."
3662530531 = "A Side Beyond Reach"
3512207568 = "Azusa conceals her whereabouts, but Hifumi manages to find her. Azusa pushes Hifumi away, blaming herself for causing everyone to suffer, and is determined to destroy Saori's halo. Azusa thanks Hifumi and departs, leaving Hifumi to call out Azusa's name."
2485053728 = "A Light in the Darkness"
1374661261 = "The Arius Squad and Council are blindsided by Azusa as they're about to advance on Trinity. Azusa is captured, but manages to use the token Hifumi gave her to escape. She struggles with feelings of guilt over having used Hifumi's precious gift as an explosive."
3252357257 = "In Response to the Fifth Topic"
1561913819 = "Seia tells Sensei the Eden Treaty will lead to desolation and the fifth koan remains impossible to substantiate. Sensei leaves, determined to help the students in the present rather than despair over the proposition's ambiguity or the uncertainty of the future."
3162520452 = "Bits and Pieces"
3183955174 = "Seia considers everything entangled in the Eden Treaty. Saori survives with Atsuko's help, and Hina vanishes. The Tea Party arrests Hanako, and Mika is released. Azusa resolves to stop Saori, and Hifumi enters Trinity's gates. Sensei wakes up in the hospital."
3179867525 = "The Embodiment of Hate"
2955441922 = "Koharu defends Mika, who has been beaten mercilessly by the Tea Party. Sensei appears to protect Koharu and Mika, causing the Tea Party jingoists to scatter. Mika weeps in regret over her attempt to harm Seia. Seia is moved by her sincerity and forgives her."
3510190250 = "Without a Moment's Hesitation"
3395723629 = "Sensei meets with the injured students and then departs the infirmary to rescue the others. Hifumi, Koharu, and Hanako reassemble the Make-Up Work Club to rescue Azusa and head to the ruins of the old cathedral where the Arius forces and Azusa are located."
9241096 = "Our Stories"
1769802021 = "Hina comes out of her brief retirement after being visited by Sensei. Hifumi finds Azusa and decides to assume her identity as Faust to battle against the Arius Squad. A new ETO is formed after Sensei's declaration and interpretation of the Eden Treaty."
4250678679 = "The Name of Paradise Part 1"
1990540744 = "Gehenna's Prefect Team, Trinity's Justice Task Force, and Abydos join forces to face the Arius Squad."
4084884875 = "The Name of Paradise Part 2"
872832779 = "The fight continues, and all of the schools that at first seemed completely at odds which each other slowly begin to work together."
275424097 = "The Name of Paradise Part 2"
3278894928 = "Watching the war of ETO against ETO unfold, Seia admits it was wrong of her to try to prove the existence of paradise."
3228962781 = "The Name of Paradise Part 3"
3156389352 = "The Arius Squad seems destined for defeat as the precept loses its power. Saori is adamant in her will to fight and doesn't believe everything is in vain despite the members' talk of throwing in the towel."
3992775096 = "Below the Old Cathedral"
4215258149 = "Saori leaves the surrendered members behind and heads down to the basement of the old cathedral. Azusa and Sensei follow after her to finish the fight."
3039086335 = "Hatred That Is Not Our Own"
1305007844 = "Saori is defeated, and Azusa finally collapses from exhaustion. Atsuko then appears to personally admit defeat. Then, as if he had been waiting to strike, Maestro emerges and demands the doctrines hidden within Trinity's depths. Sensei pulls out their card to retaliate."
696231722 = "Hatred That Is Not Our Own"
859196225 = "Once the battle is over, the Arius Squad vanishes before everyone's eyes and disappears into the darkness."
1057886975 = "Epilogue"
3548500175 = "The Pandemonium Society recovers in the hospital, and order is restored to the Tea Party. Normalcy returns to life. Seia returns to the Tea Party, and the members have a dramatic reunion. Familiar faces gather at the new Make-Up Work Club. Meanwhile, an unknown presence targeting the Arius Squad goes on the move."
2388883385 = "Prologue"
742146611 = "The Arius Squad reaches its limit after endless pursuit. Hoping to save the other three, Atsuko surrenders and turns herself over. But what awaits the remaining members?"
523418069 = "Uncomfortable Reception"
503633399 = "In the name of helping the Tea Party, Sakurako from the Sisterhood and Mine from the Remedial Knights join Nagisa. During an awkward tea party, Nagisa informs Sensei that Mika's hearing will be held the next day, where she will likely be expelled."
1425951884 = "Jailed Princess"
1398756343 = "Sensei heads to the academy's prison to talk to Mika. She is upset and blaming herself, saying Seia had yet to forgive her. Sensei learns that Seia is not doing well, so they head to Seia's room. There, Seia gives Sensei a terrifying prophecy: all of Kivotos will be destroyed."
1644694189 = "Between a Dream and a Mirage"
2642024392 = "Seia tells Sensei she's had so many lucid dreams that she can no longer distinguish dream from reality. She explains that Gematria will cause the fall of Kivotos. Sensei advises her to make amends with Mika first. Seia calls Mika, but faints and encounters Gematria in her dreams."
175200160 = "Inscrutable Seekers"
4076845186 = "Seia witnesses a group of Gematria members arguing in what she thinks is a dream. Among the Gematria members is Beatrice. She declares she will use the Arius Squad to eliminate Sensei, but senses Seia's presence and quickly ends the meeting. Seia is greatly shocked and wakes up from the dream. Then, Mika comes to visit her."
4242006093 = "Broken Things"
3096862869 = "Shocked and afraid by what she'd heard, Seia screams at Mika and blames her for everything. Seia suddenly faints and is captured by Beatrice in a dream, but not before she sees Atsuko hanging from an altar. Meanwhile, Sensei encounters Saori in a back alley."
3473989469 = "Choices and Decisions"
137391815 = "Seia's condition worsens, and Mika is accused of hurting her. Meanwhile, Saori kneels in front of Sensei, begging for help to save Atsuko. Saori offers the halo-shattering bomb as collateral, but Sensei agrees to help and destroys the gift. Mika concludes that all her misfortune was because of Saori and escapes Trinity to seek revenge."
3718525211 = "Squad Reunion"
1431856600 = "Sensei and Saori start looking for the scattered members of the Arius Squad. They find Hiyori hiding in a slum, and Misaki standing on the railing of a bridge. They successfully convinces Misaki to go to the Arius District with everyone to rescue Atsuko."
895577034 = "To the Arius District 1"
466017759 = "To enter the Arius District, Sensei and the Arius Squad members head to an entrance in the underground catacombs in Trinity. However, Arius students stand in their way, under Beatrice's orders."
4233624493 = "To the Arius District 1"
2841961890 = "Misaki and Hiyori are pleasantly surprised at how much smoother combat is under Sensei's command. Saori presses them to continue and they head to Trinity's underground catacombs."
2385460060 = "To the Arius District 2"
519064440 = "Upon arriving at the entrance to Trinity's underground catacombs, the Arius Squad members attempt to break through their enemies with brute force."
2048900569 = "To the Arius District 2"
2969109627 = "Just as they finish defeating the Arius students in their way, there's an explosion and a new pursuer, Misono Mika, appears in front of the Arius Squad and Sensei."
767465142 = "Pursuers"
1734735203 = "Mika attacks the Arius Squad, and they're quickly defeated. But Sensei finally arrives at the scene and convinces Mika to let them go. The Arius Squad forges on to the catacombs, and Mika battles with the Arius members standing in her way."
308921891 = "Arius District"
1726588307 = "Mika annihilates Arius' pursuing army and acquires important information. Meanwhile, Saori faints from injuries, lack of sleep, and fatigue. Sensei gives her medicine, and they take a break so she can recover. But as they all drift into sleep, Seia suddenly appears in Sensei's dream with a grave warning."
2189783169 = "Old Story"
1121429929 = "While Saori is asleep, Misaki and Hiyori tell Sensei about Squad's past. Finally, Saori wakes up, and despite her heavy injuries, she decides to continue on to the Arius basilica to rescue Atsuko."
137688653 = "Face-to-Face"
3389099 = "In a corridor of the Former Institute, Sensei's communications are intercepted by Beatrice. Beatrice tries to convince Sensei that her actions in the Arius District, along with Atsuko's sacrifice, were all to create a better world for adults and asks them to join her. Sensei rejects Beatrice's offer, and a battle between the Arius Squad and the Saint Justina Council ensues."
1792504161 = "Face-to-Face"
3516525510 = "Mika suddenly appears, defeats the Council's boss, and fights against the Arius Squad."
4151121714 = "What Remains"
3307885360 = "Sensei tries to stop Mika, but she doesn't listen, so Sensei and the Arius Squad try to subdue her."
550001274 = "What Remains"
3997939746 = "The Arius Squad manages to suppress Mika, but Mika quickly escapes again after expressing her anger at all of them. The squad heads back to the basilica."
2688011438 = "Underground Corridor"
2182299148 = "A pillar suddenly collapses in the passage of a corridor and Saori is separated from the rest of them. The one to appear in front of the isolated Saori is none other than Misono Mika. They enter into a desperate one-on-one battle."
3611644228 = "Contest"
3307253189 = "Mika and Saori face each other beyond the rubble, cut off from Sensei and the rest. Their long-fueled rivalry finally comes to a head. Watching this, Beatrice explains the mysterious power lurking outside of Kivotos to Seia. Meanwhile, Seia continues to search for a way out of her daydream."
478233283 = "Another Us"
2294972915 = "After losing against Mika, Saori recalls her past with the squad. In the end, she collapses. Mika approaches Saori and points a gun at her but suddenly bursts into tears."
3895665603 = "Infinite Chances"
977567459 = "Sensei appears in front of Saori and Mika. Sensei apologizes to Mika, but Mika insists everything was her fault. As Sensei encourages their students, Beatrice, becomes enraged and starts the ritual."
3335292298 = "Infinite Chances"
1991311275 = "When Beatrice's ritual begins, Seia enters another dream space. There, Seia encounters someone."
3974900296 = "Saintess Barbara"
3127069218 = "The Arius Squad and Sensei have a harrowing fight against Saintess Barbara of the Saint Justina Council, created by Beatrice."
382639264 = "Breakthrough"
2623773402 = "Mika sacrifices herself to protect Sensei and the Arius Squad from the Council. Leaving her behind, the rest rush forward to rescue Atsuko."
3665603744 = "Breakthrough"
3144918653 = "The Arius Squad and Sensei arrive at the basilica sanctuary and confronting Beatrice."
2941796748 = "Agnus Dei"
2991478379 = "Beatrice asks Sensei to team up with her one last time, and Sensei promptly refuses. Beatrice is greatly angered by this and reveals her true colors."
1958381225 = "Agnus Dei"
1268369978 = "Defeated by the strength of the Arius Squad and Sensei, Beatrice eventually orders all troops to gather at the basilica sanctuary."
3926608295 = "Kyrie for the Students Part 1"
2994736897 = "Mika, who's been fighting enemies from the Council, is slowly becoming exhausted. She finds a schola cantorum in the Arius cathedral and gets lost in her thoughts. Mika recalls her faults from the past and confronts the Council while singing Kyrie Eleison."
3109022376 = "Kyrie for the Students Part 2"
1925570620 = "Beatrice is taken aback by Kyrie Eleison resonating in the basilica sanctuary. When Barbara and her troops don't show up because of the song, Beatrice becomes very angry and tries to sacrifice Saori."
294127303 = "Kyrie for the Students Part 2"
1887669411 = "Beatrice is defeated by the Arius Squad and Sensei. The Arius Squad rescues Atsuko, who's been freed from Beatrice's ritual. Then Golconde, a member of Gematria, appears in front of them and disappears with Beatrice."
1335977955 = "Someone Special"
3404775232 = "After successfully rescuing Atsuko, Saori tells Sensei that she will pay for all her sins. However, Sensei tells her to focus on living her life and leaves to find Mika. Meanwhile, Mika is fighting against Barbara and the Council, but she reaches her limit and is about to give up. At that moment, Sensei appears to Mika's surprise. Sensei is furious with Barbara and the Council for hurting their student."
960412593 = "Someone Special"
2369141067 = "Just as the Arius students are in a panic because they can't get in touch with Beatrice, Trinity forces suddenly pour out from the catacombs."
3408302799 = "Our Future"
2937481946 = "While Sensei and Mika are fighting in Arius, other Trinity students work together to save them."
1220533937 = "Epilogue"
448684912 = "As the Arius Squad is escaping the Arius district, they realize that Saori has suddenly disappeared. The remaining three resolve to continue moving forward. Meanwhile, Mika's hearing finally begins."
2575418392 = "An Uncontrollable Special Unit"
22033557 = "Upon receiving a call from Rin, Sensei visits the General Student Council and overhears that students from the closed SRT Academy are occupying the park in protest. Students from Valkyrie Police School are dispatched to arrest them, but to no avail. In the end, Rin asks Sensei from Schale to solve the problem."
3594487595 = "Uninvited Guest in the Park"
3574761045 = "Upon receiving Rin's request, Sensei arrives at the park and hears an explanation of the situation from Kanna, the Public Peace Bureau director from the Valkyrie Police School. The RABBIT Squad students, occupying the park, are armed with powerful weapons, but their command is in disarray. Sensei gathers students of the Valkyrie Police School at the scene and launches an attack."
269659944 = "Uninvited Guest in the Park"
3399601485 = "The members of the RABBIT Squad get carried away in triumph and fall for Sensei's plan. They're quickly defeated and arrested. "
3925139788 = "The Squad's Circumstances"
3147943515 = "Sensei and Valkyrie students interrogate the RABBIT Squad members. The squad members explain their reasons for not wanting to leave SRT Academy and swear they will never transfer to Valkyrie Police School no matter what they're offered."
3028720699 = "Chief of Staff's Circumstances"
2352385492 = "While Kanna and Sensei are examining the interrogation records, Kaya, chief security officer of the General Student Council, announces herself. Kaya explains the organizational charts of the General Student Council and why SRT Academy was disbanded. She then asks Sensei to help persuade members of the RABBIT Squad."
2002976807 = "Unresolved Distrust"
343907048 = "Sensei is suddenly given the task of managing the RABBIT Squad and advises the squad members to stay in the comfortable Schale office. They're suspicious of Sensei's intentions and instead continue camping as homeless students in the park."
1691499850 = "Food Delivery Operation"
1706575867 = "The next day, Sensei visits the park and finds the squad members starving. They continue to decline Sensei's help, so Sensei tells them about a place to get free food instead. When the squad members arrive there, they learn that the free food is discarded bentos from a nearby convenience store."
3423941325 = "Operation Carrot 1"
3800690627 = "The RABBIT Squad members solve their food problem thanks to the discarded bentos from the convenience store. But they soon encounter hygiene issues as there's nowhere to bathe in the park. Sensei proposes using a drum barrel as a bathtub, and the squad members set out to find old drum barrels."
1346916350 = "Operation Carrot 2"
2689011259 = "The RABBIT Squad members start to collect drum barrels at a loading dock near D.U. But Saki still doesn't trust Miyako and continues to complain about her leadership. Saki takes over, but Miyu gets lost when she fails to cope with the unexpected situation."
1989812613 = "Operation Carrot 2"
1658521241 = "Sensei and the squad members plan to rescue Miyu, who has gotten lost. Following Sensei's plan, Miyako and Saki infiltrate the target area while wearing drum barrels and they safely rescue Miyu. The squad returns home and takes a well-deserved drum barrel bath."
4283874219 = "A Suspicious Shadow"
2057607723 = "While shopping at a market near the park, Sensei hears from Kirino that there are suspicious, heavily-armed homeless people nearby. Just when Sensei is thinking they must just be exaggerated rumors about the RABBIT Squad, the unidentified homeless group kidnaps Sensei."
2671061263 = "Non-Possession and Yakiniku Bentos"
1248308752 = "A robot hippie group called Pursuers kidnaps Sensei. They're angry Sensei ordered the RABBIT Squad to monopolize the discarded bento around the area. The leader of the Pursuers, Descartes, tries to negotiate with the RABBIT Squad for Sensei's release but they don't care."
841964058 = "Non-Possession and Yakiniku Bentos"
2664679563 = "Faced with the RABBIT Squad's overwhelming firepower, the Pursuers are helpless and incapacitated. Descartes and the RABBIT Squad have a childish argument over supplies. But with Sensei's intervention, the fight ends and the squad members return to the park."
4069006275 = "Heavy Rain Advisory"
3932457485 = "A sudden heavy rain floods the park where the RABBIT Squad is staying. Despite much effort, when the command tent collapses, the squad loses hope and gives up, except Miyako. Sensei finally arrives and takes the initiative to help Miyako, who's struggling alone in the heavy rain. Seeing this, the squad members overcome their pride and decide to follow Sensei's example."
3138235130 = "Rain-Soaked Bills"
1105239486 = "[USERNAME] Sensei goes to the General Student Council with a proposal to repair the flooded park. However the executives, including Administrator Rin, refuse to help the students of SRT Academy. Kaya seems to agree to support as best she can, but after Sensei leaves, she threatens Kanna to get rid of the homeless population in Kousagi Town immediately."
346541298 = "The Fox and the Inarizushi"
283423853 = "Around lunchtime, Sensei finds a lone street vendor selling inarizushi near the park. The part-time student tells Sensei about many rumors surrounding SRT Academy, including the redevelopment of Kousagi Town. Afterwards, Sensei goes to the park and shares inarizushi with the squad members while discussing future distribution plans."
2188950162 = "The Barter System"
1844122045 = "Moe, supply manager of the RABBIT Squad, tries to buy cheap weapons by selling submerged equipment to Kaiser Industries.To her shock, the sales representative informs her that someone had purchased every single weapon they had in stock."
1905614692 = "A Small but Certain Failure"
3583459890 = "The RABBIT Squad sells all their rusted equipment and purchases new equipment through a strange, anonymous buyer. But Descartes appears in a panic, saying the Valkyrie Public Peace Bureau is armed with new weapons and is kicking out the homeless from the neighborhood. Before Descartes can finish speaking, Kanna appears in the park with a full squadron."
3162953850 = "Rebate"
251338756 = "Kanna declares that the Public Peace Bureau is now armed with more powerful weapons than the SRT and threatens to remove them herself if they weren't out by the end of the month. But Sensei realizes the Public Peace Bureau's weapons are from Kaiser Industries and theorizes that there must have been illegal activity between the two. The RABBIT Squad students decide to raid the main building of the police academy to find proof."
1172421243 = "Operation Clover 1"
2241435022 = "Miyako and her companions infiltrate the main building to investigate corruption in the Public Peace Bureau. With the support of Sensei and Moe, they succeed in infiltrating the archive room, but Miyu makes a mistake and they get trapped inside the vault."
140507024 = "Operation Clover 2"
3559020515 = "The squad members are panicking, and Miyako struggles with her powerlessness again. But Sensei and the squad members show Miyako their deep-seated trust in her, and Miyako regains her courage and leads them in their escape."
1348297398 = "Operation Clover 2"
3884614313 = "The members of the RABBIT Squad follow Miyako's instructions and make it to the rooftop, subduing Valkyrie students along the way."
3001093634 = "Time to Grow Up"
549448127 = "Kanna confronts the squad members on the roof. She expresses her anger and belief that SRT Academy, which has been conducting operations under privileges of immunity, doesn't deserve to discuss justice. But Sensei points out her own immaturity, and Kanna is stunned into retreat. The RABBIT Squad returns safely to the camp, hands over the evidence to Sensei, and falls asleep."
1089763991 = "Fox in the Hole"
2732075377 = "The Public Peace Bureau has a publicity disaster on their hands when the rebate with the Kaiser Group is exposed. Peace is restored to Kousagi Park, and the RABBIT Squad goes back to their daily lives. Meanwhile, Kaya, chief security officer of the General Student Council, secretly makes contact with the Fox Squad that was thought to have disappeared, and plans to launch a coup d'etat against the General Student Council."
2657253984 = "A FOX's Dream"
2098684420 = "Two years prior, when SRT Academy was nearly established, FOX Squad held their first mission briefing in front of Kaiser Industries' ammunition factory. Today, FOX Squad, an ex-SRT elite squadron that now executes sabotage operations throughout Kivotos, prepares to welcome new members for the first time in a long time."
3818520446 = "A RABBIT's Dream"
252378376 = "RABBIT Squad, who've become accustomed to their homeless life in the park, is preparing breakfast when Sensei visits them with an expensive beef gift set to show gratitude for their past help."
1519446641 = "Bait"
2004501637 = "RABBIT Squad and Sensei spend an enjoyable time grilling and eating the beef Sensei brought. While viewing CCTV footage of their past operations, thanks to Moe, see a suspicious shadow wearing SRT equipment. Remembering that they sold equipment to an arms dealer before, RABBIT Squad feels guilty for putting Sensei in danger and decides to secretly catch the culprit themselves."
2488756278 = "An Unexpected Reunion"
2671501519 = "The RABBIT Squad members arrive at their target location in chase of the suspicious shadow. They start to take control of the area, but a sudden ambush disrupts communications between the members. As a result, Miyako is isolated from the others and unexpectedly reunites with someone from her past."
942163621 = "A FOX's Shadow"
3816355345 = "The members of FOX Squad and RABBIT Squad are reunited and catch up with each other over some inarizushi that Niko has prepared. The pleasant time is short-lived however, as Miyako asks about the ambush. Yukino reveals her true intentions and proposes that Miyako join FOX Squad, causing her to feel conflicted. After catching up to everyone, Sensei asks for a bit of time and takes them back to Kousagi Park."
2758921771 = "A RABBIT's Distress"
4159709149 = "Back at Kousagi Park, the RABBIT Squad members reminisce about the old FOX Squad together and ponder what caused them to change. Suddenly, a broadcast from the General Student Council begins, and Kaya announces that she has replaced Rin as acting president of the General Student Council."
1587683690 = "Coup d'etat"
1212060240 = "A few hours before Kaya's broadcast, a debate ensued at the General Student Council on how to handle the recent incidents. On her way home from the meeting, Rin is ambushed and kidnapped by none other than Kaya. With public opinion of the Administration Board on her side, Kaya takes over as acting president of the General Student Council."
520211906 = "New Proxy"
3987261099 = "Sensei visits the General Student Council at Kaya's invitation. Kaya tries to win Sensei over with a proposal for a new administrative procedure, but they quickly reject it."
1497265820 = "D.U.'s New Dawn"
1641525659 = "After a new executive order is implemented, Kaiser Security Guards are deployed throughout D.U. to keep the peace. After watching Kaiser Security restrict civil liberties and arrest people indiscriminately, RABBIT Squad start to protest. To everyone's surprise, the Kaiser General makes a sudden entrance. He lectures them about power and obedience."
1720696531 = "Uncontrollable"
3618496825 = "Kaya tries to settle into her new role as the acting president of the General Student Council but is faced with unexpected events throughout Kivotos."
115168734 = "Black Coffee"
3651125542 = "On their way to Kousagi Park to meet with RABBIT Squad, Sensei finds Kirino and a Kaiser Security guard arguing. Luckily, Kanna is able to mediate the situation, but both she and Kirino are concerned that the new executive order has thrown D.U. into chaos."
2609050753 = "Determination"
1905103418 = "Sensei arrives at Kousagi Park, but RABBIT Squad is nowhere to be found. Only a letter from Miyako remains."
1718431036 = "Shock and Fear"
1319244017 = "Kaya calls a meeting to sort out the chaos running throughout the D.U. Things don't go well, and she calls the General and Yukino into her office to try and find a solution. Of course, Kaya always does."
3006987774 = "Prisoner's Dilemma"
2130705949 = "Late in the evening, Sensei returns to Schale after cleaning up the park and learns from Sora that all the lunch orders have been canceled. When Sensei returns to their office, having skipped dinner, an unexpected visitor arrives and offers them inarizushi."
1786519907 = "SRT's Justice"
1305326365 = "The RABBIT Squad members enjoy a relatively satisfactory time training with their upperclassmen, and even having hot showers! Miyako, however, feels as if something is missing. While on guard detail, Miyako finds Sensei when they get caught by the alarm system on the outskirts of the base."
2062986205 = "Sensei's Predicament"
4072771013 = "Miyako talks to Sensei in the interrogation room. Miyako says that she did what she did to revive SRT, but has a realization after listening to Sensei. After asking Sensei to leave the base, Miyako declares war on Yukino."
2788876369 = "Showing Off"
318148566 = "The next day, Sensei meets Miyako again at Kousagi Park. Miyako reveals that FOX Squad is planning to blow up Kousagi Station, and she wants to stop it. Miyako heads to Kousagi Station with Sensei, where she runs into Descartes, now an employee at the station."
1554714519 = "Elite vs. Elite"
1900114770 = "Descartes launches a reckless attack on Kaiser Security but struggles to make any significant impact. At that bleak moment, Kanna and the Public Safety Bureau students arrive to provide reinforcements."
347599141 = "Elite vs. Elite"
552425972 = "Thanks to Kanna and the Public Safety Bureau, Kaiser Security is defeated, allowing Miyako and Sensei to head to the station's underground."
4105357213 = "Abyss"
2925617176 = "Miyako and Sensei witness a massive missile silo under the Kousagi Station. They quickly find out that FOX Squad is occupying and defending the silo. At that moment, RABBIT Squad arrives to help Miyako."
965452976 = "Caerbannog's Cave 1"
1568447496 = "FOX Squad and RABBIT Squad prepare opposing tactical strategies."
1976030888 = "Caerbannog's Cave 1"
3156367598 = "FOX Squad handles RABBIT Squad with ease at first, but RABBIT Squad's unorthodox tactics begin to wear them down. Soon, RABBIT Squad secures the elevator shaft to the operation room."
892239188 = "Caerbannog's Cave 2"
2435344861 = "With all the other FOX Squad members incapacitated, Yukino evacuates her team outside and threatens to detonate the silo. Despite this, RABBIT Squad presses on."
3979027752 = "Yesterday and Tomorrow"
1693248650 = "Just when Yukino is about to detonate the bomb, the FOX Squad members, who she thought had escaped, rejoin her. The FOX Squad and the RABBIT Squad face off in front of the operations room."
3373122807 = "Yesterday and Tomorrow"
2860466848 = "After an intense battle, RABBIT Squad successfully subdues FOX Squad. Miyako talks to Yukino about her perception of what a mentor should be, and Yukino, reflecting on her past, finally decides to surrender."
3729157719 = "Failed Coup"
875871241 = "Upon hearing of the FOX Squad's defeat, Kaya panics and mobilizes Kaiser Security. Their soldiers quickly fall at the hands of a unified RABBIT Squad."
2757905344 = "Failed Coup"
340280301 = "RABBIT Squad and Sensei once again come face to face with Kaya. Kaya tries to please with Sensei, but her conspiracy is already exposed."
696032468 = "Epilogue"
253503154 = "After all is said and done, Kaya is impeached, and everyone involved is imprisoned. While at the Corrections Bureau, Niko receives a letter with some inarizushi and smiles."
2141989400 = "Prologue"
3946132036 = "One day, Niya calls Sensei asking them to visit her at Hyakkiyako. Sensei had been wanting to meet Kuzunoha anyways, so they agree and head off."
867945468 = "Sudden Encounter 1"
2534282816 = "Sensei arrives at Hyakkiyako and witnesses a student and a thug fighting over a resident's wallet. The student lunges and manages to secure the wallet, but the panicked thug calls for help."
784650514 = "Sudden Encounter 2"
1005886133 = "Yukari and Sensei succeed in chasing away the thug, and the resident thanks Yukari for getting the wallet back. After the resident leaves, Yukari formally greets Sensei and leads the way to the lantern festival. Someone suddenly shows up looking for Yukari, and she hurriedly leaves."
3919672259 = "At the Yin-Yang Club"
2802641052 = "Niya meets with Sensei and discusses the preparations for Hyakkiyako's festival. She also tells them about a threatening letter sent by \"Nature's Beauty.\" Niya says she needs Sensei's help in handling it. But as soon as Sensei nods in agreement, Yukari shows up."
3637226461 = "Self-Proclaimed Elite Girl's Entrance!"
1078075001 = "Yukari arrives at the Yin-Yang Club and tells a story about Nagusa, who had disappeared as quickly as she appeared. She asks Niya to help her with the Hyakkaryouran's succession contest. Niya asks Sensei to handle the matter."
2370772485 = "The Next Destination"
2706623289 = "Yukari decides to participate in the succession contest to revive the Hyakkaryouran. In order to find Hyakkaryouran upperclassmen that will help her, Yukari visits Renge's house and finds a note there."
3399810198 = "A Girl's Devotion to Youth(?) 1"
1054335404 = "In order to find Renge, who apparently left on a journey to reclaim her youth, Yukari visits various clubs with Sensei. Renge is nowhere to be found. While taking a break to discuss the plan, Kaede shows up out of nowhere."
4196717210 = "A Girl's Devotion to Youth(?) 2"
2076588919 = "While the Inner Discipline Club is inspecting the Hyakkiyako facilities at the request of the Festival Department, they have a conversation with Sensei. Then, suddenly, Arata and the Mouryo barge in, quickly followed by Renge."
2273835101 = "A Girl's Devotion to Youth(?) 2"
3687320158 = "Sensei and the group successfully drive away Arata and the Mouryo. Yukari runs to Renge, but Renge is taken aback by the sudden encounter."
3665538726 = "Fuwa Renge"
4273860323 = "Yukari asks Renge, who's working with the Inner Discipline Club as part of her youth activities, to help her with the succession contest. After hearing the details, Renge angrily refuses and retaliates."
1700027356 = "Fuwa Renge"
3723106540 = "Renge quickly subdues Yukari. Renge tells Yukari that the Hyakkaryouran cannot go back to the way it was before and leaves. The Inner Discipline Club students follow after her."
503705097 = "Blushing Cheeks"
1747027451 = "Yukari is confused about her encounter with Renge, but she pulls herself together. Just as Sensei and Yukari are about to set out to find another Hyakkaryouran upperclassman, someone summons Yukari, and she quickly leaves. Separated from Yukari, Sensei wanders around the festival site. They soon encounter a girl caught up in a commotion."
2958590599 = "Member of the Hyakkaryouran"
3591646746 = "The girl fights bravely in an ongoing battle against Arata and the Mouryo but is eventually forced on the defensive. Just when all seems lost, Sensei saves the girl and they escape the place together. The girl introduces herself as a former Hyakkaryouran member and tells Sensei a story about the Hyakkaryouran."
398789845 = "Kiryuu Kikyou and the Succession Contest 1"
1542367438 = "The next day, Sensei joins Yukari in visiting Hyakkaryouran's regulatory office, where they find Kikyou and Shizuko. Yukari asks Kikyou to help her with the succession contest, but Kikyou says it'd be impossible. Then, right there, Kikyou and Yukari engage in a succession contest."
1013593128 = "Kiryuu Kikyou and the Succession Contest 2"
1716918261 = "Kikyou tells Yukari, who lost the succession contest, to stop playing around. Embarrassed, Yukari leaves, and Sensei and Kikyou stay behind and talk about Hyakkaryouran. Then the Mouryo, grumbling after being defeated by Nagusa, encounter a girl with a strange aura."
3225732755 = "Determined Girl"
1744921907 = "Shizuko and Sensei split up to find Yukari. Shizuko manages to find her and asks her to return, but Yukari insists she's already made her decision. Then Sensei encounters another suspicious girl on the street."
3704592008 = "An Encounter"
1747430871 = "The girl, who identifies herself as Nature's Beauty, says something strange and disappears into the crowd. Sensei hears about what happened with Yukari from Shizuko, then contacts the Ninjutsu Research Club to find Nagusa and learn more about the Hyakkaryouran."
4268581401 = "Goryou Nagusa"
143447072 = "Sensei confronts Nagusa, who's reminiscing about the Hyakkaryouran's past. Nagusa reveals her identity and has a long conversation with Sensei. The moment fireworks go off to announce the start of the festival, the Phantom Fables come alive, bringing chaos to the festival streets."
644791031 = "Rumors of the Streets 1"
2513148571 = "With Yukari tending to her familial duties, Renge expresses her feelings around Hyakkaryouran's apparent demise. At the advice of the Inner Discipline Club, Renge calms down and remembers her goal. But everyone takes action to deal with the Phantom Fables' sudden appearance."
2982310612 = "Rumors of the Streets 2"
1779959641 = "While clearing the chaotic streets, Nagusa explains the Phantom Fables to Sensei. The two then have an unexpected encounter with the Inner Discipline Club and Renge. After a moment of awkwardness, a loud wail signals the start of an intense battle."
1944548097 = "The Bard of Nature's Beauty 1"
3436163381 = "The group battles the Phantom Fables, but are taken aback when they can't so much as make a scratch on the monster. When Nagusa says that only those who are qualified can best it, Shuro appears and laughs at Nagusa."
3203640400 = "The Bard of Nature's Beauty 2"
1142989290 = "Unaffected by Sensei's and Tsubaki's attacks, Shuro leaves, claiming that things are already going according to plan. Kurokage blocks the group from chasing after Shuro."
930282140 = "The Bard of Nature's Beauty 2"
790387478 = "Yukari always has to be on stage on behalf of her family, regardless of her personal desire, and she's disappointed that no one respects her. Then, she hears someone whispering..."
4033191432 = "Yours, Nevertheless"
3274326348 = "While everyone is being blocked by the undefeatable Kurokage, Kikyou steps forward and persuades Nagusa to help. Kikyou tells her she's the only one who can save Yukari since only she is qualified. Nagusa and Sensei step forward together."
1742211216 = "Street in Flames"
1706685059 = "Sensei and Nagusa are stopped in front of the plaza stage by the endless Phantom Fables, but the Yin-Yang Club and the Ninjutsu Research Club come to help."
3155421652 = "Street in Flames"
1197423923 = "Shuro shows up in front of Yukari and reveals her the Phantom Fables' Faceless Katashiro, created via Yukari and the burning festival streets. Yukari faints from shock, and Sensei and Nagusa appear."
3881819382 = "Elaborate Lies"
415440099 = "Shuro tells Nagusa what happened in the Great Snowfield and points out Nagusa's mistakes, breaking her down. Just as Shuro thinks she's about to win, Sensei steps forward."
2046334446 = "Ordinary Events"
1314809181 = "Shuro is angry at Sensei's rebuttal and prepares to attack. Then, Yukari, who'd decided to stay with the Hyakkaryouran rather than her own Kadenokouji family, blocks her from doing so. Afterwards, Renge and Kikyou appear and join forces to fight against the Faceless Katashiro."
3026137772 = "Ordinary Events"
2364647164 = "As Renge, Kikyou, and Yukari are cornered by the Phantom Fables, Nagusa steps forward. Despite Shuro's criticism, Nagusa admits she doesn't want to lose the important people in her life anymore and uses the Hyakkaryouran's qualifications to defeat Shuro and drive her into a corner."
1918408273 = "Yours, For Now"
3492807103 = "Shuro eventually flees. Yukari is grateful to be reunited with everyone and immediately challenges Nagusa to a succession contest, her original goal. Yukari is defeated in an instant, but she still looks happy and says everyone should go back to the Hyakkaryouran."
2816211461 = "Carrying Wishes"
3813773295 = "With the complicated series of events finally resolved, peace returns to Hyakkiyako, though there's still work to be done. As everyone sends up their lanterns with a wish, Kokuriko, president of Nature's Beauty, smiles in the dark and reveals her true colors."
1478099875 = "Untouched Hem"
2417637268 = "Nagusa has a nightmare where she remembers losing Ayame in the Great Snowfield. Perhaps because of this, the pain in her arm grows progressively worse."
2900210047 = "A New Ghost Story"
1286307520 = "A new member of Nature's Beauty visits Kokuriko. Meanwhile, Shuro, who has vowed to take her revenge on Nagusa, plans her vengeance against the Hyakkaryouran."
2234435405 = "A New Festival"
2388749549 = "When everyone else gets ready for the \"Waraku Festival\", Mouryo and Arata sabotage festival preparations."
1536773814 = "A New Festival"
1088037523 = "After defeating Arata, the Hyakkaryouran members help with festival preparations. During this, Yukari notices that Nagusa's wound is looking dire. She takes her to the Kadenokouji family."
1501948804 = "Honored Guest of the Kadenokouji Family"
2728089330 = "A suspicious doctor at the Kadenokouji estate immediately realizes that Nagusa's arm was damaged by the spirit realm. When the doctor says that Nagusa must return to the Snowfield to treat her arm, Nagusa reveals the truth about her final moments with Ayame."
756362788 = "Yearning Beyond the Memory"
3370516004 = "Months ago, when Nagusa went out looking for Ayame, Ayame said, \"You were never my friend, Goryou Nagusa.\" The shocked club members believe that there must be an explanation and decide to find and ask Ayame directly."
1502304932 = "Festival Preparations"
2057092328 = "Niya calls the Hyakkaryouran and asks them to investigate a paranormal entity in the North District near Ebisu Satellite School. Sensei tags along, hoping to learn more about Kuzunoha."
1315750381 = "Snow Country"
1205635506 = "The Hyakkaryouran arrives at the North District and meets Azami, who introduces herself as the president of the Self-Government Committee. Azami tells them about the strange happenings around the Ebisu Satellite School and shows them around the North District."
3601732457 = "Nightmare"
1301003702 = "Nagusa wakes up from a nightmare about Ayame. Shuro mocks Nagusa and they start fighting."
2063888527 = "Nightmare"
