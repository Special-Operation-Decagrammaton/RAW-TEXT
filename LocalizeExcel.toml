3944901993 = "The good, The bad, The trinity（１）"
2576802244 = "伊織對過站不停的列車起了疑心，決定登上列車。他們和以第一節車廂為目標的老師等人相遇了。"
625534155 = "The good, The bad, The trinity（２）"
1618348553 = "伊織氣呼呼地想帶走列車上的所有不良學生，但佳澄表示，這輛列車的乘客絕大多數都是不良學生。伊織向老師求助，但佳澄卻拿三一的文物來威脅老師。"
231759077 = "開往地獄的特快車"
810924489 = "面對以三一的文物威脅的佳澄，一花最終失去了耐性，不斷地攻擊包含佳澄在內的在場所有學生。"
2795025360 = "事關努力，而非天賦"
943399603 = "一花看到破碎的文物後總算冷靜下來，老師表示會和他一起去道歉。在笑著說一花的努力都看在眼裡後，一花的表情也明朗了起來。就在此時，列車卻被放置在行進方向上爆裂物影響而翻覆。"
