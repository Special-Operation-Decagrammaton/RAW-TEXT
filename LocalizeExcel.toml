1872607528 = "เขตปกครองตนเอง D.U. จัดงานเทศกาลเพื่อต้อนรับวันวาเลนไทน์\nฟุบุกิกับคิริโนะจากสถาบันฝึกตำรวจวัลคิรี่ขอร้องให้คุณครูช่วยรักษา\nความปลอดภัยในเทศกาล คุณครูจึงได้เริ่มภารกิจลาดตระเวน"
