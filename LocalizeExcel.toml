2195551207 = "สมาชิกเก่าของชมรมชั้นเรียนเสริมมาถึงที่มาถึงทีหลังก็แยกย้ายกันไป\nคนละทิศคนละทาง  ฮานาโกะเข้าไปในมหาวิหารเพื่อแก้ไขความสับสน\nของชมรมซิสเตอร์แทนซากุระโกะ โคฮารุถูกเรียกตัวฉุกเฉินมาที่ห้องชมรม\nทวงความยุติธรรม เธอสับสนในสิ่งที่ต้องทำ ในอีกฝั่งหนึ่ง รถฉุกเฉินของ\nเกเฮนน่าที่คุณครูที่บาดเจ็บนั่งมาก็มาถึงประตูหน้าของทรีนิตี้ในตอนที่\nประกาศกฎอัยการศึก"
1377799660 = "ความสับสนที่เพิ่มขึ้น (2)"
3800416342 = "การวิเคราะห์วิถีกระสุนพบว่าถูกยิงมาจากทรีนิตี้ ไม่ใช่เกเฮนน่าแต่อย่างใด ฮานาโกะได้รู้ความจริงว่าในตอนที่เกิดระเบิด <สาวกยูสตาร์> อยู่ที่ที่เกิดเหตุด้วย และได้เตือนว่า หากสถานการณ์เลวร้ายที่สุด ทรีนิตี้กับเกเฮนน่าอาจจะหายไปจากคิโวทอส"
3662530531 = "สิ่งที่ไม่อาจไขว่คว้า"
3512207568 = "ฮิฟุมิตามหาอาซึสะจนพบในที่สุด แต่อาซึสะก็ผลักไสฮิฟุมิ แล้วบอกว่า\nไม่สบายใจที่ทุกคนต้องมาบาดเจ็บเพราะตัวเอง อาซึสะพูดด้วยแววตาที่\nตัดสินใจแน่วแน่ว่าจะไปทำลายฮาโลของซาโอริ เธอขอบคุณฮิฟุมิแล้ว\nจากไป ฮิฟุมิได้แต่ตะโกนเรียกชื่ออาซึสะอยู่คนเดียว"
2485053728 = "แสงสว่างท่ามกลางความมืดมิด"
1374661261 = "สควอดของอาเรียสเตรียมอาวุธยุทธวิธีและไปบุกทรีนิตี้พร้อมกับ\nสาวกยูสตาร์ แต่ก็ได้รับบาดเจ็บจากเทคนิคซุ่มโจมตีของอาซึสะ\nอาซึสะถูกจับตัวได้แต่ก็ใช้หลักฐาน <มิตรภาพ> ที่ฮิฟุมิให้มาแล้วหนี\nออกมาได้อย่างหวุดหวิด แต่เธอกลับรู้สึกผิดเพราะของขวัญอันมีค่า\nของฮิฟุมิถูกระเบิดไป"
3252357257 = "คำตอบของกฎโบราณข้อที่ 5"
1561913819 = "เซอาบอกคุณครูว่าสนธิสัญญาเอเดนมีเพียงตอนจบที่หดหู่และน่าเศร้า\nการคาดหวังอะไรเพิ่มน่าจะนำมาแต่ความเจ็บปวด กฎโบราณข้อที่ 5\nยังคงเป็นประโยคที่พิสูจน์ไม่ได้เหมือนเดิม สิ่งนี้ให้เสียงหัวเราะขมขื่น\nในการทำตัวเองสมบูรณ์ในนามของสนธิสัญญาเอเดนที่ชื่อมีความขัด\nแย้งในตัว แต่คุณครูบอกว่าตอนนี้จะพยายามเพื่อนักเรียนดีกว่าจะไป\nท้อแท้กับกฎที่ไม่ชัดเจนและอนาคตที่ไม่แน่นอน จากนั้นก็จากเซอามา"
3162520452 = "ส่วนเล็กๆ น้อยๆ"
3183955174 = "เซอาพิจารณาถึงส่วนเล็กๆ น้อยๆ ที่มาพัวพันกับสนธิสัญญาเอเดน\nซาโอริยังมีชีวิตอยู่ได้ด้วยความช่วยเหลือของอาสึโกะ ส่วนประธาน\nกรรมการฮินะก็หายตัวไป สภาน้ำชาสงสัยว่าฮานาโกะจะเกี่ยวข้องกับ\nชมรมซิสเตอร์จึงจับกุมเธอมา ส่วนมิกะก็ได้รับการปล่อยตัวจากคุก\nอาซึสะออกโรงอีกครั้งเพื่อขัดขวางซาโอริ ส่วนคุณครูก็ตื่นขึ้นมาใน\nห้องพยาบาลและลุกขึ้นมาอีกครั้งเพื่อช่วยนักเรียน"
3179867525 = "ตัวตนของความเกลียดชัง"
2955441922 = "โคฮารุปกป้องมิกะที่ปฏิเสธการเรียกร้องให้สั่งการสภาน้ำชาจนโดน\nทารุณอย่างโหดร้าย เมื่อบรรยากาศรุนแรงขึ้นเรื่อยๆ คุณครูก็ปรากฏตัว\nเพื่อปกป้องโคฮารุและมิกะ ส่วนพวกที่สนับสนุนสงครามของสภาน้ำชา\nก็หนีไป ในขณะที่ถูกขังอยู่ มิกะร้องไห้เสียใจในเรื่องที่ตัวเองพยายาม\nจะทำร้ายเซอา เซอารับรู้ถึงความจริงใจของมิกะและตัดสินใจจะยกโทษ\nให้กับมิกะ"
3510190250 = "ไม่หวั่นไหว"
3395723629 = "คุณครูได้พบกับเหล่านักเรียนที่ได้รับบาดเจ็บ คุณครูมุ่งหน้าไปยัง\nห้องพยาบาลเพื่อช่วยเหลือนักเรียนคนอื่นๆ ตามคำขอของนักเรียน\nฮิฟุมิ โคฮารุ และฮานาโกะได้พบกันและจัดตั้งชมรมชั้นเรียนเสริม\nขึ้นอีกครั้งเพื่อช่วยอาซึสะ ทุกคนมุ่งหน้าไปยังเศษซากวิหารโบราณ\nที่อาเรียสและอาซึสะอยู่"
9241096 = "เรื่องราวของพวกเรา"
1769802021 = "คุณครูได้เห็นมุมที่อ่อนแอของฮินะที่บอกว่าจะออกจากตำแหน่งหลัง\nจากได้รับการยอมรับจากคุณครู ฮินะก็กลับไปที่คณะกรรมการวินัย\nเกเฮนน่า ฮิฟุมิหาตัวอาซึสะเจอพอดี เธอตัดสินใจเด็ดขาดว่าจะไป\nเผชิญหน้ากับสควอดของอาเรียสพร้อมกับกลุ่มหน้ากากมิสึกิ มีการทำ\nข้อตกลงบรรทัดฐานใหม่ในสนธิสัญญาเอเดน โดยมีคุณครูจากชาเล่ต์\nเป็นศูนย์กลาง"
4250678679 = "นามแห่งสวรรค์ (1)"
1990540744 = "คณะกรรมการวินัยของเกเฮนน่า ชมรมทวงความยุติธรรมของทรีนิตี้\nและนักเรียนอะบิดอสที่อยู่ที่นั่นผนึกกำลังกันเพื่อเผชิญหน้ากับสควอด\nของอาเรียส"
