2812405180 = "โนอา คุณครู และชมรมวิศวกรรมในชุดเชียร์ไปหาเวอริทัสอีกครั้งหนึ่ง\nเมื่อได้ฟังเรื่องที่เกิดขึ้น เวอริทัสก็ไล่ตามความเคลื่อนไหวที่น่าสงสัยใน\nโรงเรียนมิลเลเนียม"
