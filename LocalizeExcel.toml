2315302090 = "依舊未曾放棄的事物（１）"
2958239043 = "抵達阿拜多斯高中舊本館的對策委員會一行人。儘管凱薩PMC的幹部擋住他們的面前，不過晚來的亞瑠和便利屋68一行人即時出現幫助對策委員會。"
465533926 = "依舊未曾放棄的事物（２）"
3049385587 = "對策委員會朝著星野被俘虜的堡壘前進。"
3889357593 = "依舊未曾放棄的事物（２）"
4091157200 = "經過漫長的戰鬥，對策委員會順利成功救出星野。"
460663098 = "尾聲"
1819455677 = "所有事件結束後，老師收到綾音寄來的信。綾音向[USERNAME]老師道謝說，雖然沒完全還清債務，但是多虧了老師才守住對策委員會的日常。"
451759275 = "序幕"
1467700440 = "在地下深處，法蘭西斯喚醒的蓋瑪特利亞OB開始活動。另一方面，凱薩集團計畫將出售阿拜多斯高中的債權，對策委員會則打算購買債券。不過，對策委員會還來不及出手債券就售罄了，並在買家名單上發現了攻擊性買家奈芙蒂斯集團的名字。"
2836028392 = "不速之客"
2468775960 = "對策委員會得知奈芙蒂斯公司買下凱薩的債券的目的，是完全買斷阿拜多斯沙漠橫貫鐵路的所有權利。正當對策委員會不解他們為何要買斷沙漠橫貫鐵路的所有權時，入侵者出現了。"
2578507434 = "高地人鐵道學園（１）"
792808784 = "襲擊阿拜多斯自治區的人正是高地人鐵道學園CCC的幹部光和希望。對策委員會決定出面阻止想要強行開發沙漠橫貫鐵路的兩人。"
