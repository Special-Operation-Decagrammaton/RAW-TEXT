2764672385 = "밤은 짧아 달리자 소녀여. 1"
3621891441 = "최근 수행부의 선배인 츠바키와 미모리가 자기만 두고 밤마다 외출하는 게 수상하다고 말하는 카에데는 선생님과 함께 두 사람의 비밀을 밝혀내기 위해 미행을 시작한다."
2721538548 = "밤은 짧아 달리자 소녀여. 2"
3839830930 = "츠바키와 미모리를 미행하는 카에데와 선생님. 자신만 쏙 빼놓고 수행부 활동을 하는 둘을 보며 카에데는 자기가 필요 없어져서 빼놓고 간 게 아니냐며 울먹거리지만, 실은 그것이 카에데의 오해였다는 게 밝혀진다."
3115018656 = "매너가 게임을 만든다 1"
939693077 = "온라인 대전게임에서 비매너 유저에게 된통 당한 모모이는 올바른 매너를 가르쳐주겠다며 게임개발부 멤버들과 함께 비매너 유저가 있는 오락실로 향한다."
1262797320 = "매너가 게임을 만든다 2"
3551104112 = "모모이는 오락실에서 버그를 사용하는 비매너 유저에게 또다시 패배하여 조롱 당하지만, 모모이를 대신하여 나선 유즈가 뛰어난 게임 실력으로 비매너 유저를 응징한다."
1545900618 = "어른의 장난감 1"
2214419213 = "식자재를 받으러 현무상회에 들른 코코나는 루미로부터 슌이 주문한 수상한 물건을 건네받는다. 루미는 단순한 <어른의 장난감>이라며 둘러대지만, 이 말이 오히려 더 큰 오해를 낳아 슌에 대한 이상한 소문이 산해경에 퍼져버린다."
4167014609 = "어른의 장난감 2"
3860611716 = "슌은 자신이 <어른의 장난감>을 사용한다는 망측한 소문이 산해경 내에 널리 퍼진 것을 알게 된다. 선생님으로부터 소문의 진상을 들은 슌은 분개하여, 그 소문을 퍼트린 당사자인 코코나를 찾아가 호되게 야단친다."
633382671 = "체포하겠습니다! 1"
497768125 = "평화로운 생활안전국의 여느 한 때. 키리노는 사건이 벌어지지 않아 자신이 공적을 세울 기회가 오지 않는 것에 대해 불평한다. 그때, 인질범이 나타났다는 신고가 들어오고 키리노와 후부키는 공적을 세우기 위해 경비국보다 앞서 출동한다."
2582496763 = "체포하겠습니다! 2"
2972853045 = "경비국보다 앞서 현장에 도착했지만 키리노와 후부키는 열악한 장비 탓에 범인은 무력화하지 못하고 고전한다. 그 때 후부키가 가게 앞에 있는 밀가루 포대를 발견하고 분진 폭발을 일으켜 범인을 무력화시키지만, 시민의 피해도 컸던 탓에 두 사람은 징계를 받게 된다."
1042018394 = "특별반을 위한 탄원서 1"
1592688240 = "노도카와 시구레는 본교사 복귀를 위해 지식해방전선의 메루에게 탄원서 작성을 부탁하지만, 메루가 탄원서에 거듭 허구의 사실을 적자 그녀를 쫓아낸다."
1372490489 = "특별반을 위한 탄원서 2"
360515789 = "특별반 학생들은 붉은겨울 학원의 다른 동아리에게 탄원서 작성을 부탁하지만, 이상한 내용의 편지만 계속해서 도착한다. 용역부의 미노리가 그나마 제대로 된 탄원서를 써 주지만, 정작 체리노는 이를 행운의 편지로 오해해 태워버린다."
677660195 = "그렇게 소녀들은 한자리에 모인다. 1"
1632709229 = "평소처럼 동영상 촬영을 끝마치고 돌아온 미치루와 츠쿠요가 어떻게 하면 여기서 더 좋은 닌자 콘텐츠를 만들 수 있을까 고민하는 사이, 불현듯 예상치 못한 방문자가 문을 두드린다."
3202154650 = "그렇게 소녀들은 한자리에 모인다. 2"
2201315182 = "인법연구부에 입부하고 싶어 찾아왔다는 이즈나를 보며 처음엔 경계하는 미치루와 츠쿠요지만, 이즈나가 얼마나 닌자를 좋아하는지 이야기를 들은 두 사람은, 또 동료가 늘어난 것을 기뻐하며 이즈나의 입부를 환영한다."
3431406180 = "통조림의 그림자 1"
1074842512 = "어느날 RABBIT 소대는 작전 중 우연히 전투식량을 구하게 된다. 식량 사정에 허덕이던 RABBIT 소대는 기뻐하며 전투식량을 캠프로 가져온다. 하지만 그날 밤, 순찰을 하던 미유는 해물비빔소스 통조림이 혼자서 움직이는 것을 발견하게 된다."
646029466 = "통조림의 그림자 2"
1292050028 = "미유의 비명을 듣고 전투식량이 보관된 텐트로 달려 온 RABBIT 소대원들. 하지만 소대원들은 통조림이 움직였다는 미유의 말을 그녀가 피곤한 탓이라 생각하고 대수롭지 않게 여긴다. 이후 해물비빔소스 통조림은 방치된 채 시간이 흐르게 된다."
2826916122 = "통조림의 그림자 3"
374786045 = "유통기한에 다다르자 해물비빔소스 통조림은 가스가 가득 차 부풀어 오르고, 이를 어떻게 처리할지를 두고 RABBIT 소대는 고민에 빠진다. 결국 폭발물 처리 교육을 받은 사키가 통조림을 처리하기로 하지만, 다른 소대원들의 훈수가 계속되자 그녀의 집중력은 흐트러지고…… 결국 해물비빔소스 통조림은 폭발하고 만다."
3706155076 = "가치의 증명 1"
4095209803 = "밀레니엄의 예산심의위원회에 참석한 유우카와 노아는 밀레니엄 학생들이 만든 기발한 발명품을 심사하게 된다. 소란스러웠던 심의가 끝난 후, 유우카는 출처를 알 수 없는 제안서를 하나 발견한다."
3536363241 = "가치의 증명 2"
