143433522 = "為大家舉辦的大運動會"
1757313669 = "大運動會當日"
2470008028 = "大運動會前夕"
2617062401 = "老師從研討會的優香和乃愛那裡聽說將要舉辦「晄輪大祭」，但卻發生了意料之外的事故。慶典迫在眉前，乃愛擔心優香太勉強自己，於是便背著優香拜託老師幫忙準備大運動會。"
845225262 = "千年的巨匠"
1370627587 = "乃愛和老師為了修理故障的應援機器人而前往工程師部。工程師部聽聞情況後便發下豪語，表示要製作新的應援機器人來取代。"
4262322769 = "千年的駭客"
2239879700 = "乃愛和老師前往千年學園的駭客集團「貝里塔斯」。在乃愛的真誠的請求下，起初對乃愛的來訪感到警戒的貝里塔斯也決定敞開心房幫助他。另一方面，千尋得知了有人嘗試入侵千年學園的伺服器。"
3776835865 = "千年的指導員（１）"
2305382535 = "乃愛和老師為了確認參賽選手的狀態而前往訓練部。在晄輪大祭前夕，堇燃起了鬥志，但原先一起運動的學生全都被她嚇跑了。堇壓抑不住興奮的心情，並且建議老師做些「簡單的」運動。"
1674288483 = "千年的指導員（２）"
3186889323 = "一群千年學園的學生聚在學園某處制定可疑的計畫。"
2310867314 = "千年的應援團？（１）"
3921454463 = "乃愛和老師回到工業實習室查看新製作的應援機器人。但在那裡等他們的卻是一身應援團打扮的工程師部。原來，雖然成功做出了應援機器人，但它卻突然失控逃走了。乃愛看了應援機器人的藍圖，懷疑是被人入侵了。"
3125605064 = "千年的應援團？（２）"
2812405180 = "乃愛和老師便和身穿應援團服裝的工程師部再度前往貝里塔斯。貝里塔斯聽完事情的經過，便開始追蹤千年學園內的可疑動靜。"
3491008751 = "反對晄輪大祭的集會"
3227473772 = "研討會一行人在貝里塔斯的幫助下，成功找出偷走應援機器人的千年學園學生。他們是一群討厭體育活動，反對舉辦晄輪大祭的學生。為了阻止大運動會，他們這段時間一直在進行各種阻礙行動。這群「晄．反．會」的學生，利用從工程師部偷來的機器人對付研討會一行人。"
1811732470 = "名為應援的戰車"
1826342970 = "在「賽道破壞者」的強大戰鬥力面前，工程師部和貝里塔斯屢屢受挫。多虧乃愛想出來的點子，賽道破壞者才失去戰鬥能力，使戰況得以反轉。躲藏的「晄．反．會」學生也被堇一網打盡，騷動就此結束。"
2110629097 = "為大家舉辦的大運動會"
158795387 = "老師問「晄．反．會」的學生妨礙大運動會的原因，聽他們訴說苦衷。後來乃愛和老師為了營造能讓大家開心的大運動會，決定修改部分計畫。之後千年學園的學生便同心協力努力準備大運動會。"
3915786569 = "大運動會當日"
2806214484 = "從睡夢中驚醒的優香慌忙趕到現場，這才發現其他千年學園的學生在自己熟睡的時候，幫忙準備大運動會。優香向幫助自己的乃愛和老師道謝……「晄輪大祭」順利開幕。"
3198922083 = "Get Set, Go!　～奇普托斯晄輪大祭～"
2064697458 = "奇普托斯大運動會「晄輪大祭」終於開始了。\n各個學園齊聚一堂，在相互競爭的慶典背後，暗藏著波濤洶湧……\n究竟，勝利女神會向哪個學園露出微笑呢？"
