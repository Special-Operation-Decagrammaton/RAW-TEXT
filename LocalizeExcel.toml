2873970964 = "透過從暗黑銀行帶來的文件，對策委員會一行人得知所有事件的黑幕，就是大型企業<凱薩公司>。在包圍學校的社會巨惡面前，學生們失去鬥志後決定暫時解散。"
1849712170 = "烏雲密布"
2479276074 = "亞瑠用從對策委員會手上取得的錢攻擊阿拜多斯高中。對此，亞瑠感到良心的譴責而苦惱不斷。為了鼓勵無精打采的亞瑠，便利屋職員們一同前往柴關拉麵店。另一方面，身穿黑色西裝的男人出現在星野面前，向她提出祕密交易。"
3652595243 = "才不是什麼朋友！"
3597989428 = "亞瑠在柴關拉麵店吃拉麵時，聽了老闆的窩心鼓勵，終於承受不住良心的譴責而放聲喊叫。然而遙香卻誤解亞瑠的喊叫，反而把炸彈裝在店裡，把柴關拉麵店炸得不留痕跡。"
1822218538 = "混蛋，不可饒恕！"
2950249706 = "亞瑠在無意中犯下了慘無人道的暴行。對策委員會的學生沒明白亞瑠的內心就指責她。結果亞瑠真的模仿壞蛋與對策委員會對立。"
2392026169 = "混蛋，不可饒恕！"
647272427 = "就在便利屋和對策委員會的戰鬥達到最高潮時，砲擊突然從遠方襲來。綾音說發動砲擊的是格黑娜學園的風紀委員會。"
4008077676 = "風紀委員會，參戰！"
