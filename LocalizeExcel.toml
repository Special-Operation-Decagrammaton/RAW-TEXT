4074605646 = "선생님과 함께 새로운 별미를 찾아 바다를 찾은 이즈미는 갑작스럽게 문어의 습격을 받는다. 자기가 잡아먹히기보다 먼저 잡아먹겠다며 날뛰는 이즈미를 선생님이 간신히 말린다."
1620499167 = "최고의(?) 피서"
709254674 = "해변의 별미를 제패하려던 이즈미와 선생님은 더위에 지쳐 잠시 휴식을 취하기로 한다. 이즈미는 자신의 아이스박스에서 여러 가지 재료를 꺼내 화채를 만들어 대접하고 이즈미의 화채를 먹은 선생님은 그대로 기절한다."
3295968282 = "선도부장과 함께 해변 산책"
3010205152 = "합숙 훈련의 사전 연습을 위해 선생님과 해변을 찾은 히나. 그러나 학교의 호출로 히나는 자리를 비우게 되고, 시간이 지나도 히나가 돌아오지 않자 선생님은 걱정하지만. 히나로부터 미아 보호소에 있다는 연락을 받게 된다."
1655107260 = "선도부장과 함께 서류 작업"
500163992 = "합숙 훈련을 와서도 선도부의 업무가 끝나지 않는 히나를 위해, 선생님은 히나를 돕기 위해 숙소를 방문한다. 그렇게 간신히 업무를 끝낸 뒤, 선생님과 히나는 저녁 식사를 함께한다."
782812198 = "히나와 함께 여름의 풍경을"
170121594 = "함께 바다에 놀러 가자고 약속한 히나지만, 과로로 인해 쓰러져 약속 시간을 넘겨버린다. 자기 때문에 약속을 망쳤다며 사과하는 히나에게 선생님은 호텔방에서 보이는 아름다운 풍경을 보여준다."
1063317491 = "아직도 소중히 여기는 것"
562904619 = "수영을 배우고 싶다는 말에 급히 히나를 찾아간 선생님. 그러나 두 사람의 오붓한 1:1 수영 강습은 해변에서 난동을 부리는 불량배들에 의해 예기치 못한 상황으로 흘러간다."
121651125 = "해변에서 하면 안 되는 일"
801476589 = "해변에서 적용할 새로운 교칙을 정리하던 이오리는 선생님에게 학생이 해서는 안 되는 일에 대해 조언을 구한다."
828409727 = "선도부원의 약점"
1423535926 = "이오리는 하계 합숙을 앞두고 수영 연습을 하기 위해 몰래 튜브를 구입하지만, 그 모습을 선생님에게 들키고 만다. 이오리의 고충을 알게 된 선생님은 그녀의 수영 연습을 함께 도와준다."
3945086099 = "선도부원의 가벼운 일탈"
3982380859 = "해변에서 열심히 교칙 위반자들을 단속하던 이오리는 휴식 시간을 이용하여 몰래 일광욕을 즐기지만, 그 모습을 선생님에게 들키고 만다."
4161301031 = "모래찜질"
1639986624 = "모래사장에서 모래 찜질을 하는 선생님과 마주친 이오리. 모래를 덮으면 기분이 좋다는 선생님의 말에 잠시 모래 찜질을 하며 휴식을 즐기지만, 그 사이 선생님이 이오리의 하반신 위에 멋진 인어상을 조각해놓는다."
2618097705 = "노을 지는 해변"
2453697925 = "선생님은 이오리와 함께 해변의 불량배들을 소탕하던 중, 해변으로 날아간 수류탄 때문에 물에 흠뻑 젖어버린다. 이오리는 그런 선생님에게 자신이 아끼는 담요를 빌려준다."
3842642425 = "키보토스 롱 라이딩"
683246259 = "전부터 꿈꿔왔던 키보토스 종단을 시도하는 시로코.선생님은 자신에게 걱정을 끼칠까 봐 주저하는 시로코를 격려해주고, 종단일주가 시작된다."
1462935881 = "나만의 서포터"
1892594340 = "약속대로 주기적으로 선생님에게 연락하는 시로코.선생님은 그런 시로코를 위해 서포터를 자처하며 응원해준다."
3283621877 = "모든 곳에서 함께"
2757117157 = "종단 일정대로 포인트마다 기다리며 시로코를 맞아준 선생님.시로코는 즐겁게 마지막 포인트로 향한다."
2843691457 = "마지막 포인트"
4094165763 = "마지막 포인트였던 샬레 앞으로 도착한 시로코.완주 지점인 아비도스 운동장까지는 선생님과 느긋하게 함께한다."
137781174 = "작다는 건 편리해!"
1322340430 = "약의 부작용으로 인해 다시 몸이 작아지게 된 슌은 한정 파르페를 배불리 먹기 위해 단골 디저트 가게로 향한다. 하지만 몸이 작아지며 입맛까지 바뀌어버린 탓에 슌은 본래 좋아했던 럼 레이즌 파르페를 즐기지 못한다."
2841094582 = "작다는 건 불편해!"
149905902 = "슌은 작아진 몸 때문에 매화원 정리에 큰 불편함을 느낀다. 하지만 뒤늦게 도착한 선생님의 도움으로 슌은 매화원 정리를 무사히 마치고, 선생님과 함께 즐거운 시간을 보낸다."
128361082 = "놀이터 안전 점검"
2341039634 = "키보토스 중앙구에 새로 개장한 실내 놀이터에 사전 견학을 간 슌과 선생님. 슌은 안전 점검을 핑계 삼아 작아진 몸으로 여러 가지 놀이기구를 즐긴다."
2891798612 = "비밀 기지"
3254263628 = "어릴 적의 비밀 기지가 있는 공원 놀이터로 선생님을 초대한 슌. 슌은 비밀 기지에서 어릴 적의 자신이 쓴 글을 읽으며 추억에 잠긴다."
4082121735 = "변하는 것, 변하지 않는 것"
2268442326 = "어려진 슌은 오랜만에 좋아하는 머리 모양을 한 채 즐거워한다. 자란 뒤에도 같은 머리를 해도 괜찮지 않느냐는 선생님의 질문에 슌은 나이가 든 뒤에는 부끄러워서 그럴 수가 없다고 답한다. 선생님은 그런 슌에게 조언을 하나 해준다."
3306119972 = "느긋한 대수사선"
1067431467 = "시내에 순찰을 나온 키리노와 선생님은 테러범으로 의심되는 용의자를 쫓던 중에 강도 사건을 저지하게 된다. 소동 끝에 용의자가 갖고 있던 수상한 물건은 폭탄이 아닌 겨된장 절임으로 밝혀진다."
2874205992 = "총성과 지르코니아"
3960259754 = "전문 교섭인보다 한발 먼저 인질극 현장에 도착한 키리노와 선생님. 키리노는 사격으로 범인을 제압하려 하지만 실수로 인질을 맞추고 만다. 의도치 않은 기행이 계속되자 범인은 지레 겁을 먹고 인질을 놓아준다."
3444429399 = "더블 타겟"
301172044 = "사격 시험을 앞두고 실내 사격장에서 사격 연습을 하는 키리노. 하지만 계속해서 범인이 아니라 인질을 맞추고 만다. 결국 키리노는 선생님의 조언에 따라 인질을 직접 조준하는 방식으로 시험을 통과한다."
84381503 = "유치원에 간 경찰"
1057319864 = "유치원 학생들의 견학 안내를 하게 된 키리노. 키리노는 수갑을 사용하는 시연을 하다가 실수로 기둥에 묶여버리고 만다. 키리노는 견학이 엉망이 되었다는 사실에 자책하지만, 유치원 학생들은 키리노의 진심을 알아보고 그녀를 응원해준다."
3316056 = "스케이트 보드를 타는 요령"
3154017608 = "휴일의 약속 장소에 스케이트 보드를 타고 나온 사야는 선생님에게 스케이트 보드의 매력에 대해 잔뜩 이야기한다. 하지만 보드에 익숙지 않았던 선생님은 사야를 따라 스케이트 보드를 타려다 크게 넘어지고 만다."
3491617475 = "천재의 휴일"
2985293516 = "사야는 '커플 전용 치즈 케이크'를 맛보기 위해 네즈스케와 함께 가게를 방문하지만, 점원에게 주문을 거절당하고 만다. 하지만 이 모습을 본 선생님이 사야와 같은 일행이라고 이야기해 준 덕분에 사야는 무사히 케이크를 주문한다."
1858393728 = "사야의 맛있는 식당"
776648188 = "사야는 단골 라멘 가게에 방문했다가 냄새가 많이 나는 신작 라멘을 개선해달라는 요청을 받게 된다. 사야는 라멘에 특제 매운 소스를 첨가해 냄새를 감추고, 이는 매운맛 마니아들 사이에서 큰 인기를 끌어 대성공을 거두게 된다."
2717662380 = "유행의 법칙"
1831782779 = "사야가 개발한 특제 매운 소스는 큰 인기를 끌어 현무상회 전역에서 널리 쓰이게 된다. 하지만 인기가 너무 좋았던 탓에 모든 음식에 매운맛이 가미되자 사야는 화를 내며 소스의 생산을 중단해버린다."
2977660904 = "스케이트보드를 타는 이유"
1522951562 = "공원에서 열리는 행사를 돕기 위해 '나른해지는 향'이 담긴 향수를 개발해 온 사야는 선생님에게 스케이트보드를 타는 이유에 대해 설명한다. 사야는 스케이트보드를 탄 채 공원 곳곳에 향수를 뿌리지만, 향에 취해 나른한 몸을 견디지 못하고 넘어져 버린다."
1753704494 = "도움 요청"
2602091299 = "바니걸 의상을 입을 줄 몰라 고생하던 네루는, 결국 선생님에게 도움을 요청한다."
165180404 = "별 거 아닌 부탁"
3543262161 = "잠입을 위해 익숙지 않은 복장으로 연습하다 발이 까진 네루. 네루가 다쳤다는 말에 선생님은 서둘러 체육관으로 찾아간다."
1674452406 = "주변의 시선"
4250635903 = "복장에 대해 전혀 신경 쓰지 않던 네루는 바니걸 복장을 입은 채로 태연히 등교한다. 주변 학생들의 시선이 쏠리고, 뭔가 이상함을 느낀 네루는 선생님을 부른다."
2462150601 = "생각지 못한 시선"
1600305466 = "잠입 임무 중이던 카린을 도와주러 찾아간 선생님. 하지만 의도치 않았던 광경에 두 사람 모두 당황한다."
2181471164 = "생각지 못한 오해"
2467790110 = "카페에 잠입 중이던 카린과 만난 선생님. 카린과 바니걸 의상에 관해 얘기하던 도중 어째서인지 선생님이 그 옷을 원한다는 오해를 사게 된다."
367799569 = "생각지 못한 결론"
1433841241 = "바니걸 복장에 대한 오해를 풀기 위해 다시 카린과 만난 선생님. 지금까지 눈치채지 못했던 자신의 본심에 대해 알게 된 카린은 즐거워한다."
1141743172 = "심야에 할 일"
221988864 = "야심한 밤 심야의 빨래방 앞에서 아스나와 만난다. 그런데 아스나는 메이드복을 모두 빨아버렸다는 이유로 바니걸 복장을 한 채였다."
814287263 = "토끼의 생태"
3643670542 = "갑자기 토끼의 생태를 알아보겠다며 바니걸 차림으로 나타난 아스나. 아스나는 무리한 부탁들로 선생님을 곤란하게 하다가, 결국 선생님을 도망치게 만든다."
1615861420 = "바니걸의 생태"
2918162060 = "카페 라운지에서 만난 아스나는 바니걸 복장의 의미에 대해 묻는다. 이후 선생님의 대답에 만족한 아스나와 선생님은 커피를 나눠 마신다."
391217910 = "토끼 꼬리 소동"
3144520066 = "바니걸 차림의 아스나와 만난 선생님은 아스나가 꼬리 수류탄의 안전핀으로 보이는 부품을 떨어트리는 것을 목격하게 된다. 선생님은 이를 돌려놓기 위해 아스나를 쫓아가지만, 아스나는 술래잡기를 하는 줄 알고 도망치기 시작한다."
18689073 = "강의명: 로망"
1368636690 = "선생님에게 알 수 없는 메시지를 보내는 나츠. 수제 쿠키를 들고 와서 자신만의 철학에 대해 이야기한다."
479881100 = "강의명: 포용"
4189558159 = "아포가토를 들고 선생님을 찾아온 나츠. 뉴스에서 본 사건들을 이야기하며 들고 온 아포가토에 비유한다. 안타까움을 표하며 선생님에게 속내를 털어놓는다."
2721314425 = "실습명: 발굴"
1566724822 = "선생님을 불러내 함께 '잊힌 과자점'을 찾아 가는 나츠. 숨겨진 장소를 발견해내 감동하던 것도 잠시, 그 장소의 로망을 지키기 위해 이내 못 본 것처럼 다시 빠져나온다."
1618294287 = "쉬는 시간: 매점"
2377126702 = "선생님과 함께 피크닉을 나온 나츠.그간의 일들로 조금은 대화가 통하게 되었다며 즐거워한다. 함께 편안하게 블루베리 파이를 나눠먹는다."
4119434234 = "훌륭한 시스터"
1452376206 = "성당 메시지를 보내다 선생님과 연락이 닿은 마리.신실한 시스터가 되기 위해 노력하는 마리를 놀리던 선생님은 천벌(?)을 받게 된다."
3212708973 = "당신을 위한 기도"
2690251888 = "이전의 일이 마음에 걸렸던 마리는 선생님을 위해 기도한다. 선생님도 농담을 걷어내고 진지하게 마리가 훌륭한 시스터라며 격려해 준다."
2250100664 = "몸이 내린 벌"
3849636343 = "자신의 몸을 돌보지 않던 마리가 몸살에 걸린다. 선생님은 스스로의 몸도 타인의 몸처럼 돌볼 줄 알아야 한다고 타이르고, 마리는 그 말에 안심한다."
4076992554 = "자신이 바라는 것"
3986468370 = "사람 없는 사격장에서 고요히 기도를 올리는 마리. 선생님에게 시스터가 아니라 학생으로서의 고민을 털어놓고 마음이 편안해진다."
2267732676 = "솔직한 마음"
2902570837 = "마리와 선생님은 시스터후드의 비품을 구매하기 위해 쇼핑몰을 찾는다. 마리는 여러 가지 귀여운 액세서리를 보고 강렬한 유혹을 느끼지만, 불필요한 치장과 사치를 삼가야 한다며 애써 참아낸다. 선생님은 그런 마리에게 이미 코사지를 하고 있지 않느냐고 묻는다."
2965761760 = "버추얼 싱어의 비밀"
3588938678 = "버추얼 싱어, 미쿠는 키보토스의 기술력을 빌려 현실의 몸을 얻게 되지만 어찌 된 영문인지 갑자기 노래를 부를 수 없게 된다. 미쿠는 키보토스의 해결사로 소문난 선생님에게 은밀히 도움을 요청한다."
1011014524 = "버추얼 싱어의 고민"
3188134202 = "라이브 공연을 앞두고 미쿠가 노래를 부르지 못하게 되었다는 사실이 관계자들에게 알려진다. 미쿠는 선생님과 여러 가지 방법을 시도해보지만 목소리는 돌아오지 않는다."
3690602347 = "버추얼 싱어의 결심"
391861432 = "미쿠는 결국 라이브 공연을 포기할 각오를 하지만, 자신의 옛날 곡을 듣고 다시 노래를 부를 수 있게 된다. 선생님은 노래가 나오지 않는 문제가 그녀의 진심과 관련된 일이라는 것을 깨닫고 새로운 계획을 세운다."
358973352 = "버추얼 싱어의 무대"
1256619760 = "선생님은 샬레의 권한으로 라이브 공연의 곡을 미쿠의 자작곡으로 바꾼다. 공연 기획자는 갑작스러운 무대 변경을 걱정하지만, 다행스럽게도 공연은 성공적으로 끝난다."
3822667143 = "아무튼 음모예요!"
1052016123 = "선생님을 호출하여 샬레의 수상한 점에 대해 상담하는 아코. 바로 그 샬레 소속인 선생님은 당황하지만, 아코는 그 외에도 선도부를 노리는 불온한 세력은 얼마든지 있다며 흥분한다. 이후 정신을 차린 아코는 황급히 자리를 떠난다."
3731268869 = "아무튼 급한 일이에요!"
3900941619 = "급한 용무가 있다며 선생님을 호출한 아코. 만난 자리에서 온종일 자신에게 일어난 나쁜 일들을 하소연하고 선생님이 위로한다. 기분이 풀린 아코는 정작 급한 용무가 무엇이냐고 묻자 지금까지 말한 이야기가 그것이었다며 싱긋 웃고는 자리를 떠난다."
2871973874 = "아무튼 선생님 탓이에요!"
490128902 = "최근 스트레스가 늘어난 것이 선생님 탓이라고 주장하는 아코. 선생님이 억지라고 항변하자 누구 말이 맞는지 내기로 결정하자고 제안한다. 결국 진 사람이 목줄을 차기로 하고 내기를 한 두 사람의 대결은 선생님의 승리로 끝나며, 아코는 승부에 진 대가로 목줄을 하게 된다."
150871999 = "학생회장의 겨울 휴가"
2718480801 = "겨울 휴가를 즐기기 위해 온천장을 통째로 빌린 체리노는, 휴식의 무료함을 이기지 못하고 선생님에게 탁구 시합을 제안한다."
4282893984 = "푸딩보다 부드러운"
3630181932 = "온천 계란이 푸딩과 같이 맛있다는 소문을 들은 체리노는 급양부의 계란을 모두 가져와 온천수에 삶아버린다. 하지만 막상 온천 계란의 맛을 본 체리노는 그저 삶은 계란이라며 크게 실망한다."
221973324 = "방수 수염"
944686474 = "체리노는 온천욕을 즐길 때 수염이 젖는 것을 방지하기 위해 수염에 기름을 먹이기로 한다. 하지만 냄새가 강한 참기름을 쓰는 바람에 한동안 수염 없는 상태로 지내게 된다."
2691752229 = "우유로 만든 권위"
699204964 = "수염의 위로로 선생님에게 후르츠 밀크를 선물 받은 체리노. 체리노는 우유를 먹고 난 뒤 입가에 생긴 자국이 수염 같다며 기뻐하지만, 너무 많은 우유를 먹은 탓에 배탈이 나고 만다."
3413696609 = "목욕 보좌관"
2914497765 = "체리노의 연락을 받고 온천장을 찾아간 선생님은, 체리노의 목욕용 오리 인형 <러버덕>을 보게 된다. 체리노는 오리 인형이 마음에 들지 않는다며 심술을 내지만, 선생님은 오리 인형과 함께 목욕을 해 볼 것을 제안하고, 체리노는 이를 받아들인다."
3698230489 = "워커홀릭"
1902460226 = "게헨나 인근의 온천장을 방문한 선생님은 우연히 그곳에서 휴양을 즐기고 있던 치나츠와 만나게 된다. 하지만 치나츠는 휴양지에서도 업무를 손에서 놓지 못하고…… 그런 치나츠를 위해 선생님은 서류 작업을 도와준다."
3640094321 = "약선 요법"
2528966174 = "휴양 중인 선생님을 위해 약선차를 준비한 치나츠. 치나츠가 준비한 차를 마시며 선생님은 여유로운 한때를 보낸다."
3450750046 = "답례품"
794685547 = "치나츠는 선도부원들에게 줄 답례품을 사기 위해 온천장의 기념품점을 방문한다. 답례품을 고른 후, 선생님은 평소 건강을 챙겨준 치나츠에게 리본을 선물한다."
1859264697 = "둘 만을 위한 노천탕"
918925541 = "선생님에게 받은 은혜를 갚기 위해 고급 료칸의 숙박권을 선물한 치나츠. 하지만 치나츠의 실수로 개별 시설이 아닌 가족 시설을 이용하게 된다. 선생님과 치나츠는 가족탕에 들어가 온천욕을 즐기며 시간을 보낸다."
3800350579 = "오해와 거짓말"
236937520 = "선생님과 함께 쇼핑을 하던 도중 선생님에 대해 이상한 이야기를 하는 시민들을 보게 된 토모에. 토모에는 특기인 연설로 선생님에 대한 안 좋은 소문들을 불식시키지만, 시민들에게 새로운 오해를 심어주게 된다."
799463473 = "노동은 휴식을 즐긴다"
719836184 = "피로에 지친 선생님을 위해 특제 낮잠 세트를 준비한 토모에. 토모에의 자장가를 들으며 선생님은 낮잠을 푹 즐긴다."
1317246530 = "눈 속의 연설"
284850586 = "정기 순회 연설을 마치고 돌아오던 도중 산속에서 조난을 당한 토모에와 선생님. 좁은 자재 창고 안에서 젖은 옷을 말리던 토모에는, 갑자기 체리노 회장의 치적에 대해 일방적으로 떠들기 시작한다."
2231726565 = "실패한 기록은 말살해야 한다"
3957122344 = "피망을 싫어하는 체리노를 위해 피망으로 과자를 만드는 토모에. 하지만 결과물은 조금 미흡했고, 토모에는 실패한 기록을 말살하기 위해 선생님에게 나누어 준다."
888674982 = "미묘한 거짓말은 실수에 가깝다"
58356917 = "체리노의 선전 영화를 찍는다는 핑계로 선생님을 붉은겨울에 초대한 토모에. 촬영이 끝난 후 선생님은 카메라가 없었다는 사실을 알아차리고, 토모에는 자신의 실수였다며 멋쩍게 둘러댄다."
824872411 = "온천 수행 - 가이세키 요리 편"
523671672 = "온천장 복구에 대비하여 여주인 수행을 하기로 한 노도카. 노도카는 요리 수행에 앞서 선생님에게 가이세키 요리를 준비했다며, 싸구려 과자로 만든 괴식을 내놓는다."
2565382189 = "온천 수행 - 욕탕 정비 편"
3330425173 = "여주인 수행의 일환으로 샬레의 욕탕을 정비한 노도카. 노도카는 선생님을 위해 욕조에 따듯한 물을 받아두려고 하지만 공사로 인해 온수가 나오지 않는다는 사실을 알게 되자 실망한다."
4230538315 = "온천 수행 - 예절 수행 편"
3390509471 = "기품있는 걸음걸이를 익히고자 빙판길 위에서 방석을 들고 걷는 훈련을 하는 노도카. 하지만 너무 무리한 탓에 크게 넘어져 발목을 접질리게 되고, 선생님에게 업혀 샬레로 돌아간다."
608936968 = "온천 수행 - 휴식 편"
3128779278 = "발목을 다친 노도카를 위해 탕치 효과가 좋은 족욕탕을 예약한 선생님. 노도카와 선생님은 족욕을 즐기며 즐거운 시간을 보낸다."
2400865026 = "올해가 가기 전에"
3775606218 = "새해를 앞둔 어느 날, 아루는 [USERNAME] 선생님을 불러 기모노 렌탈 계획을 밝힌다. 그러나 점원의 말재간에 당해내지 못하고, 예상 이상의 지출을 하게 된다."
1207833116 = "조금쯤은, 보여주고픈 모습"
3154422011 = "사업차 디너 파티에 참석해, 사업가로서의 자신의 멋진 모습을 보여주려던 아루. 그러나 뜻대로 잘 흘러가지 않자 패닉에 빠진다. 멋진 모습을 보여주지 못해 낙담하지만, 선생님의 격려에 기운을 낸다."
2296868625 = "당신과 함께 첫걸음을"
672381548 = "새해맞이 행사장에서 아루와 선생님은 새해맞이 인사를 한다. 기모노에 대한 평가를 듣기 두려워하던 아루는 마침내, 선생님에게 기대했던 말을 듣게 된다."
3587591035 = "새해 운세 확인"
4191647869 = "새해맞이 행사장에서 오미쿠지를 흔드는 아루. 그런데 몇 번을 흔들어봐도 연달아 흉한 운세만 뽑아 크게 실망한다. 그러나 선생님이 뽑은 점괘를 보고, 흐뭇하게 미소짓는다."
2459534347 = "선생님을 위한 새해 선물"
1129754769 = "단잠을 자던 선생님에게 무츠키가 찾아와 특별 선물이라며 찬합을 건네주지만, 알고 보니 그건 무츠키의 특제 폭탄이었다. 시간이 되어 폭탄이 터진다고 생각한 순간, 전부 무츠키의 장난이라는 것이 드러나며 선생님은 가슴을 쓸어내린다."
2385954924 = "새해에는 새해다운 일을!"
335158519 = "붐비는 인파를 겨우 뚫고 에마에 소원을 적는 선생님과 무츠키. 그런데 무츠키는 선생님의 에마를 빼앗아 가서 멋대로 소원을 읽어버린다. 선생님은 무츠키가 소원을 적지 않았다는 걸 깨닫고 무츠키의 새해 소원을 대신 적어준다."
2713380999 = "격렬하게 둘이서 하네츠키!"
3857167523 = "무츠키의 부름에 못 이겨 나가게 된 새해맞이 행사장에서 선생님은 무츠키와 하네츠키로 승부를 겨룬다. 결국 무츠키의 독자적인 룰에 따라 패배한 선생님은, 무츠키에게 잔뜩 낙서를 당한 채 함께 산책에 나선다."
470221661 = "아르바이트 공부"
3007775160 = "완벽한 무녀 아르바이트생이 되기 위해 세리카는 선생님에게 상담을 청해온다. 진정한 무녀가 무엇인지 열띤 이야기를 떠드는 선생님. 그러나 이내 그것들이 전부 게임이나 애니메이션의 지식이었다는 걸 안 세리카는 화를 내지만, 즐거운 시간을 보냈다는 걸 깨닫고 얼굴을 붉힌다."
2523978486 = "무녀계의 스페셜리스트"
979203914 = "본격적으로 무녀 아르바이트를 시작한 세리카지만, 일이 잘되지 않는 것 같다며 낙담한다. 그러나 선생님의 격려를 받은 이후부터 세리카는 행사장에서 가장 돋보이는 아르바이트생이 된다."
2340715417 = "조금은 길지도 모르는 휴식"
2269796876 = "약속 시간이 지나도 세리카가 나타나지 않자 선생님은 세리카를 찾기 위해 뛰어다닌다. 그리고 도착한 툇마루에서 선생님은 세리카와 함께 여유로운 시간을 보낸다."
3759928433 = "부드러운 재회"
576523944 = "개인적인 용무를 처리하기 위해 거리로 나온 선생님이지만, 난데없이 여기저기서 폭발이 일어나며 갑작스러운 습격을 당하게 된다. 그걸 피해 도망친 끝에 선생님은 고가도로 위에서 자신을 쫓아온 와카모와 마주친다."
3463568525 = "함께 하는 나 홀로 데이트"
649370719 = "모처럼의 휴일을 맞이해 선생님을 휴식을 취하려고 하지만, 어째서인지 가는 곳마다 이상한 사건에 휘말리게 된다. 나중에서야 그게 전부 와카모가 남몰래 미행을 하며 저지른 짓이었다는 걸 알게 된다."
888544873 = "조금은 일그러진 데이트"
657109644 = "선생님과 데이트를 하게 된 와카모는 자신이 미리 짜둔 데이트 코스로 선생님을 안내한다. 그러나 이런저런 사정이 겹치며 데이트 계획은 완전히 어그러지고야 만다. 와카모는 무척 실망하였지만, 선생님의 위로에 금방 기운을 차린다."
337655417 = "절대로 변치 않는 믿음"
1672717160 = "일이 너무 바빠 약속에 늦어버린 선생님은 와카모에게 사과하지만, 도리어 와카모는 어리둥절해한다. 자신을 절대로 배신하지 않을 선생님이라면 몇 시간, 며칠, 몇 달이라도 기다릴 수 있다는 와카모의 말에 선생님은 조금 식은땀을 흘린다."
4127733603 = "감추고 싶은 것, 그러나 알려졌으면 하는 것."
684934471 = "와카모가 무슨 일을 벌일지 걱정된 선생님은 와카모를 찾아가 하루 동안 자신과 함께 있어 주기를 부탁한다. 갑작스러운 제안에 당황한 와카모는 가면을 쓴 채 도망치고, 선생님은 오해를 해결하기 위해 그녀를 쫓는다."
443018916 = "부상자는 데려갑니다."
4068284168 = "긴박한 전투 상황 속에서 부상자를 운반하다 선생님과 마주친 세나. 게헨나에서는 늘 있는 일이라며 담담하게 설명하던 세나는, 이윽고 부상자를 뺏으러 온 선도부 부원까지 부상자로 만들어 데려가 버린다."
2901484910 = "응급상황"
4226549044 = "몸 상태가 좋지 않음에도 힘든 일정을 소화해야 했던 선생님. 세나는 그런 선생님을 보좌하며 바쁜 하루를 보낸다. 응급처치뿐 아니라, 다양한 면에서 유능했던 세나는 선생님의 일정을 크게 단축시킨다."
948530229 = "히무로 세나"
1708902441 = "세나는 선생님에게 빌려주었던 담요를 돌려받기 위해 약속을 잡는다. 그리고 벚꽃 강변 길에서 만난 세나는 특유의 직설적인 화법으로 선생님을 향한 자신의 감정을 가감 없이 드러낸다."
1699201785 = "비상대기인원"
3298489040 = "비상대기인원으로 늦은 시간까지 잠들지 못하고 있는 세나. 선생님은 그런 세나를 격려하기 위해 찾아가고, 야식을 나눠 먹으며 잠깐의 휴식 시간을 보낸다."
2267997112 = "일일 보안 결산"
837950607 = "샬레의 서버를 점검하던 중에 선생님의 나쁜 보안 습관을 알게 된 치히로. 치히로는 선생님의 보안 습관을 하나하나 검사하며 잔소리를 늘어놓는다."
3713208438 = "최고의 해킹 수법"
4238915657 = "새로운 보안 컨설팅 계약을 체결하기 위해 업무지구 인근의 IT 기업을 방문한 치히로. 선생님의 도움을 받아 치히로는 까다로운 사장으로부터 계약을 따내는 데 성공한다."
520601278 = "메인터넌스"
3844936871 = "선생님과 치히로는 담당 데이터센터에서 늦은밤까지 서버 점검을 진행하고 돌아온다. 돌아오는 길에 치히로는 자신이 좋아하는 장소가 있다며 음료수 자판기 앞으로 선생님을 데려간다."
434697728 = "블랙 앤 화이트"
1764792485 = "어느 무례한 사장으로부터 보안 점검 의뢰를 맡게 된 치히로. 치히로는 점검을 하던 도중 서버에서 수상한 출처의 데이터를 발견한다. 치히로는 보안담당자의 의무와 양심 사이에서 고민하지만, 결국 부정한 사업가를 폭로하기로 마음먹는다."
1910728491 = "게으른 경찰의 발명품"
3560375484 = "근무 중 낮잠을 자고 싶었던 후부키는 자동응답기를 설치해 민원 응대를 대신하게 만든다. 몇 차례의 응대는 성공적으로 넘어가지만, 조악한 알고리즘 탓에 결국 꾀를 부린 사실이 들통나고 만다."
1170334966 = "게으른 경찰의 순찰"
2139982306 = "지난번의 실수로 주말 순찰 업무를 맡게 된 후부키. 순찰 중 후부키는 우연히 불량 학생들과 마주치지만, 귀찮음 때문에 학생들을 의심하지 않고 돌아가려 한다. 하지만 불량 학생들은 오히려 그 처우에 감동하며 후부키를 계속 귀찮게 만든다."
1238659725 = "게으른 경찰의 잠복근무"
1704488465 = "모처럼의 야외 근무에 자원한 후부키. 선생님은 그런 후부키를 수상히 여기는데…… 아니나 다를까, 후부키는 잠복근무를 핑계로 볕이 잘 드는 야외에서 도넛을 먹으며 게으름을 부린다."
975406302 = "게으른 경찰의 친절"
549498692 = "어느 소녀로부터 잃어버린 머리핀을 찾아달라는 부탁을 받은 후부키. 후부키는 평소처럼 귀찮아하며 신경 쓰지 않는 척하지만, 남몰래 머리핀을 찾다가 그 모습을 선생님에게 들키고 만다."
327110961 = "아침이에요. 일어나세요."
3796601530 = "바쁜 업무로 인해 늦잠을 자버린 [USERNAME] 선생님을 깨우러 온 미모리, 미모리는 선생님을 위해 요조숙녀 지망생으로서 완벽한 아침을 준비한다."
3321521936 = "신부수행 Ⅰ : 가정요리 편"
1981885852 = "요조숙녀가 되기 위한 수행의 일환으로 가정요리를 연습하고 싶다고 말한 미모리. [USERNAME] 선생님과 함께 요리를 연습하며 조금 실패하기도 하지만, 그래도 미모리는 무사히 선생님에게 자기가 만든 가정요리를 대접해준다."
4146994927 = "신부수행 Ⅱ : 청소 편"
1361337265 = "미모리는 요조숙녀가 되기 위한 수행의 일환으로 이번엔 [USERNAME] 선생님과 함께 청소 연습을 시작한다. 미모리는 요조숙녀로서 갈고 닦은 청소 스킬을 마음껏 뽐내며 선생님과 즐거운 시간을 보낸다."
2432518592 = "마음을 담아 수놓는 자수"
4002112709 = "누군가에게 줄 선물을 사고 싶다며 미모리는 [USERNAME] 선생님과 함께 쇼핑에 나선다. 많은 고민 끝에 미모리가 택한 건 손수건. 미모리는 마음을 담아 자기가 직접 자수를 수놓은 손수건을 선생님께 선물한다."
4023636786 = "요조숙녀의 진심"
4253217632 = "요리 수행의 성과를 보여주고자 선생님을 수행부로 초대한 미모리는 엉망진창이 되어버린 조리실을 청소하기 위해 자신이 소중히 여기던 앞치마를 꺼낸다. 청소가 끝난 후, 선생님에게 과자를 대접하며 미모리는 자신의 앞치마에 대한 이야기를 들려준다."
2653666458 = "고서관의 주인"
407306471 = "다른 사람들과 잘 어울리지 못한 채 고서관에만 틀어박혀 사는 우이. 하지만 선생님에게는 하소연도 하고 책도 권하는 등 조금씩 마음을 열어주기 시작한다."
1710419489 = "실종된 아이 찾기"
3020671650 = "분실된 책을 찾기 위해 선생님에게 연락한 우이. 하지만 특유의 말투 탓에 책이 아니라 사람이 실종된 것 같은 오해를 부르고 만다. 자초지종을 듣게 된 선생님은 같이 책을 찾아준다."
2628285155 = "갑작스러운 제안"
1721570820 = "우이는 선생님과의 대화량을 늘리고 싶은 마음에 펜팔을 요청한다. 하지만 우이가 가져온 노트는 너무 커서 펜팔 책으로 사용하기에 부적절했고, 대신 선생님은 도서관의 방명록으로 노트를 사용하자고 제안한다."
4161300230 = "이름 없는 번역가"
1304365797 = "피곤함에 드링크를 부탁한 우이. 선생님은 남들이 읽지 못하는 고서를 번역 중이었던 우이를 격려해준 뒤 우이가 잠들자 돌아간다."
1272486088 = "성당의 관리자"
2112303416 = "성당 관리자로서 성실하게 직무를 수행하고 있던 히나타. 선생님은 그런 히나타를 도와주려 하지만, 오히려 이상한 오해를 받는다."
3466205653 = "과유불급"
903624085 = "몸이 좋지 않음에도 쉬지 않고 무리하게 일을 하고 있던 히나타. 선생님은 히나타를 잘 설득해 쉬도록 만들지만, 이번에도 이상한 오해만 받게 된다."
114552415 = "수풀 속에서"
1527438767 = "우연히 성당의 금지된 장소로 들어가게 된 선생님. 청소 중이었던 히나타는 선생님을 숨겨주고, 이번에는 히나타가 대신 오해를 받게 된다."
4143765441 = "피크닉 가방"
3753682808 = "모처럼 업무가 없는 날의 히나타는 선생님과 조촐한 피크닉 약속을 잡는다. 두 사람은 강변에서 즐거운 담소를 나눈다."
709626164 = "피크닉 보자기"
1140812726 = "선생님과의 만남에 들뜬 히나타는 자신이 열심히 준비한 피크닉 도시락을 꺼낸다. 그런데 가방에는 도시락 대신 성당의 물품을 관리하는 <물품관리대장>이 들어있었다. 히나타는 당황하지만 선생님은 히나타를 다독이고 따로 준비한 피크닉 도시락을 꺼내 히나타와 피크닉을 즐긴다."
2874669650 = "보안위원장의 심문"
1738744695 = "급양부의 푸딩이 사라지는 현상을 조사하던 마리나는 용의자로 선생님을 지목하고 심문을 시작한다. 하지만 허술한 계획 탓에 끝내는 스스로를 범인으로 지목하게 된다. "
3135302426 = "보안위원장의 추리"
690185550 = "전의 사건을 계속해서 추리하던 마리나는 외진 창고에서 푸딩을 훔쳐간 고양이와 마주치게 된다. 마리나는 자신에게 달려드는 고양이가 무서워 총을 난사하다 체리노 회장의 석상을 깨트리게 된다."
2102177857 = "보안위원장의 청소"
794361453 = "체리노 회장의 석상을 부순 벌로 화장실 청소를 하게 된 마리나. 마리나는 불평을 하면서도 완벽한 솜씨로 화장실 청소를 마친다."
4222369533 = "보안위원장의 오해"
1309897125 = "붉은겨울 외곽 보안 초소에서 자신의 얼굴을 모르는 보안위원에게 위원장 사칭범으로 오인되어 붙잡힌 마리나. 선생님의 도움으로 곧 풀려나지만 마리나는 한동안 의기소침한다."
263371351 = "SRT, 돌입합니다!"
1824415151 = "수상한 어른이 있는 사무실에 여학생들이 드나든다는 신고를 받고 샬레에 출동한 미야코. 선생님의 설명 덕분에 다행히도 오해는 풀리지만, 수색 과정 중에 선생님이 숨겨두었던 수상한 책이 들통나 버린다. "
2083034072 = "SRT, 구출합니다!"
608640286 = "시내에서 펫 숍의 토끼를 유심히 지켜보는 미야코를 발견한 선생님. 선생님은 미야코가 토끼를 기르고 싶어 한다는 사실을 눈치채고 미야코에게 토끼를 선물해준다."
1182641974 = "SRT, 보호합니다!"
2986991819 = "미야코와 선생님이 공원에서 깡총이를 돌보며 토끼의 생태에 관한 이야기를 나눈다."
3552637652 = "SRT, 강하합니다!"
47734010 = "미야코의 고공 강하 임무에 동행하게 된 선생님. 아름다운 도시의 야경을 보며 미야코는 숨겨두었던 본심을 솔직히 털어놓는다."
4216668975 = "SRT, 휴식합니다!"
2500254733 = "갑자기 모모톡 연락이 끊긴 미야코가 걱정되어 공원을 찾아온 선생님. 미야코는 아무 일도 없었지만, 선생님과 함께 볕을 즐기고 싶어져서 연락을 했노라고 답한다."
392509450 = "SRT, 추억합니다."
2026533413 = "샬레에서 밀린 빨래를 세탁하던 중 미야코는 우연히 낡은 명찰 하나를 떨어트린다. 이를 주운 선생님은 미야코로부터 이 명찰에 얽힌 추억을 듣게 된다."
1943391112 = "북풍과 태양"
1484545006 = "어느 무더운 날, 당번 활동 중에도 고집스럽게 철모를 벗지 않는 사키를 두고 선생님은 철모를 벗기기 위해 여러 가지 시도를 한다. 하지만 어떤 유혹과 위협에도 사키는 철모를 벗지 않는데…… 하지만 선생님의 시도가 무색하게도 사키는 근무 시간이 끝나자마자 자연스레 철모를 벗는다."
3937121232 = "길 잃은 토끼"
2072678078 = "SRT대원들의 식사에 보탤 산나물을 캐러 교외의 산에 들른 사키와 선생님. 하지만 너무 산 깊숙이 들어간 탓에 두 사람은 길을 잃고 만다. 사키는 SRT 학원에서 배운 독도법을 사용하여 탈출을 시도하지만, 실패하고 만다."
537552521 = "근검절약"
3736593165 = "벼룩시장에서 낡은 박격포를 구해온 사키. 사키는 야전삽과 박격포, 두 가지 용도로 사용할 수 있는 혁신적인 물건이라며 박격포를 공들여 정비하지만, 사용해보니 실용성 없는 물건이었음이 밝혀진다."
4158890334 = "준비만전"
2568213059 = "버려진 야영 물자를 주우러 산에 올라간 사키와 선생님. 하지만 산행에 익숙지 않았던 선생님은 금세 지쳐 버리고, 사키는 그런 선생님을 위해 자신이 사용하던 어깨 패드를 건네준다."
4041452924 = "토끼와 병기서"
2079813724 = "선생님은 사키와 함께 소중한 교과서를 읽는다."
3019246166 = "RABBIT 4, 은신합니다."
636667611 = "캠핑용품을 사기 위해 시내의 상점가를 방문한 미유와 선생님. 하지만 미유는 존재감이 없는 체질 때문에 계속해서 시민들에게 무시를 당하거나 곤란한 일을 겪는다. 미유는 존재감이 적어서 득이 된 경험은 없다며 우울해하지만, 그 체질 덕분에 사납지만 귀여운 고양이를 쓰다듬는 데 성공한다."
332535311 = "RABBIT 4, 출동합니다."
291507910 = "일에 집중하느라 미유가 다가오는 걸 알아차리지 못한 선생님. 미유는 자신의 존재감이 더욱 희미해졌다고 생각해 걱정을 하고, 그런 미유를 위해 선생님은 소리 나는 물건을 몸에 지니고 다니라는 조언을 한다. 하지만 이 말을 오해한 미유가 애완동물용 방울 목걸이를 착용하는 바람에 선생님은 새로운 오해를 사게 된다."
810612864 = "RABBIT 4, 저격합니다."
716720190 = "미유는 소대 내에서의 실수를 만회하기 위해 산 중턱의 폐가에서 선생님과 함께 저격 훈련을 한다. 선생님이 표적지를 설치하고 오는 동안 온갖 산짐승들이 미유의 주변을 둘러싸지만, 저격에 집중하던 미유는 선생님이 장난을 치는 줄 알고 곤란해한다."
485476395 = "RABBIT 4, 휴식합니다."
751297374 = "어느 휴일, 선생님은 공원 근처의 산책로에서 돌을 고르는 미유를 발견한다. 미유는 자신처럼 평범한 느낌의 돌을 고르는 게 취미라며, 선생님에게 함께 돌을 고르자고 권한다. 이후 미유는 선생님과 함께 조약돌을 고르며 즐거운 시간을 보낸다."
376395967 = "RABBIT 4, 추억합니다."
652033454 = "까마귀를 포획하려는 미유와 함께 빌딩의 옥상에 있던 선생님은 시간이 지나면서 추위에 떨기 시작한다. 미유는 그런 선생님에게, 다른 SRT 대원들이 준비해준 따뜻한 코코아를 내민다."
1540090706 = "수행부의 마스코트!"
181569107 = "평소 수행부가 괴짜 취급받는 것이 불만이라며, 인식을 바꿀 활동을 해야 한다고 주장하는 카에데.그런 카에데와 여러 활동을 함께 하는 사이, 선생님은 왜 수행부가 그런 말을 듣고 있는지 어렴풋이 알게 된다."
258942768 = "멋진 레이디가 되고 싶어!"
3935689214 = "멋진 레이디는 절대로 당황하지 않는 법이라며, 카에데는 어디 한번 선생님에게 자신을 당황하게 만들어 보라고 말한다. 선생님의 각종 시도 앞에서 애써 당황하지 않은 척하는 카에데였지만, 끝내 히어로 쇼의 예매 앞에서 카에데는 잔뜩 당황하는 모습을 보여주고야 만다."
1209493139 = "어른이 되고 싶은 이유"
2992466081 = "선생님 앞에서 어른스러운 모습을 보여주려던 끝에 카에데는 대형 사고를 치고야 만다. 울먹이는 카에데에게 너무 조급하게 생각지 말고 천천히 나아가면 된다고 조언해 주는 선생님의 말에, 카에데는 곧바로 기운을 차린다."
1603342232 = "이윽고 소녀는 멋진 레이디가 된다."
1457617705 = "무시퀸 한정판 카드를 사기 위해 매장을 찾은 카에데. 그러나 멀리서 찾아온 사람을 위해 카에데는 물건을 양보한다. 바로 그때 나타난 업계 관계자는 카에데를 칭찬하며 카드를 선물해 준다. 그렇게 받은 선물로 카에데는 선생님과 함께 무시퀸 게임을 즐긴다."
1257661108 = "최초의 추억"
302074546 = "무시퀸 한정판 카드 프로텍터를 구하기 위해 카에데와 함께 팝업 스토어를 방문한 선생님. 카에데는 선생님에게 자신이 아끼는 카드 프로텍터를 보여주며, 자신이 무시퀸을 좋아하게 된 계기에 대해 말한다."
945039977 = "습격해오는 프로일라인"
2033857445 = "만마전의 명을 받아 선생님을 꼬드기기 위해 찾아왔다는 이로하. 하지만 선생님이 이로하의 제안에 응해주지 않자, 그럼 그걸로 괜찮다며 이로하는 샬레의 소파에 누워 땡땡이를 치며 독서를 시작한다."
3918415703 = "유혹하는 프로일라인"
2282933521 = "땡땡이를 치자고 이로하는 선생님을 유혹하지만, 꿈쩍도 하지 않는 선생님에게 결국 이로하는 포기하고 밥이나 먹으러 가자고 제안한다. 그것을 선생님이 받아들인 순간, 이로하는 선생님을 꾀어내는 데 성공했다며 승리의 미소를 짓는다."
3810393676 = "때로는 영악한 프로일라인"
1746326246 = "이로하가 선생님에게 업무의 일환으로 쇼핑을 가자고 제안한다. 그러나 이로하가 구매한 건 간식이나 장난감 같은 물건들이었다. 이게 어찌 된 일인지 묻자, 전부 선생님을 한숨 돌리게 해주려고 꾸민 일이라고 이로하는 순순히 자백하며, 돌아가면 일을 도와주겠다고 웃으며 말한다."
3329845713 = "가끔은 미소 짓는 프로일라인"
3228138921 = "평소와 달리 이로하가 샬레에 찾아오지 않자, 걱정이 된 선생님은 만마전을 찾는다. 그곳에서 선생님은 전차장 업무로 바쁜 이로하와 만난다. 자신이 걱정되어 찾아왔다는 선생님의 말에 이로하는 슬며시 미소 지으며 선생님을 자신의 아지트로 안내한다."
4280952109 = "닌자 소녀는 까다로워"
3933870946 = "미치루는 자신이 운영하는 동영상 채널에서 다룰 콘텐츠 소재를 찾기 위해 선생님을 찾아온다. 그렇게 선생님과 대화를 하던 도중 버튼이 눌린 미치루는 닌자란 어떠한 것인지 선생님 앞에서 진지한 설명을 시작한다."
3951006407 = "닌자 소녀는 멈추지 않아"
3104593350 = "선생님을 찾아온 미치루는 최근 동영상 채널 사이트에서 조회수가 잘 나오기로 유명한 종류의 콘텐츠를 이야기하고는, 함께 그것을 찍자며 선생님을 데리고 밖으로 나선다."
4128417300 = "닌자 소녀는 숨기지 않아"
947593483 = "선생님과 함께 닌자 굿즈 가게를 찾은 미치루는 마침 닌자를 바보 취급하는 문제아들과 마주치고야 만다. 처음엔 무서워하는 미치루였지만, 이어 선을 넘는 문제아들의 태도에 결국 닌자를 좋아하는 팬으로서, 미치루는 문제아들을 쓰러트린다."
3245340691 = "닌자 소녀는 빛나고 싶어!"
1828893364 = "미치루는 새롭고 멋진 닌자 콘텐츠를 찍기 위해, 함께 공원에 모여 자신이 구상해낸 최고로 멋진 인법을 선생님 앞에서 보여준다."
3894779452 = "닌자 소녀는 기억되고 싶어!"
2435971928 = "미치루는 상점가로 선생님을 불러낸 뒤, 자신이 소중히 여기는 비디오 테이프를 보여준다. 상점가로 온 이유는 다름 아닌 이 비디오 테이프의 내용물을 백업하기 위해서였다. 하지만 업체에서는 백업 불가 판정을 내리고, 이후 돌아오는 길에 미치루는 이 테이프에 얽힌 이야기를 해주는데……. "
650560128 = "어, 어엿한 닌자가 되고 싶어요!"
2949122187 = "어엿한 닌자가 되기 위해, 무엇을 하면 좋을지 상담을 청해온 츠쿠요에게 선생님은 자신이 제일 잘할 수 있는 걸 연습하는 게 어떻겠느냐고 이야기한다. 그 말에 츠쿠요는 제일 자신 있어 하는 나무 변장술을 보여주어 선생님을 깜짝 놀라게 만든다."
251220476 = "커, 커다란 게 나쁜 것만은 아니네요."
3420245975 = "자신의 커다란 체구에 대한 콤플렉스를 이야기해 주는 츠쿠요지만, 선생님은 그런 츠쿠요이기에 남들에겐 보이지 않는 게 보일지도 모른다고 말해준다. 그때 마침 츠쿠요는 미아가 된 아이를 발견해 도와주고는 자신의 커다란 키가 나쁜 것만은 아니라는 걸 깨닫는다."
782301528 = "저, 훌륭한 쿠노이치가 될 수 있을까요?!"
2486610304 = "츠쿠요는 쿠노이치라는 훌륭한 닌자가 될 수 있는 책을 발견했다며, 그 책의 내용을 선생님과 함께 시험해 보게 된다. 잠시 후 책에 쓰인 내용이 평범하지 않은 내용이란 걸 깨달은 츠쿠요는 당황하며 선생님 앞에서 도망치고야 만다."
2449832284 = "니, 닌자로서 활약할 기회예요!"
2775750975 = "강아지를 잃어버린 소녀와 마주친 선생님과 츠쿠요는 그간 단련해온 닌자의 능력을 활용해 강아지를 찾아주겠다고 약속한다. 머지않아 무사히 강아지를 찾는 데는 성공했지만, 하필 그때 츠쿠요는 벽에 끼이는 곤경에 처하고야 만다."
393436108 = "육체의 감옥"
445636691 = "어딘가 위태로워 보이는 미사키를 쫓아 고층빌딩의 옥상에 간 선생님. 하지만 미사키는 선생님의 관심에 별다른 반응을 보이지 않고, 두 사람은 엘리베이터를 타고 지상으로 내려온다. 하지만 내려오던 도중 갑자기 엘리베이터가 멈춰버리고, 고장 난 엘리베이터 안에서 미사키는 폐소 공포증이 있다며 당황한 모습을 보인다."
2021138019 = "통제 밖의 육체"
2328210988 = "바람을 쐬러 강변에 나온 미사키와 선생님. 선생님은 미사키가 어째서 산책 중에도 계속 마스크를 쓰고 있는지 궁금해한다. 미사키가 꽃가루 알레르기가 있다고 답을 하려던 순간, 갑자기 재채기가 터져 나오고, 선생님은 미사키에게 손수건을 빌려준다. "
275908656 = "씻기지 않는 것들"
3575999017 = "컨디션이 나쁜 상태에서 비를 맞은 탓에 독한 감기에 걸린 미사키. 선생님은 근처의 오피스를 빌려 미사키를 쉬게 한 뒤 간호를 한다. 선생님이 업무를 위해 잠시 떠난 사이, 미사키는 자신의 나약한 육체를 비관하며 고독에 잠긴다."
495675616 = "손때 묻은 추억"
4070608128 = "길을 걷다가 가방을 잃어버려 곤란해하는 미사키를 만난 선생님. 선생님은 미사키와 함께 가방을 찾는 데 성공하고, 함께 있던 나무 인형을 발견한다."
4128473246 = "소녀는 그래도 읽고 싶다"
2241310795 = "무법지구의 전봇대에서 몰래 전기를 훔치고 있던 히요리를 발견한 선생님. 히요리는 전기를 훔치게 된 경위를 설명하며 자신의 인생을 비관하기 시작한다. 선생님은 히요리에게 휴대용 배터리를 선물하며 앞으로는 전봇대에 올라가지 말라고 한다."
1210605930 = "소녀는 그래도 포기하지 않는다 "
3115826030 = "폐지 수거함에서 좋아하는 패션 잡지를 발견하고 즐거워하는 히요리. 하지만 히요리는 곧 다시 자신의 처지를 비관하며 어두운 이야기를 늘어놓는다."
1808891171 = "소녀는 그래도 알고 싶다 "
2121001156 = "버려진 건물에서 수돗물을 마시고 배탈이 난 히요리. 선생님은 히요리를 병원으로 데려가 상태를 살핀다. 상태가 회복된 히요리는 선생님이 가져온 최신 잡지에서 인기 있는 배꼽에 관한 기사를 읽고 선생님에게 배를 보여주며 자신을 비관하기 시작한다."
3481010754 = "폐허 속의 공주님"
406981505 = "방치된 학교 폐건물에서 대기 중이던 아츠코는 무료한 시간을 달래기 위해 선생님을 불러 함께 학교 놀이를 한다."
2090305712 = "한밤중의 학원"
3848876286 = "한밤중의 학교에서 전에 하지 못했던 학교 놀이를 이어가는 아츠코. 아츠코는 선생님과 함께 평범한 학교의 일상을 탐방하다 갑자기 나타난 경비를 피해 도망친다."
835240471 = "거리의 화원"
3161846637 = "선생님은 아츠코가 꽃을 좋아한다는 것을 알고 꽃다발을 선물한다. 아츠코는 갑작스러운 선물에 기뻐하며, 선생님에게 자신이 가꾼 화단을 보여준다."
1871057734 = "지금보다 더 많이"
4152512206 = "심한 폭우가 내린 뒤, 아츠코가 가꾼 화단의 들꽃이 모두 죽어버린다. 선생님은 상심한 아츠코를 위로하며 함께 꽃을 기르는 법을 배우자고 제안한다."
3907252919 = "그저 당신을 위한 마음에"
2694524553 = "여름이 되었는데도 여전히 샬레의 사무실을 벗어나지 못하는 선생님에게 직접 여름의 추억을 선물하고자 찾아온 와카모. 선생님은 와카모가 준비한 여러 여름 이벤트가 바로 엄청난 사건으로 이어질 것을 감지한다. 그래서 대신에 와카모에게 여름의 추억이 될 수 있는 일을 직접 제안하기로 한다."
3209742349 = "그저 약속을 지키고 싶단 마음에"
3701725789 = "여름의 추억을 쌓고자 하는 와카모의 계획에 어울려주는 선생님이지만, 갑작스러운 샬레의 업무로 인해 자리를 비우게 된다. 이에 데이트를 방해받았다는 생각에 와카모가 날뛰기 시작하는데…. 선생님은 그런 와카모를 크게 혼낸다."
239637834 = "모닥불 곁에서 어른거리는 마음에"
1035672286 = "와카모는 선생님과의 약속을 지키기 위해 거센 비바람 속에서 하염없이 선생님을 기다린다. 한편 선생님은 저번 난동과 이번 일까지 전부가 자신의 약속 때문이었다는 걸 알고, 비바람을 뚫고 와카모를 만나러 간다. 몸이 차가워진 와카모를 위해 함께 모닥불에 앉아 와카모의 이야기를 들어준다."
850282751 = "새겨진 것은 순정"
765356607 = "와카모는 선생님과 함께 해변을 걸으며 자신의 마음을 솔직하게 이야기한다. 양산 아래에 새기고 싶은, 선생님을 향한 순수한 마음을."
4061302182 = "가끔은 이런 날도"
54589100 = "여름 바다를 만나 잔뜩 신이 난 노노미. 평소에 늘 다른 사람부터 챙기던 노노미를 위해, 이번에는 선생님이 노노미를 챙겨준다."
1859398185 = "코코넛 채취 도전"
3014898155 = "코코넛을 채취하겠다며 미니건으로 벌목을 해대던 노노미. 선생님은 좀 더 평범한 방법을 권하지만 오히려 생각지도 않던 이벤트가 발생한다."
2542756039 = "모래 위의 별들"
3336596639 = "늦은 밤, 잠이 오지 않던 노노미는 산책을 하다 선생님과 마주친다. 둘은 별빛이 빛나는 해변으로 향한다."
4024412057 = "논다는 것의 의미"
1633675291 = "놀기 위해 무인도로 왔지만 그 와중에도 창고를 뒤지고 있던 아야네. 선생님은 그런 아야네가 스스로의 모습에 실망하지 않도록 어울려준다."
549604868 = "이불 속의 아야네"
4017885026 = "휴양지라 평소와 달리 늦잠을 자고 있던 아야네. 깨우러 간 선생님을 세리카와 착각하는 등, 아야네는 의도치 않게 무방비한 모습을 보여준다."
1876616731 = "조급했던 이유"
2850828647 = "조급한 마음을 버리지 못하고 혼자서 헬기를 수리하던 아야네는 결국 탈진해 쓰러진다. 선생님은 아야네에게 컨디션 관리가 중요하다고 잘 타이른 뒤, 이후 헬기 수리를 도와주고 아야네의 기념사진을 찍어준다."
979430574 = "숨겨진 섬의 보물"
3579191394 = "호시노는 이전에 리조트에 묵었던 누군가가 명소를 체크해 둔 가이드 맵을 보며, 자신만의 안락한 휴식 장소를 찾는다. 마침내 선생님과 함께 좋은 포인트를 찾아낸 호시노는, 그곳에서 안락하게 낮잠을 즐긴다."
117700283 = "산지 직송의 신선한 재료"
2728239546 = "호시노의 도움 요청을 받고 해변가로 나온 선생님은 호시노와 함께 해산물을 채취한다. 그러나 선생님의 도움으로 너무 많은 양의 해산물을 채취하는 바람에, 해산물 채취가 고정 일과가 되었다며 호시노는 뒤늦게 하소연한다."
3326990624 = "그 속을 직접 볼 순 없지만"
2625437651 = "선생님은 우연히 해변에서 바다를 바라보고 있던 호시노와 만난다. 바다의 풍경에 감탄하는 호시노의 시야에 수면을 박차며 뛰어오르는 물고기 떼의 모습이 들어온다. 호시노는 즐거워하며 언젠가는 선생님과 함께 고래가 뛰는 모습도 보고 싶다고 말한다."
2766807234 = "보셨죠? 저 성공했어요!"
739359557 = "갑작스레 선생님을 불러낸 시즈코는 자신의 백야당 프랜차이즈화 사업이 얼마나 성공 가도를 달리고 있는지 신이 나서 설명한다. 그러나 시즈코가 어딘가 내몰려 있다는 인상을 받은 선생님은 오히려 그녀를 걱정해 주고, 예상 밖의 반응에 당황한 시즈코는 도망치고 만다."
1341349068 = "그런데…… 무엇을 위해서였죠?"
2467605046 = "어째서인지 풀이 죽어 있는 시즈코에게 선생님이 상담을 해 준다. 시즈코는 프랜차이즈 사업의 성공에 너무 몰두한 나머지, 자신이 원래 추구했던 가치- 손님들의 미소를 잊고 있었다. 시즈코는 뒤늦게 이 사실을 깨닫고 마음을 다잡는다."
1344506803 = "저는 엄~청난 욕심꾸러기니까요!"
3607288038 = "다시 기운을 되찾은 시즈코에게 불려 나온 선생님. 시즈코는 선생님에게 감사를 표하며, 자신의 새로운 야망과 꿈을 당당하게 이야기한다. "
32910525 = "이즈나와 함께 수박 깨기!"
1822618449 = "이즈나의 요청으로 해변에 나온 선생님은, 이즈나와 함께 수행이라는 이름의 수박 깨기를 한다. 이즈나는 수박 깨는 데 계속해서 실패하지만, 그래도 수행이 끝난 뒤에는 선생님과 함께 수박을 맛있게 나누어 먹는다."
3631402519 = "이즈나와 함께 모래 장난!"
1116374148 = "또다시 수행을 핑계로 모래성 만들기에 몰두하는 이즈나와 선생님. 생각보다 높은 난이도에 이즈나는 당황하지만, 그래도 포기하지 않고 선생님과 함께 모래성을 완성한다."
605429618 = "이즈나와 함께 위기탈출!"
3019377752 = "어느 무더운 날. 이즈나는 선생님과 함께 수행을 핑계로 모래찜질을 시도한다. 하지만 모래 속이 너무 아늑했던 나머지 이즈나는 그대로 잠이 들어 버리고 만다."
3379580703 = "이즈나와 함께 손을 잡고서"
1012117113 = "선생님은 이즈나가 수영 하기를 피한다는 것을 알아차리고, 그 이유를 물어본다. 이즈나는 자신이 수영을 못하는 닌자라는 걸 주군이 알게 되면 실망할까 봐 그랬다고 답하지만, 선생님은 그렇지 않다며 이즈나와 함께 수영 연습을 한다."
1530413232 = "반짝임을 찾고 싶어"
340837813 = "갑작스럽게 치세의 호출을 받고 바다로 나온 선생님. 치세는 두서없이 반짝임을 찾으러 가야 한다고 이야기하고, 선생님은 어리둥절해하면서도 치세와 함께 반짝임을 찾아 떠난다. 마침내 치세가 찾아낸 반짝임은, 바로……"
416881010 = "당신에게 보여주고 싶은 것"
4275087180 = "치세가 갑자기 보여주고 싶은 것이 있다며 선생님을 불러낸다. 꽤 멀리까지 치세와 함께 걸어 나온 선생님은 엄청난 수의 거북이 떼와 마주하게 된다. "
3101350732 = "실은, 반짝임이 있던 곳은"
2121093664 = "치세는 바닷가에서 주운 <행운의 편지> 때문에 불행이 찾아올까 봐 선생님과 거리를 두려 하지만, 선생님은 그 편지의 내용이 거짓말이라는 것을 증명하기 위해 3일간 치세와 같이 시간을 보낸다."
1812069520 = "추억의 보물상자"
3667309469 = "바닷가로 향한 선생님은 모래를 열정적으로 주워 담는 치세를 발견한다. 치세는 모래와 함께 담은 추억의 물건들을 선생님에게 보여준다."
3499466219 = "홀로 서기"
1404779164 = "사오리의 연락을 받고 블랙마켓을 찾아간 선생님. 신원 보증이 되지 않아 은행에서 통장 개설을 할 수 없었던 사오리에게 선생님은 흔쾌히 신원 보증인이 되어 준다."
1353600712 = "실수"
2747481849 = "사오리가 걱정되어 다시 블랙마켓을 찾아간 선생님. 사오리는 계약서를 쓰지 않고 일을 한 탓에 급여를 받을 수 없어 난처해하고 있었다."
1647392473 = "자책"
18924281 = "이번에는 제대로 계약서를 쓰고 일을 하게 된 사오리. 그런데 그 일의 내용이란 사오리 혼자서 적대 조직 전체를 상대하는 것이었다. 그 결과 사오리는 부상을 입게 되고, 선생님은 그런 사오리를 돌봐준다."
4249397029 = "헛되지 않음의 증거"
3781866017 = "마스크가 망가졌다. 오랫동안 함께한 동료를 버릴 순 없었던 사오리. 선생님과 함께 마스크를 수리한다."
2097037032 = "Collateral Damage"
1238978732 = "선생님의 요청으로 좀도둑 검거를 돕게 된 모에. 모에는 열추적 드론을 활용하여 범인을 체포하는 데 성공하지만, 마지막에 충동을 참지 못하고 미사일을 발사해 거리를 엉망으로 만들고 만다. 상황이 정리된 후 모에는 자신의 선택으로 일을 망쳐버리는 것에 묘한 카타르시스를 느낀다며 자신의 취향을 고백한다."
3925224064 = "Missing in Action"
3963871333 = "갑작스러운 합선으로 샬레의 데이터를 날려버린 선생님. 다행히 행정 업무 능력이 뛰어난 모에가 도와준 덕분에 날려버린 데이터를 빠르게 복구하는 데 성공한다. 하지만 '긴급 포맷 버튼'을 발견한 모에는 충동을 참지 못하여 버튼을 눌러버리고, 다시 상황은 원상태로 돌아가고 만다."
3909715798 = "Unexploded Ordnance"
3002018408 = "당번 업무를 위해 샬레에 방문한 모에. 선생님은 모에에게 아무것도 만지지 말라 당부하고 외출에 나선다. 하지만 모에는 책상 근처에서 커다란 붉은색 버튼을 발견하고 바로 그 버튼을 누른다. 하지만 그 버튼은 비상 샤워기 작동 버튼이었고, 모에는 쏟아져 내린 물에 흠뻑 젖어버리고 만다."
1642348824 = "Phase Line"
1120991900 = "모에의 요청으로 물자 정리를 도우러 코우사기 공원에 방문한 선생님. 평소와 달리 모에는 폭발물을 앞에 두고도 냉정함을 유지한다. 선생님이 모에에게 평소와 다른 것 같다며 이유를 묻자 모에는 마음속에 담아두었던 말을 꺼낸다."
1230115544 = "보충수업과 디저트"
3289098080 = "카즈사의 요청을 받아 카페로 향하는 선생님. 카즈사는 선생님에게 보충 시험을 대비한 공부를 도와달라 부탁한다. 공부를 마친 후 카즈사와 선생님은 디저트와 음료수를 나눠 먹고 돌아간다."
446030069 = "이래 봬도 방과후 디저트부"
4084141263 = "정류장에서 버스를 기다리고 있던 카즈사를 발견한 선생님. 선생님과 카즈사는 카즈사가 갖고 있던 음료수와 마카롱을 나눠 먹으며 잡담을 나눈다."
2391083433 = "나쁜 타이밍"
3086413285 = "점심거리를 사기 위해 편의점에 방문한 선생님. 선생님은 편의점에서 카즈사를 발견하지만 카즈사는 모르는 체하며 선생님을 피한다. 그러다 선생님과 부딪혀 모습을 드러낸 카즈사. 카즈사는 화장을 하지 않아 선생님을 피해 다녔다고 말한다. 이후 카즈사와 선생님은 잠시 잡담을 나눈 뒤 헤어진다."
2135718946 = "고양이 혀"
2285653641 = "갑작스레 샬레를 방문한 카즈사. 카즈사는 <퐁당 쇼콜라>를 샀지만 본인은 뜨거운 것을 잘 먹지 못하여 대신 선생님에게 주기 위해 샬레를 찾은 것이었다. 선생님은 카즈사에게 '고양이 혀'라는 말을 하지만 카즈사는 그 의미를 잘 알지 못한다."
432381563 = "코코나 쨩이 아니에요. 교관이라구요!"
3385540554 = "매화원을 방문한 선생님. 코코나는 교관으로서의 멋진 모습을 보여주겠다 공언한다. 하지만 코코나는 아이들 앞에서 교관의 위엄을 세우지 못한다."
377170606 = "어린 아이가 아니예요. 숙녀라구요!"
1059419902 = "산해경에서의 일을 마치고 샬레로 돌아가는 길, 선생님과 마주친 코코나는 선생님에게 숙녀인 자신을 에스코트할 기회를 주겠다고 말한다. 선생님이 산 커피에 흥미를 보이던 코코나. 호기롭게 커피를 맛보지만 생각보다 강렬한 어른의 맛에 괴로워한다."
3736806188 = "아무리 그래도 싫은 건 싫은 거예요!"
661652410 = "시내에서 코코나를 만난 선생님. 코코나는 어떻게 하면 교관으로 불릴 수 있을지 고민하고 있었다. 선생님은 당근을 먹을 수 있게 된다면 교관으로 불릴 수 있을 것이라 조언한다."
1888100604 = "……이번만이에요. 정말이라구요?"
3679415033 = "선생님과 함께 당근 전문 식당을 방문한 코코나. 사방에 보이는 당근에 거부감을 느끼는 코코나였지만 의외의 맛에 당근을 전부 먹는 데 성공한다."
2090247752 = "불타는 단장의 가쿠란"
3930023682 = "샬레에 두고 간 우타하의 가운을 돌려주기 위해 엔지니어부 작업실에 방문한 선생님. 하지만 우타하는 가운이 아닌 가쿠란을 걸치고 작업을 진행하고 있었다. 우타하는 대운동회 때 입었던 가쿠란을 입고 작업에 임하니 다른 의미로 열정이 느껴진다며 즐거워한다."
492464550 = "불타는 단장의 매스게임"
3765296963 = "우타하가 만든 새로운 응원 도구의 시연을 감상하기 위해 밀레니엄을 방문한 선생님. 우타하는 선생님에게 로봇를 활용한 대규모 매스게임을 선보인다."
4280790550 = "불타는 단장의 응원혼"
2043768612 = "약속된 일정 내에 응원용 로봇을 완성하지 못한 우타하가 의뢰인들을 직접 만나 응원을 해준다."
2208070431 = "불타는 단장의 응원가"
1265896640 = "엔지니어부 부원들의 기운이 없는 것을 걱정한 우타하가 선생님을 노래방으로 부른다. 우타하는 자신이 직접 만든 곡이라며 응원가를 들려주지만, 생각지도 못한 가사에 선생님은 크게 당황한다."
3318658421 = "세미나 서기 노아의 세심한 기록"
436248350 = "당번 업무를 위해 샬레에 방문한 노아. 하지만 특별히 도와줄 일이 없다며, 편하게 시간을 보내라는 선생님의 배려에 노아는 서기로서 선생님의 일과를 충실히 기록하기로 한다."
465908990 = "세미나 서기 노아의 짓궂은 관찰"
2289102291 = "노아의 평정을 깨트리기 위해, 노아에게 서로의 행동을 관찰하며 당번 시간을 보내자고 제안한 선생님. 하지만 서로를 관찰하고 기록하는 일은 생각만큼 쉽지 않았고, 노아가 갑자기 낸 돌발 문제에 선생님은 크게 당황해한다."
773232047 = "세미나 서기 노아의 평범한 일과"
604699670 = "밀레니엄의 업무를 마치고 들린 카페에서 노아를 발견한 선생님. 서류 뭉치에 둘러싸인 노아는 새로 출원된 발명 특허를 감정하고 있었다고 말한다. 특허에 관한 이야기를 나누며 서류를 정리하는 도중, 노아는 재미있어 보이는 특허를 하나 발견한다."
3466815831 = "세미나 서기 노아의 심심한 휴식"
706439484 = "갑작스러운 소나기로 정기 면담이 취소된 선생님은 노아의 얼굴을 보기 위해 세미나의 회의실로 향한다. 선생님의 깜짝 방문에 놀란 기색을 드러내는 노아. 이후 노아와 선생님은 잡담과 함께 커다란 유리창에 글씨를 적으며 즐거운 시간을 보낸다."
3426454651 = "마이스터의 은밀한 취미"
4103016827 = "어느 날, 선생님은 시장에서 원단을 고르던 히비키와 우연히 마주친다. 히비키는 코스프레 취미에 사용할 원단을 고르러 왔다고 답하며, 자신의 코스프레 취미에 관해 설명해준다."
4119985251 = "마이스터의 열렬한 응원"
1355940963 = "샬레에서 늦은 시간까지 야근을 하던 도중, 선생님을 응원하기 위해 치어리더 복장의 히비키가 샬레를 찾아온다. 히비키는 사무실에서 선생님을 열렬히 응원하지만, 곧 무언가 잘못되었다는 것을 깨닫는다."
2694245452 = "마이스터의 살벌한 독촉"
3127541435 = "히비키가 선생님의 의욕을 돋우기 위해 새로운 발명품을 소개한다. 워드프로세서 기기를 닮은 그 발명품은 일정 시간 동안 업무를 진행하지 않을 경우 자폭하는 기능이 탑재되어 있었고, 이 사실을 알게 된 선생님은 황급히 업무를 처리한다."
162351076 = "마이스터의 상냥한 자장가"
484928347 = "과로에 지친 선생님을 위해 히비키가 새로운 발명품을 가져온다. 평범한 응원술을 닮은 그 발명품에는 자장가를 재생하는 기능이 담겨 있었고, 선생님은 응원술에서 흘러나오는 히비키의 자장가를 들으며 단잠을 청한다."
2702026288 = "Case 1. 토끼랍니다?"
3571189559 = "아카네의 모모톡을 확인한 선생님은 아카네가 머무는 방 입구에 도착하고 노크한다. 그 순간, 아카네가 등장하여 선생님을 깜짝 놀라게 한다. 이에 당황한 선생님은 급한 일이 생겼다며 자리를 떠난다."
4078232729 = "Case 2. 편히 쉬세요."
4204404808 = "밀린 업무에 지친 선생님은 일을 뒤로 미룬 채 휴게실로 발길을 옮긴다. 휴게실에서 선생님을 기다리고 있던 아카네는 선생님에게 도울 일이 있는지 묻고 선생님은 청소를 도와달라고 한다. 청소를 마친 후 아카네는 선생님에게 더 도울 일이 없는지 묻지만, 업무에 지친 선생님은 잠이 들게 되고 아카네는 조용히 자리를 떠난다."
1635582478 = "Case 3. 공부할 시간이군요?"
4058993158 = "밀린 업무를 뒤로한 채 시내를 걷고 있던 선생님은 아카네와 만나게 된다. 하지만 아카네의 바니걸 복장이 주위의 이목을 끌게 되고, 이에 당황한 선생님은 아카네를 데리고 황급히 그곳을 떠난다. 그러나 새롭게 도착한 곳은 바니걸 컨셉의 카페였고 선생님은 또 다시 당황한다."
482869814 = "Case 4. 일일 비서, 대령했습니다."
607709933 = "샬레에서 밀려있던 업무를 처리하던 선생님. 혼잣말로 커피를 만들어달라 말하는 순간, 아카네가 커피를 선생님에게 건네준다. 한편, 아카네와 대화를 나누면서 선생님은 아카네의 진심을 듣게 되고 아카네는 자신감을 되찾는다."
3585267607 = "아침 조깅"
1396278568 = "이른 아침, 공원 산책로에서 조깅 중인 유우카를 만난 선생님. 유우카는 밀레니엄에서 주관하는 대운동회를 대비해 특훈을 하고 있었다. 지구력만큼은 자신 있다고 말하는 유우카. 하지만 그 호언장담과는 달리 유우카의 체력은 금방 바닥나고 만다."
737635945 = "과학적인 요리 비결"
2573899798 = "유우카가 요리 연습을 하고 있다는 이야기에 조리실습실에 방문한 선생님. 유우카는 자신감을 드러내며 기세 좋게 요리를 시작하지만, 익숙지 않은 탓에 실수를 연발하고 우여곡절 끝에 도시락을 완성한다."
2174568177 = "이성적인 응원 문화"
1860377927 = "공무 처리를 위해 샬레로 방문한 유우카는 TV에서 생중계 중인 밀레니엄 야구부의 경기를 보게 된다. 유우카는 올바른 응원객이라면 어떠한 상황에서도 이성을 잃어서는 안 된다고 이야기하지만, 밀레니엄 야구부의 경기 중계를 시청하며 자제력을 잃고 만다."
670142544 = "스포츠 카드"
3586706266 = "업무의 일환으로 샬레에 방문한 유우카는 부재중인 선생님의 책상을 정리하다 자신의 모습이 인쇄된 카드를 한 장 발견하게 된다. 이는 크로노스 스쿨에서 제작한 스포츠 카드였지만, 이를 알아차리지 못한 유우카는 작은 오해를 하게 된다."
4024156221 = "익숙지 않은 복장"
3987667853 = "마리의 상담 요청으로 트리니티 대성당 준비실로 방문한 선생님은 그곳에서 체육복을 입은 마리를 만난다. 선생님은 시스터 복장이 아닌, 체육복 차림에 불안과 쑥스러움을 느끼는 마리의 고민을 듣고 조언을 해준다."
1051695137 = "벤치 위의 시스터"
343809718 = "대운동회 당일, 수많은 인파에 동분서주하는 마리를 응원하는 선생님. 마리는 선생님의 배려에 감사함을 느끼고 지금까지 느끼지 못했던 대운동회의 즐거움과 감상에 관한 이야기를 한다."
2123351407 = "마리의 답례"
720252404 = "트리니티 대성당 사유지 공원을 거닐던 선생님은 운동을 하는 마리를 만난다. 대운동회를 계기로 변화된 마음가짐에 대해 말하는 마리의 모습에 선생님은 흐뭇해한다. 이후 마리가 운동을 끝마칠 때까지 기다려 준 선생님은 마리의 배웅을 받으며 샬레로 돌아온다."
1478340410 = "계속 성장했어"
2793860415 = "하스미의 연락을 받고 찾아간 선생님. 거기에는 하스미가 체육복의 지퍼를 올리려고 노력하고 있었다. 지퍼 올리기를 포기한 하스미는 선생님과 체육제 준비를 위한 서류 업무에 매진하지만, 선생님은 하스미의 복장에 업무에 집중할 수 없게 된다."
1830803246 = "레몬 벌꿀 절임"
3363601715 = "선생님은 하스미의 연락을 받고 조리실로 향한다. 하스미는 <레몬 벌꿀 절임>을 만들고 있었다. 선생님은 하스미를 도와 남은 레몬 벌꿀 절임을 담는다."
2317643333 = "자기관리"
3356412026 = "대운동회 개최 당일. 하스미는 다이어트 식단을 먹고 있었지만, 주변 학생들의 음식 얘기에 흔들린다. 선생님은 하스미에게 <레몬 벌꿀 절임>을 나누어 먹자고 제안한다. 하스미는 조금만 먹기로 다짐하지만 결국 식욕이 폭발하여 모두 먹어버리게 된다."
1424445415 = "자세 잡아주기"
2368675001 = "하스미와 운동 약속을 잡은 선생님은 체육관에 방문한다. 하스미와 선생님은 서로의 운동을 도와주며 자세를 잡아준다."
2829913152 = "천재 해커의 취향"
2128267029 = "선생님이 휴일이라는 걸 안 히마리는 선생님을 자신만의 은신처로 초대한다. 그곳에서 함께 휴식을 취하며 여유로운 한때를 보내는 두 사람. 이어서 히마리는 자신의 신청곡을 틀기 위해 교내방송을 해킹하고 교실에는 히마리의 취향인 엔카 곡이 흘러나오기 시작한다."
1584830152 = "천재 해커의 실험"
1591221981 = "선생님은 히마리와 약속한 시간에 늦지 않기 위해 움직이지만, 어째서인지 갖은 사고에 휘말리게 된다. 가까스로 모든 사고를 극복하고 도착한 선생님이었지만, 알고 보니 그 모든 건 운세 잡지에서 본 걸 선생님을 상대로 시험해 보고자 한 히마리가 벌인 일이었다. 진실을 알게 된 선생님은 히마리에게 설교를 시작한다."
829552681 = "천재 해커의 반론"
711052487 = "히마리에게 큰일이 났단 연락을 받은 선생님은 다급히 밀레니엄을 찾아가지만, 히마리가 보여준 건 다름 아닌 자신에 대해 중상비방을 하고 있는 가십 기사였다. 기사의 내용을 정정하고자 히마리는 선생님과 해명 영상을 찍어 보내지만, 의도와 다르게 히마리와 선생님이 제작한 영상은 더욱 커다란 파란을 만들고야 만다."
2037364016 = "천재 해커의 섬세한 세미콜론"
2533708593 = "히마리는 특별한 보물을 손에 넣었다며 선생님에게 한정판 요괴 MAX 음료수를 보여준다. 히마리는 이 음료수를 더욱 맛있게 먹는 방법을 베리타스의 부원들에게 배웠다며 그 방법을 시험해 보지만. 그 순간 캔이 터지고 히마리는 음료를 흠뻑 뒤집어쓰고야 만다. 하는 수 없이 선생님은 그런 히마리를 수건으로 정성스레 닦아주기 시작한다."
4205919598 = "은근하게"
785035510 = "붉은겨울 학원에서의 업무를 마치고 구교사로 향한 선생님. 선생님은 그곳에서 혼자 자리를 지키고 있던 시구레와 마주친다. 시구레는 혹한으로 인해 음료수가 모두 얼어버렸다며 자연스럽게 보드카를 건네고, 선생님은 곤란해한다."
2971103393 = "능청맞게"
3404545130 = "붉은겨울 학원을 방문한 선생님은 설산을 돌아다니다 조난을 당하고 만다. 하지만 다행스럽게도 마침 근처를 지나던 시구레가 선생님을 구조해주고, 시구레는 전에 자신이 했던 조언을 듣지 않았다며 선생님을 나무란다. 그 후, 선생님은 시구레에게 업혀 무사히 샬레로 돌아오게 된다."
720127695 = "오붓하게"
1882526035 = "지난번의 보답을 겸하여 번화가에 시구레를 초대한 선생님. 시구레는 레스토랑에서 식사를 하며 즐거운 시간을 보내지만, 자신에게 어울리는 장소는 따로 있다며 담담하게 소회를 밝힌다."
4186219493 = "솔직하게"
273193773 = "선생님에게 음식을 대접하기 위해 샬레의 조리실습실을 방문한 시구레. 하지만 그녀가 들고 온 날것의 식재료를 보고 선생님은 당황해한다. 시구레는 이후 보드카를 넣어가며 장난스럽게 요리를 계속하고, 결국 선생님이 시구레를 대신하여 요리를 마무리하게 된다."
3572546902 = "성야에도 언제나 세리나"
3496257221 = "선생님은 성야를 맞이해 아이들에게 선물을 나누어 주고 있는 세리나를 만난다. 어느새 눈이 내리기 시작하고, 추위를 타는 세리나에게 선생님은 목도리를 선물한다."
2512788767 = "정말로 준비한 선물"
2923297793 = "휴식을 취하는 선생님에게 몰래 찾아온 세리나. 하지만 금세 기척을 들키고 만다. 세리나는 저번의 목도리의 보답을 위해, 선생님에게 종합 건강 세트를 선물하거나 지압을 해주며 즐거운 시간을 보낸다."
2326049757 = "구호기사단 일일 체험"
1971996326 = "선생님은 세리나가 하는 구호기사단 일일 체험에 함께 참가한다. 크리스마스를 맞아 산타 복장을 한 세리나는 병실을 돌며 능숙하게 환자들을 대한다. 일이 끝난 뒤, 세리나는 선생님에게 구호기사단 일에 참여한 이유를 묻고, 선생님은 세리나와 구호기사단에 관심이 있었음을 밝힌다."
720184857 = "착한 아이? 나쁜 아이?"
1669203285 = "산타 옷을 입은 이상 진정한 산타가 되어야 한다는 하나에. 진정한 산타가 되기 위해 고민하던 하나에는 가장 먼저 착한 아이인지 나쁜 아이인지 판별할 수 있도록 거짓말 테스트부터 시작하기로 한다."
69967909 = "특훈! 노려라, 산타!"
3605114321 = "진정한 산타가 되기 위한 훈련을 계속하는 하나에. 선생님과 하나에는 키보토스 곳곳을 돌아다니며 파쿠르 훈련을 이어간다."
2582704447 = "산타를 기다리며"
2787292054 = "하나에의 방에 초대를 받은 선생님. 하나에는 산타 할아버지를 맞이하기 위해 양말과 간식을 준비한다."
503073630 = "중요한 일, 중요한 물건"
675453541 = "하나에는 선생님과 함께 사람들에게 나누어줄 선물들을 구매하기 위해 쇼핑몰로 향한다. 하지만 하나에가 고르는 선물들은 모두 건강용품들이었고 블랙마켓의 불량배와 시비가 붙는다. 하나에는 불량배들의 횡포에 분노해 결국 착하게 만든다."
3867179911 = "가끔은 상궤를 벗어나"
1185714622 = "선생님은 하루나를 만나 연말연시의 활기찬 거리에서 다양한 음식을 맛본다. 하지만 음식들은 하루나의 기대에 미치지 못했고, 선생님은 하루나가 노점들을 폭파할까 노심초사한다. 그러나 하루나는 미식은 아니었지만 충분히 즐길 수 있었다며 남은 시간도 선생님과 함께 한다."
1122975317 = "결과만큼이나 과정도 중요하죠"
1611910214 = "미식의 과정을 탐구하기 위해서라는 말을 하며 선생님을 시장으로 부른 하루나. 시장에서는 상인들이 모여 도미 경매에 열을 올리고 있었다. 하루나는 경매에 참전하여 당당히 도미를 얻어내고, 그 도미를 오마카세에서 요리해 맛있게 먹는다. 하지만 궁극의 맛을 찾는 것은 쉽지 않다며 하루나는 아쉬워한다."
1306876513 = "미식의 요소는 요리, 시기, 상대. 그리고……"
2915697252 = "최고의 미식을 하자며 선생님을 약속 장소로 부른 하루나. 미식에 정말 중요한 건 요리만이 아니라며, 하루나가 생각하는 모든 요소를 갖춘 채 선생님과 미식을 함께한다."
799816248 = "새해에는 새 옷으로!"
3455411055 = "선생님은 준코가 아르바이트하고 있다는 <르와조 블뢰>에 찾아간다. 선생님은 기모노를 입은 준코를 보고 가게의 모든 메뉴를 주문해버린다. 결국 남기게 되어 핀잔을 듣지만, 준코에게 함께 먹자고 제안하자 준코는 마다하지 않는다."
934247381 = "다양한 음식이 필요해!"
527805565 = "아르바이트비를 받은 준코가 축제 거리로 선생님을 부른다. 두 사람은 함께 새해 음식을 시식하는데, 너무 많이 먹어버린 나머지 준코는 안색이 파래지고 만다."
4015908374 = "따스함을 주세요"
1228012568 = "연휴가 끝나기 전, 준코는 선생님이 있는 샬레에 찾아온다. 두 사람은 시내에 나가서 크리스마스 트리를 보거나, 상가를 돌아다닌다. 갑자기 준코의 배에서 꼬르륵 소리가 나고, 두 사람은 경단을 나눠먹은 뒤 새해 인사를 한다."
2198382498 = "당신의 소원은?"
41944175 = "연말연시에도 고생하는 후우카를 만나러 게헨나 학생식당에 방문한 선생님. 갑작스러운 선생님의 방문 그리고 상상도 하지 못한 데이트 제안에 놀란 후우카는 얼떨결에 선생님과 외출하며 즐거운 시간을 가진다."
735524095 = "조금 어긋나더라도"
751489679 = "후우카의 초대로 학생식당에 도착한 선생님. 그곳에는 기모노로 한껏 단장한 후우카가 선생님을 기다리고 있었다. 후우카는 그간의 답례를 위해 손수 만든 해넘이 국수를 선생님에게 대접한 뒤 새해 인사를 나눈다."
3464653551 = "가끔은 천천히, 이대로."
1290967402 = "마지막 휴일까지 급양부 일로 시간을 보내려는 후우카를 납치해 이곳저곳을 돌아다니는 선생님. 정신없는 하루가 지나고 후우카는 연휴의 끝자락에 특별한 추억을 만들어준 선생님의 깊은 배려를 깨닫고 진심을 담아 감사 인사를 건넨다."
2747740649 = "그 뜻을 보다 널리"
4046348442 = "선생님은 미네와 함께 구호 순찰을 시작한다. 미네는 여러 소동 끝에 생명을 구호하기 위해 보다 단호히 행동하기로 결심한다. 구호 순찰을 마친 후 미네는 선생님에게 구호기사단의 일원이 되는 것을 제안한다."
155199846 = "취미의 영역"
1992573947 = "미네는 자신의 수집품을 보여주기 위해 선생님을 집으로 초대한다. 자신의 집에서 미네는 여러 의료 용품에 대해 설명하지만, 선생님은 잘 알아듣지 못한다. 결국 미네는 자신에게 상처를 내보라고 하고, 선생님은 간신히 미네를 말린다."
4103404645 = "애프터눈 티"
381585519 = "미네는 선생님과의 티타임을 즐기기 위해 선생님을 구호기사단으로 초대한다. 미네는 선생님에게 자신이 갖고 있는 여러 고민을 하소연한다."
1869515898 = "구호가 필요한 자리"
1542046764 = "선생님과 미네가 업무를 처리하던 도중, 미네에게 전화가 온다. 미네는 <키보토스의 수해>에서 한 시민의 도움 요청을 받게 되고, 곧장 <키보토스의 수해>로 선생님과 함께 달려간다. 하루가 넘게 <키보토스 수해>를 수색했지만 성과는 없었고, 선생님과 미네는 하룻밤 동안 숲 속의 공터에서 시간을 보낸다."
3733720402 = "다시 일상으로"
4075198640 = "미카의 연락에 트리니티로 찾아간 선생님. 미카와 선생님은 여러 곳을 다니며 쇼핑한다. 그때 하필 카드가 한도 초과로 막힌 바람에 미카는 당황하지만, 그런 미카를 위해 선생님이 대신 결제해 준다."
1824494665 = "봉사 활동 "
3962654178 = "봉사활동의 일환으로 운동장의 잡초 뽑기를 시작한 미카, 선생님은 그런 미카를 돕기 위해 직접 찾아온다. 미카는 당황하지만, 이내 선생님과 함께 시간을 보낸다."
2847450936 = "다락방의 공주님"
2413528587 = "미카의 초대를 받아 기숙사에 도착한 선생님. 하지만 바로 그때 점호시간이 되어 빠져나갈 수 없게 된 선생님은 하는 수없이 미카의 방에 숨어, 잊을 수 없는 순간을 함께 한다."
1481077183 = "상처와 흉터"
120262361 = "미카의 연락에 황급히 트리니티로 찾아간 선생님은, 학생들의 괴롭힘 때문에 찢어진 수영복을 들고 있는 미카를 발견한다. 울고 있는 미카를 다독이며, 선생님은 미카만은 위한 수영 수업을 하자고 제안한다."
2390792070 = "쌓여가는 모리모리군"
238376327 = "메구를 찾아간 선생님은, 녹아버린 아이스크림 '모리모리군'을 바라보고 있던 메구를 발견한다. 자신의 무기로 모리모리군을 녹이고 있던 메구에게 선생님은 잠시 기다려 보라고 제안한다."
997833605 = "얌전하게 시간 보내는 법"
3179826887 = "대기 시간. 하지만 메구는 오히려 아무 일을 하지 않는 것에 초조해하고 있었다. 선생님은 메구가 가지고 있던 켄다마 군으로 메구의 주의를 끈다."
70172580 = "온천개발부의 일"
4184469458 = "메구의 연락에 어느 산기슭에 찾아간 선생님. 메구는 그곳에서 선생님을 위한 온천을 파고 있었다."
3903491499 = "라면과 온천의 상관관계"
297876452 = "늦은 저녁. 메구는 라면을 끓이면서 선생님과 여러 이야기를 나눈다. 완성된 라면을 함께 나누어 먹은 메구는, 늘 그렇듯 온천 개발을 위해 떠나버린다."
1551137325 = "그 국장의 소문"
3048088134 = "당번 업무를 위해 샬레로 방문한 칸나. 선생님은 발키리 경찰학교에서 엄격하다고 소문난 칸나와 함께 업무를 처리한다. 칸나의 심기를 건드리지 않고자 바싹 긴장한 선생님이었지만, 그 바람과는 달리 각종 실수를 연발하고 만다."
3236770699 = "그 국장의 업무"
1619463056 = "잠복 수사 중인 칸나를 응원차 찾아간 선생님. 칸나가 늦은 시간까지 식사를 거르고 있다는 사실에 다양한 음식을 권해보지만, 칸나는 선생님의 권유가 거슬리기만 하다."
1028219097 = "그 국장의 휴식"
1512296132 = "밀수범을 성공적으로 체포한 칸나. 공안국 학생들은 작전의 무사 완료를 자축 겸 축배를 제안하지만, 칸나는 그 제안을 정중히 거절한다. 그날 저녁, 야식을 먹기 위해 이동식 포장마차에 들른 선생님은 그곳에서 홀로 식도락을 즐기던 칸나와 마주친다."
692249735 = "그 국장의 꿈"
4271209454 = "평범한 오후의 정적을 깨는 칸나의 호출. 선생님은 칸나가 미아를 달래느라 진땀을 빼고 있다는 걸 알게 되고 몸소 나서 도움을 준다. 정신없었던 하루가 저물고 헤어지는 길에서 칸나는 누구에게도 털어놓지 못한 속마음을 선생님에게 털어낸다."
3258439759 = "오해받기 쉬운 사람"
3227620313 = "사쿠라코가 의미심장한 모모톡을 보내자 신경쓰인 선생님이 사쿠라코를 찾아간다. 하지만 별다른 내용은 아니었고, 선생님은 사쿠라코가 오해받기 쉬운 성격이라는 것을 확인한다."
2902921354 = "트렌드 따라잡기"
4239335081 = "선생님은 상점가 액세서리 가게 앞에서 고민하던 사쿠라코를 발견한다. 그때 가게의 문이 열리고, 가게 주인이 사쿠라코를 데려간다. 선생님은 당황하는 사쿠라코를 따라가 도와준다."
2853082550 = "내부 회랑 산책 "
1413282267 = "사쿠라코의 연락으로 대성당 내부의 회랑을 찾아간 선생님. 그곳에서 사쿠라코와 함께 걸으며 진솔한 대화를 나눈다."
2382324779 = "의외의 취미"
4092134933 = "사쿠라코의 상담 요청을 받고 찾아간 선생님. 사쿠라코는 선생님에게 '취미'가 무엇인지 물어본다."
399214349 = "해명의 자리"
3113818934 = "사쿠라코의 도움 요청을 받고 찾아간 선생님. 하지만 도움의 내용은 사쿠라코가 수상한 사람이 아니라는 것을 시스터들 앞에서 연설하는 것이었다. 사쿠라코에 대한 오해는 깊어져 간다."
2003923680 = "평소의 일과"
1607965188 = "이른 아침부터 샬레로 찾아온 토키. 일련의 사건으로 할 일이 사라진 토키는 이내 선생님과 일과를 보내겠다는 결론에 다다른다. 토키의 보좌 아래 시작된 선생님의 소란스러운 하루. 토키와 함께할 앞으로의 나날이 걱정스럽기만 하다."
4288888721 = "학원 생활"
322319486 = "출석 일수 부족으로 유급 경고를 받게 된 토키. 선생님은 토키가 평범한 학원 생활을 보낼 수 있도록 적극적으로 도와주지만, 아직 토키에게는 학원 생활이 낯설기만 하다."
1375907566 = "취미에 대한 고민"
3410652719 = "별다른 취미 없이 주말을 소비하는 토키의 이야기를 듣고 이곳저곳을 돌아다니는 선생님. 다양한 레저 활동을 하며 토키의 취미를 찾기 위해 고군분투하지만 별다른 성과를 얻지 못한다."
284991053 = "어느 날의 사소한 지각"
3181693318 = "개인적인 일로 지각에 대한 양해를 구했던 토키. 평소 행실과는 다른 모습에 선생님은 토키의 상태를 살피러 공방으로 찾아간다. 갑작스러운 선생님의 방문에 놀란 그녀였지만, 선생님을 안내하고 최강의 메이드가 되기 위해 완벽하게 장비를 점검 중인 사정을 설명한다."
62419462 = "연결의 증표"
2598613321 = "언제나처럼 갑자기 쳐들어온 토키는, 선생님과의 연결의 증표라면서 어떤 물건을 건네준다……"
3221453657 = "오후의 티타임"
1575926616 = "나기사와의 다과회에 참석한 선생님. 선생님은 따로 준비해 온 '페트병 홍차'를 꺼낸다. 나기사는 처음 보는 브랜드에 호기심을 느껴 홍차를 나눠 받지만 이내 페트병 홍차의 맛을 버티지 못하고 도망친다."
3617335172 = "교양인의 말투"
3261002897 = "최근 트리니티 학생들의 부적절한 언어 사용을 걱정하는 나기사. 자신은 평소 올바른 언어 습관을 익혀두어 어떤 상황에서도 품위 있게 말할 수 있다고 자신한다. 그러나 트리니티 학생들의 과격한 일탈을 다룬 잇단 보고에 결국 폭발하고 만다."
578805062 = "홍차와 감칠맛"
2073459542 = "새로운 찻잎을 대접하기 위해 선생님을 초대한 나기사. 그러나 도착한 것은 콘부차가 아닌 다시마차였다. 고민을 거듭하던 나기사는 다시마 차를 대접하며 시치미를 뗀다."
1365827293 = "빵의 대용품"
1448253096 = "빵을 사기 위해 인근 상가를 찾은 선생님. 하지만 가게에는 빵이 하나도 남아있지 않았다. 이어 가게 안으로 들어온 나기사는 선생님에게 다른 가게에서 주문한 오더 메이드 케이크를 나누어 먹자고 제안한다."
2105366932 = "반성실의 입주자"
214951891 = "밀레니엄을 방문한 선생님은 반성실에서 코유키를 만난다. 하지만 코유키는 반성실을 자기 방인 것마냥 꾸미고는, 오히려 그 생활을 즐기고 있었다."
2113534752 = "판도라의 상자 1"
4241439597 = "샬레 당번으로 찾아온 코유키. 선생님과 이런저런 대화를 나누던 코유키는 샬레에 관심을 가지고, 선생님은 그런 코유키를 경계한다. 이후 코유키는 꿍꿍이를 숨긴 채 밀레니엄으로 돌아간다."
4083323257 = "판도라의 상자 2"
2414226696 = "샬레에 몰래 침입한 코유키는 이런저런 비밀들을 파헤치려 하지만 선생님에게 들킨다. 도주한 코유키는 선생님의 생활관으로 달려가고, 그곳에서 `이상한 책`들을 발견한다."
2351755493 = "평소의 행실"
2882100059 = "선생님은 오락실에서 반복될 실패에 분노하는 코유키를 발견한다. 코유키는 자신이 운에 맡기는 게임을 즐기는 이유를 설명하고, 선생님이 놀리자 역으로 내기를 제안한다."
1850258284 = "그편이 즐거우니까"
3499702459 = "풀밭에서 쭈그리고 앉아있는 코유키를 발견한 선생님. 코유키는 운이 좋아질 수 있을지 모른다는 희망에 네잎클로버를 찾고 있었다. 선생님과 코유키는 결국 네잎클로버를 발견한다."
505934790 = "속일 권리"
619630983 = "자신의 잃어버린 동전을 찾아달라고 말하는 코유키. 찾아낸 그 동전에는 코유키의 은밀한 과거가 숨겨져 있었는데……!"
168056968 = "또 다른 오해"
2953254523 = "우연히 가게에서 기모노를 구매하는 카요코를 발견한 선생님. 가게 점원은 카요코를 암흑가 조직의 높은 사람으로 착각하고 곤란해하고 있었다. 선생님은 점원의 오해를 풀어준 뒤 카요코에게 잘 어울리는 기모노를 추천해 준다."
3556812176 = "새해의 종소리"
1261302160 = "한 해의 마지막 날, 타종 행사에 참여하기 위해 사찰을 찾은 선생님과 카요코. 하지만 안타깝게도 종루의 상태가 좋지 못하여 행사는 취소된 상태였다. 돌아오는 길에 막차를 놓친 선생님과 카요코는 정거장에서 첫차가 들어오는 신호 종소리를 들으며 새해를 맞는다."
1594158572 = "감주와 고양이"
585940394 = "부적을 사기 위해 사찰을 방문한 선생님과 카요코. 둘은 추운 몸을 덥히기 위해 따듯한 감주를 마신다. 그때, 어디선가 들려 온 고양이의 울음소리에 카요코는 잠시 자리를 비우고, 뒤늦게 카요코를 뒤따라간 선생님은 고양이와 함께 즐겁게 놀고 있는 카요코의 모습을 발견한다."
1021018790 = "스트레스 해소법"
1831690994 = "새해 초부터 바쁜 시간을 보내는 선생님. 카요코는 지친 선생님을 위해 화악기 공연을 보러 가자고 권한다. 선생님은 평화로운 느낌의 화악기 공연을 기대하지만, 카요코가 소개한 공연은 강렬한 메탈 풍으로 어레인지된 화악기 공연이었다."
1676776936 = "카도마츠 만들기"
2926389252 = "새해를 맞아 하루카의 아지트를 찾은 선생님. 하루카는 카도마츠를 만들 대나무를 찾지 못해 고민하고 있었다. 선생님은 하루카에게 마음이 중요하다고 조언하고, 하루카는 자신이 키우던 잡초로 카도마츠를 만든다."
4150553585 = "계절감"
882190145 = "선생님은 겨울임에도 짧은 유카타를 입은 하루카가 걱정돼, 감기 조심하라며 디저트와 핫팩을 사준다."
1010615852 = "차가운 바람, 따듯한 햇볕"
902806983 = "하루카와 풀들이 걱정되어 하루카의 아지트를 찾은 선생님. 선생님은 잡초들을 보살피던 하루카에게 따듯한 음식을 사 준다."
1362773471 = "백귀야행의 홍보대사 카호 님"
3015917284 = "카호는 선생님에게 관광산업과 관련된 프레젠테이션을 진행하지만, 기대와 다른 선생님의 반응에 뒤늦게 업무 메일이 제대로 보내지지 않았다는 걸 깨닫는다. 죄송해하는 카호를 선생님이 위로하자, 카호는 기운을 차린 뒤 새로운 프레젠테이션을 시작한다."
813536488 = "부장님보다 더 부장님다운 카호 님"
1268253443 = "선생님은 음양부 부실에서 업무를 정리하고 있던 카호를 만난다. 카호가 선생님에게 백귀야행 학원을 소개해 주기 위해 나서려던 찰나, 백귀야행 학생들이 들이닥치기 시작한다. 백귀야행 학생들의 일들을 해결하고 나니 저녁이 되어, 결국 선생님의 에스코트는 다음으로 미루게 된다."
3589056262 = "카호 님의 완벽한 에스코트"
1155603011 = "카호는 지난번의 실수를 만회하고자 다시 한번 선생님을 백귀야행으로 초대한다. 카호는 백귀야행의 매력을 소개하지만 여러 유혹에 흔들리게 된다. 어느덧 저녁이 되고 선생님은 카호와의 데이트에 즐거워한다."
1779236823 = "카호 님의 진정한 영업전략"
44237873 = "카호의 연락에 음양부 휴게실을 방문한 선생님은, 그곳에서 특별 발주한 홍보용 굿즈를 정리하고 있는 카호와 만난다."
2501910877 = "마음을 담은 장식품"
1244005463 = "선생님과 함께 음양부 휴게실을 청소하던 카호는 백귀야행 학생들이 준 감사장을 소중히 닦는다. 그러면서 선생님에게 이 감사장이 자신에게 얼마나 소중한지와 그 이유를 설명한다."
4137176117 = "메이드 대 핀치!"
2046418808 = "아리스의 연락을 받고 황급히 게임개발부 부실로 향한 선생님. 일련의 사정으로 메이드복을 입고 정신적 고통을 호소하는 아리스를 위해, 선생님은 메이드복을 극복할 방법을 제안한다."
186589621 = "공부! 메이드 대작전!"
25252799 = "아리스는 메이드 레벨을 올리기 위한 공부를 선언한다. 염려스러운 마음에 게임개발부 부실로 향한 선생님은, 올바른 매체로 메이드에 대해 공부할 수 있도록 아리스를 돕는다."
3585111616 = "출격 준비 완료!"
3930937110 = "중대한 소식을 전하고 싶다는 연락과 함께 선생님을 호출한 아리스. 도착한 장소에는 허둥지둥 메이드복으로 갈아입고 있는 아리스가 선생님을 반기고 있었다. 몸단장이 끝난 아리스는 최강의 메이드 용사가 되겠다는 선언과 함께 결의를 불태운다."
3951701776 = "메이드 용사의 장비"
224308736 = "아리스는 메이드 용사로서 선생님의 길드 하우스, 즉 샬레를 청소하기로 한다. 그러나 청소 과정에서 그만 아리스의 머리띠가 더러워지고 만다. 다른 세탁물과 같이 머리띠를 세탁한 아리스는, 선생님과 즐거운 시간을 보낸다."
3957314179 = "문제의 원인"
3997203066 = "토키와 함께 호화 크루즈에서 열리는 파티의 잠입 임무에 참여하게 된 선생님. 바니걸 복장을 한 토키와 동행하는 선생님은 주변으로부터 의혹의 눈초리를 받으며 정신적인 한계를 경험한다."
2330192846 = "존재의 이유"
2392731156 = "생각하며 종일 집무실에서 상주하고 있는 것. 이 문제로 토키와 진지하게 이야기는 나누는 선생님. 하지만 별다른 소득은 얻지 못한다."
2672746772 = "휴식의 장소"
2814303571 = "임무로 연락이 되지 않는 토키가 걱정되어, 뜬눈으로 밤을 지새운 선생님. 이내 아침이 밝아오고 선잠에서 눈을 뜬 선생님은 자신의 침대에서 바니걸 복장으로 곤히 자는 토키를 발견한다."
1746842993 = "작업 레퍼런스"
2920706888 = "유즈는 새로 개발 중인 게임의 레퍼런스 참고를 위해 메이드복을 입게 된다. 하지만 타고난 자신감이 부족한 탓에 자신은 모델로는 적합하지 않다며 불안을 드러낸다. 선생님은 기가 죽은 유즈가 기운을 낼 수 있도록 응원하며 특별한 조언을 해준다."
831733757 = "새로운 아르바이트"
868737743 = "샬레에서 한가로이 업무를 보던 선생님. 잠시 후 다급한 발소리와 함께 울상을 짓는 유즈가 샬레에 들어온다. 사연을 듣자하니 선생님이 주선해 준 아르바이트가 메이드 카페라는 사실을 깨닫고 카페에서 도망쳐 나온 것. 선생님은 유즈가 아르바이트에 잘 적응할 수 있도록 메이드 특훈을 제안한다."
2231433090 = "캐비닛 안의 불청객"
2256848622 = "외근 중 선생님은 유즈의 상태를 보기 위해 그녀가 아르바이트를 하고 있는 메이드 카페로 향한다. 선생님의 방문에 잔뜩 긴장한 유즈는 평소와는 다르게 실수를 연발하고 만다. 잠시 후. 휴식 시간이 지나도 유즈가 돌아오지 않자 선생님은 걱정스러운 마음에 유즈를 찾아 나서고 의외의 광경을 마주한다."
1898965458 = "게임개발부의 청소"
2028068753 = "유즈의 청소를 돕기 위해 게임개발부 부실을 찾은 선생님. 하지만 유즈가 말한 청소는 부실 청소가 아닌, 컴퓨터의 최적화를 의미하는 것이었다. 하지만 어질러진 부실을 마주한 선생님은 청소의 필요성을 느끼고 유즈에게 부실 청소를 제안한다."
1247993165 = "안녕 레이사"
2205362417 = "우연히 버스 정류장에서 레이사와 만난 선생님. 레이사는 자신을 편하게 대했으면 한다는 선생님의 배려에, 속마음을 터놓고 큰 힘을 얻는다."
3620040079 = "믿어봐 레이사"
1349760893 = "피로 회복에 관한 조언을 구하기 위해 샬레로 찾아온 레이사. 피곤한 모습이 역력한 레이사의 상태를 보고, 선생님은 무리하지 않아도 괜찮다는 조언을 해준다."
324482861 = "고마워 레이사"
1014758945 = "그간 선생님께 받은 도움에 보답하고자 직접 에스코트를 나선 레이사. 함께 이곳저곳 다니며 정신없는 시간을 보내지만, 마음 한편으론 특별한 날을 만들어 드리지 못했다는 아쉬움이 남는다."
3804324515 = "잘 자 레이사"
2635556863 = "선생님은 홀로 순찰 중인 레이사를 찾아 슬럼가로 향한다. 그곳에서 꾸벅꾸벅 졸고 있는 레이사를 발견한 선생님. 이윽고 서로의 졸음을 쫓으며 순찰을 함께한다. 아침이 되고, 레이사는 떠오르는 해를 바라보며 소중한 감상을 전한다."
1171878055 = "많이 먹고 힘내야지!"
257339176 = "개인적인 도움을 받기 위해 샬레에 찾아온 루미. 문제가 해결될 때까지 하루 동안 선생님을 지켜보던 루미는, 선생님의 불규칙적인 식생활에 매우 분노해 버린다."
168583006 = "일단 맛을 보고 평가해!"
4087665218 = "선생님은 루미의 시식 요청을 받고 현무상회에 방문한다. 그런데 선생님의 기대와 달리, 루미가 준비한 것은 대단히 혁신적인 요리들뿐이었다."
6308616 = "손님맞이는 힘든 법이야."
4152447857 = "업무를 마치고 현무상회에 방문한 선생님. 루미의 '주방장 추천 메뉴'를 대접받으려는 찰나, 반갑지 않은 진상 손님을 마주한다."
7640267 = "아무려면 어때!"
2967789925 = "현무상회에서 만두를 대량으로 조리하는 특별한 날. 그 과정을 구경하고 싶었던 선생님은 루미를 찾아간다. 하지만 만두 외의 뜻밖의 구경거리도 보게 된다."
3324623418 = "첫인상"
361199515 = "야심 찬 선언과 달리 첫 당번 일부터 지각을 해버리고 만 미나. 첫 단추를 잘못 꿰였기 때문인지, 미나의 당번 활동은 예상치 못한 방향으로 흘러간다."
855234387 = "리코더 연습"
2959531408 = "현룡문의 집행부장 미나는 언제나 산해경의 치안 유지에 불철주야 노력한다. 타의 모범이 될 행동이지만, 그 활동에는 뭔가 독특한 취향이 깃든 듯하다."
1904261494 = "비 내리는 날의 느와르"
2823268309 = "산해경에서 공무를 마치고 나오던 선생님은 갑작스러운 소나기를 맞는다. 우산이 없어 당황하던 차, 선생님의 앞에 우산을 든 미나가 나타난다."
2904966419 = "시간이 지나도"
3295408939 = "미나와 함께 매화원의 아이들을 만나러 간 선생님. '느와르'적인 평소 모습과 달리, 아이들과 잘 놀아주는 미나를 보며 선생님은 미나의 의외의 면을 발견한다."
244539017 = "건물은 어떻게 완성되는가"
267837178 = "밤샘 업무를 마친 뒤, 새벽 첫 차로 귀가를 준비하던 선생님은 우연히 용역부의 인파에 휩쓸리게 된다. 얼떨결에 작업 현장에 도착한 선생님은 미노리와 함께 현장 견학을 하기로 한다."
725869297 = "미노리 트위스트"
366290358 = "우연히 붉은겨울 학원의 도서관에서 미노리와 마주친 선생님은 평소에 읽는 책에 대해 가볍게 이야기를 나눈다. 하지만 미노리의 감상은 어쩐지 평범과는 다소 거리가 멀었는데……"
3493912546 = "둘 사이의 비계"
2598860157 = "추위로 용역부의 작업이 취소된 어느 날, 선생님은 간식거리를 들고 용역부를 찾는다. 작업 현장에서 홀로 안전 점검을 하던 미노리는 선생님의 깜짝 방문에 대한 답례로 용역부만이 볼 수 있는 특별한 풍경을 소개한다."
3231977855 = "왜 학생의 절반은 불행한가"
164078001 = "샬레의 당번 업무차 집무실을 방문한 미노리. 미노리는 당번 업무 제도의 허점을 지적하며, 이 당번 제도야말로 키보토스의 불평등을 초래하는 원인이라며 열변을 토한다."
432672538 = "SRT, 구입합니다."
131504888 = "미야코의 연락을 받고 백화점을 찾아간 선생님. 미야코는 선물 받은 상품권으로 어떤 물건을 살지 고민 중이었다며, 선생님에게 쇼핑을 도와달라고 부탁을 한다. 여러 가지 물자를 구매한 뒤, 미야코는 새로 구입하려는 수영복의 디자인을 두고 실용성과 귀여움 사이에서 고민에 빠진다."
4182954826 = "SRT, 훈련합니다."
3400306939 = "해상 인질 구출 작전 훈련을 위해 바다 한 가운데로 배를 타고 나간 미야코와 선생님. 미야코는 훈련 내용대로 선생님을 포박하지만, 예상치 못한 문제가 발생한다."
2954136082 = "SRT, 탐험합니다."
1741566074 = "미야코와 함께 물이 빠진 갯벌을 지나 무인도에 놀러 간 선생님. 미야코는 아름다운 섬을 구경하느라 정신이 팔려, 돌아갈 때를 놓치고 만다. 다음 물 때를 기다리며 무인도에서 시간을 죽이던 미야코와 선생님은 우연히 섬에서 한 무리의 토끼를 발견한다."
2048487267 = "SRT, 보고합니다."
2604825862 = "이른 아침, 바닷가에 산책을 나온 선생님은 마찬가지로 아침 운동을 하러 나온 미야코와 마주친다."
3616835660 = "수중 보급 작전"
3120962973 = "사키의 연락을 받고 부둣가로 찾아간 선생님. 사키는 마을 주민들로부터 해산물 채취 허가를 받았다며, 평소에 신세를 진 선생님께 값비싼 해산물을 대접하겠다며 호언장담한다. 하지만 사키는 계속해서 물고기를 잡는 데 실패하고, 마침내 약이 오른 사키는 수중의 물고기를 향해 총을 난사한다."
1056477700 = "수중 보급 작전 2"
3726172857 = "다시 한번 사키의 연락을 받고 부둣가로 찾아간 선생님. 사키는 마을 창고에서 자돌폭뢰라는 물건을 찾았다며, 이번에는 이 도구로 물고기를 잡겠다고 선언한다. 하지만 자돌폭뢰의 위력은 생각보다 강력해 찌른 물고기가 산산조각이 나고 만다."
2099064502 = "갯벌 속의 괴물"
3715648582 = "사키의 연락을 받고 이번에는 갯벌로 향한 선생님. 사키와 선생님은 갯벌 속에서 여러 가지 신기한 갯벌 생물을 채취하며 즐거운 시간을 보낸다."
3856082788 = "깊은 호흡 아래의 바다"
4086115667 = "우연히 어촌을 산책하다 스킨 다이빙으로 해저를 청소하던 사키와 마주한 선생님. 사키는 선생님이 다이빙 경험이 없다는 것을 알게 되고, 선생님에게 다이빙을 함께 하자는 제안을 건넨다."
1203774988 = "부둣가의 저격수"
359062505 = "새로운 위장을 시험해 보고 싶다는 미유의 말에 부둣가를 찾은 선생님. 미유는 그곳에서 주변의 시선을 피하기 위해 낚시꾼으로 위장한 채 낚시를 하고 있었다. 하지만 미유는 얼결에 월척을 낚고, 의도치 않게 주변의 뜨거운 관심을 받고 만다."
1400267850 = "추억을 남기는 방법"
26270932 = "바닷가에서도 평소와 같이 조약돌을 줍고 있던 미유. 선생님은 미유의 곁에서 그녀의 마음에 드는 돌을 고르는 도전을 한다. 잠시 후 선생님이 고른 돌을 본 미유는 전부 마음에 든다며 크게 기뻐한다."
1622439539 = "하늘의 모양"
1698602601 = "바닷가의 하늘을 올려다보며 감상에 젖은 미유. 미유는 선생님과 하늘의 모양에 대한 이야기를 나누며, 다음에 또 한번 바닷가를 찾아오자는 약속을 한다."
2795360293 = "과감한 테스트"
3188344150 = "패션 잡지에서 영감을 얻어 새로운 사복을 시험해 보기로 한 미유. 미유가 신경 쓰여 시내를 찾은 선생님은 번화가 한 가운데에서 수영복 차림의 미유를 발견한다. 시민들의 오해가 계속 쌓이기 시작하자 선생님은 미유를 데리고 황급히 자리를 뜬다."
3972604942 = "스노클링"
4210963508 = "시로코의 연락을 받고 갯바위로 향한 선생님. 그곳에는 식량을 채취하기 위해 스노클링을 준비하는 시로코가 기다리고 있었다. 이후 시로코는 선생님의 격려와 여러 차례의 물질 끝에 환상의 조개를 획득하는 데 성공한다."
4159401028 = "페이스 조절"
3199776909 = "시로코와 산책을 나선 선생님은 생각하지 못한 강행군에 체력이 고갈되고 만다. 페이스 조절 실패로 선생님께 폐를 끼쳤다고 자책하는 시로코. 선생님은 기가 죽은 시로코를 다독이며 서로의 페이스를 맞추기로 한다."
2195713465 = "기대감"
1852257618 = "모두가 잠든 새벽. 리조트 밖을 나서는 시로코를 발견한 선생님은 걱정스러운 마음에 따라간다. 일련의 대화 속에서, 선생님은 시로코가 일상으로 돌아가기 전 모두와의 추억을 다시 새기고 싶음을 알게 된다."
1618207953 = "어울리지 않는 모습"
2833660799 = "모모톡을 받은 선생님은 해변 귀퉁이에서 우이를 발견한다. 우이는 주변의 시선이 부담스러워 해변으로 오게 된 것이었고, 선생님은 다른 사람들도 우이처럼 편해지기 위해 멀리 나온다고 얘기한다."
351695306 = "숲속의 작은 카페"
3456535130 = "선생님은 우이가 얘기한 '괜찮은 장소'에 도착한다.  우이는 자신이 가져온 아이스 아메리카노를 선생님에게 대접한다."
2200786931 = "넘어온 사람들"
2554617240 = "늦은 밤. 우이의 모모톡을 받은 선생님은 해변에 도착한다. 우이는 선생님에게 아이스 아메리카노를 건네며 해변을 산책하자고 제안한다."
612488749 = "불안한 마음"
871353545 = "히나타의 연락에 해변에 도착한 선생님. 히나타는 선베드와 파라솔을 펴고 있었지만, 막상 마음이 불편해 제대로 쉬지 못하고 있었다. 선생님은 히나타를 안심시키고, 히나타는 선베드 위에서 잠이 든다."
586273995 = "멈출 수 없는"
1017214242 = "선생님은 한창 짐을 옮기는 중인 히나타를 발견하고 돕는다. 숲길을 걷던 도중 커다란 바위가 선생님과 히나타를 가로막지만, 히나타는 자신의 괴력으로 바위를 치운다. 이후 번번이 여러 장애물이 히나타와 선생님을 가로막지만 히나타가 모두 해결한다."
3164602540 = "둘만의 고민상담"
3934941890 = "선생님은 히나타와 약속한 장소에 도착한다. 히나타는 선생님에게 고민상담을 해보고 싶다며 도움을 청한다. "
1793982090 = "코하루의 사명"
1618146205 = "폭포 근처에서 여유를 즐기며 쉬던 선생님. 코하루는 선생님이 이상한 짓을 못 하도록 감시해야 한다며 옆에 붙어 감시를 시작한다."
585869769 = "코하루의 위기"
2170214140 = "해변에 도착한 선생님은 바위 위에서 수평선을 응시하던 코하루를 발견한다. 시간이 지나 코하루와 선생님은 섬으로 돌아가려 하지만 밀물이 들어와 당황한다. 코하루는 선생님 등에 매달려 해변을 빠져나온다."
2828338450 = "코하루의 밤하늘"
2677557683 = "해변에서 휴식을 취하고 있던 선생님에게 코하루가 찾아온다. 선생님은 별을 보고 있었다고 설명한다. 코하루도 선생님과 함께 별을 구경한다."
2930606407 = "오늘은 위험하지 않습니다"
3313466648 = "하나코의 부름에 숲속 깊은 곳으로 찾아간 선생님. 하나코가 말한 좋은 것이란 다양한 종류의 과일이었다. 평소와 다른 하나코의 모습에 선생님이 의아해하자, 하나코는 남들이 보지 않는 곳에서 곤란하게 만드는 것은 의미가 없다고 전한다"
1688906964 = "보는 사람이 없다면 의미도 없다"
30901074 = "산책을 하다 하나코의 노랫소리를 듣게 된 선생님. 하나코는 폭포 앞 호수에서 자연을 느끼고 있었다. 함께 들어와 주지 않고 거리를 두는 선생님에게 심술이 난 하나코는 선생님을 물속으로 끌어들인다."
3660308927 = "의외로 서툰 모습"
1134041130 = "바닷가에서 일몰을 감상하던 선생님을 찾아온 하나코. 하나코는 선생님에게 자신의 진심과 평소의 감사를 전한다."
3237828853 = "여름 바다의 요조숙녀"
3696068603 = "휴가를 맞아 바닷가를 찾은 선생님. 그 화창한 여름날에는 요조숙녀 미모리의 특별한 대접이 기다리고 있었다."
2716709284 = "여름 바다의 독심술"
1386038324 = "휴가로 바닷가에 왔지만, 선생님은 이런 사치스러운 한가함이 그저 낯설게 느껴진다. 무어를 할지 몰라 방황하는 선생님에게 '독심술사' 미모리가 명쾌한 해답을 제시한다."
502611754 = "여름 바다의 추억"
2287028514 = "선생님은 미모리와 함께 바닷가에서 여러 추억을 만든다. 그리고 휴가의 마지막이 다가올 무렵, 미모리는 아쉬운 마음에 자신도 모르게 어리광을 부린다."
3374542908 = "물자 조달"
1098258998 = "선생님은 새로운 태블릿 펜을 구매해 메루에게 선물한다. 메루는 생각지도 못한 호화스러운 선물에 놀라며, 선생님에게 보답할 거리를 찾는다."
507087033 = "창작의 고통 1"
639372066 = "자신의 작품 속 여주인공의 심리를 이해하고자 고뇌하는 메루, 선생님은 그런 메루를 돕기 위해 붉은겨울 바깥을 산책하자고 제안한다."
279895958 = "창작의 고통 2"
750286265 = "이전의 산책에 보답하고자 선생님을 초대한 메루는, 선생님에게 '자신의 영역'에 있는 사람들을 위한 특별한 장소들을 소개한다."
509591439 = "붉은겨울로의 초대"
1337054964 = "메루는 지식해방전선의 도서관에 선생님을 초대하고, 자신이 주로 작업을 하는 도서관 내부의 작업실을 소개한다."
4118174099 = "책을 찾는 여정"
2690079847 = "지식해방전선이 만든 전설의 회지가 붉은겨울 학원 내에 있다는 소식을 듣고, 이를 찾으려는 모미지. 회지의 행방은 묘연하지만, 선생님과 모미지는 함께 전설의 회지를 찾아 나선다."
3986459082 = "무언가를 모으는 이유"
1425412045 = "블랙마켓에서 모미지를 만난 선생님은, 모미지가 희귀한 판본을 모으는 이유에 대한 설명을 듣게 된다."
1047874892 = "축제의 현장"
3177169936 = "모미지와 선생님은 붉은겨울 책 축제를 돌아보며, 다양한 책을 함께 구경한다."
2690106276 = "약간의 일탈"
972013378 = "도서관 휴관일에 선생님을 초대한 모미지, 모미지는 선생님에게 조심스럽게 도서관에서 낮잠을 자 볼 것을 권유한다."
3995225634 = "기억되지 않는 것들에 대하여"
3485332196 = "선생님은 도서관에서 모미지와 함께, 모미지의 소중한 콜렉션을 찾으려 노력한다."
2596706043 = "치어리더 코토리"
3172089424 = "무언가 보여줄 게 있다며 선생님을 찾아온 코토리. 코토리가 보여주고자 했던 건 스트레칭이었다. 호기롭게 스트레칭을 시작하지만 생각만큼 잘되지 않아 풀이 죽는 코토리. 선생님은 코토리를 달래주며, 함께 스트레칭을 이어간다."
17391138 = "확실히 도움이 됐어"
4279232490 = "몰려드는 운영관리 업무를 돕고자 찾아온 코토리. 선생님은 코토리에게 잠시 응대 업무를 부탁하고 화장실로 향한다. 잠시 후 돌아온 선생님이 마주친 건 홀로 남은 코토리였다."
3384821961 = "그것과 이것은 별개"
1026815239 = "왠지 지쳐 보이는 코토리가 걱정이 되어 대기실을 찾은 선생님. 코토리는 현기증에 시달리면서도 증상에 대해 설명을 하려고 한다. 선생님은 그런 코토리를 대신하여 현기증에 대한 설명을 시작하고 선생님의 배려 덕분에 코토리는 기분 좋게 휴식을 취한다."
4197919104 = "설명하면 안 되는 것"
1567162534 = "모든 경기가 끝나고 여운에 잠겨 있는 코토리. 이 시간이 다시는 돌아오지 않을 것이라며 아쉬워하는 코토리에게 선생님은 다시 돌아오지 않기에 소중한 것이 있다고 가르쳐 준다."
3782074268 = "저도 이 정도는 가능하답니다."
1692291987 = "현장 의료 봉사 일을 지원하러 온 선생님은 하루나와 마주친다. 하루나는 의료봉사 일을 돕겠다며 나서고 능숙한 솜씨로 학생들을 응급 처치한다. 일이 소강상태에 접어들자, 하루나는 선생님에게 미식 투어를 하자고 제안한다."
348600508 = "이것이야말로 새로운 미식이군요."
1226749390 = "선생님은 하루나에게서 분자 요리 시식을 권유받는다. 선생님은 그 식감에 신기해하지만, 사람들은 분자요리 자체를 낯설어하고 있었다. 그러자 하루나는 익숙한 분자요리라고 할 수 있는 솜사탕을 같이 제공할 것을 제안하고, 하루나의 제안은 성공적으로 작동한다."
4164938916 = "탐구의 길은, 어디에나."
616408418 = "드물게도 경기 참여 의사를 보이는 하루나. 사실 하루나는 음식을 제공하는 경기 위주로만 참가 신청을 한 것이었다. 이윽고 경기가 시작되고, 하루나는 제공되는 음식들에게 냉정한 평가를 내린다. 대망의 마지막 경기인 사탕 먹기 경주에서, 하루나는 결국 1등으로 입상한다."
407871367 = "기분 전환 같은 것이라고 해 두죠."
1501629589 = "뜨거운 운동회장의 열기 중에서 선생님과 만난 하루나. 하루나는 장난처럼, 그러나 진심같이 보이는 태도로 '저 오늘, 뭐 달라진 거 없나요?'라는, 무서운 질문을 건네 오는데……!"
393076 = "좋은 게 좋은 거"
1711403022 = "트리니티에서 선생님의 안내를 맡은 이치카. 이동하던 두 사람은 길거리에서 작은 소동을 목격한다. 개입하지 않아도 괜찮냐는 선생님의 물음에 이치카는 할 일도 있고 그다지 큰 소동도 아니니 괜찮다며 자리를 뜬다. 그렇게 일정을 마친 두 사람. 이치카는 조금 전 미루어 두었던 일을 정리하러 돌아가고, 선생님도 함께한다."
517994058 = "대단할 거 없는 일임다"
3421689892 = "쇼핑몰에서 기타를 바라보던 이치카와 마주친 선생님. 이치카는 기타에 열심인 사람들을 보고 자신도 기타를 쳐볼까 고민하고 있었다 말한다. 하지만 사실 기타에는 큰 흥미가 없었다며 마음을 접으려는 이치카에게 선생님은 기타 연주를 들려 달라고 말한다."
2193199583 = "한 가지 약속을 하도록 하죠"
1203125809 = "공원에서 상자를 가득 쌓아 둔 이치카와 마주친 선생님. 이치카는 평소 뭐든 금방 싫증 내는 성격 탓에 프리마켓을 자주 이용한다고 말한다."
4264961292 = "당분간은"
679592225 = "이치카와의 약속 장소에 도착한 선생님. 이치카는 마침 풍선을 놓친 아이를 도와주고 있었다. 뭐든 다방면으로 잘하지만 반대로 한 가지에 열중할 수 없는 게 고민이라는 이치카. 그런 이치카에게 선생님은 굳이 노력하지 말고 조금 더 마음 가는 대로 해 보라 조언한다."
502045279 = "키누가와 카스미"
950569097 = "카스미를 찾아 카스미의 아지트를 찾은 선생님. 카스미는 다음 발파 계획을 세우고 있었다. 선생님은 최대한 카스미가 사람이 적은 곳을 선택하도록 유도하고 카스미는 다행히 빈 산골짜기를 다음 목표로 설정한다."
1233217562 = "나는 발파 작업이 좋다"
1087254379 = "카스미의 연락을 받고 공사장을 찾은 선생님. 자신은 성공 여부와 관계없이 발파 작업 자체를 즐긴다며 샬레 건물 또한 눈여겨보고 있기에 온천 포인트 선정에 진지하게 임해달라 말한다. 그렇게 둘은 밤새 다음 포인트를 고민한다."
3742902787 = "지적인 모습"
2660660211 = "카스미를 샬레로 초대한 선생님. 카스미는 토목이나 지질학, 건축공학에 관련된 다양한 책들을 가져와 공부를 시작한다. 선생님은 카스미에게 원한다면 언제든지 찾아와도 된다며 잡담의 시간을 보낸다."
973472567 = "깊은 산중의 구조요청"
873006730 = "카스미의 구조 요청을 받고 산속으로 들어온 선생님. 카스미는 포인트를 찾다가 미끄러져 슬리퍼가 찢어진 상황이었다. 선생님은 자신의 상태가 괜찮다며 새 슬리퍼를 건네 달라는 카스미를 업고 산을 내려온다."
660551613 = "호화롭게"
3056310614 = "붉은겨울 학원에 방문한 선생님은 시구레의 권유를 받아 새로 개조한 특별탕에 들어가게 된다. 하지만 갈수록 피부가 달아오르는 듯한 느낌을 받은 선생님은 시구레에게 특별탕의 재료에 대해 묻고, 의외의 답변을 듣게 되는데……"
3965412169 = "진지하게"
3457735752 = "선생님과 함께 대중목욕탕에 방문한 시구레는 목욕탕 사장으로부터 특제 후르츠 밀크의 레시피를 알려달라는 부탁을 듣게 된다. 시구레는 레시피를 알려주는 대신, 한 가지 부탁을 한다."
3617991952 = "따듯하게"
1568896138 = "목욕탕에서 일일 우유 바텐더로 일하게 된 시구레. 선생님은 시구레를 지켜보다가 막차를 놓치게 되고, 숙소를 구하지 못한 선생님을 위해 시구레는 직원 숙소의 한 곁을 내어준다."
4190060998 = "갑작스럽게"
1068432655 = "시구레가 새롭게 정비한 탕에 들어간 선생님은 자신을 따라 들어온 시구레로부터 평소와는 다른 미묘한 위화감을 느낀다."
3198653942 = "혹시나 하는 마음에"
3736796703 = "자기 능력이 생각만큼 잘 발휘되지 않는 것이 고민이던 미사카 미코토에게, 선생님은 능력이 있어서 아쉬웠던 점에 대해 생각해 볼 것을 조언한다."
3828858953 = "천성적 분위기"
4050729238 = "불량배들에게 둘러싸여 곤란해하던 미사카 미코토는 선생님에게 도움을 요청한다. 선생님은 미사카 미코토가 불량배들에게 둘러싸이게 된 이유를 듣고, 불량배들이 나쁜 목적으로 미사카 미코토에게 접근한 것이 아니라는 것을 알게 되자 안심한다."
735396316 = "이심전심"
2449311845 = "미사카 미코토는 괴상한 모습의 모모프렌즈 인형들을 보며 말을 잇지 못하지만, 호불호가 갈리는 캐릭터들이라는 사실을 알게 된 뒤로 왠지 모를 동질감을 느낀다."
3584522966 = "생각해 보니 맞네"
4025701392 = "자판기를 걷어차는 미사카 미코토를 본 선생님은, 공공 기물을 훼손하는 것은 옳지 않다며 미사카 미코토를 훈계한다. 미사카 미코토는 억울해하지만, 선생님이 학생에게 옳은 말을 하는 것은 당연하다는 사실을 뒤늦게 깨닫는다."
718444544 = "멘탈 아웃"
1123173044 = "쇼쿠호 미사키는 선생님에게 능력을 쓰겠다며 위협하지만, 선생님은 되려 쇼쿠호 미사키에게 능력을 사용해 달라고 요청한다. 당황한 쇼쿠호 미사키는 선생님에게 이유를 묻고, 선생님은 쇼쿠호 미사키가 자신에게 암시를 걸어주었으면 하는 이유를 말해준다."
1711116450 = "누구에게나 약점은 있다"
716760121 = "쇼쿠호 미사키의 머리가 아픈 것이 운동 부족일 것으로 생각한 선생님은 쇼쿠호 미사키를 빈 운동장으로 불러내고, 다짜고짜 운동장을 달리기 시작한다. 쇼쿠호 미사키는 한 바퀴도 달리지 못한 채 쓰러지고, 선생님은 쇼쿠호 미사키를 병원으로 데려간다."
3008897746 = "배려"
3840979936 = "상점가를 거닐던 쇼쿠호 미사키는 자신의 앞에서 한 손님이 아르바이트 학생을 곤란하게 하는 모습을 발견한다. [USERNAME] 선생님이 손님에게 무어라 하기도 전에, 쇼쿠호 미사키는 자신의 리모콘을 들어 버튼을 누른다."
1142774852 = "까다로움"
2658033607 = "쇼쿠호 미사키는 음식점을 찾는 자신만의 까다로운 기준에 대해 설명하지만, 선생님은 그런 기준에 맞는 완벽한 식당이 있다며 쇼쿠호 미사키를 안내한다."
3833015538 = "나는 전설이다"
2064820506 = "도시 전설이 살아 움직이는 것 같은 키보토스의 광경에 감탄하는 사텐 루이코, 선생님은 키보토스 주민의 입장에서는 사텐 루이코가 오히려 도시 전설같은 존재라고 말하고, 그 말을 들은 사텐 루이코는 전설이 된 자신의 존재에 전율한다."
752863816 = "의외로 똑같은 것들"
3683657408 = "사텐 루이코는 키보토스의 주민들이 마작을 치던 모습을 보고, 다른 세계임에도 마작이라는 게임의 존재와, 룰이 모두 똑같다는 것에 신기함을 느낀다."
3697516015 = "배팅 내기"
4003979523 = "야구 배팅장에서 배팅을 하던 사텐 루이코는, 야구 배팅장 한 켠의 수상한 경고판이 붙어있는 타석을 발견해 안으로 들어서고, 걱정하는 선생님에게 되려 배팅 내기를 제안한다."
900027051 = "대단한 부분"
123698568 = "사격 연습을 하는 사텐 루이코는 선생님에게 자신이 사격 연습을 하던 이유에 대해 이야기하고, 선생님은 자신의 재능을 찾기 위해 노력하는 마음가짐은 좀처럼 보기 어렵다며 사텐 루이코를 칭찬한다."
3866139307 = "전부 처음 해보는 것이어요!"
1895217624 = "선생님은 한숨을 돌린다는 뜻의 의미를 제대로 이해하지 못한 유카리에게 오락실에서 시간을 보내볼 것을 권유하고, 처음으로 경험해 보는 오락실의 다양한 게임들에 유카리는 완전히 매료된다."
3444356400 = "막과자의 맛이 엑서얼~란투인 것이어요!"
946448440 = "짠맛을 가진 과자라는 개념이 생소한 유카리와 함께 곳곳의 막과자집을 돌아다니며 다양한 막과자들을 권한다. 유카리는 막과자의 맛과, 막과자집의 다양한 문화에 놀라움을 금치 못한다."
1592716139 = "쉬는 것도 중요한 법이어요!"
3393753597 = "선생님과 함께 시간을 보내기 위해 집무실에 방문한 유카리, 선생님이 업무를 마치고 유카리와 밖으로 나가려 하지만, 갑자기 비가 쏟아지기 시작한다. 선생님은 유카리에게 함께 놀지 못할 것 같다며 사과하지만, 유카리는 그런 선생님에게 자신의 진심을 담아 위로의 말을 전한다."
3227087653 = "기다리는 시간조차 즐거이"
3133093112 = "선생님은 유카리와 함께 백귀야행의 상점가에서 시간을 보내기 위해 약속장소로 향하고, 그곳에서 선생님을 기다리고 있던 유카리를 만난다."
1618618962 = "청춘의 스승님"
2730442199 = "렌게의 부탁을 받아 백화요란을 찾은 선생님, 그곳에서 선생님은 렌게로부터 앞으로 <청춘 활동>을 하고 싶다며, 청춘스러운 활동에 대한 상담을 받게 된다. 여러 이야기를 나눈 끝에 선생님은 렌게와 <청춘 사제관계>가 되기에 이른다."
2356886607 = "청춘의 정석: 전학생"
3406357501 = "렌게는 선생님에게 <청춘 활동>의 일환으로 전학생 이벤트를 함께 해보자며 제안하지만, 뜻대로 잘 풀리지 않는다. 그대로 모처럼 렌게가 준비한 이벤트가 엉망이 되려는 찰나, 선생님은 렌게에게 전학생에게 소개하듯 주변을 소개해 달라 부탁한다."
1544493195 = "청춘의 정석: 소꿉친구"
3623899194 = "어느 날 아침. 렌게가 선생님을 덮친다. <청춘 활동>의 일환으로서 소꿉친구 이벤트를 시작하자는 렌게에게 선생님은 어울려주게 된다. 그렇게 만족스럽게 <청춘 활동>을 마무리하려는 그때, 일련의 행위들이 마치 데이트 같다고 이야기하는 선생님의 말에 렌게는 당황하며 황급히 자리를 떠난다."
3348684246 = "청춘의 감사를 담아"
1912112273 = "밥 먹는 것조차 잊고 밀린 업무를 처리한 선생님은 렌게의 <청춘 활동>에 어울려주다 쓰러지게 된다. 이를 자신 때문이라고 생각한 렌게는 다음 날, 자신을 위해 힘내준 선생님에게 직접 만든 도시락을 건네준다."
645991912 = "청춘의 하얀 리본"
1111293954 = "선생님에게 청춘 소설의 주인공이 하던 하얀 리본을 선물 받은 렌게. 둘만의 청춘을 즐긴다."
4231253403 = "저택을 지키는 고양이"
3314480634 = "키쿄의 호출로 백화요란을 찾은 선생님은, 건물의 이곳저곳이 낡은 걸 알게 된다. 신경 쓸 필요 없다 말하는 키쿄였지만, 선생님은 직접 건물을 수리하겠다고 나선다. 도와주지 않을 거라는 키쿄의 말도 무색하게 수리를 시작한 선생님의 모습에, 끝내 키쿄 또한 그 수리를 돕고 답례로 선생님에게 저녁밥을 대접한다."
2471480039 = "맺고 끊음은 확실하게"
3763484608 = "지난번 백화요란의 건물을 수리해 준 것에 대한 답례를 하고 싶다며 키쿄가 샬레를 방문한다. 그때의 빚을 청산하고자 어떤 일이든 시킬 수 있는 기회를 주겠다는 키쿄의 말에, 그럼 선생님은 키쿄가 쉬었으면 한다 말한다. 당황하는 키쿄였지만 자신이 뱉은 말을 지키기 위해 결국 휴식을 취하기로 한다."
3365191938 = "보이고 싶지 않았던 모습"
4099866023 = "샬레의 업무로 백귀야행을 방문한 선생님은 키쿄의 도움을 받은 사람들이 건넨 답례품을 들고 백화요란을 찾는다. 그곳에서 마침 선생님은 쓰러진 키쿄를 발견하게 되고, 키쿄는 나약한 자신의 모습을 남에게 보여주고 싶지 않았다 말하지만, 선생님은 쉴 때는 필요한 법이라며 주민들에게 받은 선물을 건네며 키쿄를 보살핀다."
375291297 = "마음을 열고"
810913540 = "지난번의 답례를 하고 싶다는 키쿄의 연락을 받은 선생님은 백화요란의 창고에 도착한다. 그렇게 창고 안으로 들어서자, 그곳에선 키쿄가 선생님을 맞이한다."
2188741523 = "패션 특훈"
2709052074 = "패션 특훈을 하겠다며 찾아온 에이미. 에이미의 다소 어긋난 패션 센스를 확인한 선생님은 함께 수영복을 고르러 가기로 약속한다."
3737979995 = "실전 패션"
2681531124 = "에이미와 수영복을 고르기로 한 당일. 에이미가 수영복을 입고 가려는 곳은 빙해였다. 선생님은 그런 에이미를 위해 방한용품을 챙겨주고 에이미는 수영복 위에 재킷이라는 엄청난 패션을 완성시킨다."
3806087283 = "작전 준비"
4246151599 = "초현상 특무부에 찾아간 선생님. 에이미는 수영복 차림에 재킷을 걸친 채 자신만의 선풍기를 만들고 있었다."
2234223693 = "냉수욕"
3146169999 = "에이미의 연락을 받고 호기심에 현장을 찾아간 선생님. 그곳에서 목격한 것은 얼음에 구멍을 뚫고 냉수욕을 즐기는 에이미였다."
228855696 = "은밀한 산행"
2565918406 = "등산 입구에서 선생님은 녹음기를 들고 있는 코타마와 마주친다. 코타마는 녹음기를 들고 온 목적에 대해 변명을 하고, 선생님은 코타마에게 함께 등산을 하자고 제안한다. 등산을 시작한 코타마는 금방 지쳐버리고, 선생님이 그녀를 도와주기 위해 손을 뻗는다. 두 사람의 손을 맞닿는 순간, 코타마는 자신이 이전에 했던 말을 떠올리고 부끄러워한다."
3369167674 = "자연의 소리 1"
2380232793 = "등산을 하기 위해 다시 산을 찾은 선생님은 그곳에서 녹음기를 든 코타마와 다시 마주친다. 코타마는 모닥불 소리를 녹음하기 위해 찾아왔다며, 모닥불을 피우기 위해 여러 가지 방법을 사용한다. 하지만 결국 실패하고, 코타마는 선생님의 도움을 받는다."
3281512578 = "자연의 소리 2"
2625303492 = "지난번의 실패를 곱씹으며 고민을 하던 코타마. 이번에는 순수한 자연의 소리를 녹음하겠다며, 코타마는 준비 없이 산을 오른다. 얼마 후, 커다란 고목을 발견한 코타마는 고목의 안에서 들려오는 소리에 귀를 기울인다."
2980225488 = "반향"
1001482326 = "선생님과 함께 정상 등반을 시도하는 코타마. 힘든 여정 끝에 두 사람은 정상에 도착하고, 선생님은 반대편 산을 향해 함성을 지른다. 되돌아오는 메아리 소리를 들으며 코타마는 메아리에 대한 자신의 감상을 이야기한다."
2146835391 = "디지털 노마드"
886315080 = "하레의 연락을 받고 근교의 공원을 찾아간 선생님. 그곳에서 하레는 디지털 노마드처럼 야외 작업을 하기 위해 여러 가지 장비를 설치하고 있었다. 만반의 준비를 갖춘 하레는 작업을 시작하지만, 곧 야외 작업 특유의 불편한 단점들이 드러난다."
3941496298 = "글램핑"
1758508230 = "샬레의 업무차 오랜만에 베리타스 부실을 방문한 선생님. 어째서인지 베리타스 부실은 추울 정도로 에어컨을 강하게 틀어놓은 상태였다. 하레는 서버를 시험하느라 냉방을 강하게 틀어놓았다며, 에어컨 바람을 피해 캠핑 장비에 들어가 나태한 글램핑을 시작한다."
3942846821 = "세상에서 가장 큰 서버"
2015698466 = "점검 중 해커로부터 익명의 도전장을 받게 된 하레. 도전장에 적힌 좌표에 '세상에서 가장 큰 서버'가 있다는 말에 하레와 선생님은 좌표를 향해 산행을 시작한다. 목적지에 도착한 하레는 그곳이 폐쇄된 천문대임을 깨닫게 되고, 하늘의 별을 바라보며 상냥한 인사를 보낸다."
3682214390 = "디카페인"
1655277294 = "카페인을 끊기 위해 편의점이나 냉장고가 없는 야외에서 작업을 하기로 한 하레. 하지만 곧 카페인 금단증상이 나타나고, 그런 하레를 위해 선생님은 직접 내린 커피 한 잔을 건넨다. 커피를 마시고 진정한 하레는 그 커피의 정체가 디카페인 커피였다는 말을 듣고 놀란다."
850398333 = "만마전의 위대한 의장님!"
3031741265 = "마코토의 초대를 받고 만마전을 찾은 선생님. 마코토는 만마전과 손을 잡으라며 선생님을 회유하지만 선생님은 마코토의 제안을 거절한다."
4070412729 = "위대한 의장님의 사업 활동"
1791984264 = "만마전의 진가를 보여주겠다며 샬레를 찾은 마코토. 선생님은 마코토에게 이끌려 인쇄소, 리조트 등 만마전의 사업장 순회에 함께하게 된다. 상점가에서 잠깐의 트러블이 발생하지만 마코토는 훌륭하게 문제를 해결하고 의장님다운 모습을 보여준다."
3478178877 = "위대한 의장님의 여가 활동"
4007523766 = "쇼핑몰에서 라이언마루를 위한 간식을 사러 나온 마코토를 만난 선생님. 갑자기 쓰러진 마코토를 이끌고 병원을 찾고, 마코토는 고양이 알레르기라는 진단을 받는다. 하지만 그럼에도 마코토는 끝까지 라이언마루를 돌보겠다고 선언한다."
1780717963 = "위대한 의장님의 일상"
1041879085 = "그동안 만마전이 벌인 사업의 성과를 보여주겠다는 마코토. 그러나 모든 사업장에서 트러블이 발생, 막대한 피해를 입을 위기에 처한다. 몰아치는 충격에 잠시 흔들리는 마코토였지만 역경에 굴하지 않고 트러블을 하나하나 해결해 나간다."
1474073232 = "아무튼 질 수 없어요!"
3557545465 = "아코의 연락을 받고 찾아온 선생님은 아코로부터 만마전에 대한 불만을 듣는다. 결국 이대로 질 수 없다며 선생님에게 드레스를 같이 골라달라고 말하는 아코. 그렇게 선생님이 추천해 준 드레스를 본 아코는 이내 당황하며 역시나 선생님은 풍기가 문란하다는 말을 남긴 채 황급히 자리를 떠난다."
3679592377 = "아무튼 반품할 거예요!"
2522776615 = "아코와 함께 드레스를 보던 중, 자신의 드레스 차림에 칭찬을 아끼지 않는 선생님의 말에 아코는 부끄러워한다. 직후 만마전이 소동을 일으키고 있단 연락을 받은 아코는 황급히 자리를 떠나게 되고, 대신하여 드레스를 떠맡게 된 선생님은 직원의 추천으로 함께 입을 이너웨어까지 구매하게 된다."
2124286988 = "아무튼 그런 걸로 해둬요!"
2646682580 = "아코는 곧 개최될 파티의 사전 준비를 위해 선생님과 친목 모임에 참석한다. 드레스 차림이 익숙지 않아 불편해하는 아코를 선생님이 직접 에스코트하지만, 곧 드레스가 찢어지는 불상사가 일어나고야 만다."
2761186677 = "이부키와 함께 게임을!"
2632442291 = "당번 활동을 위해 샬레에 온 이부키. 선생님의 업무를 도우려 집중하지만, 게임기와 장난감에 관심이 쏠리고 만다. 결국 선생님은 그런 이부키와 함께 놀기로 한다."
1254725189 = "이부키와 함께 소풍을!"
3516138625 = "함께 놀이공원에 가기로 약속한 이부키와 선생님. 소풍을 위해 도시락을 준비하며 다음 날을 기다리지만, 애석하게도 비가 오고 만다. 선생님은 풀죽은 이부키를 위해 샬레를 놀이공원이라고 선언하고, 이부키와 즐거운 하루를 보낸다."
2360081099 = "이부키와 함께 직업 체험을!"
685531614 = "학교에서 <장래 희망 조사서>를 받은 이부키. 커서 어떤 일을 할 수 있을지 모르겠다는 이부키의 말에, 선생님은 여러 곳을 돌아다니며 이부키에게 직업 체험을 시켜 준다."
2071765566 = "이부키와 함께 산수 교실!"
2159313193 = "지난번 여러 직업을 체험해 본 후 가장 좋아하는 일이 무엇인지 생각해 보았다는 이부키. 그것은 바로 '선생님'이다. 이부키는 자신만의 작은 교실에 선생님을 초대해서 즐겁게 산수 수업을 시작한다."
2194837532 = "히나와 드레스 1"
58131079 = "게헨나의 사교 파티에 참석하게 된 히나. 히나는 선생님에게 사교 파티를 위해 어떤 준비가 필요한지 조언을 구한다. 이에 선생님과 히나는 복장부터 갖추기 위해 창고를 뒤져 히나가 어릴 적 입었던 드레스를 찾아낸다. 히나는 드레스를 입어 보지만 역시 찢어져 버리고 둘은 함께 드레스를 고르러 가기로 약속한다."
324299341 = "히나와 드레스 2"
2948041859 = "히나와 함께 드레스를 고르기로 한 당일. 히나는 선도부 일로 약속 시간에 늦게 되고, 선생님에게 드레스 쇼핑을 부탁한다."
1999678653 = "히나와 피아노"
1434829550 = "히나의 초대를 받은 선생님. 둘만의 공간에서 히나는 선생님을 위한 연주를 시작한다."
2011469792 = "늘어져 있는 시간"
803201985 = "카요코의 연락에 오페라 하우스 뒤쪽 작은 골목 가에 도착한 선생님. 그곳에서 선생님과 카요코는 대화를 나누기 시작한다."
1182512530 = "분위기에 맞는 옷"
2124358865 = "사무실에 도착한 선생님을 맞이하는 카요코. 선생님은 사무실 한쪽에서 먼지 쌓인 드레스를 발견한다. 이후 선생님은 카요코에게 저녁을 먹자 제안하고 카요코는 마지못해 수락한다."
1671331120 = "어린애의 오기처럼 보이겠지만"
2297857782 = "선생님은 사무실에서 드레스 차림으로 카요코와 마주친다. 카요코는 전에 말했던 답례를 하고 싶다고 말하고, 선생님이 거절하려 하자 과거에 했던 말을 돌려준다."
2029319155 = "걸어 둔 드레스"
3430969351 = "말끝을 흐린 아루가 걱정된 선생님은 흥신소 사무실로 향한다. 선생님의 갑작스러운 방문에 놀란 것도 잠시. 아루는 줄곧 고민이었던 드레스의 처분에 대해 조언을 구한다."
3483710198 = "조금은 비슷해졌을까"
2862818090 = "아루의 부탁을 받아 사업 설명회장에 도착한 선생님. 아루는 잔뜩 기대한 사업 설명회가 엉망진창인 것에 실망하고 시무룩해한다. 선생님은 그런 아루를 위로하기 위해 특별한 장소로 안내한다."
3809174998 = "또 동결된 계좌"
3868290257 = "약속 시간이 됐음에도 약속 장소에 나타나지 않는 아루. 걱정하는 선생님의 귓속으로 아루의 목소리가 들린다. 어딘가 곤란에 처한 모습에 선생님은 구원의 손길을 내밀고, 아루는 선생님의 도움에 깊은 감사를 표한다."
761424835 = "목적을 달성하는 방법"
2024730199 = "아카리는 새해 음식 많이 먹기 대회에 참가하려 하지만, 대회 측은 여러 해 동안 우승해 온 아카리가 다시 참가하는 것은 곤란하다며 난색을 표한다. 선생님의 제안으로 올해의 많이 먹기 대회는 챔피언인 아카리에게 도전하는 형태로 치러지게 되고, 아카리는 당당히 챔피언의 자리를 지켜내게 된다."
882945439 = "Do It Yourself!"
3977936515 = "아카리는 오조니를 만드느라 부족해진 떡을 직접 만들어 먹기 위해, 떡 체험관을 방문한다."
1458542543 = "행운을 이루기 위해"
2394074920 = "'해넘이 우동'을 먹기 위해 우동 투어를 시작한 선생님과 아카리. 지역의 모든 유명 우동집을 제패하면 인증서를 준다는 것을 알게 된 아카리는 해가 질 때까지 지역을 돌아다니고, 마침내 우동 제패 인증서를 받게 된다."
1588234287 = "축제란 멋지죠. 정말, 정말, 정말로요!"
496070893 = "백귀야행의 축제에 선생님을 초대한 우미카는 축제장 이곳저곳을 누비며 선생님을 안내한다."
336809221 = "과거의 저는 그런 아이였답니다."
1264327924 = "모처럼 백야당을 방문한 선생님. 선생님은 우미카와 함께 한가한 오후를 맞이하고, 우미카는 그 틈을 타 줄곧 고민이었던 속내를 털어놓는다."
63381328 = "축제를 방해하는 아이들은 혼나야 해요!"
799850412 = "우미카의 연락을 받고 백야당을 찾은 선생님. 선생님은 그곳에서 말썽쟁이 손님들을 마주하고 당황한다. 하지만 당황도 잠시, 선생님은 우미카를 위한 조언을 건네고, 조언을 받아들인 우미카는 진심이 담긴 안내와 접객을 보여주겠다며 행동하기 시작한다."
1822406799 = "단 한 사람만을 위한 축제."
3628022907 = "백야당을 찾은 선생님을 격한 환영 인사로 맞이하는 우미카. 우미카는 선생님을 위해 준비했다며, 한 사람만을 위한 특별한 축제에 선생님을 초대한다."
2198939886 = "처음, 그리고 마지막"
3468668910 = "축제 준비를 구경하다가 약간 늦은 우미카. 선생님과 축제에 대한 추억을 이야기하다가, 소중하게 간직해 왔던 오래된 축제 인형을 수줍게 보여드린다."
3045026029 = "또 다른 수행(?)"
4119105229 = "츠바키의 초대로 백귀야행을 방문한 선생님은 그곳에서 색다른 가이드를 받게 된다."
418161561 = "속성 강좌"
1812128083 = "선생님에게 수면 가이드를 해주겠다며 샬레에 찾아온 츠바키. 하지만 '백귀야행의 잠자는 공주'가 샬레에 등장했다는 소문을 듣고 불면증에 시달리는 온갖 학생들이 샬레로 몰려든다. 츠바키는 그런 학생들을 위해 제대로 잠을 자는 법을 가이드하기 시작한다."
2010941900 = "좋은 잠, 좋은 꿈."
1529221547 = "한밤중, 백귀야행에서의 업무를 마친 선생님은 츠바키에게 연락한다. 츠바키는 선생님을 위한 둘만의 가이드를 시작하고, 피로에 지친 선생님은 잠에 빠져든다."
4052115729 = "보컬 연습"
2194871063 = "선생님은 근처 노래방에서 카즈사의 노래 연습을 돕는다."
2034375151 = "방과후 밴드부"
3425425496 = "선생님을 찾아온 카즈사는 연습 도중에 차마 먹지 못했던 디저트를 꺼내 선생님과 함께 나누어 먹는다."
3700069782 = "제 담당이 맞습니다."
3288920718 = "선생님과 카즈사는 카즈사가 설계한 최적의 루트를 따라 여러 디저트 가게를 돌아다닌다. 마지막 디저트 가게에서 카즈사를 뮤지션으로 오해한 주인에게 카즈사는 선생님을 자신의 '담당 매니저'라고 소개한다."
1720743063 = "슈가 하이"
4202174343 = "아이리의 초대로 시내로 나오게 된 선생님. 평소보다 들뜬 아이리와 함께 한 카페를 찾는다. 생각보다 긴 줄에 어찌해야 할지 고민하던 아이리와 선생님은 끝까지 기다리기로 한다."
2100881557 = "슈가 러시"
3689167069 = "아이리의 연습을 봐주기로 한 선생님. 동아리실로 가던 중 갑작스러운 소나기를 만나고 아이리는 자신의 재킷을 들어 함께 쓰고 가자 제안한다."
3093181537 = "슈가 크래시"
113729469 = "밴드부로 활동하던 일정이 끝나고 심란해진 아이리를 위해 선생님은 상담을 시작한다."
3799374904 = "미적 감각"
316334877 = "각자의 개성이 뚜렷한 부원들에게 옷 구입을 맡기는 것에 불안함을 느낀 요시미는 선생님과 함께 쇼핑몰을 찾고 조언을 구한다. 하지만 선생님은 둘이서 만난 이유에 대해 캐물으며 장난을 치고 요시미는 당황하며 화를 낸다. 이후 선생님은 친절하게 요시미에게 옷 선택에 대해 조언을 주고 구매한 옷들을 동아리실까지 옮겨준다."
2596685212 = "디자인 조언?"
1913792740 = "선생님은 요시미의 도움 요청에 카페로 향한다. 하지만 요시미가 고민하고 있던 디자인은 자신의 사인이었다. 일어나지 않은 일에 대한 기대감에 부푼 요시미를 선생님은 놀리고 요시미는 자신이 한 행동에 대해 자각한다. 곧 카페 점원이 찾아오고 주문한 메뉴들의 영수증을 건네고 사인을 부탁한다. 이에 요시미는 영수증에 사인하지만 무의식적으로 밴드부 사인을 하고서 당황한다. 이에 선생님은 실수한 요시미를 놀린다."
3164217481 = "한 사람을 위한 연주"
2214771348 = "요시미의 연락에 약속한 장소에 도착한 선생님. 요시미는 선생님을 위한 곡을 연습했다고 말하고 연주를 들어달라고 부탁한다. 연주 시작 전, 요시미가 호흡을 가다듬지만 잘되지 않자 결국 자리에 앉아 연주를 시작한다. 요시미의 멋진 연주에 감탄한 선생님은 앵콜을 요청하면서 장난을 친다. 요시미는 부끄러워하지만 결국 선생님을 위해 준비했던 곡을 모두 연주한다."
3782277926 = "키라라의 부활동"
1447560689 = "게헨나에서 개인적인 일을 마치고 돌아가던 중, 키라라를 마주친 선생님. 선생님은 스스럼없이 친구들과 웃고 떠드는 키라라의 모습에 한 가지 궁금증이 생긴다. 이후, 선생님은 마침 친구들과 헤어진 키라라와 함께 귀가하며 줄곧 궁금하던 키라라의 부활동에 관해 묻는다."
3408135695 = "거침없이 다가오는 키라라 씨"
1107638503 = "시험에 낙제한 키라라는 공부를 가르쳐달라며 샬레를 찾아온다. 선생님은 침울한 표정의 키라라에게 개인 과외를 약속하고, 샬레 휴게실에서 둘만의 개인 과외가 시작된다. "
3959270548 = "둘만의 개인과외"
2956308925 = "키라라의 연락을 받고 게헨나 학원을 방문한 선생님. 조용한 교실에서 두 사람의 개인 과외는 계속되고, 잠시 쉬는 시간을 갖자는 선생님에게 키라라는 공부를 계속 이어나가자고 부탁한다."
235996998 = "키라라 on the 스트리트"
1817181974 = "과외를 해준 보답을 하겠다며 연락을 해온 키라라. 선생님은 키라라와 함께 이곳저곳을 구경하며 즐거운 시간을 보낸다."
296399585 = "메이드의 기분!"
3524968918 = "메이드복을 입은 김에 샬레를 청소해 주겠다고 한 모모이였지만, 아니나 다를까 편하게 잠들어 버리고 만다. 선생님은 모모이를 깨워, 함께 샬레를 청소한다."
487322513 = "메이드의 요리!"
74482891 = "다시, 메이드복을 입은 김에 요리를 해 주겠다고 한 모모이. 이번에는 편의점 음식으로 온갖 게임에서 등장한 요리를 만든다. 그러나 지나치게 많이 사 버린 나머지 뒤처리에 고생하게 되는 것이었다."
4200373453 = "메이드의 휴식!"
2287657410 = "또 또다시 메이드복을 입었으므로 메이드다운 일을 해야 한다는 모모이. 이번에는 무려 휴식이었다. 그리고 보다 효과적인 휴식을 위해 밀레니엄의 여러 동아리로부터 특별한 휴식 기구를 받아왔지만, 과도한 오작동과 부작용으로 선생님과 모모이는 근육통에 시달리고 만다."
2123764785 = "메이드가 될 거예요, 선생님."
1478421162 = "게임개발부실을 찾아간 선생님은 메이드복 차림의 미도리와 만나게 된다. 메이드가 주인공인 게임 원화를 구상하던 도중, 정통파 메이드야말로 중요한 개념이라고 설파한 미도리. 그리고 다시 정통파 메이드에게 중요한 것은 주인님이라고 이야기하며, 이제부터는 선생님을 주인님으로 모시겠다고 선언한다."
1578203463 = "현장학습 시간이에요, 선생님."
613352308 = "미도리에게 도움이 될까 하여 고전 미술 복식전에 함께 가기로 한 선생님. 미도리는 선생님을 위한 고전 복식을 가득 챙겨오지만, 선생님은 간신히 미도리를 말릴 수 있었다. 선생님과 미도리는 고전 미술 복식전을 한껏 즐긴다."
4234835853 = "메이드를 기억해 주세요, 선생님."
1167253886 = "메이드가 주인공인 게임 원화를 구상하기 위해 메이드복을 입었는데, 정작 놀기만 했다는 것을 알아차린 미도리. 미도리는 샬레에서 간만에 메이드 다운 일을 수행한다. 그리고 마지막으로 자신의 메이드 다운 모습을 사진으로 남겨 달라고 선생님에게 부탁한다."
3911733272 = "본전 뽑기 대작전"
1858906170 = "세리카는 이왕 리조트에 오게 된 거 최고의 휴가를 보내고자 다양한 곳을 찾아다닌다. 비록 그 와중에 특별한 무언가를 찾지는 못했지만, 그 과정 자체가 최고의 휴가였음을 깨달아 간다."
2428709807 = "공주 on the boat"
1684051936 = "창고에서 방치된 바나나 보트를 발견한 세리카는 선생님과 함께 그것을 테스트하러 나간다."
1798149545 = "추억은 억 천 만"
773578818 = "아비도스로 돌아온 후, 선생님과 함께 부실을 청소하던 세리카는 다시 한번 수영복을 찾아낸다. 추억을 떠올리며 아쉬워하던 세리카에게, 선생님은 한 가지 제안을 한다."
1569262550 = "수영복을 고르자"
3132777354 = "라이프가드 파견 임무를 앞두고 수영복을 고르려는 칸나. 선생님과 함께 여러 가지 수영복을 살펴본다."
321959446 = "워터슬라이드 점검"
1320900751 = "다인용 워터슬라이드 점검을 함께하는 칸나와 선생님. 시험 운행을 위해 함께 탑승하는데……."
1944847401 = "라이프가드의 특권"
3375768959 = "워터파크의 휴무일. '힐링 스파'의 청소와 정리를 맡은 칸나는 자신을 도와준 선생님과 잠시 휴식을 취하기로 한다."
728682739 = "폴리스 스토리-식당가 편"
2691646951 = "선생님을 감찰관이라고 부르며 불량식품 단속을 하자는 후부키. 그 목적은 푸드코트의 도넛 가게인 듯하다."
2300515944 = "폴리스 스토리-유수풀 편"
1597168577 = "워터파크 순찰 임무를 받았다는 후부키. 그런데 어째서인지 즐거운 표정이다."
1031326801 = "폴리스 스토리-로스트 파라다이스 편"
1211536315 = "아무도 신경 쓰지 않는 업무 공간을 찾은 후부키. 편히 놀고먹으려는 원대한 계획을 세우는데……."
3039528055 = "수상안전을 위한 노력"
3169271538 = "라이프가드 임무를 맡게 되었다는 키리노. 선생님은 키리노의 수상 인명 구조 훈련을 돕기 위해 발키리 경찰학교의 수영 훈련장으로 향한다."
4241689255 = "응급상황을 위한 대비"
3041462882 = "이번에는 응급 구조 훈련에 임하는 키리노. 그러나 훈련 모형을 깜빡하는 바람에 선생님이 대신 교보재가 되어 주기로 한다."
2625703360 = "종합 구조 실습"
2642714145 = "훈련을 마치고 마지막 점검을 하는 키리노. 열심히 훈련했지만 여전히 서툴다. 그 모습을 지켜보던 선생님이 물에 빠지고 마는데……."
4005278696 = "Explosive Hazards"
770948941 = "해변에서 선생님과 함께 여러 가지 이야기를 나누던 모에는, 수영복에 대한 화제가 언급되자 자신의 수영복에도 '파괴적인 무언가'가 숨겨져 있다고 언급한다. 모에가 이를 드러내려 하자 선생님은 황급히 모에를 만류하는데…"
2726872600 = "Danger Close"
3684290810 = "무언가가 폭발한다는 메시지를 받고 황급히 모에를 찾아온 선생님. 하지만 모에가 말한 그 '무언가'는 숯불 위에 올린 조개였다. 모에는 숯불 위에서 덜 해동된 식재료가 터져나가는 것을 보며 황홀해한다."
1520173270 = "Logistics Information"
1831576614 = "어촌의 전통 음식인 쿠사야가 잘 팔리지 않아 고민하는 어부를 위해, 모에는 직접 배송 어플을 만들어 준다. 어플에 쿠사야를 올리자마자 별식에 관심이 많은 시민들의 주문이 쇄도하고, 어부는 크게 기뻐한다."
1947646090 = "Area Beautification"
1090909669 = "주민으로부터 안 쓰는 빈집을 소개받은 모에. 모에는 다른 소대원들을 위해 빈집을 수리하기 시작한다. 수리가 끝나고 모에는 벌레 쫓는 모기향의 냄새를 맡으며 감상에 젖는다."
717510768 = "히어로, 탄생"
1205296410 = "혼자 하기에는 너무 많은 서류 업무를 떠안게 된 호시노. 선생님은 그런 호시노를 도와주고, 대신 그 보답으로 전에 착용했던 전투 복장을 입어 달라고 부탁한다. 그때 마침 호시노는 학교에 침입한 헬멧단을 퇴치하게 되고, 선생님은 호시노를 '아비도스의 히어로'라고 부른다."
2747864121 = "히어로, 순찰"
265807011 = "아비도스 자치구 순찰 활동에 나서는 호시노와 선생님. 여러 어려움을 겪는 시민들을 도와주다가 시내 외곽의 버려진 기차에서 하룻밤을 지내게 된다. "
1849506027 = "히어로, 결전"
1466126374 = "헬멧단의 수상한 움직임을 뒤쫓던 호시노와 선생님은 버려진 학교 건물에서 헬멧단을 발견, 일망타진한다."
218109715 = "전문가"
1957182403 = "선생님은 시로코가 어떻게 지내는지 직접 확인하고자 한다. 막상 찾아가 본 시로코의 거처는 예상과 다른 모습인데……."
2455626068 = "같은 것과 다른 것"
2766229661 = "시로코는 자신이 알던 세계와 이곳이 미묘하게 다르다는 것을 자각한다. 그러나 변하지 않고 남아있는 것도 존재한다."
789167182 = "복면 라이더"
4039489432 = "언젠가부터 아비도스에 출몰하기 시작한 '복면 라이더'. 그 정체는 다시 자전거를 타기 시작한 시로코다. 그런 시로코에게 최근 고민이 생겼다고 한다."
1074029922 = "식당 아르바이트"
2521063046 = "해변가 식당에서 아르바이트 중인 사오리. 그러나 한 손님이 억지스러운 핑계를 대며 항의하기 시작하는데……."
2149489111 = "축제의 소리를 찾아서"
3190600684 = "DJ 공연 행사를 위해 샘플링을 해야 한다는 사오리. 적당한 소리를 찾기 위해 선생님과 함께 축제 현장 이곳저곳을 탐색한다."
3891669579 = "둘만의 뒤풀이"
63371907 = "DJ 공연이 끝난 후, 선생님과 사오리는 텅 빈 무대에 앉아 둘만의 휴식을 즐긴다.  "
1028892596 = "수영복의 로망"
885397784 = "수영복 경품을 받기 위해 잡지의 독자 응모 엽서를 쓰는 히요리. 선생님은 엽서에 당첨된 것처럼 꾸며 히요리를 위한 선물을 준비한다."
1411829040 = "자외선 차단은 확실히"
4042979183 = "자외선 차단제 대신 참기름을 바른 히요리는 일광욕을 하다가 화상을 입게 된다. 선생님은 그런 히요리에게 아이스바를 사 주기로 하는데……."
23063759 = "퍼퍼퍼펑!"
1830453388 = "선생님에게 늘 받기만 했기에, 이번에는 무언가 해 주고 싶다는 히요리. 히요리가 선생님에게 선사한 것은 소박한 불꽃놀이다."
2202535381 = "보이지 않아도 남는 것"
269523938 = "새로 장만한 디지털카메라로 이것저것 찍어 보고 싶다는 아츠코. 선생님과 함께 축제 현장을 돌아다니기로 한다."
2300375645 = "도망친 곳에 꽃밭은 있다"
665744446 = "선생님과 아츠코는 축제 현장에서 포토존을 발견해 사진을 찍지만, 무리한 사진값을 요구하는 헬멧단을 피해 달아난다. 몸을 숨긴 곳에 마침 꽃이 만발해 있다."
942189667 = "마지막으로 찍고 싶은 것"
1659279476 = "카메라의 배터리가 얼마 남지 않았다는 아츠코. 마지막으로 무엇을 찍을지 고민하다가, 어느 순간 셔터를 누르는데……."
486009611 = "일일외식록 카린"
3128164768 = "교복을 입고 모처럼의 휴일을 맞았음에도 계속해서 업무 생각만 하는 카린. 선생님은 그런 카린에게 휴식의 한 방법으로 노점 음식 체험을 권한다."
2155174399 = "더욱 격렬히 아무것도 안 하기"
933163258 = "휴식 방법을 알려주기 위해 카린을 샬레로 초대한 선생님은 아무것도 하지 않는 시간을 제안한다. 하지만 카린은 바쁜 선생님을 보며 마음이 불편해지는데……"
1196121695 = "등굣길의 추억"
1780687568 = "특별하게 휴일을 즐길 방법이 생각났다는 카린. 선생님과 카린은 평소의 등굣길을 함께 걸어보기로 한다."
1297953155 = "허풍과 진실"
133657712 = "마리나가 산해경의 이색적인 요리를 맛보던 중, 산해경식 허풍에 속아 넘어갈 뻔한다. 다행히 선생님이 마리나를 돕는다."
1883169484 = "입 다물면 미인"
2438739727 = "치파오를 입은 마리나를, 지나가던 사진사가 화보 촬영을 하겠다며 사진 촬영을 권유한다. 선생님까지 촬영을 부추기는 바람에, 결국 마리나는 화보 촬영 제안을 수락하고야 만다."
3353300618 = "쾌도난마"
83669419 = "월병을 4조각으로 자를지 8조각으로 자를지 토론하던 산해경 학생들에게, 마리나는 호쾌한 답변을 내놓는다. 그러나 그 이후 차를 어떻게 마실지에 대해 또다시 토론이 이어지고 만다."
3593618651 = "들어주는 하루"
3790006563 = "매화원을 방문한 토모에는, 놀라울 정도로 능숙한 대응을 보여 주며 아이들을 돌본다. 토모에는 원래부터 어린아이들의 때 묻지 않은 말을 좋아했다는 사실을 선생님에게 이야기한다."
533034601 = "추운 나라에서 온 비서실장"
3953618809 = "붉은겨울에서 온 토모에에게, 산해경의 기온은 다소 높은 편이었다. 토모에는 연단방에서 부채를 부치며, 선생님과 함께 더위를 식힌다."
3599242579 = "간판 소녀"
3462245568 = "중화요리가 건강에 좋지 않다는 악소문이 퍼져 곤란해하는 점장에게, 토모에는 자신의 특기인 선동으로 사람들을 불러 모은다. 심지어 한동안 소소하게 중화요리 붐이 불기까지 했다."
2148141524 = "일과"
1009451031 = "아침의 공원에서 쿵후를 수련하는 레이죠를, 선생님이 찾는다. 선생님과 레이죠는 신나게 쿵후 영화의 줄거리를 이야기한다."
2050752819 = "사고방식을 바꾸어서"
2040477035 = "현무상회에서 매일같이 일어나는 문제들을 능숙하게 처리하는 레이죠. 그러나 아이들에 대한 접객은 서투르다고 레이죠는 토로한다. 선생님은 그저 이야기를 잘 들어 주는 것으로 충분하다고 레이죠에게 이야기한다."
3812995799 = "Enter the……"
541090949 = "현무상회의 감찰일. 현룡문의 감찰관은 레이죠에게 온갖 트집을 잡는다. 레이죠는 선생님의 조언을 받아들여, '쿵후의 교훈'대로, 사태를 해결하고 만다……"
4240158672 = "주체와 대상의 문제"
1037046256 = "선생님의 샬레 외부 일정에 레이죠가 동행하게 된다. 레이죠는 무술의 정신에 따라, 성숙한 어른인 선생님이 미숙한 학생인 자신을 지켜 줘야 한다고 이야기한다. 선생님은 어떤 의미에서의 '어른의 방식'으로 레이죠를 지켜 준다……"
687178835 = "구중궁궐의 숨바꼭질"
2331129627 = "선생님은 키사키의 연락을 받고 현룡문으로 찾아간다. 키사키는 함께 현룡문을 빠져나가자고 권유하며, 온갖 변장을 통해 탈출에 성공한다."
3457268771 = "내가 나비인지. 나비가 나인지."
3801392505 = "키사키가 샬레로 찾아온다. 키사키는 능숙한 속도로 업무를 처리하지만, 다른 학생들에 비해서 조금 독특한 방향으로 업무를 처리하기도 한다. 과로의 여파로 선생님의 정신이 몽롱해지고, 꿈과 현실을 구분하기 힘들어진 듯한 느낌 속에서, 선생님은 키사키에게 보살핌을 받은 것 같은 느낌을 받는다."
4083890821 = "둥지 위로 날아간 새"
2918134416 = "키사키가 다시 샬레로 찾아온다. 업무 도중, 약간의 시간이 비게 되고, 선생님은 샬레 최상층의 전망대로 키사키를 데려간다. 키사키는 혼잣말처럼 더 먼 곳까지 나가 보고 싶다고 이야기하고, 그 말을 들은 선생님은 키사키와 함께 더 먼 곳을 찾아가 보자고 약속한다."
4262508585 = "그저 미끼를 던졌을 뿐"
355824304 = "선생님은 키사키와 외출 약속을 잡고, 키보토스의 이곳저곳을 둘러본다. 저녁이 되고, 키사키의 상태가 어딘가 약해진 것처럼 보인다. 선생님은 황급히 근처의 호텔로 들어가 향을 피우고, 키사키를 쉬게 한다."
3494385232 = "도시락의 행방"
516102790 = "선생님은 라이브 연습이 한창이던 마리를 찾아간다. 마리는 잠시 쉬며 식사를 준비하는데, 도시락이 하나뿐이었다. 선생님은 당연히 사양하지만, 마리는 자신의 마음이 불편하다며 계란말이 한 개만이라도 먹어 달라고 부탁한다. 그리고 선생님에게 직접 먹여준다."
2845702047 = "호들갑 떠는 경호원들(?)"
982300326 = "공연 일정들을 돌던 마리와 만난 선생님. 수상하게 생긴 인형 탈 경호원들이 마리 곁을 지키고 있었다. 마리의 팬을 자처하던 이들은 선생님은 믿을 수 있다며 자리를 양보하고, 선생님은 마리와 일정을 이어간다."
1887944177 = "공연 후에"
2221601705 = "라이브 공연 후 상쾌하게 땀을 흘린 마리. 선생님에게 그동안의 도움에 대한 감사 인사를 전한다."
1340882771 = "일탈하는 용기"
1554125012 = "공연 날이 아닌 데도 아이돌 의상을 입고 선생님을 불러낸 마리. 놀라는 선생님에게 아이돌로서 자신이 줄 수 있는 작은 선물이라며 1:1 공연을 선보인다."
1675781559 = "노력의 성과"
2417116786 = "아이돌 의상이 생긴 후 다른 학생들과의 거리감이 줄어들었다고 좋아하는 사쿠라코. 선생님에게 의기양양한 자랑을 늘어놓은 사쿠라코는, 그러나 생각이 과해 모든 시스터후드 학생들의 복장을 아이돌 복장으로 교체하려 한다."
2808779992 = "또 다른 나"
86290450 = "고민 상담을 위해 찾아온 사쿠라코. 시스터후드의 신입생 학생들이 아이돌 복장의 자신을 알아보지 못해, 새로운 친구로 사귀어 버렸다는 사실을 고백한다. 선생님은 사쿠라코에게 사실대로 말해도 될 것이라고 조언해 주고, 사쿠라코는 용기를 내어 친구들에게 고백한 뒤 문제를 해결한다."
1666107840 = "이렇게 보니 달라"
3975383213 = "아이돌 활동 기간 동안 더욱 바빠진 사쿠라코. 그런 사쿠라코를 위해 선생님과 시스터후드의 모두는 깜짝선물을 준비한다."
3877968203 = "이런 걸 좋아한다고 들었습니다"
2316052442 = "갑작스럽게 달라진 사쿠라코의 모습. 당황하는 선생님에게, 사쿠라코는 그간의 도움에 대한 보답을 위해 준비한 이벤트라고 설명한다. 사쿠라코는 이벤트가 실패한 것 같다며 주눅들지만, 선생님은 그 의도가 가장 기쁜 이벤트라며 만족한다."
899851085 = "화보집 촬영"
1154706643 = "모처럼의 아이돌 복장을 활용하기 위해 화보집 촬영을 진행하던 미네. 처음에는 선생님에게도 당당하게 상황을 설명하지만, 곧 주변의 모두가 자신을 귀여워하고 있다는 사실에 부끄러워한다."
2876252345 = "굳이 설명할 필요는……"
934404426 = "미네는 다양한 상황 속에서 굳이 아이돌 의상을 차려입는다. 스스로도 의식하지 않던 그 행동을 뒤늦게 깨달은 미네는 선생님에게 변명하지만, 선생님은 특별한 이유가 없어도 상관없다고 말해준다."
351631146 = "저를 맡아주세요."
606260475 = "아이돌 복장에 푹 빠져 있던 미네는 구호기사단 단장으로서의 자신에 소홀해졌다고 생각한다. 미네는 선생님에게 옷을 맡겨 아이돌로서의 자신을 봉인하려 하지만, 선생님은 그런 미네를 잘 설득한다."
1414095989 = "서로의 변명거리"
4030175207 = "미네가 아이돌 복장을 입을 수 있도록 여가 약속을 잡아주는 선생님. 미네는 자신의 어리광이 선생님에게 폐를 끼치고 있다고 생각하지만, 선생님은 오히려 이런 여가 약속 또한 자신에게도 쉴 수 있는 좋은 변명이 된다고 말해준다."
2926157779 = "사츠키는 알고 있다."
3638915034 = "선생을 찾아와 협력의 탈을 쓴 복종을 요구하는 사츠키. 선생이 거부하자, 만마전 정보부의 힘으로 알아낸 정보를 통해 선생을 협박하겠다고 하는데……?"
2537055559 = "사츠키는 묻고 있다."
2610548792 = "정보를 수집하는 방법에 대해 상담하는 사츠키. 서로의 노하우를 공유하자던 사츠키가 꺼내든 방법은……?"
281454214 = "사츠키는 듣고 있다."
736914356 = "진일보한 NK 울트라 프로젝트의 실험 대상으로 선생을 낙점한 사츠키. 협박도 고문도 통하지 않는 선생에게 각종 최면 방법을 실험해 보는데……?"
3009929652 = "사츠키는 참고 있다."
2843120852 = "사츠키의 다급한 연락을 받고 만마전에 도착한 선생. 사츠키가 문을 걸어 잠그고 농성하던 이유는 과연……?"
796751500 = "사츠키는 떨고 있다."
2925882867 = "당번 업무로 샬레를 방문한 사츠키. 저녁이 되어서야 간신히 업무를 마무리하고 일어나려던 찰나, 사무실에 정전이……?"
1716752779 = "만마전의 서기"
2765526546 = "치아키로부터 갑자기 온 <주간 만마전>의 구독 권유 문자. 치아키는 직접 보고 결정하라며 선생에게 찾아오는데……"
3705330933 = "서기의 취재생활"
651990844 = "지난번의 구독 감사 선물을 전달하러 왔다며 찾아오는 치아키. 과연 그 선물은?"
2692250003 = "서기의 취미생활"
4167044195 = "치아키로부터 <주간 만마전>의 휴간 공지가 왔다. 치아키는 쉬는 날에 뭘 할까?"
2097502551 = "서기의 탐구생활"
3382911551 = "<주간 만마전>의 특집호 예고. 무슨 기사가 실릴지는 비밀이라는데……"
828484028 = "불면증"
3373880876 = "불면증으로 인해 샬레의 당번 업무 중 꾸벅꾸벅 졸고 만 유우카. 이를 본 선생님은 숙면에 부담을 갖지 말고 쉬라고 조언하고, 유우카는 간만에 단잠을 청한다."
1121151644 = "전기양을 쫓는 모험"
975106364 = "밀레니엄 교사에서 도망친 절전 드론, '전기양'을 찾던 유우카와 선생님은 잠을 자기 전에 양을 세는 습관을 이야기하며 서로의 취침 루틴을 공유한다."
2025917852 = "애프터 다크"
2416670859 = "한밤중 밀레니엄의 교내 편의점 앞에서 마주친 유우카와 선생님. 유우카는 밤중에 군것질을 하러 나온 것을 부끄러워하지만, 선생님은 그런 유우카를 나무라지 않고 산책을 권한다."
2478727059 = "세미나의 잠 못 이루는 밤"
2577100129 = "라디오를 듣다 사연 코너에 불면증에 대한 고민을 투고한 유우카. 하지만 어찌 된 일인지 그 사연을 듣고 선생님이 답변 사연을 보내고, 유우카는 선생님의 사연을 청취하며 단잠에 든다."
358780189 = "무색"
4255105260 = "감기에 걸린 노아를 간병하기 위해 기숙사를 방문한 선생님. 선생님은 살풍경한 노아의 방 모습을 보고 새로운 인테리어를 제안한다."
2069012399 = "무취"
1850483928 = "지난번의 약속을 지키기 위해 여러 가지 인테리어 용품을 들고 다시 한번 노아의 방을 방문한 선생님. 선생님과 노아는 방을 여러 가지 방법으로 꾸며보지만, 결국 방향제 하나를 놓아두는 것으로 타협한다."
208330771 = "무미"
3004247765 = "역으로 감기에 걸린 선생님을 간병하기 위해 샬레를 방문한 노아. 노아는 선생님을 위한 음식을 만들다 무색, 무취, 무미한 자신의 취향을 깨닫고 침울해진다. 선생님은 그런 노아에게 책의 낭독을 부탁한다."
4051060136 = "그 위의 작은 얼룩"
2881025522 = "노아와의 당번 활동 중 실수로 커피를 쏟은 선생님. 노아는 옷에 얼룩이 지지 않도록 편한 옷인 '파자마'로 옷을 갈아입는다. 파자마 차림이 된 노아를 보고 당황해하는 선생님을 보며 노아는 짓궂은 웃음을 흘린다."
1475757512 = "권력 남용"
1090305340 = "선생님은 세이아의 호출을 받고 트리니티에 방문한다. 세이아는 단순히 사적인 소망을 채우고자 선생님을 부른 것이었고, 이런 자신이 어떤지 묻는다."
1220649373 = "간호 요청"
2715828130 = "선생님은 세이아의 간호 요청을 받고 트리니티에 방문한다. 간호는 단순한 핑계였고, 격무로 지친 선생님을 위해 디저트를 준비했다는 세이아. 그리고 같은 생각으로 디저트를 사 온 선생님과 함께 즐거운 시간을 보낸다."
2126075441 = "전용 도서관"
1977122812 = "티파티 전용 도서관을 찾은 선생님은 세이아와 취미에 대한 이야기를 나누고, 다음에 읽을 책을 추천한다."
2182579853 = "새들이 따르는 소녀"
1084961606 = "선생님은 새가 지저귀는 소리를 듣고 공원을 찾는다. 그곳에는 세이아가 있었고, 둘은 새와 노래에 대한 이야기를 나눈다."
3549899780 = "놀라운 평범함"
2914256145 = "네루의 고민 상담을 위해 밀레니엄으로 향한 선생님. 그곳에는 평소와 달리 교복을 입은 네루가 있었다."
1124899584 = "느긋한 휴일"
1959760146 = "모처럼 교복을 입었으니, 평소에 하지 못했던 것들을 하고 싶다는 네루. 선생님과 함께 여유로운 휴일을 보낸다."
857743078 = "네루와 놀이공원"
4260659126 = "네루는 다시 스카잔을 입는 일상으로 돌아가기 전에 기념이 될 만한 활동을 하고 싶어 하고, 선생님은 그런 네루와 함께 놀이공원으로 향한다."
3828496540 = "합리적인 생활"
1133228369 = "리오에게서 연락을 받은 선생님은, 리오가 저녁 세일 도시락과 냉동식품으로 식사를 해결한다는 사실을 듣고, 건강을 위해서라도 손수 요리를 할 것을 권유한다."
1657158848 = "배송 대행지"
510653460 = "샬레에 리오로부터의 대량의 택배 물품이 배달된다. 은둔 중인 처지여서 샬레를 배송 대행지로 삼았다는 것이었다. 선생님은 리오의 택배를 받아 주고, 리오를 격려한다."
954826963 = "디자인"
2025211439 = "리오가 자신의 취미에 대해 이야기한다. 자신의 디자인을 다른 사람에게 보여주면, 보통 평가가 좋지 않다는 것이었다. 선생님은 리오를 뜻밖의 방법으로 응원한다."
1535992005 = "비밀 장소"
3341491514 = "리오는 선생님을 자신의 은신처로 초대했지만, 평소 생활력이 부족했던 탓에 청소를 끝마치지 못하고 만 것이었다…"
1595705631 = "버스 안에서"
1148295035 = "만원 버스 안에서 우연히 교복 차림의 아스나를 마주친 선생님. 둘은 거친 운전으로 지나치게 밀착해 버리고 마는데……"
2622331350 = "매점 데이트"
3551192404 = "허기를 달래고자 매점을 찾은 선생님은 빵 종류를 고민하던 아스나를 발견한다."
4288139285 = "우연한 만남"
1681962777 = "길을 걷던 선생님은 요즘 묘하게 자주 마주치는 아스나를 떠올리고 두리번거린다. 오늘은 만나지 않나 싶을 즈음, 또다시 아스나와 만나게 된다."
312468336 = "잃어버린 핸드폰"
1018913594 = "모모톡을 나누던 중 연락이 끊긴 아스나를 걱정해 찾아온 선생님은 공원에서 잃어버린 핸드폰을 찾아 헤매던 아스나를 발견한다."
3452424088 = "낙엽 청소"
1225467064 = "봉사활동으로 낙엽을 치우게 된 마키를 돕기 위해 밀레니엄을 방문한 선생님. 마키는 단풍의 선명한 색깔에 대해 이야기한다."
1020270808 = "증강 현실"
1998255879 = "모처럼 휴일이니 산이라도 오르자는 마키. 선생님은 의외의 제안에 놀란다. 하지만 AR게임을 위해 등산을 한 마키의 속셈이 드러나고……"
1001076875 = "캠핑의 묘미"
937583126 = "이번에는 캠핑을 가자는 마키와 어울리게 된 선생님. 게임의 몬스터를 잡기 위한 목적이었지만, 충전이 제대로 안 된 바람에 핸드폰을 사용하지 못하게 된다."
1220767602 = "연하장"
4116523058 = "연하장을 만들고자 하지만, 어떤 디자인이 좋을지 고민하는 마키. 선생님은 올해 가장 인상적이었던 추억을 떠올려 보라는 조언을 건넨다."
2571587715 = "취미 생활 1"
1009963351 = "선생님은 세나와 함께 공원에서, 세나의 취미 중 하나인 '대기'를 함께 한다."
2153313130 = "취미 생활 2"
663094619 = "선생님은 세나와 함께 응급의학부실에서, 세나의 취미 중 하나인 '약품 정비'를 함께 한다. "
1104938304 = "표층 해류의 순환"
574610625 = "바다에 가 본 적이 없다는 세나와 함께 바다로 향하는 선생님. 세나는 평소와는 약간 다른 자신의 모습을, 선생님에게 가감 없이 보여 준다."
370788532 = "웨이트리스의 즐거움"
1282608874 = "주리는 카페 웨이트리스 아르바이트를 시작하고, 자신의 분야에서 엄청난 활약을 펼친다. 카페 매니저는 그런 주리에게 무언가를 제안하는데……"
4047712030 = "웨이트리스의 모험"
3916787181 = "카페 매니저의 제안으로, <이 달의 웨이트리스 선발 대회>에 출전한 주리. 대회 종목은 완전히 예상 밖의 것이었지만, 주리에게는 오히려 좋은 방향으로 작용하는 것이었다."
2608910626 = "웨이트리스의 서비스"
