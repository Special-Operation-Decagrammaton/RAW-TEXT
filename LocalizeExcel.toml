1977574507 = "ค่าป้องกันของบีนาห์นั้นสูงมาก\nถ้าลดค่าป้องกันของบีนาห์ จะสามารถสร้างความเสียหายต่อบีนาห์ได้รุนแรงขึ้น\nจัดทีมนักเรียนที่มีเอฟเฟกต์ลดค่าป้องกันดูสิ"
3058147498 = "ฝ่ายเราที่กำบังจะได้รับความเสียหายจากบีนาห์น้อยลง\nสกิลเฉพาะของบีนาห์จะสร้างความเสียหายรุนแรงยิ่งขึ้นกับฝ่ายเราที่อยู่ใกล้บีนาห์\nจัดทีมนักเรียน Tanker ที่รับมือการโจมตีของบีนาห์ได้ดูสิ"
