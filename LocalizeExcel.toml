452463543 = "The next morning, Sensei and the Veritas members wake up early and begin hiking through the dark to see the sunrise. They run into Sumire while hiking, and she explains it might be difficult to see the sunrise because it's cloudy. The Veritas members are still unusually motivated to keep going. When they arrive at the top, the group finally sees a beautiful sunrise."
60697301 = "The First Sight 2"
