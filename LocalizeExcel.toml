3055775567 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]A student who somehow ended up here. She's terrified of the judgmental gazes of her peers.[/i][-][/c]"
4028810052 = "[c]At the start of user's Phase:[/c] Recovers HP by [c]{param;BasePower}[/c] if HP is at [c]{param;ConditionNum}[/c] or below."
2496996975 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]The true powerhouse of the Justice Task Force, and the heart of the administration. She's stricter on herself than anyone else.[/i][-][/c]"
3233074764 = "[c]After playing an Equipment Card:[/c] Increases the user's Skill Power by [c]1[/c] during this Phase."
1780167426 = "Damages all Rear enemies, then Swaps with a random ally Striker.\n\n\n[c][75b4c0][i]The veiled Host of the Tea Party, the pinnacle of Trinity's social circle. Her true identity is a burned out and overworked girl.[/i][-][/c]"
1320965963 = "[c]After another {tag;TeaParty} Striker's EX Skill is activated:[/c] Deals [c]{param;BasePower}[/c] damage to a random enemy. [c](Repeats for every ally {tag;TeaParty} student, including the user.)[/c]\n [c]{char;848004}[/c] and [c]{char;848005}[/c] allies each individually increase the damage dealt by this skill by [c]{param;BonusNum}[/c]."
3576040056 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]The innocent princess of Trinity General School. Her pure heart unknowingly wounds others, yet shatters at the slightest touch.[/i][-][/c]"
312404380 = "[c]When Swapping to the Front:[/c] Deals [c]{param;BasePower}[/c] damage to a random Rear enemy."
3291019510 = "Increases EX Skill Power of another ally Striker by [c]1[/c] and swaps with that Striker.\n\n\n[c][75b4c0][i]She embodies \"freedom\" in everything she does, so it's difficult to imagine her as a Tea Party Host.[/i][-][/c]"
1066641449 = "[c]After another {tag;TeaParty} Striker's EX Skill is activated:[/c] Increases Front ally Striker's EX Skill Power by [c]1[/c]."
3210250803 = "Deals damage to the Front enemy and Draws [c]{param;DrawCardNum}[/c] card(s) afterwards.\n\n\n[c][75b4c0][i]\"That girl, is she happy with her friends? I'm glad to hear it.\"\n- Anonymous Black Market Mercenary[/i][-][/c]"
3848622176 = "[c]After another {tag;MakeUpWork} student's EX or SP Skill has activated:[/c] Draw [c]{param;DrawCardNum}[/c] card(s)."
231076403 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]Because she could become anything, she decided to become nothing.[/i][-][/c]"
351059869 = "[c]At the start of user's Phase:[/c] Reduces the Cost of [c]{param;CardNum}[/c] random card(s) by [c]1[/c]."
2651504191 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]Only fools think they can win against Tsurugi, and those who think they can escape are even more stupid.[/i][-][/c]"
2237998232 = "[c]When the user is in Front and an enemy retreats after taking damage:[/c] Recovers [c]{param;BasePower}[/c] HP."
2674858929 = "Deals damage to the Front enemy. Deals [c]{param;BonusAttackPower}[/c] True Damage to a random enemy afterwards.[c](Repeats {param;AttackCount} time(s))[/c]\n\n\n[c][75b4c0][i]The Prefect Team's ace sniper. Despite her complaining, she's almost as good a leader as Hina.[/i][-][/c]"
3746791027 = "[c]After taking damage:[/c] Increase EX Skill Power by [c]1[/c]."
2135599211 = "Damages all enemies. [c](Repeats {param;AttackCount} time(s))[/c]\n\n\n[c][75b4c0][i]Just like how it's difficult to imagine Gehenna without Hina, it's also difficult to imagine a Hina who's not from Gehenna.[/i][-][/c]"
3485857018 = "[c]When user is in Front and an enemy retreats after taking damage:[/c] Deals [c]{param;BasePower}[/c] damage to all enemies."
1997750136 = "Randomly restores an ally Striker's HP.\n\n\n[c][75b4c0][i]In Trinity General School, someone is always causing trouble and someone else is always cleaning up after them. She's typically in charge of the latter.[/i][-][/c]"
3069105627 = "[c]After another ally Striker's EX Skill is activated:[/c] Deals [c]{param;BasePower}[/c] damage to random Rear enemy."
1184747526 = "Swaps with a random ally Striker, then deals [c]{param;SubPower}[/c] True Damage to the enemy with the highest HP.\n\n\n[c][75b4c0][i]After someone said her face looks scary, she practices smiling in front of a mirror every night.[/i][-][/c]"
1931885401 = "[c]At the start of user's Phase:[/c] Recovers HP of random ally Striker by [c]{param;BasePower}[/c]."
3182341508 = "Deals damage to a random enemy.\n\n\n[c][75b4c0][i]Even though she sometimes wants to take a break and play, she stays responsible and goes on patrol.[/i][-][/c]"
2216886365 = "[c]When an enemy retreats after taking damage:[/c] Recovers HP of Front ally Striker by [c]{param;BasePower}[/c]."
1621612816 = "[c][75b4c0][i]In the moment of crisis, Ninpero saves the day![/i][-][/c]"
2965092129 = "[c][75b4c0][i]Some say this is addictive, but...[/i][-][/c]"
1962256730 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]Even in scorching heat, the helmet stays on! It's her proudest position.[/i][-][/c]"
1544184084 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]Hot tip from an officer: put an ice pack in the helmet.[/i][-][/c]"
3706527418 = "[c]After another ally Striker's EX Skill is activated:[/c] Deals [c]{param;BasePower}[/c] damage to a random enemy."
3384273229 = "Damages the Front enemy. Afterwards, grants [c]{param;ShieldPower}[/c] Barrier to all Rear allies.\n\n\n[c][75b4c0][i]\"I see... I should let Justice Task Force decide what to do with her.\"\n- Gehenna Head Prefect, Sorasaki Hina[/i][-][/c]"
3606491034 = "[c]At the start of user's Phase:[/c] If the gang member is alone, a new [c]{char;848015}[/c] joins."
4174554070 = "Summons [c]{param;SpawnNum}[/c] random Automaton(s) with [c]1[/c] HP in an empty Striker slot and gives [c]{param;SubPower}[/c] Barrier, then Swaps with another ally Striker.\n\n\n[c][75b4c0][i]\"Kids nowadays don't have that hunger! They should be grateful to have a job. Back in my day, we'd clock in an hour early, water the plants, and...\"[/i][-][/c]"
2742386328 = "[c]At the end of the user's Phase:[/c] Deals [c]{param;BasePower}[/c] damage to all other ally Strikers."
4174554610 = "Deals damage to a random enemy.\n\n\n[c][75b4c0][i]A new mercenary whose initial enthusiasm has been crushed by the harsh realities of the job.[/i][-][/c]"
3631717719 = "[c]After taking damage:[/c] Deals [c]{param;BasePower}[/c] damage to a random enemy."
1175820112 = "Damages the Front enemy.\n\n\n[c][75b4c0][i]A seasoned mercenary who, after enduring countless hardships, has decided that her current lot isn't bad at all.[/i][-][/c]"
4195242012 = "[c]After taking damage:[/c] Gives [c]{param;BasePower}[/c] Barrier to [c]{char;848018}[/c]."
3578644684 = "EX Skills can be used after the [c]{skill;8480219}[/c] effect activates.\n\nDamages all enemies.\n\n\n[c][75b4c0][i]The Never-Ending Conveyor Belt leads straight to justice![/i][-][/c]"
1408075034 = "[c]At game's start:[/c] This Striker cannot use her EX Skill. Once the user is alone, she can use her EX Skill."
1025653715 = "Recovers HP and increases EX Skill Power by [c]3[/c] for all other allies. The user retreats afterwards.\n\n\n[c][75b4c0][i]Despite seeming like the team's silent and mysterious cornerstone, she is in fact a very talkative person.[/i][-][/c]"
3669633875 = "Recovers HP and increases EX Skill Power by [c]3[/c] for all other allies. The user retreats afterwards.\n\n\n[c][75b4c0][i](Please leave a message if there's an issue and I will get back to you tomorrow.)[/i][-][/c]"
1126956015 = "Recovers HP and increases EX Skill Power by [c]3[/c] for all other allies. The user retreats afterwards.\n\n\n[c][75b4c0][i]She joined the team out of loyalty to her friends but is disappointed to find that she is the only one taking things seriously.[/i][-][/c]"
4158848476 = "Recovers HP and increases EX Skill Power by [c]3[/c] for all other allies. The user retreats afterwards.\n\n\n[c][75b4c0][i]She may be a wanted criminal, but she genuinely believes her fight against evil is for the peace of Kivotos.[/i][-][/c]"
2396972796 = "Recovers HP and increases EX Skill Power by [c]3[/c] for all other allies. The user retreats afterwards.\n\n\n[c][75b4c0][i]Enjoying a leisurely vacation, and she's usually a good student.[/i][-][/c]"
2332449769 = "[c][75b4c0][i]There's nothing inside.[/i][-][/c]"
359109910 = "[c]At the start of user's Phase:[/c] Retreats if everyone except [c]{char;848027}[/c] has retreated."
