3709675839 = "꽃과 초콜릿"
1415017347 = "아츠코의 화단을 찾은 선생님. 아츠코와 선생님은 화단을 보며 아츠코가 만든 초콜릿을 나눠 먹는다."
3240322664 = "키디바 초콜릿"
3859526989 = "사오리의 연락을 받고 찾아간 선생님. 사오리는 선생님에게 선물할 최고급 초콜릿을 사기 위해 만신창이가 된 상태였다."
2865465870 = "마음을 숨긴 초콜릿"
826493808 = "수행부가 주최하는 발렌타인 기념 간이 초콜릿 만들기 교실에 참가한 선생님. 수업이 끝나고 미모리는 수업 중 따로 준비한 초콜릿을 선생님에게 선물한다."
808887502 = "최강의 초코사우루스!"
2969923407 = "발렌타인 데이를 맞아 선생님에게 수제 초콜릿을 선물하려는 카에데. 편의점에서 산 공룡 발굴 초콜릿 세트의 발굴에는 실패했지만 부서진 조각을 모아 카에데만의 초코사우루스를 완성하여 선물한다."
2045537856 = "닌자답게! 전하고 싶어요!"
225487865 = "닌자답게 초콜릿을 전달하려던 츠쿠요는 캐비닛에 끼이고 만다. 선생님의 도움으로 탈출에는 성공하지만 품고 있던 초콜릿이 녹아 버린다. 선생님은 녹은 초콜릿을 기쁘게 받아들이고 츠쿠요와 함께 내년 발렌타인의 각오를 다진다."
147127745 = "초천재병약미소녀해커의 자화상"
