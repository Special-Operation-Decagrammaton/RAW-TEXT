2854957839 = "ドラム缶に入ってから後悔しても遅いぞ。"
1897644279 = "【お知らせ】鐘崎港湾管理事務所定期委託業務の入札のご案内\n鐘崎港湾管理事務所より、警備・事業関連の委託業務の入札を実施します。\n関係各社のご参加を心よりお待ちしております。\n詳細はD.U.港湾管理事務所の公式サイトをご確認ください。"
3893385166 = "これ一回落札したら、数年は独占できるんだっけ？\nちょっと警備の入札参加するか……。"
