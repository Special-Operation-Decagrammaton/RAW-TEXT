2294972915 = "미카와의 싸움에서 패배한 사오리는 스쿼드와의 과거를 회상한다. 결국 사오리는 쓰러지게 되고 미카는 사오리 앞에 다가와 총을 겨누지만, 사오리의 말을 듣자 갑작스레 울음을 터트린다."
3895665603 = "무한한 기회"
977567459 = "미카와 사오리 앞에 나타난 선생님. 선생님은 미카에게 사과하지만 미카는 왜 선생님이 사과하는지 혼란스러워한다. 선생님의 설교가 이어지던 그때, 선생님의 이야기를 엿듣던 베아트리체는 분노하여 결국 의식을 시작해 버린다."
3335292298 = "무한한 기회"
1991311275 = "베아트리체의 의식이 시작되는 한편, 또 다른 꿈속 공간으로 들어가게 된 세이아. 거기서 세이아는 어떤 인물과 마주한다."
3974900296 = "성녀 바르바라"
3127069218 = "아리우스 스쿼드와 선생님은 베아트리체가 만들어낸 유스티나 성도회의 성녀 바르바라와 힘든 싸움을 벌인다."
382639264 = "돌파"
2623773402 = "미카는 성도회로부터 선생님과 아리우스 스쿼드를 지키기로 다짐한다. 선생님과 아리우스 스쿼드는 아츠코를 구하기 위해 앞으로 나아간다."
3665603744 = "돌파"
3144918653 = "바실리카 성소에 도착한 아리우스 스쿼드와 선생님. 결국 베아트리체와 마주하게 된다."
2941796748 = "AGNUS DEI"
2991478379 = "베아트리체는 자신이 생각하는 어른의 의무에 대해 얘기하지만 선생님은 그 생각을 부정한다. 이에 베아트리체는 크게 분노하고 결국 본성을 드러낸다."
1958381225 = "AGNUS DEI"
1268369978 = "아리우스 스쿼드와 선생님의 저력에 당황한 베아트리체는 결국 바실리카 성소로 모든 병력의 집결을 명령한다."
3926608295 = "소녀들을 위한 키리에 1"
2994736897 = "끝없이 나타나는 성도회와 싸우던 미카는 서서히 지쳐간다. 그러던 중 미카는 아리우스 성당에 있는 성가대실을 발견하게 되고 생각에 잠긴다. 미카는 자신의 잘못과 과거를 회상하고 자비송을 부르며 성도회와 마주한다."
3109022376 = "소녀들을 위한 키리에 2"
1925570620 = "바실리카 성소에 울려퍼지는 자비송에 당황하는 베아트리체. 자비송이 들려오고 바르바라를 비롯한 자신의 병력마저 오지 않게 되자 결국 베아트리체는 크게 분노하고 사오리를 제물로 바치려고 한다."
294127303 = "소녀들을 위한 키리에 2"
1887669411 = "베아트리체는 아리우스 스쿼드와 선생님에게 패배하여 결국 쓰러진다. 아리우스 스쿼드는 베아트리체의 의식에서 해방된 아츠코를 구출한다. 그때 그들 앞에 게마트리아의 일원인 골콩트가 나타나 베아트리체를 데리고 사라진다. "
1335977955 = "소중한 사람"
3404775232 = "아츠코 구출에 성공한 사오리는 선생님에게 모든 죗값을 치르겠다고 말한다. 하지만 선생님은 학생을 심판할 권리는 없다고 말하고 그 자리를 떠난다. 한편 미카는 바르바라와 성도회를 상대하다 결국 한계에 부딪히게 되고 포기하려 한다. 하지만 그 때 선생님이 등장하고 미카는 깜짝 놀란다. 선생님은 바르바라와 성도회에게 크게 분노하며 어른의 카드를 꺼낸다."
960412593 = "소중한 사람"
2369141067 = "베아트리체와 연락이 되지 않아 아리우스 학생들이 당황하던 그때, 카타콤으로부터 트리니티 학생들이 갑작스레 등장한다."
3408302799 = "앞으로의 우리들"
2937481946 = "선생님과 미카가 아리우스로 가서 싸우는 동안, 트리니티의 다른 학생들도 두 사람을 찾기 위해 힘을 모은다."
1220533937 = "에필로그"
448684912 = "아리우스 자치구를 떠나던 아리우스 스쿼드는 사오리가 홀연히 사라진 사실을 알게 된다. 그러나 이들은 동요하지 않고 각자 마음을 다잡고 앞으로 나아가기로 한다. 한편, 일련의 사건들이 끝난 트리니티에서는 미카의 청문회가 시작한다."
2575418392 = "통제 불능의 특수부대"
22033557 = "린의 호출을 받고 총학생회에 방문한 선생님은 폐쇄된 SRT 학원의 학생들이 공원을 점거하고 난동을 부리고 있다는 소식을 듣게 된다. 이들을 체포하기 위해 발키리 경찰학교의 학생들이 파견되지만, 문제는 해결되지 않고…… 결국 린은 샬레의 선생님에게 해결을 부탁한다."
3594487595 = "공원의 불청객"
3574761045 = "린의 부탁을 받고 공원에 도착한 선생님은 앞서 도착한 발키리 경찰학교의 공안국장, 칸나로부터 상황의 설명을 전해 듣는다. 공원을 점거한 RABBIT 소대의 학생들은 강력한 무기로 무장하고 있었지만, 지휘체계가 정리되지 않아 내분을 일으키고 있었다. 선생님은 현장에 있던 발키리 경찰학교의 학생들을 모아 공격을 개시한다."
269659944 = "공원의 불청객"
3399601485 = "승리에 취해 방심하고 있던 RABBIT 소대의 소대원들은 선생님의 작전에 넘어가 패배하고, 모두 체포되고 만다. "
3925139788 = "그 소대원들의 사정"
3147943515 = "발키리 경찰학교의 학생들과 선생님이 RABBIT 소대의 소대원들을 심문한다. 소대원들은 SRT 학원을 떠나고 싶지 않은 저마다의 이유를 밝히고, 무슨 제안을 받더라도 발키리 경찰학교로는 절대 전학을 가지 않을 거라 단언한다."
3028720699 = "그 실장의 사정"
2352385492 = "심문기록을 살펴보던 칸나와 선생님 앞에 총학생회의 안보실장, 카야가 모습을 드러낸다. 카야는 총학생회의 간략한 조직도와 SRT 특수학원이 해체되게 된 경위를 설명하며, 선생님에게 RABBIT 소대원들을 설득해 달라고 부탁한다."
2002976807 = "걷히지 않는 불신"
343907048 = "갑작스럽게 RABBIT 소대의 관리를 맡게 된 선생님은 소대원들에게 안락한 샬레의 사무실에서 머무를 것을 권하지만, 소대원들은 선생님의 저의를 의심스러워하며 공원에서 노숙을 계속하겠다고 말한다."
1691499850 = "식량 조달 작전"
1706575867 = "다음 날, 공원을 찾은 선생님은 아무것도 먹지 못한 채 굶주리고 있는 소대원들을 마주한다. 소대원들은 선생님이 건네는 호의를 계속해서 거절하고, 선생님은 대신 공짜 음식을 얻을 수 있는 장소를 알려준다. 그 장소에 도착한 소대원들은 공짜 음식이 다름 아닌 '편의점 폐기 도시락'임을 알게 된다."
3423941325 = "당근 작전 1"
3800690627 = "편의점 폐기 도시락 덕분에 식사 문제를 해결할 수 있게 된 RABBIT 소대원들. 하지만 씻을 곳이 여의치 않았던 탓에 소대원들은 목욕 문제를 걱정하고 있었다. 선생님은 드럼통을 목욕통 대신 쓰면 된다는 아이디어를 제안하고, 소대원들은 폐드럼통을 구하기 위한 작전을 개시한다."
1346916350 = "당근 작전 2"
2689011259 = "RABBIT 소대원들이 D.U. 인근의 하역장에서 폐드럼통 수거 작전을\n개시한다. 하지만 여전히 미야코를 신뢰하지 못하는 소대원들은 그녀의 지시에 계속해서 불만을 터트리고, 이로 인해 돌발 상황에 대처하지 못하면서 미유가 작전에서 낙오되고 만다."
1989812613 = "당근 작전 2"
1658521241 = "낙오된 미유를 구출하기 위해 작전을 짜는 선생님과 소대원들. 미야코와 사키는 선생님의 아이디어에 따라 드럼통을 뒤집어쓴 채 목표 지점에 잠입하여 미유를 구출해 낸다. 무사히 작전을 완료한 RABBIT 소대원들은 드럼통에 물을 데워 간만의 목욕을 즐긴다."
4283874219 = "수상한 그림자"
2057607723 = "공원 인근의 시장에서 장을 보던 선생님은 키리노로부터 '중무장을 한 수상한 노숙자들이 있다'는 소문을 전해 듣게 된다. 선생님은 RABBIT 소대의 소문이 와전되었다고 생각하지만, 직후 정체불명의 노숙자들이 선생님을 납치한다."
2671061263 = "무소유와 야키니쿠 도시락"
1248308752 = "선생님을 납치한 것은 '소확행'이라는 로봇 히피 그룹이었다. 그들은 선생님이 RABBIT 소대를 시켜 근처의 폐기 도시락을 독점하고 있다며 화를 낸다. 소확행의 리더, 데카르트는 선생님을 통해 RABBIT 소대와의 교섭을 시도하지만 결렬되고 만다."
841964058 = "무소유와 야키니쿠 도시락"
2664679563 = "RABBIT 소대의 강력한 화력 앞에 '소확행'의 로봇들은\n속수무책으로 무력화되고, 데카르트와 RABBIT 소대원들은 유치한 말싸움을 벌인다. 선생님의 중재로 말싸움은 끝이 나고, 소대원들은 공원으로 돌아간다."
4069006275 = "호우주의보"
3932457485 = "어느 날, 갑작스러운 폭우로 인해 RABBIT 소대가 머무르고 있던 공원이 침수된다. 소대원들은 비를 막기 위해 여러 가지 노력을 하지만, 지휘 텐트가 무너지자 결국 의욕을 잃고 자포자기해 버린다. 선생님은 폭우 속에서 끝까지 혼자 분투하던 미야코를 솔선해서 도와주고…… 이 모습을 본 소대원들은 자존심을 내려놓고 선생님의 지시에 따르기로 한다."
3138235130 = "비에 젖은 청구서"
1105239486 = "침수 피해를 입은 공원을 정비하기 위해 총학생회에 제안서를 들고 찾아간 [USERNAME] 선생님. 하지만 린 행정관을 비롯한 임원들은 SRT 학원의 학생들을 돕는 것을 꺼린다. 이 모습을 본 카야는 폭스 소대가 과거에 저질렀던 사건에 관해 이야기해주고, 자신은 선생님을 계속 돕겠노라고 말한다. 한편, 칸나와 마주친 카야는 '코우사기 타운의 재건축을 위해 빨리 노숙자들을 쫓아내라'며 아까와는 다른 모습을 보인다."
346541298 = "여우와 유부초밥"
283423853 = "점심 무렵, 선생님은 공원 근처에서 유부초밥을 파는 노점상을 발견한다. 노점상의 아르바이트 학생은 코우사기 타운의 재개발을 비롯하여 SRT 학원에 관한 여러 가지 소문을 전해준다. 이후, 공원에 도착한 선생님은 소대원들과 유부초밥을 나누어 먹으며 앞으로의 보급 계획을 논의한다."
2188950162 = "물물교환"
1844122045 = "RABBIT 소대의 보급 담당자인 모에는 <카이저 인더스트리>에\n침수된 장비를 팔아 저렴한 무기를 구입하려 하지만, 어찌 된 일인지 카이저 인더스트리의 무기가 모두 팔려나갔다는 소식을 전해 듣게 된다."
1905614692 = "소소하지만 확실한 패배"
3583459890 = "익명의 바이어를 통해 녹슨 장비를 모두 매각하고, 새로운 장비를 구입한 RABBIT 소대. 그때, 데카르트가 나타나 발키리 공안국이 새로운 무기로 무장하고 인근의 노숙자들을 쫓아내고 있다는 소식을 전해준다. 그가 말을 끝마치기도 전에 칸나가 공원에 모습을 드러낸다."
3162953850 = "리베이트"
251338756 = "칸나는 이제 공안국이 SRT보다 더 강력한 무기로 무장하고 있다며, 월말까지 공원에서 퇴거하지 않으면 강제로라도 쫓아내겠노라 선언한다. 선생님은 공안국의 무기가 <카이저 인더스트리>제라는 것을 알아차리고, 공안국과 카이저 그룹 사이에 불법 리베이트가 있었을 거라고 말한다. RABBIT 소대의 학생들은 공안국의 일탈을 조사하기 위해 경찰학교 본관을 습격하기로 한다."
1172421243 = "클로버 작전 1"
2241435022 = "공안국의 비리를 조사하기 위해 본관에 잠입한 미야코와 일행들. 이들은 선생님과 모에의 지원을 받아 기록 보관실에 잠입하는 데 성공하지만, 미유의 실수로 보관실 안에 역으로 갇혀버리게 된다."
140507024 = "클로버 작전 2"
3559020515 = "혼란스러워하는 소대원들을 앞에 두고 미야코는 다시금 자신의 무력함을 실감한다. 하지만 선생님과 소대원들이 그녀에게 신뢰를 보내며 진심으로 응원하자, 다시 용기를 얻은 미야코는 작전지역을 빠져나갈 계획을 세운다."
1348297398 = "클로버 작전 2"
3884614313 = "미야코와 RABBIT 소대 소대원들은 미야코의 지시에 따라 일사불란하게 발키리 경찰학교의 학생들을 제압하며 옥상으로 향한다."
3001093634 = "어른의 시간"
549448127 = "옥상에 도착한 소대원들 앞에 칸나가 나타나 그들을 가로막는다. 칸나는 온갖 특권 아래서 작전을 수행해 온 SRT 학원이 정의를 논하는 것은 불공평하다며 화를 내지만, 선생님의 지적에 자신의 과오를 깨닫고 물러선다. 무사히 캠프로 복귀한 RABBIT 소대원들은 증거품을 선생님에게 넘기고 잠에 빠진다."
1089763991 = "굴속의 여우"
2732075377 = "사건이 끝나고 공안국은 카이저 그룹과의 리베이트가 폭로되어 한동안 홍역을 치른다. 코우사기 공원은 다시 평화를 되찾고, RABBIT 소대의 학생들도 다시 평온한 일상을 되찾게 된다. 한편 총학생회의 안보실장, 카야는 사라진 줄 알았던 폭스 소대와 은밀히 접선하여 총학생회에 쿠데타를 일으킬 계획을 세운다."
2657253984 = "여우가 꾸는 꿈"
2098684420 = "2년 전, SRT 특수학원이 막 발족했을 무렵. FOX 소대가 카이저 인더스트리의 탄약 공장 앞에서 자신들의 첫 작전을 브리핑한다. 그리고 다시 현재로 돌아와서, 키보토스 곳곳에서 사보타주를 벌이던 FOX 소대는 후배들을 맞이할 준비를 시작한다."
3818520446 = "토끼가 꾸는 꿈"
252378376 = "어느덧 공원에서의 노숙 생활에도 익숙해진 RABBIT 소대 일행. 아침을 준비하던 중, 샬레의 선생님이 찾아와 지난 일에 대한 답례라며 비싼 소고기를 선물한다."
1519446641 = "미끼"
2004501637 = "선생님이 가져온 소고기를 구워 먹으며 즐거운 한때를 보내는 RABBIT 소대와 선생님. 모에의 도움으로 지난 작전 당시의 CCTV를 살펴보던 중, 소대원들은 SRT의 장비를 착용한 수상한 그림자를 목격한다. 이전에 무기상에게 장비를 팔았던 사실을 떠올린 RABBIT 소대는 자신들이 선생님을 곤경에 빠뜨렸다는 죄책감에 은밀히 범인을 잡기로 결심한다. "
2488756278 = "예상치 못한 재회"
2671501519 = "수상한 그림자를 뒤쫓아 목표 지점에 도착한 RABBIT 소대. 순조롭게 지역 장악을 시작하지만, 갑작스러운 습격에 소대원들의 통신이 끊겨 나간다. 그리고 마침내 고립된 미야코는 뜻밖의 인물과 재회하게 된다."
942163621 = "선배의 그림자"
3816355345 = "오랜만에 FOX 소대와 마주하게 된 RABBIT 소대의 소대원들은 니코가 준비한 유부초밥을 나눠 먹으며 즐겁게 근황을 이야기한다. 하지만 즐거운 시간도 잠시뿐. 미야코가 습격에 대해 캐묻자, 유키노는 본심을 드러내며 FOX 소대에 합류하라는 제안을 건네고 미야코는 혼란스러워한다. 뒤늦게 RABBIT 소대를 쫓아 온 선생님은 잠시 시간을 달라며, RABBIT 소대를 데리고 코우사기 공원으로 돌아간다."
2758921771 = "후배의 고뇌"
4159709149 = "코우사기 공원으로 돌아온 RABBIT 소대는 과거의 FOX 소대에 관해 이야기하며, 선배들이 갑자기 변해버린 이유에 대해 고심한다. 그때 갑자기 총학생회로부터의 방송이 시작되고, 카야가 린을 대신하여 자신이 총학생회장 대행을 맡게 되었다는 사실을 공표한다."
1587683690 = "쿠데타"
1212060240 = "카야의 방송으로부터 몇 시간 전, 총학생회에서는 일전에 벌어진 사건의 뒤처리를 두고 격론이 오간다. 회의를 마치고 돌아가던 린은 카야에게 기습을 당해 연금되고, 행정위원회의 여론을 장악한 카야가 총학생회장 대행의 자리에 오른다. "
520211906 = "새로운 대행"
3987261099 = "카야의 초대에 응하여 총학생회를 찾은 선생님. 카야는 새로운 행정 절차 개선안을 제시하며 선생님을 회유하려 하지만, 선생님은 그녀의 제안을 단칼에 거절한다."
1497265820 = "D.U.의 새로운 아침"
1641525659 = "새로운 행정 명령이 시행된 후, D.U. 곳곳에는 치안 유지를 위해 카이저 시큐리티 가드가 투입된다. 카이저 시큐리티가 시민들의 자유를 제한하고, 사람들을 무작정 연행해 가는 모습을 보며 RABBIT 소대는 이에 대해 항의하려 하지만 카이저 제너럴이 나타나 권력과 복종과 가치에 관해 이야기한다."
1720696531 = "통제불능"
3618496825 = "카야는 새로운 총학생회장 대행으로서 새로운 업무를 시작해 나가려 하지만, 키보토스 곳곳에서 예측하지 못한 사건과 사고가 휘몰아친다."
115168734 = "블랙 커피"
3651125542 = "선생님은 RABBIT 소대를 만나기 위해 코우사기 공원으로 가던 도중, 키리노와 카이저 시큐리티의 가드가 다투는 모습을 보게 된다. 다행히 칸나의 도움으로 상황을 중재할 수 있었지만, 칸나와 키리노는 새로운 행정 명령으로 인해 D.U.가 혼란에 휩싸였다며 우려를 표한다."
2609050753 = "결심"
1905103418 = "코우사기 공원에 도착한 선생님. 그러나 그곳에 RABBIT 소대의 모습은 온데간데없었고, 미야코가 작성한 편지 한 통만이 남아 있었다."
1718431036 = "충격과 공포"
1319244017 = "혼란스러운 D.U.의 상황을 정리하기 위해 회의를 소집한 카야. 하지만 상황은 좀처럼 풀리지 않고, 카야는 제너럴과 유키노를 집무실로 불러 해결을 독촉한다. 그러던 중 카야는 사태를 해결할 수 있는 한 가지 묘책을 떠올리는데……"
3006987774 = "죄수의 딜레마"
2130705949 = "늦은 저녁, 공원의 정리를 마치고 샬레로 돌아온 선생님은 소라로부터 도시락 발주가 모두 취소되었다는 소식을 듣게 된다. 저녁을 거른 채 집무실로 돌아온 선생님에게 뜻밖의 손님이 찾아와 유부초밥을 건넨다."
1786519907 = "SRT의 정의"
1305326365 = "선배들과 훈련도 하고, 깨끗한 샤워실에서 샤워도 하며 모처럼 풍족한 일상을 보내게 된 RABBIT 소대원들. 하지만 미야코는 어쩐지 허전한 느낌을 받는다. 샤워를 마친 미야코는 경계 근무 중 기지 외곽에서 경보 장치에 걸린 선생님과 마주친다."
2062986205 = "그 선생님의 사정"
4072771013 = "취조실에서 선생님과 이야기를 나누는 미야코. 미야코는 SRT의 부활을 위해서는 어쩔 수 없었다며 괴로워하지만, 선생님의 이야기를 듣고 작은 깨달음을 얻게 된다. 미야코는 선생님을 기지 밖으로 돌려보낸 뒤 유키노에게 선전포고를 한다."
2788876369 = "금의야행"
318148566 = "다음 날, 코우사기 공원에서 미야코와 다시 만난 선생님. 미야코는 FOX 소대가 코우사기 역을 폭파하려 한다며 이를 저지하고 싶다고 말한다. 선생님과 함께 코우사기 역으로 향한 미야코는 그곳에서 취업한 데카르트와 마주친다."
1554714519 = "엘리트와 엘리트"
1900114770 = "데카르트는 제멋대로 카이저 시큐리티를 향해 공격을 감행하지만, 큰 전과를 올리지 못하고 고전한다. 그때, 칸나와 생활안전국 학생들이 찾아와 미야코 일행을 돕는다."
347599141 = "엘리트와 엘리트"
552425972 = "칸나와 생활안전국의 활약에 카이저 시큐리티는 무너져 내리고, 그 틈을 타 미야코와 선생님은 역의 지하로 향한다."
4105357213 = "어비스"
2925617176 = "코우사기 역 지하에서 거대한 미사일 사일로를 목격하게 된 미야코와 선생님. 거기에 더해 FOX 소대가 이미 사일로의 시설을 점거하고 방어 전술을 펼치고 있는 상황이었다. 그때, RABBIT 소대의 학생들이 찾아와 미야코와 합류한다."
965452976 = "카르바노그의 굴속에서 1"
1568447496 = "FOX 소대와 RABBIT 소대는 서로 다른 방향의 전술로 작전을 준비한다."
1976030888 = "카르바노그의 굴속에서 1"
3156367598 = "FOX 소대는 베테랑답게 노련한 전술로 RABBIT 소대를 상대하지만 RABBIT 소대의 기상천외한 전술에 실수를 연발하며 쓰러지기 시작한다. 곧, RABBIT 소대는 오퍼레이션 룸으로 향하는 엘리베이터 통로를 확보한다."
892239188 = "카르바노그의 굴속에서 2"
2435344861 = "다른 FOX 소대원들이 모두 무력화되자, 유키노는 소대원들을 밖으로 피신시키고 RABBIT 소대에게 사일로를 이대로 폭파하겠다는 협박을 한다. 하지만 RABBIT 소대는 아랑곳하지 않고 오퍼레이션 룸으로 돌입한다."
3979027752 = "어제와 내일"
1693248650 = "유키노가 자폭 버튼을 누르려던 찰나, 피신한 줄 알았던 FOX 소대원들이 그녀에게 합류한다. 그리고 오퍼레이션 룸 앞에서 FOX 소대와 RABBIT 소대가 동시에 격돌한다."
3373122807 = "어제와 내일"
2860466848 = "격전 끝에 FOX 소대를 제압한 RABBIT 소대. 미야코는 유키노에게 자신이 생각하던 선배의 모습에 관해 이야기하고, 과거의 꿈을 떠올린 유키노는 결국 항복하기로 마음을 먹는다."
3729157719 = "실패한 쿠데타"
875871241 = "FOX 소대의 패배 소식을 들은 카야는 당황해하며 카이저 시큐리티를 동원하려 하지만, 단합한 RABBIT 소대 앞에서 카이저 시큐리티의 병사들은 속수무책으로 쓰러진다."
2757905344 = "실패한 쿠데타"
340280301 = "다시 한번 카야와 대면하게 된 RABBIT 소대와 선생님. 카야는 온갖 감언이설로 선생님을 설득하려 하지만, 자신이 세웠던 음모가 폭로되며 결국 실각하고 만다."
696032468 = "에필로그"
253503154 = "사건이 모두 끝난 뒤, 카야는 탄핵을 당하고 관련된 인물들은 모두 수감된다. 교정국에 머무르던 니코는 누군가가 밖에서 보내온 한 통의 편지와 유부초밥을 받고 미소를 짓는다."
2141989400 = "프롤로그"
3946132036 = "어느 날, 니야로부터 백귀야행에 찾아와주었으면 한다는 연락이 도착한다. 마침 쿠즈노하를 만나보고 싶다고 생각하고 있던 선생님은 그 제안을 허락하고 백귀야행으로 향한다."
867945468 = "느닷없는 조우 1"
2534282816 = "백귀야행에 도착한 선생님은 한 여학생과 불량배가 주민의 지갑을 두고 실랑이를 벌이는 장면을 목격한다. 여학생은 불량배에게 돌진해 지갑을 되찾고 당황한 불량배는 동료를 부른다."
784650514 = "느닷없는 조우 2"
1005886133 = "불량배를 쫓아내는 데 성공한 유카리와 선생님. 주민은 지갑을 되찾아준 유카리에게 감사를 표한다. 주민이 떠난 후 유카리는 선생님에게 정식으로 인사를 건네고 등불축제장으로 안내를 시작하지만, 유카리를 찾는 사용인이 나타나자 유카리는 황급히 자리를 떠난다."
3919672259 = "음양부에서"
2802641052 = "니야는 선생님과 만나 지금 백귀야행에서 준비하고 있는 축제에 대해 이야기하며, 함께 <화조풍월부>가 보내온 협박편지를 언급한다. 이것과 관련해 선생님의 도움을 받고 싶다는 니야의 말에 선생님이 고개를 끄덕인 순간, 유카리가 찾아온다."
3637226461 = "자칭 엘리트 소녀 등장!"
1078075001 = "음양부에 찾아온 유카리는, 모습을 감추었다가 나타난 나구사 이야기를 하며 니야에게 백화요란의 <계승전>을 도와줄 것을 요청한다. 니야는 이 일을 선생님에게 부탁한다."
2370772485 = "다음으로 향해야 할 곳은"
2706623289 = "백화요란의 부흥을 위해 <계승전>을 하려고 마음 먹었다는 유카리. 그렇게 유카리는 <계승전>의 도움을 받기 위해 다른 백화요란의 선배들을 찾고자 마음 먹고, 렌게의 집을 방문하지만, 그곳에서 쪽지를 발견한다."
3399810198 = "청춘(?)에 매진하는 소녀 1"
1054335404 = "<청춘을 되찾기 위한 여행>을 떠난다며 자리를 비운 렌게를 찾기 위해, 유카리는 선생님과 함께 다양한 동아리들을 찾아다니지만, 렌게를 찾는데 실패한다. 그렇게 잠시 휴식을 취하며 앞으로의 일을 논의하는 그때, 카에데가 선생님을 덮친다."
4196717210 = "청춘(?)에 매진하는 소녀 2"
2076588919 = "수행부는 마츠리부의 의뢰로 백귀야행 시설 점검을 진행하고 있었고 선생님과 대화를 나눈다. 여러 대화를 나누던 도중 갑작스레 아라타와 망량즈가 난입하고 렌게가 등장한다."
2273835101 = "청춘(?)에 매진하는 소녀 2"
3687320158 = "아라타와 망량즈를 쫓아내는 데 성공한 선생님 일행. 유카리는 렌게에게 달려가지만 갑작스러운 조우에 렌게는 당황한다."
3665538726 = "후와 렌게"
4273860323 = "유카리는 <청춘 활동>의 일환으로 수향부와 동행중인 렌게에게 계승전을 도와달라고 요청한다. 계승전의 얘기를 들은 렌게는 분노하며 거절하고 행동에 나선다."
1700027356 = "후와 렌게"
3723106540 = "렌게에게 제압당한 유카리. 렌게는 백화요란은 이전으로 돌아갈 수 없다고 유카리에게 일갈하며 돌아가고 수행부 학생들이 따라나선다."
503705097 = "붉어진 뺨"
1747027451 = "렌게의 일로 유카리는 혼란스러워하지만, 마음을 다잡는다. 대신 또 다른 백화요란의 선배를 찾기 위해 나서려는 그때, 사용인이 나타나 잠시 유카리는 자리를 비우게 된다. 유카리와 헤어진 선생님은 축제장을 돌아다니는 도중, 갑작스러운 소동과 그 소동에 휘말린 소녀와 만나게 된다."
2958590599 = "백화요란의 부원"
3591646746 = "소녀는 아라타와 망량즈와 끊임없는 연전을 이어가지만 결국 수세에 몰린다. 그 순간, 선생님이 소녀를 구해주고 함께 장소를 빠져나온다. 소녀는 자신을 탈퇴한 백화요란 부원이라 소개하며 백화요란에 관한 이야기를 나눈다."
398789845 = "키류 키쿄, 그리고 계승전 1"
1542367438 = "다음 날, 유카리와 합류한 선생님은 키쿄를 만나기 위해 백화요란의 조정실을 찾고, 그곳에서 키쿄와 시즈코를 만난다. 유카리는 키쿄에게 <계승전>을 도와달라 말하지만, 키쿄는 처음부터 그건 불가능한 이야기라며, 그것을 증명해주겠다는 말과 함께 유카리와 <계승전>을 치른다."
1013593128 = "키류 키쿄, 그리고 계승전 2"
1716918261 = "<계승전>에서 패배한 유카리에게 키쿄는 아가씨의 놀이는 그만하라고 일갈한다. 결국 견디지 못한 유카리는 떠나가고, 자리에 남은 선생님과 키쿄는 남겨진 백화요란에 대한 이야기를 나눈다. 그리고 그때, 나구사에게 패배하고 투덜거리던 망량즈는 기이한 분위기를 가진 소녀와 마주친다."
3225732755 = "결심하는 소녀"
1744921907 = "유카리를 찾기 위해 둘로 나뉜 시즈코와 선생님. 그렇게 시즈코는 가까스로 유카리와 재회하여 돌아가자고 말하지만, 유카리는 고개를 저으며 자신이 결심한 바를 전해준다. 바로 그때. 선생님은 거리에서 또 한 명의 수상한 소녀와 마주친다."
3704592008 = "조우"
1747430871 = "자신을 화조풍월부라고 밝힌 소녀는 의미심장한 말을 남긴 채 인파 속으로 사라진다. 그때 시즈코에게서 유카리를 찾고 난 뒤 있었던 이야기를 들은 선생님은, 백화요란의 사정을 듣기 위해 나구사를 찾고자 인법연구부에게 연락을 취한다."
4268581401 = "고료 나구사"
143447072 = "백화요란 시절의 과거를 회상하고 있는 나구사의 앞에 선생님이 나타난다. 나구사는 자신의 정체를 밝히고 선생님과 대화를 이어간다. 그리고 축제의 시작을 알리는 폭죽이 터지는 순간, 환량백물어가 출현하고 축제 거리는 혼란에 휩싸인다."
644791031 = "거리를 거니는 괴담 1"
2513148571 = "유카리가 가문의 일을 잇기 위해 자리를 비운 한편, 렌게는 이것으로 전부 끝났다고 말하지만. 수행부의 충고로 진정 자신이 하고 싶은 게 무엇인지 떠올린다. 그리고 그때 백귀야행 각지에 나타난 환량백물어를 향해 모두가 사태를 수습하기 위해 움직인다."
2982310612 = "거리를 거니는 괴담 2"
1779959641 = "혼란스러운 거리를 수습하는 사이, 나구사는 선생님에게 환량백물어에 대해 설명해 준다. 그 후 두 사람이 수행부 및 렌게와 예상치 못한 조우를 하여 잠시 어색한 공기가 흐르는 그때, 거대한 울음소리와 함께 갑작스러운 전투가 시작된다."
1944548097 = "화조풍월의 괴담가 1"
3436163381 = "환량백물어와 전투를 하지만, 전혀 피해를 받지 않는 그 모습에 일행은 당황한다. 나구사가 저것을 쓰러트리기 위해선 자격이 필요하다 말하는 그때, 슈로가 그 앞에 나타나며 나구사를 비웃는다."
3203640400 = "화조풍월의 괴담가 2"
1142989290 = "선생님과 츠바키의 공격에도 아랑곳하지 않은 채, 슈로는 이미 사태는 자신의 계획대로 돌아가고 있다는 말과 함께 자리에서 퇴장한다. 그리고 슈로를 쫓아려는 일행의 앞을 쿠로카게가 막아선다."
930282140 = "화조풍월의 괴담가 2"
790387478 = "자기 개인의 의지와는 상관없이 어디까지나 가문을 대신하여 무대에 서야 했던 유카리. 그렇게 그 누구도 자신의 의사를 존중하지 않는 작금에 유카리가 실망하는 그때. 그녀는 누군가의 속삭이는 소리를 듣게 된다."
4033191432 = "그럼에도 당신에게"
3274326348 = "쓰러트릴 수 없는 쿠로카게 앞에서 모두가 가로막혀 아무것도 하지 못하는 사이, 키쿄가 나서서 나구사를 설득한다. 자격을 가진 그녀만이 유카리를 구할 수 있다며 부탁한다는 키쿄의 설득에, 나구사는 선생님과 함께 앞으로 나아간다."
1742211216 = "화염에 휩싸인 거리"
1706685059 = "선생님과 나구사는 끝없는 환량백물어의 출현으로 광장의 무대 앞에서 막히지만 음양부와 인법연구부가 나타나 도와준다."
3155421652 = "화염에 휩싸인 거리"
1197423923 = "유카리의 앞에 슈로가 나타난다. 슈로가 유카리를 통해 만들어낸 환량백물어 <얼굴 없는 카타시로>와 불타는 축제 거리를 보여주는 것에 유카리가 충격을 받고 쓰러진 그때, 선생님과 나구사가 등장한다."
3881819382 = "꾸며낸 거짓말"
415440099 = "이 자리까지 찾아온 나구사를 향해 슈로는 대설원에서 있었던 일과 나구사가 저지른 잘못에 대해 보여준다. 거기에 나구사가 견디지 못하고 무너지자, 슈로는 자신의 승리를 직감하지만, 바로 그때. 선생님이 앞으로 나선다."
2046334446 = "평범한 일"
1314809181 = "선생님의 반박에 슈로는 분노한다. 그렇게 방해되는 선생님을 공격하려는 슈로였지만, 그 앞을 유카리가 막아선다. 카데노코지가 아닌 백화요란의 유카리로서 남고자 택한 소녀는 이어 도착한 렌게, 키쿄와 함께 <얼굴 없는 카타시로>와 전투에 돌입한다."
3026137772 = "평범한 일"
2364647164 = "렌게, 키쿄, 유카리가 환량백물어에게 밀리며 위험에 처한 그때, 나구사가 앞으로 나선다. 슈로의 비난에도 불구하고 더는 그때처럼 소중한 사람을 잃고 싶지 않다 말한 나구사는 백화요란의 <자격>을 가지고 슈로를 쓰러트리고 궁지로 내몬다."
1918408273 = "지금 당신에게"
3492807103 = "끝내 슈로는 도망쳐버렸지만, 유카리는 모두와 다시 모이게 된 것에 감사하며, 곧바로 나구사에게 원래 목적이었던 <계승전>을 신청한다. 유카리는 순식간에 패배해버렸지만, 그럼에도 밝은 표정으로 모두와 함께 백화요란으로 돌아가자고 말한다."
2816211461 = "소원을 담아"
3813773295 = "일련의 사건이 끝나고 백귀야행에는 다시금 평화가 찾아온다. 아직 끝나지 않은 일이 곳곳에 남아있지만. 그럼에도 모두가 한마음으로 등불을 흘려보내는 그때. 어둠 속에선 화조풍월부의 부장. 코쿠리코가 마각을 드러내며 미소 짓는다."
1478099875 = "닿지 못한 옷자락"
2417637268 = "설원에서 아야메를 놓쳤던 일을 떠올리며 악몽에 시달리는 나구사. 악몽의 탓인지 팔의 통증은 날이 갈수록 심해져 간다."
2900210047 = "새로운 괴담"
1286307520 = "홀로 풍류를 즐기고 있는 코쿠리코에게 화조풍월부의 새로운 부원이 찾아온다. 한편, 나구사를 향한 복수심을 불태우던 슈로는 백화요란에게 복수할 수 있는 새로운 방법을 떠올린다."
2234435405 = "새로운 축제"
2388749549 = "<와라쿠 축제>를 앞두고 모두가 축제 준비에 열중하는 와중에 아라타가 이끄는 망량즈가 나타나 축제 준비를 방해한다."
1536773814 = "새로운 축제"
1088037523 = "아라타를 물리친 뒤 축제 준비를 거드는 백화요란 부원들. 그러던 중 유카리가 나구사의 상처가 심상치 않음을 깨닫고 그녀를 카데노코지 가문으로 데려간다."
1501948804 = "카데노코지 가의 귀인"
2728089330 = "카데노코지 가문에서 머무르고 있던 수상한 의원은 나구사의 팔이 황혼에게 당한 것임을 바로 눈치챈다. 팔을 치료하기 위해서는 다시 대설원에 가야 한다는 의원의 말에 나구사는 그동안 숨겨왔던 아야메와의 일을 부원들에게 이야기해 준다."
756362788 = "기억 저편의 그리움"
3370516004 = "수개월 전, 아야메를 찾아 나선 나구사는 아야메로부터 '친구라고 생각하지 않았다'는 심한 말을 듣게 된다. 이 이야기를 전해 들은 부원들은 당혹스러워하면서도 사정이 있었을 것이라며 직접 아야메를 찾아 묻기로 한다."
1502304932 = "축제 준비"
2057092328 = "백화요란을 소집한 니야는 북쪽 자치구에 있는 에비스 분교에서 괴이가 나타나 시민들을 위협한다며, 백화요란이 이를 해결해 주었으면 한다고 부탁한다. 이에 더해 쿠즈노하의 흔적을 찾을 수 있을지도 모른다는 생각에 선생도 백화요란과 함께 동행한다."
1315750381 = "설국"
1205635506 = "북쪽 자치구에 도착한 백화요란 일행은 자치위원회의 회장이라 자신을 소개한 아자미와 만난다. 아자미는 에비스 분교 주변에서 일어난 일을 소개하며, 북쪽 자치구 곳곳을 안내한다."
3601732457 = "악몽"
1301003702 = "숙소에서 또다시 아야메와 관련된 악몽을 꾸다 깨어난 나구사. 잠에서 깨어난 나구사 앞에 슈로가 나타나 그녀를 조롱하며 전투가 시작된다."
2063888527 = "악몽"
639451166 = "다른 부원들의 가세로 전황이 기울자, 슈로는 도망치려 하지만 예상치 못한 일격에 붙잡히고 만다. 백화요란을 도와 슈로에게 일격을 날린 학생의 정체는, 다름 아닌 아야메였다."
3247570939 = "백화요란의 부장"
2246015017 = "함께 식사를 하며 그동안 있었던 일에 대해 사과하는 아야메. 하지만 아야메는 대설원에서 있었던 나구사와의 일을 기억하지 못하고, 나구사는 자신이 잘못 기억하고 있었던 것일 거라며 기억을 부정한다. "
3980407787 = "불완전한 기억"
2999571268 = "붙잡힌 슈로를 심문하며 그동안 자신이 찾은 화조풍월부에 대한 정보를 공유하는 아야메. 하지만 키쿄는 어째서인지 그런 아야메에게 위화감을 느끼고, 불편한 동행이 계속된다."
1983223605 = "피안으로 가는 길"
2421424457 = "화조풍월부의 본거지로 향하던 중, 백화요란 일행은 슈로의 품에서 수상한 책 한 권을 발견한다. 괴서인 줄 알았지만, 그 책의 정체는 다름 아닌 슈로의 자작 소설이었다."
1938968282 = "카데노코지가의 무녀"
2793738644 = "<피안의 저택>에 도착한 백화요란 일행은 조를 나누어 저택을 수색하기로 한다. 서재를 조사하던 중, 유카리는 낡은 일기장을 발견하게 되고, 그 내용을 통해 코쿠리코가 한 때 카데노코지의 무녀이자 백화요란의 선배였다는 사실을 알게 된다. 충격에 빠진 유카리 앞에 코쿠리코가 나타나 그녀를 습격한다."
3547088513 = "뱀의 아가리 속에서"
2202995269 = "저택의 정체를 알아차린 키쿄는 렌게를 데리고 황급히 [USERNAME] 선생님에게 향한다."
4125006944 = "뱀의 아가리 속에서"
