762864177 = "[c]After the equipped Striker's EX Skill is activated:[/c] Recovers HP by [c]{param;BasePower}[/c].\n\n\n[c][75b4c0][i]Marine sports brand Harpia has a huge fanbase centered around Odyssey Maritime School.[/i][-][/c]"
228520307 = "[c]Base Durability: 3[/c]\n"
