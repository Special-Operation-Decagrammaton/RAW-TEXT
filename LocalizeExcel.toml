1540130814 = "カルパッチョ・ファミリーの幹部を捕らえ、SRT式の尋問を行うFOX小隊。自白させることに成功し、噂は市民の恐怖を煽るためにファミリーが広めたものだと判明する。しかし息つく間もなく、轟音を響かせる巨大なカニが港を襲撃しはじめた。"
4070492427 = "変わらない価値"
3578537993 = "巧みな連携で「ドラム缶ガニ」を撃退したFOX小隊は、戦闘の跡から「くねくね」の時に見つけたようなガラス片を発見する。それをユキノが先生に預けて一件落着かと思われたが、倉庫から大量に逃げ出したカニを追って、一晩中港を駆け回ることになるのだった。"
