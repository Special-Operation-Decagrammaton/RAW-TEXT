1541422275 = "히나 부장님. 만마전이 얼토당토않은 요구를 했을 땐 또 어떻게 되는 걸까, 걱정도 했지만…\n\n그래도 부장님이 노력하는 모습을 보고 저 아코, 걱정할 때가 아니라는 걸 깨달을 수 있었습니다.\n\n여기선 선도부의 선임행정관으로서 히나 부장님을 응원하겠습니다. 부장님, 연주! 부디 힘내세요!"
1570765118 = "후후, 저희도 이야기는 들었습니다.\n\n다름 아닌 그 귀신 선도부장께서 아름다운 드레스 차림으로 선보이는 피아노 연주라니… 그건 그렇군요. 미식과 비슷하군요.\n\n그럼 어디, 당일의 연주를 고대하는 마음으로 기다려볼까요? 후후훗! 연주, 힘내시길."
2407965685 = "이야기는 들었어. 게헨나 파티에서 피아노 연주를 한다고 했었지.\n\n만마전의 억지를 들어주느라, 그쪽도 엄청나게 고생하고 있구나. 나도 주리도 탈 없이 공연을 마칠 수 있도록 응원하고 있을 테니까.\n\n힘내. 게헨나의 선도부장님."
2286376939 = "저기저기~ 선도부장 말이야.\n\n이번에 굉장한 연주를 한다고 들었어~! 그건 온천 개발만큼이나 대단한 거지?!\n\n애들하고 들으러 갈 테니까! 힘내!"
978447002 = "히나 선도부장님!\n\n게헨나의 풍기를 지키는 학생으로서 늘 누군가의 편을 드는 일 없이 언제나 선도부원으로서 공명정대함을 지키라 부장님께선 말씀하셨지만, 이번만큼은 저희 선도부 일동!\n\n부장님의 편으로서 연주를 성공적으로 마무리하시기를! 진심으로 응원하고 있습니다!"
659199751 = "부장님, 중요한 공연을 앞두고 심신에 피로는 없으신가요?\n\n만약 조금이라도 이상이 느껴진다면 곧장 말씀 부탁드립니다. 부장님을 비롯한 선도부의 건강을 확인하고 적절한 조치를 하는 것이 저의 업무니까요.\n\n그리고… 새삼스럽지만, 응원하고 있습니다. 부디 힘내세요."
981979352 = "히나 선배!\n\n이부키도 선배의 피아노 연주! 두근거리는 마음으로 기다리고 있어!\n\n이부키도 열심히 응원할게~! 에헤헷!"
1958821606 = "히나찌! 응원할게!\n\n우리! 히나찌의 연주! 엄청나게 기대하고 있으니까! 분명 엄청~! 멋진 연주가 될 거야!\n\n나중에 멋진 영상으로 찍어서 히나찌에게도 보내줄 테니까! 힘내!"
4025554739 = "만마전의 억지에 어울려줘야 한다니, 부장도 고생이 이만저만이 아니네.\n\n뭐, 내가 해줄 수 있는 건 없지만, 그래도 나만이 할 수 있는 거라면… 그래! 결심했어!\n\n혹시라도 부장의 연주를 방해하려는 녀석들이 있다면, 내가 전부 날려줄 테니까! 부장! 연습! 열심히 해!"
2710967621 = "게헨나 파티 같은 커다란 이벤트가 열리더라도, 해야 할 일은 변하지 않는 법이지요.\n\n축제의 열기로 인해 혹시 다치는 이는 없는지. 사소한 부상은 없을지.\n\n그러한 마땅한 일을 끝마치고 난다면 그다음은 노력하는 이를 응원할 뿐입니다. 힘내세요, 선도부장."
