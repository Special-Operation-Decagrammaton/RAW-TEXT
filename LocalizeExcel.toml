2421559898 = "프롤로그"
516426802 = "선생님과 학생들이 전차와 싸우는 동안 와카모는 샬레 동아리실이 위치한 건물 안으로 잠입한다."
369258066 = "프롤로그"
1897585705 = "건물 지하에서 선생님과 마주친 와카모는 얼굴을 붉히며 도망치고, 뒤늦게 도착한 린은 선생님에게 총학생회장이 남긴 물건, <싯딤의 상자>를 건넨다."
3240627074 = "프롤로그"
3773339621 = "선생님과 학생들이 소요 사태의 리더인 와카모와 마주친다."
1964993858 = "프롤로그"
4155740391 = "전투 중 갑자기 와카모는 도망을 치지만, 선생님과 학생들은 그녀를 쫓는 대신 샬레 동아리실을 탈환하기 위해 계속 건물로 향한다."
2720876549 = "프롤로그"
536907202 = "싯딤의 상자를 기동한 선생님은 비서 담당 아로나와 만나 생텀타워의 제어권을 무사히 회수한다. 린은 이어서 샬레의 동아리실을 소개해주고, 선생님은 <연방수사 동아리 샬레>의 공식적인 첫 업무를 개시한다."
4199086753 = "대책위원회에 어서 오세요!"
3167291451 = "아비도스 고등학교에서 보내온 편지를 읽은 선생님은 학생들이 폭력 조직으로부터 괴롭힘을 당하고 있다는 소식을 듣고 이를 도우러 아비도스 자치구로 떠나지만 금세 길을 잃고 조난을 당하고 만다."
3987177942 = "아비도스에서의 첫날"
3646064857 = "시로코로부터 구조되어 아비도스 고등학교의 폐교대책위원회 부실에 도달한 선생님. 하지만 그 때, 카타카타 헬멧단이 아비도스 고등학교를 공격해오고, 선생님은 학생들과 함께 이를 물리치러 나선다."
4043312483 = "아비도스에서의 첫날"
1202784751 = "아비도스의 학생들은 선생님의 지휘에 따라 헬멧단을 무사히 물리치고 학교로 복귀한다."
3989313715 = "어른의 힘, 굉장해!"
1608590402 = "헬멧단을 물리치고 다시 아비도스 고등학교로 돌아온 대책위원회 학생들은 다시 한번 선생님에게 자신들을 소개한다. 학생들은 선생님의 도움으로 학교의 보급 문제가 해결된 것에 기뻐하며, 이 기세를 몰아 카타카타 헬멧단의 전초기지를 파괴하자고 한다."
3407235728 = "어른의 힘, 굉장해!"
1856373448 = "선생님과 위원회 학생들은 카타카타 헬멧단의 전초기지를 무사히 파괴하고 학교로 돌아온다."
3961742797 = "위원회의 사정"
2472112227 = "선생님은 아비도스 고등학교가 지고 있는 빚이 9억엔이 넘고, 학생들의 힘만으로는 이자를 갚기에도 벅찬 상황이라는 설명을 전해 듣는다. 선생님은 학생들을 도우려 하지만 세리카는 어른은 믿을 수 없다며 화를 낸다."
3061964608 = "세리카의 평범한 하루"
3427145251 = "세리카를 미행하여 그녀가 아르바이트를 하는 라멘집에 도달한 선생님과 대책위원회 학생들. 다같이 라멘을 먹고 즐거운 시간을 보내지만, 세리카는 여전히 퉁명스럽다. 아르바이트를 마치고 집으로 돌아가는 길에 세리카가 헬멧단에게 납치된다."
36405547 = "구출 작전!"
426352076 = "라멘집에서 헤어진 직후, 세리카와의 연락이 끊기자 선생님은 샬레의 권한으로 핸드폰의 발신 위치를 파악하여 세리카를 구출하러 간다."
2287819315 = "새로운 위험?"
2766662048 = "헬멧단의 손에서 세리카를 무사히 구출해 낸 선생님과 대책위원회 학생들. 아야네는 전투 후, 헬멧단이 사용하던 전차의 잔해에서 키보토스 외부 세력의 흔적을 발견한다. 한편, 헬멧단을 뒤에서 조종하고 있던 카이저 PMC의 이사는 거듭되는 실패에 실망하여 헬멧단을 대신할 새로운 흥신소 직원을 고용한다."
3902676392 = "흥신소 등장!"
4083213547 = "대책위원회의 정기 회의일. 학생들은 9억 엔의 빚을 갚을 방법에 대해서 고민해보지만, 좀처럼 좋은 방법이 떠오르지 않는다. 회의를 마치고 라멘을 먹으러 간 자리에서 선생님과 학생들은 가난에 허덕이는 흥신소의 직원들과 마주치게 된다."
2584215733 = "배은망덕한 혈투"
766257118 = "뒤늦게 라멘을 대접해 준 상대가 아비도스 고교의 학생들이라는 사실을 깨닫은 아루. 아루는 한동안 죄책감에 시달리지만, 곧 마음을 고쳐먹고 용역들을 동원해서 아비도스 고등학교를 공격하러 간다."
1534182665 = "배은망덕한 혈투"
1089217150 = "대책위원회 학생들의 활약 덕분에 아루와 흥신소 직원들은 패배하여 도망친다."
2309291572 = "실마리를 찾아서"
3874145345 = "지난 전투에서 수집한 정보들을 종합하여 대책위원회 학생들은 <흥신소 68>의 직원들이 게헨나 출신의 불량 학생들이라는 사실과, 헬멧단이 사용하던 무기가 <블랙 마켓>에서 유입되었다는 사실을 알아낸다. 선생님과 대책위원회 학생들은 또 다른 단서를 찾기 위해 블랙마켓으로 향한다."
1625249857 = "블랙마켓으로 1"
3011986499 = "블랙마켓에 도착한 대책위원회 일행은 트리니티 종합학원의 학생인 히후미와 마주친다. 히후미는 페로로 한정 인형을 구매하러 블랙마켓에 왔지만, 불량배들에게 시비가 걸려 도망치던 중이었다. 이를 대책위원회 일행들이 저지하자 불량배들과 일행 간에 싸움이 벌어진다."
2005605206 = "블랙마켓으로 1"
2107918611 = "불량배들을 물리친 히후미와 대책위원회 일행들은 더 큰 소동에 휘말리기 전에 자리를 피한다."
67492089 = "블랙마켓으로 2"
2585148003 = "대책위원회 일행은 히후미에게 불량배로부터 구해준 대가로 블랙마켓 안내를 요청하고, 한동안 히후미와 동행하게 된다. 한편 흥신소 68의 사장, 아루는 지난 전투의 실패를 만회하기 위해 자금을 빌릴 방법을 찾는다."
4187141271 = "출동! 수영복 복면단 1"
847788836 = "블랙마켓을 둘러보던 대책위원회 일행은 자신들이 갚은 빚의 대금이 암흑 은행으로 흘러들어가는 것을 보게 된다. 열심히 갚은 돈이 불법적인 일에 쓰인다는 것을 알게 된 학생들은 분노하여 은행을 털기로 결심한다."
2540582765 = "출동! 수영복 복면단 2"
2791958937 = "암흑 은행에서 대출 심사를 기다리던 아루 앞에 복면을 쓴 대책위원회 학생들이 나타나 현금을 훔쳐 간다. 블랙마켓 가드가 그 뒤를 쫓고, 아루는 대책위원회 학생들이 보여준 진정한 악당의 면모에 동경 어린 시선을 보낸다."
2605391019 = "가자, 석양을 향해!"
1843801151 = "블랙마켓 가드의 추격을 피해 무사히 달아난 대책위원회 일행. 그들은 어마어마한 액수의 현금을 보고 잠시 고민하지만, 곧 호시노의 설득에 감화되어 필요한 서류 일부만 챙겨 도망치기로 결정한다. 그리고 이들이 두고 간 현금다발은 아루와 흥신소 직원들이 줍게 된다."
2080293366 = "밝혀지는 진실"
2873970964 = "암흑 은행에서 가져온 서류를 통해 대책위원회 일행은 모든 일의 흑막이 거대 기업 <카이저 코퍼레이션>이었다는 것을 알게 된다. 학교를 둘러싼 사회의 거대한 악의 앞에 학생들은 전의를 잃고 일단 해산한다."
1849712170 = "드리우는 먹구름"
2479276074 = "아루는 대책위원회 멤버들에게 받은 돈으로 아비도스 고등학교를 공격하는 것에 대해 양심의 가책을 느끼고 고민을 거듭한다. 기운이 없는 아루를 격려하기 위해 흥신소 직원들은 함께 시바세키 라멘집으로 향한다. 한편, 검은 양복을 입은 수상한 사내가 호시노의 앞에 나타나, 그녀에게 은밀한 제안을 건넨다."
3652595243 = "친구 같은 게 아니라고!"
3597989428 = "시바세키 라멘집에서 라멘을 먹던 중, 아루는 마스터가 건넨 따듯한 격려를 듣고 양심의 가책을 견디지 못하고 절규를 내지른다. 그러나 아루의 절규를 오해한 하루카는 되레 가게에 폭탄을 설치하고, 시바세키 라멘집은 흔적도 없이 폭파되고 만다."
1822218538 = "용서 못 해, 네놈들!"
2950249706 = "의도치않게 극악무도한 만행을 저지르게 된 아루. 하지만 대책위원회의 학생들은 아루의 속내를 알아차리지 못하고 그녀를 비난한다. 결국 아루는 진짜 악당 흉내를 내며 대책위원회에 맞선다."
2392026169 = "용서 못 해, 네놈들!"
647272427 = "흥신소와 대책위원회의 싸움이 최고조에 달했을 무렵, 갑자기 멀리서 포격이 날아온다. 아야네는 포를 쏜 상대가 게헨나 학원의 선도부임을 알린다."
4008077676 = "선도부, 참전!"
1530869328 = "게헨나 선도부는 흥신소의 문제아들을 잡으러 왔다고 목적을 밝히지만, 대책위원회 학생들은 아비도스 고교의 자치구에서 다른 학원 선도부가 활동하는 것은 월권이라며 게헨나 선도부에 맞서 싸운다."
906157151 = "선도부, 참전!"
684749186 = "게헨나 선도부는 수적 우위에도 불구하고 선생님이 지휘하는 대책위원회 학생들을 이겨내지 못하고 패배한다. 전투가 끝나자 게헨나 선도부의 선임행정관인 아코가 나서서 중재에 나서고, 그 틈을 타 하루카는 모종의 음모를 꾸미기 시작한다."
4085844327 = "예기치 못한 동맹"
2776982583 = "선도부의 아코와의 대화는 잘 풀리지 않고, 결국 적대적인 분위기가 흐른다. 대책위원회는 흥신소 일행과 협력하여 압도적인 선도부의 전력에 맞서기로 한다."
1339565549 = "예기치 못한 동맹"
1377434222 = "힘겨운 전투를 끝냈지만, 또다시 다수의 선도부원이 증원된다. 그때, 선도부 부장 히나가 등장하여 이 상황에 대해 아코를 문책한다."
1471802853 = "게헨나의 선도부장"
2688547338 = "히나는 상황을 설명 듣고 아코의 독단적인 선도부 운용에 대해 대책위원회에 순순히 사과한다. 그리고 병력을 물리면서 선생님에게 조용히 아비도스 사막에서 카이저가 무슨 일을 벌이고 있다는 정보를 준다."
4195603251 = "안녕, 흥신소 68"
1030591484 = "선생님은 아비도스를 떠나는 흥신소를 배웅한다. 한편, 아야네와 세리카와 함께 입원한 시바 마스터를 찾아갔다가, 라면 가게의 건물이 카이저로 넘어갔다는 사실을 듣게 된다."
3139483916 = "각자의 이야기들 1"
839043873 = "다시 동아리실에 모두 모이게 되고 상황을 정리한다. 아야네와 세리카는 행정 서류를 뒤져서 아비도스의 자치구 대부분이 카이저로 넘어갔다는 것을 모두에게 알린다."
2927878713 = "각자의 이야기들 2"
409405033 = "호시노에게서 과거의 이야기를 듣는 대책위원회. 지금은 사라진 아비도스 학생회가 빚을 갚으려다가 카이저에게 땅까지 빼앗긴 것이라고 추측한다. 선생님은 히나에게서 들었던 대로, 아비도스 사막으로 가보자고 제안한다."
442327204 = "아비도스 사막으로 1"
2058754230 = "대책위원회는 조금씩 조심스럽게 아비도스 사막으로 향한다."
3802560582 = "아비도스 사막으로 2"
2697565317 = "버려진 사막에 도착한 호시노는 과거 아비도스의 흔적을 보며 추억을 떠올린다."
573312762 = "아비도스 사막으로 3"
198870950 = "대책위원회는 아비도스 사막에 건설된 거대한 시설을 발견하고 그곳을 지키는 정체불명의 적들과 조우하게 된다."
1399589399 = "카이저 PMC 1"
884616625 = "조우한 적들의 정체는 바로 카이저 PMC였다. 대책위원회를 포위하기 위해 PMC의 병력이 몰려들기 시작한다."
852645695 = "카이저 PMC 2"
2382351824 = "대책위원회의 앞에 카이저의 임원이라는 자가 나타나서 자신이 바로 아비도스의 채권자라고 소개한다."
3249776532 = "이길 수 없는 싸움"
2043848879 = "카이저의 임원은 아비도스 어딘가에 묻혀있는 보물을 찾고 있다는 자신의 야욕을 밝히고, 채권을 이용하여 대책위원회를 압박한다. 호시노는 분개하는 대책위원회 일행들을 데리고 일단 후퇴한다."
1186755748 = "비밀들"
1335785770 = "분노한 후배들을 집으로 돌려보낸 뒤, 호시노는 선생님에게 검은 양복이 자신에게 제시한 비밀 거래에 대해 털어놓는다. 선생님은 호시노에게 응원의 말을 건네지만, 다음 날 호시노는 자퇴서를 남긴 채 사라진다."
3736543421 = "놓쳐버린 것"
283862884 = "호시노는 편지를 통해 아비도스 고교의 빚을 탕감하기 위해 카이저 PMC에 용병으로 가게 되었다는 사실을 밝힌다. 남은 대책위원회 일행이 혼란스러워하는 사이, 호시노가 사라진 아비도스 고교를 점거하기 위해 PMC 병력이 몰려든다."
3093070589 = "아비도스 공방전 1"
310065573 = "카이저 PMC에 도착한 호시노는 아비도스 고교가 공격받고 있다는 소식을 듣고 항의하지만, 검은 양복은 되려 호시노를 구속해 버린다. 절체절명의 순간, 떠났던 흥신소 68 일행이 아비도스에 나타나 대책위원회를 돕는다."
3717760490 = "아비도스 공방전 2"
91688092 = "카이저 이사는 예상치 못한 상황에 분개하고, 선생님은 대책위원회와 흥신소 학생들을 지휘하여 PMC 병사들에게 맞서 싸운다."
1667111875 = "아비도스 공방전 2"
2023302413 = "난전 끝에 PMC 병사들은 후퇴하고, 선생님은 호시노를 구할 방법을 찾기 위해 직접 검은 양복을 찾아간다."
4255678286 = "어른의 싸움"
477790762 = "검은 양복은 자신들의 실험을 위해 호시노를 포기하라며 [USERNAME] 선생님을 협박하지만, 선생님은 포기하지 않고 호시노를 구하겠노라 선언한다."
3792141633 = "지키고 싶은 것"
2496658941 = "[USERNAME] 선생님은 도움을 요청하기 위해 게헨나 학원과 트리니티 학원을 찾아간다. 그리고 또 한편, 포장마차를 연 시바세키 마스터로부터 라면을 대접받은 흥신소 일행은 대책위원회를 돕기로 결심한다."
488859086 = "지키고 싶은 것"
4228298238 = "[USERNAME] 선생님의 부탁을 받은 히나와 게헨나 선도부 일행은 아비도스 대책위원회를 도와 PMC 병사들과 싸운다."
1752199803 = "그럼에도 놓지 않은 1"
2389071401 = "다수의 적과 마주한 대책위원회 일행 앞에 히후미와 트리니티 학원의 지원이 도착한다. 적이 혼란에 빠진 틈을 타 대책위원회는 적진을 빠르게 돌파한다."
2315302090 = "그럼에도 놓지 않은 1"
2958239043 = "아비도스 고교의 구 본관에 도달한 대책위원회 일행. 그 앞을 카이저 PMC의 임원이 가로막지만, 뒤늦게 도착한 아루와 흥신소 68 일행이 나타나 대책위원회를 돕는다."
465533926 = "그럼에도 놓지 않은 2"
3049385587 = "대책위원회가 호시노가 붙잡혀있는 벙커를 향해 전진한다."
3889357593 = "그럼에도 놓지 않은 2"
4091157200 = "긴 싸움 끝에 대책위원회는 무사히 호시노를 구출해내는 데 성공한다."
460663098 = "에필로그"
1819455677 = "모든 사건이 끝나고 선생님은 아야네로부터 편지를 받는다. 아야네는 빚을 완전히 갚지는 못했지만, 덕분에 대책위원회의 일상을 지킬 수 있었다며 [USERNAME] 선생님에게 감사를 표한다."
451759275 = "프롤로그"
1467700440 = "깊은 지하에서 프랜시스가 깨운 게마트리아의 OB가 활동을 시작한다. 한편 카이저 그룹은 아비도스 고등학교의 채권을 시장에 내놓고 대책위원회는 이를 매입하려 한다. 하지만 대책위원회가 손 쓸 틈도 없이 완판되고 매수자 명단에서 채권을 공격적으로 사들인 네프티스 그룹의 이름을 확인한다."
2836028392 = "불청객"
2468775960 = "네프티스 컴퍼니가 아비도스 사막횡단철도의 모든 권리를 목적으로 카이저의 채권을 사들였다는 사실을 알게 된 대책위원회. 그들이 왜 이제 와서 사막횡단철도의 권리를 구매하였는지 고민하던 순간 침입자가 찾아온다."
2578507434 = "하이랜더 철도 학원 1"
792808784 = "아비도스 자치구를 습격한 것은 하이랜더 철도학원 CCC의 간부 노조미와 히카리였다. 사막횡단철도의 개발을 강행하려는 둘을 막기 위해 대책위원회가 나선다."
2748777627 = "하이랜더 철도 학원 2"
171315427 = "하이랜더 철도학원의 습격을 막아내는 데 성공한 대책위원회와 선생님. 상황을 수습하기 위해 등장한 것은 하이랜더 철도학원의 감독관 스오우였다. 스오우는 나중에 설명하겠다는 말과 함께 쌍둥이를 데리고 자리를 떠난다."
809304558 = "흘러간 것들"
2228531499 = "과거, 노노미는 졸업 후 하이랜더 철도학원이 아닌 아비도스 고등학교에 입학한다. 하이랜더 학원에 대한 정보를 설명하는 아야네, 이어 돌아갔던 하이랜더 철도학원 일행이 다시 찾아온다."
2066588167 = "사막횡단철도"
3245151085 = "채권자들과 함께 대책위원회실을 찾아온 하이랜더 철도학원 일행. 채권단의 대표는 그들의 목적에 대해 설명하기 위해 유메의 사인이 담긴 계약서를 꺼낸다."
4109224623 = "매매계약서"
206294631 = "채권단이 찾아온 것은 아비도스 학생회가 소유한 부속 시설 운용 권리를 다룬 계약서의 진행 여부를 묻기 위함이었다. 선생님은 일단 이들을 막아서고 채권단은 계약서의 효력이 사라지는 이틀 후까지 결정을 하라며 돌아간다. 향후 방침을 정하기 위해 호시노가 과거의 일에 대해 입을 열고 계약서의 날짜가 유메가 실종된 날짜와 겹친다는 사실을 발견한다."
3326988594 = "육체의 한계"
2464018339 = "유메와 처음 만난 버려진 마을을 찾은 호시노. 시로코는 그런 호시노를 따라가지만 결국 놓치고 만다. 노노미는 자초지종을 알아내기 위해 집사에게 연락하고, 집사는 네프티스의 위기를 극복하기 위한 일이라며 내일 자세한 이야기를 해 주겠다고 말한다. 알 수 없는 위화감을 느끼는 아야네였지만 모두들 일단 지친 하루를 뒤로하고 해산한다. 한편 지하 깊은 곳에서는 지하생활자가 본격적인 활동을 시작하는데……."
3791222139 = "아비도스 학생회 1"
4172510105 = "선생님은 지하생활자의 계략으로 인해 쓰러진다. 한편, 학교로 돌아오기 위해 버려진 마을을 지나치던 호시노는 유메와의 첫 만남을 회상한다."
2618425109 = "아비도스 학생회 2"
4214382824 = "아야네와 세리카는 유메의 죽음에 관해 조사하기 시작한다. 유메의 죽음에 관한 단서를 찾던 와중 호시노가 이를 발견한다."
2384190148 = "그날"
3030051441 = "과거, 유메가 제안한 축제에 대해 언쟁을 벌이던 호시노는 포스터를 찢고 나가 버린다. 그날 유메는 사라졌고 호시노는 찾지 못한다. 호시노의 설명이 이어지던 도중, 갑작스러운 벨 소리에 모두가 놀란다."
3708666348 = "드러나는 비밀"
3744933892 = "아비도스를 방문한 사람은 스오우와 네프티스 간부였다. 이들은 사막횡단철도에 숨겨진 비밀을 차지하기 위해 병력을 동원한다. 한편, 이를 해결할 방법을 찾던 노노미에게 네프티스 간부는 하이랜더에 재입학을 제안한다."
3567623092 = "대책위원회의 시작"
508127969 = "호시노는 시로코와 처음 만났던 일, 세리카와 아야네가 입학 신청했던 일 등 여러 일들을 회상한다. 모두가 구청사로 향하기로 한 그때, 선생님이 사고에 휘말린다."
2830502693 = "인질"
3676288734 = "노노미는 네프티스 측과 만나 설득하려 하지만 오히려 인질로 잡혀가게 된다. 네프티스 측은 아비도스 학생들에게 노노미를 이용해 계약을 무효로 할 것을 협박한다. 호시노가 혼자 나서려던 순간, 시로코가 앞을 막아선다."
303369912 = "너희, 그리고 우리"
2939285746 = "호시노는 시로코를 압도적인 실력 차로 제압한다. 이후 아야네와 세리카도 물구름호를 대동해 호시노에게 맞선다."
76556335 = "부학생회장의 명령"
3023125627 = "패배한 세리카와 아야네. 호시노는 자신을 막지 말고 미래로 나아가라고 부학생회장으로서 명령한 후 자리를 뜬다. 호시노는 홀로 노노미를 구하러 떠난다."
3787477164 = "반격"
2641772784 = "스오우는 네프티스가 배신했단 사실을 사모펀드에 알린다. 한편 선생님은 의식을 되찾고 아비도스로 향한다. 선생님은 학생회장이 공석임을 이용해 아야네를 학생회장으로 선출시킨다. 아야네는 학생회장의 권한으로 호시노가 했던 행위들에 대해 무효를 선언하며 선생님과 함께 반격에 나선다."
2386655349 = "추격"
325048971 = "선생님과 대책위원회 학생들은 노노미를 구하기 위해 구청사로 향한다. 호시노 또한 무장한 상태로 사모펀드에 병력을 제압하며 구청사로 향한다."
1133678474 = "추격"
3426514234 = "대책위원회 학생들과 선생님은 또다시 호시노를 놓치지만 계속해서 뒤쫓는다."
2385018294 = "혼란과 혼란"
410768358 = "네프티스와 협력하고 있던 카이저 PMC는 네프티스를 배신하고 열차포를 빼앗으려 한다. 호시노는 구청사로 향하기 위해 PMC와 전투에 돌입한다."
2238279328 = "혼란과 혼란"
2445287877 = "카이저 제너럴을 제압한 호시노는 구청사로 향한다. 한편, 선생님과 대책위원회 학생들은 하이랜더 학생들을 구하고 구청사로 향한다."
3612354256 = "채권단 총회"
276803654 = "노노미는 네프티스가 PMC와 협력한 사실을 알게 되고 분노한다. 호시노는 노노미를 풀어주기 위해 찾아오지만, 노노미는 오히려 아비도스 학교 자퇴를 선언한다. 아비도스 학생들 또한 도착하고, 카이저 프레지던트는 계약을 무효로 처리하며 자리를 뜬다."
3243553383 = "채권단 총회"
160618110 = "노노미 구출에 성공한 호시노와 아비도스 학생들. 호시노는 노노미가 무사한 것을 확인하고 바로 자리를 뜨고 아비도스 학생들은 호시노를 쫓아간다."
1860528585 = "보물찾기"
3956099477 = "헬기에 탑승한 스오우와 카이저 프레지던트. 카이저 프레지던트는 승리를 자축하던 찰나, 스오우가 헬기에서 카이저 프레지던트를 밀어버린다. 스오우는 열차포를 막고 싶다면 학생회장들의 계곡으로 오라고 호시노에게 전한다. 한편, 추락한 카이저 프레지던트는 분노하며 카이저 코퍼레이션의 전 병력 소집을 명령한다."
1239708147 = "두 번째 추격"
984232866 = "아비도스 학생들과 선생님은 사모펀드를 구해준 후, 학생회장들의 계곡에 가는 방법을 모색한다. 그때, 네프티스 간부와 하이랜더 CCC가 도움을 준다. 한편, 호시노는 과거 유메와 보물찾기를 했었던 정션 스테이션에 도착하고 학생회장들의 계곡을 향하기 위해 열차를 출발시킨다."
3256145921 = "두 번째 추격"
2322627376 = "노조미와 히카리가 운행하는 열차에 탑승한 아비도스 학생과 선생님은 카이저 PMC의 추격을 받는다."
517692600 = "폭주 기관차"
598179026 = "카이저 PMC의 추격에 결국 노조미와 히카리는 열차를 충돌시킨다."
2087719702 = "폭주 기관차"
754525061 = "열차가 충돌한 후 카이저 PMC는 히카리와 노조미를 포위한다. 아비도스 학생들과 선생님은 카이저 PMC의 눈을 피해 정션 스테이션에 도착하고 열차를 출발시킨다. 학생회장들의 계곡에 도착한 호시노는 사막횡단철도에 숨겨진 비밀을 발견한다."
3408172578 = "학생회장들의 계곡"
638321793 = "열차포를 발견한 호시노를 스오우가 막아선다. 스오우는 열차포를 막고 싶다면 자신을 쓰러트리라고 선언하며 노노미의 카드를 꺼낸다."
768493918 = "열차포"
2040799108 = "스오우의 제압에 성공한 호시노. 하지만 스오우는 패배를 인정하지 않고 다시 달려든다. 아비도스 학생들과 선생님은 학생회장들의 계곡에서 열차포를 발견한다. 총소리가 들리고, 아비도스 학생들과 선생님이 소리가 난 방향으로 이동한다."
1210234653 = "최후의 전투 1"
1002703607 = "다시 한번 패배한 스오우는 쓰러지고 열차포를 파괴하기 위해 움직이려던 순간, 아비도스 학생들과 선생님이 막아서고 전투에 돌입한다."
3797362856 = "최후의 전투 2"
3271869069 = "시로코를 제외한 아비도스 학생들은 전투에 힘이 풀린다. 시로코는 다시 한번 호시노와 전투에 임한다."
1886723209 = "종이 한 장 차이"
2759992648 = "결국 쓰러지는 호시노. 아비도스 학생들과 선생님은 호시노를 설득한다. 하지만 스오우가 아비도스 학교를 파괴하기 위해 열차포를 출발시킨다. 호시노는 다시 열차포를 막기 위해 아비도스 학생들을 공격 후 자리를 뜬다. 선생님은 호시노를 막아야 한다고 말하며 믿을만한 사람에게 도움을 요청한다."
3121219489 = "격전 1"
2950950386 = "선생님이 말한 믿을 만한 사람은 바로 히나였고, 호시노는 정션 스테이션 내에서 대기하고 있던 히나와 대치하게 된다."
3427914090 = "격전 2"
2436668033 = "호시노와 히나는 전력으로 맞붙고, 전투의 여파는 대 오아시스 역으로 향하던 기차를 고스란히 덮친다."
3101230762 = "알 수 없는 것"
3803574396 = "넝마가 된 기차는 간신히 목적지에 도착하고, 불타는 기차 위의 호시노는 유메와의 과거를 회상한다."
3874918946 = "유일한 진실 1"
132408451 = "히나는 쓰러진 호시노에게 유메에 대한 진실을 알려주고, 쌍둥이의 도움으로 도착한 선생님과 대책위원회는 열차포와 충돌한다."
1382356128 = "유일한 진실 2"
1456203716 = "호시노는 망연자실한 상태로 계속해서 유메의 죽음에 대해 생각하고, 결국 지하생활자의 계략이 성공하며 전혀 다른 존재로 거듭나게 된다."
3864663142 = "현현"
2262723767 = "존재가 반전된 호시노를 막기 위해 대책위원회와 선생님이 달려들지만 너무나도 강력한 힘에 모두 쓰러지고 만다. 설상가상으로 <세트의 분노>가 호시노에 반응해 현현하기 시작하고, 아로나와 프라나는 그 둘의 충돌이 세계에 멸망을 불러올 것이라 말한다. 절망적인 상황 속에서, 시로코는 모두를 구하기 위해 색채와 접촉하려 한다."
938761530 = "사과"
1220924498 = "선생님은 알 수 없는 공간 속에서 유메를 만나게 되고, 과거를 되돌릴 수는 없지만 현재 자신의 손이 닿는 곳의 아이를 구하겠다고 다짐한다."
675540194 = "테러 vs 테러"
3143101973 = "색채의 힘을 역이용해 전장에 시로코*테러를 소환한 프라나. 시로코*테러는 변모한 호시노와 대치한다."
2218727448 = "테러 vs 테러"
37327455 = "시로코*테러의 모습을 목격한 지하생활자는 하나의 신성이 동시에 존재하는, 있을 수 없는 상황에 광분하며 최후의 수단을 준비한다."
1657311791 = "수첩"
3366159078 = "호시노를 되돌릴 방법을 모색하는 대책위원회와 선생님. 한 번 공포로 반전된 신비는 더 이상 돌아올 수 없지만, 아직 호시노가 완전히 반전된 상황이 아니라는 사실을 알아내고 실낱같은 가능성을 걸어본다."
3926366854 = "수첩"
926354967 = "간신히 호시노에게 접근한 선생님과 대책위원회는 각자 호시노에게 마음을 전한다."
319388679 = "말하지 않으면 안 되는 것"
1570618741 = "대책위원회가 호시노에게 하고 싶은 말을 전하는 사이, 결국 지하생활자의 마지막 계획에 따라 <세트의 분노>가 완전히 현현해버린다."
2188327975 = "약속"
1072185142 = "일행이 절체절명의 위기에 처한 순간, 호시노는 꿈과 현실을 구분할 수 없는 공간 속에서 간절히 만나고 싶었던 사람을 만나게 된다."
3773443473 = "제약 해제"
2340870041 = "기적과 같이 반전하여 돌아온 호시노. 비로소 모두 모이게 된 일행은 <세트의 분노>, 그리고 배후의 지하생활자와 최후의 전투를 시작한다."
1985827982 = "그 꿈이 남기고 간 흔적"
1022838518 = "전투가 끝난 오아시스에 흩뿌려지는 아름다운 푸른 불꽃. 그 정체는 호시노와 유메가 찾아 헤맸던, 사막에 묻혀진 초고가의 광물이었다. 호시노는 유메가 남긴 흔적을 바라본다."
2405249657 = "그 후에 남은 것들"
4258312221 = "돌아온 일상. 남아있는 자들의 이야기는 계속된다."
990172089 = "에필로그 1"
2169764773 = "호시노는 아비도스 학생회장직을 수락하고, 히나와 마코토는 뇌제의 유산인 열차포를 처리한다. 노노미와 스오우도 각자의 마무리를 하고, 아비도스 자치구에는 모처럼 활기가 돌아온다."
1959390195 = "에필로그 2"
832014371 = "선생님은 조용히 사라졌던 시로코*테러를 만나 하고 싶었던 말을 전하고, 고통도 행복도 모두 받아들이고 앞으로 나아가겠다는 마음을 함께 새긴다."
237598723 = "모험의 시작"
1029808550 = "기묘한 편지를 받고 밀레니엄 학원의 게임개발부를 찾아간 선생님은 그곳에서 게임을 개발 중인 쌍둥이 학생, 미도리와 모모이를 만나게 된다."
3338381113 = "세미나 회계 유우카"
4264874819 = "세미나의 회계인 유우카는 게임개발부의 실적이 저조한 것을 이유로 들어 동아리를 폐쇄시키려 들고, 미도리와 모모이는 이에 맞설 비장의 무기를 찾기 위해 <폐허>로 향한다."
3931386898 = "폐허로."
4072922310 = "미도리와 모모이는 폐허에서 최고의 게임을 만드는 비법이 담긴 성서, <G.Bible>을 찾으려 하지만 적대적인 로봇들에 쫓겨 폐공장으로 도망치게 된다."
3321101212 = "우리는 그날, 소녀를 만났다."
2114828100 = "게임개발부 일행은 폐공장에서 인간을 닮은 로봇 소녀 아리스를 만나게 된다. 모모이는 게임개발부의 폐부를 막기 위해 아리스를 부실로 데려와 부원으로 삼으려 한다."
707980707 = "나는 아리스입니다."
3869084317 = "아리스는 게임개발부의 전작 <테일즈 사가 크로니클>을 플레이하고 즐거워한다. 그녀의 반응에 게임개발부 일동은 감동한다."
2096151113 = "언어를 배우는 방법"
910040027 = "아리스는 게임개발부 학생들이 추천한 게임을 밤새 플레이하고 인간다운 말투를 익히게 된다. 모모이는 아리스에게 밀레니엄의 학생으로 위장할 수 있는 여러 가지 물건을 건네준다."
3197846671 = "그것은 총이라기엔 너무 컸다."
6265887 = "게임개발부 학생들은 아리스가 사용할 총을 구하기 위해 밀레니엄 학원의 <엔지니어부>를 찾는다. 아리스는 그곳에서 우주 전함용 레일건을 선택하고, 엔지니어부는 그녀의 능력을 시험하기 위해 싸움을 걸어온다."
2828361379 = "그것은 총이라기엔 너무 컸다."
295717469 = "아리스는 처음 만져보는 레일건을 능숙하게 사용하여 엔지니어부를 제압한다. 그 모습을 보고 엔지니어부의 부장, 우타하는 아리스의 뛰어난 신체 능력에 의구심을 갖는다."
252928965 = "자격 심사"
222860507 = "유우카는 새로운 부원의 자격 심사를 위해 게임개발부를 찾아오고, 아리스는 미도리, 모모이와 함께 자기소개를 연습한다."
3447447898 = "유우카의 질문"
2666100393 = "몇 차례의 질답 끝에 유우카는 아리스를 정식 부원으로 인정하지만, 여전히 제대로 된 게임을 만들지 못한다면 게임개발부를 폐쇄하겠다고 으름장을 놓는다. 게임개발부 일동은 다시 <G.Bible>을 찾기 위해 폐허로 떠난다."
980942246 = "다시, 폐허로."
2685240113 = "지난번과 달리, 아리스의 선전으로 게임개발부는 폐허의 로봇들을 수월히 물리치며 목표로 향한다."
771027366 = "그곳에는, 그것이 있었다."
2820527577 = "목표로 한 폐허의 공장에 도착한 게임개발부 일행. 그곳에서 아리스는 직감적으로 <G.Bible>이 저장되어 있는 컴퓨터를 찾아내고, 데이터를 게임기에 다운로드하는데 성공한다."
2728548615 = "'거울'을 찾아서"
3103417958 = "게임개발부는 <G.Bible>을 열람할 수 있는 암호를 해독하기 위해 <베리타스>에 문의를 하지만, 마키는 암호를 해독하기 위해서는 학생회가 압류해간 해킹툴 <거울>이 필요하다고 답한다. 일행은 <거울>을 되찾기 위해 메이드부가 지키고 있는 학생회 압류품 보관소로 향한다."
2899726708 = "Nerd VS Maid"
317160579 = "아리스와 베리타스 부원들이 양동 작전을 벌이는 동안 미도리와 모모이는 선생님과 함께 세미나를 향해 정면 돌파를 시도한다."
413920948 = "Nerd VS Maid"
3365649643 = "베리타스의 해킹 공작으로 인해 아카네가 밀실에 갇힌다."
2494926665 = "메이드 VS 마이스터즈"
14296212 = "게임개발부 일행은 우타하 부장의 도움으로 메이드부의 저격수, 카린을 따돌리는 데 성공하지만, 일행의 앞에 또 다른 메이드부 부원 아스나가 등장한다."
2780791509 = "뻗어오는 위험"
3362919123 = "시간이 지체된 탓에 아카네와 카린도 봉쇄에서 풀려나고 게임개발부 일행은 또다시 위기에 빠진다. 그때, 아리스가 나타나 게임개발부를 구출하고 일행은 학생회 압류품 보관소에 진입하는 데 성공한다."
4228188430 = "앞으로 단 한 걸음!"
1685329725 = "게임개발부 일행은 무사히 <거울>을 손에 넣지만, 압류품 보관소에서 메이드부의 부장인 네루와 맞닥뜨리게 된다. 하지만 유즈의 기지로 네루를 속이는 데 성공하고, 게임개발부는 무사히 부실로 돌아간다."
2238903513 = "끝나지 않은 싸움"
1829805873 = "전투 후, 아카네는 의뢰를 실패한 것에 대해 네루에게 사과하지만, 네루는 오히려 메이드부와 호각으로 싸운 아리스에게 흥미를 보인다. 한편, 부실에 돌아온 게임개발부 일행은 <거울>을 사용하여 <G.Bible>의 해석을 시도한다."
1086770631 = "G.Bible"
2087231337 = "기대와는 달리 <G.Bible>의 내용은 \"게임을 사랑하라\"는 단순한 문장뿐이었고, 게임개발부 학생들은 곧 실의에 빠진다. 하지만 아리스의 응원에 다시 힘을 내 게임개발부는 <테일즈 사가 크로니클 2>를 개발하기 시작한다."
376917210 = "더블오"
2914628993 = "마감 기한에 맞추어 아슬아슬하게 <테일즈 사가 크로니클 2>의 개발을 맞춘 게임개발부 일행. 게임을 업로드한 직후, 게임개발부 부실에 의문의 총격이 시작된다."
178004961 = "더블오"
1644909910 = "부실에 총격을 가한 상대는 메이드부의 부장 네루였다. 네루는 지난번의 전투로 흥미가 생겼다며 아리스에게 싸움을 걸어오고, 한참의 난전 끝에 만족하고 돌아간다."
3999000705 = "밀레니엄 프라이스"
1100406605 = "게임개발부가 개발한 <테일즈 사가 크로니클 2>는 밀레니엄 학원의 우수 발명품을 뽑는 <밀레니엄 프라이스>에서 특별상을 수상하고 게임개발부의 폐부는 취소된다. 모두가 기뻐하는 가운데, <G.Bible>이 설치된 게임기가 스스로 움직이기 시작한다."
854019333 = "은밀한 독대"
350519276 = "히마리는 세미나의 부장, 리오를 찾아간다. 두 사람은 이전에 게임개발부와 C&C 사이에 벌어졌던 일에 대한 이야기를 나누며, 아리스의 정체에 대한 서로의 의견을 밝힌다. 하지만 아리스에 관한 입장 차이를 좁히지 못한 채 두 사람의 만남은 파국으로 끝나고, 그 직후 히마리는 누군가의 습격을 받는다."
2171223093 = "게임개발부의 평범한 일상"
950515874 = "오랜만에 게임개발부 부실을 찾아간 선생님. 부원들은 차기작 개발을 위해 여러가지 아이디어를 모으지만, 어느샌가 아리스의 게임 플레이를 지켜보는 자리로 바뀌게 된다. 아리스는 게임 플레이 도중 치터를 만나 고전하지만, 유즈의 화려한 활약으로 극적인 승리를 거둔다. 하지만 차기작의 기획은 진전을 이루지 못한 채, 평범한 일상이 흘러간다."
258618862 = "~아리스, 모험을 시작합니다!~ "
1634979540 = "신작 게임에 넣을 새로운 아이디어를 궁리하는 게임개발부와 선생님. 모모이와 미도리의 의견이 서로 평행선을 달리자, 두 사람은 결국 결론을 내기 위해 게임개발부 대대로 내려오는 방식으로 승부를 내기로 한다. 한편, 유즈는 아리스가 특별한 영감을 얻을 수 있도록 퀘스트를 준다. 퀘스트를 어떻게 수행해야 할지 고민하던 아리스는 일단 선생님과 함께 학원을 모험하기로 한다."
1695437540 = "~아리스와 인도받는 자들~ 1"
3535563597 = "아리스는 캠퍼스를 돌아다니던 중, 조깅하던 스미레와 마주치게 된다. 두 사람은 동료이자 운동 친구라는 인식을 함께하고, 아리스는 계속해서 모험을 떠난다. 교외에서 교복을 입은 아스나와 카린과 만난 아리스는 두 사람에게도 다음 모험에 함께하자며 파티원으로 초대한다. 그 때 네루가 아리스를 찾는다는 이야기를 듣자 아리스는 얼른 다른 곳으로 이동한다."
4226009798 = "~아리스와 인도받는 자들~ 2"
331927291 = "아리스는 밀레니엄 학생들과 만나 응원을 받거나, 엔지니어부와 만나 <빛의 검>에 대한 이야기를 나누며 즐거운 시간을 보낸다. 그 후, 아리스는 네루와 마주치게 되고, 오락실에 함께 가 게임을 즐긴다. 한때 두 사람은 서로 무기를 겨누던 사이였지만, 아리스는 이제 네루도 자신의 동료라며 당당히 이야기한다."
3180610485 = "이상한 기계 1"
249138221 = "어느 날, 베리타스로부터 수상한 기계를 발견했다는 소식을 듣게 된 선생님. 베리타스의 부실에 찾아가던 중, 선생님은 게임개발부와 합류하고 함께 기계의 정체를 조사한다. 하지만 모두 기계의 정체에 대해 결론을 내리지 못하는데… 그 순간, 갑자기 아리스가 기계에 이끌리듯 손을 가져다 대고, 기계가 활성화되는 것과 동시에 아리스에게 이변이 일어난다."
2273243370 = "이상한 기계 2"
3057433435 = "폭주한 아리스는 이성을 잃은 채, 부실을 파괴하고 그 자리의 모두에게 공격을 가한다. 그 누구도 아리스를 막지 못하는 위기일발의 상황. 그때 C&C가 나타나 아리스를 기절시키고 수상한 로봇을 처치한다. 안도의 한숨을 내쉬던 그때, 선생님은 미도리로부터 예상치 못했던 소식을 전달 받는다."
888978219 = "무너진 일상"
1905976681 = "정신을 잃은 모모이를 간병해주던 선생님은 미도리의 연락을 받고 게임개발부에 틀어박힌 아리스를 찾아간다. 선생님의 위로에도 불구하고 아리스는 모모이를 다치게 했다며 스스로를 자책한다. 그 때, <진실>을 말해주겠다며 의외의 인물이 찾아온다."
2526248209 = "가혹한 진실 1"
342541954 = "게임개발부 부실에 찾아온 것은 세미나의 부장, 리오였다. 리오는 아리스의 정체가 <이름 없는 신들의 왕녀>라고 말하며, 아리스를 마왕이라고 지칭한다. 그 자리의 모두가 분노하지만, 리오는 담담히 아리스가 초래할 수 있는 미래에 관해 이야기한다. 갈등이 폭발하려던 그 순간, C&C의 다섯 번째 멤버가 등장한다."
4280260261 = "가혹한 진실 2"
2268486821 = "AMAS를 쓰러트리고, 토키와 쫓고 쫓기는 추격전을 벌이던 네루. 하지만 토키의 기습에 네루는 결국 당하게 되고, 미도리와 유즈도 갑작스레 벌어진 상황에 제대로 손을 쓰지 못한다. 이 모든 광경을 바라보던 아리스는 중대한 결심을 하고 그 자리에 있던 모두에게 선언한다."
2301390180 = "그딴 건 아무래도 좋아! "
3091811119 = "아리스를 떠나보낸 뒤, 어찌해야 할 줄을 몰라 당황하고 있던 밀레니엄의 학생들이었지만, 바로 그때 쓰러져 있던 모모이가 나타나 이대로 가만히 있을 수 없다며 다 함께 아리스를 구하러 가자고 선언한다."
1928599175 = "작전회의"
3537725688 = "아리스의 행방을 찾던 게임개발부 일행. 노아와 유우카의 도움으로 아리스는 리오가 만든 요새도시 <에리두>로 향했음을 알아낸다. 에리두로의 잠입을 앞두고 네루는 한 가지 작전을 제안한다."
2759004737 = "빅 시스터 1"
4182520481 = "리오에게 감금된 히마리. 둘은 여전히 평행선을 달리고 있다. 한편 아리스를 구출하기 위해 에리두에 잠입한 게임개발부와 엔지니어부는 리오가 만든 AMAS와 조우한다."
37376914 = "빅 시스터 2"
2462813750 = "작전대로 화려하게 AMAS를 격파해 나가던 C&C멤버들. 파죽지세의 그들을 가로막은 건 C&C의 다섯 번째 멤버 토키였다."
229839680 = "요새도시 에리두"
918387984 = "네루가 따로 아리스의 구출에 나설 것이라는 토키의 예상과는 달리, 네루를 포함한 C&C 전원은 토키와 맞서 싸우기 시작한다. 바로 그때 게임개발부는 AMAS를 차례차례 격파하며 에리두의 타워가 있는 곳으로 나아간다."
235382079 = "함정 1"
1349201345 = "강력한 협공으로 토키를 몰아넣는 데 성공한 C&C. 토키는 에리두의 구조를 변경하여 네루를 고립시킨다. 한편 순조롭게 나아가던 게임개발부 일행의 앞에는 리오의 강력한 병기 아방가르드군이 나타난다."
4284078290 = "함정 2"
1075771830 = "C&C가 토키와 대치하고 있는 사이, 선생님과 게임개발부 일행이 아리스를 구출하러 올 것이라는 걸 이미 알고 있던 리오는, 아방가르드군이라는 강력한 로봇으로 게임개발부 일행을 막아선다."
1472787878 = "체크메이트 선언"
1932470324 = "히마리의 앞에서 리오가 승리를 확신한 순간, 에이미의 도움으로 히마리는 탈출에 성공한다. 한편 베리타스의 지원이 끊긴 게임개발부는 큰 위기에 처하지만, 바로 그때 극적으로 등장한 구세주는 베리타스의 부부장 치히로였다."
2949478604 = "역전의 발판 1"
2087519716 = "스미레의 도움으로 압류품 보관소에 있던 <거울>을 확보하여 에리두의 네트워크를 장악하는 데 성공한 치히로. 이것을 계기로 게임개발부 일행은 반격에 나선다."
2570893963 = "역전의 발판 2"
4071798167 = "엔지니어부의 활약으로 아방가르드군을 쓰러트리는 데 성공한 게임개발부 일행. 하지만 그 반동으로 엔지니어부는 리타이어하고야 만다. 쓰러진 엔지니어부의 응원을 받으며 게임개발부 일행은 앞으로 나아간다."
2900133993 = "그러나 넘을 수 없는 벽"
1637045112 = "예상을 웃도는 활약으로 토키를 퇴각시킨 C&C 멤버들과 게임개발부는 마침내 에리두의 타워 앞에 모여든다. 하지만 그때 다시 나타난 토키는 리오의 허가를 받아 결전 병기 <아비 에슈흐>를 호출한다."
3331557940 = "치트 플레이어"
706464142 = "<아비 에슈흐>의 성능에 모두는 경악한다. 아카네의 조언으로 약점을 꿰뚫어 본 선생님과 네루는 싸움을 공중전으로 끌고 가지만, 그조차도 예상했다는 듯 활약하는 토키에 의해 네루는 큰 부상을 입게 되고, 일행은 한 차례 자리에서 퇴각한다."
859505773 = "게이머로서, 친구로서"
3991456034 = "절망적인 상황. 모두가 낙심한 가운데 네루와 토키의 전투를 유심히 살폈던 유즈가 나서 <아비 에슈흐>를 무력화할 방법을 제안한다."
1152423272 = "그 이름, 뜻하기를."
4250229177 = "모두가 힘을 합친 덕에 밀레니엄의 학생들은 토키를 몰아붙이는 데 성공하고, 콜사인 더블오 네루의 활약으로 마침내 승리를 쟁취한다."
2879188167 = "왕녀를 위한 파반느 1"
3410221265 = "리오가 있는 곳에 도착한 게임개발부 일행이 아리스를 구하려는 찰나, 미지의 존재 <Key>가 나타나 에리두를 장악한 채 사태를 파국으로 이끌기 시작한다. 뒤늦게 리오가 자신을 희생하여 사태를 수습하려는 그때, 노아와 유우카가 등장한다."
324915488 = "왕녀를 위한 파반느 2"
1522532631 = "유우카와 노아의 도움으로 <Key>를 붙들어두는 데 성공한 게임개발부. 또한 각지에서 나타난 적들을 엔지니어부와 베리타스 등이 막아서는 사이. 모모이, 미도리, 유즈, 그리고 선생님은 히마리의 도움으로 아리스를 깨우기 위해 아리스의 정신구조 안으로 들어간다."
2176908388 = "자신이 되고 싶은 것"
1285561733 = "마침내 아리스와 마주친 게임개발부와 선생님. 아리스는 자신은 마왕이라며, 자기가 있어 모두가 상처 입는다며 돌아가기를 망설이지만, 자신이 무엇이 되고 싶은지는 스스로 결정하는 것이라는 모두의 말에, 아리스는 끝내 용사의 증거. <빛의 검 : 슈퍼노바>를 뽑아 든다."
3880903334 = "밀레니엄 사이언스 스쿨"
544345914 = "사태는 일단락되었다. 리오는 잠적하고, C&C는 새로운 멤버를 맞이하고, 게임개발부는 차기작을 다시 개발하기 시작하는 등. 밀레니엄의 평화로운 일상은 계속된다."
108666912 = "프롤로그"
3860334718 = "에덴조약이 가지는 의미와 일곱 화두, 그리고 낙원에 대해 이야기하는 세이아. 그녀는 선생님을 향해 지금부터 시작될 이야기는 당신의 의무이며, 부디 외면하지 말고 끝까지 확인해달라며 부탁한다."
3383571419 = "보충수업부"
1483887365 = "코하루, 하나코, 아즈사, 그리고 히후미까지. 교실에 선생님과 네 명의 소녀들이 모였다. 퇴학 위기에 처했다며 소란을 피우는 코하루를 히후미가 진정시키는 사이, 이게 어찌 된 일인지. 선생님은 몇 주 전에 있던 일을 떠올린다."
4127233795 = "티파티"
2556827456 = "트리니티의 학생회장들인 나기사와 미카의 초대를 받고 티파티에 출석한 선생님. 낙제 위기에 처한 보충수업부 학생들을 맡기고 싶다는 나기사의 제안에 선생님은 승낙한다. 그렇게 해서 찾은 곳에서 선생님은 보충수업부의 부장인 히후미와 재회한다."
2736401965 = "낙제생들 1"
2320947204 = "히후미를 따라 우선 보충수업부의 학생들을 만나기로 결정한 선생님은 미풍양속을 어긴 끝에 정의실현부에게 구금된 하나코와 정의실현부와 교전 끝에 잡혀 온 아즈사와 만난다."
4288766681 = "낙제생들 2"
1080677386 = "하나코와 아즈사의 신병을 넘겨받고자 하는 선생님에게 코하루는 보충수업부라니 부끄럽고 불쌍하다며 야유하지만, 실은 코하루도 유급 위기로 인해 보충수업부로 소속이 옮겨진 상태였다. 좌절하는 코하루를 끝으로 모든 보충수업부 학생들이 한자리에 모인다."
1381682562 = "자기소개의 시간"
3807799700 = "보충수업부에 모인 학생들은 각자 이 자리에 모인 이유와 앞으로의 목표를 이야기한다. 시험에서 낙제하여 유급되지 않도록 협력하자는 말에, 코하루는 어차피 금방 끝날 관계이니 협력 같은 건 필요 없다며 먼저 자리를 떠나버린다."
3720628732 = "시험 준비"
968959922 = "선생님의 감독 아래, 1차 시험을 준비하는 보충수업부의 학생들. 하나코의 해박한 지식 덕분에 준비는 좋은 분위기로 흐르지만, 히후미가 혹시라도 1차부터 한 명이라도 낙제생이 생기면 합숙에 들어가야 한다며 앞일을 걱정하는 사이, 그렇게 첫 번째 시험이 시작된다."
42497510 = "제1차 평가 시험"
2338283664 = "시험을 치르며, 다행히도 시험 준비 때 공부했던 문제가 나온 걸 확인한 히후미는 안심한다. 그러나 제1차 평가 시험 결과, 히후미를 뺀 보충수업부의 남은 세 명이 전부 낙제해버리며, 보충수업부의 합숙이 결정된다."
604324422 = "수면 아래의 것들"
3378221237 = "선생님은 나기사에게 보충수업부의 학생들이 낙제하게 되면 어떻게 될지 묻는다. 그러면 퇴학 조치가 될 것이며, 보충수업부는 원래부터 그러기 위한 동아리라고 충격적인 대답을 하는 나기사. 이는 전부 트리니티의 배신자를 찾기 위해 꾸민 일이었으며, 나기사는 보충수업부에 배신자가 있을 것이라 경고한다."
3020153020 = "합숙, 시작합니다!"
2563693133 = "시험 합숙을 위해 보충수업부는 트리니티 외곽의 별관을 찾는다. 본격적인 합숙을 시작하기 전부터 여러 기행을 벌이는 보충수업부 멤버들이었지만, 여러 해프닝 끝에 우선 보충수업부는 별관을 청소하기로 결정한다."
660461531 = "대청소!"
198950639 = "대청소를 하던 중, 하나코는 본격적으로 공부하기 전에 함께 물놀이를 하자며 야외수영장도 청소할 것을 제안한다. 그렇게 청소를 하며 모두들 흠뻑 물에 젖는다."
4233186689 = "합숙의 첫날 밤"
2960849454 = "늦은 밤. 히후미는 상담을 위해 선생님을 찾는다. 트리니티의 배신자를 찾으라는 나기사의 말에 괴로워하는 히후미지만, 선생님은 걱정 말고 자신에게 맡겨달라 말한다. 그러는 사이 불침번을 자청해 서는 아즈사와 하나코가 잠시 이야기를 나누며, 합숙 첫날 밤이 지나간다."
3382766713 = "제1차 모의시험"
848842177 = "합숙 첫 모의시험의 결과는 또다시 히후미를 뺀 전원의 낙제였다. 그러나 히후미는 좌절하지 않고 모두를 합격시키겠다고 선언하며, 좋은 성적을 거둔 이에겐 모모프렌즈 굿즈를 상품으로 주겠다고 말한다. 시큰둥해하는 하나코나 코하루와 달리, 아즈사는 귀엽다며 눈을 빛낸다."
3534072072 = "정의실현부의 부부장 1"
17674601 = "자율학습 도중 다른 학생들에게 야한 책을 들킨 코하루, 그녀는 당황하며 이건 어디까지나 자기도 모르게 가져온 압류품이라고 변명한다. 이걸 되돌려놓기 위해 코하루는 선생님과 함께 정의실현부 부실로 향한다."
3592313078 = "정의실현부의 부부장 2"
2059845093 = "코하루의 필사적인 변명에, 선생님은 코하루는 코하루다운 걸로 괜찮다 말해준다. 그 배려에 코하루는 보답으로 자신이 정의실현부의 첩보원이라는 비밀을 알려준다. 이후 정의실현부에서 하스미와 비밀 대화를 나눈 코하루는 선생님과 함께 합숙소로 복귀한다."
773890837 = "작은 틈새"
1756837627 = "수영복과 속옷은 구분할 수 없다는 하나코의 말에, 아즈사는 그건 다섯 번째 화두라며 알은체를 한다. 그 말에 깜짝 놀라 동요하는 하나코. 히후미는 하나코가 원래는 뛰어난 수재였으나, 일부러 시험을 망치고 있다는 사실을 알고 혼란스러워하는 사이, 다음 날, 갑작스레 미카가 선생님을 찾아온다."
135674395 = "트리니티의 배신자"
892831890 = "미카는 선생님에게 이미 나기사와 선생님 사이에 어떤 이야기가 오갔는지 알고 있으니 트리니티의 배신자를 알려주겠다며 거래를 제안한다. 배신자는 다름 아닌 아즈사이며, 거래의 조건으로 미카는 바로 그 아즈사를 지켜달라 말한다."
3021188189 = "거대한 괴물"
3984423781 = "나기사가 에덴조약을 통해 노리는 바가 있다고 말하는 미카. 그런 나기사를 막기 위해서는 아즈사를 지켜야 한다며, 미카는 선생님에게 자신을 믿을지 나기사를 믿을지 선택해달라고 한다."
1502378419 = "시스터후드"
1398806955 = "보충수업부가 있는 곳으로 마리가 찾아온다. 그녀는 얼마 전 아즈사가 구해준 학생을 대신하여 감사 인사를 전하러 온 것이었다. 그 후 찾아온 심야. 앞으로의 일을 의논하기 위해 히후미를 기다리던 선생님 앞에 하나코가 찾아오며, 상황은 예상치 못한 방향으로 흐른다."
3715954097 = "비밀 모임"
1999585029 = "아즈사에 대해 상담하고자 찾아온 하나코는 뒤늦게 히후미에게서 낙제하면 전원 학교에서 퇴학당하게 된다는 사실을 듣게 된다. 이 모든 것이 나기사의 노림수였다는 걸 추리해낸 하나코는, 앞으로는 제대로 협력하겠다 선언하고는 세 사람만의 비밀 모임을 만들었다며 좋아한다."
3916469784 = "수영복 좌담회"
3001743394 = "갑자기 내린 비로 인해 빨래가 전부 젖어버린 보충수업부는 하는 수 없이 오늘 하루만큼은 공부를 쉬고 수영복 좌담회를 열기로 한다. 평범하지만, 오랜만에 맛보는 즐거운 일상 시간을 보낸 끝에 이번엔 다 함께 밤 산책을 나가기로 결정한다."
1861044050 = "한밤중의 대소동 1"
3288144026 = "밤 산책을 나온 보충수업부는 우연히 디저트 가게에서 하스미와 마주친다. 서로의 사정으로 인해 여기서 만난 걸 비밀로 하자고 말하는 하스미였지만 그때 미식연구회가 소동을 벌이고 있다는 연락이 온다."
391890716 = "한밤중의 대소동 2"
749962361 = "하스미는 에덴조약을 앞둔 상황에서 게헨나와 트리니티의 충돌은 문제가 될 수 있다며, 보충수업부와 샬레의 선생님에게 도움을 요청한다. 그렇게 다 함께 사건을 막기 위해 출동한다."
2432925314 = "한밤중의 대소동 2"
4237665195 = "선생님과 보충수업부의 활약으로 미식연구회의 난동을 막는데 성공했다. 그러자 제각기 도주를 하는 미식연구회 멤버들. 그 뒤를 정의실현부가 추격한다."
781465669 = "새로운 관점"
1190877624 = "미식연구회의 신병을 넘겨받기 위해 선도부의 히나와 응급의학부의 세나가 현장에 도착한다. 마침 찾아온 히나에게 선생님은 이번 에덴조약에 대해 어찌 생각하는지 물어보며, 선생님은 히나의 관점에서 바라본 현 상황에 대해 듣게 된다."
3667360070 = "보이기 시작하는 희망"
3554655960 = "모의시험에서 마침내 합격점을 얻어낸 보충수업부 학생들, 히후미는 이를 축하하며 모두에게 모모프렌즈 굿즈를 선물한다. 사양하는 하나코나 코하루와 달리 아즈사는 히후미에게 받은 굿즈를 소중히 여기겠다고 말하고, 그렇게 2차 평가 시험을 앞둔 그때, 나기사는 선생님을 호출하여 미카와 만난 것을 추궁한다."
3715486889 = "검은 손길"
1616621734 = "나기사의 추궁에도 선생님은 누군가를 의심하고 배신자를 찾는 일 따윈 하지 않겠다고 말한다. 대신 의심암귀에 빠져 있는 나기사를 막고, 보충수업부 전원을 합격시키겠다고 선언하며 선생님은 나기사의 부탁을 거절한다."
194293672 = "제2차 평가 시험 1"
2202623311 = "제2차 평가 시험의 변경사항이 공지된다. 시험 범위가 확대되고, 합격 커트라인이 오르고, 시험장소 또한 게헨나 학원으로 변경되었다는 충격적인 이야기에 모두가 당황하지만. 포기하긴 이르다는 아즈사의 말에 따라 보충수업부는 시험 장소로 향한다."
1942601069 = "제2차 평가 시험 1"
1391275365 = "시험 장소로 향하는 길을 가로막는 게헨나의 불량배들을 쓰러트리며, 보충수업부는 나아간다."
644321687 = "제2차 평가 시험 2"
3226156325 = "게헨나에 도착한 보충수업부를 정의실현부로 오해한 선도부원들이 가로막는다. 하지만 바로 그때, 다행히 미식연구회의 도움으로 위기에서 빠져나와 무사히 시험 장소에 도착한 보충수업부지만, 나기사의 방해로 전원 시험에서 낙제하고야 만다."
4130588728 = "다시 원점으로"
1896656556 = "티파티의 높으신 분이 보충수업부를 퇴학시키려고 한다는 사실을 알고 충격에 빠진 학생들. 일주일 앞으로 다가온 마지막 평가 시험의 타개책이 보이지 않는 가운데. 우선 쉬기 위해 학생들은 각자 방으로 돌아간다. 그 후 늦은 밤. 홀로 일어난 아즈사의 뒤를 하나코가 조용히 미행한다."
2549930740 = "그럼에도 불구하고"
2270700848 = "궁지에 몰렸지만 보충수업부는 포기하지 않고 마지막 평가 시험을 준비하게 된다. 그렇게 마지막 시험을 하루 앞에 둔 늦은 밤. 사오리와 몰래 밀회를 하는 아즈사를 하나코가 조용히 지켜본다."
1916659997 = "고백"
4166289180 = "늦은 밤, 한자리에 모인 학생들. 마지막 시험까지 나기사의 방해를 받게 된 걸 안 그때, 아즈사가 자신이 「트리니티의 배신자」라고 고백한다. 아즈사는 모든 게 자기 때문이라고 말하지만. 선생님은 이게 아즈사 탓이 아니라고 말한다. 또한 하나코는 어떤 방해 공작이 있든 다 같이 힘을 합쳐 시험에 합격하자고 선언한다."
742150805 = "시작되는 습격"
1216430353 = "아리우스가 나기사를 습격하러온 그때, 아즈사와 하나코가 먼저 선수를 쳐서 나기사를 납치하는 데 성공한다. 뒤이어 들이닥친 아리우스의 학생들에 맞서 아즈사는 교전을 시작한다."
492008709 = "격전"
3128498563 = "습격해오는 아리우스 학생들. 아즈사가 설치한 부비트랩에 피해를 입는 것도 개의치 않고 아리우스는 마침내 보충수업부를 궁지로 모는 데 성공한다. 그러나 그곳에서 보충수업부 학생들은 샬레의 선생님과 함께 반격을 개시한다."
707844123 = "그런 세계 1"
4054359883 = "선생님과 힘을 합쳐 아리우스 학생을 쓰러트리는 데 성공한 보충수업부였지만, 곧바로 더 많은 아리우스 학생들이 들이닥친다. 이들이 들키지 않고 트리니티에 잠입했단 것에 모두가 놀라워하는 그때, 미카가 등장해 자신이야말로 「트리니티의 진짜 배신자」라고 소개한 뒤, 그녀는 아리우스에게 보충수업부를 제압하라 지시한다."
28576329 = "그런 세계 1"
2791097982 = "미카는 이어진 교전에도 쉽사리 쓰러지지 않는 선생님을 보고 감탄한다. 그리고는 과거 아즈사가 세이아를 습격한 이야기를 꺼내 들며 미카가 보충수업부를 뒤흔들려는 그때, 시스터후드가 참전한다."
3198842828 = "그런 세계 2"
141133620 = "시스터후드를 이 자리에 부른 건 다름 아닌 하나코였다. 그렇게 나타난 사쿠라코는 사태를 해결하고 수습하기 위해 미카와 교전을 시작한다."
2850369990 = "그런 세계 2"
3969728237 = "힘을 합친 끝에 결국 미카는 궁지에 모는 데 성공한 보충수업부와 시스터후드. 그 앞에서 미카는 끝내 자신의 패배를 인정하고 항복한다. 그런 미카에게 선생님은 필요하다면 자신이 미카의 편이 되어줄 거라 말하고, 그 말에 미카는 기뻐하며 작별 인사를 남긴다."
1709755666 = "제3차 평가 시험"
1682079203 = "수많은 해프닝이 있었지만 이를 전부 이겨낸 보충수업부는 마지막 제3차 평가 시험을 치르기 위해 시험장소로 향한다. 그리고 전원 시험에 합격한다."
3889889279 = "에필로그"
1853472011 = "세이아는 위험을 이겨낸 선생님을 칭찬하지만, 결국 모든 것은 파국으로 수렴할 것이라 경고한다. 그리고 마침내 아리우스 스쿼드가 움직이기 시작한다."
1023493496 = "포스트모템 1"
2817792322 = "자신을 습격하러 온 상대에게 조용히 말을 건네는 세이아. 그녀가 상대에게 말을 거는 것을 보며 선생님은 잠에서 깨어난다. 그 뒤 사쿠라코로부터 세이아가 습격당했던 건과 그 전말에 관해 전해 듣는다."
2940097782 = "포스트모템 2"
3560240457 = "선생님은 하나코에게 그 동안 벌어진 일들을 전해듣는다. 또한 나기사가 보충수업부의 모두에게 사과를 하고, 미카를 만나러 갔다는 소식을 듣는다."
3451183696 = "포스트모템 3"
1609767318 = "미카와 나기사는 많은 이야기를 나누지만 결국 서로를 이해하지 못한다. 하나코 역시 미카의 동기에 대해서 추측하려고 노력하지만, 미카의 싸늘한 태도에 결국 돌아서고 만다."
3155433875 = "그 후의 이야기들"
1648638504 = "트리니티에는 당분간 조용하고 평화로운 일상이 이어진다. 선생님은 게헨나 학원을 방문해 마코토를 만난 뒤, 이어서 히나를 만나 에덴조약 조인식에서 보기로 하고 헤어진다."
4236130409 = "에덴조약 조인식 1"
1627449016 = "크로노스 스쿨의 시논이 에덴조약 조인식 현장을 중계하며 에덴조약이 두 학원에 끼치는 영향에 관해 설명한다. 한편 히후미와 보충수업부 부원들은 패밀리 레스토랑에서 보충부 해산을 기념하며 다과를 즐긴다."
1969944314 = "에덴조약 조인식 2"
646905301 = "츠루기의 도움으로 <통공의 고성당>을 방문한 선생님은, 히나타로부터 트리니티의 역사에 대한 설명을 듣는다. 한편, 그 무렵 아리우스 스쿼드는 작전을 개시하고 트리니티의 상공에 그들이 쏘아 올린 순항미사일이 날아간다."
1269971397 = "불과 재의 날 1"
774689524 = "폭격으로 인해 장외가 혼란스러워진 틈을 타 아리우스 스쿼드가 고성당의 지하로 진입한다. 잠입한 아리우스 학생들을 상대로 정의실현부 학생들이 나선다."
4175188383 = "불과 재의 날 1"
1651414121 = "전투중 히나타와 정의실현부 학생들은 유스티나 성도회의 부활을 목도한다."
499449077 = "불과 재의 날 2"
2565238774 = "선생님을 지키기 위해 정의실현부 학생들과 히나는 유스티나 성도회를 상대로 분투한다."
878733393 = "증오의 확인"
361954059 = "성도회의 공격은 멈추지 않고 계속 이어진다."
288823100 = "증오의 확인"
3006327975 = "사오리는 과거로부터 이어져 온 아리우스의 증오를 설명하며 선생님을 공격하지만, 히나와 세나의 도움으로 겨우 탈출한다. 이후, 정신을 잃은 선생님은 꿈 속에서 세이아를 만나게 된다."
3724307009 = "달콤한 거짓"
272157938 = "선생님은 다시 한번 꿈속에서 세이아와 만나게 되며, 그녀로부터 에덴조약과 게마트리아가 연관성이 있음을 듣게 된다. 아리우스에 붙잡힌 아즈사는 극적으로 탈출하고, 게헨나와 티파티의 예비 병력 간의 전면전이 시작된다."
1624201610 = "가중되는 혼란 1"
2195551207 = "뒤늦게 현장에 도착한 구 보충수업부 멤버들은 뿔뿔이 흩어진다. 대성당으로 간 하나코는 사쿠라코를 대신해 시스터후드의 혼란을 바로잡는다. 정의실현부 부실에 긴급 소집된 코하루는 자신이 해야 할 일이 무엇인지 혼란스러워한다. 한편, 부상당한 선생님을 실은 게헨나의 앰뷸런스가 계엄령이 막 떨어진 트리니티 정문에 도착한다."
1377799660 = "가중되는 혼란 2"
3800416342 = "발사체 분석 결과, 발사체가 발사된 위치는 게헨나가 아니라 트리니티라는 사실이 밝혀진다. 하나코는 폭발 당시 현장에 <유스티나 성도회>가 있었다는 사실을 알고, 최악의 경우 트리니티와 게헨나가 키보토스에서 사라지게 될 것이라고 경고한다."
3662530531 = "닿을 수 없는 저쪽"
3512207568 = "히후미는 자신들 앞에서 모습을 감춘 아즈사를 가까스로 찾아낸다. 하지만 아즈사는 히후미를 밀어내며, 자신 때문에 모두가 다쳤다며 괴로워한다. 결의에 찬 눈빛으로 사오리의 헤일로를 파괴하러 가겠다는 아즈사. 히후미에게 감사의 말을 남긴 아즈사는 결국 떠나고, 히후미는 아즈사의 이름을 외치며 홀로 남겨진다."
2485053728 = "어둠 속의 빛"
1374661261 = "전술 병기까지 준비해 성도회와 함께 트리니티로 진격하려던 아리우스 스쿼드는, 아즈사의 게릴라 전술에 허를 찔려 뜻밖의 피해를 입는다. 결국 붙잡히고야 만 아즈사지만, 히후미가 준 <우정>의 증거를 이용해 간신히 도주하는 데 성공한다. 하지만 히후미의 소중한 선물을 폭탄으로 쓴 죄책감에 괴로워한다."
3252357257 = "다섯 번째 화두의 대답"
1561913819 = "세이아는 선생님에게 에덴조약은 우울하고 슬픈 결말만이 남아 있으니, 더 이상의 기대는 그저 고통일 뿐이라고 말한다. 또한 다섯 번째 화두는 여전히 증명 불가능한 명제이며, 그것이 에덴조약이라는 아이러니한 이름으로 완결되는 데에 쓴웃음을 짓는다. 하지만 선생님은 불확실한 명제와 미확정된 미래에 좌절하기보다는 지금은 학생들을 위해 노력하겠다며 세이아에게서 떠난다."
3162520452 = "편린들"
3183955174 = "세이아의 시선은 본인의 의지로, 또는 의지가 아님에도 에덴조약에 얽혀버린 편린들을 훑는다. 사오리는 아츠코의 도움으로 살아남았고, 선도부장 히나는 자취를 감췄다. 티파티는 시스터후드와 관계가 있을 것으로 의심되는 하나코를 체포하며, 미카는 감옥에서 풀려난다. 아즈사는 사오리를 막기 위해 다시 일어서며, 히후미는 굳센 각오로 트리니티 교문으로 들어간다. 그리고 병실에서 정신을 차린 선생님은, 학생들을 구하기 위해 다시 일어선다."
3179867525 = "증오의 정체"
2955441922 = "티파티를 지휘하라는 요청을 거부한 대가로 무자비하게 구타당한 미카를 감싼 코하루. 점점 분위기가 험악해지려는 그때, 선생님이 등장해서 코하루와 미카를 감싸고 티파티 주전파는 흩어지게 된다. 감옥에 있을 때 미카는 자신이 왜 세이아를 해치려고 했는지 그 일을 후회하며 눈물을 흘리고, 세이아는 미카의 진심을 알고 미카를 용서하기로 한다."
3510190250 = "흔들리지 않고"
3395723629 = "부상당한 학생들과 만난 선생님. 학생들의 바람대로, 선생님은 또 다른 학생들을 구하기 위해 양호실을 떠난다. 히후미와 코하루, 그리고 하나코가 만나 아즈사를 구하기 위한 보충수업부가 다시 결성되어, 아리우스와 아즈사가 있는 고성당 폐허로 향한다."
9241096 = "우리들의 이야기를"
1769802021 = "히나는 은퇴를 선언하며 선생님에게 자신의 약한 모습을 보여주지만, 선생님의 인정을 받은 뒤 게헨나 선도부로 복귀한다. 마침내 아즈사를 발견한 히후미는, 리더 파우스트가 되어 수영복 복면단과 함께 아리우스 스쿼드에게 대적하기로 결의한다. 에덴조약에 새 계율이 체결되고 샬레의 선생님을 중심으로 한 또 다른 에덴조약기구군이 출범한다."
4250678679 = "낙원의 이름 1"
1990540744 = "게헨나의 선도부, 트리니티의 정의실현부, 거기에 아비도스까지 합세해 아리우스 스쿼드를 상대한다."
4084884875 = "낙원의 이름 2"
