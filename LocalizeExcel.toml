2245880881 = "총학생회는 키보토스 상공에 실존하지는 않으나 6개의 질량체가 있음을 관측한다. 린은 문제 해결을 위해 각 자치구의 학생회 대표들을 소집, 비상대책위원회를 발족한다."
3892096270 = "비상대책위원회 소집"
3215056730 = "각 자치구 학생회 대표들에게 비상대책위원회 소집 요청서가 전달된다. 샬레의 선생님도 비상대책위원회에 참석하기 위해 총학생회가 보내온 헬기에 탑승하지만, 이는 사실 카이저 PMC의 함정이었다."
3439536052 = "빛의 도래"
4086481199 = "카이저 PMC의 수상한 움직임을 쫓던 시로코는 무언가와 조우한 뒤 연락이 두절된다. 한편, 아로나의 교실에 있던 아로나는 무언가가 다가오고 있음을 경고하고, 동시에 키보토스 전역에 이변이 감지된다."
823044007 = "충돌 1"
1618045052 = "칸나의 도움을 받아 감옥에서 탈출하는 선생님. 잠시 한숨을 돌린 뒤, 칸나는 선생님이 납치당한 이후 어떠한 일들이 일어났는지 설명한다."
2115087290 = "충돌 2"
897695044 = "문책결의안에 의해 모든 권한이 정지된 린. 업무가 마비되어버린 총학생회에 카이저 PMC가 들이닥친다."
108917706 = "탈출 1"
2607711708 = "칸나가 찾아온 싯딤의 상자를 받은 선생님은 모두를 지키기 위해 다시금 지휘를 시작한다."
2495439441 = "탈출 1"
2414405803 = "생활안전국 학생들을 지휘하여 위험을 모면한 선생님. 기운을 차린 칸나와 함께 카이저 PMC의 위협으로부터 탈출을 감행한다."
3653117257 = "탈출 2"
2785523736 = "카이저 PMC의 물량 공세에 의한 절체절명의 순간, 아로나의 연락을 받은 RABBIT 소대가 등장해 선생님과 일행들을 무사히 구출한다."
2819309745 = "샬레 탈환 작전 1"
2601430695 = "총학생회를 점거한 카이저에 의해 D.U. 전역에는 이미 계엄령이 발동된 상황. 현재 진행형인 혼란을 정상화하고 샬레에 감금된 린을 구출하기 위해 RABBIT 소대와 생활안전국을 필두로 한 샬레 탈환 작전이 시작된다."
3120994840 = "샬레 탈환 작전 1"
4019116888 = "공안국 학생들의 도움을 받아 샬레 건물 입구에 도착한 선생님과 학생들. 모모카와 아유무의 도움으로 린의 위치를 파악한다."
444446759 = "샬레 탈환 작전 2"
3034106234 = "의문의 소녀에게 공격받는 게마트리아. 제너럴은 카이저 SOF를 소집하고 샬레 건물 내부에서 선생님을 맞이할 준비를 한다."
4088358757 = "샬레 탈환 작전 2"
429781151 = "RABBIT 소대의 활약으로 샬레 탈환 작전은 성공, 린은 무사히\n구출된다."
3501090871 = "이야기의 전복"
2392777866 = "마침내 통신망이 회복되자, 선생님의 휴대전화에는 수백 건의 부재중 메시지가 동시에 도착한다. 잠깐의 여유도 없이 어디에선가 불쾌한 경고음이 울리고, 프랜시스라고 불리는 자로부터 최후의 선고를 듣는다."
4283014959 = "색채의 인도자"
2829819827 = "갑작스러운 이상 현상으로 혼란에 빠진 키보토스. 선생님은 어른의 카드를 사용해 일단 혼란을 수습하고자 한다. 정체를 알 수 없는 존재가 선생님의 앞에 나타나 의미심장한 충고를 남긴다."
2680676029 = "작전 회의"
25032020 = "선생님의 연락을 받은 학생들이 속속 총학생회로 모인다. 린을 중심으로 사태의 해결을 위해 정보를 모으고 작전을 세운다. 한편 성소에 노출된 사람들을 구하기 위해 선생님과 세이아는 쿠즈노하를 찾기로 한다. 이 이야기를 들은 니야는 쿠즈노하 수색을 자신에게 맡겨달라 말한다."
2666731161 = "작전 준비 1"
1645668012 = "성소 공략을 위한 작전이 시작되었다. 아비도스 사막에는 대책위원회와 흥신소 68이, 밀레니엄 폐허 지구에는 C&C와 에이미에 더해 츠루기와 이치카가, 슬럼피아에는 게임개발부와 히나, 그리고 RABBIT 소대가 각각 배치되어 대기한다."
420504687 = "작전 준비 2"
2800486956 = "사오리의 합류로 모두 모인 아리우스 스쿼드도 선생님의 부름에 응답한다. 제4 성소에는 시스터후드와 구호기사단이 대기한다. 제5 성소 공략은 난항을 겪던 와중에 온천개발부와 석방된 코유키가 손을 거들기로 한다. 이어 제6 성소는 시민들의 대피를 끝마친다. 한편 니야는 인법연구부에게 대설원으로 가 백화요란의 부장을 수색하는 임무를 전달한다."
2772818858 = "작전 준비 3"
2990932553 = "모든 준비가 완료되었다. 선생님은 성소 공략전과 자치구 방어전의 시작을 알린다."
3423693341 = "제1 성소 공략 - 아비도스 사막지구"
2046452490 = "아비도스 사막지구에서 흥신소 68과 대책위원회가 제1 성소 공략을 시작한다."
1927454599 = "자치구 방어 작전 - 산해경"
4210922202 = "산해경을 방어하기 위해 매화원과 연단방, 현무상회까지 총출동한다. 그리고 움직이기 시작한 현룡문의 문주 키사키가 그들을 돕기 위해 미나를 파견한다."
3817181433 = "자치구 방어 작전 - 붉은겨울"
4286816204 = "마리나는 친위대를 이끌고, 미노리는 용역부원들과 함께 붉은겨울 연방학원 방어에 나선다. 227호 특별반은 대피소를 운영하지만 그곳에서도 체리노의 모습은 보이지 않는다."
3231049307 = "제2 성소 공략 - 밀레니엄 폐허 지구"
1633487982 = "C&C는 강하하여 군수공장의 중심부에 침투, 츠루기는 정면에서 적 병력의 진격을 막는다. 모두가 헤세드 앞에서 만나자는 약속과 함께 제2 성소 공략이 시작된다."
3392176268 = "자치구 방어 작전 - 백귀야행"
2047690688 = "백귀야행 연합학원의 모두가 힘을 합쳐 자치구 방어에 나선다."
1895070652 = "자치구 방어 작전 - 게헨나"
2484586467 = "게헨나 학원 인근을 방어하기 위해 모인 선도부. 제3 성소를 공략하는 히나를 제외한 모든 멤버가 모여 있다. 선도부는 내심 만마전의 지원을 기대하지만, 그 자리에 등장한 사츠키는 선도부에게 그다지 힘이 되어주지 못한다."
874433887 = "제3 성소 공략 - 버려진 유원지"
440838892 = "제3 성소인 버려진 유원지 앞에 집결한 RABBIT 소대와 게임개발부, 그리고 히나. 게임개발부는 UZQueen 전용기체까지 준비하여 성소 공략에 함께 참전한다."
3984911413 = "자치구 방어 작전 - 트리니티 1"
2457016360 = "트리니티 학원 인근을 방어하기 위해 트리니티에서도 정의실현부와 도서부, 자경단 등이 각자의 역할에 맞게 민간인 대피와 적의 요격 등을 진행한다. 뜻밖에 티파티까지 참전하며, 전황은 조금 더 격렬해진다."
1058019105 = "자치구 방어 작전 - 트리니티 2"
660632900 = "주요 멤버가 집결한 학원 인근은 어느 정도 마무리가 되었으나, 유적지 부근에 코하루가 힘겨운 싸움을 하고 있음이 드러난다. 그때 뜻밖에 티파티의 미카가 등장하며, 전황이 반전되기 시작한다."
3990749649 = "자치구 방어 작전 - 트리니티 2"
3821969501 = "미카는 코하루를 비롯한 정의실현부 멤버들에게 감사 인사를 받는다."
3708980353 = "제4 성소 공략 - 카타콤 내부 바실리카"
2859655258 = "제4 성소를 공략하기 위해 카타콤 내부 바실리카 앞에 모인 하나코와 시스터후드. 거기에 아리우스 스쿼드까지 참전한다. 뒤늦게 성도회 복장의 사쿠라코까지 합류하며 제4 성소의 공략이 시작된다."
2432640477 = "자치구 방어 작전 - 밀레니엄"
2053587049 = "밀레니엄 자치구의 방어를 위해 모인 엔지니어부. 그때 미상의 AMAS가 그들의 앞에 나타나지만, 별다른 적의를 드러내지 않아 함께 방어 작전을 개시한다."
3508513666 = "제5 성소 공략 - 요새도시 에리두 근교"
1997816141 = "제5 성소를 공략하기 위해 요새도시 에리두 근교에 모인 세미나 부원들. 한편 온천개발부는 성소 공략을 지원하면서 겸사겸사 새 온천을 찾기 위해 분주히 움직인다."
2129916519 = "인법연구부의 특별 임무"
277931373 = "특별 임무를 수행하기 위해 대설원에 당도한 인법연구부. 하지만 생각보다 많은 무명수호자의 등장에 위기에 빠지는데…. 그때 하늘에서 뜻밖의 원군이 등장한다."
1644926925 = "인법연구부의 특별 임무"
1124497200 = "만마전의 합류로 위기에서 벗어난 인법연구부. 다시 특별 임무를 재개하고자 길을 떠난다. 만마전도 임무를 마쳤다는 판단하에 복귀한다."
4129642388 = "자치구 방어 작전 - D.U. 시라토리구"
1310011068 = "여섯 번째 성소는 아직 그 수호자의 존재가 드러나지 않아, 본부에서는 먼저 D.U. 시라토리구 주변의 방어를 강화하기로 한다. 미식연구회가 그 방어 작전에 자원하는데… 카이텐져가 주위에서 활동하고 있음이 드러난다."
581030933 = "자치구 방어 작전 - D.U. 시라토리구"
1263686991 = "카이텐져는 본연의 목적을 달성했는지 퇴장한다. 토키는 히마리의 지시를 받아 다음 목표 지점으로 이동한다."
3816433260 = "최후의 방어 작전 - 샬레"
3712581761 = "여섯 번째 성소를 제외한 모든 성소의 수호자 공략 준비와, 모든 자치구 방어 준비를 마친 그때, 샬레 인근에 무명수호자가 대거 등장한다. 위기의 순간, 뜻밖의 조력자들이 모여 샬레 방어 작전에 협력한다."
3792371391 = "최후의 방어 작전 - 샬레"
4154633485 = "모든 자치구의 방어 작전과 성소의 수호자의 공략 준비가 완료되어 카운트 다운을 개시한다."
1690517337 = "뜻밖의 조우"
1535882269 = "마침내 맑게 갠 키보토스의 하늘. 숨을 돌릴 틈도 없이, 뜻밖의 인물이 선생님 앞에 모습을 드러낸다."
762919617 = "역할"
411556707 = "백귀야행의 대설원 어딘가에서는 인법연구부가 백화요란의 부부장, 나구사와 마주친다. 한편, 갑자기 나타난 시로코는 선생님에게 결정된 미래를 바꿀 수 없음을 경고한다."
1367106300 = "다음 목표"
2890072437 = "키보토스의 하늘에 또다시 초고위급 에너지의 질량체가 나타나고, 머지않아 거짓된 성소가 다시 나타날 것이라는 위기감이 감돈다. 대책위원회의 모두는 시로코를 다시 데려오기 위해 의기투합한다. 그리고 색채의 인도자, 프레나파테스의 거처가 밝혀진다."
3531850351 = "방법과 도구"
2437317342 = "프레나파테스가 있을 것이라고 추정되는 구조체에 공격을 가해보지만, 현재의 공격수단으로는 피해를 입힐 수 없음이 밝혀진다. 검은 양복과 만난 선생님은 그로부터 프레나파테스에게 닿을 수 있는 방법을 듣는다."
267855655 = "아비도스에 있는 것 1"
1729905057 = "프레나파테스의 거처, 아트라하시스의 방주에 갈 수 있는 방법이 아비도스에 있음이 밝혀진다."
1811510733 = "아비도스에 있는 것 2"
2105960912 = "카이저 PMC로부터 '초고대 병기'를 확보하기 위해 대책위원회가 카이저의 발굴지로 향한다."
4076541312 = "아비도스에 있는 것 2"
1035243973 = "마침내 발굴지에서 '초고대 병기'의 모습을 확인한다."
3561957851 = "우트나피쉬팀의 배 1"
2790127767 = "우주전함의 모습을 한, '우트나피쉬팀의 배'에 한데 모인 다양한 학원의 학생들. 그리고 케이는 아리스에게 그 배로부터 멀어지라고 경고한다."
1997883390 = "우트나피쉬팀의 배 2"
1562900906 = "엔지니어부의 도움으로 우트나피쉬팀의 배를 이용하여 하늘에 떠 있는 아트라하시스의 방주를 공략할 수 있다는 사실이 밝혀진다. 그리고 마침내 아트라하시스의 방주를 공략할 작전 계획서가 완성된다."
947511423 = "작전 브리핑"
1309794530 = "작전명은 '아트라하시스의 방주 점령전'으로 결정된다. 선생님은 배의 총책임자를 맡게 되고, 총학생회를 포함한 아홉 명의 지원자가 오퍼레이터로 자원한다."
1095169701 = "지상에서의 마지막 밤"
3567564752 = "우트나피쉬팀의 배에 타는 학생, 그리고 지상에 남는 학생이 지상에서의 마지막 밤을 함께 보내며 밝은 미래를 맞이하기 위한 각오를 다진다."
1605244826 = "하늘로"
743266950 = "아홉 명의 오퍼레이터를 위한 특별한 의상도 완성되고, 마침내 우트나피쉬팀의 배는 방주를 향해 발진한다."
1510466922 = "처음의 이야기"
206962437 = "잠깐 동안, 선생님은 어쩌면 맞이했었을지도 모르는 또 다른 이야기를 주마등처럼 보게 된다. 한편, 발진한 우트나피쉬팀의 배는 순식간에 위기에 빠지고 만다."
440319067 = "빛의 자격 1"
2333920900 = "아트라하시스의 방주가 세운 새로운 축을 돌파하기 위한 긴박한 논의가 오가고, 아리스는 이 위기를 극복하기 위한 한 가지 아이디어를 제안한다. "
3249116561 = "빛의 자격 2"
4072004648 = "마침내 케이의 힘을 받아 재구축한, 아트라하시스의 슈퍼 노바의 힘이 방주의 다차원 배리어를 분쇄한다. 우트나피쉬팀은 이대로 최대 속도로 돌진해, 방주 내부에 진입하는 데까지 성공한다."
535154781 = "돌입"
2875406175 = "돌입하는 데까지는 성공했지만, 순식간에 방주 내부의 적들로부터 포위되고야 만 우트나피쉬팀. 그때 배 안에 함께 타고 있던 학생들이 뛰쳐나가, 배의 방어전을 개시한다."
37805264 = "아트라하시스의 방주 점령전"
3286452789 = "배를 포위한 적들을 격퇴하는 데 성공하자, 폭발과 함께 시로코가 선생님 앞에 나타난다. 그때 대책위원회의 모두가 시로코의 앞에 등장하고, 시로코는 잠깐 놀란 듯이 그 자리를 이탈한다. 우트나피쉬팀의 배를 방어하는 한편, 아트라하시스의 방주를 점령하기 위한 작전이 이어서 개시된다."
2495904841 = "역습"
2599365756 = "아트라하시스의 방주에서 자폭 시퀀스를 준비하던 베리타스. 하지만 우트나피쉬팀의 배는 이미 적에게 해킹당한 상태였다. 다시 키보토스의 하늘이 붉게 물드는 절망적인 상황, 우트나피쉬팀을 해킹한 장소에 도착한 시로코와 선생님은 그곳에서 프레나파테스와 또 다른 시로코를 마주하게 된다."
1490470304 = "확정된 운명"
1765923020 = "우트나피쉬팀의 배가 해킹당하여 파국으로 치닫는 키보토스. 시로코와 선생님과 아로나는 또 다른 시로코, 프레나파테스, 또 다른 아로나와 대치한다."
3647243136 = "저항 1"
2615819851 = "당장의 파멸은 막았지만, 여전히 위태로운 상황. 우트나피쉬팀의 자폭을 막기 위해 다 함께 힘을 합친다."
3257700775 = "저항 2"
3695169812 = "지상에 숨겨져 있던 성소가 현현하고 파멸을 향한 카운트다운이 가속화된다. 수색 중이던 토키가 성소를 발견, 단신으로 저지에 나선다. 한편 미식연구회와 후우카는 따라붙는 적을 따돌리고 아트라하시스의 방주 최하층으로 향한다."
3387237276 = "저항 3"
2048912704 = "무명수호자들의 공격에 위기를 맞는 토키. 아트라하시스의 방주에서는 차례차례 비상 해제 장치가 파괴되고 최하층의 방벽이 개방, <통신 단말기>의 파괴에 성공한다."
828369729 = "편리한 선택지"
4054721821 = "우트나피쉬팀의 배의 통제권을 수복하는 데 성공한 리오와 히마리였으나 토키는 한계에 다다른다. 절체절명의 위기에서 구세주가 등장한다."
2057330540 = "동등한 조건"
1214415501 = "방주의 자폭 시퀀스가 다시 시작되었다. 모두 탈출 준비를 하는 가운데 선생님을 돕기 위해 학생들이 모인다. 세계의 파멸을 위해 또 다른 시로코는 선생님과의 결전에 돌입한다."
2106964121 = "같은 상황, 같은 선택"
248567209 = "마지막 탈출 시퀀스로 또 다른 시로코를 구한 선생님. 추락하는 방주 안에서 선생님을 구하기 위해 고군분투하는 아로나였지만 역부족이었다. 선생님은 아로나에게 또 다른 아로나를 구해달라는 마지막 부탁을 남긴다. 아로나의 교실로 전송된 또 다른 아로나는 둘이서 기적을 일으키자며 손을 내민다."
301154037 = "그리고 모든 기적이 시작되는 곳"
3245849038 = "선생님은 무사히 학생들의 곁으로 돌아왔다. 시로코는 또 다른 시로코에게 복면을 선물하고 아로나는 또 다른 아로나에게 <프라나>라는 이름을 붙여 준다."
3096659346 = "에필로그 1"
2589530285 = "D.U. 시라토리구에서는 한창 복구 작업이 진행 중이다.\n게임개발부 일행은 <Kei>라는 세이브 데이터를 발견하여 히마리에게 가져간다. 그리고 카야는 자신을 배신했던 카이저 제너럴과 손을 잡는다."
1378875601 = "에필로그 2"
1401260434 = "혼란이 수습되고 각자의 일상을 되찾아가는 키보토스. 선생님은 니야에게서 쿠즈노하의 편지를 전달받는다. 한편 린은 발신인이 없는 한 통의 편지를 받게 된다."
2819824296 = "후일담 1"
3130167285 = "싯딤의 상자에서 함께 지내게 된 아로나와 프라나. 선생님은 이 둘과 만나 서로 잘 부탁한다는 인사를 나누며 다음을 준비한다."
1389029183 = "후일담 2"
2385825589 = "폐허의 어딘가에서, 프랜시스는 이 이야기의 결말에 대해 이야기한다. 한편 프라나는 어째서 아로나가 자신과 비슷하면서도 다른 존재인지, 그 이유에 대한 증명을 종료한다."
1141893095 = "잠자는 고래"
1071953312 = "호시노가 자재 정리를 핑계로 선생님을 불러 창고 안에 낮잠용 비밀 기지를 만든다."
3096054116 = "게으름뱅이의 아침"
2514639115 = "교실에서 실컷 낮잠을 잔 호시노가 선생님과 함께 운동장에서 보물찾기를 한다."
3534890387 = "희미하지만 빛나는"
687709314 = "한밤중의 학교에서 보물찾기를 하던 중 선생님은 물고기 모양의 야광 스티커를 발견한다. 이를 선물하자 호시노는 크게 기뻐한다."
3392633652 = "한밤중의 순찰자"
1781335004 = "밤거리에서 우연히 호시노를 마주친 선생님은 그녀가 밤마다 몰래 거리 안전을 위해 순찰을 돌고 있다는 사실을 알게 된다."
3089484350 = "행운을 잡는 법"
748794093 = "호시노는 서점에서 구입한 도감에서 아쿠아리움 입장권 추첨 티켓을 발견한다. 아쉽게도 그 티켓은 낙첨이었지만, 선생님은 같은 책을 50권이나 구매하여 당첨될 때까지 재도전한다."
1287455689 = "아쿠아리움!"
1182596744 = "당첨 티켓을 가지고 아쿠아리움에 놀러 온 선생님과 호시노. 아쿠아리움의 물고기를 둘러보며 즐거운 시간을 보낸다."
1659730423 = "어디서든 입장권"
823938156 = "선생님을 불러낸 호시노는 자신이 애용하던 베개를 선생님에게 빌려준다. 너무나도 부드럽고 푹신한 베개의 감촉에 선생님은 곧바로 잠이 들고, 그 틈을 타 호시노는 평소 하지 못했던 말을 전한다."
772933003 = "아르바이트 보조"
306418223 = "세리카의 전단지 아르바이트를 보조하기 위해 거리로 나온 선생님. 힘들게 아르바이트를 하는 세리카의 모습을 보고 선생님은 몰래 뒤에서 전단지를 나눈다."
1065594543 = "하드한 밤샘 알바"
2879956728 = "세리카와 선생님은 밤새도록 빌딩의 입구를 지키는 야간 경비 아르바이트를 하고 숙소로 돌아갔다."
2794306484 = "공원 잡초 뽑기"
2993178327 = "세리카는 선생님과 함께 공원의 잡초를 뽑는 제초 아르바이트를 하였다."
3688572742 = "뒤늦은 깨달음"
57915122 = "공원에서 청소를 하던 도중, 세리카는 선생님과 함께하는 아르바이트를 즐기고 있는 자신의 모습을 새삼 발견한다."
2323863848 = "뜻밖의 횡재"
2376289702 = "예상보다 아르바이트를 일찍 마친 선생님과 세리카는 야시장에서 노점 구경을 하며 즐거운 시간을 보냈다."
1234311581 = "아주 잠깐의 휴식"
1846022614 = "세리카가 연속된 아르바이트의 과로로 인해 쓰러지자 선생님은 아르바이트를 취소시키고 세리카를 간호한다. 세리카는 공원의 그네에 앉아 그동안 숨겨왔던 속내를 조금 털어놓는다."
1604922941 = "좋은 물건의 기준"
1348486067 = "세리카는 아비도스 자치구에 방문하는 선생님을 마중 나오던 도중, 갑작스러운 전투로 인해 자신이 아끼던 가방이 망가진 것을 깨닫는다. 선생님과 함께 수선소에 가방을 맡긴 세리카는 선생님에게 가방에 대한 사연을 털어놓는다."
1974828165 = "러닝 머신"
472444615 = "아침 러닝 코스에서 시로코를 만난 선생님. 시로코는 가벼운 조깅을 권하지만, 예상을 뛰어넘는 무리한 코스에 선생님은 녹초가 되고 만다."
4290065928 = "거리 두기"
3912456663 = "러닝 후 몸에서 나는 땀 냄새가 신경 쓰여 선생님과 거리를 두는 시로코. 선생님이 이를 알아차리지 못하고 둔감하게 굴자 시로코는 실망한다."
1760556289 = "로드 싸이클"
1275905591 = "자전거샵에서 시로코와 선생님은 신형 자전거 부품에 대한 이야기를 나누며 즐거운 시간을 보낸다."
157262830 = "지하철"
3007279150 = "아비도스에서 꽤 떨어진 지하철역에서 시로코와 마주친 선생님. 시로코는 장거리 라이딩을 계획하고 있다고 선생님에게 말한다."
2507710158 = "도시 관찰"
3505609892 = "빌딩 옥상에서 은행 강도 계획을 세우며 도심을 내려다보는 시로코. 이 모습을 본 선생님이 시로코에게 주의를 준다."
2464084323 = "개인 면담"
2008779368 = "평소의 위험한 행실에 주의를 주기 위해 시로코를 따로 불러낸 선생님. 시로코는 갑작스러운 개인 면담에 긴장을 했다가 선생님이 자신을 걱정하고 있다는 사실에 안도하며 기뻐한다."
248513908 = "유비무환?"
3206543840 = "용무가 있어 아비도스 고등학교를 가던 선생님은 우연히 시로코를 만나 같이 학교로 가게 된다. 함께 걷던 도중, 시로코가 드론을 얻은 것을 보고 내심 걱정하던 선생님. 결국, 시로코의 방호 모드가 지나치다는 느낌이 들어서 제지하게 된다."
2219405563 = "우연한 만남이에요"
923721089 = "아비도스 외곽의 시내에서 선생님은 우연히 노노미와 만나 파르페를 먹으러 간다."
3468758278 = "청소할 시간이에요"
2022208209 = "아침 일찍 대책위원회 동아리실에 도착한 선생님과 노노미는 동아리실을 깨끗이 청소한다."
1361707422 = "보답할 시간이에요"
628470444 = "아비도스 학원에서 멀리 떨어진 쇼핑몰에서 노노미와 선생님은 대책위원회 부원들에게 줄 선물을 고른다. 쇼핑이 끝난 뒤 부실에 도착하자 노노미는 선물로 사 온 귀이개로 선생님의 귀청소를 해준다."
273794540 = "게임은 즐거워요"
3260525698 = "선생님은 노노미의 오셀로 특훈을 도와주기 위해 직접 대전을 준비하지만, 생각보다 더 강한 노노미의 실력에 연패를 당하고 만다."
1938906934 = "건강해지는 거예요"
148008888 = "선생님과 노노미가 운동장에서 구입한 아령을 무게별로 분류한다."
2260462853 = "다과회를 준비하는 거예요"
2609741974 = "선생님과 노노미가 빈 다도부실에서 다과회에 쓸만한 물건을 찾아보지만 별다른 소득 없이 돌아온다."
2355740806 = "남몰래 숨긴 노트"
1906697160 = "대책위원회실에서 혼자 무언가 적고 있는 노노미. 다름 아닌 버킷리스트로, 대책위원회의 모두와 함께하고 싶은 일들을 정리하는 수첩이다."
2951685534 = "모범 시민"
1611256425 = "마키가 사유지에서 그래피티를 하다 경찰에 붙잡히고, 이를 구하기 위해 선생님이 경찰서로 찾아간다. 마키는 사람들이 자신의 예술혼을 몰라준다면서 불평하면서도 선생님을 곤란하게 만들지 않기 위해 사과를 한다."
3090443160 = "수상한 해킹"
3395943859 = "마키가 사람들 몰래 편의점 키오스크를 해킹하여 고전 게임을 설치하다가 선생님에게 들켜 혼이 난다."
364389697 = "천재와 바보는 종이 한 장 차이"
2442185520 = "밀레니엄 학원의 시험에서 낙제한 마키가 선생님으로부터 개인 교습을 받는다. 마키는 문학 문제를 어려워하면서도 공책의 내용을 전부 암기해버리는 천재성을 보인다."
350096205 = "미화 정비"
2708563886 = "하교길에 마키는 우연히 쓰레기로 더럽혀진 벽을 발견하고, 선생님 몰래 벽을 깨끗이 청소하고 벽화를 그린다. 선생님은 마키의 뜻을 이해하고 같이 벽을 청소한 다음 벽 주인에게 함께 사과를 하러 간다."
1003290137 = "영원한 추억"
3714205214 = "마키가 벽화를 그렸던 부지의 주인은 마키의 그림을 크게 마음에 들어 하며 또 다른 회벽에도 벽화를 칠해달라고 부탁한다. 마키는 선생님과 함께 벽에 그래피티를 칠하며 즐거운 시간을 보낸다."
96680612 = "당신이 저의 주인님입니까? 1"
2929931893 = "임무 도중 헬멧단에게 쫓기던 선생님을 아카네가 구해준다. 아카네는 선생님에게 인사를 건네며 처음 만났을 때의 일을 회상한다."
4136338484 = "당신이 저의 주인님입니까? 2"
1808933988 = "아카네와 선생님이 처음 만났을 때의 일. \"청소\"라는 단어를 요인 암살의 은어로 오해한 아카네는 선생님이 진짜 쓰레기 청소를 부탁하자 불만스러워하면서도 샬레의 집무실을 깨끗이 청소해낸다."
3512349930 = "함께 걷는 시간"
2541546715 = "아카네는 헬멧단을 추격하던 중 길을 엇갈려 헬멧단을 놓치고 만다. 하지만 잘못 들어선 길에서 우연히 선생님을 마주치면서 실패한 임무에도 행운이 따른다며 기뻐한다. 그때, 헬멧단이 다시 두 사람의 앞에 나타나고, 이번에는 확실히 헬멧단을 생포하는 데 성공한다."
1225828462 = "잠든 숲 속의 메이드"
1332057090 = "카이저 코퍼레이션의 건물에 잠입했다가 직원들에게 붙잡혀 감금된 아카네와 선생님. 구조 작전 중에 두 사람은 직원들이 터트린 폭탄의 충격에 휘말리지만 선생님이 아카네의 몸을 받쳐 준 덕분에 아카네는 다치지 않고 구출된다."
211557474 = "좋은 아침입니다 주인님."
3773167144 = "이른 아침. 샬레의 사무실을 찾은 아카네가 선생님을 깨우며 계속 장난을 친다."
1160899660 = "빛나는 오후를 맞이하며"
613679375 = "지난번 임무를 도와준 선물로 아카네가 선생님에게 차를 접대한다."
204930277 = "검은 제복"
2456463672 = "마시로가 작전 중에 뜯어진 치마의 솔기를 꿰매며 정의부의 검은 제복에 대한 불평을 한다."
1919817649 = "정의란 무엇인가"
638853668 = "마시로가 정의에 관한 책을 빌려와 선생님과 정의란 무엇인가에 대해 토론을 한다."
1461678656 = "저격수의 시련 1"
1751577586 = "마시로가 저격수의 능력을 향상시키기 위해 선생님과 훈련을 진행한다. 간지럼을 참는 훈련을 진행하던 중, 선생님이 목덜미에 손을 대자 마시로가 화를 낸다."
3085822654 = "저격수의 시련 2"
3501406577 = "마시로가 저격수의 능력을 향상시키기 위해 선생님과 훈련을 진행한다. 무거운 탄통을 들고 계단을 오르내리느라 선생님은 녹초가 되고 만다."
872429701 = "정의의 실현"
4188898275 = "트리니티 학원 건물의 옥상에서 마시로 저격 임무를 수행한다. 무더운 날씨에 땀을 흘려가며 열심히 목표를 기다렸지만, 작전이 취소된 탓에 마시로의 노력은 물거품이 되고 만다."
534884064 = "연기와 바보는 높은 곳을 좋아한다."
27311898 = "키보토스의 어느 건물 옥상에서 선생님은 우연히 마시로와 마주친다. 선생님은 옥상에서 마시로와 이야기를 나누며 즐거운 시간을 보낸다."
2024630372 = "과거에서 배우는 진리"
1135538242 = "광장에서 무언가에 집중하고 있던 마시로를 발견한 선생님. 마시로는 자신이 읽고 있던 책에 대한 이야기를 해준다."
587639145 = "간식 시간"
555265990 = "슌의 실수로 매화원 원생들에게 가야 할 메일이 선생님에게 간다. 슌은 갑자기 찾아온 선생님에게 과일을 대접하며 즐거운 시간을 보낸다."
1235064322 = "식사 후에는 깨끗이 양치를"
1212581455 = "선생님과 슌이 매화원 원생들에게 양치의 중요성에 대해 교육한다. 이어서 슌은 양치 검사를 핑계로 선생님의 입 속을 구석구석 관찰한다."
1104721180 = "나이 들지 않았는걸!"
2518280333 = "코코나로부터 나이가 많다는 말을 듣고 의기소침해진 슌을 선생님이 위로해준다."
541355867 = "높게 높게"
2710406827 = "슌은 우연히 매화원 원생들이 선생님과 노는 모습을 목격하게 된다. 원생들이 모두 돌아간 후, 슌은 선생님에게 자신과도 놀아달라며 어리광을 부린다."
3562536085 = "선물 고르기"
4219239495 = "키보토스의 대형 쇼핑몰에서 슌과 선생님이 매화원 아이들의 선물을 고른다. 한참의 고민 끝에 슌은 커다란 케이크를 사기로 결정한다."
2538754249 = "달콤한 오후의 낮잠"
546306698 = "격무로 인해 피로가 쌓인 선생님에게 슌이 매화원에서 낮잠을 자라고 권한다. 낮잠을 자는 선생님의 곁에서 슌은 자장가를 불러주며 느긋한 시간을 보낸다."
3676557931 = "체온 조절"
2692432267 = "작전이 끝난 직후 에이미는 덥다는 이유로 대뜸 옷을 벗으려고 한다. 선생님은 에이미에게 아이스크림을 권하며 옷을 벗지 못 하도록 말린다."
3548321794 = "최신 유행 연구 1"
1150093050 = "에이미가 최신 유행을 따라가기 위해 평범한 여학생들이 좋아하는 화제가 무엇인지 선생님에게 묻는다. 하지만 이야기가 자꾸 새는 바람에 두 사람은 별다른 소득을 거두지 못한다."
3558259779 = "최신 유행 연구 2"
3529527109 = "에이미가 최신 유행을 따라가기 위해 선생님과 함께 노래방을 방문한다. 에이미의 걱정과는 별개로 그녀의 노래 실력은 매우 출중했다."
2376132403 = "패션의 완성"
2400059281 = "에이미와 선생님이 여성복을 구매하기 위해 쇼핑몰을 방문한다. 속옷 가게 앞에서 자꾸 속옷을 갈아입으려는 에이미를 선생님이 뜯어말린다."
1697884784 = "상처"
1923076069 = "작전 중 상처를 입은 에이미를 선생님이 치료해준다."
3878318917 = "열풍"
3297514869 = "선생님은 밀레니엄 근교 사막의 이상 현상을 조사하기 위해 에이미와 함께 탐사를 나선다. 특별한 문제는 발생하지 않았지만, 두 사람은 더운 날씨에 지쳐버리고 만다. 이때 에이미가 더위를 쫓을 비장의 무기를 꺼내 든다."
1892946756 = "사야의 연구실에 어서 오세요!"
1855404410 = "연단방 부원들이 사야의 수상쩍은 실험을 거부하며 도망치자 사야는 선생님을 불러 자신의 신약을 마시도록 권한다. 선생님이 약물을 들이켜자 온몸이 황금빛으로 빛나기 시작한다."
3516083753 = "불로불사의 영약"
1288335934 = "사야가 불로불사의 약을 만들어냈다며 선생님에게 새로운 신약을 권한다. 그러나 그 약의 정체는 몸에서 회색 털이 돋아나는 약으로, 변모한 선생님의 모습을 보자 사야는 무섭다며 도망을 친다."
3136929583 = "다이어트약"
2670545658 = "지난번 실험의 대가로 선생님에게 기름진 국수를 대접하는 사야. 기름진 음식을 아무렇지도 않게 먹어 치우는 사야를 보고 헬멧단 간부가 다이어트 비결을 물어온다. 사야는 헬멧단 간부에게 다이어트 약을 건네지만, 독한 약의 부작용으로 인해 헬멧단 간부는 기절하고 만다."
2005157098 = "치즈 인 더 트랩"
993975792 = "사야와 선생님이 치즈 모형을 이용한 보드 게임을 플레이한다. 단순한 게임임에도 불구하고 치즈 모형에 눈이 팔려 사야는 연패를 면치 못한다."
1919898173 = "사랑의 묘약"
1899438040 = "사야는 새로 만든 사랑의 묘약을 선생님에게 실험해 보려 한다. 그러나 운반 중에 실수로 약병이 깨지고, 사야가 대신 내용물을 들이키게 된다. 사야는 묘약의 효과 때문에 선생님을 치즈로 오인하여 선생님의 팔뚝을 잔뜩 물어뜯는다."
501439135 = "네즈스케의 행방불명"
2792815660 = "어느날 갑자기 사야의 실험실에서 사야의 애완쥐, 네즈스케가 사라진다. 사야는 자신이 평소에 못살게 군 탓에 가출을 한 거라며 자책하지만, 실은 상회에서 나누어주는 해바라기 씨앗을 받으러 다녀온 것뿐이었다. 둘은 서로의 우정을 재확인하며 감격의 재회를 한다."
1851884916 = "운수 좋은 날"
3648098592 = "선생님이 길가에서 우연히 500엔 동전을 발견하고 주우려던 찰나, 노도카가 나타나 그 동전은 자신이 먼저 발견했노라고 주장한다. 노도카의 궁핍한 지갑 사정을 전해 들은 선생님은 노도카에게 고급 스위츠를 사준다."
2791336820 = "관찰 일기"
1263129030 = "노도카가 샬레 건물 맞은편의 옥상에서 망원경으로 선생님을 관찰하다가 들켜 징계를 받는다."
1922924090 = "유성우를 볼 수 있는 곳"
2229103612 = "노도카는 흐린 날씨 때문에 유성우를 볼 수 없다는 사실에 낙심한다. 선생님은 그런 노도카를 위해 고도가 높은 샬레의 건물 옥상에서 함께 유성우를 보자고 권한다."
2111847187 = "유성우와 소원"
3938426849 = "노도카와 선생님이 샬레의 옥상에서 유성우를 관찰하며 즐거운 시간을 보낸다."
389141647 = "구름을 찾아 떠나는 모험"
2169575525 = "지하철역에서 우연히 노도카와 마주친 선생님. 노도카는 산 중턱에 걸린 구름을 관찰하러 여행을 떠나는 중이었다. 선생님은 플랫폼까지 노도카를 배웅해준다."
326397231 = "도움이 필요하다면, C&C에!"
767045695 = "카린은 임무 수행 도중 헬멧단 기지에 붙잡힌 선생님을 만나게 된다. 카린은 무력하게 붙잡힌 선생님의 모습을 한심하게 여기지만, 곧 선생님이 기지를 발휘하여 헬멧단의 음모를 저지하자 선생님을 다시 보게 된다."
2895507513 = "공부는 어려워 1"
2421241791 = "시험에서 낙제점을 받아 추가 시험을 치르게 된 카린. 선생님은 카린에게 공부를 가르치며 엉뚱한 질의응답을 반복한다."
3585362705 = "공부는 어려워 2"
3964994116 = "샬레와 메이드부의 활동을 인정받아 보충과제로 추가 시험을 대체하게 된 카린. 보충과제를 풀며 선생님과 여러 가지 이야기를 나눈다."
2935757546 = "나와 선생님의 관계?"
828985389 = "밀레니엄 학원의 옥상에서 카린은 선생님께 친구 문제에 대해 상담한다."
2617383226 = "메이드 카페! 1"
3031156327 = "우연히 들린 메이드 카페에서 카린을 만난 선생님. 카린은 어색한 태도로 선생님을 접객하려 하지면, 결국 부끄러움을 참지 못하고 폭발한다."
4006315302 = "메이드 카페! 2"
2845710536 = "메이드 카페를 다시 찾은 선생님은 특별회원증을 손에 넣을 찬스를 얻게 되지만, 대신 카린에게 발로 밟아달라고 부탁한다. 선생님은 카린에게 발로 밟히며 좋은 시간을 보낸다."
3512015253 = "그녀의 오해"
2188282003 = "선생님은 자판기 앞에서 떨어뜨린 동전을 꺼내기 위해 하수구로 들어갔다가 이오리에게 변태로 오해받는다."
3619712072 = "교정에서의 휴식"
1611838701 = "선생님은 게헨나 학원의 돌바닥에 누워 낮잠을 자다가 이오리에게 변태로 오해받는다."
3380667060 = "비밀스러운 거래"
3253843096 = "선생님은 블랙마켓의 밀수범에게서 이오리의 초등학교 졸업 앨범을 구매하려다 들켜 이오리에게 매도당한다."
225526158 = "상냥한 치료"
3928473847 = "선생님이 게헨나 학원의 양호실에서 작전 중 부상을 입은 이오리를 치료해준다."
3130291039 = "선생의 오해"
1881265348 = "선생님은 우연히 주택가에서 함정에 빠진 이오리를 발견하고 장난을 치며 놀린다."
4152216310 = "마이스터라 불러줘."
1896022794 = "히비키가 선생님의 부탁으로 고장 난 휴대폰을 수리한다. 핸드폰에 자폭 기능을 넣으려는 히비키를 선생님이 간신히 뜯어말린다."
714863453 = "마음으로 타오르는 불꽃"
3818451070 = "히비키가 새롭게 만든 불꽃놀이 기계를 선생님에게 선보인다. 기계를 조작하던 중 선생님의 실수로 폭죽이 밀레니엄 타워에 명중하고 만다."
919844422 = "당신의 마음에 스트라이크"
1604766958 = "히비키가 선생님에게 야구에 대한 조언을 받으며 피칭머신을 개조한다. 여러 가지 의견을 주고받은 결과 야유 기능이 포함된 피칭 머신이 탄생한다."
2764647337 = "만약 꿈을 꾼다면, 당신과의 하루를."
3837035412 = "히비키가 선생님을 위해 숙면을 도와주는 발명품을 준비해온다. 하지만 그 발명품의 실체는 사용자를 즉시 잠에 빠뜨리는 무서운 기계였다."
1446176968 = "비가 내리면 센티멘탈"
1724445069 = "도서관에서 나온 선생님과 히비키는 우산 하나를 쓰고 사이좋게 귀가한다."
3087974166 = "이 밤을 당신에게!"
571050076 = "히비키와 선생님이 밀레니엄에 전기를 공급하는 시설을 수리하기 위해 분투한다. 밤이 돼서야 수리를 끝마친 히비키와 선생님은 밀레니엄의 야경을 지켜보며 좋은 시간을 보낸다."
2640531275 = "애착의 형태"
3599202500 = "수리 맡긴 자전거를 찾으러 온 선생님. 히비키는 수리만 해달라는 선생님의 당부 때문에 개조를 하지 못해서 아쉬워한다. 자전거에 덧붙이면 좋을 황당한 기능들을 말하던 히비키는 어째서 개조를 꺼려하는지 선생님에게 묻는다."
2971539326 = "불심검문"
1641801255 = "사나운 외모 때문에 경찰에게 불심검문을 당하는 카요코를 선생님이 구해준다."
3541264622 = "사무실 청소"
970135422 = "아침 일찍부터 흥신소를 청소하는 카요코를 도와 선생님이 함께 청소를 한다."
110591004 = "락 스피릿"
1877823555 = "선생님이 카요코로부터 헤비메탈 그룹의 신곡을 추천받아 듣는다."
4006123680 = "비 오는 날의 골목"
2367456929 = "비 오는 날, 선생님은 우연히 카요코가 새끼 고양이를 돌보고 있다는 것을 알게 된다."
3930206688 = "음반 매장"
2993258377 = "휴일에 음반 매장에서 우연히 마주친 선생님과 카요코는 서로가 좋아하는 음악을 추천하며 즐거운 시간을 보낸다."
2727647181 = "아침, 메이드, 청소!"
3993761072 = "등굣길에 선생님은 네루가 성실하게 거리를 청소하는 모습을 보게 된다. 이를 알게 된 네루는 부끄러워하며 선생님을 협박한다."
3312820670 = "네루에게 병문안"
3815418736 = "선생님이 감기에 걸린 네루를 찾아가 간병한다."
2327048759 = "네루의 병문안"
1005194850 = "네루가 감기에 걸린 선생님을 찾아가 간병한다."
127779370 = "지각 대소동"
853344527 = "네루에게 원한을 가진 불량배들이 네루를 학교에 지각하게 만들기 위해 갖은 수를 쓰지만 결국 실패한다."
2759482117 = "빛나는 밤"
2769268860 = "네루와 선생님이 밀레니엄의 건물 옥상에서 야경을 바라보며 즐거운 시간을 보낸다."
909021747 = "스카잔을 입는 이유"
1824681443 = "선생님은 모처럼의 휴일을 맞아 네루를 보러 밀레니엄 캠퍼스로 향했는데 그곳엔 네루의 화려한 의상을 보고 두려워하는 학생들이 있었다. 선생님은 네루가 항상 스카쟌을 입는 이유를 묻고, 네루는 있는 그대로의 사실을 말한다."
3523370044 = "엇나간 커뮤니케이션"
407255645 = "선생님의 하스미의 날개를 칭찬하며 대화를 건네지만, 이를 다른 의미로 오해한 하스미는 부끄러워하며 도망친다."
192545007 = "깨닫지 못한 사실"
4215980516 = "하스미가 카페에서 디저트를 잔뜩 먹으며 다이어트의 성과가 좀처럼 나지 않는 것에 불평을 늘어놓다가, 곧 그 이유가 자신이 먹는 간식에 있음을 깨닫는다."
1119295837 = "황혼의 시간"
1473959282 = "하스미와 선생님이 공원에서 해가 지는 풍경을 바라보며 대화를 나눈다."
926903321 = "스트레스의 원인"
4255682442 = "지나친 다이어트로 인해 스트레스를 받는 하스미를 선생님이 위로한다."
1985523315 = "짧지만 사치스러운"
2415429620 = "하교길에 갑자기 비가 내리자 하스미와 선생님은 가까운 공원에서 비를 피한다."
2309978531 = "그녀의 비밀 수첩"
1411120732 = "잃어버린 수첩에는 지난 3년간 정의실현부를 향해 쌓아온 애정이 담겨 있었다. 그리고 어쩌면 새로 싹튼 애정 또한……."
1330831614 = "근로의욕 증진 방법"
3119688622 = "열심히 일한 선생님을 위해 아루가 디저트 카페에서 파르페를 주문한다. 가게에서 커플 전용 파르페를 내놓자 아루는 당황스러워하면서도 내심 기뻐한다."
1193817835 = "설득의 기술"
2312804979 = "아루가 선생님과 함께 상대를 설득시키는 기술을 시험해 본다. 아루는 선생님의 말에 설득당하지 않을 거라 호언장담하지만, 선생님의 감언에 넘어가기를 반복한다."
2860741943 = "진정한 리더"
674363357 = "아루와 선생님이 영화관에서 신작 영화를 감상한다. 영화를 관람한 후, 두 사람은 영화의 내용에 대해 즐겁게 이야기를 나눈다."
3045973073 = "외부 경영 고문직 입사 제안"
1397280925 = "선생님 앞에서 어른스러운 모습을 보여주기 위해 허세를 잔뜩 부리는 아루. 하지만 흥신소에 잘못 걸려 온 전화로 인해 허세가 들통나고 만다."
254794530 = "엄청나게 귀중하고 중요한 것"
2167138310 = "선생님에게 저녁을 사기로 했다가 지갑을 잃어버렸다는 사실을 깨달은 아루는 지갑을 찾기 위해 선생님과 함께 밤새도록 거리를 탐색한다. 간신히 지갑을 되찾은 선생님은 아루의 낡은 지갑이 흥신소의 모두가 돈을 모아 선물해 준, 아루의 소중한 물건이라는 사실을 알게 된다."
1481568503 = "금지된 연구"
3240573980 = "게헨나 학원의 폐쇄된 식당에서 미식 연구를 진행하는 하루나. 그러나 술 대신 집어넣은 알코올이 폭발하면서 연구는 실패로 끝나고 만다."
3007405341 = "고고한 길"
2446232030 = "궁극의 맛을 연구하기 위해 선생님과 함께 게헨나 외곽의 다실을 찾은 하루나. 하지만 정작 그녀가 내놓은 것은 평범한 컵라면이었다. 선생님과 하루나는 다도를 흉내 내며 고상한 방법으로 컵라면을 끓여 먹는다."
2279595776 = "분노의 미식가"
3278316917 = "하루나는 고급 레스토랑에서 고급 코스 요리를 맛보지만, 요리를 포함해 여러 가지가 마음에 들지 않자 레스토랑을 폭파시킨다."
3581669111 = "진정한 미식"
1988565479 = "D.U.의 외곽지구에서 미식 탐방을 하는 하루나를 만난 선생님. 두 사람은 노점에서 붕어빵을 사 먹으며 즐겁게 이야기를 나눈다."
1695258470 = "신상 굿즈!"
1967388246 = "히후미가 선생님에게 새로 구매한 모모프렌즈의 굿즈를 자랑하며 즐겁게 이야기를 나눈다."
2135676389 = "가방의 비밀"
136068679 = "히후미가 늘 메고 다니는 페로로 가방을 정리하며 내용물을 선생님께 보여준다."
2419431461 = "페로로 님 구출 작전"
2058378536 = "오락실의 인형 뽑기 기계에서 히후미가 페로로 인형 뽑기에 도전한다. 히후미가 연달아 실패하자 선생님이 대신 인형을 뽑아 히후미에게 선물한다."
915698726 = "고민 상담"
3951972022 = "히후미가 개성 없는 자신의 성격에 관해 선생님에게 고민 상담을 한다."
718610260 = "우연한 외출"
3096365246 = "우연히 방과 후에 시간이 비게 된 히후미는 선생님에게 가벼운 산책을 제안한다. 두 사람은 트리니티의 곳곳을 돌아다니며 즐거운 시간을 보낸다."
2433419644 = "게릴라 악수회"
2731154380 = "키보토스 시내에서 우연히 모모프렌즈 인형극을 관람하게 된 히후미와 선생님. 이어지는 악수회에서 히후미는 페로로 인형과 악수를 할 기회를 얻는다."
567004708 = "거리감이 중요해!"
339869436 = "거리에서 우연히 츠루기를 마주친 선생님. 하지만 츠루기는 선생님이 다가갈 때마다 도망치기를 반복한다. 겨우 츠루기를 붙잡아 그 이유를 묻자 츠루기는 선생님의 관심을 끌기 위해 거리감을 두려 했다고 답한다."
2269971719 = "셀카의 세계"
1992569852 = "트리니티의 서류 작업에 필요한 증명사진을 찍는 츠루기. 선생님이 츠루기의 긴장을 풀어주기 위해 노력하지만 사진을 찍을 때마다 츠루기의 얼굴은 기괴하게 뒤틀린다."
2150949239 = "어른의 데이트"
3086644114 = "최고급 파인다이닝 레스토랑에 츠루기를 초대한 선생님. 츠루기는 자신에게 어울리지 않는 장소라며 잔뜩 긴장을 한다."
3477361952 = "특별한 상자"
1045732016 = "영화관 근처에서 츠루기를 만난 선생님은 츠루기가 영화 팸플릿을 버리지 않고 소중히 간직하는 모습을 보게 된다. 츠루기는 선생님을 자신의 방으로 초대하여 자신이 수집한 애용품 상자를 보여준다."
608406794 = "심야의 회의"
799499931 = "선도부의 일을 처리하기 위해 심야의 약속 장소로 선생님을 불러낸 히나. 하지만 선생님의 태도는 한없이 가볍기만 하다. 히나는 그런 모습을 못 미더워 하면서도 자신을 열심히 도와주는 선생님에게 고마움을 느낀다."
1206204887 = "당당한 이유"
3038001428 = "다른 사람의 눈을 피해 다시 심야에 선생님을 외진 곳으로 불러낸 히나. 이렇게 몰래 만나는 것이 더 수상쩍어 보인다는 선생님의 말에 히나는 고민에 잠긴다."
3916122859 = "타인의 취향"
76760892 = "바쁜 시간을 쪼개 게헨나 변두리의 작은 쇼핑몰을 찾은 히나와 선생님. 히나는 사람이 많은 쇼핑몰의 시설에 잘 적응하지 못하는 모습을 보이지만, 선생님의 배려로 즐거운 시간을 보낸다."
1437834886 = "따뜻한 햇볕의"
770595097 = "볕이 잘 드는 강변길에 해바라기를 하러 온 히나와 선생님. 선생님이 히나의 머리 냄새를 맡으려 하자 히나는 부끄러워하며 화를 낸다."
484158690 = "어쩐지 신비한 밤"
2689536441 = "한밤중의 학교에서 히나의 일을 돕는 선생님. 히나가 연속된 격무로 인해 피로해 하자, 선생님은 그녀가 쉽게 잠들 수 있도록 돕는다."
3033553461 = "결코 가볍지 않은 무게"
777765850 = "휴일을 맞이하여, 히나는 선생님과 함께 시간을 보내게 된다. 사소하지만 즐거운 이벤트들을 즐기며 함께 하는 사이, 히나는 선도부장의 완장에 담긴 무게와 자신이 평소 가슴에 품고 있는 생각을 선생님에게 들려준다."
1112893421 = "성실함의 보상"
3973431314 = "선생님은 시내의 스위츠 가게에 들렀다 그곳에서 아르바이트로 일하고 있는 준코를 만난다. 열심히 일하는 준코를 위해 선생님은 구입한 스위츠를 선물로 준다."
2643568139 = "가짜 음식"
1204261948 = "준코가 선생님과 함께 인터넷에서 찾은 가짜 레시피를 시험한다. 하지만 대부분이 이상한 맛이 나는 괴식 뿐이고, 준코는 돈 낭비만 하고 만다."
2129465828 = "빈곤한 미식회"
3571878226 = "모처럼의 미식 계획이 취소되어 식사를 거른 준코를 위해 선생님이 준코에게 인스턴트 라멘을 건넨다. 준코는 인스턴트 라멘을 못마땅하게 여기지만, 한입 맛을 본 이후로는 그 매력에 푹 빠지게 된다."
1991574778 = "위장 단련"
974989734 = "준코가 위장을 늘리는 훈련을 하기 위해 건조 다시마를 잔뜩 먹었다가 불어나는 다시마를 견디지 못해 토하고 만다."
3866442346 = "고독하지 않은 미식가"
2641616716 = "산해경 학원 인근의 중화거리에서 맛있는 음식을 잔뜩 먹은 준코와 선생님. 근처의 카페에서 음료수를 마시며 즐겁게 이야기를 나눈다."
447359660 = "노력의 결정체"
3325660189 = "준코는 선생님을 불러 자신이 만든 '노력의 결정체'의 정체를 밝힌다. 그것은 바로 준코만을 위한 시바타운의 맛집 리스트였고, 두 사람은 맛집 중 한 곳으로 가게 된다. 거기서 선생님은 준코와 함께 식사를 하고 준코의 미식에 관한 가치관을 듣는다."
998099366 = "장 보러 가실래요?"
1675775908 = "게헨나 학원의 식당에서 사용할 식재료를 구매하기 위해 선생님과 후우카가 대형 마트에서 쇼핑을 한다."
2342057365 = "후우카 씨의 오늘의 밥상"
3722225258 = "바쁜 업무로 인하여 식사를 자주 거르는 선생님을 위해 후우카가 여러 가지 요리를 만들어 대접한다. 후우카가 내오는 호화로운 음식을 맛본 선생님은 소화제가 필요할 만큼 과식을 한다."
3824807776 = "또 장 보러 가요!"
1034716395 = "시장에서 식재료를 고르던 후우카는 상인으로부터 선생님과 부부로 오인받자 부끄러워한다."
1043403340 = "오늘만큼은 선생님만의 밥상"
370580278 = "과로로 쓰러진 선생님을 위해 후우카가 샬레에서 손수 가정식을 만든다."
2861325865 = "급양부의 부장님은 힘내고 싶어!"
958810626 = "후우카가 요리에 쓰이는 맛술을 맛보다 취해서 선생님에게 급양부의 고충에 대해 불평하며 주정을 부린다."
2503992938 = "트레이너 등장!"
2844960890 = "스미레가 선생님에게 자신의 트레이닝 계획에 대해 조언을 구한다. 무리한 일정으로 트레이닝을 계획하는 스미레를 위해 선생님은 그녀의 전담 트레이너 역할을 자처한다."
2757435988 = "트레이너와 함께"
1543696324 = "근육 트레이닝에 필요한 단백질 보충제를 구매하기 위해 선생님과 함께 시내에 나온 스미레. 스미레는 기회가 될 때마다 사람들의 이목을 신경 쓰지 않고 근육 트레이닝을 시도한다."
2129718510 = "트레이너도 함께"
3033616045 = "스미레는 그동안의 트레이닝 경험을 바탕으로 선생님에게도 근육 트레이닝을 권한다. 갑작스러운 근육 트레이닝으로 인해 고통스러워하는 선생님을 위로하면서도 스미레의 표정은 매우 즐거워 보였다."
789432916 = "트레이너와 데이트"
2467696253 = "스미레는 주말을 맞아 선생님과 데이트를 하기 위해 시내로 나온다. 스미레는 오늘만큼은 운동을 잊고 맛있는 음식을 자유롭게 즐기겠다고 선언하지만, 습관적으로 디저트의 성분표를 확인하고 만다."
4027920287 = "트레이너의 한계"
969196443 = "스미레와 함께 공원에서 조깅을 하기로 한 선생님. 평소와 달리 조금 지쳐 보이는 스미레의 모습에 선생님이 걱정을 하자, 스미레는 방금까지 차고 있었던 무거운 모래주머니를 들어 보여 준다."
1231386408 = "소비는 계획적으로"
1523855793 = "보고서를 전달하기 위해 샬레의 집무실을 찾았다가 선생님의 무절제한 생활 습관을 목도하게 된 유우카. 유우카는 선생님의 영수증을 대신 정리해주며 잔소리를 늘어놓는다."
1926315910 = "계산할 수 없는 가치"
3885120659 = "유우카는 밀레니엄 학원에 빚을 진 사업가로부터 담보로 비싼 그림을 받게 된다. 그녀는 낙서 같아 보이는 추상화의 가치를 읽기 위해 오랫동안 고민하지만, 선생님의 지적으로 그 추상화가 가짜임이 곧 들통난다."
3246715250 = "인간 계산기"
36783089 = "선생님은 불량 학생들로부터 빼앗은 비품의 단위계가 샬레의 비품과 달라 고민하고 있다. 이 모습을 본 유우카가 빠른 계산 능력을 발휘하여 선생님을 도와준다."
540132105 = "늦잠"
1727423292 = "유우카는 밤늦게까지 학생회 일을 하다가 샬레의 당번 일에 지각을 하고 만다. 유우카는 전에 했던 약속을 언급하며 벌을 받겠다고 하지만, 선생님은 지친 유우카를 위해 낮잠을 자도록 배려해준다."
1211884829 = "포커페이스"
3001919061 = "가벼운 포커 게임을 즐기게 된 유우카와 선생님. 유우카는 열심히 확률을 계산하여 게임에 임하지만, 이상하게도 연패를 면치 못한다. 게임이 끝난 후, 유우카는 테이블을 정리하다가 선생님이 패를 조작했음을 알게 되고, 크게 화를 낸다."
1436490456 = "암산의 여왕"
2237624638 = "유우카는 두뇌 계발을 위해 선생님에게 암산 연습을 제안한다. 선생님은 자신 있게 답을 내놓지만. 사실은 되는 대로 아무 숫자나 말한 것 뿐이었다……."
1186793633 = "아야네의 취미 생활"
3936794888 = "휴일에 아비도스 고교로 선생님을 부른 아야네는 선생님에게 오래된 책의 감정을 부탁한다."
1069713218 = "달려라 아야네"
3843866508 = "우연히 아비도스 학교 안에서 고철을 발견한 아야네는 평소 거래하던 고물상 아저씨에게 고철을 적당한 값에 팔아버린다. 하지만, 판매한 가격보다 더 비싼 값을 받을 수 있다는 것을 뒤늦게 알게 되어, 혼신의 힘을 다해 고철을 싣고 떠난 트럭을 뒤쫓는다."
247517590 = "학교 수리 잔혹극"
1735248341 = "고장 난 학교의 시설을 고치기 위해 아야네와 선생님은 아비도스 고교의 곳곳을 점검한다. 오랜 고생 끝에 선생님과 아야네는 수도 시설을 수리하는 데 성공한다."
3375124759 = "오늘도 열심히 꾸벅꾸벅 수행"
3209149419 = "츠바키의 수행을 돕기 위해 도심에서 약속을 잡은 선생님. 약속 장소에 도착해보니 츠바키는 잠이 든 상태로 온갖 기행을 보여 사람들을 놀라게 한다."
462720006 = "츠바키의 수행법 : 도구편"
3217352150 = "애용하던 베개를 실수로 망가트린 츠바키. 이를 대체할 새 베개를 구입하기 위해 츠바키와 선생님은 마트로 향한다. 하지만 츠바키는 끝내 마음에 드는 베개를 찾지 못하고 대신 선생님의 무릎베개를 택한다."
2496334832 = "츠바키의 수행법 : 실행편"
2280120755 = "선생님에게 수행법이라는 이름의 수면법을 가르치는 츠바키. 츠바키는 선생님이 눈을 감은 틈을 타 선생님의 얼굴을 관찰하다 이를 들키자, 부끄러워하며 토라진다."
1683959468 = "당신과 함께 수행하기 좋은 곳"
2637987650 = "츠바키와 선생님이 수행을 핑계로 수풀 속에서 낮잠을 청한다."
3727448249 = "소악마는 노는 걸 좋아해"
2632081395 = "샬레에 찾아온 무츠키는 업무 중인 선생님을 방해하며 계속 놀자고 보챈다. 설득에 넘어간 선생님은 무츠키와 여러 가지 장난감을 가지고 놀며 즐거운 시간을 보낸다."
630673951 = "소악마의 형언할 수 없는 비밀"
3694200112 = "무츠키의 초대를 받아 흥신소 사무실을 찾은 선생님. 선생님은 무츠키의 가방을 수상하게 여겨 조사하려 하지만 끝내 가방 속에 무엇이 있는지는 알아내지 못한다."
3654338495 = "소악마의 취미생활"
923060075 = "선생님은 거리를 순찰하던 중 무츠키를 발견하고 그녀를 따라 블랙마켓에 들어서게 된다. 선생님을 뒤늦게 알아차린 무츠키는 자신의 취미를 소개해주겠다며 다양한 종류의 폭탄을 소개한다."
2198801559 = "누군가의 특별한 의뢰"
236148924 = "선생님은 흥신소의 특별한 의뢰인을 돕기 위해 무츠키를 따라다니며 데이트 같은 행동을 반복한다. 하지만 그 특별한 의뢰인의 정체는 무츠키였고, 정체를 들킨 무츠키는 선생님과 놀 수 있어서 즐거웠다며 기뻐한다."
1512221497 = "해커의 이미지"
276239373 = "신작 영화를 보러 갔던 하레는 영화 속의 해커가 악의적으로 묘사되어 있다며 불쾌해한다. 하지만 하레는 영화사 홈페이지를 해킹하며 영화 속의 해커와 별반 다르지 않은 모습을 선생님에게 보여준다."
775079157 = "에너지 드링크 중독"
2483969389 = "선생님의 지적으로 평소 마시던 에너지 드링크를 끊기로 결심한 하레. 하지만 이틀도 지나지 않아 하레는 그로기 상태에 빠지고, 다시 에너지 드링크를 마시기 시작한다."
363645391 = "넷카페에 어서 오세요"
1554368360 = "신상 그래픽 카드를 구입하러 나갔다가 소나기를 마주친 선생님과 하레. 두 사람은 비를 피하기 위해 넷카페에 들어가고, 하레는 넷카페의 여러 가지 시설을 신기한 눈으로 살펴본다."
3961304199 = "기계의 배신"
1946980109 = "하레는 새로 개조한 드론의 성능을 선생님 앞에서 시연한다. 하지만 운동 보조 기능을 시험하던 중 드론이 갑자기 폭주하여 하레에게 과격한 운동을 강요하고, 하레는 울며 겨자 먹기로 드론의 지시에 따른다."
340540264 = "기계의 배신 2"
3000054060 = "어느 날, 선생님은 모모톡으로 하레의 셀카 사진을 받게 된다. 하레를 찾아간 선생님은 그 사진이 하레가 직접 찍은 것이 아닌, 하레의 인공지능 드론이 멋대로 보낸 것임을 알아차리게 된다."
4201884713 = "페이스 메이커"
2638532609 = "아카리는 상점가의 대식 대회를 준비하기 위해 선생님에게 페이스 메이커가 되어달라고 부탁한다. 하지만 선생님은 아카리의 먹는 속도를 따라가지 못하고 금세 포기하고 만다."
2932734876 = "마늘은 포기할 수 없어"
3327817711 = "라멘을 먹고 난 뒤 몸에서 나는 마늘 냄새가 문득 신경 쓰이기 시작한 아카리. 아카리는 선생님이 자신의 몸에서 나는 마늘 냄새를 맡지 못하도록 선생님에게 다양한 마늘 음식을 억지로 먹인다."
940784146 = "대식가 출입 금지"
2345252510 = "대식가로서의 명성이 높아지며 무한 리필 가게에서 출입 금지를 당한 아카리. 이를 본 선생님은 아카리에게 회전 초밥을 사주지만, 아카리는 예상보다 더 많은 양을 먹어 치워 선생님의 지갑을 거덜내고 만다."
929421191 = "미식가의 긍지"
1967999950 = "아카리는 중식당의 마파두부 챌린지에 도전했다가 점원이 도전을 방해하기 위해 향신료를 필요 이상으로 뿌렸다는 사실을 알게 된다. 아카리는 정정당당하지 못한 가게를 단죄하기 위해 평소보다 더 많은 양의 마파두부를 먹어 치운다."
3792410708 = "음식을 더욱 맛있게 먹는 법"
147735400 = "운동선수의 수기를 읽은 이즈미는 음식을 더 맛있게 먹기 위해 고된 운동을 시도한다. 하지만 생각만큼 음식의 맛이 좋아지지 않자 실망한다."
2981660607 = "맛있는 푸딩 이야기"
276818574 = "길거리 음식 페스티벌에 출품된 특제 푸딩을 먹기 위해 대기열에 줄을 선 이즈미와 선생님. 두 사람은 뒤늦게 찾아온 다른 미식가들의 달콤한 제안을 거절하고 푸딩을 사는데 성공하지만, 그 푸딩의 정체는 장어가 들어간 괴식이었다."
2884713095 = "나도 모르게 한 입!"
995676787 = "새로운 라멘집을 찾아가던 중 배고픈 길고양이들과 마주친 선생님과 이즈미. 선생님은 고양이들에게 고양이 간식을 내밀지만, 냄새에 이끌린 이즈미가 간식을 뺏어 먹는다."
2892669052 = "핫도그 데이"
3208438623 = "꼭 보여주고 싶은 것이 있다는 말에 이즈미를 찾아간 선생님. 그런데 이즈미가 자신만만하게 꺼낸 물건은 다름 아닌 '핫도그 모형'이었다."
2135935597 = "어른의 비밀"
4254451472 = "코타마는 선생님의 비밀을 알아내기 위해 샬레에 여러 방법으로 도청기를 설치하려 들지만 계속 실패하고 만다. 비밀을 알아내려 하는 이유를 묻자, 코타마는 선생님과 더 친해지고 싶어서였다며 본심을 말하고, 선생님은 그런 코타마에게 자신의 약점을 솔직하게 알려준다."
533037626 = "메리 씨의 전파"
194076815 = "어느 날 밤, 선생님은 샬레 하우스에서 정체불명의 섬뜩한 목소리를 듣게 된다. 코타마의 분석 결과 그 목소리는 혼선된 라디오에서 나는 소리라는 것이 밝혀지고, 코타마는 진짜 귀신이 아니었다며 아쉬워한다."
3144808590 = "말할 수 없는 비밀"
1236053719 = "코타마는 평소처럼 전화를 도청하던 중, 수상한 업자와 선생님이 나누는 이야기를 듣게 된다. 코타마는 선생님이 강력 범죄에 연루되었다고 생각하여 걱정을 하지만, 선생님이 주문한 것은 단순한 우메보시였다."
666630201 = "한없이 투명에 가까운 백색"
1213415440 = "전자상점가의 음반매장에서 우연히 코타마를 발견한 선생님. 무엇을 듣고 있었는지 묻는 선생님에게 코타마는 환경음을 듣고 있었다 말하며 그 이유를 사뭇 진지하게 설명한다."
4062519371 = "장인 정신"
2032324318 = "선생님을 위해 3D 프린터로 새로운 연필꽂이를 만들게 된 우타하. 하지만 3D 프린터는 좀처럼 우타하의 마음에 드는 작품을 만들지 못하고, 집요한 우타하의 장인 정신에 선생님은 지쳐버린다."
1586945368 = "장인은 도구를 가리지 않는다"
1796399232 = "샬레의 시설 수리를 위해 새로운 비상용 공구를 사러 쇼핑몰에 나온 우타하와 선생님. 우타하는 도구의 가치에 대해 열변을 토하며, 가장 비싼 공구 세트를 구입할 것을 강권한다."
945629632 = "완벽한 애니멀로이드"
3644826021 = "우타하는 샬레에 길을 잃고 들어온 강아지를 최첨단 인공 애니멀로이드로 착각하고 자신의 기술에 회의감을 느끼게 된다."
2115816456 = "보이고 싶지 않은 모습"
792271785 = "고장 난 \"천둥이\"를 수리하기 위해 샬레의 빈 창고를 빌린 우타하. 우타하는 수리 때문에 더러워진 자신의 모습을 보이는 것이 부끄러워 선생님을 피하지만, 막상 수리를 시작하자 진지하게 작업에 임한다."
1405659911 = "마이스터의 훈장"
2353410857 = "상점가에서 새로 개업한 네일샵을 보게 된 우타하와 선생님. 선생님은 우타하에게 네일 아트를 받아보라고 권하지만, 우타하는 기름으로 더러워진 손가락이야말로 마이스터의 훈장이라며 거절한다."
3924052595 = "모든 것이 교체되더라도"
3200520496 = "공구를 사기 위해 선생님과 우타하는 쇼핑몰에서 만난다. 우타하는 자신이 자주 가는 공구 전문점으로 선생님을 안내한다. 전문점에서 우타하는 공구들을 교체하며 선생님과 공구와 마이스터에 대한 대화를 이어 나간다."
4046207094 = "구름의 냄새"
4105126090 = "상점가에서 구름을 쫓는 치세를 발견한 선생님. 두 사람은 한동안 여러 가지 구름을 관찰하지만 끝내 마음에 드는 구름을 찾지 못하고 대신 구름 같은 모습의 솜사탕을 사 먹는다."
1745027801 = "음양부의 아이돌"
1633057737 = "치세와 선생님은 하이쿠 시집을 사러 서점으로 가던 길에 치세의 팬들과 마주친다. 자신을 향해 쏟아지는 무수한 애정 표현에도 불구하고 치세는 엉뚱한 반응만 보인다."
1120186993 = "달밤, 특별한, 하이쿠짓기"
576363469 = "치세는 홍보관에 출품할 하이쿠를 짓기 위해 시내를 돌며 여러 가지 시상을 떠올린다. 치세는 좀처럼 좋은 시상을 떠올리지 못하지만, 선생님과의 즐거운 하루를 되새기며 하이쿠를 짓는다."
41249476 = "바람이 오는 소리"
2219822065 = "더운 여름날, 치세는 바람이 오는 소리를 들려주겠다며 선생님을 부른다. 마루에 나란히 누워 귀를 기울이니 정말 바람과 함께 맑은 소리가 들려온다."
68609484 = "주사를 아프지 않게 놓는 방법"
1238741882 = "하나에는 주사 놓는 일에 익숙해지기 위해 선생님을 상대로 주사 연습을 한다. 하지만 주사 놓는 요령을 잘못 이해한 탓에 선생님의 팔을 엉망으로 만들고 만다."
3359142014 = "불면증"
704371455 = "불면증에 고생하는 선생님을 위해 낮잠을 잘 수 있는 이부자리를 준비한 하나에. 하나에는 선생님이 숙면을 취할 수 있도록 힘으로 기절시키려 하지만, 선생님의 설득에 포기하고, 대신 허브차를 타온다."
468644606 = "라디오 체조"
2086188010 = "휴일, 하나에가 샬레 하우스로 찾아와 늦잠을 자고 있는 선생님을 깨우고 함께 라디오 체조를 한다."
1129161301 = "트리니티식 외과 수술법"
1115265687 = "구호기사단의 창고를 정리하던 중, 선생님이 무릎을 다치자 하나에는 호들갑을 떨며 과격한 외과 수술을 시도하려 한다. 선생님이 소독만으로도 충분하다고 하자 하나에는 직접 소독약을 들고 와 선생님을 치료해준다."
2874947170 = "나팔꽃 관찰일기"
86110047 = "이른 아침, 선생님은 샬레 하우스의 야외 테라스에서 나팔꽃을 가꾸는 하나에와 만나 즐겁게 이야기를 나눈다."
244804059 = "트리니티의 천사"
3281711713 = "선생님은 공원에서 우연히 아이들을 돕고 있던 세리나를 보게 된다. 세리나는 선행을 들킨 것을 부끄러워하며 오히려 열심히 일하는 선생님을 걱정해준다."
1246494305 = "야근에 내려온 천사"
1349449479 = "샬레에서 늦은 밤까지 일하는 선생님을 위해 세리나가 찾아와 선생님을 간호해준다."
3235653381 = "언제나 어디서나 세리나"
1669978221 = "건물 정전으로 다친 선생님 앞에 세리나가 나타나 선생님을 치료해준다. 선생님은 다친 사람이 생기면 언제 어디든 나타나는 세리나를 신기하게 여기지만, 세리나는 부끄러워하며 말을 얼버무린다."
1885780666 = "드디어 잡았다!"
2900260446 = "선생님이 곤란할 때마다 어디선가 나타나는 세리나. 그런 세리나를 위해 이번에는 선생님이 깜짝 피크닉을 준비한다. 세리나는 예상치 못한 상황에 당황하지만, 곧 기쁘게 호의를 받아들인다."
2227241074 = "제 설명을 들어요!"
2381492343 = "무엇이든 설명하기 좋아하는 코토리 때문에 밀레니엄 학생들은 괴로워한다. 자신이 너무 수다쟁이가 아닐까 걱정하는 코토리에게 선생님은 그 점이 귀엽다며 코토리를 칭찬해주지만, 정작 코토리가 이야기를 시작하자 학생들과 같이 도망친다."
1879189076 = "그거라면 제대로 찾아오셨습니다!"
3040174105 = "최근 코토리는 이야기를 시작하기만 하면 학생들이 도망치는 바람에 기분이 좋지 않다. 그런 코토리를 위해 선생님은 일부러 코토리에게 이야기를 청해 듣고, 코토리는 다시 기운을 차린다."
587880302 = "정답은 바로 선생님이에요!"
4162760118 = "다른 학생으로부터 \"소녀의 마음\"에 대한 질문을 받고 \"소녀의 마음\"이 무엇인지 고민하던 코토리는 선생님을 향한 자신의 마음이 그것과 비슷하다는 것을 깨닫고 부끄러워하며 도망친다."
3299613520 = "준비만전"
3113492896 = "뜻하지 않게 선생님으로부터 질문이라는 것을 받게 된 코토리. 그러나 어떤 질문일지 기대하며 찾아간 코토리는, 그 질문이 자신에 대한 것임을 깨닫고 당황한다."
3925290057 = "특이한 안경"
1405678383 = "보통의 안경과는 사뭇 다른 코토리만의 안경.\n선생님은 코토리의 안경이 부러졌다는 말에 밀레니엄으로 향하고, 그곳에서 안경에 대한 진실을 듣는다."
2128994052 = "양보할 수 없어!"
398808592 = "한정 이벤트 상품을 구입하기 위해 선생님과 함께 카페에 온 요시미. 이벤트 상품의 가격이 예상보다 비싸자 요시미는 구입을 주저하고, 선생님은 그런 요시미를 위해 대신 이벤트 상품을 사준다."
2140540293 = "마카롱 데스 챌린지"
2645271508 = "마카롱 많이 먹기 대회에 참가한 요시미와 선생님. 달고 느끼한 마카롱의 맛에 두 사람은 마카롱을 많이 먹지 못하고 고전하지만, 실수로 선생님을 깔고 앉은 요시미가 부끄러움을 감추기 위해 마카롱을 순식간에 먹어 치우며 둘은 대회에서 우승하게 된다."
188196592 = "스터디 인 카페"
3493185503 = "시험공부를 위해 디저트 카페를 찾은 선생님과 요시미는 다양한 디저트를 맛보며 공부를 한다."
2147149955 = "You are my sunshine"
3715343759 = "요시미가 가지고 싶어 하던 디저트를 사서 몰래 신발장에 넣으려던 선생님. 하지만 도중에 요시미에게 발각되고 변태로 몰린다. 나중에는 같이 나눠먹기 위해 카페로 향한다."
844314736 = "디저트 약탈자"
2266129221 = "카페 앞에 도착한 선생님은 요시미가 포장해 준 디저트를 곧장 먹으려 한다. 요시미는 선생님에게 디저트 포장을 지금 뜯으면 포장해 준 디저트를 도로 뺏어 먹겠다며, 자신이 숨겨둔 품속의 <디저트 약탈자>를 꺼내어 위협한다."
2044734478 = "책이 좋은 소녀"
906920889 = "도서관 사서 일을 하고 있는 시미코와의 만남. 그러나 다소곳한 문학소녀라고만 생각했던 시미코에게도, 의외로 남다른 면이 있었다."
341307521 = "비밀이 생겼어요"
3243951534 = "폐관시간이 넘은 야심한 밤의 도서관. 하지만 사서에게는 이제부터가 독서의 시간이다. 시미코와 둘이서 느긋한 밤의 독서 시간을 가진다."
1860734903 = "미지의 보물찾기"
2870193424 = "정리되지 않고 방치된 정체불명의 책들. 시미코는 혹여 지금까지 본 적 없던 새로운 책을 찾을 수 있지 않을까 기대한다. 하지만 짧은 여정의 끝에, 시미코가 찾아낸 것은 전혀 다른 것이었다."
4293465345 = "좀 더 자주자주"
499400354 = "필요한 책을 찾기 위해 도서관으로 간 선생님은 그곳에서 사서인 시미코의 도움을 받는다. 시미코와 함께 책을 찾으며, 도서관과 책에 관해 이런저런 이야기를 나눈다."
1596075158 = "점심 대신 디저트"
4257306641 = "아이리가 바쁜 선생님을 위해 카페의 신상 컵케이크를 구입해 와 선물한다."
2315835548 = "당분이 필요해요"
3621133641 = "아이리가 바쁜 선생님을 위해 다디단 초콜릿 디저트를 잔뜩 주문한다."
1960740624 = "아이리의 고민"
2777060658 = "자신의 소심한 성격을 고민하는 아이리에게 선생님이 고민 상담을 해준다."
408399339 = "잠깐의 데이트"
2272549639 = "격무 중에 정신을 환기하기 위해 산책을 나온 선생님은 산책로에서 우연히 아이리를 만나게 된다. 디저트를 준비하지 못해 시무룩해 하는 아이리에게 선생님은 아이스크림을 사주고, 두 사람은 강변에서 아이스크림을 나눠 먹으며 즐거운 시간을 보낸다."
1782328244 = "누군가는 해야만 하는 일"
3366205849 = "혼자서 무거운 서류뭉치를 옮기는 중인 치나츠. 자신의 담당 일이 아님에도 '누군가는 해야 한다'는 이유로 묵묵히 수행하고 있는 치나츠를 도우며 대화를 나눈다."
2999062443 = "아무 일 없는 하루"
2192314265 = "모처럼의 휴일을 얻은 치나츠와의 하루. 특이할 것 하나 없는 하루이지만, 그렇기에 치나츠에겐 오히려 특별하다."
43408834 = "피로회복 고민상담"
2645077696 = "연이은 과로로 쓰러진 선생님. 그런 선생님의 모습에 보건 담당인 치나츠는 가만히 있을 수 없다. 한바탕 잔소리를 늘어놓은 후, 치나츠는 선생님께 조심스러운 제안을 꺼내 든다."
476448061 = "예상치 못한 상황"
184627506 = "선생님은 치나츠의 서류 정리를 도와주기 위해, 치나츠가 있는 선도부실을 방문한다."
3121964723 = "누군가는 해야 할 일"
4246066356 = "모처럼의 휴일을 맞이한 치나츠. 선생님은 치나츠의 가방에 관해 물어보고, 치나츠는 응급의학부 시절부터 가지고 있던 자기 생각을 이야기한다."
1548146425 = "잘못된 연락"
877809924 = "실수로 선생님께 잘못된 연락을 보내버린 하루카. 하지만 결과적으로 큰 사고를 막게 된다."
1671304279 = "잘못된 소통"
3020050882 = "지난 일에 대해 선생님께 감사를 표하고자 하는 하루카. 손수 만든 하루카의 화분 선물에 선생님도 기뻐하지만, 사실 받은 것은 화분만이 아니었다."
633551809 = "잘못된 방식"
3896770278 = "이번에야말로 선생님께 제대로 된 선물을 하고자 하는 하루카. 하지만 늘 그렇듯 결과가 좋지 않았다."
3551997534 = "잘못된 짐작"
3632616866 = "하루카에게서 걱정스러운 모모톡 메시지가 발송되고 선생님이 다급히 찾아간다. 하지만 그것은 오해였고, 오히려 하루카가 길 잃은 선생님을 구해주게 된다."
3415164555 = "잘못된 장소"
3460878926 = "우연한 사고로 하루카의 비밀장소를 찾아가게 된 선생님. 그렇게 누구도 알지 못하는 하루카만의 취미와 비밀 아지트를 공유하게 된다."
3547031295 = "가장 중요한 향신료"
151158527 = "요리에 얼마만큼의 사랑이 적정량인가 찾기 위해 선생님을 초대하여 요리를 대접한 주리. 요리를 먹을 때마다 선생님은 다양한 일을 경험한다. 그래도 주리를 위해 선생님은 포기하지 않고 음식을 전부 먹는다."
2010079435 = "소녀의 요리법"
1410164640 = "매번 요리에 실패하는 바람에 문제점이 뭔지 선생님에게 상담을 요청한 주리. 함께 요리를 만드는 과정에서 주리가 요리하는 방식의 문제점이 무엇인지 드러난다."
2441506309 = "소녀는 극복하고 싶어."
1176188569 = "주리는 어째서 요리를 할 때마다 실패하게 되는지, 선생님과 원인을 찾아보기로 한다. 함께 여러 가지 시도를 하며 문제를 찾아보지만, 어떤 수를 써도 요리를 실패하는 탓에 실망하는 주리를 선생님이 북돋아 준다."
3780570582 = "미숙하더라도 할 수 있는 것."
2113145817 = "주리의 초대로 게헨나 학생식당에 도착한 선생님. 주리는 양손 가득 준비한 농기구를 들고 급양부에서 가꾸는 텃밭으로 선생님을 안내한다. 아직 요리 솜씨는 미숙하지만, 식자재만큼은 열심히 일구어 사람들에게 기쁨을 전하고 싶다는 주리. 그 갸륵한 마음에 감동한 선생님은 주리와 함께 텃밭을 가꾼다."
294424124 = "마이 페이스의 그녀"
3761374176 = "임무 중이라면서 대뜸 카페에서 놀자고 제안하는 아스나. 아스나는 계속해서 자기 마음대로 굴지만 결국 좋은 결과로 이어진다."
2056547858 = "우연한 미행 데이트"
714563164 = "또다시 아스나의 이유 없는 호출. 그저 평범하게 돌아다니며 놀았을 뿐인데, 모르는 새 또 뭔가 한 건 해결한 것 같다."
658609856 = "메이드의 깜짝 선물"
2779044677 = "감사의 답례로 봉사를 해주겠다며 찾아온 아스나. 언제나와 같은 아스나의 모습이었지만, 마지막에는 평소와 조금 다른 면을 발견한다."
1365513912 = "고장난 아스나"
2538101858 = "아스나의 상태가 이상함을 느낀 선생님은 공원에서 멍한 상태로 있던 아스나를 기숙사로 데려간다. 기숙사에 도착한 후, 계단을 오르던 아스나가 선생님 위로 넘어진다."
998617790 = "임협학생"
1113084635 = "임협을 동경하는 소녀 피나와의 만남. 어딘가 잘못 배워온 듯 한 모습이기도 하지만, 그 안에서 보이는 피나의 길은 나름대로 뚜렷해 보인다."
1867792173 = "중요한 건 내면"
2170262034 = "임협 영화의 주인공들을 따라 하고 싶어 하는 피나. 허나 복장의 사이즈가 맞지 않아 좌절하고, 선생님이 그것을 위로해준다."
3908561949 = "끝나지 않는 밤"
1780086198 = "피나가 초대한 영화 릴레이 상영회에 참석한다. 하지만 너무 긴 상영 시간 탓에, 선생님은 기절해버리고 만다."
2367962991 = "이때 이것"
462143440 = "피나의 부름으로 백귀야행의 한 음식점으로 불려 나온 선생님. 피나가 준비한 것은 '잔 나누기' 의식이었다. 피나는 지나치게 긴장해 버리지만, 선생님의 응원으로 무사히 잔 나누기 의식을 마친다."
3128096708 = "트리니티의 자경단"
192851048 = "위기의 순간에 나타나 선생님을 구해주는 스즈미. 이후 스즈미의 에스코트를 받으며 돌아가는 동안 짧은 대화를 나눈다."
1108192908 = "눈이 멀 정도로 빛나게"
2489237266 = "스즈미의 호위를 받으며 목적지로 향한다. 긴장한 스즈미는 섬광탄을 남발하지만, 뒤늦게 호위는 구실이었을 뿐이었단 사실을 알게 된다."
813863657 = "섬광만능주의"
4144458217 = "스스로 자경단을 자처하며 트리니티의 치안을 지키는 스즈미. 스즈미의 손에 들린 섬광탄은 그녀의 상냥함을 보여주는 물건이었다."
743591040 = "소녀는 반짝임을 쫓는다"
1173255493 = "모처럼 선생님을 한적한 유원지로 초대한 스즈미. 함께 관람차를 타고 밤하늘의 별빛을 구경한다."
1939284311 = "특별한 동료들"
2776112655 = "트리니티에 볼일이 있어 방문한 선생님은 스즈미와 만나기로 한다. 곧 등장한 스즈미는 황급히 헤드셋을 벗고 자신의 행동을 부끄러워한다. 하지만 누군가가 시켜서 하는 일이 아니라는 선생님의 위로의 말에, 스즈미는 힘을 얻는다."
1950563989 = "그래서 이즈나는 미행한다."
381151088 = "호위를 위해서라며 남몰래 [USERNAME] 선생님을 미행한 이즈나. 그런 행동이 민폐가 될 수도 있단 선생님의 말에 이즈나는 크게 실망한다. 하는 수 없이 그런 이즈나를 달래주기 위해 식사를 권유하자, 이즈나는 바로 부활한다."
1340418237 = "그래서 이즈나는 호위한다."
576267045 = "이제는 대놓고 호위라는 명목하에 이즈나는 [USERNAME] 선생님 곁에 찰싹 붙어 따라다닌다. 밝게 웃으며 따르는 이즈나에게 선생님은 차마 그만두란 말은 하지 못하고, 그렇게 하루종일 이즈나와 함께한다."
2996582308 = "그래서 이즈나는 좋아한다."
2758300906 = "이즈나가 좋아하는 닌자 시대극을 함께 감상하기 위해 [USERNAME] 선생님은 이즈나의 집을 찾는다. 함께 시대극을 감상하고 난 뒤, 이즈나가 어째서 시대극을 좋아하는지 알 것 같다는 말에 이즈나는 무척이나 좋아한다."
2279236806 = "주군과 함께 있는 지금을."
3688245564 = "닌자에 대해 공부하고자 이즈나는 [USERNAME] 선생님과 각종 닌자 이벤트에 참가하며 즐거운 시간을 보낸다."
224455677 = "백야당의 간판 아가씨는 아이돌!"
2241375795 = "[USERNAME] 선생님을 향해 아이돌로서 꾸민 모습을 어필하는 시즈코. 그러나 시큰둥하기만 한 선생님의 반응에 시즈코는 당황하지만, 어떤 모습이든 시즈코는 시즈코란 선생님의 말에 이내 시즈코는 미소 짓는다."
3992937519 = "마츠리운영관리부의 멋진 부장님!"
3292398195 = "마츠리운영관리부의 업무를 돕기 위해 시즈코와 함께 하는 [USERNAME] 선생님. 시즈코는 선생님 앞에서 척척 마츠리운영관리부의 부장으로서의 멋진 모습을 어필한다."
100303804 = "백야당의 간판 아가씨는 프로페셔널!"
3211000596 = "어딘지 모르게 상태가 심상치 않던 시즈코는 결국 쓰러지고야 만다. 몸상태가 나쁜데도 무리를 했던 시즈코에게, 때로는 쉬는 것도 필요하다고 말하는 [USERNAME] 선생님. 시즈코는 선생님에게 그럼 자기가 잠들 때까지 곁에 있어 달라고 말한다."
1244220490 = "오늘은 재충전"
2409929919 = "선생님의 충고를 받아 오늘은 땡땡이를 치기로 결심한 시즈코는 [USERNAME] 선생님에게 자기 옆자리에 앉아달라 권하며 어리광을 부린다."
245234141 = "백야당의 간판 아가씨는 앤틱!"
1427503773 = "오늘도 흥행중인 백야당을 찾은 선생님. 하지만 인파가 너무 많아 선생님의 차를 내릴 다구 세트가 부족해지고…… 시즈코는 궁여지책으로 자신이 옛날부터 연습용으로 사용하던 다구를 사용해 선생님을 대접한다."
418756131 = "아리스 퀘스트 ~모험의 시작~"
899003184 = "모험을 떠나기로 결심한 아리스가 걱정되어 찾아온 선생님. 그런 선생님을 파티의 마스코트 멤버로 맞아들인 아리스는 선생님과 함께 즐거운 모험을 떠난다."
3415755859 = "아리스 퀘스트 ~그리고 전설로~"
263417795 = "레벨업을 하여 새로이 해금된 기능을 보여주겠다며, 아리스는 선생님과 다시금 모험을 떠난다. 아이템 루팅을 위해 쓰레기통을 부수고, 랜덤 인카운트로 불량배를 만나는 등 아리스와 선생님은 전설로 남을 모험을 함께한다."
2893546688 = "아리스의 선택"
4280172451 = "그동안 접해보지 못했던 연애 시뮬레이션을 플레이하게 된 아리스. 턱수염 폐하와 대머리 황제 사이에서 누구를 선택해야 할지 고민하던 아리스는 선생님의 조언에 따라 새로운 공략법을 찾아낸다."
3367878513 = "고양이와 아리스"
4178604501 = "고양이와 친해지고 싶은 아리스는 선생님에게 방법을 묻는다. 간식을 이용해 고양이에게 접근한 선생님 덕분에 고양이와 친해지는데 성공한 아리스. 자신을 배려해준 선생님에게 고마워하며 오늘도 아리스는 경험치를 쌓는다."
733373471 = "아리스의 마법"
604855597 = "선생님과 놀고 싶었던 아리스는 선생님을 부실로 초대한다. 함께 RPG를 즐기며 마법에 대해 이야기하는 아리스. 현실에도 게임과 마찬가지로 마법이 있다며 선생님을 향해 미소 짓는다."
371401505 = "아리스와 칭찬 스티커"
530559047 = "게임개발부로 선생님을 부른 아리스는, <선생님의 칭찬 스티커> 실물 굿즈를 보여주며 모두에게 나눠 주자고 이야기한다. 모든 스티커를 나눠준 뒤, 아리스는 특별히 선생님을 위해 따로 만든, 또 다른 스티커를 건네주는데……"
2446100639 = "게이머의 일상"
2479389322 = "다양한 게임을 공부하자며 선생님을 부실로 부른 모모이, 그렇게 같이 게임을 시작하지만 너무 어려운 나머지 모모이는 게임을 포기한다. 어쩔 수 없이 선생님은 모모이를 대신해 게임을 마지막까지 플레이한다."
3320636286 = "좋은 시나리오의 조건"
1447101991 = "레트로 게임의 시나리오를 무시하는 악평을 보고 화가 난 모모이. 좋은 게임 시나리오가 뭔지 고민하는 모모이에게, 선생님이 자기가 쓰고 싶은 시나리오가 좋은 시나리오라고 말해주자 모모이는 기운을 회복한다."
1209267731 = "모모이 메모리얼!"
4291238681 = "이번엔 연애 시뮬레이션에 대해 공부하고자 모모이는 선생님을 호출한다. 그렇게 모모이와 선생님은 연애 시뮬레이션에 나올 법한 이벤트를 함께 즐긴다."
2568135161 = "복숭아빛 스탬프 랠리"
232297355 = "이벤트 상품으로 나온 굿즈가 갖고 싶다고 생각한 모모이지만, 이벤트 종료까지 시간이 얼마 남지 않은 상황. 그러나 포기하지 않고 함께 도전하자는 선생님의 말에 모모이와 선생님은 함께 스탬프 랠리에 참가하여 굿즈를 얻어낸다."
3227922024 = "게이머의 추억"
1635979583 = "선생님은 모모이와 함께 게임을 하다가, 추억의 물건을 발견한다. 그것은 바로 미도리와 함께 한 쌍으로 마련했던, 자매의 게임기였다."
3723632128 = "마감이에요. 선생님."
1319850860 = "마감일이 가까워질 때까지 게임 아이디어를 떠올리지 못한 미도리는 선생님에게 도움을 요청한다. 둘이서 함께 아이디어를 얻고자 그동안 해본 적 없는 장르의 게임에 도전하자, 미도리의 의욕에 불이 붙는다."
2181248445 = "현장실습이에요. 선생님."
885277030 = "미도리는 이번에 열린 아트워크 전시회에서 선생님에게 어른스러운 모습을 어필하려고 생각했지만, 정작 전시회의 작품들을 본 순간 눈을 반짝이며 어린아이처럼 흥분한다. 뒤늦게 후회하지만, 즐거웠다는 선생님의 말에 미도리는 즐겁게 웃는다."
1475058544 = "초회한정판이에요. 선생님."
2361668219 = "명작 게임의 초회한정판을 얻기 위해 고군분투한 미도리지만, 다른 사람을 위해 결국 미도리는 물건을 포기한다. 내심 실망하는 미도리를 위해 선생님은 어른의 힘으로 미도리가 원하던 물건을 어렵사리 구해 선물해준다."
2289816470 = "반짝이는 추억이에요. 선생님."
828959040 = "평소 오락실에 가본 적 없는 미도리를 위해, 선생님은 함께 오락실을 찾는다. 그곳에서 처음 본 인형 뽑기 게임을 같이 하며 미도리는 선생님과 함께 비밀스러운 추억을 만든다."
2056555487 = "……떨어지지 않는 추억이네요, 선생님."
4219711868 = "미도리의 게임기가 마침내 수명을 다하고 만다. 그 게임기는 모모이가 사 준 추억의 물건이었고, 미도리는 게임기를 쭉 보관하기로 한다."
1054831572 = "훈장 수여식"
3901050681 = "체리노가 자신에게 수여할 새로운 최고 등급의 훈장을 디자인하기 위해 [USERNAME] 선생님에게 조언을 구한다."
