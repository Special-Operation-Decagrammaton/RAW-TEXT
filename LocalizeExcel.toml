3733720402 = "再次回歸平穩的日常"
4075198640 = "老師在接獲彌香的聯絡後便前往三一。彌香和老師去了很多地方和購物。偏偏卡片超過額度上限，讓彌香覺得很錯愕，但老師幫彌香結了帳。"
1824494665 = "志工活動"
3962654178 = "彌香參加義工活動在操場上拔草，老師也專程前來幫忙彌香了。彌香雖然有些手足無措，卻也因此能和老師一起共度歡樂時光。"
2847450936 = "閣樓裡的公主"
2413528587 = "老師在收到彌香的邀請後就前往宿舍。但恰巧碰上點名時間，進退兩難的老師逼不得已只能躲在彌香的房間，並且共度難忘的時光。"
1481077183 = "傷痕"
120262361 = "收到彌香的聯絡後，老師匆匆忙忙前往三一，他發現彌香手上拿著被其他學生欺負時弄破的泳裝。安慰哭泣的彌香，老師說要親自教彌香游泳。"
2390792070 = "咯哩咯哩君的殘骸"
238376327 = "老師去找惠，發現惠正在專心看著逐漸融化的「咯哩咯哩君」冰淇淋。惠正在使用自己的武器讓咯哩咯哩君融化，老師則建議她試著等一下。"
997833605 = "無法「等待」的女孩"
3179826887 = "等待時間。但是惠反而因為沒事做覺得很焦躁不安。老師利用惠的劍玉吸引了她的注意力。"
70172580 = "交給溫泉開發部吧！"
4184469458 = "老師收到惠的聯絡後前往了山邊。惠在那個地方幫老師挖溫泉。"
3903491499 = "溫泉與湯麵的關聯"
297876452 = "夜晚。惠邊煮泡麵邊和老師聊天。惠將煮好的泡麵分給老師一起吃，然後就和平常一樣去開發溫泉了。"
1551137325 = "局長的傳聞"
3048088134 = "環奈因為值日生工作而來到夏萊。老師和向來在警察學校嚴格出名的環奈一起處理業務。因為擔心惹環奈不開心，所以老師相當緊張，但事與願違，接二連三不斷地發生各種失誤。"
3236770699 = "埋伏的慣例"
1619463056 = "老師專程去鼓勵正在潛伏搜查中的環奈。得知環奈一直到很晚都沒有用餐，老師便推薦了各種的食物，但老師的建議卻讓環奈覺得很反感。"
1028219097 = "獨自，稍作休息"
1512296132 = "環奈成功逮捕了走私犯。公安局的學生提議一起去慶祝作戰順利成功，但環奈鄭重地拒絕了那項提議。那天晚上，老師為了吃晚餐而去了路邊攤，在那邊遇見了獨自享用著美食的環奈。"
692249735 = "另外一條道路"
4271209454 = "環奈的呼叫打破了平凡午後的寂靜。老師知道環奈為了安撫迷路的孩子費了一番心力，於是便挺身給予幫助。忙碌了一整天後在準備道別的路上，環奈對老師說出了自己隱藏在心中的真心話。"
3258439759 = "容易被誤會的人"
3227620313 = "櫻子利用MomoTalk傳了耐人尋味的訊息，覺得在意的老師便專程去找櫻子。但並不是什麼特別的內容，老師確定櫻子是容易受誤會的個性。"
2902921354 = "「流行」"
4239335081 = "老師看見櫻子站在商店街飾品店前一副很煩惱的樣子。同一時間，飾品店開門，老闆帶走了櫻子。老師跟著驚慌的櫻子，並且給予了協助。"
2853082550 = "祕密的夜晚"
