656130952 = "매년 만마전에서는 각계 유력 인사를 초청하여 파티를 연다고 한다. 파티의 목적은 만마전의 위세를 자랑하기 위한 자리라는 모양이다."
3296347737 = "주로 엘리트만이 가입할 수 있다고 알려진 게헨나 학원의 학생회. 다만 가입 기준과 상관없이 평소에 하는 활동이 괴상하다는 평가가 많다."
241828489 = "선도부를 곤란하게 만드는 소동 중 일부는 누군가의 사주로 이루어지기도 한다. 그때 일을 사주하는 고용주는 모두 동일인이라는 소문이 있다."
4211417711 = "게헨나 자치구 구석에 낡고 오래되어 더는 사용되지 않는 시설이다. 이 때문에 남들의 시선을 피하고 싶어 하는 학생들의 피난처로 사용되기도 한다."
1606103230 = "구교사에 놓여 있던 낡은 피아노. 다만 최근까지 누가 관리를 했던 것인지, 사용에 무리가 없을 만큼 깔끔하게 정비되어 있다."
74387565 = "게헨나에서도 그 규모가 매머드급이라고 불리는 거대 동아리. 온천개발에 대한 열정으로 똘똘 뭉친 나머지 빈번히 사고를 치는 집단이다."
3868968517 = "온천개발부가 꾸미고 있던 어마어마한 대작전. 대체 무슨 작전인가 설명을 유심히 들어보아도 전혀 이해되지 않는 굉장한 작전이다."
848014088 = "온천개발부를 이끄는 카리스마 부장이다. 호탕하며 빈틈없는 리더십을 보여주지만, 선도부장 앞에선 고양이 앞의 쥐 신세가 되고는 한다."
1351474076 = "카스미가 의미심장하게 언급한 이야기로 진위가 의심스럽지만, 원래부터 게헨나에는 이런 믿기 어려운 비밀이 이곳저곳 산재되어 있다."
2177842261 = "말 그대로 정체불명의 괴물. 때로 세상에는 눈앞에 실제로 나타나더라도 도저히 이해하기 어려운 것이 있기 마련이다."
1914035094 = "후우카와 함께 급양부에서 요리 공부에 매진하고 있는 성실한 소녀. 그 갸륵한 모습에 감동한 숨은 팬도 있다든가, 없다든가."
3208368410 = "게헨나에서도 악명이 드높은 동아리. 실력과 전문 분야 대한 지식, 그리고 폭력성까지 두루 갖춘, 문무겸비의 악당들이다."
3042483397 = "게헨나에 나타난 정체불명의 거대 팬케이크. 분명 놀라운 일이지만, 게헨나에서는 의외로 드물지 않게 일어나는 일이기도 하다."
1792078009 = "게헨나 파티를 맞이하여 만마전이 급양부로 파티 음식을 발주했다고 한다. 다만 그 요리사가 급양부의 부장이 아닌 모양인데…"
654318302 = "왜 존재하는지 그 이유를 알 수 없는 물건. 예산 낭비란 말은 바로 이럴 때 쓰이는 게 아닐까, 조심스럽게 생각해 볼 뿐이다."
1931459361 = "문제아라도… 아니, 오히려 문제아이기에 성립하는 의리도 있는 것이 뒷골목의 생리. 다만 그 상대가 만마전의 의장이어서야…"
1421764132 = "응급의학부에서 쓰이는 연고는 바르기만 해도 새살이 솟는다는 소문이 있을 정도로 효과가 발군. 하나쯤 가지고 있으면 좋을 듯하다."
2017029991 = "앞에서 보아도, 뒤에서 보아도, 옆에서 보아도 그저 수상하기만 전단지. 정말로 수상하다…"
4052776956 = "마코토 의장이 자치구에서 크게 난동을 부렸다는 소문이 주변에 돌고 있다. 사실 평소에도 자주 있는 일이라 신기한 일은 아니다."
2835023066 = "최면에 걸려 성격이 완전히 바뀌더라도, 귀찮은 부분은 여전하다는 점에서 역시 사람의 본질은 쉽게 바뀌지 않는 것 같다."
