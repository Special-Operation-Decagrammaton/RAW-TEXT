1908426204 = "英美和老師調查了捕捉到十字神名信號的地方。探索後沒有獲得任何成果，和陽葵預料中的完全不一樣。但經過調查後，老師留意到了充滿違和感的販賣機，並從中發現了十字神名的本體。"
1029543648 = "新的開始"
2387771660 = "得知十字神名的本體是販賣機AI後，陽葵感到相當茫然。在尚未解開的謎題中，疑問不斷地堆疊，特異現象搜查部再次展開任務。"
616793555 = "信號"
311130254 = "老師在接到緊急呼叫後，趕到了特異現象搜查的部室，目睹了在冰海地區裡偵測到與十字神名相似的訊號。"
3869432926 = "冰海（１）"
2608662417 = "老師和換上了適合冰海地區服裝的陽葵、英美、季一起，開始了在冰海的探索。"
713715481 = "冰海（２）"
3021235872 = "在探索冰海的過程中，突然接到了來自不明對象的通訊。接著，新的十字神名訊號開始迅速向一行人靠近。"
2827062239 = "冰海（３）"
2856558094 = "新的十字神名的真實身分是第5名預言者「葛夫拉」。一行人展開了和葛夫拉的戰鬥。"
822341698 = "第5名預言者（１）"
1066916150 = "發出通訊的人的真實身分是十字神名的工程師：Ain、Soph、Aur。一行人得出必須為新的戰鬥做好準備的結論。"
3264652544 = "第5名預言者（２）"
1245122403 = "為了喚醒被他們稱為「姐姐」的存在，Ain、Soph、Aur做好了準備。"
3548705024 = "重返冰海"
2425401843 = "特異現象搜查部再次展開冰海搜索行動，並意外碰上了型態有些不同的十字神名殘黨。"
551131180 = "調查"
2841988677 = "一行人發現一道劃破冰海的巨大痕跡，並且開始追蹤那道痕跡。"
2043648272 = "第二次"
2884472887 = "在追蹤行動的尾聲，一行人再次遇見了葛夫拉。"
1005599474 = "重逢（１）"
2544400411 = "由於葛夫拉的力量異常增強，一行人最終敗下了陣。就在眾人面臨危機的時候，原本被認為失蹤的莉央用電子設備聯絡上他們。"
3923341767 = "重逢（２）"
1904785569 = "在莉央的幫助之下，一行人成功擊敗了葛夫拉。"
1823733174 = "變數"
2945817621 = "一行人繼續搜索和追蹤，並在最終抵達了凍原地形。"
1631119254 = "火花（１）"
1050651750 = "在人跡罕至的凍原地帶之中，一行人發現了一座可疑的設施。"
574598016 = "火花（２）"
4279843049 = "一行人進入設施中調查。"
2090944563 = "探索"
1718287943 = "一行人在設施中追趕著十字神名的兵力，但他們最後卻反過來被趕到了某個地方。"
961035866 = "霍刻瑪"
3546030828 = "一行人抵達了火山地帶。在火山地帶之中，一行人遇見了等候他們多時的Ain、Soph、Aur和第2名預言者「霍刻瑪」，並和它們展開了激烈衝突。"
3346775331 = "戰術性勝利"
3315060759 = "一行人戰勝霍刻瑪後，便重返凍原地帶整理情況。"
2335282203 = "無名之神的遺產"
2709748594 = "從十字神名的殘存設施中，一行人了解到十字神名使用的是「無名之神的力量」。"
885592867 = "死路"
3137797237 = "偵測到新預言者的強烈訊號後，一行人得知在該座標上生成了一個「多次元防護罩」，並且開始煩惱起該如何解決此事。"
1916781739 = "提議"
2946163375 = "為了處理「多次元防護罩」的問題，在深思熟慮之下，一行人決定向愛麗絲和遊戲開發部求助，而莉央也拜託他們來冰海的基地一趟。"
449608825 = "出發"
3964422957 = "愛麗絲和遊戲開發部收到老師的聯繫，前往冰海的臨時基地。"
3730054126 = "會合"
918056516 = "莉央也到達冰海的臨時基地，與遊戲開發部會面。"
1551417428 = "打雪仗"
1503724758 = "一行人開始了復活Kei的流程。"
154885673 = "呼喚聲"
2861808365 = "Kei與馬爾庫特在各自的位置醒來。"
2341910534 = "重逢"
11687384 = "在莉央的主導下，一行人決定為Kei製作身體。然而，這個決定並沒有考慮到Kei的意願……"
1569528324 = "黎明"
4037519386 = "雖然成功啟動了莉央製作的新身體讓Kei運作，但Kei是否對此感到滿意是另一個問題……"
3790659265 = "鋼鐵大陸"
155720155 = "第7名預言者「涅察赫」已經進化成試圖吞噬奇普托斯的「鋼鐵大陸」。"
3596378136 = "前兆"
1920548047 = "一行人為了尋找進入鋼鐵大陸的路，再次前往凍原。"
1037621827 = "最後的職責"
1149078827 = "一行人陷入「無名之神的力量」的危機，但靠著愛麗絲和Kei反過來利用這股力量，成功突破了局面。"
970117290 = "網格點"
