2584215733 = "背信棄義的血鬥"
766257118 = "亞瑠後來才知道招待自己吃拉麵的對象是阿拜多斯高中的學生。亞瑠被罪惡感煎熬好一陣子，但還是馬上狠下心，動員人手前去攻擊阿拜多斯高中。"
