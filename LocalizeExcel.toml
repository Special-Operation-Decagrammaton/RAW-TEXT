3424842111 = "RABBIT 4, 선물합니다."
3778351720 = "발렌타인 데이를 맞아 그동안의 보답을 위해 미유는 선생님에게 정성을 담은 수제 바크 초콜릿을 선물한다."
731107983 = "세미나 서기 노아의 달콤한 장난"
3265679857 = "자신이 구입한 잉크 병을 자랑하기 위해 샬레로 찾아온 노아. 잉크를 먹는 노아를 보고 선생님은 당황하지만, 그것은 잉크 병에 담긴 초콜릿이었다. 노아는 자신의 장난을 사과하며 선생님에게 잉크 모양 초콜릿을 선물한다."
870313175 = "보안위원장의 훈장"
