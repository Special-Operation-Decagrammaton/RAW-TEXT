2430113912 = "Deals damage to the Front enemy. Summons [c]1[/c] [c]{char;848029}[/c] card.\n\n\n[c][75b4c0][i]The Hot Springs Department's primary motto is \"safety first.\"[/i][-][/c]"
62152871 = "[c]At the end of the user's Phase:[/c] Gives [c]{param;BasePower}[/c] Barrier to the ally [c]{char;848029}[/c] card."
2277020639 = "Deals damage to the Rear enemy and summons [c]1[/c] [c]{char;848029}[/c] card afterwards.\n\n\n[c][75b4c0][i]The Hot Springs Department's additional motto is \"explosions solve everything.\"[/i][-][/c]"
2286455285 = "[c]At the end of the user's Phase:[/c] Ignores Barrier and deals [c]{param;BasePower}[/c] damage to all [c]{char;848029}[/c]. Then increases all [c]{char;848029}[/c] cards' EX Skill Power by [c]1[/c]."
4139891424 = "Deals [c]{param;Min}-{param;Max}[/c] damage to a random enemy.\n\n\n[c][75b4c0][i]\"She's known for being impulsive, unpredictable, and never shying away from sacrifice.\"\n- Memo from the Head Prefect[/i][-][/c]"
1540816638 = "[c]At the start of user's Phase:[/c] Deals [c]{param;Min}-{param;Max}[/c] damage to the user and recovers HP by [c]{param;Min}-{param;Max}[/c]. If the user's HP decreases, deals damage equal to lost HP to all other Strikers. If the user's HP increases, recovers HP equivalent to all other Strikers."
2549347011 = "Deals damage to the Front enemy.\n\n\n[c][75b4c0][i]The path to hell is paved with kindness.[/i][-][/c]"
2455668066 = "[c]At the start of user's Phase:[/c] Recovers HP by [c]{param;BasePower}[/c] if the user's HP is at [c]{param;ConditionNum}[/c] or lower."
2252755850 = "Damages all enemies.\n\n\n[c][75b4c0][i]A student who never loses her composure. Sometimes she's even more threatening than Haruna.[/i][-][/c]"
1185238083 = "[c]At the start of user's Phase:[/c] Increases EX Skill Power by [c]1[/c] if the user's HP is not full."
4196376057 = "Damages the Front enemy, then Recovers HP to the user and another ally with the lowest HP by [c]{param;SubPower}[/c].\n\n\n[c][75b4c0][i]Despite it all, she's also pretty weird for being someone in the Gourmet Research Society.[/i][-][/c]"
