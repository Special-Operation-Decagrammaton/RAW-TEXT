1269695701 = "慶典之後"
208502467 = "忍者襲來！"
752075220 = "某天忍術研究部的成員們突然來找夏萊的老師。就在三千留聲稱希望老師可以幫忙，讓忍術研究部成為正式社團，發動美人計等讓老師感到困惑的那個時候。正好陰陽部的佳穗來到夏萊。"
3066356973 = "交流會START！"
2027758856 = "百鬼夜行和格黑娜學園的交流會開幕了。為了以防萬一，因為陰陽部部長仁耶說希望可以幫助那個交流會的話，老師提出認定忍術研究部為正式社團當成條件，決定和三千留、月夜、伊樹菜一起幫助交流會。"
2113642855 = "大塊頭少女（１）"
1841957901 = "為了幫助交流會，開始準備《和樂公主》公演的忍術研究部成員們。在此途中，老師也幫助了被混混們抓住的月夜。"
2793185007 = "大塊頭少女（２）"
4010253238 = "在打敗混混後，稍微敞開心房的月夜，向老師傾訴自己的內心話。就這樣聊著各種話題之際，《和樂公主》的演出已經近在眼前。"
3738792413 = "說到忍者就少不了公主？（１）"
1915451082 = "在這次交流會的重點──《和樂公主》公演開始前，出現在現場的不是原本公演的主角知世，而是萬魔殿的伊吹。正當大家都不得不接受為了交流會而改變的這席話的時候。妖怪劇團突然發動了襲擊。"
341953329 = "說到忍者就少不了公主？（２）"
2863619002 = "公演主角伊吹被妖怪劇團綁架，交流會面臨失敗的危機。為了阻止這件事，老師和忍術研究部，以及伊呂波開始為了找回伊吹而行動。"
1421697779 = "第一道關卡：看板娘和SP（１）"
2447682703 = "為了找回伊吹，追擊妖怪劇團的老師和忍術研究部，以及伊呂波。但是主張自己是公演的第1名守門人的節慶營運管理部擋在了面前。"
91366382 = "第一道關卡：看板娘和SP（２）"
3098904965 = "順利打倒節慶營運管理部，成功通過試煉的老師、忍術研究部、伊呂波又重新開始追擊妖怪劇團。"
1264601568 = "第二道關卡：睡美人（１）"
3751057018 = "老師和忍術研究部、伊呂波依舊在追擊妖怪劇團的途中，這次第2名守門人──睡美人椿擋在眾人面前。"
3802744135 = "第二道關卡：睡美人（２）"
3871679676 = "連椿的試煉也成功平安通過的大家，接著又開始追捕妖怪劇團。"
1483782816 = "第三道關卡：讀心術師（１）"
1022129588 = "繼續追擊妖怪劇團的老師和忍術研究部、伊呂波面前，這次被第3名守門人，同時也是自稱為讀心術士的三森擋住了去路。"
2959155984 = "第三道關卡：讀心術師（２）"
2380076631 = "用天馬行空的方法成功通過三森試煉的忍術研究部。當時為了焦急的三千留，三森雖然對她說了一句話，但是在細細品味那句話的意義前，成員們又開始追趕妖怪劇團了。"
96021509 = "第四道關卡：機關屋（１）"
1037879827 = "最後阻擋著忍術研究部的，是由楓擔任守門人的機關屋試煉。正當大家要齊心協力面對試煉的時候。被著急的心牽引的三千留和老師一起被捲入機關屋的陷阱。"
2449070470 = "第四道關卡：機關屋（２）"
1750066922 = "和老師合作成功從機關屋脫身的三千留，就這樣和忍術研究部成員一起通過了試煉，但是就在那時，知道一切的佳穗登場了。"
1535946624 = "阻擋去路的東西（１）"
939985143 = "因為狀況變成那樣，佳穗宣布陰陽部會負責解決事件，就在三千留要接受這一切的瞬間。月夜和伊樹菜表示說好要去救伊吹的是忍術研究部，並且決意要去戰鬥。"
1915078740 = "阻擋去路的東西（２）"
4144075858 = "在老師的幫助下，忍術研究部成功打倒了擋在面前的佳穗，月夜要求依舊在猶豫的三千留一起去拯救伊吹。然後，就在那時，伊呂波和楓開著坦克出現。"
349304540 = "忍者的鐵則（１）"
713270559 = "為了甩開忍術研究部的追擊，妖怪劇團只能使出擊垮橋梁的最強手段。正當眾人都很慌張的時候，伊呂波為了跳過橋梁，開著坦克和所有人往坍塌的橋梁上突擊。"
3316953760 = "忍者的鐵則（２）"
3896826306 = "正好三千留成功將妖怪劇團逼到絕境，但是她猶豫著只是被逼著過來的自己還能做些什麼。於是知道伊吹一直在等待忍術研究部的事實的三千留，果敢地衝上前，救出了伊吹。"
457811177 = "慶典之後"
1596447159 = "在交流會順利結束後，一切都恢復原狀。最後出現在老師面前的仁耶坦白說，這次的事情都是為了看到老師的實力而策劃的，老師便毫不猶豫訓斥仁耶。"
784454923 = "阿拜多斯渡假勝地復原對策委員會"
1941527097 = "對策委員會一行人意外地前往了無人島的渡假勝地。\n然而等待著他們的卻是已經成為廢墟的渡假勝地、頭盔團的襲擊，以及若藻！究竟對策委員會能否順利度過暑假呢？"
4169806517 = "人生，世事難料"
