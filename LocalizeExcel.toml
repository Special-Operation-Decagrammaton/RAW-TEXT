2223860917 = "今日鐘崎港で見つけた「穐田水産」の炒飯、マジで信じられないくらい美味しかった！\n「海鮮なんてどこも同じ」って思ってたんだけどここの「カニ肉炒飯」常識がひっくり返るくらい美味い。\n新鮮なカニ肉がどっさり入ってて、全然生臭くないの。人生で一回は食べてほしい。「FOX EATS」のバイトの子が教えてくれたよ。"
1925481253 = "最近カニ料理ちょっと無理かも。\nドラム缶ガニの怪談を読んでからカニどころかエビも……。"
486337531 = "分かる。"
1643990071 = "このぬいぐるみ、見かけたことある人いない？\nモモフレンズ界隈で幻になってるペロロジラってぬいぐるみなんだけど……怪異でもいいから欲しいよ～"
3906071520 = "それって、在庫が全部海に沈んだっていう伝説のグッズでしょ？\n欲しがってる人多すぎて、モモフレンズ関連のインスタントで怪文書たまに見るよ。"
4229544793 = "ぬいぐるみじゃないけど、似たようなのは見たことある。\n夜勤の時、海でそんな感じの怪獣がビーム撃ちながら暴れてた……。"
2485934715 = "さすがにそれは盛りすぎ。\n知らないなら知らないって正直に言えば？"
