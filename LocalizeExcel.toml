1921507672 = "빈틈없는 중간관리자"
4063815318 = "발렌타인 데이 당일 선생님은 이로하와 함께 만마전의 이름으로 전달할 발렌타인 데이용 선물을 고른다. 쇼핑이 끝난 후 선생님은 이로하에게 막대 초콜릿 과자를 선물 받는다."
2385007579 = "그것은 마치 럽코처럼"
1567199440 = "발렌타인 데이 당일, 미치루가 발렌타인과 관련된 콘텐츠를 제작하자며 찾아온다. 미치루의 계획은 실패로 돌아갔으나 모든 것은 선생님에게 감사의 발렌타인 초콜릿을 전달하기 위함이었다."
2668723953 = "SRT, 보급합니다!"
1759226892 = "발렌타인 데이를 앞두고 샬레의 조리실을 빌린 미야코. 미야코는 소대원들에게 줄 초콜릿 당근 케이크를 구운 후 그중 하나를 선생님에게 선물한다."
4267228678 = "Sweet Logistics"
1196107006 = "갑작스러운 소나기에 흠뻑 젖어버린 선생님과 모에. 몸을 말리기 위해 모닥불을 피운 김에 선생님과 모에는 스모어를 만들어 나눠 먹는다."
1213591936 = "졸음 방지대책"
