137391815 = "세이아의 상태는 위중해지고, 미카는 세이아를 해친 범인으로 내몰린다. 한편 사오리는 선생님에게 무릎을 꿇으며 아츠코를 도와달라고 부탁한다. 사오리는 헤일로를 부수는 폭탄을 건네지만, 선생님은 이를 부숴버리고 사오리를 돕기로 한다. 한편, 미카는 지금 벌어지는 모든 사태가 자신을 그렇게 만든 사오리에게 모든 책임이 있다고 결론 내린 후 탈옥을 감행한다."
3718525211 = "스쿼드의 재합류"
1431856600 = "선생님은 사오리와 함께 흩어진 아리우스 스쿼드 멤버들을 찾기 시작한다. 슬럼가에 숨어 있던 히요리와 만나고, 그 뒤엔 다리 난간에 위태롭게 서 있는 미사키를 설득하는 데 성공한 선생님은, 그렇게 모두와 함께 아츠코를 구하기 위해 아리우스 자치구로 향하기로 결정한다."
895577034 = "아리우스 자치구로 1"
466017759 = "아리우스 자치구로 들어가기 위해, 입구가 되는 트리니티 지하의 카타콤으로 향하는 선생님과 아리우스 스쿼드 멤버들. 하지만 그 앞을 베아트리체의 명을 받은 아리우스 학생들이 가로막는다."
