1871057734 = "比現在更多"
4152512206 = "暴雨過後，敦子布置的花圃上，野花全都枯死了。老師安慰著傷心的敦子，並提議可以一起學習種花的方法。"
3907252919 = "只為閣下"
2694524553 = "明明夏天到來了，擔心著沉浸在煙火大會準備工作中的老師的若藻，為了製造「完美的夏日回憶」來到了夏萊。然而，告知老師沒有自信為其計劃出「完美的夏日回憶」的自信，詢問老師想做的事並以危險的解釋進行實行……。最終，在夏萊一起工作整夜所以沒有釀成大禍。"
3209742349 = "僅僅是想守護約定"
3701725789 = "「完美的夏日回憶」計劃沒有結束。認為老師心裡還有想做的事的若藻，和老師做了「約會」的約定。然而，每次約會時老師都會被煙火大會準備的問題叫回去……。持續被打擾約會的若藻終於，認為如果沒有把老師叫走好幾次煙火大會的存在就好，下定決定引爆倉庫。面對在倉庫胡鬧的若藻，老師強烈的斥責了。"
239637834 = "於營火旁閃爍的心意"
1035672286 = "面對詢問是否還記得半途而廢的「約定」的若藻，老師回應了希望可以等到工作結束。之後，即使聯絡了也沒有回應，天氣漸漸惡化……為了找若藻奔向暴風雨中時，看見了守護「約定」暴露於風雨中，一心一意持續等著自己的她的身影。必須溫暖被風雨凍僵的若藻而築起營火，兩人度過了安穩的時光。"
850282751 = "刻下的，是純愛"
765356607 = "若藻與老師一同漫步在海灘，坦率地傾訴自己的心意。那份想要刻在陽傘下的，對老師的純真情感。"
4061302182 = "偶爾這種日子也"
54589100 = "看見夏日的大海而十分激動的野乃美。為了平常總是先照顧別人的野乃美，這次老師決定要好好照顧野乃美。"
1859398185 = "挑戰採椰子"
3014898155 = "說要採集椰子而用迷你槍開始伐木的野乃美。老師雖然建議更平凡的方式，但反而卻發生了意想不到的事件。"
2542756039 = "閃爍於砂上的星辰"
3336596639 = "深夜，睡不著野乃美出來散步卻剛好遇見了老師。兩人朝著星光閃爍的海邊走去。"
4024412057 = "玩樂的意思"
1633675291 = "雖然為了遊玩才來到無人島，但綾音卻在翻找著倉庫。老師為了不讓綾音對自己的樣子感到失望，便陪著她一起。"
549604868 = "棉被裡的綾音"
4017885026 = "即使在度假勝地也和平常一樣在睡午覺的綾音。因為將去叫她的老師錯認為茜香，綾音在無意的狀況下展露出毫無防備的模樣。"
1876616731 = "著急的理由"
2850828647 = "沒辦法拋棄急躁的心情，並獨自修理著直升機的綾音最後因為虛脫而昏倒。老師好好地勸導綾音，說管理自己的身體狀況是很重要的事，之後一起幫忙修理直升機並幫綾音拍了紀念照。"
979430574 = "無人島的神祕寶物"
3579191394 = "星野看著以前住在渡假勝地的房客在導覽地圖上標記的場所，開始尋找適合自己休息的地方。最後星野終於和老師一起找到適合的地方，並在那裡享受舒適的午覺。"
117700283 = "產地直送的新鮮食材"
2728239546 = "老師在收到星野的求助請求後來到了海邊，並和星野一起採集海鮮。但是在老師的幫助下，採集了太多的海鮮，星野反過來抱怨說採集海鮮似乎變成了工作。"
3326990624 = "儘管看不見內在"
2625437651 = "老師偶然在海灘遇見望著大海的星野。在感嘆著大海風景的星野的視野中，看見了跳出水面的魚群。星野感到很愉快，並說總有一天想要和老師一起看鯨魚跳出水面的樣子。"
2766807234 = "我，成功了！"
739359557 = "突然把老師叫來的靜子激動地說著，自己的百夜堂連鎖事業有多麼努力地在邁向成功之路。但是老師感覺靜子似乎被趕出來一樣，反而很擔心她。靜子對於老師意外的反應感到很慌張，便逃走了。"
1341349068 = "到頭來，是為了什麼呢？"
2467605046 = "不知道為何感覺很氣餒的靜子，老師決定幫他諮詢。靜子說因為太專注在連鎖事業的成功上，就忘記自己一直以來所追求的價值–客人的微笑。靜子領悟這件事情後，就再次定下心來。"
1344506803 = "我，可是很貪心的！"
3607288038 = "被找回活力的靜子叫來的老師。靜子向老師表達謝意，並堂堂正正地說著自己新的野心和夢想。"
32910525 = "和伊樹菜一起劈西瓜！"
1822618449 = "老師因伊樹菜的請求來到的海邊，和伊樹菜進行了名為修行的打西瓜活動。伊樹菜雖然一直沒能成功打到西瓜，但在修行之後，還是跟老師一起享用美味的西瓜。"
3631402519 = "和伊樹菜一起玩沙！"
1116374148 = "又再次以修行為藉口，專注在堆沙堡的伊樹菜和老師。伊樹菜雖然因為超乎意料之外的難度而感到慌張，但還是沒有放棄，並和老師一起完成了沙堡。"
605429618 = "和伊樹菜一起千鈞一髮！"
3019377752 = "盛夏的某一天。伊樹菜拿和老師修行為藉口，也嘗試做沙浴。但是因為在沙子內實在太舒服，伊樹菜就那樣睡著了。"
3379580703 = "和伊樹菜一起手牽手"
1012117113 = "老師知道伊樹菜在躲避游泳這件事，便詢問她躲避的理由。伊樹菜回答說怕自己是不會游泳的忍者這件事，主公知道後會失望才會那樣做，老師則說不會有那種事，並和伊樹菜一起練習游泳。"
1530413232 = "尋找閃亮"
340837813 = "因為知世突然的呼叫而來到海邊的老師。知世沒頭沒腦地說要去找閃亮的東西，老師即使還沒搞清楚狀況，還是跟著知世一起去尋找閃亮的東西。終於知世找到了閃亮的東西，那就是……"
416881010 = "想給你看的東西"
4275087180 = "知世突然說有東西想要給老師看，便找了老師出來。和知世走了好長一段路的老師，最後看到的是為數眾多的烏龜群。"
3101350732 = "閃亮的所在之處"
2121093664 = "知世害怕因為在海邊撿到的「幸運信」會帶來不幸，便和老師拉開了距離，但老師為了證明信中的內容都是騙人了，便和知世一起度過了3天。"
1812069520 = "回憶寶箱"
3667309469 = "老師前往海邊，看見正在認真撿沙子裝起來的知世。知世把和沙子裝在一起的回憶物件拿給老師看。"
3499466219 = "獨立"
1404779164 = "接到沙織的聯絡後來到黑市的老師。沙織因為無法證明身份而無法開戶，老師便爽快地答應當她的保證人。"
1353600712 = "失誤"
2747481849 = "因為擔心沙織而再次找去黑市的老師。沙織因為沒有簽約就工作的關係，導致沒有辦法領薪水，而感到很難堪。"
1647392473 = "內疚"
18924281 = "這次好好地簽了合約並開始工作的沙織。但是那份工作的內容是要沙織獨自對付整個敵方組織。那結果就是沙織受了傷，而老師則是在照顧沙織。"
4249397029 = "一切並非徒勞的證據"
3781866017 = "面罩壞了。沙織無法拋棄這個長久以來一起並肩作戰的夥伴。他與老師一起修理面罩。"
2097037032 = "Collateral Damage"
1238978732 = "在老師的請求下，幫忙抓到小偷的萌。萌雖然成功利用熱能追蹤無人機捕捉了犯人，但最後沒能忍住衝動發射了導彈，將街道炸成一團亂。在收拾善後之後，萌說對於因為自己的選擇而壞事的狀況有種獲得淨化的感覺，不隱藏地說出了自己的愛好。"
3925224064 = "Missing in Action"
3963871333 = "因為突然短路導致夏萊的數據都搞丟的老師。幸好在行政工作能力傑出的萌幫助下，快速且成功地復原不見的數據。但是發現「緊急格式化按鈕」的萌忍不住衝動就按下按鈕，並讓狀況回到了原點。"
3909715798 = "Unexploded Ordnance"
3002018408 = "為了值日生工作而來到夏萊的萌。老師囑咐萌什麼都不要碰之後，就暫時外出了。但是萌在發現書桌附近的巨大紅色按鈕後，就馬上按了下去。但是那按鈕是啟動緊急灑水裝置的按鈕，萌被突然降下的水淋得一身濕。"
1642348824 = "Phase Line"
1120991900 = "因萌的請求，而前往兔寶寶公園幫忙整理物資的老師。跟平時不同，萌在爆炸物面前卻依舊保持著冷靜。老師詢問萌跟平常不一樣的原因，萌將藏在心裡的話說了出來。"
1230115544 = "補課與甜點"
3289098080 = "收到千紗的聯絡而前往咖啡廳的老師。千紗拜託老師幫忙準備補考的事。讀書後，千紗和老師一起吃了甜點和飲料後就回去了。"
446030069 = "我好歹也是放學後的甜點部成員"
4084141263 = "老師發現了正在車站等公車的千紗。老師和千紗一起吃著千紗帶來的飲料和馬卡龍，一邊聊著瑣事。"
2391083433 = "Bad Timing"
3086413285 = "老師為了買午餐而去了便利商店。老師雖然在便利商店發現了千紗，但千紗卻裝作不知情並躲避著老師。結果和老師撞到才現身的千紗。千紗說因為沒有化妝，所以才會躲著老師。之後千紗和老師稍微聊一下天之後就分開了。"
2135718946 = "貓舌頭"
2285653641 = "千紗突然來訪夏萊。千紗說雖然買了「翻糖巧克力」，但因為自己吃不了太燙的東西，為了給老師才會特別來夏萊。老師雖然向千紗說她是「貓舌頭」，但是千紗似乎不太知道那個意思。"
432381563 = "我不是心菜醬。我是教官！"
3385540554 = "造訪梅花園的老師。心菜宣稱要展現身為教官的帥氣模樣。但是心菜在孩子們面前沒辦法展現出教官的威嚴。"
377170606 = "我不是小孩子，我是淑女！"
1059419902 = "結束在山海經的事並回去夏萊的路上，遇見老師的心菜說要給老師可以護送淑女回家的機會。心菜看起來對老師買的咖啡很有興趣。雖然很豪氣地嚐了咖啡的味道，但因為那超乎自己想像的「大人的味道」而感到痛苦。"
3736806188 = "不管怎麼說，討厭的東西就是討厭！"
661652410 = "在市區遇見心菜的老師。心菜在苦惱自己該怎麼做才能夠被稱作教官。老師建議說，只要能夠吃下紅蘿蔔的話，就能夠被大家稱作教官。"
1888100604 = "……只有這次而已。真的哦？"
3679415033 = "心菜和老師一起前往紅蘿蔔專賣餐廳。雖然心菜對四處都看得見的紅蘿蔔感到反感，但因為超出想像的味道，而成功將所有紅蘿蔔吃完了。"
2090247752 = "熱情的立領學生服"
3930023682 = "為了送回詠葉放在夏萊的白袍，老師前往了工程師部的工作室。但詠葉工作時沒有穿白袍，而是改穿立領學生服。詠葉說穿著立領學生服工作，可以感受到另一種意義的熱情，而且也能樂在其中。"
492464550 = "熱情的團體操"
3765296963 = "為了觀賞詠葉新製作的應援機器人的演示，老師來到了千年。詠葉向老師展現了運用機器人的大規模團體操。"
4280790550 = "熱情的應援魂"
2043768612 = "詠葉未能在約定的日期內完成應援機器人，她親自去拜訪委託人，並且給予應援。"
2208070431 = "熱情的應援歌"
1265896640 = "詠葉擔心工程師部部員們無精打采的狀況，於是便找老師去卡拉OK。詠葉播放了自己親手製作的應援歌，老師聽完後，對意想不到的歌詞內容感到吃驚。"
3318658421 = "研討會書記乃愛的細心紀錄"
436248350 = "為了值班工作而來到夏萊的乃愛。但老師說沒有特別需要幫忙的事，叫她放輕鬆一點，乃愛身為書記，決定要確實記錄老師一整天的行程。"
465908990 = "研討會書記乃愛的惡毒觀察"
2289102291 = "為了讓乃愛不至於太無聊，老師提議兩人觀察彼此的行為，打發擔任值日生的時間。但觀察與記錄彼此行動並不如想像中簡單，乃愛突然提出的問題，讓老師有些措手不及。"
773232047 = "研討會書記乃愛的平凡日常"
604699670 = "老師在完成千年的業務後前往了咖啡廳，在那邊遇見了乃愛。被文件堆包圍的乃愛說自己在鑑定新申請的發明專利。在邊談論專利邊整理的過程中，乃愛發現了一個很有趣的專利。"
3466815831 = "研討會書記乃愛的無聊休憩"
706439484 = "定期面談因為突如其來的雷陣雨而取消，老師便前往研討會的會議見乃愛一面。因為老師突如其來的造訪，乃愛顯得相當驚訝。後來乃愛和老師一邊閒聊，一邊在大玻璃窗上寫字，共同度過了愉快的時光。"
3426454651 = "巨匠的祕密嗜好"
4103016827 = "有一天，老師偶然在市場遇見了正在挑選布料的響。響說自己是來挑選cosplay要使用的布料，同時談論起自己的cosplay嗜好。"
4119985251 = "巨匠的熱情應援"
1355940963 = "在夏萊加班到很晚的某一天，響為了幫老師加油，穿著啦啦隊服來到夏萊。雖然響在辦公室很熱情地幫老師加油，但她很快就發現自己做錯了。"
2694245452 = "巨匠的戰慄助威"
3127541435 = "響為了激起老師的熱情，於是便介紹了新的發明。該發明的外觀像是文書處理器，若是一定時間內沒有進行業務就會自爆，得知此一事實後，老師開始慌慌張張地處理起業務。"
162351076 = "巨匠的溫柔助眠"
484928347 = "響為了過勞的老師帶來了新的發明。那個發明看起來像是平凡的加油工具，設定有播放搖籃曲的功能，老師就這樣聽著響的搖籃曲進入夢鄉了。"
2702026288 = "Case 1. 是兔子唷？"
3571189559 = "在MomoTalk表示有了新的想法的朱音，告訴老師有時間的時候到房間來一趟。等待著來訪的老師的是穿著兔女郎服裝的朱音。對微笑著說著兔女郎裝也是為了服務而誕生的存在，所以希望用這副模樣服務老師的朱音，領悟到自己將會社會性死亡的老師突然想起有急事而逃走了。"
4078232729 = "Case 2. 請好好休息"
4204404808 = "在結束與文件山的戰鬥的老師面前，打扮成兔女郎的朱音出現了。與詢問是否需要什麼服務的朱音一起進行了夏萊的清掃。在打掃乾淨後，喝了朱音泡的茶，老師緩緩進入了夢鄉。"
1635582478 = "Case 3. 是學習時間對吧？"
4058993158 = "在市區散步時巧遇了穿著兔女郎服裝的朱音。據本人所說，她一直在這裡等著老師。為了躲避周圍的視線而逃進的咖啡廳竟然是兔女郎主題的咖啡廳，朱音對老師的造詣之深相當感動。"
482869814 = "Case 4. 一日秘書，待命中"
607709933 = "工作到很晚的老師自言自語說要喝咖啡時，朱音遞出了咖啡。儘管因為沒想到她會在這裡而感到驚慌，老師依然收下了咖啡，並向朱音詢問最近一直打扮成兔女郎的理由。"
3585267607 = "晨跑"
1396278568 = "清晨，老師在公園步道遇見了正在慢跑的優香。優香正在為了千年主辦的大運動會進行特訓中。優香說自己對耐力很有自信。但優香的體力很快就耗盡了，完全和誇下海口時判若兩人。"
737635945 = "科學的烹飪祕訣"
2573899798 = "聽說優香在練習製作料理，老師便去了一趟家政教室。優香開始時顯得自信滿滿且相當有氣勢，但因為不熟練的關係，接二連三出現了失誤，經過一番曲折後，終於完成了便當。"
2174568177 = "理性的應援文化"
1860377927 = "優香為了處理公務而來到了夏萊，恰巧看見電視在直播千年棒球部的比賽。優香說正常的應援者在任何一種情況下都不能失去理智，但她在觀看千年棒球部的直播比賽時失控了。"
670142544 = "運動員卡"
3586706266 = "優香因為工作的關係而去拜訪夏萊，當時老師不在座位上，她在整理老師的書桌時，發現了一張印有自己照片的卡片。這是克洛盧斯學園製作的運動員套卡，但優香沒能發現此一事實，因此誤會了。"
4024156221 = "不習慣的服裝"
3987667853 = "因瑪麗提出諮詢要求，老師來到了三一大教堂的準備室，他在那邊見到了穿著體育服的瑪麗。瑪麗說穿上體育服讓自己很不安和難為情，聽完她的煩惱後，老師給予了建議。"
1051695137 = "長椅角落的修女"
343809718 = "大運動會當天，老師幫在人群中東奔西跑的瑪麗加油。瑪麗很感激老師的體貼，她談起自己先前都不曾感受過大運動會的喜悅與感想。"
2123351407 = "瑪麗的回禮"
720252404 = "在三一大教堂私有公園散步的老師，遇見了正在運動的瑪麗。看到瑪麗談論因為大運動此一契機轉變的心態，老師感到很滿足。老師一路等到瑪麗運動完畢，一起回去夏萊。"
1478340410 = "持續成長的身體"
2793860415 = "老師收到了蓮實的聯絡。蓮實努力地想要拉起體育服的拉鍊，但後來就放棄了，接著便認真的和老師一起準備體育祭的相關業務，但老師卻因為蓮實的服裝難以專心工作。"
1830803246 = "蜂蜜漬檸檬"
3363601715 = "老師收到了蓮實的聯絡後，前往家政教室。蓮實在製作「蜂蜜漬檸檬」。老師協助蓮實醃漬剩下的蜂蜜檸檬。"
2317643333 = "自我管理"
3356412026 = "晄輪大祭當日。蓮實雖然在進行飲食管理，但卻因為周圍的學生在談論食物而動搖了。老師提議和蓮實一起吃「蜂蜜漬檸檬」。蓮實雖然叮嚀自己要少吃一點，但卻因為食慾爆發而全部吃光了。"
1424445415 = "矯正姿勢"
2368675001 = "和蓮實約好一起運動的老師來到體育館。蓮實和老師互相協助運動，並且導正對方的姿勢。"
2829913152 = "天才駭客的嗜好"
2128267029 = "知道老師正值休假，陽葵便邀請老師去自己專屬的藏身地。兩個人在那個地方一起休息，度過悠閒的時光。陽葵為了播放自己想聽的歌曲，於是駭入校內的廣播系統，教室裡開始傳來陽葵喜歡的演歌。"
1584830152 = "天才駭客的實驗"
1591221981 = "老師本想準時到達和陽葵約定的地方，卻捲入了莫名其妙的意外。好不容易克服所有意外且抵達了約定的場所，但後來才發現，這一切都是陽葵看過運勢雜誌後，刻意安排來測試老師的。得知真相後，老師開始對陽葵說教。"
829552681 = "天才駭客的異議"
711052487 = "接到陽葵發生大事的消息後，老師匆匆忙忙前往千年，但陽葵拿出的是毀謗自己的八卦新聞。為了更正新聞內容，陽葵和老師一起拍攝了影片解釋一切，但令人傻眼的是，陽葵和老師製作的影片反而引起更大的風波。"
2037364016 = "天才駭客的細膩分號"
2533708593 = "陽葵說自己獲得了特殊的寶物，拿出限定版的妖怪MAX飲料給老師看。陽葵說自己向貝里塔斯的成員學習了能讓這個飲料更美味的方法，於是想進行測試。但罐子卻在瞬間爆開，陽葵被噴了一身濕。老師逼不得已，只好認真用手帕幫陽葵擦乾。"
4205919598 = "若無其事"
785035510 = "完成赤冬聯邦學園的業務後，老師前往了舊校舍。老師在那邊遇見了獨自堅守岡位的時雨。時雨說飲料全都因為酷寒而結凍，很自然地就遞出了伏特加，讓老師覺得相當傷腦筋。"
2971103393 = "泰然自若"
3404545130 = "造訪赤冬聯邦學園的老師在攀爬雪山時遇難了。但幸虧經過附近的時雨救了老師，時雨責備老師沒有聽自己先前的建議。後來時雨揹著老師順利回到了夏萊。"
720127695 = "悠悠哉哉"
1882526035 = "為了報答上次的恩惠，老師邀請時雨一起去鬧區。時雨平靜地表示雖然在餐廳用餐度過了愉快的時光，但其他地方更適合自己。"
4186219493 = "天真直率"
273193773 = "為了請老師吃東西，時雨來到了夏萊的料理實習室。但看見她帶來的生食後，老師很傻眼。時雨之後加入了伏特加，調皮地繼續製作料理，最後是由老師代替她完成料理。"
3572546902 = "聖誕老人芹奈"
3496257221 = "老師遇見了在平安夜分發禮物給孩子們的芹奈。不知不覺下起雪來了，老師送圍巾給怕冷的芹奈。"
2512788767 = "圍巾的回禮"
2923297793 = "芹奈偷偷跑來找正在休息的老師，但很快就被老師發現了。芹奈為了報答上次的圍巾，送給了老師綜合健康組合，以及幫他進行了指壓，兩人度過了愉快的時光。"
2326049757 = "一日救護騎士團體驗"
1971996326 = "老師一起參加了芹奈的救護騎士團一日體驗。為了迎接聖誕節而穿上聖誕服的芹奈正在巡房，並且熟練地應對病患。工作結束後，芹奈詢問老師參加救護騎士團的理由，老師表示自己對芹奈和救護騎士團都很感興趣。"
720184857 = "乖小孩？壞小孩？"
1669203285 = "花繪認為既然穿上聖誕服裝，就該成為真正的聖誕老人。為了成為真正的聖誕老人而煩惱的花繪，想要分辨先抵達的是乖小孩還是壞小孩，於是開始進行測謊。"
69967909 = "特訓！通往聖誕老人之路！"
3605114321 = "為了成為真正的聖誕老人，花繪持續在進行訓練。老師和花繪在奇普托斯各個地方繼續進行跑酷訓練。"
2582704447 = "等待你的到來"
2787292054 = "老師受邀前往花繪的房間。花繪為了迎接聖誕老人而準備了襪子和點心。"
503073630 = "重要的事，重要的東西"
675453541 = "花繪為了買要送大家的禮物，和老師一起前往購物中心。然而，花繪挑的都是健康用品之餘，又和黑市太妹起了爭執。花繪對太妹的橫行霸道感到很生氣，於是出手讓太妹們學乖了。"
3867179911 = "年關就該安穩度過"
1185714622 = "老師遇見了羽留奈，在送年夜充滿活力的街道上品嚐各式各樣的食物。但食物卻沒能符合羽留奈的期待，老師一直很擔心羽留奈會炸掉攤販。不過，羽留奈說雖然自己吃到的不是美食，但已經充分享受了，剩下的時間也要和老師一起度過。"
1122975317 = "結果在過程之中"
1611910214 = "為了探索享受美食的過程，羽留奈找老師一起去市場。市場上的商人正聚集在一起競標鯛魚。羽留奈參加拍賣且堂堂正正獲得了鯛魚，後來在無菜單料理美味地享用了鯛魚。但羽留奈說尋找終極美味並不容易，同時表示很可惜。"
1306876513 = "美食成立的要件是料理、季節……"
2915697252 = "羽留奈約老師一起去製作最頂級的美食。羽留奈說美食真正重要的不是只有料理而已，羽留奈湊齊所有條件後，和老師一起製作美食。"
799816248 = "新年穿新衣！"
3455411055 = "老師前往淳子打工的「L'Oiseau Bleu」。老師看見穿和服的淳子，並且點了店裡的所有菜色。雖然最後沒吃完而被斥責，但老師約淳子一起吃，淳子並沒有拒絕。"
934247381 = "想吃各種料理！"
527805565 = "收到打工報酬的淳子約老師一起去慶典大街。兩人一起試吃年菜，因為實在吃太多了，淳子的臉色顯得不太對勁。"
4015908374 = "請給我溫暖"
1228012568 = "在連假結束前，淳子來到了老師所在的夏萊。兩人一起去市區欣賞聖誕樹和逛商店街。淳子的肚子突然冒出咕嚕嚕的聲音，兩人一起吃了糰子後互相說新年快樂。"
2198382498 = "風華的願望"
41944175 = "為了去見送年夜也很辛苦的風華，老師去了格黑娜的學生餐廳。面對老師突然造訪提議約會，風華嚇了一跳，就這樣莫名其妙和老師一起外出且度過了愉快的時光。"
735524095 = "雖遲但到"
751489679 = "老師受風華邀請前往了學生餐廳。穿和服精心打扮的風華在等著老師。為了表達這段期間的謝意，風華邀請老師享用她親手製作的跨年蕎麥麵，然後互相說新年快樂。"
3464653551 = "連假最後的出遊"
1290967402 = "連假最後一天風華也打算忙供給部的事，於是老師綁架了她，帶著她去了很多的地方。忙碌地過了一天後，風華明白老師是為了讓自己在連假的尾聲創留下特別的回憶，於是帶著真心向老師道謝。"
2747740649 = "救護的精神"
4046348442 = "老師和美禰一起進行救護巡視。經歷過多次的騷動後，美禰認為想要拯救生命，就要更果斷行動才行。救援巡邏結束後，美禰向老師提議加入救護騎士團。"
155199846 = "興趣與實際利益"
1992573947 = "美禰為了展示自己的收藏品，於是邀請老師去家裡。美禰在家裡針對各種醫療用品進行解說，但老師聽不太懂。後來美禰叫老師弄傷自己，老師好不容易才阻止了美禰。"
4103404645 = "下午茶"
