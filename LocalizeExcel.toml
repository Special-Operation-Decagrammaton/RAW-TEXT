2719359088 = "루미와 현무상회 일원들의 극진한 대접을 받는 선생님. 하지만 그것도 잠시, 선생님은 산해경 내부의 양대 세력인 현무상회와 현룡문 사이의 불편한 기류를 알게 된다."
1555531508 = "자금위시 1"
3083141341 = "현무상회를 둘러싼 '만년삼 논란'을 돌파하기 위해 현룡문을 찾아간 선생님. 하지만 현무상회에 불리한 증거가 제시되고, 이를 해결하기 위해 일동 머리를 모은다."
912183531 = "자금위시 2"
4285669364 = "현룡문 하급 간부의 독단 행동을 성공적으로 막아낸 선생님과 일행. 서둘러 문제 해결을 위한 다음 행선지를 결정한다."
3704157144 = "절차탁마"
3667868691 = "선생님과 일행은 '만년삼'에 대한 정보를 얻기 위해 연단방의 사야를 찾아간다. 사야는 산해경의 분쟁에 엮일 생각이 없었지만, 루미의 특선 요리에 반한 나머지 쓸만한 정보를 제공하게 된다."
3320570305 = "거익태산 1"
3177457099 = "사야에게서 얻은 정보를 토대로 만년삼의 정보를 쫓아 곤륜산에 도착한 선생님과 일행. 그곳에는 의외의 손님이 기다리고 있었다."
372117891 = "거익태산 2"
3546938718 = "선생님과 일행은 현룡문의 집행부장인 미나를 제압 후 자초지종을 듣는다. 이어지는 논쟁 끝에, 일행의 다음 행선지는 뜻밖의 장소로 정해진다."
499336354 = "거일반삼"
1674497975 = "마침내 만년삼 유출 사건의 전모를 깨닫게 된 선생님과 일행. 선생님은 이 사건을 해결하기 위한 한 가지 방법을 제시한다."
1613439579 = "허심탄회"
1595560658 = "선생님과 일행은 사건을 해결하기 위해 '덫'을 준비한다. 그러나 이 모든 상황을 지켜보던 이가 있었으니......."
1896039253 = "주마가편"
834551465 = "선생님과 일행은 '만년삼 유출 사건'의 배후에 있던 밀수꾼들과 전투를 벌인다."
3287427825 = "파사현정"
1843046059 = "선생님과 일행은 성공적으로 만년삼 밀수꾼들을 제압한다. 하지만 그들 또한 누군가의 하수인일 뿐이었고, 또 다른 실세가 있음이 밝혀진다."
977104468 = "사필귀정"
3026969621 = "그렇게 산해경을 뒤흔든 만년삼 유출 사건은 일단락된다. 하지만 아직 매듭지어지지 않은 앙금이 남아 있었는데......"
3857900118 = "충려지경"
229515679 = "비가 온 뒤 땅이 굳는다는 말처럼, 현무상회와 현룡문은 '만년삼 유출 사건'의 갈등을 봉합하기 위해 성대한 연회를 연다."
40908383 = "여름 특수 작전! 사라진 새우를 향한 토끼의 추적"
2721341247 = "무더운 어느 여름날. 평소처럼 공원에서 편의점 도시락을 먹던 RABBIT 소대원들은 D.U.에서 새우가 모두 사라졌다는 사실을 깨닫게 된다. 새우의 행방을 조사하기 위해 어촌에 잠입한 RABBIT 소대는 마을에서 수상한 전설을 듣게 되는데……"
2738681454 = "사라진 새우"
58368520 = "귀여운 수영복과 귀엽지 않은 마을"
1176265223 = "야토우라 마을의 그림자"
2322828772 = "금기"
3013262397 = "어둠 속을 방황하는 자"
473736447 = "미지의 공포"
1216354736 = "안개가 걷힌 뒤에"
170093504 = "한밤의 바비큐 1"
3995974815 = "한밤의 바비큐 2"
718466590 = "수상한 그림자"
3337165522 = "물속의 토끼"
1057642642 = "갑판 청소 1"
2724919361 = "갑판 청소 2"
405509144 = "어촌에서 온 택배"
3924969069 = "사라진 새우"
3736953745 = "무더위에 시달리는 코우사기 공원의 RABBIT 소대원들. 아이스크림을 들고 찾아온 선생님 덕분에 더위를 식히며 대화를 나누던 중, D.U.에서 새우가 실종됐다는 수상한 소문이 화두에 오른다."
1943580014 = "귀여운 수영복과 귀엽지 않은 마을"
184007341 = "선생님과 RABBIT 소대원들은 야토우라 마을에 도착한다. 위장용으로 마련한 서로의 수영복을 보며 나들이 기분을 내는 것도 잠시, 일행을 불쾌하게 여기는 마을 주민들과 마주친다."
2581052701 = "야토우라 마을의 그림자"
2832724995 = "야토우라 마을에서의 정보 수집을 위해 RABBIT 소대원들은 각자 흩어져 움직인다. 그러나 외지인을 경계하는 주민들의 태도 때문에 조사는 난항을 겪는다."
309044331 = "금기"
2200941612 = "탐문 조사에서 별다른 실마리를 얻지 못한 RABBIT 소대원들. 소대원들은 마을에 떠도는 불길한 소문에 관해 이야기하는데, 그때 생각지도 못한 정보 제공자가 등장한다."
2989058466 = "어둠 속을 방황하는 자"
723669717 = "야토우라 마을의 불가사의한 비밀을 직접 눈으로 확인하기 위해 RABBIT 소대원들은 야간 작전을 시작한다."
1997896967 = "미지의 공포"
284854068 = "야토우라 마을 주민들과 RABBIT 소대원들 간의 교전은 선생님의 개입으로 간신히 중단된다. 소대원들은 편견과 공포 때문에 마을 사람들을 오해하고 있었다는 것을 뒤늦게 깨닫는다."
4197412946 = "안개가 걷힌 뒤에"
4182046529 = "한밤의 소동이 끝난 뒤, RABBIT 소대원들은 각자의 방식으로 마을 사람들을 도우며 조금씩 경계를 허물어 간다."
3388148430 = "한밤의 바비큐 1"
3365586462 = "낚시꾼의 부탁을 받아 그에게 낚시를 가르쳐 주기로 한 미유. 낚시를 하던 RABBIT 소대원들은 해산물을 들고 찾아온 마을 사람들과 함께 바비큐를 즐기며 즐거운 시간을 보낸다."
2519986036 = "한밤의 바비큐 2"
2505877297 = "한 편, 바다 위에서 한 무리의 수상한 일당이 RABBIT 소대와 마을 사람들의 모습을 못마땅하게 지켜본다. "
1139930313 = "수상한 그림자"
1328182877 = "다음 날, 낚시꾼은 도깨비의 암초 근처에서 불가사의한 선박을 발견한다. 마을 사람들은 그 배가 전설 속에 나오는 '재래의 배'라며 두려움에 떨지만, RABBIT 소대의 대원들은 곧 수상한 점을 알아차린다."
1869164534 = "물속의 토끼"
2573209587 = "'재래의 배'의 실체를 파악하기 위해 RABBIT 소대의 소대원들은 바다로 향한다."
4044326055 = "갑판 청소 1"
893178531 = "바다에 떠 있던 배는 전설 속의 배가 아닌, 해운업자의 바지선이었다. 해운업자가 새우 밀수에 관여하고 있었다는 사실이 폭로되고, RABBIT 소대는 SRT의 이름으로 이들을 제압한다."
3149322458 = "갑판 청소 2"
3604726031 = "일개 용병들은 SRT의 힘 앞에 상대가 되지 않고, RABBIT 소대는 이들의 처분을 마을 사람들에게 맡긴다."
491370350 = "어촌에서 온 택배"
574290976 = "일련의 사건 후 야토우라 마을은 불길한 어촌에서 활기찬 관광지로 거듭나고, D.U.의 새우 유통도 정상화된다. 코우사기 공원으로 돌아온 RABBIT 소대원들은 야토우라 마을에서 보내온 택배 하나를 받게 된다."
1186506094 = "숨겨진 유산을 찾아서 ~트리니티 과외 활동~"
387596842 = "시스터후드의 경전을 몰래 복제한 사실을 들킨 우이. 하나코의 중재(?)로 유적지를 조사하는 임무를 맡게 되는데……. 트리니티 근해의 무인도에서 펼쳐지는 좌충우돌 유적 탐험기!"
343249441 = "납치"
