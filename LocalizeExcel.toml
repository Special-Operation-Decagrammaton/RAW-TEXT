1205256794 = "시즌 준비 중입니다."
3920080884 = "데카그라마톤은 자신을 신성한 구도자라고 주장하는 인공지능 시스템입니다. 현재 그를 추종하는 10명의 예언자들이 키보토스 도처에 출몰하고 있습니다.\n\n비나는 데카그라마톤의 세 번째 예언자로 아비도스의 사막 지구에서 처음 관측되었습니다. 비나가 왜 이곳에 온 것인지는 알 수 없으나, 이대로 두기엔 너무 위험한 존재임은 틀림없습니다."
3639039230 = "데카그라마톤은 자신을 신성한 구도자라고 주장하는 인공지능 시스템입니다. 현재 그를 추종하는 10명의 예언자들이 키보토스 도처에 출몰하고 있습니다.\n\n헤세드는 데카그라마톤의 네 번째 예언자이며, 밀레니엄 외곽에 있는 버려진 군수 공장의 생산 시스템을 장악하고 있는 것으로 확인되었습니다. 헤세드가 이대로 무한한 병력 생산에 성공하게 된다면, 키보토스는 미증유의 재앙에 처하게 될 것입니다."
3682198469 = "키보토스 어딘가에 버려진 지하 성전에서 뒤틀린 신비에 의해 현현한 인공천사가 관측되었습니다.\n\n그레고리오는 <콤뮤니오 상토룸>이라고 불리는 인공천사 시리즈의 완성형으로 게마트리아의 실험으로 탄생한 신비의 괴물입니다. 지금도 그 괴물은 지하 성전에서 오르간을 연주하고 있습니다. 그 연주의 끝에 무엇이 기다리고 있을지, 그것은 아무도 알지 못합니다."
1904549173 = "예로부터 백귀야행 연합학원에 전해져 내려오는 괴담인 <환량백물어>가 모습을 드러냈습니다.\n\n모두가 웃고 떠들며 즐겼어야 할 축제장에서 난동을 피우는 <묘귀 쿠로카게>는 정말로 실존하는 존재인 걸까요? 아니면 단순히 누군가가 악의를 가지고 자아낸 끔찍한 괴담에 불과한 걸까요? 진실은 알 수 없지만, 더 늦기 전에 미처 끝나지 않은 괴담에 종지부를 찍어야 할 때입니다."
1142087454 = "데카그라마톤은 자신을 신성한 구도자라고 주장하는 인공지능 시스템입니다. 현재 그를 추종하는 10명의 예언자들이 키보토스 도처에 출몰하고 있습니다. \n\n게부라는 데카그라마톤의 5번째 예언자이며, 극지 연구기지의 무인탐사기가 정체불명의 AI에게 해킹당한 뒤, 자기 진화를 거듭하여 지금과 같은 모습으로 나타났습니다. 게부라가 무엇을 하려는 것인지는 알 수 없으나, 이대로 두기에는 극지 항로를 포함한 키보토스의 모든 항로의 안전이 위협받을지도 모릅니다."
3983422512 = "데카그라마톤은 자신을 신성한 구도자라고 주장하는 인공지능 시스템입니다. 현재 그를 추종하는 10명의 예언자들이 키보토스 도처에 출몰하고 있습니다.\n\n예소드는 데카그라마톤의 9번째 예언자이며, 현재로서는 그 원본이 되는 구조체가 존재하지 않는 것으로 보입니다. 그 원형이 되는 구조체나 만들어진 목적 같은 것도 알 수 없지만, 예소드를 이대로 내버려둘 수 없다는 것만은 분명한 사실입니다."
276060001 = "오래전 재정난으로 폐업한 어뮤즈 파크 <슬럼피아>에 알 수 없는 괴이 현상이 보고되고 있습니다. 작동을 멈춘 어뮤즈 돌과 각종 어트랙션이 한밤중에 다시 작동하며 사람들을 습격한다는 소문이 바로 그것입니다.\n\n어뮤즈 돌 고즈는 공허가 가득한 <슬럼피아>에서 혼자만의 쇼를 이어 나가고 있습니다. 그 기이한 미소 아래에 숨긴 본성은 선인가 악인가. 우리가 그것을 추측하는 건 쉽지 않을 겁니다."
3550217605 = "트리니티 지역의 고성당 유적 지하에서 정체불명의 존재가 발견되었습니다.\n\n예로니무스는 <콤뮤니오 상토룸>이라고 불리는 인공천사 시리즈의 완성형으로 게마트리아가 고대의 교의를 바탕으로 만들어낸 실험체라는 설이 있습니다. 예로니무스의 압도적인 힘을 이대로 방치해둘 수 없습니다. 키보토스의 안녕을 위해 움직여야 할 때입니다."
2223988532 = "데카그라마톤은 자신을 신성한 구도자라고 주장하는 인공지능 시스템입니다. 현재 그를 추종하는 10명의 예언자들이 키보토스 도처에 출몰하고 있습니다.\n\n호드는 원래 밀레니엄 자치구의 통신망 가설 유닛 AI였으나, 정체불명의 AI에게 해킹당한 뒤에 스스로를 데카그라마톤의 여덟 번째 예언자라고 주장하고 있습니다. 밀레니엄의 기술의 정수가 담겨있는 이 연산 기관의 폭주를 멈추지 않으면 밀레니엄 자치구의 안전은 장담할 수 없게 됩니다."
2092560489 = "교정국에서 탈옥한 <일곱 죄수> 중 한 명인 <재액의 여우>가 호버크래프트를 탈취해서 난동을 피우고 있다는 정보가 입수됐습니다.\n\n수영복 차림을 한 그녀가 무차별적인 파괴를 일삼는 경위에 대해선 알 도리가 없으나 이대로 그녀를 내버려 두면 키보토스의 반짝이는 해변은 불바다가 될 것입니다."
491740630 = "본거지까지 가는 길을 방해하듯이, 카이텐져들의 비밀병기가 등장했습니다.\n\n카이텐져들은 지금까지 빼앗은 자금과 기술을 토대로 거대한 합체 로봇「KAITEN FX Mk.0」를 만들고 있던 것 같습니다. 분명히 멋지긴 하지만, 이 로봇으로 발생하게 될 수많은 문제를 생각해본다면, 이 로망은 여기서 끝이 나야만 합니다."
1866624346 = "정체불명의 거대 괴수가 D.U. 인근 해역에서 발견되었습니다. 이 괴수의 외형은 예전에 바다에 가라앉았던 모모프렌즈 장난감의 모습을 하고 있습니다.\n\n어째서 이런 일이 벌어졌는지는 알 수 없지만, 이 거대 괴수의 진격을 막아내야만 합니다."
3601545918 = "오래전 재정난으로 폐업한 어뮤즈 파크 <슬럼피아>에 알 수 없는 괴이 현상이 보고되고 있습니다. 작동을 멈춘 어뮤즈 돌과 각종 어트랙션이 한밤중에 다시 작동하며 사람들을 습격한다는 소문이 바로 그것입니다.\n\n어뮤즈 돌 시로와 쿠로가 다시 움직이는 이유는 알 수 없지만, 과거의 화려했던 어뮤즈 파크의 축제를 재현하고 있는 것은 분명해 보입니다."
