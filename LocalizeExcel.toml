2382324779 = "意外的興趣"
4092134933 = "收到櫻子的諮詢要求後，老師便去了一趟。櫻子問老師「興趣」是什麼。"
399214349 = "說明的場合"
3113818934 = "收到櫻子的協助要求後，老師便去了一趟。但協助的內容卻是，老師必須在修女們面前說櫻子不是可疑的人物。對櫻子的誤會越來越深。"
2003923680 = "季的每日任務"
1607965188 = "季一早就來到了夏萊。季因為一連串的事件而失去了工作，後來得到的結論是和老師一起共事。在季的輔佐下，老師開始了不平靜的一天。老師不禁擔心接下來要和季一起共事的日子。"
4288888721 = "普通的學園生活"
322319486 = "季因為出席天數不足，收到了留級的警告。雖然老師積極協助季過平凡的學園生活，但對季來說學園生活還是很陌生。"
1375907566 = "對興趣的煩惱"
3410652719 = "聽見季說自己週末都沒有任何消遣活動後，老師開始四處奔波。為了進行各種休閒活動找出季會感興趣的事，孤軍奮戰的老師依舊沒能獲得任何成果。"
284991053 = "女僕中的女僕"
3181693318 = "因私事而遲到的季請求諒解。因為季的行為太反常了，老師便前往工房查看季的狀況。老師突然的造訪讓她嚇了一跳，但她向老師解釋說自己為了成為最強的女僕，正在嚴格檢驗裝備當中。"
62419462 = "連結的信物"
2598613321 = "一如既往不請自來的季遞出了某樣物品，說是與老師之間連結的證明……"
3221453657 = "午後的品茶時間"
1575926616 = "老師和渚一起參加了茶會。老師拿出另外準備的「寶特瓶紅茶」。渚對初次看見的品牌感興趣，所以老師與她分享了紅茶，但卻因為受不了寶特瓶紅茶的味道而逃走了。"
3617335172 = "語亂即心亂"
3261002897 = "渚很擔心三一的學生近來不恰當使用語言的方式。她平常就養成正確的語言習慣，有自信無論遇到何種情況都能保持品味。不過三一學生的偏激行為導致報告爆炸性的增加了。"
578805062 = "紅茶與韻味"
2073459542 = "渚邀請老師來品嚐新的茶葉。但送來的不是康普茶，而是昆布茶。經過一番苦思後，渚再次招待喝茶且裝傻。"
1365827293 = "何不吃蛋糕"
1448253096 = "老師去附近的商街購買麵包。但店裡的麵包全都賣光了。進入店裡的渚想要把從其他店裡訂購的手工蛋糕分給老師一起吃。"
2105366932 = "反省室的居民"
214951891 = "造訪千年的老師在反省室遇見了小雪。但是小雪把反省室裝飾成自己的房間，生活反而過得相當快樂。"
2113534752 = "潘朵拉的盒子（１）"
4241439597 = "擔任夏萊值日生的小雪。小雪在和老師聊了很多後，突然對夏萊很感興趣，老師則在警戒這樣的小雪。後來小雪隱藏心中的陰謀，就這樣回去千年了。"
4083323257 = "潘朵拉的盒子（２）"
2414226696 = "小雪偷偷潛入夏萊想要調查各種祕密，但卻被老師發現了。逃跑的小雪奔向老師的居住區，在那邊發現了奇怪的書。"
2351755493 = "平時的所作所為"
2882100059 = "老師發現了在娛樂室因不斷失敗而憤怒的小雪。小雪解釋自己喜歡靠運氣的遊戲的理由，老師覺得很驚訝，但緊接著提議打賭。"
1850258284 = "幸運之證"
3499702459 = "老師在草地上發現了縮成一球蹲在地上的小雪。小雪在四處尋找四葉幸運草，期望運氣能因此而變好。老師和小雪最後終於發現了四葉幸運草。"
505934790 = "欺瞞的權利"
619630983 = "小雪請求幫忙尋找遺失的硬幣。找到的那枚硬幣，竟隱藏著小雪不為人知的過去……！"
168056968 = "增長的誤會"
2953254523 = "老師偶然在服飾店發現了在購買和服的佳世子。店員誤以為佳世子是地下世界組織的高層，且覺得相當傷腦筋。老師化解店員的誤會後，推薦了一套適合佳世子的和服。"
3556812176 = "新年的鐘聲"
1261302160 = "今天是一年的最後一天，老師和佳世子為了參加敲鐘活動來到了神社。但很遺憾的是，活動因為鐘樓狀況不佳而取消了。老師和佳世子在回程時沒能搭上末班車，後來只好在車站聽著首班車的信號鐘聲迎接新年。"
1594158572 = "貓與佳世子與甜酒與"
585940394 = "老師和佳世子為了購買御守而前往了神社。為了讓身體變暖，兩人喝了溫熱的甘酒。聽見某處傳來的貓叫聲後，佳世子便往聲音的方向走過去，後來跟上去的老師看見佳世子和貓咪開心玩在一起的景象。"
1021018790 = "消除壓力的方法"
1831690994 = "從新年初就開始忙碌的老師。為了安撫身心疲憊的老師，佳世子提議一起去聽和樂器的表演。雖然老師很期待平靜的和樂器表演，但佳世子介紹的表演卻是重金屬音樂風的和樂器表演。"
1676776936 = "製作門松"
2926389252 = "迎接新年，老師來到了遙香的基地。遙香因為沒能找到製作門松所需要的竹子而覺得煩腦中。老師建議遙香說心態很重要，後來遙香利用自己種植的雜草製作門松。"
4150553585 = "季節感"
882190145 = "老師很擔心冬天還穿著短浴衣的遙香，叮嚀她要小心感冒，並且買了點心和暖暖包給她。"
1010615852 = "寒冷的風，溫暖的心"
902806983 = "基於擔心遙香和草，老師來到了遙香的基地。老師買了熱食給在照顧雜草的遙香。"
1362773471 = "百鬼夜行的宣傳負責人，佳穗同學"
3015917284 = "佳穗雖然向老師進行了觀光產業的相關簡報，但老師的反應不如預期，後來她才發現工作信件並沒有順利寄出去。老師安慰覺得愧疚的佳穗，佳穗重新打起精神後，開始進行新的報告解說。"
813536488 = "比部長更像部長的佳穗同學"
1268253443 = "老師在陰陽部社辦見到了正在整理工作的佳穗。佳穗準備向老師介紹百鬼夜行學園的瞬間，百鬼夜行的學生們突然闖進來了。解決完百鬼夜行學生的事情已經是晚上，結果老師的伴遊就延到下次了。"
3589056262 = "佳穗同學的完美伴遊"
1155603011 = "佳穗為了挽回上次的失誤，再次邀請老師前往百鬼夜行。佳穗雖然介紹了百鬼夜行的魅力，卻因為各種誘惑而動搖了。不知不覺到了晚上，老師很享受和佳穗的約會。"
1779236823 = "佳穗同學計畫性的營業戰略"
44237873 = "收到佳穗的聯絡後，老師前往了陰陽部的休息室，在那邊見到了正在整理特別訂購的宣傳用周邊的佳穗。"
2501910877 = "蘊含心意的裝飾品"
1244005463 = "和老師一起清掃陰陽部休息室的佳穗，寶貝地擦著百鬼夜行學生送的感謝狀。同時向老師說明這感謝狀對自己有多重要。"
4137176117 = "女僕大危機！"
2046418808 = "收到愛麗絲的聯絡後，老師慌慌張張前往遊戲開發部活動室。為了一堆理由而不得已穿著女僕裝、以及飽受精神折磨的愛麗絲，老師提出克服女僕裝的方法。"
186589621 = "女僕學習大作戰！"
25252799 = "愛麗絲宣示要好好研究提升女僕等級的方法。老師抱持擔憂的心情前往遊戲開發部活動室，協助愛麗絲以正確的管道了解女僕。"
3585111616 = "出擊準備完成！"
3930937110 = "愛麗絲表示有重大消息要傳達，於是叫來了老師。抵達場所後，迎接老師的是正手忙腳亂換著女僕裝的愛麗絲。打扮好後，愛麗絲宣示要成為最強的女僕勇者，鬥志顯得相當高昂。"
3951701776 = "女僕勇者的裝備"
224308736 = "愛麗絲決定以女僕勇者的身分清掃老師的公會小屋，也就是夏萊。然而愛麗絲的喀秋莎卻在清掃的過程中髒掉了。愛麗絲把喀秋莎和其他要洗的衣物一起洗，和老師度過歡樂時光。"
3957314179 = "理由之後再說"
3997203066 = "老師和季一起參加了在豪華郵輪舉辦的派對潛入任務。老師和穿著兔女郎裝的季走在一起，周圍投射異樣的眼光，精神上承受的壓力已達到極限。"
2330192846 = "兔女郎的傳聞"
2392731156 = "一整天都待在辦公室裡思考。老師針對這個問題和季認真交談。但卻一無所獲。"
2672746772 = "讓心靈休息的場所"
2814303571 = "老師擔心因任務而聯絡不上的季，所以整晚都睡不好。天亮時，老師從淺眠中醒來，發現穿著兔女郎裝在自己床上熟睡的季。"
1746842993 = "參考資料是……？"
2920706888 = "柚子為了作為新研發遊戲的參考而穿上女僕裝。但因為天生自信心不足的關係，認為自己不適合當模特兒，顯得相當不安。老師鼓舞灰心喪志的柚子，並且給予了特別的建議。"
831733757 = "新的打工"
868737743 = "在夏萊從容辦公的老師。過了一會兒，傳來了急促的腳步聲，柚子哭喪著表情來到了夏萊。聽過原委後，她明白老師安排的打工是女僕咖啡廳，接著便逃離了咖啡廳。老師為了讓柚子能適應打工環境，於是提議進行女僕特訓。"
2231433090 = "櫃子裡的不速之客"
2256848622 = "外勤中的老師為了觀察柚子的狀況，於是便前往她打工的女僕咖啡廳。老師的出現讓柚子頓時很緊張，表現失常接二連三發生了失誤。稍後。休息時間已經過了，柚子依舊沒有回來，老師基於擔心就去找柚子，因此看見了令人意外的景象。"
1898965458 = "打掃遊戲開發部"
2028068753 = "為了協助柚子打掃，老師前往了遊戲開發部的部室。但柚子說的打掃並不是要清理部室，而是要對電腦進行最佳化。但看見部室一團亂的景象後，老師認為需要打掃，於是便向柚子提議打掃部室。"
1247993165 = "你好呀，澪紗"
2205362417 = "老師偶然在公車站遇見了澪紗。因為老師表示希望澪紗面對自己時能放輕鬆一點，在聽完老師的真心話後，澪紗獲得了一大助力。"
3620040079 = "相信吧，澪紗"
1349760893 = "澪紗為了徵求恢復疲勞的建議而來到了夏萊。看見澪紗疲憊不堪的樣子後，老師建議她不要太逞強。"
324482861 = "謝謝你，澪紗"
1014758945 = "為了報答這段期間老師的幫忙，澪紗親自進行護送。雖然一起去很多地方，度過了忙碌的時光，卻沒能創造出特別的回憶，心中不免覺得遺憾。"
3804324515 = "晚安囉，澪紗"
2635556863 = "老師去貧民區找獨自巡邏中的澪紗。老師在那邊發現了正在打瞌睡的澪紗。彼此互相趕走了睡意，並且一起去巡邏。到了早上，澪紗凝視著升起的太陽，並且傳達珍貴的感想。"
1171878055 = "儘管吃吧！"
257339176 = "瑠美因為有個人的事情需要幫忙而拜訪夏萊。在等待問題解決的時候，瑠美觀察了老師一整天，對於老師不規律的飲食習慣感到非常生氣。"
168583006 = "先試試味道吧！"
4087665218 = "老師收到瑠美的試吃邀請，因而拜訪玄武商會。但事情卻和老師的期待背道而馳，瑠美端出的都是一些極為創新的料理。"
6308616 = "服務業的煩惱"
4152447857 = "老師在工作結束後拜訪玄武商會。正要接受瑠美招待「主廚推薦菜單」的時候，出現了不受歡迎的無賴客人。"
7640267 = "我不在意哦？"
2967789925 = "某個特別的日子，玄武商會在大量烹煮餃子。老師想要參觀烹煮過程，於是前往拜訪瑠美。沒想到除了餃子之外，還看到意料之外的熱鬧場面。"
3324623418 = "第一印象"
361199515 = "與充滿雄心壯志的宣言相反，美奈第一天值日就遲到。一步錯步步錯，美奈的值日活動朝著出乎意料的方向發展。"
855234387 = "直笛練習"
2959531408 = "玄龍門的執行部長美奈為了維持山海經的治安，總是不分晝夜地努力。雖然是值得視為模範的行為，但行為本身似乎又反映出某種獨特的偏好。"
1904261494 = "雨空之色"
2823268309 = "老師在結束山海經的公務後走出門，碰到突如其來的陣雨。正當老師因為沒有雨傘而不知如何是好的時候，美奈拿著雨傘出現了。"
2904966419 = "即使時間流逝"
3295408939 = "老師和美奈一起去見梅花園的孩子們，看著平時形象是「黑色電影」風格的美奈和孩子們打成一片的模樣，老師發現美奈也有讓人意想不到的一面。"
244539017 = "建築是如何建成的"
267837178 = "老師徹夜處理工作後，在準備搭清晨首班車回家的時候，偶然被捲入工務部的人潮中。稀裡糊塗地抵達工作現場後，老師決定和實里一起參訪現場。"
725869297 = "實里．扭扭舞"
366290358 = "老師偶然在赤冬學園的圖書館遇見實里，隨意地聊起平時常看的書。不過實里的閱讀路線完全和平凡二字相去甚遠……"
3493912546 = "僅有兩人的鷹架"
2598860157 = "某天，工務部的工作因寒冷而取消，老師帶著零食點心到訪工務部。實里正在工作現場獨自做安全檢查，面對老師的意外來訪，為老師介紹只有工務部可以欣賞到的特殊風景作為謝禮。"
3231977855 = "奇普托斯的學生為何會不幸？"
164078001 = "為了處理夏萊的值日工作，實里來到辦公室。實里指出值日工作制度的漏洞，並慷慨激昂地表示奇普托斯的不平等正是肇始於這種值日制度。"
432672538 = "SRT，購買"
131504888 = "收到都子的聯絡後，老師前往百貨公司。都子正在煩惱要用別人送的商品券買什麼東西，拜託老師幫忙購物。在採買各種物資後，都子陷入苦惱，不知道買新泳裝的時候應該要以實用性還是以可愛造型為優先。"
4182954826 = "SRT，訓練"
3400306939 = "為了進行海上人質救援作戰訓練，都子和老師一起乘船出海。都子按照訓練內容把老師綁了起來，卻發生意料之外的問題。"
2954136082 = "SRT，探險"
1741566074 = "老師和都子一起經過退潮的泥灘，前往無人島玩耍。都子為了參觀美麗的小島，錯過了回去的時間。都子和老師一邊等待下次退潮一邊殺時間，偶然在島上發現了一群兔子。"
2048487267 = "SRT，報告"
2604825862 = "清晨時分，老師在海邊散步的時候遇見了出門做晨間運動的都子。"
3616835660 = "水中補給作戰（１）"
3120962973 = "收到咲希的聯絡後，老師前往碼頭。咲希說自己得到了村民發的海產採集許可，並發下豪語表示因為平時給老師添了很多麻煩，所以要用昂貴的海鮮招待老師。不過咲希一直抓不到魚，結果一氣之下大肆掃射水中的魚。"
1056477700 = "水中補給作戰（２）"
3726172857 = "再度收到咲希的聯絡後，老師前往碼頭。咲希在村子倉庫裡發現名為刺突爆雷的工具，宣告這次一定要用它抓到魚。不過刺突爆雷的威力超乎預期的強烈，會讓射中的魚支離破碎。"
2099064502 = "潛藏於泥灘之物"
3715648582 = "收到咲希的聯絡後，這次老師前往的地方是泥灘。咲希和老師在泥灘採集各種神奇潮間帶生物，度過愉快的時光。"
3856082788 = "深海，淺息"
4086115667 = "老師在漁村散步的時候，偶然遇見輕裝浮潛去清理海底的咲希。咲希得知老師沒有潛水經驗後，向老師提議一起潛水。"
1203774988 = "碼頭的狙擊手"
359062505 = "老師聽說美優要測試新的偽裝，於是來到碼頭邊。為了避人耳目，美優偽裝成釣客在那裡釣魚。不過美優卻在無意間釣到一條大魚，反而受到周圍的熱烈關注。"
1400267850 = "留住回憶的方法"
