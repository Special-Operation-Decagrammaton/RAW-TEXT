140507024 = "幸運草作戰（２）"
3559020515 = "在深感混亂的小隊成員面前，都子再次實際感受到自己的無力。但由於老師和小隊成員的信任及發自真心的加油，這讓都子再次得到勇氣，制定了逃離作戰區的計畫。"
1348297398 = "幸運草作戰（２）"
3884614313 = "都子和RABBIT小隊隊員們根據都子的指示，一絲不亂的鎮壓住女武神警察學園的學生們，並前往屋頂。"
3001093634 = "大人的時間"
549448127 = "環奈出現在抵達屋頂的小隊成員面前，擋住他們的去路。環奈認為在各種特權下執行作戰的SRT學園談論正義很不公平而感到生氣，但是在老師的指點下，領悟了自己的錯誤而退了一步。平安歸來的RABBIT小隊隊員們將證據交給老師後，便沉沉睡去。"
1089763991 = "狐穴"
2732075377 = "事件結束後，公安局和凱薩集團的回扣事件曝光，因而陷入困境好一段時間。兔寶寶公園重新找回和平，RABBIT小隊的學生們也再次找回平靜的日常生活。另一方面，聯邦學生會的防衛室長香耶暗中和原以為消失的FOX小隊碰面，計劃在聯邦學生會發動政變。"
2657253984 = "狐狸做的夢"
2098684420 = "2年前，SRT特殊學園剛成立的時候。FOX小隊正在凱薩工業的彈藥工廠前為他們第一次的作戰計畫進行簡報。接著時間再度跳轉回現在，已經在奇普托斯各地展開破壞行動的FOX小隊正在準備迎接他們的後輩。"
3818520446 = "兔子做的夢"
252378376 = "不知不覺間，RABBIT小隊一行人漸漸適應公園的露宿生活。正在準備早餐的時候，夏萊的老師來訪並送上昂貴的牛肉，表示是對上次事件的謝禮。"
1519446641 = "誘餌"
2004501637 = "RABBIT小隊和老師一邊烤牛肉來吃，一邊度過愉快的時光。小隊成員們在萌幫助下查看上次作戰當時的監視錄影，看見配戴SRT裝備的可疑黑影。RABBIT小隊想起之前向武器商出售裝備的事情，對於讓老師陷入困境感到內疚，於是下定決心要祕密逮捕犯人。"
2488756278 = "出乎意料的重逢"
2671501519 = "RABBIT小隊追查可疑的黑影，一路來到目標地點。雖然順利掌控住該地區，但小隊成員們的通訊因為突如其來的襲擊而中斷。隨後，孤立一人的都子與意料之外的人物重逢。"
942163621 = "前輩的影子"
3816355345 = "遇見許久未見的FOX小隊，RABBIT小隊成員們一起分享仁子準備的豆皮壽司，愉快地聊起近況。不過也只開心了一下而已。當都子追究起襲擊的事，雪乃便透露真正的來意，邀請對方加入FOX小隊，讓都子感到混亂。晚一步追上RABBIT小隊的老師要求對方給自己一點時間，便帶著RABBIT小隊回到兔寶寶公園。"
2758921771 = "後輩的苦惱"
4159709149 = "回到兔寶寶公園後，RABBIT小隊談論起FOX小隊的過去，並苦苦思考前輩們突然改變的原因。此時，聯邦學生會發出廣播，公布香耶將代替琳擔任聯邦學生會代理會長的消息。"
1587683690 = "政變"
1212060240 = "在香耶發出廣播的幾小時前，聯邦學生會就日前發生的事件的善後事宜進行激烈的討論。會議結束後，琳在回家的路上被香耶襲擊並被軟禁起來，掌控行政委員會輿論的香耶登上聯邦學生會代理會長的寶座。"
520211906 = "新任代理"
3987261099 = "老師應香耶之邀來到聯邦學生會。香耶提出新的行政程序改善方案，試圖拉攏老師，不過卻遭到老師一口回絕。"
1497265820 = "D.U.嶄新的早晨"
1641525659 = "隨著新行政命令的施行，D.U.各地都派有維持治安的凱薩保全人員。市民的自由受到凱薩保全系統的限制，眼見人們被無故拘捕，RABBIT小隊試圖提出抗議，但凱薩將軍卻現身談起權力、服從與價值。"
1720696531 = "失控"
3618496825 = "作為新任聯邦學生會代理會長，香耶想要推展新的業務，但奇普托斯各地無法預測的事件和事故接踵而至。"
115168734 = "黑咖啡"
3651125542 = "老師在去兔寶寶公園見RABBIT小隊的途中，撞見桐乃和凱薩保全人員爭執的場面。雖然幸好糾紛在環奈的幫助下得到調解，不過環奈和桐乃對於新的行政命令導致D.U.陷入混亂的情況表示憂心。"
2609050753 = "決心"
1905103418 = "老師抵達兔寶寶公園。不過卻遍尋不著RABBIT小隊的身影，只看見一封都子留下的信。"
1718431036 = "衝擊與恐懼"
1319244017 = "香耶為了整治D.U.的亂象召開會議。但情況一時之間難以化解，香耶把將軍和雪乃叫到辦公室，催促他們趕緊解決。就在此時，香耶腦中浮現了一個可以解決亂象的妙計……"
3006987774 = "囚徒困境"
2130705949 = "夜裡，老師整理好公園後回到夏萊，從小空那邊聽說便當訂單被全部取消的消息。辦公室出現意外的訪客，為沒吃晚餐就回到辦公室的老師帶來豆皮壽司。"
1786519907 = "SRT的正義"
1305326365 = "RABBIT小隊成員們和前輩們一起訓練，在乾淨的淋浴間洗澡，難得地過著豐衣足食的生活，不過都子內心總覺得不踏實。洗完澡的都子在執行戒備工作的時候，在基地外圍發現觸發警報裝置的老師。"
2062986205 = "老師的情況"
4072771013 = "都子在審訊室和老師談話。都子表示雖然心裡不好受，但這都是為了SRT的復甦，不過聽完老師說的話，都子得到了一點啟發。把老師送回基地外後，都子正式向雪乃宣戰。"
2788876369 = "錦衣夜行"
318148566 = "次日，老師在兔寶寶公園與都子再度見面。都子說FOX小隊打算炸掉兔寶寶車站，她想要阻止這件事發生。都子和老師一起前往兔寶寶車站，遇見了在那裡工作的笛卡爾。"
1554714519 = "菁英與菁英"
1900114770 = "笛卡爾大膽地向凱薩保全系統發動攻擊，但卻未能換來豐碩的戰果，反倒陷入了苦戰。此時，環奈和生活安全局的學生們現身，向都子一行人伸出援手。"
347599141 = "菁英與菁英"
552425972 = "在環奈和生活安全局的活躍下，凱薩保全系統徹底瓦解，都子和老師趁機前往車站地下。"
4105357213 = "深淵"
2925617176 = "都子和老師在兔寶寶站的地下目睹巨大的導彈筒倉。不僅如此，FOX小隊已經佔領了筒倉，正在展開防禦作戰。此時，RABBIT小隊的學生們及時趕到與都子會合。"
965452976 = "卡班諾的洞窟（１）"
1568447496 = "FOX小隊和RABBIT小隊以完全相反的戰術展開作戰準備。"
1976030888 = "卡班諾的洞窟（１）"
3156367598 = "FOX小隊帶著老手的姿態以老練的戰術迎戰RABBIT小隊，卻不敵RABBIT小隊天馬行空的戰術接連發生失誤，敗下陣來。很快，RABBIT小隊掌控了通往操作室的電梯通道。"
892239188 = "卡班諾的洞窟（２）"
2435344861 = "眼見其他的FOX小隊成員們全都失去力氣，雪乃讓小隊成員們去外面躲避，並威脅RABBIT小隊要直接引爆導彈，不過RABBIT小隊還是不顧一切地要進入操作室。"
3979027752 = "昨天與明天的我們"
1693248650 = "就在雪乃即將按下引爆鈕的剎那，原以為已躲起來的FOX小隊成員們來到了她的身邊，RABBIT小隊和FOX小隊在操作室前展開激烈的戰鬥。"
3373122807 = "昨天與明天的我們"
2860466848 = "激戰過後，FOX小隊被RABBIT小隊徹底壓制。都子向雪乃說出自己心目中前輩的樣子，雪乃回想起過去的夢想，最終決定投降。"
3729157719 = "失敗的政變"
875871241 = "香耶聽聞FOX小隊敗北的消息後感到驚慌失措，打算動員凱薩保全系統反擊，但面對團結一心的RABBIT小隊，凱薩保全系統的士兵根本不堪一擊。"
2757905344 = "失敗的政變"
340280301 = "RABBIT小隊和老師再度與香耶面對面。香耶嘗試用各種花言巧語說服老師，但她策劃的陰謀已完全曝光，最終落得垮台的結局。"
696032468 = "尾聲"
253503154 = "事件完全結束後，香耶被彈劾，所有相關人士遭到收押。待在矯正局的仁子收到某人從外面送來的一封信和豆皮壽司，露出了微笑。"
2141989400 = "序幕"
3946132036 = "有一天，老師收到仁耶的聯絡，表示希望老師可以來百鬼夜行一趟。想試著見葛葉一面的老師決定答應仁耶的提議並前往百鬼夜行。"
867945468 = "意想不到的相遇（１）"
2534282816 = "老師來到百鬼夜行後，目睹一名女學生跟太妹為了居民的皮夾發生衝突。女學生衝向太妹奪回皮夾，太妹驚慌之餘連忙喚來自己的同伴。"
784650514 = "意想不到的相遇（２）"
1005886133 = "紫和老師成功趕走了太妹後，居民對幫忙找回皮夾的紫表示感謝。居民離去後，紫正式向老師問好，並帶領老師前往燈籠祭會場，不過卻遇到了家裡的僕人，於是便匆匆離去。"
3919672259 = "於陰陽部"
2802641052 = "仁耶與老師見面，討論目前百鬼夜行正在籌備的慶典，並提到「花鳥風月部」寄來的恐嚇信。關於此事，仁耶表示想請老師伸出援手。就在老師點頭答應的同時，紫打開了陰陽部的大門。"
3637226461 = "自稱菁～英少女登場！"
1078075001 = "來到陰陽部的紫談起名草銷聲匿跡後再次出現的事，並請求仁耶協助百花繚亂的「繼承戰」。之後仁耶將這件事託付給了老師。"
2370772485 = "下一個目的地"
2706623289 = "為了復興百花繚亂，紫下定決心進行「繼承戰」。於是紫決定找其他百花繚亂的前輩來協助「繼承戰」，為此他拜訪了蓮華的家，卻在那裡發現了一張紙條。"
3399810198 = "朝青春(?)邁進的少女（１）"
1054335404 = "為了找到因踏上「找回青春的旅行」而離開的蓮華，紫和老師一起拜訪了各種社團，卻沒能順利找到蓮華。就在兩人稍作休息並討論日後計畫的時候，楓突然撲向了老師。"
4196717210 = "朝青春(?)邁進的少女（２）"
2076588919 = "原本受節慶營運管理部所託，正在檢查百鬼夜行設施的修行部和老師進行了閒聊。就在聊到一半的時候，新和妖怪劇團突然亂入，接著蓮華出現了。"
2273835101 = "朝青春(?)邁進的少女（２）"
3687320158 = "老師一行人成功趕走了新和妖怪劇團。紫奔向蓮華，但突如其來的相遇卻令蓮華驚慌失措。"
3665538726 = "不破蓮華"
4273860323 = "作為「青春活動」的一環，蓮華正在與修行部同行，紫請求蓮華協助繼承戰。聽聞紫提起繼承戰的事，蓮華憤怒地表示拒絕並採取行動。"
1700027356 = "不破蓮華"
3723106540 = "蓮華壓制住紫，並對紫喝斥道百花繚亂已經無法回到從前，之後便離開現場。修行部的學生連忙追了上去。"
503705097 = "通紅的臉"
1747027451 = "儘管蓮華的事讓紫感到混亂，但他仍很快穩住心神。就在紫打算去找其他百花繚亂前輩時，因為僕人出現，紫再度暫時離開。和紫分開後，老師在慶典現場到處閒逛時，碰上了突如其來的騷動，以及被捲入騷動中的少女。"
2958590599 = "百花繚亂的成員"
3591646746 = "少女在與新和妖怪劇團間展開的連環戰中逐漸趨於弱勢。就在這時，老師出手幫助了少女，並一起從現場脫身。少女說自己是已退出百花繚亂的成員，並和老師聊起關於百花繚亂的事。"
398789845 = "桐生桔梗，以及繼承戰（１）"
1542367438 = "隔天，老師和紫會合後，為了見桔梗而來到了百花繚亂的調停室，並在那裡見到了桔梗及靜子。紫開口拜託桔梗協助「繼承戰」，但桔梗卻說這件事從一開始就是不可能的，並表示要證明這一點，和紫進行了「繼承戰」。"
1013593128 = "桐生桔梗，以及繼承戰（２）"
1716918261 = "桔梗喝斥在「繼承戰」中敗北的紫，叫他別再玩大小姐的遊戲了。最終無法承受的紫選擇離開，留在現場的老師和桔梗開始聊起現在的百花繚亂。就在這時，敗給名草後正在發牢騷的妖怪劇團，遇見了一位散發奇異氣質的少女。"
3225732755 = "下定決心的少女"
1744921907 = "靜子和老師分頭尋找紫。好不容易和紫重逢後，靜子要紫跟自己回去，紫卻搖搖頭，向靜子表達自己的決心。就在這時，老師又在街上遇見了一名可疑的少女。"
3704592008 = "相遇"
1747430871 = "少女表示自己是花鳥風月部的成員，留下一句意味深長的話後便消失在人潮之中。此時，老師從靜子那邊聽說他找到紫之後發生的事，於是決定要找名草打聽百花繚亂的內情，聯絡了忍術研究部。"
4268581401 = "御稜名草"
143447072 = "就在名草回憶著百花繚亂時期的過往時，老師出現在他的面前。名草說出自己的真實來歷後，繼續和老師進行交談。就在揭開慶典序幕的煙火聲響起的瞬間，幻魎百物語忽然出現，使慶典街道陷入一片混亂。"
644791031 = "漫步街道的怪談（１）"
2513148571 = "就在紫為了履行家族的義務離開的時候，曾表示這一切都已經結束的蓮華在修行部的忠告下，想起了自己真正想做的事是什麼。此時，所有人都在為平定百鬼夜行各地出現的幻魎百物語而行動著。"
2982310612 = "漫步街道的怪談（２）"
1779959641 = "整頓混亂的街道的同時，名草向老師說明了關於幻魎百物語的事。隨後兩人意外和修行部與蓮華相遇，就在空氣因尷尬而凝滯的時候，伴隨著一聲響亮的嚎叫聲，戰鬥突如其來地開始了。"
1944548097 = "花鳥風月部的怪談家（１）"
3436163381 = "和幻魎百物語展開戰鬥後，對方毫髮無傷的樣子讓一行人不知所措。就在名草說要有資格才能打倒對方的時候，棕櫚出現在名草面前嘲笑了他。"
3203640400 = "花鳥風月部的怪談家（２）"
1142989290 = "棕櫚無視老師和椿的攻擊，表示事態完全照自己的計畫發展，然後便離開了現場。隨後黑影擋在想追上棕櫚的一行人面前。"
930282140 = "花鳥風月部的怪談家（２）"
790387478 = "無論何時何地，不管自己個人的意願為何，紫都要代表家族站在舞台上。因為沒有任何人尊重自己的意願，紫心中的失望感越來越強烈。就在這時，他聽見了一個聲音對自己耳語。"
4033191432 = "即便如此也想對你訴說"
3274326348 = "面對無法擊潰的黑影，所有人被困在現場束手無策，此時，桔梗出面說服了名草。桔梗表示只有具備資格的他能夠拯救紫，在桔梗的說服下，名草決定和老師一起向前邁進。"
1742211216 = "被烈火包圍的街道"
1706685059 = "老師與名草被源源不絕的幻魎百物語擋在廣場的舞台前方，幸好陰陽部及忍術研究部及時趕到伸出援手。"
3155421652 = "被烈火包圍的街道"
1197423923 = "棕櫚出現在紫面前。棕櫚利用紫製造出幻魎百物語「無貌的形代」並使慶典街道陷入火海。就在紫受到衝擊而昏厥的時候，老師和名草出現了。"
3881819382 = "捏造的謊言"
