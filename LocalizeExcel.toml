3783454783 = "Deals [c]{param;BasePower}[/c] damage to a random enemy. If damage is dealt to the Front enemy, a single-use version of this card gets copied into the hand.\n\n\n[c][75b4c0][i]\"Wow, you can't beat Hyakkiyako when it comes to festivals, right? So let's go on a patrol for a bit...!\"\n- Allied Hyakkiyako Academy Yin-Yang Club President, Amachi Niya[/i][-][/c]"
