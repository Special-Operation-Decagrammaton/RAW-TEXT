171315427 = "對策委員會和老師成功擋下了高地人鐵道學園的襲擊。前來收拾善後的人是高地人鐵道學園的監督官蘇芳。蘇芳表示日後會給出明白的解釋後，帶著雙胞胎離開了。"
809304558 = "那些逝去的事物"
2228531499 = "野乃美以前畢業後進入了阿拜多斯高中，而非高地人鐵道學園。綾音說明關於高地人鐵道學園的情報後，原本已經回去的高地人鐵道學園一行人再度來訪。"
2066588167 = "沙漠橫貫鐵路"
3245151085 = "高地人鐵道學園一行人帶著債權人一起找上對策委員會。債權團體的代表為了說明自己的目的，拿出了有夢的簽名的合約。"
