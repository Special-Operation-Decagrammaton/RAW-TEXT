1593486785 = "독 안에 든 쥐"
707855630 = "축제의 마지막"
1580334319 = "엑스포 참관을 위해 밀레니엄 캠퍼스에 도착한 트리니티 학생들.\nC&C의 환대 속에서 행사를 진행하려던 세이아는, 그러나 문득 수상한 학생들의 움직임을 발견하고 쫓는다."
1485885318 = "수상한 학생들의 움직임을 쫓아 지하도로 들어간 세이아.\n들키지 않고 이야기를 엿듣기 위해, 상자로 위장하여 다가가기 시작한다. 그리고 그곳에서 조우한 것은…."
3524856260 = "네루와 함께 리오의 은신처로 향한 세이아.\n그곳에서 두 사람의 상황을 듣고, 자신이 보고 들은 것이 모두 사실임을 확인한다. 이후 손님으로서 자신을 보호하려는 두 사람에게, 세이아는 정보 제공을 대가로 한 가지 요청을 꺼내 든다."
3055035619 = "세이아라는 새로운 전력이 생긴 리오는, 조금 더 적극적으로 상황을 조사하기 위한 작전을 구사한다."
1087244281 = "리오의 지시대로 캠퍼스를 조사하기 위해 나온 세이아.\n<모든 곳이 불안한 밀레니엄>에서 단서를 찾기 위해, 우선 학생들이 많은 교실로 향한다."
3603561 = "교실에서 방과후디저트부 부원들과 만난 세이아는, 부원들로부터 <로봇 펫>에 대한 이야기를 듣는다.\n신기하기도 하고 흥미롭기도 한 그 주제에, 세이아는 모두를 도와 잃어버린 로봇 펫을 찾기로 한다."
3962754328 = "로봇 펫이 로봇 악어였음에 당황하는 세이아에게, 카린과 아스나는 \"밀레니엄에선 흔한 일\"이라고 말한다.\n세이아는 로봇 악어를 만든 곳이 엔지니어부라는 사실을 듣고, 엔지니어부를 직접 찾아가기로 한다."
1344822250 = "날뛰던 아방가르드군을 어렵사리 제압한 후, 유우카가 찾아와 엔지니어부를 추궁한다.\n엔지니어부는 억울함을 호소하고, 세이아는 망가진 아방가르드군 안에서 수상한 칩을 발견한다."
2239397365 = "수상한 칩을 건네받은 리오는 칩으로부터 어떤 <의도>를 감지한다.\n한편 그런 리오와 대화하던 세이아는, 리오 또한 전과는 조금 달라져 있음을 감지한다."
1398523524 = "네루는 데이터 센터로의 잠입을 준비하고, 리오는 그런 네루를 위해 작전용 USB와 보안키를 전달한다."
1813766078 = "데이터 센터에 잠입한 네루는 목표 지점에 도착하지만 또 다른 문제에 당면한다.\n하지만 곤란해하고 있던 네루에게, 누군가의 익숙하고도 시끄러운 목소리가 들려온다."
1717919827 = "데이터 센터의 정보들로 정황을 파악한 리오.\n사건은 세 사람이 생각했던 것보다 훨씬 더 큰 문제였고, 더 이상 이를 좌시할 수 없었던 리오는 현장 급습 작전을 준비한다."
2988794607 = "세이아를 위해 빠르게 데이터 흐름을 조사한 리오.\n세이아는 리오의 배려를 눈치채고, 그에 보답하기 위해 게임개발부로 향한다."
58980428 = "게임개발부에 도착한 세이아는 그곳에서 아리스와 유즈를 만난다.\n아리스는 세이아를 <도적 클래스>라고 칭하며, 그녀와 함께 게임개발부의 게임 시연장으로 출발한다."
3905697355 = "게임개발부의 모두가 열심히 만들었다는 시연장의 게임.\n하지만 어째서인지 게임은 사람의 분노를 일으키는 모양새로 변질돼 있었고, 덕분에 시연장은 일대 혼란에 빠진다."
1699322212 = "게임을 망친 칩을 조사한 리오는, 엔지니어부 때와 마찬가지로 의도적인 사보타주임을 확인한다.\n하지만 그것과는 별개로, 이미 게임의 난이도와 퀄리티에 대해서는 따로 언급하지 않으려 한다…."
1906942469 = "현장 급습을 위해 피트니스 센터로 향한 네루.\n별다른 문제가 없는 줄 알았지만 곧바로 기계 오작동 문제가 발생하며 하스미와 스미레를 곤란하게 만든다. 네루는 문제를 발생시킨 학생들을 발견해 뒤를 쫓는다."
2940778481 = "수상한 학생들을 뒤쫓은 네루는 마침내 그들을 따라잡아 제압한다.\n하지만 배후의 존재가 전화 통화로 연락을 해오고, 폭발을 일으켜 그들을 탈출시킨다. "
2077988676 = "현장 급습 작전이 실패하자, 리오는 그들을 직접 수색해서 찾아내는 수밖에 없다고 말한다.\n지금까지의 방법만으로는 안 된다고 판단한 리오는, 그간 비밀에 부쳐두었던 <빅 시스터 알고리즘>을 언급한다."
4128574415 = "빅 시스터 알고리즘을 사용하기 위해 다시 한번 데이터 센터로 향하려는 리오.\n세이아와 네루는 혼자서 모든 책임을 뒤집어쓰려는 리오에게 핀잔을 주며, 함께 작전을 진행하겠다고 선언한다."
559738736 = "마침내 도착한 빅 시스터 알고리즘의 방.\n모든 것은 미라이의 계략이었고, 일행은 위기에 빠져 빅 시스터 알고리즘을 빼앗길 위기에 처한다. 하지만 당황하는 리오나 세이아와 달리, 네루만큼은 무언가 믿는 구석이 있다는 듯 태연하다."
3964034247 = "선생님과의 협력으로 최대의 위기를 넘긴 일행.\n당혹스러워하던 미라이와 일당들은 결국 모두 체포된다."
2454044807 = "리오는 문제가 해결됐다며 떠나려 하고, 세이아와 네루는 엑스포를 즐기지 못하고 떠나는 리오가 아쉽다.\n세이아는 순간적인 재치로 형편 좋은 변명을 떠올리고, 리오에게 한 가지 제안을 건넨다."
4226564748 = "리오는 엑스포 회장에 존재하는 <위험한 전시품>을 회수하고자 작전을 구상한다.\n세이아는 리오에게 추가적인 장비를 건네받고, 최첨단 장비를 이용한 잠입을 시작한다."
3409180479 = "엑스포 회장에 남아 있던 미라이 일당의 잔당들을 파악한 리오.\n아직 수익을 포기하지 못한 그들은 출품작을 훔치려 들고, 네루는 그들을 일망타진한다."
3753568740 = "경비가 더욱 강화됐다는 시연장에서 정체불명의 움직임이 포착된다.\n더 이상 혼자 잠입할 수 없는 수준의 보안이 되었기에, 리오는 네루와 세이아 두 사람을 동시에 투입하여 무슨 일인지 알아내고자 한다."
2190721227 = "엑스포 회장의 강화된 경비 드론들이 오작동을 일으켜, 이대로라면 다음 날 아침의 관람객이 다칠 수도 있는 상황에 이른다.\n리오는 그들을 제압할 수 있는 작전을 구상하고, 두 사람은 능숙하게 회장으로 잠입해 드론들을 정지시킨다."
1147821016 = "선생님은 네루에게 잠입 말고 엑스포 자체도 즐기라는 조언을 건네주고, 조언을 전달받은 세이아는 엑스포 회장을 관람하기로 한다.\n하지만 순수하게 관람객으로서 관람하고 있던 그녀에게도, 전혀 상상하지 못한 위기가 들이닥치는데…."
2551732620 = "며칠간 이어진 두 사람의 잦은 잠입에, 세미나는 특단의 조치를 취한다.\n세미나가 판 함정에 빠진 두 사람은 위기 속에서 극적인 탈출을 감행한다."
4087116818 = "엑스포의 마지막 날이 되고, 세이아는 그간 만났던 이들과 인사를 건넨다.\n하지만 훈훈하게 마무리될 것 같았던 마지막 인사도, 아직 붙잡지 못했던 <로봇 펫>의 등장으로 아수라장이 된다."
