2499107451 = "ซูเปอร์โอยาโกะด้ง?!"
1609115689 = "ผู้เชี่ยวชาญโอยาโกะด้งที่รู้สึกว่าเจอกับทางตัน ออกไปบนถนนเพื่อหา\nรสชาติใหม่ ผู้เชี่ยวชาญไม่สามารถหาน้ำที่เข้ากันได้พอดี จึงขอความช่วย\nเหลือจากสึซึมิที่ผ่านไปทางนั้นพอดี สึซึมิเสนอไอเดียเป็นสามแรงบันดาล\nใจให้กับผู้เชี่ยวชาญ และเกิดเป็นเมนูใหม่ของเขาได้ในที่สุด"
1290044481 = "อาชญากรรมที่เงียบเชียบ"
4077437065 = "มิเนะลงมือปฏิบัติการบรรเทาทุกข์เพื่อจัดการกับเหตุวุ่นวายจากพวกนักเลง\nแต่กรมความมั่นคงสาธารณะไม่ออกปฏิบัติการ ระหว่างมิเนะคัดค้านอย่าง\nแข็งขันเมื่อได้ฟังสาเหตุที่กรมความมั่นคงสาธารณะไม่สามารถออกปฏิบัติ\nการได้ วาคาโมะเลยหนีไปได้อย่างสบาย"
