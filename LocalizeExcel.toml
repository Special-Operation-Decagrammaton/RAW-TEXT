4105665590 = "한 치 앞도 모른다"
1877741647 = "헬기 구입을 자랑하기 위해 대책위원회의 모두를 소집한 아야네. 하지만 뒤늦게 찾아온 세리카가 '1등상'에 당첨됐다고 소리친다."
1346643999 = "정말 한 치 앞도 모른다 1"
2189810503 = "생각지도 못했던 1등상 당첨으로 무인도 리조트 휴가를 가게 된 대책위원회와 선생님. 인생은 한 치 앞도 모른다며 농담을 하던 대책위원회의 말 그대로, 헬기가 추락하며 한 치 앞도 모르는 상황에 빠져 버린다."
2683639091 = "정말 한 치 앞도 모른다 2"
1868167028 = "헬기도 리조트도 모두 사기당한 거나 다름없다는 사실에 절망하는 세리카. 하지만 선생님과 다른 부원들은 세리카를 격려하고, 다시 힘을 차린 세리카는 최고의 휴가를 보내겠다고 다짐한다."
1755482596 = "좀 더 그럴싸한 변명을 1"
3178234890 = "그룹을 나눠 리조트 안을 정돈하던 세리카와 호시노 그리고 선생님. 그런데 거의 다 청소가 끝나가던 그 순간, 라브와 헬멧단이 습격한다."
2119647362 = "좀 더 그럴싸한 변명을 2"
2685399187 = "라브와 헬멧단을 쫓아내는 데에 성공한 세 사람. 하지만 뒤늦게 찾아온 노노미와 아야네, 시로코는 싸움으로 어질러진 주변을 보며 청소가 되지 않았다고 오해한다."
1541851928 = "선제 필승 1"
1621492409 = "식량을 구하기 위해 갯바위 낚시를 나간 시로코와 선생님. 두 사람을 걱정하던 아야네도 뒤따라온다. 시로코 또한 아야네를 향한 신뢰를 숨기지 않는다."
3445130317 = "선제 필승 2"
1174669819 = "라브의 지원군으로 찾아온 와카모는 그곳에 있는 선생님의 존재에 당황하다 대패하고 도망친다. 하지만 와카모의 존재를 확인한 선생님은 앞으로의 전개가 순탄치 않을 것으로 예상한다."
806822330 = "선생님을 구하러 왔답니다. 1"
4019663412 = "선생님이 이곳에 있다는 사실을 알고 진심을 다하게 된 와카모는 선생님의 위협이 될 것 같은 라브를 밀어내고 헬멧단을 장악한다. 아예 헬멧단을 이끌게 된 와카모는 다시 한번 선생님과 대책위원회에 도전한다."
2351574080 = "선생님을 구하러 왔답니다 2"
2322437162 = "다시 한번 힘겹게 와카모를 쫓아낸 대책위원회. 자리에 없었던 시로코는 뒤늦게 돌아와 그 상황을 발견한다."
1269668176 = "초대받지 않은 손님 1"
3542746869 = "리조트 복구를 위해 전기실을 찾아간 대책위원회. 성공적으로 전기를 복구하게 된다. 그런데 전기실 내부에 있는 리조트 방어 시스템이라는 것을 보고 호기심에 그것을 가동시키자, 가동된 경비 로봇들로부터 습격을 받게 된다."
2399187411 = "초대받지 않은 손님 2"
2351619502 = "가까스로 시스템을 안정화시킨 대책위원회는 다시 리조트로 돌아온다. 그런데 어째서인지 리조트 주변에 있던 헬멧단들도 모두 경비 로봇에게 당해 쓰러져 있었다."
3081295153 = "한여름 밤의 꿈"
78535287 = "우여곡절 끝에 리조트를 안정화시킨 대책위원회 부원들. 모처럼의 평화로운 저녁을 즐기며, 여름 바다의 힘으로 평소보다 솔직한 말들을 주고받는다."
3720861641 = "조금 많이 큰 튜브"
3009396054 = "휴양지답게 늦잠을 잔 선생님. 호시노와 함께 느긋한 시간을 보내려 했지만 호버크래프트를 탄 와카모와 헬멧단이 쳐들어온다."
1077182490 = "중장비에는 중장비로"
2820779354 = "호버크래프트를 끌고 온 와카모에게 고전하던 호시노와 선생님. 남은 대책위원회 부원들은 아야네의 헬기를 끌고 와 와카모의 호버크래프트에 맞서 최종전을 펼친다."
2364370372 = "리조트 사용권의 진실 1"
848028279 = "최종전에서 승리한 대책위원회는 라브로부터 생각지도 못한 리조트 사용권의 진실과 리조트 사냥, 그리고 주변 군도의 상황에 대해 듣게 된다."
1316559450 = "리조트 사용권의 진실 2"
184087796 = "선생님이 돌아간 후 남겨져 있던 대책위원회는 뒤늦게 리조트 사용권 구석에 적혀 있던 '최종권리자'를 확인하게 된다."
2778041043 = "출장! 백야당 바다의 집 프랜차이즈 계획"
