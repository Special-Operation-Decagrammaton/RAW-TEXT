3344696113 = "最近のデリバリーって店の宣伝もしてんの？\nさっき配達の子からいなり寿司もらってビックリした。\n普通に美味しかったけど、これ採算取れてる……？"
4073972244 = "なんか今年、カニがめちゃくちゃ捕れてるんだって。\n漁師やってる親戚が言ってた。値崩れしてすぎて出荷しないほうがマシレベルだとか。"
