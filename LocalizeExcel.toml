1473177672 = "ยูกะลงแข่งขันในรายการ <ของชิ้นนั้น เอามันมาให้ที> แทนยูสึ เมื่อเห็น\nข้อความ ยูกะก็พาตัวคุณครูไปและผ่านเข้าเส้นชัยในอันดับ 1 ยูกะถูก\nสงสัยว่าสิ่งที่ต้องไปเอามาคือ 'คนที่ชอบ' หรือเปล่า เธอเขินและปฏิเสธ\nว่าไม่เป็นความจริง"
