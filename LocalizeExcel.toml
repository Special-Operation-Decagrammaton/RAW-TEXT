3318312354 = "ความร่วมมือ 2"
3358539827 = "นักเรียนฝ่ายบริการกับหุ่นยนต์เชียร์หนีออกมาจากชั้นใต้ดินและบุกเข้ามาใน\nสนามที่มีการแข่งขัน <วิ่งผลัดข้ามสิ่งกีดขวาง> อยู่ ชิโรโกะยิงจรวดพิฆาต\nรถถังไปถูกหุ่นยนต์เชียร์จนหุ่นยนต์เชียร์เริ่มออกอาละวาด คณะกรรมการ\nจัดงานเลยต้องออกไปควบคุมสถานการณ์"
