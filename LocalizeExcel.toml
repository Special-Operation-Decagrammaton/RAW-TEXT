2517970998 = "꽃구경도 식사 후에 1"
2944533842 = "즐거운 저녁 시간을 앞두고, 미식연구회를 필두로 한 게헨나 학생들은 자신들의 미식 욕구를 충족시키기 위해 식당을 뛰쳐나간다. 우미카 일행은 그런 게헨나 학생들을 막기 위해 황급히 뒤쫓지만, 이미 소동은 벌어지고 있었다…"
1540273776 = "꽃구경도 식사 후에 2"
878796698 = "간신히 미식연구회를 진정시키는 데 성공한 우미카 일행. 하지만 우미카는 일련의 소동에서 석연찮은 기분을 느낀다."
918329583 = "판타지 나이트메어 1"
1967792890 = "게헨나 학생들을 위해 담력 시험을 준비한 우미카 일행. 하지만 예정에 없었던 요괴의 출현으로 가이드들은 곤란한 상황에 놓이고 만다."
2245461290 = "판타지 나이트메어 2"
