2901698646 = "망량즈가 습격해오면서 선생님과 시즈코가 위기에 빠진 순간, 도와주기 위해 나타난 건 수행부 삼인방이었다. 그 뒤를 이어 이즈나까지 등장하여 선생님을 설득하겠다며 싸움을 걸어온다."
2868330061 = "수행부의 괴짜들 2"
1540547905 = "덤벼온 망량즈와 이즈나를 무사히 쓰러트렸지만, 곧바로 다음번엔 다를 거라는 대사와 함께 이즈나와 망량즈는 도망쳐버린다. 결국 망량즈와 이즈나를 고용한 원흉을 찾기 위해, 선생님은 시즈코와 함께 움직인다."
2417194596 = "축제가 열리는 거리"
1414862293 = "이번 사건의 원흉을 찾기 위해 움직이기 시작한 선생님과 시즈코, 수행부이지만. 갑작스럽게 밀려드는 축제 업무로 인해 모두가 뿔뿔이 흩어지게 된다. 바로 그때, 축제 한 켠에서 소란이 일어난다."
3322041533 = "축제와 꿈, 그리고"
2820688883 = "축제 업무를 이어 나가던 도중 선생님은 이즈나와 재회하여 잠시나마 축제를 즐긴다. 그 후 다음번엔 반드시 선생님을 쓰러트려 설득하겠다고 말하는 이즈나가 떠나간 뒤, 선생님은 망량즈에게 납치당한다."
389931609 = "짓밟는 음모, 그리고"
464929464 = "마침내 선생님이 마주한 고용주는, 다름 아닌 상인회장 냥타로였다. 축제를 망치기 위해 이즈나의 꿈을 이용했다는 냥타로에게 선생님이 분노한 순간, 이즈나가 난입하여 선생님을 구한다."
510483198 = "마지막 피날레를! 1"
1070874512 = "선생님과 이즈나가 위기에 몰린 그 순간, 마츠리부와 수행부의 학생들이 구하러 등장했다. 이를 노린 냥타로가 수많은 망량즈 학생을 불러들이자, 모두가 위기에 빠진다."
2874004235 = "마지막 피날레를! 2"
38247590 = "냥타로가 준비한 비장의 수단이 실패로 돌아가자, 망량즈는 도망치고 냥타로에겐 분노한 시즈코의 펀치가 작렬한다."
1143447829 = "소녀의 꿈 1"
2258871246 = "소동이 끝나고 축제는 무사히 이어지게 되었지만, 여전히 난동을 부리는 문제아들을 수행부가 해결한다."
1547567664 = "소녀의 꿈 2"
797984036 = "마지막으로 축제의 끝을 장식하는 불꽃놀이를 구경하기 위해, 이즈나와 함께 백귀야행의 전망대에 오른 선생님은 불꽃 아래에서 반짝이는 이즈나의 미소를 바라본다."
3841520946 = "혁명의 이반 쿠팔라"
4175786323 = "체리노는 <이반 쿠팔라>를 맞아 선생님을 붉은겨울 학원에 초대한다.\n하지만 갑작스럽게 발발한 쿠데타로 인해 체리노는 실각하고 마는데…….\n회장 자리를 되찾기 위한 체리노의 혁명이 시작된다!"
