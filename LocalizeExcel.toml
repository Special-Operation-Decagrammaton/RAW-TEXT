3876182863 = "[c]At game's start:[/c] Gives [c]{param;ShieldPower}[/c] Barrier to all ally Strikers.\n\n[c]At the start of user's Phase:[/c] If the user's HP is not full, summons [c]3[/c] [c]{char;848052}[/c] cards and retreats. If the user's HP is full, deals [c]{param;BasePower}[/c] damage to all enemy Strikers."
