1039873231 = "한겨울 밤의 꿈"
2085930861 = "크리스마스 캐럴"
255082210 = "키보토스의 크리스마스!"
4167041875 = "하얀 눈이 내리는 크리스마스의 아침. 산타복으로 단장한 세리나와 하나에는 선생님과 함께 자선활동 준비로 분주하다. 미네는 구호기사단이 가져야 할 구호의 신념을 관철하며 현장으로 출발하기로 한다."
606569055 = "비밀의 화원"
942159035 = "선생님과 함께 자선활동을 나서는 세리나와 하나에는 정의실현부 부원으로부터 정의실현부가 송년회를 준비한다는 소식을 우연히 듣게 된다. 세리나와 하나에는 언제나 교내의 치안을 위해 고생하는 정의실현부의 휴식이 기쁘기만 하다."
2280920957 = "Les Miserables……?"
3046061777 = "크리스마스 당일. 뒷골목 어딘가에서 불량배들과 대치 중인 정의실현부. 이윽고 상황을 정리하고 정체 모를 물건을 회수한다. 정의실현부가 유유히 자리를 떠나고 불량배들은 엉망진창이 된 자신의 신세를 한탄하던 도중, 자선활동을 나서는 선생님과 구호기사단의 모습을 발견하고 무언가 수상한 계획을 세운다."
3517655244 = "크리스마스의 악몽"
3684306682 = "선생님과 함께 자선활동을 하며, 크리스마스의 기쁨을 전하는 구호기사단. 자선활동에 분주한 와중, 구호기사단은 불량배로부터 정의실현부가 아무 이유 없이 불량배들의 소중한 치킨을 빼앗은 사연을 듣게 된다."
1420301580 = "구호 익스프레스"
2915910172 = "세리나와 하나에는 불량배들의 안타까운 사연을 듣고 진정한 구호란 무엇인지 고민하게 된다. 지금까지의 모든 정황을 듣고 자신의 부족함을 통감한 미네. 이윽고 송년회를 열고 있는 정의실현부에 공식적으로 항의하기 위해 홀로 자리를 뜬다."
186128367 = "Civil War(?)"
34322318 = "카페를 빌려 송년회를 개최한 정의실현부. 부원들은 각자의 방식으로 크리스마스의 기쁨을 만끽한다. 하지만 그 즐거운 시간도 잠시, 정의실현부에 항의하러 찾아온 미네의 등장으로 송년회에 작은 소동이 일어나는데…"
3152503825 = "작은(?) 아씨들 1"
486440598 = "미네의 항의로 인해 거대한 소동으로 번진 송년회. 하스미는 엉망진창이 된 상황을 정리하러 나섰지만, 대화와 타협이 통하지 않는 미네의 모습에 발끈하며 전투에 가세한다."
847967838 = "작은(?) 아씨들 2"
3387101415 = "모두가 이성을 되찾고 하스미는 미네로부터 구호기사단이 정의실현부를 습격한 이유를 듣게 된다. 그리고 일련의 대화 속에서 서로에 대해 오해가 있음을 깨닫는다."
1131207087 = "폭풍의 언덕"
230232017 = "구호기사단과 정의실현부는 불량배들의 계략에 속아 소동이 일어난 사실을 알게 된다. 그 소동의 원인으로 지목된 물건은 바로 헬파이어 치킨. 이윽고 본색을 드러낸 불량배들을 상대하기 위해 구호기사단과 정의실현부를 힘을 합쳐 불량배들을 제압한다."
