1117978599 = "Damages the Front enemy.\n\n\n[c][75b4c0][i]\"There are Thugs who call themselves Sukebans! There's a difference...\"\n- Valkyrie Police School Public Safety Bureau, Nakatsukasa Kirino[/i][-][/c]"
