2189783169 = "옛이야기"
1121429929 = "사오리가 잠든 사이, 미사키와 히요리는 아리우스 스쿼드의 과거사를 선생님에게 이야기한다. 마침내 사오리가 눈을 뜨고, 힘겨운 부상을 입었음에도 사오리는 아츠코가 있는 아리우스 바실리카에 도달하기 위해 분교 구교사로 향한다."
137688653 = "대면"
3389099 = "구교사의 회랑에서 베아트리체와의 통신이 연결되고, 베아트리체는 자신이 아리우스 자치구 전체를 이용해 왔으며 아츠코를 희생시키면 자신들 '어른'에게 좋은 일이 있을 것이라고 선생님을 회유한다. 선생님은 베아트리체의 제안을 거절하고, 아리우스 스쿼드와 유스티나 성도회의 전투가 벌어진다. "
1792504161 = "대면"
3516525510 = "돌연 나타난 미카가 성도회의 보스를 쓰러트리고, 아리우스 스쿼드에게 전투를 걸어 온다. "
