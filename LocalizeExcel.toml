1189128859 = "여행지에 놀러 온 사람처럼"
1275099754 = "초현상특부무로 귀환한 일행은 마지막 조난자였던 사텐 루이코와 만난다. 히마리는 폐허에 있는 설비를 수리하고 재가동하면 원래의 장소로 돌아갈 수 있으며 그 준비를 모두 마쳤다고 전한다. 그리고 돌아가기 전에 키보토스를 즐기는 것이 어떻겠냐고 제안하고 선생님과 에이미가 함께한다."
232191555 = "자유시간은 언제나 순식간에 지나간다"
1502489746 = "즐거웠던 키보토스 여행을 마치고 폐허를 찾은 미사카 미코토 일행과 엔지니어부는 히마리가 말한 설비를 찾아 지하로 내려간다."
