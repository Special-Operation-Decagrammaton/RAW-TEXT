3861645920 = "因縁の相手と対峙する便利屋68。\nそれはハルカとの出会いの物語であり――\n居場所を見つけた少女の物語。"
2301444160 = "一人では咲かない雑草"
1824741484 = "因縁の相手と対峙する便利屋68。\nそれはハルカとの出会いの物語であり――\n居場所を見つけた少女の物語。"
4024679347 = "一人では咲かない雑草（1）"
3797482994 = "一人では咲かない雑草（2）"
