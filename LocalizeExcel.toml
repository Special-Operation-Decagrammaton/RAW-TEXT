1088523469 = "ชมรมชิมอาหาร"
842670294 = "หลังจากเสร็จสิ้นพิธีปิดงานแข่งขันกีฬา สมาชิกชมรมชิมอาหารใช้ <บัตรกำนัลอาหารครอบจักรวาล> ที่ได้เป็นรางวัลมานั่งกินอาหาร พร้อม\nพูดคุยเรื่องต่างๆ กัน ฮารุนะถามจุนโกะว่าสนุกกับงานแข่งขันกีฬาหรือไม่ จุนโกะตอบว่าถึงจะมีเรื่องวุ่นวายต่างๆ เกิดขึ้นมากมาย แต่งานแข่งกีฬาก็\nสนุกเหมือนทุกครั้ง หลังจากนั้นสมาชิกชมรมชิมอาหารก็เตรียมอุปกรณ์ที่\nจำเป็นและไปเข้าร่วมอาฟเตอร์ปาร์ตี้ที่จัดขึ้นหลังงานแข่งกีฬา"
