63381328 = "妨礙慶典的孩子需要教訓！"
799850412 = "因為收到海花的聯絡，老師來到了百夜堂。老師在那裡碰上了搗亂的客人，感到驚慌失措。不過慌張也只是一時的，老師對海花提出建議後，接受老師建議的海花表示會真誠地迎接並招待客人，然後便開始行動。"
