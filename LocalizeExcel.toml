3209912447 = "知識解放戰線的某一天"
2520485061 = "愛瑠和紅葉在赤冬圖書館的大掃除過程中發現了曾經風靡一時的名作《LUNA》。不過兩人對於名作有著截然不同的見解，這成了導致知識解放戰線破局的催化劑。"
720773574 = "罷工宣言"
2640338098 = "和紅葉大吵一架後，愛瑠向老師請求諮詢。在一番深思過後，愛瑠開始尋找傳說中的《LUNA》最終卷，想當作道歉禮物送給紅葉。"
392147764 = "最終卷"
2594803507 = "就在老師和愛瑠尋找《LUNA》的最終卷時，赤冬學園的出版部學生──貴音出現在兩人面前。貴音對於《LUNA》的最終卷提供了意味深長的線索。"
3663799006 = "出版、再版、流通"
298813709 = "按照貴音的線索，老師和愛瑠來到出版部的印刷所。兩人在那裡遇見了出版部的部長八雲，在一番討價還價過後，八雲接受了與情報相應的條件。"
3362804913 = "祕密聚會"
2411994088 = "老師和愛瑠來到了據說有《LUNA》最終卷的地方。不過《LUNA》最終卷卻不止一種。"
1879649220 = "任何人都會有的祕密"
189383727 = "就在無數種版本的《LUNA》最終卷讓老師和愛瑠陷入困惑之時，某個謎樣的人物出現在兩人面前。他正是設計老師和愛瑠現在來到這個地方的人。"
2417107819 = "半成品"
3852138862 = "結論是，《LUNA》的最終卷是不存在的東西。儘管如此，愛瑠還是想要和紅葉和好，於是便燃起藝術之魂，決心自己來畫最終卷。"
3860894640 = "齒輪"
1197843780 = "因為連續熬夜，愛瑠終於倒下了。老師來照顧愛瑠，讓愛瑠暫時闔眼休息一下，此時老師接到了一通意料之外的電話。"
3821762781 = "見面"
4010090300 = "在老師的仲裁下，愛瑠和紅葉最後終於見面了。兩人為自己說了不該說的話向對方道歉，知識解放戰線就此重新團結起來。然而完成《LUNA》最終卷的挑戰還在繼續。"
3696580091 = "事務局的提案 "
3919086823 = "老師和知識解放戰線全員好不容易完成了《LUNA》最終卷。在截稿時間之前趕到交件地點的途中，出現了黑暗的陰影。"
