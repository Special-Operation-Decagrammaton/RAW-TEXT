1573223017 = "수상쩍은 교류회 1"
2145390660 = "교류회에 참석하기 위해 붉은겨울 학원을 방문한 만마전. 이윽고 마코토와 체리노의 만남이 극적으로 성사되지만, 마코토는 붉은겨울의 내분을 이용한 쿠데타를 계획하고 있었는데……."
3039169023 = "수상쩍은 교류회 2"
