648350015 = "I observed suspicious activity from some strange-looking students on campus. My usual course of action would be to ignore it or alert Seminar...but given the situation, I gave chase before I realized what I was doing. - Seia"
2965673131 = "Those suspicious people... Just who could they be? To attempt to make profit by ruining the expo...they must be plotting something outrageous. If we leave them be, things will surely go awry. - Seia"
334310010 = "Work... Especially when it comes to \"operations\" like these, it's best to organize all the information you acquired after the work is done. I'll stay right here, so feel free to come to me if you forget anything or need to hear it again. - Rio"
2204937774 = "To get more clues, it would be better to go somewhere more populated. In Trinity, that would be in front of the fountain at the plaza...but shall we start with a classroom first? - Seia"
4174324411 = "Robot Pet...? It's a robot...but a pet? Is it a robot puppy or a robot kitten? What does it eat for food? Maybe electricity...? More so than clues, I'm personally curious about this. - Seia"
565085471 = "I found a mysterious chip. I say mysterious...but I'm sure that if I took it to Rio, she could deduce its function with haste. ...But I can at least see that it was not made with good intent. - Seia"
2223345760 = "Robot puppy... ...So that was meant to be a puppy. ...Is that simply Rio's taste? Or do people at Millennium typically consider something like that a puppy? - Seia"
95517514 = "There was a chip in the Engineering Department's submission that they were completely unaware of. On top of that, they were blamed for the event nearly failing from that chip's functions. This is an obvious sabotage. Now the question is who's behind all this... - Rio"
1245778966 = "Rio always makes odd things. She would bring items with strange designs, but they did always work well. ...*sigh* Brings back memories. I'm usually not the type to be sentimental though. - Neru"
365206562 = "Infiltrating the Data Center...not bad. That was a good warm up. After all, I've only been taking on easy jobs lately. Back then— Wait, why am I reminiscing on old times again...? - Neru"
3686271168 = "With enough data, many things can be estimated. From here on out, I won't settle for just tracking down past events. I may have been the one who did analysis and got results...but it was all thanks to the two of you. - Rio"
1277669418 = "The Game Development Department... It must be a place where people make games. Sharing hobbies and working together to make something... That's exactly what a \"club\" should be. I hope Trinity will have something similar, one day... - Seia"
4126678237 = "The Game Development Department members... They were interesting people. They were full of energy...and seemed to enjoy themselves through everything. I'm sure a game made by these people would also be fun and enjoyable. I suppose I'm looking forward to it. - Seia"
2590850258 = "To ruin a game that everyone worked hard so hard to create... I don't know who's behind all this, but they've gone too far. ...I must uncover the truth and prove that the Game Development Department members are innocent. That's what the \"Thief King\" would do. - Seia"
744738424 = "After the Engineering Department, the Game Development Department was also... We have to catch them before things get worse. ...Neru. Please. - Rio"
2253968242 = "That's...a problem, right? I mean, I see those workout maniacs train all the time... So I can't tell if that's a real problem or if they're just going on their usual rampage. Well...seems like they're in trouble, so I'll help out. - Neru"
74454459 = "All right, all right. Almost there. I've been on clean-up duty until now, but now that I've found them, I won't let them go. They've made way too much extra work for me! - Neru"
3102902340 = "Since we failed to capture them on-site, chasing them down is no longer an option. We'll have to go with an ambush. ...There's no other choice. Although I don't want to...I'll have to use \"that.\" - Rio"
1980715747 = "The Big Sister Algorithm... I haven't spoken of it in a while. If it had been the past, and had Neru known I was using this, she would've stopped me. ...If only that had been the case. Things would've been different... - Rio"
541035342 = "You were planning something ridiculous, Rio. You still try to solve everything with your self-righteous and self-sacrificing attitude...when no one wishes for that. I'm sorry to say this, but I won't allow your plan to come to fruition. I'll be moving with Neru from now on. - Seia"
