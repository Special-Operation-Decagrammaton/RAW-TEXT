1009008909 = "해피 발렌타인!"
3775021891 = "발렌타인 데이의 협력 업무 1"
1872607528 = "발렌타인 데이를 맞이하여 D.U. 자치구에서 축제가 열렸다. 이 축제의 치안 업무를 도와달라는 발키리 경찰학교의 후부키와 키리노의 요청에 선생님은 순찰 업무를 시작한다."
1521429380 = "발렌타인 데이의 협력 업무 2"
3051470549 = "선생님이 순찰 업무를 하고 있는 도중, 갑작스레 와카모가 습격해온다. 다행히 발키리 경찰학교의 학생들과 세나의 도움으로 와카모를 제압하는데 성공한 선생님이지만, 어딘지 모르게 석연치 않은 느낌을 남긴 채 다시금 선생님은 세나와 함께 순찰 업무를 재개한다."
4125302622 = "발렌타인 데이의 다음 날"
2631208014 = "축제는 무사히 끝이 났다. 와카모를 놓친 것에 분해하는 후부키와 키리노, 다시 함께 순찰할 날을 기다리고 있겠다 말하는 세나, 그리고 찾아온 치히로가 도움이 되지 못해 미안하다는 사과를 남기고 물러간다. 그렇게 모든 소동이 끝났다고 생각한 순간, 와카모가 샬레로 들이닥친다."
1047327753 = "해피 발렌타인……?"
410407804 = "발렌타인 데이를 맞아 구호기사단은 시민들에게 초콜릿을 나눠준다. 한창 훈훈한 분위기가 조성되던 그때, 폭발이 일어나고 불량배가 날뛰기 시작하며 일대가 혼란에 빠진다. 구호기사단은 미네가 주축이 되어 '구호활동'을 시작한다."
3981192346 = "보안 대책"
1150264065 = "치히로는 시큐리티의 개념을 설명한다. 한창 설명이 길어지자, 와카모는 그 틈을 타 탈주한다."
2499107451 = "궁극의 오야코동?!"
1609115689 = "한계에 부딪혔다고 느끼는 오야코동 장인은 새로운 맛을 연구하고자 거리로 나간다. 뾰족한 수를 찾아내지 못한 장인은, 마침 그 자리를 지나가던 스즈미에게 도움을 요청한다. 스즈미의 아이디어는 장인에게 새 영감을 주게 되고, 드디어 장인의 새로운 메뉴가 탄생한다."
1290044481 = "조용한 대수사선"
4077437065 = "미네의 구호활동에 의해 불량배들의 소동이 정리되지만, 공안국은 여전히 출동하지 않는다. 공안국이 출동하지 못하는 이유를 들은 미네가 강하게 항의하는 사이, 와카모는 여유롭게 탈주하고 만다."
3224852679 = "아무튼 잘못된 건 세상이야"
2737288181 = "자유로운 인생을 추구하던 불량배는 자신이 입을 수밖에 없는 시대착오적인 치마에 불만을 토로한다. 그것을 들은 와카모는 한 가지 아이디어를 제안하고, 불량배는 완전히 새로운 모습으로 다시 나타나 날뛰기 시작한다."
1674653734 = "해피 발렌타인!"
3425508891 = "곳곳에서 가짜를 동원해 소동을 일으키던 와중에 선생님을 노리던 와카모는, 결국 미네와 마주하게 된다. 미네는 와카모에게 왜 소동을 일으켰는지 묻고, 그 이유를 납득하자 순순히 와카모에게 길을 비켜준다. 그리고 이어서 난동을 벌이는 문제아들에게 다시 '구호활동'을 재개한다."
153995850 = "발렌타이 데이를 맞아 구호기사단이 초콜릿을 나눠준다. 올해는 무사히 해피 발렌타인…?"
1099429423 = "보안 대책을 확실하게 하기 위해 치히로는 보안의 기본 개념부터 설명하는데…"
1299607610 = "궁극의 맛을 찾아 오야코동 장인이 거리로 나섰다. 과연 그 맛을 찾아낼 수 있을까?"
2424829376 = "와카모의 소동이 한창임에도 공안국이 출동하지 못하는 그 이유란?"
1073833967 = "더 이상 이 모습은 싫어! 고민에 빠진 불량배에게 와카모가 해준 조언은?"
2783498663 = "와카모, 결국 미네와 마주한다. 이 소동은 무사히 끝날 수 있을까?"
3145939835 = "코사카 와카모의 침묵과 축연"
3731216719 = "요란한 총소리, 화려한 폭발!\n그리고 매캐한 화약 냄새를 풍기며 와카모가 나타났다!\n발렌타인 데이의 축제 현장을 혼란으로 몰고 가는 와카모의 진정한 목적이란?!"
3487882084 = "첫 번째 습격! 1"
2174923451 = "첫 번째 습격! 2"
1269429059 = "두 번째 습격! 1"
37429416 = "두 번째 습격! 2"
648736061 = "세 번째 습격! 1"
3017487652 = "세 번째 습격! 2"
543422608 = "네 번째 습격! 1"
1454069515 = "네 번째 습격! 2"
3483561865 = "다섯 번째 습격! 1"
1562212096 = "다섯 번째 습격! 2"
3800514801 = "마지막 결착! 1"
3387719790 = "마지막 결착! 2"
1243671927 = "첫 번째 습격! 1"
1765541951 = "세나와 함께 순찰을 재개한 선생님은 때마침 보안 점검을 나온 치히로와 마주친다. 그리고 그때 후부키와 키리노는 와카모를 교정국으로 이송하고 있었다. <재액의 여우>라 불리는 와카모가 얼마나 무서운 인물인지 떠들던 그때, 와카모가 호송 트럭을 탈출한다."
1900873261 = "첫 번째 습격! 2"
683219944 = "발키리 경찰학교의 장비까지 사용해 난동을 피우는 와카모를 다시 붙잡는 데 성공한 선생님. 치히로는 대체 어쩌다 장비까지 빼앗겼느냐며 어처구니없어하지만, 다시는 이런 일이 없을 거라며 너스레를 떠는 후부키는 다시금 키리노와 함께 와카모를 호송해간다."
840551407 = "두 번째 습격! 1"
402624026 = "와카모를 교정국 시설로 호송한 발키리 경찰학교의 학생들은 와카모를 다그치며 심문을 시작한다. 그러나 와카모는 그에 개의치 않고 자신에게도 생각이 있다며 교정국을 탈출한다."
3108015082 = "두 번째 습격! 2"
280082844 = "이번에도 다시금 와카모를 붙잡는 데 성공한 선생님. 후부키는 교정국 시설이 낡아서 벌어진 일이라며, 다시는 이런 일이 없을 거라 너스레를 떨고 다시 와카모를 호송해간다."
54235112 = "세 번째 습격! 1"
1970556472 = "또다시 와카모를 교정국으로 호송해온 발키리 경찰학교의 학생들은 이번엔 오야코동으로 와카모를 회유하려고 하지만, 와카모는 어이없어하며 다시금 교정국을 탈출한다."
386374787 = "세 번째 습격! 2"
2831782328 = "또다시 와카모를 붙잡는 데 성공한 선생님. 후부키와 키리노는 오야코동을 이용해 탈옥하다니 과연 소문대로의 무서운 범죄자였다며 전율하지만, 그래도 저녁 메뉴는 메밀소바이니 걱정 말라는 말을 남기고 와카모를 호송해간다."
550139806 = "네 번째 습격! 1"
1230415696 = "이번에야말로 발키리 경찰학교의 학생들은 와카모를 구슬려서 목적이 뭔지 알아내려고 마음먹었지만, 이미 와카모는 탈출한 뒤였다."
720305737 = "네 번째 습격! 2"
1323540802 = "또, 또, 또다시 와카모를 붙잡는 데 성공한 선생님은 이게 어찌 된 일이냐고 묻지만, 후부키와 키리노는 다음번엔 정말로 이런 일이 일어나지 않을 거라고 말하며 허둥지둥 와카모를 호송해간다."
2123615289 = "다섯 번째 습격! 1"
3848127601 = "순찰 업무를 이어가던 중, 마을 주민들이 샬레의 선생님에게 감사의 마음을 담아 선물을 건네준다. 당황하는 선생님이지만, 세나는 자신 또한 선생님이 지난 1년간 보여준 활약에 감사하고 있다며 그 마음은 진짜라고 말한다. 그리고 바로 그때 와카모가 또다시 탈출했다는 연락이 닿는다."
1033382974 = "다섯 번째 습격! 2"
1187005141 = "와카모를 사로잡는 데는 성공했지만, 연이은 탈출의 책임을 묻는 치히로의 말에, 후부키는 이젠 정말 괜찮을 거라며 유우카, 하스미, 스즈미, 치나츠를 호출한다. 와카모와 교전 경험이 있는 그녀들이 있으니 이젠 진짜 걱정 말라며, 후부키는 와카모를 호송해간다."
3607426443 = "마지막 결착! 1"
347985138 = "이제는 진짜 도망칠 수 없을 거라며 와카모에게 으름장을 놓는 후부키지만, 갑자기 축제 현장 CCTV에 붙잡았을 터인 와카모의 모습이 비치기 시작하며, 이 모든 것이 와카모의 함정이었음을 깨닫는다."
1076189635 = "마지막 결착! 2"
1975218181 = "자신을 가로막는 방해물을 전부 뛰어넘어 마침내 선생님 앞에 도착한 와카모. 그렇게 선생님이 와카모에게 해코지당할 것을 각오한 순간, 알고 보니 와카모는 처음부터 발렌타인 데이 초콜릿을 건네주기 위해 선생님에게 접근했다는 것이 밝혀진다."
2041289632 = "발렌타인 데이의 약속"
652737147 = "모모카의 도전"
1282114892 = "바쁜 업무를 보는 선생님의 옆에서 감자칩을 먹으며 즐거워하는 모모카. 모모카는 선생님의 조언을 듣고 새로운 초콜릿 맛 감자칩에 도전해보지만, 취향이 아니라며 금세 포기한다."
2041407386 = "발주 미스"
3986078636 = "발렌타인 데이 초콜릿을 실수로 20박스나 주문해버린 소라. 하지만 선생님의 도움으로 초콜릿을 모두 판매하는 데 성공하고, 소라는 감사의 마음을 담아 초콜릿을 선물한다."
3858941682 = "행정관의 간식"
947066316 = "선생님이 쓴 보고서의 실수를 엄하게 지적하는 린. 보고서가 엉망인 이유가 선생님의 수면 부족 때문임을 알게 되자, 린은 리셉션 룸에 보관 중이던 주전부리를 내민다."
4205941856 = "아로나의 발렌타인 데이 선물!"
1876151316 = "일 년에 한 번뿐인 발렌타인 데이를 맞아, 아로나는 선생님을 위해 손수 만든 초콜릿 쿠키를 선물한다."
3540623104 = "신상 초콜릿 굿즈!"
1167271857 = "히후미는 발렌타인 데이 기념 모모프렌즈 한정 굿즈를 얻고 싶었지만 일행이 없어 난처해한다. 우연히 근처를 지나가던 선생님은 히후미와 커플인 척을 하여 굿즈를 사는 데 성공한다."
407134817 = "저격수의 초콜릿"
3908488518 = "마시로는 창고 비품을 정리하다 우연히 비상식용 초콜릿을 발견한다. 비록 맛은 없었지만, 비상식으로서의 성능이 우수하다며 마시로는 초콜릿을 높게 평가한다."
1648025321 = "최고의 피로회복제"
4001398665 = "잦은 밤샘으로 고생하는 선생님을 걱정하는 하나에. 처음에는 독한 카페인 음료를 건네지만, 질색하는 선생님의 반응에 결국 핫초코를 대신 준비한다."
1783916805 = "구두약과 초콜릿"
3015827395 = "선도부의 밀린 일을 처리하던 중, 이오리는 구두약 모양의 초콜릿을 선생님에게 건네며 장난을 친다. 하지만 선생님이 정말로 초콜릿을 핥자, 이오리는 당황해 하며 선생님에게 초콜릿을 선물한다."
3747656773 = "초콜릿 많이 먹기 대회"
3180753048 = "발렌타인 데이를 맞이해 상점가에서 초콜릿 많이 먹기 대회가 열린다. 대회에 참가하기 전 연습 겸 선생님과 먹기 위해 아카리는 대량의 판 초콜릿을 준비하지만, 선생님은 절반도 먹기 전에 물려버린다."
1571250681 = "불행한 미식가"
2808579933 = "초콜릿을 묻힌 경단을 파는 가게를 찾은 준코와 선생님. 하지만 갑자기 난입한 모찌모찌 헬멧단의 방해로 준코의 경단 시식은 오늘도 좌절된다."
4245935983 = "로커의 러브송"
172507543 = "<블랙 데스 포이즌>의 한정판 앨범을 구매한 카요코는 경품으로 거대한 소 해골 모양 초콜릿을 받는다. 카요코는 우연히 그 주변을 지나가던 선생님을 발견하고, 초콜릿을 선물로 건넨다."
2795715699 = "마을에서의 조난"
716546020 = "아비도스 고등학교로 가던 중, 엉뚱한 역에 내려 조난을 당한 선생님. 우연히 근처를 지나가던 시로코는 선생님에게 저혈당에 도움이 되는 라이딩용 초콜릿 바를 선물한다."
105274267 = "초콜릿 속의 바다"
3213219445 = "해양 박물관 견학을 마치고 기념품을 구경하는 호시노. 물고기 초콜릿 세트를 구매한 호시노는 선생님에게 가장 마음에 들어 하던 고래 모양의 초콜릿을 선물한다."
4290912609 = "의도치 않은 선물"
3601590273 = "언제나 신세를 지고 있는 선생님에게 우연히 구입한 초콜릿 세트를 선물하는 아야네. 그런데 오늘이 마침 발렌타인 데이임을 알게 되자, 아야네는 당황해 하며 변명을 길게 늘어놓는다."
2815944483 = "효율주의자의 간식"
1093584961 = "밀레니엄 교정에서 민망한 모양의 초콜릿을 먹고 있는 에이미를 발견한 선생님. 에이미는 특별 할인가로 잔뜩 구매했다며 그 초콜릿을 선생님에게도 나눠준다."
2517355120 = "위장 속의 도청장치"
2476241868 = "발렌타인 데이를 맞아 본심을 전하기 위해 선생님에게 선물을 건네는 코타마. 초콜릿 위의 도청장치를 들키자, 코타마는 강경책을 택한다."
3262523879 = "달콤한 야근"
3361121614 = "밤늦게까지 서버 점검에 대응하느라 녹초가 된 치히로. 뒤늦게 오늘이 발렌타인 데이라는 것을 알게 되자, 치히로는 선생님에게 자신이 즐겨 마시던 초콜릿 음료를 선물한다."
2975198628 = "회계의 한도"
1238138106 = "유우카는 발렌타인 데이를 앞두고 선생님에게 선물할 초콜릿을 고르느라 고민에 빠진다. 당일, 유우카는 의리 초콜릿이라며 아무렇지도 않은 척 초콜릿을 건네지만 비싼 가격표를 들키자 부끄러워한다."
3223164587 = "이벤트 아이템"
2932463976 = "선생님과 함께 힘겹게 레이드 보스를 잡은 유즈. 전투 후 아이템을 나누던 중, 유즈는 이벤트 기간 중에만 얻을 수 있는 특별한 초콜릿 아이템을 선물한다."
3467542474 = "아리스의 초콜릿"
662108209 = "발렌타인 데이를 맞아, 아리스는 직접 만든 '스네일' 모양 초콜릿을 선물한다."
2032134810 = "특별한 에너지 드링크"
2179793648 = "철야 업무 중, 피곤해하는 선생님을 위해 하레는 초콜릿 맛 요괴 MAX를 선물한다."
1069251704 = "세상을 달콤하게!"
2353333921 = "발렌타인 데이를 맞이해 특별히 준비한 식용 스프레이로 선생님에게 장난을 치는 마키. 마키는 초콜릿 스프레이로 세상을 더 달콤하게 만들겠다는 포부를 밝힌다."
3143861320 = "로맨틱한 폭격"
2670246882 = "선생님 앞에서 새로운 발명품을 선보이는 히비키. 그것은 바로 착탄한 곳에 거대한 초콜릿 늪을 만드는 특제 박격포 포탄이었다. 선생님이 위험하다며 만류하자, 히비키는 포탄을 선생님에게 선물한다."
640366726 = "가짜 나사"
3523245412 = "샬레의 배선 장비를 수리하던 중, 우타하는 가져온 나사가 연달아 깨져 버리자 곤란해한다. 하지만 자세히 관찰하니 그 나사는 진짜 부품이 아닌 나사 모양의 초콜릿이었다."
3615648569 = "수염 초콜릿"
1699188027 = "붉은겨울 학원의 특제 밀크 초콜릿, <체룐카>를 생산하는 시설을 찾은 체리노와 선생님. 생산량이 부족해 선생님에게 선물할 초콜릿이 없다는 것을 알게 되자, 체리노는 먹던 초콜릿을 선생님에게 건넨다."
3793419012 = "붉은겨울 학원의 특산품"
4255053213 = "체리노의 귀여운 일러스트가 담긴 초콜릿을 만들어낸 토모에. 토모에는 선생님에게 초콜릿을 건네며 키보토스 전역에 체리노의 귀여움을 널리 퍼트려 달라고 부탁한다."
3368181863 = "빈자의 초콜릿"
32065340 = "선생님에게 초콜릿을 선물하고 싶었지만 간신히 카카오 빈만 구한 노도카. 속상해하는 노도카의 앞에서 선생님은 과감히 카카오 빈을 씹는다."
1194017029 = "초콜릿 맛 비약"
3059649371 = "초콜릿을 베이스로 만든 비약을 선생님에게 실험하는 사야. 하지만 사야의 기대와는 달리 결과물은 평범한 초콜릿이 되어버렸고, 사야는 실망하며 초콜릿 맛 비약을 선생님에게 떠맡긴다."
4072309002 = "어른의 초콜릿"
3055755811 = "평소보다 기분이 한껏 좋아진 상태로 샬레에 나타난 슌. 알고 보니 슌은 럼이 잔뜩 들어간 봉봉을 먹고 취한 상태였다. 결국 럼 봉봉은 압수당하지만, 슌은 선생님께 초콜릿을 선물하게 되었다며 만족스러워한다."
1894276114 = "가짜 수갑"
3212670461 = "수갑 모양의 초콜릿을 구했다며 들떠 있는 키리노. 키리노는 이 수갑을 사용하면 실수로 잘못 차더라도 쉽게 빠져나올 수 있다며 기뻐하지만, 그건 범인도 마찬가지가 아니냐는 선생님의 지적에 좌절한다."
3227313292 = "1년을 기다린 상대"
695495392 = "발렌타인 데이 당일, 후부키는 1년을 기다린 상대가 찾아온다며 설레한다. 하지만 벨이 울리고 들어온 상대는 발렌타인 데이 기념 한정 도넛을 든 배달부였다."
1177032401 = "다정다감한 소녀"
3398993891 = "선생님에게 한 가지 부탁을 들어달라는 하나코. 그 부탁이란, 하나코가 준비한 작은 선물 상자를 받아주는 것. 부끄러워하며 얼른 자리를 뜬 하나코. 선물을 열어보자 뜻밖의 물건이 들어 있었다."
3016052351 = "작지만 달콤한 한 발"
4211334058 = "발렌타인 데이 당일. 트리니티 학생들로부터 너무 많은 감사 초콜릿을 받아, 함께 먹어달라 말하는 하스미에게 선생님은 그건 하스미를 위한 초콜릿이니 그럴 수 없다 거절한다. 선생님의 말에 무언가 깨달은 듯 하스미는 감사 인사와 함께 자신이 준비한 초콜릿을 선생님에게 건넨다."
1196745069 = "주저하지만 전하고 싶은"
2486835713 = "발렌타인 데이 당일, 히나와의 밀회에서 히나는 선생님에게 초콜릿을 건넨다. 히나는 본인을 닮은 못난이 초콜릿을 주게 되어 사과하지만, 선생님은 히나의 수제 초콜릿을 받았다며 크게 기뻐하고, 히나는 그 모습을 보고 안심한다."
2153765396 = "아무튼 준비한 거예요."
1349047534 = "아코와 함께 선도부 관련 업무를 처리하는 선생님. 처리한 서류가 늘 때마다 아코는 보답으로 초콜릿을 준다. 그런데 그게 아코가 직접 만든 수제 초콜릿임을 들키자, 아코는 잠자코 감상이나 말해달라며 툴툴거린다."
2924359616 = "최고의 초콜릿을 만드는 방법"
1842651911 = "몰래 급식실에 잠입한 이즈미는 발렌타인 데이를 맞이해 최고의 초콜릿을 만들겠다고 전의를 불태운다. 그렇게 온갖 예상을 뛰어넘는 재료를 넣어 만든 초콜릿을 선생님과 함께 맛보지만, 의외로 나쁘지 않은 맛에 선생님은 깜짝 놀란다."
337670640 = "때 묻지 않은 포상"
1256516418 = "의뢰 해결을 협력해 준 것에 고마워하며, 아루는 공치사로 선생님에게 비싼 돈을 주고 산 최고급 초콜릿을 선물해 준다. 그러나 알고 보니 그건 떨이 판매하는 초콜릿을 속아서 산 것이었다. 진실을 깨달은 아루는 이대로 당하지 않겠다며 선생님과 복수를 다짐한다."
2584656396 = "룰렛 미스디렉션!"
1642941794 = "무츠키는 재미있는 초콜릿을 찾았다며, 매운맛 러시안룰렛 초콜릿을 가져와 선생님과 승부를 제안한다. 그렇게 승부를 시작하자마자 선생님은 매운 초콜릿을 먹고 기겁하지만, 뒤늦게 이게 전부 무츠키가 노린 장난이었다는 걸 알게 된다."
2303027701 = "특별한 날엔 특별한 마음을"
2807414059 = "발렌타인 데이라고 단것만 먹으면 건강을 해칠 거라며 도시락을 준비한 후우카. 식후에 따뜻한 코코아를 마시던 선생님은, 머그잔의 디자인이 같다고 지적하고, 후우카는 부끄러워하며 도망친다."
2115727613 = "소녀의 진심은 빛바래지 않아."
1271327959 = "주리가 건네준 수제 초콜릿에서 평범한 맛이 나자, 선생님은 직접 만든 게 아니라는 걸 꿰뚫어 본다. 주리의 진짜 수제 초콜릿을 맛보고 싶다는 말에 주리는 기뻐하며 직접 만든 수제 초콜릿을 건네주고, 그걸 맛본 선생님은 후회 없이 정신을 잃는다."
1794739046 = "둘이서 하는 뒤풀이"
4091436927 = "디저트 가게에서 아르바이트하며 정신없는 하루를 보낸 세리카와 선생님. 사실 세리카가 그 가게에서 아르바이트한 목적은 시그니처 케이크를 받기 위함이었다. 두 사람은 함께 케이크를 먹으며 뒤풀이를 한다."
3828618989 = "간식부장님의 진심"
508038070 = "함께 장보기를 마치고 돌아가는 길, 노노미와 선생님은 잠깐의 강변 벤치에 앉아 휴식을 취한다. 노노미는 아까 사온 간식을 하나둘 꺼내며, 아비도스의 간식부장으로서 진심을 보여주기로 한다."
1075068622 = "Record it again"
3328710083 = "선생님과 함께 운동 기록을 재던 스미레. 마침 선생님이 배고파하는 걸 안 스미레는, 발렌타인 데이를 맞이해 자신이 선별한 가장 훌륭한 발렌타인 데이용 대체 식품을 건네준다."
2054798090 = "포기하지 않는 게이머"
1651777598 = "발렌타인 데이의 게임 대회에 참가한 모모이지만, 1회전에서 바로 탈락하고야 만다. 우승 트로피와 초콜릿을 함께 선물하고자 했던 계획은 실패했지만, 대신 모모이는 과자 뽑기 게임에서 뽑은 초콜릿을 선생님에게 선물한다."
166046686 = "처음이 좋아요. 선생님."
2953614051 = "누구보다 먼저 초콜릿을 선물하고 싶은 마음에, 이른 아침 선생님을 호출한 미도리. 그렇게 밤새 자신이 시행착오를 하며 만든 초콜릿을 건네준 미도리는 수줍어하며 도망가 버린다."
3576293106 = "당신을 위한 문구 하나."
1344353369 = "음양부 부실에서 집 보기를 하는 치세. 업무를 보는 선생님의 옆에서 계속 무언가의 포장지를 벗긴다. 포장지 내용물의 정체는 바로 사자성어 센베이 초콜릿. 마침내 치세가 찾던 사자성어가 나오자, 선생님에게도 글귀가 적힌 초콜릿을 나눠 준다."
2997161539 = "누군가를 위한 특별 앙케이트!"
615936915 = "백야당 특별 한정 디저트를 팔기 위한 앙케이트에 협력해달라는 시즈코. 조사가 끝난 뒤, 단 한 명의 앙케이트만 받았지만 괜찮겠냐는 선생님의 질문에 시즈코는 환한 웃음으로 답한다."
2646709498 = "주군과 닌자의 맛"
944329625 = "이즈나는 고대하고 고대하던 닌자 초콜릿 세트를 손에 넣어 선생님에게 선물한다. 선생님은 소중한 굿즈를 먹어도 되냐고 묻지만, 이즈나는 기쁜 마음으로 선생님과 초콜릿을 나눠 먹는다."
3304469559 = "달콤하고도 부드러운 꿈결"
2669528589 = "끝없는 업무를 처리하다가 밤을 새우게 된 선생님. 당장이라도 쓰러질 것 같은 그때, 츠바키가 나타나 숙면을 위한 선물을 프레젠트한다."
2320642113 = "제 모든 것을 담아, 당신께."
1400229860 = "선생님을 열심히 미행하던 와카모는 결국 선생님의 눈앞에 나타나 초콜릿을 건넨다. 초콜릿에 쉽사리 손을 대지 못하는 선생님에게, 와카모는 기대의 눈빛을 거두지 않는다."
4255752625 = "보다 씁쓸하고, 더욱 달콤하게"
2444141989 = "디저트의 달콤함에 담긴 철학을 고민하는 하루나. 쓴맛과 단맛이 함께 느껴지는 초콜릿을 만들어 자신의 가설을 증명하고자, 선생님과 함께 궁극의 초콜릿을 만들어낸다."
3729666985 = "스컬맨 변신!"
2511158405 = "으슥한 산기슭으로 선생님을 불러낸 아즈사. 스컬맨 모양의 초콜릿을 선물하지만, 그것을 대수롭지 않게 먹어버린 선생님에게 당황한다. 하지만 선생님의 뜻밖의 대답을 들은 아즈사는 마침내 미소를 짓게 된다."
2749513973 = "그렇게 먹지 말라고!"
3453339704 = "코하루는 발렌타인 데이를 맞아 선생님에게 십자 무늬가 그려진 초콜릿을 선물한다. 그런데 초콜릿 무늬가 신경 쓰이고부터, 선생님이 초콜릿을 먹는 모습이 야릇하게 보여 당황한다."
3264516979 = "익숙한 느낌"
4100897639 = "우연히 편의점에서 선생님과 마주친 스즈미. 발렌타인 데이를 맞아 무언가 선물하려고 하던 스즈미는, 별 모양의 초콜릿을 고른다. 다른 선물을 고를까 하던 스즈미를 선생님은, 스즈미답다며 만류한다."
277127002 = "신성모독일까요?"
3783664452 = "기도하는 동상 모양의 초콜릿을 준비한 마리. 선생님은 기쁘게 마리의 초콜릿을 받지만, 어떻게 먹어야 신성모독이 되지 않을지 고민한 결과 결국 전시하기로 한다."
3828018681 = "책상에서도 문제없이"
2801125887 = "늦은 시각의 도서관, 시미코는 발렌타인 데이를 기념해 선생님에게 초콜릿을 선물한다. 시미코의 초콜릿은 코팅이 되어 있어, 손에 묻지 않아 먹으면서 책을 읽을 수 있는 도서부원의 센스가 듬뿍 담긴 물건이었다."
2875243567 = "익숙해진 모습"
4120418651 = "살짝 초콜릿만 두고 돌아가려던 세리나의 계획은 타이밍이 나빠서 실패하고 만다. 하지만 세리나를 이해해주는 선생님의 모습에, 세리나는 조금 감동하게 된다."
1098144936 = "고민 끝에 내린 결론"
3201590812 = "발렌타인 데이를 맞이해, 선생님에게 민트초콜릿을 선물하는 아이리. 예상대로의 선물을 받아 덤덤한 선생님에게, 아이리는 이 민트초코의 무엇이 더욱 고급지고 특별한 것인지 열심히 설명한다."
192904433 = "가장 귀한 한정판"
80308750 = "한정판 초콜릿을 구하지 못해서 속상해하는 요시미. 결국 스스로 만든 형편없는 모양의 초콜릿을 선물하게 되지만, 예상외로 선생님이 맛있게 먹자 가슴을 쓸어내린다."
3586750675 = "교보재: 초콜릿"
2253911203 = "발렌타인 데이, 그리고 초콜릿을 선물하는 행동을 두고 사색을 하는 나츠. 그 의미는 마음을 전하는 것에 있다는 결론을 내고, 초콜릿을 선생님에게 내민다."
1180885592 = "가장 좋은 순간"
697521960 = "선생님에게 포츈 초콜릿을 건네는 치나츠. 초콜릿을 쪼개 그 안에 든 문구를 전달하는 데까지는 성공했지만, 모든 문구가 같다는 걸 들키자 부끄러워하며 도망친다."
1962407239 = "포장지가 없어서"
1077466145 = "비상 대기중인 짬을 이용해서 선생님에게 초콜릿을 선물하는 세나. 비록 포장지가 없어서 멸균 붕대에 감긴 초콜릿이지만 오히려 선생님은 세나답다고 반응하며 기꺼이 초콜릿을 받는다."
1976727305 = "사전에 미리 대처"
2963687798 = "발렌타인 데이를 위해 수중에 가진 돈에서 가장 비싼 초콜릿을 준비한 하루카. 하루카에게 먼저 초콜릿을 받고 싶어서 왔다는 선생님의 말에 하루카는 감동하며, 어렵사리 미소를 지어 보인다."
1012027940 = "발렌타인 술래잡기"
1666704886 = "서프라이즈한 등장과 동시에 발렌타인 초콜릿을 가슴 사이에서 꺼내는 아스나. 부담스러운 모양의 초콜릿으로부터 도망친 선생님과, 그것을 어떻게든 먹이려고 하는 아스나의 추격전이 시작된다."
2713488453 = "메이드다운 솜씨"
3307298409 = "가방에서 주섬주섬 무언가를 꺼내는 아카네의 앞에서 선생님은 그만 당황하고 만다. 하지만 그것이 아카네가 준비한 수제 초콜릿임이 드러난다. 아카네는 오늘만큼은 메이드와 주인님보다는 선생님과 그 학생으로서 초콜릿을 함께 나눈다."
1881980585 = "맛있어져라 모에모에 쿵"
1305131009 = "선생님은 발렌타이 데이를 맞아 카린이 일하고 있는 메이드 카페를 찾는다. 선생님은 카린에게 음식이 맛있어지는 주문을 부탁하지만, 카린은 결국 부끄러움을 이기지 못하고 폭발하고 만다."
2513811506 = "신경 쓰면 지는 것들"
263736182 = "네루의 연락을 받고 밀레니엄 캠퍼스에 나간 선생님. 네루는 굉장히 화려한 장식이 된 초콜릿을 건넨다. 그런데 그 맛이 궁금하다며 다시 초콜릿을 빼앗으려 든다."
1221828673 = "발렌타인 초콜릿의 기원"
2341240125 = "많은 고민 끝에 최초의 발렌타인 초콜릿 스타일 포장을 한 초콜릿을 선생님에게 선물하는 코토리. 코토리는 선생님의 시간을 더 빼앗기 미안해서 퇴장하려 하지만 선생님은 초콜릿을 함께 먹자며 코토리를 붙잡는다."
887088760 = "풍미와 운치"
3219396506 = "피나가 은인에게 보답하기 위해 특별히 마련한 자리에서 술잔을 꺼낸다. 선생님이 술잔을 만류하자, 피나는 그 술잔이 사실은 잘 조형된 초콜릿 잔이라고 설명한다. 마침내 두 사람은 초콜릿에 녹차를 따르고 풍미를 즐긴다."
3891995307 = "책에서 본 로맨틱함"
