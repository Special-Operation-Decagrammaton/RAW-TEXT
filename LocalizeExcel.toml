2746710944 = "潔莉諾一行人從政變中逃了出來，抵達了「舊校舍」。在那裡，遇到了潔莉諾以前肅清的「227號特別班」的學生們。潔莉諾與其中一名成員和香為了鬍子吵了起來，於是便聽從另一名成員時雨的建議，以「飲酒比賽」決勝負。"
