3920080884 = "เดคาแกรมมาทอนคือปัญญาประดิษฐ์ที่อ้างว่าตนเป็นสมาชิกของลัทธิศักดิ์สิทธิ์ ปัจจุบันมีผู้เลื่อมใสนับ 10 ตนติดตามเขาไปทั่วคิโวทอส\n\nบีนาห์คือผู้เลื่อมใสตนที่ 3 ของเดคาแกรมมาทอน ถูกพบเป็นครั้งแรกในโลกทะเล\nทรายของโรงเรียนอะบิดอส ไม่มีใครรู้ว่าทำไมบีนาห์ถึงมาที่นี่ แต่ที่แน่ๆ มันเป็น\nภัยอันตรายเกินกว่าจะปล่อยไว้แบบนี้"
3639039230 = "เดคาแกรมมาทอนคือปัญญาประดิษฐ์ที่อ้างว่าตนเป็นสมาชิกของลัทธิศักดิ์สิทธิ์ ปัจจุบันมีผู้เลื่อมใสกว่า 10 ตนติดตามเขาไปทั่วคิโวทอส\n\nเชเซ็ดคือผู้เลื่อมใสคนที่ 4 ของเดคาแกรมมาทอน เขาเป็นเจ้าของระบบการผลิต ของโรงงานอาวุธที่ถูกทิ้งร้างนอกโรงเรียนมิลเลเนียม"
3682198469 = "เทวทูตประดิษฐ์ที่สิ่งลึกลับที่บิดเบี้ยวเฝ้าดูอยู่ได้ปรากฏตัวขึ้นในวิหารใต้ดิน\nที่ถูกทิ้งร้างแห่งหนึ่งในคิโวทอส\n\nเกรกอเรียส สัตว์ประหลาดลึกลับที่เกิดขึ้นจากการทดลองของเกมาเทรีย\nเพื่อให้ซีรีส์เทวทูตประดิษฐ์ในชื่อ <สหพันธ์นักบุญ> สมบูรณ์ และแม้แต่\nในตอนนี้เอง สัตว์ประหลาดนั้นกำลังบรรเลงออร์แกนอยู่ในวิหารใต้ดิน\nทว่าไม่มีใครล่วงรู้ว่าจะมีสิ่งใดรออยู่หลังการแสดงนี้จบลง"
1904549173 = "มี <ตำนานร้อยเรื่องราววิญญาณลี้ลับ> ที่ถูกเล่าต่อกันมาในสหพันธ์\nเฮียกคิยาโคเมื่อนานมาแล้ว\n\nหนึ่งในนั้นคือ <เมียวกิ คุโระคาเงะ> ที่ก่อความวุ่นวายในงานเทศกาล\nที่ทุกคนควรได้สนุกและหัวเราะร่วมกัน มันมีตัวตนอยู่จริงหรือไม่? หรือเป็นแค่เรื่องลี้ลับจากฝีมือของใครสักคนที่มีเจตนาร้าย? แม้ว่ายังไม่รู้ข้อเท็จจริง แต่มันถึงเวลาที่ต้องยุติเรื่องลี้ลับนี้ก่อนจะสายเกินไป"
1142087454 = "เดคาแกรมมาทอนคือปัญญาประดิษฐ์ที่อ้างว่าตนเป็นสมาชิกของลัทธิศักดิ์สิทธิ์ ปัจจุบันมีผู้เลื่อมใสนับ 10 ตนติดตามเขาไปทั่วคิโวทอส\n\nเกวูราห์คือผู้เลื่อมใสตนที่ 5 ของเดคาแกรมมาทอน หลังจากที่ยานสำรวจไร้คนขับของฐานวิจัยเขตขั้วโลกถูก AI ไม่ระบุตัวตนแฮ็ก ก็ได้วิวัฒนาการตัวเองขึ้นหลายต่อหลายครั้ง จนกลายเป็นร่างในปัจจุบัน แม้ว่าเกวูราห์ไม่มีเจตจำนงชัดเจน แต่หากปล่อยไว้แบบนี้ เขาอาจเป็นภัยต่อความปลอดภัยของเส้นทางเดินเรือทั้งหมดในคิโวทอส รวมถึงเส้นทางเดินเรือเขตขั้วโลกด้วย"
3983422512 = "เดคาแกรมมาทอนคือปัญญาประดิษฐ์ที่อ้างว่าตนเป็นสมาชิกของลัทธิศักดิ์สิทธิ์ ปัจจุบันมีผู้เลื่อมใสนับ 10 ตนติดตามเขาไปทั่วคิโวทอส\n\nเยซ็อดเป็นผู้เลื่อมใสตนที่ 9 ของเดคาแกรมมาทอน ในปัจจุบันไม่มีโครงสร้างดั้งเดิมนั้นให้เห็นแล้ว แม้ว่าจะไม่รู้โครงสร้างเดิมหรือจุดประสงค์ในการสร้าง แต่ก็ชัดเจนว่าปล่อยเยซ็อดไว้แบบนี้ไม่ได้"
276060001 = "มีรายงานเรื่องเหตุการณ์ประหลาดลึกลับในสวนสนุก <สลัมเพีย>\nที่ต้องปิดกิจการลงเพราะปัญหาการเงินและถูกปล่อยร้าง มีรายงานว่า\nตุ๊กตาและเครื่องเล่นต่าง ๆ ที่ควรจะหยุดทำงานไปแล้วได้ถูกเปิดขึ้นมา\nอีกในตอนกลางคืน และออกอาละวาดทำร้ายผู้คน\n\nGOZ ตุ๊กตาตัวตลกได้ออกมาเปิดการแสดงเดี่ยวใน <สลัมเพีย> ร้างแห่งนี้ โดยซ่อนตัวตนร้ายกาจไว้ภายใต้รอยยิ้มที่แปลกประหลาด จึงยากที่เราจะคาดคะเนได้"
3550217605 = "มีการค้นพบสิ่งมีชีวิตที่ไม่สามารถระบุตัวตนได้ที่ชั้นใต้ดินของซากปรัก\nหักพังของวิหารโบราณในเขตทรีนิตี้ ไฮโรนีมัสคือหุ่นเทวทูตประดิษฐ์\nรุ่นสมบูรณ์แบบที่เรียกว่า <สหพันธ์นักบุญ> ที่เกมาเทรียสร้างขึ้นโดย\nใช้ข้อมูลจากความรู้โบราณ\nจะปล่อยให้พลังของไฮโรนีมัสเพิ่มไปกว่านี้ไม่ได้! ได้เวลาเคลื่อนไหว\nเพื่อความผาสุขของคิโวทอสแล้ว!"
2223988532 = "เดคาแกรมมาทอนคือปัญญาประดิษฐ์ที่อ้างว่าตนเป็นสมาชิกของลัทธิศักดิ์สิทธิ์ ปัจจุบันมีผู้เลื่อมใสกว่า 10 ตนติดตามเขาไปทั่วคิโวทอส\n\nเดิมที HOD เป็นหน่วย AI เครือข่ายสื่อสารในเขตปกครองตนเองมิลเลเนียม\nแต่หลังจากที่ถูก AI ไม่ระบุตัวตนแฮ็ก ก็อ้างว่าตนเป็นผู้เลื่อมใสตนที่ 8 ของ\nเดคาแกรมมาทอน เราต้องยับยั้งการจู่โจมเครื่องคำนวณที่มีแก่นเทคโนโลยี\nของมิลเลเนียมนี้ เพื่อรับประกันความปลอดภัยของมิลเลเนียมไว้"
2092560489 = "ได้รับข้อมูลว่า <จิ้งจอกแห่งความพินาศ> หนึ่งใน <เจ็ดอาชญากร>\nทลายห้องคุมขังและชิงเรือโฮเวอร์คราฟต์ไปเพื่อก่อความวุ่นวาย\n\nแม้จะไม่รู้สาเหตุที่เธอก่อเหตุทำลายล้างแบบไม่เลือกหน้าในชุดว่ายน้ำ\nแต่ถ้าปล่อยเธอไว้แบบนั้น ชายหาดที่สวยงามของคิโวทอสแห่งนี้\nจะกลายเป็นทะเลเพลิงไปในที่สุด"
491740630 = "พบศูนย์บัญชาการของไคเทนเจอร์ตัวปัญหาแล้ว\nไคเทนเจอร์กำลังสร้าง「KAITEN FX Mk.0」 หุ่นยนต์ที่รวมเอาเทคโนโลยี\nและเงินที่ปล้นมาได้ไว้ที่นี่ แน่นอนว่าเท่สุดๆ แต่พอมาคิดถึงปัญหาต่างๆ\nที่หุ่นยนต์นี้ก่อแล้ว ความฝันคงต้องสิ้นสุดลงตรงนี้"
1866624346 = "ปีศาจยักษ์ปริศนาที่ถูกพบในเขตทะเลแถว D.U. มันมีรูปลักษณ์คล้ายกับ\nของเล่น MOMO FRIENDS ที่ตกทะเลมา แม้จะไม่รู้ว่ามันเกิดขึ้นได้อย่างไร\nแต่เราต้องขัดขวางการโจมตีของปีศาจยักษ์นี่ให้ได้!"
3601545918 = "มีรายงานเรื่องเหตุการณ์ประหลาดลึกลับที่สวนสนุก <สลัมเพีย>\nที่ต้องปิดกิจการลงเพราะปัญหาการเงินและถูกปล่อยร้างมีรายงานว่า\nตุ๊กตาและเครื่องเล่นต่างๆ ที่ควรจะหยุดทำงานไปแล้ว\nได้ถูกเปิดขึ้นมาอีกในตอนกลางคืน และออกอาละวาดทำร้ายผู้คน\n\nถึงจะไม่รู้สาเหตุที่เครื่องเล่นอื่นๆ และ คุโระ&ชิโระ เคลื่อนไหวได้อีกครั้ง แต่ดูเหมือนว่าพวกมันพยายามที่จะสร้างเทศกาลสวนสนุกที่มีสีสัน\nแบบในอดีตขึ้นมาอีกครั้ง"
