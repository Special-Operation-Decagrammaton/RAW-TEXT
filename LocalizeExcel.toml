3840713209 = "세 번째 승리!"
3349557109 = "토모에와 [USERNAME] 선생님은 체리노를 구출한 뒤, 용역부에게 지금의 회장은 마리나라는 사실을 알려준다. 쿠데타로 회장이 바뀌었다는 말에 용역부는 새로운 지도자를 처단하기 위해 붉은겨울 사무국으로 향한다."
3439678836 = "다시 사무국으로"
