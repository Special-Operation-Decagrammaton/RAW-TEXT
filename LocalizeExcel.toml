3002551130 = "모든 상황을 수습하고 소동을 벌인 잘못에 용서를 구하는 미네와 구호기사단. 하스미와 정의실현부는 그녀들의 사과를 받아들이고 크리스마스 송년회를 다 함께 즐기자고 제안한다."
