3227473772 = "เซมิน่าตามหานักเรียนมิลเลเนียมที่ขโมยหุ่นยนต์เชียร์ได้สำเร็จด้วยความ\nช่วยเหลือของเวอริทัส นักเรียนเหล่านั้นคือพวกที่ต่อต้านการเปิดงานแข่ง\nขัน กีฬาเพราะไม่ชอบกิจกรรมกีฬา จึงวางแผนก่อกวนการเพื่อขัดขวางการ\nจัดงานมหกรรมแข่งขันกีฬาที่กำลังจะมีขึ้น กลุ่มนักเรียน <ก.ต.ฮ.> ปะทะ\nกับเซมิน่าโดยใช้หุ่นยนต์ที่ขโมยมจากชมรมวิศวกรรม"
