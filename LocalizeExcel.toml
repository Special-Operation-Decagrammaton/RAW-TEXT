2374839960 = "이부키가 좋아하는 언니들에게 선물 받은 인형. 외견은 조금 독특하지만, 오히려 그러한 부분이 이부키에겐 가장 마음에 드는 듯하다."
938424299 = "이부키가 평소 소중히 아껴 쓰는 크레용. 이것으로 이부키가 그려내는 세계는 그야말로 무궁무진하다."
1063147996 = "이부키가 제일로 좋아하는 디저트 중 하나. 매일 한 개씩만 먹을 수 있는 귀한 간식이지만, 가끔 냉장고에서 사라질 때가 있는 모양이다."
1559446809 = "이부키의 개인 물건을 보관하는 손가방. 휴대폰부터 호루라기와 총기, 선배들이 챙겨준 티슈 그리고 예쁜 꽃잎 등 다양한 것들이 들어있다."
917196592 = "이부키가 직접 자기 손으로 좋아하는 선배들을 그려놓은 그림. 마코토의 특별 명령으로 게헨나의 보물로 지정되어 있다."
1246509466 = "만마전의 위엄을 알리고자 제작된 정기신문. 다만 그 내용 대부분은 이부키를 다루고 있어, 사실상 이부키 굿즈로서 가치가 더 높다."
1636079057 = "정기적으로 진행되는 급양부의 위생 평가가 기록된 점검표. 대부분 만점을 받지만, 간혹 피치 못할 사정으로 낙제점을 받기도 하는 모양이다."
1783365279 = "구교사에 떨어져 있던 낡은 피아노 조율기. 겉은 낡고 오래되어 보이지만, 원래 주인이 소중히 다룬 덕분인지, 사용하는 데 문제는 없다."
561939847 = "누군가 미처 챙기지 못한 책가방. 보통 교과서나 과자, 만화책 등이 들어있지만, 종종 폭탄 같은 게 들어있기도 한 것이 게헨나 학원답다."
1142909824 = "불에 타서 여기저기 그을린 만마전 정기신문. 다행히 이부키에 대한 내용이 아닌, 마코토의 연설이 실린 신문이기에, 손해를 본 사람은 없을 듯하다."
4224932345 = "선도부가 관리하는 감옥 출입자 기록 대장. 원래는 보안을 위한 중요한 물건이지만, 지금은 자주 감옥에 감금되는 학생들의 방명록으로도 쓰이고 있다."
186189428 = "아코가 히나를 위해 마련한 핸드드립 기구. 부관의 배려심이 묻어 나오는 멋진 물건이지만, 정작 당사자가 내리는 커피는 맛이 없는 모양이다."
2653748522 = "평소 주리가 급양부에서 요리 공부를 위해 세세하게 적어둔 레시피이다. 이 레시피를 사용하면 어지간하면 맛있는 음식을 만들 수 있다."
2932450416 = "체리노가 마코토에게 직접 보낸 서한. 지도자로서의 가져야 할 올바른 자세와 각 학원의 무궁한 발전을 바라는 내용이 쓰여있다."
1955500566 = "감옥에서 발견된 숟가락. 주로 음식을 먹거나, 감옥에서 탈출할 때나, 멋진 영웅으로 변신할 때 쓰이고는 하는 물건이다."
652268410 = "선도부의 업무가 기록된 서류 더미. 보기만 해도 머리가 아파져 오는 문자와 숫자로 가득 차 있다. 부딪쳐서 넘어트리지 않도록 주의하자!"
3128527829 = "세나가 정리해 놓은 환자 목록. 우선으로 치료가 필요한 대상부터 꾀병 환자까지 냉정하게 기록된 부분이 세나답다."
4077140834 = "누군가가 잃어버린 듯한 식권. 주인은 알 수 없지만, 식권 위에 쓰여 있는 <기대된다!>라는 말에서 자그마한 안타까움이 느껴진다."
3849298482 = "구겨져서 아무렇게나 버려져 있는 가정통신문. 내용 대부분이 마코토의 위업에 대해 기록된 내용뿐이라, 특별히 쓸모는 없다."
88965538 = "아직 사용하지 않은 응급의학부의 주사기. 바늘이 위험하니까, 섣불리 만지지 않도록 주의하자!"
