3384243049 = "Deals damage to all Striker(s).\n\n\n[c][75b4c0][i]The Legendary Thug known throughout Kivotos.\nStories of her heroics will make any Thug break into tears.[/i][-][/c]"
3391762953 = "[c]At game's start:[/c] Increases EX Skill Power and HP of all other [c]{tag;Sukeban}[/c] Strikers by [c]2[/c].\n\n[c]At the start of user's Phase:[/c] Increases the user's EX Skill Power and HP by [c]5[/c] if the user is alone. [c](1 time per game)[/c]"
2934588240 = "Damages all Rear enemies and inflicts [c]Unswappable[/c].\n\n\n[c][75b4c0][i]\"She's a nice and kind student at heart. I hope her feelings don't get hurt. Although someone might step in...\"\n- Memo from the Head Prefect[/i][-][/c]"
