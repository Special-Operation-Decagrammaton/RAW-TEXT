707855630 = "ส่งท้ายงานเทศกาล"
1580334319 = "เหล่านักเรียนทรีนิตี้ที่เดินทางมายังโรงเรียนมิลเลเนียม เพื่อมาเยี่ยมชมงานเอ็กซ์โป\nเซอาที่กำลังจะเข้าร่วมงาน และผ่านการต้อนรับจาก C&C แต่ไปเห็นการเคลื่อนไหวที่น่าสงสัย ของกลุ่มนักเรียน\nลึกลับเข้าอย่างกะทันหัน เธอจึงไล่ตามไป"
1485885318 = "เซอาติดตามการเคลื่อนไหวของกลุ่มนักเรียนลึกลับ\nเข้าไปในทางใต้ดิน\nเธอเริ่มเข้าไปใกล้โดยปลอมตัวเป็นกล่อง เพื่อแอบฟังบทสนทนาโดยไม่ให้ถูกจับได้ และสิ่งที่พบที่นั่นก็คือ..."
3524856260 = "เซอามุ่งหน้าไปยังที่ซ่อนของริโอะกับเนรุ\nหลังจากที่ได้ฟังเรื่องราวของทั้งสองคนที่นั่น เธอได้ยืนยันว่าสิ่งที่พบมาเป็นความจริงทั้งหมดหรือไม่ จากนั้นเซอาจึงยื่นคำขออย่างหนึ่งกับทั้งสองคนที่\nพยายามปกป้องเธอในฐานะแขกแลกกับการให้ข้อมูล"
3055035619 = "ริโอะที่มีแนวร่วมคนใหม่ชื่อว่าเซอาได้ใช้กลยุทธ์\nในการสืบสวนสถานการณ์อย่างจริงจังมากขึ้น"
1087244281 = "เซอาออกมาสืบสวนรอบๆ โรงเรียนตามคำสั่งของริโอะ\nและเพื่อค้นหาเบาะแสใน <มิลเลเนียมที่ระส่ำระสายไปทุกที่> เธอไปยังห้องเรียนที่มีนักเรียนจำนวนมากเป็นที่แรก"
3603561 = "เซอาพบสมาชิกชมรมของหวานหลังเลิกเรียน\nในห้องเรียน และได้ฟังเรื่อง <หุ่นยนต์สัตว์เลี้ยง>\nจากพวกเธอด้วยความแปลกใหม่\nและน่าสนใจของหัวข้อ เธอจึงตัดสินใจ\nจะช่วยทุกคนค้นหาหุ่นยนต์สัตว์เลี้ยงที่หายไปตัวนั้น"
3962754328 = "เซอาที่กำลังงุนงงกับการที่หุ่นยนต์สัตว์เลี้ยงคือ\nหุ่นยนต์จระเข้ คารินกับอาสึนะก็บอกเธอว่า\n\"มันเป็นเรื่องธรรมดาในมิลเลเนียม\"\nหลังจากได้ยินว่าหุ่นยนต์จระเข้ถูกสร้างขึ้นโดย\nชมรมวิศวกรรม เซอาจึงไปพบกับชมรมวิศวกรรม\nโดยตรง"
1344822250 = "หลังจากปราบหุ่นรบล้ำยุคที่กำลังอาละวาด\nได้อย่างหวุดหวิด ยูกะเข้ามาสอบถามกับ\nชมรมวิศวกรรม ทางชมรมวิศวกรรมร้องขอ\nความเป็นธรรม ส่วนเซอาได้ค้นพบ\nชิปที่น่าสงสัยภายในหุ่นรบล้ำยุคที่ถูกทำลาย"
2239397365 = "เมื่อได้รับชิปที่น่าสงสัย ริโอะก็สัมผัสได้ถึง <เจตนา> บางอย่างจากชิปนี้\nทางด้านเซอาที่ได้พูดคุยกับริโอะเรื่องนั้น ก็สัมผัสได้ว่าริโอะเปลี่ยนไปจากเดิมเล็กน้อย"
1398523524 = "เนรุเตรียมการแฝงตัวในศูนย์ข้อมูล ส่วนริโอะส่งมอบ USB และกุญแจความปลอดภัยให้กับเนรุ"
1813766078 = "เนรุแฝงตัวเข้าไปในศูนย์ข้อมูลและไปถึง\nจุดหมายได้สำเร็จ แต่ก็ต้องพบกับปัญหาใหม่\nในขณะที่ตกอยู่ในสถานการณ์ที่ยากลำบาก เนรุได้ยินเสียงเอะอะที่คุ้นเคยของใครบางคน"
1717919827 = "ริโอะได้วิเคราะห์สถานการณ์จากข้อมูลในศูนย์ข้อมูล\nสถานการณ์ย่ำแย่มากกว่าที่ทั้งสามคิดไว้ ริโอะที่ไม่อาจทนอยู่เฉยๆ ได้อีกต่อไป จึงเตรียมออกปฏิบัติการจู่โจมที่เกิดเหตุ"
2988794607 = "ริโอะรีบตรวจสอบข้อมูลที่ถาโถมเข้ามาเพื่อช่วยเซอา\nเซอาสังเกตเห็นความเอาใจใส่ของริโอะ จึงมุ่งหน้าไปที่ชมรมพัฒนาเกมเพื่อตอบแทนเธอ"
58980428 = "เซอามาถึงชมรมพัฒนาเกมและได้พบอาริสึกับ\nยูสึที่นั่น อาริสึเรียกเซอาว่า <คลาสโจร> และออก\nไปยังฮอลล์จัดแสดงเกมของชมรมพัฒนาเกมกับเธอ"
3905697355 = "เกมในฮอลล์จัดแสดงเป็นเกมที่ทุกคนในชมรมพัฒนาเกม\nตั้งใจสร้างขึ้นมา\nแต่ด้วยเหตุผลบางประการ เกมได้เปลี่ยนให้ผู้คน\nที่เล่นเกมโกรธ และทั้งฮอลล์ก็ตกอยู่ในความโกลาหล"
1699322212 = "หลังจากตรวจสอบชิปที่ทำลายเกม ริโอะก็ยืนยันได้ว่านี่เป็นการก่อวินาศกรรมโดยตั้งใจ เช่นเดียวกับชมรมวิศวกรรม\nแต่นอกเหนือจากนั้น เธอเลี่ยงที่จะพูดถึงความยาก และคุณภาพของเกม..."
1906942469 = "เนรุมุ่งหน้าไปที่ฟิตเนสเซ็นเตอร์เพื่อบุกจู่โจมที่เกิดเหตุ\nดูเหมือนว่าจะไม่มีปัญหาพิเศษใดๆ แต่ไม่นานนัก\nเครื่องก็ทำงานผิดปกติ จนทำให้ฮาสุมิกับสึมิเระลำบาก เนรุพบตัวกลุ่มนักเรียนที่ก่อปัญหา จึงไล่ตามพวกเธอไป"
2940778481 = "หลังจากไล่ตามกลุ่มนักเรียนลึกลับมา เนรุก็ตามทันและปราบพวกเธอลงได้ในที่สุด\nแต่ผู้บงการเบื้องหลังได้โทรศัพท์ติดต่อพวกเธอเข้ามา แล้วเกิดระเบิดขึ้น ทำให้พวกเธอหลบหนีไปได้ "
2077988676 = "เมื่อปฏิบัติการจู่โจมที่เกิดเหตุล้มเหลว ริโอะบอกว่าเธอไม่มีทางเลือกอื่นนอกจากออกค้นหา\nพวกเธอด้วยตัวเอง ริโอะที่ตัดสินว่าวิธีก่อนหน้านี้\nยังไม่เพียงพอ และพูดถึง\n<อัลกอริทึมของบิ๊กซิสเตอร์> ที่ถูกเก็บเป็นความลับไว้"
4128574415 = "ริโอะมุ่งหน้าไปที่ศูนย์ข้อมูลอีกครั้งเพื่อใช้งาน\nอัลกอริทึมของบิ๊กซิสเตอร์\nเซอากับเนรุตำหนิที่ริโอะแบกความรับความผิดทั้งหมด\nไว้ที่ตัวเอง และประกาศว่าจะทำปฏิบัติการนี้ไปด้วยกัน"
559738736 = "หลังจากเดินทางมาถึงห้องอัลกอริทึมของบิ๊กซิสเตอร์\nจนได้ในที่สุด\nทุกคนก็ได้พบว่าทั้งหมดเป็นแผนการของมิไร และกำลังตกอยู่ในสถานการณ์วิกฤติที่จะสูญเสีย\nอัลกอริทึมของบิ๊กซิสเตอร์ไป แต่เนรุกลับสงบ\nราวกับว่ายังมีส่วนที่เชื่อมั่นได้อยู่ ต่างจากริโอะกับเซอาที่มีทีท่าลนลาน"
3964034247 = "พวกเธอเอาชนะวิกฤตครั้งใหญ่ที่สุดมาได้ด้วยความ\nร่วมมือจากคุณครู\nมิไรกับพรรคพวกที่อับจนหนทางก็ถูกจับกุมในที่สุด"
2454044807 = "เมื่อเห็นว่าปัญหาได้รับการแก้ไขแล้ว ริโอะตัดสินใจจะจากไป ทำให้เซอากับเนรุรู้สึกเศร้าที่ริโอะจะจากไปโดยที่ยังไม่ได้สนุกกับงานเอ็กซ์โป\nเซอาคิดหาข้ออ้างดีๆ ได้ด้วยไหวพริบอันเฉียบแหลม และยื่นข้อเสนอให้ริโอะ"
4226564748 = "ริโอะวางแผนปฏิบัติการเพื่อนำ <ของจัดแสดงที่อันตราย> ในสถานที่จัดงานเอ็กซ์โปกลับคืนมา\nเซอาได้รับอุปกรณ์ใหม่จากริโอะ และเริ่มปฏิบัติการแฝงตัวโดยใช้อุปกรณ์ที่ล้ำสมัยนั้น"
3409180479 = "ริโอะพบพรรคพวกที่เหลือของพวกมิไรในสถานที่\nจัดงานเอ็กซ์โป พวกเธอไม่สามารถทิ้งของมีค่าไว้\nและพยายามขโมยผลงานนั้น เนรุเลยรวบพวกเธอทั้งหมด"
3753568740 = "ตรวจพบการเคลื่อนไหวปริศนาในฮอลล์จัดแสดงที่เสริม\nการรักษาความปลอดภัยขึ้น\nเนื่องจากระบบรักษาความปลอดภัยถูกยกระดับขึ้น\nจนแฝงตัวเข้าไปตามลำพังไม่ได้อีก ริโอะจึงวางแผน\nจะส่งเนรุกับเซอาเข้าไปพร้อมกันเพื่อค้นหาว่าเกิดอะไรขึ้น"
2190721227 = "โดรนรักษาความปลอดภัยขั้นสูงของสถานที่จัดงาน\nเอ็กซ์โปเกิดขัดข้อง ซึ่งอาจเป็นอันตรายต่อผู้เข้าชม\nในเช้าวันรุ่งขึ้นได้\nริโอะวางแผนที่จะปราบพวกมัน และเนรุกับเซอา\nก็แฝงตัวเข้าไปในสถานที่จัดงานอย่างชำนาญ และหยุดโดรนเหล่านั้นได้"
1147821016 = "คุณครูแนะนำพวกเธอให้เลิกปฏิบัติการแฝงตัว\nและสนุกไปกับงานเอ็กซ์โป เซอาตอบรับคำแนะนำ\nและตัดสินใจที่จะเข้าชมสถานที่จัดงานเอ็กซ์โป\nแต่ระหว่างที่เธอเดินชมในฐานะผู้เข้าชมทั่วไป\nจู่ๆ ก็เกิดเหตุการณ์วิกฤตที่ไม่คาดคิดขึ้น..."
2551732620 = "เนื่องจากการแฝงตัวของเนรุกับเซอาที่เกิดขึ้นบ่อย\nในไม่กี่วันนี้ ทางเซมิน่าจึงใช้มาตรการพิเศษ\nทั้งคู่ติดกับดักที่เซมิน่าวางไว้และพยายามหลบหนี\nจากวิกฤตสุดระทึก"
4087116818 = "ในวันสุดท้ายของงานเอ็กซ์โป เซอาเข้าไปทักทาย\nกับทุกคนที่ได้พบมา\nแต่คำทักทายสุดท้ายที่ดูน่าจะจบลงอย่างอบอุ่น\nกลับกลายเป็นความโกลาหล เมื่อมี <หุ่นยนต์สัตว์เลี้ยง> ที่ยังไม่ถูกจับปรากฏตัวขึ้น"
