2648436727 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"그냥 내가 해치워버려도 상관없지?\"[/i][-][/c]"
3441096829 = "[c]내 Phase 시작 시:[/c] 이번 Phase 동안 전열 아군의 EX스킬 위력이 [c]1[/c] 증가한다."
3403442927 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"아아~ 이런 곳에서 드러내고 싶지 않았는데!\"[/i][-][/c]"
1427289709 = "[c]내 Phase 종료 시:[/c] 다른 무작위 아군 스트라이커에게 보호막을 [c]{param;BasePower}[/c] 부여한다."
1117978599 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"불량배 중에는 스케반이라 자칭하는 무리가 있습니다! 도대체 어떤 차이인지, 본관은 잘….\"\n- 발키리 경찰학교의 생활안전국, 나카츠카사 키리노[/i][-][/c]"
2774820117 = "[c]내 Phase 시작 시:[/c] 아군 스트라이커 공간이 가득 차 있으면 체력을 [c]{param;BasePower}[/c] 회복한다."
426220014 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"얼레? 쟤 저번에 봉사 시간 채운다고, 등굣길 교통 봉사하던 애 아니야? 다들 성실하게도 산다니까.\"\n- 발키리 경찰학교의 생활안전국, 네무가키 후부키[/i][-][/c]"
1132320876 = "[c]내 Phase 종료 시:[/c] 아군 스트라이커 공간이 가득 차 있으면 자신에게 보호막을 [c]{param;BasePower}[/c] 부여한다."
3384243049 = "모든 스트라이커에게 피해를 준다.\n\n\n[c][75b4c0][i]키보토스 전역에 퍼진 불량배 집단, 스케반의 전설.\n아우들을 위해 희생한 영웅담은 그 어떤 스케반도 눈물 없이 들을 수 없다고.[/i][-][/c]"
3391762953 = "[c]게임 시작 시:[/c] 다른 [c]{tag;Sukeban}[/c] 스트라이커의 EX스킬 위력과 체력이 [c]2[/c] 증가한다.\n\n[c]내 Phase 시작 시:[/c] 자신이 혼자 남았다면, 자신의 EX스킬 위력과 체력이 [c]5[/c] 증가한다. [c](게임당 1번)[/c]"
2934588240 = "후열의 모든 적에게 피해를 주고, [c]교대 불가[/c]를 부여한다.\n\n\n[c][75b4c0][i]'근본은 착하고 상냥한 학생. 선도 때문에 상처받지 않으면 좋겠는데. 여차하면 그 녀석이 지키겠지만….'\n- 선도부장의 메모[/i][-][/c]"
1523348638 = "[c]내 Phase 종료 시:[/c] 체력이 가장 낮은 다른 아군 스트라이커의 체력을 [c]{param;BasePower}[/c] 회복한다."
2430113912 = "전열의 적에게 피해를 준다. 이후 [c]{char;848029}[/c] 카드를 [c]1[/c]개 소환한다.\n\n\n[c][75b4c0][i]온천개발부의 첫 번째 모토는 안전제일이다.[/i][-][/c]"
62152871 = "[c]내 Phase 종료 시:[/c] 아군 [c]{char;848029}[/c] 카드에게 보호막을 [c]{param;BasePower}[/c] 부여한다."
2277020639 = "후열의 적에게 피해를 준다. 이후 [c]{char;848029}[/c] 카드를 [c]1[/c]개 소환한다.\n\n\n[c][75b4c0][i]온천개발부의 두 번째 모토는 폭파 만능주의다.[/i][-][/c]"
2286455285 = "[c]내 Phase 종료 시:[/c] 모든 [c]{char;848029}[/c]에게 보호막을 무시하고 피해를 [c]{param;BasePower}[/c] 준다. 이후 모든 [c]{char;848029}[/c] 카드의 EX스킬 위력이 [c]1[/c] 증가한다."
4139891424 = "무작위 적에게 [c]{param;Min}~{param;Max}[/c] 피해를 준다.\n\n\n[c][75b4c0][i]'충동적이고 예측할 수 없으며, 행동 과정에 발생하는 어떤 희생도 감수하는 요주의 인물.'\n- 선도부장의 메모[/i][-][/c]"
1540816638 = "[c]내 Phase 시작 시:[/c] 자신에게 [c]{param;Min}~{param;Max}[/c] 피해를 주고, 체력을 [c]{param;Min}~{param;Max}[/c] 회복한다. 자신의 체력이 감소했을 경우, 다른 모든 스트라이커에게 그만큼 피해를 준다. 자신의 체력이 증가했을 경우, 다른 모든 스트라이커의 체력을 그만큼 회복한다."
2549347011 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]지옥으로 가는 길은 선의로 포장되어 있다.[/i][-][/c]"
2455668066 = "[c]내 Phase 시작 시:[/c] 자신의 체력이 [c]{param;ConditionNum}[/c] 이하라면, 체력을 [c]{param;BasePower}[/c] 회복한다."
2252755850 = "모든 적에게 피해를 준다.\n\n\n[c][75b4c0][i]그 어느 때에도 여유를 잃지 않는 학생. 일각에서는 하루나보다 위험하다는 평이 있기도…?[/i][-][/c]"
1185238083 = "[c]내 Phase 시작 시:[/c] 자신의 체력이 가득 차 있지 않다면, EX스킬 위력이 [c]1[/c] 증가한다."
4196376057 = "전열의 적에게 피해를 준다. 이후 자신과 체력이 가장 낮은 다른 아군의 체력을 [c]{param;SubPower}[/c] 회복한다.\n\n\n[c][75b4c0][i]이러니저러니, 항상 미식연구회와 함께하는 그녀도 충분히 괴짜다.[/i][-][/c]"
3067817325 = "[c]내 Phase 시작 시:[/c] 자신의 체력이 가장 낮다면 전열로 이동한다. 이후 자신의 체력이 [c]{param;ConditionNum}[/c] 이하일 경우 보호막을 [c]{param;BasePower}[/c] 부여한다."
2944040695 = "전열의 적에게 피해를 준다. 이후 후열의 모든 적에게 [c]{param;SubPower}[/c] 고정피해를 준다.\n\n\n[c][75b4c0][i]\"모든 학생에게는 진실을 알 권리가 있다!\"\n오늘도 신념과 긍지를 품고 진실을 쫓는 열혈 저널리스트. 진위는 둘째치고.[/i][-][/c]"
3688516337 = "[c]내 Phase 시작 시:[/c] 가장 체력이 낮은 적 스트라이커를 전열로 불러낸다. 이후 자신이 후열에 있다면 전열로 이동한다."
2292202966 = "전열의 적에게 피해를 준다. 이후 무작위 아군 스트라이커와 교대한다.\n\n\n[c][75b4c0][i]\"매스 미디어는 엔터테인먼트다!\"\n오늘도 키보토스 학생들에게 오락거리를 제공하기 위해 분주한 저널리스트. 진위는 둘째치고.[/i][-][/c]"
4249224260 = "[c]내 Phase 시작 시:[/c] 이번 Phase 동안 전열 스트라이커의 EX스킬 위력이 [c]2[/c] 증가한다."
1953962774 = "후열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]오디세이아 해양학원의 문제아 집단, <골든 플리스 호>의 학생들.[/i][-][/c]"
1830076469 = "[c]다른 아군 스트라이커가 피해를 받은 후:[/c] 후열에 있는 스트라이커에게 공격받았다면, 공격받은 스트라이커의 체력을 [c]{param;BasePower}[/c] 회복한다."
3320968227 = "모든 적에게 피해를 준다.\n\n\n[c][75b4c0][i]바다에 빠지기라도 한 듯이 온몸이 축축하게 젖어 있다.[/i][-][/c]"
2788686513 = "[c]내 Phase 시작 시:[/c] 이 카드가 필드에 홀로 남았다면 EX스킬 위력이 [c]3[/c] 증가한다. [c](게임당 1번)[/c]"
887567173 = "무작위 적에게 피해를 준다. 대상이 후열의 적일 경우, [c]{param;Multiply}[/c]배의 피해를 준다.\n\n\n[c][75b4c0][i]아무렇지 않은 척하고 있지만, 사실은 바니걸 차림이 좀 부끄럽다.[/i][-][/c]"
4268305663 = "[c]내 Phase 종료 시:[/c] 다른 [c]{tag;Odyssey}[/c] 스트라이커의 최대 체력이 [c]1[/c] 증가한다."
794917716 = "전열의 적에게 피해를 준다. 피해를 준 만큼 자신의 체력을 회복한다.\n\n\n[c][75b4c0][i]\"이 상황, 다소 나에게 불리한 것이 아닌가?\"[/i][-][/c]"
4091615803 = "상대의 손패 [c]{param;CardNum}[/c] 장의 코스트만큼 모든 아군 스트라이커에게 보호막을 부여한다. 이후 그 카드의 코스트가 [c]0[/c]이 된다.\n\n\n[c][75b4c0][i]\"욕심은 서로를 해칠 뿐이야! 그러니까 전부 나한테 양보해 줘!\"[/i][-][/c]"
3270348989 = "전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"공짜 케이크가 쌓여 있다는 말을 듣고, 어제부터 굶었단 말이야!\"[/i][-][/c]"
2498549575 = "[c]내 Phase 종료 시:[/c] 상대의 손패 [c]{param;CardNum}[/c] 장의 코스트만큼 자신의 EX스킬 위력이 증가한다. 이후 그 카드의 코스트가 [c]0[/c]이 된다."
3983448958 = "자신에게 보호막을 부여한다.\n\n\n[c][75b4c0][i]\"좀 전에 바니걸 차림의 분들께서, 야자수를 마구 흔들면서 살았다고 외치던데... 무슨 이벤트인 걸까요?\"\n- 야자나무의 주인, 키리후지 나기사[/i][-][/c]"
3876182863 = "[c]게임 시작 시:[/c] 모든 아군 스트라이커에게 보호막을 [c]{param;ShieldPower}[/c] 부여한다.\n\n[c]내 Phase 시작 시:[/c] 자신의 체력이 가득 차 있지 않다면, [c]{char;848052}[/c] 카드를 [c]3[/c]개 소환하고 퇴각한다. 자신의 체력이 가득 차 있다면, 모든 적 스트라이커에게 [c]{param;BasePower}[/c] 피해를 준다."
2456262865 = "모든 아군에게 보호막을 부여한다.\n\n\n[c][75b4c0][i]※사유지의 나무 열매를 따는 행위는 불법입니다.[/i][-][/c]"
2920098346 = "[c]내 Phase 시작 시:[/c] 자신의 체력이 가득 차 있지 않다면, 모든 적 스트라이커의 체력을 [c]{param;BasePower}[/c] 회복한다. 이후 자신은 퇴각한다. 자신의 체력이 가득 차 있다면, 모든 적 스트라이커에게 [c]{param;SubPower}[/c] 피해를 준다."
1996631264 = "모든 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"녀석은, 녀석은 하나가 아니야!\"\n- 미개봉 영화, <신 페로로지라> 발췌 대사[/i][-][/c]"
2315266529 = "[c]내 Phase 시작 시:[/c] 전열에 있다면 퇴각한다. 후열에 있다면 무작위 적 스트라이커에게 [c]{param;BasePower}[/c] 피해를 준다."
1862988659 = "전열의 적에게 피해를 준다. 이후 아군 [c]{char;848053}[/c] 카드의 수만큼 후열의 모든 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"'그것'을 불러낸 것은 우리의 염원과 망집, 그 사이 어딘가에 떠도는 광기의 편린이었다.\"\n- 페로로지라 굿즈 소개 페이지[/i][-][/c]"
4093879807 = "[c]내 Phase 종료 시:[/c] 혼자 남아있지 않다면 보호막을 [c]{param;BasePower}[/c] 부여한다. 혼자 남아있다면 [c]{char;848053}[/c] 카드를 [c]1[/c]개 소환한다. 이후 자신에게 [c]{param;SubPower}[/c] 피해를 준다."
3617530377 = "[c]재사용 대기시간: 3턴[/c]\n\n전열의 적에게 피해를 준다. 이후 SP스킬 위력이 [c]1[/c] 증가한다.\n\n\n[c][75b4c0][i]남들 옆에 서기 위해 쉬지 않고 달리기로 한 소녀.[/i][-][/c]"
3142724350 = "[c]다른 아군 {tag;Trinity} 학생의 EX스킬 또는 SP스킬 발동 후:[/c] 재사용 대기시간이 [c]{param;CoolDownNum}[/c] 감소한다."
3289231970 = "[c]재사용 대기시간: 3턴[/c]\n\n아군 전열 스트라이커의 체력을 회복한다.\n\n\n[c][75b4c0][i]\"스스로 생각하는 것보다, 그 아이는 훨씬 대단하답니다.\"\n- 정의실현부의 부부장, 하네카와 하스미[/i][-][/c]"
3414707332 = "[c]다른 아군 스페셜의 SP스킬 발동 후:[/c] 재사용 대기시간이 [c]{param;CoolDownNum}[/c] 감소한다."
2250816044 = "[c]재사용 대기시간: 3턴[/c]\n\n아군 전열 스트라이커의 EX스킬 위력이 [c]1[/c] 증가한다. 그 스트라이커가 [c]{tag;Justice}[/c]라면 EX스킬 위력이 [c]2[/c] 증가한다.\n\n\n[c][75b4c0][i]우수한 사격술로 정의실현부에 수석 입부한 천재 저격수. 정의실현부 내에서도 유별나게 강경한 성격으로, 최근 이상과 현실 사이에서 방황하고 있다.[/i][-][/c]"
1536770335 = "[c]다른 아군 스트라이커의 EX스킬 발동 후:[/c] 무작위 적에게 [c]{param;BasePower}[/c] 피해를 준다."
2704960902 = "[c]재사용 대기시간: 2턴[/c]\n\n손패의 무작위 카드를 [c]{param;SpawnCardNum}[/c]장 복사하여 코스트가 [c]0[/c]인 일회용 카드로 생성한다. 내 Phase 종료 시, 그 카드는 버려진다.\n\n\n[c][75b4c0][i]어설픈 연기력과, 그걸 뛰어넘는 사업 감각을 가진 백야당의 당주. 그 마수는 백귀야행을 넘어, 키보토스 전역을 향해 뻗어 나가고 있다.[/i][-][/c]"
608246101 = "[c]내 Phase 시작 시:[/c] 손패의 무작위 카드 [c]{param;CardNum}[/c]장의 코스트가 [c]1[/c] 감소한다. 내 Phase 종료 시, 그 카드는 버려진다."
2240303745 = "[c]재사용 대기시간: 2턴[/c]\n\n무작위 적에게 피해를 준다. [c](자신을 포함한 아군 {tag;Hyakkiyako} 학생 및 {char;848014} 카드의 수만큼 반복)[/c]\n\n\n[c][75b4c0][i]꿈꾸는 닌자 소녀. 종종 인법처럼 보이는 일을 해내지만, 초현상이 아닌 신체 능력에 의한 착시이다.[/i][-][/c]"
1862786830 = "[c]내 Phase 시작 시:[/c] 아군 스트라이커가 한 명뿐이라면, 적과 수가 같아지도록 [c]{char;848058}[/c] 카드를 소환한다. [c](게임당 1번)[/c]\n\n※ 아군 스트라이커가 모두 퇴각해, 보조 스트라이커만 남으면 전투에서 패배한다."
4086389314 = "[c]재사용 대기시간: 2턴[/c]\n\n전열의 적에게 피해를 준다.\n\n\n[c][75b4c0][i]\"주요 범행은, 땡땡이, 쓰레기 무단 투기, 복도 주행… 요컨대 잡범이군요.\"\n- 발키리 경찰학교의 공안국장, 오가타 칸나[/i][-][/c]"
820538695 = "[c]재사용 대기시간: 3턴[/c]\n\n[c]{skill;8481079}[/c]의 효과가 발동되어야 EX스킬을 사용할 수 있다.\n\n체력이 가장 높은 적에게 피해를 준다. [c](상대 손패의 카드 수만큼 반복)[/c]\n\n\n[c][75b4c0][i]소중한 총과 옷을 무자비하게 적신다. 총에 맞는 것보다 기분 나쁘다![/i][-][/c]"
3259127937 = "[c]내 Phase 종료 시:[/c] 물을 끌어올린다. [c]{skill;8481071}[/c]를 사용하면 효과는 사라진다."
1443818886 = "[c]재사용 대기시간: 3턴[/c]\n\n모든 스트라이커에게 피해를 준다.\n\n\n[c][75b4c0][i]'목표를 위해서는 어떤 수단도 마다하지 않는 실행력과, 불행하게도 아주 많은 수단을 보유한 인물.'\n- 선도부장의 메모[/i][-][/c]"
4169220226 = "[c]내 Phase 종료 시:[/c] 적의 빈 스트라이커 공간에 [c]{char;848029}[/c] 카드를 [c]1[/c]개 소환한다."
2773974068 = "[c]게임 시작 시:[/c] 모든 아군 스트라이커의 EX스킬 위력이 [c]2[/c] 증가한다."
4044198689 = "[c]게임 시작 시:[/c] 모든 아군 스트라이커의 EX스킬 위력이 [c]1[/c] 증가한다."
2024521566 = "[c]게임 시작 시:[/c] 모든 아군 스트라이커의 최대 체력이 [c]2[/c] 증가한다."
1870803014 = "[c]게임 시작 시:[/c] 모든 아군 스트라이커의 최대 체력이 [c]5[/c] 증가한다."
