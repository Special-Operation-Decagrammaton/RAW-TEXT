2728795135 = "트러블메이커?"
2665297076 = "밀레니엄에 도착했지만 조난자들은 이미 사라진 상태였다. 에이미가 말해 준 단서로 함께 조난자들을 찾아 나선 선생님은 미사카 미코토를 발견하여 함께 특무부실로 돌아온다. 히마리는 미사카 미코토에게 그들을 이쪽으로 불러옴과 동시에 원래 있던 곳으로 돌아갈 수 있는 설비를 찾아보겠다고 말하고 그동안 에이미와 함께 키보토스의 상식을 갖추기로 한다."
702162909 = "이 동네의 상식 1"
1061223818 = "총 없이 거리를 활보하는 미사카 미코토를 위해 엔지니어부를 찾아 총을 받기로 한 에이미 일행. 엔지니어부는 미사카 미코토 전용으로 제작된 총과 나머지 두 사람을 위한 총을 건네준다. 총을 받는 동안 히마리가 나머지 조난자 중 한 명을 찾아 그곳으로 향한다."
3231248675 = "이 동네의 상식 2"
