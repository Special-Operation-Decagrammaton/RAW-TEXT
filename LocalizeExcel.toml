1084207169 = "샬레로 찾아온 모미지. 모미지와 선생님은 모미지가 가져온 만화책을 함께 보며 동봉되어 있던 초콜릿을 나눠 먹는다."
985547137 = "그렇기 때문에 오히려"
441887019 = "나기사는 선생님을 불러 조용히 자신이 준비한 초콜릿을 건넨다."
1245310435 = "따를 수는 없지만"
2182832120 = "발렌타인 데이에 미노리가 추천하는 가츠동 가게에 함께 한 선생님. 발렌타인 데이의 상술에 넘어갈 수 없다고 주장했지만, 초콜릿은 확실히 건네주는 미노리였다."
2665747381 = "서로 간의 인식 차이"
3520175290 = "자신에 대한 인식을 개선하기 위한 일환으로, 아오이는 발렌타인 데이를 기회로 삼아 선생님에게 직접 준비한 초콜릿을 선물한다."
1660418007 = "모두 함께"
2556707942 = "일 년에 한 번뿐인 발렌타인 데이를 맞아, 프라나는 아로나가 자고 있는 사이에 선생님을 위해 손수 만든 초콜릿을 선물한다."
39118678 = "과정, 퍼포먼스, 그리고 결과"
4008970014 = "발렌타인 데이를 맞아, 메루는 선생님에게 초콜릿 드로잉 쇼를 보여주려 하지만, 여러 번 시도해도 만족하는 결과물이 나오질 않아 상심한다. 선생님은 메루가 그린 작품 중 가장 잘 그려진 것을 고른다."
650590662 = "최고, 최선, 그리고 궁극의……."
3966026048 = "토키는 선생님을 위해 발렌타인 데이라는 특별한 날에 걸맞는 최고, 최선, 그리고 궁극의 초콜릿 코스를 대접한다."
991186108 = "전략홍보팀장의 마음"
620023061 = "선생님을 음양부의 부실로 초대한 카호는 부끄러운 마음에 백귀야행의 발렌타인 데이 홍보물을 건네며 화제를 돌리지만, 이내 마음을 다잡고 선생님에게 직접 준비한 초콜릿을 건넨다."
4215670575 = "그 국장의 블렌딩"
2727005466 = "칸나는 업무차 발키리 경찰학교를 방문한 선생님에게 마음을 담은 커피를 건넨다."
271172490 = "청춘을 위한 전력투구"
2392398542 = "청춘의 대표적인 기념일 중 하나인 발렌타인 데이를 맞아, 렌게는 선생님에게 발렌타인 초콜릿을 만들어 선물하겠다는 계획을 세운다. 하지만 12시간이 넘도록 초콜릿은 완성될 기미를 보이지 않고, 선생님은 렌게를 찾아가 함께 초콜릿을 만들어 먹는다."
3988011739 = "작전참모는 지고 싶지 않아."
1261309508 = "발렌타인 데이를 맞아 백귀야행에서 열리는 다양한 이벤트를 도와달라는 키쿄의 요청에 따라, 선생님은 키쿄와 함께 백귀야행 곳곳을 돌아다니며 시간을 보낸다."
1994341756 = "양손 한가득 담긴 욕심."
2652260800 = "유카리는 발렌타인 데이를 맞아 자신의 진심을 전하기 위해 선생님을 초대하고, 카데노코지로서의 자신과, 유카리로서의 자신으로서 각각 준비한 두 개의 선물을 건넨다."
2016528600 = "둘만의 비밀"
96487163 = "샬레를 찾아온 이부키는 선생님에게 직접 만든 특제 초콜릿 푸딩을 건넨다. 푸딩을 먹는 모습을 빤히 바라보는 이부키를 발견한 선생님은 이부키와 푸딩을 반씩 나누어 먹기로 한다."
402726560 = "질리지 않는 달콤함"
313032494 = "선생님에게 기대하라는 내용의 의미심장한 모모톡을 보낸 미카는 약속한 날이 되자 약속 장소에 나오지 못한다. 미카에게 연락해 전화 너머로 당황하는 소리를 들은 선생님은 미카가 있다고 생각되는 가사 실습실로 향한다."
2029368497 = "격에 어울리는 선물"
3062807839 = "마코토는 발렌타인 데이를 맞아 최고의 초콜릿을 선물하겠다며, 초콜릿으로 만든 게헨나 특제 분수를 선생님에게 보여준다."
832685500 = "발렌타인 축제"
3937412867 = "발렌타인 데이야말로 초콜릿 축제라고 주장하는 우미카는, 자신만의 독특한 초콜릿 가마를 선생님에게 건넨다."
2602684896 = "S+의 크레이프"
2759978261 = "조리 실습 시험에 낙제 위기라는 키라라. 선생의 도움으로 초콜릿 크레이프를 만드는 데에 성공한다. 하지만 알고 보니 시험은 선생에게 직접 발렌타인 크레이프를 만들어주고 싶었던 키라라의 핑계. 선생은 그렇게 만들어진 크레이프에 S+의 점수를 매긴 뒤, 키라라와 크레이프를 나눠 먹는다."
853644750 = "이상한 경쟁심"
3101789295 = "선생님에게 발렌타인 초콜릿을 가지고 온 시로코. 초콜릿은 선생님의 기억에도 있는 것이었지만, 어째서인지 같은 걸 통째로 가지고 왔다."
1274982249 = "오감도"
1269088046 = "키사키는 선생님을 산해경에 초대해, 카카오닙스 차를 대접한다."
3853801039 = "철사장 초콜릿"
4007922540 = "레이죠의 초콜릿은, 혹독한 '수련' 끝에 탄생한 것이었다……."
2317670005 = "비밀 레시피"
2747026672 = "수제 초콜릿을 가져온 사츠키. 뭔가 특별한 레시피를 사용했다는데……?"
3253447383 = "스위트 저널리즘"
2422568276 = "발렌타인 특집 기사 취재를 온 치아키. 선생님에게 초콜릿을 주는데 사진과 다르다."
3029733267 = "함정 초콜릿"
3490507594 = "선생님을 위해 값비싼 초콜릿을 구입한 세이아. 하지만 수취인 란에 사인을 하고 나서야, 선생님은 모든 것이 하나의 거대한 함정이었음을 깨닫는다."
3752504286 = "프레젠테이션"
1513386319 = "발렌타인 초콜릿에 대해 프레젠테이션을 진행하는 리오. 리오가 준비한 초콜릿은, 그녀 스스로 주장하기를, 자신을 표현하고 상징하는 것이라는 듯 했다."
