815055312 = "คุณครูชวนให้มารีทานข้าวกลางวันเพราะเธอเอาแต่ง่วนอยู่กับการช่วยเหลือ\nคนอื่น มารีและคุณครูไปร้านค้านอกสนามของย่านการค้าเทพเต่าดำเพื่อ\nรับประทานข้าวกลางวันในเวลาบ่ายแก่ๆ ด้วยกัน ระหว่างนั้นเองพนักงานใน\nร้านได้แผลน้ำมันลวก คุณครูจึงพาพนักงานไปที่หน่วยพยาบาลสัมพันธ์\nแต่ด้วยเหตุผลบางอย่าง เซรินะกับเซนะที่กำลังรักษาคนป่วยก็กีดกั้นไม่ให้\nคุณครูเข้ามาในหน่วยพยาบาล"
