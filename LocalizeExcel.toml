2941796748 = "Agnus Dei"
2991478379 = "貝雅特里榭說了自己所認為的大人的義務，但老師卻否認了他的想法。因此貝雅特里榭十分憤怒，最後露出了本性。"
1958381225 = "Agnus Dei"
1268369978 = "貝雅特里榭對奧利斯小隊和老師的潛力感到慌張，結果便下令集結巴西利卡聖所的所有兵力。"
3926608295 = "為了少女們的垂憐經（１）"
