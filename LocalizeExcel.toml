2819599029 = "百鬼夜行的問題兒童們"
3150946652 = "不知道為何，在商店街鬧事的妖怪劇團之中也包含了伊樹菜。看到老師就慌忙逃走的伊樹菜。靜子為了解決令人傷腦筋的妖怪劇團而向老師求助。"
1397990433 = "陰陽部的電波少女"
1863239733 = "為了解決問題而來到陰陽部的老師和靜子。迎接兩位的是做俳句的電波系少女知世。話說得模糊不清的知世建議他們兩人到修行部。這兩人來到街上時，又再次受到妖怪劇團的襲擊。"
1550527487 = "修行部的怪人們（１）"
2901698646 = "由於遭受妖怪劇團的襲擊，老師和靜子陷入危機。此時現身幫他們一把的是修行部的三人幫。緊接在後出現的伊樹菜挑釁說要說服老師。"
2868330061 = "修行部的怪人們（２）"
1540547905 = "雖然順利打倒來犯的妖怪劇團和伊樹菜，他們一行人卻撂下狠話說下次情況就不一樣了，說完就逃之夭夭。最後，為了找出雇用妖怪劇團和伊樹菜的元兇，老師和靜子便一起行動。"
2417194596 = "慶典進行中"
1414862293 = "為了追查此事件的元兇的老師、靜子和修行部由於突如其來的慶典任務而被打散。就在這時候，慶典的另一邊發生了騷亂。"
3322041533 = "慶典、夢想、以及……"
2820688883 = "在繼續進行慶典相關事宜的途中，老師與伊樹菜不期而遇，並且一起短暫地享受了慶典。此後，聲稱下次一定要贏過老師的伊樹菜離開後，老師就被妖怪劇團綁架了。"
389931609 = "被揭露的陰謀與在那之後"
464929464 = "最後老師遇到的雇主，就是商人會長喵天丸。就在為了破壞慶典而利用伊樹菜的夢想的喵天丸惹怒老師的時候，伊樹菜闖進來解救老師。"
510483198 = "離終曲還差一點！（１）"
1070874512 = "在老師和伊樹菜面臨危機之際，節慶營運管理部和修行部的學生現身解救。伺機而動的喵天丸喚來無數妖怪劇團學生，使得所有人陷入危機。"
2874004235 = "離終曲還差一點！（２）"
38247590 = "當喵天丸所準備的殺手鐧以失敗告終，妖怪劇團便逃之夭夭。此時憤怒的靜子狠狠賞了喵天丸一記重拳。"
1143447829 = "少女的夢（１）"
