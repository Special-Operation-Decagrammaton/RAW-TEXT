2224315914 = "여름은 아직 끝나지 않은 채로"
2571315120 = "일정을 마치고 샬레로 돌아온 선생님을 맞이해준 건 니야, 미모리, 그리고 피나였다. 시즈코가 곤경에 처했단 그들의 말에 선생님은 다시 바다로 향하지만, 그곳에서 선생님은 시즈코와 함께 <수영복 복면단>의 습격을 받게 된다."
3339314761 = "해야 할 일은 하나!"
2566461510 = "아비도스 멤버들 덕분에 자신이 거대한 사기극에 휘말렸다는 걸 알게 된 시즈코는, 니야의 반대에도 불구하고 모든 걸 바로잡기 위해 이번 소동에 직접 뛰어들기로 결심한다."
866798122 = "우선 상황을 정리해 보자."
3677973191 = "수영복으로 갈아입은 시즈코 일행은 <로스트 파라다이스 리조트>의 각지 세력들로부터 계약서를 회수하기 위해, 아비도스 멤버들과 함께 모험을 떠난다."
244971942 = "유황의 광부들 1"
992183906 = "시즈코 일행이 첫 번째로 도착한 곳은 '유황의 광부들'이라는 세력이 점거한 지역이었다. 그곳에서 만난 것은, 아니나 다를까……"
945809083 = "유황의 광부들 2"
4177740208 = "시즈코 일행은 치세의 활약으로 온천을 먼저 발견하는 데 성공하고, 온천개발부원들은 깨끗하게 패배를 인정한다. 그러나 계약서를 회수한 시즈코는 온천개발부와 프랜차이즈 계약을 맺고, 지속적인 협력 관계를 유지하기로 약속한다. "
2437669702 = "다음 행선지를 향해"
9719984 = "아비도스 멤버들과 현재 상황을 공유한 시즈코 일행은 다음 행선지를 향해 발걸음을 내디딘다."
4025448392 = "하얀 귀의 괴물들 1"
1455533879 = "사람들이 넋 나간 얼굴로 어떤 배에 오르고 있는 현장을 발견한 시즈코 일행. 그곳에서는 카드 게임 <무시퀸>의 시크릿 대회가 열리고 있었다."
1990939403 = "하얀 귀의 괴물들 2"
2476002705 = "치세의 활약으로 <무시퀸> 대회의 우승을 차지한 시즈코 일행. 우승 상품이었던 계약서를 회수한 시즈코는 이곳에서도 마찬가지로 프랜차이즈 계약을 맺고, <무시퀸> 대회를 계속 개최하기로 한다."
1596206066 = "현무의 사신들 1"
4125761811 = "산해경의 <현무상회>가 관리하고 있다는 지역에 도착한 시즈코 일행. 그러나 리조트를 관리하고 있었던 것은 냥텐마루와 검은거북파였다. "
3480568884 = "현무의 사신들 2"
1288353414 = "냥텐마루와 검은거북파를 물리친 시즈코 일행은, 어째서인지 카이저 PMC의 이름을 듣게 된다. "
3867903048 = "마지막 싸움을 앞두고"
3483691157 = "시즈코 일행은 마지막 싸움을 앞두고 아비도스 멤버들과 작전 회의를 연다."
3161074241 = "헬멧단! 최후의 결전!"
3255147536 = "최후의 결전지로 향한 시즈코 일행. 그러나 일행의 앞을 가로막는 것은 영업사원으로 좌천당한 전 카이저 이사였다. 카이저 영업 사원의 투자 제안을 거절한 시즈코에게, 의문의 복면단이 모습을 드러내는데……."
2912056471 = "그리고 찾아온 여름의 끝은"
3801914199 = "카이저 영업사원은 선생님을 납치해 도주하지만, 호출을 받고 찾아온 와카모의 활약으로 선생님은 구출된다. 그렇게 전부 끝났다고 생각하던 그 순간, 총학생회가 나타나 권리 문제로 리조트를 비워달라고 통보한다. 하는 수 없이 떠나기 전, 시즈코는 모두와 함께 마지막 연회를 열며 이번 소동을 마무리한다."
3000475038 = "방과 후 디저트 이야기 ~달콤한 비밀과 총격전~"
952532459 = "선생님에게 상담을 요청한 카즈사.\n복잡미묘한 카즈사의 고민은 그녀의 과거와 연관이 있는 듯한데…….\n카즈사와 방과후 디저트부의 일상에 등장한 예측 불허의 강렬한 맛!\n좌충우돌 고민 상담의 결말은?!"
