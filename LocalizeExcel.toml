2374839960 = "A doll Ibuki received from her favorite sisters. Ibuki seems to find the peculiar appearance its best quality."
938424299 = "Ibuki's favorite crayon. The worlds Ibuki can create with just this simple tool are truly limitless."
1063147996 = "One of Ibuki's favorite desserts. It's a precious treat she can only enjoy once a day, but sometimes it mysteriously disappears from the fridge."
1559446809 = "A handbag Ibuki stores her personal items in. It holds many of her prized possessions, like her cell phone, whistle, firearm, a pretty flower petal, and tissue paper given to her by her upperclassmen."
917196592 = "Ibuki's hand-drawn picture of her favorite upperclassmen. By special order from Makoto, it has been deigned a precious Gehenna treasure."
1246509466 = "A periodical printed to publicize the majesty of the Pandemonium Society. Upon perusing it, however, it appears to just be filled with articles and images of Ibuki. It may as well be Ibuki-branded merch at this point."
1636079057 = "A maintenance log used to record the results of the School Lunch Club's cleanliness assessments. They usually receive a perfect score, but the hijinks Gehenna students frequently get into sometimes interrupts their otherwise immaculate record."
1783365279 = "It looks rather old and worn out at first glance, but actually functions quite well. The previous owner must have taken extra care with its maintenance."
561939847 = "Someone's forgotten book bag. It probably has everything you might expect from a Gehenna Academy student: textbooks, snacks, manga, and bombs."
1142909824 = "A burned and scorched copy of the Pandemonium Society Periodical. No one seems to care much, however, perhaps due to the fact that this issue featured one of Makoto's speeches rather than an article about Ibuki."
4224932345 = "A prison visitor log maintained by the Prefect Team. Its original purpose was to help with security, but it seems to have morphed into more of a guest book for the frequently incarcerated students."
186189428 = "A hand-drip coffee maker Ako got for Hina. A thoughtful gesture, yes, but also a self-serving one, as Ako can't make a decent cup of coffee on her own."
2653748522 = "A cookbook made of detailed recipes Juri learned from her culinary studies with the School Lunch Club. Her clear, step-by-step instructions make it easy for anyone to cook a delicious meal!"
2932450416 = "A letter Cherino sent to Makoto. It describes what she believes is the proper attitude a leader needs to carry themselves with, as well as her wish for the thriving development of both academies."
1955500566 = "A spoon found in a prison cell. While most commonly used to eat, it's also been used in escape attempts or transforming into an awesome hero."
652268410 = "A pile of papers made up of Prefect Team documents. You'd have to squint to make sense of the words and numbers scrawled all over them. The precarious pile looks like it might topple over if someone so much as breathes wrong around it."
3128527829 = "A patient log Sena meticulously upkeeps. Her exacting personality comes through in the detailed notes, documenting everything from urgent care to which patients frequently feign illness to get out of class."
4077140834 = "Someone's lost meal ticket. The handwritten words \"I can't wait!\" on top of it elicit a feeling of sympathy for the unknown owner."
3849298482 = "A discarded, crumpled school newsletter. Perhaps it was tossed because it's just filled with claims of Makoto's supposed exploits."
88965538 = "An unused syringe from the Medical Emergency Club. Be careful not to stab yourself with the sharp tip!"
