381782239 = "這次聯絡老師的人並非平時的真琴，而是伊呂波。一抵達萬魔殿辦公室，老師就注意到真琴的樣子與平常截然不同。真琴突然表示要解散風紀委員會並跑出辦公室，老師和萬魔殿的成員們追了上去，好不容易才讓真琴恢復原來的樣子。"
