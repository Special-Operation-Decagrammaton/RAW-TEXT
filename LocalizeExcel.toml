656130952 = "據說每年萬魔殿都會舉辦派對，廣邀各界有力人士共襄盛舉。派對的目的似乎是為了誇耀萬魔殿的威勢。"
3296347737 = "眾所周知只有菁英才能加入的格黑娜學園學生會。不過有不少人評論說，他們平時行事古怪，和嚴格的加入標準根本扯不上關係。"
241828489 = "在讓風紀委員會非常傷腦筋的騷動中，有一部分的人是受人唆使。據傳，當時教唆搗亂的雇主都是同一人。"
4211417711 = "位於格黑娜自治區的一角，因老舊而不再使用的設施。因此也被想要迴避其他人視線的學生們當成避難所使用。"
1606103230 = "舊校舍裡的老舊鋼琴。近期似乎有被人保養過，清理得十分乾淨，用起來沒有問題。"
74387565 = "即使是在格黑娜，規模也堪稱猛瑪級的巨型社團。因為對開發溫泉的熱情而團結在一起，除此之外經常闖禍。"
3868968517 = "溫泉開發部正在謀劃中的超乎尋常的大作戰。是即使認真傾聽作戰說明，也完全無法理解的宏大作戰計畫。"
848014088 = "領導溫泉開發部，充滿領袖氣質的部長。展現出豪爽且無懈可擊的領導能力，但是在風紀委員長面前就會變成看到貓的老鼠。"
1351474076 = "雖然佳澄以意味深長的態度提及的情報真偽令人懷疑，不過格黑娜原本就到處都是這種令人難以置信的祕密。"
2177842261 = "顧名思義，是來歷不明的怪物。世界上的某些存在，即使出現在眼前也完全無法理解。"
1914035094 = "和風華一起在供給部努力鑽研料理的真誠少女。說不定會有被這可貴的精神打動的隱藏粉絲。"
3208368410 = "即使是在格黑娜也惡名昭彰的社團。富含實力和專業領域的知識，同時也具備暴力性的文武雙全的惡徒們。"
3042483397 = "出現在格黑娜的謎樣巨大鬆餅。明明是很令人驚訝的事，但意外地在格黑娜並不罕見。"
1792078009 = "據說萬魔殿為了迎接格黑娜派對，向供給部訂購了餐點。不過掌廚者似乎不是供給部的部長……"
654318302 = "存在原因令人難以理解的物品。不禁讓人在心裡閃過「浪費預算好像就是用來形容這種東西」的念頭。"
1931459361 = "問題學生也……不，正因為是問題學生才能成立的義氣也是存在的，這就是巷弄間的道理。只不過對象是萬魔殿的議長……"
1421764132 = "據說急救醫學部所使用的藥膏效果非常顯著，只要擦一擦就能長出新的皮膚。拿一個帶在身上應該很有用。"
2017029991 = "不管左看右看上看下看都很啟人疑竇的傳單。真的有夠可疑……"
4052776956 = "周圍流傳著真琴議長在自治區製造大規模騷動的傳聞。其實這是平時常有的事，沒什麼好稀奇的。"
2835023066 = "即使個性在被催眠後完全改變，煩人的天性依然存在，由此可見人的本性是不會輕易改變的。"
