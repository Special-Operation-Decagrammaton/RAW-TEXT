2665297076 = "抵達千年之後，遇難者已經消失無蹤。老師透過英美提供的線索一起尋找遇難者時發現了御坂美琴，於是便和他一起回到了特異現象搜查部。陽葵對御坂美琴說明了情況，並對設施展開了調查。在此期間，陽葵請老師英美一起為御坂美琴建立奇普托斯的常識。"
702162909 = "這座都市的常識（１）"
1061223818 = "一行人為了走在街上卻沒帶槍的御坂美琴前往工程師部取槍。工程師部將專為御坂美琴三人製作的槍提供給英美一行人。取得槍械後便繼續尋找其餘遇難者。"
3231248675 = "這座都市的常識（２）"
3778114332 = "一行人帶著奇普托斯的「常識」一起找到了食蜂操祈。說明了目前為止的情況後接到了陽葵的聯絡，說是有關設施的調查已經告一段落。"
1189128859 = "就像觀光客一樣"
1275099754 = "一行人回到特異現象搜查部後見到最後的遇難者──佐天涙子。陽葵說修好廢墟的設施並重新啟動就能回到原本的地方，而且一切都已準備就緒。陽葵提議在回去之前好好享受奇普托斯，於是一行人便和老師及英美同行。"
232191555 = "自由時間總是稍縱即逝"
