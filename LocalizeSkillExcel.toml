2285676125-NameKr = "공의의 기둥"
2285676125-DescriptionKr = "'물 중의 불, 불 중의 물' 스킬 사용 후 얼음 기둥 생성\n- 얼음 기둥은 생성될 때 불사 상태([c][007eff]2.5초[-][/c]간) 및 자신의 최대 체력 [c][007eff]400%[-][/c] 보호막 적용([c][007eff]20초[-][/c]간)\n- 얼음 기둥이 생성되고 [c][007eff]20초[-][/c] 이후 자신에게 최대 체력 [c][007eff]70%[-][/c] 대미지\n- 얼음 기둥이 생성되어 있는 동안 모든 아군의 방어력 [c][007eff]45%[-][/c] 감소, 받는 회복 효과 [c][007eff]1[-][/c]로 고정, [c][007eff]4초[-][/c]마다 공격력 [c][007eff]30%[-][/c] 대미지\n- 얼음 기둥이 파괴되면 난방기의 받는 회복량 [c][007eff]100%[-][/c] 증가, 모든 아군의 치유력 [c][007eff]200%[-][/c] 증가([c][007eff]20초[-][/c]간)\n- 게부라의 체력이 [c][007eff]60%[-][/c]이하가 되어 지형이 변경될 경우 얼음 기둥 파괴\n- 얼음 기둥은 EX 스킬로만 공격 가능"
1996187408-NameKr = "힘에 의한 정화(적)"
